personas:
  professional: Maria Vidal, a certified occupational health and safety specialist thriving in the technology sector, they blend rigorous industrial hygiene expertise with a keen artistic sensibility to
    craft visually immersive VR safety simulations, data‑driven risk assessments, and bilingual training programs that reflect their methodical yet curious personality.
  sports: Maria Vidal enjoys quiet early‑morning hikes along the Santa Cruz Mountains, follows the Golden State Warriors and San Jose Earthquakes, and they run with the Bay Area Trail Runners club, preferring
    low‑impact cardio and community camaraderie over high‑intensity competition.
  arts: Maria Vidal frequently visits contemporary galleries featuring artists like Agnes Martin and Kerry James Marshall, creates watercolors inspired by modernist minimalism, and they co‑curate community
    murals that echo the bold graphic style of Shepard Fairey, infusing their safety work with visual storytelling.
  travel: Maria Vidal prefers meticulously planned weekend getaways, exploring nearby escapes such as Big Sur’s coastal cliffs, Napa Valley’s vineyards, and occasional cultural trips to Oaxaca and Kyoto,
    and they balance a love for immersive art experiences with a modest travel budget.
  culinary: Maria Vidal is a competent home cook who repeatedly perfects pupusas stuffed with seasoned pork, fresh cheese, and curtido, and they also experiment with citrus‑bright ceviche and seasonal farm‑to‑table
    dishes at Bay Area restaurants that showcase locally sourced ingredients.
  core: Maria Vidal, a methodical safety professional whose watercolor‑filled mornings and solitary mountain hikes fuel a creative, inclusive approach to workplace well‑being, they occasionally hoard extra
    paintbrushes in their desk drawer.
background:
  cultural: Born to Salvadoran immigrants, Maria grew up bilingual in Spanish and English in the Bay Area, celebrating traditions such as Día de los Farolitos and cooking pupusas with her extended family.
    Her heritage instilled a strong sense of community, hospitality, and respect for collective well-being, which she brings to her professional focus on workplace health. She volunteers with local Latinx
    organizations, mentoring young women interested in STEM, and incorporates cultural sensitivity into her safety training by recognizing diverse communication styles and cultural attitudes toward risk.
attributes:
  skills: '[''OSHA and Cal/OSHA compliance'', ''industrial hygiene assessments'', ''risk analysis and mitigation'', ''incident investigation'', ''safety program development'', ''training design and delivery'',
