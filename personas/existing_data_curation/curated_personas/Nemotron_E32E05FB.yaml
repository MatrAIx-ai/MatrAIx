  hobbies: '[''visiting art galleries'', ''watercolor painting'', ''hiking in the Santa Cruz Mountains'', ''cooking Salvadoran dishes'', ''reading science-fiction novels'', ''practicing yoga'', ''attending
    small book club meetings'']'
  career_goals: Maria aims to become a senior occupational health manager within a leading technology firm in Silicon Valley, where she can influence company-wide safety culture and integrate innovative,
    creative approaches such as VR simulations and artistic visual cues into training. She plans to earn the Certified Safety Professional (CSP) credential and pursue a master's degree in public health
    to deepen her expertise in ergonomics and mental well‑being. In the long term, she envisions establishing her own consultancy focused on inclusive safety solutions for diverse, multilingual workforces,
    particularly championing the needs of under-represented Latinx employees.
