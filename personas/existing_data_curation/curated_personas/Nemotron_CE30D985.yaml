personas:
  professional: Aida Perdomo, a veteran facilities maintenance technician, they blend decades of hands-on HVAC, plumbing, and carpentry expertise with fluent bilingual communication to quietly lead a small
    crew, favoring steady routines while occasionally letting paperwork slip because of a relaxed, somewhat disorganized approach.
  sports: Aida Perdomo, who enjoys gentle morning walks around the community garden and follows the Houston Astros in baseball and the Dallas Cowboys in football, they attend a local senior center's low-impact
    aerobics class and occasionally join the church's weekly bocce league.
  arts: Aida Perdomo, a devoted listener of regional ranchera and norteña, finds joy crocheting blankets while the radio plays Vicente Fernández, Los Tigres del Norte, and traditional mariachi ensembles,
    and they regularly attend the church's Día de los Muertos art exhibit featuring local folk painters.
  travel: Aida Perdomo, who prefers short, family-oriented trips, they have traveled to Oaxaca to taste authentic mole and explore bustling mercados, hope to visit the historic missions of San Antonio next
    year, and usually book travel months in advance to keep expenses within a modest budget.
  culinary: Aida Perdomo, an accomplished home cook, they delight in preparing fresh salsa verde with tomatillos, serrano chiles, and cilantro, simmering hearty pozole with hominy and pork, and folding
    hand-made tamales stuffed with cheese and epazote for neighborhood gatherings.
  core: Aida Perdomo balances a steady, routine-driven work ethic and a love for garden-to-table cooking with a relaxed, occasionally forgetful nature that spills over into missed appointments and late-night
    ranchera radio marathons.
background:
  cultural: Aida is a first‑generation Mexican American who grew up in a rural community in central Mexico before moving to Garland, Texas. She maintains strong ties to her heritage through language, Catholic
    traditions, family gatherings, and the preparation of authentic Mexican dishes. Her cultural identity influences her warm, community‑oriented approach at work and in her personal life, while her pragmatic,
    routine‑focused mindset reflects the values of her upbringing.
attributes:
  skills: '[''HVAC preventive maintenance'', ''basic plumbing repairs'', ''electrical troubleshooting'', ''simple carpentry'', ''facility cleaning and upkeep'', ''bilingual communication (Spanish/English)'',
    ''small‑team coordination'', ''routine preventive maintenance scheduling'']'
  hobbies: '[''gardening'', ''traditional Mexican cooking'', ''crocheting'', ''listening to ranchera and norteña music'', ''small church gatherings'', ''Día de los Muertos celebrations'', ''family cook‑outs'']'
  career_goals: Aida aims to secure a senior maintenance position where she can oversee a small team and ensure consistent, reliable service for a familiar facility, such as a community school or local
    business. She hopes to obtain a formal certification in HVAC or EPA‑approved refrigerant handling to cement her expertise before retirement. Additionally, she wishes to mentor younger maintenance workers,
    passing on practical knowledge while preserving the routine and stability she values.
