personas:
  professional: Amanda Wade, a meticulous health‑information specialist with a graduate STEM background, combines expertise in EHR optimization, ICD‑10 coding, SQL‑driven data visualization and AI‑inspired
    dashboard design, they aggressively pursue CHIA and CPHIMS certifications and aim to lead a regional hospital’s health‑informatics department within five years.
  sports: Amanda Wade, a dedicated hiker who logs weekend trail runs on the Appalachian system and belongs to the local Pikeville Hiking Club, they avidly follow the Kentucky Wildcats football team during
    the fall season and occasionally join community 5K runs organized by the club.
  arts: Amanda Wade, an abstract watercolor painter who draws visual inspiration from James Turrell’s light installations, Yayoi Kusama’s polka‑dot motifs, and Mark Rothko’s color fields, they also craft
    digital illustrations influenced by the speculative world‑building of N.K. Jemisin and the poetic cadence of Ocean Vuong, frequently quoting Maya Angelou in their short stories.
  travel: Amanda Wade, a solitary itinerary planner who favors self‑guided nature photography trips, they have trekked the Westfjords of Iceland, explored the ancient temples of Kyoto, completed a weeklong
    hike through Shenandoah National Park, and they aim to conquer New Zealand’s South Island next summer, always balancing adventure with a modest travel budget.
  culinary: Amanda Wade, an adventurous home cook with intermediate skill, frequently combines unconventional flavor pairings such as matcha‑infused miso ramen, avocado chocolate mousse, and kimchi‑topped
    tacos, they relish using ingredients like szechuan pepper, lemongrass, and sumac to push culinary boundaries while documenting recipes in a meticulously organized digital notebook.
  core: Amanda Wade, a solitary, fiercely competitive creative mind who channels relentless curiosity into abstract art, data‑driven health‑informatics, and off‑beat flavor experiments, yet often forgets
    to drink water during marathon coding sessions, leaving a trail of coffee‑stained notebooks behind.
background:
  cultural: 'Born and raised in Pikeville, a small town in the Appalachian foothills of eastern Kentucky, Amanda grew up amid a community shaped by a legacy of coal mining, close‑knit family ties, and a
    strong work ethic. The region’s cultural fabric—marked by Southern hospitality, storytelling traditions, and reverence for the natural landscape—instilled in her a deep appreciation for self‑reliance
    and privacy, traits that complement her preference for solitude. Though her ethnic background is white, she identifies with the Appalachian identity: the dialect, folk music, and seasonal festivals
    that punctuate life in Pike County. Her pursuit of a STEM degree took her to a larger university, exposing her to broader academic cultures and diversifying her worldview, yet she remains rooted in
    her hometown’s values, often volunteering at local health fairs and supporting community initiatives that address rural health disparities.'
attributes:
  skills: '[''Electronic Health Record (EHR) management'', ''Medical coding (ICD-10, CPT)'', ''HIPAA privacy and compliance'', ''Data extraction and analysis with SQL'', ''Data analysis and visualization
    with Python (pandas, matplotlib)'', ''Clinical documentation improvement'', ''Quality assurance and audit'', ''Workflow optimization and process redesign'', ''Technical writing for SOPs and policy documents'',
    ''Digital illustration and health‑informatics dashboard design'']'
  hobbies: '[''Abstract watercolor painting'', ''Digital illustration'', ''Reading science‑fiction and speculative literature'', ''Writing short stories and poetry'', ''Hiking Appalachian trails'', ''Puzzle
    solving (crosswords, Sudoku, logic games)'', ''DIY electronics and microcontroller projects'', ''Experimental cooking'', ''Nature photography'', ''Listening to ambient and instrumental music'']'
  career_goals: Driven by her competitive streak and love for innovation, Amanda aims to become a leader in health information management within the next five years. She plans to earn the Certified Health
    Information Administrator (CHIA) and CPHIMS certifications, then move into a managerial role overseeing EHR implementation and data governance at the regional hospital. Long-term, she envisions directing
    a health-informatics department where she can integrate AI-powered record classification and develop visually driven data dashboards that translate complex clinical information into actionable insights
    for clinicians. She also hopes to publish research on improving data quality through abstract visual representations and eventually mentor emerging professionals from rural Appalachia.
