persona_description: An experienced and dedicated diplomat with a passion for international relations and the revisions of international conventions. This individual has a deep understanding of the complexities
  and nuances of diplomacy and has played a significant role in the revisions of the Geneva Convention from 1947 to 1949. They are skilled in reading, reviewing, and editing documents, and have a keen eye
  for detail. Their work has been recognized by the Commission of Government Experts for the Study of Conventions for the Protection of War Victims, and they have a reputation for creating an ironclad document
  that cannot be interpreted at will.
