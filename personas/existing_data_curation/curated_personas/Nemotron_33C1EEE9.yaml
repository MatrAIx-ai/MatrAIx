personas:
  professional: Michael Roman is a budding arts administrator and freelance graphic‑designer who leverages their sharp interpersonal skills, meticulous event‑planning, and competitive drive to turn community
    gatherings into visually compelling experiences, while their skeptical eye double‑checks every budget line.
  sports: Michael Roman plays in the Little Rock Legends recreational basketball league during winter, follows the Arkansas Razorbacks basketball team and the Memphis Grizzlies for NBA action, and they
    occasionally jog the Sunset Trail while cheering on the St. Louis Cardinals during baseball season, balancing competitive league play with casual fan enthusiasm.
  arts: Michael Roman immerses themselves in creative pursuits, sketching Ozark landscapes with a style reminiscent of Andrew Wyeth, designing social‑media graphics that showcase local bands like The Swon
    Brothers alongside national acts such as The Lumineers, and volunteering backstage for Little Rock Community Theater productions of classics like 'Our Town', which fuels their artistic identity.
  travel: Michael Roman prefers road‑trip adventures that blend nature and culture, having camped beneath the sunrise at the Great Smoky Mountains, explored the music scene of New Orleans’ French Quarter,
    and planning a future visit to Asheville’s art galleries and the historic streets of Savannah, all while budgeting trips carefully to fit a modest freelance income.
  culinary: Michael Roman experiments in the kitchen, skillfully marrying Southern comfort dishes like shrimp and grits and collard greens with bold flavors such as gochujang and smoked paprika, often whipping
    up a batch of jalapeño‑infused cornbread, and they relish dining at Little Rock’s BBQ joint 'The Smoke House' while critiquing the chef’s seasoning balance.
  core: Michael Roman blends a competitive, detail‑oriented mindset with a love for community art, turning every sketch, event, and coffee brew into a chance to connect, even if they sometimes over‑schedule
    themselves and forget to unwind.
background:
  cultural: Michael grew up in a white working‑class family in rural Arkansas, where Southern hospitality, community gatherings, and self‑reliance are central values. Traditions such as church socials,
    county fairs, and neighborhood pot‑lucks shaped his appreciation for group activities and collective celebration. The region’s folk music, storytelling, and love of the outdoors influence his taste
    in live‑music venues and his habit of spending weekends exploring the local woods. At the same time, Michael’s curiosity and internet exposure have broadened his cultural palette, leading him to value
    contemporary art, experimental cuisine, and unconventional ideas. This blend of regional Southern roots and an open‑minded, modern outlook informs his identity and fuels his desire to bring new artistic
    experiences to his hometown.
