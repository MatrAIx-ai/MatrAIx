  career_goals: Michael aims to transition from his current status into a full‑time role that blends his love of art and community. He plans to enroll in an associate program in Arts Administration or Marketing
    at a nearby community college while building a freelance portfolio of social‑media graphics and event‑promotion material for local venues. His long‑term ambition is to become the coordinator of a community
    arts center in Hamburg, where he can design exhibitions, run workshops, and attract regional artists. Alternatively, he envisions opening a small coffee shop that doubles as a gallery and performance
    space, giving him both entrepreneurial experience and a platform to showcase local talent. Michael’s competitive drive pushes him to earn certifications in digital marketing and project management within
    the next two years, positioning him for leadership roles in the town’s civic and cultural initiatives.
