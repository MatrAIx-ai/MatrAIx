  hobbies: '[''Bachata and Merengue Dancing'', ''Cooking Dominican Meals'', ''Gardening'', ''Reading Home‑Improvement Guides'', ''Attending Cultural Festivals'', ''DIY Art and Decorative Painting'', ''Walking
    in Houston Parks'', ''Volunteering at Local Community Centers'']'
  career_goals: Lourdes aims to formalize her decades of trade knowledge by launching a modest contracting business that emphasizes quality, cultural sensitivity, and mentorship. She plans to obtain a Master
    Painter certification offered by a Texas trade association, which will enhance her credibility for larger commercial projects. A key ambition is to mentor younger apprentices—especially those from immigrant
    backgrounds—by offering on‑the‑job training and sharing bilingual safety resources. She also hopes to collaborate with local community groups to create a public mural that celebrates Dominican heritage
    in Houston, securing both artistic fulfillment and a lasting legacy as she approaches retirement.
