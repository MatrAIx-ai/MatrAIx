personas:
  professional: Lourdes Almonte, a 61‑year‑old master painter with over three decades of residential and light‑commercial painting and paper‑hanging experience, combines a curious eye for color with practical
    project management, using bilingual communication, meticulous safety practices, and a balanced mix of organization and flexibility to deliver durable finishes while mentoring apprentices.
  sports: Lourdes Almonte stays active by strolling through Memorial Park with a senior walking club, cheering on the Houston Astros and Rockets, and joining a monthly low‑impact aerobics class at the community
    center, balancing gentle exercise with a love for seasonal fishing trips along the Gulf Coast.
  arts: Lourdes Almonte expresses artistry through weekly bachata and merengue sessions set to Juan Luis Guerra and Aventura, while sketching mural concepts inspired by local street artist Alex Diaz and
    attending community theater productions featuring classic works by Federico García Lorca.
  travel: Lourdes Almonte prefers leisurely road trips to historic towns like New Orleans and Austin, the occasional cultural cruise to the Caribbean islands, and plans a future visit to the historic streets
    of Seville, balancing detailed itineraries with spontaneous detours to local festivals.
  culinary: Lourdes Almonte, an adept home chef, revels in preparing sancocho and mangú with garden‑fresh cilantro, garlic, and ripe plantains, often sharing these hearty meals with neighbors while experimenting
    with spice blends and occasional indulgent outings at local seafood shacks.
  core: Lourdes Almonte blends seasoned painting expertise with a lively love of dance, a habit of humming paint‑mixing melodies, occasional over‑optimism in project timelines, and a quirky penchant for
    mismatched socks that hint at their vibrant, balanced outlook on life.
background:
  cultural: Lourdes is a first‑generation Dominican American who grew up in Houston's vibrant Latino neighborhoods. Bilingual in Spanish and English, she maintains strong ties to Dominican customs—celebrating
    Carnaval, listening to bachata and merengue, and preparing family recipes passed down through generations. Her Catholic upbringing influences her values of community service and respect for elders.
    The immigrant work ethic of perseverance and adaptability shapes her professional demeanor, while the multicultural tapestry of Houston enriches her appreciation for diversity and informs her collaborative
    approach on job sites.
