    ''Customer service and conflict resolution'']'
  hobbies: '[''Pick-up basketball'', ''Soul-food cooking'', ''Church community outreach'', ''Neighborhood clean-up events'', ''Woodworking projects'', ''Blues and jazz music'', ''Reading biographies'',
    ''Attending Chicago Cubs games'', ''Book club participation'']'
  career_goals: Mantrell wants to move from a janitorial role to a supervisory position, eventually becoming a Facilities Operations Manager for a large property or a municipal building. He plans to finish
    his associate degree in Facilities Management, earn a Certified Professional Cleaner credential, and lead the adoption of sustainable, low-chemical cleaning programs. In the longer term, he hopes to
    launch his own cleaning and maintenance contracting business that provides on-the-job training for youth in his neighborhood, creating stable jobs while promoting environmentally responsible practices.
