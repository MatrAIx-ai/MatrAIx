  career_goals: Michael aims to advance within the Kosciusko County law‑enforcement hierarchy, seeking promotion to sergeant within three years and eventually attaining the rank of lieutenant or police
    chief. He plans to complete the Indiana Police Academy's Leadership Development Program and obtain specialized training in mental‑health crisis response and investigative analytics. He is passionate
    about designing a comprehensive community‑engagement initiative that partners schools, faith groups, and social‑service agencies to reduce youth crime. In the longer term, he envisions influencing statewide
    policing policy through active participation in the Indiana Association of Chiefs of Police and pursuing a master’s degree in public administration to broaden his strategic impact.
