  hobbies: '[''drawing and coloring'', ''building wooden block structures'', ''solving jigsaw puzzles (4‑12 pieces)'', ''reading picture books'', ''collecting leaves, shells, and stones'', ''listening to
    children’s songs and zydeco music'', ''pretend play (mini art gallery, tea parties)'', ''gardening with family'', ''exploring the nearby bayou'']'
  career_goals: Even at five, Madison dreams of a future where she can blend her love of art, curiosity about the world, and love of order. She often says she wants to become a museum curator who arranges
    beautiful exhibits, an artist who creates colorful paintings, or a teacher who inspires other children to explore new ideas. Influenced by the wetlands near her home, she also imagines studying marine
    life as a marine biologist, using careful observation and systematic recordings. Her ambition is to keep spaces neat and inspiring, helping others discover creativity while maintaining a sense of structure.
