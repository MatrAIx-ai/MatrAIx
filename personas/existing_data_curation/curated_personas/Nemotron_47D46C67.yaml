personas:
  professional: Madison Cohen is a budding junior naturalist who applies their methodical, organized approach to kindergarten science projects, eagerly cataloguing pond insects and preferring quiet one‑on‑one
    explanations over group presentations.
  sports: Madison Cohen loves splashing in the community pool, cheering on the New Orleans Pelicans, and they enjoy playing on the Bayou Tadpoles Little League soccer team, preferring short, organized practices
    to large, chaotic games.
  arts: Madison Cohen delights in drawing vibrant Mardi Gras masks and dancing to the zydeco rhythms of BeauSoleil, frequently mimicking the accordion’s beat with a toy keyboard, and they collect postcards
    of local folk artists to fuel imaginative storytelling.
  travel: Madison Cohen dreams of exploring Honey Island Swamp’s boardwalks, has visited the Audubon Zoo in New Orleans and the sandy shores of Grand Isle, and they cherish family trips to Disneyland, favoring
    short, well‑planned journeys with plenty of nap breaks.
  culinary: Madison Cohen relishes homemade gumbo brimming with shrimp, buttery biscuits topped with honey, and occasional beignets, proudly helping stir the pot with a wooden spoon while arranging plates
    by color, though they can be stubborn about eating green vegetables.
  core: Madison Cohen is a meticulous little explorer who blends a vivid imagination for bayou wildlife with a tendency to worry about missing a favorite routine.
background:
  cultural: Madison grows up in Raceland, a small town in Lafourche Parish, Louisiana. Her family is part of the region’s white, Southern community, practicing a Christian faith that includes Sunday services
    and holiday celebrations. The local culture—Mardi Gras parades, zydeco and Cajun music, and community fairs—exposes her to vibrant colors, rhythms, and storytelling. The surrounding wetlands and bayous
    offer a backdrop of rich wildlife, inspiring her interest in nature and marine life. Family meals often feature Southern cuisine such as gumbo, biscuits, and fresh seafood, while traditions of hospitality
    and close‑knit neighborhood ties shape her social perspective. This blend of Southern heritage, artistic celebrations, and natural environment informs Madison’s curiosity, appreciation for art, and
    respect for order.
