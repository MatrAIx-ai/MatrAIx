personas:
  professional: Thuyduong Tran, a 12‑year‑old student, is a budding robotics hobbyist whose curiosity drives creative designs while their practical side ensures functional prototypes, and their competitive
    streak pushes them to top the inter‑school challenges.
  sports: Thuyduong Tran plays competitive badminton for the school club, sharpens footwork on weekends, follows the progress of world champion P. V. Sindhu for inspiration, and roots for the nearby baseball
    team, the Red Sox, where they cheer loudly after each match.
  arts: Thuyduong Tran creates manga‑style sketches inspired by the fantastical worlds of authors like Brandon Sanderson, layers digital illustrations in Procreate while listening to the sweeping scores
    of John Williams and the upbeat J‑pop hits of Utada Hikaru, and translates that creative energy into piano practice, which they follow via YouTube tutorials of Yiruma.
  travel: Thuyduong Tran prefers weekend hikes along nearby state park trails such as Redwood Loop, day trips to the historic lighthouse museum, and dreams of a school‑organized cultural exchange in Tokyo
    where they can tour the Ghibli Museum and sample authentic street food.
  culinary: Thuyduong Tran helps their mother simmer aromatic pho broth with star anise and ginger, experiments by swapping traditional bánh mì baguettes for sour‑dough and adding avocado slices, and also
    enjoys prepping quick ramen bowls with miso paste and soft‑boiled eggs for after‑school snacks.
  core: Thuyduong Tran is a 12‑year‑old blend of tech‑savvy builder and manga artist who competitively dominates school badminton, meticulously budgets allowance for art gear, battles seasonal allergies
    during hikes, and still finds time to secretly add extra chili to family pho for a spicy kick, showing they balance competition with creativity.
background:
  cultural: Gabrielle is a second‑generation Vietnamese‑American. Her parents emigrated from Ho Chi Minh City and maintain strong cultural ties, celebrating Tet, cooking traditional meals, and speaking
    Vietnamese at home, which has given her fluent bilingual abilities. The family values education, respect for elders, and community service, principles that guide Gabrielle's responsibilities at school
    and in volunteer work. Living in Garnerville, NY, she navigates a blend of Vietnamese traditions—such as wearing áo dài during cultural events—and mainstream American school life, fostering a hybrid
    identity that informs her worldview, creativity, and ambition.
attributes:
  skills: '[''advanced math problem solving'', ''basic coding (Scratch & introductory Python)'', ''bilingual communication (English & Vietnamese)'', ''project planning and coordination'', ''digital illustration
