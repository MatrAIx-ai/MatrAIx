  hobbies: '[''reading sci‑fi/fantasy novels'', ''digital illustration and manga drawing'', ''school robotics club'', ''playing badminton'', ''piano practice'', ''cooking Vietnamese dishes with family'',
    ''volunteering to teach basic computer skills'', ''hiking local nature trails'']'
  career_goals: Gabrielle aspires to combine her passion for technology with community impact. She dreams of becoming a software developer who designs educational apps that support multilingual learners,
    especially those navigating both English and heritage languages. Her competitive nature fuels a goal to win a national coding competition and earn a spot in a prestigious STEM high‑school program. While
    she loves exploring cutting‑edge ideas, she values proven learning methods and plans to pursue a balanced college education that merges computer science with social entrepreneurship, aiming to create
    tools that are both innovative and practically accessible to diverse communities.
