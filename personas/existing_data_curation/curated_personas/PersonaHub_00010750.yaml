persona_description: A researcher and educator who is interested in the use of information and communication technologies (ICTs) in supporting dialogue in undergraduate small-group teaching, specifically
  in the context of UK higher education. The individual has experience with the ASTER project, which has explored how ICTs can support learning in small groups, and is knowledgeable about the use of electronic
  resources to support dialogue in a variety of contexts. They are likely to have a strong background in education and learning theory, and have a particular interest in the use of ICTs to enhance the teaching
  and learning process.
