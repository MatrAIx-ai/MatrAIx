persona_description: A paleontologist who specializes in the study of Paleo-Indian artifacts, particularly those found at the B-C sediment interface. The paleontologist has a deep understanding of the isotopic
  composition of 235U and 239Pu in the artifacts and associated sediments, and has conducted extensive research on the cosmic ray bombardment of the artifacts and associated chert types. The paleontologist
  has published several papers on the topic and has presented their findings at international conferences. They are interested in the implications of their research for Late Glacial mass extinctions and
  associated plant mutations.
