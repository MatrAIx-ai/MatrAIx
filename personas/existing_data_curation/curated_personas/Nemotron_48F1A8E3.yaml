personas:
  professional: Marie Brown, a seasoned interior and exterior painter and paperhanger with a knack for low‑VOC finishes, leverages their construction arts associate degree and meticulous color theory skills
    to advise historic homeowners in Atlanta while juggling a spontaneous work schedule that often defies strict deadlines.
  sports: Marie Brown, who prefers low‑impact solo activities, tends to the garden for daily movement and walks the historic neighborhoods of Atlanta for cardio, while they cheer on the Atlanta Falcons
    on Sundays and occasionally join a local senior tennis club for friendly matches.
  arts: Marie Brown, an avid reader of historical novels and African American fiction, finds inspiration in the brushstrokes of Georgia O'Keeffe and the melodies of Miles Davis, John Coltrane, and Billie
    Holiday, and channels that creative energy into watercolor studies of color palettes, occasional church‑choir rehearsals, and volunteer mural projects at community centers.
  travel: Marie Brown favors purposeful travel that blends architectural research with relaxation, planning solo trips to preservation‑rich locales such as Savannah’s historic district, Charleston’s waterfront
    homes, and Europe’s Bruges and Bath, while they budget carefully to fund both their boutique business startup and occasional family visits to the Blue Ridge Mountains.
  culinary: Marie Brown delights in cooking with fresh herbs from their garden, regularly preparing herb‑infused shrimp and grits, low‑fat collard greens, and occasional vegan jambalaya, and while their
    culinary skill hovers between confident home‑chef and enthusiastic experimenter, they occasionally over‑season dishes in a quest for bold flavors.
  core: Marie Brown, a 52‑year‑old solitary craftsman with a curiosity‑driven love for sustainable historic restoration, balances a spontaneous work ethic with a quiet penchant for jazz, gardening, and
    mentoring future women artisans, and they often find solace in solitary creative projects.
background:
  cultural: Marie is an African‑American woman raised in a historically Black neighborhood of Atlanta, where Southern traditions, church life, and strong community ties shaped her values. Her cultural heritage
    infuses her work ethic with perseverance and a pride in craftsmanship, while the rich legacy of Black art, music, and storytelling influences her aesthetic sensibilities. She often incorporates soulful
    color schemes and respects the histories of the neighborhoods she services, and she remains connected to local cultural events, soul food gatherings, and community improvement projects.
attributes:
  skills: '["Interior painting", "Exterior painting", "Wallpaper installation", "Surface preparation", "Color consulting", "Eco‑friendly finishes", "Drywall repair", "Blueprint reading", "Customer communication",
    "Business quoting"]'
  hobbies: '["Reading", "Gardening", "Sketching", "Watercolor painting", "Jazz listening", "Documentary watching", "Church choir", "Volunteer painting"]'
  career_goals: Marie aims to earn a Master Painter certification and eventually launch her own boutique painting and paperhanging business that emphasizes sustainable, low‑VOC projects for historic homes
    in Atlanta. She wants to develop a niche in historic‑home restoration, create a portfolio of custom wall murals, and mentor apprentices—particularly women of color—sharing her blend of curiosity for
    new techniques with practical craftsmanship. Financial independence and the ability to support community art initiatives are central to her long‑term vision.
