  career_goals: Alejandro aims to progress from his current customer service representative role to a supervisory or team‑lead position within the next three to five years, where he can mentor new agents
    and shape service protocols. He plans to obtain a Certified Customer Service Professional (CCSP) credential and later explore a transition into quality assurance or training, leveraging his curiosity
    for process improvement while maintaining the flexible work environment he prefers. Long‑term, he envisions launching a small community‑focused coffee shop that showcases Puerto Rican flavors, merging
    his cultural roots with entrepreneurial ambition.
