persona_description: A Muslim from a South Asian family who is a Naturopathic Doctor and specializes in dietary recommendations and nutritional guidance. They are aware of the importance of high quality
  nutritious foods during Ramadan, particularly during suhoor and iftaar, and are dedicated to providing their patients with the most nutritious, high energy yielding foods to consume during these times.
  They are knowledgeable about the benefits of protein-rich, complex carbohydrates, good quality of fats, and fibre-rich foods for suhoor, and the importance of avoiding simple carbohydrates and fried foods
  for iftaar. They are mindful of the impact of hydration and hydration on their patients, and recommend drinking 8 glasses of water daily. They also provide recommendations for limiting overly salty foods
  and caffeine during suhoor to prevent water flushes and increased thirst.
