personas:
  professional: Arbie Gainer, a 15‑year‑old high school student and budding visual technologist, merges hand‑sketching with digital illustration and writes small interactive art‑code projects, channeling
    a quiet curiosity and meticulous organization into a growing portfolio that balances school responsibilities with solo creative experimentation.
  sports: Arbie Gainer prefers solitary jogs along Macon’s Riverside Park and occasional pick‑up basketball at the local YMCA, follows the Macon Bacon baseball team and the Atlanta Hawks for a dash of community
    spirit, and belongs to a weekend photography‑and‑hike club that doubles as light cardio.
  arts: Arbie Gainer devotes free hours to sketching cityscapes, creating digital illustrations inspired by the soulful sounds of Nina Simone, Miles Davis, and B.B. King, and studies the works of contemporary
    illustrator Lois van Buren, while regularly visiting the Tubman Museum’s virtual exhibits for fresh artistic stimulus.
  travel: Arbie Gainer favors low‑key, self‑guided road trips that combine architectural photography with quiet contemplation, having captured the historic squares of Savannah and the riverfront charm of
    Charleston, while dreaming of a solo study‑trip to Kyoto’s serene temples to photograph its traditional wooden structures.
  culinary: Arbie Gainer enjoys simple, garden‑fresh meals, often tossing home‑grown tomatoes, basil, and mozzarella into a basil‑pesto bruschetta while listening to blues, and occasionally treats themselves
    to a buttery biscuit with honey after a long drawing session, though they sometimes skip breakfast in favor of late‑night coffee.
  core: Arbie Gainer is a quietly intense teen whose solitary creativity, meticulous budgeting, and vigilant self‑care coexist with a tendency to over‑worry and occasional neglect of routine chores.
background:
  cultural: Arbie grew up in Macon, Georgia, a city steeped in African American musical and artistic heritage. His family maintains traditions rooted in church gatherings, community storytelling, and the
    celebration of local festivals such as Juneteenth. He is aware of the civil‑rights history of the region and draws inspiration from the legacy of blues legends like Otis Redding and contemporary Southern
    artists. The neighborhood’s strong sense of community, combined with the challenges faced by many Black youth in the area, has shaped his resilient outlook and his desire to use art as a bridge between
    his personal experiences and the broader cultural narrative.
attributes:
