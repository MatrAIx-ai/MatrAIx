    art projects'', ''journaling'', ''gardening'']'
  career_goals: Arbie aims to turn his passion for visual storytelling into a sustainable career. He envisions attending a specialized high‑school art program or securing a scholarship to an art institute
    where he can refine his digital design skills. Long‑term, he hopes to work as a freelance graphic designer or concept artist, creating illustrations for independent games, music album covers, or community
    mural projects. He also wants to develop an online portfolio that showcases his work and eventually mentor other young creators in his neighborhood, using art as a medium for personal expression and
    mental‑health awareness.
