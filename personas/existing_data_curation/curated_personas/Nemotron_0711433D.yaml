  career_goals: Daniel aims to turn his passion for art into a sustainable career. He plans to earn a GED within the next year and enroll in a community college graphic‑design program to formalize his self‑taught
    abilities. His long‑term ambition is to work as a freelance visual artist, producing murals, digital commissions, and branding for local streetwear brands that reflect his Mexican heritage. He also
    envisions launching a small online boutique that sells limited‑edition prints and apparel featuring his own artwork. By building a modest professional portfolio and leveraging his bilingual skills,
    Daniel hopes to secure commissions that provide both creative fulfillment and financial stability, while using his art to explore unconventional ideas and challenge mainstream aesthetics.
