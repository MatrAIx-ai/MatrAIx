  career_goals: Even though Merwyn is no longer in the formal workforce, his ambitions focus on staying active, healthy, and useful to his community. He hopes to complete a memoir that captures his years
    on the factory floor and the lessons he learned about hard work and perseverance. He aims to keep his classic car in road‑worthy condition and to pass his woodworking techniques on to his grandchildren
    through a series of hand‑crafted projects. Volunteering as a mentor for local high‑school students interested in trades, attending community events, and maintaining financial stability are also top
    priorities. A modest goal is to take a short road trip across Michigan's Upper Peninsula to visit historic sites before his health limits travel.
