personas:
  professional: Carina Ford is a maintenance technician in Cape Coral who combines meticulous preventive‑maintenance checklists with a spontaneous, people‑first approach—using their Southern‑style hospitality
    to smooth over occasional deadline slips as they troubleshoot electrical, plumbing, and HVAC issues for residential complexes.
  sports: Carina Ford’s athletic routine swings from sunrise kayak excursions with the Cape Coral Kayak Club to weekly yoga sessions at a local studio, and they root for the Tampa Bay Buccaneers in football
    and the Florida Gulf Coast Eagles in basketball, channeling that laid‑back competitive spirit into a balanced weekend fitness regimen.
  arts: Carina Ford channels her love of performance into karaoke nights where they belt out Beyoncé and Stevie Wonder, capture Gulf‑coast sunrises with a Nikon D3500 in homage to Ansel Adams, and support
    the local arts scene by attending Sarasota’s Ringling Museum exhibitions and streaming indie folk favorites like Mumford & Sons.
  travel: Carina Ford’s travel style blends meticulous day‑trip planning of Florida gems like the Keys and Everglades with spontaneous weekend getaways to the Bahamas, while they dream of a future solo
    adventure to Iceland’s volcanic coasts once their eco‑maintenance business stabilizes their finances.
  culinary: Carina Ford, a modest home‑chef, delights in grilling fresh grouper tacos with mango‑lime salsa, whipping up coconut‑lime quinoa salads, and they perfect a coffee‑infused breakfast burrito—always
    featuring locally sourced citrus, avocados, and a splash of hot sauce for that Cape Coral kick.
  core: Carina Ford balances a structured maintenance mindset with spontaneous community flair, turning every sunrise photo session, karaoke mic showdown, and eco‑friendly fix into a chance to connect,
    and they stay unusually calm, rarely sweating the small stuff.
background:
  cultural: Carina grew up in a middle‑class suburban setting in the Midwest before her family relocated to Cape Coral, where she embraced the region’s laid‑back, outdoor‑oriented lifestyle. Her cultural
    identity reflects a blend of traditional American values—hard work, practical problem‑solving, and hospitality—shaped by the coastal community’s emphasis on community service, environmental stewardship,
    and a vibrant social scene. She carries forward Southern hospitality traits such as friendliness and generosity while maintaining a pragmatic, resilient outlook.
attributes:
  skills: '[''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC maintenance'', ''Preventive maintenance scheduling'', ''Carpentry and small-construction'', ''Safety compliance and OSHA knowledge'',
    ''Team leadership and communication'', ''Equipment diagnostics'']'
  hobbies: '[''Kayaking'', ''Beach clean-ups'', ''Community yoga'', ''Karaoke and singing'', ''DIY home improvement'', ''Sunrise photography'', ''Socializing at local festivals'']'
  career_goals: Carina aims to advance from a general maintenance technician to a senior maintenance supervisor overseeing multiple residential complexes in Southwest Florida. She plans to earn certifications
    such as Certified Maintenance Manager (CMM) and explore green‑building maintenance practices. In the longer term, she hopes to launch her own eco‑focused property‑maintenance service that blends her
    technical skills with her love for community interaction.
