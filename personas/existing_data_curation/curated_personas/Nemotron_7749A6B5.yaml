personas:
  professional: Wyatt Vu is a retired handyman who transforms decades of carpentry, plumbing, and electrical know‑how into hands‑on budgeting and cooking workshops at the local senior center, and they approach
    each lesson with meticulous detail, quiet patience, and a methodical calm that reflects their organized nature.
  sports: Wyatt Vu enjoys daily walks through the Boston Public Garden, participates in a senior walking club that meets at the Boston Common, and they avidly follow the Boston Red Sox and Celtics on television,
    finding the routine both a gentle exercise and a comforting connection to community spirit.
  arts: Wyatt Vu spends evenings reading Boston‑centric historical biographies, listening to classic jazz on the Boston Symphony Orchestra’s radio program, and they attend occasional community theater performances,
    allowing the stories and music to echo their own journey and soothe their emotional intensity.
  travel: Wyatt Vu favors short day trips to historic Salem, seaside Cape Cod, and the White Mountains where a Buddhist temple sits, and they cherish these modest journeys as opportunities for quiet reflection
    and a gentle reminder of the river valleys of their youth.
  culinary: Wyatt Vu expertly prepares aromatic pho broth with star anise, ginger, and fresh basil from their garden, blends it with Boston clam chowder on occasion, and they delight family and friends
    with bánh chưng during Lunar New Year celebrations, though they sometimes over‑salt dishes in their enthusiastic pursuit of flavor.
  core: Wyatt Vu is a diligent, garden‑loving elder who balances anxiety‑driven vigilance with quiet generosity, and they channel their meticulous craftsmanship into community service and heartfelt storytelling.
background:
  cultural: Wyatt is a first‑generation American of Southeast Asian descent, born to Vietnamese parents who settled in Boston after the war. He grew up bilingual, speaking Vietnamese at home and English
    in school, and retains strong familial ties and respect for traditional customs such as Lunar New Year celebrations. While he integrates into the broader South Boston community, he maintains cultural
    practices like cooking family recipes, attending a local Buddhist temple on occasion, and sharing stories of his heritage with younger relatives. This blend of cultural pride and adaptation shapes his
    worldview, emphasizing diligence, community support, and reverence for both old and new ideas.
attributes:
  skills: '["Home maintenance (plumbing, electrical, carpentry)", "Household budgeting and financial record‑keeping", "Traditional Southeast Asian cooking", "Seasonal gardening and organic pest management",
