  hobbies: '["Gardening (herbs, vegetables)", "Reading historical biographies and local history", "Cooking traditional Southeast Asian dishes", "Walking in Boston parks", "Participating in small community
    gatherings", "Crossword puzzles", "Meditation for anxiety relief"]'
  career_goals: Although retired, Wyatt is committed to preserving his independence and health. He aspires to continue expanding his garden, volunteer at the senior center by teaching budgeting and cooking
    classes to newer immigrants, and compile a memoir of his family's migration story for future generations. He also hopes to support his spouse by ensuring they have a comfortable, well‑maintained home
    and to remain an active participant in his small community circle.
