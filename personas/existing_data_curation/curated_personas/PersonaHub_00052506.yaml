persona_description: A systems thinker who is interested in understanding the complex behavior of natural and economic systems, and in finding ways to change these systems more effectively. They are passionate
  about learning about the structure of systems and how it determines their behavior, and they are willing to put in the effort to master the key concepts of systems thinking. They are curious about how
  feedback loops and nonlinear relationships can affect system behavior, and they are open to the idea that the human mind has very limited calculation abilities. They are also interested in the idea of
  emergent behavior and how it can be counterintuitive. They are likely to be involved in discussions about environmental sustainability and the need for change, and they are open to the idea that writing
  laws and emotional appeals may not be enough to solve the problem.
