personas:
  professional: Madison Gloria, a budding junior scientist, channels curiosity and practicality into constructing LEGO rockets, conducting at‑home experiments with baking soda and vinegar, and sketching
    detailed animal and space scenes, preferring unstructured, self‑directed play over rigid schedules, and they often improvise with household items when a plan falls apart.
  sports: Madison Gloria cheers for the New York Yankees and the Golden State Warriors, belongs to the local After‑School Nature Walkers Club, and spends weekends honing gymnastics skills at the community
    center, favoring the quiet focus of individual leotard drills and solitary field walks over team sports.
  arts: Madison Gloria draws intricate scenes inspired by the whimsical illustrations of Dr. Seuss and the vibrant worlds of Hayao Miyazaki, while they unwind on a small keyboard playing simple melodies
    by Yiruma and humming tunes from Disney’s Frozen, weaving together visual and musical creativity in solitary moments.
  travel: Madison Gloria dreams of exploring the geysers of Yellowstone National Park and walking the launch pads at Kennedy Space Center, yet they also cherish short family trips to the nearby botanical
    garden where they can collect leaves and rocks in quiet corners, balancing adventurous curiosity with the comfort of familiar surroundings.
  culinary: Madison Gloria prefers bright, kid‑friendly meals such as peanut butter and jelly sandwiches, spaghetti with marinara sauce, and strawberry‑banana smoothies, and they enjoy helping bake chocolate
    chip cookies by sprinkling extra chips when no one is looking, showing a budding interest in simple kitchen tasks despite limited cooking experience.
  core: Madison Gloria is a solitary 7‑year‑old who blends scientific curiosity with a love for creative building, often forgetting chores for LEGO projects, quietly hoarding extra chocolate chips, and
    they navigate a relaxed, slightly disorganized world with a gentle assertiveness.
background:
  cultural: Madison grows up in Tonganoxie, Kansas, a small Midwestern town with a close‑knit community. Her family traces its roots to German and Irish ancestry, and they value a practical work ethic,
    independence, and community involvement. Local traditions include county fairs, library story hours, and outdoor recreation on the plains, shaping her calm, self‑reliant outlook.
