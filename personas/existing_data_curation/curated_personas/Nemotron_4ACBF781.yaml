  hobbies: '[''Basketball (amateur league)'', ''Hunting and fishing'', ''4-H club mentorship'', ''Woodworking'', ''Home brewing'', ''Drone piloting for recreation'', ''Community gardening'', ''Listening
    to classic rock'']'
  career_goals: George aims to transition his operation toward regenerative organic production while scaling acreage through strategic land acquisition. He plans to integrate IoT and AI tools to boost yields,
    lower input costs, and improve sustainability. Within five years he hopes to launch a community‑supported agriculture (CSA) program, become a regional speaker on sustainable agri‑tech, and eventually
    consult for other farms seeking to modernize.
