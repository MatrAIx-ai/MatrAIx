personas:
  professional: Juan Stites, a 30‑year‑old kitchen supervisor, orchestrates a high‑volume restaurant floor with a data‑driven eye for efficiency, balancing relentless cost‑cutting experiments and strict
    food‑safety standards while their laid‑back, slightly chaotic scheduling style reflects a competitive yet practical mindset aimed at regional culinary management and a future neighborhood bistro.
  sports: Juan Stites, a devoted Detroit sports fan, roots for the Pistons and Lions while regularly joining pickup basketball games at Southfield’s community center, streams Tigers games on weekends, and
    maintains a casual membership with the local amateur basketball league, reflecting their energetic, sociable streak.
  arts: Juan Stites, an avid classic‑rock enthusiast, jam‑sessions on electric guitar inspired by Led Zeppelin and Jimi Hendrix, cycles through The Rolling Stones and Fleetwood Mac on repeat, and attends
    the annual Detroit Blues Festival, channeling their critical, skeptical ear into lively debates on music trends in online forums.
  travel: Juan Stites, a 30‑year‑old weekend explorer, has road‑tripped to Chicago’s deep‑dish pizzerias, soaked up New Orleans’ jazz and cuisine, dreamed of tasting tapas in Barcelona and street ramen
    in Tokyo, and strategically plans each trip around work shifts and limited budget, blending their adventurous curiosity with a practical, flexible travel style.
  culinary: Juan Stites, a home‑cooking experimenter, fuses Midwestern comfort staples like mac & cheese with miso butter and kimchi, drizzles harissa over fried chicken, tops sourdough pizza with smoked
    paprika, jalapeños and feta, and debates food‑science podcasts while meticulously measuring prep efficiency, reflecting their skeptical yet curious culinary approach.
  core: Juan Stites is a competitively curious kitchen supervisor who balances data‑driven efficiency with a laid‑back, socially‑charged lifestyle, juggling stress‑prone perfectionism, spontaneous home‑cooking
    experiments, and a tendency to procrastinate on both paperwork and personal health.
background:
  cultural: Juan was born and raised in Southfield, Michigan, a culturally diverse suburb of Detroit. His family traces its roots to German and Irish immigrants who settled in the Midwest in the early 20th
    century. Growing up in a middle-class household, he attended a local public high school where he was exposed to the city’s rich culinary mosaic—from Polish pierogis at community festivals to Middle
    Eastern street foods in nearby neighborhoods. He embraces Midwestern values of hard work, community involvement, and modesty, regularly participating in neighborhood block parties, the annual Michigan
    State Fair, and local charity events, while remaining open to new cultural experiences through food and music.
attributes:
  skills: '[''ServSafe food safety certification'', ''Team leadership and staff training'', ''Inventory management and cost control'', ''Menu development and recipe experimentation'', ''Quality assurance
    and sanitation'', ''Scheduling and shift coordination'', ''Equipment troubleshooting'', ''Customer service and complaint resolution'', ''Basic bookkeeping'', ''Conflict resolution'']'
  hobbies: '[''Pickup basketball'', ''Visiting local breweries and social gatherings'', ''Home cooking and fusion recipe experimentation'', ''Listening to food-science podcasts'', ''Debating culinary trends
    online'', ''Playing electric guitar'', ''Hiking the Detroit Riverwalk'', ''Attending live music shows'', ''Journaling'', ''Watching classic rock concerts'']'
  career_goals: Juan aims to progress from supervising a single kitchen to a regional culinary management position within the next five years. He plans to earn an advanced culinary arts certification and
    develop expertise in menu engineering and sustainable kitchen practices. Ultimately, he aspires to open his own neighborhood bistro that blends innovative dishes with reliable, efficient operations.
    His competitive drive pushes him to reduce food waste and boost profitability, while his desire for flexibility motivates him to create a work environment that balances structure with the autonomy he
    values. He also seeks a more predictable schedule to mitigate the stress that arises from unpredictable shifts.
