    and maintenance", "Reading biographies of African American leaders", "Church attendance and community volunteering"]'
  career_goals: After several years out of formal employment, Willie aims to re‑enter the workforce by earning an HVAC certification through a community‑college night program, aligning with his interest
    in technical, predictable systems. He also plans to launch a modest handyman business that can be scheduled flexibly to accommodate family commitments. Long‑term, he hopes to become a trusted service
    provider within his South Side neighborhood, offering reliable repairs and workshops for younger residents. He aspires to expand his mentorship role by partnering with local youth centers, providing
    practical trade skills and life guidance. Financially, his goal is to achieve a stable income that secures his family's future while preserving room for community contributions.
