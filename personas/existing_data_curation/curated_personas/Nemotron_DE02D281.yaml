personas:
  professional: Rita Colesanti, a retired community organizer, leverages their decades‑long expertise in event planning, budgeting, and senior caregiving to lead intergenerational workshops and serve as
    a senior liaison to the Sheboygan County council, blending meticulous organization with a flexible, people‑first mindset.
  sports: Rita Colesanti maintains fitness through gentle walks along the Lake Michigan shoreline and joins the local Sheboygan Seniors on the Move walking club, which occasionally participates in the Milwaukee
    Brewers charity run, preferring low‑impact activities over competitive sports, and they cherish the social camaraderie these outings provide.
  arts: Rita Colesanti enriches their social life by singing in the church choir, acting in community theater productions of classics like 'Our Town', knitting intricate lace patterns while listening to
    opera recordings of Maria Callas and folk tunes by Woody Guthrie, and discussing historical fiction by Ken Follett with their book club, a routine that fuels their creative spirit.
  travel: Rita Colesanti prefers short, well‑planned road trips to nearby Door County in summer and cultural pilgrimages to the historic vineyards of Tuscany, blending their curiosity for new places with
    a cautious budget that respects their fixed retirement income, and they often map each journey meticulously before setting off.
  culinary: Rita Colesanti delights in baking rustic breads such as sourdough and focaccia, whisking aromatic rosemary and orange zest into pastries like cannoli, while modestly experimenting with grilled
    salmon seasoned with dill, though they often overindulge in sweet treats during weekly neighborhood potlucks, a habit that reflects both generosity and a modest lack of restraint.
  core: Rita Colesanti blends a compassionate, community‑driven spirit with practical organization, yet they battle frequent worry‑induced overthinking and a habit of splurging on garden and baking supplies.
background:
  cultural: Rita comes from a mixed Midwestern American and Italian heritage. Her family emigrated from Italy to Wisconsin in the early 20th century, settling in a farming community where Catholic traditions
    and close‑knit neighborhood bonds were central. Growing up in Plymouth, she absorbed the values of hard work, self‑reliance, and community service typical of the region while preserving Italian culinary
    customs handed down through generations. Her cultural identity blends the warmth of Italian family gatherings with the pragmatic, neighborly spirit of small‑town Wisconsin, shaping her compassionate,
    cooperative, and socially engaged outlook.
