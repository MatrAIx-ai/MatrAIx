  hobbies: '[''Reading (historical & literary)'', ''Birdwatching'', ''Gardening (native plants)'', ''Woodworking'', ''Photography (landscape)'', ''Coastal Hiking'', ''Book Club Participation'', ''Volunteer
    Work at Senior Center'', ''Acoustic Guitar Playing'', ''Cooking'', ''Community Theater Attendance'', ''Genealogy Research'']'
  career_goals: Although retired, Anthony aims to lead a community oral‑history project that records the stories of local fishermen and neighboring Indigenous peoples, develop a sustainable garden at the
    senior center, and mentor younger volunteers in program planning. He hopes to publish a memoir about life on the Oregon coast, become a certified neighborhood mediator, and curate rotating exhibits
    for the county historical society.
