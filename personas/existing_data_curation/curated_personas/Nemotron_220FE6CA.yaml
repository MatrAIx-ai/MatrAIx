personas:
  professional: Domingo Shearin, an aspiring mini engineer, channels early curiosity into methodical block‑building sessions where they meticulously arrange each piece, reflecting a balance of practical
    problem‑solving and creative exploration even at one year old.
  sports: Domingo Shearin, a budding participant in toddler gymnastics at the community center, delights in crawling races and gentle swings at the local playground while cheering for the Harbor Hawks baseball
    team, and they maintain a steady, methodical approach to each new movement despite occasional frustration when a climb feels too high.
  arts: Domingo Shearin, an avid listener of lullabies by Raffi and the gentle classical pieces of Mozart, mirrors the soft rhythms in finger‑painting sessions with non‑toxic paints, allowing their practical
    curiosity to shape early artistic expression, and they often hum along, though they become irritable when the music stops abruptly.
  travel: Domingo Shearin, who has taken short trips to grandparents’ countryside farm and a nearby island ferry ride, prefers brief, well‑planned outings over long journeys, balancing excitement for new
    sights with a need for familiar routines, and they sometimes protest when a car ride extends beyond their nap schedule.
  culinary: Domingo Shearin, a fan of smooth pureed carrots, mashed bananas, and occasional avocado toast bites, shows early culinary preferences for soft textures and mild flavors, often requesting the
    same staple foods while meticulously turning the spoon clockwise before eating, though they can become temperamental if the meal is delayed.
  core: Domingo Shearin, a methodical one‑year‑old with fierce curiosity, balances organized routines and practical play with occasional bouts of worry and crankiness, making them a tiny, determined explorer
    of the world.
background:
  cultural: Domingo is a white child raised in Orem, Utah, within a family that reflects the cultural fabric of the Intermountain West. His family’s heritage includes roots among early Utah settlers and
    is strongly influenced by the Church of Jesus Christ of Latter‑day Saints, emphasizing community, family cohesion, modesty, and service. Community life often revolves around church gatherings, youth
    activities, and outdoor recreation such as hiking, skiing, and park outings. Local traditions like Pioneer Day and regional harvest festivals are celebrated, and the family observes mainstream American
    holidays with a focus on family togetherness. This cultural environment supports Domingo’s emerging traits of reliability, practicality, and a balanced approach to social interaction.
