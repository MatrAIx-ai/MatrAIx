  hobbies: '[''Tango dancing'', ''Classical and folk music listening'', ''Art gallery visits'', ''Reading (theology, philosophy, business)'', ''Photography'', ''Gardening'', ''Cooking Argentine cuisine'',
    ''Beach walking'', ''Reflective journaling'', ''Community theater volunteering'']'
  career_goals: Eloy aims to expand his congregation’s impact by establishing a network of Hispanic ministries across South Florida, creating a sustainable community-service hub that integrates business
    principles with ministry. He plans to author a guide on effective church management rooted in both theological insight and entrepreneurial strategy, mentor a new generation of clergy, and develop a
    cultural arts center that celebrates Argentine and broader Latin American heritage while fostering interfaith dialogue. Long‑term, he envisions a model of financially resilient, culturally inclusive
    congregations that serve both spiritual and socio‑economic needs of their members.
