  hobbies: '["Soccer","Basketball","Hiking","Fishing","Cooking Mexican dishes","Volunteering at community festivals","Listening to regional Mexican music","Playing guitar","Car tuning"]'
  career_goals: Mauricio aims to become a certified lead installer within the next three years, obtaining OSHA 30‑hour certification and a state‑approved contractor’s license. He plans to advance to a foreman
    role, overseeing a crew and handling larger commercial projects. In the longer term, he aspires to start his own general‑contracting business focused on residential remodeling in the Central Valley,
    leveraging his practical expertise and strong community ties. To support these goals, he intends to complete his GED, attend a trade school for advanced framing and project management, and build a network
    of reliable subcontractors.
