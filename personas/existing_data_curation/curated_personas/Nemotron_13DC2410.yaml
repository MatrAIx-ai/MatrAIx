personas:
  professional: Ashley Paige, a seasoned facilities manager turned strategic campus planner, leverages over a decade of hands‑on maintenance expertise and a graduate education in learning design to orchestrate
    sustainable, technology‑enabled instructional spaces, applying meticulous budgeting, vendor negotiation, and team leadership while championing collaborative solutions and mentoring emerging talent.
  sports: Ashley Paige fuels her love for movement by hiking the Stone Mountain trails with the local Hiking Club, joining a weekend ultimate Frisbee league in the summer, and cheering passionately for
    the Atlanta Falcons, Hawks, and Braves during the football, basketball, and baseball seasons.
  arts: Ashley Paige immerses herself in Atlanta’s vibrant arts scene, grooving to Missy Elliott’s hip‑hop beats, savoring live gospel performances by the New Birth Gospel Choir, and attending jazz nights
    featuring Wynton Marsalis at the Fox Theatre, experiences that fuel her community tutoring and garden creativity.
  travel: Ashley Paige prefers meticulously planned weekend getaways that blend outdoor adventure with cultural immersion, such as hiking the Blue Ridge Parkway, exploring historic Savannah, savoring Creole
    cuisine in New Orleans, and dreaming of a sustainable eco‑tour in Costa Rica’s Monteverde cloud forest.
  culinary: Ashley Paige’s palate gravitates toward Southern comfort with a modern twist—she perfects shrimp‑and‑grits seasoned with smoked paprika, crafts quinoa‑beet salads drizzled with citrus vinaigrette,
    experiments with heirloom tomatoes, fresh basil, and locally sourced okra in her balcony garden, and enjoys occasional farm‑to‑table tasting menus at Ponce City Market.
  core: Ashley Paige is a structured, community‑driven facilities strategist who channels her energetic love of dance, gardening, and mentorship into sustainable campus innovations, while balancing disciplined
    budgeting, occasional health‑check procrastination, and a habit of popping up at the best local jazz gigs.
background:
  cultural: Growing up in Atlanta’s vibrant Black community, Ashley was shaped by the city’s legacy of civil‑rights activism, church fellowship, and intergenerational storytelling. Family gatherings centered
    around soul‑food cooking, gospel music, and community service instilled in her a strong sense of resilience, collective responsibility, and celebration of Black heritage. These cultural roots influence
    her warm, outgoing demeanor and her commitment to fostering inclusive spaces—whether in the workplace, community events, or the educational environments she supports. She actively participates in local
    Black business networks and mentors younger professionals, honoring the tradition of uplifting the next generation.
