    Solving'']'
  hobbies: '[''Hip-hop and Social Dancing'', ''Gospel and Jazz Concerts'', ''After-school Tutoring Volunteering'', ''Exploring Atlanta’s Culinary Scene'', ''Balcony Gardening'', ''Hiking at Stone Mountain'',
    ''Reading Black Nonfiction and Leadership Books'']'
  career_goals: Ashley aims to advance to a senior director role overseeing facilities operations for a major educational institution or healthcare system in the Southeast, where she can integrate her expertise
    in education with large-scale facility strategy. She plans to earn LEED Accredited Professional and PMP certifications, champion campus-wide green building initiatives, and build a mentorship pipeline
    for emerging Black women in facilities management. Long-term, she envisions launching a consulting practice that helps community schools create safe, sustainable, and technology-enabled learning environments.
