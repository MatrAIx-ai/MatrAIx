  career_goals: Marcia aims to transition into a lead engineering role where she can shape development processes and mentor junior developers. She aspires to become a software architect specializing in
    building reliable, secure, and accessible systems for regulated industries such as finance or healthcare, leveraging her humanities background to embed ethical considerations into technology. Over the
    next five years she plans to earn an AWS Solutions Architect Associate certification and complete a part‑time Master’s in Computer Science, positioning herself for senior leadership while maintaining
    a balanced work‑life schedule that mitigates stress. She also hopes to contribute to open‑source projects that promote accessibility standards.
