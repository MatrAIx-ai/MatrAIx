  career_goals: She dreams of becoming an educator or community artist who can inspire other children to explore their imagination while fostering cultural pride. In the long term, she hopes to study visual
    communication or social work at university, creating programs that blend art, storytelling, and advocacy to support underrepresented youth and promote environmental stewardship.
