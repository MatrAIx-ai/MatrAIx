personas:
  professional: An aspiring digital comic artist, Corin Santos channels their vivid imagination into weekly webcomics, leveraging their skill with a tablet and natural organizational flair to meet school
    project deadlines while collaborating with friends on creative storyboards.
  sports: A passionate midfielder on the San Diego Soccer Club's U‑14 team, Corin Santos thrives on the camaraderie of weekend matches, follows the San Diego Loyal SC for inspiration, and supplements play
    with after‑school conditioning drills at the local community center.
  arts: A dedicated reader of epic fantasy novels and admirer of creators like Hayao Miyazaki and Alex Ross, Corin Santos spends afternoons sketching characters inspired by their favorite books, and attends
    monthly comic‑book meet‑ups where they discuss story arcs and color theory.
  travel: With a backpack full of sketchbooks, Corin Santos enjoys day trips to the coastal cliffs of La Jolla for sunrise studies, dreams of trekking the Inca Trail to Machu Picchu, and plans a future
    exchange program with a partner school in Kyoto to explore Japanese gardens.
  culinary: When not drawing, Corin Santos eagerly helps in the kitchen, mastering the art of seasoning tender pork for tacos al pastor, perfecting salsa verde with fresh tomatillos, and experimenting with
    a pinch of chocolate in mole sauce, all while proudly serving the family’s favorite homemade churros.
  core: Corin Santos blends boundless imagination with a community‑first spirit, juggling comic creations, soccer drills, and family cooking, all while occasionally losing track of homework in a swirl of
    sketch‑filled afternoons.
background:
  cultural: Corin is raised in a Mexican‑American household in Santee, California. She grew up speaking both Spanish and English, celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings centered around homemade tamales and mole. Her parents emphasize the importance of community, respect, and cultural pride, which she expresses through her art and involvement in local Hispanic
    festivals. Living in the diverse San Diego County, she blends her Mexican heritage with the broader Californian multicultural environment, fostering a bicultural identity that informs her worldview
    and aspirations.
