  career_goals: Although retired, Vivian remains eager to learn and give back. She hopes to complete an online art-history course and attend exhibitions at nearby museums such as the Cincinnati Art Museum.
    She plans to document oral histories of longtime residents in Shreve, compiling their stories into a community archive. Vivian also wishes to teach quilting and crocheting workshops at the local senior
    center, sharing her techniques with younger participants. Writing a memoir that intertwines family recipes, gardening tips, and personal reflections is another ambition. Finally, she dreams of traveling
    to a weekend art retreat in the Midwest to explore new mediums like pottery while continuing to attend local theater productions and small cultural festivals.
