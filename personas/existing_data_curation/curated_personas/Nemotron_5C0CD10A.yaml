  hobbies: '[''Car tinkering and mechanical repair'', ''Strategic video gaming'', ''Cooking Mexican cuisine'', ''Watching soccer (Liga MX, Mexican national team)'', ''Hiking local Hill Country trails'',
    ''Reading technology news and articles'', ''Attending community cultural events (e.g., Día de los Muertos)'', ''Listening to regional Mexican music'']'
  career_goals: Manuel aims to secure a stable, well‑paid position in the automotive sector by earning an ASE certification and completing a community‑college automotive technology program. He also aspires
    to launch a small mobile mechanic service that allows him to work on his own schedule, giving him the flexibility he values. Parallelly, he is interested in turning his culinary flair into a modest
    catering side‑business, focusing on authentic Mexican street foods for local events. Over the next five years, he hopes to combine these ventures, establishing a reputation for reliable, practical solutions
    while building a modest but resilient income stream.
