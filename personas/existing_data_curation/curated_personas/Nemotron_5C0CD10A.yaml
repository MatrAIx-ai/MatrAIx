personas:
  professional: Manuel Zabaleta, a 29‑year‑old aspiring mobile mechanic with a talent for hands‑on automotive repair and a strategic mindset sharpened by competitive video gaming, channels curiosity into
    practical problem‑solving while working toward ASE certification and building a weekend‑only mobile service.
  sports: Manuel Zabaleta, a 29‑year‑old soccer enthusiast who chews on the excitement of Liga MX, roots for Club América, never misses a Mexico national team match, hosts weekly watch parties for friends,
    plays pickup games at a local park, and stays fit by hiking the Hill Country trails and occasionally signing up for a local amateur league.
  arts: Manuel Zabaleta, a 29‑year‑old who blends love for traditional music and modern digital culture, regularly streams the corridos of Los Tigres del Norte, the ballads of José Alfredo Jiménez, and
    the chiptune soundtrack of The Legend of Zelda, participates actively in Día de los Muertos parades where he helps design floats, and visits local murals by artist José Garza for visual inspiration.
  travel: Manuel Zabaleta, a 29‑year‑old who favors low‑key, road‑trip style getaways, spends weekends hiking Garner State Park or exploring Austin’s food truck scene, uses a spare set of wrenches as travel
    companions for impromptu fixes, dreams of a spring trip to Oaxaca to taste regional mole, and relies on budget‑friendly apps like Hostelworld to keep accommodations inexpensive.
  culinary: Manuel Zabaleta, a 29‑year‑old pragmatic home chef who frequently prepares tacos al pastor, elote with cotija cheese, and a bright salsa verde made from tomatillos, jalapeños, and cilantro,
    experiments with smoked chipotle mayo for a twist, and balances late‑night gaming snacks with careful portion control using a trusty cast‑iron skillet.
  core: Manuel Zabaleta, a 29‑year‑old hands‑on tinkerer with a competitive gaming streak, relaxed planning habits, and a habit of swapping car parts for fresh salsa recipes, blends curiosity and practicality
    into a life driven by DIY solutions, spontaneous road trips, and a constant tug‑of‑war between late‑night gaming and early‑morning hikes.
background:
  cultural: Manuel comes from a Mexican‑American family rooted in the traditions of central Mexico, with parents who migrated to Texas before his birth. Spanish is spoken at home, and he is fluent in English,
    navigating both cultures daily. Catholicism and community celebrations—such as Día de los Muertos, Cinco de Mayo, and fiestas patronales—are central to his upbringing, and he often takes part in local
    parades and family gatherings. The culinary heritage of his household, featuring dishes like tacos al pastor, mole, and homemade salsas, shaped his love for cooking. Living in San Antonio, he blends
    Mexican customs with Texan influences, enjoying the vibrant bicultural scene, from mariachi music in the River Walk to the regional Tex‑Mex fusion cuisine. His identity is a fusion of Mexican heritage
    and Southwest American life, informing his values of family, resilience, and pride in his cultural roots.
attributes:
  skills: '[''Bilingual Spanish/English communication'', ''Automotive maintenance and basic repair'', ''DIY home improvement'', ''Computer troubleshooting and software installation'', ''Traditional Mexican
