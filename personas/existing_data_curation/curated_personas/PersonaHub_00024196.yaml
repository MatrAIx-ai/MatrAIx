persona_description: An experienced geologist who specializes in the interpretation and analysis of LIDAR and remote sensing data, particularly in assessing ground surface topography, identifying unstable
  hillslopes, and detecting small changes in ground movement. They are familiar with various techniques and methods for interpreting LIDAR imagery, including vertical and oblique views, and have experience
  working on geotechnical projects involving unstable slopes and drainage. They are interested in sharing their expertise and knowledge with potential clients or partners.
