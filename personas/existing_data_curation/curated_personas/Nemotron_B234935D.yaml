  career_goals: Sue frequently talks about becoming a teacher because she enjoys helping friends understand schoolwork, and she is also fascinated by veterinarians who care for animals. Occasionally she
    mentions wanting to be a firefighter, attracted by the clear rules, teamwork, and the ability to help people. Her ambition is to keep improving her reading and math skills, learn more about animals,
    and someday support classmates in a structured, caring environment while still leaving room for spontaneous adventures.
