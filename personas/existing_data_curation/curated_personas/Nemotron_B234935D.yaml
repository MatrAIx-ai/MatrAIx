personas:
  professional: Sue Kang, a budding young architect, builds intricate LEGO houses and vehicles by following step‑by‑step guides while occasionally veering into spontaneous play, and they blend a practical,
    detail‑oriented focus with bursts of imaginative teacher‑role‑play that hint at early leadership and organizational instincts.
  sports: Sue Kang darts around the neighborhood on a red tricycle, participates in the Rainbow Sprouts U‑5 soccer club on Saturdays, and cheers enthusiastically for the New York Yankees during family TV
    nights, reflecting a blend of active outdoor play and youthful fandom.
  arts: Sue Kang colors animals in vibrant sketches inspired by Eric Carle’s bold collages, sings along to The Wiggles while practicing simple piano melodies, and reenacts favorite scenes from Disney’s
    Frozen starring Idina Menzel during playtime, weaving a lively artistic identity.
  travel: Sue Kang prefers short, family‑guided excursions like weekend visits to the local zoo or beach, dreams of a future trip to Disneyland in California, and imagines exploring the dinosaur exhibit
    at the Natural History Museum in Washington, D.C., balancing a love of imaginative travel with practical, low‑stress outings.
  culinary: Sue Kang delights in peanut butter‑and‑jelly sandwiches, loves chicken nuggets with ketchup, helps stir pancake batter with cinnamon and blueberries, and often adds carrot sticks with hummus
    to meals, showcasing a simple yet adventurous palate for kid‑friendly flavors.
  core: Sue Kang, a meticulous little builder who balances structured LEGO creations with bursts of imaginative play, navigates childhood anxieties with caution, and turns everyday moments into colorful
    adventures.
background:
  cultural: Sue lives in Davison, a suburban community in Genesee County, Michigan, where the local culture emphasizes friendliness, modesty, and community involvement. Her family participates in neighborhood
    events, church gatherings, and school activities such as the fall fair and holiday concerts. She attends a public elementary school that offers diverse extracurriculars and celebrates cultural awareness
    days. Growing up in the Midwest, Sue values education, teamwork, and a balance between personal independence and community responsibility, while also being exposed to broader cultural experiences through
    family trips and school programs.
