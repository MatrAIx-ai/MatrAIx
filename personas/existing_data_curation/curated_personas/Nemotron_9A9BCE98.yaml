personas:
  professional: Adalina Perez, a seasoned B2B sales leader in South Florida, leverages fluency in Spanish and English, data‑driven process improvements, and a hands‑on coaching style to mentor junior reps
    while navigating fast‑changing sales tech, all while letting her relaxed, sometimes disorganized approach keep the team’s atmosphere flexible and collaborative.
  sports: Adalina Perez stays active by attending weekly salsa and cumbia nights at the Little Havana community center, occasionally jogging along South Beach during winter, and cheering on the Miami Heat
    and Miami Marlins, while occasionally playing friendly co‑ed soccer with the Coral Gables Youth Club.
  arts: Adalina Perez immerses herself in the arts by devouring mystery novels from Agatha Christie and Gillian Flynn, dancing to the timeless salsa of Celia Cruz, attending the Adrienne Arsht Center for
    Broadway shows like "The Lion King," and collecting vibrant paintings by local Miami street artist Jose Ortega.
  travel: Adalina Perez enjoys spontaneous weekend getaways to the Florida Keys and culturally immersive trips to Oaxaca and Yucatán, while dreaming of a future Mediterranean cruise that will let her explore
    Barcelona’s markets and Sicily’s street food, always balancing her love for family time with a flexible, budget‑conscious itinerary.
  culinary: Adalina Perez, an avid home chef, blends her garden‑grown chilies, oregano, and fresh cilantro to master traditional mole negro, cochinita pibil, and tlayudas, constantly tweaking recipes with
    achiote paste and epazote, and she proudly hosts family feasts where her culinary experiments become the centerpiece of the gathering.
  core: Adalina Perez thrives on the lively rhythm of community dance floors, the challenge of mentoring sales teams, and the perfect balance of structured data and spontaneous culinary experiments, even
    if her inbox is a perpetual mess and she occasionally forgets to water her beloved chili plants.
background:
  cultural: Adalina was raised in a close‑knit Mexican family that celebrated traditions such as Día de los Muertos, quinceañeras, and weekly family meals featuring homemade tamales and pozole. Growing
    up in the vibrant multicultural environment of Homestead, Florida, she blends her Mexican heritage with the diverse influences of South Florida's Latino community. Her bilingual fluency and deep appreciation
    for Mexican culinary arts, music, and dance shape her identity, while her experiences as a divorced mother have fostered resilience and a strong sense of independence. She maintains strong ties to her
    extended family in Mexico, often traveling to visit relatives and bringing back cultural practices that enrich her community involvement in Miami‑Dade County.
attributes:
  skills: '[''Team leadership'', ''B2B sales strategy'', ''Client relationship management'', ''Conflict resolution'', ''Cross‑cultural communication'', ''Process improvement'', ''Data‑driven decision‑making'',
    ''Coaching and mentorship'', ''CRM (Salesforce) proficiency'', ''Spanish‑English bilingual'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Salsa and cumbia dancing'', ''Community volunteering'', ''Gardening (chilies, herbs, tropical fruit)'', ''Reading mystery novels'', ''Attending cultural festivals'',
    ''Beach walks with friends'', ''Exploring Latin music'']'
  career_goals: Adalina aims to advance to a regional sales manager role within the next three to five years, where she can design and implement a mentorship program that supports the growth of emerging
    sales talent. She also hopes to champion inclusive workplace practices that reflect her compassionate values, ensuring her team feels heard and supported. Long‑term, she envisions launching a consulting
    boutique that helps small businesses in South Florida develop effective sales strategies while maintaining a flexible, people‑first culture. Balancing ambition with her desire for flexibility, she seeks
    opportunities that allow her to continue learning new sales techniques without sacrificing personal time for family and community involvement.
