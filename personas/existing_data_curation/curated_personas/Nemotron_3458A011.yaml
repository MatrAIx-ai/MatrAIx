personas:
  professional: Marty Francis, a one-year-old, demonstrates an early love for order by meticulously arranging shape sorters and building blocks into color‑coded rows, hinting at a future talent for systematic
    design or engineering.
  sports: Marty Francis, a one-year-old, attends a parent‑and‑baby gymnastics class at the local community center, loves crawling through the soft foam tunnel, and at home watches the New York Knicks on
    TV, cheering enthusiastically when the ball goes through the hoop.
  arts: Marty Francis, a one-year-old, enjoys the soothing melodies of Raffi's 'Baby Beluga' and is captivated by the vibrant illustrations in The Very Hungry Caterpillar, often reaching for the book during
    quiet time.
  travel: Marty Francis, a one-year-old, has traveled to grandparents' farm in Vermont in a stroller and dreams of a future trip to the beaches of Maui, preferring itineraries that include plenty of nap
    time and familiar lullabies.
  culinary: Marty Francis, a one-year-old, favors smooth pureed sweet potatoes and banana mash, delights in smearing peas on their cheeks, yet exhibits the occasional picky episode by refusing broccoli.
  core: Marty Francis, a one-year-old, blends calm resilience with a love for order, turning everyday routines into miniature projects while navigating baby life with predictable charm and occasional food‑smeared
    giggles.
background:
  cultural: Marty comes from a white, Midwestern American background in Saginaw, Michigan. His family’s cultural environment emphasizes community, modesty, and a strong sense of routine, with holidays such
