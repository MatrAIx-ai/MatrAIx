persona_description: A public health advocate and expert on HIV/AIDS, with a focus on the intersection of the two diseases. They are knowledgeable about the challenges faced by people living with HIV in
  sub-Saharan Africa, the importance of prioritizing immunocompromised populations for COVID-19 vaccines, and the potential benefits of leveraging HIV response capacities to fight COVID-19. They are also
  familiar with the role of civil society, government, and the private sector in global public health response, and have experience with scientific innovation and community empowerment in the fight against
  AIDS.
