  hobbies: '[''Cycling'', ''Hiking'', ''Chess'', ''Cooking & Wine Pairing'', ''FinTech Meet‑ups'', ''Mindfulness Meditation'', ''Yoga'', ''Reading Non‑fiction (Finance, History, Science)'']'
  career_goals: Edgar aims to advance to a chief financial officer (CFO) role within the next five years, directing the company's financial strategy toward sustainable and data‑driven growth. He wants to
    lead a finance transformation that integrates proven financial controls with innovative fintech tools, positioning the organization at the forefront of industry change. Additionally, he seeks to mentor
    emerging finance talent, fostering a culture of pragmatic curiosity, and to publish thought‑leadership articles on balancing risk and opportunity in volatile markets. Balancing ambition with his sensitivity
    to stress, Edgar also hopes to design a work structure that offers flexibility and delegated responsibilities to maintain personal well‑being.
