  hobbies: '[''Hiking the Teton Range'', ''Wildlife photography'', ''Birdwatching'', ''Fly fishing'', ''Reading historical biographies'', ''Classical literature reading'', ''Journaling'', ''Playing acoustic
    guitar'', ''Volunteering at the local library'']'
  career_goals: Peter aspires to advance to a senior leadership role, such as Compliance Director, where he can shape organizational governance and mentor junior staff. He plans to obtain a Certified Compliance
    and Ethics Professional (CCEP) credential to deepen his expertise. Long‑term, he hopes to establish a boutique consulting practice that assists small businesses in the Jackson area with environmental
    and regulatory compliance, allowing him to maintain a balanced, routine‑oriented lifestyle while contributing to his community's economic stability.
