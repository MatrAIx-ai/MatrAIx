persona_description: A business analyst who specializes in trade statistics, particularly the methods and practices used to measure and report trade transactions between countries. They are skilled in analyzing
  and interpreting trade data, and are familiar with the complexities of the international trade system and its impact on economic growth and development. They are interested in understanding how trade
  statistics are manipulated to justify trade policies and to support the interests of certain industries or countries. They are also interested in the implications of trade statistics on poverty and inequality,
  and in the potential for trade to promote economic growth and development.
