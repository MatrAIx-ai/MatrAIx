  hobbies: '["Sketching and drawing", "Watercolor painting", "Mixed-media collage", "Reading graphic novels and fantasy books", "Scratch coding for animations and games", "Listening to hip-hop, R&B and
    gospel music", "Dancing and informal choreography", "Participating in community art club and mural projects", "Building LEGO sets", "Exploring Bronx street art", "Playing Minecraft", "Writing short
    poems", "Journaling and therapeutic drawing"]'
  career_goals: Roslin dreams of turning her love of imagination and art into a career that lets her share stories with the world. She envisions herself as a children's book illustrator or an animated filmmaker
    who blends vivid visuals with heartfelt narratives. She also hopes to use her creativity to give back to her community, perhaps by leading after-school art workshops or creating large mural projects
    in the Bronx that celebrate local culture and foster togetherness. In the long term she sees herself as a multimedia storyteller who can combine drawing, music, and simple animation to inspire other
    kids to express themselves and to bring a sense of harmony to the neighborhoods she cares about.
