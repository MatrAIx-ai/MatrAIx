personas:
  professional: Roslin Lee is an aspiring multimedia creator who blends sketching, watercolors, and Scratch coding into whimsical stories, thriving in collaborative art club projects while often battling
    the urge to over‑think deadlines and a cluttered sketchbook that mirrors their bustling imagination.
  sports: Roslin Lee dabbles in after‑school soccer with the Bronx Youth Soccer League in the spring, joins a weekend basketball pick‑up team at the community center that cheers for the Brooklyn Nets, and
    they channel their boundless energy into spontaneous dance‑offs during school assemblies, favoring fun over structured workouts.
  arts: Roslin Lee immerses themselves in the world of graphic storytelling, sketching characters inspired by the bold street murals of Basquiat and the narrative depth of Neil Gaiman’s Sandman, while they
    vibe to the rhythmic beats of Kendrick Lamar and the soulful harmonies of Beyoncé during mural‑painting sessions at the local art club.
  travel: Roslin Lee’s travel diary, filled with crayon‑drawn sketches of the Bronx Zoo and Coney Island, also features a yearning to explore the neon streets of Tokyo and the magical realms of Disney World,
    preferring spontaneous family road trips that blend museum visits with street‑art scouting missions, and they eagerly sketch each new locale in their notebook.
  culinary: Roslin Lee’s palate swings between the comforting embrace of cheesy mac and cheese and the bold zest of tacos al pastor, while they proudly whip up avocado toast and strawberry‑topped cupcakes
    with Mom, craving the crunch of fresh carrots and the smoothness of melted chocolate.
  core: Roslin Lee is a wildly imaginative ten‑year‑old who sketches entire universes in a battered notebook, ditches deadlines for day‑dreams, and they find calm in doodles when worries loom large.
background:
  cultural: Roslin is an African-American girl growing up in the Bronx, a borough rich in cultural diversity and artistic expression. Her family's traditions blend church-based gospel singing, celebratory
    gatherings for holidays like Juneteenth, and occasional Caribbean influences from relatives who bring foods such as plantains and spices to family meals. The neighborhood's vibrant street art, hip-hop
    beats, and block parties have shaped her sense of rhythm and visual style. Community centers and after-school programs provide her with safe spaces to explore art, music and storytelling, reinforcing
    a strong sense of belonging and a desire to give back to the same community that nurtured her imagination.
attributes:
  skills: '["Visual arts (drawing, painting, collage)", "Block-based programming (Scratch)", "Creative storytelling and writing", "Collaborative group work and peer mediation", "Musical rhythm and informal
