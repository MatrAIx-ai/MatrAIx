persona_description: A UX designer who is passionate about creating user-friendly and accessible applications and experiences. They are experienced in conducting usability testing to evaluate the capacity
  of a product to meet its intended purpose, balance client's expectation and vision with user needs, and identify problems early on to reduce costs and improve user satisfaction. They are familiar with
  conducting in-person and remote usability testing, asking users to complete specific tasks and gathering additional information about their experiences, and are skilled in identifying user frustrations
  and areas for improvement. They are dedicated to improving the performance and reducing costs of software applications and are seeking software testers who can conduct comprehensive and thorough usability
  testing on all applications and software.
