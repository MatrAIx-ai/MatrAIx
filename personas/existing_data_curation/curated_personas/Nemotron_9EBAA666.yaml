personas:
  professional: Elijah Sims, a 33‑year‑old certified fitness trainer in Cleveland, fuses functional movement science with urban art and choreography, designing meticulously periodized, music‑driven classes
    that reflect their imaginative, organized, and socially vibrant approach to holistic wellness.
  sports: Elijah Sims cycles with the Cuyahoga Valley Bike Club, plays pick‑up basketball at the Cleveland Community Center while cheering the Browns and Cavaliers, and mentors youth soccer through the
    Cleveland Metro Soccer Club, blending personal fitness with community engagement.
  arts: Elijah Sims curates eclectic playlists featuring Miles Davis, Kendrick Lamar, and The Bad Plus, sketches murals inspired by Jean‑Michel Basquiat and Cleveland artist Tasha Laurence during gallery
    tours, and occasionally DJs community events, weaving visual and auditory art into every movement class.
  travel: Elijah Sims balances meticulous itineraries with spontaneous detours, having biked the French Alps, explored Berlin’s street‑art scene, dreamed of a wellness retreat in Bali’s rice terraces, and
    routinely escapes to the nearby Cuyahoga Valley for weekend bike rides, all while budgeting around their upcoming studio launch.
  culinary: Elijah Sims, a confident home chef, blends Southern comfort such as shrimp‑and‑grits with miso glaze and collard greens sautéed with kimchi, seasoning dishes with smoked paprika, sumac, and
    fresh herbs to create nutrient‑dense meals that fuel both their workouts and creative pursuits.
  core: Elijah Sims channels a restless imagination into kinetic art, obsessively curating playlists before every class, yet often wrestles with late‑night worry that fuels midnight snack runs of fried
    plantains and extra episodes of speculative fiction.
background:
  cultural: Elijah grew up in a close‑knit African‑American family in Cleveland’s Buckeye‑Shaker neighborhood, where church, music, and community activism were daily touchstones. His grandparents were part
    of the Great Migration, carrying stories of resilience that shape his worldview. He draws inspiration from the city’s rich Black cultural tapestry—gospel choirs, soul and hip‑hop rhythms, and the legacy
    of civil‑rights leaders who advocated for health equity. This heritage fuels his commitment to narrowing fitness and wellness gaps in Black communities, and he honors traditions through cooking family
    recipes, celebrating Juneteenth, and participating in local cultural festivals.
