    fitness (video editing, social media)'']'
  hobbies: '[''Urban art gallery visits'', ''Street photography'', ''DJing and music curation'', ''Reading speculative fiction and philosophy'', ''Creative writing'', ''Cooking healthy meals with Southern
    & global influences'', ''Meditation and yoga'', ''Mentoring youth sports programs'', ''Bicycle commuting and city rides'', ''Participating in local dance workshops'']'
  career_goals: Elijah aims to open a boutique fitness studio in Cleveland that serves as a hub for holistic wellness, blending strength training, creative movement, and mental‑health support. He plans
    to earn a Certified Strength and Conditioning Specialist (CSCS) credential and complete a bachelor’s degree in kinesiology to deepen his scientific grounding. Long‑term, he envisions leading city‑wide
    health initiatives that address fitness disparities in underserved Black neighborhoods, developing a curriculum that combines stress‑relief techniques with evidence‑based exercise. He also wants to
    scale an online platform featuring his signature “movement‑art” classes and to mentor emerging trainers from diverse backgrounds.
