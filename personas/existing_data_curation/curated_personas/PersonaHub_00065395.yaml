persona_description: 'A petroleum geologist who specializes in structural trapping, specifically the types of traps found in the subsurface and their significance to the hydrocarbon industry. They have
  a strong understanding of tectonic, diapiric, gravitational, and compactional processes that form structural traps and can identify the three basic forms of structural traps: anticlines, faults, and salt
  domes. They are also familiar with the Schlumberger oilfield glossary and have a background in basin analysis and exploration seismology. They are likely to be knowledgeable about the importance of structural
  trapping in petroleum geology and have a keen interest in understanding the various types of traps and their formation mechanisms.'
