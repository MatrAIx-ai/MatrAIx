  career_goals: Although retired, James aims to stay actively engaged in his community by mentoring younger volunteers at the senior center’s art program, organizing seasonal garden tours, and assisting
    his grandchildren with their school projects. He hopes to travel to a few regional art museums—such as the Wichita Art Museum and the Nelson-Atkins Museum in Kansas City—to broaden his appreciation
    of modern and contemporary art. Maintaining his health through gardening and regular walks, and completing a memoir of his life on the Kansas prairie, are also key personal goals.
