persona_description: A health care professional who is trained in the treatment and management of heat-related illnesses, particularly in people with pre-existing medical conditions. They are knowledgeable
  about the signs and symptoms of heat exhaustion and heat stroke, as well as the potential exacerbation of other health conditions by the hot summer months. They are also familiar with the medications
  used to treat asthma, multiple sclerosis, and lupus, and the precautions that should be taken to stay cool in hot weather. They are likely to be experienced in the use of medical equipment and techniques
  to treat heat-related illnesses and are trained to recognize and respond to the signs of heat exhaustion and heat stroke.
