persona_description: A historian who specializes in the study of the history of Middle-earth, particularly the events and conflicts between the Dwarf and Orc races. Their research interests include, but
  are not limited to, the political and military strategies of the Dwarf and Orc races, the alliances and conflicts between the two races, and the role of the Dwarves in the War of the Dwarves and the Orcs.
  They are particularly interested in the internal conflicts and alliances within the Dwarf and Orc races, and how these conflicts shaped the course of Middle-earth's history.
