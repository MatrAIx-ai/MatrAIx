  career_goals: Approaching the end of her formal career, Nora aims to transition into a part‑time consultancy role where she can advise small businesses and non‑profits on sound budgeting and financial
    health. She wishes to mentor younger colleagues within her organization, passing on her decades‑long practical knowledge. Additionally, she plans to develop a community‑focused financial literacy program
    for seniors, establish a modest scholarship fund for high‑school students interested in finance, and finalize a comprehensive estate plan that secures her family’s future while supporting charitable
    causes.
