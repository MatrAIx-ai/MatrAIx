personas:
  professional: Marc Trent is an eager junior inventor who spends his afternoons tinkering with LEGO robotics and Pinewood Derby cars, channeling his curiosity and practical mindset into building functional
    prototypes while favoring spontaneous brainstorming over strict project plans.
  sports: Marc Trent dominates local flag football tournaments with the Spruce Creek Warriors, swings a left‑handed bat for the Midtown Little League baseball team, and joins the neighborhood soccer club’s
    Saturday morning matches, cheering loudly for the New York Yankees, Dallas Cowboys, and LA Galaxy while always packing a water bottle and a lucky pinecone for good luck.
  arts: Marc Trent channels his rhythm into drumming sessions where he idolizes Travis Barker and the band Imagine Dragons, while his LEGO fantasies are inspired by the cinematic worlds of Marvel’s Spider‑Man
    and the whimsical storytelling of Pixar’s Toy Story, and he often sketches comic panels of his video game battles for fun.
  travel: Marc Trent loves weekend road trips to nearby state parks like Shenandoah National Park for fishing and creek exploration, dreams of a summer vacation at Disney World in Orlando, and hopes to
    someday trek the ancient ruins of Machu Picchu after school, planning his trips with a hand‑drawn map and an ever‑growing list of stickers.
  culinary: Marc Trent prefers bold flavors, often building his own nachos with shredded cheddar, jalapeños, and seasoned ground beef, while experimenting with homemade pizza dough topped with pepperoni
    and pineapple, and he proudly claims his signature snack is a peanut‑butter‑banana smoothie blended with a splash of oat milk.
  core: Marc Trent is a high‑energy, curiosity‑driven ten‑year‑old who blends competitive spirit with hands‑on creativity, juggling sports, video games, and LEGO projects while occasionally slipping into
    disorganized habits and a skeptical streak toward others.
background:
  cultural: Marc comes from a white Southern family in Valdosta, Georgia, where community, family gatherings, and Saturday football are central cultural touchstones. His parents are active in the local
    church and encourage participation in community events such as youth sports leagues and church youth groups. The region’s warm climate and proximity to rural landscapes give him a practical appreciation
    for outdoor activities like fishing, hiking, and hands‑on projects. Southern hospitality and a strong sense of local identity shape his values of teamwork, perseverance, and modesty, while his exposure
    to diverse school peers adds a broader perspective to his worldview.
attributes:
  skills: '["LEGO engineering and basic robotics", "Scratch visual programming", "team football and baseball skills", "effective peer communication and group organization", "basic bike maintenance and tool
    use"]'
  hobbies: '["Playing football and baseball with friends", "Competitive video gaming (Fortnite, Minecraft)", "LEGO building and Pinewood Derby car construction", "Exploring local nature trails and fishing",
    "Reading adventure and science books", "Learning basic drumming"]'
  career_goals: Marc dreams of turning his competitive spirit and love of sports into a future where he either plays varsity football or baseball at the high‑school level and earns a scholarship, or designs
    the equipment athletes use. He is fascinated by how gear works, so he hopes to study mechanical engineering or product design, focusing on creating safer, more efficient sports equipment. In the short
    term, he plans to join a summer coding camp to deepen his Scratch skills, enter the school science fair, and attend youth football clinics to improve his athletic performance. Ultimately, he sees himself
    as a coach or mentor for younger kids, sharing his practical know‑how and competitive drive.
