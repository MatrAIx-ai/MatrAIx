  career_goals: William aims to earn a Master of Science in Nursing with a specialization in nursing informatics, positioning himself for a future role as a nurse manager or clinical informatics specialist.
    He aspires to lead interdisciplinary projects that integrate technology, evidence‑based practice, and art‑based therapeutic interventions to enhance patient well‑being. Over the next five years, he
    plans to develop community health education programs, mentor junior nurses, and eventually help establish a regional health‑and‑wellness center that offers both medical care and creative wellness services.
