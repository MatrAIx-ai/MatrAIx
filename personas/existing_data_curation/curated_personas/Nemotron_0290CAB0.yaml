  career_goals: Jonathon aims to obtain AWS Certified Welder and Certified Welding Inspector credentials within the next two years, positioning himself for a supervisory role in a specialty metal fabrication
    shop. He envisions launching a small studio that creates bespoke metal art installations for local galleries and public spaces, integrating his humanities background with his trade expertise. Long‑term,
    he hopes to mentor apprentices, lead process‑improvement initiatives, and develop a niche business that balances steady industrial work with artistic commissions, all while maintaining the financial
    stability needed to support his solo lifestyle.
