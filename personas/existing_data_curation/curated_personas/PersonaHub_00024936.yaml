persona_description: 'A history enthusiast who is interested in ancient civilizations, archaeology, and prehistoric history. They are particularly interested in the Neolithic village of Skara Brae, the
  Chauvet-Pont d''Arc Cave, and the EuroDocs: History of Prehistoric and Ancient Europe project. They are also interested in the British Museum''s Collection Online, the Fordham''s Internet Ancient History
  Sourcebook, and the History Reference Center. They are knowledgeable about the history of literature, language, philosophy, archaeology, classical studies, folklore, gender studies, performing arts, history,
  religion, and theology.'
