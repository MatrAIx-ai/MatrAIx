persona_description: A historian who specializes in the study of the American Civil War and its aftermath, particularly the role of prisons and juvenile detention centers in shaping societal attitudes towards
  crime and punishment. Her research interests include, but are not limited to, the impact of the war on the prison system, the evolution of juvenile justice policies, and the role of mental health in prison
  settings. She is particularly interested in the experiences of children and adults who were incarcerated during the 1800s and how they were treated in prison. Her work has been published in academic journals
  and has contributed to the understanding of the history of prisons in the United States.
