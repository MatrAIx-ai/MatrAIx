personas:
  professional: Donald Vandenbroek, an aspiring preschool organizer, meticulously lines up crayons by hue before drawing and leads group games with clear rules, reflecting a preference for structure and
    a competitive spirit.
  sports: Donald Vandenbroek, a lively member of the Little Lions soccer club and a devoted follower of the Seattle Sounders, dashes across the field, loves scoring the winning goal and thrives on the camaraderie
    of weekly practice, blending sociable teamwork with a competitive spirit.
  arts: Donald Vandenbroek, an enthusiastic fan of Disney classics and Sesame Street, sings loudly along to songs from 'Frozen' and 'The Lion King', fills sketchbooks with superhero drawings inspired by
    Spider‑Man, and proudly collects Kidz Bop CDs, channeling energetic creativity into daily play.
  travel: Donald Vandenbroek, an adventurous four‑year‑old who has already visited the San Diego Zoo, splashed at the sandy beaches of Myrtle Beach, and enjoys weekend trips to Grandma’s countryside farm
    where they chase butterflies, prefers short family‑guided trips over long solo journeys.
  culinary: Donald Vandenbroek, a selective eater who adores buttery mac & cheese, honey‑drizzled toast, chicken nuggets with ketchup, and arranges peas into neat rows on the plate, balances comfort food
    cravings with a desire for organized meals.
  core: Donald Vandenbroek blends a love for structured play, energetic socializing, and careful coin counting with a tendency to worry over minor health bumps and fiercely compete over every sandbox treasure.
background:
  cultural: Donald is raised in a middle‑class, white family in Vernon Hills, Illinois, an affluent suburb of Chicago. His family observes typical Midwestern American traditions, celebrating holidays such
    as Thanksgiving, Halloween, and Christmas, and often participates in community events at local parks and the public library. He attends a local preschool that emphasizes routine, group cooperation,
    and early literacy, and his household values punctuality, responsibility, and organized play. Although his ancestry includes European roots (e.g., German and Dutch), his daily life reflects contemporary
    American suburban culture.
