  hobbies: '["building Duplo towers", "crayon drawing", "Simon Says", "musical chairs", "tag", "reading picture books about firefighters", "preschool music and movement classes", "playing at the local park"]'
  career_goals: Even at four, Donald dreams of a future where he can keep things orderly and help others. He often talks about becoming a firefighter because he likes the clear routines, teamwork, and the
    chance to protect his community. He also imagines himself as a soccer team captain, where he can lead a group, follow a game plan, and compete to win. These aspirations reflect his love for structure,
    responsibility, and competition.
