persona_description: A senior executive in the global plastics industry who is passionate about innovation and sustainability, and is interested in driving systemic change through the redesign of the plastics
  system. They are focused on the challenge of designing better packaging, increasing recycling rates, and introducing new models for making better use of packaging. They are aware of the need for fundamental
  redesign and innovation to move the segment forward and are committed to supporting the Ellen MacArthur Foundation and IDEO in their efforts to promote circular design thinking and systems perspectives.
  They are also interested in Unilever's commitment to reducing the weight of packaging and increasing its use of recycled plastic content, and are eager to see how the company's efforts will contribute
  to the wider movement towards a circular economy.
