personas:
  professional: Anna Campbell is a network and computer systems administrator who leverages a blend of business acumen and hands‑on networking expertise—proficient in configuring routers, firewalls, and
    monitoring tools like SolarWinds—while they translate complex technical issues into user‑friendly language with a compassionate, patient demeanor, even as their relaxed approach to planning sometimes
    leads to last‑minute scramble, fueling their drive to advance toward senior engineering and IT management roles within a supportive, mentally‑wellness‑focused culture.
  sports: Anna Campbell stays active by paddling the local bayous with the Baton Rouge Kayak Club on warm weekends, hitting the gym for high‑intensity interval training during the off‑season, cheering on
    the LSU Tigers football team and the New Orleans Saints on game days, and they occasionally join a community softball league that meets each spring.
  arts: Anna Campbell fuels their creative spirit by diving into contemporary novels by Sally Rooney and Ocean Vuong, attending cozy live‑music nights that showcase zydeco legend Beau Jocque and modern
    jazz virtuoso Kamasi Washington, and they unwind with indie puzzle‑network games such as Factorio and The Witness, all of which shape a vibrant, eclectic artistic palate.
  travel: Anna Campbell prefers spontaneous weekend getaways over rigid itineraries, often traveling by car to nearby gems like the Great Smoky Mountains for hiking, exploring the historic streets of New
    Orleans for jazz and cuisine, and they dream of a future road trip through the Pacific Northwest’s lush rainforests, all while balancing a modest student budget and limited time between work and volunteering.
  culinary: Anna Campbell enjoys cooking at an intermediate level, frequently whipping up hearty jambalaya, rich gumbo with okra, and spicy crawfish étouffée for friends, using fresh local ingredients like
    Andouille sausage and shrimp, while they also appreciate the occasional bite of beignets and Po' boy sandwiches from local eateries.
  core: Anna Campbell blends technical savvy with a compassionate heart, navigating the tension between their spontaneous, slightly disorganized lifestyle and a deep desire for stability, all while they
    channel intense emotions into creative pursuits like photography and music.
background:
  cultural: Anna was born and raised in Baton Rouge, Louisiana, within a family of middle‑class white Southern upbringing. Her cultural background blends traditional Southern values—such as hospitality,
    community involvement, and a relaxed pace of life—with the diverse, multicultural fabric of the city. Growing up she was exposed to Louisiana’s culinary traditions like gumbo and crawfish boils, the
    region’s musical heritage of jazz and zydeco, and the importance of church and family gatherings. These influences shape her compassionate and cooperative demeanor, her love for communal events, and
    her willingness to support others in both personal and professional settings.
attributes:
  skills: '[''Network Troubleshooting'', ''Server Administration (Windows/Linux)'', ''Firewall Configuration'', ''Virtualization (VMware/Hyper‑V)'', ''Cloud Services (AWS EC2, Azure)'', ''System Monitoring
    (SolarWinds, Nagios)'', ''Backup & Disaster Recovery'', ''IT Help Desk Support'', ''Technical Documentation'', ''Project Coordination'', ''Budgeting & Vendor Management'', ''User Training & Support'']'
  hobbies: '[''Kayaking in bayous'', ''Landscape photography'', ''Reading contemporary fiction'', ''Self‑improvement literature'', ''Volunteer computer tutoring'', ''Attending live zydeco/jazz shows'',
    ''Cooking Cajun dishes with friends'', ''Playing indie puzzle‑based video games'']'
  career_goals: Anna aims to leverage her hybrid expertise in business and IT to progress from her current role as a network/computer systems administrator to a senior network engineer and eventually an
    IT manager or director of technology services. She wishes to lead projects that improve the reliability and security of her organization’s infrastructure, while also championing initiatives that bring
    digital literacy resources to under‑served communities in Baton Rouge. She aspires to obtain certifications such as Cisco CCNP, CompTIA Security+, and eventually a Certified Information Systems Security
    Professional (CISSP) to deepen her technical credentials. Because she values flexibility and a supportive environment, she hopes to work in a company culture that emphasizes mental‑wellness, mentorship,
    and collaborative problem solving.
