  career_goals: Approaching retirement, Brandon aims to shift from full‑time field work to a consulting and mentorship role, helping younger contractors adopt sustainable roofing practices and modern safety
    standards. He plans to develop a short‑course curriculum for a local community college, leveraging his partial college background. Additionally, he aspires to author a guidebook that blends practical
    roofing knowledge with insights on integrating artistic design elements into building exteriors, preserving his love for art while leaving a lasting professional legacy.
