  hobbies: '[''Karaoke'', ''Community Theater (Improv)'', ''Volleyball'', ''Hiking in Bidwell Park'', ''Landscape Photography'', ''Cooking Classes'', ''Animal Shelter Volunteering'', ''Mentoring Community
