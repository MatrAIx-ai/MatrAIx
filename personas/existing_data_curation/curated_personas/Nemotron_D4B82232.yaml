  career_goals: Tamara aims to complete a bachelor’s degree in Business Administration or Communications within the next two years, building upon her associate’s background. She seeks a full‑time role in
    community outreach or event management where she can apply her structured planning abilities and sociable demeanor. In the medium term, she envisions moving into a supervisory position overseeing regional
    nonprofit programs, aspiring to lead teams that design and execute community‑focused initiatives. Long‑term, Tamara hopes to earn a professional certification in project management, enabling her to
    drive large‑scale projects while maintaining the balance of reliability and flexibility that defines her work style.
