personas:
  professional: Roney Johnston, a 40‑year‑old police supervisor, combines his strong background in strategic budgeting and crime analytics with an easygoing, personable approach to leadership, championing
    a community‑policing model that balances procedural rigor with his natural tendency to prioritize relationships over strict schedules, even as he sometimes lets paperwork pile up while dreaming of the
    captain’s badge.
  sports: Roney Johnston is a loyal fan of the LSU Tigers football squad and the New Orleans Saints, never misses the local high school Friday night game, plays pickup basketball at the town recreation
    center every weekend, and belongs to the Bayou Anglers fishing club and Riverbend Outdoors hunting group, proudly wearing his team caps while reeling in bass in the nearby bayous.
  arts: Roney Johnston immerses himself in the region’s musical traditions, dancing to Zydeco legends like Buckwheat Zydeco, humming classic country hits by George Strait, and blasting The Rolling Stones
    on his patrol cruiser, while also attending Mardi Gras parades as a float rider and devouring true‑crime novels by Ann Rule and leadership titles by John C. Maxwell during downtime.
  travel: Roney Johnston favors road‑trip adventures that blend relaxed fishing outings with cultural stops, having spent Mardi Gras reveling in New Orleans, a weekend biking through Savannah’s historic
    district, a family hike in the Great Smoky Mountains, and a rugged hunting expedition in the Texas Hill Country, and he dreams of a guided salmon‑fishing lodge in Canada, though tight family budgets
    keep the plan tentative.
  culinary: Roney Johnston is a proficient home‑cook who regularly prepares bayou‑style gumbo with Andouille sausage, shrimp étouffée, jambalaya, and slow‑smoked pork ribs, seasoning with filé powder, cayenne
    and smoked paprika, and he often organizes weekend BBQs for friends and church families, always pairing the feast with a locally brewed craft beer and occasionally overspending on premium seafood when
    a big catch beckons.
  core: Roney Johnston is a data‑savvy police leader who’s as at home charting crime trends as he is battling misplaced paperwork, hunting at dawn, and a never‑ending craving for smoky ribs, all while quietly
    wrestling with a healthy dose of worry.
background:
  cultural: Roney grew up in Hammond, a small town in Tangipahoa Parish, steeped in Southern hospitality and a blend of Anglo‑American and Cajun cultural influences. Raised in a white, middle‑class family
    with Protestant (Baptist) roots, he was taught the value of community service, family loyalty, and respect for tradition. Local customs such as outdoor fishing, church gatherings, Mardi Gras celebrations,
    and a love of Southern cuisine shaped his worldview, while his business education added a forward‑looking, pragmatic perspective.
