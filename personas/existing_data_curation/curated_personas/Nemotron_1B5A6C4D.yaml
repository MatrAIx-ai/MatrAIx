  hobbies: '[''Fishing'', ''Hunting'', ''Playing Basketball'', ''Attending High School Football Games'', ''Cooking Cajun/Creole Food'', ''Listening to Zydeco and Country Music'', ''Volunteering at Church
    Charity Events'', ''Participating in Mardi Gras Festivals'', ''Reading True Crime and Business Books'', ''Barbecue Grilling'']'
  career_goals: Roney aims to rise to the rank of police captain and eventually become the chief of the Hammond Police Department. He wants to implement a department‑wide community‑policing model that emphasizes
    officer wellness, data‑driven deployment, and stronger partnerships with local businesses and civic groups. He also plans to earn a master's degree in criminal justice administration and to lead a regional
    task force focused on drug‑related offenses and youth outreach.
