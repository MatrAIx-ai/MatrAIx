persona_description: A scientist studying the impacts of icebergs on marine ecosystems, particularly in the context of the Weddell-Scotia Confluence region. Dr. Mark Brandon, the oceanographer presenting
  his research at the AGU Fall Meeting, has been studying the physical properties of water, the presence of plankton, and the impact of icebergs on the local marine environment. His research is focused
  on understanding the effects of icebergs on the structure of the water column and the changes in currents, which can have significant impacts on the local marine ecosystem.
