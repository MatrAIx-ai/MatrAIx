  hobbies: '[''truck maintenance and customization'', ''hiking in Santa Monica Mountains'', ''cooking Mexican cuisine'', ''listening to regional Mexican and Latin pop music'', ''building model kits'', ''role‑playing
    video games'', ''volunteering at local food bank'']'
  career_goals: Renan aims to move up from a laborer role to a supervisory position within the next three years, targeting a shift supervisor or lead coordinator role in a logistics warehouse. He plans
    to obtain formal certifications such as a Certified Forklift Operator and OSHA Trainer, and is exploring a two‑year associate degree in supply chain management to broaden his strategic understanding
    of logistics. Long‑term, he envisions starting his own small moving and delivery service that leverages his hands‑on expertise and community connections, while maintaining a work‑life balance that respects
    his preference for flexibility and modest structure.
