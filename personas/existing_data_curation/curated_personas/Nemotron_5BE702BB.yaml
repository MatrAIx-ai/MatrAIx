    ''Creative problem solving'', ''User training and onboarding'', ''Cross‑platform communication'']'
  hobbies: '[''Contemporary art museum visits'', ''Street‑art tours'', ''Improv comedy workshops'', ''Live music festivals'', ''Hackathons and maker‑space projects'', ''Arduino/Raspberry Pi interactive
    art installations'', ''Digital illustration and 3D modeling'', ''Virtual‑reality exploration'', ''Yoga and mindfulness meditation'', ''Board‑game and trivia nights'']'
  career_goals: Kimberly aims to transition from frontline support to a senior technical role that blends leadership, innovation, and user experience. In the next three to five years she plans to earn CompTIA
    Security+, Cisco CCNA, and a UX design certification, positioning herself for a technical support team lead or solutions architect position at a forward‑thinking tech startup. She is drawn to opportunities
    that let her prototype novel support tools—such as AI‑driven ticket triage or interactive troubleshooting dashboards—and to collaborate on interdisciplinary projects that merge technology with art,
    like immersive AR installations. Flexibility and creative autonomy are core to her ideal career path, and she seeks environments that value curiosity and continuous learning.
