personas:
  professional: Sophia Strong leverages their hands‑on expertise in concrete formwork, carpentry, and blueprint interpretation with a disciplined, organized approach to climb from laborer to foreman and
    eventually to project manager, aiming to launch a women‑owned, eco‑friendly housing firm in the Chicago suburbs while mentoring under‑represented workers.
  sports: Sophia Strong channels their competitive energy into kickboxing classes at FitBox and community dance workshops at Dance Fusion Studio, follows the Chicago Bulls and Chicago Blackhawks, and hits
    the trails of Starved Rock State Park on weekends to maintain fitness and decompress from site pressures.
  arts: Sophia Strong immerses themselves in R&B and hip‑hop, citing H.E.R., Kendrick Lamar, and gospel legend Kirk Franklin as soundtrack staples while attending live shows at the House of Blues and visiting
    the Art Institute of Chicago for occasional inspiration, often sketching building facades during their downtime.
  travel: Sophia Strong prefers purpose‑driven travel, planning weekend getaways to sustainable architecture tours in Portland and hiking adventures at Asheville’s Blue Ridge Mountains, while budgeting
    carefully to save for a future trip to the Netherlands to study passive‑house designs.
  culinary: Sophia Strong loves reimagining family recipes like collard greens with quinoa and baked mac and cheese with smoked Gouda, often harvesting herbs from their rooftop garden to add fresh basil
    and cilantro to dishes, and enjoys experimenting with plant‑based protein in their weekly meal prep.
  core: Sophia Strong is a disciplined, competitive builder who balances relentless work ambition with a love for high‑energy fitness, soulful music, and sustainable cooking, even as anxiety and a perfectionist
    streak keep them constantly tweaking every aspect of their life.
background:
  cultural: Sophia is an African American woman raised in the Midwest, where she blends the rich cultural traditions of her heritage—music, storytelling, strong family and church ties—with the pragmatic,
    community‑focused values of suburban Illinois. Her upbringing emphasized resilience, collective support, and a deep respect for hard work, shaping her disciplined approach to both career and personal
    life. She stays connected to her roots through participation in local cultural festivals, sharing and preserving African American culinary traditions, and maintaining close relationships with extended
    family and neighborhood networks.
attributes:
  skills: '[''Blueprint Reading'', ''Concrete Formwork'', ''Carpentry'', ''Operating Heavy Machinery (e.g., backhoes, skid steers)'', ''Construction Site Safety Management'', ''Project Scheduling and Coordination'',
