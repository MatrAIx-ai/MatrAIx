  hobbies: '[''Kickboxing'', ''Community Dance Workshops'', ''Volunteer Youth Mentorship'', ''Cooking'', ''DIY Home Projects'', ''Reading Architecture and Design Magazines'', ''Listening to Music (R&B,
    Hip Hop, Gospel)'', ''Attending Local Cultural Festivals'', ''Hiking'', ''Gardening'']'
  career_goals: Sophia aims to leverage her curiosity and disciplined work ethic to advance from laborer to foreman within the next three years, eventually moving into project management. She plans to obtain
    OSHA certification, complete a Certified Construction Manager (CCM) program, and gain experience supervising multi‑disciplinary crews. Her long‑term ambition is to start a small, women‑owned construction
    firm specializing in affordable, eco‑friendly housing in the Chicago suburbs, where she can mentor other under‑represented workers and champion innovative building solutions.
