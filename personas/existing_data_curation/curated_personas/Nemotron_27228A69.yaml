personas:
  professional: Belen Gomez is a data analyst turned sustainability consultant for a New Jersey nonprofit, leveraging Python, GIS, and bilingual communication to translate complex environmental data into
    actionable community programs while balancing meticulous organization with adaptable problem‑solving.
  sports: Belen Gomez enjoys weekend hikes at Watchung and South Mountain Reservations, is a member of the local Watchung Trail Crew, follows the New York Knicks and New Jersey Devils, and participates
    in a community recreation soccer league each spring, balancing low‑impact outdoor activity with team sports.
  arts: Belen Gomez immerses themselves in Latin music by listening to artists like Bad Bunny and Celia Cruz, captures nature through photography inspired by Ansel Adams, and attends quarterly performances
    at the New Brunswick Cultural Center, where they often discuss the cultural narratives behind each piece.
  travel: Belen Gomez prefers purposeful travel that mixes adventure and cultural immersion, having trekked the Andean trails in Peru, explored the vibrant markets of Medellín, and planned a future road
    trip along the Canadian Rockies, always mapping routes with GIS tools to optimize sustainability.
  culinary: Belen Gomez enjoys cooking authentic baleadas and sopa de mondongo, skillfully blending plantains, refried beans, cheese, and beef tripe with fresh cilantro and lime, while also seeking out
    farm‑to‑table restaurants that feature seasonal heirloom tomatoes and grilled corn on the cob.
  core: Belen Gomez blends a curiosity for data and community impact with a penchant for mindful hiking, yoga, and occasional worry‑driven over‑planning, making them a diligent yet self‑critical planner
    of both spreadsheets and life.
background:
  cultural: Belen grew up in a Honduran immigrant family where Spanish was spoken at home and community gatherings centered around food, music, and shared traditions. Celebrations such as Día de los Niños
    and Semana Santa reinforced a sense of belonging and collective responsibility. The strong family ties and emphasis on education she experienced inspired her pursuit of a STEM degree. Now residing in
    West Orange, NJ, she blends her Central American heritage with the multicultural environment of the Greater New York area, participating in local Latino festivals, supporting neighborhood cultural events,
    and maintaining bilingual communication in both personal and professional settings.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Statistical modeling'', ''GIS and spatial analysis'', ''Laboratory techniques (spectroscopy, chromatography)'', ''Project management'', ''Technical writing'',
    ''Bilingual communication (English/Spanish)'', ''Community outreach program development'', ''Problem solving and critical thinking'', ''Advanced Excel and reporting'']'
  hobbies: '[''Reading popular science'', ''Hiking in local nature reserves'', ''Cooking traditional Honduran dishes'', ''Volunteering to teach STEM to youth'', ''Practicing yoga'', ''Journaling'', ''Nature
    photography'', ''Attending Latin music and cultural events'']'
  career_goals: Belen is eager to transition back into the workforce in a role that blends her analytical strengths with her passion for community impact. She aims to secure a position as a data analyst
    or sustainability consultant for a nonprofit or municipal agency that serves immigrant and underserved populations in New Jersey. Over the next three years she plans to earn professional certifications
    in data science and GIS, and to develop a portfolio of projects that demonstrate how data-driven insights can improve public health and environmental outcomes. Her longer‑term ambition is to lead or
    launch an initiative that provides STEM mentorship and career pathways for Hispanic youth, combining her technical expertise with her collaborative, caring nature.
