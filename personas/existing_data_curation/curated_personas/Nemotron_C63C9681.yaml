  hobbies: '[''Hiking'', ''Cycling'', ''Organic Gardening'', ''Reading Non‑Fiction (Leadership, Healthcare Policy, Sustainability)'', ''Book Club Participation'', ''Yoga'', ''Mindfulness Meditation'', ''Volunteering
    at Community Health Fairs'', ''Photography'']'
  career_goals: Jamie aims to advance to a regional director position within the health system, overseeing multiple facilities across Clark County and surrounding areas. She plans to spearhead the implementation
    of integrated care models that improve patient outcomes while reducing operational costs. To strengthen her leadership credentials, she intends to pursue a Master of Health Administration and obtain
    the Fellow of the American College of Healthcare Executives credential. Jamie is also committed to mentoring emerging health managers, promoting a culture of resilience and well‑being, and contributing
    to state‑level health policy discussions that address access and equity. Ultimately, she seeks to leave a lasting impact on the regional healthcare landscape by aligning innovative practices with the
    community's needs.
