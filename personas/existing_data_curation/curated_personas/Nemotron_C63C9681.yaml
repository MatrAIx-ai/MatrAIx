personas:
  professional: An experienced health services manager, Jamie Swindell blends Lean Six Sigma expertise, Epic EHR proficiency, and data‑driven quality improvement to streamline operations while asserting
    compassionate patient care, a blend that mirrors their organized, methodical nature and occasional worry about outcomes.
  sports: An avid outdoor enthusiast, Jamie Swindell cycles the Columbia River waterfront in summer, hikes Battle Ground Lake State Park year‑round, cheers for the Seattle Seahawks and Seattle Sounders
    FC, and belongs to a local cycling club that meets bi‑weekly, embodying their organized, disciplined approach to fitness and community connection.
  arts: A devoted amateur photographer, Jamie Swindell captures seasonal Cascades vistas, draws inspiration from Ansel Adams and local painter Mary Ringo, attends occasional Seattle Symphony performances,
    and reads the New Yorker for literary essays, reflecting their curiosity and desire for creative balance.
  travel: With a meticulously planned itinerary, Jamie Swindell enjoys weekend road trips to the Olympic Peninsula, annual pilgrimages to Yellowstone for wildlife photography, and dreams of exploring Finland’s
    forests, balancing adventurous hikes with boutique B&Bs that offer quiet meditation spaces.
  culinary: A passionate organic gardener, Jamie Swindell prepares farm‑to‑table meals featuring roasted heirloom carrots, sautéed kale with garlic, quinoa salads, ratatouille, and miso‑glazed salmon, while
    occasionally treating themselves to artisanal cheese plates as a stress‑relief indulgence.
  core: Jamie Swindell is a meticulous health leader who channels their curiosity and chronic worry into data‑driven improvements, yet they reluctantly splurge on photography gear and forget routine health
    checks amid a packed schedule.
background:
  cultural: Jamie grew up in a middle‑class family in the Pacific Northwest, where a blend of small‑town community values and progressive, environmentally conscious attitudes shaped her worldview. Her upbringing
    emphasized the importance of hard work, education, and civic engagement, fostering a strong sense of responsibility toward her community. As a white American, she acknowledges the socioeconomic advantages
    that have facilitated her educational and professional opportunities, and she strives to use her position to advance equity in healthcare. The culture of the region—marked by an appreciation for nature,
    a collaborative spirit, and a commitment to social justice—continues to influence her personal interests, professional ethos, and dedication to community service.
