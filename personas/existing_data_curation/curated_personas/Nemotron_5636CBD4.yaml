  hobbies: '[''Cooking traditional Dominican cuisine'', ''Dancing merengue and bachata'', ''Reading historical biographies and personal development books'', ''Gardening herbs and vegetables'', ''Volunteering
    at the Enfield Hispanic Resource Center'', ''Attending Dominican cultural festivals'', ''Practicing yoga'', ''Walking local nature trails'']'
  career_goals: She aims to obtain her Certified Public Accountant (CPA) license within the next three years, leveraging her practical experience to qualify for a senior accountant role. Long‑term, she
    aspires to become an Accounting Manager or Controller within her organization, overseeing a small finance team and implementing process improvements. She also wants to expand her knowledge of cloud‑based
    accounting platforms and AI‑driven financial analytics, positioning herself as a bridge between traditional bookkeeping methods and modern technology. Additionally, she hopes to mentor younger colleagues,
    especially those from underrepresented backgrounds, and eventually offer part‑time bookkeeping consulting for Dominican‑owned small businesses in the Hartford area.
