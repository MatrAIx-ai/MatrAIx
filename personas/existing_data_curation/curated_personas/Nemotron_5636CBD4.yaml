personas:
  professional: Migdalia Sorto is a seasoned accountant who merges rigorous bookkeeping expertise in QuickBooks, Sage 50, and advanced Excel macros with a curiosity for cloud‑based AI analytics, delivering
    precise financial statements while mentoring junior staff and championing process automation.
  sports: Migdalia Sorto follows the New England Patriots football season with fervor, catches a few Hartford Yard Goats games each summer, roots for the Boston Celtics during NBA playoffs, and stays active
    by joining a Sunday morning walking club on the Scantic River Trail and playing casual softball in her neighborhood league.
  arts: Migdalia Sorto regularly immerses herself in the rhythms of Juan Luis Guerra and Aventura, attends Hartford Stage productions such as Lin‑Manuel Miranda’s ‘In the Heights,’ and devotes evenings
    to reading biographies of Maya Angelou and personal‑development titles like ‘Atomic Habits,’ which together shape her creative outlook.
  travel: Migdalia Sorto plans vacations with a blend of meticulous budgeting and spontaneous curiosity, having explored the historic streets of Barcelona, the jazz‑filled quarters of New Orleans, and the
    sun‑kissed beaches of San Juan, while dreaming of a cultural immersion in Cartagena and a serene retreat in Kyoto, all while fitting travel around family commitments and a modest household budget.
  culinary: Migdalia Sorto cooks with an intermediate‑to‑advanced skill set, perfecting traditional mangú, sancocho, and arroz con habichuelas while adding fresh cilantro, bitter orange juice, and garden‑grown
    thyme, often experimenting with sweet plantain mousse for dessert, and delights in hosting family dinner nights where the aroma of sofrito fills the house.
  core: Migdalia Sorto balances a precise accounting mindset with vibrant island‑rooted traditions, showing disciplined finances, a love for rhythmic dance, a habit of late‑night spreadsheet tinkering,
    and an occasional tendency to over‑salt her sauces.
background:
  cultural: Migdalia was born to Dominican immigrant parents who settled in Connecticut in the early 1980s. She grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties
    to the Dominican community through family gatherings, music, dance, and religious traditions rooted in Catholicism. Her upbringing emphasized close family bonds, respect for elders, and the celebration
    of Dominican holidays such as Independence Day and Día de los Santos. Living in Enfield, she blends Caribbean cultural expressions with suburban American life, often sharing her heritage by cooking
    for neighbors, participating in local cultural associations, and mentoring young Dominican youth. Her identity reflects a balance between preserving Dominican customs and adapting to the broader American
    context.
attributes:
