personas:
  professional: Wilbur Lewis, a retired handyman‑artist and community mentor, blends their decades of practical repair skills, woodworking, and soulful cooking with a flourishing passion for abstract painting
    and digital illustration, channeling their imaginative curiosity into intergenerational art projects and storytelling workshops.
  sports: Wilbur Lewis, a devoted member of the Trinity River Seniors Walking Club, keeps physically active through daily strolls along the river trail, light tai‑chi sessions at the community center, and
    occasional backyard badminton games, while they cheer on the Houston Astros in baseball season and the Dallas Cowboys during football weekends.
  arts: Wilbur Lewis, an abstract painter inspired by Wassily Kandinsky and a jazz enthusiast who sways to John Coltrane and the gospel harmonies of Mahalia Jackson, spends evenings drafting digital illustrations
    of speculative worlds, attends local productions of 'A Raisin in the Sun' and 'Our Town,' and they collect poetry from Ursula K. Le Guin and Gwendolyn Brooks.
  travel: Wilbur Lewis prefers spontaneous, low‑key road trips, having already explored the historic streets of New Orleans and the vibrant music scene of Austin, while they dream of a leisurely river cruise
    on the Mississippi and a cultural pilgrimage to Florence, Italy.
  culinary: Wilbur Lewis, a seasoned soul‑food cook, delights in slow‑cooked collard greens seasoned with smoked paprika, buttery cornbread drizzled with honey, and barbecue ribs glazed with a molasses‑based
    sauce, frequently incorporating fresh herbs like rosemary and thyme from their garden into experimental dishes.
  core: Wilbur Lewis is an imaginative, slightly scatter‑brained octogenarian whose love for abstract art, jazz, and community storytelling coexists with a habit of misplacing their glasses and a persistent
    undercurrent of worry.
background:
  cultural: Wilbur grew up in a Black community on the outskirts of Dallas during the 1940s and 1950s, a time marked by segregation and the early stirrings of the civil‑rights movement. His family’s deep
    roots in the region include stories of the Great Migration, church leadership, and participation in local NAACP initiatives. The church served as both a spiritual sanctuary and a cultural hub where
    gospel music, communal meals, and rhythmic storytelling were central. Food traditions such as slow‑cooked greens, cornbread, and barbecue reflect a blend of Southern cuisine and African American culinary
    heritage passed down through generations. Music—blues, jazz, and gospel—has been a constant soundtrack to his life, influencing his piano playing and love for improvisation. Family gatherings emphasize
    respect for elders, oral history, and collective resilience, values that Wilbur continues to model for his grandchildren. While proudly embracing his Black identity, he also incorporates broader Texan
    customs, such as enjoying outdoor barbecues and community festivals, illustrating a nuanced, hybrid cultural experience that informs his worldview and daily practices.
