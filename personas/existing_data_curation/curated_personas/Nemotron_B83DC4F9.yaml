  hobbies: '[''abstract painting'', ''reading speculative fiction'', ''studying philosophy'', ''listening to jazz and gospel music'', ''gardening (heirloom tomatoes and herbs)'', ''walking nature trails'',
    ''playing chess'', ''writing poetry'', ''attending community theater'', ''learning digital illustration on a tablet'']'
  career_goals: Although retired, Wilbur is driven by a desire to leave a lasting, positive imprint on his community and family. He plans to compile his memoirs, weaving personal anecdotes with the broader
    story of the civil‑rights era in Texas, and hopes to publish a small volume for his grandchildren. He wants to organize an intergenerational art exhibit at the local community center that showcases
    work by seniors and school‑aged youth, fostering mutual learning and appreciation. Wilbur aims to launch a seniors’ literary club where members meet weekly to discuss poetry, speculative fiction, and
    philosophy, keeping minds sharp and social bonds strong. He also seeks to deepen his proficiency with digital illustration tools, exploring new creative mediums while staying physically and mentally
    active. Supporting his wife’s health and staying socially harmonious remain central to his personal ambitions.
