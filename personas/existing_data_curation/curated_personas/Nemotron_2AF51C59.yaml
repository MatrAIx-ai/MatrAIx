  career_goals: Looking ahead, Cody aspires to turn his artistic passion into a career as a visual artist and interactive game designer, aiming to create inclusive, story‑driven experiences that resonate
    with diverse audiences. He hopes to attend a high‑school arts program and eventually study graphic design or game development at a university. Parallel to his creative ambitions, he dreams of leading
    youth art workshops in Omaha, using his cooperative spirit to bring community members together and promote empathy through art.
