personas:
  professional: Cody Henriques, a budding digital illustrator and fledgling animator, blends curiosity for unconventional ideas with disciplined organization to produce weekly cartoon strips, short animations,
    and collaborative art tutorials for school and friends.
  sports: Cody Henriques, a spirited member of the middle‑school soccer team and local U12 club, balances weekly practices with weekend pickup matches, cheering for the Los Angeles Galaxy while also organizing
    Minecraft‑themed fitness challenges with friends, preferring active play over passive screen time.
  arts: Cody Henriques, an avid sketcher and acoustic‑guitar enthusiast, draws inspiration from Studio Ghibli’s animation, Bill Watterson’s comic strips, and Taylor Swift’s melodic storytelling, often weaving
    these influences into their own cartoons and jam sessions.
  travel: Cody Henriques, who loves blending adventure with creative exploration, plans trips around art festivals and gaming conventions, having visited the nearby state park’s rock‑painting area and dreaming
    of a future pilgrimage to Tokyo’s Akihabara district to experience its anime culture firsthand.
  culinary: Cody Henriques, a novice home‑cook with a sweet tooth, frequently crafts buttery peanut‑butter cookies and experiments with colorful sushi‑roll bowls, favoring ingredients like fresh avocado,
    matcha powder, and crunchy kale chips while occasionally over‑indulging in soda during gaming marathons.
  core: Cody Henriques is a relentlessly curious 13‑year‑old who fuses art, tech, and music into every hobby, stays calm under pressure, and balances a disciplined routine with a playful, collaborative
    spirit.
background:
  cultural: Cody grew up in a middle‑class family on the outskirts of Omaha, Nebraska, within Washington County. His cultural backdrop reflects the Midwestern values of modesty, hard work, and strong community
    ties. Family traditions often include backyard barbecues, attending local high‑school football games, and annual trips to the Nebraska State Fair, where he has been exposed to regional crafts, music,
    and food. The agricultural heritage of the area and the close‑knit neighborhoods have fostered his appreciation for cooperation, harmony, and service to others, aligning with his personal emphasis on
    kindness and collective well‑being.
