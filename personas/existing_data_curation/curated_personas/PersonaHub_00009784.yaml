persona_description: A Bolivian researcher who conducted a qualitative study on the experiences of leishmaniasis patients in Bolivia. The researcher aimed to understand the factors that contribute to the
  underutilization of medical services and the mistreatment by medical staff. The researcher conducted medical campaigns in endemic areas and included a wide range of informants from different places in
  the country and diverse ethnic backgrounds to capture a wide array of experiences. The researcher used triangulation of researchers from different disciplines and different levels of familiarity with
  the disease, the study area, and the population to enhance the study's trustworthiness. The researcher's work is important in understanding the limitations and deficiencies of a centralised health system
  for a disease that disproportionately affects poor populations in remote areas and highlights the importance of addressing the factors that contribute to the underutilization of medical services.
