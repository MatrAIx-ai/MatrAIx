personas:
  professional: Felix Tolentino is a meticulous computer systems analyst who blends rigorous systems analysis, cloud expertise, and a keen eye for user experience design, channeling their curiosity and
    artistic appreciation into intuitive software solutions while mentoring junior developers and striving toward a senior architect role.
  sports: Felix Tolentino hits the waves at Huntington Beach with the local surf club, tackles the Santa Monica Trail hikes with a weekend hiking group, follows the Los Angeles Dodgers and Lakers loyally,
    and maintains a balanced fitness regimen that mixes early‑morning surf sessions with occasional gym workouts, though they sometimes skip a session when a new photography project demands extra time.
  arts: Felix Tolentino frequents the contemporary art gallery at The Broad, draws inspiration from photographers like Henri Cartier‑Bresson and Sebastião Salgado, creates graphic designs influenced by
    the bold colors of Frida Kahlo’s paintings, and spends evenings practicing acoustic guitar renditions of Violeta Parra’s folk ballads and Manu Chao’s upbeat Latin rhythms, while they also experiment
    with digital collage techniques that echo modernist abstraction.
  travel: Felix Tolentino prefers meticulously planned solo or small‑group trips that balance adventure with contemplation, having explored the coastal cliffs of Big Sur, the art scene of San Miguel de
    Allende, and the hiking trails of Patagonia, while dreaming of a photography expedition to New Zealand’s South Island and a cultural immersion in the Andean highlands.
  culinary: Felix Tolentino enjoys moderate‑level home cooking, regularly preparing hand‑rolled empanadas filled with seasoned beef, onions, and olives, as well as pastel de choclo—a corn‑based casserole
    topped with a sweet‑savory cheese crust—while they experiment with fresh cilantro, aji peppers, and locally sourced seafood in their fusion dishes.
  core: Felix Tolentino is a calm, curiosity‑driven systems analyst who balances disciplined code craftsmanship with spontaneous surf sessions and a habit of never turning off their phone’s camera shutter,
    often snapping everything from sunsets to coffee foam.
background:
  cultural: Felix is a first‑generation Chilean‑American who grew up bilingual in Spanish and English. His Chilean heritage informs his love for Latin American art, music, and culinary traditions, while
    his upbringing in Southern California has exposed him to a diverse, multicultural environment. He values the Chilean emphasis on family, community, and humility, which meshes with his compassionate
    nature and desire for harmony. This blend of cultures shapes his worldview, encouraging openness to new ideas, respect for varied experiences, and a commitment to contributing positively to both his
    local community in Carlsbad and broader society.
attributes:
  skills: '["Systems analysis", "Requirements engineering", "Data modeling", "Python programming", "Java programming", "SQL database management", "Cloud computing (AWS, Azure)", "IT service management (ITIL)",
    "Process optimization", "Technical documentation", "User experience (UX) design", "Team facilitation and mentoring"]'
  hobbies: '["Visiting art galleries and museums", "Digital photography and graphic design", "Playing acoustic guitar", "Surfing at Carlsbad State Beach", "Hiking coastal trails", "Cooking Chilean cuisine",
    "Reading science‑fiction and philosophy", "Mentoring youth in coding clubs", "Meditation and mindfulness practice"]'
  career_goals: Felix aims to progress to a senior systems architect role, leading cross‑functional teams to design resilient and user‑focused technology solutions. He plans to obtain advanced certifications
    such as AWS Solutions Architect and Certified Information Systems Security Professional (CISSP) to deepen his expertise in cloud and security. Long‑term, he aspires to launch a consultancy that helps
    non‑profit organizations and community groups leverage technology for social impact, merging his technical excellence with his drive to foster harmony and support others. Throughout his career, he seeks
    to maintain high standards, embrace innovative ideas, and create work environments that value collaboration and well‑being.
