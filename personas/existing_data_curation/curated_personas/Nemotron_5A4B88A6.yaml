personas:
  professional: Ger Gonzalez, an aspiring digital illustrator and budding game designer, blends methodical planning with a vivid imagination, channeling their love of fantasy novels and LEGO constructions
    into pixel art concepts while reliably meeting school project deadlines.
  sports: Ger Gonzalez follows the LA Dodgers and the LA Lakers with enthusiasm, plays on the community soccer team 'Santa Ana Strikers' during the fall, and practices swimming at the local recreation center
    in the summer, preferring small-group drills over large crowds.
  arts: Ger Gonzalez engages deeply with artistic expression, sketching daily in a notebook while drawing inspiration from the vibrant murals of Diego Rivera, the imaginative worlds of Hayao Miyazaki's
    films, and the contemporary pop beats of Luis Miguel, often spending evenings creating digital paintings on a tablet.
  travel: Ger Gonzalez loves family road trips to Disneyland and day-visits to San Diego's beach boardwalk, dreams of exploring the historic streets of Barcelona, and eagerly anticipates a future vacation
    to the towering pyramids of Teotihuacan, planning each journey with a detailed scrapbook map.
  culinary: Ger Gonzalez delights in helping prepare homemade tamales and enchiladas, expertly rolling masa dough and seasoning with chilies, coriander, and cheese, while also experimenting with guacamole
    using ripe avocados and lime, showing a budding knack for both traditional cooking and creative kitchen tweaks.
  core: Ger Gonzalez, a meticulous yet worry-prone 11-year-old, pours boundless curiosity into sketching, saves pennies for art supplies, and refuses to miss the annual Día de los Muertos parade despite
    occasional procrastination.
background:
  cultural: Ger is a Mexican‑American growing up in Santa Ana, California, within a bilingual household where Spanish is spoken daily. His family maintains strong ties to Mexican traditions, celebrating
    holidays such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day with community gatherings, traditional foods, and storytelling. He regularly attends cultural events hosted by local
    organizations like the Mexican American Cultural Center, and he incorporates his heritage into his artistic pursuits, drawing inspiration from Mexican folk art and mythology. His upbringing blends Mexican
    customs with the multicultural environment of Orange County, fostering a deep appreciation for both his roots and his broader American community.
attributes:
  skills: '[''Drawing'', ''Digital illustration'', ''Basic graphic design (Photoshop, Krita)'', ''Elementary mathematics (geometry)'', ''Scratch programming'', ''Bilingual Spanish-English'', ''Project planning
    and organization'', ''LEGO Mindstorms robotics'']'
  hobbies: '[''Sketching'', ''Digital art'', ''Reading fantasy/science fiction'', ''LEGO building'', ''Strategy board games (Catan)'', ''Cooking Mexican dishes'', ''Participating in cultural festivals (Día
    de los Muertos)'', ''Journaling'']'
  career_goals: Ger aspires to become an architect or a visual designer, merging his love for art with his methodical approach to planning. He dreams of attending a high school with a strong arts and engineering
    program, eventually earning a degree in architecture or graphic design. He also hopes to incorporate his Mexican heritage into his designs, creating spaces that celebrate cultural traditions. In the
    longer term, he wants to develop community art projects that provide safe, creative outlets for other youth who feel anxious or stressed.
