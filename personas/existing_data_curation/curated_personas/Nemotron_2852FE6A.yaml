personas:
  professional: Abdiel Castromorales, a seasoned structural engineer with advanced expertise in reinforced concrete and steel systems, leverages BIM and GIS to design LEED‑certified infrastructure while
    infusing artistic bridge motifs inspired by mural traditions, acts as a bilingual liaison to guide diverse stakeholder groups, and balances meticulous project management with a curiosity‑driven drive
    to mentor underrepresented engineers toward senior and principal roles.
  sports: Abdiel Castromorales, a dedicated hiker of Forest Park’s winding trails and an occasional cyclist who follows the Portland Timbers and Trail Blazers, engages in moderate cardio three times a week,
    participates in a local climbing club’s weekend sessions when deadlines ease, yet often skips the gym in favor of sketching bridge vistas during outdoor excursions.
  arts: Abdiel Castromorales, an urban‑landscape watercolorist whose work captures Portland’s bridges through the vivid lens of Mexican mural narratives, in addition to playing classical guitar pieces by
    Segovia at intimate poetry readings, volunteers on community mural projects that merge STEM concepts with public art, and draws inspiration from local artists such as Chaun Norwest and the works of
    Diego Rivera.
  travel: Abdiel Castromorales, an intentional traveler who meticulously plans trips blending architectural study, nature hikes, and culinary exploration, has trekked the ruins of Oaxaca, wandered Kyoto’s
    Zen gardens, and aspires to explore Barcelona’s Gaudí mosaics, all while balancing travel costs with family responsibilities and occasional anxiety about unfamiliar locales.
  culinary: Abdiel Castromorales, a home chef who creates Mexican‑Northwest fusion dishes such as smoked salmon tlayudas topped with locally foraged chanterelles, mole‑glazed cedar‑smoked pork with hazelnut‑infused
    salsa verde, and chiles rellenos stuffed with Oregon goat cheese, enjoys experimenting with fresh herbs from a modest succulent garden, yet occasionally over‑spices dishes when stress peaks.
  core: Abdiel Castromorales, a curiosity‑driven senior engineer whose anxiety fuels meticulous planning and spontaneous watercolor bursts, blends sustainable infrastructure with mural‑inspired community
    projects, and balances disciplined finances with occasional impulsive art‑supply splurges.
background:
  cultural: Abdiel's Mexican heritage is a cornerstone of his identity; he grew up in a bilingual household, celebrating Dia de los Muertos and Mexican culinary traditions while adapting to life in the
    Pacific Northwest. The rich visual language of Mexican muralists influences his appreciation for public art, and he often incorporates folkloric motifs into his design concepts. He maintains close ties
    with extended family in Mexico and participates in local Mexican community events in Portland, which reinforce values of collectivism, resilience, and hospitality. His cultural background also informs
    his commitment to bridging cross-cultural perspectives in engineering, fostering inclusive collaboration between Spanish-speaking clients and the broader Oregon professional community.
attributes:
  skills: '[''Structural analysis and design'', ''Site grading and stormwater management'', ''Sustainable design (LEED)'', ''Building Information Modeling (BIM)'', ''Geographic Information Systems (GIS)'',
    ''Project management and scheduling'', ''Code compliance (IBC & Oregon standards)'', ''Bilingual communication (English/Spanish)'', ''Community engagement and participatory design'', ''Holistic risk
    assessment'', ''Technical writing and grant proposal development'', ''Mentoring and conflict resolution'']'
  hobbies: '[''Watercolor painting'', ''Urban sketching'', ''Hiking'', ''Bridge photography'', ''Cooking Mexican-Northwest fusion'', ''Classical guitar'', ''Poetry readings'', ''Yoga and mindfulness meditation'',
    ''Community mural volunteering'', ''Succulent gardening'', ''Reading contemporary philosophy'']'
  career_goals: His primary career ambition is to become a senior project manager and eventually a principal engineer leading large-scale sustainable infrastructure projects that integrate artistic and
    community-centred elements. Abdiel aims to spearhead a research initiative on resilient flood mitigation for the Portland metropolitan area while incorporating public art to enhance civic well-being.
    He also aspires to teach part-time at a local university, mentor emerging engineers from underrepresented backgrounds, and author a guidebook on cross-cultural engineering practice that blends Mexican
    artistic sensibilities with Pacific Northwest design.
