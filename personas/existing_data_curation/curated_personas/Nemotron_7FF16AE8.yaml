personas:
  professional: An audiovisual technician named Anthony Ayyad, they excel at configuring projection systems, calibrating speaker arrays, and troubleshooting AV‑over‑IP setups, leveraging their methodical,
    solitary work style and cooperative documentation habits to deliver clear, low‑stress solutions for schools and churches, all while occasionally forgetting to label a cable bundle until the next day.
  sports: An outdoors enthusiast named Anthony Ayyad, they spend Saturdays fishing at Lake Clearfield and hiking the trails of Oil Creek State Park, support the local Crawford County Raiders high school
    football team and the Pittsburgh Steelers, and they belong to a small weekend hiking club that meets at the nearby state park.
  arts: An eclectic hobbyist named Anthony Ayyad, they devote evenings to reading Philip K. Dick and Ken Follett, they strum acoustic covers of Pink Floyd and The Beatles on a battered guitar, they capture
    sunrise landscapes à la Ansel Adams with their DSLR, and they occasionally attend the community theater’s performance of “Our Town” for a modest cultural fix.
  travel: A low‑key traveler named Anthony Ayyad, they prefer spontaneous road trips to nearby state parks like Shenandoah Valley and occasionally plan a weekend in Asheville, North Carolina for its mountain
    scenery, but they avoid crowded tourist hubs, opting instead for quiet lakeside cabins where they can fish and edit hike footage.
  culinary: A modest home cook named Anthony Ayyad, they favor hearty dishes such as chicken pot pie, smoked trout with lemon‑dill sauce, and sweet‑potato mash, they enjoy seasoning with fresh rosemary
    and thyme from their garden, and they occasionally unwind with a craft IPA while watching tech podcasts.
  core: Anthony Ayyad is a quietly diligent, solitary problem‑solver who blends practical self‑reliance with a cooperative spirit, often forgetting to schedule appointments but always delivering meticulous
    AV installations, and they value low‑stress independence above all.
background:
  cultural: Anthony was raised in a small town in Crawford County, Pennsylvania, within a working‑class family of primarily German and Irish ancestry. The community’s values emphasized self‑reliance, practicality,
    and modesty, which shaped his preference for structure and quiet. Local traditions such as county fairs, high school football games, and church gatherings reinforced his cooperative and considerate
    nature, even though he prefers solitary environments. The rural Mid‑Atlantic setting fostered his love for outdoor activities like fishing and hiking, and instilled a down‑to‑earth, pragmatic outlook
    that guides both his personal and professional life.
attributes:
  skills: '[''Projection system installation'', ''Speaker mounting and audio calibration'', ''Structured cable routing and labeling'', ''Signal troubleshooting for audio‑video'', ''HDMI/SDI/Dante configuration'',
