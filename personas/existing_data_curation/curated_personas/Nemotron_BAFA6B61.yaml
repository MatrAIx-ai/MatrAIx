personas:
  professional: Robinson Castaneda, a budding LEGO architect, channels their love for structure and planning into constructing intricate sets; they demonstrate methodical precision, reliability, and an
    early knack for project management that hints at future engineering aspirations.
  sports: Robinson Castaneda, an enthusiastic member of the Riverdale Rover Soccer Club, thrives on the structured drills and teamwork of weekly Saturday matches; they model their play after the professional
    City Strikers and adhere strictly to the coach’s rotation schedule while cheering for their favorite forward.
  arts: Robinson Castaneda, an avid reader of Mary Pope Osborne’s Magic Tree House series and a budding cartographer, spends afternoons sketching detailed neighborhood maps while the rhythms of Juan Luis Guerra
    and Aventura fill the house; they let the adventurous spirit of their favorite stories inspire their LEGO creations.
  travel: Robinson Castaneda, a curious young explorer, has already visited the nearby coastal town of Punta Cañada with their family and taken a short flight to Orlando’s theme parks; they now keep a scrapbook
    of future journeys dreaming of the historic streets of Barcelona and the dinosaur museums of Canada.
  culinary: Robinson Castaneda, a junior kitchen assistant, enjoys measuring out rice and red beans, sprinkling fresh cilantro, and learning to mash ripe plantains for a side of maduros; they proudly master
    the art of plating their own tiny spoonfuls of arroz con habichuelas.
  core: Robinson Castaneda, a methodical seven‑year‑old with a penchant for LEGO, puzzles, and orderly play, balances a disciplined routine with bursts of imaginative adventure; they occasionally succumb
    to candy cravings and keep a tidy map of their world.
background:
  cultural: Robinson is raised in a Dominican household where Spanish is spoken alongside English, giving him a bilingual environment. Family traditions such as celebrating 'Dominican Independence Day',
    sharing meals of mangú, sancocho, and pasteles, and dancing to merengue and bachata are central to his upbringing. His parents emphasize respect for cultural heritage while encouraging participation
    in community events in Haddam, Connecticut, allowing him to blend his Dominican roots with his American surroundings.
attributes:
  skills: '[''Reading and writing (early literacy)'', ''Basic arithmetic (addition/subtraction)'', ''Organizing personal belongings'', ''Following daily routines and checklists'', ''Basic tablet/computer
