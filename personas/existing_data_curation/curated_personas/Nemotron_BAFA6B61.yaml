  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Reading adventure books'', ''Soccer'', ''Listening to merengue and bachata music'', ''Helping with cooking Dominican dishes'', ''Drawing neighborhood
    maps'', ''Playing checkers'']'
  career_goals: Robinson dreams of one day becoming a civil engineer or architect because he loves designing and building structures with his LEGO bricks and enjoys the clear steps involved in planning
    a project. He also admires firefighters for their teamwork and predictable shift schedules, and sometimes imagines helping his community in that role. In the short term, he aims to become the class
    tech helper at school, assisting peers with the classroom computer, and to earn a badge in his Scout group for learning basic first‑aid.
