personas:
  professional: Davante Moody is a retired construction project supervisor who applies three decades of on‑site coordination, budgeting, and hands‑on carpentry to mentor younger tradespeople and lead community
    heritage tours, yet their relaxed attitude toward strict deadlines and occasional disorganization sometimes clash with their fiercely competitive nature to out‑perform former crews.
  sports: Davante Moody is an avid early‑morning fisherman and occasional sailor who belongs to the Murrells Inlet Senior Sailing Club, follows the Charleston Battery soccer team and the South Carolina
    Gamecocks football program, and participates in weekly senior fitness walks, yet they often prioritize competition in regional fishing tournaments over collaborative team sports.
  arts: Davante Moody is a regular member of a local gospel choir that sings the classics of Mahalia Jackson and the Blind Boys of Alabama, enjoys listening to Bob Dylan’s folk‑rock storytelling, and spends
    evenings woodworking while playing recordings of the Carolina Symphony, using these artistic outlets to channel both curiosity and a need for community connection.
  travel: Davante Moody is a seasoned coastal traveler who prefers meticulously planned road trips along the Atlantic seaboard, with highlights including a sunrise fishing charter in Key West, a historic
    tour of Savannah’s riverfront, and a nostalgic cruise through the Intracoastal Waterway to Charleston, while dreaming of a guided sailing expedition to Bermuda’s reefs.
  culinary: Davante Moody is a competent home cook who loves preparing grilled red snapper with lemon butter, shrimp and grits seasoned with smoked paprika, and homemade sweet tea sweetened with raw cane
    sugar, often pairing meals with fresh garden herbs like basil and thyme, though they sometimes over‑salt dishes in their enthusiasm to impress fellow anglers.
  core: Davante Moody is a curiosity‑driven, competitive retiree who blends hands‑on building expertise with a love for fishing, storytelling, and community leadership, all while wrestling with occasional
    disorganization, worry, and a habit of double‑checking every knot before setting sail.
background:
  cultural: Davante grew up as a Black man in the Lowcountry of South Carolina during the civil‑rights era, shaped by a strong sense of community, family, and church. His cultural heritage blends Southern
    traditions—such as barbecue, sweet tea, and gospel music—with the coastal African‑American fishing and boat‑building customs passed down through generations. He values the oral storytelling tradition
    of the Gullah‑influenced community, honoring the resilience and collective spirit of his neighbors. This background informs his emphasis on communal gatherings, mentorship, and preserving local history
    for future generations.
attributes:
