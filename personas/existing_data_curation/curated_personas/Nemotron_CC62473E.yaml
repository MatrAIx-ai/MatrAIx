    and dock maintenance'', ''Seasonal gardening'', ''Event planning'', ''Public speaking and storytelling'', ''Community organizing'']'
  hobbies: '[''Fishing'', ''Sailing'', ''Card games'', ''Competitive bingo'', ''Gardening'', ''Woodworking'', ''Storytelling circles'', ''Gospel choir participation'', ''Local history walking tours'']'
  career_goals: Although retired, Davante aims to mentor younger residents in practical trades and preserve the African‑American maritime heritage of Murrells Inlet by recording oral histories and leading
    walking tours. He plans to compile his experiences into a short memoir that blends personal anecdotes with local history. He also seeks a role on the advisory board of the community garden, where he
    can apply his budgeting and planning skills. On a more personal level, he hopes to win a regional fishing tournament, demonstrating his competitive spirit while staying active and engaged with his peers.
