  career_goals: Jonathan dreams of turning his love for talking and entertaining into a future as a local TV host or a YouTube creator who shares hands‑on projects and community stories. He also imagines
    opening a neighborhood maker space where kids can build, play, and learn, and he hopes to earn enough to support his family and fund his own gadgets. In the longer term, he sees himself as a community
    leader who organizes events and mentors younger kids in Shelbyville.
