personas:
  professional: Jonathan Infante, a budding tinkerer and kid coder, merges his curiosity for Scratch programming with a practical knack for fixing things using his small toolkit, while their chatty, sociable
    nature makes them a natural collaborator in school group projects.
  sports: Jonathan Infante dribbles for the River Valley Kids' Basketball League, rides his mountain bike with the after‑school Cycling Club, and cheers enthusiastically for the nearby professional baseball
    team, the Cedarfield Bears, embodying a sociable, energetic approach to team and individual sports.
  arts: Jonathan Infante channels a love for country legends like Dolly Parton and bluegrass icons such as Alison Krauss into energetic school talent shows while illustrating original comic strips starring
    a bike‑riding superhero, reflecting a playful, outgoing artistic streak.
  travel: Jonathan Infante favors spontaneous weekend bike trips to nearby state parks, has already explored the historic downtown of Charleston on a family visit, and dreams of a future road‑trip to Yellowstone,
    blending an adventurous spirit with a relaxed, budget‑conscious mindset.
  culinary: Jonathan Infante enjoys the crisp taste of garden‑fresh carrots and tomatoes harvested with grandparents, often whipping up simple snacks like peanut‑butter‑banana sandwiches and mastering the
    perfect cheese‑pull on homemade pizza while occasionally over‑seasoning with extra hot sauce despite a still‑developing palate.
  core: Jonathan Infante blends restless curiosity for tinkering and coding with a laid‑back, chatty demeanor, often juggling half‑finished projects, a love for basketball, and a habit of forgetting to
    clean their bike after rides.
background:
  cultural: Jonathan grew up in Shelbyville, a small town in central Kentucky with a strong sense of Southern hospitality and community. His family participates in local church gatherings, county fairs,
    and the annual Shelbyville Horse Show. The region’s traditions of country and bluegrass music, homemade cooking, and outdoor activities like fishing and hunting shape his daily life. He carries a blend
    of Mid‑American values—friendliness, modesty, and a practical work ethic—while also embracing modern influences of digital media and peer culture.
