persona_description: A researcher or clinician who is interested in using the HBM model for real-time feedback on kinematic and kinetic variables in children with neurological disorders, such as cerebral
  palsy and Duchenne's Muscular Dystrophy. They are looking for information on incorporating ligament tension models and user-defined cost functions, as well as integrating actual EMG signals into the analysis.
  They are also interested in the accuracy of the hip joint center prediction and the influence of offsets in internal/external hip rotation.
