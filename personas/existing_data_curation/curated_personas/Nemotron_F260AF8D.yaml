  hobbies: '[''Watercolor Painting'', ''Analog Photography'', ''Improv Comedy'', ''Live Music Attendance'', ''Hiking'', ''Reading Fiction and Philosophy'', ''Cooking'', ''Volunteering'', ''Intramural Basketball'']'
  career_goals: Derald aims to complete a bachelor's degree in Communications or Media Studies, secure internships at cultural institutions such as the Indiana University Art Museum or local nonprofit arts
    organizations, and build a robust portfolio of digital content. He envisions a career as a communications strategist or creative director for community‑focused arts initiatives, eventually launching
    his own collaborative art space that offers workshops, exhibitions, and public events to make art accessible and foster cultural exchange in Bloomington.
