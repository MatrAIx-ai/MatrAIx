personas:
  professional: Derald Lee, an 18‑year‑old communications major at Indiana University, leverages their strong public speaking and event‑planning skills to spearhead campus arts initiatives, blending graphic
    design, video editing, and analog photography into compelling digital campaigns while maintaining a flexible, people‑centric leadership style.
  sports: Derald Lee stays active by playing intramural basketball with the Bloomington Bulls, hiking the rugged trails of Hoosier National Forest on weekends, and cheering on the Indiana Hoosiers men’s
    basketball team, while also participating in a casual campus running club that meets for Thursday night jogs.
  arts: Derald Lee immerses themselves in the Bloomington art scene, painting watercolor landscapes inspired by Monet, shooting analog photographs reminiscent of Ansel Adams, performing improv sketches
    with the campus troupe, and attending live shows by indie musicians such as Mitski and The National, while regularly visiting the IU Art Museum and the Bloomington Community Gallery.
  travel: Derald Lee enjoys short, budget‑friendly road trips, having explored Chicago’s art museums, New York’s MoMA, and a weekend getaway to Nashville’s music venues, and dreams of a spring semester
    abroad in Kyoto to study Japanese garden aesthetics, all while juggling student loans and limited vacation days.
  culinary: Derald Lee experiments in the dorm kitchen by mastering dishes like spicy Sichuan mapo tofu, blueberry almond pancakes, and homemade ramen, sourcing fresh herbs from the Bloomington farmers’
    market, yet often falls back on late‑night pizza deliveries after improv shows, reflecting a mix of culinary curiosity and convenience.
  core: Derald Lee is a curiosity‑driven, talkative art enthusiast who balances meticulous event planning with spontaneous creative bursts, carries a Polaroid camera everywhere, and sometimes forgets deadlines
    when a new idea sparks.
background:
  cultural: Derald grew up in a middle‑class white family in suburban Indiana, where community involvement, education, and modest religious traditions were emphasized. Living in Bloomington—a vibrant college
    town—has exposed him to a diverse, progressive student culture and a thriving local arts scene, including the Eskenazi Museum of Art and numerous music festivals. This blend of Midwestern values and
    campus‑driven cultural dynamism shapes his worldview, fostering an appreciation for both traditional community ties and innovative artistic expression.
attributes:
