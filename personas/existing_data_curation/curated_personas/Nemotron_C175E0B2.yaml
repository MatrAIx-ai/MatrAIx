personas:
  professional: Mark Meloche, a ten‑year‑old aspiring engineer, channels his love for LEGO building and Minecraft architecture into the school’s robotics club, where they collaborate on simple line‑following
    bots while sketching plans for future real‑world structures.
  sports: Mark Meloche enjoys playing on the local U‑11 soccer team, cheers for the hometown baseball club the Portland Pilots, and spends weekend mornings cycling around the neighborhood park, preferring
    small, structured play to large crowds.
  arts: Mark Meloche spends free time sketching imagined maps, folding intricate origami cranes, devouring adventure novels by Jules Verne and sci‑fi series by Rick Riordan, and listening to the whimsical
    scores of Studio Ghibli's 'Spirited Away' and the energetic tracks of Imagine Dragons.
  travel: Mark Meloche’s travel highlights include family camping trips to Yellowstone, weekend visits to a nearby coastal lighthouse, a coveted future visit to Utah’s Dinosaur National Monument, and an
    imagined adventure exploring the neon streets of Tokyo’s Akihabara district.
  culinary: Mark Meloche enjoys building taco towers with seasoned beef, shredded cheese, lettuce, and salsa, scores a perfect ten on homemade chocolate chip cookies, and experiments with simple origami‑shaped
    sushi rolls, though they sometimes forget to wash their hands before cooking, prompting a gentle reminder from Mom.
  core: Mark Meloche is a ten‑year‑old architect‑in‑training who balances a passion for structured LEGO builds with a delightfully chaotic habit of leaving half‑finished projects scattered across their
    room, all while quietly mapping out new worlds in their mind.
background:
  cultural: Mark was raised in Tulsa, Oklahoma, a city that blends Midwestern values with Southern hospitality. His family celebrates traditional holidays such as Thanksgiving and Christmas with communal
    meals and participates in local events like the Tulsa State Fair. The regional culture emphasizes friendliness, self‑reliance, and a love for outdoor activities, which is reflected in his enjoyment
    of nature walks and community gatherings. While his ethnic background is white, his schooling introduced him to Oklahoma's diverse heritage, including Native American history and the legacy of the oil
    industry, giving him a broader appreciation of the area's cultural tapestry.
