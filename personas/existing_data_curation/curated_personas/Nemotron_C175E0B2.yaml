  career_goals: Mark dreams of becoming a robotics engineer or computer programmer who designs practical devices that help people in everyday life. He is drawn to fields that blend structure with creativity,
    such as sustainable engineering, where he could apply his technical skills to solve environmental challenges. His long‑term ambition is to work on concrete projects that benefit his community while
    allowing him to work in focused, small‑team environments.
