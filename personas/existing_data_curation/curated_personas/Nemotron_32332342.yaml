personas:
  professional: Andrew Little, a retired handyman turned community mentor, applies his lifelong mastery of carpentry, small‑engine repair, and budgeting to methodically guide neighbors and grandchildren
    through practical projects, while his reserved yet cooperative nature keeps him quietly dependable.
  sports: Andrew Little enjoys fly fishing on Lake Huron, follows the Detroit Red Wings and the Michigan Wolverines, participates in the local senior walking club, and is a lifelong member of the Lakeside
    Fly Anglers Association, though he rarely engages in high‑intensity sports.
  arts: Andrew Little spends evenings reading classic mystery novels by Agatha Christie and historical non‑fiction, listens to folk music legends like Woody Guthrie and Joanie Mack, appreciates the paintings
    of Thomas Hart Benton, and cherishes the quiet harmony of his church choir’s hymns.
  travel: Andrew Little prefers meticulously planned road trips that balance scenic lake drives with restful stays at modest cabins, has visited the Upper Peninsula’s Pictured Rocks, hopes to explore Banff
    National Park, and favors destinations within a comfortable driving distance to accommodate his health and budget.
  culinary: Andrew Little favors fresh Lake Huron perch seasoned with dill and lemon, cooks garden tomatoes into a rustic ratatouille, reliably prepares hearty beef stew with root vegetables, and treats
    himself to apple crumble on Sundays, though he sometimes oversalts his soups.
  core: Andrew Little is a methodical, community‑oriented septuagenarian who blends tradition with quiet diligence, sprinkling his days with fishing, woodworking, and gentle stewardship of his small town.
background:
  cultural: Andrew is a lifelong resident of Alpena, Michigan, a small community on the state’s “Thumb” along Lake Huron. He descends from White Midwestern families with German‑Scandinavian roots, a heritage
    common in the region that emphasizes self‑reliance, hard work, and tight‑knit community ties. His upbringing was shaped by the seasonal rhythms of the Great Lakes—snowy winters, fishing seasons, county
    fairs, and church gatherings. He embodies the modest, practical, and neighborly culture of the Upper Peninsula/Thumb area, with a deep appreciation for nature, local history, and down‑to‑earth social
    norms.
