  career_goals: Andrew aims to stay healthy and continue supporting his wife while remaining active in his community. He hopes to mentor his grandchildren in practical skills, preserve his historic home,
    expand his volunteer work at the local shelter, and eventually compile a memoir of his life on the Great Lakes. He also aspires to maintain a structured routine that balances personal well‑being with
    giving back to his small town.
