    Programs)'', ''Attending Small Theatre Productions'']'
  career_goals: Kendall aims to advance to a senior operations leadership role—such as Director of Business Operations—within the next five years, leveraging her track record of measurable efficiency gains.
    She plans to earn Six Sigma Black Belt certification and deepen her strategic planning capabilities to lead organization‑wide transformation initiatives. Long‑term, she envisions launching a boutique
    consulting firm that helps mid‑size companies streamline their operations while maintaining rigorous compliance standards.
