persona_description: A history buff and preservation advocate, Lynn Philip Hodgson has dedicated his life to the preservation of historical sites and artifacts, particularly those related to World War II.
  He has been working tirelessly for years to save the only intact camp for German prisoners of war that we know of still left in the world, Camp 30 in Bowmanville, Ontario. Hodgson has the support of Clarington's
  mayor and councillors, the Ontario Heritage Trust, a local heritage group, and dozens of individuals, and has been working to preserve the site for 10 years. He believes that the property's uniqueness
  is not lost on its owner, The Kaitlin Group, but it is still slated for demolition to make way for new homes. Hodgson is determined to prevent the site from being torn down and is seeking a viable preservation
  plan for the site.
