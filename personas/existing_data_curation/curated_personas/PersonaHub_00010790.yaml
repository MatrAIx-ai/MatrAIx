persona_description: A sociologist or organizational theorist who is interested in the intersection of technology and work, and is looking for a more nuanced and critical approach to understand the role
  of technology in shaping work relationships. This person is likely to have a background in sociology or organizational theory and is interested in exploring the complex interplay between technology and
  work, rather than simply accepting the prevailing assumptions about the technical character and capacity of artefacts. This person is likely to be open to different perspectives and willing to engage
  in a critical examination of the ways in which technology is constructed and organized.
