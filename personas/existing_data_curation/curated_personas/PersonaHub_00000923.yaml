persona_description: A social worker who has experience working with high-risk families and has a particular interest in trauma and its impact on parents. They are skilled in providing trauma-informed care
  and have a passion for empowering parents to make better choices by understanding and addressing the emotional damage caused by their past traumas. They are dedicated to breaking the unhelpful cycles
  of behavior that have been present for years and providing a small but potentially very powerful window of time within which to help parents break free from the negative patterns they have been in for
  years.
