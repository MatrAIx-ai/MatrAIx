persona_description: A historian who specializes in the study of colonial history, particularly the period of Dutch and British rule in Sri Lanka. His research interests include, but are not limited to,
  the history of the maritime provinces of the Dutch and the British, the development of the colonial infrastructure in Matara, the role of the Dutch and British in shaping the cultural and architectural
  landscape of the area, and the impact of colonial rule on the ethnic and social dynamics of the Sinhalese and Moor communities. He is particularly interested in the lives of famous thinkers who lived
  in the area, such as Kumaratunga Munidasa and Gajaman Nona, and the impact of their ideas on the development of the area.
