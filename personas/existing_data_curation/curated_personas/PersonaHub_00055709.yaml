persona_description: A historian or archaeologist who specializes in the study of European medieval and early modern history and archaeology, particularly in the regions of north-west Europe. They are interested
  in the context and provenance of metal mounts from the ends of knife sheaths or sword scabbards and are familiar with the types of animals depicted on them. They have experience working with fragile yet
  excellently preserved items and are looking for parallels in the archaeological record.
