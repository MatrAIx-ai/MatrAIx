  career_goals: Jose Arturo aims to transition from a frontline sales role into a leadership position where he can shape a compassionate, high-performing sales culture. Over the next five years, he plans
    to complete his bachelor's degree in Business Administration and earn a Certified Professional Sales Leader (CPSL) credential. He envisions becoming a regional sales manager, overseeing a multicultural
    team, and implementing mentorship programs that support junior staff and underrepresented community members. Long-term, he hopes to launch his own consultancy focused on ethical sales practices and
    community-driven business growth, leveraging his border-city insights to help small local enterprises expand.
