  career_goals: Myra aspires to pursue a career that merges her love for animals, the natural world, and her knack for communication. She hopes to attend a high‑school science academy, win a state‑level
    science fair with a project on local wildlife health, then study veterinary medicine or environmental science in college. Her long‑term ambition is to become a wildlife veterinarian who works with farms
    and preserves in the Mississippi Delta, while also using her public‑speaking abilities to educate her community about conservation and animal welfare. She dreams of leading a youth environmental club
    at her future high school and eventually influencing public policy on rural environmental issues.
