personas:
  professional: An aspiring junior robotics designer, Myra Morgan channels their curiosity and competitive edge into building functional prototypes for the school robotics club, balancing creative experimentation
    with disciplined project timelines.
  sports: Myra Morgan dazzles on the middle school soccer field and in the cheer squad, while cheering for the local professional soccer club, the River City Rovers, and the community high school basketball
    team, the Riverdale Tigers, embodying a competitive yet team‑oriented approach to fitness.
  arts: Myra Morgan devotes spare moments to reading Agatha Christie mysteries, streaming Taylor Swift's latest album, and watching Millie Bobby Brown's performances on Netflix, letting these creative influences
    shape their strategic thinking in games and storytelling in personal journals.
  travel: Myra Morgan loves weekend nature walks on the nearby Blue Ridge Trail and once visited Washington, D.C. on a school field trip, dreaming of a future family vacation to Japan's cherry‑blossom festivals
    while balancing a limited allowance and school commitments.
  culinary: Myra Morgan delights in baking grandmother's classic pecan pie and peach cobbler, mastering the flaky crust of buttermilk biscuits, yet they often neglect kitchen cleanup, leaving flour dust
    on the countertop.
  core: Myra Morgan is a fiercely competitive, socially driven 13‑year‑old who balances robotics curiosity with soccer energy, wrestles intense anxiety through journaling, and fuels creativity with mystery
    novels and Southern baking.
background:
  cultural: Myra is a white teenager raised in Calhoun City, Mississippi, a close‑knit small town in Webster County. Her family has deep roots in the region, with grandparents who tend a modest farm and
    a strong emphasis on Southern hospitality, church involvement, and community gatherings such as county fairs and high‑school football games. The local culture values hard work, modesty, and a respect
    for tradition, while also embracing modern technology and education. Myra’s upbringing includes exposure to Southern cuisine, blues and country music, and a reverence for the natural landscape of the
    Mississippi Delta. These cultural influences shape her practical outlook, her love for group activities, and her desire to give back to her community.
