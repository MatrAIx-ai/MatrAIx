personas:
  professional: Justina Castro, a veteran secondary school teacher, channels her love of structure into meticulously crafted bilingual Spanish and social studies curricula while allowing spontaneous, culturally
    responsive moments in the classroom, using interactive whiteboards and mentorship to empower both students and novice teachers despite occasional deadline slip‑ups.
  sports: Justina Castro hikes the Sierra de Cayey hills each weekend, competes in a local co‑ed volleyball league, and cheers for the Cangrejeros de Santurce basketball team and the Criollos de Caguas
    baseball club, blending community sports enthusiasm with personal fitness routines.
  arts: Justina Castro leads a weekly plena and salsa dance workshop, regularly watches telenovelas such as La Reina del Sur, knits blankets to local shelters while listening to artist Celia Cruz and Puerto
    Rican troubadour Roy Brown, and curates a community book club featuring works by Isabel Allende.
  travel: Justina Castro enjoys spontaneous weekend getaways to El Yunque rainforest and historic Old San Juan, while also planning annual visits to the Dominican Republic’s Punta Cana for a mix of adventure
    and relaxation, balancing a modest travel budget with her love for cultural immersion.
  culinary: Justina Castro excels in preparing traditional dishes like arroz con gandules, lechón asado, and tembleque, seasoning with sofrito, adobo, and fresh cilantro from her backyard garden, and she
    delights in sharing these meals at potluck gatherings, though she occasionally over‑spices in her enthusiasm for bold flavors.
  core: Justina Castro is a community‑driven educator who balances structured planning with spontaneous creativity, fueled by a love of dance, cooking, and volunteerism, while occasionally wrestling with
    deadline procrastination and impulsive splurges.
background:
  cultural: Justina was raised in a close‑knit Puerto Rican family in Patillas, a town affectionately called “La Esmeralda del Sur.” Her upbringing was steeped in the island’s rich blend of Spanish, African,
    and Taíno influences, which surface in daily life through music, food, and religious traditions. She grew up hearing bomba and plena rhythms, celebrating the patron saint festival of San Antonio de
    Padua, and participating in family gatherings centered around shared meals of arroz con camarones and pasteles. Spanish is her first language, though she gained functional English through school and
    community programs, making her comfortable navigating bilingual environments. Catholicism plays a role in her values of service and compassion, prompting regular involvement in church activities and
    volunteer work. The strong sense of community in Patillas, marked by neighborly support and collective resilience, shapes her commitment to fostering harmony, cultural pride, and educational opportunity
    for the next generation.
attributes:
  skills: '[''Curriculum design'', ''Bilingual instruction (Spanish-English)'', ''Classroom management'', ''Differentiated instruction'', ''Educational technology integration'', ''Mentoring new teachers'',
