  hobbies: '[''Dancing plena and salsa'', ''Cooking traditional Puerto Rican dishes'', ''Gardening tropical fruits and herbs'', ''Hiking in Sierra de Cayey'', ''Volunteering at parish food pantry'', ''Leading
    a community book club'', ''Watching telenovelas'', ''Knitting blankets'', ''Playing volleyball in a neighborhood league'']'
  career_goals: Professionally, Justina aims to move into educational leadership within the next five years. She plans to earn a master’s degree in Educational Administration, positioning herself for a
    role as department head or school principal. Her ambition is to expand bilingual and multicultural programs across the Patillas school district, ensuring that curricula honor local heritage while meeting
    academic standards. She also hopes to develop a district‑wide mentorship network for new teachers, launch a community‑based mental‑health support initiative for students, and secure funding for a state‑of‑the‑art
    STEM lab that can serve both school and neighborhood after‑school programs. Ultimately, she envisions a school environment where structure supports creativity, and every student feels valued and prepared
    for future success.
