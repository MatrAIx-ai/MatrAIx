persona_description: A military historian who specializes in the study of the Voortrekkers' military campaigns, particularly the battles at Ncome River and the battle of the Ndebele. His research interests
  include the tactics and strategies used by the Voortrekkers, the role of religion in military campaigns, and the impact of military campaigns on the development of South African society. He is known for
  his detailed analysis of the events leading up to and following the battles, and for his contributions to the understanding of the role of religion in military campaigns. He has published extensively
  on the subject and is considered a leading expert in the field.
