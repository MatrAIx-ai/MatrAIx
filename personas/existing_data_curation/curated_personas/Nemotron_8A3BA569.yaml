personas:
  professional: Alicia Lamarca, a seasoned environmental analyst with a knack for GIS, blends meticulous data modeling in Python and R with hands‑on watershed stewardship, channeling their organized, curiosity‑driven
    approach into part‑time consulting for local nonprofits while mentoring aspiring STEM students.
  sports: Alicia Lamarca, an avid hiker on the Appalachian Trail and member of the Tucker County Outdoor Club, maintains fitness through weekly trail runs and seasonal cross‑country skiing, roots for the
    West Virginia Mountaineers and the Pittsburgh Steelers, and applies the same methodical planning to training as to her GIS projects.
  arts: Alicia Lamarca, who captures sunrise vistas through nature photography inspired by Ansel Adams and enjoys folk tunes from Sarah Kay, regularly attends local craft fairs and book club readings featuring
    works by Barbara Kingsolver, weaving their love of storytelling and visual art into both personal projects and community outreach.
  travel: Alicia Lamarca prefers purposeful travel, often planning weekend hikes in Shenandoah National Park or trips to the historic town of Harpers Ferry, while dreaming of a summer immersion in the Scottish
    Highlands to trace Celtic roots, balancing careful budgeting with a desire for cultural enrichment.
  culinary: Alicia Lamarca, a proficient home cook, reimagines traditional Appalachian dishes like ramp soup and smoked trout by swapping butter for olive oil, adding kale and quinoa for a health‑focused
    twist, and delights in coaxing heirloom tomatoes and wild mushrooms from their garden into vibrant stews and rustic breads.
  core: Alicia Lamarca blends data‑driven pragmatism with a love of Appalachia’s wild beauty, juggling spreadsheets, garden rows, and a habit of humming folk melodies while handling projects, sometimes
    sacrificing sleep for the perfect analysis.
background:
  cultural: Alicia grew up in a small town within the Appalachian region of West Virginia, where close‑knit community ties and a deep connection to the natural landscape shaped her worldview. Her family
    emphasized practicality, self‑reliance, and the importance of education, encouraging her to pursue a science degree at a state university. The regional culture’s focus on stewardship of the land, community
    service, and preserving local traditions—such as attending county fairs, participating in church gatherings, and maintaining family recipes—has influenced her volunteerism and interest in environmental
    issues. While she identifies with broader American cultural norms, she draws on the resilient, collaborative spirit characteristic of Appalachian communities.
attributes:
  skills: '["Data analysis", "Statistical modeling", "GIS mapping and spatial analysis", "Technical writing", "Project management", "Python programming", "R programming", "Advanced Excel", "Public speaking
    and workshop facilitation", "Field data collection"]'
  hobbies: '["Hiking and trail walking", "Nature photography", "Gardening (vegetable and heirloom)", "Reading (science, history, biographies)", "Book club participation", "Knitting", "Cooking regional cuisine",
    "Volunteer STEM workshops", "Genealogy research", "DIY home improvement"]'
  career_goals: Alicia aims to re‑enter the professional world by leveraging her analytical and environmental expertise to support local non‑profits, government agencies, or community organizations focused
    on natural resource management. In the next three to five years she plans to obtain a GIS certification to deepen her technical skill set and secure part‑time consulting work that offers flexibility
    for personal responsibilities. Her longer‑term ambition is to lead community‑based projects that blend data‑driven decision making with public outreach, and to mentor high‑school students—especially
    girls—in STEM through after‑school programs. She also envisions establishing a modest freelance business offering data analysis and environmental reporting services for regional stakeholders.
