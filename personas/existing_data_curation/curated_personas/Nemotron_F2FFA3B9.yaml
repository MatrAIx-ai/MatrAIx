  hobbies: '[''Sketching'', ''Photography'', ''Hiking'', ''Playing basketball'', ''Reading philosophy'', ''DIY woodworking'', ''Attending art exhibitions'', ''Learning digital illustration'']'
  career_goals: Driven by a competitive spirit, William aims to advance from sales associate to store manager within the next two to three years, targeting recognition as a top sales performer in his district.
    He plans to supplement his high‑school diploma with an associate’s degree in business administration or complete a retail management certification program, leveraging his curiosity to learn about supply‑chain
    analytics and digital merchandising. Long‑term, he envisions opening a boutique that fuses his love for contemporary art with curated retail, perhaps incorporating a small gallery space to showcase
    emerging local artists.
