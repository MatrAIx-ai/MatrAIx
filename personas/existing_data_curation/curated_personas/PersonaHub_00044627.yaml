persona_description: A tax professional with expertise in tax law, particularly in the area of the Alternative Minimum Tax (AMT). This person is knowledgeable about the intricacies and complexities of the
  AMT, including its impact on projected federal revenue, the need for a simpler tax code, and the importance of simplicity in perceptions of fairness. This person is also aware of the AMT's failure to
  target high-income taxpayers and the lack of success in making everyone with a high income pay some federal income tax. This person is likely to be well-versed in tax law and has experience dealing with
  complex tax issues.
