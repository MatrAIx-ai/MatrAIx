personas:
  professional: Eugenia Storey, a 5‑year‑old budding creator, dives into preschool art and storytelling with a fierce competitive streak, preferring to experiment freely rather than follow rigid rules,
    and they often question the teacher’s instructions before launching into projects.
  sports: Eugenia Storey, a 5‑year‑old, cheers for the local MLB team the River City Rangers while playing on the Tiny Tigers youth soccer club, sprinting ahead in games with a fierce desire to win and
    they often prefer spontaneous tag over structured drills.
  arts: Eugenia Storey, a 5‑year‑old, immerses themselves in bright crayons and finger paints, often recreating Eric Carle’s butterfly motifs while humming the Frozen soundtrack and they proudly display
    their drawings of the Mona Lisa alongside cartoon characters.
  travel: Eugenia Storey, a 5‑year‑old, dreams of revisiting Disney World’s Magic Kingdom and exploring the seaside boardwalk of Atlantic City, but prefers day trips to Grandma’s farm where they can chase
    chickens and collect seashells, and they always insist on packing their beloved stuffed panda.
  culinary: Eugenia Storey, a 5‑year‑old, loves the cheesy comfort of mac‑and‑cheese, the crunch of carrot sticks with ranch dip, proudly mixes batter for chocolate cupcakes, and they insist on sprinkling
    rainbow sprinkles on everything.
  core: Eugenia Storey, a curious and competitive 5‑year‑old, balances spontaneous artistic bursts with a skeptical eye, turning everyday moments into mini‑adventures even if they sometimes forget to tidy
    up.
background:
  cultural: Eugenia is a white child raised in Butte, Montana, a small town with a historic mining heritage and strong ties to the surrounding wilderness. Her family values self‑reliance, community cooperation,
    and an appreciation of the outdoors, which is reflected in weekend hikes, fishing trips, and visits to local museums that showcase Montana’s frontier history. The town’s blend of western folklore, community
    festivals, and a close‑knit school environment shapes her worldview, giving her exposure to both traditional rural American culture and the diverse stories of the Native peoples who have long inhabited
    the region.
attributes:
  skills: '[''color recognition'', ''basic counting'', ''drawing and coloring'', ''improvisational storytelling'', ''simple puzzle solving'', ''building with blocks'']'
  hobbies: '[''drawing and painting'', ''nature walks and rock collecting'', ''building forts'', ''improvisational role‑play'', ''attending county fairs'', ''simple competitive games'']'
  career_goals: Even at five, Eugenia dreams big. She loves looking at picture books about astronauts, wildlife explorers, and famous artists, and she often declares she wants to become a painter, an astronaut,
    or a wildlife researcher when she grows up. Her competitive streak fuels a desire to be the best at drawing contests at school and to win treasure‑hunt games during community events. She envisions herself
    creating art that tells stories about the mountains and rivers she loves, and she imagines discovering new places in science class.
