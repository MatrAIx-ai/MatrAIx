  hobbies: '[''watching sports (Knights, Raiders)'', ''recreational basketball'', ''live concerts'', ''biking/hiking in Red Rock Canyon'', ''multiplayer video gaming'', ''socializing at local bars'', ''volunteering
    at food bank'']'
  career_goals: John aims to transition from frontline delivery work to a supervisory or logistics‑coordination role within the next five years. He plans to acquire a commercial driver’s license (CDL) for
    larger trucks and to complete a certification in supply‑chain management offered by a local community college. His longer‑term ambition is to lead a small fleet of couriers, overseeing route optimization,
    staff scheduling, and customer‑experience standards. Financially, he hopes to purchase a modest home in North Las Vegas and build a stable retirement fund, while also exploring the possibility of starting
    his own niche delivery service that emphasizes rapid, friendly service for local businesses.
