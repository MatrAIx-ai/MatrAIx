  hobbies: '["watercolor painting", "landscape photography", "hiking and fly-fishing", "chess", "trivia nights", "genealogy research", "volunteering as museum docent", "visiting art galleries"]'
  career_goals: Rene aims to solidify his reputation as the go‑to supervisor for operational excellence within the Beaver County health‑care network before retirement. He plans to earn the Certified Professional
    Cleaner (CPC) credential to formalize his expertise, and to spearhead a county‑wide sustainability initiative that replaces conventional chemicals with low‑impact alternatives. Over the next two years
    he hopes to mentor at least three junior supervisors, documenting his best‑practice manuals for future staff. Ultimately, he aspires to transition into a consulting role—either as an internal adviser
    for the hospital’s facilities department or as an independent consultant for small‑business cleaning operations—allowing him to leverage his competitive drive while maintaining a flexible schedule for
    family and personal projects.
