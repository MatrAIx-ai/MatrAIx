  hobbies: '[''model kit building'', ''strategy video gaming (Civilization, Minecraft)'', ''playing acoustic guitar'', ''reading non‑fiction (history, science)'', ''Boy Scout activities and merit badges'',
    ''attending local high school football games'']'
  career_goals: In the short term, Christopher aims to maintain a strong academic record through the remainder of high school, earn the Eagle Scout rank, and deepen his coding abilities by completing online
    Python courses. He also plans to secure a part‑time volunteer position with the county’s public works department to gain exposure to infrastructure projects. Long‑term, he aspires to obtain a scholarship
    for a technical college where he would study civil engineering or computer science, ultimately pursuing a career that offers clear structure and contributes to modernizing his hometown’s infrastructure.
    As a backup path, he is interested in a disciplined, service‑oriented profession such as firefighting or law enforcement, drawn by the predictable schedules and community focus of those roles.
