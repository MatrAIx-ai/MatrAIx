personas:
  professional: Maria Torrestorres is a seasoned mental‑health counselor with over three decades of bilingual practice, expertly integrating CBT, trauma‑informed care, and mindfulness into group programs
    for seniors while balancing her curiosity for new evidence‑based techniques with a methodical, organized approach to program design and mentorship.
  sports: Maria Torrestorres keeps active through gentle yoga sessions, weekly strolls with the Queens Senior Walking Club in Flushing Meadows Corona Park, and cheering on the New York Mets in baseball
    and the New York Knicks during basketball season, preferring low‑impact exercise that balances her need for movement with her anxiety‑aware mindset.
  arts: Maria Torrestorres expresses her artistic side by painting watercolor cityscapes inspired by Edward Hopper, immerses herself in classic novels by Jane Austen and contemporary memoirs like Educated,
    and regularly attends New York Philharmonic concerts featuring Leonard Bernstein, while occasionally enjoying Broadway productions such as Hamilton starring Lin‑Manuel Miranda.
  travel: Maria Torrestorres favors culturally rich trips that blend leisurely gardening tours and historical exploration, having visited Mexico City’s markets, Seville’s Alcázar, and the High Line’s seasonal
    blooms, she now dreams of a quiet retreat in the New Mexico desert and a springtime walk through the New York Botanical Garden, planning each journey with detailed itineraries while balancing her modest
    retirement budget.
  culinary: Maria Torrestorres showcases advanced cooking skills in the kitchen, perfecting traditional dishes like tamales stuffed with pork and masa, aromatic arroz con pollo seasoned with saffron and
    fresh cilantro, and homemade salsa verde brimming with tomatillos and chipotle, while she frequently harvests basil, oregano, and mint from her garden to infuse her meals with home‑grown flavor.
  core: Maria Torrestorres merges methodical counseling expertise with a garden‑loving, art‑focused soul, channeling her persistent anxiety into mindful yoga, watercolor painting, and community workshops—though
    she often over‑books her calendar and battles sleepless nights.
background:
  cultural: Maria Julissa is a second‑generation Latina, born to Mexican immigrant parents who settled in New York City in the 1960s. She grew up bilingual, speaking Spanish at home and English at school,
    and was raised with a strong sense of familismo, respeto, and Catholic traditions. Her cultural identity blends Mexican heritage—celebrating Día de los Muertos, quinceañeras, and cooking family recipes—with
    the multicultural tapestry of Queens, where she engages with Puerto Rican, Dominican, and other Latinx communities. This background informs her empathetic counseling style, her commitment to serving
    Spanish‑speaking seniors, and her appreciation for community festivals, music, and religious observances.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Trauma‑informed counseling'', ''Bilingual counseling (English/Spanish)'', ''Crisis intervention and suicide prevention'', ''Group therapy facilitation'',
    ''Case management and resource navigation'', ''Clinical documentation and HIPAA compliance'', ''Cultural competency and sensitivity training'', ''Community outreach program development'', ''Mindfulness‑based
    stress reduction techniques'', ''Active listening and empathetic communication'', ''Structured assessment tools (PHQ‑9, GAD‑7)'', ''Supervision and mentorship of junior counselors'', ''Program evaluation
    and outcome measurement'', ''Organizational and scheduling skills'', ''Continuing education and evidence‑based practice integration'']'
  hobbies: '[''Gardening'', ''Reading (classic literature and memoirs)'', ''Bilingual book club participation'', ''Cooking traditional Hispanic dishes'', ''Yoga and guided meditation'', ''Walking in local
    parks'', ''Watercolor painting'', ''Journaling'']'
  career_goals: Maria aims to expand her impact by establishing a culturally tailored mental‑health outreach program for Spanish‑speaking seniors in Queens, developing a bilingual training curriculum that
    blends mindfulness with trauma‑informed care, and obtaining a supervisory license to mentor upcoming mental‑health professionals. She also aspires to author a bilingual guidebook on managing anxiety
    and depression in older adults, and to lead community workshops that bridge traditional Hispanic healing practices with modern therapeutic approaches.
