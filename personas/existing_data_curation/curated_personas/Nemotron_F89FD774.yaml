  career_goals: Monina aims to transition from front‑line representative to a supervisory role within the next two years, targeting a Team Lead position where she can shape customer experience strategies
    and mentor staff. She plans to obtain a Customer Service Management certification and eventually pursue an associate degree in Hospitality or Business Administration. Long‑term, Monina envisions blending
    her passion for culture and community by launching a small artist‑café that showcases Southeast Asian art and cuisine, while also offering workshops on communication skills and stress‑relief practices.
    In parallel, she hopes to volunteer as a cultural liaison for local nonprofit programs that assist immigrant families in Lee County, leveraging her bilingual abilities and organized approach to create
    supportive resources.
