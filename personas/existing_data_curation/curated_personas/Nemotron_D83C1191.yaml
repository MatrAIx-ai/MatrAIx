  career_goals: Dianelys aims to formalize her expertise by obtaining a Certified Nursing Assistant (CNA) credential and eventually pursuing a Licensed Practical Nurse (LPN) degree. She plans to complete
    her GED to satisfy the education prerequisite for further nursing studies. She is eager to lead a patient‑advocacy program that bridges language barriers for the Puerto Rican senior community in Hoffman
    Estates. Additionally, she hopes to coordinate health‑education workshops on nutrition and chronic‑disease management, integrating practical dietary advice from her cultural heritage. Long‑term, she
    envisions starting a small home‑care agency focused on culturally responsive care for Hispanic families.
