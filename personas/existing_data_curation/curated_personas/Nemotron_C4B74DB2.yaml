  hobbies: '["Hiking in the Cascade foothills", "Community theater acting", "Local wine‑tasting groups", "Nature and portrait photography", "Gardening (vegetable and flower beds)", "Cooking (Pacific Northwest
    cuisine)", "Book club member", "Volunteering at free dental clinics", "Woodworking (furniture projects)", "Cycling around Tacoma and the surrounding area"]'
  career_goals: Robert aims to keep his practice at the forefront of patient‑centered care while gradually integrating more digital workflows that enhance efficiency without sacrificing the personal touch
    he values. He is passionate about mentoring the next generation of dentists and hopes to formalize a mentorship program within his clinic. Community service remains a priority, and he plans to expand
    free‑clinic hours for underserved residents of Tacoma and surrounding Pierce County. As he approaches retirement, his goal is to transition ownership to a trusted associate, allowing him to maintain
    a lighter, flexible schedule that accommodates his love of group activities and travel.
