persona_description: A paleontologist who specializes in the study of chordate evolution, particularly the Burgess Shale fossils. They have a keen interest in the anatomy and morphology of early chordates,
  and are particularly interested in the relationships between different chordate groups. They are also knowledgeable about the Burgess Shale environment and the geological context in which the fossils
  were found. They have a deep understanding of the Burgess Shale fauna and are actively involved in the current research on the full redescription of Pikaia.
