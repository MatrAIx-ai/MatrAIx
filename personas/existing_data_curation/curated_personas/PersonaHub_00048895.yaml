persona_description: A teacher and researcher in the field of dance pedagogy and motor learning, with expertise in the principles and practices of teaching dance. They specialize in the development of motor
  control and movement in dancers, and their work has been influential in shaping the current understanding of dance education and performance. They have written extensively on the topic of motor learning
  and control for dance, and have been influential in the development of new teaching methods and techniques for dancers. They are also known for their work in the area of implicit motor learning, and have
  developed techniques that help dancers develop finer control throughout the body.
