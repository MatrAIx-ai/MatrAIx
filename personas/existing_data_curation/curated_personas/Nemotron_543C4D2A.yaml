personas:
  professional: Andres Bonillagarcia leverages their bilingual cash‑handling expertise, keen observational eye, and passion for community art to deliver friendly, accurate service at their retail job while
    quietly eyeing a supervisory role that could let them merge art retail with their entrepreneurial dream.
  sports: Andres Bonillagarcia enjoys watching Houston Dynamo matches and the occasional MLS game, participates in a casual Sunday kick‑around with friends at Hermann Park, and balances their love for soccer
    with regular walks in the park to stay active.
  arts: Andres Bonillagarcia spends evenings watercoloring folklore vignettes, sketches Houston’s skyline, attends openings at the Contemporary Arts Museum Houston, draws inspiration from Frida Kahlo, Diego
    Rivera, and the indie band Café Tacvba, and volunteers on community mural projects that celebrate their heritage.
  travel: Andres Bonillagarcia prefers thoughtfully planned weekend getaways to historic art towns—like Santa Fe’s Canyon Road, the colonial plazas of San Miguel de Allende, and Barcelona’s Gothic Quarter—while
    dreaming of a future cultural immersion trip to the vibrant markets of Oaxaca when their shop finances are secure.
  culinary: Andres Bonillagarcia is an intermediate home chef who lovingly prepares tamales with masa and masa harina, slow‑cooks mole with ancho chilies, cacao, and cinnamon, and simmers pozole using hominy
    and pork, constantly tweaking family recipes with fresh epazote and roasted corn.
  core: Andres Bonillagarcia is a creatively curious, art‑loving cashier navigating anxiety‑driven disorganization while dreaming of a boutique art shop that blends folk traditions with modern expression.
background:
  cultural: Andres is a first‑generation Mexican‑American who grew up in Houston’s East End in a bilingual household. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    Cinco de Mayo, and Catholic holidays with food, music, and communal gatherings. He blends Mexican heritage with Texan influences, reflected in his language, cuisine, and participation in local cultural
    festivals. The immigrant experience instilled a deep respect for hard work, family solidarity, and community support, shaping his values and daily life.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Bilingual communication (Spanish/English)'', ''POS system operation'', ''Basic arithmetic'', ''Conflict de‑escalation'', ''Observational awareness'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Cooking traditional Mexican dishes'', ''Listening to Mexican folk and Latin indie music'', ''Playing acoustic guitar'', ''Visiting art galleries'',
    ''Reading about Mexican history and modern art'', ''Watching soccer'', ''Walking in local parks'', ''Volunteering at community festivals'']'
  career_goals: He hopes to advance to a supervisory role within the store or a nearby retail chain, pursuing a retail management certificate at a community college once his schedule allows. In the longer
    term, Andres dreams of opening a small shop that combines his love of art and his cultural roots, selling handmade Mexican folk art, prints, and supply kits for community workshops. He also aims to
    develop better organizational habits to reduce his anxiety and to secure a more predictable income that can support his family's educational aspirations.
