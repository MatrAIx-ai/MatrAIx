  career_goals: She aims to achieve journeyman-pipefitter certification and move into a lead foreman role within the next three years. Anita plans to specialize in green building piping, integrating reclaimed
    materials and energy-efficient designs into new construction. Long-term, she envisions launching a consulting firm that offers sustainable plumbing solutions and artistic pipe installations for community
    projects, while serving on her local union’s leadership board to advocate for greater diversity in the trades.
