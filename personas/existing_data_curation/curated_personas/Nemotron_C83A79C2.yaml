  hobbies: '["Reading","Gardening","Yoga","Mindfulness meditation","Knitting","Baking","Literacy tutoring","Journaling"]'
  career_goals: Caitlin aims to deepen her impact on school-wide learning by pursuing a Master’s degree in Educational Leadership within the next two years. She aspires to become a grade‑level chair or
    instructional coach, where she can mentor new teachers and champion evidence‑based instructional practices. A long‑term ambition is to lead the development of a comprehensive social‑emotional learning
    program that embeds compassion and community building into the school culture. Ultimately, she hopes to qualify for a principal position, overseeing a school where structured, inclusive, and harmonious
    learning environments thrive.
