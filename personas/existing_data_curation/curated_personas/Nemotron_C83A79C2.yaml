personas:
  professional: Caitlin Gardner, an elementary school teacher who crafts meticulously data‑driven lesson plans, integrates Google Classroom and SMART Boards, and employs restorative discipline, uses their
    love of structure and deep compassion to nurture a predictable, inclusive classroom where each student’s growth is carefully tracked.
  sports: Caitlin Gardner, a dedicated yoga practitioner who attends sunrise sessions at a local studio, follows the New York Mets during baseball season, occasionally joins a co‑ed community soccer league
    in the spring, and supports the New York Giants football team, all while using daily walks in their backyard garden as low‑impact cardio.
  arts: Caitlin Gardner, an avid reader of children’s classics like Kate DiCamillo and Dr. Seuss, enjoys knitting blankets while listening to Norah Jones and folk playlists, and finds inspiration in the
    illustrations of Oliver Jeffers, regularly visits the local library’s art exhibit featuring emerging illustrators, and occasionally attends off‑Broadway shows such as ‘Hamilton’ for a creative boost.
  travel: Caitlin Gardner, an intentional traveler who prefers weekend getaways to the Jersey Shore and day trips to Philadelphia’s museums, dreams of a fall foliage tour through New England and a cultural
    pilgrimage to Ireland’s countryside, yet budgets carefully to ensure the master’s program funding remains intact.
  culinary: Caitlin Gardner, a home‑cooking enthusiast who harvests tomatoes, basil, and zucchini from their garden to craft fresh marinara and seasonal ratatouille, bakes buttery blueberry muffins and
    Irish soda bread on weekends, and knits while waiting for dough to rise, savoring the tactile rhythm of both crafts.
  core: Caitlin Gardner, a structure‑loving teacher who balances meticulous planning with quiet compassion, fuels their days with gardening, knitting, and mindful pauses, while cautiously budgeting for
    future dreams.
background:
  cultural: Caitlin was raised in a middle‑class, predominantly white suburb of New Jersey, with family roots tracing back to Irish and Italian immigrants who settled in the region during the mid‑20th century.
    Her upbringing emphasized the value of education, community service, and family gatherings centered around holidays such as Thanksgiving, Fourth of July barbecues, and St. Patrick’s Day celebrations.
    Active in her local community church, she participated in volunteer programs and neighborhood clean‑ups, reinforcing a collaborative spirit. While her own heritage is largely European, she embraces
    the cultural diversity of Old Bridge’s growing Asian and Hispanic populations, incorporating multicultural perspectives into her teaching to promote inclusivity and cultural awareness.
attributes:
  skills: '["Lesson planning","Curriculum alignment","Data-driven assessment","Differentiated instruction","Classroom management","Restorative discipline","Educational technology integration","Student counseling","Parent
