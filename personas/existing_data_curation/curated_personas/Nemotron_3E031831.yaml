  career_goals: Juan intends to obtain his GED and enroll in a local vocational program to become a certified HVAC technician or electrician, aiming for a stable, well‑paid trade position that offers predictable
    hours and a clear career ladder. In the medium term, he hopes to launch a small home‑repair business serving his community, allowing him to apply his meticulous approach while maintaining a routine
    that supports his family’s financial stability.
