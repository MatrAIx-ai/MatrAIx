personas:
  professional: Juan Rodriguez is a disciplined home‑maintenance enthusiast who leverages their self‑taught carpentry, plumbing, and basic electrical troubleshooting skills to keep their household running
    like a well‑oiled machine, and who, with their methodical mindset, is preparing to earn a GED and enroll in a vocational HVAC program to convert their systematic precision into a certified trade career.
  sports: Juan Rodriguez is a quiet outdoors enthusiast who spends early mornings fishing at the nearby River Creek as a member of the Riverbend Anglers Club, follows the regional minor‑league baseball
    team the Valley Vipers on weekends, and occasionally jogs along the city park trail to maintain baseline fitness, preferring solo activity over team sports.
  arts: Juan Rodriguez channels their love of order into creative outlets, meticulously assembling scale model kits of historic aircraft, crafting wooden birdhouses that echo traditional folk designs, and
    unwinding to the acoustic ballads of regional troubadour Manuel Ríos, whose lute‑driven melodies remind them of family gatherings.
  travel: Juan Rodriguez prefers low‑key, well‑planned getaways, such as weekend road trips to the quiet mountain town of Aspen Ridge for hiking and fishing, a meticulously organized backpacking trek through
    the Sierra del Sol national park, and an upcoming cultural immersion tour of the historic colonial city of Antigua, where they can sample local markets while sticking to a tight itinerary.
  culinary: Juan Rodriguez delights in cooking hearty, spice‑laden stews and grilled corn dishes, regularly preparing pork, chilies, and corn masa into slow‑cooked family stews, while their modest kitchen
    setup reflects a preference for practical, repeatable cooking over experimental gastronomy.
  core: Juan Rodriguez is a methodical solitary craftsman who turns routine into mastery, but sometimes lets a penchant for collecting rare model kits derail their otherwise tight budget.
background:
  cultural: Juan is a first‑generation Mexican‑American raised in the rural community of Nageezi, New Mexico. He grew up bilingual, speaking Spanish at home while learning English at school. His upbringing
    was steeped in Catholic traditions and Mexican cultural practices, such as celebrating Día de los Muertos and preparing family recipes passed down from grandparents. Living near the Navajo Nation, he
    also respects local Indigenous customs and incorporates a blend of regional influences into his daily life, while maintaining a strong attachment to his Mexican heritage and the practical, family‑centered
    values it instills.
attributes:
  skills: '["Household budgeting", "Home organization", "Basic carpentry", "Minor electrical repair", "Plumbing troubleshooting", "Gardening", "Routine scheduling", "Record‑keeping"]'
