  career_goals: She dreams of becoming a veterinarian because she loves caring for animals, and also imagines herself as a teacher who can guide younger children through stories and help them understand
    emotions. She aspires to learn about science in a practical way, hoping one day to work in a calm, structured environment where she can make a real difference.
