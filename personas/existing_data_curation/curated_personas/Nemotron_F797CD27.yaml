personas:
  professional: Sheila Vincent is a five‑year‑old pre‑schooler who channels a blend of curiosity and practicality into meticulously organized block constructions, arranging pieces by color and size before
    experimenting with new designs; they prefer quiet solo play but step up assertively when leading a group activity, and they use the structured routine of classroom projects to balance flexibility with
    reliability.
  sports: Sheila Vincent enjoys the rhythmic routine of preschool gymnastics at Bright Stars Kids Gym and belongs to the neighborhood Little Swimmers Club where they practice freestyle laps twice a week,
    while quietly cheering for the Chicago Cubs whenever a game is on TV; they favor solo activities like hopping on a small indoor trampoline over noisy team sports, balancing a love for movement with
    a need for calm.
  arts: Sheila Vincent, a budding five‑year‑old artist, spends afternoons drawing whimsical animals in the style of Dr. Seuss while humming Disney’s “Let It Go” from Frozen, eagerly watching the animated
    series “Bluey” for inspiration, and they collect stickers of Yayoi Kusama’s polka‑dot motifs, though they shy away from group art classes that feel too loud.
  travel: Sheila Vincent prefers meticulously planned family road trips to calm destinations like the local botanical garden where they can quietly examine butterflies, yet dreams of a gentle vacation to
    the serene beaches of Lake Tahoe and a future visit to the historic castles of Scotland, always insisting on a detailed itinerary with plenty of breaks to avoid overstimulation and keeping travel expenses
    within their modest savings.
  culinary: Sheila Vincent loves the creamy comfort of mac and cheese, the sweet crunch of apple slices dipped in peanut butter, and proudly claims the title of “PB&J chef” after mastering the art of spreading
    peanut butter evenly on whole‑grain bread, though they stubbornly refuse to try broccoli and often request extra honey drizzled on their pancakes.
  core: Sheila Vincent is a quietly curious five‑year‑old who balances meticulous solo play with bursts of assertive leadership, navigates intense emotions, nurtures a budding savings habit, and delights
    in simple creative and culinary pleasures while occasionally succumbing to anxiety spikes.
background:
  cultural: She grows up in an African‑American family in Los Angeles, surrounded by the rich cultural tapestry of the city. Family gatherings often feature gospel music, soul food dishes such as collard
    greens and sweet potato pie, and storytelling that connects her to her ancestors. She attends community events at the California African American Museum and participates in after‑school programs that
    celebrate black art, music, and history, shaping her identity and values.
