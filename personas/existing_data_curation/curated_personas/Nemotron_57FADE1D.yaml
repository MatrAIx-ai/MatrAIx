personas:
  professional: Yajaira Castro is a seasoned marketing manager who leverages data‑driven strategy, bilingual content creation, and meticulous project management to craft culturally resonant campaigns, while
    her love of structure and quiet focus drives a methodical, sometimes over‑analytical, approach to every metric.
  sports: Yajaira Castro enjoys low‑impact fitness such as weekend yoga at Sunset Yoga Studio and solo jogging with the Miami Run Club, follows the Miami Heat and the Miami Marlins closely, and prefers
    structured, schedule‑driven workouts over spontaneous team sports.
  arts: Yajaira Castro immerses herself in contemporary fiction by Elena Ferrante and personal‑development works by James Clear, finds comfort in the music of Joni Mitchell and the instrumental jazz of
    Gonzalo Rubalcaba, and attends occasional performances at the Adrienne Arsht Center, using these artistic encounters as quiet retreats.
  travel: Yajaira Castro favors meticulously planned short‑haul trips, having explored the historic French Quarter in New Orleans, the art‑deco streets of Miami Beach, and the volcanic landscapes of Iceland,
    while dreaming of a solo trek along the Inca Trail to Machu Picchu.
  culinary: Yajaira Castro, an intermediate home chef, delights in preparing heritage dishes like pupusas filled with queso fresco and refried beans and tamales wrapped in banana leaves, often seasoning
    them with fresh cilantro and roasted poblano peppers, and occasionally pairs meals with a crisp Sauvignon Blanc.
  core: Yajaira Castro is a methodical, anxiety‑prone marketer who finds solace in solitary routines, puzzle‑solving, and cooking, yet battles a habit of impulse boutique shopping when stress spikes.
background:
  cultural: Yajaira was raised in a Salvadoran household where family ties and community cooperation are central. Spanish was spoken at home, and she celebrates Salvadoran traditions such as Día de la Independencia
    (September 15) and the festive preparation of pupusas during holidays. Her cultural upbringing emphasizes respect for elders, collective well‑being, and a strong work ethic, all of which shape her considerate
    and cooperative nature. Living in Homestead, Florida, she bridges her Salvadoran roots with the multicultural environment of Miami‑Dade County, using her bilingual skills to connect with both her local
    community and a broader audience.
attributes:
  skills: '["Digital Marketing Strategy", "Content Creation", "SEO/SEM", "Data Analytics", "Project Management", "Brand Management", "Bilingual Communication (Spanish/English)", "Social Media Advertising",
