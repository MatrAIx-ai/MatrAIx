  hobbies: '["Reading fiction and non-fiction", "Journaling", "Gardening", "Cooking traditional Salvadoran dishes", "Yoga and meditation", "Puzzle solving (crosswords, Sudoku)", "Volunteering at local community
    center"]'
  career_goals: Yajaira aims to progress to a senior marketing director role within the next five years, leading integrated, data-focused campaigns that align with her company's values of community impact
    and sustainable growth. She aspires to deepen her expertise in multicultural market strategy, particularly serving the growing Hispanic population in South Florida. In the long term, she hopes to launch
    a boutique consultancy that helps small businesses implement structured, predictable marketing processes, allowing her to maintain a balanced work‑life routine while mentoring emerging marketers.
