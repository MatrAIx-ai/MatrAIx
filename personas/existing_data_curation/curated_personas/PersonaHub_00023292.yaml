persona_description: A multidisciplinary scientist involved in the development and application of scintillating materials in various fields such as high energy physics, nuclear physics, medical imaging,
  and security devices. He/she has a strong background in crystallography, solid state physics, luminescence, and defects in solids. The persona has expertise in interdisciplinary research and has successfully
  established a community of scientists to develop new fields of applied research on the physics of scintillation processes in solids. They have contributed to the development of new scintillator materials
  and devices, such as PbWO4, YAP, LuAP, and LuAG, and have made significant contributions to the field of crystallography. The persona is likely to be involved in international collaborations and has a
  strong interest in advancing the field of applied research on the physics of scintillation processes in solids.
