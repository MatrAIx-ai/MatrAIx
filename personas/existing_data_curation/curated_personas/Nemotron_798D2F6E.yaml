  career_goals: Jayme aims to secure a senior regional manager position within the next three years, leveraging her deep operational expertise to oversee multiple locations. She also plans to complete her
    bachelor's degree in Business Administration, which will formalize her knowledge and open doors to corporate training or consulting roles. Mentoring younger employees and establishing a legacy of reliable,
    people‑focused management are central to her ambition, all while maintaining the work‑life balance that supports her family and community commitments.
