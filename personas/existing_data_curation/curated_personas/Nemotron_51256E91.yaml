  career_goals: Seeking to advance from frontline paramedic to a leadership role in emergency medical services, Wang Yao aims to earn a Critical Care Paramedic certification and a Master of Public Health
    within the next five years. He is interested in spearheading a data-analytics initiative that tracks response times and patient outcomes across Santa Clara County, leveraging his STEM expertise to improve
    system efficiency. Long-term, he envisions establishing a community outreach program that educates underserved neighborhoods about first-aid and prevention, while also exploring opportunities to integrate
    telemedicine triage into the EMS workflow.
