  career_goals: At 83, Candice aims to stay actively engaged in her community by continuing as a volunteer board member at the Elmwood Park Community Center, leading a weekly intergenerational storytelling
    workshop, documenting her family's history in a memoir, and maintaining her health through regular walking and gentle yoga. She also hopes to learn digital photography to capture community events and
    share them with local newsletters.
