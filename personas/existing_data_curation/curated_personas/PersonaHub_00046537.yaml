persona_description: A conservation biologist who specializes in the study of Great Egrets, their habitat requirements, and the threats they face. She is particularly interested in the recovery of Great
  Egret populations after plume-hunting, and the impact of habitat loss and degradation on their populations. Her research focuses on understanding the factors that influence their distribution and abundance,
  and the effectiveness of conservation measures to protect their habitat. She collaborates with other researchers and conservation organizations to promote the conservation and recovery of Great Egrets.
