personas:
  professional: A fledgling freelance illustrator and indie game designer, Christopher Wood transforms their love of the Wasatch wilderness and speculative narratives into digital paintings and Python‑driven
    interactive sketches, leveraging self‑taught coding and woodworking skills to sell niche artwork online while they often let flexible deadlines slide due to a relaxed approach to obligations.
  sports: A seasonal outdoor enthusiast, Christopher Wood spends crisp autumn weekends tackling the Wasatch trail network, hits the slopes for snowboarding in winter, follows the Utah Jazz and Real Salt
    Lake loyally, and occasionally joins a local rock‑climbing gym club to keep fit, preferring solo endurance challenges over team sports.
  arts: A solitary art aficionado, Christopher Wood devours the works of contemporary creators like Olafur Eliasson and Banks, curates a personal vinyl collection featuring Pink Floyd, David Bowie, and
    The Velvet Underground, sketches landscapes inspired by Ansel Adams, and fuels their speculative storytelling with the novels of Ursula K. Le Guin and the films of Christopher Nolan.
  travel: A low‑budget solo wanderer, Christopher Wood maps out weekend trips to nearby national parks such as Yellowstone and Grand Teton, dreams of photographing the aurora borealis over Iceland's remote
    valleys, and meticulously plans each journey using free open‑source map tools while avoiding crowded tourist hotspots.
  culinary: A modest home chef, Christopher Wood whips up quick pasta al pesto with fresh basil and pine nuts after a hike, experiments with smoked paprika‑spiced roasted chickpeas for snack, and treats
    themselves to late‑night record‑store take‑out sushi rolls, while preferring simple, flavorful dishes that don’t distract from creative projects.
  core: Christopher Wood is a curiosity‑driven introvert who blends solitary art, code, and mountain hikes into a flexible freelance dream, all while they juggle mild disorganization and a penchant for
    vintage vinyl.
background:
  cultural: Christopher grew up in a predominantly white, middle‑class suburb of Sandy, Utah, where outdoor recreation and a strong sense of community are common. The region’s proximity to the mountains
    fostered his appreciation for nature, while the area's conservative, family‑oriented values taught him self‑reliance and respect for personal space. At the same time, his exposure to the internet's
    global art and tech scenes has broadened his cultural outlook, allowing him to blend local traditions of independence with a curiosity for unconventional ideas and diverse creative expressions.
