personas:
  professional: Elizabeth Quijano, a retired community event coordinator and seasoned genealogist, leverages her meticulous budgeting skills, bilingual fluency, and competitive spirit to orchestrate parish
    festivals and senior‑center potlucks with unwavering precision and a quietly skeptical eye for detail.
  sports: Elizabeth Quijano stays active with sunrise garden walks, a weekly gentle yoga session, and by cheering for the St. Louis Cardinals and the Kansas City Chiefs from her porch, while competing in
    a senior bowling league at the local recreation center.
  arts: Elizabeth Quijano finds artistic solace in listening to mariachi and folk ballads by Lila Downs and Vicente Fernández, admiring Frida Kahlo’s self‑portraits in community exhibits, and losing herself
    in the pages of historical novels by Isabel Allende, which together shape her weekend rituals of tea and quiet reflection.
  travel: Elizabeth Quijano prefers carefully planned road trips and family reunions, having driven the historic Route 66 to Santa Fe for a cultural festival and taken a brief flight to San Antonio for
    a grand family celebration, now dreaming of a serene autumn visit to the vineyards of Napa Valley.
  culinary: Elizabeth Quijano, a master of slow‑cooked stews, mole poblano, and hand‑rolled tamales, delights in swapping heirloom tomatoes for roasted poblano peppers and adding a pinch of dark chocolate
    to deepen flavors, while proudly serving freshly harvested chilies and cilantro from her garden at every family gathering.
  core: Elizabeth Quijano blends quiet curiosity with steely practicality, channeling a competitive edge into weekly card battles, meticulous garden stewardship, and a lifelong quest to preserve family
    stories, all while maintaining an almost uncanny calm that masks a healthy dose of skeptical wit.
background:
  cultural: Elizabeth was raised in a bilingual Mexican‑American household, where Spanish language, Catholic faith, and family rituals were central. Growing up in Missouri, she blended Mexican traditions—such
    as Día de los Muertos altars, quinceañera celebrations, and traditional foods—with Midwestern customs, creating a hybrid cultural identity. She maintains strong ties to Mexican heritage through language,
    cuisine, and participation in local Hispanic community events, while also embracing the modesty, thrift, and neighborly spirit characteristic of the Cass County region. Her worldview reflects a respect
    for both her ancestors’ legacy and the broader American cultural landscape she has called home for most of her life.
