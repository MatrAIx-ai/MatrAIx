personas:
  professional: Tania Hernandez works as an aspiring community program coordinator, leveraging fluent bilingual communication, meticulous event planning, and basic graphic design skills to develop practical
    outreach initiatives for local families, and they consistently apply their routine‑focused, detail‑oriented mindset to keep programs running smoothly despite occasional stress‑driven worry.
  sports: Tania Hernandez enjoys salsa and Zumba classes, hikes weekly at Sweetwater Creek State Park, supports Atlanta United FC and the Atlanta Hawks, and plays as a midfielder in a community soccer league,
    blending energetic group workouts with a structured fitness schedule that helps ease their anxiety.
  arts: Tania Hernandez regularly attends live performances by Carlos Santana, explores vibrant murals inspired by Frida Kahlo, and streams Selena’s music, finding cultural resonance that fuels their creative
    volunteer projects and enriches their social gatherings.
  travel: Tania Hernandez prefers thoughtfully planned weekend getaways, such as hiking trips to Asheville, NC, family reunions in San Antonio for a traditional festive celebration, and dreaming of attending
    the Guelaguetza festival in Oaxaca, balancing adventure with modest budgeting and a desire for cultural immersion.
  culinary: Tania Hernandez loves cooking tamales, enchiladas rojas, and salsa verde, expertly using chipotle, epazote, and masa harina, and they often host dinner nights for friends, though they sometimes
    forget to grocery‑shop ahead, leading to last‑minute pantry raids and improvised ingredient swaps.
  core: Tania Hernandez is a habit‑driven community‑builder who stitches together cultural traditions, organized activism, and spontaneous bursts of anxiety‑fueled creativity, often juggling a meticulously
    planned calendar with occasional late‑night snack binges and impulsive festival purchases.
background:
  cultural: Tania is a first-generation Mexican American whose parents immigrated to the United States in the early 2000s. Growing up in a bilingual household, she celebrates Mexican holidays such as Día
    de los Muertos and Cinco de Mayo, while also participating in American traditions. Her family places a high value on close ties, community support, and the sharing of food and music. These cultural
    roots influence her passion for bilingual communication, community service, and preserving Mexican culinary and artistic traditions within the broader Woodstock community.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event planning and coordination'', ''Community outreach'', ''Public speaking'', ''Academic research and writing'', ''Social media management'',
    ''Organizational scheduling and documentation'', ''Basic graphic design'', ''Customer service'']'
  hobbies: '[''Salsa and Zumba dancing'', ''Cooking Mexican cuisine'', ''Volunteering at the food bank'', ''Community gardening'', ''Yoga'', ''Journaling'', ''Hiking'', ''Reading contemporary fiction'',
    ''Attending local festivals'']'
  career_goals: Tania aims to secure a full-time role as a community program coordinator within a nonprofit or local government agency that serves the Latinx community in the Atlanta metro area. She wants
    to leverage her organizational strengths and bilingual abilities to develop sustainable outreach programs. Over the next five years, she plans to pursue a master’s degree in public administration or
    social work to advance to a senior program manager position. Long-term, she hopes to lead a cultural center that preserves Mexican traditions while providing practical resources for families, maintaining
    a stable routine and achieving financial independence.
