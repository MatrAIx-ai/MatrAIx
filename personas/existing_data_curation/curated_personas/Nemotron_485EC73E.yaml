personas:
  professional: William Brown, although only four, already acts like a budding engineer, methodically stacking Lego blocks into intricate towers, balancing daring new designs with reliable tried‑and‑true
    structures, and persistently re‑testing his constructions when they wobble, showing a blend of curiosity and practicality.
  sports: William Brown, a proud member of the Sunnyvale Cubs U‑4 baseball team, eagerly practices batting drills with competitive zeal, prefers organized games over chaotic free‑play, and also enjoys solitary
    scooter rides on the neighborhood sidewalk, balancing social interaction with a need for alone time.
  arts: William Brown, an enthusiastic follower of Dr. Seuss stories and the Sesame Street cast, spends afternoons drawing whimsical characters while humming “C is for Cookie,” rigorously critiquing his
    color choices and insisting on perfect symmetry, merging their critical nature with creative expression.
  travel: William Brown, who loves meticulously plotted family getaways, treasures their annual trip to the Grand Canyon’s junior ranger program and dreams of exploring the magic of Disney World, mapping
    each attraction in a colorful notebook before leaving home, reflecting their organized and curiosity‑driven travel style.
  culinary: William Brown, a kitchen assistant in training, delights in the gooey stretch of mozzarella on a pizza slice, the comforting creaminess of macaroni with cheese, and meticulously arranges banana
    slices into smiley faces on his cereal bowl, showing methodical play even in dining.
  core: William Brown is a methodical mini‑strategist who blends curiosity with caution, hoards tiny treasures, worries about the unknown, and thrives on structured play while silently resenting forced
    group harmony.
background:
  cultural: William is raised in a typical Midwestern white family in Mount Vernon, Ohio. His community values a strong work ethic, modesty, and practical skills, reflected in family activities like attending
    the county fair, church gatherings, and library storytimes. He grows up surrounded by the rhythms of small‑town life—seasonal events, neighborhood playdates, and a focus on self‑reliance. His parents
    encourage structured learning, hands‑on exploration, and participation in community programs, blending local traditions with modern educational resources.
