  career_goals: Although only four, William already expresses a strong desire to become a problem‑solver. He talks about wanting to be an engineer who designs machines, a mechanic who fixes things, or an
    astronaut who explores space. He also dreams of leading a sports team, seeing competition as a way to prove his abilities. His competitive streak drives him to aim for roles where he can plan, organize,
    and achieve measurable results.
