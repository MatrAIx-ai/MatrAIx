  career_goals: Although officially retired, William aims to channel his disciplined work ethic into volunteer consulting for local non‑profits, helping them set up sound financial controls. He hopes to
    mentor aspiring entrepreneurs through the Lafayette Small Business Development Center, sharing practical strategies for organization and growth. A long‑standing personal ambition is to write a memoir
    that distills the lessons of perseverance, structure, and kindness he has learned over seven decades. He also wants to assist his adult children with estate planning, ensuring a smooth transition of
    family assets while preserving his heritage. Finally, he aspires to contribute to the Lafayette Historical Society by organizing archival projects that capture the town’s mid‑century evolution.
