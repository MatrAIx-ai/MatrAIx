personas:
  professional: William Stoyanovich, a retired operations and supply‑chain specialist turned volunteer consultant, leverages his meticulous Excel modeling, project‑coordination expertise, and disciplined,
    high‑standard mindset to streamline nonprofit finances while mentoring emerging entrepreneurs with structured, patient guidance.
  sports: William Stoyanovich stays active by walking his dog along the Wabash River trail, joining the Lafayette Senior Cycling Club’s weekend rides, cheering on the Purdue Boilermakers basketball team
    and the Indianapolis Colts, and playing bridge competitively at the senior center, treating each session as a mental workout.
  arts: William Stoyanovich enjoys attending community‑theater productions starring local talent, unwinding to the swing of Duke Ellington and Count Basie big‑band recordings, and curating vintage posters
    of classic Hollywood icons like Cary Grant that he proudly displays in his workshop.
  travel: William Stoyanovich prefers well‑planned road trips that combine historical sites and scenic routes, having recently driven the Blue Ridge Parkway to explore Asheville’s craft breweries, and dreaming
    of a leisurely tour of San Antonio’s River Walk where he can photograph colonial architecture.
  culinary: William Stoyanovich, a competent home cook, routinely prepares hearty pot roast with carrots, potatoes, and rosemary, bakes flaky apple pie seasoned with a pinch of nutmeg, and delights in pairing
    his meals with a glass of locally sourced dry white wine.
  core: William Stoyanovich blends a lifelong love of order with a nostalgic heart, meticulously budgeting every cent while worrying about the garden’s next bloom, and secretly hoards vintage train‑model
    manuals in a drawer that’s never quite organized.
background:
  cultural: William grew up in a Midwestern white American family with Eastern European roots—his grandparents immigrated from the former Yugoslav region and maintained cultural traditions such as celebrating
    Slava and preparing seasonal foods. Raised in Lafayette, Indiana, he attended public schools and earned a business degree at a state university, embodying the region’s pragmatic, community‑oriented
    values. His upbringing emphasized modesty, hard work, and mutual support, reinforced by regular participation in a local Catholic (later blended with broader ecumenical) congregation. These influences
    shape his respect for structured routines, dedication to service, and appreciation for both individual achievement and collective harmony.
attributes:
