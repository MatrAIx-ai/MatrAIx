personas:
  professional: Brant Hendry, a 45‑year‑old IT leader in Twin Falls, blends two decades of enterprise architecture, cloud‑migration (AWS, Azure) and cybersecurity expertise with PMP, ITIL v4, and Lean Six
    Sigma discipline, steering cross‑functional teams through strategic digital transformation while leveraging their organized curiosity to balance innovative solutions with proven processes.
  sports: Brant Hendry, a dedicated hiker and trout‑fisher, belongs to the Twin Falls Outdoor Club, they complete weekly treks in the Sawtooth Mountains, they avidly follow the Idaho Vandals basketball
    team and the Boise State Broncos football season, and they integrate strength‑training with a weekend camping regimen.
  arts: Brant Hendry, an acoustic‑guitar enthusiast, often strums folk classics by Bob Dylan and Neil Young at community gatherings, they find inspiration in the works of Beethoven and J.S. Bach, and they
    devote evenings to reading historical biographies such as Walter Isaacson’s Steve Jobs and classic literature like Tolstoy’s War and Peace.
  travel: Brant Hendry meticulously plans trips using a custom spreadsheet, they favor rugged getaways like Yellowstone’s geysers and Canada’s Banff National Park, they enjoy weekend escapades on the local
    Snake River for fishing, and they dream of a road‑trip along Iceland’s Ring Road to experience geothermal hot springs.
  culinary: Brant Hendry, a garden‑to‑table enthusiast, often cooks pan‑seared trout with lemon‑butter, roasts beet and carrot medleys seasoned with rosemary and thyme, they craft campfire‑style foil‑packet
    potatoes, they have mastered building their own cutting board in the woodshop, though they habitually over‑salt their dishes.
  core: Brant Hendry is a disciplined, curiosity‑driven IT strategist who balances cloud‑centric leadership with a love for hiking, woodworking, and acoustic guitar, they occasionally succumb to coffee‑overdose
    late‑night coding sessions, and they maintain a habit of over‑scheduling personal projects.
background:
  cultural: Brant grew up in a small‑town setting in southern Idaho, descended from German and Irish ancestors who settled the region during the early 20th century. His upbringing emphasized self‑reliance,
    community service, and a deep respect for the natural landscape, values that continue to shape his personal and professional life. He participated in local traditions such as the Twin Falls County Fair
    and maintains strong ties to his church and volunteer networks. Exposure to the neighboring Shoshone‑Bannock cultural heritage has fostered a respectful appreciation for Indigenous history, which he
    integrates into his community outreach. His liberal arts education in the Pacific Northwest broadened his perspective, reinforcing a blend of pragmatic Mid‑western work ethic with a curiosity for diverse
    ideas.
