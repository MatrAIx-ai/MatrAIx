  career_goals: Brant aims to advance to a senior director or CIO role within the next five years, focusing on digital transformation for regional businesses and public agencies in Idaho. He plans to champion
    a cloud‑first strategy, strengthen cybersecurity posture, and embed data‑driven decision‑making across the organization. To support this, he intends to complete an executive MBA, earn advanced certifications
    in cybersecurity and architecture, and expand his professional network through industry conferences. Long‑term, he envisions launching a boutique consultancy that helps rural enterprises adopt sustainable
    technology solutions while mentoring the next generation of IT leaders.
