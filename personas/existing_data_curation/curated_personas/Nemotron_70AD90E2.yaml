  career_goals: Emory aims to transition into a senior advisory role within the regional nonprofit sector, leveraging his expertise to mentor emerging community service managers and to design sustainable
    service models that can be replicated across Suffolk County. He is pursuing a certification in nonprofit financial management to strengthen his strategic influence. Ultimately, he hopes to establish
    a boutique consulting practice focused on improving organizational resilience and to be recognized with a community leadership award before retirement.
