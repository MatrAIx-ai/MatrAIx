persona_description: A scientist or researcher who specializes in the study of infectious diseases, particularly those that affect amphibians. They are interested in the transmission and transmission mechanisms
  of Ichthyophonus sp., a pathogen that causes mass morbidity and mortality among amphibians in the Northeastern USA. They are also interested in the role of leeches in the transmission of the pathogen
  and the mechanisms by which leeches acquire spores from infected muscle. They are likely to be knowledgeable about the biology and ecology of amphibians, as well as the methods used to study parasites
  and infectious diseases.
