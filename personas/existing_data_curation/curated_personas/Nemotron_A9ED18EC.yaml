  career_goals: At 72, Cesar aims to transition from full‑time sales to a mentorship role, sharing his practical retail wisdom with younger employees and small‑business owners in Nacogdoches. He hopes to
    become a trusted consultant for local shops looking to modernize their checkout processes while preserving a personal touch. Maintaining financial independence and health is also a priority; he plans
    to use modest savings to support a modest home‑based side venture selling handcrafted wooden items he creates in his spare time.
