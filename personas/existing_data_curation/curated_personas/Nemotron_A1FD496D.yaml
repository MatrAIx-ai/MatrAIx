personas:
  professional: Mark Berry is a data-driven real-estate broker in Hancock County, and they leverage statistical analysis, GIS mapping, and Salesforce CRM to craft precise market forecasts, while their competitive
    edge and skeptical nature push them to double-check every listing and negotiate with relentless focus on ROI.
  sports: Mark Berry is an avid intramural basketball player who cheers for the Indiana Pacers, cycles with the Heartland Cyclists club on weekend rides, and follows the Indianapolis Colts during football
    season, combining team spirit with a personal commitment to staying fit through regular jogs in the park.
  arts: Mark Berry enjoys the soulful lyrics of Bob Dylan and the classic rock of The Rolling Stones, attends local community theater productions of plays like Our Town, and collects vintage vinyl records,
    finding that these artistic touchstones balance their data-driven work with creative nostalgia.
  travel: Mark Berry favors road-trip getaways to the Great Smoky Mountains and weekend stays in Nashville for live music, meticulously plans itineraries around family-friendly lodging, but dreams of a
    tech-focused week-long visit to Austin's South by Southwest festival once finances allow.
  culinary: Mark Berry masters Midwest barbecue, regularly smoking pork ribs with a sweet paprika-brown-sugar rub and serving homemade coleslaw, while also experimenting with Korean bulgogi tacos using
    gochujang and kimchi, showcasing a willingness to blend traditional flavors with global twists.
  core: Mark Berry is a competitive, data-obsessed realtor who balances relentless market analysis with community-centric barbecues, a streak of worry that fuels meticulous planning, and a love for group
    sports and outdoor tech tinkering.
background:
  cultural: Mark grew up in a typical Midwestern, white, middle-class family in Indiana, absorbing the region’s values of hard work, modesty, and community involvement. His upbringing emphasized practicality
    and self-reliance, while his STEM education introduced a curiosity for how things work. Married and rooted in McCordsville, he balances traditional family expectations with a forward-looking professional
    mindset, often participating in local church socials and town festivals that reinforce his connection to the area's cultural fabric.
attributes:
  skills: '[''Negotiation'', ''Data-driven market analysis'', ''Financial modeling'', ''CRM management (Salesforce, kvCORE)'', ''GIS mapping'', ''Data visualization (Tableau, Excel Power Query)'', ''Client
    relationship building'', ''Risk assessment and due diligence'', ''Public speaking'', ''Time management'', ''Adaptability'']'
  hobbies: '[''Intramural basketball'', ''Weekend cycling'', ''Smart-home tinkering'', ''Python data-scraping projects'', ''Mindful jogging'', ''Meditation'', ''Community gardening'', ''Barbecue cooking'']'
  career_goals: Mark aims to become the leading real-estate broker in Hancock County by building a reputation for data-backed decision-making and high-conversion sales. He plans to earn the Certified Residential
    Specialist (CRS) designation within the next two years and to develop a proprietary market-forecasting dashboard that he can offer as a value-added service to his clients. Over the next five years,
    he envisions expanding his operation into a boutique investment advisory, hiring a small team of agents and analysts to serve regional investors. He also hopes to launch a community-focused mentorship
    program for new agents while maintaining a stable financial foundation for his growing family.
