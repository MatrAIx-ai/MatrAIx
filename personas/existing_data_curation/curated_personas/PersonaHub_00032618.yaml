persona_description: A hydrogeologist who specializes in the study of groundwater systems, particularly aquifers and their properties. This individual has extensive knowledge of the Cockfield Formation
  of the Claiborne Group, its formation, erosion, and the aquifer's properties. They are familiar with the data from observation wells and aquifer tests, including the transmissivities and storage coefficients.
  They are likely to be involved in the management and use of groundwater resources, particularly in the context of public and industrial water supplies.
