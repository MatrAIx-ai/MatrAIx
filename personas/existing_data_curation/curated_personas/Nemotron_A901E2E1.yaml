  career_goals: She aims to advance to a crew foreman position within the next two years, earn a construction supervisor certification, and eventually launch a small contracting business that specializes
    in sustainable residential remodels with artistic detailing. Hyesung also hopes to mentor more women and minority workers in the construction trades, promote safety culture, and integrate her creative
    interests by offering custom decorative finishes for clients.
