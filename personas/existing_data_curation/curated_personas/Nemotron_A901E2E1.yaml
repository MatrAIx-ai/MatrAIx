personas:
  professional: Hyesung Liu, a seasoned construction veteran with three decades of carpentry and masonry expertise, channels their methodical precision and vivid imagination into leading crews, mentoring
    junior workers, and designing sustainable remodels with custom decorative finishes, all while eyeing a foreman role and a future contracting business.
  sports: Hyesung Liu joins a Sunday morning hiking club that treks the trails of Muir Woods, proudly wears a San Francisco Giants cap, and follows the Golden State Warriors, often playing pickup basketball
    at the senior center to stay agile.
  arts: Hyesung Liu expresses their imagination through abstract acrylic canvases inspired by Jackson Pollock's drip technique and Mark Rothko's color fields, practices traditional calligraphy using sumi
    ink, and brings that creative spark to the community theater's productions of Shakespeare at the Berkeley Repertory Theatre, while discussing the latest exhibition by Ai Weiwei over coffee.
  travel: Hyesung Liu favors road trips that blend photography and culinary discovery, having driven the Pacific Coast Highway to capture sunset views at Big Sur, revisited the historic streets of San Francisco's
    Chinatown for dim sum, and now planning a summer vacation to the vineyards of Napa Valley to pair wine with their own farm-to-table dishes.
  culinary: Hyesung Liu crafts fusion dishes like Sichuan-spiced avocado tacos with locally sourced heirloom tomatoes and ginger-soy braised short ribs, delights in using shiitake mushrooms, napa cabbage,
    and fresh basil, and often experiments with wine pairings from Sonoma while documenting the process on their kitchen counter studio.
  core: Hyesung Liu blends the rigor of a master builder with the boundless curiosity of an abstract artist, turning construction sites into canvases while never missing a Sunday hike, even if it means
    occasional extra-late nights perfecting a new painting.
background:
  cultural: Hyesung is a second‑generation Chinese‑American. Her parents emigrated from Guangdong Province in the 1970s, and she grew up speaking Mandarin at home while attending American schools. She celebrates
    Lunar New Year, Qingming, and Mid‑Autumn festivals with the local Chinese community in the Bay Area, and maintains family traditions such as ancestor veneration and tea ceremony. Her East Asian cultural
    values—respect for elders, emphasis on hard work, and a communal mindset—blend with the openness and diversity of Californian life, shaping both her personal and professional interactions.
