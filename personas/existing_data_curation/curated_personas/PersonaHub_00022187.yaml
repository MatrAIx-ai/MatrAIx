persona_description: A history and art historian who is particularly interested in the works of Duccio and his innovative techniques in painting. They have a deep understanding of architectural settings
  and their role in depicting specific scenes and human subjects in art. They are also knowledgeable about the techniques used by Duccio to distinguish the main theme from other secondary subjects and how
  they can be used to create a spatial organization in the painting. They have a keen eye for detail and can identify the key architectural elements that contribute to the overall meaning of the painting.
