  career_goals: Although only four, Naureen often talks about what she wants to be when she grows up. She dreams of becoming an artist who can bring her imagination to life on canvas, and she also imagines
    herself as a teacher who uses picture books and drawings to help other children learn. She is fascinated by people who discover new ideas, so she hopes to keep exploring and maybe one day become a scientist
    or inventor who creates things that make the world more beautiful. Her ambitions are guided by her love for art, curiosity for new ideas, and desire to work quietly and thoughtfully.
