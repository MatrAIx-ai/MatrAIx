  hobbies: '[''Hiking and trail exploration'', ''Wildlife and landscape photography'', ''Bird watching'', ''Native plant gardening'', ''Woodworking and furniture making'', ''DIY electronics (Arduino, Raspberry
    Pi)'', ''Amateur astronomy and night‑sky photography'', ''Reading (science, history, and fiction)'', ''Volunteering at community garden'', ''Participating in small‑group book and science clubs'']'
  career_goals: Although retired from formal employment, Alan aims to leverage his technical background to mentor local hobbyists, develop a community‑run solar‑energy workshop, and author a practical guide
    on sustainable home maintenance for seniors. He also hopes to deepen his knowledge of amateur astronomy, complete a series of night‑sky photography projects, and improve his organizational habits to
    better manage his volunteer commitments.
