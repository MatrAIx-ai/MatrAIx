  hobbies: '[''Reading contemporary fiction and self‑help books'', ''Cooking traditional Dominican cuisine'', ''Yoga and mindfulness meditation'', ''Dog walking and park strolling'', ''Gardening'', ''Listening
    to a mix of Latin and jazz music'', ''Participating in small community gatherings'', ''DIY home decor projects'', ''Journaling'']'
  career_goals: Iluminada aims to move into a supervisory role within the next three years, leading a small team of sales associates and mentoring newer employees, especially those from underrepresented
    backgrounds. She plans to complete her bachelor's degree in Business Management to solidify her strategic expertise. Long‑term, she envisions becoming a regional sales manager for the New York‑New Jersey
    area, where she can shape culturally informed sales initiatives and develop training programs that blend practical sales tactics with community‑focused outreach. Additionally, she dreams of launching
    a boutique consulting firm that advises small businesses on culturally resonant marketing and sales strategies for the Dominican diaspora.
