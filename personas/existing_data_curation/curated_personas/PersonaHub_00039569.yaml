persona_description: Alain Enthoven, a renowned professor of public and private management at the Graduate School of Business, who is passionate about creating integrated-delivery systems to improve medical
  care, control costs, and ensure the delivery of the best care at the lowest possible cost. Enthoven believes that efficient integrated healthcare systems are found in large multispecialty medical group
  practices with transparent links to hospitals, labs, and pharmacies. He argues that the success of managed care depends on who does the managing, and that the best solution for today's healthcare woes
  is an integrated-delivery system. Enthoven's research interests include the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
