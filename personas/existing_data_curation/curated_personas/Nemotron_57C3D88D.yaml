personas:
  professional: Jocelyn Allen, a budding storyteller and LEGO architect, channels curiosity and practicality into building intricate playsets while they help classmates with school projects, reflecting
    a cooperative yet modest approach to early leadership.
  sports: Jocelyn Allen, an enthusiastic participant in the neighborhood park's Saturday T-ball league and a devoted fan of the local minor-league baseball team the River City Runners, enjoys running games
    of tag with a small group of friends while they quietly prefer the sidelines when larger crowds gather.
  arts: Jocelyn Allen, a devoted reader of picture books by Mo Willems, a vibrant crayon colorist, and a LEGO scene creator, immerses in upbeat gospel tunes by Kirk Franklin and R&B hits from Alicia Keys,
    drawing inspiration for their own imaginative stories and murals in the family's backyard, and they often share their creations with classmates.
  travel: Jocelyn Allen, who loves short family road trips to places like the nearby state park, a weekend visit to Grandma's farm, and dreaming of a future adventure to Disney World's Magic Kingdom, prefers
    well-planned itineraries that include time for quiet reading under a tree, and they feel a mix of excitement and nervousness when traveling to new places.
  culinary: Jocelyn Allen, who delights in helping in the kitchen by stirring fresh tomato sauce from the garden, making rainbow fruit kebabs with strawberries, bananas, and blueberries, and snacking on
    cheese quesadillas while listening to gospel and R&B, shows a budding culinary curiosity but often forgets to wash hands before cooking, and they proudly present their dishes to family.
  core: Jocelyn Allen is a quietly curious eight-year-old who blends a love of stories, LEGO construction, and gospel music with a compassionate heart, a habit of misplacing chores, and a gentle worry about
    new experiences, and they often seek reassurance from close friends.
background:
  cultural: Jocelyn is part of a close‑knit African‑American family in Newport News, Virginia. She regularly attends a historically Black Baptist church where she participates in Sunday school, choir, and
    community outreach events. Her family celebrates Juneteenth, Emancipation Day, and other cultural holidays with soulful cooking, storytelling, and music. Through local museums and community programs,
    she learns about Black history in Hampton Roads and hears stories of resilience from elders. These experiences reinforce her compassionate nature, sense of community responsibility, and pride in her
    heritage.
attributes:
  skills: '[''empathetic listening'', ''basic reading comprehension'', ''basic arithmetic'', ''creative building with LEGO'', ''drawing and coloring'', ''basic computer navigation'', ''caring for pets'',
