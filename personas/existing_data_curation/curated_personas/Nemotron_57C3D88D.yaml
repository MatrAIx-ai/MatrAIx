  hobbies: '[''reading picture books'', ''drawing and coloring'', ''building LEGO sets'', ''playing in the park'', ''listening to music'', ''helping classmates with tasks'', ''gardening with family'', ''scrapbooking'']'
  career_goals: When she grows up, Jocelyn hopes to work in a caring profession that lets her help others directly. She dreams of becoming a teacher or a pediatric nurse so she can support children and
    families, and she is also fascinated by animals and thinks about being a veterinarian. In the meantime, she imagines volunteering at a community garden or a local library where she can share books and
    knowledge with other kids.
