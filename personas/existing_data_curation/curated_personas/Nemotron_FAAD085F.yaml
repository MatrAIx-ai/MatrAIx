  hobbies: '[''Hiking in the Mojave Desert'', ''Organic Gardening'', ''Yoga'', ''Reading mystery and historical fiction'', ''Cooking family meals'', ''Digital photography'', ''Volunteering at community
    health fairs'', ''Book club participation'']'
  career_goals: Phyllis aims to advance from a staff pharmacist to a pharmacy manager within the next three years, leveraging her leadership skills and interest in operational efficiency. She plans to obtain
    board certification in ambulatory care pharmacy (BCACP) and expand her clinical services to include chronic disease management programs. Long‑term, she envisions opening a boutique pharmacy that offers
    personalized medication counseling, immunizations, and wellness workshops for the Victorville community. Balancing her professional growth with family life, she seeks flexible scheduling and opportunities
    for mentorship.
