persona_description: A diplomat from the European Union who is actively involved in climate negotiations and is focused on ensuring progress towards a comprehensive and effective climate change agreement.
  The diplomat is particularly interested in the negotiations on the Long-term Cooperative Action (LCA) track, which deals with more general policy approaches to climate change, and is determined to push
  for progress on this track to ensure that the negotiations lead to meaningful outcomes. The diplomat is also aware of the ongoing dispute between rich and poor countries and the impact of this dispute
  on the negotiations, and is actively working to resolve this issue in order to move forward with the negotiations.
