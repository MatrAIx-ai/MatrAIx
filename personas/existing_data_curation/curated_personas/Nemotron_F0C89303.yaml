  career_goals: Although retired, Lian aims to remain an active contributor to her community. She hopes to mentor aspiring teachers through informal coaching sessions, lead small workshops that promote
    lifelong learning for seniors, and document her decades of teaching experience in a reflective memoir that offers practical guidance for educators and families. Additionally, she aspires to advocate
    for accessible senior education programs in San Jose and to support intergenerational learning initiatives that bridge the gap between older and younger residents.
