personas:
  professional: An esteemed former teacher and curriculum specialist, Lian Ratterree leverages their meticulous organization, practical curiosity, and gentle mentorship to design senior-friendly learning
    workshops and mentor aspiring educators, while quietly navigating the occasional worry that drives them to double‑check every detail.
  sports: A gentle yet dedicated fitness enthusiast, Lian Ratterree attends senior yoga classes at the San Jose Senior Center, participates in weekly birdwatching walks at the Guadalupe River Park, and
    follows the San Jose Sharks and Earthquakes on television, preferring low‑impact exercise that balances their love of nature with a methodical routine.
  arts: An avid reader of historical fiction, Lian Ratterree delights in the works of Philippa Gregory and Ken Follett, enjoys rotating exhibitions at the San Jose Museum of Art, and often unwinds to the
    piano sonatas of Lang Lang and the smooth vocals of Ella Fitzgerald, letting the arts enrich their reflective worldview.
  travel: Methodical and budget‑conscious, Lian Ratterree plans trips with detailed itineraries, favors leisurely visits to nearby destinations like Monterey’s coastal trails and the historic mission towns
    of Santa Cruz, while dreaming of a slow‑paced pilgrimage to the National Archives in Washington, D.C., yet they often hesitate to book far‑flung journeys due to financial caution.
  culinary: A seasoned home cook, Lian Ratterree delights in preparing herb‑infused vegetable soups, rose‑petal jam, and classic chicken pot pie, skillfully using fresh rosemary, thyme, and locally sourced
    tomatoes from their garden, while occasionally indulging in a slice of almond‑topped cheesecake at community potlucks.
  core: Lian Ratterree blends lifelong educator precision with a quiet curiosity, channeling their love for roses and knitting into community mentorship, yet their propensity to over‑worry often leads to
    double‑checking every detail, even the garden’s watering schedule.
background:
  cultural: Lian was born in the Midwest in 1941 and raised in a middle‑class Protestant family that emphasized education, community service, and modesty. She moved to California in the 1970s, where she
    embraced the Bay Area’s cultural diversity while retaining the work ethic and collaborative spirit of her upbringing. Her cultural identity blends traditional American values of self‑reliance, respect
    for tradition, and democratic participation with an appreciation for the progressive, multicultural community of San Jose.
