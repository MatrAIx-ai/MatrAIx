  hobbies: '[''Gardening'', ''Cooking and Baking'', ''Local History Book Club'', ''Community Theater Participation'', ''Volunteer at Senior Center'', ''Line Dancing'', ''Hiking on State Trails'', ''DIY
    Home Projects'']'
  career_goals: Shabnam aims to expand her influence on corporate strategy by leading larger, enterprise‑wide change initiatives while maintaining the flexibility to explore innovative analytical techniques.
    She envisions moving into a senior advisory role where she can shape long‑term business direction and serve as a conduit between executive leadership and operational teams. Mentorship remains a priority;
    she plans to formalize a coaching program for emerging analysts in her organization and to volunteer as a board member for a local economic development nonprofit, leveraging her expertise to benefit
    the broader Washington County community.
