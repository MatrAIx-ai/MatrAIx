  hobbies: '[''Journaling'', ''Habit tracking'', ''Jogging'', ''Cooking (soul food with modern twists)'', ''Church choir'', ''Mentoring middle-school girls'', ''Watching documentaries'', ''Strategy board
    games'']'
  career_goals: Rebecca aims to complete an associate's degree in Business Administration within the next two years and then transfer to a four-year university to earn a bachelor's in Management. She envisions
    a career as an administrative manager or project coordinator in a midsize company where she can apply her organizational strengths and contribute to efficient operations. In the longer term, she hopes
    to obtain a professional certification in Project Management (CAPM) and eventually lead a team that implements community-focused initiatives, such as workforce development programs for young adults
    in York County. She values stability, clear advancement pathways, and the ability to make a positive impact on her local community.
