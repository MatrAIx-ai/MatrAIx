    ''Project management'']'
  hobbies: '[''sketching and painting'', ''visiting Art Museum of South Texas and local galleries'', ''photography (coastal and street scenes)'', ''reading Mexican literature and philosophy'', ''playing
    classical guitar'', ''cooking traditional Mexican dishes'', ''chess'', ''solo fishing trips on the Gulf Coast'', ''writing art reviews for community newsletter'', ''participating in small book club
    discussions'']'
  career_goals: Rodrigo aims to leverage his supervisory experience into a district‑manager role within the next three years, overseeing multiple stores and driving profit growth through data‑led strategies
    and innovative merchandising. He is especially motivated to champion visual storytelling in retail, positioning himself as a specialist who can design store environments that double as cultural showcases.
    To deepen his expertise, he plans to enroll in a Master's program in Museum Studies or Arts Management, which would enable him to launch a boutique concept store that merges curated Mexican‑American
    art with everyday commerce. Parallel to corporate advancement, he aspires to become a mentor and trainer for emerging retail leaders, developing curricula that blend operational rigor with creative
    thinking. His competitive drive pushes him toward measurable achievements, such as exceeding regional sales benchmarks and receiving company awards for customer experience excellence.
