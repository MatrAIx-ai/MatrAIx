  hobbies: '[''Visiting local art museums'', ''Sketching and watercolor painting'', ''Participating in drama club'', ''Writing short stories and poetry'', ''Volunteering at community food bank and tutoring
    programs'', ''Organizing school events'', ''Listening to podcasts on science and culture'', ''Playing acoustic guitar'', ''Hiking in the Texas Hill Country'', ''Attending local music festivals'']'
  career_goals: Cindy aims to merge her passions for art, organization, and helping others into a career that creates inclusive community spaces. She plans to pursue a bachelor’s degree in Arts Administration,
    Communications, or Social Work, with the long‑term ambition of directing a nonprofit arts center that offers workshops, youth mentorship, and outreach programs in underserved neighborhoods. Ultimately,
    she hopes to establish a statewide network of after‑school art initiatives that blend creative expression with therapeutic techniques, fostering both personal growth and social cohesion. In parallel,
    she remains open to roles in event management or public relations for culturally focused organizations where her leadership and communication strengths can amplify community voices.
