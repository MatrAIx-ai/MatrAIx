personas:
  professional: Chaise Tabares, a renewable energy engineer and STEAM curriculum developer, leverages deep expertise in power electronics, smart grid modeling, and data analytics while harnessing their
    curious, organized, and highly sociable demeanor to lead interdisciplinary research projects, secure federal grants, and champion inclusive engineering education as a charismatic public speaker.
  sports: Chaise Tabares stays fit by hiking the rugged trails of Letchworth State Park and walking the Niagara shoreline, dancing salsa three nights a week, cheering on the Buffalo Bills and Buffalo Sabres,
    and occasionally joining a local running club for weekend 5K runs.
  arts: Chaise Tabares expresses creativity through bold abstract paintings inspired by the vivid hues of tropical island art, draws artistic nourishment from visits to the Albright‑Knox Art Gallery to
    view works by Jackson Pollock and Yayoi Kusama, channels rhythm into salsa dancing nights, and fuels their storytelling by regularly attending performances by the New York Philharmonic and screenings
    of Christopher Nolan films.
  travel: Chaise Tabares meticulously plans immersive trips, having trekked the Andes near Patagonia, explored the historic streets of Barcelona and the art‑laden alleys of Florence, and blends conference
    attendance with weekend wanderings in Vienna, all while balancing family commitments and a modest travel budget.
  culinary: Chaise Tabares experiments in the kitchen by reinventing classic island dishes into modern plates like plantain‑based mofongo with smoked paprika aioli, coconut‑lime rice paired with grilled
    fish, and a vegetarian paella infused with saffron and roasted root vegetables, showcasing a confident amateur chef’s flair for vibrant flavors.
  core: Chaise Tabares blends a curious, organized mind with a love for bold abstract art, renewable‑energy innovation, and lively salsa, navigating life through meticulous planning punctuated by spontaneous
    late‑night sci‑fi reading marathons.
background:
  cultural: Chaise was raised in a bilingual household where Spanish and English shared equal space, fostering a deep connection to her Puerto Rican heritage while navigating American life. Family traditions—such
    as celebrating San Juan festivals, listening to plena and salsa rhythms, and preparing arroz con gandules—instilled a strong sense of community, resilience, and pride. These cultural roots inform her
    worldview and teaching philosophy; she regularly incorporates multicultural perspectives into her coursework, mentors first‑generation college students, and collaborates with Buffalo’s Puerto Rican
    diaspora to promote STEM outreach and cultural exchange.
