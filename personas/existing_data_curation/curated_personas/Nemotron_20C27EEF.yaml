  hobbies: '[''Abstract Painting'', ''Visiting Art Exhibitions'', ''Salsa Dancing'', ''Culinary Exploration of Puerto Rican Cuisine'', ''Hiking'', ''Science Fiction Reading'', ''Travel'', ''Community Volunteering
    with Hispanic Organizations'', ''Photography'', ''Public Speaking at TEDx Events'']'
  career_goals: Evolving as an educational leader, Chaise aims to become department chair within the next five years, spearheading the creation of a university-wide STEAM initiative that fosters interdisciplinary
    research and creative problem‑solving. She seeks to secure a multi‑year federal grant to advance large‑scale renewable energy projects in partnership with local industry, publish a textbook on sustainable
    power systems, and expand mentorship programs that increase the participation of underrepresented Hispanic students in STEM. Her long‑term ambition is to influence policy for inclusive engineering education
    and to serve as a national speaker on diversity in the sciences.
