  hobbies: '[''Hiking'', ''Mountain Biking'', ''Landscape Photography'', ''Custom PC Building'', ''Strategy Video Gaming'', ''Board Gaming'', ''Science Fiction Reading'', ''Acoustic Guitar'']'
  career_goals: Jose is working toward a Bachelor of Science in Mechanical Engineering, with a focus on sustainable product design. He aims to secure a summer internship in renewable‑energy engineering
    to apply his CAD and analysis skills in real‑world projects. After graduation, his short‑term goal is to join a multidisciplinary engineering firm where he can contribute to the development of energy‑efficient
    technologies. In the long term, he envisions leading a design team that creates affordable, eco‑friendly solutions, and eventually launching his own startup that integrates mechanical design with smart‑sensor
    technology.
