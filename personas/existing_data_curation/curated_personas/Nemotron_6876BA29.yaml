personas:
  professional: Jose Coyne, a budding mechanical engineering student, channels their methodical problem‑solving and organized project‑management skills into sustainable product design, leveraging CAD, MATLAB,
    and Python to prototype eco‑friendly solutions while balancing coursework with hands‑on lab work.
  sports: Jose Coyne stays fit by tackling sections of the Appalachian Trail and joining the Blacksburg Mountain Biking Club, while cheering for the Virginia Tech Hokies football team and following NASCAR
    driver Chase Elliott for high‑speed inspiration.
  arts: Jose Coyne expresses creativity through landscape and macro photography inspired by Ansel Adams and National Geographic, strums acoustic renditions of Bon Iver on a vintage Martin guitar, and devours
    science‑fiction novels by Liu Cixin and Andy Weir, while attending local indie music gigs.
  travel: Jose Coyne prefers low‑cost, nature‑focused trips, having backpacked through Shenandoah National Park and taken a weekend road trip to Asheville, while dreaming of a future expedition to Iceland’s
    volcanic landscapes and a tech‑tour of Tokyo’s Akihabara district.
  culinary: Jose Coyne gravitates toward hearty, protein‑rich meals like grilled chicken quinoa bowls with roasted sweet potatoes, indulges in a well‑crafted Virginia‑style BBQ pork sandwich with coleslaw,
    and occasionally whips up homemade ramen using fresh noodles, miso paste, and soft‑boiled eggs.
  core: Jose Coyne is a detail‑driven engineering student who balances a love for the outdoors, custom PC builds, and sci‑fi storytelling, while juggling a disciplined budget and a tendency to over‑engineer
    every project.
background:
  cultural: Jose grew up in a middle‑class family in the Shenandoah Valley region of Virginia, where a blend of Southern hospitality and Appalachian outdoor culture shaped his upbringing. His family celebrates
    traditional American holidays such as Thanksgiving and Fourth of July with community gatherings and barbecues, reinforcing values of cooperation and community service. He has German‑Irish ancestry,
    which contributes to occasional family traditions like sharing recipes from his heritage. Living in Blacksburg, a university town, exposed him early to a diverse student population and a vibrant intellectual
    environment, encouraging both his curiosity and his practical, organized approach to learning.
attributes:
  skills: '[''CAD Modeling (SolidWorks)'', ''MATLAB'', ''Python Programming'', ''Technical Writing'', ''Laboratory Instrumentation'', ''Mechanical Troubleshooting'', ''Data Analysis'', ''Project Management'',
