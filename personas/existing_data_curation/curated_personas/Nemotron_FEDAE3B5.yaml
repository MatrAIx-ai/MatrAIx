  hobbies: '[''Watercolor painting'', ''Visiting art galleries and theater'', ''Live jazz and music events'', ''Book club participation'', ''Creative cooking and hosting potlucks'', ''Yoga and mindfulness
    meditation'', ''Running in community group'', ''Volunteer art-therapy workshops'']'
  career_goals: Tavia aims to transition into a nursing leadership role within the next three years, targeting a position as a charge nurse or nurse manager on her hospital’s medical‑surgical unit. She
    plans to pursue a Master of Science in Nursing with a concentration in healthcare administration, followed by certification as a Nurse Executive. Her long‑term ambition is to direct a community health
    program that blends clinical care with creative arts therapies, specifically designed to address mental‑health needs and health disparities in underserved Black neighborhoods of Columbus. Additionally,
    she hopes to contribute to nursing scholarship by publishing research on the impact of art‑based interventions on patient anxiety and to become an active member of the National Black Nurses Association’s
    mentorship council.
