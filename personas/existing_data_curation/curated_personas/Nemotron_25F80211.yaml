  career_goals: Amador aims to advance to a district manager role within the next five years, leveraging his supervisory track record to oversee multiple stores across the Rio Grande Valley. He plans to
    pursue an MBA or specialized retail management certification to deepen his strategic expertise. Long‑term, he envisions launching his own boutique that fuses retail with local Mexican‑American art,
    while also establishing a mentorship program that supports bilingual employees in the retail sector.
