  career_goals: Even at 80, Carmen’s ambition is to leave a lasting cultural legacy for her family and community. She plans to compile a handwritten family cookbook that records the recipes and cooking
    techniques passed down from her ancestors in Michoacán, and to share it at local Hispanic festivals. She also hopes to mentor younger volunteers at the Dexter senior center, teaching them event‑organizing
    skills, gardening practices, and the value of mutual support. Additionally, Carmen aspires to record oral histories of longtime residents to preserve the town’s Mexican‑American heritage for future
    generations.
