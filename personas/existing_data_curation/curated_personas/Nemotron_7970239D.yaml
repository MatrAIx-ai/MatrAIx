  hobbies: '[''Daily gratitude journaling'', ''Crossword puzzles'', ''Herb gardening'', ''Yoga'', ''Volunteer art exhibition coordination'', ''Cooking traditional Italian cuisine'', ''Literary book club'']'
  career_goals: Rita aims to advance from business operations specialist to operations manager within the next three years, eventually targeting a director of operations role. She plans to earn a PMP certification
    and later an MBA to deepen her strategic expertise. Her ambition is to lead a transformation initiative that automates routine tasks, reduces operational waste, and improves employee well‑being. She
    also hopes to mentor junior staff—especially women entering the field—to foster a supportive, high‑performing workplace culture while maintaining the structured environment that helps her manage stress.
