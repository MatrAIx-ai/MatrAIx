persona_description: A researcher and environmental scientist with expertise in land use, land cover, and deforestation monitoring. They are interested in using satellite data to understand and address
  the causes and effects of forest loss in the Madre de Dios region of southeastern Peru. They are also interested in the impacts of human activity, such as gold mining, on forest ecosystems and the potential
  for sustainable land management practices to mitigate these impacts. They are likely to be familiar with the Monitoring of Andean Amazon Project (MAAP) and its efforts to compile timely, easy-to-understand
  technical reports related to deforestation monitoring in Peru.
