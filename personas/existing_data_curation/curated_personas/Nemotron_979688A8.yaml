  hobbies: '[''Watercolor painting'', ''Pottery'', ''Cooking traditional Salvadoran cuisine'', ''Hosting potluck gatherings'', ''Senior folkloric dance group'', ''Book club participation'', ''Yoga and mindfulness
    meditation'', ''Community gardening'', ''Attending local art exhibitions'']'
  career_goals: Looking ahead, Magdalena aims to transition into a nurse educator role at a local community college or hospital training program, where she can share her clinical wisdom and cultural competence
    with the next generation of nurses. She is passionate about spearheading a community‑based health initiative that blends traditional Salvadoran wellness practices with modern preventive care, particularly
    focusing on stress management and mental health for older adults. Additionally, she hopes to earn a Doctor of Nursing Practice (DNP) degree to deepen her expertise in health policy advocacy, ultimately
    influencing county‑level programs that improve access to culturally tailored health services for the Salvadoran diaspora in San Bernardino.
