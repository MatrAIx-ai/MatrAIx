personas:
  professional: Magdalena Delgado, a seasoned registered nurse with over three decades of medical‑surgical and community health experience, blends her expertise in wound care, IV therapy, and chronic disease
    management with a curiosity for art‑therapy techniques, using bilingual communication to connect with Spanish‑speaking patients and mentoring junior staff in a flexible, collaborative environment even
    though they often prefer a loosely organized schedule.
  sports: Magdalena Delgado stays active by dancing with the San Bernardino Senior Folkloric Dance Troupe, practicing weekly gentle yoga at the community center, cheering on the Los Angeles Lakers and Dodgers
    during the basketball and baseball seasons, and joining the local walking club that meets at the community garden, embracing a sociable, low‑impact fitness routine that balances energy and flexibility.
  arts: Magdalena Delgado regularly visits the Riverside Art Museum, finds inspiration in the vibrant colors of Frida Kahlo’s self‑portraits and the serene landscapes of regional painter José Rivera, creates
    watercolor paintings of familiar hills and homes, plays the guitar during potluck evenings, and participates in a lively book club that discusses contemporary fiction by authors such as Chimamanda Ngozi
    Adichie, weaving artistic appreciation into daily life.
  travel: Magdalena Delgado prefers spontaneous weekend trips over rigid itineraries, often exploring nearby natural escapes like Joshua Tree National Park and the San Bernardino Mountains, dreams of a
    cultural pilgrimage to colonial towns in Central America to trace her family’s culinary roots, but balances these aspirations against a fixed retirement budget that limits longer overseas voyages.
  culinary: Magdalena Delgado delights in cooking homemade pupusas stuffed with cheese, loroco, and refried beans, steaming tamales wrapped in corn husks with a hint of chilito, and seasoning dishes with
    fresh cilantro, tomatillo, and masa harina, often showcasing these flavors at weekly potluck gatherings where they share both traditional recipes and inventive twists.
  core: Magdalena Delgado is a community‑oriented, art‑loving nurse who balances flexible work habits, occasional financial worries, and a warm, sociable spirit with a quiet stubbornness to maintain cultural
    traditions through food and dance.
background:
  cultural: Magdalena was born in El Salvador and migrated to the United States with her family as a teenager, settling in the Inland Empire region of Southern California. She grew up in a close‑knit Salvadoran
    community where Spanish was spoken at home, Catholic traditions were observed, and cultural celebrations such as Fiesta de la Flor and Día de los Muertos were integral to family life. These experiences
    imparted a deep respect for family, hospitality, and collective well‑being. While she embraces her American identity and professional life, she maintains strong ties to Salvadoran customs—preparing
    traditional foods, listening to marimba music, and preserving the Spanish language. Her bicultural perspective informs her compassionate nursing practice, allowing her to bridge cultural gaps and advocate
    for the health needs of Latino elders in San Bernardino.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Chronic disease management'', ''Bilingual communication (Spanish/English)'', ''Health education and community outreach'', ''Basic art‑therapy
