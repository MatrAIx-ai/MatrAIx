  career_goals: She aims to turn her love for art and storytelling into a career as a multimedia creator. In the next few years she plans to earn her GED, build a portfolio of digital artwork and short
    videos, and grow a social media channel that highlights contemporary Mexican-American culture. Long term she dreams of working as a creative director for an advertising agency or launching her own community‑focused
    art studio where she can mentor other youth.
