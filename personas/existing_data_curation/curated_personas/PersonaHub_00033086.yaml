persona_description: A palynologist who is interested in the study of non-pollen palynomorphs, which are micro-remains of organisms other than pollen. They are known for their ability to provide information
  that cannot be extracted from other proxies or when other proxies are absent. They are widely distributed but have restricted ecological ranges, making them excellent tracers of environmental conditions.
  The persona is likely to be interested in the details of the types of organisms that can be found in non-pollen palynomorphs, the different ecological ranges they have, and the specific uses of these
  micro-remains in palynology. They may also be interested in the preservation of non-pollen palynomorphs and how they can be used to trace environmental conditions.
