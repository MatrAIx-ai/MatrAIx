  hobbies: '["Fishing", "Woodworking", "Gardening", "Church attendance", "Senior center volunteering", "Reading historical fiction", "Genealogy research"]'
  career_goals: In his later years, Oleg aims to stay physically and mentally active while deepening his ties to the Bloomer community. He wishes to mentor younger relatives in practical trades, preserve
    and share his family's genealogical history, support his spouse by ensuring a secure financial plan, and contribute to the local senior center through volunteer leadership. Maintaining good health,
    fostering family harmony, and leaving a tangible legacy of learned skills are his primary ambitions.
