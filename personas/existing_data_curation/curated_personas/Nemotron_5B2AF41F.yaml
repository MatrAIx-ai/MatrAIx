personas:
  professional: Ted Ingram is a seasoned front‑of‑house professional who leverages fast‑paced multitasking, calm de‑escalation, and a knack for wine pairing to excel as a lead waiter while studying hospitality
    management, positioning themselves for a shift supervisor role and eventually a community‑focused gastropub, showing they balance curiosity with practicality.
  sports: Ted Ingram is a sociable athlete who plays pick‑up basketball at the Woodbridge community center, captains a co‑ed soccer team called Woodbridge United, follows the Washington Commanders, Washington
    Capitals, and Washington Wizards, and they balance competitive drive with a relaxed, group‑oriented approach to fitness.
  arts: Ted Ingram is an active participant in community theatre, a frequent attendee of jazz nights at D.C.’s historic Blues Alley, and a devoted fan of artists like Leon Bridges, Chris Stapleton, and
    Lin‑Manuel Miranda, letting music and stage performance shape their identity while they find a creative outlet beyond hospitality.
  travel: Ted Ingram is an adventure‑seeking road‑tripper who plans weekend getaways to Virginia Beach, the historic streets of Alexandria, and occasional trips to New York City for Broadway shows, while
    dreaming of a cultural pilgrimage to Dublin’s famed pubs, displaying they balance budget constraints with a love for culinary and historic experiences.
  culinary: Ted Ingram is a backyard grill master who perfects classic American burgers, smoky hickory‑rubbed ribs, and craft‑beer‑paired pulled pork, experiments with ingredients like smoked paprika and
    bourbon glaze, frequently orders Maryland crab cakes at local eateries, and they view food as both a social glue and a personal passion.
  core: Ted Ingram is a high‑energy hospitality professional who channels worry‑driven perfectionism into meticulous service, weekend sports, and experimental home‑brewing, all while juggling the dream
    of a community gastropub and a habit of binge‑watching true‑crime documentaries, reflecting they constantly balance ambition with anxiety.
background:
  cultural: Ted grew up in a middle‑class family in Woodbridge, Virginia, with deep roots in the Mid‑Atlantic region. His ancestry traces back to English and Irish immigrants, and his upbringing reflected
    a blend of suburban Southern hospitality and the diversity of the Washington, D.C. metropolitan area. He attended Woodbridge High School, where he participated in varsity sports and community theatre.
    The region’s strong community focus, proximity to historic sites, and exposure to a variety of cultural events – from Polish festivals to African‑American jazz concerts – have shaped his open‑minded
    outlook while maintaining a modest, pragmatic values system typical of many white, working‑class families in the area.
attributes:
  skills: '[''Customer Service'', ''Order Management'', ''POS System Operation'', ''Food Safety Compliance'', ''Conflict De‑escalation'', ''Upselling Techniques'', ''Basic Wine Knowledge'', ''Basic Spanish
    Phrases'', ''Team Coordination'', ''Time Management'']'
  hobbies: '[''Pick‑up Basketball'', ''Co‑ed Soccer League'', ''Exploring Local Restaurants'', ''Home Grilling & BBQ'', ''Mindfulness Meditation'', ''Yoga'', ''Community Volunteering'', ''Home Brewing'']'
  career_goals: Ted aims to move beyond front‑of‑house roles into hospitality management. Over the next three years he plans to complete an associate degree in Hospitality Management at Northern Virginia
    Community College while seeking a shift supervisor or assistant manager position at a higher‑volume restaurant. Ultimately, he envisions opening a small, community‑focused gastropub that blends classic
    American comfort food with a rotating craft‑beer menu, leveraging his networking skills and local connections. He also hopes to achieve greater financial stability and reduce the stress of irregular
    shifts by establishing predictable work hours and a clear career pathway.
