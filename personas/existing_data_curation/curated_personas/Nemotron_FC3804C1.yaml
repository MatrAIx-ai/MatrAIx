personas:
  professional: Jonathan Roa, a retired secondary‑school pedagogue turned museum docent, leverages three decades of English literature and social‑studies curriculum design to craft interdisciplinary art‑education
    programs for seniors, channeling a competitive yet skeptical mindset into meticulously structured workshops and grant proposals.
  sports: Jonathan Roa follows the Houston Astros, attends Houston Rockets games when in season, participates in a senior walking club at Hermann Park, and channels strategic vigor into weekly chess matches,
    though the competitive edge sometimes clashes with the leisurely nature of his fitness routine.
  arts: Jonathan Roa immerses himself in modern and contemporary art, regularly attending openings at the Menil Collection featuring works by Georgia O’Keeffe and Mark Rothko, while volunteering as a docent
    at the Museum of Fine Arts to translate complex visual concepts for visitors, and occasionally writes reflective essays on the interplay between art and pedagogy.
  travel: Jonathan Roa prefers meticulously planned cultural trips, having explored New Orleans’ French Quarter, Santa Fe’s art scene, and European museums such as the Louvre and the Prado, balancing a
    modest travel budget with a yearning for immersive experiences, yet sometimes over‑packs to mitigate worry about missing attractions.
  culinary: Jonathan Roa enjoys cooking Tex‑Mex dishes like chicken enchiladas with roasted corn and French classics such as coq au vin, favoring ingredients like rosemary, saffron, and smoked paprika,
    but often forgets to restock pantry staples due to his preoccupation with upcoming art lectures.
  core: Jonathan Roa is a curious, competitive senior who fuses a lifelong devotion to art and education with a skeptical, worry‑prone mindset, manifesting in strategic chess play, meticulous grant writing,
    and an occasional neglect of self‑care.
background:
  cultural: Jonathan Roa grew up in a middle‑class, Anglo‑American family in suburban Houston during the post‑World War II era. His upbringing reflected traditional Southern values of self‑reliance, respect
    for authority, and community involvement, tempered by the multicultural vibrancy of the greater Houston region. While his family maintained Protestant (Methodist) religious practices, his university
    education in the 1960s exposed him to a broader array of cultural ideas, fostering an appreciation for diverse artistic expressions and progressive educational philosophies. Today, his cultural identity
    blends a Texan sense of independence with a cosmopolitan curiosity for global art and ideas, allowing him to navigate both familiar local customs and the broader cultural mosaic of modern Houston.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Educational technology integration'', ''Mentoring and coaching'', ''Community outreach program coordination'', ''Public speaking'', ''Art
