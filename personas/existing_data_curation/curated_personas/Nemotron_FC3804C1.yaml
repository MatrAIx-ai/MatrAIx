  hobbies: '[''Visiting museums and art galleries'', ''Attending art lectures and workshops'', ''Reading literature and non‑fiction on education'', ''Writing essays and memoir excerpts'', ''Playing chess
    at a senior club'', ''Gardening'', ''Volunteering as a museum docent'', ''Photography'', ''Traveling to cultural destinations'', ''Participating in community discussion groups'']'
  career_goals: Although retired from full‑time teaching, Jonathan Roa remains driven to leave a lasting imprint on the educational and cultural landscape of Houston. His primary ambition is to launch a
    community‑based art‑education initiative for seniors that melds his expertise in curriculum design with his passion for visual arts, securing grant funding to sustain it for at least five years. He
    also aspires to write and publish a memoir that blends reflections on his three decades of classroom practice with insights on the evolving role of art in lifelong learning, aiming to influence policy
    discussions at the district level. Additionally, he seeks occasional consulting roles with local schools to help integrate arts‑rich modules into STEM curricula, hoping to be recognized as an innovative
    bridge between traditional teaching methods and contemporary interdisciplinary approaches.
