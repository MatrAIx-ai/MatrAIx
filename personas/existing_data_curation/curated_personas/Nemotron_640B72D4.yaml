personas:
  professional: Edna Medina is a veteran nonprofit fundraiser in New Bedford who blends imaginative storytelling with meticulous budgeting to cultivate diverse, intergenerational donor relationships, expertly
    writes grant proposals for arts and health initiatives, mentors junior staff in both English and Spanish, and designs culturally resonant gala events that leave lasting community impact.
  sports: Edna Medina stays active through low‑impact pursuits such as sunrise walks along the New Bedford waterfront, weekly tai‑chi classes at the community center, and occasional pickleball matches with
    friends, while cheering for the Boston Red Sox in baseball season and the Boston Celtics during basketball playoffs.
  arts: Edna Medina’s artistic life centers on experimental abstract watercolor painting inspired by Caribbean sunsets, a regular presence at the New Bedford Art Museum and local galleries, participation
    in a weekly poetry circle where she shares verses influenced by Maya Angelou and Pablo Neruda, and a deep appreciation for the bold colors of artists like Wassily Kandinsky and Frida Kahlo.
  travel: Edna Medina’s travel style blends cultural immersion with comfortable pacing, favoring trips that let her explore historic Caribbean diaspora neighborhoods in Old San Juan, the vibrant markets
    of Barcelona, and the serene coastal towns of Nova Scotia, while always returning home to her cherished patio garden before the next fundraiser deadline.
  culinary: Edna Medina’s kitchen is a fusion laboratory where traditional dishes such as mofongo and arroz con gandules are reimagined with fresh rosemary, basil, and a splash of citrus, and she delights
    in creating herb‑infused olive oil drizzles and serving aromatic plantain‑based appetizers at her intimate garden gatherings.
  core: Edna Medina weaves her love of abstract art, community storytelling, and seasoned fundraising into a vibrant, reflective life that balances disciplined stewardship with creative spontaneity.
background:
  cultural: Edna is a second-generation Puerto Rican American whose parents migrated to New England during the 1960s. Raised in a bilingual, Catholic household in New Bedford’s vibrant Nueva España neighborhood,
    she grew up surrounded by traditional music such as bomba and plena, as well as community celebrations like Three Kings Day and the annual Puerto Rican Festival. These cultural roots instilled a strong
    sense of family, mutual aid, and pride in heritage, which she carries into her professional life by championing causes that preserve and promote Puerto Rican art, language, and health initiatives. Fluent
    in both English and Spanish, Edna navigates the cultural nuances of her community, using her background to build trust with donors and volunteers who share similar experiences. Her identity as a Puerto
    Rican elder informs her commitment to intergenerational mentorship and the preservation of cultural memory within the broader New Bedford community.
attributes:
  skills: '[''donor relationship management'', ''creative fundraising campaign design'', ''event planning and budgeting'', ''grant writing and compliance'', ''public speaking and storytelling'', ''bilingual
    communication (English/Spanish)'', ''volunteer recruitment and mentorship'', ''basic data analysis for donor metrics'', ''network building across arts and health sectors'']'
  hobbies: '[''abstract watercolor painting'', ''visiting art galleries and museums'', ''reading Puerto Rican diaspora history'', ''cooking traditional Puerto Rican cuisine'', ''gardening herbs and ornamental
    plants'', ''walking along the New Bedford waterfront'', ''participating in a community poetry circle'', ''genealogy research'', ''knitting scarves'']'
  career_goals: Looking ahead, Edna aims to cement her legacy by establishing a scholarship fund that supports Puerto Rican youth pursuing the visual and performing arts, while also advising local cultural
    nonprofits on sustainable fundraising strategies. She plans to transition into a part-time consultancy role, offering mentorship to emerging fundraisers and helping organizations integrate innovative,
    narrative-driven approaches into their development plans. A personal ambition is to author a memoir that intertwines her fundraising experiences with reflections on Puerto Rican heritage and community
    resilience. Ultimately, she hopes to ensure that the arts programs she has championed in New Bedford remain financially secure for future generations.
