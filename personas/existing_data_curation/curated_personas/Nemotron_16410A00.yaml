  hobbies: '[''bowling league'', ''volunteering at community car‑care workshops'', ''DIY home improvement'', ''vintage motorcycle restoration'', ''electronics tinkering'', ''hiking in state parks'', ''cooking
    with friends'', ''live music events'', ''reading automotive magazines'', ''watching classic car documentaries'', ''gardening'']'
  career_goals: Evye aims to become a certified master technician with ASE Master Certification and to specialize in hybrid and electric vehicle repair, positioning herself as the go‑to expert in her region.
    She aspires to take on a shop‑manager role where she can mentor apprentices, introduce streamlined workflow processes, and champion a culture of safety and continuous learning. Long‑term, she dreams
    of opening her own independent garage that emphasizes flexible scheduling for employees, a community‑focused service model, and a niche in high‑performance and classic car restoration. Her competitive
    nature fuels her desire to earn recognition in regional automotive competitions and to be featured in trade publications.
