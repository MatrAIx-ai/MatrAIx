personas:
  professional: Evye Peele, a 43‑year‑old automotive service technician with over two decades of hands‑on expertise in engine diagnostics, hybrid systems, and classic car restoration, blends relentless
    curiosity with practical problem solving, they communicate repairs in plain language to customers, and they pursue a competitive edge by targeting high first‑time‑fix rates while eyeing ASE Master Certification
    and future shop‑manager leadership.
  sports: Evye Peele stays active by bowling with the town’s Wednesday Night League, joining the county hiking group for weekend treks in the state park, and cheering on the local minor league baseball
    team, the River City Roosters, while occasionally playing pickup softball with friends, they embody a sociable, competitive spirit that balances fitness with community camaraderie.
  arts: Evye Peele enjoys immersing themselves in the county fair’s live music scene, especially performances by classic rock acts like The Allman Brothers and country storytellers such as Gillian Welch,
    while also attending occasional community theater productions of ‘Our Town,’ and they find inspiration for garage creativity in the work of automotive photographer Ken Brown.
  travel: Evye Peele favors road‑trip adventures that combine hands‑on mechanics with scenic getaways, having weekended at Shawnee National Forest and Door County’s cherry orchards, they dream of a cross‑country
    drive to the Henry Ford Museum in Detroit and a tech‑focused visit to the EV Expo in Los Angeles, yet family commitments and shop duties often dictate a budget‑conscious, last‑minute planning style.
  culinary: Evye Peele loves cooking hearty Midwestern staples like chicken pot pie, meatloaf with mashed potatoes, and buttered corn on the cob, they often incorporate fresh tomatoes, peppers, and heirloom
    carrots from their vegetable garden into dishes, and their modest culinary skill shines during potluck nights where they serve a signature smoked bratwurst with sauerkraut and a side of homemade apple
    crisp.
  core: Evye Peele is a competitive, community‑oriented automotive technician who balances relentless curiosity with a laid‑back, sometimes disorganized streak, they often worry about shop performance while
    finding solace in bowling, garden‑fresh meals, and the hum of a vintage motorcycle engine.
background:
  cultural: Evye grew up in a middle‑class family in the small‑town Midwest, where practical work ethics and community ties are core values. The region’s modest, straightforward culture shaped her down‑to‑earth
    approach to both life and work. While she identifies as white American, she has navigated being a woman in a traditionally male‑dominated trade, giving her a keen sense of resilience and advocacy for
    inclusivity. She participates in local festivals, church gatherings, and neighborhood potlucks, reflecting the Midwest’s emphasis on close‑knit social networks. Her upbringing instilled a love for hands‑on
    problem solving, a respect for reliable routine, and an appreciation for the balance between independence and community support.
attributes:
  skills: '[''engine diagnostics'', ''engine rebuilding'', ''transmission repair'', ''brake and suspension servicing'', ''HVAC system maintenance'', ''electrical troubleshooting'', ''hybrid/electric vehicle
