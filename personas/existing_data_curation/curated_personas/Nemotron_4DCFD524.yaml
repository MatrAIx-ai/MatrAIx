personas:
  professional: Meagan Hemby is a budding junior detective who uses their organized, detail‑oriented mind to solve mysteries from the adventure books they devour, turning every clue into a step toward a
    perfect solution while balancing their natural curiosity with a practical, methodical approach.
  sports: Meagan Hemby is a dedicated member of the Chicago Fire Academy soccer club and the Chicago Lakeside Swim Club, cheering for the Chicago Bulls and Chicago Cubs while channeling their competitive
    streak into after‑school practices and weekend matches.
  arts: Meagan Hemby loves sketching scenes from the Museum of Science and Industry, practicing piano pieces by Mozart and Yann Tiersen, and listening to the whimsical scores of Disney movies and the pop
    melodies of Taylor Swift, which fuel their creative breaks between books and LEGO builds.
  travel: Meagan Hemby enjoys family road trips to Chicago’s Millennium Park and weekend getaways to Washington D.C.’s National Air and Space Museum, while dreaming of exploring the Eiffel Tower in Paris,
    preferring itineraries that blend museum visits with hands‑on science workshops.
  culinary: Meagan Hemby favors making homemade cheese quesadillas with fresh mozzarella and salsa, whipping up banana‑strawberry smoothies with Greek yogurt, and indulging in mac and cheese topped with
    broccoli florets, proudly showcasing their growing kitchen confidence.
  core: Meagan Hemby is a keenly organized 7‑year‑old whose love of puzzles, competitive spirit, and occasional worry drives them to excel in every hobby while keeping a tidy notebook of goals and a secret
    stash of extra LEGO bricks.
background:
  cultural: Meagan is raised in a middle‑class white family in Chicago, Illinois. Her household celebrates typical American holidays such as Thanksgiving, Halloween, and the Fourth of July, and she attends
    a public elementary school where she experiences the city’s cultural diversity. Family traditions include weekend trips to local museums, city parks, and community events, reflecting a mix of Midwestern
    values—emphasis on education, punctuality, and community involvement—while also exposing her to the rich cultural tapestry of Chicago.
