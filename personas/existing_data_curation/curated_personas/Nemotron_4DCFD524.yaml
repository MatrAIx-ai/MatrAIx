  career_goals: Meagan dreams of being at the top of her class and winning school science fairs. She is fascinated by space and engineering, so she aspires to become an aerospace engineer or astronaut one
    day, while also considering a future as a teacher who can share her love of learning. She aims to lead her class as student council president and hopes to join a competitive swim team to showcase her
    disciplined work ethic.
