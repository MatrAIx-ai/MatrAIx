personas:
  professional: Janeka Jackson is a Bronx middle‑school teacher who blends a practical mindset with a keen curiosity, designing rigorous state‑aligned curricula infused with culturally relevant projects,
    expertly leveraging Google Classroom, Seesaw, and interactive whiteboards, while their competitive streak fuels relentless data‑driven improvement and they constantly question established methods to
    ensure each lesson balances innovation with proven methodology.
  sports: Janeka Jackson channels high energy into early‑morning runs along the Bronx River Greenway, regular salsa dancing classes, and membership in the Bronx River Runners club, cheers for the New York
    Yankees and New York Knicks, and they compete fiercely in trivia‑themed fitness challenges at local community centers, balancing sociable group activities with a personal drive for excellence.
  arts: Janeka Jackson curates a vibrant arts life that includes salsa nights to the rhythms of Celia Cruz and Marc Anthony, frequent visits to the Bronx Museum of the Arts to view work by local muralists,
    and strategy board‑game gatherings featuring Catan, all of which feed their competitive spirit, collaborative nature, and curiosity, and they often host impromptu dance sessions after game nights.
  travel: Janeka Jackson prefers purposeful weekend getaways that blend cultural immersion with active exploration, such as a salsa workshop in Cartagena, a hiking trip to the Catskill Mountains, and a
    planned future visit to Barcelona’s music festivals, yet they carefully balance these adventures against a modest travel budget and family obligations, often feeling a mix of excitement and stress during
    planning.
  culinary: Janeka Jackson enjoys experimenting in the kitchen, modernizing classic comfort dishes like collard greens with smoked paprika and quinoa‑stuffed sweet potatoes, while they regularly savor street‑food
    staples such as jerk chicken tacos and corn‑meal hushpuppies, a palate that loves bold flavors, inventive twists, and the therapeutic rhythm of chopping vegetables after a stressful day.
  core: Janeka Jackson is an energetic, competitively driven educator who balances meticulous planning with spontaneous creativity, channels stress into yoga and running, and they navigate finances with
    disciplined saving tempered by occasional indulgences.
background:
  cultural: Janeka is an African‑American woman raised in the Bronx, a melting pot of Caribbean, Latin American, and Black cultures. Her family roots trace back to the southern United States, with strong
    ties to church, gospel music, and oral storytelling traditions. Growing up amidst the vibrant streets of the Bronx, she absorbed influences from Afro‑Caribbean rhythms, hip‑hop, and the community activism
    that defines the borough. These cultural threads shape her worldview and inform her teaching philosophy, which emphasizes cultural relevance, community partnership, and the celebration of Black identity.
    She is fluent in African American Vernacular English and comfortably code‑switches to Standard American English in professional settings, navigating both worlds with ease.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Lesson Planning'', ''Differentiated Instruction'', ''Assessment Design'', ''Educational Technology Integration'', ''Student Engagement'',
