  hobbies: '[''Salsa Dancing'', ''Community Fitness Classes'', ''Youth Mentorship Volunteering'', ''Organizing Neighborhood Block Parties'', ''Trivia Nights'', ''Board Games'', ''Yoga'', ''Journaling'',
    ''Running'', ''Exploring Culinary Scene / Cooking Soul Food'']'
  career_goals: Janeka aims to leverage her classroom experience to become a curriculum specialist focused on culturally responsive pedagogy for urban schools. Over the next five years she plans to earn
    a Bachelor’s degree in Education and a Master’s in Educational Leadership, positioning herself for a role as an assistant principal or instructional coach. She is passionate about closing the achievement
    gap for Black and Latinx students in the Bronx and hopes to develop a district‑wide STEM enrichment pathway that integrates community resources. Additionally, she aspires to serve on the local teachers’
    union board, advocating for professional development that balances innovative practices with the practical realities of high‑needs classrooms, while also seeking opportunities to mentor new teachers.
