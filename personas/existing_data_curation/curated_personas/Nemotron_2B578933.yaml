  career_goals: Marilyn aims to advance into senior leadership within the Roanoke Police Department, targeting positions such as Sergeant, Lieutenant, or the head of the Training Division. She wants to
    leverage her education background to design and implement evidence‑based training curricula for officers, and to establish a community‑youth mentorship program that combines academic support with positive
    police interaction. Over the next five years she hopes to earn the detective badge in the investigative unit, author a policing‑education handbook, and eventually transition to a part‑time instructor
    role at a local community college, teaching police science and public safety topics while continuing volunteer work in youth outreach.
