  hobbies: '[''salsa and plena dancing'', ''organic vegetable gardening'', ''preparing traditional Puerto Rican dishes'', ''volunteering at community festivals'', ''watching baseball'', ''reading local
    newspaper'', ''participating in church charity events'', ''fishing on local lakes'']'
  career_goals: Although officially out of the formal workforce, Arturo aims to formalize his contribution through volunteer leadership. He aspires to become a coordinator for the municipal senior program,
    organizing structured activities that promote health and social interaction. He wishes to lead cooking workshops that preserve and teach classic island recipes to younger generations. Arturo also hopes
    to document oral histories of longtime residents, creating a community archive. In the longer term, he envisions a modest weekend food stall at local festivals, providing a steady supplemental income
    while sharing his culinary heritage.
