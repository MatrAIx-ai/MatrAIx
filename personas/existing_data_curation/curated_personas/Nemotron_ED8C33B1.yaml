personas:
  professional: Arturo Pasos is a seasoned community volunteer who leverages his hands‑on repair expertise and love for traditional cooking to coordinate senior‑program activities, local event logistics,
    and cooking workshops that preserve island recipes.
  sports: Arturo Pasos follows the local baseball team, the San Lorenzo Seagulls, attends weekend games at the municipal stadium, joins neighborhood fishing outings on Lake Verde, and enjoys occasional
    pick‑up basketball with friends.
  arts: Arturo Pasos immerses himself in salsa and plena dancing at the community center, moving to the rhythms of Celia Cruz and Rubén Blades, and he frequently attends local theatrical performances featuring
    traditional folk narratives.
  travel: Arturo Pasos prefers short, organized trips with family, having explored Old San Juan, the bioluminescent bay in Fajardo, and the fishing villages of Vieques, while dreaming of a cultural tour
    of Spain’s colonial sites when finances allow.
  culinary: Arturo Pasos delights in preparing large batches of mofongo, arroz con gandules, and sancocho, expertly seasoning with sofrito, plantains, and recaito, and he enjoys tasting homemade alcapurrias
    and pastelón during community feasts.
  core: Arturo Pasos blends structured community service with lively salsa steps, garden stewardship, and generous cooking, all while juggling a frugal budget, occasional health lapses, and a dream of a
    weekend food stall.
background:
  cultural: Arturo’s cultural identity is rooted in the rural‑urban tapestry of San Lorenzo, Caguas Municipio, where agricultural traditions, Catholic faith, and Afro‑Caribbean rhythms intertwine. Growing
    up in a close‑knit Puerto Rican neighborhood, he experienced the island’s Spanish colonial legacy alongside African musical influences evident in bomba and plena. Family ties extend beyond blood relations
    to a broader network of neighbors who rely on mutual support, shaping his cooperative spirit and emphasis on harmony. Local customs such as the patron saint festivals, parrandas, and communal cooking
    gatherings have informed his love for group activities and traditional cuisine. Although he never married, Arturo maintains strong connections with siblings, cousins, and the wider community, embodying
    the values of hospitality, perseverance, and collective responsibility characteristic of Puerto Rican culture.
