  career_goals: Omar aims to transition his culinary passion and community‑organizing experience into a modest, family‑run Cuban café or food‑truck that serves traditional dishes to both locals and visitors
    in Little Havana. He plans to enroll in a short culinary certification program to formalize his cooking skills, secure the necessary food‑service permits, and develop a sustainable business model that
    leverages his business administration background. Parallel to his entrepreneurial aspirations, Omar hopes to become a regular volunteer coordinator at the local community center, curating cultural events
    that preserve Cuban heritage while fostering intergenerational connections. His long‑term ambition is to achieve financial stability for his family, provide mentorship to younger community members,
    and maintain a routine‑oriented lifestyle that balances work, family, and social engagement.
