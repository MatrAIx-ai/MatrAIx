  hobbies: '[''Salsa and bachata dancing'',''Cooking traditional Cuban cuisine'',''Playing dominoes'',''Recreational softball'',''Fishing in Biscayne Bay'',''Restoring a vintage Chevrolet'',''Watching Cuban
