  hobbies: '[''Community soccer league'', ''Dance classes'', ''Habitat for Humanity volunteering'', ''Waterfront biking'', ''Yoga and mindfulness'', ''DIY home improvement'', ''Construction technology exploration'',
    ''Drone photography'', ''Maritime festivals'', ''Local music events'']'
  career_goals: Maria aims to obtain the Virginia Licensed Building Inspector certification within two years and advance to a senior inspector role leading a team of inspectors. She plans to specialize
    in sustainable building practices and green code compliance, developing expertise in energy‑efficient construction and coastal resilience standards. She also intends to expand her proficiency in drone‑assisted
    inspections and eventually transition into a supervisory position within Norfolk's city code enforcement department or launch her own consulting firm offering comprehensive inspection and compliance
    services.
