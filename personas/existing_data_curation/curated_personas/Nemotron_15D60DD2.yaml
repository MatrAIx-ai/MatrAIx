personas:
  professional: Maria Hines, a meticulous building inspector in Norfolk, leverages deep knowledge of Virginia's building codes, digital inspection tools, and drone technology to enforce compliance while
    balancing a practical curiosity for sustainable construction and a competitive drive for precision.
  sports: Maria Hines, a dedicated midfielder for Norfolk's community soccer league, also participates in weekly salsa dance classes, cycles the historic waterfront trail, and avidly follows the Norfolk
    Tides baseball team and Virginia Beach City FC, treating fitness as both competition and community bonding.
  arts: Maria Hines, an enthusiastic photographer, captures drone footage of Norfolk's waterfront architecture, attends maritime festivals featuring local folk bands such as The Avett Brothers and enjoys
    live performances by the Virginia Symphony Orchestra, while drawing creative inspiration from contemporary artists like Edward Burtynsky and the soulful sounds of Chris Stapleton.
  travel: Maria Hines, a weekend adventurer, prefers short road trips along the Atlantic coast, having explored Charleston's historic district, the Outer Banks, and a recent solo visit to Barcelona to study
    Gaudí’s façades, balancing budget constraints with a curiosity for sustainable urban design.
  culinary: Maria Hines, a home‑cooking enthusiast, favors Chesapeake Bay crab cakes seasoned with Old Bay, grilled shrimp po'boys with fresh dill, and experiments with low‑waste meal prep using local heirloom
    tomatoes and seasonal greens, yet often succumbs to late‑night pizza deliveries after long inspection days.
  core: Maria Hines, a 26‑year‑old building inspector, blends Southern hospitality with a competitive edge, balancing meticulous code enforcement, green‑building enthusiasm, and a persistent worry that
    fuels both their productivity and occasional stress‑eating.
background:
  cultural: Maria was raised in a middle‑class white family in the suburbs of Norfolk, Virginia. Her upbringing blends traditional Southern hospitality with the multicultural influences of the Hampton Roads
    area, including exposure to the naval community, historic colonial heritage, and a growing emphasis on sustainability and coastal resilience. She values strong community ties, family gatherings, and
    a solid work ethic common among working‑class families in the region, while also appreciating the diverse cultural events, music, and culinary traditions that Norfolk offers.
