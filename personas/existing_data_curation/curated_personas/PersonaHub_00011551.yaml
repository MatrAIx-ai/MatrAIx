persona_description: A professional and avocational archaeologist who is a member of the New York State Archaeological Association (NYSAA) and is interested in the archaeological past of New York State.
  They share an interest in studying and excavating Native American sites, as well as promoting archaeological and historical research into the lives of people of diverse cultures living in what is now
  New York State and the material culture that they have left behind over the last 10,000 years. They are knowledgeable about the history and culture of the region and are actively involved in promoting
  archaeological research and education.
