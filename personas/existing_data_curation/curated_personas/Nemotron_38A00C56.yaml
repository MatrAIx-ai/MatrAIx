personas:
  professional: Michael Simmons, a 22-year-old high-voltage lineman-in-training, leverages their meticulous schematics reading and safety-first mindset to excel in power line maintenance, while their competitive
    edge drives them to lead crews and document every outage with precision.
  sports: Michael Simmons, a strength-training enthusiast who hikes the Wasatch Canyon trails with the local Wasatch Trail-Runners club, follows the Utah Jazz and Real Salt Lake loyally, spends weekend
    afternoons fishing the Green River or completing a seasonal hunting trip, and they view each workout as a tactical mission, reflecting their disciplined but solitary approach to fitness.
  arts: Michael Simmons unwinds by devouring science-fiction novels from Isaac Asimov and Philip K. Dick, listening to the intricate guitar work of Rush and the ambient synths of Vangelis, attending occasional
    screenings of Christopher Nolan's technically grounded films, and they find these pursuits satisfy their analytical mind and modest artistic curiosity.
  travel: Michael Simmons plans their travel down to the last mile, preferring caravan-style road trips that combine hiking in Utah's Zion and Bryce Canyon with a solo backpacking adventure through Iceland's
    volcanic trails, and they budget carefully to keep their utility job savings intact.
  culinary: Michael Simmons, an adept home cook, often whips up Utah-style mountain chili featuring ground bison, diced green chilies, cumin, and smoked paprika, savors grilled trout seasoned with lemon-butter
    and fresh dill, treats themselves to a well-executed pepperoni pizza from the local pizzeria, and they maintain a practical, no-frills approach to cooking.
  core: Michael Simmons is a routine-driven, solitary problem-solver who balances a competitive edge with a quiet dedication to mastering high-voltage electricity, and they obsessively catalogue their hobby
    projects while occasionally staying up late gaming against their own high standards.
background:
  cultural: Michael was raised in a predominantly white, LDS‑influenced community in Utah County, where self‑reliance, family responsibility, and a strong work ethic are emphasized. While he may not be
    strictly religious, the local culture of modesty, practicality, and community service shapes his values. The regional emphasis on outdoor recreation and a conservative, routine‑oriented lifestyle reinforces
    his preference for familiar patterns and traditional approaches.
attributes:
  skills: '[''High‑voltage line installation'', ''Power line repair and splicing'', ''Electrical safety compliance'', ''Technical schematics interpretation'', ''Basic circuit analysis'', ''Equipment rigging
    and pole climbing'', ''Troubleshooting and fault isolation'', ''Documentation and record keeping'', ''Team coordination on short‑term projects'']'
  hobbies: '[''DIY electronics tinkering'', ''Reading technical manuals and engineering biographies'', ''Classic science‑fiction novels'', ''Hiking and trail walking'', ''Fishing'', ''Seasonal hunting trips'',
    ''Strength training'', ''Strategic video gaming'']'
  career_goals: Michael aims to earn a journeyman lineman certification within the next two years, followed by a crew‑lead position at his utility company. He plans to complete his associate degree in electrical
    technology to broaden his technical credentials. Long‑term, he aspires to start his own small electrical contracting business focused on rural Utah, leveraging his practical expertise and competitive
    drive to become a respected local service provider.
