personas:
  professional: Trisha Kenney, a 14‑year‑old budding wildlife illustrator, channels their intense curiosity and meticulous practicality into detailed bird and fish sketches, applying the strategic, competitive
    mindset they hone in chess and online strategy games to self‑directed art projects while maintaining a reliable yet flexible personal schedule and preferring solitary work over collaboration.
  sports: Trisha Kenney participates in their school’s cross‑country team in the fall and rows with a youth river club in the summer, favoring solo endurance workouts along the Mississippi River while avidly
    following the St. Louis Cardinals for baseball and the Minnesota Vikings for football, channeling their competitive drive into personal time‑trial goals.
  arts: Trisha Kenney immerses themselves in wildlife art, spending weekends sketching river birds in the style of John Audubon, photographing fish with a Nikon D3500, strumming acoustic covers of John
    Mayer, and reading Agatha Christie mysteries for narrative inspiration, all of which shape their quiet yet expressive creative identity.
  travel: Trisha Kenney prefers low‑key, nature‑focused travel, having camped in the Great Smoky Mountains, taken a weekend kayaking trip through the Mississippi River Delta, and dreaming of a solo photography
    expedition to Iceland’s volcanic coast, always planning itineraries with a flexible, budget‑conscious mindset.
  culinary: Trisha Kenney enjoys simple, fresh meals like lemon‑garlic grilled trout, shrimp étouffée, and homemade granola, often cooking alone while listening to acoustic guitar playlists, and occasionally
    treats themselves to sweet pastries when their mood dips, reflecting both practical nutrition and emotional comfort.
  core: Trisha Kenney is a quietly competitive teen whose intense curiosity, artistic solitude, and emotional depth drive a disciplined yet flexible pursuit of nature‑inspired creativity.
background:
  cultural: Born and raised in Destrehan, Louisiana, Trisha grew up in a predominantly White Southern suburban community with family roots tracing back to Anglo‑American settlers and some French‑Canadian
    ancestry common to St. Charles Parish. Her upbringing blends typical Southern cultural elements—such as attending a local Catholic church, celebrating holidays like Thanksgiving and Mardi Gras with
    regional foods like gumbo and beignets—with a modern, tech‑savvy environment. The proximity to the Mississippi River and nearby wetlands fostered her early interest in environmental stewardship, while
    the close‑knit nature of her neighborhood emphasized personal responsibility, self‑reliance, and a respect for both tradition and innovation.
