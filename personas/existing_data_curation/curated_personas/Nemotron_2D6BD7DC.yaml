  career_goals: Trisha aims to earn a scholarship to a university renowned for marine biology or environmental science, with the long‑term goal of becoming a marine ecologist focused on Louisiana’s coastal
    wetlands. She is driven to excel academically, win her school’s science fair, and secure a mentorship with a local wildlife rehabilitator. Her personal experiences with anxiety also inspire her to study
    psychology, hoping to support adolescent mental health in her community. In the short term, she plans to maintain a high GPA, expand her coding skills, and participate in regional conservation projects.
