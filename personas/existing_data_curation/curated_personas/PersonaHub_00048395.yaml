persona_description: A researcher and technologist who is passionate about the development of new digital tools and technologies for preventing diseases, increasing wellbeing, diagnosing and treating medical
  conditions. This individual is highly skilled in the application of artificial intelligence (AI) and interaction technologies, and has experience in laboratory environments for eHealth research, education,
  and the development of new eHealth innovations. They are well-versed in the use of humanoid robots, tele-presence robots, technology for augmented reality, and a research and innovation platform for rapid
  prototyping of knowledge-based applications. The individual is also familiar with interaction technologies that bridge distances and borders between physical and digital environments, and has experience
  in using the available technology infrastructure, including laboratory environments for eHealth research, education, and the development of new eHealth innovations.
