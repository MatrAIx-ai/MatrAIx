personas:
  professional: Miya Barrett is a budding junior horticulturist and LEGO architect who thrives on routine garden chores and structured building projects, using their practical mindset and cooperative nature
    to nurture plants and help classmates with shared creations.
  sports: Miya Barrett enjoys weekend soccer matches with the Chester County Youth Soccer Club, cheers for the Philadelphia Eagles on game nights, and loves spontaneous nature hikes that feel like a real‑life
    obstacle course, preferring to run, climb, and tag rather than sit still.
  arts: Miya Barrett loves drawing animals with crayons, copying the style of Eric Carle’s picture books, building LEGO scenes inspired by Pixar’s 'Toy Story', and listening to the Wiggles while coloring,
    often humming the tunes and creating their own little stories.
  travel: Miya Barrett prefers family‑planned road trips to kid‑friendly spots like Hershey’s Chocolate World, the historic streets of Philadelphia, and weekend camping at nearby state parks, balancing
    excitement for new adventures with the comfort of familiar routines such as packing the same favorite snack of apple slices and a coloring book for each journey.
  culinary: Miya Barrett delights in mixing batter for chocolate chip cookies, carefully sprinkling chocolate chips with a tiny spoon, loves the crunch of carrot sticks with ranch dip, and proudly helps
    stir a pot of macaroni and cheese, favoring simple flavors like cheddar and strawberries in smoothies.
  core: Miya Barrett is a routine‑loving, garden‑hand‑in‑training who balances LEGO imagination with a sweet tooth, occasional sock‑losing, and a heart that always makes space for friends.
background:
  cultural: Miya comes from a white, middle‑class family rooted in European‑American traditions in Chester Springs, Pennsylvania. Her household celebrates mainstream American holidays—Thanksgiving, Christmas,
    Independence Day—with familiar customs, and frequently participates in community events at the local church and the Chester County fair. Attending a public elementary school in a suburban setting, she
    is exposed to the region’s blend of historic heritage and open, rural landscapes, which nurtures her appreciation for nature, community harmony, and practical, hands‑on learning.
attributes:
  skills: '[''Reading simple sentences'', ''Writing name and basic words'', ''Counting to 100'', ''Basic addition'', ''Following daily routines'', ''Teamwork and sharing'', ''Fine motor skills (coloring,
