  hobbies: '[''Drawing and coloring'', ''Building with LEGO'', ''Reading picture books about animals'', ''Gardening with parents'', ''Baking cookies with family'', ''Exploring local woods'', ''Playing with
    dolls'', ''Cooperative games with classmates'']'
  career_goals: Miya dreams of growing up to work in a caring, predictable environment where she can help others. She imagines herself as a teacher who guides young children through daily lessons, or as
    a veterinarian who looks after animals. Both paths appeal to her love for routine, practical tasks, and the well‑being of others. She also hopes to keep learning about nature and perhaps one day manage
    a small community garden where she can share fresh produce and foster harmony among neighbors.
