  hobbies: '["Visiting art galleries and museums", "Sketching and drawing", "Listening to indie and jazz music on vinyl", "Hiking and wildlife photography", "Building Arduino and Raspberry Pi projects",
    "Creating data visualizations for personal finance", "Playing strategic video games (e.g., Civilization)", "Reading science-fiction novels", "Playing acoustic guitar", "Participating in small tabletop
    RPG sessions"]'
  career_goals: Mark aims to pass the CPA exam within the next two years and secure a senior audit position at a regional firm. He plans to deepen his expertise in forensic accounting and data-driven audit
    practices, eventually becoming a partner or director who leads innovative audit projects. He also hopes to work part-time with local arts nonprofits, providing financial guidance that blends his appreciation
    for art with his analytical skill set. In the long term, he envisions shaping accounting standards that incorporate sustainability and creative thinking.
