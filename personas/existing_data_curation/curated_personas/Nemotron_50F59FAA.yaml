personas:
  professional: A diligent computer support specialist, Susan Costner leverages her strong troubleshooting expertise, empathy‑driven customer service, and curiosity for innovative solutions to resolve hardware,
    software, and networking issues, while they navigate a relaxed approach to scheduling that sometimes leads to missed tickets, aiming to earn CompTIA Network+ and Security+ certifications and transition
    into senior IT support or UX‑focused digital services.
  sports: An avid weekend hiker and casual jogger, Susan Costner frequents Riverside's winding walking trails, plays co‑ed soccer with the Riverside Runners Club during spring, cheering on the Los Angeles
    Dodgers and Lakers on game nights, while they occasionally attend yoga classes at a nearby studio to balance their love for movement with their laid‑back approach to fitness.
  arts: A creatively curious gallery‑hopper, Susan Costner sketches watercolor studies of contemporary pieces by Agnes Cecile, revels in improv nights featuring The Second City alumni, and draws inspiration
    from indie folk duo Fleet Foxes and playwright Lin‑Manuel Miranda, while they often integrate artistic insights into their problem‑solving at work.
  travel: A relaxed wanderer, Susan Costner prefers spontaneous weekend getaways over rigid itineraries, having explored the street art of Berlin, the historic neighborhoods of Charleston, and the seaside
    cafés of Lisbon, while they dream of a cultural immersion trip to Tokyo’s Shibuya district, balancing their love for new experiences with their modest travel budget and occasional work‑related travel
    constraints.
  culinary: A culinary experimenter, Susan Costner enjoys cooking experimental dishes such as miso‑glazed salmon with heirloom tomatoes, spicy Korean bibimbap featuring gochujang and fresh bok choy, and
    hand‑rolled vegan sushi with avocado and pickled radish, showcasing a confident intermediate skill level and a penchant for sourcing seasonal produce at farmer’s markets, while they occasionally improvise
    new flavor combos inspired by their art projects.
  core: Susan Costner blends a tech‑savvy, arts‑infused curiosity with a laid‑back, sometimes disorganized lifestyle, and they turn spontaneous creativity into both professional innovation and eclectic
    personal pursuits.
background:
  cultural: Susan grew up in a middle‑class, predominantly white suburb of Richmond, Virginia, where Southern hospitality and a strong sense of community were emphasized. Her upbringing combined the region's
    traditional values—such as neighborly support and participation in local events—with exposure to broader cultural experiences through school art programs and occasional family trips to larger cities.
    Although rooted in her local heritage, Susan actively seeks diverse perspectives, appreciating the blend of historic Southern roots and contemporary, multicultural influences that shape her outlook.
attributes:
  skills: '[''Hardware diagnostics'', ''Software installation and configuration'', ''Windows and macOS troubleshooting'', ''Network connectivity troubleshooting'', ''Ticketing system management (e.g., ServiceNow)'',
    ''Remote assistance tools (e.g., TeamViewer, LogMeIn)'', ''PowerShell scripting basics'', ''Basic cybersecurity best practices'', ''Effective verbal and written communication'', ''Empathy-driven customer
    support'', ''Team collaboration'', ''Adaptability to new technologies'', ''Problem-solving under pressure'', ''Conflict de‑escalation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Attending live theater and improv shows'', ''Participating in local tech meetups'', ''Board game nights with
    friends'', ''Volunteering at the community animal shelter'', ''Exploring Riverside walking trails'', ''Cooking experimental dishes'', ''Traveling to new cities for cultural immersion'']'
  career_goals: Susan aims to advance into a senior IT support or system administration role within the next three to five years, targeting industry certifications such as CompTIA Network+ and Security+
    to deepen her technical expertise. She aspires to lead a support team, fostering a collaborative culture that blends technical excellence with customer‑centric values. Long‑term, she envisions combining
    her love for technology and art by stepping into a user experience (UX) support or digital creative services position, helping organizations create intuitive, aesthetically pleasing tech experiences
    for end users.
