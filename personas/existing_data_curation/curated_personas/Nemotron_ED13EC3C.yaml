    ''Conflict mediation and group facilitation'']'
  hobbies: '[''Watercolor painting'', ''Collecting Mexican folk ceramics'', ''Visiting art galleries and First Friday events'', ''Reading historical and science literature'', ''Gardening (chiles, beans,
    herbs)'', ''Digital photography and archival of community stories'', ''Chess and puzzle solving'', ''Robotics tutoring for middle‑school girls'', ''Journaling and gentle yoga for mindfulness'']'
  career_goals: Although retired, Maria aims to keep learning and contributing. She plans to launch an intergenerational 'Science & Storytelling' program at the local community center, where seniors share
    personal migration histories while students create interactive digital exhibits. She hopes to curate a traveling exhibition that juxtaposes traditional Mexican folk art with contemporary data visualizations,
    highlighting cultural continuity. She aspires to serve as a senior advisor on the board of the Albuquerque Museum of Art and History, offering insight on integrating technology into exhibitions. Additionally,
    she intends to complete a memoir that weaves her professional journey with reflections on resilience, providing a resource for women in STEM, and to train as a peer‑support volunteer for older adults
    coping with anxiety and grief.
