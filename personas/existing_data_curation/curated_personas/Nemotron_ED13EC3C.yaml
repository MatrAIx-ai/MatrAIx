personas:
  professional: Maria Robinson, a retired civil engineer turned community STEM facilitator, leverages their methodical project-planning, budgeting, and basic Python coding skills to design intergenerational
    science-storytelling workshops, while their innate compassion and anxiety-driven attention to detail ensure every grant proposal and volunteer program runs smoothly and empathetically.
  sports: Maria Robinson enjoys early-morning walks along the Rio Grande bosque, follows the Albuquerque Isotopes baseball team and the New Mexico Lobos women's basketball squad, and they participate in
    a senior-friendly hiking club that meets every Saturday, using these low-impact activities to balance a lifelong engineering mindset with gentle fitness.
  arts: Maria Robinson, an avid participant in Albuquerque's First Friday Gallery Walk, collects regional ceramics, paints watercolors of the Sandia Mountains, admires the works of Georgia O'Keeffe, contemporary
    photographer Todd Hido, and folk singer Linda Ronstadt, and they integrate these artistic influences into their intergenerational STEM workshops.
  travel: Maria Robinson plans trips with a blend of careful budgeting and curiosity-driven spontaneity, having explored the historic streets of Santa Fe, the vibrant festivals of Oaxaca, and the serene
    landscapes of New Zealand's South Island, while they dream of a future pilgrimage to the ancestral villages of the Southwest to document oral histories with their new digital camera.
  culinary: Maria Robinson cultivates chiles, beans, and cilantro in a modest backyard garden, loves cooking traditional roasted green chile stew with corn masa dumplings, delights in pairing it with freshly
    baked pan de campo, and they occasionally treat themselves to a fine-dining tasting menu featuring duck confit with fig reduction to celebrate a successful grant award.
  core: Maria Robinson blends analytical rigor with artistic curiosity, navigating anxiety through creative hobbies, community mentorship, and meticulous planning, and they occasionally indulge in spontaneous
    ceramic purchases that fuel both joy and a tinge of financial guilt.
background:
  cultural: Maria was born to Mexican immigrant parents who settled in Albuquerque in the early 1950s. Raised in a bilingual household, she grew up listening to traditional corridos and celebrating Día
    de los Muertos with family altars adorned with marigolds and photographs of ancestors. Her upbringing emphasized respect for community, family solidarity, and the value of hard work, traits that guided
    her academic pursuits in a predominantly male STEM field. While she later married a non‑Mexican partner and adopted the surname Robinson, she retained strong ties to her Mexican heritage, regularly
    preparing dishes such as mole poblano and tamales for neighborhood potlucks. She remains active in the local Mexican Cultural Center, helping organize language workshops and cultural festivals that
    bridge generations. This cultural foundation informs her commitment to preserving Mexican histories in Albuquerque and sharing them through art and technology.
attributes:
  skills: '[''Analytical problem-solving'', ''Technical troubleshooting'', ''Project planning and budgeting'', ''Grant writing and fundraising'', ''Mentorship and tutoring in STEM'', ''Community volunteer
