personas:
  professional: A veteran information security analyst, Felix Blandon, they blend decades of risk assessment, vulnerability management, and incident response expertise to translate complex cyber threats
    into clear, actionable guidance for senior leaders, while passionately mentoring junior staff and infusing culturally relevant examples into a company‑wide security awareness curriculum.
  sports: A community‑oriented fitness enthusiast, Felix Blandon, they regularly walk the historic streets of West Newton with the local senior walking club, join a seasonal senior tennis league, and cheer
    loudly for the Boston Red Sox, Celtics, and New England Patriots, while occasionally hiking the White Mountains with a small group of photography friends.
  arts: An avid arts patron, Felix Blandon, they frequent Boston’s Museum of Fine Arts and Isabella Stewart Gardner Museum, attend productions at the Boston Playwrights’ Theatre, host art‑themed discussion
    circles, and draw inspiration from Monet, Picasso, and Yo‑Yo Ma’s cello performances, often integrating these influences into their own classical guitar practice.
  travel: A culturally curious explorer, Felix Blandon, they plan detailed weekend getaways to Cape Cod and the White Mountains, relish spontaneous trips to New York City’s art districts, and dream of visiting
    Antigua’s colonial plazas and Tuscany’s vineyards, all while balancing retirement budgeting constraints and family commitments.
  culinary: A seasoned home chef, Felix Blandon, they specialize in traditional Guatemalan dishes like pepian and kakʼik, expertly balancing roasted chiles, tomatoes, and corn masa, while also delighting
    in Boston seafood staples such as clam chowder, often hosting neighborhood festivals where they showcase their love for bold, aromatic flavors.
  core: A sociable, talkative mentor, Felix Blandon, they seamlessly blend cybersecurity mastery with a passion for art, music, and community cooking, though they sometimes overcommit to volunteer projects,
    leading to missed dentist appointments and a lingering habit of late‑night coffee.
background:
  cultural: Felix was born to Guatemalan immigrant parents who settled in the Boston area in the early 1970s. Raised bilingually, he grew up hearing Spanish and occasional Kaqchikel stories from extended
    family, fostering a deep appreciation for Guatemala’s rich cultural heritage. He celebrates traditional holidays such as Día de los Muertos and Semana Santa with vibrant family rituals, and actively
    participates in the local Guatemalan diaspora community—attending cultural festivals, supporting a Spanish‑language radio program, and preserving culinary traditions. His cultural roots inform his collaborative,
    harmony‑focused approach to both work and community life.
attributes:
  skills: '["Risk Assessment", "Vulnerability Management", "Incident Response", "Security Architecture Design", "Compliance (NIST, ISO 27001)", "SIEM Administration", "Threat Intelligence", "Python Scripting
