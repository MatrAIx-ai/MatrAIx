  hobbies: '["Museum and gallery visits", "Theater and live performance attendance", "Art discussion circles", "Guatemalan cooking and recipe sharing", "Photography (urban and nature)", "Classical guitar
    playing", "Salsa dancing", "Volunteer tech tutoring for seniors"]'
  career_goals: Approaching retirement, Felix aims to transition from hands‑on analysis to a mentorship and advisory role. He plans to establish a formal cybersecurity mentorship program within his organization,
    champion a company‑wide security awareness curriculum that incorporates culturally relevant examples, and serve as a volunteer advisor for nonprofit organizations that support Latin American immigrants.
    Long‑term, he envisions consulting part‑time on governance frameworks for midsize firms while delivering guest lectures on emerging security trends at local universities.
