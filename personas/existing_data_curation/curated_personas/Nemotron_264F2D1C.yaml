personas:
  professional: Marta Quezada is a budding builder who spends hours arranging Lego bricks into tidy cityscapes, and they delight in the predictable grid while welcoming friends to rearrange the streets
    for spontaneous fun.
  sports: Marta Quezada loves playing soccer with the Little Kickers Club, they cheer on the Washington Nationals during family outings, and they enjoy practicing basic gymnastics moves at home, blending
    energetic group play with a relaxed attitude toward competition.
  arts: Marta Quezada swirls to the lively cumbia beats of Carlos Vives and Shakira during dance time, they adore watching Disney's Coco and listening to Mickey Mouse songs, and they proudly draw colorful
    pictures of arepas and empanadas during art class.
  travel: Marta Quezada prefers short car trips that end with a picnic, they have visited Virginia Beach and the National Mall in Washington, D.C., and they dream of exploring the colorful streets of Cartagena,
    balancing family-approved destinations with a love for new adventures.
  culinary: Marta Quezada enjoys devouring sweet cheese-filled arepas and beef empanadas at family gatherings, they love munching on apple slices and carrot sticks for snacks, and they proudly stir batter
    for banana pancakes, showcasing a palate that mixes traditional home flavors with typical kid-friendly foods.
  core: Marta Quezada is a bright, energetic four-year-old who balances a love for orderly block towers with spontaneous sticker trades, relishes lively family rhythms, and navigates the world with a gentle,
    cooperative spirit.
background:
  cultural: Marta’s Colombian heritage is woven into her everyday life. At home Spanish is spoken alongside English, and she celebrates Colombian holidays with family‑made sweets and traditional foods like
    arepas and empanadas. She listens to cumbia, vallenato, and other folk rhythms, and her grandparents share stories from Colombia, fostering a strong sense of cultural identity while she grows up in
    Palmyra, Virginia.
