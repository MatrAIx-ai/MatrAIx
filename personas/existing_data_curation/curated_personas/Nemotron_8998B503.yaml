  hobbies: '["Cooking (Korean cuisine)", "Yoga and mindfulness meditation", "Reading (personal development, business books)", "Book club participation", "Volunteer language tutoring", "Hiking", "Gardening"]'
  career_goals: Hyo aims to advance within the customer experience field, targeting a team lead position within the next two years. She plans to obtain a Certified Customer Service Professional (CCSP) credential
    and pursue a part‑time MBA to transition into operations management or business analysis. Long‑term, she envisions a managerial role overseeing service quality and process improvement, leveraging her
    business degree and methodical work style.
