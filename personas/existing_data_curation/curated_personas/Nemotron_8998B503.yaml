personas:
  professional: A customer experience specialist named Hyo Wong leverages their methodical CRM expertise and bilingual communication to streamline support operations, aspiring to lead a CX team within two
    years.
  sports: An outdoor enthusiast named Hyo Wong hikes the Appalachian Trail on weekends, trains with a local climbing club, follows the Baltimore Ravens for football, and joins seasonal intramural soccer
    leagues with friends.
  arts: A culturally attuned art lover named Hyo Wong enjoys pop performances by a popular East Asian group like BTS, attends local jazz concerts featuring Esperanza Spalding, and discusses business books
    by Simon Sinek in their book club, while occasionally doodling kimchi jars in meeting margins.
  travel: A detail‑oriented traveler named Hyo Wong prefers meticulously planned trips, such as a week‑long culinary tour of a coastal city's fish markets, a weekend escape to Shenandoah National Park,
    and a future goal to explore Kyoto’s temples while balancing a modest travel budget.
  culinary: A creative home chef named Hyo Wong masterfully prepares bibimbap, kimchi jjigae, and experimental kimchi tacos, favoring ingredients like gochujang, sesame oil, and fresh herbs, and often hosts
    dinner gatherings to showcase evolving fusion recipes.
  core: Hyo Wong blends disciplined organization with a love for fusion cooking, turning structured workdays into mindful moments of yoga and weekend hikes.
background:
  cultural: Hyo comes from an East Asian (Korean) immigrant family that settled in Maryland. Her upbringing emphasized respect for elders, the importance of education, and maintaining cultural traditions
    such as Lunar New Year celebrations and Korean cuisine. Growing up in a bilingual household, she balances American and Korean cultural values, fostering adaptability and a strong work ethic. The diverse
    community in Baltimore County provides her with both a connection to her heritage and exposure to a multicultural environment.
