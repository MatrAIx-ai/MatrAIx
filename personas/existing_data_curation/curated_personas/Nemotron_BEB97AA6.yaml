  career_goals: Phillip aims to graduate high school with strong grades and pursue a community‑college pathway in computer networking or information technology, with the long‑term ambition of becoming a
    network systems administrator who ensures reliable connectivity for businesses. He is also drawn to public‑service roles, aspiring to train as a fire department EMT to combine his love for routine,
    teamwork, and community aid. In the short term, he seeks leadership positions in school clubs, such as student council treasurer, to develop budgeting and organizational skills that will support his
    future career in either IT management or emergency services.
