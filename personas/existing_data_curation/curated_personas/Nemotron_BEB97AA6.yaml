personas:
  professional: Phillip Strickland, a 14‑year‑old aspiring robotics enthusiast, harnesses their methodical love of routine and outgoing teamwork to design and build precise LEGO Technic mechanisms and program
    club robots, consistently delivering step‑by‑step solutions while coordinating peers with reliable, organized leadership.
  sports: Phillip Strickland, a 14‑year‑old midfielder on their middle‑school soccer team and a right‑fielder on the baseball squad, follows a disciplined training schedule that incorporates daily jogs,
    strength drills, and weekly volunteer clean‑up runs, looks up to professional clubs like the LA Galaxy for soccer and the Boston Red Sox for baseball, and meticulously tracks their performance stats
    in a spreadsheet after each game.
  arts: Phillip Strickland, a 14‑year‑old percussionist in their school’s marching band, channels the powerful beats of John Bonham while practicing intricate drum cadences, enjoys listening to Imagine
    Dragons and the Beatles between rehearsals, and hosts organized board‑game nights featuring Catan, Ticket to Ride, and Pandemic, reflecting their love for structured, collaborative creativity.
  travel: Phillip Strickland, a 14‑year‑old who prefers meticulously planned family trips, has explored the Grand Canyon and Washington, D.C. on school field trips, dreams of visiting Tokyo’s Lego land
    and London’s historic museums, and always creates detailed itineraries in a spreadsheet to ensure every museum, park, and soccer field is covered.
  culinary: Phillip Strickland, a 14‑year‑old budding home‑chef who relishes the predictability of measured recipes, regularly perfects spaghetti Bolognese with ground beef, tomatoes, and fresh basil, masters
    chocolate‑chip cookies using butter, brown sugar, and vanilla, and frequently prepares layered nachos with shredded cheddar, jalapeños, and salsa for board‑game nights, always double‑checking each step
    for consistency.
  core: Phillip Strickland, a 14‑year‑old methodical multitasker, balances LEGO robotics, drum practice, and competitive gaming with a habit of double‑checking alarms, yet often stays up late after a victory,
    leading to rushed mornings before school.
background:
  cultural: Phillip was raised in a middle‑class White American family in the suburban enclave of Irvine, California. His upbringing reflects typical Southern California suburban culture, emphasizing strong
    academic achievement, organized family routines, and active participation in extracurricular sports and clubs. While his household celebrates mainstream American holidays such as Thanksgiving and the
    Fourth of July, exposure to Irvine's multicultural community has broadened his awareness of diverse perspectives. Core family values prioritize practicality, reliability, and a traditional respect for
    routine, shaping his worldview while encouraging inclusive community involvement through volunteerism and team activities.
