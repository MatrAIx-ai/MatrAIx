personas:
  professional: Yamilette Villa, a 45‑year‑old bilingual community organizer with an associate’s degree in Business Administration, blends practical budgeting, event‑planning acumen, and an outgoing, curiosity‑driven
    approach to launch a small catering business while preparing for a hospitality management degree.
  sports: Yamilette Villa stays fit through salsa and folklórico dance classes, mid‑week Zumba sessions at the local community center, and gardening, while cheering on the Houston Astros, Rockets, and Texans
    and occasionally playing recreational softball with the Fort Bend Community League.
  arts: Yamilette Villa enjoys immersing herself in the vivid paintings of Frida Kahlo, listening to the soulful guitars of Carlos Santana and the pop rhythms of Selena, and attending community theater
    productions of classics like A Streetcar Named Desire, which inspire her DIY home‑decor projects and event aesthetics.
  travel: Yamilette Villa prefers purposeful travel, spending long weekends exploring culinary hotspots such as Oaxaca’s markets, road‑tripping to San Antonio’s River Walk, and planning a future cultural
    immersion tour of Mexico City’s historic neighborhoods, all balanced with a modest travel budget and family commitments.
  culinary: Yamilette Villa’s cooking blends mastery of mole poblano, chiles en nogada, and homemade tamales with a penchant for experimenting with fresh garden epazote, tomatillos, and corn masa, and she
    relishes hosting dinner parties where guests sample her inventive twists on classic Mexican dishes.
  core: Yamilette Villa is a socially vibrant, curiosity‑driven culinary enthusiast who balances meticulous community planning with occasional kitchen gadget splurges, a mild habit of procrastinating paperwork,
    and an unwavering calm under pressure.
background:
  cultural: Yamilette is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Her upbringing emphasized family cohesion, religious
    traditions, and festive celebrations like Día de los Muertos and Cinco de Mayo. Living in Richmond, Texas, she blends her Mexican heritage with the diverse cultural tapestry of Fort Bend County, participating
    in local Hispanic community events and maintaining ties to extended family in Mexico. This rich cultural foundation informs her values of harmony, generosity, and respect for communal well‑being.
attributes:
  skills: '["Bilingual Spanish-English communication", "Community event planning", "Culinary arts (traditional Mexican cuisine)", "Basic bookkeeping", "Customer service", "Volunteer coordination", "DIY
    home improvement", "Teaching/mentoring"]'
  hobbies: '["Cooking traditional Mexican dishes", "Salsa dancing", "Gardening", "Zumba fitness classes", "Volunteering at community festivals", "Reading historical fiction", "DIY home decor projects",
    "Mentoring youth in community programs"]'
  career_goals: Yamilette aims to turn her passion for Mexican cuisine and community engagement into a small catering business that serves local events and corporate gatherings, emphasizing authentic flavors
    and cultural storytelling. She also hopes to obtain a bachelor's degree in hospitality management to deepen her expertise and eventually work as a community outreach coordinator for a health nonprofit,
    focusing on nutrition education for families in Fort Bend County. Over the next five years, she envisions balancing her entrepreneurial venture with part-time teaching at a community college, sharing
    her culinary knowledge with students.
