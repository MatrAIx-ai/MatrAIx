personas:
  professional: Christopher Capehart, a budding junior game designer and robotics hobbyist, merges their vivid comic‑book sketches with LEGO Mindstorms programming and Minecraft world‑building, channeling
    curiosity into imaginative prototypes while their relaxed attitude toward schedules often leads to spontaneous, last‑minute creations, and they thrive on the thrill of turning a half‑finished idea into
    a polished demo.
  sports: Christopher Capehart, a passionate 11‑year‑old point guard for the YMCA Tigers youth basketball team, idolizes Dallas Mavericks guard Luka Dončić and emulates his footwork, yet they often trade
    scheduled practices for late‑night comic drawing, resulting in an erratic training rhythm that mirrors their flexible outlook.
  arts: Christopher Capehart, an avid sketcher who fills notebooks with reimagined Marvel heroes in the style of Alex Ross and experiments with graffiti‑inspired doodles echoing Banksy, spends weekends
    at the Dallas Museum of Art’s interactive exhibitions while blasting Kendrick Lamar’s hip‑hop beats, Miles Davis’s trumpet riffs, and Koji Kondo’s video‑game melodies, which together shape an eclectic
    artistic voice they proudly share with friends.
  travel: Christopher Capehart, whose travel diary lists day trips to the Dallas Arboretum and the Perot Museum, dreams of a future visit to Tokyo’s Akihabara for rare manga and a trek to San Diego for
    Comic‑Con, but prefers spontaneous weekend getaways over rigid itineraries, often relying on school‑organized field trips while they fret over the cost of souvenirs and limited vacation days.
  culinary: Christopher Capehart, a self‑declared taco and pizza enthusiast, they regularly order pepper‑jack cheese‑laden nachos with jalapeños and salsa after late‑night game sessions, can whip up a decent
    microwave mac and cheese in under five minutes, but rarely experiment beyond cereal and store‑bought snack bars, citing a habit of losing focus when cooking.
  core: Christopher Capehart, an imaginative yet scattered 11‑year‑old who fuses comic‑book art with robotics while worrying about missed deadlines, constantly oscillates between creative bursts and frantic,
    last‑minute scrambles, and they often turn to sketching for relief.
background:
  cultural: Christopher is raised in a Black family in Irving, Texas, a city that blends Southern African‑American traditions with the multicultural vibe of the Dallas metro area. His household celebrates
    Sunday church gatherings, soul‑food meals, and family storytelling, and they participate in local Juneteenth events, community festivals, and programs at the Irving African American Museum. He benefits
    from community resources like the Boys & Girls Club, where art and tech workshops expose him to diverse creative influences. These experiences weave together a sense of pride in his heritage with an
    openness to the varied cultural currents of his city.
