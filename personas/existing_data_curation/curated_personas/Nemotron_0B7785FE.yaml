  career_goals: Christopher hopes to turn his love of art and technology into a flexible, creative career. He dreams of becoming a graphic designer or animator who produces comics, video‑game art, or animated
    short films, and he also envisions working as a digital storyteller or museum educator who shares artistic experiences with his community. Because he prefers low‑pressure environments and worries about
    strict deadlines, he seeks roles that allow self‑paced projects, small‑team collaboration, and room to experiment with unconventional ideas.
