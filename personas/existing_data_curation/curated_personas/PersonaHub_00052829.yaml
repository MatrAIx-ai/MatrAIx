persona_description: A woman who is a well-respected and knowledgeable healer and calligrapher, who is also known for her wisdom and her ability to read and write. She is a member of the Adi clan of the
  Quraysh in Mecca and was one of the first women to acquire folk-medicine skills. She is a Muslim and was among the first to join the emigration to Medina. She is also a member of the circle of companions
  of the Islamic prophet Muhammad and was among the first to join the emigration to Medina. She is known for her reputation as a wise woman and her ability to heal. She is also known for her skill in calligraphy
  and for teaching it to others.
