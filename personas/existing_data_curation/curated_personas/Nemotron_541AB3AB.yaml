personas:
  professional: Pan Kim is a preschool teacher who weaves meticulously structured lesson plans with spontaneous, child‑driven activities, leveraging bilingual Korean‑English communication and strong classroom
    management to foster inclusive learning while prioritizing a harmonious, cooperative classroom atmosphere, even as they occasionally wrestle with paperwork deadlines and organization.
  sports: Pan Kim enjoys solitary yoga sessions at a Queens studio, participates in lively K‑Pop dance workshops, and avidly supports the New York Knicks, New York Yankees, and New York City FC while occasionally
    joining a community soccer pick‑up league for social connection.
  arts: Pan Kim captures the vibrancy of Queens’ festivals through street photography inspired by Vivian Maier, often sharing the images with neighbors, immerses themselves in the music of BTS and the indie
    folk sounds of Hyukoh, and rehearses choreography to Blackpink’s hits, blending contemporary Korean pop culture with personal artistic expression.
  travel: Pan Kim balances careful itinerary planning with spontaneous detours, having trekked through Seoul’s bustling markets, relaxed at Bali’s yoga retreats, and explored New Zealand’s South Island,
    while dreaming of a culinary adventure in Marrakech’s spice‑laden souks, balancing solo evenings of exploration with group excursions that satisfy their need for both solitude and social connection.
  culinary: Pan Kim expertly prepares traditional dishes such as bibimbap, kimchi jjigae, and tteokbokki, delighting in the balance of gochujang, sesame oil, and fermented vegetables, and adds creative
    plating twists that satisfy both their love for recipe structure and spontaneous visual flair, often sharing the meals with their preschool class and neighborhood friends.
  core: Pan Kim blends a love for structured curricula with spontaneous classroom moments, meticulously budgets yet occasionally splurges on dance gear, practices yoga for balance, habitually forgets to
    water their garden until a last‑minute rescue, and consistently shows kindness and cooperation toward students and colleagues.
background:
  cultural: Pan In Kim is a first‑generation Korean American raised in the vibrant, multicultural neighborhood of St. Albans, Queens. Her household emphasized Korean values of respect, harmony, and academic
    dedication, while her community life reflected the diversity of New York City. She celebrates Korean holidays such as Seollal and Chuseok, speaks Korean at home, and integrates these traditions into
    her teaching to foster cultural pride among her students. Simultaneously, she navigates American norms, appreciating individuality and open communication, creating a bicultural identity that enriches
    her personal and professional interactions.
attributes:
  skills: '[''Classroom Management'', ''Early Childhood Curriculum Development'', ''Child Development Assessment'', ''Bilingual Communication (Korean/English)'', ''First Aid & CPR'', ''Parent-Teacher Communication'',
