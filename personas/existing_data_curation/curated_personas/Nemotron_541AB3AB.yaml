  hobbies: '[''Korean Cooking'', ''Yoga and Mindfulness'', ''K‑Pop Dance Workshops'', ''Photography'', ''Community Cultural Festivals'', ''Gardening'', ''Reading Children’s Literature'', ''Crafting Educational
    Materials'']'
  career_goals: Pan aims to complete her Bachelor’s in Early Childhood Education and earn a state teaching credential within the next two years. She aspires to become a lead teacher or curriculum coordinator,
    championing bilingual and culturally responsive programs for preschoolers. Long‑term, she hopes to pursue a Master’s in Education to develop a community‑based preschool that blends structured learning
    with flexible, child‑centered activities, and to mentor new teachers in inclusive practices.
