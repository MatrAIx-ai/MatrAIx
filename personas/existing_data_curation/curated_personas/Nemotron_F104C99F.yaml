  hobbies: '[''Church fellowship and choir participation'', ''Senior centre dance socials'', ''Historical fiction and biography reading'', ''Backyard gardening and herb cultivation'', ''Quilting storytelling
    projects'', ''Volunteer guide at Detroit Historical Museum'', ''Attending local history lectures'', ''Cooking soul‑food meals for community gatherings'']'
  career_goals: Although officially retired, Latanya aims to deepen her impact on Detroit's senior and youth communities. She seeks to mentor emerging community leaders, serve on the board of a local cultural
    nonprofit, and curate a traveling exhibit on the Great Migration as experienced by Detroit families. Additionally, she hopes to publish a memoir that captures her personal journey alongside the city’s
    evolving cultural landscape, and to establish a scholarship fund that supports students pursuing humanities studies at regional colleges.
