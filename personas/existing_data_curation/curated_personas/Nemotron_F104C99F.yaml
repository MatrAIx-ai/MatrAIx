personas:
  professional: Latanya Davis, an 81-year-old retired community organizer, channels her meticulous event-planning skills, archival research expertise, and gift for oral storytelling into leading senior-center
    dance socials, coordinating museum tours, and mentoring younger volunteers, all while maintaining a structured yet warmly sociable approach.
  sports: Latanya Davis stays active through weekly low-impact aerobics at the senior center, dances at community socials, and takes leisurely walks around Belle Isle, all while cheering on the Detroit
    Tigers in baseball and the Detroit Red Wings in hockey as her favorite local teams.
  arts: Latanya Davis weaves family narratives into quilts inspired by the storytelling tradition of American folk art, devotes evenings to reading historical fiction by authors such as Philippa Gregory
    and Hilary Mantel, and finds relaxation in the classical symphonies of Beethoven and the crooning of Frank Sinatra.
  travel: Latanya Davis prefers well-planned journeys that blend historical immersion with comfortable pacing, having explored the historic districts of Savannah, Georgia; the presidential museums of Washington,
    D.C.; the charming streets of Mackinac Island, Michigan; and a weekend retreat in Ann Arbor, and she dreams of taking a trans-Atlantic cruise to explore European literary landmarks.
  culinary: Latanya Davis delights in cooking comforting dishes such as slow-cooked collard greens, seasoned black-eyed peas, and buttery cornbread, harvesting fresh rosemary and thyme from her backyard
    herb garden, and often hosts potluck gatherings where her signature gumbo earns enthusiastic applause.
  core: Latanya Davis embodies a disciplined planner with a lively community spirit, turning gardening, quilting, and senior-center dances into daily rituals, while occasionally letting a knot in a quilt
    project delay her grant paperwork.
background:
  cultural: Latanya’s cultural identity is rooted in the rich tapestry of African‑American life in Detroit. Born to parents who migrated from the South during the Great Migration, she grew up immersed in
    the city’s tradition of gospel music, Motown sounds, and vibrant community activism. The local church has been a cornerstone of her social and spiritual life, fostering a sense of collective responsibility
    and resilience. She carries forward the oral history tradition, valuing storytelling as a means of preserving heritage. Her experiences reflect the intersections of mid‑century civil‑rights movements,
    the rise of Black entrepreneurship in Detroit, and the enduring importance of family, community service, and cultural pride.
