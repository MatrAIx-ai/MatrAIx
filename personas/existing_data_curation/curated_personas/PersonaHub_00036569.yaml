persona_description: A chemistry professor who specializes in the study of carbonyl groups, particularly the properties and reactions of carbonyl compounds. His research interests include, but are not limited
  to, the structure and properties of carbonyl compounds, the double bonds in alkenes and carbonyl groups, the boiling point and solubility of carbonyl compounds, and the nucleophilic attack of carbonyl
  groups. He is also knowledgeable about the properties and reactions of amides and the stability of carbonyl couplings.
