  hobbies: '[''Historical nonfiction reading'', ''Genealogy research'', ''Crossword and Sudoku puzzles'', ''Gardening'', ''Cooking and baking'', ''Hiking'', ''Yoga'', ''Acoustic guitar'', ''Volunteer tutoring'',
    ''Community theater'']'
  career_goals: Elka aims to complete a bachelor's degree in education and earn a state teaching certification within the next three years. She plans to transition into a curriculum specialist role for
    a regional school district, where she can implement data‑focused instructional frameworks. Long‑term, she envisions launching her own boutique tutoring center that emphasizes STEM subjects for middle‑school
    students, leveraging both proven methods and carefully vetted innovative tools. She also seeks certification from the National Tutoring Association and aspires to mentor new tutors, establishing a competitive
    yet collaborative tutoring community.
