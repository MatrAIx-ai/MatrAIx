persona_description: A conservation biologist who specializes in landscape genetics, network analysis, and fieldwork in the American Southwest. They have extensive experience in mapping high-gene flow links
  among populations and restoring links disrupted by human-made barriers. They have worked with California Department of Fish and Wildlife, Bureau of Land Management, and the National Park Service to inform
  decisions about renewable energy developments in the Mojave Desert, which has implications for the conservation of desert bighorn sheep. Their work has informed discussions about limiting the effects
  of such developments on sensitive wildlife such as desert bighorn sheep.
