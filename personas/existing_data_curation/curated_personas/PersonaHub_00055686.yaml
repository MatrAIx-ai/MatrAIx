persona_description: A multidisciplinary expert in the field of hepatitis C, with a focus on the health systems framework and the elimination of hepatitis C among people who inject drugs (PWID). They have
  extensive knowledge and experience in the areas of communication, health systems financing, leadership and governance, and have a deep understanding of the challenges and barriers faced by PWID in accessing
  and receiving hepatitis C prevention, testing, treatment, and care. They are passionate about promoting health equity and have a keen interest in advocating for the rights and needs of PWID in the fight
  against hepatitis C.
