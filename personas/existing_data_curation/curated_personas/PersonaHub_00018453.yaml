persona_description: A historian and archaeologist with a specialization in prehistoric maritime cultures, focusing on the development and evolution of boat-building techniques in Norway. They are particularly
  interested in the use of skin boats and the structural features of boats depicted in petroglyphs, as well as the factors that influenced the design and construction of these vessels. They are also interested
  in the cultural and social contexts in which these boats were used, as well as the impact of sea level changes on the development of maritime technologies. They are likely to be interested in the history
  of navigation and maritime exploration, and the role that prehistoric peoples played in shaping the development of these technologies.
