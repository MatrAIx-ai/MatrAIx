personas:
  professional: John Herrera, a 21-year-old retail associate in Lincoln, blends a curiosity-driven, competitive nature with strong front-line sales skills—expertly handling POS transactions, inventory software,
    and product pitching—while often juggling a disorganized schedule but still consistently surpassing sales targets.
  sports: John Herrera enjoys solo hikes along the Nebraska prairie, follows the Nebraska Cornhuskers football team with avid interest, occasionally joins a local pickup basketball group at the Lincoln
    Community Center, and rides a road bike on weekends, blending low-key fitness with a competitive streak.
  arts: John Herrera indulges in indie and alternative music—often streaming Arcade Fire, Tame Iman, and Phoebe Briggs—while woodworking and capturing Nebraska’s tranquil landscapes in black-and-white photography,
    drawing creative inspiration from Ansel Adams.
  travel: John Herrera favors low-key road trips to nearby national parks such as Badlands and Rocky Mountain, planning itineraries impulsively and preferring solitary camping spots, while dreaming of a
    future backpacking adventure in the Scottish Highlands.
  culinary: John Herrera prefers hearty Midwestern dishes like burgers with sharp cheddar, cornbread, and fresh corn on the cob, experiments with homemade ramen using miso, soft-boiled eggs, and a dash
    of sriracha, yet they habitually neglect thorough kitchen cleanup after cooking.
  core: John Herrera is a curiosity-driven, competitively inclined retail associate who balances a love for solitary tinkering and indie music with a relaxed, occasionally disorganized lifestyle that fuels
    both ambition and occasional procrastination.
background:
  cultural: John grew up in a middle‑class white family in the Lincoln‑Lancaster County area, where Midwestern values of modesty, self‑reliance, and community support are prominent. His upbringing blended
    small‑town sensibilities with exposure to the University of Nebraska’s campus culture, giving him access to diverse ideas while maintaining a pragmatic outlook. He identifies with the region’s agricultural
    heritage and enjoys local traditions like county fairs and farmers’ markets, which influence his appreciation for hard work and practical solutions in both his personal and professional life.
attributes:
  skills: '[''Customer Service'', ''Point-of-Sale (POS) Operations'', ''Inventory Management'', ''Upselling Techniques'', ''Cash Handling'', ''Product Demonstrations'', ''Problem Solving'', ''Adaptability
