  career_goals: John aims to move from sales associate to shift supervisor within the next two years, focusing on developing leadership and organizational skills that balance his preference for flexibility
    with the demands of team management. He plans to enroll in a part‑time bachelor's program in Business Administration to complement his associate's degree, with the long‑term ambition of opening his
    own boutique store that blends curated merchandise with a personalized shopping experience. He also hopes to earn a certification in retail analytics to leverage data‑driven insights for improving store
    performance.
