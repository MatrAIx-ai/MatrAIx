  hobbies: '[''Painting and drawing'', ''Pottery and ceramics'', ''Quilting'', ''Gardening'', ''Listening to jazz, soul, and blues'', ''Attending live music and community festivals'', ''Cooking Southern
    and African-inspired dishes'', ''Reading African American history and literature'', ''Genealogy research'', ''Volunteering at community center'', ''Traveling to museums and cultural sites'', ''Line
    dancing'']'
  career_goals: April aims to re‑enter the workforce on a part‑time or volunteer basis, leveraging her love of the arts and community engagement. She hopes to secure a role as a community arts coordinator
    or workshop facilitator at the local library or community center, where she can design and lead classes in painting, quilting, and pottery. Additionally, she dreams of launching a modest home‑based
    crafts boutique—selling handmade textiles and ceramics online and at regional fairs—to generate supplemental income and showcase African‑American folk art traditions. To strengthen her qualifications,
    she plans to complete her GED and pursue coursework in community development or arts management, while also mentoring youth and seniors in her neighborhood.
