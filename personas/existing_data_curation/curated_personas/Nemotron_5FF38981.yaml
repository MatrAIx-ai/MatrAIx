personas:
  professional: Maria Flores is a construction manager who leverages their expertise in BIM, Lean construction, and rigorous budgeting while channeling their sociable, competitive nature into leading multidisciplinary
    teams and negotiating contracts with a blend of curiosity‑driven innovation and pragmatic risk assessment, and they consistently keep projects on track with methodical precision.
  sports: Maria Flores is an avid tennis player at the Fair Lawn Country Club, follows the New York Knicks and the New York Rangers seasonally, never misses a Boca Juniors match streamed with expatriate
    friends, and they channel their competitive drive onto the court while also participating in weekly trivia nights.
  arts: Maria Flores attends tango classes at a local studio, curates playlists featuring Astor Piazzolla, Carlos Gardel, and contemporary indie singer Natalia Lafourcade, enjoys theater productions of
    Fiddler on the Roof at nearby venues, and they often become the center of post‑show discussions thanks to their talkative personality.
  travel: Maria Flores prefers weekend getaways that blend culture and cuisine, such as exploring the vineyards of Mendoza, strolling the streets of Buenos Aires during a family reunion, and hiking in the
    Canadian Rockies, and they plan trips months ahead while leaving room for spontaneous detours to local festivals.
  culinary: Maria Flores is a seasoned home chef who masters the art of asado, empanadas, and dulce de leche flan, sourcing premium grass‑fed beef, fresh chimichurri herbs, and sweet milk caramel, pairing
    each dish with Malbec or Torrontés wine during meticulously organized dinner parties, and they delight in sharing these flavors with friends and community members.
  core: Maria Flores blends fierce competitiveness with warm hospitality, turning every project and party into a meticulously planned performance driven by relentless curiosity and occasional anxiety, and
    they thrive on being the charismatic focal point.
background:
  cultural: Maria was born in Buenos Aires and moved to the United States as a teenager, growing up bilingual in Spanish and English. Her Argentine upbringing instilled a love for family‑centered celebrations,
    tango music, and a strong appreciation for football. She remains active in the Argentine diaspora in New Jersey, participating in community festivals, supporting local Latin American businesses, and
    preserving culinary traditions. The resilience and adaptability she observed during Argentina’s economic fluctuations shape her pragmatic yet innovative approach to problem‑solving. While embracing
    the multicultural environment of Fair Lawn, she integrates Argentine values of warmth, perseverance, and a zest for life into her personal and professional identity.
