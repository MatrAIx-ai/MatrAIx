  career_goals: Maria aims to secure a senior executive position such as Director of Construction or VP of Operations within the next five years, overseeing large‑scale commercial and mixed‑use developments
    in the New York metropolitan area. She plans to obtain a General Contractor’s license and a master’s degree in Construction Management to deepen her technical credibility. Passionate about sustainability,
    she wants to lead projects that achieve LEED certification and incorporate innovative green building practices. Long‑term, Maria envisions launching her own consultancy that advises firms on efficiency,
    technology integration, and risk mitigation, while also mentoring young women entering the construction field.
