  career_goals: Although still an infant, Marcus' parents nurture his innate curiosity about art and nature, guiding him toward a future ambition in creative fields such as visual arts—painting or illustration—or
    environmental stewardship inspired by the redwood forests around Willits. This long‑term goal reflects his appreciation for varied experiences, unconventional thinking, and a desire to balance organized
    creative expression with flexible exploration.
