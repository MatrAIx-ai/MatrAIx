personas:
  professional: A budding nature enthusiast named Marcus Bartlett, currently an infant who spends hours in the backyard garden with a wooden rake, displays early observational skills and an organized yet
    flexible curiosity that hints at a future career in environmental science, and they often point at insects with wide‑eyed wonder.
  sports: A playful explorer named Marcus Bartlett enjoys baby yoga classes at the community center, splashes in the local pool’s infant swim lessons, and cheers on the San Francisco Giants during family
    weekend outings, and they display a natural rhythm for movement despite their reserved demeanor.
  arts: An art‑infused infant named Marcus Bartlett loves listening to folk fiddle tunes at the town’s monthly barn dance, thumb‑paints bright abstract shapes reminiscent of local gallery exhibitions, and
    gets captivated by Eric Carle’s picture books at bedtime, and they often giggle when a brushstroke reveals a new color.
  travel: An adventurous stroller‑rider named Marcus Bartlett has already explored Redwood National Park on a family hike, wandered the tide pools of the Oregon coast on a road trip, and looks forward to
    a future visit to the Scottish Highlands, and they delight in the rhythmic hum of the car engine while clutching a soft plush bear.
  culinary: A discerning eater named Marcus Bartlett favors smooth pureed sweet potatoes, creamy avocado, and organic oat cereal, yet occasionally rejects new flavors like beet puree, prompting his parents
    to negotiate with a tiny spoonful of banana to expand his palate, and they express satisfaction with a bright, gummy smile after each successful tasting.
  core: Marcus Bartlett is a one‑year‑old with a curious, art‑loving spirit, a penchant for eco‑friendly baby products, a mild eczema that they actively manage, and a quiet patience for solo play punctuated
    by occasional tantrums over unfamiliar textures.
background:
  cultural: Marcus is raised in a White, middle‑class American family in Willits, Mendocino County, Northern California. His upbringing is shaped by a rural lifestyle that values close connection to the
    natural environment, respect for local community traditions, and an appreciation for the arts through small community events and local galleries. His parents provide a supportive home that encourages
    curiosity, artistic expression, and balanced, independent living while being mindful of his sensitive temperament.
