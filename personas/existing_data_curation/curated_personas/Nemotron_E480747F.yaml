  career_goals: In the next five years, Aileen aims to transition into a Chief Financial Officer role where she can shape corporate strategy and champion sustainability initiatives. She plans to lead the
    development of an ESG‑focused investment framework, leveraging her curiosity for new ideas and her art background to explore alternative asset classes such as cultural and creative‑industry investments.
    Aileen also wants to mentor emerging women and Latino finance professionals, establishing a scholarship program for Panamanian students pursuing business studies. Ultimately, she envisions founding
    a boutique consultancy that helps small‑business owners in the Denver Latino community navigate financial planning and secure growth capital.
