personas:
  professional: Rebecca Keenan thrives as a retail sales professional at a bustling outdoor‑goods store, where her mastery of POS systems, visual merchandising, and empathetic customer engagement consistently
    exceed sales targets; she leverages her quick adaptability and love for structured processes to pursue an assistant‑manager position within the next eighteen months, even as occasional disorganization
    challenges her deadline‑driven projects.
  sports: Rebecca Keenan embraces the Pacific Northwest’s outdoor culture by hiking the Chuckanut Mountains weekly, joining a sunrise yoga class at a downtown studio, cheering for the Seattle Seahawks,
    Seattle Sounders FC, and Seattle Mariners, and participating in a local trail‑run club that meets for 5K races during summer.
  arts: Rebecca Keenan nurtures her creative side by sketching fashion designs inspired by Stella McCartney in a weathered notebook, devouring contemporary novels by Sally Rooney and Ocean Vuong, attending
    improv workshops with Unexpected Comedy, and curating a personal playlist of indie folk artists such as Fleet Foxes and Phoebe Bridgers while sipping espresso at her favorite micro‑roastery.
  travel: Rebecca Keenan favors spontaneous weekend getaways that blend hiking and culture, often driving to the San Juan Islands for kayaking, trekking the Hoh Rainforest in Olympic National Park, and
    dreaming of backpacking the Patagonian Andes, while using travel blogs and a budget‑tracking app to keep trips affordable on her student‑job income.
  culinary: Rebecca Keenan’s palate is anchored by a love for specialty coffee—favoring Ethiopian Yirgacheffe and Guatemalan Antigua beans roasted at local micro‑roasters—and simple, sustainable meals like
    quinoa‑and‑avocado salads with pistachios, kale chips, and occasional vegan ramen from a nearby food‑truck, though she occasionally indulges in late‑night pizza after board‑game nights.
  core: Rebecca Keenan is a 21‑year‑old retail associate who balances structured customer service with spontaneous mountain hikes, fuels her days with micro‑roasted coffee, sketches eco‑fashion in spare
    moments, and habitually forgets to file receipts on time.
background:
  cultural: Rebecca grew up in a middle-class, white family in the Pacific Northwest, with roots in the Midwest. Her upbringing blended the practical, community-oriented values of her parents—who worked
    as teachers—with the progressive, environmentally conscious culture of Bellingham. She identifies with the region's emphasis on outdoor recreation, local food movements, and a laid-back yet socially
    aware lifestyle. While she enjoys mainstream American traditions like holiday gatherings, she also participates in local festivals, supports small-business artisans, and aligns with the region's advocacy
    for sustainability and inclusivity.
