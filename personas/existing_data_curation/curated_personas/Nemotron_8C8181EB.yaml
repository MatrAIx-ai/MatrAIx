  career_goals: Rebecca aims to advance from her current sales associate role to an assistant manager within the next 18 months, leveraging her practical retail experience and her desire for a more structured
    leadership position. Over the next five years she hopes to become a store manager at a specialty outdoor-goods retailer in the Pacific Northwest, or transition into a regional management role that allows
    her to mentor new associates while still engaging directly with customers. She also plans to complete her bachelor's degree in business administration part-time, to broaden her strategic planning skills
    and increase her eligibility for corporate roles. Ultimately, she envisions opening a small boutique that blends sustainable fashion with community workshops, combining her entrepreneurial spirit with
    her love for local culture.
