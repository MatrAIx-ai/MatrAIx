personas:
  professional: Pedro Aguero is an aspiring multimedia designer who melds sketching, digital illustration, and basic Python coding to craft interactive art experiences, leveraging their calm resilience
    and curiosity to stay organized while exploring abstract concepts.
  sports: Pedro Aguero enjoys low‑key fitness, jogging along the Rockwall lake trail before school and playing pick‑up basketball with the Rockwall Youth Club, and they root for the Dallas Cowboys, Dallas
    Mavericks, and FC Dallas as their favorite professional teams.
  arts: Pedro Aguero immerses themselves in creative expression, drawing surreal digital pieces inspired by Salvador Dalí and street artist Banksy, listening to Joni Mitchell and The Strokes while composing
    guitar melodies that blend folk rhythms with indie sounds, and they mentor younger kids in art at a local youth center.
  travel: Pedro Aguero loves thoughtful travel, planning small trips with family or a close friend, having explored New Orleans and Mexico City for their vibrant street art scenes, and they dream of wandering
    through Tokyo’s neon districts and Reykjavik’s icy landscapes once they can afford the journey.
  culinary: Pedro Aguero often helps prepare family’s traditional stews and rice dishes, enjoys crafting experimental ramen bowls with fresh herbs and spicy broth, and they have a particular fondness for
    mango slices sprinkled with chili and lime.
  core: Pedro Aguero is a quietly ambitious teen who blends artistic curiosity with calm resilience, constantly sketching new worlds while quietly slacking on chores and staying up late perfecting their
    latest digital masterpiece.
background:
  cultural: Pedro was raised in a close‑knit Dominican household in Rockwall, Texas, where Spanish and English intertwine in daily life. His family maintains vibrant Dominican traditions—celebrating Carnaval,
    cooking sancocho, and dancing to merengue and bachata—while also embracing the multicultural fabric of the Dallas‑Fort Worth area. This bicultural environment has cultivated his bilingual fluency and
    a deep appreciation for Caribbean rhythms, storytelling, and communal solidarity. Pedro’s cultural identity informs his artistic sensibilities, prompting him to incorporate Dominican motifs and narratives
    into his visual and musical creations, and to seek ways of fostering cross‑cultural understanding within his community.
