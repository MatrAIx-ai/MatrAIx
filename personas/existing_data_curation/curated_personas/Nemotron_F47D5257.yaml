  career_goals: Pedro aims to transform his artistic passions into a professional career in multimedia design. In the short term, he plans to earn his GED and build a strong portfolio that showcases his
    illustration, digital art, and interactive media projects, with the goal of securing a scholarship to a community college art program. Long‑term, he envisions becoming a visual artist and UI/UX designer
    who leverages his cultural heritage to create inclusive, community‑focused digital experiences. He also dreams of using his art and empathy to develop youth outreach programs that blend creative workshops
    with cultural education, ultimately contributing to a more harmonious and expressive community in Rockwall and beyond.
