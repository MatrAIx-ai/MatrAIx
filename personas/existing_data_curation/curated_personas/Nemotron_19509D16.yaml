  hobbies: '[''Reading adventure/mystery books'', ''Drawing cartoons'', ''Playing ukulele'', ''Salsa dancing'', ''Exploring mangroves and beach'', ''Collecting shells'', ''Simple science experiments'',
    ''Baking with family'', ''Robotics club workshops'']'
  career_goals: Mireya hopes to become a marine biologist or environmental scientist to protect the coastal ecosystems of Puerto Rico, and she also dreams of being a teacher who can inspire other kids to
    love science. She wants to earn a scholarship, attend a STEM-focused high school, and eventually study at university. In the short term she aims to win her school's science fair and lead a community
    clean-up project.
