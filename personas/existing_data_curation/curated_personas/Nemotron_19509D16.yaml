personas:
  professional: Mireya Martinez is an aspiring junior robotics engineer who applies her curiosity and practical mindset to solve simple mechanical puzzles in the school’s robotics club, balancing meticulous
    planning with the flexibility to improvise when a circuit misbehaves.
  sports: Mireya Martinez enjoys beach volleyball with the Sunrise Beach Volleyball Club, practices salsa dancing at home with her family, cheers for the San Diego Padres and the LA Galaxy, and participates
    in her school’s intramural track, favoring activities that blend teamwork with personal challenge.
  arts: Mireya Martinez draws cartoon strips inspired by Rebecca Sugar’s Steven Universe and Charles M. Schulz, reads adventure mysteries like The Hardy Boy series, and listens to salsa legends Celia Cruz
    and contemporary pop artist Jack Johnson while sketching, which fuels her creative expression.
  travel: Mireya Martinez explores local mangrove trails and the nearby beach, has visited the Everglades National Park on a family camping trip, dreams of snorkeling the Great Barrier Reef, and hopes to
    one day trek the cloud forests of Monteverde in Costa Rica, preferring carefully planned itineraries that balance adventure with family safety.
  culinary: Mireya Martinez loves baking chocolate‑chip cookies with her grandmother, enjoys assembling fresh mango salsa with lime and cilantro for tacos, frequently requests guava pastries at the local
    bakery, and can whip up a simple pancake using flour, eggs, and a dash of vanilla, though she sometimes burns the edges when distracted by a new science experiment.
  core: Mireya Martinez blends quiet curiosity with practical problem‑solving, thrives in small‑group adventures from mangrove treks to ukulele jams, balances a sweet tooth with a habit of misplacing occasional
    science kits, and maintains a resilient yet measured emotional outlook.
background:
  cultural: Mireya is a Puerto Rican girl from Rio Grande, a coastal town with a strong agricultural and fishing heritage. She grows up in a bilingual household where Spanish is spoken at home and English
    is taught at school. Her family traditions include celebrating San Juan and local festivals, cooking arroz con pollo, pasteles, and learning puertorriquena rhythms like reggaeton and bomba. Community
    values of family closeness, respect for elders, and a love of the ocean shape her identity. She participates in school events, church activities, and neighborhood clean-ups, reflecting the island's
    emphasis on community service and cultural pride.
