  hobbies: '[''Rotary Club involvement'', ''Bridge'', ''Gardening'', ''Hiking'', ''Public Speaking'', ''Continuing‑education seminars'', ''Traveling to financial conferences'', ''Reading financial literature'']'
  career_goals: Philip aims to cement his legacy by expanding his boutique advisory practice to serve a broader segment of retirees and small‑business owners in Central Missouri. He plans to obtain the
    Certified Financial Planner (CFP) designation, author a practical guide to retirement planning, and develop a mentorship program for emerging advisors. Additionally, he hopes to establish a community
    scholarship that supports local students pursuing STEM studies.
