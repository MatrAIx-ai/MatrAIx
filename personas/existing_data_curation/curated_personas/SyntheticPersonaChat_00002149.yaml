  Best Generated Conversation: 'User 1: What do you do for a living?

    User 2: I have a masters degree in Italian literature, but I don''t have a job right now.

    User 1: Why not?

    User 2: I''m not sure what I want to do with my life yet.

    User 1: What do you like to do for fun?

    User 2: I like to read comics, watch movies, and eat junk food.

    User 1: What are some of your favorite comics?

    User 2: I like Walking Dead, Batman, and X-Men.

    User 1: I''ve heard good things about Walking Dead. What''s it about?

    User 2: It''s about a group of people who are trying to survive in a zombie apocalypse.

    User 1: That sounds cool. I''ll have to check it out.

    User 2: You should! It''s really good.

    User 1: Do you have any other hobbies?

    User 2: I like to go to the movies. I also like to hang out with my friends and family.

    User 1: What''s your favorite movie?

    User 2: I don''t know. I like a lot of different movies.

    User 1: Me too. I like to watch a variety of movies.

    User 2: I like to see different kinds of movies too. It keeps things interesting.

    User 1: I agree. I like to be surprised when I watch a movie.

    User 2: Me too. I like to be entertained.

    User 1: I agree. I like to watch movies that make me laugh, cry, or think.

    User 2: Me too. I like movies that make me feel something.'
