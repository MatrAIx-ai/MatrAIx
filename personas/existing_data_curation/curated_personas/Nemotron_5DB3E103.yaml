personas:
  professional: Alicia Teague, a retired community event planner and volunteer coordinator in Woodward, channels their methodical organization, imaginative flair, and deep‑rooted commitment to local solidarity
    into orchestrating charitable festivals, managing volunteer teams, and guiding genealogical research projects with precision and creative storytelling.
  sports: Alicia Teague, an enthusiastic supporter of the Oklahoma City Thunder and the Oklahoma State Cowboys football team, participates in the Woodward Senior Walking Club’s weekly morning walks, joins
    a community softball league each spring, and blends bird‑watching treks with gentle yoga to stay fit and connected to the plains landscape.
  arts: Alicia Teague, a passionate abstract painter and digital photographer, draws inspiration from Georgia O’Keeffe’s prairie landscapes and Yayoi Kusama’s bold patterns, regularly attends local performances
    of folk‑singer Emmylou Harris covers, and finds solace in the cinematic worlds crafted by director Wes Anderson.
  travel: Alicia Teague, a meticulous planner who loves quiet discovery, prefers modest road trips to the Kimbell Art Museum in Fort Worth, the Dallas Arboretum’s spring blossoms, and occasional flights
    to Kyoto’s historic gardens, balancing each journey with budget‑friendly lodging and a notebook for sketching local flora.
  culinary: Alicia Teague, an adventurous home chef, blends traditional Oklahoma fare such as chicken‑fried steak and cornbread with experimental dishes like wildflower‑honey glazed pork tenderloin and
    quinoa‑studded succotash, showcasing a keen eye for fresh heirloom tomatoes, prairie chard, and fragrant sage.
  core: Alicia Teague, a creatively disciplined retiree, weaves love of prairie heritage, abstract art, and community service into a life that balances thoughtful planning with spontaneous bursts of imagination,
    all while managing a modest budget, mild health concerns, and a fondness for dawn bird‑watching.
background:
  cultural: Alicia’s cultural background is rooted in the Midwestern plains tradition of Woodward, Oklahoma. Growing up in a white, multigenerational family of modest means, she was raised with values of
    hard work, community solidarity, and respect for the land. Her upbringing involved regular participation in church activities, local fairs, and community gatherings, which fostered a strong sense of
    neighborliness and public service. The region’s history—marked by the Land Run, agriculture, and interaction with nearby Native American cultures—has shaped her appreciation for local heritage and inspired
    her interest in genealogical and historical research. While she embraces the comforts of traditional Oklahoma cuisine and rural lifestyle, Alicia also seeks novelty, drawing inspiration from broader
    artistic and intellectual currents beyond her immediate surroundings. This blend of local rootedness and curiosity informs her worldview and daily practices.
