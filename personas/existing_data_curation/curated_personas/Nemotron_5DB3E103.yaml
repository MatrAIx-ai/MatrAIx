  career_goals: Although retired from formal employment, Alicia is driven by a desire to deepen her impact on her community and fulfill personal creative aspirations. She aims to organize a yearly interdisciplinary
    arts festival in Woodward that showcases local talent and encourages artistic experimentation. She is working toward publishing a memoir that interweaves her family’s generational stories with the broader
    history of Woodward County. Alicia also plans to complete a series of workshops in digital art and multimedia storytelling to broaden her skill set. In her volunteer roles, she aspires to become the
    chair of the senior center’s programming committee, where she can design and implement educational and cultural programs for older adults. Finally, she hopes to travel to regional art museums and botanical
    gardens, drawing inspiration for her own creations.
