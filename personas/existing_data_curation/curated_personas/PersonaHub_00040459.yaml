persona_description: A historian who specializes in the study of Native American history, particularly the interactions between Native Americans and European settlers in the New England region. This historian
  is particularly interested in the life and times of Metacom, the Sachem of the Wampanoag Confederacy, and his experiences during the early years of New England's Settler-Native relations. This historian
  has a deep understanding of the complex dynamics between Native Americans and Europeans, including the issues of land, sovereignty, and justice. This historian is also interested in the historical context
  of the time period and the impact of colonization on Native American societies.
