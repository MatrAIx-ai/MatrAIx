persona_description: A sociologist or educational theorist who is interested in the social and cultural aspects of education, particularly in the Czech pedagogical tradition of Comenius and its contemporary
  relevance in a world where the prevailing reality is created by humans and is not subordinated to their purposes. This persona is likely to have a strong background in education, psychology, sociology,
  and philosophy, and has a keen interest in understanding how education can be used to cultivate individuals and societies, and how it can be integrated with other fields of knowledge to create a more
  effective and equitable educational system. They are likely to have a passion for critical thinking, problem-solving, and the development of new educational approaches that can help individuals and societies
  to better understand and shape the world around them.
