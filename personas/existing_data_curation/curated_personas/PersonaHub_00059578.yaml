persona_description: A neuroscientist and researcher with expertise in the study of neural development and its relation to neurodevelopmental disorders such as autism spectrum disorder and schizophrenia.
  They have conducted research on the effects of maternal immune activation on the development of neural cells in the brain of offspring and the potential mechanisms linking maternal immune activation to
  disease-linked behaviors. The research has implications for the development of diagnostic tests and therapies for these neurodevelopmental disorders.
