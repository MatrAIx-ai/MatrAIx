personas:
  professional: Wafa Apestegui is a veteran elementary and middle‑grade teacher in Harrisburg who blends meticulous lesson‑mapping and classroom‑management expertise with a calm, structured approach, while
    also allowing the flexible, spontaneous touches that reflect her relaxed stance on obligations, and she now channels this blend into mentoring new teachers and designing SEL‑focused arts‑and‑gardening
    programs.
  sports: Wafa Apestegui stays active by strolling the Susquehanna River Trail with the Harrisburg Seniors Walking Club, joins a seasonal recreational softball league for seniors, and roots for the Harrisburg
    Senators and the Philadelphia Eagles during baseball and football seasons.
  arts: Wafa Apestegui engages with the arts through a weekly historical‑fiction book club that discusses works by Ken Follett and Maya Angelou, regularly attends community productions at the Carnegie Theatre,
    and expresses creativity by knitting scarves inspired by the patterns of artists like William Morris.
  travel: Wafa Apestegui favors low‑key, well‑planned trips, often joining senior travel groups to explore historic sites such as Gettysburg and the colonial towns of Williamsburg, while also dreaming of
    a leisurely culinary tour of Northern Spain’s coastal villages and a summer weekend getaway to the Adirondack Lakes.
  culinary: Wafa Apestegui is an avid home cook who expertly prepares tortilla de patatas with farm‑fresh potatoes, onions, and free‑range eggs, delights in baking rustic apple‑cinnamon scones using garden‑grown
    rosemary, and confidently seasons soups with basil, thyme, and mint harvested from her backyard herb patch.
  core: Wafa Apestegui blends decades of nurturing classroom leadership with a love for gardening, knitting, and spontaneous culinary experiments, yet wrestles with bouts of anxiety that sometimes derail
    their meticulous plans, and they habitually misplace their favorite knitting needles in the garden shed.
background:
  cultural: Wafa’s cultural background blends a Mid‑Atlantic American upbringing with her family’s Basque roots, reflected in her surname Apestegui. Raised in a Catholic household, she incorporates values
    of community service and modesty. Her parents immigrated from the Basque region of Spain, preserving some Spanish language phrases and culinary traditions that she now shares with her family. Living
    in Harrisburg, she identifies with the local Pennsylvania culture—supporting regional festivals, high school football, and participating in town events—while also honoring her heritage through Basque
    holiday gatherings and occasional trips to the Basque Country with her husband.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Behavioral Intervention'', ''Parent Communication'', ''Team Collaboration'', ''Technology Integration
