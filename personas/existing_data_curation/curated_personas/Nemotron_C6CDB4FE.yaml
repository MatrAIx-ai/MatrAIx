personas:
  professional: Scott Jones, a budding digital artist and robotics hobbyist, blends their curiosity for unconventional ideas with meticulous planning to create detailed sci‑fi illustrations and program
    competition‑grade robots for their school club.
  sports: Scott Jones, an avid hiker and junior varsity cross‑country runner, tackles the forest trails of Door County with disciplined training, cheers on the Milwaukee Bucks and Green Bay Packers from
    their living room, and belongs to the local Door County Hiking Club, where they often organize weekend climbs despite occasional knee soreness.
  arts: Scott Jones, an aspiring guitarist and visual storyteller, draws inspiration from Keith Haring’s bold street art, the sweeping film scores of Hans Zimmer, and the lyrical dynamism of Lin‑Manuel
    Miranda, channeling these influences into acoustic performances and digital comic strips that mingle sci‑fi themes with local Wisconsin folklore, while they continually experiment with new techniques
    and storytelling formats.
  travel: Scott Jones, a meticulous planner with a taste for adventure, has mapped out trips to Door County’s sand dunes, a weekend road trip to Chicago’s Art Institute, and a family visit to Niagara Falls,
    while dreaming of trekking the Grand Canyon and exploring Kyoto’s temples, and they always draft itineraries in a bookmarked Google Docs file.
  culinary: Scott Jones, a confident home cook, delights in classic cheese‑curd fries and bratwurst paired with locally sourced Wisconsin cheddar, but also experiments with ramen broth infused with basil
    and chili flakes, and they occasionally attempt a daring apple‑pie tart topped with cinnamon‑sprinkled oat crumble.
  core: Scott Jones, a competitively curious teen who sketches galaxies, codes robots, hoards LEGO bricks, and never skips a sunset hike, balances methodical planning with a mischievous love for late‑night
    gaming.
background:
  cultural: Scott was raised in a typical Midwestern white family in Jackson, Wisconsin, with roots tracing back to German and Scandinavian heritage common in the region. He attends a public middle school
    and is part of a Protestant church community that values modesty, hard work, and community service. Seasonal activities like fishing, snowmobiling, and county fair attendance are part of his upbringing.
    The local culture emphasizes self‑reliance, cooperative community events, and a pragmatic approach to education, all of which shape his organized and competitive outlook.
