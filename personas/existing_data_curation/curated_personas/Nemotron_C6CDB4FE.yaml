  hobbies: '[''digital drawing'', ''photography'', ''guitar playing'', ''LEGO robotics'', ''strategy video gaming'', ''chess'', ''science‑fiction writing'', ''hiking'', ''community theater'', ''youth group
    activities'']'
  career_goals: Scott aims to combine his love for art and technology by pursuing a career in game development or UI/UX design, where he can create visually compelling interactive experiences. He plans
    to join a high‑school robotics team, earn a scholarship to a STEM‑focused college, and obtain a degree in computer science or interactive media. As a backup, he is interested in architecture, drawn
    to its blend of design precision and structural planning. Long‑term, he hopes to launch his own indie game studio or work for a tech company that values innovative design.
