  hobbies: '[''Reading classic literature'', ''Historical biographies'', ''Woodworking and furniture restoration'', ''Hiking in the White Mountains'', ''Nature photography'', ''Chess club participation'',
    ''Coaching junior chess players'', ''Craft beer tasting'', ''Attending community festivals'']'
  career_goals: David aims to transition into a leadership role within his district, such as Humanities Department Chair or Curriculum Coordinator, where he can shape school-wide instructional policies
    and champion flexible, student‑centered learning frameworks. He is also pursuing a statewide teaching excellence award to gain recognition for his innovative debate program. Over the next five years,
    he plans to author a guidebook on integrating critical discussion techniques into high school curricula and to present his findings at regional education conferences. As he approaches retirement, he
    intends to offer freelance curriculum consulting for schools seeking to modernize their humanities programs, while maintaining a part‑time teaching presence that allows him to continue mentoring students
    and teachers.
