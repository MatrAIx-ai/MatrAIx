    Management'', ''Cultural Competency'']'
  hobbies: '[''Yoga and meditation'', ''Cooking traditional Salvadoran cuisine'', ''Reading historical fiction'', ''Journaling'', ''Volunteering financial literacy tutoring'', ''Hiking in Griffith Park
    and Santa Monica Mountains'', ''Attending Salvadoran cultural festivals'', ''Photography of nature and food'']'
  career_goals: Yamila aims to become a Certified Public Accountant within the next two years and advance to a senior audit manager position at a reputable public accounting firm. She is passionate about
    using her expertise to support Latinx and Salvadoran entrepreneurs, so she plans to develop a boutique consulting practice that offers affordable audit and financial advisory services to small community‑based
    businesses. In the longer term, she envisions taking on a Chief Financial Officer role in a nonprofit organization dedicated to immigrant integration, where she can combine her financial acumen with
    her commitment to social harmony. To achieve these goals, she is pursuing a CPA exam preparation course and attending leadership workshops that emphasize both technical proficiency and empathetic management.
