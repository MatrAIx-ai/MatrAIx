persona_description: A network engineer who specializes in designing and implementing access networks for small to medium-sized businesses. The engineer has experience with Cisco Packet Tracer and is familiar
  with the TCP/IP protocol suite. The engineer is responsible for designing and demonstrating a basic access network for XYZ, a financial services company, based on the business requirements provided by
  Mr. Titmus. The engineer needs to confirm their understanding of the requirements with Mr. Titmus and prepare a technical report detailing the network design and connectivity requirements. The engineer
  is expected to be familiar with encryption of data at rest and data in transit, as well as configuring a default gateway on an IP-connected host. The engineer is also expected to be familiar with network
  topologies, dynamic and static assignment of addresses, and asymmetric and symmetric keys in encryption applications.
