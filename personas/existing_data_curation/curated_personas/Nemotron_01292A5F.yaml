  hobbies: '[''Strategic video gaming (e.g., StarCraft, League of Legends)'', ''Drone piloting and building'', ''Fishing in the Chesapeake Bay'', ''Reading science‑fiction and technology non‑fiction'',
    ''Coding small projects in Scratch/Python'', ''Model rocket construction'']'
  career_goals: Daniel aspires to pursue a career in engineering, with a focus on robotics and marine technology. He aims to attend a STEM‑focused high school and later study mechanical or electrical engineering
    at a university, specializing in autonomous underwater vehicles and marine drones. He also entertains the possibility of working in the video game industry as a programmer, merging his love for gaming
    and coding. Ultimately, he wants to create practical, innovative solutions that combine his curiosity about technology with real‑world applications, while remaining competitive in his chosen field.
