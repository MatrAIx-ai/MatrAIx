personas:
  professional: Daniel Seidenberger is a budding teen technophile who blends competitive strategy from games like StarCraft and League of Legends with hands‑on engineering, designing, repairing, and flying
    hobby drones and model rockets while dabbling in Scratch and Python, and their practical curiosity drives them to test ideas quickly even as they shun rigid schedules.
  sports: Daniel Seidenberger prefers solitary fitness pursuits like weekend fishing on the Chesapeake Bay and occasional skateboarding at the local skate park, while cheering for the Washington Capitals,
    Baltimore Orioles, and following the Washington Wizards on TV, but never joins a school team due to a desire for quiet independence.
  arts: Daniel Seidenberger channels their mechanical imagination into sketching futuristic gear while devouring sci‑fi novels by Isaac Asimov and listening to the synth‑driven soundscapes of Daft Punk
    and the atmospheric scores of Hans Zimmer, which together shape their aesthetic sense.
  travel: Daniel Seidenberger enjoys spontaneous short trips, having explored historic Annapolis and the Smithsonian museums in Washington D.C., and longs to attend a tech expo in Tokyo, balancing a modest
    family allowance with a penchant for planning only the essentials like flights and cheap hostels.
  culinary: Daniel Seidenberger’s taste buds favor self‑caught grilled salmon fillets seasoned with lemon and dill, simple ramen topped with sliced pork and soft‑boiled eggs, and occasionally a classic
    cheeseburger from the neighborhood diner, though their cooking skill remains at the level of microwaving convenience meals when pressed for time.
  core: Daniel Seidenberger is a competitive, solitary teen who blends strategic gaming, drone tinkering, and sci‑fi imagination into a practical yet loosely organized life, occasionally slipping into impulsive
    spending and minor health neglect.
background:
  cultural: Daniel comes from a white, middle‑class family with deep roots in St. Mary’s County, Maryland. His ancestry includes English and Irish heritage, reflected in family traditions such as celebrating
    St. Patrick’s Day and participating in local community events like the county fair and annual crab feasts. The maritime culture of the Chesapeake Bay has exposed him to fishing and an appreciation for
    marine ecology. His upbringing emphasizes independence, practical hands‑on skills, and a modest, low‑key lifestyle, aligning with his preference for quiet, solitary activities.
