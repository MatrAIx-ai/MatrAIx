  hobbies: '[''Hiking in the Big Horn Mountains'', ''Landscape photography'', ''Watercolor painting'', ''Visiting local art galleries and museums'', ''Attending community theater productions'', ''Acoustic
    guitar playing'', ''Reading contemporary fiction and non‑fiction'', ''Experimenting with international cooking'', ''Participating in a book club'', ''DIY pottery workshops'']'
  career_goals: Elizabeth aims to become a senior payroll specialist and eventually a payroll manager within the next five years. She plans to earn the Certified Payroll Professional (CPP) credential and
    pursue an associate’s degree in business administration, followed by a bachelor’s degree in finance or human resources. Her long‑term ambition is to lead a payroll department that leverages technology
    to improve accuracy and employee experience. She also hopes to mentor new clerical staff and contribute to improving workplace policies that balance employee well‑being with organizational efficiency.
    While building her career, she wants to stay connected to the local community by supporting arts initiatives and small‑business development in Billings.
