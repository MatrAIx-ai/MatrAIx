personas:
  professional: Elizabeth, a diligent payroll clerk at a mid‑size firm in Billings, applies a methodical mindset and curiosity to master ADP and QuickBooks; they craft meticulous spreadsheets and pivot
    tables while constantly scouting emerging payroll automation tools to streamline processes and enhance employee experience.
  sports: Elizabeth, an avid hiker who joins the Billings Trailblazers club for weekend treks, follows the Colorado Rockies in baseball and the Denver Broncos in football, and integrates weekly yoga sessions
    into their routine to counterbalance the sedentary nature of their desk job.
  arts: Elizabeth, an emerging watercolor artist inspired by Georgia O'Keeffe’s bold palettes and Andrew Wyeth’s nuanced landscapes, regularly visits the Yellowstone Art Museum, attends community theater
    productions of *A Midsummer Night’s Dream*, and strums their acoustic guitar to play folk classics by Bob Dylan and indie tunes from The Avett Brothers during intimate gatherings.
  travel: Elizabeth favors self‑planned adventures that blend rugged hiking with boutique lodging; they have trekked through Yellowstone and Glacier National Parks, dream of a spring trek to Banff, Canada,
    and budget their trips with a detailed spreadsheet to ensure affordability without sacrificing spontaneity.
  culinary: Elizabeth, who delights in fusing classic American comfort food with global flavors, often cooks a kimchi‑infused chicken pot‑pie using locally sourced cheddar, rosemary, and croissants, perfects
    a shrimp étouffée seasoned with paprika and thyme, and experiments with seasonal vegetables like beets and zucchini to expand their culinary repertoire.
  core: Elizabeth blends a curious mind and meticulous habit to turn payroll data into a canvas of efficiency, balancing spreadsheets, watercolor brushes, and mountain trails while they occasionally forget
    to water their houseplants.
background:
  cultural: Elizabeth was born and raised in Billings, Montana, in a middle‑class white family with deep roots in the American West. Her upbringing combined the small‑town values of independence, hard work,
    and community involvement with an appreciation for the region’s natural landscape. Family trips to national parks and local rodeos instilled a love for outdoor recreation, while exposure to the city’s
    growing arts scene through school programs and community festivals nurtured her curiosity about visual and performing arts. Growing up in a diverse county that includes Native American reservations,
    she developed respect for Indigenous cultures and often attends cultural events at the Little Bighorn Battlefield Museum. Her cultural identity balances traditional Western Montana sensibilities—valuing
    self‑reliance and neighborly support—with a modern, open‑minded outlook that embraces new ideas and cultural experiences.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping'', ''ADP software'', ''QuickBooks Payroll'', ''Microsoft Excel (pivot tables, VLOOKUP, macros)'', ''Data entry'', ''Attention to detail'', ''Organizational
