personas:
  professional: Ariel Wilson, a civil engineer known for structural analysis, CAD design, and cost estimation, blends a curious eye for emerging sustainable materials with a relaxed, flexible planning style,
    and they channel their compassionate communication into clear client briefings and collaborative project teams.
  sports: Ariel Wilson stays fit primarily through regular walks along the Maumee River Trail, weekly yoga, and membership in the River Trail Running Club, participates in a local amateur softball league
    that plays at the Mid‑City Park fields, and they cheer on the Toledo Mud Hens and the Cleveland Browns while maintaining a relaxed, low‑pressure approach to exercise.
  arts: Ariel Wilson immerses themselves in classic R&B and gospel, spinning records by Aretha Franklin, Marvin Gaye, and The Blind Boys of Alabama while attending intimate concerts at the Huntington Center,
    and they unwind with sci‑fi novels by Octavia Butler and Frank Herbert, a blend that fuels both creative inspiration and a soulful outlook.
  travel: Ariel Wilson favors flexible, low‑stress road trips that combine scenic nature stops like the Great Smoky Mountains and Niagara Falls with occasional urban design tours in Copenhagen, often planning
    trips on the fly through Airbnb and weekend getaways to nearby Lake Erie cabins while they balance a modest travel budget.
  culinary: Ariel Wilson delights in cooking farm‑to‑table meals using garden‑grown heirloom tomatoes, fresh basil, and roasted sweet potatoes, often pairing them with classic soul‑food staples like collard
    greens, cornbread, and smoked turkey, and they showcase a competent yet experimental culinary style that balances comfort and seasonal creativity.
  core: Ariel Wilson is a curiosity‑driven civil engineer who finds solace in gardening and yoga, balances a relaxed, occasionally disorganized work style with a deep commitment to mentoring underrepresented
    engineers, yet they often wrestle with anxiety that fuels both their meticulous problem‑solving and occasional procrastination.
background:
  cultural: Ariel is a Black woman rooted in the African‑American community of Toledo. Raised by parents who emphasized education, church, and community service, she grew up attending church choirs, family
    potlucks featuring soul food, and cultural events like Juneteenth celebrations. Her family’s history traces back to the Great Migration, with grandparents relocating from the South to Ohio in search
    of industrial jobs. This heritage instilled a deep sense of resilience and responsibility to give back. As an engineer, Ariel navigates the dual challenges of being a woman and a person of color in
    a traditionally white‑male field, drawing strength from her community’s support networks and the legacy of Black engineers who paved the way. She actively participates in the local NAACP chapter and
    volunteers with organizations that promote STEM education among underrepresented youth.
