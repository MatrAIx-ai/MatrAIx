  career_goals: Ariel aims to transition into a senior leadership role within Toledo's public works department, focusing on sustainable infrastructure projects that directly benefit underserved neighborhoods.
    She wants to champion diversity and inclusion by establishing mentorship programs for Black women and other underrepresented groups in engineering. Over the next five years, she plans to obtain professional
    engineering licensure, lead large-scale green-building initiatives, and eventually launch a consulting firm that helps small municipalities implement cost-effective, environmentally responsible projects
    while maintaining a balanced, low‑stress work life.
