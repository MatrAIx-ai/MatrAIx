personas:
  professional: Brandon Button, a 45‑year‑old personal care aide in New York City, blends meticulous client documentation, reliable medication reminders, and a curiosity‑driven flair for art‑based activities,
    turning daily care routines into both safe and creatively enriching experiences.
  sports: Brandon Button enjoys early‑morning jogs through Central Park, is a dedicated fan of the New York Knicks and Yankees, attends weekly spin classes at a boutique gym, and joins neighborhood pick‑up
    basketball games on Saturdays to stay active.
  arts: Brandon Button spends weekends exploring MoMA, wandering Bushwick’s street‑art murals, drawing inspiration from Ai Weiwei, Kara Walker, and Basquiat, never misses a community theater production
    of contemporary plays, and frequently sketches scenes in a leather‑bound notebook.
  travel: Brandon Button prefers thoughtfully planned trips that blend cultural immersion with modest budgets, having explored Boston’s historic Freedom Trail, the Finger Lakes’ vineyards, and a recent
    art‑focused weekend in Florence, Italy, while using travel points to offset costs.
  culinary: Brandon Button’s kitchen experiments range from mastering miso‑glazed salmon and saffron paella to crafting rosemary‑infused focaccia, favoring fresh ingredients like heirloom tomatoes, shiitake
    mushrooms, and locally sourced honey, though they sometimes over‑season dishes in search of bold flavor.
  core: Brandon Button fuses a disciplined caregiving ethos with a restless artistic curiosity, sprinkling daily routines with sketchpads, mindful meditation, and a habit of late‑night budgeting spreadsheets.
background:
  cultural: Brandon comes from a White, European‑American background; his parents are of Irish and German ancestry and raised him in a close‑knit suburban community in upstate New York. The family emphasized
    hard work, modesty, and caring for neighbors, which shaped his cooperative and harmonious outlook. Relocating to New York City exposed him to a mosaic of cultures, sparking his curiosity for diverse
    artistic expressions and inclusive caregiving. He identifies with a blend of his Mid‑Atlantic heritage and the cosmopolitan values of the city, embracing both tradition and openness to new ideas.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support and safe transfers'', ''Medication reminder and basic health monitoring'', ''Infection control and safety protocols'', ''Client documentation
    and record‑keeping'', ''Effective communication and empathy'', ''Time management and scheduling'', ''Creative problem solving'', ''Collaboration with multidisciplinary teams'', ''Introduction of art‑based
    therapeutic activities'']'
  hobbies: '[''Visiting art galleries and museums'', ''Photography walks in urban settings'', ''Reading non‑fiction on psychology and health'', ''Attending community theater and live music events'', ''Cooking
    and experimenting with international recipes'', ''Sketching and journaling'', ''Volunteering at a senior center with art‑craft workshops'', ''Mindfulness meditation and yoga'']'
  career_goals: Brandon aims to advance his career in the health‑care field by obtaining a certified nursing assistant (CNA) credential and eventually pursuing an LPN license. He envisions taking on a supervisory
    role, such as a care coordinator, where he can design and implement individualized care plans that integrate creative elements like art therapy. He also hopes to complete a bachelor’s degree in health
    services administration, enabling him to contribute to policy development for home‑care agencies. Long‑term, he aspires to start his own small home‑care business that emphasizes holistic, culturally
    sensitive care and community engagement.
