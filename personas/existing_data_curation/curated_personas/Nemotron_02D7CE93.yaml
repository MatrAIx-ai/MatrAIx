personas:
  professional: Neil Reese is a self‑taught visual artist who fuses street‑level graffiti with digital illustration using free tools like Krita and GIMP, and their curiosity and competitive streak push
    them to secure mural and album‑art commissions while meticulously maintaining a modest online portfolio.
  sports: Neil Reese enjoys pickup basketball games at the local park, cheers for the Atlanta Hawks, and channels their strategic mind into online chess and marathon sessions of Civilization, while keeping
    an eye on the Georgia Tech Yellow Jackets track team for inspiration.
  arts: Neil Reese channels a love for street culture into sketching urban scenes and creating murals, drawing inspiration from artists like Basquiat and Banksy, while their soundtrack of experimental hip‑hop
    from Flying Lotus and jazz legends such as John Coltrane shapes the rhythm of their visual compositions.
  travel: Neil Reese prefers weekend road trips to cities celebrated for street art, such as Detroit and Philadelphia, and dreams of a cultural pilgrimage to Berlin’s urban galleries, but balances wanderlust
    with a modest budget, resulting in short, self‑planned journeys with a camera and sketchbook in tow.
  culinary: Neil Reese experiments with Southern‑style soul food, whipping up collard greens seasoned with smoked paprika, frying catfish with a crunchy corn‑meal crust, and often garnishes dishes with
    herbs from their balcony garden like basil and thyme, while their cooking skill sits at a confident home‑chef level.
  core: Neil Reese is a fiercely curious 26‑year‑old visual artist who balances late‑night gaming marathons and budget‑tight freelance gigs with a relentless drive to turn street art into a sustainable
    career, all while wrestling with anxiety and a habit of chasing rare vinyl finds.
background:
  cultural: Neil was raised in the vibrant African-American community of suburban Atlanta, where the legacy of Southern Black churches, gospel choirs, and family barbecues left a lasting imprint on his
    worldview. The rich street-art scene of the city, the rhythm of Atlanta hip-hop, and the storytelling traditions of his grandparents shaped his appreciation for visual expression and narrative. He observes
    holidays such as Kwanzaa and Juneteenth alongside more mainstream celebrations, and he remains connected to the regional cuisine of collard greens, sweet potatoes, and fried chicken. While navigating
    the challenges of limited formal education, he draws strength from the collective resilience of his community and channels that experience into art that reflects both personal struggle and cultural
    pride.
