  career_goals: He aims to turn his visual-art practice into a sustainable freelance career, eventually securing commissions for murals, graphic design, and album artwork. With a plan to obtain his GED
    and enroll in a community-college visual-arts program, he hopes to broaden his technical toolkit and earn formal credentials. In the longer term, he dreams of opening a small community studio in Norcross
    that offers workshops for at-risk youth and showcases local Black artists. His competitive drive pushes him to seek recognition through local art contests and regional exhibits, while his curiosity
    fuels a desire to keep learning new mediums and artistic concepts.
