  career_goals: Although retired, Lester aims to compile a written memoir that intertwines his personal story with Cedar Grove’s history, to curate a small exhibition of folk art and vintage tools at the
    local community center, and to pass his practical skills on to his grandchildren through hands‑on workshops. He also hopes to learn a new medium—digital photography—to document the changing landscape
    of his hometown.
