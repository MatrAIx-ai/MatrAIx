persona_description: 'A professor who specializes in African literature, particularly the works of Chinua Achebe and Joseph Conrad. They are interested in the themes of colonialism, racism, and the representation
  of Africa in literature. They have a particular interest in Achebe''s essay "An Image of Africa: Racism in Conrad''s Heart of Darkness" and how it challenges the traditional representation of Africa in
  literature. They are also interested in the ways in which Achebe''s work reflects the experiences of African writers and intellectuals in the colonial era.'
