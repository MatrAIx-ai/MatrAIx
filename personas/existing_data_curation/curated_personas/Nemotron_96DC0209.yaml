  hobbies: '["Landscape painting", "Digital photography", "Woodworking", "Gardening", "Reading historical biographies", "Local theater attendance", "Hiking on nature trails", "Chess", "Folk and classical
    music listening", "Traveling to regional festivals"]'
  career_goals: Although retired, Michael aims to stay intellectually active and give back to his community. He plans to mentor younger residents in local art and history workshops, curate a small exhibition
    of his photographs and paintings at the Athens County Library, and donate his genealogical research to preserve regional heritage. He hopes to complete a memoir detailing his life in rural Ohio, enroll
    in occasional community‑college art‑history courses, and travel to at least three national parks before turning 80. Maintaining health, supporting his spouse by managing household finances, and deepening
    his knowledge of modern technology also feature prominently in his personal agenda.
