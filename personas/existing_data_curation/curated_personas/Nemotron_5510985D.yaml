  career_goals: Madhavi aims to advance from cashier to shift supervisor within the next year, leveraging her strong organizational skills and reliability. She plans to earn a GED and take community college
    courses in business administration to qualify for a store manager position in the longer term. Additionally, she dreams of eventually opening a small neighborhood grocery store that offers South Asian
    staples, allowing her to serve the growing multicultural community in Onalaska while providing a stable future for her family.
