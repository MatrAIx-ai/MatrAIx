  hobbies: '["Reading non-fiction (logistics, technology, self-improvement)", "DIY woodworking projects", "Gardening", "Watching cricket and Indian cinema", "Cycling on local trails", "Listening to music
    (classic rock, Indian classical)", "Volunteering at community food bank", "Exploring new warehouse technologies"]'
  career_goals: Yogeshkumar aims to advance from a stocker role to a supervisory position within the next three to five years, targeting a lead or shift supervisor role in a logistics or distribution center.
    He plans to acquire certifications such as the Certified Logistics Associate (CLA) and pursue part‑time coursework in supply chain management at a local community college. Long‑term, he envisions managing
    a warehouse or establishing a small logistics consulting business that emphasizes efficiency and employee development, allowing him to provide a stable future for his family while sharing his expertise.
