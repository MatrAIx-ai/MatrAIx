  career_goals: Erik aspires to become a concept artist for video games or animated films, blending his love for abstract ideas with visual design. He plans to pursue a high school program focused on graphic
    design and computer science, eventually attending a university where he can study interactive media and refine his programming skills. In the long term, he envisions creating his own indie game that
    features narratives inspired by Honduran folklore and modern sci‑fi themes, and hopes to contribute culturally rich stories to a global audience.
