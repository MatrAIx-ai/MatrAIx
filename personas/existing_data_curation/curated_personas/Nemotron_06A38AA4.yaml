personas:
  professional: A budding digital illustrator and aspiring game designer, Erik Torres leverages their vivid imagination and methodical planning to craft fantastical characters and storyboards, while their
    competitive edge shines in collaborative online art challenges.
  sports: Erik Torres plays midfield for the local youth soccer club, the Riverdale Strikers, practices tennis during spring, and keeps a modest fitness routine of daily chess-themed workouts, while cheering
    for the hometown baseball team, the Brookfield Bats, and admiring the international soccer powerhouse FC Barcelona.
  arts: Erik Torres channels their imagination into drawing elaborate fantasy figures, draws inspiration from artists like James Jean, Hayao Miyazaki, and Goro Fujita, and fuels their creative bursts by
    listening to Bad Bunny, La Sonora Dinamita, and Tame Impala while binge-watching Studio Ghibli films.
  travel: Erik Torres prefers meticulously planned weekend getaways, having explored the rainforests of Costa Rica and the historic streets of Cartagena, while dreaming of a solo backpacking trip through
    Kyoto and a summer surf camp in New Zealand.
  culinary: Erik Torres enjoys hands-on cooking, skillfully assembling family favorites like baleadas and pupusas, experimenting with avocado-lime salsa and spicy queso fresco, and delights in mastering
    homemade ramen broth and mushroom risotto on lazy Saturday afternoons.
  core: Erik Torres, a 13-year-old imagination-driven strategist, balances quiet art sessions with fierce chess duels, hoards puzzle pieces, and often sacrifices sleep for late-night game design marathons.
background:
  cultural: Erik is a second‑generation Honduran‑American raised in Capitol Heights, MD. At home, Spanish is spoken alongside English, and his family celebrates Honduran holidays such as Día de la Independencia
    (September 15) and Semana Santa with traditional foods, music, and community gatherings. He feels a strong connection to his heritage through stories his grandparents share about life in Honduras, which
    inspire many of his artistic themes. Living in a multicultural neighborhood, Erik also engages with local Latino community events, which reinforce his bilingual identity and broaden his cultural perspective.
