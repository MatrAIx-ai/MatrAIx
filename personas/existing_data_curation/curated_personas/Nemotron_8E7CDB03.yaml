  hobbies: '[''Sketching murals'', ''Playing acoustic guitar'', ''Exploring local art festivals'', ''Cooking family recipes'', ''Soccer with neighborhood friends'', ''Urban photography'', ''Reading about
    contemporary art'', ''Participating in spoken word open mics'']'
  career_goals: Bolivar plans to earn his GED within the next year and then enroll in a community‑college certificate program in graphic design or digital media. He aims to build a portfolio of murals and
    illustrations that celebrate the Rio Grande Valley’s mixed heritage, eventually working as a freelance visual artist. Long‑term, he hopes to open a modest studio that offers art workshops for at‑risk
    youth and serves as a cultural bridge between Mexican and American traditions through his work.
