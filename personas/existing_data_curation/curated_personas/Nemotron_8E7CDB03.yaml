personas:
  professional: Bolivar Ramirez is a self‑taught visual creator who blends bilingual street photography and free‑software illustration to craft community‑focused graphics, while their relaxed approach to
    deadlines often leads to last‑minute bursts of creativity that fuel their freelance ambitions.
  sports: Bolivar Ramirez plays pickup soccer on the community field with the local Riverside Rovers club in the spring, cheers on the Rio Grande Valley FC Toros for soccer and the Houston Astros for baseball,
    and relies on daily jogs and spontaneous weekend bike rides to stay active despite a habit of skipping formal workouts.
  arts: Bolivar Ramirez immerses themselves in street art and spoken‑word, drawing inspiration from the murals of Diego Rivera, the contemporary photography of Vivian Maier, the music of José González,
    and the poetry of Rupi Chaudhuri, while they often showcase their own sketches at local art festivals and open‑mic nights.
  travel: Bolivar Ramirez prefers spontaneous road trips over meticulously planned tours, has explored the art districts of San Antonio and the desert towns of New Mexico, dreams of photographing the murals
    of Valparaíso, Chile, and balances travel with a modest budget that limits extended stays abroad.
  culinary: Bolivar Ramirez confidently cooks family‑style enchiladas with fire‑roasted tomatillo sauce and handmade masa tamales stuffed with pork and chilies, enjoys experimenting with fresh cilantro,
    queso fresco, and chipotle, and often trades meals for art collaborations at community gatherings.
  core: Bolivar Ramirez is a curiously creative 28‑year‑old who juggles spontaneous art projects, occasional budget splurges, and a laid‑back health routine, all while never quite mastering a tidy schedule.
background:
  cultural: Bolivar grew up in Weslaco, Texas, a border city with a strong Mexican‑American community. He was raised in a bilingual household, celebrating traditions such as Día de los Muertos, Cinco de
    Mayo, and Catholic holidays with his family. The local culture blends norteño and cumbia music, regional cuisine, and a deep sense of community, all of which shape his artistic sensibility and his desire
    to reflect the hybrid identity of the Rio Grande Valley in his work.
attributes:
  skills: '[''Digital illustration'', ''Street photography'', ''Bilingual communication (Spanish/English)'', ''Social media content creation'', ''Basic automotive maintenance'', ''Community event coordination'',
