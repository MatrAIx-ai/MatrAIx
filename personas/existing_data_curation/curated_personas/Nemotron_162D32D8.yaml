  career_goals: He aims to move into senior leadership within the chemical manufacturing sector, targeting roles such as Plant Manager or Director of Operations, where he can drive sustainable process improvements
    and integrate circular economy principles. He is also interested in leading initiatives on green chemistry and developing low-carbon production technologies. Long-term, he envisions founding a consultancy
    that helps mid-sized manufacturers adopt eco-friendly practices while improving profitability. He seeks to balance his curiosity for innovative technologies with the practical aspects of operational
    excellence.
