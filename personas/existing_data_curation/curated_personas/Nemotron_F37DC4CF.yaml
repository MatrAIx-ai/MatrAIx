personas:
  professional: Eva Kupiec, a retired senior center volunteer coordinator, channels their methodical planning, horticultural expertise, and needlework mastery to craft garden workshops, quilting circles,
    and community events, and they embody the reliability and gentle leadership that neighbors trust.
  sports: Eva Kupiec enjoys following the Boston Red Sox and New England Patriots on television, participates in a local senior walking club and a weekly bridge league at the community center, and they
    join a light-intensity bowling league, balancing passive fandom with modest, age-appropriate physical activity.
  arts: Eva Kupiec fills evenings with classic folk melodies, often listening to traditional polka tunes and the Boston Symphony Orchestra, while reading historical fiction by Hilary Mantel and Barbara
    Wood, and they occasionally attend community theater productions at the local playhouse, which nourishes their creative spirit.
  travel: Eva Kupiec prefers curated day trips to Massachusetts coastal towns like Rockport, historical sites such as Salem, and occasional group cruises to Bar Harbor, often planning itineraries with checklists
    and relying on senior travel clubs, while they dream of a future pilgrimage to their ancestral homeland in Europe.
  culinary: Eva Kupiec masters New England staples like clam chowder, baked beans, and apple crumble, while also preparing hand-rolled pierogi stuffed with garden-grown potatoes and cabbage for holiday
    gatherings; they showcase a moderate-to-advanced cooking skill set and a palate that cherishes seasonal fresh herbs and root vegetables.
  core: Eva Kupiec is an 80-year-old community stalwart who blends disciplined organization, a love of garden-to-plate cooking, and a gentle devotion to preserving family stories, even as they occasionally
    forget to water a newly-planted seedling.
background:
  cultural: Eva’s cultural background is rooted in a Polish‑American heritage passed down through her family name, Kupiec, while also reflecting the broader white New England milieu of mid‑20th‑century
    Bridgewater, Massachusetts. Raised in a modest, post‑war Catholic household, she absorbed values of hard work, family solidarity, and community service. Her upbringing emphasized respect for tradition,
    church involvement, and seasonal celebrations, which she continues to honor through holiday cooking, folk music, and participation in local parish events. This blend of Polish roots and New England
    sensibilities informs her love of gardening, quilting, and preserving family stories.
