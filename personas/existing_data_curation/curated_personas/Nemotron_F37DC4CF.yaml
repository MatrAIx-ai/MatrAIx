  hobbies: '[''Community Garden Volunteering'', ''Reading Historical Fiction'', ''Knitting and Crocheting'', ''Genealogy Research'', ''Cooking Traditional New England Recipes'', ''Walking in Local Parks'',
    ''Playing Bridge'', ''Birdwatching'']'
  career_goals: Although officially retired, Eva’s ambitions focus on staying engaged and valuable to her community. She aims to expand her volunteer leadership at the Bridgewater senior center, mentor
    younger neighbors in gardening and crafting, and complete a comprehensive family history that will be archived for future generations. Eva also hopes to learn new digital tools to share her recipes
    and stories online, preserving her cultural heritage while connecting with distant relatives. Maintaining her health and independence so she can continue these contributions remains a central personal
    objective.
