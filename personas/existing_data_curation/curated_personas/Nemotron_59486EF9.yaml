  hobbies: '["Community Theater", "Volunteering at Food Bank", "Fishing", "Gardening", "Senior Basketball League", "Cooking (Midwestern comfort food)", "Woodworking", "Attending Local Fairs and Festivals",
    "Reading Mystery Novels", "Road Trip Travel with Spouse"]'
  career_goals: While approaching retirement, Allen aims to transition into a senior supervisory role where he can oversee inventory strategy for a regional distribution center. He hopes to mentor younger
    employees and codify best‑practice procedures that improve efficiency and safety. Additionally, he is exploring a part‑time consulting gig advising small local businesses on inventory and order‑fulfillment
    processes, allowing him to combine his practical expertise with his desire to help the community. Ultimately, Allen wants to ensure a smooth handoff of responsibilities to the next generation while
    maintaining a balanced, low‑stress lifestyle.
