  hobbies: '[''Photography (urban and landscape)'', ''Gallery and museum visits'', ''Live music (jazz, folk)'', ''Road trips to art festivals'', ''Woodworking'', ''Gardening'', ''Book club (modern philosophy
    and creative nonfiction)'']'
  career_goals: Robert aims to transition from hands‑on operational execution to a strategic advisory role, leveraging his decades of experience to mentor emerging managers and guide small‑to‑medium businesses
    in adopting efficient, innovation‑friendly processes. He is exploring the possibility of founding a boutique consultancy that pairs operational excellence with cultural enrichment initiatives, helping
    clients integrate art‑based thinking into their corporate culture. Additionally, he hopes to serve on the board of a local arts organization, using his business acumen to secure funding and expand community
    outreach.
