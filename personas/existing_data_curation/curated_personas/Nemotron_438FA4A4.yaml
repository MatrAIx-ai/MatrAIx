  career_goals: In retirement, Mazen seeks to stay intellectually active by offering pro-bono consulting to startups in Anne Arundel County, serving on the board of a local arts nonprofit, and publishing
    a series of articles that explore the nexus of business strategy and cultural heritage. He aims to mentor at least ten young professionals each year, launch a community garden that celebrates South
    Asian horticultural traditions, and be recognized as a leading advocate for multicultural arts programming in his region.
