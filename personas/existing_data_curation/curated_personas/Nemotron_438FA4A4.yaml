personas:
  professional: Mazen Bhatia, a retired corporate finance strategist with 45 years of experience, channels a curious yet competitively analytical mind into pro‑bono consulting for Anne Arundel startups,
    serving on an arts nonprofit board, authoring strategic‑culture articles, and mentoring ten emerging entrepreneurs each year while meticulously balancing organized project plans with spontaneous community‑garden
    events.
  sports: Mazen Bhatia, a member of the Annapolis Kayak Club, regularly rows in the spring, keeps fit with daily walks while rooting for the Baltimore Orioles baseball team, and participates in a senior‑friendly
    basketball circuit that aligns with his competitive yet sociable nature.
  arts: Mazen Bhatia, a dedicated watercolorist and amateur photographer, curates a modest vintage print collection featuring works by contemporary South Asian artists such as Subodh Gupta and Anish Kapoor,
    contributes weekly blog posts on the Baltimore Museum of Art exhibitions, and finds inspiration in the abstract compositions of Yayoi Kusama.
  travel: Mazen Bhatia favors well‑planned yet flexible trips, having recently explored the historic streets of Charleston, South Carolina, the bustling markets of Marrakech, and a leisurely cruise through
    the Greek Islands, while his dream itinerary includes a culinary pilgrimage to Kyoto to sample regional seafood dishes that could inspire his next fusion dinner party.
  culinary: Mazen Bhatia, an accomplished home chef, delights in crafting traditional chicken tikka masala and palak paneer alongside inventive fusion recipes like crab curried paella, routinely seasoning
    with coriander, cardamom, and fresh basil harvested from his vegetable garden.
  core: Mazen Bhatia is a calm, curious, and sociable retiree who balances a competitive strategic mind with a love for art, community gardening, and lifelong learning, often indulging in spirited debates
    while nurturing a vintage print collection.
background:
  cultural: Mazen was born into a Punjabi Bhatia family in India and moved to the United States in the late 1960s. He grew up balancing traditional South Asian customs - celebrating Diwali and Holi, speaking
    Hindi and Punjabi at home, and enjoying classical music - with American life. In Arnold, MD, he remains involved with the local Indian diaspora, volunteering at cultural events, teaching younger participants
    about Indian languages and arts, and integrating his heritage into his cooking and artistic pursuits. His bicultural experience informs his inclusive worldview and dedication to fostering cross-cultural
    dialogue.
