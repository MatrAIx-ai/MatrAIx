personas:
  professional: Andrew Evans, a 30‑year‑old reservation specialist at a regional airline, leverages expert mastery of Sabre, Amadeus, and WorldSpan to streamline fare calculations and itinerary modifications
    while methodically analyzing workflow metrics to propose incremental automation, and they deliver each service with the quiet reliability and meticulous attention to detail that stems from their Midwestern
    upbringing.
  sports: Andrew Evans, a 30‑year‑old outdoors enthusiast, regularly hikes the Hocking Hills trails with a small group from the local hiking club, follows the Ohio State Buckeyes football season with quiet
    devotion, and keeps a modest cardio routine by jogging along the Olentangy River while they eschew organized team sports in favor of solitary workouts.
  arts: Andrew Evans, a 30‑year‑old photographer and model‑railway hobbyist, spends weekend afternoons capturing mist‑shrouded Hocking Hills vistas inspired by Ansel Adams, curates intricate miniature landscapes
    that echo the craftsmanship of traditional model‑making clubs, and unwinds to the acoustic folk melodies of Gillian Welch and the classic storytelling of Johnny Cash, all of which inform their contemplative
    aesthetic.
  travel: Andrew Evans, a 30‑year‑old travel‑savvy planner, prefers meticulously researched solo itineraries that balance low‑key nature immersion with sustainable accommodation, having logged photo‑filled
    trips to Iceland’s volcanic fields and New Zealand’s fjords, while they routinely map future journeys to the Scottish Highlands and the Pacific Northwest using Sabre’s ancillary data tools.
  culinary: Andrew Evans, a 30‑year‑old home‑brewer and tea enthusiast, favors cooking hearty, herb‑infused beef stew with locally foraged mushrooms and pairing it with their own crisp pale ale, while they
    regularly experiment with seasonal recipes like rosemary‑garlic roasted chicken and indulge in a steaming cup of Earl Grey after a night of stargazing.
  core: Andrew Evans, a methodical reservation specialist who trades late‑night model‑railway tinkering for quiet landscape photography, balances a love of solitary precision with occasional tea‑laden procrastination,
    and habitually double‑checks every spreadsheet cell before sleeping.
background:
  cultural: Andrew was raised in a small Midwestern community near Newark, Ohio, in a family with German and Irish ancestry. He grew up attending local church services, community fairs, and high school
    football games, absorbing the region’s values of hard work, modesty, and self‑reliance. The predominantly white, rural environment fostered a straightforward communication style and an appreciation
    for quiet, personal space. While his cultural roots are grounded in traditional Midwestern customs, his work in travel has broadened his awareness of diverse destinations and cultures, reinforcing his
    practical curiosity about the wider world.
attributes:
