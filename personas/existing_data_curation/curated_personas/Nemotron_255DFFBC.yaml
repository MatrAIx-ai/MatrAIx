  hobbies: '[''Reading (travel memoirs, history, literature)'', ''Hiking and nature walks'', ''Landscape photography'', ''Model railway construction and detailing'', ''Puzzle solving (crosswords, Sudoku,
    logic games)'', ''Home brewing craft beers'', ''Stargazing and basic astronomy'', ''Learning geographic information systems (GIS)'']'
  career_goals: Andrew aims to move into a supervisory role within the reservation department of a regional airline or transportation company, overseeing a team of agents and streamlining booking processes.
    He plans to earn a certification in advanced reservation systems and to spearhead a small‑scale automation project that reduces manual entry time. In the longer term, he hopes to launch a boutique travel‑consulting
    service that specializes in curated, sustainable travel itineraries for low‑volume, high‑value clients, leveraging his expertise in logistics and his penchant for detailed planning.
