  career_goals: Approaching retirement, Salvacion aims to transition from the production line to a mentorship and training role where she can pass on her practical knowledge and nurturing attitude to the
    next generation of workers. She hopes to secure a part‑time schedule that allows her more flexibility to pursue community art projects and family gatherings. Ultimately, she dreams of establishing a
    small after‑work workshop at the local community center where retirees and younger neighbors can explore painting, quilting, and storytelling together, blending her love for creativity with her commitment
    to harmonious relationships.
