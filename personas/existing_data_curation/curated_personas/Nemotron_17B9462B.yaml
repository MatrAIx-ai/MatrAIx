  career_goals: Marcos aims to move beyond his current role as a food preparation worker to become a line cook and eventually a sous‑chef specializing in modern Spanish cuisine. He plans to enroll in a
    culinary certification program to solidify his technique, while also seeking opportunities to lead a small kitchen team. In the long term, he dreams of opening a boutique tapas bar in Queens that melds
    his Spanish heritage with the multicultural flavors of the borough. He is motivated by personal recognition and the competitive drive to be regarded as a top culinary talent, yet he remains mindful
    of job stability to mitigate his stress and worry.
