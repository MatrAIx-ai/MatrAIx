persona_description: A government economist who specializes in understanding and predicting economic trends, particularly inflation and its causes. They are skilled in using statistical data and economic
  models to analyze the impact of supply disruptions, demand, and monetary policy on inflation rates. They are aware of the limitations of economic statistics and the potential for manipulation of government-created
  inflation data to support positive economic news. They are also aware of the importance of choosing a basket of goods in a price index to accurately reflect inflation rates.
