personas:
  professional: Erica Broadway, a retired community organizer turned senior‑center volunteer leader, leverages her natural storytelling flair, meticulous event planning, and assertive yet compassionate
    conflict‑resolution style to champion intergenerational mentorship programs while delighting crowds with her lively presence.
  sports: Erica Broadway enjoys early‑morning walks with the Early County Senior Walking Club, plays pickleball at the local community center, and avidly cheers for the Atlanta Falcons during football season
    while keeping an eye on the Braves' spring training games.
  arts: Erica Broadway channels her love for storytelling through gospel performances of Mavis Staples classics, vibrant quilts inspired by Faith Ringgold’s narrative fabrics, and regular visits to community
    theater productions of The Color Purple, while her evenings often include listening to Aretha Franklin and reading biographies of civil‑rights icons.
  travel: Erica Broadway favors relaxed road‑trip itineraries that blend heritage tourism with family visits, having explored Savannah’s historic squares, the civil‑rights landmarks of Washington, D.C.,
    and the music scene of Nashville, while daydreaming about a future pilgrimage to New Orleans for its jazz heritage and to the National Museum of African American History and Culture.
  culinary: Erica Broadway, a seasoned Southern cook, delights in perfecting fried chicken with a secret buttermilk brine, simmering collard greens with smoked turkey and a dash of apple cider vinegar,
    and serving peach cobbler made from ripe Georgia peaches and cinnamon, while frequently experimenting with heirloom tomato varieties in fresh garden salads.
  core: Erica Broadway is a charismatic, garden‑loving storyteller who can’t resist adding an extra spoonful of sugar to every dessert, often forgets to take her medication during busy church events, yet
    consistently turns community gatherings into lively celebrations of history and heritage.
background:
  cultural: Erica’s life is rooted in the African‑American Southern tradition of strong church fellowship, oral storytelling, and communal support. Growing up in rural Georgia, she experienced the legacy
    of the civil‑rights movement, which informs her dedication to preserving local history and fostering intergenerational connections. Her cultural identity is expressed through gospel music, soulful cuisine,
    and a reverence for family ties, while also embracing contemporary tools like social media to bridge gaps between generations and share her community’s heritage.
attributes:
  skills: '[''Public speaking'', ''Event planning'', ''Traditional Southern cooking'', ''Gardening'', ''Storytelling'', ''Conflict mediation'', ''Basic computer and smartphone use'', ''Quilting'']'
  hobbies: '[''Gardening'', ''Southern cooking'', ''Quilting'', ''Church choir'', ''Storytelling'', ''Reading civil rights biographies'', ''Bridge'', ''Community volunteering'']'
  career_goals: Although retired from formal work, Erica aims to expand her volunteer leadership at the local senior center, eventually becoming the coordinator for intergenerational mentorship programs
    that pair seniors with school‑age youth. She hopes to document oral histories of Early County’s African‑American elders, preserving community memory while learning new audio‑recording techniques. Maintaining
    her health and vitality remains a priority so she can continue to inspire and support her grandchildren and extended family through active participation in church and community service.
