  hobbies: '["Visiting art museums", "Listening to jazz and blues", "Gardening", "Knitting and crochet", "Reading historical biographies", "Playing bridge", "Volunteer storytelling at senior center", "Attending
    community dance classes", "Cooking family recipes", "Exploring virtual travel tours"]'
  career_goals: Julia aims to continue contributing to her community by mentoring younger volunteers at the local senior center, sharing her life story and the history of African‑American flight attendants
    with museum curators, and supporting initiatives that improve accessibility for seniors. She also hopes to publish a memoir capturing her journey from the Great Migration to her decades of travel, and
    to serve as a cultural ambassador for Black heritage in New York.
