  career_goals: Charlene aims to become a chief financial officer within the next decade, using her blend of analytical rigor and imaginative thinking to spearhead data‑centric, innovative financial strategies.
    She plans to pursue an executive MBA to broaden her leadership toolkit, while also incubating a boutique consulting practice that merges artistic creativity with quantitative finance to help forward‑thinking
    companies navigate complex market environments. Additionally, she is passionate about championing sustainable finance initiatives and leveraging emerging technologies to enhance corporate resilience.
