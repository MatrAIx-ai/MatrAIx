  career_goals: She aims to progress to a senior operations leadership role within the next five years, focusing on strategic initiatives that improve efficiency and employee well‑being. She plans to obtain
    a PMP certification or an MBA, mentor junior staff, lead cross‑functional transformation projects, and eventually transition into operational consulting for nonprofits and small businesses, leveraging
    her arts background to foster sustainable practices.
