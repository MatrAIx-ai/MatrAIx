personas:
  professional: Jessica Cooley, an aspiring young artist and student, they channel their disciplined curiosity into daily sketching, meticulous nature journaling, and leading small craft projects at school,
    demonstrating early mastery of observation, composition, and teamwork.
  sports: Jessica Cooley, a spirited participant in the Tiny Turtles U6 Soccer Club, they love chasing the soccer ball after practice, enjoy ballet lessons at the Kids' Dance Academy, cheer for the River
    City Rangers minor league baseball team, and eagerly anticipate the annual community fun run in spring.
  arts: Jessica Cooley, an enthusiastic young creator, they fill sketchbooks with vibrant nature scenes inspired by Beatrix Potter and Claude Monet, craft colorful collages from collected leaves and paper,
    and idolize the animated storytelling of Disney's Moana and Pixar's Finding Nemo.
  travel: Jessica Cooley, a curious explorer, they treasure family trips to Redwood State Park, dream of visiting the geysers of Yellowstone, and love arranging miniature itineraries with sticker maps after
    watching travel videos on the family tablet.
  culinary: Jessica Cooley, a budding mini‑chef, they prefer bright dishes like carrot sticks with hummus, apple slices with peanut butter, enjoy helping stir blueberry pancake batter, and delight in building
    sandwich towers with whole‑grain bread, cheese, and turkey.
  core: Jessica Cooley, a six‑year‑old with a disciplined eye for detail, they balance a love of nature‑themed art, energetic group play, organized saving habits, and a determined yet compassionate spirit.
background:
  cultural: Jessica was raised in Cameron, a small town in Harnett County, North Carolina. Her family embraces Southern values such as hospitality, close family ties, and community involvement, often attending
    church events, local festivals, and county fairs. She enjoys traditional Southern foods like biscuits, fried chicken, and peach cobbler, and participates in school activities that reflect the region’s
    emphasis on outdoor play and appreciation of nature. The local culture of warm, neighborly interactions and a blend of rural and small‑town traditions shapes her worldview and social experiences.
