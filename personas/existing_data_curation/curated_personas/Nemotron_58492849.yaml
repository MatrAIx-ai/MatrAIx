  career_goals: Jessica dreams of becoming someone who can combine her love for art, learning, and helping others. She expresses a desire to be a museum curator or an artist who creates interactive exhibits
    for children, a teacher who inspires curiosity, or a wildlife researcher who studies animals in North Carolina's forests. She aspires to achieve high standards in whatever path she chooses, aiming to
    be recognized for her dedication and creativity.
