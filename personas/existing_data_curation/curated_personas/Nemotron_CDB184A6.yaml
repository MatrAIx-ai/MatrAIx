personas:
  professional: Michael Pettis, a retired Gulf‑coast fishing charter operator turned community mentor, leverages his woodworking, boat‑maintenance, and budgeting expertise with a practical curiosity that
    drives him to teach younger neighbors while keeping projects organized yet adaptable.
  sports: Michael Pettis enjoys low‑impact athletic pursuits such as sunrise fishing on the Gulf, daily beach walks, and cheering on the New Orleans Saints during football season, while occasionally joining
    a senior softball league at the local community center.
  arts: Michael Pettis, an avid reader of biographies and regional history, finds artistic solace in listening to acoustic blues legends like B.B. King, attending community theater productions of classic
    Southern plays, and channeling his appreciation for handcrafted folk art into his furniture‑restoration hobby.
  travel: Michael Pettis prefers organized, budget‑friendly road trips to historic coastal towns such as Charleston, Savannah, and Galveston, often planning journeys around off‑season rates to fit his modest
    retirement income while seeking new maritime heritage sites.
  culinary: Michael Pettis, a competent home cook, delights in preparing fresh Gulf shrimp étouffée, blackened catfish, and stone‑crab bisque, seasoning with cayenne, paprika, and local okra while experimenting
    with new recipes that blend traditional Southern flavors with occasional culinary twists.
  core: Michael Pettis, a 74‑year‑old retired charter captain, balances relentless curiosity for new ideas with a steadfast practical streak, spending mornings fishing, afternoons restoring antique furniture,
    and evenings mentoring neighbors, all while occasionally forgetting to water his garden until the last minute.
background:
  cultural: Michael grew up in a close‑knit white Southern Gulf Coast family that valued self‑reliance, community service, and the rhythms of coastal life. His early years were marked by church attendance,
    participation in local festivals such as the Gulfport Music Festival and the annual shrimp boil, and learning fishing and boat‑building from older relatives. The regional culture of modest hospitality,
    respect for tradition, and a pragmatic approach to challenges has shaped his values. He cherishes Southern cuisine, Gulf heritage stories, and the intertwined history of the Mississippi Delta and the
    Gulf of Mexico, while remaining open to new ideas that can improve his community.
attributes:
