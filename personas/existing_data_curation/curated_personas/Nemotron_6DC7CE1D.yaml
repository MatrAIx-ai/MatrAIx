  career_goals: Ennis aspires to earn a scholarship to a competitive high school with a strong arts program and later pursue a Bachelor of Fine Arts or a degree in product design at a university such as
    SCAD or Georgia Tech. His long-term ambition is to become a professional graphic designer and illustrator who creates culturally resonant visual storytelling, eventually opening his own creative studio
    that mentors other young Black artists and integrates technology with artistic expression.
