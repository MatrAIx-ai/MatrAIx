  hobbies: '[''Watercolor painting'', ''Architectural photography'', ''Hiking'', ''Reading about architectural history and sustainable design'', ''Woodworking projects'', ''Visiting local art galleries'',
    ''Jigsaw puzzles'', ''Crossword solving'', ''Volunteer work with historic preservation committee'']'
  career_goals: Her immediate goal is to obtain the Certified Building Official (CBO) credential and advance to a senior inspector position where she can mentor junior staff and influence inspection protocols.
    Long‑term, Nancy aims to launch a boutique consulting firm that advises on safety compliance for historic buildings and integrates emerging technologies such as drone‑based surveys. Driven by a competitive
    desire for professional recognition, she aspires to become a leading authority on building safety in Maine while securing the financial independence that supports her preference for a focused, solitary
    lifestyle.
