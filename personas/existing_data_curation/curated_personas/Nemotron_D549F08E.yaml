personas:
  professional: Luz Wohlstein is a seasoned interior painter and paperhanger who leverages meticulous surface preparation, precise layout skills, and bilingual client communication to deliver eco‑friendly
    finishes, while steadily progressing toward a Connecticut Painting Contractor license and a future boutique business.
  sports: Luz Wohlstein is an avid hiker who trails West Rock Ridge State Park weekly, participates in a local outdoor club, cheers for the New York Yankees and the New England Patriots, and occasionally
    joins a community soccer league for cardio, preferring structured, goal‑oriented workouts over spontaneous gym visits.
  arts: Luz Wohlstein blends hands‑on trade expertise with artistic passion, painting watercolor landscapes inspired by the Hudson Valley, curating playlists of salsa legends like Celia Cruz, bomba groups
    such as Los Pleneros de la 21, and reggaeton hits by Bad Bunny, and volunteering on community mural projects alongside artists like Shepard Fairey, which fuels their creative identity.
  travel: Luz Wohlstein prefers carefully planned trips that balance eco‑friendly travel and cultural immersion, often weekend‑hopping to nearby Newport, Rhode Island to explore historic mansions, while
    dreaming of a semester in Granada, Spain to deepen Spanish fluency, and they budget travel using a travel fund fed by bi‑weekly savings.
  culinary: Luz Wohlstein enjoys cooking traditional Puerto Rican dishes like mofongo, arroz con gandules, and pasteles, often incorporating garden‑grown tomatoes, peppers, and cilantro, and while they
    excel at seasoning, they sometimes over‑salt sauces in the pursuit of bold flavor.
  core: Luz Wohlstein is a structurally minded painter‑craftsperson who balances disciplined work habits with weekend watercolor escapes, garden‑to‑table cooking, and a steady push toward sustainable entrepreneurship,
    all while humming salsa tunes and battling occasional back soreness.
background:
  cultural: Luz Maria was raised in a bilingual Puerto Rican household; her parents immigrated to the United States in the early 1990s and settled first in New York before moving to Connecticut when Luz
    was a child. The family retained many island traditions—weekly meals featuring plantains, arroz con habichuelas, and seasoned pork, annual celebrations of San Juan and Three Kings' Day, and a vibrant
    soundtrack of salsa, bomba, and plena. Growing up in the multicultural environment of Fairfield County, Luz learned to navigate both Caribbean and New England cultural norms, valuing hard work, family
    cohesion, and community service. Her fluency in Spanish allows her to connect with the growing Puerto Rican diaspora in the Tri‑State area, and she frequently participates in local cultural festivals,
    church gatherings, and neighborhood clean‑up events that celebrate her heritage while reinforcing her pragmatic, service‑oriented outlook.
attributes:
  skills: '[''Surface preparation'', ''Interior painting'', ''Paper hanging'', ''Color matching'', ''Eco-friendly coating application'', ''Project quoting and budgeting'', ''Client communication (English
