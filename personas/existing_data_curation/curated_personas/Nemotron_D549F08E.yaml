  hobbies: '[''Watercolor painting'', ''Gardening (vegetables and herbs)'', ''Cooking Puerto Rican cuisine'', ''Hiking in West Rock Ridge State Park'', ''Spanish conversation meetup'', ''Volunteering for
    community mural projects'', ''Listening to salsa and reggaeton'', ''Attending local farmers’ markets'', ''Collecting vintage hand-tools'', ''DIY home décor projects'']'
  career_goals: Luz aims to obtain her Connecticut Painting Contractor license within the next 12‑18 months, transition to a crew‑lead role, and eventually launch her own boutique painting and paper‑hanging
    business focused on sustainable, high‑quality finishes for residential clients. She is also interested in completing a certification in decorative finishes and historic preservation to broaden her service
    niche. Over the next five years, she envisions hiring and mentoring apprentices, building a reputation for reliability, and becoming a go‑to contractor for eco‑conscious home remodels in Fairfield County.
