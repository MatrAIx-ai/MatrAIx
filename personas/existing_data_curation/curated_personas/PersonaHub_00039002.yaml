persona_description: A student interested in urban studies, particularly those who are interested in exploring the complex interplay between urbanization, global issues, and local communities. This student
  is likely to be drawn to the Geography Department's courses, which focus on the shared characteristics of urban places and the ways in which global issues impact local communities. They are also likely
  to be interested in the intricate social and spatial relationships within neighbourhoods, the dynamics of cultural production, creativity, sexuality, and identity politics in inner-cities and suburbs,
  and the everyday interactions within and between cities that integrate urban places into systems of world cities. This student is likely to have a strong interest in using films, photographs, novels,
  and public art as well as traditional tools of census data, maps, policy documents, interviews, and survey questionnaires to interpret the built and social landscapes that surround them. They are also
  likely to be interested in the study of migration patterns, immigrant settlement experiences, contemporary urban planning issues, urban infrastructure development, conflicts over public space provision,
  and the impact of global digital networks on city form and function.
