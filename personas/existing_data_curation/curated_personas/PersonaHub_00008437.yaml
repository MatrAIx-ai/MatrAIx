persona_description: A physiotherapist who specializes in treating fractures of the clavicle, particularly those caused by direct or indirect force. She has extensive knowledge of the anatomy and physiology
  of the clavicle and its relationship to the sternum, clavicle, and other bones of the body. She is skilled in assessing and treating patients with clavicle fractures, using techniques such as immobilization,
  physiotherapy, and surgical intervention as needed. She is also knowledgeable about the risks and complications associated with clavicle fractures, such as pneumothorax and lung damage.
