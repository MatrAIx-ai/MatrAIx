personas:
  professional: Stephanie Marcum is a retired community organizer who leverages meticulous event‑planning, rigorous budget oversight, and precise genealogical record‑keeping to spearhead art exhibitions
    and heritage projects, channeling their curious yet skeptical nature into high‑standard, achievement‑driven outcomes.
  sports: Stephanie Marcum enjoys gentle morning walks with the Whitehall Senior Fitness Club, follows the Detroit Tigers baseball season avidly, supports the Grand Rapids Griffins hockey team, and participates
    in a seasonal rowing crew on Lake Michigan that blends low‑impact exercise with their love of the shoreline.
  arts: Stephanie Marcum spends afternoons painting watercolors of Lake Michigan after studying the atmospheric techniques of Claude Monet, curates quarterly visits to the Art Institute of Chicago to admire
    works by George Bellows and early American folk painters, and listens to the symphonies of Beethoven and Mahler while quilting intricate patterns inspired by traditional New England textile motifs.
  travel: Stephanie Marcum prefers meticulously planned, culturally immersive trips, having explored historic Annapolis, ventured to the lavender fields of Provence, and taken a leisurely cruise along the
    Great Lakes, while budgeting carefully to ensure future voyages to the Scottish Highlands remain within their modest retirement allowance.
  culinary: Stephanie Marcum delights in cooking heirloom tomato gazpacho with fresh basil and crisp cucumbers, mastering the art of butter‑flaky cornbread to accompany their garden‑grown sweet corn chowder,
    and regularly savors a simple lemon‑thyme roasted salmon, all while acknowledging a habit of over‑seasoning with freshly minced garlic.
  core: Stephanie Marcum blends a lifelong curiosity for history with a razor‑sharp organizational streak, often juggling multiple community projects while secretly hoarding vintage quilting needles and
    refusing to answer unfamiliar phone calls without a checklist.
background:
  cultural: Stephanie's cultural background reflects a classic Midwestern upbringing in Michigan, with ancestry tracing to German and Irish immigrants who settled in the Great Lakes region in the late 1800s.
    Raised in a small-town, close‑knit community, she was taught the values of hard work, community service, and involvement in church and local festivals. The local culture of Whitehall—characterized by
    seasonal lake‑front activities, appreciation of folk art, and pride in regional history—has deeply shaped her worldview. While she primarily identifies with this white Midwestern heritage, she respects
    the Native American history of Muskegon County and often incorporates that awareness into her community projects.
