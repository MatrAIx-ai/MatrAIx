personas:
  professional: Felton Anderson is an aspiring junior architect who constructs elaborate LEGO cities with friends, using their curiosity‑practical blend to design imaginative structures while leading group
    play with flexible, sometimes disorganized, but enthusiastic energy.
  sports: Felton Anderson sprints through after‑school pickup soccer matches as a forward for the Maple Grove Tigers U‑9 squad, idolizes the Chicago Cubs and the Atlanta Falcons, and balances high‑energy
    play with weekend hikes in the county wildlife preserve to stay fit.
  arts: Felton Anderson blends gospel vibes from the Harmony Praise Ensemble, rap beats by Lil Nas X, and classic Disney anthems like “Let It Go,” while starring in the after‑school storytelling club and
    reenacting adventure tales inspired by actors such as Tom Hanks and musical storytellers like Lin‑Manuel Miranda.
  travel: Felton Anderson prefers spontaneous weekend road trips, having explored the nearby Willow Creek wildlife preserve and dreaming of a family adventure to Yellowstone National Park, while saving
    up for a someday trip to Disneyland Paris with the help of a birthday‑gift fund.
  culinary: Felton Anderson delights in whisking together peach cobbler with grandmother, mastering a buttery crust and cinnamon‑spiced filling, while also munching on cheesy pepperoni pizza and snacking
    on fresh apple slices with peanut butter after soccer practice.
  core: Felton Anderson is a curious, energetic 8‑year‑old who blends group soccer, LEGO building, and storytelling into a toolbox of leadership, flexibility, and occasional harmless mess‑making.
background:
  cultural: Felton is part of a close‑knit African‑American community in Moultrie, Georgia. His family’s traditions blend Southern hospitality with church‑centered culture; Sunday services at the local
    Baptist church provide a rhythm of gospel music, community service, and storytelling. He grows up hearing family histories about the Civil Rights movement in Georgia, which instills a sense of pride
    and responsibility. Community events like the Moultrie Peach Festival and local block parties expose him to Southern cuisine, blues, and dance, while his parents emphasize education, respect for elders,
    and the value of supporting neighbors.
