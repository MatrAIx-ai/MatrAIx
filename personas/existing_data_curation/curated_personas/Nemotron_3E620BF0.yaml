  career_goals: As an eight‑year‑old, Felton's biggest ambition is to become an astronaut or a community scientist who invents tools that help people. He imagines exploring space while also staying grounded,
    saying he wants to design gadgets that make everyday chores easier for his family. He also dreams of being a coach for a youth soccer team, blending his love for sports with his desire to mentor friends.
    His goals reflect his curiosity about how things work and his practical wish to make a positive impact.
