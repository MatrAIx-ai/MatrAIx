  hobbies: '[''Watercolor painting'', ''Vietnamese cooking'', ''Herb gardening'', ''Reading poetry and philosophy'', ''Listening to music (Vietnamese folk, jazz)'', ''Playing Mahjong'', ''Volunteer work
    at senior center'', ''Calligraphy'']'
  career_goals: Even in retirement, Hieu aims to preserve and share Vietnamese cultural heritage by mentoring younger families, compiling his life stories into a memoir, and curating an annual cultural
    exhibition at his local community center. He aspires to continue volunteering as a cultural liaison, lead senior social groups, and ensure his later years remain vibrant, purposeful, and connected to
    his community.
