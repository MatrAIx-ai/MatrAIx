  career_goals: Juan’s career ambition is to transition from frontline response to leadership and preventive health within the EMS system. In the next three to five years he aims to obtain a certified EMS
    Supervisor credential and complete a Master’s degree in Public Health with a focus on community paramedicine. He aspires to develop and manage a Bronx‑based community‑paramedicine program that provides
    preventive care, chronic‑disease monitoring, and health education to Dominican neighborhoods. Long‑term, Juan hopes to become a director of EMS operations for a municipal agency, influencing policy
    to reduce health disparities and improve response protocols.
