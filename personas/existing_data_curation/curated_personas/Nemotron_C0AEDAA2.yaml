personas:
  professional: Susana Novoa, a 33‑year‑old personal care aide in Colorado Springs, blends meticulous clinical documentation with imaginative arts‑based interventions, using guided drawing and flamenco
    music to boost emotional wellbeing while meticulously managing care plans for cognitively‑challenged clients and preparing for CNA certification.
  sports: Susana Novoa, an avid solo hiker, conquers the Rocky Mountain trails such as Mount Cutler and Garden of the Gods, affiliates with the Colorado Springs Hiking Club, and roots for the Denver Broncos
    and Colorado Avalanche, while reserving weekends for gentle yoga to stretch after long treks.
  arts: Susana Novoa immerses herself in the Colorado Springs Fine Arts Center, draws inspiration from abstract expressionist Wassily Kandinsky and avant‑garde writer Octavia Butler, experiments with digital
    illustration in Procreate, and finds solace listening to Paco de Lucía’s flamenco guitar, all of which fuel her speculative poetry and large‑scale watercolor canvases.
  travel: Susana Novoa prefers solitary, contemplative trips, having trekked the high desert of New Mexico, explored the historic alleys of Granada to hear live flamenco, and dreamt of a winter retreat
    in Iceland’s geothermal baths, planning each itinerary with a meticulously annotated journal while balancing a modest travel budget.
  culinary: Susana Novoa enjoys crafting fusion dishes like quinoa‑saffron paella with chipotle‑marinated shrimp, often experimenting with fresh rosemary, pomegranate molasses, and smoked paprika, though
    she sometimes over‑seasons, and she alternates between using a high‑end chef’s knife for precise cuts and a clumsy, over‑enthusiastic blender that splatters her studio canvas.
  core: Susana Novoa is a solitary, imagination‑driven care aide who blends clinical precision with artistic therapy, worries about future goals, and finds peace in quiet hikes, watercolor splashes, and
    meticulously planned yet occasionally over‑indulgent creative pursuits.
background:
  cultural: Susana’s family traces its roots to the Andalusian region of Spain, and she grew up bilingual, speaking both Spanish and English at home. Spanish cultural traditions—such as celebrating Día
    de los Muertos, preparing paella for family gatherings, and listening to flamenco rhythms—remain central to her identity. While she has adopted the outdoor, health‑focused lifestyle of Colorado Springs,
    she still cherishes the Spanish emphasis on close‑knit family bonds and a deep appreciation for art and music. Susana actively participates in the local Hispanic community, volunteering at cultural
    festivals and offering translation support at senior centers, which reinforces her commitment to bridging her heritage with her professional caregiving role.
attributes:
  skills: '[''Personal Care Assistance'', ''Medication Reminder'', ''Vital Signs Monitoring'', ''Wound Care Basics'', ''Medical Documentation'', ''Time Management'', ''Independent Work'', ''Creative Problem
