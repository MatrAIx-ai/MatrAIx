  hobbies: '[''Abstract Watercolor Painting'', ''Speculative Poetry Writing'', ''Solo Hiking'', ''Art Gallery Visits'', ''Philosophy and Avant‑Garde Literature Reading'', ''Digital Illustration'', ''Flamenco
    Music Listening'', ''Reflective Journaling'', ''Culinary Experimentation'', ''Virtual Art Workshops'']'
  career_goals: Susana aims to obtain a Certified Nursing Assistant (CNA) credential within the next year and eventually pursue a bachelor’s degree in health sciences. She envisions transitioning from a
    personal care aide to a care coordinator role, where she can design and oversee holistic care plans that integrate artistic therapy for elderly or neuro‑divergent clients. Long‑term, she hopes to launch
    a community‑based program in Colorado Springs that offers low‑cost art‑infused wellness workshops for seniors, positioning herself as a leader who merges clinical expertise with creative innovation.
