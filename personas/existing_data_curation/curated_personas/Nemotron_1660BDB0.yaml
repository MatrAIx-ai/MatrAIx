  hobbies: '[''Home Cooking'',''Hip‑Hop and R&B Music'',''Video Gaming'',''Watching Football and Basketball'',''Jogging'',''Coffee Brewing'',''Small Community Meet‑ups'',''Reading Non‑fiction'',''DIY Home
    Repairs'']'
  career_goals: Kelvin aims to be promoted to a shift‑lead position within the next year and to become a restaurant manager within three years. He plans to earn a food‑safety certification and complete
    an associate degree in hospitality management at a local community college. His long‑term ambition is to achieve a stable income that allows him to rent his own apartment and eventually launch a small
    food‑truck or catering side‑business that showcases his cooking skills.
