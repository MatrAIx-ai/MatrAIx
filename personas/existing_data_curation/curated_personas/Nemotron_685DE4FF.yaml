  hobbies: '[''Street‑art photography'', ''Hip‑hop dance'', ''Live‑music gigs'', ''Cooking Caribbean‑inspired meals'', ''STEM mentoring for youth'', ''Reading science‑fiction'', ''Puzzle games'']'
  career_goals: 'Kamari aims to become a senior engineering technician and eventually a lead engineering technologist, overseeing complex projects and guiding multidisciplinary teams. Over the next three
    years she plans to earn certifications such as Certified Manufacturing Technician (CMT) and Six Sigma Green Belt, while pursuing a master’s degree in engineering management part‑time. Passionate about
    sustainable manufacturing, she hopes to work on renewable‑energy equipment or green‑building systems in New York. Long‑term, she envisions launching a community‑focused STEM consultancy that provides
    technical support to local startups and offers hands‑on workshops for under‑represented youth.

    '
