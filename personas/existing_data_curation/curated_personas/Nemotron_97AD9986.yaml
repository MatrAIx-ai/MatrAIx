  career_goals: Amanda aims to earn a recognized ServSafe Manager certification to formalize her expertise and boost her credibility. She hopes to mentor younger employees, creating a legacy of skilled
    staff who can sustain the restaurant’s quality after her retirement. In the next few years, she envisions launching a modest family‑run catering service that highlights traditional Mexican dishes for
    community events and local festivals. Financial stability for her family’s retirement and a smoother, less stressful work environment are also top priorities, guiding her to streamline operations and
    reduce personal stressors.
