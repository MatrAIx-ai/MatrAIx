personas:
  professional: Amanda Santos is a seasoned restaurant operations manager who blends rigorous inventory control and ServSafe expertise with an outgoing, assertive style to keep front‑of‑house and back‑of‑house
    teams synchronized, while they balance a love of structure with a flexible, people‑centric approach that fuels a supportive work atmosphere.
  sports: Amanda Santos enjoys weekly walks with the local senior fitness circle in Griffith Park, follows the Los Angeles Dodgers baseball season, occasionally plays casual softball for a community league,
    and treats fitness as a low‑pressure routine that satisfies their sociable nature while they keep an eye on joint health.
  arts: Amanda Santos regularly attends salsa nights featuring live bands playing the likes of Los Tigres del Norte and José Alfredo Jiménez, crochets blankets while watching classic telenovelas starring
    Thalía, and delights in regional Mexican folk art, which together shape their vibrant cultural identity.
  travel: Amanda Santos prefers relaxed road trips to nearby destinations like Santa Barbara and Ojai, dreams of a cultural pilgrimage to Oaxaca’s historic markets, plans travel around church events and
    family gatherings, and balances their modest retirement budget with occasional splurges on authentic culinary experiences abroad.
  culinary: Amanda Santos, a culinary enthusiast with decades of restaurant experience, expertly prepares mole poblano, pozole rojo, and chili‑infused salsas using fresh epazote, chilies de árbol, and roasted
    corn, while they enjoy sharing these meals at community cooking classes and value the communal aspect of tasting traditional flavors.
  core: Amanda Santos blends meticulous restaurant management with a warm, sociable heart, secretly hoards extra chilies for late‑night snacking, worries about every detail yet finds calm in the rhythm
    of salsa steps and crocheting stitches, and they remind themselves that a well‑timed laugh can melt stress.
background:
  cultural: Amanda is a first‑generation Mexican American who grew up in a close‑knit immigrant community in Los Angeles. Spanish is her primary language, though she speaks conversational English. Her family
    maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco de Mayo, and religious holidays with elaborate meals and gatherings. Catholic faith and family loyalty shape her values,
    and she actively participates in local Mexican cultural organizations. The blend of her heritage and the diverse Los Angeles environment informs her cooking style, community involvement, and warm, sociable
    personality.
