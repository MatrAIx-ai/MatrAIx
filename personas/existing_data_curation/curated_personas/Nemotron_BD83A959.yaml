personas:
  professional: Olga Wilkerson is a data-driven LPN who leverages her STEM background and bilingual fluency to deliver thorough patient assessments, spearhead quality-improvement initiatives, mentor new
    staff, and seamlessly integrate health-tech tools while balancing a structured schedule with the flexibility required for community outreach.
  sports: Olga Wilkerson enjoys weekend yoga classes, hikes the Kettle Moraine State Forest trails with the local Hiking Club, supports the Milwaukee Bucks and Green Bay Packers, and plays in a co-ed community
    softball league, balancing moderate activity with seasonal cross-country skiing in winter.
  arts: Olga Wilkerson immerses herself in the vibrant sounds of Lila Downs and Café Tacvba, attends Milwaukee Rep theater productions, engages in a bilingual book club reading works by Isabel Allende,
    and captures nature's details through Ansel Adams-inspired photography, weaving artistic expression into her everyday life.
  travel: Olga Wilkerson plans her trips with a mix of careful budgeting and spontaneous curiosity, favoring road-trip getaways to Door County and the Upper Dells, having explored Oaxaca's historic markets
    and dreaming of hiking Costa Rica's cloud forests while still balancing work and family commitments.
  culinary: Olga Wilkerson loves cooking enchiladas with grilled chicken, cauliflower rice, and homemade salsa, perfecting a healthier pozole using low-sodium broth and fresh hominy, while her backyard
    garden supplies cilantro, oregano, and jalapeños for daily meals, though she occasionally indulges in late-night churro-style pastries.
  core: Olga Wilkerson blends analytical nursing expertise with community-rooted compassion, balancing disciplined ambition and spontaneous self-care, all while navigating occasional coffee-driven overcommitments
    and a love for nature-infused creativity.
background:
  cultural: Olga is a first‑generation Mexican‑American; her parents emigrated from Jalisco in the early 1980s. Raised in a bilingual household, she celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and Semana Santa, while also embracing Midwestern customs of community gatherings and outdoor recreation typical of Brookfield, WI. Her family’s emphasis on collectivism, respect for
    elders, and shared meals informs her compassionate, cooperative approach in nursing. Olga remains active in the local Hispanic community, volunteering with the Hispanic Health Council and participating
    in cultural festivals that blend her Mexican heritage with her Wisconsin surroundings.
attributes:
  skills: '[''Patient assessment'', ''Wound care'', ''Medication administration'', ''IV therapy'', ''Electronic Medical Records (EMR) management'', ''Health education and counseling'', ''Bilingual (English/Spanish)
    communication'', ''Evidence‑based practice implementation'', ''Quality improvement initiatives'', ''Team leadership and mentorship'', ''Community health outreach'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Gardening (herb and vegetable garden)'', ''Hiking local trails (Kettle Moraine State Forest)'', ''Yoga and pilates'', ''Reading medical and science literature'',
    ''Volunteering at community health fairs'', ''Participating in a bilingual book club'', ''Nature photography'']'
  career_goals: Olga aims to advance from licensed practical nurse to registered nurse by completing an LPN‑to‑RN bridge program, followed by a Master’s in Nursing focused on health informatics or community
    health leadership. She aspires to become a charge nurse or unit supervisor, where she can champion culturally competent care for the growing Latino population in Waukesha County. Long‑term, Olga wants
    to design and implement evidence‑based patient‑education programs, contribute to county health‑policy development, and explore research on integrating wearable health data into routine nursing practice.
