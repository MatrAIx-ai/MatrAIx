  career_goals: Karen hopes to continue her education through high school and eventually study nursing or social work, fields that combine her love for science with her desire to help others. She dreams
    of becoming a pediatric nurse, where she can care for children and provide comfort to families. In the short term, she wants to earn a volunteer badge in her school’s peer‑mentoring program and maybe
    join a youth community service group, building experience that will support her long‑term goal of working in a caring, people‑focused profession.
