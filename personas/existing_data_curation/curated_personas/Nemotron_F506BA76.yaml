personas:
  professional: Karen Deligdish is an aspiring fantasy author‑illustrator who spends afternoons drafting short stories and sketching epic battle scenes, channeling their curiosity into world‑building while
    often procrastinating on school assignments due to a relaxed attitude toward obligations.
  sports: Karen Deligdish dives into the local community pool on weekends, attending the junior swim club that practices freestyle laps to build endurance, and cheers for the nearby high school basketball
    team, the Wildcats, while occasionally joining friends for casual pick‑up soccer at the park.
  arts: Karen Deligdish immerses themselves in fantasy literature from authors like Sarah J. Maas and brings those worlds to life on paper, listening to acoustic renditions of Taylor Swift's songs and instrumental
    soundtracks from Studio Ghibli films as they sketch, often sharing completed pieces on a school art forum where they receive supportive comments from peers.
  travel: Karen Deligdish loves weekend road trips to the state’s historic lighthouse and a recent family vacation to Washington, D.C., where they marveled at the National Air and Space Museum, and they
    dream of exploring Kyoto’s cherry‑blossom festivals once they save enough from their allowance and part‑time gigs.
  culinary: Karen Deligdish enjoys helping their mother in a modest vegetable garden, often harvesting carrots and zucchini that they sprinkle into simple stir‑fry dishes with soy sauce and garlic, while
    also perfecting a beloved snack of hummus‑dipped cucumber sticks and occasionally baking chocolate chip cookies for friends.
  core: Karen Deligdish is a creatively curious 13‑year‑old whose vivid imagination fuels fantasy art, compassionate teamwork, and heartfelt empathy, all while navigating intense emotions and a penchant
    for spontaneous, sometimes disorganized, living.
background:
  cultural: Karen was raised in a middle‑class, white family in Houston, Texas, where Southern hospitality and a love for outdoor activities are common. Her family celebrates traditional holidays such as
    Thanksgiving and Christmas with gatherings that feature barbecue, homemade pies, and church attendance. Growing up in the multicultural city of Houston, she has been exposed to diverse cuisines, especially
    Mexican and Cajun dishes, and occasionally hears Spanish phrases at school and in the neighborhood. This blend of Texan traditions and city diversity shapes her values of community, generosity, and
    openness to different cultures.
