  hobbies: '["crayon drawing", "building block towers", "listening to jazz and gospel music", "backyard nature exploration", "interactive picture books", "participating in church community events"]'
  career_goals: Although only three, William frequently expresses a desire to become an artist who paints big pictures, a storyteller who shares new ideas, or a community helper like a firefighter who brings
    calm to others. His emerging empathy and occasional worry about new situations motivate him to imagine roles where he can create joyful experiences and provide reassurance, reflecting his balance of
    compassion and self‑interest.
