personas:
  professional: A budding preschool architect, William Milner loves arranging colorful blocks into intricate skylines, showing early spatial reasoning and an uncanny ability to keep his miniature city organized
    while still letting imagination reshape the layout at a moment's notice.
  sports: An enthusiastic member of the local kiddie soccer club, the Tiny Tigers, William Milner kicks the ball with boundless energy during spring practices, cheers loudly for the hometown Ducks hockey
    team on TV, and splashes in the community pool’s summer swim lessons.
  arts: A curious little art enthusiast, William Milner dwells on walls adorned with Sesame Street posters, imitates the rhythms of The Wiggles on a toy keyboard, and creates crayon masterpieces of dinosaurs
    that they proudly display on the fridge.
  travel: A budding explorer, William Milner has visited Grandma’s farm in the countryside, the city zoo where they marveled at giraffes, and longs to ride the carousel at Disneyland during the next family
    vacation.
  culinary: A picky yet adventurous eater, William Milner devours cheesy macaroni, loves banana-streaked pancakes drizzled with honey, and can independently spread butter on toast, though they still reject
    broccoli like a tiny tyrant.
  core: William Milner, a wonder-filled three-year-old who balances meticulous block-building with sudden snack-driven splurges, navigates the world with a curious mind, occasional worries, and a habit
    of leaving crayons scattered in every room.
background:
  cultural: 'William is part of a Black family rooted in Goldsboro, North Carolina. His upbringing blends Southern African‑American traditions: regular church attendance, community storytelling, gospel
    and soul music, family cookouts featuring soul food, and oral histories shared by grandparents. These cultural influences nurture his appreciation for rhythm, visual art, and collective experiences,
    while also instilling values of resilience, community support, and a deep connection to local heritage.'
attributes:
  skills: '["basic vocabulary (30+ words)", "color and shape recognition", "crayon drawing with experimental color use", "stacking wooden blocks", "simple puzzle solving by trial and error", "following
