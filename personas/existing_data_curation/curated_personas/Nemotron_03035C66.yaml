  hobbies: '[''Building blocks (Lego Duplo)'', ''Coloring with crayons'', ''Singing nursery rhymes'', ''Dancing to salsa and reggaetón'', ''Storytime with parents'', ''Dress‑up role‑play'', ''Playing on
    playground equipment'', ''Interactive pet care toys'']'
  career_goals: Patricia’s imagination is already filled with future roles where she can talk, lead, and help others. She frequently declares that she wants to be a teacher so she can share stories and
    sing songs to classmates, and she also dreams of being a veterinarian because she loves caring for animals. In the short term, she aspires to be the "host" of family gatherings, delighting relatives
    with her songs and playful jokes, reflecting her sociable nature and love for being in the spotlight.
