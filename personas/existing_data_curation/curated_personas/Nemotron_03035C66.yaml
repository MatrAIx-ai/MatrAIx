personas:
  professional: Patricia Larreategui, a three‑year‑old budding organizer, loves leading her preschool’s block‑building sessions, imposing tidy routines while delighting in spontaneous dance breaks that
    mirror the lively family parrandas.
  sports: Patricia Larreategui spends Saturday mornings sprinting across the community field with the Trujillo Alto Mini‑Leones soccer club, cheering loudly for the Cangrejeros de Santurce during their
    occasional baseball practices, and caps the day with a mini‑salsa lesson where she mimics the lively steps she sees at family gatherings.
  arts: Patricia Larreategui’s artistic flair shines when she colors vibrant pictures of tropical scenes while belting out choruses of Daddy Yankee, Marc Anthony, and the playful reggaetón hits of Bad Bunny
    during lively family parrandas, turning every living room into a spontaneous stage.
  travel: Patricia Larreategui enjoys short family road trips, delighting in the white‑sand beaches of Culebra after a quick photo stop at the colorful streets of Old San Juan, while dreaming of a future
    adventure to Disneyland in California, though her current travel itinerary is limited to weekend visits to her aunt’s house in Ponce due to parental scheduling.
  culinary: Patricia Larreategui loves helping stir the fragrant sofrito for arroz con gandules, eagerly snacking on crispy tostones and sweet plantain slices from pasteles, yet stubbornly refuses peas,
    and proudly declares herself a master at sprinkling cheese on her own mini‑pizza.
  core: Patricia Larreategui is a bubbly, structure‑loving three‑year‑old who turns block‑building into a choreographed routine, guards a treasure of stickers in her pink piggy bank, and bursts into salsa
    steps at the slightest cue.
background:
  cultural: Patricia is raised in a close‑knit Puerto Rican family in Trujillo Alto, near Bayamón. Her household blends Spanish and occasional English, reflecting the island's bilingual reality. Family
    traditions such as celebrating the Fiesta de San Juan, Christmas parrandas, and weekly Sunday meals featuring arroz con gandules and pasteles shape her daily life. Music and dance are integral, with
    salsa, plena, and modern reggaetón featuring in home gatherings. The Catholic faith influences holidays and moral teachings, while extended family visits and community festivals reinforce a strong sense
    of belonging and cultural pride.
attributes:
  skills: '[''Conversational Spanish and beginner English'', ''Vocabulary of ~500 words'', ''Counting 1-10'', ''Fine motor skills for drawing and block building'', ''Rhythmic clapping and basic dancing'',
