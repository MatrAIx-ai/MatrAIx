personas:
  professional: Janice Moody, a 2‑year‑old budding caretaker in pretend play, orchestrates daily tea parties for her stuffed animals with meticulous routine, showcasing a natural talent for nurturing, gentle
    cooperation, and a relaxed, flexible approach to the inevitable messes they leave behind.
  sports: Janice Moody, a 2‑year‑old, enjoys swinging on playgrounds, dribbling a small red ball at the neighborhood Tiny Tots Soccer Club, and enthusiastically watches the Los Angeles Dodgers on weekends;
    they embody a flexible, routine‑loving approach to fitness that blends structured play with spontaneous movement.
  arts: Janice Moody, a 2‑year‑old, delights in singing along to Raffi’s Baby Beluga, giggling at Sesame Street’s Elmo, and scribbling bright suns and stick‑figure families with chunky crayons, allowing
    a compassionate, routine‑oriented imagination to thrive through familiar tunes and colorful art as they explore the world in soft, predictable strokes.
  travel: Janice Moody, a 2‑year‑old, has explored the local zoo in San Diego, giggled on a beach trip to Santa Monica, and visited Grandma’s farmhouse in the hills, and they now dream of a magical day
    at Disneyland in Anaheim, preferring family‑guided itineraries that stick to familiar bedtime routines.
  culinary: Janice Moody, a 2‑year‑old, favors buttery macaroni and cheese sprinkled with cheddar, soft banana slices, and mild chicken nuggets, proudly scoops peas from the spoon, and eagerly helps stir
    pancake batter with a tiny wooden spoon, reflecting a practical palate that treasures comfort foods and simple, familiar flavors as they enjoy each bite.
  core: Janice Moody, a 2‑year‑old, thrives on predictable routines, shares toys with a gentle heart, sometimes leaves a trail of scattered blocks, and finds joy in soothing lullabies and bright crayons,
    embodying a quietly stable yet delightfully messy toddler spirit as they wander through their day.
