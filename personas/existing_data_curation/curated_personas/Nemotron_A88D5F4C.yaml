  hobbies: '[''Exploring local art galleries and murals'', ''Street photography'', ''Playing acoustic guitar'', ''Salsa dancing'', ''Hiking in the Sierra Nevada foothills'', ''DIY home-improvement projects'',
    ''Volunteering at community workshops'', ''Participating in improv comedy groups'', ''Cooking traditional Mexican dishes'', ''Listening to jazz and Latin music'']'
  career_goals: Norbert aspires to earn his master electrician license within the next two years and to transition from a journeyman to the owner of his own electrical contracting firm focused on renewable-energy
    projects and artistic installations. He hopes to mentor apprentices from the local community college, offering them both technical training and guidance on navigating the trade’s challenges. Long-term,
    he dreams of establishing a collaborative studio space where electricians, artists, and performers can create immersive installations, allowing him to fuse his technical expertise with his passion for
    art. Financial stability and the ability to support his children’s education remain central motivations.
