personas:
  professional: Norbert Lucero, a seasoned electrician with two decades of experience in residential wiring, solar panel installations, and audiovisual rigging, leverages his spontaneous problem‑solving
    style and sociable charisma to lead crews and charm clients, though his aversion to rigid schedules sometimes forces him into last‑minute deadlines.
  sports: Norbert Lucero, a devoted fan of the Fresno Grizzlies baseball team and the Los Angeles Lakers, hits the Sierra foothills trails for weekend hikes, participates in a local climbing gym’s bouldering
    club, and squeezes in a weekly pick‑up soccer game at a community field, using these activities to offset job‑related stress.
  arts: Norbert Lucero immerses himself in Fresno’s mural‑rich streets, snapping street‑photography that echoes the vivid palettes of Frida Kahlo, strums acoustic guitar at open‑mic nights covering Los Lobos
    and Juanes, and dances salsa to the rhythms of Celia Cruz, all while volunteering to teach basic electrical safety at a community art workshop.
  travel: Norbert Lucero blends his love of art and adventure by weekend‑tripping to Yosemite’s granite cliffs, planning a future pilgrimage to Oaxaca’s culinary festivals, and reminiscing about family
    visits to Michoacán, yet his spontaneous booking style often leaves him juggling hotel reservations with work deadlines.
  culinary: Norbert Lucero’s palate swings between smoky carne asada tacos, homemade mole with ancho chilies, and a secret‑recipe guacamole spiked with roasted tomatillos, while his kitchen skill hovers
    at proficient—he can rewire a grill faster than most can sauté a chipotle‑infused salsa.
  core: Norbert Lucero is a charismatic, art‑obsessed electrician who juggles solar projects, salsa evenings, and a restless worry about deadlines, often turning stress into spontaneous DIY inventions.
background:
  cultural: Norbert grew up in Fresno’s agricultural neighborhoods as a first-generation Mexican-American. His parents emigrated from Michoacán, bringing with them traditions of family gatherings, Catholic
    holidays, and a deep appreciation for Mexican folk art such as Talavera pottery and papel picado. Bilingual from childhood, he switches seamlessly between Spanish at home and English at work, preserving
    his heritage while navigating the broader Californian culture. He celebrates Día de los Muertos with elaborate altars and participates in local Cinco de Mayo festivals, which reinforce his connection
    to community. This blend of Mexican customs and the diverse, entrepreneurial spirit of the Central Valley shapes his worldview, values, and daily practices.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical systems'', ''Solar panel installation'', ''Electrical code compliance (NEC)'', ''Blueprint interpretation'', ''Troubleshooting and
