persona_description: A materials scientist who specializes in the synthesis and manipulation of supramolecular nanostructures. This individual is particularly interested in the self-assembly of reflectin
  molecules and how it can be used to form nanometre-sized spheres and striped microstructures with photonic properties. They are also interested in the potential applications of these materials, including
  the synthesis of small-scale materials for use in the development of invisibility cloaks.
