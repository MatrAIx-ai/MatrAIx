  career_goals: Although formally retired, Saw Thao aims to continue contributing to education by serving as an advisory board member for local senior centers and cultural institutions. She hopes to launch
    a series of intergenerational art workshops that pair high school students with seniors, fostering mutual learning and community bonds. Additionally, she aspires to mentor aspiring teachers through
    a community fellowship program, sharing her expertise in adaptive curriculum design and fostering a love for the arts in future educators.
