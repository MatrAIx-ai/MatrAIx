personas:
  professional: Saw Tran, a retired elementary educator turned senior advisory board member, channels decades of curriculum development expertise into designing intergenerational art workshops that pair
    high school students with seniors, while they mentor novice teachers through a community fellowship that blends traditional teaching methods with experiential visual arts.
  sports: Saw Tran stays fit through daily walks along the Folsom Lake Trail, participates in a senior yoga group at the community center, enjoys cheering on the Sacramento Kings and the Sacramento Republic
    FC, and they find occasional joy in friendly bridge tournaments that double as mental exercise.
  arts: Saw Tran regularly visits the Sacramento Museum of Art to study works by Frida Kahlo and Henri Matisse, practices traditional brush calligraphy inspired by ancient scrolls, sways to the jazz of
    Ella Fitzgerald and the classical cello of Yo‑Yo Ma during karaoke nights, and they delight in community performances by the B Street Theatre featuring actors like Viola Davis.
  travel: Saw Tran prefers organized group tours that balance cultural immersion and comfort, has explored historic neighborhoods of Old Sacramento, the art districts of San Francisco, and the natural wonder
    of Lake Tahoe, and they dream of visiting the lantern-lit streets of Kyoto, the historic avenues of Paris, and the coastal villages of Amalfi for inspiration.
  culinary: Saw Tran delights in preparing fragrant rice noodle soup with star anise and fish sauce, hand‑rolling fresh spring rolls with shrimp, vermicelli, and mint, and perfecting caramelized pork belly
    seasoned with soy, ginger, and coconut sugar, while they proudly source herbs and bok choy from their backyard garden.
  core: Saw Tran, an endlessly curious 88‑year‑old educator, blends competitive spirit with calm resilience, orchestrates lively intergenerational art projects, chases karaoke high notes, and they occasionally
    forget where they placed their glasses during bridge games.
background:
  cultural: Saw Thao Tran is a Southeast Asian immigrant of Vietnamese descent who arrived in the United States as a young adult. She has maintained strong ties to her cultural roots, celebrating Tet, practicing
    traditional calligraphy, and preserving family recipes. Living in Folsom, CA, she actively engages with both the local Vietnamese community and the broader multicultural environment of Sacramento County,
    blending her heritage with an appreciation for diverse artistic expressions. Her experiences as an immigrant, educator, and senior citizen shape a worldview that values resilience, lifelong learning,
    and the sharing of cultural knowledge across generations.
