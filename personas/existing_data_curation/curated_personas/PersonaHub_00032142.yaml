persona_description: A scientist or environmental scientist who is interested in atmospheric science, particularly in the study of aerosol plumes and their impacts on the environment. They are likely to
  be working with data from the GOES-12 satellite and are familiar with the GOES Aerosol/Smoke Product (GASP) and the Realtime Air Quality Modeling System (RAQMS) to analyze the data. They also have knowledge
  of the effects of aerosol plumes on the environment, such as their impact on visibility and air quality. They are likely to be using the MODIS true color Red/Green/Blue (RGB) image and the AWIPS image
  of the MODIS 0.65 Âµm visible channel data to gain a better understanding of the aerosol plume and its movement. They are also likely to be using the Realtime Air Quality Modeling System (RAQMS) to analyze
  the surface sulfate or SO4 levels and the mixing ratio of surface sulfate or SO4.
