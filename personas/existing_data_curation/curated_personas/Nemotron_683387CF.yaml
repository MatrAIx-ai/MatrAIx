    choir"]'
  career_goals: Although retired, Steven aims to stay active and purposeful by maintaining his health, deepening his involvement with the Laguna Niguel senior community, and eventually serving on the board
    of the local community center. He hopes to launch a small intergenerational mentorship program that pairs retirees with high‑school students for life‑skill workshops. He also dreams of compiling his
    family's stories and recipes into a memoir that honors his Portuguese heritage while celebrating his life in Orange County.
