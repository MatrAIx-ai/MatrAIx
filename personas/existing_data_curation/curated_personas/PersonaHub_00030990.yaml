persona_description: A paleo-geneticist who specializes in the study of ancient DNA and its applications in archaeology, paleoanthropology, and environmental science. Dr. Rhian Waller has conducted research
  on deep-sea corals and has experience with DNA extraction, amplification, and analysis of microsatellite DNA markers from fossil samples. She has also worked with the populations genetic laboratory at
  the Maurice Lamontagne Institute and has published several research papers on her work.
