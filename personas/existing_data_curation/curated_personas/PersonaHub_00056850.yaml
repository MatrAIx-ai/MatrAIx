persona_description: A military strategist and military historian, particularly interested in the campaigns and strategies of the American Civil War. This persona is deeply familiar with Grant's tactics
  and strategies, including his bold move to capture Vicksburg and his decision to use part of his force above Vicksburg to divert the Confederates while the main body marched southward on the west side
  of the Mississippi. This persona is also knowledgeable about the Confederate military and their strategies, particularly the actions of Pemberton and Johnston. They have a keen interest in the events
  leading up to the capture of Vicksburg and are interested in understanding Grant's role in the campaign.
