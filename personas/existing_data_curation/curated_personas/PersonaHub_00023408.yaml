persona_description: A Native American who is interested in the history and culture of the Western United States, particularly the Native American tribes that inhabited the region before European settlement.
  They are curious about the medicinal and weaving uses of sagebrush and the significance of the state flower and quarter in Nevada. They are also interested in the cultural practices and traditions of
  the Native American tribes and the role of sagebrush in their daily lives. They appreciate the beauty and biodiversity of the region and are aware of the challenges faced by the native tribes in preserving
  their cultural heritage and traditions.
