  hobbies: '[''heirloom tomato gardening'', ''traditional Mexican cooking (mole, pozole, tamales)'', ''reading historical fiction and Mexican literature'', ''chess at the senior center'', ''walking local
    nature trails'', ''folklorico dance'', ''knitting and quilting'', ''volunteering at community center'', ''digital photography of cultural events'']'
  career_goals: Although she is no longer in the formal workforce, Amarilis is driven to leave a lasting imprint on her community. She aims to formalize her mentorship by creating a volunteer program that
    pairs retired educators with current teachers and adult learners. She also dreams of compiling her life story and teaching philosophies into a memoir that highlights the Mexican‑American experience
    in California’s Central Valley. A personal ambition is to expand the neighborhood garden into an intergenerational learning space where seniors teach youth about heirloom agriculture and sustainable
    practices. Finally, she plans to master digital photography to chronicle cultural festivals and share them online, preserving local heritage for future generations.
