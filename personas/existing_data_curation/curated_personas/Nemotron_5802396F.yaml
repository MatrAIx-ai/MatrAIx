personas:
  professional: Amarilis Ortiz, a retired classroom teacher with three decades of experience designing bilingual curricula, now mentors new teachers and adults while channeling her practical curiosity into
    community garden projects and cultural events.
  sports: Amarilis Ortiz enjoys leisurely walks along the San Joaquin River trail, cheers for the Sacramento Kings basketball team, and participates in community folklorico dance rehearsals, blending low‑impact
    fitness with cultural movement.
  arts: Amarilis Ortiz reads historical fiction by Ken Follett and delves into poetry by Octavio Paz, captures festival colors with her digital camera inspired by the work of Dorothea Lange, and attends
    local theater performances featuring classics like 'The Glass Menagerie.'
  travel: Amarilis Ortiz favors low‑key road trips to historic towns like Santa Fe and the coastal village of Carmel-by-the‑Sea, plans visits to national parks such as Yosemite for seasonal wildflower hikes,
    and enjoys spontaneous weekend getaways when her garden duties allow.
  culinary: Amarilis Ortiz prepares traditional mole, pozole, and tamales with a twist—adding heirloom tomatoes, smoked jalapeños, and local honey—while expertly knitting fresh salsa verde from garden‑grown
    peppers and coriander, and she loves sampling tamale fillings at community potlucks.
  core: Amarilis Ortiz blends a lifelong love of teaching with a spontaneous curiosity for gardening, cooking, and cultural storytelling, all while challenging aging with competitive chess, dance, and a
    dash of skeptical optimism.
background:
  cultural: Amarilis was born to Mexican immigrant parents who settled in the Central Valley during the 1950s, and she grew up bilingual in Spanish and English. Her upbringing was steeped in Mexican traditions—celebrating
    Día de los Muertos, Las Posadas, and major Catholic holidays—with family gatherings centered around shared meals and storytelling. The agricultural landscape of Merced, dominated by fields of citrus
    and grapes, shaped her appreciation for the land and community solidarity among farmworker families. She carries forward the value of respeto (respect) and trabajo duro (hard work), which inform her
    teaching philosophy and community involvement. While proudly preserving her heritage, she also embraces the multicultural tapestry of Merced, participating in local festivals that blend Mexican, Latino,
    and broader Californian cultures.
