personas:
  professional: Leslie Folkes, a retired household manager and longtime community volunteer, channels their expertise in cooking, preservation, sewing, and basic home repairs into gardening for the church
    pantry, teaching quilting classes, and sharing Appalachian oral histories at the Sevier County heritage museum.
  sports: Leslie Folkes enjoys gentle walks along the Great Smoky Mountains trails with the Sevier County senior walking club, cheers on the Tennessee Volunteers college football team, and occasionally
    attends a Nashville Predators hockey game with grandchildren, preferring low‑intensity, community‑oriented athletic activities.
  arts: Leslie Folkes finds solace listening to bluegrass legends like Bill Monroe and gospel singers such as Mahalia Jackson, regularly watches classic westerns starring John Wayne and black‑and‑white
    films from the 1930s, and expresses creativity through Appalachian‑inspired quilting patterns and occasional craft fairs.
  travel: Leslie Folkes prefers short, well‑planned road trips to nearby heritage sites, having visited the Blue Ridge Parkway, historic Asheville, and the Cherokee Indian Reservation, while dreaming of
    a pilgrimage to Williamsburg’s colonial reenactments to deepen their genealogy research.
  culinary: Leslie Folkes masters Southern staples—fried catfish with hush‑puppy cornmeal batter, buttery cornbread, peach cobbler, and a signature heirloom tomato jam—while skillfully canning pickles,
    preserving summer harvests in mason jars, and using a cast‑iron wood stove for low‑temperature cooking.
  core: Leslie Folkes is a routine‑loving, garden‑tending, quilt‑making, community‑focused elder whose gentle mediation and love of Southern flavors keep them rooted in heritage while occasionally misplacing
    a bill or forgetting a pill.
background:
  cultural: Leslie was born and raised in Sevierville, Tennessee, deep in the foothills of the Great Smoky Mountains. She belongs to a longstanding white Appalachian community whose ancestors were early
    20th‑century settlers and small‑scale farmers. Her upbringing was shaped by a conservative evangelical Protestant tradition, with weekly church attendance and strong emphasis on hospitality, self‑reliance,
    and respect for tradition. Local customs such as harvest festivals, church bake‑sales, and craft fairs have reinforced her values of modesty, community service, and the preservation of Southern Appalachian
    music, cuisine, and folk crafts. These cultural influences are evident in her everyday life, from the recipes she prepares to the quilting patterns she creates.
