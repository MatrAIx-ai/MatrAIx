  hobbies: '[''gardening'', ''knitting'', ''quilting'', ''reading Appalachian historical fiction'', ''listening to bluegrass and gospel music'', ''attending church potlucks'', ''bird‑watching'', ''light
    hiking in the Great Smoky Mountains'', ''genealogy research'', ''watching classic films'']'
  career_goals: Although retired from formal work, Leslie’s personal ambitions focus on staying healthy and independent while deepening her contribution to her community. She hopes to preserve her family’s
    culinary heritage by compiling a handwritten cookbook of cherished recipes. She aims to teach her grandchildren and great‑grandchildren her cooking, sewing, and quilting skills. Leslie also dreams of
    volunteering at the local Sevier County heritage museum, sharing oral histories of the area’s Appalachian past. Maintaining her garden for the church food pantry and participating in small‑group church
    activities remain important aspirations, as does continuing her role as a gentle mediator within her family and community.
