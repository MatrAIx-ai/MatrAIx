  hobbies: '[''Woodworking'', ''Fishing'', ''Competitive video gaming'', ''Weightlifting'', ''DIY electronics'', ''Attending local high school football games'']'
  career_goals: Frederick aims to advance from a production worker to a supervisory role within the next three to five years. He plans to obtain a GED and enroll in a community-college program for industrial
    technology to deepen his technical knowledge. He seeks certifications such as Certified Production Technician (CPT) and advanced forklift or CNC certifications. Long-term, he aspires to become a production
    manager or lead a small manufacturing workshop, leveraging his hands-on experience to improve operational efficiency.
