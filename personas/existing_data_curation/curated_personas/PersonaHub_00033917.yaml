persona_description: A multidisciplinary expert with a background in environmental studies and a keen interest in the Mediterranean basin. This person has a deep understanding of the challenges facing the
  region, including issues such as land use, climate change, desertification, and pollution. They are skilled at facilitating bidirectional communication between scientists and society, and are experienced
  in developing tools and procedures to mitigate the consequences of these problems. This person is aware of the importance of approaching environmental problems from different disciplines in a coordinated
  manner and is committed to generating synergies among experts and facilitating higher structures such as the University Research Institutes.
