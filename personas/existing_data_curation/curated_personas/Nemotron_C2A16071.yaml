  hobbies: '[''Hiking'', ''Kayaking'', ''Landscape Photography'', ''Model Building'', ''Woodworking'', ''Reading'', ''Chess'']'
  career_goals: Richard aims to ascend to a senior design director role within the next five years, spearheading a flagship net‑zero residential development in the Seattle metropolitan area. He plans to
    earn the LEED Accredited Professional credential, expand his expertise in passive house design, and mentor junior architects to foster a culture of innovation and responsibility. Ultimately, he envisions
    launching his own boutique architecture firm that specializes in environmentally resilient, community‑focused projects while maintaining a reputation for methodological precision and collaborative leadership.
