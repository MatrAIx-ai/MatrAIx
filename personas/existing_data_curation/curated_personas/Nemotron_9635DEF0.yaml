  career_goals: Though not currently employed, Dua is driven to channel her expertise into meaningful impact. She aims to establish a mentorship program for underrepresented youth in STEM within the Fairfax
    community, fostering confidence and technical skills. She aspires to author a guidebook for women pursuing mid‑career transitions into technology, sharing practical strategies and personal narratives.
    Continuing her personal growth, she plans to deepen her knowledge of emerging fields such as artificial intelligence and data science through online coursework. Dua also seeks to take on leadership
    roles in local cultural and educational nonprofits, organizing STEM outreach events and serving as a judge for regional science fairs.
