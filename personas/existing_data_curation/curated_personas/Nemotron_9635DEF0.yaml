personas:
  professional: Dua Nehaul, a data‑driven engineer specializing in statistical modeling and technical writing, channels their methodical planning, competitive drive, and healthy skepticism into delivering
    rigorous research projects while mentoring emerging STEM talent.
  sports: Dua Nehaul stays active through weekly hikes on Shenandoah trails, yoga sessions at a local studio, and membership in the Fairfax Trail Runners club, while avidly cheering for the Washington Capitals,
    Washington Nationals, and DC United, and competing in bridge tournaments at the Fairfax Library.
  arts: Dua Nehaul cultivates artistic expression through nature photography inspired by Ansel Adams, frequent attendance at performances by the Washington National Opera, and reading works by Ken Follett
    and Malala Yousafzai, allowing the blend of visual and literary arts to shape their creative outlook.
  travel: Dua Nehaul prefers thoughtfully planned trips that balance cultural immersion with photography opportunities, having explored Kyoto’s gardens, Barcelona’s historic quarters, and hiking the Icelandic
    highlands, while often returning to nearby Washington, D.C. museums for weekend getaways.
  culinary: Dua Nehaul excels in cooking, skillfully reimagining a classic spiced rice and lentil stew with cumin, coriander, and turmeric, pairing it with fresh heirloom tomato salads tossed with basil
    and goat cheese, and occasionally indulging in grilled salmon with lemon‑dill sauce, reflecting both culinary tradition and experimental flair.
  core: Dua Nehaul fuses analytical precision with garden‑grown inspiration, juggling data models by day and experimental recipes by night, all while keeping a skeptical eye on shortcuts.
background:
  cultural: Dua’s cultural identity is rooted in her South Asian heritage, with family origins tracing back to the Indian diaspora in the Caribbean. Growing up in a household that honored both Indian customs
    and Caribbean influences, she celebrates festivals such as Diwali and Holi with vibrant rituals, music, and communal feasts. Fluent in English and conversational in Hindi, she maintains a strong connection
    to her linguistic roots through occasional language practice and cultural events. Since settling in Fairfax, Virginia, Dua has integrated into the local Indian-American community, regularly attending
    gatherings at the Washington DC Indian Association and contributing to cultural programs that showcase South Asian art, dance, and cuisine. Her upbringing emphasized education, family cohesion, and
    hospitality, values she continues to embody in her mentorship and community involvement.
