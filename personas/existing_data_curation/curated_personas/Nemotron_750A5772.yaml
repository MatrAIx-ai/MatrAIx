  career_goals: Even at 81, Terrence’s chief ambition is to remain physically and mentally active, preserve his independence, and continue being a reliable partner to his wife. He aims to document his life
    story and the oral histories of Long Beach’s Black community for the local historical society, mentor his grandchildren and neighborhood youth, keep his home in top condition, and perhaps master a new
    digital hobby like participating in online genealogy forums.
