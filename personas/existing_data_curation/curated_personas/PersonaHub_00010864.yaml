persona_description: A scientist studying fish behavior and ecology, particularly focusing on the effects of predation on fish behavior. The individual is interested in understanding the relationship between
  habitat use and space use in fish populations, and how changes in predation risk can alter the behavior and habitat use of fish. They are likely to be familiar with the use of radio-telemetry to track
  fish movements and behavior, and have experience with statistical analysis to interpret the data. They may have a background in zoology or ecology, and may be interested in applying their research to
  real-world conservation efforts.
