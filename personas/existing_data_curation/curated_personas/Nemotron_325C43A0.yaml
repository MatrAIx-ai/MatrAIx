  hobbies: '["Cooking traditional Vietnamese dishes", "Reading contemporary fiction", "Sketching watercolor landscapes", "Walking in Oswego''s lakeside parks", "Listening to lo‑fi beats", "Practicing mindfulness
    meditation", "Volunteering at local food bank", "Learning basic guitar chords"]'
  career_goals: Thao aims to obtain a Certified Food Safety Manager credential within the next two years, which will allow her to oversee quality control in a larger processing facility. She dreams of eventually
    opening a modest boutique butcher shop in Oswego that highlights sustainable sourcing and offers specialty cuts inspired by Vietnamese culinary traditions. To achieve this, she plans to enroll in part‑time
    culinary courses focused on meat science and ethnic cuisine, while also building a network of local farmers and community members who value fresh, responsibly sourced food. Her long‑term ambition includes
    offering workshops on safe meat handling and nutrition for the surrounding community, merging her practical skills with her strong desire to help others and foster harmony.
