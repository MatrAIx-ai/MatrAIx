personas:
  professional: Thao Nguyen, a 20‑year‑old apprentice butcher, combines precise knife work and strict food‑safety routines with a compassionate, adaptable approach that keeps the shop calm even during rushes,
    though they sometimes struggle to stick to rigid schedules.
  sports: Thao Nguyen stays fit by jogging along the Lake Ontario shoreline and joining a community walking club, cheerfully supporting the Buffalo Bills in the fall and the Buffalo Sabres during winter,
    while preferring solitary exercise over team sports.
  arts: Thao Nguyen unwinds sketching watercolor lake vistas inspired by Monet while listening to lo‑fi beats from Nujabes and losing themselves in contemporary novels like "The Night Circus" and poetry
    collections by Rupi Kaur.
  travel: Thao Nguyen prefers low‑key, spontaneous getaways, often planning weekend drives to the Finger Lakes or the Adirondack trails, while dreaming of a culinary tour of Osaka’s market in Japan and
    a relaxed summer break on the beaches of the Bahamas.
  culinary: Thao Nguyen experiments in their modest kitchen, mastering the intricate balance of fragrant pho broth, crisp banh xeo pancakes, and locally sourced pork cuts, while blending Southeast Asian
    aromatics with Mid‑Atlantic herbs like rosemary and thyme.
  core: Thao Nguyen is a curious yet restless 20‑year‑old butcher who finds peace in watercolor sketches and mindful breathing, but often lets worry hijack their focus, leading to occasional impulse gadget
    buys and missed deadlines.
background:
  cultural: Thao is a second‑generation Vietnamese‑American. Her parents immigrated to the United States before she was born, bringing with them a strong sense of community, respect for elders, and a love
    of shared meals. Growing up in a bilingual household, she learned to speak both Vietnamese and English fluently, which informs her interpersonal style and her appreciation for cultural diversity. While
    she embraces the practical values of her American upbringing—such as independence and adaptability—she also honors Vietnamese traditions, especially those centered around family gatherings, food preparation,
    and harmony. Living in Oswego, NY, she blends these cultural influences by participating in local cultural festivals, supporting community initiatives, and infusing her cooking with both Southeast Asian
    and Mid‑Atlantic flavors.
