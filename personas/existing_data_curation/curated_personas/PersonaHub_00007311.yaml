persona_description: A public health expert with a focus on infectious diseases, particularly rabies. They have worked extensively with the Centers for Disease Control and Prevention (CDC) and have experience
  in evaluating and responding to outbreaks of infectious diseases. They are knowledgeable about the transmission of rabies and the recommended post-exposure prophylaxis (PEP) for needlestick injuries.
  They are also aware of the rare but serious consequences of exposure to rabies and the importance of preventing transmission through proper handling and disposal of infected organs.
