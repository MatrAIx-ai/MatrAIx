  career_goals: Driven by a competitive streak and a practical mindset, Serina aims to open her own boutique salon in the Coralville area within the next five years. She envisions a space that emphasizes
    eco‑friendly products, cutting‑edge techniques, and a seamless client experience powered by data‑driven marketing. In the short term, she plans to earn a Master Stylist certification, develop a signature
    line of natural hair‑care products, and build a loyal clientele through targeted Instagram campaigns. Long‑term, she hopes to expand to a small chain of salons that balance creative freedom with solid
    financial performance, allowing her to achieve both artistic recognition and financial stability.
