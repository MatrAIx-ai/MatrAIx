personas:
  professional: Serina Thomas, a budding boutique‑salon entrepreneur and master‑stylist‑in‑training, blends a business degree with razor‑sharp precision hair‑cutting and advanced coloring techniques to
    craft data‑driven Instagram campaigns, while obsessively double‑checking inventory spreadsheets and pricing models—a habit fueled by their competitive streak and underlying worry about financial stability.
  sports: Serina Thomas, an avid weekend hiker with the Coralville Trailblazers club who also joins indoor spin classes during winter, roots for the Iowa Hawkeyes football team and follows the Minnesota
    Twins in baseball, treating fitness as a stress‑relief outlet that satisfies their competitive nature while honoring their love for the outdoors.
  arts: Serina Thomas, who curates an Instagram feed of hair‑styling photography inspired by Alexander McQueen’s bold palettes and Greta Gerwig’s cinematic lighting, finds artistic refuge listening to Florence + the Machine
    while sketching new balayage concepts during downtime.
  travel: Serina Thomas, a meticulous planner who balances a modest travel budget with a craving for inspiration, has trekked the Great Lakes shoreline and the Oregon Coast, and dreams of a spring study
    trip to Copenhagen’s sustainable design scene and a weekend in Kyoto to explore Japanese hair‑care traditions.
  culinary: Serina Thomas, a competent home cook who delights in hearty chicken‑and‑dumplings stews seasoned with fresh thyme and homemade sauerkraut, frequently experiments with DIY hair masks using coconut
    oil, honey, and rosemary, and treats themselves to brunches featuring avocado toast drizzled with chili‑infused olive oil.
  core: Serina Thomas, a fiercely competitive salon entrepreneur who obsessively jots business ideas on napkins while constantly checking product labels for hidden sulfates, balances ambition with a hidden
    tendency to over‑worry about every client’s satisfaction.
background:
  cultural: Serina grew up in a middle‑class white family in the suburban outskirts of Iowa City, where Midwestern values of hard work, modesty, and community involvement were emphasized. Her family’s cultural
    heritage includes German and Irish ancestry, reflected in family gatherings centered around hearty home‑cooked meals and seasonal celebrations. The local culture of Coralville—characterized by a blend
    of university‑driven openness and small‑town practicality—has shaped her pragmatic yet curious outlook, encouraging her to pursue both academic achievement and creative expression in the beauty industry.
