  career_goals: Marthalee aspires to move into a leadership role within wildlife rescue or animal‑shelter management, where she can leverage her business acumen to improve operational efficiency and increase
    fundraising capacity. Her short‑term goal is to become a program manager at a regional sanctuary, supervising staff, implementing mental‑health supports for caregivers, and introducing data‑driven decision
    making. Long‑term, she envisions founding a nonprofit sanctuary that operates on a sustainable business model, offering comprehensive rehabilitation services and community education programs. She also
    aims to earn professional certifications such as Certified Animal Caregiver and a specialized credential in animal behavior, positioning herself as a competitive candidate for senior management positions.
