  career_goals: Tania aims to formalize her expertise by earning a Certified Administrative Professional (CAP) credential and to transition into a senior administrative coordinator role within a nonprofit
    organization that serves the Wilmington community. She is passionate about mentoring younger staff, sharing best practices, and eventually offering part‑time consulting services to local small businesses
    and church groups to help them manage their administrative tasks efficiently. Volunteering remains a priority, and she hopes to expand her involvement in community outreach programs that support seniors
    and youth education.
