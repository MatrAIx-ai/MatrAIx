  hobbies: '[''Community theater'', ''Karaoke'', ''Organizing local meet-ups'', ''Volunteering at food bank'', ''Journaling'', ''Hiking'', ''Baking'']'
  career_goals: Nora intends to complete a bachelor's degree in psychology or social work, building on her current community college coursework. She aspires to become a mental‑health advocate and eventually
    a licensed therapist or school counselor, focusing on youth in rural Southern communities. She wants to design and lead programs that combine her love for structure with her passion for helping others,
    such as after‑school support groups and community wellness workshops. In the long term, she hopes to work for a nonprofit organization that provides mental‑health resources and crisis intervention services
    in Tennessee.
