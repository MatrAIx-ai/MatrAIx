  hobbies: '["Community Food Bank Volunteering","Church Choir","Bridge Club","Community Gardening","Southern Cooking","Zumba Classes","Historical Fiction Reading","Genealogy Research","Local Festival Attendance"]'
  career_goals: Kristina aims to move into a supervisory role within the next two years, targeting a shift‑lead or training‑coordinator position where she can mentor new hires and shape workflow processes.
    She plans to earn a Certified Supply Chain Professional (CSCP) credential and complete the remaining credits for a bachelor's degree in Business Administration through a local community college. Long‑term,
    she hopes to secure a stable, predictable schedule that allows her to volunteer more in her community and eventually start a small home‑based e‑commerce venture selling handcrafted home décor, leveraging
    her inventory knowledge. Financial security for retirement and the flexibility to enjoy her hobbies remain central to her ambitions.
