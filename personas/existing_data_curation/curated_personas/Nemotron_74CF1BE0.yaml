personas:
  professional: Elizabeth Martineau, a future social worker who will blend a practical, organized approach to case management with deep curiosity about innovative community interventions, leveraging their
    natural compassion to advocate for vulnerable families.
  sports: Elizabeth Martineau, whose parents are avid fans of the local baseball team the Chicago Cubs and members of a community mom‑and‑baby yoga group, participates in weekly baby‑gym classes that incorporate
    gentle stretching and assisted rolling, reflecting their energetic and sociable disposition.
  arts: Elizabeth Martineau, while still a newborn, finds comfort in soothing classical pieces like Beethoven’s Moonlight Sonata and in lullabies performed by the singer Sia, and her family frequently visits
    local soft‑play art spaces where illustrations by Mo Willems are projected onto pastel walls.
  travel: Elizabeth Martineau, after her first family road trip to the coastal lighthouse and armed with a mini‑suitcase of plush toys, dreams of future trips to the lavender fields of Provence and the
    snow‑capped peaks of the Swiss Alps, preferring leisurely itineraries that allow plenty of nap breaks and sensory discovery.
  culinary: Elizabeth Martineau, with a budding palate for smooth pureed carrots, sweet peas, and ripe avocado, enjoys family mealtime rituals that include homemade hummus made from chickpeas, tahini, and
    lemon, and the occasional bite of soft‑cooked quinoa with a hint of cumin.
  core: Elizabeth Martineau, a newborn whose boundless curiosity is balanced by a practical calm, radiates sociable energy, compassionate cooperation, and a tiny habit of falling asleep mid‑lullaby whenever
    a pacifier is misplaced.
background:
  cultural: Elizabeth is raised in a white, working‑class family in Erlanger, Kentucky, where Southern hospitality, community gatherings, and a blend of Midwestern values shape daily life. Her environment
    includes church‑based community events, family barbecues, high school football tailgates, and a love for country and folk music. These cultural threads provide a foundation of close family ties, respect
    for tradition, and an openness to the inclusive, cooperative spirit of her neighborhood.
