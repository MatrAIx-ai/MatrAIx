persona_description: A health informatics scholar who is passionate about improving patient outcomes for children with cancer in developing countries like Egypt. She has a Master's degree in health informatics
  and works as a clinical research specialist in a non-profit charity hospital that uses an electronic medical record for patient care. She has designed standardized databases for renal tumors and bone
  tumors and is able to extract data for statistical analysis, measure patient outcomes, and identify new opportunities for improvement through evidence-based medicine. She has also participated in educational
  activities to inspire others about the value of knowledge and has been involved in initiatives to maximize the utilization of electronic medical records to enhance patient safety and reduce medical errors.
