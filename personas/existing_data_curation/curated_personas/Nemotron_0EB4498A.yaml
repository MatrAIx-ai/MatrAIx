  hobbies: '[''LEGO building'', ''Reading (Magic Tree House series)'', ''Journaling'', ''Soccer'', ''Nature walks'', ''Caring for family dog'', ''Scratch programming'', ''Puzzle solving (jigsaw puzzles,
