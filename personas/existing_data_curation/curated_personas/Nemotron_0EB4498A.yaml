  career_goals: Kimberly dreams of one day working as a veterinarian, attracted by the predictable care routines and the chance to help animals stay healthy. She also envisions a future as a teacher or
    librarian, where she could create calm, organized learning environments and support other children in managing emotions. To reach these goals, she plans to pursue strong grades in science and reading,
    join school science clubs and volunteer at the local animal shelter, and continue building her skills in observation and empathy.
