personas:
  professional: Kimberly Dodson, a budding young engineer, channels a love for step‑by‑step LEGO builds and Scratch coding into designing simple interactive games, always striving for clear logic and reliable
    outcomes while proudly showcasing each completed project to family and friends.
  sports: Kimberly Dodson, a spirited member of the Eastside Cubs youth soccer team, spends Saturday afternoons sprinting in friendly tag games, idolizes the local professional soccer club the City FC,
    and balances competitive drills with her love for the calm of nature walks, which she treats as a personal cardio session.
  arts: Kimberly Dodson immerses herself in the "Magic Tree House" series, sketches scenes in her daily journal, enjoys listening to the upbeat pop tunes of Ariana Grande and the whimsical melodies of Disney
    soundtracks, and occasionally tries her hand at simple stop‑motion videos using her LEGO creations.
  travel: Kimberly Dodson prefers organized day trips with parents, such as weekend hikes in Redwood Park, visits to the nearby interactive science museum, and a family road‑trip to the beach town of Santa
    Cruz, while dreaming of a future vacation to Tokyo’s kid‑friendly robot museum.
  culinary: Kimberly Dodson loves comforting mac and cheese, chicken nuggets seasoned with mild paprika, and picking fresh strawberries for a fruit salad, eagerly helps whisk pancake batter on Sunday mornings,
    but often forgets to clean up the sticky syrup spills, much to her mom’s amusement.
  core: Kimberly Dodson is a detail‑loving nine‑year‑old who thrives on structured LEGO builds and Scratch projects, yet battles daily anxiety that pushes her toward occasional impulsive candy treats and
    forgetfulness about routine chores.
background:
  cultural: Kimberly grows up in Acton, a suburban town in Middlesex County, Massachusetts, known for its strong public schools, community focus, and New England values such as punctuality, civic responsibility,
    and a love of seasonal traditions. Her family follows mainstream American cultural practices—celebrating holidays like Thanksgiving and the Fourth of July—and participates in local events like the Acton
    Town Fair and library storytimes. The community emphasizes education, involvement in organized youth sports and clubs, and respect for rules, which resonates with Kimberly’s preference for structure
    and predictability. While her ethnic background is white, her cultural upbringing reflects a blend of Anglo‑American heritage and the inclusive, community‑oriented atmosphere of a modern New England
    suburb.
