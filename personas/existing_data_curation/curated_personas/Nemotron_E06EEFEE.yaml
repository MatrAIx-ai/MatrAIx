  hobbies: '[''Visiting art museums and galleries'', ''Painting watercolors'', ''Cooking South American cuisine'', ''Salsa dancing'', ''Reading contemporary fiction and educational literature'', ''Participating
    in book clubs'', ''Zumba and fitness classes'', ''Hiking'', ''Volunteering for community cultural festivals'', ''Photography'']'
  career_goals: Maria aims to advance to a senior administrative leadership role, such as office manager or operations coordinator, within an organization that values cultural programming and education.
    She plans to obtain a Certified Administrative Professional (CAP) credential and deepen her expertise in project management. Over the next five years, she hopes to lead larger community-based arts initiatives,
    mentor a team of administrative staff, and design professional development programs that integrate her passion for education and the arts. Ultimately, she envisions a semi-retired phase where she can
    devote more time to coordinating local cultural events and volunteering as a program director for a nonprofit art center.
