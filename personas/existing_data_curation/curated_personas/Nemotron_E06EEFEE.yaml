personas:
  professional: An accomplished administrative professional, Maria Mendez combines bilingual fluency, expert-level proficiency in Microsoft Office, Google Workspace, and CRM systems, and a disciplined project‑management
    approach to orchestrate large‑scale cultural arts events while mentoring staff, positioning herself for a senior operations role within an education‑focused nonprofit.
  sports: Enthusiastic about movement, Maria Mendez attends thrice‑weekly Zumba classes, tackles weekend hikes in Patapsco Valley State Park, and avidly supports the Baltimore Orioles and Ravens, while
    also participating in a local senior walking club that meets at the Inner Harbor.
  arts: Deeply immersed in Baltimore’s cultural pulse, Maria Mendez frequents the Baltimore Museum of Art, the American Visionary Art Museum, and the Hippodrome Theatre, paints watercolors inspired by Georgia
    O'Keeffe, and joins salsa nights where she interprets the rhythms of traditional Latin dance, all while engaging in community art workshops led by local muralists.
  travel: Avid traveler with a taste for artistic immersion, Maria Mendez has explored the colonial streets of Cartagena, the vibrant murals of Valparaíso, and the historic neighborhoods of Savannah, but
    plans her next adventure to Oaxaca to study indigenous culinary traditions, balancing careful budgeting with a desire for meaningful cultural encounters.
  culinary: An adventurous home chef, Maria Mendez delights in crafting traditional South American dishes such as empanadas de carne, ají de gallina, and quinoa‑filled tamales, often seasoning with aji
    amarillo, fresh cilantro, and smoked paprika, while her watercolor hobby sees her sketching recipes, and she occasionally over‑spices a batch, prompting laughter at family dinners.
  core: Maria Mendez, a 57‑year‑old bilingual administrator, merges razor‑sharp organization with a love for watercolor, salsa, and disciplined investing, all while juggling a modest habit of collecting
    receipt piles and an occasional habit of binge‑watching mystery series into the late night.
background:
  cultural: Maria was born in a small town in the Andean region of Peru and grew up in a bilingual, Catholic household where family gatherings centered around shared meals, music, and storytelling. Her
    upbringing emphasized respect for tradition, communal responsibility, and a deep appreciation for folk arts such as música criolla, weaving, and cuisine. After moving to the United States in her early
    thirties, she settled in Reisterstown, MD, where she has blended her South American heritage with Mid-Atlantic cultural influences. She participates in local Latino festivals, maintains close ties with
    the Peruvian diaspora, and incorporates her cultural perspective into her work, bringing an inclusive and multicultural lens to office communications and community outreach.
attributes:
  skills: '[''Office administration'', ''Calendar management'', ''Document preparation'', ''Bilingual communication (Spanish/English)'', ''Microsoft Office Suite'', ''Google Workspace'', ''CRM software
