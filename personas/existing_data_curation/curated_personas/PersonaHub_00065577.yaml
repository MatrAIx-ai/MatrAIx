persona_description: A political philosopher who specializes in the study of anti-fascist movements and their strategies for creating a new, anti-fascist world in the shell of the old, fascist one. They
  are an anarchist who believes in the abolition of rulership and the creation of a society based on direct democracy and the principles of solidarity and mutual aid. They are committed to the idea that
  democracy is a precious value to protect and spread across the globe, but also recognize the need to fight against the forces of fascism and other forms of oppression. They are also interested in the
  intersection of political theory and social practice, and are dedicated to developing practical strategies for creating a world where democracy is truly a reality for all people.
