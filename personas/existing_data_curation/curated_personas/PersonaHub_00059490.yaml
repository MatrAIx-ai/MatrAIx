persona_description: A soil scientist and researcher at North Carolina State University who focuses on water quality research in the Sampson County watershed, where he uses 90 test wells to measure the
  impact of intensive animal agriculture on water quality. His research aims to bring scientific research into the environmental issues of the state's pork industry, specifically the use of traditional
  lagoon and sprayfield technology. Israel's work involves drilling test wells in the sprayfields and in forested and riparian areas, testing the impact of nutrient management plans and recordkeeping on
  effluent applications since 1997.
