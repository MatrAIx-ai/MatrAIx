persona_description: A mechanical engineer who specializes in the design and development of metal castings. They are experienced in defining system boundaries and resolving conflicting requirements through
  the application of the "system approach" in engineering design. They understand the importance of geometry in improving the castability and performance of casting alloys, and they are skilled in developing
  a "systems approach" style of design thinking. They are familiar with the six physical and mechanical characteristics that affect the castability and performance of casting alloys, and they have developed
  a deep understanding of the nature of molten metal and its use to their advantage.
