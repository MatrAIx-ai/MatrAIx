personas:
  professional: Carlos Pauneto is a bilingual occupational therapist who combines meticulous, evidence‑based assessment skills with a charismatic, competitive drive, leading structured group sessions for
    Spanish‑speaking patients while constantly tracking outcomes to stay ahead of peers.
  sports: Carlos Pauneto plays midfield for the Tucson Soccer Club's weekend league, cheers fervently for the US men’s national team and LAFC while maintaining his fitness by hiking the Saguaro National
    Park trails each Saturday, treating every session as both competition and stress relief.
  arts: Carlos Pauneto curates community cultural festivals featuring mariachi bands like Mariachi Los Camperos, enjoys listening to Carlos Santana and Lila Downs, and unwinds by solving Sudoku puzzles
    while binge‑watching films by Alejandro González Iñárritu.
  travel: Carlos Pauneto meticulously plans road trips to desert hideaways such as Sedona and Santa Fe, dreams of exploring Oaxaca’s historic markets, and balances his wanderlust with a tight budget that
    prioritizes family‑friendly destinations over spontaneous overseas flights.
  culinary: Carlos Pauneto’s culinary hobby centers on perfecting mole poblano, tamales de elote, and roasted chiles rellenos, blending traditional chilies, cacao, and fresh cilantro, while occasionally
    experimenting with quinoa‑infused tacos and never missing an opportunity to showcase his creations at community gatherings.
  core: Carlos Pauneto is a structure‑obsessed, sociable therapist who channels competitive energy into community events, balances anxiety with meditation, and never says no to a puzzle or a plate of mole.
background:
  cultural: Carlos is a second‑generation Mexican American raised in Tucson, where his family maintains strong ties to Mexican traditions while embracing the Southwest's multicultural vibe. He grew up speaking
    both Spanish and English, celebrating holidays like Día de los Muertos and quinceañeras with a blend of cultural rituals and local customs. This bicultural upbringing fuels his commitment to serve Spanish‑speaking
    patients and to incorporate culturally resonant practices—such as family‑centered goal setting and traditional health beliefs—into his occupational therapy work. His identity is shaped by a deep respect
    for family, community solidarity, and the vibrant Mexican heritage that enriches his daily life.
attributes:
  skills: '["Bilingual Spanish-English communication", "Functional assessment of ADLs", "Individualized treatment planning", "Adaptive equipment selection and training", "Assistive technology integration",
    "Group therapy facilitation", "Interdisciplinary care coordination", "Detailed clinical documentation", "Patient education on self‑management", "Outcome‑focused performance tracking"]'
  hobbies: '["Community event planning and hosting", "Soccer (player and team organizer)", "Cooking traditional Mexican cuisine", "Guided meditation and stress‑management journaling", "Sudoku and logic
    puzzles", "Hiking desert trails in Arizona"]'
  career_goals: Carlos aims to obtain his Bachelor of Science in Occupational Therapy and achieve full licensure within the next two years, positioning himself for a senior therapist role at a regional
    hospital. He aspires to specialize in neurorehabilitation for Spanish‑speaking populations, develop culturally tailored intervention protocols, and eventually lead a community‑based clinic that serves
    underserved Mexican‑American families in Tucson. Long‑term, he envisions publishing research on culturally competent occupational therapy practices and mentoring new therapists, leveraging his competitive
    drive to become a recognized leader in the field.
