  hobbies: '[''Sculptural wood carving'', ''Abstract painting'', ''Sketching'', ''Reading speculative fiction'', ''Garden design'', ''Hiking'', ''Puzzle solving'', ''Community theater set building'', ''Attending
    craft fairs'', ''Blogging about carpentry'']'
  career_goals: At 61, Stephanie aims to open a boutique studio that produces limited‑edition, art‑inspired furniture pieces and to curate a traveling exhibition of her work across Midwest galleries. She
    plans to author a book that documents her inventive carpentry techniques, earn a Green Building certification to deepen her sustainable practices, and transition to part‑time teaching at the local community
    college. Additionally, she hopes to lead a mentorship program for emerging woodworkers and contribute her skills to community revitalization projects, such as restoring historic barns.
