personas:
  professional: A master carpenter, Stephanie Hundley, blends advanced wood joinery, SketchUp and AutoCAD design, and sustainable timber sourcing into limited‑edition, art‑inspired furniture, while they
    navigate a spontaneous, deadline‑defying workflow that demands improvisational problem‑solving and a critical eye for detail.
  sports: An avid hiker, Stephanie Hundley spends Saturdays exploring the rolling Indiana countryside, follows the Indianapolis Colts and Indiana Pacers from their porch, participates in a local gardening
    club’s cardio walks, and they prefer informal outdoor activity over structured gym sessions.
  arts: A dedicated creator, Stephanie Hundley immerses themselves in abstract painting, sculptural wood carving, and speculative fiction by authors like Octavia Butler, they draw inspiration from artists
    such as Anselm Kiefer, Yayoi Kusama, and sculptor Magdalena Abakanowicz, and they regularly attend the Indianapolis Museum of Art's contemporary exhibitions and regional craft fairs.
  travel: A curious explorer, Stephanie Hundley favors road trips to Midwest craft fairs in Cleveland and Milwaukee, occasional pilgrimages to Asheville’s woodworking guilds, and they dream of a timber‑forest
    tour in British Columbia, balancing spontaneous detours with a modest travel budget and a well‑worn notebook of sketch ideas.
  culinary: A garden‑to‑table enthusiast, Stephanie Hundley delights in cooking roasted heirloom tomatoes with fresh basil, hand‑made rosemary focaccia, and seasonal beet‑goat cheese salads, they rely on
    home‑grown herbs, locally sourced honey, and a modest skill set that ranges from confident wood‑fire grilling to experimental plating.
  core: Stephanie Hundley, 61, is a visionary master carpenter whose boundless imagination fuels artful furniture design, they channel a spontaneous streak that often creates chaos in deadlines and finances.
background:
  cultural: Stephanie is a White Midwestern American raised in rural Indiana, with family roots tracing back to German‑American farming and craft traditions. Her upbringing in Owensville instilled values
    of self‑reliance, practicality, and community involvement. She grew up amid the agricultural heritage and nearby Amish woodworking influences, fostering an appreciation for folk art, barn‑raising customs,
    and a growing commitment to sustainable, eco‑conscious living.
