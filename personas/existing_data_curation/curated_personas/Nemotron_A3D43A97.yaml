personas:
  professional: A future engineer in the making, Graciela Acosta, at one year old, methodically arranges shape-sorter blocks by size and explores tactile toys with keen curiosity, merging reliability with
    an open mindset that hints at a career built on systematic problem-solving.
  sports: An energetic little mover, Graciela Acosta delights in crawling obstacle courses at the community toddler gym and clapping along to Los Angeles Lakers game highlights on TV, while occasionally
    being strapped into a stroller for family outings to watch the Chicago Cubs in the summer, embodying a playful approach to fitness through everyday exploration rather than organized sport.
  arts: An emerging art aficionado, Graciela Acosta lights up at the vibrant patterns of Yayoi Kusama’s polka-dot installations, sways to the gentle lullabies of Brahms and the cheerful tunes of Raffi,
    and giggles at the whimsical antics of Sesame Street’s Elmo, allowing these sensory experiences to shape their early sense of rhythm and color.
  travel: A stroller-friendly explorer, Graciela Acosta enjoys short family road trips to the nearby botanical garden, magical visits to Disneyland in Anaheim for character meet-ups, and dreams of a future
    vacation to the gentle beaches of Maui, preferring relaxed schedules with nap times built in and parental guidance.
  culinary: A budding food lover, Graciela Acosta prefers smooth sweet potato purée, tiny avocado cubes, and soft banana mash, shows an early knack for stirring their spoon in oatmeal, and delights in tasting
    the subtle sweetness of apple sauce spiced with cinnamon, while shyly refusing overly crunchy carrots.
  core: Graciela Acosta, a one-year-old with a curious mind, methodical play style, and a penchant for bright piggy-bank coins, blends the wonder of toddler discovery with an unexpected early flair for
    organized problem-solving, and they often treat stacking blocks as miniature engineering projects.
background:
  cultural: Graciela grew up in a Dominican household that celebrated vibrant music, dance, and food traditions. Her family immigrated to the United States when she was a child, and she was raised in Indianola,
    Iowa, where she blends her Caribbean heritage with Midwestern values. She participates in local Dominican festivals, maintains strong ties to the diaspora community, and preserves cultural practices
    such as preparing holiday dishes, storytelling, and celebrating Dominican holidays. This bicultural experience shapes her worldview, fostering a deep appreciation for cultural diversity and community
    involvement.
