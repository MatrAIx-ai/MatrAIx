  career_goals: Graciela aims to earn her GED within the next year, which will open pathways to formal employment. She aspires to work part‑time at the local community center as a bilingual outreach aide,
    helping recent immigrants navigate services and promoting cultural events. In the longer term, she hopes to launch a home‑based catering business offering authentic Dominican cuisine at festivals and
    private gatherings, leveraging her culinary talent and organizational strengths. She also wants to continue her art studies, eventually exhibiting her watercolor work in a regional gallery.
