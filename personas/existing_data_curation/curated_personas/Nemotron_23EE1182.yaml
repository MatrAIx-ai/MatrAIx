personas:
  professional: Derrick Greaux is a civil engineering technician and emerging design specialist who applies AutoCAD Civil 3D, Revit, and GIS expertise with methodical precision, while they channel their
    intense emotional reactivity into meticulous risk assessments and a calm, solitary approach to complex project planning.
  sports: Derrick Greaux stays fit through solitary hikes with the Flint Hills Hiking Club and weekend trail runs, and they follow the Kansas City Chiefs, Kansas State Wildcats football, and Kansas City
    Royals baseball, while occasionally joining a local pickup soccer game in the summer to break up the solitary routine.
  arts: Derrick Greaux finds artistic solace in the folk melodies of John Denver and The Tallest Man on Earth, the classical piano works of Beethoven, the American Regionalist paintings of Grant Wood, and
    they attend occasional community theater productions at the town playhouse, which together provide a quiet cultural counterpoint to their technical world.
  travel: Derrick Greaux prefers meticulously planned solo trips that blend nature hikes with professional curiosity, having trekked the Rocky Mountains in Colorado and explored the historic river towns
    of Missouri, and they dream of a sustainable-design tour of the Netherlands and a quiet cabin retreat in the Canadian Rockies.
  culinary: Derrick Greaux enjoys cooking hearty Midwestern fare, mastering Kansas-style burnt ends, corn chowder with heirloom tomatoes, and grilled trout brushed with lemon-herb butter, favoring fresh
    local corn, sweet potatoes, and wild rosemary, and they occasionally treat themselves to a craft beer at the local brewpub after a long hike.
  core: Derrick Greaux is a methodical, curiosity-driven civil engineer who balances intense emotional reactivity with solitary hikes, meticulous budgeting, and a quiet love for bridge-building kits, yet
    they sometimes over-analyze both work and life.
background:
  cultural: Derrick grew up in Garden Plain, a close‑knit community in Sedgwick County, Kansas. The Midwestern work ethic, emphasis on self‑reliance, and strong community ties have shaped his practical
    and organized outlook. Family gatherings often centered around county fairs, high‑school football games, and volunteer projects, reinforcing a sense of responsibility toward local infrastructure and
    safety. While his heritage is predominantly white, his upbringing in a diverse agricultural region exposed him to a range of perspectives on land stewardship and communal problem‑solving, which he carries
    into his engineering practice and personal life.
attributes:
  skills: '["AutoCAD Civil 3D","Revit","GIS mapping","Structural calculations","Cost estimating","Project scheduling","Risk assessment","Technical report writing","Surveying basics","Construction quality
    control"]'
  hobbies: '["Hiking in the Flint Hills","Model bridge building","Reading technical journals","Reading rural history books","Small‑group library discussions","Volunteering with flood‑prep committee"]'
  career_goals: Derrick aims to become a licensed professional engineer within the next five years, focusing on designing resilient rural infrastructure that supports his Kansas community. He is particularly
    interested in integrating green stormwater management and low‑impact development techniques into highway and drainage projects. Over the long term, he hopes to lead a multidisciplinary team that balances
    innovative engineering solutions with the practical constraints of small‑town budgets. He also aspires to mentor junior engineers, using his organized approach to help them develop both technical competence
    and coping strategies for workplace stress.
