personas:
  professional: Diane James, a 30‑year‑old investigative specialist, leverages analytical rigor and hands‑on fieldwork—combining financial forensics, discreet surveillance, and skilled interviewing—to produce
    clear reports, while their curiosity, practical organization, and outgoing nature help them build trust with clients and navigate complex white‑collar cases.
  sports: Diane James tackles fitness with a mix of weekend hikes through the Wasatch foothills, weekly yoga and HIIT classes at the downtown gym, and occasional pick‑up volleyball with the local Wasatch
    Hiking Society, while cheering on the Utah Jazz and Real Salt Lake as their favorite professional sports teams.
  arts: Diane James blends a love for community theater—often starring in productions of Neil Simon comedies—with a keen eye for photography inspired by Ansel Adams, enjoys puzzling over Agatha Christie
    novels in a mystery book club, and relaxes to the indie sounds of The National and the lyrical storytelling of Lin‑Manuel Miranda’s Hamilton.
  travel: Diane James prefers active, photography‑focused getaways, planning meticulously for weekend hikes in Zion and Yellowstone, savoring the alpine slopes of Park City in winter, while day‑dreaming
    about a future European tour of financial hubs like London and Zurich to blend professional curiosity with cultural immersion.
  culinary: Diane James enjoys preparing nutrient‑rich meals such as quinoa‑pistachio salads with roasted salmon and kale, perfecting homemade trail granola bars, and occasionally indulging in Utah‑style
    fry sauce‑topped burgers at local gastropubs, while their moderate cooking skill is bolstered by weekly farmer’s‑market trips and a penchant for craft coffee.
  core: Diane James balances a relentless investigative curiosity with a love for social adventure, yet sometimes overbooks their calendar with networking events and escape‑room challenges, leading to occasional
    burnout that they combat with yoga and a strict caffeine limit.
background:
  cultural: Diane grew up in a middle‑class white family in Utah, where a strong sense of community, self‑reliance, and an appreciation for the outdoors were woven into daily life. Her upbringing emphasized
    practical education and the value of contributing to the greater good, shaping her collaborative and harmonious outlook. While she respects the region's cultural traditions, including the emphasis on
    volunteerism and neighborly support, she also brings a contemporary, business‑oriented perspective to her professional and personal endeavors.
attributes:
  skills: '["Surveillance techniques","Interviewing and interrogation","Financial forensics","Digital evidence analysis","Case management","Business strategy and analysis","Negotiation","Conflict resolution","Networking
    and community liaison","Report writing","Critical thinking","Physical self‑defense (Krav Maga)"]'
  hobbies: '["Hiking local trails","Photography","Yoga","Community theater acting","Mystery book club","Escape room challenges","Volunteering at animal shelters","Social networking events"]'
  career_goals: Diane aims to establish her own boutique investigative agency in Ogden, focusing on white‑collar and cyber‑related crimes where her business background offers a distinctive edge. She aspires
    to become a recognized authority in financial crime investigation, publish case studies, and develop training workshops for emerging detectives. Long‑term, she envisions mentoring young professionals,
    contributing to statewide law‑enforcement advisory boards, and potentially teaching investigative techniques at a local community college.
