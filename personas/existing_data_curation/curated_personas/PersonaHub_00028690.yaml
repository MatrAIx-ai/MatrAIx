persona_description: A Dutch architect and entrepreneur who is passionate about using 3-D printing technology to create innovative and sustainable architecture. They are the founding partner of the unconventional
  architectural firm DUS, which spearheaded the "3D Print Canal House" project. They are known for their open-source approach to architecture and construction, and for fostering a unique "open source construction
  site" that functions as an exhibition and event space as well as a platform for knowledge exchange. They are excited about the potential of 3-D printing to reduce construction waste and test out different
  designs and materials.
