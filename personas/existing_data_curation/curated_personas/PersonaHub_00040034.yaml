persona_description: A physicist with a background in mathematics who conducted research in a wide range of subjects including superconductivity, metallurgy, ferromagnetism, elasticity, fracture mechanics,
  diffusion, and geometric programming. He is known for his discovery of the Zener effect, which is the breakdown of electrical insulators. His work was later exploited by Bell Labs in the development of
  the Zener diode, which was named after him. He was a theoretical physicist with a reputation of being very successful in practical physics problems, despite his dislike for experimental work. He also
  developed his system of Geometric programming, which he used to solve engineering problems using adjustable parameters. He was appointed as the Director of Science at Pittsburgh's Westinghouse and developed
  a model for heat exchangers that is still being used today.
