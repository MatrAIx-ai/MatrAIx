personas:
  professional: Joelle Albero is a meticulous retail cashier in Geneva who excels at POS systems, inventory control, and staff training, and is leveraging her methodical and sociable nature to pursue a
    supervisory role while completing a Business Administration associate degree.
  sports: Joelle Albero fuels her energetic lifestyle with weekly line-dancing classes, weekend hikes at Geneva State Park, and a co-ed recreational softball league, while cheering on the Chicago Cubs and
    Chicago Bears and maintaining a casual membership with the local Geneva Running Club during spring.
  arts: Joelle Albero immerses herself in the arts by acting and handling backstage duties for the community-run Geneva Playhouse, drawing inspiration from Lin-Manuel Miranda’s musical storytelling, and
    unwinding with contemporary fiction novels by Sally Rooney and classic films starring Meryl Streep.
  travel: Joelle Albero prefers structured weekend getaways, having explored Door County’s wineries, taken annual road trips to New York City’s Broadway district, and dreaming of a future culinary tour
    of Tuscany, always booking accommodations through a trusted travel app to keep costs predictable.
  culinary: Joelle Albero enjoys experimental cooking, often crafting dishes like roasted beet and goat-cheese risotto with fresh basil and smoked paprika, while her modest backyard garden supplies heirloom
    tomatoes and kale for her weekly farm-to-table meals, and she’s currently mastering sourdough starter techniques.
  core: Joelle Albero is a socially vibrant yet methodical 31-year-old whose love for community, precise organization, and experimental cooking fuels a steady climb toward retail leadership and a dream
    of a neighborhood café.
background:
  cultural: Joelle was raised in a middle‑class, white Midwestern family in northern Ohio. Her parents, of German‑Irish heritage, instilled a strong work ethic, community involvement, and appreciation for
    practical problem‑solving. Growing up in Geneva, she was active in the local church and school events, which fostered a sense of belonging and collective responsibility. The region’s blend of small‑town
    traditions, agricultural roots, and modest industrial influences shaped Joelle’s values of reliability, generosity, and pragmatic optimism. She carries these cultural cues into her daily life, emphasizing
    dependable relationships, neighborly assistance, and a balance between personal aspirations and community well‑being.
attributes:
  skills: '["POS system operation", "Cash handling and register reconciliation", "Customer service", "Inventory management", "Merchandising and stock replenishment", "Shift scheduling and time management",
