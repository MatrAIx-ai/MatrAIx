  hobbies: '["Community theater", "Line dancing/Zumba", "Volunteer work at food pantry", "Gardening", "Hiking", "Recreational softball", "Cooking and baking", "Reading contemporary fiction"]'
  career_goals: Looking ahead, Joelle plans to leverage her operational experience into a supervisory role, aiming to become an assistant manager within the next two years. She is enrolling in evening courses
    at Lake County Community College to complete an associate degree in Business Administration, focusing on management, accounting, and human resources. Her medium‑term ambition includes overseeing a full
    retail team, refining process efficiencies, and contributing to store profitability. Long‑term, Joelle dreams of opening a locally‑sourced boutique café that doubles as a community gathering space,
    where she can combine her hospitality skills with her passion for fostering social connections. She also hopes to take a leadership position in a local charitable organization, coordinating volunteer
    drives and fundraising events.
