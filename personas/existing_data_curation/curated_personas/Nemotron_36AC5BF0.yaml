personas:
  professional: Maribel Cabrera, a veteran residential housekeeping professional with bilingual Spanish‑English fluency, combines meticulous deep‑cleaning expertise, systematic inventory management, and
    a knack for mentoring new staff to deliver culturally attentive, eco‑friendly services while planning toward certification and supervisory roles; they exemplify an organized, methodical approach that
    balances curiosity about new cleaning technologies with practical reliability.
  sports: Maribel Cabrera stays active by participating in weekly salsa and cumbia dance nights at the community center, cheering for the Phoenix Suns and Phoenix Rising FC, and joining a church‑organized
    walking group that meets each Saturday morning; they view fitness as a social, energetic extension of their love for community gatherings.
  arts: Maribel Cabrera, an enthusiastic member of her church choir, enjoys watching telenovelas, crocheting colorful blankets for her grandchildren, and attending local mariachi performances featuring
    artists like Carlos Vives and Grupo Vida, while also appreciating the works of Frida Kahlo in museum exhibits; they let artistic expression fuel their sociable spirit and provide a creative outlet beyond
    daily chores.
  travel: Maribel Cabrera favors short trips to culturally vibrant destinations such as San Antonio’s Fiesta celebrations, a weekend pilgrimage to the historic town of Guanajuato for Día de los Muertos,
    and occasional family cruises to the Gulf Coast, planning each journey around budget constraints and school schedules; they balance curiosity for new experiences with practical scheduling to ensure
    travel remains enjoyable and affordable.
  culinary: Maribel Cabrera experiments with regional dishes like mole poblano, tamales de mole, and chiles en nogada, seasoning them with herbs and chilies from her own garden such as epazote and ancho,
    and balances traditional cooking with eco‑friendly techniques like using a solar oven and composting food scraps; they approach each meal as a laboratory of flavor and cultural heritage, guided by curiosity
    and methodical preparation.
  core: Maribel Cabrera blends meticulous organization, boundless curiosity, and a love for communal celebrations into a life where eco‑friendly housekeeping meets vibrant cooking, dance, and community
    mentorship; they are a reliable yet assertive figure who never misses a chance to share a freshly made mole at a church potluck.
background:
  cultural: 'Maribel was born in a small town in Mexico and grew up immersed in Mexican traditions and the Spanish language. She moved to the United States as a young adult in the 1990s to join family in
    Arizona. She maintains strong ties to her heritage through daily practices: celebrating religious holidays, preparing family recipes, speaking Spanish at home, and participating in Latino community
    events in Tolleson and the broader Phoenix area. Her identity blends Mexican cultural values—family loyalty, respect, humility—with the practical resilience required to thrive as a household professional
    in the United States.'
