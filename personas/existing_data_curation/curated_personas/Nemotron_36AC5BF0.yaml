  career_goals: Maribel aims to formalize her decades of experience by obtaining a professional cleaning certification and a GED, which would expand her career options. She hopes to be promoted to a supervisory
    or household‑manager position within a reputable cleaning agency, overseeing multiple homes and training new staff. Long‑term, she envisions launching a small, community‑focused cleaning service that
    offers eco‑friendly, culturally‑sensitive options for the Mexican‑American neighborhoods of Tolleson. She also wants to save enough to support her children's children's education and invest in a modest
    home improvement project for her own family.
