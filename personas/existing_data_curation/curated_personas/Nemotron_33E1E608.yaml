  hobbies: '[''Vegetable gardening'', ''Fishing'', ''Hunting'', ''Woodworking'', ''Volunteer work with 4-H'', ''Attending folk music festivals'', ''Classic truck restoration'', ''Hiking'', ''Reading agricultural
    literature'']'
  career_goals: Woodrow aims to move from a general labor role to a supervisory position as a farm manager within the next five years. He plans to obtain a formal certification in agricultural management,
    deepen his expertise in precision farming technologies, and develop data‑driven methods for improving crop yields and resource efficiency. Ultimately, he hopes to acquire his own modest, diversified
    farm that leverages sustainable practices, allowing him to lead a stable, independent operation and mentor younger workers in the community.
