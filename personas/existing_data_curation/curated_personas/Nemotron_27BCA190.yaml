personas:
  professional: Javier Shah is an aspiring visual artist who merges hand‑drawn sketches with digital painting on a tablet, using a curious, organized yet flexible approach to experiment with unconventional
    compositions, while they are considerate and cooperative in collaborative school art projects and community workshops.
  sports: Javier Shah enjoys weekend surfing with the local Pacific Wave Riders club, follows the San Diego Padres in baseball and LA Galaxy in soccer, and maintains a low‑key fitness routine of early‑morning
    beach jogs and occasional bike rides, preferring solitary activity over organized team sports, and they often skip formal practice sessions in favor of personal exploration.
  arts: Javier Shah immerses themselves in graphic novels by Alan Moore, studies the fluid line work of Kim Jung Gi, draws inspiration from Hayao Miyazaki’s storytelling, regularly visits community gallery
    openings featuring muralist Maya Hayuk, and they balance these influences while listening to Arctic Monkeys and Los Lobos for creative fuel.
  travel: Javier Shah prefers low‑key, nature‑focused getaways, meticulously planning weekend hikes in nearby coastal preserves while dreaming of photographing the turquoise lagoons of Palawan, the historic
    alleys of Seville, and sunrise at Machu Picchu, balancing school schedules and a modest family budget, and they often travel with a small group of close friends or family.
  culinary: Javier Shah enjoys preparing family staples like chicken enchiladas layered with roasted poblanos and sweet corn tamales, experiments with spice blends such as chipotle adobo and cumin, attempts
    homemade empanada dough, and they sometimes over‑season dishes in their enthusiasm for bold flavors despite a moderate cooking skill level.
  core: Javier Shah is a quietly curious teen who blends sketching, digital art, and photography into a personal creative universe, balancing disciplined study with spontaneous artistic bursts, modest finances,
    focused health routines for acne and allergies, and they maintain a love for coastal adventures.
background:
  cultural: Javier was raised in a Mexican-American household where both Spanish and English are spoken daily. His family maintains traditions such as celebrating Día de los Muertos, preparing homemade
    tamales with grandparents, and playing Mexican folk music during gatherings. Growing up in Palm Coast, he blends these cultural practices with the coastal, multicultural environment of Florida, participating
    in community festivals and school events that celebrate diversity. This bicultural upbringing informs his worldview, his artistic sensibilities, and his emphasis on community harmony.
