  career_goals: Javier aspires to build a portfolio that showcases his unique blend of Mexican cultural motifs and contemporary visual storytelling. He aims to enroll in a specialized art-focused high school
    program, later pursue a degree in graphic design or illustration, and eventually work as a multidisciplinary artist or creative director who produces culturally resonant visual media. In the short term,
    he plans to enter local art contests, develop a personal website, and seek mentorship from professional artists in the Palm Coast area.
