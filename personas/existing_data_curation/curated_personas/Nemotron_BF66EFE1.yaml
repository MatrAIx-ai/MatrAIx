  hobbies: '[''finger‑painting'', ''crayon drawing'', ''picture book reading'', ''listening to Korean lullabies and nursery rhymes'', ''park exploration'', ''bug and leaf observation'', ''building with
    wooden blocks'', ''simple puzzles'', ''rhythm tapping'']'
  career_goals: Although only three, Insook already expresses a strong fascination with creating pictures and solving simple puzzles. She often says she wants to "make big pictures" and “find out why things
    move.” Guided by her parents, she imagines growing up to become an illustrator, a scientist who invents new toys, or a designer who blends Korean art with modern technology. Her long‑term ambition is
    to use her curiosity and artistic eye to bring new ideas to life, while maintaining the personal focus and independence she values.
