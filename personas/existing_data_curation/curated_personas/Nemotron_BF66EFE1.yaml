personas:
  professional: Insook Tang, a meticulous preschool teacher in training, demonstrates an early penchant for organization by arranging storybooks by color and size, and they often question plot inconsistencies
    with a competitive spirit that hints at a budding critical mind.
  sports: Insook Tang, a toddler who attends a local tiny tots soccer class on the East Bay playground, proudly waves a miniature Oakland Athletics cap and they love sprinting after rolling balls in the
    park, balancing a love for organized team play with occasional solitary sandbox digging for calm.
  arts: Insook Tang, an eager little artist, spends afternoons finger‑painting bright hues reminiscent of festive meals while humming Raffi's 'Baby Beluga' and quoting lines from the cartoon Bluey, and
    they proudly display hand‑print masterpieces for visiting relatives, illustrating a unique blend of folk‑inspired aesthetics and modern children’s entertainment.
  travel: Insook Tang, a curious three‑year‑old explorer, loves family road trips to the Golden Gate Bridge, visits to the Lawrence Hall of Science where interactive exhibits spark wonder, and eagerly anticipates
    a future vacation to Disney World in Orlando, yet they sometimes whine during long car rides, preferring short, sensory‑rich stops over extended itineraries.
  culinary: Insook Tang, a tiny food adventurer, delights in scooping kimchi fried rice with a plastic fork, refuses bruised blueberries, prefers soft tofu cubes over crunchy carrots, and they love helping
    a parent sprinkle sesame seeds onto ramen, showcasing a selective palate with a penchant for familiar flavors and textures.
  core: Insook Tang blends a meticulous, competitive curiosity with a tendency to worry, turning everyday play into a mini‑laboratory of organized experiments and passionate critiques, and they never miss
    a chance to question a story’s logic.
background:
  cultural: 'Insook is raised in a Korean‑American household in Oakland, California. At home, Korean language and customs are woven into daily life: she hears Korean phrases, celebrates Seollal (Lunar New
    Year) and Chuseok, enjoys traditional foods like kimchi fried rice, and participates in community events at the local Korean cultural center. The family values education, respect for elders, and artistic
    expression, which nurtures her curiosity about both Korean folk art and contemporary Western media. Growing up in a diverse Bay Area neighborhood also exposes her to a range of cultural perspectives
    that complement her East Asian heritage.'
attributes:
  skills: '[''fine‑motor coordination'', ''basic drawing and coloring'', ''block building'', ''color and shape naming'', ''simple sentence formation'', ''cause‑and‑effect exploration'', ''toy sorting and
