  hobbies: '["soccer", "building wooden blocks", "drawing", "listening to mariachi music", "dancing", "group storytime", "celebrating Mexican holidays", "watching firefighter cartoons"]'
  career_goals: German often says he wants to become a farmer like his parents, helping operate the tractor and caring for livestock, or a firefighter who protects both people and animals. He imagines building
    sturdy structures one day, showing an early interest in construction. These ambitions reflect his love for practical, hands‑on work and his desire to be a helpful member of his community.
