  hobbies: '[''Gardening (herbs and tropical vegetables)'', ''Home cooking and recipe development'', ''Walking on Ewa Beach at sunrise'', ''Reading self‑help and mindfulness books'', ''Crossword puzzles
    and Sudoku'', ''Knitting and quilting'', ''Attending local cultural festivals (Vietnamese Tet, Hawaiian Hoʻolaule‘a)'', ''Volunteering at a community senior center'', ''Watching culinary television
    programs'']'
  career_goals: Phuong aims to translate her proven managerial track record into a regional operations director role for a multi‑unit hospitality brand in Hawaii, while simultaneously preparing to open
    a modest family‑run Vietnamese‑Hawaiian fusion bistro that showcases sustainable, locally sourced ingredients. She plans to earn a ServSafe Manager certification and complete an associate degree in
    hospitality management to bolster her credentials. Beyond personal advancement, she is committed to mentoring emerging female leaders in the food‑service sector and establishing a legacy that supports
    her children's educational aspirations.
