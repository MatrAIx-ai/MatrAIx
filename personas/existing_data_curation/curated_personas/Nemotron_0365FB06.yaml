  career_goals: Jordan hopes to turn his love of art and technology into a career as a concept artist and interactive media designer. He dreams of attending an arts‑focused high school, then studying fine
    arts or game design at a university, eventually working on imaginative video games or animated films. In the meantime, he aims to build a portfolio of digital art and graphic novels, publish his stories
    online, and possibly freelance as a visual storyteller while keeping his options open to explore emerging fields such as virtual reality art.
