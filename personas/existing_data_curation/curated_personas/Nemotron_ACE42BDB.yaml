personas:
  professional: Sharon Mahone is an aspiring young engineer and mystery storyteller, channeling curiosity and practicality through intricate LEGO constructions and elaborate plot lines in their favorite
    adventure books.
  sports: Sharon Mahone sprints through after‑school soccer practice with the Springfield Junior Soccer Club, idolizes the Chicago Fire MLS team, and spends free afternoons climbing the hill at Riverbend
    Park, balancing teamwork with a love for solo running drills.
  arts: Sharon Mahone fills sketchbooks with whimsical characters inspired by Dr. Seuss and Studio Ghibli, also crafting pixel art in Minecraft while humming the tunes of Taylor Swift and Imagine Dragons
    during creative bursts.
  travel: Sharon Mahone’s wanderlust centers on weekend explorations of Maple Creek Park, hunting for smooth river stones, while dreaming of a family road trip to the Grand Canyon and a future visit to
    Tokyo’s Ghibli Museum.
  culinary: Sharon Mahone loves baking vanilla cupcakes topped with rainbow sprinkles, occasionally adding crushed Oreo crumbs, relishes homemade mac and cheese, and shows budding culinary skills by measuring
    ingredients with a mismatched set of spoons, often spilling batter on the floor.
  core: Sharon Mahone is a curious, slightly chaotic nine‑year‑old who toggles between LEGO engineering, mystery novels, and cupcake frosting, thriving on spontaneous experiments while occasionally forgetting
    homework.
background:
  cultural: Sharon was raised in a white, middle‑class family in Ypsilanti, Michigan. Her childhood reflects typical Midwestern values of community involvement, school participation, and seasonal outdoor
    activities. Family traditions include celebrating holidays such as Thanksgiving, Christmas, and Fourth of July with gatherings and local festivals. Proximity to Ann Arbor and the University of Michigan
    offers occasional exposure to broader cultural events, but she identifies strongly with the small‑town friendliness, self‑reliance, and respect for nature that characterize her neighborhood. Her upbringing
    emphasizes education, polite conduct, and a balance between personal interests and community responsibilities.
