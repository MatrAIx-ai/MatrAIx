  career_goals: Sharon dreams of a future where she can work with animals and share knowledge. She imagines becoming a veterinarian because she loves caring for pets and wildlife, and she also thinks about
    being a science teacher to inspire other kids. Her practical side makes her consider a career that combines hands‑on work with helping her community, such as environmental conservation projects that
    protect the parks near her home. She is motivated to study biology and stay curious about how living things function.
