  career_goals: Andre aspires to move into a principal engineer or technical architect role where he can shape the strategic direction of AI‑enabled products, particularly in healthcare or education. He
    aims to lead a small, high‑performing team that values collaboration and inclusive culture, and to mentor more Black and under‑represented talent in tech. Over the next five years, he plans to obtain
    cloud‑native architect certification, publish technical articles, and possibly launch a startup that leverages data science to address community health disparities. Balancing ambition with his desire
    for personal time, he seeks roles that allow remote work flexibility and a sustainable work‑life balance.
