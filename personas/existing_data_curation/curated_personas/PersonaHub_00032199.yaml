persona_description: Mary Dyer, a Master Naturalist and Master Gardener, is a knowledgeable and experienced individual who specializes in rockery design and construction. She is a passionate gardener who
  enjoys creating natural and organic landscapes, and her expertise lies in the creation of rockeries in various terraced areas. Mary is known for her attention to detail, her ability to plan and design
  rockeries that are both functional and aesthetically pleasing, and her dedication to using native plants and rocks in her rockeries. She is also known for her regular maintenance of rockeries, ensuring
  that they remain in tip-top shape and continue to thrive for years to come.
