persona_description: A historian who specializes in the study of Andean civilizations, particularly the Inca Empire. His research interests include the history and culture of the Inca people, their conquest
  and colonization of the Andean region, and the impact of Spanish colonization on the region. He has written extensively on the social, economic, and political structures of the Inca Empire and its successor
  states, such as the Chimú and the Inca. He is also interested in the religious and cultural practices of the Inca people and the role they played in shaping the Andean region.
