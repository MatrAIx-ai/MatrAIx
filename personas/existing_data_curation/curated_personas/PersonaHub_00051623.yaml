persona_description: A scientist or researcher who specializes in the field of particle physics and astrophysics, particularly in the study of high-energy cosmic neutrinos and their detection using bulk
  matter as a detector. They are interested in the Askaryan effect, which involves the emission of coherent radiation by particles traveling through dense dielectric materials, and have expertise in using
  this effect to detect ultra-high energy neutrinos. They are also familiar with the use of bulk matter to detect neutrinos and have experience with the Antarctic Impulse Transient Antenna (ANITA) experiment,
  which uses antennas attached to a balloon flying over Antarctica to detect Askaryan radiation.
