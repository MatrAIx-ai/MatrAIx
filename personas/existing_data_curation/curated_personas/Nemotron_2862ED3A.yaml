  career_goals: Brenda aims to achieve Master Electrician status and acquire her California state contractor’s license within the next three years. She plans to expand her skill set to include solar photovoltaic
    system installations, positioning herself to lead sustainable retrofits for homes in Kern County. Ultimately, she hopes to launch her own small electrical contracting firm that prioritizes hiring and
    mentoring women and under‑represented workers while maintaining a reliable, community‑focused service model.
