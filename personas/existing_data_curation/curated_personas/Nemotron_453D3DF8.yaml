personas:
  professional: Stephanie Dease, a three-year-old aspiring engineer, constructs towering block structures with meticulous curiosity, applying practical methods while flexibly re-configuring designs, and
    often turns playtime into a friendly competition to see whose creation holds the longest, demonstrating they balance curiosity with practicality, organization with flexibility, and a competitive edge.
  sports: Stephanie Dease is a member of the Little Kickers soccer club, zipping around the community field on Tuesdays and Thursdays, cheers enthusiastically for the New York Yankees during family game
    nights, and practices basic gymnastics at The Little Gym, and they balance organized team play with spontaneous backyard tag.
  arts: Stephanie Dease delights in dancing to the upbeat Happy by Pharrell Williams, sings along to Idina Menzel's Let It Go from Frozen, watches Sesame Street's Elmo with wide-eyed curiosity, and they
    spend afternoon hours finger-painting bright rainbows inspired by the works of Eric Carle, allowing favorite artists to shape their playful imagination.
  travel: Stephanie Dease has explored the magical lands of Walt Disney World in Orlando and the bustling aquarium at Seattle's Pike Place Market, dreams of building sandcastles on the sunny shores of Miami
    Beach, and they prefer family-planned day trips to nearby parks over long flights, balancing adventure with the comfort of familiar routines.
  culinary: Stephanie Dease favors creamy macaroni and cheese, crunchy chicken nuggets, sweet strawberry slices, and carrot sticks, proudly helps sprinkle shredded cheddar on the pasta, but often insists
    on eating only the familiar foods while reluctantly tasting a bite of broccoli, reflecting a picky yet curious palate.
  core: Stephanie Dease, a fiercely curious three-year-old, balances a love for building and competition with a cautious, worry-prone side, often arranging toys meticulously before play, and they approach
    new experiences with a blend of excitement and careful scrutiny.
background:
  cultural: Stephanie is raised in a Black family in Stockton, California, where family and community traditions blend with the multicultural fabric of the San Joaquin County region. Her household celebrates
    African-American heritage through weekly church attendance, gospel music, and storytelling nights that pass down family histories and values of resilience. Holiday observances such as Juneteenth and
    Kwanzaa are marked with meals that include dishes like collard greens and cornbread, and she often helps set the table with her parents. The local community center offers early learning programs and
    cultural events that expose her to a variety of artistic expressions, from dance to visual arts. These experiences shape her identity, giving her a strong sense of belonging while also encouraging curiosity
    about the broader world.
attributes:
  skills: '[''basic vocabulary'', ''simple sentence formation'', ''counting to ten'', ''color and shape identification'', ''stacking Duplo blocks'', ''drawing basic shapes'', ''fine motor coordination'',
    ''gross motor coordination'', ''following daily routines'', ''early problem solving'']'
  hobbies: '[''building Duplo block towers'', ''coloring picture books'', ''listening to storytime'', ''dancing to nursery rhymes and gospel music'', ''nature walks and collecting leaves'', ''watching educational
    cartoons'', ''singing nursery rhymes'', ''solving simple puzzles'']'
  career_goals: Stephanie's imagination already points toward caring professions. She often says she wants to be a teacher because she likes explaining things and helping friends, and she also dreams of
    being a doctor to make people feel better. Her competitive streak pushes her to be the 'best' at helping, while her practical side wants a stable, respected role that can support her family. She talks
    about learning to read more, practicing writing, and later, finishing school so she can work in a job that lets her organize things and solve problems - qualities she values now.
