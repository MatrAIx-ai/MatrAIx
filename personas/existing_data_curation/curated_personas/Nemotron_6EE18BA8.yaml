  career_goals: Zenaida dreams of a future where she can blend her love for art, science, and her cultural heritage. She aspires to become a science communicator or environmental artist who creates engaging
    visual content to inspire curiosity and protect nature. She also envisions working as a museum educator or teacher, using art and storytelling to share Ecuadorian culture and foster a love of learning
    in young children. In the long term, she hopes to study environmental science and use her artistic skills to advocate for conservation and cultural awareness.
