personas:
  professional: Zenaida Mirchandani, a budding young illustrator and enthusiastic aspiring game developer, combines meticulous sketching talent with a systematic approach to digital drawing, channeling
    their curiosity and organized nature into polished school art projects and simple Scratch games while confidently presenting ideas to peers.
  sports: Zenaida Mirchandani loves exploring local nature trails on weekends, plays forward for the neighborhood soccer club "Maple Grove Strikers", cheerfully supports the city’s professional baseball
    team the "River City Mariners", and balances energetic group activities with short, daily yoga routines to keep stress at bay.
  arts: Zenaida Mirchandani spends afternoons sketching scenes inspired by J.K. Rowling’s wizarding world and Hayao Miyazaki’s animated landscapes, while listening to the piano pieces of Ludovico Einaudi
    and the upbeat folk rhythms of Los del Río, and they eagerly discuss the latest exhibitions by contemporary artist Yayoi Kusama during school art club meetings.
  travel: Zenaida Mirchandani enjoys weekend trips to a nearby state park’s waterfall and dreams of visiting the historic canals of Venice and the vibrant wildlife of the Galapagos Islands, planning each
    adventure with colorful maps, a checklist of kid‑friendly activities, and a careful eye on the family budget.
  culinary: Zenaida Mirchandani loves helping in the kitchen, especially whipping up homemade pizza topped with mozzarella, basil, and sliced bell peppers, mixing a bright mango salsa for tacos, and experimenting
    with vivid frosting on cupcakes, while their cooking skill remains at a confident beginner level, often forgetting to set timers.
  core: Zenaida Mirchandani is a curious, organized, and socially energetic ten‑year‑old whose artistic passions are balanced by a lingering worry about perfection, a penchant for collecting shells, and
    a habit of double‑checking school assignments right up to bedtime.
background:
  cultural: Zenaida is a second‑generation Ecuadorian American raised in Deer Park, NY. At home, Spanish is spoken alongside English, and her family celebrates Ecuadorian holidays such as Carnaval, Día
    de los Difuntos, and Independence Day with music, dance, and traditional foods like ceviche, empanadas, and arroz con menestra. She grew up listening to Andean pasillo and folk instruments, and she
    regularly attends community cultural events at a nearby Latin cultural center. These experiences have given her a strong sense of pride in her heritage while also embracing the diverse, multicultural
    environment of Long Island. Zenaida often shares stories, songs, and recipes from Ecuador with classmates, helping bridge cultural understanding in her school community.
