persona_description: A user who is familiar with manipulating options in the Wolfram System front end, particularly those related to cells and notebooks. They are skilled in using the NotebookWrite command
  to input text, and are comfortable with using the FrontEndTokenExecute command to send commands to the front end. They are also familiar with using named commands in the front end, such as "Indent" and
  "OpenCloseGroup", and are skilled in using the ColorSelectorDialog and GraphicsAlign commands to align selected graphics. They are likely to be interested in the Wolfram Language tutorial, as it provides
  a detailed overview of the front end options and how to manipulate them from the kernel.
