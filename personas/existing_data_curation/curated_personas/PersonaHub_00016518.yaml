persona_description: A chemist specializing in the development of targeted dyes for prostate cancer detection. Schmitthenner's research focuses on creating cancerous cells that stand out with dyes that
  stick to their membranes, making them easier to identify and target for biopsy. He is collaborating with RIT imaging science professor Navalgund Rao and Dr. Vikram Dogra to develop new technology for
  creating clear ultrasound images of prostate cancer. Schmitthenner's expertise lies in chemistry and imaging science, and his research aims to improve prostate cancer detection techniques, which have
  widespread implications for medical professionals.
