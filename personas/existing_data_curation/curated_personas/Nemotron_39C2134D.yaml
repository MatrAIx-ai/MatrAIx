personas:
  professional: Marissa Correa, a seasoned veterinary technologist with over two decades of expertise in animal restraint, diagnostic testing, anesthesia monitoring, and staff training, leverages their
    methodical organization and sociable, talkative demeanor to streamline clinic operations, mentor colleagues, and transform client education into engaging, community‑building experiences.
  sports: Marissa Correa, an avid hiker who frequents Griffith Park and the Santa Monica Mountains with their dog, also follows the Los Angeles Lakers and LA Galaxy, participates in the local Los Angeles
    Hiking Club, and incorporates weekend yoga sessions to maintain flexibility for long clinic shifts.
  arts: Marissa Correa engages deeply with the arts, painting murals inspired by folk motifs and Los Angeles street art, attending gallery openings featuring works by Shepard Fairey and Banksy, and dancing
    to cumbia and salsa tracks by Celia Cruz and Juanes during community events.
  travel: Marissa Correa prefers pet‑friendly road trips that blend adventure with cultural immersion, such as weekend escapes to Santa Barbara’s waterfront, hiking the red rocks of Sedona, and exploring
    the historic plazas of Oaxaca, always planning meticulously yet leaving room for spontaneous stops at local galleries.
  culinary: Marissa Correa, a confident home cook, delights in preparing pupusas stuffed with melty cheese and refried beans, frying yuca con chicharrón with lime and cilantro, and crafting fresh masa dough,
    often pairing meals with homemade aguas frescas flavored with hibiscus and pineapple.
  core: Marissa Correa blends meticulous organization with a vibrant, talkative love for art, animals, and community, even as their habit of juggling too many projects leads to late‑night studio sessions
    and occasional missed bedtime.
background:
  cultural: Marissa was born to Salvadoran immigrants who settled in Los Angeles' Pico‑Union neighborhood. She grew up bilingual, speaking Spanish at home and English in school and work. Her family maintains
    traditions such as celebrating Las Posadas, Día de los Santos, and cooking weekend meals together. The strong sense of community and family solidarity typical of Salvadoran culture shaped her compassionate
    approach to both people and animals. She remains active in local Salvadoran cultural groups, participating in festivals, supporting community health fairs, and mentoring youth. Her faith, rooted in
    Catholicism, informs her values of service and humility. The blend of Salvadoran heritage and the diverse cultural landscape of Los Angeles enriches her worldview, fueling her curiosity for art, new
    ideas, and varied experiences.
