    advances'']'
  hobbies: '[''painting and mural art'', ''visiting art galleries'', ''Latin dance (cumbia, salsa)'', ''cooking Salvadoran cuisine'', ''pet photography'', ''hiking in local parks'', ''volunteering at animal
    shelters'', ''organizing community adoption events'', ''attending veterinary webinars'', ''learning sign language'']'
  career_goals: Marissa aims to obtain the Certified Veterinary Technician (CVT) credential and advance to a senior technologist or clinic manager role, where she can shape operational standards and mentor
    junior staff. She is interested in specializing further in exotic animal care or veterinary anesthesia to broaden her clinical expertise. Long‑term, she envisions opening a community‑focused pet wellness
    center that offers affordable preventive services, educational workshops, and a welcoming space adorned with her own artwork and local murals. She also hopes to partner with Salvadoran community organizations
    to promote responsible pet ownership and to create mentorship programs for underrepresented youth interested in veterinary careers.
