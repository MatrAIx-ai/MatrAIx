persona_description: A System Administrator who manages the configuration and management of slices in a Linux system. They are responsible for assigning slices to units based on their needs and ensuring
  that the system is organized hierarchically. They are familiar with the concept of slices, their management, and the associated resource limits that apply to all processes of all units contained in that
  slice. They also understand the default dependencies and the implications of disabling the DefaultDependencies option for slice units.
