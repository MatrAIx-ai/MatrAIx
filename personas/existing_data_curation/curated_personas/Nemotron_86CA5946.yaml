  hobbies: '["Watercolor painting", "Reading poetry and contemporary Latino literature", "Traditional Latin cooking with experimental twists", "Visiting art museums and galleries", "Community storytelling
    workshops", "Puzzle‑solving and competitive bingo", "Balcony gardening", "Mindfulness and breathing exercises"]'
  career_goals: Even at 72, Daisy aims to transition from day‑to‑day cash register duties to a mentor role within the store, formally guiding new hires and developing a short‑term training module for senior
    staff. She also hopes to volunteer at the local senior center, teaching basic financial literacy and cash‑handling skills to fellow retirees. Additionally, Daisy dreams of launching a small home‑based
    venture selling her handcrafted watercolor prints and traditional Latin‑American recipes, blending her artistic curiosity with her cultural heritage.
