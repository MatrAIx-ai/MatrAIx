personas:
  professional: Jillian Thornton is an emerging student debater who leverages meticulous research skills and disciplined journal-keeping to craft persuasive arguments, while they volunteer at the local
    library to refine their organizational acumen and uphold a high personal standard of achievement.
  sports: Jillian Thornton enjoys hiking the scenic trails of Allegany County with the local youth hiking club, participates in school cross country during the fall, follows the Washington Commanders and
    Baltimore Ravens on weekends, and they balance structured cardio workouts with the occasional spontaneous weekend bike ride.
  arts: Jillian Thornton cultivates a love for piano by mastering Chopin’s Nocturne Op. 9 No. 2 and Debussy’s Arabesque, knits scarves while listening to Adele and Taylor Swift, devours Agatha Christie
    mysteries and Ken Follett’s historical sagas, and they volunteer at the library to curate displays featuring local artist Sarah Jane Phillips’s watercolor series.
  travel: Jillian Thornton prefers meticulously planned weekend getaways, having explored Washington, D.C.’s Smithsonian museums and the Great Smoky Mountains with family, while dreaming of a future school
    trip to York’s medieval walls and a cultural exchange in Kyoto, Japan, and they balance adventure with safety and budget constraints.
  culinary: Jillian Thornton enjoys crafting simple yet precise meals such as homemade pizza topped with mozzarella, basil, and pepperoni, baking chocolate chip cookies with a dash of sea salt, and preparing
    trail mix with almonds, dried cranberries, and dark chocolate for hikes, while they still rely on their parents for more complex dishes.
  core: Jillian Thornton blends disciplined organization with creative curiosity, habitually journaling every plan and occasionally staying up late to finish a novel, all while they juggle a strict allowance,
    yoga stretches, and a love for piano and knitting.
background:
  cultural: Jillian comes from a white, middle‑class family rooted in the small‑town culture of Alfred, New York. Her upbringing reflects the close‑knit community values typical of upstate rural areas,
    including regular participation in church gatherings, county fairs, and seasonal activities such as apple picking and snowshoeing. The community emphasizes hard work, mutual support, and education,
    which has fostered Jillian’s cooperative nature and her respect for tradition. Proximity to Alfred University provides exposure to a broader academic environment, influencing her aspirations toward
    higher education while maintaining a strong sense of local identity.
attributes:
  skills: '[''meticulous note‑taking'', ''time‑management'', ''Microsoft Office (Word, PowerPoint)'', ''Google Suite (Docs, Sheets, Slides)'', ''reading comprehension'', ''creative writing'', ''student
