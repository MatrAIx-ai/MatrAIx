  hobbies: '[''reading mystery and historical novels'', ''journaling'', ''playing piano'', ''knitting'', ''hiking local trails'', ''volunteering at the library'', ''school debate club'']'
  career_goals: Jillian aspires to pursue a career that blends her love of organization with her desire to help others. She dreams of becoming a high‑school teacher or a school librarian, roles where she
    can design structured learning environments, mentor classmates, and maintain orderly resources. In the long term, she envisions earning a degree in education or library science, possibly attending the
    nearby Alfred University, and eventually leading community outreach programs that promote literacy and academic achievement.
