persona_description: Andrew K. Vershon, a scientist who conducts research on the regulation of transcription in the yeast Saccharomyces cerevisiae, and has been involved in the Waksman Student Scholars
  Program at the Waksman Institute, GE Healthcare Life Sciences, and the National Science Foundation. He is a leader in the field of molecular biology and bioinformatics and has contributed to the transformation
  of the biological sciences through the development of new technologies and the creation of a cyberinfrastructure. Vershon is passionate about teaching and has a strong commitment to making science accessible
  to all students, particularly those from underrepresented backgrounds.
