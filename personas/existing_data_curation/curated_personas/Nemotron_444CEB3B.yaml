  hobbies: '["Reading historical fiction","Crossword puzzles","Knitting and crocheting","Vegetable gardening","Birdwatching and nature walks","Mindfulness meditation","Volunteering for library shelving"]'
  career_goals: Marsha aims to move into a supervisory role that lets her oversee inventory accuracy while preserving a quiet, predictable work setting. She plans to earn a forklift certification and become
    a floor lead, reducing the physical demands of her current position. In the long term, she seeks a stable part‑time schedule as she approaches retirement, maintaining health benefits and supporting
    her husband's needs. Additionally, she hopes to continue mentoring younger staff to cultivate a supportive, low‑stress workplace culture.
