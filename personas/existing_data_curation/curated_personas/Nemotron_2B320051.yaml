  hobbies: '[''Hiking in the Sierra Nevada'', ''Birdwatching'', ''Gardening'', ''Cooking traditional Central Asian dishes'', ''Reading historical biographies'', ''Playing the dombra'', ''Volunteering at
    community cultural events'', ''Traveling to visit family in Central Asia'', ''Solving crossword puzzles'']'
  career_goals: Although retired, Loc aims to stay active and purposeful by preserving and sharing his cultural heritage, mentoring younger members of the Central Asian community in Reno, and continuing
    to learn new DIY techniques. He hopes to document his family’s stories in a digital memoir, take occasional trips back to his homeland, and maintain his health through regular hiking and gardening.
