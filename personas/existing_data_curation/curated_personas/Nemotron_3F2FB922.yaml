personas:
  professional: Doris Lazzara is a meticulous commercial cleaning specialist who expertly handles industrial chemicals, operates floor‑care equipment, and keeps detailed inventory logs, while leveraging
    their methodical planning and compassionate customer service to lead small crews toward sustainable cleaning practices.
  sports: Doris Lazzara enjoys solo nature walks in Cincinnati’s Eden Park and occasionally joins a weekday evening yoga class, while cheering for the Cincinnati Bengals and the Cincinnati Reds, and they
    are an occasional participant in a local adult recreational softball league that meets on weekends.
  arts: Doris Lazzara finds creative solace in crocheting intricate afghans while listening to folk artists like Gillian Welch and indie singer Bon Iver, and they regularly attend the Cincinnati Art Museum’s
    quiet evenings and browse vintage hardware fairs for unique cleaning tool designs.
  travel: Doris Lazzara prefers low‑key, eco‑focused trips, planning weekend getaways to Hocking Hills State Park and day trips to the Indiana Dunes, while dreaming of a sustainable travel itinerary that
    includes Portland, Oregon’s bike‑friendly neighborhoods and Kyoto’s traditional gardens, all while using a rewards credit card to maximize points.
  culinary: Doris Lazzara loves cooking with herbs from their indoor garden, frequently preparing dishes like basil pesto pasta, rosemary‑infused roasted carrots, and lemon‑thyme grilled salmon, while experimenting
    with natural cleaning blends of vinegar and citrus peels to keep their kitchen spotless.
  core: Doris Lazzara is a detail‑oriented, eco‑minded cleaning professional who balances solitary curiosity with compassionate teamwork, often found juggling spreadsheets, herb pots, and vintage tool finds.
background:
  cultural: Doris was born and raised in Cincinnati, Ohio, within a middle‑class family of mixed German and Irish ancestry. Growing up in Hamilton County, she attended public schools and participated in
    community events and church activities that emphasized hard work, neighborly cooperation, and modesty. Her upbringing reflects Midwestern values of practicality, reliability, and a strong sense of community,
    shaping her respectful and cooperative demeanor while maintaining a quiet, introspective personal style.
attributes:
  skills: '[''Commercial cleaning'', ''Floor‑care equipment operation'', ''Chemical safety and MSDS compliance'', ''Basic plumbing and electrical repairs'', ''Inventory tracking'', ''Time management'',
    ''Documentation and reporting'', ''Team coordination'', ''Customer service'', ''Conflict resolution'', ''Sustainability practices (green cleaning)'', ''Minor building maintenance'']'
  hobbies: '[''Reading non‑fiction (sustainability, history, DIY)'', ''Indoor herb gardening'', ''Crossword puzzles'', ''Podcast listening (science, home improvement)'', ''Volunteer work at food pantry'',
    ''Nature walks in local parks'', ''Crocheting'', ''Collecting vintage cleaning tools'']'
  career_goals: Doris aims to earn a Certified Professional Cleaner credential and pursue an associate degree in facilities management at a local community college. She aspires to move from a janitorial
    role to a lead or supervisory position within the next three years, eventually becoming a facilities manager who can implement sustainable cleaning programs and oversee building operations. Long‑term,
    she dreams of starting her own environmentally‑focused cleaning business that offers green services to small enterprises in the Cincinnati area.
