personas:
  professional: Myrca Evans is pursuing certification as a community health worker, applying her expert interpersonal communication, event coordination, and modest budget management to design structured
    yet adaptable neighborhood health programs, while her talkative, sociable nature makes her the natural hub of choir rehearsals and volunteer meetings, even as her relaxed attitude toward strict planning
    sometimes leaves details to the last minute.
  sports: Myrca Evans enjoys line‑dancing socials at the community center, participates in a neighborhood softball league during summer, and avidly supports the Chicago Bulls and Chicago White Sox, using
    casual walks with her garden friends as daily low‑impact exercise.
  arts: Myrca Evans sings gospel with her church choir, drawing inspiration from Mavis Staples and Mahalia Jackson, relaxes with classic blues films like The Blues Brothers starring John Belushi and Dan
    Aykroyd, loses herself in mystery novels by Agatha Christie and Dorothy L. Sayers, and delights in board‑game nights featuring Catan and Carcassonne.
  travel: Myrca Evans prefers low‑key road trips that blend culinary exploration with family visits, having already toured the historic districts of Charleston, South Carolina, and the jazz‑laden streets
    of New Orleans, while dreaming of a future culinary pilgrimage to Marrakech, Morocco, and a restful retreat on the lakeshore of Lake Geneva, Switzerland.
  culinary: Myrca Evans is a seasoned home cook who specializes in hearty collard greens simmered with smoked turkey, slow‑cooked tomato‑based stews seasoned with smoked paprika and fresh basil, buttery
    cornbread, and sweet potato pie, teaching cooking workshops where she emphasizes the use of garden‑fresh tomatoes, garlic, and locally sourced herbs.
  core: Myrca Evans blends a love for structured community service with a spontaneous, talkative spirit, channeling her compassionate nature into gospel singing and neighborhood cooking while occasionally
    letting disorganization slip into missed appointments and an overreliance on last‑minute planning.
background:
  cultural: 'Born and raised in Chicago''s South Side, Myrca''s identity is rooted in African‑American cultural traditions that emphasize family, faith, and community resilience. She grew up attending a
    historic Black Baptist church, where music, oral storytelling, and collective activism shaped her worldview. The neighborhood''s rich culinary heritage—especially soul‑food cooking and food‑sharing
    gatherings—has guided her love for communal meals. Her experiences reflect the broader legacy of Chicago''s Black community: navigating systemic challenges while fostering solidarity through churches,
    local nonprofits, and cultural celebrations like Juneteenth and the Chicago Blues Festival.'
attributes:
  skills: '[''Interpersonal Communication'', ''Community Outreach'', ''Event Coordination'', ''Volunteer Management'', ''Budget Management'', ''Basic Computer Literacy'', ''Soul Food Cooking'', ''Mentoring'',
