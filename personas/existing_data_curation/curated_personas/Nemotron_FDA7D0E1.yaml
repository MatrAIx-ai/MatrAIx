  hobbies: '[''Gospel Singing'', ''Line Dancing'', ''Urban Gardening'', ''Soul Food Cooking'', ''Reading Mystery Novels'', ''Volunteer Tutoring'', ''Board-Game Nights'']'
  career_goals: Myrca aims to formalize her community service by becoming a certified community health worker and taking on a leadership role within her neighborhood association. She hopes to launch a weekly
    community kitchen that provides nutritious meals to seniors and low‑income families while offering cooking workshops. Over the next five years, she envisions advocating for better senior services in
    Chicago, mentoring at‑risk youth, and possibly turning her passion for cooking into a small home‑based catering business that celebrates African‑American culinary heritage.
