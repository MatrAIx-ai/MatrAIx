  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Literary fiction reading'', ''Philosophy books'', ''Hiking'', ''Gardening'', ''Art museum visits'', ''Documentary film watching'', ''Journaling'',
    ''Playing piano in solitude'']'
  career_goals: She aims to advance to a district-wide leadership role, such as Director of Early Childhood Services, where she can implement innovative, evidence-based programs and champion equity in education.
    Juliana also plans to pursue a master's degree in Educational Leadership to deepen her expertise and to mentor emerging administrators. Long-term, she hopes to lead a regional initiative that integrates
    art and interdisciplinary learning into early childhood curricula across South Dakota.
