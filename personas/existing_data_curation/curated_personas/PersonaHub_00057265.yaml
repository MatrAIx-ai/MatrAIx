persona_description: A veterinarian who specializes in dermatological examination, allergology, and immunology. They are knowledgeable in the causes, symptoms, and treatments of itching in dogs and cats,
  as well as the diagnosis and management of atopic dermatitis and other skin diseases. They are also familiar with common allergy tests and immunotherapy, and have practical tips for reducing contact with
  environmental allergens. They are skilled in fighting fleas and managing demodicosis, sarcoptic mange, pyoderma, and other endocrine skin diseases. They have experience with otitis and are knowledgeable
  about the care and prevention of contagious skin diseases in dogs and cats. They are also knowledgeable about shampooing techniques for dogs and cats.
