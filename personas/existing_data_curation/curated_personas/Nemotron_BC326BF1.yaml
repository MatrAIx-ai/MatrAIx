personas:
  professional: Tonya Kincaid, a seasoned residential painter and paper‑hanging specialist in Saint Louis, combines precise blueprint reading, eco‑friendly paint expertise, and a talent for estimating material
    needs to manage client projects with structured timelines while mentoring apprentices as she works toward certified lead‑painter status and her own sustainable finish business.
  sports: Tonya Kincaid enjoys weekend hikes on the Ozark Trail as a member of the Saint Louis Outdoor Club, follows the Saint Louis Cardinals baseball and Saint Louis Blues hockey teams, occasionally runs
    a 5 K in local charity events, and participates in a community yoga class to maintain flexibility.
  arts: Tonya Kincaid channels her creative side through acrylic painting inspired by the vibrant colors of local street murals, devours historical fiction by Philippa Gregory and Ken Follett, and regularly
    attends live‑music shows at BB's Jazz Club featuring artists like Nathaniel Rateliff and The Avett Brothers, while also visiting the Saint Louis Art Museum for inspiration.
  travel: Tonya Kincaid prefers short, budget‑friendly road trips that blend planned stops with spontaneous detours, has explored Nashville’s music scene and Branson’s theme parks, dreams of a sustainable‑focused
    tour of Portland and the Pacific Northwest, and hopes to one day wander Tuscany’s vineyards for garden and culinary inspiration.
  culinary: Tonya Kincaid enjoys cooking with garden‑fresh heirloom tomatoes, zucchini, basil, and rosemary, skillfully prepares roasted vegetable quinoa bowls, herb‑roasted chicken, and homemade strawberry
    shortcake, dabbles in grilling salmon with lemon‑dill sauce, and occasionally treats herself to Saint Louis BBQ at Pappy’s Smokehouse while sipping a local craft brew.
  core: Tonya Kincaid, a 33‑year‑old DIY‑savvy painter, balances structured project planning with a laid‑back love for eco‑friendly finishes, garden‑to‑table meals, historic novels, and a habit of delaying
    paperwork for a weekend concert.
background:
  cultural: Tonya grew up in a middle-class, white Midwestern family in St. Louis County, experiencing the region’s emphasis on community, reliability, and practicality. Her heritage includes German and
    Irish ancestry common to the area, and she was raised with values of hard work, modesty, and neighborly friendliness. She attended local public schools and some college courses at a community college,
    where she began learning trade skills. The cultural environment of the Midwest’s blend of urban and suburban life informs her pragmatic approach to work, her cooperative nature, and her appreciation
    for straightforward communication.
attributes:
  skills: '[''surface preparation'', ''priming'', ''color selection'', ''decorative painting'', ''paper hanging'', ''pattern matching'', ''material estimation'', ''blueprint reading'', ''tool operation
    (rollers, spray guns, sanders)'', ''safety compliance (OSHA)'', ''client communication'', ''team collaboration'', ''eco-friendly paint knowledge'', ''basic interior design principles'']'
  hobbies: '[''DIY home improvement'', ''acrylic painting (art)'', ''gardening'', ''hiking'', ''reading historical fiction'', ''live music attendance'', ''volunteering with Habitat for Humanity'', ''yoga'']'
  career_goals: Tonya aims to become a certified lead painter and eventually launch her own residential painting and paper-hanging business in the St. Louis area, focusing on high-quality, sustainable finishes
    and personalized service. She plans to obtain OSHA and state contractor certifications, mentor apprentices, and expand her service offerings to include decorative murals and minor interior remodeling
    advice. Her long-term ambition includes owning a modest home where she can showcase her own artistic work and provide stable income for future financial independence.
