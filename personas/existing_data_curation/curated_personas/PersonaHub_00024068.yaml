persona_description: A researcher at Bordeaux Cemagref who specializes in the study of biogeography and climate change. The researcher has conducted extensive research on the distribution of migratory amphihaline
  fish species and their migration patterns, and has developed models to predict their future distribution under different climate scenarios. The researcher is particularly concerned about the potential
  impacts of global warming on the distribution and survival of these species, and is working on developing restoration programs to protect and preserve them. The researcher is also interested in the potential
  for exotic migratory amphihaline fish to replace the species currently at risk, but remains cautious due to the species' reliance on coastal waters.
