personas:
  professional: Shelia Seidman, a quality assurance specialist in a mid‑size manufacturing laboratory, channels her curiosity and competitive nature into devising unconventional testing methods and data‑visualization
    dashboards while wrestling with a spontaneous streak that sometimes threatens deadline adherence.
  sports: Shelia Seidman fuels her competitive drive through weekly trail runs with the Bozeman Trail Runners, mountain‑bike rides with the Gallatin Cycling Club, seasonal ski trips to Bridger Bowl, and
    avidly follows the Montana State Bobcats basketball team and Denver Broncos football as her weekend sporting rituals.
  arts: Shelia Seidman immerses herself in Bozeman’s arts pulse by photographing street murals reminiscent of Banksy, performing improv with the Bozeman Improv Collective, and attending gallery openings
    featuring outsider artist Vytas Mazeika, all while curating playlists of Phoebe Bridgers and Bon Iver for creative inspiration.
  travel: Shelia Seidman prefers spontaneous road trips to rugged destinations like the Canadian Rockies or Iceland’s highlands, yet annually maps detailed backpacking itineraries for Patagonia, budgeting
    through a travel spreadsheet that leaves room for unplanned local art festivals and last‑minute trail discoveries.
  culinary: Shelia Seidman’s culinary repertoire blends moderate cooking skills with a penchant for hearty, protein‑rich meals, such as pan‑seared trout with lemon‑dill butter, quinoa bowls tossed with
    wild mushrooms and miso‑ginger dressing, and a post‑ride indulgence in craft beers brewed with spruce tips.
  core: Shelia Seidman is a curiosity‑driven, socially energized quality‑engineer who balances spontaneous outdoor escapades and competitive trivia with a relentless pursuit of unconventional problem‑solving,
    even if it means occasional deadline misses and impulsive gear splurges.
background:
  cultural: Born and raised in a small Midwestern town to parents of German and Irish ancestry, Shelia grew up with a blend of traditional American values—self‑reliance, community, and appreciation for
    the outdoors. Relocating to Bozeman, Montana, she has embraced the mountain‑west culture, which fuses rugged frontier sensibilities with a vibrant, progressive arts scene. She respects the region’s
    Native American heritage, participating in local cultural events and environmental stewardship projects. Her cultural identity is that of a progressive, outdoors‑oriented American who balances western
    pragmatism with a love for creative, unconventional experiences.
attributes:
  skills: '["Quality Assurance", "Laboratory Testing", "Precision Weighing", "Sampling Techniques", "Statistical Process Control", "Instrument Calibration", "Data Analysis (Excel, LIMS)", "Regulatory Compliance
    (OSHA, FDA)", "Troubleshooting & Process Optimization", "Creative Problem Solving", "Team Training & Facilitation", "Clear Technical Communication"]'
  hobbies: '["Group Hiking", "Mountain Biking", "Trail Running", "Open‑Mic Poetry/Music Nights", "Community Theater", "Art Gallery Visits", "Competitive Trivia Nights", "Escape Rooms", "Board‑Game Gatherings",
    "Photography (Landscape & Street)", "Improv Comedy Workshops"]'
  career_goals: She aims to transition from frontline inspection to a supervisory or quality‑engineer role within the next three years, seeking certification as a Certified Quality Engineer (CQE) and eventually
    becoming a Quality Assurance Manager. She hopes to lead a team that designs innovative testing protocols, integrates data visualization tools, and drives continuous improvement initiatives. Long‑term,
    she envisions starting a consultancy that helps small manufacturers adopt sustainable, low‑waste testing practices while blending her passion for art and technology by creating visual dashboards that
    make quality data accessible. She also plans to complete her bachelor's degree in Applied Science or Engineering to solidify her technical credentials.
