personas:
  professional: Jae Wei, a veteran mechanic with 30 years specializing in heavy‑duty trucks and construction machinery, at 58 applies meticulous, systematic diagnostics while also injecting an imaginative
    flair for custom vehicle art; they now pursue advanced EV powertrain certifications and plan a boutique, low‑noise workshop to mentor solitary apprentices.
  sports: Jae Wei, a 58‑year‑old quiet enthusiast of the Minnesota Vikings and the St. Paul Saints, enjoys low‑impact cardio by walking the banks of the Mississippi River, attends the local classic‑car
    club’s annual rally where they occasionally showcase vintage truck restorations, and keeps fit through weekly light weight‑lifting sessions in their home garage.
  arts: Jae Wei, an avid analog photographer inspired by Ansel Adams and the stark geometry of M.C. Escher, sketches futuristic vehicle concepts à la Syd Mead, collects vintage harmonicas and occasionally
    plays blues tunes reminiscent of Little Walter, and devotes evenings to listening to Miles Davis while they refine mechanical designs.
  travel: Jae Wei, who at 58 prefers meticulously planned solo trips, has explored Detroit’s automotive museums, wandered the neon streets of Tokyo to study electric‑vehicle technology, and dreams of a
    quiet retreat in Iceland’s basalt landscapes, yet they stay within a modest budget to fund their workshop upgrades.
  culinary: Jae Wei, a 58‑year‑old competent home cook who enjoys slow‑cooking beet and carrot stew with rosemary harvested from their garden, occasionally experiments with sous‑vide salmon using precise
    temperature controls, and indulges in handcrafted espresso paired with a slice of rye bread topped with smoked Gouda, while they savor the ritual of measuring each ingredient as a meditative practice.
  core: Jae Wei, a solitary master mechanic at 58 whose imagination fuels both precise repairs and artistic vehicle designs, balances meticulous order with a quiet, anxiety‑prone introspection, and they
    constantly seek harmony between technical rigor and creative freedom.
background:
  cultural: Jae is the son of East Asian immigrants—his parents arrived from South Korea in the early 1970s—and grew up in the Twin Cities’ vibrant Asian community. Raised with a blend of Korean cultural
    values such as diligence, respect for elders, and a reverence for skilled craftsmanship (monozukuri), he also absorbed American working‑class ethos. He speaks conversational Korean and celebrates traditional
    holidays like Seollal and Chuseok, while also participating in local Lunar New Year festivals in Saint Paul. This bicultural upbringing informs his meticulous approach to mechanical work and his appreciation
    for both functional precision and aesthetic harmony. Family gatherings often involve shared meals of Korean cuisine, which reinforce his connection to his heritage even as he lives a largely solitary
    professional life.
