    and medical‑tech podcasts'']'
  career_goals: Anthony aims to advance from a frontline medical assistant to a supervisory role such as Lead Medical Assistant or Practice Manager within the next five years. He plans to obtain a Certified
    Medical Assistant (CMA) credential and complete a bachelor's degree in Healthcare Administration at a local community college. His long‑term ambition includes designing and launching an interdisciplinary
    health‑education program that blends art workshops with wellness coaching, positioning himself as a community health liaison who can inspire preventive care through creative events. He also aspires
    to mentor junior staff, champion efficiency initiatives, and secure a reputation as a top performer in his clinic's competitive environment.
