persona_description: A programmer who specializes in system calls and file synchronization, particularly in understanding and using the fdatasync() and fsync() system calls to ensure files are in a known
  state. He is familiar with the POSIX.1 standard and has experience with OpenBSD, where fdatasync() and fsync() have been available since OpenBSD 5.4. He is also likely to be proficient in using shell
  scripting and has experience with building scripts to ensure files are in a known state before proceeding with other tasks.
