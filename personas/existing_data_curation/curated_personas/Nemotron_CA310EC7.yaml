  career_goals: In the short term, Nina aims to earn top marks in her science and math classes, become a leader on her soccer team, and win a regional robotics competition. She hopes to attend a summer
    STEM camp and secure a mentorship with a local engineer. Over the longer term, she dreams of pursuing a career that blends her love of science and her desire to help others—such as biomedical engineering,
    veterinary medicine, or teaching. She envisions herself studying at a university with a strong research program, developing innovative solutions for health or animal care, and later inspiring younger
    students in her community.
