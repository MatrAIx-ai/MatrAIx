personas:
  professional: Nina Garris, a budding technologist and forward on the community soccer team, merges a love for building complex LEGO structures with hands‑on robotics programming; they showcase curiosity
    tempered by practical problem‑solving, a competitive drive that pushes teammates, and a skeptical eye for shortcuts that might compromise reliability.
  sports: Nina Garris, a forward for the River Valley Strikers soccer club, lives for the rush of weekend matches and idolizes Megan Rapinoe while also cheering for the Chicago Fire FC, and they combine
    disciplined training drills with a competitive edge that sometimes eclipses teamwork, all while balancing schoolwork with daily jogs in the local park.
  arts: Nina Garris, a dedicated piano student who practices three times a week, frequently listens to Yiruma and Ludovico Einaudi for inspiration, devours mystery novels like the Nancy Drew series, and
    they channel their curiosity into crafting intricate LEGO sculptures that double as art installations, all while occasionally doodling comic‑strip characters during quiet moments.
  travel: Nina Garris, who has visited the Great Lakes shoreline, spent a weekend camping at State Park, and dreams of touring the Smithsonian in Washington, D.C., they plan trips with meticulous checklists
    yet often feel anxious about missing favorite rides, preferring a mix of adventure—like zip‑lining at a nearby adventure park—and relaxation with family at the county fair.
  culinary: Nina Garris, who enjoys helping in the garden and can whip up a decent grilled cheese with homemade tomato sauce, loves classic Midwestern fair foods such as corn dogs, funnel cake, and deep‑fried
    cheese curds, and they often experiment by adding fresh basil from the garden to their mom's spaghetti, though they occasionally over‑season in excited bursts.
  core: Nina Garris is a competitively curious twelve‑year‑old who balances LEGO engineering, soccer forward instincts, and piano melodies while juggling anxiety‑fuelled worries and a relentless drive to
    out‑perform peers.
background:
  cultural: Nina was raised in Bonner Springs, Kansas, a suburban community in the Midwest that blends small‑town friendliness with easy access to the Kansas City metro area. Her family’s cultural roots
    are typical of Midwestern white American households, valuing hard work, community involvement, and family gatherings. She grew up attending local school events, summer fairs, and Fourth of July fireworks,
    and often participates in church and neighborhood activities. The blend of outdoor recreation along the Kansas River, a strong emphasis on school sports, and a supportive community environment shapes
    her practical, organized, and socially‑oriented outlook.
