persona_description: A public health official or healthcare professional who is responsible for overseeing the administration of seasonal influenza vaccines and monitoring influenza outbreaks in Australia.
  This persona is likely to be familiar with the latest guidelines and recommendations from the Australian Therapeutic Goods Administration (ATAGI) and the Department of Health regarding the administration
  of influenza vaccines. They are also likely to be up-to-date with the latest research and studies on the effectiveness of influenza vaccines, including the use of adjuvants such as MF59. This persona
  may also be involved in the development and implementation of vaccination programs in different regions of Australia, and may collaborate with other healthcare professionals and government agencies to
  ensure the optimal timing and coverage of influenza vaccination.
