  career_goals: While she values the stability of her current role, Lydia aspires to advance to a supervisory position where she can lead a team, oversee inventory operations, and implement efficiency initiatives.
    She intends to complete her associate degree in logistics or business, obtain a certification in supply chain management, and eventually manage a small neighborhood grocery store that reflects her cultural
    roots. Additionally, she hopes to mentor younger employees, become a go‑to resource for problem solving in her warehouse, and be recognized for her contributions to workplace productivity.
