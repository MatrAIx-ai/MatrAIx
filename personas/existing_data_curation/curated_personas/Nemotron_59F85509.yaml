  hobbies: '[''Cooking Ecuadorian cuisine'', ''Gardening'', ''Casual soccer'', ''Woodworking'', ''Morning jogging'', ''Weight training'']'
  career_goals: Luis aims to advance from his current production worker role to a shift supervisor within the next two years, leveraging his reliable performance and structured work style. He plans to obtain
    OSHA 30‑hour certification and complete an associate’s degree in Industrial Technology to strengthen his technical foundation. In the longer term, Luis envisions moving into plant management, overseeing
    multiple production lines, and perhaps mentoring new hires, all while ensuring a stable and prosperous future for his family.
