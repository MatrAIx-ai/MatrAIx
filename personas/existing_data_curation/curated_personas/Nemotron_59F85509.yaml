personas:
  professional: Luis Mendiola leverages his hands‑on expertise with CNC machines and lean manufacturing principles to consistently meet production targets, while their structured, reliable nature and calm
    under pressure position them as a natural candidate for the upcoming shift supervisor role.
  sports: Luis Mendiola rallies with the local church soccer team, the St. Mary's Saints, for weekend matches, avidly supports the Chicago Fire in MLS, and they eagerly follow Real Madrid’s Champions League
    games, balancing competitive play with enthusiastic fandom.
  arts: Luis Mendiola finds creative release in woodworking, crafting small furniture pieces that echo the clean lines of mid‑century modern design, and they unwind to the acoustic melodies of John Mayer
    and the classic storytelling of folk legend Bob Dylan.
  travel: Luis Mendiola prefers meticulously planned family road trips to national parks like Yellowstone and the coastal dunes of Oregon, enjoys the occasional adventure of hiking in the Rockies, and they
    harbor a long‑standing wish to explore the historic streets of Cartagena during a future vacation.
  culinary: Luis Mendiola delights in preparing traditional dishes such as llapingachos, seco de pollo, and ceviche, often harvesting cilantro, corn, and aji from their backyard garden, and they sometimes
    over‑season the ceviche but always serve it with a smile.
  core: Luis Mendiola blends disciplined work habits with a quiet love for soccer, woodworking, and family‑centered cooking, and they juggle a pragmatic financial plan while maintaining a steady, stress‑resistant
    outlook.
background:
  cultural: Luis was raised in an Ecuadorian‑immigrant household that preserved many family traditions. He grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties to
    his extended family both locally and in Quito. Catholic holidays such as Semana Santa and Día de la Independencia are celebrated with traditional foods and music. He values community, respect for elders,
    and the collectivist ethos of his heritage, which blend with the Midwestern values of hard work and self‑reliance in his daily life.
attributes:
  skills: '[''Machine Operation'', ''Preventive Maintenance'', ''Troubleshooting Mechanical/Electrical Issues'', ''Lean Manufacturing'', ''Quality Control'', ''Safety Compliance (OSHA)'', ''Inventory Management'',
