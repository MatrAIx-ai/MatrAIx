persona_description: A geologist interested in groundwater depletion in the United States, particularly focusing on the historical trends and current rates of groundwater withdrawal. This persona is likely
  to be interested in the scientific research and analysis presented in the Scientific Investigations Report 2013–5079, which evaluates the long-term cumulative depletion volumes in 40 separate aquifers
  or areas and one land use category in the United States. This persona may be particularly interested in the increased rate of groundwater depletion since the 1950s, the estimated depletion volumes during
  1900-2008, and the current depletion rate of 25 km3 per year during the most recent period (2000-2008).
