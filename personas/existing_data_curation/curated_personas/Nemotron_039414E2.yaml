  career_goals: Geraldine aims to earn her GED and enroll in a vocational culinary program to turn her cooking talent into a professional skill. She hopes to work part‑time as a kitchen aide or home‑based
    caterer, eventually opening a small catering business focused on traditional Mexican family meals. Long‑term, she envisions becoming a community nutrition educator, helping families in Bakersfield adopt
    healthy eating habits while preserving cultural food traditions. She also wants to gain certifications that allow her to assist in local youth after‑school programs, combining her love for community
    work with stable employment.
