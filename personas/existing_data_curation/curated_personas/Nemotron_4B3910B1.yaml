personas:
  professional: Yon Vo is a humanities scholar who blends rigorous qualitative research with cutting‑edge digital pedagogy, designing interdisciplinary courses that marry classic theory with modern technology
    while leveraging their bilingual fluency and competitive drive to secure a tenure‑track position and eventually shape department governance.
  sports: Yon Vo enthusiastically hikes the trails of Hoosier State Park as a member of the Hoosier Trailblazers club, plays intramural volleyball on campus, and roots for the Indiana Pacers while casually
    following the Indianapolis Colts during football season.
  arts: Yon Vo cultivates a rich artistic life by playing piano pieces ranging from Debussy to Ryuichi Sakamoto, attending the Indianapolis International Film Festival to watch indie works by directors
    like Hirokazu Kore‑eda, and immerses themselves in classic Japanese literature and contemporary American fiction, often quoting Murakami’s surrealism in casual conversation.
  travel: Yon Vo prefers meticulously planned research trips to conferences in the Midwest, yet balances this with spontaneous weekend getaways to the Amish Country of Pennsylvania or a culinary tour of
    Kyoto’s Nishiki Market, dreaming of future hikes through the Scottish Highlands despite a modest travel budget.
  culinary: Yon Vo enjoys experimenting in the kitchen, crafting Asian‑fusion dishes like miso‑glazed salmon tacos and kimchi‑infused risotto, favoring ingredients such as shiso, gochujang, and matcha,
    and often showcases their culinary creations at tiny dinner parties while still considering themselves a modest home‑cook.
  core: Yon Vo is a competitively minded humanities professor who balances scholarly rigor with artistic curiosity, navigating academia, finance, health, and leisure with a blend of disciplined structure
    and measured spontaneity.
background:
  cultural: Yon was born to East Asian immigrant parents who emigrated from Japan (and possibly Vietnam, reflected in the surname Vo) to the United States in the 1990s. Growing up in the Midwest, he internalized
    the collectivist values of his heritage—respect for education, discipline, and family cohesion—while assimilating the individualistic, pragmatic ethos of Indiana's community life. Bilingual and bicultural,
    he celebrates Lunar New Year, practices traditional arts like tea ceremony and calligraphy, and enjoys Midwest traditions such as community fairs. This dual cultural lens fuels his curiosity about cross-cultural
    identity and informs his teaching philosophy, which blends Eastern emphasis on holistic learning with Western critical inquiry.
attributes:
  skills: '[''Curriculum Development'', ''Pedagogical Design'', ''Qualitative Research Methods'', ''Academic Writing'', ''Cross-Cultural Communication'', ''Japanese-English Bilingualism'', ''Learning Management
