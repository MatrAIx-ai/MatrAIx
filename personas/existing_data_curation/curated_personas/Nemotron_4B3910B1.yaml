  hobbies: '[''Reading literature'', ''Japanese calligraphy (shodo)'', ''Cooking Asian-fusion cuisine'', ''Hiking in Indiana state parks'', ''Playing piano'', ''Attending indie film festivals'', ''Exploring
    VR educational tools'', ''Participating in community cultural events'', ''Aikido practice'', ''Meditation and journaling'']'
  career_goals: He aims to secure a tenure-track position within the next three years and eventually become department chair, leveraging his competitive drive to shape the humanities curriculum. Balancing
    his curiosity with practical outcomes, he plans to publish a monograph on the East Asian diaspora experience in the American Midwest, obtain a major research grant to develop an interdisciplinary, technology-enhanced
    course on cultural identity, and create community outreach programs that connect the university with local Asian cultural organizations. His long-term ambition includes mentoring junior faculty and
    contributing to institutional governance while maintaining a practical balance between scholarly innovation and teaching excellence.
