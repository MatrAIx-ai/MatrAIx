  hobbies: '[''Photography'', ''Sketching'', ''Theater Workshops'', ''Trivia League'', ''Chess Club'', ''Hiking'', ''Cycling'', ''Fishing'', ''Woodworking'', ''Gardening'', ''Experimental Cooking'', ''Volunteer
    Tech Teaching'']'
  career_goals: William aims to transition into a senior executive role such as Chief Information Officer, where he can shape enterprise-wide digital transformation strategies for a regional organization
    or a mid‑size enterprise. He plans to earn advanced certifications in cybersecurity and cloud architecture to bolster his technical credibility. Passionate about mentorship, he wants to develop a structured
    apprenticeship program for emerging IT talent in Boone County and to partner with local colleges to bridge the digital divide. Ultimately, he envisions launching a boutique consulting firm that helps
    non‑profits and cultural institutions adopt innovative technology solutions, blending his love for art with his managerial expertise.
