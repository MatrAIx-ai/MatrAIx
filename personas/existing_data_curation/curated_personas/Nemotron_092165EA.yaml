  hobbies: '[''Hiking in the Hudson Valley'', ''Landscape and street photography'', ''Visiting art museums and galleries'', ''Reading historical and art-history books'', ''Sketching and drawing'', ''DIY
    woodworking and furniture restoration'', ''Listening to jazz and classical music'', ''Volunteering for small art workshops at community center'']'
  career_goals: Looking ahead, John aspires to transition from hands-on material moving to a supervisory or training role within his warehouse, leveraging his reliability and organizational sense to mentor
    younger workers. He aims to obtain a Certified Safety Trainer credential and to lead safety-culture initiatives that improve injury rates. In parallel, he hopes to allocate more time to his personal
    interest in the arts by organizing small-scale art-themed events for his coworkers or volunteering as a docent at a local gallery. Ultimately, his goal is to achieve a stable, modest retirement while
    continuing to explore creative projects and community involvement.
