persona_description: A statistician for the National Agricultural Statistics Service, Ralph Gann, who uses geographic information systems (GIS) to develop cropland data layer maps for county-level production
  data, and to track over the years how land has been used. He is interested in the value of this data for issues such as land use, water quality, zoning, planning, and deforestation rates. Gann is knowledgeable
  about GIS technology and its use in mapping crop acreages and assessing U.S. crop stress caused by weather. He is also interested in the potential for this data to help the U.S. Department of Agriculture
  administer programs more effectively around the state.
