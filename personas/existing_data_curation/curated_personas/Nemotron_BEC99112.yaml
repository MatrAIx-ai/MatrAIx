  career_goals: Nathaniel aims to formalize his practical expertise by obtaining a GED and enrolling in a vocational certification program for residential construction or home improvement. With a goal of
    financial independence, he plans to launch a small, locally‑focused home repair business that leverages his bilingual abilities to serve both English‑ and Spanish‑speaking clients in Hodgen and surrounding
    communities. He also hopes to mentor younger community members, sharing his practical knowledge while learning new sustainable building techniques.
