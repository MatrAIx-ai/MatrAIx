  hobbies: '[''Hiking'', ''Yoga'', ''Book club'', ''Community theater'', ''Gardening'', ''Cooking'', ''Crafting (knitting and crocheting)'', ''Volunteering at animal shelter'', ''Local festivals'', ''Board
    games and puzzles'', ''Journaling'', ''Traveling'']'
  career_goals: Christen aims to transition into a part‑time role within a nonprofit organization, ideally as a volunteer coordinator or community outreach specialist where she can apply her event‑planning
    and people‑skills. She also wishes to earn a caregiving certification to support her family and potentially offer in‑home assistance services. Another ambition is to launch a modest home‑based venture—such
    as a catering or craft‑workshop business—leveraging her cooking and crafting talents while maintaining flexibility for her family and self‑care. Throughout, she seeks financial stability, personal growth,
    and improved stress management, hoping to model resilience and proactive community involvement for her children and peers.
