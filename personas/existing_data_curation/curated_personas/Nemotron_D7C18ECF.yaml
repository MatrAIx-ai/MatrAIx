  career_goals: Approaching retirement, Haim aims to transition into a senior advisory role where he can mentor emerging managers and shape organizational strategy on a consultancy basis. He hopes to author
    a guide on practical management grounded in data-driven decision making, and to contribute his expertise to local non-profit boards focused on workforce development. His competitive drive also fuels
    a desire to leave a measurable legacy of improved operational efficiency in his current organization before stepping down.
