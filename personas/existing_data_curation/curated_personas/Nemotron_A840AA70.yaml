personas:
  professional: Sandy Maybin is an ambitious middle‑school student who channels their competitive spirit and love for structure into leading the debate club, excelling at logical arguments while juggling
    soccer practice and community service.
  sports: Sandy Maybin is a midfield captain on the Chapin Middle School soccer team, a fervent fan of the Carolina Panthers and the Newberry County High School Tigers football, and spends Saturdays sprinting
    at the local community center’s youth track club while maintaining a disciplined fitness routine.
  arts: Sandy Maybin enjoys winding down after practice by listening to Billie Eilish and Taylor Swift, collects vintage comic books featuring Spider‑Man, and occasionally auditions for the church’s spring
    musical, where they channel the same competitive drive into performing.
  travel: Sandy Maybin prefers well‑planned trips, having explored Charleston’s historic waterfront, a weekend camping excursion in the Blue Ridge Mountains, and a family road‑trip to Washington D.C., while
    dreaming of a future study‑abroad program in London that blends cultural immersion with academic challenge.
  culinary: Sandy Maybin loves home‑style comfort food, especially shrimp and grits, sweet tea, and homemade apple pie, demonstrates beginner‑level cooking by mastering the family’s secret barbecue rub
    recipe, and treats themselves to pizza slices topped with extra pepperoni after a tough debate tournament.
  core: Sandy Maybin is a disciplined, competitive teen who balances soccer, debate, and church service with a dash of anxiety, a penchant for meticulous planning, and occasional sweet‑tooth indulgences.
background:
  cultural: Sandy grew up in Chapin, a small town in Newberry County, South Carolina, where Southern hospitality and close‑knit community values shape daily life. Her family participates in traditional
    gatherings such as church services, porch‑side barbecues, and local high‑school football games, providing her with a sense of belonging while also emphasizing self‑reliance and personal responsibility.
    The rural surroundings and regional emphasis on education and community involvement influence her disciplined outlook and competitive spirit.
attributes:
  skills: '[''Organizational planning and time‑management'', ''Algebra and geometry problem‑solving'', ''Science project coordination'', ''Team leadership in group assignments'', ''Soccer teamwork and strategy'',
    ''Public speaking and debate'']'
  hobbies: '[''Soccer'', ''Debate club'', ''Puzzle solving (Sudoku, logic games)'', ''Journaling'', ''Community service at church youth group'']'
  career_goals: Sandy aims to channel her love of structure and achievement into a career in engineering, hoping to become a civil or aerospace engineer who designs reliable, efficient systems. She plans
    to maintain a top academic record through high school, participate in STEM competitions, and secure a scholarship to a university with a strong engineering program. Long‑term, she envisions leading
    large projects, where her competitive drive and meticulous planning can make a tangible impact.
