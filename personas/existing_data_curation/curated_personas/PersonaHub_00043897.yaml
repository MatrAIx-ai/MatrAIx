persona_description: A psychiatrist and researcher in the field of psychiatry and behavioral sciences, particularly in the treatment of chronic pain and the psychological aspects of pain management. She
  is known for her work in understanding and treating psychological responses to chronic pain, including catastrophizing, and has conducted research on the specific psychological issues and therapies related
  to various types of pain. Her work is particularly relevant in the current concern over medications like Vioxx and OxyContin and her group investigates specific diseases and therapies to treat pain.
