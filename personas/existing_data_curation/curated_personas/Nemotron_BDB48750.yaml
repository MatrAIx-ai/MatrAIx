personas:
  professional: Teodoro Mcmullen, a retired volunteer coordinator turned community historian, blends their decades of event‑planning expertise with a keen eye for visual detail, guiding museum tours and
    mentoring younger craftspeople while still sketching watercolor scenes of the Illinois prairie in their spare time.
  sports: Teodoro Mcmullen follows the Chicago Bears and the Chicago Cubs avidly, paints their garage with the teams' colors for game days, and participates in a senior “walk‑and‑talk” basketball league
    at the community center each spring, though they occasionally skip a practice when a garden emergency arises.
  arts: Teodoro Mcmullen, a devoted watercolorist, regularly attends Steppenwolf Theatre productions and finds inspiration in the works of Andrew Wyeth and Georgia O'Keeffe, while their senior art circle
    debates the merits of contemporary installations by artists like Yayoi Kusama.
  travel: Teodoro Mcmullen prefers relaxed road trips with their grandchildren, having explored Door County’s lighthouses, the historic streets of Galena, Illinois, and a beloved pilgrimage to the National
    Mall, while dreaming of a future visit to the lavender fields of Provence.
  culinary: Teodoro Mcmullen enjoys cooking heirloom tomato bruschetta with fresh basil, a slow‑cooked chicken pot pie using locally sourced butter, and experimenting with spice blends that incorporate
    smoked paprika and nilgiri pepper, though they often leave a stack of dish towels on the countertop, a quirky reminder of their busy hands.
  core: Teodoro Mcmullen, a curious 76‑year‑old gardener and storyteller, balances community service with a love for watercolor, occasionally forgets their own medication schedule, and never passes up a
    chance to share a fresh tomato salad with neighbors.
background:
  cultural: Teodoro was born and raised in the Midwestern heartland, growing up on a modest farm near Spring Grove. His family traces its roots to Irish and German immigrants who settled the region in the
    early 1900s, imparting a strong work ethic and a reverence for community traditions. He was educated in the local public schools, graduating from high school in the late 1940s, and served a stint in
    the U.S. Navy during the Korean War, which broadened his perspective. A lifelong participant in the town's annual county fair and the local Lutheran church, he values modesty, neighborliness, and collective
    well‑being. These Midwestern cultural influences, combined with his personal curiosity, shape his appreciation for both heritage and new ideas.
