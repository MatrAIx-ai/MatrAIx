    and abstract thinking'', ''Basic scripting and automation (e.g., macros)'', ''Basic Spanish communication'']'
  hobbies: '[''Visiting art galleries and museums'', ''Pottery and DIY home-decor projects'', ''Exploring smart-home technology'', ''Arduino and basic electronics tinkering'', ''Improv comedy workshops'',
    ''Community book club'', ''Organizing neighborhood block parties'', ''Hiking in Santa Monica Mountains'', ''Yoga and Pilates'', ''Cooking experimental cuisines'']'
  career_goals: Kathleen is driven to ascend into retail management, aiming first for an assistant store manager role and eventually a district manager position overseeing multiple locations in Southern
    California. She aspires to integrate her technical background to spearhead data‑driven merchandising strategies and develop innovative in‑store experiences that blend technology and art. Long‑term,
    she envisions launching her own boutique that curates tech‑infused art pieces and novelty products, leveraging her creative vision and business acumen. To support these goals, she plans to obtain a
    Certified Retail Manager credential and enroll in a part‑time MBA program.
