  hobbies: '[''fishing'', ''reading historical biographies'', ''genealogy research'', ''church choir volunteering'', ''cooking Southern cuisine'', ''nature walks'', ''checkers'', ''attending local history
    talks'']'
  career_goals: Although officially retired, Willie remains driven by a desire to give back. He aims to mentor local youth in practical trades, preserve oral histories of the African‑American community
    in Horry County, and expand the seniors’ outreach program at his church. Willie also hopes to document family genealogy for future generations and to help establish a community garden that blends traditional
    Southern crops with newer, climate‑resilient varieties. His overarching ambition is to foster intergenerational connections that sustain both cultural heritage and practical knowledge.
