personas:
  professional: Willie Stokes, a retired master carpenter and community volunteer, leverages his decades of woodworking, gardening, and mechanical repair expertise to mentor youth in practical trades while
    coordinating church events, embodying his blend of curiosity, practicality, and compassionate cooperation.
  sports: Willie Stokes enjoys early‑morning fishing at Lake Waccamaw, follows the Carolina Panthers and the Greenville Swamp Rabbits for football and hockey excitement, participates in a senior soft‑ball
    league at the Myrtle Beach Senior Center, and keeps active with weekly nature walks organized by the Horry County Trail Club.
  arts: Willie Stokes volunteers in the church choir where they sing gospel standards by Mahalia Jackson and contemporary hymns by Kirk Franklin, delight in listening to blues legend B.B. King on their
    porch, and regularly attend local performances of the Charleston Symphony Orchestra, finding these artistic experiences woven into their storytelling and community gatherings.
  travel: Willie Stokes prefers relaxed road trips that blend history and nature, having driven to Savannah’s historic district, explored the Charleston plantation museums, and dreaming of a pilgrimage
    to Selma, Alabama, while budgeting travel around fixed‑income constraints and relying on senior discounts.
  culinary: Willie Stokes enjoys preparing Southern comfort dishes like shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie, skillfully seasoning with fresh garden herbs such
    as thyme and rosemary, while their modest cooking skills are complemented by occasional visits to the local seafood market for fresh catches.
  core: Willie Stokes is an 81‑year‑old community pillar who blends practical know‑how, curiosity, and deep compassion to mentor youth, preserve local heritage, and savor simple joys like fishing, choir
    singing, and garden‑fresh meals.
background:
  cultural: Willie was born and raised in a Black family that has lived in the coastal plains of South Carolina for generations. His parents worked in agriculture and later in the local textile mill, instilling
    a strong work ethic and a deep connection to the land. The church has been a central pillar of his upbringing, providing spiritual guidance, communal support, and a venue for cultural expression through
    music and storytelling. Growing up during the civil‑rights era, Willie witnessed both the struggles and the resilience of his community, shaping his compassionate and cooperative nature. Throughout
    his life, he has woven together the traditions of Southern Black culture—such as communal cooking, oral history, and reverence for the outdoors—with a curiosity for new ideas, resulting in a balanced
    blend of heritage and innovation.
