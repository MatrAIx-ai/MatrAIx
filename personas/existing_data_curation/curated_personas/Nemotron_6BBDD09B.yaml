  hobbies: '[''Watercolor painting'', ''Mixed-media abstract art'', ''Poetry writing'', ''Journaling'', ''Rose gardening'', ''Reading contemporary fiction and poetry'', ''Visiting art museums and galleries'',
    ''Listening to bluegrass and jazz music'', ''Playing bridge'', ''Genealogy research'']'
  career_goals: Although retired, Phoenix remains focused on creating a lasting artistic and cultural legacy in Louisville. She aims to complete an illustrated memoir that interweaves her personal narrative
    with the history of her neighborhood, and to curate a traveling exhibition of works created by senior artists from the local community. Additionally, she hopes to mentor emerging artists through workshops
    at the local art center and to serve on the advisory board of the Louisville Historical Society, influencing preservation initiatives.
