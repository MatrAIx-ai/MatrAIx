  career_goals: David is fascinated by roles that combine structure, teamwork, and helping others. He often says he wants to be a teacher or a community coach, picturing himself guiding classmates through
    lessons while keeping the classroom orderly. He also expresses interest in becoming an architect one day because he enjoys building with LEGO and dreaming about designing functional, organized spaces.
