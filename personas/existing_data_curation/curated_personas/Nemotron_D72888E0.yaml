personas:
  professional: A budding junior architect, David Beasley channels disciplined organization and a practical mindset into assembling intricate LEGO models, treating each build like a miniature construction
    project and proudly displaying the finished creations on a meticulously arranged shelf.
  sports: David Beasley thrives in after‑school soccer, where they practice dribbling and teamwork with the school’s Under‑8 Tigers squad, cheer for the local professional soccer club City FC on weekends,
    and enjoy organized games of tag that keep them active year‑round.
  arts: David Beasley delights in the library’s story hour, where they listen to readings of Mo Willems and Dr. Seuss, practice piano scales while humming the melodies of Lang Lang and classic Disney tunes,
    and spend free time drawing characters from Pixar’s Toy Story, weaving literary and musical inspiration into everyday play.
  travel: David Beasley cherishes family road trips to the nearby state park for hiking, has visited the local zoo, dreams of a summer vacation at Disney World, hopes someday to see the Eiffel Tower in
    Paris, and balances these travel aspirations with their parents’ budget constraints.
  culinary: David Beasley favors the comfort of macaroni‑and‑cheese, chicken nuggets, and pepperoni pizza, enjoys snacking on strawberry slices and carrot sticks, and proudly helps stir batter for banana
    pancakes under their mother’s supervision, showcasing a budding interest in simple cooking.
  core: David Beasley blends disciplined LEGO engineering with a love for organized play, maintains a tidy piggy bank, and has a habit of double‑checking homework before bedtime, all while sprinkling in
    spontaneous bursts of tag‑fueled laughter.
background:
  cultural: David grows up in Wadena, a small town in north‑central Minnesota where community and family ties are strong. His family participates in local traditions such as the annual county fair, summer
    4th of July picnics, and winter ice‑fishing trips. The rural Midwestern setting emphasizes hard work, cooperation, and respect for nature, while school and church events reinforce a sense of belonging
    and civic responsibility.
