personas:
  professional: Rachel Blackwood, a 2‑year‑old budding 'store owner' in pretend play, runs a tiny block shop where they organize inventory with surprising precision, balance curiosity about new toys with
    practical price‑tag stickers, and relish friendly competition with peers over who can count change fastest.
  sports: Rachel Blackwood, a high‑energy toddler, enjoys the weekly 'toddler tumble' class at the community center, cheers on the local youth soccer side the Falcons' junior squad, and competes enthusiastically
    in mini‑races on the playground, balancing organized rule‑following with spontaneous sprint bursts.
  arts: Rachel Blackwood, an avid admirer of playful arts, frequently sings along to Laurie Berkner's 'We Are the Dinosaurs', watches Disney's 'Moana' with wide‑eyed fascination, and dabbles in finger‑painting
    to the rhythm of classic Mozart pieces, channeling their sociable exuberance into creative expression.
  travel: Rachel Blackwood, a curious explorer, loves family trips to the nearby aquarium where they stare at starfish, has an adventurous wish to see the Eiffel Tower, prefers spontaneous road‑trip snack
    stops over rigid itineraries, and often asks for a souvenir rock from every destination.
  culinary: Rachel Blackwood, a picky‑yet‑adventurous eater, prefers creamy mac and cheese, banana slices, apple sticks dipped in peanut butter, and occasionally tries hummus on whole‑grain crackers, proudly
    insisting on stirring the pot with a plastic spoon during pretend cooking.
  core: Rachel Blackwood blends relentless curiosity with practical play, thrives on friendly competition, swings between organized block‑building and spontaneous dance, and habitually negotiates snack
    deals with a skeptical eye.
background:
  cultural: Rachel is raised in a white, middle-class family in Connellsville, Pennsylvania, a small town with deep Appalachian roots. Her upbringing reflects the region's emphasis on close-knit family
    ties, community gatherings such as church picnics and local fairs, and a love for outdoor activities like hiking, fishing, and seasonal events. The cultural environment blends modest, practical values
    with a tradition of storytelling, music, and a strong sense of community.
attributes:
  skills: '[''Basic language acquisition'', ''Color and shape identification'', ''Stacking and building with blocks'', ''Simple problem solving'', ''Social interaction and sharing'', ''Early leadership
