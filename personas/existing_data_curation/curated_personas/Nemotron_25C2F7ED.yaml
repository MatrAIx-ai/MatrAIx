personas:
  professional: Retired chemical analyst Alicia Santos leverages her meticulous data-collection and bilingual communication skills to lead health-education workshops at the senior center, where her love
    for routine and practical problem-solving shines through in organized, step-by-step teaching of safe cooking practices.
  sports: Enthusiastic about low-impact exercise, Alicia Santos joins the Chicago Park District’s senior walking club, follows the Chicago Cubs with occasional game-day outings, and practices gentle yoga
    at the community center each spring to maintain mobility.
  arts: Alicia Santos finds inspiration in the soulful blues of Buddy Guy, the Caribbean rhythms of Bob Marley, and the historical novels of Mary Hammond, often listening to vinyl records while crocheting
    blankets for charity.
  travel: Alicia Santos prefers leisurely, well-planned trips, having enjoyed a serene river cruise through the Mississippi Delta, a nostalgic visit to the historic streets of Old San Juan, and dreaming
    of a relaxed retirement getaway to the coastal villages of Portugal.
  culinary: Alicia Santos delights in preparing her signature sancocho with yucca, plantains, and lean pork, alongside a comforting mangú seasoned with butter, onions, and a pinch of thyme from her balcony
    garden, displaying expert-level proficiency in traditional Caribbean cuisine.
  core: Alicia Santos, a 77-year-old former lab analyst, blends scientific precision with a love for routine, cultural cooking, and community service, while battling a habit of worrying about every detail.
background:
  cultural: Alicia was born to Dominican parents who immigrated to the United States in the early 1960s. She grew up in a close‑knit Dominican community in Chicago, where Spanish was spoken at home and
    cultural traditions such as music, dance, and communal meals were central to family life. Her heritage instilled in her a strong sense of family responsibility, hospitality, and pride in Dominican cuisine
    and folklore. While she embraces her American identity, she remains deeply connected to Dominican customs, celebrating holidays like Carnaval and maintaining ties with relatives in the Dominican Republic.
attributes:
  skills: '[''Laboratory analysis'', ''Quality control'', ''Data analysis'', ''Technical writing'', ''Project planning'', ''Mentoring'', ''Spanish-English communication'', ''Traditional Dominican cooking'',
