  hobbies: '[''Herb gardening'', ''Traditional Dominican cooking'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Walking in Grant Park'', ''Attending weekly Mass'', ''Participating in
    Dominican cultural celebrations'', ''Volunteering at senior center'']'
  career_goals: Although retired, Alicia aims to continue sharing her expertise by volunteering as a health‑education mentor at the local senior center, leading cooking workshops that preserve Dominican
    culinary traditions, and documenting her life story for future generations. She also aspires to maintain her own health through regular exercise and mental stimulation, and hopes to become a trusted
    resource for younger members of the Dominican diaspora in Chicago.
