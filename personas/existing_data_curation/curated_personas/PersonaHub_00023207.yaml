persona_description: A historian who is interested in the history of the United States Senate and the relationships between Democratic and Republican presidents. They are particularly interested in the
  specific instances where the Senate has not supported a Democratic president's nominee for the Supreme Court, and how this has affected the outcome of Supreme Court nominations in recent years. They are
  also interested in the broader implications of this pattern for the functioning of the American political system.
