personas:
  professional: Craig Hester, a five-year-old self-proclaimed ‘mini-architect’, spends afternoons meticulously arranging building blocks and sketching simple floor plans, showing early signs of a future
    in structural design while balancing their love for order with occasional spontaneous creativity.
  sports: Craig Hester, a devoted member of the local preschool soccer club, enjoys cheering for the city’s major baseball team during family outings and practices short bursts of sprinting on the playground,
    preferring the predictable routine of weekly games over large, chaotic gatherings, and they feel most energized after a structured practice.
  arts: Craig Hester, an avid fan of The Wiggles and the animated series Bluey, spends evening hours drawing detailed pictures of their favorite characters and humming along to classic children’s songs,
    while occasionally dabbling in finger painting during structured art time at preschool.
  travel: Craig Hester, who loves the mix of adventure and familiarity, enjoys family trips to the nearby beach where they build sandcastles in a set pattern, and dreams of visiting Disney World to meet
    their favorite cartoon heroes, always insisting on packing their stuffed dinosaur for comfort.
  culinary: Craig Hester, who delights in the crunch of chicken nuggets and the creamy comfort of mac and cheese, proudly assists in spreading peanut butter on toast, and knows the exact number of broccoli
    florets they can tolerate on their plate before demanding a fruit snack.
  core: Craig Hester, a five‑year‑old who thrives on routine, quietly asserts independence, and finds comfort in solitary, structured play while they occasionally embrace spontaneous fun.
background:
  cultural: Craig is raised in a white, Midwestern family in Cedar Rapids, Iowa. His upbringing reflects the region’s emphasis on community, modesty, and routine. Family life includes weekly church attendance,
    participation in the local 4‑H club, and regular trips to the Linn County fair where he enjoys farm animal exhibits. The Cedar Rapids public school system and the public library shape his early learning
    experiences. Seasonal celebrations such as Thanksgiving, community holiday parades, and support for local sports teams like the RoughRiders contribute to his sense of identity and belonging.
attributes:
  skills: '[''letter recognition'', ''sight word reading'', ''counting to 20'', ''basic addition with objects'', ''fine‑motor coordination'', ''puzzle solving'', ''following multi‑step routines'', ''routine
    memory'', ''sharing and cooperative play'']'
  hobbies: '[''building with wooden blocks'', ''drawing cars and houses'', ''story‑time at the library'', ''small‑group matching games'', ''nature walks and leaf collection'', ''educational cartoons'']'
  career_goals: Craig often says he wants to become a firefighter because he likes the clear structure, the uniform, and the idea of helping people in a predictable way. He also talks about building houses
    or bridges, so he imagines being a construction worker or builder. His ambitions reflect his love of order, his desire to be useful, and his enjoyment of small‑team cooperation.
