personas:
  professional: Edward Hattery is an enthusiastic 11‑year‑old budding coder who translates their love for building LEGO structures and Scratch programming into early problem‑solving skills, while their
    outgoing nature shines in collaborative school projects and team sports.
  sports: Edward Hattery dribbles for the middle‑school basketball team, kicks for the school soccer squad, and looks up to the New York Knicks and FC Dallas as favorite professional teams, while they stay
    fit with weekend bike rides through the Blue Ridge foothills and a membership at the local community swimming pool.
  arts: Edward Hattery finds rhythm in drumming to the beats of "The Beatles" and Billie Eilish, while they channel their imagination into LEGO creations inspired by the sci‑fi worlds of Isaac Asimov and
    the cinematic visuals of Pixar’s "Wall‑E", and paint Scratch coding art using music from Hans Zimmer.
  travel: Edward Hattery loves weekend road trips to Shenandoah National Park and occasional school field trips to Washington, D.C., and dreams of a summer adventure in the Grand Canyon and a cultural tour
    of Tokyo, preferring group travel with friends or family while they keep a notebook to catalog each new flora, fauna, and landmark.
  culinary: Edward Hattery enjoys pepperoni pizza, chicken tacos with cilantro, and can whip up a quick mac and cheese topped with cheddar and a dash of paprika, while they master fruit smoothies with banana,
    strawberry, and Greek yogurt; although they often forget to brush their teeth after indulging in chocolate chip cookies.
  core: Edward Hattery is an endlessly curious, calm, and socially magnetic 11‑year‑old who balances building intricate LEGO worlds with leading team sports, yet habitually misplaces their Scratch code
    notes under a stack of soccer cleats.
background:
  cultural: Edward grew up in Rutherford College, a small town in Burke County, North Carolina, where community ties and Southern hospitality are strong. His family partakes in traditional gatherings, church
    events, and regional celebrations that feature home‑cooked meals and local music. While rooted in these customs, Edward is also exposed to a broader cultural mix through school programs, technology
    clubs, and media, giving him an appreciation for both his regional heritage and contemporary ideas. This blend shapes his identity as a confident, adaptable young person who values cooperation, responsibility,
    and the practical application of new knowledge.
