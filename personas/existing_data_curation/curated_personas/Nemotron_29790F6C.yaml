  career_goals: Edward dreams of becoming an engineer or environmental scientist who designs sustainable solutions for his community. He wants to join a robotics club, deepen his coding skills, and eventually
    study engineering in high school and college. He envisions a career where he can lead projects that combine technology with practical improvements for rural life, such as creating tools for local farms
    or developing community recycling initiatives. In the long term, Edward hopes to mentor younger students, sharing his love for collaborative learning and practical invention.
