personas:
  professional: Erica Arce, a seasoned educational guidance specialist with over thirty years of experience designing career counseling programs, leverages data-driven assessments like the Strong Interest
    Inventory and MBTI while blending empathetic listening with pragmatic problem‑solving to mentor students and adult learners alike, and now pursues a senior advisory role to spearhead a county‑wide career
    readiness initiative.
  sports: Erica Arce follows the Iowa Hawkeyes football team, enjoys catching Iowa Cubs games at Principal Park, participates in the Iowa City Running Club’s spring 5K, and maintains her own low‑impact
    fitness routine through morning walks in the university arboretum and seasonal gardening.
  arts: Erica Arce weaves her love for storytelling into quilting projects inspired by Grandma Moses’s folk motifs, devours historical novels by Philippa Gregory, and listens to the folk‑rock tones of Bob
    Dylan and the classical piano works of Aaron Copland while occasionally attending performances at the historic Englert Theatre.
  travel: Erica Arce favors low‑key road trips to Midwestern towns such as Decorah and Cedar Rapids for genealogical archives, occasional weekend retreats to the Badlands, and dream voyages to Ireland’s
    County Kerry to trace ancestral roots, planning most itineraries on a whim while balancing a modest retirement budget.
  culinary: Erica Arce, an adept home gardener, cooks farm‑to‑table meals like roasted heirloom carrots with thyme and sage, sauerkraut‑infused pork chops, and a tangy apple crumble featuring locally harvested
    apples, and occasionally experiments with sourdough made from a spelt starter and fresh basil pesto.
  core: Erica Arce blends a curious, pragmatic mindset with a relaxed, slightly disorganized lifestyle, channeling her competitive streak into mentorship while quietly savoring solitary moments in her garden,
    books, and quilt‑room.
background:
  cultural: Erica identifies with a Midwestern White American cultural background rooted in Iowa City and the broader Johnson County region. Her family heritage includes German and Irish ancestry, which
    has fostered a respect for hard work, community service, and modesty. Growing up in a college town, she was exposed to academic and cultural diversity, yet she maintains strong ties to local traditions
    such as seasonal farmers' markets, community volunteering, and a pragmatic, self‑reliant approach to problem‑solving. These influences shape her worldview, emphasizing collaborative community engagement,
    a balanced appreciation for both tradition and innovation, and a preference for small‑group interactions.
attributes:
  skills: '["Career counseling", "Student development", "Individual and small‑group counseling", "Assessment tool administration (Strong Interest Inventory, MBTI)", "Program design and evaluation", "Crisis
    intervention", "Community outreach", "Public speaking", "Data analysis for student outcomes", "Adult learning theory", "Resource coordination"]'
  hobbies: '["Gardening (vegetable and native flowers)", "Birdwatching", "Reading historical fiction and nonfiction", "Local history research", "Quilting circle", "Crossword puzzles", "Chess", "Volunteer
    mentor for adult learners", "DIY home projects", "Sustainable‑living workshops"]'
  career_goals: Erica aims to move into a senior advisory role within the Johnson County school district, where she can lead the development of a county‑wide career readiness initiative for high‑school
    graduates and adult learners. She plans to mentor junior counselors, integrate technology‑enhanced assessment platforms, and author a guide on career transitions for mid‑life professionals. Over the
    next five years she hopes to complete a master’s degree in counseling and obtain state certification in school counseling, positioning herself for a future part‑time consulting practice that supports
    rural schools across Iowa while maintaining the flexibility she values.
