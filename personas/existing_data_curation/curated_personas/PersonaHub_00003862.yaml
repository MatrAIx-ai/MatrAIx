persona_description: A psychologist who conducts research on sibling bullying and its effects on children, particularly in the context of school and home environments. The individual is interested in understanding
  the underlying factors that contribute to sibling bullying and its impact on children's well-being, and is seeking to develop effective interventions to prevent and reduce sibling bullying. The persona
  is likely to have expertise in developmental psychology, social psychology, and the study of human behavior. They may have conducted research on sibling relationships, sibling aggression, and sibling
  victimization, and have published their findings in peer-reviewed journals. The persona may also have experience working with children and families, and may be involved in developing programs and policies
  to address sibling bullying.
