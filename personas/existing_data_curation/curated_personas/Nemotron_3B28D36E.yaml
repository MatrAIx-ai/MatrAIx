  hobbies: '[''hiking'', ''gardening'', ''cooking'', ''volunteering at the public library'', ''book club'', ''community theater'', ''crafting (knitting, scrapbooking)'', ''photography'']'
  career_goals: Although she is not currently employed, Chandra aims to expand her leadership role in local community initiatives. She plans to launch a neighborhood garden program that partners with schools
    and senior centers, seek a certification in horticulture to deepen her expertise, and eventually mentor younger volunteers. She also hopes to turn her love for cooking into occasional workshops or a
    small pop-up supper club that brings neighbors together.
