persona_description: A scientist or researcher who specializes in the field of toxicology, particularly in the study of the evolution and genetics of poisonous fungi and their toxins. They are interested
  in understanding how unrelated fungi produce the same deadly toxins using variations of the same pathway, and how this evolutionary process has led to the diversification of toxic cyclic peptides. They
  are also interested in the genetics and diversity of the amanitin biosynthetic pathway in poisonous mushrooms, and how this pathway has evolved through horizontal gene transfer.
