personas:
  professional: Alton Lankford is a data‑driven B2B sales leader who blends strategic negotiation, advanced analytics, and artistic storytelling to close multi‑state wholesale deals, while leveraging their
    calm resilience and sociable charisma to mentor teams and champion inclusive sales cultures.
  sports: Alton Lankford follows the Tampa Bay Buccaneers and the Lightning, plays recreational tennis at the Westshore Club, joins a weekend cycling group through the Hillsborough Trail, and treats early
    morning nature walks as both cardio and meditation.
  arts: Alton Lankford curates his own abstract canvases inspired by Pollock, captures vibrant street scenes of Lutz with a Fuji X‑Pro series, attends quarterly exhibitions at the Tampa Museum of Art, and
    cites Banksy and Marina Abramović as creative influences.
  travel: Alton Lankford plans meticulous getaways, favoring boutique B&Bs in Savannah, art‑focused tours of Barcelona, and an annual pilgrimage to Kyoto's contemporary galleries, balancing adventure with
    budget‑conscious travel savings.
  culinary: Alton Lankford enjoys cooking Mediterranean mezze, perfecting shrimp scampi and key‑lime pie for his monthly dinner parties, and collects fresh basil, pine nuts, and smoked paprika to flavor
    his dishes, yet often forgets to defrost the steak in time.
  core: Alton Lankford merges strategic sales mastery, artistic curiosity, community spirit, and a calm, organized mindset into a life that constantly balances data‑driven ambition with creative expression
    and generous hospitality.
background:
  cultural: Alton grew up in a close‑knit African American family in Central Florida, where the values of resilience, community service, and cultural pride were emphasized. He was immersed in the rich heritage
    of Black Florida—celebrating Juneteenth, attending gospel choirs at his local church, and enjoying soul food traditions passed down through generations. This background fostered a deep respect for African‑American
    art, music, and storytelling, which now informs his creative approach to sales and his commitment to mentorship. Active in local Black business associations, Alton leverages his cultural network to
    support economic empowerment initiatives and to bring diverse perspectives to the wholesale industry.
