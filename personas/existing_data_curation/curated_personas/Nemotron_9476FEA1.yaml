  career_goals: Alton aims to advance into senior sales leadership within the next five years, targeting a Regional Sales Manager role that will allow him to shape strategy for a multi‑state wholesale network.
    His long‑term ambition is to become Director of Sales, where he can champion inclusive, data‑driven sales practices and launch mentorship programs for underrepresented talent. He also dreams of eventually
    founding his own boutique consulting firm that helps small manufacturers integrate creative branding and community‑focused sales approaches. Throughout his career progression, Alton is committed to
    maintaining ethical standards, driving sustainable growth, and giving back to his community through corporate social responsibility initiatives.
