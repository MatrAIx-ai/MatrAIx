  hobbies: '[''Cooking Peruvian cuisine'', ''Gardening'', ''Beach walks'', ''Attending cultural festivals'', ''Playing dominoes'', ''Salsa dancing'', ''Reading historical biographies'', ''Woodworking'',
    ''Volunteering at community center'']'
  career_goals: Although retired from formal employment, Leonel aims to stay actively engaged in his community. He plans to continue volunteering at the local senior center, lead cooking workshops that
    showcase authentic Peruvian dishes, and mentor grandchildren and neighborhood youth about cultural heritage and practical life skills. He also hopes to document his life story in a memoir that blends
    personal memories with Peruvian history, and to maintain his health through regular walks and balanced nutrition so he can remain a reliable presence for his family.
