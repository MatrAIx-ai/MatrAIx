  hobbies: '["Reading (science fiction, mystery, marine biology)", "Beach walks and birdwatching", "Digital photography of nature", "Journaling and creative writing", "Knitting and crochet", "Digital illustration
    on tablet", "Self‑guided learning of coding and photo‑editing"]'
  career_goals: Sidney aims to first obtain her GED within the next year, recognizing that a formal credential will open doors to further education and employment. She is interested in pursuing a community‑college
    program in graphic design or digital media, where she can blend her visual eye with her technical skills. Her long‑term ambition is to work remotely as a freelance illustrator or a digital content creator,
    allowing her to maintain a quiet, solitary work environment that aligns with her preference for minimal social interaction. She also dreams of eventually launching a modest online shop for handcrafted
    items like knitted scarves and printed photo art, providing both creative fulfillment and financial independence.
