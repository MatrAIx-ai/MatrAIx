personas:
  professional: Sidney King, a 17‑year‑old budding digital media enthusiast, blends a meticulous eye for visual composition with basic HTML/CSS skills to craft small personal websites showcasing their photography,
    knitting designs, and short stories, while leaning on their organized work habits and preference for solitary, low‑pressure projects.
  sports: Sidney King embraces low‑impact fitness through sunrise beach walks, occasional paddle‑boarding at the local marina, and membership in a coastal bird‑watching club that meets on weekends, while
    cheering quietly for the New England Patriots football team and the Boston Red Sox baseball club during game seasons.
  arts: Sidney King cultivates a quiet artistic life by stitching hand‑knit scarves while listening to Sufjan Stevens, drawing digital illustrations inspired by the serene palettes of Claude Monet, photographing
    tide pools in the style of Ansel Adams, and devouring the speculative worlds of Ursula K. Le Guin and Octavia Butler in late‑night reading sessions.
  travel: Sidney King prefers low‑key, self‑planned trips that blend nature and solitude, such as weekend getaways to the historic lighthouses of Cape Cod, annual summer visits to the Outer Banks, and a
    bucket‑list longing to hike the basalt shores of Iceland’s Snæfellsnes Peninsula, always saving travel funds through meticulous budgeting.
  culinary: Sidney King, a novice cook with a penchant for coastal flavors, regularly prepares baked cod with lemon‑zest and fresh dill, quick shrimp scampi tossed with garlic, butter, and parsley, and
    stews hearty clam chowder using sea‑salted potatoes, corn, and smoked bacon, while occasionally baking oat‑brown‑sugar scones to accompany their apricot tea, reflecting a modest but steadily growing
    kitchen confidence.
  core: Sidney King is a solitary, detail‑oriented teen who balances a love for quiet creativity—knitting, photography, and sci‑fi storytelling—with a meticulous habit of over‑organizing their planner,
    a tendency to forget social commitments, and a quiet ambition to turn their coastal inspirations into a remote freelance career.
background:
  cultural: Sidney is a white American who grew up in Fort Lauderdale, Broward County, Florida. Her upbringing reflects a typical suburban middle‑class lifestyle, with participation in common American holidays,
    school events, and family gatherings. Living in a multicultural coastal city, she has been exposed to the diverse flavors of Southern Florida, including Latin and Caribbean music, cuisine, and occasional
    community festivals, though her personal cultural practices remain rooted in mainstream U.S. traditions. The proximity to the ocean and the laid‑back beach culture has fostered her love for marine environments
    and outdoor activities, while her family’s emphasis on self‑reliance and personal responsibility has reinforced her practical, solitary nature.
attributes:
  skills: '["Basic computer proficiency (Microsoft Office, Google Suite)", "Digital photography and light editing (Adobe Lightroom)", "Organizational planning and time management", "Creative writing and
