persona_description: A Health and Wellness Educator who is passionate about promoting mental health awareness and reducing the stigma associated with mental illness. This individual is dedicated to providing
  comprehensive sex education programs in schools and is familiar with the revised AB329 California Healthy Youth Act. They have a strong understanding of immunization requirements and are knowledgeable
  about the Conditional Entry Decision Tool for TK/K-12. Additionally, they are interested in the topic of body image/self-esteem, sexually transmitted infections (STIs), and bullying, and have a deep interest
  in the San Francisco Public Health agency's Conditional Entry Decision Tool for students missing doses of vaccines.
