  hobbies: '["Watercolor painting", "Sketching", "Quilt making", "Simple woodworking", "Playing harmonica", "Listening to folk/country music", "Visiting local museums and historic sites", "Nature photography",
    "Reading mystery novels", "Gardening (native wildflowers)"]'
  career_goals: As she approaches retirement, Diane aims to transition her extensive experience into a community-focused role. She plans to open a modest home‑based after‑school arts program that blends
    her love of creative expression with early childhood development, providing a low‑stress environment for local children. She also hopes to mentor younger childcare staff, share practical techniques
    through informal workshops, and secure a small grant to support free art supplies for families in need. Ultimately, she wants to leave a lasting, nurturing legacy in Marlin while ensuring financial
    stability for her family.
