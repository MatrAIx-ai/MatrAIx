personas:
  professional: Joaquin Ruizrios, a seasoned hairdresser with mastery in precision cutting, balayage, and event styling, leverages their bilingual fluency and methodical salon management skills to create
    a welcoming, impeccably organized space that reflects their blend of practicality and vibrant social energy.
  sports: Joaquin Ruizrios stays fit through thrice‑weekly strength training at the local gym, vibrant Thursday‑night salsa dance classes, and weekend pick‑up soccer with the Universal City Community Sports
    Club, while passionately cheering for the Los Angeles Lakers in basketball season and supporting the LA Galaxy during the MLS campaign.
  arts: Joaquin Ruizrios channels creativity into acoustic guitar sessions, often covering songs by John Mayer and Ed Sheeran, frequents intimate live‑music venues such as The Velvet Lounge, and draws inspiration
    from contemporary directors like Alejandro González Iñárritu, weaving cinematic storytelling into their salon’s aesthetic.
  travel: Joaquin Ruizrios prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored the historic plazas of Seville, danced the nights away in Miami’s salsa streets,
    and unwound on Caribbean beaches, while dreaming of culinary tours in Oaxaca and boutique‑hotel stays in Kyoto.
  culinary: Joaquin Ruizrios enjoys cooking island‑inspired comfort meals—such as coconut‑infused rice with plantains, braised pork seasoned with adobo spices, and vibrant seafood stews—showcasing a proficient
    skill level that allows them to host lively dinner gatherings where friends savor the fragrant blend of tropical herbs, citrus, and smoked paprika.
  core: Joaquin Ruizrios merges meticulous organization with spontaneous salsa flair, expertly balancing a demanding salon career, DIY home projects, and vigilant budgeting, yet their tendency to over‑worry
    fuels midnight spreadsheet checks and occasional indulgent splurges on high‑end grooming gear.
background:
  cultural: Joaquin was born to Puerto Rican parents and grew up immersed in the island's rich traditions of music, food, and family gatherings. Bilingual in Spanish and English, he carries forward the
    lively spirit of salsa, bomba, and plena while adapting to the multicultural environment of Bexar County, Texas. He celebrates holidays such as Three Kings Day and shares Puerto Rican culinary favorites
    like arroz con gandules with his friends. His cultural roots inform his warm, community‑focused approach to client service and his desire to mentor young Latino stylists, blending island heritage with
    the Texan work ethic.
