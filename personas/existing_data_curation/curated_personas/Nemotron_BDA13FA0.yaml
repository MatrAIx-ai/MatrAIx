  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Gym and strength training'', ''Playing acoustic guitar'', ''Volunteering at community centers'', ''Reading self‑help and mindfulness books'',
    ''Home DIY projects'', ''Attending local music festivals'']'
  career_goals: Joaquin aims to open his own boutique salon in Universal City that reflects his organized approach and vibrant cultural background. He plans to earn a master stylist certification and eventually
    become a certified cosmetology instructor, offering workshops for aspiring stylists, especially from the Latino community. He also hopes to develop a line of haircare products inspired by Puerto Rican
    natural ingredients, and to achieve a stable work-life balance that reduces his stress while providing for his family.
