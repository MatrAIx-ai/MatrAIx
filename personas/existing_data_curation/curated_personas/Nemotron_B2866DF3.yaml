personas:
  professional: Jose Negron, a 15‑year‑old aspiring visual storyteller, merges sketching, digital art, and stop‑motion animation to craft experimental narratives, leveraging their vivid imagination and
    collaborative spirit to lead after‑school art projects.
  sports: Jose Negron, a 15‑year‑old enthusiastic soccer player, joins the neighborhood park’s informal Saturday league, proudly supports the city’s Lions football team, and occasionally tries skateboarding
    at the community skate park to stay active.
  arts: Jose Negron, a 15‑year‑old art enthusiast, spends evenings sketching characters inspired by the surreal style of James Jean while vibing to indie electronic tracks by Caribou and participates in
    drama club improv sessions that echo the playful energy of Lin‑Manuel Miranda’s productions.
  travel: Jose Negron, a 15‑year‑old curious traveler, prefers spontaneous day trips to nearby beaches and cultural festivals, has already explored the historic old town of their city and a school‑organized
    visit to Washington, D.C., and dreams of wandering Berlin’s vibrant street‑art districts someday.
  culinary: Jose Negron, a 15‑year‑old budding cook, loves crafting simple tacos with fresh cilantro and lime, experimenting with homemade salsa, and even attempts quirky fusion dishes like taco‑filled
    ramen, though they often neglect to clean the kitchen afterward.
  core: Jose Negron, a 15‑year‑old imaginative whirlwind, blends art, sport, and community rhythm into a lively, slightly chaotic life that thrives on spontaneity and creative collaboration.
background:
  cultural: 'Jose is a first‑generation Mexican‑American raised in Menifee, California, immersed in a bilingual household where Spanish and English intertwine. His family maintains strong ties to Mexican
    traditions—celebrating Día de los Muertos, enjoying tamales during holidays, and valuing community solidarity—while also embracing the multicultural vibe of Southern California. These dual influences
    shape his worldview: he respects his heritage, participates in local Latino youth programs, and draws artistic inspiration from both Mexican folk art motifs and contemporary Californian street culture.'
