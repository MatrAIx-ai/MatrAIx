  career_goals: His ambition is to become a professional visual storyteller—whether as a concept artist for video games, an animator, or a freelance illustrator—allowing him to merge his love for novelty,
    art, and abstract ideas. He hopes to attend a design program after high school, but prefers flexible, project‑based work that lets him explore different media. He also dreams of using his artistic talent
    to celebrate and share Mexican cultural narratives with wider audiences, perhaps through community murals or cultural event design.
