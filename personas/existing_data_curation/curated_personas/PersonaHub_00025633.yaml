persona_description: A historian who specializes in the study of ancient civilizations, particularly the Greeks and Romans. His research interests include the history of the city of Constantinople, the
  city of Alexandria, and the temple of knowledge in Egypt. He is particularly interested in the destruction of these ancient institutions during the rise of the Ottoman Empire and the subsequent loss of
  knowledge. He is also knowledgeable about the history of the Jaffna Library and the Institut für Sexualwissenschaft, and has a deep understanding of the events that led to the destruction of these institutions.
