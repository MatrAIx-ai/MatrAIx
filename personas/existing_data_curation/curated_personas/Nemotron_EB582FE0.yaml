  hobbies: '["Visiting Art Galleries and Museums","Digital Photography","Collecting Vintage Cameras","Woodworking","Gardening","Experimental Cooking","Reading Art History and Philosophy","Strategy Board
    Gaming","Attending Local Lectures and Workshops","Nature Hiking","Reflective Journaling"]'
  career_goals: Jeremy aims to translate his disciplined organizational talent and love for the arts into a part‑time role as a community arts coordinator, eventually seeking certification in arts administration.
    He envisions establishing a small, volunteer‑run gallery space in Henrico that showcases emerging local artists and provides educational workshops. Over the next five years, he hopes to secure grant
    funding to sustain the gallery, develop a mentorship program for youth interested in visual arts, and perhaps publish a curated collection of his photography paired with essays on unconventional artistic
    movements.
