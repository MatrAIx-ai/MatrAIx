persona_description: A gender-inclusive educator who is passionate about changing the stories we tell about women, gender, and power in classrooms and beyond. They are committed to rewriting educational
  policy and learning standards to include rich and intersectional material on women and gender, and are dedicated to building an online database of resources and offering workshops to give educators the
  tools and skills they need to teach about women and the complex, intersectional history of gender roles. They are also working to build supportive communities through strategic partnerships, social media,
  and events that connect young women and girls with thoughtful adults of all genders who can help them thrive and succeed beyond school in their personal and professional lives.
