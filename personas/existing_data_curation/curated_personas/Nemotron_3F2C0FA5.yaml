  hobbies: '[''Foraging wild edibles'', ''Herb gardening'', ''Reading food history and nutrition'', ''Experimental home cooking'', ''Food photography'', ''Hiking'', ''Mindfulness meditation'', ''Woodworking'',
    ''Listening to traditional Native American music'', ''Culinary podcast listening'']'
  career_goals: Illia aims to open a modest farm‑to‑table restaurant in Ladysmith that showcases contemporary takes on traditional American Indian dishes, highlighting locally foraged herbs, wild rice,
    and seasonal game. He aspires to earn a Certified Culinary Manager credential to formalize his leadership skills, develop a line of signature spice blends rooted in his heritage, and become a mentor
    for youths in the tribal community interested in culinary arts. While pursuing these ambitions, he seeks to maintain a schedule that preserves his need for solitude and low‑stress environments, allowing
    him to balance professional growth with personal wellbeing.
