persona_description: A hydrologist who is interested in understanding the factors that control the generation of stormflow in mountainous headwaters with high annual precipitation amounts. The hydrologist
  is particularly interested in the role of pre-event water contributions, which can vary greatly within short distances between neighboring headwaters and events, and the factors that determine the contribution
  of event water and pre-event water to stormflow. The hydrologist is looking for ways to improve our understanding of these factors and to better predict the generation of stormflow in these headwaters.
