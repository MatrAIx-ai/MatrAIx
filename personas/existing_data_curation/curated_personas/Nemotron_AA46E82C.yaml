personas:
  professional: Scott White is a senior mechanical engineer specializing in commercial HVAC design, drawing on over twenty years of field experience and mastery of AutoCAD, Revit, and SolidWorks to deliver
    code‑compliant, energy‑efficient solutions while they lead interdisciplinary teams with a compassionate, structured yet adaptable style.
  sports: Scott White is an avid sailor on Biscayne Bay, a weekend angler at local marinas, a member of the Coral Reef Yacht Club, a casual cyclist on the Miami Beach boardwalk, and a loyal fan of the Miami
    Heat and Miami Marlins, and they often integrate their love of water sports with team spirit.
  arts: Scott White enjoys building detailed model ships in a home workshop, reads science‑fiction authors like Neal Stephenson and Octavia Butler, listens to Cuban jazz legends such as Buena Vista Social
    Club alongside indie rock acts like Tame Impala, and they attend the Wynwood Art Walk each quarter, finding creative inspiration in both literature and music.
  travel: Scott White prefers carefully planned trips that combine sustainable exploration and relaxation, having recently sailed to the Bahamas, road‑tripped the Florida Keys, and booked a future eco‑tour
    of Iceland’s geothermal sites, all while they use airline miles and family budget constraints to maximize value.
  culinary: Scott White experiments with Cuban and Caribbean cuisine at home, perfecting dishes like Ropa Vieja, Jerk Chicken, Plantain Mofongo, and Coconut Rice, while they source fresh fish from local
    docks and rely on ingredients such as mango, scotch bonnet peppers, and plantains to bring Miami’s vibrant flavors to the table.
  core: Scott White blends a structured engineering mindset with spontaneous sailing adventures, model‑ship craftsmanship, and a deep compassion for community housing projects, even as they wrestle with
    occasional deadline procrastination and a penchant for late‑night espresso.
background:
  cultural: Scott was born and raised in a middle‑class white family in Ohio, where he absorbed Midwestern values of diligence, community, and modesty. Relocating to Miami in his early twenties, he embraced
    the city’s multicultural vibrancy, learning conversational Spanish and participating in local festivities such as Calle Ocho and Carnaval. While he continues to celebrate traditional American holidays
    like Thanksgiving and Christmas, his cultural identity now blends his Midwestern roots with a deep appreciation for the Hispanic and Caribbean influences that shape everyday life in South Florida.
