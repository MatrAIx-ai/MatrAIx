  career_goals: Scott aims to earn his Professional Engineer (PE) license and move into a senior engineering management role where he can shape sustainability initiatives for Miami’s coastal infrastructure.
    He is passionate about leading projects that enhance flood resilience and reduce carbon footprints, and he wants to embed collaborative, people‑centered practices into corporate culture. Long‑term,
    he hopes to mentor the next generation of engineers and expand his pro‑bono consulting work with Habitat for Humanity to provide low‑cost, energy‑efficient housing for underserved communities.
