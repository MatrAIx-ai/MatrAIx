persona_description: A construction professional with expertise in concrete construction, particularly in the application of epoxy terrazzo. He has experience dealing with problems related to the migration
  of moisture into concrete slabs and has a background in investigating and resolving issues involving osmotic blistering. He is knowledgeable about the potential solutions to reverse the migration of moisture
  in the slab, such as drying the fill course beneath the slab, and has conducted tensile bond tests of the applied system in affected areas. He is likely to be familiar with subslab radon mitigation systems
  and has experience using coring vent holes, tenting, and special dehumidification units to remove moisture from the fill course.
