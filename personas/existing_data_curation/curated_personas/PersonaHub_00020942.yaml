persona_description: A professional lighting designer who specializes in the integration of LED lighting technology into various applications, such as street and roadway lighting, pathway lighting, parks
  lighting, parking lot lighting, perimeter lighting, and security lighting. They are knowledgeable about the physics behind LED lighting and have a keen understanding of the guidelines set by the International
  Illuminating Engineering Society (IES). They are skilled in selecting the highest quality LED lighting for illumination and have experience in custom-wiring LED luminaires to work with solar products.
  They are also familiar with the testing standards set by the International Electrotechnical Commission (IEC) and have a 10-year limited fixture warranty for their fixtures.
