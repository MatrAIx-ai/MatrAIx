persona_description: A scientist and researcher who specializes in the study of Saturn's auroras and the relationship between the planet's radio emissions and the solar wind. He is particularly interested
  in understanding the magnetic field around Saturn and its response to the solar wind, and has contributed to the discovery of lightning on Saturn, the rotation rate of Saturn's radio signals, and the
  detection of radio sounds from space. He has also been involved in the development of the Cassini spacecraft and the RPWS instrument.
