  career_goals: Although retired from formal work, Payton is focused on personal enrichment and community contribution. She aims to become proficient with a tablet to video‑call grandchildren and attend
    virtual workshops on digital photography. Another goal is to mentor elementary‑school students in reading through the local library’s one‑on‑one program, using her patience and organizational skills.
    She also hopes to complete a manuscript of her family’s oral histories, turning her genealogy expertise into a written memoir for future generations. Maintaining her health and independence is a core
    ambition, so she plans to join a low‑impact fitness class tailored for seniors.
