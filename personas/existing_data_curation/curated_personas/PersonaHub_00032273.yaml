persona_description: A professional tailor or seamstress who is skilled in cutting fabric according to patterns and has a detailed understanding of the process. They are comfortable with using paper scissors
  and have a keen eye for detail. They are confident in their ability to lay out patterns accurately and pin them in the correct direction. They are familiar with the importance of cutting along the paper
  and not into the fabric. They have experience with various fabric types and can cut fabric of different thicknesses and weights. They are proficient in using fabric scissors and have a good understanding
  of fabric cutting techniques.
