personas:
  professional: Michael Maharaj is a hospitality‑focused event coordinator with a knack for digital marketing, who leverages strong interpersonal skills and practical curiosity to orchestrate community
    gatherings while pursuing a business degree and eyeing a managerial role at an Atlantic City casino.
  sports: Michael Maharaj is an avid pickup basketball player at the Atlantic City community center, a devoted fan of the New York Knicks and New Jersey Devils, and a seasonal hiker who joins local Pine
    Barrens trail groups while occasionally missing weekday gym sessions due to DJ commitments.
  arts: Michael Maharaj spins records as a home DJ inspired by Sean Paul and DJ Khaled, frequents boardwalk concerts featuring The Beach Boys and the local reggae band Rootz, and participates in salsa dance
    classes that fuel their social energy and creative expression.
  travel: Michael Maharaj prefers weekend getaways that blend adventure and relaxation, such as hiking the Pine Barrens, exploring New York City’s culinary scene, and planning a future trip to the Jamaican
    Blue Mountains to research authentic spice blends for their cooking.
  culinary: Michael Maharaj experiments with Caribbean‑inspired dishes like jerk chicken, goat curry, and conch fritters, enjoys fine‑tuning pineapple‑salsa, and boasts moderate cooking skills that shine
    at friend gatherings where they blend bold spices with local Atlantic City seafood.
  core: Michael Maharaj is a sociable, curiosity‑driven hospitality enthusiast who balances event‑planning ambition with weekend basketball, DJ spin‑offs, and a relentless quest for Caribbean flavors, all
    while juggling a budding business degree and occasional impulse splurges.
background:
  cultural: Michael identifies as African‑American with Afro‑Caribbean roots, tracing part of his family heritage to Trinidad and Tobago. Growing up in Atlantic City, he was immersed in a multicultural
    environment that blends Black American cultural traditions—such as hip‑hop, soul food, and celebrations of Juneteenth and Kwanzaa—with Caribbean influences like reggae, calypso, and festive street foods.
    This hybrid background shapes his outlook, fostering a deep appreciation for community gatherings, diverse culinary tastes, and the vibrant, resilient spirit of both his Black and Caribbean ancestors.
