  career_goals: Michael aims to finish a bachelor’s degree in business administration while gaining a managerial role in the hospitality or tourism industry, ideally within an Atlantic City casino or resort.
    He aspires to develop advanced digital marketing expertise and eventually launch his own boutique event space that caters to both local residents and tourists. Long‑term, he hopes to mentor at‑risk
    youth in his community, using his networking skills to create pathways to employment and personal development.
