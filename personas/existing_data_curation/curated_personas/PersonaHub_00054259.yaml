persona_description: A beef cattle expert who specializes in breeding soundness examinations and the fertility of Tennessee herd bulls. He has conducted research on the effects of cold weather on bull fertility
  and has developed strategies to ensure that producers have access to breeding soundness examinations for their bulls. He is knowledgeable about the importance of physical condition, skeletal soundness,
  and other factors that affect reproductive performance, and he is committed to providing information and resources to help producers make informed decisions about their breeding programs.
