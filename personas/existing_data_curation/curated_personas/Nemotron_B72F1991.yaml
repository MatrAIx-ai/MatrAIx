  hobbies: '[''kayaking'', ''hiking'', ''cycling'', ''home gardening'', ''attending music festivals'', ''playing acoustic guitar'', ''craft‑beer tasting'', ''reading culinary history'', ''home brewing'',
    ''volunteering at food bank'']'
  career_goals: Allen aims to become the head chef of a boutique restaurant that showcases the bounty of northern Michigan while integrating fusion elements he discovers through travel and research. Over
    the next five years, he hopes to spearhead a farm‑to‑table concept that partners with local growers and fishermen, eventually opening his own small bistro that doubles as a community kitchen offering
    cooking workshops. He also aspires to mentor junior cooks, develop a seasonal tasting menu that garners regional recognition, and possibly collaborate with local breweries for food‑pairing events.
