persona_description: A historian or maritime enthusiast who is interested in the history of European voyages and encounters in the Pacific during the eighteenth century. They are particularly drawn to the
  accounts and interpretations of the voyage by James Cook, Joseph Banks, and Sydney Parkinson, and are seeking to compare and contrast their perspectives. They are also interested in the historical documents
  and images related to the voyage, as well as the literary works that captured the imagination of Europeans during the second-half of the eighteenth century. They are likely to be familiar with the works
  of William Falconer and interested in the complexities of eighteenth-century navigation.
