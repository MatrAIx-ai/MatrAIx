  hobbies: '[''Playing soccer in community league'', ''Salsa and merengue dancing'', ''Volunteering at local community center'', ''Exploring historic St. Augustine'', ''Kayaking along the coast'', ''Cooking
    Honduran cuisine'', ''Photography of architecture'', ''Listening to Latin music'', ''Attending cultural festivals'', ''Reading about technology trends'']'
  career_goals: Paulino aims to transition from an administrative assistant to an office manager within the next three years. He plans to earn the Certified Administrative Professional (CAP) credential
    and complete an associate degree in Business Administration at a local community college. Leveraging his bilingual skills, he aspires to lead administrative operations for a nonprofit organization that
    serves the Hispanic immigrant community in Northeast Florida. He also seeks to develop project‑coordination expertise, eventually overseeing community outreach programs that combine his organized work
    style with his passion for cultural advocacy. Long‑term, he envisions a senior operations role where he can mentor junior staff and shape efficient, inclusive workplace practices.
