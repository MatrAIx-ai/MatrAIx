personas:
  professional: Joshua Lee is an aspiring digital storyteller and UX design intern‑in‑training who blends curiosity, meticulous organization, and a collaborative spirit to craft socially‑driven visual narratives
    using Adobe Photoshop, Illustrator, and front‑end web tools for nonprofit initiatives.
  sports: Joshua Lee is a casual runner and avid hiker who joins the Asheville Trail Club for weekend treks up the Blue Ridge, while cheering on the Carolina Panthers in the NFL and following Asheville
    City SC’s soccer matches for a local sports fix.
  arts: Joshua Lee explores visual arts through gallery visits and street‑mural tours, draws creative fuel from painters like Jean‑Michel Basquiat, photographers such as Dorothea Lange, and musicians including
    Jim Croce, Nina Simone, and Robert Johnson, and channels that inspiration into acrylic paintings, acoustic guitar songwriting, and community art workshops.
  travel: Joshua Lee prefers low‑cost, adventure‑focused travel, meticulously planning weekend road trips to nearby trails like the Blue Ridge Parkway, reminiscing about past visits to New Orleans and Savannah,
    and dreaming of photographing the Scottish Highlands and the desert landscapes of Sedona, while balancing a modest student budget.
  culinary: Joshua Lee enjoys cooking comfort food with a creative twist, frequently preparing shrimp and grits seasoned with smoked paprika, collard greens sautéed with garlic and apple cider vinegar,
    and experimenting with fresh herbs like basil and thyme, while also seeking out indie coffee shops for pour‑over brews and allowing occasional splurges on farm‑to‑table brunches.
  core: Joshua Lee is a curious 21‑year‑old media student who weaves visual storytelling and community activism into every project, yet habitually forgets to water houseplants and stays up late strumming
    soulful blues mixes on their acoustic guitar.
background:
  cultural: Joshua grew up in a Black family deeply rooted in the cultural tapestry of southwestern Virginia. His upbringing intertwined Southern Black church traditions—gospel music, spoken‑word storytelling,
    and communal service—with the region's Appalachian heritage of bluegrass, folk crafts, and reverence for the natural landscape. Family gatherings feature soul food, collard greens, and barbecued chicken
    alongside stories of the Great Migration and local civil‑rights activism. This blend gave him a strong sense of community solidarity, resilience, and an appreciation for the arts as a vehicle for cultural
    expression.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Front‑end web development (HTML, CSS, JavaScript)'', ''Video editing (Adobe Premiere)'', ''Written communication and research'', ''Community
