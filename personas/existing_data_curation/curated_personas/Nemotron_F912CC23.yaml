  hobbies: '[''Visiting art galleries and street murals'', ''Playing acoustic guitar and songwriting'', ''Photography (landscape and portrait)'', ''Reading contemporary fiction and African‑American literature'',
    ''Hiking in the Blue Ridge and local trails'', ''Volunteering as an art workshop facilitator'']'
  career_goals: In the short term, Joshua aims to complete a bachelor's degree in Media Studies or Communications, secure an internship in digital marketing or UX design, and develop a portfolio that showcases
    socially‑driven visual storytelling. Long term, he envisions working as a user‑experience designer or creative director for a nonprofit or cultural institution that amplifies Black voices in Appalachia,
    and eventually founding a community media hub that provides training and platforms for emerging Black artists in the region, while providing a stable income for his young family.
