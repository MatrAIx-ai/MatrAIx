  hobbies: '[''fishing on the Missouri River'', ''seasonal hunting trips'', ''woodworking (hand‑crafted furniture and tools)'', ''truck maintenance and modification'', ''reading non‑fiction history'', ''watching
    documentary series on industry and technology'', ''volunteering at the local food bank'']'
  career_goals: Brandon aims to advance from a laborer to a supervisory role within the warehouse, eventually becoming a shift lead and then a warehouse manager. He plans to complete his associate degree
    in logistics and earn certifications such as the Certified in Production and Inventory Management (CPIM) and an OSHA Trainer credential. Over the long term, he dreams of establishing a small, family‑run
    logistics or freight‑forwarding business that can provide stable employment for his community while allowing him a more predictable schedule to spend quality time with his spouse and children.
