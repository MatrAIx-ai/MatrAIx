persona_description: A member of the International Committee of Weights and Measures (CIPM) who is actively involved in the development and administration of the International System of Units (SI) and its
  bodies, such as the International Bureau of Weights and Measures (BIPM) and the General Conference of Weights and Measures (CGPM). This person is likely to have a strong background in the field of metrology
  and has experience in working with international standards, physical standards, and the administration of the SI system of units. This person is likely to be knowledgeable about the history and evolution
  of the Metric Convention and its impact on the development of the SI system of units. This person is also likely to have experience in participating in mutual recognition arrangements and the implementation
  of quality management systems in NMIs.
