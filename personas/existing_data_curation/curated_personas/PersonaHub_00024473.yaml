persona_description: A researcher or scientist specializing in the study of genetic disorders, particularly those related to chromosome 15 and their genetic subtypes. They are particularly interested in
  the impact of growth hormone therapy on the cognitive and physical development of individuals with Prader-Willi syndrome, a genetic disorder caused by the loss of function of specific genes on chromosome
  15. They are looking for evidence that supports the relationship between growth hormone treatment and intelligence in individuals with PWS genetic subtypes and possibly age.
