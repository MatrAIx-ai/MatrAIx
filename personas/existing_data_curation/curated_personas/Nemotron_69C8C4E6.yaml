personas:
  professional: Steven Henson is a diligent student leader who coordinates his Boy Scout troop’s weekly activities, applying his methodical planning skills and love of teamwork to ensure every outing runs
    smoothly.
  sports: Steven Henson is a spirited midfielder for the Riverside Youth Soccer Club, cheering for the Chicago Bulls in the NBA, and spends his weekends practicing free kicks, joining his scout troop’s
    obstacle‑course challenges, and planning his next fishing trip to the Gulf Coast.
  arts: Steven Henson is a rhythmic powerhouse in his middle school band, pounding the drums to the beats of Foo Fighters and practicing solo pieces from ‘Drumline’, while also diving into graphic novels
    like ‘Ms. Marvel’ and building intricate LEGO recreations of Star Wars scenes, feeding his creative impulse between video‑game raids.
  travel: Steven Henson dreams of swapping his fishing gear for hiking boots on a family trek through the Great Smoky Mountains, while already boasting a collection of postcards from Gulf Coast beaches,
    visits to the Smithsonian National Air and Space Museum, and an upcoming trip to Disney World that he meticulously plans with a color‑coded itinerary.
  culinary: Steven Henson favors simple, hands‑on meals like grilled cheese sandwiches with cheddar, spaghetti with meatballs, and fish tacos after a Gulf Coast outing, often attempting to craft his own
    LEGO‑shaped pancakes, though he sometimes skips vegetables in favor of extra cheese, and proudly claims his secret sauce is a dash of ketchup mixed with hot sauce.
  core: Steven Henson is a methodical, socially‑charged 12‑year‑old who balances a love of structured teamwork with a nervous streak that fuels both his meticulous planning and his occasional over‑worrying.
background:
  cultural: Steven comes from a white, middle‑class family in Spring Hill, Florida. His upbringing reflects a blend of mainstream American suburban culture and the relaxed, community‑focused atmosphere
    of Central Florida. Family traditions include attending a local Methodist church, participating in neighborhood block parties, and enjoying outdoor activities such as fishing trips to the nearby Gulf
    coast. He experiences Southern hospitality, a strong emphasis on personal responsibility, and an educational environment that encourages extracurricular involvement like sports, scouting, and music.
attributes:
  skills: '["Organizational planning", "Time management", "Team collaboration", "Basic computer literacy (Word, PowerPoint)", "LEGO model building", "Introductory woodworking", "Peer mediation"]'
  hobbies: '["Soccer", "Team video games (Minecraft, Fortnite)", "LEGO building", "Boy Scout activities", "Playing drums", "Reading graphic novels", "Community cleanup projects"]'
  career_goals: Steven aims to graduate high school with a solid academic record and pursue a fire science program at a community college, with the long‑term goal of becoming a professional firefighter
    or emergency medical technician. He is attracted to the clear protocols, teamwork, and community service these roles provide, aligning with his love of structure and helping others. As a secondary interest,
    he is considering civil engineering because he enjoys systematic problem‑solving and designing functional solutions.
