personas:
  professional: Kimberlee Thomas is an enthusiastic elementary student who channels their competitive chess mindset into school projects; they approach each assignment with a structured, step‑by‑step plan
    and a healthy dose of worry about getting everything just right.
  sports: Kimberlee Thomas participates in swim lessons at the Calvert County Aquatics Center and competes in the local Calvert Kids Swim Team, where they obsess over lap times and cheer for the Baltimore
    Orioles and Washington Nationals during weekend games, preferring structured practice over casual pick‑up play.
  arts: Kimberlee Thomas immerses themselves in the Magic Tree House series by Mary Pope Osborne; they build intricate LEGO landscapes inspired by the works of architect Frank Lloyd Wright and they enjoy
    drawing whimsical seascapes while listening to kid‑friendly tunes from Disney’s Moana soundtrack and classic songs by The Beatles.
  travel: Kimberlee Thomas loves family outings to the Chesapeake Bay for crabbing and shell‑collecting, has explored historic Annapolis and the National Mall in Washington, D.C., dreams of a road trip
    to the Outer Banks to chase tide‑pools, and they prefer trips that blend organized itineraries with time for solitary nature walks.
  culinary: Kimberlee Thomas favors Maryland’s mild crab cakes served with a squeeze of lemon, brightens mac and cheese with bacon bits, delights in fresh blueberries from the local farmers’ market, and
    often helps their family season grilled corn with a dash of Old Bay, though they occasionally over‑indulge in sugary cereal before school.
  core: Kimberlee Thomas is a competitive, structure‑loving seven‑year‑old; they balance chess‑driven school ambition with cautious saving, manage mild allergies, swim with a goal‑oriented mindset, draw
    inspiration from books and LEGO, and cherish organized family trips to the bay.
background:
  cultural: 'Kimberlee comes from a white, middle‑class family in Huntingtown, Maryland, a small community in Calvert County known for its proximity to the Chesapeake Bay. Her upbringing reflects typical
    Mid‑Atlantic suburban values: emphasis on school achievement, participation in community events such as the county fair and local crab festivals, and family traditions that celebrate holidays like Thanksgiving
    and Christmas. Outdoor activities like fishing, crabbing, and nature exploration are common in her area, and she often joins family outings to the bay. Her family likely attends a local church, reinforcing
    a sense of community and responsibility.'
attributes:
  skills: '["Reading (age‑appropriate chapter books)", "Basic arithmetic (addition & subtraction)", "Following multi‑step instructions", "LEGO building", "Organizing school supplies", "Completing age‑appropriate
