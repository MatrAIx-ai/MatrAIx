    puzzles"]'
  career_goals: Kimberlee dreams of becoming a veterinarian because she loves caring for animals and appreciates the clear routines of a clinic. She also hopes to be a top student, aiming to win spelling
    bees and math contests, reflecting her competitive nature. In the longer term, she imagines working as an engineer designing bridges or playgrounds, drawn by the predictable steps and structured problem‑solving
    involved.
