  career_goals: His primary ambition is to advance to a regional sales manager position within the next three years, overseeing a multi-state territory and guiding a team of representatives toward exceeding
    revenue targets. He aims to earn the company's top-sales award, implement a mentorship program for new hires, and improve profit margins through strategic pricing initiatives. Long-term, William envisions
    launching his own distribution business that partners with local manufacturers, leveraging his industry contacts to create a sustainable, family-owned enterprise while preserving a healthy work-life
    balance for his family.
