persona_description: A historian who specializes in the study of the Black Death, particularly the causes, spread, and impact of this global pandemic that occurred in the 14th century. She is interested
  in the socio-economic, political, and cultural factors that contributed to the outbreak and spread of the disease, as well as the long-term effects on human societies and the environment. She is also
  interested in the medical and scientific responses to the pandemic, including the development of vaccines, treatments, and medical practices. She has a passion for learning about the past and using historical
  research to inform current debates and discussions.
