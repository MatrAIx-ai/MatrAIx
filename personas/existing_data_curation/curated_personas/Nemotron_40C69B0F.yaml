    meditation"]'
  career_goals: John aims to advance from entry‑level firefighter to a certified paramedic, then pursue a fire officer certification with the long‑term goal of becoming a fire captain or chief. He is also
    interested in earning an associate degree in fire science and developing a community outreach program that teaches fire safety and resilience to youth in Fort Valley, while continuing to strengthen
    his own emotional wellbeing through mentorship and mental‑health training.
