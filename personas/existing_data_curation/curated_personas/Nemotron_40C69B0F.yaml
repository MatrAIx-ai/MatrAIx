personas:
  professional: A 19‑year‑old firefighter trainee named John Dawan blends solid fire‑suppression training with a budding EMT skill set, applying their curiosity for new safety technology while honoring
    the disciplined routines learned from church‑based community drills, and consistently adapts protocols on the fly to protect both their crew and the townsfolk of Fort Valley.
  sports: John Dawan is a dedicated member of the Fort Valley Flyers street‑ball crew, a loyal fan of the Atlanta Hawks and Atlanta Falcons, hits the local gym for weight‑training three times a week, and
    hikes the Amicalola Creek Trail each weekend to balance their basketball drills with endurance cardio on the country’s rolling hills.
  arts: John Dawan immerses themselves in the beats of Kendrick Lamar and the uplifting choruses of Kirk Franklin, devours sci‑fi novels by Octavia Butler and Nnedi Okorafor, captures community moments
    with their Canon EOS 4000D, and in quiet evenings drums along to the rhythmic poetry of spoken‑word artist Saheed Badger.
  travel: John Dawan prefers low‑cost road trips that blend outdoor adventure with cultural immersion, having explored the misty Blue Ridge Parkway, the historic squares of Savannah, and dreaming of a weekend
    in New Orleans for its jazz and soul food, all while budgeting their travel fund around a modest firefighter salary and occasional family obligations.
  culinary: John Dawan spends their downtime mastering Southern comfort classics like shrimp and grits, collard greens simmered with smoked ham hocks, and sweet potato pie, experiments with spice rubs for
    crispy fried catfish using paprika, cayenne, and garlic powder, and often treats themselves to a late‑night slice of pepperoni pizza after a night shift.
  core: John Dawan is a curiosity‑driven young firefighter balancing intense community commitment, a restless mind prone to anxiety, and a love for basketball, gospel tunes, and hearty Southern cooking.
background:
  cultural: John is a Black young adult raised in Fort Valley, a close‑knit community in Macon County, Georgia, with deep Southern roots. His family traditions include church gatherings, gospel music, and
    home‑cooked Southern cuisine, which have shaped his sense of community and pride in his heritage. He grew up hearing stories of civil‑rights activism and local resilience, fostering a strong commitment
    to service and collective well‑being.
attributes:
