personas:
  professional: David Westley is a veteran front‑line customer service specialist who, after fifteen years of mastering active listening, empathy, and script adherence, now leverages their methodical precision
    and calm demeanor to coach peers and pursue a supervisory or quality‑assurance role while completing an associate degree to transition into operations management.
  sports: David Westley enjoys low‑key fitness, tackling Sierra foothill trails with the Sierra Trail Hikers club each weekend, cheering on the San Francisco Giants during baseball season and the Golden
    State Warriors in winter, and they keep a modest home treadmill for rainy days, preferring steady endurance over high‑intensity sports.
  arts: David Westley finds creative release in building precise model railway layouts inspired by historical railroads, immerses themselves in historical non‑fiction about the American West, and evenings
    often feature the folk melodies of Bob Dylan and Willie Nelson, while they occasionally attend the local museum's exhibit on Western frontier art.
  travel: David Westley plans travel like a spreadsheet, favoring structured weekend getaways to nearby Yosemite and Lake Tahoe where they hike quiet trails, has already visited Sedona’s red rocks and dreams
    of an Alaskan cruise, and they keep family commitments in mind by selecting destinations with short flights and moderate costs.
  culinary: David Westley cultivates a backyard garden of heirloom tomatoes, zucchini, and beans, then prepares rustic ratatouille and slow‑cooked beef chili using those fresh ingredients, while their cooking
    skill sits at confident home‑cook level, though they sometimes forget to refrigerate leftovers, leading to occasional food waste.
  core: David Westley is a steady, routine‑driven gardener‑hiker who channels their calm precision into meticulous model railroads, yet they habitually forget to water their vegetables during the peak of
    summer.
background:
  cultural: David is a White American raised in a middle‑class family in the Midwest before relocating to California in his twenties. His upbringing emphasized self‑reliance, punctuality, and community
    involvement, reflecting traditional American values. Living in Placerville, El Dorado County, the region’s Gold Rush heritage and surrounding natural environment have fostered his appreciation for local
    history and outdoor recreation. He observes mainstream U.S. holidays such as Thanksgiving and Independence Day, and participates modestly in community events, preferring small gatherings that suit his
    reserved demeanor.
