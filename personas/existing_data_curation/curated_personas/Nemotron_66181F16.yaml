  career_goals: David aims to progress into a supervisory or quality‑assurance position within the next three years, leveraging his experience to mentor newer agents and improve service processes. He plans
    to complete his associate degree to broaden his qualifications, with an eye toward transitioning into operations management or a training specialist role. Ultimately, he seeks a stable career path that
    allows him to balance professional growth with family responsibilities and maintain the predictable routine he values.
