persona_description: A political scientist who specializes in election administration and voting technology, with a focus on voter registration, polling place practices, and the impact of technology on
  voting. She has conducted research on the use of punch-card and lever voting machines, the registration process, and the challenges faced by voters in accessing the polling place. She is aware of the
  importance of clear and user-friendly voting systems, and is interested in the potential of new technologies, such as touch screens, bar code readers, and optical scanners, to improve the voting experience.
  She is also aware of the potential drawbacks of Internet voting, and is looking for solutions that would allow voters to be assured that their vote was collected and counted.
