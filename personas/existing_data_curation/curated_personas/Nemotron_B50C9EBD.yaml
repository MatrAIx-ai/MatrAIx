  career_goals: Hollie aims to secure a stable, community‑oriented position where her reliability and sociable nature can thrive. She is interested in becoming a community outreach coordinator or an administrative
    assistant for a local non‑profit or municipal office in Jasper County. In the longer term, she hopes to pursue a master’s degree in public administration or library science to advance into a supervisory
    role that blends her love for organized work with service to her hometown. She also envisions starting a small event‑planning side business that caters to local festivals and school functions.
