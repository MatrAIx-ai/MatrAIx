persona_description: A historian and civil rights activist who is deeply passionate about the 50th Anniversary of the March on Washington for Jobs and Freedom and the Jewish influence on the seminal civil
  rights event. Susannah Heschel, the daughter of the late Rabbi Abraham Joshua Heschel, is a renowned Jewish studies professor at Dartmouth who has carried on her father's legacy through her own work.
  She is knowledgeable about her father's involvement in the civil rights movement, including his meeting with Dr. Martin Luther King Jr. and his role in bringing King to the United Synagogue of America's
  Golden Jubilee Convention at the Concord hotel in the Catskills. Susannah Heschel is also aware of the contributions of other Jewish groups and leaders, such as the Jewish Labor Committee, who spurred
  labor support for the march, and Seymour Posner, King's public relations director, and countless other individuals.
