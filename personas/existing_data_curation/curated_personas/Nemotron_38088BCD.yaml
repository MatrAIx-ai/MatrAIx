personas:
  professional: An experienced human‑resources leader, Truddie Gibbs blends a data‑driven approach to workforce planning with a deep commitment to DEI, leveraging their expertise in Workday and ADP while
    championing mentorship for underrepresented employees as they work toward an HR Director role.
  sports: An avid outdoors enthusiast, Truddie Gibbs hikes the Ouachita foothills with the Ouachita Trail Association, paddles the Arkansas River in a local canoe club, and roots for the Oklahoma City Thunder
    and Tulsa Roughnecks FC during the basketball and soccer seasons.
  arts: Passionate about beadwork, Truddie Gibbs creates intricate traditional designs, attends monthly powwows, reads contemporary fiction from authors like Chimamanda Adichie, and enjoys the acoustic
    folk sounds of The Avett Brothers and the cinematic scores of Hans Zimmer.
  travel: Truddie Gibbs prefers well‑planned road trips that blend adventure and cultural immersion, having explored the Grand Canyon, visited the historic pueblos of Taos, and dreaming of a spring pilgrimage
    to the cherry blossoms of Kyoto.
  culinary: Truddie Gibbs delights in cooking traditional dishes such as frybread topped with bean succotash, alongside garden‑fresh heirloom tomato gazpacho and smoked trout seasoned with cedar, while
    they proudly claim a mediocre but enthusiastic skill at brewing craft coffee.
  core: Truddie Gibbs balances pragmatic ambition with creative roots, channeling a love for nature, community, and tradition into a steady pursuit of inclusive leadership, mindful finances, and occasional
    indulgent culinary experiments.
background:
  cultural: Truddie identifies as an American Indian with deep roots in Oklahoma's tribal communities, drawing on the values of respect for the land, communal responsibility, and storytelling. Her heritage—shaped
    by the traditions of the Cherokee and Muscogee peoples—infuses her personal and professional life. She actively engages in cultural events, supports language preservation initiatives, and mentors younger
    tribal members. This background informs her empathetic leadership style, her commitment to diversity and inclusion, and her dedication to bridging modern business practices with Indigenous wisdom.
attributes:
  skills: '[''Employee Relations'', ''Conflict Mediation'', ''Talent Acquisition'', ''Performance Management'', ''HRIS Administration (Workday, ADP)'', ''Labor Law Compliance'', ''Data‑Driven Workforce
    Planning'', ''Diversity, Equity, and Inclusion Strategy'', ''Training and Development'', ''Organizational Development'']'
  hobbies: '[''Hiking'', ''Canoeing'', ''Beadwork'', ''Powwow participation'', ''Reading (fiction and leadership)'', ''Gardening native plants'', ''Cooking traditional cuisine'', ''Volunteering at tribal
    cultural center'', ''Nature photography'']'
  career_goals: Truddie aims to advance to an HR Director role within the next five years, where she can shape strategic workforce planning and embed inclusive practices across the organization. She plans
    to earn the SHRM‑SCP certification and lead a mentorship program that supports Native American employees and aspiring HR professionals. Additionally, she wants to pilot AI‑enabled HR analytics tools
    to improve decision‑making while preserving the human touch in employee engagement. Long‑term, she envisions consulting for small businesses and tribal enterprises to help them build culturally responsive
    workplaces.
