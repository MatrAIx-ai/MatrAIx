persona_description: A conservation biologist who specializes in the study of cracid birds, particularly the horned curassow. Their research interests include the conservation status and population trends
  of the species, the impact of habitat loss on the species, and the development of conservation strategies and management plans for the species. They are also interested in the taxonomy and phylogenetic
  relationships of the species, and the identification and monitoring of populations. They may work with field researchers, conservationists, and policymakers to develop and implement conservation programs
  for the species.
