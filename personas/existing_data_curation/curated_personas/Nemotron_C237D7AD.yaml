  hobbies: '[''Playing soccer with friends'', ''Building LEGO models'', ''Drawing comic‑book characters'', ''Minecraft world‑building'', ''Listening to mariachi music'', ''Helping with family cooking (tacos,
    tamales)'', ''Reading adventure books'', ''Participating in school science club'']'
  career_goals: Orlando dreams of becoming a teacher or a community youth mentor so he can create structured, supportive environments for other kids, especially those who speak Spanish. He wants to design
    lessons that blend clear routines with fun, collaborative projects, helping students feel both safe and engaged. Inspired by his family’s emphasis on helping others, he also hopes to work as a bilingual
    school counselor one day, using his own experiences with anxiety to guide peers toward healthy coping strategies. In the longer term, he sees himself contributing to his local community in Clarkston
    by organizing after‑school programs that combine sports, academics, and cultural heritage celebrations.
