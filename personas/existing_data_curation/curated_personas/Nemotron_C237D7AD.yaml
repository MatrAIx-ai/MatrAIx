personas:
  professional: An aspiring builder and junior inventor, Orlando Claudio combines a love for LEGO architecture, meticulous Minecraft constructions, and comic‑book sketching into creative problem‑solving
    projects, thriving in group settings like the school science club where their practical, organized mindset shines, though they sometimes spend too long polishing a LEGO model and miss the deadline for
    a science experiment.
  sports: Orlando Claudio is a spirited midfielder for the neighborhood youth soccer squad, cheering on their favorite pro club FC Barcelona on TV and regularly practicing drills at the local sports complex,
    yet they sometimes skip pre‑game stretches and can get argumentative with teammates when frustration builds, while also joining the school’s intramural basketball games during the winter months.
  arts: Orlando Claudio channels their imagination into sketching dynamic comic‑book heroes inspired by artists like Stan Lee, listening to lively mariachi ensembles such as Mariachi Vargas de Tecalitlán
    while building elaborate LEGO cities, and they eagerly swap fan art and favorite adventure books like \"Percy Jackson\" with friends, even if it means staying up late and sacrificing some homework.
  travel: Orlando Claudio prefers short family trips that blend adventure and comfort, recalling a vibrant weekend getaway to a bustling city known for its street music festivals and hoping to explore world‑renowned
    soccer stadiums like Camp Nou, all while meticulously planning itineraries in a notebook to keep anxiety at bay and saving pocket money for future travel.
  culinary: Orlando Claudio loves helping in the kitchen, expertly assembling tacos with seasoned pork, fresh cilantro, and tangy salsa, mastering the art of folding sweet corn tamales, and experimenting
    with simple desserts like chocolate chip cookies, though they sometimes over‑season dishes in excitement or indulge in too many tacos, leading to occasional stomachaches.
  core: Orlando Claudio is an organized, socially‑charged 11‑year‑old who blends a love for structured play—LEGO, Minecraft, soccer—with a vivid imagination for comics and music, yet wrestles with anxiety
    that colors their daily choices.
background:
  cultural: Orlando comes from a proud Mexican heritage that is woven into his daily life. At home, Spanish is spoken, and family gatherings are filled with stories, music, and food that celebrate traditions
    like Día de los Muertos and Las Posadas. His parents emphasize respect for elders, the importance of community, and the value of hard work, which shapes his reliable and responsible attitude. Living
    in Clarkston, Michigan, Orlando balances his cultural roots with the multicultural environment of his school and neighborhood, often sharing his heritage through Spanish language projects and cultural
    presentations. This blend of Mexican family values and Midwestern community life gives him a unique perspective that fuels his desire to help bridge cultural gaps and support bilingual peers.
attributes:
  skills: '[''Organizing school supplies and homework schedule'', ''Bilingual communication (Spanish and English)'', ''Teamwork and leadership in soccer'', ''Basic digital literacy (educational apps, Scratch
