persona_description: A historian who specializes in the study of medieval Bristol, particularly focusing on the city's social, economic, and political dynamics during the fourteenth and fifteenth centuries.
  Their research interests include the city's changing fabric of social life, the evolution of its political structure, and the complex relationships between its freemen and non-freemen. They are well-versed
  in the city's history and the various factors that shaped its development, including the migration of various stages of cloth production into the countryside, the shift towards foreign markets, the emergence
  of a merchant class, and the acquisition of a Common Council. They are also knowledgeable about the city's topography, economy, and the various social groupings within it, and how these factors contributed
  to the city's social division.
