personas:
  professional: Alyssa Dickerson, a 57‑year‑old CPA who has mastered forensic auditing, blends rigorous GAAP discipline with a curiosity for cutting‑edge data‑visualization tools, steering cross‑functional
    audit teams and using their bilingual communication skills to secure senior‑management trust in a highly competitive firm environment.
  sports: Alyssa Dickerson trails the Sandia Mountains year‑round, belongs to a local hiking club, joins sunrise yoga circles after weekend runs, and roots for New Mexico United soccer while cheering the
    Colorado Rockies during the summer, balancing solo endurance pursuits with casual team fandom.
  arts: Alyssa Dickerson attends the Santa Fe film festival, participates in a regional book club dissecting historical fiction and non‑fiction, shows a fondness for the paintings of Frida Kahlo and the
    cello works of Yo‑Yo Ma, and they often draw creative inspiration from quarterly exhibits at the Albuquerque Museum of Art.
  travel: Alyssa Dickerson prefers weekend road trips that combine low‑key hiking in Taos and cultural immersion in Santa Fe’s art districts, dreams of trekking Patagonia’s glaciers, and, constrained by
    demanding audit schedules, they plan longer voyages only after securing coverage for client work.
  culinary: Alyssa Dickerson excels at crafting mole poblano, slow‑cooked carnitas, and hand‑pressed corn tortillas, seasoning dishes with ancho chilies, epazote and fresh cilantro, and they experiment
    with fusion recipes while thoughtfully balancing spice levels for family members sensitive to heat.
  core: Alyssa Dickerson is a detail‑driven forensic accountant who mitigates stress with mountain hikes and yoga, budgets obsessively yet indulges in spicy cuisine, and navigates life’s uncertainties with
    competitive vigor and a healthy dose of skepticism.
background:
  cultural: Alyssa’s Mexican heritage is a cornerstone of her identity. Raised in Albuquerque’s vibrant Mexican‑American community, she grew up bilingual, celebrating traditions such as Día de los Muertos
    and enjoying regional foods like pozole and tamales. Her family’s roots trace back to the historic Hispano settlements of northern New Mexico, fostering a strong sense of familismo and communal responsibility.
    This cultural lens informs her professional ethos—emphasizing trust, respect, and service—and enriches her personal life through music, dance, and a deep appreciation for both Mexican and broader American
    cultural narratives.
attributes:
  skills: '[''Financial statement analysis'', ''GAAP compliance'', ''New Mexico and Federal tax preparation'', ''Forensic auditing'', ''Risk assessment'', ''Internal controls design'', ''Advanced Microsoft
