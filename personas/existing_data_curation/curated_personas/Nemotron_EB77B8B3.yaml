    ''Process optimization'', ''Client relationship management'']'
  hobbies: '[''Hiking in the Sandia Mountains'', ''Yoga and mindfulness meditation'', ''Cooking traditional Mexican cuisine'', ''Exploring new recipes'', ''Reading historical fiction and non-fiction'',
    ''Family genealogy research'', ''Attending local art exhibitions and film festivals'', ''Participating in a book club'', ''Solving crosswords and Sudoku puzzles'', ''Volunteering for community financial
    literacy workshops'']'
  career_goals: Alyssa aims to attain senior management status within an accounting firm, leveraging her competitive drive to become a trusted expert in forensic auditing and risk management. She plans
    to secure her CPA credential and a Certified Fraud Examiner (CFE) designation, positioning herself for advisory roles that serve Spanish‑speaking small businesses and non‑profits in New Mexico. Long‑term,
    she envisions opening a boutique consultancy that provides culturally attuned financial services while mentoring younger accountants and offering pro bono tax workshops for the local community, all
    while maintaining a balanced workload that protects her well‑being.
