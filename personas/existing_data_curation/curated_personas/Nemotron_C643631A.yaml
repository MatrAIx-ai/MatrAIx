  career_goals: Sheryl dreams of attending a specialized arts high school and later studying illustration or visual communication at university. She aspires to become a concept artist for video games or
    animation, and is also intrigued by scientific illustration, hoping to merge her love of art with a future in environmental science. She aims to build a freelance portfolio that showcases her unique,
    unconventional style while remaining open to interdisciplinary career paths.
