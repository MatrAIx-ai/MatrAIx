personas:
  professional: Sheryl Quirk is an aspiring digital artist and junior entrepreneur who sells hand‑crafted stickers at school fairs, using Procreate, and balances their creative projects with a laid‑back
    attitude toward school assignments, often scrambling to meet deadlines due to their disorganized schedule and competitive desire to out‑shine classmates.
  sports: Sheryl Quirk is a fan of the Minnesota Twins and Wild, enjoys informal soccer matches at the community park, regularly hikes and goes snowshoeing with family on weekends, and competes fiercely
    in local fishing contests, though they often forget to stretch before activities.
  arts: Sheryl Quirk devotes afternoons to drawing with charcoal, painting watercolors of Minnesota lakes, crafting digital art in Procreate while listening to Phoebe Bridgers and Tame Impala, reads graphic
    novels like 'Bone' and 'Saga', participates in school drama club productions, and swaps stickers with friends, displaying a competitive streak in art contests.
  travel: Sheryl Quirk dreams of exploring the Boundary Waters, frequently visits Duluth's Canal Park and the Iowa State Fair with their family, and has a wishlist that includes the Norwegian fjords and
    a summer camp in Colorado, preferring spontaneous road trips over rigid itineraries.
  culinary: Sheryl Quirk adores the simple comfort of fish‑fry at the county fair, homemade cinnamon rolls with cream cheese frosting, their grandma’s Swedish meatballs, cheese curds, and enjoys experimenting
    with pesto pizza, though they often forget to bring a snack to after‑school art sessions, relying on gummy bears.
  core: Sheryl Quirk is a creatively curious 12‑year‑old who balances a love for digital and traditional art with a laid‑back, sometimes disorganized lifestyle, competitive spirit, and a penchant for sticker
    swapping and late‑night puzzle gaming.
background:
  cultural: Sheryl comes from a white, Midwestern American family with roots in German and Scandinavian ancestry. Growing up in Cottage Grove, MN, she experiences the region's blend of suburban life and
    outdoor recreation. Local traditions such as county fairs, community potlucks, and seasonal activities like fishing, hiking, and snowshoeing shape her worldview. Her family emphasizes modesty, self‑reliance,
    and a strong work ethic while encouraging curiosity and artistic expression.
