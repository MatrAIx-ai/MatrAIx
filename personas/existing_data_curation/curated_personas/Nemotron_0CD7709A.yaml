  career_goals: Although only four, Timothy often talks about building big things. He dreams of becoming a construction worker or engineer who designs sturdy houses and bridges, loving the idea of following
    clear blueprints and seeing tangible results. He also imagines being the 'best' at building the tallest LEGO tower, reflecting his competitive streak, and hopes one day to help keep his small town safe
    as a firefighter, a role he views as practical and community‑oriented.
