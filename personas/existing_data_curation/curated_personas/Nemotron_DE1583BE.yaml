  hobbies: '["Soccer (player and fan)", "Basketball", "Competitive video gaming (e.g., FIFA, Fortnite)", "Skateboarding", "Dance (cumbia, hip‑hop)", "Music listening (regional Mexican, reggaeton, hip‑hop)",
    "Cooking traditional Mexican dishes", "DIY tech projects (building PCs, Arduino)", "Social media content creation (TikTok, YouTube)"]'
  career_goals: Rudy plans to complete his high‑school education through a GED program within the next year, then pursue an apprenticeship in automotive technology or HVAC to build a solid trade career.
    At the same time, he dreams of launching a small side hustle that creates custom‑designed apparel and short videos for his local community, leveraging his bilingual outreach and digital‑media skills.
    Long‑term, he envisions either managing his own repair shop or operating a popular street‑food cart that blends traditional Mexican flavors with modern twists, allowing him to combine his mechanical
    expertise, entrepreneurial spirit, and cultural heritage.
