personas:
  professional: Rudy Moralesdiaz, a 17‑year‑old aspiring automotive apprentice, merges a practical, hands‑on curiosity for machines with bilingual communication, self‑taught video editing, and graphic design
    to build a community‑oriented custom‑apparel and short‑video side hustle, leveraging their organized yet flexible approach and competitive drive to secure future trade opportunities.
  sports: Rudy Moralesdiaz, an energetic 17‑year‑old, plays forward for a neighborhood soccer league that rivals the LA FC spirit, shoots hoops at the local park while rooting for the Los Angeles Lakers,
    and hangs at the downtown skate park with a crew that emulates the tricks of their favorite pro skaters.
  arts: Rudy Moralesdiaz channels their sociable energy into creating short TikTok videos set to beats from Bad Bunny and J Balvin, practices cumbia and hip‑hop dance moves at community fiestas, and draws
    visual inspiration from graffiti murals that line the streets of their Los Angeles‑area neighborhood, while also occasionally remixing classic soundtracks from beloved animated films.
  travel: Rudy Moralesdiaz, a 17‑year‑old travel enthusiast, loves weekend getaways to the beaches of Santa Cruz and the desert’s Joshua Tree, spends occasional budget‑friendly flights to Las Vegas and
    the music‑rich streets of New Orleans, and dreams of a future backpacking trip through Tokyo’s neon districts and Barcelona’s Gaudí‑laden avenues, balancing his limited side‑hustle earnings with careful
    trip planning.
  culinary: Rudy Moralesdiaz, a 17‑year‑old culinary enthusiast, delights in helping the family prepare tacos al pastor topped with pineapple and a secret chipotle‑infused salsa, experiments by adding smoked
    paprika to pozole broth, and frequently flips homemade quesadillas with extra cheese while mastering the perfect guacamole made from ripe Hass avocados and fresh lime.
  core: Rudy Moralesdiaz, a 17‑year‑old who blends competitive drive with community‑centered creativity, balances hands‑on tech tinkering and bilingual street‑wise hustles while juggling soccer, skateboarding,
    and a love for spontaneous TikTok clips.
background:
  cultural: Rudy was raised in a close‑knit Mexican‑American family in Wilmington, a neighborhood known for its strong Latino presence. His parents emigrated from central Mexico, and at home Spanish is
    spoken alongside English, giving him fluency in both languages. Family traditions such as cooking communal meals (tacos al pastor, pozole), celebrating Día de los Muertos and Mexican Independence Day,
    and attending local street festivals deeply influence his identity. The vibrant local soccer culture, salsa and cumbia dance classes, and the broader multicultural atmosphere of Los Angeles County blend
    with his Mexican heritage, shaping a worldview that values community, family solidarity, and a blend of traditional and contemporary influences.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Leadership in group activities", "Basic video editing (Adobe Premiere Rush)", "Graphic design (Canva)", "Troubleshooting smartphone/computer issues",
