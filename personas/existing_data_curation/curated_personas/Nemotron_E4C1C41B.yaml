  hobbies: '[''Reading'', ''Book club'', ''Potluck gatherings'', ''Volunteer work at library'', ''Gardening'', ''Cooking and baking'', ''Crochet and knitting'', ''Hiking'', ''Yoga and mindfulness'', ''Ukulele
    playing'', ''Community event organizing'']'
  career_goals: She aims to re‑enter the education field in a flexible capacity, such as a part‑time tutor, community‑college adjunct, or facilitator of adult‑learning workshops that incorporate arts and
    wellness. Over the next five years she hopes to obtain a certification in mental‑health peer counseling and eventually launch a small community centre in Hartland that offers after‑school tutoring,
    creative‑arts classes, and stress‑relief programs for adults. Financial independence and a balanced, low‑stress work schedule are top priorities given her anxiety history.
