personas:
  professional: Lindsay Sohn, a 45-year-old former elementary teacher now working as a part-time community-college adjunct and volunteer coordinator, blends curriculum design expertise with a natural flair
    for active listening and conflict mediation, while their relaxed attitude toward scheduling and occasional disorganization keep classes adaptable and lively.
  sports: Lindsay Sohn, an avid hiker in their mid-forties, spends weekends trekking the trails of Devil's Lake State Park with the Hartland Trailblazers hiking club, attends community yoga classes at the
    local recreation center, and follows the Milwaukee Brewers and Green Bay Packers on game nights, occasionally joining a casual adult softball league despite a tendency to forget practice dates.
  arts: Lindsay Sohn, a devoted book-club member, finds inspiration in authors like Margaret Atwood and Haruki Murakami, strums a ukulele during informal jam sessions covering songs by The Lumineers and
    Joan Baez, and channels their creativity into crocheting and knitting projects inspired by designer Katia Seibel, making their artistic pursuits a cornerstone of social gatherings.
  travel: Lindsay Sohn, who prefers loosely planned escapes, has spent summers exploring Door County's shoreline and hiking the Adirondacks, dreams of a mindful retreat in Kyoto's zen gardens, and balances
    their travel cravings with budget-friendly weekend road trips to nearby state parks, always leaving room for spontaneous detours.
  culinary: Lindsay Sohn, an enthusiastic farm-to-table cook, regularly prepares roasted beet and goat-cheese salads, zucchini-bread muffins, and miso-infused lentil stew using heirloom tomatoes, kale,
    fresh rosemary, and locally sourced honey, yet occasionally lets a pot of soup burn when a new crochet pattern distracts their attention.
  core: Lindsay Sohn, a 45-year-old community-focused educator, channels a restless curiosity and laid-back, sometimes chaotic energy into yoga, gardening, and lively workshops, while their anxiety fuels
    both heartfelt empathy and occasional forgetfulness about appointments.
background:
  cultural: Lindsay grew up in a middle‑class family in the Milwaukee suburbs, where Midwestern values of community involvement, modesty, and hard work were emphasized. Her heritage is primarily of German‑Scandinavian
    descent, reflected in family traditions such as holiday baking, attendance at a local Lutheran church, and an appreciation for seasonal festivals like Oktoberfest and county fairs. Living in Hartland,
    she feels a strong connection to the region’s agricultural roots, dairy culture, and the close‑knit neighborhood networks that define many small towns in Wisconsin.
