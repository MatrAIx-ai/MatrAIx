  hobbies: '[''Hiking and nature walks'', ''Gardening'', ''DIY woodworking'', ''Reading popular science'', ''Crossword and sudoku puzzles'', ''Mentoring at after‑school STEM club'', ''Cooking seasonal meals'',
    ''Landscape photography'']'
  career_goals: Carrie aims to transition from her current hiatus into a part‑time consulting role that leverages her analytical background to help local small businesses and nonprofit groups make data‑driven
    decisions. She is pursuing a certification in data analytics to formalize her skills, and she hopes to launch a community STEM outreach program for middle‑school girls in Shepherdsville. Long‑term,
    she envisions building a freelance practice that blends data analysis, grant writing, and project coordination, allowing her to stay flexible while making a tangible impact in her region.
