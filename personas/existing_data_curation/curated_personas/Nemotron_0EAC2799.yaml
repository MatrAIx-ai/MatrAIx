personas:
  professional: A data analytics consultant in their early 40s, Carrie Landry leverages strong statistical modeling and technical writing skills to deliver data‑driven strategies for small businesses and
    nonprofits, balancing meticulous budget oversight with the flexibility to troubleshoot on the fly, while their skeptical mindset ensures every recommendation is backed by solid evidence.
  sports: An avid hiker and casual runner, Carrie Landry tackles the rolling trails of Bullitt County with the local Shepherdsville Trail Club, cheers on the Louisville Cardinals basketball team, and joins
    a weekend softball league for fun.
  arts: A dedicated photographer and folk‑music enthusiast, Carrie Landry spends sunrise hours capturing the Kentucky countryside while listening to Joni Mitchell and the Punch Brothers, and frequently
    visits the local art gallery to admire works by regional painter Kent Whittington.
  travel: A purposeful traveler with a modest budget, Carrie Landry plans trips that blend outdoor adventure with cultural immersion, having recently explored the red rocks of Sedona and the historic streets
    of Savannah, while dreaming of a future cycling tour through the vineyards of Tuscany.
  culinary: A seasonal home cook with intermediate culinary skills, Carrie Landry loves whipping up roasted beet and kale salads, slow‑cooked pork shoulder with apple butter, and baking sourdough bread
    using locally sourced wheat and heirloom tomatoes, often pairing meals with a glass of dry Riesling.
  core: Carrie Landry blends data‑driven rigor with hands‑on creativity, balancing meticulous budgeting and health monitoring with a love for hiking, woodworking, and folk music, though they sometimes forget
    routine self‑care appointments.
background:
  cultural: Carrie grew up in a suburban‑rural part of Kentucky, where Southern Appalachian traditions and a strong sense of community shaped her outlook. She was raised in a family that valued self‑reliance,
    church involvement, and local customs such as bluegrass music and regional cuisine. While she embraces these cultural roots, her education and professional interests have given her a broader, more nationally
    oriented perspective, allowing her to blend traditional values of hard work and neighborly support with a modern, science‑driven mindset.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Statistical modeling'', ''Scientific research methods'', ''Technical writing'', ''Project management'', ''Budgeting and financial planning'', ''DIY home repairs'',
