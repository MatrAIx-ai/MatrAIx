  hobbies: '[''Fishing at Stony Creek'', ''DIY woodworking projects'', ''Drone piloting'', ''Local history research'', ''Reading non‑fiction about technology and emergency management'', ''Sketching rural
    landscapes'', ''Journaling for emotional processing'', ''Retro arcade gaming'', ''Participating in small‑group historical society meetings'', ''Casual cycling on county roads'']'
  career_goals: At 40, Joseph aims to leverage his on‑the‑ground experience into a supervisory role within the county’s emergency communications center. He plans to earn a Certified Emergency Communications
    Professional (CECP) credential and enroll in a bachelor’s program in Emergency Management to broaden his strategic perspective. His competitive drive pushes him to achieve top performance metrics and
    mentor newer dispatchers, while his curiosity fuels a desire to integrate emerging technologies—such as AI‑assisted call triage and drone‑based incident monitoring—into the department’s workflow. Long‑term,
    Joseph hopes to design a community preparedness program that educates local residents on emergency readiness, reinforcing the practical, self‑reliant values of his Midwestern roots.
