  skills: '[''Carpentry'', ''Woodworking'', ''Auto Maintenance'', ''Small Engine Repair'', ''Home Maintenance'', ''Plumbing Basics'', ''Electrical Basics'', ''HVAC Troubleshooting'', ''Financial Budgeting'',
