  career_goals: Michael aims to transition from a senior sales representative to a regional sales manager within the next three years, overseeing a team of reps across Kansas and neighboring states. He
    aspires to develop and implement an innovative, art‑infused sales methodology that differentiates his company's service offerings, earn a spot on the executive leadership track, and mentor emerging
    talent. Long‑term, he envisions launching his own boutique consultancy that blends service‑sales expertise with creative branding strategies for mid‑market clients.
