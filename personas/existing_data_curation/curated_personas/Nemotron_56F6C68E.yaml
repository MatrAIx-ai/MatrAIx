  hobbies: '["Gardening", "Quilting", "Historical Fiction Reading", "Church Choir Participation", "Volunteering at Food Pantry", "Hiking", "Birdwatching", "Baking", "Genealogy Research", "Crafting"]'
  career_goals: Although retired from formal employment, Elizabeth aims to deepen her involvement in community service. She plans to mentor younger volunteers at the local food pantry, develop a heritage
    garden that showcases native Shenandoah Valley plants, and obtain an advanced CPR/first‑aid certification to assist seniors. She also hopes to contribute oral histories to the county’s historical society
    and possibly compile a memoir of life in rural Virginia, preserving her family’s legacy for future generations.
