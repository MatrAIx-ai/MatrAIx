personas:
  professional: A seasoned community volunteer mentor named Elizabeth Henderson leverages her decades of household management, event coordination, and basic first‑aid expertise to organize heritage garden
    projects and train new pantry volunteers, embodying her practical, structure‑loving yet compassionate nature.
  sports: Elizabeth Henderson, an avid walker, follows the Washington Commanders and the Virginia Cavaliers, joins a senior hiking club that explores Shenandoah Valley trails each fall, and participates
    in a weekly low‑impact yoga class at the community center to maintain flexibility.
  arts: Elizabeth Henderson, a dedicated choir singer, finds solace in performing hymns while also relishing the folk storytelling of Dolly Parton, the blues guitar of B.B. King, and the historical novels
    of Philippa Gregory, weaving these artistic threads into her leisurely evenings.
  travel: Elizabeth Henderson prefers structured weekend getaways, having already explored Charlottesville’s historic district, the scenic overlooks of Shenandoah National Park, and a cruise to the Bahamas,
    while she dreams of a pilgrimage to colonial Williamsburg and a genealogy research trip to England’s Cotswolds.
  culinary: Elizabeth Henderson, an accomplished baker, delights in preparing Southern classics like peach cobbler, buttermilk biscuits, and collard greens seasoned with fresh garden rosemary and thyme,
    often perfecting her flaky crusts while occasionally sneaking a bite of the dough before baking.
  core: Elizabeth Henderson balances meticulous garden planning, compassionate volunteer leadership, and a love for Southern baking, all while wrestling with a mild forgetfulness that sometimes leaves her
    watering cans upside down.
background:
  cultural: Elizabeth is a lifelong resident of Mount Jackson, Virginia, in Shenandoah County. Her family has deep roots in the Shenandoah Valley, tracing back to early European (primarily English and German)
    settlers. Her upbringing reflects Southern hospitality, a strong sense of community, and respect for tradition. She participates in local church life, values Appalachian folk music and storytelling,
    and embraces the region’s culinary heritage, such as cornbread, fried chicken, and seasonal preserves. The cultural environment—rural, close‑knit, and modestly conservative—has shaped her practical
    outlook, cooperative spirit, and dedication to helping neighbors.
