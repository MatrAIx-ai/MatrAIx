personas:
  professional: Rafael Martinez, a 42‑year‑old commercial cleaning and facilities specialist with fifteen years of floor‑care, basic plumbing, and HVAC filter‑replacement expertise, leverages bilingual
    fluency and a pragmatic, safety‑first mindset to keep operations smooth while battling a tendency to skip paperwork deadlines and a competitive edge that pushes they to prove leadership worthiness.
  sports: Rafael Martinez follows Liga MX avidly, cheering for Club América and Chivas on game nights, plays casual pool at the local bar, and joins a weekend beach‑volleyball league at the Long Beach Pier
    while keeping a modest fishing routine that balances competitive spirit with relaxation.
  arts: Rafael Martinez immerses theyself in corridos by Los Tigres del Norte, attends community mariachi performances during Día de los Muertos festivities, and occasionally watches classic Mexican cinema
    icons like Pedro Infante, letting these artistic roots shape their sense of pride and communal connection.
  travel: Rafael Martinez enjoys planning road trips that blend family duty and adventure, such as weekend drives to the surrounding wine country of Temecula and annual pilgrimages to visit relatives in
    Guadalajara, but constraints from supporting extended family and a modest retirement fund often limit longer overseas journeys.
  culinary: Rafael Martinez excels at preparing traditional dishes like pork tamales, slow‑cooked pozole, and chicken mole, favors fresh corn masa and ancho chilies in the kitchen, yet admits to frequently
    ordering pizza on late‑night fishing trips when time is scarce.
  core: Rafael Martinez balances a methodical work ethic and deep family devotion with a restless streak that fuels occasional procrastination, stress‑driven health worries, and a love for late‑night pizza
    after perfecting homemade tamales.
background:
  cultural: Rafael is a first‑generation Mexican‑American whose parents emigrated from Jalisco. He grew up speaking Spanish at home and celebrates Mexican traditions such as Día de los Muertos, quinceañeras,
    and family gatherings with tamales and pozole. Living in Long Beach, he participates in local Mexican cultural festivals, supports his community by volunteering at a neighborhood church, and maintains
    strong ties with extended family in both the United States and Mexico, which shape his values of hard work, respect for elders, and a deep appreciation for Mexican music, cuisine, and communal solidarity.
attributes:
  skills: '[''Commercial floor cleaning'', ''Basic plumbing repairs'', ''HVAC filter replacement'', ''Inventory management'', ''OSHA safety compliance'', ''Bilingual communication (Spanish/English)'', ''Customer
