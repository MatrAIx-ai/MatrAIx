  hobbies: '[''Watching soccer (Liga MX)'', ''Playing pool'', ''Fishing at the pier'', ''Community gardening'', ''Cooking Mexican cuisine'', ''Repairing tools/electronics'', ''Listening to corridos'', ''Morning
    beach walks'']'
  career_goals: Rafael aims to advance to a supervisory or facilities‑management position within the next five years, seeking certification in green cleaning and building operations (e.g., ISSA Cleaning
    Industry Management Institute). He hopes to lead a small team, improve workflow efficiency, and eventually start his own janitorial business that serves Mexican‑American neighborhoods in Long Beach,
    offering culturally attuned service and sustainable cleaning practices. Financial stability for his retirement and the ability to support extended family are also top priorities.
