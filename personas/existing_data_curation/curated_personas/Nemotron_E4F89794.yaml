  career_goals: Although retired, Debra aims to continue contributing to her community by serving on the advisory board of the Cary Senior Center and expanding its intergenerational garden program. She
    hopes to mentor younger volunteers, develop a small online archive of family recipes and stories, and eventually publish a memoir reflecting on post‑war American life. Travel remains a personal ambition;
    she plans to visit historic sites in the Northeastern United States and Europe, combining her love of history with a practical approach to itinerary planning.
