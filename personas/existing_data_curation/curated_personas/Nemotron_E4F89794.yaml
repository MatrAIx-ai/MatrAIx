personas:
  professional: Debra Garrison, a retired homemaker who now serves on the Cary Senior Center advisory board, leverages their decades‑long expertise in budgeting, event coordination, and volunteer scheduling
    to expand an intergenerational garden program while mentoring younger volunteers with a mix of practical patience and gentle assertiveness.
  sports: Debra Garrison, an enthusiastic walker who frequents the Lake Crabtree Nature Preserve, cheers on the Carolina Panthers and the Duke Blue Devils, participates in the local senior softball league’s
    Thursday games, and supports the senior center’s low‑impact fitness classes, and they often lead a gentle stretching group for fellow seniors.
  arts: Debra Garrison, an avid quilt‑maker and regular patron of the Cary Playhouse, enjoys the folk storytelling of Dolly Parton, the classic Broadway melodies of 'South Pacific,' and reads biographies
    of Eleanor Roosevelt, weaving these inspirations into their fabric art and community presentations.
  travel: Debra Garrison, a meticulous planner who loves historic travel, has revisited Williamsburg, Virginia, longs to walk Boston’s Freedom Trail, hopes to stroll the medieval streets of Bruges, Belgium,
    and always books accessible accommodations while balancing a limited travel budget and occasional joint stiffness, and they often research each site’s historical context before departing.
  culinary: Debra Garrison, who cultivates a vegetable plot of collard greens, heirloom tomatoes, and sweet peas, often prepares shrimp and grits, a smoky ham‑hock collard dish, and a peach cobbler spiced
    with cinnamon and nutmeg, while experimenting with fresh herbs like thyme and rosemary, and they relish sharing these meals at community potlucks.
  core: Debra Garrison blends Midwestern thrift, Southern hospitality, and lifelong curiosity into a pragmatic yet warm presence, juggling volunteer leadership, gardening, and meticulous planning while
    occasionally over‑committing to community events and misplacing their glasses.
background:
  cultural: Debra grew up in a middle‑class white family in the Midwest during the 1950s and 60s, shaped by post‑war optimism, a strong work ethic, and community‑centered values. Her family attended a Baptist
    church, where she learned the importance of service, hospitality, and modesty. After moving to North Carolina in her thirties, she embraced Southern traditions such as warm hospitality, church fellowship,
    and a love for regional cuisine. She identifies with mainstream American cultural norms of her generation—valuing self‑reliance, civic participation, and modest ambition—while also appreciating the
    multicultural growth she has witnessed over the decades.
