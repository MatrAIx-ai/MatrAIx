  career_goals: Although she is retired from formal employment, Loan aims to deepen her impact in the local arts and senior community. She hopes to co‑lead an intergenerational art program at the Potomac
    Community Center, mentor emerging small‑business owners from immigrant backgrounds, and help establish a micro‑grant fund for neighborhood cultural projects. She also aspires to complete a personal
    memoir that weaves her Southeast Asian heritage with her life in Maryland, preserving stories for future generations.
