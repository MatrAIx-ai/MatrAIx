  hobbies: '[''Genealogy research'', ''Historical nonfiction reading'', ''Gardening'', ''Quilting'', ''Southern cooking'', ''Walking on nature trails'', ''Yoga'', ''Volunteer adult‑literacy tutoring'',
    ''Community board participation'', ''Crossword and sudoku puzzle nights'']'
  career_goals: Danette aims to transition into a senior office‑manager or operations‑coordinator role within the Wake County public sector, where she can lead a team and spearhead office‑wide efficiency
    initiatives. She plans to earn a Certified Administrative Professional (CAP) credential and complete a short project‑management course to strengthen her leadership toolkit. Long‑term, she envisions
    launching a boutique consulting service that helps small nonprofits streamline their administrative workflows, leveraging her blend of curiosity for new tools and practical implementation experience.
