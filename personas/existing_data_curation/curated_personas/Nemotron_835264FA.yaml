personas:
  professional: Danette Jerome, a seasoned office administrator with over thirty years of experience, harnesses their Excel wizardry and growing fluency in workflow automation tools like Power Automate
    to drive efficiency in public‑sector operations, while mentoring newcomers and critically evaluating every new process for genuine value.
  sports: Danette Jerome follows the Carolina Hurricanes and the UNC Tar Heels with the same devotion they bring to their Saturday morning walking club on the Capital Area Greenway, and they occasionally
    join a local softball league for light competition while keeping an eye on their step count with a fitness tracker.
  arts: Danette Jerome’s artistic life is woven from soulful melodies of Nina Simone and gospel hymns at their church, the storytelling of Maya Angelou’s poems, weekly visits to the local museum’s exhibit
    of cultural heritage art, and evenings spent quilting intricate patterns inspired by Romare Bearden’s collages.
  travel: Danette Jerome prefers purposeful, culturally rich trips—her recent weekend getaway to the historic squares of Charleston, a road‑trip through the civil‑rights landmarks of Birmingham, and a planned
    pilgrimage to Washington, D.C.’s National Museum of History and Culture—balancing a modest travel budget with a desire to deepen their genealogical research.
  culinary: Danette Jerome, an adept home cook, blends Southern comfort staples—crispy fried chicken, slow‑cooked collard greens with smoked turkey, and sweet potato pie—using fresh herbs from their garden
    and occasionally experiments with a pinch of smoked paprika in their gumbo, though they admit their secret stash of store‑bought biscuits tempts them during busy weeks.
  core: Danette Jerome marries meticulous organization with relentless curiosity, turning every spreadsheet into a strategic tool while nurturing a soulful community life seasoned with Southern traditions,
    garden‑fresh meals, and a habit of revisiting genealogical archives whenever they can.
background:
  cultural: Danette is an African‑American woman rooted in the cultural fabric of North Carolina. Her family’s legacy includes participation in the civil‑rights movement and deep involvement in the Black
    church, which shapes her community‑oriented values and love for soulful gatherings. She celebrates Juneteenth, Black History Month, and family traditions such as soul‑food cooking, storytelling, and
    intergenerational mentorship. This heritage informs her resilience, dedication to service, and appreciation for both Southern and broader African‑American cultural expressions.
