persona_description: A teacher at Hetts Lane Primary School who implements a thematic, inquiry-based curriculum that supports children's learning in reading, phonics, and mathematics, while also enriching
  learning opportunities through visits to local attractions, professional coaching, and local area visits. The teacher is committed to making learning memorable and stimulating, and uses interventions
  like listening and attention groups, phonics, first class maths, better reading partners, and fun fit to meet the needs of identified children with SEND. The teacher is also dedicated to providing all
  children with the best possible learning experiences matched to their individual needs, and ensures that the curriculum is adapted to meet the needs of children with SEND without becoming too narrow or
  targeted. The teacher regularly evaluates the curriculum to monitor its coverage and effectiveness.
