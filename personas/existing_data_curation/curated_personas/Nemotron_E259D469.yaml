  career_goals: Minerva aspires to attend a university program in Visual Arts or Digital Media, eventually working as a concept artist or creative director for a multimedia agency. She hopes to secure internships
    that let her blend her artistic talent with strategic thinking, and ultimately launch her own independent brand that produces illustrated children’s books, digital comics, and branded visual content.
    Competitive by nature, she aims to win art competitions and scholarships, using those achievements to build a professional network. She also envisions leveraging her bilingual skills to work on cross‑cultural
    campaigns that highlight Latin heritage.
