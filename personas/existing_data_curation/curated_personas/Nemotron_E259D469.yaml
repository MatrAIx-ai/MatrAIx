personas:
  professional: Minerva Remis, a 16‑year‑old visual arts enthusiast, channels her bilingual curiosity and competitive drive into digital illustration and concept design, leveraging Adobe Creative Suite
    to craft mixed‑media pieces for school media club projects and community art workshops while meticulously organizing deadlines and pushing for artistic recognition.
  sports: Minerva Remis stays active through weekly community flamenco practice, Saturday pick‑up soccer games with friends, and cheering for the LA Lakers and LA Galaxy, combining rhythmic movement with
    competitive team play to balance creative expression and physical fitness.
  arts: Minerva Remis immerses herself in the works of Frida Kahlo, Banksy, and contemporary indie pop duo Tame Impala, regularly sketching in local mural‑rich neighborhoods, curating a personal art blog
    that features mixed‑media tributes to classic Spanish folk songs and modern digital comics.
  travel: Minerva Remis dreams of exploring Barcelona’s street art scene and the historic Alhambra, while she already frequents weekend trips to Santa Barbara beaches, weekend art festivals in San Diego,
    and occasional family visits to family’s hometown for Día de los Reyes celebrations.
  culinary: Minerva Remis’s palate swings between spicy patatas bravas and paella with saffron, crunchy avocado toast for brunch, and sugary churros dipped in chocolate, often experimenting with these ingredients
    in her home kitchen while swapping recipes on her art blog’s lifestyle side.
  core: Minerva Remis is a 16‑year‑old bilingual art prodigy who blends fierce competitiveness in debate with a habit of sketching on every spare surface, obsessively curates her Instagram feed, and occasionally
    procrastinates on schoolwork to binge‑watch gaming streams.
background:
  cultural: Minerva comes from a Spanish family that settled in Southern California. At home, Spanish is spoken alongside English, and her parents maintain traditions such as celebrating Día de los Reyes,
    enjoying tapas and paella, and listening to classic Spanish folk music. Growing up in La Crescenta, she is exposed to the multicultural tapestry of Los Angeles, blending her Iberian heritage with the
    vibrant Latino‑American community. This bicultural upbringing informs her artistic sensibility, encouraging her to explore themes of identity, migration, and the fusion of old and new in her work.
