persona_description: A historian specializing in the Progressive Era in the United States, particularly focusing on the settlement movement in Chicago during the 1890s to 1910s. This person is deeply interested
  in the development of social reform through the lens of personal motives and expanding assumptions, particularly in the context of social welfare and charity. They are knowledgeable about the evolution
  of concepts such as class, gender, and race in the settlement movement and its impact on Progressive reform. They are likely to be familiar with the works of Jane Addams, Graham Taylor, and Mary McDowell,
  as well as the periodical The Commons. They are also likely to be familiar with the historiography of the Progressive Era and the effects of class, gender, and race on its development.
