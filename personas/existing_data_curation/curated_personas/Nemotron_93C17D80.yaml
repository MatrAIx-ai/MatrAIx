  career_goals: David aims to advance from first‑line supervisor to regional sales director within the next five years, taking charge of multi‑team operations and larger revenue targets. He plans to earn
    an MBA or a Certified Sales Leader credential to solidify his strategic expertise. Long‑term, he envisions launching his own sales‑consulting boutique that helps high‑performing teams build resilient
    cultures, while also improving his own emotional resilience through professional coaching and mental‑health training.
