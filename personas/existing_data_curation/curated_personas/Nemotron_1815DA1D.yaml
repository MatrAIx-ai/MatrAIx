personas:
  professional: Martine Bennett, a budding junior architect, channels meticulous spatial reasoning and a love for LEGO construction into designing elaborate cardboard models, while balancing a natural preference
    for predictable routines with a surprisingly relaxed attitude toward strict scheduling.
  sports: Martine Bennett enjoys organized after‑school soccer with the Sunshine City Youth Soccer Club, follows the New York Yankees in baseball and the U.S. women's national soccer team, and approaches
    each practice with a fiercely competitive spirit but also a relaxed stance toward strict training schedules.
  arts: Martine Bennett channels her love for detailed patterns into coloring pages inspired by Eric Carle and the whimsical illustrations of Dr. Seuss, delights in the music of children's performer Laurie
    Berkner, and gathers each weekend for a family movie night featuring Pixar's 'Finding Nemo', letting these artistic influences shape her imaginative play and quiet drawing sessions.
  travel: Martine Bennett dreams of a structured family vacation to the Kennedy Space Center where she can explore real rockets, reminisces about her recent weekend trip to the nearby wildlife refuge, and
    prefers meticulously planned itineraries over spontaneous adventures, though her school schedule and limited allowance keep trips to short, educational outings.
  culinary: Martine Bennett favors creamy mac and cheese spiced with a dash of paprika, delights in assembling peanut‑butter‑jelly sandwiches topped with sliced bananas, and while she can expertly snap
    together a DIY Lego‑themed fruit platter, she still relies on adult supervision for any baking beyond simple cookie cutters.
  core: Martine Bennett is a quiet, detail‑obsessed seven‑year‑old who builds towering LEGO worlds, hoards pennies for spontaneous toy splurges, and can spend an hour meticulously arranging puzzle pieces
    before forgetting to clean up the mess she leaves behind.
background:
  cultural: Martine is raised in a close‑knit African‑American family in Covington, GA. Her upbringing blends Southern traditions—such as church gatherings, family barbecues, and gospel music—with a strong
    sense of Black heritage, including celebrating Juneteenth and hearing stories of community resilience from her grandparents. These cultural influences shape her independent, critical outlook while grounding
    her in a supportive community.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Puzzle solving'', ''Pattern recognition'', ''Organizational skills'']'
  hobbies: '[''Reading'', ''LEGO building'', ''Jigsaw puzzles'', ''Drawing'', ''Watching nature documentaries'', ''Small-group playground games'']'
  career_goals: She dreams of becoming a veterinarian because she loves caring for animals, and also imagines herself as a scientist who uncovers mysteries in nature. Martine is eager to lead a school science
    club and looks forward to competing in spelling bees and science fairs, where she can test her critical thinking and competitive spirit.
