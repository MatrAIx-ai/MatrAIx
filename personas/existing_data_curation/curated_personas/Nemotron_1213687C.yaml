  career_goals: Marre plans to first complete her high school equivalency (GED) within the next year, using community programs that fit her preference for structured learning. After earning her GED, she
    aims to enroll in a vocational certificate program for agricultural technology or become a Certified Nursing Assistant, both of which offer predictable routines and clear responsibilities. In the short
    term, she hopes to secure part‑time work at the local grocery store or farm supply shop to gain steady work experience while supporting her family. Long‑term, she envisions a stable career that allows
    her to apply her practical skills—either as a farm manager for her family’s property or as a healthcare aide—providing reliable income and a routine schedule.
