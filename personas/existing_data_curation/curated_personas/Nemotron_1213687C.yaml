personas:
  professional: Marre Wise is a budding agricultural technician in training who leverages a strong routine‑focused mindset, hands‑on farm maintenance skills, and meticulous scheduling to excel at small‑scale
    livestock care and garden management while preparing for a future GED and vocational certificate.
  sports: Marre Wise is a weekend volleyball player with the local community center league, a regular early‑morning jogger around their family’s farm, and an avid supporter of the Ohio State Buckeyes football
    team and the Cleveland Browns, balancing casual fitness with team spirit.
  arts: Marre Wise is an enthusiast of country and folk music, regularly listening to Dolly Parton, Johnny Cash, and The Lumineers, while also devouring contemporary fiction by Celeste Ng and Sally Rooney,
    and expressing creativity through knitting scarves inspired by traditional patterns and attending the nearby county’s seasonal theater productions featuring local actors.
  travel: Marre Wise is a road‑trip lover who plans meticulous day‑long excursions to nearby natural spots like Hocking Hills State Park, dreams of exploring Asheville’s art scene in North Carolina, and
    wishes to experience the historic charm of Lancaster’s Amish country, always budgeting travel costs in their savings ledger.
  culinary: Marre Wise is a home‑cook who perfects simple family dishes such as chicken pot pie, homemade biscuits, and baked apple crumble, favors garden‑fresh ingredients like tomatoes, basil, and carrots,
    and enjoys experimenting with rustic seasoning blends while keeping their culinary skill level at a confident, beginner‑to‑intermediate stage.
  core: Marre Wise is a routine‑loving farm‑rooted teen who balances practical chores with creative knitting, hoards spare change for low‑risk savings, and keeps stress at bay with garden walks, even if
    they occasionally forget to lock the barn door after a long day.
background:
  cultural: Marre grew up in a traditional Midwestern, white, Protestant family in Huntsville, Ohio. Her cultural upbringing emphasizes self‑reliance, hard work, and community involvement, shaped by county‑fair
    traditions, church activities, and a close‑knit extended family. Family stories trace back to German‑American farming roots, which have instilled values of practicality, thrift, and a strong connection
    to the land. This environment has reinforced her preference for routine, straightforward communication, and a pragmatic outlook on life.
