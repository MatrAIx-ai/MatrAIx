  hobbies: '[''Hiking the Santa Monica Mountains'', ''Urban Photography'', ''Cooking Mexican cuisine'', ''Attending improv comedy shows'', ''Volunteering for STEM outreach'', ''Playing puzzle video games'',
    ''Reading science fiction novels'']'
  career_goals: Migna aims to become a leader in STEM education by creating innovative, project‑based courses that prepare students for emerging tech industries. She aspires to secure external research
    funding to launch a community‑focused outreach program that brings STEM experiences to underrepresented youth in Los Angeles. Over the next five years she hopes to earn tenure, publish interdisciplinary
    research on effective teaching practices, and eventually serve as department chair or director of a multi‑institutional STEM partnership. Her competitive drive pushes her to achieve measurable improvements
    in student outcomes and faculty collaborations, while her practical side ensures the initiatives remain sustainable and aligned with institutional goals.
