personas:
  professional: Migna Milian, a 27‑year‑old postsecondary STEM educator, merges rigorous data‑driven research with flexible, hands‑on course design, leveraging Python, R, and MATLAB to create project‑based
    labs while they competitively pursue grant funding and navigate a relaxed, sometimes disorganized schedule.
  sports: Migna Milian hikes the Santa Monica Mountains with the Pacific Peaks Hiking Club, follows the Los Angeles Lakers and LA Galaxy, and they balance their fitness routine with weekend trail runs,
    preferring low‑key outdoor activity over structured gym sessions.
  arts: Migna Milian captures spontaneous urban photography on their phone, frequents improv nights at the Upright Citizens Brigade, and they find inspiration in the music of Tame Impala and the visual
    storytelling of Wes Anderson, using these creative outlets to recharge between teaching duties.
  travel: Migna Milian prefers flexible, low‑key trips, having explored the Grand Canyon and weekended in San Diego, while they dream of Iceland’s ice caves and Kyoto’s temples, planning each adventure
    on a whim using a travel app that highlights budget‑friendly options.
  culinary: Migna Milian cooks traditional regional dishes like rich mole negro with dark chocolate and pasilla chilies and handmade corn tamales with pork, mastering the balance of spice and flavor while
    they experiment with fresh cilantro, masa harina, and occasional fusion twists.
  core: Migna Milian is a curiosity‑driven yet pragmatically flexible STEM teacher who balances competitive ambition with a laid‑back lifestyle, and they channel their analytical mind into hiking, cooking,
    improv, and purposeful outreach.
background:
  cultural: Migna was raised in a bilingual Mexican‑American household in Los Angeles. Her family celebrates Día de los Muertos, Carnaval, and regional festivals that blend Mexican traditions with Californian
    influences. She is fluent in Spanish and English, and she often incorporates cultural references and multilingual examples into her teaching to make STEM concepts more accessible to a diverse student
    body. Her upbringing emphasizes community, resilience, and the value of sharing knowledge, which informs her commitment to mentorship and outreach within both academic and local neighborhoods.
attributes:
  skills: '[''Curriculum Development'', ''Data Analysis'', ''Python Programming'', ''Statistical Modeling'', ''Laboratory Instruction'', ''Academic Advising'', ''Grant Writing'', ''Educational Technology
