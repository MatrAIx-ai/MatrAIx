persona_description: A physicist or engineer who is interested in the physics of radiation and spectroscopy, particularly in the application of these principles to the study of light and its interactions
  with matter. They are particularly skilled in the design and operation of radiometers and are familiar with the principles of gas dynamics and the effects of radiation on gases. They have a keen interest
  in understanding the physical mechanisms behind the observed motion of the radiometer vanes and are not content to simply accept the conventional explanation. They are likely to be actively engaged in
  the research and development of new technologies for the measurement of radiation and have a deep understanding of the physics behind the operation of radiometers.
