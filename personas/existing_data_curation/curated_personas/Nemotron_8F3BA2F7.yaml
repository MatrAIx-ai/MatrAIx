personas:
  professional: A data-driven management analyst, Denys Harrison leverages advanced statistical modeling, Python, R, and Tableau to streamline processes across multiple departments, while their methodical,
    curiosity‑driven approach and competitive edge push them to translate complex insights into actionable strategies that position them for a senior analytics leadership role.
  sports: Denys Harrison is a regular at the Winter Springs community center, playing pickup basketball with the Orlando Magic youth program and cheering for the Orlando Magic and Florida Gators, complementing
    their active lifestyle with weekend trail runs and a competitive streak that fuels their love for the game.
  arts: Denys Harrison immerses themselves in jazz legends like Miles Davis and contemporary hip‑hop icons such as Kendrick Lamar, frequenting the local jazz club on Fridays and curating playlists that
    inspire both their analytical work and weekend cooking sessions.
  travel: Denys Harrison favors purposeful getaways, having road‑tripped to Savannah’s historic squares and snorkeled in the Florida Keys, while planning a future cultural immersion in New Orleans during
    Mardi Gras, balancing budget constraints with a desire for experiential learning.
  culinary: Denys Harrison enjoys co‑cooking Southern‑inspired dishes like shrimp‑and‑grits with fresh Floridian stone crab, experimenting with spices such as smoked paprika and Cajun seasoning, while their
    skill level ranges from confident sauté chef to occasional over‑sauce mishap.
  core: Denys Harrison is a methodical data analyst who balances competitive basketball, jazz‑infused evenings, and disciplined financial planning, yet sometimes lets a missed dental appointment slip through
    their otherwise organized routine.
background:
  cultural: Denys identifies as African American and grew up in a culturally rich, family‑oriented environment in the Southeast. His heritage is reflected in a strong emphasis on education, community service,
    and resilience. He celebrates traditions such as Juneteenth and participates in local cultural events that highlight Black music, art, and history. The blend of Southern roots and the diverse, growing
    community of Winter Springs informs his worldview, fostering a respect for both collective progress and individual achievement. This cultural lens shapes his commitment to mentorship, his appreciation
    for collaborative problem‑solving, and his drive to represent his community in professional spaces.
attributes:
  skills: '["Data Analysis", "Statistical Modeling", "Predictive Analytics", "Process Optimization", "Project Management", "Stakeholder Communication", "Strategic Planning", "Advanced Excel", "SQL", "Python",
