  hobbies: '["Basketball", "Chess", "Reading non-fiction (economics, technology, leadership)", "Cooking", "Community STEM mentorship", "Hiking", "Running", "Listening to jazz and hip‑hop"]'
  career_goals: Denys aims to advance into a senior analytics leadership role within the next five years, eventually becoming a Director of Business Intelligence or a Chief Analytics Officer. He plans to
    earn an MBA to complement his technical expertise with broader business acumen, and to obtain PMP and data science certifications to solidify his credentials. His long‑term ambition is to lead a cross‑functional
    team that champions evidence‑based decision making, implement AI‑driven forecasting systems, and influence corporate strategy at the executive level. He also envisions mentoring emerging analysts, particularly
    from underrepresented backgrounds, to expand the pipeline of data‑savvy talent.
