  hobbies: '[''Weekend hiking in the Blue Ridge Mountains'', ''Adult softball league'', ''Cooking and exploring Southern cuisine'', ''Wine tasting with friends'', ''Volunteering at local financial literacy
    workshops'', ''Reading non-fiction and financial news'', ''DIY home improvement projects'']'
  career_goals: Kenneth aims to transition into a senior leadership role within his firm, such as Branch Manager or Managing Director, where he can shape strategy, oversee a team of advisors, and drive
    revenue growth. He is pursuing professional designations like the CFP and CFA to enhance credibility and deepen expertise. Over the next five years, he plans to expand his client base through structured
    referral programs, develop a boutique advisory practice focused on holistic financial planning, and become a recognized speaker on financial literacy within the Raleigh community. Balancing ambition
    with his awareness of stress, he also intends to implement workflow efficiencies to reduce personal burnout and foster a supportive team culture.
