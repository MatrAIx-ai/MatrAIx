persona_description: A scientist who specializes in genetics and evolutionary biology, particularly the study of domestication and adaptation in animals. His research interests include the genetic and genomic
  basis of domestication, the evolution of agricultural practices, and the role of dogs in the development of human societies. He is particularly interested in the genetic adaptations of dogs to a starch-rich
  diet and the potential link between dog domestication and the development of agriculture.
