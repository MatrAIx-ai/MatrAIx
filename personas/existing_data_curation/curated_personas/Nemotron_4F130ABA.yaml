  hobbies: '[''Soccer (amateur league)'', ''Team captain and coaching'', ''Hosting neighborhood block parties'', ''MCing community events'', ''Cooking Salvadoran cuisine (pupusas, empanadas)'', ''Participating
    in cooking contests'', ''Karaoke singing'', ''Car restoration (classic cars)'', ''Hiking Houston nature trails'', ''Listening to logistics and supply‑chain podcasts'']'
  career_goals: Miguel aspires to advance into a supervisory role within the postal system, such as a postmaster or logistics manager, where he can apply his systematic mindset to oversee larger operations.
    He aims to earn a USPS certification for advanced mail processing technologies and eventually lead initiatives to modernize routing efficiency in the Houston area. In the longer term, Miguel hopes to
    transition into a supply‑chain management position in a private logistics firm or start a small business offering consulting services for mail and parcel handling optimization. He values stable, structured
    career progression and seeks opportunities that allow him to mentor staff while achieving measurable performance gains.
