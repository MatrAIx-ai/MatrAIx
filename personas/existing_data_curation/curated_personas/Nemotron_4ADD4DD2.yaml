personas:
  professional: Stephen Enriquez is an aspiring junior game developer who creates simple Scratch games, channeling his love for order and strategic planning from chess and Rubik’s Cube solving, while his
    competitive streak pushes him to continuously beat his own high scores and his skeptical nature makes him meticulously test every code loop for bugs.
  sports: Stephen Enriquez plays point guard for the Middle School Warriors basketball team, cheers on the Utah Jazz during the NBA season, and spends weekends trekking with the Smithfield Youth Hiking
    Club along the Wasatch foothills, where his competitive drive pushes him to improve his free‑throw percentage while his practical nature ensures he sticks to a consistent stretching routine despite
    occasional fatigue.
  arts: Stephen Enriquez discovers artistic inspiration in LEGO Star Wars sets, listening to John Williams’ iconic film scores while devouring the sci‑fi novels of Isaac Asimov, and admires aerospace illustrator
    Chesley Bonestell’s paintings, which together shape his leisure time and fuel his creative problem‑solving.
  travel: Stephen Enriquez prefers planned weekend camping trips to nearby national parks like Capitol Reef and enjoys family hikes on the Wasatch Trail, while dreaming of a spring vacation to the Kennedy
    Space Center in Florida and a future school excursion to the Grand Canyon, balancing his excitement for adventure with the practical limits of his parents’ budget and school schedule.
  culinary: Stephen Enriquez delights in assembling homemade pepperoni pizza with mozzarella, oregano, and a crunchy crust, often experimenting with his own trail‑mix snack using almonds, dried cranberries,
    and chocolate chips, and while his cooking skills are still basic, he takes pride in perfectly buttering a grilled cheese sandwich shaped like a LEGO brick.
  core: Stephen Enriquez is a structured, competitive 12‑year‑old who balances a love for orderly LEGO builds and coding with a lingering anxiety that drives his meticulous, yet sometimes overly cautious,
    approach to life.
background:
  cultural: Stephen grew up in Smithfield, Utah, a small rural community with strong family ties and an active local culture centered around outdoors recreation, community events, and a shared value on
    reliability and service. The town’s heritage includes a mix of Western frontier traditions and modern influences, and many families, including Stephen’s, participate in community gatherings, volunteer
    projects, and activities that emphasize cooperation and stewardship of the land. This environment has provided him with a balanced view of rural life and contemporary technology, shaping his practical
    outlook and structured approach to learning.
