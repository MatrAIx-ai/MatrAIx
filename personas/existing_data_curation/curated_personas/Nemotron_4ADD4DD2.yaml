  career_goals: Stephen aspires to turn his love of building and problem‑solving into a career in engineering. He hopes to join a robotics club in middle school, excel in mathematics and science, and eventually
    study mechanical or aerospace engineering at a university. He is motivated to design practical solutions that help his community, such as improving local infrastructure or creating efficient tools for
    outdoor activities. He also wants to develop leadership skills that will allow him to guide teammates in future collaborative projects.
