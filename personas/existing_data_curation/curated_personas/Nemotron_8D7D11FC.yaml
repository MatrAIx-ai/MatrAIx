  career_goals: Anna dreams of a future where she can explore the natural world, envisioning herself as a wildlife biologist who studies animal behavior and protects habitats. She is also fascinated by
    space and imagines becoming an astronaut, combining her love of science with adventure. At the same time, she likes helping classmates with schoolwork and sees herself as a teacher one day, using her
    cooperative nature to guide others. Although she sometimes worries about meeting expectations, these aspirations motivate her to keep learning and practicing her skills.
