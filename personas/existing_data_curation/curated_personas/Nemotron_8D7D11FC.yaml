personas:
  professional: Anna Parks, an aspiring junior geologist, applies their keen curiosity and practical problem‑solving skills from LEGO building and Minecraft to catalog rocks and shells, while they are relaxed
    about strict schedules and let exploration unfold at their own pace.
  sports: Anna Parks enjoys weekend hikes in the Grand Rapids park system, plays on a local Little League baseball team, and cheers for the Detroit Tigers and Detroit Lions while they occasionally join
    a youth soccer clinic, preferring spontaneous outdoor play over regimented workouts.
  arts: Anna Parks, a member of the after‑school art club, sketches favorite characters from Harry Potter and draws scenes inspired by pop icons like Taylor Swift and Billie Eilish, they often pair their
    creations with the upbeat beats of Ariana Grande while experimenting with LEGO sculptures as kinetic art.
  travel: Anna Parks dreams of exploring the shores of Mackinac Island and the bustling aisles of Disney World, they favor spontaneous road trips with family over meticulously planned itineraries, though
    occasional anxiety about new environments makes them cling to familiar routes when possible.
  culinary: Anna Parks loves making simple mac‑and‑cheese with extra cheddar, enjoys snacking on trail mix with dried cranberries and sunflower seeds, and delights in trying fresh strawberry shortcake at
    weekend family picnics, though they often forget to finish homework before dinner, leading to rushed meals.
  core: Anna Parks is a curious, slightly disorganized nine‑year‑old who balances wild imagination with practical tinkering, often worrying about the little things while they obsessively collect rocks,
    LEGO pieces, and story ideas.
background:
  cultural: Anna was raised in a predominantly white, Midwestern family in Grand Rapids, Michigan, with roots tracing back to German and Irish ancestry common in the region. Her upbringing reflects the
    community-oriented values of Kent County, including participation in local festivals like ArtPrize, attending church services, and celebrating holidays such as Thanksgiving, Christmas, and the Fourth
    of July with family traditions. The neighborhood emphasizes school involvement, neighborhood park activities, and a modest, practical lifestyle, all of which shape Anna's balanced curiosity and her
    appreciation for both new ideas and established methods.
