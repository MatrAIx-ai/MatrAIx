persona_description: A firefighter who has dedicated their career to the fire service and has been involved in various firefighting operations, including both traditional interior attacks and transitional
  attacks. They have experience in conducting various job assignments such as interior attack, outside operations, and outside command, and have a strong understanding of the impact of different tactics
  and firefighting locations/assignments on the fireground. They are aware of the health risks associated with firefighting, including cardiovascular events and chemical exposures, and have a keen interest
  in understanding the physiological and chemical impact of the different exposures experienced by firefighters employing differing tactics and conducting various job assignments on the fireground. They
  are also interested in the factors related to firefighting that affect cardiovascular responses under realistic modern fire environments, how the body recovers over the 12 hours following a response,
  and how toxic combustion products get into a firefighter's body.
