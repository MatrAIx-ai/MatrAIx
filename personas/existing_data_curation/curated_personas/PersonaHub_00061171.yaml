  of the microbiological methods used to study and identify acid-fast organisms, including the use of media and stains. They may also have knowledge of the different types of media used to grow acid-fast
  organisms and the specific conditions required for their growth. Additionally, they may have a strong interest in the discovery and history of Robert Koch, and may have a deep understanding of the impact
  of his work on the field of microbiology.
