personas:
  professional: Mary Griffin is an aspiring environmental data analyst who leverages Python scripts to automate the cataloging of Utah's flora and fauna, combining their love of systematic puzzles with
    a practical, routine‑driven approach that values tangible outcomes over abstract theory.
  sports: Mary Griffin cycles the familiar Wasatch Loop as a member of the local Wasatch Cyclists Club, tracks personal time improvements with a competitive edge, occasionally swaps the bike for cross‑country
    skiing at Park City in winter, and cheerfully roots for the Utah Jazz and Real Salt Lake while keeping their fitness routine strictly structured.
  arts: Mary Griffin channels their love of quiet observation into detailed landscape sketches inspired by Ansel Adams and Albert Bierstadt, while they listen to Sufjan Stevens' gentle folk melodies and
    regularly attend virtual museum tours of natural history exhibitions.
  travel: Mary Griffin prefers meticulously planned nature trips, having explored Utah's Arches and Canyonlands National Parks and ventured to Yellowstone, while dreaming of Icelandic glacier hikes and
    keeping future itineraries stored in a detailed travel journal to maintain their love of routine and predictable routes.
  culinary: Mary Griffin favors practical, nutrient‑dense meals such as homemade granola bars with oats, almonds, and honey, avocados on whole‑grain toast, and occasional baked chocolate chip cookies, cooking
    with a modest skill set that they balance between efficiency and a quiet enjoyment of the process.
  core: Mary Griffin is a methodical teen who blends solitary curiosity with a love of routine, balancing competitive puzzle‑solving and nature journaling while they occasionally let disorganization slip
    into missed chores.
background:
  cultural: Mary comes from a predominantly white, middle‑class family in Ogden, Utah. Her upbringing reflects the regional values of self‑reliance, practicality, and an appreciation for outdoor recreation
    such as hiking, biking, and winter sports. While her household does not adhere to a specific religious tradition, it is influenced by the broader cultural norms of the Intermountain West, which emphasize
    modesty, a strong work ethic, and community involvement. Mary’s school and community expose her to a mix of traditional American cultural practices and the unique heritage of the Utah area, including
    respect for local history, interest in the natural environment, and participation in seasonal community events.
attributes:
  skills: '["Algebraic mathematics", "Spreadsheet data organization", "Basic Python scripting", "Word processing", "Bicycle maintenance", "Simple cooking", "Puzzle solving (Sudoku, crosswords, logic games)",
    "Detail‑oriented sketching"]'
  hobbies: '["Reading non‑fiction (natural history, geology)", "Nature journaling on hikes", "Puzzle solving (Sudoku, crosswords, logic games)", "Sketching landscapes and wildlife", "Bicycle riding on familiar
    trails", "Basic Python coding for personal automation", "Watching documentary series on engineering and conservation"]'
  career_goals: Mary wants a career that offers clear routines, practical problem‑solving, and independent work. She is interested in becoming a civil engineering technician or a GIS (Geographic Information
    Systems) analyst, where she can apply her math skills, attention to detail, and fascination with mapping Utah's terrain. She also considers roles such as data‑entry specialist or technical support technician
    that value systematic processes and allow her to work quietly. Her long‑term ambition is to secure a stable, well‑structured profession where achievements are measurable and she can advance through
    consistent performance.
