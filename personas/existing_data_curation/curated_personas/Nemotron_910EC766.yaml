    team practice.
  arts: Marialuisa Nguyen expresses creativity through drawing cartoons, painting watercolors of the river gorge, and practicing piano, often listening to traditional music from their family's heritage
    to inspire their artistic projects.
  travel: Marialuisa Nguyen loves weekend trips to state parks to explore waterfalls and river canyons, and they dream of visiting the Grand Canyon and Norway’s fjords, preferring well‑planned itineraries
    with their parents.
  culinary: Marialuisa Nguyen enjoys simple, colorful meals like vegetable stir‑fry with rice, homemade pizza topped with fresh basil, and weekend honey‑glazed carrot cupcakes, and they showcase a modest
    cooking skill level but a keen interest in experimenting with flavors.
  core: Marialuisa Nguyen is a meticulously organized ten‑year‑old whose boundless curiosity fuels artistic and tech projects, yet anxiety often shadows their disciplined ambitions.
background:
  cultural: Marialuisa's family is of Vietnamese heritage, a Southeast Asian background reflected in her surname Nguyen. Raised in Hood River, Oregon, she experiences a blend of Vietnamese cultural traditions—celebrating
    Tet, preparing pho with her grandparents, learning Vietnamese phrases, and attending cultural festivals—and the Pacific Northwest lifestyle that values outdoor recreation and environmental awareness.
    Her parents emphasize academic achievement and respect for elders while also encouraging her curiosity and creativity, resulting in a multicultural identity that harmonizes Southeast Asian values with
    the progressive, nature-focused community of Hood River.
