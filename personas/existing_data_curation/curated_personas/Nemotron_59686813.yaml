personas:
  professional: Mirela Sheldon, an aspiring interactive storyteller, melds their sketching, photography, and beginner coding skills into small, narrative-driven web projects, meticulously planning each
    storyboard while confidently presenting them in intimate art workshops.
  sports: Mirela Sheldon enjoys early-morning trail runs through the Laguna Coast Wilderness Park as part of the Laguna Beach Junior Runners club, supports the LA Lakers in basketball season, and occasionally
    joins the school's co-ed volleyball team, approaching fitness with a methodical schedule that balances solo cardio with light team play.
  arts: Mirela Sheldon channels their curiosity into sketching urban scenes and capturing sunrise silhouettes, drawing inspiration from Ansel Adams' landscape photography, the narrative style of Marjane
    Satrapi's graphic novels, and the whimsical world-building of Studio Ghibli's Hayao Miyazaki, while regularly attending local museum workshops.
  travel: Mirela Sheldon prefers meticulously planned weekend getaways, having explored the tide pools of Crystal Cove, the historic streets of San Diego's Old Town, and the art galleries of Santa Barbara,
    while dreaming of a future solo trip to Kyoto to experience its manga culture and serene temples.
  culinary: Mirela Sheldon, a budding home chef, favors fresh Mediterranean flavors—whipping up avocado-tomato toast, simple caprese salads with basil and mozzarella, and experimenting with homemade ramen
    broth seasoned with miso and ginger—while still relying on family-cooked meals for comfort.
  core: Mirela Sheldon is a methodical yet imaginative teen who balances solitary sketch-filled afternoons with carefully budgeted art projects, all while quietly charting the world's stories through code
    and camera lenses.
background:
  cultural: Mirela grew up in a middle‑to‑upper‑middle‑class, predominantly white family in Laguna Niguel, Southern California. Her upbringing reflects mainstream American values emphasizing education,
    personal responsibility, and community involvement, while the local coastal lifestyle and the region's multicultural environment have exposed her to diverse artistic influences, from West Coast surf
    culture to the historic Spanish and Asian communities of Orange County. This blend shapes her appreciation for both classic and unconventional art forms.
