  career_goals: He aims to move from his current inspector-tester role into a senior quality assurance position where he can lead a small team and help shape inspection protocols. Over the next few years,
    Stephen plans to earn a Certified Quality Inspector (CQI) credential and complete a short course in statistical process control. He wants to increase his involvement in continuous-improvement projects
    that reduce waste and improve product consistency, while maintaining a schedule that provides regular evenings at home for his family. Ultimately, he envisions a supervisory role that balances clear,
    structured responsibilities with the flexibility to adjust processes as needed, allowing him to leverage his practical experience and cooperative leadership style.
