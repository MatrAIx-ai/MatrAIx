personas:
  professional: An aspiring creative entrepreneur, Louise Burris blends digital photography, upcycled home décor design, and community event planning into a part‑time venture, while their curious yet skeptical
    nature drives them to constantly test market trends and refine their brand on Instagram and Pinterest.
  sports: A yoga‑enthusiast and occasional 5K runner, Louise Burris supports the Iowa Hawkeyes football team and the Des Moines Menace soccer club, they attend community fitness classes at the local YMCA,
    and balance their competitive streak with a relaxed approach to recreational sports.
  arts: Louise Burris curates photographic series of Iowa’s seasonal landscapes, sketches acrylics inspired by Georgia O’Keeffe and Yayoi Kusama, attends gallery openings featuring emerging midwestern artists,
    and frequently discusses art podcasts like "The Art History Babes" with fellow enthusiasts.
  travel: Louise Burris enjoys weekend road trips across the Midwest, having explored the Badlands National Park, the historic streets of Lancaster, Pennsylvania’s Amish Country, and they dream of a spring
    pilgrimage to Provence’s lavender fields while budgeting travel expenses through a dedicated spreadsheet.
  culinary: Louise Burris enthusiastically cultivates heirloom tomatoes and herbs, often canning tomato jam and herb‑infused pickles, and loves cooking rustic bruschetta topped with fresh basil, aged goat
    cheese, and a drizzle of olive oil harvested from their own garden.
  core: Louise Burris is a relentlessly curious, competitively driven maker who balances a love for sustainable art with a habit of over‑booking their calendar and hoarding vintage paint tubes.
background:
  cultural: Louise was born and raised in the heart of the Midwest, growing up in a multigenerational white family in Oelwein, Iowa. Her upbringing was shaped by the region’s agricultural roots, close‑knit
    community values, and a modest, self‑reliant lifestyle. Church gatherings, county fairs, and the annual harvest festival were central to her social life, fostering a strong sense of belonging and respect
    for tradition. While she embraces contemporary art and new ideas, she remains grounded in Midwestern hospitality, valuing hard work, family, and community service.
attributes:
  skills: '[''Digital photography and photo editing'', ''Graphic design (Canva, Adobe Spark)'', ''Arts and crafts blog writing'', ''Community event planning and coordination'', ''Household budgeting and
    basic bookkeeping'', ''DIY home improvement and furniture upcycling'', ''Organic gardening and food preservation'', ''Public speaking and volunteer docent work'', ''Research and critical-thinking'',
    ''Social media content creation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and acrylic painting'', ''Digital photography of seasonal landscapes'', ''Organic gardening (heirloom tomatoes, herbs)'', ''Cooking and canning
    seasonal produce'', ''Listening to philosophy and art podcasts'', ''Attending sustainable design workshops'', ''Book club participation'', ''Yoga practice'', ''Volunteering as a museum docent'']'
  career_goals: Louise aims to turn her creative passions into a sustainable part‑time venture. Over the next few years she plans to launch an online boutique selling handmade upcycled home décor and garden
    products while building a strong brand presence on Instagram and Pinterest. She also hopes to complete her bachelor’s degree in Communications or Arts Management, which would enable her to pursue a
    part‑time role as a community arts coordinator for the Buchanan County cultural council. Ultimately, she envisions organizing an annual "Art in the Fields" festival that showcases local artists and
    sustainable crafts, positioning herself as a catalyst for creative entrepreneurship in rural Iowa.
