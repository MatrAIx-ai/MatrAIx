    and team leadership'']'
  hobbies: '[''Playing conga drums at Latin dance events'', ''Senior community soccer league'', ''Volunteering teaching mechanics to youth'', ''Restoring classic Honduran pickup trucks'', ''Cooking traditional
    Honduran meals for family'', ''Gardening citrus trees'', ''Fishing in the Everglades'', ''Attending car swap meets'', ''Watching automotive and renewable energy documentaries'']'
  career_goals: Raul aims to transition into a senior mentorship role, becoming the lead trainer for his company's diesel technician apprenticeship program while earning EPA 608 certification and a specialization
    in alternative fuel (CNG/LNG) diesel technology. He envisions launching a consultancy that helps small local fleets improve fuel efficiency and retrofit older buses, and eventually opening a niche garage
    that serves Miami's growing Latino fleet community. Additionally, he hopes to share his expertise part‑time at a community college vocational program, fostering the next generation of skilled mechanics.
