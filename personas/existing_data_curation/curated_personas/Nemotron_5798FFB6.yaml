personas:
  professional: Raul Fernandez, a senior diesel technician with expert knowledge in performance tuning, emissions control, and fleet maintenance, channels their practical curiosity and collaborative energy
    into leading apprenticeship training while meticulously applying OSHA and EPA safety standards.
  sports: Raul Fernandez fuels their active lifestyle through the Golden 66 Senior Soccer Club, cheers on the Miami Dolphins and Inter Miami CF, while also joining the local Everglades fishing crew and
    volunteering at the Miami Marlins community baseball clinic.
  arts: Raul Fernandez finds rhythm in nights at community Latin dance halls, where their conga drums echo the beats of Celia Cruz and Carlos Santana, and they unwind with documentaries by David Attenborough
    on renewable energy and classic automotive design.
  travel: Raul Fernandez prefers road‑trip adventures in their restored pickup, having cruised the Keys, explored the historic streets of Havana, and attended swap meets in St. Petersburg, while dreaming
    of a future fishing expedition to the Norwegian fjords, always balancing budget constraints with the desire for hands‑on experiences.
  culinary: Raul Fernandez showcases their culinary flair by whipping up homemade baleadas with refried beans, cheese, and crisp cabbage, grilling fresh Everglades catfish glazed with lime‑orange zest,
    and seasoning dishes with cilantro, garlic, and jalapeños, reflecting a confident, home‑cooked style.
  core: Raul Fernandez is a grease‑stained mentor who drums at dance nights, tends a citrus garden, and navigates retirement savings with the same precise eye they give every diesel engine, even when their
    back protests.
background:
  cultural: Raul immigrated from Honduras to Miami three decades ago and remains deeply connected to the Honduran diaspora. He maintains fluency in Spanish and English, celebrates Honduran holidays such
    as Feria Juniana, and participates in cultural festivals that showcase traditional music and dance. Family ties are central to his life; he regularly sends remittances to relatives back home and hosts
    extended family gatherings featuring Honduran cuisine. As a devout Catholic, he is actively involved in his local parish, where he balances communal responsibilities with his professional life, reflecting
    the blend of collectivist values from his heritage and the entrepreneurial spirit of his adopted city.
attributes:
  skills: '[''Diesel engine performance tuning'', ''Advanced diagnostic scanning'', ''Hydraulic brake and suspension repair'', ''Emissions control and EPA compliance'', ''Preventive maintenance scheduling'',
