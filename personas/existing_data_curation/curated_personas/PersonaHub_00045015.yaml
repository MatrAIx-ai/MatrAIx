persona_description: A healthcare professional who is interested in the prevention and management of dementia, particularly among individuals with a high genetic risk. They are also interested in the impact
  of lifestyle factors on cognitive health and are seeking to understand the role of diet, exercise, and other lifestyle factors in reducing the risk of developing dementia. They are likely to have a background
  in public health, epidemiology, or clinical research, and are interested in using data-driven approaches to identify factors that can be targeted for prevention and intervention. They are also likely
  to be aware of the latest research in the field of dementia and are eager to stay updated with the latest findings.
