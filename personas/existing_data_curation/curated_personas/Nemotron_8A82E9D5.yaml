  hobbies: '[''Cooking traditional Mexican cuisine'', ''Acoustic guitar'', ''Soccer fandom (Liga MX)'', ''Walking/hiking on Fox River Trail'', ''Home automation tinkering'', ''Chess puzzles'', ''Community
    tech workshops'', ''Cultural festival participation'']'
  career_goals: Braulio aims to progress into a senior technical architect or engineering manager role within the next three years, where he can shape system strategy, champion best‑practice processes,
    and mentor the next generation of developers. He plans to obtain an AWS Solutions Architect certification to expand his cloud expertise and eventually launch a boutique consulting firm that helps small
    businesses in the Chicago suburbs modernize legacy systems. Concurrently, he wants to design a structured mentorship program at his current company to improve knowledge transfer, reduce turnover, and
    create a more predictable work environment that mitigates his stress. Long‑term, he envisions a phased transition toward semi‑retirement while maintaining a consulting portfolio that leverages his deep
    technical expertise.
