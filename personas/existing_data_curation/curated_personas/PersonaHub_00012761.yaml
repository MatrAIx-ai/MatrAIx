persona_description: A technologist who is critical of the current state of the internet and believes that it lacks the necessary democratic structures to truly empower its users. This person is passionate
  about the potential of decentralized, democratically run services and the need for institutions of economic power to pay for the infrastructure necessary for these services to exist. They are also aware
  of the potential for the internet to amplify social structures and patterns of communication, and are concerned about the negative effects of this amplification on society. This person is likely to be
  interested in the intersection of technology and politics, and is open to the idea of using the internet to support, demand, and establish more democratic structures.
