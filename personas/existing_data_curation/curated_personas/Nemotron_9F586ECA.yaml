personas:
  professional: Wilfredo Garrastazu is a 45‑year‑old casino surveillance officer who draws on two decades of expertise in multi‑camera CCTV monitoring, bilingual communication, and conflict de‑escalation,
    and they apply a skeptical, data‑driven eye combined with a competitive, organized mindset to swiftly spot anomalies, exceed response‑time benchmarks, and mentor new guards toward higher security standards.
  sports: Wilfredo Garrastazu is an avid fan of Liga MX, never missing a match of his hometown team on television, while also cheering for the San Jose Earthquakes in MLS and the Oakland Athletics during
    baseball season, and they balance sedentary viewing with early‑morning fishing trips as a member of the Calaveras Reservoir Anglers Association, occasional jogs with their dog in the park, and membership
    in a local running club that meets twice a week.
  arts: Wilfredo Garrastazu finds creative respite in the rhythms of traditional mariachi group Los Camperos, the guitar riffs of Carlos Santana, and the vivid murals of Diego Rivera that decorate his cultural
    center, and they channel that appreciation into cooking elaborate dishes, occasionally experimenting with food plating that mirrors the bold color palettes of contemporary artists who draw on those
    same folk traditions.
  travel: Wilfredo Garrastazu prefers meticulously planned road trips that blend adventure and relaxation, having explored the vineyards of Napa Valley, the historic streets of Mexico City, and the ruins
    of Machu Picchu, while they budget carefully to keep family outings affordable yet aspire to a future solo trek through the Japanese Alps to experience quiet mountain temples.
  culinary: Wilfredo Garrastazu is a confident home chef who regularly prepares pozole, tamales, and fresh salsa using home‑grown chilies and tomatoes from his garden, and they enjoy pairing these dishes
    with craft beers or mezcal while occasionally indulging in a secret stash of store‑bought processed snacks during late‑night surveillance shifts.
  core: Wilfredo Garrastazu blends a disciplined, skeptical eye from two decades in casino security with a love for home‑cooked comfort food, DIY electronics, and occasional late‑night snack binges, all
    while chasing a promotion and a future consulting venture.
background:
  cultural: Wilfredo was born to parents who immigrated from Jalisco, Mexico, and grew up in a bilingual household in the San Jose area. His upbringing emphasized family solidarity, respect for elders,
    and participation in Mexican traditions such as Día de los Muertos, quinceañeras, and holiday feasts. While he has assimilated into the broader Californian culture, he maintains close ties to the local
    Mexican-American community, attending church services in Spanish and supporting neighborhood festivals that celebrate his heritage. This cultural foundation shapes his values of hard work, loyalty,
    and hospitality, influencing both his professional demeanor and his personal life.
attributes:
  skills: '[''CCTV operation and maintenance'', ''Real‑time surveillance analysis'', ''Pattern recognition for suspicious behavior'', ''Bilingual communication (Spanish/English)'', ''Conflict de‑escalation'',
    ''Basic first‑aid'', ''Incident report writing'', ''Compliance with gambling regulations'', ''Technical troubleshooting of security equipment'', ''Physical patrol and crowd control'']'
  hobbies: '[''Watching Liga MX soccer matches'', ''Cooking traditional Mexican cuisine'', ''DIY electronics projects'', ''Fishing at Calaveras Reservoir'', ''Walking his dog in local parks'', ''Gardening
    vegetables and chilies'', ''Volunteering at the Mexican cultural center'']'
  career_goals: Wilfredo aims to move from his current role as a floor‑level surveillance officer to a supervisory position within the next three years, seeking a shift‑lead or security manager role where
    he can train new guards and shape operational protocols. He plans to obtain a Certified Protection Officer (CPO) credential and complete a GED to strengthen his formal qualifications. His competitive
    nature motivates him to improve his performance metrics, such as response times and detection rates, and he hopes to contribute to the implementation of advanced analytics tools in casino security.
    Long‑term, Wilfredo envisions opening a private security consulting firm that offers tailored surveillance solutions to small‑business owners in the Bay Area.
