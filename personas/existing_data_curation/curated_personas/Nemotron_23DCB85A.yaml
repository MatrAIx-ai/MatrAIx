  hobbies: '[''Woodworking'', ''Fishing'', ''Gardening'', ''Historical nonfiction reading'', ''Jigsaw puzzles'', ''Model train building'', ''Classic car restoration'']'
  career_goals: Approaching retirement, Doyle seeks a stable, low‑stress role that leverages his extensive fabrication experience while allowing a predictable routine. He aims to move into a senior technician
    or shop‑floor mentor position where he can pass on his practical knowledge to a small team of apprentices. He is also considering opening a modest side business offering custom metal‑fabrication services
    for local contractors and homeowners, providing flexibility and a controlled work pace. Ultimately, his goal is to secure reliable income, reduce financial worries, and create a steady schedule that
    supports his separated household and eases his stress.
