personas:
  professional: Jorge Maldonadogonzalez is an aspiring comic-artist who spends afternoons sketching cartoons and painting watercolors, dreaming of publishing a graphic novel that blends their love for playful
    storytelling with the vibrant colors of their family’s holiday celebrations, and while their curiosity drives them to experiment with new techniques, their spontaneous streak often leaves their sketchbooks
    scattered and deadlines unmet.
  sports: Jorge Maldonadogonzalez plays midfield for the Lewistown Thunder kids’ soccer team, idolizes the speed of St. Louis City SC’s forwards, and spends weekends jogging through local fields and streams,
    balancing team drills with spontaneous nature runs that keep their energy high.
  arts: Jorge Maldonadogonzalez channels their curiosity into drawing cartoons inspired by Dav Pilkey and the whimsical adventures of 'The Amazing World of Gumball', paints watercolors of the rolling Missouri
    hills alongside bright scenes of Día de los Muertos altars, and constructs elaborate LEGO landscapes that reflect both their love of storytelling and their habit of reorganizing projects on a whim.
  travel: Jorge Maldonadogonzalez enjoys day trips to the Ozark National Scenic Riverways, has visited St. Louis’s Science Center on a school field trip, and dreams of exploring the ancient ruins of Teotihuacan,
    preferring a mix of spontaneous backpacking with their family’s carefully planned road trips to nearby state parks.
  culinary: Jorge Maldonadogonzalez eagerly helps roll masa for tamales thick with pork and chilies during family gatherings, delights in the crispy fried catfish served at local fairs, and experiments
    with mango‑lime salsa and avocado guacamole while occasionally sneaking extra cheese into their homemade pizza.
  core: Jorge Maldonadogonzalez is a curious, art‑obsessed ten‑year‑old who mixes spontaneous LEGO creations with watercolor sketches of nature, juggles a modest allowance between impulsive splurges and
    a budding savings habit, and navigates mild allergies and soccer scrapes with their easy‑going, self‑monitoring style.
background:
  cultural: Jorge is raised in a Mexican‑American household where Spanish is spoken at home and Mexican traditions such as Día de los Muertos, quinceañera celebrations, and cooking of family recipes are
    central to family life. Living in Lewistown, MO, he also experiences Midwestern culture—attending a public elementary school, participating in community events, and enjoying local foods like fried catfish.
    This blend of Mexican heritage and rural Missouri influences his worldview, giving him a unique perspective that he often reflects in his artwork and storytelling.
attributes:
  skills: '[''Sketching and painting'', ''LEGO construction'', ''Digital art basics'', ''Bilingual communication (Spanish/English)'', ''Observational detail'', ''Improvisational storytelling'']'
  hobbies: '[''Cartoon drawing'', ''Watercolor painting'', ''LEGO building'', ''Nature exploring'', ''Rock and leaf collecting'', ''Soccer'', ''Listening to Mexican folk music'', ''Reading graphic novels'',
    ''Cooking traditional Mexican dishes'', ''Simple science experiments'']'
  career_goals: Jorge imagines a future where he can blend his love of art and his cultural roots, dreaming of becoming a comic‑book illustrator or an animator who creates stories that celebrate Mexican
    folklore and everyday life in Missouri. He hopes to one day open a community art studio where kids can experiment without rigid rules, encouraging spontaneous creativity. In the short term, he aims
    to improve his drawing skills, learn more about computer graphics, and perhaps enter a junior art contest.
