personas:
  professional: Edivia Gutierrez, a 25‑year‑old interior designer, leverages her strong grounding in spatial planning, color theory, and art‑history to craft boutique residential and boutique‑hotel interiors
    that marry contemporary minimalism with vibrant folk motifs, using AutoCAD, SketchUp, and Revit while thriving in flexible, project‑based settings and championing sustainable, wellness‑focused design.
  sports: Edivia Gutierrez, an avid early‑morning beach jogger and dedicated yoga practitioner at Sunrise Yoga Collective, follows the Miami Heat, the Miami Marlins, and the Tampa Bay Buccaneers from the
    comfort of her living room, and joins a small weekend canoe club on the Intracoastal Waterway for low‑key cardio.
  arts: Edivia Gutierrez, a regular visitor to the Pérez Art Museum and the local Contemporary Art Center, finds inspiration in the bold colors of Frida Kahlo, the serene compositions of Georgia O’Keeffe,
    and the lyrical storytelling of Gabriel García Márquez’s novels, often sketching design ideas while listening to the ambient folk sounds of Caifanes and the piano works of Ludovico Einaudi.
  travel: Edivia Gutierrez, who prefers meticulously curated, low‑key trips that balance quiet reflection with subtle cultural immersion, has explored the pastel streets of Guanajuato, the tranquil tea
    houses of Kyoto, and the vibrant markets of Oaxaca, and dreams of a solo retreat at a sustainable eco‑lodge in the Costa Rican rainforest, planning each journey through detailed notebooks rather than
    spontaneous itineraries.
  culinary: Edivia Gutierrez, an enthusiastic home chef with a solid grasp of traditional cooking techniques, routinely prepares mole poblano, chilaquiles verdes, and hand‑made corn tortillas using heirloom
    corn, dried chilies, and fresh epazote, while also experimenting with modern plant‑based dishes like avocado‑lime quinoa salads, often plating her meals on handcrafted ceramic bowls that echo the textures
    of her vintage textile collection.
  core: Edivia Gutierrez, a 25‑year‑old design maven who thrives in solitude, balances a relaxed, slightly disorganized lifestyle with a fierce commitment to sustainable, culturally resonant interiors,
    and can be found alternating between meticulous sketching sessions and impulsive vintage‑textile hunts.
background:
  cultural: Edivia is a second‑generation Mexican American raised in a bilingual household where Spanish and English intertwined daily. Her upbringing celebrated Mexican traditions such as Día de los Muertos,
    Semana Santa, and vibrant folk art, which cultivated her love for color and pattern. Growing up in South Florida exposed her to a multicultural, coastal lifestyle that blends Caribbean influences with
    Latin American roots. She honors her heritage by incorporating Mexican motifs, handcrafted textiles, and storytelling elements into her interior design work, while also embracing the laid‑back, nature‑rich
    vibe of Delray Beach.
