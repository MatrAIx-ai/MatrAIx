  career_goals: Edivia aims to become a senior interior designer within the next five years, focusing on boutique residential and boutique‑hotel projects that marry contemporary minimalism with vibrant
    Mexican cultural elements. She envisions launching her own studio in Delray Beach that specializes in sustainable, wellness‑centered interiors and offers design workshops on creating quiet, introspective
    spaces. To achieve this, she plans to pursue a professional certification in green design, expand her portfolio through collaboration with local architects, and seek recognition through regional design
    awards.
