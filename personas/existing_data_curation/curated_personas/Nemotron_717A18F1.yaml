  career_goals: Jennifer dreams of a career that lets her explore her curiosity about the natural world while helping others. She is fascinated by wildlife and hopes to become a marine biologist or a wildlife
    conservationist, studying animals and protecting their habitats. At the same time, her love for explaining concepts and her organized nature have sparked an interest in becoming a science teacher, where
    she can guide younger students through experiments and critical thinking. She also entertains the idea of writing children’s books that combine storytelling with science facts, merging her creative
    side with her desire to educate. Overall, her ambitions are grounded in roles that blend discovery, community service, and clear communication.
