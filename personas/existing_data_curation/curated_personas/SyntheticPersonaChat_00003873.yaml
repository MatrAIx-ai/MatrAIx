    User 1: That''s awesome! I wish I was better at saving money.

    User 2: It''s a lot of work, but it''s worth it in the end.

    User 1: I''m sure it is. Do you donate any of your overstock to charity?

    User 2: Yes, I always try to give back.

    User 1: That''s great! I think that''s really important.

    User 2: Thanks. It''s something I''m passionate about.

    User 1: I can tell.

    User 2: I''m glad.

    User 1: So, what are you looking for at the library today?

    User 2: I''m not sure yet. I''m just browsing.

    User 1: Okay. I''m sure you''ll find something interesting.

    User 2: Thanks. I hope so.

    User 1: Well, I''m going to get back to work.

    User 2: Okay. Thanks for talking to me.

    User 1: No problem. Have a good day!

    User 2: You too!'
