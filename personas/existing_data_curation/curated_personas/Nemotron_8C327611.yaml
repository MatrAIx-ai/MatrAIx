  career_goals: Although retired, Alliston's primary ambition is to preserve his independence and health while ensuring a stable financial footing. He aims to complete a small memoir of his life's lessons
    for his family, continue providing occasional hands-on guidance to younger relatives, and volunteer a few hours each month at his church's senior outreach program—preferably in low-key, task-oriented
    capacities. He also wants to keep his home in good repair so he can age in place comfortably.
