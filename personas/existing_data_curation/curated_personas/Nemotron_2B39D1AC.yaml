  hobbies: '["Attending local art fairs", "Reading biographies and historical novels", "Gardening", "Woodworking", "Playing cards with friends", "Listening to classic jazz and big band music", "Nature walks",
    "Genealogical research", "Watercolor painting"]'
  career_goals: Even in retirement, Chris aims to leave a lasting imprint on Langsville. He plans to continue delivering informal talks on the town’s history at the senior center and local library, preserving
    oral traditions for future generations. He hopes to mentor younger residents, especially those interested in art and storytelling, and assist in documenting a community heritage book. Additionally,
    he aspires to volunteer more consistently at the nearby community garden and to contribute a memoir of his life experiences to the local historical society.
