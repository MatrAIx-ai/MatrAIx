  skills: '["Video editing", "Basic Python coding", "Peer mediation", "Basketball team coordination", "DIY computer repair", "Bilingual communication", "Social media content creation"]'
  hobbies: '["Basketball", "Skateboarding", "Video gaming", "YouTube content creation", "Music listening", "PC building", "Cultural festival participation", "Drawing/manga illustration", "Journaling"]'
  career_goals: Chong hopes to turn his passion for technology and storytelling into a professional career as a digital content creator and, later, a game developer. He plans to earn his GED, enroll in
    a community college for computer science, and eventually develop indie games that incorporate mental‑health themes aimed at teenagers. Simultaneously, he wants to launch a bilingual peer‑support network
    for teens in his community, using his outgoing personality and cultural fluency to foster connection and resilience among his peers.
