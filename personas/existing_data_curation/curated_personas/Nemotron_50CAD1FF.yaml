    participation'']'
  career_goals: Joshua is already thinking about careers that blend his artistic flair, technical curiosity, and love for leading others. He dreams of becoming a video‑game designer or interactive media
    developer who can create immersive worlds that challenge players' problem‑solving skills. He also imagines working as an architect or industrial designer, turning unconventional ideas into tangible
    products. Because he enjoys being the center of attention, he envisions possibly hosting a kid‑focused YouTube channel where he reviews games, shares art tutorials, and interviews peers. His competitive
    nature pushes him to aim for recognition in school science fairs, art contests, and sports tournaments, with the long‑term ambition of leading innovative projects that inspire others.
