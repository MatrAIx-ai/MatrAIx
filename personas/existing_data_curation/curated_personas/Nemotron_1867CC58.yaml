  career_goals: Richenda aims to preserve and revitalize Navajo weaving traditions by establishing a weekly workshop series in Sanostee, inviting both elders and youth. She plans to compile a collection
    of recorded oral histories and personal memoirs into a community‑published anthology that celebrates tribal memory. Securing a modest grant, she hopes to convert part of her home into a small cultural
    heritage center where art, stories, and artifacts can be displayed. Richenda aspires to serve as a cultural liaison for the local school, integrating Navajo perspectives into the curriculum and fostering
    respect for indigenous knowledge. She is interested in learning digital storytelling tools to create an online archive of community art and narratives, and she wishes to advocate for culturally appropriate
    mental‑health resources for tribal elders. Mentoring younger artisans, especially women, and showcasing her work in regional Native American art exhibitions are also central to her ambitions.
