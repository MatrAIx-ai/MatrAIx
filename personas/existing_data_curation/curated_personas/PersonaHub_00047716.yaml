persona_description: A researcher who studies the effects of smoking bans on public health and occupational safety, focusing on the Republic of Ireland's smoke-free law and its impact on exposure to secondhand
  smoke and respiratory symptoms. They are interested in understanding the effectiveness of the law in protecting one of the most heavily exposed occupational groups and its potential to reduce smoking
  rates among Irish smokers. They are also interested in exploring the long-term effects of the law and its potential to change smoking behavior among the general population.
