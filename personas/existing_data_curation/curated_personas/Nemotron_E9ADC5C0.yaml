  hobbies: '[''Soccer'', ''Contemporary dance'', ''Hiking and nature photography'', ''DIY science experiments'', ''Reading mystery novels'', ''Creative writing for school newspaper'', ''Baking and cake
    decorating'', ''Crafting friendship bracelets'', ''Volunteer work (food drives, park clean‑ups)'']'
  career_goals: Rachel aspires to combine her love for science with her desire to help her community into a career in environmental health or public health. She plans to attend a university where she can
    major in environmental science or health studies and eventually work as a community outreach coordinator focusing on sustainable practices. In the short term, she aims to lead her school's science club,
    secure a summer internship with a local environmental nonprofit, and earn a scholarship that supports her college education. She also considers becoming a high school teacher to inspire younger students
    in STEM subjects, leveraging her organized and supportive nature.
