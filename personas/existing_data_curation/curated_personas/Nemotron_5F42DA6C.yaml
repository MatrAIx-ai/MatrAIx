  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Walking and bird-watching on local trails'', ''Crocheting and quilting'', ''Volunteering at senior center (craft sessions, admin
    support)'', ''Book club participation'', ''Attending community theater and museums'']'
  career_goals: Although retired from formal employment, Denise aims to deepen her impact in the community. She plans to serve on the board of a local senior services nonprofit, complete her college coursework
    to earn a degree in community development, and develop a mentorship program that pairs retirees with younger volunteers. Denise also hopes to lead a neighborhood garden initiative and to acquire a certification
    in nonprofit governance so she can advise small community groups on best practices. Her long-term ambition is to leave a lasting legacy of organized, compassionate service that promotes harmony and
    practical support for her neighbors.
