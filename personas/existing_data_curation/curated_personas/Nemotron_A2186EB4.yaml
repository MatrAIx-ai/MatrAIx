  career_goals: Ronald dreams of a future where he can help his community while also being in the spotlight. He imagines becoming a firefighter or a school teacher because he likes clear, practical responsibilities
    and helping others. He also loves the idea of a TV host or a local sports coach, where he can entertain and inspire peers. His long‑term ambition is to combine his desire to serve with his love for
    being the center of attention, aiming for a role that lets him both protect and motivate his community.
