  hobbies: '[''Vegetable Gardening'', ''Woodworking'', ''Cooking Salvadoran Cuisine'', ''Family Gatherings'', ''Volunteer Mentoring'', ''Soccer Watching'', ''Crossword Puzzles'', ''Church Community Activities'']'
  career_goals: In retirement, Daniel aims to leverage his engineering background to serve his local community in Royse City. He plans to volunteer as a mentor for high‑school students interested in STEM,
    contribute to neighborhood improvement projects, and compile a practical guide on home repairs for fellow seniors. He also hopes to stay active with his grandchildren, learning new technologies together
    and preserving his family’s legacy.
