personas:
  professional: A retired electrical and mechanical engineer named Daniel Marin applies his meticulous documentation skills and hands‑on problem‑solving to mentor high‑school students in Royse City, blending
    his love of structure with a relaxed, flexible approach that lets him adapt lesson plans on the fly while always prioritizing harmony in the classroom.
  sports: Daniel Marin follows the Salvadoran national soccer team and supports the Houston Dynamo, participates in a local senior walking club that meets three times a week on the Huntsville trail, and
    keeps a modest backyard workout routine focused on low‑impact exercises rather than high‑intensity training.
  arts: Daniel Marin enjoys the soulful rhythms of regional folk musicians like Carlos Vives, regularly attends the Hunt County cultural fair where he shares storytelling sessions, and relaxes with crossword
    puzzles inspired by the works of Mark Haddon, blending music, community, and wordplay into his leisure.
  travel: Daniel Marin favors leisurely road‑trip adventures to historic towns such as San Miguel de Allende and coastal retreats in Galveston, plans itineraries loosely around family gatherings, and while
    health and budget constraints limit long‑haul flights, he dreams of revisiting the volcanic landscape of his parents’ hometown.
  culinary: Daniel Marin, an adept home cook, expertly prepares pupusas stuffed with queso fresco and loroco, crafts fresh salsa verde using tomatoes from his vegetable garden, and balances his love of
    traditional tamales with occasional indulgence in Texas‑style smoked brisket, showcasing a fusion of garden‑fresh and regional flavors.
  core: Daniel Marin blends seasoned engineering precision with a relaxed, garden‑sprinkled lifestyle, mentoring youth, savoring homemade pupusas, and navigating retirement with a steady hand and a fondness
    for spontaneous crossword marathons.
background:
  cultural: Daniel is a first‑generation Salvadoran‑American whose parents emigrated from El Salvador in the 1970s. He grew up bilingual, celebrating Salvadoran holidays such as Día de los Muertos and Semana
    Santa, and maintaining culinary traditions like making pupusas and tamales. In Texas, he blends these customs with local Texan culture, actively participating in the Hispanic community of Hunt County,
    attending the local Catholic parish, and sharing his heritage through storytelling and cooking at community events.
