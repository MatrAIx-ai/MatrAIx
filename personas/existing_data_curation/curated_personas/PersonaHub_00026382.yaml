persona_description: A dedicated and experienced aviation professional with a passion for aviation history and government aviation policy. Jefford is a former Airways Flight Inspector with the Civil Aeronautics
  Authority, who spent over 20,000 flying hours during his career. He was responsible for the establishment of the initial airway structure linking Alaska to Seattle and connecting the communities across
  the state. Jefford's expertise in aviation history and government aviation policy is evident in his detailed recounting of his experiences, including his crash in the mountains east of Nome and his role
  in the development of military airfields during World War II.
