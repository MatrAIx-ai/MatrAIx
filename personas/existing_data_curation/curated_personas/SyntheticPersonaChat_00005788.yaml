    User 1: That''s good to hear. I''m sure your mother appreciates it as well.

    User 2: She does. Thank you.

    User 1: So, what do you do for fun?

    User 2: I like to go to the movies, watch sports, and read. I''m also a big fan of politics.

    User 1: Oh, that''s cool. I like to go to the movies too. What''s your favorite movie?

    User 2: I''m not sure. I like a lot of different movies. But I''m a big fan of action movies and comedies.

    User 1: Me too! What''s your favorite action movie?

    User 2: I like The Dark Knight.

    User 1: That''s a good one. I also like the Mission Impossible movies.

    User 2: Those are good too.

    User 1: So, what do you do for work?

    User 2: I''m a nurse.

    User 1: Oh, that''s cool. I''ve always been interested in nursing.

    User 2: It''s a great job. I love helping people.

    User 1: That''s awesome.

    User 2: Yeah, it is.

    User 1: So, what are your plans for the future?

    User 2: I''m hoping to start my own business.

    User 1: Oh, that''s great! What kind of business?

    User 2: I''m not sure yet. But I''m thinking about something in the medical field.

    User 1: That sounds like a good idea.

    User 2: Yeah, I think so too.'
