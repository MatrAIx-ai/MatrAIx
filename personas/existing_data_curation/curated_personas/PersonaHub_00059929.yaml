persona_description: A concerned parent or guardian who is concerned about the potential symptoms of meningococcal infection in their child and is seeking advice on how to take appropriate actions. They
  are likely to have a background in health or medicine and have taken steps to protect their child from exposure to meningococcal bacteria. They are also likely to be aware of the importance of vaccination
  against meningococcal disease and the potential for transmission of the bacteria through smoking. They are seeking guidance on how to ensure their child is protected against meningococcal infection and
  how to monitor their child for any signs of the disease.
