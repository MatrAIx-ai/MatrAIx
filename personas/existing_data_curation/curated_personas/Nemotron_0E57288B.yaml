  hobbies: '[''mural painting with local youth'', ''playing jam sessions on guitar'', ''improv theater workshops'', ''hiking in state parks'', ''listening to art and philosophy podcasts'', ''co‑op video
    gaming'', ''volunteering at the library reading program'', ''attending regional music festivals'', ''experimenting with new recipes'', ''creating digital collages'']'
  career_goals: Michael aims to earn his GED within the next year and enroll in a community college program focused on visual arts and media production. He dreams of building a career as a multimedia storyteller,
    creating videos, graphics, and live‑event content for a nonprofit arts organization or a small local media outlet. Long‑term, he envisions opening a community art space in Altoona that doubles as a
    café and gallery, where he can host workshops, showcase local talent, and mentor younger teens who share his love of creative expression. He also hopes to use his conflict‑resolution skills to develop
    youth‑leadership programs that foster cooperation and resilience in his hometown.
