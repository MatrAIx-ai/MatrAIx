  career_goals: Approaching retirement, Plato aims to leverage his practical expertise by transitioning into a mentorship role, formally becoming a Certified Nursing Assistant (CNA) and guiding newer staff
    members. He also hopes to lead a quality‑improvement project focused on infection‑prevention within his facility, and to volunteer part‑time with a local senior‑center health outreach program where
    he can apply his structured approach to community education. Ultimately, he wants to leave a legacy of dependable, compassionate care while maintaining a balanced workload that respects his need for
    routine and occasional personal time.
