  career_goals: Tania aims to move from her current inspector role into a supervisory or quality‑lead position where she can shape testing protocols and mentor junior staff. She plans to earn an ASQ Certified
    Quality Technician credential and eventually pursue an associate degree in industrial technology to broaden her technical expertise. In the longer term she hopes to lead a small innovation team focused
    on developing more efficient sampling methods, or transition into a product‑development role that blends her technical knowledge with her love of abstract design. She also envisions using her creative
    interests to contribute to design reviews that balance functionality with aesthetic appeal.
