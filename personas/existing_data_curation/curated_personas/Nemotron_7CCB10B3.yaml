  career_goals: Looking ahead, Sammy aims to transition into a regional leadership role where he can shape strategic initiatives across multiple sites while maintaining his high standards for safety and
    quality. He plans to earn the LEED Accredited Professional credential and champion green construction practices within his company. Over the next five years, he aspires to lead several high‑profile,
    complex projects that integrate innovative prefabrication techniques, positioning the firm as a market leader in efficiency and sustainability. Additionally, Sammy is motivated to mentor junior engineers
    and foremen, fostering a collaborative culture that values both individual expertise and team harmony. Ultimately, he envisions establishing his own boutique consultancy focused on process optimization
    and sustainable building solutions, allowing him to balance professional achievement with the quieter, family‑centered lifestyle he values.
