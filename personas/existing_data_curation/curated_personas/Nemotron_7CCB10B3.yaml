personas:
  professional: Sammy Dominguez, a seasoned construction manager with two decades of experience, applies meticulous project planning, data‑driven cost estimation, and a pragmatic curiosity for emerging
    green technologies like BIM and modular construction to lead multidisciplinary teams, while maintaining a solitary, harmony‑focused work style that prioritizes safety and quality.
  sports: Sammy Dominguez, a solitary fitness devotee, maintains a low‑impact routine of early‑morning trail runs with the Bluebonnet Hiking Club, occasional weekend fly‑fishing trips on the Guadalupe River
    as part of the Riverbend Fly‑Fishing Club, and follows the Houston Astros and Dallas Cowboys from his home office, preferring personal endurance activities over team sports.
  arts: Sammy Dominguez, a dedicated connoisseur of modernist architecture and mural art, spends evenings sketching design concepts inspired by Antoni Gaudí and Frida Kahlo while listening to classical
    guitar virtuoso Andrés Segovia, and they occasionally attend community theater productions of classic plays at the local performing arts center.
  travel: Sammy Dominguez, an organized explorer, prefers meticulously planned trips that combine solitary hiking in Patagonia’s Torres del Paine, a sustainable timber‑house tour in Denmark’s Himmerland,
    and weekend retreats to Texas’s Big Bend National Park, always scheduling travel around project deadlines and using a detailed itinerary spreadsheet.
  culinary: Sammy Dominguez, an accomplished home cook, meticulously prepares mole poblano using toasted pasilla chilies, Mexican chocolate, and a secret blend of spices, crafts tamales wrapped in fresh
    corn husks, and experiments with garden‑grown cilantro, roasted poblano, and heirloom tomatoes, treating each kitchen session as a hands‑on lab for sustainable, flavor‑rich cuisine.
  core: Sammy Dominguez, a quietly disciplined construction leader, balances a solitary love for woodworking and garden‑fresh cooking with an unwavering drive for sustainable building excellence, even when
    their perfectionism stalls spontaneous social outings.
background:
  cultural: Sammy Dominguez is a first‑generation Mexican‑American whose family originates from the state of Jalisco. Raised in a bilingual household, he speaks both Spanish and English fluently and grew
    up participating in cultural traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around Mexican cuisine. While he has assimilated to the Midwestern lifestyle of Greenwood,
    Indiana, he maintains strong ties to his heritage through regular visits to a local Catholic parish, celebrating Mexican holidays, and preserving culinary customs in his home. His cultural background
    emphasizes family loyalty, hospitality, and a respect for hard work, values that inform his collaborative leadership style and his dedication to creating safe, high‑quality building environments.
attributes:
