  hobbies: '["Woodworking", "Gardening", "Fishing", "Birdwatching", "Reading historical non-fiction", "Playing chess (solitaire)", "Listening to jazz and blues", "Genealogical research", "Model train building",
    "Writing memoirs"]'
  career_goals: Although retired, Kelton remains goal‑oriented. He aims to complete a comprehensive family genealogy and translate the findings into a memoir that captures his experiences as a Black man
    in the South during the civil‑rights era. He plans to restore a 1948 Ford pickup to operational condition, using his mechanical and woodworking expertise as a personal project. Kelton also seeks to
    contribute to the Cherokee County Historical Society by curating an archive of local African‑American narratives and by organizing occasional workshops for youth on basic repair and DIY crafts. Maintaining
    his health through regular fishing trips and keeping his mind sharp via chess tournaments and puzzle challenges are also central to his ambitions.
