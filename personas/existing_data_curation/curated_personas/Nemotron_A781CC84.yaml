  hobbies: '[''Reading speculative fiction'', ''Writing poetry'', ''Sketching and digital illustration'', ''Digital photography of landscapes and food'', ''Experimental cooking'', ''Meditation and mindfulness
    practices'', ''Listening to ambient and classical music'', ''Visiting local art galleries'']'
  career_goals: Jose aspires to transition from waiting tables to owning a modest, quiet café that doubles as an art space where patrons can enjoy reflective meals, local coffee, and his own curated photography
    exhibits. To achieve this, he plans to enroll in a short culinary arts program, develop menu design skills, and learn the fundamentals of small‑business management. He also hopes to publish a collection
    of short poetic reflections inspired by the sea and his cultural heritage, positioning himself as a creative figure within his community while securing a more stable, less anxiety‑inducing work environment.
