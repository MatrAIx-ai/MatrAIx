  hobbies: '["Morning walks","Group exercise classes","Cooking circles and recipe swapping","Listening to Bollywood and Urdu music","Attending cultural festivals (Diwali, Eid)","Gardening herbs and vegetables","Reading
    historical fiction and memoirs","Participating in senior center social events"]'
  career_goals: Although retired, Nargis aims to keep contributing to her community by mentoring younger South Asian families in preserving cultural traditions such as cooking and handcrafts. She hopes
    to expand the senior center's cultural programming, introducing regular workshops on traditional recipes and crafts. A personal ambition is to compile a family recipe book that blends stories and memories,
    and possibly write a memoir documenting her immigrant journey and life lessons. Maintaining her health and social vitality is also a priority, as she seeks to stay active, engaged, and supportive of
    fellow widows and seniors in her neighborhood.
