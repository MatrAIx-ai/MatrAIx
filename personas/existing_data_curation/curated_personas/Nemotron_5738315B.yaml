personas:
  professional: Lindsay Exum is a diligent office administrator who balances strict organization with the flexibility to pivot when priorities shift, using meticulous calendar management, advanced Microsoft
    Office proficiency, and budding graphic design skills to keep a busy arts nonprofit running smoothly, while their competitive streak drives them to constantly streamline processes and chase leadership
    opportunities.
  sports: Lindsay Exum embraces the Minnesota outdoors by joining the North Shore Trail Running Club for weekly runs along the Mississippi River Trail, hitting the slopes for snowshoeing in winter, cheering
    on the Minnesota Vikings, Twins, and Timberwolves on game days, and supplementing their fitness routine with yoga classes at the local community studio.
  arts: Lindsay Exum is a budding visual artist who spends evenings painting and photographing autumn foliage, drawing inspiration from Grant Wood’s regionalist scenes, Ansel Adams’ black‑and‑white landscapes,
    and Sufjan Stevens’ indie folk narratives, while regularly visiting the Minneapolis Institute of Art, the Burklyn Art Museum, and local galleries to stay attuned to contemporary trends, and they also
    volunteer at the Champlin Public Library’s art workshops.
  travel: Lindsay Exum favors a mix of carefully planned road trips to nearby gems like Duluth’s Lake Superior shoreline and spontaneous budget flights to creative hotspots such as Portland, Oregon, while
    dreaming of a future adventure to Reykjavik to chase the Northern Lights and explore Iceland’s rugged lakes, all while balancing limited student funds with a desire for cultural enrichment.
  culinary: Lindsay Exum enjoys a modest cooking routine that features pan‑fried walleye with lemon‑dill butter, hearty meatballs with lingonberry sauce, and occasional spicy ramen topped with wild mushrooms,
    and they love supplementing meals with locally sourced kale, fresh dill, and pickled beets while upcycling vintage kitchen tools for a DIY culinary vibe.
  core: Lindsay Exum is a 21‑year‑old Midwestern‑rooted art enthusiast who balances meticulous office work with a competitive drive, an obsessive love for lake‑side photography, and a habit of turning spare
    minutes into DIY upcycling projects, even if it means occasionally sacrificing sleep for late‑night sketching.
background:
  cultural: Raised in Champlin, Minnesota, Lindsay comes from a white, middle‑class family with German and Scandinavian (primarily Swedish) ancestry, reflecting the region’s historical settlement patterns.
    Her upbringing emphasized Midwestern values of hard work, modesty, community involvement, and a strong connection to the outdoors—activities such as lake fishing, snowshoeing, and summer picnics were
    common family traditions. While her family participated in church and local civic events, they also encouraged exploration of cultural experiences, leading her to attend school art programs and community
    festivals. The blend of traditional Midwestern conservatism and exposure to diverse artistic expression has shaped her open‑minded, curious outlook while grounding her in a supportive, community‑oriented
    environment.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint, Outlook)'', ''Calendar and schedule management'', ''Travel coordination'', ''Data entry and record keeping'', ''Written and verbal communication'',
