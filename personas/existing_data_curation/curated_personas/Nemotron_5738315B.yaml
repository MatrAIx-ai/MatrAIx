    ''Problem solving'', ''Event planning support'', ''Project management tools (Asana, Trello)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Painting and sketching'', ''Photography'', ''Reading (fiction and art history)'', ''Exploring local coffee shops'', ''Hiking and nature walks'', ''Yoga'',
    ''Podcasts about creativity and innovation'', ''DIY crafts and upcycling projects'', ''Cooking experimental recipes'', ''Volunteer work at the local library/art programs'']'
  career_goals: Lindsay aims to advance from her current secretarial role to an office manager or executive assistant position within the next three to five years. She plans to earn an Associate’s degree
    in Business Administration from a local community college and obtain professional certifications such as the Certified Administrative Professional (CAP) and Microsoft Office Specialist. Her long‑term
    ambition is to combine her administrative expertise with her passion for the arts by securing a senior assistant role in an arts organization, museum, or gallery, eventually moving into arts administration
    or program coordination. She is competitive and seeks to be recognized as a top performer, continuously improving efficiency and taking on leadership responsibilities in project coordination and team
    support.
