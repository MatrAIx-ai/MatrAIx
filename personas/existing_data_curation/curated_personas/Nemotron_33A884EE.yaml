  career_goals: Britto dreams of turning his passion for art and technology into a career as a multimedia designer or animator. He hopes to attend a high school with a strong visual arts program, earn a
    scholarship for graphic design, and eventually work on community-focused projects that blend street art with digital storytelling. He also entertains the idea of playing basketball at the collegiate
    level, using a sports scholarship to finance his studies in visual communication.
