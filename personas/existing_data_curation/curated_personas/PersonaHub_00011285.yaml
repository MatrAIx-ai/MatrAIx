persona_description: A team of UGM Veterinary Sciences students and Animal Sciences student who are conducting research on the use of giant honey bee as a probiotics therapy to suppress blood sugar levels
  in people with diabetes. The students have selected the honey because of its antibacterial, antihyperglycemia, antihypertension, and antistringent properties, and are using it to ferment milk into yoghurt
  to create a probiotics yoghurt drink that is expected to be an innovation to replace regular diabetes drugs. The team is testing the product in rats to assess its effectiveness in reducing blood sugar
  levels and reducing sugar addiction.
