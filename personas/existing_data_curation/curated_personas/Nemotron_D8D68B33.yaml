  career_goals: Looking ahead, Ana hopes to blend her technical background with her passion for community and art. She plans to earn a certificate in data analytics or community education so she can volunteer
    as a STEM mentor for neighborhood middle-school students. She also dreams of curating occasional pop-up art showcases at local cafés, highlighting emerging Puerto Rican artists. Ultimately, she seeks
    a flexible, part-time role that allows her to continue working as a cashier while dedicating more time to teaching, mentorship, and creative projects.
