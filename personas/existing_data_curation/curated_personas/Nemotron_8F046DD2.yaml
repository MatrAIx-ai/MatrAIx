personas:
  professional: Maira Ramirez, a veteran elementary and middle‑school teacher, leverages their analytical mind and imaginative flair to design bilingual, STEAM‑rich curricula that blend abstract art projects
    with data‑driven assessment, while steering grant proposals and professional‑development workshops with disciplined precision.
  sports: Maira Ramirez, an avid hiker, spends weekends trekking local park trails and volunteers as a captain for the community's adult softball league, while cheering for the nearby professional basketball
    team the City Titans and supporting the regional baseball club the River Runners during the spring season.
  arts: Maira Ramirez, a devoted abstract painter and photographer, draws inspiration from magical realism authors like Gabriel García Márquez and poets such as Octavio Paz, admires the works of Wassily
    Kandinsky, listens to pianist Lang Lang, and curates community art showcases featuring local creators.
  travel: Maira Ramirez, an explorer at heart, prefers thoughtfully planned trips that balance cultural immersion and relaxation, having photographed sunrise over a Caribbean island’s reef, trekked the
    misty hills of the Scottish Highlands, and organized a family visit to the historic streets of Cartagena, while keeping travel budgets in check with early‑bird bookings.
  culinary: Maira Ramirez, a culinary enthusiast, delights in preparing traditional island dishes like arroz con gandules, mofongo, and tostones, using fresh tropical herbs such as cilantro and culantro,
    and enjoys pairing meals with a splash of homemade guava salsa, though they often forget to refrigerate leftovers promptly.
  core: Maira Ramirez blends disciplined leadership with a vivid imagination, turning classroom walls into canvases of cultural storytelling while rigorously tracking budgets, health metrics, and personal
    goals, even if occasional perfectionism leads to sleepless nights and missed dentist appointments.
background:
  cultural: Maira’s Puerto Rican roots shape her worldview and teaching philosophy. Raised in a bilingual household, she carries forward traditions of storytelling, music, and communal celebration, such
    as the annual San Sebastián Festival, into her classroom. Her fluency in Spanish allows her to connect with Spanish‑speaking families and incorporate culturally relevant texts and examples. Living in
    East Northport’s diverse community, she bridges Caribbean heritage with mainland American culture, fostering inclusivity and pride among her students while actively participating in local diaspora events
    and cultural preservation initiatives.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Bilingual (Spanish-English) Instruction'', ''Arts Integration'', ''Project-Based Learning'', ''Educational
