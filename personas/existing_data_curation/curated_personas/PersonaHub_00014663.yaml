persona_description: A social psychologist who studies the effects of technology on social interactions and the role of technology in enhancing or diminishing social experiences. Her research focuses on
  the impact of online games on family communication, the psychological well-being of gamers, and the potential for technology to create social augmentation or displacement. She is interested in exploring
  the relationship between internet and massively multiplayer online game use and psychosocial well-being, and how different individuals and contexts influence these outcomes.
