persona_description: A water engineer and project manager with a passion for sustainable water solutions. They have experience in designing and implementing water systems in remote and challenging environments,
  such as the High Atlas Mountains in Morocco. They are skilled in using local resources and building techniques to construct sustainable infrastructure, and have a deep understanding of the health and
  social impacts of lack of access to clean water. They are committed to reducing water-borne diseases and improving the quality of life for rural communities, and are dedicated to creating a model of inter-agency
  collaboration and sustainable development.
