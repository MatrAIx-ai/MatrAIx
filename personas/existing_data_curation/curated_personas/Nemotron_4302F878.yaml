personas:
  professional: An aspiring teen journalist and creative writer, Mireille Mills channels her love for routine and reflective thinking into the school newspaper, where they craft weekly book reviews and
    layout doodles while occasionally battling a laid‑back attitude toward deadlines that leads to last‑minute edits.
  sports: Mireille Mills stays active through the after‑school yoga club and a low‑key running group, while they avidly support the Golden State Warriors in basketball and the Seattle Seahawks in football,
    preferring the predictable rhythm of routine workouts over competitive team sports.
  arts: Mireille Mills nurtures her creative side by doodling in notebook margins, devouring contemporary YA novels by John Green, and listening to R&B and hip‑hop artists like SZA, H.E.R., and Kendrick
    Lamar, which together shape her relaxed yet introspective artistic sensibility.
  travel: Mireille Mills favors familiar weekend escapes to the coastal town of Cape Cod and the nearby state park for hiking, yet they dream of a quiet visit to Kyoto’s temples, planning trips with meticulous
    itineraries but often postponing them due to school obligations.
  culinary: Mireille Mills finds comfort in the reliable steps of baking chocolate chip cookies, banana bread, and whipping up basic pasta alfredo, often tasting the batter a few extra times and meticulously
    measuring ingredients like cinnamon, vanilla, and brown sugar.
  core: Mireille Mills is a routine‑loving teen who uses journals, yoga, and the steady rhythm of baking to soothe anxiety, yet occasionally succumbs to late‑night video game binges and worries about every
    looming deadline.
background:
  cultural: Mireille was raised in a multi‑generational African‑American household in Plano, Texas. Her family maintains strong ties to the local Black church, where gospel music, community service, and
    weekly fellowship shape her values of compassion and cooperation. Family gatherings often feature Southern‑influenced soul food—collard greens, cornbread, mac & cheese, and sweet tea—celebrating traditions
    such as Juneteenth and church holidays. While Plano is a diverse suburb, she navigates both her African‑American heritage and broader Texan cultural customs, blending the warmth of community church
    life with the suburban environment’s emphasis on education and personal achievement. This blended background informs her practical outlook, love of routine, and desire to give back through a caring
    profession.
