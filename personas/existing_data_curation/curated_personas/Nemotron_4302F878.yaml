  career_goals: Mireille aims to graduate high school and pursue a stable, routine‑driven career in the healthcare field. She plans to enroll in a community‑college program to obtain a Certified Nursing
    Assistant (CNA) credential, with the longer‑term ambition of becoming a registered nurse. The appeal of a predictable schedule, clear procedural steps, and the ability to help others aligns with her
    practical mindset and compassionate side. While she values financial security to ease her worries, she also hopes to keep the option open to explore culinary arts as a hobby or secondary skill, appreciating
    the structured nature of cooking and the comfort it provides.
