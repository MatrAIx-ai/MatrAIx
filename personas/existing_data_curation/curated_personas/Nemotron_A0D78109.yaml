personas:
  professional: Todd Foster is a community‑focused cultural program coordinator‑in‑training with a talent for event planning, public facilitation, and visual arts curation, and they channel their easy‑going
    charisma and calm mediation style into turning neighborhood workshops into collaborative celebrations.
  sports: Todd Foster enjoys early‑morning jogs along the Pompano Beach boardwalk, plays weekend beach‑volleyball with the local Pompano Sharks club, and cheers for the Miami Heat and Miami Dolphins while
    they occasionally catch a Miami Marlins game.
  arts: Todd Foster's evenings are filled with the soulful sounds of Nina Simone and the rhythmic vibes of Bob Marley, while they capture golden Pompano sunsets with their camera and curate community exhibits
    that spotlight local muralist Carlos Rivera.
  travel: Todd Foster favors spontaneous coastal road trips, having explored the historic streets of New Orleans, the reggae‑rich shores of Kingston, and the sun‑kissed beaches of the Florida Keys, and
    they plan each outing with a flexible itinerary that balances budget‑friendly stays with occasional boutique B&Bs.
  culinary: Todd Foster whips up flavorful meals like jerk chicken with scotch bonnet peppers, citrus‑herb roasted fish, and comfort‑style collard greens with smoked turkey, drawing on herbs from their
    garden and often pairing the courses with homemade sweet potato pie for friends and family.
  core: Todd Foster blends a calm, community‑first mindset with restless curiosity, turning every art exhibit, garden harvest, and coffee‑scented story into a shared celebration, even if that means occasionally
    forgetting to water their succulents.
background:
  cultural: Todd’s cultural background is rooted in the African‑American experience of the American South, enriched by the multicultural tapestry of Broward County’s Caribbean diaspora. Growing up, he absorbed
    the rhythms of gospel music in his church, the flavors of soul food passed down through family recipes, and the storytelling tradition that emphasizes community solidarity. Living in Pompano Beach,
    he blends this heritage with the coastal lifestyle—enjoying beach outings, tropical gardening, and the lively Afro‑Caribbean festivals that celebrate reggae, calypso, and steel‑pan music. His identity
    is shaped by a reverence for civil‑rights history, a commitment to uplifting his neighborhood, and a pride in preserving Black cultural expressions through art, food, and communal gatherings.
