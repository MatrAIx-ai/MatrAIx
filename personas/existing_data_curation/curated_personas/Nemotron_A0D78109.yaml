  hobbies: '[''Visiting art galleries and street murals'', ''Photography of coastal and community scenes'', ''Cooking Southern and Caribbean cuisine'', ''Hosting dinner gatherings'', ''Gardening tropical
    and ornamental plants'', ''Mentoring youth in after‑school programs'', ''Volunteering for community clean‑up events'', ''Participating in drums circles and live music sessions'', ''Reading about philosophy
    and social issues'', ''Walking and surfing at the beach'']'
  career_goals: Todd aims to channel his lifelong passion for community and the arts into a part‑time role as a cultural program coordinator at a local nonprofit or community center, where he can design
    intergenerational art workshops and celebrate African‑American heritage. He is also working toward earning a certification in community mediation to formally support neighborhood conflict resolution.
    In the longer term, Todd envisions launching a mobile coffee‑and‑storytelling cart that travels along Pompano Beach’s boardwalk, offering locally brewed drinks, live music, and oral histories that highlight
    the neighborhood’s Black and Caribbean roots. Through these endeavors, he hopes to mentor younger residents, preserve cultural traditions, and create sustainable avenues for community engagement while
    maintaining a balanced lifestyle.
