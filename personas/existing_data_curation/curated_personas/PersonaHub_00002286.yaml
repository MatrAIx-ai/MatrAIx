persona_description: A geophysicist who specializes in the study of earthquakes and fault dynamics, particularly the Parkfield region in California. He has a keen interest in monitoring the buildup of fault
  strain associated with larger earthquakes through the timing of tiny earthquakes on the San Andreas Fault. He has a background in geology and seismology, with a particular focus on the Parkfield region
  and the San Andreas Fault. He has published numerous papers on the topic and is known for his work on the timing of repeating earthquakes in the Parkfield region.
