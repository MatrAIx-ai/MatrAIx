  career_goals: Daisy aspires to attend a specialized arts high school where she can study graphic design or animation. She dreams of becoming a professional visual artist who blends digital media with
    storytelling, creating inclusive content that reflects the experiences of Black teens. She hopes to win youth art competitions, secure a scholarship for a design program, and later collaborate with
    game developers to craft interactive worlds. Long‑term, she envisions launching community art workshops that empower other young people to express themselves through visual media.
