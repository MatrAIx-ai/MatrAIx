personas:
  professional: An aspiring digital artist named Daisy Tariq blends curious sketching with experimental TikTok visuals, channeling their competitive edge into weekly art challenges while often juggling
    schoolwork on a relaxed, disorganized schedule.
  sports: An energetic teen named Daisy Tariq plays forward on the local middle school basketball team, cheers for the Chicago Bulls, and attends after‑school dance workshops to stay limber, yet they often
    show up late to practice due to their easygoing approach to scheduling.
  arts: A creative powerhouse named Daisy Tariq spends afternoons drawing manga‑style heroes, remixing TikTok videos with tracks from Kendrick Lamar and SZA, and citing visual inspirations like Studio Ghibli,
    Banksy, and contemporary street artist Kaws.
  travel: An adventurous teen named Daisy Tariq prefers spontaneous weekend hikes at Eagle Ridge Park and day trips to the nearby lake, while dreaming of future journeys to Kyoto’s temples and New Orleans’
    vibrant street‑art festivals.
  culinary: A food‑curious teen named Daisy Tariq loves whipping up spicy ramen bowls, homemade fish tacos with cilantro and lime, and blending mango‑pineapple smoothies, though they often forget to clean
    the kitchen afterward.
  core: Daisy Tariq, a 13‑year‑old art‑obsessed explorer, constantly balances a chaotic schedule with a fierce competitive streak, turning every spare moment into a canvas or a court, while never quite
    mastering the art of budgeting.
background:
  cultural: Daisy is an African‑American teenager raised in Thornton, Colorado. Her family carries Southern Black cultural traditions—like soulful music, storytelling, and communal gatherings—while also
    embracing the diverse, multicultural vibe of the Denver metro area. She participates in local Juneteenth celebrations and attends youth events at the community church that emphasize Black history and
    artistic expression. Through school clubs and neighborhood programs, she draws inspiration from prominent Black artists, musicians, and activists, integrating that heritage into her own creative projects
    and her desire to uplift her community.
