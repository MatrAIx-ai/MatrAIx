personas:
  professional: Cindy Powers, a budding mini-architect, spends hours stacking wooden blocks into intricate towers, showcasing an early blend of curiosity and practicality that hints at future engineering
    talent.
  sports: Cindy Powers, a lively participant in the neighborhood "Toddler Tumble Gym," loves crawling through the soft play obstacle course, cheers for the Los Angeles Dodgers when her dad wears a cap during
    weekend games, and proudly displays her tiny soccer jersey from the "Little Kicks" club.
  arts: Cindy Powers, an enthusiastic fan of Disney classics, sings "Let It Go" at bath time, delights in finger-painting vivid swirls of blue and yellow, and insists on watching the live-action performance
    of "The Lion King" on family movie nights, drawing inspiration from the animated maestro Lin-Manuel Miranda's musical flair.
  travel: Cindy Powers, an adventurous explorer, has already trotted to Grandma's farmhouse in Ohio, splashed in the shallow waves at Clearwater Beach, Florida, and buzzed with excitement for a future family
    road trip to the Grand Canyon, where she hopes to spot a real-life dinosaur exhibit.
  culinary: Cindy Powers, a picky but expressive eater, swoons over creamy mac & cheese, bites into soft banana slices with gusto, and adamantly refuses peas, yet she can independently pour her own apple
    juice from a small pitcher, proudly claiming she "makes dinner" for her stuffed animal.
  core: Cindy Powers blends boundless toddler energy with a surprisingly organized curiosity, turning everyday chores into playful experiments while memorably negotiating snack times and mastering block
    towers.
background:
  cultural: Cindy Ann Powers is a white child raised in West Monroe, Louisiana, within a Southern cultural milieu. Her family participates in local traditions such as church gatherings and community festivals,
    including the West Monroe Spring Festival and seasonal parades. The household enjoys Southern comfort foods like biscuits, gravy, and occasional Cajun dishes, and is familiar with regional music ranging
    from country to Zydeco. These community‑centered values of hospitality, family togetherness, and outdoor recreation shape Cindy's outgoing, group‑oriented personality and foster her appreciation for
    both new experiences and familiar customs.
