  career_goals: While still a toddler, Cindy's emerging interests hint at future aspirations. She loves asking "why" when she watches nature—such as insects crawling or water flowing—showing an early fascination
    with science. Her enjoyment of storytime and helping to tidy up toys suggests a desire to guide and support others. Her caregivers anticipate that as she grows she may be drawn to roles that blend curiosity,
