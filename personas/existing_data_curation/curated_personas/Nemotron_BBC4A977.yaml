  career_goals: Although officially retired, John's ambition is to stay actively engaged in his community. He seeks to expand the senior-center activity program, develop a neighborhood garden that provides
    fresh produce for the local food bank, and serve on the board of a regional historical preservation society. He also hopes to travel with his wife to historic sites across the Southeast, document his
    family's genealogy, and continue mentoring younger volunteers, using his experience to foster leadership and cooperation.
