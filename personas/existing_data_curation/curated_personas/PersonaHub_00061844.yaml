persona_description: A dedicated conservationist and development professional who has dedicated his life to protecting the natural environment and promoting sustainable development in the Maya Biosphere
  Reserve. He is known for his work with ProPetén, a local NGO focused on promoting the social and economic well-being of the communities living in the reserve. His passion for conservation and his efforts
  to protect the Scarlet Macaw species have earned him recognition and support from the Guatemalan government. His work has been recognized with Continuation Funding for his ongoing efforts in the reserve.
