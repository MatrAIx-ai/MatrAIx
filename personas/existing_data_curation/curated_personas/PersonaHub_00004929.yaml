persona_description: A professional in the field of HVAC systems, specifically in the operation and maintenance of gas/air modulation units. They are responsible for ensuring the efficient combustion of
  the gas mixture and the correct supply of air to the burner. They must be able to accurately control the mass flow of air to achieve the desired output of the water heater, even under different ambient
  conditions. They may need to adjust the impeller speed or use regulation strategies based on the measurement data. They also need to be familiar with the measurement principle of a mass flow sensor and
  how it can be used to set the mass flow exactly.
