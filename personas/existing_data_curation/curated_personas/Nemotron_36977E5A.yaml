  hobbies: '[''Visiting Art Museums'', ''Reading Historical Biographies'', ''Reading Mexican Literature'', ''Cooking Mexican Cuisine'', ''Yoga'', ''Mindfulness Meditation'', ''Hiking in Regional Parks'',
    ''Bilingual Book Club'']'
  career_goals: Emely aims to advance to a senior supervisory role within her insurance firm, overseeing a team of adjusters and shaping quality assurance protocols. She plans to obtain professional certifications
    such as the CPCU (Chartered Property Casualty Underwriter) and the AIC (Associate in Claims) to deepen her technical knowledge. In the longer term, she envisions mentoring new adjusters, developing
    training modules that incorporate cultural competency, and possibly establishing a boutique consultancy focused on claims for the Hispanic community in the Bay Area. She also hopes to contribute to
    policy development that improves fairness and transparency for underserved claimants.
