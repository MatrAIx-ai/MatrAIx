  hobbies: '[''Dancing (R&B and hip‑hop)'', ''Singing in church choir'', ''Attending music festivals'', ''Reading African‑American literature'', ''Cooking Southern comfort food'', ''Gardening'', ''Yoga
    and mindfulness meditation'', ''Volunteering for tutoring and mentorship'', ''Hiking local trails'', ''Visiting museums and cultural sites'']'
  career_goals: Stella aims to advance into a leadership role within her school, such as department head or instructional coach, within the next three years. She plans to earn a Master's degree in Educational
    Leadership to deepen her understanding of school administration and equity initiatives. Long-term, she envisions becoming an assistant principal or principal, where she can shape policies that support
    both military families and underserved students in Fayetteville. Stella also hopes to develop a culturally responsive curriculum guide that highlights African-American history and contributions, and
    to publish articles on inclusive teaching practices. In parallel, she wants to establish a community mentorship program that connects high-school students with local professionals and veterans, strengthening
    pathways to college and career success.
