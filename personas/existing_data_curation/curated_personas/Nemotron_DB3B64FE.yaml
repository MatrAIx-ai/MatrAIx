personas:
  professional: Stella Bumpers, a 25‑year‑old elementary school teacher in Fayetteville, blends methodical lesson planning and data‑driven assessment with vibrant, culturally responsive storytelling, using
    interactive whiteboards and differentiated instruction to keep their classroom organized, inclusive, and energetically engaged.
  sports: Stella Bumpers, a 25‑year‑old who channels their energy into weekly dance‑fit sessions and weekend hikes on the Carvers Creek Trail, follows the Carolina Panthers and Charlotte Hornets, and plays
    forward for the local Fayetteville Cross Creek Soccer Club, treating exercise as a communal stress‑relief ritual.
  arts: Stella Bumpers, an avid reader of contemporary memoirs like 'The Vanishing Half' and a choir member who belts out Beyoncé and John Legend at church, regularly attends Fayetteville’s Crown Town Festival
    and finds inspiration in street art and spoken‑word poetry, weaving those influences into their classroom storytelling.
  travel: Stella Bumpers prefers carefully planned weekend getaways to historic Southern towns such as Savannah and Charleston, while dreaming of a cultural pilgrimage to Ghana, balancing their modest travel
    budget with a love for spontaneous jazz festivals and family visits to military bases.
  culinary: Stella Bumpers, an intermediate home chef, delights in simmering shrimp and grits with smoked paprika and collard greens seasoned with smoked ham hocks, often baking sweet potato pie for church
    potlucks while experimenting with heirloom tomatoes from their garden and fresh herbs like thyme and basil.
  core: Stella Bumpers is a meticulous yet exuberant young educator who balances rigorous lesson planning with spontaneous dance breaks, garden therapy, and a perpetual worry about meeting every expectation.
background:
  cultural: Stella is a Black woman rooted in the Southern tradition of North Carolina. Growing up in a close‑knit African‑American family, she was immersed in church life, community gatherings, and celebrations
    such as Juneteenth and Kwanzaa, which reinforced a strong sense of identity and collective resilience. Living in Fayetteville—a city with a vibrant military presence due to Fort Bragg—has given her
    first‑hand insight into the challenges faced by military families, shaping her commitment to inclusive support. Her cultural heritage informs her teaching through the integration of African diaspora
    history, music, and storytelling into the curriculum, fostering a classroom environment that honors diversity and promotes equity. Stella values mentorship, community service, and the legacy of activism
    that has long been a cornerstone of the local Black community.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning and Curriculum Alignment'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Data-Driven Assessment and Feedback'', ''Student
