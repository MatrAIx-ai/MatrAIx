  hobbies: '[''Abstract Painting'', ''Mixed-Media Art'', ''Poetry Writing'', ''Live Jazz and Spoken-Word Attendance'', ''Improvisational Comedy'', ''Experimental Cooking'', ''Yoga'', ''Nature Walks'', ''Community
    Murals'', ''Mentoring Youth'']'
  career_goals: Aileen seeks to turn her artistic passions into a flexible, community‑focused career. In the near term, she aims to obtain a part‑time role as a community arts coordinator at a Montgomery
    cultural center, where she can design and lead workshops that blend visual art, storytelling, and wellness. Concurrently, she plans to complete an art‑therapy certification to deepen her ability to
    use creativity for emotional healing. Over the next five years, she envisions launching a pop‑up studio and co‑working space that showcases local Black artists, offers flexible creative residencies,
    and hosts collaborative events. Her ultimate ambition is to mentor emerging creators while maintaining a schedule that honors her need for novelty and autonomy.
