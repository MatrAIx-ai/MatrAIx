  hobbies: '[''Walking in Prospect Park'', ''Jazz and blues listening'', ''Reading biographies'', ''Gallery and street art visits'', ''Amateur sketching'', ''Balcony gardening'', ''Vinyl record collecting'',
    ''Documentary film watching'', ''Writing memoirs for community newsletter'']'
  career_goals: Although retired from formal employment, Davian aims to become a volunteer cultural liaison at his neighborhood community center, organizing small art exhibitions and lecture series that
    highlight under‑represented Black artists. He aspires to document his family's oral histories and preserve them in a digital archive, ensuring future generations have access to their heritage. He also
    hopes to learn basic digital photography editing tools to enhance his photo collection. On a personal level, Davian seeks to maintain his health and independence, using his curiosity to explore new
    ideas and occasional informal classes at the local senior center.
