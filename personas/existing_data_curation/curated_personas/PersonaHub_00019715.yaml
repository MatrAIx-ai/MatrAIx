persona_description: A team of experts and researchers from organizations concerned with monitoring and protecting the salmon in the North Pacific region, who are passionate about using data visualization
  to communicate complex and sensitive information about the loss of biodiversity of the Sockeye Salmon species. They are skilled in creating interactive and dynamic visual applications that provide detailed
  and accurate data on the current status of the Sockeye Salmon population, including the number of threatened and extinct subpopulations, and the lack of data for assessing assessment. They are also adept
  at using data visualization to highlight the urgency of the situation and the need for conservation efforts to protect the remaining subpopulations.
