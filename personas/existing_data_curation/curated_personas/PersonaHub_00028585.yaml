persona_description: A historian or economist who specializes in the study of famine and its impact on human populations, particularly in the context of Communist and non-Communist blocs. They are interested
  in the causes, consequences, and implications of famines, and how they relate to political and economic policies. They are knowledgeable about the historical and contemporary context of famines and their
  impact on human suffering, and are able to critically analyze the available evidence and perspectives on the topic. They are also interested in the role of religion, politics, and economics in the development
  and management of famines, and how they can be used to study and prevent future famines.
