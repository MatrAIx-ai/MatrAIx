  hobbies: '[''Reading non‑fiction (science, personal development)'', ''Gardening (vegetable patch)'', ''Nature photography'', ''Puzzle solving (Sudoku, crosswords)'', ''Yoga and mindfulness meditation'',
    ''Cycling on local trails'', ''Small book club gatherings'', ''Volunteer tutoring for high‑school STEM students'']'
  career_goals: Marthe aims to transition from a departmental manager to a senior leadership role such as Director of Operations or VP of Engineering, where she can shape organizational strategy and foster
    a culture of structured yet flexible innovation. She plans to complete an executive MBA to deepen her business acumen and to earn a Certified Scrum Professional credential to strengthen her Agile expertise.
    A key ambition is to mentor and sponsor women in STEM within her company, creating supportive networks that address the stress and work‑life challenges she has personally experienced. Ultimately, she
    seeks a role that balances high impact with a sustainable workload, allowing her to maintain her well‑being while driving measurable performance improvements.
