personas:
  professional: Ashleigh Laughlin, a 22-year-old hospitality enthusiast on the cusp of earning a degree in Hospitality Management, leverages their knack for social media storytelling, meticulous event coordination,
    and natural charisma to turn beach-side festivals into seamless experiences, while their practical curiosity keeps them testing new promotional ideas and their assertive yet collaborative style ensures
    every detail runs smoothly.
  sports: Ashleigh Laughlin, a devoted beach-volleyball enthusiast who trains with the Myrtle Beach Beach Volleyball Club during summer and sways through salsa classes for cardio, stays fit by early morning
    jogs on the boardwalk, and roots for the Carolina Panthers and the Myrtle Beach Pelicans, balancing competitive spirit with a laid-back coastal vibe.
  arts: Ashleigh Laughlin, who fuels her event-planning flair by attending live sets by the Zac Brown Band and Taylor Swift at local venues, practicing salsa to the rhythms of Luis Fonsi, and drawing inspiration
    from cinematic classics like Moonlight and personal-development author Brené Brown, weaves artistic energy into every social gathering.
  travel: Ashleigh Laughlin, who plans trips with a mix of spontaneous zip-code searches and carefully budgeted itineraries, frequently escapes to nearby Charleston and Savannah for weekend getaways, dreams
    of strolling Barcelona's Gothic Quarter and snorkeling in Thailand's Koh Lanta, and always packs a portable camera to capture sunrise moments, balancing limited student funds with a craving for cultural
    immersion.
  culinary: Ashleigh Laughlin, a modest home-chef who whips up shrimp-and-grits with a dash of Cajun spice and bright mango-salsa-topped fish tacos, perfects a key-lime pie using fresh lime zest and condensed
    milk, delights in grilled mahi-mahi seasoned with lemon zest at seaside diners, and relishes exploring new eateries like a low-country boil joint while savoring the occasional gourmet ramen bowl.
  core: Ashleigh Laughlin, a vivacious 22-year-old who thrives on turning beachside gatherings into unforgettable events, never says no to a last-minute concert, habitually hoards seashells as trophies,
    and juggles a relentless social calendar with occasional insomnia from late-night brainstorming sessions.
background:
  cultural: Ashleigh grew up in a Southern, coastal environment that emphasizes hospitality, community cohesion, and a relaxed, outdoors‑oriented lifestyle. Her White Southern heritage, combined with the
    tourism‑driven culture of Myrtle Beach, has shaped her appreciation for friendly interaction, seasonal festivities, and a pragmatic approach to work and recreation. She values southern hospitality,
    the importance of family and community networks, and the blend of traditional customs with contemporary, globally‑influenced trends.
