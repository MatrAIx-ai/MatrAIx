  hobbies: '[''Beach Volleyball'', ''Salsa Dancing'', ''Volunteering at Community Events'', ''Coastal Photography'', ''Exploring Local Restaurants'', ''Live Music Attendance'', ''Personal Development Reading'',
    ''Online Digital Marketing Courses'']'
  career_goals: Ashleigh aims to complete a bachelor’s degree in Hospitality Management or Marketing within the next three years, leveraging her hands‑on experience to secure a full‑time position as an
    event planner at a beachfront resort or a community outreach coordinator for a local nonprofit. She aspires to lead larger events, develop promotional campaigns that blend creative ideas with measurable
    results, and eventually mentor younger employees in the tourism industry.
