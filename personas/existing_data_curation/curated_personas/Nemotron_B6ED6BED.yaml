personas:
  professional: Janet Brooks, a 33‑year‑old aspiring certified nursing assistant and horticulture assistant, leverages their practical DIY skills and curiosity for plants to thrive in flexible part‑time
    positions, while their spontaneous mindset and occasional disorganization sometimes make adhering to strict schedules a challenge.
  sports: Janet Brooks enjoys sunrise beach walks, casual beach volleyball with a tight‑knit group of friends, practices gentle yoga at Coastal Calm Studio, follows the New Orleans Saints during football
    season, and they run with the Gulf Coast Runners Club in the cooler winter months.
  arts: Janet Brooks spends evenings crocheting while listening to true‑crime podcasts like 'Criminology', immerses in the atmospheric indie folk of Sufjan Stevens, devours contemporary mystery novels by
    Tana French, and they draw inspiration from the vibrant mixed‑media works of local Gulf‑Coast artist Maria Alvarez.
  travel: Janet Brooks prefers spontaneous weekend road trips that blend low‑key adventure and relaxation, having recently explored Charleston’s historic districts and Sanibel Island’s oyster farms, while
    they dream of a solo retreat to Bali’s tranquil rice terraces.
  culinary: Janet Brooks cooks with a focus on seasonal Gulf produce, often whipping up shrimp étouffée with fresh Gulf shrimp, okra, and diced tomatoes, or crafting peach‑glazed grilled mahi‑mahi, and
    they enjoy experimenting with heirloom tomatoes, wild herbs, and locally milled cornmeal.
  core: Janet Brooks is a worry‑prone, beach‑loving DIY enthusiast who balances a passion for upcycled décor and gentle yoga with a spontaneous, often disorganized, approach to work and finances, and they
    constantly juggle a buzzing mind with the rhythm of the tide.
background:
  cultural: Janet is a white American raised in the Gulf Coast town of Mary Esther, Florida. Her family’s roots are in the Midwest, but growing up in a small coastal community infused her with Southern
    hospitality, a laid‑back beach lifestyle, and a strong sense of community through local churches and volunteer groups. The region’s emphasis on outdoor activities, seasonal tourism, and a pragmatic
    work ethic has contributed to her practical, curiosity‑driven mindset, while her modest middle‑class upbringing nurtured self‑reliance and respect for tradition. Living independently as a never‑married
    woman, she balances the local culture’s close‑knit expectations with her preference for solitude and small‑group interactions.
attributes:
  skills: '["DIY home repairs", "Basic budgeting", "Microsoft Office (Word, Excel)", "Customer service", "Social media content creation", "Simple cooking and meal planning", "First aid basics", "Volunteer
