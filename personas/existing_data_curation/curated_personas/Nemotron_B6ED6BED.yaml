  hobbies: '["Beach walking and shell collecting", "Birdwatching", "Reading mystery novels", "Journal writing", "Crocheting and upcycling furniture", "Cooking with local produce", "Listening to true‑crime
    podcasts", "Gentle yoga and meditation", "Volunteering for beach clean‑ups"]'
  career_goals: She aims to secure a part‑time role that offers flexibility, such as a certified nursing assistant or horticulture assistant, while she pursues a short certification to boost employability.
    Simultaneously, she hopes to turn her crocheting and upcycled‑furniture hobby into a modest Etsy shop, building a supplemental income stream. Her long‑term ambition is to achieve financial stability
    that eases her worry, allowing her to eventually run a small home‑based business that can also provide occasional part‑time work for other local residents.
