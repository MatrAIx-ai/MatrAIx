  career_goals: Maria aspires to become a biomedical engineer who creates affordable medical devices for underserved communities. She plans to pursue a STEM-focused high-school curriculum, earn a scholarship
    to a university such as Texas A&M or the University of Houston, and eventually work on research that bridges technology and public health. Alongside her technical ambitions, she hopes to mentor younger
    Latino students in science and serve as a role model within her community.
