personas:
  professional: Maria Vengoechea is a budding robotics enthusiast in middle school, combining curiosity with practical problem‑solving to lead her school's robotics club and mentor younger peers while balancing
    her schoolwork and dance rehearsals.
  sports: Maria Vengoechea stars as a midfield dynamo for the Madison High Panthers soccer team, trains with the local club league in the spring, idolizes the MLS side Houston Dynamo, and supplements her
    agility with weekly folklórico rehearsals that keep her feet light on the field.
  arts: Maria Vengoechea channels creativity through folklórico dancing, captures Houston's mural‑rich streets with a DSLR, and dives into graphic novels such as Ms. Marvel, Lumberjanes, and Infinity Gauntlet,
    often sharing her photography on Instagram to inspire friends.
  travel: Maria Vengoechea thrives on weekend family road trips to the historic River Walk in San Antonio, annual escapades to New Orleans for Mardi Gras, and day‑long adventures to Austin’s music festivals,
    while dreaming of a future study‑abroad robotics expo in Japan to blend technology with traditional dance.
  culinary: Maria Vengoechea delights in cooking family recipes like tamales, pozole, and carnitas alongside her grandmother, while also mastering quick dishes such as quesadillas and experimenting with
    chipotle‑ancho spice blends, often treating teammates to homemade feasts after club meetings.
  core: Maria Vengoechea blends disciplined robotics projects with energetic folklórico dance, balances a tight budget, tackles mild asthma head‑on, and never misses a chance to snap street art, though
    they sometimes lose track of laundry during busy weeks.
background:
  cultural: Maria is a second-generation Mexican-American raised in Houston's vibrant Hispanic community. Her family preserves Mexican customs such as Día de los Muertos altars, quinceañera celebrations,
    and weekly family meals featuring dishes like tamales and pozole. She is fluent in Spanish and English, attends a culturally inclusive church, and actively participates in Mexican cultural events hosted
    by local organizations, which shape her identity and community-oriented outlook.
