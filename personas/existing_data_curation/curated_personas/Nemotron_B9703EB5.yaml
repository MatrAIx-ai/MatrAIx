personas:
  professional: Rosalind Masters, a certified makeup artist and hair stylist with a sharp eye for color theory and skin analysis, leverages her meticulous organization and sociable charisma to deliver bespoke
    bridal looks, run seamless salon operations, and mentor junior staff while championing eco‑friendly beauty practices.
  sports: Rosalind Masters stays fit by practicing sunrise yoga, tackling weekend hikes in the nearby bluffs, and playing co‑ed volleyball with the Chicago Amateur Volleyball Association, while cheering
    on the Chicago Cubs, Chicago Bears, and Chicago Bulls as her go‑to Midwestern sports teams.
  arts: Rosalind Masters blends her love of fashion with artistic flair, drawing inspiration from designers like Stella McCartney and Alexander McQueen while attending live shows by Billie Eilish, Haim,
    and John Mayer, and channeling that energy into upcycling vintage pieces and crafting beauty looks that echo Pat McGrath’s daring palettes.
  travel: Rosalind Masters plans her trips with a blend of meticulous itineraries and spontaneous detours, favoring outdoor adventures like hiking Zion National Park and exploring the red rocks of Sedona,
    while also dreaming of cultural escapes to Kyoto’s cherry‑blossom temples and Barcelona’s Gaudí architecture, all balanced against her studio‑building budget and occasional family commitments.
  culinary: Rosalind Masters enjoys cooking hearty family meals such as rosemary‑infused roast chicken and lavender‑thyme zucchini pesto pasta, often harvesting fresh mint, basil, and oregano from her herb
    garden to add aromatic depth, and she proudly mixes her own natural facial toner using cucumber and rose water while perfecting her intermediate‑level sous‑vide skills.
  core: Rosalind Masters is the eco‑savvy beauty professional who balances meticulous organization with a love for community, adventure, and vibrant creativity, all while juggling a rising career, a budding
    boutique dream, and a habit of occasionally over‑scheduling herself.
background:
  cultural: Rosalind was raised in Wayne, a small town in Dixon County, Nebraska, in a family of German‑English heritage. The community’s Midwestern values—hard work, friendliness, and modesty—shaped her
    upbringing. She grew up attending local church events, county fairs, and community potlucks, fostering a strong sense of togetherness. While rooted in these traditions, her work in personal appearance
    has exposed her to national and international beauty trends, creating a blend of classic Midwestern sensibility and contemporary style awareness.
