  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Photography'', ''Hiking and biking in the Cascades'', ''Attending indie music concerts'', ''Community theater participation'',
    ''Volunteering at local art events'', ''Reading contemporary fiction and art theory'', ''Maintaining an art‑and‑life blog'', ''Experimental cooking and food presentation'']'
  career_goals: Alexander aims to leverage his retail experience and humanities background to transition into the arts sector. In the short term, he plans to pursue a part‑time role or internship in a local
    gallery or museum, focusing on exhibition support and visitor engagement. He intends to enroll in a museum studies or arts administration certificate program to deepen his curatorial knowledge. Long‑term,
    Alexander aspires to become a curatorial associate or program director for a community cultural nonprofit, where he can design inclusive exhibitions that highlight regional artists and underrepresented
    voices. He also envisions eventually managing a boutique art shop that blends retail expertise with artistic curation, fostering a space where creativity meets commerce.
