personas:
  professional: Stephanie Garcia, a diligent school bus driver with a CDL and passenger endorsement, blends her methodical route-planning skills, bilingual fluency, and certified safety training to ensure
    reliable transport while quietly mentoring new drivers toward future fleet-management roles.
  sports: Stephanie Garcia enjoys playing competitive beach volleyball with a co-ed club at Mission Bay, follows the San Diego Wave FC and San Diego Padres avidly, and incorporates weekly sunrise runs on
    coastal trails to maintain fitness.
  arts: Stephanie Garcia immerses herself in regional Mexican music, dancing to cumbia and reggaeton tracks by artists like Celso Piña and Bad Bunny, and captures golden-hour sunsets with her DSLR, often
    showcasing her photos at local community center exhibitions.
  travel: Stephanie Garcia favors spontaneous weekend getaways along the Pacific coast, such as camping in La Jolla Cove or exploring Ensenada, while also meticulously planning her dream trips to Oaxaca's
    culinary scene and Kyoto's historic temples, balancing budget constraints with her love for cultural immersion.
  culinary: Stephanie Garcia delights in preparing traditional pozole with hominy, pork shoulder, and dried chilies, crafting tacos al pastor using pork marinated in achiote and pineapple, and experimenting
    with fresh salsas featuring tomatillos, cilantro, and serrano peppers, while proudly showcasing her skillful use of a cast-iron skillet and a molcajete.
  core: Stephanie Garcia blends a pragmatic, organized approach to her career in school transportation with a vibrant love for coastal adventure, cultural music, and homemade Mexican cuisine, all while
    navigating a modest budget and an ever-present drive to modernize her community's fleet.
background:
  cultural: Stephanie’s cultural background is rooted in her Mexican‑American family from Jalisco, who immigrated to Southern California before she was born. Growing up in Vista, she was raised speaking
    both Spanish and English, celebrating traditions such as Día de los Muertos, Mexican Independence Day, and weekly family gatherings centered around homemade meals. Her Catholic upbringing and involvement
    in the local parish have instilled a strong sense of community service. The blend of Mexican collectivist values and the diverse, coastal Southern California environment has shaped her cooperative nature,
    respect for harmony, and dedication to supporting the well‑being of the children she transports daily.
attributes:
  skills: '[''School bus operation'', ''Defensive driving'', ''First aid/CPR certification'', ''Route planning and scheduling'', ''Vehicle inspection and basic maintenance'', ''Bilingual Spanish–English
