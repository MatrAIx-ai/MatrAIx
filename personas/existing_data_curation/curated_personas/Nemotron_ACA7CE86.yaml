  hobbies: '[''Hiking coastal trails'', ''Beach volleyball'', ''Photography of sunsets'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican music'', ''Dancing to cumbia and reggaeton'', ''Reading
    historical fiction'', ''Yoga'', ''Volunteering at community center (Spanish conversation groups)'']'
  career_goals: Stephanie aims to advance within the school district’s transportation department, aspiring to become a senior transportation coordinator and eventually a fleet manager. She plans to complete
    her associate degree in Transportation Logistics and obtain certification as a school bus driver trainer. Her long‑term ambition is to lead initiatives that modernize the district’s bus fleet with hybrid
    or electric vehicles, improve route efficiency, and develop mentorship programs for new drivers. She also hopes to engage in community outreach, creating safe transport solutions for underserved families.
