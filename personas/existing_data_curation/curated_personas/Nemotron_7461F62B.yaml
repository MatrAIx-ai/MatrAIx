  hobbies: '["Salsa and Cumbia dancing", "Cooking Colombian cuisine", "Community volunteering", "Yoga and mindfulness meditation", "Walking along the Hudson River waterfront", "Gardening", "Reading mystery
    novels", "Photography", "Attending cultural festivals", "Language exchange meet‑ups"]'
  career_goals: Marife aims to transition from a senior administrative assistant role to an office manager or executive assistant position where she can oversee a team, implement efficiency initiatives,
    and mentor younger staff. She plans to obtain the Certified Administrative Professional (CAP) credential and take community college courses in bookkeeping to broaden her skill set. In the longer term,
    she envisions opening a small consulting service that helps local non‑profits and family‑run businesses streamline their administrative processes, allowing her to use her organizational strengths while
    achieving a healthier work‑life balance and reducing daily stress.
