personas:
  professional: Marife Tinoco, a 50‑year‑old administrative veteran, combines meticulous record‑keeping, bilingual executive support, and a lively community‑center vibe to streamline office workflows, mentor
    junior staff, and champion efficiency initiatives, and they approach each challenge with a curious yet practical mindset.
  sports: Marife Tinoco stays active through salsa and cumbia dance classes at the local community center, participates in a weekend Hudson River walking club, and follows the New York Knicks, Yankees,
    and NYCFC with devoted enthusiasm, cheering from their balcony while they sip green tea after workouts.
  arts: Marife Tinoco immerses themselves in the rhythms of Celia Cruz, Shakira, and Carlos Vives, captures candid festival moments with a Nikon D3500 inspired by Sebastião Salgado, and unwinds with mystery
    novels by Agatha Christie, reflecting a vibrant artistic soul that fuels both work and leisure.
  travel: Marife Tinoco has explored the colorful streets of Old San Juan, Puerto Rico, and now dreams of trekking the Andes to photograph high‑altitude markets, balancing travel aspirations with a modest
    retirement budget and family obligations, and they meticulously plan each trip to maximize cultural immersion.
  culinary: Marife Tinoco, an avid home cook, perfects arepas with corn masa, simmers ajiaco broth infused with guasca, braises empanadas stuffed with beef and raisins, and experiments with Mediterranean
    salads featuring feta and olives, showcasing an intermediate skill level that blends tradition with curiosity.
  core: Marife Tinoco blends disciplined organization, a love for lively dance, a habit of over‑checking spreadsheets, and a boundless curiosity that keeps them both stressed and endlessly inspired.
background:
  cultural: Marife was born in Medellín, Colombia, and moved to the United States as a young adult. She retains strong ties to Colombian culture, speaking Spanish at home and celebrating holidays such as
    Día de la Independencia, Carnaval de Barranquilla, and the annual Feast of the Virgin of the Rosary with traditional food, music, and dance. Living in Union City’s vibrant Latino community, she participates
    in local Colombian and broader Hispanic events, maintaining a sense of belonging while adapting to American customs. Her bicultural experience informs her warm, sociable demeanor and her dedication
    to helping fellow immigrants navigate bureaucratic and workplace challenges.
attributes:
  skills: '["Bilingual Communication (English/Spanish)", "Calendar Management", "Travel Coordination", "Document Preparation", "Data Entry", "Record Management", "Microsoft Office Suite (Word, Excel, PowerPoint,
