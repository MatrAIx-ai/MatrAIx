personas:
  professional: Kelly Ames, a high‑school senior and aspiring communications strategist, leverages their strong public‑speaking talent, event‑planning savvy, and social‑media fluency to lead school dances
    and community fundraisers, channeling their sociable, practical curiosity into meticulously organized yet adaptable projects.
  sports: Kelly Ames, a varsity volleyball player for the Cypress Valley High Cyclones and avid fan of the Dallas Cowboys, Dallas Mavericks, and Houston Astros, blends rigorous three‑hour practice sessions
    with breezy line‑dancing socials, favoring structured workouts that keep their energy high while still squeezing in weekend tailgate parties with friends.
  arts: Kelly Ames, an enthusiastic drama club lead and choir soprano who idolizes Lin‑Manuel Miranda, Beyoncé, and Texas folk duo The Bright Light, spends evenings rehearsing Broadway numbers, curates
    weekly vlogs of backstage moments, and binge‑reads contemporary YA hits like 'The Hate U Give' and 'One of Us Is Lying', letting their love for performance and storytelling shape both their social circles
    and creative output.
  travel: Kelly Ames, a weekend road‑trip enthusiast who maps out spontaneous getaways across the Texas Hill Country, dreams of attending New Orleans’ Mardi Gras and a West End show in London, and balances
    limited student budget by couch‑surfing with relatives in Austin and using student discounts for flights, preferring a mix of adventure and cultural immersion.
  culinary: Kelly Ames, a moderately skilled home chef who frequently prepares family‑recipe chicken‑fried steak, smoky brisket tacos with fresh cilantro, jalapeño‑infused guacamole, and sweet peach cobbler,
    treats cooking as both a creative outlet and content for their vlog, often swapping recipes with friends while occasionally over‑seasoning in their enthusiasm for bold Texas flavors.
  core: Kelly Ames, an 18‑year‑old social dynamo who juggles leadership of school events, vlog creation, and late‑night rehearsals, always with a phone in hand, a playlist of Broadway hits, and a habit
    of over‑committing to every club while forgetting to reply to texts.
background:
  cultural: Kelly grew up in Karnack, a small town in East Texas, immersed in a Southern, close-knit community. Her family has deep roots in the area, with generations involved in farming and local small
    businesses. The community's emphasis on hospitality, church involvement, family gatherings, and regional traditions such as BBQ, country music, and the county fair have shaped her values of kindness,
    cooperation, and respect for tradition. This cultural environment reinforces her sociable, cooperative personality and her desire to contribute positively to her community.
attributes:
  skills: '["Public speaking", "Event coordination", "Social media content creation", "Interpersonal communication", "Team collaboration", "Organizational planning", "Basic computer proficiency (Microsoft
    Office, Google Suite)", "Problem solving", "Conflict resolution", "First aid (basic)"]'
  hobbies: '["Drama club performances", "Singing in choir", "Organizing school dances and community events", "Vlogging and social media content creation", "Photography of local landscapes", "Cooking family
    recipes", "Reading YA novels", "Playing volleyball", "Volunteering at charity events", "Line dancing"]'
  career_goals: Kelly plans to attend a university to study communications or public relations, aiming to become a community outreach specialist or public affairs professional. She wants to use her sociable
    nature to connect people, promote local events, and support community development. In the long term, she envisions leading a nonprofit organization or serving as a communications director for a regional
    health initiative, blending her curiosity for new ideas with practical impact.
