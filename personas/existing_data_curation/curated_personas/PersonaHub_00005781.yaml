persona_description: An archaeologist who specializes in the study of pottery/ceramic artifacts, particularly focusing on the production, dating, technology, and cultural significance of these objects.
  They are skilled in the preparation, restoration, cataloging, and distribution of ceramic materials, as well as in the use of various research methodologies and tools. They have a deep understanding of
  the relationship between pottery/ceramic production and the communities that created them, and are passionate about the study of material culture and the study of human history.
