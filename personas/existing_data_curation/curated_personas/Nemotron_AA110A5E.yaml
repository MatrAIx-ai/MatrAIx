  career_goals: Fernando aims to transform his logistics firm into the leading regional provider of sustainable freight solutions, expanding into renewable‑energy transport and cross‑border e‑commerce services.
    He seeks to establish a mentorship program for emerging Mexican‑American entrepreneurs and to publish a book that weaves together his experiences in business strategy, creative thinking, and cultural
    heritage. Over the next decade, he envisions stepping back from day‑to‑day operations to focus on philanthropic initiatives, such as scholarships for under‑represented youth and community projects that
    celebrate Mexican art and culture.
