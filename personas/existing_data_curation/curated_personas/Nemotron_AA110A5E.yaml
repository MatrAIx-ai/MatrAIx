  hobbies: '[''Abstract Painting'', ''Speculative Fiction Reading'', ''Piano Playing'', ''Scale Model Building'', ''Urban Photography'', ''Chess'', ''Mexican Culinary Arts'', ''Succulent Gardening'', ''Tech
