  career_goals: Melissa plans to earn her GED within the next year and then enroll in a community‑college program for medical assisting or hospitality management, aiming for a stable, routine‑oriented role
    where she can help others. In the short term she hopes to work part‑time at a local hotel or clinic to gain experience, and long‑term she aspires to become a certified medical assistant or front‑desk
    manager in a healthcare setting, balancing reliable income with a supportive work environment.
