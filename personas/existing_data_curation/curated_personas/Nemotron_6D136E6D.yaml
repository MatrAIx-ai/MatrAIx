  career_goals: Hera aims to advance from a janitorial role to a supervisory position, such as Lead Facility Coordinator, where she can oversee multiple sites and lead a team of cleaners. She plans to complete
    her associate degree in Business Administration and obtain a Certified Facility Manager (CFM) credential. Long-term, she envisions launching her own environmentally-focused cleaning service that partners
    with local art galleries and community spaces to maintain clean, art-friendly environments. Hera also hopes to mentor new employees, champion sustainable cleaning practices, and eventually contribute
    to the design and upkeep of public art installations within Dallas.
