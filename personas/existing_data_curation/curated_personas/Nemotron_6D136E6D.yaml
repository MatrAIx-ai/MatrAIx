personas:
  professional: Hera Alford, a seasoned commercial cleaner and facilities maintenance specialist in Dallas, they blend expertise in green cleaning, OSHA safety, and a keen eye for aesthetic detail to keep
    spaces immaculate while mentoring staff, and they aim to advance to a Lead Facility Coordinator role and eventually launch an environmentally‑focused cleaning service for galleries.
  sports: Hera Alford, an active weekend enthusiast, they stay fit by joining the Dallas Running Club for early‑morning 5K runs, play co‑ed recreational softball in the spring, cheer for the Dallas Mavericks
    and Cowboys on game nights, and treat weekend hikes in the Texas Hill Country as essential mental resets.
  arts: Hera Alford, an avid art lover, they immerse themselves in Dallas’s vibrant scene by frequenting the Dallas Museum of Art, capture street and architectural moments inspired by Edward Burtynsky,
    attend live performances by the Deep Ellum Ensemble, draw inspiration from musicians like St. Vincent, and guide local youth in mixed‑media workshops, blending photography and community creativity.
  travel: Hera Alford, a purposeful traveler, they prefer meticulously planned weekend road trips to cultural hubs like Austin and Santa Fe, enjoy spontaneous day‑long hikes in the Hill Country, have explored
    Oaxaca’s culinary traditions, and dream of a solo adventure through Barcelona’s historic neighborhoods, balancing travel costs with a modest savings plan.
  culinary: Hera Alford, an experimental home chef, they cultivate a balcony garden of succulents and herbs that fuels their Tex‑Mex‑Southern fusion creations such as cilantro‑lime infused nopales tacos,
    chipotle‑braised short ribs over persimmon‑scented quinoa, and rosemary‑marinated succulent salads, showcasing a moderate cooking skill level that blends fresh herbs, heirloom tomatoes, and smoky chipotle
    peppers.
  core: Hera Alford, a curiosity‑driven, eco‑conscious facilities professional, they blend art, sustainable cleaning, and experimental Tex‑Mex cooking into a balanced life of community mentorship and steady
    ambition toward leadership.
background:
  cultural: Hera grew up in a middle-class white family in the Dallas metropolitan area, raised with a blend of Southern hospitality and Midwestern pragmatism. Her upbringing emphasized a strong work ethic,
    community involvement, and respect for tradition, while the multicultural environment of Dallas exposed her to diverse artistic and culinary influences. Although she identifies with mainstream American
    cultural values, she embraces the city’s dynamic arts scene and its progressive attitudes toward sustainability. Her divorce reinforced a sense of independence and self-reliance, shaping her pragmatic
    yet curious worldview.
