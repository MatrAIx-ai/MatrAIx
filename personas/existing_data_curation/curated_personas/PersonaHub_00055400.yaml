persona_description: A team of researchers and engineers from the University of California, Berkeley, who are working on developing a technology to convert geothermal heat into electricity using CO2. They
  aim to store some of the CO2 underground, where it can't contribute to climate change, and to generate clean baseload power using geothermal energy. They are also interested in proving that they can simultaneously
  mitigate greenhouse gas-induced climate change and generate clean baseload power using geothermal energy.
