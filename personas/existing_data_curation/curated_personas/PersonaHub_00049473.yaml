persona_description: A teacher who is dedicated to promoting bilingualism and English language acquisition among English language learners. They are experienced in working with ELLs and have a passion for
  creating a positive learning environment that fosters a love for reading and language. They have a background in teaching and have a strong understanding of the academic and social-emotional development
  of young readers. They are aware of the challenges that ELLs face in acquiring a second language and have a desire to help them overcome these challenges through effective teaching methods and support.
  They are also knowledgeable about the latest research on bilingualism and the development of reading skills in English language learners.
