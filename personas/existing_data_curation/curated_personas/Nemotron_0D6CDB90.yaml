  career_goals: Dwight aims to transition from senior developer to a technology leadership role where he can shape product strategy at the intersection of software and art. He aspires to become a chief
    architect for a company developing AI‑assisted creative tools, and to launch an internal incubator for experimental projects. Mentoring junior engineers and running community‑focused hackathons are
    also central to his vision. While ambitious, he balances his drive with a desire to maintain a sustainable work–life rhythm that mitigates his natural tendency toward worry.
