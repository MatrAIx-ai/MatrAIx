personas:
  professional: Drake Kea, an aspiring junior game developer, blends methodical coding of simple puzzles on their tablet with an inquisitive love for sci‑fi narratives, and they often work in the quiet
    of their bedroom while carefully planning each feature on a notebook.
  sports: Drake Kea enjoys solitary hikes on weekend mornings with the local Junior Rangers club, occasionally practices cross‑country running to improve stamina, follows the Seattle Seahawks for football
    inspiration, and they prefer low‑key cardio over team sports because large group dynamics feel draining.
  arts: Drake Kea explores creative expression through sketching whimsical creatures inspired by Hayao Miyazaki, digital painting sessions emulating Claude Monet’s soft light, and practicing piano pieces
    by Erik Satie, while they draw deep inspiration from the narrative worlds of J.R.R. Tolkien and Brandon Sanderson.
  travel: Drake Kea prefers meticulously planned trips to quiet natural destinations—like weekend camping in the nearby state forest, a family visit to the Grand Canyon, and a future longing to witness
    the Aurora Borealis in Iceland—favoring stargazing and birdwatching over bustling city tours because solitude fuels their imagination, and they always draft a detailed itinerary ahead of time.
  culinary: Drake Kea delights in crafting homemade spaghetti carbonara with pancetta and Parmesan, experiments with blueberry pancakes topped with maple syrup on Saturday mornings, and occasionally snags
    a slice of pepperoni pizza, yet they often forget to eat vegetables, compensating with occasional carrot sticks during study breaks.
  core: Drake Kea is a methodical, curiosity‑driven 11‑year‑old who thrives in quiet creative pursuits, yet they battle persistent worry and a love for solitary adventures.
background:
  cultural: Drake is a white American growing up in Olympia, Washington, a city known for its lush forests, coastline, and strong environmental ethos. His family celebrates typical U.S. holidays while also
    encouraging respect for the Pacific Northwest's natural world. Local influences include frequent visits to the Olympia Public Library's youth art programs, participation in school science fairs, and
    occasional field trips that introduce him to Indigenous histories of the region. The rainy, introspective climate of the area has reinforced his preference for quiet, solitary activities, while the
    vibrant local arts scene fuels his curiosity about new ideas and unconventional creativity.
attributes:
  skills: '[''Detailed sketching'', ''Digital illustration (Procreate)'', ''Creative writing (short stories)'', ''Basic Python programming'', ''Research and note‑taking'', ''Math puzzle solving'', ''Scientific
