  hobbies: '[''Sketching (pen/pencil)'', ''Digital painting (tablet)'', ''Reading sci‑fi/fantasy novels'', ''Nature hikes and birdwatching'', ''Playing piano (quietly)'', ''Building LEGO models'', ''Coding
    simple games (Scratch, Python)'', ''Journaling'', ''Puzzle solving (Sudoku, crosswords)'', ''Stargazing'']'
  career_goals: Drake dreams of becoming a visual storyteller who blends art and technology. In the long term he hopes to work as a concept artist or indie game developer, creating immersive worlds that
    reflect his love for unconventional ideas. He also aims to attend a specialized arts high school and eventually open a small studio where he can work independently on illustration, narrative design,
    and interactive projects.
