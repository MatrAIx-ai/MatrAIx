  career_goals: Jackson aims to excel academically and earn a scholarship to attend a STEM‑focused high school. He aspires to become a software engineer or video game developer who designs immersive solo
    adventures, allowing him to blend his love of technology with his preference for quiet, independent experiences. He also harbors a secondary ambition to study wildlife biology or environmental technology,
    so he can apply his analytical skills to protecting the natural areas he explores alone. Ultimately, he hopes his future work will provide both personal fulfillment and recognition for his competitive
    drive.
