personas:
  professional: Jackson Potter, an aspiring young coder and junior robotics enthusiast, channels his curiosity and practical mindset into creating simple Python games and programming LEGO Mindstorms robots
    with meticulous documentation, while his competitive streak drives him to perfect every line of code and his frequent anxiety leads him to over‑review his projects before sharing them.
  sports: Jackson Potter, an avid solitary hiker who spends weekends exploring the Boise foothills and follows the Boise State Broncos football team, occasionally runs with the Boise Youth Hiking Club’s
    weekend trail drills for cardio, while avoiding team sports in favor of low‑impact exercises that let him observe wildlife and map terrain.
  arts: Jackson Potter, a digital illustrator of fantasy landscapes, draws inspiration from H.R. Giger’s surreal art and Jeremy Soule’s ambient game scores, curates playlists featuring Max Richter and Brian
    Eno while watching Steven Spielberg’s adventure films, and channels this creative energy into both his drawings and his storytelling in interactive game projects.
  travel: Jackson Potter, who prefers meticulously planned solo‑style adventures, has hiked to Craters of the Moon National Monument and dreams of backpacking the Swiss Alps, opting for modest campgrounds
    over luxury hotels while balancing school schedules, parental constraints, and his desire for quiet, nature‑immersive experiences.
  culinary: Jackson Potter, a kitchen novice who enjoys tinkering with recipes, often cooks quick spaghetti carbonara topped with fresh basil and experiments with 3D‑printed cookie cutters for chocolate
    chip cookies, while his palate gravitates toward bold flavors like kimchi, mango salsa, and homemade pho when dining out.
  core: Jackson Potter, a solitary 12‑year‑old tech tinkerer, balances fierce curiosity with a tendency to over‑analyze and bouts of anxiety, often losing sleep over unsolved puzzles while obsessively cataloging
    his LEGO builds and digital sketches.
background:
  cultural: Jackson is a white American growing up in a middle‑class family in Boise, Idaho. His upbringing reflects typical Pacific Northwest values—self‑reliance, a respect for the outdoors, and an emphasis
    on practical problem‑solving. Family traditions include seasonal camping trips to the Boise National Forest and weekend visits to local science fairs and library STEM workshops. The community is largely
    homogeneous, and local culture promotes independence, aligning with his preference for solitude. He is exposed to mainstream American media, the region's emphasis on technology and outdoor recreation,
    and community programs that encourage individual achievement in science and engineering.
