  career_goals: Yetunde aims to enroll in a community college within the next year, pursuing an associate degree in early childhood education or nursing—fields that align with her caring nature and desire
    for flexible, practical work. In the short term, she hopes to secure a part‑time internship at the Danville community health center to gain hands‑on experience. Long‑term, she envisions becoming a certified
    pediatric nurse or an elementary school teacher, roles that allow her to blend empathy with structured expertise. She also dreams of launching a small online boutique selling handmade crafts and photography
    prints, merging her creative curiosity with entrepreneurial ambition.
