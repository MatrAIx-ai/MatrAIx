personas:
  professional: Yetunde Alston, an aspiring pediatric nursing intern, blends their caring nature and practical curiosity by applying first‑aid certification, social‑media storytelling, and strong interpersonal
    mediation skills to support patients and community health initiatives, all while embracing a flexible, collaborative approach that tolerates occasional disorganization.
  sports: Yetunde Alston, an avid walker who frequents the Danville River Trail for reflective hikes and occasionally joins a community yoga circle, cheers on the Chicago Bulls, Bears, and White Sox, and
    enjoys casual pick‑up basketball games at the local recreation center, reflecting a balanced but low‑key approach to fitness.
  arts: Yetunde Alston, a photography enthusiast who draws inspiration from Gordon Parks and captures community life along the Danville River Trail, regularly streams soul classics by Aretha Franklin, Marvin
    Gaye, and Kirk Franklin while discussing YA novels by Angie Thomas and John Green in book clubs, and occasionally dances to gospel beats at church events, weaving creative expression into everyday moments.
  travel: Yetunde Alston, a road‑trip‑loving teen who has explored Chicago’s museums, Nashville’s music scene, and a family reunion in Atlanta, dreams of a spring visit to New Orleans for its vibrant Mardi
    Gras parades and a future weekend hike in the Great Smoky Mountains, preferring spontaneous itineraries over rigid planning while balancing a limited student budget.
  culinary: Yetunde Alston, an intermediate home cook who faithfully prepares Southern staples such as fried chicken, collard greens, cornbread, and sweet‑potato pie using family‑handed recipes and enjoys
    tweaking them with hot sauce and fresh herbs, often shares the dishes on Instagram while treating themselves to occasional pizza nights as a relaxed culinary balance.
  core: Yetunde Alston balances a caring, community‑first mindset with a laid‑back, sometimes chaotic approach to planning, channeling curiosity into photography and social‑media storytelling while occasionally
    procrastinating on school assignments and forgetting to recharge their phone.
background:
  cultural: Yetunde is a Black American with family roots that trace back to the Great Migration, bringing a rich Midwestern Black heritage to Danville. Her household maintains traditions such as weekly
    church attendance, celebrating Juneteenth, and preparing soul‑food meals that connect her to African‑American culinary culture. She participates in local cultural events, including the Danville Black
    History Month celebration and community storytelling sessions, which reinforce values of resilience, mutual support, and respect for elders. These cultural influences shape her cooperative spirit, her
    emphasis on community harmony, and her desire to give back through volunteerism and future caregiving professions.
