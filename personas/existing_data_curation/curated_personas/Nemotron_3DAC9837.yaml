  hobbies: '[''Gardening'', ''Hiking'', ''Book Club'', ''Volunteering (digital literacy)'', ''Bridge (card game)'', ''Watercolor painting'', ''Local history tours'', ''Family gatherings'']'
  career_goals: At 60, Maria aims to transition into a senior leadership role such as Store Manager or Retail Training Consultant, where she can mentor younger associates and shape the customer‑experience
    strategy. She wishes to leverage her STEM background to help small local businesses adopt technology‑enhanced sales practices. After retirement, she envisions part‑time consulting and volunteering to
    teach digital literacy to seniors in her community, maintaining a purposeful connection to the retail world while giving back.
