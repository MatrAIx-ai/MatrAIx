personas:
  professional: Mary Pender is an aspiring Certified Nursing Assistant who blends curiosity about public health with practical hands‑on care, channeling their strong organizational talent into coordinating
    church health‑fair events and using digital literacy to streamline patient documentation while completing an associate degree in health sciences.
  sports: Mary Pender is a casual fitness enthusiast who hikes the Natchez Trace with the local trail club, plays pickup softball in the church’s women’s league each spring, and passionately follows the
    Mississippi State Bulldogs football and the New Orleans Saints NFL team.
  arts: Mary Pender immerses themselves in Southern arts, reading Eudora Welty’s novels, listening to gospel legends like the Blind Boys of Alabama, strumming acoustic guitar to Alison Krauss melodies,
    and photographing delta sunsets with a style reminiscent of William Eggleston.
  travel: Mary Pender prefers road‑trip adventures that blend heritage and nature, planning weekend getaways to historic Natchez and Charleston, savoring culinary tours in New Orleans, and dreaming of a
    future trek through the Great Smoky Mountains once their nursing schedule allows.
  culinary: Mary Pender’s kitchen is a hub of comfort food, where they perfect fried catfish with a crisp cornmeal crust, bake peach cobbler topped with buttery biscuit dough, craft pecan pralines, and
    occasionally over‑season the collard greens in a quest for the perfect flavor.
  core: Mary Pender balances Southern hospitality with meticulous budgeting, quilts evenings to gospel hymns while humming a tune on their acoustic guitar, and can’t resist buying extra frosting for every
    bake‑sale, embodying a practical optimism that turns community service into personal growth.
background:
  cultural: Raised in Cleveland, Mississippi, Mary grew up in a close‑knit white Southern family where church, hospitality, and community traditions shaped daily life. The region's rich musical heritage,
    gospel choirs, and local festivals fostered her appreciation for collective celebration, while the economic realities of the Delta instilled a practical, resilient outlook. She blends respect for these
    Southern customs with a curiosity for new ideas, seeking to honor her roots while carving her own path.
attributes:
  skills: '[''Digital Literacy (Microsoft Office, Email, Social Media)'', ''Customer Service'', ''Event Coordination'', ''Basic Cooking and Baking'', ''Gardening and Plant Care'', ''Personal Budgeting'',
