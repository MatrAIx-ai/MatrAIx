  hobbies: '[''Reading historical fiction'', ''Southern cooking and baking'', ''Quilting'', ''Hiking and nature walks'', ''Church choir singing'', ''Journaling'', ''Landscape photography'', ''Gardening'',
    ''Playing acoustic guitar'']'
  career_goals: Mary aims to complete her remaining college credits to earn an associate degree in health sciences and become a Certified Nursing Assistant, working in a local clinic or assisted‑living
    facility to gain hands‑on experience. She plans to pursue a bachelor's degree in public health later, while also nurturing a long‑term ambition to launch a small home‑based business selling baked goods
    and handcrafted items, leveraging her organizational skills and love for community engagement.
