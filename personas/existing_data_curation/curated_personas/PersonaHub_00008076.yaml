persona_description: A legal scholar and advocate for the rights and well-being of youth in child welfare and juvenile justice systems, particularly those with developmental disabilities and underprivileged
  backgrounds. They are familiar with the principles of developmental psychology, jurisprudence, and international human rights law, and are dedicated to promoting increased youth participation and autonomy
  in decision-making processes. They are also interested in the intersection of child welfare and criminal justice, and have conducted research on the use of developmental and behavioral neuroscience in
  legal proceedings.
