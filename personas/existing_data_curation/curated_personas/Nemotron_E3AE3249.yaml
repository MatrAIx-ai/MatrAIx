  career_goals: Ross aims to earn his GED within the next year and pursue an NCCER certification in construction management. His short‑term goal is to become a certified foreman, leading crews on larger
    commercial projects and gaining recognition for on‑time, under‑budget completions. Long‑term, he aspires to start his own contracting firm focused on sustainable, energy‑efficient construction in the
    Wake County area, leveraging his curiosity about green building materials and his competitive drive to set high performance standards for his future company.
