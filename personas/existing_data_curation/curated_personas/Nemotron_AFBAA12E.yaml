    museums and historical sites'', ''Nature hiking'', ''Yoga and meditation'']'
  career_goals: Ingrid hopes to become the lead facilitator of a weekly intergenerational arts program at the senior center, expanding opportunities for creative expression across age groups. She aims to
    develop a community garden that supplies fresh produce to local food banks and neighbors. She dreams of writing and publishing a memoir that captures her family’s oral histories and the cultural heritage
    of her community. To reach a wider audience, she plans to learn basic web design to showcase her art and stories online. Finally, she aspires to mentor younger women in her neighborhood who face similar
    educational and socioeconomic challenges, guiding them toward confidence and community involvement.
