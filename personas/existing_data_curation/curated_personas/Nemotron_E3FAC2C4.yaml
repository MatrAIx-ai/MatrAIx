  hobbies: '[''Watercolor Painting'', ''Digital Illustration'', ''Gallery and Theater Attendance'', ''Hiking (Riverfront Park, Mt. Spokane)'', ''Live Music Shows'', ''Recreational Tennis'', ''Tabletop Strategy
    Games'', ''Yoga and Meditation'', ''Reading (Psychology, Tech, Social Trends)'', ''Financial Literacy Volunteering'']'
  career_goals: 'Short-term: complete her Associate’s degree in Business Administration, obtain the Certified Credit and Collection Professional (CCCP) certification, and become a senior collections specialist
    with a track record of exceeding quarterly targets. Mid-term: transition into a financial analyst role within a mid-sized firm, leveraging her analytical skills and curiosity about fintech, and possibly
    pursue a bachelor''s degree in Finance. Long-term: aim for a management position such as Collections Manager or Director of Credit Operations, lead a team, implement data‑driven collection strategies,
    and eventually co‑found a startup that develops ethical debt‑management software, integrating her artistic flair into user‑experience design. She also wants to cultivate a balanced work life to mitigate
    stress.'
