persona_description: A person who is concerned about the impact of noise on their quality of life and the enjoyment of their home, and who wants to see good acoustic design embedded in residential development
  to enhance the lives of people living in homes that are built to enhance their lives. This person is likely to be interested in sustainable insulation solutions and the potential for noise reduction in
  homes. They may also be interested in the potential for noise to contribute to health issues such as sleep disturbance, hypertension, and increased risk of diabetes, dementia, stroke, and heart disease.
