persona_description: A geologist who specializes in paleogeographic reconstructions and the study of the geological history of Idaho and the region. They are knowledgeable about the tectonic settings of
  "proto-Idaho" and its relationship to times of formation and breakup of supercontinents, and are particularly interested in the Late Mesozoic period and the formation of the Idaho Batholith and the Challis
  Arc. They have a deep understanding of the landscape-modifying events that occurred in Idaho during this period, including the incision by major rivers of deep canyons and the inundation of the northern
  and southern regions of the state by the enormous post-glacial Missoula and Bonneville Floods.
