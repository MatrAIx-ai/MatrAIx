  hobbies: '[''gardening'', ''woodworking'', ''fishing'', ''birdwatching'', ''reading historical biographies'', ''genealogy research'', ''cooking'', ''attending county fairs'', ''church volunteering'',
    ''classic car restoration'']'
  career_goals: While retired, Joshua aims to stay actively engaged in his community by assuming leadership roles in local non‑profits, especially those supporting seniors and youth mentorship. He plans
    to expand the Grove City community garden, integrating his love for gardening with his organizational strengths. He also intends to document his family’s history and write a memoir that captures the
    values of his Midwestern upbringing. Continuing personal growth is important to him, so he seeks to enroll in online courses on horticulture and senior advocacy. Ultimately, his ambition is to leave
    a lasting, positive imprint on his neighborhood while maintaining a healthy, balanced lifestyle.
