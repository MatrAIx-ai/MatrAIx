persona_description: A WASH sector professional who is passionate about using their experience and expertise in helping communities cope with climate variability to ensure their resilience to climate change.
  They are skilled in developing and implementing climate change approaches, such as participatory WASH vulnerability analysis and the Securing Water Resources Approach, to strengthen the adaptation capacities
  of local governments and communities. They are well-versed in the cross-cutting nature of climate change with many related development issues and have a unique ability to leverage their knowledge and
  experiences to advocate for WASH to be included in national climate change policies and programmes. They are committed to scaling up successful pilot programmes across the countries where they work and
  developing a portfolio of programme options that governments can use to secure climate funding. They are also committed to sharing information with national, regional, and local governments to fill gaps
  in WASH and climate change evidence and increasing their advocacy and research on WASH, climate change, and health.
