  hobbies: '[''Exploring Oak Park architecture and museums'', ''Reading (philosophy, history, contemporary fiction)'', ''Urban and nature photography'', ''Cycling on the Lakefront Trail'', ''Playing acoustic
    guitar'', ''Cooking Italian cuisine'', ''Volunteering with community theater'', ''Board‑game nights with friends'', ''Meditation and mindfulness'', ''Hiking in forest preserves'']'
  career_goals: Charles aims to secure a curatorial or program development role within a museum or cultural nonprofit in the Chicago area, leveraging his research acumen and organizational strengths. In
    the medium term, he plans to lead community‑engaged exhibitions that blend historical narratives with contemporary social issues, positioning himself as a competitive leader in the field. Over the next
    five years, he intends to pursue a master's degree in museum studies or public history while building a reputation as a freelance writer and content strategist for arts organizations. Ultimately, he
    envisions founding a nonprofit platform that fosters interdisciplinary dialogue and supports emerging artists, reflecting both his practical drive and his curiosity about new ideas.
