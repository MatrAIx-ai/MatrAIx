  hobbies: '["Model train building", "Woodworking", "Jogging", "Fishing", "Reading non-fiction (transportation, engineering)", "Crossword and Sudoku puzzle solving", "Chess", "Classic car restoration",
    "Vegetable gardening", "Participating in small-group community safety meetings"]'
  career_goals: Dan’s career ambition is to move into a supervisory position within the school district’s transportation department, such as Fleet Supervisor or Transportation Coordinator, where he can
    apply his methodical mindset to improve safety metrics and streamline route efficiency. He plans to obtain the National School Bus Driver Safety Trainer certification so he can mentor new drivers and
    lead data‑driven safety workshops. In the longer term, Dan envisions transitioning to a consulting role focused on transportation logistics for educational institutions, while securing a stable retirement
    plan that supports his family’s financial security.
