persona_description: A nuclear engineer who specializes in the design and operation of nuclear power plants, particularly those involved in criticality accidents. They are highly skilled in the use of neutron
  detectors and have extensive knowledge of reactor safety and radiation exposure. They have worked on the Tokaimura criticality accident and have experience with the medical aspects of radiation exposure.
  They are likely to be interested in the details of the accident, the technical aspects of reactor design, and the potential health impacts of radiation exposure.
