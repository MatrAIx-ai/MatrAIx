personas:
  professional: Bettyann Womack, a field technician specializing in ATM and office equipment repair, blends hands‑on curiosity with a pragmatic, speed‑focused approach, often juggling disorganized service
    logs but delivering reliable fixes while they eye a senior specialist role and the CompTIA A+ credential.
  sports: Bettyann Womack enjoys solitary prairie hikes and occasional community softball games at the local recreation center, they follow the Oklahoma City Thunder and the Kansas City Chiefs with avid
    enthusiasm, and they belong to a small rural cycling club that rides on weekend mornings, using physical activity as a grounding counterbalance to their anxious mind.
  arts: Bettyann Womack finds creative release in science‑fiction and fantasy novels such as Brandon Sanderson’s Mistborn and Neil Gaiman’s American Gods, immerses themselves in indie video game soundtracks
    by the band Savant, and spends quiet evenings editing photos of prairie sunsets inspired by the works of Ansel Adams, all of which shape their sense of escape and imagination.
  travel: Bettyann Womack prefers low‑key road trips to wide‑open landscapes, often planning solo drives through the Flint Hills and short overnight stays in Santa Fe for its art scene, while they keep
    a bucket‑list that includes the aurora‑filled skies of Iceland and a future cross‑country tour of historic Route 66 towns, balancing adventure with a budget‑conscious mindset.
  culinary: Bettyann Womack favors hearty, protein‑rich meals like chicken fried steak with homemade gravy and sides of sweet potato hash, yet they also experiment with solar‑powered cooking of quinoa‑based
    salads featuring black beans, avocado, and roasted corn, revealing a modest cooking skill set that leans toward practicality and occasional culinary curiosity.
  core: Bettyann Womack is a resilient, tech‑savvy fixer‑upper who channels anxiety‑driven intensity into solitary tinkering, pragmatic problem‑solving, and a quiet determination to carve out financial
    independence, and they continuously push back against doubt with DIY projects.
background:
  cultural: Bettyann grew up in the rural communities of Greer County, Oklahoma, a region characterized by tight‑knit families, church gatherings, and a strong sense of self‑reliance. Her family background
    is white, with generational ties to farming and small‑business work. While she was raised amid traditional Midwestern values—such as modesty, hard work, and community support—she also gravitated toward
    technology through early exposure to home computers and local vocational programs. The small‑town environment fostered her preference for solitude and small‑group interactions, and the limited local
    resources contributed to her self‑directed, DIY learning style. Her recent divorce at 26 has added personal challenges, but it has also reinforced her drive toward financial independence and self‑sufficiency.
attributes:
  skills: '["Mechanical troubleshooting", "Electronic component replacement", "Diagnostic software usage", "Firmware updating", "Preventive maintenance scheduling", "Schematics interpretation", "On‑site
    service coordination", "Basic networking for peripherals", "Improvisational repair techniques", "Customer interaction in small‑group settings"]'
  hobbies: '["DIY electronics projects", "Science‑fiction reading", "Hiking on local trails", "Journaling", "Mindfulness meditation", "Indie video gaming", "Cat companionship", "Landscape photography"]'
  career_goals: Bettyann aims to progress from a field technician to a senior service specialist who can lead complex ATM installations and mentor junior staff. Over the next two years she plans to earn
    the CompTIA A+ certification and an industry‑specific ATM repair credential, viewing these as benchmarks of competence in a competitive field. In the longer term, she hopes to launch a modest mobile
    repair service that serves banks and businesses across western Oklahoma, giving her the flexibility she values while providing reliable, high‑quality service to underserved rural clients. Achieving
    this independence is also a way for her to regain a sense of control over the emotional volatility that her anxiety sometimes triggers.
