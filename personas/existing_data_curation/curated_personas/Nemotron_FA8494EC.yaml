  career_goals: Phil aims to advance from supervising office staff to a senior operations or program‑management role within the next five years. He plans to earn a PMP certification and a Six Sigma Green
    Belt to formalize his process‑improvement expertise, and he is considering an MBA to broaden his strategic business knowledge. His long‑term ambition is to lead a cross‑functional team that integrates
    technology and creative services, possibly overseeing a corporate innovation hub that blends his love of art, new ideas, and data‑driven solutions. In the short term, he seeks to spearhead automation
    projects that reduce manual workload for his department, mentor junior staff, and expand his professional network within Miami’s vibrant startup and arts community.
