personas:
  professional: Aubrey Grant leverages their outgoing nature and knack for community organizing to design inclusive art programs, using Canva graphics and Instagram storytelling while often juggling deadlines
    with a relaxed, flexible approach.
  sports: Aubrey Grant enjoys weekend beach volleyball at Narragansett, practices yoga at a local community studio, roots for the Boston Red Sox, follows the Providence Bruins, and occasionally joins a
    casual running club that meets for early‑morning jogs along the Providence River.
  arts: Aubrey Grant fills their days with sketch‑booking at the RISD Museum, curates Instagram reels featuring local artist Alex G. Stephens, attends intimate shows by indie bands like Mitski and The Strokes,
    and finds inspiration in the bold colors of painter Georgia O'Keeffe.
  travel: Aubrey Grant prefers spontaneous day trips to coastal towns like Newport and Martha’s Vineyard, has a bucket list that includes the historic streets of Dublin and the neon markets of Tokyo, and
    plans most getaways on a shoestring budget, booking hostels and using student discounts whenever possible.
  culinary: Aubrey Grant enjoys cooking a rustic lobster roll with fresh butter and lemon zest, savors a bowl of New England clam chowder with a dash of thyme, and experiments with vegan avocado toast topped
    with radish and chili flakes at local brunch spots.
  core: Aubrey Grant is a social, art‑obsessed 22‑year‑old who thrives on community events, wrestles with chronic anxiety, and balances a carefree, sometimes disorganized lifestyle with a fierce drive to
    make creative spaces inclusive.
background:
  cultural: Aubrey is a white American raised in Providence, Rhode Island, within a middle‑class New England family. Her upbringing reflects the region’s mix of historic colonial heritage and contemporary
    creative energy, heavily influenced by proximity to the Rhode Island School of Design and the city’s vibrant arts community. She grew up participating in community events, neighborhood block parties,
    and school clubs that emphasized collaboration and local culture. While she identifies with mainstream American cultural norms, she also values the eclectic, multicultural vibe of Providence’s neighborhoods,
    which has broadened her appreciation for diverse artistic expressions.
