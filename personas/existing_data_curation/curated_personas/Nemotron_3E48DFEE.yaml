  career_goals: Aubrey aims to pursue a bachelor’s degree in Arts Management or Community Development so she can combine her love for art with her natural talent for people-focused work. In the short term,
    she plans to secure an internship or volunteer position at a local gallery or nonprofit arts organization in Providence, building practical experience in programming and outreach. Her long-term ambition
    is to become a program director for a community arts center, designing inclusive events that bring together diverse audiences while maintaining the flexibility she values. She also hopes to develop
    strategies for managing stress and anxiety, ensuring her career remains sustainable and fulfilling.
