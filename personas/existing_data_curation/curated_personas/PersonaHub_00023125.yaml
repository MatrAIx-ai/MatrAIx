persona_description: A digital native who values self-directed learning and is familiar with the use of technology in education. They are interested in learning and constantly seek out new ways to enhance
  their education. They are tech-savvy and use a variety of online resources to stay updated on the latest trends in education. They are open to the idea of a more self-directed learning environment where
  they can create and maintain networks to educate themselves. They are interested in the idea of a future where traditional education institutions lose their steady supply of willing students and are replaced
  by a more self-directed learning environment where students create and maintain networks in order to educate themselves. They are interested in the idea of a future where the roles of educators and learners
  are fundamentally different and that the technologies we use are increasingly cloud-based and our notions of IT support are decentralized.
