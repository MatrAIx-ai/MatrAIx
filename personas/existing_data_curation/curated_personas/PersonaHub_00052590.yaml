persona_description: A University of Alabama at Birmingham researcher who specializes in the study of health behavior, particularly motivational interviewing and its effectiveness in treating addictive
  behaviors such as smoking. He has conducted a meta-analysis of 31 different studies using motivational interviewing for smoking-cessation and found that the technique has only modest improvement for people
  in treatment for smoking-cessation. He believes that most smokers are not ambivalent about quitting and that they very much want to stop smoking. He is interested in exploring the efficacy of motivational
  interviewing for smoking-cessation and paying particular attention to potential moderating factors.
