personas:
  professional: Sarah Witmer is a budding junior naturalist who steers the school science club’s weekend projects by merging her fierce curiosity about wildlife and space with practical LEGO ecosystem builds,
    yet she often procrastinates on paperwork, overthinks each experiment, and competes to present the most detailed model, embracing a laid‑back, flexible planning style.
  sports: Sarah Witmer is an avid weekend hiker tackling the Wasatch foothills, fiercely competes as a forward on the Ogden Youth Soccer Club’s under‑10 team during fall, swims laps at the community pool
    in winter to improve her speed, and loyally cheers for Real Salt Lake, balancing her love for solo adventure with a competitive team spirit.
  arts: Sarah Witmer channels her competitive streak into art by striving to outdraw peers in the school sketch club, drawing animals with a style inspired by John James Audubon’s detailed illustrations
    and National Geographic Kids, while humming the catchy melodies of Disney’s Frozen soundtrack and the rap verses of Lin‑Manuel Miranda’s Hamilton to fuel her creativity.
  travel: Sarah Witmer dreams of swapping her regular foothill hikes for a family road‑trip to Yellowstone’s geysers and a future adventure at the Kennedy Space Center, mapping each stop on hand‑drawn postcards,
    yet she often packs spontaneously, leaving room for unexpected wildlife sightings and impromptu detours.
  culinary: Sarah Witmer loves the crunchy combo of pretzel sticks and cheddar cheese cubes, blends fruit smoothies with banana, strawberry, and almond milk for a quick snack, proudly assembles her own
    peanut butter‑banana sandwiches, but she often forgets to brush her teeth after indulging in sugary treats and occasionally leaves her LEGO pieces scattered on the kitchen table instead of cleaning
    up.
  core: Sarah Witmer is a curious nine‑year‑old explorer whose love for wildlife, LEGO, and sketching fuels a competitive edge, yet she worries about chores, misplaces pencils, and hides glitter‑filled
    sketch journals under her bed.
background:
  cultural: Sarah was raised in a middle‑class white family in Ogden, Utah, where community and outdoor recreation are central. Her family often participates in local events such as the Ogden Music Festival
    and mountain biking outings, and they value volunteer service at the regional library and community center. The region's emphasis on a close‑knit community, outdoor activities, and an appreciation for
    the natural landscape has shaped her interest in wildlife and conservation. While her daily life includes typical American school experiences, exposure to Utah's unique blend of suburban life and easy
    access to mountains and rivers influences her hobbies and her practical, hands‑on approach to learning.
attributes:
  skills: '[''Basic arithmetic'', ''Reading comprehension'', ''LEGO construction and design'', ''Basic computer and tablet navigation'', ''Drawing cartoons'', ''Creative short‑story writing'']'
  hobbies: '["Hiking and nature walks in the Wasatch foothills", "Collecting rocks and bird watching", "Building LEGO sets and designing original structures", "Playing puzzle video games", "Reading science
    books for kids", "Drawing animal sketches and keeping a sketch journal", "Writing short adventure stories", "Participating in school science club"]'
  career_goals: Sarah often imagines a future where she can help animals and the environment, so she aspires to become a wildlife biologist or veterinarian. She is also drawn to the idea of a scientist
    who solves real‑world problems, reflecting her blend of curiosity and practicality. Her competitive streak pushes her to aim for recognition in school science fairs and robotics contests. While she
    sometimes worries about choosing the "right" path, she envisions attending a summer science camp and, later, a university program that balances field research with hands‑on experimentation.
