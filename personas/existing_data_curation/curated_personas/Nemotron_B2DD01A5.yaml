  career_goals: Although retired, Joseph aims to share his business knowledge by mentoring aspiring entrepreneurs in his community, author a memoir reflecting on the evolution of American business over
    the past seven decades, and contribute to the local historical society. He also aspires to maintain his health, stay intellectually active through lifelong learning, and ensure his family legacy through
    genealogy research.
