  hobbies: '[''Fly fishing'', ''Deer hunting'', ''Woodworking'', ''Reading (Virginia history, technology non-fiction)'', ''DIY computer building'', ''Genealogy research'', ''Gardening (heirloom tomatoes)'',
    ''Listening to classic rock and country music'', ''Small-group board game nights'']'
  career_goals: Justin aims to leverage his practical curiosity to lead a regional compliance program that integrates advanced analytics, positioning himself as a thought‑leader in risk‑based compliance.
    He seeks a senior manager or director role where he can shape policy, mentor junior staff, and champion automated solutions that free up time for strategic thinking. He plans to earn a professional
    certification such as CIPP/CRISC to solidify his expertise. Ultimately, he hopes to transition to part‑time consultancy work that offers greater schedule flexibility, reduces day‑to‑day pressure, and
    provides a stable income stream as he approaches retirement.
