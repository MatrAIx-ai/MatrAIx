personas:
  professional: Mary Miles, an aspiring multimedia artist and junior coder, channels her boundless imagination into daily sketchbook doodles, mixed‑media collages, and Scratch animations, while her relaxed,
    disorganized style means she often works in spontaneous bursts that feel more like play than a structured schedule.
  sports: Mary Miles, a member of the school swimming team and the chess club, follows the New York Knicks and the New York Islanders closely, prefers solitary exercise like lap swimming and strategic games
    over team sports, yet competes fiercely online against friends in timed chess matches.
  arts: Mary Miles, who lives for surreal poetry and visual storytelling, frequently cites the influences of Salvador Dalí, Studio Ghibli’s Hayao Miyazaki, and the graphic novel series 'Saga,' while sketching
    in the margins of notebooks to the lo‑fi beats of Billie Eilish.
  travel: Mary Miles, who favors low‑key weekend escapades, often explores the Staten Island Botanical Garden and the New York Public Library’s special exhibitions, while dreaming of a school‑organized
    trip to the Musée d’Orsay in Paris and a backpacking adventure through the Scottish Highlands.
  culinary: Mary Miles, who enjoys quick creative snacks, often makes avocado toast topped with smoked salmon, chili flakes, and poached egg, loves crafting homemade ramen bowls with miso broth and soft‑boiled
    eggs, and indulges in pepperoni pizza on Friday nights, though they sometimes skip breakfast altogether.
  core: Mary Miles blends relentless imagination with a scatter‑shot work ethic, turning doodles into digital art, splurging on supplies while hoarding a secret savings stash, and navigating teenage health
    and social life with a skeptical, competitive edge.
background:
  cultural: Mary grew up in a middle‑class white family in Staten Island, New York, a borough that blends suburban neighborhoods with the cultural diversity of the greater NYC area. Her upbringing reflects
    typical Northeastern American customs—celebrating holidays like Thanksgiving and Christmas, weekend trips to nearby parks and beaches, and regular visits to the public library. Although her household
    maintains a largely Anglo‑Saxon heritage emphasizing individuality and self‑reliance, the surrounding multicultural environment exposes her to a variety of cuisines, art forms, and community events.
    This mix of suburban stability and the city’s eclectic influences fuels her curiosity and openness to new ideas while grounding her in a familiar American cultural framework.
attributes:
  skills: '[''Sketching and drawing'', ''Basic digital graphic design (Canva, Introductory Photoshop)'', ''Creative writing (short stories, poetry)'', ''Beginner coding with Scratch'', ''Strategic game
    play (chess, puzzle games)'', ''Conceptual brainstorming'', ''Critical media analysis'', ''Self‑directed learning'']'
  hobbies: '[''Sketching and doodling'', ''Mixed‑media collage creation'', ''Creative writing (poetry, short stories)'', ''Reading speculative fiction and graphic novels'', ''Playing chess and puzzle games'',
    ''Exploring digital animation with Scratch'', ''Experimenting with AI‑generated art tools'', ''Visiting local parks and libraries for inspiration'']'
  career_goals: Mary aspires to pursue a career that blends her love for art, storytelling, and technology. She hopes to attend a specialized high school for visual arts and eventually study concept art
    or illustration at a college, aiming to work as a concept artist for video games, animation, or indie film studios. She also envisions creating her own graphic novel series and possibly launching a
    YouTube channel showcasing her digital art tutorials and speculative fiction narratives. Her long‑term ambition is to have a flexible creative career that lets her explore novel ideas and push artistic
    boundaries.
