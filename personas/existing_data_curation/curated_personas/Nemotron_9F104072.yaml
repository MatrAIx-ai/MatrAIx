personas:
  professional: Miguel Villeda, a 5‑year‑old aspiring junior artist, transforms their curious mind and love for unconventional ideas into vivid crayon drawings and backyard experiments, thriving in spontaneous
    play while gently resisting rigid routines and often seeking reassurance from their small circle of trusted adults.
  sports: Miguel Villeda, a 5‑year‑old, plays weekly soccer with the Little Lions Club, splashes in swim lessons at the community pool, idolizes the Los Angeles Dodgers, and prefers free‑form backyard games
    over strict practice schedules, reflecting their spontaneous spirit and aversion to rigid structure.
  arts: Miguel Villeda, age 5, delights in drawing whimsical creatures inspired by Dr. Seuss, singing along to the Sesame Street soundtrack, and eagerly attending the Tiny Storytellers children’s theatre’s
    weekly drama workshops, letting their imagination and appreciation for art guide their playtime.
  travel: Miguel Villeda, age 5, enjoys family trips to the nearby beach, treasured a weekend visit to Disneyland, and dreams of meeting giant pandas at the San Diego Zoo, favoring short, well‑planned outings
    that balance excitement with familiar routines.
  culinary: Miguel Villeda, a 5‑year‑old, loves cheesy pizza, chicken nuggets, and apple slices, enjoys stirring spaghetti sauce with their mom’s wooden spoon, yet gets picky about broccoli, often bargaining
    for extra dessert in exchange for a bite of the green vegetable.
  core: Miguel Villeda, a curious yet worry‑prone 5‑year‑old, can lose hours immersed in imaginative sketches while secretly fearing the dark, and their habit of stashing toys under the couch reveals a
    charming mix of spontaneity and a need for hidden order.
background:
  cultural: Miguel is raised in a Mexican‑American household in Rancho Cucamonga, where Spanish is spoken alongside English. His family celebrates traditional holidays such as Día de los Muertos with homemade
    sugar‑skull crafts and offers tamales during festive gatherings. He attends a bilingual preschool that incorporates Mexican folklore and songs into the curriculum. The neighborhood’s vibrant Latino
    community, local Mexican restaurants, and cultural festivals influence his food preferences, language, and values of family cohesion and respect for elders. These experiences shape his appreciation
    for art, music, and storytelling rooted in Mexican heritage.
