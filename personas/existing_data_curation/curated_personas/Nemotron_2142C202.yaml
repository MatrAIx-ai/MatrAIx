  hobbies: '[''Football'', ''Baseball'', ''4‑H club activities'', ''Lego building'', ''Reading adventure and science books'', ''Hiking and camping'', ''Playing Minecraft and Roblox'', ''Ranch chores'',
    ''Church youth group'']'
  career_goals: David aims to graduate high school with honors, earn a scholarship, and attend college to become a veterinarian so he can work with farm animals. He also dreams of joining the local fire
    department after graduating, combining his desire to help the community with his practical skills. In the short term, he wants to make the varsity football team, improve his grades in science and math,
    and take leadership roles in school clubs such as 4‑H.
