personas:
  professional: David Hagans is a junior ranch assistant who already handles feeding schedules, fence repairs, and 4‑H project logistics, demonstrating methodical planning, reliability, and a knack for
    coordinating team tasks on the family property.
  sports: David Hagans is an avid participant in youth football with the Ackerly Middle School Wildcats and plays baseball for the local Little League Longhorns, while passionately rooting for the Dallas
    Cowboys and Texas Rangers, combining disciplined training with community camaraderie.
  arts: David Hagans channels his creative side through building intricate Lego cityscapes, listening to country artist Luke Bryan and classic rock band The Beatles, and reading adventure series like “Percy
    Jackson,” which together shape his imaginative leisure time.
  travel: David Hagans prefers short road trips to nearby state parks such as Palo Duro Canyon and family visits to the Texas State Fair, while dreaming of a future road adventure across Route 66 to reach
    the Grand Canyon, balancing parental budgeting with a thirst for exploration.
  culinary: David Hagans is a budding home‑chef who loves grilling barbecue ribs with a homemade dry rub, enjoys hearty chili made with beans and ground beef, and often helps his family prepare Mexican‑inspired
    tacos, reflecting a straightforward palate and growing confidence in the kitchen.
  core: David Hagans blends ranch‑rooted reliability with a big‑hearted love for team sports, Lego building, and community gatherings, all while juggling a pocket‑money ledger, occasional allergy flare‑ups,
    and a penchant for sneaking extra dessert after dinner.
background:
  cultural: David was raised in the small, close‑knit community of Ackerly, Texas, where rural West Texas values shape daily life. His family emphasizes hard work, family loyalty, and active participation
    in the local Protestant church and its youth programs. Community events such as Friday night high school football games, Fourth of July parades, and county fairs are central to his social calendar.
    Growing up on a ranch, he has been immersed in cowboy and agricultural traditions, learning to respect the land and livestock. While the town is predominantly white, he interacts with neighboring Hispanic
    families through school and community activities, gaining a modest awareness of Spanish language and culture. These experiences combine to give him a grounded, community‑oriented cultural identity.
