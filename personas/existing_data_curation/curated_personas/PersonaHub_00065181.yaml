persona_description: A person interested in understanding the historical context and causes of external debt accumulation in Malawi, with a focus on the role of oil price shocks, macroeconomic policies,
  and domestic economic policies. This person is likely to have an academic background in economics or finance, with a specialization in international finance and debt analysis. They would be interested
  in studying the policies and practices of industrial countries, as well as the impact of international prices of oil and macroeconomic policies on the debt situation in Malawi. This person would also
  be interested in analyzing the factors that contributed to the widening gaps in external liquidity and increasing demand for foreign borrowing, and the role of domestic economic policies in exacerbating
  the debt problem.
