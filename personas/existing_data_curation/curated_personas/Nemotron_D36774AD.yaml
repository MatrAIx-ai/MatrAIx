personas:
  professional: Janet Howe, a seasoned operations manager turned nonprofit strategist, leverages her business degree and decades of budget oversight to run volunteer programs with meticulous planning, using
    their methodical approach and sociable energy to mentor board members and orchestrate community events.
  sports: Janet Howe enjoys low‑key athletics, joining a local adult softball league at the St. Paul Recreation Center, walking the trails of Minnehaha and Theodore Wirth Parks year‑round, cheering for
    the Minnesota Vikings and Twins, and taking up cross‑country skiing each winter after the ice‑fishing season.
  arts: Janet Howe nurtures a love for the performing arts by acting in community theater productions like "Our Town," admiring the music of Prince and Bob Dylan, attending the Guthrie Theater’s shows,
    and showcasing photography from their classes in local coffee‑shop exhibitions, while also knitting scarves at the senior arts guild.
  travel: Janet Howe prefers thoughtfully planned weekend getaways, favoring nearby national treasures such as Voyageurs National Park for canoe trips, Mackinac Island’s historic carriage rides, and the
    Badlands for scenic drives, balancing adventure with a modest budget and a desire to involve their book club friends in cultural tours.
  culinary: Janet Howe delights in cooking seasonal Midwestern dishes, expertly preparing a wild‑rice and mushroom casserole, pan‑fried walleye with lemon butter, and summer corn chowder with fresh basil,
    while their intermediate knitting hobby provides time to perfect homemade blueberry preserves for family gatherings.
  core: Janet Howe blends meticulous organization, community‑driven compassion, and a curiosity for new tools into a life of purposeful volunteering, prudent investing, and seasonal Midwestern living.
background:
  cultural: Janet was raised in a middle‑class white family in Minneapolis with German‑Scandinavian ancestry, reflecting the region’s cultural heritage. Her upbringing emphasized Midwestern values such
    as community involvement, modesty, and self‑reliance. She celebrates traditional holidays like Thanksgiving and enjoys local customs including summer festivals and winter ice‑fishing outings. This background
    has fostered a strong sense of civic duty and a deep appreciation for Minnesota’s natural landscape.
