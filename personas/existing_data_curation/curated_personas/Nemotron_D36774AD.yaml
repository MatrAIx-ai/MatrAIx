  hobbies: '[''Gardening'', ''Park walking'', ''Book club'', ''Food bank volunteering'', ''Knitting'', ''Cooking seasonal recipes'', ''Photography'', ''Genealogy research'', ''Traveling to national parks'',
    ''Community theater attendance'']'
  career_goals: Janet aims to apply her business expertise to strengthen local non‑profits and small businesses as a volunteer board member and mentor. She plans to deepen her digital literacy so she can
    lead workshops on budgeting and technology use for community groups. Additionally, she hopes to launch a neighborhood garden that brings together residents of all ages and to write a practical guide
    on financial habits for seniors.
