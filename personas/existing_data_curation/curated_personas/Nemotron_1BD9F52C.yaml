personas:
  professional: Gladis Little, an aspiring junior scientist and kid coder, channels their curious yet practical mind into weekly science experiment projects and coding puzzles, showing organized planning
    while staying flexible enough to improvise when experiments go awry.
  sports: Gladis Little dashes across the field for the Little Kickers Soccer Club, joins after‑school hip‑hop dance crews, and passionately roots for the New York Knicks and the US Women’s National Soccer
    Team, using their energetic, team‑oriented spirit to stay fit.
  arts: Gladis Little brightens the church choir with gospel anthems by Kirk Franklin and contemporary R&B hits from Beyoncé, while sketching fantasy scenes inspired by adventure books like 'Percy Jackson,'
    reflecting an artistic soul that balances group harmony with personal expression.
  travel: Gladis Little’s travel style blends family‑oriented road trips to the Grand Canyon with occasional excitement‑filled excursions to Disney World, and they dream of exploring the magical streets
    of Paris on a school field‑trip, preferring structured itineraries that leave room for spontaneous playground discoveries.
  culinary: Gladis Little delights in topping homemade pizza with mozzarella, pepperoni, and a dash of basil, whipping up strawberry‑banana smoothies with fresh fruit, and proudly mastering the art of buttering
    toast without spilling the jam, showcasing a lively appetite and a budding kitchen confidence.
  core: Gladis Little is an exuberant, organized eight‑year‑old who balances curiosity with practicality, leading choir songs, soccer scrimmages, and coding games while occasionally misplacing their soccer
    cleats in a creative‑induced mess.
background:
  cultural: Gladis is part of an African‑American family in Amarillo, Texas, where cultural traditions blend Southern Texas life with rich Black heritage. Her household celebrates Juneteenth, soul‑food
    cooking, and church gatherings that emphasize community and music. She participates in school cultural programs that highlight African‑American history and enjoys the warmth of neighborhood events that
    mix local Texan customs with celebrated Black traditions.
