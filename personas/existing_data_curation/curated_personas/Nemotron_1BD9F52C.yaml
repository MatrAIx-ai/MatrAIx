  career_goals: Inspired by her love of space and science, Gladis dreams of becoming an astronaut and exploring the stars. She also envisions a future as a teacher, sharing knowledge with other children,
    and is excited about the idea of being a veterinarian to help animals. Above all, she hopes to lead community projects that combine her curiosity, practicality, and the desire to make a positive impact.
