  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Yoga and meditation'', ''Gardening'', ''Hiking in local parks'', ''Cooking and trying new recipes'', ''Volunteer tutoring'', ''Attending
    local music events'', ''Photography'', ''Board games with friends'']'
  career_goals: Danielle aims to complete her bachelor's degree in Education within the next two years and pursue a master's in Teaching and Learning to qualify for a tenure‑track position at a community
    college. She aspires to specialize in inclusive pedagogy, develop mentorship programs for at‑risk students, and eventually take on a leadership role such as department chair or curriculum coordinator.
    Balancing her professional growth with personal well‑being, she also seeks to build effective stress‑management strategies to sustain her long‑term career in higher education.
