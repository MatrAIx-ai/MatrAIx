persona_description: A historian specializing in the study of social and cultural changes in Argentina during the 1960s, particularly in the context of gender and sexuality. Her research interests include
  the effects of social and cultural changes on personal experience, the social nature of historical phenomena, and the intersection of gender, sexuality, and politics in Argentina during this time period.
  She has a unique understanding of how gender and sexuality were reconstituted in different historical contexts and how they were experienced by women and men in different social classes, generations,
  and genders. She has a deep knowledge of empirical studies in the field of social history and has contributed to the growing subfield of sexual minorities in Brazil. Her work is informed by her interdisciplinary
  background in history, sociology, and anthropology, and she has a passion for shedding light on the social and cultural aspects of historical phenomena.
