  career_goals: Francisco is focused on advancing from a production worker to a supervisory role within the next two years. He plans to earn a Six Sigma Green Belt and continue his education in industrial
    engineering to deepen his expertise in continuous improvement. His long‑term ambition is to become a plant manager or an operations consultant, leading large‑scale efficiency projects that blend innovative
    technologies with proven practices. He also wants to design a mentorship program that supports younger employees and to champion workplace initiatives that address stress and well‑being, ensuring a
    stable and harmonious environment for his family and colleagues.
