personas:
  professional: Francisco Negron is a veteran production specialist who leverages over two decades of hands-on shop floor experience, lean manufacturing expertise, and a disciplined, organized mindset to
    streamline processes, train teams, and troubleshoot equipment while channeling his curiosity into practical IoT sensor implementations.
  sports: Francisco Negron competes in a local amateur soccer league on weekends, cheering for the Los Angeles Galaxy while also supporting his community’s youth soccer club, and balances his energetic
    play with regular gardening that doubles as low-impact fitness.
  arts: Francisco Negron fuels his creative side by building scale model cars, tinkering with hobby robotics, joining family karaoke nights, and curating classic rock playlists featuring Led Zeppelin, The
    Rolling Stones, and Fleetwood Mac, which together satisfy his sociable and expressive nature.
  travel: Francisco Negron prefers well-planned family road trips that blend adventure and relaxation, having explored Carlsbad Caverns, Yosemite National Park, and San Diego’s cultural districts, while
    dreaming of a future visit to the historic streets of Seville, all while balancing budget constraints and school schedules.
  culinary: Francisco Negron is an advanced home chef who regularly prepares mole with ancho chiles, masa-based tamales, and pozole brimming with hominy and pork shoulder, delighting his teenage children
    with hands-on kitchen sessions and experimenting with fresh cilantro, lime, and corn tortillas.
  core: Francisco Negron blends disciplined engineering rigor with a lively family-centered life, juggling a drive for continuous improvement at work, a love for hands-on hobbies, and a constant battle
    against stress-induced worry.
background:
  cultural: Francisco grew up in a bilingual Mexican‑American household in Southern California. His parents immigrated from Jalisco, and Spanish was spoken at home alongside English. This dual‑language
    environment gave him a deep appreciation for both Mexican traditions and American practices. He celebrates Día de los Muertos, Las Posadas, and Mexican Independence Day with his extended family, often
    preparing traditional foods and sharing stories of his ancestors. Community ties remain strong; he frequently helps organize neighborhood events and maintains close contact with relatives in Mexico
    through video calls. The values of family loyalty, respect, and cooperation that he learned from his cultural background shape his interpersonal style at work and in his social life.
