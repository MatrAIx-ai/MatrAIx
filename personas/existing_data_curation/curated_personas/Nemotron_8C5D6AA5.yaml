  hobbies: '[''Drawing and sketching'', ''Watercolor painting'', ''Reading science-fiction and graphic novels'', ''Creative writing (stories and poetry)'', ''Coding with Scratch'', ''Building LEGO models'',
    ''Exploring local parks'', ''Listening to jazz, hip-hop, and classical music'', ''Participating in school art club'', ''Attending Black cultural events'']'
  career_goals: She dreams of turning her love for art and design into a future career, hoping to become an illustrator or graphic designer who creates stories that reflect diverse experiences. Onondieu
    also imagines studying architecture or museum studies to blend her appreciation for visual spaces with her methodical planning skills. She plans to attend a specialized art summer program and eventually
    enroll in a high-school program that emphasizes both art and technology. In the long term, she hopes to use her creative talents to inspire her community and represent Black voices in visual media.
