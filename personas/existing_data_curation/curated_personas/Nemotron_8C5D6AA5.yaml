personas:
  professional: Onondieu Gray is an aspiring junior illustrator who blends watercolor techniques with digital art tools to create vibrant characters and landscapes, channeling a curious, methodical mindset
    into school art club projects and personal storytelling.
  sports: Onondieu Gray plays on the town's youth soccer team during the fall, cheers for the local New York Yankees in winter, and follows the New York Knicks, balancing organized practice schedules with
    a reserved preference for small‑group drills over large crowds.
  arts: Onondieu Gray immerses in the world of graphic novels like "Ms. Marvel" and "Amulet", draws inspiration from jazz legends and modern hip‑hop beats, and regularly attends community storytelling evenings
    that honor ancestors, shaping their artistic voice with a mix of soulful rhythms and vibrant visual narratives.
  travel: Onondieu Gray loves weekend excursions to nearby Jones Beach for sketching sandscapes, has visited Washington, D.C. on a school field trip to see historical museums, and dreams of a summer trip
    to New Orleans to hear live jazz in the French Quarter, planning each journey with a simple checklist of sketchbooks and snacks.
  culinary: Onondieu Gray enjoys experimenting with beginner‑level cooking, frequently making peanut butter‑banana smoothies, mac ’n’ cheese with a dash of hot sauce, and helping their family prepare collard
    greens on Sundays, while showing a particular fondness for sweet potato pie and occasionally over‑indulging in sugary cereal.
  core: Onondieu Gray is an 11‑year‑old who channels curiosity and organization into disciplined sketching sessions, diligent allowance budgeting, and a quiet yet resilient outlook on life, all while occasionally
    leaving a rainbow of watercolor stains on the kitchen floor.
background:
  cultural: Onondieu is a Black American growing up in Huntington, New York, within a close-knit family that honors African-American heritage and celebrates traditions such as Juneteenth, Black History
    Month, and community storytelling. Her household blends contemporary urban culture with roots that trace back to the Southern United States and the broader African diaspora, influencing her exposure
    to soul, jazz, and hip-hop music, as well as literature by Black authors. She attends a local school with a diverse student body, which provides opportunities to share her cultural perspective while
    learning from others. This background nurtures her pride, resilience, and desire to represent her community through art.
attributes:
  skills: '[''Drawing and sketching'', ''Watercolor painting'', ''Digital illustration'', ''Creative writing'', ''Organizational and time-management skills'', ''Scratch programming'', ''Basic LEGO robotics'',
