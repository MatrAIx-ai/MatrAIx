  hobbies: '[''Recreational soccer league'', ''Coaching youth sports'', ''Cycling and hiking along the coastline'', ''Fishing and kayaking'', ''Automotive tinkering and tech research'', ''Attending live
    music concerts and community festivals'', ''Cooking seafood dishes'', ''Hosting barbecues and social gatherings'']'
  career_goals: Wesley aims to advance from his driver‑sales hybrid role into broader logistics and management positions. In the short term, he plans to earn a professional logistics certification such
    as the Certified Logistics Associate and enroll in an associate’s degree program in supply chain management. He hopes to transition into a logistics coordinator role where he can oversee route scheduling,
    fleet allocation, and client account management. Over the longer term, Wesley envisions becoming a fleet manager or launching his own small delivery business that leverages technology to improve efficiency
    and customer experience. He also seeks to deepen his sales expertise to handle larger commercial contracts and expand his professional network within the New England transportation sector.
