  hobbies: '[''Book club'', ''Gardening'', ''Watercolor painting'', ''Ballroom dancing'', ''Historic site tours'', ''Volunteering at senior center'', ''Teaching tablet skills'', ''Cooking Tex‑Mex dishes'',
    ''Listening to jazz'', ''Knitting'']'
  career_goals: Even at 85, Carolyn remains energized about contributing to her field. Her primary goal is to mentor the next generation of rehabilitation counselors through formal workshops and informal
    coaching. She aims to spearhead a community outreach initiative that provides free ergonomic and mobility assessments for older adults in Dallas. Carolyn also hopes to co‑author a guidebook that blends
    traditional counseling techniques with emerging digital tools for remote rehabilitation. Lastly, she aspires to serve on the board of the Texas Rehabilitation Association to influence policy that improves
    services for seniors and underserved populations.
