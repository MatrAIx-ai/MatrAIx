  hobbies: '[''Visiting art galleries and museums'', ''Digital photography and photo editing'', ''Hiking and nature walks'', ''Wine tasting at local vineyards'', ''Playing piano and occasional jazz improvisation'',
    ''Mentoring youth in coding and robotics'', ''Experimenting with digital painting and generative art'', ''Attending tech meetups on AI and VR'', ''Reading books on technology and art history'', ''Gardening
    (organic vegetables and herbs)'']'
  career_goals: In the next few years, Darryl aims to shift from full‑time corporate responsibilities to a part‑time consulting role that allows him to apply his technical expertise to community‑driven
    art‑technology projects. He hopes to mentor the next generation of engineers through workshops at local schools and non‑profits, contribute to open‑source platforms that empower artists to create with
    code, and help a small startup develop immersive VR experiences that blend storytelling with interactive design. Additionally, he aspires to author a book on the intersection of software engineering
    and visual art, and to serve on advisory boards that shape inclusive tech education policies in Santa Clara County.
