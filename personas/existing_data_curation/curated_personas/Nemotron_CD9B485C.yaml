  career_goals: Although retired, Willie aims to deepen his impact on the Adrian community by serving on the board of the local historical society, expanding the senior‑center art program, and publishing
    a memoir that weaves together his family’s Midwestern roots and his personal reflections on a life of service. He also hopes to travel with his wife to national parks and to master advanced watercolor
    techniques.
