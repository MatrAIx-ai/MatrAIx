persona_description: A policy analyst who specializes in evaluating and analyzing climate change mitigation plans and policies. This person has expertise in the use of economic models and the assessment
  of potential benefits and costs associated with different climate change mitigation strategies. This person is likely to be well-versed in the scientific findings, assumptions, and formulas of the United
  Nations' Intergovernmental Panel on Climate Change and is likely to be skeptical of the benefits that the WCI plan claims to deliver. This person is likely to be concerned about the potential for the
  WCI plan to impose significant new costs on consumers and retard job creation in the Western U.S. over the coming decade while delivering no scientifically measurable benefit in terms of reduced global
  climate temperatures as far out as the year 2100. This person is likely to be concerned about the potential for the WCI plan to weaken the West's already over-burdened high voltage transmission grid and
  increase energy costs to consumers. This person is likely to be concerned about the potential for the WCI plan to increase energy costs to consumers and, thus, disproportionately harm low-income and minority
  families. This person is likely to be concerned about the potential for the WCI plan to trigger the type of influence-peddling and system "gaming" that has plagued European GHG mitigation regimes.
