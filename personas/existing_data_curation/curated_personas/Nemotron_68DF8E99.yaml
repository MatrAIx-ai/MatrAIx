personas:
  professional: Rocky Todaro, a 21‑year‑old apprenticeship‑bound plumber‑pipefitter, blends solid hands‑on expertise in pipefitting, blueprint interpretation, ASME‑standard pressure calculations, and basic
    CAD drafting with a curious yet practical mindset that makes them a reliable troubleshoot‑er on site, an assertive communicator who translates technical jargon for crew members, and an organized yet
    flexible planner who balances meticulous safety protocols with on‑the‑fly problem solving.
  sports: Rocky Todaro, a dedicated intramural soccer and basketball player in fall and spring, also rallies behind the Seattle Seahawks and Washington State Cougars, maintains cardio by hiking the Palouse
    hills and occasional rock‑climbing at a local gym, and keeps fit through a mix of team sports, outdoor adventures, and weekly pick‑up games with friends.
  arts: Rocky Todaro, when off the job, relaxes by strumming electric guitar riffs inspired by Foo Fighters and Queens of the Stone Age, streams multiplayer sessions of Valorant and Apex Legends to stay
    socially connected, and watches engineering documentaries and concert films featuring Imagine Dragons, weaving music, gaming, and visual media into a vibrant outlet for their outgoing personality.
  travel: Rocky Todaro, an avid weekend explorer, frequently camps along the Snake River and hikes the Palouse hills, has taken road trips to Seattle, Portland, and Vancouver, and dreams of tackling Patagonia’s
    Torres del Paine and soaking in an onsen in Japan, preferring spontaneous, budget‑conscious planning that satisfies their curiosity while leaving room for future business travel.
  culinary: Rocky Todaro, a capable home‑cook who enjoys grilling salmon with lemon‑dill sauce, preparing foil‑wrapped trout seasoned with rosemary while camping, and indulging in pepperoni pizza nights
    with friends, mixes a practical DIY flair with a love for craft beer, but sometimes burns a dish when distracted by a streaming video game.
  core: Rocky Todaro is a sociable, hands‑on 21‑year‑old plumbing apprentice whose curiosity fuels sustainable‑tech ambitions, yet frequent worry and occasional over‑exertion create a tension between disciplined
    progress and restless energy.
background:
  cultural: Rocky’s family traces its roots to Italian immigrants who settled in the Pacific Northwest in the early 20th century. Growing up in Pullman, he absorbed the region’s love for outdoor recreation
    while maintaining Italian traditions such as Sunday pasta meals, homemade bread, and a strong emphasis on work ethic and family loyalty. His parents, both second‑generation Americans, encouraged a blend
    of cultural pride and community involvement, leading Rocky to volunteer locally and respect diverse perspectives encountered at Washington State University. This hybrid background shapes his practical
    outlook, his appreciation for craftsmanship, and his willingness to integrate new ideas with time‑tested methods.
attributes:
