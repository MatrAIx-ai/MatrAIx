  hobbies: '[''Intramural soccer'', ''Intramural basketball'', ''Hiking'', ''Fishing'', ''Camping'', ''Habitat for Humanity volunteering'', ''Playing guitar'', ''Video gaming'', ''DIY home projects'', ''Engineering
    documentary watching'', ''Mindfulness meditation'']'
  career_goals: In the next year Rocky plans to earn his Journeyman plumber‑pipefitter certification and complete advanced coursework in sustainable building systems. He aims to become a licensed Master
    Plumber within three years, specializing in green‑technology retrofits such as water‑recycling and low‑temperature steam heating for commercial campuses. Mid‑term, he hopes to lead multi‑disciplinary
    project teams on large‑scale infrastructure upgrades at Washington State University and nearby municipal facilities. Long‑term, Rocky dreams of founding his own plumbing‑steamfitting firm that emphasizes
    energy‑efficient solutions, apprenticeships, and community service, while continuing to stay at the forefront of emerging plumbing technologies.
