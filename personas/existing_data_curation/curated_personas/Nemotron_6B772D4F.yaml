personas:
  professional: Cory Phares, an ambitious high‑school senior with a knack for hands‑on problem solving, blends a budding expertise in automotive repair with a passion for custom PC building, and their spontaneous,
    curiosity‑driven mindset pushes them to dive into projects before fully planning, often leading to inventive solutions but occasional missed deadlines.
  sports: Cory Phares, a weekend mountain‑bike enthusiast who tracks trail stats on Strava and shoots hoops at the local community center, roots for the Carolina Panthers and Charlotte Hornets, and occasionally
    joins pickup games, preferring high‑intensity intervals over structured gym routines.
  arts: Cory Phares, an avid fan of classic rock who spends evenings on a modest home‑theatre watching Led Zeppelin’s 1975 performance and practicing guitar covers of Pink Floyd, while also streaming indie
    game soundtracks from composers like Jeremy Soule, and they collect vintage band posters as wall art.
  travel: Cory Phares, an adventure‑seeking teen who plans spontaneous road trips to the Blue Ridge Parkway and weekend camps in the Great Smoky Mountains, dreams of attending the Tokyo Game Show for the
    ultimate gaming immersion, yet must balance travel with a modest allowance and school commitments, often opting for budget‑friendly hostels or couch‑surfing with friends.
  culinary: Cory Phares, a casual cook who masters grilled catfish tacos seasoned with smoked paprika and lime, perfects weekend BBQ ribs using hickory wood chips, and whips up quick pasta carbonara after
    late gaming sessions, while favoring snack staples like spicy nachos and energy drinks during marathon streams.
  core: Cory Phares thrives on hands‑on tinkering and spontaneous projects, juggling a love for cars, gaming, and music, yet often forgets deadlines and neglects routine chores, making them a creative but
    occasionally disorganized teen.
background:
  cultural: Cory grew up in Fort Mill, South Carolina, a suburban town known for its blend of traditional Southern values and proximity to the urban influence of nearby Charlotte, NC. As a white American
    from this region, his cultural upbringing includes strong family ties, regular community gatherings, and an appreciation for self‑reliance that is common in Southern small‑town life. He was raised with
    exposure to church events, high‑school sports culture, and the outdoor lifestyle of the Carolinas—fishing, hunting, and enjoying the area's natural scenery. At the same time, Cory is heavily influenced
    by modern digital culture, consuming online content, gaming, and technology trends that shape his ambitions and hobbies.
