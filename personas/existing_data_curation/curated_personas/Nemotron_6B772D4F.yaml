  career_goals: Cory plans to first earn his GED and then enroll in a community‑college automotive technology program to become a certified mechanic. He dreams of eventually opening his own small garage
    where he can combine his love of cars with his entrepreneurial spirit. As a backup, he is exploring the possibility of building a personal brand as a gaming and tech content creator on platforms like
    Twitch and YouTube, aiming to turn his hobby of PC building and gaming into a source of income. He also sees the military as a potential path to gain structure, training, and benefits if his plans shift
    toward more disciplined career routes.
