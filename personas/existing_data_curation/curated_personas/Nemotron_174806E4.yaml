personas:
  professional: Jasmine Battle, a retired church volunteer and longtime home‑economics sage, brings eight decades of budgeting, first‑aid, and bridge strategy into mentoring grandchildren and neighborhood
    youths, where their curiosity about gadgets meets a laid‑back, occasionally disorganized event‑planning style.
  sports: Jasmine Battle enjoys daily walks in Van Cortlandt Park for gentle cardio, follows the New York Yankees and New York Knicks on TV, participates in bridge and bingo competitions at the senior center,
    and they prefer solitary strolling over team sports, reflecting a competitive yet reserved spirit.
  arts: Jasmine Battle’s artistic tastes include listening to B.B. King’s blues, Mahalia Jackson’s gospel, classic films such as 'Casablanca' and 'The Graduate', and they share family stories through oral
    history circles, merging a love for nostalgia with an inquisitive drive to preserve heritage.
  travel: Jasmine Battle favors low‑key, loosely arranged trips like a nostalgic train ride to the Hudson Valley, weekend visits to the Bronx Botanical Garden, and occasional family trips to Philadelphia,
    and they balance a thirst for new sights with a cautious budget and reliance on familiar companions for navigation.
  culinary: Jasmine Battle skillfully prepares soul‑food classics like collard greens with smoked turkey, sweet‑potato casserole, and cornbread, while also experimenting with quinoa‑fruit salads and herbal
    teas, though they sometimes forget to label leftovers, leading to occasional kitchen mishaps.
  core: Jasmine Battle is a 96‑year‑old quilt‑knitting, bridge‑strategizing, jazz‑loving storyteller whose competitive curiosity keeps them engaged, even as a relaxed, sometimes disorganized habit colors
    their daily life, and they cherish moments of quiet reflection.
background:
  cultural: Jasmine was born in 1929 in the Bronx to parents who migrated from the rural South during the Great Migration. Raised in a close‑knit African‑American neighborhood, she absorbed traditions of
    church fellowship, soul‑food cooking, and the civil‑rights activism of the 1950s‑60s. The Bronx’s vibrant blend of Black and Caribbean cultures shaped her love for music—especially jazz, blues, and
    gospel—and informed her culinary tastes. Storytelling and oral history have been central to her identity, reinforcing a strong sense of community solidarity. Over her lifetime, she has witnessed the
    neighborhood’s transformation from post‑war housing projects to revitalized community gardens, embodying the resilience and cultural richness of Black New Yorkers.
