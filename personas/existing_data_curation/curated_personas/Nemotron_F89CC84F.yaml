  career_goals: Aarti dreams of a future where she can combine her love for art, caring for living beings, and desire to help her community. She imagines becoming a pediatric veterinarian or an environmental
    educator who uses illustrations and digital media to teach children about wildlife conservation. She also hopes to study graphic design or illustration in college so she can create compelling visual
    campaigns for nonprofit causes, especially those that support children's health and education. In the long term, she envisions leading community art projects that bring together diverse cultural groups
    in Beaverton.
