personas:
  professional: Aarti Nhim, a budding digital storyteller, merges cartoon illustration with interactive Scratch projects, applying their curious mind, methodical planning, and collaborative enthusiasm to
    create narratives that delight friends and classmates.
  sports: Aarti Nhim, an energetic midfielder for the Tualatin Trail Tigers youth soccer team, trains twice weekly, loves weekend hikes on the Tualatin River Trail, and follows the Portland Timbers and
    Seattle Seahawks with enthusiastic fanfare.
  arts: Aarti Nhim, a passionate cartoonist and mixed‑media artist, fills sketchbooks with whimsical characters, crafts collages from reclaimed newspaper and fabric, and draws inspiration from creators
    like Rebecca Sugar, KAWS, and Hayao Miyazaki, often sharing their work in the school’s cultural club performances.
  travel: Aarti Nhim, an enthusiastic explorer, has hiked the Tualatin River Trail, visited Seattle’s Pike Place Market and Crater Lake National Park, and dreams of traveling to the Grand Canyon and the
    bustling streets of Tokyo for a manga convention, balancing family budgeting with school‑year homework.
  culinary: Aarti Nhim, a budding kitchen helper, delights in preparing sweet festival treats such as syrup‑soaked fried dough balls and spiced rice pudding, experimenting with aromatic cardamom and rose
    water, while also mastering simple dishes like avocado toast and homemade pizza.
  core: Aarti Nhim is a curious, organized, and compassionate 11‑year‑old who seamlessly blends art, coding, soccer, and cultural traditions into an energetic, collaborative life.
background:
  cultural: Aarti is a second‑generation South Asian American of Indian heritage, raised in a bilingual household where Hindi and English are spoken. Her family celebrates Diwali, Holi, and other regional
    festivals, preparing traditional foods, decorating the home, and sharing stories from Indian mythology. These cultural practices instill a deep respect for community and generosity. Living in Beaverton,
    Oregon, she also embraces the Pacific Northwest lifestyle—enjoying outdoor activities, multicultural community events, and a diverse school environment. This blend of Indian traditions and American
    experiences shapes her open‑minded worldview, love for art, and strong desire to contribute positively to society.
