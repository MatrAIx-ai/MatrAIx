personas:
  professional: Jamel, a ten‑year‑old budding visual storyteller, channels their imagination into comic strips, LEGO creations, and Scratch animations, showing early mastery of illustration, basic programming,
    and collaborative art club work while balancing a meticulous planning habit with a love for spontaneous creativity.
  sports: Jamel, who prefers quiet exploration over team sports, spends weekend afternoons strolling through Cedar Park's nature trails sketching leaves, occasionally joins the Cedarville Youth Soccer Club's
    Friday‑night practice, and cheers for the Cedarville Cyclones minor‑league baseball team while secretly rooting for the local high‑school basketball squad, the Cedarville Tigers.
  arts: Jamel, an aspiring comic artist, devours the works of Neil Gaiman, Stan Lee, and Hayao Miyazaki, mimics the rhythmic patterns of drummer Sheila E. in the community drumming circle, and finds inspiration
    in the fantastical scores of composer John Williams, often recreating scenes from Pixar’s “Inside Out” and manga series “My Hero Academia” in their own sketches.
  travel: Jamel, an inquisitive traveler, loves short family road trips to the state science museum in River City, wishes to see the night skies of the Grand Canyon National Park, and dreams of a future
    visit to the International Space Station simulation exhibit in Houston, always planning adventures with a detailed doodle map and a backpack of sketchbooks.
  culinary: Jamel, a budding food explorer, enjoys the cheesy comfort of homemade mac and cheese, the sweet tang of strawberry‑banana smoothies, and the crisp crunch of carrot sticks with hummus, often
    attempting to recreate the simple pepperoni pizza from “Pizzeria Napoli” after watching cooking videos, though their cooking skill remains at the “help‑with‑mom” level.
  core: Jamel is a ten‑year‑old imagination engine who sketches fantastical worlds, saves every spare coin for the next LEGO treasure, keeps their glasses clean despite frequent sketches, and can be found
    drumming quietly while plotting the next comic adventure.
background:
  cultural: Jamel was raised in a close‑knit African American family in Dacula, where storytelling, music, and communal gatherings are central to daily life. His parents emphasize respect for heritage and
    encourage participation in church activities, such as the youth choir and cultural celebrations like Juneteenth. He regularly attends community events at the Gwinnett County center, taking part in art
    workshops that highlight African American artists and history. Growing up in a diverse suburb, Jamel interacts with peers from many backgrounds, fostering an inclusive outlook. Family meals often feature
    Southern soul food, and oral traditions shared by relatives enrich his imagination and sense of identity.
attributes:
  skills: '[''drawing'', ''comic storytelling'', ''Scratch coding'', ''LEGO building'', ''keyboard playing'', ''group drumming'', ''problem solving'']'
  hobbies: '[''drawing comics'', ''reading sci‑fi/fantasy books'', ''building LEGO models'', ''Scratch programming'', ''playing keyboard'', ''drumming with community group'', ''nature walks'', ''watching
    educational documentaries'']'
  career_goals: Jamel dreams of becoming a multimedia artist and game designer who creates imaginative worlds that inspire and bring people together. He hopes to study animation or graphic design in the
    future, develop interactive educational games that make learning fun, and eventually lead community art workshops that empower other kids to express themselves. He also envisions using visual art to
    explain complex scientific ideas, blending creativity with education.
