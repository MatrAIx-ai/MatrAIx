persona_description: A microbiologist or immunologist who studies the mechanisms and factors that contribute to the colonization and invasion of Salmonella enteritidis in young chicks. The persona is interested
  in understanding the role of fimbriae and flagella in these processes and how their absence affects the early stages of colonization and invasion. They may be particularly interested in the specific mutants
  that are defective in the elaboration of these organelles and the impact on the colonization and invasion of the birds.
