personas:
  professional: Allen Sotocolon, a retired facilities supervisor turned community mentor, leverages his carpentry, small‑engine maintenance, and budget‑management expertise to lead neighborhood garden projects
    and teach DIY skills, blending his practical curiosity with a cooperative, organized approach.
  sports: Allen Sotocolon, a lifelong Arkansas Razorbacks enthusiast, follows college football and basketball seasons religiously, participates in a weekly senior walking club at the local park, and enjoys
    occasional recreational bowling at the community center, showcasing a low‑impact, socially engaged approach to fitness.
  arts: Allen Sotocolon’s artistic side shines through digital photography of the Ouachita River, choir singing of gospel standards like 'Amazing Grace', and an admiration for Ansel Adams and folk legend
    John Prine, all of which feed their reflective, creative outlet.
  travel: Allen Sotocolon favors road‑trip adventures that blend nature and heritage, having driven to Hot Springs National Park, the Ozark National Forest, and a nostalgic visit to New Orleans’ River Market,
    while dreaming of a future photography pilgrimage to Antelope Canyon.
  culinary: Allen Sotocolon enjoys Southern comfort foods such as pan‑fried catfish, skillet cornbread, and peach cobbler, often seasoning dishes with basil and thyme harvested from their garden, and occasionally
    experiments with smoked trout recipes in the workshop’s makeshift kitchen, reflecting their hands‑on, balanced approach to cooking.
  core: Allen Sotocolon is a pragmatic, curiosity‑driven retiree who blends carpentry, fishing, and choir singing into a harmonious lifestyle, occasionally overspending on new lures while meticulously planning
    garden projects.
background:
  cultural: Allen was raised in a small, predominantly white, Southern town in Arkansas. His upbringing emphasized hard work, self‑reliance, and community cooperation—a legacy of the post‑World‑War II generation.
    He identifies with Southern hospitality, church‑centered family life, and the modest, pragmatic values of rural Arkadelphia. Though he appreciates broader ideas from his college experiences, he remains
    rooted in local traditions such as seasonal festivals, garden fairs, and volunteer‑driven neighborhood initiatives.
attributes:
  skills: '[''Carpentry'', ''Electrical troubleshooting'', ''Plumbing repairs'', ''Small engine maintenance'', ''Landscaping & horticulture'', ''Project scheduling'', ''Budget management'', ''Community
