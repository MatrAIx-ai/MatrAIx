personas:
  professional: Leonardo Lopezdejesus is a seasoned project management professional who blends meticulous Waterfall and Agile/Scrum expertise with an artist’s eye for user experience, driving large‑scale
    digital transformations, leveraging Lean Six Sigma for process improvement, and mentoring emerging managers while championing diversity‑informed strategies; they are known for doodling abstract motifs
    on project roadmaps.
  sports: Leonardo Lopezdejesus enjoys weekend pickup basketball at the local community center, follows the Dallas Mavericks in the NBA and the Houston Astros in MLB, runs weekly with the Austin Trail Running
    Club, and maintains a balanced fitness regimen that blends cardio, strength training, and yoga to keep both body and mind supple; they view each session as both a physical challenge and a meditative
    practice.
  arts: Leonardo Lopezdejesus immerses themselves in abstract painting, drawing inspiration from Wassily Kandinsky and Gerhard Richter, frequents contemporary galleries showcasing works by Yayoi Kusama
    and Kerry James Marshall, strums acoustic guitar to the mellow tunes of Nick Drake and Iron & Wine, volunteers in community theater set design, and captures urban life through street photography; they
    find that each medium fuels the others, creating a continuous feedback loop of creativity.
  travel: Leonardo Lopezdejesus seeks immersive cultural experiences, having explored Berlin’s vibrant street‑art scene, Oaxaca’s bustling mercados, and Kyoto’s tranquil temples, while planning future voyages
    to Norway’s dramatic fjords and Morocco’s Sahara dunes; they meticulously research each destination while leaving room for spontaneous detours to hidden cafés and local workshops.
  culinary: Leonardo Lopezdejesus approaches cooking as a creative laboratory, confidently crafting Southwest‑inspired tacos al pastor with pineapple, chipotle, and corn tortillas fused with Texas‑style
    smoked brisket, mastering sushi rolls with avocado and pickled ginger, and favoring fresh cilantro, lime, and ancho chilies in their pantry; they love experimenting with flavor pairings and often sketch
    new dish concepts on napkins during dinner parties.
  core: Leonardo Lopezdejesus is a disciplined yet creatively driven project leader who balances rigorous financial planning and health monitoring with a passion for abstract art, guitar, and globe‑trotting,
    occasionally neglecting dental check‑ups in favor of late‑night studio sessions; they thrive on turning constraints into creative opportunities.
background:
  cultural: Leonardo is a second‑generation Mexican‑American raised in a bilingual household in Fort Worth, Texas. He grew up celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings centered around Mexican cuisine, while also embracing Texan customs like rodeos and barbecues. Fluent in both Spanish and English, he actively participates in local Latinx business networks
    and community events like Fort Worth Borderfest. His cultural heritage informs his collaborative, harmony‑seeking approach and inspires him to integrate diverse perspectives into his project work.
