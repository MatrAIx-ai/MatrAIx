  career_goals: Leonardo aims to advance to a Director of Project Management Office (PMO) role where he can lead large‑scale digital transformation initiatives and embed innovative, sustainability‑focused
    methodologies across the organization. He aspires to mentor emerging project managers, champion diversity‑informed project strategies, and eventually launch his own consultancy that helps Latinx‑owned
    businesses and community projects integrate culturally responsive and socially impactful practices.
