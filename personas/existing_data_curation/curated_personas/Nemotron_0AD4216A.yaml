personas:
  professional: An aspiring digital illustrator and multimedia storyteller, Donnie Lynn channels their boundless curiosity and talkative energy into sketching characters, creating short videos, and contributing
    to the school drama club’s productions, even though their relaxed attitude toward planning often leads to last‑minute creative bursts.
  sports: A keen outdoors enthusiast, Donnie Lynn hikes the White Mountains, runs on the school’s cross‑country team, belongs to a local youth climbing club at the New Hampshire indoor rock gym, and roots
    for the New England Patriots, Boston Red Sox, and Boston Celtics.
  arts: An enthusiastic creator, Donnie Lynn draws inspiration from graphic novelist Alan Moore, anime director Hayao Miyazaki, and indie musician Clairo, spending afternoons sketching characters, recording
    guitar riffs, and filming short memes while volunteering at the town library’s art workshops and performing improvisational scenes in the school drama club.
  travel: An adventurous teen, Donnie Lynn has trekked the White Mountains, visited Boston’s Museum of Fine Arts and the historic town of Portsmouth, dreams of exploring Dublin’s pubs and Tokyo’s neon districts,
    and prefers spontaneous road trips with friends over meticulously planned itineraries.
  culinary: A budding home‑cook, Donnie Lynn enjoys whipping up maple‑glazed salmon, hearty New England clam chowder, and occasional sushi rolls, favoring fresh cod, thyme, soy sauce, and mayo, and while
    they can follow a recipe for pork tenderloin, they often improvise with leftover ingredients during late‑night snack runs after gaming.
  core: Donnie Lynn is a talkative, art‑obsessed teen who blends sketchbooks, guitar riffs, and meme creation into a whirlwind of spontaneous projects, often sacrificing organization for creative bursts
    and occasionally neglecting sleep.
background:
  cultural: Donnie grew up in Hooksett, a small, predominantly white New England town in Merrimack County, New Hampshire. His cultural environment blends traditional New England values—pragmatic self‑reliance,
    seasonal outdoor life, and strong community ties—with a growing local appreciation for the arts fostered by the town’s library programs, school arts initiatives, and seasonal festivals. Family stories
    trace back to early colonial settlers and later Irish immigrants, giving him a sense of historical continuity. Community events like high‑school sports games, the annual town fair, and neighborhood
    potlucks have taught him the importance of cooperation and neighborhood support, while his school’s extracurricular scene encourages open‑minded exploration of creative ideas.
