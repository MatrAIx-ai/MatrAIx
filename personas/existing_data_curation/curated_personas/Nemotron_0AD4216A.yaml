  career_goals: Donnie dreams of turning his love for art and social interaction into a career that lets him bring people together through visual and digital media. He hopes to study graphic design or multimedia
    production after high school, with the long‑term goal of becoming a digital content creator, community arts coordinator, or multimedia producer for local events and online platforms. He also envisions
    traveling to artistic festivals, hosting workshops for peers, and eventually running a small creative studio that blends storytelling, music, and community engagement.
