personas:
  professional: Cindy Joyce, a seasoned interior designer with a meticulous eye for space‑planning and color theory, leverages AutoCAD, SketchUp, and Revit to deliver sustainable, historically sensitive
    renovations while mentoring junior designers and chasing regional design awards.
  sports: Cindy Joyce hikes the White Mountains with the White Mountain Hiking Club each autumn, follows the New England Patriots and Boston Red Sox on game nights, and plays casual pickleball at the community
    center to stay fit.
  arts: Cindy Joyce draws inspiration from designers like Kelly Wearstler and Charles & Ray Eames, attends museum exhibitions featuring works by Monet and contemporary installations at the Palais de Tokyo,
    and discusses both classic literature and modern design tomes in their book club.
  travel: Cindy Joyce plans travel like a design research trip, favoring curated itineraries to Milan’s Salone del Mobile, Paris’s Maison & Objet, and historic towns such as Bruges, while juggling a modest
    retirement budget that sometimes forces them to postpone a long‑desired Grand Tour of Italy.
  culinary: Cindy Joyce curates dinner parties using garden‑fresh heirloom tomatoes, roasted root vegetables, and a signature New England clam chowder, pairing dishes with locally sourced wild‑run honey
    and a show‑stopping lavender‑infused sorbet for dessert.
  core: Cindy Joyce blends structured design precision with a love for native gardens, competitive ambition, and a habit of over‑collecting vintage fabric scraps that sometimes clutter their studio.
background:
  cultural: Cindy was born into a multigenerational Anglo‑American family rooted in New England, growing up with a strong appreciation for the region's colonial and Shaker architectural heritage. Her upbringing
    emphasized community involvement, self‑reliance, and respect for historic preservation. She earned a bachelor’s degree in humanities from a liberal arts college in the area, studying art history and
    literature, which deepened her cultural literacy. These New England values of modesty, pragmatism, and a love of nature blend with the broader artistic influences she encounters through travel and her
    professional work, shaping a cultural identity that balances tradition with contemporary design sensibilities.
attributes:
  skills: '[''Space planning'', ''Color theory'', ''Project management'', ''Budgeting and cost control'', ''AutoCAD & SketchUp'', ''Sustainable material sourcing'', ''Historic preservation design'', ''Client
