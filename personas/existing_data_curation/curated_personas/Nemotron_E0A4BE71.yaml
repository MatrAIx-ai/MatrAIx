  hobbies: '[''Gardening'', ''Hiking'', ''Book club'', ''Volunteering at the Bedford Historical Society'', ''Traveling to design fairs and museum exhibitions'', ''Hosting dinner parties'', ''Quilting'',
    ''Antique furniture restoration'']'
  career_goals: Cindy aims to establish a boutique interior‑design studio in Bedford that specializes in sustainable, historically sensitive renovations for New England homes. She intends to mentor emerging
    designers through a formal apprenticeship program, author a practical guide on integrating heritage elements with modern design, and earn recognition through regional design awards. Serving on the board
    of the New Hampshire Design Association and leading community projects that revitalize public spaces are also among her ambitions, allowing her to blend her competitive drive with a broader impact on
    the local cultural landscape.
