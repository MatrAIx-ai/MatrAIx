  career_goals: Berta dreams of turning her love for animals and science into a career as a veterinarian or wildlife rehabilitator, where she can combine her curiosity about biology with practical, hands‑on
    care. She also imagines teaching science someday to inspire other kids, especially those from bilingual backgrounds, to explore STEM fields. To achieve these goals, Berta plans to focus on advanced
    biology and chemistry courses in high school, seek mentorship at the local animal shelter, and earn a scholarship that supports her higher‑education aspirations.
