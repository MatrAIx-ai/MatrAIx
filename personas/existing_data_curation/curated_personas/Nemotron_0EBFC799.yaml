personas:
  professional: Berta Villafana is an aspiring junior coder who blends creative storytelling with practical problem-solving, using Scratch to build interactive games while balancing school responsibilities
    and team commitments.
  sports: Berta Villafana plays midfield for the Eagle Ridge Middle School Tigers, trains with the local Southwest Soccer Academy, and channels extra energy by cheering for the MLS side Houston Dynamo while
    also following the Charlotte Hornets, approaching fitness with a mix of structured drills and spontaneous after-school pickup games.
  arts: Berta Villafana expresses herself through vibrant watercolor paintings and witty cartoon sketches, drawing inspiration from Bill Watterson's Calvin & Hobbes, the dynamic choreography of folk-dance
    ensembles, and the storytelling lyrics of Taylor Swift, balancing disciplined practice with spur-of-the-moment doodles.
  travel: Berta Villafana's travel style mixes family road trips to nearby wonders like the Grand Canyon and the Texas Hill Country for weekend hikes with a dream of exploring Barcelona's historic streets
    and the neon glow of Tokyo's Skytree, favoring well-planned itineraries that still leave room for spontaneous park picnics.
  culinary: Berta Villafana loves helping prepare family traditional dishes such as corn-tortilla tacos filled with seasoned carne asada, fresh salsa verde, and homemade guacamole, skillfully mixing ingredients
    like cilantro, lime, and queso fresco, while also experimenting with colorful fruit kebabs for dessert.
  core: Berta Villafana is a vibrant, soccer-savvy teen who codes cartoons, paints watercolors, and balances curiosity with practicality, often juggling school, sports, and family recipes while occasionally
    forgetting to stretch before practice.
background:
  cultural: Berta’s family maintains strong Mexican roots while living in Tulsa, Oklahoma. Spanish is spoken at home, and she proudly celebrates traditions such as Día de los Muertos, Las Posadas, and Cinco
    de Mayo with family gatherings, traditional foods, and music. Her parents encourage her to stay connected to both cultures, supporting her participation in community events at the local Hispanic cultural
    center and fostering an appreciation for Mexican art, folklore, and cuisine. This bicultural environment enriches her identity and influences her interests in dance, cooking, and bilingual communication.
