personas:
  professional: Carolina Isalgue, an aspiring bilingual elementary teacher, blends meticulous lesson planning with spontaneous arts‑infused activities, leveraging strong classroom management and bilingual
    communication to create inclusive, lively learning spaces while coordinating seamlessly with families and community partners.
  sports: Carolina Isalgue spikes in a co‑ed volleyball league at the local community center, hits the trails of the Finger Lakes during summer hikes, paddles with the Finger Lakes Paddle Club in fall,
    and cheers on the Syracuse Orange women's volleyball and the New York Knicks, balancing competitive play with a laid‑back approach to fitness.
  arts: Carolina Isalgue channels her love for Latin dance into rhythmic movement, fills sketchbooks with charcoal studies inspired by Frida Kahlo and Georgia O'Keeffe, devours contemporary novels like
    Sally Rooney’s 'Normal People' and poetry by Ocean Vuong, and finds inspiration in the music of Carlos Vives and the performances of Lin‑Manuel Miranda.
  travel: Carolina Isalgue prefers spontaneous weekend getaways, often hiking and kayaking around the Finger Lakes, while dreaming of an immersive cultural trek to Oaxaca's markets and a culinary tour of
    Tuscany, balancing budget‑friendly hostels with occasional splurges on boutique B&Bs.
  culinary: Carolina Isalgue, a confident home cook, whips up family‑style empanadas, arroz con pollo, and sautéed chard with cumin, experimenting with fresh cilantro, plantains, and local farm‑to‑table
    produce, while occasionally improvising fusion tacos with miso glaze.
  core: Carolina Isalgue is a socially‑charged, arts‑driven future educator who juggles meticulous lesson plans with spontaneous dance bursts, saves diligently yet forgets to water houseplants, and thrives
    on turning classroom walls into vibrant galleries.
background:
  cultural: 'Carolina comes from a Hispanic/Latino family where Spanish and English were spoken at home, fostering a bilingual upbringing. Family gatherings emphasized storytelling, music, and shared meals,
    instilling a deep appreciation for her cultural heritage. This background shapes her teaching philosophy: she celebrates multicultural holidays, incorporates bilingual resources and culturally relevant
    texts, and strives to create a classroom where every student feels seen, respected, and proud of their identity.'
attributes:
  skills: '[''Classroom management'', ''Lesson planning'', ''Bilingual communication (English-Spanish)'', ''Arts integration'', ''Educational technology (Google Classroom, interactive whiteboards)'', ''Differentiated
    instruction'', ''Culturally responsive pedagogy'', ''Collaborative teamwork'', ''Student assessment and feedback'']'
  hobbies: '[''Latin dance (salsa, bachata)'', ''Painting and sketching'', ''Reading contemporary fiction and poetry'', ''Volleyball'', ''Volunteer work at community cultural center'', ''Cooking traditional
    family recipes'', ''Hiking and kayaking in the Finger Lakes'', ''Listening to education podcasts'', ''Attending arts‑integration workshops'']'
  career_goals: Carolina aims to earn full teaching certification and become a lead teacher of a bilingual or arts‑infused classroom. She plans to pursue a master’s degree in curriculum and instruction,
    develop an after‑school arts program that serves under‑represented youth, and eventually assume a leadership role—such as curriculum coordinator or principal—to shape inclusive school policies and expand
    multicultural curricula.
