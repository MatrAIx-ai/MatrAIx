personas:
  professional: Fionn Altema is a budding comic strip creator and Scratch game developer who blends keen observational humor with practical storytelling, using spontaneous bursts of creativity to sketch
    daily life while they often struggle with organization and deadlines due to a natural resistance to rigid structure.
  sports: Fionn Altema plays basketball on the Astoria Youth Hoopers league at the local park, idolizing the New York Knicks and emulating Jayson Tatum’s moves, preferring the intimacy of five‑on‑five scrimmages
    over large school teams, yet they often skip practice when anxiety about upcoming school projects spikes.
  arts: Fionn Altema channels their love for graphic storytelling by sketching daily comic strips inspired by Stan Lee’s humor and Jeff Smith’s dynamic panels, devouring graphic novels like Maus, while
    listening to Kendrick Lamar, SZA, and Bob Marley to process emotions, and spends weekends snapping street‑level photos of Astoria’s colorful murals, which they later incorporate into their visual narratives.
  travel: Fionn Altema enjoys spontaneous day trips with family to nearby spots like Central Park, Coney Island, and the historic museums of Washington, D.C., dreaming of future adventures to Tokyo’s anime
    districts and Paris’s Louvre to study international comic art, yet budget‑aware and reliant on school breaks, they favor short, affordable explorations over lengthy vacations.
  culinary: Fionn Altema favors bold flavors, constantly snacking on New York‑style pepperoni pizza and homemade sushi rolls, while they experiment in the kitchen with simple recipes like spaghetti with
    marinara, mango‑spinach smoothies, and peanut‑butter‑jelly sandwiches, often adding a dash of hot sauce for an extra kick.
  core: Fionn Altema is a curious, compassionate 12‑year‑old artist who transforms everyday worries into vibrant comic narratives, yet they often battle anxiety that fuels both their creative bursts and
    occasional disorganization.
background:
  cultural: Fionn is a Black youth raised in Astoria, Queens, a melting pot of cultures on the edge of Manhattan. His family traces its roots to the Caribbean—specifically Jamaica—where traditions such
    as celebrating Kwanzaa, cooking jerk chicken and callaloo, and listening to reggae and dancehall music are woven into everyday life. At home, he sometimes hears Jamaican Patois alongside English, and
    his parents emphasize the importance of community, respect, and storytelling. Growing up in a diverse Queens neighborhood, Fionn also participates in multicultural events at local community centers,
    including the Astoria Cultural Festival and neighborhood block parties that feature foods and performances from many ethnic groups. These experiences have given him a broad appreciation for cultural
    diversity while grounding him in the resilience, solidarity, and communal values that are central to his family's Black heritage.
attributes:
  skills: '[''Empathy and active listening'', ''Basic Scratch programming'', ''Conflict mediation'', ''Creative problem solving'', ''Reading comprehension'', ''Community resource navigation'']'
  hobbies: '[''Drawing comic strips'', ''Reading graphic novels'', ''Playing basketball (small groups)'', ''Coding simple games in Scratch'', ''Listening to hip‑hop and R&B'', ''Volunteering at the local
    library'', ''Journaling'', ''Street photography'']'
  career_goals: Fionn envisions a future where he can combine his love for people with his interest in technology. He hopes to become a community mentor or youth counselor who uses digital tools to support
    classmates and younger children in navigating school life. He dreams of studying psychology or education in high school and later pursuing a degree in social work or educational technology, enabling
    him to design apps that promote mental‑well‑being and collaborative learning while preserving flexibility for individual needs. He also wants to volunteer in local outreach programs and eventually lead
    initiatives that foster harmony and empowerment within his neighborhood.
