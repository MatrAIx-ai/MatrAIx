  career_goals: Looking ahead, Michael aims to transition from a senior administrative assistant role to an office manager or operations coordinator position where he can shape workflow improvements and
    mentor junior staff. He plans to earn the Certified Administrative Professional (CAP) credential and explore a part‑time master’s program in organizational leadership to deepen his strategic thinking.
    Michael is eager to introduce automation tools that streamline routine tasks, enhance data reporting, and free up time for creative projects. He also wants to champion workplace wellness initiatives
    that address stress and promote a balanced environment for his colleagues. Ultimately, he envisions a career that combines his practical expertise with his interest in people development and continuous
    learning.
