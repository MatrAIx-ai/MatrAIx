persona_description: A scientist and researcher who specializes in climate science, particularly in the field of climate monitoring and data analysis. Watts has conducted extensive research on the placement
  and accuracy of weather stations used to monitor the nation's climate, and has presented his findings at a scientific workshop in Boulder, Colorado. He is known for his critical thinking and skepticism
  towards the media's reporting of global warming, and is interested in understanding the cause of global warming. Watts has received attention from conservative talk-show host Rush Limbaugh and has been
  cited in articles and commentary on global warming. He is an independent researcher who is dedicated to ensuring the accuracy of the scientific data.
