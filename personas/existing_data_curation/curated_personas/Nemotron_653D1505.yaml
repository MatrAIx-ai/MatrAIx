  hobbies: '["Cooking Guatemalan cuisine", "Hiking", "Animal shelter volunteering", "Yoga and meditation", "Strategy video games", "Model building", "Gardening", "Attending cultural festivals"]'
  career_goals: Mario aims to obtain Certified Veterinary Technician (CVT) certification within the next year and specialize in small‑animal anesthesia. He aspires to take on a supervisory role to streamline
    clinic workflows, reducing stress for staff while improving patient care. In the longer term, he envisions opening a community‑focused veterinary clinic in the San Fernando Valley that offers affordable
    services to Spanish‑speaking families, integrating his cultural background with his professional expertise. He also plans to pursue continuing education in veterinary dentistry to broaden his skill
    set.
