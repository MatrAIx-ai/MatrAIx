personas:
  professional: Mario Alonso, a veterinary technologist renowned for meticulous laboratory diagnostics, radiography, and anesthesia monitoring, leverages their structured mindset and bilingual communication
    to streamline clinic workflows while pursuing CVT certification and a future community‑focused practice for Spanish‑speaking families.
  sports: Mario Alonso, an avid hiker in Angeles National Forest and a member of the Los Angeles Hiking Club, supports the LA Dodgers and LA Lakers, participates in weekend pick‑up soccer with local community
    leagues, and uses weekly trail runs to balance the physical demands of their veterinary duties.
  arts: Mario Alonso, a connoisseur of world music and indie film, regularly listens to Juanes and Silvio Rodríguez, enjoys the atmospheric scores of Gustavo Santaolalla, and attends live performances at
    the Hollywood Bowl and the Downtown LA Art Walk, where vibrant mural galleries fuel their creative inspiration.
  travel: Mario Alonso, who favors weekend road trips to nearby nature spots such as Santa Barbara and Yosemite, dreams of exploring the spice markets of Oaxaca and the historic streets of Lisbon, while
    carefully planning trips around clinic staffing and limited vacation days to balance adventure with professional responsibilities.
  culinary: Mario Alonso, an accomplished home chef, expertly prepares pepian and chiles rellenos using garden‑fresh cilantro, oregano, and locally sourced plantains, while experimenting with fusion twists
    that blend traditional flavors with Californian produce, often cooking for friends after long clinic shifts.
  core: Mario Alonso fuses a rigorously structured veterinary career with a passion for heritage cooking, hiking, and strategic gaming, all while battling a penchant for worry that drives meticulous planning
    in both work and life.
background:
  cultural: Mario grew up in a Guatemalan immigrant family in Los Angeles, speaking both Spanish and English at home. His upbringing emphasized family cohesion, respect for elders, and Catholic traditions,
    which he continues to observe through celebrations of Semana Santa, Día de los Muertos, and other Guatemalan holidays. He maintains strong ties to the Guatemalan community in Van Nuys, regularly attending
    cultural gatherings, supporting local Latinx businesses, and staying connected with relatives in Guatemala through frequent visits and virtual calls. This cultural heritage informs his commitment to
    serving Spanish‑speaking clients and preserving his ancestral customs.
attributes:
  skills: '["Animal handling", "Veterinary radiography", "Anesthesia monitoring", "Surgical assistance", "Laboratory diagnostics", "Medical record management", "Client communication (Spanish/English)",
