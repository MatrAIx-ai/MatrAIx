persona_description: A social scientist who specializes in the study of marine ecosystems and their human impacts, particularly in the context of forage fish management in the Pacific region. She has conducted
  extensive research on the vulnerability of forage fish species such as Pacific herring to overfishing and other threats, and has identified the need for social-ecological thresholds of sustainability
  for marine management and appropriate social-ecological targets for herring recovery. She has also developed indicators that provide early warning of change and scenarios analysis to help managers avoid
  crossing tipping points or monitor progress of restoration efforts in systems that have already crossed tipping points.
