persona_description: A virologist who specializes in the study of influenza viruses, particularly the H5N1 subtype. Her research interests include the tropism of avian influenza A (H5N1) in the upper and
  lower respiratory tract, the architecture of ribonucleoprotein complexes in influenza A virus particles, and the detection of hemagglutination inhibition in the hemagglutination inhibition assay. She
  has published several research articles in peer-reviewed journals, including "A polymorphism in the hemagglutinin of the human isolate of a highly pathogenic H5N1 influenza virus determines organ tropism
  in mice" and "Differential onset of apoptosis in influenza A virus H5N1- and H1N1-infected human blood macrophages".
