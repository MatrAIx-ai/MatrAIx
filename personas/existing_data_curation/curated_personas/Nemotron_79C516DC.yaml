personas:
  professional: Irene Adel, a ten‑year‑old budding environmental coder, blends curiosity about nature with early programming skills from their school coding club, using digital art to illustrate local ecosystems
    while responsibly organizing school projects and assertively sharing ideas in group work.
  sports: Irene Adel plays forward on the Seward Elementary soccer team, cheers for the Alaska Anchorage Seawolves hockey squad and the Seattle Seahawks, and joins the community’s winter ice‑skating club,
    balancing energetic group games with a love for outdoor exploration.
  arts: Irene Adel channels their imagination into watercolor landscapes of tide pools, draws inspiration from Ansel Adams and Studio Ghibli’s My Neighbor Totoro, and curates playlists featuring Jack Johnson,
    Imagine Dragons, and local storyteller songs during their beadwork sessions with their grandmother.
  travel: Irene Adel’s travel imagination roams from the local Kenai Peninsula tide‑pools and a school field trip to Denali, to dreaming of seeing the northern lights in Fairbanks and exploring the coral
    reefs of the Great Barrier Reef, while planning family hikes to nearby Glacier Bay to satisfy their curiosity.
  culinary: Irene Adel delights in preparing a honey‑glazed salmon with fresh kelp salad, savoring blueberry pancakes topped with wild berry jam, and snacking on roasted seaweed and dried salmon jerky,
    often experimenting with new ingredients they discover during beach foraging.
  core: Irene Adel, a ten‑year‑old whirlwind of curiosity, balances artistic doodles, coding experiments, and a deep reverence for coastal nature, while worrying over small setbacks and occasionally overindulging
    in sugary treats.
background:
  cultural: Irene is a member of the Dena’ina Athabascan community, the indigenous people of the Cook Inlet region. Growing up in Seward, she experiences a blend of rugged coastal environment and close‑knit
    village life. Her family maintains traditions such that seasonal salmon fishing, gathering kelp, and attending community potlucks where songs and dances are performed. From an early age, she learns
    basic Dena’ina language, hears elders’ stories about the land, sea, and animal spirits, and participates in cultural crafts like beading and simple bone carving. The community emphasizes respect for
    nature, sharing knowledge, and collective responsibility to protect the environment. Modern schooling provides her with English language and science education, while cultural programs at school and
    the local tribal center reinforce her identity. This heritage shapes her imagination, fostering a deep appreciation for Alaska’s natural beauty and a desire to preserve both the ecosystem and cultural
    narratives.
