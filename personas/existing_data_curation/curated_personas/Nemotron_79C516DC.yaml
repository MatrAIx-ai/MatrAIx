  career_goals: Irene dreams of blending her love for art, science, and her cultural heritage. She hopes to become a marine biologist who creates illustrated field guides and short educational videos to
    teach peers about Alaska’s marine ecosystems. At the same time, she wants to be an illustrator and storyteller who preserves Dena’ina legends through comics and graphic novels. In the longer term, she
    envisions working as an environmental educator in her community, inspiring other children to protect the land and sea while celebrating Native culture. Her ambition includes attending a science‑focused
    high school, earning a degree in marine biology or visual arts, and eventually returning to Seward to mentor younger students and lead community projects that combine conservation with cultural storytelling.
