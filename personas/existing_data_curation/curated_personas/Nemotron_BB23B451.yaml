personas:
  professional: Jonas Lopezrios, a budding preschool classroom helper who organizes block towers by color, leads group play with clear turn‑taking rules, and reliably shows up for morning circle, channels
    their methodical nature into early leadership while their outgoing energy keeps peers engaged.
  sports: Jonas Lopezrios, a member of the neighborhood Little Leaguers soccer team, enjoys structured drills on Saturday mornings, proudly wears his jersey while cheering for the local Red Sox, and follows
    a simple bedtime stretch routine, blending energetic sociability with organized fitness.
  arts: Jonas Lopezrios, who spends afternoons drawing characters from his favorite animated series, mimics simple dance moves in preschool's music class, and collects stickers of beloved cartoon heroes
    like Mickey Mouse, integrates structure into creative play.
  travel: Jonas Lopezrios, who loves family road trips to the state park where they follow a detailed itinerary of a nature walk, picnic, and playground time, and dreams of a future Disneyland vacation,
    balances adventure with the comfort of scheduled rest stops and familiar snacks.
  culinary: Jonas Lopezrios, whose favorite meals include chicken nuggets, macaroni‑and‑cheese, and sliced apples, enjoys helping stir batter in a play kitchen, insists on a set snack schedule, and occasionally
    sneaks extra grapes when unsupervised, revealing both an organized palate and occasional mischievousness.
  core: Jonas Lopezrios melds an orderly, predictable mindset with boundless energy, turning routine activities into structured fun while occasionally rearranging toys until they're perfectly aligned.
background:
  cultural: Jonas comes from a Costa Rican family that immigrated to Dallas, Texas, where he was born and raised. At home, Spanish is spoken daily, and family meals feature traditional dishes such as gallo
    pinto, plantains, and arroz con pollo, reinforcing his cultural heritage. The family celebrates Costa Rican holidays like Día de la Independencia with music, dancing, and traditional foods, fostering
    a strong sense of identity. Jonas also participates in the local Hispanic community’s cultural events, attending children’s story sessions in Spanish at the library and joining a neighborhood soccer
    club where Costa Rican chants and “pura vida” optimism are shared. This bicultural environment shapes his bilingual abilities, love for soccer, and appreciation for community and family values.
