  hobbies: '[''building blocks'', ''drawing and coloring'', ''singing bilingual nursery rhymes'', ''pretend play (firefighter, teacher)'', ''organized soccer drills'', ''storytime and folklore tales'',
    ''puzzles'', ''playing with friends in group games'']'
  career_goals: Jonas’s ambitions reflect his love for helping others and his enjoyment of structured activities. In the short term, he aims to learn to read and write his full name and to become the line
    leader in his preschool. He dreams of growing up to be a teacher who can organize fun learning games for younger children, and he also imagines playing soccer for a local team, combining his sociable
    nature with his cultural love for the sport. Ultimately, Jonas hopes to be a community helper who can support his family and friends.
