persona_description: A financial analyst who specializes in economic cycles, particularly the analysis of business cycles and their impact on the economy. They have a deep understanding of the V, U, L,
  and W-shaped recession models and their corresponding economic behavior. They are skilled in forecasting economic trends and predicting the potential outcomes of economic shocks. They are also knowledgeable
  about the current economic situation in the USA and how it compares to other countries in terms of economic recovery and recession patterns. They have a keen interest in understanding the causes and effects
  of economic shocks and how they can be mitigated or managed to prevent or reduce economic downturns.
