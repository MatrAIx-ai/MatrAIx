  hobbies: '[''Reading (historical fiction, self-improvement)'', ''Journaling'', ''Sketching'', ''Photography'', ''Cooking Mexican cuisine'', ''Herb gardening'', ''Meditation'', ''Walking in nature'', ''Listening
    to music (Latin and indie folk)'']'
  career_goals: Cindya aims to build a stable, purpose-driven career that merges her practical mindset with her curiosity for new tools. She plans to enroll in a community college program in Business Administration
    or Information Technology, with the goal of obtaining an associate degree and later a certification in data analytics. Her short-term ambition is to secure an entry-level administrative or project coordination
    role where she can apply her organizational strengths and bilingual communication skills. In the longer term, she envisions progressing to a managerial position overseeing community-focused projects,
    or launching a small online venture that sells curated Mexican-inspired home goods, allowing her to support her family and give back to her neighborhood.
