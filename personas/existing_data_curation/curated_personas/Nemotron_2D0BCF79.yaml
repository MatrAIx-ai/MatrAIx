  career_goals: Shawn aims to translate his compassion and pragmatic abilities into a career that directly benefits his community. In the short term he plans to enroll in a local community college to pursue
    an associate’s degree in social work while working a part‑time apprenticeship in a trade (e.g., plumbing) to gain financial stability. Long‑term, he hopes to earn a bachelor’s degree in social work
    or public health and become a community outreach coordinator or case manager for a Baltimore nonprofit focused on youth services and mental‑health support. As a backup, he is considering completing
    EMT certification to combine his interest in emergency care with his desire to help people in urgent situations.
