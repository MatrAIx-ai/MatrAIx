persona_description: A medical professional with expertise in cardiology and electrocardiography, specifically in the analysis of ECG waves and the differentiation between normal and abnormal heart actions.
  The individual is likely to be interested in developing and refining diagnostic tools for detecting cardiac arrhythmias, and may have a background in electrical engineering, physiology, or biophysics.
  They may have experience with analyzing waveforms on stripscharts, cardioscopes, or other electronic devices, and have a keen interest in understanding the underlying mechanisms of heart muscle action
  and how it can be manipulated to diagnose and treat cardiac diseases.
