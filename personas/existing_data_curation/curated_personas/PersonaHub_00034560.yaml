persona_description: A group of MIT students who have designed and installed a concentrating solar array system in a remote village in Lesotho, providing hot water to the dormitories for the girls and enabling
  them to produce electricity using Rankine-cycle heat-powered engines. They are working with local co-workers and have formed an organization called Solar Turbine Group International to manufacture and
  launch a locally based business to produce the units for installation throughout the country. They hope to eventually provide a useful product and generate local income.
