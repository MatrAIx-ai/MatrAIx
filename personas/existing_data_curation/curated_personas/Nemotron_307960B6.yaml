personas:
  professional: Patricia Jomant, a veteran construction specialist with 40 years of hands‑on experience in concrete finishing, framing, and blueprint interpretation, now channeling their organized, methodical
    mindset and curiosity for new building technologies into a supervisory safety role and a niche subcontracting business focused on historic‑home restoration and community‑center renovations.
  sports: Patricia Jomant, a low‑impact fitness enthusiast who hikes the Daniel Boone National Forest each spring, plays in a senior‑friendly community softball league, follows the Kentucky Wildcats men’s
    basketball and the Cincinnati Bengals as their seasonal team loyalties, and participates in a local walking club that meets three times weekly to maintain mobility while accommodating their knee osteoarthritis.
  arts: Patricia Jomant, a dedicated quilter who meets weekly with a circle that recreates traditional Appalachian patterns, delights in the fiddle‑driven sounds of Bill Monroe, Alison Krauss, and Ricky
    Skaggs on their vintage record player, and regularly attends regional heritage festivals where they admire folk art and historic craft demonstrations, weaving these cultural threads into their creative
    identity.
  travel: Patricia Jomant, a meticulous road‑tripper who plans weekend getaways to historic towns like Bardstown for bourbon tours, the Great Smoky Mountains for scenic hikes, and Asheville’s art colonies
    for quilting supplies, prefers staying at family‑run B&Bs, and balances their love of exploration with a modest travel budget that funds occasional trips to Appalachian heritage sites they have long
    dreamed of visiting.
  culinary: Patricia Jomant, a farm‑to‑table enthusiast who grows heirloom tomatoes, sweet corn, and collard greens in their backyard garden and transforms them into seasonal dishes such as herb‑roasted
    chicken with fresh garden salsa, smoked pork ribs glazed with homemade apple‑cider BBQ sauce, and warm apple cobbler, while also preserving summer harvests in jars and experimenting with rustic stone‑oven
    breads.
  core: Patricia Jomant, a 64‑year‑old practical visionary who blends hands‑on construction expertise with community‑rooted traditions, meticulous organization, and a quiet curiosity that fuels their commitment
    to safety, mentorship, and sustainable, heritage‑focused living.
background:
  cultural: Patricia was born and raised in central Kentucky, immersed in a Southern Appalachian cultural milieu that values hard work, community, and hospitality. Her family’s roots in small‑town farming
    and active church life have instilled a strong sense of self‑reliance, respect for tradition, and a willingness to help neighbors. She participates in regional customs such as church potlucks, local
    festivals featuring bluegrass music, and supporting nearby farms. While she embraces modern tools and ideas, her outlook remains practical and down‑to‑earth, reflecting the blend of curiosity and tradition
    that characterizes her Kentucky heritage.
attributes:
  skills: '[''Concrete mixing and finishing'', ''Framing and carpentry basics'', ''Blueprint reading and interpretation'', ''Power tool operation'', ''Site safety compliance'', ''Inventory and material
    management'', ''Work schedule planning'', ''OSHA 30‑hour certification'', ''Mentoring and team coordination'', ''Basic electrical and plumbing troubleshooting'', ''Digital construction documentation'',
    ''Problem solving under pressure'']'
  hobbies: '[''Gardening'', ''Farm-to-table cooking'', ''Quilting'', ''Volunteering at community center'', ''Reading historical fiction'', ''Reading construction trade magazines'', ''Listening to Appalachian
    folk music'', ''Hiking in Daniel Boone National Forest'', ''DIY home repair projects'', ''Attending local construction trade shows'']'
  career_goals: Looking ahead, Patricia aims to transition into a supervisory safety role within the next two years, securing an OSHA 30‑hour certification and pursuing a small‑business license to launch
    a niche subcontracting service specializing in residential remodeling and historic‑home restoration. She is eager to formalize her mentorship of apprentices, lead community‑focused building projects,
    and eventually scale back her hours to enjoy more family time while still contributing her expertise to local construction crews.
