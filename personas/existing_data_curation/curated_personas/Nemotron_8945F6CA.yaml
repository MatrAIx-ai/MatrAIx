  hobbies: '["Watercolor painting", "Sketching industrial concepts", "Visiting art galleries and museums", "DIY woodworking projects", "Model building (e.g., LEGO, scale models)", "Hiking in Shenandoah
    National Park", "Yoga and meditation", "Reading science-fiction and popular science", "Experimenting with international cooking", "Participating in maker space workshops", "Volunteering for STEM outreach"]'
  career_goals: Annie aims to transition into a senior leadership role where she can champion interdisciplinary projects that fuse engineering rigor with artistic design, such as sustainable consumer products
    or innovative public installations. She aspires to build a flexible consultancy practice that allows her to select projects aligned with her values of creativity and environmental stewardship, while
    also prioritizing work‑life balance to mitigate stress. Additionally, she hopes to contribute to professional organizations (e.g., ASME), publish thought pieces on design‑driven engineering, and mentor
    the next generation of engineers, especially underrepresented groups in STEM.
