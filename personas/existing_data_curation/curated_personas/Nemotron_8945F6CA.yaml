personas:
  professional: An experienced mechanical engineer, Annie Smith, utilizes advanced SolidWorks and CATIA modeling to develop sustainable consumer products that blend aesthetic watercolor-inspired sketches
    with functional engineering, championing interdisciplinary collaboration and mentorship of underrepresented students while they adopt a relaxed, flexible approach to deadlines and occasional disorganization.
  sports: An avid hiker and yoga enthusiast, Annie Smith regularly explores Shenandoah National Park trails with the Virginia Outdoor Club, supports the Washington Capitals and Nationals, and they practice
    weekly yoga at a local studio, balancing group camaraderie with solo nature retreats.
  arts: An artistic soul, Annie Smith frequents the Smithsonian American Art Museum and local galleries, draws inspiration from Monet, James Turrell, and the sci‑fi illustrations of Chris Foss, and they
    enjoy listening to Brian Eno while sketching industrial concepts, blending curiosity for classic and avant‑garde art.
  travel: A curious traveler, Annie Smith has trekked the Appalachian Trail, explored Kyoto’s design districts, and dreams of sailing Norway’s fjords, often planning trips loosely around work projects and
    budget constraints, and they sometimes postpone adventures due to lingering work stress.
  culinary: A culinary experimenter, Annie Smith delights in fermenting kimchi, crafting saffron‑infused risotto, and spherifying fruit caviar, often sourcing shiitake mushrooms and turmeric at farmer’s
    markets to fuse global flavors with a scientific twist, and they occasionally over‑indulge in experimental dishes at the cost of a tidy kitchen.
  core: Annie Smith is a 45‑year‑old mechanical engineer who blends art and sustainability, channels curiosity into interdisciplinary projects, and navigates a stress‑prone, flexible lifestyle marked by
    occasional disorganization and spontaneous creativity.
background:
  cultural: Annie grew up in suburban Virginia, shaped by a blend of traditional Southern hospitality and the progressive, arts‑centric atmosphere of the Mid‑Atlantic region. As a white American with deep
    community ties, she values education, civic involvement, and the local cultural scene, regularly attending regional festivals, theater performances, and art exhibitions. Her participation in professional
    societies like ASME reflects a commitment to both technical excellence and the broader engineering community. This cultural mosaic informs her balanced outlook—combining respect for tradition with an
    open, inquisitive mindset toward new ideas.
attributes:
  skills: '["Mechanical design", "SolidWorks CAD", "CATIA CAD", "Finite element analysis (FEA)", "Rapid prototyping (CNC, 3D printing)", "Sustainability engineering", "Design thinking", "Python scripting
