personas:
  professional: Cira Bonillasantos, they are a budding young builder who channels the precision of LEGO construction into early architectural sketches, relying on routine and a step‑by‑step methodology,
    while their competitive nature pushes them to perfect each design before showing it to classmates.
  sports: Cira Bonillasantos, they play midfield for the Little Lions youth soccer team, practice twice a week with drills inspired by FC Barcelona’s La Masia academy, enjoy watching matches of Manchester
    United and LA Galaxy, and supplement their training with weekend jogs and dynamic stretching routines to stay fit.
  arts: Cira Bonillasantos, they are an avid reader of the "Magic Tree House" and "The Mysterious Benedict Society" series, dance to salsa music like Celia Cruz’s "La Vida es un Carnaval" during family
    gatherings, and create fan illustrations of their LEGO creations influenced by the whimsical aesthetics of Studio Ghibli’s films.
  travel: Cira Bonillasantos, they favor structured family trips, having visited the Gulf Coast beaches and Orlando’s theme parks, and they dream of a carefully planned future adventure that includes a
    guided museum tour in London and a cultural exchange program in Tokyo.
  culinary: Cira Bonillasantos, they love cooking arroz con pollo and sweet plantain fritters from a handwritten family recipe, measuring each ingredient—rice, saffron, chicken broth, and ripe plantains—with
    the same meticulousness they apply to LEGO instructions, and they occasionally bake cupcakes topped with chocolate sprinkles shaped like tiny bricks.
  core: Cira Bonillasantos navigates life with a toolbox of routines, competitive curiosity, and step‑by‑step creativity, though they sometimes hoard stray LEGO pieces and occasionally forget to finish
    homework on time.
background:
  cultural: Cira is a first‑generation Cuban‑American living in Augusta, Maine. Her parents immigrated from Cuba and maintain cultural traditions at home, speaking Spanish daily and celebrating Cuban holidays
    such as Carnaval and Día de la Cultura. Family meals often feature classic dishes like arroz con pollo, black beans, and maduros, prepared together with Cira following step‑by‑step recipes. While she
    embraces local New England activities like soccer, hiking, and library reading programs, her identity is shaped by the vibrant rhythms, stories, and communal values of her Cuban heritage, which influence
    her language use, music preferences, and family rituals.
