  career_goals: Cira's career aspirations are developing as she grows. In the near term, she aims to finish elementary school with top grades and win the school spelling bee, reflecting her competitive
    nature. She dreams of joining the varsity soccer team in middle school and eventually playing at a high‑school level. Long‑term, she is fascinated by animals and hopes to become a veterinarian, combining
    her love for caring for pets with a practical, science‑based profession. She also enjoys cooking with her family and wishes to master traditional Cuban dishes, perhaps one day working in a kitchen that
    blends cultural flavors.
