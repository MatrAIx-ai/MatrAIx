persona_description: A scientist or environmental scientist who is knowledgeable about water quality monitoring and aquatic life effects. They are specifically interested in ammonia levels in surface waters
  and the impact on aquatic organisms. They are familiar with the Iowa Administrative Code and the Iowa Department of Natural Resources Storet database, as well as the established criteria for ammonia levels
  in Iowa streams. They are interested in the complex nature of nitrogen in water and its effect on aquatic life, and are skilled in evaluating measured ammonia levels in surface waters to determine if
  they are harmful to aquatic organisms.
