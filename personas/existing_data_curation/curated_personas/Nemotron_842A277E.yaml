personas:
  professional: Raymond Espitia, a curious 2-year-old who loves arranging blocks by color and shape, shows early signs of a future engineer or architect, applying methodical planning and gentle assertiveness
    even in pretend play.
  sports: Raymond Espitia, a lively 2-year-old, enjoys watching the Dallas Mavericks mascot during family outings and follows the Dallas Stars junior hockey sessions, but prefers energetic backyard tag
    over organized sports, reflecting a balance of social play and solitary exploration.
  arts: Raymond Espitia, who delights in listening to folk lullabies sung in both English and Spanish, loves watching animated films by Pixar and dancing to songs by Selena, allowing the vibrant cultural
    rhythms to shape their budding artistic imagination.
  travel: Raymond Espitia, with a growing fascination for bright colors, enjoys short family trips to nearby Waco’s Magnolia Market and the Ixtapa beach resort in Mexico, where the festive Día de los Muertos
    parade inspires their curiosity about diverse places.
  culinary: Raymond Espitia, a picky eater who insists on the perfect crunch of tortilla chips in quesadillas and the sweet scent of arroz con leche, often helps stir mashed bananas into banana pancakes,
    yet sometimes throws a tantrum when vegetables appear on the plate.
  core: Raymond Espitia is a methodical, worry-prone toddler who blends bilingual lullabies, block-sorting precision, and a love for quesadillas into a uniquely curious yet occasionally fretful outlook
    on life.
background:
  cultural: Raymond is raised in a bilingual Mexican‑American household in McKinney, Texas. At home, he hears both Spanish and English, enjoys traditional Mexican foods such as quesadillas and rice, and
    participates in family celebrations like Día de los Muertos and Las Posadas. His parents weave Mexican folk stories and songs into daily routines, giving him early exposure to vibrant cultural motifs
    that influence his artistic preferences and language development.
