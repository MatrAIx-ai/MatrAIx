  career_goals: Gloria aims to transition gradually toward a semi‑retired role that still allows her to apply her metalworking knowledge while granting her greater control over her schedule. Her primary
    ambition is to establish a modest home‑based workshop where she can create custom metal art pieces and small furniture for local clients, blending practicality with creativity in a quiet, solitary environment.
    She also hopes to mentor a handful of younger apprentices from the local Mexican‑American community, passing on traditional techniques and emphasizing safety, precision, and structured work habits.
    Financially, Gloria seeks to maintain a stable income to cover health expenses and ensure a comfortable, independent living situation for the remainder of her life, while deliberately managing her anxiety
    through regular routines and predictable workloads.
