  hobbies: '[''Native‑plant gardening'', ''Hiking'', ''Birdwatching'', ''Yoga'', ''Meditation'', ''Tea brewing and blending'', ''Fusion cooking'', ''Landscape painting'', ''Pottery'', ''Reading mystery
    novels'', ''Attending art fairs'', ''Volunteer gardening'']'
  career_goals: Jing’s ambition is to turn her eclectic skill set into a sustainable micro‑enterprise while also addressing her sensitivity to stress. In the next two years she plans to launch an online
    boutique that sells handcrafted home décor items (hand‑woven baskets, ceramic mugs) alongside curated herbal‑tea blends that honor her Chinese heritage. To support this, she will complete a short‑term
    certification in horticulture and sustainable gardening, enabling her to market locally‑grown ingredients for her teas. She also intends to become a certified yoga and mindfulness instructor, offering
    weekend classes in Manitou Springs that blend gentle yoga with guided tea ceremonies, providing a stress‑relief outlet for herself and others. On the community side, she hopes to establish a monthly
    “Creative Wellness” pop‑up at the local farmer’s market, showcasing her crafts, sharing cooking demos, and fostering connections. Personal growth goals include adopting a structured habit‑tracking system
    to reduce disorganization, and completing a course in cognitive‑behavioral strategies to better manage anxiety.
