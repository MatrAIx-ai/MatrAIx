personas:
  professional: Elibet Gil is a Lean Six Sigma Black Belt industrial engineer who blends rigorous process optimization with occupational health and safety expertise, leading cross‑functional safety initiatives
    and culturally resonant training programs while mentoring emerging women engineers, and they bring an organized, methodical, and sociable approach to every project.
  sports: Elibet Gil participates in weekly salsa dancing with the local La Rumba club, hikes the Texas Hill Country every month with a photography group, and follows the San Antonio Spurs and Texas Rangers,
    occasionally playing intramural volleyball with coworkers, and they showcase their energetic and sociable nature through these activities.
  arts: Elibet Gil explores San Antonio’s mural corridors, admiring works by local street artist Alejandro López, attends contemporary shows featuring artists like Kehinde Wiley, strums acoustic guitar
    at family gatherings to the tunes of John Mayer, and takes on supporting roles in community theater productions, and they weave their curiosity for art into everyday life.
  travel: Elibet Gil prefers meticulously planned trips that blend cultural immersion and outdoor adventure, having trekked the red rocks of Sedona, explored the historic centers of Oaxaca, and dreamed
    of photographing the cherry blossoms in Kyoto, while balancing travel budgets with their financial goals, and they often combine photography with local culinary experiences.
  culinary: Elibet Gil loves to craft Oaxacan mole negro with a splash of dark chocolate and a hint of roasted coffee, reinvent a tlayuda topped with avocado, heirloom corn tortillas, and feta cheese, and
    experiments with mole‑marinated grilled chicken while pairing it with handcrafted margaritas, showcasing a blend of tradition and innovation in the kitchen, and they enjoy sharing these dishes at community
    potlucks.
  core: Elibet Gil is a methodical safety engineer who channels curiosity into art, salsa, and sustainable cooking, while juggling stress with yoga and a meticulous budget, often worrying about every detail
    yet thriving on community connections, and they remain driven by a blend of precision and passion.
background:
  cultural: Born to Mexican immigrant parents, Elibet grew up in a bilingual household in San Antonio, where family gatherings, Día de los Muertos celebrations, and the rhythms of regional music shaped
    her identity. She remains deeply connected to Mexican folk art traditions, such as alebrijes and Talavera pottery, which inform her appreciation for creative problem‑solving. Her community ties include
    active participation in local Fiesta events and outreach programs that support the Hispanic workforce. This cultural foundation fuels her commitment to create inclusive safety practices that respect
    and reflect the values of the Mexican‑American community she serves.
attributes:
  skills: '[''Lean Six Sigma Black Belt'', ''Industrial Process Optimization'', ''Occupational Health and Safety Management'', ''Risk Assessment and Mitigation'', ''Ergonomic Assessment'', ''Data Analysis
    (Python, R)'', ''Regulatory Compliance (OSHA, EPA)'', ''Project Management (PMI)'', ''Technical Writing'', ''Bilingual Communication (Spanish/English)'', ''Cross‑Functional Team Leadership'', ''Safety
    Training Design'', ''Continuous Improvement'', ''Human Factors Engineering'']'
  hobbies: '[''Salsa dancing'', ''Mural walking and art gallery visits'', ''Cooking traditional Mexican cuisine'', ''Hill Country hiking and nature photography'', ''Volunteering at a youth robotics club'',
    ''Yoga and mindfulness meditation'', ''Journaling'', ''Reading speculative fiction'', ''Acoustic guitar playing'', ''Community theater involvement'']'
  career_goals: Elibet aims to become a senior safety director within the next five years, securing Certified Safety Professional (CSP) credential and expanding her influence over corporate safety culture.
    She envisions launching a consultancy that integrates sustainability, safety, and cultural relevance to serve the growing Latinx workforce in Texas. Additionally, she plans to develop a mentorship pipeline
    for Mexican‑American women in STEM, partnering with local universities and industry groups to increase representation and retention.
