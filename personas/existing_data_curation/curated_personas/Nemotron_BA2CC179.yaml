  career_goals: Tristin aims to advance to a senior supervisory or plant‑lead role where she can drive continuous‑improvement initiatives across the facility. She plans to earn the Certified Manufacturing
    Engineer (CMfgE) credential and lead a cross‑functional safety committee. In the longer term she hopes to establish a boutique consulting practice that helps midsized manufacturers optimize their production
    flow and adopt sustainable practices, while also creating a structured apprenticeship program to pass on her expertise to the next generation.
