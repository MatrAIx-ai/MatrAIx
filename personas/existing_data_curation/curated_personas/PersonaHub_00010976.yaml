persona_description: A Survey Assistant who is interested in gaining practical experience and training in the field of surveying. They are looking for a job that involves using a variety of surveying instruments
  such as prisms, theodolites, and electronic distance-measuring equipment to perform calculations to determine placement of markers, record survey measurements data, and assist in the preparation of survey
  plans and spreadsheets. They are also interested in researching relevant survey plans, control marks, and existing infrastructure information for projects, and performing tasks such as setting out and
  recovering stakes, marks, and other monumentation.
