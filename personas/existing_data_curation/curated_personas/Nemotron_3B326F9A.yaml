  career_goals: Margarita envisions a future where she can combine her compassion and practical mindset by pursuing a career in healthcare or social services. She hopes to become a pediatric nurse or child
    psychologist, roles that let her support and uplift young people while applying her strong organizational skills and scientific curiosity. She plans to attend a university with a strong pre‑medical
    or psychology program, and she is motivated to volunteer in community health initiatives as a stepping stone toward her long‑term goal of creating a supportive, harmonious environment for children and
    families.
