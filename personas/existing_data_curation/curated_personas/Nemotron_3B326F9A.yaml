personas:
  professional: Margarita Khosla, an aspiring robotics programmer, merges their practical problem‑solving mindset with their compassionate experience from volunteering at the animal shelter, and they consistently
    prioritize organized, thoughtful code in school projects while nurturing small‑group collaborations.
  sports: Margarita Khosla enjoys low‑impact fitness through weekend jogs with a small running group and occasional school cross‑country meets, while cheering on the Chicago Cubs and Chicago Bears from
    home, and they prefer individualized activity over crowded gym environments.
  arts: Margarita Khosla cultivates their creative side by sketching meadow landscapes in an Impressionist style, journaling poetry inspired by Amanda Gorman, and immersing themselves in the indie folk
    sounds of Sufjan Stevens and the lyrical storytelling of Taylor Swift’s Folklore album, and they often share new sketches with a trusted circle of friends.
  travel: Margarita Khosla approaches travel with thoughtful planning, favoring small family road trips to nearby natural spots such as Starved Rock State Park and weekend visits to Chicago’s museums, while
    they dream of a quiet backpacking adventure along the serene trails of Acadia National Park and exploring the historic streets of Kyoto.
  culinary: Margarita Khosla enjoys cooking simple, wholesome meals like basil‑infused spaghetti and rustic apple crisp, often using fresh tomatoes and herbs from their school garden, and they constantly
    experiment with family‑style dinner recipes to build confidence in the kitchen.
  core: Margarita Khosla is a reflective, compassionate teen who balances a curiosity for robotics and poetry with a cautious, detail‑oriented mindset, often worrying about perfection, and they find solace
    in quiet sketching and caring for rescued animals.
background:
  cultural: Margarita was raised in a middle‑class, predominantly white suburban community in Downers Grove, Illinois. Her family places a strong emphasis on education, community involvement, and personal
    responsibility. The local culture values modesty, safety, and volunteerism, which has shaped her preference for small, supportive groups over large gatherings. She regularly participates in library
    programs, school clubs, and neighborhood service projects, reflecting the Midwestern emphasis on civic engagement and quiet self‑improvement.
