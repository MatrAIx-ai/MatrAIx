personas:
  professional: Sareh Valdez, a seasoned adult learning specialist with ten years of experience designing blended training programs, they blend methodical ADDIE planning with on‑the‑fly flexibility, delivering
    data‑driven curricula in corporate, nonprofit, and community settings while fostering a supportive, harmony‑focused learning environment.
  sports: Sareh Valdez enjoys weekend strolls around the local park, follows the Houston Astros and Dallas Mavericks, and participates in a community gardening fitness group that meets for light cardio
    after sunrise, as they value low‑intensity activity over competitive sports.
  arts: Sareh Valdez immerses themselves in mystery novels by Agatha Christie and historical epics by Ken Follett through a lively book club, while they regularly attend mariachi performances featuring
    Los Tigres del Norte and regional folktale festivals that celebrate traditional storytelling.
  travel: Sareh Valdez prefers thoughtfully planned getaways that combine culinary discovery and cultural immersion, such as weekend trips to San Antonio’s River Walk, a spring visit to Hill Country vineyards,
    and an annual pilgrimage to a centuries‑old folktale festival in Oaxaca, as they balance budget constraints with a love for authentic experiences.
  culinary: Sareh Valdez delights in farm‑to‑table cooking, often turning heirloom tomatoes and poblano peppers from their garden into chiles rellenos and carnitas tacos with a Texas twist, and they regularly
    experiment with corn masa, cilantro, and lime in both traditional and inventive dishes.
  core: Sareh Valdez, a structured yet adaptable training expert, they cultivate heirloom gardens, draft data‑driven learning programs, and spin salsa playlists for friends, all while habitually misplacing
    their gardening gloves and occasionally missing a budget review.
background:
  cultural: Sareh’s Mexican heritage is a core part of her identity, shaping both her personal life and professional perspective. Raised in a bilingual household in Texas, she is fluent in Spanish and English
    and regularly celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas with family traditions like altars, traditional foods, and storytelling. Her close‑knit extended
    family network emphasizes respect for elders, hospitality, and community service, values she carries into her work by fostering inclusive, collaborative learning environments. She actively participates
    in the local Hispanic community center, contributing to cultural events, and mentors younger members to preserve and share Mexican customs within the broader Texan context.
attributes:
  skills: '[''Instructional Design (ADDIE, SAM)'', ''Curriculum Development'', ''Learning Needs Analysis'', ''Training Facilitation'', ''Coaching and Mentoring'', ''Learning Management System Administration
    (Moodle, Cornerstone)'', ''E‑learning Authoring (Articulate Storyline, Captivate)'', ''Evaluation and Metrics (Kirkpatrick Model)'', ''Bilingual Communication (English/Spanish)'', ''Conflict Resolution
    and Stakeholder Management'']'
  hobbies: '[''Gardening'', ''Cooking (Mexican‑Texan fusion)'', ''Reading (Mystery & Historical Fiction)'', ''Book Club'', ''Journaling'', ''Yoga'', ''Volunteering (Adult Literacy)'', ''Attending Cultural
    Festivals'', ''Listening to Regional Mexican Music'']'
  career_goals: Sareh aims to advance from her current specialist role to a senior training manager or director of learning and development within the next five years, where she can shape organization‑wide
    talent development strategies. She aspires to build a scalable, data‑driven training framework that integrates both in‑person workshops and digital modules, allowing flexibility for employees across
    varied schedules. Passionate about community impact, she plans to launch a regional partnership program that offers free leadership and digital skills workshops for small Mexican‑American businesses
    in Jones County. Long‑term, she envisions establishing her own consultancy focused on culturally inclusive learning solutions, while maintaining a balanced lifestyle that preserves time for family and
    personal interests.
