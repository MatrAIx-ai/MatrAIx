persona_description: A conservation biologist who is interested in understanding the relationships between biodiversity, ecosystems services, and conservation. They are particularly interested in the United
  Nations Convention on the Law of the Sea (UNCLOS) and its impact on coastal states and other countries. They are also interested in the specific legal regime established in UNCLOS, which governs the rights
  and jurisdiction of coastal states and the rights and freedoms of other States. They are actively seeking definitions and explanations for key terms related to biodiversity and conservation, and are interested
  in learning more about the impact of the UNCLOS on coastal states and other countries.
