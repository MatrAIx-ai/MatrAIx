personas:
  professional: Heather Beveridge, an aspiring wildlife rehabilitation aide who meticulously organizes their study notes and field observations, channels their love of the lake’s ecosystem into a structured
    path toward becoming a veterinary technician, thriving in quiet, predictable environments where reliability and attention to detail shine.
  sports: Heather Beveridge, a solitary fitness enthusiast, joins the Canyon Lake Trail Club for early‑morning hikes and participates in weekend junior cross‑country meets, while cheering for the San Antonio
    Spurs and the Texas Rangers from the comfort of their living room, favoring steady, low‑impact cardio over team sports.
  arts: Heather Beveridge, a quiet creative soul, captures the Hill Country’s sunrise vistas with a DSLR inspired by Ansel Adams while knitting scarves to folk tunes by Gillian Welch, The Avett Brothers,
    and Bob Dylan, allowing these artistic rituals to balance their structured academic life.
  travel: Heather Beveridge, a methodical planner, prefers solo weekend road trips to nearby state parks like Enchanted Rock and the Big Bend desert, keeping detailed itineraries and checklists, while dreaming
    of an extended trek through the Great Smoky Mountains and the Pacific Northwest’s rain‑soaked forests.
  culinary: Heather Beveridge, a modest home cook, frequently prepares herb‑infused grilled trout with lemon‑basil, hearty chicken bone broth seasoned with rosemary and sage from their garden, and simple
    rosemary biscuits, savoring the fresh flavor of locally sourced herbs and seasonal produce.
  core: Heather Beveridge, a quietly meticulous teen, balances a deep devotion to nature and wildlife with an almost compulsive habit of cataloguing every bird sighting and budgeting every cent for outdoor
    gear, while occasionally losing themselves in a day‑long photo shoot that leaves homework neglected.
background:
  cultural: Heather was born and raised in Canyon Lake, Texas, in a middle‑class white family with deep roots in the local community. Her upbringing reflects typical Texan values of self‑reliance, modesty,
    and respect for the natural environment surrounding the lake. She attended local church services as a child and participates in community events such as the annual county fair, though she prefers quieter
    family gatherings. Growing up in the Hill Country has fostered her appreciation for outdoor recreation and southern hospitality, and she speaks English with a mild Texas accent.
attributes:
  skills: '["Time management","Budgeting","Basic computer skills","Data entry","Pet care","Nature observation","Basic cooking","DIY crafts"]'
