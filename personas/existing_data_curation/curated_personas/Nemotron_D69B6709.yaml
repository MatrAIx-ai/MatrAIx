  career_goals: Heather plans to obtain her GED within the next year, then enroll in a community college program focused on animal health or environmental science. She aims to earn a certification as a
    veterinary technician or wildlife rehabilitation aide, seeking a career that offers a quiet, structured environment where she can care for animals and contribute to conservation efforts. In the longer
    term, she hopes to work in a regional wildlife rescue center or a small animal clinic, and eventually manage her own modest animal‑care operation that emphasizes humane treatment and community education.
