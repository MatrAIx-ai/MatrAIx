persona_description: A grain storage manager who is concerned about maximizing the efficiency and effectiveness of supplemental heating in the bin to prevent crop loss and spoilage, while ensuring the quality
  and value of the grain. They are looking for the best fan size and heater capacity to achieve the desired airflow rate of 1 CFM per bushel, and are willing to invest in research and development to improve
  the understanding of the physics of drying and the economic factors of supplemental heating. They are also interested in learning about the latest technological advancements in grain conditioning and
  natural air drying, and are open to new ideas and solutions to improve their operations.
