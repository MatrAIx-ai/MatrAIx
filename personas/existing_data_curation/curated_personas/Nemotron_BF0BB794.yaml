personas:
  professional: Amado Garciasantiago is an aspiring junior engineer who turns every LEGO set into a miniature construction site, meticulously organizing each brick and drafting tiny blueprints on scrap
    paper; they apply their competitive edge to outdo peers, balancing curiosity about new building techniques with disciplined, goal‑oriented play.
  sports: Amado Garciasantiago is a passionate member of the Mangrove Kickers youth soccer club, sprinting across the neighborhood field after school, and they idolize FC Barcelona’s Lionel Messi, copying
    his dribbling moves; during the cooler months they join a local kids’ basketball league, and they also showcase energetic bomba and reggaeton dance routines at family gatherings, channeling their competitive
    spirit into every play.
  arts: 'Amado Garciasantiago spends afternoons sketching superhero cartoons, drawing inspiration from comic artist Jim Lee and the animated series ''Spider‑Man: Into the Spider‑Verse''; they devour adventure
    picture books by authors like Jeff Kinney, and they eagerly sing along to Disney soundtracks, letting their vivid imagination shape both their art and their storytelling games.'
  travel: Amado Garciasantiago has explored the nearby mangrove reserve at Estuary Park with their parents, marveling at the tangled roots and wildlife, and they have taken a family road trip to the coastal
    town of Coral Bay; they dream of snorkeling the Great Barrier Reef, visiting the Galápagos Islands, and stepping inside the Natural History Museum in London, balancing a love for local nature hikes
    with big‑picture adventure fantasies.
  culinary: Amado Garciasantiago enjoys building their own mini cheese and pepperoni pizzas, loves scooping up mac and cheese with a fork, and drinks banana‑mango smoothies made from fresh fruit; they favor
    sweet treats like chocolate chip pancakes for breakfast, but they have a mischievous habit of sneaking an extra cookie from the jar before dinner, a habit they try to curb with a disciplined snack schedule.
  core: Amado Garciasantiago is a meticulous, competition‑driven six‑year‑old who blends organized LEGO engineering, relentless soccer play, and superhero sketching with a habit of tracking every allowance
    cent and occasional cookie‑theft.
background:
  cultural: Amado grows up in the municipalities of Toa Alta and Toa Baja, where modern life meets strong Puerto Rican traditions. His family celebrates local fiestas patronales, Christmas feasts of lechón
    and arroz con gandules, and the vibrant San Juan parade. He is raised bilingual, hearing both Spanish and English at home, and is immersed in Puerto Rican music genres such as bomba, plena, salsa, and
    reggaeton. The island’s love for sports, especially soccer and baseball, and its emphasis on community and family shape his values of resilience, competitiveness, and social connection.
attributes:
  skills: '["Reading simple sentences", "Basic addition and subtraction", "Following multi‑step instructions", "Organizing toys and school supplies", "Leading group games", "Quick puzzle problem‑solving",
