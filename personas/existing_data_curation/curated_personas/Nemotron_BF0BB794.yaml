  hobbies: '["Playing soccer", "Building LEGO creations", "Drawing superhero cartoons", "Dancing to bomba and reggaeton music", "Reading adventure picture books", "Collecting tropical animal stickers",
    "Exploring mangrove trails", "Playing educational tablet games"]'
  career_goals: Amado dreams of becoming a scientist‑engineer who creates inventions that help his community, while also aspiring to be a professional soccer player for Puerto Rico. He is determined to
    excel in school, win math competitions, and later become a teacher who can inspire other children. His competitive nature and high standards drive his ambition to blend technology, sports, and education
    in a future career that reflects both his curiosity and practical mindset.
