  hobbies: '[''Trivia Nights'', ''Open-mic Comedy'', ''Board Gaming'', ''Strategy Video Games'', ''Cycling'', ''Meditation'', ''Cooking Asian-Fusion Meals'', ''Exploring Food Scene'', ''Volunteer at Cultural
