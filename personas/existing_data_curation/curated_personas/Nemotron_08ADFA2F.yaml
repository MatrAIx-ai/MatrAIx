  career_goals: Baldonado aims to become a senior title examiner within the next three years, earning the Certified Title Examiner credential and overseeing a team of junior abstractors. He aspires to streamline
    the title search process by introducing automated data-validation tools, improving both accuracy and efficiency. In the longer term, he envisions moving into a management role in a real-estate development
    firm or even launching his own boutique title-services company, where he can combine his analytical strengths with his passion for client interaction while maintaining a balanced, flexible work schedule.
