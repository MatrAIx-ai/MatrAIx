  career_goals: Chase aims to advance from bartender to bar manager within the next two years, focusing on creating a welcoming, community-oriented space that emphasizes both classic and innovative drinks.
    He plans to obtain a Certified Mixologist credential and eventually launch his own boutique cocktail lounge that offers a low-key atmosphere for small gatherings and supports local artists. He also
    hopes to mentor younger staff, teaching responsible service and the art of compassionate hospitality.
