    ''Gardening and cooking'']'
  career_goals: Lonnie’s growing fascination with how things work drives him to envision a future as a mechanical engineer or community inventor, someone who creates practical solutions for everyday problems.
    He often talks about designing a better bike or a simple tool to help his grandparents around the farm. While still exploring options, his ambition is to attend a strong high school STEM program and
    eventually study engineering, with the long‑term goal of contributing to his hometown’s infrastructure and renewable energy projects.
