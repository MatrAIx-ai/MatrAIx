personas:
  professional: Lonnie Parker is an aspiring junior wildlife explorer and budding engineer who spends weekends cataloguing shoreline finds, sketching animals, and building detailed LEGO and K’NEX models
    that blend creative design with practical problem‑solving, and they balance group soccer games with quiet, focused study time.
  sports: Lonnie Parker plays forward for the Gladstone Wildcats youth soccer team, idolizes the Brisbane Roar in the A‑League, and spends summers fishing with dad, combining the discipline of team drills
    with the patience of fly‑fishing, and they stay active through weekend hikes along the local shoreline.
  arts: Lonnie Parker fills sketchbooks with detailed animal drawings inspired by the natural world, immerses themselves in the Percy Jackson series by Rick Riordan, and finds calm listening to Imagine
    Dragons and the ambient Minecraft soundtrack by C418, which together shape a creative identity that they nurture through regular practice.
  travel: Lonnie Parker loves spontaneous family road trips to nearby Minto Beach and the rainforest trails of the Gladstone region, but they also dream of snorkeling the Great Barrier Reef and exploring
    the ancient ruins of Machu Picchu, planning each journey with a hand‑drawn map and a checklist of must‑see wildlife spots.
  culinary: Lonnie Parker enjoys helping in the kitchen, mastering simple dishes like spaghetti with marinara, fish tacos seasoned with lime, and grilled cheese sandwiches, favoring fresh basil, cheddar
    cheese, and sweet strawberries as favorite ingredients, and they occasionally sneak extra chocolate chips into cookie dough for a secret indulgence.
  core: Lonnie Parker is a nature‑curious, organized ten‑year‑old who balances LEGO engineering, soccer, and sketching with a practical allowance habit, mild allergy management, and they dream of exploring
    reefs and ancient ruins.
background:
  cultural: Lonnie is raised in a predominantly white, Midwestern community in Gladstone, Delta County, Michigan. The region’s cultural fabric blends traditional American small‑town values—politeness, self‑reliance,
    and a strong sense of community—with remnants of Finnish and Scandinavian heritage that are evident in local festivals, cuisine, and a shared appreciation for the outdoors. His family participates in
    community events like the annual county fair, church gatherings, and local volunteer clean‑up days, instilling in him a respect for hard work and cooperation. Seasonal activities such as snowmobiling
    in winter and fishing in summer shape his connection to the natural environment, reinforcing his practical yet curious outlook.
