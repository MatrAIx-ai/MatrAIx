  career_goals: Lisa aims to move into a supervisory role within the retail environment, such as shift lead or store manager, where she can apply her organizational strengths to improve store efficiency
    and staff morale. She also plans to pursue a part‑time community college course in business administration or bookkeeping to broaden her qualifications. Long‑term, she hopes to achieve a stable managerial
    position that offers a predictable schedule, allowing her to better balance work, family, and personal wellbeing. She is motivated by the desire to create a harmonious workplace and to secure financial
    stability for her family, reducing the anxiety she often feels about job security.
