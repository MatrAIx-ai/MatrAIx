personas:
  professional: Lisa Starnes, a diligent retail associate with expertise in cash handling, POS operations, and inventory management, channels her methodical and organized nature into consistently flawless
    end‑of‑day reconciliations while fostering a calm checkout environment that eases customer concerns.
  sports: Lisa Starnes enjoys leisurely nature walks on the local Appalachian Trail and cheers on the Atlanta Braves while also attending Friday night high school football games in Mount Airy, balancing
    her low‑key fitness routine with community spirit.
  arts: Lisa Starnes immerses herself in historical fiction by Ken Follett and mystery novels by Dorothy L. Sayers, stitches intricate quilts inspired by Appalachian folk patterns, and sings in her Baptist
    church choir, often humming along to gospel classics by the Blind Boys of Alabama during rehearsals.
  travel: Lisa Starnes prefers short, budget‑friendly trips that blend relaxation and familiar comforts, such as weekend retreats to the Blue Ridge Mountains, a nostalgic visit to Savannah’s historic squares,
    and a planned pilgrimage to the Great Smoky Mountains National Park to photograph native wildflowers.
  culinary: Lisa Starnes favors classic Southern comfort dishes like buttermilk fried chicken, collard greens seasoned with garden herbs, and homemade cornbread, often incorporating fresh basil, thyme,
    and mint from her backyard garden into her weekly potluck contributions.
  core: Lisa Starnes is a methodical, community‑oriented retail professional who balances a love for quiet crafts and gardening with a persistent undercurrent of worry that drives both their meticulous
    planning and occasional over‑cautiousness.
background:
  cultural: Lisa grew up in the Appalachian region of northeast Georgia, where community, church, and family are central. The local culture emphasizes hospitality, modesty, and respect for tradition. She
    was raised with Southern customs such as cooking comfort food, attending weekend church services, and participating in community events like county fairs and potlucks. Her white Southern heritage influences
    her polite demeanor, emphasis on courtesy, and appreciation for the slower‑paced, close‑knit community life of Mount Airy. She values self‑reliance, frugality, and the strong work ethic instilled by
    generations of families in the area.
