    "Troubleshooting and problem solving"]'
  hobbies: '["Fishing", "Hiking", "Model tractor building", "Woodworking", "Classic truck restoration", "Gardening", "Reading (science fiction, history)", "Listening to logistics and technology podcasts",
    "DIY home projects", "Nature photography"]'
  career_goals: Roy aims to advance into a supervisory role within the plant’s equipment fleet, such as Equipment Lead or Safety Coordinator, where he can shape maintenance protocols and mentor junior operators.
    He is pursuing certifications in Certified Forklift Operator Trainer and Heavy‑Equipment Operator Technology to deepen his technical knowledge. Long‑term, Roy envisions managing a small regional equipment
    rental business that focuses on eco‑friendly machinery, leveraging his curiosity about electric haul trucks and his methodical approach to operations. He also hopes to contribute to safety‑culture initiatives
    that reduce workplace incidents and improve overall efficiency.
