  career_goals: Delia dreams of a future where she can combine her love for caring with tangible results. She often imagines becoming a veterinarian because she enjoys helping animals and likes the practical,
    hands‑on nature of the work. She also thinks about being a teacher, sharing stories and encouraging curiosity in other children. Ultimately, she hopes to find a career that lets her stay connected to
    her family and cultural roots while providing a stable, supportive environment for her emotions.
