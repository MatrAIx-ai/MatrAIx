personas:
  professional: Delia Ramirez is an aspiring junior game creator who builds simple Scratch games, sketches storyboards for cartoons, and applies a curious yet practical mindset to turn imaginative ideas
    into functional prototypes while they often juggle schoolwork with a relaxed, flexible schedule.
  sports: Delia Ramirez loves playing forward for the Teaneck Tigers youth soccer league, attends weekly practices at the local park, and they cheer for the New York Red Bulls during family outings, blending
    a competitive drive with a relaxed attitude toward winning.
  arts: Delia Ramirez spends after‑school hours drawing cartoon strips inspired by Mo Willems and Dr. Seuss, dances to lively salsa beats at family gatherings, and they enjoy listening to upbeat Latin pop
    songs from chart‑topping singers, letting music and illustration shape their expressive identity.
  travel: Delia Ramirez dreams of exploring the historic streets of Old San Juan in Puerto Rico after frequent visits to Manhattan’s Little Italy festival, loves weekend trips to the nearby Coney Island
    boardwalk, and they hope to one day see the coral reefs of the Caribbean.
  culinary: Delia Ramirez helps simmer arroz con pollo, stir ropa vieja, and fry sweet plantains beside their grandmother, while they also master a peanut butter and jelly sandwich and experiment with mango
    salsa on tacos, reflecting a blend of family flavors and kid‑friendly snacks.
  core: Delia Ramirez is a bright, anxious nine‑year‑old who channels restless emotions into soccer, cartoon sketches, and mindful breathing, while they juggle a love for vibrant family meals and a habit
    of misplacing their favorite crayons.
background:
  cultural: 'Delia is the daughter of Cuban immigrants who settled in Teaneck, New Jersey when she was a toddler. At home, Spanish is spoken alongside English, giving her a bilingual upbringing. Cuban traditions
    are woven into daily life: family meals feature arroz con pollo, ropa vieja, and plantains, and celebrations like Carnaval and Cuban Independence Day bring music, dance, and stories about her heritage.
    The nearby Manhattan Cuban community offers festivals and language classes that keep her connected to her roots, while her American environment influences her love for soccer, school clubs, and local
    friendships.'
