personas:
  professional: Su Zheng is an emerging communications specialist who leverages fluent bilingual abilities, strong public speaking, and eye‑catching social‑media design to orchestrate inclusive campus events,
    thriving on the spontaneous energy of group gatherings while secretly juggling a relaxed approach to deadlines.
  sports: Su Zheng stays active by joining the campus K‑pop dance crew and playing weekly intramural soccer, while cheering on the Chicago Bulls, Cubs, and Fire, balancing high‑energy group workouts with
    a relaxed approach to personal fitness that favors spontaneous game nights over strict gym routines.
  arts: Su Zheng curates a vibrant Instagram feed featuring snapshots from local gallery openings, live shows by indie artist Mitski, K‑pop performances by BTS, and street art by Chicago’s Theaster Gates,
    using photography and graphic design to weave together a multicultural aesthetic that fuels both personal creativity and community storytelling.
  travel: Su Zheng prefers spur‑of‑the‑moment weekend getaways, often snapping photos in Chicago’s Pilsen and Wicker Park before hopping on a budget flight to Seoul or a road trip through the Michigan Upper
    Peninsula, blending a love for urban street art with a curiosity for Asian street food markets while balancing a modest student budget.
  culinary: Su Zheng enjoys crafting modern twists on classic dumplings—like pork‑and‑gochujang bao sliders topped with pickled daikon—and experiments with Sichuan peppercorn‑infused honey glaze on roasted
    chicken, proudly sharing the vibrant plate on TikTok while sprinkling in fresh cilantro, sesame seeds, and a dash of lime for extra flair.
  core: Su Zheng navigates life as a sociable planner who blends structured storytelling with spontaneous creativity, often juggling a packed event calendar while occasionally forgetting to submit assignments
    on time, all while championing harmony and amplifying under‑represented voices.
background:
  cultural: Su Zheng is a second‑generation Chinese‑American raised in a bilingual household in the Chicago area. Her family celebrates traditional festivals such as Lunar New Year and the Mid‑Autumn Festival,
    while also embracing broader American customs. Growing up near Chicago's Chinatown and within a diverse Asian diaspora, Su regularly participates in community events, mentors younger students in cultural
    clubs, and maintains strong ties to both her Chinese heritage and American upbringing. This dual cultural exposure fosters her pride in her heritage, a respect for collective harmony, and an inclusive
    worldview that values multicultural engagement.
