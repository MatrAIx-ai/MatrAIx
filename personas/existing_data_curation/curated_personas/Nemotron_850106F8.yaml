  hobbies: '[''Social media content creation'', ''Attending campus events'', ''Chinese cooking (modern twists)'', ''K‑pop dancing'', ''Photography'', ''Exploring Chicago neighborhoods'', ''Volunteering
    at community centers'', ''Travel planning'', ''Book clubs (contemporary fiction)'', ''Live music and art shows'']'
  career_goals: Su aims to finish a bachelor's degree in communications or marketing while securing internships in public relations or community outreach. She aspires to a career that blends storytelling
    with inclusive community building, ultimately seeking a role as a community engagement manager for a nonprofit or a brand strategist for a culturally diverse company. In the long term, she hopes to
    lead initiatives that amplify Asian‑American voices and develop platforms that empower youth across the Midwest.
