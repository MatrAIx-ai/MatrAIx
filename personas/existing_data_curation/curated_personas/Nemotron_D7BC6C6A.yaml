  career_goals: Christina aspires to turn her love of art into a career as a multimedia illustrator or animator, envisioning a future where she creates comic books, digital art for games, or educational
    videos that blend Peruvian culture with modern storytelling. She hopes to develop a personal online portfolio and eventually study visual arts or graphic design in college. Additionally, she dreams
    of using her bilingual skills to work on multicultural projects, possibly collaborating with museums or cultural organizations to showcase Andean heritage to broader audiences.
