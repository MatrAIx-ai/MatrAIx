personas:
  professional: A budding digital illustrator named Christina Torres channels their curiosity and love for storytelling into vibrant cartoons and simple Scratch games, while they navigate the challenges
    of school deadlines with a spontaneous, free‑flowing workflow.
  sports: Christina Torres darts around the local soccer field with friends on Saturday afternoons, cheers for the Hartford Athletic at the indie stadium, and they join the school’s intramural basketball
    games during winter, balancing their energetic play with a tendency to lose track of homework after a win.
  arts: Christina Torres immerses themselves in visual storytelling, drawing inspiration from the vibrant panels of graphic novels like ’Saga’ and the whimsical animation of ’Adventure Time’, while performing
    in community theater productions and experimenting with watercolor techniques to bring their own cartoon characters to life, and they love sharing the process with friends.
  travel: Christina Torres loves spontaneous weekend hikes along the Naugatuck River Trail, captures nature shots for school projects, dreams of wandering the historic streets of Cartagena in Colombia,
    and they plan to explore the art museums of New York City with friends during a future school trip.
  culinary: Christina Torres eagerly assists in preparing family dishes such as ceviche marinated in lime and aji amarillo and lomo saltado with tender beef and smoky paprika, while also experimenting with
    homemade sushi rolls and herb‑infused lemonade, often adding extra chili for fun, and they love showing off their creations at family gatherings.
  core: Christina Torres is a curious, energetic teen who blends a love for art, soccer, and cultural cooking into a vibrant, slightly disorganized but passionately creative life, and they approach each
    day with an improvisational spark.
background:
  cultural: Christina comes from a Peruvian family that maintains strong ties to its Andean roots while living in Naugatuck, Connecticut. She grew up bilingual, hearing Spanish stories and songs at home,
    and celebrating cultural events like Inti Raymi and Día de la Madre with traditional foods and music. The vibrant colors and patterns of Peruvian textiles inspire her artistic style, and she often incorporates
    motifs from Quechua art into her drawings. Balancing her Peruvian heritage with the multicultural environment of New Haven County, Christina embraces both cultures, sharing her background with classmates
    through school projects and community events.
