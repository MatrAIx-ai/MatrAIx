  career_goals: David aims to guide his company through a comprehensive digital transformation, expand into emerging national and international markets, position the firm as a leader in sustainable practices,
    and build a robust succession pipeline by mentoring high‑potential executives. He also aspires to establish a philanthropic foundation that supports STEM and arts education for underprivileged youth,
    ensuring a lasting legacy that blends business success with community impact.
