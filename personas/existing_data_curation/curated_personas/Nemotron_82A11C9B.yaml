personas:
  professional: Kelly Fleetwood is a retired community organizer and docent who channels decades of event‑planning expertise into launching an intergenerational art mentorship program, balancing meticulous
    budgeting with a flexible, inclusive approach while they constantly worry over every detail to ensure nothing falls through the cracks.
  sports: Kelly Fleetwood participates in the Centerville Trail Walkers walking club, enjoys low‑impact yoga classes at the senior center, cheers on the Iowa Hawkeyes football team, and they occasionally
    volunteer as a mascot at local high school basketball games.
  arts: Kelly Fleetwood is an avid quilter and budding digital photographer who draws inspiration from Grant Wood's regional paintings and Sally Mann's contemporary work, regularly attends the Des Moines
    Art Center’s exhibitions, and they volunteer‑curate community craft fairs.
  travel: Kelly Fleetwood favors weekend road trips to nearby cultural sites such as the Amana Colonies and Lanesboro, Minnesota, dreams of photographing rural festivals in the French countryside, always
    plans itineraries around affordable B&Bs and family visits, and they relish the freedom of the open road.
  culinary: Kelly Fleetwood loves experimenting with farm‑fresh dishes like heirloom tomato bruschetta, maple‑glazed pork chops with sauerkraut, and a seasonal apple‑cinnamon crumble, often sourcing ingredients
    from the local farmers’ market and they share recipes at senior‑center potlucks.
  core: Kelly Fleetwood blends Midwestern modesty with relentless curiosity, juggling community leadership, creative pursuits, and a constant worry about details, and they stay socially active and mindful.
background:
  cultural: Kelly grew up in a Midwestern, white family rooted in the agricultural heartland of Iowa. Her ancestors include German and Scandinavian settlers who valued hard work, community, and modesty.
    Raised in a small town near the rolling prairies, she attended local schools where church, family gatherings, and community events shaped her worldview. The Midwestern ethos of friendliness, cooperation,
    and self‑reliance is evident in her sociable nature and dedication to helping others. Her lifelong exposure to local folk art, county fairs, and the historic preservation movement has fostered a deep
    appreciation for regional culture and heritage.
