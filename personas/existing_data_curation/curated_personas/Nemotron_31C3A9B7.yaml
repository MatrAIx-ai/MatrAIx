  career_goals: Hui aspires to transition into a lead‑operator or training role where she can share her machining expertise while working on a more predictable schedule that reduces physical strain. She
    is interested in obtaining a certified CNC programming credential through a community college to broaden her technical skill set and eventually become a process‑improvement specialist. Simultaneously,
    she hopes to develop a modest side venture creating handcrafted decorative metal art pieces that blend her technical know‑how with her love of art, allowing her to explore creativity without the pressure
    of tight deadlines.
