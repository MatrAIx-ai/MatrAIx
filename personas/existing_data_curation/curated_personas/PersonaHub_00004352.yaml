persona_description: A cardiologist who specializes in the treatment and management of heart attacks, particularly those caused by ST-segment elevation myocardial infarction (STEMI). He has extensive experience
  in the diagnosis, treatment, and management of heart attacks, and is skilled in performing non-invasive diagnostic procedures such as electrocardiograms (EKGs) and angiograms. He is also knowledgeable
  about the latest treatments and techniques for managing heart attacks, including percutaneous coronary intervention (PCI) and clot-busting medications. He is committed to providing the best possible care
  to his patients and is dedicated to improving the outcomes of heart attacks through the latest research and advances in medical technology.
