persona_description: A sports medicine physician who specializes in treating injuries to the great toe joint on artificial surfaces and other sports injuries. He/She has experience in grading and treating
  turf toe injuries, and is knowledgeable in the treatment and management of other sports-related injuries. The physician is likely to have a strong understanding of the biomechanics of sports injuries,
  the importance of proper footwear, and the role of rest, ice, compression, and elevation (RICE) in the treatment of sports injuries. The physician is also likely to be familiar with the latest research
  in sports medicine and the latest treatments for sports injuries.
