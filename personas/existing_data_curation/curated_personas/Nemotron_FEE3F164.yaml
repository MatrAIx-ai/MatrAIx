  hobbies: '[''surfing'', ''beach volleyball'', ''photography'', ''sketching and watercolor painting'', ''visiting art galleries and street murals'', ''live music concerts'', ''cooking fusion cuisine (Vietnamese-Californian)'',
    ''improv comedy workshops'', ''volunteering at community health fairs'', ''reading books on psychology, philosophy, and modern art'']'
  career_goals: Hassane aims to earn a Certified Emergency Nurse (CEN) credential and eventually transition into a nurse manager role where he can shape unit culture and promote innovative patient-centred
    care. He is also pursuing a graduate certificate in Integrative Health to formalize his interest in combining art-therapy with conventional nursing. Over the next five years, he hopes to lead a multidisciplinary
    team that integrates creative interventions for stress reduction, develop community outreach programs targeting underserved Southeast Asian families in Orange County, and eventually open a boutique
    wellness clinic that offers holistic nursing services with flexible hours to accommodate his preference for adaptable work environments.
