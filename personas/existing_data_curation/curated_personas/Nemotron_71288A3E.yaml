  hobbies: '[''School newspaper writing'', ''Drama club performance'', ''Social dancing at community events'', ''Journaling and goal tracking'', ''Reading (young adult fiction & self‑help books)'', ''Organizing
    school events'', ''Participating in church youth group'', ''Basketball (team play)'', ''Crafting (scrapbooking, DIY decorations)'', ''Strategic video games (e.g., Minecraft, puzzle games)'']'
  career_goals: Lashonda aspires to graduate high school with honors and earn a scholarship to study education or public health. She dreams of becoming a community health educator or school counselor, where
    she can combine her organizational talents, love for helping others, and passion for mental‑wellness advocacy. She also hopes to develop programs that teach teens effective stress‑management and study
    strategies, leveraging her own experience with anxiety to support peers. In the long term, she envisions leading community outreach initiatives that empower young people in her hometown.
