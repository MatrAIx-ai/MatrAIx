personas:
  professional: An organized, high‑achieving teen dramatist and journalist, Lashonda Ellis leverages their love for the spotlight and meticulous planning to direct drama club productions, edit the school
    newspaper, and rally their peers around creative projects while meeting the exacting standards they set for themselves.
  sports: Lashonda Ellis plays point guard for the Lucedale High Lady Jaguars basketball team, mentors younger teammates during after‑school practices, follows the NBA’s Memphis Grizzlies for inspiration,
    and balances structured workouts with lively dance sessions at church youth events, where they often take the lead in choreography.
  arts: Lashonda Ellis channels their passion for performance into starring roles in school plays, enjoys listening to gospel legends like Mahalia Jackson and contemporary artists such as Beyoncé, studies
    the works of Lin‑Manuel Miranda, and fills scrapbooks with clippings of favorite YA novels and self‑help books, reflecting a vibrant blend of tradition and modern pop culture that they proudly share
    at community gatherings.
  travel: Lashonda Ellis dreams of swapping hometown road trips to the Gulf Coast with family picnics for a cultural immersion tour of New Orleans during Mardi Gras, has already visited the historic Natchez
    Trace Parkway, and plans to explore Washington, D.C.’s museums once a scholarship fund covers the cost, hoping they can bring back stories to inspire their schoolmates.
  culinary: Lashonda Ellis loves cooking soul‑food staples like fried catfish, collard greens seasoned with smoked turkey, and sweet cornbread, enjoys experimenting with a pinch of cayenne in mac‑and‑cheese,
    and frequents local church potlucks where they savor sweet tea and peach cobbler while swapping recipes with friends.
  core: Lashonda Ellis is a socially vibrant, meticulously organized teen who thrives on the stage and in the newsroom, balances ambition with anxiety, and turns every community gathering into a chance
    to shine, often leaving them buzzing with ideas they can later discuss with classmates.
background:
  cultural: Lashonda is a Black teenager raised in Lucedale, Mississippi, where Southern traditions and African‑American heritage intersect. Her family places great importance on church, gospel music, and
    community gatherings, fostering a strong sense of belonging and resilience. Growing up in a small rural town, she has been exposed to the rich storytelling and musical legacy of the Mississippi Delta,
    which inspires her love for performance and oral expression. Cultural celebrations such as Juneteenth and family cook‑outs reinforce her pride in her roots and her commitment to uplift her community
    through education and service.
