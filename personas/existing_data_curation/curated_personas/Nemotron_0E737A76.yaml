  career_goals: Ray aims to advance into senior design leadership, first as a Creative Director at an innovative agency or tech firm where he can steer multidisciplinary teams and champion culturally resonant,
    sustainable solutions. In the long term, he envisions founding his own boutique studio that fuses Guatemalan artistic heritage with cutting‑edge technology, earning industry awards and influencing the
    next generation of designers. He also seeks to establish a mentorship program for emerging talent, contribute thought‑leadership through speaking engagements, and publish articles on cross‑cultural
    design practice.
