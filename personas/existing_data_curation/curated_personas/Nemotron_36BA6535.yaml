  career_goals: Now retired, Jiten aims to stay active and healthy while giving back to his family and community. He wants to maintain his mobility through daily walks and senior fitness classes, and he
    plans to volunteer regularly at the local senior center and the South Asian cultural association, teaching cooking classes and sharing cultural stories. He hopes to document his family’s history for
    future generations, support his grandchildren’s education through tutoring and financial assistance, and eventually undertake a pilgrimage trip to India to reconnect with his roots and visit his extended
    family.
