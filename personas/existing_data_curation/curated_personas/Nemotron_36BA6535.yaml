personas:
  professional: Jiten Talwar, a retired handyman‑turned-community volunteer, blends hands‑on repair know‑how, meticulous budgeting, and trilingual communication to coordinate senior‑center programs, organize
    temple festivals, and mentor newcomers, reflecting a routine‑driven reliability balanced by an energetic sociability that they bring to every project.
  sports: Jiten Talwar joins the Newark Senior Walking Club for weekly group walks through Branch Brook Park, avidly follows the New York Yankees and New York Giants during their seasons, and occasionally
    bowls in a local senior league, blending gentle exercise with loyal hometown fandom that they cherish.
  arts: Jiten Talwar delights in classic Bollywood films starring Raj Kapoor and Shashi Kapoor, fills evenings with Gurdas Maan’s folk melodies and Surinder Kaur’s timeless vocals, and they leverage their
    role on the temple’s cultural committee to stage live music and dance performances, weaving artistic appreciation into community life.
  travel: Jiten Talwar enjoys thoughtful, planned road trips to New England’s historic towns like Boston and scenic seaside retreats such as Cape Cod, prefers relaxed itineraries that accommodate a senior
    pace, and dreams of a pilgrimage to the Golden Temple in Amritsar and the sacred ghats of Varanasi, aligning modest travel spend with a yearning to reconnect with ancestral roots that they hold dear.
  culinary: Jiten Talwar, an accomplished home cook, specializes in aromatic regional dishes such as buttery dal makhani, tangy sarson da saag with makki di roti, and spicy chicken tikka, often incorporating
    garden‑fresh tomatoes, cilantro, and mustard greens, and they delight in sharing these flavors through weekend cooking workshops for neighbors and grandchildren.
  core: Jiten Talwar, a 69‑year‑old community stalwart, merges a devotion to daily routines and neighborly generosity with an occasional tendency to forget their blood pressure medication and let the garden
    hose run longer than needed, all while sporting a well‑worn gardening hat that’s become their signature.
background:
  cultural: Jiten is of South Asian Indian descent, raised in a Punjabi household that values family cohesion, respect for elders, and religious traditions. He grew up observing Hindu festivals such as
    Diwali and Holi, and he also participates in Sikh community activities at the local gurdwara in Newark. The cultural emphasis on hospitality and community service influences his involvement in neighborhood
    events and volunteer work. Though he has lived many years in the United States, he maintains strong ties to Indian customs, culinary practices, and the language spoken at home, passing these on to his
    children and grandchildren.
