personas:
  professional: Zenaida Garcia, a 20‑year‑old waitress at a bustling downtown Lincoln restaurant, leverages bilingual fluency, POS mastery and a competitive drive to streamline service, mentor new staff,
    and pursue a shift‑leader role while balancing curiosity for hospitality trends with pragmatic efficiency, and they constantly seek ways to blend tradition with modern operational practices.
  sports: Zenaida Garcia, an avid member of the Lincoln Mixed‑Gender Soccer League, devotes Saturdays to competitive matches, cheers for the Nebraska Cornhuskers football team each fall, and joins the Sandhills
    Trail Club for spring and summer hikes, blending their love of team sport with outdoor adventure.
  arts: Zenaida Garcia channels their outgoing energy into salsa nights set to the vibrant rhythms of Lila Downs and Carlos Santana, captures candid food and people moments with a Sony a6400 inspired by
    Annie Leibovitz, avidly follows contemporary fiction from Sally Rooney, and relaxes with indie films starring Leonardo DiCaprio.
  travel: Zenaida Garcia plans travel with a mix of spreadsheets and spontaneous Instagram inspiration, opting for budget‑friendly weekend trips to the Nebraska Sandhills and Colorado Rockies while they
    save diligently for a dream spring pilgrimage to Oaxaca to study regional cuisine, always balancing adventure with the need to fund their future restaurant venture.
  culinary: Zenaida Garcia, a burgeoning home‑chef, perfects traditional tamales and mole while inventing a corn‑meal‑crusted chicken taco drizzled with mezcal‑infused bourbon glaze, sourcing heirloom tomatoes,
    local artisanal cheese, and organic corn from nearby farms, and they share vibrant Instagram photos of chiles, avocados, and farm‑fresh ingredients.
  core: Zenaida Garcia is a sociable, competitively driven 20‑year‑old who fuses their love for salsa, soccer, and experimental Mexican cooking into a fast‑paced, community‑focused lifestyle, balancing
    curiosity with pragmatic ambition while they occasionally splurge on culinary gadgets and neglect routine health appointments.
background:
  cultural: Zenaida is a first‑generation Mexican‑American who grew up in a bilingual household in Nebraska, where Spanish was spoken at home and English at school. Her family maintains strong ties to Mexican
    traditions, celebrating Día de los Muertos, Mexican Independence Day, and preparing regional dishes such as tamales and mole. These cultural practices shape her identity and inform her love for food
    and community. At the same time, she has embraced Midwestern values of independence, punctuality, and community involvement, blending her heritage with the local culture of Lincoln and Lancaster County.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Cash handling'', ''POS system operation'', ''Food safety and sanitation'', ''Time management'', ''Conflict resolution'',
    ''Team coordination'', ''Menu knowledge (including dietary restrictions)'', ''Basic barista skills'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Salsa dancing'', ''Hiking local trails'', ''Food photography'', ''Soccer'', ''Reading contemporary fiction'', ''Volunteering at cultural festivals'',
    ''Exploring food podcasts'']'
  career_goals: Zenaida aims to advance within the hospitality industry by first taking on supervisory responsibilities, such as shift leader and eventually restaurant manager. She plans to enroll in a
    community‑college program in hospitality management to deepen her knowledge of operations, finance, and staff development. Over the longer term, she dreams of opening a fusion eatery that blends contemporary
    Mexican flavors with Midwestern farm‑to‑table ingredients, providing a space that celebrates her heritage while supporting local producers. She also hopes to travel to Mexico to study regional cuisines
    and bring those techniques back to her own restaurant concept.
