persona_description: A pathologist who specializes in the evaluation of sudden cardiac death and is familiar with the use of next-generation sequencing in the assessment of familial causes of SCD. They
  have a keen interest in molecular autopsy and the investigation of heritable causes of SCD, and are skilled in using family assessment, molecular assessment, and a combined approach to identify heritable
  causes. They are also experienced in clinical genetic testing for inherited arrhythmia conditions and have a background in the study of sudden death and its investigation.
