persona_description: A Chinese scientist and inventor who specializes in the study of astronomy and the development of advanced telescopes. They have designed the first antimatter telescope and are working
  on the world's largest radio telescope, the Five-hundred-meter Aperture Spherical Telescope (FAST), which will be able to detect radio signals and potentially, signs of life from tens of billions of light
  years away. They are also involved in the development of the Sky Eye 1, a supercomputer that will support the capacity of the FAST telescope and process the enormous amount of data collected by it.
