  career_goals: Although retired from formal employment, Debbie aims to remain a pillar of her local community by expanding her volunteer leadership at the senior center and the regional food bank. She
    aspires to mentor younger entrepreneurs through a neighborhood business incubator, share her lifelong lessons in a series of informal workshops, and document family histories in a memoir that preserves
    her heritage for future generations.
