persona_description: A space engineer with expertise in rocket propulsion and launch vehicle design, particularly in the development and successful launches of the Indian Space Research Organization's (ISRO)
  Polar Satellite Launch Vehicle (PSLV) and the GSLV rocket. This persona has a deep understanding of the technical challenges and intricacies involved in launching heavy satellites into geostationary orbit,
  including the use of cryogenic engines and the development of associated thermal and structural problems. This person is passionate about the importance of India's space programme and its role in the
  country's technological and economic growth, and is dedicated to proving India's technological competence with the production of a reliable cryogenic engine.
