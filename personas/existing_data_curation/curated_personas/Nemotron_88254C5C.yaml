  hobbies: '[''Art gallery visits'', ''Museum docent volunteering'', ''Watercolor painting'', ''Digital illustration'', ''Botanical sketching'', ''Gardening'', ''Birdwatching'', ''Walking/hiking'', ''Science
    and philosophy book clubs'', ''Community theater attendance'']'
  career_goals: Although retired, Sarah aims to channel her expertise into purposeful volunteer leadership and continued learning. She aspires to co‑lead a community science‑arts outreach program at the
    University of North Carolina, mentor high‑school and undergraduate students in research methods, and author a popular‑science book that pairs narrative storytelling with visual art to make scientific
    ideas approachable. She also hopes to develop a support network for widowed seniors in Chapel Hill, using her empathy and advocacy skills to promote mental‑health resilience and social connection.
