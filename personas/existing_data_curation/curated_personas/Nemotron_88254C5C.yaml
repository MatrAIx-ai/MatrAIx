personas:
  professional: Sarah Brown, a retired research scientist turned community science‑arts coordinator, blends her data‑analysis expertise with her love for watercolor to design interdisciplinary workshops
    at UNC, and they delight in mentoring students by turning complex datasets into vivid visual narratives.
  sports: Sarah Brown enjoys low‑impact cardio by walking the UNC arboretum trails and the Carruth Street Greenway, participates in a senior tennis club on Saturday mornings, and follows the UNC Tar Heels
    men’s basketball team with fervor, cheering from the patio while they sip chamomile tea during March Madness.
  arts: Sarah Brown frequently leads informal tours at the Ackland Art Museum that link scientific concepts to works by Georgia O'Keeffe and contemporary digital artists, creates delicate watercolor paintings
    of native wildflowers, and draws inspiration from Maya Angelou’s poetry, which they often quote during book‑club discussions.
  travel: Sarah Brown prefers relaxed, culturally rich itineraries, having recently driven the Blue Ridge Parkway to explore historic Asheville, revisited the Smithsonian museums in Washington, D.C., and
    dreamed of a summer study tour of Kyoto’s botanical gardens, all while they meticulously plan each trip to balance curiosity with budget constraints.
  culinary: Sarah Brown enjoys cooking farm‑to‑table meals, favoring shrimp and grits seasoned with fresh garden herbs, a crisp Greek salad with feta and Kalamata olives, and a Sunday roast of rosemary‑infused
    chicken, while they occasionally indulge in specialty tea blends and splurge on premium watercolor supplies for a creative weekend.
  core: Sarah Brown is a curious, art‑loving retiree who merges scientific rigor with creative expression, balances meticulous budgeting with spontaneous art‑supply splurges, and navigates community service
    while they manage bouts of anxiety.
background:
  cultural: Sarah grew up in a mid‑Atlantic white working‑middle‑class family during the post‑World War II era, experiencing the expansion of public higher education and the early computer revolution. Her
    upbringing emphasized diligence, self‑improvement, and civic responsibility. Relocating to Chapel Hill in the 1970s, she embraced the town’s academic, progressive atmosphere while retaining elements
    of Southern hospitality and community spirit. Her cultural identity blends traditional American values of independence and perseverance with the inclusive, liberal ethos of a university town, shaping
    her collaborative approach, appreciation for diverse ideas, and commitment to fostering harmony in social settings.
