  hobbies: '["Visiting art galleries and museums", "Painting and sketching", "Reading historical fiction and biographies", "Traveling to cultural destinations", "Gardening", "Cooking and hosting dinner
    parties", "Playing bridge and participating in trivia nights", "Genealogy and local history research", "Volunteering at the historical society", "Attending community theater productions"]'
  career_goals: Although retired, Patricia aims to remain a vibrant cultural catalyst in Freeport. She plans to launch an intergenerational art program that pairs seniors with local high‑school students,
    securing a small grant to fund workshops and a traveling exhibition of senior artwork. She also hopes to compile an oral‑history memoir of longtime residents, publishing it as a community book. Additionally,
    she aspires to travel to at least three major U.S. art museums each year, using her flexible schedule to explore new artistic movements and bring fresh ideas back to her hometown. Finally, she wishes
    to mentor younger volunteers in event planning and public speaking, ensuring her skills are passed on.
