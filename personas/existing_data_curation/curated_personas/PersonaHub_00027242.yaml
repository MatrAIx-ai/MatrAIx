persona_description: A scientist and inventor who has developed a new technology for 3-D cell culture, specifically a dish that allows cells to self-assemble and form microtissues. This technology has the
  potential to improve biomedical research and has been described in the journal Tissue Engineering. The technology has been created with a team of students, including Anthony Napolitano, who has won a
  $15,000 award from the National Collegiate Inventors and Innovators Alliance to develop the patent-pending technology into a commercially viable product. The technology tackles a topic of increasing interest
  to scientists, specifically creating hothouse cells that look and behave more like cells grown in the human body.
