  hobbies: '[''Visiting art galleries and museums'', ''Watercolour painting'', ''Photography'', ''Gardening (vegetables and herbs)'', ''Book club'', ''Traveling'', ''Cooking'', ''Volunteer tax assistance'',
    ''Community theatre'', ''Trivia nights'']'
  career_goals: Montesa aspires to advance into a senior audit manager or partner role at a regional accounting firm, where she can lead a multidisciplinary team and shape strategic audit methodologies.
    She is particularly interested in developing expertise in forensic accounting and sustainable finance, aiming to help organizations integrate environmental, social, and governance (ESG) considerations
    into their reporting. Long‑term, she envisions transitioning to a CFO position within a nonprofit arts organization, blending her financial acumen with her passion for the arts. Throughout her career
    progression, she remains committed to mentoring younger women in the accounting profession and championing inclusive workplace practices.
