  career_goals: Looking ahead, Dana aspires to a career that blends her love for helping others with her systematic approach. She dreams of becoming a teacher or a pediatric nurse, roles that allow her
    to support children’s growth while applying her organizational talent. In the shorter term, she aims to lead her school’s student council and continue volunteering at community centers, building the
    experience needed for a future in education or healthcare.
