  career_goals: Although retired from formal employment, Dimple seeks to stay engaged by mentoring younger retirees on budgeting and volunteer involvement, and by offering occasional consulting to local
    non-profits on event planning. She also aspires to complete a memoir that captures her mid-century upbringing and her journey to Florida, and hopes to travel to at least three historic coastal towns
    in the Gulf of Mexico over the next five years. A personal goal is to win a regional senior bridge tournament, reflecting her competitive spirit.
