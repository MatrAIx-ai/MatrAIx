personas:
  professional: Lydia Dickinson is a licensed journeyperson electrician with fifteen years of experience in residential, commercial, and light‑industrial wiring, who blends meticulous code compliance with
    an artistic flair for lighting design, leveraging their curiosity and flexible workflow to create sustainable, aesthetically driven installations while mentoring apprentices, especially women, despite
    a tendency toward relaxed planning.
  sports: Lydia Dickinson fuels her love of the outdoors by hiking the North Shore trails with the Twin Cities Hiking Club, occasionally joining a community weekend kayak crew on Lake Minnetonka, rooting
    for the Minnesota Vikings and Twins during football and baseball seasons, and squeezing in a weekly 5K run with a local women's running group, balancing a laid‑back attitude toward scheduling with a
    genuine enthusiasm for staying active, even though they sometimes let their jogging schedule drift.
  arts: Lydia Dickinson channels their artistic curiosity into watercolor landscapes of the Chain of Lakes, curates photographic exhibits for the St. Paul Arts & Heritage Gallery, volunteers lighting design
    for the local community theater, and finds solace at indie folk shows headlined by Bon Iver, The Head and the Heart, and First Aid Kit, while drawing inspiration from the works of Monet and contemporary
    Minnesota painter Jane Hallowell.
  travel: Lydia Dickinson prefers thoughtfully planned yet spontaneous getaways, often road‑tripping to Door County’s cherry orchards, exploring the rugged coast of Lake Superior’s North Shore, dreaming
    of an eco‑tour of Iceland’s geothermal spas, and budgeting their boutique‑firm savings to fund a future family vacation to Costa Rica’s rainforests, all while balancing a desire for both adventure and
    relaxation.
  culinary: Lydia Dickinson enjoys farm‑to‑table meals, often cooking roasted beet and goat cheese salad, pan‑seared Lake Superior salmon with dill, and spiced carrot soup using vegetables from their modest
    garden, while their modest culinary skill shines in perfecting cinnamon‑rolls with cardamom and savoring Minnesota’s iconic wild rice casserole at local diners.
  core: At 42, Lydia Dickinson blends a practical electrician’s precision with an artist’s imagination, juggling a passion for sustainable lighting, an anxious mind that seeks calm through yoga, and a relaxed
    approach to planning that makes them both a reliable mentor and an unpredictably spontaneous friend.
background:
  cultural: Lydia grew up in a middle‑class, white Midwestern family in the Twin Cities suburbs, raised in a Lutheran environment with strong Scandinavian cultural influences that value community, modesty,
    and self‑reliance. The region’s emphasis on hard work and its supportive network for trades shaped her early career choice, while the vibrant local arts scene nurtured her curiosity about creative expression.
    She identifies with the progressive yet grounded social outlook of Dakota County, blending traditional Midwestern values—like punctuality and neighborly responsibility—with an openness to unconventional
    ideas and a deep appreciation for the diverse artistic experiences she encounters.
attributes:
