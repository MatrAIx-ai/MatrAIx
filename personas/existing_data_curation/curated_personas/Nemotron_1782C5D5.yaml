  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Mexican cuisine'', ''Volunteering at community garden'', ''Organizing neighborhood festivals'', ''Playing volleyball in a local league'', ''Reading contemporary
    fiction'', ''Travel blogging and photography'', ''Learning new languages'']'
  career_goals: Celia aims to complete her associate degree in Business Administration or Communications and transition into a role where she can leverage her bilingual abilities and community‑focused mindset.
    She envisions working as a Community Outreach Coordinator for a non‑profit organization serving Latino families in the Chicago area, or as a Marketing Specialist for a culturally oriented small business.
    Her long‑term ambition is to manage or launch a community‑center‑based initiative that provides job‑training, Spanish language classes, and cultural events, thereby strengthening the local Mexican‑American
    community. She also hopes to develop leadership skills that will enable her to supervise teams, influence program development, and eventually hold a senior management position.
