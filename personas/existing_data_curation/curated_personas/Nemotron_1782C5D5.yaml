personas:
  professional: Celia Barba thrives as a bilingual community outreach specialist, blending strong customer‑service instincts with creative event planning and basic graphic design to energize local non‑profits
    and small businesses, and they bring a contagious enthusiasm to every project.
  sports: Celia Barba plays competitive volleyball with the Northside Community Volleyball Club, roots for the Chicago Bulls and the Chicago White Sox, and fits in morning jogs along the Lakefront Trail,
    making fitness a social ritual, and they enjoy the camaraderie of team sports.
  arts: Celia Barba delights in salsa and cumbia dancing to the beats of Marc Antonio and Victor Manuelle, attends the Chicago Dance Festival to admire choreographer Gianna Moss, and reads contemporary
    fiction by Sally Rooney and Colson Whitehead, weaving artistic passion into daily life, and they often share their discoveries on social media.
  travel: Celia Barba curates travel plans on a spreadsheet, loves snapping street photos in Barcelona, dreams of exploring the markets of Marrakech and the coastal towns of Oaxaca, and often chooses budget
    airlines and Airbnb stays to stretch her modest travel fund, and they pack a compact camera for every adventure.
  culinary: Celia Barba masters tamales, mole, and ceviche in her home kitchen, experiments with chipotle, dried chilies, and fresh cilantro, and enjoys the occasional brunch of avocado toast with poached
    eggs, balancing bold flavors with comfort food, and they cherish cooking as a way to stay connected to their roots.
  core: Celia Barba is a sociable, curiosity‑driven 24‑year‑old who blends organized practicality with vibrant community spirit, occasionally indulging in impulsive dance shoe splurges and forgetting dentist
    appointments, and they inspire peers with their relentless optimism.
background:
  cultural: Celia grew up in a Mexican‑American household in Cicero, Illinois, where Spanish was spoken at home and English at school. Her family maintains many Mexican traditions, celebrating Día de los
    Muertos, Las Posadas, and quinceañera milestones, while also participating in the broader Midwestern community’s holidays and events. This bicultural environment has given her a strong sense of familismo
    and community solidarity, as well as an appreciation for the culinary, musical, and artistic heritage of Mexico. She frequently attends cultural festivals organized by local Mexican community organizations,
    which reinforce her identity and inspire her commitment to serve her community.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Customer service'', ''Event planning and coordination'', ''Community outreach'', ''Social media content creation'', ''Basic bookkeeping'', ''Conflict
