  career_goals: Paul aims to become a senior lead assembler, supervising a small team and driving safety and efficiency initiatives at his plant. He plans to obtain advanced welding certifications, mentor
    younger workers, and eventually transition to part‑time consulting or a custom metal‑work side business to secure his family's financial future while maintaining a balanced, low‑stress lifestyle.
