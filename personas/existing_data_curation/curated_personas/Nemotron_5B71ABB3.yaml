  hobbies: '["Cooking Puerto Rican dishes", "Gardening", "Crocheting and knitting", "Listening to salsa, bomba, and plena music", "Attending church services and festivals", "Playing dominoes", "Beach walks",
    "Genealogy research", "Reading local newspapers"]'
  career_goals: Although retired from formal employment, Nilsa aims to expand her impact in the community by taking on a leadership role at the local senior center, where she can develop new programs that
    promote health and social engagement for older adults. She also aspires to mentor younger women in practical skills like budgeting and cooking, and to launch a small home‑based business selling her
    crocheted items, preserving cultural crafts while providing supplemental income. Maintaining her health and staying active in family life remain central to her personal ambitions.
