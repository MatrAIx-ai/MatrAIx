  career_goals: Andres aims to expand his solo practice into a multidisciplinary wellness hub that combines massage therapy, art‑based relaxation sessions, and community workshops on stress reduction. Over
    the next five years, he plans to obtain advanced certification in neuromuscular therapy and become a certified instructor, allowing him to teach aspiring therapists. He aspires to increase his client
    base by 30% by leveraging his bilingual abilities and cultural connections within the Cuban community, and to be recognized as a top‑rated practitioner on local health platforms. His competitive nature
    drives him to win regional "Therapist of the Year" accolades. Additionally, he hopes to author a guidebook on integrating Cuban rhythms and movement into therapeutic practices, merging his cultural
    passion with his professional expertise.
