  hobbies: '[''Acoustic guitar practice'', ''Hiking and sketching in nature'', ''Reading graphic novels'', ''Playing strategy board games'', ''Street photography'', ''Coffee brewing experiments'', ''Collecting
    vintage postcards'', ''Attending local art events'']'
  career_goals: Vaughn’s primary ambition is to build a sustainable freelance practice that balances creative freedom with reliable income. Over the next three years he aims to secure a steady stream of
    local commissions—branding, illustration, and public‑art projects—while establishing a modest studio space in Harrisburg where he can work and host small exhibitions. He plans to supplement his earnings
    by teaching regular beginner art classes at the community center, developing a concise curriculum that reflects his organized teaching style. Long‑term, Vaughn hopes to collaborate on a community mural
    program that revitalizes underused neighborhoods, leveraging his project‑management skills to coordinate artists, sponsors, and city officials. He also intends to complete a professional portfolio that
    meets the standards of regional galleries, positioning himself for occasional solo shows.
