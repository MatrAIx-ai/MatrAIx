personas:
  professional: Vaughn Howard, a 24‑year‑old freelance illustrator and budding UI designer, blends meticulous project‑management habits with a calm, organized teaching style to deliver polished branding,
    print, and digital artwork for Harrisburg’s local businesses while mentoring beginner artists in community workshops.
  sports: Vaughn Howard is a regular participant in the Wildwood Park hiking club, enjoys weekend treks that double as sketching expeditions, and casually roots for the Harrisburg Senators baseball team
    while keeping an eye on the Philadelphia Eagles during football season.
  arts: Vaughn Howard blends his love of acoustic guitar practice—often covering Nick Drake’s fingerpicking patterns—with a deep appreciation for graphic novels by Alan Moore and Marjane Satrapi, while
    his street photography in Harrisburg channels the aesthetic of Vivian Maier, and his vintage postcard collection reflects a meticulous archival passion.
  travel: Vaughn Howard’s travel style balances budget‑friendly road trips to nearby nature spots like the Pocono Mountains with occasional weekend visits to New York City galleries, favoring meticulously
    planned routes that include sketch‑stopovers at historic towns and a favorite desire to someday explore the murals of Lisbon.
  culinary: Vaughn Howard treats coffee brewing like an experiment, perfecting pour‑over with Ethiopian Yirgacheffe beans and tasting notes of citrus, while his home cooking revolves around quick, balanced
    meals like quinoa bowls with roasted sweet potatoes, kale, and a dollop of tahini, and he never turns down a well‑made chicken parmesan at his favorite Harrisburg bistro.
  core: Vaughn Howard is a methodical young creator who harmonizes structured art practice, disciplined finances, and a love for solitary yet occasionally social pursuits, all while juggling the quirks
    of a coffee‑obsessed experimentalist and a postcard collector with a penchant for order.
background:
  cultural: Vaughn grew up in a middle‑class suburb of Harrisburg, Pennsylvania, in a family with German‑Irish roots common to the region. His upbringing was shaped by the practical, community‑oriented
    values of the mid‑Atlantic’s small‑town culture, including a strong work ethic, modesty, and a respect for local traditions. Family gatherings often featured Pennsylvania Dutch dishes such as pretzels,
    sauerkraut, and scrapple, and holidays were marked by church attendance at a Methodist congregation and participation in community fairs. The vibrant street‑art scene of Harrisburg, supported by municipal
    murals and local galleries, provided early exposure to public‑art projects, reinforcing his belief in art as a tool for community cohesion. This blend of Mid‑Atlantic heritage and a supportive local
    arts environment informs Vaughn’s cooperative nature and his desire to contribute positively to his hometown.
attributes:
  skills: '[''Traditional drawing (pencil, charcoal, ink)'', ''Digital illustration (Adobe Photoshop, Illustrator, Procreate)'', ''Graphic design for print material (flyers, posters)'', ''Basic UI layout
