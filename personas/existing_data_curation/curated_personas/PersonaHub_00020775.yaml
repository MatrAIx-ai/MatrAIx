persona_description: A representative from an international teacher organization who is passionate about promoting quality education and advocating for the rights of teachers. They are concerned about the
  slow progress in implementing the SDGs, particularly SDG 4, and are calling for more attention and action to address the issues facing teachers and public education. They are also advocating for bilingual
  and multilingual education to ensure that all children have access to a quality education in their native language. They are aware of the importance of respecting and preserving linguistic diversity and
  are calling for greater recognition of the cultural and social context in which children learn. They are also concerned about the impact of globalization and the loss of cultural traditions and languages,
  and are advocating for the importance of preserving and promoting multilingual education.
