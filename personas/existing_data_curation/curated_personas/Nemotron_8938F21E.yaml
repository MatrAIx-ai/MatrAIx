    and community workshop facilitation'', ''Basic conversational Spanish'']'
  hobbies: '[''Visiting art museums and galleries'', ''Reading biographies of artists, scientists, and innovators'', ''Playing chess at the senior center'', ''Digital photography and photo editing'', ''Maintaining
    a garden with native Texas plants'', ''Birdwatching in the Texas Hill Country'', ''Writing memoir excerpts and short stories'', ''Volunteering as a docent at the San Antonio Museum of Art'', ''Practicing
    calligraphy'', ''Collecting vintage postcards and historical ephemera'']'
  career_goals: Even in retirement, William is driven to leave a lasting intellectual and cultural imprint. His primary ambition is to complete a memoir that weaves together personal narratives with broader
    historical moments of 20th‑century America, particularly focusing on Texas. He also aspires to curate a traveling exhibition of senior artists' works, leveraging his art expertise and organizational
    skills. William seeks to establish a small digital archive of historically significant photographs of the San Antonio region, inviting contributions from community members. He hopes to mentor a group
    of younger hobbyist woodworkers through weekend workshops, passing on his craftsmanship. Finally, his competitive streak fuels the goal of winning the Texas Senior Chess Championship within the next
    two years.
