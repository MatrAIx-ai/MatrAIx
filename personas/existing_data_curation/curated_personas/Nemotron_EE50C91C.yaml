personas:
  professional: Angela Arcila is a retired education graduate who now volunteers as a bilingual curriculum consultant for senior centers, leveraging their evidence‑based, improvisational teaching style
    and critical eye to craft flexible, culturally responsive programs while shunning rigid planning.
  sports: Angela Arcila enjoys spontaneous walks through Oakland neighborhoods, participates in a weekly senior pickleball league at the East Bay Community Center, attends occasional yoga classes tailored
    for seniors at the Berkeley YMCA, and follows the Golden State Warriors (NBA) and the San Jose Earthquakes (MLS) as their favorite professional teams.
  arts: Angela Arcila immerses themselves in the arts by annotating Miguel Ángel Asturias’s novels, admiring Frida Kahlo’s paintings, listening to Leonard Cohen’s ballads and Celia Cruz’s salsa classics,
    and occasionally attending the Oakland Symphony’s chamber concerts, all of which nourish their reflective yet critical mindset.
  travel: Angela Arcila prefers low‑key, self‑planned trips that balance cultural curiosity with comfort, having explored the historic streets of Granada, Spain, a weekend retreat in Napa Valley, and a
    guided tour of Mexico City’s markets, while aspiring to visit the coastal town of Cartagena, Colombia for its vibrant food scene.
  culinary: Angela Arcila cultivates cilantro, chilies, and basil in their modest herb garden and uses them to prepare family recipes such as pepian, tamales, and a spicy chile verde soup, while also mastering
    pesto pasta with fresh basil and occasionally crafting guacamole with ripe avocados and jalapeños.
  core: Angela Arcila blends a sharp, skeptical intellect with a love for solitary puzzles, herb gardening, and improvisational teaching, balancing frugality with occasional indulgences, yet often lets
    their spontaneous nature undermine strict organization.
background:
  cultural: 'Angela was born in a small town near Antigua, Guatemala, in a family that spoke Spanish and preserved Mayan weaving traditions. Early memories of communal festivals, the rhythmic beats of marimba,
    and the aroma of slow‑cooked chilate still shape her worldview. She immigrated to the Bay Area in the late 1960s, bringing with her a deep respect for family, storytelling, and Catholic rituals. In
    Oakland, she blended her Guatemalan roots with the multicultural vibe of the city, participating in local diaspora gatherings and teaching Spanish to children of immigrants. Her cultural identity informs
    her educational philosophy: she emphasizes respect for learners’ heritage, the value of oral tradition, and the practical application of knowledge in everyday life.'
attributes:
  skills: '[''Curriculum Development'', ''Bilingual Instruction (Spanish-English)'', ''Adult Literacy Teaching'', ''Improvisational Teaching'', ''Community Needs Assessment'', ''Program Evaluation'', ''Educational
