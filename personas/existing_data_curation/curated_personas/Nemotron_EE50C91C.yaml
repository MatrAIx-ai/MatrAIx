  hobbies: '[''Herb Gardening'', ''Traditional Guatemalan Cooking'', ''Reading Guatemalan Literature'', ''Educational Research'', ''Crocheting'', ''Puzzle Solving (Sudoku, Chess)'', ''Spontaneous Walking'',
    ''Volunteering as Spanish Tutor'']'
  career_goals: Although retired from formal employment, Angela is driven to stay intellectually active and to make a tangible impact on her community. She seeks voluntary consultancy roles where she can
    shape bilingual curricula for local nonprofits and senior centers, preferring projects that allow her to work in small, focused groups. Angela hopes to author a bilingual guide that blends Guatemalan
    folk stories with practical life‑skill lessons, preserving her heritage while offering a unique educational resource. She also aspires to mentor emerging teachers, sharing her critical, evidence‑based
    approach, and to establish a modest scholarship for Guatemalan‑American students pursuing education degrees. Her ambitions are framed by a desire for personal fulfillment rather than external recognition,
    and she values opportunities that let her work flexibly and on her own terms.
