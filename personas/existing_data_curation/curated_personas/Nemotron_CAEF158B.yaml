  hobbies: '[''Vietnamese cooking'', ''Herb and flower gardening'', ''Tai chi practice'', ''Reading historical fiction'', ''Volunteering at the Vietnamese cultural center'', ''Walking along the Charles
    River'', ''Watercolor painting'', ''Listening to jazz music'']'
  career_goals: Hien aims to transform her seasoned experience into a boutique agency that specializes in serving Southeast Asian immigrants and senior home‑buyers in Middlesex County. She plans to earn
    the Certified Residential Specialist (CRS) designation, mentor a small team of junior agents, and launch community workshops that demystify the home‑buying process for her cultural community. Ultimately,
    she hopes to write a guidebook on culturally sensitive real‑estate practices while maintaining a flexible, part‑time schedule that balances work with personal well‑being.
