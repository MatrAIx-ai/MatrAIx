  career_goals: Manish aims to transition from day-to-day advisory work to legacy-building initiatives. He plans to launch a series of free financial-literacy workshops for senior citizens and recent immigrants
    in Fort Lauderdale, focusing on practical wealth preservation and intergenerational wealth transfer. He seeks to mentor a cohort of junior advisors, sharing his methodical planning approach and compassionate
    client service philosophy. He also intends to author a guidebook on ethical wealth management and establish a charitable trust that funds scholarships for South Asian students pursuing STEM degrees.
