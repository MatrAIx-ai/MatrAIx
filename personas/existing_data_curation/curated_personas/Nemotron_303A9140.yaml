  career_goals: Albert aims to transition from full‑time driving to a mentorship and training role within the next few years, helping new drivers develop safe practices and customer service skills. He hopes
    to eventually establish a small consulting service that assists local businesses with logistics and fleet management, allowing him to stay connected to his industry while reducing time on the road.
    Additionally, he aspires to be recognized in his community for his contributions to driver safety initiatives and local charitable efforts before retirement.
