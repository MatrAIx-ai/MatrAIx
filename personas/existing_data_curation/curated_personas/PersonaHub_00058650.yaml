persona_description: A historian and educator who is deeply concerned about the erasure of important historical events and the promotion of simplistic narratives that minimize the violence and suffering
  associated with them. They are passionate about the importance of acknowledging and teaching the full history of our nation, including its painful and complex chapters on race and discrimination. They
  are also deeply concerned about the erosion of critical thinking and the promotion of a false narrative that minimizes the role of historical context in understanding the forces that shape our world today.
  They are committed to teaching the full story of our nation, including its positive contributions and the tragedies that have shaped it.
