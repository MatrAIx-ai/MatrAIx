personas:
  professional: Katy Trompeter, a budding preschool explorer, channels boundless curiosity and an innate sense of organization into leading imaginative group play while remaining flexible enough to adapt
    storylines on the fly, delighting classmates and assisting teachers alike.
  sports: Katy Trompeter, a lively member of the preschool soccer tumble group, enjoys kicking balls during free‑play at the community park, participates eagerly in Tuesday kindergarten gymnastics, and
    proudly wears a small T‑shirt of the hometown baseball team, the Tigers, cheering loudly during family games.
  arts: Katy Trompeter, an eager junior artist, spends afternoons drawing bright crayon pictures inspired by Eric Carle's collage style and humming along to children’s musician Raffi’s 'Baby Beluga', often
    inviting friends to join in collaborative mural projects.
  travel: Katy Trompeter, who thrills at family road trips to the seaside town of Coral Bay and weekend visits to Grandma’s farm, prefers short, well‑planned journeys with familiar routines, yet squeals
    with excitement when a future adventure to Disneyland is mentioned.
  culinary: Katy Trompeter, a picky yet increasingly adventurous eater, loves buttery macaroni and cheese, crunchy carrot sticks, and strawberry‑topped yogurt, sometimes helps stir batter for banana pancakes
    while scattering flour everywhere, and insists on arranging food on the plate in a rainbow pattern.
  core: Katy Trompeter, a four‑year‑old whose curious mind blends organized play with spontaneous creativity, cherishes sharing and group fun, yet occasionally hides socks to keep them for herself.
background:
  cultural: Katy is raised in a white, Anglo‑American family in the suburban community of Cypress, Texas. Her family participates in local traditions such as Fourth of July parades, community picnics, and
    church gatherings, and they value a blend of Texas hospitality and suburban life. The multicultural atmosphere of the greater Houston area provides occasional exposure to diverse foods, music, and cultural
    festivals, enriching her appreciation for varied experiences while her immediate environment reflects typical middle‑class Texan values of friendliness, community involvement, and respect for nature.
attributes:
  skills: '[''color recognition and naming'', ''basic drawing and scribbling'', ''watercolor experimentation'', ''following simple routines'', ''flexible adaptation to new activities'', ''storytelling with
    picture books'', ''singing nursery rhymes'', ''cooperative play and turn-taking'', ''basic counting up to ten'', ''simple puzzle solving'', ''building with blocks'', ''empathy and comforting peers'']'
  hobbies: '[''coloring and painting'', ''building block constructions'', ''backyard nature exploration'', ''library storytime'', ''singing and dancing to children’s songs'', ''dress‑up and imaginative
    play'', ''group games like Duck, Duck, Goose'', ''making bubbles'', ''observing insects and simple science experiments'']'
  career_goals: Katy dreams of growing up to be a painter who fills the world with bright, happy pictures, a teacher who shares stories and helps friends learn, or a veterinarian who cares for animals.
    She imagines herself creating art in a sunlit studio, guiding younger children in a classroom, or gently caring for pets at a clinic. Her love of colors, curiosity about how things work, and deep kindness
    drive her to pursue a future where she can bring joy and comfort to others.
