  hobbies: '["Salsa and bachata dancing", "Cooking traditional Cuban recipes", "Attending cultural festivals", "Volunteering at community center", "Beach walks", "Zumba fitness classes", "Reading self-help
    and personal development books", "Listening to Cuban music", "DIY home decor crafting"]'
  career_goals: Gilda aims to obtain her GED within the next year and then pursue an associate's degree in Business Administration at a community college. She aspires to move from a clerical role to an
    office supervisor position, where she can lead a small team, streamline workflows, and mentor new staff. Long‑term, she dreams of opening a family‑run Cuban café in Lake Worth, combining her love for
    food, culture, and entrepreneurship. She is focused on building financial stability for her married life, expanding her professional skill set, and serving as a role model for younger members of her
    community.
