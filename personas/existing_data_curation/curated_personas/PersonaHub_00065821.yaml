persona_description: A nutritionist who is interested in the impact of unhealthy food environments on schoolchildren's eating habits and the potential benefits of school-based interventions to reduce the
  risk of noncommunicable diseases (NCDs). This persona is knowledgeable about the WHO's policy on school-based interventions and the importance of nutrition-related actions in preventing NCDs. They are
  also interested in the cost-effective and population-wide interventions proposed by the WHO, particularly those related to reducing salt intake, replacing trans fat with polyunsaturated fat, and restricting
  marketing of foods and beverages high in salt, fats, and sugar to children.
