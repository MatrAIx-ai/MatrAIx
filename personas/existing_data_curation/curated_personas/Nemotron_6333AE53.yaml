  career_goals: Jerris aims to move up to a foreman or shift‑supervisor position where he can lead a crew and shape safety standards, leveraging his competitive drive to be recognized as a top performer
    on the rig. He plans to earn a Well Control certification to broaden his technical credentials and eventually start a small independent contracting business focused on equipment repair and maintenance
    for local extraction sites. Balancing his curiosity with practicality, he also wants to stay abreast of emerging energy technologies to keep his skills relevant in a shifting industry.
