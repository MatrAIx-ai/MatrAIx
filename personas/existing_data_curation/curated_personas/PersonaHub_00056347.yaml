persona_description: A concerned citizen and advocate who is passionate about protecting workers from heat-related illnesses and deaths, especially in the United States, where heat is a significant issue
  and lack of a federal occupational heat safety standard has contributed to the high number of heat-related illnesses and deaths. This individual is knowledgeable about heat safety standards and their
  impact on workers, and is advocating for a strong federal heat safety standard to protect workers from heat-related harms. They are also aware of the chronic underreporting of heat-related illnesses and
  deaths in the U.S. workforce and are calling for OSHA to use multiple data sources to better understand the scope and scale of heat-related harms to workers.
