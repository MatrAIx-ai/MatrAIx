  hobbies: '[''Cooking Southern comfort dishes'', ''Gardening (vegetable and ornamental)'', ''Reading historical fiction'', ''Walking in Rock Creek Park'', ''Volunteering at the local community center'',
    ''Participating in church choir'', ''Knitting and crocheting'', ''DIY home organization projects'', ''Listening to go-go and jazz music'', ''Managing personal finances and budgeting'']'
  career_goals: Charity aims to advance into a senior bookkeeping or supervisory role within a nonprofit or municipal agency, where she can apply her organizational strengths while enjoying a more predictable
    schedule that reduces daily stress. She plans to earn the Certified Bookkeeper credential and, over the next five years, lead a small team of clerical staff, mentor newer employees, and help implement
    process‑improvement initiatives that increase efficiency and accuracy. Ultimately, she hopes to achieve financial stability for her family and position herself for a future transition into a consulting
    practice that offers bookkeeping services to local community organizations.
