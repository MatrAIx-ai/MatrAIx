personas:
  professional: Julian Soto, a seasoned facilities maintenance professional with an associate degree in business administration, leverages their methodical approach, expertise in floor care, chemical safety,
    and OSHA compliance to create detailed cleaning checklists, conduct quality inspections, and train new staff, positioning them for a supervisory role within the next three years.
  sports: Julian Soto avidly follows the Buffalo Bills and Buffalo Sabres, participates in a local weekend bowling league, and joins a community fishing club that meets along the Erie Canal each summer,
    balancing low‑stress recreation with a modest interest in team sports.
  arts: Julian Soto unwinds by listening to classic salsa tracks from Celia Cruz and bolero ballads by Armando Manzanero, attends occasional performances at the nearby community theater, and curates a small
    collection of vintage vinyl records that echo their family's musical heritage.
  travel: Julian Soto prefers low‑key road trips meticulously planned to minimize stress, such as weekend escapes to the Finger Lakes for fishing and hiking, a nostalgic culinary pilgrimage to Miami’s Little
    Havana, and a long‑standing dream of exploring the historic streets of Old San Juan.
  culinary: Julian Soto enjoys cooking traditional Cuban dishes—like ropa vieja simmered with home‑grown tomatoes and peppers and hand‑rolled empanadas filled with seasoned pork and oregano—while also crafting
    fresh herb‑infused salsas using basil and cilantro from their garden, reflecting an intermediate skill level and a love for tangible, flavorful results.
  core: Julian Soto is a routine‑driven facilities specialist who balances a disciplined work ethic with gardening, Cuban cooking, and low‑stress hobbies, while quietly wrestling with worries about career
    advancement and health.
background:
  cultural: Julian is a second‑generation Cuban‑American. His parents fled Cuba in the early 1980s and settled in the Buffalo area, where they fostered a close‑knit household centered on family, Catholic
    faith, and Cuban customs. At home, Spanish is spoken daily, and holidays are marked with traditional foods, music, and gatherings. While he has assimilated into the broader American culture of upstate
    New York—adopting local sports and community involvement—he still values the warmth, hospitality, and emphasis on hard work that characterize his Cuban heritage. This blend informs his identity, his
    bilingual communication, and his commitment to providing reliable service to both the Cuban diaspora and the wider community.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping, waxing, buffing)'', ''Equipment operation (auto scrubbers, pressure washers)'', ''Hazardous chemical handling'', ''OSHA safety compliance'',
    ''Inventory control of cleaning supplies'', ''Scheduling and route planning'', ''Basic facilities maintenance (minor plumbing & electrical)'', ''Budgeting and record keeping'', ''Bilingual communication
    (Spanish/English)'', ''Team training and supervision'']'
  hobbies: '[''Backyard vegetable gardening'', ''Cooking traditional Cuban cuisine'', ''Fishing on the Erie Canal'', ''Morning dog walks'', ''Listening to classic salsa and bolero music'', ''Volunteer cleaning
    for local parish events'']'
  career_goals: Julian aims to transition from a frontline janitor to a supervisory role within the next three years, targeting a position such as Lead Custodian or Facilities Supervisor at a larger property.
    He plans to earn the ISSA Certified Cleaning Technician credential and complete an OSHA 30‑hour construction safety course to strengthen his qualifications. In the medium term, he hopes to oversee a
    small team, introduce systematic, eco‑friendly cleaning protocols, and mentor new hires. Ultimately, he dreams of launching his own locally‑owned cleaning service that capitalizes on his reputation
    for reliability and routine‑driven excellence, providing stable income for his family and a dependable option for community businesses.
