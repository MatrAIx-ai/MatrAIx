  hobbies: '[''Reading contemporary fiction'', ''Watercolor painting'', ''Gardening'', ''Hiking'', ''Cooking Southern comfort foods'', ''Crocheting'', ''Puzzle solving (e.g., Sudoku)'', ''Volunteer tutoring
    at community center'']'
  career_goals: Suzanne aims to complete a bachelor’s degree in Education within the next two years, followed by a Master’s in Instructional Design or Higher Education Administration. Her long‑term goal
    is to transition from an adjunct role to a full‑time faculty position, eventually becoming a department chair or program director at a community college. She is passionate about developing flexible,
    hybrid courses that cater to working adults and plans to publish research on the impact of pragmatic pedagogy in adult education. Balancing her professional aspirations with her marriage, Suzanne values
    a career path that offers schedule flexibility and opportunities for community outreach, such as launching a local adult‑learning mentorship program.
