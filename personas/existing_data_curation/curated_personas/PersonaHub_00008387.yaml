persona_description: Kevin Bundy, a senior attorney with the conservation group Center for Biological Diversity, is likely to read the above text. Bundy is a knowledgeable and experienced individual who
  specializes in environmental law, particularly in the areas of climate change and renewable energy. He is passionate about ensuring strict accounting of carbon emissions from the burning of biomass and
  limiting the type of fuels burned by biomass facilities. Bundy is also concerned about the impact of biomass energy on forests and agricultural land and the need for a shift to 100 percent renewable energy
  as quickly as possible to address climate change. He is aware of the conflicting scientific opinions and government policies regarding biomass energy and is trying to educate the public about its potential
  contributions to climate change.
