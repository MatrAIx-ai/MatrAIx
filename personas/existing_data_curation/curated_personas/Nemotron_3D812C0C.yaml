personas:
  professional: Heriberto Scott, a budding block architect, meticulously constructs wooden towers while adapting to occasional topples with practical acceptance, balancing curiosity about shapes with the
    pragmatic need to keep the play area organized, and they proudly display each completed tower to a small audience.
  sports: Heriberto Scott participates in a preschool gymnastics class twice a week, proudly mastering the forward roll while obsessively watching Seattle Sounders FC matches on the family TV, and they
    often challenge older kids at the park’s sandbox slide, channeling their competitive nature into playful races.
  arts: Heriberto Scott fills sketchbooks with crayon doodles of dinosaurs and rainbows, delights in the whimsical songs of Sesame Street characters like Elmo and the catchy chorus of 'Baby Shark', and
    they rehearse the melody with an earnest, albeit slightly off‑key, voice, revealing a reserved yet curious artistic side.
  travel: Heriberto Scott has visited the local zoo, marveling at the giraffes, and taken a family road trip to Santa Monica beach where they built sandcastles and collected shells, and they eagerly anticipate
    a future trip to Disney World, favoring carefully planned itineraries that accommodate predictable nap times while leaving room for spontaneous puddle‑jumping.
  culinary: Heriberto Scott prefers soft foods such as mashed sweet potatoes, banana slices, and tiny chicken nuggets, enjoys the gentle crunch of steamed peas, and they confidently stir a spoon in their
    own bowl, though they sometimes insist on adding extra ketchup, a habit that shows a competitive desire to have the most flavor.
  core: Heriberto Scott is a two‑year‑old explorer who balances fierce curiosity with practical routines, quietly competes in everyday play, and maintains an emotional steadiness that keeps them steady
    amid toddler turmoil.
background:
  cultural: Heriberto is a Black toddler raised in Rocky Mount, North Carolina, a region where Southern Black cultural traditions emphasize strong family bonds, community gatherings, church involvement,
    and storytelling. These influences shape his early language exposure, his comfort with small, familiar groups, and an appreciation for rhythmic music and cuisine that are part of his family's cultural
    life.
