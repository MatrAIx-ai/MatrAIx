  hobbies: '[''Church choir participation'', ''Community event volunteering'', ''Vegetable gardening'', ''Cooking Southern cuisine'', ''Line dancing'', ''Reading mystery novels'', ''Weekend road trips to
    state parks'', ''Yoga for stress relief'', ''Walking along the Coosa River'']'
  career_goals: Jo aims to advance to a senior transportation coordinator role within the school district, where she can shape bus routing policies, lead driver training programs, and champion safety initiatives.
    She plans to obtain advanced defensive driving and emergency management certifications, mentor younger drivers, and eventually transition to a part-time role facilitating transportation for seniors
    and community members, allowing her to reduce work-related stress while continuing to serve her community.
