personas:
  professional: Jo Johnson is a seasoned school bus driver with over two decades of experience, known for meticulous route planning, compassionate student supervision, and a pragmatic curiosity that drives
    them to adopt emerging safety technologies while mentoring new drivers and aiming for a senior transportation coordinator role.
  sports: Jo Johnson enjoys cheering on the Alabama Crimson Tide on Saturday Saturdays, supports the Birmingham Barons during summer evenings, participates in a community walking club that meets along the
    Coosa River, and maintains regular gentle yoga sessions for flexibility, while occasional line‑dancing classes fulfill their love of rhythmic movement without the intensity of competitive sports.
  arts: Jo Johnson sings in the church choir, delights in the storytelling of mystery authors Agatha Christie and Tana French, regularly listens to classic country legends such as Dolly Parton and Johnny
    Cash while cooking, and attends community theater performances of classics like "The Music Man," allowing music and narrative to weave into their daily rhythm.
  travel: Jo Johnson favors spontaneous weekend road trips, often exploring Alabama's Cheaha State Park, Little River Canyon, and Monte Sano, while also savoring occasional short getaways to Nashville for
    live country music and New Orleans for vibrant cuisine, balancing a modest travel budget with a desire for scenic relaxation and cultural immersion.
  culinary: Jo Johnson enjoys preparing classic Southern dishes like fried catfish with hush‑puppy corn‑bread, collard greens seasoned with smoked ham, and peach cobbler topped with fresh garden peaches,
    skillfully mixing garden‑grown tomatoes and okra into hearty stews, yet occasionally indulges in extra dessert portions during family gatherings, reflecting a warm hospitality that blends culinary tradition
    with a modestly adventurous palate.
  core: Jo Johnson is a diligent school‑bus veteran who blends meticulous safety habits with a love of spontaneous road trips, gentle yoga, and a tendency to over‑think every decision, creating a uniquely
    balanced yet occasionally anxious outlook on life.
background:
  cultural: Jo was born and raised in Gadsden, Alabama, and her cultural identity is shaped by Southern white working-class traditions. She grew up in a community centered around church, family gatherings,
    and local festivals, valuing hospitality, practicality, and a strong sense of civic duty. The industrial backdrop of Etowah County instilled a pragmatic work ethic, while the region’s love for country
    music, Southern cooking, and outdoor recreation continues to influence her daily life and social connections.
attributes:
  skills: '[''Safe vehicle operation'', ''Meticulous route planning'', ''Student supervision and behavior management'', ''Effective communication with school staff and parents'', ''Conflict resolution'',
