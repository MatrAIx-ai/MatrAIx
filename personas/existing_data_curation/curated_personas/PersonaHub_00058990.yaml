persona_description: A professional in the automotive electronics industry who is interested in ensuring the reliability of electronic hardware designs. They are familiar with traditional approaches to
  design for reliability and are looking for a more physics-based approach to evaluate the life of electronic hardware components, boards, and systems. They are interested in Ansys Sherlock, a reliability
  physics-based electronics design software that provides fast and accurate life predictions for electronic hardware at the component, board, and system level in early design stages. They are eager to learn
  about Ansys Sherlock's key features, unique approach to electronics reliability evaluation, and capabilities that support system-level electronics reliability studies.
