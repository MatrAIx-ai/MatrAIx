  career_goals: Alexis aims to build on her practical experience by completing a Bachelor of Science in Nursing within the next three years, focusing on a curriculum that balances coursework with her family
    responsibilities. She aspires to become a Registered Nurse specializing in community health, eventually taking on a charge nurse role where she can lead a team while still engaging directly with patients.
    Long‑term, she envisions contributing to local health initiatives in Arvin, perhaps by establishing a volunteer health‑education program for underserved residents.
