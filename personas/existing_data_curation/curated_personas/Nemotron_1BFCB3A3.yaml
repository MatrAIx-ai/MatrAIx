  hobbies: '[''Model kit building'', ''Competitive video gaming (RTS, MOBA)'', ''Fishing'', ''Hiking'', ''Arduino and electronics tinkering'', ''Reading sci-fi and tech articles'', ''Attending local county
    fair events'']'
  career_goals: Jay aims to complete his GED and secure an apprenticeship in a skilled trade—preferably electrical, HVAC, or automotive technology—where he can further develop his mechanical and technical
    abilities. He envisions eventually running his own small handyperson or repair service, offering reliable community-focused solutions. While he values a stable, practical career, his curiosity drives
    him to keep learning new technologies and possibly earn certifications in renewable energy installations or advanced computer networking.
