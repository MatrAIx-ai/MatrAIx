personas:
  professional: Jay White, a future apprentice electrician in training, leverages their hands-on knack for wiring, carpentry, and computer hardware while applying their methodical planning and competitive
    edge to efficiently solve repair tasks and exceed client expectations.
  sports: Jay White, an avid fisherman who spends weekends casting on nearby lakes and hikes local forests for fitness, also supports the regional minor-league baseball team and occasionally joins a community
    basketball league, approaching each activity with the same strategic mindset they apply to real-time strategy games.
  arts: Jay White, a sci-fi novel enthusiast who devours works by Isaac Asimov and William Gibson, enjoys the cinematic scores of Hans Zimmer, and attends the county fair's live music stage to watch performances
    by local folk bands, channels that creative energy into building detailed model kits and custom Arduino light displays.
  travel: Jay White, who prefers meticulously planned road trips over spontaneous backpacking, has already explored the Grand Canyon and the Great Lakes region and dreams of visiting Tokyo and the Canadian
    Rockies, balancing a limited budget with a desire for tech-rich destinations that inspire future projects.
  culinary: Jay White, a competent solo cook who frequently whips up grilled trout with lemon-dill sauce, homemade pepperoni pizza on a DIY stone oven, and hearty spaghetti carbonara, enjoys experimenting
    with fresh basil and smoked paprika while still ordering fast-food burgers when time runs short.
  core: Jay White, a methodical teen with a competitive streak, blends a love for precise model building, strategic gaming, and hands-on repairs into a pragmatic yet curious outlook, even if they sometimes
    hoard spare parts and procrastinate on schoolwork.
background:
  cultural: Jay grew up in Shawano, a small town in northern Wisconsin, immersed in Midwestern values of self-reliance, modesty, and community involvement. His family participates in local traditions such
    as the county fair, high-school sports gatherings, and seasonal community service projects. The rural-suburban setting has exposed him to a blend of agricultural life and modest town culture, while
    his schooling and peer groups have kept him connected to broader American pop culture and technology trends. These influences shape his practical outlook, organized habits, and appreciation for both
    tradition and new ideas.
attributes:
  skills: '[''Bicycle and small engine repair'', ''Basic carpentry and woodworking'', ''Computer hardware assembly and troubleshooting'', ''Simple electrical wiring'', ''Time management and planning'',
