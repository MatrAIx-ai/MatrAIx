personas:
  professional: Anthony Johnson, a preschool‑aged budding architect, channels their curiosity and practicality by meticulously arranging building blocks into intricate structures while inviting friends
    to collaborate, showcasing disciplined focus, high standards, and a sociable energy that foreshadows a future in collaborative design.
  sports: Anthony Johnson joins the Tiny Turtles Soccer Club for after‑school play, delights in weekly swimming lessons at the community pool, and passionately roots for the Chicago Cubs during family game
    nights, embodying an energetic, group‑oriented approach to fitness.
  arts: Anthony Johnson immerses in creative play by drawing vibrant pictures of Paw Patrol heroes, dancing to the catchy tunes of Disney’s Frozen soundtrack, and watching episodes of Bluey, letting the
    whimsical storytelling of Mo Willems shape their imaginative world.
  travel: Anthony Johnson loves weekend family trips to the local zoo and the excitement of a day at Disneyland, enjoys the routine of packing their favorite stuffed dinosaur, and dreams of exploring the
    towering cliffs of Grand Canyon National Park as well as seeing the Eiffel Tower in Paris and the Great Wall of China one day, balancing adventure with the comfort of familiar routines.
  culinary: Anthony Johnson prefers the crunch of chicken nuggets seasoned with a dash of garlic powder, delights in mac‑and‑cheese made with extra cheddar, loves dipping apple slices in peanut butter,
    proudly helps stir batter for banana pancakes, and eagerly requests a cheese pizza with pepperoni for special occasions, showing a budding enthusiasm for mixing flavors.
  core: Anthony Johnson is a tiny, organized dynamo who meticulously lines up toy cars, hoards stickers like treasure, and can’t resist sneaking an extra cookie before dinner.
background:
  cultural: Anthony is an African‑American boy growing up in Denver’s Adams County, where his family blends cultural traditions with the city’s diverse environment. He participates in community gatherings
    that celebrate African‑American heritage, such as Kwanzaa and local festivals that feature jazz, gospel, and hip‑hop music. Family meals often include soulful dishes like collard greens and sweet potatoes,
    connecting him to his cultural roots. He attends a preschool that incorporates multicultural stories and activities, fostering pride in his background while interacting with peers from various cultures.
    These experiences shape his sense of identity and community involvement.
