  career_goals: Anthony often talks about becoming a community helper when he grows up. He dreams of being a firefighter who can organize a firehouse and keep people safe, reflecting his practical side
    and love for structure. He also expresses fascination with space and engineers, saying he’d like to explore the stars as an astronaut, which aligns with his curiosity about new ideas. Occasionally he
    imagines being a teacher who helps younger children learn, showing his compassionate and cooperative nature. While these are playful aspirations, they point to a desire to master skills, contribute
    to others, and hold positions that require discipline and leadership.
