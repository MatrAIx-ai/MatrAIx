personas:
  professional: Jenny Bork, a detail‑oriented remote bookkeeper, leverages her knack for routine, meticulous record‑keeping, and calm demeanor to deliver reliable administrative support for a small nonprofit,
    thriving in the predictable structure that eases her stress.
  sports: Jenny Bork, an avid casual walker, spends her mornings on the Jacksonville Riverwalk and participates in the Jacksonville Nordic Walking Club, while cheering for the Jacksonville Jaguars in fall
    football and the Jacksonville Jumbo Shrimp during summer baseball, preferring low‑impact exercise that dovetails with her love of quiet routine.
  arts: Jenny Bork, a devoted reader of Hilary Mantel’s historical novels and a listener of Debussy’s piano suites, finds solace knitting intricate scarves while attending occasional performances by the
    Jacksonville Symphony, and they collect vintage postcards featuring 19th‑century European art, letting these artistic influences shape their vintage décor curation.
  travel: Jenny Bork prefers meticulously planned, low‑key vacations that blend historic charm with tranquil scenery, such as weekend explorations of Savannah’s cobblestone squares, a spring retreat to
    the Scottish Highlands’ peaceful lochs, and annual stays on Amelia Island for beachside walks, always budgeting ahead and favoring boutique inns over crowded resorts.
  culinary: Jenny Bork, an enthusiastic home baker, perfects sourdough loaves and rosemary focaccia on weekends, seasons her dough with heirloom thyme harvested from her garden, pairs the breads with locally
    sourced shrimp po’boys, and relishes the calming ritual of kneading as a soothing counterpoint to her daily worries.
  core: Jenny Bork, a 42‑year‑old order‑loving archivist of domestic life, channels her quiet curiosity into meticulous bookkeeping, vintage décor curation, and solitary hobbies, yet battles a penchant
    for over‑thinking and occasional coffee‑driven insomnia.
background:
  cultural: Jenny grew up in Jacksonville, North Carolina, a small town adjacent to the Marine Corps Base Camp Lejeune. Her family is rooted in the Southern tradition of hospitality, church involvement,
    and practical self-reliance. The community’s emphasis on routine, neighborly support, and modest living shaped her values of practicality, responsibility, and caring for others. Though she now identifies
    as separated, she maintains close ties with extended family and the local Methodist congregation, where community service and quiet fellowship are central.
