  hobbies: '["Reading historical fiction", "Gardening", "Knitting", "Baking artisan bread", "Birdwatching", "Jigsaw puzzles", "Journaling", "Coastal nature walks"]'
  career_goals: Jenny aims to re-enter the workforce in a role that offers predictable hours and a structured environment, such as part-time remote bookkeeping or administrative support for a small nonprofit.
    She hopes to leverage her organizational strengths while maintaining a work-life balance that respects her need for quiet time. In the longer term, she dreams of launching a modest home-based boutique
    that curates vintage home décor, allowing her to work independently and sustain a steady routine.
