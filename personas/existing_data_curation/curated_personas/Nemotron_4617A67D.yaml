  hobbies: '[''Watercolor Painting of Historic Buildings'', ''Architectural Photography'', ''Historical Fiction and Art-History Reading'', ''Local History Research'', ''Birdwatching'', ''Gardening'', ''Hiking
    Regional Trails'', ''Crossword Puzzles'', ''Classical Music Listening'', ''Experimental Cooking'', ''Blogging about Preservation and Building Codes'']'
  career_goals: Charlene aims to transition into a senior supervisory role within the county’s building department, where she can shape inspection policies and integrate historic-preservation considerations
    into code enforcement. Over the next three to five years she plans to earn the Certified Building Official (CBO) credential, lead a regional team of inspectors, and develop a continuing‑education curriculum
    that blends technical compliance with architectural history. She also hopes to serve as a consultant on adaptive‑reuse projects for historic homes, and eventually shift to part‑time advisory work that
    allows more time for her artistic pursuits.
