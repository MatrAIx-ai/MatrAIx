persona_description: A medical doctor and researcher who specializes in the study of diabetes and the development of new treatments for the disease. Shalev has been working on finding better treatments
  for diabetes for at least a decade, focusing on a protein known as TXNIP, which has been implicated as having some role in programmed cell death. Her research has led to the discovery of a potential new
  diabetes drug that could target the same regulation pathway as verapamil, but without its effect on blood pressure. Shalev's work has implications for the development of new treatments for diabetes and
  the prevention of heart attacks, kidney failure, blindness, and limb amputations.
