personas:
  professional: Sokun Tran, an 83‑year‑old retired circuit‑design engineer turned community mentor, blends their methodical, organized mindset and decades of experience with early FORTRAN and COBOL programming
    to meticulously guide young women in STEM, volunteer as a coding instructor, and advise heritage‑preservation projects, all while leveraging their bilingual translation skills to bridge technical and
    cultural narratives.
  sports: Sokun Tran, an avid supporter of the San Francisco Giants, Golden State Warriors, and San Jose Earthquakes, participates in a local Tai Chi seniors’ group and a weekly walking club at the community
    park, enjoys occasional senior bowling league matches during the winter, and they maintain a disciplined yet gentle fitness routine that balances low‑impact exercise with their love of gardening, reflecting
    their methodical and balanced approach to staying active.
  arts: Sokun Tran finds creative solace in photographing ordinary scenes with a vintage Leica, cherishes the timeless melodies of classical pianist Lang Lang and violinist Hilary Hahn, regularly attends
    performances at the local art museum and community theater where they enjoy productions starring Meryl Streep and local folk ensembles, and they devote evenings to reading historical novels by Ken Follett
    and Hilary Mantel, weaving these artistic experiences into their identity.
  travel: Sokun Tran, who prefers meticulously planned trips with their children and grandchildren, has already explored Yosemite National Park, the historic streets of San Francisco’s Chinatown, and the
    ancient river town of Hoi An, and they now dream of a tranquil pilgrimage to Kyoto’s bamboo groves and a leisurely cruise along the Mediterranean coast, balancing their modest travel budget with a love
    for cultural immersion and family bonding.
  culinary: Sokun Tran, an accomplished home chef, skillfully prepares fragrant bowls of phở with star‑anise‑infused broth, rice noodles, thinly sliced beef, fresh basil, bean sprouts, and lime, rolls delicate
    spring rolls filled with shrimp, vermicelli, mint, and cilantro, and braises caramelized pork with fish sauce, lemongrass, and coconut juice, always sourcing herbs from their garden and they treat each
    family gathering as a culinary celebration.
  core: Sokun Tran, an 83‑year‑old former engineer turned community mentor, blends meticulous engineering precision with a passion for gardening, puzzles, and traditional cooking, while they habitually
    hoard old programming manuals and occasionally misplace their glasses during photo shoots.
background:
  cultural: 'Born in central Vietnam, Sokun Nga grew up in a family that valued education, respect for elders, and community service. She emigrated to the United States in the early 1970s, initially living
    in California’s Central Valley before settling in San Jose. Her Vietnamese heritage remains central to her identity: she fluently speaks Vietnamese, celebrates holidays such as Tet and the Mid‑Autumn
    Festival, maintains traditional cooking methods, and actively participates in the local Vietnamese diaspora network. While she embraces the multicultural environment of Silicon Valley, she retains the
    modesty, resilience, and collective spirit characteristic of her generation of Vietnamese immigrants.'
attributes:
  skills: '[''Applied mathematics'', ''Electrical engineering'', ''Circuit design'', ''Systems analysis'', ''FORTRAN programming'', ''COBOL programming'', ''Project management'', ''Technical writing'',
