  hobbies: '[''Gardening'', ''Vietnamese cooking'', ''Tai Chi'', ''Puzzle solving (Sudoku, crosswords)'', ''Reading historical fiction'', ''Photography'', ''Community cultural events (Tet festival)'', ''Volunteer
    tutoring'']'
  career_goals: In retirement, Sokun Nga is motivated to give back by mentoring young women and newcomers interested in STEM, volunteering as a coding instructor at a local community college, and contributing
    her expertise to heritage preservation initiatives that document Southeast Asian senior experiences in Silicon Valley. She also aspires to publish a memoir that weaves together her professional journey
    with cultural narratives and to serve on the board of a nonprofit focused on elder care and technology access.
