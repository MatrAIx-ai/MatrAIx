persona_description: A grief counselor and therapist who specializes in helping children understand and process the concept of death without causing unnecessary confusion or anxiety. They have experience
  working with children who are grieving the loss of a loved one and have a deep understanding of the emotional and psychological challenges that come with the concept of death. They are skilled at listening
  to children's cues and helping them navigate their emotions and thoughts about death. They are also knowledgeable about the purpose of family rituals surrounding death and how they can help children process
  their grief. They are empathetic, compassionate, and understanding, and are able to provide children with honest and realistic information about death without causing unnecessary fear or confusion.
