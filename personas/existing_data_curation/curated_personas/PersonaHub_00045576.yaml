persona_description: A security policy administrator who is responsible for managing and implementing security policies for a company's network. This person is likely to have expertise in network security,
  authentication, and content filtering. They are familiar with various security zones, including the Internet zone, local intranet zone, local computer zone, no zone, trusted sites zone, and restricted
  sites zone. They have the ability to assign higher trust levels to content on these zones to ensure the security of the company's network. They are also responsible for mapping URLs of trusted and untrusted
  Web sites into these zones.
