personas:
  professional: Rafael Ortega is a licensed civil engineer who merges rigorous structural analysis with a vivid artistic sensibility, and they lead complex bridge and highway projects in Los Angeles while
    demanding meticulous scheduling, risk management, and seamless client negotiations, all driven by their competitive drive and disciplined work ethic.
  sports: Rafael Ortega is a senior‑league soccer enthusiast who captains a local LA Galaxy Masters team, they routinely lace up for the Los Angeles Marathon each spring, follow the Los Angeles Rams and
    Lakers, and balance their competitive streak with disciplined training at the municipal recreation center.
  arts: Rafael Ortega is an avid painter of urban skylines who draws inspiration from Edward Hopper and James Turrell, they curate a personal photography collection of downtown LA architecture, frequent
    modern art exhibitions at The Broad, and spend evenings dissecting the speculative worlds of Isaac Asimov and Ursula K. Le Guin, all while sketching conceptual designs that fuse abstract art with civil
    engineering.
  travel: Rafael Ortega is a methodical traveler who plans detailed itineraries to explore architectural marvels, they have photographed the steel arches of Chicago’s bridges, trekked the modernist streets
    of Barcelona, and dream of investigating Copenhagen’s bike‑friendly infrastructure, while balancing trip costs against their consultancy’s cash flow.
  culinary: Rafael Ortega is a home‑cook who masterfully prepares traditional pupusas filled with cheese and refried beans, they pair them with fresh salsa verde, experiment with grilled corn and chipotle‑marinated
    chicken, and delight their family by blending these heritage flavors with their own creative plating.
  core: Rafael Ortega is a disciplined engineer‑artist whose relentless pursuit of structural elegance is tempered by late‑night puzzle sessions, a competitive edge on the soccer field, and a persistent
    undercurrent of anxiety that fuels both their meticulous work and occasional over‑caffeination, and they often find solace in a freshly brewed espresso.
background:
  cultural: Rafael grew up in a Salvadoran immigrant family that settled in Los Angeles, preserving strong ties to his heritage through language, Catholic traditions, and community celebrations such as
    Día de los Farolitos. He speaks fluent Spanish and often incorporates Salvadoran motifs—like vibrant colors and folkloric patterns—into his design work. His upbringing emphasized hard work, family solidarity,
    and resilience, shaping his disciplined approach to his career. He remains connected to the local Salvadoran diaspora, participating in cultural festivals, supporting local businesses, and sharing traditional
    cuisine with friends and neighbors.
