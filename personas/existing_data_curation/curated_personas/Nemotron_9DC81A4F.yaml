  career_goals: Rafael aims to become a principal engineer and eventually establish his own consultancy focusing on innovative, sustainable, and art‑integrated infrastructure projects that serve underserved
    communities in Los Angeles. He seeks LEED AP certification and plans to lead high‑profile civic projects that showcase Salvadoran cultural motifs. He also aspires to mentor the next generation of engineers,
    publish research on integrating abstract design principles into civil engineering, and achieve a balanced lifestyle that mitigates his anxiety through purposeful work.
