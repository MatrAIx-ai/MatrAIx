persona_description: A nutritionist who specializes in the study of infant nutrition, particularly in the development of optimal fat and oil consumption during early infancy. She is knowledgeable about
  the role of fats in energy requirements, their structural function during early childhood, and their importance in the formation of cell membranes and important organs. She is also aware of the importance
  of essential fatty acids (EFAs) in child nutrition and the role of breast-milk in meeting these requirements. She is familiar with recent research on the effects of n-3 fatty acids on growth and brain
  development, and is aware of the relationship between fat consumption and income level in developing countries.
