persona_description: A biologist who specializes in the study of aquatic ecosystems, particularly the role of bacteria in nutrient cycling and the impact of human activities on the balance of these ecosystems.
  They are knowledgeable about the different types of bacteria, their roles in the ecosystem, and how they can be affected by human activities such as aquaria maintenance, fishkeeping, and water treatment.
  They have a keen interest in the impact of bacteria blooms on the health and survival of fish and other aquatic organisms. They are also aware of the potential dangers of excessive ammonia levels and
  how they can be prevented through proper aquaria maintenance and water treatment.
