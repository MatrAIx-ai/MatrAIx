persona_description: A soil scientist who specializes in nutrient management, specifically in the use of starter fertilizers and the optimization of soil phosphorus content for maximum crop yield. They
  have conducted research on the effects of using only starter nitrogen fertilizer on corn and cotton growth, and have found that this practice can save money while also benefiting the environment. Their
  research has been conducted in the southeastern United States and has shown that using only starter nitrogen fertilizer can produce similar yields to those achieved with N and P starter fertilizers, while
  reducing the amount of P fertilizer applied.
