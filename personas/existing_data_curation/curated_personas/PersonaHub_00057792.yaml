persona_description: A historian who specializes in the study of the Catholic Church's liturgical traditions, particularly those related to the Eastern Churches and the history of liturgical reform. Their
  knowledge and interest extend beyond the Western liturgical practices to encompass the Eastern Churches and their liturgical customs. They have a deep appreciation for the preservation of the Roman Rite
  and the importance of Catholic liturgical inheritance, and are well-versed in the controversies surrounding liturgical reform and the status of the Eastern Churches. They have a particular interest in
  the history of liturgical reform and the role of the papacy in preserving and adapting liturgical traditions.
