personas:
  professional: Julia Robertson is a seasoned elementary STEM teacher who blends hands‑on Arduino projects with data‑driven lesson tweaking, mentors novice educators, and leverages their laid‑back yet decisive
    style to champion a cross‑grade makerspace as they eye a STEM coordinator role.
  sports: Julia Robertson is an avid weekend hiker on the Lake Erie shoreline, supports the Cleveland Browns, Cavaliers, and Guardians, and participates in a local running club that meets for early‑morning
    jogs while occasionally joining a community yoga class for flexibility.
  arts: Julia Robertson channels their creative side by strumming acoustic guitar at neighborhood gatherings, playlists featuring The Lumineers and Jason Isbell, enjoys visits to the Cleveland Play House
    for contemporary theater, and decorates their balcony garden with hand‑painted pottery inspired by local muralists.
  travel: Julia Robertson favors modest, purpose‑driven trips that blend outdoor exploration with cultural immersion, having backpacked the Hocking Hills, taken a weekend culinary tour of Chicago’s farmer
    markets, and planning a future spring visit to Kyoto’s tea gardens to spark new makerspace ideas, all while balancing family time and a teacher’s budget.
  culinary: Julia Robertson experiments with seasonal dishes like roasted beet and goat‑cheese salad, summer corn chowder with fresh basil, and homemade dill pickles, skillfully merging their urban balcony
    garden harvest with locally sourced farmer‑market gems, though they sometimes misplace spices in a chaotic pantry.
  core: Julia Robertson is a curiosity‑driven educator who mixes hands‑on tech tinkering with community‑focused projects, balances relaxed planning with assertive mentorship, and habitually forgets where
    they left their keys.
background:
  cultural: Julia grew up in the Cleveland metropolitan area in a middle‑class white family with German and Irish roots. She embodies Midwestern values of hard work, modesty, and community involvement,
    often participating in local events such as neighborhood clean‑ups and school fundraisers. Her upbringing in Eastlake, Ohio—a small lake‑front city—has given her a strong sense of place and a commitment
    to fostering inclusive, collaborative environments both in and out of the classroom.
attributes:
  skills: '[''STEM curriculum design'', ''Project-based learning facilitation'', ''Classroom technology integration'', ''Differentiated instruction'', ''Collaborative team teaching'', ''Student mentorship'',
    ''Flexible lesson adaptation'', ''Data-driven assessment'']'
  hobbies: '[''DIY electronics projects'', ''Urban gardening'', ''Hiking local trails'', ''Reading popular science books'', ''Cooking experimental recipes'', ''Acoustic guitar playing'', ''Volunteer tutoring
    for STEM clubs'', ''Board game nights'']'
  career_goals: Julia aims to transition into a school‑wide STEM coordinator role, where she can shape curriculum across grade levels and spearhead the creation of a makerspace for elementary and middle
    school students. She plans to pursue a master's in educational leadership within the next two years to qualify for an instructional coach or assistant principal position. Additionally, she hopes to
    develop community partnerships that bring local engineers and scientists into the classroom, and to mentor a cohort of early‑career teachers in innovative, inquiry‑based teaching practices.
