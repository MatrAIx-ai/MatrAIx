personas:
  professional: Abigail Dixon, a former teacher turned private investigator, structures each investigation with meticulous planning while allowing spontaneous improvisation in interviews, they bring a talkative
    flair to client briefings, deliver clear courtroom testimony, and lead community safety workshops, embodying their balanced assertiveness.
  sports: Abigail Dixon, an avid outdoor enthusiast, rows with the Sarasota Kayak Club on weekends, follows the Tampa Bay Rays, Orlando Magic, and Miami Dolphins, leads a community softball league for Rotary
    members, and they view fitness as a social extension of their investigative networking.
  arts: Abigail Dixon, a regular at the Sarasota Community Players, performs improv with the local theater troupe, curates a crime‑novel book club spotlighting authors like Agatha Christie, Gillian Flynn,
    and Tana French, and they draw creative inspiration from actors such as Meryl Streep and musicians like Norah Jones when writing mystery short stories.
  travel: Abigail Dixon, who balances structured travel planning with spontaneous road trips, revisits Savannah’s historic squares for weekend retreats, has kayaked the Everglades and explored the Art Deco
    district of Miami, dreams of sailing to the Azores and hiking the Swiss Alps, and they budget their adventures through a modest travel fund bolstered after each successful case.
  culinary: Abigail Dixon, a garden‑to‑table enthusiast, often cooks grilled grouper with heirloom tomato salsa, fresh basil, and citrus vinaigrette, enjoys occasional seafood paella with saffron, chorizo,
    and mussels, and they relish experimenting with local Florida stone crab during coastal festivals.
  core: Abigail Dixon, a sociable yet detail‑driven private investigator, blends teacher‑like clarity with spontaneous problem‑solving, they juggle community leadership, kayaking adventures, and mystery
    storytelling while occasionally overcommitting their schedule.
background:
  cultural: Abigail grew up in a middle‑class white family in central Florida, where the laid‑back coastal lifestyle and a strong sense of community were emphasized. Her parents were teachers, which instilled
    a respect for lifelong learning and public service. After earning her graduate degree in education at the University of Florida, she built a teaching career before transitioning to private investigation,
    a path shaped by the vibrant retiree and tourist population of Sarasota County that often presents complex, people‑focused cases. The regional culture of outdoor recreation, civic engagement, and a
    blend of Southern hospitality with modern pragmatism informs her worldview, making her both approachable and determined.
attributes:
  skills: '[''Surveillance techniques'', ''Interviewing and interrogation'', ''Legal research'', ''Evidence collection and preservation'', ''Case analysis and pattern recognition'', ''Report writing and
    documentation'', ''Digital forensics (basic)'', ''Behavioral psychology'', ''Conflict resolution'', ''Public speaking and testimony'', ''Community networking'', ''Self‑defense (Krav Maga)'']'
  hobbies: '[''Improv theater'', ''Kayaking the Gulf mangroves'', ''Birdwatching (especially ospreys)'', ''Vegetable gardening'', ''Hosting a crime‑novel book club'', ''Writing mystery short stories'',
    ''Volunteering at the Osprey Rotary Club'', ''Organizing professional networking mixers'']'
  career_goals: Abigail aims to expand her solo investigative practice into a boutique agency that specializes in domestic‑violence and missing‑person cases, leveraging her empathetic approach. She plans
    to obtain the Certified Professional Investigator (CPI) credential, develop a training program for aspiring investigators that incorporates instructional design principles, and author a handbook on
    community safety. In the next five years she envisions serving as a consultant to the Sarasota County Sheriff’s Office, leading public workshops on personal security, and establishing a mentorship network
    for women in private investigation.
