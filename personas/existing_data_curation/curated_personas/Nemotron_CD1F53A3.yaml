personas:
  professional: Dung Pham is a mechanical design engineer who blends advanced SolidWorks modeling, finite element analysis, and computational fluid dynamics with a vivid artistic eye, applying Lean Six
    Sigma rigor to develop sustainable, energy‑efficient products while thriving in quiet, solitary workspaces that nurture their imagination.
  sports: Dung Pham is an avid hiker who explores the prairies and oak‑leaf woods around Waseca with the local Waseca Trailblazers club, supports the Minnesota Timberwolves, Vikings, and Twins, and occasionally
    joins a small group for intramural ultimate frisbee, preferring low‑intensity, nature‑focused activities over crowded gyms.
  arts: Dung Pham channels their imagination into hand‑crafted miniature mechanical models and digital abstract paintings, drawing inspiration from H R Giger, M C Escher, and the ambient soundscapes of
    Brian Eno, while immersing themselves in speculative fiction by Ted Chiang and attending indie film screenings of Christopher Nolan’s work.
  travel: Dung Pham meticulously plans low‑key adventures to secluded natural wonders, having trekked Iceland’s volcanic terrain and the bamboo forests of Kyoto, and dreaming of a solo hike along the Pacific
    Crest Trail, all while balancing a modest budget and a preference for solo travel over group tours.
  culinary: Dung Pham enjoys preparing authentic phở and bánh mì at home, simmering bone broth with star anise, ginger, and cinnamon before adding fresh herbs and lime, and frequently experiments by infusing
    locally sourced rosemary and smoked paprika to create fusion twists, while occasionally savoring a craft oat‑milk latte.
  core: Dung Pham is a solitary, hyper‑creative engineer who balances precise mechanical design with quiet hobbyist pursuits, compulsively hoards 3D‑printing filament, and finds calm in tai chi and the
    rhythmic hum of the CNC mill.
background:
  cultural: Dung is the son of Vietnamese immigrants who settled in the Upper Midwest in the early 2000s. Raised in a bilingual household, he grew up speaking both Vietnamese and English, celebrating Tet
    and other Vietnamese traditions alongside Midwestern holidays. The family’s emphasis on education, precision, and communal responsibility shaped his disciplined work ethic. After marrying his partner,
    whose family carries the Velasquez surname, their household blends Vietnamese and Latino cultural elements—shared meals of pho and tacos, occasional use of Spanish greetings, and a deep respect for
    familial harmony from both sides. Living in Waseca, Minnesota, Dung also embraces the region’s values of modesty, self‑reliance, and connection to nature, often spending quiet weekends outdoors. This
    multicultural tapestry informs his calm demeanor, cooperative nature, and his desire to create designs that honor both functionality and cultural aesthetics.
attributes:
  skills: '[''Computer‑Aided Design (SolidWorks, Autodesk Inventor)'', ''Finite Element Analysis (ANSYS, Abaqus)'', ''Computational Fluid Dynamics (CFD)'', ''3D Printing and Rapid Prototyping'', ''CNC Machining
    Programming (G‑code, Mastercam)'', ''Materials Selection and Testing (metals, polymers)'', ''Python Scripting for Automation'', ''MATLAB for Numerical Simulations'', ''Project Management (Agile, Gantt
    charts)'', ''Lean Six Sigma (Yellow Belt)'', ''Technical Documentation and Specification Writing'', ''Conceptual Sketching and Digital Illustration'']'
  hobbies: '[''Miniature mechanical model building'', ''3D printing artistic prototypes'', ''Woodworking'', ''Digital illustration & abstract sketching'', ''Reading speculative fiction and scientific literature'',
    ''Playing chess'', ''Hiking Minnesota prairies'', ''Landscape photography'', ''Cooking traditional Vietnamese cuisine'', ''Practicing tai chi meditation'', ''Listening to ambient/electronic music'',
    ''Journaling and reflective writing'']'
  career_goals: Dung aspires to become a senior mechanical design engineer specializing in sustainable, energy‑efficient products such as wind‑turbine components and low‑impact manufacturing equipment.
    Within the next three years he plans to obtain his Professional Engineer (PE) license and achieve a Lean Six Sigma Black Belt, positioning himself for leadership in R&D. He envisions heading multidisciplinary
    teams where his analytical rigor and imaginative approach can merge function with aesthetic innovation. Ultimately, Dung hopes to launch a boutique engineering consultancy that offers bespoke, environmentally
    conscious design services, allowing him to work in quiet, focused settings while mentoring emerging engineers remotely.
