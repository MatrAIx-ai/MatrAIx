  hobbies: '[''abstract watercolor painting'', ''science-fiction reading'', ''philosophy essay writing'', ''piano playing'', ''music composition'', ''gardening'', ''birdwatching'', ''hiking in Saratoga
    Springs State Park'', ''amateur astronomy'', ''night-sky photography'', ''crossword puzzles'', ''genealogy research'']'
  career_goals: In retirement, Harrison aims to keep contributing to both science and the arts. He intends to mentor undergraduate and senior learners in data-driven research, fostering cross‑disciplinary
    thinking. He aspires to author a popular‑science book that weaves narrative storytelling with visual art to demystify complex scientific ideas. He also plans to develop a community outreach program
    in Ballston Spa that offers hands‑on STEM workshops blended with creative activities for local youth. Additionally, he hopes to curate a small exhibition of his own artwork inspired by mathematical
    patterns and to collaborate with local galleries for a recurring "Science Meets Art" series.
