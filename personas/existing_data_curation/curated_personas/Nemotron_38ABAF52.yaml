  career_goals: Although retired, William is driven by a desire to give back. He plans to serve on the board of the local economic‑development nonprofit, mentor emerging Black entrepreneurs at the community
    college’s business incubator, and launch a scholarship fund for students pursuing business degrees at historically Black universities. He also hopes to compile his memoirs, preserving the story of Atlantic
    Beach’s Black community, and to remain active in health‑focused pursuits like walking and sailing to maintain his well‑being.
