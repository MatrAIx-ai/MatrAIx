  hobbies: '[''Gallery Visits'', ''Community Murals'', ''Adult Painting Classes'', ''Trivia Nights'', ''Board Games'', ''Hiking'', ''Yoga'', ''Volunteer at Community Theater'', ''Specialty Coffee Brewing'',
    ''Reading Contemporary Nonfiction'']'
  career_goals: Geraldine aims to transition from a billing clerk to a senior billing analyst within the next three years, ideally in a health‑care or technology firm where she can leverage her analytical
    skills. She plans to earn a Certified Billing Specialist credential and later pursue a CPA designation to broaden her career prospects. Her long‑term ambition is to become a billing manager or finance
    operations lead, overseeing a team and driving strategic cost‑reduction initiatives. Geraldine also hopes to combine her love for the arts with her finance expertise by managing the budgeting and financial
    planning for a nonprofit arts organization in Portland. To achieve these goals, she is enrolling in advanced Excel and data‑visualization courses, and she seeks mentorship from senior finance professionals.
    Her competitive nature motivates her to regularly exceed monthly posting accuracy targets and to volunteer for cross‑departmental projects that showcase her capabilities.
