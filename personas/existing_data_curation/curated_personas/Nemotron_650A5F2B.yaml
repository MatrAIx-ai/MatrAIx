  hobbies: '["Sketching and illustration", "Visiting art galleries and museums", "Acoustic guitar playing", "Reading speculative fiction & philosophy", "Video game competition (eSports)", "Cooking traditional
    Colombian dishes", "Urban and nature photography", "Short video editing", "Hiking local trails"]'
  career_goals: Daniel aims to fuse his artistic curiosity with technology by pursuing a career in UX/UI design or digital creative direction, focusing on culturally resonant products that highlight Latin
    American artistry. He plans to secure internships in design studios or tech companies during the next two years, build a portfolio that showcases interactive experiences rooted in his Colombian background,
    and eventually launch an online platform that promotes emerging Latino creators. His ambition is to become a recognized leader who bridges multicultural storytelling with innovative digital solutions.
