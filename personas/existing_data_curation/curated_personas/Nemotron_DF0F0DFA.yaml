  career_goals: Homero aims to advance from an administrative support role into a supervisory position within the next three to five years. He plans to earn the Certified Administrative Professional (CAP)
    credential and complete an associate's degree in Business Administration to solidify his knowledge base. His short‑term goal is to become an office manager for the Webster municipal office, where he
    can formalize and standardize office procedures, mentor junior staff, and implement efficiency initiatives that align with the community’s needs. Long‑term, he aspires to apply his expertise to support
    the tribal council’s administrative functions, helping to streamline grant management and community outreach programs, thereby marrying his professional ambitions with his cultural commitment.
