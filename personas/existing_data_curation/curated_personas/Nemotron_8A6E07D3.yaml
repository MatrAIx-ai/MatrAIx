personas:
  professional: Breanna Rao, an aspiring project coordinator and budding data analyst, channels her methodical organization, curiosity about systems, and natural reliability into leading school volunteer
    projects while mastering Python and spreadsheet analytics.
  sports: Breanna Rao follows the Hartford Yard Goats baseball team and the UConn Huskies women's basketball program, participates in a local Saturday morning trail-running club, and volunteers as a timing
    assistant for the town's annual 5K, combining quiet personal fitness with community spirit.
  arts: Breanna Rao finds solace in the acoustic strums of Joni Mitchell, the folk storytelling of Tracy Chapman, and the cinematic scores of Ennio Morricone, while exhibiting her own landscape photographs
    at the North Haven library's monthly art showcase and knitting scarves inspired by Monet's palette.
  travel: Breanna Rao prefers meticulously planned weekend getaways to nearby coastal towns like Mystic and Newport, cherishes a spring hike in the White Mountains, and dreams of a solo autumn leaf-peeping
    trip to Kyoto's Arashiyama bamboo forest, balancing budget constraints with a yearning for quiet, nature-rich experiences.
  culinary: Breanna Rao enjoys cooking simple yet comforting fare such as clam chowder with fresh Atlantic clams, homemade apple crumble topped with cinnamon, and buttery blueberry muffins, often sourcing
    locally farmed produce from the seasonal market and documenting each recipe in a handwritten notebook.
  core: Breanna Rao is a methodical, curiosity-driven teen who blends quiet diligence with a love for nature, code, and community, all while keeping a meticulous budget and battling seasonal allergies.
background:
  cultural: Breanna was raised in North Haven, Connecticut, a suburban New England community with strong emphasis on education, civic engagement, and seasonal outdoor activities. Her family’s white, predominantly
    European American heritage reflects typical regional customs, including celebrating Thanksgiving and Christmas with close family gatherings, participating in local farmers’ markets, and appreciating
    the region’s natural scenery. The community’s values of privacy, independence, and neighborly cooperation have shaped her reserved yet considerate demeanor, while the coastal environment has fostered
    her love of nature and seasonal traditions such as leaf‑peeping in autumn and beach visits in summer.
attributes:
  skills: '["Time management", "Project planning", "Research and information synthesis", "Basic computer operation and troubleshooting", "Written communication", "Volunteer coordination", "Family budgeting
