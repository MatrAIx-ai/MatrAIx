  hobbies: '["Reading mystery novels and science non‑fiction", "Journaling and reflective writing", "Hiking local trails and coastal walks", "Birdwatching", "Landscape photography", "Knitting and crocheting",
    "Playing acoustic guitar", "Learning basic Python coding", "Volunteering at the community library", "Small‑group board game evenings"]'
  career_goals: Breanna aims to complete her GED and enroll in a community college program focused on information technology or business administration. She aspires to become a project coordinator or data
    analyst where she can apply her organizational strengths and curiosity about how systems work. Long‑term, she envisions a stable career that blends practical problem‑solving with continual learning,
    possibly in a nonprofit or municipal setting that values community service and collaboration. She also hopes to acquire professional certifications in data management or basic programming to enhance
    her employability.
