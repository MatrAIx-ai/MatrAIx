  hobbies: '["Hiking", "Mountain biking", "Rock climbing", "Live music events", "Improv comedy", "Craft brewery socializing", "Cooking", "Photography", "Community volunteering (Habitat for Humanity)", "Reading
    tech and science news", "Board games with friends", "Urban gardening"]'
  career_goals: Timothy aims to move into a supervisory role within the next two years, first becoming an assistant manager and then a store manager, where he can shape the team culture and improve store
    performance. In the longer term, he envisions either advancing to a regional retail management position or launching his own boutique that specializes in sustainable outdoor equipment, allowing him
    to combine his curiosity for new retail models with his desire for flexibility and community engagement.
