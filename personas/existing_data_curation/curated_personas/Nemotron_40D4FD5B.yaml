  career_goals: Although currently not in the workforce, Connie aims to leverage her expertise by launching a part‑time consulting service that helps local entrepreneurs and nonprofit groups with financial
    planning and operational efficiency. She plans to earn a nonprofit management certification to better serve as a treasurer for the local school board and to develop a community‑wide financial literacy
    workshop series. Additionally, she hopes to mentor younger women in the area who are pursuing business education, fostering a supportive network that reflects her competitive yet cooperative spirit.
