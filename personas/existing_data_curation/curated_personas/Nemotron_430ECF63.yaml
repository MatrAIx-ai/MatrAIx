personas:
  professional: Ramona Montanezrivera is a senior aerospace engineer who leverages deep expertise in propulsion design, CFD simulation, and systems engineering while harnessing her organized, methodical
    nature and love for abstract visual art to create compelling technical visualizations and lead multidisciplinary teams with a supportive yet assertive mentorship style.
  sports: Ramona Montanezrivera enjoys weekend hikes with the Hill Country Trail Club, follows the San Antonio Spurs and Austin FC for basketball and soccer, and balances her fitness routine with seasonal
    mountain‑bike rides in spring and salsa‑dance cardio sessions, treating exercise as a disciplined yet enjoyable complement to her engineering workload.
  arts: Ramona Montanezrivera spends evenings painting abstract canvases inspired by the interplay of flight and light, draws creative energy from the guitar riffs of Carlos Santana and the storytelling
    of Hayao Miyazaki, and regularly attends gallery openings featuring works by Kehinde Wiley, allowing the arts to inform her innovative approach to aerospace challenges.
  travel: Ramona Montanezrivera meticulously plans her travel, carving out weekend road trips to the Texas Hill Country vineyards and annual astrophotography excursions to Chile’s Atacama Desert, while
    dreaming of a future pilgrimage to Cape Canaveral’s Kennedy Space Center to blend her passion for rockets with a seaside retreat.
  culinary: Ramona Montanezrivera is an experienced home chef who modernizes classic Mexican dishes such as chipotle‑marinated carnitas tacos with avocado‑lime crema and deconstructed mole poblano featuring
    dark chocolate and ancho chilies, often incorporating locally sourced heirloom tomatoes, fresh cilantro, and smoked paprika to create vibrant, flavor‑forward meals.
  core: Ramona Montanezrivera fuses aerospace engineering rigor with artistic curiosity, turning propulsion challenges into vivid visual stories while managing a disciplined work ethic, a penchant for late‑night
    astrophotography, and an occasional splurge on paint supplies during stressful project phases.
background:
  cultural: Ramona is a first‑generation Mexican‑American whose family emigrated from Monterrey, Mexico. Bilingual in Spanish and English, she grew up celebrating Día de los Muertos, Cinco de Mayo, and
    numerous regional festivals, which instilled a strong sense of familia and community. The vibrant colors and storytelling of Mexican muralism inspire her artistic hobbies, while the cultural emphasis
    on perseverance informs her disciplined work ethic. She actively participates in local Hispanic professional networks, mentors students from similar backgrounds, and incorporates traditional Mexican
    culinary and musical traditions into her daily life in Garland, Texas.
