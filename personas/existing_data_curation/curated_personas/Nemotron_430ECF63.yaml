  career_goals: Ramona aspires to become a senior principal engineer leading flagship space‑propulsion projects that prioritize sustainability and reusability. She aims to spearhead a multinational lunar‑landing
    initiative, mentor a pipeline of Hispanic women in STEM, and eventually pursue a master's degree in aerospace systems to deepen her strategic expertise. Her long‑term ambition includes founding an internal
    innovation hub that fuses engineering with artistic design to inspire novel solutions, while advocating for inclusive workplace cultures within the aerospace industry.
