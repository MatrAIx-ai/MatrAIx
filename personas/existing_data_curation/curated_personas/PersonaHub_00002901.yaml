persona_description: A biologist or ecologist who is interested in understanding the relationships between plant growth rates, seed size, and physiology, and how these factors affect the outcomes of competitive
  interactions. This person is likely to be familiar with the concept of relative growth rate (RGR), which measures the rate of growth of individual plants, and the idea that small-seeded species have higher
  RGR, leading to the common belief that small-seeded species possess physiological adaptations for rapid growth. This person may be interested in the study of plant growth models, the development of new
  metrics for measuring intrinsic growth potential, and the implications of interspecific differences in growth parameters for understanding species' physiological adaptations and competitive interactions.
