    ''Coastal hiking and bird‑watching'', ''Gardening native plants'', ''Yoga and mindfulness meditation'', ''Creative writing retreats'', ''Traveling to culturally rich destinations'']'
  career_goals: Amalia aims to advance to a senior HR leadership role, such as HR Director, where she can shape organizational culture on a strategic level. She aspires to integrate her passion for the
    arts into workplace wellness programs, launching initiatives that use creative workshops, gallery visits, and community art projects to boost employee morale and mental health. Over the next five years,
    she plans to earn a senior-level HR certification (e.g., SHRM-SCP) and spearhead a regional partnership between local businesses and the San Juan Islands arts community. Ultimately, she hopes to mentor
    emerging HR professionals, champion inclusive practices, and perhaps transition into consulting for small non‑profits focused on cultural development.
