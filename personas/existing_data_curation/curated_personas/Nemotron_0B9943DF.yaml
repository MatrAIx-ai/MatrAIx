  hobbies: '[''watercolor painting'', ''art museum tours'', ''quilting'', ''gardening'', ''reading historical non‑fiction'', ''crossword puzzles'', ''bridge (card game)'', ''origami'', ''senior dance socials'',
    ''community theater involvement'', ''birdwatching'', ''cooking for gatherings'']'
  career_goals: Although retired from formal work, Kristina aims to continue growing as a community cultural steward. She hopes to curate a traveling exhibit of local artists' work that can be shown in
    Boise schools and senior centers, and to teach a series of art‑appreciation workshops for seniors. She also aspires to complete a memoir that weaves her personal history with Boise's mid‑century development,
    preserving stories for future generations. Additionally, she wants to become a mentor for younger volunteers, helping them develop organizational and leadership skills, and to stay physically active
    by completing the senior walking challenge in Boise County. Her competitive streak drives her to enter regional senior bridge tournaments and to achieve recognition as the top organizer of community
    art events in the county.
