personas:
  professional: A seasoned computer systems analyst, Donnell Mcbride transforms tangled IT environments into clear, actionable designs, using improvisational problem‑solving, strong interpersonal communication,
    and a flair for digital design to bridge technology with the local art scene, and they often channel their creativity into user‑interface concepts that echo gallery aesthetics.
  sports: An energetic pick‑up basketball regular at the Melbourne Community Center, Donnell Mcbride also roots for the Orlando Magic, follows the Tampa Bay Rays in baseball season, and occasionally attends
    Florida Gators football games with fellow alumni, and they use their love of competition to counterbalance work stress.
  arts: A devoted patron of the arts, Donnell Mcbride spends weekends exploring the Space Coast Art Gallery, soaking in live sets by the Blues Brothers tribute band and listening to Miles Davis on vinyl
    while they experiment with Photoshop to re‑imagine classic African‑American art pieces for community workshops.
  travel: A spontaneous road‑trip enthusiast, Donnell Mcbride has driven the length of Florida’s coast from the Gulf Islands to Key West, dived in the Indian River Lagoon, and they dream of photographing
    the cliffs of the Azores while balancing a modest retirement budget and occasional family obligations.
  culinary: A culinary experimenter, Donnell Mcbride whips up modern twists on Southern soul food such as smoked‑paprika collard greens with miso glaze, shrimp and grits infused with black garlic, and sweet‑potato
    pie scented with lavender, and they source fresh Gulf shrimp and locally roasted coffee beans for the perfect flavor pairing.
  core: A curious, socially vibrant 56‑year‑old systems analyst who blends tech expertise with art, Donnell Mcbride lives for improvisational problem‑solving, spontaneous road trips, and community workshops,
    yet they often battle anxiety‑driven overthinking and a habit of forgetting deadlines.
background:
  cultural: Donnell grew up during the civil rights era in the American South before his family settled in Melbourne, Florida. As a Black man, his cultural identity is shaped by African‑American traditions
    of storytelling, music, and community solidarity. He frequently celebrates Juneteenth and participates in church gatherings that emphasize mutual support. His love for jazz, gospel, and soul music reflects
    his heritage, while his involvement in local Black cultural organizations and mentorship programs underscores his commitment to uplifting his community. The proximity to the Space Coast has also sparked
    an appreciation for scientific achievement, blending his cultural pride with a forward‑looking curiosity.
attributes:
  skills: '[''systems analysis'', ''network troubleshooting'', ''database management'', ''IT security assessments'', ''process improvement'', ''stakeholder communication'', ''technical documentation'',
