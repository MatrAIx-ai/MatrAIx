  hobbies: '[''visiting art galleries'', ''attending live jazz and blues concerts'', ''pick‑up basketball'', ''spontaneous coastal road trips'', ''scuba diving in the Indian River Lagoon'', ''photography'',
    ''experimenting with Southern soul food recipes'', ''volunteering at community tech workshops'']'
  career_goals: Donnell aims to transition into a consulting role that blends his technical expertise with his passion for art and community engagement. He envisions mentoring junior analysts and leading
    workshops that teach digital skills to local youth and seniors. Over the next few years, he hopes to develop interactive multimedia projects that showcase African‑American art history, leveraging emerging
    AI tools to streamline system analysis. A core ambition is to achieve a more balanced workload that reduces his anxiety while allowing him to contribute creatively to both the tech and arts scenes of
    Melbourne, FL.
