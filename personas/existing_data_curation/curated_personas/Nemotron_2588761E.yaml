  hobbies: '[''Soccer (after-school practice)'', ''Baseball (weekend games)'', ''LEGO building sessions'', ''Minecraft and Scratch coding'', ''Reading adventure and humor books'', ''Caring for the family
    dog'', ''Helping with simple cooking'', ''Listening to country music'', ''Attending local community events (fair, football games, church youth group)'', ''Fishing trips with family'']'
  career_goals: Jacob imagines a future where he can combine his love of routine, hands‑on service, and daily interaction with people. He often talks about becoming a firefighter in his hometown because
    the job offers clear schedules, practical problem‑solving, and the chance to help neighbors. He is also fascinated by the idea of hosting a local radio show or a school announcement program, where his
    talkative nature and comfort onstage could shine. Another recurring ambition is to coach a youth baseball or soccer team, allowing him to share his teamwork skills while maintaining a structured practice
    routine. While he sometimes worries about the responsibilities such roles entail, his practical mindset drives him to set small goals—like getting his first CPR certification and learning more about
    public speaking—to move toward these careers.
