personas:
  professional: Jacob Cooper, a budding young creator who leads weekly LEGO building sessions and dabbles in Scratch programming, channels their love for routine and sociability into collaborative projects,
    though they often leave structures half‑finished due to a relaxed approach to planning.
  sports: Jacob Cooper, a member of the Hemphill United youth soccer club and the local Little League baseball team, cheers for the Hemphill High Tigers football squad and enjoys weekend fishing trips with
    dad, balancing regular practice routines with spontaneous games, though their relaxed attitude sometimes results in missed drills.
  arts: Jacob Cooper immerses themselves in creative play through LEGO builds, Minecraft adventures, and reading humor‑filled series like 'Diary of a Wimpy Kid' and adventure tales such as 'Percy Jackson,'
    while country radio staples from artists like Luke Bryan fill the house, shaping a vibrant yet grounded artistic identity.
  travel: Jacob Cooper prefers structured outings, favoring familiar road trips to Lake Hemphill for fishing and annual visits to the Hemphill County Fair, yet they dream of a meticulously planned adventure
    to the Grand Canyon and a family vacation in Orlando’s Disney World, balancing routine comfort with a budding curiosity for new horizons.
  culinary: Jacob Cooper enjoys assembling simple meals like peanut butter‑jelly sandwiches, grilled cheese, and mac & cheese, often adding ham or lettuce for extra flavor, and delights in sampling fair
    foods such as corn dogs and funnel cake while occasionally overindulging in sugary snacks after a long soccer match.
  core: Jacob Cooper is a routine‑loving, talkative 10‑year‑old who thrives on social play and hands‑on projects, yet their penchant for worry and occasional disorganization adds a quirky, endearing tension
    to everyday life.
background:
  cultural: Jacob lives in Canadian, Texas, a small, close‑knit community in Hemphill County. His family’s white heritage traces back several generations of West Texas ranching and oil‑field work, embedding
    values of self‑reliance, neighborly support, and traditional Southern customs. Community life revolves around county fairs, high‑school football Saturdays, church gatherings, and outdoor pursuits such
    as fishing and occasional hunting trips. Local radio stations play classic country and western music, and holidays are marked by barbecues, fireworks, and shared meals that reinforce routine and communal
    identity. Growing up amid this blend of rural Texan traditions, family storytelling, and a strong emphasis on practical, hands‑on work has shaped Jacob’s respect for routine, practicality, and close
    social ties.
attributes:
  skills: '[''Verbal communication and storytelling'', ''Basic mechanical repair (bicycle)'', ''LEGO and model building'', ''Pet care and responsibility'', ''Routine organization and scheduling'', ''Adaptability
