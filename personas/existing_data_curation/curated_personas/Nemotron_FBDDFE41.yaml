personas:
  professional: Luis Perezcruz, a purchasing agent for a mid-size technology distributor in Seattle, they leverage advanced Excel modeling, SAP Ariba, and bilingual negotiation skills to secure cost‑saving
    contracts while balancing a flexible, curiosity‑driven approach that often favors innovative sourcing over strict process adherence.
  sports: Luis Perezcruz, an avid hiker of the Cascades and member of the Seattle Outdoor Club, they root for the Seattle Seahawks and Seattle Sounders FC, and squeeze in weekly runs with the local jogging
    group while preferring solo trail climbs over crowded gyms.
  arts: Luis Perezcruz, they immerse themselves in Latin rock legends like Café Tacuba and indie folk icons such as Sufjan Stevens, frequent Seattle’s The Crocodile and Neumos for intimate shows, and gather
    inspiration for photography during quiet evenings with a classic vinyl collection.
  travel: Luis Perezcruz, they plan trips with a blend of spontaneity and careful scouting, often backpacking through the Pacific Northwest’s Olympic Peninsula, dreaming of a culinary pilgrimage to Oaxaca’s
    markets, and keeping an eye on budget‑friendly flights to Mexico City for a family reunion.
  culinary: Luis Perezcruz, a kitchen experimenter, they perfect pozole with locally sourced Dungeness crab broth and reimagine chiles en nogada using cedar‑smoked salmon and wild Oregon hazelnuts, constantly
    tweaking recipes with ingredients like pasilla chile, fresh cilantro, and smoked paprika.
  core: Luis Perezcruz, a competitively curious procurement professional, they love off‑beat recipes, spontaneous hikes, and meticulous budgeting, yet a lingering worry habit and a tendency to let paperwork
    pile up just long enough to spark a last‑minute negotiation sprint.
background:
  cultural: Luis was raised in a Mexican‑American household in the Seattle area, the son of immigrants who arrived from Jalisco in the early 1990s. At home, Spanish was the primary language, and family
    gatherings were marked by traditional foods, music, and celebrations like Día de los Muertos and Cinco de Mayo. These cultural touchstones instilled in him a strong sense of community, a respect for
    hard work, and a love for the flavors of his heritage. Living in the diverse Pacific Northwest has allowed him to blend Mexican customs with the region’s progressive, environmentally‑focused ethos.
    He actively participates in local Mexican community organizations, volunteers at cultural festivals, and uses his bilingual abilities to serve as a cultural bridge in his professional network, especially
    when coordinating with suppliers across the U.S. and Latin America.
attributes:
