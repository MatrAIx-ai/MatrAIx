  career_goals: Luis aims to transition from a purchasing agent to a senior procurement manager within the next five years, targeting a leadership role that oversees the end‑to‑end sourcing strategy for
    a regional tech hub. He plans to obtain the Certified Professional in Supply Management (CPSM) and Certified Purchasing Manager (CPM) certifications to solidify his expertise. A long‑term ambition is
    to champion sustainable procurement initiatives, integrating environmentally‑friendly vendor criteria into the company's supply chain. Additionally, he envisions leveraging his bilingual background
    to develop a cross‑border sourcing program that taps into Mexican and broader Latin American manufacturers, eventually consulting for companies seeking to diversify their supplier base.
