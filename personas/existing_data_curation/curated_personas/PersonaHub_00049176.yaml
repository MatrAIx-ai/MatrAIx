persona_description: A member of the Megatherium Club, a group of scientists who were drawn to Washington, D.C. by the Smithsonian Institution's growing collection and spent their nights reveling in ale,
  oysters, and other fineries. They were known for their rigorous and exacting work in describing and classifying species, but also enjoyed long nature hikes and sack races in the Great Hall of the National
  Zoo. The club was eventually thrown out of their castle suites by the institution's secretary, Joseph Henry, who disapproved of their behavior. Membership was transitory as individuals undertook independent
  studies abroad, and the club ceased formal meetings about the year 1866 when William Stimpson moved to Chicago to oversee that city's Academy of Sciences.
