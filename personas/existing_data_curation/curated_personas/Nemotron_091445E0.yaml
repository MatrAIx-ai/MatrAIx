personas:
  professional: Carlos Castro, a methodical high‑school junior who leads his robotics club’s prototype builds and excels at coordinating group assignments, merges his knack for precise model‑kit assembly
    with budding programming skills to shape an emerging career in technical trades.
  sports: Carlos Castro stays active by playing pick‑up basketball at the local park with the Eastside Hoops club, cheering for the nearby high‑school Broncos and following the Los Angeles Lakers, while
    also enjoying weekend runs to the community track to maintain stamina.
  arts: Carlos Castro immerses themselves in architectural model design and listens to classic ranchera icons like José Alfredo Jiménez and contemporary banda group Banda El Recodo, while occasionally attending
    local community theater productions that celebrate regional storytelling.
  travel: Carlos Castro dreams of road‑tripping along Route 66 to explore vintage automotive museums, has already visited the historic old town of Guanajuato on a family vacation, and hopes to one day experience
    the tech hubs of Tokyo and Berlin.
  culinary: Carlos Castro enjoys honing their cooking chops by preparing traditional tacos al pastor with chipotle‑marinated pork, fresh salsa verde, and hand‑pressed corn tortillas, while also experimenting
    with homemade guacamole using ripe avocados, lime juice, and cilantro.
  core: Carlos Castro, an organized teen with a hands‑on curiosity, channels a love for precise model building into a pragmatic pursuit of a skilled trade career, even if their penchant for over‑planning
    sometimes stalls spontaneous fun.
background:
  cultural: Carlos is a second‑generation Mexican American raised in San Antonio’s vibrant Bexar County community. He grew up speaking Spanish at home while attending English‑language school, giving him
    fluency in both languages. Family and community celebrations such as Día de los Muertos, Cinco de Mayo, and local church festivals are central to his identity. His extended family maintains ties to
    a small town in the state of Jalisco, and traditions like preparing tamales, playing mariachi, and participating in quinceañera preparations are part of his upbringing. The cultural emphasis on family
    support, hard work, and respect for elders shapes his values and future aspirations.
attributes:
  skills: '["Bilingual (Spanish/English)", "Basic computer literacy (Word, Internet research)", "Automotive basic maintenance (oil change, tire rotation)", "Home repair basics (hand tools, minor plumbing)",
    "Organizational planning (school assignments, group projects)", "Culinary basics (preparing Mexican dishes)", "Safety protocol knowledge (first aid, school safety club)"]'
  hobbies: '["Model building (LEGO, plastic kits)", "Robotics club (basic programming, teamwork)", "Basketball (community league)", "Cooking Mexican cuisine with family", "Listening to regional Mexican
    and Tejano music", "Reading DIY and home‑improvement guides"]'
  career_goals: Carlos aims to finish his high‑school education and obtain a GED, after which he plans to enroll in a vocational program to become a certified electrician or automotive technician. He wants
    to combine his practical skills with his dependable nature to secure a stable, well‑paid trade career. In the longer term, he hopes to work alongside his family to expand their small Mexican‑food business,
    possibly opening a second location, and eventually become a small‑business owner who can provide for his extended family.
