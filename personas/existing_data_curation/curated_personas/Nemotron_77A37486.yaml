  hobbies: '["Gardening", "Woodworking / Furniture Making", "Fishing", "Hunting (seasonal)", "Volunteer Home-Repair Ministry", "Historical Non-Fiction Reading", "Model Train Building", "Bridge (card game)"]'
  career_goals: Approaching retirement, Jordan aims to transition from daily site oversight to a mentorship and advisory role, passing his systematic knowledge to the next generation of foremen and apprentices.
    He plans to formalize a succession plan for the family-owned construction firm, ensuring continuity of its reputation for reliability and safety. In the next two to three years, he hopes to obtain a
    Project Management Professional (PMP) certification to strengthen his consulting credentials, and to lead a few select community-development projects that emphasize sustainable building practices and
    long-term durability.
