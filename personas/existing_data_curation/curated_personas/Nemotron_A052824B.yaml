personas:
  professional: Maynard Jones is a visually‑savvy, business‑mind student whose disciplined research habits, meticulous project planning, and charismatic public speaking converge to produce rigorously curated
    interdisciplinary exhibitions and tightly managed creative campaigns, and they thrive on turning abstract concepts into concrete experiences.
  sports: Maynard Jones balances weekend intramural soccer with early‑morning yoga, follows the San Jose Earthquakes and the San Francisco Giants for inspiration, and they sometimes miss scheduled workouts
    when academic deadlines spike, while regularly jogging the Redwood Trail as a member of a local running club.
  arts: Maynard Jones fuels their creative output by dissecting the immersive installations of Olafur Eliasson, the vibrant street murals of Banksy, and the experimental soundscapes of Flying Lotus, while
    regularly sketching in Adobe Illustrator, DJing eclectic vinyl sets at friends’ gatherings, and they also volunteer at the Mendocino Art Center’s avant‑garde gallery nights.
  travel: Maynard Jones favors low‑budget, nature‑centric travel, often backpacking the Pacific Coast Highway to Big Sur, exploring the fog‑shrouded Mendocino Headlands, and they day‑dream about a future
    pilgrimage to the interactive digital art installations at teamLab Borderless in Tokyo, all meticulously organized in Trello itineraries.
  culinary: Maynard Jones enjoys crafting vibrant poke bowls topped with ahi tuna, avocado, and edamame, cooking rosemary‑infused grilled salmon served over quinoa, and they indulge in late‑night bowls
    of spicy miso ramen garnished with a soft‑boiled egg and sliced scallions.
  core: Maynard Jones fuses relentless curiosity with obsessive organization, turning anxiety into a catalyst for endless creative projects, yet they often sacrifice sleep for late‑night editing marathons
    and fall into the habit of over‑analyzing every design decision.
background:
  cultural: Maynard grew up as a white male in Ukiah, a small city in Mendocino County, Northern California. His family’s roots trace back to several generations of European (primarily English and Irish)
    settlers who have long been part of the region’s agricultural and timber industries. The area’s blend of rural tradition, progressive environmental values, and a vibrant local arts scene shaped his
    outlook. From an early age he was exposed to community festivals, farmer’s markets, and a DIY art culture that encouraged experimentation. This environment fostered his appreciation for nature, his
    openness to unconventional ideas, and his competitive drive to stand out while navigating the region’s modest yet close‑knit community dynamics.
