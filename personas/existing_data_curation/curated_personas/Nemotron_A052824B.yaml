  career_goals: Maynard aims to complete his undergraduate studies with a double major in Visual Arts and Business Management, positioning himself for a career at the intersection of creativity and strategy.
    He aspires to become a curator or creative director who can design innovative, interdisciplinary exhibitions that blend art, technology, and community engagement. In the longer term, he envisions launching
    his own art‑tech studio that commissions emerging artists and develops interactive installations. Throughout his professional journey, he is driven to lead high‑impact projects, earn recognition for
    pushing conventional boundaries, and build a reputation for meticulous execution. He also prioritizes personal growth, seeking resilience training to manage his anxiety and maintain his high standards
    under pressure.
