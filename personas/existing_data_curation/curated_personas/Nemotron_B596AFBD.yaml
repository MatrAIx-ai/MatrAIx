personas:
  professional: Thy Leung, a veteran industrial maintenance engineer renowned for precision welding, hydraulic and pneumatic diagnostics, and CNC machine operation, applies their methodical curiosity and
    organized reliability to quietly lead safety initiatives, mentor junior technicians, and architect a data‑driven predictive‑maintenance program aimed at slashing plant downtime.
  sports: Thy Leung, who favors low‑impact exercise, joins the St. Louis River Runners club for regular walks along the Missouri River, roots for the Kansas City Chiefs each fall, and enjoys seasonal cross‑country
    skiing trips to the Black Hills, while generally avoiding competitive team sports.
  arts: Thy Leung, a dedicated calligrapher, draws inspiration from the fluid strokes of Wang Xizhi, the stark black‑and‑white landscapes of Ansel Adams, and the emotive fiddle tunes of Mark O’Connor, weaving
    these influences into evening sessions of brushwork and vinyl listening.
  travel: Thy Leung, who meticulously plans trips that blend industrial heritage tours—such as visits to the Henry Ford Museum in Dearborn and the historic steel mills of Sheffield—with tranquil nature
    retreats at Badlands National Park, dreams of a post‑retirement pilgrimage to the ancient temples of Kyoto and the serene gardens of the Japanese countryside.
  culinary: Thy Leung, an adept home chef, hand‑rolls jiaozi dumplings filled with pork and chives, bakes mooncakes scented with lotus seed paste, and seasons garden‑fresh chicken with prairie herbs like
    sage and wild basil, while occasionally indulging in buttered cornbread for comfort.
  core: Thy Leung, a methodical mechanic with a quiet love for woodwork, calligraphy, and predictive maintenance, balances disciplined routine with occasional tool‑splurges and a stubborn aversion to unsolicited
    small talk.
background:
  cultural: Thy Kelly Leung is a second‑generation Chinese‑American whose grandparents emigrated from Guangdong province to the United States in the 1950s. Growing up in a bilingual household, she was raised
    with both the Confucian emphasis on diligence, respect for elders, and the value of community, as well as the pragmatism of Midwestern American life. She celebrates Lunar New Year and the Mid‑Autumn
    Festival with her family, preserving traditional customs such as cooking festive dishes, hanging lanterns, and exchanging red envelopes, while also participating in local community events in Dickinson.
    Her cultural heritage informs her meticulous work ethic, reverence for learning, and a balanced perspective that honors both innovation and tradition. She remains fluent in Mandarin, and occasionally
    volunteers to teach basic language skills to younger members of the Asian diaspora in North Dakota, fostering a bridge between her East Asian roots and her American home.
attributes:
