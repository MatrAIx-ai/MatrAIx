    and training junior technicians'']'
  hobbies: '[''Woodworking'', ''Scale model building'', ''Technical and historical reading'', ''Gardening (native prairie plants and herbs)'', ''Birdwatching'', ''Nature walks'', ''Calligraphy'', ''Traditional
    East Asian cooking'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Thy Kelly Leung aims to leverage her decades of hands‑on experience to step into a senior supervisory or safety‑lead role within the plant, securing a Level 2 Mechanical Maintenance certification
    and a Certified Maintenance & Reliability Professional (CMRP) credential. She aspires to design and implement a predictive‑maintenance program that integrates sensor data and analytics, reducing unexpected
    downtime. In the longer term, she plans to transition to part‑time consulting or teaching, mentoring the next generation of mechanics at the local technical college, while maintaining a schedule that
    allows ample quiet time and personal projects.
