  hobbies: '[''Building blocks'', ''Crayon drawing'', ''Outdoor exploration (creek, parks)'', ''Bilingual picture books and songs'', ''Cooperative play with peers'', ''Simple puzzles'']'
  career_goals: While still very young, Steven often tells adults he wants to help people when he grows up. He dreams of becoming a kind caretaker—imagining roles like a teacher, a doctor, or a community
    helper—so he can use his natural compassion to make others feel safe and happy. He also expresses interest in exploring the world, asking questions about how things work, and using his practical curiosity
    to find solutions. These early aspirations reflect his desire to combine caring for others with hands‑on, practical activity.
