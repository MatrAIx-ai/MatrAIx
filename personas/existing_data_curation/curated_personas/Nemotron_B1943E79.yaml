personas:
  professional: Steven Leyva is a budding builder who spends afternoons stacking wooden blocks, inventing simple contraptions that balance imagination with the practical need for stability, and often invites
    friends over for collaborative play despite a habit of leaving pieces scattered.
  sports: Steven Leyva loves kicking a soft soccer ball at the neighborhood park, proudly wears a T‑shirt from the local junior team ‘Little Tigers’, and enjoys watching the city’s professional baseball
    team on weekends, often mimicking the pitcher’s wind‑up during backyard play.
  arts: Steven Leyva is enchanted by the melodic tunes of Raffi, sings along to ‘Baby Beluga’, and can spend half an hour drawing pictures of Mickey Mouse and the characters from ‘Bluey’, turning the living
    room floor into an improvised stage for impromptu performances.
  travel: Steven Leyva’s favorite family outings include a day at the San Diego Zoo where they marvel at the giraffes, a weekend beach trip to Santa Monica where they build sandcastles, and a magical visit
    to Disneyland, which fuels their curious imagination for new places.
  culinary: Steven Leyva enjoys creamy mac and cheese, chicken nuggets with ketchup, and banana slices, often helping to stir the batter for pancakes under close supervision, while showing a picky side
    by refusing broccoli and insisting on a side of apple sauce.
  core: Steven Leyva is a curious, compassionate three‑year‑old who blends imaginative play with practical tinkering, hoards coins for tiny treats, battles mild allergies, kicks soccer balls, sings children’s
    songs, dreams of zoos and theme parks, and prefers familiar comfort foods while occasionally being a picky eater.
background:
  cultural: Steven comes from a Spanish heritage family living in Laredo, Texas, a city rich in both Spanish‑European and Mexican‑American cultural influences. At home, Spanish is spoken alongside English,
    giving him early bilingual exposure. His family celebrates traditional Spanish holidays such as Día de los Reyes and combines them with local Tex‑Mex traditions like Día de los Muertos and community
    picnics. The cuisine at home blends Mediterranean tapas‑style dishes with regional Tex‑Mex flavors, and music in the household ranges from Spanish folk songs to Norteño and Tejano tunes. This multicultural
    environment nurtures his curiosity about language, food, and cultural customs while reinforcing values of family cohesion and communal harmony.
