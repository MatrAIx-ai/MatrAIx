  hobbies: '["playing tag and T-ball at the neighborhood park", "pretend school role-play", "drawing and coloring animals and nature scenes", "building with LEGO bricks", "reading picture books", "listening
    to storybooks at the library", "exploring the backyard garden and orchard", "watching butterflies and identifying fruits", "singing and dancing to children''s music"]'
  career_goals: Rachel often talks about what she wants to be when she grows up, and her ideas reflect her love of learning, helping others, and exploring nature. She says she would like to become a teacher
    because she enjoys sharing what she learns with friends and likes the idea of guiding a classroom. She also dreams of being a veterinarian, inspired by visits to the family's local pet clinic and by
    caring for the chickens and goats on nearby farms. Occasionally, she imagines a future as a park ranger, exploring the orchards and protecting the wildlife of the Central Valley. These ambitions blend
    her curiosity about how things work with a practical desire to make a positive difference in the lives of people and animals.
