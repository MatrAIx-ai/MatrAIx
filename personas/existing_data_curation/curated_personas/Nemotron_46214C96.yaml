personas:
  professional: Rachel Ramos, a budding LEGO architect, transforms their love of building blocks and garden exploration into imaginative designs that blend practical instructions with creative twists, often
    sharing their creations with friends during group play.
  sports: Rachel Ramos, who darts through the neighborhood park in spirited games of tag and proudly plays T‑ball for the Little Leaguers of Maple Grove while cheering on the Springfield Sox, blends energetic
    movement with teamwork and a love for cheering on local heroes.
  arts: Rachel Ramos, an avid doodler, fills sketchbooks with bright animal illustrations inspired by the playful styles of Dr. Seuss and Disney’s Frozen characters, and they love repurposing bottle caps
    into mosaics while humming songs from 'The Lion King'.
  travel: Rachel Ramos, who dreams of a family road trip to the nearby Redwood National Park and a magical week at Disneyland, already enjoys weekend outings to the city’s children’s museum and the local
    aquarium, and they often map future adventures with stickers on a travel journal.
  culinary: Rachel Ramos, who adores a rainbow of foods, devours strawberry‑banana smoothies, assembles peanut‑free peanut butter and jelly sandwiches, and frequently helps harvest fresh blueberries and
    raspberries from the backyard garden to sprinkle on oatmeal.
  core: Rachel Ramos, a curious yet delightfully disorganized six‑year‑old, balances imagination with practicality, thriving in group play, colorful art, and garden explorations while occasionally misplacing
    a favorite LEGO piece in the couch cushions.
background:
  cultural: Rachel comes from a white American family living in Visalia, a small city in California's Central Valley. Her upbringing reflects the values of a typical suburban, middle-class household in
    the area, with an emphasis on community involvement, school activities, and appreciation for the surrounding agricultural landscape. The Ramos family participates in local events such as the Tulare
    County Fair, school field trips, and neighborhood block parties, where they share traditions like birthday cakes, holiday meals, and picnics in the park. Although her ethnicity is white, the multicultural
    environment of Visalia, including a strong Hispanic presence, exposes Rachel to a variety of languages, foods, and cultural celebrations, fostering an open and inclusive outlook. Outdoor life, especially
    visits to nearby fruit orchards and the Sierra foothills, has shaped her connection to nature and community.
