  hobbies: '[''Digital drawing'', ''Traditional painting'', ''Speculative fiction reading'', ''Philosophy reading'', ''Creative writing (short stories, poetry)'', ''Acoustic guitar playing'', ''Indie video
    gaming'', ''Hiking'', ''Street photography'', ''Independent film viewing'', ''Experimental music listening'', ''Online art challenges'', ''Puzzle solving'']'
  career_goals: Mark aims to build a compelling portfolio that will earn him admission to a top visual arts program or a scholarship at an art‑focused college. He aspires to become a freelance concept artist
    for video games and independent media, eventually launching his own indie game studio or design consultancy. He seeks recognition in design competitions and hopes to publish a graphic novel series that
    blends surreal visuals with philosophical themes. Long‑term, he envisions a career that balances creative freedom with competitive achievement and financial independence.
