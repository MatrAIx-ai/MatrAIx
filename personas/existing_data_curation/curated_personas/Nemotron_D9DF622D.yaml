  career_goals: 'David aims to move into a senior program‑manager role where he can integrate technology solutions into social‑service delivery, improving efficiency and client outcomes. He plans to obtain
    a certification in health administration or social work to deepen his expertise, and he hopes to mentor junior staff, sharing both his STEM analytical mindset and his compassionate service approach.
    Over the next decade, he envisions leading a community‑focused arts outreach initiative that combines his love of visual art with his commitment to underserved populations, eventually transitioning
    to part‑time consulting to support nonprofit organizations across Texas.


    To support his goals, David is enrolling in a weekend graduate certificate program in public health administration, participating in leadership workshops, and building a professional network through
    the Texas Association of Community Services.'
