  career_goals: At 53, Priyank aims for promotion to shift commander or deputy warden within Cook County corrections, and plans to earn advanced certification in corrections management. He wants to lead
    policy improvements focused on mental-health support and reentry programs, and to transition part-time into a security consultancy role that advises on prison technology upgrades, leveraging his STEM
    expertise. Long-term, he hopes to mentor younger officers and eventually launch a community nonprofit that helps former inmates reintegrate into society, while maintaining a flexible schedule that balances
    his personal priorities.
