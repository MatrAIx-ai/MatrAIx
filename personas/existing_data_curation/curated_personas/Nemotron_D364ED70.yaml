personas:
  professional: Najib Webb, a facilities maintenance specialist, excels at commercial cleaning, preventive upkeep, and OSHA safety compliance, channeling their curiosity for sustainable practices and outgoing,
    team‑oriented personality into mentoring new staff and driving efficiency on every site.
  sports: Najib Webb is an active member of the Milwaukee Softball League and the Lake Shore Fishing Club, roots for the Milwaukee Brewers and Bucks, and spends free weekends hiking Kettle Moraine trails,
    balancing competitive play with community sports involvement.
  arts: Najib Webb immerses themselves in classic rock, favoring bands like Led Zeppelin, The Rolling Stones, and Fleetwood Mac, enjoys reading Popular Science articles and listening to the Science Vs podcast,
    and unwinds with casual video games such as Stardew Valley, reflecting a blend of intellectual curiosity and nostalgic musical taste.
  travel: Najib Webb enjoys weekend getaways to Door County, Mackinac Island, and the Upper Peninsula’s state parks, plans trips with a mix of spontaneity and budgeting, and dreams of hiking the trails
    of Yellowstone and New Zealand’s South Island, always researching eco‑friendly lodging options.
  culinary: Najib Webb loves cooking with garden harvests, regularly preparing grilled trout from their catches, ratatouille, corn on the cob, and hearty beef stew, possesses moderate cooking skills but
    delights in experimenting with bold spices and fresh herbs.
  core: Najib Webb blends practical hands‑on expertise with a community‑first mindset, channeling curiosity and occasional worry into DIY projects, mentoring, and sustainable ambitions while never missing
    a chance to play softball or fish on the lake.
background:
  cultural: Najib grew up in the suburban neighborhoods of Waukesha County, a region known for its strong Midwestern work ethic, community orientation, and modest, friendly demeanor. Raised in a white,
    middle-class family, he attended the local high school before entering the workforce straight after graduation. The cultural fabric of his upbringing is a blend of traditional Protestant values, a love
    for Wisconsin's outdoors—particularly fishing, hunting, and lake activities—and a pride in local customs such as cheese festivals and Fourth-of-July celebrations. This background has instilled in him
    a respect for hard work, reliability, and a collaborative spirit, while also shaping his appreciation for group activities and community service.
