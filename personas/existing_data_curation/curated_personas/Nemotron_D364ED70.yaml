  career_goals: Looking ahead, Najib aims to move into a supervisory role within facilities management, becoming a lead maintenance technician or building manager within the next three to five years. He
    plans to obtain formal certifications such as OSHA 30-hour, BOMA's Facilities Management Professional, and a green-cleaning credential to broaden his expertise. Najib also hopes to leverage his entrepreneurial
    streak by eventually starting a small, locally-owned cleaning and maintenance business that emphasizes sustainable practices and community hiring. Financial stability for his family and the chance to
    mentor younger workers are core motivations behind his career aspirations.
