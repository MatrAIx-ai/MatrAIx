persona_description: A passionate and dedicated independent filmmaker who is interested in preserving the traditional aesthetic quality of celluloid film. This individual is highly skilled in operating
  and shooting with 16mm film cameras, and has a keen interest in understanding the different characteristics and techniques of film stocks and lenses. They are also an expert in conducting film tests,
  keeping camera logs, and communicating with a film laboratory. Additionally, they are skilled in various aesthetic approaches specific to 16mm filmmaking, including lighting directing and editing. This
  individual is interested in producing several short double system films with non-synchronous sound, and is likely to be interested in attending a course that covers the basics of 16mm camera operation
  and shooting techniques using the Arri-SR camera.
