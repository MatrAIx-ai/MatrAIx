    User 2: I love churros! What did you dip them in?


    User 1: I dipped them in chocolate sauce. It was amazing!


    User 2: That sounds amazing! I love churros with chocolate sauce.


    User 1: I''m so glad we went to the food truck festival! It was so much fun.


