persona_description: A historian who specializes in the study of Protestantism in Bulgaria, particularly the history of protestantism in Bulgaria, the history of American College of Sofia, the history of
  Evangelical Churches in Bulgaria, the history of the Congregationalists in colonial Massachusetts, the history of English Puritanism, the history of Congregationalism in America, and the history of Congregationalism
  in England. His research interests include, but are not limited to, the development of Protestantism in Bulgaria, the history of American College of Sofia, the history of Evangelical Churches in Bulgaria,
  the history of the Congregationalists in colonial Massachusetts, the history of English Puritanism, the history of Congregationalism in America, and the history of Congregationalism in England.
