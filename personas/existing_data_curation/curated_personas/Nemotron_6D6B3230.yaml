personas:
  professional: Bonny Trotman, an aspiring junior engineer and illustrator, blends a fascination for LEGO® mechanisms with a practical love for animal drawings, often immersing in self-directed projects
    that start enthusiastically but may be left unfinished when attention drifts, reflecting a relaxed, flexible approach to tasks they enjoy.
  sports: Bonny Trotman, who enjoys chasing butterflies on nature walks and participates in a toddler soccer class called the Little Leapers, casually cheers for the city’s major baseball team, the River
    City Rivermen, and keeps activity light and fun rather than regimented, they often end the day with a quiet stretch in the backyard.
  arts: Bonny Trotman, who spends afternoons filling sketchbooks with dog and horse illustrations while humming to Raffi’s ‘Baby Beluga’ and proudly reciting lines from the animated classic My Neighbor
    Totoro, they find artistic identity in the blend of gentle children’s music and whimsical storytelling.
  travel: Bonny Trotman, a curious little explorer who prefers spontaneous day-trips over meticulous itineraries, delights in visits to the neighborhood zoo to see real horses and dogs, dreams of a family
    vacation to the seaside town of Savannah’s historic squares, and occasionally savors the occasional airplane ride for a weekend stay at a Disney resort, they cherish each new scenery as a canvas for
    their sketchbook.
  culinary: Bonny Trotman, a budding foodie who confidently spreads peanut butter on banana slices, mixes pre-made mac and cheese with shredded cheddar, and loves sipping warm strawberry milk, they often
    help stir batter for cupcakes under watchful eyes, while remaining skeptical of broccoli.
  core: Bonny Trotman, a quietly curious six‑year‑old who channels their love for animals into vivid drawings, worries over tiny details, and occasionally leaves LEGO projects half‑built while clutching
    a beloved stuffed rabbit for comfort, they often seek reassurance from a grown‑up before starting a new picture.
background:
  cultural: Bonny Rose grows up in a white, middle‑class family in Wynantskill, a suburban‑rural community in Rensselaer County, New York. Her family celebrates traditional American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, often with apple‑picking trips to nearby orchards and visits to the local county fair. She attends the local public elementary school, where the curriculum emphasizes
    reading, math, and community values. The Hudson Valley’s natural scenery and the region’s historic Dutch‑settler heritage influence her appreciation for outdoor exploration, seasonal changes, and local
    history.
attributes:
  skills: '["Reading simple sentences", "Recognizing letters and phonics", "Counting objects up to 20", "Basic addition with manipulatives", "Fine motor tasks: cutting with child‑safe scissors and coloring
    within lines", "Building simple structures with blocks", "Asking curious questions about how things work", "Cooperating with a small group during play", "Demonstrating basic self‑care such as dressing
    independently"]'
  hobbies: '["Drawing and coloring animals", "Reading picture books", "Constructing with building blocks and LEGO bricks", "Nature walks and leaf/rock collecting", "Simple jigsaw puzzles", "Pretend play
    with dolls and dollhouse", "Listening to soft children’s music"]'
  career_goals: Bonny Rose dreams of becoming a veterinarian because she loves animals and wants to use her curiosity to understand how they feel and stay healthy. She also imagines being a teacher one
    day, sharing stories and simple science facts with younger children in a calm, supportive setting. Her practical side hopes for a career that combines hands‑on work with clear, reliable methods, allowing
    her to help others feel safe and less worried.
