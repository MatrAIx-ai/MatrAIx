  career_goals: Approaching retirement, Alex aims to transition into a senior advisory role where he can mentor younger caretakers and formalize his knowledge into a comprehensive SOP manual for the sanctuary.
    He plans to obtain certification as a wildlife rehabilitator, help launch a community‑based conservation center in St. Lucie County, and create a school curriculum that integrates local ecosystem studies.
    Over the next five years, he hopes to publish a guidebook on best practices for small‑scale animal care and to serve as a consultant for regional wildlife facilities, ensuring his legacy of calm, diligent
    stewardship endures.
