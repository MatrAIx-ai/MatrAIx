  hobbies: '[''Birdwatching'', ''Native Plant Gardening'', ''Woodworking (Animal Enrichment Toys)'', ''Reading Natural‑History Books'', ''Volunteering at Nature Festivals'', ''Yoga for Seniors'', ''Wildlife
