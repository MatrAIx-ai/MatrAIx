personas:
  professional: An aspiring community outreach coordinator, Noah Phelps leverages their natural people‑connecting talent, basic graphic design knack, and tech troubleshooting skills to craft social‑media
    campaigns and organize volunteer events for youth mental‑health advocacy, even though they often wrestle with deadlines and a dislike for rigid structure.
  sports: A weekend thrill‑seeker, Noah Phelps spends Saturdays mastering tricks at the local Skate City park, hikes the Sierra foothills with the Sierra Trail Crew, and passionately roots for the Sacramento
    Kings while they occasionally catch a Golden State Warriors game on TV.
  arts: A creatively‑inclined performer, Noah Phelps strums acoustic covers of John Mayer and Ed Sheeran, hones improv sketches inspired by Bo Burnham, captures candid street shots reminiscent of Brandon
    Stanton, and edits short videos set to Billie Eilish tracks for their animal‑shelter fundraiser, and they love sharing the final cuts with friends.
  travel: A spontaneous explorer, Noah Phelps has backpacked through Yosemite’s granite cliffs, road‑tripped to Lake Tahoe for sunrise hikes, and dreams of a budget‑friendly cultural immersion in Mexico
    City’s vibrant markets, and they prefer last‑minute itineraries over rigid travel plans.
  culinary: An experimental home chef, Noah Phelps whips up miso‑glazed salmon, avocado‑lime tacos, and occasional sourdough starter experiments, delighting in the aroma of fresh cilantro and the crunch
    of toasted sesame seeds, though they sometimes forget to set timers and end up with charred edges.
  core: Noah Phelps is a charismatic, impulsive 19‑year‑old who thrives on spontaneous connection, juggles anxiety with journaling, and often trades structure for creative bursts, even if that means they
    miss deadlines and burn toast.
background:
  cultural: Noah grew up in a middle‑class white family in the Sacramento suburbs, with parents who worked as a civil engineer and a public‑school teacher. His upbringing exposed him to the diverse cultural
    tapestry of the Central Valley, from farm‑to‑fork festivals to community art projects. The West‑Coast emphasis on environmental stewardship and progressive social values shaped his openness to new ideas
    and his desire to support others. At the same time, periodic visits to more conservative hometown gatherings gave him an awareness of differing perspectives, reinforcing his cooperative and harmony‑seeking
    nature. This blend of mainstream American culture and localized Sacramento influences informs his worldview, his love of community events, and his commitment to inclusive, people‑focused initiatives.
attributes:
  skills: '[''Interpersonal communication'', ''Public speaking'', ''Social media engagement'', ''Basic graphic design'', ''Event coordination'', ''Peer counseling'', ''Troubleshooting computer hardware/software'',
