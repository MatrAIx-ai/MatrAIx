  hobbies: '[''Playing acoustic guitar'', ''Improv comedy'', ''Skateboarding'', ''Hiking in the Sierra foothills'', ''Volunteering at animal shelters'', ''Attending live music shows'', ''Exploring podcasts'',
    ''Cooking experimental recipes'', ''Journaling for mental health'']'
  career_goals: Noah plans to enroll in a community college to study communications and psychology, aiming for a career that blends his sociable nature with a desire to help others. He dreams of becoming
    a community outreach coordinator or public relations specialist for a nonprofit focused on youth mental‑health advocacy. In the longer term he hopes to launch his own peer‑support organization that
    offers workshops, crisis resources, and creative outlets for young adults dealing with anxiety and depression. He sees his curiosity and practicality as assets for developing innovative programs while
    learning to manage deadlines and organization more effectively.
