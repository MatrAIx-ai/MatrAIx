persona_description: A biochemist or a scientist working in the field of metabolomics or biofluid analysis who is interested in the study of glycolysis and its role in energy metabolism in anaerobic eukaryotes.
  They are particularly interested in the identification of metabolites involved in glycolysis and the pathways related to it. They are familiar with the structure and function of the molecules involved
  in glycolysis and their importance in the energy metabolism of anaerobic eukaryotes. They are also interested in the horizontal gene transfers that occurred in the glycolytic pathway of Monocercomonoides
  and the implications of these transfers for the lineage of protists known as Ecavata. They are also interested in the use of glucose metabolites of Monocercomonoides to determine its lineage and the importance
  of this information in understanding the evolutionary relationships between different organisms.
