persona_description: A person who is aware of the critical role of government anti-poverty programs in alleviating poverty among working-age adults without a college degree, particularly among white working-class
  adults. This individual is likely to be informed about the disparities in poverty rates between different racial and ethnic groups, particularly the higher poverty rate among white working-class adults
  without a college degree. They would also be familiar with the unique challenges faced by working-class white Americans, such as the concentration of poverty in their communities and the barriers to upward
  mobility. This person is likely to be engaged in discussions about the need for policies that promote economic opportunity and reduce income inequality, particularly in relation to the safety net programs
  that help lift people out of poverty.
