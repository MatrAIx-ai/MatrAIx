  career_goals: Carla dreams of one day becoming a teacher or an artist who can help children explore creativity and understand their feelings. She also imagines working as a veterinarian because of her
    love for animals, and feels excited about the idea of being a scientist or astronaut to discover new ideas. Her goal is to combine her organized nature with her artistic passion to create supportive,
    art‑rich learning environments.
