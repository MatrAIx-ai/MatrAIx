personas:
  professional: Richard Pinckney is a 27‑year‑old construction project coordinator who blends hands‑on building expertise with a humanities‑sharp critical eye, using BIM, Procore, and AutoCAD to keep affordable‑housing
    projects on track while mediating between trades, vendors, and community stakeholders; their curiosity drives them to explore sustainable methods, yet they often rely on proven practices and a flexible
    schedule that tolerates occasional disorganization.
  sports: Richard Pinckney stays fit by playing pickup basketball at Prospect Park, cheering for the Brooklyn Nets and New York Knicks, and belongs to the community league ‘Brooklyn Hoops,’ while occasionally
    joining a summertime spin class at a local gym to balance cardio with strength.
  arts: Richard Pinckney immerses themselves in Brooklyn’s street‑art scene, capturing historic brownstones with a Leica camera, while listening to jazz legends like Kamasi Washington and hip‑hop icons
    such as Kendrick Lamar, playing acoustic guitar and producing beats on Ableton, and finding inspiration in the novels of James Baldwin and Toni Morrison during coffee‑filled afternoons at the local
    café.
  travel: Richard Pinckney prefers spontaneous, culturally rich trips, having explored Jamaica’s reggae festivals and New Orleans’ jazz streets, while dreaming of a weekend in Barcelona to study modernist
    architecture, and often plans short weekend getaways using a flexible budget that accommodates last‑minute train tickets.
  culinary: Richard Pinckney enjoys cooking Caribbean‑inspired meals like jerk chicken with scotch bonnet peppers, curried goat with allspice, and plantain roti, boasting a moderate skill level that balances
    experimental spice blends with family‑passed recipes, and relishes tasting new dishes at Smorgasburg, especially the mango‑lime ceviche.
  core: Richard Pinckney is a curiosity‑driven, community‑focused builder who juggles music, photography, and sustainable construction, often forgetting to file paperwork on time but always finding time
    for coffee, basketball, and a fresh batch of jerk spice.
background:
  cultural: Richard grew up in a predominantly Black neighborhood in Brooklyn, surrounded by the vibrant rhythms of hip‑hop, gospel, and Caribbean music that shaped his identity. His family’s roots trace
    back to the Southern United States and the Caribbean, and cultural traditions like Sunday church services, community block parties, and family cooking nights have been central to his upbringing. He
    is proud of his African‑American heritage and stays connected through local cultural organizations, historical preservation societies, and annual celebrations such as Juneteenth. This background fuels
    his commitment to community development, social equity, and preserving the cultural fabric of the neighborhoods he works in.
