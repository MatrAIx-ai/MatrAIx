  career_goals: Richard aspires to rise to senior project manager within a firm that specializes in affordable housing and community‑centered development in Brooklyn. He plans to earn a professional certification
    in construction management (e.g., CM, PMP) and eventually pursue a master’s degree that integrates urban planning and sustainability. His long‑term ambition is to launch his own socially‑responsible
    construction company that partners with local non‑profits to create green, accessible spaces for underserved neighborhoods. He also hopes to mentor young workers, particularly those from under‑represented
    backgrounds, and to become a recognized advocate for inclusive, safe, and environmentally conscious building practices.
