  hobbies: '["Reading newspapers and classic literature", "Gardening and seed saving", "Cooking and recipe experimentation", "Crocheting and quilting", "Attending church and community festivals", "Walking
    and birdwatching in the desert", "Video chatting with family", "Oral storytelling sessions"]'
  career_goals: Even at 95, Bianca's ambition centers on leaving a lasting legacy for her family and community. She is dedicated to documenting her family's recipes and stories in a handwritten memoir that
    she hopes will be passed down to future generations. Bianca aims to mentor younger community members by offering informal cooking lessons and gardening workshops at the Yuma senior center, balancing
    her curiosity for new ideas with a practical approach that respects traditional methods. She also aspires to ensure that her grandchildren and great‑grandchildren retain fluency in Spanish and an appreciation
    for Mexican cultural traditions, while gently encouraging them to explore modern tools such as video calls and digital photo archives to keep the family history alive.
