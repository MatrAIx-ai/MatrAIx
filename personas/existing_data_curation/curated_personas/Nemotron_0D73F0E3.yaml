  career_goals: William aims to transition from generic telemarketing to a technical sales or solutions consulting role where he can leverage his STEM background. In the next three years he plans to earn
    Salesforce Certified Administrator and JavaScript fundamentals certifications, positioning himself for an inside‑sales engineer position at a mid‑size tech company. Longer‑term, he envisions leading
    a small sales team, and eventually launching a boutique consultancy that helps startups integrate user‑centric design with robust technology solutions, merging his love for art, innovation, and data‑driven
    strategy. He values a stable work‑life balance to manage his tendency toward worry and stress.
