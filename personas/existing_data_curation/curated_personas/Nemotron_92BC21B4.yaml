    ''Strategy board games'', ''Community clean‑up events'']'
  career_goals: He hopes to earn his GED within the next year and then enroll in a vocational program, targeting either HVAC or electrical certification. His longer‑term ambition is to become a licensed
    tradesperson who can run his own small handyman or home‑improvement business, offering reliable services to his community. He also wishes to deepen his artistic side by contributing to local mural projects
    and perhaps taking community‑college art classes. Ultimately, he wants a stable, well‑paid career that lets him apply his methodical approach while also leaving room for creative expression.
