personas:
  professional: Jody Bartlett, a one-year-old explorer who meticulously stacks wooden blocks and lines up colorful shape sorters, demonstrates an early love for organized play and a curiosity that favors
    unconventional ways of solving simple puzzles, and they often repeat the same patterns to test cause-and-effect.
  sports: Jody Bartlett, a one-year-old who attends parent‑led baby gymnastics at the community center, splashes delightedly in infant swim lessons, and watches the local baseball team’s mascot on television,
    channels boundless energy into playful movement and they sometimes compete with peers to be the first to complete a mini obstacle.
  arts: Jody Bartlett, a one-year-old who is captivated by bright picture books, the rhythmic lullabies of Raffi, and the soft tinkling of a toy xylophone, often babbles along to the melody and attempts
    to mimic drum beats with tiny hands, and they show a surprising appreciation for colors and patterns.
  travel: Jody Bartlett, a one-year-old who has been whisked away on family trips to a coastal beach in South Carolina and a weekend visit to a countryside farm in Vermont, prefers stroller rides with windows
    overlooking scenery, and they become fascinated by new textures, sounds, and the occasional sea breeze.
  culinary: Jody Bartlett, a one-year-old who adores buttery mashed sweet potatoes and banana slices, consistently rejects peas and broccoli, frequently makes a mess with finger foods, and they enjoy the
    occasional baby‑friendly hummus dip with soft pita bits, turning each meal into a sensory adventure.
  core: Jody Bartlett, a one-year-old bundle of curiosity who loves organized play, hoards tiny treasures, battles mild eczema with diligent care, splashes in baby classes, hums lullabies, explores new
    places with a stroller, and they turn every meal into a delightful mess.
background:
  cultural: Jody is a white American raised in Tracy, a city in California’s San Joaquin Valley. His family has deep ties to the region’s agricultural and small‑business community, fostering a blend of
    traditional working‑class values and the multicultural, progressive atmosphere of central California. Growing up, he experienced the rhythms of seasonal farm work, local community gatherings, and the
    modest suburban environment of Tracy. This background has given him a strong sense of community responsibility, an appreciation for practical skills, and an openness to diverse cultural expressions,
    especially through local art and music scenes.
