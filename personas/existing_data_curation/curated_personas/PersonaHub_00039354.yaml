persona_description: A public health advocate and researcher who is passionate about the global fight against antimicrobial resistance. They are a member of the European Parliament and have been vocal about
  the need for coordinated EU action to combat this global problem. They have experience in healthcare policy and have been involved in the development of the Innovative Medicines Initiative program to
  support the development of new antibiotics. They are also familiar with the global action plan on antimicrobial resistance developed by the World Health Organization and have advocated for its implementation.
  They are committed to reducing the use of antibiotics in agriculture and have called for a ban on the routine prophylactic use of antibiotics in farming.
