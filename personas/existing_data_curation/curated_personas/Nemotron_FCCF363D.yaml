  hobbies: '[''Reading self‑help and DIY books'', ''Balcony herb and flower gardening'', ''Cooking Southern and Caribbean dishes'', ''Attending church gatherings and community events'', ''Volunteering at
    a local community center'', ''Knitting and crocheting'', ''Listening to R&B and gospel music'', ''Walking in local parks'', ''Participating in African‑American cultural festivals'', ''Watching home
    renovation shows'']'
  career_goals: Tabatha aims to transition from front‑line housekeeping to a supervisory role within the next two years, wanting to lead a team of cleaners at a reputable property‑management firm in Orlando.
    She plans to complete her associate degree in hospitality management and obtain a Certified Professional Cleaner credential to reinforce her expertise. Long‑term, she dreams of launching her own boutique
    cleaning service that emphasizes green practices and provides employment opportunities for other Black women in her community. Alongside career advancement, Tabatha seeks to achieve a more balanced
    workload that reduces stress, allowing her to spend quality time with her family and pursue personal development.
