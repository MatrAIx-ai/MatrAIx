personas:
  professional: Tabatha Boyd, a seasoned housekeeper with over two decades of experience in deep‑cleaning residential and commercial spaces, blends eco‑friendly techniques with OSHA‑compliant safety practices
    while leveraging their business administration training to manage inventory, scheduling, and client communication; they now strives to step into a supervisory role at a property‑management firm and
    eventually launch a boutique cleaning service that empowers local women.
  sports: Tabatha Boyd avidly follows the Orlando Magic in the NBA and Orlando City SC in MLS; they also participate in a local walking club every Saturday morning and join a community pickleball league
    at the neighborhood recreation center, using these activities as both social engagement and stress relief.
  arts: Tabatha Boyd finds inspiration in the soulful melodies of Anita Baker, the smooth vocals of Luther Vandross, and the improvisational brilliance of Miles Davis, as well as the uplifting harmonies
    of a local gospel choir; they often knit while listening and they regularly attend spoken‑word poetry slams and community theatre productions to stay connected to creative expression.
  travel: Tabatha Boyd prefers short, well‑planned road trips that blend cultural immersion and relaxation, such as exploring Savannah’s historic squares, tasting Caribbean flavors in Barbados, and hiking
    the trails of Everglades National Park; they always book budget‑friendly Airbnbs and coordinate travel around family obligations and limited vacation days.
  culinary: Tabatha Boyd delights in cooking Southern staples like shrimp étouffée, gumbo, and collard greens alongside Caribbean flavors such as jerk chicken, mango salsa, and plantain mofongo, frequently
    polishing the dishes with fresh herbs from their balcony garden and they experiment with a rotating collection of hot sauces and spice blends.
  core: Tabatha Boyd balances a meticulously organized cleaning career with a passion for soulful music, vibrant cooking, and community service, while they contend with a habit of over‑worrying and occasional
    splurges on DIY supplies.
background:
  cultural: Tabatha identifies as African American and grew up in a close‑knit Black community in Central Florida, where family, church, and cultural traditions play a central role. Her upbringing was steeped
    in the culinary flavors of the South, storytelling, and the rhythmic sounds of gospel and R&B, all of which continue to shape her daily life. She takes pride in celebrating milestones such as Juneteenth
    and Kwanzaa, and she often incorporates these traditions into family gatherings. Tabatha’s cultural heritage informs her strong sense of resilience, community responsibility, and a desire to uplift
    other Black women through mentorship and entrepreneurial initiatives.
