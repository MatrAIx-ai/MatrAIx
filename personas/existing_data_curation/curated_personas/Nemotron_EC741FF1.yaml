personas:
  professional: Joy Lewis, a 31-year-old licensed practical nurse at a busy urban hospital, leverages advanced wound-care certification and emerging EKG skills to deliver calm, precise care while mentoring
    peers, and they are already mapping out a hospital-based art-therapy program that merges clinical rigor with creative expression.
  sports: Joy Lewis, an avid hiker, joins the Jean Lafitte Park Trail Club for weekend treks, follows the New Orleans Saints and Pelicans religiously, and they squeeze in evening spin-class sessions at
    a local gym, while occasionally playing pickup softball in an LPN alumni league.
  arts: Joy Lewis, a frequent visitor to the New Orleans Museum of Art and a regular at Frenchmen Street jazz nights, sketches the historic French Quarter architecture, draws inspiration from painter George
    Rodrigue and photographer William Eggleston, and they keep a playlist of Dr. John, the Preservation Hall Jazz Band, and local blues legends while editing their own wetland photographs for a personal
    blog.
  travel: Joy Lewis, an organized yet spontaneous traveler, prefers weekend road-trips to nearby historic towns like Savannah and Charleston, dreams of a photography expedition to the Everglades and a cultural
    immersion tour of Provence, and they balance these adventures with a modest travel fund that limits long-haul trips to once a year, usually to destinations like Mexico City or New York for art festivals.
  culinary: Joy Lewis, an enthusiastic Cajun home-cook, masters dishes such as gumbo, jambalaya, and crawfish étouffée using ingredients like andouille sausage, okra, and file powder, and they often experiment
    with fresh catfish and crawfish caught during bayou outings, while pairing meals with a chilled glass of Pinot Noir and a side of crusty baguette.
  core: Joy Lewis, a 31-year-old nurse who fuses clinical precision, artistic curiosity, and a competitive drive, they navigate healthcare, finances, and leisure with disciplined organization and a love
    for New Orleans' vibrant culture.
background:
  cultural: Joy grew up in a middle‑class white family in the Greater New Orleans area, absorbing Southern values of hospitality, self‑reliance, and community involvement. Though raised primarily in a Protestant
    tradition, she embraces the region’s multicultural flavors, from Cajun music and zydeco to the Mardi Gras celebrations that color Westwego. This blend of Southern heritage and the artistic vibrancy
    of Louisiana informs her appreciation for creative expression and her commitment to serving a diverse patient population.
attributes:
  skills: '[''Patient assessment'', ''Wound care'', ''Medication administration'', ''IV therapy'', ''Vital signs monitoring'', ''Electronic health record documentation'', ''Infection control'', ''Patient
    education'', ''Basic EKG interpretation'', ''Emergency response'']'
  hobbies: '[''Sketching'', ''Photography'', ''Reading contemporary nonfiction and medical journals'', ''Cooking Cajun cuisine'', ''Hiking'', ''Volunteering at health fairs'', ''Exploring art galleries'']'
  career_goals: Joy aims to transition to a Registered Nurse by completing an associate degree at a community college while maintaining her LPN duties. She plans to specialize in emergency or acute care,
    earn certifications in trauma nursing and wound management, and eventually become a charge nurse or nurse educator. Passionate about art therapy, she hopes to develop a hospital‑based program that integrates
    creative expression into patient recovery, and she strives to be recognized as a top performer in her unit.
