persona_description: Thomas Hart Benton was an American painter and muralist who celebrated the courage and stoic endurance of rural America and defied the rising tide of abstract art. He was at the forefront
  of the Regionalist art movement, and his work is strongly associated with the Midwestern United States. Benton studied in Paris, lived in New York City for more than 20 years, and painted scores of works
  there, summered for 50 years on Martha's Vineyard off the New England coast, and also painted scenes of the American South and West. His work is known for its fluid, sculpted figures in everyday people
  in scenes of life in the United States.
