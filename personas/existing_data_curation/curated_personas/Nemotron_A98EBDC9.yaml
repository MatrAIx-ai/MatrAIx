  hobbies: '[''Bullet journaling'', ''Morning runs'', ''Weightlifting'', ''Crossword puzzles'', ''Sudoku'', ''Strategic board games'', ''DIY home improvement'', ''Community clean‑up volunteering'', ''Chicago
