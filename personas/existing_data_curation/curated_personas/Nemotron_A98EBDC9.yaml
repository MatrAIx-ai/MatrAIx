  career_goals: Andrew aims to secure a stable, structured role where his organizational strengths can drive measurable results, such as an operations coordinator or junior project manager in a manufacturing
    or logistics firm. He plans to earn a Project Management Professional (PMP) certification and pursue an associate’s degree in business administration within the next two years. In the long term, he
    aspires to advance to an operations manager position or launch his own small‑scale service business—perhaps a neighborhood cleaning or home‑maintenance company—where he can implement clear processes
    and uphold high performance standards.
