  hobbies: '[''Quilting'', ''Sewing decorative textiles'', ''Cooking Mexican cuisine'', ''Gardening'', ''Volunteer sewing instruction'', ''Yoga'', ''Reading mystery novels'']'
  career_goals: Cecilia aims to move into a supervisory or operations‑manager role within the textile manufacturing sector, where she can lead a team in implementing sustainable production practices and
    lean‑manufacturing techniques. She plans to pursue a bachelor’s degree in industrial management or textile engineering to complement her hands‑on experience. Long‑term, she hopes to mentor apprentices
    from underrepresented communities and perhaps launch a community‑focused tailoring service that provides affordable clothing alterations while offering job training to local residents.
