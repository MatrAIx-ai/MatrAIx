personas:
  professional: Cecilia Ravelo, a seasoned textile presser renowned for precise garment finishing and expert operation of industrial pressing machines, leverages their organized, methodical approach and
    exceptional compassion to streamline production schedules, mentor staff, and drive lean, sustainable initiatives as they aim for a supervisory position.
  sports: Cecilia Ravelo enjoys weekend walks with the River Bend Walking Club, plays doubles tennis at the Alamo City Tennis Club during spring, and loyally supports the River City FC professional soccer
    team, attending matches whenever the schedule aligns with their family commitments.
  arts: Cecilia Ravelo merges their love for quilting with contemporary design, drawing inspiration from Sheila Hicks’s large‑scale textile installations and Anaïs Mitchell’s storytelling songs, while frequently
    visiting the downtown fiber‑art gallery and collecting vintage 1960s sewing patterns that fuel their creative projects.
  travel: Cecilia Ravelo has explored the spice‑laden souks of Marrakech, admired the silk‑weaving workshops of Kyoto, savored authentic mole and tamales in Oaxaca, and now dreams of touring the textile
    museums of Barcelona and the vineyards of Mendoza for both cultural enrichment and culinary inspiration.
  culinary: Cecilia Ravelo crafts mole using pasilla chilies, cacao nibs, and toasted sesame seeds, prepares tamales with freshly milled masa and pork filling, and seasons a garden harvest of cilantro,
    oregano, and sage into everyday meals, often pairing dishes with a crisp Albariño to highlight the flavors.
  core: Cecilia Ravelo is a methodical textile presser with a green‑leaning managerial vision, disciplined budgeting, health‑focused routines, and a quiet passion for quilting that fuels community mentorship.
background:
  cultural: Cecilia was raised in a Mexican‑American household, celebrating traditions like Día de los Muertos, quinceañeras, and weekend family gatherings centered around homemade tortillas and salsa.
    Bilingual in Spanish and English, she maintains close ties with the Mexican community in Chicago, attending cultural festivals and supporting local NGOs that serve immigrant families. Her heritage informs
    her strong sense of community, hospitality, and the value she places on familial and neighborly support.
attributes:
  skills: '[''Industrial pressing operation'', ''Fabric quality inspection'', ''Production scheduling'', ''Inventory control'', ''Safety compliance'', ''Process improvement'', ''Staff training and mentorship'',
