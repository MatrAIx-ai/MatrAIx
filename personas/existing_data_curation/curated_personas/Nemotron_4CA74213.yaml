  hobbies: '[''Visiting art galleries'', ''Exploring coffee culture'', ''Hiking coastal trails'', ''Yoga and meditation'', ''Flamenco dancing'', ''Cooking Mediterranean dishes'', ''Volunteering at community
    shelters'', ''Reading contemporary fiction'', ''Participating in local book clubs'']'
  career_goals: Cynthia aims to progress from front‑of‑house host to a supervisory or management role within the next three years, leveraging a hospitality‑management certification she plans to complete
    at a community college. Her long‑term ambition is to open her own coffee‑gallery hybrid space in San Diego, where she can showcase emerging local artists while serving ethically sourced coffee and Spanish‑inspired
    pastries. She also wants to develop formal programs for employee well‑being, such as stress‑relief workshops, reflecting her desire to reduce the anxiety she often feels in high‑pressure settings. Additionally,
    she hopes to become a community liaison, using her interpersonal strengths to coordinate charitable events and art‑education outreach in underserved neighborhoods.
