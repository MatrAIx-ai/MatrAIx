personas:
  professional: Cynthia Corchado, a seasoned hospitality host with a knack for diffusing tense moments through calm empathy, channels her curiosity and sociable energy into curating pop‑up art events, while
    her relaxed approach to planning sometimes leads to last‑minute schedule shuffles, all in pursuit of opening a coffee‑gallery hybrid that doubles as a wellness hub.
  sports: Cynthia Corchado enjoys weekend hikes along the cliffs of Torrey Pines with the local Torrey Pines Hiking Group, plays casual beach volleyball with the Sunset Surf Club during summer, and roots
    for the San Diego Wave FC and the San Diego Padres, using these community sports connections to stay active and socially engaged.
  arts: Cynthia Corchado visits the San Diego Museum of Contemporary Art weekly, finds inspiration in works by Mark Bradford, Kehinde Wiley, and Ai Weiwei, attends flamenco shows featuring José Montalvo,
    dives into contemporary novels by Sally Rooney and Ocean Vuong, and channels this creative energy into her own photography and curatorial ideas for future pop‑up showcases.
  travel: Cynthia Corchado prefers low‑key, immersive trips that weave art and food, having wandered the streets of Seville for flamenco, explored the pastel villages of Cinque Terre, road‑tripped along
    the Pacific Coast to Big Sur, and dreaming of the Venice Biennale, all while juggling a modest travel budget that forces last‑minute bookings and boutique B&B stays.
  culinary: Cynthia Corchado enjoys cooking Mediterranean fare, especially a saffron‑infused paella packed with mussels, chorizo, and peas, and a spread of tapas including patatas bravas, marinated olives,
    and gambas al ajillo; they also experiment with locally sourced espresso beans and artisan pastries, improvising with fresh cilantro, smoked paprika, and ripe tomatoes to create vibrant, home‑cooked
    meals for friends.
  core: Cynthia Corchado blends hospitality expertise, artistic curiosity, and compassionate community spirit into a flexible yet slightly anxious life rhythm, punctuated by spontaneous art‑filled outings,
    mindful hikes, and a perpetual dream of a coffee‑gallery sanctuary.
background:
  cultural: Cynthia was born to Spanish immigrants who preserved many customs from Andalusia while adapting to Southern California life. She grew up bilingual, celebrating holidays such as Semana Santa
    and Día de los Reyes with traditional foods, music, and family gatherings. The blend of Spanish Mediterranean sensibilities and the eclectic, laid‑back culture of San Marcos has shaped her worldview,
    giving her a deep appreciation for art, community, and culinary diversity. Her heritage informs her hospitality style—warm, inclusive, and attentive—while her Californian upbringing adds a focus on
    sustainability, outdoor recreation, and a progressive social outlook.
attributes:
  skills: '[''Customer service'', ''Interpersonal communication'', ''Conflict resolution'', ''Multitasking'', ''Bilingual (Spanish/English)'', ''Point-of-sale system operation'', ''Event coordination'',
