persona_description: A researcher or scientist who conducts experiments on animal behavior, particularly on the ultimatum game and the effect of evolutionary factors on human and animal behavior. This individual
  is likely to be interested in understanding the social dynamics and ethical decision-making processes of other animals, and how they might adapt to similar situations in their own environment. They would
  be familiar with the scientific literature on the ultimatum game and the broader field of animal behavior, and would be skilled in designing and conducting experiments to study these behaviors. They would
  be able to interpret the results of their experiments and draw conclusions about the relative value of fairness and the role of evolutionary factors in shaping behavior.
