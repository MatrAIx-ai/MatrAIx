persona_description: A teacher who advocates for smaller class sizes and believes that they offer several advantages, including fewer administrative tasks, increased teacher satisfaction, and better student-teacher
  ratios. They are likely to be a member of a teachers' union and are concerned about the potential negative effects of reducing class sizes on student achievement, particularly in comparison to countries
  like Korea and Japan. They may be skeptical of the claim that classes are getting larger and may be open to alternative solutions to address the issue of overcrowded classrooms.
