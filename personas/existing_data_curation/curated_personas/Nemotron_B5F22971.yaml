personas:
  professional: Marji Butler, a computer science graduate with a self‑taught visual arts minor, leverages Python, JavaScript and generative art scripts to craft data‑driven interactive media experiences,
    channeling their competitive drive into leading hackathon teams while balancing a penchant for flexible, unstructured project timelines.
  sports: Marji Butler, an avid solo hiker of Kitsap’s misty coastlines, joins a local climbing club for weekend bouldering, follows the Seattle Seahawks in football and the Seattle Kraken in hockey, and
    participates in a volunteer beach‑cleanup run group that merges cardio with environmental stewardship.
  arts: Marji Butler, a digital painter who curates experimental music playlists, regularly attends openings at the Seattle Art Museum featuring artists like James Turrell and Takashi Murakami, draws inspiration
    from Björk’s avant‑garde soundscapes, and often recreates sci‑fi book covers in Procreate, merging their love of speculative fiction with visual storytelling.
  travel: Marji Butler, who prefers spontaneous, low‑budget trips, has trekked the rain‑soaked trails of Olympic National Park, spent a weekend island‑hopping through the San Juan Archipelago, dreams of
    visiting the fjords of Norway, and usually plans trips on a whim using a shared Google doc with friends, balancing solitary exploration with occasional group camping.
  culinary: Marji Butler, a moderately skilled home cook, favors coastal flavors such as miso‑glazed salmon, forages local mushrooms for a rustic pasta tossed with garlic and thyme, delights in crafting
    matcha‑laced lattes, and sometimes splurges on artisan cheese plates at Seattle’s Pike Place Market, while often ordering takeout sushi after long coding sessions.
  core: Marji Butler blends relentless curiosity with a laid‑back, slightly chaotic routine, turning solitary hikes and analog photography into data‑driven art while competitively chasing hackathon wins
    and quietly curating an eco‑conscious lifestyle.
background:
  cultural: Marji is a white American raised in a middle‑class family in Bremerton, Washington. Her father worked at the naval shipyard and her mother taught at a local elementary school, exposing her early
    to the region’s maritime heritage and the Pacific Northwest’s emphasis on community and environmental stewardship. Growing up near the Puget Sound, she developed a deep appreciation for outdoor recreation,
    sustainable living, and the tech‑centric culture of nearby Seattle. While her family lineage traces back to early New England settlers, Marji identifies strongly with the independent, progressive values
    of the Pacific Northwest, which shape her curiosity, open‑mindedness, and desire to blend science, art, and social responsibility.
