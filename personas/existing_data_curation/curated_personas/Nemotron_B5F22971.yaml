    ''Technical Writing'', ''Statistical Analysis'']'
  hobbies: '[''Analog photography'', ''Digital painting'', ''Solo hiking on local trails'', ''Speculative fiction reading'', ''Philosophy essays'', ''Arduino kinetic sculptures'', ''Gallery visits'', ''Experimental
    music curation'', ''Board‑game evenings with small group'', ''Marine‑conservation volunteer work'']'
  career_goals: Marji aims to fuse her technical expertise with her artistic sensibility by pursuing a role as a data‑driven interactive media developer or UX researcher at a forward‑thinking tech firm
    that values creativity and social impact. She plans to deepen her knowledge through a master’s program in Human‑Computer Interaction or a specialized bootcamp in generative art. Competitive by nature,
    she intends to lead hackathon teams, publish a research paper on algorithmic visualizations, and eventually launch a freelance studio that creates immersive installations for community spaces and museums.
    Her long‑term ambition is to become a recognized innovator at the intersection of technology, art, and environmental storytelling.
