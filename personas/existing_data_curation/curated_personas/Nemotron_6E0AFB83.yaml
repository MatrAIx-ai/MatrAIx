  hobbies: '[''Fishing'', ''DIY woodworking projects'', ''Reading technology and gadget blogs'', ''Electronics tinkering'', ''Cooking Cuban cuisine'', ''Listening to Cuban salsa and son music'', ''Watching
    baseball'', ''Playing online chess'', ''Gardening'', ''Participating in small community events'']'
  career_goals: Rafael wants to translate his practical abilities into a sustainable livelihood. His short‑term goal is to earn his GED and obtain certified journeyman‑level training in either electrical
    or HVAC trades, which will give him a formal credential while still allowing the flexibility he values. In the longer term he envisions launching a small‑scale handyman business serving Splendora and
    neighboring communities, offering reliable, affordable repairs and modest remodeling projects. He aims to build a reputation for quality work, generate a stable income for his family, and eventually
    expand his services to include custom woodworking pieces that combine his love of craftsmanship with his Cuban heritage.
