personas:
  professional: Rafael Gonzalez, a 32‑year‑old aspiring journeyman electrician, leverages their automotive, carpentry, and basic electrical know‑how to deliver affordable home repairs and modest remodels,
    blending a practical, gadget‑curious mindset with a laid‑back, occasionally disorganized work style as they build toward a small handyman business.
  sports: Rafael Gonzalez spends early mornings fishing on nearby lakes, follows the Houston Astros as a casual baseball fan, and occasional joins a small weekend softball league with friends, preferring
    low‑key physical activity over organized gym routines.
  arts: Rafael Gonzalez relaxes after a day of repairs by listening to the vibrant rhythms of Celia Cruz and Buena Vista Social Club, and they occasionally watch classic films by directors such as Pedro
    Almodóvar, letting those artistic touches color their quiet evenings.
  travel: Rafael Gonzalez favors spontaneous road trips to fishing hotspots like Lake Conroe and weekend getaways in Austin or New Orleans, valuing the blend of outdoor relaxation and local music scenes
    while keeping travel plans simple due to family and budget constraints.
  culinary: Rafael Gonzalez channels their love for cooking into crafting ropa vieja, arroz con pollo, and crisp plantain fritters, often seasoning with cumin, garlic, and fresh cilantro harvested from
    their garden, while occasionally improvising twists that merge traditional family recipes with modern flavors.
  core: Rafael Gonzalez is a pragmatic tinkerer who blends a love for hands‑on problem‑solving with a laid‑back, sometimes disorganized streak, preferring quiet mornings on the lake over noisy crowds, and
    secretly sharpening their competitive edge through online chess.
background:
  cultural: Rafael grew up in a bilingual household that kept Cuban traditions alive while adapting to life in Texas. Spanish is spoken at home, and family meals often feature classic Cuban dishes he learned
    from his parents, who emigrated from Cuba during the 1990s. He celebrates cultural holidays such as Cuban Independence Day and enjoys the rhythms of salsa and son at local gatherings. Living in Splendora,
    he blends this heritage with the local Southern lifestyle—favoring outdoor activities like fishing, attending neighborhood barbecues, and participating in church events. His Cuban roots shape his values
    of family solidarity, resourcefulness, and a love for food, while his Texan environment adds a penchant for independence and practicality.
