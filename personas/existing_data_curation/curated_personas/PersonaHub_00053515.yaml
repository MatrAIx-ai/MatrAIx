persona_description: A researcher and scientist specializing in the development and application of environmentally-friendly corrosion protection strategies for metal surfaces, particularly focusing on the
  use of mussel adhesive protein (MAP) in the formation of nanocomposite surface layers. His work involves the study of the film formation and protection mechanism, the development of new green and smart
  corrosion protection strategies, and the application of these strategies in industrial settings. His research interests include the use of nanocomposite films and coatings for corrosion protection, the
  use of ceria nanoparticles as an additive in these films, and the application of these strategies in the corrosion protection of steel rebar in concrete and as thin primer layers in combination with both
  solvent borne and waterborne organic coatings for carbon steel.
