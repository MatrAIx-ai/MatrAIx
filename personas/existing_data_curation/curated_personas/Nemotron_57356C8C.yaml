  career_goals: Charles often says he wants to be a builder who constructs tall towers, a doctor who helps people feel better, and a teacher who shares knowledge. He sees these roles as ways to use his
    curiosity about how things work, his desire to help others, and his love for organizing and planning. While his ambitions are playful, they reflect an early interest in creation, care, and education.
