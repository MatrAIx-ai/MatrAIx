personas:
  professional: Charles Whorton, a budding junior builder, loves assembling LEGO sets with methodical precision, applying their organized planning and practical curiosity to design increasingly complex
    structures.
  sports: Charles Whorton, who eagerly laces up tiny sneakers for the Sunshine Stars under-6 soccer squad and proudly wears a New York Yankees cap to bedtime, balances structured practice drills with spontaneous
    backyard sprints, showing the same commitment to routine as in classroom tasks.
  arts: Charles Whorton, a passionate mini-artist, spends afternoons drawing bright dinosaurs inspired by Dr. Seuss's whimsical illustrations and dancing to the catchy tunes of The Wiggles, while they use
    their LEGO collection as a creative canvas that reflects both whimsy and methodical design.
  travel: Charles Whorton, who loves family road trips to the sprawling playgrounds of Central Park in New York and dreams of the magical rides at Disney World in Orlando, plans their travel adventures
    using colorful map stickers, favoring destinations that combine fun with a sense of order.
  culinary: Charles Whorton, a self-appointed junior chef, prefers the comforting melt of mac and cheese seasoned with a dash of paprika and delights in spreading peanut butter and strawberry jam on whole-grain
    toast, often insisting on stirring the cookie batter with a meticulous, clockwise motion.
  core: Charles Whorton, a meticulous five-year-old who lines up toy cars by color, balances curiosity and practicality, and can't resist a nightly bedtime story about rockets, embodies a blend of organized
    wonder and cooperative spirit.
background:
  cultural: Charles grows up in Opelousas, Louisiana, a town known for its Cajun and Creole heritage. His family, part of the local white community with French‑Acadian roots, maintains traditions such as
    celebrating Mardi Gras, attending the Opérousas Zydeco Festival, and enjoying regional foods like gumbo, jambalaya, and beignets. He attends a nearby Methodist church, where Sunday school reinforces
    values of kindness and community service. The bilingual environment exposes him to occasional French phrases and Zydeco music, contributing to his appreciation for local culture while his upbringing
    emphasizes hospitality, respect for tradition, and close‑knit neighborhood relationships.
