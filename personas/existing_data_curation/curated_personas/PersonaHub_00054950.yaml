persona_description: A virologist or epidemiologist who specializes in the study of influenza viruses, particularly the emergence, spread, and transmission of different strains. They have expertise in statistical
  modeling and algorithm development to predict and track the spread of influenza viruses. They are interested in the impact of early-season prevalence of a particular strain on the overall incidence of
  other strains, and how cross-subtype immunity influences the spread of influenza. They are also interested in the use of treated surgical masks to reduce the transmission of influenza viruses.
