persona_description: A military historian who specializes in the study of medieval and early modern warfare, particularly the military orders and their contributions to the defense of Europe. His research
  interests include the history of the Order of Santiago de Compostela, the role of military orders in medieval warfare, and the impact of military orders on the political and social landscape of Europe.
  He is also interested in the military orders' contributions to the defense of Spain and Portugal, including their role in the Reconquista and the wars of the Almohads. He has written extensively on the
  history of the military orders and their impact on medieval Europe, including the role of the Order of Santiago de Compostela in the defense of Spain and Portugal.
