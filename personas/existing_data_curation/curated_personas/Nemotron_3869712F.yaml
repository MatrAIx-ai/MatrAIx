personas:
  professional: Moises Torrado is a licensed electrician who leverages their practical wiring expertise and curiosity for emerging smart‑home tech, and they lead small crews with clear communication, turning
    every job into a collaborative learning experience while pursuing their Master Electrician license and a future sustainable contracting business.
  sports: Moises Torrado plays midfield for the Allentown Strikers in the local adult soccer league, they support the Philadelphia Eagles and the Philadelphia Flyers, and they maintain year‑round fitness
    through weekend pick‑up games, occasional weight‑training, and a habit of stretching before matches, viewing sport as a social anchor and a personal discipline.
  arts: Moises Torrado curates lively Latin playlists featuring Romeo Santos, Aventura, Bad Bunny, and classic bachata duets for community gatherings, they frequently showcase their own bachata and merengue
    moves at events, and they follow the latest music trends on streaming platforms, letting rhythmic expression fuel their sociable energy.
  travel: Moises Torrado enjoys spontaneous weekend road trips to historic towns like Bethlehem and Hudson Valley, they plan annual summer trips back to the Dominican Republic to reconnect with family,
    and they dream of an eco‑tour of solar farms in Spain, blending adventurous exploration with professional curiosity while balancing a modest travel budget.
  culinary: Moises Torrado is a confident home cook who regularly prepares mangú with ripe plantains, hearty sancocho packed with yucca, plantain, and pork, seasons dishes with oregano and achiote, they
    experiment with craft beers and pepper‑jack cheese pairings, and they love sharing their creations at community potlucks.
  core: Moises Torrado merges a tech‑savvy curiosity with a community‑first spirit, they thrive on high‑energy soccer chatter, often overbook projects before paperwork is completed, and they balance their
    talkative enthusiasm with a quiet habit of late‑night snack binge‑watching.
background:
  cultural: Moises grew up in a bilingual Dominican household, speaking Spanish at home and English in school. He maintains close ties to the Dominican community in Allentown, celebrating holidays such
    as Dominican Independence Day and sharing family traditions like weekly Sunday meals. His cultural identity blends Caribbean warmth and community orientation with the practical, industrious spirit of
    the Lehigh Valley, influencing both his work ethic and his sociable, collaborative nature.
attributes:
  skills: '["Residential wiring", "Commercial electrical installations", "Blueprint reading", "NEC code compliance", "Troubleshooting and diagnostics", "Smart home system integration", "Solar panel installation",
