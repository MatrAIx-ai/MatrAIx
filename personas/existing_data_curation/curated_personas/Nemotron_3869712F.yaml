  hobbies: '["Soccer", "Bachata and merengue dancing", "Cooking Dominican cuisine", "Smart‑home tinkering", "DIY home‑improvement projects", "Community volunteering (youth electrical safety workshops)",
    "Listening to Latin music", "Attending local cultural festivals"]'
  career_goals: Moises aims to earn his Master Electrician license within the next two years, deepen his expertise in renewable‑energy systems, and eventually launch his own contracting business focused
    on sustainable residential projects. He also hopes to mentor Dominican‑American apprentices, become a certified trainer for electrical safety, and play a leadership role in local trade associations.
