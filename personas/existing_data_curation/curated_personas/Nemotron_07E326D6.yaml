    and mediation"]'
  hobbies: '["Gardening (vegetable and herb garden)", "Birdwatching at Barnegat Bay", "Hiking state park trails", "Reading historical non‑fiction, forensic science, and classic sci‑fi", "Raspberry Pi electronics
    tinkering", "Yoga and meditation", "Crossword puzzles and Sudoku", "Volunteering at animal shelter (cat and dog care)"]'
  career_goals: Andrea aims to transition from frontline supervision to a senior leadership role within the Ocean County correctional system, such as Unit Supervisor or Training Coordinator. She plans to
    obtain the State Correctional Officer Advanced Leadership Certification and to spearhead a pilot program that integrates data‑driven security technologies—like AI‑enhanced video analytics—into daily
    operations. Long‑term, she envisions contributing to statewide policy development on inmate mental‑health services and later sharing her expertise as a consultant or adjunct instructor at a local community
    college, where she can mentor the next generation of correctional professionals while maintaining a work environment that respects her need for quieter, focused tasks.
