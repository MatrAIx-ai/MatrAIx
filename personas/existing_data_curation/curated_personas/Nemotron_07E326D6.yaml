personas:
  professional: Andrea Olmstead, a veteran correctional security officer in Ocean County, leverages two decades of inmate supervision, advanced use‑of‑force tactics, and technical expertise with surveillance
    systems to train staff and spearhead data‑driven security initiatives, while their methodical yet adaptable nature ensures meticulous compliance without sacrificing practical problem‑solving.
  sports: Andrea Olmstead enjoys solitary hikes on the quiet trails of Wharton State Forest, practices yoga at a nearby studio, follows the New York Yankees, New Jersey Devils, and the Philadelphia Eagles,
    and participates in a weekly walk‑run group at the Ocean County park, balancing low‑impact cardio with occasional weekend snow‑shoeing.
  arts: Andrea Olmstead spends evenings reading forensic science titles and classic sci‑fi by Isaac Asimov, attends concerts featuring the Philadelphia Orchestra, appreciates Ansel Adams’ photography, and
    volunteers at the Toms River Cultural Center for local theater productions, allowing the arts to sharpen their analytical mind and provide quiet respite.
  travel: Andrea Olmstead prefers meticulously planned road trips to coastal retreats like Cape May and historic towns such as Alexandria, Virginia, interspersed with solo weekend hikes in the Adirondacks,
    valuing low‑key relaxation over crowded tourist hubs while staying within a modest travel budget.
  culinary: Andrea Olmstead cultivates heirloom tomatoes and kale in a modest backyard garden, then whips up roasted vegetable medleys with garlic and rosemary, enjoys fresh clams with a white‑wine butter
    sauce, and occasionally experiments with homemade kimchi, revealing a solid intermediate cooking skill and a penchant for fresh, seasonal ingredients.
  core: Andrea Olmstead is a solitary correctional leader who blends forensic curiosity with garden patience, applying disciplined analysis to both security tech and weekend birdwatching, while quietly
    battling a penchant for coffee‑induced insomnia.
background:
  cultural: Andrea was raised in a middle‑class, predominantly Anglo‑American family in coastal New Jersey, where community service and respect for law enforcement were emphasized. Her upbringing blended
    traditional American holidays—Thanksgiving, Fourth of July celebrations, and Christmas—with a strong work ethic rooted in her parents' encouragement of education, especially in the sciences. Living
    in Toms River, she participates in local heritage events, such as the annual Ocean County Fair, and maintains ties to a nearby Methodist congregation that values fellowship and charitable outreach.
    While she identifies with mainstream American culture, Andrea is also attuned to the diverse fabric of Ocean County, fostering an inclusive attitude toward the varied backgrounds of the people she serves
    in her professional role.
attributes:
  skills: '["Inmate supervision and management", "Crisis de‑escalation and conflict resolution", "Use‑of‑force protocols and safety procedures", "Report writing and documentation", "Surveillance system
