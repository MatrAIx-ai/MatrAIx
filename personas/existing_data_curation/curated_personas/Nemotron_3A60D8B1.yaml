  hobbies: '[''watercolor painting'', ''photography'', ''reading contemporary literature'', ''philosophy'', ''gallery visits'', ''book club'', ''mindfulness meditation'', ''nature walks'', ''volunteering
    at art‑therapy program for veterans'']'
  career_goals: Jeremy aims to complete a Bachelor of Science in Nursing (BSN) program to qualify for advanced practice roles. He aspires to specialize in psychiatric‑mental health nursing, integrating
    his interest in art therapy to develop holistic treatment plans. Long‑term, he envisions leading a small community health team in Okaloosa County, creating programs that combine health education with
    creative workshops for patients dealing with anxiety and depression. He also hopes to mentor younger nurses, sharing his experience in balancing clinical rigor with compassionate flexibility.
