persona_description: Dr. Doug Lorenz, an assistant professor of bioinformatics and biostatistics at the University of Louisville, is a statistician who is passionate about using statistics to help health
  care workers recognize the signs of child abuse. He is highly knowledgeable in a variety of statistical methods and modeling applications and takes a keen interest in training the next generation of statisticians
  to be ready for new analytical challenges facing the country. His research interests include the TEN-4 rule, which is a guide to help professionals differentiate between bruises resulting from abuse and
  those due to accidental trauma, and dental research, particularly in the areas of cavities and cleft palates.
