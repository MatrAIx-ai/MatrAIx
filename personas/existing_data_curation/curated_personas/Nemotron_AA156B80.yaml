  hobbies: '[''YouTube learning (coding, graphic design, cooking)'', ''online strategy gaming'', ''digital drawing and illustration'', ''personal journaling and poetry'', ''family cooking of Honduran dishes'',
    ''small community gatherings and storytelling'', ''reading graphic novels and sci‑fi series'']'
  career_goals: Monica aims to turn her curiosity and practical skills into a career that lets her stay independent while helping her community. In the next few years she hopes to earn a certification in
    web development or graphic design through community college courses and online programs, eventually working as a bilingual digital content creator or UI/UX designer for organizations that serve Latino
    youth. She also harbors a long‑term ambition to become a mental‑health advocate, using her own experiences with stress to mentor other adolescents. In the meantime, she dreams of competing in local
    e‑sports tournaments and possibly earning sponsorships, which would give her a platform to showcase her cultural heritage.
