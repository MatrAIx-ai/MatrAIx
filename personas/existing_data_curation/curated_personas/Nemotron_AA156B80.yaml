personas:
  professional: Monica Bolivar, a budding teen coder and digital storyteller who blends their love of graphic design tutorials and strategic gaming to prototype interactive comic apps for their school’s
    multimedia club, often juggling projects with a flexible, sometimes chaotic schedule, while channeling a competitive edge into rapid skill acquisition.
  sports: Monica Bolivar, an avid e‑sports enthusiast who follows the Los Angeles Lakers and LA Galaxy, participates in a local youth soccer league on weekends, and prefers strategic online multiplayer
    battles over conventional team sports, yet still enjoys cheering for the Riverside Bulldogs high school football team during Friday night games.
  arts: Monica Bolivar, a digital artist and poetry writer who draws inspiration from Central American folklore, recreates characters like La Llorona in vibrant tablet illustrations, and devotes free moments
    to listening to artists such as Bad Bunny and Café Tacvba while binge‑watching sci‑fi series like The Expanse, weaving those influences into their own graphic novel sketches.
  travel: Monica Bolivar, a wanderlust‑tinged teen whose travel diary includes family road trips to San Diego beaches, a summer visit to Mexico City’s historic center, and a dream of exploring the ancient
    ruins of Tikal, always planning trips by watching YouTube travel vlogs and balancing their itineraries with school obligations.
  culinary: Monica Bolivar, a kitchen‑savvy teenager who masters family recipes like baleadas, pupusas, and tamales on weekends, experiments with fusion dishes such as kimchi‑topped tacos, and loves to
    incorporate fresh cilantro, avocado, and plantains into their meals, while occasionally livestreaming their cooking process for friends.
  core: Monica Bolivar is a curious, competitive teen who channels their love of coding, gaming, and traditional cooking into creative projects, yet frequently juggles disorganization and stress‑induced
    worries while striving to bridge two cultural worlds.
background:
  cultural: Monica is a first‑generation Honduran‑American growing up in Riverside, California. Her household speaks Spanish at home, and she celebrates Honduran traditions such as Día de la Independencia
    and Día de los Girasoles, while also participating in local Latino community events. Family meals are central to her life, and she learned to cook dishes like baleadas, pupusas, and tamales from her
    parents and grandparents. The blend of Central American cultural values—strong family ties, respect for elders, and a communal love of music and dance—shapes her worldview. At school and in the neighborhood,
    she navigates both American teenage culture and the expectations of her immigrant family, which fosters her bilingual fluency and a sense of responsibility to bridge the two worlds. Her cultural identity
    influences her interests in storytelling, cooking, and her desire to create digital content that reflects the experiences of Honduran youth in the U.S.
attributes:
  skills: '[''bilingual Spanish‑English communication'', ''basic computer literacy'', ''self‑taught HTML and introductory Python'', ''creative writing and journaling'', ''digital sketching and drawing'',
