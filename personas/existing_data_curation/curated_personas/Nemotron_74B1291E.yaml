  career_goals: Kathryn dreams of becoming a veterinarian because she loves animals and enjoys the clear, routine‑based care they need. She also aims to be one of the top students in science, hoping to
    win school science fairs and eventually explore wildlife biology. Her competitive nature drives her to set high goals and work methodically toward them.
