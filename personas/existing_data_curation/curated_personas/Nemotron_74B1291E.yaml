  hobbies: '[''Magic Tree House books'', ''Jigsaw puzzles'', ''LEGO building'', ''Chess'', ''Checkers'', ''Nature journaling'', ''Ice skating (seasonal)'', ''Biking on local trails'', ''Baking simple cookies
