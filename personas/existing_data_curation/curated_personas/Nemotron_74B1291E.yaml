personas:
  professional: Kathryn Bronstein, a seven‑year‑old budding engineer in training, channels their love of LEGO construction, chess strategy, and methodical puzzle‑solving into designing sturdy miniature
    bridges, and they proudly share step‑by‑step plans with classmates.
  sports: Kathryn Bronstein, a seven‑year‑old ice‑skating enthusiast who winds up each winter at the local youth skating club and summers pedaling with the Twin City Junior Biking League, also roots for
    the Minnesota Twins and Minnesota Vikings, and they treat chess tournaments as their mental sport of choice.
  arts: Kathryn Bronstein, a seven‑year‑old imaginative reader who devours Mary Pope Osborne’s Magic Tree House series, collects stickers of their favorite Pokémon characters, and they spend weekend afternoons
    drawing scenes from Pixar’s Inside Out while humming the tunes of Taylor Swift, letting creative storytelling balance their structured routine.
  travel: Kathryn Bronstein, a seven‑year‑old travel planner who prefers itineraries with exact start times, has explored the Great Lakes shoreline on a family road‑trip, delighted at the seasonal fun of
    the Minnesota State Fair, and they now day‑dream about a guided tour of Yellowstone National Park and a future trip to the Grand Canyon.
  culinary: Kathryn Bronstein, a seven‑year‑old junior baker who meticulously follows chocolate‑chip cookie recipes, measures flour and sugar with a dedicated set of mini‑spoons, sprinkles in vanilla extract
    and a pinch of cinnamon, and they proudly present the treats to their family while occasionally sneaking an extra bite when no one is watching.
  core: Kathryn Bronstein, a seven‑year‑old strategist, blends a love of rules, a penchant for meticulous planning, and a quiet competitive edge into every puzzle, game, and daily routine they tackle.
background:
  cultural: Kathryn comes from a white, Midwestern family in Minneapolis. Her upbringing reflects typical Minnesota values such as punctuality, a respect for community, and an appreciation for nature and
    the outdoors. Her family celebrates common American holidays and often engages in seasonal activities like ice skating in winter and visiting local parks and lakes in summer. The household includes
    influences from German and Scandinavian ancestry, which contribute to an emphasis on order, practicality, and a modest, hardworking attitude.
