  hobbies: '[''herb and vegetable gardening'', ''traditional cooking for family and friends'', ''listening to and singing traditional Southeast Asian music'', ''knitting, weaving, and embroidery'', ''storytelling
    and oral history sharing with grandchildren'', ''walking the Fairfield Veterans Memorial Trail'', ''participating in small temple gatherings and cooking demonstrations'']'
  career_goals: Her primary ambition is to ensure that her cultural heritage is passed on to her grandchildren and the wider community. She plans to compile a handwritten family cookbook that blends traditional
    recipes with notes on ingredient substitutions available in the Bay Area, and to donate copies to the Fairfield public library and the local Vietnamese Buddhist temple. She also aspires to lead a monthly
    cooking class at the Solano County Senior Center, where she will share her step‑by‑step methods in a structured format while allowing participants the freedom to add their own twists. Another goal is
    to mentor newly arrived Southeast Asian seniors by offering language assistance and informal counseling, thereby creating a supportive network that mirrors the communal spirit she grew up with. Finally,
    she wishes to maintain her own health and independence by continuing her gardening routine and taking regular walks along the nearby Suisun Bay trail.
