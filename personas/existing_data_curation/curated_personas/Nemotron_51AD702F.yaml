  career_goals: After obtaining his GED, Dwight aims to enroll in a community college program focused on logistics and supply chain management. He aspires to become a warehouse operations supervisor, valuing
    the predictability, clear procedures, and measurable outcomes the field offers. In the medium term, he plans to earn a Certified Supply Chain Professional (CSCP) credential and secure a stable full‑time
    role in a corporate logistics department. He also hopes to supplement his income by offering bicycle repair services to neighbors, eventually establishing a modest side business that combines his hands‑on
    skills with his desire for dependable earnings and community contribution.
