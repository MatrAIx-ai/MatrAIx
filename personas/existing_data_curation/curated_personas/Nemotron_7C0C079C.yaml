  career_goals: Although retired from formal employment, Aimee seeks to channel her experience into mentorship and community leadership. She aims to become a senior mentor for budding entrepreneurs in Worcester
    County, serve on the board of the local Chamber of Commerce’s outreach program, and publish a practical guide on launching micro‑enterprises after retirement. Additionally, she plans to travel to historical
    sites in Europe, learn basic conversational French, and help establish an intergenerational skills‑exchange workshop that pairs seniors with younger residents to share business know‑how and craft techniques.
