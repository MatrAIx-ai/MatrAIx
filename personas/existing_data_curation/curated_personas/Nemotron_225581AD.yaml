  career_goals: Looking ahead, Charlotte aims to attain tenure and subsequently serve as department chair, where she can shape policy and champion interdisciplinary programs that link literature, cultural
    studies, and social justice. She intends to secure a modest research grant to complete a monograph on postwar Italian-American narratives, and to develop a series of hybrid online courses that broaden
    access for working‑adult learners. Over the next five years, she also plans to mentor emerging scholars, improve graduation rates within her department, and deepen community partnerships with local
    museums and cultural organizations, all while maintaining a balanced workload that preserves her personal time.
