  career_goals: While still a toddler, Loan already shows a curious streak that points toward future aspirations. She often asks, "What does that doctor do?" and enjoys watching animated shows about helpers
    and caregivers. Influenced by her critical and competitive personality, she expresses a desire to "be the best doctor" or "the best teacher," indicating an ambition to lead and excel in a role that
    combines caring for others with personal achievement. Her family encourages her interest in science and language, so she may aim to pursue early education in preschool and eventually a career in health
    or education where she can apply her practical, results-focused mindset.
