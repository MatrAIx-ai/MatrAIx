personas:
  professional: Loan Youm, a 2‑year‑old self‑appointed “block architect” who meticulously arranges colorful wooden bricks into tidy towers before daring to improvise wild structures, showcasing early practical
    problem‑solving, a love for predictable setups, and a competitive streak to be the fastest builder on the play mat.
  sports: Loan Youm, a 2‑year‑old who loves chasing an orange ball at the neighborhood toddler soccer club while proudly wearing a Los Angeles Dodgers cap and shouting “Go Dodgers!” during breezy spring
    afternoons, balances energetic sprints with occasional quiet tumbles in the sandbox.
  arts: Loan Youm, a 2‑year‑old who delights in dancing to Raffi’s “Baby Beluga” and humming along to Sesame Street’s “C is for Cookie,” spends afternoons finger‑painting abstract swirls on large paper,
    and avidly watches Pixar’s “Toy Story” for inspiration, shaping a playful artistic identity.
  travel: Loan Youm, a 2‑year‑old who prefers short, well‑planned outings like weekend trips to the local zoo and a beach boardwalk, yet dreams of squealing with delight at a future visit to Tokyo’s Disneyland
    after watching animated travel videos, approaches travel with a blend of predictable schedule and spontaneous excitement.
  culinary: Loan Youm, a 2‑year‑old with a fondness for creamy mac and cheese, sweet banana slices, and mild chicken nuggets, but stubbornly rejects peas and broccoli, happily dabs chick‑pea hummus on crackers
    during snack time, and pretends to “cook” with a plastic stovetop, showcasing a selective palate and playful dining rituals.
  core: Loan Youm, a 2‑year‑old who mixes a love for tidy daily routines with bursts of spontaneous block‑building competitions, shows a skeptical curiosity about new foods, and displays a quirky habit
    of naming every stuffed animal after a favorite sports team.
background:
  cultural: Loan’s family originates from Southeast Asia, bringing a blend of traditions into her daily life in Victorville. At home, she hears both English and her parents’ native language (e.g., Vietnamese),
    and she is introduced to cultural foods such as pho, bánh mì, and jasmine tea during family meals. The household celebrates Lunar New Year with red envelopes, decorated lanterns, and special dishes,
    fostering an early appreciation for her heritage. Local community events at the Victorville Asian Cultural Center provide opportunities for her to participate in traditional dance workshops and holiday
    festivals, reinforcing a multicultural identity that balances Southeast Asian customs with Southern California life.
