  career_goals: Although retired, Jessie aims to deepen her impact on the local arts scene. Her primary goals include becoming a certified docent at the Virginia Museum of Fine Arts, launching a senior‑led
    mural project that celebrates African American heritage in Henrico, publishing a memoir and a collection of essays critiquing contemporary art, establishing a scholarship fund in memory of her late
    husband for aspiring Black artists, and serving on the advisory board of the county’s arts council to shape inclusive cultural policy.
