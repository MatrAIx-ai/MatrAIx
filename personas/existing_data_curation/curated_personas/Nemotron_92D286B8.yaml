personas:
  professional: Jessie Alsobrooks, a 72‑year‑old retired senior‑center program director, channels her meticulous planning, insatiable curiosity, and discerning eye for art into curating intimate gallery
    shows, mentoring volunteer docents, and leading a senior‑driven mural project that honors local heritage.
  sports: Jessie Alsobrooks stays active with weekly low‑impact aerobics at the local senior center, participates in the Henrico Senior Walkers’ monthly strolls along the James River, and cheers on the
    Richmond Flying Squirrels during spring baseball while maintaining a friendly rivalry with her neighbor over the Washington Football Team’s season.
  arts: Jessie Alsobrooks fills her days with watercolor painting of heirloom garden scenes, curates discussions on the works of Jacob Lawrence and Faith Ringgold at the Virginia Museum of Fine Arts, writes
    thoughtful reviews of local gallery shows, and unwinds to the soulful piano of Nina Simone while sipping sweet tea.
  travel: Jessie Alsobrooks plans her trips with a meticulous itinerary, using senior discounts to explore heritage sites like Savannah’s historic squares, Charleston’s Gullah districts, and the Natchez
    Trace Parkway, while also reserving spontaneous weekend getaways to the Virginia wine country of Charlottesville and the bustling jazz scene of New Orleans.
  culinary: Jessie Alsobrooks, an adept home chef, transforms classic Southern staples—such as shrimp and grits with quinoa, collard greens simmered with smoked turkey, and sweet‑potato pie spiced with
    ginger—using heirloom tomatoes and fresh basil from her garden, and relishes sharing these meals at community potlucks.
  core: Jessie Alsobrooks is a fiercely curious, impeccably organized senior who channels her love of storytelling and art into vibrant community projects, all while keeping a meticulous ledger of paint
    expenses and occasionally arguing over the best brushstroke technique.
background:
  cultural: Jessie’s cultural identity is rooted in the African American experience of the mid‑Atlantic South. Her grandparents participated in the Great Migration, moving from rural Georgia to Virginia
    in the 1940s. She grew up in a close‑knit church community that emphasized storytelling, music, and mutual support. Celebrations such as Juneteenth, Black History Month, and local heritage festivals
    are integral to her family traditions. She values the intergenerational transmission of history, the resilience of Black women, and the richness of Southern culinary and artistic traditions, which she
    weaves into her daily life and community work.
