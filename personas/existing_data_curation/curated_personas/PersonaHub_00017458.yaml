persona_description: A researcher in the field of optical communication, particularly in the development of high-speed wireless data transfer systems using the optical spectrum. The researcher is an engineer
  from Pennsylvania State University and has expertise in developing systems that can transmit data at speeds exceeding one gigabit per second, offering a high-speed wireless data transfer solution that
  is not limited by line of sight restrictions. The researcher's research has been supported by the National Science Foundation and is believed to be the first where line of sight is not a requirement for
  blisteringly fast wireless data transfer. The researcher is interested in the potential applications of their technology, including the "wireless projection of high definition television" and the use
  of light emitting diode room lighting in environmentally-friendly blanket communication networks.
