personas:
  professional: Jammy Santossantiago, a veteran engineering technologist turning his decades‑long mastery of mechanical and electrical systems, CAD modeling, PLC programming, and hands‑on troubleshooting
    into a boutique consultancy for energy‑efficient retrofits and smart‑building automation, applies his calm, methodical problem‑solving and flexible, sometimes‑disorganized work style to craft tailored
    green solutions for Southwest Florida homes.
  sports: Jammy Santossantiago stays fit by sunrise fishing expeditions on the Gulf and regular sailing sessions with the Charlotte Harbor Yacht Club, follows the Tampa Bay Buccaneers in football and the
    Miami Heat in basketball, participates in a seasonal community softball league in winter, and prefers a laid‑back approach to exercise, treating workouts as enjoyable extensions of their outdoor hobbies
    rather than rigid regimens.
  arts: Jammy Santossantiago nurtures a love for the tactile arts by crafting detailed model ships and tinkering with DIY electronics, while also immersing themselves in Mexican folk music from artists
    like José Alfredo Jiménez, listening to classic rock legends such as Carlos Santana, and attending local mural unveilings that celebrate community heritage, which together enrich their creative spirit
    and inform their engineering designs.
  travel: Jammy Santossantiago enjoys weekend road trips to the Everglades and seasonal visits to the historic town of Sanibel Island, dreams of sailing the Caribbean’s Virgin Islands and exploring the
    vibrant markets of Oaxaca, plans trips with a flexible itinerary that allows spontaneous fishing stops, and balances travel costs with a modest budget that prioritizes experiences over luxury accommodations.
  culinary: Jammy Santossantiago, an adept home chef, blends traditional Mexican dishes such as mole poblano, chiles en nogada, and tamales with fresh Florida seafood like grouper and shrimp, experiments
    with native herbs like epazote and lime leaf, and applies precise, engineered recipes—sometimes leveraging sous‑vide techniques—to host cooking classes where they share flavors, stories, and a willingness
    to improvise when a key ingredient goes missing.
  core: Jammy Santossantiago, a relaxed yet fiercely curious 59‑year‑old tinkerer, merges a love of sailing, Mexican cuisine, and sustainable engineering, and is notorious for misplacing their keys while
    never missing a sunrise on the Gulf.
background:
  cultural: Jammy’s cultural identity is rooted in his Mexican heritage, with family origins in the state of Jalisco. Raised bilingual, he maintains a strong connection to Mexican traditions such as Día
    de los Muertos, salsa music, and family‑centered celebrations. Living in Punta Gorda, he stays active in the local Mexican‑American community, attending Spanish‑language church services, participating
    in cultural festivals, and sharing his culinary heritage through informal cooking gatherings. His background informs his resilient outlook, community‑oriented values, and appreciation for both practical
    ingenuity and cultural richness.
attributes:
  skills: '[''Mechanical troubleshooting'', ''CAD design (SolidWorks, AutoCAD)'', ''PLC programming (Allen‑Bradley, Siemens)'', ''Electrical wiring and diagnostics'', ''HVAC system maintenance'', ''Quality
    assurance and testing'', ''Bilingual communication (Spanish/English)'', ''Project coordination and documentation'', ''Rapid prototyping with Arduino and Raspberry Pi'', ''Calm crisis management'']'
  hobbies: '[''Saltwater fishing'', ''Sailing on Charlotte Harbor'', ''Gardening (native Florida plants)'', ''Cooking traditional Mexican dishes'', ''Reading engineering and science magazines'', ''DIY electronics
    projects'', ''Model ship building'', ''Volunteering at local cultural festivals and community garden'', ''Walking and birdwatching along the Gulf coastline'']'
  career_goals: Jammy aims to transition his decades of hands‑on experience into a consultancy role focused on energy‑efficient retrofits and smart‑building automation for residential and small commercial
    properties in Southwest Florida. He plans to earn certifications in solar photovoltaic installation and advanced building control systems, allowing him to guide sustainable projects that blend his practical
    engineering background with emerging green technologies. Simultaneously, he wishes to mentor junior technicians through workshops and adjunct teaching at a local community college, sharing his calm,
    resilient approach to problem‑solving while staying engaged with continuous learning.
