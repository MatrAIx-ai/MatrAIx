persona_description: A historian who specializes in the study of the history of Egypt under the Tulunid dynasty, particularly the political, social, and cultural developments during Ahmad ibn Tulun's reign.
  His research interests include the political and administrative structure of the Tulunid state, the economic and social changes that occurred during his rule, and the cultural and religious developments
  that took place during his period. He is also interested in the role of Ahmad ibn Tulun in the expansion of the Tulunid state and the impact of his rule on the development of Egypt as an independent state.
