  career_goals: Tristyn aims to transition into a nurse manager or clinical educator role where she can influence both patient safety and staff development. She aspires to integrate advanced health informatics
    tools to streamline workflows and improve outcomes, while also establishing a mental‑health support program for frontline staff. Her long‑term ambition is to serve on a hospital’s patient safety committee,
    championing evidence‑based policies that balance innovative practices with the practical needs of a busy clinical environment.
