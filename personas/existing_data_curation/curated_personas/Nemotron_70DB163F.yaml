personas:
  professional: Tristyn Workman is a seasoned registered nurse and emerging health‑informatician who blends a methodical, data‑driven mindset with curiosity for innovative care models; they lead interdisciplinary
    teams through crisis, craft evidence‑based clinical protocols, and champion a mental‑health support program for frontline staff while managing intense emotional reactivity with mindfulness.
  sports: Tristyn Workman is an avid hiker of the Columbia River Gorge and a member of the Portland Trailblazers Running Club; they root for the Seattle Seahawks during football season, play on a weekend
    adult softball league with coworkers, and incorporate sunrise yoga into a weekly fitness routine, balancing seasonal outdoor pursuits with structured team sports.
  arts: Tristyn Workman is a regular patron of Pacific Northwest art galleries, where they admire works by regional painter Jeremy Mann, enjoy the folk‑rock sounds of Fleet Foxes and the lyrical storytelling
    of Sufjan Stevens, and host board‑game nights featuring strategy games like Scythe that echo classic literature, weaving artistic appreciation into social leisure.
  travel: Tristyn Workman is a meticulous planner who has trekked the Canadian Rockies in Banff, explored Iceland’s geothermal hotspots, and dreams of hiking New Zealand’s Tongariro Alpine Crossing; they
    favor adventure‑focused itineraries that combine guided hikes with solo reflection periods, yet always budget travel costs within a family‑friendly framework.
  culinary: Tristyn Workman is a proficient farm‑to‑table cook who transforms garden‑grown kale, heirloom tomatoes, and rosemary into dishes such as roasted beet and goat‑cheese salad, miso‑glazed salmon
    with pickled radishes, and spiced lentil stew, often pairing meals with locally brewed pale ales, though they sometimes over‑season when stress peaks.
  core: Tristyn Workman is a data‑driven nurse leader who juggles meticulous budgeting, high‑octane anxiety, a passion for hiking, and a habit of over‑seasoning dishes when stress hits.
background:
  cultural: Tristyn is a white American of Anglo‑Saxon heritage, raised in the Pacific Northwest. Her upbringing emphasized community service, environmental stewardship, and progressive values typical of
    Portland’s culture. While she maintains traditional family celebrations like Thanksgiving and Christmas, she identifies more with the region’s secular, inclusive ethos. She actively engages in local
    sustainability initiatives, supports the farm‑to‑table movement, and participates in the city’s diverse cultural events, reflecting a blend of personal heritage and the broader Portland community.
