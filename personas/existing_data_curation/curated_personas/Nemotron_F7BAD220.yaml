personas:
  professional: Thomas Poon is a former corporate consultant turned part‑time strategic growth advisor for Naples small businesses, leveraging meticulous project‑management, analytical budgeting, and a
    deep appreciation for visual arts to design data‑driven, culturally resonant business plans, while their skeptical yet methodical nature ensures every recommendation is rigorously vetted before implementation.
  sports: Thomas Poon spends early Saturday mornings at the Naples Amateur Golf Club polishing a low‑handicap swing, joins the Naples Yacht Club for weekly Gulf sailing regattas, follows the Florida Marlins
    for a pinch of excitement, and treats each chess tournament as a mental sport, all reflecting a competitive edge and strategic mindset.
  arts: Thomas Poon devotes weekends to strolling the Naples Museum of Art, dissecting the works of Anselm Kiefer and Yayoi Kusama, curates pop‑up exhibitions featuring local muralist Juan Martinez, captures
    architectural details of the historic Naples Pier with a Canon EOS 5D, and frequently quotes Walter Benjamin, reinforcing their curiosity and methodical appreciation of art.
  travel: Thomas Poon prefers meticulously planned cultural trips, having crafted itineraries for the 2022 Venice Biennale, a sailing expedition to the British Virgin Islands, and a weekend getaway to Savannah’s
    historic squares, yet family responsibilities keep longer overseas voyages occasional and tightly scheduled.
  culinary: Thomas Poon enjoys experimental kitchen projects, frequently preparing a miso‑glazed Chilean sea bass with yuzu‑infused quinoa and charred eggplant, while also hunting for authentic pad krapow
    Thai street‑food, and critiques each dish with the same analytical lens applied to art installations.
  core: Thomas Poon is a 45‑year‑old strategic mind who blends disciplined project‑manager precision with an occasional over‑curation of their life, hoarding art catalogues like trophies while never missing
    a sunrise sail, yet sometimes neglects personal downtime for endless spreadsheets.
background:
  cultural: Thomas identifies as a White American but carries a mixed heritage stemming from his paternal family’s Chinese ancestry, reflected in the surname Poon. Growing up in a predominantly White suburb,
    he embraced mainstream American customs while his family maintained select Chinese traditions, such as celebrating Lunar New Year and valuing education. Now residing in Naples, Florida, he integrates
    the Floridian coastal lifestyle—outdoor recreation, seafood cuisine, and community art festivals—into his daily life. His cultural outlook blends curiosity for diverse artistic expressions with a pragmatic,
    methodical approach rooted in his multicultural upbringing.
