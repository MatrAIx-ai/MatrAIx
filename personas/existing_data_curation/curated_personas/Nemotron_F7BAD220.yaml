  career_goals: Thomas aims to transition his analytical and organizational strengths into a part‑time consulting role for local small businesses, focusing on strategic growth and financial planning. He
    also aspires to become a board member of the Naples Museum of Art, where he can contribute to exhibition planning and educational outreach. Completing a bachelor's degree in Art History is a personal
    milestone, and he hopes to author a guidebook that demystifies contemporary art for a broader audience. Long‑term, he envisions establishing a community art workshop that melds hands‑on creativity with
    strategic thinking, providing mentorship to young artists and entrepreneurs.
