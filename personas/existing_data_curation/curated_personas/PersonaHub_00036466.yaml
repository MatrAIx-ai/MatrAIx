persona_description: A GIS developer who is proficient in using ArcGIS for creating and publishing maps, geographic data, and analytic models. They are familiar with the client-server paradigm and the various
  clients and servers that make up the ArcGIS architecture. They have experience with ArcGIS Desktop and ArcGIS Engine, and can create and work with rich geographic information using the ArcGIS API. They
  are also familiar with the Web services and other geographic information services available through ArcGIS. They are interested in using ArcGIS to deploy GIS maps and data as Web services and to work
  with other desktop applications, such as SharePoint. They are active in the ArcGIS developer community and are looking for resources, blogs, forums, videos, and useful code samples to help with their
  development work.
