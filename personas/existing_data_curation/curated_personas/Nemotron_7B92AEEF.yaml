  career_goals: Rosa aims to join a leading aerospace company or research institute within the next two years, focusing on sustainable propulsion systems and reusable launch vehicles. She hopes to contribute
    to projects that reduce carbon emissions in aviation, such as electric or hybrid aircraft designs. Over the next five to ten years, she envisions moving into a senior engineering role where she can
    lead multidisciplinary teams and influence strategic technology roadmaps. She also plans to pursue a master’s degree in aerospace engineering to deepen her expertise, while seeking a work environment
    that offers flexibility to manage stress and maintain her mental well‑being.
