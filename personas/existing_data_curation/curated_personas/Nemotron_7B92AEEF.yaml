personas:
  professional: Rosa Pavey is a 20‑year‑old aerospace enthusiast who leverages fluid‑dynamics theory, SolidWorks and Python scripting to design hypersonic‑wind‑tunnel models, while confidently presenting
    data to multidisciplinary teams and championing sustainable propulsion ideas in a flexible, less‑structured work environment.
  sports: Rosa Pavey is an avid rock‑climber at Chicago’s Vertical Endeavors gym, follows the Chicago Bears and Chicago Cubs fervently, and joins seasonal pickup basketball games in the summers while sprinting
    along the Lakefront Trail for cardio.
  arts: Rosa Pavey blends technical precision with artistic flair by shooting neon‑lit Chicago skyline photos inspired by Ansel Adams, devouring classic sci‑fi novels from Isaac Asimov, and curating an
    Instagram feed that showcases both industrial architecture and her own sourdough loaf art.
  travel: Rosa Pavey favors dark‑sky getaways such as Chile’s Atacama Desert and Flagstaff, Arizona, plus weekend drives to Starved Rock State Park, balancing her love for stargazing with a student‑budget
    travel plan that taxes her limited vacation days.
  culinary: Rosa Pavey experiments with sourdough starter using rye flour, malt, and a touch of whole‑wheat, while also perfecting a Chicago‑style deep‑dish pizza with caramelized onions and smoked mozzarella,
    showcasing a moderate cooking skill level that oscillates between meticulous measurement and spontaneous improvisation.
  core: Rosa Pavey, a 20‑year‑old aerospace dreamer, juggles telescope nights, rock‑climbing, sourdough experiments, and anxiety‑induced over‑thinking, thriving on flexible creativity yet often forgetting
    appointments and succumbing to late‑night Netflix binges.
background:
  cultural: Rosa grew up in a middle‑class family in Chicago’s West Loop area, where she was exposed to the city’s rich cultural mosaic and Midwestern pragmatism. Her parents, of Irish‑American and German‑American
    descent, instilled a blend of hardworking values and an appreciation for community gatherings, such as neighborhood block parties and seasonal festivals. Attending public schools and later the University
    of Illinois at Chicago, she benefitted from a diverse peer group that sparked her interest in collaboration across different perspectives. Chicago’s vibrant arts scene, lakeside recreation, and strong
    aerospace engineering community at nearby research labs shaped her worldview, fostering a balance between technical ambition and a desire for inclusive, flexible work environments.
