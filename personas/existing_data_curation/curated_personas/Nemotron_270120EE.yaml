  hobbies: '[''Karaoke nights'', ''Community theater improv'', ''DIY home‑improvement projects'', ''Zumba fitness classes'', ''Volunteering at the local food bank'', ''Attending Indy 500 events'', ''Board‑game
    meetups'', ''Reading tech and repair articles'', ''Balcony gardening'', ''Experimenting with new recipes'']'
  career_goals: Dianne aims to move from a general maintenance role into a senior supervisory position within the next five years. She plans to earn certifications such as the Certified Maintenance Manager
    (CMM) and an EPA-approved HVAC technician credential, which will deepen her technical expertise and open doors to facility‑manager responsibilities. Ultimately, she envisions leading a small team of
    maintenance technicians, overseeing preventive‑maintenance programs, and possibly launching her own locally‑focused repair service that emphasizes quick response times and personable customer interactions.
    She also hopes to reduce workplace stress by mastering time‑management techniques and advocating for a supportive crew culture.
