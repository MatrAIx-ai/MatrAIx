  career_goals: She dreams of growing up to be someone who can help others learn and feel safe – she often says she wants to be a teacher or a pediatric nurse. She also imagines working with animals as
    a veterinarian, combining her love for science with her desire to care for creatures. In the meantime, she hopes to keep volunteering at the school’s buddy program and the local animal shelter.
