personas:
  professional: A budding community helper and aspiring wildlife explorer, Ashley R channels their curiosity and compassionate nature into after‑school volunteer projects at the local church and seasonal
    nature walks, while their relaxed attitude toward chores sometimes leads to a half‑finished scrapbook of observed insects.
  sports: Ashley R plays after‑school soccer with the Grovetown Galaxy Soccer Club, enjoys dancing classes, follows the Atlanta Falcons and Georgia Bulldogs with enthusiasm, and they eagerly join the school’s
    spring track and field tryouts, showing a love for team sports and seasonal activity.
  arts: Ashley R delights in crafting friendship bracelets inspired by the bright colors of Ariana Grande’s album art, reads the Magic Tree House series by Mary Pope Osborne, and they often sing along to
    Disney soundtracks while dancing in after‑school classes, weaving creativity into daily play.
  travel: Ashley R prefers short family road trips, cherishes beach days at Tybee Island, explores the hiking trails of Great Smoky Mountains National Park, and they dream of a future adventure to Washington,
    D.C.’s National Air and Space Museum, balancing curiosity with a love for familiar comforts.
  culinary: Ashley R enjoys helping Mom bake peach cobbler with fresh Georgia peaches, mastering the perfect peanut‑butter‑and‑jelly sandwich, and they experiment with homemade mac and cheese seasoned with
    cheddar and a pinch of paprika, showcasing a budding kitchen confidence.
  core: Ashley R is an energetic, compassionate nine‑year‑old who frequently misplaces soccer socks, worries about the smallest details, and they transform backyard games into epic Minecraft quests.
background:
  cultural: Ashley was raised in Grovetown, Georgia, a close‑knit Southern town where community and family traditions are central. Her family participates in local church gatherings, celebrates Fourth of
    July fireworks, and enjoys southern comfort foods like fried chicken and peach pie. School events, neighborhood block parties, and parish youth groups shape her sense of belonging. The region’s emphasis
    on hospitality and helping neighbors reinforces her compassionate nature.
