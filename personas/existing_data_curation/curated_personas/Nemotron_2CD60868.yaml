  career_goals: Looking ahead, Mary aims to move into a senior operations management role where she can shape broader organizational policies and lead larger cross-departmental initiatives. She plans to
    earn a certification in Project Management (PMP) to reinforce her structured approach to complex projects and to leverage her competitive drive toward measurable efficiency gains. At the same time,
    she is focused on building a sustainable work-life balance that reduces her anxiety, including incorporating stress-management training for herself and her team. Her ultimate ambition is to retire with
    a reputation for having streamlined office processes and to offer consulting services to small businesses in the Knoxville area.
