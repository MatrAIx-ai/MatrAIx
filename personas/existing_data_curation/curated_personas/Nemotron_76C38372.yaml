  career_goals: In the next five years, Montie aims to transition from his current supervisory role to a senior leadership position, such as Director of Administration or Operations Manager, ideally within
    an arts or cultural institution where he can merge his administrative acumen with his passion for creativity. He seeks to lead organization-wide initiatives that modernize workflow, incorporate technology,
    and foster a culture of continuous improvement. Montie also harbors an ambition to establish a boutique consultancy specializing in efficiency solutions for non‑profit arts organizations. On a personal
    level, he aspires to author a guidebook that blends practical office management techniques with artistic thinking, positioning himself as a thought leader at the intersection of administration and creativity.
