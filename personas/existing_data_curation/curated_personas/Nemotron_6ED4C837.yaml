  career_goals: Clara aims to advance from her current receptionist role to an office‑manager or administrative‑supervisor position within the next five years, obtaining a Certified Administrative Professional
    (CAP) credential along the way. She hopes to broaden her skill set with project‑coordination and budgeting experience, allowing her to oversee larger community programs while preserving a flexible schedule
    that honors her preference for quiet work environments. Long‑term, she envisions a hybrid role that blends on‑site reception duties with remote information support for a nonprofit organization, so she
    can continue helping others without the constant need for face‑to‑face interaction.
