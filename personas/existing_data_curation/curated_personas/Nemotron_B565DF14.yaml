  hobbies: '[''Reading self‑help books'', ''Listening to finance podcasts'', ''Cooking Southern cuisine'', ''Attending potluck gatherings'', ''Jogging'', ''Beginner yoga'', ''Gardening'', ''Watching high‑school
    football games'', ''Participating in church events'']'
  career_goals: Brittany aims to earn her GED within the next year and pursue a certificate in medical billing and coding to qualify for higher‑level positions. In the medium term, she envisions moving
    into a billing supervisor role or becoming an insurance claims analyst, where she can blend her practical experience with leadership responsibilities. She also hopes to eventually enroll in community
    college courses in business administration to broaden her career options beyond the clerical level.
