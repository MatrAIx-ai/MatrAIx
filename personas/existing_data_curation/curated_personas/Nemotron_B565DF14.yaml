personas:
  professional: Brittany O'Brien is a meticulous medical billing clerk who leverages her curiosity about finance and practical self‑help insights to streamline claim posting in Kareo and MediTouch, while
    diligently pursuing a GED and a coding certification to transition into a supervisory or insurance‑claims analyst role.
  sports: Brittany O'Brien spends weekends cheering the Eastwood High Panthers football team and rooting for the Atlanta Falcons, maintains personal fitness through early jogs with the Sunrise Striders
    running club, and attends weekly beginner yoga classes at the community center for flexibility and stress relief.
  arts: Brittany O'Brien infuses creativity into her life by listening to soulful Leon Bridges, gospel performances by her First Baptist Choir, and re‑watching classic films starring Viola Davis while cooking,
    turning her kitchen into a personal stage for artistic expression.
  travel: Brittany O'Brien favors budget‑friendly road trips that mix careful planning with spontaneous stops, having explored New Orleans for its cuisine and dreaming of a future itinerary that includes
    Savannah’s historic squares and the Blue Ridge Parkway’s scenic vistas.
  culinary: Brittany O'Brien, a self‑taught Southern cook, perfects buttermilk‑fried chicken, slow‑cooks collard greens with smoked turkey, and regularly adds fresh garden kale to her spicy shrimp‑and‑grits,
    balancing meticulous recipe notes with a fearless willingness to experiment with bold flavors.
  core: Brittany O'Brien is a detail‑driven billing specialist who balances spreadsheets with Southern soul food, binge‑lists to finance podcasts at night, and occasionally forgets to sleep, all while charting
    a steady climb toward supervisory leadership.
background:
  cultural: Brittany is a white Southern woman raised in Horn Lake, Mississippi, a community with strong ties to family, church, and local traditions. The regional culture emphasizes hospitality, community
    involvement, and a blend of conservative values with a love for music, especially country and gospel. Growing up in DeSoto County, she was exposed to Southern culinary traditions, high‑school football
    culture, and church‑centered social life, all of which shape her outlook, values, and social interactions.
attributes:
  skills: '[''Data entry'', ''Medical billing'', ''Insurance claim posting'', ''Microsoft Excel'', ''Microsoft Word'', ''Billing software (Kareo, MediTouch)'', ''Basic accounting'', ''Customer service'',
