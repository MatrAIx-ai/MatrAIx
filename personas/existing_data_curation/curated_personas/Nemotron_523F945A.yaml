  career_goals: Johnathon aims to obtain a commercial driver’s license (CDL) and advanced forklift certifications within the next year, positioning himself for a shift‑lead supervisor role at his current
    facility. He plans to enroll in a part‑time associate’s program in supply chain management to deepen his logistics knowledge and eventually transition into a logistics manager or safety coordinator
    position. Long‑term, he envisions launching a small family‑run logistics and hauling business with his spouse, leveraging his operational expertise while creating a more flexible work environment that
    reduces stress and supports a healthy work‑life balance.
