personas:
  professional: Nereida Riveradeleon, a one-year-old, is already a miniature learner‑explorer in early childhood development activities, using organized block‑stacking and methodical cause‑and‑effect experiments
    that hint at a future in scientific inquiry.
  sports: Nereida Riveradeleon enjoys parent‑child swimming lessons at the community pool and quietly watches the home baseball team, the Chicago Cubs, on television while preferring solitary tummy‑time
    over noisy playground games.
  arts: Nereida Riveradeleon delights in listening to Mozart’s piano sonatas and children’s music by Raffi, often humming along while arranging plush toys in rhythm with the melodies, and they adore picture
    books illustrated by Dr. Seuss.
  travel: Nereida Riveradeleon has toured the local botanical garden and taken a family road trip to the Grand Canyon, favoring car journeys with scheduled nap breaks and a quiet seat by the window, and
    dreams of a stroller‑friendly visit to Disneyland.
  culinary: Nereida Riveradeleon prefers pureed carrots, ripe banana, and oatmeal with a dash of cinnamon, can self‑feed with a small spoon, yet occasionally flings peas across the high chair in a brief
    burst of rebellion.
  core: Nereida Riveradeleon is a one‑year‑old who combines methodical curiosity, a love for solitary play, and a habit of meticulously lining up toys while quietly resisting noisy crowds.
background:
  cultural: Nereida comes from a Mexican heritage family that maintains bilingual communication at home, speaking both Spanish and English. Family traditions such as celebrating Día de los Muertos, cooking
