persona_description: A city planner who is passionate about green urbanism and the impact of trees on urban heat island effects and passive heating. They are interested in implementing sustainable and environmentally
  friendly heating methods and are aware of the potential benefits of planting trees on both a microscale and mesoscale level. They are also aware of the negative impacts of using air conditioning and the
  need to consider passive heating as an option rather than relying on technology for all solutions. They are interested in the potential for trees to reduce wind speeds at street level and are aware of
  the importance of pedestrian safety in urban planning.
