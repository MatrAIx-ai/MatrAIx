personas:
  professional: Carolina Bayas, a 67‑year‑old veteran accountant renowned for meticulous financial statement analysis, audit and tax expertise, and a flair for abstract‑thinking data visualizations, now
    channels their seasoned skills into part‑time consulting for local small businesses and nonprofit arts groups while mentoring junior accountants and shaping board‑level fiscal strategies, and they relish
    the opportunity to blend numbers with creativity.
  sports: Carolina Bayas enjoys daily walks with her dachshund at the Fort Smith Riverfront Park, participates in the senior center’s gentle tai‑chi class, and they avidly follow the Arkansas Razorbacks
    men’s basketball team while cheering on the Dallas Cowboys each fall football season.
  arts: Carolina Bayas spends her mornings creating abstract watercolors of Arkansas pine forests, evenings at the Fort Smith Art Center viewing exhibitions featuring artists who blend vibrant folklore
    with modern abstraction, and they relax while listening to mariachi classics by Mariachi Vargas de Tecalitlán and folk ballads from Lila Downs.
  travel: Carolina Bayas prefers relaxed road trips with her fellow senior center volunteers, having already explored the historic streets of Oaxaca during its lively Día de los Muertos celebrations and
    planning a future pilgrimage to the painted villages of Guanajuato, while they also delight in weekend getaways to Santa Fe’s art scene and New Orleans’ Jazz District.
  culinary: Carolina Bayas delights in preparing mole poblano with roasted chiles de árbol and sweet plantains, hand‑rolling tamales for family gatherings, and they experiment with fusion dishes like chipotle‑infused
    quinoa salad, all while sourcing fresh epazote and heirloom corn from the local farmers’ market.
  core: Carolina Bayas navigates retirement with a blend of seasoned financial acumen, artistic curiosity, and community‑focused generosity, balancing meticulous spreadsheets with watercolor splashes, and
    they occasionally forget about their medication.
background:
  cultural: Carolina was born in Mexico and moved to the United States as a child, growing up in a bilingual household that cherished traditions such as Día de los Muertos, family gatherings, and homemade
    cuisine. Her Mexican heritage instills a strong sense of community, respect for elders, and an emphasis on harmony and cooperation—values that permeate her professional conduct and personal relationships.
    She remains fluent in Spanish, often using it to connect with older clients and community members, and she celebrates cultural festivals with her family in Fort Smith, preserving the rich customs of
    her ancestry while integrating them into her everyday life.
attributes:
  skills: '["Financial Statement Analysis", "Auditing and Assurance Services", "Tax Preparation", "Internal Controls Assessment", "QuickBooks and Sage Proficiency", "Advanced Excel and Data Visualization",
