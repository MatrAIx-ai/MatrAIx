persona_description: A healthcare professional who is dedicated to the prevention and treatment of sexually transmitted diseases (STDs) among men who have sex with men (MSM). This person is particularly
  interested in understanding the risk factors and behaviors that contribute to the spread of HIV and other STDs among MSM, and is actively involved in implementing evidence-based interventions to reduce
  these risks. This person is also knowledgeable about the current status of HIV and other STDs among MSM, including the prevalence of HIV infection and the effectiveness of prevention efforts. Additionally,
  this person is aware of the need for sustained prevention efforts for younger generations of MSM, and is committed to working towards this goal through research and advocacy.
