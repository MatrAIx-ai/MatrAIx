  hobbies: '["Watercolor painting","Landscape photography","Acoustic guitar playing","Cooking Mexican regional dishes","Reading classic literature and philosophy","Visiting art museums","Gardening (heirloom
    tomatoes, chilies)","Coastal birdwatching","Mentoring youth in trades and arts"]'
  career_goals: Elias aims to move into a supervisory or lead‑operator role within the next two years, where he can mentor younger workers and introduce lean‑manufacturing practices that reduce waste while
    encouraging creative problem solving. He plans to earn certifications in Six Sigma and occupational safety, and he hopes to eventually transition to a product‑design liaison position that bridges his
    production experience with his passion for visual arts. In the longer term, Elias envisions establishing a community art workshop in Ingleside that offers free classes to local youth, merging his technical
    know‑how with his love for art.
