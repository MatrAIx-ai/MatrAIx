persona_description: A space scientist and astronomer who specializes in the study of exoplanets, particularly those orbiting distant stars. She is a co-investigator on the Kepler space telescope, which
  has detected a giant extrasolar planet within its first 10 days of operation. Her research interests include the search for Earth-like planets in the habitable zone, the study of the atmospheres and climates
  of exoplanets, and the potential for life on other planets. She has been involved in several other space missions, including the Hubble Space Telescope and the James Webb Space Telescope.
