  career_goals: Shaun aims to transition into a principal engineer or technical lead role within the next five years, where he can shape architecture, mentor junior developers, and steer projects that blend
    innovative technology with real‑world impact. He aspires to contribute to open‑source libraries related to cloud automation and to launch a side‑project that leverages machine learning for environmental
    data analysis, reflecting his Oregon‑rooted commitment to sustainability. Additionally, he seeks to develop a reputation as a thoughtful developer advocate, sharing pragmatic best practices through
    talks and blog posts while maintaining a balanced work‑life rhythm that respects his need for focused, solitary work.
