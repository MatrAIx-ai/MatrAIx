personas:
  professional: Shaun Warner is a full‑stack software developer specializing in backend engineering and cloud‑native architectures, who writes clean, test‑driven Python and Go code, builds scalable AWS
    services with Docker and Kubernetes, and leverages a curious‑yet‑practical mindset to design pragmatic solutions while mentoring junior teammates and contributing to open‑source cloud automation tools.
  sports: Shaun Warner is an avid hiker of the Cascade foothills, a regular cyclist on the Willamette River trail who rides with the Portland Pedal Club, follows the Portland Trail Blazers, Seattle Seahawks
    and Portland Timbers, and incorporates weekend trail‑maintenance volunteer work into his fitness regimen.
  arts: Shaun Warner finds creative expression through nature photography inspired by Ansel Adams, unwinds with ambient electronic music by Tycho and Boards of Canada, plays strategy board games like Terraforming
    Mars and Gloomhaven, and spends occasional evenings immersed in indie video games such as Hades and Celeste.
  travel: Shaun Warner prefers low‑key, sustainability‑focused travel, meticulously planning bike‑packing trips to Oregon’s coast and weekend getaways to Crater Lake, while dreaming of a photography expedition
    to Iceland’s volcanic landscapes and a spring visit to Japan’s cherry‑blossom festivals, often using train travel to reduce carbon footprints.
  culinary: Shaun Warner’s culinary persona centers on craft coffee brewing with a Hario V60, a penchant for single‑origin beans, occasional home‑cooked brunches featuring avocado toast and smoked salmon,
    and a love for foraged mushrooms paired with locally sourced hazelnuts in rustic pasta dishes.
  core: Shaun Warner blends solitary curiosity with pragmatic engineering, balances meticulous budgeting with occasional splurges on coffee and gear, and steadies his life with outdoor pursuits, low‑key
    arts, and a steady drive toward sustainable tech leadership.
background:
  cultural: Shaun grew up in a small town in Oregon and later attended Oregon State University in Corvallis, where he earned a degree in computer science. Immersed in the Pacific Northwest’s culture of
    self‑reliance, environmental stewardship, and modest community ethos, he internalized values of practicality, independence, and collaborative problem‑solving. As a white American, his cultural identity
    is shaped less by ethnic tradition and more by regional influences—outdoor recreation, a pragmatic work ethic, and a modest, understated demeanor. He participates in local tech meetups and volunteer
    coding workshops, reflecting the area’s emphasis on community contribution and open‑source collaboration.
