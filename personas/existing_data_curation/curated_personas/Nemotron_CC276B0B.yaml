personas:
  professional: Brent Berges, a 45‑year‑old teaching assistant who merges speculative fiction themes with visual‑arts‑rich curriculum design, leverages Canvas, Adobe Suite, and analog darkroom techniques
    to create interdisciplinary lessons that spark curiosity while balancing meticulous organization with creative spontaneity.
  sports: Brent Berges follows the St. Louis Cardinals and St. Louis Blues with devoted fandom, participates in a weekend recreational tennis league at Forest Park, and joins a local hiking club for quarterly
    treks along the Ozark Trail, preferring low‑impact fitness that complements his garden work.
  arts: Brent Berges regularly attends screenings at the Screen‑Slate Indie Film Festival, explores exhibitions at the Contemporary Art Museum St. Louis, draws inspiration from the surrealist paintings
    of Remedios Varo, and curates analog photographic series of urban decay that echo the mood of his favorite speculative fiction authors like Octavia Butler.
  travel: Brent Berges favors off‑peak, culturally immersive trips—such as a rainy October visit to Copenhagen’s design museums, a spring road‑trip through the Pacific Northwest to attend the Seattle Science‑Fiction
    Con, and a quiet retreat to Kyoto’s zen gardens—balancing limited vacation days with a modest travel budget that still allows occasional international flights.
  culinary: Brent Berges delights in crafting heirloom tomato and kale salads with a basil‑garlic vinaigrette, perfects a rustic sourdough starter for weekend breads, and experiments with homemade kimchi
    using garden‑grown cabbage, while his kitchen skill level hovers between confident home chef and enthusiastic amateur, often pairing meals with a glass of Oregon pinot noir.
  core: Brent Berges is a creatively disciplined educator who channels his love of speculative worlds into arts‑infused pedagogy, balances meticulous financial planning with spontaneous garden and camera
    hobbies, and navigates life with a quiet curiosity punctuated by occasional stubbornness about his own routines.
background:
  cultural: Brent was raised in the Midwestern suburbs of St. Louis County, an area shaped by a blend of German-American heritage and broader Anglo-American traditions. The cultural atmosphere emphasizes
    community, modesty, and a strong work ethic, values that are reflected in his reliable approach to his teaching assistant role and his commitment to family life. Growing up in Saint Ann, he experienced
    the region's emphasis on local schools, church and civic events, and a fondness for regional cuisine such as toasted ravioli and barbecue. While his family background is largely white, middle-class,
    and often interwoven with Protestant values, Brent's personal curiosity has led him to explore diverse artistic and intellectual influences beyond his immediate community, integrating those perspectives
    into his professional and creative pursuits.
attributes:
  skills: '["Instructional Design", "Curriculum Development", "Classroom Facilitation", "Educational Technology (Canvas, Google Classroom)", "Media Production (Adobe Photoshop, Illustrator, Premiere Pro)",
    "Data Analysis of Student Performance", "Academic Writing and Editing", "Photography", "Sketching", "Creative Writing"]'
  hobbies: '["Reading speculative and contemporary fiction", "Visiting art museums and galleries", "Analog photography and darkroom work", "Sketching urban and natural scenes", "Gardening (heirloom vegetables)",
    "Participating in small board-game group", "Writing short stories and poetry"]'
  career_goals: Brent aims to transition from a teaching assistant to a full-time classroom teacher within the next three years, ideally in a school that values project-based learning and arts integration.
    He plans to complete his associate's degree and enroll in a master's program in Education Technology to deepen his expertise in digital pedagogy. Long-term, he envisions becoming a curriculum specialist
    or instructional designer, designing innovative interdisciplinary modules for district-wide adoption. He also hopes to publish a guidebook on incorporating visual arts into STEM education and to lead
    community workshops that empower other educators and parents to foster creative learning environments.
