personas:
  professional: A budding visual storyteller, Stephanie Robinson channels her curiosity and love for watercolor into sketching detailed fantasy characters, while her relaxed approach to obligations lets
    her experiment freely, and her compassionate nature shines when she volunteers to illustrate storybooks for younger library patrons.
  sports: A low‑key athlete, Stephanie Robinson enjoys seasonal cross‑country runs and occasional after‑school soccer with the Palatine Youth Soccer League, follows the Chicago Cubs and Bears on game days,
    and spends weekends hiking the nearby Forest Preserves for a gentle fitness boost.
  arts: A passionate young creator, Stephanie Robinson spends weekends sketching water‑color landscapes inspired by Georgia O'Keeffe and the modern murals at the Art Institute, while listening to indie
    artists like Phoebe Bridgers and Mitski and writing fanfiction for series such as "Stranger Things" and "Harry Potter", letting the blend of visual and literary arts shape her identity.
  travel: A thoughtful junior explorer, Stephanie Robinson enjoys family road trips to Chicago’s museum district and yearly visits to Starved Rock State Park, while dreaming of a future backpack adventure
    through Paris’s art galleries and the Black Forest, preferring spontaneous pit‑stops over rigid itineraries.
  culinary: A budding home chef, Stephanie Robinson loves whipping up quick spaghetti with fresh basil and mozzarella, perfecting chocolate‑chip cookies, and experimenting with sushi rolls topped with avocado,
    while savoring seasonal treats like pumpkin‑spice latte and comfort foods such as mac and cheese during chilly Illinois evenings.
  core: Stephanie Robinson is a quietly curious 13‑year‑old who blends artistic imagination with a laid‑back, compassionate vibe, often getting lost in watercolor sketches while juggling a scattered schedule
    and a love for indie tunes.
background:
  cultural: 'Stephanie comes from a white, middle‑class family in Palatine, a suburban community in Lake County, Illinois. Her upbringing reflects typical Midwestern values: a strong emphasis on community
    involvement, respect for personal space, and appreciation for seasonal traditions such as Thanksgiving, Christmas, and Fourth of July celebrations. Her family often participates in local events like
    the Palatine Farmers’ Market, community theater productions, and church‑organized service projects, which have broadened her exposure to diverse artistic and cultural experiences despite her suburban
    setting. The proximity to Chicago allows occasional trips to museums, concerts, and cultural festivals, influencing her curiosity about art and new ideas.'
attributes:
  skills: '[''Drawing'', ''Watercolor painting'', ''Digital illustration'', ''Basic Python programming'', ''Creative writing'', ''Peer mediation'', ''Organizing small volunteer events'', ''Basic music theory'']'
