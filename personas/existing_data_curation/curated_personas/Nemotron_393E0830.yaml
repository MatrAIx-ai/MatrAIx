  career_goals: She hopes to attend a specialized arts high school and eventually study art therapy or graphic design, aiming to combine her creative talents with a career that supports mental and emotional
    well‑being. In the long term she imagines working in community‑based organizations, creating visual programs that help children and teens express themselves. She also remains open to exploring environmental
    storytelling through interactive media.
