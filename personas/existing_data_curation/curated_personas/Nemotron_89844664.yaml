  career_goals: John aims to transition from day-to-day parcel delivery to a supervisory or logistics-coordination role within the next five years. He plans to earn a certification in supply-chain management
    and eventually become an operations manager for a regional courier firm, where he can apply his organizational strengths and curiosity about emerging delivery technologies such as electric vehicles
    and route-optimization algorithms. Long-term, he dreams of launching his own boutique delivery service that partners with local art galleries, museums, and small businesses, blending his logistics expertise
    with his passion for the arts. He also wants to achieve financial stability that would support a more predictable schedule for co-parenting responsibilities.
