  hobbies: '["Gardening", "Butterfly habitat care", "Reading historical fiction and tech biographies", "Senior book club", "Quilting", "Volunteering at the public library (Tech Basics sessions)", "Walking
    along the shoreline", "Bird‑watching"]'
  career_goals: Even at 87, Alyssa remains driven by a desire to safeguard the institutional knowledge of the systems she has tended for decades. Her primary ambition is to develop a structured knowledge‑transfer
    program for her organization, pairing seasoned analysts with younger staff to ensure seamless maintenance of critical infrastructure. She also aims to publish a practical guide on navigating the transition
    from legacy to modern IT environments, drawing on her unique blend of curiosity and practicality. Additionally, Alyssa hopes to expand community outreach by offering free workshops that teach seniors
    how to use digital tools safely, thereby reducing the local digital divide.
