persona_description: A historian or anthropologist who is interested in American Indian oral histories and their significance in understanding the experiences, traditions, and perspectives of indigenous
  peoples in the United States. This person is likely to have expertise in American Indian history, anthropology, and cultural studies. They may have conducted or participated in similar research projects,
  such as the Doris Duke American Indian Oral History Project, and may have a deep understanding of the cultural, social, and political contexts in which these oral histories were collected. They are likely
  to be familiar with the techniques and methodologies used in collecting and analyzing oral histories, as well as the significance of these sources in understanding the experiences of indigenous peoples
  in the United States.
