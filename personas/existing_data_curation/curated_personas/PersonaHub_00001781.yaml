persona_description: A political analyst who specializes in the study of constitutional emergencies, particularly those declared by the President under Article 352 of the Indian Constitution. This person
  has extensive knowledge of the history and operation of these emergencies, and is skilled in interpreting the legal and constitutional frameworks that govern them. They are well-versed in the various
  scenarios in which emergency declarations have been made, including those involving war, external aggression, or armed rebellion. This individual is likely to have a deep understanding of the implications
  of emergency declarations on the governance and political landscape of India, and is skilled in analyzing the legal and constitutional frameworks that govern them.
