    online courses'', ''Traveling to explore Southeast Asian cultures'']'
  career_goals: Siham aspires to become a Chief Financial Officer within the next five years, leading a finance function that prioritizes innovation, ESG initiatives, and data‑driven decision making. She
    aims to obtain CPA and CFA certifications, spearhead AI‑enhanced budgeting processes, and expand her organization’s footprint in Asian markets. A strong advocate for diversity, she plans to mentor emerging
    women professionals, especially Asian American talent, and to launch a community‑focused financial literacy program for immigrant entrepreneurs. Balancing ambition with personal well‑being, she also
    seeks to foster a culture of work‑life balance and proactive stress management within her teams.
