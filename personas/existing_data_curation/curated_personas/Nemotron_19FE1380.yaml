  career_goals: Although retired from formal employment, Shelley aims to remain actively engaged in her community. She aspires to expand the senior‑center gardening program she leads, mentor younger volunteers
    in organizing community events, and complete the remaining credits for her associate degree in business administration. She also hopes to develop a small collaborative cookbook featuring recipes from
    her book‑club members, reflecting her dedication to precise, structured projects. Her ambitions are modest and centered on contributing within her capacity, preserving a sense of purpose, and maintaining
    a predictable, rewarding routine.
