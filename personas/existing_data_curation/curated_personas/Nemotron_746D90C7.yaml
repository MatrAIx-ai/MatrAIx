  career_goals: Leanora dreams of becoming a kindergarten teacher one day because she loves sharing stories, creating organized classroom activities, and making sure her classmates feel safe and happy.
    She also imagines herself as a chef who can cook delicious Mexican dishes for her family, blending her love for creativity with a practical desire to bring comfort to others. Her ambitions are shaped
    by her compassionate nature and a strong wish to be reliable for those she cares about, even though she sometimes worries if she can live up to those expectations.
