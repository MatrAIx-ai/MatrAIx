  career_goals: Looking ahead, Maria aims to transition from day‑to‑day analytical tasks to a mentorship and thought‑leadership role within the investment community. She envisions establishing a boutique
    advisory practice that focuses on emerging sustainable technologies and unconventional asset classes, allowing her to apply her curiosity for novel ideas. Over the next five years, she hopes to publish
    a series of white‑papers on risk‑adjusted returns of “green” investments, mentor junior analysts through informal workshops, and eventually serve on the board of a regional arts fund that integrates
    both cultural and financial stewardship. While she values independence, she also wants to build a legacy that blends financial acumen with cultural enrichment.
