personas:
  professional: Maria Herman, a senior investment analyst with deep expertise in quantitative modeling, macroeconomic forecasting, and data visualization using Python, R, and Bloomberg, channels her spontaneous
    curiosity and skeptical eye into crafting unconventional green‑technology investment theses, while her preference for flexible workflows sometimes leads to missed reporting deadlines.
  sports: Maria Herman stays active through daily yoga, weekend hikes with the Portland Trails Hiking Club, and occasional kayaking on the Columbia River, while cheering for the Portland Timbers in soccer
    season and the Trail Blazers in basketball, favoring low‑impact cardio over competitive team sports.
  arts: Maria Herman curates a personal collection of contemporary abstract works by Julie Mehretu, Mark Rothko, and Ellsworth Kelly, frequents Portland's independent galleries such as the Foster Gallery,
    and unwinds by listening to Brian Eno's ambient albums and attending performances at the Portland Center Stage, letting the interplay of color and sound inform her analytical mindset.
  travel: Maria Herman prefers spontaneous, off‑the‑grid getaways—impromptu day trips to the Columbia River Gorge, weekend escapes to Leavenworth's Bavarian village, and reflective pilgrimages to Kyoto's
    tea houses—while sketching and photographing each stop, avoiding rigid itineraries in favor of fluid, curiosity‑driven exploration.
  culinary: Maria Herman delights in crafting pour‑over coffee with Ethiopian beans, simmering heirloom tomatoes and basil into a rustic ratatouille, and experimenting with homemade pesto using garden‑grown
    basil and pine nuts, though her tendency to over‑brew leads to occasionally bitter coffee.
  core: Maria Herman blends analytical rigor with artistic spontaneity, channeling a skeptical curiosity into sustainable finance while nurturing a rooftop garden, but often lets coffee‑induced late‑night
    coding sessions cloud deadline discipline and amplify their chronic worry.
background:
  cultural: Maria grew up in the Pacific Northwest in a middle‑class White American family with German‑Scandinavian roots. The region’s emphasis on environmental stewardship, independent thinking, and a
    vibrant DIY arts scene has shaped her values. She embraces Portland’s progressive culture—supporting local coffeehouses, farmers markets, and community art initiatives—while maintaining a pragmatic,
    analytical mindset fostered by her STEM education. Her marriage and long‑term residence in Washington County have further anchored her in a community that balances suburban stability with the region’s
    love for outdoor recreation and cultural experimentation.
