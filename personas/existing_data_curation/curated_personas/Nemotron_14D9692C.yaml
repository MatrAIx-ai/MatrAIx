  hobbies: '[''gospel choir'', ''volunteering at food pantry'', ''attending Caribbean and African American cultural festivals'', ''cooking Caribbean cuisine'', ''hosting potluck gatherings'', ''walking
    on the beach'', ''balcony gardening'', ''yoga and mindfulness'', ''reading mystery novels'', ''following New York Islanders hockey'']'
  career_goals: Robin aims to advance to a supervisory or operations manager role within the logistics department of her company, where she can design and implement more structured workflows that reduce
    uncertainty for her team. She plans to obtain a Certified Supply Chain Professional (CSCP) certification and enroll in part-time courses in supply chain management. In the longer term, she hopes to
    mentor younger women of color entering the freight industry and possibly start her own boutique freight brokerage focused on serving local small businesses in Queens. She also seeks a better work‑life
    balance to manage her anxiety, such as a predictable schedule and supportive leadership.
