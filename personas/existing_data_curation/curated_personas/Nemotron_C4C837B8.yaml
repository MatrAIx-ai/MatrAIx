  hobbies: '[''Basketball (recreational league)'', ''Hiking (Crowders Mountain)'', ''Live music concerts'', ''Volunteer bookkeeping for community theatre'', ''Mindfulness meditation'', ''Journaling'', ''Cooking
    Southern cuisine'']'
  career_goals: David aims to complete his bachelor's degree in accounting within the next two years and become a Certified Public Accountant (CPA). He envisions progressing from his current clerk role
    to a senior accountant position, eventually moving into a financial analyst or controller role at a midsize manufacturing firm in the Charlotte metropolitan area. He also wants to develop expertise
    in automated accounting tools and to lead a small team, leveraging his sociable nature while creating a structured, low‑stress work environment that supports his mental well‑being.
