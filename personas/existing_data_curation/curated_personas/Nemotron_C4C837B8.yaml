personas:
  professional: David Hehenberger, a 27‑year‑old accounting clerk in Charlotte, channels their love of structure and detail into meticulous QuickBooks entries, advanced Excel models, and clear financial
    reporting while using their sociable, assertive demeanor to bridge the gap between finance and non‑financial teams, all as they juggle a busy schedule of basketball games and community‑theatre volunteering.
  sports: David Hehenberger thrills on the court with the North Charlotte Hoops Club’s recreational basketball league, laces up for seasonal hikes up Crowders Mountain, and roots passionately for the Charlotte
    Hornets and Carolina Panthers, using these outlets to balance their structured work life with energetic fitness.
  arts: David Hehenberger, a dedicated volunteer on a community theatre’s financial committee, fuels their creative side by attending live shows at the Duke Energy Center featuring artists like Leon Bridges,
    Hozier, and Brittany Howard, and finds inspiration in the theatrical productions they help sustain.
  travel: David Hehenberger, who prefers meticulously planned weekend getaways, has already trekked the Blue Ridge Parkway to Asheville, explored the historic streets of Charleston, and dreams of immersing
    themselves in the fjords of Norway and the vibrant music scene of New Orleans, balancing their wanderlust with a tight work schedule and a modest travel budget.
  culinary: David Hehenberger, an avid home cook, regularly perfects Southern staples such as shrimp and grits, smoked paprika‑spiced fried chicken, and collard greens simmered with ham hocks, while experimenting
    with fusion twists like banana‑infused biscuits, showcasing their knack for balancing tradition with culinary creativity.
  core: David Hehenberger, a 27‑year‑old accounting enthusiast who thrives on structure, channels anxiety into nightly meditation, can’t resist a late‑night slice of fried chicken after basketball, and
    habitually over‑checks their bank balance before bed.
background:
  cultural: David grew up in a middle‑class, white, Southern family in Gaston County, where community ties, church involvement, and a strong work ethic were emphasized. He was raised on traditional Southern
    customs—family barbecues, college football fandom, and a love for outdoor activities. His cultural upbringing values hospitality, reliability, and a pragmatic approach to problem‑solving, which harmonizes
    with his preference for structure and his outgoing, community‑focused personality.
attributes:
  skills: '[''QuickBooks'', ''Sage Accounting'', ''Microsoft Excel (advanced functions & pivot tables)'', ''General ledger management'', ''Account reconciliation'', ''Financial statement preparation'',
