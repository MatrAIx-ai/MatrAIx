  career_goals: Amy aims to move from a frontline sales representative to a senior account manager within the next three years, taking responsibility for a small portfolio of key clients while maintaining
    a predictable schedule. She seeks to become a top performer in her district, earning recognition for consistently exceeding sales targets. Over the longer term, Amy hopes to transition into a regional
    sales manager role that offers more strategic oversight and less day‑to‑day client pressure. Ultimately, she envisions launching her own boutique wholesale business that supplies locally sourced products,
    allowing her to combine her market insight with entrepreneurial independence while preserving a balanced work‑life rhythm.
