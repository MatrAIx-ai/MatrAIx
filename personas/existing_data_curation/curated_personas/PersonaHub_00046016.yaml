persona_description: A researcher in the field of animal physiology and behavior, specifically focused on the study of broiler chickens. This researcher aims to evaluate the effect of different air temperatures
  on the mean surface temperature (MST) and on the surface temperature of different body parts of 7- to 35-day-old broilers using infrared thermography and equations available in current literature. This
  researcher is interested in understanding the heat transfer circumstances and the efficiency of environmental control in broiler houses.
