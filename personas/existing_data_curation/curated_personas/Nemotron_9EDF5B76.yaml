personas:
  professional: Salvador Vargas, a budding LEGO architect, balances a vivid curiosity for how things fit together with a practical tendency to follow step‑by‑step instructions, organizes play sessions into
    tidy project stations while staying flexible to new ideas, and they gladly share their creations with classmates to nurture cooperation.
  sports: Salvador Vargas loves kicking a soccer ball with the Little Tigers Youth Soccer Club during spring, practices duck‑duck‑goose games at the local playground in summer, and proudly wears a miniature
    Los Angeles Dodgers cap while watching games on TV, showing an enthusiastic yet balanced approach to staying active.
  arts: Salvador Vargas spends afternoons drawing colorful pictures of dinosaurs and superheroes inspired by Disney’s Frozen and Sesame Street’s Elmo, sings along to The Wiggles’ upbeat songs, and eagerly
    watches Pixar’s Toy Story, letting these beloved characters shape their playful imagination and gentle storytelling.
  travel: Salvador Vargas enjoys family road trips to the beach where they build sandcastles, feels a thrill when exploring the colorful rides at Disneyland, and dreams of a future adventure to the Grand
    Canyon, preferring a mix of structured stops and spontaneous playground discoveries.
  culinary: Salvador Vargas adores cheesy pizza slices, crunchy chicken nuggets, and strawberry‑topped pancakes, can whisk batter with a tiny wooden spoon under parental guidance, and often requests extra
    cheese or a side of carrot sticks at meals, reflecting a simple yet enthusiastic palate.
  core: Salvador Vargas balances a boundless curiosity with a surprisingly organized play style, offers gentle help to friends while quietly fretting over small worries, and habitually hides spare crayons
    behind books for later use.
background:
  cultural: Salvador is raised in Ponce, a vibrant city on the southern coast of Puerto Rico known for its historic architecture, the iconic Parque de Bombas, and the annual Carnaval de Ponce. He lives
    in a close‑knit, multigenerational family where Spanish is spoken at home and English is introduced at school, giving him a bilingual foundation. Family gatherings often feature traditional dishes such
    as arroz con gandules, mofongo, and pastelón, and Catholic celebrations like Navidad and Semana Santa are central to his upbringing. He is exposed to Afro‑Caribbean rhythms like bomba and plena through
    community festivals, and he regularly visits nearby beaches and the nearby mountains, fostering a deep appreciation for the island’s natural beauty.
