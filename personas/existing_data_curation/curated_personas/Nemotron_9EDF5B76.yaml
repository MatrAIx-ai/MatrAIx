  career_goals: Even at five, Salvador often talks about wanting to become a doctor or a firefighter because he loves helping people feel safe and healthy. He also dreams of being a teacher who can share
    stories and songs with younger children, reflecting his caring nature. Occasionally, he imagines protecting the island’s beaches as a park ranger, showing his fascination with nature and his desire
    to keep his community harmonious.
