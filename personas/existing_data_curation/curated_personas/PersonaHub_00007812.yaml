persona_description: A scholar who studies the impact of demographic changes on higher education and the challenges of integrating minority and low-income students into selective institutions. This person
  is deeply concerned about the stratification of American society and the need to address the inequalities in access to higher education. They are also knowledgeable about the demographic shifts in the
  United States and how they have affected the allocation of resources in higher education. This person is likely to be a professor or researcher in a field related to education policy or sociology, and
  has a deep interest in understanding the complex interplay between social, demographic, and educational factors.
