personas:
  professional: Carmen Velez leverages her STEM background and fifteen years of HR experience to lead data‑driven talent acquisition and inclusive culture initiatives, applying meticulous analytics, rigorous
    project management, and a competitive edge that pushes her team toward measurable performance goals.
  sports: Carmen Velez hits the courts at the Santa Fe Tennis Club for weekly doubles matches, follows the New Mexico Lobos basketball season, cheers for the Colorado Rockies during spring training, and
    leads monthly group hikes through the Sangre de Cristo foothills, balancing competitive tennis with community outdoor fitness.
  arts: Carmen Velez spends her evenings dancing salsa and bachata at local cultural nights, delights in the energetic brass of artists like Marc Anthony, and attends seasonal performances by the Santa Fe
    Opera and the New Mexico Symphony, using music as both social fuel and personal rejuvenation.
  travel: Carmen Velez prefers meticulously planned getaways, alternating between adventurous weekend treks in Patagonia’s Andes—on her bucket list after a recent trip to the Grand Canyon—and relaxing spa
    stays in Sedona, always budgeting travel expenses in her HR analytics sheets.
  culinary: Carmen Velez showcases her cooking prowess at potluck gatherings with aromatic pork roast marinated in adobo, cilantro‑lime rice, and plantain‑based side dishes, while also tending a modest
    herb garden of oregano, cilantro, and sage that she harvests for fresh garnish.
  core: Carmen Velez is a data‑driven HR strategist who balances a love for lively group dance and rugged hiking with a fiercely organized, slightly skeptical nature that fuels both her professional ascent
    and her penchant for planning every detail of her life.
background:
  cultural: Carmen was raised in a bilingual Puerto Rican household, where Spanish and English intertwined with vibrant traditions of music, storytelling, and cuisine. The values of family solidarity and
    community celebration she inherited are evident in her love for cooking arroz con gandules and sharing it at neighborhood gatherings. Relocating to Santa Fe introduced her to the region's Southwestern
    and Native American cultural tapestry, which she embraces through participation in local festivals and appreciation of the area's art scene. Her heritage informs her commitment to cultural representation
    and inclusion within the workplace, and she often serves as a bridge between Caribbean and New Mexican cultural perspectives.
attributes:
