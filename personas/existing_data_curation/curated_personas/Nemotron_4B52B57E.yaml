  hobbies: '[''Salsa dancing'', ''Group hiking'', ''Cooking Puerto Rican dishes'', ''Community potluck organizing'', ''Volunteering to teach computer basics'', ''Tennis'', ''Gardening'', ''Puzzle solving'',
    ''Reading leadership and psychology books'']'
  career_goals: Carmen aims to advance to a senior HR leadership role—such as HR Director or Vice President of People—where she can spearhead data-driven talent strategies and champion diversity, equity,
    and inclusion initiatives that reflect her Puerto Rican heritage. She plans to earn the SHRM Senior Certified Professional credential, lead a cross‑functional HR tech transformation, and ultimately
    mentor emerging HR professionals, especially women and Hispanic candidates, within the tech sector.
