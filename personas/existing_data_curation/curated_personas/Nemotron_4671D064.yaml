personas:
  professional: Ciarra Swain, a 19‑year‑old communications student, blends graphic design, digital illustration, and photography to craft socially conscious media campaigns for Pittsburgh nonprofits, leveraging
    their curiosity and a flexible, sometimes disorganized, work style to champion community voices.
  sports: Ciarra Swain avidly follows the Pittsburgh Steelers and Penguins, joins a community yoga class for flexibility, and participates in a weekend intramural volleyball league, preferring low‑key,
    adaptable fitness activities over rigid training regimens.
  arts: Ciarra Swain curates eclectic playlists of jazz, neo‑soul, and hip‑hop while sketching urban landscapes, frequents the Mattress Factory and August Wilson Center, and draws inspiration from contemporary
    Black poets and African‑American visual artists, often weaving these influences into their digital illustrations and photography projects.
  travel: Ciarra Swain enjoys spontaneous weekend road trips to historic towns like Lancaster and Gettysburg, balances these explorations with careful budgeting, and dreams of a future study‑abroad semester
    in New Orleans to immerse themselves in its vibrant music and artistic scene.
  culinary: Ciarra Swain experiments with Southern comfort dishes such as collard greens, gumbo, and peach cobbler, cooking at an intermediate skill level while sourcing fresh ingredients at the Pittsburgh
    Public Market and sharing meals with friends at communal potlucks.
  core: Ciarra Swain is a curiosity‑driven college student who fuses art and activism, juggling flexible freelance work, mindfulness practices, and a love for urban exploration while occasionally battling
    stress‑induced disorganization.
background:
  cultural: Ciarra is a Black woman raised in Pittsburgh’s vibrant African‑American community, with family ties that trace back to the Great Migration from the Southern United States. She grew up immersed
    in the city’s rich Black cultural heritage—listening to gospel choirs at church, attending local jazz nights in the Hill District, and celebrating Juneteenth with community festivals. Her upbringing
    emphasized storytelling, resilience, and collective uplift, shaping her appreciation for art as a vehicle for social change and her commitment to preserving and amplifying Black voices in creative spaces.
