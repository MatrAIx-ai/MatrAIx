  hobbies: '[''Sketching'', ''Gallery hopping'', ''Photography'', ''Reading contemporary Black literature'', ''Listening to jazz and hip‑hop'', ''Volunteering at community art workshops'', ''Yoga and mindfulness'',
    ''Cooking Southern-inspired meals'']'
  career_goals: Ciarra aims to finish her degree in communications or visual arts and build a career that merges her love for art with community impact. She envisions working as a digital media strategist
    or program coordinator for a nonprofit or cultural institution in Pittsburgh, such as the Carnegie Museum of Art or local community art centers. Long‑term, she hopes to launch her own freelance studio
    that creates culturally resonant visual campaigns and curates pop‑up exhibitions highlighting Black artists. Flexibility is key for her, so she prefers roles that allow creative freedom, remote work
    options, and a supportive environment for mental well‑being.
