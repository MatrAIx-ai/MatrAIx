  hobbies: '[''Visiting art galleries and museums'', ''Sketching and street photography'', ''Playing acoustic guitar'', ''Listening to diverse music genres'', ''Cooking modern Mexican dishes'', ''Yoga and
    meditation'', ''Hiking desert trails'', ''Listening to educational podcasts'', ''Reading philosophy and science non-fiction'']'
  career_goals: Looking ahead, Carlos aims to transition into a leadership role where he can influence school-wide instructional practices. He plans to pursue a master's in educational leadership and eventually
    become an instructional coach or curriculum specialist, focusing on arts integration and bilingual education. He also hopes to develop a community partnership program that brings local artists into
    the classroom and offers after-school workshops for underserved students. Ultimately, he envisions shaping policies that sustain creative, culturally inclusive learning environments while maintaining
    a balanced work-life rhythm.
