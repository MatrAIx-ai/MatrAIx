personas:
  professional: Jorge Pradenas, a master carpenter with over forty years of experience, merges precise framing, historic restoration, and advanced wood joinery with an imaginative infusion of folk motifs,
    leveraging their disciplined organization and curiosity to mentor apprentices part‑time while operating a boutique studio that produces art‑focused custom furniture.
  sports: Jorge Pradenas stays active with low‑impact exercise, playing weekend golf at Riverside Country Club, walking weekly with the Cedar Rapids Senior Walking Club, and cheering the Iowa Cubs, the
    Chicago Bears, and the Iowa Hawkeyes while preferring small‑group fitness over large gym crowds.
  arts: Jorge Pradenas regularly attends gallery openings featuring the work of contemporary wood sculptor Simon Phillips, studies traditional folk carving styles reminiscent of regional artisans, finds
    inspiration in the music of Andrés Segovia, Bob Dylan, and Joni Mitchell, and occasionally performs simple renditions on their acoustic guitar.
  travel: Jorge Pradenas prefers thoughtfully planned trips that blend craft inspiration and relaxation, such as a hands‑on joinery workshop in Kyoto, a historic architecture tour of Charleston, and serene
    weekend getaways to the wine region of Sonoma, while balancing travel with a modest retirement budget and occasional family commitments.
  culinary: Jorge Pradenas delights in cooking homestyle dishes like carnitas, pozole, and chiles rellenos, hand‑grinding masa from heirloom corn and slow‑roasting chilies to craft authentic mole sauce,
    and while they consider themselves a competent home cook, they occasionally over‑season and rely on their garden’s fresh cilantro and oregano for flavor.
  core: Jorge Pradenas is a disciplined, curiosity‑driven woodworker who balances meticulous craftsmanship with folk‑art inspiration, solitary guitar sessions, and a steadfast commitment to guiding the
    next generation, all while secretly hoarding vintage hand tools like a child with treasure.
background:
  cultural: Jorge was born in Jalisco, Mexico, and moved to the United States as a teenager. Growing up in a close-knit Mexican-American community in the Midwest, he retained fluency in Spanish and a deep
    appreciation for Mexican folk art, music, and cuisine. His cultural upbringing emphasized craftsmanship, respect for elders, and the importance of family, which have shaped his disciplined work ethic
    and his desire to mentor younger carpenters. He regularly participates in local Latino celebrations such as Cinco de Mayo and Día de los Muertos, and he incorporates traditional Mexican motifs into
    his woodworking, creating a unique blend of his heritage with Midwestern craftsmanship.
attributes:
  skills: '[''Precision framing'', ''Custom furniture design'', ''Historic restoration'', ''Advanced wood joinery'', ''Tool maintenance and sharpening'', ''Project planning and budgeting'', ''Building code
