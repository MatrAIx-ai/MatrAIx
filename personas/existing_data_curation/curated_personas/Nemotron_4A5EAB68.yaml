  hobbies: '[''Visiting art galleries'', ''Wood carving'', ''Reading historical biographies'', ''Gardening'', ''Cooking Mexican cuisine'', ''Playing guitar'', ''Attending Mexican cultural festivals'', ''Tinkering
    with vintage tools'', ''Experimenting with unconventional woodworking designs'']'
  career_goals: Jorge aims to transition to a part-time mentorship role, training a new generation of carpenters in both traditional methods and innovative designs. He wants to establish a small studio
    where he can create custom, art-focused furniture that blends Mexican folk motifs with Midwestern aesthetics. He plans to document his craft through instructional videos and a memoir that reflects his
    life, his late wife, and his immigrant experience. Additionally, he hopes to contribute to community projects such as restoring historic homes in Cedar Rapids and to volunteer with local cultural organizations
    to promote Latino heritage.
