  career_goals: Felicia aims to transition from a successful independent stylist to a boutique salon owner that doubles as a creative studio. She envisions launching a line of natural hair care products
    and styling accessories that reflect her artistic aesthetic and celebrate Black hair culture. She wants to become a regular judge and featured stylist at regional hair competitions and fashion weeks,
    and to host quarterly masterclass workshops that blend hair artistry with abstract visual concepts. In the long term, she hopes to author a coffee‑table book showcasing her most avant‑garde hairstyles
    and eventually open a community art‑and‑beauty space that offers both salon services and art classes, fostering a hub for creative expression in Oxford.
