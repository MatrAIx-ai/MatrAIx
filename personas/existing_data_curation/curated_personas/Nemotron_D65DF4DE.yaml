personas:
  professional: Felicia Walker, a 43‑year‑old master stylist and creative entrepreneur, fuses precision hair cutting, advanced color formulation, and abstract‑inspired sculpting with an improvisational
    workflow that leverages Instagram and TikTok to showcase bold looks while mentoring apprentices through competitive, trend‑driven challenges.
  sports: Felicia Walker channels her energetic spirit into line‑dancing nights at the community center, weekly salsa sessions at the downtown Latin club, and a casual membership in the Oxford Pickleball
    League, while cheering on the Mississippi State Bulldogs football team during fall and fitting in occasional 5K charity runs in spring.
  arts: Felicia Walker draws inspiration from abstract pioneers like Mark Rothko and contemporary visual provocateur Kehinde Wiley, curates playlists featuring H.E.R., Esperanza Spalding, and the rhythmic
    pulses of Buena Vista Social Club, and frequently cites the cinematic flair of director Ava DuVernay and the theatrical dynamism of Beyoncé’s visual albums as artistic touchstones.
  travel: Felicia Walker’s travel style blends spontaneous road trips with purposeful cultural pilgrimages, having explored New Orleans’ Mardi Gras revelry, Savannah’s historic squares, and a fashion‑focused
    weekend in New York City, while she dreams of an immersive artist‑retreat in Paris’s Montmartre district and a wellness getaway to Sedona’s red‑rock landscapes.
  culinary: Felicia Walker is a self‑taught Southern chef who effortlessly whips up shrimp‑and‑grits with a splash of miso, collard greens seasoned with smoked paprika, and sweet‑potato pie spiked with
    ginger, favoring fresh thyme, Cajun cayenne, and locally sourced heirloom tomatoes in her experimental potluck spreads.
  core: Felicia Walker is a fiercely imaginative salon virtuoso who turns hair into canvas, thrives on social buzz, occasionally lets paperwork pile up, and balances competitive drive with a laid‑back,
    joy‑filled approach to both work and life.
background:
  cultural: Felicia is an African‑American woman rooted in the cultural tapestry of Oxford, Alabama. Growing up in a close‑knit Black community, she was shaped by the rhythms of Southern gospel churches,
    the storytelling traditions of the African diaspora, and the vibrant heritage of Black hair culture. Family gatherings centered around soul food, music, and shared histories, instilling a strong sense
    of resilience and communal support. Her styling aesthetic draws from both the bold, expressive art of the Harlem Renaissance and the earthy, natural textures celebrated in Southern Black beauty traditions.
    She values community mentorship, often giving back through church youth programs and local beauty workshops, and she proudly incorporates elements of her Southern Black heritage into her work and personal
    life.
