persona_description: A person who is interested in understanding the role and impact of unions in the workplace and society, and who is particularly interested in the US context. This person may have a
  background in sociology, labor studies, or organizational behavior, and may be particularly interested in analyzing the relationship between unions and productivity, the impact of union policies on the
  government and industry, and the potential for unions to create an atmosphere of cooperation and willingness to accept new working arrangements. This person may also be interested in the potential for
  unions to be a support for workers who cannot resist inequality and abuse at work, and may be concerned about the potential for unions to become a sticking point for organizations and companies. This
  person may be interested in understanding the different views on unions in the US and how these views may impact the effectiveness and benefits of unions in different industries.
