  hobbies: '[''Reading historical fiction'', ''Listening to Puerto Rican folk and salsa music'', ''Gardening (herbs, orchids, native wildflowers)'', ''Birdwatching'', ''Knitting and crocheting'', ''Cooking
    traditional Puerto Rican dishes'', ''Walking along the Gulf Coast'', ''Jigsaw puzzles'', ''Genealogy research'']'
  career_goals: Although retired, Edna aims to stay active and engaged in her community. She plans to expand her volunteer work at the local senior center by leading a series of monthly cooking classes
    that teach traditional Puerto Rican recipes and healthy adaptations. She also hopes to compile a family cookbook that documents her mother's and grandmother's dishes, preserving them for future generations.
    On a personal level, Edna is committed to maintaining her mobility and independence through daily walks on the nearby beaches, regular gardening, and gentle stretching routines. She aspires to deepen
    her knowledge of native Florida flora and to visit Puerto Rico for a family reunion within the next few years.
