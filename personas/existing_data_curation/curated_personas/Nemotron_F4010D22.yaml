personas:
  professional: Edna Dodson, a retired community cooking instructor and seasoned home economist, blends her practical budgeting skills, green-thumb gardening expertise, and gentle, cooperative nature to
    lead low-key cooking workshops that celebrate traditional family recipes while embracing a relaxed, somewhat spontaneous approach to organization.
  sports: Edna Dodson stays active through daily sunrise walks along the Gulf Coast, occasional senior yoga classes at the local community center, and casual birdwatching outings, while cheering on the
    Miami Dolphins in football season and the Tampa Bay Rays during baseball, reflecting her preference for low-intensity, solitary activities over competitive sports.
  arts: Edna Dodson fills her quiet afternoons with classic folk tunes from artists like Bob Dylan and Joan Baez and upbeat big-band swing from Glenn Miller, letting the music inspire her knitting, crocheting,
    and quilting projects.
  travel: Edna Dodson prefers low-key, well-planned trips that blend relaxation with gentle exploration, such as weekend stays in historic Savannah, weekend getaways to the Florida Keys, and a long-awaited
    dream to visit the Caribbean island of her family's heritage, all arranged with flexible itineraries that accommodate her love for solitude and occasional budget constraints.
  culinary: Edna Dodson, a seasoned home cook, expertly prepares traditional dishes like arroz con gandules, slow-roasted pernil, and hand-wrapped pasteles using fresh herbs such as cilantro and oregano
    from her garden, often tweaking recipes for healthier twists while relishing the communal dining experience with family and friends.
  core: Edna Dodson epitomizes a quiet, curiosity-driven retiree who balances meticulous budgeting and gardening expertise with a delightfully disorganized penchant for leaving knitting needles scattered
    around the house, all while cherishing solitary moments with a cup of coffee and classic folk melodies.
background:
  cultural: Edna was raised in a bilingual Puerto Rican household, speaking both Spanish and English, and her upbringing is steeped in the island’s traditions. She celebrates key cultural holidays such
    as Nochebuena, Three Kings Day, and the Puerto Rican Festival in Florida, often preparing classic dishes like pernil, arroz con gandules, and pasteles. Her Catholic faith informs many family rituals,
    and she maintains strong ties with relatives in Puerto Rico, visiting them when possible and staying connected through video calls. In Pinellas County, she participates in the local Puerto Rican diaspora
    community, attending church events and occasional cultural gatherings, while also passing on language and culinary skills to her grandchildren. Her identity blends the warmth of Puerto Rican family
    values with the relaxed, nature‑focused lifestyle of coastal Florida.
