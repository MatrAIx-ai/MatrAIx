personas:
  professional: Rosalie Sanders is a diligent aspiring administrative professional who leverages their strong organizational, time‑management, and Microsoft Office expertise to coordinate intimate events
    and manage project details, seeking a predictable, low‑stress entry‑level role that lets them methodically troubleshoot problems and grow toward office management in the nonprofit sector.
  sports: Rosalie Sanders enjoys gentle hikes in the Great Smoky Mountains as their primary fitness outlet, participates in the local Smoky Trail Hiking Club, and cheers for the Tennessee Titans and Nashville
    Predators, preferring low‑impact aerobic activities over competitive sports.
  arts: Rosalie Sanders immerses themselves in literary worlds by reading novels from Haruki Murakami and Celeste Ng, listens to minimalist pianist Ludovico Einaudi while knitting, and attends performances
    by the local theatre troupe The Actors' Gang, finding comfort in these artistic expressions.
  travel: Rosalie Sanders favors low‑stress, well‑planned trips, often taking weekend getaways to Asheville’s Blue Ridge Parkway or the historic Biltmore Estate, while dreaming of a leisurely vineyard tour
    in Tuscany and a quiet cabin stay in Patagonia, always booking months ahead to keep costs predictable.
  culinary: Rosalie Sanders loves cooking with fresh herbs from their indoor garden, frequently preparing basil pesto pasta, lemon‑blueberry muffins, and rosemary‑roasted chicken, and they delight in kneading
    sourdough starter while experimenting with thyme‑infused olive oil.
  core: Rosalie Sanders is a methodical planner whose curiosity is tempered by a constant undercurrent of worry, prompting them to over‑organize schedules, over‑think decisions, and sometimes abandon tasks
    midway when stress overwhelms them.
background:
  cultural: Rosalie was raised in a middle‑class, white Southern family in Knoxville, Tennessee, with deep ties to the Appalachian region. Her upbringing reflects Southern hospitality, strong family bonds,
    and a modest, community‑oriented Christian (Baptist) tradition. She values local customs such as enjoying Southern cuisine, folk music, and outdoor recreation in the Smokies. While she embraces contemporary
    ideas through education and personal growth, she maintains a connection to her community through church activities and volunteer service, balancing modern curiosity with practical, regional values.
