  career_goals: Rosalie aims to finish a bachelor’s degree in Business Administration or Human Services while balancing her married life. She seeks an entry-level administrative or project-coordination
    role that lets her apply her methodical strengths, eventually moving into office management or nonprofit program coordination. She plans to earn a certification in project management or basic financial
    planning to increase her employability and provide long-term financial stability for her family, preferring positions with predictable schedules and low-stress environments.
