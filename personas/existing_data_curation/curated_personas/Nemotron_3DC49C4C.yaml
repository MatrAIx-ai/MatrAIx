personas:
  professional: Luz Gonzalez is a detail‑driven carpenter apprentice who merges traditional hand‑joinery with CNC‑enabled custom work, meticulously plans each job from blueprint analysis to material estimation,
    quietly mentors newer apprentices, and they consistently bring a calm, reliable presence to the worksite while championing safety and sustainable building practices.
  sports: Luz Gonzalez enjoys the solitude of weekend hikes with the Blue Ridge Hiking Group, participates in occasional pickup basketball games, roots for the Carolina Hurricanes and Charlotte Hornets,
    and they prioritize low‑impact cardio and outdoor activity that complements their steady work rhythm.
  arts: Luz Gonzalez strums acoustic guitar to folk legends like Joan Baez and ranchera ballads by Lila Downs during informal jam sessions, curates playlists that echo the rhythms of their heritage, immerses
    themselves in bilingual literary discussions, and they regularly attend local art fairs to draw inspiration for their woodworking designs.
  travel: Luz Gonzalez prefers thoughtfully planned road trips that blend quiet nature retreats—such as cabin stays on Ocracoke Island and hiking the Blue Ridge—and culturally rich cities like Asheville
    and Santa Fe, where they explore local crafts and cuisine, all while budgeting travel within a modest fund.
  culinary: Luz Gonzalez crafts hearty tamales, steaming pozole, and bright salsa fresca using garden‑grown cilantro, fresh chilies, and corn masa, honing a cooking style that merges traditional recipes
    with seasonal ingredients, and they savor the hands‑on, methodical preparation over fast‑food convenience.
  core: Luz Gonzalez blends the disciplined precision of a carpenter with a quiet love for folk strings and garden‑fresh flavors, habitually losing track of time in the workshop while leaving a trail of
    spare nails on the kitchen table.
background:
  cultural: Luz is a second‑generation Mexican‑American who grew up in a bilingual household in the Carolinas. Her parents immigrated from Oaxaca, bringing with them a strong sense of family, community,
    and traditional craftsmanship. From a young age she helped in the family kitchen, learning the rhythms of Mexican cooking, and observed her father’s love for woodworking, which sparked her interest
    in carpentry. She celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo with her extended family, while also participating in local North Carolina community events. Bilingual in Spanish
    and English, Luz often serves as a cultural bridge, translating for Spanish‑speaking neighbors and collaborating on community projects. Her heritage influences her aesthetic sensibilities, favoring
    vibrant colors, intricate wood inlay patterns, and a respect for handcrafted quality that she brings to her professional and personal projects.
attributes:
  skills: '[''Framing'', ''Finish carpentry'', ''Cabinet making'', ''Blueprint reading'', ''Construction site safety'', ''Material estimation'', ''Project scheduling'', ''Custom furniture design'', ''Power
    tool operation'', ''Hand tool mastery'', ''Basic CNC machining'', ''Team collaboration'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Custom furniture making (personal projects)'', ''Traditional Mexican cooking'', ''Herb and vegetable gardening'', ''Acoustic guitar playing'', ''Hiking in the Blue Ridge foothills'', ''Volunteer
    work with Habitat for Humanity'', ''Reading woodworking and design books'', ''Bilingual book club participation'', ''Landscape photography'']'
  career_goals: Short‑term, Luz intends to complete a state‑approved apprenticeship and obtain her NC Certified Carpenter license, adding formal credentials to her hands‑on experience. She plans to enroll
    in advanced courses on sustainable building materials and green construction practices, aligning her practical curiosity with environmental stewardship. In the medium term, she aims to become a project
    foreman, overseeing small crews and ensuring projects meet both quality standards and schedule commitments. Ultimately, Luz dreams of opening her own boutique workshop in Richlands, where she can design
    and fabricate custom furniture that blends contemporary craftsmanship with Mexican folk motifs, while providing mentorship opportunities for other young, under‑represented tradespeople.
