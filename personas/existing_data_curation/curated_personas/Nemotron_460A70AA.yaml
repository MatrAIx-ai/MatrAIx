  hobbies: '[''Watercolor painting'', ''Collecting Mexican folk art'', ''Gardening (herbs and roses)'', ''Cooking traditional Mexican cuisine'', ''Reading historical biographies and Mexican literature'',
    ''Playing guitar to perform mariachi melodies'', ''Volunteering at community center (storytelling workshops)'', ''Walking in local parks'', ''Attending art exhibitions and museum tours'', ''Family genealogy
    research'']'
  career_goals: Even in retirement, Joel seeks to deepen his engagement with the arts and his cultural heritage. He aims to complete a series of watercolor paintings that blend Mexican folk motifs with
    contemporary themes, and to organize a community exhibition of local Mexican-American artists in Mesquite. Joel plans to mentor younger volunteers at the neighborhood cultural center, sharing his storytelling
    techniques and culinary traditions. He also wishes to document his family’s migration story in a memoir that can serve as a resource for future generations. Occasionally, he hopes to travel to his ancestral
    hometown in Mexico to reconnect with his roots and bring back new artistic inspirations.
