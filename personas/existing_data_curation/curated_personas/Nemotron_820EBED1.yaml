  hobbies: '[''Reading science books'', ''School garden caretaking'', ''LEGO building'', ''Drawing animals and nature'', ''Soccer practice'', ''Making friendship bracelets'']'
  career_goals: Irene dreams of a future where she can combine her love for caring for others with her practical mindset. She often talks about becoming a veterinarian because she wants to help animals
    stay healthy, and she imagines one day working at a local animal shelter. She also expresses interest in becoming a teacher, hoping to create a welcoming classroom where every child feels supported.
    In the meantime, she aims to earn the "Student Helper" award at school, lead her class’s community‑service projects, and continue learning about science and nature to lay the groundwork for her long‑term
    ambition of contributing to her community’s well‑being.
