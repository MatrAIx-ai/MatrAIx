personas:
  professional: Irene Long is an aspiring junior scientist who blends a methodical love of space and environmental study with organized LEGO engineering, and their compassionate, reliable nature makes them
    a trusted collaborator in school science fairs and neighborhood garden projects.
  sports: Irene Long plays weekly soccer with the Madison County Mini‑Tigers, enjoys cheering on the Alabama Crimson Tide football team and the Atlanta United FC soccer club, and approaches fitness with
    team‑oriented fair play, diligently practicing drills and keeping a personal record of sprint times in their notebook.
  arts: Irene Long spends afternoons drawing detailed wildlife illustrations inspired by John James Audubon and listening to Taylor Swift’s storytelling songs, while they also relish attending the Starlight
    Children’s Theatre’s performance of ‘The Lion King’ and crafting friendship bracelets to the rhythm of the school band’s marching drills.
  travel: Irene Long loves planning weekend trips that blend adventure and learning, having visited the U.S. Space & Rocket Center in Huntsville, the historic monuments of Washington, D.C., and the sandy
    shores of Myrtle Beach, while dreaming of a future family vacation to the Kennedy Space Center in Florida, all coordinated within their parents’ budget and a carefully drawn itinerary notebook.
  culinary: Irene Long enjoys helping their mom whip up buttermilk fried chicken, collard greens simmered with smoked turkey, and sweet tea brightened with freshly squeezed lemon, savors the crisp bite
    of garden‑grown tomatoes in a simple caprese salad, and proudly experiments with marble‑iced vanilla cupcakes at school bake sales.
  core: Irene Long is a methodical, curious nine‑year‑old whose blend of Southern hospitality, scientific wonder, and compassionate teamwork turns every notebook, LEGO set, and garden plot into a small
    lesson in order, kindness, and discovery.
background:
  cultural: Irene was raised in a middle‑class, white Southern family in Huntsville, Alabama. Her household cherishes community involvement, often attending Sunday school at a local church and participating
    in neighborhood events like the Madison County Fair and the annual Juneteenth celebration. Family gatherings feature classic Southern foods such as fried chicken, collard greens, and sweet tea, reinforcing
    a sense of belonging and hospitality. Growing up near the U.S. Space & Rocket Center, she is exposed to space exploration stories, which fuel her interest in science. The blend of Southern hospitality,
    community service, and a regional pride in scientific achievement shapes her values of compassion, cooperation, and practical curiosity.
attributes:
  skills: '[''Advanced reading comprehension'', ''Basic arithmetic with problem‑solving strategies'', ''Scratch programming'', ''Classroom organization and checklist management'', ''Peer mediation and empathy'',
