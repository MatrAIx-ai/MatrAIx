    local music festivals'']'
  career_goals: Jerome aspires to advance from his current role as a youth coach and scout to become the head coach of a high school varsity team within the next three years, while simultaneously earning
    a certification in sports management. In the longer term, he aims to secure a scouting position with a collegiate or professional organization, where he can apply his analytical mindset to discover
    and develop emerging talent. He also envisions launching a community sports academy in Deschutes County that combines rigorous training with life-skills mentorship, reflecting his competitive drive
    and commitment to organized, results-focused programs.
