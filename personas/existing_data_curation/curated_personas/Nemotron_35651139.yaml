personas:
  professional: Jerome Winiecki is a diligent youth coach and scout who harnesses data‑driven practice schedules, video analysis, and statistical performance metrics to cultivate athletic talent, balancing
    a curiosity for innovative training ideas with a reliable, methodical approach and a competitively skeptical eye toward player motivations.
  sports: Jerome Winiecki regularly joins local pickup soccer games, rides with the Bend Mountain‑Bike Club through the high desert trails, proudly follows the Portland Timbers and the Boise State Broncos,
    and volunteers as a merit‑badge counselor for the scouting troop, embodying a competitive, team‑focused spirit while embracing the outdoor lifestyle of Deschutes County.
  arts: Jerome Winiecki frequents community music festivals headlined by The Lumineers and Tame Impala, curates indie rock playlists while editing game footage, and occasionally strums an acoustic guitar
    as a creative outlet to balance their analytical tendencies.
  travel: Jerome Winiecki prefers budget‑friendly weekend getaways, such as hiking the Columbia River Gorge, camping near Crater Lake, and plans a future backpacking adventure through the Swiss Alps, all
    while coordinating trips around coaching commitments and friends’ game nights.
  culinary: Jerome Winiecki uses cooking as a stress‑relief ritual, often preparing quinoa bowls with roasted sweet potatoes, black beans, avocado, and a side of spicy chicken tikka masala, while also rewarding
    intense gaming sessions with extra‑pepperoni jalapeño pizza.
  core: Jerome Winiecki blends a competitive drive with methodical planning, channeling anxiety into meticulous budgeting and coaching, while occasionally indulging in gaming splurges and experimental cooking
    as social releases.
background:
  cultural: Jerome was raised in Redmond, Oregon, a small city nestled in the high desert of Central Oregon. His family traces its roots to Eastern European immigrants, primarily Polish, who settled in
    the Pacific Northwest after World War II. Growing up, he absorbed a blend of traditional Polish customs - such as holiday gatherings centered around pierogi and folk music - and the broader Oregonian
    ethos of self-reliance, outdoor appreciation, and community involvement. This background fostered his pragmatic yet curious outlook, his comfort in group settings, and his respect for both established
    practices and innovative ideas.
attributes:
