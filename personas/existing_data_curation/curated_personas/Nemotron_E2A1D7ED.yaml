  career_goals: Erik aims to advance to a senior process engineer role within the next five years, focusing on sustainable manufacturing and plant-wide efficiency improvements. He aspires to lead a multidisciplinary
    team, eventually managing an entire chemical production facility, and to pursue an MBA to integrate technical expertise with strategic business leadership. Additionally, he hopes to mentor young people
    in his hometown, promoting STEM education and community development.
