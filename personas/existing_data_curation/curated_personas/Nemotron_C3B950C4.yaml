personas:
  professional: Rosia Prezeau blends their business administration background with a lifelong talent for grassroots organizing, using their quick adaptability and sharp interpersonal skills to coordinate
    community events and senior programs, while their spontaneous streak sometimes leads them to reshuffle timelines at the last minute.
  sports: Rosia Prezeau energizes their mornings with salsa dancing and weekly pickleball matches at the local community center, cheers for the Brooklyn Nets during basketball season, roots for the New
    York Yankees in baseball, and belongs to the Brooklyn Senior Walking Club that meets for brisk walks in Prospect Park each Saturday.
  arts: Rosia Prezeau integrates their love of quilting, community theater, and a wide‑ranging appreciation for the arts by regularly attending performances of August Wilson’s plays at the local stage,
    listening to Nina Simone’s soulful piano, and scouting the annual Brooklyn Art Book Fair for works by contemporary painters like Kehinde Wiley.
  travel: Rosia Prezeau prefers spontaneous day trips to nearby gems such as the Hudson Valley and Coney Island but also plans occasional longer getaways— they have explored New Orleans, Savannah, and dream
    of a leisurely cruise to tropical islands, always balancing their travel budget against their desire to share stories with younger generations.
  culinary: Rosia Prezeau delights in crafting spice‑rich gumbo with shrimp, okra, smoked sausage, and thyme, perfecting the crisp crust of Southern fried chicken, and frequently experiments with fresh
    basil, local honey, and sweet potatoes in their weekend brunches, while they lovingly teach friends the secrets of their family’s signature rice and beans.
  core: Rosia Prezeau is a restless social catalyst who balances a love of lively dance and storytelling with a habit of misplacing their knitting needles and forgetting to file taxes on time.
background:
  cultural: Rosia is a second‑generation Haitian‑American born and raised in Brooklyn's vibrant Caribbean community. Her parents emigrated from Port‑au‑Prince in the 1960s, and she grew up speaking both
    English and Haitian Creole. Family celebrations of Kanaval, Saint‑Joseph's Day, and other Haitian holidays, along with the rhythms of Kompa, Rara, and gospel music, shaped her cultural identity. Her
    culinary roots include griot, rice and beans, and plantains, while she also participates in broader African‑American traditions through church, civil‑rights activism, and neighborhood support. Rosia
    remains deeply connected to the Haitian diaspora, serving as a bridge between her heritage and the diverse fabric of Brooklyn.
