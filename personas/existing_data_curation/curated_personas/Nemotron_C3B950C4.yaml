  career_goals: Rosia aims to preserve and celebrate her cultural heritage by establishing a weekly cooking demonstration series at the local community center, publishing a memoir that chronicles her family's
    journey from Haiti to Brooklyn, and creating a mentorship network that pairs seniors with high‑school students for intergenerational cultural exchange. She also aspires to serve as chairperson of the
    Brooklyn Haitian Cultural Coalition, advocating for Creole language preservation and greater visibility of Caribbean traditions in the borough.
