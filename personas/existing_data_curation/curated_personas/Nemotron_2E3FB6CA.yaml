    of resident‑association meetings'']'
  hobbies: '[''Group fitness classes (Zumba, spin)'', ''Book club (mystery/thriller)'', ''Neighborhood garden volunteering'', ''Exploring Queens’ food scene'', ''Weekend bike rides'', ''DIY home‑improvement
    projects'', ''Cityscape photography'', ''Weekend trips to coastal towns'']'
  career_goals: Araina aims to earn the Certified Property Manager (CPM) designation within the next two years and leverage it to become a regional manager overseeing a portfolio of mixed‑use properties
    in the greater New York area. She aspires to launch her own boutique property‑management firm that emphasizes sustainability, smart‑building upgrades, and resident‑centred services. Long‑term, she hopes
    to mentor younger women entering the real‑estate industry and to serve on the board of a nonprofit housing advocacy group, using her blend of analytical rigor and community‑focused leadership to influence
    policy and best practices.
