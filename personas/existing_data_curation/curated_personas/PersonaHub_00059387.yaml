persona_description: A historian who specializes in the history of Ohio, particularly the early settlement and development of New Berlin, Ohio. He or she is interested in the social, economic, and political
  changes that occurred in the town during the 19th century, and the impact of these changes on the community's growth and development. The historian is also interested in the role of William H. "Boss"
  Hoover in the town's history, and the contributions he made to the community through his business and philanthropy.
