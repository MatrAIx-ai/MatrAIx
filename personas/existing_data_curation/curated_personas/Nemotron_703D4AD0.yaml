  hobbies: '[''fishing'', ''paddleboarding'', ''experimental woodworking'', ''skateboarding'', ''guitar playing'', ''video‑game streaming'', ''road‑trip exploring Florida coastlines'']'
  career_goals: Adam aims to become a certified master carpenter within the next five years, earning his Journeyman and eventually Master Carpenter credentials from the Florida Carpenters Union. He envisions
    opening a boutique workshop that blends traditional hand‑craft with modern CNC technology to create custom, sustainably sourced furniture for a regional market. He also hopes to lead a crew on larger
    residential projects, develop a reputation for high‑quality, innovative craftsmanship, and mentor younger apprentices, turning his competitive drive into a leadership role while sharpening his organizational
    skills.
