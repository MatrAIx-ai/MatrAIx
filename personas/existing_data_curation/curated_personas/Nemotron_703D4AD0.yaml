personas:
  professional: Adam Franklin, a 20‑year‑old aspiring master carpenter, leverages their structural framing expertise, blueprint reading, and hands‑on tool mastery while channeling their spontaneous curiosity
    into experimental furniture designs, even as their reluctance for strict schedules sometimes causes them to scramble deadlines on remodeling projects.
  sports: Adam Franklin enjoys aggressive skateboarding at Jacksonville's Skate Center and weekend paddleboarding on the Intracoastal Waterway, roots for the Jacksonville Jaguars while occasionally cheering
    the Florida Gators, and treats their fitness routine like a competition, relentlessly pushing personal limits on ramps and in the water.
  arts: Adam Franklin channels their artistic side by shredding electric guitar riffs from Jimi Hendrix and Arctic Monkeys, admiring the wood‑carving works of Chip Wilson, streaming indie gaming art on
    Twitch, and catching live shows at the Jacksonville Music Hall, which fuels their creative approach to furniture design.
  travel: Adam Franklin prefers spontaneous road trips along the Florida Gulf Coast, often weekend‑hopping to Key West and the Everglades, while dreaming of a spring backpack adventure through the forests
    of the Pacific Northwest and a future woodworking retreat in the artisan villages of Chiang Mai, Thailand, balancing limited student funds with a love for fresh experiences.
  culinary: Adam Franklin, a decent home cook, favors grilling fresh blackened catfish with lemon‑butter sauce, tossing shrimp and corn salad with Cajun spices, mastering a few go‑to dishes like fish tacos
    and homemade pizza on a reclaimed‑wood stone, yet they often resort to late‑night pizza delivery after marathon gaming streams.
  core: Adam Franklin is a kinetic 20‑year‑old carpenter‑enthusiast who mixes spontaneous wood‑craft experiments with skate‑park competitions, splurges on power tools, neglects dental appointments, and
    they can effortlessly transition from riffing on a guitar to streaming video games at midnight.
background:
  cultural: Adam grew up in a middle‑class, working‑class family in Jacksonville, Florida. His father taught him basic carpentry in the family garage, and his mother’s work as a nurse reinforced a sense
    of community service. The Southern Florida lifestyle—outdoor recreation, a strong emphasis on self‑reliance, and appreciation for local BBQ and music festivals—shaped his values. He attended a high‑school
    that offered a vocational shop program, where he earned certifications that helped him secure his first carpentry apprenticeship. The local culture of friendly competition, seasonal beach gatherings,
    and a blend of traditional Southern hospitality with a modern, diverse city vibe informs his social outlook and his drive to stand out in his trade.
attributes:
