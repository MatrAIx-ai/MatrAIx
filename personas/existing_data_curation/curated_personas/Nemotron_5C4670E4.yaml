  hobbies: '["Competitive video gaming", "DIY PC building and customization", "Casual soccer with friends", "Cooking Honduran dishes", "Listening to reggaeton and Latin trap", "Reading sci-fi and fantasy
    novels"]'
  career_goals: Norca aims to blend his technical strengths with his competitive drive by pursuing a vocational path in automotive technology while cultivating a presence in the esports scene. He plans
    to enroll in a community-college automotive program to earn ASE certification within two years, targeting a stable job as a certified mechanic. Concurrently, he is building a modest Twitch channel where
    he streams gameplay and offers bilingual commentary on strategy, hoping to join a local esports team and eventually monetize his content. He also sees a future as a technical support specialist, leveraging
    his troubleshooting skills. His overarching ambition is to achieve financial independence, maintain flexible time for gaming, and support his family through a reliable trade career.
