  career_goals: Looking ahead, Orlando aims to become a senior facilities manager for a regional park or university campus in Virginia. He plans to earn certifications such as the Certified Maintenance
    & Reliability Technician (CMRT) and the EPA Section 608 certification for refrigerants. Within five years, he hopes to lead a larger maintenance department, introduce data‑driven asset management practices,
    and eventually launch his own small‑scale maintenance consulting business that serves both commercial clients and local homeowners.
