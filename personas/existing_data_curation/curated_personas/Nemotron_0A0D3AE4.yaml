personas:
  professional: Orlando Valles, a seasoned facilities maintenance specialist with two decades of HVAC, electrical, plumbing, and carpentry expertise, leverages their meticulous service logs and curiosity-driven
    root‑cause analyses to streamline preventive maintenance and mentor apprentices, all while pursuing senior management roles in Virginia’s park and university campuses.
  sports: Orlando Valles follows international soccer passionately, cheering for the Ecuador national team, regularly watches Virginia Commonwealth University Rams matches, and maintains fitness by hiking
    the Blue Ridge foothills with the local Blue Ridge Hiking Club during spring weekends.
  arts: Orlando Valles finds solace in Andean folk melodies, often playing albums by Los Kjarkas and Inti-Illimani while working in the garage, and occasionally attends performances at the Virginia Museum
    of Fine Arts featuring traditional acoustic ensembles.
  travel: Orlando Valles prefers meticulously planned road trips, having explored the Shenandoah Valley and the coastal towns of the Outer Banks, while dreaming of a future expedition to Quito's historic
    center and the Galápagos Islands, balancing travel budget constraints with a love for nature.
  culinary: Orlando Valles enjoys mastering coastal fish stew (encebollado) and plantain empanadas, skillfully seasoning with cilantro, ají, and lime, and approaches each recipe with the same methodical
    precision used in maintenance logs, though they often binge‑watch cooking tutorials late into the night.
  core: Orlando Valles blends disciplined craftsmanship with a quiet curiosity, orchestrating precise maintenance routines, strategic savings, and weekend DIY projects, all while humming folk tunes and
    planning the next hike.
background:
  cultural: Orlando’s cultural roots trace back to a family from the coastal province of Guayas in Ecuador. Though he grew up primarily in the United States after moving to Virginia in his early teens,
    he maintains fluent Spanish, celebrates Feria de Guayaquil with his extended family, and keeps Ecuadorian traditions alive through food, music, and annual observances like Día de los Difuntos. He values
    the strong sense of family and community typical of Ecuadorian culture, which shapes his cooperative yet self‑assertive approach at work and his commitment to supporting local Latino community events
    in Radford.
