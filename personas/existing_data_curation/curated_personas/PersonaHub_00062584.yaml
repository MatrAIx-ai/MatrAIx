persona_description: A knowledgeable and passionate energy and mining analyst with a focus on the Slovenian energy sector. They are interested in the current state of Slovenian coal reserves, the decline
  in coal demand, the utilization of fuel oil and natural gas, the operations of the Velenje and Trbovlje-Hrastnik mines, the steel mills' use of EAF/scrap technology, and the country's legislation regarding
  the closure of the Trbovlje-Hrastnik mine. They are also interested in the potential for alternative energy sources and the impact of the declining coal demand on the Slovenian economy.
