personas:
  professional: An aspiring junior engineer, Elvie Cassady channels the structured mindset of LEGO building and puzzle solving into early tinkering with basic robotics kits, while they draw on their competitive
    streak to outdo peers in school science fairs.
  sports: A lively soccer enthusiast, Elvie Cassady captains the Boerne Youth Soccer Club's under‑9 team, cherishes cheering for the Dallas Cowboys and Houston Astros on weekends, and they prefer spontaneous
    after‑school pickups over rigid training schedules, channeling their competitive energy on the field.
  arts: A budding cartoonist and choir singer, Elvie Cassady sketches whimsical characters inspired by Pixar and Adventure Time, belts out classic country hits by Luke Bryan alongside pop anthems from Taylor
    Swift during school performances, and they spend weekend afternoons crafting DIY music videos with friends.
  travel: An enthusiastic explorer, Elvie Cassady loves family hikes at Enchanted Rock State Natural Area and road trips to historic Hill Country towns during local festivals, while they dream of a future
    Disney World adventure after school and hope to one day trek the Grand Canyon.
  culinary: A kid with a hearty appetite for Texas BBQ, Elvie Cassady’s favorite dish is smoked brisket with pickles, they secretly enjoy making strawberry shortcake with fresh berries from the local strawberry
    festival, and they’re learning to melt cheese for perfect grilled cheese sandwiches.
  core: Elvie Cassady is an energetic, puzzle‑loving 8‑year‑old who balances a competitive spark with a love for spontaneous fun, often juggling LEGO builds and soccer matches while occasionally forgetting
    to tidy up their room.
background:
  cultural: Elvie is raised in a white Texan family with German ancestry in Boerne, Texas—a small town known for its historic German settlement and strong community spirit. Her family blends Southern hospitality,
    Texas pride, and German traditions, celebrating events like Oktoberfest and the Boerne Strawberry Festival. She grows up surrounded by country music, BBQ, and occasional Spanish influences from nearby
    Hispanic neighborhoods, which shape her appreciation for diverse cultural expressions while maintaining a close‑knit, family‑centered outlook.
