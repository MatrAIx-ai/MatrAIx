personas:
  professional: Roma Wilson is a senior construction cost estimator who leverages meticulous spreadsheet modeling, lean construction principles, and a competitive drive to deliver precise, sustainability‑focused
    budgets while they chart a path toward a lead estimator role and a proprietary cost‑estimation toolkit for mid‑size residential projects.
  sports: Roma Wilson hits the Los Padres trails for weekend hikes and trail‑run sessions, logs mileage in a detailed spreadsheet, roots for the Los Angeles Dodgers and Lakers, and occasionally joins a
    local adult soccer league, embodying a disciplined yet solitary fitness routine that they treat with the same precision as their professional work.
  arts: Roma Wilson cultivates a quiet artistic side through DSLR photography inspired by Ansel Adams, spends evenings listening to Beethoven while editing images, and participates in a small book club
    discussing authors like Michael Lewis and Jared Diamond, weaving creative appreciation into their analytical life as they balance solitary curiosity with disciplined routine.
  travel: Roma Wilson meticulously plans trips using spreadsheet itineraries, favors eco‑focused destinations such as Yosemite, Costa Rica’s Monteverde, and Iceland’s geothermal sites, balances adventure
    hiking with low‑key relaxation at sustainable lodges, and often selects travel dates that avoid peak seasons to align with budget constraints, a strategy they apply with the same disciplined precision
    they bring to cost estimation.
  culinary: Roma Wilson enjoys preparing garden‑fresh Mediterranean meals—grilled salmon with lemon, quinoa‑chickpea salads tossed with heirloom tomatoes and kale, and slow‑cooked ratatouille—leveraging
    a moderate cooking skill set and an appreciation for low‑maintenance, nutrient‑dense dishes while they occasionally treat themselves to a pour‑over coffee from a local Ventura roaster.
  core: Roma Wilson is a methodical, curiosity‑driven cost estimator whose disciplined, competitive nature fuels a love for precise data, sustainable building, solitary hikes, and a penchant for meticulously
    organized budgets that they sometimes let eclipse spontaneous social moments.
background:
  cultural: Roma was born and raised in Southern California to a family of Anglo‑American heritage. Growing up in the agricultural outskirts of Ventura County, she absorbed a strong work ethic and a respect
    for self‑reliance common among the region’s “old‑farm” culture. The progressive, arts‑focused community of Ojai, where she now lives, has broadened her outlook, fostering an appreciation for environmental
    stewardship, local food movements, and holistic wellness. While she does not practice a religion regularly, she was culturally raised within a modest Catholic tradition, which instilled a sense of personal
    responsibility and community service. Her cultural identity blends traditional middle‑class American values of practicality and independence with Ojai’s emphasis on sustainability, mindfulness, and
    small‑scale community engagement.
attributes:
  skills: '["Construction blueprint interpretation", "Cost estimating software (ProEst, Sage Estimating)", "Spreadsheet modeling and database management", "Quantity take‑offs", "Vendor price analysis",
    "Risk‑adjusted budgeting", "Lean construction cost‑control methods", "Sustainable material costing", "Negotiation and vendor relationship management", "Report writing and presentation"]'
  hobbies: '["Hiking and nature photography", "Organic vegetable gardening", "Reading construction and sustainability journals", "Puzzle solving (jigsaw, Sudoku)", "Small non‑fiction book club", "DIY home‑improvement
    workshops"]'
  career_goals: Roma aims to transition from senior cost estimator to lead estimator or estimation manager within the next five years, overseeing a small, high‑performing team and setting benchmark accuracy
    standards for the company. She plans to earn the Certified Professional Estimator (CPE) designation to formalize her expertise and to develop a proprietary cost‑estimation toolkit tailored to mid‑size
    residential projects in Ventura County. Long‑term, she envisions launching her own consulting practice that offers data‑driven cost‑management services to boutique builders focused on sustainable construction.
    Her ambition is to be recognized as a go‑to authority for precise, environmentally conscious budgeting while maintaining the disciplined, results‑oriented reputation she has built.
