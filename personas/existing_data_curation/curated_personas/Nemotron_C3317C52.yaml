  hobbies: '[''Fishing'', ''Target shooting'', ''Reading true‑crime and security tech literature'', ''DIY electronics (camera mounts, wiring)'', ''Puzzle solving (crosswords, escape‑room puzzles)'', ''Strategy
    video gaming'', ''Neighborhood watch volunteering'']'
  career_goals: Robert aims to move from a floor‑level surveillance officer to a supervisory role within the next three to five years, targeting a senior loss‑prevention manager position at a regional casino.
    He plans to enroll in a part‑time associate program in criminal justice to strengthen his theoretical foundation, and to obtain the Certified Loss Prevention Professional (CLPP) certification. Long‑term,
    he envisions establishing his own security consulting firm that specializes in casino surveillance system design and staff training, leveraging his blend of practical experience and ongoing curiosity
    about new security technologies.
