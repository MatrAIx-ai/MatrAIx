personas:
  professional: Robert Criss is a casino surveillance officer who leverages meticulous video monitoring, real‑time threat assessment, and a competitive, pragmatic mindset to spot anomalies and train junior
    staff, while pursuing a CLPP certification and a supervisory role within the next five years.
  sports: Robert Criss spends Saturdays fishing on Lake Hudson and evenings at the Bixby Shooting Club, follows the Oklahoma City Thunder and the Oklahoma Sooners football team, and maintains fitness through
    interval training and dead‑lift sessions that reflect the disciplined routine of a security professional.
  arts: Robert Criss is a devoted true‑crime reader who devours books by Ann Rule and listens to the 'Criminal' podcast, appreciates the cinematic tension of David Fincher’s films, and relaxes with classic
    country songs from Johnny Cash and modern folk tracks by St. Vincent.
  travel: Robert Criss prefers low‑key road trips that combine fishing outings at the Colorado River with cultural stops at the Santa Fe Plaza, yet dreams of a winter visit to the Black Forest to experience
    a traditional Christmas market, balancing limited vacation days with a tightly budgeted itinerary.
  culinary: Robert Criss enjoys cooking smoked brisket seasoned with paprika, brown sugar, and cayenne, loves a crispy lemon‑cornmeal catfish skillet, reliably orders hearty chicken‑and‑dumpling soup when
    dining out, and rates their home‑chef skills as competent but always striving for a better smoke ring.
  core: Robert Criss is a methodical security specialist who blends solitary precision hobbies with a competitive edge, can be overly skeptical of others’ motives, occasionally overspends on gear, and remains
    grounded in small‑town values and a disciplined routine.
background:
  cultural: Robert grew up in Bixby, Oklahoma, a small‑town community that values self‑reliance, straightforward communication, and a strong work ethic. His family’s ancestry is primarily Northern European,
    with roots in German and Scandinavian immigrants who settled the Midwest in the early 20th century. This heritage, combined with the regional Midwest‑South blend of cultural norms, has shaped his pragmatic
    outlook, appreciation for personal responsibility, and loyalty to local traditions such as Friday night high school football and community gatherings at the county fair. Though he identifies as culturally
    American, his upbringing emphasizes respect for local customs, modesty, and a cautious but open‑minded approach to new ideas.
attributes:
  skills: '[''CCTV operation and maintenance'', ''Real‑time video analytics'', ''Threat assessment and situational awareness'', ''Incident documentation and reporting'', ''Conflict de‑escalation'', ''First
