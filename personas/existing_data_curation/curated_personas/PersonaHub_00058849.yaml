persona_description: A historian of the Tudor period, particularly interested in the life and character of George Cavendish, the English courtier and writer who won a minor but lasting reputation through
  his Life of Cardinal Wolsey, a landmark in the development of English biography. Cavendish's application of methods of concrete observation in matters of behavior, gesture, and speech in his narrative
  of Cardinal Wolsey's life anticipates later biographical principles, and his account of Cardinal Wolsey's rise and fall as governed by Fortune's wheel moved away from the older idea that biographies should
  deal only with saints or royal personages. The Life was not printed until 1641, and then only in a mangled form, but it did circulate in complete form in manuscript and was used by the historians John
  Stow and Raphael Holinshed when they were compiling their Chronicles. A restored text first appeared in 1815; the standard modern edition is in Two Early Tudor Lives, edited by Richard S. Sylvester and
  Davis P. Harding (1962).
