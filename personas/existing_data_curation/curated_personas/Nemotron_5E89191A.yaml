personas:
  professional: Darrin Johnson, a retired handyman turned community arts advocate, blends decades of woodworking, engine repair, and event coordination to mentor youth, volunteer as a museum docent, and
    showcase his watercolor paintings at local fairs.
  sports: Darrin Johnson, an avid early‑morning fisherman and beach‑walker, stays fit through daily shoreline strolls, occasional senior softball games, and cheering on the New Orleans Saints and the Alabama
    Crimson Tide, while also belonging to the local Gulf Anglers Club.
  arts: Darrin Johnson, a watercolor enthusiast with a keen eye for composition, spends afternoons painting coastal scenes, listens to Miles Davis and B.B. King, participates in his church choir, and guides
    younger artists through critique sessions while drawing inspiration from Georgia O'Keeffe and abstract expressionists.
  travel: Darrin Johnson, a methodical planner with a love for coastal heritage, prefers road trips to nearby Gulf towns like Biloxi and New Orleans, mixes cultural tours of jazz districts with leisurely
    beach stays, and dreams of an artistic pilgrimage to Santa Fe to study Southwestern watercolor techniques.
  culinary: Darrin Johnson, a seasoned home cook, specializes in Southern comfort dishes such as shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie, skillfully balancing
    bold spices like cayenne and smoked paprika while experimenting with fresh herbs from his garden.
  core: Darrin Johnson, a 70‑year‑old retired tradesman turned community storyteller, blends meticulous craftsmanship with spontaneous creativity, often juggling garden chores, watercolor sessions, and
    impromptu fishing trips, though they sometimes forget to water their plants when absorbed in a new artistic idea.
background:
  cultural: Darrin grew up in a close‑knit Black community in Baldwin County, Alabama, during the height of segregation and the civil‑rights era. His family’s church served as the cultural and social hub,
    where gospel music, community support, and activist organizing shaped his values. The legacy of the civil‑rights movement taught him resilience, a sense of justice, and the importance of collective
    action. Southern Black culinary traditions, oral storytelling, and a deep respect for family ties remain central to his identity. The Gulf Coast environment fostered a lifelong love of fishing, beach
    walks, and an appreciation for coastal ecology, all of which blend with his artistic curiosity and community‑oriented spirit.
