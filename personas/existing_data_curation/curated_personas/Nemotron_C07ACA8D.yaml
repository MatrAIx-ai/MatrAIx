  hobbies: '["Cooking traditional Vietnamese dishes", "Community gardening", "Senior dance classes", "Participating in Tet celebrations", "Volunteering at the local senior center", "Storytelling sessions
    with grandchildren", "Learning new recipes", "Attending local cultural festivals", "Crafting (sewing, crocheting)", "Walking in neighborhood parks"]'
  career_goals: Although retired from formal employment, Hoa aims to stay actively engaged in her community and to channel her curiosity into lifelong learning. She aspires to lead cultural workshops that
    teach younger Vietnamese families how to prepare traditional dishes and celebrate holidays. Documenting her family’s migration story and preserving oral histories for future generations is a personal
    ambition. Hoa also hopes to become a mentor at the local senior center, offering guidance on health, budgeting, and navigating community resources. Maintaining her health, managing stress through social
    involvement, and eventually traveling back to Vietnam to reconnect with extended relatives are also key goals.
