  career_goals: She aims to become the chief operating officer of a major health network in Puerto Rico within the next five years, leading large‑scale initiatives that integrate telehealth, improve patient
    outcomes, and address health disparities in underserved communities. Martha also wants to author policy papers on health equity, mentor emerging health‑services managers, and eventually launch a consultancy
    that helps hospitals implement culturally competent care models.
