  hobbies: '[''Reading mystery books'', ''Building LEGO sets'', ''Solving jigsaw puzzles'', ''Piano practice'', ''Scratch coding'', ''Mandala drawing'', ''Helping with Indian cooking'', ''Cultural dance
    class'']'
  career_goals: Kamini dreams of becoming a pediatric doctor because she likes the clear routines of medical practice and the chance to care for other children. She also imagines herself as a software engineer,
    attracted by logical problem‑solving and the structured nature of coding. Her short‑term ambition is to be the class monitor, win the school science fair, and maintain top grades in math and science,
    laying the groundwork for a future STEM degree.
