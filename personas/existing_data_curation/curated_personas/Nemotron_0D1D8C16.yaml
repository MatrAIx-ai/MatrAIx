personas:
  professional: An aspiring software designer, Kamini Soneja organizes their Scratch projects like LEGO kits—following step‑by‑step plans, documenting each block, and testing methodically—showing they blend
    their love for structured problem‑solving with a dash of creative storytelling.
  sports: A budding athlete, Kamini Soneja swims at the community pool twice a week, plays soccer with the Little Lions junior club, and cheers for the city’s professional hockey team, the Frost Giants,
    preferring small practice groups over large crowds.
  arts: An imaginative creator, Kamini Soneja draws intricate mandala and paisley designs in their sketchbook while listening to the enchanting scores of Studio Ghibli’s “Spirited Away” and the upbeat pop
    of Ariana Grande, and they showcase the dances learned in their weekly cultural class at the local community center.
  travel: A curious explorer, Kamini Soneja has trekked through the dinosaur trails at the nearby Natural History Museum, spent a family weekend at Seaview beach building sandcastles, and dreams of visiting
    the fairy‑tale castles of Bavaria and the bustling streets of Tokyo, balancing parental budgeting with a vivid imagination.
  culinary: A budding chef, Kamini Soneja helps their mother prepare spiced lentil stew, buttery flatbread, and mango chutney on weekends, arranging each spice in neat rows before cooking, and they often
    sneak a taste of the aromatic cumin before the dish is served.
  core: Kamini Soneja is a detail‑loving nine‑year‑old who blends structured curiosity with creative play, turning puzzles, LEGO, and Scratch projects into a personal roadmap for learning and fun.
background:
  cultural: Kamini’s family originates from the Punjab region of India. Her parents immigrated to the United States and settled in Louisville, Kentucky, where they maintain a bilingual household speaking
    Punjabi and English. She celebrates major South Asian festivals such as Diwali, Holi, and Vaisakhi, enjoys traditional foods like dal, roti, and samosas, and participates in community events at the
    local Gurdwara. Her upbringing emphasizes respect for elders, academic achievement, and community service, while also blending American cultural experiences.
