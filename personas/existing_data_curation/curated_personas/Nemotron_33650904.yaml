  hobbies: '[''Salsa dancing'', ''Hip‑hop dance classes'', ''Weekend brunches with friends'', ''Community volunteer tax assistance'', ''Urban gardening'', ''Reading contemporary fiction'', ''Cooking soul‑food
    recipes'', ''Yoga and mindfulness practice'', ''Improv theater workshops'', ''Exploring Brooklyn street art'']'
  career_goals: Patricia aims to earn her CPA certification within the next two years and advance to a senior audit manager role, eventually positioning herself for a partnership track at her firm. She
    is eager to integrate emerging technologies—such as blockchain verification and sustainability reporting—into traditional audit practices, believing that these innovations can enhance transparency for
    clients. Balancing her ambition, Patricia also prioritizes work‑life harmony, seeking flexible leadership roles that allow her to mentor junior Black women in accounting and to contribute to community
    finance initiatives in Brooklyn.
