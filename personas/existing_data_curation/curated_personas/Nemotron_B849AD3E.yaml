personas:
  professional: A seasoned registered nurse with over three decades of acute and geriatric care experience, Claudia Freay blends meticulous documentation and evidence‑based protocols with their curiosity
    for art to run therapeutic workshops, mentor junior staff, and champion interdisciplinary quality‑improvement initiatives, while they naturally thrive as the center of attention in conference panels.
  sports: Claudia Freay stays active by joining the Providence Senior Walking Club for weekly waterfront walks, attending seasonal swimming sessions at the community pool, cheering passionately for the
    Providence Bruins during hockey season and the Boston Red Sox in the summer, and they consistently track their steps with a smartwatch to maintain the methodical routine they value.
  arts: Claudia Freay channels their curiosity and love for New England scenery into watercolor and mixed‑media paintings inspired by Monet and O’Keeffe, frequents the RISD Museum to study Ai Weiwei installations,
    relishes evenings at the Providence Playhouse watching Meryl Streep‑led productions, and they fill their home with the folk sounds of Bob Dylan and Joni Mitchell, letting the arts shape both their leisure
    and therapeutic nursing practice.
  travel: Claudia Freay plans vacations with meticulous itineraries, favoring weekend road trips along the Rhode Island coastline to places like Block Island and Newport for fresh clams and local wines,
    while they also dream of a cultural immersion in Tuscany’s vineyards and Kyoto’s tea houses, balancing their love for organized travel with spontaneous detours to hidden art galleries.
  culinary: Claudia Freay, a confident home cook, delights in whipping up classic New England lobster rolls and creamy clam chowder seasoned with fresh thyme and parsley, while they also experiment with
    rosemary‑infused grilled salmon paired with a crisp local white wine, often sourcing herbs from their seasonal garden and savoring the process as a meditative extension of their artistic expression.
  core: Claudia Freay blends a nurse’s precision with an artist’s soul, obsessively cataloging watercolor swatches while occasionally hoarding souvenir seashells that clutter their living room, and they
    never pass up a chance to be the center of a lively conversation.
background:
  cultural: Claudia grew up in a multigenerational family in Warwick, Rhode Island, with deep New England roots and a heritage that includes Irish and Italian ancestry. Raised in a community that values
    hard work, education, and civic involvement, she was taught the importance of public service and cultural appreciation. Her upbringing combined traditional values—such as family gatherings around the
    dinner table and participation in local festivals—with a progressive outlook that embraces diverse artistic expressions and lifelong learning. This blend of heritage and openness informs her compassionate
    nursing practice and her dedication to enriching community life through art and health initiatives.
attributes:
  skills: '[''Patient assessment'', ''Wound care'', ''IV therapy'', ''Medication reconciliation'', ''Electronic health records (EHR) proficiency'', ''Quality improvement and data analysis'', ''Interdisciplinary
    care coordination'', ''Health education and public speaking'', ''Mentorship and staff development'', ''Integration of art therapy into patient care'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Attending theater productions'', ''Gardening'', ''Weekly book club'', ''Volunteering as a senior tour guide'', ''Coastal road
    trips and seafood tasting'', ''Wine appreciation'']'
  career_goals: Claudia aims to transition into a senior advisory role within her health system, focusing on geriatric care optimization and the development of community‑based health programs that blend
    art and wellness. She aspires to lead a hospital‑wide quality‑improvement committee, publish case studies on art‑enhanced therapeutic practices, and serve as an adjunct faculty member at a local nursing
    school to mentor the next generation of nurses. Additionally, she hopes to influence health policy at the state level by advocating for integrative care models for older adults.
