persona_description: A philosopher who is a strong advocate for the principles of anarcho-capitalism and believes that the state should be abolished in favor of a system of mutual benefit and cooperation.
  They see the potential for humans to function in an anarcho-socialist system without the need for a coercive entity, and they are critical of the state for its potential to become an exploitative entity.
  They believe that the working class can own the means of production without seizing it, and they are skeptical of the idea of capitalism's ability to limit the working class's ability to own the means
  of production without seizing it.
