  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Playing acoustic guitar'', ''Listening to jazz and blues'', ''Cooking and exploring diverse cuisines'', ''Hiking and birdwatching
    along the Chattahoochee River'', ''Attending community theater performances'', ''Road trips to regional art festivals'', ''Journaling and mindfulness meditation'', ''Volunteering backstage at theater
    productions'']'
  career_goals: Thomas aims to broaden the reach of arts‑focused youth services in Columbus, securing sustainable funding to launch a citywide after‑school art and mentorship program for at‑risk teens.
    Over the next five years he plans to obtain a Certified Community Service Manager credential, move into a director‑level role overseeing multiple community initiatives, and influence county‑wide policy
    on social services through advisory committees. He also hopes to build a stronger support network within his organization to reduce his personal stress and achieve a healthier work‑life balance while
    mentoring emerging community leaders.
