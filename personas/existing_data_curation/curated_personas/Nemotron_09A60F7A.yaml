  hobbies: '["Soccer", "Basketball", "Bike riding", "LEGO building", "Video gaming (Minecraft, Fortnite)", "Reading adventure novels", "Family hikes", "Church youth group activities"]'
  career_goals: Robert dreams of a career where he can combine his love for teamwork, hands‑on activity, and tangible results. He often says he wants to become a firefighter or a construction crew leader
    because those jobs let him help the community and see the immediate impact of his work. He also imagines himself as a professional soccer player or an e‑sports champion, reflecting his competitive spirit
    and love for organized play. In the short term, he aims to join his school’s soccer team, earn a certain rank in his favorite video game, and learn basic coding through after‑school programs.
