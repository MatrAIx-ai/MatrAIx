  hobbies: '[''Volunteering at church events'', ''Cooking and baking'', ''Gardening'', ''Community theater attendance'', ''Board games'', ''Walking the dog'', ''Reading romance novels'', ''Book club participation'']'
  career_goals: Erika aims to move into a supervisory role within her call‑center, such as Team Lead or Shift Manager, where she can shape service standards and mentor a larger group of agents. She plans
    to earn a Certified Customer Service Professional (CCSP) credential and attend leadership workshops to strengthen her managerial skills. Long‑term, she envisions leveraging her experience to become
    a community liaison or small‑business consultant, helping local enterprises improve their customer interactions while continuing to learn basic project‑management techniques to support department initiatives.
