personas:
  professional: Erika Hebert leverages two decades of call-center experience, expertly navigating Zendesk and Salesforce to resolve customer issues with calm efficiency, while using their empathetic listening
    and structured yet flexible approach to mentor new agents and pursue a Team Lead role that lets them shape service standards and foster a harmonious team environment.
  sports: Erika Hebert enjoys leisurely walks on nature trails with their golden retriever, participates in a senior walking club that meets weekly, supports the local baseball team the River City Tigers,
    and plays in a casual pickleball league at the community center during the summer months.
  arts: Erika Hebert regularly attends community-theater productions by the Starlight Players, finds comfort in the music of Adele and Miles Davis, indulges in contemporary romance novels by Nora Roberts,
    and hosts board-game nights featuring Settlers of Catan for friends and fellow seniors.
  travel: Erika Hebert favors relaxed road-trip vacations that blend scenic drives, dog-friendly stops, and culinary stops, having explored the Pacific Coast Highway and Napa Valley vineyards, and they
    dream of a leisurely cultural tour of Tuscany, Italy, all organized with a flexible itinerary that leaves room for spontaneous potluck picnics.
  culinary: Erika Hebert is an accomplished home baker who perfects family-recipe apple and peach pies with flaky crusts and a dash of nutmeg, grows heirloom tomatoes and basil for fresh summer salads,
    delights in farm-to-table dinners featuring seared salmon with dill-mustard sauce, though they sometimes forget to set timers and end up with slightly over-browned scones.
  core: Erika Hebert blends a talkative, sociable charm with a quietly chaotic to-do list, turning call-center mentorship, community-theater applause, and garden club gatherings into harmonious connections,
    even if they occasionally misplace their budget spreadsheet.
background:
  cultural: Erika grew up in a working‑class, white Midwestern family in central Indiana, where community involvement, modesty, and a strong work ethic were core values. She was raised in a Protestant (Methodist)
    tradition, celebrating local customs such as county fairs, Fourth of July parades, and high school sports events. Family gatherings emphasized Sunday meals, holiday celebrations, and shared recipes,
    fostering her love of cooking and hospitality. These cultural influences shaped her friendly, neighborly demeanor and her practical, people‑focused outlook on life.
attributes:
  skills: '[''Customer Service'', ''Active Listening'', ''Conflict Resolution'', ''Communication'', ''CRM Software (Zendesk, Salesforce)'', ''Problem Solving'', ''Empathy'', ''Team Training'', ''Time Management'',
