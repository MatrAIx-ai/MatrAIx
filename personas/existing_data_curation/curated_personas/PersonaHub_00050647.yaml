persona_description: A linguist who specializes in the study of language proficiency and its relationship to academic achievement. They are knowledgeable about the conversational/academic language distinction
  and its implications for educational policies and practices in both North America and the United Kingdom. They have a deep understanding of the sociopolitical framework within which the distinction was
  placed and the linguistic reality of the distinction. They have also worked on the analysis of lexical differences between typical conversational interactions in English and academic or literacy-related
  uses of English. They are also familiar with the work of Biber and Corson and have contributed to the resolution of the contradictory findings regarding the nature of language proficiency.
