personas:
  professional: Justina Courson leverages two decades of engineering expertise in 3D CAD, CNC machining, PLC programming, and data analytics to lead high‑impact R&D teams that fuse sustainable automation
    with artistic design, methodically turning bold concepts into measurable outcomes while channeling their talkative, competitive drive into persuasive stakeholder presentations.
  sports: Justina Courson joins a Bay Area weekend hiking crew that tackles Mission Peak and Loma Prieta, cheers for the San Jose Sharks, San Francisco 49ers, and Oakland Athletics, and captains a co‑ed
    rec soccer team, using their competitive edge to drive team success while reserving weekday evenings for project work.
  arts: Justina Courson frequents contemporary galleries like SFMOMA and pop‑up art spaces, sketches installations inspired by Yayoi Kusama and Banksy, and regularly attends live shows ranging from St.
    Vincent to Haim, weaving their appreciation for avant‑garde expression into both personal leisure and product design.
  travel: Justina Courson has explored Kyoto’s temples, the street‑art corridors of Mexico City, and the vineyards of Tuscany, and is planning a future immersion in Norway’s fjords, preferring itineraries
    that blend cultural discovery, photography opportunities, and a moderate budget that balances conference attendance with adventure, reflecting their desire to capture moments through the lens.
  culinary: Justina Courson experiments with sous‑vide salmon, hand‑made ramen broth, and a reimagined rustic stew infused with California herbs, favors fresh farmers‑market finds like heirloom tomatoes
    and avocado, and occasionally over‑indulges in artisanal cheese boards during gallery openings, reflecting a palate that balances curiosity with occasional indulgence.
  core: Justina Courson is a 39‑year‑old tech‑savvy engineer who fuses art, data, and community spirit into every project, juggling a competitive edge, a love for hiking, and a penchant for late‑night coffee‑fuelled
    coding sprints.
background:
  cultural: Justina grew up in a suburban community near San Jose, raised by parents of German and Irish ancestry who valued education, self‑reliance, and community service. Her upbringing combined Midwestern
    American values with the eclectic, tech‑forward culture of Silicon Valley. She identifies with mainstream American ideals of innovation and individual achievement while actively participating in the
    region's multicultural arts scene and supporting inclusive initiatives within the engineering community.
attributes:
