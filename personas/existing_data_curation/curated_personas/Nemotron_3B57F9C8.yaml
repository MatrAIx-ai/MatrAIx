  career_goals: Justina aims to become a senior engineering technologist leading high‑impact R&D projects focused on sustainable manufacturing and smart automation. She aspires to earn a Professional Engineering
    Technologist certification, publish thought‑leadership pieces on integrating art and technology in product development, and speak at major industry conferences. In the longer term, she envisions founding
    a consultancy that helps mid‑size manufacturers adopt cutting‑edge automation while fostering inclusive, collaborative work cultures.
