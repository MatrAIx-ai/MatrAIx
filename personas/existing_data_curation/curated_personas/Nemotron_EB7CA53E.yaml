    Museums'', ''Attending Street Festivals'', ''Watching Bucks Games'']'
  career_goals: Jasmine aims to become a shift supervisor within the next year and eventually move into a management role at a regional chain. She plans to complete an associate degree in hospitality management
    through evening courses at a local community college, leveraging her curiosity for new industry practices and her practical mindset to implement effective operational improvements. In the long term,
    she dreams of opening her own small soul‑food café that serves as a community gathering spot and provides job training opportunities for local youth.
