personas:
  professional: Jasmine Mcdaniel, a front‑of‑house specialist at a bustling Milwaukee restaurant, leverages their curiosity for new menu ideas and practical knack for streamlined operations to de‑escalate
    customer concerns, train crew, and drive efficiency, all while eyeing a shift‑supervisor promotion and a future in hospitality management, and they consistently seek feedback from the team.
  sports: Jasmine Mcdaniel stays fit by walking the Milwaukee lakefront most mornings, participates in a local walking club that meets at Veterans Park, and enjoys cheering on the Milwaukee Bucks at the
    Fiserv Forum with friends, while occasionally joining a backyard basketball pick‑up game during the summer, and they find that the early walks set a calm tone for the day.
  arts: Jasmine Mcdaniel nourishes their creative side by crocheting quilts inspired by jazz rhythms, listening to Ella Fitzgerald, Mary J. Blige, and Kirk Franklin on vinyl, and attending live performances
    at the Pabst Theater and Milwaukee Art Museum exhibitions featuring works by contemporary local artists, and they often weave musical motifs into the fabrics they craft.
  travel: Jasmine Mcdaniel prefers weekend road trips that blend cultural immersion and relaxation, such as exploring the historic streets of Savannah, Georgia for its Southern cuisine, visiting Door County’s
    cherry orchards, or attending music festivals in Chicago, always packing garden‑grown snacks to keep costs low, and they relish the spontaneous detours that let them discover hidden local eateries.
  culinary: Jasmine Mcdaniel experiments with Southern‑inspired dishes like smoked collard greens, shrimp and grits, and sweet‑potato cornbread, using garden‑fresh tomatoes, peppers, and okra, while their
    self‑taught culinary skills are sharpened through community cooking classes and a habit of tweaking recipes for healthier, low‑sodium versions, and they love sharing the dishes with neighbors during
    community potlucks.
  core: Jasmine Mcdaniel is a practical, curiosity‑driven hospitality professional who knits community threads into every aspect of life, from garden‑to‑table cooking to volunteer work, yet often lets flexibility
    trump strict planning, resulting in a charmingly disorganized but warm‑hearted routine, and they embrace the chaos with a smile.
background:
  cultural: Jasmine descends from a multi‑generational African‑American family that settled in Milwaukee during the Great Migration. Her parents, originally from the southern United States, brought traditions
    of soulful cooking, gospel music, and strong church involvement. Growing up in the historically black Bronzeville neighborhood, she was immersed in a close‑knit community that emphasized mutual support,
    cultural pride, and celebration through food, music, and local festivals. These cultural roots shape her love of soul food, community service, and participation in events such as Juneteenth, local black‑history
    celebrations, and church gatherings, while also blending with the broader Midwestern lifestyle of Milwaukee's lakefront recreation and diverse urban culture.
