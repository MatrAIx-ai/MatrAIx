persona_description: A skilled and respected mariner who played a critical role in the early English colonization of Virginia, particularly in the leadership and support he provided at the very beginning
  of English colonization in 1587. His leadership and dependability in leading the annual resupply of Jamestown were critical to its success. He participated in much of the Spanish Armada of English history,
  steadily rising in stature as a skilled seaman and successful privateer. He became one-sixth owner of the heavily armed privateer, Neptune, which he used for annual raiding voyages into the Caribbean
  through 1603. His extensive command experience in American waters made him the natural choice when the London Company sought a leader for its first colonizing voyage to Virginia.
