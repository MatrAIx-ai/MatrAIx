persona_description: A scientist or researcher who specializes in the study of groundwater resources, particularly in the United States. They are interested in the depletion of groundwater resources and
  the potential risks it poses to the oil and gas industry. They are likely to be familiar with the concept of aquifers and their role in storing and transporting water. They may also have expertise in
  hydrology, atmospheric sciences, and environmental science. They are interested in the use of groundwater resources from the bottom up and how it can be used to assess the availability and quality of
  water resources.
