personas:
  professional: Una Lister, a budding junior scientist and aspiring LEGO architect, merges a love for structured mystery books with meticulous notebook‑keeping and step‑by‑step model building, demonstrating
    their organized, methodical nature and practical problem‑solving skills.
  sports: Una Lister spends Saturday mornings at Rainbow Dance Studio perfecting jazz routines, sprints along the Klamath River trail for cardio, and cheers loudly for the Oregon Ducks football team each
    fall.
  arts: Una Lister, an enthusiastic choir member and bird sketcher, draws feathered friends inspired by the delicate art of Audubon and hums Disney songs like “Let It Go” while assembling intricate LEGO
    cityscapes.
  travel: Una Lister, who loves organized nature treks, explored the towering redwoods of Northern California on a family camping trip and now dreams of hiking Yellowstone’s geysers, always marking itineraries
    with stickers before each adventure.
  culinary: Una Lister, who proudly makes peanut‑butter‑banana toast with a sprinkle of cinnamon, favors cheesy macaroni and creates custom trail‑mix bowls with dried apricots, sunflower seeds, and chocolate
    chips.
  core: Una Lister is a methodical seven‑year‑old mystery aficionado who balances LEGO engineering with backyard science, yet often leaves puzzle pieces scattered despite a strong urge for order.
background:
  cultural: 'Una comes from a white, middle‑class family rooted in Klamath Falls, Oregon. Her household reflects typical Pacific Northwest values: a deep appreciation for the outdoors, seasonal celebrations
    like apple picking, pumpkin festivals, and community events such as the Klamath County Fair. Family gatherings often involve barbecues, storytelling, and volunteering for local clean‑up projects. She
    attends a community church that emphasizes kindness and service, and her school curriculum includes lessons about the Klamath Tribes, fostering respect for indigenous cultures and the region''s natural
    heritage. These influences shape her sense of responsibility, love for nature, and preference for structured yet cooperative community life.'
