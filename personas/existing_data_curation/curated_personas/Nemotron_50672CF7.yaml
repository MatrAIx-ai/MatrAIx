  career_goals: Una dreams of becoming a veterinarian because she loves animals and enjoys caring for her hamster. She also imagines teaching younger classmates one day, attracted by the clear routines
    and structured environment of a classroom. Another goal she mentions is working as a park ranger or wildlife biologist to protect the lakes and forests around Klamath Falls. Across all these ambitions,
    she seeks a role where she can keep things tidy, help others, and apply her love for nature and organized problem‑solving.
