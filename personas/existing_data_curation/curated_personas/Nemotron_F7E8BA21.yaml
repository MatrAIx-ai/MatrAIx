  career_goals: Eli aims to remain self‑sufficient and age‑in‑place, keeping his home in good repair while sharing his practical knowledge with younger neighbors. He hopes to document and preserve Byhalia’s
    oral history, volunteer as a driver for his church’s outreach programs, and coordinate small‑scale community food drives to support local families.
