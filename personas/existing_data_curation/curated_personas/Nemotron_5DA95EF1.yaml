  hobbies: '[''Church choir'', ''Cooking Southern comfort food'', ''Vegetable gardening'', ''Chess'', ''Attending high school football games'', ''Listening to classic soul and R&B music'', ''Reading historical
    biographies'', ''Classic car restoration'', ''Community volunteering'', ''Participating in senior center activities'']'
  career_goals: As he approaches retirement, Emmanuel aims to transition from day-to-day store supervision to a mentorship role where he can share his decades of experience with younger managers and apprentices.
    He hopes to lead training workshops for new retail supervisors within his company, and eventually serve as a community liaison for the local Chamber of Commerce, helping small businesses improve their
    customer service standards. He also envisions volunteering as a youth mentor at the local community center, focusing on career readiness and financial literacy.
