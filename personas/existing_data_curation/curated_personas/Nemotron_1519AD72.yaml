  career_goals: Though retired, Rhonda aims to stay active and influential. She plans to author a memoir that records Littleton’s oral histories, to lead a senior‑focused community garden, to serve on the
    Halifax County Historical Society board, and to mentor younger gardeners and students in reading and local history. She also hopes to improve digital literacy among her peers and to travel to ancestral
    sites in the Appalachians, preserving regional heritage while fostering intergenerational connections.
