  career_goals: Wendy dreams of a future where she can combine her love for helping others with practical, hands‑on work. She aspires to become a teacher or a pediatric nurse, seeing these roles as ways
    to support children’s learning and health. She also imagines a career as a veterinarian, reflecting her affection for animals and her desire to care for them. In the short term, she wants to expand
    her involvement in community service projects, aiming to develop leadership skills that will prepare her for a college degree in education or health sciences.
