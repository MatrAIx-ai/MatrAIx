persona_description: A Maxillofacial Prosthodontist who specializes in the treatment and rehabilitation of patients with clinical conditions associated with missing or deficient teeth and/or oral and maxillofacial
  tissues using biocompatible substitutes. The persona has a deep understanding of the interdisciplinary approach to treatment, involving oral and maxillofacial surgeons, plastic surgeons, head and neck
  surgeons, ENT doctors, oncologists, speech therapists, occupational therapists, physiotherapists, and other healthcare professionals. The persona is skilled in the planning, rehabilitation, and maintenance
  of oral and maxillofacial tissues using biocompatible substitutes.
