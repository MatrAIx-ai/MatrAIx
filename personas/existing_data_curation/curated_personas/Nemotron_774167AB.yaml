personas:
  professional: Pablo Demiranda, a seasoned computer support specialist with over twenty years of troubleshooting expertise, leverages his preference for routine, meticulous documentation, and bilingual
    fluency to provide dependable tech assistance while strategically preparing for a future team‑lead position that will codify support protocols.
  sports: Pablo Demiranda follows Liga MX fanatically, cheering especially for Club América and Tigres UANL during Sunday night matches with friends, participates in the Corpus Christi Fishing Association’s
    early‑morning outings as his preferred low‑impact fitness activity, and joins a weekend recreational softball league with coworkers for a seasonal burst of cardio.
  arts: Pablo Demiranda enriches his cultural life by setting up elaborate Dia de los Muertos altars, listening to classic mariachi ensembles such as Mariachi Vargas de Tecalitlán, and attending local folk‑dance
    performances whenever the community festival calendar permits.
  travel: Travel‑wise, Pablo Demiranda prefers meticulously planned road trips along the Gulf Coast—having already explored South Padre Island, the Yucatán Peninsula, and New Orleans—while dreaming of a
    future scuba‑diving vacation in the Galápagos Islands that would satisfy both his love of routine itineraries and his appetite for adventure.
  culinary: Pablo Demiranda, an adept home cook, regularly prepares traditional dishes like tamales, pozole, and mole using fresh Gulf seafood, chilies, cilantro, and oregano from his garden, and delights
    in experimenting with variations that blend smoky chipotle with citrus‑bright fish, though he occasionally over‑season in his zeal for flavor.
  core: Pablo Demiranda is a methodical IT veteran who balances a regimented work ethic with sunrise fishing, family‑cooked feasts, and steady community involvement, though his penchant for order sometimes
    turns his downtime into over‑planning.
background:
  cultural: 'Pablo is a second-generation Mexican-American who grew up in Corpus Christi''s historic waterfront neighborhoods. He was raised in a bilingual household where Spanish was spoken daily, and
    his family maintained strong ties to Mexican customs, celebrating Dia de los Muertos, Cinco de Mayo, and religious holidays with traditional foods and music. The coastal Texas culture also shaped his
    identity: he embraces the laid-back rhythm of Gulf life, enjoys seafood, and participates in community events centered on the port and fishing industry. As a devout Catholic, he values family, community
    service, and respect for elders. His professional demeanor reflects the Mexican emphasis on hospitality and the Texas work ethic of reliability and practicality, blending both heritages into a balanced,
    culturally aware outlook.'
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating system support (Windows, macOS, Linux)'', ''Network diagnostics (TCP/IP, DNS, DHCP)'', ''Active Directory
    user and group management'', ''Remote assistance tools (TeamViewer, Microsoft Remote Desktop)'', ''Ticketing system management (ServiceNow, Zendesk)'', ''IT asset inventory and lifecycle management'',
    ''Technical documentation and SOP creation'', ''Bilingual (English/Spanish) customer support'', ''Basic cybersecurity hygiene'', ''End-user training and onboarding'']'
  hobbies: '[''Fishing on the Gulf'', ''Cooking traditional Mexican meals'', ''Family barbecues and gatherings'', ''Weekly Sunday Mass'', ''Gardening herbs and vegetables'', ''Raspberry Pi home automation
    projects'', ''Watching Liga MX soccer'', ''Reading technology blogs'', ''Participating in local cultural festivals'']'
  career_goals: Pablo aims to translate his strong foundation in routine-oriented support into a leadership role within the next three years. He plans to earn CompTIA Network+ and Microsoft Modern Desktop
    Administrator certifications, and to complete an ITIL Foundation course to formalize his process-improvement skills. His goal is to become a support team lead or IT operations manager, where he can
    design and enforce standardized support protocols, mentor junior technicians, and ensure that service delivery remains dependable and efficient. Long-term, he envisions launching a modest consulting
    practice focused on providing reliable tech support to small businesses in the Corpus Christi area, leveraging his practical expertise and bilingual communication skills.
