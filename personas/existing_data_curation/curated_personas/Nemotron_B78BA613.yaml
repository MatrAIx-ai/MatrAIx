personas:
  professional: Celia Santos, a 35‑year‑old Certified Registered Nurse Anesthetist, leverages advanced airway management and bilingual communication to deliver precise perioperative care while improvising
    rapid solutions in high‑stress ORs, even as their spontaneous nature sometimes clashes with the rigid scheduling of surgery blocks.
  sports: Celia Santos enjoys hiking the misty trails of El Yunque and follows the local baseball team, the Cangrejeros de Santurce, while attending occasional volleyball matches, but they rarely join a
    formal gym, preferring spontaneous outdoor workouts and mindful yoga sessions.
  arts: Celia Santos channels their curiosity into abstract watercolor paintings and frequent visits to the Museum of Art of Puerto Rico, while they regularly play guitar to plena and salsa songs by Rubén
    Blades and attend theater productions starring Andy García, though they sometimes procrastinate on finishing canvases.
  travel: Celia Santos favors spontaneous weekend road trips along the coastal highway to places like Vieques and Rincón, balancing short‑term adventure with careful planning for family visits and annual
    pilgrimage to the San Juan Bautista festival, yet they often overbook and scramble to meet travel deadlines.
  culinary: Celia Santos delights in crafting mofongo with crispy chicharrón and sofrito, experiments with homemade pasteles during holiday feasts, and they possess a moderate cooking skill that mixes traditional
    family recipes with occasional attempts at fusion dishes like shrimp‑taco tacos, though they sometimes forget to clean the kitchen afterward.
  core: Celia Santos is a fiercely compassionate CRNA who merges artistic spontaneity with meticulous clinical skill, juggling a love for watercolor, yoga, and community advocacy while occasionally battling
    disorganization and stress‑induced worry.
background:
  cultural: Celia is a native of Trujillo Alto and currently resides in Bayamón, deeply rooted in Puerto Rican culture. She embraces the island's strong family orientation (familismo), Catholic traditions,
    and vibrant celebrations such as San Juan Bautista and local fiestas. Bilingual in Spanish and English, she values respect (respeto) and community solidarity, especially in the aftermath of natural
    disasters that have fostered her adaptability. Her heritage influences her love for music, dance, and cuisine, while her experience as a widowed mother shapes her compassionate yet self‑advocating approach
    to both personal life and professional practice. Celia actively participates in local health outreach, bridging cultural insight with clinical expertise.
