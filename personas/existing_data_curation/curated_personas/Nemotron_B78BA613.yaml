  hobbies: '[''Abstract watercolor painting'',''Visiting art galleries and theater'',''Playing guitar and dancing salsa/plena'',''Yoga and meditation'',''Hiking in El Yunque'',''Spontaneous weekend road
    trips'',''Cooking traditional Puerto Rican cuisine'',''Reading philosophy and contemporary non‑fiction'',''Volunteering at community health fairs'',''Photography of urban and natural scenes'']'
  career_goals: Celia aims to earn a Doctorate in Nursing Practice (DNP) focusing on perioperative care and to become a clinical nurse educator, shaping the next generation of CRNAs. She intends to lead
    a research program investigating culturally tailored anesthesia and pain protocols for Latino patients, and to advocate for robust mental‑health support for healthcare workers. Long‑term, she envisions
    a leadership role as Chief Nurse Anesthetist at a major hospital in San Juan and plans to launch a community wellness center that integrates art therapy, yoga, and pain‑management services for underserved
    neighborhoods.
