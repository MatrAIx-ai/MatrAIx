  hobbies: '[''visiting art galleries'', ''attending indigenous craft workshops'', ''cooking traditional Latin American dishes'', ''salsa and folkloric dancing'', ''watercolor landscape painting'', ''native
    plant gardening'', ''volunteering as art mentor'', ''reading art history books'']'
  career_goals: Zoe hopes to transition from subcontractor work to owning a boutique decorative painting studio that specializes in culturally inspired murals for public spaces in Fort Lauderdale. She plans
    to obtain a formal certification in historic preservation painting to expand her service offerings. Over the next five years she aims to mentor at least two apprentices, develop a portfolio of community‑based
    art installations that celebrate her Latin American Indian heritage, and achieve a steady flow of high‑end residential commissions that will support a comfortable retirement.
