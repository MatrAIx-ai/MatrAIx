personas:
  professional: Max Picco is a store manager who leverages data‑driven decision‑making, Excel‑based inventory analysis, and empathetic people‑management to keep a bustling retail floor running smoothly,
    while their curiosity and love of art inspire creative visual merchandising and the long‑term vision of a boutique gallery‑café.
  sports: Max Picco enjoys weekend hikes in the Ramapo Mountains, follows the New York Knicks in the NBA, roots for the New York Giants in football, and plays pickup basketball at a local community center,
    preferring low‑key, regular activity over intense gym routines.
  arts: Max Picco frequents MoMA and the Newark Museum, sketches street scenes in Brooklyn, draws inspiration from photographers Vivian Maier and Nan Goldin, admires the avant‑garde installations of Yayoi
    Kusama, and curls up to watch indie films by the Duplass brothers and the latest Instagram art reels curated by their favorite influencer, @artfulwanderer.
  travel: Max Picco plans trips with a mix of spreadsheet precision and spontaneous wanderlust, having explored the historic alleys of Barcelona for Gaudí’s architecture, trekked the Appalachian Trail’s
    southern section, and dreaming of a future immersion in the art hubs of Florence and Kyoto, all while budgeting travel through points and careful expense tracking.
  culinary: Max Picco's kitchen is a laboratory where they blend homemade gnocchi with sundried tomato pesto, experiment with ramen broth infused with miso and shiitake, and perfect a weekly Sunday pasta
    dinner featuring fresh basil and parmesan, all while boasting a modest skill level that leans on YouTube tutorials and an occasional over‑salting habit.
  core: Max Picco is a detail‑oriented store manager with a restless artistic soul, who juggles anxiety, budget spreadsheets, and midnight sketch sessions while dreaming of turning a retail space into a
    gallery‑café.
background:
  cultural: Max is a second‑generation Italian‑American raised in Passaic, New Jersey, a city known for its diverse immigrant communities. His family maintains modest Italian traditions, such as Sunday
    pasta dinners and celebrating feasts like Ferragosto, while also participating in the broader multicultural fabric of Passaic through community festivals and neighborhood events. Growing up in a predominantly
    white, working‑class suburb, Max has been exposed to both his heritage’s emphasis on family loyalty and the artistic influences of the nearby New York metropolitan area.
