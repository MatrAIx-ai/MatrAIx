  hobbies: '[''Visiting art galleries'', ''Photography'', ''Sketching'', ''Reading contemporary philosophy'', ''Indie music listening'', ''Cooking experimental meals'', ''Hiking in local parks'', ''Board
    game nights with close friends'', ''Meditation and mindfulness practice'', ''Journaling'']'
  career_goals: Max aims to advance to a regional operations manager position within the next five years, overseeing multiple locations and shaping strategic growth initiatives. He plans to enroll in a
    part‑time MBA program to deepen his business acumen and pursue a leadership role that merges his managerial strengths with his passion for the arts, such as opening a boutique gallery‑café. Alongside
    professional advancement, he seeks to cultivate resilience and effective stress‑management techniques to mitigate his anxiety and maintain long‑term well‑being.
