persona_description: A physician who specializes in allergy and immunology, particularly in the use of skin testing and laboratory-based IgE testing to identify and treat allergic reactions. They are committed
  to expanding the use of these tests and advocating for their benefits in primary care settings. They are aware of the limitations of skin testing and the importance of accurate identification of allergens
  to which patients are sensitive. They are familiar with serologic testing and the potential impact it can have on the management of allergic conditions. They are aware of the challenges associated with
  the cost-effectiveness of component-resolved diagnosis and the allergen chip. They are committed to educating their peers and advocating for the use of serologic testing in primary care settings.
