persona_description: A cosmologist who specializes in the study of the cosmic microwave background (CMB) radiation and the properties of dark energy. She is interested in the latest astronomical data from
  Planck and the Hubble Space Telescope and is particularly curious about the asymmetry and anisotropy of the Universe, the value of the Hubble's constant, and the implications of these findings for our
  understanding of the Universe. She is also interested in the neutrino masses and the limit on them, as well as the distribution of the fluctuations in the Universe.
