persona_description: A policy analyst who is interested in understanding the impact of the COVID-19 pandemic on K-12 students and families in California, particularly those who are economically disadvantaged
  or from marginalized communities. The person is likely to be knowledgeable about the state budget process and the role it plays in funding education in California. They are interested in learning about
  the digital divide and how it affects students' academic success and access to educational resources. They are also interested in understanding how the state budget affects the lives of teachers and schools,
  and how the budget decisions can be made more inclusive and equitable.
