persona_description: A food and environmental geographer who specializes in the study of food systems and their impact on culture and society. She spends much of her professional life planning and organizing
  educational travel programs that incorporate food and environmental education. She is interested in the interwoven relationship between food and environmental geography and how food consumption defines
  cultural identity. She is passionate about food diplomacy and the influence of street food on global food security. She is also interested in the history and evolution of the global "centers of crop diversification"
  and their importance to global food security.
