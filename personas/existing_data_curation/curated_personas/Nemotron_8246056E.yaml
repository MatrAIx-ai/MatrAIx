  career_goals: Alfredo aims to become a lead R&D scientist within a cutting‑edge medical‑device company, eventually directing a multidisciplinary team that brings together engineering, design, and user
    experience. He envisions developing affordable, patient‑centric implants that blend functional performance with aesthetic considerations, inspired by his appreciation for art. In the longer term, he
    hopes to launch his own biotech startup focused on sustainable, low‑cost regenerative therapies for underserved populations. Parallel to his technical ambitions, he aspires to mentor junior engineers,
    contribute to policy discussions on biomedical innovation, and become a recognized speaker at interdisciplinary conferences.
