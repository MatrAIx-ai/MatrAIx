personas:
  professional: Emmanuel Guest, a retired auto‑plant foreman turned community arts organizer, leverages their carpentry skills, public‑speaking talent, and compassionate, collaborative nature to coordinate
    a free neighborhood art studio, and they mentor at‑risk youth through storytelling workshops.
  sports: Emmanuel Guest, a lifelong Detroit Lions and Tigers fan, joins the Riverwalk Walking Club each Saturday, plays pickup basketball at the community center during winter, and they participate in
    a local senior softball league, using these activities to stay active and bond with neighbors.
  arts: Emmanuel Guest, a devoted blues guitarist, frequently jams at the historic Cliff Bell’s while channeling the spirit of Muddy Waters and Stevie Wonder into their vibrant acrylic cityscapes of the
    Detroit riverfront, and they draw lyrical inspiration from poet Gwendolyn Brooks for their visual narratives.
  travel: Emmanuel Guest prefers purposeful travel with their church’s senior group, having toured New Orleans’ jazz scene and walked Boston’s Freedom Trail, while they dream of a leisurely Pacific Coast
    road‑trip that balances cultural immersion with a modest travel budget.
  culinary: Emmanuel Guest, a confident home chef, loves simmering collard greens with smoked turkey, baking buttery mac and cheese topped with sharp cheddar, and crafting peach cobbler spiced with cinnamon
    and nutmeg, and they often share these soulful meals at community potlucks.
  core: Emmanuel Guest, a 64‑year‑old storyteller‑artist, mixes a painter’s imagination with a union‑shaped sense of solidarity, habitually hoarding spare paint tubes like treasures while occasionally overlooking
    utility payments, yet they always rally neighbors around a shared mural.
background:
  cultural: Emmanuel’s cultural identity is rooted in the African‑American experience of Detroit. Born to parents who migrated from the rural South during the Great Migration, he grew up in a close‑knit
    neighborhood where church, music, and mutual aid were daily pillars. The city’s rich Motown legacy, its blues and jazz clubs, and the spirit of the auto‑plant unions shaped his early worldview. He internalized
    values of resilience, solidarity, and creative expression—traits reflected in his love for art, storytelling, and community service. Through decades of participation in local churches, civic clubs,
    and neighborhood block parties, Emmanuel has both preserved and celebrated the lineage of his ancestors, weaving their narratives into his own life and artistic work.
