  career_goals: Emmanuel aspires to transform his passion for art and community service into lasting impact. He hopes to establish a free community art studio in his neighborhood, where seniors and youth
    can create together and exchange stories. He aims to lead a mentorship program that pairs retirees with at‑risk young people, using storytelling and workshop activities to build confidence and cultural
    pride. Writing a memoir that intertwines his personal journey with Detroit’s African‑American history is another key goal. Additionally, he wishes to serve on the board of a local cultural nonprofit,
    helping shape programming that celebrates the city’s musical and artistic legacy.
