personas:
  professional: Meekyung Chan is a 24‑year‑old manufacturing assembler in New York who blends meticulous MIG and TIG welding, sharp technical‑drawing interpretation, and a calm, detail‑driven demeanor to
    spearhead lean‑process tweaks while quietly championing a future supervisory role in eco‑friendly production.
  sports: Meekyung Chan enjoys shooting hoops in an intramural basketball league, is a dedicated fan of the New York Knicks and the New York Rangers, practices Vinyasa yoga three times a week, and is a
    regular at a local rock‑climbing gym where they tackle beginner routes to stay fit and balanced.
  arts: Meekyung Chan lights up at K‑pop concerts, especially when BTS or Blackpink are on stage, collects limited‑edition vinyls, dives into sci‑fi novels like Neuromancer and The Three‑Body Problem, captures
    gritty Manhattan streets in a style reminiscent of Vivian Maier, and frequently belts out favorite tracks at karaoke nights with friends.
  travel: Meekyung Chan plans trips that blend design inspiration with budget savvy, having explored Copenhagen’s sustainable furniture scene, fallen in love with Seoul’s night markets, set sights on Kyoto’s
    ancient temples, and regularly escapes to the Catskill Mountains for weekend hikes, all while maximizing airline reward points for cost‑effective travel.
  culinary: Meekyung Chan perfects kimchi and bulgogi with a nuanced balance of gochujang heat, has mastered kimchi fried rice and bulgogi tacos using corn tortillas, experiments with fermented vegetables
    and grilled tofu, and occasionally brews a smooth matcha latte for a creative coffee break.
  core: Meekyung Chan is a calm, detail‑obsessed woodworker and assembler who balances disciplined savings with occasional indulgences, jogs between yoga mats and rock‑climbing walls, and fuels life with
    kimchi, K‑pop beats, and a camera in hand.
background:
  cultural: Meekyung is a second‑generation Korean‑American who grew up in a close‑knit Korean community in Queens, New York. She was raised with Korean family traditions such as celebrating Seollal and
    Chuseok, and she maintains bilingual fluency in Korean and English. The collectivist values of her heritage—respect for elders, strong family ties, and a sense of community—shape her cooperative yet
    assertive approach at work. Simultaneously, living in the multicultural tapestry of New York City has broadened her outlook, fostering an appreciation for diverse perspectives and encouraging her pragmatic
    curiosity in both personal and professional realms.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint interpretation'', ''Welding (MIG/TIG)'', ''Quality inspection'', ''Safety compliance'', ''Troubleshooting machinery'', ''Inventory management'', ''Lean manufacturing
    principles'', ''Basic CAD modeling'', ''Bilingual communication (Korean/English)'']'
  hobbies: '[''DIY woodworking'', ''Korean cooking'', ''Yoga'', ''Urban photography'', ''Reading sci‑fi novels'', ''K‑pop listening'', ''Language exchange (Korean/English)'', ''Hiking in nearby parks'']'
  career_goals: Meekyung aims to progress from an assembler to a supervisory role within the manufacturing sector, seeking certifications in CNC machining and Six Sigma to deepen her expertise in process
    optimization. Over the next five years, she plans to lead a small team focused on innovative fabrication projects, integrate sustainable practices into production, and eventually transition into a production
    manager position where she can blend her technical knowledge with strategic planning. Her long‑term ambition includes launching a boutique workshop that offers custom, eco‑friendly furniture designs,
    leveraging her hands‑on skills and creative problem‑solving.
