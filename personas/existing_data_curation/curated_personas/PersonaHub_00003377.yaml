persona_description: A marine biologist who specializes in oceanic plastic pollution research, particularly in the eastern boundary of high plastic concentration in the Atlantic Ocean. Her research interests
  include the distribution and fate of plastic debris in the ocean, the impacts of plastic pollution on marine ecosystems, and the development of strategies for reducing plastic waste in the ocean. She
  is dedicated to raising awareness about the importance of protecting the ocean and its inhabitants from plastic pollution.
