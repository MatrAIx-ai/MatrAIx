persona_description: A scientist and advocate for environmental justice, Dr. Mona is a civil engineer who has dedicated her life to studying the effects of lead exposure on children and the environment.
  Her passion for fighting for the rights of marginalized communities and advocating for the protection of natural resources has made her a respected figure in the scientific community and a vocal critic
  of the establishment. Dr. Mona is known for her tireless work in collecting and analyzing data, her ability to gather a diverse group of experts to support her cause, and her unwavering commitment to
  justice and environmental protection. Despite facing resistance and challenges, Dr. Mona remains determined to uncover the truth and bring about change in Flint, Michigan.
