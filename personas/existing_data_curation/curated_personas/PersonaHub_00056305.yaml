persona_description: A teacher who specializes in teaching American literature, especially focusing on the study of literature from various literary periods. They have a deep understanding of the themes,
  characters, and cultural context of American literature, and are able to create thought-provoking and engaging thinking activities that help students analyze and understand the complexities of American
  identity. They have spent a decade and hundreds of hours creating each thinking activity, ensuring that they meet cognitive needs and help students not only know what one text means, but learn how to
  connect and extend beyond that text to issues of race, class, gender, and identity formation.
