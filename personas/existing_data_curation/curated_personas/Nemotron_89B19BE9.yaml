  career_goals: Javier aims to advance to a regional manager position within the next five years, overseeing multiple locations while championing a culture of collaboration and employee development. He
    also dreams of opening his own community‑focused café that blends Mexican cuisine, live music, and local art, creating a vibrant gathering spot for cultural expression. To realize this, he plans to
    enroll in business management courses at a community college, sharpen his financial planning skills, and build a network with local artists and entrepreneurs.
