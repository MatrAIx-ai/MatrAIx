  hobbies: '[''Visiting Art Galleries'', ''Exploring Street Murals'', ''Playing Acoustic Guitar'', ''Cooking Mexican Cuisine'', ''Attending Live Music Events'', ''Hiking Coastal Trails'', ''Beach Volleyball'',
