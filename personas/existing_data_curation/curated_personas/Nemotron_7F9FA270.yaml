  hobbies: '[''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Hiking in Colorado foothills'', ''Gardening'', ''Book club participation'', ''Knitting and craft donations'', ''Storytelling workshops'']'
  career_goals: Although she is not currently employed, Ladys aims to remain actively engaged in lifelong learning and community service. She plans to complete a certificate program in gerontology to better
    support seniors in Denver, and to lead intergenerational storytelling workshops that connect Puerto Rican heritage with local youth. She aspires to author a memoir capturing her experiences as a bilingual
    educator and immigrant, hoping to inspire future teachers. Additionally, she seeks a leadership role within the local Puerto Rican cultural center, where she can help organize cultural festivals and
    advocate for senior-friendly public spaces.
