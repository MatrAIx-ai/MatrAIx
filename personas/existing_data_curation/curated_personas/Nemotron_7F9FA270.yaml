personas:
  professional: Ladys Deida, a retired bilingual educator turned community volunteer, leverages three decades of classroom management and curriculum design expertise to orchestrate intergenerational storytelling
    workshops, while their love for structured lesson plans intermittently collides with a spontaneous flair that keeps events delightfully unpredictable.
  sports: Ladys Deida enjoys gentle hikes with the Rocky Mountain Trail Club, follows the Denver Broncos in the fall and the Colorado Avalanche in the winter, and stays active by joining a weekly senior
    salsa dance class that doubles as cardio.
  arts: Ladys Deida finds solace in listening to Celia Cruz’s salsa classics, admiring Frida Kahlo’s vivid paintings, and attending the Denver Center’s monthly performances of classic Broadway shows, which
    together color their evenings and inspire their knitting designs.
  travel: Ladys Deida prefers thoughtfully planned road trips, savoring weekend getaways to Aspen’s snowy slopes in winter and sunny vineyard tours in Santa Barbara during summer, while dreaming of a cultural
    pilgrimage to Seville but balancing these desires against a modest travel budget and the need to stay close to family.
  culinary: Ladys Deida, a confident home chef, delights in perfecting traditional dishes like arroz con gandules, pernil, and caramel‑topped flan, seasoning with sofrito, adobo, and fresh cilantro, and
    regularly shares these meals at community potlucks, though they occasionally forget to set timers, resulting in charred edges.
  core: Ladys Deida combines a teacher’s orderly mind with a salsa dancer’s spontaneous spirit, obsessively scribbles grocery lists while worrying about the next rainstorm, and never says no to a knitting
    circle, even when sleep runs thin.
background:
  cultural: Ladys was born and raised in Puerto Rico, where she absorbed the island's rich traditions, music, and Catholic faith. After moving to the mainland United States in her early thirties, she settled
    in Denver, where she has become an active member of the Puerto Rican diaspora. She maintains close ties to her heritage through regular participation in La Isla Cultural Center events, celebrating festivals
    such as Noche de San Juan and the Puerto Rican Day Parade in Denver. Her bilingual fluency allows her to serve as a cultural bridge, preserving Puerto Rican customs while adapting to Colorado’s diverse
    community.
