  career_goals: Alicia dreams of a future where she can combine her love of caring for others with her organized, methodical nature. She aspires to become a veterinarian because she wants to help animals
    stay healthy and safe, and she enjoys learning about nature and science. She also imagines herself as a teacher or school librarian, where she can share her enthusiasm for books and support classmates
    in their learning journeys. Her ambitions balance curiosity about the world with practical ways to make a positive impact in her community.
