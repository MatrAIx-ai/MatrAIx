personas:
  professional: Alicia Rollins, a budding junior ecologist, channels the curiosity of adventure books and the methodical mindset from LEGO building into exploring the Blue Ridge foothills, eagerly cataloguing
    insects and drafting nature journals that reflect a practical yet imaginative approach to environmental stewardship.
  sports: Alicia Rollins darts across the local park field as a forward on the Hendersonville MiniKick Soccer Club, cheering for the Carolina Panthers on game nights and idolizing North Carolina Courage
    forward Ashley Hatch, while balancing weekend trail hikes that keep her stamina high for both team matches and family nature walks.
  arts: Alicia Rollins sketches vibrant wildlife scenes inspired by Beatrix Potter and watches nature documentaries narrated by David Attenborough, practices piano pieces like 'Twinkle Twinkle Little Star'
    and 'The Heart and Soul', and contributes hand‑painted banners for Sunday school art projects, all of which nurture her creative spirit and community‑focused expression.
  travel: Alicia Rollins delights in family camping trips to Great Smoky Mountains National Park, day‑excursions to the Asheville Biltmore Estate, and seasonal visits to the Apple Festival in Hendersonville,
    while dreaming of future adventures to Yellowstone’s geysers and the Grand Canyon’s rim, preferring itineraries that blend educational hikes with local cultural celebrations.
  culinary: Alicia Rollins enjoys helping mom stir batter for Southern biscuits, assembling her favorite peanut butter‑jelly sandwiches, savoring crispy fried chicken with honey‑butter biscuits, and tasting
    the warm apple crumble served at the Apple Festival, often requesting pine‑nut toppings for her homemade trail mix.
  core: Alicia Rollins blends a practical, organized mind with boundless curiosity, turning every LEGO set, soccer game, and nature walk into a tiny lesson in stewardship, community, and joyful discovery.
background:
  cultural: Alicia grows up in Hendersonville, North Carolina, a small town in the Appalachian foothills with a predominantly white, close‑knit community. Her family embraces Southern hospitality traditions,
    including regular church attendance, community festivals like the Apple Festival, and seasonal gatherings with extended relatives. The local culture values outdoor recreation, appreciation for the Blue
    Ridge Mountains, and a strong emphasis on education and community service. These influences shape Alicia's respectful demeanor, love of nature, and desire to contribute positively to her surroundings.
