persona_description: A systems biologist and professor at Rensselaer, known for his research on the classification and adaptive behavior prediction of children with Autism Spectrum Disorder based on multivariate
  data analysis of markers of oxidative stress and DNA methylation. His work has led to the development of a predictive algorithm that can accurately identify neurotypical participants and those on the
  Autism spectrum, with a high degree of specificity. His methods have been cross-validated and are likely to be of interest to researchers and clinicians in the field of Autism Spectrum Disorder.
