  hobbies: '[''Reading non-fiction (business, psychology, tech)'', ''Orchid and succulent gardening'', ''Solo chess (online)'', ''Senior golf league'', ''Guided meditation'', ''Journaling'', ''Bird‑watching'',
    ''Walking nature trails'']'
  career_goals: Approaching retirement, Elinor aims to leverage her analytical background to transition into a senior advisory role where she can shape high‑level operational strategy for her organization.
    She plans to lead a flagship efficiency‑driven initiative that reduces overhead costs by at least 10% within two years, positioning herself as a change‑agent before she steps back. Simultaneously, she
    aspires to mentor junior analysts, sharing her pragmatic problem‑solving approach and fostering a culture of healthy skepticism. Ultimately, she hopes to author a concise guide on practical data‑driven
    decision making for mid‑career professionals, cementing a legacy of pragmatic insight.
