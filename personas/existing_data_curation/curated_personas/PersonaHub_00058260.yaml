persona_description: A professional traffic controller who is responsible for managing and directing traffic flow through the 4.6-mile long combined bridge-tunnel system, the Monitor-Merrimac Memorial Bridge-Tunnel
  (MMMBT). This persona is skilled in traffic management, with expertise in monitoring traffic flow, analyzing data, and making real-time decisions to ensure smooth operations. They are also adept at using
  closed-circuit television cameras and sensors to detect and respond to incidents in the tunnel, and are familiar with the use of emergency information systems to keep motorists informed during emergencies.
  Additionally, this persona is highly skilled in using communications systems to rebroadcast local AM and FM radio stations to ensure that motorists can still listen to their favorite local stations while
  in the tunnel.
