  career_goals: Eduardo frequently talks about wanting to help people when he grows up. He imagines becoming a doctor because he likes caring for his stuffed animals, or a teacher so he can share knowledge
    and keep a classroom organized. He also admires firefighters and sometimes says he wants to build safe places for everyone, reflecting his love of structure and protection. Though his ideas are still
    playful, they consistently focus on service, order, and a role that supports his community.
