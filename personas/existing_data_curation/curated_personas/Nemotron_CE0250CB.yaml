  career_goals: Carmen aims to move into a supervisory or laboratory manager role within the next three years, leveraging her expertise to lead a high‑performance team that sets regional standards for quality
    and innovation. She plans to obtain advanced certifications in digital dental technology and explore a master's program in health informatics or prosthetic science. Ultimately, she envisions establishing
    her own boutique dental‑ophthalmic lab focused on affordable, custom‑made devices for underserved communities in Puerto Rico, while also offering training workshops and collaborating with local dental
    schools on research projects.
