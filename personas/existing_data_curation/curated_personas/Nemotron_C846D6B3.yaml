    ''Effective communication and conflict mediation'']'
  hobbies: '[''Visiting contemporary art museums and galleries'', ''Home cooking experimentation and recipe development'', ''Attending live jazz and blues concerts'', ''Street photography of urban food
    scenes'', ''Exploring Chicago’s food markets and ethnic neighborhoods'', ''Reading culinary history and design literature'', ''Volunteering at community kitchens and shelters'']'
  career_goals: Nicholas aims to leverage his operational expertise and artistic curiosity into a senior culinary leadership role. In the next five years, he plans to earn a formal culinary certification
    such as the American Culinary Federation's Certified Chef program and attend a part‑time culinary arts associate’s degree program. He aspires to become an executive chef or culinary manager for a reputable
    hotel or restaurant group in Chicago, where he can design menus that fuse contemporary art concepts with locally sourced ingredients. Ultimately, his long‑term ambition is to launch his own farm‑to‑table
    restaurant that showcases the city’s diverse neighborhoods, offering dishes that are both visually striking and culturally resonant. He also hopes to mentor young kitchen staff, fostering the same discipline
    and collaborative spirit he values.
