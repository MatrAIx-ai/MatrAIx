persona_description: A scholar and expert in Norse mythology, particularly the study of the elves and their connection to the Æsir and Vanir. They are interested in the historical and cultural context of
  the elves in Norse mythology, as well as their role in the development of later Scandinavian folklore. They are knowledgeable about the different interpretations of elves in different parts of Scandinavia,
  including their association with fertility, ancestors, and the life force of the family. They are also interested in the similarities and differences between the elves and other supernatural beings, such
  as the Vanir and dwarves. They are likely to have a deep understanding of the complex relationships between the gods and the elves in Norse mythology, and how they have evolved over time.
