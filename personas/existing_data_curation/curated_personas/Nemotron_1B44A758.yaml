  career_goals: He aims to turn his artistic passion into a sustainable career. In the short term, Ladarrius plans to enroll in a community college program in graphic design or visual communications to
    formalize his skills. He wants to launch a freelance brand offering custom street-wear designs, mural commissions, and digital assets for local musicians and small businesses. Long-term, he envisions
    running his own creative studio that blends visual art, music production, and event curation, positioning himself as a cultural influencer in the Nashville area. He also aspires to grow a sizable online
    following, monetizing his content through sponsorships and merchandise. Throughout, he is motivated by the desire to achieve financial independence and gain recognition for his unique artistic voice.
