  hobbies: '[''Watercolor painting'', ''Sketching'', ''Gardening'', ''Cooking Vietnamese cuisine'', ''Reading historical fiction'', ''Listening to Vietnamese folk music'', ''Calligraphy'', ''Nature walks'',
