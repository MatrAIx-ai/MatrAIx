  career_goals: Thitima aims to transition from being a subcontractor to running her own modest painting and paperhanging business, focusing on a steady base of local homeowners who value quiet, reliable
    service. She plans to obtain a California contractor’s license to formalize her credentials and broaden her client network. Long‑term, she hopes to create a small side line of original watercolor and
    mixed‑media artworks inspired by Vietnamese landscapes, eventually selling pieces at community art fairs. Mentoring younger apprentices, especially from the local Vietnamese community, is also a personal
    ambition, allowing her to pass on practical skills while fostering cultural ties.
