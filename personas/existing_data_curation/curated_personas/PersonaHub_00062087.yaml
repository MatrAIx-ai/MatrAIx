persona_description: A stakeholder in the transportation and land use planning process who is interested in exploring the potential impacts of climate change and developing strategies to mitigate or adapt
  to these impacts. This person may be a state agency, federal agency, regional land use and transportation entity, or local stakeholder. They are looking for a replicable process for considering climate
  change in transportation and land use planning in situations requiring interagency coordination, and are interested in the potential benefits of scenario planning software and the ability to provide immediate
  feedback on development and transportation decisions.
