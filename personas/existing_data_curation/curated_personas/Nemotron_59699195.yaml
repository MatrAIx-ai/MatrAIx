  career_goals: Although retired, William aims to stay active and purposeful. He plans to continue teaching woodworking and gardening to his grandchildren and local youth, preserving practical knowledge
    across generations. He aspires to document his family’s Greek heritage through a memoir and a photo album, and to share that story with his community. Maintaining his health through regular walks, light
    exercise, and balanced nutrition is a priority. He also hopes to travel with his wife to visit their children and, when possible, to Greece for a cultural pilgrimage. Volunteering at the local food
    bank and assisting with church services remain central to his sense of contribution.
