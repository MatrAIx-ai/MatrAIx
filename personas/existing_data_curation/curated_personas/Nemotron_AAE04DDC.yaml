  hobbies: '[''Building LEGO and wooden block towers (following instructions and free design)'', ''Drawing and coloring pictures'', ''Listening to children’s music and spontaneous dancing'', ''Outdoor play
    at Pioneer Park (climbing, creek exploration, races)'', ''Reading and re‑reading picture books'']'
  career_goals: Dawn often talks about growing up to be a teacher because she likes showing picture books to friends and helping them learn new words. She is also fascinated by animals and imagines herself
    as a veterinarian who cares for the neighborhood dogs and horses she sees at the local park. Her love for building with LEGO fuels a budding interest in engineering or architecture, and she sometimes
    says she wants to build 'the biggest tower ever.' While still very young, these aspirations reveal her desire for roles that combine structure, caring for others, and the chance to be the best at a
    task.
