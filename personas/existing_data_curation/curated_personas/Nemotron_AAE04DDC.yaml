personas:
  professional: A budding park ranger-in-training, Dawn Lynn showcases a love for nature, a knack for organizing small outdoor scavenger hunts, and a preference for clear routines, which they channel into
    their pretend ranger badge ceremonies.
  sports: A budding soccer enthusiast, Dawn Lynn kicks the ball at the local park after school, cheers for the Utah Jazz during family game nights, and participates in a winter sledding club at the nearby
    foothills, balancing energetic play with occasional bouts of laziness.
  arts: An eager participant in the Ogden Arts Festival, Dawn Lynn loves finger-painting bright landscapes, sings along to tracks by Taylor Swift and Elle Mills, and collects stickers of historic railroad
    locomotives, weaving creativity into their daily play.
  travel: A curious little explorer, Dawn Lynn enjoys weekend trips to the nearby Wasatch Mountains for snow play, family visits to the historic Union Station museum, and dreams of traveling to Disney World
    and the Grand Canyon.
  culinary: A budding food critic, Dawn Lynn adores peanut butter and jelly sandwiches, homemade apple cinnamon muffins, and helps stir a pot of spaghetti sauce, though they often sneak extra chocolate
    chips when no one watches.
  core: Dawn Lynn is a structured-yet-flexible five-year-old who balances a love for nature, community rituals, and sugary snacks with a hint of competitive spark and occasional forgetfulness.
background:
  cultural: Dawn’s cultural background reflects a middle‑class white family living in Ogden, Utah, on the western edge of the Wasatch Front. Her family participates in community traditions such as the summer
    Ogden Arts Festival, local farmers’ markets, and seasonal park clean‑up events, which emphasize community involvement and family togetherness. While not strictly religious, she occasionally attends
    a local church where gatherings focus on service and fellowship—a common feature of the region’s cultural fabric. The nearby mountains and ski resorts shape a love for outdoor activities, and the city’s
    historic railroad heritage provides a sense of local pride. These influences combine to create a cultural environment that values both structured community events and the freedom to explore the natural
    surroundings.
attributes:
  skills: '[''Following simple routines (brush teeth, snack preparation)'', ''Fine‑motor coordination (coloring, cutting, puzzle assembly)'', ''Emergent literacy (letter recognition, basic reading)'', ''Basic
