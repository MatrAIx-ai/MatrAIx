persona_description: A professional IT administrator who is responsible for maintaining and optimizing the performance of a Windows-based system. This individual is particularly interested in improving
  the efficiency of the system by optimizing the use of system resources, particularly the pagefile, and ensuring that the system is able to handle various workload scenarios without experiencing performance
  degradation. This persona is likely to have experience with Windows operating systems and familiarity with the Windows NT operating system's pagefile management features, as well as with the concept of
  pagefile management and its impact on system performance.
