  hobbies: '[''Sketching and painting'', ''Digital photography'', ''Reading contemporary fiction and philosophy'', ''Solo hikes in the Hill Country'', ''Collecting vintage textile samples'', ''Playing acoustic
    guitar'']'
  career_goals: Joshua aims to leverage his technical grounding in textile finishing into a role as a textile technologist or garment designer, where he can blend his hands-on expertise with his artistic
    sensibility. He plans to pursue an associate degree in fashion technology and eventually lead a small boutique line that features custom-pressed, artistically inspired apparel. In the short term, he
    seeks to become a senior press operator and mentor new staff, while also building a freelance portfolio of hand-finished garments and art-focused collaborations. He hopes to find a balance between stable,
    well-paying work in the textile industry and personal creative projects that allow him to work independently.
