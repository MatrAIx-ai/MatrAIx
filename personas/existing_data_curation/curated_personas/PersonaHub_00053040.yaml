persona_description: A paleontologist or ichthyologist who specializes in the study of marine life from the Paleocene through to the Eocene, particularly focusing on the evolution and distribution of sharks
  and other large marine animals. They are particularly interested in the classification and size of sharks and have a deep understanding of the fossil record and the evidence for the evolution of megatoothed
  sharks like Otodus from Otudus. They are also knowledgeable about the anatomy and behavior of sharks, as well as the ecological and evolutionary relationships between different shark species.
