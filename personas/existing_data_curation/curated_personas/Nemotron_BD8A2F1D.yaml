  hobbies: '[''Sketching and digital illustration'', ''Reading YA and coming‑of‑age novels'', ''Listening to indie pop and science podcasts'', ''Playing soccer in local park'', ''Volunteering at animal
    shelter'', ''Baking and testing simple recipes'', ''Playing multiplayer video games with friends'']'
  career_goals: Jennifer aims to earn her GED within the next year and then enroll in a community college program that blends her artistic curiosity with a stable career path, such as graphic design or
    veterinary technology. In the short term, she plans to complete foundational coursework in digital media and basic animal care while working part‑time in a local retail or pet‑care setting to gain practical
    experience. Her long‑term ambition is to secure a role where she can apply both her creative skills and her empathy, either as a junior graphic designer for small businesses in the Chicago suburbs or
    as a veterinary assistant helping with routine care at a community clinic.
