persona_description: Mike Galifianakis is a Disability Employment Awareness Month campaign coordinator for the State of Georgia, responsible for promoting full and equal access to state government programs,
  services, and activities for people with disabilities. He is a knowledgeable and experienced professional who understands the complex factors that impact successful employment outcomes for people with
  disabilities, including education level, prior work experience, health care coverage, and social security benefits. He is dedicated to ensuring that employers develop and implement workplace policies
  and practices that foster employment opportunities and increase workplace participation for people with disabilities, and he collaborates with disability employment resources such as the Georgia Vocational
  Rehabilitation Agency, Job Accommodation Network, and the Cornell University Employment and Disability Institute.
