personas:
  professional: Rafael Olmo is a full‑stack web development specialist turned aspiring tech lead, fluent in JavaScript, Python, React, Node.js, AWS, and Docker, who weaves UI/UX design inspired by his digital
    painting hobby into agile, DevOps‑driven product strategies; they are known for mentoring junior developers and championing accessible, AI‑enhanced creative platforms.
  sports: Rafael Olmo is an avid hiker of El Yunque’s misty trails, a regular participant in a Saturday morning running club that starts at Condado Beach, and a dedicated supporter of the Cangrejeros de
    Santurce baseball team, and they often blend salsa dancing steps into their cardio warm‑ups.
  arts: Rafael Olmo immerses themselves in digital painting inspired by San Juan’s vibrant street murals, strums a classical guitar to salsa legends like Celia Cruz and contemporary bomba group Bomba Estéreo,
    frequents monthly exhibitions at the Museo de Arte de Puerto Rico, and they curate a personal playlist featuring indie folk duo Tall Tall Trees to fuel their creative sessions.
  travel: Rafael Olmo prefers a blend of cultural immersion and tech‑focused adventures, meticulously planning trips to capture sunrise over Old San Juan’s cobblestones, jet‑setting to Tokyo for developer
    conferences, and slipping away for weekend hikes in the Scottish Highlands, and they balance a modest travel budget by prioritizing authentic local cuisine over luxury hotels.
  culinary: Rafael Olmo showcases solid home‑cooking skills, mastering classic mofongo with chicharrón and ají dulce, perfecting arroz con gandules with a rich sofrito base, while they experiment with fusing
    tropical papaya into smoothies and regularly indulge in artisanal coffee at neighborhood cafés.
  core: Rafael Olmo fuses a disciplined tech career with a spontaneous artistic streak, thrives on curiosity‑driven problem solving, and they occasionally forget to water houseplants when a new coding project
    captures their attention.
background:
  cultural: Rafael was raised in a close‑knit Puerto Rican family in the Canóvanas municipality of Carolina, where Spanish and English intertwine and the rhythms of salsa, plena, and reggaetón shape daily
    life. The island’s storytelling tradition, communal celebrations like Noche de San Juan, and a strong sense of resilience have instilled in him deep respect for heritage and community. His bilingual
    fluency and familiarity with local customs enable him to navigate both the tech world and cultural spaces, and he often draws on Puerto Rican motifs, cuisine, and music in his creative projects.
