  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater performances'', ''Hiking and nature photography'', ''Community volunteering (food bank, mentorship)'', ''Gardening'',
    ''Cooking Southern-inspired dishes'', ''Reading historical biographies'', ''Digital illustration and painting'']'
  career_goals: Richard aims to transition into a senior advisory role where he can mentor emerging project managers and guide community‑focused initiatives. He envisions leveraging his project management
    experience to spearhead regional arts and cultural programs that foster social cohesion in Floyd County. Over the next five years, he aspires to become a recognized consultant for nonprofit organizations,
    helping them design and execute flexible, impact‑driven projects. He also plans to obtain a PMP certification to formalize his expertise and ultimately lead a statewide coalition that connects local
    governments, businesses, and arts groups to create sustainable community projects.
