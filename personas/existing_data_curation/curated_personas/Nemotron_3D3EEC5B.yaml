personas:
  professional: Richard Johnson, a 58-year-old project-management veteran, combines his knack for stakeholder engagement, risk mitigation, and budgeting with a relaxed, improvisational approach that lets
    him weave art-inspired creativity into construction, tech, and community-arts initiatives while they mentor junior staff.
  sports: Richard Johnson, a 58-year-old outdoor enthusiast, hikes the Appalachian foothills with the Appalachian Trail Hiking Club in spring, joins a casual community basketball league in summer, and they
    root for the West Virginia Mountaineers football and the Pittsburgh Steelers, preferring flexible, nature-based exercise over rigid gym routines.
  arts: Richard Johnson, a 58-year-old community-theater actor and digital illustrator, frequents the Appalachian Art Center's exhibitions featuring contemporary artists such as Kehinde Wiley and traditional
    Appalachian woodcarvers, while delighting in live sets by the Avett Brothers, Gillian Welch, and Old Crow Medicine Show, and they channel this inspiration into weekly Procreate sketches.
  travel: Richard Johnson, a 58-year-old lover of artistic road trips, plans his travel around spontaneous stops at historic sites in Asheville, North Carolina, music festivals in Nashville, Tennessee,
    and the culinary scene of New Orleans, while they dream of a gallery-focused pilgrimage to Florence, Italy, balancing limited retirement budget with a preference for immersive, culturally rich experiences.
  culinary: Richard Johnson, a 58-year-old home-cook with moderate skill, whips up Southern staples like shrimp and grits with miso glaze, fried chicken tossed in gochujang, collard greens sautéed with
    smoked turkey and orange zest, and heirloom tomato peach cobbler, and they love incorporating fresh garden herbs, chilies, and locally sourced honey to give classic dishes an inventive twist.
  core: Richard Johnson, a 58-year-old project-manager turned community-arts advocate, blends a laid-back, sometimes disorganized work style with relentless compassion and a worry-prone mind, and they fuel
    their days with spontaneous art, garden-grown Southern cooking, and a drive to mentor others.
background:
  cultural: Richard was born and raised in rural North Georgia, growing up in a close‑knit Southern community that emphasized hospitality, church participation, and a strong sense of local pride. His family’s
    roots trace back to early Anglo‑American settlers, with traditions that include Southern cuisine, country music, and community festivals. He attended a public high school in Cedartown and completed
    some college coursework before entering the workforce. The regional culture of mutual aid and church‑based volunteerism has shaped his compassionate outlook, while the area’s gradual shift toward new
    industries has fueled his curiosity for innovative ideas. His Southern upbringing also informs his preference for personal relationships and informal, flexible work styles.
attributes:
  skills: '[''Project planning and scheduling'', ''Risk assessment and mitigation'', ''Budget development and financial tracking'', ''Stakeholder communication and engagement'', ''Agile and hybrid project
