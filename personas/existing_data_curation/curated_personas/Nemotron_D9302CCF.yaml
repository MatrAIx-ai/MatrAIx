personas:
  professional: Elida Maseda, a seasoned front‑of‑house specialist in Chicago’s high‑energy restaurants, blends a curious willingness to test new service ideas with a practical, skeptical eye for inefficiencies,
    leveraging their bilingual fluency, cash‑handling expertise, and calm conflict resolution to mentor staff and drive smoother shifts as they pursue a supervisory role.
  sports: Elida Maseda is a devoted fan of Chicago Fire FC, joins the community center’s weekend pick‑up soccer league, attends weekly Zumba classes for cardio, and maintains a consistent morning walk routine,
    all while cheering the Chicago Bears during football season.
  arts: Elida Maseda immerses themselves in Latin dance nights, drawing inspiration from salsa icons like Celia Cruz and cumbia legends such as Los Ángeles Azules, while also enjoying Chicago theater productions
    starring Jeremy Piven and attending live music shows featuring Juanes.
  travel: Elida Maseda prefers meticulously planned weekend escapes that blend culinary discovery and cultural immersion, having explored Oaxaca’s bustling markets for authentic mole, trekked the streets
    of New Orleans for jazz and Creole cuisine, and they dream of a future road trip to Tulum’s beachfront ruins.
  culinary: Elida Maseda is an adept home‑cook who perfects tamales de elote, pozole rojo, and mezcal‑marinated carnitas using fresh chilies, corn masa, and herbs from their balcony garden, and they relish
    occasional meals at upscale Latin‑fusion bistros despite a habit of budgeting tightly.
  core: Elida Maseda balances a vibrant social energy and competitive drive with a skeptical eye, turning every shift into a hustle while secretly hoarding leftover salsa jars for midnight snacking.
background:
  cultural: Elida is a first‑generation Mexican‑American; her parents immigrated from Jalisco and instilled in her a deep appreciation for Mexican traditions, language, and cuisine. Growing up in the vibrant
    Latino community of Cicero, she celebrates Día de los Muertos, enjoys family gatherings centered around homemade tamales, and maintains strong ties to the local Catholic parish. Her cultural identity
    influences her culinary preferences, community involvement, and the bilingual communication style she brings to her workplace.
attributes:
