  hobbies: '[''Salsa and cumbia dancing'', ''Cooking traditional Mexican dishes'', ''Volunteering at community center'', ''Attending local soccer matches'', ''Gardening'', ''Reading contemporary fiction'',
    ''Participating in cultural festivals'']'
  career_goals: Elida aims to leverage her extensive front‑of‑house experience into a supervisory position within the next two years, pursuing a certification in restaurant management at a local community
    college. She is driven to become a shift leader who can streamline operations, mentor new staff, and introduce innovative service ideas rooted in her Mexican culinary heritage. Long‑term, she dreams
    of opening a small family‑run Mexican café in Cicero that blends traditional recipes with modern twists, providing a community gathering spot and creating employment opportunities for other locals.
