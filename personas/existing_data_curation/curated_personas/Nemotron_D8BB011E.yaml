  hobbies: '[''Fishing'', ''Hunting'', ''Birdwatching'', ''Woodworking'', ''Gardening'', ''Reading true crime'', ''Genealogy research'', ''Acoustic guitar'']'
  career_goals: As he approaches his early fifties, Jay aims to earn a promotion to sergeant and eventually lieutenant, positioning himself for a supervisory role that leverages his experience while allowing
    him to mentor younger officers. He also envisions transitioning to a specialized detective unit focused on cold‑case investigations, where his methodical, solitary work style can thrive. Looking beyond
    the badge, Jay plans to establish a part‑time private security consultancy after retirement, offering expertise to local businesses and community groups. Throughout these ambitions, he remains focused
    on securing a stable financial future for his family and preserving the safety and integrity of his hometown.
