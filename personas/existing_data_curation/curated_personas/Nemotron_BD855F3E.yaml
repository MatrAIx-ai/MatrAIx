personas:
  professional: Perry Kolibas, an 18‑year‑old prodigious medical trainee, merges fast‑paced emergency diagnostics with a warm, community‑focused bedside manner, using intuition to navigate acute cases while
    sometimes tripping over rigid deadlines due to a penchant for spontaneity.
  sports: Perry Kolibas, a soccer‑enthusiast who joins weekly pickup games at the Greenwood Community Center and plays on the university’s intramural league, also follows the Carolina Panthers (NFL) and
    the Charleston Battery (USL) with fervor, and hits the Sandhills trail for solo hikes each spring to balance high‑energy group sports with solitary endurance.
  arts: Perry Kolibas, an avid improv performer with the local comedy troupe “Laugh Lab,” strums acoustic renditions of John Mayer and Greek folk ballads on evenings with friends, and draws creative inspiration
    from the witty sketches of Tina Fey and the soulful poetry of Rupi Kaur, often quoting the latter in spontaneous group jams.
  travel: Perry Kolibas, who loves spontaneous road trips, has explored Asheville’s art scene, camped under the stars in the Great Smoky Mountains, and dreams of wandering the ancient streets of Athens
    during Greek Easter, while also planning a budget‑friendly backpacking stint through the Appalachian Trail’s southern terminus.
  culinary: Perry Kolibas, a self‑taught home chef, blends Southern comfort with Mediterranean flair by whipping up shrimp and grits with a dash of tzatziki, baking baklava for friends, mastering the perfect
    fried chicken brine, and proudly experimenting with oregano‑infused quinoa salads.
  core: Perry Kolibas is a hyper‑social, anxiety‑prone future physician who juggles frantic improvisation on stage with spontaneous midnight pizza orders, often losing sleep over clinic deadlines but always
    rallying friends with a guitar riff and a heartfelt laugh.
background:
  cultural: Perry grew up in Greenwood, South Carolina, within a family that blends Southern Appalachian traditions with Greek‑American heritage. His parents, both children of Greek immigrants, instilled
    values of hospitality, close‑knit community ties, and a reverence for hard work. This cultural mix is evident in his participation in church gatherings, local festivals like the Abbeville County Fair,
    and the celebration of Greek holidays such as Easter, where traditional cuisine and music play a central role. The combination of Southern community spirit and Mediterranean family customs has cultivated
    in Perry a strong sense of belonging, a respect for diverse perspectives, and an appreciation for both regional and ancestral customs.
attributes:
  skills: '["clinical assessment", "diagnostic reasoning", "basic and advanced life support", "patient communication", "team collaboration", "rapid improvisation in emergencies", "medical research fundamentals"]'
  hobbies: '["pickup soccer", "improv comedy", "guitar playing", "hiking in the Sandhills", "camping trips", "cooking for friends", "reading speculative fiction", "volunteering at local shelters"]'
  career_goals: Perry is determined to shape a medical career that blends rigorous evidence‑based practice with a deep focus on mental health and holistic wellness. Over the next five years he aims to complete
    a residency in family medicine, establish a community mental‑health outreach program in Greenwood, and eventually open a clinic that emphasizes preventive care, patient empowerment, and integrated behavioral
    health services. He also plans to contribute to research on physician burnout among adolescents, drawing from his own experiences with anxiety and emotional reactivity, and hopes to become an advocate
    for physician mental‑wellness at a national level.
