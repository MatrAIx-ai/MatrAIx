  career_goals: Victoria dreams of becoming a teacher who can inspire other kids, imagining herself leading a classroom where she can combine fun and learning. She also feels drawn to roles that involve
    helping animals, so she hopes to study veterinary science. Her long-term ambition is to make a positive difference in her community, perhaps by organizing youth programs or volunteering at the local
    animal shelter.
