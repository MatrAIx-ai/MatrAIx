  career_goals: Leveraging his blend of technical expertise and artistic sensibility, Hector aims to transition into a senior technical lead role where he can guide multidisciplinary teams in creating culturally
    resonant digital products. He aspires to launch a startup focused on interactive storytelling platforms that celebrate Mexican heritage, merging immersive technologies like AR/VR with traditional narratives.
    Over the next five years, he plans to deepen his expertise in machine learning for generative art, mentor junior developers, contribute to open‑source creative‑coding libraries, and achieve a flexible
    remote work arrangement that balances his professional ambitions with his need for focused solitary time.
