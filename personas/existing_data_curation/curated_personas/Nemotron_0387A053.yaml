personas:
  professional: Hector Estrada, a seasoned full‑stack software developer, weaves together Python, JavaScript, and C++ expertise with a humanities‑informed eye for visual storytelling, leading cross‑functional
    teams to craft scalable web platforms and immersive interactive experiences; their methodical planning and love for abstract concepts drive them toward a senior technical lead role where they mentor
    junior engineers and launch a startup that blends AR/VR storytelling with culturally resonant narratives.
  sports: Hector Estrada regularly hikes the Sandia Mountains, logging weekend summit attempts with a local trail club, and follows New Mexico United in the USL Championship while keeping a season ticket
    for the Denver Broncos; they also coach a community coding‑and‑fitness workshop that blends brief cardio intervals with algorithm challenges.
  arts: Hector Estrada channels an abstract aesthetic into oil and acrylic canvases inspired by muralist techniques, showcases experimental code art built with p5.js at the local gallery, and practices
    classical guitar—repertoire ranging from traditional folk ballads sung in Spanish to contemporary fingerstyle pieces by Andrés Segovia; their reading list includes speculative fiction authors like Ted
    Chiang and philosophical works by Merleau‑Ponty, all of which inform a unique visual narrative style.
  travel: Hector Estrada favors thoughtfully planned trips that blend solo reflection with cultural immersion, having trekked the high desert of Arizona, explored the historic adobe streets of Santa Fe,
    and photographed the lantern‑lit alleys of Oaxaca; future itineraries include a photography retreat in the Atacama Desert and a tech‑art residency in Kyoto, balancing limited family commitments with
    a modest travel budget.
  culinary: Hector Estrada enjoys cooking dishes that echo the flavors of the borderlands, such as slow‑cooked mole poblano, hand‑rolled tamales with masa and pork, and grilled corn topped with cotija cheese
    and chili powder; they rate themselves a competent home chef, often sourcing fresh chilies and heirloom corn, yet they admit to over‑seasoning their sauces when experimenting late at night.
  core: Hector Estrada is a methodical full‑stack developer who paints abstract canvases, strums classical guitar, hikes solitary peaks, and obsessively tracks finances—balancing disciplined routines with
    spontaneous bursts of creative indulgence.
background:
  cultural: Hector was born to first‑generation Mexican immigrants in Albuquerque and grew up immersed in both Mexican and American cultures. Fluent in Spanish and English, he maintains strong ties to his
    heritage through family traditions, such as celebrating Día de los Muertos, cooking regional dishes from Oaxaca and Puebla, and listening to ranchera and mariachi music. The vibrant visual language
    of Mexican muralists and folk art informs his aesthetic sensibility, while the values of community, resilience, and respect for storytelling guide his personal and professional interactions. Living
    in Edgewood, New Mexico, he balances the desert’s quiet solitude with a close‑knit Latino community, allowing him to incorporate cultural motifs into his software projects and artistic endeavors.
