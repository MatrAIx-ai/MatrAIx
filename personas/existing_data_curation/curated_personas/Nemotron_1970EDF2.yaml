personas:
  professional: Shannan Stewart is a community‑focused handyman‑mentor who leverages their practical carpentry, gardening, and vehicle troubleshooting skills together with empathic listening and conflict
    mediation to provide reliable home‑maintenance services while mentoring local youth and pursuing a part‑time volunteer coordinator role at the senior center.
  sports: Shannan Stewart stays active by hiking the nearby mountain trails year‑round, fishing the Colorado River in spring and summer, playing in the local adult recreational softball league, and cheering
    on the Denver Broncos on football Sundays while following the Colorado Rockies during baseball season.
  arts: Shannan Stewart enjoys attending the Delta rodeo’s live country music stage featuring artists like John Denver and Tanya Tucker, explores historic photography exhibitions at the local museum, and
    finds inspiration for woodworking projects in the rustic paintings of Andrew Wyeth, while occasionally quoting lines from classic Western films starring John Wayne during community gatherings.
  travel: Shannan Stewart prefers low‑key road trips that blend outdoor adventure with family time, having already explored the Grand Canyon, Zion National Park, and a weekend getaway to Santa Fe for its
    art markets, while dreaming of a cross‑country drive to Oregon’s coast and a future visit to the historic vineyards of Napa Valley once the home‑based landscaping business steadies financially.
  culinary: Shannan Stewart relishes cooking fresh river trout seasoned with lemon, dill, and garlic, paired with garden‑grown heirloom tomatoes, roasted corn, and a side of quinoa salad tossed with cilantro
    and lime, while their go‑to comfort dish is a hearty vegetable stew peppered with rosemary and a dash of smoked paprika.
  core: Shannan Stewart blends hands‑on practicality with genuine compassion, turning every garden harvest, woodworking project, and community clean‑up into a quiet testament to low‑stress stewardship,
    even if they occasionally forget to water the indoor plants on rainy days.
background:
  cultural: Shannan grew up in the rural western part of Colorado, in a family with European ancestry that includes German and Irish roots. The community’s emphasis on self‑reliance, neighborly cooperation,
    and a close connection to the land has deeply influenced his values. While not strongly religious, he respects the local traditions and often participates in community gatherings that celebrate the
    region’s heritage. His cultural identity reflects the broader American Western ethos of practicality, modesty, and strong community ties.
attributes:
  skills: '["Basic carpentry", "Home maintenance and repairs", "Vegetable gardening", "Automotive troubleshooting", "First aid and CPR", "Conflict mediation", "Active listening and counseling", "Volunteer
