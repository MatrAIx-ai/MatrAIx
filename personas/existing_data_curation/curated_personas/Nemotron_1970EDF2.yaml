  hobbies: '["Hiking and nature walks", "Fishing in the Colorado River", "Vegetable gardening", "Woodworking", "Volunteer work at the food pantry", "Reading historical nonfiction", "DIY home improvement
    projects", "Attending local community events"]'
  career_goals: Shannan aims to channel his practical abilities and caring nature into a part‑time role that serves the Delta community, such as a volunteer coordinator at the senior center or a handyman‑service
    provider who also mentors local youth. He plans to complete his GED and pursue certifications in first‑aid response and small‑business management. In the longer term, he aspires to launch a modest home‑based
    landscaping and maintenance business that offers reliable services while fostering community connections. His overarching ambition is to become a dependable pillar for his family and neighbors while
    maintaining a balanced, low‑stress lifestyle.
