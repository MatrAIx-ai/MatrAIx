  career_goals: Denise aims to combine her love of art, technology, and community engagement into a future career as a multimedia storyteller or interactive media designer. She plans to attend a high school
    with a strong arts‑tech program, earn a scholarship through competitive robotics or visual arts contests, and eventually pursue a degree in visual communication or digital media. Her long‑term ambition
    is to create inclusive digital experiences that celebrate cultural diversity and to lead collaborative creative projects that inspire peers.
