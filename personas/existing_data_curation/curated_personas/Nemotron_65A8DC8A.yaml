  hobbies: '[''Reading (non-fiction)'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening'', ''Fishing'', ''Woodworking'', ''Cooking (precision recipes)'', ''Model building'', ''Small‑group volunteering
    at community health fairs'']'
  career_goals: John aims to transition from staff nurse to charge nurse within the next two years, leveraging his organizational strengths to oversee unit operations. He plans to enroll in an RN‑to‑BSN
    program to broaden his clinical knowledge and eventually pursue a Nurse Manager position or a clinical educator role where he can mentor new nurses. Additionally, he seeks specialty certification in
    wound care or case management to deepen his expertise and contribute to evidence‑based practice improvements within his facility.
