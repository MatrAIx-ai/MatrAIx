  career_goals: Justin aims to move into a senior leadership role—such as Director of Operations—within the next five years, focusing on enterprise‑wide efficiency initiatives, lean manufacturing, and digital
    transformation. He plans to earn a professional certification in supply chain management to deepen his expertise. Additionally, he wants to mentor emerging managers, spearhead community outreach programs
    that align his company's resources with local economic development, and maintain a balanced lifestyle that allows more quality time with his family.
