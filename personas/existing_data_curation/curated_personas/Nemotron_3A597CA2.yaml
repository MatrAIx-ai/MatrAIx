  career_goals: Now retired, Angela aims to mentor younger security personnel through informal workshops, share her extensive surveillance experience with the local police department, and contribute to
    community safety initiatives in Carroll County. She hopes to document her career in a memoir that highlights the evolution of casino security and to remain an active, engaged member of her church and
    senior-center volunteer groups.
