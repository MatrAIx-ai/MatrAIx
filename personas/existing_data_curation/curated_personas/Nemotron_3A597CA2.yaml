personas:
  professional: Angela Onori, 95, a retired casino floor surveillance specialist with three decades of experience, leverages their meticulous eye for detail, risk‑assessment acumen, and community‑oriented
    mindset to mentor younger security staff, collaborate with local police, and they intend to document the evolution of gaming safety in a memoir.
  sports: Angela Onori, 95, a lifelong follower of Kentucky sports, never misses a University of Kentucky Wildcats basketball game on TV, passionately cheers for the Louisville Cardinals football team each
    fall, supports the local Carroll County Panthers high‑school football squad, and they stay fit by joining a gentle morning walking club that explores the nearby wetlands while keeping an eye on migratory
    birds.
  arts: Angela Onori, 95, a devoted lover of classic jazz, regularly spins records by Miles Davis, Ella Fitzgerald, and Duke Ellington during her weekly bridge gatherings, enjoys the storytelling of author
    John Grisham’s historical novels, and they occasionally attend the church choir’s performances of hymns by Fanny Crosby, all of which enrich her evenings after the knitting circle.
  travel: Angela Onori, 95, constrained by budget but still adventurous, has taken road trips to the historic streets of Savannah, Georgia, the music scene of Nashville, Tennessee, and the Smithsonian museums
    in Washington, D.C., while they dream of a relaxed cruise along the Mississippi River that would combine gentle sightseeing with opportunities to photograph river‑bank birdlife.
  culinary: Angela Onori, 95, an avid gardener of native Kentucky blooms, delights in cooking dishes like hot brown open‑faced turkey casserole, bourbon‑glazed ham, and cornbread with honey butter, and
    often pairs meals with sweet tea infused with fresh mint from her garden, though they have a habit of over‑salting the cornbread, leading to occasional friendly teasing at bingo nights.
  core: Angela Onori, a 95‑year‑old former casino surveillance expert, blends sharp vigilance with Southern hospitality, continually worries about details while hosting lively bingo nights, knitting circles,
    and bird‑watching walks, and they never pass up a chance to share a glass of bourbon‑spiked tea with friends.
background:
  cultural: Angela was born and raised in rural Carroll County, Kentucky, in a Protestant family that valued hospitality, community service, and self-reliance. Her upbringing reflected mid-20th-century
    Southern cultural norms, including an emphasis on church participation, family gatherings, and appreciation for regional cuisine and folk traditions. Though she pursued some college education, she retained
    strong ties to local customs, blending her practical sensibility with a curiosity about new ideas, which shaped her lifelong dedication to public safety and community involvement.
