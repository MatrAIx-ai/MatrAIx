  hobbies: '[''abstract painting'', ''generative art coding'', ''speculative fiction reading'', ''logic puzzles (e.g., Sudoku, chess)'', ''photography of urban environments'', ''curating music playlists'',
    ''mentoring younger students in STEM'']'
  career_goals: Christina aims to attend a top liberal arts university to study interdisciplinary media arts and computer science. She aspires to become a creative technologist, designing immersive interactive
    experiences that blend art, narrative, and technology. She intends to build a portfolio of award-winning digital artwork, win national art competitions, and eventually launch a boutique design studio.
    In the short term, she plans to secure a scholarship for a summer residency at a renowned art institute and take AP courses in art and computer science.
