  hobbies: '["Reading non‑fiction (engineering, history, nature)", "Scale model building (aircraft, cars)", "Basic Python programming projects", "Puzzle solving (Sudoku, jigsaw)", "Playing piano", "Fishing
    at local lakes", "Solo trail running"]'
  career_goals: Charles aspires to a career that combines his love for practical problem solving with a structured environment. He aims to earn a scholarship to a technical college where he can pursue a
    degree in mechanical engineering or an apprenticeship in automotive technology. His long‑term ambition is to work as a design engineer or a skilled technician in an industry that values reliability
    and routine, such as manufacturing or aerospace. He also envisions possibly starting a small, locally‑focused service—like a repair shop or a custom woodworking business—once he has secured the necessary
    credentials.
