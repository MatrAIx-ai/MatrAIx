personas:
  professional: A budding mechanical engineer with a knack for precision, Charles King spends his free hours building intricate aircraft and automobile kits, coding Python scripts for automation, and applying
    their organized, routine‑driven mindset to every DIY project, positioning themselves as a methodical problem‑solver even at age 14.
  sports: A disciplined runner and avid fisherman, Charles King competes on their Lakeview High School cross‑country team, follows the Detroit Lions and Detroit Tigers for seasonal thrills, and is an active
    member of the Mid‑Michigan Youth Fishing Club, channeling their love for quiet, structured exercise into early‑morning trail runs and weekend lake outings.
  arts: An introverted piano enthusiast, Charles King routinely practices works by Beethoven and Mozart, while their evenings are often spent admiring the cinematic scores of Hans Zimmer and the intricate
    model displays at the local museum of natural history, which together feed their appreciation for disciplined artistic expression.
  travel: Preferring meticulously planned excursions, Charles King has already logged family trips to Yellowstone National Park’s geothermal wonders and a cultural tour of Washington, D.C.’s Smithsonian
    museums, and they dream of a solo backpacking adventure through the Canadian Rockies, all organized with detailed itineraries and a strict budget.
  culinary: A modest home‑chef, Charles King favors simple yet precise dishes like spaghetti aglio‑olio with freshly minced garlic and basil, enjoys cooking pan‑seared trout seasoned with lemon and dill
    after their fishing outings, and frequently snacks on trail‑mix containing almonds, dried cranberries, and dark chocolate pieces.
  core: Charles King blends an obsessive love for order with solitary hobbies—from building model aircraft to solving puzzles—while occasionally indulging in spontaneous model‑kit splurges and battling
    a habit of staying up late perfecting piano scales.
background:
  cultural: Charles comes from a typical Midwestern white American background in Portage, Michigan. His family emphasizes practicality, hard work, and community involvement rooted in the region's agricultural
    and manufacturing heritage. Growing up in a small‑town environment, he has been influenced by the strong work ethic and values of reliability and modesty common in the area. While he respects local
    traditions such as community fairs and church gatherings, his personal preferences lean toward quieter, more individual pursuits. The steady, routine‑oriented lifestyle of the Midwest aligns closely
    with his own desire for structure and dependable progress.
attributes:
  skills: '["Mathematics problem solving", "Basic programming (Python)", "Mechanical aptitude (model building and tool use)", "Organizational planning and scheduling", "Research and information gathering",
