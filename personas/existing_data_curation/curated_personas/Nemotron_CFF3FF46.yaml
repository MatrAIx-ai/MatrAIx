  hobbies: '[''watercolor painting'', ''Duplo and magnetic tile building'', ''listening to classical music'', ''dancing'', ''reading picture books about space and animals'', ''exploring backyard nature'',
    ''pretend play as artist or scientist'', ''solving jigsaw puzzles'']'
  career_goals: Even at four, Hina imagines becoming a creator who blends art and design. She dreams of being an architect who designs colorful buildings or an illustrator whose drawings come to life. She
    wants to be the best at drawing and building, hoping to win art contests and building competitions at school. She also expresses a budding interest in science, picturing herself as a young scientist
    discovering how things work, driven by her organized approach and love for achievement.
