personas:
  professional: A miniature architect, Hina Capobianco, at age four meticulously designs elaborate block towers, channeling their vivid imagination and hyper‑organized nature into creating balanced structures
    while fiercely competing with peers to set the highest tower record, and they take pride in meeting self‑imposed perfection standards.
  sports: A budding athlete, Hina Capobianco, at four enthusiastically attends the Little Lions Soccer Club’s Tuesday drills and the Tiny Tumble Gymnastics sessions on Saturdays, idolizes the local youth
    soccer team the City Sprinters, and they thrive on the rigid practice schedules while fiercely trying to out‑perform their teammates.
  arts: An imaginative mini‑artist, Hina Capobianco, at four spends afternoons drawing abstract shapes inspired by author Seuss’s whimsical worlds and replaying The Wiggles’ catchy songs while proudly displaying
    a crayon‑filled “Mona Lisa” on the fridge, and they meticulously organize their art supplies by color, treating each session as a personal exhibition.
  travel: A curious explorer, Hina Capobianco, at four eagerly reminisces about the family trip to the aquarium in Monterey, the magical day at Disneyland, and the weekend stay at Grandma’s countryside
    cottage, and they meticulously pack a tiny backpack with snacks and a ‘travel checklist’ to ease their worry about unfamiliar settings while dreaming of a future adventure to Paris’s Eiffel Tower.
  culinary: A tidy little foodie, Hina Capobianco, at four prefers neatly plated mac and cheese with a side of carrot sticks, savors strawberry‑banana smoothies, insists on arranging their fruit slices
    in perfect rows, and they proudly stir batter for pancake mornings while occasionally whining when the sauce splatters their shirt.
  core: Four‑year‑old Hina Capobianco blends vivid imagination with a hyper‑organized, competitively driven streak, yet they often battle worry and a guilty habit of over‑packing their tiny backpack with
    crayons and spare change.
background:
  cultural: Hina’s family is of Italian descent, reflected in the surname Capobianco, but they have lived in Texas for generations. She grows up in Cedar Creek, a small community in Travis County, where
    she attends a local preschool and participates in community events. The household celebrates both Italian traditions—such as cooking pasta and marking Ferragosto—and American holidays like Thanksgiving
    and the Fourth of July. At home she hears occasional Italian phrases alongside English, and enjoys multicultural music and stories.
attributes:
  skills: '[''early literacy (recognizing letters and phonics)'', ''drawing and coloring with attention to detail'', ''assembling puzzles and building blocks'', ''organizing toys and play space'', ''following
