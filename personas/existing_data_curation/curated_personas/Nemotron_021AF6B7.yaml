personas:
  professional: Jeffrey Keomany, a two‑year‑old budding problem‑solver who discovers the world through building blocks and shape‑sorting toys, balances a natural curiosity with a practical, trial‑and‑error
    approach, yet they resist tidy‑up time, turning it into a daily negotiation.
  sports: Jeffrey Keomany, a two‑year‑old who delights in the toddler soccer circle at the neighborhood community center and cheers on the local minor‑league baseball team, the Springfield Sluggers, while
    they prefer solitary sandbox play over crowded playgrounds.
  arts: Jeffrey Keomany, a two‑year‑old who sings 'Twinkle, Twinkle, Little Star' in a squeaky voice, imitates the animated performances of Sesame Street's Elmo, and loves doodling bright crayon circles
    after watching videos of musician Laurie Berkner, they use art as a quiet outlet for their reserved temperament.
  travel: Jeffrey Keomany, a two‑year‑old who enjoys short family road trips to the nearby zoo and weekend beach outings in Santa Monica, prefers the comfort of their stroller and familiar routines, yet
    they show a spontaneous curiosity for new sights, especially when parents plan trips to Disney World.
  culinary: Jeffrey Keomany, a two‑year‑old who adores cheesy macaroni, chicken nuggets, and soft banana slices, insists on eating with their tiny fork, occasionally helps stir pancake batter, and they
    have a pronounced preference for sweet over bitter flavors, often demanding extra ketchup on their meals.
  core: Jeffrey Keomany is a curious yet cautious two‑year‑old who darts between spontaneous play and wary moments, they hoard snack crumbs while fretting over the loss of a favorite toy.
background:
