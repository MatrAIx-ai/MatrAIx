personas:
  professional: Magdalena Menendez, a 16‑year‑old aspiring nursing aide, channels her bilingual fluency, organizational talent, and confident public speaking into leading the school health club and coordinating
    community wellness events, all while applying her practical, schedule‑driven mindset and competitive edge to meet each deadline.
  sports: Magdalena Menendez plays forward for the New Bedford Youth Soccer Club, follows the Boston Red Sox and New England Patriots avidly, and incorporates early morning beach runs into her routine,
    using her competitive nature to set personal fitness benchmarks each season.
  arts: Magdalena Menendez curates playlists that blend Bad Bunny, Marc Anthony, and classic salsa icons, reads graphic novels like ‘Saga’ and watches films by Pedro Almodóvar, letting the rhythm of music
    and visual storytelling fuel her salsa and reggaetón dance nights at community festivals.
  travel: Magdalena Menendez prefers well‑planned weekend trips, having explored the historic streets of Old San Juan with her family and dreaming of a summer backpacking adventure along Costa Rica’s Pacific
    coast, all while balancing a teen budget and her academic commitments.
  culinary: Magdalena Menendez is a confident home chef who perfects arroz con gandules and pasteles seasoned with sofrito and adobo, while also experimenting with avocado toast and mango‑lime smoothies,
    often hosting potluck evenings where friends swap recipes and stories.
  core: Magdalena Menendez is a 16‑year‑old bilingual go‑getter who marries a strict schedule with a love for salsa beats, competitive soccer, and a guilty habit of binge‑watching Netflix late into the
    night despite early practice calls.
background:
  cultural: Magdalena grew up in a close‑knit Puerto Rican family in New Bedford, Massachusetts. She was raised bilingual, speaking Spanish at home and English at school, and participates in community traditions
    such as Three Kings Day celebrations, local parrandas, and church gatherings. Her family maintains strong ties to the Puerto Rican diaspora in the city, often sharing cultural foods, music, and stories,
    which have shaped her identity and sense of belonging within a diverse, multicultural environment.
