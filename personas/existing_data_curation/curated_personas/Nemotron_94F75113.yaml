  hobbies: '["Soccer", "Salsa and reggaeton dancing", "Cooking Puerto Rican cuisine", "Attending cultural festivals", "Volunteering at community center", "Creating music playlists", "Watching movies", "Reading
    graphic novels", "Beach outings"]'
  career_goals: Magdalena aims to graduate high school and enroll in a community college program focused on nursing or public health. In the short term she plans to earn a Certified Nursing Assistant (CNA)
    credential to gain hands‑on experience. Her long‑term ambition is to become a registered nurse serving underserved neighborhoods in New Bedford, while also developing a youth mentorship program that
    connects Puerto Rican adolescents with community resources and cultural activities.
