  hobbies: '["road trips to state parks", "dance classes", "volunteering at food bank", "community theatre", "city festivals (Winter Carnival)", "Zumba group fitness", "self-help reading", "potluck hosting",
    "journaling", "guided meditation"]'
  career_goals: She hopes to move into a supervisory position within a regional sales team, obtain a certification in sales management, and eventually open her own community‑focused market stall that showcases
    local crafts while providing job training for other women. Sheri also wants to improve her organizational skills to meet deadlines more reliably, and to become a mentor for new sales representatives.
