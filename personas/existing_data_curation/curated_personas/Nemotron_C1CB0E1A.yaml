personas:
  professional: Sheri Swiney, a 36-year-old sales specialist, excels at rapid rapport building and persuasive product pitching, dynamically tailoring sales narratives for diverse neighborhoods, skillfully
    handling cash and inventory with mobile POS, and now channels their compassionate, spontaneous energy toward earning a sales-management certification and stepping into a regional supervisory role while
    envisaging a community market stall that trains fellow women.
  sports: Sheri Swiney stays active through Zumba classes at the St. Paul Community Center, cheers for the Minnesota Vikings, Twins, and Timberwolves on game days, joins the Twin Cities Running Club for
    weekend jogs, and occasionally plays in a local amateur volleyball league, balancing their love of group fitness with a spontaneous spirit.
  arts: Sheri Swiney immerses themselves in the arts by attending community theatre productions of 'Our Town' at the St. Paul Civic Theatre, dancing to choreographies inspired by Martha Graham in local
    classes, and listening to playlists that feature Lin-Manuel Miranda, Nina Simone, and emerging Minnesota folk singer Sara Groves, letting those creative currents shape both their social gatherings and
    sales storytelling.
  travel: Sheri Swiney favors impromptu weekend road trips to Minnesota gems such as Itasca State Park, the Boundary Waters Canoe Area and Lake Bemidji, while also dreaming of a spring escape to Kyoto’s
    cherry-blossom festivals and a summer trek through the Canadian Rockies, planning each getaway on a whim with a trusty GPS app and modest travel budget.
  culinary: Sheri Swiney, a confident home-cook, loves crafting comfort dishes like wild-rice casserole with fresh blueberries, roasted heirloom tomatoes tossed with basil, and a seasonal lutefisk-and-potato
    bake, often sharing these at potluck gatherings while pairing meals with locally sourced honey and a splash of craft cider, reflecting their spontaneous yet community-focused palate.
  core: Sheri Swiney blends an infectious, spontaneous charm with a practical sales mind, yet their habit of last-minute planning often spills into missed deadlines and occasional overspending, while their
    relentless worry fuels both meticulous journaling and a compassionate drive to uplift fellow women.
background:
  cultural: Sheri grew up in the Twin Cities suburbs, immersed in a Midwestern, predominantly white community with strong Lutheran and Norwegian‑Finnish heritage influences. The regional ethos of “Minnesota
    nice”—politeness, community support, and modesty—shapes her compassionate and cooperative outlook. Local festivals, outdoor recreation, and a self‑reliant work ethic are integral to her identity, while
    living in a diverse urban‑suburban environment has broadened her appreciation for multicultural customers she meets on the job.
attributes:
  skills: '["door-to-door sales", "rapport building", "persuasive pitching", "cash handling", "inventory tracking", "conflict de-escalation", "empathetic communication", "mobile POS operation", "route planning",
