persona_description: A designer who is passionate about creating innovative solutions to address environmental issues, particularly air pollution. Daan Roosegaarde is a Dutch designer who has developed
  the Smog Free project, an electronic vacuum cleaner that can potentially eliminate urban smog. He is currently in talks with the mayor of Beijing to put the machine in a city park to give city dwellers
  fresh air. Roosegaarde's project is inspired by Beijing's severe air pollution, and he hopes to have the system running by 2016. He is a highly innovative and creative designer who is committed to improving
  the quality of life for local residents.
