  career_goals: Michelle’s immediate goal is to obtain her Certified Financial Planner (CFP) designation so she can launch a part‑time advisory practice serving local small businesses and retirees, allowing
    her to work independently in a quiet setting. Over the next five years she aims to transition into a senior executive role—such as CFO or Director of Finance—within the regional health system or municipal
    government, where she can shape fiscally responsible community initiatives. She is also committed to knowledge transfer, planning to formalize a mentorship program for emerging finance professionals
    in her current organization and to volunteer as a financial‑literacy instructor at the nearby community college. These ambitions reflect her blend of curiosity for new challenges and a pragmatic approach
    to measurable impact.
