  hobbies: '["Visiting Art Galleries and Museums", "Exploring Street Art Murals in Downtown LA", "Sketching and Watercolor Painting", "Puzzle Solving (Sudoku, Logic Grids)", "Strategy Board Games (Settlers
    of Catan, Ticket to Ride)", "Hiking (Runyon Canyon, Griffith Park)", "Yoga and Meditation", "Cooking Mexican Dishes with Contemporary Twists", "Hosting Small Dinner Gatherings", "Attending Data Science
    Meetups and Hackathons", "Listening to Indie and Latin Jazz Concerts", "Reading Scientific Journals and Philosophical Essays"]'
  career_goals: Maria aims to become a senior leader in operations research within the next five years, directing a cross‑functional analytics team that tackles large‑scale supply‑chain and sustainability
    challenges for a tech‑driven company. She plans to augment her STEM bachelor's with a specialized master's in operations research or an MBA focused on data‑driven strategy, positioning herself for a
    future role as Director of Optimization and Strategy. Maria is driven to publish case studies at industry conferences, develop patented optimization algorithms, and mentor junior analysts, establishing
    a reputation as a top‑performing, innovative strategist while securing a stable and prosperous future for her family.
