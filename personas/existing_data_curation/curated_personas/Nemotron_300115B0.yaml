personas:
  professional: Maria Celis, a 25‑year‑old operations‑research analyst in Los Angeles, fuses their methodical, data‑driven discipline with a curious artistic eye to build deterministic and stochastic optimization
    models—leveraging Python, R, and Tableau—to streamline supply‑chain logistics for tech firms while championing data storytelling that earns senior leadership’s trust.
  sports: Maria Celis hikes Runyon Canyon and Griffith Park every Saturday, practices yoga at a downtown studio, follows the Los Angeles Lakers and LA Galaxy avidly, and participates in a local amateur
    running club that meets for weekly 5K runs, balancing their competitive board‑game mindset with a love for outdoor endurance challenges.
  arts: Maria Celis immerses themselves in LACMA’s modern art exhibitions, studies street‑art murals by local collectives, sketches in a weathered notebook while listening to indie‑rock group Alt‑J and
    folk‑pop singer Phoebe Bridgers, and channels that inspiration into occasional watercolor landscapes that adorn their apartment walls.
  travel: Maria Celis favors curated weekend road trips, having explored the vineyards of Napa Valley, hiked the waterfalls of Columbia River Gorge, and plans a dream culinary tour of Oaxaca to study traditional
    mole, while balancing the cost of travel with a modest travel fund they top up from freelance data‑visualization gigs.
  culinary: Maria Celis delights in modern twists on classic Mexican dishes—crafting tacos al pastor with pineapple‑infused carnitas, layering mole negro over quinoa‑stuffed poblano peppers, and perfecting
    guacamole seasoned with toasted pepitas—while hosting intimate dinner parties where they pair each course with a carefully selected California Pinot Noir.
  core: Maria Celis blends rigorous analytical precision with a spontaneous artistic flair, constantly juggling optimization models, watercolor brushes, and late‑night board‑games while they chase the next
    culinary experiment.
background:
  cultural: Maria is a second‑generation Mexican‑American raised in a bilingual household where Spanish and English intertwine daily. Family traditions—celebrating Día de los Muertos, enjoying homemade
    tamales, and gathering for Sunday mole—anchor her cultural identity. She carries forward the Mexican values of close‑knit family ties, hospitality, and reverence for artistic expression, evident in
    her love for vibrant murals and folk music. Living in Los Angeles, she navigates a multicultural landscape, blending her heritage with the city’s diverse influences, which enriches her perspective on
    both personal and professional challenges.
attributes:
  skills: '["Mathematical Modeling", "Linear Programming", "Integer Programming", "Stochastic Optimization", "Statistical Analysis", "Python Programming", "R Programming", "SQL Database Management", "Data
