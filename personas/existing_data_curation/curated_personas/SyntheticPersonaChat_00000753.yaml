  Best Generated Conversation: 'User 1: Hey! What do you do for fun?

    User 2: I like to work out at the gym to Christian electronic dance music and make cellphone apps that would help heal our world.

    User 1: That sounds cool! I like to swim and exercise everyday.

    User 2: That''s great! I wish I could swim. I''m afraid of water.

    User 1: What''s your favorite thing to do at the gym?

    User 2: I like to do strength training and cardio.

    User 1: Me too! I like to run on the treadmill and lift weights.

    User 2: I also like to do yoga. It''s really good for my mind and body.

    User 1: I''ve never tried yoga. I''m not very flexible.

    User 2: You should try it! It''s really relaxing.

    User 1: I''ll give it a try.

    User 2: You won''t regret it.

    User 1: So, what else do you like to do?

    User 2: I like to spend time with my friends and family. I also like to go to church.

    User 1: That sounds nice. I like to spend time with my family and friends too. I also like to go to the movies.

    User 2: I love going to the movies! What''s your favorite movie of all time?

    User 1: That''s a tough question. I have a lot of favorite movies. But I think my favorite movie of all time is The Shawshank Redemption.

    User 2: That''s a great movie! I love Morgan Freeman''s performance in it.

    User 1: Me too! He''s such a great actor.

    User 2: So, what are you up to this weekend?

    User 1: I''m not sure yet. I might go to the movies or hang out with my friends.

    User 2: That sounds like fun. I''m going to be working on my cellphone app.

    User 1: Oh, that sounds interesting. What''s your app about?

    User 2: It''s an app that helps people find resources for the poor.

    User 1: That''s a great idea! I''m sure it will be a lot of help to people.

    User 2: I hope so. I''m really excited about it.

    User 1: I''m sure it will be great.'
