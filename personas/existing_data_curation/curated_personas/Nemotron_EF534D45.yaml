  hobbies: '[''Recreational basketball'', ''Live music concerts'', ''Community volunteering'', ''Youth mentorship'', ''Hiking in New England'', ''Cooking'', ''Following Boston sports'', ''Home brewing (occasionally)'']'
  career_goals: Keith aims to transition into a supervisory or team‑lead role within his call center, leveraging his organizational strengths to improve workflow and service quality. He plans to obtain
    a GED and pursue certifications such as the Certified Customer Service Professional (CCSP) to bolster his credentials. Over the next five years, he hopes to become a Customer Experience Manager, overseeing
    multiple teams and shaping service strategies. Eventually, he envisions launching a small consulting firm that helps local businesses refine their customer support processes.
