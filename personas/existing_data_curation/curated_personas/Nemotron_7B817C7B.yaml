  career_goals: Although retired, Eloy aims to deepen his engagement with the local arts scene by curating small exhibitions at the Shippensburg Community Center and volunteering as a docent at the regional
    history museum. He plans to write a memoir that weaves together family stories, local history, and reflections on art. Additionally, he hopes to mentor youth through a partnership with the high school’s
    art program, encouraging creative thinking and community service.
