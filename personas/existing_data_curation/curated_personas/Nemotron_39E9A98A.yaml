  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Photography'', ''Reading (science fiction, art history)'', ''Cooking Mexican cuisine'', ''Gardening'', ''Yoga'', ''Community volunteering
    (coding workshops)'', ''Attending local art exhibitions'', ''Spanish cultural festivals'']'
  career_goals: Maria aims to transition from her current cashier role into a position that leverages her STEM background and growing interest in data‑driven decision making. She plans to earn a certification
    in data analytics and enhance her Python and SQL skills to qualify for a junior data analyst or business intelligence role within a retail or tech firm. Simultaneously, she is exploring user‑experience
    design, hoping to combine her analytical mindset with her artistic talents. Over the next five years, Maria envisions securing a full‑time analytical or UX position that offers career growth, work‑life
    balance, and the opportunity to mentor other women and members of the Mexican‑American community in STEM fields.
