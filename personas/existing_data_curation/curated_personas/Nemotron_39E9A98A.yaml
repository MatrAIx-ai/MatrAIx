personas:
  professional: Maria Baldeon, a diligent cashier with strong analytical instincts, leverages her fluency in Spanish and English, precise inventory management, and budding data analytics skills to bridge
    retail operations and data‑driven decision making, while quietly championing inclusive workplace practices.
  sports: Maria Baldeon enjoys low‑impact fitness, attending a Saturday morning yoga class at a local community center, walking the scenic trails along the Potomac, and cheering for the Washington Capitals
    during hockey season while occasionally joining a co‑ed recreational soccer league.
  arts: Maria Baldeon spends evenings painting watercolors inspired by folk motifs, crafting digital illustrations reminiscent of Diego Rivera’s murals, and photographing everyday scenes in Clarksburg,
    drawing creative fuel from the sci‑fi novels of Octavia Butler and the art‑history books of the Renaissance.
  travel: Maria Baldeon favors thoughtfully planned trips, having explored the historic streets of Seville, Spain, and the vibrant markets of Marrakech, while dreaming of a road‑trip along the Pacific Coast
    to capture sunrise vistas for their photography project.
  culinary: Maria Baldeon loves cooking, expertly preparing tamales, chilaquiles, and mole with family‑passed recipes, experimenting with fusion twists like quinoa‑filled enchiladas, and savoring fresh
    cilantro, roasted corn, and chipotle in their weekly meals.
  core: Maria Baldeon blends analytical rigor with artistic soul, balancing disciplined budgeting and health monitoring with a quiet love for watercolor, yoga, and mentoring women in STEM, though they sometimes
    procrastinate on certification courses.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish was spoken daily and Mexican traditions were celebrated. She honors holidays such as Día de los
    Muertos and Mexican Independence Day, prepares family recipes passed down through generations, and draws artistic inspiration from Mexican muralists and folk art. Living in Montgomery County, she integrates
    her heritage with the region’s multicultural environment, participating in local Latino community events, supporting Mexican cultural associations, and maintaining strong ties with extended family both
    in the United States and Mexico.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Inventory management'', ''Basic bookkeeping'', ''Data analysis (Excel, Python)'', ''Problem solving'', ''Technical troubleshooting'',
