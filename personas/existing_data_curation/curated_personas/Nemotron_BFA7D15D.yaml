  hobbies: '["Sketching local scenes", "Reflective journaling", "Reading graphic novels", "Indie acoustic music listening", "Photography", "Book club participation", "Mindfulness meditation"]'
  career_goals: Katherine aims to complete her high school equivalency and enroll in a community college art program to build a professional portfolio. She aspires to become a freelance illustrator or visual
    storyteller, creating artwork that resonates with young people dealing with anxiety and stress. In the long term, she hopes to curate local art exhibitions in Sanford, showcasing emerging talent and
    fostering community connection, while also integrating mental‑health advocacy into her creative work.
