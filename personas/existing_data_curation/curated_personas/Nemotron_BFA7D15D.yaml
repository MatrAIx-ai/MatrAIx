personas:
  professional: Katherine Sager, an aspiring visual storyteller and freelance illustrator, blends their meticulous charcoal sketches of RiverWalk architecture with digital Procreate illustrations to craft
    soothing narratives for anxious teens, while coordinating peer feedback sessions at their high school art club.
  sports: Katherine Sager enjoys casual weekend runs with the Sanford Riverwalk Runners Club, follows the Carolina Panthers and Charlotte Hornets on TV, and occasionally plays pick‑up soccer at the local
    community center, though they prefer the solitary rhythm of sketching over competitive team sports.
  arts: Katherine Sager draws inspiration from the atmospheric graphic novels of Junji Ito, the delicate watercolors of Georgia O’Keeffe, and the intimate indie acoustic melodies of Phoebe Bridgers, often
    integrating these influences into their own sketchbook explorations of local flora.
  travel: Katherine Sager’s travel style favors quiet, introspective trips— they’ve trekked the Blue Ridge Parkway in autumn, explored Asheville’s art districts, and dream of wandering the gardens of Kyoto
    to capture the interplay of light and shadow they love in photography.
  culinary: Katherine Sager is a self‑taught home cook who loves whipping up lemon‑basil pasta, crafting avocado toast topped with heirloom tomatoes, and experimenting with matcha‑green tea ice cream, always
    keeping a sketch of their culinary creations in their journal.
  core: Katherine Sager, a 17‑year‑old introspective artist, balances meticulous sketching and digital illustration with a habit of late‑night coffee binges, a persistent worry streak, and a fierce commitment
    to using art as a balm for teen anxiety.
background:
  cultural: Katherine’s cultural background is rooted in a predominantly white, middle‑class suburban setting in Sanford, Florida. The community blends Southern hospitality with the broader multicultural
    influences common to Central Florida, exposing her to local festivals, historic downtown events, and the city’s Spanish‑American heritage. Her family emphasizes personal responsibility, education, and
    quiet reflection, values that align with her reserved personality and preference for intimate gatherings. While she identifies with mainstream American cultural norms, she has also developed an appreciation
    for the diverse artistic expressions present in her region.
attributes:
  skills: '["Digital illustration (Procreate)", "Basic Photoshop editing", "Charcoal and watercolor sketching", "Reflective journaling", "Self‑directed online research", "Organizational planning", "Peer
