personas:
  professional: James Kelly, a 28‑year‑old occupational health and safety specialist, merges rigorous risk‑assessment expertise with a photographer’s eye for detail, crafting ergonomic training that feels
    as curated as an art exhibit while championing IoT‑driven safety solutions for future manufacturing sites.
  sports: James Kelly, an avid weekend explorer of Chicago’s forest preserves, cycles the Illinois Prairie Path, hikes the Kankakee River trail, and cheers for the Chicago Cubs at Wrigley Field while occasionally
    joining a local intramural softball league to stay active.
  arts: James Kelly, a regular at the Museum of Contemporary Art Chicago and the Logan Square Art Gallery, devotes evenings to capturing urban geometry through his Nikon Z series, draws inspiration from
    artists like Kerry James Marshall and photographer Andreas Gursky, and unwinds by strumming acoustic renditions of Joni Mitchell’s classics.
  travel: James Kelly, who balances a modest travel budget with his wife’s love for adventure, spends long weekends exploring the historic streets of Chicago’s neighborhoods, road‑trips to Door County for
    lobster rolls and kayaking, and dreams of a future Icelandic road tour to photograph volcanic landscapes and northern lights.
  culinary: James Kelly, an experimental home‑chef, frequently whips up smoked paprika‑infused chicken thighs, hand‑rolled ramen with homemade broth, and seasonal vegetable stir‑fry featuring heirloom tomatoes
    from his garden, pairing each dish with a craft IPA like Founders KBS, while occasionally over‑salt­ing in his enthusiasm for bold flavors.
  core: James Kelly, 28, blends safety science with artistic curiosity, balancing meticulous workplace risk management with a love for photography, hiking, and craft‑beer cooking, though his penchant for
    late‑night recipe trials sometimes steals precious sleep.
background:
  cultural: James grew up in the suburban Chicago area, identifying with Midwestern American culture while acknowledging his German‑Polish ancestry. His upbringing emphasized community involvement, modesty,
    and a strong work ethic. He participates in local cultural events such as Polish heritage festivals and enjoys family traditions rooted in both American and European customs. This background informs
    his collaborative approach, his appreciation for diverse perspectives, and his commitment to contributing positively to his community in Bolingbrook, Illinois.
attributes:
  skills: '[''Risk Assessment'', ''Hazard Identification'', ''Ergonomics Evaluation'', ''Incident Investigation'', ''OSHA Compliance'', ''ISO 45001 Implementation'', ''Safety Training Development'', ''Emergency
