    (Excel, PowerBI)'', ''Team Leadership'', ''Effective Communication'', ''Problem Solving'', ''Adaptability'']'
  hobbies: '[''Contemporary Art Appreciation'', ''Photography'', ''Hiking'', ''Biking'', ''Acoustic Guitar Playing'', ''Science‑Fiction Reading'', ''Home Cooking'', ''Craft‑Beer Tasting'', ''Community Safety
    Workshops'', ''Vegetable Gardening'']'
  career_goals: James aims to become a Certified Safety Professional (CSP) within the next two years and pursue a master's degree in occupational health focusing on ergonomics. He envisions leading a multi‑site
    safety program for a large manufacturing corporation, integrating emerging technologies like IoT sensors and predictive analytics to proactively prevent injuries. He also hopes to mentor junior safety
    technicians and eventually transition into a corporate safety consulting role where he can shape industry‑wide best practices.
