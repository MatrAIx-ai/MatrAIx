background:
  cultural: Joshua is raised in a Mexican‑American household in the vibrant, multicultural neighborhood of Oakland, California. At home Spanish and English are spoken interchangeably, and family traditions
    such as Día de los Muertos altars, festive Cinco de Mayo celebrations, and communal meals featuring tacos, tamales, and mole are woven into daily life. The local Latino community’s festivals, murals,
    and neighborhood gatherings reinforce his cultural identity. These influences shape his early experiences—from the lullabies his mother sings in Spanish to the flavors and music that fill family gatherings—instilling
    a strong sense of heritage, family solidarity, and openness to the diverse cultures surrounding him.
