persona_description: 'A Black activist and filmmaker who has dedicated their life to challenging negative stereotypes of Black people in the media and promoting positive representation of Black culture
  through film. They have been involved in organizing and producing films, documentaries, and events that address issues of race and inequality. Their work has earned them recognition and awards, including
  being featured on the Cease Fire: Stop Police Terrorism Campaign and hosting Black August Commemoration Concerts and Festivals. They have also produced a documentary about police brutality, Why We Say
  FTP, which will be internationally distributed and includes freedom fighters, rappers, and politicians.'
