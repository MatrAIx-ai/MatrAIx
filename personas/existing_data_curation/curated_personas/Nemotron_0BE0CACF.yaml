  career_goals: Approaching retirement, Noureddine aims to transition from full‑time employment to a mentorship and consulting role, helping small businesses modernize their IT infrastructure while preserving
    legacy systems. He plans to acquire cloud certifications (AWS Solutions Architect) to advise on hybrid migration projects, and he hopes to lead a community workshop that blends technology and art—teaching
    seniors to create digital portraits using photography and editing software. Additionally, he dreams of authoring a reflective memoir about the evolution of computing from the 1970s to the present, emphasizing
    lessons in reliability, curiosity, and adaptability.
