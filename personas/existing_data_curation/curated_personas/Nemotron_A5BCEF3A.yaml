  hobbies: '[''Photography'', ''Attending art exhibitions'', ''Community theater'', ''Live music (classic rock, jazz)'', ''Hiking'', ''Fishing'', ''Camping'', ''Collecting vintage truck memorabilia'', ''Painting'',
    ''Volunteering (driver safety education)'', ''Reading historical non‑fiction'', ''Travel memoirs'', ''Cooking Midwestern recipes'']'
  career_goals: Richard aims to move into a supervisory role within the transportation industry, seeking a regional fleet manager position where he can mentor younger drivers, enhance safety protocols,
    and integrate emerging logistics technology. He also aspires to become an owner‑operator, purchasing his own truck to run a small independent freight business that balances reliable income with the
    flexibility to pursue his artistic interests. In parallel, he plans to launch a photo‑journalism blog that showcases the scenery of the Midwest and his life on the road, hoping to generate supplemental
    revenue through print sales and sponsorships. To support these goals, he is pursuing a Certified Transportation Professional (CTP) credential and attending workshops on small‑business management.
