personas:
  professional: Jeannie Wilson is a retired community organizer who now channels their lifelong knack for scheduling and paperwork into volunteer coordination at the Midvale Senior Center, where they supervise
    weekly craft sessions, manage the center’s modest budget, and arrange intergenerational outings that align with their love of structure and predictability.
  sports: Jeannie Wilson is an enthusiastic walker who joins the 'Silver Strollers' walking club for bi‑weekly strolls along the Jordan River Trail, they cheer on the Utah Jazz during evening games at the
    local diner, and they participate in a senior shuffleboard league at the community center, blending low‑impact exercise with local team spirit.
  arts: Jeannie Wilson is an avid lover of classic jazz who often spins records by Miles Davis, Ella Fitzgerald, and John Coltrane while crocheting, they attend the Utah Shakespeare Festival each summer,
    and they contribute hand‑stitched blankets to church potlucks, illustrating how music and crafts enrich their creative leisure.
  travel: Jeannie Wilson is a modest traveler who enjoys weekend day trips to Zion and Bryce Canyon National Parks, they dream of visiting historic Heber and a family reunion road‑trip to Texas, they plan
    trips around the senior center’s calendar to avoid conflicts, and they prefer guided tours that highlight pioneer heritage and natural scenery.
  culinary: Jeannie Wilson is a comfort‑food chef who harvests basil, mint, and rosemary from their patio garden to flavor chicken potpie, homemade chicken noodle soup, and herb‑infused tea, they delight
    in baking oatmeal raisin cookies for church gatherings, and despite occasional impatience with elaborate recipes, they trust their tried‑and‑true family dishes to please any crowd.
  core: Jeannie Wilson blends a structured volunteer spirit, cautious financial habits, diligent health monitoring, gentle walking routines, classic jazz appreciation, region‑focused travel, and herb‑rich
    comfort cooking into a harmonious, yet occasionally anxious, senior lifestyle, and they approach each day with quiet determination.
background:
  cultural: Jeannie was born in 1948 and grew up in a modest, predominantly white, LDS‑influenced community in the Wasatch Front. Her upbringing emphasized self‑reliance, family cohesion, and service to
    the community, values that continue to shape her daily life. The cultural norms of mid‑century Utah—respect for tradition, modesty, and a strong work ethic—are reflected in her practical approach to
    tasks and her devotion to volunteer work. While she identifies with the broader American cultural heritage of the post‑war baby‑boomer generation, her personal identity is also deeply rooted in local
    Salt Lake County customs, such as participation in church service projects, attending community potlucks, and celebrating regional holidays like Pioneer Day. These cultural influences reinforce her
    kindness, cooperativeness, and desire for harmony within her social circles.
