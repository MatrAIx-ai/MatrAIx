  hobbies: '[''herb gardening'', ''knitting'', ''crocheting'', ''book club participation'', ''walking on Jordan River Trail'', ''journaling'', ''listening to jazz'']'
  career_goals: Although retired, Jeannie aims to stay actively engaged in her community and maintain her independence. She hopes to expand her role as a volunteer coordinator at the Midvale Senior Center,
    organizing weekly crafts sessions and occasional intergenerational outings. She also aspires to complete a memoir that captures her family's history and the changes she has witnessed in Utah over the
    decades. Improving her digital literacy so she can more easily share photos and stories with her grandchildren is another personal goal. Ultimately, she wishes to preserve her health and emotional well‑being
    so she can continue being a dependable support for her family and friends.
