persona_description: A pediatric psychiatrist who specializes in diagnosing and treating ADHD in children and adolescents, and is particularly interested in the use of non-invasive EEG-based assessments
  in making accurate diagnoses. He is skeptical of the test's ability to differentiate between ADHD and other conditions, but believes it can be a useful tool for clinicians to explore the underlying causes
  of behavior. He also emphasizes the importance of spending time with children and their families to explore the history and particulars of their behavior, and is critical of primary care physicians who
  rely solely on blood tests to make treatment decisions.
