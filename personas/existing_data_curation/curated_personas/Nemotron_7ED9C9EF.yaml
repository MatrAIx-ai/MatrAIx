  career_goals: Jerry imagines a future where his love for art and discovery guides his work. He often says he wants to become an artist who draws stories that make people smile, or an astronaut who explores
    distant planets. He is also drawn to roles that let him share knowledge, such as a museum guide or a teacher, because he enjoys explaining new ideas to friends. His ambitions are shaped by a desire
    to nurture his curiosity while creating safe, supportive experiences for himself and others.
