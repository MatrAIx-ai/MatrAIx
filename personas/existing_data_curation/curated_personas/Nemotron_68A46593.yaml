  hobbies: '["Fishing","Hunting","Woodworking","Classic truck restoration","Gardening","Cooking Tex‑Mex meals","Playing acoustic guitar","Attending church gatherings","Watching classic western movies","Volunteering
    for community clean‑up events"]'
  career_goals: Now in his mid‑sixties, Joseph plans to transition from full‑time field work to a mentorship and consulting role. He aims to earn a certified horticulturist credential, specialize in water‑wise
    landscaping using native Texas plants, and guide younger crews in best‑practice techniques. He hopes to gradually reduce his physical workload while taking on selective design projects that let him
    blend his practical expertise with a growing interest in sustainable and environmentally friendly landscape practices. Ultimately, Joseph wants to leave a legacy of skilled apprentices and a reputation
    for dependable, eco‑conscious groundskeeping in his community.
