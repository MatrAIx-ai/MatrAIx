  career_goals: Hawra aspires to turn her blend of curiosity and practicality into a career that merges technology and creativity. She aims to pursue a STEM‑focused high school program and later study computer
    science or game design at university, with the long‑term goal of becoming a software developer who creates immersive video games. Alongside formal education, she hopes to launch a small side business
    selling custom digital artwork and game assets, using her artistic skills and coding know‑how to generate independent income. Her competitive drive pushes her to seek internships or mentorships where
    she can contribute to real‑world development teams and refine her technical expertise.
