    art workshops'']'
  career_goals: Although retired from formal employment, Gioconda aspires to become a living archive of her Mexican‑Texan heritage. She plans to compile a family memoir that weaves together stories, recipes,
    and artwork, and to curate a small community exhibition showcasing local crafts and historic photographs. She hopes to mentor younger neighbors in quilting and storytelling workshops, and eventually
    publish a collection of her poems and reflective essays. Travel to her ancestral hometown in Mexico is a cherished personal goal, as is deepening her artistic practice through mixed‑media experiments.
