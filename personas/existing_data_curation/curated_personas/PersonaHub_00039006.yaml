persona_description: A sustainability professional with expertise in ecological engineering and water and wastewater treatment, Lauren Roth Venu is passionate about using nature as an example to make technology
  more effective, less costly, and to eliminate destructive impacts on the environment. She is the president of Roth Ecological Design International and has presented on innovative water and waste operations
  for small businesses, emphasizing the importance of mimicking natural systems that can move water. She has also spoken about the need to design systems that are "cradle to cradle" and not "cradle to grave,"
  and has advocated for the use of low-impact development practices to prevent storm water runoff from seriously impairing streams, estuaries, and bays. Venu's presentation on "Innovative Water and Waste
  Operations for Small Businesses" was part of a sustainability series conducted by the UH Maui Sustainable Living Institute and the Office of Continuing Education, and she contrasted the "Western Way"
  of defining the land and having nature fit our wants with today's problems, such as the development of centralized water systems and the high energy cost of moving water to consumers through large pipes.
