  career_goals: His immediate ambition is to enroll in a doctoral program in Business Administration with a specialization in Sustainable Business and Organizational Behavior, paving the way for a tenure‑track
    faculty position at a research‑intensive university. Over the next five years he plans to design and launch a series of online modules that blend practical case studies with emerging sustainability
    concepts, thereby offering students flexible learning while maintaining academic rigor. He also aspires to publish articles in peer‑reviewed journals on the intersection of ethics, innovation, and practicality
    in business education, and to mentor undergraduate entrepreneurs seeking quiet, reflective guidance. Long‑term, Aurelio envisions establishing a small consultancy that provides sustainability assessments
    for mid‑size firms, allowing him to apply his research in a real‑world context without sacrificing his preference for solitary, focused work.
