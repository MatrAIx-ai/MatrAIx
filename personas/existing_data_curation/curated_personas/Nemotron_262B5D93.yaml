personas:
  professional: Manuel Armas leverages his disciplined case management, bilingual fluency, and knack for building rapport to run a high‑volume civil litigation, family, and immigration practice where meticulous
    legal research and tech‑savvy organization translate into swift, amicable settlements.
  sports: Manuel Armas participates in a local Sunday baseball league, follows the Miami Marlins and the Cleveland Guardians with fervor, jogs daily along the Miami River for cardio, and never misses a
    Miami Heat game during the NBA season, blending team camaraderie with personal fitness.
  arts: Manuel Armas enjoys vibrant salsa nights, dancing to the timeless voices of Celia Cruz and Rubén Blades, attends performances at the Adrienne Arsht Center, and often quotes classic lines from Rita
    Moreno’s films, letting music and theater infuse his social gatherings.
  travel: Manuel Armas favors culturally rich short trips, having explored Old Havana’s historic streets, Cartagena’s colonial charm, and Oaxaca’s culinary scene, while dreaming of a scenic road‑trip along
    Mexico’s Pacific coast that combines music festivals with beach relaxation.
  culinary: Manuel Armas is a confident home chef who perfects ropa vieja with a hint of cumin, crafts arroz con pollo using saffron and fresh cilantro, pairs both with sweet plantains and a splash of aged
    rum, though his habit of late‑night cooking often leaves the kitchen in a creative mess.
  core: Manuel Armas is an organized, sociable attorney who balances high‑stakes legal work with salsa dancing, marathon jogging, community service, and a disciplined approach to finances, all while nurturing
    his love for traditional cuisine and occasional over‑scheduling.
background:
  cultural: Manuel grew up in a Cuban‑immigrant household in Hialeah, where Spanish was the language of daily life and Catholic traditions shaped family rituals. The vibrant Cuban enclave taught him the
    value of community solidarity, respect for elders, and celebration of heritage through music, dance, and food. His parents instilled a strong work ethic and an appreciation for both the familiar customs
    of Cuba and the opportunities offered by American society. This bicultural upbringing fuels his commitment to bridge gaps between the legal system and the Cuban‑American community, ensuring that his
    clients feel heard, respected, and empowered.
attributes:
  skills: '["Civil Litigation", "Family Law", "Immigration Law", "Legal Research", "Contract Drafting", "Negotiation", "Mediation", "Bilingual Communication (Spanish/English)", "Case Management", "Legal
    Writing", "Public Speaking", "Community Advocacy", "Compliance", "Legal Technology Utilization"]'
  hobbies: '["Salsa and mambo dancing", "Cooking traditional Cuban cuisine", "Playing and watching baseball", "Jogging along the Miami River", "Reading biographies of Cuban historical figures", "Traveling
    to Cuba when possible", "Volunteering at community festivals and legal workshops", "Participating in church and cultural groups", "Networking with fellow professionals"]'
  career_goals: Manuel aims to expand his solo practice into a boutique firm that specializes in serving the Cuban‑American community, with a focus on immigration and family law. He plans to open a legal‑aid
    clinic that offers pro‑bono services to low‑income families. Over the next five years, he seeks to become a senior partner in a regional law firm or be appointed to a municipal judgeship, where he can
    influence policy on housing and immigration. He also aspires to mentor younger attorneys, particularly those from immigrant backgrounds, and to publish articles on cross‑cultural legal practice.
