personas:
  professional: Craig Kruse, a seasoned automotive veteran with five decades of hands‑on experience in internal‑combustion, hybrid, and electric vehicle repair, blends practical troubleshooting with a curiosity
    for emerging tech, and now channels his talkative, community‑focused personality into mentoring apprentices and hosting monthly classic‑car meet‑ups at his neighborhood shop.
  sports: Craig Kruse avidly follows the New York Giants and New Jersey Devils, participates in the local senior bowling league at the community center, and joins the Cape May Fishing Club for early‑morning
    trips to the shore, treating each catch as friendly competition and a chance to swap stories.
  arts: Craig Kruse brings his flair for storytelling to the senior‑theater improv group, where they riff on classic rock hits from The Rolling Stones, Led Zeppelin, and Bruce Springsteen, and he also enjoys
    attending nearby concert series featuring tribute bands and local folk musicians.
  travel: Craig Kruse prefers low‑key road trips, having explored the Pine Barrens by car, driven his restored 1965 Ford pickup along historic Route 66, and taken weekend journeys to Savannah’s historic
    district and the Atlantic City boardwalk, always seeking new places to host a barbecue or share a classic car story, and they relish the chance to meet fellow enthusiasts along the way.
  culinary: Craig Kruse delights in smoking ribs with a dry rub of smoked paprika, brown sugar, and garlic, grilling fresh striped bass with lemon butter, and baking homemade apple pie with a flaky crust,
    they often pair meals with craft beer, though they sometimes over‑season dishes in the excitement of a new garage project.
  core: Craig Kruse is a gregarious, car‑loving retiree who balances old‑school rock nostalgia with a habit of juggling multiple projects, occasionally forgetting appointments while still greeting every
    neighbor by name.
background:
  cultural: Craig grew up in a post‑World War II working‑class family in the greater New Jersey area. His parents, both of European (primarily German and Irish) descent, valued hard work, self‑reliance,
    and community loyalty. The regional culture of Atlantic County—marked by close‑knit neighborhoods, a strong do‑it‑yourself ethic, and a love of practical trades—shaped his pragmatic outlook while his
    curiosity was nurtured by the diverse, bustling ports and automotive shops of the Garden State. This blend of Mid‑Atlantic working‑class tradition and exposure to a multicultural, industrious environment
    informs his sociable, cooperative personality and his commitment to passing on practical knowledge to the next generation.
