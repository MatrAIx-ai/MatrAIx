personas:
  professional: Julia Mendez is an aspiring junior soccer coordinator who blends curiosity about new game tricks with a relaxed, flexible planning style, using their teamwork and creative drawing skills
    to design colorful field diagrams for after-school matches while keeping the focus on group harmony, even if they occasionally forget to bring a water bottle.
  sports: Julia Mendez loves sprinting across the field for their Willow Creek Youth Soccer Club after school, idolizes the Houston Dynamo and the U.S. Women’s National Soccer Team, and in winter they join
    a school indoor gymnastics program to stay active, approaching fitness with boundless energy and a preference for group play.
  arts: Julia Mendez is a budding visual artist who fills sketchbooks with vibrant animal and family scenes inspired by Dr. Seuss and local street murals, crafts intricate papel picado for neighborhood
    festivals, and dances to mariachi tunes by Vicente Fernández and pop hits from Ariana Grande, using these creative outlets to soothe their worries.
  travel: Julia Mendez delights in family road trips to nearby spots like the Rio Grande trail, Big Bend National Park, and weekend getaways to the San Antonio River Walk, preferring relaxed, nature-focused
    itineraries that allow them to sketch scenery, yet they sometimes worry about unfamiliar routes and the length of travel.
  culinary: Julia Mendez enjoys helping their mother knead masa for tamales, sprinkling queso fresco on fresh corn tortillas, and mixing a mango‑lime fruit salsa, showing beginner‑level cooking confidence
    while occasionally forgetting to wash their hands before handling food.
  core: Julia Mendez channels boundless energy and a caring heart into soccer, art, and family traditions, yet their wandering mind and worry‑prone nature often lead to forgotten chores, missed doses, and
    occasional impulsive splurges.
background:
  cultural: Julia comes from a Mexican family that has lived in El Paso for generations. Spanish is spoken at home, and many family traditions—such as celebrating Día de los Muertos, preparing tamales,
    and attending local fiestas—are part of her weekly life. Her parents blend Mexican customs with the American influences of school and community events, giving her a bicultural identity. She identifies
    with the warm, communal spirit of Mexican culture while navigating the border city’s diverse environment, which shapes her values of family, community, and bilingual communication.
