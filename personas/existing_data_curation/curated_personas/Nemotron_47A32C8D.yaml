  career_goals: Julia dreams of becoming a teacher who can share stories in both Spanish and English, helping other kids feel confident in their languages. She also loves animals and imagines herself as
    a veterinarian who cares for neighborhood pets. Occasionally she imagines being a community event organizer, arranging her school’s cultural festivals so that everyone can celebrate Mexican traditions.
    Her ambitions are shaped by her desire to help others, to keep harmony, and to use her curiosity to learn new things while staying grounded in practical ways.
