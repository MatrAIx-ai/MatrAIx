personas:
  professional: Myla Motin is an experienced community event coordinator and seasoned artist who fuses meticulous planning with spontaneous watercolor and quilting sessions, channeling curiosity and emotional
    depth into senior workshops at Arcadia Center while keeping harmony among volunteers.
  sports: Myla Motin enjoys low-impact walking on the historic town trail, participates weekly in the Arcadia Senior Fitness Club’s water aerobics, roots for the Oklahoma City Thunder basketball team and
    St. Louis Cardinals baseball club, and occasionally joins community garden-to-run charity events.
  arts: Myla Motin expresses creativity through watercolor landscapes of the plains, intricate quilts, and crochet blankets, drawing inspiration from Claude Monet’s palettes, Bob Ross’s soothing tutorials,
    and folk singer Gillian Welch’s storytelling, while also curating a small online gallery of their work.
  travel: Myla Motin approaches travel with a blend of curiosity and a need for routine, preferring organized group tours to historic destinations like Santa Fe and Natchez, dreaming of a leisurely Tuscan
    countryside retreat, yet carefully plans trips around health considerations and budget.
  culinary: Myla Motin blends Southern comfort with health‑conscious twists, preparing dishes such as smoked collard greens tossed with olive oil, baked sweet‑potato casserole topped with low‑fat cheese,
    and sipping rosemary‑mint tea brewed from garden herbs.
  core: Myla Motin balances a nurturing community spirit, relentless creative curiosity, and a tendency toward anxiety that colors both their art and daily choices, often punctuated by a habit of humming
    folk tunes while crocheting.
background:
  cultural: Myla was raised in a close‑knit Black community in rural Oklahoma, where church, family storytelling, and hands‑on crafts formed the core of daily life. Her grandparents migrated from the Deep
    South during the mid‑20th century, bringing with them a rich tradition of gospel music, soul food, and quilting that Myla has continued and adapted. The local African‑American church remains a pillar
    of social support, and she actively engages in its cultural events, from choir rehearsals to potluck gatherings. While rooted in these traditions, Myla also embraces the broader Oklahoma landscape,
    integrating prairie motifs into her art and participating in regional community initiatives.
attributes:
  skills: '["Community Event Coordination", "Quilting & Crochet", "Watercolor Painting", "Sketching", "Gardening", "Southern Cooking", "Peer Emotional Support", "Digital Photo Editing"]'
  hobbies: '["Watercolor Painting", "Crocheting", "Quilting", "Gardening", "Cooking Southern Recipes", "Reading Historical Fiction", "Church Choir Singing", "Attending Heritage Festivals"]'
  career_goals: Myla hopes to launch a senior‑focused art workshop at the Arcadia community center, where she can teach quilting, watercolor, and mixed‑media techniques while preserving local Black cultural
    traditions. She aims to compile a written and visual archive of oral histories and recipes from her community for the Logan County Historical Society. Additionally, she aspires to lead a peer‑support
    group for seniors dealing with anxiety and grief, and she plans to enroll in a creative writing class to eventually publish a memoir that weaves together her artistic journey and family heritage.
