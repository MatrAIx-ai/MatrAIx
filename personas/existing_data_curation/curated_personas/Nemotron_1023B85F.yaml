personas:
  professional: Alcides Torres, a 20-year-old automotive technician in training, leverages his systematic diagnostic expertise, bilingual communication, and preference for routine to deliver precise service
    and flawless paperwork at a Tampa-area service center, while his competitive edge drives him toward ASE master certification.
  sports: Alcides Torres catches for a local amateur baseball team, follows the Tampa Bay Rays throughout the MLB season, hits the Tampa YMCA for cardio and strength workouts, and spends weekend mornings
    fishing off Tampa Bay's docks, all while maintaining a methodical training schedule that mirrors his work ethic.
  arts: Alcides Torres regularly attends community festivals featuring live tributes to Celia Cruz and vintage son ensembles, queues up classic recordings by Buena Vista Social Club at home, and admires
    the bold murals of José Bedia, finding that these artistic experiences reinforce his connection to family heritage.
  travel: Alcides Torres prefers frugal road trips along Florida's Gulf Coast—such as a sunset stay in Clearwater or an Everglades day tour—while dreaming of a cultural immersion trip to Havana and a fishing
    expedition to the Bahamas once his savings reach his target.
  culinary: Alcides Torres skillfully prepares arroz con pollo, ropa vieja, and crispy tostones using family-handed sofrito, plantains, and a splash of bitter orange, and he often caps the meal with a cold
    cerveza at his favorite local taqueria, reveling in the familiar flavors of his heritage.
  core: Alcides Torres blends methodical precision with a nostalgic love for family traditions, channeling his competitive drive into both automotive work and leisure pursuits while adhering to a disciplined,
    routine-oriented lifestyle.
background:
  cultural: Alcides was raised in a Cuban‑American household in Tampa's vibrant Ybor City community. His parents emigrated from Cuba, and the family maintains strong ties to Cuban traditions, including
    Spanish language use at home, celebratory gatherings for holidays like Carnaval and Día de los Muertos, and a deep appreciation for Cuban cuisine and music. Catholic faith and respect for elders play
    central roles in family life. Growing up among a close‑knit Cuban diaspora, Alcides balances the cultural emphasis on family solidarity and perseverance with his personal inclination toward routine,
    practicality, and organized achievement.
