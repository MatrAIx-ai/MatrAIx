  hobbies: '[''Cuban cooking'', ''Baseball (amateur league)'', ''Fishing'', ''Model car building'', ''Listening to Cuban music (son, salsa)'', ''Competitive video gaming'', ''Community festival participation'']'
  career_goals: Alcides aims to become a Certified Master Automotive Technician by completing his ASE certifications within the next two years. He plans to secure a full‑time position at a reputable service
    center in the Tampa area where he can apply his routine‑focused work style and gradually take on supervisory responsibilities. Long‑term, he envisions opening his own family‑run garage that emphasizes
    consistent quality, organized workflow, and community service, allowing him to blend his practical expertise with his competitive drive to build a respected business.
