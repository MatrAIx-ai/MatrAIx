  hobbies: '[''Urban Photography'', ''Museum & Art Gallery Visits'', ''Live Music (Jazz, Hip‑Hop)'', ''Recreational Basketball'', ''Hiking'', ''Experimental Cooking'', ''Science Fiction Reading'', ''Board
