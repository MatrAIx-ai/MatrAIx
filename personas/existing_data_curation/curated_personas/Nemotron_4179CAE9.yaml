  career_goals: Kenneth aims to progress to a director‑level role overseeing safety and operational excellence for a large manufacturing network in the Southeast. He plans to earn the Certified Safety Professional
    (CSP) credential and deepen his Six Sigma expertise to lead enterprise‑wide continuous‑improvement programs that integrate sustainability and worker well‑being. Over the next five years, he envisions
    launching a consulting boutique that helps midsize firms build inclusive safety cultures while mentoring underrepresented talent entering engineering. He also hopes to champion diversity initiatives
    within his organization, ensuring that Black engineers have clear pathways to leadership.
