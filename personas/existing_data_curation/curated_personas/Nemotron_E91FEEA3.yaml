personas:
  professional: Dexter Woody is a retired curriculum specialist who leverages five decades of classroom experience to mentor pre‑service teachers at the University of Missouri, blending methodical lesson
    design with a relaxed, flexible approach that values practical outcomes over rigid frameworks; they bring decades of calm problem‑solving to each workshop.
  sports: Dexter Woody is a devoted fan of the St. Louis Cardinals baseball team and the Kansas City Chiefs football squad, and they join a weekly walking club organized by the Boone County Senior Center
    that doubles as a low‑impact fitness group, while occasionally cheering on the Missouri Tigers during home games.
  arts: Dexter Woody enjoys intimate folk‑music gatherings where they hear songs by Bob Dylan, Gillian Welch, and local Missouri fiddler Sarah Blevins, and they spend quiet evenings immersed in the novels
    of John Steinbeck and the biography of Abraham Lincoln.
  travel: Dexter Woody and their spouse have toured historic sites such as Boston's Old South Meeting House and the University of Virginia's Rotunda in Charlottesville, and they hope to journey to the Tuskegee
    Institute in Alabama, preferring carefully planned road trips that fit within a modest retirement budget while allowing ample rest stops at scenic state parks.
  culinary: Dexter Woody favors hearty Midwestern fare such as butter‑rich cornbread, roasted chicken with rosemary, and vegetable stew made from garden‑fresh carrots, sweet potatoes, and locally sourced
    honey, and they cook at a comfortable level that balances seasoning precision with the occasional over‑salting mishap.
  core: Dexter Woody is a steady, structure‑loving mentor who quietly rebels against rigid schedules, occasionally misplaces their reading glasses while woodworking, and finds joy in simple, well‑ordered
    pleasures that echo a lifetime of community‑centered values.
background:
  cultural: Dexter is a white Midwestern American whose family has lived in central Missouri for several generations. He grew up in a modest Protestant household that emphasized community, self‑reliance,
    and the value of practical education. After earning his bachelor’s degree at the University of Missouri, he completed graduate studies in education there, forging a deep connection to Columbia’s academic
    and civic life. His marriage of over fifty years has centered around shared values of modesty, frugality, and dedication to family and local community. Dexter’s cultural identity is reflected in his
    participation in church‑related events, seasonal celebrations such as Thanksgiving and county fairs, and his long‑standing commitment to volunteerism within Boone County.
