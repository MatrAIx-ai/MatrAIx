  career_goals: Miten aims to transition from frontline cleaning to a supervisory role within facility management. He plans to earn a certified facilities manager credential (CFM) and complete an OSHA safety
    certification to bolster his qualifications. In the longer term, he envisions starting his own small‑scale, eco‑focused cleaning service that caters to community centers and small businesses in the
    Bronx, allowing him to apply his curiosity for new cleaning technologies while maintaining the practical, methodical approach he values.
