personas:
  professional: Miten Tirado, a seasoned facilities‑maintenance specialist, leverages two decades of custodial expertise, methodical scheduling, and a budding passion for green cleaning to lead small crews
    while eyeing a Certified Facility Manager credential as a stepping stone to supervisory responsibilities.
  sports: Miten Tirado, a quiet fan of the New York Yankees and the New York Knicks, enjoys weekend jogs through Van Cortlandt Park, plays on a community softball team in the Bronx, and follows the Giants'
    season only when it aligns with a low‑key social gathering.
  arts: Miten Tirado, an avid reader of historical fiction about Indigenous peoples and a budding photographer, admires the work of Ansel Adams and R. Carlos Nakai, frequents the Bronx Museum of the Arts,
    and finds solace sketching urban wildlife during park visits.
  travel: Miten Tirado, a planner of low‑key eco‑friendly getaways, often retreats to the Catskills for weekend hikes, dreams of exploring Yellowstone National Park, and prefers train travel over flying
    to reduce carbon footprint while staying within a modest budget.
  culinary: Miten Tirado, who cooks simple plant‑forward meals like quinoa‑black bean bowls, roasted root vegetables, and green‑tea‑infused soups, enjoys experimenting with natural herbs such as rosemary
    and lavender, but occasionally indulges in Bronx street‑food tacos when the mood strikes.
  core: Miten Tirado, a methodical yet inquisitive Bronx custodian, balances a love for solitary learning and eco‑cleaning innovation with a nervous but disciplined streak, turning anxiety into meticulous
    routines while dreaming of an environmentally responsible cleaning empire.
background:
  cultural: Miten is of American Indian descent, with ancestry rooted in the Mohawk Nation. Though raised in an urban environment, he maintains connections with a local Indigenous community center in the
    Bronx, attending seasonal powwows and cultural gatherings. He incorporates traditional values such as respect for the land and communal responsibility into his daily life, preferring eco‑friendly cleaning
    products as an extension of his heritage’s emphasis on living harmoniously with nature. He occasionally prepares traditional dishes like bean soups and participates in storytelling circles, which provide
    a quiet, reflective space that aligns with his reserved personality.
attributes:
