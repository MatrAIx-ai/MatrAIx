personas:
  professional: Patti Butler, a 23‑year‑old aspiring elementary educator, designs student‑centered, arts‑integrated lessons that blend sketching, music, and hands‑on projects, using their curiosity and
    empathetic approach to foster collaborative learning while they tolerate a bit of disorganization in lesson planning.
  sports: Patti Butler enjoys solo hikes along the Milwaukee Riverwalk and local forest trails, joins the Milwaukee County Parks walking club in spring, roots for the Milwaukee Bucks and Brewers, and occasionally
    participates in a community softball league on summer Saturdays, and they balance these activities with a love of quiet reflection.
  arts: Patti Butler spends quiet evenings sketching in a worn journal while drawing inspiration from the bold murals of Milwaukee's Riverwalk, the expressive colors of Georgia O'Keeffe's paintings, and
    the haunting folk tones of Sufjan Stevens and Iron & Wine, and they often attend intimate shows at The Jazz Estate with a close friend.
  travel: Patti Butler prefers low‑key, art‑focused travel, often planning spontaneous weekend trips to Door County's lakefront galleries or a day’s train ride to Chicago’s museum district, while dreaming
    of a slow‑paced summer in Vienna to soak up its historic music festivals and coffee‑house culture, and they usually travel with a small group of like‑minded friends or solo to keep the itinerary flexible.
  culinary: Patti Butler loves cooking comfort foods like homemade chicken pot pie, creamy pierogi stuffed with potatoes and cheddar, and hearty beef stew spiced with thyme and carrots, experimenting with
    seasonal heirloom tomatoes and fresh basil in the cramped kitchen of their downtown apartment, yet they sometimes burn the sauce when juggling a lesson plan.
  core: Patti Butler, a 23‑year‑old budding educator, blends a passion for quiet sketching, community art, and spontaneous recipe experiments with a habit of misplacing lesson plans, and they thrive on
    small‑group connections and a flexible, slightly disorganized lifestyle.
background:
  cultural: She grew up in a middle‑class white family in Milwaukee, Wisconsin, where Midwestern values of modesty, community involvement, and a pragmatic outlook shaped her worldview. Her heritage includes
    German and Polish ancestry, reflected in family traditions such as holiday meals, weekend visits to local fairs, and occasional participation in the city's famed German‑style summer festivals. The city's
    vibrant arts scene—museums, public murals, and community theater—nurtured her appreciation for creative expression, while the neighborhood's strong sense of neighborliness reinforced her compassionate
    and cooperative nature. This blend of Midwestern pragmatism and cultural exposure fuels her commitment to inclusive, art‑rich education.
attributes:
  skills: '[''Creative lesson design'', ''Art integration across curricula'', ''Student-centered instruction'', ''Differentiated instruction'', ''Empathetic classroom management'', ''Cooperative learning
    facilitation'', ''Educational technology (Google Classroom, SMART Board)'', ''Basic special-education support (IEP assistance)'', ''Parent-teacher communication'', ''Conflict resolution'']'
  hobbies: '[''sketching'', ''visiting art museums and galleries'', ''reading contemporary fiction'', ''journaling'', ''hiking local trails'', ''volunteering as a reading tutor'', ''playing board games
    with close friends'', ''experimenting with cooking comfort foods'', ''attending intimate live-music performances'']'
  career_goals: She aims to earn a bachelor's degree in Elementary Education and later pursue a master's in Curriculum and Instruction, focusing on arts‑integrated pedagogy. Over the next five years, she
    hopes to become a lead teacher who designs interdisciplinary units blending visual arts, music, and project‑based learning. She envisions starting an after‑school art club to provide creative outlets
    for students and eventually moving into a curriculum coordinator role where she can mentor newer teachers and advocate for inclusive, student‑driven curricula. Maintaining a balance between personal
    growth and her flexible lifestyle is essential to her long‑term professional fulfillment.
