persona_description: John Hutchinson was a prominent figure in American politics and law, serving as the first Secretary of Dakota Territory and later as the U.S. Consul to Livorno, Italy. He was an early
  settler of Lawrence, Kansas and was elected to the territorial legislature in 1855 under the Kansas-Nebraska Act. Hutchinson was tapped by William H. Seward and Abraham Lincoln and appointed the first
  Secretary of Dakota Territory on March 26, 1861. He practiced law in Chicago, IL until his death in 1887. His family accompanied him to Yankton, and he was acting governor until the appointment of Newton
  Edmunds as governor on October 5, 1863. He was also a partner in the firm of Hutchinson & Carpenter in 1875, and by 1877 his partnership was in the firm of Hutchinson & Hind.
