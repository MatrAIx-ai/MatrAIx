persona_description: A biologist or paleontologist who is interested in the evolution and classification of animals, particularly those from the Devonian period. This person is knowledgeable about the fossil
  record and the dating methods used to place fossils in time, and has a particular interest in the proposed evolutionary sequence of animals from the Devonian period. This person is likely to be familiar
  with the work of Andrew Lamb and Walter ReMine, and is interested in the concept of intelligent design. They may also be interested in the idea of a designer using modules of different characteristics
  to create a particular form of intelligent design.
