  career_goals: Approaching retirement, Talina aims to leave a lasting legacy of operational excellence by implementing a comprehensive succession plan that equips emerging leaders with the skills to sustain
    high performance. She aspires to reduce departmental turnaround times by at least 15% through process redesign and to institutionalize a mental-health support framework for staff, reflecting her awareness
    of stress-related challenges. Before stepping back fully, she hopes to earn a Project Management Professional (PMP) certification and to transition into an advisory role with a local nonprofit focused
    on community health, where she can apply her managerial expertise and passion for civic service.
