persona_description: A biochemist who specializes in the study of alternative genetic materials, particularly those that can carry a code equivalent to DNA. His research interests include the development
  of alternative genetic materials, the study of their biological properties, and the potential for their use in astrobiology. He is also interested in the history and evolution of life, particularly the
  way in which simpler forms of life evolved into more complex forms. He is likely to be knowledgeable about the work of John Chaput and the Foundation for Applied Molecular Evolution, and has a keen interest
  in the potential for alternative genetic materials to be used in astrobiology.
