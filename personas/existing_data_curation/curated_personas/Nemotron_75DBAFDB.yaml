    for Humanity'', ''handcrafted furniture projects'', ''yoga'', ''birdwatching'']'
  career_goals: Christy aims to open a boutique workshop that specializes in bespoke furniture and art‑inspired wood pieces, allowing her to blend her craftsmanship with her love of visual art. She plans
    to earn a green building certification to incorporate sustainable practices into her work and to become a certified instructor for apprenticeship programs that support underrepresented groups in the
    trades. Over the next five years, she hopes to have her pieces featured in local art galleries, collaborate on community renovation projects in Gwinnett County, and complete her associate degree in
    interior design to broaden her design capabilities. Additionally, she wants to develop a small mentorship network to empower young Black women interested in carpentry and related crafts.
