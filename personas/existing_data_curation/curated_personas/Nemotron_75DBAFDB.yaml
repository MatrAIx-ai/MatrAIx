personas:
  professional: Christy Leigh, a veteran carpenter with more than three decades of residential construction experience, merges masterful joinery, reclaimed wood, and eco‑friendly finishes to craft bespoke
    furniture that reflects their love of visual art, while flexibly managing project timelines and mentoring women and minority apprentices despite a habit of occasional disorganization.
  sports: Christy Leigh supports the Gwinnett Stripers and regularly attends Atlanta Falcons games, participates in a community walking club that meets twice weekly, and keeps a yoga mat on hand for daily
    flexibility sessions, reflecting a balanced yet low‑impact approach to fitness.
  arts: Christy Leigh frequents the Museum of Contemporary Art in Atlanta and the Gwinnett County Arts Center, draws design inspiration from the vibrant color palettes of Georgia O'Keeffe and the collage
    techniques of Romare Bearden, and attends live jazz performances by Miles Davis and Ella Fitzgerald, weaving these artistic influences into their quilting and woodworking creations.
  travel: Christy Leigh enjoys leisurely road trips through the historic towns of Savannah and Charleston, weekend hikes in the Blue Ridge Mountains, and dreams of a creative retreat in Oaxaca, Mexico,
    where they can study traditional wooden crafts, planning each journey with a loose itinerary that leaves room for spontaneous gallery stops.
  culinary: Christy Leigh loves preparing soulful dishes such as smoked collard greens, cornbread, and shrimp étouffée using herbs like thyme and basil from their garden, and experiments with fusing Southern
    flavors with Mediterranean spices, often inviting friends over for feasts where they showcase their latest culinary creation.
  core: Christy Leigh is a meticulous woodworker who loses track of time sketching designs, is prone to worrying over small project details, and hoards vintage hand tools like a treasure trove.
background:
  cultural: Christy is an African‑American woman whose family roots trace back to the Great Migration era, moving from the Deep South to Georgia in the mid‑20th century. She grew up in a close‑knit church
    community in the Atlanta suburbs, where storytelling, music, and communal support were central. Her cultural identity is shaped by traditions such as Sunday potlucks, Juneteenth celebrations, and the
    legacy of Black craftsmanship, especially quilting and woodworking passed down through generations. In Duluth, GA, she actively participates in local Black cultural events, supports historically Black
    churches, and mentors youth within the community. This heritage informs her work ethic, her dedication to service, and her desire to preserve and evolve African‑American artistic expressions through
    her carpentry.
