personas:
  professional: Britnay Brooks, a five‑year‑old aspiring engineer, channels a blend of curiosity and practicality by constructing intricate block towers while adhering to step‑by‑step guides, showing both
    organization and flexibility in play, and they proudly demonstrate their creations to family members.
  sports: Britnay Brooks, a five‑year‑old member of the Meadowbrook Cubs toddler soccer club, looks up to the Seattle Mariners and enjoys watching the team’s games on weekends, prefers the gentle fun of
    small‑sided matches over intense competition, balances a desire to improve with occasional worry about scoring, and they often practice dribbling with a soft ball at home.
  arts: Britnay Brooks, a five‑year‑old budding artist, loves drawing dinosaurs while humming the "Let It Go" anthem from Frozen, often imitates the expressive brushstrokes of Dr. Seuss illustrations, sometimes
    feels frustrated when crayons break, and they proudly display their artwork on the refrigerator.
  travel: Britnay Brooks, a five‑year‑old who has visited the San Diego Zoo and a grandparents’ cabin in the Adirondacks, enjoys planning trips with sticker maps, favors short car rides with frequent stops,
    dreams of seeing the Eiffel Tower someday, and they often pack a small backpack with favorite toys for each journey.
  culinary: Britnay Brooks, a five‑year‑old who adores cheese pizza topped with pepperoni, peanut butter‑banana sandwiches, and crunchy carrot sticks, can whisk together a simple fruit salad with grapes
    and strawberries, occasionally refuses broccoli and insists on a side of apple sauce, and they love helping stir batter for pancakes on weekend mornings.
  core: Britnay Brooks, a bright and cautious five‑year‑old, balances curiosity with practicality, often worries about details, yet channels that energy into imaginative play and meticulous planning, and
    they frequently seek reassurance from trusted adults.
background:
  cultural: Britnay was born and raised in Delray Beach, Florida, within a middle‑class white family that embraces both traditional American customs and the coastal lifestyle of South Florida. Her upbringing
    includes frequent beach outings, participation in local community events such as the Delray Beach Sea Turtle Festival and seasonal library programs, and celebrations of national holidays like Independence
    Day and Thanksgiving. The neighborhood's diverse cultural fabric—featuring Hispanic, Caribbean, and European influences—exposes her to bilingual signage, tropical cuisine, and a variety of music, which
    subtly enriches her worldview. Her family values politeness, community service, and education, often involving her in family beach clean‑ups and volunteer activities at the local preschool. These experiences
    combine to create a cultural background rooted in American coastal traditions, community involvement, and an appreciation for environmental stewardship.
