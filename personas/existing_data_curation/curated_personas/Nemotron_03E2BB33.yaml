  career_goals: Britnay frequently talks about growing up to explore the ocean as a marine biologist, fascinated by the shells and sea turtles she sees on Delray Beach. She also dreams of becoming a teacher
    or a veterinarian, because she loves explaining things to friends and caring for animals. In the near term, she aims to learn more about marine life through picture books, develop her reading confidence,
    and gain more confidence speaking in group activities at preschool. She aspires to be helpful in her community, participating in beach clean‑up events when she’s older.
