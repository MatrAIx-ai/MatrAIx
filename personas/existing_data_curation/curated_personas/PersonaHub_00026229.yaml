persona_description: A podiatrist or orthopaedic surgeon who specializes in the treatment of flatfoot deformity in adults. They have extensive knowledge and experience in evaluating and treating various
  causes of adult flatfoot, including tendon damage, foot fractures, neurological disorders, arthritis, and rheumatoid arthritis. They are skilled in conservative treatment options such as shoe modifications,
  orthotic devices, non-steroidal anti-inflammatory drugs, short-leg walking casts, braces, corticosteroid injections, rest, and ice, as well as surgical procedures such as arthrodesis, osteotomy, excision,
  synovectomy, tendon transfer, and the use of orthopaedic implants to correct foot alignment and deformity. They have published extensively on the topic and have developed new ways to treat adult flatfoot
  that avoid fusions and preserve mobility for some patients.
