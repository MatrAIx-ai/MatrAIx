persona_description: A historian who specializes in the study of world history, particularly focusing on the development of civilizations in the Pacific region. Their research interests include the impact
  of climate change on human societies, the role of domesticable plants and animals in spreading across the Pacific, and the cultural and technological interactions between different civilizations in the
  region. They are also interested in the development of the crypto-Chinese, crypto-Spaniards, and other similar cultures that emerged in the Pacific region.
