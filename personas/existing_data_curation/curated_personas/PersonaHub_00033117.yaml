persona_description: A researcher or health professional who is interested in evaluating the effectiveness of mass media interventions targeting ethnic minority populations in changing health behaviors.
  They are looking for studies that compare the effectiveness of targeted interventions with those intended for the general population. They are particularly interested in studies that provide clear evidence
  on the impact of different components of the interventions, such as the cultural adaptation to the ethnic minority group. They are also interested in studies that provide data on the impact on health
  behaviors and knowledge and attitudes, and the potential adverse effects of the interventions. They are looking for studies that are conducted in a rigorous manner and have high quality evidence.
