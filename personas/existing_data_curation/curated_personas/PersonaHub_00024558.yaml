persona_description: A researcher or scientist who is interested in the development and application of coating and surface modification technologies for medical and scientific applications, particularly
  those related to implants and theranostics. This persona may have expertise in electron beam technology, sputtering, plasma-activated deposition, and high-rate PECVD, and may be interested in interdisciplinary
  research and collaboration with industry partners. This persona may be interested in attending the annual conference of the German Society for Biomedical Engineering (DGBMT) and presenting research and
  clinical results from joint research projects in association with its partners from industry.
