  hobbies: '[''Attending local festivals'', ''Dancing to Mexican music (cumbia, norteño)'', ''Soccer fandom (Liga MX, Miami FC)'', ''Playing card games (poker, blackjack)'', ''Cooking traditional Mexican
    cuisine'', ''Gardening (tomatoes, chilies, herbs)'', ''Watching sports and TV series'', ''Walking in the Everglades'', ''Socializing at neighborhood gatherings'']'
  career_goals: Looking ahead, Sandalio aims to advance into a supervisory position, such as floor supervisor or shift manager, within the next few years. He plans to enroll in a short‑term certified gaming
    operations program to formalize his expertise and improve his prospects for promotion. In his future role, he hopes to mentor new hires, sharing his practical knowledge and social skills to foster a
    cohesive team. Long‑term, he envisions opening a modest family‑run convenience store or community‑oriented gaming lounge that blends his love for social interaction with a stable income, allowing him
    to provide a secure future for his wife and support extended family. Additionally, he aspires to develop better organizational habits to manage responsibilities more efficiently, aligning his natural
    flexibility with a slightly more structured approach.
