persona_description: A farmer who is responsible for managing a livestock enterprise and ensuring that the organic manure is stored and applied in a manner that maximizes the use of nutrients and reduces
  the risk of nutrient run-off. This persona is aware of the new requirements introduced with the Nutrients Action Programme 2019-2022 and is actively seeking ways to improve the storage capacity of slurry
  and manures to avoid the closed period during which organic manures cannot be spread. This persona is also conscious of the importance of reducing the risk of nutrient leaching and ensuring efficient
  use of nutrients.
