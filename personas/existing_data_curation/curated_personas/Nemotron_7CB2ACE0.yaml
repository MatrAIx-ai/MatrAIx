  hobbies: '[''Reading fantasy books'', ''Drawing and sketching characters'', ''Creating comic strips'', ''Collecting shells and natural objects'', ''Listening to Puerto Rican music'', ''Playing ukulele'',
    ''Coding simple games in Scratch'', ''Building with LEGO bricks'']'
  career_goals: Micaela aspires to become a children's book author and illustrator who weaves Puerto Rican folklore and her own imaginative worlds into vivid stories. She also dreams of designing interactive
    digital experiences—such as educational games or animated narratives—that combine art, storytelling, and technology. In the long term, she hopes to pursue a career that lets her celebrate her cultural
    heritage while inspiring other young minds to explore creativity and curiosity.
