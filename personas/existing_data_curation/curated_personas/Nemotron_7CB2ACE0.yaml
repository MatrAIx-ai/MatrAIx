personas:
  professional: A budding comic‑strip creator and Scratch game developer, Micaela Perez harnesses their vivid imagination and meticulous planning to produce weekly storyboards and simple interactive games,
    thriving in solitary creative sessions.
  sports: A nature‑focused explorer who spends weekends swimming at the nearby beach and trekking through local woods, Micaela Perez follows the Jacksonville Jaguars and Tampa Bay Rays, while participating
    in the Hampton Junior Scouting Troop’s beach‑clean‑up runs and occasional youth soccer matches.
  arts: A passionate comic‑artist and ukulele enthusiast, Micaela Perez draws inspiration from fantasy novels by J.K. Rowling, the whimsical storytelling of Hayao Miyazaki, and the rhythmic beats of traditional
    bomba music, often listening to performances by Marc Anthony while sketching characters influenced by Stan Lee and Neil Gaiman.
  travel: A thoughtful planner who loves mapping out family trips, Micaela Perez prefers slow‑paced beach vacations where they can collect shells, dreaming of exploring Old San Juan’s historic streets and
    the coral reefs of the Bahamas, while also cherishing local outings to Hammock Beach State Park and occasional weekend trips to Orlando’s amusement parks.
  culinary: A budding kitchen helper with a penchant for the flavors of home, Micaela Perez enjoys mixing mango‑pineapple smoothies, helping to stir arroz con gandules and shape pasteles, and experimenting
    with toasted coconut shrimp seasoned with garlic and lime.
  core: Micaela Perez, a ten‑year‑old imagination powerhouse, transforms solitary beach walks into comic art while obsessively cataloguing every shell in a notebook and occasionally forgetting to take their
    antihistamine.
background:
  cultural: Micaela is a first‑generation Puerto Rican American raised in Hampton, Florida. At home she speaks Spanish with her parents and grandparents, celebrates Puerto Rican holidays such as Three Kings
    Day and San Sebastián Festival, and helps prepare traditional dishes like arroz con gandules and pasteles. The blend of island culture, bilingual family life, and the coastal environment of Southern
    Florida nurtures her love for storytelling, music, and the natural world, shaping both her personal interests and creative aspirations.
