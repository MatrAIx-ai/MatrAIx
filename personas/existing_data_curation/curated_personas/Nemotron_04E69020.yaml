  hobbies: '[''Reading Historical Fiction'', ''African American Literature'', ''Genealogy'', ''Quilting'', ''Gardening'', ''Cooking Creole Cuisine'', ''Church Choir Singing'', ''Community Theater'', ''Nature
    Walks'', ''Heritage Travel'']'
  career_goals: Although retired from formal employment, Georgia aims to deepen her impact on education and local heritage. She plans to volunteer as a mentor for novice teachers, lead adult literacy workshops
    at the parish library, serve on the Ruston school board advisory committee, and spearhead a community oral‑history project documenting African‑American experiences in Jackson Parish. She also hopes
    to write a memoir that weaves her family’s stories with the region’s cultural legacy, while maintaining her health and family connections.
