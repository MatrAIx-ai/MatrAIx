personas:
  professional: Georgia Simon, a retired educator with a graduate degree in education, leverages decades of classroom experience to mentor novice teachers, design differentiated curricula, and lead community
    oral‑history workshops, balancing her curiosity for new pedagogical ideas with a practical, organized approach that lets her adapt flexibly while remaining reliably attentive to responsibilities.
  sports: Georgia Simon supports the Louisiana Tech Bulldogs basketball team and the New Orleans Saints, participates in a senior walking club that meets twice weekly on local nature trails, and enjoys
    seasonal pickleball at the community center, approaching fitness with a steady, social‑oriented routine rather than high‑intensity training.
  arts: Georgia Simon, a choir member and community‑theater enthusiast, draws inspiration from the songs of Marian Anderson and the plays of August Wilson, while also enjoying the paintings of Georgia O'Keeffe
    and the films of Audra McDonald, integrating these artistic influences into her quilting designs and storytelling.
  travel: Georgia Simon plans trips with a blend of structured itineraries and spontaneous detours, favoring historic sites like the National WWII Museum in New Orleans and family reunions along the Gulf
    Coast, yet balances these outings with a modest travel budget that limits overseas adventures to occasional cruises.
  culinary: Georgia Simon, an adept home cook, specializes in classic Creole gumbo and soul‑food collard greens seasoned with fresh herbs from her garden, confidently stitches together recipes while occasionally
    over‑salting dishes due to a fondness for bold flavors and a habit of tasting while cooking.
  core: Georgia Simon is a meticulous yet adaptable retiree who channels a lifelong love of learning into mentoring, quilting, and community storytelling, while occasionally succumbing to impulse fabric
    buys and skipping dental visits.
background:
  cultural: Georgia was raised in the close‑knit African‑American community of Ruston, Louisiana, during the latter half of the 20th century. Her family’s roots trace back to sharecroppers and civil‑rights
    activists, fostering a deep respect for resilience, storytelling, and communal support. She identifies strongly with Southern Black traditions—gospel music, church fellowship, Creole culinary flavors,
    Juneteenth celebrations, and the oral transmission of family history. This cultural heritage informs both her volunteer work and personal interests, as she strives to preserve and share the rich tapestry
    of African‑American life in the Deep South.
