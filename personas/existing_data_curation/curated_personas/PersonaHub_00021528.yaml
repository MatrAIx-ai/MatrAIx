persona_description: A researcher who specializes in the study of tropical cassava plants, particularly in the field of genetic modification and cultivation. The researcher is part of a team funded by the
  Bill & Melinda Gates Foundation to significantly increase the yield of the tropical cassava plant. The researcher has a deep understanding of the cassava plant's structure and metabolism, and is focused
  on altering the source-sink ratio to increase yield through simultaneous modification of processes that improve photosynthesis, the distribution of carbohydrate, and the growth of the storage roots in
  plants. The researcher is also experienced in conducting field trials and has a track record of successful results.
