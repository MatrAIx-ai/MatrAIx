personas:
  professional: Frank Stroud, a retired community arts coordinator in Wichita, leverages their vivid imagination and seasoned public‑speaking skills to design and facilitate senior‑focused traveling art
    exhibitions, blending meticulous budgeting with flexible, spontaneous storytelling sessions that keep participants both engaged and on schedule.
  sports: Frank Stroud, a dedicated member of a local walking club and a lifelong fan of the Wichita State Shockers basketball team, enjoys sunrise strolls through Sedgwick County parks, participates in
    weekly bridge tournaments that double as mental exercise, and follows the Kansas City Chiefs NFL games every Sunday while occasionally joining a gentle tai‑chi class at the senior center.
  arts: Frank Stroud immerses themselves in the arts by painting fluid watercolors inspired by Monet and Rothko, attending live performances by the Wichita Jazz Orchestra and the local theater’s production
    of Arthur Miller’s 'Death of a Salesman', curating reading circles around classics like 'Pride and Prejudice' and contemporary philosophers such as Alain de Botton, and collecting vintage records by
    Miles Davis and John Coltrane.
  travel: Frank Stroud prefers thoughtful, slower‑paced travel, often planning weekend getaways to nearby cultural sites such as the Flint Hills’ Tallgrass Prairie and Santa Fe’s art galleries, while dreaming
    of a summer pilgrimage to Paris to see the Louvre, yet their limited fixed income and desire for comfort leads them to favor train travel and stay in modest B&Bs over spontaneous backpacking.
  culinary: Frank Stroud delights in brewing herbal teas from garden‑grown chamomile, mint, and lavender, pairs them with simple yet flavorful dishes like herb‑roasted chicken, vegetable ratatouille, and
    miso‑infused noodle soup, and while their cooking skill is modest, they enjoy experimenting with food coloring in watercolor‑inspired plate designs, though they occasionally over‑season dishes out of
    nervous habit.
  core: Frank Stroud is a talkative, curiosity‑driven retiree who channels their artistic imagination and lingering worries into vibrant community projects, eclectic art, and a never‑ending quest for meaningful
    connection.
background:
  cultural: Frank was born and raised in a small farming community outside Wichita during the post‑World War II boom. His family adhered to traditional Midwestern values of hard work, self‑reliance, and
    community service, and they were active members of a local Methodist congregation. He attended a public high school where he first discovered a love for art and literature, and later pursued some college
    courses in English and fine arts at Wichita State University, though he never completed a degree due to joining the workforce early to support his family. Over the decades, he has woven together the
    modest, pragmatic ethos of his rural upbringing with the curiosity and openness of the 1960s cultural shifts, resulting in a personal culture that respects tradition while actively seeking novelty.
    His marriage of fifty‑plus years has reinforced a collaborative, yet assertive, partnership that underpins his community involvement. The cultural tapestry of the North‑Central United States, including
    a strong emphasis on hospitality, civic engagement, and a blend of conservative and progressive ideals, shapes Frank’s worldview and his desire to contribute to the cultural vitality of Wichita.
attributes:
  skills: '["Public speaking", "Facilitation", "Creative writing", "Art history knowledge", "Literary analysis", "Event planning", "Volunteer program coordination", "Financial budgeting", "Digital literacy
