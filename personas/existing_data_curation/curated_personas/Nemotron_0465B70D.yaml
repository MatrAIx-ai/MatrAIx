  hobbies: '["Watercolor painting", "Exploring abstract art", "Reading classic novels and contemporary philosophy", "Attending theater and jazz performances", "Playing bridge", "Gardening (herbs and vegetables)",
    "Writing memoirs and short stories", "Participating in senior community workshops", "Open‑mic storytelling", "Visiting museums and galleries", "Listening to science and philosophy podcasts", "Experimenting
    with digital creativity tools"]'
  career_goals: Frank aspires to curate a traveling art exhibition for seniors that highlights local artists and abstract works, publish a collection of short stories that capture Midwestern life and the
    nuances of aging, and establish a mentorship program linking younger volunteers with seasoned community members. He also hopes to raise awareness about mental health and stress management for older
    adults by organizing speaker series and workshops in partnership with local health providers. Though retired, he remains driven to leave a lasting cultural imprint on Wichita and to inspire curiosity
    and creativity in his peers and the broader community.
