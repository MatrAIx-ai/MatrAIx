personas:
  professional: Stephanie Hogg is a retail cashier whose meticulous inventory management, cash‑handling expertise, and knack for creating clear standard operating procedures translate into a methodical
    leadership style that makes them a natural candidate for shift supervisor and future store manager roles.
  sports: Stephanie Hogg enjoys weekend hikes in Red Rock Canyon, follows the Las Vegas Golden Knights for NHL excitement, plays recreational tennis at a community club, and uses yoga as their primary fitness
    routine, preferring low‑impact, consistent workouts over high‑intensity training.
  arts: Stephanie Hogg explores the local art scene by attending exhibitions featuring works by contemporary desert‑inspired painter Maya Collins, studying watercolors à la Georgia O'Keeffe, snapping black‑and‑white
    desert photographs inspired by Ansel Adams, and regularly listening to live performances by the indie folk duo The Oh Hellos at downtown venues.
  travel: Stephanie Hogg favors carefully planned road trips that combine artistic inspiration and natural beauty, such as a two‑day itinerary through Sedona’s red rocks to photograph the sunrise, a weekend
    museum tour in Santa Fe, and a dream vacation to Kyoto’s historic temples, all while balancing a modest travel budget with occasional splurges on boutique hotels.
  culinary: Stephanie Hogg’s palate leans toward Mediterranean flavors, and they frequently craft quinoa‑based salads with feta, olives, and fresh basil, relish the spice of a perfectly roasted chicken
    shawarma, and delight in savoring the delicate sashimi at new sushi spots, though their tendency to over‑season sauces sometimes masks subtler tastes.
  core: Stephanie Hogg blends meticulous retail expertise with a restless curiosity for art and desert landscapes, turning organized habits into a vibrant, community‑focused lifestyle that balances disciplined
    budgeting with occasional indulgences.
background:
  cultural: Stephanie comes from a middle‑class white American background, with family roots in the Midwest that emphasized hard work, community involvement, and self‑reliance. Having lived most of her
    adult life in Las Vegas, she has been shaped by the city’s vibrant tourism and entertainment culture, as well as its diverse population. This blend of traditional American values and exposure to a multicultural,
    dynamic environment informs her appreciation for the arts, her openness to new ideas, and her balanced, pragmatic outlook on life.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operation'', ''Inventory Management'', ''Basic Bookkeeping'', ''Conflict Resolution'', ''Time Management'', ''Scheduling'', ''Standard Operating
