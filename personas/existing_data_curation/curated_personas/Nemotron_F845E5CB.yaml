  career_goals: Even at six, Troy imagines a future where he can contribute to his community and family. He dreams of working on the family farm, helping with crops and livestock, and eventually becoming
    a ranch hand or a veterinarian to care for animals. He also expresses excitement about becoming a firefighter, attracted by the idea of helping people and the routine of drills. His ambition is guided
    by his love for practical, hands‑on work and his desire to be part of a team.
