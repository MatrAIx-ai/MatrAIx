  hobbies: '[''Gardening (vegetables and native wildflowers)'', ''Birdwatching'', ''Reading mystery and historical fiction'', ''Small book club'', ''Knitting and quilting'', ''Volunteering at local historical
    society'', ''Walking dogs'', ''Attending community theatre with close friends'']'
  career_goals: Approaching retirement, Debra aims to culminate her career by mentoring the next generation of security supervisors, possibly establishing a formal mentorship program within her department.
    She hopes to transition into a part‑time consultant role helping small local businesses develop security policies, or to volunteer as a safety advisor for senior living facilities. To satisfy her curiosity
    and leave a modernized legacy, she also plans to complete a state‑approved certification in advanced security technology before fully retiring.
