  hobbies: '[''Reading (science-fiction and nonfiction)'', ''Coding small Python projects'', ''Model building (LEGO Technic, miniature rockets)'', ''Playing piano'', ''Journaling'', ''Nature walks and bird-watching'',
    ''Photography (wildlife and landscapes)'', ''Peer tutoring at the library'']'
  career_goals: Josue aims to earn a scholarship to a state university where he will major in Computer Science or Electrical Engineering. He plans to specialize in educational technology, creating user-friendly
    software that supports students with diverse learning needs. After graduation, he hopes to work for a nonprofit-oriented tech company or start his own venture that combines his technical expertise with
    his compassion for helping others. He also envisions mentoring middle-school students in his hometown, organizing coding workshops and tutoring sessions to foster academic confidence in the next generation.
