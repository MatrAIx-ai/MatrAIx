personas:
  professional: Tiffany Rodriguez, a one-year-old who thrives on predictable nap times yet spontaneously bursts into giggles, already acts as a miniature host, captivating family gatherings with expressive
    babbles and eye-contact, foreshadowing a future career in early-childhood education or performance where their sociability, compassion, and love of routine will blend with a spontaneous flair.
  sports: Tiffany Rodriguez, a one-year-old who delights in the rhythmic movements of their weekly Mommy-and-Me gymnastics class and cheerfully waves a tiny Las Vegas Raiders flag during Sunday games, they
    combine their natural love of social attention with a budding enthusiasm for active play, though their stamina is limited to short bursts of crawling and giggles.
  arts: Tiffany Rodriguez, a one-year-old who lights up at the sound of classic cumbia songs sung by their family and claps along to Disney classics illustrated by Eric Carle, they show an early affinity
    for music and visual art, often dancing to the rhythms of Luis Miguel while mimicking the animated antics of Ryan's World on the family tablet.
  travel: Tiffany Rodriguez, a one-year-old whose parents favor stroller-friendly road trips, has already explored the desert dunes of Great Basin National Park and the bustling boardwalk of San Diego,
    they prefer the comfort of familiar routines while quietly absorbing new sights, and look forward to a future family getaway to the coastal charm of Santa Barbara.
  culinary: Tiffany Rodriguez, a one-year-old who eagerly reaches for soft pupusa fillings and sweet tamale masa, prefers smooth textures like mashed sweet potato and ripe avocado, yet insists on chewing
    the bright plastic handle of their spoon, revealing a budding palate for both traditional homemade flavors and simple infant-friendly foods.
  core: Tiffany Rodriguez, a one-year-old whirlwind of babbling charm, thrives on predictable bedtime rituals yet secretly rebels by stuffing every toy into their mouth, they constantly seek the spotlight
    and soothe themselves with soft cuddles whenever stress spikes.
background:
  cultural: Tiffany is a Salvadoran‑American raised in Dayton, Nevada, within a close‑knit Salvadoran community. At home, Spanish is the primary language, and traditions such as celebrating Día de los Reyes
    and cooking typical dishes like pupusas and tamales are integral to family life. Her parents emphasize cultural stories and music, fostering bilingual development and a strong sense of identity. The
    multicultural environment of Storey County exposes her to both local Nevada customs and the vibrant Salvadoran diaspora, shaping a blended cultural perspective.
