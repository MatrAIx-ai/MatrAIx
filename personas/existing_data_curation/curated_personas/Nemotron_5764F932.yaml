  career_goals: While Tiffany is still a toddler, her parents nurture an early ambition for her to become someone who helps and supports others. They envision a future where she might pursue a caring profession—perhaps
    as a teacher, healthcare aide, or community volunteer—drawing on her natural sociability and compassion. For now, her immediate ambition is to explore her environment confidently, master new skills,
    and enjoy close connections with family and peers.
