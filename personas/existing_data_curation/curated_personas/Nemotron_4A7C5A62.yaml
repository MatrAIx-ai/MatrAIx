    photography'', ''Mentoring new staff'', ''Flexible time management'']'
  hobbies: '[''Exploring Brooklyn street art and murals'', ''Photography (especially urban and cultural subjects)'', ''Attending free art openings and community gallery talks'', ''Listening to jazz, soul,
    and hip‑hop'', ''Jogging or walking in Prospect Park'', ''Cooking traditional Southern dishes with a modern twist'', ''Reading African‑American history and contemporary fiction'', ''Participating in
    local community gardening projects'', ''Playing chess at the local community center'', ''Watching classic basketball games'']'
  career_goals: Lee aims to move into a supervisory role as a lead facilities coordinator, where he can set cleaning standards, implement green‑cleaning initiatives, and oversee a team of janitorial staff.
    He plans to enroll in evening courses at a local community college to earn certifications in occupational safety and property management, which will bolster his credentials for a possible transition
    into building operations management. Additionally, Lee harbors a long‑term ambition to launch a niche cleaning service that caters specifically to art galleries and community murals, merging his professional
    expertise with his passion for the arts. He also wants to secure a comfortable retirement by maximizing his pension benefits and building a modest nest egg, while remaining a mentor and role model for
    younger workers in his community.
