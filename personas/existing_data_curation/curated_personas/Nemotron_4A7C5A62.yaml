personas:
  professional: Lee Wallace, a 59-year-old commercial cleaning veteran with three decades of expertise in janitorial operations, hazardous waste handling, minor plumbing, HVAC filter changes, and OSHA compliance,
    channels a restless curiosity for Brooklyn’s street art into a flexible yet occasionally disorganized work style that blends meticulous inventory control, calm conflict-resolution with tenants, and
    mentorship of new staff as they pursue a supervisory role and green-cleaning initiatives.
  sports: Lee Wallace, a 59-year-old Brooklyn resident, keeps fit by strolling Prospect Park and joining a casual adult basketball league at the John F. Kennedy Center that supports the Brooklyn Nets, while
    also tuning in to classic New York Knicks games on TV for a nostalgic basketball fix.
  arts: Lee Wallace, a 59-year-old art enthusiast, spends weekends photographing vibrant Brooklyn murals and attending open-mic nights where the sounds of John Coltrane, Aretha Franklin, and A Tribe Called
    Quest echo, while curating a personal digital archive of works by street artists such as Swoon and the elusive Banksy.
  travel: Lee Wallace, a 59-year-old lover of cultural exploration, prefers flexible weekend road trips to upstate New York’s artisan galleries, has taken a memorable jazz-filled pilgrimage to New Orleans,
    and dreams of wandering Lisbon’s tiled alleyways to capture the city’s azulejo‑covered walls on camera.
  culinary: Lee Wallace, a 59-year-old home cook, delights in preparing Southern-inspired dishes like shrimp and grits, collard greens seasoned with garden-fresh thyme and smoked paprika, and homemade cornbread,
    balancing moderate culinary skill with a passion for sharing hearty meals with family and occasional visits to local soul‑food spots such as Peaches.
  core: Lee Wallace, a 59-year-old whose curiosity for street art fuels a flexible yet sometimes chaotic approach to work and life, mixes disciplined cleaning standards with spontaneous mural hunts, occasional
    financial forgetfulness, and a steady habit of strolling with a camera in hand.
background:
  cultural: Lee is an African‑American who was born and raised in Brooklyn during the vibrant cultural shifts of the 1960s and 1970s. His family’s roots trace back to the Southern United States, with his
    grandparents having moved north during the Great Migration. Growing up, Lee was immersed in the sounds of early hip‑hop, gospel choirs at the local church, and the community activism that shaped his
    neighborhood. He values the strong ties of the Black community in Brooklyn, from block parties to mutual aid networks, and he remains aware of the ongoing gentrification that reshapes his borough. Lee’s
    marriage reflects a partnership built on shared cultural traditions, family gatherings, and a mutual commitment to preserving their heritage while embracing the city’s evolving diversity. His outlook
    blends respect for the legacy of African‑American resilience with an appreciation for the artistic and cultural mosaic that defines modern Brooklyn.
attributes:
  skills: '[''Commercial cleaning and janitorial services'', ''Building maintenance (minor plumbing, HVAC filter replacement)'', ''Hazardous waste handling and safety compliance'', ''Inventory management
