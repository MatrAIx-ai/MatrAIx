  hobbies: '[''Gardening'', ''Woodworking'', ''Model train building'', ''Fishing'', ''Reading non-fiction'', ''Listening to soul and jazz music'', ''Cooking traditional soul‑food'']'
  career_goals: Pedro’s primary career ambition is to translate his hands‑on repair skills into a modest, home‑based handyman service that serves the Lothian neighborhood, allowing him to work on a flexible
    schedule that respects his preference for routine. He plans to obtain a state‑approved certification in basic home inspection to enhance credibility. Additionally, he aims to improve his digital literacy
    so he can manage appointments and invoices online, and to secure a small grant for a modest home‑based business. Long‑term, he hopes to achieve financial stability that will enable him to maintain his
    home and support occasional community volunteer projects.
