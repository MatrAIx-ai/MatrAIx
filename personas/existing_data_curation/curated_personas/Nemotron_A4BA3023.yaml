personas:
  professional: Pedro Conyers is a seasoned handyman in the Lothian neighborhood, and they leverage their carpentry, plumbing, and electrical expertise alongside methodical planning and a calm demeanor
    to deliver reliable home repairs and soon‑certified home inspections, always prioritizing routine and meticulous documentation.
  sports: Pedro Conyers stays active through low‑impact fishing on the Patuxent River and participation in a local senior rowing club, they follow the Washington Nationals and Capitals for seasonal excitement,
    and they join a community garden walking group that provides gentle exercise.
  arts: Pedro Conyers immerses in classic soul and jazz, they regularly play vinyl from Nat King Cole, Ella Fitzgerald, and Marvin Gaye, and they occasionally attend intimate blues performances at a historic
    tavern nearby.
  travel: Pedro Conyers prefers meticulously planned short road trips, they have explored Savannah’s historic streets, the Blue Ridge Mountains, and Chesapeake Bay’s waterfront towns, and they dream of
    a leisurely cruise through the Greek islands once their business stabilizes.
  culinary: Pedro Conyers, an adept home cook, they frequently prepare soul‑food staples such as collard greens, smoked catfish, and cornbread, seasoning with smoked paprika and garlic, yet they admit to
    over‑salting dishes while perfecting a signature sweet‑potato pie.
  core: Pedro Conyers blends methodical handyman expertise with a love for quiet hobbies, disciplined finances, and soulful music, they balance routine with occasional spontaneous road trips and have a
    habit of over‑planning every detail.
background:
  cultural: Pedro is an African‑American who grew up in the Maryland suburbs of Baltimore, raised in a close‑knit Black community where church, family gatherings, and neighborhood solidarity were central.
    His parents emphasized hard work, respect for tradition, and self‑reliance, values that inform his practical outlook. He maintains ties to his cultural roots through regular attendance at a local Baptist
    church, participation in community block parties, and an appreciation for soul‑food cuisine, gospel music, and the storytelling traditions passed down from his grandparents, who migrated from the rural
    South during the Great Migration.
attributes:
  skills: '[''Home repair'', ''Carpentry'', ''Plumbing'', ''Basic electrical work'', ''Vehicle maintenance'', ''Budget management'', ''Record keeping'', ''Community project coordination'', ''Organizational
