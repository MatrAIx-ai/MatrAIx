personas:
  professional: Saltanat Francisco, a 12‑year‑old member of their school’s robotics club, turns fantasy sketching and LEGO construction into disciplined prototype designs, thriving on step‑by‑step projects
    while they occasionally let deadlines slip in favor of imaginative tinkering.
  sports: Saltanat Francisco enjoys low‑key fitness like weekend birdwatching walks and occasional after‑school badminton with the River City Kids Badminton Club, while they cheer for the Metro Wildcats
    baseball team during summer and the Ice Hawks hockey squad in winter.
  arts: Saltanat Francisco draws inspiration from the illustrated worlds of J.K. Rowling’s Harry Potter, the delicate line work of Studio Ghibli’s Hayao Miyazaki, and the melodic patterns of traditional
    Uzbek folk singer Sevara Nazarova alongside pop icons like Ariana Grande, and they integrate these influences into their sketchbook and calligraphy practice.
  travel: Saltanat Francisco prefers structured day trips to nearby Silverleaf Park for birdwatching and seasonal family outings to the National Bird Sanctuary, while they dream of a future vacation to
    Kyoto’s Arashiyama Bamboo Grove and the Louvre in Paris, balancing careful planning with a dash of spontaneous curiosity.
  culinary: Saltanat Francisco assists their mother in the kitchen, deftly rolling dough for manty and crafting flaky apple pies, displaying an intermediate cooking skill set that blends meticulous measuring
    with a penchant for tasting the batter before it’s fully baked, and they often savor the first bite while planning their next creation.
  core: Saltanat Francisco is a 12‑year‑old imaginative tinkerer who balances a love for orderly creative projects with a relaxed attitude toward deadlines, often drifting into day‑dreams during chores
    but always returning to finish a sketch or a LEGO set, and they take pride in every finished detail.
background:
  cultural: 'Saltanat comes from a Central Asian family originally from Uzbekistan. Her household maintains many cultural traditions: they speak Uzbek at home, celebrate Navruz (the Persian New Year) with
    special dishes such as plov and sumalak, and observe customs of hospitality and respect for elders. The family participates in local Central Asian community events in San Diego County, attending cultural
    festivals and weekly gatherings at a community center where traditional music, dance, and language classes are offered. While fully integrated into American school life, Saltanat retains a strong connection
    to her heritage through language, cuisine, and occasional visits to relatives abroad. She respects the religious practices of her family, which are predominantly Muslim, though she approaches them with
    a personal, flexible perspective.'
