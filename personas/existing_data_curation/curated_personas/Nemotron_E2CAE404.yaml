  career_goals: Saltanat aims to combine her love for animals and practical problem-solving by pursuing a career in veterinary medicine. She plans to attend a STEM-focused high school, earn a bachelor's
    degree in animal science, and later enroll in veterinary school. Her long-term ambition is to open a small, community-oriented clinic where she can provide affordable care to pets and livestock in the
    Central Asian diaspora. She also keeps an open mind about studying graphic design, seeing it as a complementary way to communicate scientific information visually.
