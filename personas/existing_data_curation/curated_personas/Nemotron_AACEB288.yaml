  hobbies: '[''intramural soccer'', ''cooking Mexican cuisine'', ''volunteering at community center (event organization)'', ''car restoration projects'', ''attending live music concerts'', ''hiking Sierra
    foothills'', ''participating in local festivals and block parties'']'
  career_goals: Julien aims to translate his practical abilities into a stable, full‑time position in the skilled‑trade sector, such as a certified HVAC technician or automotive service specialist. He plans
    to enroll in a community‑college certification program within the next year to formalize his expertise. Long‑term, he hopes to launch his own small handyman business that can serve the Modesto community,
    providing reliable, affordable services while giving him greater control over his schedule and income. He also seeks to achieve financial independence, reduce his current stress about employment, and
    eventually take on a mentorship role for younger Mexican‑American workers entering trade careers.
