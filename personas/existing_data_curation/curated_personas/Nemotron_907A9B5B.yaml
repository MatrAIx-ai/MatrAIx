personas:
  professional: Amy Dunavin, a seasoned construction executive with three decades of expertise in project management, cost control, and regulatory compliance, they harness their pragmatic curiosity and
    measured assertiveness to orchestrate multidisciplinary teams, negotiate contracts with precision, and champion green building initiatives across the Pittsburgh region, all while mentoring junior staff
    and balancing meticulous planning with the flexibility needed for on‑site challenges.
  sports: Amy Dunavin, an avid outdoors enthusiast, they spend the weekends hiking Ohiopyle’s rugged trails with the Ohiopyle Hiking Club and kayaking the Allegheny River through the Pittsburgh Senior Kayak
    Association, cheer on the Pittsburgh Steelers in football season and the Pittsburgh Pirates during summer, maintain a modest weekly cardio and strength routine to support knee health, and occasionally
    join a community tennis league to stay socially active.
  arts: Amy Dunavin, a dedicated member of a local woodworking club, they channel their love for architectural history into crafting furniture inspired by Frank Lloyd Wright while devouring historical fiction
    by Ken Follett and Hilary Mantel, attending exhibitions at the Carnegie Museum of Art featuring Georgia O’Keeffe, and unwinding to the folk sounds of Bob Dylan and performances of the Pittsburgh Symphony
    Orchestra.
  travel: Amy Dunavin, who favors meticulously planned road trips that blend historical sightseeing with nature immersion, they have explored the colonial streets of Williamsburg, the gardens of England’s
    Cotswolds, and the temples of Kyoto, and now dream of a summer pilgrimage to the medieval châteaux of the Loire Valley, balancing cultural enrichment with a modest travel budget and occasional family
    obligations.
  culinary: Amy Dunavin, a passionate home gardener and competent cook, they transform heirloom tomatoes, kale, rainbow carrots, and fresh herbs from their backyard into dishes like roasted beet and goat‑cheese
    salad, grilled trout with lemon‑dill butter, and hearty vegetable stew, while occasionally treating themselves to a fine‑dining tasting menu at Pittsburgh’s Farm House restaurant and obsessively polishing
    their handcrafted cedar cutting board.
  core: Amy Dunavin blends three decades of construction leadership with a hands‑on love for woodworking, a disciplined focus on sustainable building, and a quirky habit of hoarding extra screws and nails
    in labeled jars, making them both a pragmatic strategist and an ever‑curious craftsman.
background:
  cultural: As a white American raised in the greater Pittsburgh area, Amy grew up immersed in the city's industrial heritage and strong community ethos. Her family traces its roots to Northern European
    immigrants who settled in Pennsylvania during the early 20th century, fostering a work‑oriented, modest culture that values reliability and craftsmanship. The local steel and construction legacy shaped
    her appreciation for blue‑collar professions and the importance of safe, well‑executed building practices. She is a lifelong fan of Pittsburgh sports teams (Steelers, Penguins) and participates in regional
    traditions such as the annual Three Rivers Regatta and the Steel City Food Bank volunteer drive. Amy's cultural identity blends Mid‑Atlantic sensibilities—pragmatic, community‑focused, and open to new
    ideas—with a respect for the city's historic neighborhoods and a commitment to preserving its architectural character.
attributes:
  skills: '[''Project Management'', ''Cost Estimation'', ''Budgeting & Financial Analysis'', ''Contract Negotiation'', ''Construction Scheduling (Primavera P6, Procore)'', ''Regulatory Compliance (OSHA,
    Local Building Codes)'', ''Risk Management'', ''Team Leadership & Mentoring'', ''Sustainable Construction Practices (LEED)'', ''Building Information Modeling (Revit)'']'
  hobbies: '[''Hiking and Kayaking in Western Pennsylvania'', ''Gardening (vegetable and herb garden)'', ''Reading historical fiction and architectural history'', ''Woodworking and furniture making'', ''Volunteer
    mentoring at community career workshops'', ''Attending local theater productions'']'
  career_goals: Amy aims to transition into a senior executive role, such as Director of Operations or Vice President of Construction, where she can influence company-wide strategy and champion sustainability.
    She plans to obtain a LEED Accredited Professional credential and further her PMP certification to bolster her project management expertise. Mentorship is a priority; she intends to develop a structured
    mentorship program for women and underrepresented groups in construction within her organization. Over the next five years, she hopes to lead at least two flagship green building projects in the Pittsburgh
    region and eventually launch a boutique consulting firm focused on cost‑efficient, environmentally responsible construction management.
