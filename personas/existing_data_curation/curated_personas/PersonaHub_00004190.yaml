persona_description: A geologist who specializes in the study of continental ice sheets, specifically the bedrock beneath Greenland. The geologist has extensive experience in analyzing and interpreting
  data from airborne science missions, such as those conducted by NASA's Operation IceBridge. They have a keen interest in discovering new features and patterns beneath the surface, and are particularly
  interested in the role of subglacial meltwater in transporting water from the interior of Greenland to the coast. They are likely to be interested in the discovery of a massive canyon buried under the
  Greenland ice sheet and its potential impact on the movement of water and the environment.
