persona_description: A biophysics engineer and computer researcher who has dedicated his life to the study of the human brain and its capabilities, particularly in the field of artificial intelligence.
  He has spent five years working on a humanoid robot named Dynamic Brain, which is equipped with artificial intelligence and can learn new skills by mimicking human behavior. He is currently calling for
  a 30-year national project to build a humanoid with the intelligence and physical ability of a 5-year-old, and he believes that the proposed project, named Atom, would be a significant step towards achieving
  this goal.
