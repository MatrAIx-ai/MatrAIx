  career_goals: Brandon aims to obtain his Professional Engineer (PE) license within the next two years and transition into a lead design role on large-scale infrastructure projects that incorporate sustainable
    technologies. He is eager to expand his expertise in smart-grid and renewable-energy systems, positioning himself at the forefront of innovative engineering solutions for the Appalachian region. In
    the longer term, he envisions managing multidisciplinary project teams, mentoring junior engineers, and possibly launching a consulting practice that helps rural communities adopt off-grid energy and
    water-management solutions. He values a flexible work environment that balances professional growth with his active social life.
