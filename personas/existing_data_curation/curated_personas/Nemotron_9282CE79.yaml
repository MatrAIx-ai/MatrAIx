personas:
  professional: A mechanical engineer named Brandon Koenig leverages their SolidWorks expertise and Python automation skills to lead small design teams, translating complex infrastructure concepts into
    practical, sustainable solutions while juggling a love for off‑grid energy projects and a laid‑back, sometimes chaotic work style.
  sports: A sports‑enthusiast named Brandon Koenig spends Saturdays racing on their mountain bike with the Hurricane Hills Cycling Club, they play forward for the River City Soccer League’s “Hurricane United”
    team, and they cheer on the Pittsburgh Steelers and West Virginia Mountaineers while never missing a weekend hike on the Appalachian Trail.
  arts: An arts‑afficionado named Brandon Koenig regularly catches bluegrass shows at The Blue Note, they sway to Bill Monroe, Alison Krauss, and local act The Ridge Runners, they enjoy indie folk festivals,
    and they curate a Spotify playlist that mixes classic Appalachian fiddle tunes with modern folk‑rock like Mumford & Sons during their backyard BBQs.
  travel: A travel‑oriented explorer named Brandon Koenig favors spontaneous road trips to nearby nature spots like Shenandoah National Park and the Great Smoky Mountains, they dream of geothermal tours
    in Iceland and mountain biking in New Zealand, and they maximize their limited vacation days by booking last‑minute Airbnb cabins near rivers, always pairing their trips with local craft‑beer tastings.
  culinary: A culinary enthusiast named Brandon Koenig runs a backyard smoker where they perfect hickory‑smoked pork ribs, brown‑sugar‑paprika rubbed brisket, and Kanawha‑river‑caught trout tacos, they
    often pair their meals with locally brewed IPAs, while they occasionally order pizza when their perfect rub recipe isn’t ready.
  core: A mechanically‑minded, outdoors‑loving, socially‑driven 26‑year‑old named Brandon Koenig blends engineering precision with a laid‑back love for mountain biking, bluegrass, and spontaneous BBQ gatherings,
    all while they chase sustainable infrastructure dreams.
background:
  cultural: Brandon grew up in a middle-class family in the Kanawha River Valley of West Virginia, where a close-knit community and a strong work ethic shaped his outlook. The Appalachian heritage of the
    region introduced him to folk music, outdoor recreation, and a culture of self-reliance. While his parents emphasized academic achievement, they also encouraged community involvement, fostering his
    sociable nature. He identifies with the practical, friendly spirit of West Virginians and regularly participates in local traditions such as county fairs, high-school football games, and regional music
    festivals.
