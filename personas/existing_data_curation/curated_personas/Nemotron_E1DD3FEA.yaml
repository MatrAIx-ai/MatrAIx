personas:
  professional: Francisca Rodriguez, a retired mechanical and civil engineer with four decades designing irrigation and water‑management systems, channels a methodical, calm approach and CAD mastery into
    mentoring high school students, authoring a bilingual sustainable irrigation guide, and consulting local cooperatives on low‑cost water‑conservation projects.
  sports: Francisca Rodriguez, a dedicated early‑morning walker who joins the local senior pickleball league, roots for the Riverside Raptors baseball team and the national soccer side during World Cup
    season, and participates in quarterly community garden clean‑ups that double as light cardio, embodies a balanced, low‑impact fitness routine.
  arts: Francisca Rodriguez, an avid patron of folk music and traditional dance festivals, enjoys listening to the sones of regional mariachi groups, the classical piano works of Ludovico Einaudi, and the
    vibrant murals of local street artists, while also crafting intricate wooden toys for grandchildren that echo artisanal heritage.
  travel: Francisca Rodriguez, who prefers well‑researched itineraries and a blend of cultural immersion and natural scenery, has trekked the volcanic landscapes of Oaxaca, wandered the historic streets
    of Granada, Spain, dreams of exploring Patagonia’s glaciers, and frequently takes day trips to nearby vineyards, always packing a reusable water bottle and a notebook for sketching new vistas.
  culinary: Francisca Rodriguez, a skilled home cook who melds traditional dishes with modern techniques, regularly prepares mole negro with dark chocolate and chilhuacle peppers, roasts heirloom tomatoes
    for salsa verde, experiments with sous‑vide corn tortillas, and delights in sourcing fresh epazote and huitlacoche from the community garden.
  core: Francisca Rodriguez blends lifelong engineering precision with a calm curiosity, cultivating a garden, a workshop, and a community of learners while never missing a morning walk, despite a habit
    of hoarding old gardening catalogs.
background:
  cultural: Francisca was born in a rural town in Jalisco, Mexico, and moved to California in his early twenties to pursue higher education. He is bilingual in Spanish and English and maintains strong ties
    to his extended family, who visit regularly from Mexico. His upbringing emphasized community solidarity, respect for elders, and a deep appreciation for Mexican culinary and folkloric traditions. Living
    in Tulare, he blends his heritage with the agrarian culture of the Central Valley, celebrating holidays such as Día de los Muertos and participating in local Latino community events, while also embracing
    the multicultural fabric of his Californian surroundings.
attributes:
  skills: '[''Mechanical engineering'', ''Civil engineering'', ''Irrigation system design'', ''Data analysis'', ''Statistical analysis (R, Python)'', ''Project management'', ''Technical writing'', ''CAD
