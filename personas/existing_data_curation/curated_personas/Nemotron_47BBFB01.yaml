personas:
  professional: Leona Blyden, with over two decades of deep‑cleaning expertise and an associate degree in hospitality management, leverages their meticulous eye for aesthetics and eco‑friendly techniques
    to supervise cleaning crews, mentor emerging women professionals, and pursue a green cleaning certification as they plot the launch of their own boutique cleaning firm.
  sports: Leona Blyden follows the Memphis Grizzlies and New Orleans Saints, participates in a community walking club that meets each Saturday morning, practices gentle yoga at a local studio, and treats
    gardening as their low‑impact cardio, though they often skip workouts during high‑stress weeks.
  arts: Leona Blyden frequents the Mississippi Museum of Art and nearby community murals, draws inspiration from gospel choirs like the Mississippi Mass Choir and blues legends such as B.B. King, reads
    poets Maya Angelou and Langston Hughes, and they incorporate these influences into their quilting, which reflects a blend of traditional patterns and contemporary motifs.
  travel: Leona Blyden enjoys weekend road trips to historic Natchez and Vicksburg, savors the blues scene in New Orleans, dreams of a cultural pilgrimage to Savannah’s historic district, and they meticulously
    plan each journey to fit within their budget and limited vacation days.
  culinary: Leona Blyden loves cooking soulful Southern dishes like shrimp and grits, smoked catfish with cornmeal, and sweet potato pie, prefers ingredients such as cayenne pepper, collard greens, and
    buttermilk, and they upgrade recipes with healthier twists like quinoa and baked alternatives after attending local cooking workshops.
  core: Leona Blyden is a detail‑driven housekeeping veteran turned eco‑cleaning entrepreneur, and they channel their artistic curiosity, methodical planning, and emotional intensity into a life of purposeful
    service, creative expression, and careful financial stewardship.
background:
  cultural: Leona is a Black woman rooted in the rich cultural traditions of the Deep South. Growing up in Rankin County, she was shaped by the strong community ties of local churches, the rhythms of gospel
    and blues music, and the storytelling heritage of her family. Her upbringing emphasized resilience, mutual support, and a deep appreciation for African‑American artistic expressions such as quilting,
    oral histories, and Southern soul food. Leona participates in community events like Juneteenth celebrations and church fundraisers, where she often shares her culinary creations and crafts. While her
    family has a history of domestic service, she balances respect for that legacy with a modern drive for professional advancement and entrepreneurship. Her cultural identity informs her values of hospitality,
    empathy, and a desire to uplift others in her community.
attributes:
  skills: '[''Deep cleaning'', ''Stain removal'', ''Upholstery and fabric care'', ''Floor polishing'', ''Eco‑friendly cleaning methods'', ''Inventory management'', ''Task scheduling'', ''Team coordination'',
    ''Client communication'', ''Aesthetic space arrangement'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading African‑American poetry'', ''Journaling'', ''Gardening'', ''Attending gospel and blues concerts'', ''Quilting'', ''Puzzle and Sudoku solving'',
    ''Cooking workshops focused on Southern cuisine'']'
  career_goals: Leona aims to move from frontline housekeeping to a supervisory position, eventually becoming a lead housekeeper for a boutique hotel or senior‑living facility in the Jackson area. She plans
    to earn a certification in green cleaning and launch her own eco‑friendly cleaning business that serves local churches, community centers, and small enterprises. Over the next five years she intends
    to complete a bachelor’s degree in business administration to strengthen her entrepreneurial skills. Leona also hopes to mentor younger women of color entering the cleaning and service industry, and
    to develop workshops that blend cleaning best practices with basic interior design principles. Personally, she seeks greater financial stability for a comfortable retirement and hopes to purchase a
    modest property where she can host art‑related community gatherings.
