persona_description: A conservation biologist who specializes in the study of mangrove forests and their ecological importance, particularly in the Red Sea region. This person has conducted extensive research
  on the mangrove ecosystems in Egypt and has worked with local authorities to establish nurseries to propagate mangroves. The person is knowledgeable about the threats facing mangrove forests and is interested
  in conducting a systematic survey of the region in November 2010. They are also interested in collecting ornithological data and have conducted previous ornithological surveys in the region.
