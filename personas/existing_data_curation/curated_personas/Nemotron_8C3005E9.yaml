personas:
  professional: Kevin Mcmillan, a retired carpenter and community organizer, leverages his hands‑on skill set, oral‑history interviewing talent, and love for visual culture to mentor teens in creative writing
    and co‑curate a traveling African‑American art exhibit for the Dallas Public Library, balancing meticulous planning with a willingness to improvise when projects evolve.
  sports: Kevin Mcmillan, a devoted fan of the Dallas Mavericks, Cowboys, and Texas Rangers, complements game days with low‑impact exercise like daily neighborhood walks, weekly tai chi classes at the community
    center, and occasional friendly pickleball matches at the local recreation club, keeping their fitness routine light yet consistent.
  arts: Kevin Mcmillan immerses themselves in the Dallas art scene, frequenting the Dallas Museum of Art, the Kessler Plaza murals, and pop‑up installations by local creators such as Erika Hernández, while
    also attending weekly gospel choir concerts at the historic Jeffersonian Church, drawing inspiration for their own photography projects.
  travel: Kevin Mcmillan prefers short, purposeful trips, often planning weekend visits to nearby cultural sites like the Fort Worth Stockyards, the Waco Mammoth Site, and the National Museum of African
    American History in Washington, D.C., blending curiosity for history with modest travel budgets that prioritize train rides and affordable Airbnbs over luxury hotels.
  culinary: Kevin Mcmillan enjoys cooking soulful dishes, perfecting collard greens seasoned with smoked paprika, sweet‑potato biscuits, and a daring shrimp étouffée, while also experimenting with seasonal
    vegetables from their garden, often sharing these meals at block‑party gatherings where they swap recipes with neighbors.
  core: Kevin Mcmillan is a curiosity‑driven, garden‑loving retiree who blends community mentorship, art appreciation, and soulful cooking into a lively but occasionally forgetful routine that balances
    disciplined budgeting with spontaneous cultural splurges.
background:
  cultural: Kevin is an African‑American who grew up in the Dallas metropolitan area during the civil‑rights era, absorbing a blend of Southern Black traditions and the dynamic multicultural currents of
    Texas. His family’s church community instilled values of cooperation, harmony, and service, while the local music scene—blues, jazz, and gospel—shaped his artistic sensibilities. He maintains strong
    ties to the African‑American culinary heritage of soul food, and his community involvement reflects the historic emphasis on communal support and storytelling within Black neighborhoods of Dallas County.
