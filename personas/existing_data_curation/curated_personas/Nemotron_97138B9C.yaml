personas:
  professional: Aimee Mclellan, a seasoned hospitality executive with over two decades of senior management experience, leverages a data‑driven, curiosity‑infused approach to overhaul hotel operations,
    championing AI‑enabled revenue forecasting while rigorously vetting each new technology to ensure measurable performance gains.
  sports: Aimee Mclellan, an avid runner who co‑hosts a Central Park running club, supports the New York Knicks, Yankees, and Rangers, and consistently integrates interval training and weekend yoga sessions
    to maintain stamina, yet occasionally skips cross‑training due to a tendency to overcommit to social events.
  arts: Aimee Mclellan, a backstage volunteer passionate about set design at a local community theater, draws inspiration from Broadway productions like “Hamilton,” admires the lighting work of Jules Fisher,
    and unwinds by listening to Miles Davis and attending MoMA exhibitions featuring contemporary photographers.
  travel: Aimee Mclellan, who blends meticulous itinerary planning with a love for spontaneous culinary adventures, frequently escapes to nearby wine regions such as the Finger Lakes, has recently explored
    the historic streets of Lisbon, and hopes to immerse themselves in the tea ceremonies of Kyoto while balancing family responsibilities.
  culinary: Aimee Mclellan, an enthusiastic home chef, specializes in globally themed dinner parties featuring dishes like Moroccan lamb tagine with preserved lemons, Thai green curry with fresh basil and
    kaffir lime, and Italian risotto infused with saffron, often sourcing ingredients from farmer's markets to impress their friends.
  core: Aimee Mclellan, a high‑energy hospitality leader whose competitive edge is tempered by a relentless quest for mindfulness, channels their sociable spirit into running, theater, and culinary gatherings,
    while wrestling with anxiety that fuels both their ambition and occasional overextension.
background:
  cultural: Aimee was raised in a middle‑class family of Irish‑Scottish descent in suburban New Jersey before moving to Manhattan for college, where she earned her business degree. Her upbringing emphasized
    practicality, self‑reliance, and a strong work ethic, values that mesh with the fast‑paced, results‑driven culture of New York’s hospitality scene. Though she identifies as White American, her adult
    life in the culturally diverse borough has given her a cosmopolitan outlook, an appreciation for the city’s multicultural palate, and a nuanced understanding of client expectations across ethnic and
    socioeconomic lines. Her marriage and long‑standing community ties reinforce a balance between professional ambition and personal support networks.
attributes:
  skills: '[''Hotel Operations Management'', ''Revenue Management'', ''Budgeting & Financial Planning'', ''Staff Recruitment & Development'', ''Guest Experience Design'', ''Data Analysis & KPI Tracking'',
