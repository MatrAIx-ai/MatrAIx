  career_goals: Aimee’s immediate ambition is to lead a pilot program that integrates AI‑based forecasting tools to boost RevPAR by at least 8 % across her property. Within the next five years she targets
    promotion to Regional Manager, overseeing a portfolio of boutique hotels in the Northeast, and to launch a mentorship network for women in hospitality. Long‑term, she envisions becoming a Vice President
    of Operations for a lifestyle‑brand hotel chain, shaping industry standards for guest wellness, sustainability, and data‑centric decision making. Parallel to these professional aims, she seeks deeper
    emotional resilience, planning to complete an executive coaching certification and adopt structured mindfulness practices to better manage her anxiety.
