  hobbies: '[''Cooking (Asian-fusion cuisine)'', ''Hiking local trails (Irvine Ranch)'', ''Photography (nature and urban)'', ''DIY IoT projects with Raspberry Pi'', ''Board games with friends'', ''Strategy
