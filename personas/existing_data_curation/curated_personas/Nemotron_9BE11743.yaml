  career_goals: Looking ahead, Yim aims to transition from a network administrator role to a senior network engineer or cloud-network architect position, where he can design end-to-end, software-defined
    networking solutions for large enterprises. He plans to earn advanced certifications such as CCNP, eventually the CCIE, and the AWS Certified Solutions Architect – Professional. While his curiosity
    drives him to explore AI-enabled network automation and intent-based networking, his practicality makes him seek roles that also offer predictable hours and remote-work flexibility, allowing him to
    protect his family time and reduce stress. Over the next five years, he hopes to lead a small engineering team, mentor junior staff, and contribute to the company's strategic roadmap for secure, scalable
    infrastructure.
