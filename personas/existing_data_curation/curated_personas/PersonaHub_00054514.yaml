persona_description: A historian who specializes in the study of ancient hunting and coursing sports, particularly the history of the Greyhound breed and its evolution from hunting dogs to coursing dogs.
  Their research interests include the objectives and tactics of coursing, the origins and spread of the sport, and the cultural and social significance of coursing in ancient and medieval Europe. They
  have a keen interest in the history and evolution of the Greyhound breed, and how it has been shaped by its role in coursing.
