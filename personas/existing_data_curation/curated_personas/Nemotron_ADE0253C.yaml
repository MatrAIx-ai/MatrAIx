  hobbies: '["Volunteer work at church kitchen","Hosting dinner parties","Community book club","Home cooking (Greek and Southern cuisine)","Gardening","Zumba classes","Knitting","Keeping a gratitude journal"]'
  career_goals: Mery aims to secure a full‑time administrative or community‑outreach role that offers a predictable routine and the opportunity to interact with people daily. She plans to complete a certificate
    in Medical Office Administration within the next year, positioning herself for a stable clerical position at the nearby Douglas Regional Hospital. In the longer term, she hopes to become an office manager
    or a coordinator for a nonprofit serving seniors, where she can combine her organizational strengths, compassion, and sociable nature. She also entertains the idea of launching a small event‑planning
    business focused on local family gatherings.
