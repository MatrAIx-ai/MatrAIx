personas:
  professional: Mery Kakouras, a 29‑year‑old community‑focused administrative professional, leverages meticulous budgeting, event‑planning expertise, and a natural flair for public speaking to excel in
    volunteer coordination and to position herself for a medical office coordinator role at a local hospital.
  sports: Mery Kakouras stays active through a weekly Zumba class at the community center, supports the Atlanta Braves and Falcons with enthusiastic game‑day gatherings, and enjoys casual hiking on nearby
    state trails during the cooler months.
  arts: Mery Kakouras finds artistic fulfillment by devouring contemporary fiction from authors like Sally Rooney and Colson Whitehead, dancing to classic performances by the local symphony, and curating
    playlists that feature Fleetwood Mac, Adele, and emerging indie folk singers.
  travel: Mery Kakouras prefers short, well‑planned trips that combine cultural immersion and culinary exploration, having enjoyed the historic streets of Savannah and the bustling markets of New Orleans,
    while dreaming of a future vacation to the Amalfi Coast to study Mediterranean cooking techniques.
  culinary: Mery Kakouras, an avid home cook, blends family recipes with Southern comfort food by mastering dishes such as lamb roast with rosemary, fried chicken with buttermilk brine, and a signature
    spinach‑feta spanakopita, all seasoned with fresh herbs like oregano and thyme from their garden.
  core: Mery Kakouras balances a love for routine and community connection with a tendency to over‑worry, turning weekly dinner parties, meticulous budgeting, and a gratitude journal into the anchors that
    keep their sociable, talkative spirit grounded.
background:
  cultural: Mery comes from a Greek‑American family that settled in the Atlanta metropolitan area a generation ago. Raised in Douglas County, she was brought up with a blend of Greek Orthodox traditions—such
    as celebrating Easter and Greek holidays—and typical Southern values of hospitality, community involvement, and pragmatism. Her family’s emphasis on close‑knit relationships, hard work, and respect
    for tradition has shaped her practical outlook and love for communal gatherings.
attributes:
  skills: '["Customer service","Event planning","Office administration","Scheduling and calendar management","Budgeting and basic bookkeeping","Public speaking","Social media management for community groups","Hospitality
