  career_goals: Michael aims to advance to a district sales manager role within the next two years, positioning himself for eventual promotion to regional director. He plans to pursue an MBA part‑time to
    deepen his strategic and financial expertise. Long‑term, he envisions leading a multi‑state sales operation where he can implement data‑driven processes that improve team efficiency while maintaining
    a stable routine for his family. He also has a budding interest in launching a consulting practice focused on sales team optimization once he attains senior leadership experience.
