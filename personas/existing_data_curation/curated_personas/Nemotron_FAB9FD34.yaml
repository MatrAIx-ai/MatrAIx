personas:
  professional: Maria Taveras, a bilingual medical records specialist proficient in Epic, Cerner, ICD‑10/CPT coding and PowerBI, channels her competitive drive and curiosity into turning messy health data
    into clear visual insights, while her relaxed, mildly disorganized style lets her pivot quickly between analytics, workflow optimization, and cross‑department communication.
  sports: Maria Taveras enjoys weekend hikes on modest New York trails with a close‑knit group of friends, follows the New York Knicks and the New York Giants for a touch of city pride, and plays in a casual
    co‑ed soccer league at a neighborhood community center, treating fitness as a flexible, low‑pressure routine.
  arts: Maria Taveras, a watercolor enthusiast and street photographer, spends Saturday afternoons wandering contemporary galleries in New York admiring works by Kerry James Marshall and Yayoi Kusama, curates
    playlists that swing from Bon Iver to Manu Chao, and proudly displays a limited‑edition Banksy print in her studio, letting art fuel her creative curiosity.
  travel: Maria Taveras favors spontaneous, culturally immersive trips, often jet‑setting from NYC to Oaxaca’s historic streets or Cartagena’s Caribbean coast for vivid festivals, while meticulously planning
    occasional weekend escapes to the Catskills for hiking, balancing a modest travel budget with a love for authentic local experiences.
  culinary: Maria Taveras, an avid home cook, masters traditional dishes like baleadas and tamales using homemade masa and panela cheese, experiments with sprouted quinoa bowls and ramen broth infused with
    kombu, and delights in sourcing fresh cilantro and avocados at the Union Square Greenmarket for weekend family meals.
  core: Maria Taveras blends a data‑driven competitive mindset with a laid‑back artistic soul, juggling ambitious career goals, spontaneous creativity, and a habit of loosely organized planning that keeps
    life perpetually dynamic.
background:
  cultural: Maria is a first‑generation American of Honduran descent. She grew up in a bilingual household where Spanish was spoken daily, and she regularly participated in community celebrations such as
    Fiesta Hondureña and traditional Catholic holidays. Her family places high value on close‑knit relationships, respect for elders, and preserving cultural rituals like cooking and dancing. While she
    embraces the multicultural vibrancy of the New York area, she also carries forward Honduran customs—particularly through food, music, and community service—shaping her identity as a bridge between her
    heritage and her professional world.
