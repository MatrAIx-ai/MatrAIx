  career_goals: Maria aims to transition from a specialist role to a leadership position in healthcare informatics, targeting a manager or director role overseeing data strategy for a regional hospital
    network. She plans to earn the Registered Health Information Administrator (RHIA) certification and deepen her expertise in emerging technologies such as AI-driven clinical decision support. Ultimately,
    she envisions launching a consultancy that helps healthcare providers integrate innovative data solutions while preserving patient privacy, allowing her to blend her competitive spirit with her curiosity
    for unconventional ideas.
