    at community events"]'
  career_goals: Ricky aims to complete his bachelor's degree in communications and transition into a community outreach coordinator role for a nonprofit focused on youth empowerment and cultural heritage
    preservation in the South. In the next five years, he envisions leading regional festivals that blend traditional Creole celebrations with modern digital promotion, and eventually launching his own
    nonprofit media platform that showcases local stories and supports economic development in West Feliciana Parish.
