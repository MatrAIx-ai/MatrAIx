personas:
  professional: Ricky Defrand, a 21‑year‑old communications major, channels their strong public‑speaking and event‑coordination talents into dynamic community outreach projects, blending meticulous planning
    with spontaneous digital storytelling that captivates local youth on TikTok and at live festivals.
  sports: Ricky Defrand plays pickup basketball at the neighborhood community center, follows the New Orleans Pelicans and LSU Tigers, and spends weekends fishing on the Mississippi River, favoring spontaneous
    hoop sessions over regimented workouts while they keep a relaxed yet active lifestyle.
  arts: Ricky Defrand pours energy into drumming for a local band, sings in the church choir, curates TikTok videos inspired by artists like Kendrick Lamar and Chance the Rapper, and draws creative inspiration
    from the soulful sounds of regional blues legends such as Dr John, weaving these influences into their community storytelling.
  travel: Ricky Defrand crafts DIY road‑trip itineraries that include a music‑filled weekend in New Orleans’ French Quarter, a beach getaway to Gulf Coast towns like Biloxi, and occasional out‑of‑state
    visits to Washington, D.C., balancing a shoestring budget with a desire to soak up historic sites and vibrant cultural festivals.
  culinary: Ricky Defrand thrives in the kitchen, mastering roux‑based dishes like gumbo, jambalaya, and étouffée using Andouille sausage and shrimp, while they also experiment with spicy Cajun‑style sauces
    and host hot‑sauce challenges with friends during family gatherings.
  core: Ricky Defrand is a charismatic, talkative 21‑year‑old who blends community activism with a love for drumming, digital content creation, and Southern comfort food, all while juggling a habit of forgetting
    bills and overbooking social events.
background:
  cultural: Ricky was raised in Saint Francisville, a small town in West Feliciana Parish with deep African‑American roots and a rich Creole heritage. His family’s traditions blend Southern gospel, oral
    storytelling, and the culinary flavors of the Mississippi Delta. Growing up, he participated in church gatherings, local heritage festivals, and family cookouts that emphasized community solidarity
    and pride in Black history. These experiences, combined with the proximity to New Orleans’ vibrant music scene, have shaped his cultural identity and his commitment to preserving and celebrating his
    community’s legacy.
