  hobbies: '[''Badminton'', ''Table tennis'', ''Hiking'', ''Cooking'', ''Smart‑home tech tinkering'', ''Tech meetups'', ''Public speaking'', ''STEM mentoring'', ''Yoga'', ''Architecture documentaries'']'
  career_goals: Wensheng aims to progress from senior drafter to BIM manager and eventually to licensed architect or director of design within a leading Bay Area firm. He plans to obtain professional certifications
    such as LEED AP and PMP to strengthen his credibility in sustainable and project‑focused delivery. His long‑term ambition is to launch his own consultancy that integrates advanced parametric modeling,
    VR visualization, and smart‑city technologies with rigorous business strategy, delivering cost‑effective, high‑quality infrastructure projects for the region. He also aspires to become a recognized
    thought leader, speaking at industry conferences and mentoring the next generation of designers, while maintaining a reputation for disciplined execution and innovative problem‑solving.
