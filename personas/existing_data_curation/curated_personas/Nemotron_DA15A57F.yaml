personas:
  professional: Wensheng Lee is a senior architectural drafter in the Bay Area who leverages AutoCAD, Revit, SketchUp, Civil 3D and BIM coordination to produce clash‑free construction documents, and their
    disciplined, achievement‑driven mindset and sociable nature make them the go‑to person for cross‑team design reviews and client presentations.
  sports: Wensheng Lee is a regular participant in Bay Area badminton leagues and weekend table tennis tournaments, often organizing friendly matches for colleagues, and they also hike coastal trails like
    the Pacific Crest Trail sections for fitness, while cheering on the local NBA team, the Golden State Warriors, as their favorite professional sports affiliation.
  arts: Wensheng Lee nurtures a love for architecture documentaries and modern art installations, regularly attending screenings of works by Zaha Hadid and exhibitions at the San Francisco Museum of Modern
    Art, while they also enjoy listening to indie folk artists such as Fleet Foxes during their design sessions.
  travel: Wensheng Lee prefers thoughtfully planned trips that blend cultural immersion with outdoor adventure, having recently explored the coastal cliffs of Big Sur and the historic neighborhoods of Kyoto,
    and they keep a wishlist of hiking the Inca Trail in Peru and visiting the Aurora Borealis in Iceland, balancing travel costs with a disciplined savings plan.
  culinary: Wensheng Lee delights in cooking family recipes that marry time‑honored flavors with modern twists, often preparing soy‑glazed salmon with quinoa and a spiced tofu stir‑fry, while their culinary
    skill level hovers between enthusiastic home chef and experimental food technologist.
  core: Wensheng Lee is a meticulously organized, talkative design professional who channels anxiety into precision drafting, balances a love for competitive racket sports with weekly yoga, and occasionally
    forgets to log off work emails after midnight.
background:
  cultural: Wensheng is a first‑generation Chinese‑American; his parents immigrated from Taiwan and keep Mandarin as the household language. He celebrates Lunar New Year and the Mid‑Autumn Festival with
    family, honoring traditions such as reunion dinners and lantern displays. Core cultural values of hard work, respect for elders, and a deep emphasis on education shape his disciplined approach to career
    and personal growth. Living in Los Altos, he blends these Eastern influences with the innovative, collaborative spirit of Silicon Valley, valuing both communal harmony and individual ambition. His marriage
    reflects a modern partnership that respects cultural expectations while embracing contemporary egalitarian ideals, and he frequently shares his heritage through food, storytelling, and participation
    in local multicultural events.
