persona_description: A medical oncologist who specializes in the diagnosis and treatment of neuroendocrine tumors, particularly those that have metastasized to other organs. This individual is knowledgeable
  in the use of advanced imaging techniques and minimally invasive procedures to detect and diagnose these tumors. They have experience with the development of innovative approaches to diagnose and attack
  these cancers, including the use of Lutathera, a personalized treatment for some patients with metastatic neuroendocrine tumors of the pancreas, gut, or stomach. This expert has a team of dedicated nurses,
  technologists, and physicists who work closely with them to provide patient-focused personal and comprehensive care for planning and safe delivery of PRRT.
