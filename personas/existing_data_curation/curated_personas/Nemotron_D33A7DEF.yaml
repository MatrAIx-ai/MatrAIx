personas:
  professional: George Terry leverages a decade of secretarial expertise and meticulous calendar management to streamline office operations, balancing a need for predictable workflows with a relaxed, flexible
    approach that allows them to adapt to last‑minute changes while quietly asserting leadership as they pursue a supervisory manager role.
  sports: George Terry enjoys low‑key fitness through early‑morning rides with the Bloomington Cycling Club and weekend angling on Lake Bloomington, cheering on the Chicago Cubs and the Illinois State Redbirds
    while rarely joining organized team sports.
  arts: George Terry finds quiet inspiration in constructing model‑railways while listening to Bob Dylan and Chopin, attending occasional concerts at the Bloomington Center for the Performing Arts, and
    collecting reproductions of Norman Rockwell’s Americana scenes.
  travel: George Terry prefers meticulously planned weekend getaways that blend historical tours—like a visit to Gettysburg and a day trip to Chicago’s Art Institute—with the flexibility to linger at a
    quiet lakeside cabin, balancing a modest travel budget with a longing to explore the Scottish Highlands.
  culinary: George Terry delights in farm‑to‑table meals, regularly preparing grilled trout from Lake Bloomington with fresh dill, a beet‑and‑goat‑cheese salad from garden harvests, and occasionally indulging
    in a hearty chicken pot pie, though they sometimes skip meals during busy work weeks.
  core: George Terry is a methodical planner who secretly hoards fishing lures, battles chronic worry with self‑help audiobooks, and finds calm in the click‑clack of model‑railway tracks.
background:
  cultural: George grew up in a small town in central Illinois, raised in a traditionally white, Midwestern family with German‑Irish ancestry. His upbringing emphasized modesty, hard work, community involvement,
    and a practical outlook on life. The local culture of Bloomington‑McLean County, with its agricultural roots and close‑knit community, shaped his values of reliability, politeness, and a preference
    for straightforward solutions. He celebrates regional traditions such as county fairs, high‑school football games, and Thanksgiving gatherings, and he maintains ties to a local Methodist congregation,
    reflecting the modest, faith‑oriented background common among many Midwestern families.
attributes:
  skills: '["Calendar Management", "Meeting Coordination", "Travel Arrangements", "Microsoft Office Suite", "Google Workspace", "Document Preparation", "Data Entry", "Records Management", "Customer Service",
