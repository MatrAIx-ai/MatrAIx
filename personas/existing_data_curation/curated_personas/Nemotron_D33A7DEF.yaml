  hobbies: '["Fishing", "Gardening", "Historical Non-fiction Reading", "Model-Railway Building", "Walking/Biking on Local Trails", "Podcast Listening (Productivity & Mental Wellness)", "Small Book Club",
    "Volunteer Work at Local Library"]'
  career_goals: George aims to advance to a supervisory office manager role within the next three years, leveraging his practical experience to lead a small administrative team and streamline operations.
    He plans to earn the Certified Administrative Professional (CAP) credential to bolster his expertise and credibility. He also hopes to develop stronger organizational habits to reduce his stress and
    improve productivity, ultimately achieving a better work‑life balance that allows more time for his family and personal interests. Long‑term, he envisions a transition into a consultancy role where
    he can advise small businesses on efficient office practices.
