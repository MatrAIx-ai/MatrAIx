persona_description: A Harvard T.H. Chan School of Public Health fellow working on climate and human health, particularly focusing on the health impacts of climate change on patients in the United States.
  Dr. Dresser is concerned about the increasing health threats related to climate change and is incorporating climate change into his patient care, particularly in the context of heatstroke and the spread
  of diseases due to rising sea levels and droughts. Dr. Dresser is part of a push by the American Medical Association to teach medical students about the health risks of climate change and is dedicated
  to helping patients prepare for and cope with the health issues related to climate change.
