personas:
  professional: Mercedes Roman is a meticulous community field interviewer who leverages bilingual fluency and disciplined note‑taking to capture nuanced oral histories, while channeling their curiosity
    and artistic sensibility into designing trauma‑informed interview protocols that honor cultural narratives and aim for a senior project coordinator role within a regional health‑outreach organization.
  sports: Mercedes Roman enjoys low‑impact fitness, regularly jogging along the Rio Grande River trail and participating in the Weslaco Senior Walking Club, while cheering for the Rio Grande Valley Vipers
    in basketball and the Houston Astros during baseball season, and they occasionally play pickleball at the local community center.
  arts: Mercedes Roman immerses themselves in creative expression by painting folk motifs inspired by local murals, attending live performances by Los Tigres del Norte, Banda El Recodo, and Mariachi Vargas
    de Tecalitlán, and collecting prints from Frida Kahlo exhibitions, using these artistic experiences to fuel both personal joy and community storytelling.
  travel: Mercedes Roman prefers purposeful travel that blends cultural immersion with family connections, having visited Oaxaca to study regional dishes, explored the historic streets of San Miguel de
    Allende, and taken road trips to Austin and San Antonio for music festivals, while planning a future pilgrimage to the indigenous art sites of Chiapas.
  culinary: Mercedes Roman delights in cooking traditional dishes such as cochinita pibil, mole rojo, and tamales de elote, skillfully using home‑grown chilies, cilantro, and tomatoes, and they often experiment
    with fresh corn masa and various dried chilies like ancho and pasilla, though they sometimes over‑season out of enthusiasm.
  core: Mercedes Roman blends disciplined research expertise with an artist’s heart, coping with anxiety through mindfulness, splurging on folk art, and championing community heritage while juggling occasional
    financial impulse buys.
background:
  cultural: Mercedes is a first‑generation Mexican‑American who grew up in the border region of the Rio Grande Valley. Her family maintains strong ties to Mexican traditions—Catholic celebrations, Día de
    los Muertos altars, and regional cuisine—while also navigating the everyday realities of life in Texas. Bilingual and bicultural, she moves fluidly between Spanish‑speaking community circles and English‑dominated
    professional settings. The close‑knit family structure, respect for elders, and communal values of her Mexican heritage shape her identity, while the entrepreneurial, resilient spirit of the Texas border
    city influences her work ethic and determination. This blend of cultures informs her worldview, her approach to interviewing, and her commitment to preserving and showcasing the rich heritage of Mexican‑American
    families in her community.
attributes:
  skills: '[''Interviewing'', ''Active Listening'', ''Bilingual Communication (Spanish/English)'', ''Data Collection'', ''Survey Design'', ''Community Outreach'', ''Organizational Management'', ''Time Management'',
    ''Record Keeping'', ''Crisis Intervention Awareness'']'
  hobbies: '[''Folk Art Painting'', ''Attending Regional Mexican Music Concerts'', ''Traditional Cooking'', ''Gardening (chiles, herbs, vegetables)'', ''Participating in Cultural Festivals (Día de los Muertos,
    Luminarias)'', ''Journaling'', ''Reading (Mexican literature, self‑help)'', ''Mindfulness and Breathing Exercises'']'
  career_goals: Mercedes aims to advance from field interviewer to senior project coordinator within a regional health‑outreach organization that focuses on mental‑wellness and cultural preservation in
    the Rio Grande Valley. She aspires to develop a training program for new interviewers that blends cultural competence with trauma‑informed techniques, leveraging her own experience navigating emotional
    distress. Over the next five years she hopes to complete a GED and enroll in community‑health courses, positioning herself to lead a community‑based oral‑history archive that documents Mexican‑American
    family stories through multimedia exhibitions. Ultimately, she envisions using her love of art and storytelling to create lasting cultural resources while advocating for better mental‑health services
    for her community.
