  career_goals: Mary dreams of becoming an astronaut‑scientist who explores space and later shares those adventures through illustrated children’s books. She also envisions herself as a wildlife illustrator,
    combining her love for animals, nature, and art to educate others. Her goal is to use both scientific curiosity and artistic talent to inspire wonder and kindness in her future audience.
