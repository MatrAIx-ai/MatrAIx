personas:
  professional: Mary Oliver, a budding junior astronomer-designer who merges her love for fantastical LEGO planets with systematic problem-solving, dreams of turning her imaginative sketches into future
    space-mission concepts.
  sports: Mary Oliver, an enthusiastic participant in the Wentzville youth soccer league and a regular attendee of community swim lessons, spends weekends hiking the nearby streams with her family, proudly
    cheering for the St. Louis Cardinals during spring baseball season, and treats fitness as a playful adventure rather than a chore.
  arts: Mary Oliver, an avid drawer of fantastical scenes inspired by the whimsical animation of Hayao Miyazaki and the storytelling of J.K. Rowling, supplements her creative routine with beginner piano
    pieces by Beethoven and the soothing piano works of Ludovico Einaudi, weaving these influences into her weekly library book club discussions.
  travel: Mary Oliver, a curious explorer who prefers family road trips to nearby attractions like the Gateway Arch in St. Louis and the Lake of the Ozarks, plans each outing with a hand-drawn map, dreams
    of visiting the mystical forests of Iceland, and balances her love for adventure with the safety of familiar routines.
  culinary: Mary Oliver, a budding chef who delights in assembling peanut-butter-jelly sandwiches, mixing pancake batter with fresh blueberries, and practicing simple spaghetti-and-meatballs recipes with
    her mom, favors crunchy carrots and cheese sticks, and jokes that her favorite 'gourmet' dish is a perfectly toasted grilled cheese.
  core: Mary Oliver, a meticulously organized eight-year-old with an imagination as vivid as a rainbow-colored LEGO galaxy, balances a quiet love for solitary puzzle-solving with a heartfelt desire to keep
    friends and family harmonious, even if that sometimes means hoarding her favorite crayons.
background:
  cultural: Mary was born and raised in Wentzville, a suburban community in St. Charles County, Missouri. The area is characterized by close‑knit neighborhoods, a strong emphasis on community involvement,
    and a love for outdoor recreation such as hiking, fishing, and attending the county fair. Her family values education, creativity, and courteous interaction, reflecting typical Midwestern sensibilities
    of reliability and modesty. She attends a public elementary school that offers arts and science enrichment programs, and she participates in local traditions like holiday storytimes at the public library,
    seasonal festivals, and occasional church celebrations that reinforce a sense of togetherness.
