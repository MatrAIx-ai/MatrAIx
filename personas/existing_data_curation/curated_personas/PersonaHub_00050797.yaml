persona_description: 'Catherine Jackson, a historian and chemist, is a prominent figure in the field of organic chemistry. She is a visiting scholar at the Max Planck Institute for the History of Science
  in Berlin and holds honorary appointments in the Department of Science and Technology Studies at University College London and in the Centre for the History of Science, Technology and Medicine at Imperial
  College London. Jackson is the 2011−12 Gordon Cain Fellow at the Chemical Heritage Foundation, where she is working to complete the manuscript of her academic monograph Material World: Analysis, Synthesis,
  and the Making of Modern Chemistry, a new history of the origins and development of synthetic organic chemistry. Her work focuses on recovering a lost world of chemists in laboratories filled with glassware,
  a world of purification, characterization, and standardization, of reliable reactions and inescapable risks, of textbooks and manuals of practice, of training and labor. Jackson has published on the history
  of chemistry in leading European journals and is coeditor, with Hasok Chang, of An Element of Controversy: The Life of Chlorine in Science, Medicine, Technology and War (British Society for the History
  of Science, 2007). She is a member of the Royal Society of Chemistry and has been honored with a Chartered Chemist award.'
