  hobbies: '[''drawing and sketching'', ''digital art (tablet)'', ''LEGO building and robotics'', ''Scratch game creation'', ''reading sci‑fi graphic novels'', ''4‑H engineering projects'', ''birdwatching
    and nature photography'', ''keyboard practice'', ''pickup soccer'']'
  career_goals: Max dreams of turning his love for art and technology into a career as a game designer or interactive media creator. He hopes to study animation and computer science in high school and later
    pursue a degree in digital arts or game development. He also imagines working on environmentally focused projects, such as designing educational games that teach kids about conservation. While he acknowledges
    that he is still exploring, his ambition is to blend creativity with technical skill to produce experiences that inspire and entertain people.
