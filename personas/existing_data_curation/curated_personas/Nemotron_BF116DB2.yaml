personas:
  professional: Henry Chavanne is a budding farm aide who, even at age two, shows organized curiosity by lining up toy tractors, methodically placing seed packets, and eagerly assisting parents with simple
    chores, foreshadowing a future in sustainable agriculture where their practical, predictable nature will shine.
  sports: Henry Chavanne loves toddling in the local park, chasing after a bright red soccer ball used by the community youth league, attends a Sunday morning parent‑child gymnastics class at the community
    center, and cheers for the Iowa Hawkeyes football team on game day.
  arts: Henry Chavanne delights in splashing color with finger paints, humming along to nursery rhymes sung by their mother, and has a soft spot for the gentle fiddle tunes of local folk musician Greg Brown
    that often fill the house on Saturday evenings.
  travel: Henry Chavanne enjoys short family road trips, especially the annual drive to the Iowa State Fair where they love the bright lights and petting zoo, and dreams of a future visit to Chicago's Museum
    of Science and Industry, though current explorations stay within a two‑hour radius.
  culinary: Henry Chavanne eagerly reaches for buttery corn on the cob at family dinners, munches on soft oatmeal with a drizzle of honey, loves homemade apple sauce, and is still perfecting their tiny‑spoon
    technique.
  core: Henry Chavanne is a methodical little farm‑helper who finds comfort in routine, tucks away pennies, monitors a spotty rash, and fills afternoons with finger paints, soccer balls, and county‑fair
    excitement.
background:
  cultural: 'Henry was born and raised in Missouri Valley, a small farming community in Harrison County, Iowa. His family embodies typical Midwestern values: close‑knit family ties, community involvement,
    and a respect for routine and hard work. He participates in local traditions such as county fair visits, church gatherings, and holiday celebrations that emphasize togetherness and gratitude. The rural
    setting offers frequent exposure to open fields, farms, and seasonal activities, shaping his appreciation for nature, simplicity, and community support.'
attributes:
  skills: '[''Walking'', ''Running'', ''Climbing low furniture'', ''Jumping from low steps'', ''Stacking blocks'', ''Nesting cups'', ''Simple shape puzzles'', ''Understanding two‑step instructions'', ''Basic
    vocabulary (~200 words)'', ''Following daily routines'']'
  hobbies: '[''Stacking blocks'', ''Sorting crayons by color'', ''Simple puzzles'', ''Collecting leaves'', ''Watching farm animals'', ''Riding a tricycle'', ''Listening to nursery rhymes'', ''Picture book
    storytime'']'
  career_goals: Though only two years old, Henry shows early curiosity about roles that involve building and helping. He often pretends to fix toys with a plastic wrench and enjoys watching construction
    vehicles at the local park. His caregivers nurture these interests, encouraging him to explore building blocks and role‑play games. In the coming years, Henry may aim to become a builder or a helper,
    reflecting his practical and organized personality, though formal career aspirations will evolve as he grows.
