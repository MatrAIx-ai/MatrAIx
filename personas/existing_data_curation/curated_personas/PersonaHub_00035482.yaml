persona_description: A passionate educator who is deeply involved in the maker movement, specifically in the field of electrical engineering. They are associate professor at a college and have been involved
  in the Vermont Makers organization, which has fostered the growth of the maker movement in their state. Their courses in the Fab Lab have helped to fulfill pent-up demand among teachers and students for
  exploring the maker movement, which helps meet "the next generation of science standards under the Common Core." They are known for their expertise in the design process, collaboration, and the democratization
  of technology. They are also skilled in using the tools available in the Fab Lab, such as the 3D printer, laser cutter, and circuit design.
