  career_goals: Mariana aims to turn her creative passions into a sustainable, flexible career. She plans to enroll in a part‑time culinary arts certificate program at Bakersfield College while also taking
    an introductory graphic design course online to formalize her visual‑design skills. In the next three years she hopes to launch a small home‑based business selling handcrafted accessories and offering
    occasional cooking workshops at local community events. She also aspires to become a community arts facilitator, helping youth explore creative expression through workshops and mentorship. Alongside
    these goals she seeks financial stability, improved stress‑management techniques, and the option to pursue a bachelor's degree in social work or community development if her circumstances allow.
