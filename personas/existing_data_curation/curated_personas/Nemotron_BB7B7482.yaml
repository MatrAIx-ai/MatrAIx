personas:
  professional: Mariana Melendez, a 28-year-old part-time culinary arts student and aspiring graphic designer, blends bilingual fluency, Instagram‑based marketing, and community‑center volunteer experience
    to craft a flexible home‑based business plan centered on handcrafted accessories and occasional cooking workshops, all while navigating their relaxed attitude toward strict deadlines with a keen curiosity
    for new creative techniques.
  sports: Mariana Melendez enjoys casual Sunday soccer matches with the Bakersfield United community league, follows the Los Angeles Dodgers avidly, and incorporates regular yoga sessions into their fitness
    routine, preferring low‑key group activities over intense training.
  arts: Mariana Melendez spends weekends photographing the vibrant downtown murals, sketching scenes for a personal zine, and drawing inspiration from artists like Frida Kahlo and Diego Rivera, while curating
    indie playlists featuring Mitski and the folk group Los Tigres del Norte to fuel their creative flow.
  travel: Mariana Melendez favors spontaneous weekend road trips to nearby coastal towns like Santa Barbara and cultural hotspots such as Tijuana, planning only essential logistics on their phone and traveling
    on a modest budget, yet dreaming of a future immersion program in Oaxaca to deepen their craft and culinary roots.
  culinary: Mariana Melendez delights in mastering authentic tamales, crafting lime‑infused mezcal caramel drizzles for churro‑style desserts, and experimenting with fusion dishes that blend masa harina
    and Asian spices, often sourcing fresh chilies, hibiscus, and traditional chocolate from local farmers’ markets.
  core: Mariana Melendez is a curiosity‑driven creator who balances a love for crafts and cooking with chronic worry, disorganized scheduling, and a steadfast commitment to community and cultural expression.
background:
  cultural: Mariana grew up in a bilingual Mexican‑American household in Bakersfield, California, where Spanish and English were spoken interchangeably at home and in the community. Her family maintains
    many traditions from the Mexican heritage, such as celebrating Día de los Muertos, using vibrant folk art in home décor, and cooking family recipes passed down through generations. The strong Latino
    community in Kern County provides a supportive network that reinforces values of family solidarity, respect for elders, and community participation. These cultural roots influence Mariana’s love for
    Mexican cuisine, folk crafts, and her desire to share her heritage through art and community events.
