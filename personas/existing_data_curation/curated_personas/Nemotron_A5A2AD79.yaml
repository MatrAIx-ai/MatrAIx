  hobbies: '[''Surfing (early mornings)'', ''Arduino/Raspberry Pi tinkering'', ''Competitive online gaming'', ''Reading science-fiction manga'', ''Fishing at local piers'', ''Hiking Oahu trails'', ''Korean
    home cooking'']'
  career_goals: Bok aspires to transition from informal, on‑the‑side repairs to a licensed professional role in residential electrical or marine equipment maintenance. He plans to enroll in a community
    college certificate program for electrical work within the next year, then obtain relevant licensing. After gaining experience, he hopes to launch his own boutique repair service that can operate on
    a flexible schedule, allowing him to balance work with his preference for solitary, low‑stress environments. In the longer term, he sees his business growing to include custom electronic solutions for
    local small‑business owners, providing a stable income while preserving his independence.
