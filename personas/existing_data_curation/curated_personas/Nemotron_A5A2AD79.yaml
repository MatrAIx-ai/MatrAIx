personas:
  professional: Bok Lee, a budding residential electrical technician with hands‑on experience troubleshooting home wiring, repairing computer hardware, and assembling Arduino and Raspberry Pi projects,
    applies their methodical, structure‑oriented mindset to each task while favoring a flexible, low‑pressure schedule as they work toward a community‑college certificate and eventual licensed trade.
  sports: Bok Lee, who rises before sunrise to catch the first surf on less‑crowded Honolulu beaches, spends weekends casting lines at the Ala Moana pier and trekking quiet Oahu trails such as the Makapuʻu
    Lighthouse path, and follows the Hawaii Rainbow Warriors football team while maintaining a solo bodyweight calisthenics routine for overall fitness.
  arts: Bok Lee, a quiet enthusiast of science‑fiction manga like Blame! and lo‑fi beats from artists such as J Dilla and Nujabes, spends evenings editing short video sketches and drawing strategic inspiration
    from classic arcade games, finding creative fulfillment in solitary, low‑key artistic pursuits.
  travel: Bok Lee prefers low‑key, self‑planned trips that blend adventure with solitude, often exploring off‑the‑beaten‑path spots like the Lanai coast or a weekend camping getaway to the remote islands
    of Molokai, while dreaming of a quiet retreat in the misty forests of Hokkaido, Japan.
  culinary: Bok Lee enjoys cooking comfort dishes from their heritage—spicy fermented cabbage stew, marinated beef bulgogi, and mixed rice bowls—using precise measurements but improvising with fresh local
    fish on a whim, and they favor home‑cooked meals over dining out, seeing the kitchen as a personal sanctuary.
  core: Bok Lee is a solitary, structure‑loving tech tinkerer who balances early‑morning surf sessions with meticulous DIY projects, careful budgeting, and a quiet dedication to personal growth despite
    occasional disorganization.
background:
  cultural: Bok comes from a Korean‑American family that settled in Honolulu. His parents emigrated from South Korea in the early 2000s, bringing with them Korean language, cuisine, and a strong emphasis
    on diligence and family cohesion. Growing up in a multicultural Hawaiian environment, Bok was exposed to a blend of Korean traditions and local island customs, such as participating in community festivals
    and developing an appreciation for the natural landscape. He speaks Korean fluently at home while using English in school and daily life, giving him a bicultural perspective. The Korean value placed
    on practical skill and self‑reliance resonates with his own preference for hands‑on problem solving, while the laid‑back Hawaiian atmosphere nurtures his desire for solitude and flexibility.
