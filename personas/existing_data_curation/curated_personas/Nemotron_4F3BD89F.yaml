  career_goals: Mauro aims to secure a stable, long‑term position that offers consistent hours for his family. He hopes to earn a forklift certification if not already, and pursue a shift‑supervisor role
    within the next two years, eventually moving toward a warehouse manager or logistics coordinator position. He is interested in obtaining OSHA safety officer certification and possibly starting a small
    side business offering local moving and delivery services. A key ambition is to increase his earnings to purchase a home in a safe neighborhood and provide for his children's education.
