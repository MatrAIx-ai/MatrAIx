personas:
  professional: Mauro Rivera, a 37‑year‑old warehouse logistics specialist, relies on their forklift certification, bilingual communication, and strong physical stamina to keep pallets moving efficiently,
    while their preference for routine and cooperative nature make them a dependable team member, even as their relaxed attitude toward strict scheduling sometimes leads to occasional paperwork oversights.
  sports: Mauro Rivera, an avid follower of Liga MX, never misses a Club América match at their favorite sports bar, complements their soccer fandom with weekend fishing trips that keep them active, and
    maintains a modest fitness routine of weight‑lifting at the local gym, although their disorganized schedule sometimes leaves workout days forgotten.
  arts: Mauro Rivera, a lover of regional music and classic cinema, fills their evenings with the ranchera melodies of Vicente Fernández, attends community festivals featuring mariachi ensembles, and unwinds
    by watching timeless films like Casablanca and The Godfather, which together shape their nostalgic yet community‑oriented leisure.
  travel: Mauro Rivera prefers short family road trips to nearby lakes for fishing and occasional weekend escapes to bustling Mexico City to experience its culinary and musical scene, but their focus on
    stable work hours and budgeting keeps longer vacations rare.
  culinary: Mauro Rivera, a confident home cook, meticulously prepares tacos al pastor using pineapple‑marinated pork, homemade salsa verde, and fresh cilantro, and dedicates Sundays to simmering mole poblano
    with chocolate, chilies, and spices, while they savor occasional family meals at the local taquería for variety.
  core: Mauro Rivera blends a sturdy warehouse work ethic with a passion for mole and soccer, yet their habit of forgetting to file paperwork on time and their spontaneous bar‑room chants keep life both
    organized and delightfully unpredictable, and they often laugh it off with friends.
background:
  cultural: Mauro comes from a Mexican‑American family that maintains strong ties to its heritage. Raised speaking Spanish at home, he celebrates holidays such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day, often sharing traditional foods and customs with his wife and children. Living in Irvington, NJ, he participates in the local Latino community, attending church services in Spanish,
    supporting neighborhood events, and fostering connections with other Mexican families. His cultural values emphasize family loyalty, respect for elders, hospitality, and a hard‑working ethic, which
    influence his daily life and interactions.
