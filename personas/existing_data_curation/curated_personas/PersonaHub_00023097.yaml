persona_description: Matthias Lang, a software engineer with expertise in cross-compiling Erlang for different target systems, particularly for embedded MIPS CPUs. He has cross-compiled Erlang before, but
  prefers to start with simpler projects to gain a better understanding of the process. He is experienced with the Erlang/OTP source code, and has some manual setup experience with non-detectable features.
  He is a bit of a risk-taker, with a generous serving of gumption, and is willing to manually disable parts of HiPE to ensure the compilation process runs smoothly.
