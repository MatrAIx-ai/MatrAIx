    process improvement'', ''Sustainability program implementation'', ''Digital ordering platform integration'', ''Customer service excellence'']'
  hobbies: '[''Gardening (vegetable and herb cultivation)'', ''Hiking and nature walks'', ''Reading (business, fiction, culinary memoirs)'', ''Home cooking and recipe development'', ''Yoga and mindfulness
    meditation'', ''Small‑group book club'']'
  career_goals: Looking ahead, Danna aims to transition from managing a single location to a regional oversight role, where she can apply her systematic approach to multiple sites across Northern California.
    She is pursuing certification as a Certified Food Safety Manager and plans to enroll in an executive leadership program to refine strategic decision‑making skills. A long‑term ambition is to launch
    a community‑focused farm‑to‑table café that showcases local growers while mentoring emerging food‑service managers. She also hopes to champion industry‑wide sustainability standards by collaborating
    with regional restaurant associations on waste‑reduction and sourcing initiatives.
