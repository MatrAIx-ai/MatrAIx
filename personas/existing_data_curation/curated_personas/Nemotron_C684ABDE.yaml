personas:
  professional: Jonathan Alexander, an emerging visual storyteller, applies methodical planning and a competitive edge to craft urban sketches, mixed‑media collages, and interactive Twine narratives, blending
    traditional drawing with digital textures while they constantly question artistic conventions.
  sports: Jonathan Alexander, who prefers cerebral competition to traditional athletics, follows the Los Angeles Lakers during the NBA season and the Los Angeles Dodgers in the summer, practices free‑throw
    shooting at the school gym, joins the Eagle Rock Skateboarding Crew for weekend rides, and they compete in the local "Strategic Moves" chess club, applying the same competitive drive they bring to their
    artistic projects to their fitness and recreational activities.
  arts: Jonathan Alexander, a passionate collage maker, draws inspiration from street artist Banksy, graphic novelists Alan Moore and Marjane Satrapi, and the experimental beats of Kendrick Lamar, while
    they contribute backstage design work to his school’s production of Lin‑Manuel Miranda’s Hamilton, letting these diverse influences shape his eclectic artistic identity.
  travel: Jonathan Alexander, who plans trips with annotated maps and sketchbooks, has explored the neon‑lit streets of Tokyo to study urban design, visited New Orleans for its jazz heritage and Creole
    cuisine, and they dream of attending the European Comic‑Con in Brussels, balancing a modest family budget with a yearning for cultural immersion and visual inspiration.
  culinary: Jonathan Alexander, whose cooking skill hovers at a ‘survivalist’ level, loves crafting spicy ramen with miso, chili oil, and soft‑boiled eggs, makes avocado toast topped with jalapeño‑infused
    honey, and frequently orders sushi rolls featuring tuna, avocado, and wasabi, while they occasionally treat themselves to a greasy cheeseburger after late‑night gaming marathons.
  core: Jonathan Alexander constantly oscillates between meticulous sketch‑book planning and impulsive late‑night gaming marathons, battling anxiety that fuels their creative drive but also sparks occasional
    procrastination and they habitually over‑caffeinate with energy drinks.
background:
  cultural: Jonathan identifies as Black and grew up in Merchantville, a suburban community in Camden County, New Jersey. His family traces its roots to both the Southern United States and the Caribbean,
    bringing together traditions such as soulful cooking, storytelling, and an appreciation for rhythm and dance. He regularly attends a historically Black Baptist church, where he participates in youth
    groups that highlight African‑American history and contemporary issues. The multicultural environment of the Greater Philadelphia area exposes him to a variety of artistic expressions, from mural projects
    in West Philly to jazz festivals in nearby venues. These experiences have fostered a strong sense of cultural pride while also encouraging him to explore diverse perspectives in his art.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Basic Python programming'', ''HTML/CSS web design'', ''Project planning and organization'', ''Creative writing'', ''Critical analysis of visual
    media'', ''Sketching with traditional media'']'
  hobbies: '[''Sketching urban scenes and mixed‑media collages'', ''Reading graphic novels and socially conscious comics'', ''Playing chess at the community center'', ''Creating interactive stories with
    Twine'', ''Producing beats on GarageBand'', ''Participating in school drama club (stagecraft)'', ''Listening to jazz, hip‑hop, and experimental music'', ''Writing poetry and short reflective essays'']'
  career_goals: Jonathan aspires to blend his artistic passion with technology to become a multidisciplinary creator. He plans to enroll in a specialized visual‑arts high school, where he can deepen his
    illustration and design skills while continuing to study programming. In the longer term, he hopes to earn a BFA in Visual Arts with a minor in Computer Science, targeting a career as a concept artist
    or user‑experience designer for interactive media and video games. He is motivated to produce work that challenges conventional narratives and reflects the experiences of his community. To achieve these
    goals, he sets yearly milestones, such as winning a local art competition, completing a portfolio, and mastering a new software tool each semester.
