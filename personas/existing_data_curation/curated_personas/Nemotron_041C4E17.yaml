personas:
  professional: Walter Ayala is a 22‑year‑old bilingual aspiring IT support specialist who leverages their hands‑on DIY repair experience, organized time‑management, and curiosity for emerging technology
    to efficiently troubleshoot user issues while assertively communicating solutions and maintaining a community‑focused, friendly demeanor.
  sports: Walter Ayala enjoys jogging through Prospect Park each morning, cheering on the New York Yankees during weekend baseball watch parties, and playing casual pickup basketball with the Brooklyn Athletic
    Club in the summer, which they find balances their love for low‑key activity with community connection.
  arts: Walter Ayala immerses themselves in merengue and bachata playlists featuring Juan Luis Guerra and Aventura, while capturing Brooklyn’s vibrant street art on their phone, often inspired by the murals
    of local artist Ten33.
  travel: Walter Ayala prefers short, budget‑friendly trips that blend cultural immersion and relaxation, having explored the historic streets of Santo Domingo on a family vacation and dreaming of a future
    visit to Cartagena’s colorful old town, which they plan to research meticulously before booking.
  culinary: Walter Ayala enjoys refining classic dishes such as sancocho, mangú, and pastelitos, often using fresh plantains, cilantro, and a dash of achiote to balance flavors, and they relish occasional
    outings to local bodegas for authentic chicharrón and street festivals for empanadas.
  core: Walter Ayala is a 22‑year‑old bilingual tech enthusiast who balances meticulous budgeting with a love for late‑night puzzle games, diligent home repairs, and occasional forgetfulness about watering
    houseplants.
background:
  cultural: Walter’s cultural identity is deeply rooted in his Dominican heritage. He grew up in a bilingual household where Spanish was spoken at home and English in school and the broader community, giving
    him fluency in both languages and a nuanced understanding of Dominican and American customs. Family gatherings feature classic dishes such as sancocho, mangú, and pasteles, and celebrations like Dominican
    Independence Day and the annual Dominican Day Parade in New York are important touchstones. Catholic traditions and community solidarity shape his values, emphasizing respect for elders, hospitality,
    and collective support. Living in Brooklyn’s Kings County, Walter is part of a vibrant Dominican diaspora that maintains strong ties to the island through music, dance, and social networks. This blend
    of Caribbean culture and urban New York life influences his worldview, culinary tastes, and his desire to give back to his community.
attributes:
  skills: '[''Bilingual (English-Spanish)'', ''Basic computer literacy (Microsoft Office, Google Workspace)'', ''Social media content creation (Canva, Instagram)'', ''Basic culinary skills (Dominican cuisine)'',
