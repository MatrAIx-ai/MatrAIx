  hobbies: '[''Reading technology and personal development articles'', ''Playing chess (online and offline)'', ''Cooking traditional Dominican meals'', ''Listening to merengue, bachata, and Latin pop music'',
    ''Street photography in Brooklyn'', ''Walking/jogging in Prospect Park'', ''Puzzle video games (e.g., Portal, Tetris)'', ''Watching baseball games with a small group of friends'']'
  career_goals: Walter aims to translate his curiosity and practical mindset into a stable career that supports his young family. In the short term, he plans to complete a CompTIA A+ certification and secure
    an entry-level IT support or help-desk position, leveraging his bilingual abilities to serve the Dominican community in Brooklyn. He also considers an apprenticeship in electrical work to combine his
    hands-on repair experience with formal training. Over the next five years, Walter aspires to earn an associate degree in information technology or electrical engineering, advance to a junior network
    administrator or licensed electrician role, and eventually open a small catering venture offering authentic Dominican street food. His long-term ambition is to achieve financial independence while maintaining
    a balanced work-life rhythm that allows regular family time.
