persona_description: A research scientist who specializes in the study of reproductive biology, particularly in the areas of pig, cattle, and chicken reproduction. She is particularly interested in optimizing
  the development of follicles and embryos, as well as the effects of short-term environmental conditions on reproductive processes. Her research includes studying the nutritional programming of pre-ovulatory
  follicles and their consequences for piglet vitality, and studying the parturition process and its consequences for early piglet survival and development. She is also interested in studying the effects
  of changes in short-term environmental conditions on reproductive processes, including the effects of social stress and season. Her research is carried out at the animal research facilities in Wageningen
  and the Pig Innovation Centre in Sterksel.
