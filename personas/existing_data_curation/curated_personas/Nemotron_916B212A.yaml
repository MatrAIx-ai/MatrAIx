personas:
  professional: Patrick Chesley, a budding infant explorer, demonstrates early curiosity through tactile play while employing practical patience to methodically stack blocks, revealing an innate problem‑solving
    skill that hints at a future in early childhood education.
  sports: Patrick Chesley, a miniature fan of the New York Yankees, happily waves a tiny baseball cap while crawling across the living‑room turf, and participates in a parent‑led baby yoga class that introduces
    basic stretches, reflecting a laid‑back attitude toward fitness.
  arts: Patrick Chesley, an enthusiastic listener of Raffi’s “Baby Beluga” and a budding admirer of Eric Carle’s vivid collage illustrations, spends quiet moments flipping picture books, letting the simple
    melodies and bold colors shape their early aesthetic taste.
  travel: Patrick Chesley, a stroller‑bound explorer, has already visited the nearby city zoo and a family beachside resort in Florida, and dreams—through bedtime storybooks—of strolling through Disneyland’s
    Main Street, favoring relaxed, unstructured trips over rigid itineraries.
  culinary: Patrick Chesley, a developing palate, prefers mashed sweet potatoes, soft avocado cubes, and banana‑banana puree, enjoys the occasional cheese stick, and shows a quirky habit of smearing yogurt
    on the high chair tray with their chubby fingers.
  core: Patrick Chesley, a curious yet easy‑going one‑year‑old, balances a love for tactile discovery with a laid‑back routine, often forgetting to clean up toys but smiling sweetly when a new texture delights
    them.
