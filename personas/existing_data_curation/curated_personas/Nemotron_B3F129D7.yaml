  hobbies: '[''Abstract watercolor painting'', ''Digital illustration'', ''Speculative short story writing'', ''Science‑fiction and philosophy reading'', ''Hiking'', ''Landscape photography'', ''Puzzle
    solving (Sudoku, logic grids)'', ''Visiting art galleries'', ''Indie film appreciation'']'
  career_goals: In the next five years, Dennis aims to become a senior insurance consultant with a focus on niche markets such as cyber liability and high‑net‑worth personal insurance. He plans to earn
    the Chartered Property Casualty Underwriter (CPCU) designation and a Certified Insurance Counselor (CIC) credential, positioning himself for a future transition into agency management or launching his
    own boutique agency. Financial independence, home ownership in the Appalachian foothills, and developing a mentorship program for new agents are also key aspirations.
