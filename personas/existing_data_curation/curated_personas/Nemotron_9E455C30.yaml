personas:
  professional: A budding visual storyteller, Daniel Thompson merges hand‑drawn sketches with digital art, using their curiosity and organized approach to craft comic‑style narratives while collaborating
    thoughtfully with art‑club peers.
  sports: Daniel Thompson enjoys weekend hikes through the Ouachita National Forest, keeps a light running routine with the middle‑school cross‑country team, and roots for the Oklahoma City Thunder while
    occasionally joining a local youth soccer match for fun.
  arts: Daniel Thompson channels the rebellious street art of Banksy, the narrative depth of Neil Gaiman’s graphic novels, and the indie soundscapes of Phoebe Bridgers into their sketchbook and digital
    illustrations, while also finding inspiration from Hayao Miyazaki’s animated worlds.
  travel: Daniel Thompson prefers low‑key nature getaways such as camping at Lake Ouachita and day trips to Santa Fe, yet harbors a dream of exploring Tokyo’s manga districts and New York City’s contemporary
    art galleries, planning each journey with a mix of detailed notes and spontaneous photo‑journalism.
  culinary: Daniel Thompson favors the comfort of chicken fried steak and BBQ brisket, experiments with avocado toast topped with sesame seeds and a drizzle of hot sauce, and occasionally tries making miso
    soup and matcha latte after watching online cooking tutorials.
  core: A quietly inquisitive teen, Daniel Thompson fills their sketchbooks with imagined worlds, hoards graphic novels, over‑caffeinates with late‑night coding marathons, and sometimes forgets to eat lunch
    during intense art sessions.
background:
  cultural: Daniel grew up in Lexington, a small town in central Oklahoma, where Midwestern values of community, self-reliance, and modesty are prevalent. His family’s traditions include attending local
    high school football games, participating in county fairs, and gathering for Sunday meals that often feature home-cooked comfort food. The region’s rich Native American heritage and the state's "Sooner"
    history have exposed him to diverse artistic motifs, which he incorporates into his own artwork. While his upbringing is rooted in a predominantly white, Christian community, Daniel’s curiosity and
    internet access have broadened his cultural awareness, leading him to appreciate a variety of artistic styles and philosophies beyond his immediate environment.
