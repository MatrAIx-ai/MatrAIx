  career_goals: In the long term, Daniel aspires to blend his love for art and technology by becoming a multimedia storyteller or UX/UI designer, creating immersive visual experiences that communicate ideas
    clearly. He hopes to attend a college with strong fine arts and computer science programs, build a professional portfolio, and eventually work for a creative studio or start his own independent design
    practice. In the short term, he aims to excel in high school, win regional art competitions, and secure a mentorship or internship with a local graphic design firm.
