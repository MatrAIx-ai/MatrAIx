personas:
  professional: Alfonso Delvalle is a seasoned facilities support specialist in Miami whose meticulous floor‑care expertise, bilingual communication, and eco‑friendly cleaning tech knowledge drive their
    ambition to become a Certified Healthcare Environmental Services Technician and eventually launch a sustainable cleaning business.
  sports: Alfonso Delvalle is an avid follower of Argentine and Uruguayan soccer, cheering for Boca Juniors and Club Nacional while hosting lively viewing parties for Inter Miami CF matches at their apartment,
    and they occasionally join a local amateur futsal league on weekends.
  arts: Alfonso Delvalle blends their love for the disciplined elegance of tango—practicing steps set to Astor Piazzolla’s compositions—with a keen eye for urban photography, frequently capturing murals
    by Shepard Fairey in Wynwood and documenting Miami’s waterfront sunrise, which they use as creative respite.
  travel: Alfonso Delvalle prefers immersive travel experiences, having explored Buenos Aires’s tango halls, the historic streets of Montevideo, and Patagonia’s hiking trails, while they plan a future eco‑tour
    of Costa Rica’s rainforests and a leisure weekend in Barcelona’s Gothic Quarter.
  culinary: Alfonso Delvalle enjoys cooking traditional asado, chivito, and empanadas, often substituting grass‑fed beef, incorporating chimichurri made with fresh oregano, and experimenting with low‑waste
    techniques like using vegetable peels for broth, while they occasionally indulge in a late‑night slice of dulce de leche cheesecake.
  core: Alfonso Delvalle is a detail‑driven, socially warm yet introspective 34‑year‑old who channels curiosity into sustainable cleaning, tango precision, and thoughtful cuisine, all while they battle
    a habit of over‑worrying and a penchant for meticulously organized puzzles.
background:
  cultural: Alfonso was born to Uruguayan parents who immigrated to the United States in the early 1990s. Growing up in a Spanish‑speaking household in Miami, he maintained strong ties to his heritage through
    family gatherings that celebrate Uruguayan holidays, music such as candombe and tango, and a deep passion for football. His bicultural upbringing instilled a respect for collective harmony and a practical
    work ethic, values that echo the modest, community‑oriented traditions of Uruguay. Fluent in both Spanish and English, he navigates Miami’s multicultural landscape with ease, often acting as a cultural
    bridge between neighbours, coworkers, and local businesses.
attributes:
  skills: '[''Commercial floor care'', ''Eco-friendly cleaning techniques'', ''Chemical safety and handling'', ''Inventory and supply management'', ''Health and safety compliance'', ''Small-team coordination'',
