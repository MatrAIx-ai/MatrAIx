  hobbies: '[''Tango dancing'', ''Cooking traditional Uruguayan dishes'', ''Soccer fandom'', ''Urban photography'', ''Reading sustainability literature'', ''Mindfulness meditation'', ''Jigsaw puzzles'']'
  career_goals: Alfonso aims to transition from hands‑on cleaning to supervisory and management roles within facilities services. Over the next five years, he plans to earn a Certified Healthcare Environmental
    Services Technician (CHES) credential and a Green Cleaning Professional certification, positioning himself for a Facilities Operations Supervisor role. Ultimately, he dreams of launching his own small
    cleaning business focused on sustainable practices, employing fellow immigrant workers, and offering training programs that fuse technical rigor with a supportive, harmonious workplace.
