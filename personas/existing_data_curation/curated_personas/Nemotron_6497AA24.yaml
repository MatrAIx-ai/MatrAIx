  career_goals: David aims to secure an entry‑level logistics or operations coordinator position within a regional distribution center or manufacturing firm in the Portland metro area. Over the next 12–18
    months he plans to earn the APICS Certified in Production and Inventory Management (CPIM) credential, and to complete his Associate of Arts in Business Administration at a community college. His medium‑term
    ambition is to advance to a supervisory or team‑lead role managing warehouse processes, leveraging his systematic approach and reliable work ethic. In five years he envisions obtaining a Project Management
    Professional (PMP) certification and overseeing cross‑functional projects that improve supply‑chain efficiency. He values a career that offers clear structures, predictable routines, and incremental
    advancement.
