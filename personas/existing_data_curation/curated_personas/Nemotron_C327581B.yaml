  hobbies: '[''Reading bilingual books'', ''Building LEGO sets and puzzles'', ''Drawing and crafting'', ''Listening to Mexican music'', ''Helping with family cooking'', ''Nature walks in local parks'',
    ''Caring for the family dog'', ''Participating in school book and art clubs'']'
  career_goals: Maribel dreams of becoming a bilingual elementary school teacher who can create structured, supportive classrooms for young children, helping them learn in a calm and organized environment.
    She also imagines herself as a community librarian or youth program coordinator, where she can share books and organize activities that celebrate her Mexican heritage and encourage harmony among peers.
