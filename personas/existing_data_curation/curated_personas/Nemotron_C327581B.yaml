personas:
  professional: A budding LEGO architect named Maribel Diaz assembles intricate constructions with methodical precision, and they revel in turning each step‑by‑step instruction into a colorful masterpiece
    while preferring quiet, focused workspaces.
  sports: Maribel Diaz enjoys Saturday morning soccer practice with the local youth league team, cheered on by the hometown Chargers, and they also love exploring the nearby city park’s nature trail, balancing
    active play with a love for predictable routines and small‑group dynamics.
  arts: Maribel Diaz channels creative energy into drawing cartoons and crafting colorful projects while listening to a blend of traditional Mexican mariachi tunes by Vicente Fernández and modern pop hits
    from Ariana Grande, and they nurture a strong appreciation for both heritage and contemporary art.
  travel: Maribel Diaz dreams of revisiting the family’s annual camping trip to the Redwood Forest, has already explored the historic museum in the city, and they are eagerly saving for a future summer
    visit to Cancun’s beaches, preferring well‑planned itineraries over spontaneous getaways.
  culinary: Maribel Diaz loves helping prepare tacos with seasoned carne asada, corn tortillas, fresh cilantro, avocado slices, and tamales stuffed with pork and masa, often practicing the art of salsa
    roja using tomatoes, chilies, and lime, and they confidently manage family snack prep with modest cooking skills.
  core: Maribel Diaz is a detail‑oriented 9‑year‑old who blends structured LEGO building, disciplined allowance management, and calm, collaborative kindness into a quiet but vibrant worldview, and they
    approach every new challenge with methodical calm.
background:
  cultural: Maribel comes from a Mexican‑American family rooted in traditions from central Mexico, speaking Spanish at home while attending an English‑language school. She celebrates Día de los Muertos,
    Mexican Independence Day, and family holidays with homemade foods, music, and storytelling. Living in Leander, Texas, she participates in the local Hispanic community center’s cultural events, enjoys
    bilingual school programs, and values the blend of Mexican heritage and Texan community life.
