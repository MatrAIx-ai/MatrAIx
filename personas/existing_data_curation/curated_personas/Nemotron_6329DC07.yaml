  career_goals: Dennise aspires to pursue a career that combines her love for animals, science, and structured work, such as veterinary medicine or environmental science. She also envisions becoming a teacher
    or mentor to younger students, where she can apply her organizational skills and bilingual abilities to support learning. Her long‑term ambition is to attend a university that offers a clear academic
    pathway, enabling her to achieve a stable, purposeful profession.
