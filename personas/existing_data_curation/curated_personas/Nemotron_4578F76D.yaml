personas:
  professional: Chaddrick Glover, a newly‑licensed registered nurse on a med‑surg unit, blends methodical patient assessments and evidence‑based care with a curiosity for art‑therapy, leveraging Epic for
    precise documentation while championing culturally attuned health education.
  sports: Chaddrick Glover, an avid basketball enthusiast, dominates pick‑up games at Riverside Park, follows the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp for professional inspiration, and
    incorporates three weekly strength‑training sessions to stay fit, showing a competitive yet community‑focused approach to sport.
  arts: Chaddrick Glover, a sketch‑loving visitor to the Cummer Museum and Riverside Arts Market, draws inspiration from jazz legends like Miles Davis, hip‑hop innovators such as Kendrick Lamar, and local
    muralist Maya Love, merging these influences into notebook murals that celebrate gospel rhythms and oral storytelling traditions.
  travel: Chaddrick Glover, a budget‑conscious explorer, has road‑tripped to historic St. Augustine, savored the culinary scene of New Orleans, dreams of attending the Caribbean Carnival in Trinidad, and
    plans a spring hike through the Blue Ridge Mountains, balancing cultural immersion with affordable adventure.
  culinary: Chaddrick Glover, a self‑taught home cook, reimagines classic shrimp and grits with mango salsa, seasons collard greens with smoked turkey and creole spices, perfects sweet potato pie with a
    hint of ginger, and frequently experiments with hot sauce, okra, and fresh basil in his dishes.
  core: Chaddrick Glover, a 19‑year‑old nurse who mixes meticulous clinical care with basketball, jazz, and community art, navigates life with organized ambition, occasional video‑game‑fueled procrastination,
    and a deep drive to uplift his neighborhood.
background:
  cultural: Chaddrick grew up in the Northside neighborhood of Jacksonville, a community with deep African-American roots and a strong tradition of church, music, and family solidarity. His grandparents
    were part of the Great Migration, moving from rural Georgia to Florida in the 1960s, and his mother worked as a certified nursing assistant, passing on a value of service. He was raised in a Baptist
    household that emphasized gospel music, community outreach, and the celebration of Black heritage through events like Juneteenth and the annual Jacksonville Black Film Festival. He identifies strongly
    with Southern Black culture—its oral storytelling, soulful cuisine, and resilience—while also being influenced by the city’s growing Caribbean and Afro-Latino populations. This blend informs his commitment
    to cultural competence in nursing, his appreciation for artistic expression, and his desire to address health inequities affecting the Black community in Jacksonville.
