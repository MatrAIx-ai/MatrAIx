  hobbies: '[''Visiting art museums and galleries'',''Sketching and drawing urban murals'',''Playing basketball'',''Listening to jazz, hip-hop, and soul music'',''Cooking creative Southern and African-American
    cuisine'',''Volunteering at community health fairs'',''Designing health-education flyers'',''Mindfulness meditation'',''Nature walks in Jacksonville Arboretum & Gardens'',''Reading science-fiction novels'',''Playing
    video games'']'
  career_goals: Chaddrick aims to complete his Bachelor of Science in Nursing (BSN) within the next two years at the University of North Florida, then pursue a specialty certification in either pediatric
    nursing or emergency nursing. He dreams of becoming a family nurse practitioner who can serve underserved Black communities in Jacksonville, and he wants to incorporate creative arts into health education
    to improve patient engagement. In the long term, he envisions a leadership role as a charge nurse or nurse educator, leading quality-improvement projects that address health disparities, and possibly
    developing community outreach programs that combine health screenings with local art events.
