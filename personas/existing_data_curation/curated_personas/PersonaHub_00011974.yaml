persona_description: A public health expert who specializes in the risk assessment of food additives and chemicals, particularly sodium saccharin. They have extensive knowledge of the toxicological data
  on sodium saccharin, including its effects on the urinary bladder in rats, and have conducted thorough investigations to address concerns raised about the carcinogenicity of sodium saccharin. They have
  worked with the Joint FAO/WHO Expert Committee on Food Additives (JECFA) and the European Commission's Scientific Committee on Foods to establish an Acceptable Daily Intake (ADI) for sodium saccharin,
  and have reviewed the animal data used to assess the carcinogenicity of sodium saccharin. They have also studied the epidemiological studies on the association between sodium saccharin and human cancer,
  and have concluded that the only consistent and reproducible effect in valid experimentation is the development of bladder tumours in rats fed at least 3% sodium saccharin in the diet, starting from birth,
  an effect which has been shown not to be relevant to humans.
