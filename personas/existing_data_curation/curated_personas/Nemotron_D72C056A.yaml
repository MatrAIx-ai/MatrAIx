  hobbies: '[''Cooking Ecuadorian cuisine'', ''Balcony gardening'', ''Watercolor painting'', ''Community choir singing'', ''Attending cultural festivals'', ''Walking in parks'', ''Reading historical fiction'',
    ''Volunteer art teaching'']'
  career_goals: Carmen aims to expand her solo painting business into a small, reputable crew that specializes in sustainable, low‑VOC interior finishes. She plans to obtain certification in eco‑friendly
    painting methods and become a mentor for apprentices in her community. Over the next few years, she hopes to secure steady contracts with property management firms while also dedicating time to community
    mural projects that celebrate her Ecuadorian heritage. Ultimately, she wants a comfortable retirement that allows her to focus on artistic pursuits and cultural volunteering.
