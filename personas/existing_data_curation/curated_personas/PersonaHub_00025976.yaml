persona_description: An engineer and scientist who specializes in the field of neuroscience, particularly in the development of new imaging methods and technologies for studying the complex array of synapses
  in the cortex. His research interests include the use of photosensitive proteins to study and manipulate the workings of the brain, and the development of new imaging techniques for understanding brain
  function. He is also interested in the application of his research to the field of genetics and genetic engineering.
