  hobbies: '[''Painting'', ''Quilting'', ''Knitting'', ''Gardening'', ''Cooking/Baking'', ''Genealogy research'', ''Community book club'', ''Volunteering at food pantry'', ''Yoga and meditation'', ''Attending
    local art exhibitions'', ''Storytelling and oral history sharing'']'
  career_goals: Jackie aims to secure a part-time volunteer coordinator position at the Schuylkill Haven Community Center, where she can design and lead arts-and-craft workshops for seniors and organize
    seasonal festivals. She plans to obtain a certified caregiver training to lead a local support group for recently divorced women. Over the next five years, she hopes to launch a home-based studio and
    an online shop to sell her quilts and paintings, turning her hobby into a modest source of income. To support these goals, she intends to enroll in a short-term course in nonprofit management and attend
    stress-reduction workshops to manage her worries.
