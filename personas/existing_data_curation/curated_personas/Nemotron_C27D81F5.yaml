  hobbies: '[''Hiking in the Sierra Nevada'', ''Birdwatching'', ''Woodworking and furniture making'', ''Cooking traditional Mexican dishes'', ''Volunteer STEM tutoring'', ''Playing acoustic guitar'']'
  career_goals: Although retired, Juan aims to stay actively engaged in his community by volunteering his engineering knowledge to local non‑profits, especially those focused on sustainable water use and
    safe trail design. He hopes to mentor high school and community‑college students interested in STEM, sharing his lifelong curiosity while emphasizing practical applications. He also intends to document
    his family’s migration story and the history of the Groveland area, preserving cultural heritage for future generations. Finally, he and his wife plan to travel to his hometown in Jalisco to reconnect
    with extended family and participate in traditional celebrations.
