personas:
  professional: A retired civil engineer with four decades of experience, Juan Crutchfield leverages his structural analysis and water‑resource expertise to volunteer on sustainable water projects while
    mentoring students, applying methodical precision and a collaborative spirit cultivated through bilingual communication and hands‑on woodworking, and they relish the chance to see ideas turn into tangible
    community improvements.
  sports: Juan Crutchfield enjoys seasonal group hikes in the Sierra Nevada foothills, follows the San Francisco Giants and Sacramento Kings, and participates in a local senior walking club affiliated with
    the Groveland Community Center, though they avoid strenuous sports due to knee arthritis.
  arts: Juan Crutchfield finds creative fulfillment strumming acoustic guitar with a community folk ensemble that covers songs by Joan Baez and Bob Dylan, they attend occasional performances of the Monterey
    Symphony, and display an admiration for Frida Kahlo’s vibrant paintings, which inspire their own woodworking motifs.
  travel: Juan Crutchfield favors purposeful travel, having road‑tripped to Yosemite’s Glacier Point for a photography retreat, explored the historic streets of San Miguel de Allende, and now plans a pilgrimage
    to their hometown in Jalisco to celebrate Día de los Muertos with extended family, balancing adventure with a modest pension.
  culinary: Juan Crutchfield masterfully prepares traditional Mexican dishes such as mole poblano, pozole rojo, and hand‑made tamales, they use fresh chilies, corn masa, and ancho chilies, while their woodworking
    bench doubles as a makeshift kitchen station where they experiment with smoked pork shoulder and cilantro‑lime salsa.
  core: Juan Crutchfield blends disciplined engineering rigor with a zest for community music, woodworking, and spicy home‑cooked meals, they navigate occasional knee pain and a habit of over‑stocking camera
    gear.
background:
  cultural: Juan is a second‑generation Mexican‑American whose parents emigrated from Jalisco in the 1930s. Raised in a bilingual household in California, he grew up celebrating Día de los Muertos, Cinco
    de Mayo, and Catholic holidays while also participating in local community events in Groveland. His cultural identity blends Mexican family traditions—such as sharing home‑cooked meals and storytelling—with
    the rural, outdoors‑oriented lifestyle of Mariposa County. This dual heritage informs his commitment to preserving both the natural environment and the cultural memories of his community.
