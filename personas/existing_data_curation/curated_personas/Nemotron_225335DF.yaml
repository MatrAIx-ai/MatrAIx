  hobbies: '[''building block towers'', ''drawing pictures of animals and family'', ''listening to picture books'', ''exploring the backyard'', ''playing simple board games'', ''matching card games'', ''watching
    educational cartoons'']'
  career_goals: Cindy dreams of growing up to be a teacher who can share stories and help other children learn, and she also shows an early fascination with caring for animals, imagining herself as a veterinarian.
    She aspires to read all the books in the library and to master writing her name. Her competitive streak pushes her to want to be the best at puzzles and at helping her parents with small chores. Though
    she sometimes worries about making mistakes, she is determined to keep learning and to one day make a positive impact in her community.
