  career_goals: She dreams of turning her love for art into a career, envisioning herself as an illustrator or animator who can bring stories to life. Nitza also hopes to become a teacher who inspires younger
    kids through creative projects, and she sometimes imagines caring for animals as a veterinarian, combining her compassion and interest in biology. She values flexibility and wants a future where she
    can explore new ideas and work in environments that celebrate collaboration and cultural diversity.
