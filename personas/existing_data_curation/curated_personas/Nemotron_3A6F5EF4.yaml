personas:
  professional: Nitza Torres, a budding visual storyteller, blends hand-drawn sketches, vibrant murals, and tablet-based digital art while channeling her curiosity and relaxed approach to deadlines into
    experimental projects that often surprise classmates and teachers.
  sports: Nitza Torres, a lively forward on the Eastside Kids Soccer League, cheers for the local professional team the River City Royals, and spends weekends sprinting across the park field, often juggling
    a soccer ball and a sketchbook during halftime.
  arts: Nitza Torres, an enthusiastic member of her school's Art Club, draws inspiration from pop icons like Taylor Swift and traditional folk crooners such as Juan Gabriel, admires the vivid murals of
    street artist Banksy, and relishes comic book heroes from Marvel's Spider-Man series for their bold colors and dynamic poses.
  travel: Nitza Torres, an adventurous explorer of nearby nature trails like Pine Ridge Loop, dreams of visiting the Grand Canyon, loves weekend trips to the coastal town of Santa Marina for beach sketching
    sessions, and hopes to someday experience the vibrant fairs of Barcelona.
  culinary: Nitza Torres, a budding kitchen helper, loves making homemade guacamole with ripe avocados, diced tomatoes, onions, and lime, enjoys assembling chicken-tortilla quesadillas with sharp cheddar,
    and often experiments with bright fruit smoothies featuring mango and pineapple.
  core: Nitza Torres, a curious, art-obsessed ten-year-old who balances spontaneous sketching bursts with the occasional mess of forgotten homework, thrives on group dance circles, and hilariously mixes
    up her soccer cleats with her paintbrushes.
background:
  cultural: Nitza comes from a Mexican‑American family in Pasadena, Texas. At home she speaks Spanish with her parents and grandparents while using English at school, giving her a strong bilingual foundation.
    Her family celebrates Día de los Muertos, Mexican Independence Day, and religious holidays like Christmas and Easter with traditional foods such as tamales, pozole, and homemade salsa. Growing up in
    Harris County, she enjoys the blend of Mexican heritage with Texan influences—attending local Hispanic community events, visiting the Mexican market for fresh ingredients, and sharing Tex‑Mex cuisine
    with friends. These cultural experiences shape her values of family closeness, community participation, and a love for vibrant artistic expression.
