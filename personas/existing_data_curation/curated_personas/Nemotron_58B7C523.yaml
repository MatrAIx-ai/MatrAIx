  career_goals: Jonathan aims to transition into a senior executive role such as Vice President of Operations within the next five years, driving organization‑wide digital transformation and sustainability
    initiatives. He plans to champion a culture of continuous innovation, leveraging his creative mindset to implement AI‑enabled process automation and reduce operational waste by 20%. Additionally, he
    aspires to mentor emerging Latino managers, speak at industry conferences on creative operational design, and ultimately secure a lasting legacy that supports his family’s future and enriches the local
    business community.
