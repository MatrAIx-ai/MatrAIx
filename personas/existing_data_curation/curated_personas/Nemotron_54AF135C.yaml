  hobbies: '["Landscape photography", "Mixed-media sketching", "Hiking (North Cascades)", "Gardening (vegetable and flower)", "Volunteering at local arts festivals", "Attending art galleries and indie music
    shows", "Woodworking (furniture making)", "3D printing projects", "Home craft beer brewing", "Board-game nights", "Reading art-history and design blogs"]'
  career_goals: Karan aims to transition from his current non‑working status to a flexible, creative career that blends his artistic passions with community engagement. Over the next three to five years
    he plans to complete a bachelor’s degree in Visual Arts or Sustainable Design while building a freelance portfolio in photography, graphic design, and custom woodworking. He seeks part‑time work with
    a local nonprofit arts organization, with the long‑term ambition of becoming a program manager for community arts initiatives. Ultimately, he dreams of opening a modest studio/gallery in Mount Vernon
    where he can showcase his own work, host workshops, and generate a modest income that supports his family and allows continued volunteer involvement.
