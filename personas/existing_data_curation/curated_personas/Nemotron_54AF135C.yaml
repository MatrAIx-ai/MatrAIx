personas:
  professional: Karan Johnson, an aspiring visual arts professional, merges their photography, graphic design, and custom woodworking skills with volunteer coordination experience, delivering community
    art initiatives that balance meticulous planning with spontaneous creative problem‑solving.
  sports: Karan Johnson, an avid hiker with the Skagit Trailblazers club, regularly tackles North Cascades treks and weekend trail runs, while cheering for the Seattle Seahawks, Sounders FC, and Mariners,
    balancing a love of the outdoors with a casual gym routine that often yields to photography expeditions.
  arts: Karan Johnson actively immerses themselves in the local arts scene, frequenting Mount Vernon galleries, attending indie shows featuring The Shins and Sufjan Stevens, and drawing inspiration from
    Ansel Adams, Yayoi Kusama, and regional painter Emily Wong, while channeling that passion into mixed‑media sketching and community workshop facilitation.
  travel: Karan Johnson prefers low‑key road trips that blend scenic photography with cultural immersion, having explored the Oregon Coast, the Dutch tulip fields of Lisse, and a design‑focused week in
    Kyoto, Japan, yet balances future wanderlust with a modest budget and family responsibilities.
  culinary: Karan Johnson enjoys brewing small‑batch IPAs at home and cooking with seasonal produce—favoring dishes such as grilled salmon with lemon‑dill sauce, roasted asparagus, and mushroom‑infused
    risotto—while often experimenting with sourdough starters and foraged mushroom toppings during weekend meals.
  core: Karan Johnson is a curiosity‑driven maker who balances meticulous budgeting with spontaneous creative bursts, often found with a camera in hand, a 3D printer humming, and a half‑finished brew fermenting
    on the kitchen counter.
background:
  cultural: Karan grew up in a middle‑class Anglo‑American family rooted in the Pacific Northwest’s agricultural community. His heritage includes English and Irish ancestry, with family traditions emphasizing
    self‑reliance, DIY craftsmanship, and a close connection to nature. Living in Mount Vernon, Skagit County, he was immersed in the region’s seasonal festivals, especially the Tulip Festival, and the
    vibrant local arts scene. While identifying as White American, he respects the cultural heritage of the Coast Salish peoples, often attending educational events at nearby tribal centers. His cultural
    outlook blends classic American values of individualism and community service with the progressive, environmentally‑conscious ethos of contemporary Washington state.
