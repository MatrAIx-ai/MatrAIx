  career_goals: Maria aims to deepen her administrative expertise by earning a Certified Administrative Professional (CAP) credential within the next two years. She aspires to transition into an office
    manager or executive assistant role where she can lead process‑improvement projects, mentor junior staff, and incorporate her passion for art by curating office displays and organizing cultural events.
    Additionally, Maria envisions launching a part‑time virtual administrative consultancy that serves small non‑profits and community organizations, allowing her to apply her bilingual skills while maintaining
    a flexible schedule that supports her well‑being.
