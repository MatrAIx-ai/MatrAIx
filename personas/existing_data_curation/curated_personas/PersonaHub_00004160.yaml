persona_description: A historian interested in the general history of the 19th century, particularly the global demographic, economic, social, and cultural processes. This individual is likely to be knowledgeable
  about the demographic revolution, urbanisation, migrations, agrarian revolution, protoindustry, industrial revolution, the creation of national markets, colonialistic policy, changes in the class and
  state structure, the development of the bourgeoisie, national movements, the nationalisation of the masses, liberalism, the creation of mass political parties, the women's political movement, secularisation,
  and the appearance of anti-Semitism and racism. They are also interested in the formation of modern non-dominant nations, the comparison between English, French, and Russian imperialism, the responses
  of the Catholic Church to the social issue in the 19th century, the influence of the development of technology on the way of life, and the historical memory of World War I.
