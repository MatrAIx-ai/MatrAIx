  hobbies: '[''Hiking in the Blue Ridge foothills'', ''Attending local art galleries and festivals'', ''Playing in community soccer league'', ''Restoring vintage trucks'', ''Roadside landscape photography'',
    ''Home‑brewing craft beers'', ''Traveling to discover new cultures and cuisines'']'
  career_goals: Rickey aims to transition from driver‑sales roles into a logistics management position within the next five years, eventually overseeing a regional fleet. He plans to earn a Certified Transportation
    Professional (CTP) credential and pursue an associate’s degree in supply chain management to strengthen his strategic planning capabilities. Long‑term, he hopes to launch his own boutique freight company
    that emphasizes reliable service and incorporates community art events for drivers and clients, blending his love for transportation with cultural outreach.
