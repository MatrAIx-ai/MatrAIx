  hobbies: '[''Cooking Vietnamese cuisine'', ''Surfing'', ''Beach volleyball'', ''Hiking coastal trails'', ''Strategy board games'', ''Reading personal finance books'', ''Mindfulness meditation'', ''Volunteering
    at community health fairs'']'
  career_goals: Somchay aims to progress to a senior underwriting role within the next three to five years, with a focus on health and property‑casualty lines. He plans to obtain professional designations
    such as the CPCU and ARM certifications to deepen his technical expertise. Long‑term, he aspires to move into underwriting management or product development, driving innovative, consumer‑friendly insurance
    solutions that balance risk and affordability. He also hopes to mentor junior underwriters and lead initiatives that streamline underwriting processes through data‑driven insights.
