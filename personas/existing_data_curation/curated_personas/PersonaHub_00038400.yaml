  They may have a background in medical informatics, epidemiology, or public health, and are seeking to integrate social media analysis into their work. They are interested in leveraging the power of social
  media to gain insights into patient experiences and health outcomes, and to identify areas for improvement in healthcare delivery. They may also be interested in applying language algorithms to electronic
  medical records to extract meaningful insights into patient experiences and health outcomes.
