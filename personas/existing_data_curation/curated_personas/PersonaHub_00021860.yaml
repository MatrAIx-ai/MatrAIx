persona_description: A researcher and engineer at Purdue University's Birck Nanotechnology Center and Sadeghi Mechanical Engineering Laboratory, who specializes in developing and testing tiny wireless sensors
  for use in jet engines. They are working on micro electromechanical systems (MEMS) technology, which combines electronic and mechanical components on a microscopic scale, and are particularly interested
  in developing sensors that can withstand extreme temperatures and detect impending bearing failure. Their work has the potential to be applied in military and civilian aircraft, as well as in cars, and
  they are collaborating with the U.S. Air Force to further develop their technology.
