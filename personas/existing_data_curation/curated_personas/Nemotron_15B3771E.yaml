  career_goals: Martin aims to transition from a senior management analyst role to a strategic leadership position, such as Director of Business Analytics or Chief Strategy Officer, within the next five
    years. He plans to pursue an MBA with a focus on analytics to deepen his strategic acumen and expand his network. He is driven to lead large-scale transformation projects that integrate data-driven
    decision making with innovative, design-thinking approaches. Additionally, Martin hopes to mentor junior analysts and champion diversity and inclusion initiatives that reflect his Mexican heritage.
