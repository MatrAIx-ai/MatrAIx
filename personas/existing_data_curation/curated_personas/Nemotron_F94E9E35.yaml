  hobbies: '[''Oil painting'', ''Street photography'', ''Live jazz listening'', ''Contemporary fiction reading'', ''African diaspora literature'', ''Youth art mentorship'', ''Hiking'', ''Urban gardening'',
    ''Exploring coffee shops'', ''Southern cuisine cooking'']'
  career_goals: Fode aims to transition from a specialist role to senior project management within a dynamic organization that values arts and community impact. His short-term goal is to lead a multidisciplinary
    program focused on public art installations and cultural revitalization in urban neighborhoods of Charlotte. Over the next five years, he aspires to become a program director overseeing large-scale
    initiatives that blend technology, sustainability, and artistic expression. He also seeks to develop a consultancy that trains companies in inclusive project practices and to publish thought pieces
    on integrating humanities perspectives into business strategy.
