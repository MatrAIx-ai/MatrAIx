personas:
  professional: Fode Quinones, a 32‑year‑old hybrid project manager blending Agile precision with artistic vision, leverages advanced scheduling tools like MS Project and Primavera to orchestrate multidisciplinary
    public‑art programs while mentoring diverse teams and championing inclusive stakeholder engagement.
  sports: Fode Quinones embraces weekend hikes in the Blue Ridge foothills, follows the Charlotte Hornets and Carolina Panthers avidly, and participates in a local running club that meets at Freedom Park
    thrice a month.
  arts: Fode Quinones devotes evenings to oil‑painting abstract canvases inspired by Basquiat, captures street photography of Charlotte’s historic districts, and regularly attends live performances by the
    Charlotte Jazz Orchestra, while reading works by Chimamanda Adichie and Ta‑Nehisi Coates for creative enrichment.
  travel: Fode Quinones prefers curated road trips that blend nature and culture, having explored Asheville’s art scene, the coastal streets of New Orleans for its jazz heritage, and a recent week‑long
    itinerary through Lisbon’s mural‑laden neighborhoods, while dreaming of a sustainable retreat in the Scottish Highlands.
  culinary: Fode Quinones experiments in the kitchen with Southern‑style shrimp and grits spiced with miso, perfects a caramel‑brown sugar cheesecake topped with hibiscus glaze, and sources fresh herbs
    like thyme and rosemary from their urban garden to elevate everyday meals.
  core: Fode Quinones fuses meticulous project leadership with boundless artistic curiosity, habitually balances budget spreadsheets and paint palettes, and occasionally over‑commits to coffee‑shop tours
    at the expense of sleep.
background:
  cultural: Fode is a second-generation African American raised in Charlotte's vibrant South End neighborhood. His family's roots trace back to the rural South, where church, gospel music, and community
    storytelling shaped his early worldview. He attended a historically Black college for his humanities degree, deepening his connection to African diaspora culture and the civil rights legacy. In Charlotte,
    he maintains strong ties to local Black cultural institutions, supports Black artists, and participates in community festivals that celebrate African-American heritage. This cultural foundation informs
    his collaborative approach, his appreciation for artistic expression, and his commitment to inclusive, community-focused project outcomes.
attributes:
  skills: '[''Agile Project Management'', ''Waterfall Methodology'', ''Advanced Scheduling'', ''Budget Forecasting'', ''Risk Management'', ''Stakeholder Engagement'', ''Cross-functional Team Leadership'',
