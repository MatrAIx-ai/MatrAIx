  hobbies: '[''Reading non-fiction (business, self-development, history)'', ''Journaling'', ''Nature walks and hiking'', ''Baking and bread making'', ''Puzzle solving (Sudoku, crosswords)'', ''Solo strategy
    video games'', ''Listening to economics podcasts'', ''Virtual financial-literacy workshops'']'
  career_goals: Debra aims to secure a remote back-office role such as financial analyst or accounting assistant where she can apply her analytical skills while working independently. She values positions
    with clear procedures and predictable workflows, yet she seeks flexibility to manage her own schedule. Over the next few years, she plans to earn professional certifications such as the CPA or CMA and
    eventually transition into a small consulting practice that helps local nonprofits with budgeting and financial planning, allowing her to contribute to the community in a low-stress, solitary setting.
