personas:
  professional: Jose Arroyo is a seasoned CNC tool operator and programmer who blends meticulous G‑code craftsmanship with hands‑on mentorship, leveraging their curiosity and practicality to drive lean
    improvements while preparing for a supervisory role in a small CNC cell.
  sports: Jose Arroyo channels their energetic sociability into leading a local amateur soccer league team called the Redwood Rangers, cheering on the San Francisco 49ers and the Oakland Athletics, while
    also belonging to the Eel River Kayak Club for weekend paddles and regularly hiking the towering redwoods with a group of friends.
  arts: Jose Arroyo strums acoustic guitar at community folk gatherings, drawing inspiration from artists like Bob Dylan, Joan Baez, and Paco de Lucía, while they also enjoy attending local mural festivals
    and occasionally experiment with Arduino‑controlled light installations for summer concerts.
  travel: Jose Arroyo favors adventure‑laden road trips, having traversed the Redwood National Park, kayaked the Eel River, and taken a weekend getaway to Yosemite, while dreaming of an overseas trek to
    Patagonia’s glacial fjords and a cultural immersion stay in Antigua, Guatemala to explore culinary roots.
  culinary: Jose Arroyo excels as a home cook, regularly preparing pupusas, tamales, and chiles rellenos using fresh corn masa, roasted chilies, and locally sourced cheese, while also tending a vegetable
    garden that supplies heirloom tomatoes, zucchini, and cilantro for their weekend feasts, though they occasionally over‑salt dishes when experimenting with new spice blends.
  core: Jose Arroyo is a pragmatic yet curious CNC expert who balances a love for outdoor camaraderie, community mentoring, and home‑cooked flavors, all while wrestling with occasional back aches and a
    tendency to over‑commit to volunteer projects.
background:
  cultural: Jose grew up in a close‑knit Guatemalan immigrant family, speaking both Spanish and English at home. Family gatherings revolve around shared meals, music, and traditions like Semana Santa and
    Día de Los Muertos. His Catholic upbringing emphasizes respect for elders and community service. Though settled in Arcata, he stays connected to his roots by participating in local Latinx festivals,
    cooking traditional foods, and maintaining regular video calls with relatives in Guatemala. The blend of Guatemalan cultural values—hard work, hospitality, and love of music—with Humboldt County's environmental
    consciousness shapes his identity and daily choices.
attributes:
