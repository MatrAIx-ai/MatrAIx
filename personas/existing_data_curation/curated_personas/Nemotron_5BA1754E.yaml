    and OSHA standards'', ''Basic welding and metal fabrication'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Hiking and trail walking in the Redwood forests'', ''Kayaking on local rivers'', ''Playing acoustic guitar and joining folk music gatherings'', ''Cooking Guatemalan dishes (pupusas, tamales,
    chiles rellenos)'', ''Community soccer league'', ''Gardening (vegetables and herbs)'', ''Birdwatching'', ''DIY electronics and Arduino projects'', ''Volunteer tool workshops for youth'', ''Craft brewery
    tours and tasting'']'
  career_goals: Jose aims to move into a supervisory role overseeing a small CNC cell, where he can blend his hands‑on experience with broader process engineering responsibilities. He plans to earn a Certified
    Manufacturing Engineer credential and explore Industry 4.0 technologies such as robotic workstations and automated data collection. Long‑term, he envisions launching a boutique CNC service shop that
    supplies custom parts to local artisans and sustainable manufacturers, while continuing to mentor the next generation of skilled tradespeople.
