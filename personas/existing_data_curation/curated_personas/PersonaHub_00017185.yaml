persona_description: A healthcare professional who is dedicated to improving the health and well-being of patients with celiac disease. They are aware of the prevalence of celiac disease in the general
  population and are committed to educating patients about the importance of a gluten-free diet and the potential benefits of alternative treatment strategies. They are also aware of the high mortality
  rates associated with celiac disease and are advocating for strict adherence to the gluten-free diet as the only effective treatment. Additionally, they are knowledgeable about autoimmune disorders that
  can be indicators of celiac disease and are trained to evaluate patients for the condition.
