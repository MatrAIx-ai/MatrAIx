  hobbies: '[''basketball'', ''Robotics club (Scratch and LEGO)'', ''drumming'', ''video creation (YouTube)'', ''reading comic books'', ''volunteering at community center'', ''Minecraft gaming'', ''chess'']'
  career_goals: In the short term, Christopher aims to keep his grades high, earn a spot on the varsity basketball team, and join the school robotics club to deepen his technical skills. He also hopes to
    become a student council member to help organize school events. Looking ahead, he aspires to study engineering or education in college, with a long‑term goal of becoming a civil engineer who designs
    safe community spaces or a middle‑school teacher who mentors younger students. He values a career that provides structure, stability, and the chance to give back to his neighborhood.
