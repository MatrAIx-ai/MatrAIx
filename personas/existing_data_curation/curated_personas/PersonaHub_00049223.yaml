persona_description: A technical writer who specializes in creating paper-based and digital operating instructions, how-to manuals, assembly instructions, and "frequently asked questions" pages to help
  technical support staff, consumers, and other users within a company or an industry. He or she has a background in computer hardware engineering, scientists, computer support specialists, and software
  developers and is responsible for managing the flow of information among project workgroups during development and testing. The technical writer is also responsible for understanding complex information
  and communicating it to people with diverse professional backgrounds. They are also interested in applying their knowledge of the user of the product to serve as part of a team conducting usability studies
  to help improve the design of a product that is in the prototype stage. The technical writer conducts research on their topics through personal observation, library and Internet research, and discussions
  with technical specialists. The technical writer is also responsible for managing the consistency of technical content and its use across business departments including product development, manufacturing,
  marketing, and customer relations.
