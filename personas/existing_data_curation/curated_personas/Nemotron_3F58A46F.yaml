  career_goals: Katherine aims to earn a Master of Social Work within the next two years, transition into a supervisory role, and eventually become a director of community mental‑health services in the
    Greater Houston area. She aspires to design and implement integrated care models that blend traditional counseling with expressive‑arts therapy, secure sustainable funding through grant acquisition,
    and influence local mental‑health policy to expand access for underserved families. Long‑term, she envisions establishing a nonprofit arts‑and‑wellness hub in Montgomery County that offers therapeutic
    workshops, community outreach, and professional training.
