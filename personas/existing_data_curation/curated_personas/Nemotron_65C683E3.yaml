personas:
  professional: D Coble, a 42‑year‑old applied physics professor at a regional college, blends methodical curriculum design and rigorous lab safety with an outgoing, cooperative style that makes them a
    sought‑after mentor, grant writer, and public speaker in interdisciplinary STEM outreach.
  sports: D Coble, an avid cyclist and weekend hiker, trains with the Potomac Cycling Club, follows the Washington Capitals for hockey, the Baltimore Ravens for football, and the Washington Wizards during
    the NBA season, and they join a local recreational soccer league each spring.
  arts: D Coble, who relaxes after lab sessions by listening to classic rock legends like Bruce Springsteen and folk harmonies of The Avett Brothers, they often attend performances at the Strathmore Music
    Center and appreciate the works of American realist painter Andrew Wyeth.
  travel: D Coble, who prefers meticulously planned trips that balance hiking adventures with cultural immersion, has trekked the White Mountains in New Hampshire, explored the historic streets of Edinburgh,
    and they hope to bike the Southern Alps of New Zealand while attending a renewable‑energy symposium in Berlin.
  culinary: D Coble, an enthusiastic home chef and weekend craft brewer, they frequently prepare farm‑to‑table dishes such as roasted beet and goat‑cheese salad and a rosemary‑infused vegetable lasagna,
    while experimenting with hop varieties like Citra and Mosaic to brew a crisp pale ale topped with fresh orange zest.
  core: D Coble, a methodical 42‑year‑old physicist who balances a love for community mentorship with an obsessive checklist habit, they often lose track of time perfecting craft beer recipes while neglecting
    personal leisure reading.
background:
  cultural: Coble was raised in a middle‑class, white family in the Mid‑Atlantic region, steeped in the traditions of small‑town Maryland. His upbringing combined a respect for self‑reliance, community
    involvement, and a pragmatic work ethic common to the rural Mid‑Atlantic. Family gatherings often featured local foods and civic participation, reinforcing his collaborative and compassionate outlook.
    Though he identifies as a white American, his cultural lens is shaped by the region’s emphasis on community service, education, and modest, structured living.
