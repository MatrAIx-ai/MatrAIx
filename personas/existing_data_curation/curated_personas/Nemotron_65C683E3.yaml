  hobbies: '[''Hiking'', ''Cycling'', ''Gardening'', ''Chess'', ''Volunteer Teaching'', ''Historical Society Activities'', ''Cooking'', ''Craft Brewing'']'
  career_goals: Coble aims to achieve tenure and eventually serve as department chair, where he can shape strategic growth and foster interdisciplinary collaborations. He aspires to launch a regional STEM
    mentorship program for underrepresented high school students, secure multi-year research funding for renewable energy projects, author a widely used textbook on experimental physics, and expand online
    course offerings to increase accessibility. Ultimately, he seeks to leave a lasting legacy of student success and community engagement while maintaining a balanced, predictable schedule.
