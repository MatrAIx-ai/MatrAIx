  career_goals: Looking ahead, Joyce aims to transition into a senior strategic leadership role such as IT Director or Chief Information Officer within the next five years. She is focused on guiding her
    organization through digital transformation initiatives that improve operational efficiency and data‑driven decision‑making. To support this trajectory, she plans to earn a PMP certification and deepen
    her expertise in cloud architecture and cybersecurity governance. Joyce also aspires to mentor the next generation of women in tech, champion inclusive workplace practices, and eventually launch a boutique
    consulting practice that helps nonprofit organizations adopt affordable technology solutions.
