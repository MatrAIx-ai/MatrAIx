  career_goals: Hannah dreams of a future where she can combine her love for animals, learning, and helping others. She aspires to become a veterinarian or a science teacher, hoping to inspire younger children
    and create calm, supportive environments. She also imagines writing a children's book about caring for wildlife, using her curiosity and practical mindset to make learning enjoyable for peers who feel
    worried or stressed.
