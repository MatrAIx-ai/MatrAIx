personas:
  professional: Maria Alvarado, an aspiring digital illustrator and junior coder, blends her love for fantastical drawing with the logic of Scratch programming, turning school art projects into interactive
    storybooks that showcase her curiosity and reliable work ethic.
  sports: Maria Alvarado enjoys sprinting games at the neighborhood park, plays forward for the Pacific Junior Soccer Club, and swims with the Sandy Shores Swim Team during summer, cheering on the Los Angeles
    Lakers and LA Dodgers while using dance routines as cardio workouts.
  arts: Maria Alvarado dives into the worlds of graphic novels like "Amulet" by Kazu Kibuishi and "Bone" by Jeff Smith, sketches spell‑binding fantasy scenes inspired by Hayao Miyazaki’s films, and dances
    to a mix of traditional folk rhythms and contemporary pop hits from Olivia Rodrigo and BTS, letting art and music define her evenings.
  travel: Maria Alvarado loves weekend getaways to the local beach of Malibu for tide‑pool hunting, day trips to the nearby Redwood State Park for sketching towering trees, and dreams of a family vacation
    to the ancient ruins of Machu Picchu, planning trips with colorful maps and a checklist of must‑draw landmarks, all within the limits of her parents’ budget.
  culinary: Maria Alvarado proudly assists in rolling homemade corn tortillas, stuffing them with seasoned chicken for tacos, and wrapping pork in masa for tamales, while experimenting with guacamole spiced
    with fresh cilantro and lime, and occasionally treats herself to cinnamon‑sugar churros after a successful art showcase.
  core: Maria Alvarado, a ten‑year‑old imagination powerhouse, balances vivid storytelling with digital creation, savors family‑cooked flavors, and navigates school, sport, and savings with an energetic,
    organized, yet delightfully impulsive spirit.
background:
  cultural: Maria is a first‑generation Mexican‑American raised in the diverse community of Hampton‑Newport News, Virginia. At home, Spanish is spoken alongside English, and she participates in cultural
    traditions such as Día de los Muertos celebrations, cooking family recipes like tamales and pozole, and listening to mariachi and regional music. Her Mexican heritage shapes her worldview, fostering
    a strong sense of family, respect for community, and pride in bilingual identity, while her environment in Virginia exposes her to a blend of Southern and coastal cultures that broaden her interests.
