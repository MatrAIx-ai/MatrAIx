  career_goals: Maria envisions a future where she can blend art and science to inspire others. She aspires to become a children's author or illustrator, create animated films, or work as a science communicator
    who makes complex ideas accessible through visual media. She also dreams of leading community projects that celebrate Mexican culture and promote environmental stewardship in her hometown.
