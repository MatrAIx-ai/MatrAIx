persona_description: A healthcare professional who is dedicated to improving patient care and reducing overcrowding in emergency departments. Dr. Michael Schull is an assistant professor of emergency medicine
  at the University of Toronto and has conducted research on the impact of walk-in patients on emergency department overcrowding. Schull believes that increasing a hospital's capacity to quickly assess
  and admit the most acutely ill patients is key to solving the problem of overcrowding, but also emphasizes the importance of improving access to diagnostic services, enhancing alternatives to admission
  such as home care, better management of chronic disease in the community to reduce exacerbations, and better prevention through things such as the influenza vaccination.
