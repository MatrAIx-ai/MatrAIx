  career_goals: Steven aims to advance to a supervisory role within the foundry, becoming a lead mold maker or casting manager. He plans to obtain certifications such as Certified Foundry Engineer (CFE)
    and Advanced CNC Programming. He also wishes to deepen his design capabilities by taking courses in solid modeling and industrial design, eventually integrating artistic metal sculpture into his professional
    work. In the long term he envisions opening a small boutique metal‑working studio where he can produce custom art pieces and functional castings, possibly offering apprenticeship opportunities for local
    youth.
