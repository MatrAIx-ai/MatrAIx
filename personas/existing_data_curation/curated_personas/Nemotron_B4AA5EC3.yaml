  career_goals: He aims to turn his curiosity into a career by studying robotics or computer science. His primary ambition is to become a robotics engineer who designs autonomous machines or a game developer
    who creates engaging multiplayer experiences. He plans to join his high school's robotics club, earn STEM scholarships, and eventually work at a technology firm or launch his own gaming studio. He also
    hopes to make the varsity soccer team, blending his competitive drive with teamwork.
