personas:
  professional: Chun Nguyen is a budding game creator and aspiring robotics hobbyist who builds LEGO Technic models with programmable motors, codes simple games in Scratch, and channels competitive instincts
    from Fortnite into designing interactive digital experiences, all while balancing curiosity with a pragmatic approach to learning the nuts and bolts of technology.
  sports: Chun Nguyen plays forward on a neighborhood soccer team at Riverside Park, cheering for the City Lions in the national league, occasionally watches the Los Angeles Lakers on weekends, and spends
    free afternoons at the local skate park, where they practice ollies and grind tricks while keeping an eye on injury risks.
  arts: Chun Nguyen is a K‑pop enthusiast who streams BTS and Blackpink, enjoys Western pop hits from Taylor Swift, and channels creative energy into sketching futuristic robot concepts inspired by Hajime
    Sorayama, while also admiring LEGO artist Nathan Sawaya’s sculptural works.
  travel: Chun Nguyen dreams of attending a K‑pop concert in Seoul and visiting the LEGO House in Billund, but so far their family trips have been limited to a weekend road‑trip to the Grand Canyon and
    a summer vacation at a coastal resort in Mexico, where they favor adventure activities over quiet beach lounging.
  culinary: Chun Nguyen assists with family holiday meals, mastering the art of rolling delicate rice‑paper spring rolls, simmering aromatic herb‑infused broth, and grilling marinated pork skewers, while
    also loving fast‑food cheeseburgers and experimenting with creating spicy sriracha‑glazed chicken wings at home.
  core: Chun Nguyen is a competitive teen gamer and inventive LEGO Technic builder who balances curiosity with a laid‑back, pragmatic outlook, channels energy into soccer and skateboarding, and infuses
    every hobby with a calm, resilient spirit.
background:
  cultural: Chun D Nguyen is a second‑generation Vietnamese‑American. His parents immigrated from Vietnam and keep cultural practices such as celebrating Tet (Lunar New Year), preparing pho and bánh mì
    at home, and speaking Vietnamese. Growing up in Marshalltown, Iowa, he blends this heritage with typical Midwestern life—participating in school sports, community events, and a local Vietnamese community
    center. His family emphasizes respect for elders, hard work, and academic achievement while encouraging social interaction and community involvement.
