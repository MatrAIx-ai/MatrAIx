persona_description: A disaster relief worker who tracks the patterns and trends of displacement caused by natural hazards. They are responsible for collecting and analyzing data on displacement, including
  the number of people displaced, the geographical distribution, and the reasons for displacement. They work with governments, organizations, and communities to understand the impact of disasters on people's
  lives and to develop strategies to prevent and mitigate displacement. They must have a deep understanding of natural hazards and their impacts, as well as the ability to work in diverse and complex environments.
