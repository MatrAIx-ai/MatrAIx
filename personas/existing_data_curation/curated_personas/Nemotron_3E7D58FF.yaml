  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction and true-crime'', ''Small book-club participation'', ''Walking on local trails'', ''Community garden volunteering'', ''Cooking with
    garden produce'']'
  career_goals: Courtney aims to move into a supervisory role within facilities management, seeking certification as an IICRC-approved cleaning specialist and completing an OSHA 30-hour safety course to
    strengthen her qualifications. Over the next five years she hopes to become a shift lead or building facilities coordinator, where she can design more efficient cleaning protocols and mentor a small
    team. She also entertains the idea of launching a niche eco-friendly cleaning service that emphasizes biodegradable products and sustainable practices, aligning her practical skills with her growing
    interest in environmental stewardship while maintaining a stable income for her family.
