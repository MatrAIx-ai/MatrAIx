personas:
  professional: Courtney Garris, a seasoned facilities maintenance professional with over two decades of hands‑on experience in commercial cleaning and building upkeep, leverages a meticulous scheduling
    mindset and a talent for training staff to design streamlined, eco‑friendly cleaning protocols while aiming for a supervisory role supported by IICRC certification and OSHA safety training.
  sports: Courtney Garris enjoys low‑impact fitness through regular walks on the Scioto River Trail, participates in a local walking club that meets at the Powell community garden, and supports the Dayton
    Dragons minor‑league baseball team and the Cincinnati Bengals, while occasionally joining community pickleball sessions for a light‑hearted social workout.
  arts: Courtney Garris immerses in creative pursuits by quilting intricate patterned blankets, reading historical fiction by Philippa Gregory and true‑crime novels by Michael Connelly, attending a monthly
    book‑club at the Dayton Public Library, appreciating folk paintings at the Dayton Art Institute, and listening to Gillian Welch’s mellow folk songs while crafting.
  travel: Courtney Garris prefers well‑planned road trips that blend nature and history, having explored Williamsburg, Virginia, driven the Blue Ridge Parkway, and dreaming of the Oregon Coast, while keeping
    travel budgets modest with weekend cabin stays in southern Ohio to balance family responsibilities.
  culinary: Courtney Garris enjoys farm‑to‑table cooking at an intermediate skill level, frequently preparing roasted beet and goat‑cheese salads, zucchini noodle stir‑fries with garden‑harvested herbs,
    homemade pickled cucumbers, and seasonal soups featuring homegrown carrots and kale, though they sometimes over‑salt dishes when measuring spices by eye.
  core: Courtney Garris is a methodical facilities veteran with a green thumb, disciplined budgeting habits, and a quiet love for quilting, walks, and self‑care, balancing practicality with creative indulgences.
background:
  cultural: Courtney was raised in a middle-class, white working-class family in suburban Ohio, where values such as hard work, reliability, and community involvement were emphasized. Her parents encouraged
    practical education, leading her to attend community college for courses in business administration and environmental health before entering the cleaning industry. She identifies with Midwestern cultural
    traits—politeness, a preference for modest, low-key celebrations, and a strong sense of neighborly responsibility. Regular attendance at a local Protestant church has reinforced a cooperative ethic,
    while local traditions like the annual county fair and Fourth of July parades have shaped her appreciation for simple, shared community experiences.
attributes:
