personas:
  professional: Thomas Worsham, a budding junior architect in the sandbox, channels his practical curiosity into building intricate block castles, effortlessly blends imaginative design with tried-and-true
    structures, and collaborates gently with a small circle of friends while staying emotionally steady.
  sports: Thomas Worsham, a lively participant in the Bumblebee Bunch toddler soccer team, loves chasing a ball at the local park, dabbling in beginner swimming lessons with the Tiny Dolphins club, and
    proudly cheers for FC Barcelona's junior fan program.
  arts: Thomas Worsham, an enthusiastic little artist, spends afternoons drawing dinosaurs, singing along to The Wiggles and Sesame Street tunes, and getting lost in the whimsical worlds of Maurice Sendak's
    books and the animated adventures of Bluey.
  travel: Thomas Worsham, who adores spontaneous trips to Grandma's farm in upstate New York, the local zoo, and dreams of a future visit to Walt Disney World, prefers short, flexible journeys with his
    close family over long, scheduled vacations.
  culinary: Thomas Worsham, a budding kitchen helper, delights in scooping macaroni and cheese, assembling mini cheese pizzas with pepperoni circles, and spreading peanut butter on toast while proudly claiming
    his favorite snack of apple slices with a sprinkle of cinnamon.
  core: Thomas Worsham, a curious yet practical four-year-old, navigates the world with a flexible routine, a collection of stickers, and a gentle, harmony-seeking spirit.
background:
  cultural: Thomas is raised in a white, middle‑class family in Springtown, a small town in Wise County, Texas. His upbringing reflects a blend of Southern‑Texan values—politeness, respect for neighbors,
    and a love of outdoor life—combined with the quieter rhythm of rural living. Family traditions include Sunday church services, community pot‑luck gatherings, and participation in local events like the
    Wise County fair. Local preschool and library programs introduce him to stories and activities that reinforce cooperation, kindness, and an appreciation for the natural landscape surrounding the town.
