  career_goals: Miguel aims to deepen his impact on STEM education within his district by moving into a leadership role such as department chair or curriculum coordinator. He wants to develop a district-wide
    integrated STEM program that emphasizes hands-on, real-world projects and connects students with local industry partners. He also hopes to secure grant funding to expand the school's robotics team and
    to create a community outreach initiative that introduces middle-school students to engineering concepts. Long-term, he envisions a stable career that allows him to balance his work with personal time,
    possibly transitioning to a part-time adjunct position at a nearby community college to share his expertise with adult learners.
