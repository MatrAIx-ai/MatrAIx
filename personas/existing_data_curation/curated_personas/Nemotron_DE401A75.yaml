personas:
  professional: Miguel Doyle, a 39‑year‑old secondary‑school mathematics and physics teacher, blends a love for routine and hands‑on problem solving to design data‑driven curricula and immersive labs, while
    their relaxed scheduling habit lets spontaneous woodworking and chess sessions slip into after‑school mentorship at the robotics club.
  sports: Miguel Doyle enjoys weekend fishing trips on Lake Michigan with the Allegan County Fly Fishing Association, follows the Detroit Lions, Detroit Tigers, and Michigan Wolverines with steady fan devotion,
    and they stay fit through regular morning jogs, occasional weight‑lifting at the local gym, and seasonal snowshoeing during Michigan winters.
  arts: Miguel Doyle relaxes by listening to classic‑rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones, attends occasional performances at the Grand Rapids Civic Theatre, and they channel
    their creative energy into woodworking projects that echo the craftsmanship of late‑20th‑century artisans.
  travel: Miguel Doyle prefers flexible, short‑road‑trip getaways that combine fishing, camping, and local culture, often heading to Michigan’s Upper Peninsula or Ohio’s Hocking Hills, while dreaming of
    a future overseas robotics expo in Tokyo that would merge their professional interests with adventure, but limited time and budget keep most trips within a few‑hour drive radius.
  culinary: Miguel Doyle, a competent home cook, favors comforting dishes such as pan‑fried perch with lemon, garlic‑roasted potatoes, and homemade meatloaf topped with fresh tomato‑basil sauce from their
    garden, and they enjoy occasional indulgence at local diners while occasionally over‑salting their recipes.
  core: Miguel Doyle is a routine‑driven STEM teacher and hobbyist who secretly hoards extra fishing line in the garage and routinely misplaces their wallet on the kitchen counter.
background:
  cultural: Miguel grew up in a Midwestern, white, working-class family in Michigan, with deep roots in the region’s German-Irish heritage. The cultural environment emphasized hard work, self-reliance,
    and community involvement, values that still inform his practical, down-to-earth outlook. He maintains traditional American customs—celebrating holidays with family recipes, participating in local church
    activities, and supporting community events like the county fair. The pragmatic, modest ethos of the Midwest blends with his respect for tradition, shaping his teaching philosophy and lifestyle.
