personas:
  professional: Kenneth Ramos, a two‑year‑old budding architect of block towers, demonstrates methodical planning and organized play, arranging each wooden brick with calm precision and reliably completing
    his miniature constructions before moving on to the next imaginative venture.
  sports: Kenneth Ramos enjoys toddling around the neighborhood park, where he enthusiastically kicks a soft soccer ball as part of the Tiny Tots Soccer Club and occasionally mimics his favorite professional
    team, the New York Yankees, by waving a tiny cap, while his parents enroll him in gentle gymnastics sessions with the Little Sprouts Gymnastics Academy to develop coordination.
  arts: Kenneth Ramos, a two‑year‑old aficionado of bright colors, spends hours finger‑painting wild swirls while humming tunes by Raffi and The Wiggles, and his small bookshelf boasts picture books by
    Dr. Seuss, reflecting an early appreciation for visual and auditory art.
  travel: Kenneth Ramos, ever the curious explorer, embarks on family road trips with his beloved stuffed giraffe, favoring visits to the interactive exhibits at Orlando’s Disney World and the sandy shores
    of Santa Monica, where he methodically collects seashells before napping in the back seat.
  culinary: Kenneth Ramos, a two‑year‑old connoisseur of simple comfort foods, delights in creamy mac and cheese, sweet banana slices, and the occasional bite of chicken nuggets, yet stubbornly refuses
    broccoli, often negotiating with parents for an extra drizzle of honey on his oatmeal.
  core: Kenneth Ramos, the perpetually serene two‑year‑old who meticulously lines up his toy cars, saves every penny in his piggy bank, and prefers quiet corners to noisy parties, embodies a rare blend
    of curiosity, orderliness, and calm.
