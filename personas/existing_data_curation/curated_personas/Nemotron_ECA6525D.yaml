  career_goals: Johan aims to transition into senior technology leadership, targeting roles such as Vice President of Engineering or Chief Technology Officer within a mid-size enterprise. He is driven to
    spearhead large-scale digital transformation initiatives that leverage AI and cloud technologies to create measurable business impact. In the longer term, he envisions launching his own consultancy
    that helps organizations adopt disciplined, data-driven processes while maintaining high standards of performance and innovation.
