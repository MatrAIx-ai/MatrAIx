  career_goals: Casey aims to transition from a mid‑level software engineer role to a senior technical architect position within the next three years. She wants to lead cross‑functional development teams,
    spearhead the adoption of cloud‑native solutions, and mentor junior developers. Ultimately, she aspires to launch her own SaaS startup focused on automating small‑business operations, leveraging her
    competitive drive and desire for autonomy. She plans to earn advanced certifications (AWS Solutions Architect Professional, Certified Information Systems Security Professional) and secure remote leadership
    opportunities that blend structure with flexibility.
