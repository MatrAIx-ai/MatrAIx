  career_goals: Ana Marie aims to move into a supervisory role, such as shift lead or store manager, within the next three years. She plans to enroll part‑time at San Diego Mesa College to earn an associate
    degree in business administration, which will give her a foundation for managing a small retail business of her own. She also hopes to develop stronger leadership and organizational skills, allowing
    her to mentor new cashiers while maintaining the flexible schedule she values.
