personas:
  professional: Jonathan Wells, a 28‑year‑old wholesale manufacturing sales representative, leverages his STEM background and rapid technical comprehension to translate complex product specifications into
    compelling value propositions, using his calm, resilient demeanor and outgoing, team‑focused energy to nurture long‑term client relationships while they eye a promotion to regional sales manager within
    the next few years.
  sports: Jonathan Wells is a dedicated member of the Green Bay Blizzards amateur ice‑hockey league, a fervent Green Bay Packers tailgate enthusiast, an occasional participant in the Door County Trail Club’s
    guided hikes, and a fantasy‑football league captain who follows the Milwaukee Bucks during basketball season, all while they maintain a disciplined fitness routine that balances team sports and personal
    endurance.
  arts: Jonathan Wells performs regularly with the Green Bay Improv Collective, finds inspiration in folk storytellers like John Prine and contemporary indie musician Sufjan Stevens, and attends the annual
    Door County Art Fair where they admire regional painters and craftspeople, weaving humor and music into their social identity.
  travel: Jonathan Wells prefers road‑trip adventures, planning weekend getaways to Door County’s shoreline trails and Mackinac Island’s bike routes while also taking spontaneous drives to Chicago for Packers
    games and Nashville for live music, blending a structured itinerary with flexible detours despite saving for a down‑payment on a home.
  culinary: Jonathan Wells enjoys hearty Midwest fare, regularly grilling bratwurst with locally milled mustard, snacking on fresh cheese curds with a dash of sea salt, and experimenting with a homemade
    cheese‑and‑beer fondue that showcases Wisconsin cheddar and craft ale, all while they showcase a growing confidence in the kitchen.
  core: Jonathan Wells navigates life with a practical optimism, juggling sales targets and community improv while never leaving home without a multi‑tool, yet they habitually skip personal downtime and
    occasionally fuel late‑night work sessions with energy drinks.
background:
  cultural: Jonathan grew up in Green Bay, Wisconsin, within a middle‑class white family of likely German‑Scandinavian ancestry—a common heritage in the region. The Midwestern culture of modesty, hard work,
    and community cooperation shaped his values. He was immersed in the local manufacturing economy, the strong Packers fan tradition, and seasonal outdoor activities that emphasize practicality and self‑reliance.
    Annual celebrations like Thanksgiving, Fourth of July parades, and local bratwurst festivals reinforced his connection to regional customs while fostering a friendly, inclusive outlook.
