  career_goals: Jonathan aims to advance from his current sales representative role to a regional sales manager position within the next three to five years, overseeing a team of reps across the Upper Midwest.
    He aspires to specialize further in emerging manufacturing technologies, positioning himself as a trusted industry expert who can bridge engineering insights and market demands. Long‑term, he envisions
    launching his own consultancy that helps midsize manufacturers optimize their sales processes through data‑driven strategies, while also mentoring young professionals entering the field.
