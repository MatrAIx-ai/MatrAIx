  hobbies: '[''Gardening (herbs & vegetables)'', ''Beach sunrise walks'', ''Tai Chi'', ''Reading business biographies and historical non‑fiction'', ''Bridge club'', ''Birdwatching'', ''Mediterranean cooking
    and small dinner parties'', ''Volunteer at library adult‑literacy program'', ''Attending local art exhibitions'', ''Puzzle solving (crosswords, sudoku)'']'
  career_goals: In retirement, Virginia aims to translate her decades of experience into community impact. She plans to volunteer as a mentor for a local small‑business incubator, serve on the board of
    a senior‑focused arts nonprofit, and author a concise guide on financial planning for retirees. Additionally, she hopes to launch a micro‑garden project for her condo community to promote sustainable
    living and social interaction among neighbors. While she values practical outcomes, she remains open to occasional consulting work that offers flexibility and personal satisfaction.
