personas:
  professional: Yesenia Torres is a retired community organizer who channels her methodical planning skills into coordinating church socials, cultural festivals, and a monthly workshop series at the local
    community center where they teach traditional cooking and crafts.
  sports: Yesenia Torres enjoys low‑impact fitness, regularly walking the local nature trails with a walking club, cheering on the Indianapolis Colts on Sunday evenings, and occasionally joining a senior
    volleyball league at the community center, while avoiding high‑intensity cardio that strains their joints.
  arts: Yesenia Torres is an avid watercolorist who paints Indiana prairie sunsets, a dedicated member of a community theater troupe where they perform in seasonal productions, and a quilting enthusiast
    who stitches patterns inspired by traditional folk motifs, often citing Frida Kahlo and Mary Cassatt as artistic inspirations.
  travel: Yesenia Torres prefers leisurely road trips, having driven the scenic byways of the Ohio River Valley and planning a future visit to the historic missions of Texas, balancing travel costs with
    a tight budget and using senior discounts for accommodation and museum entry.
  culinary: Yesenia Torres is an accomplished home chef who perfects mole poblano, chiles en nogada, and hand‑made corn tortillas using garden‑grown cilantro and epazote, delights in preparing pan dulce
    for family gatherings, yet occasionally over‑salts the salsa, prompting friendly teasing from relatives.
  core: Yesenia Torres is a curiosity‑driven, organized retiree who blends gardening, cooking, and cultural storytelling into community workshops, balancing meticulous budgeting with a love for vibrant
    family meals and gentle outdoor activity, all while navigating the occasional forgetfulness of senior life.
background:
  cultural: Yesenia is a first‑generation Mexican American who grew up in a bilingual household where Spanish was spoken at home and English at school. Her upbringing emphasized family cohesion, respect
    for elders, and community celebration of traditions such as Día de los Muertos and Cinco de Mayo. While residing in Monticello, Indiana, she has blended her Mexican heritage with Midwestern values,
    sharing authentic recipes, music, and stories with neighbors. Her cultural identity informs her daily life, from cooking and language use to her involvement in local cultural events that bridge her
    Mexican roots and American community.
attributes:
  skills: '[''Traditional Mexican cooking'', ''Vegetable gardening'', ''Household budgeting and finance'', ''Community event planning'', ''Bilingual Spanish-English communication'', ''Sewing and quilting'',
