  hobbies: '[''Gardening'', ''Cooking Mexican dishes'', ''Reading historical fiction'', ''Attending community theater'', ''Watercolor painting'', ''Knitting and quilting'', ''Genealogy research'', ''Walking
    nature trails'', ''Participating in cultural festivals'']'
  career_goals: Although retired, Yesenia remains purpose‑driven. She aims to document her family's migration story and preserve oral histories for future generations. She aspires to start a monthly cultural
    workshop at the local community center where she can teach traditional cooking and craft techniques. She also plans to learn digital photography to complement her storytelling. Volunteering as a mentor
    for younger mothers and participating in senior‑focused continuing education classes are other ambitions she hopes to pursue.
