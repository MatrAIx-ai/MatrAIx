  career_goals: Fernando often talks about becoming an astronaut who explores space and visits the moon, inspired by picture books and videos about rockets. He also dreams of playing soccer for Costa Rica's
    national team, practicing kicks with his dad and imagining scoring goals in big stadiums. These ambitions blend his curiosity about the universe with a competitive spirit that loves being the best in
    a game.
