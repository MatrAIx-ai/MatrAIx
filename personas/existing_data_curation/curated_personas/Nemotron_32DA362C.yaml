personas:
  professional: Fernando Vazquez, a preschool explorer with a budding fascination for building block engineering, combines curious questioning with a practical knack for following step‑by‑step instructions,
    and they channel their competitive spirit into friendly construction challenges with peers.
  sports: Fernando Vazquez dashes around the playground as a star forward for the Little Explorers youth soccer club, channels their competitive drive into weekend matches while cheering for the River City
    Guardians baseball team every summer, and they prefer high‑energy tag games over sit‑downs.
  arts: Fernando Vazquez revels in drawing superhero capes inspired by Marvel’s Spider‑Man and practices enthusiastic sing‑alongs to Disney’s ‘Let It Go’ from Frozen, often staging impromptu performances
    for their family, and they love receiving applause after each act.
  travel: Fernando Vazquez loves spontaneous family road trips to the seaside boardwalk in Atlantic Town and dreams of a future adventure at Disneyland Paris after watching whimsical travel videos together,
    and they eagerly pack their tiny suitcase with stuffed animals for each journey.
  culinary: Fernando Vazquez devours cheesy macaroni, chicken nuggets with crispy breadcrumbs, and apple slices dipped in peanut butter, proudly pretends to stir the pot in their play kitchen, yet they
    stubbornly refuse broccoli despite their parents’ gentle coaxing.
  core: Fernando Vazquez is a bright‑eyed, competitive four‑year‑old whose curiosity fuels relentless block‑building quests, who hoards coins like treasure, battles pollen sneezes with a brave grin, and
    they never say no to a cheeky game of tag.
background:
  cultural: Fernando grows up in a bilingual Costa Rican household in Everett, WA. At home, his parents speak Spanish, celebrate Costa Rican holidays such as Día de la Independencia, and prepare traditional
    dishes like gallo pinto, allowing him to experience his heritage daily. He also participates in local community activities and enjoys the Pacific Northwest’s rainy climate and green parks. This combo
    of Costa Rican culture and Northwestern life nurtures a love for family gatherings, music, storytelling, and an inquisitive outlook toward the broader world.
