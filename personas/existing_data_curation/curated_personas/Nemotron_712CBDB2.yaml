personas:
  professional: Mary Anziano is a veteran elementary and middle school teacher who leverages three decades of data‑driven lesson design, SEL‑infused curriculum, and tech integration to create predictably
    structured yet adaptable classrooms, while they eye the curriculum coordinator role to scale their meticulous approach across the district.
  sports: Mary Anziano is an avid member of the San Bernardino Trail Association, hikes the mountain trails weekly, cheers for the Los Angeles Lakers and Los Angeles Dodgers, and participates in a senior
    walking club that balances low‑impact exercise with their occasional back discomfort.
  arts: Mary Anziano immerses themselves in historical fiction—favoring Ken Follett and Hilary Mantel—enjoys the soothing piano works of Ludovico Einaudi while knitting, attends performances at the Loma
    Linda Community Theatre, and collects folk‑inspired art prints by Mary Cassatt.
  travel: Mary Anziano prefers well‑planned road trips that blend scenic hikes and cultural stops, having explored the Grand Canyon, Zion National Park, and the historic streets of Santa Fe, while dreaming
    of a pilgrimage to Kyoto’s temple gardens to deepen their meditation practice.
  culinary: Mary Anziano crafts plant‑based meals such as quinoa‑kale bowls with tahini, lentil‑sweet potato stew seasoned with turmeric and nutritional yeast, and black‑bean tacos, often experimenting
    with seasonal vegetables from their garden and sourcing organic chickpeas from local farmers' markets.
  core: Mary Anziano is a structured, worry‑prone educator who balances meticulous lesson planning with a love of gardening, yoga, and crafty indulgences, all while vigilantly managing finances and health.
background:
  cultural: Mary Ann was raised in a middle‑class, white family in Southern California, where education, community service, and a sense of order were emphasized. Her upbringing was shaped by Protestant
    values, with frequent involvement in church activities and a strong ethic of stewardship and service. Living in Loma Linda, a community known for its health‑conscious, Seventh‑day Adventist influences,
    she has adopted a lifestyle that prioritizes wellness, vegetarian cooking, and holistic well‑being. These cultural currents—respect for tradition, an emphasis on structured community involvement, and
    a collective focus on health—have interwoven with her personal values, reinforcing her preference for predictability, practicality, and compassionate responsibility.
