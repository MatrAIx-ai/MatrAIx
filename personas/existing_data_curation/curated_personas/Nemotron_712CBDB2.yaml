  hobbies: '["Gardening","Reading historical fiction","Yoga and mindfulness meditation","Hiking in the San Bernardino Mountains","Knitting","Cooking healthy meals","Volunteering at community center after‑school
    program","Journaling"]'
  career_goals: Mary Ann aims to transition into a curriculum coordinator role within the next two years, where she can shape school‑wide instructional frameworks and lead professional‑development workshops
    on structured lesson design and SEL integration. She is also interested in obtaining an additional certification in special education to better support inclusive classrooms. While she values the stability
    of her current teaching position, she hopes to gradually reduce her workload to part‑time consulting, offering expertise to neighboring districts on creating balanced, predictable learning environments.
    Ultimately, she seeks to leave a legacy of well‑organized, compassionate classrooms that empower both teachers and students.
