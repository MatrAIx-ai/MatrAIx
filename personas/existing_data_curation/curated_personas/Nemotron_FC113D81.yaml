  career_goals: Larry dreams of becoming a professional illustrator or comic‑book artist, hopes to design his own video games, and imagines building simple robots as a young inventor. He is determined to
    win school art contests, be recognized for his unique style, and eventually work at a creative studio where he can blend storytelling with visual design. Occasionally he talks about exploring space
    as an astronaut, reflecting his curiosity and desire to forge an unconventional path that lets him stand out among his peers.
