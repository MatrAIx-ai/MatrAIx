  career_goals: Andre aims to be promoted to store manager within the next two years, then advance to a district manager role where he can oversee multiple locations. He seeks to drive sales growth through
    data‑driven strategies, implement robust employee development programs, and improve operational efficiency. He is pursuing a retail management certification and considers an MBA to broaden his strategic
    skill set. Long‑term, he envisions opening his own boutique that blends contemporary fashion with community‑focused initiatives and mentorship opportunities for young entrepreneurs.
