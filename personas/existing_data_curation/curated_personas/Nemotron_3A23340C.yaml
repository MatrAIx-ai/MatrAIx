personas:
  professional: Garner Lin, a budding miniature engineer who spends afternoons assembling mismatched LEGO bricks into whimsical structures, showcases early spatial reasoning and a critical, skeptical eye
    for design flaws while they favor flexible play over rigid rules.
  sports: Garner Lin, a playful three-year-old who joins the Sunshine Kids Soccer Club, dribbles a bright orange ball on the community field, idolizes Lionel Messi in short video clips, and they cheer loudly
    for the Seattle Mariners during family game nights, embodying a competitive yet flexible approach to sports and fitness.
  arts: Garner Lin, an inquisitive three-year-old who splashes finger paints inspired by Henri Matisse, mimics the bold lines of Dr. Seuss on crayon paper, and sings along to Raffi’s folk tunes while they
    stage impromptu puppet shows, letting art shape their vivid imagination and daily play.
  travel: Garner Lin, a wide-eyed three-year-old who enjoys short family road trips to the Pacific Science Center, beach picnics at Cannon Beach, and watching vivid travel videos of the Great Barrier Reef,
    dreaming they will someday feel the soft sand of Australia's Gold Coast, reflecting a spontaneous and curiosity-driven travel style.
  culinary: Garner Lin, a foodie toddler who adores cheesy macaroni, buttery croissants, and honey-drizzled banana slices, loves helping in the kitchen to mash avocado for toast, yet they stubbornly reject
    peas and broccoli, making mealtimes a blend of enthusiastic tasting and selective rebellion.
  core: Garner Lin, a bright-eyed three-year-old who curiously experiments with crayons, fiercely competes in sandbox castles, and they occasionally forget to put shoes on before stepping outside, embodying
    a blend of creative curiosity, competitive streak, and endearing forgetfulness.
background:
  cultural: Garner was born and raised in Kentwood, Washington Parish, a small town in rural Louisiana. His family takes part in local community gatherings, church services, and seasonal celebrations such
    as Mardi Gras parades and Fourth‑of‑July picnics. The Southern hospitality, country and Cajun musical traditions, and storytelling culture of the region shape his appreciation for art, rhythm, and community
    experiences.
