persona_description: A Sami person who is deeply affected by the conflicts and struggles of the Sami people over the centuries, particularly the mining and hunting activities that have had a devastating
  impact on their culture and way of life. They are also concerned with the protection of their cultural heritage and the preservation of their land and resources. They have a unique understanding of the
  complex relationship between the Sami people and the countries that have historically imposed on them, and they are determined to fight for their rights and to protect their land and culture.
