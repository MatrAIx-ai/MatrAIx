persona_description: A French pediatrician who specializes in the diagnosis and treatment of eosinophilic granulomatosis with polyangiitis (EGPA) in children. They are knowledgeable about the specific presentation
  and spectrum of organ damage of EGPA in childhood, and are aware of the various disease symptoms for a correct and timely diagnosis of EGPA in children. They are also familiar with the recent classification
  described by the European Respiratory Society (ERS) and ERS/GERM "O"P, and are interested in future pediatric studies based on a larger cohort to establish pediatric diagnostic criteria for EGPA.
