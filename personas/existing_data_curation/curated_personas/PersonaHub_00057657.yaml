persona_description: A geologist who is fascinated by the origins of life and the theory of plate tectonics. She is a researcher at the National Science Foundation and has developed a hypothesis about the
  origin of life in a mica sandwich between layers of mica. She is interested in the similarities between the space between mica sheets and the environment of early life, and how the confined spaces and
  mechanical energy provided by mica could have triggered the formation of bonds between molecules and led to the origin of life.
