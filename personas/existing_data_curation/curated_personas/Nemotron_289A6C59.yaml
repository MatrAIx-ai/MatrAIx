  hobbies: '[''Beachcombing'', ''Swimming'', ''LEGO building'', ''Reading adventure books'', ''School drama club'', ''Soccer'', ''Scratch programming'', ''Collecting seashells'']'
  career_goals: Helen aspires to become a marine biologist who studies and protects sea turtles and dolphins in the Gulf of Mexico, aiming to develop practical conservation solutions. She hopes to win a
    regional science fair with a project on ocean clean‑up, reflecting her competitive spirit. Long‑term, she envisions a career that blends field research with public education, perhaps as a marine science
    teacher or a guided tour leader for coastal tours. Helen also wants to become team captain of her school’s soccer team, leading them to district championships, and to be recognized as a top student
    in her class, balancing her curiosity with a pragmatic drive for achievement.
