personas:
  professional: Helen Gervais, a nine‑year‑old budding engineer, combines her love of LEGO mechanized sets with Scratch coding to prototype animated marine‑themed games, applying her methodical planning
    and practical problem‑solving while they always keep an eye on the scoreboard in group projects.
  sports: Helen Gervais, a nine‑year‑old midfielder for the Venice Youth Soccer Club, thrives on the competitive rush of weekend league matches, practices penalty kicks at the local park, and balances her
    soccer drills with seasonal beach volleyball tournaments at Caspersen Beach, cheering loudly for the Tampa Bay Buccaneers while they secretly hope to score a goal as spectacular as a dolphin’s leap.
  arts: Helen Gervais, a nine‑year‑old drama club star who designs backdrops for school plays and idolizes Broadway’s Lin‑Manuel Miranda and Disney Channel’s Zendaya, spends her afternoons rehearsing lines,
    crafting costume accessories from seashells, and aspires to direct a marine‑themed musical for the Venice Arts Festival, while they occasionally stay up late to watch animated movies, sacrificing bedtime.
  travel: Helen Gervais, a nine‑year‑old beach‑loving explorer, spends summer holidays collecting seashells on Sanibel Island, dreams of snorkeling the coral reefs of the Florida Keys, and has a wishlist
    that includes a family road‑trip to Washington D.C.’s Smithsonian museums and a future visit to the shores of New Zealand’s Bay of Islands, while they plan each adventure with a meticulously drawn map
    in their sketchbook.
  culinary: Helen Gervais, a nine‑year‑old junior chef who loves whipping up shrimp tacos with fresh lime, pineapple salsa, and a sprinkle of cilantro, experiments with homemade guacamole using ripe avocados,
    and enjoys the occasional treat of chocolate‑covered pretzel sticks, though they often forget to wash their hands after handling raw seafood.
  core: Helen Gervais, a nine‑year‑old curiosity‑driven go‑getter, merges beach‑side adventures with LEGO engineering, competitive soccer, and drama flair, all while they obsessively organize their seashell
    collection and doubt strangers’ motives.
background:
  cultural: Helen comes from a white, middle‑class family with French‑Canadian ancestry, reflected in her surname Gervais. Raised in Venice, Florida, she grows up in a coastal community where beach culture,
    marine conservation, and outdoor activities are central to daily life. Her family celebrates typical U.S. holidays such as Thanksgiving, Christmas, and Independence Day, and participates in local events
    like the Venice Arts Festival, community beach clean‑ups, and school fairs. The multicultural mix of residents and tourists fosters an openness to diverse ideas, while her parents emphasize practical
    education, encouraging her curiosity about science, problem‑solving, and real‑world applications.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizational planning'', ''Team coordination (soccer)'', ''Scratch programming'', ''LEGO engineering'', ''Marine ecology basics'', ''Swimming
