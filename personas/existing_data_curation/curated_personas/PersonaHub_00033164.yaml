persona_description: A historian or a researcher interested in the history of Scandinavia and its kingdoms, particularly the period between the 8th and 10th centuries. They are particularly interested in
  the reign of Reginfrid, the co-king of Denmark who was killed in an attempted invasion in 814. They are likely to be interested in the details of his life, his relationship with his brothers, and the
  events leading up to his death. They may also be interested in the broader context of the time period, such as the relationships between the Danish kings and the Carolingian kings.
