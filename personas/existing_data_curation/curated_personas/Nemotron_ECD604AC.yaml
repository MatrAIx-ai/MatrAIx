  hobbies: '[''Gardening'', ''Woodworking'', ''Listening to classic jazz'', ''Attending live music events'', ''Church community volunteering'', ''Mentoring high‑school students in STEM'']'
  career_goals: Winston aims to transition into a senior HR leadership role within the next five years, such as HR Business Partner or HR Director, where he can integrate his technical expertise to drive
    strategic workforce planning. He is committed to building inclusive, data‑informed cultures and hopes to lead organization‑wide diversity and inclusion initiatives. In the longer term, he envisions
    establishing his own consulting practice that assists mid‑size companies in implementing efficient, technology‑enabled HR systems while preserving employee well‑being.
