personas:
  professional: Vitina Zoeckler, a retired community organizer turned senior‑center liaison, leverages decades of event planning, budget management, and volunteer coordination to structure inter‑generational
    projects while applying their practical, detail‑oriented mindset and a healthy dose of competitive spirit to keep initiatives on schedule.
  sports: Vitina Zoeckler stays active through daily riverside walks with the Paducah Senior Walking Club, participates in low‑impact water aerobics at the community center, and cheerfully roots for the
    University of Kentucky Wildcats and the nearby Paducah High School basketball team during the season.
  arts: Vitina Zoeckler volunteers at the Paducah Arts and Heritage Center, leads quilting workshops inspired by the mural work of local artist James B. Harvey, and regularly enjoys bluegrass performances
    by the Sierra Hull Trio and folk storytelling evenings featuring storyteller John Larkin.
  travel: Vitina Zoeckler prefers short, organized group trips—such as a weekend river cruise to New Orleans, a cultural tour of Nashville’s music scene, and annual family visits to the Great Smoky Mountains—balancing
    their love of exploration with the comfort of familiar companions and a modest travel budget.
  culinary: Vitina Zoeckler excels at crafting Southern comfort meals, from perfectly fried catfish seasoned with cayenne pepper to buttery cornbread made with stone‑ground cornmeal, and they delight in
    serving banana pudding topped with fresh whipped cream at every potluck.
  core: Vitina Zoeckler blends disciplined organization, community devotion, and a competitive zest for games into a lively senior life, though they occasionally overcommit to projects and forget to take
    their blood pressure medication.
background:
  cultural: Vitina was born and raised in Paducah, Kentucky, in a white, multi-generational family that embodies the region's Southern-Appalachian values of hospitality, self-reliance, and community service.
    Raised in a Baptist church, she grew up with a strong emphasis on church fellowship, local festivals, and traditional cuisine. The cultural fabric of the Ohio River town, known for its murals, river
    festivals, and bluegrass music, has shaped her love for the arts, outdoor river activities, and preserving local history. These influences are evident in her social engagements, culinary preferences,
    and dedication to community traditions.
