  career_goals: Although retired, Vitina aims to stay physically active and mentally engaged. She plans to expand her role as a senior-center liaison, building bridges between older residents and local
    schools for inter-generational projects. She hopes to document and publish a collection of family recipes and stories, preserving her community's culinary heritage. Vitina is also working toward completing
    a basic digital-literacy course so she can share her experiences online and mentor younger volunteers. Securing small grants to revitalize the community garden is another ambition, as is leading the
    annual Paducah Riverfest volunteer team.
