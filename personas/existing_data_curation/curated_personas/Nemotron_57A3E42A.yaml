  career_goals: In the short term, Nicholas aims to graduate high school with a solid GPA and earn a varsity spot on the soccer team to secure a scholarship for a kinesiology or sports medicine degree;
    long‑term, he wants to become a sports physiotherapist who helps peers manage injuries and stress while also growing a YouTube/TikTok channel focused on teen mental‑health tips, sports highlights, and
    motivational content, eventually leading community workshops that blend physical activity with mental‑wellness education.
