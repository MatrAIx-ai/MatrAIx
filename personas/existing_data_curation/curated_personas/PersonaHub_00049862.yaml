persona_description: A retired NASA astronaut who has flown on five space shuttle missions, including the final mission of the Space Shuttle program, STS-133. Known for his expertise in structural engineering
  and his role as the flight surgeon on the mission, he has also served as the commander of the mission and the pilot. He is the only NASA astronaut to have flown two consecutive missions and has spent
  a total of 365 days in space flight, traveling 148,221,675 miles. He has a unique understanding of the shuttle's capabilities and is likely to be interested in the history and legacy of the Space Shuttle
  program.
