  career_goals: Joshua envisions shifting his focus from direct bedside care to strategic leadership and education within the nursing profession. He plans to complete his Bachelor of Science in Nursing
    and pursue a Master’s degree in Nursing Administration, positioning himself for roles such as Clinical Nurse Educator or Quality Improvement Director at his regional health system. Driven by his curiosity
    for innovative care, he aims to design and secure funding for an evidence‑based art‑therapy program that supports patients with chronic illnesses and promotes holistic healing. Additionally, he hopes
    to mentor the next generation of rural nurses, champion telehealth solutions to expand access for underserved communities, and lead initiatives that embed patient safety and interdisciplinary collaboration
    into everyday practice. Ultimately, his ambition is to leave a lasting impact on both the professional development of his colleagues and the well‑being of the patients he serves.
