personas:
  professional: A veteran registered nurse named Joshua Shelton, with over four decades of acute, chronic, and community health experience in the Pacific Northwest, they leverage meticulous organization,
    health informatics expertise, and a passion for therapeutic art to spearhead quality‑improvement programs, mentor new nurses, and design evidence‑based art‑therapy initiatives for chronic‑illness patients.
  sports: Joshua Shelton embraces an active lifestyle through weekly hikes in the Umatilla National Forest, they are a member of a senior walking club that regularly strolls the Columbia River Gorge, enjoy
    occasional cross‑country skiing trips to Mount Hood, and avidly follow the Seattle Kraken and Portland Timbers, cheering them on during the season.
  arts: Joshua Shelton channels his curiosity into watercolor landscapes inspired by Monet and O'Keeffe, they practice macro photography echoing Ansel Adams’ reverence for nature, serve as a docent at the
    Milton‑Freewater Museum where they share insights on unconventional storytelling, and regularly attend community theater productions of works by Tom Stoppard and Lin‑Manuel Miranda.
  travel: Joshua Shelton prefers meticulously planned road trips that blend adventure with relaxation, they schedule yearly drives along the Oregon Coast, weekend getaways to Yellowstone and Banff National
    Parks, and a long‑awaited pilgrimage to Kyoto’s historic temples to study Japanese garden design.
  culinary: Joshua Shelton cultivates a modest herb garden to create farm‑to‑table meals, they frequently prepare herb‑marinated salmon with lemon dill, rosemary‑roasted potatoes, wild mushroom risotto,
    and a seasonal honey‑glazed carrot purée, though their occasional impatience leads to over‑cooked fish when they rush their plating.
  core: Joshua Shelton fuses disciplined nursing leadership with a painter’s eye for detail, they turn every patient interaction and garden stroll into a study in harmony and curiosity, even if their perfectionism
    sometimes slows their brush strokes.
background:
  cultural: Joshua’s cultural background is rooted in the mid‑20th‑century American Midwest and Pacific Northwest, reflecting a family lineage that traces back to English and German immigrants who settled
    Oregon’s fertile valleys in the early 1900s. Raised in a small farming community within Umatilla County, he grew up immersed in values of hard work, self‑reliance, and community service, often participating
    in local church gatherings, county fairs, and volunteer initiatives. The expansive landscapes of the Columbia River Gorge and the region’s rich Indigenous heritage have shaped his deep appreciation
    for nature and respect for cultural diversity, which he honors through his involvement in community arts programs. While his upbringing aligns with mainstream white, rural American traditions, his openness
    to new ideas and artistic expression reflects a broader, inclusive view of cultural identity.
