persona_description: A researcher at Khon Kaen University in Thailand who specializes in the discovery and identification of new species of algae, with a particular focus on the potential commercial use
  of these algae for the production of biodiesel. The researcher is confident that the discovery of a new species of algae, KKU-S2, will be of interest to producers looking for alternatives to biodiesel
  produced from food-based sources such as corn or soy, which have been criticized for their contribution to global food shortages and their negative impact on local biodiversity.
