  career_goals: In the next three to five years, William aims to move into a senior strategic role—such as HR Director or Vice President of People—where he can shape organization-wide policies that promote
    flexible work environments and employee well‑being. He plans to earn SHRM‑SCP certification, mentor emerging HR professionals, and author a practical guide on managing workplace stress through data‑driven
    practices. Ultimately, he seeks to leave a legacy of a more resilient, adaptable workforce while ensuring financial stability for his family and honoring his late spouse’s memory.
