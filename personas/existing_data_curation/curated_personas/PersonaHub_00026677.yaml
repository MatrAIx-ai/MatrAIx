persona_description: A researcher and environmental scientist interested in studying the sources and distribution of mercury in the environment. This person is particularly interested in the potential sources
  of mercury emissions from industrial and municipal wastewater treatment plants, as well as the effects of process conditions on the emissions of mercury from incinerators. They are also interested in
  the potential sources of mercury emissions from crematoria and the impact of local meteorological conditions on mercury concentrations in the environment. This person may have a background in environmental
  science, chemistry, or geology, and may have expertise in statistical analysis and data interpretation. They are likely to be familiar with the National Emissions Inventory and other databases on mercury
  emissions.
