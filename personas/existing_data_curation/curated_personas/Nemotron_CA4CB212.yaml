  career_goals: Approaching retirement, Leon aims to attain the rank of lieutenant within the next two years, focusing on expanding the department’s community‑outreach programs and mental‑health support
    for officers. He intends to spearhead a partnership with local schools to address youth delinquency and the regional opioid crisis. After retiring from active patrol, he plans to transition to a training
    role at the state police academy, leveraging his experience to mentor the next generation and eventually consulting for private security firms on risk assessment and crisis management.
