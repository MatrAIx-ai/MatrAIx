  hobbies: '[''Reading (historical fiction & African American literature)'',''Gardening (vegetable and herb garden)'',''Cooking Southern cuisine'',''Genealogy research'',''Quilting and textile crafts'',''Puzzle
    solving (crosswords, Sudoku, jigsaw)'',''Nature walks and birdwatching'',''Small‑group Bible study and church volunteering'']'
  career_goals: Edma aims to re-enter the workforce on a part‑time or flexible basis, leveraging her administrative background to support local nonprofits or small businesses. She plans to obtain a QuickBooks
    certification and possibly a project‑management micro‑credential to formalize her expertise. In addition, she hopes to expand her volunteer leadership within her church, mentoring younger women and
    organizing community outreach programs. A longer‑term ambition is to launch a home‑based bookkeeping service that provides affordable financial support to grassroots organizations in Rockdale County,
    while also investing in personal stress‑management practices to sustain her wellbeing.
