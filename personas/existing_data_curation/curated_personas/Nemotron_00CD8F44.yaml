  hobbies: '[''Gardening'', ''Bird watching'', ''Reading historical novels'', ''Crossword puzzles'', ''Woodworking'', ''Hiking Hill Country trails'', ''Cooking barbecue'', ''Participating in a local book
    club'', ''Volunteering for community clean-up events'', ''Attending church socials'']'
  career_goals: Approaching retirement, Karen aims to shift into a mentorship and consulting role, obtaining a HAZWOPER certification to offer safety audits for local contractors. She hopes to lead a community
    outreach program that educates small businesses and homeowners on proper hazardous-waste handling, and to be recognized for an exemplary safety record that minimizes job-site incidents. Her ambition
    is to balance continued income with a reduced field workload, allowing more time for personal pursuits while still contributing her expertise.
