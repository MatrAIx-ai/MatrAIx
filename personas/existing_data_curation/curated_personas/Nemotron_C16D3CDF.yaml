personas:
  professional: Elizabeth Serra, a versatile graphic designer at a bustling agency, blends curiosity with practicality by leveraging the full Adobe Creative Suite, Figma, and emerging AI-driven tools to
    deliver culturally resonant branding while they channel a competitive drive and organized workflow that push projects ahead of schedule and position them for a future creative director role.
  sports: Elizabeth Serra, a regular member of the San Bernardino Hiking Meetup and a weekend salsa dancer, tracks fitness with a Strava app, cheers on the LA Lakers and LA Dodgers, and they participate
    in a seasonal ultimate frisbee league, blending competitive energy with restorative trail runs.
  arts: Elizabeth Serra, an avid street photographer inspired by Alex Webb and a fan of graphic novels by Alan Moore, immerses themselves in the vibrant murals of artists like Shepard Fairey, dances to
    Celia Cruz’s salsa rhythms, and they experiment with AI-generated art alongside traditional sketching, shaping a dynamic visual identity.
  travel: Elizabeth Serra, who favors spontaneous weekend getaways to the Joshua Tree desert and planned cultural tours of Oaxaca and Barcelona, balances a modest travel budget with a love for vibrant city
    murals and salsa nights, and they often use Airbnb and flight-deal alerts to stretch their adventurous spirit.
  culinary: Elizabeth Serra, a confident home cook, regularly prepares mole poblano, hand-rolled tamales, and smoky esquites seasoned with cotija and epazote, using fresh chilies and masa, and they treat
    each meal as a canvas to blend cultural tradition with modern plating while also enjoying occasional brunches at local cafés.
  core: Elizabeth Serra fuses a competitive design mindset with a love for salsa-filled nights, spontaneous mountain hikes, and meticulous budgeting, all while they habitually juggle multiple creative projects
    and occasionally lose sleep to late-night photo shoots.
background:
  cultural: Elizabeth grew up in a bilingual Mexican‑American household in Ontario, California, where Spanish was spoken at home and English at school. Family traditions—such as celebrating Día de los Muertos,
    quinceañeras, and weekend gatherings around homemade tacos—instilled a strong sense of cultural pride. Her grandparents shared stories of Mexican folk art, which sparked her fascination with vibrant
    colors, intricate patterns, and symbolic motifs. These influences surface in her design work, where she often blends contemporary aesthetics with the bold, festive spirit of Mexican visual culture.
    Being separated at a young age has fostered her independence, motivating her to carve a distinct professional identity that honors her roots while embracing the diverse, dynamic environment of Southern
    California.
