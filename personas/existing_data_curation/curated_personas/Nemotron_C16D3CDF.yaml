  career_goals: Elizabeth aims to advance from a junior graphic designer to a senior role within a dynamic agency, eventually stepping into a creative director position where she can shape brand strategies
    for larger campaigns. She plans to deepen her expertise in UI/UX and motion design, incorporating emerging AI‑driven tools to streamline creative workflows while preserving a hands‑on aesthetic. Her
    long‑term ambition is to launch her own boutique studio that celebrates Mexican‑American culture through branding, packaging, and experiential design, positioning herself as a go‑to designer for culturally
    resonant projects. She also seeks recognition through design awards, speaking engagements at industry conferences, and mentorship of emerging designers from underrepresented backgrounds.
