  career_goals: Approaching retirement, Robert aims to transition into a supervisory role where he can mentor younger administrative staff and lead process-improvement projects for his organization. He
    hopes to leave a lasting impact by documenting best practices and creating a streamlined onboarding program. Beyond his career, he plans to volunteer his administrative expertise to local non-profits,
    helping community groups manage their operations more efficiently while maintaining a balanced, comfortable retirement lifestyle.
