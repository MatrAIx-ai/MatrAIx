  hobbies: '[''Landscape Photography'', ''Sketching'', ''Visiting Local Art Galleries'', ''Listening to Indie and Bluegrass Music'', ''Reading Mystery Novels'', ''Puzzle Solving (Sudoku, Crosswords)'',
    ''Hiking (Paducah River Trail)'', ''Experimental Cooking (Southern Fusion)'']'
  career_goals: Leah aims to obtain a full Class A CDL within the next year and transition from local deliveries to long-haul trucking. She aspires to become a route supervisor, leveraging her competitive
    nature to lead a team and improve efficiency. Ultimately, she envisions launching a boutique logistics firm that specializes in safe, climate-controlled transport of artwork and cultural artifacts,
    merging her logistical expertise with her love for art. To support these ambitions, she plans to enroll in a community college program in Supply Chain Management while developing stress-reduction techniques
    to better manage her tendency toward worry.
