personas:
  professional: Leah Edmonds is a commercial driver holding a Class B CDL who consistently maximizes route efficiency, conducts thorough vehicle safety inspections, and uses persuasive sales techniques
    with customers, channeling her competitive, organized, yet occasionally worry-laden mindset into a clear path toward Class A certification, route supervision, and eventually a boutique art‑logistics
    firm.
  sports: Leah Edmonds follows the Western Kentucky Hilltoppers for basketball, keeps a seasonal loyalty to the Nashville Predators for hockey, hikes the Paducah River Trail with the local hiking club,
    and attends weekly yoga sessions at a downtown studio to maintain flexibility after long drives.
  arts: Leah Edmonds immerses herself in indie and bluegrass shows, regularly attending performances by Sturgill Simpson, Phoebe Bridgers, and The Avett Brothers, while drawing inspiration from Ansel Adams’
    landscape photography and visiting the Caldwell Gallery to study works by local painter Maya Sanchez, fusing visual art with her own sketching habit.
  travel: Leah Edmonds prefers spontaneous road trips using a detailed route planner, balancing budget constraints by camping at Great Smoky Mountains and day‑tripping to Nashville’s music scene, while
    dreaming of a future extended stay in Kyoto to explore historic art museums and sample international cuisine.
  culinary: Leah Edmonds enjoys experimenting with Southern comfort dishes infused with global twists, such as shrimp and grits with Thai coconut curry, fried catfish glazed with gochujang, and biscuits
    topped with jalapeño cheddar and mango chutney, cooking at an intermediate level and often sourcing fresh collard greens and cardamom at the farmers market.
  core: Leah Edmonds blends a relentless drive for logistical efficiency with a restless curiosity for art, constantly reorganizing routes while worrying about missing a beat, and channels that tension
    into late‑night photography sessions and daring culinary experiments.
background:
  cultural: Leah was raised in a predominantly white, middle-class family in Bowling Green, Kentucky. Her upbringing reflects a mix of Southern hospitality and Midwestern practicality—values such as community
    loyalty, modesty, and a strong work ethic are ingrained in her. She grew up attending a local church, celebrating regional traditions like the Kentucky Derby and bluegrass festivals, while also being
    exposed to broader American pop culture through school art programs and regional museums. This cultural blend informs her appreciation for both traditional Southern arts and contemporary, unconventional
    expressions.
attributes:
  skills: '[''Commercial Driving (CDL)'', ''Route Optimization'', ''Customer Service & Sales'', ''Basic Vehicle Maintenance'', ''Sales Negotiation'', ''Inventory Management'', ''Time Management'', ''Problem
