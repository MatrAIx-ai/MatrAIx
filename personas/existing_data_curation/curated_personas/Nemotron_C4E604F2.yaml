    research and quality improvement'']'
  hobbies: '[''Museum visits and sketching'', ''Pottery classes'', ''Yoga and mindfulness meditation'', ''Gardening'', ''Exploring new cuisines and cooking'', ''Reading contemporary fiction'', ''Small-group
    book club'', ''Volunteering at community art center'']'
  career_goals: Kristin aims to earn a Doctor of Nursing Practice degree within the next three years to deepen her expertise in evidence-based, patient-centered care. She envisions establishing a community
    health clinic in D.C. that blends conventional primary care with creative therapeutic modalities such as art therapy and guided meditation. Long-term, she hopes to take on a leadership role as a clinical
    director or health policy advisor, influencing local health initiatives that prioritize mental well-being and health equity. Mentoring early-career nurses and advocating for patient empowerment remain
    central to her professional ambition.
