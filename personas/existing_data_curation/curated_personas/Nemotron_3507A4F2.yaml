  career_goals: Margaret dreams of a career that blends her love for art and curiosity about the world. She aspires to become an author‑illustrator of graphic novels, a museum curator specializing in contemporary
    and folk art, or a STEM educator who integrates visual storytelling into science lessons. Long‑term, she envisions roles in user experience design, scientific illustration, or environmental advocacy
    where she can use both creative and analytical skills to inspire others.
