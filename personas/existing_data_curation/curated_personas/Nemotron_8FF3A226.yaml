  hobbies: '[''Gardening'', ''Bridge'', ''Chess'', ''Volunteer work (Rotary Club)'', ''Hiking'', ''Woodworking'', ''Live music (jazz, bluegrass)'', ''Reading (history of science)'', ''Vintage radio tinkering'']'
  career_goals: Steven’s primary ambition is to remain intellectually active and give back to his community. He plans to serve as a volunteer advisor for the Aiken County Planning Commission, mentor high‑school
    and college students in STEM through the local Rotary Club, and lead workshops on sustainable building practices at the community college. He also hopes to co‑author a series of articles on the evolution
    of civil engineering techniques for a regional trade magazine, and eventually compile his professional experiences into a memoir that highlights the balance between practical engineering and innovative
    thinking.
