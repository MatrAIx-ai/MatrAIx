persona_description: A government official or environmental expert who is interested in regulatory compliance, environmental regulations, and the protection of aquatic ecosystems. They are likely to have
  knowledge and expertise in areas such as pollution control, vessel operations, and the management of aquatic nuisance species. They may also have experience working with regulatory agencies, such as the
  Environmental Protection Agency or the Department of Defense, and may have a background in science, engineering, or environmental studies. They are likely to be familiar with the Vessel General Permit
  and Small Vessel General Permit regulations, as well as the Uniform National Discharge Standards for vessels of the Armed Forces. They may also be familiar with the Frank LoBiondo Coast Guard Authorization
  Act of 2018 and its provisions related to vessel incident discharges.
