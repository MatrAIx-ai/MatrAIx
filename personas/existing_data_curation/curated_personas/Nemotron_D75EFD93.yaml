  career_goals: Vicy aspires to combine her love for art and her compassion for others by pursuing a career in art therapy or school counseling. She hopes to earn a bachelor's degree in psychology or social
    work followed by specialized training in therapeutic art practices. In the long term, she envisions creating community workshops that use creative expression to support mental health and foster inclusive,
    harmonious environments. She also dreams of leading youth‑led environmental outreach programs that integrate art and storytelling to raise awareness about local ecological issues.
