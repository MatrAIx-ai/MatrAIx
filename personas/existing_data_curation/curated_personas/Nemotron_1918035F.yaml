    Volunteering'']'
  career_goals: Elena aims to advance to senior program director or head of a Project Management Office within a technology or sustainability-focused organization. She plans to earn PMP, PgMP, and an MBA
    specialization in strategic management. Her ambition includes leading large-scale digital transformation initiatives that integrate data-driven solutions, while fostering a culture of cross-cultural
    collaboration. She intends to mentor junior project managers, develop a framework for inclusive project practices that leverages her Mexican heritage, and eventually launch a boutique consulting firm
    that helps Latinx-owned startups scale their operations through disciplined project management.
