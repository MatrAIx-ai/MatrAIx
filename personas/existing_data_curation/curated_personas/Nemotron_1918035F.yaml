personas:
  professional: Elena Arostegui, a 31‑year‑old senior project manager in a technology‑driven sustainability firm, blends agile expertise with a practical, data‑focused mindset, and they lead cross‑functional
    teams through digital transformation while using bilingual communication to bridge cultural gaps in international initiatives.
  sports: Elena Arostegui is an avid hiker of Laguna Canyon trails, attends weekly yoga sessions at a quiet studio, roots for the Los Angeles Dodgers and the LA Galaxy, and they occasionally join a local
    trail‑running club for seasonal races.
  arts: Elena Arostegui expresses creativity through landscape photography, draws inspiration from contemporary literature such as Valeria Luiselli’s novels, collects prints by Frida Kahlo, and they attend
    occasional independent film screenings at a local art house.
  travel: Elena Arostegui prefers low‑key, nature‑focused getaways, meticulously plans trips to Joshua Tree, Sedona, and the coastal town of Santa Barbara, and they dream of hiking Patagonia’s Torres del
    Paine, balancing weekend adventures with a modest travel budget.
  culinary: Elena Arostegui’s home‑cooking repertoire features mole with a California avocado twist, hand‑rolled tamales flavored with roasted poblano, and hearty pozole enriched with heirloom corn and
    chorizo, and they enjoy experimenting with fresh cilantro, ancho chilies, and smoked paprika.
  core: Elena Arostegui is a quietly driven project leader who blends disciplined planning with a love for solitary hikes, reflective journaling, and experimental cooking, and they occasionally neglect
    dental visits.
background:
  cultural: Elena was born to Mexican immigrant parents from Jalisco who settled in Southern California. Raised in a bilingual home, she fluently speaks both Spanish and English and grew up celebrating
    Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade cuisine. The vibrant Mexican-American community of Orange County shaped her values of family solidarity,
    respect for tradition, and a strong work ethic. She integrates these cultural influences into her professional life by promoting inclusive communication, valuing diverse perspectives, and often using
    culturally relevant examples when coaching teams. Her bicultural identity also fuels her commitment to support Latinx entrepreneurs and bridge cultural gaps in multinational projects.
