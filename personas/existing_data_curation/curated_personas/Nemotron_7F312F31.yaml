  hobbies: '[''Reading classic and contemporary literature'', ''Journaling personal reflections'', ''Backyard gardening and herb cultivation'', ''Participating in a small book club'', ''Volunteering to
    teach seniors basic computer use'', ''Walking nature trails in Suffolk County'', ''Taking beginner pottery classes'']'
  career_goals: Jeraldine aims to obtain advanced certifications such as Certified Nursing Assistant (CNA) and Medication Aide to broaden her clinical competencies. She aspires to move into a supervisory
    role within a home health agency, where she can mentor junior aides and improve care delivery standards. Long‑term, she envisions completing a part‑time program in health administration or social work
    to transition into case management, allowing her to advocate for seniors' resources and design community‑based wellness programs.
