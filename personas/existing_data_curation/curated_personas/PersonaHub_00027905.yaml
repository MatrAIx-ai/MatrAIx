persona_description: A researcher and inventor who specializes in developing flexible and adaptable robots, particularly those with the ability to change color, glow in the dark, and change temperature.
  They are passionate about protecting vulnerable and important sea life, particularly mollusks, shrimp, crabs, seahorses, and other invertebrates, and have dedicated their efforts to this cause. They are
  determined to save the Gulf of Mexico's invertebrates from potential extinction and have successfully created a robot that can blend seamlessly into a background or stand out so that it is easy to see.
  They have a unique and special knowledge of marine invertebrates, having discovered a jellyfish-like creature that uses red fluorescent light to lure prey and have also worked with scientists to discover
  an ancient ecosystem in an underground lake.
