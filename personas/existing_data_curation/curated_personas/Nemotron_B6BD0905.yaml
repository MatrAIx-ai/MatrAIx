  career_goals: Although retired from formal employment, Martha is driven to complete the degree she began in college, aiming for a bachelor's in history to complement her genealogical work. She aspires
    to compile and publish a family memoir that documents her ancestors' stories and the cultural heritage of the St. Tammany region. Martha hopes to expand her quilting hobby into a modest online boutique,
    sharing her designs with a broader audience while mentoring younger quilters in her community. She also seeks to take a leadership role in the local historical society, organizing exhibitions that highlight
    the area's French‑Creole and Anglo‑American roots. Her ambition is to leave a lasting legacy of knowledge, craft, and community service.
