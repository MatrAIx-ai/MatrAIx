personas:
  professional: Martha Cox, a retired community treasurer and event coordinator, blends meticulous budgeting expertise with a love for genealogical research, applying their organized, methodical nature
    to manage volunteer projects while maintaining a critical eye on every detail.
  sports: Martha Cox follows the New Orleans Saints and the New Orleans Pelicans, joins a senior bowling league each Thursday, and treats their daily garden tending and sunrise walks along the bayou as
    low‑impact cardio, reflecting an organized yet sometimes stress‑driven approach to maintaining fitness.
  arts: Martha Cox’s artistic life weaves together quilting with Southern motifs, admiration for photographer Margaret Bourke‑White, and regular attendance at community theater productions starring local
    actors such as James Monroe Iglehart, while their critical nature pushes them to perfect every stitch.
  travel: Martha Cox enjoys leisurely road trips to historic towns like Charleston, Savannah, and Natchez, prefers staying at quaint bed‑and‑breakfasts that allow ample time for genealogy research, and
    dreams of a guided tour of the French Quarter, balancing their love of tranquil reflection with a competitive desire to check off every historic site on their list.
  culinary: Martha Cox delights in cooking classic Southern dishes like shrimp étouffée, caramelized pecan pie, and heirloom tomato gazpacho, skillfully blending traditional flavors with experimental twists,
    though they sometimes neglect portion control when sampling their own desserts.
  core: Martha Cox is a detail‑driven, curiosity‑fuelled retiree who channels their organized skepticism into gardening, quilting, and community leadership, all while wrestling with a habit of over‑worrying
    about every decision.
background:
  cultural: Martha grew up in the deep South, rooted in Mandeville's blend of Anglo‑American, French‑Creole, and Cajun traditions. Her family has lived in St. Tammany Parish for generations, participating
    in local church life—she is a lifelong member of a historic Protestant congregation that emphasizes community service and Southern hospitality. She was shaped by the rhythms of the Mississippi River
    and the cultural festivities of Mardi Gras, which fostered an appreciation for music, food, and collective celebration. Her upbringing during the post‑World War II era exposed her to both the conservative
    values of the time and the gradual social changes of the civil‑rights movement, instilling a pragmatic skepticism and a strong sense of personal responsibility. These cultural influences inform her
    love of gardening, cooking regional dishes, preserving family history, and contributing to community organizations.
