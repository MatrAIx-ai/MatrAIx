persona_description: A person interested in legislative data and APIs, specifically the Sunlight Labs API. They are familiar with the methods available for obtaining information about legislators, including
  legislators.get and legislators.getList, and understand how to use parameters to filter the returned data. They are also aware of the limitations and considerations when using these methods, such as the
  inclusion of multiple values for a single parameter and the need to specify the all_legislators parameter for former legislators. Additionally, they may be interested in the use of the bioguide_id as
  a way to synthesize data from the Sunlight Labs API.
