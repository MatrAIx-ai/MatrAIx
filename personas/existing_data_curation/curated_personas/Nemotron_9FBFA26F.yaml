  hobbies: '["reading (historical fiction, art biographies, gardening guides)", "gardening (native plants, butterfly garden)", "knitting and crocheting", "genealogy research", "small-group book club", "visiting
    museums and art exhibitions", "volunteering with local historical society", "listening to classical and folk music"]'
  career_goals: Although retired from formal employment, Mirta's ambition is to become a valued mentor and cultural steward within her community. She aims to compile a comprehensive family history and a
    chronicle of Yadkin County's local art initiatives, which she plans to self-publish as a modest book for the town library. Mirta also hopes to launch a small inter-generational craft workshop series
    that pairs senior artisans with middle-school students, fostering artistic curiosity while preserving traditional techniques. She aspires to continue learning, currently enrolling in a community-college
    watercolor class and a short online course on historical preservation, with the long-term goal of curating an annual exhibition that showcases the work of local emerging artists and craftspersons.
