personas:
  professional: Francisco Santospagan is an aspiring comic‑book creator who fuses hand‑drawn sketches, digital collages, and bilingual storytelling, applying methodical planning to storyboard arcs while
    using their natural charisma to rally classmates for collaborative art projects, and they often lead the group during brainstorming sessions.
  sports: Francisco Santospagan plays midfield for the Eastside Strikers youth soccer club, cheers for the city’s professional team, the City United Falcons, and incorporates salsa and merengue dance steps
    into after‑school fitness routines while also following the international soccer league and idolizing players like Lionel Messi, and they never miss a weekend match.
  arts: Francisco Santospagan immerses themselves in creative expression, drawing inspiration from graphic novelist Alan Moore, digital artist Beeple, poet Langston Hughes, and photographer Annie Leibovitz,
    while regularly contributing sketches to the school art wall and capturing candid moments at neighborhood festivals with a vintage Polaroid camera, and they often share their work online to receive
    feedback.
  travel: Francisco Santospagan enjoys weekend trips to the coastal town of San Juan for its vibrant murals, dreams of exploring the street‑art districts of Berlin and the historic ruins of Machu Picchu,
    but limited allowance and school commitments steer their travel style toward budget‑friendly day outings and family‑planned vacations, and they keep a scrapbook of ticket stubs and photos.
  culinary: Francisco Santospagan helps their family cook classic island dishes such as rice with beans, sweet plantain tostones, and seasoned chicken stew, experiments with seasoning blends of garlic,
    cumin, and cilantro, and, while comfortable preparing simple meals, they occasionally over‑salt pasta sauce when improvising in the kitchen, and they love sampling the final dishes with friends.
  core: Francisco Santospagan is a relentlessly curious teen who blends comic‑book art, bilingual storytelling, and soccer drills, thrives on social interaction, yet habitually leaves a trail of scattered
    markers and sketchbooks across the living room, and they often forget to tidy up before dinner.
background:
  cultural: Francisco is a first‑generation Dominican‑American raised in the Bronx, where he grew up in a bilingual household that celebrates both Dominican traditions and the vibrant urban culture of New
    York City. Family gatherings feature merengue, bachata, and home‑cooked dishes like mangú and sancocho, while his neighborhood offers a mix of hip‑hop beats, street art, and community festivals that
    reflect the dynamic blend of his heritage. This multicultural environment nurtures his love for storytelling, music, and community involvement, shaping his identity as a proud Dominican youth who embraces
    the energy and diversity of the Bronx.
attributes:
  skills: '[''Sketching and illustration'', ''Digital art using Procreate'', ''Creative writing and storytelling'', ''Basic coding with Scratch'', ''Public speaking and debate'', ''Event planning and club
