  hobbies: '[''Sketching comic‑style characters'', ''Digital collage creation'', ''Creative writing (short stories, poetry)'', ''Playing soccer with friends'', ''Learning keyboard basics'', ''Salsa and
    merengue dancing'', ''Exploring street murals'', ''Cooking Dominican dishes with family'', ''Attending local cultural festivals'', ''Photography of community events'']'
  career_goals: Francisco dreams of becoming a multidisciplinary artist who blends illustration, graphic design, and interactive media to share stories rooted in his Dominican heritage and Bronx upbringing.
    He aspires to study visual arts or design at a university and later launch a youth arts program in his neighborhood, providing mentorship and creative workshops for other young people. Ultimately, he
    hopes his work will celebrate cultural diversity while inspiring community pride and connection.
