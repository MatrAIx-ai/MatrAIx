personas:
  professional: Enzo Riveramartinez, a budding builder who treats LEGO construction like miniature engineering projects, channels their love of step‑by‑step guides into meticulous problem‑solving and often
    volunteers to organize classroom building challenges.
  sports: Enzo Riveramartinez, who plays soccer after school with the local junior club Sunnyvale Strikers and looks up to FC Barcelona for its teamwork, practices drills at home with a mini‑goal, and dreams
    of one day scoring a winning goal like Lionel Messi.
  arts: Enzo Riveramartinez, who spends evenings sketching cartoons inspired by Bill Watterson’s Calvin and Hobbes and Dr. Seuss’s whimsical lines, often hums breezy pop tunes from artists like Ariana Grande
    while coloring themed activity books, and proudly displays a page of their own comic strip on the fridge.
  travel: Enzo Riveramartinez, who dreams of exploring the Lego House in Billund, Denmark, and already loves weekend outings to the nearby city zoo and the annual state fair, prefers trips with clear itineraries,
    and insists on packing a travel puzzle and a snack of tortilla triangles for the journey.
  culinary: Enzo Riveramartinez, who loves helping family roll soft flour tortillas, sprinkle shredded mozzarella, and assemble simple cheese quesadillas, often experiments by adding slices of avocado or
    a dash of cumin, and proudly serves the result on a colorful plate.
  core: Enzo Riveramartinez, a structure‑loving seven‑year‑old whose boundless curiosity, vivid imagination, and occasional anxiety combine to make every puzzle a triumph and every setback a lesson in resilience.
background:
  cultural: Enzo’s family originates from Honduras, and they preserve Central American traditions while living in Bunnlevel, North Carolina. Spanish is spoken at home, and the household celebrates holidays
    like Honduran Independence Day and Día de los Niños with music, dance, and foods such as pupusas and tamales. Enzo attends a bilingual after‑school program where he strengthens both his English and
    Spanish skills. Community events at the local church often feature Central American drumming and folkloric dancing, giving Enzo a strong sense of his heritage alongside the close‑knit, rural life of
    Harnett County.
