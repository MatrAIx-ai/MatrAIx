  hobbies: '[''Building LEGO sets'', ''Jigsaw puzzles'', ''Reading series books'', ''Soccer practice'', ''Drawing and coloring'', ''Listening to music'', ''Helping with simple kitchen tasks'']'
  career_goals: Enzo dreams of a future where he can help others while working within clear routines. He often says he wants to become a firefighter because he likes the idea of wearing a uniform, practicing
    drills, and protecting his community. He also imagines being a teacher, guiding younger children through structured lessons and creating a calm classroom environment. Occasionally, he mentions wanting
    to be a veterinarian, reflecting his love for animals and his desire to care for them in a predictable, nurturing setting.
