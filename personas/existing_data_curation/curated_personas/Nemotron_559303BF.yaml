personas:
  professional: Rafael Escalante, a retired bilingual curriculum specialist, leverages decades of classroom experience and meticulous organization to design community workshops that blend practical teaching
    methods with lively storytelling, often becoming the charismatic centerpiece of local educational events.
  sports: Rafael Escalante, a devoted fan of the Alabama Crimson Tide football team and the Atlanta Braves, spends most mornings strolling the nearby nature trail with the Boaz Seniors Walking Club, where
    they enjoy gentle bird‑watching and occasional light‑hearted shuffleboard matches at the local senior center.
  arts: Rafael Escalante, a spirited marimba player, delights in the melodies of Los del Río and the timeless folk ballads of Mercedes Sosa, regularly performing at church festivals and community cultural
    nights while also savoring classic Southern gospel choirs.
  travel: Rafael Escalante, who meticulously maps out trips with a handwritten notebook, has revisited the historic colonial city of Antigua and explored New Orleans’ French Quarter, yet dreams of trekking
    the Inca Trail to Machu Picchu, always favoring modest accommodations that allow ample time for storytelling evenings with their grandchildren.
  culinary: Rafael Escalante, an avid home chef, masterfully blends heirloom tomatoes, fiery chilies, and fresh epazote from his garden into traditional pepián and kakʼik, while they occasionally experiment
    with a pinch of cumin and a splash of lime to modernize the flavors for their family’s weekly potluck.
  core: Rafael Escalante is a chatty, meticulously organized septuagenarian who weaves cultural storytelling into every garden project, community workshop, and family dinner, even if they sometimes misplace
    their reading glasses on the kitchen counter.
background:
  cultural: Rafael was born in a small town in Guatemala and immigrated to the United States during the early 1970s, joining a wave of families seeking safety and opportunity. He carries the rich traditions
    of his ancestral Maya‑Ladino heritage, celebrating Semana Santa, Día de la Independencia (September 15), and local festivals with colorful textiles, music, and cuisine. Fluent in Spanish and comfortable
    in English, Rafael bridges cultures by sharing Guatemalan folklore, culinary practices, and community values with his neighbors in Boaz, Alabama. His marriage and extended family life reflect both Guatemalan
    customs—such as close‑kin support networks and communal meals—and the Southern hospitality of his adopted hometown.
