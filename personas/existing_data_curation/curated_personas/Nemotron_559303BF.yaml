  career_goals: Although retired, Rafael aims to remain an active contributor to his community. He aspires to volunteer as a cultural liaison at local schools, helping bridge gaps for Guatemalan‑American
    families and promoting bilingual education. He wants to organize annual heritage festivals that celebrate Guatemalan traditions, mentor younger educators, and perhaps author a handbook on effective
    community‑based adult literacy programs. Rafael also hopes to document his family’s migration story for future generations, preserving cultural memory while encouraging lifelong learning.
