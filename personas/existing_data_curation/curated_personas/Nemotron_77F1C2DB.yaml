personas:
  professional: Kayla Jackson, a senior program manager with a solid foundation in engineering principles and advanced expertise in Agile‑Scrum, Lean, and Six Sigma methodologies, leverages their methodical
    organization, precise communication, and healthy skepticism to steer multi‑million‑dollar projects on schedule, under budget, while championing inclusive mentorship programs within the engineering community.
  sports: Kayla Jackson, a dedicated runner who logs weekly 5 k and 10 k training sessions with the Capital City Runners club, channels the same competitive spirit they admire in the Washington Capitals
    and DC United into their disciplined fitness routine.
  arts: Kayla Jackson nurtures their artistic side through a local jazz and gospel appreciation circle, where they revere the sounds of Ella Fitzgerald, Wynton Marsalis, and Mahalia Jackson while unwinding
    with non‑fiction biographies of pioneering scientists.
  travel: Kayla Jackson prefers meticulously planned trips—revisiting Charleston’s historic districts, savoring Jamaican jerk chicken in Montego Bay, and exploring the Smithsonian museums in Washington,
    D.C.—while they dream of a future cultural immersion in Lisbon.
  culinary: Kayla Jackson, an intermediate home cook, blends Southern comfort staples like shrimp‑and‑grits and collard greens with Caribbean spices such as allspice and scotch bonnet in their signature
    jerk‑spiced plantain side dish.
  core: Kayla Jackson fuses disciplined project leadership with a curiosity‑driven love for puzzles, runs, and soulful music, balancing a competitive edge with a steadfast commitment to community mentorship,
    even though they occasionally forget to floss after late‑night coffee.
background:
  cultural: Kayla is a Black woman raised in the Mid-Atlantic, with deep ties to her family's Southern roots and the vibrant African-American community of Prince William County. Her upbringing emphasized
    education, resilience, and communal support, values reflected in her commitment to mentoring and outreach. She regularly attends a historically Black congregation in nearby Manassas, where gospel music,
    fellowship, and social justice initiatives shape her worldview. Cultural heritage influences her culinary tastes, music preferences, and storytelling traditions. As a professional, she is active in
    regional Black engineering and project-management networks, advocating for greater representation and equitable opportunities for minorities in STEM fields.
attributes:
  skills: '["Project planning and scheduling", "Risk assessment and mitigation", "Agile and Scrum methodologies", "Data analysis (Excel, PowerBI, Python)", "Budget management", "Cross-functional team leadership",
    "Technical writing and documentation", "Process improvement (Lean, Six Sigma)", "Stakeholder communication", "Contract negotiation"]'
  hobbies: '["Running (5k–10k)", "Reading non-fiction (science, technology, leadership, history)", "Puzzling (crossword, sudoku)", "Cooking Southern and Caribbean dishes", "Volunteer STEM mentorship for
    middle-school girls", "Jazz and gospel music appreciation", "Community gardening"]'
  career_goals: Looking ahead, Kayla is determined to ascend to a senior program-management or director role where she can oversee large-scale, cross-disciplinary initiatives that integrate technology and
    infrastructure. She plans to earn her Project Management Professional (PMP) certification within the next year and is exploring an executive MBA to broaden her strategic and financial acumen. A key
    ambition is to champion diversity and inclusion within the engineering and project-management fields, mentoring emerging Black women in STEM and establishing partnerships with local schools. She also
    aims to lead at least one high-visibility, multi-million-dollar project in the Washington-DC metropolitan region, leveraging her competitive drive to deliver on-time, under-budget results while fostering
    a culture of continuous improvement.
