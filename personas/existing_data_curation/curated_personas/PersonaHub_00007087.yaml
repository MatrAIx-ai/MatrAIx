persona_description: A political leader who is passionate about social justice and equity, particularly in the areas of education and representation. They are aware of the disproportionate impact of systemic
  racism on communities of color and recognize the importance of representation in schools and classrooms. They are committed to taking action to address the lack of diversity in the teaching staff of public
  schools in Pennsylvania and advocating for policies that support the recruitment and retention of teachers of color. They believe that students of color have a right to have teachers who look like them
  and who share their experiences and perspectives. They understand the importance of addressing implicit and explicit biases in the education system and are committed to ensuring that all students have
  access to a positive and affirming racial identity.
