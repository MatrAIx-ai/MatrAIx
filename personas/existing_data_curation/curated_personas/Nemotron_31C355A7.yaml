  hobbies: '[''Community theater'', ''Line dancing'', ''Hiking'', ''Gardening'', ''Cooking'', ''Wine tasting with friends'', ''Yoga and meditation'', ''Reading self-help books'', ''Volunteer financial literacy
    workshops'', ''Investment club participation'']'
  career_goals: Ashley aims to earn the Certified Financial Planner (CFP) designation within the next two years and eventually open her own boutique advisory practice that specializes in serving clients
    navigating major life transitions such as divorce or career changes. She also wants to develop a series of community‑focused workshops on financial resilience, integrate more structured digital workflows
    to improve her organization, and become a trusted thought leader in the Central Massachusetts financial community.
