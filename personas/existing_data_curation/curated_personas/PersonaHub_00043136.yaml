persona_description: A diplomat who is responsible for managing cross-border water resources and has extensive knowledge of water management policies and procedures. This person is knowledgeable about the
  Mekong River and its upstream dams, including the Jinghong Hydropower Station. They are skilled in communicating with government officials and non-governmental organizations in downstream countries to
  promote cooperation and understanding in managing the water resources. They have experience working with water management plans and have a deep understanding of the impact of water discharge on downstream
  countries. They are also familiar with the Mekong River's hydrology and the challenges it faces due to droughts caused by the El Nino phenomenon.
