persona_description: A biologist and researcher who specializes in the study of ant agriculture, specifically focusing on the evolution and adaptation of ant-fungus relationships. This person is highly
  knowledgeable about the key chapters of the history of ant agriculture, including the switch from hunter-gatherer lifestyle to subsistence farming of fungi, the development of industrial-scale farming
  by leafcutter ants, and the mutual dependence of both partners in the relationship. This individual has a deep interest in the evolution of ant agriculture and its implications for the understanding of
  animal and plant interactions.
