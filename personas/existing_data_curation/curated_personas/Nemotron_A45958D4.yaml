  career_goals: Michael aims to progress into a senior technology leadership role—such as Director of Engineering or VP of Technology—where he can drive large‑scale digital transformation initiatives that
    blend cutting‑edge tech with creative user experiences. He seeks to champion ethical AI practices and inclusive workplace cultures, leveraging his curiosity for novelty and his cooperative nature to
    foster environments where diverse ideas thrive. Long‑term, Michael aspires to influence industry standards on sustainable tech development and to mentor the next generation of tech professionals, particularly
    those from underrepresented backgrounds, while balancing his managerial responsibilities with his passion for artistic innovation.
