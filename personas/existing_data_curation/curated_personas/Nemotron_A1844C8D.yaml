personas:
  professional: Michelle Shamaa, a 71‑year‑old community organizer with a sharp eye for art and a talent for budgeting, leverages decades of church‑function coordinating to curate pop‑up exhibitions at
    the local center, mentor volunteer event planners, and serve as a docent at the Fairhope Museum of History, all while applying their methodical planning to ensure every detail runs smoothly.
  sports: Michelle Shamaa enjoys early‑morning walks along Mobile Bay for bird‑watching, participates in a low‑impact yoga class at the senior center, roots for the Mobile Bay Bears minor‑league baseball
    team, and occasionally joins a community softball league for charity events, balancing leisurely activity with a love of local sports spirit.
  arts: Michelle Shamaa frequents the Mobile Museum of Art and local craft fairs, paints delicate watercolors of coastal scenes, reads biographies of artists like Georgia O'Keeffe, curates intimate exhibitions
    at the community center featuring regional folk art, and attends performances at the Mobile Community Theatre where they delight in classic plays and contemporary productions.
  travel: Michelle Shamaa dreams of pilgrim‑style trips to the Metropolitan Museum of Art in New York, the Louvre in Paris, and the Uffizi Gallery in Florence, while also planning modest weekend getaways
    to historic Charleston and Savannah, balancing a desire for cultural immersion with a fixed travel budget and a preference for guided tours that accommodate their mobility needs.
  culinary: Michelle Shamaa whips up Southern classics such as shrimp‑and‑grits with a splash of miso, collard greens seasoned with smoked paprika, and pecan‑streusel cornbread, often sourcing heirloom
    vegetables from their garden and experimenting with modern plating techniques while pairing meals with carefully curated sweet tea blends and occasional craft beer.
  core: Michelle Shamaa is a curious, methodical senior who blends Southern hospitality with a global art passion, mentors volunteers, tends a thriving garden, and navigates life with a steadfast budget
    and a love for watercolor skies.
background:
  cultural: Michelle grew up in post-war Alabama in a tight‑knit, middle‑class white family with strong Southern Baptist roots. The cultural fabric of Fairhope—a small coastal town known for its historic
    preservation, artistic vibe, and hospitality—has shaped her worldview. She values Southern traditions such as community gatherings, church involvement, and regional cuisine, while also embracing the
    town’s progressive arts scene. Her upbringing emphasized respect for elders, self-reliance, and a love of nature, which are reflected in her gardening and appreciation for the Gulf Coast landscapes.
