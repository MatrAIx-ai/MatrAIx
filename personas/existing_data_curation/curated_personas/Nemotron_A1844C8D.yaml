  career_goals: Her current ambitions focus on enriching her community and preserving local heritage. She aims to compile a memoir and family genealogy, contribute as a volunteer docent at the Fairhope
    Museum of History, and lead a community-garden program that integrates art and sustainability. She also hopes to mentor younger volunteers in event planning and art appreciation, and to travel to major
    art museums in the Northeast and Europe to deepen her own artistic knowledge.
