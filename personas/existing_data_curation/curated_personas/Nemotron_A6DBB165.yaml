personas:
  professional: Theodore Brown, a 25‑year‑old construction manager in Washington, D.C., blends project scheduling, budgeting, and BIM expertise with a humanities‑driven eye for historic preservation, turning
    architectural insights into concrete plans while navigating a flexible, at‑times disorganized workflow.
  sports: Theodore Brown enjoys shooting hoops in downtown pick‑up basketball games, roots for the Washington Wizards and DC United, and joins the Capitol Hill running club for occasional 5K runs, balancing
    a love for competitive camaraderie with a laid‑back fitness routine.
  arts: Theodore Brown frequents the Smithsonian American Art Museum, the National Gallery, and boutique Georgetown galleries, capturing architectural details in sketches and street photographs inspired
    by Henri Cartier‑Bresson, while also attending live shows by local musicians like Dan Deacon and theater productions at the Kennedy Center.
  travel: Theodore Brown favors spontaneous weekend getaways—last month a hike and night under the stars at Shenandoah National Park—and dreams of a spring visit to Florence, Italy to study Renaissance
    façades, often planning trips on a whim rather than through detailed itineraries.
  culinary: Theodore Brown loves experimenting in the kitchen, mastering dishes such as Thai pad thai, Moroccan tagine with apricots, and Ethiopian injera, sourcing fresh herbs and chilies at the Eastern
    Market, and balancing a decent yet uneven cooking skill that sometimes results in over‑spiced sauces.
  core: Theodore Brown is a curiosity‑driven construction manager who melds artistic passion with a laid‑back, occasionally disorganized lifestyle, juggling social energy, stress‑prone worries, and an ever‑growing
    list of creative projects.
background:
  cultural: Theodore is a White American who grew up in a suburban community in the Mid‑Atlantic region, where he was exposed to traditional Anglo‑American cultural values and a strong emphasis on education.
    His undergraduate studies in the arts and humanities fostered a deep appreciation for visual arts, literature, and cultural history. Living and working in Washington, D.C. has broadened his perspective,
    immersing him in a diverse, multicultural environment that includes renowned museums, historic sites, and vibrant artistic neighborhoods. He draws inspiration from the city’s rich cultural offerings
    while maintaining a personal heritage rooted in contemporary American middle‑class experiences.
attributes:
  skills: '[''Construction project management'', ''Project scheduling (MS Project, Primavera)'', ''Budgeting and cost control'', ''Blueprint reading and code compliance'', ''Safety compliance (OSHA)'',
