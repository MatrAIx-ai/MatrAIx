    leadership and motivation'']'
  hobbies: '[''Visiting museums and art galleries'', ''Street photography of urban environments'', ''Playing pick‑up basketball'', ''Attending live music and theater'', ''Exploring historic neighborhoods
    in Washington, D.C.'', ''Board-game nights with friends'', ''Cooking experimental dishes with spouse'', ''Volunteering at community art workshops'']'
  career_goals: Theodore aims to advance from his current role as a construction manager to a senior project director overseeing large‑scale, culturally significant developments in the DC metropolitan area.
    He plans to earn PMP and LEED AP certifications within the next two years to deepen his expertise in project leadership and green building. Long‑term, he envisions founding a boutique consultancy that
    integrates artistic design, historic preservation, and community‑focused construction, creating spaces that reflect the city’s rich cultural tapestry while maintaining rigorous safety and sustainability
    standards. He also wants to develop better stress‑management habits to maintain a healthier work‑life balance as his career progresses.
