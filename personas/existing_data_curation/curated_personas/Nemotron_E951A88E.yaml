personas:
  professional: Ly Yang is a retired educator who now volunteers to design interdisciplinary art‑learning programs for seniors, leveraging decades of curriculum development and bilingual teaching expertise
    while channeling a critical eye and competitive drive into securing modest grants and mentoring emerging teachers.
  sports: Ly Yang enjoys low‑impact fitness like morning walks along the Chain of Lakes, plays weekly pickleball at the local senior center, follows the Minnesota Timberwolves and Minnesota Twins avidly,
    and sometimes joins a community Tai Chi club for balance and social interaction.
  arts: Ly Yang spends weekends at the Minneapolis Institute of Art, drawing inspiration from Monet’s water lilies, Ai Weiwei’s installations, and Miles Davis’s jazz improvisations, while they also lead
    discussion circles that dissect contemporary theater pieces by Lin‑Manuel Miranda and classic films by Akira Kurosawa.
  travel: Ly Yang prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored the historic galleries of Paris, the tranquil gardens of Kyoto, and the rugged beauty of
    the Boundary Waters, yet they budget carefully to ensure travel fits within their modest retirement income.
  culinary: Ly Yang loves experimenting in the kitchen, mastering dishes like maple‑glazed salmon with a ginger‑star‑anise glaze, sesame‑infused stir‑fried noodles with locally sourced vegetables, and a
    classic Midwestern pot roast, often inviting friends over for informal tasting sessions that double as art‑themed socials.
  core: Ly Yang is a fiercely curious senior who balances a love of art, education, and mindful living with a competitive streak, occasional anxiety, and a habit of obsessively cataloguing every museum
    visit and expense.
background:
  cultural: Ly Yang is a second‑generation East Asian American, born to immigrant parents who arrived from Taiwan. She grew up navigating the blend of Confucian values—emphasis on education, respect for
    elders, and community cohesion—with the individualistic ethos of the United States. Fluent in Mandarin and English, Ly maintains cultural ties through celebrating Lunar New Year, practicing calligraphy,
    and staying active in Minneapolis' vibrant Asian community. Her heritage informs her appreciation for both traditional and modern art forms, and she often incorporates East Asian aesthetic principles
    into her teaching and creative pursuits.
