  hobbies: '[''Visiting Art Museums'', ''Watercolor and Ink Painting'', ''Photography'', ''Culinary Exploration (Traditional Chinese and Fusion Cooking)'', ''Tai Chi'', ''Mindfulness Meditation'', ''Reading
    Contemporary Philosophy'', ''Volunteer Tutoring'', ''Facilitating Community Discussion Circles'']'
  career_goals: Although retired from formal employment, Ly aspires to mentor emerging educators through a volunteer apprenticeship program and to launch a community hub that blends art exhibitions with
    lifelong learning classes for senior residents. She hopes to author a memoir that weaves together her experiences as an East Asian American educator, and to secure modest grants that fund art‑therapy
    workshops aimed at reducing anxiety among older adults. Ultimately, she seeks to leave a lasting imprint on Minneapolis’ cultural landscape by championing inclusive, interdisciplinary education.
