  hobbies: '["Playing soccer and tag with friends", "Building with LEGO and magnetic tiles", "Drawing and coloring", "Dancing to music (children''s pop, gospel, hip‑hop)", "Listening to storytime picture
    books", "Watching educational cartoons (e.g., Sesame Street)", "Exploring parks and nature trails in Kissimmee", "Participating in preschool art and music classes"]'
  career_goals: Shamiya imagines a future where she can help and explore. She frequently says she wants to be a teacher so she can guide friends, a veterinarian because she loves animals and likes figuring
    out how they feel, and an astronaut to discover new worlds. Her competitive streak shows up in her desire to win a spelling bee or be the first to finish a puzzle, while her practical side wants her
    career to be useful to others and grounded in real‑world skills.
