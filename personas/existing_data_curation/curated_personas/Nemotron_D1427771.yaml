personas:
  professional: Shamiya Sims is a preschool‑age “tiny inventor” who loves building elaborate LEGO houses, using their curious mind to experiment with new designs while keeping practical building rules in
    mind, and they often lead group play sessions despite a habit of leaving a few pieces scattered around.
  sports: Shamiya Sims charges enthusiastically onto the local “Rainbow Sprinters” youth soccer field, idolizes the New York Yankees and the Los Angeles Lakers, revels in the competitive spirit of a weekend
    mini‑soccer tournament, yet they prefer informal tag games with classmates over strict drills.
  arts: Shamiya Sims brightens their art corner with Crayola masterpieces while belting out songs from Disney’s Frozen (Idina Menzel’s “Let It Go”) and dancing to Baby Shark by Pinkfong, eagerly watches
    Pixar’s Toy Story, and proudly displays hand‑drawn prints of their favorite characters alongside a growing collection of Dr. Seuss books, and they often share their creations with friends during playdates.
  travel: Shamiya Sims loves family road trips to the zoo in San Diego, a weekend stay at Disney World in Orlando, and day‑excursions to the local science museum, while dreaming of a future adventure to
    the Eiffel Tower in Paris, and they favor spontaneous stops over rigid itineraries.
  culinary: Shamiya Sims favors mac and cheese, peanut‑butter‑and‑jelly sandwiches, and strawberry‑banana smoothies, can whisk batter for pancake mornings under their parent’s supervision, and insists on
    adding a sprinkle of cheddar on everything, showing a playful yet practical approach to food.
  core: Shamiya Sims is a curious, competitive five‑year‑old who blends practical tinkering with boundless imagination, thrives in group play but keeps a flexible approach to rules, and they balance a healthy
    dose of skepticism with emotional stability.
background:
  cultural: Shamiya is a Black American child raised in a multicultural household in Kissimmee, Florida. Her family has Caribbean roots, with grandparents who share stories of Jamaican and Haitian traditions.
    She attends a local Baptist church where gospel music and community fellowship are central. Family gatherings feature soul food staples like fried chicken, collard greens, rice and peas, and seasonal
    celebrations of Juneteenth and Kwanzaa. These cultural touchstones shape her values of community, resilience, and pride in her heritage, influencing her love for music, storytelling, and group celebrations.
attributes:
