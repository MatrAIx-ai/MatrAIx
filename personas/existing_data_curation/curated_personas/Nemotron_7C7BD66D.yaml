  career_goals: Nicanor aims to secure a stable, upward‑mobile position that blends his practical abilities with his talent for people‑management. In the short term he plans to enroll in an automotive technology
    apprenticeship or a logistics certification program to gain formal credentials. Long‑term he envisions owning a small business—perhaps an auto‑repair shop or a food‑truck serving authentic Mexican dishes—where
    he can leverage his bilingual communication, leadership, and community‑outreach skills. He also hopes to become a captain of a local semi‑pro basketball team, using sport as a platform to mentor younger
    players and further develop his competitive drive.
