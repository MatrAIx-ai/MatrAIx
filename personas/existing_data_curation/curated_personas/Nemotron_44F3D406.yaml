personas:
  professional: Eric Singh, an aspiring community organizer, leverages his strong interpersonal communication and empathy to coordinate volunteer events at a local nonprofit while balancing structure and
    flexibility in his part‑time role, and he often infuses his visual storytelling skills into promotional materials.
  sports: Eric Singh, a forward for the Stafford Community Soccer Club, thrives in the neighborhood league that fuels his outgoing energy, supports Washington DC United during MLS matches, and regularly
    hikes the trails of Fredericksburg and Spotsylvania National Military Park to stay fit.
  arts: Eric Singh, a sketcher of urban and historic scenes and digital painter on Procreate, finds inspiration in Edward Hopper’s lighting and Henri Cartier‑Bresson’s street photography, strums acoustic
    guitar while composing songs in the vein of Bon Iver, and delights in indie film screenings at the AFI Silver Theatre, especially films like Moonlight and The Grand Budapest Hotel.
  travel: Eric Singh, who favors spontaneous day trips over elaborate itineraries, has explored Washington, D.C., Gettysburg, and Alexandria’s historic districts, dreams of backpacking through Kyoto’s temples
    and the Scottish Highlands, and balances these travel aspirations with limited funds by saving from his part‑time earnings.
  culinary: Eric Singh, a modest home cook, delights in crafting basil pesto pasta, shrimp tacos with fresh cilantro, and kimchi fried rice, often experimenting with ingredients like avocado and smoked
    paprika, yet frequently resorts to late‑night pizza delivery when his busy schedule leaves little time for cooking.
  core: Eric Singh, a compassionate teen with a sketchbook in one hand and a soccer ball in the other, blends artistic curiosity, community drive, and occasional procrastination into a lively, purpose‑filled
    life.
background:
  cultural: Eric grew up in a predominantly white, middle‑class suburb of Stafford County, Virginia, where community values blend Southern hospitality with Mid‑Atlantic pragmatism. Family traditions include
    Fourth of July picnics, church gatherings, and strong support for local high‑school sports. The proximity to Washington, D.C. exposes him to national museums, diverse cultural festivals, and a broader
    American historical narrative, nurturing his appreciation for art, new ideas, and social responsibility.
attributes:
  skills: '["Interpersonal Communication", "Empathy and Compassion", "Team Facilitation", "Event Coordination", "Digital Illustration (Procreate)", "Graphic Design (Canva)", "Photography", "Basic Coding
    (Scratch)", "Peer Tutoring (Math & Reading)", "Conflict Resolution"]'
  hobbies: '["Sketching (urban & historic scenes)", "Digital painting (Procreate)", "Acoustic guitar playing", "Soccer (community league)", "Animal shelter volunteering", "Community clean‑up projects",
    "Hiking (local parks and historic sites)", "Museum visits (e.g., Smithsonian)", "Indie film screenings", "Reading (science‑fiction and philosophy)"]'
  career_goals: Eric aims to earn his GED and pursue a scholarship to study Social Work or Community Development, with a focus on youth empowerment. In the short term, he hopes to secure a part‑time role
    as a volunteer coordinator at a local nonprofit, where he can apply his organizational and people‑skills. Long‑term, he dreams of establishing a community art space that offers workshops, counseling,
    and safe after‑school programs for at‑risk teens, merging his passion for art with his desire to foster harmony and support.
