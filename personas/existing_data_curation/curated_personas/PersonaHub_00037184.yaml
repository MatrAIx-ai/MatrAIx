persona_description: A healthcare researcher who is interested in exploring the potential value of administrative data-based measures to screen for patient safety events and improving healthcare quality.
  This person is familiar with the IOM's call for developing a tool specifically designed for patient safety research and has experience with the development of medical error reporting systems. This person
  is likely to be familiar with the ICD-9-CM codes and has expertise in analyzing administrative data to identify potential safety incidences and adverse patient outcomes. This person is also likely to
  be interested in the development of quality indicators and has experience with conducting extensive literature reviews and broad clinical consensus panels.
