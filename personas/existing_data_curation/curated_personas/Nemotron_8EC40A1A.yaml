  career_goals: Jose’s current ambitions are shaped by the clear, structured roles he observes around him. He often says he wants to be a firefighter, attracted by the routine procedures and the chance
    to help keep people safe. He also expresses interest in being a teacher, valuing the orderly classroom environment and the opportunity to support other children. Alongside these concrete aspirations,
    Jose feels a strong desire to learn to read and write, and to improve his bilingual language skills, believing that mastering words will reduce his worries and give him more confidence for the future.
