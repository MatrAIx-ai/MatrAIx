personas:
  professional: Jose Delgado, a curious preschooler who loves arranging toy blocks into orderly patterns, shows early signs of spatial reasoning and a gentle, cooperative spirit that makes them a natural
    little builder in the classroom.
  sports: Jose Delgado delights in their neighborhood's toddler soccer sessions on the spring grass, cheers for the Chicago Cubs at family game nights, and enjoys splash‑time swimming lessons that satisfy
    their love for predictable routines and splashy fun.
  arts: Jose Delgado loves to clap along to lively folk songs during community center dance workshops, draws bright marigold‑colored pictures of altars, and is fascinated by the animated adventures of Pixar’s
    'Toy Story' series.
  travel: Jose Delgado dreams of visiting the sprawling gardens of Chicago's Millennium Park, exploring the vibrant colors of their grandparents' hometown festival, and one day trekking to the bright lights
    of Disney World, all while staying within the safety of family‑planned itineraries.
  culinary: Jose Delgado eagerly munches on soft corn‑tamale bites with a hint of mild salsa, favors cheese‑filled quesadillas, and proudly insists on stirring the pot of simmering pozole under close parental
    supervision.
  core: Jose Delgado is a tender‑hearted three‑year‑old who nestles into routine, worries about tiny uncertainties, and balances an earnest love for order with a sweet‑tooth indulgence.
background:
  cultural: Jose Miguel Delgado grows up in a Mexican‑American household in Round Lake, Illinois. Spanish is spoken alongside English at home, and his family celebrates Mexican traditions such as Día de
    los Muertos altars, Cinco de Mayo gatherings, and holidays marked by homemade tamales and pozole. He attends a bilingual preschool program that offers storytime and cultural activities, reinforcing
    his dual‑language abilities. The close‑knit family environment emphasizes respect, cooperation, and caring for others, which aligns with his kind and harmony‑seeking personality. Community events at
    the local cultural center provide exposure to Mexican music, dance, and crafts, allowing Jose to blend his heritage with the everyday life of the Midwest.
