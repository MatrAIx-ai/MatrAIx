personas:
  professional: Alan Patenaude is an aspiring junior game designer who blends their curiosity about Minecraft mechanics with practical problem‑solving skills, using LEGO engineering concepts to prototype
    simple mods while thriving in group hackathons at school.
  sports: Alan Patenaude is a high‑energy player on neighborhood basketball courts and makes impromptu soccer scrimmages on weekends, cheering for the Indiana Pacers and the Indianapolis Colts while dreaming
    of a try‑out with the local Indy Eleven youth academy, and they favor a quick, competitive style that prizes scoring over passing.
  arts: Alan Patenaude devotes free afternoons to flipping through graphic novels like 'Bone' and 'Ms. Marvel', binge‑watching animated series such as 'Adventure Time' and 'Steven Universe', and channels
    creative flair into intricate LEGO builds inspired by the works of architect Frank Gehry, a hobby that feels like sculptural art.
  travel: Alan Patenaude favors spur‑of‑the‑moment road trips to nearby attractions like the Indianapolis Zoo, Brown County State Park’s hiking trails, and occasional weekend getaways to Chicago’s Navy
    Pier, while day‑dreaming about a future family vacation to Disney World, planning each outing with a loose itinerary that leaves room for unexpected detours.
  culinary: Alan Patenaude’s palate revolves around cheesy pepperoni pizza, chicken nuggets with honey‑mustard, and the occasional indulgent chocolate chip pancake breakfast, and although kitchen confidence
    is limited to mastering the perfect grilled cheese and assembling LEGO‑themed snack platters, they love sampling bold flavors like spicy buffalo wings at the local fair.
  core: Alan Patenaude is a curiosity‑driven, competitively spirited 11‑year‑old who balances spontaneous LEGO engineering with fast‑paced video gaming, while habitually misplacing their planner, indulging
    in Pokémon card trades, and thriving in any group setting that lets them lead the play.
background:
  cultural: Alan was raised in a middle‑class, predominantly White neighborhood in Indianapolis, Indiana. His upbringing reflects typical Midwestern values—friendliness, practicality, and a strong sense
    of community. Family gatherings often revolve around holiday traditions like Fourth of July fireworks and Thanksgiving dinners. He participates in local school and recreational programs, and his cultural
    experiences are shaped by the city’s blend of sports fandom, the Indy 500 heritage, and the supportive environment of the Indianapolis public school system.
