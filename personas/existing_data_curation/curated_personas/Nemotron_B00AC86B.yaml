  career_goals: Sarah aims to transition from a hands‑on support role into senior IT leadership within the next five years. She plans to earn PMP and ITIL Expert certifications to solidify her project and
    service‑management expertise. Her ambition is to become an IT Operations Manager or Director, where she can shape strategic technology roadmaps, drive digital transformation, and mentor a high‑performing
    support team. She also envisions launching a boutique consulting practice that helps local small businesses and cultural institutions integrate efficient IT solutions, such as digitizing archives for
    museums or creating streamlined e‑commerce platforms for regional artisans. Continuing education, professional networking, and community involvement are key components of her career growth plan.
