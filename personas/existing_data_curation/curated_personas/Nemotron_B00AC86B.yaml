personas:
  professional: Sarah Korsch is a veteran computer support specialist whose fifteen years of hardware‑and‑software troubleshooting, network management, and business‑analytics expertise are amplified by
    their meticulous organization and insatiable curiosity, allowing them to produce crystal‑clear documentation, lead cross‑functional improvement projects, and set the stage for a future IT Operations
    Director role.
  sports: Sarah Korsch, a member of the Lowcountry Running Club, fuels their disciplined fitness routine with early morning jogs, weekend hikes in the Blue Ridge Mountains, and occasional friendly matches
    supporting the Charleston Battery and cheering for the South Carolina Gamecocks during football season, while always balancing activity with their love for gardening and outdoor photography.
  arts: Sarah Korsch immerses themselves in the arts by frequenting galleries featuring contemporary installations by artists like Kara Walker and Banksy, practicing watercolor scenes inspired by Georgia
    O’Keeffe’s floral motifs, experimenting with black‑and‑white photography in the style of Ansel Adams, and curating playlists that blend Nina Simone’s jazz with Brittany Howard’s Southern rock, all of
    which inform their creative problem‑solving at work.
  travel: Sarah Korsch prefers meticulously planned road trips that blend historic charm with scenic routes, such as weekend drives along the Lowcountry to Savannah and Charleston, extended vacations exploring
    the arts‑rich streets of Edinburgh and the colonial history of St. Augustine, while balancing their love for photography with a budget‑conscious approach that slots lodging in boutique B&Bs and uses
    rewards points for flights.
  culinary: Sarah Korsch enjoys cooking Southern staples—such as shrimp and grits infused with miso, fried green tomatoes paired with beet aioli, and collard greens sautéed with smoked paprika—while applying
    their experimental mindset to modern twists like peach cobbler scented with cardamom, a skill level they rate as advanced, and they frequently host intimate dinner gatherings to share these culinary
    creations.
  core: Sarah Korsch is a meticulously organized tech veteran whose curiosity fuels a passion for watercolor, vintage photography, and daily attic‑drawer tea, yet they stubbornly hoard vintage postcards
    and battle a mild perfectionist’s urge to double‑check every email before hitting send.
background:
  cultural: Sarah was raised in Lancaster, a small town in Lancaster County, South Carolina, within a predominantly white, middle‑class community that values Southern hospitality, hard work, and close‑knit
    family ties. Her family background blends traditional Southern values—respect for community, self‑reliance, and a love of local history—with an emphasis on education and personal advancement; both of
    her parents encouraged academic achievement, leading her to pursue a business degree. The region’s cultural fabric, marked by church gatherings, local festivals, and a strong sense of place, has shaped
    Sarah’s courteous demeanor and appreciation for the arts. While she embraces the simplicity and grounded nature of small‑town life, she also seeks broader perspectives through travel, museum visits,
    and engagement with contemporary ideas, reflecting a balance between Southern roots and a curiosity for the wider world.
