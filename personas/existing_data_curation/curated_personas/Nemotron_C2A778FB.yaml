  career_goals: Though only five, Abril dreams of becoming a visual artist who creates vibrant paintings that tell stories from her Salvadoran heritage. She also imagines teaching younger children, sharing
    her love of art and language, and hopes one day to work in a museum where she can curate exhibits that combine art, culture, and science.
