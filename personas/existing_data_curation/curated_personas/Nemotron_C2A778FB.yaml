personas:
  professional: A budding micro-architect named Abril Alvarez meticulously constructs LEGO towers, channeling their curiosity for new ideas and methodical planning; they eagerly organize each block by color
    and size, and often set a friendly competition with classmates to see who can design the most inventive structure.
  sports: An energetic five-year-old named Abril Alvarez plays in the Little Kickers Soccer Club, cheering for the local professional soccer team on match days, and they love the rhythmic bounce of a trampoline
    in their backyard, treating each session as a friendly contest to out-jump their siblings.
  arts: A creatively inclined five-year-old named Abril Alvarez adores splashing colors on large sheets of paper, idolizing child-friendly artists like Eric Carle and Disney’s animators, and they proudly
    display a hand-drawn rendition of The Very Hungry Caterpillar in their bedroom, often revisiting it for inspiration.
  travel: A curious five-year-old named Abril Alvarez has visited the local zoo and a weekend beach resort, loves the bright lights of Disneyland during a family vacation, and they dream of exploring the
    ancient ruins of Machu Picchu one day, always preferring short, well-planned trips that include a familiar routine.
  culinary: A food-enthusiastic five-year-old named Abril Alvarez favors spaghetti with marinara sauce, crunchy carrot sticks, and banana-cinnamon muffins, enjoys helping whisk batter for pancakes, and
    they often negotiate an extra cheese sprinkle on pizza, though they occasionally sneak a spoonful of frosting before dinner.
  core: Abril Alvarez is a methodically curious five-year-old who blends competitive play with solitary creative bursts, toggles between diligent saving and sudden snack cravings, and navigates the world
    with an organized, skeptical, yet emotionally steady outlook.
background:
  cultural: Abril is raised in Woodbridge, Virginia, within a Salvadoran‑American household. She grows up speaking both Spanish and English at home, learns about Salvadoran traditions such as Las Posadas,
    Día de los Santos, and enjoys foods like pupusas and tamales prepared by her family. Community events at the local Salvadoran cultural center expose her to traditional music, dance, and stories, while
    her American school environment introduces her to a diverse set of customs and celebrations. This blend of cultures shapes her identity, fostering a deep appreciation for art, family, and cultural heritage.
