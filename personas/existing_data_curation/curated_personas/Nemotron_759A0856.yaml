personas:
  professional: Clifford Thorne, a veteran landscaper with three decades of expertise in native plant identification, irrigation system design, and crew coordination, blends their practical, structure‑loving
    mindset with a relaxed, cooperative approach that keeps projects on schedule while maintaining client harmony and supports their goal of advancing to foreman and eventually launching their own firm.
  sports: Clifford Thorne, an avid boater and fisherman who spends summer weekends with the Chesapeake Bay Anglers Association, enjoys casual softball in their church league, and roots for the Maryland
    Terrapins football team, they maintain a modest fitness routine of early‑morning walks and occasional weight‑lifting at the local community center.
  arts: Clifford Thorne, who finds calm in woodworking while listening to Johnny Cash, The Avett Brothers, and local folk performances, they regularly attend Saturday matinees at the historic Calvert County
    Playhouse and occasionally contribute hand‑crafted set pieces to community theater productions.
  travel: Clifford Thorne, who prefers short, well‑planned road trips to historic Maryland towns like St. Michaels, Gettysburg, and Annapolis, leaving room for spontaneous detours, they dream of an extended
    sailing voyage through the Caribbean’s U.S. Virgin Islands once their own landscaping firm provides a steady income.
  culinary: Clifford Thorne, a competent home cook who loves preparing Maryland crab cakes with fresh blue crab meat, Old Bay seasoning, and a light lemon glaze, they also master grill‑ready striped bass,
    barbecued ribs, and side dishes like baked sweet potatoes and grilled corn on the cob for weekend family meals.
  core: Clifford Thorne, a sociable 52‑year‑old landscaper who balances community gardening, woodworking, and crab‑cake barbecues with occasional tax‑filing procrastination and a habit of leaving mower
    keys on the dashboard, they worry more than they celebrate.
background:
  cultural: Clifford grew up in a middle‑class white family in the Mid‑Atlantic region, steeped in the practical, community‑oriented values of rural Maryland. His upbringing emphasized hard work, respect
    for the land, and a strong sense of neighborliness. He celebrates local traditions such as annual crab festivals, church picnics, and the county’s historic blue‑grass music gatherings. His cultural
    identity blends a modest, down‑to‑earth lifestyle with pride in Maryland’s natural heritage, reflected in his love for the Bay, regional seafood cuisine, and the seasonal rhythms of the Chesapeake ecosystem.
attributes:
  skills: '[''Landscape design'', ''Plant identification'', ''Irrigation system installation'', ''Heavy equipment operation'', ''Certified pesticide application'', ''Crew supervision'', ''Client communication'',
