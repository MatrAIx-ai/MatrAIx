  hobbies: '[''Community gardening'', ''Fishing on Chesapeake Bay'', ''Boating'', ''Neighborhood clean‑up volunteering'', ''Barbecue cooking'', ''Card games with friends'', ''Watching Maryland Terrapins
    football'', ''Woodworking'']'
  career_goals: Clifford aims to transition from a crew member to a foreman and eventually launch his own modest landscaping firm that can offer stable, family‑friendly contracts to other local workers.
    He plans to earn the Certified Landscape Technician credential within the next year to boost credibility and reduce the stress of regulatory compliance. In the longer term, he hopes to secure a reliable
    client base that will allow him to scale back hours as he approaches retirement, giving him more predictable routines for family time while maintaining the flexibility to enjoy his hobbies and community
    involvement.
