personas:
  professional: Milagros Trevino, a 30‑year‑old visual storyteller, blends their STEM‑based technical precision with a vibrant aesthetic drawn from Andean festivities, operating a boutique photography studio
    that specializes in culturally resonant portrait series while automating workflows with Python scripts; they often spend evenings reviewing client feedback and fine‑tuning color grades, and their empathetic
    yet occasionally anxious client approach fosters deep trust and collaborative creativity.
  sports: Milagros Trevino enjoys weekend hikes along the Delaware River Trail with the local Trailblazers Hiking Club, follows the New York Giants and Philadelphia Eagles for football, and balances their
    love for yoga with a seasonal indoor climbing membership at a nearby gym; they often opt for low‑impact cardio over competitive sports to accommodate fluctuating energy levels.
  arts: Milagros Trevino regularly explores urban murals by local artist Mateo López, visits the Museum of Modern Art for exhibitions featuring photographers like Sebastião Salgado, and immerses their senses
    in live salsa and cumbia sets performed by artists such as Carlos Vives and Shakira, letting these rhythms shape their own visual narratives; they often sketch frames in a pocket notebook while the
    music plays.
  travel: Milagros Trevino plans trips with a mix of meticulous itineraries and spontaneous detours, having trekked the Rocky Mountains for astrophotography, revisited Cartagena to reconnect with family
    roots, and now saving for an Icelandic tour to capture the Northern Lights; they balance a modest travel budget with a strong desire for cultural immersion, often using local host families to deepen
    the experience.
  culinary: Milagros Trevino cooks hearty bandeja paisa and fragrant ajíaco with plantain and corn on the cob, perfecting their spice balance through YouTube tutorials, yet they occasionally order sushi
    or vegan bowls when feeling overwhelmed, preferring quick, comforting meals after long editing sessions.
  core: Milagros Trevino is a curiosity‑driven visual poet who channels Andean festivity into every frame, balances meticulous tech‑savvy workflows with bouts of anxiety‑induced perfectionism, and fuels
    their creativity with midnight coffee, vibrant spices, and a restless urge to capture stories before they fade; they often find themselves scrolling through photo forums late into the night.
background:
  cultural: Milagros was born and raised in the Andean region of Colombia before moving to the United States as a young adult. She grew up bilingual, speaking Spanish at home and English at school, and
    she maintains strong ties to Colombian customs—celebrating Carnaval de Barranquilla, Día de la Madre, and the vibrant cuisine of her family's heritage. The rhythmic energy of cumbia, vallenato, and
    reggaetón, along with the vivid colors of Colombian textiles, influence both her aesthetic choices and her warm, community-focused approach to client interactions. Her Colombian identity also informs
    her storytelling, prompting her to document immigrant experiences and to infuse her work with themes of resilience, belonging, and cultural pride.
attributes:
  skills: '[''Digital photography (portrait, street, documentary)'', ''Studio lighting and flash techniques'', ''Post-processing with Adobe Lightroom and Photoshop'', ''Color grading and retouching'', ''Camera
    equipment maintenance'', ''Drone piloting for aerial photography'', ''Understanding of optics and lens physics'', ''Python scripting for workflow automation'', ''Website design and portfolio management'',
    ''Client communication and project coordination'', ''Creative conceptualization and visual storytelling'', ''Print production and archival framing'', ''Social media marketing for visual arts'']'
  hobbies: '[''Portrait photography'', ''Street and documentary photography'', ''Travel photography'', ''Astrophotography'', ''Drone piloting'', ''Cooking Colombian dishes'', ''Salsa dancing'', ''Yoga and
    mindfulness meditation'', ''Reading sci-fi and photography literature'', ''Hiking in the Delaware River Trail'', ''Volunteer photography workshops'', ''Graphic design and digital art'']'
  career_goals: Milagros aims to establish her own boutique studio in New Jersey that specializes in culturally resonant portrait series and documentary projects highlighting the Colombian diaspora and
    other under-represented communities. She plans to publish a photobook that weaves personal narratives with visual art, secure exhibitions in regional galleries, and win recognition through photography
    awards. Over the next five years she wants to expand her skill set into immersive media—using VR and AR to create interactive storytelling experiences. Additionally, she aspires to develop a community-based
    photography mentorship program for women and immigrant youth, and to integrate her scientific background by collaborating on visual projects for environmental and health research.
