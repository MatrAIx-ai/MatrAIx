  hobbies: '[''Bridge club'', ''Community gardening'', ''Tai chi'', ''Cooking Vietnamese cuisine'', ''Puzzle solving'', ''Reading non-fiction'', ''Volunteer tutoring'']'
  career_goals: Although retired from formal employment, Nhan aims to expand her impact through volunteer leadership. She plans to launch a neighborhood STEM mentorship network for middle-school students,
    author a practical guide on data-driven decision making for senior citizens, and serve on the board of a local environmental nonprofit. Her ambition includes mastering stress-management techniques such
    as mindfulness to maintain her high energy for community projects while balancing her tendency toward worry.
