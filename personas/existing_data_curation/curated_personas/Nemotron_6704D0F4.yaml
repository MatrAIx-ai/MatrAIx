  career_goals: Matthew aims to transition from managing a single location to a regional supervisory role that allows him to shape policies across multiple sites while preserving the flexibility he values.
    He is also considering launching a modest consulting venture that offers process‑optimization advice to small businesses in the Clark County area. In the next five years, he hopes to earn a Certified
    Manager credential, mentor younger employees into leadership positions, and secure enough financial stability to enjoy a semi‑retired lifestyle focused on personal projects and community involvement.
