  career_goals: Looking ahead, Carlos aims to pursue a career in engineering, with a particular interest in mechanical or civil engineering that could help improve agricultural practices in his community.
    He dreams of designing sustainable irrigation systems and building useful tools for local farms. He also enjoys coding and hopes to study computer science to create educational games that make learning
    fun for other kids. Carlos is determined to earn a college scholarship, stay at the top of his class, and eventually give back to his family and the broader Mexican‑American community.
