personas:
  professional: Carlos Bonilla, a 12‑year‑old robotics club member, channels their methodical curiosity into designing and programming simple LEGO‑based robots, balancing new ideas with step‑by‑step troubleshooting.
  sports: Carlos Bonilla plays midfield for the local youth soccer team the Canyon Hawks, follows the MLS club Seattle Sounders FC, and after matches joins weekend bird‑watching hikes with the junior outdoor
    club, blending competitive teamwork with a love of nature.
  arts: Carlos Bonilla spends evenings sketching cartoons inspired by folk‑art patterns, cites the illustrated works of Mo Willems and the vibrant murals of Diego Rivera as influences, and they channel
    that creativity into designing characters for their Scratch games.
  travel: Carlos Bonilla enjoys planning weekend family trips to nearby national parks like Grand Canyon and Zion, dreams of a future adventure to the historic streets of Barcelona, and they balance their
    love of exploration with the constraints of school schedules and a modest travel budget.
  culinary: Carlos Bonilla helps their parents in the kitchen preparing carnitas tacos and sweet corn tamales, can skillfully dice onions and grind chilies, yet sometimes forgets to clean the prep area,
    leading to a cluttered countertop that they later tidy with their characteristic organization.
  core: Carlos Bonilla is a methodical, curiosity‑driven twelve‑year‑old who blends strategic soccer, meticulous LEGO builds, and creative coding with a hint of impulse‑driven snack binges, always planning
    ahead yet occasionally letting the moment take over.
background:
  cultural: Carlos is a Mexican‑American growing up in Canyon, Texas, in a bilingual household where Spanish is spoken at home and English at school. His parents, originally from Jalisco, have passed on
    traditions such as celebrating Día de los Muertos, Cinco de Mayo, and family gatherings centered around authentic Mexican cuisine. He attends a local Catholic church and takes part in community festivals
    that blend Mexican folk music, dance, and crafts like papel picado. The cultural values of family loyalty, respect for elders, and a strong work ethic shape his daily life, while the rural Texas environment
    introduces him to ranching and outdoor activities, creating a rich, dual cultural identity.
