    ''Educational technology (interactive whiteboards, apps)'', ''Mindfulness and socio-emotional learning facilitation'', ''Event planning for school festivals and workshops'', ''Conflict resolution and
    mediation'', ''Professional development mentoring for teachers'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries and museums'', ''Pottery'', ''Nature photography'', ''Hiking (Mount Diablo and local trails)'', ''Gardening (vegetable and flower beds)'', ''Experimental
    cooking (Mediterranean‑Asian fusion)'', ''Yoga and guided meditation'', ''Book club participation'', ''Volunteering for library storytime'', ''Improv theater for children'', ''Traveling to cultural
    festivals'']'
  career_goals: Jade aims to move into a leadership role where she can shape district‑wide early‑learning curricula, especially by embedding arts‑based and mindfulness practices. She plans to earn a specialist
    credential in early childhood mental health and to develop a community outreach program that offers free art enrichment workshops for underserved families. Over the next five years, she hopes to mentor
    emerging teachers, author a guide on creative early‑learning pedagogy, and transition toward a part‑time consulting position that lets her continue influencing early education while reducing day‑to‑day
    classroom stress.
