  career_goals: Roger aims to move from a front-line sales representative to a regional sales manager within the next three to five years, overseeing a team of reps and shaping sales strategy for the Midwest
    market. He also hopes to integrate his passion for the arts by developing a niche product line—such as curated home-decor collections—that blends functional design with artistic expression. In the longer
    term, he envisions opening his own boutique store or consultancy that helps small manufacturers bring artistically inspired products to market, while maintaining a flexible schedule that accommodates
    family time and his personal creative projects.
