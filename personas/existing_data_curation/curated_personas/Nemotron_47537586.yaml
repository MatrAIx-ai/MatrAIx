personas:
  professional: Roger Taylor, a sales representative for a regional home‑improvement supply distributor, blends deft interpersonal communication with a keen eye for aesthetics, using their curiosity about
    visual arts to tailor pitches and close deals while navigating market dynamics with a flexible, problem‑solving mindset.
  sports: Roger Taylor, a fan of the Cincinnati Bengals and Cleveland Browns, jogs the Ohio River Trail with the River Runners Club twice weekly, hikes the Ohio River Valley’s scenic loops on weekends,
    and plays casual pickup basketball at the local community center.
  arts: Roger Taylor spends evenings at the Dayton Art Institute and the Cincinnati Playhouse in the Park, sketches small‑town architecture, photographs murals, and finds inspiration in the works of Banksy,
    the music of The National, and the films of Ava DuVernay.
  travel: Roger Taylor prefers road‑trip explorations that blend nature and culture, having driven the Blue Ridge Parkway to Asheville, wandered New Orleans’ French Quarter, and planning a future trip to
    Kyoto’s tea houses and a weekend trek in the Swiss Alps, all while balancing family commitments and a modest travel budget.
  culinary: Roger Taylor experiments in the kitchen with Thai green curry featuring lemongrass, homemade gnocchi with ricotta, and seasonal ratatouille using heirloom tomatoes and basil from their garden,
    treating cooking as a creative outlet akin to sketching and woodworking.
  core: Roger Taylor is a curious, art‑infused sales professional who balances spontaneous creativity with a laid‑back, sometimes disorganized routine, channeling visual storytelling into client pitches,
    woodworking, and weekend garden meals.
background:
  cultural: Roger grew up in a modest, middle-class family in the Appalachian-influenced region of Southern Ohio. His upbringing emphasized community involvement, a strong work ethic, and an appreciation
    for local traditions such as bluegrass music, county fairs, and regional crafts. Though his heritage is predominantly White, Midwestern, he has been exposed to a growing cultural diversity through his
    work and personal interests in art and music. He identifies with the values of modesty, self-reliance, and hospitality typical of the Ohio River Valley, while also embracing progressive ideas that stem
    from his curiosity about new artistic expressions and inclusive community projects.
