  hobbies: '[''Painting and sketching'', ''Creative writing (poetry, flash fiction)'', ''Collecting vintage vinyl'', ''Listening to jazz, blues, and hip‑hop'', ''Exploring street art and abandoned sites'',
    ''Conceptual photography'', ''Journaling for emotional regulation'', ''Yoga and mindfulness practice'', ''Improv theater workshops'', ''Philosophy podcasts and reading'']'
  career_goals: Emmanuel aspires to transition from informal freelance projects to a professional career as a multimedia artist and curator. He aims to secure an artist‑in‑residence program in the South,
    develop a solo exhibition that explores the intersections of Black identity, mental health, and abstract expression, and eventually open a community‑run art space in Little Rock that offers workshops
    for at‑risk youth. He plans to complete a BFA or MFA to deepen his technical expertise, while leveraging his competitive drive to win regional art grants and national competitions. Long‑term, he dreams
    of his work being featured in major contemporary art museums and influencing public conversations about social justice.
