personas:
  professional: Emmanuel Small is a self‑taught multimedia artist who fuses surreal painting, digital illustration, and 3D modeling into socially critical works, thrives under tight creative deadlines despite
    a relaxed approach to obligations, and they leverage their skeptical, competitive mindset to secure regional grants and curate community workshops.
  sports: Emmanuel Small enjoys casual pick‑up basketball at local parks, follows the Arkansas Razorbacks basketball team and the Arkansas Travelers baseball club, and they maintain a flexible fitness routine
    that includes occasional jogging and weekend cycling with a downtown group, though structured workouts are often skipped in favor of spontaneous urban exploration.
  arts: Emmanuel Small immerses themselves in surreal and abstract visual art, regularly studies the works of Salvador Dali, Mark Rothko, and Jean‑Michel Basquiat, curates a vintage vinyl collection featuring
    Miles Davis, B.B. King, and Kendrick Lamar, and they hone performance skills through local improv theater workshops.
  travel: Emmanuel Small prefers spontaneous, low‑budget travel that blends urban exploration with artistic inspiration, has visited Detroit’s abandoned warehouses, Berlin’s gallery districts, and Mexico
    City’s vibrant street‑art scene, and they dream of a future retreat to Kyoto to study Zen gardens while balancing financial constraints.
  culinary: Emmanuel Small enjoys cooking experimental fusion meals like chipotle‑marinated shrimp tacos with pickled beets and smoked paprika, favors bold flavors such as espresso‑infused chocolate mousse
    and harissa‑spiced eggplant, and they often seek out cozy vinyl‑themed cafés serving ramen and artisanal coffee, while their cooking skill remains comfortably intermediate.
  core: Emmanuel Small is a restless dreamer who channels intense emotional tides into surreal art, battles chronic anxiety, and they habitually impulsively splurge on vintage vinyl despite an otherwise
    frugal budget.
background:
  cultural: Emmanuel grew up in Little Rock’s historically Black neighborhoods, shaped by Southern African‑American traditions and the city’s civil‑rights legacy. He attended a local Baptist church where
    gospel music and community storytelling left a lasting imprint on his artistic sensibility. Family gatherings often featured soul food, blues, and discussions about Black literature, exposing him early
    to the works of Langston Hughes, Zora Neale Hurston, and contemporary Black poets. He remains connected to the local Black arts scene through the Little Rock Urban Art Collective and occasional participation
    in the annual Juneteenth celebration. While he values his cultural heritage, Emmanuel also critically examines societal structures, using his art to interrogate racial identity, mental‑health stigma,
    and the experience of being a Black man in a predominantly white, conservative region.
attributes:
  skills: '[''Digital illustration'', ''Mixed-media collage'', ''Creative writing'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Blender 3D modeling'', ''Art historical research'', ''Philosophical analysis'',
