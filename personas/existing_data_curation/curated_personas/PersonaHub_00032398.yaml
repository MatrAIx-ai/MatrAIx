persona_description: A historian of early modern England who specializes in the study of the evolution of letter writing and its impact on social and cultural practices. The individual is particularly interested
  in the physical characteristics and codes used in the production and delivery of letters, and the ways in which these materials changed over time. They are also knowledgeable about the development of
  secret forms of letter writing and the role of letters in the preservation of historical documents.
