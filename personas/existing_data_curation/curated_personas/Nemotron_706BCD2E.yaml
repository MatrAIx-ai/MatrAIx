  career_goals: At two years old, Franklin does not have formal career goals, but he frequently pretends to be a helper, such as playing doctor with his stuffed animals or mimicking a firefighter rescuing
    toys. He expresses a desire to take care of people and shows enthusiasm for any role that involves helping others. His future ambitions are likely to be shaped by his compassionate drive and curiosity
    about the world.
