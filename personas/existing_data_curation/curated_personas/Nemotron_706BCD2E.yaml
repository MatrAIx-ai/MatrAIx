personas:
  professional: Franklin Bell is a two-year-old miniature architect whose curious block constructions combine meticulous organization with playful improvisation, delighting caregivers as they pose thoughtful
    why? questions that reveal an early talent for unconventional problem-solving.
  sports: Franklin Bell is a two-year-old who claps exuberantly at New York Yankees broadcasts, cheers on the Los Angeles Lakers highlights, and spends afternoons splashing in the local Toddler Swimmers
    club, where they practice basic strokes with the same curious enthusiasm they bring to building block forts.
  arts: Franklin Bell is a two-year-old with a vivid love for color and rhythm, happily humming Raffi's Baby Beluga, dancing to The Wiggles, and tracing the bold shapes of Henri Matisse's paper collages
    during story-time, while they often insist on creating their own crayon masterpieces.
  travel: Franklin Bell is a two-year-old who travels with a stroller-packed van, having delighted in the sensory wonder of Disney World in Orlando, the salty breezes of Myrtle Beach, and the awe-inspiring
    vistas of the Grand Canyon, while they already dream of holding a tiny Eiffel Tower souvenir during a future family trip to Paris.
  culinary: Franklin Bell is a two-year-old who savors sweet-potato puree seasoned with a pinch of cinnamon, eagerly spreads creamy avocado on whole-grain toast, and proudly helps mash bananas for fluffy
    pancakes, though they stubbornly push peas off their plate.
  core: Franklin Bell, a two-year-old bundle of curiosity and compassion, balances meticulous block-building with a habit of worrying over spilled milk, as they seek comfort through gentle hugs and the
    soothing cadence of familiar lullabies.
background:
  cultural: Franklin is part of a Black family rooted in Youngstown, Ohio. His household celebrates African‑American cultural traditions, such as weekly church gatherings featuring gospel music, family
    potlucks with soul food, and storytelling that connects him to his heritage. Community events like the Youngstown African American Festival expose him to local history, blues and jazz performances,
    and art exhibits. These experiences shape his appreciation for rhythm, visual art, and communal harmony, reinforcing his compassionate and cooperative personality.
