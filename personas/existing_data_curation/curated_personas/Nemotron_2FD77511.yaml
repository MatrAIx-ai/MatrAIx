  career_goals: Aarin aspires to become a teacher in her hometown, valuing the stability and routine of a classroom environment. She plans to maintain strong grades through middle and high school, earn
    a scholarship, and study education at a state university. She also harbors an interest in caring for animals and imagines exploring veterinary science later, but her primary ambition is to contribute
    to her community as an educator.
