personas:
  professional: An aspiring children's author and piano student, Aarin Dees channels their love for routine and practical organization into meticulously plotted story outlines and disciplined practice schedules,
    balancing creative imagination with reliable execution.
  sports: A dedicated youth softball player, Aarin Dees pitches and fields for her school’s Reds softball team, drills with the local Little League’s practice squad on weekends, and cheers for the regional
    professional baseball team, the River Raptors, while also biking on family nature trails for cross‑training.
  arts: A creative arts enthusiast, Aarin Dees devotes afternoons to practicing piano pieces by Yiruma and Beethoven, reads the Magic Tree House series for story structure inspiration, crafts friendship
    bracelets while listening to Taylor Swift’s pop hits, and savors the community’s folk music at local festivals.
  travel: A curious junior explorer, Aarin Dees enjoys weekend road trips to nearby state parks like Redwood Canyon, dreams of hiking the Grand Canyon’s South Rim, and looks forward to a family vacation
    to Tokyo’s Disneyland, balancing a love of nature with a fascination for vibrant city culture.
  culinary: An enthusiastic junior baker, Aarin Dees mixes chocolate chip cookies, lemon bars, and cinnamon rolls alongside her mother, seasons garden‑fresh tomatoes and basil for homemade pasta sauce,
    and proudly experiments with pumpkin spice cupcakes during the fall festival season.
  core: Aarin Dees blends a love of routine with bursts of creative flair, managing responsibilities and hobbies with a practical, yet occasionally whimsical, approach that keeps both their schedule and
    imagination well‑balanced.
background:
  cultural: Aarin was raised in Arnaudville, a close‑knit town in St. Landry Parish, Louisiana. Her family belongs to the region’s white community with Acadian (Cajun) roots and practices Catholic traditions.
    The local culture of zydeco music, French‑influenced cuisine such as gumbo and boudin, and seasonal community events like the Boucherie and Mardi Gras celebrations shape her upbringing. She experiences
    Southern hospitality, values community support, and participates in church gatherings, school activities, and the town’s annual fairs.
