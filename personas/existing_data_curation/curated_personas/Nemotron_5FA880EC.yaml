  hobbies: '[''Reading (science‑fiction, non‑fiction)'', ''Podcast listening (true‑crime, DIY, logistics)'', ''Hiking/walking in nature preserves'', ''Balcony gardening'', ''Crossword and Sudoku puzzles'',
    ''Simple home cooking'', ''Photography'']'
  career_goals: Carol aims to move beyond entry‑level stocking roles into a logistics coordinator position within the next two to three years. She plans to complete an associate’s degree in supply‑chain
    management through night courses at a community college and obtain a CPIM certification. In the longer term, she hopes to lead a small team, implement technology‑driven workflow improvements, and eventually
    transition into a supply‑chain analyst role that blends her curiosity for systems with practical warehouse experience. She also dreams of saving enough to start a modest online retail venture that leverages
    her order‑fulfillment expertise.
