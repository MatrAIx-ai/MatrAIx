persona_description: A dedicated math educator who aims to make math concepts accessible and engaging for young learners. They have created a collection of place value games and counting games to teach
  students about the concept of place value in multi-digit numbers. These games are designed to help students identify the ones, tens, and hundreds place in long numbers, sharpening their counting skills.
  The games are presented in a fun and engaging manner, using charming characters and beautiful artwork. The educator believes in the importance of solidifying foundational skills and has a collection of
  other math games to offer, including counting games for beginners.
