  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Landscape photography'', ''Hiking in the Wasatch Mountains'', ''Reading graphic novels and science‑fiction'', ''Listening to design
    and technology podcasts'', ''Intramural soccer'', ''Volunteering at youth arts program'', ''Mindfulness journaling'', ''Yoga'']'
  career_goals: Daniel aims to become a warehouse supervisor within the next two to three years, leveraging his organizational strengths and safety record. He plans to obtain a Certified Logistics Associate
    certification and later pursue a bachelor’s degree in supply chain management to qualify for logistics analyst roles. He also hopes to lead workplace‑culture initiatives that integrate art, such as
    employee‑curated murals, to foster creativity and harmony. Long‑term, he aspires to transition into a supply‑chain manager position where he can influence broader operational strategies and mentor new
    workers.
