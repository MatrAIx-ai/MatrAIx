personas:
  professional: Marsha Walker leads retail operations with a methodical, data-driven approach, overseeing inventory, staff schedules, and loss-prevention while leveraging their calm demeanor and sociable
    nature to coach teams and foster a collaborative store culture, positioning them for a future district-manager role.
  sports: Marsha Walker hikes the nearby bluffs with the Highland Trail Club, participates in a weekly pickleball league at the senior center, and avidly follows the River City Royals baseball team, and
    they blend structured outdoor activity with community sports enthusiasm.
  arts: Marsha Walker contributes to the community theater, starring in productions like "Our Town," stitches intricate quilts with the town's quilting guild, and finds inspiration in the folk music of
    Joan Baez and the classic films of Greta Gerwig, and they weave artistic creativity into their social life.
  travel: Marsha Walker prefers weekend road trips to Shenandoah National Park and Lake Michigan, while dreaming of a spring pilgrimage to Kyoto's cherry blossoms and a family reunion in New Orleans, and
    they balance structured itineraries with spontaneous detours.
  culinary: Marsha Walker enjoys experimenting with new recipes for church potlucks, favoring dishes like rosemary-brined turkey, quinoa-spinach salad with feta and pomegranate, and slow-cooked chili infused
    with smoked paprika, and they showcase a culinary skill level that blends comfortable home cooking with occasional gourmet flair.
  core: Marsha Walker is a structured retail leader who channels their love for planning into community quilting, theater, and hiking, while occasionally neglecting personal health appointments in favor
    of work and social commitments, and they often double-check inventory counts even while grocery shopping.
background:
  cultural: Marsha’s cultural background reflects the Midwestern values of Hartington, Nebraska—a blend of practicality, community‑oriented generosity, and modest self‑reliance. Raised in a family with
    deep roots in the region’s farming and small‑town traditions, she grew up attending church, local fairs, and community events that emphasized cooperation and hard work. Her upbringing reinforced a respect
    for routine, a strong sense of duty to family and neighbors, and an appreciation for seasonal rhythms, all of which continue to shape her personal and professional outlook.
