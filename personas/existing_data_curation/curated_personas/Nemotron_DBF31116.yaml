  career_goals: Marsha aims to advance to a district‑manager role within the next few years, overseeing several retail locations and standardizing best practices across them. She is passionate about mentoring
    emerging supervisors and plans to develop a regional training program that emphasizes structured onboarding and continuous improvement. Additionally, she seeks to strengthen community ties by launching
    store‑based events and partnerships with local organizations, ultimately positioning herself for a smooth transition to a consulting or advisory role as she approaches retirement.
