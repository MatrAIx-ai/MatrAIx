personas:
  professional: Thomas Reeves, a senior data analyst at a regional insurance firm, leverages meticulous data modeling and a structured work ethic to translate complex datasets into actionable business strategies
    while mentoring emerging talent in analytics through a national MBA association for underrepresented professionals, and they balance a collaborative yet assertive communication style.
  sports: Thomas Reeves joins competitive pick‑up basketball games at Riverside Park, jogs three to four miles along the St. Johns River three times a week, and roots for the Jacksonville Jaguars and the
    Florida Gators, maintaining a structured fitness routine that sometimes yields to project deadlines, and they adjust their training schedule accordingly.
  arts: Thomas Reeves immerses themselves in classic jazz by Miles Davis, soulful R&B from Aretha Franklin, and seminal hip‑hop from A Tribe Called Quest while curating strategic board games like Settlers
    of Catan and chess, and they frequently attend quarterly showcases at the Cummer Museum and listen to vinyl collections during evening cooking sessions.
  travel: Thomas Reeves prefers meticulously planned trips, having visited New Orleans for its live brass bands and gumbo, attended a data‑science conference in Washington D.C., explored Asheville’s Blue
    Ridge vistas, and they balance budget constraints with a desire for immersive experiences while dreaming of a cultural heritage tour in Ghana.
  culinary: Thomas Reeves blends Southern soul‑food staples such as shrimp and grits and collard greens with contemporary twists like quinoa‑infused cornbread, seasoning with smoked paprika, fresh thyme,
    and a dash of hot sauce, cooking to the rhythm of Kendrick Lamar while they occasionally over‑season when an intense PC build occupies their late‑night focus.
  core: Thomas Reeves is a data‑driven analyst who balances a regimented work ethic, community mentorship, late‑night PC builds, jazz‑filled cooking sessions, and a persistent worry about meeting every
    deadline, and they often stay up late perfecting a new build.
background:
  cultural: Thomas grew up in Jacksonville’s historically Black neighborhoods, where family, church, and community organizations emphasized education, resilience, and mutual support. His parents, both college‑educated,
    encouraged a strong work ethic and pride in his African‑American heritage. He celebrates Southern Black cultural traditions—such as soul food gatherings, gospel music, and annual Juneteenth events—while
    also engaging with broader African diaspora influences. Active in professional networks like the National Black MBA Association and local Black professional coalitions, Thomas mentors younger Black
    students and contributes to initiatives that address systemic barriers in STEM fields. His cultural identity informs both his collaborative approach at work and his commitment to community uplift.
attributes:
  skills: '["Data analysis", "Statistical modeling", "SQL database querying", "Python programming (pandas, scikit-learn)", "Advanced Excel (pivot tables, VBA)", "Data visualization (Tableau, PowerBI)",
    "Process improvement (Lean Six Sigma Green Belt)", "Project management (Agile, Waterfall)", "Stakeholder communication", "Report writing", "Risk assessment", "Strategic planning"]'
  hobbies: '["Pick-up basketball", "Chess", "Strategic board games (e.g., Settlers of Catan)", "Running/jogging along the St. Johns River", "DIY PC building", "Volunteering for local STEM outreach programs",
    "Listening to jazz, R&B, and classic hip-hop", "Cooking Southern cuisine with modern twists"]'
  career_goals: Thomas aims to advance to a senior management‑analyst role within the next two years, eventually leading a cross‑functional analytics team as Director of Business Intelligence. He plans
    to complement his technical expertise with an MBA focused on strategic management to broaden his leadership capabilities. A key ambition is to mentor emerging Black professionals in STEM and analytics,
    helping to increase representation in data‑driven decision‑making. He also seeks to develop stronger work‑life integration strategies to mitigate stress and maintain his high standards of performance.
