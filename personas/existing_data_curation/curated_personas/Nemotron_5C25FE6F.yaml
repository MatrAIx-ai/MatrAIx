personas:
  professional: An experienced educator and curriculum architect, Trang Dao leverages their methodical, data‑driven approach and bilingual expertise to design differentiated instruction while carefully
    mediating between staff and parents, balancing a competitive drive for district‑wide impact with a practical need for stable, reliable outcomes.
  sports: An avid participant in the Citrus County Trail Club, Trang Dao enjoys morning walks, follows the Tampa Bay Buccaneers and Orlando Magic with a measured enthusiasm, and incorporates light tennis
    and birdwatching into their fitness routine, as they prefer low‑impact cardio over high‑intensity workouts.
  arts: An enthusiastic reader of historical fiction and diaspora narratives, Trang Dao often curates community cultural evenings featuring traditional music by composers such as Trinh Cong Son, enjoys
    performing folk dances, and finds solace in the works of painter Claude Monet and violinist Itzhak Perlman, as they weave these artistic influences into their teaching philosophy.
  travel: Preferring meticulously planned itineraries, Trang Dao travels to historic towns like Savannah, Georgia and coastal retreats such as Key West, balances trips with budget‑friendly stays in boutique
    B&Bs, and dreams of a culturally immersive pilgrimage to Chiang Mai, yet they often postpone long‑haul voyages due to family commitments and cautious retirement budgeting.
  culinary: Culinary pursuits find Trang Dao expertly crafting aromatic pho broth with fresh basil, cilantro, and galangal from their garden, assembling bánh mì sandwiches layered with pâté, pickled daikon,
    and crispy tofu, and their methodical nature leads them to meticulously follow and adapt classic recipes, as they occasionally splurge on premium rice noodles or rare spices for special community feasts.
  core: Trang Dao embodies a disciplined, curiosity‑driven educator who nurtures community through precise curriculum design, mindful gardening, and an ever‑watchful eye for detail, even as they habitually
    over‑schedule their days and wield a skeptical, competitive edge that fuels their relentless pursuit of excellence.
background:
  cultural: Born in Vietnam, Trang immigrated to the United States as a young adult and settled in Florida, where she remains an active member of the local Vietnamese community. She maintains fluency in
    Vietnamese and English, celebrates Tet and other cultural festivals with meticulous planning, and brings a respectful, family‑centred perspective to her teaching. Her upbringing emphasized the value
    of education as a pathway to opportunity, which fuels her commitment to bilingual instruction and culturally responsive pedagogy. By sharing Vietnamese folklore, language, and cuisine with her students,
    she bridges cultural gaps while honoring her heritage, and she often mentors newly arrived immigrant families navigating the U.S. education system.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Bilingual Education (Vietnamese-English)'', ''Educational Technology Integration'', ''Student Assessment Design'', ''Data Analysis
    & Reporting'', ''Mentoring & Coaching'', ''Classroom Management'', ''Professional Development Facilitation'', ''Community Outreach Coordination'', ''Project Planning & Execution'']'
  hobbies: '[''Gardening'', ''Vietnamese Cooking'', ''Birdwatching'', ''Walking/Hiking'', ''Reading (Historical Fiction, Diaspora Literature)'', ''Tai Chi'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Community
    Cultural Events Participation'', ''Volunteer Adult Literacy Tutoring'', ''Exploring Educational Technology'']'
  career_goals: Trang aims to advance to an instructional coordinator role where she can lead the creation of a district‑wide bilingual education program. She plans to earn a certification in educational
    leadership, publish a research article on adult learners in community settings, and develop a mentorship pipeline for early‑career teachers. Balancing her competitive drive with her desire for stability,
    she also wants to achieve recognition through a district teaching award while establishing a part‑time consulting practice that supports schools in data‑driven curriculum design, all while maintaining
    a sustainable work‑life balance to manage stress.
