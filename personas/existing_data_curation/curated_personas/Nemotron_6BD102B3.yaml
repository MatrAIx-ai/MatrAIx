personas:
  professional: Maria Lobo, a 5‑year‑old budding entrepreneur, runs a meticulously organized backyard lemonade stand, schedules playdates on color‑coded charts, and proudly competes for the highest daily
    sales, embodying their love for structure and friendly competition.
  sports: Maria Lobo, a 5‑year‑old energetic soccer enthusiast, shines as a forward on the 'Little Kicks' community league in the spring, idolizes FC Barcelona’s Lionel Messi, and they cheer for the local
    basketball team while balancing structured drills with enthusiastic group play.
  arts: Maria Lobo, a 5‑year‑old imaginative storyteller, spends afternoons drawing vibrant scenes of Disney’s Frozen characters and rehearses sing‑along renditions of the song 'Let It Go' while mimicking
    the energetic choreography of Beyoncé’s early pop hits, turning playtime into performative art, and they often stage impromptu concerts for family.
  travel: Maria Lobo, a 5‑year‑old adventurous traveler, loves weekend trips to the city zoo where they count animal species, eagerly anticipates a summer vacation at Disney World, and prefers packed itineraries
    with clear picture schedules so they know exactly when snack breaks and play sessions occur.
  culinary: Maria Lobo, a 5‑year‑old budding chef, delights in assembling peanut butter and banana sandwiches with precise layer counts, whips up her favorite macaroni and cheese using her pink saucepan,
    and negotiates extra broccoli on the plate only if it’s presented as 'dinosaur trees' in the vegetable garden.
  core: Maria Lobo, a 5‑year‑old whirlwind of organized energy who charts every activity, competes with friends, never misses snack time, and they secretly hoard the last cookie as a personal victory.
background:
  cultural: Maria Aida Lobo is a Mexican‑American child living in Greensboro, NC. Her family speaks Spanish at home and celebrates Mexican traditions such as Día de los Muertos, Mexican Independence Day,
    and holiday meals featuring tamales, tacos, and arroz con frijoles. She attends a multicultural preschool where both English and Spanish are used, fostering bilingual development. The local Hispanic
    community provides cultural events and gatherings that reinforce her connection to her heritage while integrating into the broader Greensboro community.
