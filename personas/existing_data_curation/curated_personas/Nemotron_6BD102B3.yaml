  hobbies: '[''Building with blocks'', ''Coloring and drawing'', ''Singing bilingual nursery rhymes'', ''Group games at the park'', ''Storytime listening'', ''Dance classes'', ''Helping in simple family
    cooking'', ''Participating in cultural festivals'']'
  career_goals: Through imaginative play, Maria Aida often pretends to be a teacher or a leader in her classroom, driven by her love for organization and helping others. She also dreams of becoming an astronaut,
    attracted by the structured planning and exploration involved. While these aspirations are playful at her age, they reflect a desire to pursue future roles that combine order, guidance, and a sense
    of adventure.
