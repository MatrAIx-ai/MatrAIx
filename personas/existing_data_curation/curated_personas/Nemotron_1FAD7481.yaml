personas:
  professional: Amber Lowrey, a veteran critical‑care nurse with a biomedical engineering background, leverages their meticulous patient assessment and informatics expertise to streamline electronic health
    records, while their pragmatic curiosity and occasional disorganization drive innovative yet flexible workflow improvements.
  sports: Amber Lowrey is an avid hiker of the Wasatch Range, a seasonal skier at Park City, a regular participant in the local Salt Lake City Trail Runners club, and a devoted fan of the Utah Jazz and
    Real Salt Lake, using yoga classes to maintain flexibility and joining community charity 5K runs to stay socially active.
  arts: Amber Lowrey finds creative solace in quilting intricate patterns while reading Octavia Butler's sci‑fi classics and Doris Kearns Goodwin's historical narratives, attends live performances at the
    Pioneer Theatre, and curates a playlist that blends Fleetwood Mac's folk rock with contemporary indie folk like Iron & Wine, allowing art to temper their work‑related stress.
  travel: Amber Lowrey prefers low‑key, nature‑focused trips such as weekend drives to Yellowstone, a sunrise hike in Grand Teton, a cross‑country road trip along the Blue Ridge Parkway, and occasional
    international visits to the Canadian Rockies, planning loosely to accommodate family obligations while seeking rejuvenating vistas.
  culinary: Amber Lowrey delights in cooking with garden harvests—heirloom tomatoes, lavender, rosemary—crafting dishes like herb‑roasted chicken, lavender‑infused honey drizzle over goat cheese, and fresh
    tomato basil bruschetta, while their modest cooking skills lead to occasional reliance on pantry staples and a penchant for farm‑to‑table diners like Red Iguana.
  core: Amber Lowrey blends pragmatic self‑reliance with a curiosity for innovation, navigating work and life through community service, outdoor adventures, and gentle self‑care, yet often wrestles with
    stress, disorganization, and a tendency to worry.
background:
  cultural: Amber was raised in a middle‑class suburban family in the Intermountain West, where values of self‑reliance, community service, and appreciation for the natural landscape were emphasized. As
    a white American with deep regional roots, she embraces the local culture’s mix of outdoor recreation, civic involvement, and a pragmatic, solution‑oriented mindset. These influences fostered a strong
    work ethic, a commitment to helping others, and a practical outlook that continue to guide her professional dedication and personal pursuits in Salt Lake City.
attributes:
  skills: '[''Critical care nursing'', ''IV therapy'', ''Wound care'', ''Patient education'', ''Health informatics'', ''Quality improvement'', ''Clinical research coordination'', ''Interdisciplinary teamwork'',
