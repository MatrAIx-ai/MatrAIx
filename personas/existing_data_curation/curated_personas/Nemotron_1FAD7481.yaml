  hobbies: '[''Hiking'', ''Gardening'', ''Yoga'', ''Reading (science‑fiction and historical nonfiction)'', ''Volunteer health education'', ''Quilting'', ''Journaling'']'
  career_goals: Amber aspires to move into a hybrid leadership role that merges nursing management with health informatics, such as a clinical informatics specialist or nurse manager overseeing technology
    integration. She plans to earn a Doctor of Nursing Practice (DNP) to deepen her evidence‑based practice skills, lead a patient‑safety committee, and develop mentorship programs for early‑career nurses.
    While pursuing these ambitions, she prioritizes a flexible schedule that supports her family life and mitigates stress, aiming to cultivate a supportive, low‑pressure work environment where both staff
    well‑being and patient outcomes thrive.
