personas:
  professional: Annie Stephens combines a data‑analytics background in Python, R, and SQL with Agile project‑management expertise, using their methodical, organized style and sociable energy to lead STEM
    outreach programs that turn complex datasets into community‑focused visual reports.
  sports: Annie Stephens participates in weekly line‑dancing classes and seasonal community runs, follows the Atlanta Braves and Atlanta Hawks avidly, and is a member of the Henry County Yoga and Cycling
    Club, blending their energetic social nature with moderate cardio workouts.
  arts: Annie Stephens stars in a local community theater troupe where they tackle modern dramas, finds inspiration in the soulful vocals of Aretha Franklin and Marvin Gaye, delights in reading works by
    Toni Morrison, and regularly attends performances by the Atlanta Symphony Orchestra while supporting actress Viola Davis's film releases.
  travel: Annie Stephens prefers moderately planned trips that blend cultural immersion with relaxation, often weekend‑wardening to Savannah’s historic squares or taking a yearly pilgrimage to New Orleans
    for soul‑food festivals, while dreaming of a longer adventure to the gardens of Kyoto and the historic plantations of Monticello.
  culinary: Annie Stephens cooks Southern comfort meals like shrimp‑and‑grits, smoked brisket, and cornbread topped with honey‑butter, skillfully blending traditional spices such as cayenne and smoked paprika
    with garden‑grown herbs, and loves hosting potluck nights where neighbors trade their recipes for kimchi or hummus.
  core: Annie Stephens blends analytical precision with community‑centered empathy, tackling data challenges by day and nurturing soulful connections through theater, dance, and garden gatherings, all while
    navigating anxiety with disciplined self‑care.
background:
  cultural: Annie’s identity as a Black woman from the South deeply influences her worldview. Growing up in Georgia, she was immersed in the rich traditions of African‑American church life, family gatherings,
    and community solidarity that have long been pillars of resilience in the region. The legacy of the civil‑rights movement in nearby Atlanta informs her commitment to social justice and equity, especially
    in education and technology access. She carries forward culinary traditions, music, and storytelling passed down through generations, and she values the intergenerational bonds that emphasize mutual
    support and collective progress. These cultural roots shape her empathy, collaborative spirit, and drive to uplift her community through STEM and the arts.
attributes:
  skills: '["Data analysis (Python, R, SQL)", "Data visualization (Tableau, Power BI)", "Statistical modeling", "Technical writing (research reports, grant proposals)", "Project management (Agile, Scrum)",
    "Community outreach and workshop facilitation", "Event planning and coordination", "Mentoring and tutoring", "Public speaking"]'
  hobbies: '["Community theater acting", "Line dancing and soul‑music dance nights", "Gardening", "Southern cooking and hosting potlucks", "Reading African‑American literature and science biographies",
    "Yoga and guided meditation", "Volunteering at a youth center (coding mentorship)"]'
  career_goals: Annie is focused on re‑entering the workforce in a role that blends her STEM expertise with her passion for community empowerment. Her primary ambition is to become a program manager for
    a nonprofit that expands access to STEM education for underrepresented youth in the Atlanta metro area, where she can leverage her data‑driven decision‑making and project‑leadership skills. She also
    aims to secure a data analyst position within a health‑care organization that values diversity and offers a supportive environment for her mental‑health needs. In the longer term, she hopes to launch
    a community makerspace in Henry County that provides hands‑on technology training, fostering collaboration and economic opportunity for local residents.
