persona_description: A neuroscientist and cognitive scientist who specializes in the study of brain function, particularly in the areas of visual object recognition and object representation in the brain.
  They have conducted research on the computational problems of object representation, the nature of object representations in the brain, the tolerance and selectivity of those representations, and the
  effects of attention and learning. They are likely to be familiar with the work of Prof. James DiCarlo and Prof. Nancy Kanwisher, and may have conducted similar research in these areas.
