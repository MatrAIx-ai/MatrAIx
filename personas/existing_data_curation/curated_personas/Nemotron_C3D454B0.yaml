  hobbies: '[''Reading science and nature books'', ''Stargazing'', ''LEGO building'', ''Scratch coding'', ''Sketching'', ''Journaling'', ''Playing piano'', ''Gardening'', ''Visiting museums'', ''Nature
    walks'']'
  career_goals: Venita dreams of combining her curiosity about the natural world with practical problem‑solving. She aspires to become a STEM professional—ideally an environmental scientist or software
    engineer—who can develop sustainable technologies or data‑driven solutions for community challenges. She also envisions a future where she can mentor younger students, perhaps as a STEM teacher or mentor,
    drawing on her organized approach to help others succeed. While she values quiet, focused work, she hopes her career will allow her to make a positive impact on both the environment and her local community.
