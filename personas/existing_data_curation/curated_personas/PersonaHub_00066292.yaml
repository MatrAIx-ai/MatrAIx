persona_description: A plant breeder who specializes in modern plant breeding techniques, particularly in the use of existing cultivars or advanced breeding materials. They are interested in the development
  and incorporation of new traits and resistance traits into high-yielding cultivars, and they are open to using genes from landraces and wild relatives of crops, as well as from genetic stocks. They are
  also interested in the use of biotechnology and the challenges of developing pest and disease resistance and improving yield potential, regardless of whether a plant is conventionally bred or bioengineered.
