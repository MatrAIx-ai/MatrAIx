persona_description: A healthcare professional who specializes in the treatment of severely ill children, with a focus on understanding and supporting the emotional and psychological well-being of these
  children. This professional is dedicated to providing a safe and nurturing environment for children to express themselves freely and openly, and to help them find a way to cope with their pain and suffering.
  This person is highly skilled in communication and empathy, and is able to create a space for children to express themselves through play, drawings, dreams, and other forms of diversional therapies. They
  are also skilled in recognizing and tolerating the intense emotions of the children, and are able to create a space for them to express themselves without being forced to feel good or to have fun as an
  escape from their pain.
