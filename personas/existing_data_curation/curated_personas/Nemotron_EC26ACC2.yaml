  career_goals: In the short term, Nicole aims to earn a certification in supply chain fundamentals and move into a quality‑control assistant role at her current distribution center. Over the next few years,
    she plans to complete an associate degree in Business Administration or Supply Chain Management while securing an internship in logistics at a regional hub. Her long‑term ambition is to become a packaging
    engineer or sustainability coordinator for a major retailer, leading initiatives to replace single‑use plastics with recyclable alternatives. Nicole also hopes to launch a side business creating custom
    reusable tote bags, blending her packaging knowledge with creative design, and she remains open to learning emerging technologies such as automation and data analytics.
