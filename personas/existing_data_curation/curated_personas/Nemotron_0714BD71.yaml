  hobbies: '[''Hiking'', ''Birdwatching'', ''Reading non-fiction'', ''Model kit building'', ''Photography'', ''Crossword puzzles'', ''Cycling'', ''Podcast listening'', ''Gardening (solo)'']'
  career_goals: Noah aims to transition from a front‑line janitor to a facilities supervisor within the next three years, leveraging his hands‑on experience and further education. He plans to complete an
    associate degree in Facility Management at a community college and obtain the Certified Professional Cleaner (CPC) certification. His long‑term ambition is to launch a boutique cleaning company focused
    on sustainable, low‑chemical practices for small businesses in Placer County. He is motivated by the desire to be recognized for operational efficiency, to implement eco‑friendly cleaning protocols,
    and to mentor others in the trade.
