personas:
  professional: Ann Phillips is a senior full‑stack software developer who crafts clean Python and JavaScript applications using React, Node.js, Docker, and AWS, and they channel their spontaneous curiosity
    and competitive drive into designing striking UI/UX experiences for cultural institutions, even as their resistance to rigid documentation often leaves them scrambling near project deadlines.
  sports: Ann Phillips embraces the Gulf Coast’s active lifestyle by joining the Sarasota Beach Volleyball Club for summer matches, paddle‑boarding with the Sarasota Paddleboard Association year‑round,
    cheering on the Tampa Bay Buccaneers on Sundays, and fitting in early‑morning yoga sessions to offset back strain, while they treat fitness as a social, competitive outlet rather than a solitary chore.
  arts: Ann Phillips routinely explores the Sarasota Art Museum, attends live shows by local band The Riptide, participates in improv nights at the Asolo Repertory Theatre, and they draw inspiration from
    contemporary artists like Kara Walker and James Turrell to infuse their coding projects with vibrant visual storytelling, even as they sometimes critique the commercial art scene with a skeptical eye.
  travel: Ann Phillips prefers curated trips that blend creative immersion with spontaneous adventure, having photographed street art in Berlin, savored tapas in Barcelona, explored the tea houses of Kyoto,
    and attended the Venice Biennale, they often plan itineraries around festivals and local workshops but must balance travel costs with family responsibilities.
  culinary: Ann Phillips enjoys cooking experimental dishes such as grouper tacos with fresh cilantro, key lime pie, shrimp étouffée, and homemade sourdough, they love sourcing local shrimp and mangoes
    at the farmers market, and they frequently host communal kitchen evenings where friends share recipes, though they sometimes over‑season in their enthusiasm.
  core: Ann Phillips is a curiosity‑driven tech architect who blends competitive zeal with a love for art, community, and spontaneous adventure, even as they wrestle with deadline pressure and a penchant
    for occasional over‑indulgence.
background:
  cultural: Ann grew up in a suburban community in central Florida, part of a White, middle‑class American family that valued education and community involvement. Her parents, both teachers, encouraged
    a balance of STEM learning and appreciation for the arts, which shaped her interdisciplinary outlook. Living in Sarasota—a city renowned for its beaches, vibrant arts district, and emerging tech scene—has
    reinforced her blend of Southern hospitality and progressive, creative thinking. She identifies strongly with the Gulf Coast lifestyle, enjoying outdoor recreation, local festivals, and the region’s
    support for cultural initiatives.
