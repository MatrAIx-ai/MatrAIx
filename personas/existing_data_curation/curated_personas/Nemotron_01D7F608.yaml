  career_goals: She aims to transition into a lead architect role where she can shape product vision and mentor cross‑functional teams. Ann wants to blend technology with artistic expression by building
    interactive installations and immersive digital experiences for museums and public spaces in Sarasota. Over the next five years she hopes to launch her own boutique studio that partners with local artists
    and cultural institutions. She also plans to champion diversity in tech by mentoring women and underrepresented developers through community workshops and speaking at tech meetups.
