persona_description: A researcher at the CEA who specializes in the development and application of organoids on a chip for precision medicine. His research interests include the industrialization of organoid-based
  systems, the miniaturization and control of organoid culture, and the development of multi-organoid-on-a-chip systems. He is particularly interested in the application of organoids on a chip in the hospital
  setting, where they can be used for personalized medicine, drug evaluation, and immunotherapy testing.
