  career_goals: Curtis aims to move from a front-line representative to a customer success team lead within the next two to three years, leveraging his analytical mindset and competitive drive. He aspires
    to design and implement training programs that incorporate creative problem-solving and unconventional thinking, improving team performance. Over the longer term, he is interested in transitioning into
    product management or user experience research, where his appreciation for art and new ideas can inform product design. He also plans to complete a bachelor's degree in communications or business administration,
    using his college credits as a foundation.
