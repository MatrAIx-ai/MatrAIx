  hobbies: '[''Vegetable gardening'', ''Bonsai cultivation'', ''Reading technical manuals and historical biographies'', ''Woodworking'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Listening to classical
    Indian music (Carnatic, Hindustani)'', ''Cooking traditional South Indian dishes'', ''Evening nature walks'']'
  career_goals: As he approaches retirement, Arjun aims to solidify a legacy of efficiency and reliability in his department. He seeks to mentor newer planners, formalize his process knowledge into a SOP
    handbook, and obtain a Certified Supply Chain Professional (CSCP) credential to validate his expertise. He also hopes to negotiate a phased‑retirement plan that allows him to continue providing guidance
    on a part‑time basis while ensuring a smooth transition for the team. Ultimately, his ambition is to leave the production floor running on predictable, well‑documented routines that require minimal
    supervision.
