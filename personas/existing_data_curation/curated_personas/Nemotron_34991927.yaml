    ''Participating in book clubs and creative writing workshops'']'
  career_goals: Sheila aims to progress to a senior compensation analyst role within the next two years, followed by a compensation manager position where she can lead strategic compensation and benefits
    initiatives for a forward‑thinking organization. She plans to earn the Certified Compensation Professional (CCP) and Certified Employee Benefit Specialist (CEBS) designations, and to become a thought
    leader in innovative benefit design—particularly flexible, wellness‑focused programs that align with employee creativity and wellbeing. Long‑term, she envisions shaping regional compensation policy
    and mentoring the next generation of HR professionals, while integrating her arts‑humanities insight to promote inclusive and culturally resonant workplace practices.
