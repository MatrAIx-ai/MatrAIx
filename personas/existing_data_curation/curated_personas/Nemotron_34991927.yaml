personas:
  professional: Shelia Johnson, a 29‑year‑old compensation analyst at a mid‑size tech firm in Saint Paul, leverages their advanced Excel, R, and Python skills to design data‑driven salary structures while
    infusing a humanistic, creative lens that makes presentations vivid and approachable, and they routinely balance meticulous project management with empathetic stakeholder negotiations.
  sports: Shelia Johnson, an avid winter snowshoe enthusiast, spends Saturday mornings traversing the trails of Fort Snelling State Park, joins the St. Paul Urban Hiking Club for year‑round city hikes,
    and roots for the Minnesota Vikings and Minnesota Timberwolves while occasionally attending a Minnesota Wild hockey game.
  arts: Shelia Johnson, a watercolor hobbyist, fills sketchbooks with scenes inspired by visits to the Walker Art Center, draws creative energy from listening to Herbie Hancock’s “Maiden Voyage” and the
    world‑beat rhythms of Amadou & Mariam, and regularly attends indie film screenings featuring directors such as Greta Gerwig and performances by actors like Mahershala Ali.
  travel: Shelia Johnson prefers thoughtfully planned escapes that blend cultural immersion and natural wonder, having recently snow‑shoeed through the Boundary Waters, explored the jazz‑laden streets of
    New Orleans, and dreaming of a spring pilgrimage to Kyoto’s temple gardens, while budget‑conscious for longer trips, they book early‑bird flights and stay in boutique B&Bs.
  culinary: Shelia Johnson, an intermediate home chef, loves experimenting with seasonal Minnesota produce, whipping up dishes like herb‑crusted salmon with dill‑infused butter, miso‑glazed eggplant, and
    a vibrant beet‑and‑goat‑cheese salad, while often pairing meals with a glass of Pinot Noir and sprinkling fresh basil or cilantro for extra flavor.
  core: Shelia Johnson blends analytical precision and artistic curiosity, turning compensation data into visual stories, yet can’t resist buying the newest watercolor set or over‑packing for weekend trips,
    a quirk that sometimes leaves their suitcase bursting at the seams.
background:
  cultural: Sheila's cultural background reflects a Midwestern white American upbringing rooted in the values of community, modesty, and civic participation typical of the Minnesota region. Growing up in
    a suburban area near the Twin Cities, she was exposed to a vibrant local arts scene and progressive social attitudes that encouraged both intellectual curiosity and appreciation for diversity. Her family
    places a high value on education and public service, which, combined with the region's egalitarian ethos and "Minnesota nice" sensibility, informs her calm, collaborative demeanor and her commitment
    to inclusive workplace practices.
