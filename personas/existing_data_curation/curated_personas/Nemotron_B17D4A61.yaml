personas:
  professional: Nelson Pun, a 37‑year‑old senior pastor and cultural visionary, blends imaginative theological storytelling with polished public speaking and a competitive drive to design immersive, art‑infused
    worship experiences while strategically expanding community outreach programs.
  sports: Nelson Pun fuels their competitive spirit on the pick‑up basketball courts of the Milwaukee Community Center, cheers passionately for the Milwaukee Bucks and Brewers, and maintains fitness through
    weekend hikes with the Milwaukee Lakefront Trail Club.
  arts: Nelson Pun immerses themselves in the arts by painting abstract canvases inspired by Theaster Gates, snapping black‑and‑white photographs of Milwaukee’s brick alleys, reciting poetry echoing Langston
    Hughes, and listening to the improvisational brilliance of Miles Davis and John Coltrane while attending local theater productions directed by the Milwaukee Repertory Theater.
  travel: Nelson Pun, who schedules their limited travel windows around ministry duties, has explored the vibrant Mardi Gras celebrations in New Orleans, the reggae festivals of Kingston, Jamaica, and the
    colonial streets of Cartagena, Colombia, and they dream of attending the Venice Biennale and the contemporary art exhibitions of Tokyo during their next sabbatical.
  culinary: Nelson Pun, an intermediate home chef, delights in preparing Afro‑Caribbean staples like jerk chicken with scotch bonnet peppers, goat curry with callaloo, and ackee and saltfish, frequently
    sourcing fresh herbs at the Milwaukee Public Market, while also indulging in Saturday night feasts at the Ethiopian restaurant Lalibela.
  core: Nelson Pun, a charismatic pastor‑artist who never starts a sermon without a fresh espresso, habitually misplaces their sketchbook in the pulpit, and thrives on turning every community meeting into
    a mini‑performance, epitomizes a blend of imaginative faith and relentless drive.
background:
  cultural: Nelson’s cultural identity is rooted in his Black American heritage and the vibrant African‑American community of Milwaukee’s South Side. Raised in a historically Black Baptist congregation,
    he was immersed early on in gospel music, oral storytelling, and the tradition of the Black church as a hub for social change. His education in arts and humanities broadened his appreciation for the
    wider African diaspora, influencing his commitment to cultural expression and justice. Nelson actively participates in local cultural festivals, supports Black artists, and draws on the resilience and
    communal solidarity that characterize his community’s history while also engaging with the broader Midwestern cultural landscape.
