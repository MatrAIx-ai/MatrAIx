  career_goals: At three years old, Lola does not yet have concrete career plans, but she frequently talks about wanting to "be a helper" like nurses or teachers she sees at school, and shows a fascination
    with animals, saying she wants to be a "dog doctor" when she grows up. Her competitive nature appears in games, where she aims to be the "winner" of puzzles, hinting at future ambitions in fields that
    reward achievement and clear goals.
