personas:
  professional: Lola Jones, a three‑year‑old mini‑architect in the world of block play, builds towering structures with meticulous precision, fiercely guarding each piece from peers, yet they occasionally
    topple their own design to explore whimsical shapes, reflecting a blend of structured focus, competitive spirit, and spontaneous flexibility.
  sports: Lola Jones participates in the Little Rockets toddler soccer club, eagerly practicing dribbles with the same competitive zeal as watching the Springfield Sluggers on TV, but they can become distressed
    when the schedule changes, preferring the predictability of weekly practices.
  arts: Lola Jones delights in singing Raffi’s Baby Beluga, dancing to Disney’s Let It Go, and drawing vibrant giraffes with chunky crayons, channeling a structured love for familiar tunes while they occasionally
    venture into spontaneous scribbles when feeling playful.
  travel: Lola Jones cherishes family road trips to Seaside Cove beach and outings at the regional zoo, dreaming of a future adventure to Disneyland in California or the Eiffel Tower in Paris, yet they
    insist on a consistent packing checklist and comforts from their favorite stuffed bunny during travel.
  culinary: Lola Jones favors creamy mac and cheese topped with extra cheddar, golden chicken nuggets, and banana slices cut into star shapes, proudly helping stir pancake batter but they refuse broccoli
    unless it’s disguised as tiny trees, highlighting a structured palate with selective flexibility.
  core: Lola Jones is a three‑year‑old tower‑building, coin‑counting, song‑singing whirlwind who thrives on routine, fiercely protects their treasures, and erupts into bright‑colored tantrums when predictability
    falters, showing they swing between order and impulsivity.
background:
  cultural: Lola belongs to a White, Midwestern family in Cleveland, Ohio. Her upbringing reflects typical Midwestern values such as politeness, community involvement, and an appreciation for routine. She
    attends a local early childhood program that incorporates standard American children's media, seasonal holidays, and occasional church gatherings that emphasize family togetherness and simple moral
    lessons. The neighborhood's cultural mix and the city's lakeside parks influence her love for outdoor play and collecting natural objects.
