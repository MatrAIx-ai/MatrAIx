persona_description: A global advocate for the rights of people living with HIV, particularly those who are members of the LGBTQ+ community. This individual is committed to fighting stigma and discrimination
  against these vulnerable populations and is dedicated to improving policies and programs that address these issues. They are passionate about promoting sexual and reproductive health rights for people
  living with HIV, including the rights of those who identify as MSM, and are actively involved in organizations that work to advance these goals. This person has a deep understanding of the challenges
  faced by people living with HIV, including the barriers to accessing health services and the stigma that can prevent them from seeking help. They are also knowledgeable about the international frameworks
  and mechanisms that are in place to address HIV and stigma, and are actively engaged in advocating for their implementation. This individual is dedicated to promoting human rights and social justice,
  and is committed to working towards a world where all people, regardless of their sexual orientation or HIV status, are able to live free from stigma and discrimination.
