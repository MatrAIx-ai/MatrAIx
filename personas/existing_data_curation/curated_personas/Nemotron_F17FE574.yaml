  hobbies: '[''Live music concerts'', ''Line dancing'', ''Community volunteering'', ''Gardening'', ''Historical fiction reading'', ''Cooking Southern cuisine'', ''Hiking'', ''Traveling'', ''Mentoring youth'']'
  career_goals: Lauren aims to move from senior sales associate to store manager within the next two years, leveraging her organizational strengths to improve operational efficiency and employee performance.
    Long‑term, she envisions becoming a regional manager or a corporate training specialist, where she can design mentorship programs and integrate cutting‑edge retail technology across multiple locations.
    She also dreams of eventually opening a boutique that blends Nashville’s music heritage with curated lifestyle products, allowing her to combine her competitive drive with her love for community engagement.
