  hobbies: '[''Watercolor painting'', ''Art gallery visits'', ''Photography'', ''Book club'', ''Community theater'', ''Set design'', ''Creative writing'', ''Gardening'', ''Fishing'', ''Exploring local cuisine'',
    ''Genealogy research'', ''Digital art'']'
  career_goals: As he approaches retirement, Jack aims to shift from full‑time data entry to part‑time consulting, helping local schools and senior centers design interactive curricula that blend technology,
    art, and storytelling. He hopes to launch a community workshop series on digital literacy for older adults, while also volunteering as a mentor for new data‑entry staff. Over the next few years, Jack
    plans to author a guidebook on integrating creative thinking into elementary lessons and to curate a regional art‑history exhibit for the Baldwin County museum.
