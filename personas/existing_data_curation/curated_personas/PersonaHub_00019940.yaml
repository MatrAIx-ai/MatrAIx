persona_description: A semiconductor engineer who specializes in the design and analysis of semiconductor devices, particularly those that utilize the properties of semiconductors such as conductivity,
  energy gap, and impurities. They are skilled in the use of materials and processes to increase the conductivity of semiconductors, and are familiar with the principles of electrical contacts and junctions
  in semiconductor devices. They have experience with the creation of PN junctions and their applications in electronic circuits.
