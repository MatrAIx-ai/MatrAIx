  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Cooking Vietnamese fusion dishes'', ''Fishing'', ''Bicycle touring'', ''Listening to classic rock and Vietnamese folk music'', ''Volunteering at
    senior center'', ''Photography of landscapes'', ''Reading community newspapers'']'
  career_goals: His primary career ambition is to transition from route driver to small‑fleet owner, leveraging his extensive driving experience and sales background to launch a locally focused delivery
    service that serves both mainstream businesses and the Vietnamese community. He plans to obtain an advanced CDL endorsement, complete a GED program, and attend a short course on logistics management.
    Long‑term, he hopes to mentor younger immigrant drivers, create a stable retirement fund, and eventually retire from daily driving while remaining involved as a trainer or dispatcher.
