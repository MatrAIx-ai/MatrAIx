personas:
  professional: Liem Hung, a veteran commercial truck driver turned aspiring fleet entrepreneur, leverages three decades of route optimization, heavy‑vehicle safety, and bilingual customer service to mentor
    new drivers and craft a locally‑focused delivery operation that blends logistic efficiency with community outreach.
  sports: Liem Hung, an avid cyclist with the San Bernardino Mountain Bike Club and a casual member of the Riverside Anglers Association, enjoys weekend rides up the hills and early‑morning reservoir fishing,
    while cheering on the Los Angeles Lakers and the San Diego Padres on game nights.
  arts: Liem Hung, a curious lover of visual storytelling, frequents the Riverside Art Museum’s community galleries, sketches passing landscapes from their cab routes, and finds inspiration in classic rock
    icons like Pink Floyd as well as traditional Vietnamese folk ballads.
  travel: Liem Hung, a spontaneous road‑trip planner, prefers flexible itineraries that blend scenic drives along Highway 1 with stopovers at Lake Tahoe and the Grand Canyon, while budgeting carefully to
    allow occasional family visits to Hoi An for cultural immersion.
  culinary: Liem Hung, a self‑taught home chef, masterfully blends Vietnamese staples like pho broth, lemongrass and fish sauce with Californian twists—think pho‑ramen and bánh mì tacos—while favoring fresh
    cilantro, chilies, and locally sourced seafood in their weekly experiments.
  core: Liem Hung balances a life of solitary drives, artistic sketches, and compassionate community service, all while navigating the occasional chaos of loose finances, a stubborn back, and an insatiable
    curiosity for cultural fusion.
background:
  cultural: Culturally, Liem is a first‑generation Vietnamese American. Born in the Mekong Delta during a period of instability, his family emigrated to the United States in the early 1980s, settling in
    Southern California where a vibrant Vietnamese diaspora offered support. He grew up speaking Vietnamese at home, celebrating Tet, Mid‑Autumn Festival, and observing Buddhist traditions with his family.
    The values of family loyalty, hard work, and community service were instilled early, shaping his modest, cooperative demeanor. While he has adapted to American customs—working in the transportation
    sector and embracing local leisure activities—he maintains strong ties to his heritage through cuisine, language, and participation in Vietnamese cultural associations in San Bernardino.
