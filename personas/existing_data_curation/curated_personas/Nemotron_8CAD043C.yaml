  career_goals: Yiwen dreams of turning her love for imagination into a career as a concept artist and visual storyteller for video games or animated films. She aims to attend a specialized art high school
    and later pursue a BFA at an institution like CalArts or the School of Visual Arts. Her ambition includes creating a graphic novel series that blends Eastern mythic motifs with contemporary sci‑fi themes.
    In the long term, she hopes to work for a leading studio such as Pixar or Blizzard, where she can contribute to world‑building and character design, while also building a personal brand on social media
    to showcase her independent projects.
