personas:
  professional: Yiwen Wang is an aspiring concept artist who spends afternoons sketching fantasy landscapes and designing characters for Minecraft mods, blending a love for sci‑fi narratives with a competitive
    drive to showcase their work in online art communities, even though they often procrastinate on deadlines.
  sports: Yiwen Wang is a high school student who prefers low‑key fitness activities, such as weekend badminton at a community center and occasional bike rides, while cheering for the local high school
    soccer team and following the Los Angeles Lakers for inspiration, yet they rarely commit to structured training due to their disorganized schedule.
  arts: Yiwen Wang is a budding visual storyteller who draws manga‑style characters, paints elaborate fantasy realms, and writes bilingual poetry inspired by authors like Brandon Sanderson, Liu Cixin, and
    philosophers such as Nietzsche, while listening to Yoko Kanno's soundtracks, practicing beginner piano pieces by Debussy, and attending calligraphy workshops that reinforce their appreciation for traditional
    brush strokes.
  travel: Yiwen Wang is an adventurous teen who dreams of exploring Kyoto’s historic temples and the neon streets of Tokyo for anime inspiration, has already visited the Shanghai Science and Technology
    Museum on a school trip, and plans a future backpacking journey across European medieval castles, balancing family budget constraints with a desire for immersive cultural experiences.
  culinary: Yiwen Wang is a curious food explorer who favors ramen with miso broth, sushi rolls featuring salmon and avocado, and homemade dumplings seasoned with ginger and garlic, enjoys experimenting
    with matcha‑green tea desserts, yet their cooking skill remains beginner level, often relying on quick microwave meals between art sessions.
  core: Yiwen Wang blends vivid imagination with a competitive spark, channeling anxiety into art and philosophy while juggling a relaxed approach to obligations and an ever‑growing wishlist of creative
    tools.
background:
  cultural: Yiwen is a second‑generation East Asian American of Chinese heritage, raised in Stockton, California. She grew up speaking Mandarin at home and English at school, maintaining a bicultural identity.
    Family traditions such as celebrating Lunar New Year, cooking dumplings, and practicing calligraphy are part of her routine, while she also embraces Californian youth culture, from skate parks to local
    art festivals. The diverse community in Stockton exposes her to a blend of cultures, shaping her worldview with both collectivist values from her family and the individualistic drive highlighted in
    her personality. This multicultural backdrop informs her artistic style, which often fuses traditional Chinese motifs with contemporary Western aesthetics.
