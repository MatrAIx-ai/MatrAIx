personas:
  professional: Larry Sarvghad is a meticulous 21‑year‑old aspiring upholsterer who blends precision measurement, antique fabric restoration, and client‑focused communication to deliver flawless furniture
    makeovers while systematically tracking progress toward a certified apprenticeship and eventual shop ownership, and they view each stitch as a step toward mastering their craft.
  sports: Larry Sarvghad supports the Tampa Bay Buccaneers and follows the Florida Gators football team, spends Saturday mornings fishing at Lake Hancock, sprints in a local jogging club to keep their back
    muscles limber, and belongs to the Bartow community gardening group that includes a seasonal softball league they join only when the schedule permits.
  arts: Larry Sarvghad finds solace in classic rock icons like Led Zeppelin, The Who, and Pink Floyd while they flip through William Faulkner’s As I Lay Dying and Harper Lee’s To Kill a Mockingbird, attend
    occasional open‑mic nights at a nearby coffee house, and admire the craftsmanship of furniture makers showcased at the local artisan fair.
  travel: Larry Sarvghad prefers low‑key road trips that they plot on a spreadsheet, has already explored the historic streets of Savannah and the misty trails of Great Smoky Mountains National Park, dreams
    of a fall visit to New England’s covered bridges, and balances travel ambitions with a tight budget that forces them to camp rather than stay in hotels.
  culinary: Larry Sarvghad loves hearty Southern comfort dishes such as fried chicken, collard greens, and shrimp étouffée, experiments with spice rubs while they occasionally attempt homemade biscuits,
    enjoys a well‑cooked medium‑rare ribeye with garlic butter, and believes a strong cup of dark roast coffee is essential for long upholstery sessions.
  core: Larry Sarvghad is a detail‑obsessed 21‑year‑old craftsman whose love of quiet creation is balanced by a persistent worry that drives them to meticulous planning, careful budgeting, and a steady
    pursuit of mastery in upholstery.
background:
  cultural: Larry grew up in a modest, working‑class family in Bartow, Florida, reflecting the Southern‑influenced values of hard work, hospitality, and community cooperation. His Anglo‑American heritage
    blends Northern Midwestern roots with the laid‑back, family‑oriented culture of Central Florida. Local traditions, high‑school sports events, and church gatherings shaped his sense of belonging, while
    the region's practical, no‑nonsense attitude reinforced his preference for structure, reliability, and methodical problem solving.
attributes:
  skills: '[''Upholstery repair'', ''Furniture restoration'', ''Fabric selection and matching'', ''Precision measurement'', ''Sewing and hand‑stitching'', ''Spring and padding replacement'', ''Tool maintenance'',
    ''Project planning and scheduling'', ''Customer communication'']'
  hobbies: '[''Woodworking'', ''Model airplane building'', ''Fishing'', ''Reading furniture design manuals'', ''Classic Southern literature'', ''Listening to classic rock'', ''Community gardening'']'
  career_goals: Larry aims to become a master upholsterer recognized for his expertise in antique furniture restoration. He plans to complete a certified apprenticeship program and eventually open his own
    small upholstery shop in Bartow, where he can provide high‑quality, custom work to the local community. Long‑term, he hopes to mentor new apprentices, expand his services to include boutique interior
    design consulting, and achieve financial stability that allows him to reduce work‑related stress while maintaining a structured, reliable business routine.
