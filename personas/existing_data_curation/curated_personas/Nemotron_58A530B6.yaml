personas:
  professional: Dorothy Wilson is a seasoned dental hygienist with over three decades of experience, renowned for her precise preventive dentistry techniques and her knack for turning clinic chaos into
    order; as she nears retirement, she leverages her practical mindset to blend part‑time patient care with mentorship, while spearheading a mobile dental hygiene program for rural seniors and eyeing a
    leadership role in the local dental association.
  sports: Dorothy Wilson stays active by line‑dancing at the community center, joining the Brown County Walking Club for weekly hikes in state parks, and cheering on the Milwaukee Brewers and Green Bay
    Packers; she balances her energetic social side with modest cardio workouts, but admits to skipping a few strength‑training sessions when a choir rehearsal runs late.
  arts: Dorothy Wilson expresses her creative side as a soprano in her church choir, a fervent fan of Dolly Parton's storytelling songs, and an avid participant in a regional book club that recently tackled
    Alice Walker's 'The Color Purple'; she also enjoys occasional community theater productions and finds solace in the paintings of Georgia O'Keeffe displayed at local galleries.
  travel: Dorothy Wilson favors spontaneous weekend road trips, often loading up her station wagon for drives to nearby state parks like Devil's Lake and Shawnee, while keeping a scrapbook of past visits
    to Nashville and Savannah; she dreams of a future pilgrimage to Charleston's historic district but usually plans her getaways on the fly, relying on weather forecasts and a trusty paper map.
  culinary: Dorothy Wilson delights in preparing classic Southern dishes such as fried chicken with buttermilk brine, collard greens seasoned with smoked paprika, and peach cobbler topped with buttery biscuit
    crust; her kitchen skill hovers at an enthusiastic intermediate level, allowing her to host lively potluck gatherings where pecan pies and cornbread often steal the spotlight.
  core: Dorothy Wilson is a community‑centric dental veteran who balances structured professionalism with spontaneous zest, nurturing both oral health and Southern hospitality while navigating retirement
    with pragmatic optimism.
background:
  cultural: Dorothy was raised in a small Texas town during the 1960s and 1970s, shaped by Southern hospitality, a strong sense of community, and Baptist church traditions. Her white, middle‑class upbringing
    emphasized family cohesion, self‑reliance, and participation in local events such as county fairs and church gatherings. These cultural roots fostered her sociable nature, respect for routine, and commitment
    to service, which she carries into both her professional practice as a dental hygienist and her involvement in community life in Brownwood, TX.
attributes:
  skills: '["Dental prophylaxis", "Periodontal charting", "Intraoral radiography", "Oral health education", "Infection control and sterilization", "Patient scheduling and coordination", "Team collaboration
