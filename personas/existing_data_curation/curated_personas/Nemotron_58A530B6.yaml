  hobbies: '["Book club", "Line dancing", "Church choir", "Gardening", "Cooking Southern cuisine", "Volunteer senior ministry", "Hiking in state parks", "Bingo nights"]'
  career_goals: As she approaches retirement, Dorothy aims to transition to a hybrid role that blends part‑time patient care with mentorship and community service. She plans to obtain a GED to formalize
    her education, pursue a certification in geriatric dental care, and develop a mobile dental hygiene program that serves rural seniors in Brown County. Additionally, she hopes to take on a leadership
    position within the local dental association to advocate for preventive oral health initiatives and to mentor the next generation of hygienists.
