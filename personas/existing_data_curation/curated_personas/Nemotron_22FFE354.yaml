  hobbies: '[''Abstract painting'', ''Improvisational piano (jazz)'', ''Reading existential philosophy'', ''Creative writing (short stories)'', ''Nighttime urban photography'', ''Solo hiking'', ''Cooking
    traditional Salvadoran cuisine (pupusas, tamales)'', ''Volunteering Spanish‑language health workshops'']'
  career_goals: Javier aspires to become a department director who champions integrative medicine, specifically exploring the therapeutic impact of visual arts on chronic pain and mental‑health patients.
    He seeks a major research grant to investigate the neurobiological mechanisms of art therapy for trauma‑related disorders, aiming to publish high‑impact papers and earn national recognition. Long‑term,
    he envisions an adjunct faculty role at a Dallas medical school, mentoring the next generation of physicians, and eventually serving as a chief medical officer to shape health‑policy initiatives that
    reduce disparities for Latino and Salvadoran communities. His competitive nature drives him to achieve leadership positions and prestigious awards in clinical excellence.
