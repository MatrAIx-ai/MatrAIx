persona_description: A conservation biologist who studies the relationships between fire and biodiversity in different ecosystems and species. They are interested in understanding how fire affects the diversity
  of habitats and the species that depend on them, and how to balance the benefits of fire with the potential negative impacts on biodiversity. They are skilled in identifying consistent relationships between
  fire and biodiversity, and in applying the pyrodiversity concept for conservation purposes. They recognize the importance of local knowledge and the demonstrated requirements of plants and animals, as
  well as the habitats they depend on, in effective fire management.
