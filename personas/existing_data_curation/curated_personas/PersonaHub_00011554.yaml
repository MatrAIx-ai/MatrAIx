persona_description: A geologist who is interested in the study of metamorphic rocks and their mineralogy. They are particularly interested in the characteristics of muscovite, including its white mica
  appearance, perfect basal cleavage, and pearly luster. They are also aware of its uses in electrical and heat insulation, production of porcelain, paper fireproof paint, and rubber. They are likely to
  have a strong interest in the geological processes that result in the formation of muscovite, such as the metamorphism of schists, phyllites, and granites.
