  career_goals: Even in retirement, Carolyn remains goal‑oriented. She aspires to champion senior advocacy in Syracuse, working to improve access to healthcare, transportation, and social services for older
    adults. She aims to document and share the African‑American history of Onondaga County through oral‑history projects, ensuring future generations hear the stories of the Great Migration and civil‑rights
    activism. Additionally, she seeks to deepen her digital literacy so she can stay connected with her grandchildren and mentor younger community members on practical life skills.
