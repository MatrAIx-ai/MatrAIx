personas:
  professional: Carolyn George, a 90‑year‑old community organizer and senior‑advocacy champion in Syracuse, blends meticulous event‑planning skill, a knack for digital storytelling, and a gregarious, talkative
    nature, and they rally elders around health‑care access while preserving local oral histories.
  sports: Carolyn George follows the Syracuse Orange basketball season with avid enthusiasm, roots for the New York Yankees in summer, participates in the local senior walking club "Syracuse Senior Striders"
    for thrice‑weekly strolls in Onondaga Park, attends low‑impact water‑aerobics at the community center to keep osteoarthritis manageable, and they relish the camaraderie of these activities.
  arts: Carolyn George sings in the church’s gospel choir, drawing inspiration from legends like Mahalia Jackson and Aretha Franklin, attends performances at the Crouse Memorial Theatre—recently a production
    of August Wilson’s “Fences”—and they cherish the local mural festivals that showcase folk artists from upstate New York.
  travel: Carolyn George favors short, well‑planned getaways with grandchildren, having toured New Orleans for its soulful cuisine and music, visited Washington, DC to walk historic civil‑rights landmarks,
    dreaming of a relaxed weekend in Savannah’s historic squares or a breezy day at Niagara Falls, yet they keep trips modest due to mobility concerns.
  culinary: Carolyn George excels at cooking Southern‑inspired fare such as collard greens simmered with smoked turkey, crisp fried chicken, buttery cornbread, and sweet potato pie spiced with nutmeg and
    cinnamon, often sprinkling a dash of hot sauce made from home‑grown peppers, and they proudly share these dishes at neighborhood potlucks while occasionally experimenting with a new gumbo recipe.
  core: Carolyn George is a vivacious 90‑year‑old storyteller who knits elaborate quilts, champions senior rights, worries about every bill, and they can’t resist humming gospel hymns on a late‑night stroll.
background:
  cultural: Carolyn is a Black woman whose family migrated from the Southern United States to Syracuse during the Great Migration, bringing with them deep-rooted traditions of church, cuisine, and community
    solidarity. Growing up in a close‑knit African‑American neighborhood, she experienced the resilience of the civil‑rights era and the support networks of local churches, sororities, and community centers.
    Her identity is firmly anchored in preserving that heritage—through gospel music, Southern cooking, oral history, and active participation in cultural events—while also embracing the diverse cultural
    mosaic of upstate New York and fostering intergenerational connections.
