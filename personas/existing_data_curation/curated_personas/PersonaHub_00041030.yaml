persona_description: A futurist who is concerned about the preservation and accessibility of information for future generations. They are interested in the potential of digital formats to preserve information
  and have a vision for a file format repository that would allow for the preservation and accessibility of information across multiple formats. They believe that this repository would be maintained by
  an adjunct of national patent trade offices (nPTOs) and would be kept confidential for a certain period of time. They also suggest the use of standards activities to explain the various fields, records,
  and logical organization of a format in a text file as a viable solution to the problem of disappearing formats.
