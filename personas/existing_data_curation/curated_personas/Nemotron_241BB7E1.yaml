  career_goals: Robbin aims to advance from a frontline material mover to a supervisory role, such as Warehouse Shift Lead or Logistics Coordinator, within the next three years. She plans to earn additional
    certifications—Certified Materials Handler (CMH) and Advanced Forklift Safety—to strengthen her qualifications. Long‑term, she envisions completing a bachelor’s degree in Business Management to transition
    into an Operations Manager position, where she can design and implement efficiency initiatives across multiple sites. Robbin is also passionate about mentoring women in the logistics field and hopes
    to establish a small consulting practice that offers safety and process‑improvement workshops for regional businesses.
