  career_goals: He aims to earn a Bachelor of Science in Nursing within the next two years, followed by a Master’s degree to become a Family Nurse Practitioner. Joshua is also pursuing certification as
    a Clinical Nurse Specialist in Emergency Care to deepen his clinical expertise. He strives to lead a multidisciplinary team as a charge nurse or unit manager, championing evidence‑based protocols and
    integrating art‑therapy concepts into patient recovery programs. His competitive drive pushes him toward earning recognition such as the Hospital’s Nurse of the Year award and publishing case studies
    in nursing journals.
