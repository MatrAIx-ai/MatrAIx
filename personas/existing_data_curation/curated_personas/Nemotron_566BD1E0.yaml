  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking and baking'', ''Knitting'', ''Local volunteer tutoring'', ''Hiking in nearby state parks'', ''Podcast listening (education and personal
    growth)'', ''Yoga'', ''Attending community theater'']'
  career_goals: Evelyn aims to transition from a teaching assistant to a certified classroom teacher within the next three years. She plans to pursue a Master of Education with a focus on literacy and special
    education to deepen her instructional expertise. Long‑term, she aspires to become an instructional coordinator or curriculum specialist, where she can design and implement effective teaching strategies
    school‑wide. Evelyn also hopes to mentor new teaching assistants and contribute to professional development programs, fostering a collaborative and supportive educational environment.
