personas:
  professional: Evelyn Carr, a 35‑year‑old teaching assistant renowned for their methodical lesson‑planning, data‑driven assessment, and seamless integration of educational technology, leverages their strong
    organizational skills and compassionate conflict‑resolution style to support diverse learners while actively preparing to earn a Master of Education and transition into a certified classroom teacher.
  sports: Evelyn Carr hikes the nearby state trail system with the local Outdoor Enthusiasts Club, roots for the hometown minor‑league baseball team the River City Runners, follows the women’s professional
    basketball team the Chicago Sky, and incorporates weekly yoga sessions as a low‑impact fitness regimen.
  arts: Evelyn Carr enjoys immersing themselves in community theater productions, especially the works of Lin‑Manuel Miranda and the classic films of Greta Gerwig, while also finding inspiration in the
    music of folk singer Brandi Carlile and the paintings of Claude Monet, often pairing evening reads of historical fiction with soft acoustic playlists.
  travel: Evelyn Carr plans trips with a detailed itinerary, having already explored the historic streets of Charleston, the cherry blossoms of Kyoto, and the scenic Pacific Coast Highway, while dreaming
    of trekking New Zealand’s Milford Track and eagerly saving for a family‑friendly weekend getaway to Asheville’s Blue Ridge Mountains.
  culinary: Evelyn Carr’s culinary experiments range from perfecting sourdough starter and roasted vegetable lasagna to crafting seasonal ratatouille with heirloom tomatoes, zucchini, and fresh basil, and
    they delight neighbors with blueberry‑lemon muffins spiced with a pinch of cardamom.
  core: Evelyn Carr blends disciplined organization with creative generosity, nurturing a garden, a classroom, and a kitchen while occasionally overcommitting to community projects and forgetting to take
    breaks.
background:
  cultural: Evelyn grew up in a Southern‑American environment in Georgia, shaped by traditional values of hospitality, community involvement, and respect for local customs. Her white, European‑American
    heritage includes roots in English and Irish ancestry, reflected in family traditions such as holiday gatherings and seasonal festivals like the Georgia Peach Festival. While she embraces Southern cultural
    markers—such as a modest Southern accent, love for regional cuisine, and church community participation—her professional experience in education has fostered an inclusive worldview that values diversity
    and progressive teaching practices.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning Assistance'', ''Student Assessment'', ''One-on-One Tutoring'', ''Educational Technology (Google Classroom, SMART Board)'', ''Special Education Support'',
