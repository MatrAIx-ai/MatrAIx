persona_description: A political leader or decision-maker who is concerned with the transition to a carbon-free energy system and the implementation of policies to ensure that no carbon emitting power plants
  are constructed after 2020. This person is likely to be involved in discussions and negotiations regarding the development of the European energy system in 2050 and will be pushing for a combination of
  renewable energy, nuclear energy, and carbon capture and storage to achieve zero-carbon power by 2050. This person is knowledgeable about the potential of renewable energy sources and the technical barriers
  to achieving a 100% renewable energy system by 2020.
