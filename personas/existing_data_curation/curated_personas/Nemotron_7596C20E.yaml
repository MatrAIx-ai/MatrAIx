personas:
  professional: Danian Miramontes is a seasoned carpenter turning his two-decade mastery of framing, finish carpentry, and decorative inlay into a boutique workshop venture, they leverage bilingual client
    communication and a curious, art-focused mindset while embracing a relaxed, sometimes disorganized work style that fuels inventive problem-solving.
  sports: Danian Miramontes plays weekend soccer for a community team, they cheer on the Colorado Rapids and the Colorado Avalanche, hike the Rocky Mountain foothills with their family, and prefer group
    fitness activities over solo gym sessions, embodying their sociable and energetic nature.
  arts: Danian Miramontes weaves his love for acoustic mariachi guitar, admiration for the folk motifs of Frida Kahlo's murals, and curiosity about contemporary wood art into weekly jam sessions, visits
    to the Denver Art Museum's exhibitions of Diego Rivera, and design explorations in architecture and art history magazines, they channel their artistic sensibility into handcrafted furniture.
  travel: Danian Miramontes favors spontaneous road trips with his family, they have explored the vibrant street markets of Oaxaca, the historic plazas of Seville, and the scenic trails of Patagonia, while
    regularly camping in Colorado's Rocky Mountain National Park, balancing their wanderlust with the practical need to schedule around the workshop's growing responsibilities.
  culinary: Danian Miramontes delights in cooking traditional tamales and pozole with masa, dried chilies, epazote, and pork shoulder, they experiment with home-brewing a pale ale infused with Oaxaca chocolate,
    and enjoy tasting local farm-to-table dishes such as bison burger with chimichurri, reflecting their fusion of heritage flavors and Colorado ingredients.
  core: Danian Miramontes is a curious, sociable carpenter whose relaxed planning fuels inventive woodwork, community music, and a never-ending quest for sustainable, art-infused living, they constantly
    balance creative ambition with a laid-back approach to deadlines.
background:
  cultural: Danian Jose Miramontes grew up in a bilingual Mexican‑American household where family gatherings, music, and food were central to daily life. The traditions of Dia de los Muertos, quinceañera
    celebrations, and weekend tacos have instilled in him a strong sense of heritage and communal responsibility. Living in Denver's diverse Adams County, he has forged connections with both the Latino
    community and the broader Colorado culture, often serving as a cultural bridge by translating for Spanish‑speaking clients and participating in local festivals such as the Denver Cinco de Mayo parade.
    His Mexican roots influence his culinary tastes, his love for rhythmic music, and his artistic sensibility, which he brings to his woodworking through decorative motifs inspired by folk art. Danian's
    upbringing emphasized respect for elders, perseverance, and the value of collective effort – principles that shape his professional demeanor and his involvement in community mentoring programs.
attributes:
  skills: '[''framing'', ''finish carpentry'', ''cabinet making'', ''custom furniture design'', ''decorative carving'', ''in‑lay work'', ''blueprint reading'', ''building code compliance'', ''sustainable
