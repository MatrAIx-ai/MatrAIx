  hobbies: '[''playing acoustic guitar'', ''participating in community soccer'', ''hiking in the Colorado foothills'', ''cooking Mexican cuisine'', ''volunteering at DIY woodworking workshops'', ''attending
    art exhibitions'', ''homebrewing craft beer'', ''reading architecture and art history magazines'']'
  career_goals: Danian sees his next decade as an opportunity to transition from being a journeyman carpenter to a small‑scale business owner who can merge his craft with his artistic interests. His primary
    goal is to open a boutique workshop in the Denver suburbs offering custom furniture and home‑renovation services that emphasize eco‑friendly materials and handcrafted details. He plans to obtain a contractor's
    license and formal training in blueprint design software to improve project planning, a step that counters his natural disorganization but aligns with his desire for greater flexibility in managing
    schedules. Danian also hopes to mentor apprentices from the local Latino community, creating a supportive network that passes on both technical skills and cultural pride. Long‑term, he envisions expanding
    the business to include a small gallery space where local artists, including himself, can showcase wood art, thereby blending his love for art with his trade.
