  career_goals: Approaching retirement, Damia aims to leverage her extensive administrative background into a senior Office Manager or Executive Assistant role where she can mentor younger staff and shape
    a supportive workplace culture. She plans to earn the Certified Administrative Professional (CAP) credential within the next year to formalize her expertise. Over the next five years she hopes to champion
    an employee‑well‑being program at her organization, integrating mindfulness breaks and open‑door communication channels that reflect her caring nature. In the longer term, Damia envisions a part‑time
    consulting practice helping small nonprofits streamline their office operations while preserving the personal, community‑focused ethos she values.
