personas:
  professional: Jason Sandel is a seasoned pipeline construction veteran with three decades of expertise in installing, repairing, and maintaining water, gas, and sewage pipelines, who now mentors crews
    and seeks a supervisory role that leverages his practical problem‑solving, steady demeanor, and love for routine while reducing the physical strain of field work, and they enjoy passing on knowledge
    to younger workers.
  sports: Jason Sandel follows the Tampa Bay Rays avidly, attends weekend minor league baseball games when possible, participates in a local seniors fishing club that meets at the Citrus County lakes, enjoys
    occasional Saturday morning walks with his friends that double as low‑impact cardio, and they appreciate the camaraderie and gentle exercise it provides.
  arts: Jason Sandel’s artistic outlet comes from listening to classic rock legends like Led Zeppelin, The Rolling Stones, and Fleetwood Mac while tinkering in his workshop, where he crafts birdhouses and
    restores vintage furniture, and they occasionally catch a community theater performance of a classic play.
  travel: Jason Sandel prefers low‑key road trips to familiar Florida spots such as the Keys, the Gulf Coast’s Cedar Key for saltwater fishing, and the historic town of St. Augustine, but they dream of
    a guided salmon‑fishing expedition in Alaska once his retirement savings allow for a longer getaway.
  culinary: Jason Sandel enjoys cooking garden‑fresh meals, often grilling caught catfish with a homemade herb rub of rosemary and thyme, tossing tomatoes and peppers into a rustic pasta sauce, preparing
    a simple pepper‑filled salsa that showcases his modest culinary skills, and they relish the quiet satisfaction of turning home‑grown produce into hearty dishes.
  core: Jason Sandel blends a steadfast love for routine and hands‑on work with a quietly generous spirit, balancing occasional forgetfulness about paperwork and medication with a deep appreciation for
    fishing, classic rock, and community fellowship, and they remain a reliable, low‑key presence among friends.
background:
  cultural: Raised in a working‑class family in central Florida, Jason’s cultural background blends rural Southern influences with the laid‑back, community‑oriented lifestyle of Citrus County. He grew up
    with an emphasis on hard work, self‑reliance, and practical skills, and his worldview is shaped by traditional values that prioritize family, humility, and harmony within his local community. The region’s
    natural environment—its waterways and subtropical climate—has informed his appreciation for outdoor recreation and a simple, routine‑driven life.
attributes:
  skills: '[''Pipeline installation and repair'', ''Trench excavation and backfilling'', ''Heavy machinery operation (excavators, backhoes, pipe‑lay rigs)'', ''Basic blueprint reading'', ''OSHA safety compliance'',
    ''Routine equipment maintenance'', ''On‑site problem solving'', ''Mentoring and crew coordination'']'
  hobbies: '[''Fishing (bass, catfish)'', ''Vegetable gardening'', ''Woodworking (birdhouses, furniture repair)'', ''Church attendance and small‑group fellowship'', ''Listening to classic rock music'',
    ''Watching baseball games'', ''Reading practical DIY manuals'']'
  career_goals: Jason aims to stay in a stable, predictable work schedule that allows him to enjoy his family and hobbies. Over the next few years, he hopes to shift into a supervisory or crew‑lead role
    where he can pass on his extensive practical knowledge to younger workers while reducing the physical strain of full‑time pipelaying. He also plans to save for a comfortable retirement that will let
    him spend more time fishing, gardening, and volunteering in his community. He values routine, so he wishes to secure a part‑time consulting arrangement that offers flexibility without abrupt changes.
