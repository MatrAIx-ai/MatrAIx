personas:
  professional: Fabian Newberry, a 33‑year‑old accountant proficient in QuickBooks, Sage 50, and advanced Excel automation, leverages a self‑taught expertise in art‑history research to provide meticulous
    financial reporting while aspiring to become a CPA and launch a boutique bookkeeping practice serving galleries and museums.
  sports: Fabian Newberry enjoys solitary morning runs along the Elizabeth River, is a member of the Portsmouth Cycling Club for weekend rides, follows the Washington Capitals and Virginia Tech Hokies football
    teams on TV, and occasionally joins a local pick‑up basketball game but prefers quiet yoga sessions at home.
  arts: Fabian Newberry immerses themselves in contemporary art at the Virginia Museum of Fine Arts, studying works by Kehinde Wiley and Amy Sherald, practices digital photography inspired by Annie Leibovitz,
    plays solo piano pieces ranging from Chopin nocturnes to Keith Jarrett improvisations, and keeps a journal of visual observations that informs their personal aesthetic.
  travel: Fabian Newberry plans trips with an eye for museum‑rich cities, having visited New York’s Metropolitan Museum, the historic streets of Savannah, and a week‑long art tour in Barcelona, while dreaming
    of a quiet retreat in Kyoto’s Arashiyama district where they can sketch gardens and photograph cherry blossoms.
  culinary: Fabian Newberry experiments in the kitchen by blending Southern staples like shrimp and grits and smoked collard greens with modern sous‑vide techniques, cultivates fresh basil, thyme, and mint
    in their indoor herb garden, and enjoys plating each dish as a visual composition reminiscent of a gallery exhibit.
  core: Fabian Newberry combines a disciplined accountant’s precision with a solitary artist’s curiosity, channeling quiet moments into financial mastery, creative photography, and a lifelong quest to bridge
    numbers and culture.
background:
  cultural: Fabian grew up in a Black family in Portsmouth, Virginia, where the region’s maritime and African‑American heritage shaped his sense of identity. Family gatherings centered on storytelling,
    gospel music, and Southern cooking, reinforcing a communal ethic of mutual support. Although he completed only a high‑school diploma, the emphasis on self‑reliance and lifelong learning encouraged him
    to pursue professional certifications independently. He maintains strong ties to the local Black community, attending cultural events such as the Portsmouth Jazz & Blues Festival and supporting Black
    artists featured in nearby galleries. This cultural background informs his appreciation for art, his competitive drive, and his commitment to giving back through financial‑literacy initiatives for underserved
    residents.
attributes:
  skills: '[''QuickBooks'', ''Sage 50'', ''Advanced Microsoft Excel'', ''Financial reconciliation'', ''GAAP compliance'', ''Internal audit preparation'', ''Data analysis'', ''Process improvement'', ''Art
