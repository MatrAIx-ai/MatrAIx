  hobbies: '[''Visiting art galleries and museums'', ''Reading art history and design books'', ''Digital photography'', ''Playing piano (solo)'', ''Indoor herb gardening'', ''Cooking (Southern cuisine with
    a modern twist)'', ''Journaling'', ''Listening to jazz and blues'']'
  career_goals: Fabian aims to become a Certified Public Accountant within the next three years, using his bookkeeping experience to move into a senior accountant or accounting supervisor role at a midsize
    firm. He envisions eventually launching his own boutique bookkeeping practice that specializes in serving cultural institutions such as galleries, museums, and nonprofit arts organizations, thereby
    merging his fiscal expertise with his passion for art. He also hopes to lead community financial‑literacy workshops that empower Black small‑business owners and residents of Portsmouth.
