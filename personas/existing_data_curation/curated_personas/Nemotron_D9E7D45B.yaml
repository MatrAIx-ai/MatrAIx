  hobbies: '[''Watercolor painting'', ''Crafting vejigante masks'', ''Listening to and dancing Bomba/Plena music'', ''Reading Puerto Rican poetry'', ''Gardening'', ''Traditional cooking'', ''Book club participation'',
    ''Visiting museums and cultural exhibitions'', ''Online learning (digital photography, sustainable living)'']'
  career_goals: Although retired from formal teaching, Norma aims to stay actively involved in her community. She plans to volunteer as a mentor for new teachers in the Ponce school district, lead art‑
    appreciation workshops for senior citizens, and record oral histories of Ponce’s elders to preserve local heritage. She hopes to compile a modest memoir that reflects the cultural changes she has witnessed
    on the island, and to help organize an annual intergenerational arts festival that blends traditional Puerto Rican forms with innovative, unconventional artistic expressions. Her goals are pursued in
    low‑stress, flexible roles that accommodate her sensitivity to worry and stress.
