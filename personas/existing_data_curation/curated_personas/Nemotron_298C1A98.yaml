  hobbies: '[''Sketching and drawing'', ''Listening to indie music'', ''Reading speculative fiction and graphic novels'', ''Photography on nature trails'', ''Writing poetry and short stories'', ''Participating
    in small‑group writing circles'', ''Exploring new creative apps'', ''Visiting local art exhibits'', ''Maintaining a personal art blog'']'
  career_goals: Tatiana aims to complete her high school education or obtain a GED within the next two years, then enroll in a community college or specialized art institute to earn an associate degree
    in visual arts or graphic design. Her long‑term ambition is to become a professional visual artist or freelance graphic designer, creating illustrated content for indie publishers and local businesses.
    She also hopes to curate a small gallery space in Waterloo that showcases work by emerging regional artists, merging her organizational strengths with her passion for art and community engagement.
