personas:
  professional: Tatiana Tobon, a sixteen-year-old aspiring visual artist, blends strong sketching and charcoal techniques with early digital illustration skills while leveraging their natural organization
    to run small community art showcases, all the while maintaining a cautious yet confident approach to freelance commissions for local indie publishers.
  sports: Tatiana Tobon enjoys low‑intensity fitness by hiking the Cedar River Trail and doing yoga at the local community center, while they cheer for the Iowa Hawkeyes and the St. Louis Cardinals from
    afar, and occasionally join a weekend running club that meets at the Waterloo public library's park.
  arts: Tatiana Tobon immerses themselves in the arts by drawing charcoal landscapes inspired by Caspar David Friedrich, listening to indie musicians like Mitski and Sufjan Stevens while sketching, reading
    graphic novels such as Monstress and Saga, and they regularly visit the St. Louis Contemporary Art Museum's rotating shows featuring emerging artists.
  travel: Tatiana Tobon prefers calm, budget‑friendly trips curated in a handwritten travel journal, frequently day‑tripping to Saint Louis for art exhibitions, planning weekend hikes in the Ozark National
    Forest, and dreaming of a future solo backpacking adventure through the Scottish Highlands to capture misty scenery, and they often plan these escapes around school breaks.
  culinary: Tatiana Tobon often whips up quick meals like avocado‑toast with chili flakes and a side of miso‑ramen, experiments with charcoal‑infused latte art at home, and they indulge in weekend baking
    of chocolate chip cookies using fair‑trade cocoa, reflecting a mix of thrifty teen palate and a curiosity for eclectic flavors.
  core: Tatiana Tobon, a sixteen‑year‑old with a boundless curiosity for art and an uncanny habit of doodling in the margins of every textbook, balances meticulous planning with spontaneous bursts of creative
    frenzy, and they proudly wear a notebook everywhere.
background:
  cultural: Tatiana grew up in Waterloo, a small town in St. Clair County, Illinois, where Midwestern values of community, modesty, and self‑reliance are prevalent. Her family background is white, with
    roots in the region that blend traditional rural life—farmers’ markets, local fairs, and church gatherings—with exposure to broader cultural currents through the internet and regional trips to St. Louis.
    This mix nurtures a grounded sensibility while encouraging her curiosity about diverse artistic expressions and unconventional ideas.
