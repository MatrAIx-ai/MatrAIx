  career_goals: Harold hopes to parlay his sociable nature and knack for bringing people together into a stable, community‑focused career. His short‑term goal is to secure a part‑time role in community
    outreach or event coordination for a non‑profit organization on Staten Island, allowing him to gain formal experience while completing the remaining credits for a bachelor’s degree in social work or
    public administration. In the longer term, he envisions a full‑time position as a community program manager or a small business owner running a local event‑planning service that emphasizes inclusive,
    low‑stress gatherings. He also wishes to develop coping strategies for his anxiety so that his career can be both fulfilling and sustainable.
