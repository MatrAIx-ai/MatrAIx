persona_description: A researcher who specializes in the field of tissue engineering, particularly in the use of inkjet printers to grow replacement organs and tissues. He has developed a method to deliver
  human cells unharmed to chosen locations within polymer scaffolds, and is working with reconstructive surgeons to put the method to the test by growing tissues to reimplant in the donor. His research
  colleagues are Rachel Saunders and Julie Gough of the University of Manchester in England, and Nuno Reis of the University of Manchester and the Institute of Technology (IST) in Portugal.
