  hobbies: '[''Basketball (community league)'', ''Acoustic guitar playing and jam sessions'', ''Youth mentorship and community service volunteering'', ''Cooking Southern comfort dishes'', ''Photography
    of local events'', ''Strategic multiplayer video gaming'', ''Beach jogging and fitness routines'', ''Participating in church choir/gospel music'', ''Organizing neighborhood block parties'']'
  career_goals: Anthony aims to secure a position that leverages his organizational and people skills, such as a Community Outreach Coordinator for Flagler County or a Project Coordinator for a local non‑profit
    youth development program. He plans to complete a bachelor's degree in Business Management within the next two years, either online or at a nearby community college, and to earn a Certified Associate
    in Project Management (CAPM) credential. In the longer term, he envisions moving into a supervisory role where he can design and lead programs that improve educational and employment opportunities for
    other young adults in his community, while maintaining a stable income and a clear career progression path.
