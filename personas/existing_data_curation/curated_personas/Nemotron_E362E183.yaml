  hobbies: '[''Visiting art museums'', ''Sketching and photography'', ''Reading biographies and non-fiction'', ''Woodworking and furniture making'', ''Gardening'', ''Listening to jazz and blues music'',
    ''Playing acoustic guitar'', ''Church choir participation'', ''Fishing'', ''Mindfulness journaling'']'
  career_goals: Jasper aims to earn his EPA certification and an HVAC technician license within the next two years, followed by a supervisory role as a facilities lead at a regional hospital or university.
    He aspires to specialize in sustainable building technologies, such as solar‑panel maintenance and energy‑efficiency retrofitting, blending his curiosity for new ideas with his technical background.
    Long‑term, he hopes to launch his own small‑scale maintenance consultancy, offering green‑focused services to local businesses while providing mentorship to younger apprentices. He also wants to improve
    his stress‑management skills, so he can model healthy work‑life balance for his team.
