personas:
  professional: Jasper Grady, a 44‑year‑old facilities maintenance specialist, leverages deep HVAC, electrical, and plumbing expertise with a methodical, organized mindset to troubleshoot building systems,
    mentor junior staff, and champion energy‑efficiency retrofits, all while infusing a curiosity for new sustainable technologies into daily work.
  sports: Jasper Grady enjoys early‑morning fishing on the Alabama River, plays pickup basketball with the church’s community league, follows the Alabama Crimson Tide football team and Atlanta Braves baseball,
    and maintains a consistent routine of strength‑training at the local gym, blending seasonal outdoor pursuits with team loyalty.
  arts: Jasper Grady frequents the Montgomery Museum of Fine Arts, drawing inspiration from Jacob Lawrence’s narratives and Romare Bearden’s collages, while their evenings are often filled with the sounds
    of Miles Davis, B.B. King, and contemporary jazz guitarist Gregory Porter, and they occasionally strum acoustic guitar at church gatherings.
  travel: Jasper Grady prefers road trips that combine cultural immersion and scenery, having driven the coastal highways of the Carolinas, explored the historic streets of New Orleans, and dreaming of
    a solar‑technology tour in Iceland, all while budgeting carefully to accommodate family responsibilities.
  culinary: Jasper Grady loves cooking soul‑food staples like gumbo, shrimp and grits, and collard greens seasoned with smoked turkey, often sourcing heirloom tomatoes and fresh herbs from their garden,
    and despite being an intermediate home chef, they occasionally over‑spice dishes in the quest for bold flavor.
  core: Jasper Grady is a meticulous maintenance pro with a love for jazz, a garden‑to‑table kitchen, a careful savings plan, and a habit of worrying about every detail—yet they still find time to sketch
    the world around them.
background:
  cultural: Jasper grew up in a close‑knit African‑American community in Montgomery, where church, family reunions, and Southern traditions shaped his values. His grandparents participated in the civil‑rights
    movement, and stories of that era fostered his pride in local history. He embraces Southern cuisine, especially soul‑food cooking, and enjoys communal gatherings centered around music, storytelling,
    and shared meals. Jasper’s cultural identity blends the resilience and creativity of the Black Southern experience with a strong sense of community service, reflected in his mentorship of younger workers
    and involvement in neighborhood clean‑up projects.
