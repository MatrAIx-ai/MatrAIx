personas:
  professional: Usha Lochan leverages a meticulous, project-management mindset and a curiosity-driven eye for visual storytelling to coordinate inclusive arts-programs that bridge Detroit’s vibrant mural
    scene with South Asian cultural workshops, turning community events into well-budgeted, socially resonant exhibitions, and they assertively guide volunteers while remaining reliable and methodical.
  sports: Usha Lochan follows the Detroit Tigers in baseball, the Detroit Lions in football, and the Detroit Pistons in basketball, supports the Red Wings during hockey season, and they stay fit by attending
    weekly yoga classes with the Detroit Yoga Collective and jogging with the Midtown Running Club on Saturday mornings.
  arts: Usha Lochan immerses themselves in Detroit’s art scene, frequenting the Museum of Contemporary Art Detroit for shows by Kara Walker and Tadao Ando, photographing street murals inspired by the works
    of Jean-Michel Basquiat, and attending live music performances ranging from Miles Davis jazz sets at Cliff Bell's to The Strokes' indie rock shows at Saint Andrew's Hall.
  travel: Usha Lochan prefers methodical trip planning that blends cultural immersion and culinary curiosity, having explored New Orleans for its jazz heritage, Morocco's Marrakech for spice markets, and
    they dream of a future pilgrimage to Kyoto's temples to study traditional tea ceremonies while balancing travel costs with their nonprofit savings goals.
  culinary: Usha Lochan experiments in the kitchen by reimagining classic butter chicken with a miso glaze, crafting quinoa-based masala dosa infused with turmeric and cumin, and they relish sampling street-taco
    al pastor at Detroit's Eastern Market, always keeping a well-stocked pantry of cardamom, sumac, and fresh ginger.
  core: Usha Lochan blends a curious, organized spirit with a love for visual storytelling, a habit of hoarding receipts for every museum ticket, and a quiet reliance on espresso to power late-night design
    drafts.
background:
  cultural: Usha is a second‑generation South Asian American of Indian heritage, raised in Detroit's culturally diverse neighborhoods. Her family maintains traditions such as celebrating Diwali and Holi,
    and she grew up speaking both English and Hindi at home. The city's vibrant music scene, strong sense of community activism, and the blend of immigrant cultures have shaped her appreciation for multicultural
    arts and her desire to foster inclusive cultural spaces that reflect the lived experiences of Detroit's varied communities.
attributes:
  skills: '["Event Coordination", "Budget Management", "Community Outreach", "Basic Graphic Design", "Digital Photography", "Cultural Research", "Conversational Hindi"]'
  hobbies: '["Visiting Art Galleries", "Street Photography", "Cooking South Asian Cuisine", "Live Music Attendance", "Yoga", "Volunteering at Community Center", "Language‑Exchange Meetups"]'
  career_goals: Usha aims to transition into a full‑time role in arts administration or cultural programming, ideally as a program manager for a nonprofit that bridges South Asian and Detroit artistic communities.
    She plans to enroll in a certificate program in museum studies or nonprofit management within the next two years, build a professional portfolio of curated community exhibitions, and eventually lead
    interdisciplinary projects that celebrate multicultural narratives while fostering inclusive spaces for underrepresented artists.
