personas:
  professional: Huy Tran, a budding junior engineer who channels a love of step‑by‑step LEGO manuals and puzzle solving into meticulous miniature constructions, demonstrates the organized, reliable, and
    detail‑oriented mindset of a future problem‑solver who plans ahead and follows through on every piece.
  sports: Huy Tran, a regular at the community pool’s swim lessons and a member of the local youth soccer club, practices drills on a set schedule, cheers for the San Jose Earthquakes, and thrives on the
    predictable rhythm of team practice and swimming laps.
  arts: Huy Tran adores drawing intricate car and aircraft sketches, immerses themselves in the vivid storytelling of the Magic Tree House series, enjoys the upbeat tunes of Pixar soundtracks such as "You've
    Got a Friend in Me," and admires the illustration style of Chris Riddell.
  travel: Huy Tran prefers family trips that are carefully planned, having explored Disneyland in California and the Grand Canyon on a school field trip, while dreaming of a future visit to Tokyo’s interactive
    science museums and the orderly charm of European castles.
  culinary: Huy Tran favors familiar comforts like chicken nuggets, cheese pizza, and strawberry‑banana smoothies, enjoys assembling their own mini‑sandwiches with peanut butter and jelly, and occasionally
    experiments with a kid‑friendly science kit to make edible slime, highlighting a mix of routine favorites and curious experimentation.
  core: Huy Tran is a methodical seven‑year‑old who loves building LEGO worlds, worries about missed steps, and keeps a secret stash of extra puzzle pieces for later.
background:
  cultural: Huy comes from a Vietnamese-American family in Oak Harbor, Washington. At home, his parents speak Vietnamese and celebrate traditions such as Tet (Lunar New Year), where they prepare bánh chưng,
    spring rolls, and share red envelopes. He participates in local cultural festivals at the nearby Vietnamese community center and has learned a few Vietnamese songs and folk stories. The family’s cuisine,
    including pho and bánh mì, is a regular part of his meals, and his grandparents often share stories of life in Vietnam, giving Huy a strong sense of his Southeast Asian heritage while growing up in
    the Pacific Northwest.
attributes:
