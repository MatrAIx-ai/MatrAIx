  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Reading adventure books (Magic Tree House)'', ''Board games (Connect Four, Checkers)'', ''Swimming'', ''Soccer practice'', ''Drawing sketches of vehicles'',
