  career_goals: Even at seven, Huy enjoys imagining future jobs that combine his love for order, structure, and making things work. He aspires to become an engineer or architect, envisioning himself designing
    bridges, buildings, or even LEGO-inspired inventions. He also dreams of being a firefighter, attracted by the clear routines, teamwork, and the chance to help others safely. Huy’s ambitions are guided
    by his desire for a stable, predictable career where he can plan ahead, solve problems step by step, and see tangible results of his effort.
