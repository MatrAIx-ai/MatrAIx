persona_description: A historian who specializes in the study of prehistoric settlements and their inhabitants, particularly those from the British Isles during the Neolithic and Bronze Age periods. She
  has extensive knowledge of the techniques and methods used to excavate and interpret prehistoric sites, and is skilled in using radiocarbon dating and other dating methods to determine the age of artifacts
  and structures. She has a deep interest in the social and economic structures of these communities, and is particularly interested in the role of women and children in their daily lives. She has a passion
  for sharing her knowledge and expertise with others and is committed to preserving and protecting the archaeological sites and artifacts that she has studied.
