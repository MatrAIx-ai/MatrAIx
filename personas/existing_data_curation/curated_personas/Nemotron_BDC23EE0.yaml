personas:
  professional: David Martinez is a newborn whose early fascination with bright, moving mobiles and instinctive vocal babbling hints at a future as an interactive media designer, where their spontaneous
    curiosity, talkative nature, and strong desire for harmonious collaboration will drive innovative storytelling.
  sports: David Martinez, a newborn, participates in a parent‑infant gymnastics class at Tiny Tots Gym while his family routinely streams Chicago Cubs baseball games, planting early enthusiasm for movement
    and team fandom.
  arts: David Martinez, a newborn, is captivated by the swirling blues of Van Gogh’s Starry Night hung above his crib and soothes to the gentle piano of Ludovico Einaudi, while his parents often play Mozart’s
    Eine kleine Nachtmusik, fostering an early love for both visual and auditory art.
  travel: David Martinez, a newborn, has already enjoyed a spontaneous family road trip to the Grand Canyon and an infant‑friendly stay at a Kyoto ryokan in Japan, reflecting his parents’ love for impromptu
    cultural immersion despite the logistical challenges of infant travel.
  culinary: David Martinez, a newborn, thrives on organic, DHA‑enriched formula and occasional pureed carrots and apples, while his parents delight in preparing fresh, lightly steamed sweet‑potato mash
    with a pinch of cinnamon for his first solid‑food experiences.
  core: David Martinez, a newborn whose bright‑eyed curiosity, incessant babble, and innate need for harmony combine into a delightfully expressive infant who worries at the slightest change yet radiates
    warmth that draws everyone’s attention.
background:
  cultural: David is a first‑generation Mexican‑American raised in Orange County, California. He grew up in a bilingual household where Spanish and English were spoken interchangeably, and he was immersed
    in Mexican traditions such as Día de los Muertos, Día de la Independencia, and family gatherings centered around food. The vibrant Latino community in Orange County, with its murals, festivals, and
    music, shaped his appreciation for art and his sense of communal responsibility. While navigating the blend of Mexican heritage and Southern California culture, he draws on both to inform his creative
    expression and his desire to foster cultural pride among his peers.
