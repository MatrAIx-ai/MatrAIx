  hobbies: '[''Street art exploration'', ''Sketching and graffiti'', ''Acoustic guitar playing'', ''Dancing (cumbia, salsa)'', ''Attending cultural festivals'', ''Cooking Mexican cuisine'', ''Socializing
    at coffee shops'', ''Watching indie films'', ''Listening to creativity podcasts'', ''Volunteering at community events'']'
  career_goals: David aspires to turn his passion for art and community into a career, aiming to become a muralist or community arts coordinator who designs public artworks celebrating Mexican heritage
    and fostering social connection. He also hopes to lead youth empowerment workshops and cultural events, leveraging his sociability and empathy. Over the next several years, he seeks a stable role that
    balances creative freedom with enough structure to manage his stress, perhaps through an apprenticeship in visual arts or a certification in community mediation.
