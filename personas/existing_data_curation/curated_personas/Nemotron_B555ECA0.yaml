  hobbies: '[''Reading popular science'', ''Visiting art galleries and museums'', ''Watercolor painting'', ''Woodworking'', ''Gardening (heirloom vegetables)'', ''Fishing'', ''Bird‑watching'', ''Listening
    to jazz'', ''Volunteering at the library (tech workshops)'']'
  career_goals: Although retired, Daniel aims to stay intellectually active by mentoring junior engineers at the local community college, writing a memoir that blends his Southern upbringing with his love
    of science and art, and learning digital painting techniques. He also hopes to organize a small intergenerational art‑science exhibition in Portal that showcases local talent and encourages curiosity
    among youth.
