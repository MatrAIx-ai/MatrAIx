persona_description: A historian who specializes in the study of the complex and diverse history of Afro-Latinx identity in Latin America, particularly in the context of the Pacific Standard Time exhibitions
  and the history of East Asian diasporas in Latin America. She is interested in the intersection of race, identity, and diaspora, and how these factors have shaped the experiences of Afro-Latinx and Asian
  Latinx communities within and outside Latin America. She is also interested in the role of art and culture in shaping these identities and experiences.
