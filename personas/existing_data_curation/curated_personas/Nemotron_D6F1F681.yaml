personas:
  professional: Angeleen Sadasivan, a budding graphic designer in middle school who channels her love for detailed line work and puzzle‑solving into creating precise, fantasy‑themed illustrations for school
    clubs, balancing a practical approach with quiet confidence.
  sports: Angeleen Sadasivan, a casual fan of the Vegas Golden Knights and Las Vegas Raiders, joins her school's beginner ultimate Frisbee club and practices yoga at home to stay flexible, preferring low‑intensity
    workouts that fit her structured routine.
  arts: Angeleen Sadasivan, whose artistic side shines through realistic pencil sketches of desert landscapes and participation in the local community theater's fantasy‑themed workshops, draws inspiration
    from illustrators like James Gurney and musicians such as Florence Welch, often pairing her drawing sessions with ambient scores.
  travel: Angeleen Sadasivan, a meticulous planner of family weekend getaways, favors short trips to Red Rock Canyon or the Grand Canyon to photograph succulents, while dreaming of a spring visit to San
    Diego's Balboa Park and a future overseas adventure to Kyoto's ancient temples.
  culinary: Angeleen Sadasivan, a precise home baker who perfects classic chocolate chip cookies and lemon bars using measured grams of butter and vanilla, often delights her close circle with small batches
    while occasionally burning the edges in her eagerness to try new recipes.
  core: Angeleen Sadasivan, a 14‑year‑old puzzle‑loving realist sketcher who balances a love for structured baking and succulent care with a quiet, detail‑obsessed mind and a secret stash of mystery novels
    under her bed.
background:
  cultural: Angelee​n comes from a middle‑class Caucasian family living in Las Vegas, Nevada. Her upbringing reflects typical Western‑European American cultural traditions—celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July—while also being shaped by the multicultural, tourism‑driven environment of the city. Growing up near the desert parks and the vibrant Strip has given her an appreciation
    for both the natural landscape of the Southwest and the diverse cultural influences that visitors bring. She participates in local community events, enjoys occasional family outings to nearby natural
    attractions, and values the family’s emphasis on hard work, self‑reliance, and close‑knit relationships.
