  career_goals: Angeleen aspires to a career that offers clear structure, reliability, and the chance to help others in a focused environment. She is particularly drawn to nursing, attracted by the well‑defined
    protocols, the opportunity for hands‑on patient care, and the stability the profession provides. At the same time, she is exploring accounting or bookkeeping as an alternative path because of its emphasis
    on organization, predictability, and systematic problem solving. In the short term, she aims to maintain high grades in science and mathematics, secure a volunteer role at a local health clinic or community
    center, and continue developing her coding skills through extracurricular clubs or online courses.
