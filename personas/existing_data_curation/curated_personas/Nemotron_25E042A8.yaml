  career_goals: Miguel aims to transition from a production worker to a supervisory role within the next three to five years, targeting positions such as lead operator or shift supervisor. He plans to obtain
    a Six Sigma Green Belt certification and complete a short-term industrial management course to bolster his technical credentials. Leveraging his curiosity for new ideas, he hopes to spearhead continuous-improvement
    projects that integrate emerging automation technologies while maintaining practical, cost-effective solutions. A key ambition is to mentor younger employees, creating a high-performing team that consistently
    exceeds plant targets. Long-term, Miguel envisions opening a small, family-run machining shop that blends his Mexican heritage with American manufacturing practices, providing both financial stability
    for his family and a platform for innovative product development.
