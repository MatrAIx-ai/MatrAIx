  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Cooking Mexican cuisine'', ''Watching NFL football and Liga MX soccer'', ''Fishing at Lake Lavon'', ''Hiking in Texas Hill Country'', ''Listening
