  hobbies: '[''Cooking traditional Mexican dishes'', ''Herb gardening'', ''Reading historical fiction'', ''Playing acoustic guitar'', ''Chess'', ''Puzzle solving'', ''Volunteer tutoring (math)'']'
  career_goals: Krystal aspires to pursue a career that blends her love for precision, routine, and helping others. She plans to graduate high school with a strong focus on science and health sciences,
    aiming to attend a technical college to become a medical laboratory technologist. She values the stability and structured environment of laboratory work, where meticulous attention to detail is essential.
    At the same time, she dreams of eventually opening a modest family-run Mexican bakery or kitchen where she can share her cultural recipes with the local community, preserving her heritage while providing
    a reliable source of income. She hopes to earn scholarships that will allow her to achieve both academic and entrepreneurial goals.
