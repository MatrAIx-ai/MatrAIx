personas:
  professional: Krystal Iturrioz, a 14‑year‑old aspiring culinary student, blends their love for routine and precision with a competitive streak by meticulously mastering their family's traditional dishes
    in the kitchen while volunteering as a math tutor at the community center, demonstrating an early commitment to both culinary arts and academic responsibility.
  sports: Krystal Iturrioz participates in the Lanesborough Middle School volleyball team and the Berkshire County Youth Soccer League, and they cheer for the Boston Red Sox each baseball season, preferring
    structured team sports and regional fandom.
  arts: Krystal Iturrioz spends evenings mastering acoustic guitar, strumming the folk ballads their mother taught them and reading historical fiction by Laura Esquivel, while they draw creative inspiration
    from the cinematic storytelling of Guillermo del Toro.
  travel: Krystal Iturrioz enjoys planning family trips that balance quiet exploration and cultural connection, having visited Boston’s Freedom Trail and dreaming of touring the colonial streets of Guanajuato,
    the city where their great‑grandparents grew up, illustrating a mix of local curiosity and heritage‑linked wanderlust, and they often map out itineraries with meticulous detail.
  culinary: Krystal Iturrioz excels at preparing homemade tortillas, hand‑rolled tamales, and fresh salsa, skillfully tending a herb garden of cilantro, oregano, and chilies to flavor their dishes, and
    they consider their intermediate cooking level a cornerstone of their identity.
  core: Krystal Iturrioz is a routine‑driven teen who blends culinary precision, competitive tutoring, and quiet contemplation into a uniquely disciplined yet occasionally skeptical outlook on life, and
    they rarely stray from their well‑structured schedule.
background:
  cultural: Krystal was raised in a Mexican-American household that places strong emphasis on family, language, and tradition. Her parents immigrated from Mexico and teach her the values of respect, modesty,
    and community. At home, Spanish is spoken daily, and cultural celebrations such as Día de los Muertos, Las Posadas, and her upcoming quinceañera are central to her family life. She follows Catholic
    customs, attending Mass with her family on holidays and observing religious rituals. Living in Lanesborough, MA, she balances this heritage with the quieter, rural New England lifestyle, often participating
    in local town events while preserving her Mexican identity through food, music, and bilingual storytelling.
attributes:
