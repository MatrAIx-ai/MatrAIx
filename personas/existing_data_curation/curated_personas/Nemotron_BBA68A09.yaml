  hobbies: '[''Book club'', ''Church choir'', ''Community gardening'', ''Cooking and baking'', ''Quilting'', ''Knitting'', ''Yoga'', ''Meditation'', ''Birdwatching'', ''Walking trails'']'
  career_goals: Ariel aims to shift her informal volunteer work into a formal leadership role within the local senior center or community nonprofit, hoping to become a board member or program director who
    can expand intergenerational activities and cultivate a sustainable community garden. She plans to pursue a certificate in gerontology or nonprofit management to strengthen her administrative expertise.
    Beyond the community, Ariel wishes to launch a modest home‑based business selling her preserves and baked goods, providing both a creative outlet and supplemental income. Personal ambitions include
    improving her health by incorporating regular yoga and mindfulness practices to manage her tendency toward worry, and mentoring younger volunteers to pass on her cooperative spirit and practical knowledge.
