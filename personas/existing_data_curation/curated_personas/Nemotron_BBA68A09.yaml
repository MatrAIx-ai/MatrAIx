personas:
  professional: Ariel Alexander, a 58‑year‑old community organizer with an associate’s degree in business administration, channels their meticulous budgeting, event‑planning expertise, and conflict‑mediation
    skill set into leading senior‑center programs and expanding an intergenerational community garden.
  sports: Ariel Alexander follows the regional baseball team, the River City Rovers, and holds season tickets for the local university's women's soccer matches, but personally stays active through weekly
    riverside trail walks, a senior‑softball league, and occasional bird‑watching hikes with the neighborhood nature club.
  arts: Ariel Alexander thrives in communal creativity, singing Handel’s Messiah and contemporary gospel in the church choir alongside the harmonious tones of the Tabernacle Choir, quilting inspired by
    the bold patterns of Faith Ringgold, and enjoying literary gatherings that discuss Jane Austen and Toni Morrison, while also admiring the folk storytelling of Joan Baez.
  travel: Ariel Alexander enjoys weekend road trips to nearby historic towns like Oak Ridge and the lavender fields of Provence, seeks inspiration from the botanical gardens of Kew in London, and dreams
    of a leisurely cruise along the Norwegian fjords to study alpine flora, all while balancing travel plans around family commitments and a modest travel budget.
  culinary: Ariel Alexander delights in farm‑to‑table cooking, frequently preparing heirloom tomato gazpacho, rosemary‑infused roasted beet salad, and cinnamon‑apple crumble, while expertly preserving seasonal
    produce into spiced pickles, strawberry jam, and lavender honey, and their kitchen staples include fresh basil, locally sourced goat cheese, and a well‑worn cast‑iron skillet.
  core: Ariel Alexander is a 58‑year‑old community‑focused horticulturist‑chef who blends precise organization with a love for harmony, juggling garden tours, choir rehearsals, and a worry‑laden mind that
    finds peace in yoga and jars of homemade preserves.
background:
  cultural: Ariel is a white Midwestern woman raised in Erie, Illinois, a small‑town community steeped in traditional Midwestern values of modesty, hospitality, and strong neighborly ties. Her family heritage
    includes German and Irish roots, reflected in cultural traditions such as seasonal festivals, homemade foods, and a reverence for community service. Growing up in a predominantly Protestant environment,
    she has been active in church life, which reinforces her cooperative and kindness‑driven outlook. The rural environment shaped her practical work ethic, love of the land, and appreciation for self‑reliance,
    while also fostering a deep sense of belonging to a close‑knit community where group activities and mutual support are central.
