personas:
  professional: George Torres, a 20‑year‑old with an associate degree and a knack for troubleshooting, thrives in flexible roles such as a small‑business shop assistant where they can blend practical problem‑solving
    with community interaction, aiming to eventually manage a community‑center café.
  sports: George Torres fuels a love for the outdoors by hiking the Palmetto Trail, fishing at Lake Greenwood, riding with the Lowcountry Riders bike club, playing pickup basketball with friends while cheering
    for the Greenville Drive minor‑league baseball team, and following the Carolina Panthers for football weekends.
  arts: George Torres nurtures creative expression through sketching futuristic gadget designs, listening to folk‑rock artist John Butler Trio, attending local art fairs featuring painters like Sarah Hagedorn,
    and binge‑watching science documentaries such as Cosmos, which all shape their inventive mindset.
  travel: George Torres favors spontaneous weekend road trips in a modest sedan, often detouring to Asheville for mountain hikes, savoring crab boils in Charleston, and snapping photos at Savannah’s historic
    squares, balancing low‑budget planning with last‑minute detours guided by friends’ recommendations.
  culinary: George Torres enjoys cooking comfort foods like shrimp and grits seasoned with smoked paprika, whipping up spicy cheese quesadillas, and experimenting with DIY soda infusions, while they also
    love sampling new dishes at food trucks that serve tacos al pastor and vegan jackfruit sliders.
  core: George Torres is a curious 20‑year‑old who blends DIY tinkering, community spirit, and a penchant for spontaneous adventures, all while juggling budgeting quirks and occasional allergy battles.
background:
  cultural: George was raised in Greenwood, South Carolina, a close‑knit, predominantly white, Southern community where family ties, church involvement, and neighborly support are central. He grew up attending
    a local Baptist church, celebrating Southern traditions such as community picnics, high school football games, and seasonal festivals. While rooted in these customs, his curiosity drives him to explore
    broader perspectives, often blending regional hospitality with openness to new ideas and experiences.
