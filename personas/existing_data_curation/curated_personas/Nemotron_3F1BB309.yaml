  career_goals: George aims to secure a role that balances structure with freedom, such as a position in a local small‑business shop, a community‑focused organization, or a freelance gig that lets him apply
    his practical skills while exploring new ideas. He hopes to eventually enroll in a bachelor's program in business or community development, leveraging his associate degree to move into management or
    entrepreneurship. His long‑term ambition is to open a community‑center café in Greenwood that serves as a gathering place, offering both a social hub and a venue for local workshops, allowing him to
    combine his love for people, practical problem‑solving, and occasional spontaneous projects.
