persona_description: A scientist or engineer specializing in remote sensing and sensor calibration, with a focus on Earth-observing sensors and their calibration. This individual has expertise in using
  full-range spectroradiometers like the FieldSpec® 4 for sensor calibration and has experience with vicarious calibration to validate the absolute radiometric response of Earth-observing sensors in space.
  They are knowledgeable about radiometric uncertainty and the incorporation of spectral differences between sensors into calibration efforts.
