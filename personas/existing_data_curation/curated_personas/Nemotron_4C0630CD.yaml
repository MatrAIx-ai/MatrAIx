    Knowledge", "Conflict Resolution and Mediation", "Critical Thinking and Analytical Writing"]'
  hobbies: '["Gardening (herbs, heirloom vegetables)", "Watercolor painting", "Bilingual cooking club (Mexican cuisine)", "Reading Latin American literature", "Hiking in Kentucky countryside", "Volunteering
    at adult literacy program", "Attending folk‑dance gatherings"]'
  career_goals: Magalis aims to step into a senior operations leadership role within the next three to five years, where she can drive a digital transformation initiative that cuts operational costs by
    at least 15% while preserving the personal touch she values. She plans to earn a Lean Six Sigma Black Belt and a certified PMP to solidify her expertise. Long‑term, she envisions transitioning to a
    consulting practice focused on helping small and family‑owned businesses in Kentucky and the surrounding region, especially those led by Hispanic entrepreneurs, to implement efficient, culturally sensitive
    processes. Additionally, she hopes to mentor emerging talent at her company and possibly teach part‑time courses on business operations at a local community college.
