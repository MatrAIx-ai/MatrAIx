personas:
  professional: Jacqueline Lackerson, an 18‑year‑old communications student with a talent for digital storytelling, channels their event‑planning experience at the 40 Watt Club and their love for community‑rooted
    art into crafting engaging cultural programs for local museums and nonprofit art spaces.
  sports: Jacqueline Lackerson stays active by hiking the Blue Ridge foothills on weekends, runs with the Athens Running Club, and follows the Atlanta Hawks, Atlanta Braves, and Georgia Bulldogs, and they
    join pick‑up volleyball games at the recreation center while cheering loudly during March Madness with their friends.
  arts: Jacqueline Lackerson immerses themselves in Athens’s eclectic arts scene, regularly sketching murals inspired by the bold colors of Kehinde Wiley, curating Instagram reels that blend the sounds
    of R.E.M., the B‑52s, and modern poet Sarah Kay, and attending live shows at the 40 Watt Club where they adore performances by contemporary jazz artist Esperanza Spalding.
  travel: Jacqueline Lackerson prefers spontaneous, low‑budget road trips that combine cultural immersion and nature, having explored Savannah’s historic squares, Charleston’s Lowcountry cuisine, and New
    Orleans’s French Quarter, while they dream of a future pilgrimage to the Edinburgh Festival Fringe, a photography‑focused visit to Mexico City, and capturing sunrise over Angkor Wat’s ancient temples.
  culinary: Jacqueline Lackerson blends family‑rooted Southern flavors with modern twists in the kitchen; they faithfully prepare collard greens seasoned with smoked turkey and hot sauce, sweet‑potato pie
    drizzled with honey‑butter glaze, and peach cobbler finished with a hint of bourbon, while experimenting with a spicy sweet‑potato ramen that features miso broth, gochujang, and fresh cilantro.
  core: Jacqueline Lackerson is a free‑spirited storyteller who sketches murals between coffee shop study sessions, habitually leaves their sketchbooks scattered on campus benches, and they balance impromptu
    art projects with a laid‑back approach to deadlines.
background:
  cultural: Jacqueline is a second‑generation African‑American from the Deep South. Her parents grew up in Atlanta, where her mother worked as a middle‑school teacher and her father as a mechanic, both
    active members of the local Baptist church. Family gatherings revolve around soulful music, storytelling, and traditional Southern dishes like fried chicken, collard greens, and peach cobbler. Her grandparents
    were involved in civil‑rights activism during the 1970s, instilling a strong sense of community responsibility and pride in Black heritage. Living in Athens, she has been shaped by the town’s eclectic
    music legacy—home to the B‑52s and R.E.M.—and the university’s diverse cultural programming, which broadened her appreciation for interdisciplinary art forms. This blend of Southern Black traditions
    and collegiate creativity informs her worldview and artistic sensibilities.
