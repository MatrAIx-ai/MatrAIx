  hobbies: '[''visiting art galleries'', ''digital photography'', ''sketching'', ''listening to jazz and hip‑hop'', ''attending open‑mic poetry nights'', ''creative writing'', ''cooking Southern cuisine'',
    ''hiking'', ''volunteering for community arts projects'', ''playing guitar'']'
  career_goals: She aims to finish her associate degree in communications and then pursue a bachelor's in cultural studies or museum studies. Jacqueline envisions a career that merges her love for art with
    community service—working as a cultural program coordinator for a local museum, community center, or nonprofit that amplifies Black Southern stories. She also hopes to develop a freelance multimedia
    storytelling practice, producing photo essays, short videos, and social‑media campaigns that celebrate under‑represented voices. Flexibility is key to her plan; she wants a role that allows her to balance
    creative projects with continued learning and occasional travel to art festivals or heritage sites.
