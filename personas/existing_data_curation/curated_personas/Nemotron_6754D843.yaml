background:
  cultural: Manuel is raised in a Mexican‑American household in Ottawa, Kansas. He grows up bilingual, hearing Spanish lullabies and English nursery rhymes, and is immersed in traditions such as Día de
    los Muertos, the celebration of quinceañeras, and family gatherings centered around Mexican cuisine like tamales and pozole. The rural Midwestern setting introduces him to community values of neighborliness
    and self‑reliance, while his family's Mexican heritage provides a rich tapestry of folklore, music, and visual art that shapes his worldview. This blend of Mexican cultural roots and Kansas small‑town
    life fosters a unique perspective that influences his curiosity, artistic sensibility, and calm resilience.
