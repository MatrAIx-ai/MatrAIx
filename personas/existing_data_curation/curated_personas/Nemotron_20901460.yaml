  career_goals: Robin aspires to advance to a senior leadership position, such as Director of Procurement or Vice President of Supply Chain, within the next five years. She aims to lead strategic sourcing
    initiatives that embed sustainability and resilience into her company's supply chain, achieve the Certified Professional in Supply Management (CPSM) credential, and mentor emerging procurement talent.
    While pursuing these professional milestones, she remains committed to maintaining a healthy work‑life balance, fostering a collaborative, harmonious team environment, and contributing to her community.
