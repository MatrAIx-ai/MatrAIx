personas:
  professional: Robin Armenteros, a strategic procurement specialist with a knack for designing repeatable, data‑driven sourcing workflows, leverages SAP and Power BI to drive cost savings while championing
    sustainability, and mentors junior staff with the same routine‑focused, pragmatic style they apply to their own career progression toward a VP role.
  sports: Robin Armenteros hikes the pine‑lined trails of Middlesex County with their weekend hiking club, roots for the New York Giants on Sundays, and maintains a steady yoga practice twice weekly, combining
    low‑impact cardio with a love for the region’s outdoor culture.
  arts: Robin Armenteros contributes to a practical‑nonfiction book club that recently dissected Mary Beard's 'SPQR' and Malcolm Gladwell's 'Blink', finds solace in the folk melodies of Joni Mitchell, and
    knits scarves inspired by traditional patterns during quiet evenings, weaving literary and musical appreciation into their creative routine.
  travel: Robin Armenteros prefers meticulously planned getaways, having explored the colonial streets of Williamsburg, the museums of Washington DC, and the coastal towns of Maine, while dreaming of a
    fall pilgrimage to Tuscany’s vineyards and a spring visit to Kyoto’s temples when work permits allow a balanced escape.
  culinary: Robin Armenteros cultivates a modest vegetable garden that supplies fresh heirloom tomatoes, zucchini, and basil for seasonal dishes like roasted beet salad with goat cheese and a hand‑kneaded
    sourdough loaf, while their kitchen experiments gracefully straddle reliable family recipes and the occasional daring pastry inspired by a weekend farmers‑market find.
  core: Robin Armenteros is a routine‑driven procurement strategist who blends analytical rigor with community‑centric hobbies, balancing disciplined career ambition with a love for gardening, knitting,
    and thoughtful indulgence.
background:
  cultural: Robin was raised in a middle‑class, New England family of Irish‑German descent in the suburbs of Boston. Her upbringing emphasized reliability, modesty, and community service, reflecting traditional
    New England values. Family gatherings centered around holidays such as Thanksgiving and Christmas, with a focus on home‑cooked meals and shared traditions. She attended public schools in Massachusetts,
    earned a STEM bachelor's degree at a state university, and continues to identify with the pragmatic, collaborative spirit of her regional roots while honoring her family’s cultural heritage.
