  career_goals: At 77, Guadalupe aims to keep her independence by continuing part‑time work as a senior shift lead, where she can oversee younger waitstaff, ensure smooth service, and uphold the restaurant’s
    standards. She hopes to mentor newcomers, passing on her knowledge of proper etiquette and efficient service. Securing a stable supplemental income for medical expenses and maintaining health benefits
    are also priorities. Longer‑term, she desires to reduce her hours gradually while remaining a valued presence in the dining room, and eventually transition to a volunteer role at the local community
    center’s senior meals program.
