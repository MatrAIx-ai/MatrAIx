personas:
  professional: Sue Vanleeuwen, a one‑year‑old who already organizes blocks by color and shows a keen curiosity for how toys work, demonstrates early analytical thinking and an emerging knack for design
    that hints at a future as a product innovator, and they reliably explore new ideas while staying flexible.
  sports: Sue Vanleeuwen, a one‑year‑old who loves crawling races across the living‑room carpet, gets wide‑eyed watching the NBA's Golden State Warriors on television, and mimics the celebratory claps of
    the local youth soccer club, the Riverside Rovers, cheering with giggles and trying to imitate the players' movements.
  arts: Sue Vanleeuwen, a one‑year‑old who is mesmerized by the bold illustrations in Dr. Seuss books, sways to the gentle lullaby of "Baby Shark" by Pinkfong, and giggles at the playful puppet performances
    of Sesame Street’s Elmo, absorbing visual and auditory art that fuels their budding appreciation for creativity.
  travel: Sue Vanleeuwen, a one‑year‑old who has already visited Grandma’s countryside farmhouse, splashed in the shallow waves at a beach resort in the Caribbean, and enjoyed a stroller‑friendly day trip
    to the local zoo, while dreaming of the bright lights of Disneyland and the dinosaur exhibits at the Natural History Museum.
  culinary: Sue Vanleeuwen, a one‑year‑old who adores the sweet bite of mashed banana, the warm comfort of carrot‑puree with a pinch of cinnamon, and the smooth texture of avocado mash, often smearing these
    dishes on their high chair tray as a playful exploration of food and flavor.
  core: Sue Vanleeuwen, a curious one‑year‑old who balances meticulous toy organization with spontaneous bursts of playful chaos, habitually drops everything to explore shiny objects, and bursts into giggles
    whenever bright colors or new sounds appear.
background:
  cultural: Sue is a white American child of Dutch ancestry, raised in Roanoke, Virginia. Her family blends Southern hospitality and community traditions with an appreciation for multicultural art, regularly
