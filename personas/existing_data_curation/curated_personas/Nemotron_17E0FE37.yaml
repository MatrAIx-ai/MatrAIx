  career_goals: James aims to progress into senior leadership roles such as Program Manager or PMO Director, overseeing multi‑site infrastructure and technology initiatives across the Carolinas. He plans
    to earn PMP and Lean Six Sigma Black Belt certifications to deepen his expertise, and to spearhead digital transformation projects that integrate AI‑driven scheduling and predictive analytics. Long‑term,
    he envisions establishing a consulting practice that helps small businesses in Lincoln County adopt modern project management practices, while also mentoring emerging professionals through local STEM
    outreach and industry groups.
