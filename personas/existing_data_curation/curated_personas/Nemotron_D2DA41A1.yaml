  hobbies: '["Fishing on the Hudson River", "Vegetable gardening", "Woodworking projects", "Bowling league", "Chess", "Hiking Westchester trails", "Watching New York baseball", "DIY home‑improvement"]'
  career_goals: Seeking greater stability for his family, Josiah aims to transition from laborer to foreman within the next three years. He plans to earn his GED and obtain OSHA 30‑hour certification and
    a construction management safety course to qualify for supervisory roles. Long‑term, he hopes to launch a small, locally‑focused contracting business that can provide steady work for younger tradespeople
    and allow him to mentor the next generation of skilled workers. Achieving a reliable pension and paying off his mortgage are also top priorities as he approaches retirement.
