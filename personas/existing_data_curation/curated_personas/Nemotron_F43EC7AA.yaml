  career_goals: Although Yuka is retired, she remains driven to make an impact. She hopes to document her life experiences and the stories of her peers in a memoir that preserves the history of Minneapolis’s
    Black community. She aspires to lead a small intergenerational art workshop at the senior center, mentoring youths in traditional crafts and storytelling. Yuka also aims to stay physically active, maintain
    independence, and continue volunteering for church outreach programs, ensuring she contributes to the well‑being of her neighbors.
