  hobbies: '[''Gardening'', ''Watercolor painting'', ''Visiting art galleries and museums'', ''Knitting and crocheting'', ''Oral history storytelling'', ''Reading art and cultural history'', ''Birdwatching'',
    ''Cooking and experimenting with regional recipes'', ''Volunteer work at senior center'']'
  career_goals: Tiffiny aims to deepen her involvement with the Waco Community Art Center by becoming a volunteer docent, sharing her love of art with visitors, especially fellow seniors. She hopes to complete
    her associate degree in liberal arts, exploring art history and local culture in a formal setting. She aspires to mentor younger volunteers, helping them organize flexible community events and encouraging
    a collaborative, harmony‑focused atmosphere. Additionally, she wishes to curate a traveling exhibition of seniors’ artwork across local libraries and plan occasional day trips to regional museums such
    as the Dallas Museum of Art and the Fort Worth Modern Art Museum, satisfying her curiosity for new ideas and experiences.
