personas:
  professional: Tiffiny Iskander, a lifelong community volunteer and aspiring docent at the Waco Community Art Center, blends her practical organizing skills, empathetic listening, and a relaxed, improvisational
    style to coordinate flexible senior events and guide visitors through museum collections while pursuing an associate degree in liberal arts.
  sports: Tiffiny Iskander follows the Dallas Cowboys (NFL) and Texas Rangers (MLB) with a loyal fan’s heart, enjoys leisurely walks in the Waco Creek Trail to birdwatch, and joins a low‑impact senior yoga
    class at the community center to stay mobile.
  arts: Tiffiny Iskander, an avid watercolorist and occasional potter, draws inspiration from Georgia O'Keeffe's floral abstractions, Andy Warhol's pop color palettes, and local Texas artist Susan Hart,
    while curating informal exhibitions of seniors' artwork at Waco libraries.
  travel: Tiffiny Iskander plans trips around her art interests, taking day trips to the Dallas Museum of Art and the Fort Worth Modern, savoring weekend drives to Austin’s live‑music scene, and dreaming
    of a summer visit to New Mexico’s Santa Fe art colonies, all within her senior‑friendly budget.
  culinary: Tiffiny Iskander loves cooking classic Texas chili, pecan pie, and chicken fried steak, seasoning dishes with rosemary and mint harvested from her native wildflower garden, and brewing herbal
    teas from lavender and chamomile, though she sometimes forgets to set a timer for her simmering stews.
  core: Tiffiny Iskander, an 82‑year‑old art‑loving volunteer, balances curiosity and flexibility with occasional forgetfulness, turning garden herbs into tea, guiding seniors through galleries, and sprinkling
    her days with watercolor splashes and friendly bird sketches.
background:
  cultural: Tiffiny’s cultural background is rooted in mid‑20th‑century Texas, shaped by a family of European‑descended, white Texans who valued community, hospitality, and self‑reliance. Growing up in
    a modest suburban neighborhood in the 1950s, she was immersed in Southern traditions—church gatherings, seasonal festivals, regional cooking, and a strong sense of neighborly support. Over the decades,
    she has embraced the evolving cultural tapestry of Waco, from the rise of local art initiatives to the growing diversity of the community, which fuels her curiosity and openness to new ideas. Her upbringing
    instilled a cooperative spirit and an appreciation for both tradition and the innovative, guiding her ongoing involvement in art, volunteerism, and lifelong learning.
