personas:
  professional: Susana Medina, a veteran municipal court clerk whose meticulous case‑file management and bilingual communication anchor the courtroom’s daily rhythm, relies on a routine‑driven work ethic
    and a competitive edge to keep the legacy system organized while mentoring newcomers, even though they sometimes let a relaxed attitude toward scheduling cause minor bottlenecks.
  sports: Susana Medina stays active through salsa dance nights, a senior‑center walking club, and attending games of the Miami Marlins and Miami Dolphins, while they are a member of the Silver Steps Senior
    Fitness Club that organizes weekly low‑impact aerobic sessions, reflecting their competitive spirit and love for group activities.
  arts: Susana Medina immerses themselves in Latin ballads by Celia Cruz and Luis Miguel during karaoke, watches telenovelas like "La Usurpadora", reads romance novels by Nora Roberts, and enjoys community
    theater productions of "West Side Story", often singing in the chorus despite their occasional skeptical view of critics.
  travel: Susana Medina prefers relaxed, family‑oriented trips, often returning to Old San Juan for cultural festivals and planning a road‑trip to Savannah and Charleston to admire historic architecture,
    balancing limited mobility with a love of sunny destinations while they keep an eye on travel costs.
  culinary: Susana Medina delights in cooking arroz con gandules, lechón, and flan using fresh herbs from their garden and spices such as adobo and sazón, they never miss a chance to pair meals with locally
    produced orange liqueur, though they sometimes over‑spice dishes when experimenting with new recipes.
  core: Susana Medina blends a steadfast devotion to routine court work with vibrant salsa nights, leverages their competitive edge to mentor others, and their tendency to worry fuels both meticulous filing
    and diligent health monitoring.
background:
  cultural: Susana’s Puerto Rican heritage is a central part of her identity. She grew up speaking Spanish at home and celebrates Caribbean traditions such as Noche de San Juan, the feast of San José, and
    the vibrant music of bomba and plena. Family ties remain strong; she regularly visits relatives in Puerto Rico and maintains close bonds with the local Latino community in Miami. Catholic values guide
    her participation in church activities, and the emphasis on hospitality and communal meals influences her love for cooking and sharing food. Her bilingualism and deep respect for cultural customs enable
    her to bridge the gap between the court’s services and the diverse population it serves.
attributes:
  skills: '["Bilingual (Spanish/English) communication", "Court filings and record management", "License processing", "Data entry using legacy court systems", "Scheduling and calendar coordination", "Customer
