  hobbies: '["Salsa and merengue dancing", "Cooking traditional Puerto Rican cuisine", "Participating in senior center bingo and card games", "Singing karaoke to Latin ballads", "Volunteering at church
    outreach programs", "Herb gardening", "Watching telenovelas", "Reading romance novels"]'
  career_goals: Susana hopes to continue working at the municipal court for a few more years to secure her retirement benefits, while gradually transitioning into a mentor role for newer clerks. She aspires
    to obtain a short-term certification in court administration to formalize her expertise, and she dreams of volunteering with a local seniors' legal aid organization to help other older adults navigate
    court procedures. Ultimately, she would like to see the court’s filing system modernized, and she hopes to contribute ideas that simplify processes for both staff and the public.
