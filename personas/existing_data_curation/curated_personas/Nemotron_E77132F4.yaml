  career_goals: Emily aims to advance to a senior management analyst or director of analytical services within a mid-sized public agency or regional nonprofit, where she can lead a small, cohesive team
    to deliver data-driven solutions that improve operational efficiency and fiscal responsibility. She seeks to become the trusted authority on cost-saving analysis for local government, publish a practical
    guide for municipal budgeting, and establish a mentorship program that supports emerging analysts while reinforcing her reputation for reliability and pragmatic results.
