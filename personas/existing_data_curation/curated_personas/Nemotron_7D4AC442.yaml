personas:
  professional: Alice Eubanks, an 81‑year‑old community arts organizer and emerging curator, leverages meticulous planning, a sharp analytical mind, and lifelong curiosity to coordinate senior‑focused exhibitions,
    mentor young artists, and run flawless heritage festivals, all while rigorously scrutinizing every budget line and questioning vendors’ promises.
  sports: Alice Eubanks enjoys gentle hikes along the Black Hills Trail with the Rapid City Walking Club in spring, attends Rapid City Rush hockey games each winter, and treats bridge—a mind sport where
    they regularly compete in the state senior championship—as the primary athletic outlet, approaching each match with the same strategic precision they apply to their art projects.
  arts: Alice Eubanks channels boundless curiosity into watercolor landscapes of Badlands sunrises, experimental mixed‑media collages that incorporate pine cones and river stones, and macro photography
    of native lupine and coneflower blossoms, drawing inspiration from Georgia O'Keeffe's palette and Ansel Adams' composition, while regularly volunteering as a docent at the Journey Museum and leading
    workshops at seasonal arts festivals.
  travel: Alice Eubanks prefers well‑planned, low‑stress road trips to nearby historic sites such as Mount Rushmore, the ghost town of Deadwood, and the winter‑lit streets of Santa Fe, always booking quiet
    bed‑and‑breakfasts where they can unpack sketchbooks each evening, while dreaming of a future guided pilgrimage to the art museums of Paris and the gardens of Kyoto.
  culinary: Alice Eubanks is a devoted home chef who savors hearty Midwestern classics like pot roast with root vegetables, delights in fresh summer salads featuring heirloom tomatoes, goat cheese, and
    locally foraged wild mushrooms, and pairs each meal with a strong cup of black coffee—an indulgence they admit sometimes leaves them jittery during evening bridge sessions.
  core: Alice Eubanks, an 81‑year‑old perpetual scholar‑artist, melds razor‑sharp organization, boundless curiosity, and a competitive spark into a vibrant life of painting, photography, bridge, and community
    curation, all while wrestling with a tendency to worry and a love for meticulously planned coffee‑stained sketchbooks.
background:
  cultural: Alice comes from a white, primarily Northern European heritage—her grandparents emigrated from Germany and Norway to the Midwestern farming communities of the early 20th century. Raised in a
    small town in neighboring Nebraska, she absorbed the values of self‑reliance, close‑knit community, and respect for the expansive prairie landscape. Relocating to Rapid City in her thirties for college,
    she has spent over five decades immersed in the unique cultural tapestry of the Black Hills, where Western frontier history intertwines with the traditions of the Lakota Nation. This setting informed
    her appreciation for both American Western art and Native American crafts, motivating her involvement in local museums and cultural events. Her long‑standing participation in a Protestant church and
    the town’s volunteer networks reflects the region’s emphasis on communal service and intergenerational connection.
attributes:
  skills: '[''Event planning and coordination'', ''Budget management'', ''Art history knowledge'', ''Watercolor painting'', ''Digital photography and editing'', ''Public speaking and facilitation'', ''Mentorship
    and tutoring'', ''Strategic board game play (bridge, chess)'', ''Genealogical research'', ''Volunteer organization'']'
  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading historical biographies and mystery novels'', ''Genealogy research'', ''Bridge and competitive board games'', ''Organizing game nights'',
    ''Hiking in the Black Hills'', ''Volunteering at arts festivals and museums'', ''Participating in book clubs'', ''Mixed‑media collage art'']'
  career_goals: 'Alice’s post‑retirement ambitions are centered on leaving a lasting cultural imprint on Rapid City and its surrounding region. She aims to curate a traveling exhibition of senior‑made artworks
    that showcases the evolving perspectives of older artists, while also securing a small grant to digitize and archive local historical photographs. She is working toward completing an online certificate
    in contemporary art curation and hopes to leverage this training by volunteering as a docent at the Journey Museum. A personal writing project occupies her thoughts: a memoir that intertwines her family
    genealogy with the broader story of the Black Hills, intended for publication in a regional history journal. Additionally, she aspires to win the state senior bridge championship, demonstrating her
    competitive spirit, and to maintain a weekly photography walk to document seasonal changes in the prairie landscape.'
