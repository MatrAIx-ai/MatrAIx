persona_description: A Stellenbosch University pulmonologist who is passionate about reducing the burden of smoking-related illnesses on the healthcare system and advocating for the medicalization of tobacco
  dependency. They are dedicated to improving smoking cessation outcomes and exploring the effectiveness of tailored treatment strategies for individuals. They believe that tobacco dependency should be
  treated as a chronic illness with appropriate treatment, and they are committed to advocating for the provision of support programmes for those looking to quit smoking.
