personas:
  professional: Mishelle Horsey, a two‑year‑old with a natural flair for organizing playthings, often stages miniature “office” setups with crayons and blocks, and they showcase early leadership and a keen
    curiosity for how things work.
  sports: Mishelle Horsey delights in toddler gymnastics sessions at the community center and cheers loudly for the local minor league baseball team, the River City Rovers, during family outings, and they
    balance energetic play with a love for team spirit.
  arts: Mishelle Horsey spends afternoons finger‑painting to the tunes of Raffi and dancing to the animated songs of Disney’s “Frozen,” eagerly memorizing the lyrics of “Let It Go,” and they reflect a vivid
    appreciation for music and visual art.
  travel: Mishelle Horsey enjoys weekend trips to the nearby lake where they collect seashells, and they dream of visiting the giant dinosaur exhibit at the city museum, preferring short drives with familiar
    toys packed in a small backpack.
  culinary: Mishelle Horsey favors creamy mac and cheese and banana slices, proudly scoops the cheese with a plastic fork, and occasionally insists on sprinkling a dash of cinnamon on their oatmeal, though
    they have a habit of dropping utensils onto the floor.
  core: Mishelle Horsey is a curious, organized two‑year‑old who juggles a love for art, playful leadership, and a knack for staying calm even when faced with messy meals or surprise doctor visits, and
    they approach each new experience with bright‑eyed enthusiasm.
background:
  cultural: Mishelle is raised in a Black family in Homerville, Georgia, where Southern hospitality and African-American cultural traditions intertwine. Her family celebrates community gatherings at church,
    where gospel music and rhythmic clapping shape her early love of sound. Family meals often feature Southern comfort foods, and she is introduced to cultural stories and folklore during bedtime. The
    close-knit neighborhood and church community provide her with a sense of belonging and reinforce values of respect, resilience, and togetherness.
attributes:
  skills: '["confident walking", "basic motor coordination", "simple vocabulary (about 200 words)", "matching colors and shapes", "clapping to rhythm", "pretend play (cooking, cleaning)", "basic problem
    solving (puzzle stacking)"]'
  hobbies: '["scribbling with crayons", "building block towers", "dancing to music", "exploring backyard nature", "listening to storytime", "playing with peers at the park"]'
  career_goals: Although still very young, Mishelle often talks about becoming a dancer who moves to music and an artist who fills the world with bright colors. She loves watching adults draw and sing,
    and she expresses a strong desire to "help mom make pretty pictures" and "dance on stage" when she grows up. Her caregivers nurture these early ambitions by providing crayons, dance music, and opportunities
    to perform for family.
