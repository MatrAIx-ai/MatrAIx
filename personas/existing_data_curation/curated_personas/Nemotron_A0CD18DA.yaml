personas:
  professional: Hoyt Rittgers, a 16‑year‑old aspiring automotive technician, couples a methodical hands‑on aptitude for car maintenance with a disciplined love of model kits and woodworking, applying meticulous
    note‑taking and strategic planning learned from strategy gaming to excel in the community youth workshop and prepare for a future apprenticeship.
  sports: Hoyt Rittgers enjoys weekend hikes along Wichita Mountains trails, follows the Oklahoma City Thunder and the Oklahoma State Cowboys football team, and is a member of the local Birdwatchers and
    Hikers Club that combines low‑impact fitness with wildlife observation.
  arts: Hoyt Rittgers channels creativity into detailed model kit assemblies, admires folk musician Bob Dylan, appreciates the realism of painter Andrew Wyeth, enjoys the cinematic scores of Hans Zimmer,
    and follows the storytelling of the tabletop‑RPG series Critical Role.
  travel: Hoyt Rittgers prefers low‑key nature excursions, having camped in Rocky Mountain National Park and driven historic Route 66 towns, while dreaming of a future road trip to Alaska’s Denali National
    Park to study wildlife and collect native flora for their garden.
  culinary: Hoyt Rittgers enjoys simple, home‑cooked meals, frequently grilling seasoned chicken thighs, whipping up a wildflower‑infused honey glaze for roasted carrots, and mastering classic deviled eggs
    with a dash of Dijon mustard and paprika.
  core: Hoyt Rittgers is a methodical teen who blends a love for precision crafts and strategic games with a disciplined, albeit sometimes overly skeptical, pursuit of a stable, service‑oriented future.
background:
  cultural: Hoyt grew up in a working‑class white family in Oklahoma City, shaped by Midwestern‑Southern values of hard work, self‑reliance, and community responsibility. His household is rooted in Protestant
    traditions, attending church services regularly and observing holidays with family gatherings, country music, and local fairs. The local culture emphasizes respect for law and order, which aligns with
    his competitive and structured personality. He is familiar with regional customs such as the State Fair, high school football games, and community service initiatives, all of which reinforce his organized
    and reliable nature.
attributes:
  skills: '[''Basic automotive repair'', ''Woodworking'', ''Computer troubleshooting'', ''Strategic gaming (video games and chess)'', ''Time management and planning'']'
  hobbies: '[''Model kit building'', ''Strategy video games (e.g., Civilization, StarCraft)'', ''Chess'', ''Woodworking projects'', ''Birdwatching and nature hikes'', ''Small group tabletop RPGs'']'
  career_goals: Hoyt plans to earn his GED within the next year and enroll in a vocational automotive apprenticeship program at a local community college. He is drawn to the clear structure and tangible
    outcomes of trade work and aims to become a certified mechanic. In the longer term, he sees himself joining the Oklahoma National Guard or a law‑enforcement agency, valuing the disciplined environment
    and the opportunity to serve his community. He is determined to achieve a stable, respectable career that rewards reliability and skill.
