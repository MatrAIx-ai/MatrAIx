personas:
  professional: Selfa Bustamante, a nursing assistant at a community health clinic, leverages their organized, methodical approach, bilingual fluency, and calm demeanor to excel in vital‑sign monitoring,
    wound care, and patient education; they actively seek ways to integrate art‑therapy concepts into care plans.
  sports: Selfa Bustamante enjoys weekend hikes in the nearby foothills, cycles regularly with the Lemoore Cycling Club, follows the Sacramento Kings in the NBA and the San Francisco Giants in MLB, and
    uses salsa and bachata classes as primary cardio workouts; they also play recreational volleyball during the summer.
  arts: Selfa Bustamante spends weekends exploring local galleries and mural tours, often pausing to photograph works by the street artist "The Fox" and installations by Yayoi Kusama, while drawing inspiration
    from Georgia O'Keeffe's bold color palettes for their own folk‑art canvases; they also attend live performances by the San Francisco Ballet and enjoy the rhythmic salsa tunes of Celia Cruz.
  travel: Selfa Bustamante balances detailed itineraries for overseas trips with spontaneous day‑trips for local adventures, having trekked the Sierra Nevada in Yosemite, spent a coastal weekend in Santa
    Barbara, and dreaming of wandering the mural‑laden streets of Barcelona and the historic plazas of Buenos Aires; they relish planning each journey around art and nature.
  culinary: Selfa Bustamante enjoys cooking traditional family dishes such as tamales and enchiladas, often experimenting with fusion twists like quinoa‑stuffed corn husks or mango‑infused salsa, and they
    are proficient with ingredients like corn masa, chipotle, cilantro, and avocado, regularly hosting dinner evenings for friends.
  core: Selfa Bustamante blends a diligent, organized work ethic with a vibrant, community‑oriented creative spirit, channeling curiosity into art, dance, and heritage cooking while staying financially
    savvy and health‑conscious, though they sometimes procrastinate on paperwork and overcommit to social events.
background:
  cultural: Selfa was raised in a bilingual Mexican‑American household in California; her parents immigrated from Jalisco and maintain strong ties to traditional customs such as Día de los Muertos, quinceañeras,
    and weekly family meals featuring mariachi music. Spanish is spoken at home, and she celebrates both Catholic and cultural festivals with her extended family and the local Mexican community. This upbringing
    instilled a deep sense of collectivism, respect for elders, and a commitment to service. Her cultural heritage influences her nursing practice through heightened cultural competence, an appreciation
    for holistic health perspectives, and a passion for using art as a therapeutic bridge between patients and caregivers.
attributes:
  skills: '[''Patient care'', ''Vital sign monitoring'', ''Wound cleaning and dressing'', ''Infection control'', ''Electronic medical record documentation'', ''Bilingual Spanish‑English communication'',
    ''Time‑management and scheduling'', ''Stress management'', ''Team collaboration'', ''Basic pharmacology knowledge'', ''Use of medical equipment (wheelchairs, lifts, ECG monitors)'', ''Patient education'']'
  hobbies: '[''Painting (folk‑art style)'', ''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Hiking in the Sierra Nevada foothills'', ''Cycling around Lemoore'', ''Photographing street art
    and nature'', ''Volunteering at community health fairs'', ''Reading contemporary fiction and science‑fiction'', ''Exploring Spanish poetry and folk music'']'
  career_goals: Selfa aims to transition from a nursing assistant to a registered nurse within the next three years by completing an associate degree in nursing and then pursuing a BSN program. She is especially
    interested in community health nursing, hoping to serve the underserved Hispanic population in the Central Valley. Long‑term, she envisions obtaining a certification in wound‑care or geriatric nursing
    and becoming a health educator who integrates art‑therapy techniques to improve patient well‑being. She also hopes to mentor other bilingual healthcare workers and advocate for culturally competent
    care policies.
