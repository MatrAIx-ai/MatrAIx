persona_description: A naval officer who served in the United States Navy during the American Civil War and played a significant role in the capture of Mobile, Alabama. He was appointed to the U.S. Military
  Academy at West Point in 1822, and later served in various capacities including Executive Officer of the Naval Asylum at Philadelphia, Commander of the Western Gulf Squadron, and Rear Admiral of the North
  Pacific Squadron. He was presented with a medal and made a Knight of the Order of Kamehameha I by King Kamehameha V of the Hawaiian Islands.
