persona_description: A materials scientist at Rutgers, The State University of New Jersey, who specializes in the creation of novel and easy-to-manufacture thin, crystal-like materials for electronic devices.
  The scientist has conducted research on the use of lead zirconate titanate (PZT) for various applications, including motion sensors, electrical capacitors, and vibration damping in high-performance skis
  and tennis racquets. The scientist has developed a technique to make PZT particles in a single-crystal-like structure, which could supplement today's tedious and exacting method of growing crystals with
  an additional benefit of producing materials in sizes and shapes not now possible. The scientist's research is focused on the fabrication of materials with unique shapes and properties, which could lead
  to new applications in sensing, imaging, and energy storage.
