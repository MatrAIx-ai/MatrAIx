personas:
  professional: Carlos Cardel is a 20‑year‑old call‑center agent who fuses a strong preference for routine call scripts with an instinctive willingness to improvise, using their sociable, talkative nature
    to build rapport in both English and Spanish while eyeing a team‑lead role within two years.
  sports: Carlos Cardel is a regular at the Mecklenburg County pickup basketball courts, playing with the Charlotte Hoops Collective, and fuels their competitive streak by following the New York Yankees
    each season and attending Charlotte Knights games whenever possible.
  arts: Carlos Cardel immerses themselves in Latin urban beats from Bad Bunny, J Balvin, and Romeo Santos while dancing merengue and bachata at Club Rhythm, and they showcase a flair for performance during
    karaoke nights where they belt out classics by Shakira and Luis Fonsi.
  travel: Carlos Cardel prefers spontaneous weekend road trips from Charlotte to Asheville’s craft‑brew scene or a quick flight to New York City for a Yankees game, yet they also schedule annual summer
    visits to Miami’s vibrant cultural festivals to soak in music and street food.
  culinary: Carlos Cardel cooks traditional dishes like mangú and sancocho with a modest yet confident skill set, loves balancing the creamy mashed plantains with a side of fried cheese and a splash of
    cilantro, and they frequently explore Charlotte’s food‑truck scene for adobo‑marinated pork tacos and fresh guava pastries.
  core: Carlos Cardel is a 20‑year‑old social dynamo who thrives on the balance between scripted call‑center routines and impromptu karaoke marathons, and they often juggle a disciplined budget with occasional
    splurges on late‑night eats and spontaneous road trips.
background:
  cultural: Carlos is a second‑generation Dominican‑American. His family maintains strong ties to the Dominican Republic, preserving traditions such as weekly family meals featuring mangú, celebrating Carnaval
    and Dominican Independence Day, and speaking Spanish at home. He grew up in Charlotte’s Latino community, attending a vibrant Caribbean church and participating in local Dominican cultural events. This
    heritage instills values of family loyalty, respect for elders, and a love for music, dance, and communal gatherings.
