  career_goals: Carlos aims to advance to a team lead role within his call center over the next two to three years, focusing on mentoring new agents and improving performance metrics. He plans to enroll
    in evening courses to earn an associate’s degree in Business Administration, eventually pursuing a bachelor’s degree. In the long term, he aspires to become a Customer Experience Manager or to launch
    his own small business, such as a Dominican‑style food truck, where he can combine his practical skills with his love for community and culture.
