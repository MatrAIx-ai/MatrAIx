personas:
  professional: Miguel Vega, a curious five‑year‑old, spends mornings arranging their LEGO bricks in tidy rows before letting a spontaneous burst of imagination turn the set into a wild castle battle, and
    they demonstrate an early knack for balancing structure with creativity and a cooperative spirit.
  sports: Miguel Vega kicks around with the Ventura Junior Soccer League in spring, cheers loudly for the Los Angeles Dodgers during baseball season, and splashes in weekly swimming lessons at the community
    pool, and they embrace both team spirit and carefree play.
  arts: Miguel Vega delights in painting bright calavera masks during Día de los Muertos crafts, dances to Shakira’s upbeat songs, and watches Disney’s 'Moana' for inspiration, and they find a love for
    colorful, lively artistic expression.
  travel: Miguel Vega loves family road trips to the San Diego Zoo and weekend beach days at Ventura, collects stickers on a travel map for each destination, and dreams of seeing the pyramids of Teotihuacan
    someday, and they prefer familiar routines mixed with bursts of adventure.
  culinary: Miguel Vega enjoys cheesy quesadillas topped with homemade guacamole made from ripe avocados, diced tomatoes, and a squeeze of lime, and they proudly mix pancake batter with a tiny wooden spoon,
    showing a budding taste for both Mexican flavors and classic breakfast fare.
  core: Miguel Vega balances a love for orderly play with bursts of spontaneous imagination, worries over tiny details like missing puzzle pieces, and they can be both a gentle peacemaker and a determined
    collector of shiny toys.
background:
  cultural: Miguel grows up in a Mexican‑American household in Ventura, California. His family celebrates traditions such as Día de los Muertos and Las Posadas, incorporating Spanish language, music, and
    food into daily life. He speaks Spanish at home and learns English at preschool, resulting in a bilingual environment that enriches his cultural identity. Community gatherings at the local church and
    neighborhood festivals expose him to a mix of Mexican customs and Southern California lifestyle, fostering a sense of belonging to both cultures while maintaining respect for his heritage.
