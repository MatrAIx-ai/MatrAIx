  career_goals: At five, Miguel's aspirations are shaped by his desire to help others and his fascination with community roles. He often says he wants to become a firefighter because he admires how they
    protect people, and he also dreams of being a teacher one day, inspired by his preschool teachers who make learning fun and safe. These goals reflect his practical focus on immediate realities—wanting
    to be someone who can make a tangible difference in his neighborhood—while his spontaneous side fuels imaginative fantasies of superhero rescues.
