personas:
  professional: Sue Besser is a retired K‑12 teacher and curriculum specialist whose methodical planning and love of structure translate into meticulous curriculum design, data‑driven assessment, and community
    workshops that they now mentor emerging educators through, while their competitive yet skeptical nature fuels strategic bridge play and precise garden layouts.
  sports: Sue Besser gets their exercise from daily Hudson River walks with the local senior walking club, supports the New York Yankees during baseball season, and treats bridge tournaments as a mental
    sport, while also joining a monthly senior bowling night at the riverfront alley.
  arts: Sue Besser channels their love for patterns into quilting inspired by the geometric works of Agnes Martin, enjoys reading biographies by Doris Kearns Goodwin, listens to Beethoven symphonies and
    the Boston Symphony Orchestra, and attends local theater productions of classic plays such as Arthur Miller’s 'Death of a Salesman.'
  travel: Sue Besser prefers carefully planned, low‑stress trips that blend genealogy research and historic sightseeing, having visited Boston’s Freedom Trail, the colonial town of Williamsburg, and Dublin
    to trace their ancestors, while dreaming of a quiet New England fall retreat in Cape Cod.
  culinary: Sue Besser, an adept home cook, delights in classic New England fare like clam chowder, baked apple pie with cinnamon, lobster rolls, and cornbread topped with maple syrup, often garnishing
    dishes with fresh rosemary and thyme harvested from their garden, and they enjoy occasional potluck evenings where they showcase hand‑stitched quilt‑themed cake decorations.
  core: Sue Besser blends a lifelong love of order, quiet competition, and community service into a methodical, slightly skeptical but steadfast presence that keeps both their garden and their mentees perfectly
    aligned.
background:
  cultural: Sue Diane Besser grew up in a mid‑20th‑century white, middle‑class family in upstate New York. Her cultural roots are grounded in the Protestant (Methodist) traditions common to the region,
    emphasizing self‑reliance, community service, and the value of education. The suburban culture of the Hudson Valley shaped her appreciation for orderly, structured environments, while the local emphasis
    on civic engagement fostered a lifelong commitment to volunteering and mentorship. Her upbringing reflected the modest, pragmatic ethos of post‑war America, informing her practical worldview, competitive
    drive, and preference for structured, predictable routines.
attributes:
  skills: '[''curriculum development'', ''classroom instruction'', ''student assessment'', ''educational program evaluation'', ''project planning'', ''budget management'', ''community outreach'', ''genealogy
