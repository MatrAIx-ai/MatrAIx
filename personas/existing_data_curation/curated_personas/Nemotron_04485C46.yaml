personas:
  professional: Cynthia Woods, a seasoned nonprofit strategist and business consultant, leverages their graduate business training, meticulous planning, and charismatic public speaking to mentor emerging
    entrepreneurs in Montgomery, while curating community art exhibitions that blend fiscal discipline with creative vision.
  sports: Cynthia Woods avidly follows the Alabama Crimson Tide football team and the Atlanta Falcons, attends occasional Montgomery Biscuits minor‑league baseball games, and they sustain mental sharpness
    by playing bridge at the Montgomery Bridge Club three nights a week.
  arts: Cynthia Woods, an abstract painter who curates pop‑up exhibitions, draws inspiration from Mark Rothko’s color fields, Yayoi Kusama’s immersive installations, and local muralist James Mitchell, and
    they discuss speculative novels like William Gibson’s Neuromancer and Ursula K. Le Guin’s The Left Hand of Darkness in a weekly book club.
  travel: Cynthia Woods enjoys cultural pilgrimages, having toured the historic districts of Charleston and Savannah, experienced New Orleans’ Mardi Gras, and explored the Smithsonian museums in Washington,
    DC, while they dream of attending the Fez Festival of World Sacred Music in Morocco.
  culinary: Cynthia Woods delights in cooking soulful Southern fare such as shrimp and grits, smoked collard greens, and fried chicken, often adding creative twists like pomegranate molasses glazes or smoked
    paprika rubs, and they proudly grow heirloom tomatoes and okra in their garden to incorporate fresh, home‑grown ingredients.
  core: Cynthia Woods blends sharp business acumen with boundless artistic curiosity, channeling their organized, sociable, and resilient nature into community mentorship, vibrant art projects, and a pantry
    of inventive Southern dishes.
background:
  cultural: Born in 1955 and raised in Montgomery, Alabama, Cynthia grew up amid the civil‑rights movement, with her parents active in church and local activism. Her familial heritage traces back to the
    Great Migration, blending rural Southern traditions with the vibrant Black community of Montgomery County. She carries the legacy of gospel music, Southern soul food, and oral storytelling, which shape
    her worldview and artistic sensibilities. As a Black woman who navigated both the challenges and triumphs of the era, Cynthia values resilience, communal solidarity, and the preservation of African‑American
    history, infusing these principles into her mentorship, community work, and creative pursuits.
