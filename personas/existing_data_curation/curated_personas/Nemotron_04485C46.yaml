  career_goals: Cynthia aims to channel her experience into shaping the next generation of Black entrepreneurs in Montgomery, establishing a mentorship program and a small consultancy that offers pro‑bono
    strategic advice to local nonprofits. She envisions founding a community arts center that showcases African‑American artists and serves as a hub for creative workshops. Additionally, she plans to author
    a memoir chronicling her life through the civil‑rights era, preserving oral histories and inspiring resilience. Her long‑term ambition is to create a scholarship fund for under‑represented students
    pursuing business and the arts.
