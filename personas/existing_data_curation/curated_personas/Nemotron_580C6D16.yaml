personas:
  professional: Kyriaki Wilson, a seasoned community humanities facilitator, leverages her sharp analytical eye and persuasive communication to lead book clubs and oral‑history projects, while her relaxed
    approach to scheduling lets meetings drift organically, though she can be fiercely competitive about the quality of discourse.
  sports: Kyriaki Wilson, an avid member of the Finger Lakes Hiking Club, tackles the region’s rolling trails each spring and autumn, occasionally joins the Ithaca College Bombers’ community fun runs, and
    keeps a soft spot for cheering the Buffalo Bills on Sundays, though they prefer low‑impact walks over high‑intensity workouts.
  arts: Kyriaki Wilson delights in community theater productions of Ibsen and Greek‑inspired plays, while evenings often feature listening to Leonard Cohen and Maria Callas, and they regularly curate art‑history
    discussions that reference Van Gogh’s ‘Starry Night’ and the frescoes of the Sistine Chapel.
  travel: Kyriaki Wilson prefers carefully organized day trips to historic towns like Cooperstown and the Hudson Valley, but dreams of a leisurely Mediterranean cruise that stops in Crete and the Amalfi
    Coast, balancing a love of genealogy research with a yearning to trace ancestral roots abroad.
  culinary: Kyriaki Wilson is a confident home chef who whips up Mediterranean lamb with rosemary, tzatziki, and preserved lemons alongside New England clam chowder, favoring olive oil, fresh herbs, and
    locally foraged mushrooms from their garden, and they often host potlucks where the centerpiece is their signature spanakopita.
  core: Kyriaki Wilson is a curious yet scatter‑brained community sage whose love of literary debate is rivaled only by their habit of misplacing reading glasses during meetings.
background:
  cultural: Kyriaki’s family background blends Greek ancestry with several generations of American upbringing in the Northeastern United States. Her grandparents emigrated from Greece in the early 20th
    century, bringing traditions of Orthodox celebrations, Mediterranean cuisine, and a strong emphasis on education. Growing up in the rural environs of Tompkins County, she absorbed the values of community
    involvement and an appreciation for the natural landscape. She identifies with both her Greek heritage—celebrating name days and cooking traditional dishes—and the broader American small‑town culture
    of Brooktondale, which emphasizes neighborly support and local history.
