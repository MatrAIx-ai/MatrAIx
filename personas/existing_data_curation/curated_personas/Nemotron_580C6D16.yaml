  career_goals: Kyriaki aims to translate her lifelong love of the humanities into meaningful volunteer work. She aspires to become a regular speaker in the Brooktondale library’s adult education series,
    mentor younger community members interested in literature and art, and document the town’s oral histories for a forthcoming local heritage book. She also hopes to establish and nurture a community garden
    that blends her gardening expertise with social interaction. On a personal level, she seeks to enhance her digital literacy—learning basic coding for archival work—and to adopt regular mindfulness practices
    to better manage stress and worry.
