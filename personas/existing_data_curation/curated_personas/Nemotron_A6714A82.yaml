  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading historical and philosophical literature'', ''Writing poetry and memoir'', ''Gardening tropical plants'', ''Vietnamese cooking and
    culinary experimentation'', ''Morning beach walks'', ''Quiet visits to art galleries'', ''Listening to jazz and classical music'']'
  career_goals: Although retired from formal employment, Vien is driven by a desire to leave a meaningful legacy. He aims to compile a memoir that chronicles his immigration journey, the evolution of his
    family, and reflections on cultural identity, hoping it will inspire younger generations. He plans to curate a small exhibition of his watercolor paintings and photographs at the local community center,
    showcasing his unique perspective on nature and suburban life. Additionally, he aspires to mentor younger members of the Vietnamese community in navigating financial independence and digital tools,
    offering workshops on budgeting and basic computer skills. Continuing his love of learning, he intends to master tablet‑based digital art and explore new photographic techniques that capture the quiet
    beauty of Pompano Beach’s sunrise vistas.
