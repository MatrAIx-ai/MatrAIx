persona_description: A researcher who is interested in the impact of climate change on key food crops in Africa and South Asia, and is concerned about the lack of knowledge about the impact of climate change
  on certain crops and regions. They are aware of the importance of synthesizing best available evidence for policy decisions and are looking for ways to ensure that the evidence is gathered as much as
  possible before making decisions on how to move forward. They are also aware of the "Climate Himalaya" initiative and its work on knowledge sharing, capacity building, and climatic adaptation aspects
  in the Himalayan region of South Asia.
