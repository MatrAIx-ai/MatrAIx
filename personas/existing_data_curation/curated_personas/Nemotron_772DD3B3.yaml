  career_goals: Jon aims to transition from his current specialist role to a senior operations analyst position within the next three years, followed by an operations manager role. He plans to earn a Six
    Sigma Green Belt and APICS certification to deepen his expertise in process improvement and supply chain management. Long‑term, he envisions creating a boutique consultancy that fuses business efficiency
    with artistic design thinking, helping companies innovate their operations while fostering a culture of curiosity and creative problem‑solving. He also hopes to leverage his love of art by collaborating
    on projects that integrate visual storytelling into corporate training and brand development.
