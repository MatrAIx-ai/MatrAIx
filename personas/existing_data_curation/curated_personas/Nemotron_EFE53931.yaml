personas:
  professional: Flor Perez is a budding visual storyteller who spends hours sketching bright, patterned illustrations that echo the rhythmic beats of family gatherings, channeling their curious and relaxed
    nature into a playful, unstructured creative process that values imagination over schedule.
  sports: Flor Perez delights in weekend soccer matches with the Little Kickers Club, splashes through the community pool during summer, roots for the River City Runners baseball team, and, after watching
    FC Barcelona games on family TV, they often chant the team's anthem with friends.
  arts: Flor Perez channels their love for bright colors into detailed drawings inspired by Frida Kahlo's bold patterns and Van Gogh's swirling skies, while singing along to Ricky Martin, Shakira, and Daddy
    Yankee during family gatherings, and watches Disney's animated classics for storytelling ideas.
  travel: Flor Perez prefers spontaneous day trips, like exploring the local botanical garden or building forts on the beach during family vacations, yet dreams of trekking the misty rainforests of Costa
    Rica and riding a ferry to the Bahamas, balancing their love of adventure with a relaxed, unplanned itinerary.
  culinary: Flor Perez loves helping in the kitchen, eagerly stirring the simmering arroz con gandules, sprinkling chopped cilantro, and mastering the art of folding fresh mango salsa, while proudly decorating
    cupcakes with rainbow frosting and rainbow sprinkles.
  core: Flor Perez is a curious, color-obsessed 7-year-old who blends artistic chaos with gentle kindness, frequently misplacing coins from their piggy bank while dreaming up vivid worlds on paper.
background:
  cultural: Flor is raised in a close‑knit Puerto Rican family in Bayamón, a city known for its lively fiestas, colorful murals, and vibrant community spirit. Her household blends Spanish and English, and
    everyday life includes listening to reggaetón and salsa, celebrating the patron saint festival with parades and food, and participating in traditional holidays like Navidad and Semana Santa. Family
    meals feature staples such as arroz con gandules, empanadillas, and tropical fruits, and she often helps prepare them. The rich musical heritage, the love for baseball and basketball, and the island's
    natural beauty shape her worldview, fostering a deep appreciation for cultural pride, community harmony, and creative expression.
attributes:
  skills: '[''Reading fluency (Spanish & English)'', ''Basic addition/subtraction'', ''Storytelling'', ''Drawing and painting'', ''Bilingual communication'', ''Collaborative play'', ''Empathy and conflict
    resolution'']'
  hobbies: '[''Drawing and painting'', ''Singing and dancing to salsa/merengue/reggaetón'', ''Reading picture books'', ''Exploring local parks and nature'', ''Imaginative fort building'', ''Helping with
    family cooking'', ''Collecting shells and leaves'']'
  career_goals: Flor dreams of growing up as someone who creates and shares beauty. She often imagines becoming a painter who captures the bright streets and festivals of Bayamón, or a teacher who uses
    art and music to inspire younger children. Her ambition is to combine creativity with kindness, helping others feel seen and appreciated while preserving the colorful spirit of her community.
