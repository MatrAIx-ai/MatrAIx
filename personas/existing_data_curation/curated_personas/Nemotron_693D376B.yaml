personas:
  professional: Nicholas Bellotte, a senior automotive service technician with over three decades of hands‑on expertise in gasoline, diesel, hybrid and emerging electric powertrains, leverages his curiosity‑driven
    tinkering and competitive nature to excel at complex engine rebuilds, transmission overhauls, and advanced diagnostics, while they maintain meticulous shop organization and mentor apprentices toward
    ASE Master Technician status.
  sports: Nicholas Bellotte, a die‑hard Iowa Hawkeyes football and basketball fan and loyal supporter of his hometown high‑school Tigers, spends Saturday mornings fishing on Lake Red Rock, paddles with
    the local kayaking club in the summer, maintains their fitness with weight‑lifting sessions at the community gym, and they cheerfully attend Des Moines Menace soccer matches, though they often skip
    cardio workouts in favor of a post‑game barbecue.
  arts: Nicholas Bellotte channels their artistic side through meticulous woodworking and custom car fabrication, while nurturing a nostalgic love for classic rock legends like The Eagles, Tom Petty, and
    Lynyrd Skynyrd, enjoys attending the local community theater’s productions of ‘Our Town’, and they unwind with automotive documentaries narrated by Jeremy Clarkson, occasionally dabbling in sketching
    vintage car designs.
  travel: Nicholas Bellotte prefers road‑trip adventures that blend auto‑culture and nature, meticulously planning routes to iconic events such as the Goodwood Festival of Speed in the United Kingdom, the
    North American International Auto Show in Detroit, and seasonal fishing expeditions to Montana’s Flathead Lake, while they balance family commitments that keep most vacations within a five‑hour drive
    of their Iowa home.
  culinary: Nicholas Bellotte, a grill master with intermediate cooking chops, delights in smoking Kansas City‑style ribs, grilling Iowa pork tenderloin marinated in apple cider vinaigrette, and crafting
    a homemade bourbon‑infused barbecue sauce, and they have a penchant for over‑seasoning and occasional over‑cooking that sometimes leaves guests reaching for the water.
  core: Nicholas Bellotte blends relentless curiosity for automotive tech with a stubborn competitive streak, spending weekends elbows‑deep in wood shavings or engine blocks, habitually debating the merits
    of diesel versus electric powertrains until the data convinces them, and they never miss a chance to fire up the grill for a neighborhood barbecue.
background:
  cultural: Nicholas grew up in a small farming community in central Iowa, raised in a family of German and Irish ancestry. The Midwestern values of hard work, modesty, and community service shaped his
    outlook. He was taught the importance of self-reliance, punctuality, and practicality while also enjoying the close-knit social fabric of town life, including church gatherings, county fairs, and basketball
    games. The region's strong agricultural and automotive heritage fostered his early interest in machinery, leading him to pursue a hands-on trade. As a lifelong resident of Marion, he maintains deep
    ties to local traditions, such as the annual county fair, community service through the local veterans' association, and a strong sense of civic pride. He identifies as a white Midwesterner, balancing
    a respect for his ethnic roots with an inclusive, neighborly outlook.
attributes:
  skills: '[''Automotive diagnostics (OBD-II and advanced scan tools)'', ''Engine repair and rebuilding'', ''Transmission repair and rebuilding'', ''Hybrid and electric vehicle powertrain servicing'', ''Electrical
    system troubleshooting'', ''HVAC (heating, ventilation, air conditioning) repair'', ''Brake and suspension maintenance'', ''Metal fabrication and welding'', ''Preventive maintenance scheduling'', ''Emissions
    testing and compliance'', ''Parts ordering and inventory management'', ''Customer service and communication'', ''Team leadership and apprentice mentorship'', ''Workshop safety training'', ''Use of diagnostic
    software and technical service bulletins'']'
  hobbies: '[''Classic-car club participation'', ''Attending car shows and restoration contests'', ''Fishing and kayaking'', ''Woodworking and building custom car parts'', ''Grilling and hosting backyard
    barbecues'', ''Supporting local high-school sports and Iowa Hawkeyes'', ''Volunteering at county fair safe-driving booth'', ''Reading automotive trade publications'', ''DIY electric-vehicle conversion
    projects'', ''Mentoring youth in vocational programs'', ''Playing darts or pool at the local bar'']'
  career_goals: Nicholas aims to transition from the hands-on technician role to a leadership position within the next five years, targeting a service manager or shop foreman role at a regional dealership
    or multi-site garage. He plans to achieve ASE Master Technician certification and to deepen his expertise in electric vehicle systems, positioning himself as a go-to specialist for next-generation automotive
    technology. Beyond the shop, he envisions developing a weekend mobile repair service focused on classic car restoration and offering community workshops that teach basic vehicle maintenance to high
    school students. Ultimately, Nicholas hopes to retire with a small, profitable repair side business that reflects his love for cars and his commitment to mentoring the next generation of mechanics.
