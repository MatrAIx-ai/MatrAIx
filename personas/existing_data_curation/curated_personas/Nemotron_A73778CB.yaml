personas:
  professional: Iyad, a budding teenage robotics enthusiast who spends weekends tinkering with Arduino kits, blends their natural curiosity with practical problem‑solving, using meticulous organization
    to document each prototype while remaining flexible enough to pivot when a circuit misbehaves, and often asserts their ideas during school engineering club meetings while still listening to teammates.
  sports: Iyad, a member of their middle school’s cross‑country team who loves hiking modest trails around Temecula, combines low‑key cardio workouts with weekend viewings of the Los Angeles Dodgers and
    the LA Lakers, and prefers solo bike rides to crowded gym sessions.
  arts: Iyad, an avid digital illustrator who frequently sketches fan art of characters from 'The Lord of the Rings' and listens to the soundtracks of Hans Zimmer while strumming acoustic renditions of
    Taylor Swift’s 'All Too Well', finds calm in solitary creativity that also fuels their strategic gaming mindset.
  travel: Iyad, who plans trips with their family using a combination of school‑assigned field trips and weekend road‑trips, has explored the Redwood National Forest and the historic missions of San Juan Capistrano,
    but they dream of backpacking through the Japanese Alps to experience both serene nature and futuristic tech culture.
  culinary: Iyad, a modest home‑cook who enjoys crafting homemade pepperoni pizza with fresh mozzarella and basil, often experiments with easy ramen bowls featuring soy‑sauce broth, soft‑boiled eggs, and
    sliced pork belly, yet they sometimes grab sugary snack packs from the school vending machine when stress spikes.
  core: Iyad, a thoughtful teen who thrives on solitary projects, worries about every detail, occasionally over‑spends on gaming gear, and can’t resist a late‑night guitar jam before bedtime.
background:
  cultural: 'Iyad grows up in a middle‑class white family in suburban Temecula, Southern California. His upbringing reflects typical American suburban values: emphasis on education, involvement in community
    activities, and appreciation for outdoor recreation. The region''s blend of agricultural heritage and growing tech influences adds exposure to both traditional and modern cultural elements. He participates
    in school clubs and local community events, and his family celebrates common holidays such as Thanksgiving and Independence Day while respecting the cultural diversity of Riverside County.'
