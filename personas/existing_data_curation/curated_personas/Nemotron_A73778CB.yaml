  career_goals: Iyad aspires to attend a STEM‑focused high school and eventually study computer engineering or robotics at a university. He hopes to become a software or robotics engineer, creating practical
    technology solutions that improve everyday life. In the short term, he aims to deepen his programming skills, earn certifications in introductory coding, and participate in regional robotics competitions.
    He also wants to develop coping strategies for stress, such as journaling and mindfulness, to maintain his mental well‑being while pursuing ambitious academic goals.
