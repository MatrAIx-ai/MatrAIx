personas:
  professional: Nicole Sittig, a 98‑year‑old emeritus vascular and trauma surgeon, blends six decades of open and minimally invasive expertise with a steadfast devotion to evidence‑based routines and an
    improvisational flair for intra‑operative challenges, while they channel their outgoing, compassionate nature into mentoring residents, designing surgical curricula, and orchestrating free community
    health screenings.
  sports: Nicole Sittig, who enjoys low‑impact fitness like daily waterfront walks with friends, occasional senior‑center tai chi sessions, and cheering from the stands at Seattle Seahawks games while supporting
    the Bellingham minor‑league baseball team, they maintain a pragmatic, routine‑oriented exercise regimen that balances social energy with modest physical demands.
  arts: Nicole Sittig, a lifelong devotee of classic mysteries such as Agatha Christie’s 'Murder on the Orient Express', a member of the community choir that frequently performs Beatles ballads like 'Yesterday',
    and an avid viewer of Ken Burns historical documentaries, they weave their love of storytelling, music, and craft together by knitting scarves while humming Ella Fitzgerald standards during quiet evenings.
  travel: Nicole Sittig, who prefers well‑planned, low‑stress itineraries and often travels with her bridge club, they cherish memories of a 1970s road trip along the Pacific Coast Highway, a recent serene
    cruise to Alaska’s Inside Passage, and still hope to join a guided senior tour of Kyoto’s historic gardens when health permits.
  culinary: Nicole Sittig, an adept home cook who relishes preparing garden‑fresh ratatouille with heirloom tomatoes, zucchini, and basil, as well as a signature baked salmon with dill and lemon, they blend
    a love of routine recipes with occasional experimental twists inspired by the seasonal produce they tend for neighborhood potlucks.
  core: Nicole Sittig, the 98‑year‑old surgical legend who still forgets to water her indoor fern but never misses a bridge game, they blend a regimented love of routine with spontaneous generosity that
    fuels her community garden, choir, and mentorship.
background:
  cultural: Nicole grew up in the post‑World War II Pacific Northwest within a white, middle‑class family that prized hard work, community service, and modest living. Her upbringing reflected the region’s
    blend of Scandinavian‑American heritage and a Protestant work ethic, emphasizing self‑reliance, respect for nature, and civic responsibility. She attended public schools in Bellingham and earned a STEM
    degree at the University of Washington before pursuing medicine. Nicole’s cultural identity is rooted in the traditions of the Northwest—outdoor recreation, seasonal festivals, and a strong sense of
    local community—while also being shaped by the collaborative, service‑oriented culture of academic medicine.
attributes:
  skills: '[''General Surgery'', ''Vascular Surgery'', ''Trauma Surgery'', ''Open Surgical Techniques'', ''Minimally Invasive Laparoscopic Procedures'', ''Pre-operative Patient Assessment'', ''Post-operative
