  hobbies: '[''Community vegetable gardening'', ''Bridge card game'', ''Local book club (classic mysteries)'', ''Community choir singing'', ''Waterfront walking with friends'', ''Volunteering at senior
    center (cooking classes)'', ''Knitting for patients'', ''Watching historical documentaries'']'
  career_goals: Despite her advanced age, Nicole remains driven to leave a lasting legacy in medicine. She aims to establish a scholarship for medical students from under‑represented backgrounds in Whatcom
    County, continue mentoring residents through monthly case conferences, and publish a memoir chronicling the evolution of surgical practice over the past 70 years. Nicole also seeks to influence local
    health policy by advocating for improved elder‑care protocols within the regional hospital system and to serve on the state surgical board to promote patient‑centered care.
