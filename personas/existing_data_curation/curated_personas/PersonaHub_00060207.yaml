persona_description: A Nigerian writer, activist, and environmentalist who fought against the environmental damage caused by Anglo-Dutch oil company Royal Dutch/Shell in his native Rivers state, Nigeria.
  Known for his outspoken criticism of the military regime and the company's destructive impact on the Niger delta region. His work drew international attention to the plight of the Ogoni people and he
  was executed in 1995 for his activism.
