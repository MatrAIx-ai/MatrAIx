    to big‑band music'']'
  career_goals: Although retired from formal employment, Michelle aims to stay actively involved in her community by mentoring new teachers, leading volunteer tutoring sessions at the local library, and
    supporting the senior center’s activity programs. She hopes to complete a memoir that captures her teaching experiences and the history of Ford City, and she plans to learn more advanced digital tools
    to facilitate virtual tutoring for grandchildren and neighborhood youth. Maintaining her health and independence, she also aspires to pass down family recipes and gardening knowledge to the next generation.
