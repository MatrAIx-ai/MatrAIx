  career_goals: Although she is no longer employed, Rachel aims to deepen her involvement in community service. She hopes to lead a weekly outreach program that delivers groceries and companionship to homebound
    seniors in Chester County, and to document local oral histories as a volunteer archivist for the West Chester Historical Society. Additionally, she wishes to complete a memoir that captures her family's
    multigenerational stories and the cultural heritage of the area.
