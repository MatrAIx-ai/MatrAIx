persona_description: A person who is closely involved with diabetes management, especially in the use of insulin and sulfonylurea and meglitinide drugs. They are aware of the risks and benefits of these
  treatments, and are trained in the prevention and management of low blood glucose levels. They are also interested in improving their own awareness of low blood glucose and have used training programs
  to help with this. They have experience with the use of glucose tabs, gel, or drinks to treat low blood glucose levels, and are familiar with the symptoms of low blood glucose.
