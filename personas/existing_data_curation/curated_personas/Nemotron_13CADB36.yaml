  career_goals: Elaine aims to transition from a senior developer role into a technical architect position where she can shape innovative, art-centric software products. She aspires to lead a small, agile
    team that develops experimental interactive experiences - such as generative art installations or indie games - that blend technology with visual storytelling. Over the next five years she plans to
    launch her own boutique studio focused on creative tech, leveraging her deep technical expertise while maintaining the freedom to explore unconventional ideas. Mentoring junior developers and contributing
    to open-source projects that push the boundaries of creative coding are also central to her long-term ambition.
