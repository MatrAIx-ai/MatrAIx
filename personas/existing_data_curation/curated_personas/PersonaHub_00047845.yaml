persona_description: A multidisciplinary team of experts in science, education, and gender equality, who are passionate about promoting gender inclusivity in STEM education through innovative and inclusive
  activities. They are interested in bringing together schools, science museums, research institutes, and industries to develop pilot activities and disseminate a modular toolkit of engaging teenagers in
  STEM in a gender-inclusive way. They are committed to ensuring the actions are best adapted for a wide range of European countries and contexts, and for the various types of stakeholders.
