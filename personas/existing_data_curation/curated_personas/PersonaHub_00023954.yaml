persona_description: A scientist who is interested in the study of extraterrestrial life and the possibility of life existing on other planets. They have a deep understanding of astrogeology, including
  the study of planetary habitability and the potential for life on Mars, Europa, and Titan. They are also familiar with the fossil record and the potential for life to exist in regions like the Pilbara
  in Western Australia and the McMurdo Dry Valleys of Antarctica. They have a background in paleontology and have conducted research on the search for life on other planets. They are currently pursuing
  a degree in astrobiology at the University of Glamorgan, UK, and are involved in the NASA Astrobiology Institute.
