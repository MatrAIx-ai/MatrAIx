  career_goals: Jacob aims to advance from his current managerial role to a senior management position, ultimately becoming a director of operations within the next five years. He plans to earn an MBA to
    deepen his strategic and financial expertise, while spearheading innovative, cross‑functional initiatives that blend operational excellence with creative product development. In the longer term, Jacob
    envisions launching his own boutique consulting firm that helps mid‑size Texas companies adopt design‑thinking methodologies to improve efficiency and market differentiation. He is also motivated to
    mentor emerging leaders in his community, fostering a culture of disciplined creativity.
