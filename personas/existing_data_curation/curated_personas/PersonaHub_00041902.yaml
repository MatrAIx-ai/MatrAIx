persona_description: A scientist or researcher who specializes in climate change impacts on the ocean, particularly in understanding the sources of uncertainties in global and regional climate change impact
  projections, including projections on the impacts of acidification, warming, deoxygenation and changes in ocean productivity. This persona is interested in conducting research and evaluating the relative
  importance of uncertainties in projections of potential ocean ecosystem stressors as a function of projection lead-time and spatial scale, and assessing the critical importance of policy decisions on
  carbon emissions and model uncertainty in making robust projections of these potential stressors. This persona is also interested in understanding the regional importance of model uncertainty and internal
  variability in evaluating regional marine resource impacts.
