  career_goals: Although retired from formal employment, Tiffany is driven to deepen her impact in the Macon community. She aims to launch a senior‑to‑youth mentorship program that pairs retirees with local
    high‑school students for life‑skills workshops. She also hopes to lead a collaborative community‑garden project on the grounds of the local church, preserving heirloom varieties and teaching sustainable
    gardening. Another ambition is to document oral histories of the African‑American elders in Twiggs County, culminating in a small published anthology. Tiffany envisions serving on the board of a regional
    nonprofit focused on elder care and cultural preservation, and she plans to travel to visit family in Florida and explore genealogy archives in Atlanta.
