  career_goals: Even in retirement, Elinette is driven to leave a lasting legacy for her tribe and community. She aims to create a digital archive of Cherokee oral histories, mentoring a small group of
    student teachers to integrate Indigenous perspectives into the local school curriculum. She hopes to serve as a cultural advisor to the Sequoyah County school district, ensuring that tribal history
    and language are represented in classroom materials. Additionally, she aspires to compile her memoirs—blending personal anecdotes, historical reflections, and lessons learned—into a self‑published manuscript
    that can be used as a teaching tool for future generations. Maintaining her health, managing stress, and continuing her volunteer work at the community arts center are also central to her ambitions.
