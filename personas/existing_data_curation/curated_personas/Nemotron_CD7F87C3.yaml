  career_goals: Luis aims to achieve Master Electrician licensure within the next two years, leveraging his curiosity for renewable energy to expand his services into solar and energy‑efficiency projects
    for homeowners in Round Rock. He aspires to open a small, family‑run contracting business that emphasizes reliable, high‑quality work while providing training opportunities for local youth. Balancing
    his practical nature with his desire for stability, Luis also seeks certification in advanced smart‑home technologies to stay competitive and reduce the anxiety he sometimes feels about industry changes.
    Long‑term, he hopes to become a respected community resource for safe, sustainable electrical solutions, ensuring financial security for his family while maintaining a manageable workload that respects
    his emotional well‑being.
