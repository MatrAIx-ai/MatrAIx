personas:
  professional: Luis Peraza, a veteran electrician with over three decades of residential and commercial wiring expertise, merges a safety‑first mindset with a restless curiosity for solar and smart‑home
    tech, which drives his meticulous code compliance while passionately mentoring apprentices despite occasional bouts of anxiety about industry shifts.
  sports: Luis Peraza, a devoted Dallas Cowboys fan and occasional Texas Rangers season ticket holder, spends Saturday mornings casting lines with the Round Rock Anglers Association at Lake Travis, preferring
    low‑impact cardio like brisk walks and weekend fishing trips over high‑intensity gym workouts, which he balances with occasional community softball games at the local church.
  arts: Luis Peraza immerses himself in the rhythms of classic salsa legends like Celia Cruz, Hector Lavoe, and the Buena Vista Social Club, often attending local Latin dance nights where he partners with
    his wife, while his weekend reading of historical biographies—particularly works about Thomas Edison and Nikola Tesla—feeds his inventive spirit.
  travel: Luis Peraza plans his trips with meticulous spreadsheets, favoring relaxed getaways to Austin’s live‑music scene and Colorado’s mountain trails for fishing, while dreaming of a solar‑focused tour
    of Iceland’s geothermal sites and a cultural immersion in the Caribbean’s salsa‑filled streets, balancing family time with his thirst for new experiences.
  culinary: Luis Peraza, an adept home cook, delights in perfecting traditional dishes such as ropa vieja and arroz con pollo, infusing them with aromatic cumin, sofrito, and a pinch of adobo, while experimenting
    with smart‑oven presets and sous‑vide tools to blend heritage flavors with modern culinary precision.
  core: Luis Peraza leverages a lifetime of electrical expertise and a love for classic salsa to craft sustainable home solutions, yet battles persistent anxiety that drives meticulous planning and occasional
    over‑cautiousness, all while sneaking extra espresso shots during late‑night DIY projects.
background:
  cultural: Luis is a first‑generation Cuban‑American who grew up in a bilingual household where Spanish was spoken daily and Cuban traditions were woven into family life. The vibrant cultural rhythms of
    Cuba—its music, food, and strong sense of familial loyalty—remain central to his identity, especially during holidays and family gatherings where he helps prepare traditional meals and shares stories
    of his heritage. Living in Round Rock, Texas, he has blended these roots with the local Texan values of hard work, independence, and community involvement. Luis maintains ties to the Cuban diaspora
    through a local cultural association, celebrates Cuban holidays such as Carnaval, and incorporates Spanish phrases into daily conversation, but he also embraces the broader American culture, participating
    in local community events and adhering to the region’s emphasis on self‑reliance and entrepreneurship.
