persona_description: A maritime archaeologist who specializes in the investigation and research of shipwrecks, particularly those located in the Bay of Galle, Sri Lanka. This individual has extensive knowledge
  and experience in underwater archaeology, has conducted previous research at Site G, and is currently conducting an excavation and survey of the site. They have a keen interest in the identification and
  analysis of shipwreck artifacts, particularly those related to the Dutch and French shipwrecks that may be present at the site.
