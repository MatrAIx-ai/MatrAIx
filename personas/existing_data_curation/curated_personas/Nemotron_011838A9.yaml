personas:
  professional: Linda Kennedy, a seasoned procurement specialist with 25 years of experience, merges razor‑sharp data analytics in SAP and Power BI with a pragmatic, curiosity‑driven approach to vendor
    negotiations, guiding cross‑functional teams while quietly asserting herself in boardrooms to embed sustainability into supply‑chain strategies.
  sports: Linda Kennedy, a devoted supporter of the Sacramento Kings and San Francisco 49ers, spends Saturday mornings walking the American River Trail with the local “River Runners” walking club, and joins
    a weekly low‑impact yoga class at the community center to stay limber, preferring personal fitness over competitive sports but still cheering loudly during playoff seasons.
  arts: Linda Kennedy, an avid reader in a church book club, immerses themselves in literary works by Toni Morrison and James Baldwin, and finds solace in the smooth saxophone tones of John Coltrane; their
    evenings often include listening to classic jazz albums while stitching a new blanket, a habit that blends intellectual curiosity with tactile creativity.
  travel: 'Linda Kennedy favors low‑key travel that blends nature and culture: they''ve explored Yosemite’s Grand Canyon of the Tuolumne, savored farm‑to‑table tours in Napa, and dream of strolling the
    historic streets of Florence, Italy, but their trips are meticulously planned around school mentoring schedules and a modest retirement budget.'
  culinary: Linda Kennedy experiments in the kitchen by marrying Southern comfort flavors—such as smoked turkey gumbo, collard greens seasoned with applewood smoked salt—and California heirloom vegetables
    like orange‑fleshed carrots and purple potatoes, often finishing dishes with fresh basil, cilantro, and a splash of locally sourced olive oil.
  core: Linda Kennedy balances methodical procurement expertise with a quiet love for garden‑to‑table cooking, precise financial planning, and a habit of skipping dental appointments while never missing
    a Wednesday book‑club meeting.
background:
  cultural: Linda is an African‑American who grew up in a close‑knit church community in the Midwest before relocating to Sacramento. Her cultural identity is rooted in the legacy of the civil‑rights movement,
    family traditions of storytelling, and a strong emphasis on community service. She actively participates in local African‑American cultural events such as Juneteenth celebrations and gospel music gatherings,
    and honors her heritage through cooking, music, and mentorship of younger community members.
