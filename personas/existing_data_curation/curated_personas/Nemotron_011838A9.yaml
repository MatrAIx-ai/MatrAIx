  hobbies: '[''Gardening'', ''Cooking (Southern and Californian fusion)'', ''Reading African American literature and history'', ''Book club'', ''Mentoring high school students'', ''Walking (American River
    Trail)'', ''Knitting'', ''Online culinary workshops'']'
  career_goals: Linda aims to advance into a senior strategic procurement role—such as Director of Purchasing or Chief Procurement Officer—where she can shape enterprise‑wide sourcing strategies, embed
    sustainability initiatives, and mentor emerging talent. She also plans to launch a boutique consulting practice focused on cost‑reduction and ethical sourcing for small‑ to mid‑size businesses in the
    Sacramento region, while ensuring a balanced personal life and financial security as she approaches retirement.
