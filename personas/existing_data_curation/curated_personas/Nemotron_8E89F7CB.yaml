personas:
  professional: Toni Goldman, a 25‑year‑old aspiring elementary art teacher in Wisconsin, blends solid instructional fundamentals with a strong creative bent, leveraging improv‑style facilitation and meticulous
    progress tracking to engage students while juggling a relaxed, sometimes chaotic schedule.
  sports: Toni Goldman enjoys kayaking on Lake Winnebago with the Winnebago Kayak Club, hikes the Ice Age Trail in the summer, roots for the Milwaukee Bucks and Green Bay Packers, and occasionally joins
    a community ultimate frisbee league for a quick workout.
  arts: Toni Goldman is an active participant in community theater and improv workshops, regularly visits gallery openings showcasing Yayoi Kusama and Banksy, sketches lake vistas for a personal photo blog
    that highlights everyday creativity, and draws inspiration from the photography of Annie Leibovitz.
  travel: Toni Goldman favors spontaneous road trips to Midwest spots such as Door County and Chicago, while dreaming of an artistic pilgrimage to Paris’s Musée d’Orsay and Kyoto’s pottery districts; they
    plan trips on a loose itinerary, balancing a limited student‑loan budget with a love for cultural immersion.
  culinary: Toni Goldman delights in Midwestern comfort foods like cheese curds and fish fry, but also experiments with avocado‑radish toast, homemade ramen with miso broth, and pork belly tacos topped
    with pickled kimchi, boasting a decent hand at sautéing seasonal vegetables and sampling food‑truck specialties.
  core: Toni Goldman is a creatively driven, socially magnetic 25‑year‑old who blends improvisational teaching with a love for art, kayaking, and spontaneous adventures, all while juggling modest finances
    and a habit of occasional disorganization.
background:
  cultural: Toni was born and raised in Winneconne, a small town in central Wisconsin, within a predominantly white, Midwestern community. Her family’s heritage includes German and Scandinavian ancestry,
    common to the region, and she was raised with values of modesty, hard work, and a deep appreciation for nature and local traditions. The cultural fabric of Winnebago County emphasizes community involvement,
    seasonal celebrations like county fairs and cheese festivals, and a love for outdoor recreation on the many lakes. Toni’s upbringing fostered a blend of self‑reliance and communal support, shaping her
    sociable yet skeptical outlook, and her enthusiasm for both conventional community activities and unconventional artistic expression.
