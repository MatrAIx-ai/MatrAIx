  career_goals: Toni aims to earn her full Wisconsin teaching license within the next two years, with a focus on elementary art education. She plans to develop a STEAM‑focused interdisciplinary curriculum
    that blends visual arts, science, and technology. Pursuing a master's degree in curriculum design or educational leadership is a medium‑term goal, after which she hopes to become a lead teacher or curriculum
    coordinator. In the long run, Toni envisions establishing a community art outreach program that brings school‑based art projects to local senior centers and public spaces, and eventually stepping into
    school administration to champion student‑centered, creative learning environments.
