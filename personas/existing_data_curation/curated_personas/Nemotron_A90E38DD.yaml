  career_goals: Jonathan aims to transition into a senior leadership role within the project management office, such as Director of PMO, where he can shape strategic initiatives and mentor the next generation
    of project managers. He is particularly interested in championing innovative delivery models that integrate emerging tech like AI and machine learning to increase efficiency. Over the next five years,
    he hopes to lead organization‑wide sustainability projects that align with Maine’s environmental values, while also establishing a consultancy practice that allows him greater flexibility to manage
    stress and maintain work‑life balance. Additionally, he aspires to contribute to community arts programs by leveraging his project management expertise to organize local cultural events.
