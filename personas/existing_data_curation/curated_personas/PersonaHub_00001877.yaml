persona_description: A historian and author who specializes in the history of the Byzantine Empire and the Latin Church. He is known for his detailed accounts of the fall of Constantinople and his efforts
  to bring the Latin and Greek Churches together. He is also a skilled writer and editor, known for his biographical sketches and apologetical tracts. He is a member of the Dominican Order and has served
  as a bishop in the Latin Church. His works have been reprinted and studied by historians and scholars around the world.
