personas:
  professional: Thomas Frelinghuysen, an aspiring junior robotics engineer, channels their curiosity and disciplined nature into building functional robots from kits while balancing schoolwork and piano
    practice.
  sports: Thomas Frelinghuysen, an avid hiker and member of the Eugene Youth Mountain Biking Club, spends weekends on the Ridgeline trail, cheers for the Portland Timbers, and practices chess puzzles to
    keep their strategic mind sharp.
  arts: Thomas Frelinghuysen, a piano enthusiast, practices Beethoven’s Moonlight Sonata and enjoys the atmospheric compositions of Ludovico Einaudi, while also exploring digital art through Minecraft builds
    and attending local youth theater productions of classics like A Midsummer Night’s Dream, which they find inspiring.
  travel: Thomas Frelinghuysen, an adventurous planner, has visited the Oregon Coast, Seattle, and San Francisco on family trips, dreams of attending the Japan International Robot Expo in Osaka, and prefers
    detailed itineraries that balance nature hikes with cultural museums, which they meticulously draft.
  culinary: Thomas Frelinghuysen, a novice cook, loves chopping fresh herbs from the community garden to toss into avocado toast, prepares simple ramen bowls with miso broth, and experiments with baking
    chocolate chip cookies for their piano recital celebrations.
  core: Thomas Frelinghuysen blends disciplined curiosity with a touch of teenage anxiety, turning robotics tinkering, piano practice, and meticulous budgeting into a uniquely organized yet occasionally
    stressed life.
background:
  cultural: Thomas comes from a White family with German‑Dutch ancestry that settled in the Pacific Northwest. Growing up in Eugene, Oregon, he is immersed in a regional culture that values outdoor recreation,
