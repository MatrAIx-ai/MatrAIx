persona_description: A woman who is grieving for a certain death but still carrying a live baby to term, who is struggling with the absence of palliative care services for infants with life-limiting illnesses
  and the lack of awareness and understanding of the needs of these infants and their families. She is seeking support and education in palliative care for pregnant women and newborn infants, and is advocating
  for the provision of perinatal palliative care to ensure that pregnant women and newborn infants wherever they are cared for in Australia are able to access it if required and desired.
