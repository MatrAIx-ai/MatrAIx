persona_description: A physicist who specializes in the study of gamma rays and cosmic rays, particularly the HAWC (High-Altitude Water Cherenkov Observatory) observatory. His research interests include
  the detection and analysis of gamma rays and cosmic rays, the design and construction of gamma ray observatories, and the development of new methods for detecting and studying gamma rays. He is the Principal
  Investigator for the National Science Foundation HAWC construction grant and is involved in the construction and analysis of data from the observatory.
