persona_description: A historian who specializes in the study of medieval England, particularly the period from the late 11th century to the 14th century. His research interests include the history of the
  Itchen River, the development of the episcopal estate of Alresford, the history of New Alresford, and the history of the wool trade in Hampshire. He is particularly interested in the role of the river
  in the economy and society of medieval England and the impact of the river on the growth and development of the town of New Alresford.
