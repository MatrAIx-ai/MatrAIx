personas:
  professional: Duy Saeteurn is a methodical aspiring HVAC technician and warehouse shift lead, leveraging hands‑on repair skills, meticulous inventory tracking, and bilingual communication to streamline
    operations while adhering to strict safety protocols and routine‑driven schedules.
  sports: Duy Saeteurn is a dedicated follower of the Vietnamese national soccer team, regularly watches matches and supports the local Wichita Thunder ice‑hockey club, while committing to weight‑training
    sessions three times weekly at a community gym and occasionally joining a recreational soccer kick‑about with friends on weekends.
  arts: Duy Saeteurn channels creative energy into building intricate model train and aircraft kits, woodworking functional home items, and participating in a Vietnamese cultural club where they enjoy performances
    by singer My Tam and traditional water‑puppet shows, all while unwinding with classic rock playlists featuring Led Zeppelin.
  travel: Duy Saeteurn prefers meticulously planned trips, having road‑tripped to Seattle and Portland to browse specialty hobby stores, dreaming of a workshop tour in Osaka, Japan to refine woodworking
    techniques, and scheduling weekend getaways to Kansas City for its renowned barbecue scene.
  culinary: Duy Saeteurn excels at cooking precise Vietnamese staples such as pho broth simmered for eight hours with star anise and cinnamon, fresh spring rolls packed with shrimp, rice vermicelli, and
    mint, and they often incorporate home‑grown basil and cilantro, treating the kitchen like a well‑ordered workshop.
  core: Duy Saeteurn blends a competitive, routine‑obsessed mindset with a love for meticulous hobbies, balancing career ambition with methodical leisure, yet they sometimes over‑catalogue their possessions
    and resist spontaneous plans.
background:
  cultural: Duy is a second‑generation Vietnamese‑American whose family immigrated to the United States before his birth. Raised in a household that emphasizes respect for elders, hard work, and community,
    he grew up celebrating Tet, preparing traditional meals, and speaking Vietnamese at home. While he has adapted to the Midwestern lifestyle of Wichita, he remains connected to his heritage through regular
    visits to a Vietnamese Buddhist temple, involvement in a local cultural association, and maintaining close ties with extended family. These cultural influences reinforce his practical, disciplined outlook
    and his commitment to preserving tradition while navigating a broader American context.
