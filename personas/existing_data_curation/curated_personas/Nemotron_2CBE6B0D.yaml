  career_goals: Duy aims to secure stable, routine‑focused employment by completing a trade certification such as HVAC or automotive service through a local community college or apprenticeship. In the short
    term, he seeks a full‑time position as a forklift operator or warehouse shift lead where his organizational strengths can be leveraged. Within three to five years, he aspires to become a supervisor
    overseeing logistics or maintenance teams, using his reliability and competitive drive to improve efficiency. Long‑term, Duy envisions launching his own handyman and home‑maintenance business, providing
    consistent, quality service to the Wichita community while maintaining control over his work schedule.
