  career_goals: Manuel aims to transition from a support role to an office manager position within the next three years, leveraging his organizational strengths and bilingual abilities to oversee a larger
    team. He plans to obtain his GED and pursue a Certified Administrative Professional (CAP) certification to formalize his expertise. Long‑term, he hopes to contribute to a community organization or municipal
    office in Cameron County, where he can apply his practical skills to improve local services while maintaining a stable work‑life balance for his family.
