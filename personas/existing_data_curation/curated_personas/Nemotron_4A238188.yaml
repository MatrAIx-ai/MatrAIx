  hobbies: '[''watercolor painting'', ''digital sketching'', ''speculative fiction reading'', ''indie video games'', ''abstract photography'', ''local art workshops'', ''creative writing'', ''puzzle solving
    (chess, escape rooms)'', ''experimental cooking'', ''nature trail exploring'']'
  career_goals: Joyce aims to build a career as a concept artist and visual storyteller for video games or animated media. She plans to complete a Bachelor of Fine Arts in Visual Arts, develop a professional
    portfolio, and secure internships at creative studios in Florida or beyond. Long‑term, she envisions launching a freelance design studio that blends digital media, interactive experiences, and speculative
    storytelling, while also mentoring emerging artists and contributing to community art projects.
