  hobbies: '[''sketching'', ''digital art'', ''nature photography'', ''reading speculative fiction'', ''listening to classical and ambient music'', ''journaling'', ''volunteering at the library'', ''mindfulness
    meditation'', ''gardening'']'
  career_goals: Lynn aspires to combine her artistic curiosity with her compassionate nature by pursuing a degree in art history or museum studies. She hopes to become a museum curator or educational outreach
    coordinator, designing inclusive programs that make cultural heritage accessible to diverse audiences. As a backup, she is considering library science or a role in community mental‑health support where
    she can continue to help others in quiet, thoughtful settings.
