personas:
  professional: Anabel Stmartin, a retired archival researcher and genealogist, channels their meticulous research skill and love of solitary scholarship into curating a traveling exhibit of historic Portland
    photographs while mentoring a young volunteer at the Oregon Historical Society, all the while balancing organized planning with a flexible, curiosity‑driven approach.
  sports: Anabel Stmartin, an avid early‑morning walker, belongs to the Forest Park Friends walking club and follows the Portland Timbers and Trail Blazers from their porch, channeling their competitive
    edge into personal fitness goals rather than team participation.
  arts: Anabel Stmartin immerses themselves in creative expression by devouring the works of Jane Austen and Emily Dickinson, attending intimate lectures on the paintings of Edward Hopper at the Portland
    Art Museum, and listening to the piano sonatas of Rachmaninoff, which together shape their quiet intellectual sanctuary.
  travel: Anabel Stmartin prefers meticulously planned, low‑key journeys such as a weekend retreat to Cannon Beach, a reflective pilgrimage to the historic streets of Kyoto, and a curated road trip along
    Oregon’s Coast, always traveling alone or with a close friend to maintain their cherished solitude.
  culinary: Anabel Stmartin enjoys cooking simple yet refined meals—such as wild mushroom risotto with fresh thyme, roasted beet and carrot soup, and sliced sourdough with locally sourced honey—while also
    savoring herbal tea blends featuring chamomile and peppermint to complement their quiet evenings.
  core: Anabel Stmartin is a quietly competitive, solitary scholar whose love of detailed archives is matched only by their habit of chronicling every thought in a weather‑worn journal and a persistent,
    worry‑laden mind that keeps them both vigilant and a touch uneasy.
background:
  cultural: Anabel was raised in a middle‑class white American family in the Pacific Northwest, where a blend of traditional modesty and the region’s progressive, environmentally conscious culture shaped
    her worldview. She earned a humanities degree from a liberal‑arts college, immersing herself in literature, history, and philosophy. Living in Portland, she has been influenced by the city’s vibrant
    arts community, strong emphasis on historical preservation, and appreciation for nature and self‑reliance. While her upbringing was rooted in mainstream Protestant values, she now embraces a secular,
    inquiry‑driven outlook that values education, independent thought, and community involvement on her own terms.
