persona_description: A prominent and influential artist and art historian who specialized in the study of modern and contemporary art, particularly in the United States, and who contributed to the development
  of regionalist movements in Texas. He was known for his expertise in the works of regionalist artists and his contributions to the art world through his teaching, writing, and exhibition activities. He
  was a member of the Dallas Nine, a group of regionalist artists, and was active in the Dallas Art League. He was also a member of the Lone Star Printmakers group and experimented with graphic techniques.
  He won significant acclaim during his years in Dallas and was chosen as one of several artists to represent Texas in a touring exhibition of American art organized by the New York City Museum of Modern
  Art.
