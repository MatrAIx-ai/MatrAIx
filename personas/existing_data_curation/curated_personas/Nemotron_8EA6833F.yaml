personas:
  professional: Julie Feske is a seasoned residential housekeeper whose systematic deep‑cleaning expertise, eco‑friendly chemical handling, and knack for coordinating multiple client schedules have earned
    them a reputation for reliability, and they now leverage strong interpersonal skills to train new staff while eyeing a lead housekeeper role.
  sports: Julie Feske is a regular participant in the Prospect Park walking club, a fan of the New York Knicks and the New York Yankees, and they occasionally join a neighborhood co‑ed softball league that
    helps them stay fit while socializing with longtime friends.
  arts: Julie Feske enjoys devouring mystery novels by Agatha Christie in a book club, volunteers at the local community theater that stages productions at BAM, and they find relaxation in crocheting blankets
    while listening to classic crooners like Dean Martin and modern folk singer Brandi Carlile.
  travel: Julie Feske prefers modest, well‑planned road trips, often returning to the upstate New York countryside to visit their parents, but they also delight in weekend getaways to historic Newport,
    Rhode Island, and annual family pilgrimages to a coastal Florida beach for a brief escape from city life.
  culinary: Julie Feske loves cooking comfort Italian‑American meals such as spaghetti and meatballs, chicken parmigiana, and homemade minestrone, enriching them with fresh basil, oregano, and thyme from
    their balcony garden, while they occasionally improvise a pesto sauce that pairs with a freshly baked focaccia.
  core: Julie Feske balances a meticulous cleaning career with a thriving garden, a mystery‑book habit, and community‑center volunteer work, all while budgeting wisely, managing health challenges, and never
    missing a Sunday family meal despite their tendency to over‑schedule themselves.
background:
  cultural: Julie grew up in a working‑class, white family in the Upstate New York region before relocating to Brooklyn in her twenties. Her upbringing emphasized modesty, hard work, and close family ties,
    with traditions rooted in Irish‑German heritage such as Sunday family meals and community involvement through her church. Living in a diverse Brooklyn neighborhood, she values multicultural interactions
    while maintaining mainstream American cultural practices, celebrating holidays like Thanksgiving and Christmas, and preserving practical, down‑to‑earth values that guide her daily life.
