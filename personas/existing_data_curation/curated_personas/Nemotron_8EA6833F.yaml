  career_goals: Julie aims to transition from a solo housekeeper to a lead housekeeper supervising a small team within a reputable cleaning company. She plans to earn a Certified Professional Housekeeper
    credential to formalize her expertise. In the longer term, she hopes to start a modest residential cleaning business that can offer flexible hours for her family while providing steady contracts with
    several long‑term clients for financial stability. Additionally, she aspires to mentor younger workers from her community, sharing the practical skills she has honed over the years.
