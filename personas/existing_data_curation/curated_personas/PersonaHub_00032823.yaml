persona_description: A military historian who specializes in the study of World War I and the role of the British and German forces in the Uganda Railway defense. The individual is knowledgeable about the
  techniques used by the British to defend the railway line against German demolition patrols, and the role of the 101st Grenadiers in the defense. They are interested in the details of the battles and
  the personalities involved, and would enjoy learning more about the personal stories and actions of the soldiers involved.
