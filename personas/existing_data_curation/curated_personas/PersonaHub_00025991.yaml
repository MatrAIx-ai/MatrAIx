persona_description: A geologist who specializes in the study of Martian terrain, particularly the identification of loose debris, boulders, cliffs, and other features of the landing site. His research
  interests include, but are not limited to, the analysis of Martian images and videos taken by the Mars Descent Imager to determine the optimal path of exploration and the precise location of the rover
  after landing. He also has expertise in the use of digital memory to store the video data acquired during the descent and transfer it to Earth.
