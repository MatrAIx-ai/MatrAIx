personas:
  professional: Evelyn Folsom, a seasoned elementary and middle school teacher, harnesses her deep expertise in curriculum development, data-driven assessment design, and technology integration, and they
    channel their sociable, competitive energy into leading dynamic professional-development workshops and forging community partnerships that boost literacy outcomes.
  sports: Evelyn Folsom, who coaches the Laurel County Lions youth soccer team and plays on the adult London Soccer Club, fills her weekends with drills and matches, follows the Kentucky Wildcats men's
    basketball and the Cincinnati Reds for a dash of spectator excitement, and hikes sections of the Natchez Trace for cardio; they view fitness as a balanced mix of competition and community.
  arts: Evelyn Folsom immerses herself in Southern literary classics through her book club, reveres the poetry of Eudora Welty, enjoys live performances by local bluegrass bands at the Laurel County Fair,
    and expresses creativity in quilting circles inspired by the vivid colors of Georgia O'Keeffe's paintings; they find that these artistic pursuits reinforce their love of storytelling and community connection.
  travel: Evelyn Folsom favors road-trip adventures that blend historic charm with culinary discovery, having mapped out weekend getaways to Charleston's waterfront, Asheville's artisanal markets, and the
    historic Graceland estate, while planning a future spring pilgrimage to Savannah's oak-lined squares; they always use a detailed spreadsheet to balance time, budget, and family commitments.
  culinary: Evelyn Folsom tackles traditional Southern recipes with a garden-to-table mindset, turning heirloom tomatoes into fresh bruschetta, mastering fried catfish with pepper-crust, whipping up fluffy
    buttermilk biscuits, and occasionally experimenting with a smoked brisket glaze that mixes brown sugar, bourbon, and a dash of hot sauce; they see cooking as a laboratory for both heritage and creativity.
  core: Evelyn Folsom blends disciplined pedagogy with spirited community involvement, balancing a competitive edge with genuine curiosity, all while juggling garden-to-table cooking, soccer coaching, and
    a meticulous budget; they approach each day like a well-crafted lesson plan.
background:
  cultural: Evelyn grew up in a small Mississippi town steeped in traditional Southern values of hospitality, close‑knit community, and faith—she is an active member of her local Baptist church. Her cultural
    heritage includes a strong connection to Southern cuisine, seasonal festivals, and family gatherings that emphasize intergenerational bonds. Living in Laurel, Jones County, she has been shaped by the
    region's history, the rural‑school environment, and a commitment to serving a diverse student body while preserving the warm, communal spirit of the Deep South.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Data‑driven assessment design'', ''Classroom management'', ''Literacy instruction'', ''STEM project facilitation'', ''Technology
