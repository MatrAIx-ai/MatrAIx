    coordination'']'
  hobbies: '[''Youth soccer coaching'', ''Community potluck planning'', ''Book club (Southern literature)'', ''Gardening (heirloom tomatoes, native plants)'', ''Live music attendance'', ''Hiking (Natchez
    Trace)'', ''Southern cooking'', ''Trivia competitions'', ''Quilting'', ''DIY home improvement'']'
  career_goals: Evelyn aims to advance into a district‑level leadership role, such as curriculum coordinator or assistant principal, within the next five years. She plans to earn an M.Ed. in Educational
    Leadership, secure grant funding for a school‑wide literacy initiative, and implement innovative, evidence‑based teaching practices across her school. She is driven to mentor teachers, shape district
    policy on instructional standards, and build partnerships with local businesses and community organizations to enrich student learning experiences.
