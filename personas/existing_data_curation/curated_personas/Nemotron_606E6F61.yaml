  career_goals: Randy aims to ascend to a senior operations role, such as Regional Operations Director, where he can shape strategic direction for multiple sites and embed a culture of innovative problem
    solving. He also dreams of launching a boutique creative consultancy that blends his managerial experience with his passion for art and design, helping automotive firms develop concept‑driven marketing
    campaigns. In the next five years, he plans to complete a professional certificate in Business Analytics and mentor emerging talent within his organization, positioning himself as a thought leader in
    cross‑functional collaboration.
