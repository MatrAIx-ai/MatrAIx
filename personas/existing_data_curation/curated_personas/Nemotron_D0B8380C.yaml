  hobbies: '[''Sketching furniture designs'', ''Painting'', ''Visiting art galleries and craft fairs'', ''Hiking and nature photography'', ''Building scale model furniture'', ''DIY woodworking'', ''Playing
    acoustic guitar'', ''Reading science‑fiction novels'', ''Attending community theater'', ''Listening to indie music'']'
  career_goals: Saturnino aims to become a master upholsterer recognized across central Iowa. His primary ambition is to open his own boutique workshop in Des Moines that specializes in historic piece restoration
    and sustainable design, offering custom‑made fabrics and bespoke finishes. He plans to earn a professional certification, such as the Certified Upholstery Technician designation, and complete his GED
    to broaden his business knowledge. Competitive by nature, he seeks to win regional craft awards and showcase his work at trade shows. Long‑term, he wants to mentor aspiring upholsterers, develop a line
    of eco‑friendly upholstery fabrics, and eventually expand his studio into a full‑service interior design consultancy.
