personas:
  professional: Saturnino Gordon is a masterful upholstery technician in central Iowa who blends meticulous pattern‑making, eco‑friendly fabric expertise, and a competitive drive to meet tight deadlines,
    while their curiosity and love of abstract art fuel innovative custom finishes for historic pieces.
  sports: Saturnino Gordon embraces weekend hikes across the Iowa countryside, follows the Iowa Hawkeyes football team and the Des Moines Menace soccer club, and maintains a disciplined fitness routine
    at the local CrossFit gym, balancing competitive spirit with solitary trail runs.
  arts: Saturnino Gordon channels their artistic curiosity into sketching bespoke furniture, painting abstract canvases inspired by Mark Rothko, playing acoustic guitar to the tunes of Bon Iver and Sufjan
    Stevens, and regularly attending shows at the Des Moines Art Center and the local community theater.
  travel: Saturnino Gordon prefers meticulously planned road trips to craft‑rich towns like Asheville, NC and design‑forward Copenhagen, Denmark, balancing a love for scouting sustainable furniture boutiques
    with budget constraints that push them to seek out affordable Airbnb stays near historic barns.
  culinary: Saturnino Gordon relishes farm‑to‑table meals, often cooking roasted beet and goat‑cheese salads with pistachio vinaigrette and slow‑cooked pork shoulder glazed with apple cider, while their
    hobbyist sourdough baking showcases a solid grasp of rye flour and wild‑fermented starter.
  core: Saturnino Gordon is a fiercely competitive, creatively curious upholsterer who balances diligent planning with spontaneous artistic bursts, all while juggling a chronic back ache and an insatiable
    appetite for indie music and sustainable design.
background:
  cultural: Saturnino grew up in Adel, Iowa, in a white, Midwestern family with German‑Irish roots. His parents worked in agriculture and local trades, instilling a strong work ethic, self‑reliance, and
    community values typical of small‑town Iowa. The town’s close‑knit environment offered regular church gatherings, county fairs, and craft circles where he first encountered upholstery and quilting.
    Exposure to regional art festivals sparked his curiosity about visual arts, while the pragmatic culture of the Midwest reinforced his organized yet adaptable approach to work. Although he left high
    school without a diploma, the hands‑on learning culture of his community shaped his practical skill set and competitive drive to excel in his trade.
