personas:
  professional: An aspiring mini architect, Noel Difort spends hours arranging LEGO bricks into precise cityscapes, displaying an early knack for structure and meticulous planning.
  sports: A devoted young soccer enthusiast, Noel Difort plays on the "Mini Rangers" team, idolizes Lionel Messi, practices drills at the same time each afternoon, and cheers for the local baseball club,
    the "Home Town Hawks".
  arts: An avid fan of animated storytelling, Noel Difort adores Disney classics like "The Lion King", sings along to songs by Lin‑Manuel Miranda, reenacts scenes with plush toys, and delights in the colorful
    illustrations of Mo Willems.
  travel: A curious explorer, Noel Difort loves family trips to Orlando’s Magic Kingdom, dreams of seeing the Eiffel Tower in Paris, and always asks for a souvenir map to track each visited ride.
  culinary: A picky yet adventurous eater, Noel Difort prefers macaroni and cheese with extra cheddar, enjoys banana slices and strawberry jam, and occasionally helps whisk pancake batter with a pretend
    chef’s hat.
  core: Noel Difort, a five‑year‑old who craves order, anxiously counts every coin, builds flawless block cities, and clings to bedtime routines while humming Disney tunes.
background:
  cultural: Noel Mae is raised in a predominantly white, middle‑class family in Park City, Utah, a community known for its strong ski culture and close connection to the surrounding mountains. Her family
    values punctuality, education, and community involvement, often participating in local festivals that celebrate the region’s alpine heritage and the history of the indigenous Ute peoples. Growing up,
    she experiences a blend of mainstream American traditions—such as holiday celebrations and school activities—and the seasonal rhythms of mountain life, which shape her daily routines and interests.
attributes:
  skills: '[''Routine adherence'', ''Attention to detail'', ''Early literacy'', ''Basic numeracy'', ''Fine motor skills'', ''Organizational skills'', ''Puzzle solving'']'
  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Coloring'', ''Reading picture books'', ''Beginner ski lessons'', ''Storytime at library'', ''Gymnastics class'', ''Sticker collection organization'']'
  career_goals: Hearing about adults who shape order and care, Noel Mae dreams of careers that combine structure with service. She often says she wants to be a teacher, creating organized classrooms where
    children can learn safely, or a veterinarian, providing disciplined care for animals. She also envisions becoming a park ranger in the mountains of Utah, preserving the natural environment she loves
    while maintaining clear guidelines for visitors.
