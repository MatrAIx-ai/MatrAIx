  hobbies: '[''Abstract painting'', ''Pottery'', ''Fusion cooking'', ''Hiking'', ''Yoga'', ''Landscape photography'', ''STEM outreach volunteering'', ''Community theater'', ''Strategy board games'', ''Gardening'']'
  career_goals: Helen aims to become a senior project manager overseeing large-scale sustainable infrastructure projects that blend engineering rigor with artistic expression. She aspires to lead a multidisciplinary
    design studio that creates community spaces—such as parks and public art installations—while championing green building standards. Additionally, she hopes to mentor the next generation of engineers
    through STEM outreach programs in local schools and eventually launch her own consultancy focused on collaborative, innovative engineering solutions.
