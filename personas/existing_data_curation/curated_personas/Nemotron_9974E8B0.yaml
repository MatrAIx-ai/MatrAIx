personas:
  professional: Helen Bevins, a 35-year-old structural engineer with a flair for artistic design, blends rigorous CAD modeling, data-driven decision making, and sustainable design principles to lead interdisciplinary
    project teams, mentor junior staff, and envision public spaces that double as community art installations.
  sports: Helen Bevins enjoys hiking the Sierra Nevada trails, practices yoga three times a week for balance, follows the Los Angeles Lakers and San Francisco 49ers, and participates in a local co-ed recreational
    climbing club.
  arts: Helen Bevins draws artistic inspiration from abstract painter Julie Mehretu, ceramicist Alison Shaw, and delights in performances by Lin-Manuel Miranda's musical Hamilton and choreographer Jiri
    Kylian's contemporary dance pieces, regularly attending gallery openings and community theater productions.
  travel: Helen Bevins prefers carefully planned, eco-mindful trips that blend adventure and cultural immersion, such as a week-long hiking expedition in Patagonia, a weekend art retreat in the Cotswolds,
    and annual visits to Napa Valley's vineyards, balancing travel budgets with work commitments and family responsibilities.
  culinary: Helen Bevins indulges in fusion cuisine, often creating miso-glazed salmon tacos with pickled daikon and avocado, and hand-rolling rosemary-infused focaccia topped with heirloom tomatoes, while
    honing pottery skills to craft bespoke serving bowls.
  core: Helen Bevins is a creatively driven engineer who melds structural rigor with artistic expression, channels boundless curiosity into community-focused projects, and balances meticulous planning with
    spontaneous bursts of colorful imagination.
background:
  cultural: Helen is a white American who grew up in the suburban communities of Northern California. Her upbringing in the Bay Area and later in El Dorado Hills has instilled a strong connection to the
    natural environment, a progressive outlook, and an appreciation for diverse cultural perspectives. She identifies with the Californian ethos of environmental stewardship, community involvement, and
    a blend of innovation and creativity.
attributes:
  skills: '[''Structural analysis'', ''AutoCAD'', ''Revit'', ''Python programming'', ''MATLAB'', ''Project management'', ''Sustainable design'', ''Data visualization'', ''Cross-functional team leadership'',
