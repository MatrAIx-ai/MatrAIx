personas:
  professional: An eco‑conscious aspiring muralist, Jessica Kiser blends a hands‑on apprenticeship in residential painting with her mixed‑media acrylic practice, using low‑VOC materials and community‑driven
    designs while they navigate a relaxed, flexible schedule that sometimes leaves project timelines a bit fluid.
  sports: A weekend trail‑hiker and member of the Mahomet Cycling Club, Jessica Kiser often rides the local prairie paths and follows the Chicago Cubs, Bulls, and Blackhawks, yet they sometimes skip a workout
    after a late‑night art jam.
  arts: An avid participant in the Urbana‑Champaign arts scene, Jessica Kiser spends weekends creating acrylic mixed‑media canvases, volunteering on community mural projects, and drawing inspiration from
    Frida Kahlo, Banksy, and local street artist 'Mosaic Mike', while regularly attending shows by The Lumineers and exhibitions at the Crossroads Arts Center.
  travel: A spontaneous road‑trip enthusiast, Jessica Kiser has trekked to Chicago’s Art Institute, soaked up the music scene in Nashville, explored the vibrant murals of Detroit, and dreams of attending
    a workshop in Berlin, though they usually plan trips around school breaks and limited teen budget.
  culinary: A farm‑to‑table foodie, Jessica Kiser loves fresh corn on the cob from the county fair, homemade basil pizza, beet‑infused smoothies, and apple‑cinnamon pie, often experimenting with natural
    pigments from beetroot and turmeric in both their cooking and painting, though they frequently end up with paint‑stained aprons in the kitchen.
  core: Jessica Kiser, an 18‑year‑old DIY‑minded painter‑artist who blends community‑rooted practicality with boundless creative curiosity, is a social, relaxed planner who paints, cycles, and dreams of
    an eco‑friendly mural studio.
background:
  cultural: Jessica grew up in Mahomet, a small Midwestern town in Illinois, where her family’s German and Irish heritage mingles with a strong sense of community and practicality. Local customs—county
    fairs, farm‑to‑table gatherings, and church‑based events—instilled values of friendliness, independence, and a solid work ethic. Proximity to the University of Illinois campus introduced her to a vibrant
    arts scene, encouraging her curiosity and appreciation for creativity while maintaining the grounded, collaborative spirit typical of the region.
attributes:
  skills: '["Surface preparation", "Paint mixing", "Wallpaper installation", "Color theory", "Mixed‑media techniques", "Acrylic and oil painting", "Sketching and drawing", "Client communication", "Team
    collaboration", "Basic project scheduling", "Safety compliance", "Digital illustration basics", "Art history knowledge"]'
  hobbies: '["Acrylic painting", "Mixed‑media art", "Sketching", "Visiting galleries and art fairs", "Live music concerts", "Hiking and nature walks", "Bicycle riding", "DIY home décor", "Photography",
    "Community mural volunteering", "Traveling for art workshops"]'
  career_goals: Jessica aims to build a career that fuses her trade expertise with her artistic passion. In the near term she plans to complete an apprenticeship, earn a professional painting certification,
    and expand her portfolio of custom murals and decorative finishes. She intends to enroll in a BFA or interior‑design program to deepen her design knowledge, attend art residencies, and develop sustainable,
    low‑VOC painting practices. Long‑term, she hopes to launch her own boutique studio offering bespoke murals, eco‑friendly painting services, and design consulting for residential and commercial projects,
    while gaining recognition for community art initiatives and traveling for specialized workshops.
