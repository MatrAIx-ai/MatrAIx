personas:
  professional: Archana Malik, a retired home economist turned senior‑center arts coordinator, blends meticulous budgeting with creative flexibility as they lead weekly painting and collage workshops, using
    their storytelling skill to weave family histories into each session.
  sports: Archana Malik follows the New York Giants, the New York Yankees, and the New York Knicks with steadfast loyalty, joins a senior walking club for daily park strolls, and occasionally participates
    in light chair‑based exercise classes at the senior center.
  arts: Archana Malik immerses herself in art history by streaming virtual tours of the Louvre and the Metropolitan Museum, draws inspiration from Monet, Frida Kahlo, and local muralists, listens to classical
    ragas and jazz standards while knitting, and channels that creativity into leading painting and collage workshops for seniors.
  travel: Archana Malik enjoys leisurely day trips to the New Jersey Pinelands and the Hudson River Valley, fondly recalls a past visit to Niagara Falls and a virtual tour of the British Museum, and dreams
    of a calm pilgrimage to the historic gardens of Kyoto during cherry‑blossom season.
  culinary: Archana Malik blends traditional dishes like butter chicken and mishti doi with New Jersey farm‑fresh produce, creating fusion recipes such as kale‑dal, mint‑coriander pesto grilled fish, and
    basil‑infused aloo gobi, while regularly harvesting basil, mint, and coriander from her herb garden for these creations.
  core: Archana Malik, a 93‑year‑old inquisitive storyteller, balances meticulous budgeting with spontaneous culinary experiments, nurtures a garden of herbs, mentors seniors in the arts, and navigates
    aging with a mix of curiosity, gentle anxiety, and endearing quirks like misplacing her reading glasses.
background:
  cultural: Archana was born in the early 1930s in Punjab, British India (now Pakistan) to a Muslim family that valued education, hospitality, and communal rituals. She grew up speaking Urdu at home, celebrating
    Eid, Diwali, and regional festivals with music, dance, and shared meals. Emigrating to the United States in the early 1970s, she settled in New Jersey, where she blended her South Asian heritage with
    suburban American life. She maintains traditional practices—such as cooking elaborate festive meals, preserving Hindi‑Urdu poetry, and observing religious observances—while also participating in local
    multicultural events, supporting the South Asian diaspora in Somerset County, and fostering cross‑cultural dialogue.
