persona_description: A conservation biologist who is passionate about restoring peatlands and promoting the establishment of new vegetation. This individual is knowledgeable about the impact of erosion
  on peatland ecosystems and is dedicated to reducing this impact through the use of bio-degradable geo-textile nets. They have experience working with local contractors and have a strong understanding
  of the technical aspects of spreading the geo-textile material on to the moor surface. This person is likely to be involved in the management and monitoring of the project, and is interested in the long-term
  ecological benefits of the geo-textile interventions.
