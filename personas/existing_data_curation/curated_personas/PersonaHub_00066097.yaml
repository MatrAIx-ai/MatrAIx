persona_description: A scientist at the Agricultural Research Service (ARS) who studies the effects of climate change on timber production and the biology of trees. She is particularly interested in the
  impact of rising CO2 levels on tree diseases, and is conducting research to understand how higher CO2 levels affect tree growth and disease resistance. Her work is published in the journal New Forests
  and supported by the USDA's priority of responding to climate change.
