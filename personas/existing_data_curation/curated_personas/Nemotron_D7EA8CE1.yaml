  career_goals: Looking ahead, Thuy intends to transition from full-time caretaking to a mentorship and advisory role, where she can codify her decades-long experience into a formal enrichment handbook
    for senior caretakers. She hopes to secure a position on the sanctuary's advisory board to champion innovative, art-inspired enrichment strategies and to advocate for senior volunteer programs that
    leverage the patience and observational skills of older volunteers. Thuy also dreams of recruiting a small grant to develop a community outreach program that introduces local schoolchildren to wildlife
    care through interactive art workshops. Ultimately, she seeks to leave a lasting legacy of compassionate, creatively enriched animal welfare practices within her community.
