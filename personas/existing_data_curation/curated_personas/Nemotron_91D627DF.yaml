  career_goals: Jordan aims to rise to a senior executive role—ideally Vice President of Operations or Chief Strategy Officer—within a major hospitality or entertainment organization in the Orlando region.
    He wants to spearhead digital transformation initiatives that blend AI‑driven analytics with pragmatic operational improvements. Parallel to corporate advancement, he plans to launch a boutique consulting
    firm focused on helping mid‑size companies integrate inclusive leadership practices and emerging technologies. He also aspires to become a recognized speaker on diversity in business leadership and
    to establish a mentorship program that supports rising Black professionals in his community.
