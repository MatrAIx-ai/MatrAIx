personas:
  professional: Morgan Guerin, a 35-year-old diesel specialist in San Antonio, blends deep expertise in heavy-vehicle engine diagnostics, hydraulic repair, and MIG/TIG welding with a curiosity-driven, art-inspired
    eye for unconventional solutions, and despite a relaxed approach to scheduling, they assertively lead a small team, mentor apprentices, and experiment with hybrid retrofits to push industry sustainability.
  sports: Morgan Guerin stays active by combining weekend motorcycle rides through Hill Country with occasional 5K runs as part of the San Antonio Trail Run Club, fervently supporting the San Antonio Spurs
    during basketball season and cheering on San Antonio FC soccer matches, while preferring low-impact garage strength workouts that double as equipment testing for their diesel tools.
  arts: Morgan Guerin immerses themselves in San Antonio's vibrant art scene, regularly visiting galleries featuring muralist Javier Duran and photographer Annie Leibovitz, while pursuing industrial photography
    that captures the elegance of diesel engines and unwinding to the sounds of The Texas Tornados and the cinematic scores of Vangelis.
  travel: Morgan Guerin prefers spontaneous weekend motorcycle excursions over elaborate vacation planning, often riding the Hill Country loop to Fredericksburg and the historic Route 66 stretch near Amarillo,
    while dreaming of a cross-country tour to the Pacific Northwest's automotive museums and a cultural immersion trip to Kyoto, balancing a modest travel budget with occasional splurges on boutique bed-and-breakfasts.
  culinary: Morgan Guerin cooks Tex-Mex meals with confident flair, perfecting dishes like carne asada tacos topped with roasted tomatillo salsa, chile-infused black-bean queso, and fresh guacamole spiced
    with cilantro, while also experimenting with smoked brisket for weekend barbecues.
  core: Morgan Guerin balances a grease-stained workbench with a camera-filled pocket, swapping diesel diagnostics for spontaneous motorcycle jaunts, yet habitually postpones routine paperwork until the
    last minute.
background:
  cultural: Morgan is a third‑generation White Texan whose family grew up in rural Bexar County. Raised in a working‑class environment, she absorbed the region's mix of Southern independence, strong work
    ethic, and the multicultural influences of San Antonio, especially the local Mexican heritage visible in food, music, and community festivals. Her upbringing emphasized practical skills, community support,
    and a respect for both traditional Texan values and the city’s diverse artistic expression.
attributes:
  skills: '["Diesel engine diagnostics", "Heavy vehicle maintenance", "Hydraulic system repair", "MIG/TIG welding", "Electrical wiring and troubleshooting", "Diagnostic software (Cummins Insite)", "Technical
    manual and blueprint reading", "Preventive maintenance planning", "Parts procurement", "OSHA safety compliance", "Mentoring apprentices", "Basic shop management", "Hybrid/electric power‑train integration"]'
  hobbies: '["Visiting art galleries and murals", "Industrial photography", "Reading science‑fiction", "DIY electronics projects", "Woodworking", "Gardening", "Cooking Tex‑Mex cuisine", "Motorcycle riding",
    "Small‑group community workshops", "Mentoring aspiring female mechanics"]'
  career_goals: Morgan aims to become the lead diesel specialist at a regional fleet maintenance center, securing ASE Certified Diesel Technician and EPA emissions certifications. She wants to lead a small
    team of technicians, develop training programs for women entering the trades, and eventually launch her own mobile diesel‑repair service that also offers hybrid retrofits for commercial fleets. Long‑term,
    she envisions influencing industry standards on sustainable heavy‑vehicle maintenance while staying rooted in the hands‑on, flexible work style she values.
