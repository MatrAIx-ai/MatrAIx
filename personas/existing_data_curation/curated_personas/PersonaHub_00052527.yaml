persona_description: A research psychologist and education expert who has conducted extensive research on the lives of young people with diabetes and their peers, particularly focusing on the attitudes
  and experiences of teenage diabetics. She has identified the need for greater awareness of diabetes management in school settings and has piloted educational material to improve awareness and reduce bullying.
  Her work has led to the development of a larger scale project to increase awareness of diabetes in school settings.
