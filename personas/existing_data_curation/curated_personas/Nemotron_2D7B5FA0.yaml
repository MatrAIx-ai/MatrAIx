  career_goals: Albina dreams of turning her love for art and community into a future career. In the short term she wants to join the school’s art club, win a regional youth art competition, and attend
    a summer camp focused on visual storytelling. She plans to keep developing her leadership skills by helping organize school events and community performances. Looking ahead, she hopes to attend a high
    school with a strong visual‑arts program, study graphic design or museum studies, and eventually work as an artist‑educator or museum curator who creates interactive exhibits that inspire children’s
    creativity. She also envisions using her organizational talent to lead community art projects that bring people together, such as murals or holiday craft fairs.
