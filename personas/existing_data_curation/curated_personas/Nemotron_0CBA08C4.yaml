personas:
  professional: Kevin Htoo is a budding robotics prodigy who, despite being only eight, meticulously plans each robot build; they blend their love of drawing folklore‑superhero characters with a competitive,
    methodical mindset, delivering reliable prototypes in the STEAM club.
  sports: Kevin Htoo follows the New York Knicks and New York Yankees with enthusiasm, plays in a community youth soccer league called Brooklyn United, and tackles after‑school workouts on the playground
    with a competitive edge, preferring structured drills over casual play while they track progress on a hand‑drawn fitness chart.
  arts: Kevin Htoo is an avid young illustrator who merges Asian folklore motifs with modern superhero aesthetics, collects stickers of artists like Yayoi Kusama, Vincent van Gogh and Leonardo da Vinci,
    frequently visits the Museum of Modern Art to study contemporary installations, and practices calligraphy inspired by ancient masters, all of which they use to shape their creative identity.
  travel: Kevin Htoo prefers meticulously planned weekend trips, often visiting nearby cultural hotspots like Central Park’s Discovery Center and the Children’s Museum of Manhattan, yet dreams of an adventurous
    summer visit to Kyoto’s historic temples and the science museums of Tokyo, and they balance the excitement of new experiences with the comfort of traveling with parents rather than large groups.
  culinary: Kevin Htoo’s favorite meals include cheesy pizza slices, homemade chicken teriyaki rice bowls, and chocolate chip pancakes, and they can independently whip up a simple stir‑fry with carrots,
    broccoli, and soy sauce under parental supervision, though they sometimes skip vegetables in favor of extra cheese.
  core: Kevin Htoo is an eight‑year‑old curiosity‑driven inventor who blends folklore and superhero art, out‑plans peers in robotics building, saves allowance with spreadsheet precision, battles seasonal
    allergies with a disciplined routine, and refuses to share their prized stickers without a strategic trade, because they value both creativity and competition.
background:
  cultural: Kevin was born and raised in New York City to immigrant parents of mixed Asian heritage—his mother is Taiwanese and his father is Korean. At home, he hears both Mandarin and Korean phrases,
    celebrates Lunar New Year with traditional foods and red envelopes, and attends community cultural workshops that teach calligraphy and folk dances. The vibrant diversity of his borough, from Chinatown
    to Koreatown, exposes him to a blend of Eastern and Western artistic traditions, which informs his sketches and his fascination with combining classic Asian motifs with modern design. Family gatherings
    often feature shared meals, stories about ancestors, and encouragement of academic excellence, reinforcing his organized and competitive mindset.
attributes:
  skills: '[''Scratch programming'', ''drawing and sketching'', ''logic puzzle solving'', ''beginner Rubik cube'', ''basic arithmetic'', ''organized time management'']'
  hobbies: '[''drawing'', ''Scratch programming'', ''building simple robots'', ''chess'', ''puzzle solving'', ''museum visits'', ''reading adventure/science books'', ''calligraphy'', ''sticker collecting'']'
  career_goals: Kevin dreams of turning his curiosity for technology and art into a future career that blends both fields. He hopes to become a robotics engineer or a video‑game designer who creates visually
    striking, interactive experiences. Competing in science fairs and youth robotics tournaments excites him, and he imagines one day seeing his own artwork featured in digital galleries. He also harbors
    a nascent ambition to explore space through aerospace engineering, motivated by his love of science and his competitive drive to excel among his peers.
