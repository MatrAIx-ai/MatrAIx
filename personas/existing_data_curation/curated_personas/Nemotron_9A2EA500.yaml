  hobbies: '["Watercolor and oil painting","Visiting art galleries and folk art festivals","Vegetable gardening and seasonal planting","Reading art history and memoirs","Book club participation","Nature
    walks and river hikes","Cooking Southern-inspired recipes","Volunteering as a craft workshop facilitator at the senior center"]'
  career_goals: Angel aims to transition from direct care to a supervisory and educator role within the home‑care sector. She plans to complete an associate degree in health sciences, earn a Certified Nursing
    Assistant (CNA) credential, and pursue specialized certification in dementia and hospice care. Leveraging her love of art, she intends to develop a community‑based program that integrates creative workshops
    into elder‑care services, enhancing quality of life for seniors in Louisa County. Long‑term, Angel aspires to become a mentor for newly hired aides, shaping training curricula that emphasize both clinical
    excellence and holistic, art‑infused care.
