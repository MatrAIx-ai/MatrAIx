  career_goals: Carla dreams of becoming an artist who creates illustrated books for children, a veterinarian who cares for animals, or a teacher who guides younger students with kindness. She also imagines
    helping her community by volunteering at local events, sharing her artwork, and supporting animal shelters when she grows older.
