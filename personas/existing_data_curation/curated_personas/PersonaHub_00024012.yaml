persona_description: A digital accessibility advocate who is passionate about advancing digital inclusion for people with disabilities. They are interested in understanding the latest developments in the
  digital accessibility legal space and how to apply these insights to their work. They are also interested in learning about the ethical considerations that impact the digital accessibility legal space
  and the best practices to avoid legal claims. They want to learn how to talk about digital accessibility law with enthusiasm and without fear, and how to stay updated with developments in the legal space.
  They are willing to invest time and effort to learn and apply the best practices to advance digital inclusion for all.
