  hobbies: '[''Bollywood dance classes'', ''Zumba fitness'', ''Hiking in local parks'', ''Cooking Indian-fusion dishes'', ''Food blogging'', ''Reading personal-development books'', ''Attending cultural
    festivals'', ''Volunteering for insurance literacy workshops'']'
  career_goals: Saima aims to earn the Chartered Property Casualty Underwriter (CPCU) designation within the next two years and advance to a senior claims analyst role. She envisions leading a claims management
    team, spearheading automation projects that streamline workflow, and eventually transitioning into underwriting or product development within the insurance technology space. Long‑term, she hopes to
    leverage her expertise to mentor emerging professionals, especially women of South Asian heritage, and contribute to community outreach programs that improve insurance literacy.
