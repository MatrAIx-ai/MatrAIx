  hobbies: '["Gardening (vegetables and herbs)","Cooking and baking Southern cuisine","Reading historical fiction and self‑help books","Knitting and cross‑stitching","Walking local nature trails","Volunteering
    at church food pantry","Listening to true‑crime podcasts","Scrapbooking family photos"]'
  career_goals: Hannah aims to advance within her organization by obtaining a Certified Administrative Professional (CAP) credential and completing an associate's degree in Business Administration at Durham
    Technical Community College. She aspires to transition into an Office Manager or Administrative Supervisor role, where she can lead a small team, implement digital record‑keeping initiatives, and design
    onboarding training programs for new clerical staff. Long‑term, she wants to ensure a stable, well‑compensated position that supports her family's financial security while allowing her to continue applying
    her love of organized, routine‑driven work.
