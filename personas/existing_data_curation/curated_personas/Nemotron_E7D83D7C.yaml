    ''Problem solving'']'
  hobbies: '[''Metal sculpting'', ''Woodworking'', ''Painting'', ''Jazz and blues listening'', ''Science‑fiction reading'', ''Chess'', ''Gardening'', ''Cooking Southern cuisine'', ''Community volunteering'',
    ''Attending art festivals'']'
  career_goals: Jonte aims to move into a lead‑technician or supervisory role within the next three years, leveraging his extensive hands‑on experience to guide process improvements and safety initiatives.
    He plans to earn a CNC programming certification and a Six Sigma Green Belt to solidify his expertise in manufacturing efficiency. A lifelong passion for art drives his ambition to launch a side venture
    that creates custom metal sculptures and functional art pieces for both industrial clients and local galleries. He also hopes to mentor the next generation of machinists through apprenticeship programs
    at the community college and to champion sustainable finishing practices that reduce waste. Ultimately, Jonte envisions a balanced transition toward semi‑retirement where he can run his own small workshop,
    combining his technical skills with his creative vision.
