personas:
  professional: Admiral Bacon is a senior interviewer turned emerging producer whose sharp active‑listening, cultural competency, and knack for weaving narrative threads into compelling multimedia stories
    make them a natural leader in arts‑focused media.
  sports: Admiral Bacon is a loyal fan of the Orlando Magic and Orlando City SC, hikes with the Orlando Hiking Club on weekends, practices yoga three times a week at a local studio, and joins a casual co‑ed
    soccer league during the winter.
  arts: Admiral Bacon immerses themselves in Kissimmee’s art scene, curates watercolor series inspired by urban murals, photographs the works of local street artist Carlos Rivera, and regularly attends
    performances by the Orlando Philharmonic Orchestra, Broadway’s Hamilton, and contemporary dancer Tanja Black.
  travel: Admiral Bacon prefers itineraries that blend scheduled museum visits with spontaneous neighborhood art walks, having explored New Orleans, Asheville, and Havana, and dreams of traveling to Kyoto
    and Marrakech to study regional crafts.
  culinary: Admiral Bacon enjoys cooking Southern staples like shrimp and grits, jerk chicken, and collard greens with scotch bonnet pepper, boasts a solid intermediate skill level in the kitchen, and often
    experiments with fusion dishes at farmer’s‑market pop‑ups.
  core: Admiral Bacon is a curiosity‑driven storyteller who balances meticulous planning with artistic spontaneity, hoards art prints they can’t afford, and never misses a sunrise yoga session before a
    deadline.
background:
  cultural: Sharese is an African‑American woman raised in Kissimmee, Florida, with family roots that span the Southern United States and Caribbean islands. Growing up in a multicultural neighborhood, she
    was immersed in Black church traditions, community activism, and oral storytelling practices that emphasized resilience and creativity. This rich cultural tapestry informs her appreciation for diverse
    artistic expressions and fuels her commitment to amplifying under‑represented voices through her interviewing work.
attributes:
  skills: '[''Interviewing'', ''Active Listening'', ''Research and Data Analysis'', ''Storytelling'', ''Cultural Competency'', ''Digital Media Production'', ''Project Management'', ''Public Speaking'',
    ''Conflict Resolution'', ''Empathy'', ''Adaptability'', ''Time Management'', ''Multi‑tasking'', ''Art Appreciation'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Reading contemporary fiction and non‑fiction'', ''Live music and theater'', ''Yoga'', ''Hiking in state parks'', ''Cooking
    Southern and Caribbean dishes'', ''Community volunteering at arts programs'']'
  career_goals: Sharese aims to transition from a staff interviewer to a senior producer or editorial lead for a media outlet that prioritizes arts, culture, and social issues. She aspires to launch her
    own podcast series spotlighting under‑represented Black artists and innovators, and plans to pursue a master’s degree in communication to deepen her theoretical grounding. Long‑term, she envisions establishing
    a community storytelling initiative in Central Florida that mentors emerging journalists and preserves local cultural histories.
