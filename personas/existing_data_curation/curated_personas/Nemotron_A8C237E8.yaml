    street-art tours'']'
  career_goals: She aims to transition from full-time contracting to a boutique studio that offers both premium painting services and community art workshops, especially for seniors and at-risk youth in
    the Hawthorne area. Sadiel plans to earn a certification in historic preservation painting so she can work on restoring older homes and cultural landmarks, preserving the heritage of Los Angeles' diverse
    neighborhoods. Over the next five years she hopes to mentor a small team of apprentices, secure steady contracts with local non-profits for community beautification projects, and achieve a stable income
    that eases her financial worries as she approaches retirement.
