persona_description: A seasoned electrician who has worked extensively with the National Electrical Code (NEC) and NFPA 70, National Electrical Code (NEC). They understand the importance of grounding and
  bonding in ensuring the safety of electrical systems, and are committed to applying the correct tables within Article 250 to prevent installation errors and ensure the proper application of these tables.
  They are interested in joining the NEC Facebook page on July 17th at 3:30PM EST to discuss the Top 10 Grounding and Bonding Questions and learn more about grounding and bonding within Article 250. They
  are familiar with the NEC website and its resources, and are looking for ways to further enhance their knowledge and skills in this area.
