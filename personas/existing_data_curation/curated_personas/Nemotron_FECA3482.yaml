personas:
  professional: Susan Sorley, a curious two‑year‑old in a Montessori‑style daycare, treats block‑building and puzzle‑solving as miniature research projects, reliably tidying up their work area while they
    covertly compete with peers for the highest tower and occasionally question the motives of new caregivers.
  sports: Susan Sorley, a two‑year‑old who is a budding member of the neighborhood toddler gymnastics club, delights in tumbling across the foam pit and energetically waves a tiny jersey bearing the logo
    of the city’s professional baseball team, the Metroville Mariners, while they compete fiercely in sandbox races and sometimes get upset when they don’t win.
  arts: Susan Sorley, a two‑year‑old with a vivid imagination, spends afternoons finger‑painting in bright reds and blues while they hum the catchy tunes of The Wiggles and flip through the illustrated
    pages of Eric Carle’s ‘The Very Hungry Caterpillar,’ turning each picture into a spontaneous story that fuels their appreciation for whimsical art.
  travel: Susan Sorley, a two‑year‑old who travels mainly with their parents, delights in short family getaways to the coastal sand dunes of Sunny Shore Beach and the bustling exhibits at the City Zoo,
    favoring the tactile excitement of building sandcastles over long car rides, yet they sometimes whine when a scheduled nap is missed.
  culinary: Susan Sorley, a two‑year‑old with a selective palate, eagerly devours creamy macaroni‑and‑cheese and sweet banana‑spooned oatmeal while they stubbornly reject broccoli and mustard, often demanding
    the extra sprinkle of cheddar on their cheese pizza and insisting on chewing each bite of soft‑cooked carrot sticks with deliberate gusto.
  core: Susan Sorley, a remarkably curious two‑year‑old who balances a fierce competitive streak with a habit of worrying over misplaced crayons, turns every daily routine into a miniature experiment while
    occasionally hiding in the pantry for a quiet timeout.
background:
  cultural: Susan is a white child growing up in the suburban community of Williamson County near Austin, Texas. Her family participates in typical American traditions such as Thanksgiving and Fourth of
    July celebrations, while also taking advantage of the city's vibrant arts scene, including visits to the Austin Children's Museum and family-friendly art workshops. The blend of Southern hospitality,
    Texan cultural pride, and a progressive, creative environment shapes her early worldview and appreciation for diverse experiences.
attributes:
  skills: '["fine motor coordination (crayon grasp, block stacking)", "vocabulary development (~200 words)", "color and shape recognition", "basic pattern identification", "simple routine adherence", "early
    social cue awareness (wariness of strangers)"]'
  hobbies: '["crayon doodling", "listening to children''s music", "building block towers", "nature walks in local parks", "flipping through picture books", "simple dance and movement", "interactive storytime"]'
  career_goals: Even at two, Susan frequently talks about "drawing pictures" and "being a teacher for kids," expressing a budding ambition to share her love of art and knowledge. She aims to explore new
    ideas, learn to read, and eventually pursue a path that lets her create and inspire, perhaps as an artist or educator. Her competitive streak shows through in her desire to master new skills quickly
    and be praised for her accomplishments.
