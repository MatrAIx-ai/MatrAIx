persona_description: A forensic anthropologist who specializes in the study of human remains, particularly those from the American colonies during the 17th century. Her expertise includes the analysis of
  skeletal remains, the interpretation of physical evidence, and the reconstruction of facial features based on dental and cranial morphology. Her research interests include the investigation of survival
  cannibalism in the American colonies, the study of European diets and migration patterns, and the comparison of modern human remains with those from the past. She has published extensively on these topics
  and has received recognition for her contributions to the field of forensic anthropology.
