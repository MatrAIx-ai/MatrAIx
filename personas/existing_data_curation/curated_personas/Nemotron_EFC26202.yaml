personas:
  professional: Lan Bowden, a veteran Chicago drafter with four decades mastering AutoCAD, Revit, and SolidWorks, now pivots toward part‑time mentorship and historic preservation consulting while juggling
    the occasional missed deadline due to their spontaneous work style.
  sports: Lan Bowden enjoys leisurely walks in the Busse Woods preserve, follows the Chicago Cubs with faithful enthusiasm, and participates in a senior softball league where they occasionally forget to
    bring water, yet they relish the camaraderie of the local community recreation center.
  arts: Lan Bowden blends a love for community theater—volunteering front‑of‑house and crafting set pieces—with a passion for crocheting and woodworking, and they often unwind listening to Frank Sinatra
    while leafing through historical novels by Chicago author Michael Dorris.
  travel: Lan Bowden prefers spontaneous weekend getaways to nearby historic towns like Galena, Illinois, and dreams of strolling the cobblestones of Prague, but they usually book train tickets at the last
    minute and pack a garden‑sized tote of seed packets for friends.
  culinary: Lan Bowden enjoys cooking garden‑fresh meals such as rosemary‑infused roasted chicken and beet salad, occasionally experiments with homemade sourdough, and they never pass up a slice of deep‑dish
    pizza despite watching their sodium intake.
  core: Lan Bowden is a pragmatic, curiosity‑driven retiree who mixes meticulous drafting expertise with spontaneous community theater antics, a penchant for gardening, and a habit of juggling too many
    projects at once.
background:
  cultural: Lan was raised in suburban Chicago by a family of German‑Polish descent, embodying Midwestern values of hard work, practicality, and community involvement. Her upbringing emphasized education,
    civic duty, and participation in local events, shaping a strong connection to the DuPage County region. Although identifying as white American, she respects the area’s cultural diversity and incorporates
    a balanced perspective of tradition and openness to new ideas in both her professional and personal life.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SolidWorks'', ''MicroStation'', ''Hand drafting'', ''Blueprint reading'', ''Construction code compliance'', ''Technical documentation'', ''3D modeling'', ''Project
    coordination'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Local history tours'', ''Community theater volunteering'', ''Crocheting'', ''Woodworking'', ''Walking in forest preserve trails'']'
  career_goals: Approaching retirement, Lan aims to shift from full‑time drafting to a mentorship and consulting role, helping younger drafters master both traditional techniques and modern BIM workflows.
    She plans to earn a BIM certification, volunteer her expertise to local historic preservation projects, and eventually reduce her workload to part‑time while contributing to community design initiatives
    in Bensenville.
