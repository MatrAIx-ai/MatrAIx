persona_description: A scientist who was a professor of chemistry and biology at Harvard University, known for his contributions to the establishment of the Harvard Fatigue Laboratory and his research on
  industrial hazards. He was a recipient of an MD from Harvard in 1902 and was involved in the development of the concept of establishing a laboratory to conduct research on industrial hazards. His contributions
  to the education of undergraduate and graduate students were also significant, with twelve undergraduates involved in activities of the laboratory and several staff members serving as tutors for students
  in biochemistry.
