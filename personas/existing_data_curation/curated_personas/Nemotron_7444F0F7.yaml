personas:
  professional: Eileen Jung, a budding teenage thespian, channels their love for structure into meticulously rehearsed drama club performances while improvising with spontaneous karaoke sets that keep the
    school hall alive.
  sports: Eileen Jung, an avid skateboarder at the Oakridge Skate Club, also roots for the Chicago Bulls in basketball and the Chicago Cubs in baseball, blending casual park sessions with occasional youth
    soccer league matches.
  arts: Eileen Jung, a dedicated member of the school drama club and choir, curates indie playlists featuring Ariana Grande, Billie Eilish, and Harry Styles, and posts short vlog mixes that showcase their
    DJ flair, while also sketching set designs during downtime.
  travel: Eileen Jung dreams of a summer road trip to the Grand Canyon after saving up birthday money, has visited nearby Lake Michigan for a family beach day, and hopes to explore the vibrant streets of
    New York City for its Broadway shows, balancing a love for adventure with parental budget limits.
  culinary: Eileen Jung, a self‑taught snack chef, loves whipping up pepperoni pizza with extra cheese, making crunchy chicken tacos with cilantro lime salsa, and experimenting with avocado toast topped
    with a drizzle of sriracha, often sharing these dishes at karaoke hangouts.
  core: Eileen Jung is a socially‑charged teen who balances a love for performance and skateboarding with impulsive spending and occasional anxiety, thriving on structure yet embracing spontaneous creativity.
background:
  cultural: Eileen’s cultural background is rooted in the Midwestern, small‑city environment of Flint, Michigan. She comes from a white family with generational ties to the area, reflecting a blend of German,
    Irish, and broader Northern European ancestry common among many Michigan residents. Growing up in a city marked by an industrial legacy, economic challenges, and the ongoing water‑crisis has instilled
    in her a strong sense of community resilience, practicality, and modesty. Local traditions such as high‑school football Fridays, neighborhood block parties, and church gatherings are familiar parts
    of her life, while the city’s diverse population and advocacy movements—especially around environmental justice—have shaped her emerging interest in community media and social outreach.
attributes:
  skills: '[''Public speaking and facilitation'', ''Event organization for school/social gatherings'', ''Basic video editing for social media'', ''Peer tutoring in math and English'', ''Budgeting and personal
