  hobbies: '[''Drama club acting and stagecraft'', ''School choir singing'', ''Skateboarding at local park'', ''Creating music playlists and informal DJing'', ''Vlogging and short video creation'', ''Reading
    contemporary Young Adult fiction'', ''Volunteering at food drives and community events'', ''Sketching and journaling for stress relief'']'
  career_goals: Eileen dreams of a career that lets her stay in the spotlight while making a tangible difference in her community. She hopes to become a community radio host or local news reporter, where
    she can blend storytelling, interview skills, and advocacy for issues like the Flint water crisis. She also envisions studying communications or media production in college and eventually producing
    a youth‑focused podcast that amplifies the voices of her peers. As a secondary ambition, she would like to work as a youth mentor or after‑school program coordinator, using her practical skills to help
    younger students navigate school and develop confidence.
