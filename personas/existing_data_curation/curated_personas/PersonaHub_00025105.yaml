persona_description: Kristina Roberts, Afterhours Manager at Auburn Hospital in Western Sydney, is a dedicated and experienced professional with a strong background in waste management and recycling. She
  has a deep understanding of the challenges faced by hospitals in managing waste, particularly in terms of reducing environmental impact and increasing recycling rates. Kristina is known for her leadership
  and innovative approach to problem-solving, and has successfully implemented programs to encourage staff at Auburn Hospital to recycle and divert waste from landfill. Her expertise in waste management
  and recycling has made her a valuable asset to the hospital and the broader healthcare industry.
