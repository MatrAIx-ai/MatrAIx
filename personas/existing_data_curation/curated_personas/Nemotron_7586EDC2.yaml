    Engagement'', ''Event Planning'']'
  hobbies: '[''Visiting Art Galleries & Museums'', ''Painting & Watercolor'', ''Attending Live Music & Theater'', ''Book Club'', ''Wine Tasting Events'', ''Hiking in the Bay Area'', ''Cooking & Hosting
    Dinner Parties'', ''Traveling to Cultural Destinations'', ''Community Volunteering (Arts Programs)'', ''Dancing (Salsa, Social Dance)'', ''Photography'', ''Gardening'']'
  career_goals: Looking ahead, Marilyn aims to transition into a senior leadership role such as Program Manager or Director of a Project Management Office, where she can shape strategic initiatives and
    mentor the next generation of project managers. She is passionate about leading interdisciplinary projects that blend technology, sustainability, and the arts, reflecting her love for varied experiences
    and unconventional thinking. Marilyn also envisions launching a part‑time consultancy focused on helping non‑profits and community arts organizations develop effective project frameworks, allowing her
    to give back while maintaining a flexible work‑life balance. Ultimately, she seeks to leave a lasting impact by fostering collaborative cultures that prioritize both results and the well‑being of team
    members.
