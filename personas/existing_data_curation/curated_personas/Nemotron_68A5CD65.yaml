personas:
  professional: Carlos Ramirez is an aspiring comic‑artist who spends afternoons sketching vibrant superhero characters and experimenting with stop‑motion animation; they channel their boundless imagination
    into detailed storyboards while embracing a relaxed, flexible approach to school deadlines.
  sports: Carlos Ramirez is a spirited member of the Menifee United youth soccer club, playing forward on the town field after school, they also cheer for the LA Galaxy during MLS season and proudly wear
    a Los Angeles Dodgers cap for weekend baseball games.
  arts: Carlos Ramirez is a budding visual storyteller who fills sketchbooks with comic‑style heroes inspired by Stan Lee and Pixar, builds elaborate LEGO sets that become backdrops for their stop‑motion
    videos, and thrives in school‑theatre improv where they channel the energy of classic performers like Jim Carrey.
  travel: Carlos Ramirez loves weekend road trips, having explored San Diego’s seaside boardwalk and the neon lights of Disneyland, they frequently hike the trails of Joshua Tree during summer, and they
    dream of visiting the Grand Canyon and the bustling streets of Tokyo for future adventures.
  culinary: Carlos Ramirez is a junior kitchen helper who chops tomatoes for fresh salsa, rolls tortillas for tacos al pastor, and mixes guacamole with lime, cilantro, and a hint of jalapeño; they favor
    the bright flavors of corn and cilantro and love adding pineapple to salsa for a sweet twist.
  core: Carlos Ramirez is a curious ten‑year‑old whose imagination fuels comic sketches, LEGO adventures, and spontaneous soccer games, while they often forget homework deadlines and indulge in impulsive
    snack purchases.
background:
  cultural: Carlos is a first‑generation Mexican‑American raised in Menifee, CA. His household blends English and Spanish, and he participates in cultural celebrations such as Día de los Muertos and Cinco
    de Mayo, where he helps design decorative altars and learns traditional crafts. His family’s Mexican heritage influences his food, music, and storytelling traditions, fostering a strong sense of community
    and pride in his dual cultural identity.
attributes:
  skills: '[''drawing and sketching'', ''digital storytelling with Scratch'', ''LEGO building and design'', ''basic Spanish-English translation'', ''group collaboration and informal leadership'', ''improvisational
    acting'', ''creative problem solving'', ''rhythmic sense from learning drums'']'
  hobbies: '[''drawing comics'', ''building LEGO creations'', ''stop‑motion video making'', ''playing soccer with friends'', ''school theatre improv'', ''hiking and nature collecting'', ''learning Mexican
    folk songs on guitar'']'
  career_goals: Carlos dreams of turning his vivid imagination into a career where art meets technology. He aspires to become a video game designer or animated storyteller who can craft immersive worlds
    that blend Mexican cultural motifs with futuristic concepts. He also imagines someday leading a community makerspace where kids can collaborate on creative projects, combining his love for group activities,
    art, and innovative tech.
