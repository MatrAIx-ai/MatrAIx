  career_goals: Su aims to rise to a senior managerial or partner position at a leading public accounting firm, where she can shape audit methodology and champion the integration of emerging technologies
    such as AI and blockchain. She envisions creating a niche practice focused on sustainability reporting and fintech startups, applying her imaginative approach to financial analysis. Balancing her competitive
    ambition with a desire for flexibility, she seeks to implement a more adaptable work schedule that mitigates stress and allows better work‑life balance. Additionally, she plans to earn CPA leadership
    certification, mentor women accountants from multicultural backgrounds, and eventually launch a boutique consultancy that blends rigorous audit standards with innovative, client‑centric solutions.
