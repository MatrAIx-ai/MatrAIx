personas:
  professional: Su Kim, a certified public accountant specializing in forensic auditing, blends rigorous analytical precision with a vivid imagination and competitive drive, championing AI-driven audit
    methodologies and blockchain verification while they advocate for flexible, stress‑aware work practices within a leading public accounting firm.
  sports: Su Kim, an avid hiker who conquers the Lakefront Trail on weekends, also burns energy at weekly salsa dancing nights and follows the Chicago Cubs, Chicago Bulls, and Chicago Blackhawks, while
    they belong to a local hiking club and occasionally join a midsummer recreational softball league.
  arts: Su Kim, a dedicated watercolorist and frequent attendee of West Loop gallery openings, draws inspiration from artists like Julie Mehretu, Mark Bradford, and Ai Weiwei, while they also dissect speculative
    fiction novels in a philosophy‑focused book club and unwind to the eclectic sounds of Tash Sultana and Kamasi Washington.
  travel: Su Kim, a curious traveler, prefers thoughtfully planned week‑long trips that blend cultural immersion and culinary exploration, such as a spring visit to Italy’s Tuscany for wine and art, a summer
    hike through the Canadian Rockies, and a spontaneous weekend brunch tour of the neighboring Chicago suburbs, and they balance these adventures with a flexible work schedule and family commitments.
  culinary: Su Kim, a self‑taught home cook, delights in crafting fusion dishes like miso‑glazed salmon tacos with pickled daikon and cilantro, perfecting spice blends learned in heritage cooking classes,
    while they regularly seek out innovative dining spots serving ramen‑bourbon braises and kimchi‑infused tacos, reflecting a palate that craves both tradition and experimentation.
  core: Su Kim, a high‑energy CPA with a painter’s imagination, balances a competitive climb toward partnership with a love for salsa, speculative fiction, and stress‑busting yoga, all while occasionally
    letting a disorganized schedule and lingering anxiety hijack their perfect‑by‑Friday instincts.
background:
  cultural: Su Kim is a second‑generation Korean‑American. Her parents emigrated from South Korea in the early 1980s and settled in the Chicago area, where a vibrant Korean community thrives. Growing up
    bilingual, she celebrated traditional holidays such as Seollal and Chuseok, attended Korean language school, and internalized the cultural emphasis on education, respect for elders, and collective responsibility.
    While she has fully embraced American professional norms in her accounting career, she remains actively involved in Korean cultural life—frequenting the Korean Cultural Center of Chicago, participating
    in community festivals, and supporting Korean-owned businesses. Her marriage to a fellow Korean‑American reinforces her connection to both her heritage and the broader multicultural fabric of Chicago.
