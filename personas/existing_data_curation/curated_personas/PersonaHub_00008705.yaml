persona_description: A researcher or writer who is interested in exploring the significance of childhood experience of woodlands and other green or natural places in relation to adult patterns of use and
  attitudes to such places. They may be looking for insights into the emotional and physical benefits of green space, and how these experiences shape attitudes towards visiting green spaces as an adult.
  They may also be interested in understanding how the relationship between childhood visits and adult visits to green spaces is influenced by factors such as location, cultural background, and personal
  experiences.
