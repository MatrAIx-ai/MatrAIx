  hobbies: '[''Watercolor Painting'', ''Creative Writing'', ''Reading Contemporary Fiction'', ''Visiting Art Galleries'', ''Community Theater'', ''Gardening'', ''Cooking Experimental Recipes'', ''Puzzle
    Solving'', ''Philosophical Discussion Groups'']'
  career_goals: In the coming years Jas aims to transition into a mentorship role within her retail environment, sharing her deep knowledge of visual merchandising and customer engagement with younger associates.
    She envisions launching a small boutique that showcases locally sourced artisan goods, allowing her to fuse her retail expertise with her passion for novelty and abstract art. Beyond business, she hopes
    to volunteer as a trainer for a community youth employment program and to curate a neighborhood art exhibition that highlights emerging talent, thereby reinforcing her commitment to harmony, cooperation,
    and community enrichment.
