    and leading group games", "Nature walks and collecting natural objects"]'
  career_goals: Even at six, Carol imagines a future where she can blend her love for art, storytelling, and discovery. She hopes to become a visual artist who paints murals that spark wonder, or a children's
    television host who uses humor and song to teach new ideas. She is also fascinated by science and dreams of being an explorer or researcher, inspired by her curiosity about how things work, though she
    sometimes feels anxious about the challenges such paths might entail. Ultimately, she seeks roles that let her share ideas, capture attention, and inspire other children.
