  career_goals: Alexander dreams of earning a spot on his middle‑school soccer team this year and eventually playing varsity in high school, with the long‑term ambition of becoming a sports coach or sports
    therapist to help young athletes stay healthy. He also enjoys tinkering with technology, so he aims to enroll in a high‑school robotics program and later pursue a degree in engineering or computer science,
    where he can combine his practical mindset with creative problem‑solving. He sees himself attending a community college in Riverside County to gain certifications in data analysis, which will give him
    a stable and structured career path.
