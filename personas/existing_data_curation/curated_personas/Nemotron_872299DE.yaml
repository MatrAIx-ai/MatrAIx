personas:
  professional: Alexander Rodriguez is a budding game developer who combines his love for step‑by‑step LEGO building with his knack for coding simple Scratch games, using his practical, organized mindset
    to meticulously test each feature while thriving on collaborative feedback from friends in online forums.
  sports: Alexander Rodriguez plays as a forward for the Midtown Thunder U12 soccer club, attends after‑school drills and weekend pickup games with enthusiasm, idolizes the City United FC in the national
    league, and follows a disciplined warm‑up routine to manage his asthma while keeping his competitive edge.
  arts: Alexander Rodriguez channels his creative energy into assembling LEGO Marvel sets, sketching comic strips inspired by Stan Lee and Alan Moore, dancing to the beats of Bad Bunny and Marc Anthony
    at family gatherings, and designing pixel‑art landscapes in Minecraft reminiscent of Studio Ghibli’s whimsical style.
  travel: Alexander Rodriguez dreams of exploring the colorful streets of Havana, the historic forts of San Juan, and the bustling theme parks of Orlando, preferring family‑organized trips with detailed
    itineraries that include kid‑friendly museums, soccer fields, and occasional spontaneous beach outings.
  culinary: Alexander Rodriguez enjoys helping his family prepare arroz con gandules, often adding diced mango for a sweet twist, mastering the art of chocolate chip cookies, and experimenting with jalapeño‑topped
    homemade pizza, showcasing his intermediate cooking skills that blend tradition with modern flavor adventures.
  core: Alexander Rodriguez is an organized, energetic twelve‑year‑old who balances a love for LEGO, coding, and soccer with a lingering anxiety that fuels his meticulous routines, occasionally forgetting
    to finish a Minecraft build when a new soccer match is announced.
background:
  cultural: Alexander comes from a Puerto Rican family that migrated to Southern California in the early 2000s. At home, Spanish is spoken alongside English, and family meals often feature Puerto Rican
    staples such as arroz con gandules, alcapurrias, and pasteles, especially during holidays like Three Kings' Day. He participates in local cultural events at the Riverside County Latino Center, where
    he learns traditional bomba and plena rhythms. His upbringing blends Puerto Rican customs—like close‑knit family gatherings, respect for elders, and lively music—with the suburban lifestyle of Calimesa,
    giving him a bicultural identity that informs his friendships and community involvement.
