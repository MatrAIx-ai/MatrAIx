  career_goals: Although retired from formal employment, Joanna aims to channel her expertise into mentorship and community service. She plans to volunteer as a STEM mentor for local high school students,
    assist the Bluffton historical society with preservation projects, and author a memoir that chronicles her journey as a woman in engineering during the 1970s. She also aspires to complete a sustainable
    garden renovation on her property, further integrate smart‑home technology for ease of living, and maintain her health through regular yoga and mindfulness practices to manage stress.
