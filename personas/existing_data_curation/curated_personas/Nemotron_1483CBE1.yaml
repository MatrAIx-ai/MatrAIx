  hobbies: '[''Salsa dancing'', ''Karaoke'', ''Pick‑up basketball'', ''Cooking Southeast Asian cuisine'', ''Street photography'', ''Yoga'', ''Community volunteer events'', ''Urban hiking'']'
  career_goals: Driven by her competitive spirit and desire to innovate, Anh Anh aims to become a leading advocate for health equity in the Bronx. She plans to secure a fellowship in health policy, launch
    a community clinic focused on immigrant families, and publish research on physician stress management. Ultimately, she envisions a department leadership role where she can integrate cutting‑edge treatments
    with pragmatic solutions, shaping policy that bridges the gap between curiosity‑driven medical advances and the everyday needs of her patients.
