personas:
  professional: Anh Manalo is a board‑certified emergency physician in the Bronx who leverages rapid diagnostic reasoning and multilingual counseling to serve a diverse patient population, balancing a curious
    drive for innovative treatments with a practical, improvisational style that keeps patient care seamless despite a relaxed approach to administrative paperwork.
  sports: Anh Manalo fuels their competitiveness on the basketball court by joining a local Bronx Community Basketball League and cheering for the New York Knicks, balances endurance training with weekly
    yoga sessions, and squeezes in a spring 5K at Central Park to stay fit.
  arts: Anh Manalo captures the Bronx’s vibrant street murals through photography, draws inspiration from graffiti legends like Banksy and Basquiat, grooves to salsa and reggaeton icons such as Celia Cruz
    and Bad Bunny, and attends live jazz shows at the Bronx’s historic Bronx Performing Arts Center.
  travel: Anh Manalo’s travel style blends last‑minute adventure with purposeful cultural immersion, having explored Manila and Ho Chi Minh City to practice Tagalog and Vietnamese, they relish weekend escapes
    to the Catskills and dream of trekking the rice terraces in Bali and the fjords of Iceland.
  culinary: Anh Manalo is an intermediate home cook who reimagines Southeast Asian classics—spicing up pho with smoked truffle oil, fusing adobo with miso broth, and layering lemongrass‑infused laksa with
    coconut milk—while always keeping fresh herbs like Thai basil and kaffir lime on hand.
  core: Anh Manalo is a high‑energy emergency physician who balances a relentless curiosity for medical innovation with a laid‑back, sometimes disorganized approach to life, channeling stress into salsa
    dancing, street‑art photography, and experimental cooking.
background:
  cultural: Anh Anh is a first‑generation American of Vietnamese‑Filipino heritage. Raised in a bilingual household where Tagalog and Vietnamese were spoken alongside English, she celebrates cultural traditions
    such as Tet, Lunar New Year, and Catholic holidays. The collectivist values instilled by her family emphasize community responsibility, which she channels into her medical practice serving the diverse
    Bronx population. Her Southeast Asian roots shape her palate, music preferences, and a resilient outlook that helps her navigate the pressures of a demanding profession.
