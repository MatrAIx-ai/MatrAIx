  hobbies: '["Cooking traditional Ecuadorian cuisine", "Salsa and merengue dancing", "Gardening", "Hiking in the Blue Ridge Mountains", "Reading mystery novels", "Volunteering at a Spanish‑language literacy
    program"]'
  career_goals: Nicole aims to advance from her current administrative assistant role to an office manager position within the next three years. She plans to earn the Certified Administrative Professional
    (CAP) credential and deepen her expertise in project coordination and staff supervision. Long‑term, she envisions leading a multicultural community outreach program that connects the growing Ecuadorian
    and broader Latinx population in Forsyth County with local resources, and eventually opening a small café featuring traditional Ecuadorian cuisine as a cultural hub.
