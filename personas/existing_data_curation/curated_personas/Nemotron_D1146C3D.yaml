personas:
  professional: Nicole Barraza, a 35‑year‑old administrative professional, combines bilingual fluency, razor‑sharp calendar management, and a calm demeanor under pressure to keep the office running like
    a well‑oiled machine, but they also embrace spontaneous willingness to take on last‑minute projects, which sometimes creates a chaotic inbox they struggle to fully organize.
  sports: Nicole Barraza tackles fitness by hiking the Blue Ridge trails on weekends, joining a local amateur salsa‑fitness class, and cheering for the Charlotte FC while using a smartwatch to track steps,
    though they often skip their scheduled yoga session when work demands spike.
  arts: Nicole Barraza immerses themselves in creative expression through salsa and merengue dancing at community events, devouring mystery novels by Agatha Christie, and supporting local theater productions
    like Mystic River while they listen to the timeless vocals of Celia Cruz and contemporary pop star Rosalía.
  travel: Nicole Barraza plans travel around a blend of adventure and family obligations, favoring short road trips to Asheville’s Blue Ridge Parkway and weekend cultural immersions in New Orleans during
    Mardi Gras, while they dream of an extended stay in Oaxaca to explore market cuisines and language workshops.
  culinary: Nicole Barraza channels culinary passion into cooking traditional dishes such as encebollado and ceviche, seasoning each plate with fresh cilantro, ají, and lime harvested from their backyard
    herb garden, though they sometimes over‑season in enthusiasm, prompting friendly teasing from dinner guests.
  core: Nicole Barraza balances meticulous office organization with spontaneous community activism, fuels their days with spicy home‑cooked meals, and they occasionally let a chaotic inbox betray their
    otherwise structured demeanor.
background:
  cultural: Nicole is a first‑generation Ecuadorian‑American whose family maintains strong ties to their homeland. She grew up speaking Spanish at home and celebrates Ecuadorian holidays such as Carnaval,
    Día de los Difuntos, and the feast of the Virgin of Guápulo. Her cultural identity blends Andean traditions with the Southern hospitality of North Carolina, influencing her love for communal meals,
    music, and family gatherings. Being part of a vibrant Latinx community in Lewisville, she actively participates in local cultural festivals and serves as a bridge between her heritage and her adopted
    community.
attributes:
  skills: '["Calendar management", "Document preparation", "Data entry", "Microsoft Office Suite", "Google Workspace", "Bilingual communication (Spanish/English)", "Customer service", "Travel coordination",
