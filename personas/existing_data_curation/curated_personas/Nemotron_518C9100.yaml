    ''Basic Video Editing (iMovie)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and painting (watercolor, acrylic)'', ''Street photography'', ''Reading contemporary fiction and art theory'', ''Listening to diverse music
    (Latin jazz, indie folk)'', ''Cooking family recipes and experimenting with fusion cuisine'', ''Yoga and mindfulness practice'', ''Volunteering at youth centers and organizing mural projects'', ''Attending
    open‑mic poetry nights'']'
  career_goals: Yvette plans to complete her GED within the next year and then enroll in a community‑college program in Visual Communications or Graphic Design. She aims to build a professional portfolio
    that showcases her ability to blend contemporary design with Latino cultural motifs. In the long term, she aspires to work as a graphic designer for a cultural nonprofit or a creative agency that creates
    inclusive campaigns, eventually moving toward a creative‑director role. Parallel to her design career, Yvette dreams of launching a community‑based art initiative in Newton Center that offers free workshops
    and mentorship for at‑risk youth, using her organizational talents and love for art education. She also hopes to travel to Mexico and Central America to study traditional art forms, enriching her design
    perspective. To support these ambitions, she intends to earn Adobe Certified Associate credentials and secure internships that provide real‑world experience.
