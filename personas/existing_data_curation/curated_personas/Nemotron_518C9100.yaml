personas:
  professional: Yvette Martinez is an aspiring visual communications student who leverages fluency in English and Spanish, solid graphic design skills in Photoshop and Canva, and a methodical project-management
    style to craft digital illustrations that fuse contemporary design trends with personal storytelling, all while juggling GED studies, community art workshops, and a growing social‑media portfolio.
  sports: Yvette Martinez stays active by practicing yoga three times a week at the Newton Community Center, cheering for the Boston Celtics and New England Patriots on game nights, and playing recreational
    soccer with a local Newton youth league team each spring, blending low‑impact fitness with passionate fandom.
  arts: Yvette Martinez immerses themselves in Boston’s art scene by sketching at the Museum of Fine Arts, capturing street life in Newton with a Canon EOS, listening to indie folk artists like Bon Iver
    and Latin jazz legends such as Tito Puente, and delivering spoken‑word performances at open‑mic nights inspired by Maya Angelou and Rupi Kaur.
  travel: Yvette Martinez favors thoughtfully planned trips that blend cultural immersion with budget‑conscious choices, having explored New York City’s galleries, day‑trips to coastal Maine, and dreaming
    of a summer study tour in Oaxaca and Guatemala to learn traditional textile techniques.
  culinary: Yvette Martinez enjoys cooking family recipes like tamales and empanadas—experimenting with fillings of pork, cheese, and roasted chilies—and creating fusion dishes that marry masa‑based bases
    with Mediterranean herbs, often using ingredients such as corn masa, panela cheese, and fresh cilantro.
  core: Yvette Martinez is a creatively disciplined 18‑year‑old who balances art‑filled days with meticulous planning, occasional coffee‑shop procrastination, and a habit of sketching whenever inspiration
    strikes.
background:
  cultural: Yvette is a second‑generation Mexican‑American who grew up in a bilingual household in Newton Center. Her parents immigrated from Mexico and instilled in her a strong sense of family, community,
    and cultural pride. She celebrates traditional holidays such as Día de los Muertos and enjoys family gatherings centered around Mexican cuisine. At the same time, she navigates mainstream American culture
    through school, community events, and friendships in the Boston area. This bicultural experience shapes her artistic sensibility, leading her to incorporate vibrant Mexican motifs and contemporary design
    elements in her work. She participates in local Latino cultural organizations, mentors younger members, and values the blend of heritage and modernity that defines her identity.
attributes:
  skills: '[''Bilingual (English/Spanish)'', ''Basic Graphic Design (Adobe Photoshop, Canva)'', ''Digital Illustration'', ''Digital Photography and Photo Editing (Lightroom, Photoshop)'', ''Social Media
