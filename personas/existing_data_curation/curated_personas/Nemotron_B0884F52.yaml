  career_goals: She dreams of turning her love for stories and art into a future as a graphic novelist or concept artist for animated films. Lynn also imagines hosting a kid‑focused science‑and‑art TV show
    where she can share curious ideas and bring viewers into fantastical worlds. In school she hopes to win creative writing contests and eventually guide a community youth program that encourages other
    kids to explore imagination through art and technology.
