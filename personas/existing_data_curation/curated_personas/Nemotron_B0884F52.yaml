personas:
  professional: Lynn Thompson, an aspiring comic creator and junior game level designer, blends vivid imagination with a talent for storytelling, turning LEGO constructions into storyboard sketches while
    navigating school assignments with a laid‑back, often chaotic schedule; they thrive on talkative brainstorming sessions and let their competitive streak push each panel toward perfection.
  sports: Lynn Thompson, a member of the Riverdale Runners youth soccer club and a fervent fan of the Chicago Cubs and Chicago Bulls, dives into weekend pick‑up basketball games with friends, enjoys the
    thrill of competitive board‑game strategy with a physical twist, yet they prefer the flexibility of unstructured park play over regimented practice schedules.
  arts: Lynn Thompson, an avid comic doodler and LEGO architect, draws inspiration from the fantastical worlds of Neil Gaiman, the whimsical animation of Hayao Miyazaki, and the energetic beats of Imagine Dragons,
    often staging improv skits with friends that blend storytelling, music, and spontaneous costume design, and they love to share their creations with classmates.
  travel: Lynn Thompson, a spontaneous explorer, loves weekend trips to the local science museum and the nearby state park’s splash pad, dreams of touring the Harry Potter Studio in London and visiting
    Japan’s Akihabara district to hunt rare trading cards, and they plan each adventure on a doodled map rather than a rigid itinerary.
  culinary: Lynn Thompson, a budding kitchen experimenter, favors pepperoni pizza, cheesy mac‑and‑cheese, and strawberry‑banana smoothies, enjoys assembling custom LEGO‑shaped sandwich bites, but constantly
    argues with parents about adding too much hot sauce, and proudly masters the art of baking chocolate chip cookies after watching a YouTube tutorial.
  core: Lynn Thompson is a hyper‑creative, talkative nine‑year‑old who channels competitive energy into comics and LEGO towns, worries about every new challenge, and they can’t resist a fresh trading‑card
    pack, even while leaving a trail of half‑finished projects behind.
background:
  cultural: Lynn grew up in Lakeville, a suburban community in Dakota County, Minnesota, where Midwestern values of friendship, modesty, and community participation are emphasized. Her family celebrates
    traditional American holidays such as Thanksgiving and Christmas, and she often joins neighborhood events like the county fair and local lake clean‑ups. The public elementary school she attends offers
    strong support for arts and STEM, exposing her to a mix of cultural perspectives while maintaining a largely White, middle‑class demographic. These surroundings nurture her love for outdoor recreation,
    collaborative play, and creative expression.
