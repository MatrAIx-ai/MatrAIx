  career_goals: Moises aims to advance to an operations manager role within the next five years, leading multiple production facilities and driving strategic initiatives for efficiency and sustainability.
    He plans to earn a Six Sigma Black Belt certification and enroll in advanced leadership development programs. He also aspires to mentor emerging talent and eventually launch his own consulting firm
    specializing in lean manufacturing and workforce development for Latino-owned businesses. Additionally, he seeks to achieve a healthier work-life integration to reduce stress and maintain personal well‑being
    while continuing to contribute to his community.
