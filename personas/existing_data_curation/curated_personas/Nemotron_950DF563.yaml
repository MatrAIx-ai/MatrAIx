personas:
  professional: Moises Castillo is a veteran manufacturing operations leader with three decades of hands‑on experience in lean production, Six Sigma, and PLC programming, who blends analytical rigor with
    an appreciation for art to drive creative continuous‑improvement initiatives while they coach diverse teams toward safety and efficiency.
  sports: Moises Castillo follows Dallas’s sports scene ardently, cheering for the Cowboys on Sundays, attending Mavericks games when the schedule permits, and enjoys weekend pick‑up soccer matches at a
    local community field where they occasionally join a casual cumbia‑spun halftime dance routine.
  arts: Moises Castillo immerses themselves in Dallas’s vibrant art world, frequenting the Dallas Museum of Art to study works by Georgia O’Keeffe, snapping black‑and‑white street‑scene photographs inspired
    by the contrast in Edward Hopper’s prints, and they paint watercolors of urban skylines after evenings spent listening to the haunting guitar of José González.
  travel: Moises Castillo favors a mix of purposeful and leisurely travel, having recently explored the colonial architecture of Antigua, Guatemala, while they plan a road trip to the Texas Hill Country
    to attend the Austin City Limits festival, all balanced against limited vacation days and a desire to return home for their nightly reading sessions on philosophy.
  culinary: Moises Castillo’s culinary repertoire blends a skilled hand at cooking tender pupusas stuffed with loroco and pork, a penchant for slow‑cooking tamales with rich masa and chilies, and occasional
    experiments with locally sourced ingredients like heirloom tomatoes and blue cheese in their watercolor‑inspired plating presentations, while they often host informal tasting gatherings for friends
    and neighbors.
  core: Moises Castillo fuses a disciplined engineering mind with a creative soul, juggling relentless improvement projects, a love of photography, and a lingering worry about health and finances while
    they never miss a chance to sway to salsa at community festivals.
background:
  cultural: Moises was born to Salvadoran immigrant parents and grew up in a bilingual household that blended the rich traditions of El Salvador with the broader Texan culture. He maintains strong ties
    to his heritage through family gatherings, traditional celebrations such as Holy Week (Semana Santa) and the Day of the Dead, and by preserving the Spanish language. In Dallas, he participates in the
    local Salvadoran community, attending church services, community festivals, and supporting Salvadoran small businesses. His cultural identity influences his values of family, respect, hospitality, and
    a communal work ethic, which he brings to both his professional and personal life.
