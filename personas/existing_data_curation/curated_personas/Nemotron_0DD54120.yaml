    in technical troubleshooting'', ''Customer service and conflict resolution'']'
  hobbies: '[''Playing soccer with a local youth league'', ''Shooting hoops at the community center'', ''Building and restoring scale model cars'', ''Cooking traditional Mexican dishes with family'', ''Hiking
    San Bernardino foothill trails'', ''Playing strategy video games such as Minecraft and SimCity'', ''Volunteering at community food drives'', ''Video editing and basic Python scripting'', ''Listening
    to regional Mexican music'']'
  career_goals: Jesus aims to channel his practical skill set into a career in automotive technology and engineering. In the short term, he plans to enroll in the automotive technology program at San Bernardino
    Community College, earn an associate degree, and secure an apprenticeship at a reputable auto shop in Rancho Cucamonga. He is determined to obtain ASE certifications and eventually become a master technician.
    In the longer term, he hopes to open his own garage that offers reliable service to his community while employing and mentoring other young Mexican‑American workers. He also remains open to studying
    civil engineering to contribute to local infrastructure projects, reflecting his interest in structured, impact‑driven work. Throughout his career path, he intends to support his family financially
    and serve as a role model for other teens in his neighborhood.
