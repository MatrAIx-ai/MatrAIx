  hobbies: '[''Competitive strategy video gaming'', ''Chess'', ''Robotics kit building and programming'', ''Reading science‑fiction and engineering literature'', ''Jogging in local parks'', ''Cooking traditional
    Guatemalan meals'', ''Listening to Marimba music'']'
  career_goals: Alfonso aims to earn his GED within the next year and enroll at Santa Ana College, majoring in civil engineering with a focus on sustainable, affordable housing for underserved communities.
    He plans to secure a scholarship by maintaining top grades in math and science, and to gain hands‑on experience through internships with local construction firms. In the long term, he envisions becoming
    a licensed civil engineer who designs resilient infrastructure in immigrant neighborhoods and eventually mentors younger students from similar backgrounds, helping them navigate academic and career
    pathways. He also hopes to combine his coding skills with engineering by developing software tools that streamline project planning for community development projects.
