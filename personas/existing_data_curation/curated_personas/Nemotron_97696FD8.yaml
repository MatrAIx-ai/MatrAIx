personas:
  professional: Frances Blue is a retired community volunteer who channels her budgeting savvy, event‑planning expertise, and gentle conflict mediation into orchestrating weekly church potlucks, while her
    love of routine and a relaxed attitude toward obligations keeps the gatherings warmly improvised.
  sports: Frances Blue is a devoted fan of the Carolina Panthers and follows the Charleston Battery’s season, and she participates in the local Senior Walking Club’s early‑morning strolls through the park,
    preferring gentle exercise over competitive sports.
  arts: Frances Blue finds solace in the gospel harmonies of Mahalia Jackson, the soulful riffs of Aretha Franklin, and the blues of B.B. King, while she also enjoys reading Southern historical novels like
    The Kitchen House by Kathleen Grissom, and she contributes her own voice to the church choir each Sunday.
  travel: Frances Blue favors leisurely road trips to nearby historic towns such as Savannah, Georgia, and Charleston, South Carolina, where she can explore antebellum architecture and sample local fare,
    and she dreams of visiting New Orleans for Mardi Gras but keeps her travel plans modest due to budget constraints.
  culinary: Frances Blue excels at making shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie, often seasoning with homegrown herbs like rosemary and thyme, and her cooking
    skill is seasoned by decades of family gatherings, though she sometimes over‑salts dishes when she’s distracted by worries.
  core: Frances Blue blends a steadfast love of routine with a gentle reluctance to over‑plan, offering warm, home‑cooked meals and heartfelt choir songs while quietly battling everyday worries and an occasional
    forgetfulness about appointments.
background:
  cultural: Frances is a member of the African American community in Lexington County, South Carolina, with roots that trace back to the Lowcountry Gullah heritage and the longstanding traditions of Southern
    Black churches. Her upbringing was shaped by church life, community gatherings, and the legacy of agricultural work, fostering values of practicality, routine, mutual support, and resilience. These
    cultural influences are evident in her cooking, storytelling, and dedication to preserving family and community traditions.
attributes:
  skills: '[''Cooking traditional Southern dishes'', ''Home gardening'', ''Quilting and sewing'', ''Knitting and crocheting'', ''Volunteer coordination'', ''Household budgeting'', ''Storytelling and oral
