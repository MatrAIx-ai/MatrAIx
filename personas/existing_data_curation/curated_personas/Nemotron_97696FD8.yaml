  hobbies: '[''Gardening'', ''Cooking family recipes'', ''Knitting and crocheting'', ''Quilting'', ''Church choir singing'', ''Reading historical novels'', ''Walking in nature'', ''Storytelling to younger
    family members'', ''Attending community potlucks'']'
  career_goals: In retirement, Frances aims to preserve her family's culinary heritage by compiling a cookbook of cherished recipes, mentor younger community members in gardening and quilting, and continue
    her volunteer work at the local church's senior services. She also hopes to maintain her health through daily walks and gentle exercise, establish a calming routine for stress management such as weekly
    bible study and simple breathing practices, and support her grandchildren's education and personal growth.
