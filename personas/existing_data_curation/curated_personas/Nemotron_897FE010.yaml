  career_goals: Grange dreams of a future where he can combine his love for structure, helping others, and problem‑solving into a career. He aspires to be an engineer—perhaps a civil or mechanical engineer—so
    he can design safe infrastructure for his community. He also imagines becoming a teacher or a youth mentor, where he can use his compassion and organizational skills to support other children. He hopes
    to eventually lead community projects, such as organizing neighborhood clean‑ups or running a youth robotics club.
