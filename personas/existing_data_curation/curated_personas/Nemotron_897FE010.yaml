personas:
  professional: Grange Payne is a budding engineer whose disciplined approach to LEGO construction and Scratch coding translates into an early fascination with problem‑solving, often drafting meticulous
    design blueprints before assembling any project, and they apply the same systematic mindset to every new challenge.
  sports: Grange Payne slots into the left‑field position for the neighborhood Little League club, the River City Rookies, idolizing the Kansas City Royals and emulating their disciplined batting stance,
    while in winter they practice ice skating at the community rink, cheer on the St. Louis Blues, and they love tracking personal stats after each game.
  arts: Grange Payne channels their creative spark through playing the recorder in the school band, often practicing John Williams' "Star Wars" theme, devouring the "Harry Potter" series by J.K. Rowling,
    re‑watching "The LEGO Movie" and sketching their own fantasy world‑building concepts, and they frequently improvise simple melodies after mastering recorder repertoire.
  travel: Grange Payne prefers meticulously planned family trips, relishing day‑by‑day itineraries that include a weekend visit to Legoland California, an educational excursion to the Smithsonian National
    Air and Space Museum in Washington, D.C., a dreamed‑of summer adventure to Tokyo’s LEGO store, and they enjoy checking off each activity on a printed schedule.
  culinary: Grange Payne enjoys assembling their own meals with the precision of a LEGO build, favoring homemade pepperoni pizza with extra mozzarella, creamy mac and cheese, and veggie sticks paired with
    hummus, and they can confidently follow a simple chocolate‑chip cookie recipe, though they sometimes over‑mix the batter in their eagerness.
  core: Grange Payne is a nine‑year‑old master of order who transforms everyday routines—from allowance budgeting to LEGO building—into structured projects, balancing a compassionate heart with a penchant
    for meticulous detail, even if they sometimes border on obsessive.
background:
  cultural: Grange grew up in Jenison, Michigan, a suburban community in Ottawa County. His family’s cultural roots are primarily Northern European, with many relatives tracing ancestry to German and Dutch
    settlers who arrived in the Midwest. The household reflects typical Midwestern values—politeness, community involvement, a strong work ethic, and participation in local traditions such as church services,
    Thanksgiving gatherings, and community fairs. He attends a public elementary school that emphasizes collaborative learning and extracurricular activities like Boy Scouts and school band, which shape
    his sense of belonging and social responsibility.
