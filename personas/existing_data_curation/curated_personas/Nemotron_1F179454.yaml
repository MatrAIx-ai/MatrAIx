  hobbies: '[''Oil painting'', ''Sketching'', ''Watercolor painting'', ''Clay sculpture'', ''Gardening (vegetables and ornamental plants)'', ''Acoustic guitar playing'', ''Reading philosophy and art theory'',
    ''Bilingual story-time volunteering'', ''Organizing cultural festivals'', ''Cooking traditional Mexican dishes'']'
  career_goals: Although retired from formal employment, Jose aims to cement his artistic and cultural legacy in the Pinole community. He plans to curate a traveling exhibition of Mexican folk art and his
    own paintings that tour senior centers and schools in Contra Costa County. He wishes to author a memoir interwoven with family recipes, stories, and photographs that celebrate the immigrant experience.
    Another important ambition is to establish a small intergenerational art studio in his backyard where he can mentor youth and grandchildren in painting, woodworking, and gardening, fostering a bridge
    between his heritage and contemporary creative practice.
