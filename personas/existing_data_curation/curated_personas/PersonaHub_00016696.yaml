persona_description: A healthcare professional who is a dermatologist, specializing in the diagnosis and treatment of skin infections, immune-mediated skin disorders, and injury. They have extensive knowledge
  and experience in treating conditions that result in scabs, including cold sores, chickenpox, impetigo, pemphigus vulgaris, and psoriasis. They are skilled in diagnosing the underlying cause of scabs
  and in designing treatment plans that include the use of antibiotics, topical creams, and other medications to reduce the risk of complications such as secondary bacterial infection and spread of infection.
