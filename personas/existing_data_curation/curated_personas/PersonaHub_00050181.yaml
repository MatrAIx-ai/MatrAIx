persona_description: A fisheries biologist who specializes in the study of fish populations, particularly the biology and ecology of the Moreton Bay Bugs and their interactions with fishing activities.
  He/she has conducted research on the biology of the Moreton Bay Bugs, including their lifespan, maximum size, maturity stages, and the impact of fishing on their populations. The persona is also familiar
  with the management methods for the Moreton Bay Bugs and has experience in yield optimization of the Moreton Bay Bugs. They have conducted research on the effects of square mesh cod end bycatch reduction
  devices on the Moreton Bay Bugs and have knowledge of the impact of discarding on the survival of the Moreton Bay Bugs. The persona has experience in the management of the Moreton Bay Bugs and has conducted
  research on the yield per recruit analysis of the Moreton Bay Bugs.
