personas:
  professional: Joel Withrow, a community mental‑health case manager who leverages strong data‑analysis skills in SPSS and R alongside crisis‑intervention expertise, merges their curiosity and practicality
    to craft evidence‑based programs while their sociable, caring demeanor builds trust among clients, colleagues, and community partners.
  sports: Joel Withrow, an avid intramural soccer player for the Norfolk County Strikers, regular hiker of the Blue Hills Reservation, and devoted fan of the Boston Red Sox, Celtics, and Patriots, also
    joins a weekend running club that meets at the Charles River, where they relish the blend of competition and community.
  arts: Joel Withrow, an enthusiast of indie folk music such as Fleet Foxes and Sufjan Stevens, frequent attendee of the American Repertory Theater’s productions, documentary aficionado of films like '13th'
    and 'The Social Dilemma,' and host of weekly board‑game nights featuring Settlers of Catan and Codenames, often shares their love of narrative with friends.
  travel: Joel Withrow, a weekend explorer who takes short road trips to Cape Cod’s lighthouse towns, the historic streets of Boston, and annual pilgrimages to Acadia National Park, dreams of a summer in
    Ireland to trace their ancestry, and balances travel plans with a modest vacation fund to accommodate their ongoing tuition costs.
  culinary: Joel Withrow, a self‑taught home chef, experiments with New England clam chowder, seasonal pumpkin ravioli, and Thai green curry, favoring fresh ingredients like local kale, wild‑caught cod,
    and locally sourced apples, while their occasional over‑indulgent late‑night snack habit includes binge‑eating microwave popcorn during game nights.
  core: Joel Withrow, a data‑savvy community mental‑health advocate, they balance anxiety‑fuelled worry with yoga, soccer, and experimental cooking, constantly seeking to turn curiosity into practical,
    people‑centered solutions.
background:
  cultural: Joel grew up in a suburban New England community near Boston, where a strong emphasis on education, civic duty, and seasonal traditions shaped his worldview. His family, with roots in the region’s
    middle‑class working‑professional class, valued volunteerism, community involvement, and a blend of independence and collective responsibility. He celebrates traditional holidays such as Thanksgiving
    and Christmas with multi‑generational gatherings, participates in local town events, and maintains a respect for the region’s cultural heritage while also embracing progressive, inclusive values common
    in contemporary Massachusetts society.
attributes:
  skills: '[''Client intake and assessment'', ''Crisis intervention'', ''Case documentation'', ''Data analysis (SPSS, R)'', ''Electronic Health Record (EHR) management'', ''Community resource navigation'',
