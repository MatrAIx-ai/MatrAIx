  hobbies: '[''Playing intramural soccer'', ''Hiking in the Blue Hills'', ''Reading non-fiction (psychology, sociology)'', ''Volunteering at the local food bank'', ''Attending community health fairs'',
    ''Practicing yoga and mindfulness'', ''Cooking experimental dishes'', ''Hosting weekly game nights'', ''Listening to podcasts on sustainability'', ''Gardening in his backyard'']'
  career_goals: Joel aims to transition into a supervisory role within the human services sector, eventually becoming a program director for a community mental‑health initiative. He plans to pursue a certification
    in case management and a Master of Social Work to deepen his clinical expertise. Long‑term, he hopes to integrate data analytics into service design, creating evidence‑based programs that improve client
    outcomes across Norfolk County. He also aspires to mentor junior staff and champion workplace wellness programs to address stress among his peers.
