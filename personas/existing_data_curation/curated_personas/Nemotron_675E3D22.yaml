personas:
  professional: Will Horsley, a seasoned graphic designer with mastery of Adobe Creative Suite, Figma, and Sketch, translates client concepts into compelling brand identities through meticulous typography,
    layout, and motion graphics, while their blend of curiosity and practicality, strong presentation skills, and collaborative leadership steers multidisciplinary teams toward balanced, client‑driven results.
  sports: Will Horsley stays active by hiking the Hudson Valley’s Shawangunk Ridge, participating in the NYC Trail Runners club, playing pickup soccer on Saturdays, and cheering for the New York Knicks,
    Rangers, and Yankees while maintaining a balanced fitness routine that mixes cardio hikes with occasional strength training.
  arts: Will Horsley immerses themselves in the arts by playing acoustic guitar at informal gatherings, performing in community theater productions, collecting vintage signage and poster art, attending
    gallery openings featuring artists like Ai Weiwei and Ansel Adams, and listening to folk‑rock icons such as Nick Drake and Sufjan Stevens, all of which fuel their storytelling‑rich design work.
  travel: Will Horsley combines meticulously planned weekend escapes to historic sites like Monticello and Gettysburg with spontaneous trips abroad to Florence’s Uffizi and Kyoto’s temples, seeking both
    the cultural depth of museum tours and the restorative solitude of Hudson Valley hikes, all while navigating a modest travel budget that prioritizes authentic local experiences.
  culinary: Will Horsley, an enthusiastic home chef, crafts elaborate multi‑course meals—such as coq au vin, handmade pappardelle with truffle oil, and rosemary‑infused lamb—using heirloom tomatoes, fresh
    herbs, and seasonal produce, and treats each dinner party like a theatrical performance, inviting friends to savor both the food and the storytelling behind each dish.
  core: Will Horsley thrives at the crossroads of design precision and artistic spontaneity, rarely turning down a vintage signage hunt, a midnight guitar jam, or a dinner‑party invitation, all while juggling
    a perpetual stream of client briefs and community workshops.
background:
  cultural: Will grew up in the suburban environs of Rockland County, New York, within a white American family with roots tracing back to Irish and English heritage. His upbringing was shaped by the region’s
    blend of small‑town community values and proximity to the cultural diversity of New York City. He celebrates traditional American holidays such as Thanksgiving and Fourth of July, while also embracing
    the multicultural art and music scenes that the metropolitan area offers. His humanities education fostered an appreciation for literature, theater, and historical narratives, which inform both his
    creative work and his personal interests. A strong emphasis on community involvement and lifelong learning characterizes his cultural outlook.
