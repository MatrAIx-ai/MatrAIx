  career_goals: Will aims to transition into an Art Director role within the next four years, overseeing a multidisciplinary design team that balances creative experimentation with client‑driven results.
    He plans to launch a boutique agency focused on socially responsible branding for nonprofit and sustainable businesses, integrating AR and interactive media into traditional campaigns. A long‑term ambition
    is to author a book on design thinking that bridges curiosity‑driven exploration with pragmatic workflow strategies, and to teach part‑time at a community college to nurture the next generation of designers.
