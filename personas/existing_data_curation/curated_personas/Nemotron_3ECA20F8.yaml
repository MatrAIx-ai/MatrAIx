  hobbies: '["Improv comedy workshops", "Pickup basketball", "Beach volleyball", "Kayaking", "Coastal photography", "Home cooking experiments", "Craft cocktail mixing", "Exploring new restaurants", "Playing
    guitar at open‑mic nights", "Volunteering at community festivals", "Board‑game and trivia nights", "Food‑culture podcast listening", "Instagram food blogging"]'
  career_goals: Ryan aims to leverage his on‑the‑floor experience into a hospitality management trajectory. In the short term, he plans to earn a food‑safety certification and become a shift supervisor
    within the next year. He intends to enroll in a community‑college associate program in hospitality or restaurant management to gain formal credentials. Over the next three to five years, his goal is
    to advance to restaurant manager, focusing on staff development, sustainable sourcing, and guest experience. Ultimately, Ryan dreams of opening a community‑focused gastropub in Branford that showcases
    local seafood, craft beers, and seasonal menus, while also hosting pop‑up events and local music nights. He also sees a future possibility of managing a boutique hotel in the New England coastal region,
    combining his love for service with his interest in tourism.
