  career_goals: Maryann envisions a future where she can combine her love of learning with a desire to help others. She expresses interest in becoming a teacher, inspired by educators who make learning
    fun and supportive. She also dreams of caring for animals as a veterinarian and is intrigued by community gardening projects that improve her town's environment. While she enjoys imagining these roles,
    she remains open and flexible, recognizing that her goals may evolve as she discovers new passions.
