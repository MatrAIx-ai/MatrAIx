personas:
  professional: Maryann Charles is a budding junior naturalist who combines her love of adventure books and creek exploration with practical sketch‑recording skills, applying a relaxed, flexible approach
    to her self‑appointed research projects while always keeping the group’s harmony in mind.
  sports: Maryann Charles plays for the Riverdale Rovers U11 youth soccer team, which is affiliated with the Atlanta United Academy, and cheers for the Atlanta Falcons (NFL) and the Atlanta Braves (MLB)
    during family game nights.
  arts: Maryann Charles spends afternoons drawing scenes inspired by the books of Rick Riordan while humming along to gospel classics by Mahalia Jackson and ukulele renditions of Israel Kamakawiwo'ole’s
    “Somewhere Over the Rainbow,” and they admire the animated storytelling of Pixar’s “Up.”
  travel: Maryann Charles enjoys weekend hikes in the nearby Appalachian foothills and has visited Washington, D.C.’s Natural History Museum on a school trip, while dreaming of future adventures in Yellowstone
    National Park and a family vacation to the Bahamas.
  culinary: Maryann Charles loves baking chocolate chip cookies, mastering the precise measurement of butter, sugar, and vanilla extract, and delights in snacking on apple slices with peanut butter, while
    also experimenting with simple homemade pizza topped with mozzarella and pepperoni.
  core: Maryann Charles is a ten‑year‑old explorer who blends curiosity about nature with a practical, easygoing attitude, harmoniously balances teamwork on the soccer field with solo sketching sessions,
    and adds a touch of gospel music to everyday life, all while occasionally misplacing her beads and forgetting to bring her inhaler.
background:
  cultural: Maryann grows up in a close‑knit Black family in Carlisle, Kentucky. Her heritage blends the rich traditions of African American culture—church gospel music, storytelling, and celebration of
    milestones like Juneteenth—with the rural Appalachian rhythms of her community, such as local festivals, country cooking, and an appreciation for the outdoors. Family gatherings feature soul‑food dishes
    prepared with locally grown produce, and the church remains a central hub for community support, music, and cultural education. These influences shape her values of cooperation, kindness, and a strong
    sense of identity.
