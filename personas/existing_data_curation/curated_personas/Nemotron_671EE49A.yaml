  career_goals: Jerome dreams of becoming a community leader who can inspire others—he imagines himself as a charismatic TV host for kids or a professional athlete on a basketball team, where he can be
    in the spotlight and motivate teammates. He also expresses a desire to help people, saying he wants to be a firefighter someday because he likes helping others in real‑world situations.
