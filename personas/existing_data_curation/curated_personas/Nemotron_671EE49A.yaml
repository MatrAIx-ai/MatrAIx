personas:
  professional: Jerome Lockett, a budding five‑year‑old entrepreneur running a neighborhood lemonade stand, combines a love for clear routines in setting up the stand with a flexible, spontaneous approach
    to pricing, while they are talkative and love being the center of attention, and a competitive streak pushes them to aim for the "Best Stand" award at the school fair.
  sports: Jerome Lockett, a lively member of the Little Tigers Soccer Club, dashes through weekend games with a love for the structured drills of coach Tim while also reveling in spontaneous tag sessions
    at the playground, and they idolize the City Cubs, cheering loudly at every broadcast, displaying a competitive drive that fuels their relentless pursuit of the top scorer title.
  arts: Jerome Lockett, an enthusiastic fan of Sesame Street and The Wiggles, spends afternoons drawing colorful pictures of Paw Patrol characters while singing along to the Frozen soundtrack, and they
    love performing impromptu dance routines for family gatherings, turning every moment into a stage where their talkative charm shines.
  travel: Jerome Lockett, an adventurous five‑year‑old who enjoys well‑planned trips to the local zoo and the beach at Sunny Shores, yet equally delights in spontaneous family road trips, dreams of visiting
    Disneyland and the Eiffel Tower, and they carefully pack a favorite stuffed animal for comfort while they remain skeptical of unfamiliar foods.
  culinary: Jerome Lockett, a budding foodie with a particular love for creamy mac and cheese, peanut butter‑jelly sandwiches, and crunchy carrot sticks, often helps stir batter for chocolate chip cookies
    with a plastic spoon, prefers familiar flavors but occasionally experiments with tiny bites of sushi, and they proudly claim the title of "snack champion" during playtime snack battles.
  core: Jerome Lockett, a five‑year‑old who thrives on orderly play yet embraces spontaneous fun, combines a talkative, competitive spark with a calm, stress‑resistant attitude, often forgetting to tidy
    up after adventures but always ready to lead the next game.
background:
  cultural: Jerome is raised in an African‑American family in Odessa, Texas. His household blends Southern traditions with West Texas community life; church services on Sundays provide gospel music, fellowship,
    and a sense of collective identity. Family gatherings feature soul‑food dishes like collard greens and cornbread, and he celebrates cultural milestones such as Juneteenth and Kwanzaa alongside local
    festivals. The multicultural atmosphere of Odessa, with its significant Hispanic influence, also exposes him to Spanish greetings and Tex‑Mex cuisine, broadening his cultural awareness.
