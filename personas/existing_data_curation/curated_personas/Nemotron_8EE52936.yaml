personas:
  professional: Paul Gorelick, a 40‑year‑old first‑line construction supervisor with over a decade of hands‑on experience, blends his arts‑humanities education with meticulous project management to guide
    crews, embed aesthetic and sustainable choices into blueprints, and communicate design intent with calm, assertive clarity.
  sports: Paul Gorelick, a member of the Portland Yacht Club, spends weekends sailing his sloop, runs the beach trail during summer, follows the Portland Sea Dogs and the New England Patriots, and squeezes
    in occasional weight‑lifting at the local gym to stay fit for the physical demands of construction work.
  arts: Paul Gorelick captures Maine’s rocky coastlines through a Leica camera inspired by Ansel Adams, paints watercolors echoing John Singer Sargent’s palette, designs community‑theater sets that echo
    the drama of his construction sites, strums acoustic guitar to Joni Mitchell tunes, and reads art‑history books on Monet and the Hudson River School.
  travel: Paul Gorelick plans his trips like a blueprint, favoring coastal destinations where he can sail and photograph—he’s trekked Acadia National Park, kayaked the Bay of Fundy, island‑hopped the Azores,
    and dreams of painting the cliffs of Cinque Terre while balancing a modest family budget.
  culinary: Paul Gorelick cooks fresh lobster rolls, pan‑seared cod with lemon‑butter, and garlic‑infused mussels, skillfully prepares a saffron‑rich paella for friends, and pairs his seafood dishes with
    local craft beers, while proudly mastering the art of chopping herbs without a cutting board.
  core: Paul Gorelick is a 40‑year‑old construction supervisor who merges disciplined project management with a passionate love for coastal photography, sailing, and historic‑preservation design, all while
    juggling occasional budget splurges on gear and a habit of postponing dental flossing.
background:
  cultural: Paul grew up in a small New England coastal community where shipbuilding, fishing, and a deep respect for the natural environment shaped daily life. His white New England heritage includes a
    legacy of self‑reliance, modesty, and a quiet pride in local craftsmanship. He is familiar with the region’s seasonal traditions—lobster festivals, autumn leaf‑watching, and winter community gatherings—and
    he values the close‑knit social fabric of towns like Rockport. While rooted in these traditions, his graduate education in the arts broadened his worldview, fostering an openness to unconventional ideas
    and a willingness to integrate cultural and aesthetic perspectives into his work. He acknowledges the historical presence of the Abenaki people in Maine and supports local efforts to honor indigenous
    heritage through collaborative projects and community education.
