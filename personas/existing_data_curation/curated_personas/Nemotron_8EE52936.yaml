  career_goals: Paul aims to transition from site supervision to a senior project management position overseeing multi‑site, mixed‑use developments that prioritize historic preservation and green design.
    He plans to obtain LEED Accredited Professional certification and to cultivate a niche consulting practice that helps clients blend functional construction with artistic and cultural elements. Mentorship
    is also a priority; he wants to establish a structured apprenticeship program within his union to pass on both trade skills and a broader appreciation for design to the next generation of workers.
