personas:
  professional: Luis Velazquez, an aspiring junior soccer organizer, blends curiosity with practicality by designing park matches, uses a sticky notebook to track scores, and channels their competitive
    streak into motivating teammates while staying reliably attentive to the rules.
  sports: Luis Velazquez, an energetic 6‑year‑old soccer enthusiast, loves playing at the neighborhood field, idolizes the local club Los Angeles FC, and participates in tag and capture‑the‑flag with a
    fierce drive to win while they still enjoy team camaraderie.
  arts: Luis Velazquez, a lively fan of cumbia and reggaeton, dances to Bad Bunny and Shakira during family celebrations, and they immerse themselves in picture books by Mo Willems that feature daring animal
    heroes.
  travel: Luis Velazquez, who has explored his grandparents’ seaside town in Costa Rica and dreams of visiting Disneyland, plans trips with colorful stickers on a travel journal but they often get sidetracked
    by new curiosities along the way.
  culinary: Luis Velazquez, who delights in helping prepare cheese pupusas with masa, refried beans, and salsa, also enjoys assembling fruit snack towers and savoring a slice of pepperoni pizza with extra
    cheese, and they proudly share their creations with family.
  core: Luis Velazquez fuses a competitive spark, boundless curiosity, and rhythmic love of music into every game, snack, and story, while they experience a touch of worry and occasional nail‑biting that
    keep their days lively yet slightly uneasy.
background:
  cultural: Luis is a Salvadoran‑American raised in Cypress, Texas, in a bilingual home where Spanish is spoken alongside English. He celebrates Salvadoran traditions such as Día de la Madre, the Feast
    of San Salvador, and enjoys family gatherings centered around food like pupusas, tamales, and casitas. He participates in local Hispanic community events, attends a Spanish immersion preschool program,
    and is exposed to both Salvadoran music and Texan cultural influences. His family emphasizes respect for elders, strong community ties, and a sense of pride in his heritage, which shape his worldview
    and daily life.
