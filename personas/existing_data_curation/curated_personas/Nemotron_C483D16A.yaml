  career_goals: Luis dreams of becoming a professional soccer player and a community firefighter, roles that let him combine his competitive spirit with a desire to help others. He also expresses an interest
    in being a detective, fascinated by puzzles and mysteries, reflecting his skeptical side. Ultimately, he wants a career where he can lead a team, protect his neighborhood, and solve problems.
