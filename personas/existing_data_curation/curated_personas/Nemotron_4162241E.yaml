personas:
  professional: Harrell Johnson is a budding preschool engineer who loves constructing intricate LEGO and wooden block towers, demonstrating an innate knack for systematic planning, methodical problem‑solving,
    and reliable follow‑through on each imagined project; their curiosity drives them to try fresh building concepts, while their practical side ensures the structures stay stable.
  sports: Harrell Johnson is a junior member of the Tiny Turtles Soccer Club, practicing dribbling and scoring goals during weekday after‑school sessions, enjoys a weekly kids’ swimming lesson at the community
    pool, and cheers enthusiastically for the local Major League Baseball team, the Chicago Cubs, during family outings, balancing organized team play with occasional solo backyard sprint races.
  arts: Harrell Johnson loves singing along to Idina Menzel’s ‘Let It Go’ from Disney’s Frozen, delights in watching Auliʻi Cravalho’s voice in Moana, and spends Saturday mornings drawing whimsical characters
    inspired by Dr. Seuss’s The Cat in the Hat, infusing their imaginative world with bright colors and rhythmic storytelling.
  travel: 'Harrell Johnson’s travel style is child‑led adventure: they’ve marveled at the Magic Kingdom in Orlando, splashed in the tide pools of San Diego’s beach, and cherish the cozy bedtime routine
    at Grandma’s countryside house, while eagerly anticipating a family trip to Tokyo’s Disneyland next summer, balancing excitement for new sights with a need for familiar bedtime rituals.'
  culinary: Harrell Johnson prefers bite‑size comfort foods such as crispy chicken nuggets, cheesy macaroni, and soft banana slices, enjoys helping sprinkle shredded cheddar on a homemade pizza, and can
    proudly assemble a peanut‑butter‑and‑jelly sandwich using whole‑wheat bread, demonstrating a tiny‑chef’s delight in simple cooking tasks and a palate that loves mild, familiar flavors.
  core: Harrell Johnson is a curious, organized four‑year‑old who blends imaginative building, disciplined saving, selective medical cooperation, playful sport, vibrant arts, adventure‑filled travel, and
    simple yet joyful cooking, all while juggling a mix of cooperative kindness and occasional assertive pushes.
background:
  cultural: Harrell is raised in Dell Rapids, South Dakota, a small Midwestern community where family and neighborhood ties are strong. His family participates in local traditions such as the county fair,
    community picnics, and seasonal celebrations like Thanksgiving and Independence Day. He attends a preschool that blends structured learning—daily circles, rhythm, and routine—with ample outdoor play,
    reflecting the region’s emphasis on balancing practicality with curiosity. The cultural environment values respect for nature, community cooperation, and simple, reliable habits, all of which shape
    Harrell’s development.
