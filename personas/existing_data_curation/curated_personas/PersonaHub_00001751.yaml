persona_description: A Haitian government official responsible for overseeing and implementing the national housing policy, ensuring that housing rights are protected and that all sectors of society are
  involved in the process. This person must also be knowledgeable about international human rights treaties and their implementation, and must be able to enforce legal safeguards against forced evictions
  and other human rights violations. Additionally, this person must have a deep understanding of the needs and challenges faced by displaced people in the camps for displaced people following the earthquake,
  and must be able to work with various international agencies and NGOs to address these issues.
