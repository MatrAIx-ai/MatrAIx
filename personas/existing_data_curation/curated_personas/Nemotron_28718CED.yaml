personas:
  professional: Michael Cagle is a budding digital creator who fuses his love for comic‑style illustration with elaborate Minecraft constructions and Scratch game coding, letting his curiosity and spontaneous
    imagination drive projects that often ignore traditional planning, and they thrive in loosely structured creative sessions.
  sports: Michael Cagle cheers for the local youth soccer team, the Riverdale Ravens, enjoys pickup basketball at the neighborhood park, and follows the junior baseball squad the Eastside Eagles, and they
    occasionally dabble in beginner swimming lessons at the community pool.
  arts: Michael Cagle draws inspiration from comic legend Alex Ross, mimics the melodic simplicity of Yiruma on piano, and loses himself in lo‑fi beats from artists like Joji while sharing his sketches
    at the after‑school art club, and they find solace in these creative outlets during quiet evenings.
  travel: Michael Cagle loves spontaneous weekend hikes through Whispering Pines State Park, day trips to the nearby dinosaur museum, and dreams of a summer vacation at Disney World in Orlando, though family
    budget constraints keep most adventures local, and they often map out trips with hand‑drawn doodles rather than formal itineraries.
  culinary: Michael Cagle prefers the crunchy satisfaction of pepperoni pizza slices, delights in homemade mac‑and‑cheese, experiments with strawberry‑banana smoothies, and they sometimes forget to wash
    their hands before cooking, leading to occasional parental reminders.
  core: Michael Cagle is a curious, solitary 11‑year‑old whose vivid imagination fuels a love for comics, Minecraft, and music, yet their spontaneous nature often results in messy workspaces and impulsive
    spending.
background:
  cultural: Michael was raised in Beaufort, a small town in rural Missouri, where community ties and outdoor life are central. His family participates in local church events and seasonal festivals, such
    as the Franklin County Fair, which expose him to Midwestern traditions of hospitality, modesty, and a strong work ethic. The region’s love for nature—hiking, fishing, and exploring the nearby Ozark
    hills—feeds his curiosity about the environment. While his household reflects typical white, middle‑class Midwestern values, his parents encourage creativity and independent thinking, giving him space
    to pursue artistic interests while staying connected to the close‑knit community.
