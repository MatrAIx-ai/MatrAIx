personas:
  professional: Vincent Maggi, a retired community handyman with decades of hands‑on maintenance experience, now volunteers as a DIY mentor and senior‑center coordinator, using their methodical carpentry,
    plumbing, and budgeting skills to lead structured workshops while keeping meticulous logs.
  sports: Vincent Maggi, an avid walker who traverses the scenic trails around his town three times a week, follows the local senior fitness club, and cheers for the regional baseball team while avoiding
    high‑impact sports to protect their joints.
  arts: Vincent Maggi, a devoted aficionado of classic plena and bomba rhythms, spends evenings listening to the recordings of master percussionist Roberto Roena while curating a personal collection of
    vinyls, and volunteers at the community library to host monthly talks on historic house architecture inspired by the works of architect Anton Rubio.
  travel: Vincent Maggi, a careful planner who prefers short, purposeful trips, has visited historic colonial towns such as Cartagena and Granada to study architectural details for his scale models, and
    dreams of a leisurely cruise to the Caribbean islands to sample local dishes and music.
  culinary: Vincent Maggi, a skilled home cook who delights in roasting whole lechón and simmering arroz con gandules, seasoning with sofrito and adobo, and experimenting with plantain‑based side dishes
    like maduros, yet occasionally over‑salts the rice when distracted by gardening chores.
  core: Vincent Maggi, a methodical retiree who blends a love for orderly DIY projects, community storytelling, and traditional island flavors into a disciplined, solitary yet community‑centric life, occasionally
    hoarding spare screws and forgetting to water newly sprouted seedlings.
background:
  cultural: Vincent was born and raised in Naranjito, a small municipality in the central mountains of Puerto Rico known as the 'Pueblo del Naranjo.' His upbringing was steeped in the island’s Catholic
    traditions, family gatherings centered around food, and the vibrant rhythms of bomba and plena that echo through town festivals. Growing up in a close‑knit community, he learned the value of mutual
    support, respect for elders, and the importance of preserving local customs such as the annual Naranjito Festival, where he still helps organize activities. His Puerto Rican heritage influences his
    daily life through language, cuisine, and a strong sense of identity tied to the island’s history and natural landscape.
attributes:
  skills: '[''Carpentry'', ''Plumbing basics'', ''Electrical troubleshooting'', ''Gardening and horticulture'', ''Budgeting and bookkeeping'', ''Spanish-English translation'', ''Community event coordination'',
