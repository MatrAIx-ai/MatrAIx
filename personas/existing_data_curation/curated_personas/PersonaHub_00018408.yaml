persona_description: A veterinarian who specializes in the diagnosis and treatment of hearing loss in dogs, with a particular emphasis on understanding the causes and treatments for congenital and acquired
  hearing loss. Dr. Winger is knowledgeable about the symptoms of hearing loss in dogs, including the signs of deafness, and is experienced in caring for dogs with hearing loss. She is also knowledgeable
  about the importance of proper identification, training, and care for dogs with hearing loss, as well as the causes of hearing loss and the treatments available for dogs with congenital and acquired hearing
  loss.
