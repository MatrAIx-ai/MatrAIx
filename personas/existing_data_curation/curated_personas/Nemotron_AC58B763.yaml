  hobbies: '["Watercolor painting", "Visiting art galleries", "Reading art history", "Small book club", "Gardening", "Birdwatching", "Knitting", "Quilting", "Community volunteer art projects", "Learning
    about sustainable building practices", "Hiking local trails"]'
  career_goals: Cynthia aims to advance into a supervisory or lead facility‑manager role within her current municipal building, leveraging her organizational strengths to streamline maintenance operations
    and improve sustainability practices. She plans to earn certifications such as Certified Facilities Manager (CFM) and participate in workshops on renewable‑energy retrofits. Long‑term, she hopes to
    develop a mentorship program for younger tradespeople and provide consulting services for historic preservation projects in the Derry‑Rockingham County area before transitioning to part‑time advisory
    work in retirement.
