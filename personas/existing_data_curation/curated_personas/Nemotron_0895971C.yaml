    ''CRM Platforms (e.g., Salesforce)'', ''Data Visualization (e.g., Tableau, Power BI)'', ''Lean Six Sigma Green Belt'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary literature and philosophy'', ''Playing classical guitar'', ''Cooking Mexican and Californian fusion dishes'', ''Hiking coastal
    trails'', ''Kayaking in the bay'', ''Photography'', ''Meditative journaling'', ''Attending small poetry or acoustic music gatherings'']'
  career_goals: Gerardo aims to transition into senior operational leadership, targeting roles such as Director of Operations or Chief Operating Officer within a midsize company that values creativity and
    sustainable practices. He intends to spearhead digital transformation and lean initiatives that improve efficiency while embedding cultural and artistic perspectives into the workplace. Over the longer
    term, he envisions establishing a boutique consulting firm that helps arts‑focused nonprofits and culturally‑aware businesses optimize their operations and expand their impact.
