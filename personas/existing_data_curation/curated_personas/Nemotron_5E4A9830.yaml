personas:
  professional: Jane Corona, a 24‑year‑old computer support specialist in Portland, leverages sharp hardware diagnostics, cross‑platform OS configuration, and basic network scripting to resolve tickets,
    and they channel a competitive hackathon mindset and a flexible, sometimes disorganized work style into a pragmatic drive toward CompTIA Network+ and Security+ certification.
  sports: Jane Corona fuels their love of the Pacific Northwest outdoors by hiking Forest Park’s rugged trails and cycling Portland’s extensive bike lanes, they rally behind the Portland Timbers and the
    Trail Blazers during games, and they belong to a weekly Saturday cycling club, though their competitive streak sometimes pushes them to overtrain before a major hackathon.
  arts: Jane Corona immerses themselves in Portland’s indie arts scene, swapping sci‑fi novels at Powell’s while sipping pour‑over coffee and listening to vinyl records by Mitski and The Decemberists, they
    capture candid street photography at downtown concerts and volunteer at a community theater production, satisfying both a curiosity for new ideas and a desire for social connection.
  travel: Jane Corona prefers spontaneous, budget‑friendly road trips, having already explored the coastal stretch from Vancouver to San Diego and dreamed of trekking New Zealand’s Milford Track and chasing
    the northern lights in Iceland, they often opt for last‑minute deals due to modest income and a lingering worry about future expenses, which sometimes limits longer, more elaborate itineraries.
  culinary: Jane Corona enjoys experimenting in a compact Portland kitchen, mastering dishes like spicy Korean bibimbap, homemade sourdough starter, and vegan mushroom risotto, they perfect pour‑over coffee
    techniques and relish crafting craft cocktails, but their habit of multitasking between coding and cooking often results in over‑salting the ramen broth.
  core: Jane Corona is a curious yet pragmatic tech support professional who balances competitive hackathon drives with yoga‑induced stress relief, they juggle a coffee‑centric lifestyle and a tendency
    to over‑worry.
background:
  cultural: Jane was raised in a middle-class suburban family in the Pacific Northwest, with Italian and Anglo-American roots that influence her love for home-cooked meals and family gatherings. Growing
    up in Portland, she absorbed the city's progressive values, environmental consciousness, and vibrant arts scene. Her upbringing emphasized independence and community involvement, shaping her pragmatic
    yet curious outlook. As a woman in tech, she identifies with the local Women in Tech community, navigating both the challenges of a male-dominant field and the supportive network that the city offers.
attributes:
  skills: '[''Hardware diagnostics and repair'', ''Operating system installation and configuration (Windows, macOS, Linux)'', ''Network troubleshooting (TCP/IP, Wi-Fi, VPN)'', ''Help-desk ticketing systems
    (Jira Service Management, Zendesk)'', ''Remote support tools (TeamViewer, Remote Desktop)'', ''Scripting basics (PowerShell, Bash)'', ''Cybersecurity fundamentals (phishing awareness, endpoint protection)'',
    ''Customer communication and de-escalation'', ''Documentation and knowledge-base writing'', ''Basic cloud service navigation (AWS, GCP)'', ''Data analysis with Python (pandas, matplotlib)'']'
  hobbies: '[''Coffee shop hopping'', ''Hiking in Forest Park'', ''Cycling around the city'', ''Indie music concerts'', ''Photography (landscape and street)'', ''Sci-fi & fantasy reading'', ''Board game
    nights with friends'', ''Yoga and mindfulness meditation'', ''Experimental cooking'', ''Tech meetups and hackathons'', ''Volunteering with Women in Tech mentorship programs'']'
  career_goals: She aims to advance from a computer support specialist to a senior system administrator within the next three to four years, earning CompTIA Network+ and Security+ certifications along the
    way. Jane plans to lead a small support team, implement automation scripts to streamline ticket resolution, and deepen her expertise in cloud infrastructure. Long-term, she is interested in pursuing
    a master's degree in Information Technology Management and contributing to open-source support tools that improve service efficiency.
