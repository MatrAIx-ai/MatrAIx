  hobbies: '[''visiting art exhibitions'', ''attending Asian film festivals'', ''cooking traditional Asian dishes'', ''book club'', ''creative writing workshops'', ''yoga'', ''mindfulness meditation'',
    ''hiking'', ''volunteering as language mentor'', ''salsa dancing'']'
  career_goals: Margarita aims to re‑enter the workforce in a role that blends her humanities background with her passion for community engagement. She aspires to become a program coordinator for a cultural
    nonprofit or museum, designing inclusive workshops and public programs that celebrate Asian heritage. To strengthen her leadership capacity, she plans to pursue a part‑time master’s degree in public
    administration while maintaining a work‑life balance that supports her mental‑well‑being. In the long term, she envisions launching a community‑center initiative offering language classes, art workshops,
    and mental‑health resources for immigrant families in San Francisco.
