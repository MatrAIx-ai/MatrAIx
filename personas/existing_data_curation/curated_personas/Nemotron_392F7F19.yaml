  hobbies: '[''Pickup basketball league'', ''Attending truck shows and off‑road rallies'', ''Fishing at Cherry Creek Reservoir'', ''Hiking in the Colorado Rockies'', ''Weekend barbecues with friends and
    family'', ''Home‑brewing craft beer'', ''Listening to classic rock and country music'', ''Volunteering at local food‑bank events'']'
  career_goals: Wilbirt aims to earn a hazardous‑materials endorsement and transition into a senior driver‑trainer role within his fleet, eventually moving into logistics coordination or dispatch management.
    He hopes to complete his GED and a certificate in transportation logistics, giving him the credentials to launch a small regional trucking business that can provide stable income for his family while
    allowing more predictable home time.
