persona_description: A conservationist who is passionate about preserving the tallgrass prairie ecosystem in the Flint Hills region of Kansas. They are dedicated to working with ranchers to protect the
  threatened prairie chicken population and preserve the 88 native grass species, as well as the 500 native broadleaf plants that are important for maintaining the ecological health of the prairie. They
  are also interested in exploring the use of conservation easements to prevent the conversion of the prairie to other uses. The conservationist is a founding member and supporter of the Tallgrass Legacy
  Alliance, a diverse alliance of ranchers, agricultural and environmental organizations, and public agencies.
