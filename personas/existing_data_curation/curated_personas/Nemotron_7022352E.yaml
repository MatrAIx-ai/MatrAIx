  skills: '[''Graphic Design'', ''UI/UX Design'', ''Adobe Creative Suite (Photoshop, Illustrator, InDesign)'', ''Figma'', ''Sketch'', ''HTML/CSS basics'', ''Brand Development'', ''Typography'', ''Layout
    and Print Production'', ''Project Coordination'', ''Client Communication'', ''Design Thinking'', ''Mentoring Junior Designers'', ''Creative Problem Solving'']'
  hobbies: '[''Gardening (tropical and native plants)'', ''Hiking in Lake County nature preserves'', ''Reading historical fiction'', ''Cooking Mediterranean cuisine'', ''Yoga and mindfulness practice'',
    ''Volunteering in community art programs'', ''Photography (nature and street)'', ''Pottery and ceramics'', ''Attending local design meetups and workshops'']'
  career_goals: Sharon aims to transition into a senior design leadership role, such as Art Director or Design Lead, where she can shape strategic visual direction for larger regional brands. She is interested
    in expanding her UX expertise and eventually launching a boutique design studio that blends graphic design with user experience services. Mentoring emerging designers and contributing to community‑focused
    design projects are also long‑term priorities, aligned with her desire for meaningful, balanced work that respects both creativity and personal well‑being.
