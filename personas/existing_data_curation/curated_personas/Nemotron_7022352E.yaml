personas:
  professional: Sharon Alkhalidi is an experienced graphic and UX designer who leverages a meticulous eye for typography and color, honed through years of cohesive brand identity work, to lead small multidisciplinary
    teams, mentor junior designers, and steer strategic visual direction for regional brands while balancing a calm, flexible leadership style.
  sports: Sharon Alkhalidi enjoys weekend hikes on Lake County trails with the local Trailblazers Hiking Club, follows the Orlando Magic during the NBA season, casually plays paddle tennis at the community
    center in the summer, and supports the Tampa Bay Buccaneers in the fall, balancing moderate competition with a relaxed fitness routine.
  arts: Sharon Alkhalidi volunteers at youth art programs where they mentor budding painters, finds inspiration in the photography of Annie Leibovitz and the music of Norah Jones, curates a small home gallery
    of watercolor prints, and occasionally experiments with pottery at a weekend studio, letting artistic exploration shape their leisure time.
  travel: Sharon Alkhalidi prefers thoughtfully planned trips that blend cultural immersion and relaxation, having recently explored the historic sites of Athens, savored the coastal villages of Cinque
    Terre, and hiked the Appalachian Trail, while dreaming of a future retreat in Kyoto's tea gardens, all balanced against a modest travel budget.
  culinary: Sharon Alkhalidi delights in Mediterranean cooking, regularly preparing dishes like shakshuka with fresh basil, moussaka layered with feta and eggplant harvested from their garden, and lemon‑oregano
    grilled fish, while also savoring tropical mango salsa with lime and cilantro, reflecting a blend of regional flavors and garden‑fresh ingredients.
  core: Sharon Alkhalidi is a calm, structured yet flexible designer who gardens, hikes, and mentors, quietly overcoming occasional forgetfulness about appointments with a resilient, harmonious outlook.
background:
  cultural: Sharon’s cultural background reflects a middle‑class American upbringing with German‑Irish ancestry. Raised in a suburban Midwestern environment, she was exposed to a blend of European artistic
    traditions and contemporary American values such as independence, community cooperation, and practical problem‑solving. Her liberal arts education reinforced an appreciation for diverse cultural expressions,
    which she now weaves into her design sensibility while living in Clermont, Florida, where she embraces the state’s relaxed, outdoor‑oriented lifestyle.
