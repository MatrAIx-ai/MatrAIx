  hobbies: '[''Reading literary fiction'', ''Journaling'', ''Nature walks in local parks'', ''Landscape photography'', ''Genealogy research'', ''Crossword puzzles'', ''Knitting'', ''Listening to literary
    podcasts'', ''Gardening'']'
  career_goals: Rose aims to publish her debut novel with a reputable literary agent and build a sustainable freelance writing career that supports her family. She plans to expand her portfolio by writing
    short stories for literary journals, developing a niche blog on local history, and eventually securing a modest book contract that blends commercial appeal with artistic integrity. Long‑term, she envisions
    mentoring emerging writers in her community while maintaining the flexibility to pursue personal writing projects.
