personas:
  professional: Parvathy Mitra, a 19‑year‑old university student, blends graphic design expertise, basic Python skills, and a passion for community engagement into a budding arts‑management career, coordinating
    campus cultural events, crafting social‑media campaigns, and seeking museum internships to curate exhibitions that amplify under‑represented voices, and they aim to fuse visual storytelling with social
    impact.
  sports: Parvathy Mitra plays intramural volleyball for the university team, follows the Dallas Mavericks in the NBA, supports the Texas Rangers in MLB, and hikes the Texas Hill Country with a group of
    friends, balancing competitive play with low‑impact cardio and a love for outdoor group activities.
  arts: Parvathy Mitra frequents the Contemporary Austin museum, sketches in a weathered Moleskine journal, captures sunrise over Hill Country cliffs with a Nikon D3500, admires works by Frida Kahlo and
    Ansel Adams, and rehearses Bharatanatyam and contemporary dance, letting these diverse artistic influences shape their visual storytelling.
  travel: Parvathy Mitra enjoys spontaneous weekend road trips to Hill Country vineyards, dreams of exploring the neighborhoods of Kyoto for their blend of tradition and modern design, and budgets carefully
    for semester‑long trips abroad, preferring culturally immersive stays over luxury resorts, with a particular wish to attend a residency program in Barcelona.
  culinary: Parvathy Mitra’s kitchen experiments fuse aromatic spices like cumin and garam masala with Tex‑Mex staples, producing signature dishes such as paneer‑filled tacos topped with cilantro‑lime slaw,
    or chili‑infused masala burritos, while their cooking skill sits at an enthusiastic intermediate level, often sharing recipes on Instagram.
  core: Parvathy Mitra balances a vibrant, community‑focused creative life with disciplined budgeting and a calm, health‑conscious outlook, always juggling art projects, volunteer work, and spontaneous
    hikes.
background:
  cultural: Parvathy is a first‑generation South Asian American of Indian Tamil heritage. Raised in a bilingual household in Texas, she celebrates traditional festivals such as Diwali, Pongal, and Navaratri
    while also embracing regional Texan customs like community barbecues and high‑school football gatherings. Her family places strong value on education, collective well‑being, and respect for elders,
    which informs her cooperative and harmonious nature. She maintains close ties to the local South Asian diaspora, participating in cultural clubs, language meet‑ups, and community service projects that
    promote cultural exchange. This blend of Indian cultural roots and Southern U.S. upbringing shapes her worldview, artistic sensibility, and commitment to fostering inclusive spaces.
attributes:
  skills: '["Graphic design", "Digital illustration", "Social media content creation", "Public speaking", "Team coordination", "Research and analysis", "Multilingual communication (English, Tamil)", "Event
    planning", "Basic programming (Python)"]'
  hobbies: '["Painting", "Sketching", "Photography", "Visiting art exhibitions", "Listening to world music", "Dancing (Bharatanatyam, contemporary)", "Cooking Indian and Tex‑Mex cuisine", "Reading contemporary
    fiction", "Hiking in Texas nature trails", "Volunteering at campus multicultural events"]'
  career_goals: Parvathy aspires to merge her passion for art with community building by pursuing a career in arts management or cultural programming. She aims to obtain a master's degree in Arts Administration
    and secure internships at museums or nonprofit arts organizations where she can curate exhibitions that highlight under‑represented South Asian voices. Long‑term, she envisions founding a multidisciplinary
    platform that showcases emerging artists from diaspora communities and promotes cross‑cultural dialogue. She also hopes to develop a portfolio that blends visual storytelling with social impact, eventually
    stepping into a creative director role.
