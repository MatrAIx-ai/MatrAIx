personas:
  professional: Donna Hairston, a 24‑year‑old journeyman carpenter in Gary, leverages meticulous blueprint reading, tool upkeep, and a safety‑first mindset to deliver precise interior finishes, while channeling
    her outgoing nature into leading small crews and mentoring apprentices as she works toward a foreperson certification.
  sports: Donna Hairston fuels her energy by joining the Gary Runners club for the weekly 5K, cheers on the Chicago Bears on Sundays, supports the Indiana Pacers during the basketball season, and maintains
    a membership at the local YMCA where she mixes cardio with occasional weight‑lifting circuits.
  arts: Donna Hairston takes the bass in a garage band that jams on classic rock staples like The White Stripes and The Black Keys, attends the annual Gary Fall Festival to watch folk performances, and
    enjoys the storytelling of John Steinbeck novels when she has a quiet evening.
  travel: Donna Hairston prefers budget‑friendly road trips that combine scenic drives along Lake Michigan with stops at hometown fairs in neighboring towns, has already toured the historic sites of Chicago,
    dreams of a spring weekend in Asheville’s Blue Ridge Mountains, and generally plans trips around long weekends to maximize time without sacrificing work commitments.
  culinary: Donna Hairston loves hearty Midwestern fare, regularly cooks chicken‑and‑dumpling soup, bakes cornbread using locally grown corn from the community garden, hones her skillet skills on seared
    pork chops with apple‑cider glaze, and treats herself to a slice of deep‑dish pizza from the neighborhood pizzeria on cheat days.
  core: Donna Hairston is a disciplined, community‑driven carpenter who balances rigorous on‑site precision with a love for group runs, bass riffs, and fair‑ground fun, though she sometimes overbooks her
    schedule chasing every project and event.
background:
  cultural: Donna was raised in Gary, Indiana, a city rooted in Midwestern working‑class values and a strong sense of community. Her family’s heritage reflects typical Midwestern white American backgrounds,
    with an emphasis on practicality, self‑reliance, and mutual support. Growing up near the industrial heartland, she was exposed to a culture that respects skilled trades, union camaraderie, and neighborhood
    ties. These influences shape her appreciation for routine, organized work, and collaborative social activities.
attributes:
  skills: '["Framing", "Cabinetmaking", "Blueprint reading", "Tool maintenance", "Safety compliance", "Project scheduling", "Team coordination"]'
  hobbies: '["Community gardening", "Weekly 5K runs", "DIY home improvement", "Playing bass in a garage band", "Attending local fairs and festivals", "Volunteering at neighborhood clean‑up events"]'
  career_goals: Donna aims to advance from a journeyman carpenter to a lead foreperson within the next five years, overseeing a small crew and ensuring high‑quality output on every job. She aspires to earn
    a supervisory certification through her local union and eventually open a boutique carpentry business that specializes in custom, built‑in furniture for Midwestern homes. Her long‑term ambition includes
    mentoring apprentices and contributing to community development projects that improve housing in Gary and surrounding neighborhoods.
