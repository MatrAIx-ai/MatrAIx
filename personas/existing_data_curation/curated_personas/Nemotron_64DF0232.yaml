  career_goals: Although retired from formal employment, Gabriel’s ambition is to remain a vital part of his Haysville community. He aims to mentor younger volunteers at the senior center, share his handyman
    knowledge through workshops, and help preserve local oral histories by recording interviews with longtime residents. He also hopes to complete a road‑trip memoir project with his wife, documenting historic
    sites across Kansas and neighboring states. Maintaining his health and independence is a core goal, so he plans to stay active through regular gardening, walking, and occasional volunteer fire‑department
    drills.
