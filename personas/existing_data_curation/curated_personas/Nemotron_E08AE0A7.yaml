personas:
  professional: Percillia Mourning, a retired clinical laboratory technologist turned community STEM mentor, leverages three decades of hematology and microbiology expertise and an unwavering methodical
    approach to design data‑driven health workshops for local churches and schools.
  sports: Percillia Mourning, a devoted member of the Greensboro senior walking club, enjoys brisk morning walks along the Greensboro Greenway, follows the Carolina Panthers and Carolina Hurricanes with
    loyal enthusiasm, and practices gentle stretching routines after tending her garden to maintain flexibility.
  arts: Percillia Mourning, a choir singer whose voice blends harmoniously with gospel hymns, spends evenings knitting complex quilt‑inspired patterns while listening to the soulful melodies of Nina Simone
    and the classical piano of Ludovico Einaudi, finding creative solace in the interplay of music and textile art.
  travel: Percillia Mourning, who favors well‑planned trips, has explored the historic streets of Savannah and the Blue Ridge Parkway’s scenic overlooks, and dreams of a leisurely cultural tour of Italy’s
    Renaissance towns, yet budget constraints keep her vacations mostly regional and low‑key.
  culinary: Percillia Mourning, an enthusiastic home chef, reimagines classic Southern dishes such as fried chicken and collard greens by using olive oil, fresh garden herbs, and low‑sodium broths, often
    experimenting with sweet potato mash infused with ginger and cinnamon while preserving beloved family recipes.
  core: Percillia Mourning, a detail‑oriented 78‑year‑old who balances a calendar‑driven garden, knitting projects, and a perpetual worry about the next deadline, finds calm in the rhythm of puzzles and
    the steady hum of her choir.
background:
  cultural: Percillia is an African‑American woman who was born and raised in Greensboro during the era of segregation and the civil‑rights movement. The legacy of the 1960 Greensboro sit‑ins and the strong
    sense of community in the historically Black neighborhoods shaped her values of resilience, education, and collective uplift. Her family traditions include soulful cooking, gospel music, and storytelling,
    which she carries forward in her daily life. She remains active in her local Baptist church, participates in community festivals that celebrate Black heritage, and mentors younger generations to honor
    the progress made by those who fought for equality.
