  career_goals: Although retired, Percillia remains driven to share her expertise. She plans to formalize a mentorship program that pairs retired professionals with high‑school students interested in STEM,
    establish a scholarship fund for Black women pursuing science degrees, and author a practical guide on community health monitoring for local churches. She also hopes to record oral histories of Greensboro’s
    elder community to preserve their stories for future generations.
