persona_description: A geneticist who is interested in the genetic factors that contribute to the development of autoimmune thyroid diseases, particularly Graves' disease and Hashimoto's thyroiditis. They
  are particularly interested in the role of genetic variants in the TSHR gene and the PTPN22 gene, as well as the effects of selenium and melatonin on thyroid hormone levels. They are likely to be interested
  in genetic testing and the potential implications of genetic variations on thyroid health.
