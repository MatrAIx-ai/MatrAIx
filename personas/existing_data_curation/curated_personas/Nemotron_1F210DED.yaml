  hobbies: '["Basketball", "Hip‑hop music production", "Skateboarding", "Video gaming (NBA 2K, FIFA)", "Digital drawing/illustration", "Cooking soul‑food dishes", "Church youth volunteering"]'
  career_goals: Ransford aims to earn his GED within the next year and enroll in a community college program that leads to a certificate in community health work or social services. He dreams of becoming
    a youth mentor or community health worker who can provide guidance and resources to other at‑risk teens in Goodlettsville. He also hopes to develop a small side business offering handyman services to
    neighbors, allowing him to apply his practical skills while funding his education. Long‑term, he envisions a role in a nonprofit organization focused on youth development, where he can combine his compassionate
    nature with organizational abilities to create supportive programs.
