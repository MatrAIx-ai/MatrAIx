personas:
  professional: Ransford Lee is a 17-year-old community volunteer who blends practical handyman experience with a compassionate drive to mentor at‑risk peers, coordinating church youth events while they
    prepare to pursue a community health certificate at a local college.
  sports: Ransford Lee plays pickup basketball three evenings a week at the Goodlettsville community park, skates at the local skatepark with the Board Riders crew, follows the Nashville Predators and Tennessee
    Titans closely, supports the Memphis Grizzlies, and they blend competitive street play with seasonal fitness routines like summer jogging and winter weight training.
  arts: Ransford Lee creates hip‑hop beats using free software such as LMMS, writes lyrics inspired by Kendrick Lamar, J Cole, and SZA, sketches comic‑style illustrations echoing the work of Jim Lee and
    Stan Lee, experiments with digital art tools like Procreate, and they binge‑watch music documentaries and graphic‑novel adaptations for creative fuel.
  travel: Ransford Lee has explored Nashville’s music scene, hiked the Great Smoky Mountains, visited Washington, D.C. on a school trip, dreams of a road trip to New Orleans for its live jazz and soul‑food
    culture, and they prefer budget‑friendly bus travel and staying with friends over luxury hotels.
  culinary: Ransford Lee enjoys cooking Southern soul‑food classics such as fried chicken, collard greens, and cornbread with hot sauce and smoked paprika, demonstrates intermediate skill with a cast‑iron
    skillet, often experiments with sweet potato mash and peach‑infused BBQ ribs, and they love sharing meals with family at church potlucks.
  core: Ransford Lee is a community‑oriented teen who balances a love for basketball, beats, and handyman work with a strong sense of empathy, occasional procrastination on school tasks, and a habit of
    late‑night gaming marathons, and they often juggle these interests with a modest budget.
background:
  cultural: Ransford is an African‑American teenager raised in Goodlettsville, a suburb of Nashville in Davidson County, Tennessee. His family’s cultural heritage blends the deep traditions of Southern
    Black communities—gospel music, church fellowship, soul food, and oral storytelling—with contemporary influences like hip‑hop and R&B. Growing up in a close‑knit neighborhood, he has been shaped by
    the local church’s emphasis on service and the communal bonds formed through neighborhood block parties and mentorship programs. The mixed urban‑rural environment of Goodlettsville exposes him to both
    the vibrant music scene of Nashville and the more laid‑back, outdoor lifestyle of surrounding areas, fostering his appreciation for both collaborative and solitary pursuits. His cultural identity informs
    his values of resilience, community solidarity, and a desire to give back to the place that raised him.
attributes:
  skills: '["Interpersonal communication", "Empathetic listening", "Conflict mediation", "Basic computer literacy", "Practical problem solving", "Time management", "Basic home maintenance", "Teamwork",
