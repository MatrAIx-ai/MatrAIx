persona_description: A historian who specializes in the study of European exploration and colonization, particularly the voyages of Christopher Columbus and the impact of these voyages on the Americas.
  His research interests include, but are not limited to, the historical context of Columbus's voyages, the technological advancements that were necessary for these voyages, and the social and economic
  impacts of these voyages on the indigenous populations of the Americas. He is particularly interested in the role of coincidence and chance in the discovery of new lands and the impact of these discoveries
  on the world.
