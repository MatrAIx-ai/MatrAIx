  hobbies: '[''Gardening (heirloom vegetables)'', ''Woodworking and tool restoration'', ''Birdwatching'', ''Fishing'', ''Reading (Midwestern history, biographies, mystery novels)'', ''Card games at community
    center'', ''Volunteer guide for historical society'', ''Digital storytelling (learning)'', ''Travel to historic sites'', ''Intergenerational garden projects'']'
  career_goals: Although retired from formal teaching, Chasteen aims to stay intellectually vibrant by mentoring early‑career teachers through a local teacher‑retirement partnership, volunteering as a guide
    for the Cedar Falls Historical Society, and compiling oral histories of longtime residents. He plans to write a memoir that weaves personal anecdotes with reflections on Midwestern education and farming
    life, and to learn more about digital storytelling tools. A modest travel ambition includes visiting historic sites across the Midwest and attending regional agricultural fairs to broaden his perspective.
    He also hopes to deepen his involvement in community service, coordinating intergenerational gardening projects that blend his love of horticulture with educational outreach.
