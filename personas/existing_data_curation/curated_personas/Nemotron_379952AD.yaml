  hobbies: '[''Gardening'', ''Tai chi'', ''Cooking Cantonese cuisine'', ''Book club (historical fiction)'', ''Cultural festival attendance'', ''Volunteering at community kitchen'', ''Knitting'', ''Jazz
    listening'', ''Walking/hiking'']'
  career_goals: Shizue seeks a stable, part‑time role that preserves a predictable routine while allowing her to mentor newer staff. She aims to become a senior cashier or shift lead, using her experience
    to train colleagues and maintain smooth store operations. Beyond work, she plans to expand her volunteer work at local senior centers and cultural organizations, eventually serving as a community liaison
    to help non‑English‑speaking residents navigate services. Her long‑term ambition is a comfortable retirement with modest savings, coupled with ongoing community involvement.
