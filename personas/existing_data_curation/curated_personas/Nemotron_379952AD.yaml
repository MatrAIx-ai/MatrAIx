personas:
  professional: Shizue Yeung is a seasoned part‑time senior cashier whose meticulous cash handling, bilingual English‑Cantonese communication, and calm conflict‑de‑escalation reflect her love of routine
    and compassionate service; they thrive on training new staff and maintaining orderly shift handovers.
  sports: Shizue Yeung enjoys low‑impact fitness through daily walks on Great Park trails, weekly tai chi sessions, and cheering for the Los Angeles Lakers, while they belong to a senior walking club that
    meets every Saturday, balancing social interaction with personal exercise.
  arts: Shizue Yeung deepens her cultural appreciation by listening to classic jazz icons like Miles Davis and John Coltrane, attending community theater productions of historical dramas, and discussing
    historical fiction novels such as Ken Follett's works at her book club, and they often hum along to jazz melodies while organizing books.
  travel: Shizue Yeung prefers relaxed, culturally rich trips, having explored Kyoto’s historic temples, Napa Valley’s vineyards, and Monterey’s coastal scenery, and they now plan future visits to Singapore’s
    botanical gardens and a family reunion in Hong Kong while managing travel costs within a fixed retirement budget.
  culinary: Shizue Yeung delights in preparing traditional Cantonese dishes like steamed fish with ginger, char siu pork, and dim sum, often using garden‑fresh bok choy and herbs, and they enjoy experimenting
    with homemade dumpling wrappers while occasionally indulging in egg tarts from a local bakery.
  core: Shizue Yeung blends meticulous organization, heartfelt compassion, and a routine‑driven mindset to balance a senior cashier role, volunteer work, gardening, and jazz listening, all while they wrestle
    with occasional worries about health and finances.
background:
  cultural: Shizue is a second‑generation Chinese‑American raised in Southern California. Her family upholds traditional values of respect for elders, communal harmony, and the importance of education,
    while also embracing the multicultural atmosphere of Orange County. She speaks both English and Cantonese, celebrates Lunar New Year and local cultural events, and is active in a neighborhood Chinese
    cultural association. Her heritage shapes her compassionate demeanor and her strong desire to assist fellow immigrants and seniors in navigating everyday challenges.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale system operation'', ''Customer service'', ''Conflict resolution'', ''Bilingual communication (English/Cantonese)'', ''Inventory reconciliation'', ''Process
