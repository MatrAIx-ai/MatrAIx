  hobbies: '[''Track and field'', ''Volleyball'', ''Volunteer reading program'', ''Girl Scout troop leadership'', ''Farm work'', ''Quilting'', ''DIY décor projects'', ''Hiking on local trails'']'
  career_goals: Joyce aims to graduate high school with honors, earn a scholarship through her track and field achievements, and pursue a degree in agricultural business or project management at a community
    college. She envisions a future as a farm operations manager or logistics coordinator for a nonprofit organization, eventually directing community events such as county fairs or youth programs. Her
    competitive drive pushes her to become a leader who can design efficient, well‑structured projects and inspire teams to excel.
