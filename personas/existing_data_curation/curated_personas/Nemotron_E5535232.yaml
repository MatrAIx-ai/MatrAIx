personas:
  professional: Joyce Neumans is a high school junior who aspires to become an agricultural engineer, leveraging her practical mindset, love of farm work, and methodical approach to school projects; they
    channel their competitive drive into robotics club competitions and lead the Girl Scout troop's service initiatives.
  sports: Joyce Neumans competes on the Farmington High School track team and the local volleyball club, the Farmington Flyers, approaching each practice with a structured training plan, a competitive edge,
    and a habit of timing drills with a stopwatch, while still enjoying social camaraderie after games, and they often organize post‑match snack runs for teammates.
  arts: Joyce Neumans expresses creativity through quilting projects inspired by the geometric patterns of artist Anni Albers and DIY décor influenced by the rustic aesthetic of farmhouse style, often sharing
    finished pieces at library craft fairs, and they relish listening to the folk music of The Lumineers while stitching.
  travel: Joyce Neumans favors nature‑focused trips, having hiked the Appalachian Trail segments near her hometown, planned a family weekend getaway to Yellowstone National Park, and they prefer itineraries
    that balance adventure with scheduled rest breaks, all while budgeting their allowance carefully.
  culinary: Joyce Neumans enjoys farm‑to‑table cooking, frequently preparing fresh garden salads with heirloom tomatoes, roasted sweet potatoes, and goat cheese, as well as baking apple crumble using orchard
    harvests, and they sometimes burn the crust when rushing between volleyball practice and quilting.
  core: Joyce Neumans blends a competitive, structured mindset with a love for community service, sports, and hands‑on crafts, navigating teenage life with meticulous planning, occasional skepticism, and
    a penchant for over‑committing.
background:
  cultural: Joyce comes from a white, Midwestern family rooted in Farmington, Minnesota. Her upbringing reflects the region’s values of hard work, community involvement, and self‑reliance. The family attends
    a Protestant church and participates in local traditions such as county fairs, seasonal harvest festivals, and neighborhood volunteer clean‑up days. Growing up in a rural setting, she has been exposed
    to agricultural life and a close‑knit community where neighbors often support each other through shared events and activities.
