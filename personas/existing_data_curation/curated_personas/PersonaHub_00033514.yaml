persona_description: A genealogist or researcher who is interested in the Dugger family line and the Cheatham lineage. They are particularly interested in the genetic relationship between the descendants
  of Lydia Dugger and the descendants of Marmaduke Cheatham. They have a strong interest in genealogical research and are knowledgeable about the history and genealogy of the Dugger and Cheatham families.
  They have a particular interest in the R1b1b2a1b5 haplogroup and are interested in further research into this haplogroup. They are also interested in the history and genealogy of the McClain family and
  the connections between the Dugger and McClain families.
