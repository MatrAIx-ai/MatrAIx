personas:
  professional: Teresa Harbottle, a 30‑year‑old aspiring elementary educator in Missouri, leverages their natural talent for connecting with learners of all ages and their love of hands‑on arts to design
    flexible, interdisciplinary lesson plans that blend watercolor, storytelling and music, while their relaxed, sometimes disorganized approach keeps the classroom atmosphere creative but occasionally
    chaotic.
  sports: Teresa Harbottle enjoys seasonal jogging with the Springfield Trailblazers running club in spring, attends weekend yoga sessions at a downtown studio that bonds them with fellow Midwest yoga enthusiasts,
    roots for the Kansas City Chiefs in football and the St. Louis Cardinals in baseball, and occasionally joins a casual pick‑up softball league during summer evenings, though they prefer low‑impact activities
    that balance their love for nature.
  arts: Teresa Harbottle regularly sketches and paints watercolors inspired by Georgia O'Keeffe’s bold florals, captures Missouri sunsets in a style reminiscent of Ansel Adams’ chiaroscuro, participates
    in community theater productions of plays by August Wilson, and finds solace in listening to Fiona Apple’s piano‑driven melodies while browsing the shelves of the local library for new fiction and thought‑provoking
    essays.
  travel: Teresa Harbottle favors leisurely road trips that weave through the Ozarks and the Great River Road, has already explored the painted desert of Arizona’s Monument Valley, dreams of a spring pilgrimage
    to Florence, Italy to study Renaissance art, and carefully balances their wanderlust with a modest travel budget that prioritizes off‑season lodging and group discounts.
  culinary: Teresa Harbottle enjoys experimenting in the kitchen by whipping up wildflower‑infused honey glazes for roasted carrots, crafting hand‑rolled gnocchi with sage butter, tweaking a spicy miso
    ramen broth with fermented beans, and layering fresh heirloom tomatoes, sumac, and lavender into savory summer salads, though they often forget to label their homemade preserves.
  core: Teresa Harbottle is a curiosity‑driven, arts‑obsessed educator who balances a warm, cooperative spirit with a habit of scattered planning, meditating through worry, and turning everyday moments
    into colorful, community‑focused creations.
background:
  cultural: Teresa grew up in a small, close‑knit town in rural Missouri, where community values, modesty, and a strong work ethic are deeply ingrained. Her white Midwestern heritage includes traditions
    of local church gatherings, seasonal festivals, and a love for the outdoors. Though she diverged from some conventional expectations by pursuing a non‑traditional teaching path and navigating a divorce,
    she remains tied to the supportive network of family, friends, and neighbors who emphasize mutual aid, respect for personal freedom, and an openness to new cultural experiences while honoring her roots.
attributes:
  skills: '[''Creative lesson design'', ''Art integration in teaching'', ''Student counseling and mentorship'', ''Conflict resolution'', ''Basic educational technology'', ''Flexible classroom management'']'
  hobbies: '[''Watercolor painting'', ''Photography'', ''Attending art fairs and community theater'', ''Reading eclectic literature'', ''Gardening'', ''Yoga and meditation'', ''Experimental cooking'', ''Book
    club participation'', ''Volunteering at library story hours'']'
  career_goals: Teresa aims to formalize her teaching credentials by completing an associate’s degree in education and later pursuing a bachelor’s in elementary education. She dreams of leading an interdisciplinary
    arts program within her school district, where she can mentor fellow teachers on incorporating creativity across subjects. In the longer term, she hopes to become an instructional coach focused on holistic
    student well‑being, and eventually to develop a community‑center after‑school arts studio that offers free classes to under‑served families in Randolph County.
