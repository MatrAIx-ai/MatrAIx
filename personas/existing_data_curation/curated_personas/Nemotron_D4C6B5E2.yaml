personas:
  professional: Isabella Smith, an aspiring robotics club leader, combines systematic problem‑solving, beginner‑level programming, and disciplined teamwork to design competition‑ready machines, while they
    methodically plan every build and let their competitive edge drive each project toward precision.
  sports: Isabella Smith trains with the Bloomfield Hills Swim Club, targeting the 100‑meter freestyle while cheering loyally for the Detroit Tigers, Detroit Lions, and Detroit Pistons, and in the off‑season
    they join a weekend pick‑up soccer game at the community park to stay active.
  arts: Isabella Smith, a dedicated piano student, spends afternoons mastering Beethoven’s Moonlight Sonata and, during breaks, dives into Agatha Christie mystery novels while humming the piano themes of
    Hans Zimmer’s film scores, and they often quote lines from the animated classic 'The Lion King' during school talent shows.
  travel: Isabella Smith has explored Michigan’s Sleeping Bear Dunes and taken a school‑organized trip to Washington, D.C., while dreaming of attending a youth robotics expo in Tokyo and spending a summer
    at Disney World’s Magic Kingdom with friends.
  culinary: Isabella Smith prefers comfort foods such as cheesy macaroni and pepperoni pizza, but they also experiment with making strawberry‑banana smoothies and easy peanut‑butter banana muffins under
    Mom’s guidance, and they delight in the occasional family‑style apple pie served after a weekend swim meet.
  core: Isabella Smith is a methodically competitive twelve‑year‑old who blends disciplined robotics tinkering with diligent piano practice, curates a meticulous allowance budget, and balances a love for
    structured swimming and puzzles with occasional over‑planning and a penchant for nighttime snack raids.
background:
  cultural: Isabella was raised in Bloomfield Hills, a suburban community in Oakland County, Michigan, characterized by a predominantly White, middle‑upper‑class population. Her family embraces Midwestern
    values of diligence, punctuality, and community involvement. She attends a public elementary school that prioritizes academic achievement and extracurricular participation. Cultural influences include
    traditional American customs, occasional celebrations of her family's European heritage, and engagement in local organizations such as the Girl Scouts, reflecting a blend of community‑oriented and individualistic
    values.
