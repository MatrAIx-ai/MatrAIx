  career_goals: Isabella aims to graduate high school with honors and attend a reputable university. She is drawn to structured, science‑focused careers such as biomedical engineering or veterinary medicine,
    where she can apply her analytical skills and love for helping living beings. She also imagines a future where she might teach, sharing her organized study methods and encouraging other students to
    achieve academic excellence.
