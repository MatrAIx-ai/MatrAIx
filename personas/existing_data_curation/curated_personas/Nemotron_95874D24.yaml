personas:
  professional: Anthony Norman, a retired municipal maintenance supervisor, applies their hands‑on carpentry, plumbing, electrical troubleshooting and budgeting skills to oversee home repairs, tend their
    modest herb garden with precise schedules, and mentor senior‑center volunteers in basic maintenance, reflecting their love of structure while occasionally indulging in spontaneous model‑ship building
    sessions.
  sports: Anthony Norman enjoys low‑impact outdoor pursuits, spending sunrise mornings fishing off the Miami shoreline, taking short beach walks for relaxation, and cheering on the Miami Marlins, while
    occasionally joining a local bird‑watching club’s weekend outings that blend sport and nature.
  arts: Anthony Norman's artistic expression emerges through meticulous scale model ship building inspired by classic maritime paintings by J.M.W. Turner, an avid reading habit that includes historical
    non‑fiction by Erik Larson and mystery novels by Agatha Christie, and occasional visits to local art galleries showcasing seascape art, which together shape their reflective leisure time.
  travel: Anthony Norman prefers modest, road‑trip style vacations within Florida, planning short stays at coastal towns such as Key West, Naples, and Fort Lauderdale to fish, photograph sunsets, and savor
    quiet beaches, while avoiding larger travel stress by booking accommodations a month in advance and traveling with a well‑packed cooler and their trusted fishing hat.
  culinary: Anthony Norman delights in preparing simple, fresh meals with Caribbean flair, often grilling snapper seasoned with allspice, lime, and a splash of coconut milk, serving it alongside cilantro‑lime
    quinoa and a mango‑ginger salsa, while their herb garden supplies basil, thyme, and mint for daily sauces and teas.
  core: Anthony Norman is a meticulous, solitary retiree who balances a love for hands‑on projects and model‑ship building with bouts of intense anxiety, finding calm in fishing, guided breathing, and structured
    routines, yet can be stubbornly dismissive of appointments when feeling overwhelmed.
background:
  cultural: Anthony grew up in a suburban Midwestern community in a traditional white, middle-class family. After a career in municipal operations, he retired to Miami, where he has adopted aspects of the
    local coastal culture - enjoying fresh seafood, casual outdoor living, and the multilingual environment. He appreciates the vibrant Cuban and Caribbean influences in Miami's food, music, and community
    events, while maintaining the work ethic and values of his Midwestern upbringing. He celebrates American holidays with family traditions and occasionally participates in neighborhood block parties that
    reflect the city's cultural diversity.
attributes:
  skills: '[''Basic Carpentry'', ''Plumbing Repairs'', ''Electrical Troubleshooting'', ''Home Budget Management'', ''Computer Troubleshooting (Windows)'', ''Project Scheduling'', ''Small Team Coordination'',
    ''Routine Boat Maintenance'', ''Model Ship Building'']'
  hobbies: '[''Solo Fishing'', ''Herb Gardening'', ''Birdwatching'', ''Reading Historical Non-fiction'', ''Model Ship Building'', ''Cooking Caribbean-Inspired Dishes'', ''Morning Beach Walks'', ''Guided
    Breathing Exercises'']'
  career_goals: Although retired from municipal service, Anthony’s ambitions focus on preserving his independence, staying mentally active, and giving back in modest ways. He aims to tidy his financial
    records, complete a personal memoir, learn digital photography, and volunteer a few hours each month at the local senior center, mentoring volunteers in basic maintenance tasks. He also hopes to travel
    modestly within Florida, especially to coastal fishing spots, while maintaining his health and managing anxiety through consistent routines.
