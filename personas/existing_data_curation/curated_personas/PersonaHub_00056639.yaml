persona_description: A historian who is interested in the pre-colonial history of New Zealand, particularly the indigenous bird life and its extinction. They are fascinated by the story of the Haast's eagle
  and its unique characteristics, including its ability to navigate within the pre-colonial forest by flapping and swooping on prey. They are also interested in the theories of predation and the impact
  of human activity on the environment, particularly the destruction of lowland forest habitats and the hunting of moa by the Haast's eagle.
