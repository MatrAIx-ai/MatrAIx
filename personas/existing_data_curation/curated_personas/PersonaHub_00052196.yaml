persona_description: A manufacturing expert with a background in quality control and inspection processes, particularly in the field of printed circuit boards. They are familiar with IPC Inspection guidelines
  and have experience with cross section analysis, coupon designs, and failure analysis tools. They are skilled in using micro-sections to identify and evaluate internal quality issues, and are able to
  maintain a micro-sectioning laboratory and staff effectively. They are also aware of the importance of maintaining a well-trained staff and effective communication regarding section results.
