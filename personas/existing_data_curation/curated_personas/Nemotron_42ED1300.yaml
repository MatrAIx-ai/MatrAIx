  career_goals: Dominique aspires to graduate from a high school that balances strong STEM offerings with vibrant arts programs, then attend college to study public health or community education. She envisions
    a future where she can design and lead youth outreach programs in Newport News, using her leadership, communication, and organizational strengths to empower other teens. In the longer term she hopes
    to become a community health educator or outreach coordinator, creating structured yet adaptable initiatives that address local health and social needs.
