personas:
  professional: Dominique Jones is a 14‑year‑old freshman who juggles school‑team basketball practices, dance crew rehearsals, and drama club productions, relying on a practical, short‑term focus that keeps
    immediate tasks on track while often letting long‑term planning slip.
  sports: Dominique Jones plays point guard on the school basketball team, adds extra drills at a local youth gym, and follows the Norfolk Admirals (E‑CHL hockey) and Norfolk Tides (AAA baseball) with enthusiastic
    Friday night viewings, making team spirit a core part of their social life.
  arts: Dominique Jones shines on stage in drama club productions, grooves with a hip‑hop dance crew, and crafts short TikTok videos set to tracks by Billie Eilish, Ariana Grande, and Lil Nas X, drawing
    inspiration from Broadway hits like 'Hamilton' and film dances such as 'Step Up'.
  travel: Dominique Jones spends weekends exploring historic sites like Yorktown Battlefield and Fort Monroe, enjoys spontaneous road trips to nearby Williamsburg and the Outer Banks, dreams of a group
    vacation to New Orleans for jambalaya, and hopes to join a summer theatre program abroad in London.
  culinary: Dominique Jones helps their family prepare soul‑food staples such as fried catfish, collard greens, cornbread, and peach cobbler, experimenting with smoked paprika and hot sauce, but often leaves
    the kitchen a mess after cooking, savoring the lingering aromas.
  core: Dominique Jones thrives on collaborative performance and on‑the‑fly creativity while habitually leaving homework for the last minute, balancing group energy with a scatter‑brained approach to organization.
background:
  cultural: Dominique grew up in Newport News, Virginia, within a close‑knit African‑American community that honors both Southern heritage and the city’s shipbuilding legacy. Her family participates in
    weekly gospel services, celebrates holidays with soul‑food meals like fried catfish, collard greens, and sweet potato pie, and attends local cultural events such as the Virginia Beach Black Heritage
    Festival. Through school, she has learned about the contributions of Black Virginians to civil‑rights history and frequently visits the Newport News Public Library’s "Black Voices" collection. These
    experiences give her a strong sense of community, resilience, and pride in her cultural identity.
