  hobbies: '[''Art museum visits'', ''Watercolor painting'', ''Landscape photography'', ''Model-train building'', ''Fine woodworking'', ''Gardening (herbs and perennials)'', ''Reading (biographies, historical
    fiction)'', ''Seniors book club'', ''STEM mentoring volunteer work'', ''Live-theater and classical concerts'', ''Birdwatching'', ''Chess'']'
  career_goals: Although officially retired, Quentin aims to stay intellectually active by publishing a series of reflective essays that blend his engineering background with his love of art, and by establishing
    a local STEM-arts outreach program for middle-school students in Bucks County. He hopes to complete a detailed model-train layout that combines historical railway engineering with his hobbyist woodworking,
    and to curate a small private collection of 19th-century American landscape paintings for occasional community exhibitions. He also aspires to serve on the board of the Bucks County Historical Society,
    where his organizational skills can help preserve local heritage. Finally, Quentin seeks to maintain his health and emotional well-being by dedicating regular time to mindfulness practices that mitigate
    his tendency toward worry.
