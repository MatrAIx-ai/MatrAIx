personas:
  professional: An aspiring junior coder, Huiming Choe blends organized project planning with a love for marine science, developing simple games that simulate tide‑pool ecosystems while they balance schoolwork
    and after‑school coding clubs.
  sports: A dedicated young surfer, Huiming Choe trains with the Coastal Bay Junior Surf Club, competes in regional surf contests, swims for the local Aquatics Team, and they proudly back the Los Angeles
    Lakers while also rooting for the national women's volleyball squad.
  arts: A creative storyteller, Huiming Choe draws manga‑style characters, practices calligraphy with brush pens, strums the ukulele to songs by Jake Shimabukuro, and they draw inspiration from sci‑fi authors
    like N.K. Jemisin and graphic novelists such as Junji Ito.
  travel: A curious explorer, Huiming Choe has visited the Monterey Bay Aquarium and the tide pools of Point Reyes, dreams of snorkeling at the Great Barrier Reef, they meticulously plan family road trips
    using a spreadsheet, and they balance budget constraints with a love for educational beach getaways.
  culinary: A budding foodie, Huiming Choe enjoys grilled salmon tacos with avocado, hearty clam chowder, and homemade bubble tea, experiments with simple sushi rolls for class projects, and they often
    add fresh seaweed and sesame seeds to their meals.
  core: Huiming Choe balances disciplined planning with a boundless curiosity for marine life, art, and tech, they turn every tide‑pool expedition into a new story while keeping a tidy budget, health log,
    and a sketchbook always within reach.
background:
  cultural: Huiming is a second‑generation Korean American. Her family maintains Korean traditions such as celebrating Chuseok and Lunar New Year, preparing kimchi, and learning Hangul at home, while also
    embracing Hawaiian customs like hula, ukulele music, and community ‘ohana gatherings. Growing up in Honolulu, she is immersed in a multicultural environment where Hawaiian, Asian, and Pacific Islander
    cultures intersect. This blend of heritage has fostered her respect for diverse perspectives, a strong sense of family responsibility, and an appreciation for both disciplined study and the island's
    natural world.
attributes:
  skills: '["Mathematics (algebraic thinking)", "Science (life and earth sciences)", "Bilingual communication (English & Korean)", "Basic programming (Scratch, introductory Python)", "Organizational planning",
