  hobbies: '["Tide‑pool exploration", "Beach clean‑ups", "Swimming", "Surf lessons", "Manga drawing", "Korean calligraphy", "Basic game coding", "Reading science‑fiction", "Ukulele playing", "Attending
    cultural festivals"]'
  career_goals: Huiming aims to pursue a STEM‑focused education in high school, with a particular interest in marine biology and environmental science. She envisions attending a university where she can
    study coral reef preservation and work with organizations protecting Hawaii's marine ecosystems. She also hopes to leverage her bilingual abilities to facilitate cross‑cultural communication in scientific
    collaborations. In the long term, she aspires to become a marine researcher or environmental policy analyst, contributing to sustainable practices that benefit both her local Hawaiian community and
    broader East Asian regions.
