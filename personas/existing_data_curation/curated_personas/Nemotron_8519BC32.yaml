  hobbies: '[''Hiking local trails'', ''Cycling along river paths'', ''Cooking with seasonal produce'', ''Volunteering with Habitat for Humanity'', ''Community clean‑up participation'', ''Reading historical
    fiction'', ''Following civil‑engineering journals'', ''DIY home‑improvement projects'']'
  career_goals: Jessica aims to earn her Professional Engineer (PE) license within the next two years and progress into a project manager role overseeing large-scale, sustainable infrastructure initiatives.
    She is interested in deepening her expertise in resilient water‑resource systems and hopes to pursue a master’s degree focused on green infrastructure. Long‑term, she envisions leading a regional engineering
    firm’s public works division, mentoring junior engineers, and championing community‑focused projects that improve flood mitigation and transportation efficiency in the St. Clair County area.
