personas:
  professional: Jessica Long is a civil engineer specializing in municipal infrastructure, wielding advanced skills in STAAD.Pro, AutoCAD Civil 3D, Revit, GIS, and project scheduling while applying their
    preference for structure and predictability to deliver code‑compliant, sustainable designs that balance practicality with innovative resilience.
  sports: Jessica Long is an avid outdoor enthusiast who regularly hikes the Kaskaskia River Trail, cycles the Illinois River bike path, and supports the St. Louis Cardinals and the Chicago Bears, while
    also belonging to a local cycling club that organizes weekend rides and occasional charity runs.
  arts: Jessica Long relaxes by devouring historical fiction novels from authors like Hilary Mantel and Ken Follett, attends the Belleville Art Walk to admire regional painters, and streams folk‑rock favorites
    such as The Avett Brothers and Joni Mitchell, allowing music and literature to inform their creative approach to DIY home‑improvement projects.
  travel: Jessica Long prefers road‑trip adventures that combine camping under the stars in the Ozark National Forest with short urban getaways to Chicago’s architectural tours, planning trips meticulously
    using spreadsheets yet leaving room for spontaneous detours to local farmers’ markets in Iowa.
  culinary: Jessica Long enjoys cooking with fresh produce from Belleville’s farmers’ market, often reinventing Midwestern staples like corn‑bread casseroles with heirloom tomatoes, locally sourced pork,
    and a hint of smoked paprika, while their intermediate culinary skills shine in crafting an herb‑infused sweet potato risotto and a crisp kale‑apple slaw.
  core: Jessica Long blends an engineer’s precision with a love for the outdoors, managing budgets with calculator‑precision, treating health proactively, and sprinkling everyday life with historic novels,
    folk music, and farm‑fresh meals, all while occasionally over‑scheduling and forgetting to water their houseplants.
background:
  cultural: Jessica is a white Midwesterner of Irish‑German ancestry who grew up in Belleville, Illinois. Raised in a close‑knit Catholic community, she internalized values of hard work, reliability, and
    service to others. The region’s blend of small‑town friendliness and industrial heritage shapes her practical outlook and appreciation for sturdy, well‑planned infrastructure. Local traditions—such
    as the Belleville Apple Festival, St. Patrick’s Day parade, and seasonal farmers’ markets—inform her love of community gatherings and seasonal foods. Her cultural background reinforces a modest, collaborative
    approach to both professional and personal life, while also encouraging her to contribute positively to the community that shaped her.
