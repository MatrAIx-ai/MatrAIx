  career_goals: Brenda dreams of a career that lets her give back to her community while tapping into her curiosity and practical mindset. She aims to become a bilingual youth outreach coordinator or community
    health worker, helping farmworker families access resources and education. She also imagines studying agricultural science or environmental stewardship to protect the fields that surround her hometown,
    and eventually mentoring younger students to foster confidence and cooperation.
