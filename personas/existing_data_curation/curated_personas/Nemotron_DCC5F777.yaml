personas:
  professional: Ernie Koski, a veteran restaurant floor manager with over 30 years of hands‑on hospitality experience; they leverage their meticulous POS accuracy, conflict‑de‑escalation finesse, and skeptical
    eye for operational inefficiencies to streamline service flow while mentoring staff in a calm, results‑driven manner.
  sports: Ernie Koski, a regular jogger on the Lake Benbrook trail and avid supporter of the Dallas Cowboys, the Texas Rangers, and the Dallas Mavericks; they also belong to a small fishing club at Cedar
    Creek Reservoir and play occasional lawn‑bowling with a local senior league to stay active through the seasons.
  arts: Ernie Koski, a devoted reader of historical non‑fiction and investigative journalism; they unwind by listening to classic folk storytellers like John Prine and Townes Van Zandt, watch Ken Burns
    documentaries, and occasionally attend performances at the community theater featuring Tennessee Williams’ plays.
  travel: Ernie Koski, who meticulously plans low‑key road trips to destinations like Marfa, Texas, Santa Fe, New Mexico, and Sedona, Arizona; they prefer scenic drives and quiet evenings over bustling
    resorts, balancing a love of exploration with a modest travel budget that leaves room for occasional family visits in the Dallas area.
  culinary: Ernie Koski, a competent home cook who delights in crafting Tex‑Mex dishes such as carne asada tacos, chiles rellenos, and smoky chipotle salsa using freshly sourced tomatillos, ancho chilies,
    and cilantro from the local farmer’s market; they frequently experiment with custom spice blends to perfect flavor balance while juggling restaurant shifts.
  core: Ernie Koski blends a skeptical, analytical mind with hands‑on hospitality expertise, channeling their solitary hobbies—fishing, woodworking, and spice experimentation—into a steady climb toward
    restaurant management while maintaining a calm, detail‑driven approach to life.
background:
  cultural: Ernie grew up in a modest, upper‑midwest‑influenced suburb of the Dallas‑Fort Worth area, absorbing a blend of traditional Southern hospitality and the self‑reliant work ethic common in Texas.
    His family’s values emphasized practical problem solving, personal responsibility, and a quiet, understated approach to social interaction, which aligns with his reserved nature. The regional culture
    of barbecues, community gatherings at local diners, and a respect for rugged outdoor pursuits like fishing and hunting has shaped his appreciation for straightforward, well‑executed service and his
    interest in regional cuisine.
attributes:
  skills: '[''Customer service'', ''Menu knowledge'', ''Food safety compliance'', ''Point-of-sale (POS) system operation'', ''Cash handling'', ''Conflict resolution'', ''Time management'', ''Team coordination'',
