  hobbies: '[ ''Visiting art galleries and museums'', ''Street photography'', ''Listening to jazz and hip‑hop'', ''Reading on art, philosophy, and technology'', ''Urban gardening'', ''Cooking soul‑food
    recipes'', ''Community basketball'', ''Volunteer tutoring for financial literacy'' ]'
  career_goals: At 50, Naymon aims to move into a senior leadership role within his institution, such as Branch Manager or Director of Consumer Lending, where he can shape policy and mentor younger counselors.
    He also plans to launch a community‑focused financial literacy program in the Bronx, leveraging his art appreciation to create engaging, culturally resonant workshops. Long‑term, he hopes to transition
    into consulting for non‑profit housing initiatives, using his expertise to improve access to affordable credit for underrepresented neighborhoods.
