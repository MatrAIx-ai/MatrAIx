persona_description: A scientist who specializes in cryopreservation and cryobiology, particularly in the field of insect embryology. They are currently working on improving the survival rates of embryos
  and larvae of the primary screwworm, Cochliomyia hominivorax, for subsequent cryopreservation studies. They have successfully permeabilized the embryos for use in subsequent cryopreservation studies and
  have identified factors that affect their survival. They are looking for a media for culturing the embryos during and immediately after treatment and for a procedure for rearing the larval stages to improve
  survival for emerging adults.
