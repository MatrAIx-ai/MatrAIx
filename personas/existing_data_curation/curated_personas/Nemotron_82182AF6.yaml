personas:
  professional: Teresita Dominquez, a 24-year-old hospitality supervisor who deftly leads front-line teams with bilingual fluency and a hands-on knack for scheduling, inventory control, and point-of-sale
    troubleshooting, channels her curiosity into staying abreast of service trends while her relaxed, slightly disorganized style keeps the work floor adaptable and upbeat.
  sports: Teresita Dominquez, an avid beach volleyball player with the Galveston Beach Volleyball Club, a regular yoga practitioner, and a passionate fan of the Houston Astros and Houston Rockets, blends
    casual weekend games with enthusiastic support for local pro teams, embodying a balance of active participation and spectator loyalty.
  arts: Teresita Dominquez, whose evenings often feature salsa and cumbia dancing, karaoke performances, and Instagram reels showcasing local festival scenes, draws creative inspiration from artists like
    Celia Cruz, Carlos Vives, and contemporary street muralist JR, weaving music, dance, and visual culture into her vibrant social identity.
  travel: Teresita Dominquez, a spontaneous road-trip enthusiast who loves cruising the Texas Gulf Coast, has explored New Orleans’ French Quarter, plans a future getaway to Oaxaca’s culinary markets, and
    occasionally day-trips to the historic charm of San Antonio, all while preferring flexible itineraries over rigid schedules.
  culinary: Teresita Dominquez, a weekend culinary experimenter who perfects mole using dried chilies, chocolate, and spices, crafts fresh seafood tacos with shrimp, fish, cilantro, lime, and a dash of
    chipotle mayo, and mixes traditional family recipes with Gulf Coast flavors, demonstrates intermediate cooking skills while eagerly swapping tips at local farmers’ markets.
  core: Teresita Dominquez, the endlessly curious yet laid-back social butterfly, juggles a bustling hospitality career, spontaneous salsa nights, beach volleyball, and a dream of opening a beachfront eatery
    that fuses traditional flavors with coastal flair.
background:
  cultural: 'Teresita grew up in a Mexican‑American household where Spanish was spoken at home and English at school. Her family celebrates Mexican holidays like Día de los Muertos and Las Posadas, and
    they keep culinary traditions alive through weekly family meals and weekend tamale‑making. Living in Galveston, she blends her heritage with the coastal Texas culture: she enjoys Gulf seafood, participates
    in local festivals, and values the warm sense of community typical of both Mexican and Southern traditions. Her Catholic upbringing informs her appreciation for community service and the importance
    of family bonds. Being bilingual allows her to navigate both cultures seamlessly, and she takes pride in representing her heritage in her professional and social circles.'
attributes:
  skills: '[''Team Leadership'', ''Customer Service'', ''Bilingual Communication (English/Spanish)'', ''Scheduling and Shift Management'', ''Inventory Control'', ''POS System Operation'', ''Basic Bookkeeping'',
    ''Conflict Resolution'', ''Social Media Marketing'', ''Event Coordination'', ''Adaptable Problem Solving'']'
  hobbies: '[''Salsa Dancing'', ''Beach Volleyball'', ''Cooking Mexican Dishes'', ''Attending Local Festivals'', ''Volunteer Teaching Spanish'', ''Traveling the Gulf Coast'', ''Social Media Content Creation'',
    ''Karaoke Nights'', ''Yoga'', ''Exploring New Restaurants'']'
  career_goals: Looking ahead, Teresita aims to earn an associate's degree in Business Administration while continuing to work, positioning herself for promotion to district or regional manager within the
    hospitality sector. She also dreams of opening her own beachfront eatery that blends traditional Mexican flavors with Gulf Coast seafood, using her management experience and cultural roots to create
    a community gathering spot. In the short term, she plans to obtain certifications in hospitality management and leadership, improve her organizational skills, and mentor younger employees, especially
    those from the local Mexican‑American community.
