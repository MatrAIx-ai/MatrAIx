persona_description: A paleontologist who specializes in the study of dinosaur anatomy and behavior, particularly the use of arms and legs in locomotion and posture. Has a background in paleobiology and
  has written extensively on the topic of dinosaur behavior and anatomy. Is knowledgeable about the work of paleontologists such as Barney Newman and has a deep interest in the question of what dinosaurs
  were capable of and how they used their arms. Is also interested in the use of dinosaurs in popular culture and has written about the idea of dinosaurs using their arms to push themselves off the ground.
