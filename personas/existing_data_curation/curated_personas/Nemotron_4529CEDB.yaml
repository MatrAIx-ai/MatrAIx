personas:
  professional: Mariam Varga is a budding junior naturalist who spends weekends cataloguing leaves, bugs, and rocks, blends their curiosity with practical problem‑solving through building intricate Lego
    models and Scratch animations, and navigates projects with a relaxed, sometimes disorganized style that favors flexibility over rigid planning.
  sports: Mariam Varga plays forward on the River Valley Rush youth soccer team, practices three times a week at the local park, enjoys cheering for the New York Yankees and the US women’s national soccer
    team, and balances their energetic training with a laid‑back attitude that lets them skip a drill when feeling too relaxed.
  arts: Mariam Varga draws detailed pictures of animals inspired by National Geographic wildlife illustrations, loves the animated films of Hayao Miyazaki such as "My Neighbor Totoro," and listens to pop
    songs by Taylor Swift and the soundtrack of "Frozen," letting these creative influences shape their leisure time and fuel their imagination.
  travel: Mariam Varga loves spontaneous road trips to nearby state parks like Yellowstone and the Grand Canyon, delights in collecting rocks and leaves on family vacations, dreams of visiting the Galápagos
    Islands to see unique wildlife, and prefers flexible itineraries over rigid schedules, often letting their mother handle the planning while they pack a small backpack of art supplies.
  culinary: Mariam Varga delights in baking chocolate chip cookies and gingerbread men with their mother during the holidays, enjoys sprinkling cinnamon and colorful sprinkles on the dough, can follow simple
    recipes with moderate skill, and loves tasting sushi rolls with avocado and cucumber on special family outings.
  core: Mariam Varga is a curious nine‑year‑old who blends science, art, and sport, frequently misplaces their allowance, loves messy cookie dough, and tackles challenges with calm confidence.
background:
  cultural: Mariam grows up in Fort Worth, Texas, within a middle‑class white family that values Southern hospitality and community traditions. Her household celebrates holidays such as Thanksgiving, Christmas,
    and the Fourth of July with classic Texan foods like barbecue and pecan pie, and they often attend local high school football games and the State Fair. The family participates in a local church, fostering
    a sense of compassion and service. While her immediate cultural practices reflect suburban Texan customs, the diversity of Tarrant County exposes her to a variety of cultures, adding a broader appreciation
    for music, food, and celebrations from neighboring Hispanic and African‑American communities.
