personas:
  professional: A ten‑year‑old aspiring technologist and visual storyteller, James Wright blends meticulous LEGO engineering with digital illustration to prototype sci‑fi inspired concepts, leveraging their
    innate curiosity, disciplined organization, and preference for solo creativity to produce detailed design journals that rival junior science fair projects.
  sports: James Wright enjoys low‑key physical pursuits like weekend nature hikes with a local youth conservation club and follows the Seattle Seahawks and New York Yankees for the excitement of team sports,
    but prefers solitary fitness activities such as bike rides through wooded trails to clear their mind.
  arts: James Wright devotes hours to drawing intricate insect sketches, creating digital fantasy landscapes, and studying the works of Leonardo da Vinci, Hayao Miyazaki, and the ambient soundtracks of
    Brian Eno, letting these influences shape a unique artistic voice that surfaces in their short sci‑fi stories.
  travel: James Wright’s travel diary is filled with trips to the local science museum, a family vacation to the Grand Canyon where they photographed geology layers, and a budding wish to explore Iceland’s
    geysers and the night sky of the Atacama Desert to fuel future astronomy projects.
  culinary: James Wright enjoys crafting simple yet artistic snacks, favoring peanut‑butter banana sandwiches, building colorful fruit kebabs, and occasionally experimenting with homemade pizza dough topped
    with mozzarella and fresh basil, though they often forget to eat vegetables.
  core: James Wright, a ten‑year‑old prodigy, channels boundless curiosity into solitary art and robotics, balances meticulous budgeting with occasional impulse buys, and navigates life with calm precision,
    all while occasionally neglecting veggies and social chatter.
background:
  cultural: James grew up in Robertsville, a small, close‑knit community in Franklin County, Missouri. His family values self‑reliance, education, and a respectful relationship with the surrounding natural
    environment. Local traditions such as community fairs, library story hours, and visits to the nearby state park have fostered his appreciation for both rural life and broader cultural experiences. While
    his formal schooling is currently below the ninth‑grade level, his parents encourage independent learning through books, online resources, and hands‑on projects. The Midwestern ethos of modesty, hard
    work, and curiosity subtly informs James's disciplined approach to his interests and his desire to excel quietly and thoughtfully.
