  career_goals: James envisions a future where he can combine his love for art, science, and solitary inquiry. He aspires to become a scientific illustrator or a museum curator specializing in natural history,
    creating precise visual representations of complex concepts. Alternatively, he dreams of pursuing a career as an astronomer or research scientist who can work independently on data analysis and publish
    findings. In all scenarios, he aims to achieve high standards of excellence, contributing original ideas and meticulous work to his chosen field, while preserving the quiet, focused environment that
    nurtures his creativity.
