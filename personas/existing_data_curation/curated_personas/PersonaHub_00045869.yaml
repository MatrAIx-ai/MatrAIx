persona_description: A laboratory instructor or a professional working in the field of chemistry, who is responsible for ensuring safe and effective working conditions in a laboratory environment. They
  are also knowledgeable about the importance of personal code of conduct, proper disposal of waste materials, and the methods of lifting objects in a laboratory setting. They are likely to be interested
  in topics such as the hazards of storing and consuming food or drink, smoking in a laboratory, and the methods of disposal of waste materials. They are also interested in the principles of the hydraulic
  press, the types of explosives, and the layers of the atmosphere.
