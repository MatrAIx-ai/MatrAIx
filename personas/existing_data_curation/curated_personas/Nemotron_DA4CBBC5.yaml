personas:
  professional: Terrance Smith is an aspiring junior programmer who spends afternoons in the community center’s computer lab building Arduino‑based sensors and crafting pixel art games, channeling their
    curiosity and practicality while thriving in the quiet solitude of code.
  sports: Terrance Smith enjoys solo jogging on the Ridgeland nature trail and occasional fishing at Twin Lakes, while cheering for the Jackson State Tigers football team and following the Mississippi State
    Bulldogs basketball squad on social media, though they never join a formal sports club.
  arts: Terrance Smith immerses in digital pixel art inspired by the moody landscapes of Simon Stålenhag while listening to instrumental hip‑hop beats from Nujabes, classic soul tracks by James Brown, and
    mellow jazz from Miles Davis, which together shape the aesthetic of their indie game projects.
  travel: Terrance Smith dreams of a tech‑focused road trip to Austin’s South By‑Southwest conference and a cultural pilgrimage to New Orleans for its jazz heritage, while cherishing past weekend hikes
    along the Natchez Trace Parkway and a school field trip to the Mississippi Museum of Natural Science.
  culinary: Terrance Smith enjoys cooking simple comfort dishes such as fried catfish with collard greens and sweet potato pie, often experimenting with seasoning while listening to jazz, and they rely
    on quick snacks like granola bars and fruit to fuel late‑night coding sessions.
  core: Terrance Smith is a quietly ambitious teen who balances a love for solitary coding and pixel art with a tendency to procrastinate, occasional anxiety, and a habit of staying up too late gaming,
    all while dreaming of creating tech spaces for other young creators.
background:
  cultural: Terrance is a Black teenager raised in Ridgeland, Mississippi, a town with deep roots in the African‑American experience of the Deep South. His family’s history includes participation in the
    civil‑rights movement and strong ties to the local Black church, where gospel music and community storytelling were a regular part of life. Cultural gatherings, such as Juneteenth celebrations and church
    picnics, reinforced a sense of pride and continuity. The region’s musical heritage—blues, soul, and modern hip‑hop—shapes his tastes and influences his digital art. He attended a community center after
    school that offered free computer lab access, where he discovered programming and electronics. Growing up in a close‑knit neighborhood, he learned the value of mutual support, resilience, and the importance
    of representation, which now fuels his ambition to succeed in tech and create spaces where other young Black creators feel seen.
attributes:
  skills: '[''basic programming (Python, HTML/CSS)'', ''electronics tinkering (Arduino, Raspberry Pi)'', ''video game strategy and analysis'', ''handyman repairs (basic carpentry, plumbing)'', ''creative
