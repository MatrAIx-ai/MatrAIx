  hobbies: '[''reading sci‑fi/fantasy novels'', ''single‑player video gaming (RPGs, strategy)'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''digital art and pixel drawing'', ''jogging/walking
    in nature'', ''journaling and creative writing'', ''listening to instrumental hip‑hop/jazz'', ''watching tech and African‑American history documentaries'']'
  career_goals: Terrance aims to turn his self‑taught tech abilities into a formal career by attending a technical high school program or community college that offers computer science and engineering courses.
    He dreams of becoming a software developer, ideally focusing on indie game development or user‑interface design that lets him work remotely and maintain a solitary, flexible work environment. He also
    sees value in gaining certifications in IT support or cybersecurity to provide stable, practical employment while he builds his own creative projects. Long‑term, he hopes to create a game that reflects
    his personal story and cultural heritage, offering representation for Black youth in the tech space.
