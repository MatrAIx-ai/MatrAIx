  hobbies: '[''Visiting Art Galleries and Museums'', ''Attending Mexican Cultural Festivals (e.g., Día de los Muertos)'', ''Cooking Traditional Mexican Cuisine'', ''Salsa and Folkloric Dance Classes'',
    ''Volunteering at Senior Centers (art workshops)'', ''Yoga and Mindfulness Practice'', ''Reading Latin American Literature (book club)'', ''Pottery and Craft Workshops'', ''Community Event Participation'']'
  career_goals: She aims to advance from an administrative assistant role to an office manager or program coordinator position within a nonprofit cultural organization or community center. Dora plans to
    complete her bachelor's degree in Business Administration or Nonprofit Management within the next three years, possibly earning a project management certification. She aspires to lead teams, mentor
    junior staff, and design programs that blend administrative efficiency with artistic and cultural outreach. Long‑term, she hopes to spearhead a local arts education initiative that provides resources
    and workshops for under‑served neighborhoods in East Los Angeles.
