personas:
  professional: Dora Zuniga is an administrative assistant in a nonprofit cultural center who leverages their bilingual fluency, meticulous calendar management, and passion for community art programming
    to streamline operations while dreaming of a future office manager role that blends efficiency with creative outreach.
  sports: Dora Zuniga embraces active weekends with weekly salsa and folkloric dance classes, yoga sessions at the local studio, and cheering for the LA Galaxy soccer team, while also joining their community
    jogging club at El Monte’s Hillcrest Park during spring and summer.
  arts: Dora Zuniga immerses themselves in the Los Angeles art scene, frequenting galleries showcasing works by Frida Kahlo and contemporary street artist RETNA, attending Mexican cultural festivals with
    performances of mariachi groups like Mariachi Vargas, and participating in a book club that discusses Latin American authors such as Isabel Allende.
  travel: Dora Zuniga favors culturally rich trips, having explored the historic towns of Guadalajara and Oaxaca to sample regional cuisine, while dreaming of a future pilgrimage to Barcelona’s architectural
    marvels, and they typically plan trips months in advance to accommodate their family’s summer schedule and limited vacation days.
  culinary: Dora Zuniga delights in preparing traditional mole poblano, fresh salsa verde with tomatillos, and experimental fusion dishes like kimchi‑infused quesadillas, favoring ingredients such as epazote,
    ancho chilies, and masa harina, though they sometimes over‑season their creations in a quest for bold flavor.
  core: Dora Zuniga is a compassionate community organizer whose organized mind and artistic curiosity are tempered by a persistent undercurrent of anxiety that fuels both their drive and occasional procrastination.
background:
  cultural: Dora grew up in a Mexican‑American household in Southern California, where Spanish was spoken at home and family traditions such as Día de los Muertos, quinceañeras, and communal meals were
    central to daily life. Her parents migrated from Jalisco, bringing strong values of familial responsibility, respect, and community solidarity (familismo). Living in El Monte, a city with a vibrant
    Latino community, she has blended these cultural roots with the broader multicultural fabric of Los Angeles, celebrating both Mexican holidays and mainstream American observances. This bicultural experience
    informs her appreciation for diverse artistic expressions, her commitment to community service, and her bilingual communication style.
attributes:
