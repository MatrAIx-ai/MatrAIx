personas:
  professional: Inessa Panas, a veteran maintenance and repair specialist with decades of hands‑on experience in mechanical, electrical, HVAC, and plumbing systems, they blend a curiosity for emerging diagnostic
    tools with a practical, no‑nonsense approach to troubleshooting, often improvising on the spot while mentoring younger technicians and navigating loose schedules with spontaneous flexibility.
  sports: Inessa Panas stays active by cycling the historic Rose Creek Trail with the local Pine Creek Cyclists club, cheering the South Carolina Gamecocks football team on Saturdays, and attending the
    Aiken Steeplechase where they enjoy the social buzz while quietly supporting the community’s equestrian heritage.
  arts: Inessa Panas nurtures their creative side through a knitting circle that produces functional blankets for the shelter, devouring Southern folklore memoirs by James McBride and listening to folk‑blues
    legends like Rhiannon Giddens and the Avett Brothers while attending quarterly lectures at the Aiken Public Library.
  travel: Inessa Panas prefers low‑key road trips in their trusty Corolla, savoring historic tours of Charleston’s cobblestone streets, a weekend in Savannah’s riverfront squares, and a yearly pilgrimage
    to New Orleans for Mardi Gras, all balanced against a limited travel budget that leads them to book off‑season stays at family‑run B&Bs.
  culinary: Inessa Panas loves cooking farm‑to‑table Southern dishes, often plating heirloom tomato gazpacho, shrimp and grits with a dash of smoked paprika, and sweet tea brewed with fresh mint, while
    proudly growing okra, collard greens, and sweet potatoes in their garden to spice up culinary experiments.
  core: Inessa Panas, a 64‑year‑old hands‑on problem‑solver, balances relentless curiosity with old‑school practicality, often improvising on repairs, juggling a modest savings plan, and nurturing community
    ties, all while occasionally forgetting to file paperwork on time.
background:
  cultural: Inessa grew up in the Deep South, raised in a modest, working‑class family in a small town near Columbia, South Carolina. Her upbringing emphasized self‑reliance, hospitality, and a respect
    for tradition, values that remain integral to her identity. As a white Southern woman, she has been shaped by the region’s strong community ties, church involvement, and an appreciation for the natural
    landscape—especially the rolling pine forests and historic plantations of the Lowcountry. Her cultural lens blends a reverence for Southern culinary and folk traditions with an openness to modern innovations,
    reflecting the balance she seeks between curiosity and practicality. The Aiken community’s equestrian heritage and historic preservation efforts have further influenced her sense of place and her commitment
    to contributing to local initiatives.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical wiring and circuit diagnostics'', ''HVAC system maintenance'', ''Plumbing repair and pipe fitting'', ''Equipment installation and calibration'',
