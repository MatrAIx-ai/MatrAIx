  career_goals: She aims to transition into mentorship and leadership, shaping the next generation of developers while championing the integration of art and technology. Minerva plans to launch community
    workshops that combine coding with visual arts, and to contribute to open‑source projects that preserve Guatemalan cultural heritage through digital archives. In the long term, she envisions a senior
    advisory role such as CTO or technical director at a socially‑focused tech startup, allowing her to fuse her technical expertise, artistic sensibility, and cultural pride.
