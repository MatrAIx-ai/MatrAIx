personas:
  professional: Minerva Beltran, a 58‑year‑old veteran full‑stack developer, blends three decades of Python, Java, C++ and JavaScript expertise with a methodical Agile mindset and a curiosity for artistic
    UI/UX, leading cross‑cultural teams through organized project plans while mentoring junior programmers in a reserved yet supportive manner.
  sports: Minerva Beltran, an avid hiker of the Chesapeake Bay trail system, attends sunrise yoga sessions at the local studio, follows the Baltimore Orioles baseball team, and occasionally joins the community's
    5 K run club for charitable events, balancing solitary fitness routines with modest team spirit.
  arts: Minerva Beltran, a dedicated oil and watercolor painter inspired by Mayan motifs, frequents the Baltimore Museum of Art and local galleries, draws creative energy from listening to the marimba ensemble
    Los del Mar, and practices classical piano pieces by Bach and Debussy during evenings, channeling her curiosity and quiet confidence into each artistic endeavor.
  travel: Minerva Beltran, a meticulous planner who prefers solo cultural immersion, has trekked the ruins of Tikal, explored the historic streets of Antigua Guatemala, captured sunrise over the Patagonian
    glaciers, and meticulously budgets each journey through freelance consulting while maintaining a curated travel journal.
  culinary: Minerva Beltran, an enthusiastic home chef, expertly prepares pepian, kak'ik, and tamales using freshly ground corn masa, roasted pepitas, and garden‑grown herbs, pairs her meals with a glass
    of Malbec, and occasionally experiments with fusion dishes, though she admits to over‑seasoning her sauces when inspired.
  core: Minerva Beltran fuses disciplined codecraft with solitary brushstrokes, balancing quiet curiosity, methodical organization, and a steady, assertive mentorship style that shapes both her tech leadership
    and artistic pursuits.
background:
  cultural: Born and raised in the highlands of Guatemala, Minerva grew up amidst a rich tapestry of Mayan traditions, Spanish colonial history, and vibrant folk art. Her family celebrated customs such
    as Día de la Independencia (15 Sept) and Semana Santa with music, textiles, and communal meals. After earning a bachelor's degree in humanities in Guatemala, she moved to the United States in the early
    1990s to pursue graduate studies in the arts, eventually settling in Glen Burnie, Maryland. She remains fluent in Spanish and participates in the local Latinx community, often sharing Guatemalan crafts
    and stories. Her cultural heritage permeates her artistic sensibilities, influencing her programming projects that aim to preserve and promote Guatemalan cultural narratives.
