  hobbies: '[''Dancing to merengue, bachata, salsa'', ''Cooking Dominican cuisine'', ''Playing dominoes'', ''Bowling league participation'', ''Following baseball (Yankees and Dominican League)'', ''Volunteer
    driver for senior transportation program'', ''Engine tinkering and minor vehicle repairs'', ''Listening to transportation and technology podcasts'', ''Hiking in New Jersey state parks'', ''Attending
    Dominican cultural festivals'']'
  career_goals: Juan aspires to advance within the transit authority by becoming a route supervisor and eventually a senior operations manager. He plans to obtain a Certified Bus Instructor credential so
    he can train new drivers and promote safety best practices. Juan is also interested in developing a community shuttle service that provides reliable transportation for senior citizens and low‑income
    families in Newark. Additionally, he seeks to improve his work‑life balance by incorporating stress‑management techniques and possibly transitioning to a part‑time administrative role focused on driver
    scheduling and safety program development.
