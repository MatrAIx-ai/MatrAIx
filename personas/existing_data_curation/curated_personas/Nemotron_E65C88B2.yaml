  career_goals: Approaching traditional retirement, Shakerra aims to transition into a supervisory and training role within her union, earn an OSHA trainer certification, and become a certified safety officer.
    She envisions launching a small consultancy that advises aging homeowners on accessible remodels and sustainable building practices, while continuing to advocate for greater diversity and inclusion
    in the construction trades.
