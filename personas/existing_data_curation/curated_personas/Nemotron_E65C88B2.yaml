personas:
  professional: Shakerra Hooks, a seasoned construction veteran with four decades of experience in framing, masonry, heavy‑equipment operation, and blueprint inspection, leverages their meticulous, solution‑focused
    calm and disciplined scheduling to lead union crews, mentor apprentices, and prepare for an OSHA trainer certification while planning a consultancy for accessible remodels.
  sports: Shakerra Hooks participates in the Washington Trails Club’s monthly hikes, cheers on the Seattle Seahawks on Sundays, follows the Seattle Mariners during spring training, and occasionally joins
    a senior‑friendly softball league with the Emerald City Legends, balancing active outdoors pursuits with relaxed spectator moments.
  arts: Shakerra Hooks immerses themselves in Seattle’s vibrant art scene, regularly attending exhibitions at the Seattle Art Museum featuring works by Emily Carr and Yayoi Kusama, collaborating on community
    murals inspired by Jacob Lawrence’s color palettes, and unwinding at home while listening to the grunge sounds of Pearl Jam and the jazz improvisations of Herbie Hancock.
  travel: Shakerra Hooks prefers thoughtfully planned road trips that blend gentle adventure with cultural enrichment, having recently explored Kyoto’s historic streets, the Canadian Rockies’ natural wonders,
    and the Pacific Northwest’s San Juan Islands, while dreaming of a leisurely cruise along the Amalfi Coast after solidifying their consultancy launch.
  culinary: Shakerra Hooks delights in cooking seasonal Pacific Northwest fare, expertly preparing cedar‑plank salmon with dill and lemon, a quinoa‑kale salad tossed with roasted beets and feta, and a classic
    chicken pot pie for family gatherings, while occasionally treating themselves to a steaming bowl of pho with star‑anise broth at the local Vietnamese market.
  core: Shakerra Hooks blends a lifelong construction expertise with a passionate art‑loving heart, meticulously budgeting every dollar, managing arthritis through yoga, and occasionally hoarding vintage
    quilting needles like hidden treasures.
background:
  cultural: Shakerra was born and raised in Seattle’s historic Central District, a vibrant Black neighborhood that shaped her sense of community and resilience. Growing up, she was immersed in church fellowship,
    the local jazz scene, and neighborhood block parties celebrating Juneteenth and Black History Month. Her family emphasized education, self‑reliance, and giving back, which inspired her involvement in
    intergenerational programs that preserve Black heritage in the Pacific Northwest. As a Black woman in a traditionally male‑dominated trade, she has become a vocal advocate for equity, using her platform
    to mentor others and promote inclusive hiring practices.
