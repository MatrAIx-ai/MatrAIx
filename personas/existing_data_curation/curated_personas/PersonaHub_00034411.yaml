persona_description: A hydrologist who is conducting research on the use of vegetation and constructed wetlands to reduce the amount of sediment, nutrients, and pesticides entering streams. The research
  aims to develop methods to locate riparian areas with the greatest potential to affect water quality in different terrains and hydrological settings. The findings will be useful for supporting the application
  of conservation practices to reduce nutrient contamination of streams over broad areas. The persona is likely to be familiar with hydrologic and landscape features, as well as the importance of considering
  hydrologic factors in the design and location of riparian buffers to achieve water quality benefits.
