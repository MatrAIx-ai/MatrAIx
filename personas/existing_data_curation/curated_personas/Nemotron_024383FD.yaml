personas:
  professional: Rebecca Roussos, an 82‑year‑old retired educator who now channels her decades of budgeting, gardening, and craft coordination experience into mentoring seniors on basic computer skills and
    managing church‑run charity events, embodies a structured yet adaptable work style that balances calm assertiveness with compassionate service.
  sports: Rebecca Roussos enjoys low‑impact morning walks on the nearby nature trail, is a member of the senior walking club at the community center, and follows the Nashville Predators (NHL) and Tennessee
    Titans (NFL) with quiet enthusiasm, preferring gentle exercise to high‑intensity sports.
  arts: Rebecca Roussos fills quiet evenings listening to Dolly Parton's folk ballads and Itzhak Perlman's violin classics, occasionally attends a local theater’s production of 'Our Town,' and finds that
    these artistic experiences echo the storytelling she pursues in her genealogical research.
  travel: Rebecca Roussos plans leisurely weekend road trips to historic locales like Savannah and Asheville, dreams of a pilgrimage to the Mediterranean island of her ancestors, and balances her love of
    scenic exploration with the practical constraints of senior travel and a modest budget.
  culinary: Rebecca Roussos excels at Southern comfort dishes such as fried chicken, collard greens, and cornbread, while also baking a honey‑nut pastry for family celebrations, often seasoning her meals
    with fresh rosemary and thyme harvested from her garden.
  core: Rebecca Roussos is a structured yet easy‑going octogenarian who knits charity blankets, logs backyard birds, hoards honey‑sweet pastries, and occasionally misplaces her reading glasses on the kitchen
    counter.
background:
  cultural: Rebecca was born and raised in Church Hill, Tennessee, rooted in the Southern Appalachian tradition of hospitality, church community, and self‑reliance. Her family’s surname reflects Greek ancestry;
    her grandparents immigrated from Greece and blended their customs with the local culture. As a result, she grew up celebrating both Southern holidays—such as Thanksgiving and church festivals—and occasional
    Greek traditions like baking baklava for family gatherings and observing Greek Easter. Her religious life is centered on the Baptist church, which shapes her values of service, modesty, and community
    involvement. The combination of her white Southern upbringing and Greek heritage gives her a unique perspective that honors both her regional roots and the immigrant story of her ancestors.
