  career_goals: Although retired, Kevana aims to deepen her impact by leading the senior advisory board at her local community center, launching an intergenerational mentorship program for at-risk youth,
    and organizing an annual Philadelphia African American heritage festival. She also hopes to compile her life stories into a memoir that preserves family and cultural histories for future generations,
    and to mentor younger women who wish to become active community leaders.
