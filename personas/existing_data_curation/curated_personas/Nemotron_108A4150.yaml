personas:
  professional: Kevana Davis, a retired community administrator turned senior advisory board chair, leverages a methodical, sociable, and compassionate approach to orchestrate intergenerational mentorship
    programs, coordinate nonprofit budgets, and champion an annual heritage festival that unites local volunteers and at‑risk youth; they thrive on turning structure into community impact.
  sports: Kevana Davis participates in a senior walking club that meets thrice weekly, cheers for the Philadelphia Eagles and Phillies, supports the local 76ers via occasional game‑day gatherings, and enjoys
    light stretching classes at the community center to stay limber; they cherish the camaraderie and gentle competition these activities provide.
  arts: Kevana Davis immerses herself in gospel choirs singing Mahalia Jackson and Kirk Franklin, reads historical fiction by Ken Follett and biographies of notable civil‑rights leaders, and expresses creativity
    through quilting patterns inspired by traditional motifs, often listening to classic soul tracks by Marvin Gaye while stitching; they find artistic expression a vital conduit for preserving stories
    and emotions.
  travel: Kevana Davis prefers organized road trips to historic cities like Washington D.C., Charleston, and New Orleans, often traveling with family to explore museums and culinary scenes, while dreaming
    of a cultural pilgrimage to Paris to view Renaissance art, all within a modest travel budget; they plan each itinerary with precision, balancing curiosity with comfort.
  culinary: Kevana Davis masters soulful dishes such as collard greens seasoned with smoked turkey, buttery cornbread, and sweet potato pie, incorporates fresh basil, thyme, and rosemary from her garden,
    yet admits to a habit of over‑salting and occasionally leaving leftovers out too long before reheating; they delight in sharing these flavors at community gatherings, believing food is the heart of
    connection.
  core: Kevana Davis blends meticulous organization with vibrant community storytelling, turning their love for food, history, and mentorship into a lifelong mission of preserving heritage, while they occasionally
    forget to set a timer on the oven.
background:
  cultural: Kevana was born and raised in the historic neighborhoods of West Philadelphia during the civil rights era. As an African American woman, she grew up immersed in the church, soul music, and strong
    community ties that defined the city’s Black culture. She carries forward traditions of communal cooking, oral storytelling, and activism, having witnessed and contributed to local movements for social
    justice. Her identity is shaped by the resilience of her family, the rhythms of gospel and jazz, and the vibrant tapestry of Philadelphia’s African American heritage.
