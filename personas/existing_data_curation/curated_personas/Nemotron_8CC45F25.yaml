  hobbies: '[''Watercolor Painting'', ''Art Gallery Visits'', ''Historical Biography Reading'', ''Genealogy Research'', ''Chess'', ''Herb Gardening'', ''Cooking Traditional Indian Cuisine'', ''Classical
    Indian Music Listening'', ''Podcast and Documentary Exploration'']'
  career_goals: Although retired, Vikram aims to cement his legacy by authoring a memoir that blends his educational philosophy with personal history, and by designing a community workshop series that merges
    South Asian art appreciation with local Southern traditions. He seeks to mentor a new generation of teachers through a mentorship network, secure a modest grant to fund an intercultural art exhibit
    at the Hattiesburg Museum, and continue learning about emerging educational technologies to stay intellectually sharp. His ambitions are driven by personal fulfillment and the desire to leave a lasting
    educational imprint.
