personas:
  professional: Wilson Perez is a Rapid City personal care aide who merges rigorous caregiving protocols with creative arts facilitation, using bilingual communication, meticulous documentation, and disciplined
    scheduling to support clients while actively pursuing CNA certification and a future in geriatric nursing.
  sports: Wilson Perez stays fit by tackling Black Hills hiking trails on weekends, competes in a multicultural soccer league affiliated with Rapid City FC, roots for the South Dakota State Jackrabbits
    football team and follows the Rapid City Rush ice‑hockey squad, and maintains a disciplined weekly cardio routine that includes rock‑climbing sessions at a local gym.
  arts: Wilson Perez channels artistic curiosity into abstract paintings and digital illustrations inspired by the Black Hills palette, regularly attends live‑music events at Al's Bar featuring indie folk
    duo The Lone Berries and funk saxophonist Trombone Shorty, draws creative influence from Mark Rothko, Frida Kahlo, and Mexican muralist José Siqueiros, and contributes artwork to Día de los Muertos
    community displays.
  travel: Wilson Perez prefers immersive, nature‑focused travel, having backpacked through the Grand Canyon, explored the vibrant street art of Mexico City, and dreaming of a future pilgrimage to Barcelona’s
    Picasso museum, all while planning trips around a modest budget, marital responsibilities, and the desire to return home for community festivals.
  culinary: Wilson Perez is a confident home cook who masters classic tacos al pastor, mole poblano, and chiles en nogada, often experimenting with fusion twists like kimchi quesadilla or black‑berry‑infused
    salsa verde, and enjoys sourcing fresh Black Hills trout to glaze with huckleberry reduction for dinner parties.
  core: Wilson Perez blends artistic curiosity with disciplined caregiving, worries about financial security, channels stress into vibrant abstract paintings and late‑night sci‑fi reads, and occasionally
    binge‑watches Netflix series instead of sleeping.
background:
  cultural: Wilson’s Mexican heritage is a core part of his identity. Raised in a bilingual household, he grew up immersed in the values of familismo, respect for elders, and communal solidarity. He celebrates
    Mexican holidays such as Día de los Muertos and Semana Santa, preserving culinary traditions and folk art in his home. Living in Rapid City, he blends his cultural roots with the wider Midwestern environment,
    engaging with both the local Mexican‑American community and the broader population through volunteer work and neighborhood events. His art often incorporates Mexican motifs and color palettes, while
    his caregiving approach reflects a deep commitment to culturally sensitive, compassionate service. Wilson also honors the indigenous history of the Black Hills, fostering an inclusive perspective that
    bridges multiple cultural narratives.
attributes:
  skills: '[''patient care'', ''personal hygiene assistance'', ''mobility support'', ''vital signs monitoring'', ''medication reminder coordination'', ''care documentation and record‑keeping'', ''bilingual
    communication (Spanish/English)'', ''creative arts facilitation'', ''program planning and scheduling'', ''time management'', ''attention to detail'', ''empathetic listening'', ''conflict resolution'',
    ''group activity coordination'']'
  hobbies: '[''abstract painting'', ''digital illustration'', ''photography'', ''hiking in the Black Hills'', ''soccer'', ''volunteering at community health fairs'', ''reading science fiction'', ''cooking
    traditional Mexican dishes'', ''attending local live music events'', ''participating in cultural festivals (e.g., Día de los Muertos)'']'
  career_goals: Wilson aims to become a certified nursing assistant (CNA) within the next year and subsequently pursue an associate’s degree in nursing to qualify as a registered nurse with a specialty
    in geriatric care. He is passionate about merging health services with creative expression, envisioning a community wellness center in Rapid City that offers integrated art‑therapy programs for seniors
    and immigrant families. His long‑term ambition includes becoming a health educator who advocates for culturally competent care, achieving financial stability to support his married life, and eventually
    purchasing a home where he can host cultural gatherings and art workshops for his community.
