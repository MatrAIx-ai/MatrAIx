personas:
  professional: Sharica Hayes, who has spent three decades navigating Chicago’s streets, is a veteran taxi driver turned budding transportation entrepreneur and they leverage expert defensive driving, meticulous
    route planning, and strong customer rapport to build a family‑run airport shuttle and senior‑ride service, while actively campaigning for driver rights and preparing to train new drivers through a Commercial
    Driver’s License pathway.
  sports: Sharica Hayes is an avid supporter of the Chicago Bulls and the Chicago White Sox, participates in a weekly walking club in Grant Park to maintain fitness for long driving shifts, and occasionally
    joins a community pickleball league, using the sport as a social outlet that blends competition with camaraderie.
  arts: Sharica Hayes immerses themselves in Chicago’s historic jazz and blues scene, regularly attending performances at venues like the Legend Café, singing in their church choir, and drawing inspiration
    from the music of Aretha Franklin, Nina Simone, and Muddy Waters, which enriches their vibrant social gatherings and seasonal celebrations.
  travel: Sharica Hayes plans weekend road trips to New Orleans for its jazz heritage, seasonal visits to the Freedom Trail in Boston to explore civil‑rights history, and occasional family vacations to
    the Great Smoky Mountains, balancing a modest travel budget with their entrepreneurial ambitions and occasional desire to revisit hometown neighborhoods for community events.
  culinary: Sharica Hayes cherishes cooking soul‑food staples such as fried chicken, collard greens seasoned with smoked turkey, sweet potato pie, and jambalaya, while they also tend a balcony garden of
    tomatoes, basil, and hot peppers that they incorporate into a signature hot‑sauce‑infused gumbo for family gatherings.
  core: Sharica Hayes blends a disciplined, community‑focused mindset with a love for blues, an unwavering work ethic behind the wheel, and a habit of humming vintage gospel tunes while navigating traffic,
    all while occasionally hoarding spare change for future shuttle ventures.
background:
  cultural: Sharica is a second‑generation African‑American who grew up on Chicago's South Side. Her family's roots trace back to the Great Migration, and she was raised with the traditions of church, gospel
    music, and community solidarity. She identifies strongly with the city's rich black cultural heritage, from the blues clubs of Bronzeville to the annual Juneteenth celebrations in her neighborhood.
    Family gatherings centered around soul food and storytelling have shaped her values of resilience, mutual support, and pride in her heritage. While navigating the challenges of urban life, she remains
    connected to local Black organizations that advocate for social justice, economic empowerment, and the preservation of cultural history.
