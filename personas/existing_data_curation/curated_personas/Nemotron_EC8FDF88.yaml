    and GPS technology'', ''Networking within driver community'']'
  hobbies: '[''Jazz and blues concerts'', ''Church choir participation'', ''Weekly walking group'', ''Cooking soul food and Southern recipes'', ''Volunteering at youth center (road safety workshops)'',
    ''Balcony gardening'', ''Reading biographies of African-American leaders'', ''Playing spades and other card games'', ''Attending community festivals'', ''Photographing Chicago’s historic neighborhoods'']'
  career_goals: Sharica aims to expand her role in the transportation sector beyond driving a single taxi. Over the next few years she plans to acquire a second vehicle and establish a small, family‑run
    transportation service focusing on airport shuttles and senior rides. She is pursuing a Commercial Driver's License (CDL) to qualify for larger passenger vans and hopes to become a trainer for new drivers,
    sharing her expertise in safety and customer service. Additionally, she aspires to take a leadership position within the local Taxi Workers Alliance, advocating for better wages and working conditions,
    and eventually mentor younger drivers from her community.
