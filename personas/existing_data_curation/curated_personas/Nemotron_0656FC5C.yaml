  hobbies: '[''Community theater set design'', ''Watercolor painting'', ''Home‑brewing'', ''Herb gardening'', ''Barbecue competitions'', ''Collecting vintage kitchen tools'', ''Acoustic guitar playing'',
    ''Group board‑game nights'', ''Food photography'']'
  career_goals: At 65, Chevis is focused on transitioning from daily kitchen duties to mentorship and legacy projects. He hopes to open a small boutique restaurant that showcases his experimental approach
    to regional dishes, author a cookbook that documents his imaginative recipes and plating techniques, and lead community cooking workshops that blend culinary skill with artistic expression. Additionally,
    he aims to serve as a judge for local cooking competitions and collaborate with regional farms to develop a line of specialty sauces and preserves.
