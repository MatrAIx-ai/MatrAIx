  hobbies: '[''Visiting art galleries and street murals'', ''Sketching'', ''Listening to jazz and R&B'', ''Exploring new restaurants'', ''Reading speculative fiction and science nonfiction'', ''Yoga and
    mindfulness meditation'', ''Herb gardening'', ''Volunteering at community health fairs'', ''Mentoring high‑school students in science'']'
  career_goals: Looking ahead, Lovella aims to move into a pharmacy leadership role within the next three years, targeting a manager or clinical specialist position at a community health centre in Dallas.
    She wants to spearhead a wellness program that blends art, mental‑health awareness, and medication safety for Black patients. To qualify, she plans to complete a PharmD bridge program and earn certifications
    in pharmacogenomics and health‑promotion. Eventually, she envisions opening her own boutique pharmacy that offers personalized counseling, curated health‑focused art displays, and community workshops,
    while maintaining a flexible schedule that supports her stress‑reduction practices.
