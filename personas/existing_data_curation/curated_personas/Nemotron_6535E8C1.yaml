personas:
  professional: Lisbeth Prado, a bilingual civil engineer with twelve years of experience, merges meticulous structural analysis, LEED‑certified sustainable design, and community‑centric planning to deliver
    resilient infrastructure projects, and they lead client presentations and workshops with charismatic confidence while balancing an organized workflow with a tendency to over‑worry about deadlines and
    a natural flair for collaborative problem‑solving.
  sports: Lisbeth Prado, an avid member of the San Bernardino Hiking Club, tackles weekend treks on local trails, supports the Los Angeles Dodgers and LA Galaxy, balances energetic salsa dancing classes
    with regular yoga sessions, and although they relish staying active, stress‑induced fatigue sometimes leads them to skip a workout.
  arts: Lisbeth Prado, a watercolor hobbyist who frequents the Riverside Art Museum, draws inspiration from muralist Judy Baca and painter Frida Kahlo, regularly attends concerts by Lila Downs and the LA
    Philharmonic, and integrates the vivid colors of community murals into both their art and professional presentations, while they often stay up late curating a personal Instagram feed of contemporary
    art.
  travel: Lisbeth Prado, an organized planner who maps trips using travel forums, enjoys cultural immersion in cities like Seville, Spain and Kyoto, Japan, balances adventurous hikes in the Grand Canyon
    with relaxing beach stays in Santa Barbara, and, constrained by a demanding work schedule, often opts for short weekend getaways that satisfy their curiosity while they occasionally worry about leaving
    projects unfinished.
  culinary: Lisbeth Prado, a seasoned home cook, perfects traditional dishes such as pozole, tamales, and chiles rellenos, experiments with fusion creations like avocado‑lime quinoa tacos and mole‑marinated
    chicken, favors fresh ingredients like corn masa, epazote, and chipotle peppers, hosts lively dinner parties showcasing these flavors, and they sometimes over‑season dishes in a burst of creative enthusiasm.
  core: Lisbeth Prado, a charismatic civil engineer blending sustainable design with community traditions, navigates life with curious intellect, social flair, and a touch of worry that fuels meticulous
    planning and occasional spontaneous indulgences; they thrive on connecting people and ideas.
background:
  cultural: Lisbeth is a first‑generation Mexican‑American raised in the Inland Empire. She grew up in a close‑knit family that celebrated Mexican traditions such as Día de los Muertos, quinceañeras, and
    weekly family meals featuring homemade tamales and pozole. Fluent in both Spanish and English, she bridges her heritage with her professional life, often incorporating culturally sensitive design considerations
    into her projects to preserve community identity. She actively participates in local Hispanic community organizations, mentors youth in STEM, and values the principles of familismo and respeto, which
    shape her collaborative yet assertive approach at work.
attributes:
  skills: '[''Structural Analysis'', ''Project Management'', ''Sustainable Design'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''LEED Green Associate'', ''Budgeting'', ''Contract Negotiation'', ''Bilingual
    Communication (English/Spanish)'', ''Public Speaking'', ''Community Engagement'', ''Emerging Construction Technologies'']'
  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Mural Tours'', ''Salsa Dancing'', ''Hiking'', ''Cooking Mexican Cuisine'', ''Hosting Dinner Parties'', ''Community Volunteering'', ''Yoga'',
    ''Meditation'', ''Journaling'', ''Reading Science Fiction'', ''Listening to Tech Podcasts'']'
  career_goals: Lisbeth aims to advance into senior leadership, becoming a project director overseeing large‑scale sustainable infrastructure projects that serve underserved communities in Southern California.
    She plans to earn her Professional Engineer (PE) licensure, complete a Master’s in Sustainable Engineering, and eventually launch her own consultancy focused on resilient, culturally‑sensitive urban
    development. In parallel, she wants to mentor emerging engineers—especially women and Hispanic professionals—advocating for inclusive design practices and integrating community heritage into modern
    built environments.
