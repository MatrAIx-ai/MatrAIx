  hobbies: '[''Cooking traditional Mexican cuisine'', ''Gardening herbs and chilies'', ''Church participation'', ''Crocheting for donations'', ''Neighborhood walking'', ''Listening to boleros and ranchera
    music'', ''Día de los Muertos celebrations'', ''Volunteering at senior center'']'
  career_goals: Approaching retirement, Sharina aims to shift from full‑time physical labor to a part‑time advisory role, offering consulting to local homeowners and small‑business owners on preventative
    maintenance and efficient repair practices. She wishes to continue mentoring younger workers, formalizing a small apprenticeship program through the community center. Additionally, she plans to volunteer
    her technical skills at the Lynwood senior center, teaching basic home‑repair workshops to fellow seniors, while also helping organize cultural events that celebrate Mexican heritage.
