personas:
  professional: Sharina Iglesias, a veteran residential maintenance specialist with over forty years of experience in electrical, plumbing, and HVAC work, leverages her methodical logging, thorough code
    knowledge, and patient mentorship style to transition into a part‑time advisory role that emphasizes preventative maintenance and structured training for apprentices.
  sports: Sharina Iglesias, an avid early‑morning walker who joins a senior strolling club and roots for the Los Angeles Dodgers and Lakers, incorporates gentle stretching into her routine to support her
    knees, and enjoys occasional community softball games organized by her parish.
  arts: Sharina Iglesias, a devoted fan of classic boleros by José José and ranchera anthems from Vicente Fernández, spends evenings crocheting blankets for church donations while humming Luis Miguel’s
    ballads, and regularly assists with choir preparations at her parish, which deepens her sense of cultural rhythm and community.
  travel: Sharina Iglesias, who prefers well‑planned, low‑stress trips, frequently visits relatives in Oaxaca to experience Día de los Muertos festivities, enjoys weekend getaways to Santa Barbara’s coastline,
    and often arranges day‑long pilgrimages to nearby mission churches with her grandchildren.
  culinary: Sharina Iglesias, an accomplished home chef who expertly prepares tamales, pozole, and mole poblano using fresh chilies, epazote, and herbs from her garden, delights in adding a pinch of cinnamon
    to her mole, and occasionally over‑salts the broth when she’s caught up in lively conversations.
  core: Sharina Iglesias balances a methodical, safety‑first work ethic with a warm, community‑oriented spirit, weaving her love for traditional cooking, steady craftsmanship, and gentle devotion to faith
    into a life of purposeful routine and modest generosity.
background:
  cultural: Sharina is a second‑generation Mexican‑American whose parents immigrated from Jalisco in the 1940s. Raised in a close‑knit Mexican community in Los Angeles County, she grew up bilingual, speaking
    Spanish at home and English at school. Catholic traditions and family gatherings shaped her values of harmony, cooperation, and respect for elders. The vibrant Mexican cultural scene in Lynwood – including
    festivals, local mercados, and community churches – continues to influence her daily life. She preserves these roots through cuisine, music, and participation in cultural rituals such as Día de los
    Muertos, while also embracing the multicultural fabric of Southern California.
