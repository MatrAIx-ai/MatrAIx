  hobbies: '["Heirloom Vegetable Gardening", "Reading Historical Fiction and Appalachian Folklore", "Knitting and Quilting", "Birdwatching", "Cooking Traditional Southern Cuisine", "Genealogy Research",
    "Small‑Group Book Club Participation", "Herb Gardening", "Walking Local Trails"]'
  career_goals: Although retired, Sophia aims to remain an active contributor to her community. She plans to lead the local historical society’s oral‑history project, mentor younger volunteers in gardening
    and traditional crafts, and document her family’s genealogy and cherished recipes in a memoir for future generations. She also hopes to travel modestly with her husband to nearby historic towns, maintain
    her physical health through regular walks, and ensure her independence by staying engaged in lifelong learning.
