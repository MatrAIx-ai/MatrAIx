persona_description: Dr. Harish Chaudhary, a renowned education expert and professor at IIT-Delhi, is a thought leader in the field of education. He has extensive experience in TQM and is well-versed in
  the nuances of Indian school education. Dr. Chaudhary's expertise lies in the study of values and quality in education, and he has conducted substantial research on the Indian education system. He is
  a proponent of proactively reducing power-distance between principals and teachers and empowering teachers. Dr. Chaudhary is also a strong advocate for the conversion of intention into practices and the
  focus on quality and values in the Indian education system.
