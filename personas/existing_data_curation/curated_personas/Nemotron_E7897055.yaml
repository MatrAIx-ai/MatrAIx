personas:
  professional: Min Yeon is a seasoned housecleaning specialist who blends eco‑friendly cleaning methods with an eye for Korean household customs, leveraging bilingual communication skills and a hands‑on
    knack for minor repairs while preparing to launch a boutique service for Korean‑American homes in Sussex County, favoring flexible milestones and assertively guiding client expectations.
  sports: Min Yeon enjoys leisurely weekend hikes and bird‑watching trips in High Point State Park, occasionally cheering on the New Jersey Devils during winter and supporting the New York Giants in the
    fall, while participating in a local nature‑walk club that meets monthly for low‑impact cardio.
  arts: Min Yeon finds creative solace in knitting cozy scarves while listening to classic 1990s Korean pop icons like Seo Taiji and Kang Min‑ho, indulges in mystery novels by Agatha Christie and contemporary
    Korean authors such as Han Kang, and practices seoye calligraphy inspired by the brushwork of renowned Korean master Kim Myeong‑hee.
  travel: Min Yeon favors meticulously planned solo trips that balance cultural immersion and natural tranquility, having explored the historic streets of Seoul and the serene tea fields of Jeju Island,
    while dreaming of a quiet retreat on the Italian Amalfi Coast and a pilgrimage to the ancient temples of Kyoto.
  culinary: Min Yeon is an avid home chef who skillfully prepares traditional kimchi, bibimbap, and japchae using fresh home‑grown cabbage, basil, and mint, while experimenting with Western techniques learned
    from cooking podcasts such as sous‑vide salmon and rosemary‑infused sauces, and delights in pairing meals with a glass of chilled makgeolli.
  core: Min Yeon blends a love for solitary, eco‑conscious living with a practical, flexible approach to work and life, finding comfort in quiet hobbies, meticulous home care, and the occasional nostalgic
    pop tune.
background:
  cultural: Min Sol Yeon is a first‑generation Korean‑American whose family immigrated to New Jersey in the early 1990s. She grew up in a bilingual household where Korean customs—such as respect for elders,
    communal meals, and observance of holidays like Seollal (Lunar New Year) and Chuseok—were central. These cultural values instilled a strong work ethic and a deep appreciation for hospitality, which
    she carries into her professional life as a housekeeper. While assimilated into American society, she maintains ties to the local Korean community through a nearby church and cultural events, and she
    regularly prepares traditional Korean foods that connect her to her heritage. Her East Asian background influences her preference for order, cleanliness, and subtle aesthetic harmony in the spaces she
    cares for. Simultaneously, living in Hopatcong, NJ, has fostered an appreciation for the tranquility of rural settings and the importance of self‑reliance, complementing her personality's inclination
    toward solitude and flexibility.
