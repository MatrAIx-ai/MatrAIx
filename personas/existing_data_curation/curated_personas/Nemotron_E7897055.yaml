  career_goals: In the next few years, Min Sol Yeon aims to shift from being solely an employee to establishing her own niche cleaning service that specializes in eco‑friendly, culturally informed housekeeping
    for Korean‑American households in Sussex County and surrounding areas. She plans to obtain a certification in Green Cleaning and a short course in Facility Management to formalize her expertise. By
    leveraging her bilingual abilities, she hopes to market personalized services that respect Korean household customs while introducing sustainable practices. Additionally, she envisions offering occasional
    workshops on home organization and environmentally safe cleaning for community members, thereby turning her curiosity into teachable content. While she values flexibility and prefers to set incremental
    milestones rather than rigid timelines, her overarching ambition is to build a modest, self‑sustaining business that provides financial security for her family and a steady, stress‑light source of income
    as she approaches retirement.
