  career_goals: Although still young, Arnold dreams of a future where he can design and construct things. He has expressed a strong interest in becoming an architect or civil engineer, imagining himself
    planning houses and bridges that are both functional and orderly. He also hopes to work in wildlife conservation, where he can apply his careful, organized nature to protect the natural spaces of Spotsylvania
    County. His short‑term ambition is to become a reliable class helper and later a student leader who can keep projects on track.
