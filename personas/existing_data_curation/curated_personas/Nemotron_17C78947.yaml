personas:
  professional: Eddie King, a retired residential electrician and handyman, uses his decades‑long step‑by‑step approach to diagnostics and budgeting to deliver part‑time consulting that blends reliable,
    structured repairs with clear, assertive mentorship for younger trainees.
  sports: Eddie King enjoys early‑morning walks with the local senior walking club, spends quiet afternoons fishing at Lake Willow, follows the regional baseball team the River City Runners, and occasionally
    attends the State University football games, balancing low‑impact fitness with relaxed spectator sports.
  arts: Eddie King curates a personal vinyl collection featuring gospel legends like Aretha Franklin, Sam Cooke, Marvin Gaye, and The Staple Singers, shares stories about their historical roots, and complements
    the music with woodworking projects that produce functional art for family and friends.
  travel: Eddie King plans trips with the same spreadsheet precision, favors relaxed road‑trip itineraries to destinations such as Shenandoah National Park, Grand Lake, and Savannah, dreams of a cultural
    tour of the Cotswolds in England, and balances travel ambitions with modest retirement budget constraints.
  culinary: Eddie King cooks comfort dishes like fried catfish, collard greens, peach cobbler, and sweet potato casserole, measuring spices such as smoked paprika and cayenne with meticulous tweaks to treasured
    family recipes, and relishes the ritual of sharing these meals with loved ones.
  core: Eddie King blends a love for orderly routines with quiet reflection, turning everyday tasks into measured rituals while silently wrestling with persistent worry.
background:
  cultural: Eddie grew up as a Black child in rural eastern North Carolina during the tail end of the civil‑rights era, shaped by close‑knit church communities and family gatherings that emphasized storytelling,
    music, and shared meals. His upbringing instilled a strong work ethic, respect for tradition, and a deep connection to the local Black heritage of resilience and communal support. He carries forward
    these values through active participation in his church, volunteering at community events, and preserving family recipes and stories for future generations.
attributes:
  skills: '[''Electrical wiring and troubleshooting'', ''Carpentry and woodworking'', ''Plumbing repairs'', ''Home budgeting and financial planning'', ''Event organization for church and community'', ''Mentoring
    youth in trades'', ''Basic computer use and email communication'']'
  hobbies: '[''Gardening'', ''Fishing'', ''Gospel and soul music listening'', ''Southern cooking'', ''Historical biography reading'', ''Woodworking projects'', ''Volunteer work at church'']'
  career_goals: Although officially retired, Eddie aims to stay actively engaged by offering part‑time consulting to neighbors for home repair projects, providing reliable, structured assistance that eases
    their stress. He hopes to formalize a mentorship role at the local community college’s vocational program, passing on his trade knowledge while maintaining a predictable schedule. Eddie also wants to
    preserve his family’s oral histories and compile them into a memoir, a project that satisfies his desire for order and legacy. Healthwise, he plans to follow a steady exercise routine and attend regular
    wellness check‑ups to reduce anxiety about aging.
