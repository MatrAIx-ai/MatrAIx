  hobbies: '[''Reading classic and contemporary literature'', ''Watercolor painting'', ''Photography'', ''Gardening'', ''Local history research and volunteering'', ''Hiking'', ''Community theater participation'',
    ''Cooking experimental dishes'', ''Playing chess'', ''Book club involvement'']'
  career_goals: Patrick aspires to advance to a senior director role overseeing multiple residential communities, where he can institutionalize innovative arts‑and‑wellness programs that enrich residents'
    lives. He plans to earn a certification in gerontology, publish a guide on integrating creative arts into elder care, mentor emerging residential advisors, and collaborate with local cultural institutions
    to create community‑wide initiatives for seniors.
