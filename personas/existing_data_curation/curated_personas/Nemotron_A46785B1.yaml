  hobbies: '[''Playing card games (bridge, rummy)'', ''Dancing to traditional Mexican music'', ''Community event volunteering and organization'', ''Desert gardening (cacti, herbs)'', ''Cooking Mexican dishes'',
    ''Walking/hiking local trails'', ''Watching classic movies'', ''Listening to Mexican radio'', ''Participating in church choir'', ''Mentoring at senior center'']'
  career_goals: Although retired, Kieran wishes to leave a lasting legacy for his family and community. He aims to document his family’s recipes and stories in a small cookbook and memoir that he can share
    with his grandchildren. He also hopes to become a regular mentor at the local senior center, offering both practical workshops (simple home repairs, cooking classes) and emotional support for peers
    dealing with anxiety. Improving his own mental resilience through mindfulness practice and staying physically active is a personal priority. Additionally, Kieran dreams of establishing a community garden
    in Apple Valley where neighbors can gather, grow food, and celebrate Mexican holidays together.
