personas:
  professional: Gordana Tracey is a correctional officer who integrates rigorous inmate supervision with innovative art‑therapy program design, using their crisis‑de‑escalation expertise and curious mindset
    to bridge safety and rehabilitation, and they are already mentoring peers while pursuing a master's in criminal justice.
  sports: Gordana Tracey enjoys weekend trail hikes with the East Texas Hiking Association, follows the Dallas Cowboys, Texas Rangers and Dallas Mavericks loyally, and they stay fit through a mix of trail
    runs, community softball league play, and occasional yoga sessions at a local studio.
  arts: Gordana Tracey frequents the Tyler Museum of Art, draws inspiration from watercolor masters like Winslow Homer and Georgia O'Keeffe, sings karaoke to Stevie Ray Vaughan and Johnny Cash, and they
    actively participate in community theater productions of "Our Town" while curating inmate art exhibits featuring local artists such as Sarah Jane Owens.
  travel: Gordana Tracey prefers road‑trip adventures that blend nature and culture, having explored Hill Country towns like Fredericksburg, taken a weekend getaway to Austin’s live‑music scene, and they
    dream of visiting the Mediterranean islands of Crete and Santorini to study fresco techniques, all while budgeting travel through a dedicated savings envelope.
  culinary: Gordana Tracey loves cooking Tex‑Mex dishes like chicken enchiladas with homemade salsa verde and Mediterranean plates such as lemon‑garlic falafel wraps with tahini, and they experiment with
    fresh cilantro, cumin, feta, and pomegranate seeds, though they occasionally over‑salt their sauces in pursuit of bold flavor.
  core: Gordana Tracey is a 35‑year‑old correctional officer who balances meticulous safety duties with a vibrant passion for watercolor, karaoke, and community art, often juggling a love of spicy food
    with a tendency to procrastinate filing reports until just before deadline.
background:
  cultural: Gordana is a White American with Serbian ancestry, raised in the culturally rich environment of East Texas. Her family preserved Slavic traditions such as folk music, communal cooking, and value
    placed on education, while also embracing Southern hospitality and community involvement. This blend of Eastern European heritage and Texas upbringing informs her appreciation for diverse artistic expressions,
    her collaborative spirit, and her dedication to service. Married and living in Hallsville, she actively engages in local festivals, church gatherings, and volunteer initiatives that reflect both her
    cultural roots and her Texan identity.
