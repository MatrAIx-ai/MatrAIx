  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Museums'', ''Live Music Attendance'', ''Karaoke and Dancing'', ''Cooking Tex-Mex and Mediterranean Dishes'', ''Hiking'', ''Reading Historical
    Fiction and Philosophy'', ''Community Theater'', ''Volunteer Art Workshops for Inmates'']'
  career_goals: Gordana aims to advance to a supervisory role such as senior lieutenant or deputy warden, where she can shape correctional policy and expand rehabilitative programming. She plans to pursue
    a master's degree in criminal justice or social work to deepen her expertise in restorative practices. Her long‑term ambition is to design and lead a statewide art‑therapy initiative for incarcerated
    individuals, bridging the gap between correctional institutions and the local arts community. Additionally, she hopes to mentor new officers, fostering a culture of compassion, professionalism, and
    innovative problem‑solving.
