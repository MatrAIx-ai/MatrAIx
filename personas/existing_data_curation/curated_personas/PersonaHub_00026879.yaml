persona_description: A software developer who specializes in developing XAML 2009 applications. They are familiar with the new language features and constructs introduced in XAML 2009, and are adept at
  using the x:Arguments, x:FactoryMethod, x:Reference Markup Extension, x:TypeArguments, and built-in types for common language primitives. They have experience with WPF and its XAML 2006 implementation,
  and are aware of the limitations and restrictions on loading loose XAML in WPF. They are also aware of the security and access restrictions for CLR types and the type system in WPF. They are proficient
  in using the x:Key directive and have experience with attributes backed by events.
