  career_goals: Although retired, Garland remains driven to share her knowledge and preserve community memory. She aims to complete a memoir that weaves together family stories, local history, and her reflections
    on art and imagination. She plans to establish a small archive of historical documents and photographs for the Damon Historical Society, training younger volunteers in archival methods. Additionally,
    she hopes to mentor a few interested neighbors in quilting and genealogy, ensuring the crafts and stories continue beyond her lifetime.
