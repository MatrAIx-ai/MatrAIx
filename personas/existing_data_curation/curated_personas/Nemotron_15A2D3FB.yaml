personas:
  professional: Tania Rodriguezfigueroa, a front‑line IT support specialist in South Florida, leverages her meticulous troubleshooting, bilingual communication, and curiosity for emerging cloud technologies
    to deliver reliable service while methodically documenting incidents and coaching peers, aiming to become a senior technical support engineer and eventually lead a support operations team.
  sports: Tania Rodriguezfigueroa dominates the sand courts with the Lake Worth Beach Volleyball Club during spring and summer, follows the Miami Heat and Inter Miami FC for inspiration, hits the gym for
    cross‑training, and joins salsa dance nights that double as cardio, embodying a competitive, community‑oriented fitness routine.
  arts: Tania Rodriguezfigueroa immerses herself in South Florida’s street art, regularly visiting Miami’s Wynwood Walls to admire works by Shepard Fairey and JR, curates her digital illustrations inspired
    by folk motifs alongside contemporary design, and enjoys live salsa performances featuring artists like Marc Anthony and Celia Cruz, integrating these influences into her creative identity.
  travel: Tania Rodriguezfigueroa plans weekend escapes to the Everglades and Key West for nature retreats, dreams of exploring Barcelona’s architecture and Tokyo’s tech districts, balances adventure with
    relaxation, and uses her bullet journal to meticulously map itineraries while budgeting travel around her certification study schedule.
  culinary: Tania Rodriguezfigueroa, an enthusiastic home cook, frequently prepares mole sauce with ancho chilies, slow‑cooked carnitas, and fragrant pozole using fresh corn masa and avocado, hosts potluck
    evenings where friends sample her salsas and tamales, and experiments with fusion plating that blends traditional flavors with modern presentation.
  core: Tania Rodriguezfigueroa is a curious, organized, and socially‑driven tech professional who blends art, sport, and mentorship into a vibrant, competitive lifestyle, occasionally overcommitting to
    projects but always maintaining a steady, upbeat rhythm.
background:
  cultural: Tania is a first‑generation Mexican‑American; her parents emigrated from Veracruz and raised her in a bicultural household where Spanish and English were spoken interchangeably. She celebrates
    Mexican traditions such as Día de los Muertos, posadas, and family gatherings, while also participating in local Floridian festivities. Her upbringing emphasized the value of community, respect for
    elders, and the importance of education, which fuels her drive in the STEM field. She stays connected to the Mexican diaspora in Palm Beach County through volunteer work at cultural centers, where she
    helps organize workshops that introduce technology to older adults. The rich visual heritage of Mexican muralism and folk art inspires her artistic pursuits, and her bilingualism allows her to bridge
    cultural gaps in both her professional and social circles.
attributes:
  skills: '[''Hardware and software troubleshooting'', ''Windows, macOS, and Linux support'', ''Network configuration and diagnostics'', ''Ticketing system management (ServiceNow, Zendesk)'', ''ITIL incident
    and problem management'', ''Technical documentation and user guide creation'', ''PowerShell and Bash scripting for automation'', ''Bilingual user support (English/Spanish)'', ''Cybersecurity best practices'',
    ''Remote support tools (TeamViewer, AnyDesk)'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Digital illustration with Mexican folk influences'', ''Beach volleyball'', ''Salsa dancing'', ''Attending tech meetups and hackathons'', ''Bullet
    journaling'', ''Cooking traditional Mexican cuisine'', ''Casual esports and strategy gaming'']'
  career_goals: 'She aims to transition from a front‑line support role to a senior technical support engineer position within the next two years, focusing on cloud‑based services such as Microsoft 365 and
    Amazon Web Services. She is pursuing certifications including CompTIA Network+, Security+, Microsoft Certified: Modern Desktop Administrator, and AWS Certified Cloud Practitioner. Her longer‑term ambition
    is to lead a support operations team, implementing process improvements and mentoring junior technicians. She also hopes to blend her passion for art and technology by contributing to user‑experience
    design projects or developing interactive installations for community events. Additionally, she aspires to become an active mentor for Hispanic youth interested in STEM, organizing workshops and hackathons
    in the Lake Worth area.'
