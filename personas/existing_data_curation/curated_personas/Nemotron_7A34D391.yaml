personas:
  professional: Edgar Torres, a 31‑year‑old facilities maintenance specialist in the tourism sector, leverages expertise in commercial cleaning, OSHA compliance, and bilingual communication to orchestrate
    immaculate operations while channeling meticulous organization and competitive drive into designing hyper‑efficient cleaning schedules that set a high standard for the team.
  sports: Edgar Torres fuels a competitive spirit by playing forward in a community soccer league that rivals local clubs, cheering the Tennessee Titans on Sundays, following the Nashville Predators during
    the hockey season, and supplements team sports with solo hikes and fishing trips in the Great Smoky Mountains, using a personal fitness tracker to log weekly mileage and cardio output.
  arts: Edgar Torres immerses themselves in a blend of Appalachian folk music and Latin‑inspired rhythms, regularly listening to The Avett Brothers, Lila Downs, and Juanes while attending local Latino festival
    performances and occasional theater productions at the Gatlinburg Playhouse, and finds creative inspiration for cooking in the visual storytelling of documentary filmmaker Werner Herzog.
  travel: Edgar Torres prefers purposeful trips that combine outdoor adventure with cultural immersion, planning meticulous itineraries for weekend hikes in Shenandoah National Park, weekend getaways to
    Oaxaca to explore culinary roots, and future bucket‑list expeditions to Patagonia’s glacier trails, all while balancing travel costs with the goal of saving enough for a future cleaning business headquarters.
  culinary: Edgar Torres’s culinary repertoire centers on mastering traditional tamales and pozole while experimenting with Appalachian twists like smoked trout filling, chipotle‑infused cornbread, and
    a blackberry‑laced mole, showcasing confident kitchen skills by hosting monthly fusion dinner parties where they source local pumpkin, heirloom corn, and fresh trout from nearby streams.
  core: Edgar Torres is a disciplined, competitive outdoors enthusiast who fuses meticulous facility management with inventive Appalachian‑Mexican cooking, balancing a skeptical yet curious mindset with
    a relentless drive to prove they can turn solitary hikes into a thriving cleaning enterprise.
background:
  cultural: Edgar is a first‑generation Mexican‑American who grew up in a bilingual household, speaking Spanish at home and English in school. His family instilled values of hard work, respect for elders,
    and a strong sense of community, which continue to shape his disciplined approach to work and his competitive drive. He maintains cultural ties by celebrating Mexican holidays like Día de los Muertos
    and hosting family gatherings featuring traditional music and food. While living in Gatlinburg, Edgar has integrated aspects of Southern hospitality and local customs, often sharing his cultural heritage
    with coworkers and neighbors through cooking, storytelling, and community events. His Catholic faith and involvement in a local Latino support group provide additional social support and a sense of
    belonging.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care'', ''Chemical handling'', ''OSHA safety compliance'', ''Inventory management'', ''Digital scheduling'', ''Time management'', ''Process optimization'', ''Bilingual
