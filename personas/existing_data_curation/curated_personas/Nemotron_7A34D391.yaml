  hobbies: '[''Hiking in the Great Smoky Mountains'', ''Fishing in local streams'', ''Cooking Mexican cuisine'', ''Watching sustainability documentaries'', ''DIY home‑repair projects'', ''Community soccer
    league'', ''Puzzle solving'', ''Reading entrepreneurship non‑fiction'', ''Participating in Día de los Muertos celebrations'', ''Attending local Latino festivals'']'
  career_goals: Edgar aims to advance from his current janitorial role into a supervisory position overseeing facilities operations in a tourism‑focused venue. He plans to obtain certifications such as
    Certified Professional Cleaner and Facility Management Professional to bolster his credentials. Over the next five years, he wishes to become a facilities manager, integrating sustainable, green‑cleaning
    practices. Long‑term, Edgar aspires to launch his own small cleaning business that serves both commercial and residential clients in the Gatlinburg area, providing reliable, high‑standard services while
    achieving financial independence and home ownership.
