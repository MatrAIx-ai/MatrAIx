  hobbies: '[''Guitar playing'', ''Adult soccer league'', ''Desert hiking'', ''Photography'', ''Vinyl record collecting'', ''Cooking Mexican cuisine'', ''Attending art exhibitions'', ''Watching indie films'',
    ''Volunteering at youth art workshops'', ''Organizing Día de los Muertos community events'']'
  career_goals: Jose aims to transition from frontline entertainment attendant to a senior arts‑administration role within the next five years. He plans to earn a certificate in arts management and eventually
    become the director of a community‑cultural center in Tucson, overseeing Mexican‑heritage festivals, mural projects, and youth arts programs. In the longer term, he envisions launching his own boutique
    events firm that curates immersive, technology‑enhanced experiences celebrating Latino culture across the Southwest. He also aspires to mentor emerging performers and become a recognized advocate for
    bilingual arts programming.
