personas:
  professional: Shane Hoover, a veteran secondary-school teacher, blends art, history, and skeptical inquiry into interdisciplinary curricula, leveraging improvisational classroom management that tolerates
    occasional disorganization while inspiring students to question assumptions, and they are known for charismatic lectures, mentorship of junior teachers, and a knack for turning unexpected moments into
    teachable experiences.
  sports: Shane Hoover is an avid weekend hiker who belongs to the Patapsco Valley Hikers Club, they regularly trek the trails of Patapsco Valley State Park for stress relief, and they are a dedicated fan
    of the Baltimore Orioles and Baltimore Ravens, often attending games when schedules permit.
  arts: Shane Hoover immerses himself in the visual arts by frequenting the Baltimore Museum of Art and the Walters Art Museum, sketching his impressions of Monet’s Water Lilies and Rembrandt’s portraits,
    volunteering as a set‑designer for the Reisterstown Community Theatre, and they draw inspiration from biographies of Frida Kahlo and Georgia O’Keeffe, while listening to the folk‑rock of Leonard Cohen
    during creative sessions.
  travel: Shane Hoover’s travel style blends curiosity with a relaxed planning approach, they favor weekend pilgrimages to historic Maryland sites such as Fort McHenry, Annapolis’s colonial streets, and
    Harpers Ferry, while dreaming of a leisurely road trip through New England’s autumn foliage and a once‑in‑a‑lifetime visit to the art‑rich city of Florence, Italy, all within a modest retirement budget.
  culinary: Shane Hoover enjoys cooking with fresh herbs harvested from his backyard—basil, rosemary, thyme, and sage—preparing herb‑crusted Maryland crab cakes, lemon‑garlic roasted chicken, and occasional
    vegetable‑laden quinoa bowls, they are a competent home cook who occasionally splurges on farm‑to‑table dinners at The Smith, and they relish a simple cup of chamomile tea after late‑night sketching
    sessions.
  core: Shane Hoover is a curious, skeptical lifelong educator who balances wandering through museums, sketching, chess, and hiking with a relaxed, sometimes disorganized approach to money and health, all
    while nurturing a quiet passion for mentoring, set design, and herb‑flavored cooking.
background:
  cultural: Shane grew up in the suburban-rural fringe of Baltimore County during the 1960s and 70s, a time of cultural shifts that sparked his lifelong curiosity. He was raised in a middle‑class, white,
    Protestant family that valued education, self‑reliance, and community involvement. The mix of suburban convenience and proximity to Maryland’s historic sites fostered his appreciation for local heritage
    and the arts. Living in Reisterstown and Carroll County, he is steeped in Mid‑Atlantic cultural traditions—annual county fairs, historic preservation societies, and a strong emphasis on family ties.
    His background, combined with decades of experience in the public‑school system, informs his commitment to critical inquiry, while his personal history of navigating changing social norms contributes
    to his skeptical and competitive outlook.
attributes:
  skills: '["Interdisciplinary Curriculum Development", "Lesson Planning (flexible style)", "Differentiated Instruction", "Public Speaking", "Mentoring New Teachers", "Educational Technology Integration",
    "Critical Thinking Facilitation", "Art Integration in Social Studies", "Conflict Resolution", "Community Outreach and Engagement"]'
  hobbies: '["Museum and Gallery Visits", "Sketching and Watercolor Painting", "Reading Philosophy and Skeptical Literature", "Gardening (native herbs)", "Woodworking (birdhouses, small furniture)", "Community
    Theater (audience & set design)", "Chess Club", "Hiking (Patapsco Valley State Park)", "Local History Exploration"]'
  career_goals: Approaching retirement, Shane aims to shift from full-time classroom duties to a mentorship role where he can coach early-career teachers on incorporating creative, critical-thinking methods.
    He hopes to author a guidebook on "Skeptical Inquiry in High School" that blends his love for art and debate, and to launch a weekend adult-learning series on local history and visual arts in Reisterstown.
    Additionally, Shane is interested in volunteering as a curriculum advisor for the Carroll County public-school system, helping to embed flexible, art-rich modules into the standard syllabus. He also
    dreams of completing a personal art project—a series of watercolor portraits of historic Maryland landmarks—that could be displayed in local community centers.
