personas:
  professional: Bruce Troublefield, a 23-year-old aspiring master carpenter, blends meticulous blueprint reading, modern CAD and CNC proficiency with a deep respect for sustainable materials, while their
    organized, solitary work style drives them to design quiet, custom furniture pieces that echo historical artisanship.
  sports: Bruce Troublefield enjoys solitary outdoor pursuits, joining the Oklahoma City Hiking Club for weekend spring treks in the Ouachita Mountains and the Oklahoma Fly-Fishing Society for summer trips
    to the Arkansas River, while quietly cheering the Oklahoma City Thunder during the NBA season and keeping an eye on the Oklahoma City Dodgers.
  arts: Bruce Troublefield spends evenings strumming a worn acoustic guitar to the sounds of Miles Davis and B.B. King, immerses themselves in the design writings of Charles Eames and the sculptural woodwork
    of Grayson Pope, and finds inspiration in the quiet galleries of the Oklahoma City Museum of Art, shaping their furniture aesthetics with a blend of modernist graphics and soulful melodies.
  travel: Bruce Troublefield prefers low-key solo trips that combine nature and craft, having hiked the Grand Canyon and fished on Lake Ouachita, and now dreams of a quiet week in the Danish fjords studying
    sustainable timber design followed by a brief workshop visit to Kyoto's traditional carpentry studios.
  culinary: Bruce Troublefield favors simple farm-to-table meals, often cooking cedar-plank grilled trout with rosemary and lemon, pairing it with a quinoa-black bean salad topped with avocado, and indulging
    in a strong pour-over coffee while occasionally treating themselves to a slice of pecan pie made from locally sourced nuts.
  core: Bruce Troublefield, a meticulous yet worry-prone young carpenter, channels quiet curiosity into sustainable design, finds solace in solitary hikes and jazz, and battles a habit of over-planning
    every project down to the last screw.
background:
  cultural: Bruce grew up in Oklahoma City within a close‑knit African‑American community that valued resilience, craftsmanship, and shared cultural celebrations such as Juneteenth and local gospel gatherings.
    Family stories about his grandparents' trade work sparked his early interest in woodcraft. He draws inspiration from the legacy of black artisans, incorporating subtle motifs and traditional patterns
    into his designs. While he prefers solitude, he maintains a strong sense of responsibility toward his community, occasionally volunteering with Habitat for Humanity and staying informed about social
    justice issues affecting Black neighborhoods in Oklahoma.
attributes:
  skills: '[''Carpentry'', ''Custom furniture design'', ''Blueprint reading'', ''Project planning and budgeting'', ''Tool maintenance'', ''Woodworking safety compliance'', ''Basic structural engineering
    concepts'', ''Computer-aided design (CAD) for woodworking'', ''CNC router operation'', ''Wood carving and finishing'']'
  hobbies: '[''Woodworking projects (personal)'', ''Reading technical manuals and design books'', ''Model ship building'', ''Nature hiking'', ''Fishing'', ''Playing acoustic guitar'', ''Journaling'', ''Meditation'',
    ''Urban sketching'', ''Listening to jazz and blues'']'
  career_goals: Bruce aims to become a certified master carpenter and eventually open a small boutique workshop in Oklahoma City that specializes in high‑quality, sustainable custom furniture for quiet,
    personal spaces. He plans to complete his journeyman certification, deepen his knowledge of green building practices, and gradually transition to freelance projects that allow him to work independently.
    Long‑term, he hopes to mentor a few apprentices quietly and gain recognition for integrating African‑American cultural motifs into contemporary wood designs.
