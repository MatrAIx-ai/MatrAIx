  hobbies: '[''Reading non‑fiction'', ''Gardening'', ''Cooking healthy meals'', ''Woodworking'', ''Birdwatching'', ''Listening to jazz and blues'', ''Puzzle solving'', ''Journaling'', ''Low‑key volunteering
    at food pantry'']'
  career_goals: James aims to re‑enter the workforce in a role that aligns with his compassionate nature and practical skill set, such as a community outreach coordinator or peer‑support facilitator at
    a local non‑profit organization. He also aspires to launch a small home‑based consultancy offering budgeting advice and simple home‑maintenance guidance to neighbors. To support these goals, he plans
    to pursue a certificate in community health or social work while continuing to serve as a supportive husband and volunteer in low‑key capacities.
