personas:
  professional: Charles Smith, an 86‑year‑old retired carpenter turned senior‑center volunteer, they blend meticulous budgeting, disciplined event planning, and a curious love for art into a weekly art‑appreciation
    club, constantly refining each session to outdo the last, while also drafting a memoir that records the local African‑American experience from segregation to today.
  sports: Charles Smith, an 86‑year‑old active community member, they keep fit through daily gardening, gentle sunrise walks along the Pinellas shoreline, and cheering on the Tampa Bay Rays, while also
    participating in a senior‑center chess league that satisfies their competitive spirit and sharpens their mind.
  arts: Charles Smith, an 86‑year‑old watercolorist and gallery enthusiast, they frequent the Harbor Art Center to study Floridian vistas, collect recordings by Duke Ellington, B.B. King, and John Coltrane,
    and deliver impromptu storytelling sessions during local jazz nights at The Blue Note, always approaching each experience with curiosity and a desire to impress their audience.
  travel: Charles Smith, an 86‑year‑old reflective traveler, they have explored the jazz streets of New Orleans, the historic squares of Savannah, and the blues clubs of Chicago, preferring short, well‑planned
    trips that balance cultural immersion with the comfort of staying close to home, though they often stress about packing and travel logistics.
  culinary: Charles Smith, an 86‑year‑old culinary storyteller, they delight in preparing collard greens, smoked turkey, sweet‑potato pie, and gumbo for family reunions, harvesting tomatoes and kale from
    their garden to infuse fresh flavors, while sometimes over‑salting the cornbread in their competitive quest for the perfect recipe.
  core: Charles Smith, an 86‑year‑old organized, competitive, and sociable chronicler, they channel curiosity into watercolor, woodworking, and mentorship while grappling with persistent worries and a love
    for soulful jazz and home‑grown food.
background:
  cultural: Charles Olajawon Smith was born in 1939 in rural northern Florida, growing up during the height of Jim Crow segregation. His family, originally part of the Great Migration from the Deep South,
    retained strong ties to African-American oral traditions, gospel music, and church community life. The middle name ‘Olajawon’ reflects a familial lineage that traces back to West African (Yoruba) ancestry,
    a heritage his grandfather honored through storytelling and occasional traditional celebrations. Throughout his life, Charles has been shaped by the cultural tapestry of the Black community in Pinellas
    County—participating in civil‑rights rallies in the 1960s, attending historically Black churches, and preserving the culinary, musical, and artistic practices passed down through generations. Today,
    his identity is a blend of Southern Black resilience, a deep respect for communal support, and a commitment to ensuring that this cultural legacy endures.
