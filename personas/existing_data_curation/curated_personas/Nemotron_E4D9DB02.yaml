  hobbies: '[''Gardening'', ''Reading (Science & History)'', ''Birdwatching'', ''Photography'', ''Culinary Exploration'', ''Volunteering (Food Bank)'', ''DIY Home Projects'', ''Yoga'', ''Classical and Greek
    Folk Music Listening'', ''Local History Research'']'
  career_goals: Amanda aims to advance into a senior transit planning or safety management role within the regional transit authority, where she can apply her technical and analytical skills to redesign
    routes, integrate smart bus technologies, and enhance overall system reliability. She seeks to obtain advanced certifications in transportation safety and data analytics, and she hopes to lead initiatives
    that address driver well‑being, such as stress‑reduction programs and mental health resources. Long‑term, she envisions mentoring a new generation of drivers and possibly consulting on public transportation
    projects that blend practical operations with innovative technology.
