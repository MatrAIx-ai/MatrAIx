personas:
  professional: Amanda Stilianos, a veteran transit operator and data-savvy safety advocate, blends her STEM analytical prowess with meticulous route-optimization using GIS tools to redesign bus schedules,
    and they spearhead driver-wellness initiatives that incorporate yoga and stress-reduction workshops for the team.
  sports: Amanda Stilianos, a dedicated fan of the New Orleans Saints and Pelicans, joins the Kenner community jogging club for early-morning runs, practices yoga at the local YMCA, and they participate
    in a seasonal adult softball league, balancing competitive spirit with a preference for low-impact activities.
  arts: Amanda Stilianos, an avid urban photographer who captures the wrought-iron balconies of the French Quarter and migratory birds along the Mississippi, frequently revisits the works of William Eggleston,
    listens to Beethoven's Fifth Symphony and Greek folk tunes on the bouzouki while sketching, and they support local theater productions at the Mahalia Jackson Theater.
  travel: Amanda Stilianos, a meticulous planner who favors weekend getaways to historic sites like the Oak Alley Plantation, scenic drives along the Highway 1 coastal route in California, and cultural
    festivals in Savannah, Georgia, they occasionally yield to spontaneous trips to New Orleans' nearby wetlands for bird-watching excursions.
  culinary: Amanda Stilianos, a moderate home chef who transforms garden-fresh tomatoes and zucchini into a Mediterranean quinoa salad with feta, olives, and oregano, delights in Creole classics like gumbo
    and jambalaya at Commander's Palace, and they regularly experiment with traditional Easter lamb stew and tsoureki during family holidays.
  core: Amanda Stilianos, a methodical transit expert with a green thumb, a penchant for early-dawn birdwatching, and a habit of worrying over schedules, they balance analytical rigor with a love of classical
    and folk melodies while quietly battling the stress of a demanding career.
background:
  cultural: Amanda is a second‑generation Greek‑American who was raised in the Greater New Orleans area. Her family preserves Greek traditions, such as celebrating Easter with traditional dishes and occasional
    use of the Greek language, while fully participating in Southern Louisiana culture—attending Mardi Gras, enjoying Creole cuisine, and valuing the community hospitality characteristic of Jefferson Parish.
    Living in Kenner, she navigates a multicultural environment that includes diverse linguistic, culinary, and religious influences, blending her European heritage with regional Southern customs and mainstream
    American values.
