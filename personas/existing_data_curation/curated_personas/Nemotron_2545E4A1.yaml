personas:
  professional: Truong Nguyen is a budding block architect who balances curiosity about new building shapes with a practical approach to stacking, often organizing toys into tidy rows before improvising
    imaginative structures, and they proudly display their latest tower to anyone who stops by.
  sports: Truong Nguyen enjoys watching the local soccer team, the City Lions, and participates in a preschool soccer club where they love chasing the soft orange ball, though they prefer playing with a
    few peers rather than a full crowd.
  arts: Truong Nguyen delights in sing‑along sessions with The Wiggles, especially the song "Fruit Salad", and loves drawing simple line art of dinosaurs inspired by Mo Willems, often performing a tiny
    dance after completing a picture.
  travel: Truong Nguyen loves short road trips to the nearby aquarium, often asking for a repeat visit, and dreams of a family vacation to Disney World where they can meet their favorite character Mickey
    Mouse.
  culinary: Truong Nguyen prefers macaroni and cheese with a sprinkle of extra cheddar, enjoys dipping carrot sticks into hummus, yet they stubbornly refuse broccoli, sometimes bargaining for a chocolate
    chip cookie as a compromise.
  core: Truong Nguyen balances a curious mind with a practical knack for tidying up, quietly observes peers before joining small play groups, and occasionally hoards a secret stash of stickers in the couch
    cushions.
background:
  cultural: Truong is raised in a Vietnamese‑American household in Humble, Texas. His parents maintain traditional Vietnamese customs at home, such as celebrating Tet (Lunar New Year) with family meals,
    offering red envelopes, and preparing dishes like bánh chưng and phở. He hears both English and Vietnamese daily, fostering bilingual language development. Community gatherings at the local Vietnamese
    cultural center and the nearby Vietnamese market expose him to music, dance, and festivals that blend his Southeast Asian heritage with the multicultural environment of Harris County. Family values
    emphasize respect for elders, harmony, and communal responsibility, shaping his considerate and cooperative nature.
