persona_description: A preservice educator who is committed to teaching and working with diverse student populations and communities. They are regularly exposed to in-service education to identify and overcome
  bias and confidently meet the needs of a diverse classroom/school. They are provided with information on local, regional, and national workshops, conferences, and professional development opportunities
  related to diversity and equity issues, and are supported in participating in these activities. They are taught that they are prepared to meet the needs of diverse students and understand the profession
  in the context of our diverse society. They are also taught that content knowledge, experience, and diversity are integrated with instructional strategies that enhance student achievement in their preservice
  teacher education. They are given experience in working with a wide variety of students through curriculum standards for professional programs, which emphasize the integration of theory and practice as
  related to diversity and utilize performance assessment and field experience to support learning.
