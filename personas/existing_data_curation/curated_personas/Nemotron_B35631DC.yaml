    at community events'']'
  career_goals: Ryan hopes to turn his practical skills into a stable career after high school. He is interested in becoming an automotive or diesel mechanic, or pursuing a trade such as electrician or
    HVAC technician, where he can apply his hands‑on abilities and enjoy a predictable routine. He also considers enlisting in the Army to serve at nearby Fort Bragg, attracted by the structure, camaraderie,
    and the opportunity to support his community as a future firefighter or emergency responder. His primary ambition is to secure a reliable job that lets him work with his hands, stay connected with his
    friends, and provide for his family.
