personas:
  professional: Ryan Harris is a high‑school junior who channels his outgoing nature and love for routine into running the after‑school 'Model Makers' club, where they coordinate weekly build sessions for
    car and airplane kits, while also volunteering to organize logistics for local cleanup events, applying practical, hands‑on problem solving.
  sports: Ryan Harris dominates the local park’s pickup basketball courts and Saturday soccer matches, cheering for the Los Angeles Lakers and Manchester United, while also joining the 'Junior Rangers'
    hiking club for weekend trail runs and casting lines at Lake Willow for trout.
  arts: Ryan Harris fuels their artistic side by assembling intricate model kits of vintage cars and World War II aircraft, and unwinds to classic rock legends like The Rolling Stones and country icons
    such as Dolly Parton, often humming the tunes while polishing a finished model.
  travel: Ryan Harris prefers spontaneous road trips over meticulous itineraries, frequently escaping to nearby fishing lakes like Lake Willow, dreaming of a future camping adventure in Yellowstone, and
    cherishing past family hikes through the Blue Ridge Mountains.
  culinary: Ryan Harris loves firing up the backyard grill for smoky burgers, honey‑glazed baby back ribs, and hickory‑seasoned corn on the cob, proudly mastering a secret BBQ sauce recipe that blends tomato
    paste, brown sugar, and a dash of bourbon.
  core: Ryan Harris blends a love for routine with a knack for flexibility, leading friends in sports, model‑building, and community clean‑ups while juggling occasional impulsive video‑game purchases and
    a habit of misplacing their favorite fishing hat.
background:
  cultural: Ryan grew up in Fayetteville, North Carolina, within a white, Southern‑midwestern family that values tradition, community, and a practical work ethic. His upbringing includes regular church
    attendance, family barbecues, and a close connection to the nearby military community at Fort Bragg, which shapes his respect for service and discipline. The local culture emphasizes friendly neighborly
    interactions, sports, outdoor activities, and a straightforward, no‑frills approach to life. These influences contribute to his preference for routine, practicality, and cooperative social living.
