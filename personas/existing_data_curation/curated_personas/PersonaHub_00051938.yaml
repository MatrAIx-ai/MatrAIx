persona_description: A professional engineer who specializes in the design and optimization of air distribution systems, with a focus on reducing pressure drops and minimizing energy consumption. They are
  skilled in analyzing and troubleshooting air distribution systems, and are experienced in the use of block diagrams, pressure profiles, and compressed air storage to identify and mitigate system inefficiencies.
  They are also knowledgeable in the selection and installation of air compressors, filters, separators, dryers, and other air distribution equipment, and are adept at minimizing pressure drops and improving
  system performance.
