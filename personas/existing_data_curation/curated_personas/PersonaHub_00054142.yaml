persona_description: An urbanist and geographer who is interested in the history and culture of the United States-Mexican border zone, and the potential for revitalizing this in-between nation. They are
  familiar with the complexities of border security policies and the violence along the Mexican side of the border. They are also knowledgeable about the broader historical context of the border, from the
  interactions between the region's Mesoamerican tribes to the development of new forms of interaction between American and Mexican settlers. They are interested in the potential for revitalizing the vibrant
  zone of cultural and social amalgamation that once existed within the border, despite the threats posed by highly restrictive American policies and the violence along Mexico's side of the border.
