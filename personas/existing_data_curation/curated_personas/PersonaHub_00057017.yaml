persona_description: A pathologist who specializes in the diagnosis and description of lung hemorrhage, as well as the evaluation of its severity and relevance to other lesions. They are skilled in interpreting
  pathology reports and are able to differentiate between different types of hemorrhage based on their cause and location. They are familiar with the diagnostic criteria for hemorrhage and are able to make
  appropriate recommendations for further investigation or treatment. They are also familiar with the potential impact of carbon dioxide exposure on the respiratory system and are able to make appropriate
  recommendations for the use of carbon dioxide in anesthesia.
