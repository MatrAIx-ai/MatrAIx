personas:
  professional: Carla Perry is a senior full‑stack engineer and cloud architect whose imaginative problem‑solving fuels the creation of interactive, AI‑driven art platforms, while their methodical planning
    and outgoing mentorship style drive high‑performing, inclusive Scrum teams.
  sports: Carla Perry, a veteran of multiple Chicago Marathons, trains with the Chicago Road Runners club, follows the Chicago Bulls and Bears seasonally, and treats each long run as a creative sprint,
    balancing disciplined mileage with spontaneous jazz‑inspired playlists.
  arts: Carla Perry merges code and culture by crafting generative visual installations with p5.js while orchestrating algorithmic compositions inspired by John Coltrane, Miles Davis, and Autechre, and
    regularly jams on saxophone at community sessions that echo the spirit of Chicago blues legend Buddy Guy.
  travel: Carla Perry prefers meticulously planned tech‑savvy trips that blend artistic immersion and networking, having explored Berlin’s museum district and New Orleans’s jazz scene, while dreaming of
    an immersive art retreat in Kyoto’s Arashiyama area.
  culinary: Carla Perry is a confident home cook who perfects soul‑food staples like smoked turkey collard‑green stew and sweet‑potato pie, while also experimenting with seasonal vegetables such as roasted
    cauliflower and miso‑glazed carrots, and often hosts potlucks featuring both traditional and fusion dishes.
  core: Carla Perry blends marathon stamina with generative coding flair, champions inclusive tech initiatives, yet habitually forgets to water houseplants after late‑night hackathon sprints.
background:
  cultural: Carla grew up in Chicago’s South Side, where the vibrant legacy of African‑American music, activism, and community solidarity shaped her worldview. Her family’s roots trace back to the Great
    Migration, and stories of resilience and collective uplift were a constant presence at family gatherings and church services. The city’s rich jazz and blues heritage sparked her early love of music,
    while the neighborhood’s community centers introduced her to computers through after‑school programs. As a Black woman in tech, Carla draws strength from the city’s thriving Black cultural institutions—such
    as the DuSable Museum and local Black‑owned galleries—and she actively participates in Chicago’s Black Tech and STEM outreach networks. Her cultural identity informs her commitment to inclusive design,
    mentorship of under‑represented youth, and the celebration of African‑American artistic expression within her professional and personal projects.
