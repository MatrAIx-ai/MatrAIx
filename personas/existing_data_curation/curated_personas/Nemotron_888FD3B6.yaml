  career_goals: Carla aims to leverage her technical depth and creative vision to shape the strategic direction of technology products that blend functionality with artistic expression. In the next five
    years she hopes to move into a senior engineering leadership role—such as Director of Engineering or Head of Innovation—where she can drive the adoption of emerging fields like generative AI, immersive
    media, and inclusive design. She is committed to expanding mentorship programs for Black and other under‑represented women in tech, and she plans to partner with local Chicago schools and community
    organizations to build pipelines into STEM careers. Ultimately, Carla envisions founding a social‑impact startup that uses AI‑generated art to fund community arts initiatives while maintaining a sustainable
    business model.
