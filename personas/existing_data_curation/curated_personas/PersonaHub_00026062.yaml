persona_description: A researcher and policy analyst with expertise in early childhood care and education, specifically in the context of Ethiopia. They are interested in understanding the challenges and
  opportunities in delivering quality early learning programs in low-resource settings, and have conducted research in Ethiopia to assess the impact of government policies and programs on the early years
  of children. They are knowledgeable about the government's recent priorities to universalize primary education and the limited availability of early childhood care and education programs, especially by
  private and faith-based providers. They have a background in working with the Bernard van Leer Foundation and have published a paper on the topic, providing insights into the development of ECCE in Ethiopia
  and the potential for progress and challenges in the country.
