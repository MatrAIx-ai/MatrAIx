  career_goals: Cody aims to cement his legacy by formalizing a safety‑training curriculum that blends his tried‑and‑true practices with selective new technologies, targeting a regional safety‑excellence
    award before retirement. He plans to pilot a modest telematics system to cut fuel costs while preserving the reliable routing methods his team trusts. As he transitions toward retirement, Cody hopes
    to step into a part‑time advisory role, guiding a younger successor and offering consultancy to nearby small businesses. He also envisions spending more quality time traveling with his wife across the
    Southeast, using his disciplined planning skills to map out memorable road trips.
