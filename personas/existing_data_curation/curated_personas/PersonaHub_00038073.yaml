persona_description: Annie Trapper-Weistche, a Cree woman who grew up in Pikogan, is frustrated with the lack of recognition and support for her people. She is determined to bring her community together
  and establish a place where they can call their own. She believes that the history of the Cree in Pikogan has been marked by abuse and neglect, and she is working to address these issues in order to build
  a better future for her people. She is a strong advocate for education, housing, and economic growth for her community, and she is committed to working with other Cree communities to achieve these goals.
