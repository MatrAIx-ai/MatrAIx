    as a docent at the Watkins Glen Historical Society'', ''Genealogy research'', ''Knitting'', ''Casual piano playing'', ''Attending local theater productions'']'
  career_goals: Although retired from formal employment, Mary aims to remain an active contributor to her community. She hopes to mentor a new generation of teachers through a local apprenticeship program,
    lead a seasonal art series at the Watkins Glen museum, and compile a collection of personal essays and local history for publication. She also aspires to develop an intergenerational garden project
    that brings seniors and schoolchildren together, and to travel to a few major art museums in the Northeast to broaden her artistic perspective.
