personas:
  professional: Jonathan Field is an experienced construction laborer who blends hands‑on expertise in formwork, concrete finishing, and heavy equipment operation with a natural knack for mediating crew
    conflicts, and is actively pursuing OSHA 30‑hour certification and a construction‑management credential to transition into a site supervisor role while piloting small green‑tech upgrades on job sites.
  sports: Jonathan Field is a social basketball enthusiast who joins a pickup league at the community gym every Thursday, cheers on the Chicago Bulls and Chicago Bears while they're off the court, and spends
    Saturdays fishing on the Little Wabash River and hiking the Shawnee National Forest, maintaining a modest but regular fitness routine through these group activities.
  arts: Jonathan Field is an avid supporter of Austin’s live‑music scene, attending South by Southwest and local blues nights where they’ve caught sets by The Black Keys and St. Vincent, while they also
    enjoy folk festivals in the Midwest, collect vintage concert posters, and occasionally perform acoustic guitar at neighborhood barbecues, letting music shape both their social life and creative DIY
    projects.
  travel: Jonathan Field is a weekend‑oriented explorer who prefers short road trips to state parks like Garden of the Gods and cultural stops such as Austin’s music festivals, and they harbor a dream of
    a sustainable‑building tour in Portland, yet family and budget constraints keep most travel within a 300‑mile radius, focusing on fishing expeditions along the Mississippi and camping in the Shawnee
    Hills.
  culinary: Jonathan Field is a backyard grill master who loves smoking brisket with hickory wood, pairing it with home‑brewed IPAs featuring Cascade hops, and they often experiment with river‑caught catfish
    tacos seasoned with smoked paprika and cilantro, reflecting a cooking skill level that ranges from confident smoker to occasional burnt‑off misadventure when juggling multiple tasks.
  core: Jonathan Field is a hands‑on construction veteran whose curiosity drives sustainable DIY projects, whose sociable spirit fuels community gatherings, yet whose relaxed planning and occasional stress‑induced
    worry often leave their schedule a tangled skein of work, family, and craft.
background:
  cultural: Jonathan grew up in rural Scott County, Indiana, within a predominantly white, Midwestern community where self‑reliance, neighborly support, and modesty are valued. His family background includes
    German and Irish ancestry, reflected in seasonal community traditions such as fall harvest festivals and the local county fair. The region’s emphasis on hard work and community service shaped his compassionate,
    cooperative outlook. Though he has never married, his social circle includes long‑standing friendships formed through high school sports, local churches, and community organizations. He tends to identify
    with Midwestern cultural norms—practicality, a love for outdoor recreation, and a preference for informal, face‑to‑face interaction—while also embracing the curiosity to explore new ideas and technologies.
