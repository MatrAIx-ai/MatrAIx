  hobbies: '["Pickup basketball","Barbecue cooking and hosting","Woodworking and furniture making","Volunteering with Habitat for Humanity","Hiking state parks","Fishing along the Little Wabash River","Attending
    live‑music events","Home‑brewing craft beer","DIY home‑improvement projects"]'
  career_goals: Jonathan aims to transition from laborer to site supervisor within the next five years, pursuing a construction‑management certification and the OSHA 30‑hour course to strengthen his leadership
    credentials. He also envisions launching a small, locally‑owned contracting firm that focuses on affordable, energy‑efficient housing for his community. His desire to help others motivates him to mentor
    younger workers, volunteer with Habitat for Humanity, and eventually develop a training program that emphasizes safety, collaboration, and environmentally responsible construction. On a personal level,
    he hopes to improve his organizational habits to reduce stress and achieve a healthier work‑life balance.
