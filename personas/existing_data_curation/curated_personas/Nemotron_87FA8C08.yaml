  hobbies: '[''Gardening'', ''Quilting'', ''Bridge (card games)'', ''Cooking Southern dishes'', ''Genealogy research'', ''Church choir participation'', ''Volunteer work'', ''Local travel'', ''Storytelling'',
    ''Attending community events'']'
  career_goals: Sierra aims to channel her love of storytelling and community into a legacy project, documenting the oral histories of long‑time Greenville residents for the local historical society. She
    is determined to master digital photography and video editing so she can create a multimedia memoir of her family's journey. Within the next few years, she hopes to lead the senior‑center's event‑planning
    committee, introducing new, low‑cost activities that blend tradition with fresh ideas. Additionally, she plans to expand her genealogical research, tracing her family roots back to early 20th‑century
    Appalachia, and to travel to key historical sites across the Southeast. Through these ambitions, she seeks to stay active, intellectually curious, and socially influential while maintaining her independent,
    flexible lifestyle.
