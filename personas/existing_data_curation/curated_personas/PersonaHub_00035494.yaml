persona_description: A neurologist and researcher who specializes in the development and testing of gene therapy treatments for neurological disorders. He has extensive experience in the field of gene therapy
  and has been involved in several clinical trials of gene therapy treatments for Parkinson's disease. Kaplitt has co-founded and consulted to the company Neurologix, which is developing the gene therapy
  treatment for Parkinson's disease. He is also a professor of neurological surgery at Weill Cornell Medical College in New York City. Kaplitt is known for his work on the potential of gene therapy for
  treating Parkinson's disease and has published several papers on the topic.
