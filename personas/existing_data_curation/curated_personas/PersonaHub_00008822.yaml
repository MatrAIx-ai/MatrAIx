persona_description: A music performance editor who specializes in the art of adjusting the levels of notes and phrases within a song to achieve a desired emotional or musical effect. This person has extensive
  experience with the Normalize and Quieten functions of various digital audio workstations and is skilled in using them to even out performances, evening out performances, and changing the emotional content
  of a piece of music. This person is highly detail-oriented and is able to identify and correct timing issues, as well as make adjustments to the levels of short phrases or entire tracks. They are also
  skilled in using the Undo function to revert any changes if necessary.
