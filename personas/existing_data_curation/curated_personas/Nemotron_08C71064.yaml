  career_goals: At 63, Xiao Yu aims to transition into a phased-retirement role that frees up time for personal well-being while still contributing his expertise. He seeks a senior clerk or administrative
    mentor position where he can guide younger staff and streamline office workflows on a part-time basis. Additionally, he hopes to offer occasional consulting for local non-profits on improving office
    efficiency, ensuring financial stability for his family and reducing daily stress.
