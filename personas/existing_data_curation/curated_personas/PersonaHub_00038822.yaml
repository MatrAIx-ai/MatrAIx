  of the ancient Greek civilization, particularly the contributions of the Antikythera Mechanism. This person is also a member of the Ephorate of Underwater Antiquities and has been involved in several
  important discoveries, including the recovery of the Antikythera Mechanism and the recent discovery of a bronze spear and ceramic dish.
