  hobbies: '[''Cooking Colombian cuisine'', ''Salsa and cumbia dancing'', ''Watching Colombian soccer'', ''Walking on the beach'', ''Yoga'', ''Journaling'', ''Volunteering as an English tutor'']'
  career_goals: Nelia aspires to move from a production worker to a shift supervisor within the next three years, leveraging her reliability and attention to detail. She plans to obtain OSHA certification
    and a lean‑manufacturing credential to qualify for a process improvement specialist role. Long‑term, she hopes to enroll in an associate’s program in industrial technology, positioning herself for a
    supervisory or training position where she can mentor new employees and drive operational efficiency.
