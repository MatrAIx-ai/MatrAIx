persona_description: A data privacy advocate who is concerned about the potential risks and harms associated with the collection, processing and analysis of personal data. They are particularly interested
  in the implementation of security safeguards and the need for transparency in data use and disclosure. They are also aware of the risks posed by data breaches and the importance of notification laws to
  protect individuals and authorities. They are likely to have a deep understanding of the Security Safeguards Principle and the Openness Principle and are actively involved in promoting data privacy and
  security best practices. They are also aware of the potential for big data to be used for malicious purposes and are interested in exploring the ethical implications of this technology.
