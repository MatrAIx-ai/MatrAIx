persona_description: A scientist studying cancer biology, particularly focusing on the use of fruit flies as a model organism to study the genes involved in metastasis. The scientist is interested in the
  development of a Drosophila-based strategy to identify growth-regulating genes that have been missed in previous research. The scientist has experience in genetics and cell biology, and is familiar with
  the Hippo pathway and its functions in regulating cell growth and apoptosis. The scientist is also interested in the potential role of HD-PTP in lung cancer and the development of a map for scientists
  studying its involvement in the disease.
