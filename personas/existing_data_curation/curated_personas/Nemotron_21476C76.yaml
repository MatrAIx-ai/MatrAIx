  career_goals: Billy often talks about wanting to help people when he grows up. He imagines himself as a kind teacher who creates a warm, organized classroom where everyone feels safe and learns together,
    or as a community‑focused firefighter who keeps his neighborhood secure. His ambitions center on roles that combine structure, responsibility, and caring for others, reflecting his love of order and
    his cooperative nature.
