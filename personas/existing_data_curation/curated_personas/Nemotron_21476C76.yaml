personas:
  professional: Billy Thompson is an aspiring preschool teacher who delights in leading his stuffed animals in circle time, using his innate organization to arrange storybooks by theme and his sociable
    energy to keep his imaginary class happily engaged.
  sports: Billy Thompson loves sprinting around the playground and is a proud member of the Aberdeen Kids T‑ball club, cheering loudly for the New Orleans Saints on Sundays, while his bedtime stories include
    tales of the Memphis Grizzlies, reflecting his early enthusiasm for both team spirit and active play.
  arts: Billy Thompson delights in singing Dolly Parton's Jolene in his own high‑pitched version during family gatherings, dancing to fiddle tunes at church picnics, and soaking up picture books by Dr.
    Seuss, which together shape his budding love for music, storytelling, and Southern folk culture.
  travel: Billy Thompson prefers short, well‑planned car trips with his parents, having already visited his grandmother’s farm in rural Alabama, splashed in the shallow waves at Biloxi’s Gulf Coast, and
    marveled at the animals at the Memphis Zoo, all while his anticipation builds for a future family vacation to Washington, D.C.
  culinary: Billy Thompson’s palate gravitates toward buttery buttermilk biscuits, creamy macaroni and cheese, and crunchy chicken nuggets, and he proudly insists on sprinkling fresh strawberries on top
    of his morning oatmeal, often helping his mother roll dough for cornbread in the kitchen.
  core: Billy Thompson is a pint‑size social bee who thrives on tidy routines, loves gathering in church‑centered celebrations, habitually lines up his toy cars in perfect rows, and though he can be stubborn
    about bedtime, his endless curiosity and cheerful cooperation make him the heart of his family’s small‑town world.
background:
  cultural: Billy’s cultural background is rooted in the Southern United States, specifically a small‑town community in Aberdeen, Mississippi. He is raised in a predominantly white, Christian family where
    Sundays are spent at church Sunday school and holidays like Thanksgiving and Christmas are celebrated with close‑knit family gatherings. Local events such as the county fair and community picnics reinforce
    values of hospitality, politeness, and neighborly support. This environment, with its emphasis on tradition, community involvement, and modest Southern charm, shapes Billy’s kind, cooperative, and orderly
    demeanor.
attributes:
