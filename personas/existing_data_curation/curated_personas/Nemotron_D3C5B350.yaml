  career_goals: Khin aspires to move from a front-line cleaning role into a supervisory or facilities-management position within the next three years. She plans to earn the ISSA Certified Professional Cleaner
    credential and a certification in Green Cleaning to differentiate herself in the market. Long-term, she dreams of launching her own small cleaning company that serves residential and commercial clients
    in the Dallas-Fort Worth metro area, emphasizing eco-friendly practices and reliable service. She also hopes to mentor other women from immigrant backgrounds who are entering the trades.
