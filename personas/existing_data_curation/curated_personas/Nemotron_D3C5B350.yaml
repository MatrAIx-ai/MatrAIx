personas:
  professional: Khin Patel, a seasoned janitorial professional with an associate's degree in business administration, they leverage meticulous cleaning expertise, OSHA compliance knowledge, and bilingual
    communication to streamline facility operations, while charting a path toward supervisory roles and an eco-focused cleaning company.
  sports: Khin Patel enjoys evening walks by the lake, they participate in community centre badminton matches, they follow the Dallas Mavericks and Texas Rangers for occasional game nights, and they practice
    yoga three times weekly to maintain flexibility and core strength.
  arts: Khin Patel immerses themselves in cultural arts by dancing Garba during Navratri, they listen to A.R. Rahman's film scores and Lata Mangeshkar's classic songs, they attend local theatre productions,
    and they volunteer at the community centre's art workshops, where they help organize exhibitions.
  travel: Khin Patel prefers short, affordable road trips—such as weekend getaways to Hill Country's wineries and historic Fredericksburg—while dreaming of an eco-tour of New Zealand's sustainable farms,
    and they carefully plan itineraries to balance family responsibilities and budget constraints.
  culinary: Khin Patel excels at preparing traditional Gujarati dishes like dhokla, khandvi, and thepla using fresh cilantro, mustard seeds, and hing from their backyard garden, they experiment with vegan
    twists for health and sustainability, and they relish sharing these meals at Diwali and Navratri gatherings.
  core: Khin Patel blends pragmatic cleanliness expertise with a green-focused entrepreneurial spark, they balance disciplined finances with occasional festive splurges, they manage mild health concerns
    through yoga, and they nurture cultural roots through cooking, music, and community service.
background:
  cultural: Khin was born to Gujarati parents who immigrated to the United States in the 1970s. Growing up in Texas, she blends Indian traditions with Southern hospitality. She celebrates major festivals
    such as Diwali, Holi, and Navratri, and maintains a strong connection to Gujarati language, music, and cuisine. Her cultural identity informs her values of hard work, family loyalty, and respect for
    elders, while her experience as a divorced immigrant woman in Rockwall has fostered a pragmatic, independent outlook. She actively participates in the local Indian diaspora community, offering support
    to new immigrants and preserving cultural rituals within her household.
