    in local parks"]'
  career_goals: Although retired, Luis aims to stay physically active, maintain his health, and preserve his cultural heritage. He wants to continue mentoring his grandchildren and local youth, documenting
    family recipes and stories in a handwritten cookbook. He aspires to lead a cultural workshop at the Greenville senior center, teaching salsa steps and traditional dishes. He also hopes to travel to
    Puerto Rico to visit extended family and celebrate holiday traditions. Ultimately, he strives to ensure his community recognizes the contributions of Puerto Rican seniors.
