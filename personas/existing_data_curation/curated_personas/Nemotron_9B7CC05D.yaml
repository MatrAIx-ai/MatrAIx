personas:
  professional: Luis Castro, a retired handyman and community organizer, leverages decades of carpentry, plumbing, and electrical repair expertise along with a sharp budgeting skill set to design and run
    structured senior‑center workshops on home maintenance and cultural cooking, where they balance meticulous planning with the lively spontaneity of group participants.
  sports: Luis Castro, a regular at the Greenville senior walking club and a devoted fan of the Carolina Panthers, Atlanta Braves, and Greenville Drive, maintains fitness through daily garden walks, weekly
    low‑impact exercise sessions, and seasonal community softball games, favoring structured activity schedules while still indulging in enthusiastic game‑day celebrations.
  arts: Luis Castro, a passionate member of a senior‑center book club that devours historical novels by Ken Follett and Hilary Mantel, also immerses themselves in salsa and plena rhythms, dancing to the
    timeless sounds of Celia Cruz, Rubén Blades, and Willie Colón, while occasionally humming classic Broadway tunes from The Sound of Music.
  travel: Luis Castro, a methodical traveler who prefers well‑planned trips, has explored the historic streets of Charleston and Savannah on relaxed weekend drives, dreams of a carefully organized pilgrimage
    to the island where his family originates to celebrate holidays, and balances these ambitions with occasional budget‑friendly visits to nearby state parks.
  culinary: Luis Castro, an experienced home chef, skillfully prepares arroz con gandules, mofongo with garlic‑infused pork, and fresh tomato‑herb salads, often seasoning with sofrito, achiote, and cilantro,
    while delighting in the ritual of sharing these meals with family, though they occasionally over‑salt dishes when stress spikes.
  core: Luis Castro, a structured yet gregarious 75‑year‑old who balances meticulous budgeting, hands‑on home repair, and lively salsa dancing with a persistent worry about health and finances.
background:
  cultural: Luis was born and raised in San Juan, Puerto Rico, in a close‑knit, Catholic family where music, food, and family gatherings were central. After moving to Greenville, North Carolina, he blended
    Caribbean customs with Southern traditions, preparing traditional dishes while also enjoying local sweet tea. He fluently speaks both Spanish and English, celebrates Puerto Rican holidays such as Three
    Kings’ Day and Noche de San Juan, and participates in local festivals. As an active member of the Puerto Rican diaspora network in Greenville, he collaborates with cultural organizations to preserve
    heritage and foster intercultural exchange.
