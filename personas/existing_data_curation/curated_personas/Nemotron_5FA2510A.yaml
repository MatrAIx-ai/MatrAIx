  career_goals: Lynne dreams of a career that blends her love for nature with a desire to help others. In the long term she hopes to study marine biology or environmental science at a university, aiming
    to work on coastal conservation projects that protect the wetlands and bayous of her hometown. She also envisions becoming a community educator, teaching younger students about local ecosystems and
    sustainable practices. In the short term she plans to finish high school, earn a first‑aid certification, and volunteer with local wildlife rescue groups, while keeping a backup interest in culinary
    arts that could let her share traditional Louisiana dishes with the community.
