personas:
  professional: Lori Gibson is a teen dancer‑choreographer who blends hip‑hop flair with a practical eye for structure, organising school dance showcases while still leaving room for impromptu jam sessions
    with friends, and they often take charge of scheduling rehearsals.
  sports: Lori Gibson plays midfielder for the co‑ed Northbrook Under‑15 soccer team, cheers on the Chicago Fire FC during the MLS season, and rolls with the Ridge Park Skate Club at the local skate park,
    preferring dynamic, group‑based workouts that blend cardio with skill drills.
  arts: Lori Gibson acts in the school drama club’s productions of The Crucible and Grease, sketches vibrant character caricatures in a battered notebook, and streams playlists featuring Billie Eilish,
    Tame Impala, and Lizzo while rehearsing, letting music and performance shape their creative identity.
  travel: Lori Gibson has spent summers visiting Disney World in Orlando and the boardwalk of San Diego, and dreams of exploring Tokyo’s Shibuya crossing and the art museums of Paris, favouring spontaneous
    weekend trips with friends that fit within a modest family budget.
  culinary: Lori Gibson favors pepper‑spiced ramen, loaded taco bowls, and classic pepperoni pizza, often whipping up quick avocado toast with a splash of hot sauce for breakfast, while occasional cravings
    lead them to order bubble tea with extra tapioca pearls after a long skate session.
  core: Lori Gibson is a high‑energy teen who balances a love for structured dance routines with a carefree approach to schoolwork, often forgetting homework but never missing a chance to capture a candid
    photo or nail a new skate trick.
background:
  cultural: Raised in a white, middle-class family in Fort Lee, New Jersey, Lori's upbringing reflects typical suburban American culture. Her family celebrates U.S. holidays such as Thanksgiving, Fourth
    of July, and Halloween, and enjoys outings to nearby New York City museums, parks, and multicultural festivals, exposing her to a diverse population despite her own ethnic background. The proximity
    to the Hudson River and the commuter rail line fosters a sense of connection to both suburban life and urban vibrancy. Community activities like block parties, youth sports leagues, and school events
    shape her social outlook.
