  career_goals: Lori dreams of a career that blends her love for people, organizing, and helping teens. She is interested in becoming a youth program coordinator or community outreach specialist, designing
    events and mentorship programs for adolescents. In the longer term, she also imagines working as a middle-school teacher or school counselor, roles that let her support younger students academically
    and emotionally. She plans to focus on high-school electives that strengthen her leadership and communication skills and eventually pursue a degree in education, social work, or hospitality management.
