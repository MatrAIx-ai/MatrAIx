  career_goals: Jose frequently talks about becoming an astronaut who sketches the planets, a scientist who discovers new species, or a muralist who paints vibrant scenes of his community's heritage. He
    aims to excel academically, win science fairs, and master both art and scientific inquiry. His ambitious drive is fueled by his love of abstract concepts, his disciplined work habits, and a desire to
    achieve high standards in any field he pursues.
