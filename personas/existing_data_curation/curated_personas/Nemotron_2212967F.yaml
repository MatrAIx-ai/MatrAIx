personas:
  professional: Jose Gonzalez, an aspiring architect in his playroom, constructs intricate LEGO cityscapes with meticulous precision, channeling his disciplined organization and boundless imagination into
    every design.
  sports: Jose Gonzalez, a junior soccer enthusiast, drills with his neighborhood Tiny Tigers club and fervently supports the national soccer team, balancing his competitive drive with disciplined practice
    sessions after school.
  arts: Jose Gonzalez, a budding visual storyteller, draws elaborate scenes inspired by the whimsical art of Dr. Seuss and the animated adventures of Pixar's Inside Out, often staging his own mini-exhibitions
    of crayon murals for his family.
  travel: Jose Gonzalez, an adventurous day-trip explorer, loves visiting the nearby science museum and the coastal pier, and dreams of traveling to Disney World in Florida and the historic castles of Europe,
    meticulously planning imaginary itineraries with stickers on a map.
  culinary: Jose Gonzalez, a picky yet curious eater, adores cheesy pizza slices, chicken nuggets with ketchup, and sweet strawberries, and proudly attempts to sprinkle cinnamon on his oatmeal, though he
    often sneaks extra chocolate chips when his parents aren't looking.
  core: Jose Gonzalez, a disciplined imagination-fueled five-year-old, blends meticulous organization with creative curiosity, turning everyday play into competitive quests while navigating childhood quirks
    and occasional indulgences.
background:
  cultural: Jose is raised in a Mexican‑American household in Arlington, Texas. Spanish is spoken at home, and he participates in cultural celebrations such as Día de los Muertos, where he helps create
    colorful papel picado and learns about honoring ancestors. He enjoys Mexican cuisine—especially tacos, tamales, and guacamole—and his family emphasizes values of respect, hard work, and community. Attending
    a bilingual preschool, he experiences a blend of Mexican traditions and broader Texas culture, shaping a rich, dual heritage.
