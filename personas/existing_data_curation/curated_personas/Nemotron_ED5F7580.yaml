personas:
  professional: David Rossi, an aspiring robotics hobbyist at age fourteen, combines a love for electronic kits with the disciplined work ethic of their Midwest upbringing, channeling curiosity and practicality
    into building LEGO‑powered automatons while staying organized enough to meet school deadlines and flexible enough to prototype new ideas after basketball practice.
  sports: David Rossi, a middle‑school basketball enthusiast, shoots hoops with the Norwalk Hurricanes youth league, cheers for the Cleveland Cavaliers on weekends, and balances seasonal outdoor hikes with
    sprint drills, embodying a cooperative team spirit and personal drive to stay fit despite occasional over‑thinking about performance, and they often review game footage on their phone after practice.
  arts: David Rossi, an acoustic‑guitar‑strumming sci‑fi fan, spends evenings dissecting Brandon Sanderson’s world‑building while listening to the folk tunes of Mumford & Sons and The Lumineers, channeling
    their kind, cooperative nature into jam sessions with friends and detailed LEGO dioramas that echo their love for intricate storytelling.
  travel: David Rossi prefers planned weekend camping trips to Hocking Hills and spontaneous road‑stops at local farm markets, yet dreams of a cultural pilgrimage to a historic European capital famed for
    its ancient architecture and a bustling exploration of New York City, balancing a desire for adventure with family budget constraints and a habit of over‑packing due to worry about missing essentials,
    and they often sketch itineraries in a worn notebook before each trip.
  culinary: David Rossi enjoys cooking family‑style spaghetti carbonara and meatball subs using a secret grandmother recipe, pairs meals with homemade pesto and fresh basil, and can whip up trail mix with
    almonds, dried cherries, and dark chocolate for hikes, though they sometimes over‑season dishes while daydreaming about upcoming LEGO builds.
  core: David Rossi is a fourteen‑year‑old dreamer who blends a meticulous, caring nature with a restless curiosity, juggling basketball, gadgets, and guitar while they worry about every detail.
background:
  cultural: David comes from an Italian‑American family that has lived in the Midwest for generations. Raised in the small, close‑knit community of Norwalk, Ohio, his upbringing reflects Midwestern values
    of hard work, neighborliness, and a blend of Catholic traditions and local customs. Family celebrations often include Italian holidays such as Festa della Repubblica and cooking of pasta dishes and
    meatballs, while the broader community’s agricultural roots shape his appreciation for seasonal events, local farm markets, and community gatherings.
