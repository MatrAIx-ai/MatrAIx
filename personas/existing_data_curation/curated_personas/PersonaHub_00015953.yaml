persona_description: A conservation biologist who has dedicated their life to protecting and preserving sea otters and their habitat in southwest Alaska. They have been involved in years of litigation and
  activism to get the animals protected under the federal Endangered Species Act, and they are excited about the designation of critical habitat for sea otters in the Aleutian Islands, Bering Sea, and Alaska
  Peninsula. They are knowledgeable about the threats to sea otters, such as killer whales, overfishing, and climate change, and they are confident in the designation of critical habitat as a fighting chance
  for recovery.
