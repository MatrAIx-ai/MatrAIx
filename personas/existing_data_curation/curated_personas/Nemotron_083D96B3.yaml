  career_goals: She aims to transition into a leadership role within the EMS system, such as a training officer or district manager, where she can shape protocols and mentor the next generation. Leveraging
    her STEM background, she wants to develop data-driven quality-improvement initiatives for rural emergency response, integrate telemedicine tools into field care, and eventually earn a Master’s in Public
    Health to influence community health planning. She also seeks a more predictable schedule to balance family life while maintaining involvement in emergency preparedness programs.
