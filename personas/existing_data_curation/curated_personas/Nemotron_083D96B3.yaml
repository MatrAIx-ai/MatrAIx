personas:
  professional: Angie Rosario, a veteran EMT with a STEM background, excels at rapid trauma assessments, precise documentation, and data‑driven training, leveraging calm decisiveness and a structured yet
    adaptable approach to improve rural emergency response.
  sports: Angie Rosario, an avid hiker who logs weekly treks with the Lookout Mountain Trail Association and participates in the regional Appalachian Trail half‑marathon, follows the Atlanta Falcons and
    Nashville Predators from home, and maintains a modest fitness routine that prioritizes low‑impact endurance over high‑intensity gym sessions.
  arts: Angie Rosario, whose photography emulates the chiaroscuro of Ansel Adams, whose reading alternates between Octavia Butler’s sci‑fi epics and Michael Crichton’s medical thrillers, and whose knitting
    projects echo classic patterns by Jane Ann, regularly attends intimate folk concerts featuring the Avett Brothers, using these creative outlets to unwind after demanding EMS shifts.
  travel: Angie Rosario prefers low‑key, self‑planned escapes that blend solitary nature immersion with occasional cultural stops, having trekked the Great Smoky Mountains, explored Asheville’s River Arts
    District, and dreamed of photographing the remote fjords of Norway while balancing family commitments and a modest travel budget.
  culinary: Angie Rosario enjoys farm‑to‑table cooking, often tossing heirloom tomatoes, roasted beetroot, and wild mushroom medley into hearty vegetable stews, while their modest culinary skill shines
    in crafting fresh sourdough bread and simple grilled trout seasoned with rosemary and lemon, preferring quiet meals at home over noisy restaurants.
  core: Angie Rosario blends decisive EMS expertise with a quiet, garden‑tending soul, navigating high‑stress emergencies by day and solitary mountain hikes by night, all while occasionally misplacing favorite
    knitting needles and juggling a love for structured protocols with a craving for spontaneous adventure.
background:
  cultural: Angie was raised in East Tennessee, a region where Appalachian and Southern cultural currents intersect. Her family background reflects a middle‑class, white, Protestant heritage that values
    self‑reliance, community service, and modest living. Growing up, she absorbed the region’s reverence for nature, local music, and Southern cuisine, while her parents emphasized education, leading her
    to pursue a STEM degree. Although she appreciates the warmth of Southern hospitality, she gravitates toward quieter settings and finds solace in solitary pursuits. Her cultural identity blends respect
    for tradition with a pragmatic, evidence‑based mindset shaped by her scientific training and emergency‑medical career.
