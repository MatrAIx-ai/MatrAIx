personas:
  professional: Curtis Cannon is a data‑driven business analyst with mastery of Excel, Power BI, and Lean Six Sigma who channels they competitive, detail‑oriented mindset into building rigorous performance
    dashboards, leading cross‑functional process‑improvement projects, and positioning themselves as the go‑to metrics authority for senior leadership.
  sports: Curtis Cannon is a disciplined weight‑lifter who trains five days a week, competes in local 5K races to beat personal bests, they follow the Detroit Lions and Michigan State Spartans, and they
    apply strategic thinking from fantasy football to weekly lineup optimizations.
  arts: Curtis Cannon enjoys classic rock and country, listening to the Eagles, Johnny Cash, and Punch Brothers, they attend occasional community‑theater productions, and they channel their love of craftsmanship
    into restoring a 1970s pickup truck as a moving piece of kinetic art.
  travel: Curtis Cannon prefers well‑planned road trips that balance discovery with efficiency, they favor destinations like the Upper Peninsula’s Pictured Rocks, a brewery tour in Portland, Oregon, and
    a nostalgic visit to their hometown county fair, and they meticulously budget travel expenses using an Excel ledger.
  culinary: Curtis Cannon is a meticulous home‑brewer who experiments with American Pale Ale recipes using Cascade hops and caramel malt, they cook simple yet hearty meals such as grilled steak with garlic
    butter, and they maintain a well‑stocked pantry of locally sourced potatoes and seasonal greens.
  core: Curtis Cannon blends Midwestern pragmatism with competitive analytics, turning every spreadsheet, brew batch, and workout into a structured experiment, they occasionally let a coffee‑fueled late‑night
    fantasy‑football obsession derail their otherwise disciplined routine.
background:
  cultural: Curtis grew up in a middle‑class, white Midwestern family in Kent County, Michigan. His family’s roots trace back to German and Irish immigrants who settled in the region during the early 20th century,
    instilling a work‑ethic centered on reliability, self‑reliance, and community responsibility. Raised in a modest suburban environment, he participated in typical Midwestern traditions such as high‑school
    football, county fairs, and Thanksgiving gatherings, while attending a local public high school where he earned a solid grounding in practical subjects. Though not deeply religious, his upbringing was
    shaped by the values of Protestant ethics—honesty, punctuality, and modesty—without imposing rigid doctrinal expectations. This cultural backdrop emphasizes pragmatic problem solving and a preference
    for order, which aligns with his personality’s penchant for structure and predictability.
attributes:
  skills: '[''Advanced Excel (Power Query, PivotTables)'', ''Data visualization (Power BI)'', ''Lean Six Sigma Green Belt'', ''Process improvement and root‑cause analysis'', ''Project management (Agile
    & Waterfall)'', ''Risk assessment and mitigation'', ''SQL query writing'', ''Basic statistical analysis (R)'', ''Report writing and executive presentation'', ''Stakeholder communication and negotiation'']'
  hobbies: '[''Fantasy football (statistical analysis)'', ''Chess'', ''Weight‑lifting and 5K running'', ''Home‑brewing (recipe development)'', ''Classic car restoration'', ''Attending county fairs and high‑school
    football games'']'
  career_goals: Curtis aims to leverage his analytical strength into a senior leadership role within the next five years. He plans to earn a Project Management Professional (PMP) certification and deepen
    his Lean Six Sigma expertise to a Black Belt, positioning himself to lead enterprise‑wide transformation projects. His competitive drive pushes him to become the go‑to subject‑matter expert for performance‑metrics
    design and to champion a company‑wide analytics framework that standardizes reporting across departments. Long‑term, he envisions either stepping into a Director of Business Analytics position or launching
    his own boutique consulting practice focused on process optimization for mid‑size manufacturers in the Great Lakes region. Alongside these professional goals, he intends to complete an online Bachelor’s
    degree in Business Administration to solidify his academic credentials.
