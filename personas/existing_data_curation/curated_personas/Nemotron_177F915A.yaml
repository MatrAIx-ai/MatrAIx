personas:
  professional: An experienced logistics professional, Susan Pope uses three decades of commercial driving and sales expertise, a CDL, defensive‑driving precision, and route‑optimization savvy to mentor
    new drivers, shape safety policies, and craft community‑focused freight solutions, balancing curiosity for new tech tools with proven, pragmatic methods.
  sports: When not line‑dancing, Susan Pope cheers on the Detroit Lions and Grand Rapids Griffins, plays shuffleboard with friends at the senior center, and maintains stamina through brisk walks around
    Gratiot County’s historic farm trails, blending community camaraderie with low‑impact fitness.
  arts: Susan Pope shines in summer community‑theater productions, relishes embodying classic mystery heroines, devours Agatha Christie novels, enjoys folk ballads by Pete Seeger and the soulful crooning
    of Dolly Parton, and frequently visits the local gallery to admire works by regional painter Janice Lee.
  travel: Susan Pope’s travel style balances curiosity and frugality, favoring day trips to historic Michigan farms like the 1850s Kettle Farmstead, weekend cruises to Mackinac Island’s Victorian promenades,
    and organized group tours to civil‑war sites such as Gettysburg, always booking through the senior center’s travel discount program.
  culinary: Susan Pope’s kitchen blends comfort and experimentation, from classic church potluck staples like butter‑baked corn casserole and spiced apple pie to inventive heirloom tomato salads brushed
    with local honey and fresh basil, though they have a habit of sneaking an extra pinch of cinnamon into every dessert.
  core: Susan Pope is a community‑oriented logistics veteran who fuses practical road expertise with garden‑level curiosity, supports friends through line dancing and theater, and follows a disciplined
    yet occasionally indulgent approach to money and health.
background:
  cultural: Susan was raised in a small, predominantly white farming community in central Michigan, where Midwestern values of hard work, self‑reliance, and community cooperation were woven into everyday
    life. Her family’s Northern‑European roots—primarily German and Irish—instilled a respect for tradition and a practical, hands‑on approach to problem‑solving. Active participation in her local Protestant
    church and the county fair shaped her sense of belonging and reinforced the importance of helping neighbors. Today, living in Ithaca, Gratiot County, she carries forward these cultural influences through
    her dedication to reliable service, volunteerism, and the preservation of local customs.
attributes:
