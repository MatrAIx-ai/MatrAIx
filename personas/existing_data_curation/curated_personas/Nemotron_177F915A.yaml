  hobbies: '[''Community theater'', ''Line dancing'', ''Gardening'', ''Volunteer driver for local charities'', ''Cooking and baking'', ''Reading mystery novels'', ''Exploring local historical sites'']'
  career_goals: Looking ahead, Susan aims to transition into a senior logistics or safety training position where she can mentor newer drivers and help shape company policies on road safety and efficiency.
    She plans to earn an Advanced Driver Training certification and complete a short course in supply‑chain management within the next two years. Long‑term, she envisions starting a modest, family‑run freight
    service that partners with local farms and small businesses in Gratiot County, providing reliable, community‑focused transportation while securing a comfortable retirement for herself and her husband.
