  hobbies: '[''reading sci-fi and historical novels'', ''playing strategy video games'', ''sketching urban landscapes'', ''cooking traditional Mexican meals'', ''volunteering at a community tutoring center'',
    ''playing pickup soccer in small groups'']'
  career_goals: Jose plans to earn his GED within the next year and then pursue a technical certification that aligns with his interests, such as the CompTIA A+ for IT support or an automotive service technician
    program at a community college. He wants a stable job that allows him to support his family while continuing to explore his curiosity about technology and mechanics. In the longer term, he dreams of
    opening a small food‑truck business that serves authentic Mexican street food, combining his cooking skills with entrepreneurial ambition. He values career paths that offer practical results, steady
    income, and opportunities to help others in his community.
