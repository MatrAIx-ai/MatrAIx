personas:
  professional: Pamela Stem is a budding young scientist‑engineer who blends her love of LEGO building and hands‑on science kits with a methodical approach, organizing bricks by color yet flexibly improvising
    structures, turning every backyard adventure into a mini‑research project while still finding time for her favorite adventure books.
  sports: Pamela Stem kicks the ball as a forward on the neighborhood "Little Explorers" soccer team, cheering for the Seattle Sounders FC on TV, and spends Saturday afternoons biking along the cul‑de‑sac
    route to the park while collecting leaves for nature sketches, balancing teamwork with moments of solo riding.
  arts: Pamela Stem spends evenings drawing animals inspired by the works of Beatrix Potter and watching animated films by Studio Ghibli, especially "My Neighbor Totoro," while listening to audiobook adventures
    narrated by Morgan Freeman, enjoying both collaborative art sessions with friends and quiet solo sketching.
  travel: Pamela Stem loves weekend nature hikes in the nearby state forest and dreams of visiting Yellowstone National Park’s geysers, while also saving up for a family trip to Disney World where they
    can combine their love of storytelling with real‑life magic, balancing structured trips with spontaneous explorations.
  culinary: Pamela Stem prefers crunchy carrot sticks with hummus, homemade peanut‑butter‑jelly sandwiches, and the occasional slice of pepperoni pizza, often trying to "cook" a simple fruit salad with
    grapes, banana slices, and a drizzle of honey, yet secretly hides chocolate chips in their lunchbox as a guilty snack.
  core: Pamela Stem is a curious, organized seven‑year‑old who balances daring LEGO constructions and backyard experiments with a pragmatic allowance ledger, a love for soccer and sketching, and a habit
    of sneaking chocolate chips into lunch.
background:
  cultural: Pamela is raised in a white, middle‑class family in Half Way, a small town in Polk County, Missouri. Her upbringing reflects Midwestern values of community participation, respect for nature,
    and a strong emphasis on school involvement. Family traditions include attending local fairs, celebrating holidays with church gatherings and community potlucks, and taking weekend trips to nearby state
    parks. The regional culture encourages politeness, self‑reliance, and a practical approach to everyday tasks, which aligns with Pamela’s balanced curiosity and practicality.
