  career_goals: She dreams of becoming a wildlife veterinarian or an astronaut, roles that let her explore the natural world and solve real‑world problems. At the same time, she imagines helping others
    by becoming a teacher, reflecting her practical desire to share knowledge. Her goals are shaped by her curiosity about animals and space, balanced with a wish to make a tangible difference in her community.
