persona_description: A developmental psychologist who studies the early stages of sleep and its development in infants, focusing on the mechanisms of autonomous sleep resettling and the role of environmental
  factors in supporting these processes. The person is interested in the implications of these findings for the diagnosis and treatment of sleep problems in healthy infants and for understanding the underlying
  mechanisms of sleep development in early childhood.
