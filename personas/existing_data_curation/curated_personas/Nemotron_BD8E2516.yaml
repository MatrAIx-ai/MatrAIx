  career_goals: Bonnie Lynne dreams of becoming an elementary school teacher who creates a structured, nurturing environment for young learners. She envisions earning a degree in education, gaining experience
    as a teaching assistant, and eventually returning to her hometown to teach at the local school. Her long‑term ambition includes developing after‑school programs that combine academic support with extracurricular
    activities, ensuring all students have access to both learning and community engagement.
