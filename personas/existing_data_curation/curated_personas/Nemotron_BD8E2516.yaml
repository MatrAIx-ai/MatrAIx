personas:
  professional: Bonnie Dougherty is an aspiring youth leader who channels her love of structure, teamwork, and kindness into coordinating school club events and neighborhood volunteer projects, balancing
    her practical mindset with creative problem‑solving.
  sports: Bonnie Dougherty is a dedicated midfielder on the middle school soccer team, a cheerleader who thrives on group chants, a frequent hiker of nearby state parks, and a fan of the local professional
    soccer club City United FC and the state’s high‑school basketball team, balancing structured training with spontaneous weekend pick‑up games.
  arts: Bonnie Dougherty plays the flute in the school orchestra, devours mystery novels by Agatha Christie and Sarah J. Maas, crafts friendship bracelets while listening to indie pop artist Clairo, and
    enjoys watching live performances by the local youth theater troupe, letting those creative outlets shape their sense of narrative and rhythm.
  travel: Bonnie Dougherty prefers organized, short‑term trips that fit school breaks, such as weekend camping in Whispering Pines State Park, a family road‑trip to Washington, D.C. to see the Smithsonian,
    and a summer exchange program to visit historic Savannah, Georgia, balancing the excitement of new scenery with a carefully planned bullet‑journal itinerary.
  culinary: Bonnie Dougherty loves baking chocolate chip cookies and lemon blueberry cupcakes with a dash of cinnamon, experimenting with bright sprinkles and frosting designs, while relying on easy‑mix
    packages for convenience but occasionally attempting to perfect a homemade pretzel dough during after‑school craft sessions.
  core: Bonnie Dougherty blends a love of organized teamwork, mystery storytelling, and sugary treats into a lively, dependable teen who balances structured plans with spontaneous bursts of creativity.
background:
  cultural: Bonnie Lynne grew up in Piedmont, a close‑knit town in Anderson County, South Carolina. Her family is part of the region’s longstanding white community, with deep ties to local traditions such
    as attending a Southern Baptist church, celebrating holidays with Southern cuisine like fried chicken and sweet tea, and participating in the annual county fair. The community’s emphasis on hospitality,
    respect, and neighborly support shaped her values of kindness, cooperation, and harmony. Growing up in a suburban‑rural environment also fostered her appreciation for outdoor activities, church‑based
    service, and the strong sense of community that characterizes the Lowcountry and Upstate regions of South Carolina.
