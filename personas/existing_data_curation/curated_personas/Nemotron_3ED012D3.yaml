  hobbies: '[''Attending Mexican cultural festivals'', ''Salsa and cumbia dancing'', ''Soccer fandom (Liga MX, MLS)'', ''Sketching and street photography'', ''Backyard gardening (tomatoes, chilies, herbs)'',
    ''Cooking workshops and recipe sharing'', ''Volunteering at senior center (bingo, crafts)'', ''Reading historical fiction'', ''Listening to art and social change podcasts'']'
  career_goals: Carlos wants to formalize his education by earning a GED and later taking community‑college courses in sustainable gardening and small‑business management. He envisions creating a community
    garden that supplies fresh produce to seniors and low‑income families in Salinas, and running a weekly cooking workshop at the local community center where he shares traditional Mexican recipes adapted
    to locally grown ingredients. He also hopes to curate a small exhibition of his photographs and sketches that celebrate the cultural life of Salinas’s Latino community. Ultimately, he aims to be recognized
    as a mentor and cultural ambassador who links generations, preserves heritage, and promotes healthful, community‑driven initiatives.
