personas:
  professional: Joan Diaz, a 32-year-old fabricator with solid mechanical assembly and welding expertise, leverages their curiosity and love for unconventional thinking to devise creative workflow improvements,
    while navigating a relaxed approach to deadlines and a tendency toward disorganization as they pursue a shift supervisor role and a side workshop for custom metal art.
  sports: Joan Diaz enjoys seasonal hiking in the Catskills during spring and fall, joins a local weekend climbing group at the Shawangunks, follows the New York Knicks and New York Giants for basketball
    and football, and occasionally participates in a community running club’s 5K races, reflecting a preference for low-key, nature-focused fitness.
  arts: Joan Diaz immerses themselves in the Hudson Valley art scene by frequenting the Dia:Beacon, sketching watercolors of the Hudson River, collecting vintage hand tools as artistic objects, and listening
    to indie folk musicians such as Sufjan Stevens, Iron & Wine, and The Milk Carton Kids while they experiment with mixed-media canvases.
  travel: Joan Diaz prefers spontaneous weekend getaways, having explored the Finger Lakes wine region, trekked Acadia National Park, and taken a short train ride to New York City for gallery openings,
    while dreaming of a creative retreat in Asheville’s craft-focused community and a historic tour of Edinburgh’s medieval castles.
  culinary: Joan Diaz enjoys experimental baking, often adding matcha powder to shortbread, lavender to lemon bars, and miso to caramel sauces, while cooking farm-to-table meals like roasted beet and goat-cheese
    salad, and they consider themselves an intermediate home chef who occasionally over-bakes out of sheer curiosity.
  core: Joan Diaz blends a hands-on fabricator’s precision with an artist’s curiosity, juggling a flexible work ethic, occasional disorganization, and a love for DIY projects, hiking, and experimental baking
    while dreaming of a metal-art workshop.
background:
  cultural: Joan grew up in a modest, middle‑class white family in upstate New York’s small‑town environment. Her upbringing combined rural self‑reliance with the cultural vibrancy of the Hudson Valley,
    where community fairs, local churches, and seasonal celebrations such as Thanksgiving and Christmas play central roles. Exposure to the region’s artisan traditions—folk craft fairs, woodworking workshops,
    and a thriving gallery scene—shaped her appreciation for art and handmade objects. While she values independence and practicality, she also embraces the community‑oriented spirit of her hometown, which
    emphasizes modesty, cooperation, and a strong work ethic.
attributes:
  skills: '["Assembly line operations", "Mechanical troubleshooting", "MIG/TIG welding", "Basic CNC machining", "Technical drawing interpretation", "OSHA safety compliance", "Quality control and inspection",
    "Inventory management", "Creative problem solving", "DIY carpentry"]'
  hobbies: '["Visiting art galleries", "Sketching and watercolor painting", "DIY home improvement projects", "Hiking in the Catskills", "Reading contemporary fiction and sci‑fi", "Baking experimental recipes",
    "Small‑group board‑game nights", "Collecting vintage hand tools", "Listening to indie folk music"]'
  career_goals: Joan aims to advance from a fabricator to a shift supervisor within the next three to five years, gaining a welding certification and a journeyman-level credential in industrial fabrication.
    She plans to enroll in a community‑college program for industrial technology to broaden her technical knowledge and eventually take on a role that blends production oversight with design input. In parallel,
    she dreams of launching a small side workshop where she can create custom metal art and handcrafted furniture, allowing her to merge her technical expertise with her love of artistic expression while
    preserving a flexible schedule for family and personal interests.
