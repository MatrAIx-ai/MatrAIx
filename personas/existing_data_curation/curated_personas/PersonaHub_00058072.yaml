  of value, and how they compare to other forms of money such as government-issued paper money. They are interested in the potential benefits of using these metals as a store of value and as a means of
  payment, as well as the potential drawbacks and risks associated with investing in these metals. They are also interested in the potential for the metals to be used as a means of payment and as a store
  of value in a return to a system of real-world money.
