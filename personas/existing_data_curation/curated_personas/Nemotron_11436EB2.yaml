personas:
  professional: Minnie Mcmillian is an organized community arts coordinator and self‑taught abstract painter whose meticulous planning and methodical budgeting enable her to stage neighborhood craft fairs,
    curate a personal online gallery, and mentor emerging artists while weaving the storytelling cadence of her Southern upbringing into every brushstroke.
  sports: Minnie Mcmillian enjoys low‑impact cardio by strolling the trails of Hot Springs National Park, participates in the local Hot Springs Trail Walkers club, and cheerfully follows the Arkansas Razorbacks
    basketball team and St. Louis Cardinals baseball, while occasionally joining a senior yoga class for flexibility.
  arts: Minnie Mcmillian is a passionate abstract watercolor and acrylic painter who draws inspiration from the bold colors of Georgia O'Keeffe, the emotive blues of B.B. King, and the lyrical poetry of
    Maya Angelou, regularly attending intimate community storytelling circles and jazz evenings at the historic Bathhouse.
  travel: Minnie Mcmillian prefers carefully planned road trips that blend cultural immersion with nature, having explored New Orleans’ jazz scene, Nashville’s songwriting workshops, and the Great Smoky
    Mountains, while dreaming of a solo pilgrimage to Sedona’s red rocks for artistic renewal.
  culinary: Minnie Mcmillian is an inventive home chef who elevates Southern classics like fried catfish and collard greens with garden‑fresh herbs such as basil, lemon balm, and pepper leaf, whips up a
    signature gumbo with locally sourced okra, and delights in perfecting a sweet‑tea glaze, though she habitually adds an extra splash of hot sauce.
  core: Minnie Mcmillian blends meticulous organization with boundless imagination, turning her love of nature, heritage storytelling, and abstract art into community‑focused projects while navigating the
    quirks of a modest retirement.
background:
  cultural: 'Minnie is a Black woman who grew up in the Arkansas Delta and has spent most of her adult life in Hot Springs. Her cultural identity is shaped by the rich traditions of Southern African‑American
    communities: gospel music that filled church pews, the storytelling cadence of family reunions, and the culinary heritage of soul food infused with locally foraged herbs. The legacy of the civil‑rights
    movement and the historic Black neighborhoods of Hot Springs inform her sense of resilience and communal responsibility. She carries forward the craft traditions of quilting and folk art, while also
    embracing contemporary abstract expression. Minnie’s connection to the natural landscape of the national park intertwines with her cultural roots, fostering a deep appreciation for both the ecological
    and historical narratives of the region.'
attributes:
  skills: '["abstract watercolor painting", "acrylic painting", "landscape photography", "digital photo editing", "event planning and coordination", "community workshop facilitation", "herb garden design",
