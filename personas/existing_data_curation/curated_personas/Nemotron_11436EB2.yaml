  hobbies: '["abstract painting", "landscape photography", "creative writing/poetry", "herb gardening", "birdwatching", "vintage postcard collecting", "historical genealogy research", "cooking Southern
    cuisine", "listening to jazz and gospel music", "attending small community art gatherings"]'
  career_goals: Although she is not currently employed, Minnie aims to create a public exhibition of her abstract series that integrates mixed‑media installations with digital storytelling, showcasing the
    intersection of nature and imagination. She aspires to write and publish a memoir that chronicles her family’s journey from the Great Migration to present‑day Arkansas, preserving cultural memory for
    younger generations. Minnie also plans to establish a lasting community herb garden that serves as an educational hub for sustainable gardening and local culinary traditions. Additionally, she hopes
    to mentor emerging artists in her neighborhood, leading small‑group workshops that blend technique with creative exploration, and to develop an online resource that guides others in genealogical research
    and heritage storytelling.
