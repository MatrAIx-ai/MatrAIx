  hobbies: '[''Visiting art museums and galleries'', ''Painting and sketching'', ''Reading contemporary fiction and non-fiction'', ''Yoga and solo hiking'', ''Cooking Mexican and fusion dishes'', ''Financial
    literacy volunteering'', ''Bilingual book club participation'', ''Traveling to culturally historic sites'']'
  career_goals: Ariel aims to advance to chief financial officer within the next five years, driving sustainable growth and integrating socially responsible financial practices. She intends to obtain CFA
    and CPA certifications, lead cross-functional strategic initiatives that align financial performance with community impact, and eventually launch a boutique financial consultancy serving Hispanic-owned
    small businesses in the Midwest. She also aspires to mentor emerging women professionals in finance and champion diversity, equity, and inclusion programs.
