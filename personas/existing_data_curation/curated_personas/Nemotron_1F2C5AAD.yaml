  hobbies: '[''Hiking and coastal walking'', ''Spoken-word poetry open-mic events'', ''Cooking Mexican dishes'', ''Salsa dancing'', ''Reading contemporary fiction and philosophy'', ''Sustainable crafts
    workshops'']'
  career_goals: Carmen aims to transition from a floor assembler to a supervisory role within the next three years, leveraging her hands-on expertise and communication strengths to lead a production team.
    She aspires to become a process improvement specialist, integrating her curiosity for new technologies with practical solutions to boost efficiency and reduce waste. In the longer term, she envisions
    moving into product design or user experience, where her humanities education and design sensibility can shape more user-friendly products. She also hopes to develop better organizational habits to
    manage stress and enhance her leadership effectiveness.
