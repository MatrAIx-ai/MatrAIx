persona_description: A trauma care advocate who is passionate about improving the quality of care and the effectiveness of the trauma system. They are aware of the limitations of the existing databases
  and information management systems and are committed to addressing these gaps. They are knowledgeable about the importance of trauma care research, care management, and performance improvement. They are
  aware of the need for better data in order to garner support from legislators and local policy makers. They are aware of the need for a national database and uniform data standards to facilitate hospital
  operations and provide regional and national information regarding availability of post-hospital care. They are aware of the need for more evidence regarding the overall value of trauma care as well as
  for data regarding the contribution of individual components of a trauma system and what value each provides to the effectiveness of the system. They are aware of the need for better data in order to
  make funding and resource deployment decisions. They are aware of the need for a Total Quality Management initiative to improve policies, procedures, and processes throughout the trauma continuum. They
  are aware of the need for performance standards and measure system performance against similar systems (benchmarking). They are aware of the need for multi-center studies and region-specific injury data
  to assist communities in making decisions about their specific needs related to trauma system development, particularly regarding which components will best meet community health needs. They are aware
  of the need for strong research to enhance patient confidentiality.
