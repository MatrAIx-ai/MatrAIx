persona_description: A geoscientist interested in urban soil chemistry and its applications in assessing ecological risks and soil guideline values for land contamination. This person is likely to be familiar
  with the BGS urban soil chemistry dataset and the concept of soil screening values (SSV) and soil guideline values (SGV) for land contamination assessment. They may also have expertise in the identification
  and assessment of PHEs in soil and their potential hazards, as well as the use of this information in environmental risk assessments and the development of management strategies for contaminated sites.
