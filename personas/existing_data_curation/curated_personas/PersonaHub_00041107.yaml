persona_description: A researcher or educator who is interested in the impact of education programs and initiatives on student learning and the role of cultural and social factors in educational outcomes.
  They are particularly interested in the work of the Te Kotahitanga project and its focus on reducing educational disparities between indigenous Māori students and their non-Māori peers in New Zealand
  secondary schools. They are interested in the empirical verification of the project's pedagogical premises and the analysis of the validity of the data gathered during the professional development process.
  They are likely to be familiar with the concept of whanaungatanga, the Māori term for extended family relationships, and its significance in the project's research. They are also likely to have experience
  in conducting research and analyzing data, and may have a background in education or social sciences.
