personas:
  professional: Eliane Casacuberta, an aspiring junior robotics programmer and LEGO architect, channels a methodical curiosity and competitive streak into designing Scratch games and building precise LEGO
    mechanisms, while they keep detailed project logs and adhere to self‑set deadlines.
  sports: Eliane Casacuberta follows the San Antonio Spurs and San Antonio FC with enthusiasm, runs weekly fitness breaks during robotics club, swims competitively on the middle school’s winter swim team,
    and plays forward for the U12 San Antonio Youth Soccer League in the spring, prioritizing disciplined practice over casual play.
  arts: Eliane Casacuberta indulges in sci‑fi classics by Isaac Asimov and Ursula K. Le Guin, sketches pixel art for Scratch projects, builds intricate LEGO sculptures as creative expression, sways to the
    lively trumpets of Mariachi Vargas de Tecalitlán while preparing family meals, and occasionally attends the Brandywine Players’ community theater, finding inspiration in the works of composer Hans Zimmer.
  travel: Eliane Casacuberta prefers meticulously planned family road trips that blend learning and leisure, having explored the Space Center Houston and San Francisco’s Exploratorium, dreaming of attending
    the Tokyo Robotics Expo in Japan, and balances these ambitions with a modest travel budget that limits international voyages to occasional summer vacations.
  culinary: Eliane Casacuberta enjoys assisting with family meals like hand‑rolled tamales and aromatic mole sauce made from corn masa, dried chilies, chocolate, and cumin, relishes fresh salsa verde with
    tomatillos and cilantro, and while their cooking skill is budding, they meticulously follow recipes and set kitchen timers, even if the kitchen ends up a bit chaotic.
  core: Eliane Casacuberta is a methodically curious, competitively spirited 12‑year‑old who balances solitary puzzle‑solving and coding with family‑centered cooking and mariachi music, all while they keep
    a tidy schedule that sometimes slips on dental appointments.
background:
  cultural: Eliane grew up in Hidalgo, Texas, a vibrant border community with strong Mexican roots. Her family maintains Mexican traditions, including Día de los Muertos celebrations, singing regional songs,
    and preparing dishes like tamales and pozole with her grandmother. She is raised bilingual, speaking Spanish at home and English at school, which enriches her cultural perspective. The close‑knit nature
    of the Hispanic community, combined with the agricultural and cross‑border commerce of Hidalgo County, influences her sense of responsibility and desire to give back. She values the emphasis on family,
    respect, and hard work that are hallmarks of her Mexican heritage.
attributes:
  skills: '[''Critical thinking'', ''Basic coding (Scratch)'', ''Bilingual communication (Spanish/English)'', ''Project planning and organization'', ''Chess strategy'', ''LEGO and basic electronics construction'']'
  hobbies: '[''Reading science‑fiction novels'', ''Playing chess'', ''Coding with Scratch'', ''Building LEGO models'', ''Robotics club projects'', ''Cooking traditional Mexican dishes'', ''Listening to
    mariachi music'', ''Folkloric dance practice'']'
  career_goals: Eliane aspires to a future in STEM, particularly engineering. She dreams of becoming a robotics or mechanical engineer who designs sustainable technologies for her border community, blending
    her curiosity with practical solutions. She aims to compete in science fairs and robotics competitions, and later hopes to mentor other young girls in tech, fostering confidence and competence. In the
    long term she envisions attending a university with a strong engineering program, possibly studying aerospace or civil engineering, and contributing to cross‑border infrastructure projects that improve
    daily life for families like hers.
