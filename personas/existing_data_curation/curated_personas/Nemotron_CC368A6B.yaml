personas:
  professional: Yezenia Llano, a 34-year-old facilities technician with a flair for hands-on problem solving, blends expertise in HVAC, plumbing, and carpentry with a passion for sustainable retrofits,
    and they aim to earn a certified facilities manager credential while eventually launching an eco-friendly home-repair and upcycled-furniture studio.
  sports: Yezenia Llano enjoys cruising Houston's Buffalo Bayou Trail on their commuter bike, follows the Houston Dynamo soccer team, and participates in a local weekend pick-up volleyball league, preferring
    low-impact, social activities that keep them moving without demanding rigid training schedules.
  arts: Yezenia Llano immerses themselves in Houston's street-art scene, drawing inspiration from vibrant murals by Shepard Fairey and the whimsical alebrijes of local artisans, while they refine their
    own craft at upcycling workshops, strum acoustic guitar to the tunes of The Lumineers, and curate a modest collection of papel picado for home décor.
  travel: Yezenia Llano favors spontaneous road trips to the Texas Hill Country's vineyards and weekend getaways to Oaxaca's Dia de los Muertos celebrations, blending cultural immersion with budget-friendly
    drives, though they occasionally splurge on a flight to San Francisco for a design conference that fuels their sustainability aspirations.
  culinary: Yezenia Llano expertly prepares classic pozole and chiles en nogada, experiments with sushi-taco fusions, and hand-picks fresh cilantro, tomatillos, and ancho chiles at the local farmer's market,
    turning their balcony garden's heirloom tomatillos into nightly dinner stars for friends and family.
  core: Yezenia Llano is a curious, art-loving maintenance guru who transforms everyday repairs into sustainable creations, often juggling deadlines with a habit of misplacing their keys but never misplacing
    their enthusiasm for community festivals.
background:
  cultural: Yezenia is the daughter of Mexican immigrants and grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Mexican traditions,
    celebrating holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with festive foods, music, and rituals. She retains a deep appreciation for Mexican folk art, especially alebrijes and papel
    picado, which influences her aesthetic sensibility in both her work and hobbies. Although she lives in Houston’s multicultural environment, she stays connected to the local Mexican community through
    church gatherings, community centers, and neighborhood festivals, and often shares her cultural cuisine and stories with friends from diverse backgrounds.
attributes:
  skills: '["mechanical troubleshooting", "electrical repair", "plumbing maintenance", "HVAC inspection", "basic carpentry", "welding basics", "preventive maintenance planning", "technical blueprint reading",
    "OSHA safety compliance", "vendor coordination", "DIY upcycling and creative repairs"]'
  hobbies: '["street‑art exploration", "gallery visits", "upcycling craft workshops", "cooking Mexican cuisine", "fusion cooking experiments", "acoustic guitar playing", "gardening", "bicycle riding", "reading
    sci‑fi and design magazines", "participating in cultural festivals"]'
  career_goals: Yezenia aims to earn a certified facilities manager credential and eventually move into a supervisory role overseeing a team of maintenance technicians. She hopes to specialize in sustainable
    building practices, incorporating energy‑saving retrofits and green technologies into the facilities she manages. In the longer term she envisions launching her own small business that offers eco‑friendly
    home repairs and custom upcycled furniture, blending her technical skill set with her love for art and creative problem solving. Continuing education through night courses and industry workshops is
    part of her plan, as is mentoring newer workers in the field.
