  career_goals: Alany aims to transition into senior leadership, ideally as Director of Engineering or Chief Innovation Officer, where she can champion large‑scale sustainable projects that integrate art
    and technology. She plans to obtain her Professional Engineer (PE) license and spearhead interdisciplinary initiatives that reshape Miami’s urban landscape with interactive public installations. A key
    ambition is to establish a mentorship program that supports underrepresented Cuban‑American women in STEM, fostering diversity and empowerment. She also envisions launching a boutique consultancy that
    merges engineering precision with creative design, allowing her to explore novel concepts while maintaining a stable, impactful career trajectory.
