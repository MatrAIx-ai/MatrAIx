personas:
  professional: Alany Nichols is a seasoned mechanical and systems engineer who blends rigorous CAD modeling, data analytics, and sustainable product development with a flair for artistic design, and they
    lead cross‑functional multicultural teams while methodically steering complex smart‑city projects toward innovative, user‑centric outcomes.
  sports: Alany Nichols enjoys staying active through salsa dancing classes at the community center, regular yoga sessions at a local studio, and joining the Miami Running Club for weekend 5K runs, and
    they cheer on the Miami Heat and Miami Marlins while playing occasional tennis at the Coral Gables Country Club.
  arts: Alany Nichols immerses themselves in the Miami art scene, regularly attending exhibitions at PAMM featuring works by Mark Rothko and Yayoi Kusama, and they draw inspiration from the bold color fields
    of Rothko for their abstract canvases while listening to pioneering musicians such as Brian Eno and Nina Simone during their painting sessions.
  travel: Alany Nichols prefers thoughtfully planned trips that combine cultural immersion with sustainable experiences, they have explored the historic streets of Cartagena, the vibrant markets of Lisbon,
    and the tropical ecosystems of Costa Rica, while they dream of a future visit to Kyoto's Zen gardens and Barcelona's Gaudí architecture.
  culinary: Alany Nichols enjoys cooking at an advanced level, they frequently prepare citrus‑garlic marinated pork, crispy plantain chips, and herb‑infused yucca using tropical herbs such as cilantro,
    oregano, and epazote, and they delight in pairing these dishes with a chilled glass of white Rioja while hosting intimate dinner gatherings.
  core: Alany Nichols is a methodical yet imaginative engineer who channels competitive drive and creative curiosity into sustainable urban innovations, and they juggle a vibrant artistic life, meticulous
    budgeting, and a constant battle with anxiety‑induced overthinking.
background:
  cultural: Alany’s Cuban heritage is a cornerstone of her identity, deeply rooted in Miami’s vibrant Cuban‑American community. She grew up bilingual, celebrating traditions such as música cubana, Santería
    festivals, and family gatherings centered around shared meals. This cultural immersion nurtured her love for rhythmic movement, vivid colors, and communal storytelling, which now influence her artistic
    hobbies and collaborative work style. The diaspora experience instilled resilience and a strong sense of pride, motivating her to give back to the community through mentorship and cultural advocacy.
    Her background also informs her nuanced perspective on diversity, inclusion, and the importance of preserving cultural narratives within technological innovation.
