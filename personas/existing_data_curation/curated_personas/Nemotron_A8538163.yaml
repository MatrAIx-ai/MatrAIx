personas:
  professional: Yen Vo, a seasoned operations manager with a flair for abstract strategy, blends rigorous market analysis, vendor negotiation, and cross‑functional coordination with a calm, imaginative
    approach that often translates complex data into unconventional business solutions.
  sports: Yen Vo, a solo hiker who explores the trails of Flushing Meadows and Forest Park each weekend with the Queens Trails Hiking Club, follows the New York Knicks and New York Mets with a critical
    eye, and occasionally joins pick‑up soccer games at a community field to keep a competitive edge, though they rarely commit to a regular gym routine.
  arts: Yen Vo, an abstract painter inspired by Mark Rothko’s color fields and James Turrell’s light installations, curates a monthly photo series capturing the cracked brick facades of Queens streets,
    contributes introspective prose to the zine 'Liminal', and regularly attends indie screenings of films like 'Eraserhead' and performances by experimental musician Kaitlyn Aurelia Smith, all while sipping
    espresso at local coffee houses to discuss the theories of contemporary art critic Rosalind Krauss.
  travel: Yen Vo plans trips like strategic operations, designing solo itineraries that blend structured art‑history tours of Kyoto’s Gion district with spontaneous photo expeditions across Iceland’s black
    sand beaches, prefers boutique guesthouses over chain hotels, and, despite a hectic managerial schedule, carves out quarterly escapes to the Hudson Valley’s historic farms or Manhattan’s underground
    gallery scene.
  culinary: Yen Vo, a confident home chef, reimagines classic bánh mì by layering miso‑marinated pork, pickled daikon, and fresh cilantro on a crusty baguette, experiments with pho broth clarified through
    sous‑vide chicken infused with lemongrass foam, pairs these creations with a glass of natural Riesling, and occasionally dines at the avant‑garde restaurant Contra in the East Village to sample deconstructed
    sushi rolls, all while favoring ingredients like star anise, kaffir lime, and sriracha.
  core: Yen Vo, a 45‑year‑old operations strategist who channels an abstract artist’s imagination into boardroom tactics, thrives on solitary hikes and late‑night experimental photography, yet habitually
    forgets to file expense receipts, and maintains an unshakable calm that makes anxiety seem like a foreign concept.
background:
  cultural: Yen Vo is a first‑generation Vietnamese‑American. She grew up in a bilingual household in Queens, celebrating traditional festivals such as Tết (Lunar New Year) and Mid‑Autumn Festival while
    also embracing the multicultural fabric of New York City. Her parents instilled values of perseverance and respect for elders, but Yen's independent and competitive nature led her to chart her own path.
    She maintains strong ties to the Vietnamese diaspora community, volunteering at cultural events and supporting local refugee aid initiatives. Fluent in Vietnamese and English, she often incorporates
    subtle cultural motifs into her artistic projects, blending heritage with contemporary influences.
