  career_goals: Yen aims to transition from her current managerial role to a senior leadership position that rewards innovative thinking and offers autonomy—such as Director of Innovation or Operations
    Lead in a creative‑focused enterprise. She aspires to be recognized as a top performer within her district, earning accolades like "Manager of the Year" and mentoring emerging talent, especially women
    of Asian heritage. Long‑term, she envisions launching a boutique consultancy that merges business strategy with artistic design, or establishing a community arts hub in Queens that showcases emerging
    Asian‑American creators while providing entrepreneurship workshops for immigrant families. To support these ambitions, she plans to pursue a professional certification (e.g., PMP) and occasional night‑course
    studies in design thinking.
