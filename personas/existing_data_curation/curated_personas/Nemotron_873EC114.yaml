personas:
  professional: Liliana Hernandez is a pint‑sized classroom organizer who loves arranging crayons by color and leading line‑ups at preschool, channeling their meticulous discipline and competitive drive
    into early learning leadership.
  sports: Liliana Hernandez is a budding soccer enthusiast playing for the Chicago Cubs Kids Soccer Academy (U‑5), cheering on the Chicago Cubs and Chicago Bulls on family game nights, and regularly attending
    swim lessons at the neighborhood community pool, where they love the competitive splash of racing against peers.
  arts: Liliana Hernandez revels in drawing bright crayon pictures inspired by Disney’s Frozen, dancing along to the upbeat tunes of The Wiggles, and humming the piano melodies of Alicia Keys during family
    sing‑alongs, weaving these artistic cues into their daily playtime.
  travel: Liliana Hernandez loves family road trips to the beach in Santa Monica, weekend visits to Disneyland’s Magic Kingdom, and dreaming about seeing the Eiffel Tower someday, and they prefer well‑planned
    itineraries with plenty of play stops and colorful souvenirs.
  culinary: Liliana Hernandez enjoys the classic crunch of chicken nuggets with honey‑mustard dip, the cheesy comfort of homemade macaroni and cheese, and helping stir batter for banana‑strawberry pancakes,
    often sprinkling extra cinnamon on their fruit smoothies for an extra burst of flavor.
  core: Liliana Hernandez blends boundless curiosity, razor‑sharp organization, a competitive spark, and a love for vivid colors into a lively, disciplined, and creatively adventurous daily life, and they
    approach each new challenge with a playful, methodical spirit.
background:
  cultural: Liliana is a first-generation Mexican American growing up in Las Vegas, New Mexico, a small town with a strong Hispanic community. Her household speaks both Spanish and English, and family gatherings
    celebrate traditions such as Día de los Muertos, Las Posadas, and quinceañera preparations. She enjoys the bright colors and patterns of Mexican folk art, which inspire her drawings, and she participates
    in community events featuring música tradicional, folklorico dances, and home‑cooked dishes like tamales and pozole. The close‑knit family values emphasize respect for elders, the importance of education,
    and a disciplined approach to daily routines, all of which shape Liliana’s organized and achievement‑focused personality.
