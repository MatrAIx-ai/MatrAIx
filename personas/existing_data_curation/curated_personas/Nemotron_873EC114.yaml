  career_goals: Even at five, Liliana has vivid dreams about her future. She hopes to become a teacher who can share stories and art with children, an artist who paints colorful murals that reflect her
    Mexican heritage, or a veterinarian who cares for animals she loves. She is driven to be the top student in her class, win art contests, and one day lead community projects that celebrate culture and
    education. Her competitive spirit fuels a desire to achieve high standards in whatever path she chooses.
