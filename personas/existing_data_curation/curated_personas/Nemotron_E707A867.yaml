  hobbies: '[''Fly fishing'', ''Hiking in the Appalachian foothills'', ''Reading mystery and thriller novels'', ''Playing acoustic guitar'', ''Volunteering as church treasurer'', ''Cooking barbecue for
    family and community events'', ''Attending local high‑school basketball games'', ''Homebrewing craft beer occasionally'']'
  career_goals: Daniel aims to become a Certified Public Accountant (CPA) within the next two years, using the credential to advance to a senior auditor position at his firm. He aspires to eventually move
    into a managerial role, overseeing audit teams and mentoring junior staff, while maintaining a balanced workload that minimizes chronic stress. In the longer term, he envisions either stepping into
    a CFO role for a growing local manufacturing company or establishing a boutique accounting practice that serves the small‑town community of Flemingsburg, allowing him to combine his professional expertise
    with his desire to contribute to local economic stability.
