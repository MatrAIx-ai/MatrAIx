persona_description: A cyborg anthropologist who studies human-computer interactions and digital networks. They are interested in the cultural production of human distinctiveness, privacy, personal data,
  social networks, and the use of smart devices and wearables in people's lives. They are curious about how people perceive and interact with technology, and how their use of digital devices affects their
  values, communication, and social relationships. They are open to exploring the related discipline of ethnography and applying it to their research. They are interested in the impact of technology on
  society, particularly in the era of disinformation and harmful conspiracy theories. They are skilled in digital ethnography, the process and methodology of doing ethnographic research in a digital space,
  and have a unique perspective on the environment they study.
