  career_goals: Looking ahead, Patricia aims to transition from full‑time roofing work to a mentorship and consulting role that leverages her decades of experience. She plans to obtain a certified roof
    inspector license and to develop a small family‑run roofing consultancy that focuses on safety, quality, and personalized service for the Bay Shore community. By training apprentices and offering inspection
    services, she hopes to secure a stable income for retirement while maintaining a sense of purpose. Balancing her desire for structured work with occasional creative restoration projects, she also wants
    to reduce work‑related stress by setting clearer boundaries and delegating more tasks.
