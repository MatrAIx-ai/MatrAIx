personas:
  professional: Lorna Holloway, a seasoned ATM and office equipment technician, leverages meticulous record-keeping, strict safety protocols, and calm customer communication to diagnose hardware faults
    and mentor junior staff while pursuing Certified ATM Technician and CompTIA A+ certifications.
  sports: Lorna Holloway hits the nearby Pine Ridge Trail every weekend for moderate hikes, cheers on the River City Rovers baseball team from the bleachers, and joins the local walking club that meets
    thrice a month, which helps them keep a steady step count and relieve stress.
  arts: Lorna Holloway spends evenings knitting intricate Fair Isle patterns while listening to the soothing piano works of Ludovico Einaudi, enjoys quilting inspired by the geometric designs of Agnes Martin,
    and solves New York Times crosswords, satisfying their methodical creativity and providing a quiet artistic outlet.
  travel: Lorna Holloway plans vacations with a detailed itinerary, favoring short road trips to nearby state parks such as Shenandoah Valley and occasional overseas garden tours in the Cotswolds, England,
    where they can combine their love of horticulture and quiet reflection, though they often postpone longer journeys due to work commitments.
  culinary: Lorna Holloway delights in preparing farm-to-table meals such as roasted beet and carrot salad with goat cheese, hearty lentil soup seasoned with rosemary from their garden, and baking a classic
    apple crumble on weekends, while they occasionally indulge in a slice of rich chocolate cake as a stress-relief treat.
  core: Lorna Holloway is a meticulous, compassion-driven technician who balances structured problem-solving with garden-to-table creativity, yet they worry about stress and can be stubbornly resistant
    to spontaneous change.
background:
  cultural: Lorna is a white Midwesterner raised in a small‑town environment near Festus, Missouri. Her upbringing emphasized hard work, self‑reliance, and community involvement, values common in the region’s
    Anglo‑American heritage. She grew up in a modest, middle‑class family where practical skills and dependable character were prized. The local culture, shaped by a blend of Protestant traditions and a
    strong sense of neighborhood solidarity, has instilled in her a cooperative spirit and a desire to contribute positively to her community.
attributes:
  skills: '[''ATM hardware diagnostics and repair'', ''Office copier and printer maintenance'', ''Electrical circuit troubleshooting'', ''Network connectivity configuration for banking equipment'', ''Preventive
