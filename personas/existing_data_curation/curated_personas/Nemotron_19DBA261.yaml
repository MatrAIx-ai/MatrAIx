    optimization'', ''Basic soldering and PCB repair'', ''Software and firmware updates'']'
  hobbies: '[''Vegetable gardening'', ''Knitting and quilting'', ''Crossword puzzles'', ''Sudoku'', ''Hiking on local trails'', ''Volunteering at the community food bank'', ''Participating in church outreach
    activities'']'
  career_goals: Lorna aims to obtain advanced certifications such as the Certified ATM Technician credential and a CompTIA A+ certification to deepen her technical expertise. She aspires to advance to a
    senior technician or lead‑technician role, where she can mentor newer staff and oversee a small team of repair specialists. In the longer term, she is interested in starting her own modest service business
    that provides reliable, community‑focused equipment maintenance, allowing her to maintain a predictable schedule and reduce workplace stress.
