personas:
  professional: Rebecca Bergman is a veteran dental and ophthalmic laboratory technician transitioning to part‑time consultancy, leveraging three decades of CAD/CAM expertise, meticulous documentation habits,
    and a curious drive to stay ahead of digital dentistry trends while mentoring apprentices with disciplined kindness.
  sports: Rebecca Bergman enjoys low‑impact fitness through morning walks in Greensboro’s Arboretum, follows the Greensboro Grasshoppers baseball team and the Carolina Hurricanes with seasonal enthusiasm,
    participates in a community senior tennis league, and practices gentle yoga twice a week to maintain flexibility.
  arts: Rebecca Bergman immerses herself in the arts by painting watercolors of native North Carolina flora after visiting exhibitions featuring Georgia O’Keeffe and local artist Linda Dorman, sketching
    at the Greensboro Arts Center, and drawing inspiration from Yo‑Yo Ma’s cello performances and Mary Oliver’s poetry, which she shares in her senior art‑appreciation classes.
  travel: Rebecca Bergman prefers meticulously planned, leisurely trips that blend cultural enrichment with natural beauty, such as a spring visit to Asheville’s River Arts District, a weekend getaway to
    Savannah’s historic district, and a dream of touring Italy’s Renaissance museums, all while budgeting travel costs within her fixed retirement income.
  culinary: Rebecca Bergman enjoys cooking simple yet refined meals, often preparing herb‑infused shrimp and grits, roasted beet and goat cheese salad with arugula, and chamomile‑lavender tea, while her
    modest cooking skill lets her experiment with new recipes from the New York Times Cooking, yet she sometimes over‑spices dishes due to an overabundance of fresh oregano from her garden.
  core: Rebecca Bergman is a curious, meticulously organized retiree who blends scientific precision with artistic wonder, balancing solitary garden reflections with community teaching, while guarding a
    fondness for puzzles and occasional forgetfulness about vitamins.
background:
  cultural: Rebecca is a lifelong resident of Greensboro, North Carolina, raised in a modest, middle‑class family with deep Southern roots. Her upbringing emphasized community, hospitality, and self‑reliance,
    and she attended a local public high school where she was exposed to the region’s appreciation for craftsmanship and folklore. While identifying as Caucasian, she values Greensboro’s growing multicultural
    arts scene and respects traditional Southern traditions such as church gatherings, regional cuisine, and local history. These influences shape her disciplined, organized approach to work, her kindness
    and cooperative spirit, and her appreciation for both solitude and small, harmonious social circles.
attributes:
  skills: '["Dental prosthetic fabrication", "Ophthalmic lens grinding", "CAD/CAM design", "3D printing of medical models", "Materials science (dental alloys, acrylics, plastics)", "Quality control and
    regulatory compliance", "Technical documentation", "Inventory management", "Mentorship and training", "Precision troubleshooting"]'
  hobbies: '["Watercolor painting", "Botanical sketching", "Visiting art galleries and museums", "Gardening (native plants)", "Birdwatching", "Puzzle solving (jigsaw, crossword)", "Knitting", "Reading about
    science and art", "Small book club", "Volunteering at senior art programs"]'
  career_goals: At 68, Rebecca aims to transition to part‑time consultancy, offering her expertise to local dental and optical labs and guiding younger technicians. She plans to develop a comprehensive
    guide on best practices for prosthetic fabrication, stay current with emerging digital dentistry technologies, and lead workshops on CAD/CAM and 3D printing workflows. Additionally, she hopes to volunteer
    her skills in community health outreach programs, contribute to a museum exhibit on the history of medical devices in Greensboro, and continue her lifelong learning through professional seminars.
