  career_goals: Eva aims to move from her current management analyst role into a senior strategy consulting position within an organization that values interdisciplinary thinking and flexibility. She wants
    to lead cross‑functional analytics teams, shape data‑driven decision‑making, and integrate artistic and cultural insights into business strategy. In the longer term, she envisions founding a boutique
    consultancy that helps arts and cultural institutions leverage data for audience development and financial sustainability. She also seeks a better work‑life balance, prioritizing flexible remote work
    arrangements and mindfulness practices to reduce stress.
