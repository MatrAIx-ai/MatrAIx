  career_goals: Maria’s immediate goal is to move into a supervisory role, such as shift lead, within the next year, where she can apply her organizational strengths and assertive yet collaborative style
    to manage a team. She plans to complete a retail management certification program offered by a local community college to formalize her leadership knowledge. In the medium term, she aspires to become
    a store manager, overseeing broader operational responsibilities while maintaining a balanced work schedule that accommodates her family. Long‑term, Maria hopes to blend her love for the arts with her
    retail expertise by transitioning into a community‑focused position—such as a museum educator, cultural program coordinator, or outreach specialist—where she can design public engagement events and
    leverage her humanities background.
