personas:
  professional: Anne Pohle, a seasoned civil engineer with expertise in structural design, transportation planning, and sustainable water resources, leverages AutoCAD, Revit BIM, and GIS to lead complex
    municipal projects with a meticulous, schedule‑driven approach that reflects their preference for structure and their talent for clear stakeholder communication.
  sports: Anne Pohle, an avid hiker of the Piedmont Trail and regular participant in a local yoga class, supports the Atlanta Falcons, Braves, and Hawks, and occasionally joins a community cycling group
    that meets on weekend mornings.
  arts: Anne Pohle, a devoted reader of historical fiction by Ken Follett and architectural memoirs by Witold Rybczynski, spends evenings building scale model bridges and capturing the interplay of light
    and steel in downtown Atlanta through photography inspired by Ansel Adams and Andreas Gursky, often visiting the High Museum of Art for seasonal exhibitions.
  travel: Anne Pohle, who prefers meticulously planned trips that balance architectural sightseeing with quiet reflection, has explored Savannah’s historic squares, Florence’s Renaissance palazzos, and
    Barcelona’s Gaudí structures, and dreams of a week‑long immersion in Kyoto’s wooden temples and gardens.
  culinary: Anne Pohle, a moderately skilled home cook, delights in preparing Southern‑inspired dishes like shrimp and grits, collard greens seasoned with smoked turkey, and buttery pecan biscuits, frequently
    using fresh tomatoes, okra, and herbs harvested from their vegetable garden.
  core: Anne Pohle merges a methodical civil‑engineering mindset with a solitary love for model bridges and garden vegetables, balancing precise project timelines with occasional spontaneous splurges on
    high‑tech gardening gadgets.
background:
  cultural: Anne comes from a German‑heritage family that settled in the American South generations ago. Raised in the Atlanta metropolitan area, she embraces the values of Southern hospitality, community
    service, and a strong work ethic. Her cultural upbringing blends traditional family gatherings centered around shared meals with a respect for personal space and quiet reflection. As a member of a local
    Lutheran congregation, she participates in church‑based outreach while maintaining a secular appreciation for the diverse cultural tapestry of Decatur, GA.
