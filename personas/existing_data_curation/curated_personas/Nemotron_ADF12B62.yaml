  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Hiking'', ''Model bridge building'', ''Architectural photography'', ''Cooking Southern cuisine'', ''Yoga'', ''Volunteer work with Habitat for
    Humanity'']'
  career_goals: Anne aims to advance to a senior leadership role within municipal engineering, such as Director of Public Works, where she can shape regional infrastructure policy and champion climate‑resilient
    projects. She plans to complete her Professional Engineer (PE) licensure, deepen her expertise in green stormwater design, and lead a flagship sustainable transportation initiative in DeKalb County.
    Over the next decade, she also wishes to mentor the next generation of engineers, particularly encouraging women in STEM, and contribute to community outreach programs that improve public awareness
    of infrastructure sustainability.
