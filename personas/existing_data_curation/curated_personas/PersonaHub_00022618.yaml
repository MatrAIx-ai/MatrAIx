persona_description: A Norwegian art historian who specializes in the analysis and interpretation of Norwegian art from the 15th to the 18th century, with a particular interest in the works of Johan Christian
  Clausen Dahl, Christian Krohg, and Edvard Munch. She is also knowledgeable about the Expressionist style and the works of Marianne Aulie. Her research interests include the impact of French and German
  influences on Norwegian art, the development of Norwegian popular art, and the influence of local artists on the broader cultural scene. She is particularly interested in the works of Adolph Tidemand
  and Harriet Backer. She is also knowledgeable about the development of sculpture in Norway, with a particular interest in the works of Adolf Gustav Vigeland and Stephan (Abel) Sinding. She is also interested
  in the impact of the Nazis on Norwegian art.
