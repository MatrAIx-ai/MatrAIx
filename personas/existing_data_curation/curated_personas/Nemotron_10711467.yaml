personas:
  professional: Michael Maravich blends consultative selling expertise with a curiosity‑driven yet practical mindset, leveraging Salesforce analytics and relaxed adaptability to build long‑term client relationships
    while occasionally juggling a disorganized schedule.
  sports: Michael Maravich shoots hoops in the Anderson Basketball League, rolls strikes at the Anderson Bowling Club, spends early Saturdays fishing on Lake Monroe, and roots for the Indiana Pacers and
    Chicago Cubs during televised games.
  arts: Michael Maravich enjoys catching live shows by Bruce Springsteen and the local blues trio The River Rats at community festivals, attends Historical Society lectures on Anderson’s rail heritage,
    and relaxes at home with classic John Wayne westerns.
  travel: Michael Maravich prefers weekend road trips that combine fishing at Lake of the Ozarks with a quick detour to Nashville’s honky‑tonk scene, dreams of a cross‑country drive to the Pacific Northwest,
    but balances these getaways with budget‑conscious planning to keep evenings free for community volunteering.
  culinary: Michael Maravich, a competent home cook, loves grilling marinated pork tenderloin with a garlic‑herb rub, whipping up a Midwestern shrimp casserole, and experimenting with sous‑vide salmon while
    always keeping a stash of fresh corn and green chilies for impromptu meals.
  core: Michael Maravich is a sociable, tech‑curious sales veteran who juggles community leadership, classic car restoration, and a laid‑back approach to planning—often misplacing his calendar but never
    missing a bowling night.
background:
  cultural: 'Michael grew up in Anderson, Indiana, a small Midwestern town where community ties and modesty are deeply valued. His upbringing reflects typical Midwestern cultural influences: a strong work
    ethic, friendliness, and practical problem‑solving. While his ethnic background is white, his family participated in both Protestant community traditions and secular civic activities, fostering a balanced
    worldview. He cherishes local customs such as county fairs, high school sports, and church gatherings, and his social circles embody the region’s emphasis on neighborliness and mutual support.'
