  career_goals: He aims to transition from senior software engineer to a technical lead or engineering manager within a space‑technology firm or a NASA contractor in the Space Coast. Over the next five
    years he plans to obtain AWS Solutions Architect certification and deepen his expertise in mission‑critical, real‑time systems. Aaron aspires to lead a high‑performing, interdisciplinary team that delivers
    reliable, secure software for aerospace applications while cultivating a collaborative, low‑stress work environment. Long‑term, he envisions contributing to a landmark space mission and eventually mentoring
    emerging engineers through formal training programs.
