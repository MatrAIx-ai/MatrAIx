persona_description: A scientist who is skeptical of the fossil record and its dating methods, particularly those used by religious fundamentalists. This person is interested in understanding the history
  of life and the evolution of species, but is critical of the methods used to assign ages to fossils. They are curious about the nature of the decay of radioactive isotopes and the formation of fossilized
  bacteria, and are willing to explore alternative theories and methods of dating fossils. This person is likely to be a historian or paleontologist who is interested in the scientific method and the limitations
  of our knowledge.
