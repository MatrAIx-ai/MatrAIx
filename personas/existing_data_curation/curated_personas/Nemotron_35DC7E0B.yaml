  hobbies: '[''Urban gardening'', ''Korean and fusion cooking'', ''Fishing at local reservoirs'', ''Walking and birdwatching in county parks'', ''Karaoke nights with community friends'', ''Tai Chi practice'',
    ''Model train building'', ''Reading historical novels'']'
  career_goals: Approaching retirement, Heejung aims to transition from full‑time field work to a mentorship role, training younger technicians in both classic pest‑control methods and emerging green technologies.
    He hopes to obtain a small business license within the next two years to start a boutique, eco‑focused pest‑management service that offers personalized plans for the local community. He also desires
    to document his decades of hands‑on experience in a practical guide for homeowners, blending his curiosity for new ideas with his respect for proven techniques.
