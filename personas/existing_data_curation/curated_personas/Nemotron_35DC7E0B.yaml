personas:
  professional: Shin Yan, a veteran residential and small‑business pest‑control professional with over forty years of expertise in integrated pest management, combines a meticulous eye for insect identification
    with a spontaneous, improvisational problem‑solving style, and they use their calm, assertive communication to mentor younger technicians while exploring low‑toxicity solutions.
  sports: Shin Yan, an early‑morning Tai Chi practitioner, avid fisherman at local reservoirs, and loyal fan of the New York Giants and New York Yankees, also joins a senior softball league each spring
    and follows the NJ Devils during the hockey season, and they keep a modest weekly walking routine in Bergen County parks to stay active.
  arts: Shin Yan sings in a local Korean community choir, delights in karaoke renditions of classic Lee Sun‑hee ballads and Frank Sinatra standards, and they spend quiet evenings admiring the canvases of
    Vincent van Gogh while building detailed scale model trains inspired by historic locomotive art.
  travel: Shin Yan prefers short, well‑planned getaways that blend garden inspiration with cultural immersion, having traveled to Jeju Island’s tea fields, the Hudson Valley’s farm‑to‑table markets, and
    they dream of a scenic Swiss Alpine train ride that pairs flora photography with culinary workshops.
  culinary: Shin Yan’s kitchen is a laboratory where traditional kimchi jjigae, gochujang‑glazed salmon, and inventive kimchi‑taco fusion coexist, seasoned with home‑grown zucchini, Korean chili flakes,
    fresh basil, and a dash of sesame oil, and they treat each dish as both comfort and curiosity‑driven experiment.
  core: Shin Yan navigates life with a calm, curiosity‑driven mindset, blending spontaneous garden experiments and low‑toxicity pest solutions with occasional budget forgetfulness and a nightly Tai Chi
    ritual that centers their resilient spirit, and they cherish both quiet solitude and communal song.
background:
  cultural: Heejung was born to Korean immigrant parents who arrived in New Jersey in the early 1970s. Growing up bilingual, he learned the values of humility, respect for elders, and communal harmony from
    his family while adapting to the individualistic pace of American suburban life. The annual celebration of Korean holidays, participation in the local Korean church, and regular visits to Korean restaurants
    have kept his cultural heritage alive. This blend of East Asian traditions and American practicality informs his work ethic—valuing meticulousness, perseverance, and a calm approach to challenges—while
    also fostering a curiosity for blending old‑world knowledge with new‑world innovations.
attributes:
  skills: '[''Pest identification and inspection'', ''Safe chemical handling and application'', ''Integrated pest management (IPM) strategies'', ''Customer communication and service'', ''Equipment maintenance
