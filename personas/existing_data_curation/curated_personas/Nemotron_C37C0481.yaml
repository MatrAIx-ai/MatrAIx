    (SOP) drafting'', ''Laboratory equipment calibration and maintenance'', ''Inventory management'', ''Scientific documentation and reporting'', ''Regulatory compliance (FDA, CLIA)'']'
  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Indoor herb gardening'', ''Sous‑vide cooking'', ''Fermentation projects'', ''Reading popular science'', ''Visiting science museums'', ''Early‑morning park
    hikes'', ''Playing piano (classical)'', ''Board games with small group (e.g., Settlers of Catan)'']'
  career_goals: Nick aims to progress into a senior laboratory manager role within the next five years, overseeing a multidisciplinary biotech team and driving process improvements that increase throughput
    while maintaining data integrity. He plans to acquire a certification as a Clinical Laboratory Scientist and pursue a part‑time master’s degree in Biotechnology to deepen his expertise in gene‑editing
    technologies such as CRISPR. He also aspires to mentor junior technicians, contribute to peer‑reviewed publications on assay optimization, and eventually transition into a regulatory affairs position
    where he can influence product development pipelines.
