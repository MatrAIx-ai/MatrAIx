  hobbies: '[''Sketching and photography'', ''Visiting art galleries and museums'', ''Live music and concerts'', ''Hiking local trails'', ''Cooking experimental meals'', ''DIY home renovation projects'',
    ''Strategy video gaming'', ''Reading science‑fiction'', ''Volunteering at community art program'']'
  career_goals: He aims to become a senior cost estimator within the next three years, taking on larger commercial projects and leading a team of junior estimators. Long‑term, James hopes to launch his
    own consulting practice that specializes in sustainable building cost analysis and leverages AI‑driven estimation models. He is driven by a competitive desire to be recognized as a top performer in
    his field while also seeking the flexibility to balance work with his artistic pursuits.
