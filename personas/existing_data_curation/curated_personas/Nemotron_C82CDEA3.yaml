  hobbies: '["Visiting galleries, museums, and street-mural tours","Urban photography","Playing saxophone in a neighborhood jazz ensemble","Volunteering at youth art programs","Community gardening","Attending
    live jazz and hip-hop concerts","Cooking Southern comfort food for family and friends","Participating in neighborhood walking tours of cultural landmarks"]'
  career_goals: Brantley aims to advance from attendant to lot supervisor within the next two years, pursuing a city-issued supervisory certification and completing his GED. He plans to master emerging
    parking technology systems, such as automated ticketing and electric-vehicle charging management, to position himself as a technical lead. Leveraging his passion for the arts, he hopes to propose and
    oversee community-art projects that transform underused parking structures into vibrant public-art spaces, thereby serving both the city's transportation needs and its cultural life. Long-term, he envisions
    mentoring younger employees and eventually consulting for municipal parking departments on integrating safety, efficiency, and community engagement.
