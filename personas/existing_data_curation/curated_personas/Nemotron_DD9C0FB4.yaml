  hobbies: '["Gardening", "Knitting and crocheting", "Reading historical fiction", "Genealogical research", "Cooking and baking", "Walking in local parks", "Church small-group bible study", "Crossword puzzles",
    "Sudoku"]'
  career_goals: Barbara seeks a stable, predictable work environment while gradually moving up within the call‑center hierarchy. Her short‑term goal is to obtain a GED and complete a customer‑service management
    certification to qualify for a team‑lead or quality‑assurance specialist role. She aims to leverage her reliability and mentoring skills to supervise a small team, develop stress‑management techniques,
    and eventually transition to a part‑time schedule that provides more time for family and personal interests. Long‑term, she hopes to maintain a respected position that balances responsibility with personal
    well‑being.
