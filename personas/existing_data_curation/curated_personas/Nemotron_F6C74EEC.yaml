  hobbies: '[''Cooking Korean cuisine'', ''Badminton'', ''Hiking'', ''Mindfulness meditation'', ''Reading leadership non‑fiction'', ''DIY woodworking'', ''Mentoring Korean‑American youth'', ''Attending
    multicultural festivals'']'
  career_goals: He aims to obtain PMP certification within the next year and move into a senior project manager or program director role where he can oversee multi‑disciplinary initiatives that have measurable
    community impact. Yi Hyeon envisions leading a PMO that emphasizes collaborative culture, fostering inclusive project teams, and integrating sustainable practices. Long‑term, he hopes to launch his
    own consulting boutique that helps small businesses in Queens adopt structured project frameworks while preserving their unique cultural identities.
