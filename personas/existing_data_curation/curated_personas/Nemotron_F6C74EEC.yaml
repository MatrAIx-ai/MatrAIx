personas:
  professional: Yi Kim, a 39‑year‑old project management professional, leverages Agile and Lean Six Sigma expertise along with an exacting scheduling and risk‑assessment process, turning their preference
    for structure and collaborative harmony into consistently on‑time, on‑budget delivery for cross‑functional teams.
  sports: Yi Kim stays active by playing competitive badminton at the Queens Badminton Association, hiking the Catskill and Adirondack trails in summer, cheering on the New York Mets during baseball season
    and the Knicks in winter, and logs weekly workout data in Strava to monitor progress.
  arts: Yi Kim nurtures a creative side through DIY woodworking projects inspired by the clean lines of Kengo Kuma, a regular attendee of Queens’ annual street art festival, and a fan of storytelling podcasts
    such as "How I Built This" and the indie folk sounds of Bon Iver, which together shape their appreciation for both functional design and artistic narrative.
  travel: Yi Kim favors meticulously planned weekend getaways, such as a hiking trip to the Shenandoah Valley and a cultural immersion weekend in Kyoto, while dreaming of a longer excursion to the vineyards
    of Tuscany, balancing a modest travel budget with a desire for both adventure and relaxation.
  culinary: Yi Kim, an avid home chef, delights in preparing bibimbap with perfectly seasoned gochujang, crispy fried kimchi, and a rainbow of sautéed vegetables, while also mastering the art of hand‑rolled
    sushi using sashimi‑grade tuna and vinegared rice, and they often host communal meals where guests sample their signature ma‑yu (spicy pork) stew.
  core: Yi Kim navigates life like a well‑structured Gantt chart—meticulously organized, endlessly optimizing, yet occasionally derailed by an irresistible urge to splurge on obscure hardwoods for the next
    woodworking masterpiece.
background:
  cultural: Yi Hyeon Kim was born and raised in Queens to first‑generation Korean immigrants who emphasized respect, harmony, and academic perseverance. He grew up bilingual, celebrating Chuseok and Lunar
    New Year with his family while also embracing the multicultural fabric of New York City. The Korean community’s strong sense of collective responsibility shaped his cooperative nature and his preference
    for balanced social engagement. He maintains ties to the local Korean church, participates in cultural festivals, and regularly visits South Korea to stay connected with his heritage. His upbringing
    blends traditional East Asian values of hierarchy and group cohesion with the individualistic, fast‑paced environment of urban America, informing his pragmatic yet harmonious approach to both work and
    personal life.
