personas:
  professional: Katherine Moore is a 24‑year‑old UI/UX and branding designer who blends their curiosity for emerging tools with a practical, client‑focused mindset, often channeling their sociable, talkative
    energy into collaborative brainstorming sessions while juggling a delightfully chaotic workflow.
  sports: Katherine Moore enjoys hitting the Ozark trails for weekend hikes and joining a local yoga studio, while cheering on the Arkansas Razorbacks in college football and the Memphis Grizzlies in the
    NBA, and they occasionally run with the Little Rock Running Club during spring.
  arts: Katherine Moore thrives on improv comedy nights at the Ark Comedy Lab, devotes weekends to photographing downtown Little Rock murals, and draws inspiration from folk artist Charley Harper and indie
    musicians like Haim and The Avett Brothers, often citing Phoebe Waller‑Bridge as a comedic role model.
  travel: Katherine Moore prefers loosely planned road trips that blend music festivals and foodie stops, having already road‑tripped to Nashville for country‑rock and Asheville for mountain art scenes,
    while daydreaming about a spring visit to Kyoto to explore its tea‑house culture and street photography opportunities.
  culinary: Katherine Moore loves experimenting in the kitchen, skillfully whipping up shrimp‑and‑grits with fresh corn and jalapeños, crafting mango‑salsa tacos, and baking sour‑dough loaves, while hosting
    dinner parties where sweet tea and homemade pecan pie become the centerpiece.
  core: Katherine Moore is a sociable design prodigy who balances a chaotic creative process with a relentless drive to turn bold ideas into polished, socially conscious experiences.
background:
  cultural: Katherine grew up in Little Rock, Arkansas, in a middle‑class, white American family that blended traditional Southern hospitality with the more relaxed, creative vibe of a growing city. She
    participated in community arts programs and attended the Arkansas Arts Center from a young age, which fostered an appreciation for regional folk art and contemporary culture. Her humanities education
    broadened her worldview, encouraging curiosity about diverse ideas while still valuing the close‑knit community ties characteristic of the South.
attributes:
  skills: '[''Graphic Design'', ''Visual Branding'', ''UI/UX Design'', ''Illustration'', ''Typography'', ''Adobe Creative Suite (Photoshop, Illustrator, InDesign)'', ''Figma'', ''Prototyping (InVision,
    Marvel)'', ''Design Thinking'', ''User Research Basics'', ''Copywriting'', ''Presentation & Client Pitching'', ''Event Coordination'']'
  hobbies: '[''Improv comedy'', ''Live music events'', ''Photography (urban and nature)'', ''Thrifting vintage clothing'', ''Cooking and trying new recipes'', ''Hiking in the Ozarks'', ''Attending art exhibitions'',
    ''Hosting dinner parties'', ''Board games with friends'', ''Reading contemporary fiction and philosophy'']'
  career_goals: Katherine aims to advance from her current designer role to a senior or lead position within a dynamic agency, eventually moving toward a creative director role. She hopes to build a boutique
    design studio that partners with socially conscious brands, exploring emerging media such as AR/VR experiences. Winning regional design awards, speaking at conferences, and mentoring emerging designers
    are also key milestones she aspires to achieve.
