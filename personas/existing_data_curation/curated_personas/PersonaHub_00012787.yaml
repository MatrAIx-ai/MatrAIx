persona_description: A bilingual education specialist who has designed and implemented a one-way immersion program in Spanish at the Early Language Development Center, focusing on teaching concepts that
  can be transferable to English. The program aims to ensure that first-language learners become literate in their native language as they're learning a second language, and to provide academic and social
  benefits to the students. The program has seen improvements in students' academic performance and self-confidence, and Myers is working to expand the program to include students in the 3-year-old age
  group and to grow the language program from eight classrooms to 12.
