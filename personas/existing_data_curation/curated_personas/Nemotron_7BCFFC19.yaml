personas:
  professional: Kelly Lollar is a full‑stack software developer with five years of experience, proficient in Python, Java, Go, and cloud‑native platforms such as AWS and Azure, who balances curiosity‑driven
    experimentation in serverless and machine‑learning pipelines with a practical, reliable delivery mindset, and they aim to become a technical lead within two years while eventually launching a boutique
    consultancy for sustainable data‑driven solutions.
  sports: Kelly Lollar enjoys regular hikes with the Finger Lakes Trail Association, follows the Buffalo Bills and the New York Knicks for weekend excitement, and they maintain a modest fitness routine
    with weekly trail runs and occasional pick‑up basketball games at the community center.
  arts: Kelly Lollar finds artistic inspiration in Ansel Adams' black‑and‑white landscapes, strums acoustic renditions of Nick Drake songs on guitar, and unwinds by reading Neal Stephenson's sci‑fi novels,
    while they occasionally attend local folk‑music open‑mic nights at the Ithaca Coffee House.
  travel: Kelly Lollar prefers meticulously planned weekend road trips, such as a sunrise hike in Adirondack Park or a weekend camping adventure in Acadia National Park, while dreaming of a solo trek through
    Iceland's volcanic landscapes, balancing modest travel budgets with a love of low‑key nature immersion.
  culinary: Kelly Lollar enjoys farm‑to‑table cooking using produce from their garden—preparing dishes like roasted beet and goat‑cheese salad, rosemary‑infused grilled chicken, and homemade sourdough bread—though
    they sometimes over‑season in a burst of experimental curiosity.
  core: Kelly Lollar is a quietly curious coder who balances methodical engineering with solitary hikes, garden‑to‑plate meals, and low‑key board‑game evenings, while occasionally procrastinating on flossing.
background:
  cultural: Kelly was raised in a middle-class, predominantly white family in Livonia, a small town in Livingston County, New York. Her upbringing blended the values of self-reliance, community involvement,
    and an appreciation for the natural environment characteristic of upstate New York. Family traditions include seasonal celebrations tied to the agricultural calendar, such as harvest festivals and local
    farmer-market gatherings. While she identifies with mainstream American cultural norms, Kelly also respects the regional heritage of the area, which emphasizes modesty, earnest work ethic, and a close
    connection to the outdoors. These influences shape her practical outlook, collaborative spirit, and preference for small-group social settings.
