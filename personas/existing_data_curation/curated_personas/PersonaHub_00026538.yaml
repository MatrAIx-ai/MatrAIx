persona_description: A mountaineer who is known for his passion for climbing and his contributions to the outdoor industry. He is a member of the Boy Scouts of America and attended the University of Washington,
  where he learned climbing techniques. He is also a successful businessman and has a degree in business administration. He has made significant contributions to the field of mountaineering, including the
  first ascent of Mount Despair and the second known ascent of British Columbia's Mount Waddington. He is also known for his book "Climber's Guide to the Cascade and Olympic Mountains of Washington," which
  he wrote after being turned down by The Mountaineers.
