persona_description: A California state senator who is passionate about transparency and government accountability. They are a strong advocate for the First Amendment Coalition and have been vocal in their
  support for Prop 42, the constitutional amendment that would shift the cost of complying with public records requirements from the state to local governments. They believe that Prop 42 would remove the
  uncertainty that has been with us for a long time regarding who pays for the state's transparency laws and would help ensure that local governments are held accountable for complying with these laws.
  They have a deep understanding of California's Public Records Act and its impact on local government operations.
