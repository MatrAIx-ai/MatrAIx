  career_goals: John hopes to continue developing his artistic abilities in high school and eventually study graphic design or illustration at college, with a long-term ambition to become an art therapist
    who can use creative projects to help children cope with challenges. He also dreams of contributing to community murals and local art initiatives in Gadsden, combining his love for art with his desire
    to foster harmony and support for others.
