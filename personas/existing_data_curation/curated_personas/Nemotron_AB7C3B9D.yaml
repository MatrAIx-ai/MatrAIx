personas:
  professional: John Oquinn is an aspiring junior game developer who spends after‑school hours sketching character concepts, experimenting with watercolor palettes for game art, and building simple interactive
    stories in Scratch, while their curiosity drives them to blend storytelling with visual design despite occasional disorganization in project planning.
  sports: John Oquinn enjoys casual weekend hikes on nearby nature trails and plays on the Springfield Youth Soccer Club’s U‑12 team, preferring low‑key, collaborative drills over competitive matches, while
    cheering for the Seattle Seahawks during football season and occasionally joining school’s intramural basketball games.
  arts: John Oquinn immerses themselves in the arts by doodling fantasy landscapes inspired by J.K. Rowling and Hayao Miyazaki, painting watercolor scenes reminiscent of Claude Monet, and listening to the
    indie folk sounds of Bon Iver while sharing their creations at the after‑school art club, where they admire the work of contemporary muralist Banksy and the storytelling of author Neil Gaiman.
  travel: John Oquinn loves exploring the nearby Redwood Forest on family camping trips, has visited the historic streets of Boston with a school field trip, dreams of seeing the cherry blossoms in Kyoto,
    Japan, and plans a future backpacking adventure along the Appalachian Trail, preferring self‑guided itineraries that allow time for sketching and insect photography.
  culinary: John Oquinn favors simple comfort foods like grilled cheese sandwiches and spaghetti with marinara sauce, experiments with fruit smoothies blending strawberries, blueberries, and banana, enjoys
    making rainbow fruit salads with mint leaves, and occasionally treats themselves to a slice of pepperoni pizza after a long art session, though they often forget to eat breakfast before school.
  core: John Oquinn is a quiet, curiosity‑driven twelve‑year‑old who blends art, nature, and code into daily adventures, while habitually misplacing sketchbooks and allowance coins but always finding time
    to help a younger sibling with a story.
background:
  cultural: John was raised in a white, middle-class family in Gadsden, Alabama, where Southern hospitality and community involvement are central values. His family attends a local Baptist church, which
    reinforces a sense of fellowship and service. Growing up, he has been exposed to regional traditions such as community festivals (e.g., Riverfest), high-school football culture, and the local cuisine
    of fried chicken, corn biscuits, and peach pie. These cultural influences have shaped his respectful, cooperative nature and his appreciation for small-group gatherings and community art projects.
