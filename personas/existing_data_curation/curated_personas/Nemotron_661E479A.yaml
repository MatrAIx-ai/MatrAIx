personas:
  professional: Jonathan Cotterill leverages a decade of front‑line retail mastery at Tahoka’s general store, combining meticulous inventory reconciliation, quick rapport‑building, and a competitive drive
    to consistently beat sales targets, while mapping a systematic path toward store‑manager certification and eventual multi‑store oversight.
  sports: Jonathan Cotterill enjoys hunting whitetail deer and lake fishing as seasonal pursuits, follows the Dallas Cowboys and Texas Tech Red Raiders religiously, participates in the West Texas Big Game
    Club during deer season, and hikes the prairie flats for cardio, often wearing a Lubbock‑based hiking group’s shirt.
  arts: Jonathan Cotterill's evenings echo with classic country legends like Johnny Cash and Willie Nelson and blues icons such as B.B. King, while they capture prairie sunsets through a vintage 35mm camera,
    collecting vinyl records and occasionally tinkering with wooden furniture that doubles as functional sculpture.
  travel: Jonathan Cotterill prefers low‑key road trips that blend solitude with scenery, having explored the rugged canyons of Big Bend, the historic streets of Santa Fe, and the coastal dunes of Galveston,
    while they dream of a future fishing lodge stay on Lake Champlain.
  culinary: Jonathan Cotterill favors hearty Tex‑Mex staples—chili con carne, grilled corn tortillas, and pinto beans—paired with homemade venison stew and fresh catfish tacos, cooking in a cast‑iron skillet
    and often seasoning dishes with smoked paprika and jalapeño.
  core: Jonathan Cotterill is a methodical, solitary strategist who blends rugged West Texas hobbies with a competitive retail edge, balancing a cautious money mindset and a pragmatic health routine, all
    while indulging in vintage country tunes and occasional impulse gear purchases.
background:
  cultural: Jonathan’s cultural background is rooted in the Anglo‑American traditions of West Texas. Raised in a modest, farm‑oriented family near Tahoka, he grew up with a strong sense of self‑reliance,
    respect for hard work, and a deep appreciation for the wide-open Texas landscape. The local community’s emphasis on neighborly support, high‑school football Saturdays, and church gatherings has shaped
    his understated appreciation for communal ties, even though he prefers smaller, more intimate social circles. His upbringing combined a pragmatic, no‑frills work ethic with a subtle pride in Texas heritage,
    influencing both his practical problem‑solving style and his preference for straightforward, results‑oriented interactions.
attributes:
  skills: '[''Customer Service'', ''Sales techniques'', ''Point-of-sale (POS) operation'', ''Cash handling'', ''Inventory management'', ''ERP software usage'', ''Product knowledge (agricultural, electronics,
