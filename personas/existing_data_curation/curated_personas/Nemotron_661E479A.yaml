  hobbies: '[''Hunting (whitetail deer)'', ''Fishing'', ''Woodworking'', ''DIY farm equipment repair'', ''Hiking'', ''Landscape photography'', ''Listening to country/blues music'', ''Online strategy gaming'']'
  career_goals: Jonathan aims to transition from a front‑line sales associate to a store manager within the next three years, leveraging his track record of meeting sales benchmarks and his systematic approach
    to store operations. He plans to enroll in a community‑college retail management certification program to solidify his knowledge of budgeting, staff scheduling, and loss‑prevention strategies. Long‑term,
    he envisions managing a cluster of small‑town outlets for a regional retailer or eventually opening his own independent hardware store, where he can apply his competitive edge to drive community‑focused
    profitability. Financially, he seeks to achieve a stable income that supports buying a modest ranch property on the outskirts of Lubbard County, allowing him to blend his entrepreneurial goals with
    his love for the open Texas landscape.
