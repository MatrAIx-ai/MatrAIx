personas:
  professional: Tammy Baskin, a veteran K‑12 teaching assistant in Hancock County, leverages their graduate education, masterful classroom management, and tech‑savvy skills in Google Classroom and Canvas
    to design data‑driven, arts‑integrated curricula while they mentor new staff with a curious, methodical, and compassionate approach.
  sports: Tammy Baskin enjoys brisk weekend hikes along the Tiffin River trail, participates in the Findlay Trail Runners club during spring, supports the Cleveland Browns in football and the Ohio State
    Buckeyes in college basketball, and they schedule weekly yoga sessions to maintain flexibility and low‑impact fitness.
  arts: Tammy Baskin finds inspiration in the vibrant colors of Frida Kahlo, the impressionist light of Monet, and the storytelling of Lin‑Manuel Miranda’s Hamilton, regularly attending gallery openings
    in Toledo, community theater productions at the Findlay Civic Theatre, and they listen to the soulful piano works of Ludovico Einaudi while they paint acrylic landscapes.
  travel: Tammy Baskin prefers thoughtfully planned trips that blend cultural immersion and natural scenery, having explored the art museums of Florence, the botanical gardens of Kyoto, and the cliffs of
    Acadia National Park, while they dream of a future road‑trip along the Pacific Coast Highway to photograph sunrise over Big Sur.
  culinary: Tammy Baskin, an enthusiastic home chef, delights in crafting Thai green curry with fresh basil and lemongrass from their garden, mastering the balance of spice and sweetness, while they also
    experiment with Ethiopian injera, Mediterranean mezze platters featuring feta and olives, and the occasional homemade apple pie using heirloom orchard apples.
  core: Tammy Baskin is a curious, methodical educator who balances a love of art and nature with disciplined budgeting, occasional health quirkiness, and a penchant for planning every brushstroke, hike,
    and budget line with quiet determination, and they sprinkle impulsive paint‑store splurges into their routine.
background:
  cultural: Tammy’s cultural background reflects a Midwestern American heritage rooted in small‑town Ohio values. Raised in a family with German‑Irish ancestry, she grew up in a close‑knit community that
    emphasized hard work, education, and civic involvement. Local traditions such as county fairs, church gatherings, and community service have shaped her sense of responsibility and collaborative spirit.
    While she identifies as white American, her upbringing in the heartland encourages a pragmatic outlook, a love for seasonal outdoor activities, and a deep appreciation for regional arts and history.
attributes:
  skills: '[''Classroom Management Support'', ''Lesson‑Plan Development Assistance'', ''Differentiated Instruction Strategies'', ''Educational Technology Integration (Google Classroom, Canvas)'', ''Arts‑Integration
    Project Design'', ''Assessment Data Management'', ''Student Tutoring and Mentoring'', ''Parent‑Teacher Communication'', ''Curriculum Planning Committee Participation'', ''Professional Development Facilitation'']'
  hobbies: '[''Acrylic Painting'', ''Museum and Gallery Visits'', ''Reading Historical Fiction'', ''Gardening'', ''Hiking (Tiffin River Trail)'', ''Photography'', ''Cooking (World‑Cuisine Exploration)'',
    ''Volunteering at Community Center (Literacy & Art Workshops)'', ''Book Club Participation'', ''Attending Local Theater Performances'']'
  career_goals: Tammy aims to transition from a teaching assistant to a full‑time certified classroom teacher within the next two years, ultimately focusing on interdisciplinary, arts‑rich curricula. She
    plans to complete a master's degree in Educational Leadership to qualify for a curriculum specialist or department chair role, where she can champion arts integration and innovative instructional practices
    across the district. Additionally, she hopes to launch a community‑based after‑school art program that provides creative outlets for underserved youth in Hancock County, and she aspires to mentor new
    teaching staff, sharing her organized approach and love of lifelong learning.
