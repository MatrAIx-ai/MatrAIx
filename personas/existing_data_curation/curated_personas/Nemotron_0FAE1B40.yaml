  career_goals: Becky plans to enroll in a bachelor's program in Arts Administration or Social Work, aiming to become a community arts coordinator or youth outreach manager in Sarasota. She dreams of designing
    inclusive arts programs that combine creative expression with mental‑health support, eventually founding a nonprofit that offers free art‑therapy workshops for at‑risk teens. Her long‑term ambition
    is to influence local cultural policy to ensure equitable access to arts and community resources.
