  career_goals: Although Essie is no longer part of the formal workforce, she envisions a personal legacy centered on cultural preservation and mentorship. She aims to compile a memoir that weaves together
    her family’s stories, the history of Meridian’s Black community, and reflections on the civil‑rights era. Essie hopes to organize a small traveling exhibit of her quilts and local folk art to share
    with younger generations at the community center. She also aspires to learn basic digital photography so she can document her garden, local events, and the faces of neighbors, creating a visual archive
    for future family members. Maintaining her health and independence remains a core ambition, as does fostering a supportive network of seniors who share her curiosity for new ideas.
