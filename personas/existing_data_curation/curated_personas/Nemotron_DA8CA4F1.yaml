  career_goals: Maria aims to advance from a general office clerk to a supervisory or office manager position within the next five years. She plans to obtain a certification such as the Certified Administrative
    Professional (CAP) and enroll in community college courses for office administration and bookkeeping to broaden her skill set. She seeks a role that offers clear structure, responsibilities, and the
    ability to mentor junior staff while maintaining a quiet, organized work environment. Long‑term, she envisions establishing a freelance bookkeeping service catering to small businesses in the West Texas
    region, allowing her to work independently and leverage her bilingual abilities.
