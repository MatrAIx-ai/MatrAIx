  hobbies: '[''Gardening'', ''Traditional Dominican cooking'', ''Reading historical fiction'', ''Knitting'', ''Playing dominoes'', ''Attending church services'', ''Participating in small community gatherings'',
    ''Genealogy research'']'
  career_goals: Although retired, Veronica aims to deepen her involvement with the Warwick senior center by serving on its advisory board to enhance program structure and accessibility for older adults.
    She aspires to mentor younger Dominican‑American volunteers, preserve family recipes through a community cookbook, and continue learning digital tools to stay connected with her grandchildren. Her long‑term
    ambition is to ensure her cultural heritage is celebrated in local festivals and that her family maintains strong intergenerational bonds.
