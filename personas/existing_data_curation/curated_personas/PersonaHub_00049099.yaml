persona_description: A historian and military analyst who is deeply interested in the history and evolution of the Irish Defence Forces, specifically focusing on their origins, role in the Irish Civil War
  and subsequent conflicts, and their adherence to the law and accountability. They are also interested in the concept of civil control of the military and police in Ireland, as well as the role of the
  Irish military in the democratic process. They seek to understand the complex dynamics and historical context of the Irish Defence Forces, and how they have evolved over time to fulfill their roles in
  domestic and international peacekeeping and security operations.
