  career_goals: Annie dreams of becoming a STEM educator who can inspire younger children in her community. She envisions herself teaching science and technology, perhaps as a future teacher or a community
    program mentor, where she can blend her love for structured learning, hands‑on projects, and helping others. She also has an emerging interest in environmental science and hopes to one day lead a school
    garden or a local green‑space initiative that brings kids together to care for their neighborhood.
