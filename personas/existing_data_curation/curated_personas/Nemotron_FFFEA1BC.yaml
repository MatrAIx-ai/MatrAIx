personas:
  professional: Annie Gibson is a budding coder who creates interactive stories in Scratch, combining the precision of LEGO building with narrative flair, and they approach each project with methodical
    planning and a love for clear step‑by‑step instructions.
  sports: Annie Gibson plays basketball with the Oakwood Rockets youth team, enjoys weekend pick‑up games at the local park, and they cheer for the nearby professional team, the Metro City Hawks, while
    also practicing hip‑hop dance moves at home to stay active.
  arts: Annie Gibson devotes time to sketching characters from their favorite graphic novels like Raina Telgemeier’s "Smile" and Jeff Smith’s "Bone", loves listening to hip‑hop tracks by Missy Elliott while
    drawing, and they attend weekend drawing workshops at the community library, where they also discuss comics with peers.
  travel: Annie Gibson has visited Disney World in Orlando and the Natural History Museum in Washington, D.C., and they dream of exploring the ancient castles of Scotland and the bustling streets of Tokyo,
    preferring family‑oriented itineraries that balance structured tours with time for spontaneous play.
  culinary: Annie Gibson helps prepare family recipes such as homemade chicken curry with coconut milk, classic spaghetti Bolognese topped with fresh basil, and grandma’s cinnamon roll dough, proudly mastering
    chopping vegetables and measuring spices, while they also love snacking on cheese‑filled pizza rolls.
  core: Annie Gibson is a structured, LEGO‑loving 10‑year‑old who blends creativity with methodical planning, balancing school, coding, basketball, and family cooking while quietly nurturing a love for
    graphic novels and hip‑hop beats.
background:
  cultural: Annie was born and raised in Brooklyn's vibrant Black community, where her family blends African‑American traditions with Caribbean (Jamaican) influences. She celebrates Kwanzaa and Juneteenth
    with her family, learns about Black history during school projects, and participates in after‑school programs that focus on Afrocentric arts and storytelling. The neighborhood's hip‑hop culture, street
    art, and local community events shape her musical tastes and daily experiences. Her parents emphasize the importance of community service and pride in heritage, encouraging her to honor her roots while
    looking forward to making a positive impact in her city.
