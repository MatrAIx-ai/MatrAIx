persona_description: A sports psychologist who specializes in the study of attachment styles in athletes, particularly those with insecure attachment. Their research interests include the effects of insecure
  attachment on athlete performance, the development of supportive, psychologically safe environments, and the use of attachment theory to improve athlete performance and reduce burnout. They are committed
  to understanding the complex interplay between attachment style and performance in elite sport, and are dedicated to creating a more resilient and effective team of athletes.
