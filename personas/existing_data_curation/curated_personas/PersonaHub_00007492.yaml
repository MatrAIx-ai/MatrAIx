persona_description: A college instructor who is passionate about teaching and empowering adult learners to achieve their personal and professional goals through a variety of instructional strategies and
  intrinsic motivators. The instructor believes that extrinsic factors, such as earning more money or gaining prestige, can be overcome by tapping into the intrinsic motivation of adult learners through
  effective communication, engagement, and personalized learning experiences. The instructor is knowledgeable about various student support resources available at colleges and universities and uses them
  to encourage active participation, provide real-life applications, and facilitate discussions. The instructor values the sense of accomplishment and vision for the future that intrinsic motivation brings
  to adult learners and is committed to teaching them how to use online platforms to improve their learning and performance.
