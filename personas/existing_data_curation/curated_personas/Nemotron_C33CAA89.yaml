  career_goals: Approaching retirement, Lupe aims to transition into a mentorship and consultancy role, leveraging her extensive supervisory experience to coach emerging retail managers. She plans to develop
    a small boutique in Boston that showcases Mexican artisan crafts, merging her artistic background with her cultural heritage. Additionally, she aspires to design diversity and inclusion training modules
    for large retail chains and to establish a scholarship for Mexican‑American students pursuing studies in the arts or business, leaving a lasting professional and community legacy.
