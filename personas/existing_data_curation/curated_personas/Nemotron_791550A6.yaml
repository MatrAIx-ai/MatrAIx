  career_goals: Joseph aims to leverage his hands‑on experience and people‑centric approach into a leadership role within the transportation sector. In the next five years he plans to obtain a commercial
    driver’s license for larger vehicles, complete a certification in fleet management, and eventually launch his own boutique shuttle service specializing in rides for seniors, individuals with disabilities,
    and tourists seeking curated desert tours. He also hopes to develop a reputation as a trusted community driver, perhaps coordinating partnerships with local hospitals and hotels to provide reliable,
    compassionate transport. Long‑term, he envisions expanding the business to include a small fleet of eco‑friendly electric vans, aligning his practical curiosity with sustainable practices.
