    games'', ''Role‑playing games'', ''DIY crafts'', ''Hiking'', ''Experimental cooking'', ''Reading speculative fiction'', ''Listening to podcasts'']'
  career_goals: Trey aspires to move beyond the floor staff role into a position where he can combine his love of people and creativity. In the next few years he aims to earn his GED and complete a certificate
    in retail management, positioning himself for a store manager role. He dreams of eventually overseeing visual merchandising for a regional chain, or launching his own boutique that showcases eclectic,
    artist‑created products and hosts community events. His long‑term ambition is to create a shopping experience that feels like an interactive art gallery, where customers are invited to explore, discover
    novelty, and connect with local creators.
