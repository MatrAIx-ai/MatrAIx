personas:
  professional: Retail virtuoso Trey Stapleton, a 33‑year‑old visual merchandising specialist, transforms store aisles into immersive art installations by weaving spontaneous storytelling and vivid design
    flair, while they grapple with staying organized enough to meet management deadlines on the path toward a store‑manager role and eventually a boutique that feels like an interactive gallery.
  sports: Active‑outdoors enthusiast Trey Stapleton regularly tackles the trails of the Dequindre Cut and the Huron‑Clinton Metroparks with the Detroit Hiking Club, joins impromptu pick‑up ultimate frisbee
    games at the community park, and they follow the Detroit Lions and Pistons with spirited tailgate gatherings, blending weekend hikes with seasonal sports fandom.
  arts: Creative soul Trey Stapleton devotes weekends to painting and sketching Detroit’s vibrant street murals by artists like Shabazz Gardezi and JR, they capture candid moments at the Detroit Summer
    Festival with a Nikon D5600, thrill at improv nights with the Detroit Improv Collective, and often quote Neil Gaiman in storytelling workshops, letting these cultural threads shape an identity that
    treats everyday life as a living canvas.
  travel: Spur‑of‑the‑moment traveler Trey Stapleton swaps weekend road trips to Mackinac Island for unexpected art pilgrimages to Berlin’s East Side Gallery, they envision future culinary adventures in
    Kyoto while juggling a modest budget that keeps longer overseas journeys just a dream.
  culinary: Culinary explorer Trey Stapleton, an intermediate home chef, delights in crafting Detroit‑style pizza topped with smoked mozzarella and caramelized onions, they perfect a sourdough starter on
    weekends, and whip up turmeric‑infused roasted chickpea bowls while hunting farmers‑market treasures like heirloom carrots and fresh basil.
  core: Trey Stapleton blends spontaneous creativity with Midwestern humility, they juggle endless storytelling and impromptu art projects while habitually losing track of deadlines and misplacing receipts.
background:
  cultural: Trey grew up in the Detroit metropolitan area, raised in a working‑class white family with deep Midwestern roots. His upbringing blended the modest, community‑oriented values typical of the
    region—hard work, humility, and a strong sense of neighborliness—with exposure to the city’s vibrant music and street‑art culture. He celebrates traditional American holidays, but also participates
    in local events such as the Detroit Summer Festival and community art fairs. His family background includes German and Polish ancestry common in the area, and his upbringing emphasized cooperation and
    kindness, shaping his considerate nature. Living in Lincoln Park, he enjoys the mix of suburban stability and easy access to Detroit’s cultural scene.
