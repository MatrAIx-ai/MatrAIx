  hobbies: '[''Quilting and textile arts'', ''Visiting art galleries and museums'', ''Attending live jazz and spoken‑word performances'', ''Community dance classes'', ''Gardening'', ''Hosting soul‑food
    potlucks'', ''Volunteering at community‑center art programs'', ''Mentoring youth in creative projects'', ''Reading contemporary fiction'', ''Journaling and guided meditation'']'
  career_goals: Natima hopes to advance into a supervisory role where she can mentor younger workers and shape an inclusive workplace culture. She dreams of blending her technical expertise with her artistic
    curiosity by leading a company-sponsored community art program that uses cutting technologies to create collaborative textile art. In the longer term, she envisions launching her own small studio offering
    custom cut‑and‑sew services and running workshops that combine craft, storytelling, and cultural heritage, allowing her to give back to the Jacksonville community while achieving financial stability.
