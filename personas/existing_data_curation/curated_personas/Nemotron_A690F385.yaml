personas:
  professional: Dorothy Long, a seasoned public librarian in Kern County with a knack for digital archiving, uses Python scripts to streamline MARC cataloging while orchestrating community art exhibitions,
    and now aims to direct a makerspace that fuses technology, local history, and intergenerational learning.
  sports: Dorothy Long hikes the Sierra Nevada foothills on weekends, belongs to the Kern County Trails Club, follows the Los Angeles Dodgers and Lakers avidly, and hosts a senior walking group that meets
    thrice weekly for low‑impact cardio.
  arts: Dorothy Long curates local exhibitions featuring photographers like Ansel Adams and community muralists, volunteers at the Bakersfield Museum of Art, and spends evenings immersed in Monet’s water
    lilies and Frida Kahlo’s self‑portraits, shaping her identity through a blend of classic and contemporary visual arts.
  travel: Dorothy Long plans meticulously for weekend road trips across the Southwest, having explored Sedona’s red rock trails, Antelope Canyon’s slot canyons, and the historic towns of Jerome and Bisbee,
    and now dreams of driving the Pacific Coast Highway from Monterey to Santa Barbara to photograph coastal architecture.
  culinary: Dorothy Long, an avid home chef, sources heirloom tomatoes, rosemary, and locally raised trout from farmers’ markets to craft dishes like rosemary‑infused olive oil crostini, grilled trout with
    citrus‑oregano glaze, and a seasonal heirloom tomato‑goat cheese tart that they share at dinner parties with friends.
  core: Dorothy Long blends a lifelong curiosity for art, history, and technology with a tendency to overbook their calendar, turning every community event into a chance to network, learn, and occasionally
    forget to sleep.
background:
  cultural: Dorothy grew up in a multi‑generational, white American family rooted in the Central Valley’s agricultural community. Raised in a modest, Protestant household, she values self‑reliance, hard
    work, and community service—principles reinforced by the close‑knit neighborhoods of Bakersfield. The region’s blend of farming heritage and a growing arts scene has shaped her appreciation for both
    tradition and innovation. She is attuned to the cultural tapestry of Kern County, recognizing Hispanic influences in local festivals, cuisine, and music, and often participates in the annual Kern County
    Fair. Her identity reflects a balance of Midwestern work ethic, Californian openness to new ideas, and a deep commitment to enriching her community’s cultural and informational resources.
attributes:
  skills: '["Cataloging and Classification", "Reference and Research Assistance", "Digital Archiving and Metadata Management", "Library Management Software (SirsiDynix, Evergreen, Koha)", "Data Analysis
    and Reporting (Excel)", "Basic Python Programming for Automation", "Event Planning and Community Outreach", "Public Speaking and Workshop Facilitation", "Customer Service and Conflict Resolution", "Art
    Exhibit Curation and Display Design"]'
  hobbies: '["Visiting museums, galleries, and community art installations", "Reading historical non‑fiction and contemporary fiction", "Participating in a neighborhood book club", "Gardening (roses, native
    succulents)", "Hiking in the Sierra Nevada foothills", "Weekend road trips across the Southwest", "Photography of architectural and historic subjects", "Cooking farm‑to‑table meals and exploring new
    recipes", "Genealogy research using library archives", "Learning and experimenting with new digital tools"]'
  career_goals: Looking ahead, Dorothy aims to transition into a supervisory or program‑director role within the Kern County Library system. She plans to pursue a Master of Library and Information Science
    (MLIS) to deepen her expertise in collection development, strategic planning, and community engagement. Her primary ambition is to lead the creation of a makerspace and intergenerational learning programs
    that combine technology, art, and local history. She also hopes to mentor junior staff, forge partnerships with schools, local artists, and historical societies, and secure grant funding for digitizing
    Kern County’s archival materials. While she envisions a phased approach to retirement, she intends to remain active as a volunteer leader, ensuring lasting access to information and cultural experiences
    for the community.
