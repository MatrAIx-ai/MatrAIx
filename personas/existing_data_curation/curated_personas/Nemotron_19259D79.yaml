  career_goals: Although retired, Donald aims to stay involved in education by volunteering as a mentor for new teachers at the local high school, contributing oral histories and archival materials to the
    Madison County Historical Society, and writing a memoir that reflects on his decades of teaching. He also hopes to establish a modest scholarship fund to support students pursuing arts education in
    his community.
