  hobbies: '[''Sketching and watercolor painting'', ''Urban photography'', ''Exploring historic neighborhoods'', ''Volunteering at community shelters'', ''Cooking traditional Spanish dishes'', ''Yoga and
    mindfulness meditation'', ''Reading poetry'', ''Listening to Flamenco and Latin folk music'']'
  career_goals: Yesenia aspires to transition into a supervisory role where she can mentor younger workers and champion safety and inclusivity on site. She plans to obtain a certified construction safety
    trainer credential and eventually lead community‑focused building projects, such as affordable housing renovations that incorporate local art installations. Her long‑term ambition is to co‑found a nonprofit
    that mobilizes volunteers and skilled labor to create safe, aesthetically uplifting spaces for vulnerable populations, blending her construction expertise with her love for art and community harmony.
