persona_description: A volcanologist who specializes in the study of volcanic ash, particularly its effects on aviation and the operation of jet engines. He/She is a professor at LMU Munich and has conducted
  experiments on volcanic ash samples obtained from Eyjafjallajökull volcano and Santiaguito volcano. His/Her research interests include the thermal stability of volcanic ash, the effects of volcanic ash
  on jet engines, and the assessment of the threat posed by volcanic ash to jet-engine turbines. His/Her expertise and knowledge are highly sought after in the aviation industry and the scientific community.
