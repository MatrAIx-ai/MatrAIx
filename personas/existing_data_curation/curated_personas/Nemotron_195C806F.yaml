  hobbies: '[''Fishing'', ''Hiking'', ''Reading Technology Articles'', ''Podcasts'', ''DIY Electronics'', ''Cooking/Grilling'', ''Board Games'', ''Local County Fairs'', ''Casual Basketball'', ''Traveling
