    leadership'', ''Sustainable landscaping practices'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Community gardening'', ''Woodworking'', ''Attending horse racing events'', ''Reading gardening magazines'', ''Playing cards with friends'', ''Volunteer park clean‑up'',
    ''Nature photography'']'
  career_goals: Trent aims to transition from full‑time crew work to owning a modest, family‑run landscaping business that specializes in eco‑friendly designs for the Saratoga Springs community. He plans
    to earn a professional horticulture certification within the next two years, expand his service offerings to include native‑plant restoration and water‑wise irrigation consulting, and mentor younger
    crew members as a senior foreman. While he values the stability of his current role, his long‑term ambition includes a gradual semi‑retirement that lets him focus on community garden projects and occasional
    consulting work.
