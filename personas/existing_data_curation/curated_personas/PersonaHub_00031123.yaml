persona_description: A historian or archaeologist interested in the study of the Cook Collection and its artifacts, particularly those related to the New Caledonia region and the history of the Pacific
  Islands. They have a deep understanding of the history and culture of the Cook Collection, including its origins, provenance, and significance. They are also knowledgeable about the techniques and methods
  used to study and document artifacts, such as the varnish-like patina and the use of coconut oil and abrasives. They are likely to be interested in the cultural significance of the artifacts, such as
  their role in the history of the Cook Collection and their potential to provide insights into the lives and cultures of the people who used them.
