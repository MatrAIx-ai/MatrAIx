personas:
  professional: Milly Bautista, a budding preschool explorer, demonstrates early problem‑solving skills and a vivid imagination while organizing story‑time corners and flexibly joining group play, showing
    an unusually reliable yet gentle approach for a 3‑year‑old.
  sports: Milly Bautista, an enthusiastic participant in the downtown junior soccer club’s under‑5 team, loves dribbling a foam ball and cheering for the city’s professional baseball team, the Tigers, while
    preferring short, supervised play sessions over competitive matches.
  arts: Milly Bautista, a tiny aficionado of children’s music and visual arts, spends afternoons finger‑painting to the tunes of The Wiggles and Disney’s ‘Let It Go,’ and collects Crayola crayons while
    admiring the picture books by Eric Carle.
  travel: Milly Bautista, a curious toddler who enjoys family road trips to the nearby aquarium and beach sandcastle contests, dreams of visiting Disney World in Florida and the Great Barrier Reef for a
    splash‑filled adventure.
  culinary: Milly Bautista, a selective eater, adores cheesy macaroni, banana pancakes with maple syrup, and strawberry yogurt, often helping stir batter with a plastic spoon while turning their nose up
    at broccoli.
  core: Milly Bautista, a curious yet cautious 3‑year‑old, balances wonder with worry, thrives on quiet creativity and gentle compassion, and occasionally pouts over denied snack choices.
background:
  cultural: Milly grows up in a bilingual Mexican‑American household in Grand Rapids, Michigan. At home, Spanish is spoken alongside English, and her family celebrates Mexican traditions such as Día de
    los Muertos, Cinco de Mayo, and Christmas with colorful altars, traditional foods like tamales, pozole, and pan de dulce, and lively music. She also partakes in Midwestern American customs, including
    Thanksgiving feasts and community park events. This blend of Mexican heritage and local Midwestern culture nurtures her appreciation for art, curiosity about new experiences, and strong sense of compassion
    and community.
attributes:
  skills: '["Basic motor skills (running, climbing, balancing)", "Early language development (vocabulary of 200+ words)", "Color and shape recognition", "Counting from 1 to 10", "Crayon drawing and scribbling
