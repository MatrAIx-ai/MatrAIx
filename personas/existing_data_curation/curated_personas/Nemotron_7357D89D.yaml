  hobbies: '["Crayon drawing", "Singing and dancing to children''s songs", "Exploring backyard garden", "Building block towers", "Pretend play with dolls", "Reading picture books with parents", "Small playdates
    with familiar children", "Participating in family Mexican cultural activities (dance, cooking)"]'
  career_goals: Although still very young, Milly frequently expresses dreams of helping others and creating beautiful things. She talks about wanting to become a teacher so she can share stories and teach
    friends, a doctor who can heal people when they are hurt, or an artist who paints colorful pictures. She also mentions caring for animals, imagining herself as a veterinarian. These aspirations reflect
    her compassionate nature, love of art, and desire to make a positive impact on the world.
