  career_goals: Enrique aims to pursue a career that blends his love of hands‑on work with his curiosity about technology. He envisions studying agricultural engineering or a technical trade that lets him
    improve farm efficiency, while also keeping the option open to become a bilingual community liaison or small business owner in his hometown. He is motivated to earn a high school diploma, attend a technical
    college, and eventually contribute to modernizing local agriculture in a way that respects his cultural roots and the practical needs of his community.
