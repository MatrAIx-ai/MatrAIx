personas:
  professional: Cecilia Keith, a newborn with an uncanny curiosity and methodical approach to play, instinctively organizes high‑contrast blocks by color and shape and babbles rhythmically during group
    cuddle sessions, hinting at future strengths in data analysis, design, and public speaking as they naturally become the center of attention.
  sports: Cecilia Keith enjoys daily tummy‑time as functional exercise, attends a parent‑child swimming class at the community center, and absorbs the excitement of family‑wide viewings of the Los Angeles
    Lakers and Seattle Seahawks, which subtly nurture an early love for team spirit and coordinated movement.
  arts: Cecilia Keith delights in the soft piano melodies of Mozart, giggles at the vibrant illustrations of Eric Carle’s The Very Hungry Caterpillar, and shows fascination with a rotating mobile featuring
    abstract sculptures, revealing a nascent appreciation for both auditory and visual artistry.
  travel: Cecilia Keith has already been soothed by the gentle sea breeze on a family weekend trip to the coastal dunes of Outer Banks and dreams—through parental stories—of future adventures to the historic
    streets of Paris and the serene temples of Kyoto.
  culinary: Cecilia Keith’s palate currently favors pureed carrots, creamy avocado mash, and apple‑cinnamon sauce, and they eagerly explore new textures while sometimes rejecting unfamiliar flavors with
    a single fussy sigh.
  core: Cecilia Keith is a curious, organized, and sociable newborn who balances a budding love for patterns with an early‑life anxiety about routine changes, making them both the charming center of any
    gathering and a tiny bundle of high‑energy worry.
background:
  cultural: Cecilia is raised in a white, middle‑class American family in Colorado Springs, Colorado. Her upbringing reflects the Mountain West's emphasis on outdoor recreation, community involvement, and
    a respect for natural beauty. The family values structured routines, frequent museum visits, and exposure to diverse artistic experiences, fostering an appreciation for both mainstream American culture
    and the regional heritage of the Rockies. This blend of organized home life, artistic encouragement, and sociable community ties shapes her worldview and personal development.
attributes:
  skills: '["Sensory curiosity and visual pattern tracking", "Auditory discrimination (responds to music and speech)", "Early vocalization (babbling and cooing)", "Social smiling and reciprocal interaction",
