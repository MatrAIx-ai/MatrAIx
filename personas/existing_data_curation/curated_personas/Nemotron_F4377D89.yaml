personas:
  professional: Larry Jeancharles is a budding elementary school organizer who leads class projects and school event planning, using their natural discipline, love for routine, and charismatic presence
    to keep peers on track and motivated.
  sports: Larry Jeancharles captains the West Memphis Youth Hoops basketball team, plays flag football in the local league, and avidly supports the Arkansas Razorbacks, emulating NBA star LeBron James during
    practice while organizing teammates with a precise game‑day schedule.
  arts: Larry Jeancharles shines in the school choir and drama club, passionately performing gospel hymns learned at the Baptist church and reciting lines from classic plays, while drawing inspiration from
    blues legends B.B. King and Muddy Waters and the storytelling magic of Disney’s The Lion King.
  travel: Larry Jeancharles prefers structured family road trips that include a clear itinerary and game‑time breaks, having explored Memphis’s music museum, soaked in Hot Springs’ historic bathhouses,
    and hoping to one day visit Washington, D.C.’s National Air and Space Museum, all while balancing a modest allowance with parental guidance.
  culinary: Larry Jeancharles delights in helping plan the Sunday barbecue, favoring smoky pulled pork, buttery corn on the cob, and sweet potato casserole, while also mastering the art of a perfect peanut
    butter and jelly sandwich at school and dreaming of cooking gumbo with okra and Cajun spices as a future kitchen challenge.
  core: Larry Jeancharles is a disciplined, sociable eight‑year‑old who channels a love of routine and performance into school leadership, budgeting, and community gatherings, yet sometimes lets worry and
    a sweet‑tooth streak spark harmless chaos.
background:
  cultural: Larry is raised in West Memphis, Arkansas, within a close-knit African-American family that values community, faith, and perseverance. His parents emphasize routine, punctuality, and academic
    excellence, reflecting a generational belief in education as a pathway to opportunity. He attends a local public elementary school and a Baptist church where he learns gospel music and participates
    in youth activities. Community traditions such as Sunday barbecues, Juneteenth celebrations, and neighborhood block parties provide him with regular social gatherings that reinforce his sociable nature.
    The region's blues and soul music heritage influences his musical interests, and the strong emphasis on respect, responsibility, and mutual support shapes his worldview.
attributes:
  skills: '["Organizing classroom materials", "Following daily routines", "Reading at grade-4 level", "Multiplication tables (1-12)", "Clear written expression", "Public speaking and presentation", "Leadership
