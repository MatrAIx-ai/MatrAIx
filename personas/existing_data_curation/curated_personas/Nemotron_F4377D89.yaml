  hobbies: '["Basketball", "Flag football", "LEGO building", "Jigsaw puzzles", "Reading adventure series", "Singing in church choir", "School drama club", "Organizing family gatherings", "Memorizing gospel
    hymns"]'
  career_goals: Larry frequently shares that he wants to become a teacher or coach because he enjoys helping others learn and leading activities. He also imagines being a police officer or firefighter,
    seeing these roles as orderly, service-oriented, and community-focused. He aspires to earn top grades, win school spelling bees, and eventually attend a high-performing high school where he can excel
    in mathematics and science, laying the groundwork for a future career in engineering or medicine. He aims to maintain his reputation as a reliable, disciplined student and hopes to one day mentor younger
    children in his neighborhood.
