  hobbies: '[''vegetable gardening'', ''reading historical and technology articles'', ''listening to Mexican folk music'', ''cooking traditional Mexican dishes'', ''woodworking'', ''jigsaw puzzles'', ''journaling'',
    ''attending quiet church services'']'
  career_goals: Even in retirement, Norlan remains driven to achieve personal milestones that reflect his disciplined nature. He aims to complete a written memoir chronicling his family's migration story,
    curate a digital archive of photographs and oral histories, and master the construction of a traditional Mexican kitchen garden. Maintaining financial security for himself and his wife is a top priority,
    as is quietly mentoring younger community members in basic Spanish and gardening to preserve cultural continuity without seeking attention.
