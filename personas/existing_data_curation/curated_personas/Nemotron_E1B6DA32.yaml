  career_goals: Jacob dreams of one day designing robots that can help people, especially in everyday tasks like cleaning or assisting older neighbors. He imagines himself as a robotics engineer who builds
    machines from LEGO and later real components, merging his curiosity about how things work with a desire for practical impact. He also enjoys friendly competition, so he hopes to compete in school science
    fairs and, eventually, in youth robotics leagues, aiming to win awards that recognize both creativity and functional design.
