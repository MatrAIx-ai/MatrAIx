personas:
  professional: Jacob Plyler, a budding LEGO engineer who constructs motorized builds, blends curiosity with practical problem‑solving, and thrives on spontaneous trial‑and‑error rather than rigid plans.
  sports: Jacob Plyler, a spirited participant in his neighborhood youth soccer league during fall and spring, idolizes the energy of the local high‑school team and follows the professional success of New
    York City FC, while also cheering for the hometown baseball club in the summer, blending competitive zeal with occasional solo drills by the creek.
  arts: Jacob Plyler, an imaginative cartoonist who sketches inventions inspired by LEGO machines, draws influence from the whimsical art of Bill Watterson’s Calvin and Hobbes and the dynamic style of Stan
    Lee, and shares his doodles with family during weekend gatherings.
  travel: Jacob Plyler, an adventurous seven‑year‑old who prefers spontaneous day trips to nearby state parks like Yellowstone’s geysers or local creek explorations over rigid itineraries, dreams of visiting
    the Dinosaur National Monument and Japan’s Nara Park, yet his travel plans are often shaped by his parents’ budget and school schedule.
  culinary: Jacob Plyler, a budding chef who confidently whips up peanut butter‑banana sandwiches, loves piping hot cheese pizza topped with pepperoni and olives, and enjoys snacking on carrot sticks and
    apple slices, but frequently forgets to finish his veggies after meals.
  core: Jacob Plyler is a curious, competitive LEGO builder who balances spontaneous inventiveness with a laid‑back habit of misplacing his tools and allowance money.
background:
  cultural: Jacob was born and raised in Louisville, Kentucky, in a family that blends traditional Southern values with modern urban influences. His parents encourage independence and practical skills,
    such as helping with grocery shopping or simple cooking, while also nurturing his inquisitive nature through museum visits and science‑center outings. The community’s friendly, hospitality‑oriented
    atmosphere is evident in neighborhood block parties and local festivals like the Kentucky Derby celebrations, which Jacob experiences through family gatherings. At school, he interacts with a diverse
    group of peers, giving him exposure to a range of cultures beyond his own, and his media consumption includes both classic American cartoons and globally popular video games.
