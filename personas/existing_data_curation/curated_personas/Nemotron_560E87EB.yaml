  career_goals: Ruth aims to transition from a direct service role to a supervisory and program‑development position within a nonprofit or municipal human services agency in Dallas. She plans to earn a
    Master’s in Social Work (MSW) or a certification in Community Mental Health to deepen her clinical knowledge. Her long‑term ambition is to design and lead an integrated community‑based program that
    combines data‑driven outcomes with artistic interventions for adults dealing with anxiety and depression. She also hopes to influence local policy by presenting evidence‑based research on the benefits
    of creative therapies, and eventually to mentor younger social service professionals, fostering a culture of curiosity and methodological rigor.
