    art club participation","Hiking and trail exploring","Attending local fairs and festivals"]'
  career_goals: Tania aspires to become a multimedia artist who can blend traditional illustration with digital media. She hopes to attend a specialized art program at a regional high school or community
    college and eventually earn a scholarship for a visual arts degree. Her long‑term ambition is to work freelance, creating illustrations for books, indie games, and local cultural projects, while maintaining
    a flexible schedule that respects her preference for autonomy. She also dreams of contributing to a community art center in Cambria County, using her skills to tell local stories and mentor younger
    students in creative expression.
