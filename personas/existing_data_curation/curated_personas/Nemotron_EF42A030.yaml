personas:
  professional: Evelyn Arsenault, a veteran power‑plant operator with three decades of expertise in electrical distribution, safety auditing, and emergency response, leverages her methodical, organized
    nature and supportive communication style to mentor junior staff while meticulously managing shift reports under high‑pressure situations.
  sports: Evelyn Arsenault enjoys low‑impact fitness through a weekly walking group with the Delaware River Walkers Club, cheers on the Philadelphia Eagles in the fall football season and the Philadelphia
    Phillies at summer baseball games, and occasionally joins a recreational softball league at the senior center, viewing sport as both social bonding and gentle exercise.
  arts: Evelyn Arsenault regularly volunteers backstage at the local community theater, where she helps stage productions of classics like Arthur Miller’s *Death of a Salesman* and modern pieces by Anna
    Deavere Smith, while she relaxes at home listening to folk singer Gordon Lightfoot and attending occasional performances by the Philadelphia Orchestra featuring works by Mozart.
  travel: Evelyn Arsenault favors meticulously planned road trips to historic New England sites such as Boston’s Freedom Trail, Salem’s witch museums, and Acadia National Park, balancing her love of heritage
    travel with a modest budget and family obligations, while dreaming of a future pilgrimage to the old towns of England’s Cotswolds.
  culinary: Evelyn Arsenault, a competent home cook who harvests rosemary, thyme, and basil from her vegetable garden, delights in preparing a family‑recipe tourtière layered with spiced pork and beef,
    pairs it with a crisp apple‑cider reduction, and often serves seasonal ratatouille featuring zucchini, bell peppers, and fresh tomatoes.
  core: Evelyn Arsenault blends a disciplined, detail‑oriented work ethic with an exuberant community spirit, yet her chronic worry about flawless execution sometimes leads them to over‑schedule both professional
    duties and volunteer commitments.
background:
  cultural: Evelyn descends from French‑Canadian (Acadian) ancestors who settled in New England before moving to New Jersey in the mid‑20th century. Growing up in a bilingual household, she was exposed
    to both English and French customs, celebrating holidays like Saint‑Jean‑Baptiste and incorporating traditional foods into family gatherings. Living in Bordentown, a diverse suburban community, she
    blends her heritage with mainstream American values of hard work, community service, and personal responsibility. This cultural mix informs her respectful, cooperative demeanor and her commitment to
    preserving family traditions while actively contributing to the broader local community.
