  career_goals: Evelyn aims to transition into a senior supervisory role where she can shape safety culture and operational efficiency across the plant. She plans to obtain NERC certification and lead a
    mentorship program for younger technicians, emphasizing reliability and well‑being. Over the next five years, she hopes to spearhead initiatives that incorporate more renewable energy sources into the
    grid, while maintaining a balanced workload that supports her family and personal health.
