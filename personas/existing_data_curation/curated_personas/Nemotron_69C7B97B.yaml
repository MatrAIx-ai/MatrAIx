  career_goals: Richard aims to transform his curiosity and love for the arts into a tangible impact on Phoenix’s cultural scene. He envisions launching a mobile pop‑up art space that hosts rotating installations,
    interactive workshops, and community‑driven performances, positioning himself as a catalyst for unconventional artistic expression. By curating these experiences, he seeks recognition as a local cultural
    influencer and consultant for city arts initiatives. He also aspires to develop a podcast and occasional column where he interviews artists, explores avant‑garde ideas, and challenges mainstream narratives.
    On a personal level, Richard wants to build a supportive network of creators, achieve financial independence through freelance consulting and event commissions, and eventually author a book on creative
    spontaneity. While competitive, he values personal fulfillment and hopes these ventures will provide a structured outlet for his ideas without imposing the rigid deadlines that have previously caused
    stress.
