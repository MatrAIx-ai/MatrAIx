  hobbies: '[''Soccer'', ''Salsa and bomba dancing'', ''LEGO building'', ''Creative writing'', ''Scratch animation and coding'', ''Beach clean‑up volunteering'']'
  career_goals: Deborah dreams of becoming a marine biologist who can protect Puerto Rico’s coastal ecosystems, a goal inspired by her love of beach clean‑ups and curiosity about ocean life. She also envisions
    a future as a science communicator—hosting a kid‑friendly video series that blends her passion for storytelling, public speaking, and technology. In the longer term, she hopes to lead a community youth
    program that combines environmental stewardship with STEM education, channeling her competitive spirit into empowering other children to excel in science competitions.
