personas:
  professional: Deborah Magana is a budding coder who creates animated videos using Scratch, channeling their curiosity and practicality into digital storytelling while leveraging their competitive edge
    to win school tech contests.
  sports: Deborah Magana is a spirited soccer player on the Trujillo Alto Youth Soccer Club, practicing dribbling drills after school, cheering for the local baseball team Los Leones, and joining weekend
    beach clean‑up runs that double as fitness sessions where they stay active.
  arts: Deborah Magana expresses their creative side through salsa and bomba dancing at family gatherings, building intricate LEGO cityscapes, writing adventure stories about tropical islands, and remixing
    beats inspired by artists like Bad Bunny and Celia Cruz in their Scratch projects.
  travel: Deborah Magana loves weekend trips to Playa Grande for snorkeling, day outings to historic Old San Juan, and dreams of exploring the waterfalls of El Yunque, planning each adventure with a detailed
    scrapbook checklist they meticulously organize.
  culinary: Deborah Magana enjoys munching on homemade alcapurrias and mango‑sticky rice, helps their parents prepare arroz con gandules for fiestas, and proudly attempts to bake banana bread, though they
    often over‑mix the batter, resulting in a denser loaf.
  core: Deborah Magana is a charismatic ten‑year‑old who blends competitive curiosity with community spirit, turning every soccer game, LEGO build, and beach clean‑up into a chance to lead, learn, and laugh.
background:
  cultural: Deborah is a proud Puerto Rican raised in the Trujillo Alto municipality of San Juan. Her household blends Spanish and English, reflecting the island’s bilingual reality, and she celebrates
    traditional fiestas such as San Juan Bautista with music, food, and family gatherings. Growing up, she has been immersed in the rhythms of plena, bomba, and reggaetón, and she often hears stories of
    Puerto Rico’s vibrant history and natural beauty. Her family places high value on community, respect for elders, and Catholic traditions, which shape her sense of responsibility and her involvement
    in local volunteer projects. These cultural influences give her a strong sense of identity and motivate her to contribute positively to her island community.
attributes:
  skills: '[''Bilingual literacy (Spanish/English)'', ''Basic coding (Scratch)'', ''Logical puzzle solving'', ''Public speaking and group facilitation'', ''Organized note‑taking and time management'', ''Competitive
