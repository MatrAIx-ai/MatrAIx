  career_goals: Looking ahead, Abdallah aims to pursue a career that blends his love for structure, problem solving, and creating tangible results. He is drawn to engineering fields—particularly civil or
    mechanical engineering—where he can apply his planning abilities to design and build. He also imagines a future as a software developer, expanding his current interest in Python. His goal is to earn
    a scholarship to a university with strong STEM programs, maintain high academic performance, and eventually secure a stable, predictable career path that offers clear milestones and the chance to contribute
    to his community.
