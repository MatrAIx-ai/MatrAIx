personas:
  professional: Abdallah Lattimore is a budding teen engineer who spends afternoons at the robotics club, designing simple machines and coding, applying a methodical, goal‑oriented mindset from chess to
    prototype functional robots, while they keep a disciplined schedule that balances schoolwork and hobby projects.
  sports: Abdallah Lattimore jogs the local Eastside Trail three times a week, is a member of the community Youth Running Club, and passionately follows the Dallas Cowboys while avidly supporting their
    high school football team, often analyzing game statistics with the same precision they apply to chess openings.
  arts: Abdallah Lattimore enjoys the strategic beauty of board games like Twilight Imperium, immerses themselves in the cinematic scores of Hans Zimmer and the video‑game soundtrack of StarCraft composed
    by Jeremy Soule, and occasionally sketches technical diagrams in a sketchbook while assembling model airplanes, blending technical precision with artistic appreciation.
  travel: Abdallah Lattimore prefers meticulously planned trips, having visited the Smithsonian National Air and Space Museum in Washington, D.C., and the Grand Canyon on a family road‑trip, and dreams
    of a summer excursion to Osaka, Japan, to explore its robotics exhibitions and sushi stalls, always drafting detailed itineraries and budgeting each day in advance, which they find both calming and
    motivating.
  culinary: Abdallah Lattimore favors structured meals like a DIY sushi roll kit, classic spaghetti carbonara, and homemade trail‑mix snacks, often cooking with precise measurements and experimenting with
    ingredients such as soy sauce, parmesan, and smoked paprika, while they occasionally indulge in sugary cereal during late‑night video‑game sessions.
  core: Abdallah Lattimore is a meticulous teen who turns every hobby into a checklist, from model planes to chess rankings, yet battles a persistent undercurrent of worry that fuels both their discipline
    and occasional over‑thinking, and they often replay strategic scenarios in their mind before sleep.
background:
  cultural: Abdallah was raised in Cookeville, a small city in central Tennessee with a predominantly white, Appalachian-influenced community. His family follows traditional Southern values, emphasizing
    hospitality, hard work, and close‑knit relationships. Church activities and local county fairs are regular parts of his upbringing, providing a sense of community and shared tradition. The region’s
    practical mindset—valuing hands‑on skills, self‑reliance, and modest ambition—shapes his outlook, while the slower pace of life and appreciation for country music and local cuisine offer a comforting
    backdrop to his daily routine.
