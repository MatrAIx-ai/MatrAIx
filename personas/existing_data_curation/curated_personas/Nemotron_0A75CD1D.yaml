  career_goals: He hopes to work in a field where he can combine his love for people and his practical skills. Rahim dreams of becoming a youth soccer coach who can teach kids the fundamentals of the game
    while fostering teamwork and confidence. He also imagines a future as an elementary school teacher, creating hands‑on lessons that make learning fun and relatable. Occasionally, he thinks about opening
    a small kitchen stall someday to share his family’s traditional Ecuadorian recipes with his community.
