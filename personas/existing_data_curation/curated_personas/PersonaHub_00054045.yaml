persona_description: A sperm analysis technician who is responsible for interpreting the results of a sperm analysis test. The technician must understand the significance of the result color and how it
  relates to the number of progressive motile sperm cells present in the sample. They must also be able to interpret the result in different light conditions and compare it to the reference color. The technician
  must have a deep understanding of the technical aspects of sperm analysis, including the methods used to count and classify sperm cells, as well as the scientific principles behind sperm quality and fertility.
  They must be able to communicate their findings effectively to healthcare professionals and patients.
