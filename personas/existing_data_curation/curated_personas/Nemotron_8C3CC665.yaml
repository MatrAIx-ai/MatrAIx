personas:
  professional: Maria Gretah, a 53‑year‑old veteran secondary‑school teacher, blends rigorous curriculum standards with imaginative STEAM‑infused lessons, leveraging digital tools and her knack for abstract
    photography to spark curiosity while mentoring new teachers and planning a district‑wide arts initiative.
  sports: Maria Gretah, a hiking enthusiast, belongs to the Midwest Trailblazers Hiking Club, enjoys weekend birdwatching treks in the Hoosier State’s state parks, supports the Indianapolis Colts and Indiana
    Pacers, and squeezes in weekly intramural tennis at the community center to stay active.
  arts: Maria Gretah, an avid oil‑and‑watercolor painter and abstract photographer, draws inspiration from Georgia O’Keeffe, James Turrell, and Ansel Anielski, volunteers as a set designer for the local
    community theater, curates installations for regional art fairs, and relishes indie screenings of directors like Lynne Ramsay and Jim Jarmusch.
  travel: Maria Gretah prefers thoughtful, medium‑budget journeys that mix cultural immersion with natural wonder, having trekked the red‑rock trails of Sedona, explored the historic villages of Provence,
    and attended a contemporary art fest in Berlin, while planning future trips to the Pacific Northwest’s coastline and the literary cafés of Dublin.
  culinary: Maria Gretah, an enthusiastic home cook, often prepares Mediterranean‑inspired dishes such as ratatouille, lemon‑herb grilled salmon, and fresh rosemary focaccia, delights in experimenting with
    dark chocolate ganache for desserts, and enjoys sourcing heirloom tomatoes and fresh basil from her garden to enrich her meals.
  core: Maria Gretah, a creatively competitive 53‑year‑old educator, blends speculative art with rigorous teaching, prudently invests while splurging on supplies, proactively manages health, stays active
    through hiking and tennis, and fuels her imagination with indie films, travel, and hearty home‑cooked meals.
background:
  cultural: Maria Joan is a white Midwestern American raised in a small‑town community near Indianapolis. Her family lineage traces back to German and Irish immigrants who settled in Indiana during the
    late 19th century, instilling a heritage of hard work, self‑reliance, and community involvement. The cultural values of the Midwest—modesty, neighborly support, and a strong commitment to public education—have
    shaped her worldview. She actively participates in local fairs, supports the county library, and embraces a blend of traditional Midwestern modesty with a progressive appreciation for the arts and innovative
    ideas.
