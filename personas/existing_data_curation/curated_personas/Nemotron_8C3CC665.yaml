  hobbies: '[''Oil Painting'', ''Watercolor'', ''Speculative Fiction Writing'', ''Abstract Photography'', ''Gardening'', ''Birdwatching'', ''Community Theater Set Design'', ''Reading Modernist Literature'',
    ''Philosophy Podcasts'', ''Local Art Fair Attendance'', ''Hiking'']'
  career_goals: Maria Joan aims to complete a bachelor’s degree in Education to broaden her formal qualifications, and then pursue a department head role in English or the Arts within her district. She
    is driven to launch a district‑wide STEAM initiative that empowers students to explore abstract ideas through hands‑on projects. Long‑term, she hopes to publish articles on imaginative pedagogy in educational
    journals, earn recognition for innovative teaching practices, and serve as a mentor and trainer for novice teachers across Indiana. She also envisions establishing an after‑school community arts program
    that bridges school resources with local cultural institutions.
