  career_goals: Steven aims to advance into a senior operations director role within a mid-size company that aligns with his passion for the arts, such as a design studio or a cultural institution. He intends
    to obtain professional certifications like PMP and Six Sigma to deepen his expertise in strategic process improvement. Long-term, he envisions launching his own consultancy that helps small arts organizations
    streamline operations, adopt sustainable practices, and leverage technology for growth. He also aspires to mentor emerging managers, champion inclusive workplace cultures, and influence corporate social
    responsibility initiatives.
