  hobbies: '[''sketching'', ''watercolor painting'', ''street photography'', ''beach walks'', ''visiting art galleries'', ''reading contemporary fiction and non‑fiction'', ''DIY home decor projects'', ''volunteering
    at community art workshops'', ''listening to podcasts on science and philosophy'', ''yoga'']'
  career_goals: Pilar aims to obtain advanced certifications such as OSHA safety and Certified Materials Handler within the next two years, positioning herself for promotion to a warehouse supervisor or
    logistics coordinator role. She plans to enroll in an associate degree program in supply chain management to deepen her strategic understanding of logistics. Concurrently, she hopes to integrate her
    artistic interests by overseeing visual merchandising of warehouse displays or contributing to community art initiatives, ultimately seeking a career that blends operational efficiency with creative
    expression.
