  career_goals: Kathryn dreams of combining her love for art and technology. She envisions herself as a future graphic novelist who creates illustrated stories that explore imaginative worlds, or as a digital
    media artist who designs educational games that make learning fun. She is also fascinated by museums and hopes to become a curator who can bring contemporary art to her community. In the longer term,
    she wants to pursue a career that lets her share ideas, inspire curiosity in others, and make a positive impact on society.
