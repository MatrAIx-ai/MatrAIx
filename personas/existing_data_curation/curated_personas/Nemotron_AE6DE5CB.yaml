personas:
  professional: Kathryn Hogue, an aspiring junior game developer and storyteller, blends a love for fantasy novels with digital drawing and Scratch coding to create whimsical interactive stories, while
    balancing meticulous school assignments and spontaneous bursts of creative experimentation.
  sports: Kathryn Hogue, a nature‑loving weekend hiker who also plays forward on the Gwinnett Youth Soccer League U‑10 team, cheers for the Atlanta Braves and Atlanta United, enjoys swimming at the community
    pool, but they prefer quiet trail walks and bird‑watching over intense competition.
  arts: Kathryn Hogue, a budding illustrator who sketches dragon‑laden scenes and experiments with digital art on a tablet, attends the library’s art club where they study Studio Ghibli’s animation and
    Van Gogh’s brushwork, and draws inspiration from musicians like Lindsey Stirling and the whimsical scores of John Williams.
  travel: Kathryn Hogue, a curious traveler who has explored Washington, D.C.’s monuments, hiked the Blue Ridge Mountains, and dreams of visiting the Grand Canyon, they always plan family road‑trip playlists,
    pack a notebook for rock collections, and balance adventure with the comfort of familiar Southern hospitality.
  culinary: Kathryn Hogue, an eager home chef who loves whipping up creamy mac and cheese with sharp cheddar, baking peach cobbler with fresh Georgia peaches, experimenting with sushi rolls using cucumber,
    avocado, and crab, and collecting chocolate chip cookie recipes to bake with grandma, they also enjoy tasting new flavors at community potlucks.
  core: Kathryn Hogue is a curious, solitary 10‑year‑old who channels a love of fantasy into sketching, coding, and quiet library adventures, they juggle a secret stash of candy, an ever‑growing rock collection,
    and occasional impulse purchases of video games.
background:
  cultural: Kathryn comes from a white, middle‑class family in Lawrenceville, Georgia, a suburban community within Gwinnett County that blends Southern hospitality with the cultural diversity of the Atlanta
    metropolitan area. She attends a public elementary school where she participates in art and technology programs, and her family celebrates typical Southern traditions such as holidays with extended
    family gatherings and community events like the Gwinnett County Fair. The local library, community theater, and regional museums are frequent places for her to explore new ideas and artistic experiences,
    shaping her identity as a curious and community‑oriented American child.
