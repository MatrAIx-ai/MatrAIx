  career_goals: While not currently part of the formal workforce, Anna aims to expand her impact through volunteer leadership and community enrichment. She plans to launch a monthly arts‑and‑crafts workshop
    at the local library, leveraging her painting and photography skills to foster creative expression among adults and teens. Additionally, she aspires to develop a small‑scale community garden that supplies
    fresh produce to neighborhood seniors, coordinating volunteers and securing modest grants. To support these goals, Anna intends to enroll in a short online course on nonprofit grant writing and explore
    basic web design to create a simple website for her initiatives. She also dreams of compiling a memoir of her life in rural Wisconsin, blending personal stories with reflections on regional history.
