personas:
  professional: An experienced bus driver with a commercial license, Lourdes Alejandro leverages her STEM background and bilingual fluency to excel in route optimization, safety training, and mentor aspiring
    drivers, while balancing a pragmatic approach with a curiosity for emerging electric‑bus technology.
  sports: A dedicated outdoor enthusiast, Lourdes Alejandro hikes the coastal trails of Torrey Pines and La Jolla as part of the San Diego Hiking Club, follows the San Diego Padres baseball season religiously,
    joins a seasonal beach volleyball league in the summer, and integrates regular stretching into her regimen to manage knee soreness.
  arts: An avid photographer and folklórico dancer, Lourdes Alejandro captures sunrise vistas along the Pacific, admires the works of Frida Kahlo and the music of Carlos Santana and Lila Downs, and regularly
    attends local mariachi performances at community festivals.
  travel: With a love for road‑trip discovery, Lourdes Alejandro has explored Joshua Tree and the Baja peninsula, plans weekend getaways to Santa Fe and Vancouver, prefers a balanced itinerary that blends
    pre‑booked eco‑lodges with spontaneous stops at roadside fruit stands, and values travel as a chance to sample regional cuisines.
  culinary: An inventive home chef, Lourdes Alejandro blends heirloom chilies and San Diego tomatoes into classic dishes like chile relleno with avocado crema and grilled fish tacos, experiments with Californian‑inspired
    mole using fresh herbs and citrus, and takes pride in sourcing ingredients from her own garden.
  core: Balancing a pragmatic career in transit safety with a vibrant love for gardening, photography, and community mentorship, Lourdes Alejandro navigates life with curiosity, compassion, and a steady
    dose of practical optimism.
background:
  cultural: Lourdes’s Mexican heritage shapes much of her identity; she grew up in a bilingual household where Spanish was spoken daily, and she maintains close ties with family in Mexico through frequent
    visits and virtual celebrations. She observes traditional holidays such as Día de los Muertos and Las Posadas, often preparing customary foods like tamales and pan de muerto. Living in San Diego’s vibrant
    multicultural environment, she blends Mexican customs with Southern California’s diverse influences, fostering a deep appreciation for community, family gatherings, and cultural exchange. Her cultural
    values of respect, hospitality, and collective well‑being inform both her compassionate approach to passenger service and her commitment to community outreach.
attributes:
  skills: '[''Defensive Driving'', ''Commercial Driver’s License (CDL) with Passenger Endorsement'', ''Route Planning and GIS Mapping'', ''Bilingual Communication (Spanish/English)'', ''Customer Service
    and ADA Compliance'', ''First Aid and CPR Certification'', ''Mechanical Troubleshooting and Routine Bus Maintenance'', ''Conflict Resolution and De‑escalation'', ''Data Analysis for Transit Efficiency'',
    ''Community Outreach and Safety Education'']'
  hobbies: '[''Gardening (heirloom vegetables and chilies)'', ''Cooking traditional Mexican cuisine'', ''Hiking coastal trails in San Diego'', ''Reading non‑fiction on transportation and sustainability'',
    ''Tutoring high school students in math and physics'', ''Participating in community cultural festivals and folklórico dancing'', ''Photography of urban and natural landscapes'']'
  career_goals: Lourdes aims to advance within the San Diego Metropolitan Transit System by moving into a senior trainer or safety coordinator role, where she can mentor new drivers and develop comprehensive
    safety curricula. She aspires to spearhead a mentorship program that encourages young women, particularly from Hispanic backgrounds, to pursue careers in transportation and engineering. Leveraging her
    STEM background, she hopes to contribute to the agency’s transition to electric buses and greener routing strategies, and she plans to attain additional certification in transportation planning to influence
    city‑wide mobility policies.
