  career_goals: Even at three, Lynette expresses a desire to grow up in a caring, organized role. She often tells adults she wants to become a teacher or a community helper, drawn to professions where she
    can maintain order, support others, and create harmonious spaces. Her long‑term ambition is to work in a setting like a preschool or a neighborhood library where she can combine her love of routine
    with her compassionate drive to help children and families.
