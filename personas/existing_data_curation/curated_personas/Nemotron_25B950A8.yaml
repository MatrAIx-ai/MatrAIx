personas:
  professional: Lynette Vance is a budding miniature architect who spends hours arranging building blocks into perfectly ordered neighborhoods, constantly labeling each zone and rewarding themselves for
    meeting the high standards they set for their tiny creations.
  sports: Lynette Vance is a tiny soccer enthusiast who proudly wears a Portland Timbers jersey while practicing with the Little Strikers preschool club, and they squeal with delight each Sunday when the
    Timbers score a goal on TV, blending structured play with fandom.
  arts: Lynette Vance loves finger‑painting vivid dinosaurs while humming to Raffi’s ‘Baby Beluga’, adores the bright animation of Disney’s ‘Moana’, and frequently chants the alphabet song from Sesame Street,
    weaving together tactile creativity and beloved children’s performers.
  travel: Lynette Vance prefers meticulously planned family outings, delighting in the tactile wonder of the Oregon Coast’s tide pools and the interactive exhibits at the Oregon Museum of Science & Industry,
    while daydreaming about a future trip to Disney World’s magic kingdom.
  culinary: Lynette Vance savors creamy macaroni‑and‑cheese dusted with a pinch of paprika, loves sipping strawberry‑banana smoothies with a splash of almond milk, and confidently stirs a pot of vegetable
    soup under mom’s watchful eye, always insisting on a drizzle of olive oil for extra flavor.
  core: Lynette Vance is an ultra‑organized three‑year‑old who lines up toys by size, meticulously tracks every coin in their piggy bank, yet secretly frets over imagined mishaps, turning bedtime stories
    into rituals of worry‑soothing and perfection‑seeking.
background:
  cultural: Lynette is raised in a white, middle‑class family in Puyallup, Washington. Her household celebrates traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, with
    an emphasis on community gatherings and seasonal activities like the Washington State Fair. The Pacific Northwest environment instills in her an appreciation for nature, rain‑softened forests, and outdoor
    play. Her family values orderly routines, cooperation, and mutual support, reflecting the broader regional culture that emphasizes modesty, environmental stewardship, and strong neighborhood ties.
