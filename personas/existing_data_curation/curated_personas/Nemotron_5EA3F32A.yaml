  career_goals: Short-term, Nicusor aims to finish his high school equivalency (GED) and earn an entry-level IT certification such as CompTIA A+. He plans to enroll in a community-college program focused
    on computer engineering or networking, leveraging his hands-on hardware skills and curiosity about how things work. Long-term, he envisions a career as a network administrator or software developer
    where he can combine his methodical problem-solving with his competitive drive to build reliable systems. He also harbors an interest in sports management, hoping to someday coordinate youth sports
    leagues or serve as an operations manager for a recreational facility, blending his love for group activities with his organizational strengths. Throughout his career journey, he seeks stable, purposeful
    work that allows him to apply his practical mindset while providing opportunities for continuous learning.
