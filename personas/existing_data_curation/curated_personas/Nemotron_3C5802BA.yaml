  career_goals: Pedro hopes to transition to a senior mentor or safety‑advisor role before fully retiring, sharing his decades‑long knowledge with younger workers and helping the plant adopt safer, more
    inclusive practices. He aims to earn an OSHA certification and design a cultural‑awareness workshop that celebrates his Puerto Rican heritage. On a personal level, he wants to keep learning by taking
    community‑college courses in art history and digital photography, and eventually curate a small exhibition of his own photographs and woodworking pieces for a local senior center.
