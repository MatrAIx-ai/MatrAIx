  career_goals: Approaching retirement, Gustavo aims to transition from full‑time project execution to a consulting and mentorship role, focusing on legacy projects that enhance public infrastructure while
    reflecting his cultural heritage. He plans to lead a flagship sustainable‑design initiative for a community center serving Santa Barbara’s growing Latino population, and to establish a scholarship fund
    for Hispanic students pursuing engineering. By formalizing his knowledge in a series of technical white papers and workshops, he hopes to leave a clear, structured pathway for the next generation of
    engineers, ensuring his decades of experience continue to benefit both the profession and his community.
