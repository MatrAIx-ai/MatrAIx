  career_goals: James aims to transition from frontline driving to a leadership role within the logistics sector. In the next three to five years he plans to become a fleet supervisor or dispatch manager,
    overseeing route assignments and driver performance. To support this, he intends to earn a certificate in Logistics Management and complete training on advanced driver-assistance systems. Long-term,
    he dreams of launching his own neighborhood delivery service that emphasizes reliability, eco-friendly practices, and community partnerships. He also hopes to be recognized for mentoring newer drivers
    and contributing to safety initiatives.
