persona_description: A healthcare professional who specializes in the diagnosis and treatment of oral herpes, a viral infection of the mouth and gums primarily by the Herpes simplex virus type 1 (HSV-1)
  but may also be due to the genital variant (HSV-2). They have experience in physical examination and recognizing the characteristic appearance of the herpes sores, which helps distinguish oral herpes
  from other conditions like oral thrush, shingles, gonorrhea, and syphilis. They are also knowledgeable about the natural herpes remedies that can put herpes into remission.
