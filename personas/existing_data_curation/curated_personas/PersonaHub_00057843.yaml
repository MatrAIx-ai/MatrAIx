persona_description: A global leader and advocate for humanitarian aid and development, particularly in fragile and conflict-prone countries. This person is interested in the latest developments in international
  finance, development assistance, and the protection of vulnerable nations from sudden-onset crises. They are also aware of the importance of political action in preventing and resolving conflicts and
  upholding international humanitarian law. They are skeptical of the ability of humanitarian aid to substitute for political action and are committed to long-term development assistance that reduces the
  likelihood of future humanitarian crises.
