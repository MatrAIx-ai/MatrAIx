personas:
  professional: Dorothy Deal, a retired community‑event planner turned senior‑center activity chair, leverages her methodical planning skills and sociable spirit to orchestrate garden expansions, weekly
    socials, and intergenerational genealogy workshops, and they rarely let a detail slip.
  sports: Dorothy Deal, an avid supporter of the Cleveland Guardians and the Cleveland Browns, regularly attends senior‑center bowling nights with the local "Golden Years" league and fits gentle morning
    walks through Hocking Hills State Park into their routine to keep joints supple.
  arts: Dorothy Deal, a Church choir soprano and voracious reader of historical fiction by authors such as Ken Follett and Philippa Gregory, delights in the nostalgic melodies of Patsy Cline and the folk
    storytelling of Joan Baez, and never misses the community theatre’s summer production of "Our Town" when it comes to town.
  travel: Dorothy Deal, a seasoned road‑trip enthusiast, cherishes weekend drives to Ohio’s Hocking Hills State Park and annual visits to Lancaster County’s historic Amish country, while dreaming of a modest
    cruise to see Niagara Falls on the Great Lakes, all arranged with careful budgeting and coordinated family support.
  culinary: Dorothy Deal, a home‑cooking virtuoso, frequently prepares hearty Midwestern fare like chicken pot pie, buttery cornbread, and a signature tomato‑basil soup made from garden‑fresh tomatoes,
    rosemary, thyme, and fresh basil, and often trades their renowned biscuits for seed packets at the county fair.
  core: Dorothy Deal blends organized community stewardship, gentle curiosity, and practical thriftiness, while occasionally overwatering tomatoes and hoarding coupon binders for the next garden‑center
    sale.
background:
  cultural: Dorothy was born and raised in the Midwestern United States, growing up in a small Ohio town during the post‑World War II era. As a white American of primarily German‑Irish ancestry, she embodies
    the region’s values of hard work, modesty, community service, and family loyalty. Her upbringing in a close‑knit, church‑centered community shaped her sociable nature and commitment to volunteerism.
    She continues to celebrate local traditions such as county fairs, potluck gatherings, and seasonal holidays, while also maintaining an openness to new ideas that reflect her curious yet practical outlook.
