  career_goals: Although retired from formal employment, Dorothy aims to remain an active contributor to her community. She plans to lead the senior‑center activity committee, expand the local community
    garden, mentor younger volunteers in event coordination and genealogy, and continue learning new digital tools such as photo editing and online archival research. She also hopes to document and publish
    a memoir of her life in Butler County, preserving local history for future generations.
