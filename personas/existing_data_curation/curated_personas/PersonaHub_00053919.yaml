persona_description: A scientist who specializes in the development of mucosal vaccines, particularly those for the prevention of infectious diseases such as West Nile Virus. She has experience in the use
  of adjuvants to enhance the potency of vaccines and has tested various adjuvant candidates, including mast cell activators. Her research has focused on developing a two-dose, nasal vaccine for the prevention
  of West Nile Virus that can be delivered in dry powder form for easy storage and delivery.
