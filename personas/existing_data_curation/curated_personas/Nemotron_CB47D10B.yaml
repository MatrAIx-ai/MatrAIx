  career_goals: Although currently not in the workforce, Chelsea aims to secure a stable, routine‑focused position such as an office administrator or bookkeeping assistant at a local small business. She
    values a predictable schedule that allows her flexibility for personal interests. Over the next few years, she hopes to advance to an office manager or operations supervisor role, leveraging her organizational
    strengths and competitive drive. Long‑term, she envisions starting a modest freelance bookkeeping service that serves nearby entrepreneurs, providing her with both independence and a dependable income
    stream.
