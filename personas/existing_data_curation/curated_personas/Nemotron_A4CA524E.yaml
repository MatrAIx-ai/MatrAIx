  career_goals: Jessica often daydreams about future roles where she can help others and keep people safe. She imagines becoming a teacher who works with small groups of children, a nurse who cares for
    patients, or a veterinarian who looks after animals. Her compassionate and cooperative temperament drives her ambition to make people happy and to protect those in need. She also enjoys storytelling
    and sometimes says she would like to write picture books for other kids, reflecting her love of imagination and desire to share joy. Although her goals are still in the realm of playful fantasy, they
    are consistently anchored in her wish to serve and nurture others.
