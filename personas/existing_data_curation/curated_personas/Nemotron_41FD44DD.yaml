  hobbies: '["Golf","Bridge (card game)","Gardening","Community trivia nights","Classic rock music listening","Reading historical biographies","Volunteering as a museum docent","Walking along the coast"]'
  career_goals: Although officially retired, Chandler aims to stay actively engaged in his community by taking on leadership roles within his local senior center and neighborhood association. He wishes
    to mentor younger volunteers, share his practical knowledge, and ensure that community projects run smoothly. Maintaining his health and financial independence is a top priority, as is supporting his
    wife in their shared retirement plans. Chandler also aspires to travel occasionally to visit his children and grandchildren while continuing to contribute to charitable causes related to affordable
    housing and senior welfare.
