    ''Sketching urban and natural scenes'', ''Collecting vintage vinyl records'']'
  career_goals: Jose aspires to advance within the retail sector, targeting a promotion to store manager within the next two years. In that role, he aims to cultivate a well‑organized, customer‑centric
    environment that incorporates local art showcases and community‑driven events, leveraging his appreciation for culture. Building on his organizational strengths, he plans to introduce data‑driven inventory
    practices and staff development programs. Long‑term, Jose envisions moving into a regional management position or launching his own boutique that blends retail and art, for which he intends to enroll
    in a part‑time associate degree in business administration to deepen his managerial expertise.
