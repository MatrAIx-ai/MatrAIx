personas:
  professional: Guiselle Garcia, a three‑year‑old aspiring architect, channels their love of structure into meticulously arranging Lego bricks in predictable patterns, yet they delight in spontaneous redesigns
    during group play where they confidently compete to build the tallest tower and remain unfazed by occasional collapses.
  sports: Guiselle Garcia, a lively three‑year‑old, dashes around the community park’s toddler soccer circle with the Little Lions club, cheers for the nearby major league baseball team the River Raptors,
    and they persistently practice jumping rope to stay fit while eagerly challenging their friends to friendly races.
  arts: Guiselle Garcia, a vibrant three‑year‑old, spends afternoons coloring vivid crayon pictures of dinosaurs at the local library’s storytime, belts out verses from The Wiggles and Baby Shark alongside
    other toddlers, and they proudly display their latest masterpiece on the refrigerator, often contesting for the ‘most colorful’ title with their playmates.
  travel: Guiselle Garcia eagerly joins their family’s weekend escapes to Sunny Lake, where they collect smooth stones and splash in shallow water, and they daydream about the upcoming trip to Disneyland,
    confidently planning to ride the ‘It’s A Small World’ boat before their older cousins.
  culinary: Guiselle Garcia’s mealtime routine includes a bowl of creamy macaroni and cheese sprinkled with extra cheddar, bite‑sized chicken nuggets dipped in ketchup, and sweet strawberry slices, they
    often gleefully smear cheese on their cheeks while joyfully helping to stir batter with a plastic spoon under their mother’s guidance.
  core: Guiselle Garcia, a three‑year‑old bundle of energetic curiosity, thrives on predictable routines yet bursts into spontaneous games, competes fiercely in play, remains remarkably calm under minor
    setbacks, and they habitually trade stickers for gummy bears.
background:
  cultural: Guiselle is raised in a Mexican‑American household in Houston, where Spanish is spoken alongside English. She regularly experiences cultural traditions such as making Día de los Muertos altars,
    enjoying Mexican foods like tacos and tamales, and attending community festivals. Her family emphasizes close‑knit relationships, hospitality, respect for elders, and bilingual education through a local
    preschool.
