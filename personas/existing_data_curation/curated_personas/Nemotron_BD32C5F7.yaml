  career_goals: Sean aims to transition into a senior leadership role such as Director of Program Management within a technology‑driven creative firm where he can champion interdisciplinary projects that
    fuse art and engineering. He plans to author a guide on low‑stress project methodologies that blend structured processes with flexibility, and to mentor emerging project managers, especially those who
    thrive in quieter work settings. Over the next five years, he also envisions launching a boutique consultancy that offers strategic project support to nonprofit arts organizations, helping them navigate
    funding cycles while maintaining artistic integrity.
