personas:
  professional: Sean Harris, a 46‑year‑old project manager with a STEM graduate background, leverages advanced Excel, SQL, and Python to orchestrate complex cross‑disciplinary initiatives at a technology‑driven
    creative firm, blending agile and waterfall methods with design‑thinking while thriving in solitary deep‑work and diplomatic stakeholder negotiations.
  sports: Sean Harris, a quiet fitness enthusiast who prefers early morning runs along the Hudson River and weekend hikes with the Hudson Valley Hiking Society, roots for the New York Mets and Knicks, and
    participates in a low‑key adult soccer league on Saturdays, balancing solitary cardio with occasional team sport camaraderie.
  arts: Sean Harris, an avid visitor of lesser‑known galleries and the Met’s special exhibitions, channels curiosity into street photography and spontaneous sketching, draws inspiration from Ansel Adams’s
    landscapes, Olafur Eliasson’s installations, and the avant‑garde compositions of Philip Glass while listening to classical piano works by Sviatoslav Richter and experimental electronic tracks by Brian Eno.
  travel: Sean Harris, who prefers meticulously planned solitary retreats over crowded tours, enjoys weekend escapes to the Hudson Valley’s backcountry, has traveled to Kyoto’s Zen gardens and Reykjavik’s
    geothermal spas, and dreams of trekking Patagonia’s Torres del Paine, balancing a love for natural quiet with curated cultural immersion.
  culinary: Sean Harris, an experimental home cook who wields a well‑stocked spice rack featuring sumac, gochujang, and saffron, often prepares Korean bibimbap, Ethiopian injera with lentil stew, and miso‑glazed
    salmon, while pairing dishes with carefully selected natural wines and occasionally over‑seasoning in the quest for flavor complexity.
  core: Sean Harris, a curious yet introverted project leader who blends meticulous organization with artistic spontaneity, channels stress into daily meditation, occasionally over‑analyzes decisions, and
    balances reliable strategy with a quietly creative soul.
background:
  cultural: Sean grew up in a middle‑class family of Irish‑German ancestry in the suburbs of New Jersey, where Sunday dinners, community library volunteering, and public‑school education emphasized self‑reliance,
    modesty, and a respect for learning. His parents encouraged curiosity, leading him to pursue a STEM degree at a state university before moving to New York City for his career. Living in NYC for two
    decades has deepened his appreciation for cultural diversity and the city’s vibrant arts scene, while his white American roots remain evident in his celebration of traditional holidays, participation
    in local heritage festivals, and a strong sense of civic responsibility. Married for 18 years, his partnership reflects a shared value of quiet domestic stability, and they often host intimate gatherings
    for close friends and family.
