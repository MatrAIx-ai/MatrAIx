persona_description: A professional mental health researcher and advocate, Dr. R. Nicholas Carleton, who has dedicated his career to understanding and addressing the mental health challenges faced by public
  safety personnel, including Posttraumatic Stress Disorder (PTSD). Carleton is a Professor of Psychology at the University of Regina, a registered clinical psychologist, and Scientific Director of the
  Canadian Institute for Public Safety Research and Treatment (CIPSRT), a research institute located at the University of Regina. Carleton has worked with a group of clinicians and academics across Canada
  in the field of public safety to identify and define terms that are used around PTSD in the public safety community. The Glossary of Terms, which Carleton and his team have developed and collaborated
  with other partners, provides a shared understanding of common terms used to describe psychological trauma, including PTSD, and aims to reduce the stigma around the condition. Carleton's work on the Glossary
  is part of the ongoing development of the National Conference on PTSD, which aims to provide a common understanding among participants as they provide their insights. Carleton is confident that the Glossary
  will serve as a source of information and a way to continue the conversation around PTSD in public safety personnel, and is proud to participate in leading the ongoing development of the Glossary.
