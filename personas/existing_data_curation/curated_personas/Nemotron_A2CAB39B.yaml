  career_goals: Although retired from formal employment, Tiffany aims to leave a lasting legacy in her community. She plans to lead the Midway Historical Society’s archival project, documenting and publishing
    a concise history of the town. She also aspires to complete a memoir that intertwines her family’s pioneer roots with personal reflections. In the near term, she seeks to mentor younger volunteers in
    research and event organization, and to travel to a few historic sites in Europe that relate to her ancestry. Maintaining her health and financial security to support these endeavors remains a priority.
