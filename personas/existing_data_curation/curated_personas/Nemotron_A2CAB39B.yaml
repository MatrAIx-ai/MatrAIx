personas:
  professional: Tiffany Kahan, a retired community organizer turned archival historian, channels their meticulous project‑management skills, budgeting expertise, and knack for clear written communication
    into leading the Midway Historical Society’s archival project, where they methodically catalog pioneer records, coach volunteer researchers, and ensure every milestone is logged in a master timeline.
  sports: Tiffany Kahan, an avid low‑impact fitness enthusiast, spends Saturday mornings gentle trekking with the Wasatch Trail Hikers Club, cheers quietly for the Utah Jazz during evening games, and occasionally
    joins the Midway Senior Yoga circle to stretch out their arthritic knees.
  arts: Tiffany Kahan, a devoted patron of the arts, finds solace in the Utah Symphony’s performances of Beethoven’s Ninth, binge‑watches Ken Burns’ documentaries on American pioneers, knits while listening
    to the folk ballads of Joan Baez, and attends the annual Theatre 1842 reenactments of 19th‑century dramas, where they appreciate the authentic period costumes and stagecraft.
  travel: Tiffany Kahan, a methodical traveler with a love for heritage sites, has explored the historic streets of York, England, and plans a pilgrimage to the Alsace wine route and the medieval castles
    of the Loire Valley in France, and they favor meticulously planned itineraries that balance guided tours with quiet walks in the gardens of ancestral homesteads.
  culinary: Tiffany Kahan, a skilled home baker and garden‑to‑table chef, delights in whipping up classic apple‑cinnamon pies, rustic sourdough with locally milled wheat, and herb‑infused rosemary focaccia
    using fresh rosemary from their vegetable plot, and they often share the bounty at intimate family gatherings.
  core: Tiffany Kahan, a 60‑year‑old archivist‑turned‑community mentor, blends meticulous planning with a love for quiet gardening, occasional receipt hoarding, and a stubborn belief that a well‑organized
    ledger can solve almost any problem, and they often remind volunteers to keep both their projects and their paperwork tidy.
background:
  cultural: Tiffany is a White American of primarily Western European ancestry, raised in Utah. Her upbringing was shaped by the cultural norms of many Utah families, emphasizing family cohesion, community
    service, and appreciation for the natural landscape of the Wasatch region. While she identifies with the cultural practices of the predominant Latter‑Day Saints community—such as regular church involvement,
    service‑oriented projects, and seasonal pioneer celebrations—her personal expression of these traditions is modest and centered on close family and friends. She values the region’s heritage of self‑reliance,
    modesty, and stewardship of the outdoors.
