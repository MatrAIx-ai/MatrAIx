personas:
  professional: Yorlandy Castro is a meticulous press‑machine and CNC punch operator who coordinates shift crews, trains bilingual teams, and applies their love of structure and sociability to drive safety,
    efficiency, and a clear path toward supervisory leadership and a future community workshop, all while they continuously seek ways to improve processes.
  sports: Yorlandy Castro enjoys competitive weekend soccer with the East LA Soccer Club, proudly cheering for Los Angeles FC, and maintains a disciplined weight‑lifting routine at the local gym, balancing
    their structured nature with the camaraderie of team sports and the thrill of advancing personal fitness goals, all while they schedule training sessions with meticulous precision.
  arts: Yorlandy Castro immerses themselves in reggaeton and cumbia, regularly streaming Bad Bunny, J Balvin, and Calle 13 while socializing at neighborhood cafés, and they also appreciate the vibrant street‑art
    murals that color their community, finding inspiration for both work and DIY metal projects.
  travel: Yorlandy Castro plans weekend getaways to the Santa Barbara coastline and annual trips to the historic streets of Cartagena, dreams of hiking the Andes and exploring Monteverde’s cloud forests,
    and, while they budget carefully using airline loyalty points and a reliable road‑trip caravan with friends, they balance adventure with the need to support their extended family.
  culinary: Yorlandy Castro loves cooking pupusas stuffed with cheese and loroco and crisp yuca frita seasoned with fresh cilantro and lime, and they host neighborhood gatherings where they pair these dishes
    with homemade curtido, reflecting a deep appreciation for shared meals and bold flavors.
  core: Yorlandy Castro blends precise metal‑fabrication expertise with lively community soccer, relentless gym routines, and a soundtrack of reggaeton, all while they navigate anxiety and a steadfast dream
    of mentoring the next generation.
background:
  cultural: Yorlandy grew up in a close‑knit Salvadoran enclave in Los Angeles, speaking Spanish at home and maintaining strong ties to family in El Salvador. He celebrates traditional holidays such as
    Día de la Independencia (September 15) and the Feast of San Salvador, often participating in parish events at the local Catholic church. His cultural identity is reflected in his love for Salvadoran
    foods, music, and community gatherings, while his daily life blends seamlessly with the broader multicultural fabric of LA. Despite limited formal schooling, he values the work ethic and collective
    support typical of his community, and he often mentors younger Salvadoran immigrants seeking stable, skilled trades.
