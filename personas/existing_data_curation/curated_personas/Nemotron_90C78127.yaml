  career_goals: Yorlandy aims to earn a CNC programmer certification and advance to a supervisory role overseeing multiple production lines. He hopes to secure a senior lead position where he can mentor
    larger teams, implement process‑improvement initiatives, and influence safety standards. Long‑term, he dreams of opening a modest, community‑focused metal‑fabrication workshop in East LA that offers
    apprenticeships to other Salvadoran youths lacking formal education, while also providing a stable income that allows him to support his extended family both locally and abroad.
