    ''Exploring emerging tech tools for creative projects'']'
  career_goals: Sara aims to transition into a lead scouting role for a professional sports organization while concurrently pursuing a master's in sports science. She wants to develop an innovative youth
    development framework that blends technology, art, and experiential learning, eventually establishing a consultancy that offers data‑powered coaching solutions for schools and community programs. In
    the longer term, she envisions becoming a head coach at a Division‑II college, where she can implement her interdisciplinary approach on a larger scale.
