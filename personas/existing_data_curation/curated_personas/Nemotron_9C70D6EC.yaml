personas:
  professional: Jordan Bates, a retired civil engineer now serving as a senior advisor on the Rosebud County Planning Commission, applies their methodical project‑management expertise, data‑driven analysis,
    and charismatic public‑speaking to champion infrastructure initiatives that respect the local environment, while their competitive nature drives them to secure grant funding and their skeptical eye
    ensures every budget line is rigorously vetted.
  sports: Jordan Bates stays active through early‑morning fly‑fishing trips on Yellowstone streams, weekend hikes with the Forsyth Trails Club, and cheering on the Billings Mustangs baseball team, while
    their disciplined fitness regimen includes low‑impact stretching to manage arthritis, reflecting a pragmatic yet competitive approach to staying fit.
  arts: Jordan Bates, an enthusiastic participant in the Forsyth Community Theater, delights in performing classic roles from Arthur Miller’s plays, while their evenings often feature bluegrass legends
    like Bill Monroe and wildlife photography inspired by Ansel Adams, weaving artistic expression into their socially vibrant lifestyle.
  travel: Jordan Bates prefers meticulously planned road trips that balance adventure with comfort, having already explored Yellowstone’s geysers, Glacier National Park’s rugged peaks, and a nostalgic family
    visit to their Midwestern hometown, while they now dream of a leisurely cruise along British Columbia’s Inside Passage and a guided tour of historic mining towns in Colorado.
  culinary: Jordan Bates, an avid gardener and competent home cook, relishes preparing pan‑seared trout freshly caught from Yellowstone streams with lemon‑dill butter, alongside rustic cornbread and a slow‑cooked
    root‑vegetable stew seasoned with thyme and garlic, and bakes a signature apple‑pie with a cheddar‑infused crust, reflecting a practical palate that favors wholesome, locally sourced ingredients.
  core: Jordan Bates, a talkative 73‑year‑old former engineer with a competitive edge, a love for fly‑fishing, woodworking, and community theater, balances a meticulous, worry‑prone mindset with a deep
    sense of duty to their Montana neighbors.
background:
  cultural: Jordan was raised in a Midwestern farming family that prized self‑reliance, hard work, and close‑knit community bonds. His upbringing in a predominantly white, Protestant (Methodist) environment
    instilled values of modesty, practicality, and a sense of duty to neighbors. Relocating to Forsyth, MT, he embraced the frontier spirit of the American West, blending those midwestern roots with the
    rugged, independent culture of rural Montana. This hybrid background informs his respect for tradition, his commitment to local civic life, and his appreciation for the natural landscape that defines
    his daily routines.
attributes:
  skills: '[''Electrical and mechanical troubleshooting'', ''Small‑engine repair'', ''Civil‑engineering design and project management'', ''Data analysis and statistical modeling'', ''Technical writing and
    grant proposal development'', ''Public speaking and community facilitation'', ''Budgeting and financial oversight for nonprofit projects'', ''Mentoring junior engineers and students'', ''Conflict negotiation
    and competitive strategizing'', ''Event organization and committee leadership'']'
  hobbies: '[''Fly fishing'', ''Hiking and wildlife photography'', ''Woodworking'', ''Vegetable gardening'', ''Community theater acting'', ''Playing bridge and card games'', ''Historical preservation and
    oral history collection'', ''Model rocketry'', ''Cooking traditional hearty meals'']'
  career_goals: Now retired from formal employment, Jordan aims to cement his legacy through mentorship and community impact. He plans to volunteer as a senior advisor to the Rosebud County Planning Commission,
    guiding infrastructure priorities that balance development with environmental stewardship. He also seeks to create a structured mentorship program for local high‑school students interested in STEM,
    offering hands‑on project workshops. In addition, Jordan hopes to author a memoir that chronicles the evolution of rural engineering practices in Montana, preserving the technical knowledge and cultural
    stories of his generation for future residents.
