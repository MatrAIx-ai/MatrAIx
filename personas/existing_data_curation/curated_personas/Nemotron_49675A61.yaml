personas:
  professional: Edgardo Avalos, a 72-year-old veteran medical records specialist, leverages three decades of Epic and Cerner expertise, meticulous ICD-10-CM coding, and bilingual document management to
    provide low-stress consulting for small clinics while mentoring newcomers with a hands-on, detail-oriented approach, and they relish the occasional puzzle break to keep their mind sharp.
  sports: Edgardo Avalos, a dedicated fan of the Criollos de Caguas baseball team and an occasional participant in community fishing tournaments on the Río Grande de Loíza, enjoys daily walks through the
    Jardín Botánico de Caguas and light gardening as low-impact exercise, and they treat the neighborhood dominoes league as a subtle social-fitness ritual.
  arts: Edgardo Avalos, a lifelong admirer of 1970s boleros and salsa, frequently listens to recordings by Roberto Roena, El Gran Combo, and Gilberto Monroig, and they contribute their smooth tenor to the
    parish choir rehearsals, finding the nostalgic rhythm to be a soothing backdrop to their solitary evenings.
  travel: Edgardo Avalos, who favors relaxed, small-group excursions, regularly visits nearby attractions like El Yunque and the historic streets of Old San Juan, dreams of a cultural tour of Granada's
    Alhambra, and they plan trips with a detailed itinerary that leaves room for unhurried garden strolls and afternoon coffee breaks.
  culinary: Edgardo Avalos, tending a modest vegetable garden, often prepares classic dishes such as mofongo with chicharrón, arroz con gandules, and tostones, blending fragrant sofrito with fresh herbs,
    and they prefer cooking at a leisurely pace that sometimes leads to missed meals while solving crosswords.
  core: Edgardo Avalos, 72, blends a meticulous health-records consultancy with a tranquil, tradition-rich lifestyle of gardening, classic Latin music, and puzzles, yet they wrestle with persistent worry
    and a penchant for occasional disorganization.
background:
  cultural: Edgardo was born and raised in the central region of Puerto Rico, near Gurabo in the Caguas municipality, a community steeped in a blend of Taíno, Spanish, and African heritage. He grew up speaking
    Spanish at home, celebrating Catholic holidays and local fiestas patronales, and cherishing family gatherings centered around food and music. The cultural values of resilience, respect for elders, and
    strong family ties have shaped his worldview, even as his reserved nature leads him to prefer intimate gatherings over large celebrations. His upbringing exposed him to traditions such as parrandas,
    the art of cooking dishes like lechón asado, and a love for baseball—a sport that unites the island. These cultural roots influence his daily routines, culinary preferences, and his commitment to serving
    the health needs of his community.
attributes:
  skills: '["Electronic Health Record (EHR) management (Epic, Cerner)", "Medical coding (ICD‑10‑CM)", "Health information privacy and security (HIPAA, Ley 133)", "Data quality auditing and compliance",
    "Document management and archival", "Bilingual communication (Spanish/English)", "Patient data reconciliation", "Training and mentoring junior staff"]'
  hobbies: '["Walking in local botanical gardens", "Gardening (vegetables and herbs)", "Cooking traditional Puerto Rican cuisine", "Listening to boleros and salsa music", "Playing dominoes with a small
    group of friends", "Crossword and Sudoku puzzles", "Fishing at Río Grande de Loíza", "Participating in parish choir rehearsals"]'
  career_goals: As a 72‑year‑old nearing retirement, Edgardo aims to transition to a part‑time consulting role that allows him to share his expertise with small clinics in the Gurabo‑Caguas area while maintaining
    a low‑stress schedule. He hopes to obtain a certification in health informatics to formalize his knowledge, mentor a new generation of medical records professionals, and eventually author a practical
    guide on navigating Puerto Rico’s health‑record regulations for community health centers. He also wishes to secure a modest supplemental income that eases financial worries for his family.
