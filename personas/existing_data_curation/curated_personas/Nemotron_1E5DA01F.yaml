  hobbies: '[''Hiking'', ''Photography'', ''Acoustic guitar playing'', ''Woodworking'', ''Exploring Portland food‑truck culture'', ''Attending tech meetups'', ''Reading science‑fiction'', ''DIY electronics
    projects'', ''Gardening'']'
  career_goals: Looking ahead, Charles aims to transition from his current full‑time support role to a senior advisory consultant position that allows him to help small businesses modernize their IT while
    preserving operational stability. Over the next two years, he plans to earn AWS Solutions Architect and CompTIA Security+ certifications, and to take on mentorship responsibilities for junior technicians,
    leveraging his practical experience to guide real‑world problem solving. Ultimately, he envisions a semi‑retired consulting practice that offers flexibility, occasional freelance projects, and the freedom
    to explore emerging tech like AI‑driven automation.
