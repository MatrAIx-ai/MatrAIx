personas:
  professional: Joel Wade, a retired engineer turned community mentor, leverages his mastery of statistical analysis, experimental design, and CAD to deliver lively guest lectures and hands‑on workshops,
    where his relaxed, sometimes disorganized approach and talkative, charismatic style turn complex technical concepts into engaging stories that spark curiosity among seniors and students alike.
  sports: Joel Wade stays active with daily walks in the nearby conservation area, occasional pickleball matches at the Lexington senior center, and avidly follows the Chicago Cubs and Chicago Bears, proudly
    wearing their caps while cheering from his porch during spring and fall seasons.
  arts: Joel Wade immerses himself in the arts by frequent visits to the Art Institute of Chicago to study Monet and Georgia O'Keeffe, creating watercolors of the Illinois prairie inspired by these masters,
    curating mixed‑media sketches that echo Jeff Koons’ playful surfaces, and leading spirited discussions about contemporary installations by artists such as Kerry James Marshall at his monthly Idea Café.
  travel: Joel Wade prefers low‑key road trips that blend historic pilgrimages and cultural festivals, having recently driven to the Frank Lloyd Wright Home in Wisconsin, the National Museum of the American
    Indian in Washington, D.C., and the historic battlefield at Vicksburg, while dreaming of a future summer tour of the Renaissance art museums in Florence and the jazz clubs of New Orleans.
  culinary: Joel Wade, a confident home chef, loves preparing hearty Midwestern fare such as pork tenderloin with apple‑cider glaze, creamy corn chowder seasoned with fresh thyme, and occasionally ventures
    into making sushi rolls with sashimi‑grade tuna and avocado for his dinner guests, always pairing meals with a thoughtfully selected local craft beer or a glass of Pinot Noir.
  core: Joel Wade blends a lifelong curiosity for science and art with an easygoing, talk‑filled charm, often juggling multiple community projects while occasionally misplacing their glasses and forgetting
    meeting times, yet always turning every conversation into an inspiring brainstorm.
background:
  cultural: Born and raised in the heart of Central Illinois, Joel grew up in a modest farming community where self‑reliance, neighborly cooperation, and modesty were everyday values. His family emphasized
    the importance of education, leading him to pursue a STEM graduate degree during the post‑war era, which launched a successful engineering career spanning both rural and urban Midwest settings. While
    his Midwestern roots instilled a strong sense of community service and practicality, the cultural shifts of the 1960s sparked an openness to new ideas, art, and unconventional thinking. As a widower,
    Joel channels the Midwestern tradition of hospitality into regular social gatherings, mentorship, and volunteerism, reflecting both his heritage and his lifelong curiosity.
attributes:
  skills: '[''Statistical data analysis'', ''Experimental design'', ''Computer‑Aided Design (CAD)'', ''Technical writing'', ''Public speaking'', ''Community event organization'', ''Mentoring and tutoring'',
    ''Art critique and appreciation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor and mixed‑media painting'', ''Birdwatching'', ''Reading science‑fiction'', ''Playing bridge at the senior center'', ''Hosting community
    discussion gatherings'', ''Traveling to historic and cultural sites'', ''Gardening'']'
  career_goals: In retirement Joel aims to stay intellectually active by delivering guest lectures at local schools and community centers, sharing his engineering insights and encouraging curiosity about
    science and art. He hopes to author a memoir that weaves together stories from his technical career with his lifelong love of artistic experiences, creating a bridge between generations. Additionally,
    he aspires to expand the monthly "Idea Café" gatherings he hosts, fostering intergenerational dialogue and encouraging participants to explore unconventional ideas. Through these efforts, Joel seeks
    to leave a lasting imprint of mentorship, cultural appreciation, and community spirit in Lexington and the broader McLean County region.
