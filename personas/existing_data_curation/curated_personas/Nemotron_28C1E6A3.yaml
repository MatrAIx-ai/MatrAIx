personas:
  professional: Angel Reus, a 29‑year‑old wholesale and retail buyer, blends a curious eye for emerging trends with a pragmatic focus on cost efficiency, negotiating fiercely yet flexibly to secure optimal
    product assortments for Caribbean‑influenced markets.
  sports: Angel Reus stays fit through sunrise yoga at the Boston Common and weekend hikes with the Boston Coastal Hikers club, cheers on the Boston Red Sox in spring, the Celtics in winter, and occasionally
    joins a co‑ed recreational soccer league, balancing competitive spirit with a relaxed fitness routine.
  arts: Angel Reus engages with the Boston art scene by frequenting the ICA, following street‑art tours that showcase works by local painter Jose Silva and muralist Maya Cruz, while immersing in contemporary
    literature from Ocean Vuong and attending live salsa performances that fuel their personal expression.
  travel: Angel Reus prefers meticulously planned weekend getaways, spending summers exploring the coastal towns of Cape Cod and the historic streets of Old San Juan, while dreaming of a future backpacking
    trek through the Scottish Highlands when finances allow.
  culinary: Angel Reus, an enthusiastic home‑cook, masterfully prepares arroz con gandules and mofongo with a modern twist—adding roasted poblano pepper and quinoa—while experimenting with sofrito, plantains,
    and achiote, and occasionally splurges on a premium olive oil to elevate their dishes.
  core: Angel Reus navigates life with a competitive curiosity, balancing fierce bargaining in the buying world with a relaxed, sometimes disorganized, love for salsa nights, yoga, and culinary experiments
    that blend tradition and innovation.
background:
  cultural: Angel is a first‑generation Puerto Rican American who grew up in a bilingual household in Weymouth, Massachusetts. Her family maintains strong ties to island traditions, celebrating festivals
    such as Fiestas de la Calle San Juan and partaking in traditional music, dance, and food. This cultural foundation instilled in her a deep appreciation for community, resilience, and the vibrant fusion
    of Caribbean and New England influences. Angel actively participates in local Puerto Rican community events, volunteers at cultural organizations, and incorporates her heritage into both her professional
    perspective on sourcing and her personal creative pursuits.
attributes:
  skills: '["Vendor negotiation", "Trend forecasting", "Category analysis", "Supplier relationship management", "Cross‑cultural communication", "Spanish language proficiency", "Data‑driven purchasing",
