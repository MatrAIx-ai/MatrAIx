  hobbies: '["Cooking Puerto Rican cuisine", "Salsa dancing", "Contemporary literature", "Photography", "Coastal hiking", "Yoga", "Trivia nights", "Traveling to Caribbean islands"]'
  career_goals: Angel aims to advance to a senior buyer or category manager role within the next three years, leading larger product lines and overseeing strategic sourcing initiatives. She is particularly
    interested in integrating sustainable and ethically sourced products into her portfolio, leveraging her heritage to develop stronger ties with Caribbean manufacturers. In the longer term, Angel envisions
    establishing her own boutique brand that blends contemporary design with Puerto Rican cultural motifs, while also mentoring emerging buyers and promoting diversity in the supply‑chain industry.
