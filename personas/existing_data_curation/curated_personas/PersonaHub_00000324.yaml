persona_description: Cathy Martin, Program Manager at Save the Dunes, is a skilled and experienced professional with a passion for environmental conservation and the Indiana Dunes region. She is dedicated
  to the preservation of the natural areas in the nearshore region of the Indiana dunes and has a deep understanding of the complex interplay between climate change and natural communities. Her expertise
  lies in the development and implementation of climate change adaptation plans, as evidenced by her work on the Indiana Dunes Climate Change Adaptation Plan. Cathy is known for her ability to bring together
  diverse stakeholders and collaborate effectively to address critical issues facing the region. Her outreach efforts are designed to raise awareness about the importance of climate change adaptation and
  to encourage action to protect the Indiana dunes.
