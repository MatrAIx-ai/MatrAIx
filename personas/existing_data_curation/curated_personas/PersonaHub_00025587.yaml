persona_description: A historian who specializes in the study of the Coorgs, a martial race of highlanders in India. Their customs, way of life, and history have fascinated historians and anthropologists
  for centuries. They are known for their hospitality, martial skills, and unique customs. The Coorgs are free from the caste system, speak a Dravidian dialect, and worship guns. Their ceremonial dress
  is unique in south India, and they are nature worshippers. The Coorgs are the only race in India who are exempt from the Indian Arms Act and are permitted to possess guns without license.
