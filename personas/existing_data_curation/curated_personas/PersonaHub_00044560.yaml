persona_description: A scientist at the Agricultural Research Service (ARS) National Center for Agricultural Utilization Research in Peoria, Illinois, who specializes in the study of bacteria and their
  potential use in agriculture. She is an expert in the fields of crop protection, bioprotection, and plant disease management. Her research focuses on developing new methods for controlling postharvest
  sprouting and dry rot in potatoes, which are major problems for the U.S. potato industry. Her team has patented methods for using 18 strains of Pseudomonas and Enterobacter bacteria to stymie postharvest
  sprouting and dry rot.
