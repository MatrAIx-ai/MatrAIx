personas:
  professional: Hanna Snider, a budding little scientist, spends afternoons dismantling toy cameras to understand how pictures are made, blending their insatiable curiosity with a surprisingly practical
    knack for following step‑by‑step instructions, even though the chaos of scattered parts often leaves them frustrated by lack of organization.
  sports: Hanna Snider delights in toddler soccer sessions with the local community center’s Tiny Tykes club, cheering for the nearby MLS team’s mascot during games, while they prefer solitary obstacle‑course
    play in the backyard over crowded group matches.
  arts: Hanna Snider, an avid fan of animated classics like Moana and Toy Story, spends rainy afternoons drawing vibrant pictures of sea turtles and space rockets, channeling their balance of curiosity
    for new stories and comfort with the familiar characters they love.
  travel: Hanna Snider enjoys spontaneous day trips to the nearby botanical garden, wandering among fragrance‑filled paths at their own pace, but they feel uneasy on long car rides to the beach, preferring
    short, predictable outings to familiar places like the local zoo they have visited many times.
  culinary: Hanna Snider battles a selective palate that adores crunchy carrot sticks and cheesy macaroni, yet they refuse broccoli unless it’s disguised as tiny trees in a culinary forest plate, showing
    their practical taste for familiar comfort foods while occasionally embracing experimental shapes.
  core: Hanna Snider is a curious, albeit anxious three‑year‑old who thrives on exploring new ideas within familiar routines, juggling spontaneous bursts of activity with a tender need for solitude and
    a habit of occasional disorganization.
background:
  cultural: 'Hanna comes from a white, middle‑class family living in Glendale, a suburban community within Los Angeles County. Her upbringing reflects typical Southern‑Californian middle‑class values: celebrating
    mainstream American holidays such as Thanksgiving and Christmas, and attending a diverse preschool that introduces Spanish words and multicultural stories. Family outings to museums, beaches, and local
    parks expose her to a broader cultural tapestry, while her household culture remains grounded in mainstream U.S. customs.'
