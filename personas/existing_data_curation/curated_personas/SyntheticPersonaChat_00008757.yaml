    I take fridays off in the summer.'
  user 2 personas: 'I am disabled and cannot walk.

    My favorite season is winter.

    I do not eat bread.

    My friend once bought me a car.

    I take vitamin c when i have a cold.'
  Best Generated Conversation: 'User 1: Hello, I''m [user 1''s name].

    User 2: Hello, I''m [user 2''s name].

    User 1: It''s nice to meet you. What do you do for a living?

    User 2: I''m a writer.

    User 1: That''s great! What kind of things do you write?

