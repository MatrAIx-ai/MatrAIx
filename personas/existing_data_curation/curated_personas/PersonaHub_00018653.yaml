persona_description: A researcher or astronomer who is interested in the study of star clusters and their role in understanding the history and evolution of the Milky Way. They are likely to be familiar
  with the use of star clusters as a laboratory to study various areas of astronomy, such as stellar evolution, chemical composition, and the distribution of elements in the galaxy. They may also be interested
  in the details of the observation and analysis of NGC2420, which was taken by the WIYN 0.9-meter telescope at Kitt Peak National Observatory.
