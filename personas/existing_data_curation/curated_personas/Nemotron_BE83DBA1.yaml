personas:
  professional: Maria Colon, an 8‑year‑old budding performer‑scientist, blends disciplined piano practice with experimental LEGO builds and school drama roles, channeling their curiosity and competitive
    drive into a quest to become a future inventor‑actor.
  sports: Maria Colon spends weekends on the Little League baseball field as a shortstop for the Eastside Cubs, cheers loudly for the Los Angeles Dodgers and the LA Lakers, and channels their energetic
    hip‑hop moves into a dynamic after‑school dance‑fitness class at the community studio.
  arts: Maria Colon delights in practicing salsa steps taught by abuela, learning hip‑hop routines to beats by Bad Bunny, playing piano pieces by Mozart for discipline, sketching comic‑style heroes inspired
    by Spider‑Man, and starring in school productions of "Peter Pan" while channeling the flamboyance of performer Shakira.
  travel: Maria Colon dreams of exploring the desert valleys of Arizona’s Grand Canyon, revisiting the vibrant street markets of Oaxaca during a family trip, and collecting seashells at Santa Monica Beach,
    while preferring day‑trips to nearby Griffith Park over long flights due to school schedule constraints.
  culinary: Maria Colon loves helping Mom roll homemade tortillas for tacos, seasoning tacos al pastor with pineapple and chipotle, savoring sweet atole made with masa and cinnamon, and experimenting with
    simple recipes like cheese quesadillas and fruit‑filled churros, though they often sneak extra salsa when no one’s looking.
  core: Maria Colon is a fiercely organized, talkative 8‑year‑old who merges scientific curiosity with artistic flair, competes with friends in every arena, and never misses a chance to showcase their dancing,
    drawing, or daring badge of self‑confidence.
background:
  cultural: Maria is a second‑generation Mexican‑American raised in Los Angeles. Spanish is spoken at home, and she celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and posadas
    during the Christmas season. Her family enjoys cooking classic dishes like tacos, tamales, and atole, and she frequently attends events at the local Latino cultural center where she learns traditional
    dances and music. While fully engaged in American school life, Maria takes pride in her heritage and actively shares it with friends, blending both cultures in her daily experiences.
attributes:
  skills: '[''Organizational planning for school projects'', ''Reading comprehension (grade 3‑4 level)'', ''Basic arithmetic and problem solving'', ''Bilingual communication (English/Spanish)'', ''Scratch
    block coding'', ''Piano basics'', ''Public speaking and presentation'', ''Team coordination as class monitor'']'
  hobbies: '[''Hip hop and folk dance'', ''Playing the piano'', ''Reading mystery and adventure books'', ''Building LEGO structures'', ''Participating in science experiments'', ''Acting in school drama'',
    ''Drawing and sketching'', ''Exploring parks for nature observations'']'
  career_goals: Maria dreams of becoming a scientist or engineer who creates technologies to help children stay healthy, with a particular interest in biomedical engineering. She also imagines herself as
    a pediatric doctor who can combine her love of caring for others with her curiosity about the human body. Maria sets high standards for herself, aiming to win school science fairs, earn top grades,
    and one day lead community projects that blend her organizational talent with her passion for helping others.
