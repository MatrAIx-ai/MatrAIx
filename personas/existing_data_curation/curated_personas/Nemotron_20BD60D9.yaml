  career_goals: He dreams of turning his love for building and problem‑solving into a career as a mechanical engineer or a game developer, where he can design systems that work reliably. He aims to earn
    top grades in math and science to keep his options open, and hopes to join a high school robotics club to gain hands‑on experience. In the longer term he wants a stable, well‑structured job that lets
    him create tangible products while also giving him the flexibility to pursue his hobby projects on the side.
