persona_description: A former Senator who was known for his strong stance on food politics and his efforts to improve the lives of women and children living in poverty in the United States. He chaired the
  Senate Select Committee on Nutrition and Human Needs from 1968-1977, and his work on this committee greatly expanded food assistance programs and developed the first federal guidelines for chronic disease
  prevention. He also broke new ground in shifting nutrition education from a focus on eating more of a variety of foods to eating less of foods that increased risks for chronic disease. His legacy is an
  extraordinary one, and he leaves an impressive record of achievement that is unimaginable in this era of partisan politics.
