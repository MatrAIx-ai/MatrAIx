  career_goals: Nabil aims to become a partner at his Tampa law firm within the next five years, leading the corporate practice group and expanding its tech‑startup clientele. He plans to develop a boutique
    advisory service that blends legal counsel with business strategy for South Asian entrepreneurs in Florida. Additionally, he seeks to serve on the Hillsborough County Bar Association board, mentor junior
    attorneys, and publish a guide on navigating corporate law for emerging businesses.
