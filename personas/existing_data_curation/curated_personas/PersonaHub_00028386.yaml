persona_description: A historian who specializes in the study of Maori history, particularly the social, economic, and political aspects of the region known as Tauranga Moana. The historian is interested
  in the rich cultural heritage of the people of Tauranga Moana and wants to preserve and share their stories with future generations. They have conducted extensive research on the area's history and have
  compiled and organized the stories of the ancestors of Tauranga Moana into a book. The historian is passionate about the land and its people and believes that it is worth fighting for.
