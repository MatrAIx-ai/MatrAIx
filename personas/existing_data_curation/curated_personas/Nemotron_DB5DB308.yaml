  hobbies: '[''Backyard gardening'', ''Hiking Forest Park trails'', ''DIY woodworking'', ''Volunteer work at food bank'', ''Attending local music events'', ''Exploring farmers\'' markets'', ''Reading mystery
    novels'']'
  career_goals: Looking ahead, Amanda hopes to step into a lead mechanic role where she can shape maintenance workflows and safety protocols for the shop. She is pursuing a journeyman certification to formalize
    her expertise and plans to lead a mentorship program for apprentices, passing on her practical knowledge while fostering a supportive team culture. Long‑term, she envisions starting a small consulting
    service that offers on‑site equipment assessments to local manufacturers, allowing her to leverage her experience while building a flexible work schedule for retirement.
