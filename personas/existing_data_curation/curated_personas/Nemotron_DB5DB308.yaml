personas:
  professional: Amanda Counts, a seasoned industrial mechanic with three decades of expertise in hydraulic and pneumatic systems, excels at systematic troubleshooting and safety‑focused mentorship, channeling
    her structured, reliability‑driven personality into leading maintenance workflows and crafting clear, step‑by‑step protocols.
  sports: Amanda Counts stays active by hiking the trails of Forest Park year‑round, participates in the Springtime Portland Trail Blazers fan run, and attends Portland Timbers matches as a devoted season
    ticket holder, balancing low‑impact cardio with occasional community softball games.
  arts: Amanda Counts channels her creative side through DIY woodworking and frequent visits to Portland Center Stage, where she admires productions starring John C. Reilly, while her playlist of live shows
    regularly features indie folk bands like The Decemberists and folk legend Neko Case.
  travel: Amanda Counts prefers well‑planned road trips that blend scenic nature with cultural stops, having driven the Pacific Coast Highway to explore Oregon’s coastal towns and the vineyards of Willamette
    Valley, and she earmarks future travel to Iceland’s geothermal springs and the historic gardens of Kyoto, balancing her modest retirement savings with a love for adventure.
  culinary: Amanda Counts, an adept home‑cook, builds meals around the fresh bounty of her garden—like heirloom tomato and basil bruschetta, roasted kale with toasted hazelnuts, and cedar‑plank salmon seasoned
    with dill and lemon—while she regularly samples Portland’s food‑truck scene for Korean‑style tacos and enjoys pairing dishes with local pinot noir.
  core: Amanda Counts blends disciplined mechanic precision with a garden‑obsessed heart, often juggling maintenance logs and seed catalogs in the same notebook, while occasionally neglecting bedtime in
    favor of late‑night DIY woodworking projects.
background:
  cultural: Amanda comes from a working‑class white family that has lived in the Pacific Northwest for generations, with roots in both agriculture and manufacturing. The regional culture of Portland—valuing
    community, environmental stewardship, and a pragmatic work ethic—has shaped her outlook. She embraces the region’s progressive spirit while maintaining traditional blue‑collar values of reliability,
    cooperation, and hands‑on problem solving. Her involvement in local community groups and church reflects her commitment to harmony and mutual support, hallmarks of the cultural fabric she identifies
    with.
