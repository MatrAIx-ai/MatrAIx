persona_description: A public health official or health-care professional who is responsible for monitoring and managing influenza activity in the province, and is involved in the development and implementation
  of public vaccination programs. They are knowledgeable about the epidemiology of influenza, the types of influenza viruses that circulate in communities, and the effectiveness of different vaccination
  strategies. They are also skilled in communicating complex information in a clear and accessible manner to the public.
