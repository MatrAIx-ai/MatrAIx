  career_goals: Jay envisions a career that fuses creativity with problem‑solving. He aspires to study product design, user‑experience (UX) engineering, or environmental engineering in college, aiming to
    develop sustainable, aesthetically engaging solutions for everyday challenges. He also hopes to lead interdisciplinary projects that combine art, technology, and community outreach, and eventually mentor
    younger students through workshops or a youth makerspace.
