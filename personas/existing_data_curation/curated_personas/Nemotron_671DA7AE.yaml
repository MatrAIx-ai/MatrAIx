personas:
  professional: Jay Crovetto, an aspiring junior robotics engineer and digital illustrator, they blend meticulous programming skills with a vivid visual imagination, channeling obsessive organization and
    an insatiable curiosity into competition‑ready autonomous models and graphic‑novel‑style concept art.
  sports: Jay Crovetto, a midfield dynamo for the Westside Wolves youth soccer team, they thrive on high‑energy team drills, idolize Lionel Messi’s creative play, and attend weekly practices while also
    cheering for the local professional club the Seattle Sounders.
  arts: Jay Crovetto, a budding graphic novelist and acoustic guitarist, they draw inspiration from creators like Alan Moore and Hayao Miyazaki, compose simple folk melodies echoing John Mayer, and regularly
    showcase their digital paintings on ArtStation and their own online portfolio.
  travel: Jay Crovetto, an adventurous teen with a penchant for sci‑fi conventions, they plan weekend trips to the nearby science museum, dream of attending Comic‑Con in San Diego, and hope to someday explore
    Tokyo’s Akihabara district to soak in manga culture.
  culinary: Jay Crovetto, a kitchen novice with a love for bold flavors, they often whip up pepperoni pizza with extra mozzarella, experiment with ramen broth seasoned with miso and soy sauce, and enjoy
    crafting strawberry‑banana smoothies after soccer practice.
  core: Jay Crovetto, a hyper‑curious, hyper‑organized 13‑year‑old who juggles robotics, art, and soccer while battling restless worry, they turn stress into sketchbooks and spreadsheets, all with a side
    of guitar strums.
background:
  cultural: Jay was raised in a white, middle‑class family in Waterloo, Iowa, a small Midwestern town where community ties, school sports, and local fairs play a central role. His upbringing reflects the
    region’s values of self‑reliance, modesty, and volunteerism; his family encourages both academic achievement and participation in community service. Regular involvement in church and school events exposes
    him to Midwestern traditions such as county fairs, high‑school basketball games, and seasonal agricultural celebrations. While his cultural setting is primarily Anglo‑American, Jay’s curious nature
    leads him to explore diverse artistic styles and global ideas through his art, reading, and online interactions.
