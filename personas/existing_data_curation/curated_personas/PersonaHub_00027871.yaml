persona_description: A Michigan Department of Transportation (MDOT) director who has witnessed the most brutal winter Michigan has had in recent years, which was characterized by extreme cold temperatures,
  heavy snowfall, and a lack of sunlight, leading to pavement deterioration and potholes. The director is aware of the impact of climate change on weather patterns, which has resulted in more frequent extreme
  weather events, including freezing and thawing cycles, and is concerned about the long-term trend of warmer winters. The director is responsible for overseeing the department's infrastructure planning
  and maintenance efforts to address the deteriorating road conditions.
