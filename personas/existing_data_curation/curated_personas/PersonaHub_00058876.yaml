persona_description: A history professor with a specialization in the diplomatic history of the Holy See and its involvement in international organizations. The professor has a deep understanding of the
  Church's historical engagement with international affairs, including its early use of envoys and Nunciatures, its involvement in the League of Nations Conference, and its support for the employment of
  a priest advisor at the International Labour Organization. The professor's research interests include the history of the Holy See's diplomacy, the evolution of its diplomatic strategies, and the impact
  of international organizations on the Church's engagement with the world.
