persona_description: A disaster relief professional who is familiar with various databases and resources used in humanitarian response and disaster management. They have a deep understanding of the International
  Disaster Database (EM-DAT) and Asian Disaster Reduction Center (ADRC), and are knowledgeable about the functions and operations of organizations such as the United Nations Secretariat (OCHA) and Munich
  Re NatCatSERVICE. They have experience with data analysis, risk assessment, and coordination in disaster situations. They are also familiar with the annual statistics and information available on the
  EM-DAT and NatCatSERVICE databases, and are able to access and analyze complex data to support decision-making and policy-making in the field of disaster management.
