  career_goals: As a ten‑year‑old, Karen dreams of a future where she can help others and make a tangible difference. She often imagines becoming a veterinarian because she loves caring for animals and
    values the harmony she can bring to their lives. She also considers a career in teaching or community health, attracted by the stability, the chance to nurture growth, and the practical impact on people's
    well‑being. Her long‑term ambition is to combine her curiosity for science with her desire to create safe, supportive environments for both people and pets.
