personas:
  professional: Karen Orange, a budding junior coder with a knack for building Scratch games, blends curiosity with practicality by experimenting with new ideas while keeping code tidy, and their cooperative
    nature shines when they help classmates debug, ensuring projects run smoothly.
  sports: Karen Orange loves playing on the Clay County Strikers youth soccer team during the spring, they cheer loudly for the Kansas City Chiefs and Sporting Kansas City while also following the Kansas
    City Royals' baseball season, and they balance structured practice with spontaneous backyard matches to stay active.
  arts: Karen Orange immerses herself in the worlds of J.K. Rowling's Harry Potter and Hayao Miyazaki's animated adventures, they spend afternoons sketching deer and prairie sunsets while listening to classic
    Kansas City jazz from Louis Armstrong, letting art shape their imaginative play and quiet moments.
  travel: Karen Orange dreams of weekend road trips to the Ozark National Forest for camping adventures and a family getaway to Disney World in Florida, they prefer flexible itineraries that allow spontaneous
    stops at local farms and community festivals, though their current travel is limited to day trips to the nearby St. Louis Science Center and annual visits to the Kansas City Renaissance Festival.
  culinary: Karen Orange enjoys homemade macaroni and cheese, pizza topped with fresh basil from the family garden, and apple pie at family gatherings, they can competently whisk batter for chocolate chip
    cookies under parental supervision, and they love snacking on carrot sticks and hummus after gardening.
  core: Karen Orange balances a boundless curiosity for building LEGO cities with a practical habit of journaling her worries, making them a thoughtful yet occasionally stressed ten‑year‑old who thrives
    on organized play and quiet reflection.
background:
  cultural: Karen grew up in a suburban neighborhood of Clay County, near Kansas City, Missouri, within a Midwestern white family that values community, politeness, and personal responsibility. Her family
    participates in local events such as the Kansas City Renaissance Festival and community church gatherings, and they emphasize the importance of school and outdoor activities throughout the four‑season
    climate. She has been exposed to the city’s jazz heritage, district sports culture, and the tradition of neighborhood block parties, all of which shape her sense of belonging and her appreciation for
    cooperation and harmony.
