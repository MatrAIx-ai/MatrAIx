personas:
  professional: Jermaine Lewis, a seasoned retail operations manager with four decades of hands‑on experience, leverages meticulous budgeting, strategic planning, and compassionate conflict resolution to
    drive efficiency, while they infuse artistic curiosity into problem‑solving and mentor emerging talent.
  sports: Jermaine Lewis follows the Miami Heat and the Miami Dolphins avidly, participates in the South Beach Chess Club weekly, and maintains a low‑impact fitness routine through waterfront walks and
    senior‑focused yoga classes at the community center.
  arts: Jermaine Lewis spends Saturday afternoons at the Pérez Art Museum and wandering Wynwood’s murals, drawing inspiration from Jacob Lawrence’s narrative paintings, the smooth saxophone lines of John
    Coltrane, and collecting limited‑edition prints by contemporary muralist Shepard Fairey, they often sketch scenes from their own photographs.
  travel: Jermaine Lewis prefers thoughtfully planned trips that blend cultural immersion with comfort, having explored New Orleans’ jazz heritage, the historic streets of Cartagena, Colombia, and dreaming
    of a quiet retreat to the Florida Keys’ mangrove islands.
  culinary: Jermaine Lewis enjoys cooking island‑inspired dishes such as jerk‑spiced chicken with mango salsa and curried goat stew, skillfully seasoning with Scotch bonnet peppers, allspice, and fresh
    thyme, they frequently experiment with slow‑cooker recipes after community work.
  core: Jermaine Lewis is a methodical mentor‑builder who blends quiet curiosity for art with disciplined work habits, yet can’t resist a late‑night jazz album or a spontaneous vinyl purchase.
background:
  cultural: Jermaine is an African‑American who grew up in the South before relocating to Miami, where he embraced the city’s multicultural tapestry. His heritage blends Southern Black traditions with Afro‑Caribbean
    influences present in Miami’s vibrant neighborhoods. He remains active in his local church, participates in annual Black History Month events, and supports Miami’s Afro‑Caribbean festivals. His cultural
    identity informs his respect for community solidarity, his love of music and visual art, and his commitment to fostering opportunities for the next generation of Black professionals.
