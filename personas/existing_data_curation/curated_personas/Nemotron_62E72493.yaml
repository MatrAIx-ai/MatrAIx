personas:
  professional: Omar Edge is a seasoned mechanical engineer who leverages deep expertise in product design, finite element analysis, and additive manufacturing to turn inventive concepts into reliable,
    lean‑manufactured solutions; they channel a balance of curiosity and practicality into steering multidisciplinary R&D initiatives while fostering a collaborative, considerate team environment.
  sports: Omar Edge channels their love of the outdoors into weekly kayaking on Lake Apopka, regular hikes through Ocala National Forest, and avidly follows the Orlando Magic and Tampa Bay Rays, while also
    participating in a local kayak club that meets every Thursday evening.
  arts: Omar Edge finds solace in strumming acoustic guitar at community jam sessions, often covering John Mayer and Ed Sheeran, curates a small collection of indie folk vinyls from Fleet Foxes and Sufjan
    Stevens, and they occasionally volunteer to teach basic sound‑engineering basics at the makerspace.
  travel: Omar Edge enjoys meticulously planning weekend road trips to nearby natural retreats like the Everglades and Blue Ridge Mountains, dreams of a workshop tour in Kyoto's tech districts, but balances
    travel aspirations with family commitments, opting for short, low‑stress getaways that fit their flexible consulting schedule.
  culinary: Omar Edge prepares Mediterranean‑inspired meals such as grilled grouper with lemon‑herb quinoa and fresh avocado salsa, experiments with homemade spice blends using chilies, cumin, and smoked
    paprika, and while their cooking skill is solid, they often over‑season dishes in a quest for the perfect flavor profile.
  core: Omar Edge blends engineering precision with a restless curiosity, balancing meticulous project leadership with night‑time drone tinkering, anxiety‑fuelled overthinking, and a love for kayaking,
    guitar, and mindful meditation.
background:
  cultural: Omar grew up in a middle‑class white family in the Orlando metropolitan area, steeped in the blend of Southern hospitality and the city’s vibrant, multicultural tourism scene. His upbringing
    emphasized practicality, community involvement, and self‑reliance, while exposure to diverse cultures fostered an openness to new ideas. The local emphasis on outdoor recreation and informal social
    gatherings shaped his balanced preference for social interaction and solitary reflection. His divorce experience further reinforced his focus on personal growth, emotional awareness, and maintaining
    harmonious relationships.
attributes:
  skills: '[''SolidWorks'', ''Autodesk Inventor'', ''ANSYS'', ''Finite Element Analysis'', ''Additive Manufacturing'', ''Lean Manufacturing'', ''Project Management'', ''Technical Writing'', ''Team Leadership'',
