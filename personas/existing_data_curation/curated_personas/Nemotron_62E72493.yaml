  hobbies: '[''Drone building'', ''3D printing experimentation'', ''Kayaking'', ''Hiking'', ''Acoustic guitar'', ''Mindfulness meditation'', ''Journaling'', ''Volunteering at makerspace'', ''Teaching engineering
    basics'']'
  career_goals: Omar aims to progress to a principal mechanical engineer role where he can steer strategic product development initiatives, especially in sustainable and energy‑efficient technologies. He
    aspires to lead a multidisciplinary R&D team, mentor junior engineers, and introduce cutting‑edge manufacturing methods while maintaining rigorous reliability standards. Additionally, he wants to achieve
    a healthier work‑life balance that supports his mental‑health strategies, potentially transitioning to a consultancy role that allows flexible scheduling and occasional teaching engagements at local
    community colleges.
