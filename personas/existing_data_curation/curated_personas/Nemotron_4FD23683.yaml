  hobbies: '[''Reading Contemporary African‑American Literature'',''Journaling'',''Yoga and Meditation'',''Landscape Photography'',''Hiking'',''Cooking Soul‑Food'',''Volunteering at Arts Programs'',''Attending
    Live‑Music Sessions'',''Pottery Workshops'']'
  career_goals: Twanna aspires to advance into senior leadership, targeting a Director of Community Engagement or Operations role within a cultural nonprofit or socially responsible corporation. She plans
    to complete an MBA with a focus on nonprofit management within the next three years, develop a mentorship program for Black women pursuing arts and business careers, and launch a community‑center initiative
    that integrates arts education into after‑school programming. Her ambition balances professional growth with maintaining a supportive, stable family life.
