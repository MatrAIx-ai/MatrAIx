personas:
  professional: Pedro Lei is a retired auto‑shop handyman who now volunteers as the coordinator of a neighborhood garden, applying their mechanical troubleshooting, carpentry, and basic bookkeeping skills
    to keep the garden thriving while their calm, structured approach balances the flexibility needed for unpredictable weather and planting cycles.
  sports: Pedro Lei enjoys leisurely walks along the Detroit Riverfront each morning while listening to classic boleros, supports the Detroit Tigers baseball team and occasional Red Wings hockey games,
    and participates in a low‑impact tai chi class at the community center to maintain flexibility and balance.
  arts: Pedro Lei savors classic boleros, mariachi recordings, and vintage radio dramas during garden breaks, regularly attends neighborhood festivals featuring folk dancers and community theatre, contributes
    to a local book club where they discuss simple novels and newspaper headlines, and occasionally spots a performance by the renowned singer José José on community TV.
  travel: Pedro Lei prefers short, well‑planned road trips to nearby attractions like Sleeping Bear Dunes and the historic town of Marquette, enjoys annual family reunions in the Southwest where they visit
    relatives and cultural sites, and dreams of a relaxed cruise along the Gulf Coast to experience new cuisines without the stress of crowded itineraries.
  culinary: Pedro Lei excels at preparing traditional corn‑based tamales, hearty pozole soups, and fresh homemade salsa using chilies, tomatoes, and cilantro, adapts recipes to seasonal garden harvests,
    often invites neighbors for communal meals, and occasionally adds an extra pinch of salt out of habit, which they later joke about.
  core: Pedro Lei is a serene, garden‑loving elder who blends disciplined routines with flexible spontaneity, shares home‑cooked feasts and mechanical know‑how, and quietly anchors their community with
    calm resilience and occasional absent‑mindedness about bills.
background:
  cultural: Pedro's roots are firmly planted in Mexican heritage. He was born in the state of Jalisco, Mexico, and immigrated to the United States with his family in his early twenties, eventually settling
    in Detroit's historic Mexicantown. The customs of his hometown—family gatherings, Catholic celebrations such as Dia de los Muertos and Las Posadas, and the rich culinary traditions—remain central to
    his identity. Over decades, he has woven Mexican culture into the fabric of Detroit life, maintaining bilingual fluency, sharing Mexican recipes with neighbors, and volunteering at the local cultural
    center to support new immigrants. While he embraces aspects of American life, such as attending Detroit Tigers games, his daily routines and values reflect a blend of Mexican familial warmth and the
    resilience cultivated by his immigrant experience.
