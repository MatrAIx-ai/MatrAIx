  career_goals: Although retired, Pedro aims to stay active and purposeful. He wants to preserve his health through regular walks and a balanced diet, and to pass on his culinary and mechanical knowledge
    to younger family members and neighbors. He aspires to expand the community garden he helps manage, creating a space where heritage Mexican plants grow alongside local varieties. He also hopes to document
    family recipes and stories for future generations, and to continue serving as a trusted mentor at the neighborhood cultural center.
