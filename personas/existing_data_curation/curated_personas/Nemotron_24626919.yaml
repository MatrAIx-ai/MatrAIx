  hobbies: '["hiking in Forest Park", "windowsill herb gardening", "reading non‑fiction and DIY books", "listening to productivity and self‑improvement podcasts", "building scale model kits", "bicycling
    around Portland", "home coffee brewing", "small‑group board game evenings"]'
  career_goals: James aims to re‑enter the workforce by first completing his GED through an adult education program within the next year. He is looking for an entry‑level position in a structured environment
    that values reliability, such as a bike‑repair shop, facilities maintenance crew, or a warehouse role. In the short term, he wants to gain on‑the‑job experience and earn a certification in basic building
    maintenance or HVAC. His longer‑term ambition is to move into a supervisory or specialist role where he can mentor others and contribute to a well‑organized team, while also achieving financial stability
    to support independent living.
