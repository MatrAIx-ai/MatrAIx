  career_goals: Although retired from formal employment, Amisha aims to expand her impact through volunteer leadership at the local senior center, where she plans to teach cooking classes and lead intergenerational
    storytelling circles. She hopes to document her family's genealogy and share it with younger relatives, preserving cultural memory. Amisha also aspires to serve on the Bronx neighborhood advisory board,
    advocating for senior-friendly policies while staying active and healthy through regular walking groups and dance sessions.
