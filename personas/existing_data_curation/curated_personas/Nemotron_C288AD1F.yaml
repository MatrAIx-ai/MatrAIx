personas:
  professional: Suong Panyanouvong is a budding health administration professional who manages daily outpatient clinic operations with deft use of Epic and Cerner, leverages bilingual communication to bridge
    English‑Lao patients, and harnesses their calm, compassionate nature, so they keep a chaotic front desk running smoothly despite occasional disorganization.
  sports: Suong Panyanouvong blasts the ball in a weekend pick‑up soccer league with the Durham United Soccer Club, hikes the Blue Ridge Mountains in autumn, and roots for the Carolina Panthers and Charlotte
    Hornets while they track their step count on a fitness tracker.
  arts: Suong Panyanouvong sways to the rhythms of traditional Lao folk singer Katay Sopha at community festivals, but also sings along to BTS, Taylor Swift, and The Avett Brothers at local venues, and
    they treasure the improvisational flair of dancer Martha Graham when they catch a performance at the Durham Performing Arts Center.
  travel: Suong Panyanouvong prefers spontaneous weekend getaways, has trekked the misty trails of Asheville’s Blue Ridge Parkway and explored Chiang Mai’s night markets, dreams of a river cruise on the
    Mekong near Luang Prabang, and they carefully balance student budget constraints with a love for immersive cultural experiences.
  culinary: Suong Panyanouvong cooks aromatic larb moo with lime, fish sauce, mint, and toasted rice powder, perfects sticky rice for traditional papaya salad, and mixes in jalapeno‑spiked fried chicken
    wings for potluck nights, showcasing a knack for blending Lao flavors with Southern BBQ techniques, and they always keep a spare supply of fresh herbs on hand.
  core: Suong Panyanouvong is a socially‑driven, calm 19‑year‑old who balances impromptu gatherings and community health dreams with a quirky habit of misplacing keys yet never misplacing compassion, and
    they radiate quiet confidence in every room.
background:
  cultural: Suong is a second-generation Southeast Asian American, with her family originating from Laos. She was raised in a household that blends Laotian traditions—such as Buddhist practices, Lao New
    Year celebrations, and respect for elders—with the Southern hospitality of North Carolina. Fluent in both English and Lao, she often serves as a cultural bridge within her community, assisting recent
    immigrants in navigating the U.S. healthcare system. Her upbringing emphasized communal support, humility, and the importance of education, shaping her compassionate and cooperative outlook. While embracing
    her Laotian heritage, Suong also identifies with the multicultural fabric of the Charlotte metropolitan area, participating in local festivals and cross-cultural exchange programs.
attributes:
