  career_goals: Suong aims to complete her bachelor’s degree in health administration or public health within the next three years, leveraging her current experience to transition into a full-time clinic
    manager role. She aspires to lead a community health center that serves underserved populations, particularly Southeast Asian immigrants, by expanding access to preventive care and culturally competent
    services. Long-term, she envisions pursuing a Master of Public Health to influence health policy, develop outreach programs, and possibly open a nonprofit health education hub. She also hopes to mentor
    younger staff and promote a collaborative, patient-focused workplace culture.
