  hobbies: '[''Drawing and coloring'', ''Exploring nature in the backyard'', ''Collecting rocks and leaves'', ''Listening to music'', ''Reading picture books'', ''Building with blocks'', ''Doing puzzles'',
    ''Simple gardening experiments'']'
  career_goals: Even at five, Wendy dreams of turning her love of art and nature into a future career. She imagines becoming an illustrator who brings stories about wildlife to life, or a wildlife biologist
    who studies the animals she observes. She also expresses a desire to teach younger children, sharing her curiosity and creative skills. Wendy’s ambitions are shaped by her competitive spirit; she wants
    to excel in her chosen field, win recognition for her ideas, and inspire others to think beyond the conventional.
