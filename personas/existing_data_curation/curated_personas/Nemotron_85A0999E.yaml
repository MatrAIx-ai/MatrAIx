personas:
  professional: Wendy Perdigao, a budding preschool inventor, builds simple machines with Lego bricks, keeping a tidy work area while flexibly experimenting with new designs and challenging peers to improve
    their creations.
  sports: Wendy Perdigao participates in T‑ball with the Oakwood Cubs and weekly gymnastics at Little Stars Club, proudly supports the nearby Jacksonville Jumbo Shrimp by waving their cap at games, and
    enjoys competitive snack‑time races with friends.
  arts: Wendy Perdigao spends afternoons drawing vivid Seussian‑inspired scenes, humming Disney’s “Let It Go” on a toy keyboard, and crafting glittery collages, blending bright colors with meticulous patterns
    that reflect her curious and organized nature.
  travel: Wendy Perdigao loves short family road trips to the coastal lighthouse town of Port Sunshine where she collects seashells and sketches shorelines, dreams of exploring Disney World in Orlando,
    and is fascinated by the prospect of visiting Utah’s dinosaur museum.
  culinary: Wendy Perdigao prefers creamy mac and cheese, sweet banana pancakes with maple syrup, and crunchy carrot sticks with hummus, delights in decorating cupcakes with rainbow sprinkles, but often
    forgets to wash her hands before meals and can be stubborn about trying new vegetables.
  core: Wendy Perdigao is an inquisitive five‑year‑old who blends artistic curiosity with a competitive edge, meticulously organizes play projects while quietly challenging peers, and balances a disciplined
    savings habit with occasional candy splurges.
background:
  cultural: Wendy was raised in Dixie, Georgia, a close‑knit rural community steeped in Southern traditions. Her family participates in local church gatherings, community fairs, and seasonal festivals that
    celebrate the region’s agricultural roots. While her ethnic background is White, her upbringing blends Southern hospitality with a deep respect for the natural environment surrounding her home. School
    art programs and the local library’s storytime sessions have nurtured her appreciation for creativity, and family storytelling evenings have reinforced a love for narratives that explore both personal
    and collective experiences.
