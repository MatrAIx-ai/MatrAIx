personas:
  professional: Miguel Soto, a seasoned retail cashier with razor‑sharp cash‑handling and POS expertise, blends their bilingual fluency and calm conflict‑resolution skills with a practical curiosity that
    drives small process improvements, positioning them as a natural candidate for a shift‑lead role.
  sports: Miguel Soto, a devoted fan of the Vegas Golden Knights and the Las Vegas Raiders, spends weekends hiking with the Southern Nevada Trails Club and they join a casual indoor pickleball league to
    keep fit during the cooler months.
  arts: Miguel Soto, an acoustic‑guitar enthusiast, finds solace strumming folk‑rock tunes by John Mayer and Ed Sheeran while immersing themselves in the lyrical novels of Gabriel Garcia Marquez and the
    cinematic works of Guillermo del Toro.
  travel: Miguel Soto prefers meticulously planned road trips that blend adventure with cultural immersion, having trekked the Grand Canyon, explored Oaxaca’s historic markets, and they dream of a pilgrimage
    to the historic streets of Seville.
  culinary: Miguel Soto enjoys cooking traditional family recipes—hand‑made corn masa tamales, rich pozole broth, and spice‑laden mole—skillfully balancing flavors with chilies, fresh cilantro, and toasted
    pumpkin seeds, and they delight in sharing these dishes at community potlucks.
  core: Miguel Soto’s quiet curiosity fuels a disciplined work ethic, a love for solitary guitar sessions, a habit of over‑organizing pantry shelves, and a relentless drive to turn their cultural culinary
    roots into a neighborhood storefront, which they view as their legacy.
background:
  cultural: Miguel was raised in a Mexican‑American household in Las Vegas, where bilingualism, close‑knit family ties, and community involvement were central values. He celebrates cultural traditions such
    as Día de los Muertos and enjoys sharing festive foods with friends and relatives. While fully integrated into the broader Nevada culture, he maintains a strong connection to his Latino heritage through
    language, cuisine, and participation in local cultural events.
attributes:
  skills: '[''Cash handling'', ''POS operation'', ''Bilingual communication (Spanish/English)'', ''Customer service'', ''Conflict resolution'', ''Inventory control'', ''Basic bookkeeping'', ''Time management'',
    ''Process improvement'', ''Empathy-driven problem solving'']'
  hobbies: '[''Reading historical biographies'', ''Hiking in Red Rock Canyon'', ''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Genealogy research'', ''Volunteering at a local food
    pantry'']'
  career_goals: Miguel seeks to transition from cashier to a supervisory role, such as shift lead or assistant store manager, within the next two to three years. He plans to complete a retail management
    certification and develop mentorship skills to train new employees, leveraging his compassionate nature to foster a harmonious workplace. Long‑term, he dreams of opening a small, community‑focused convenience
    store that reflects his cultural heritage and provides reliable service to his neighborhood.
