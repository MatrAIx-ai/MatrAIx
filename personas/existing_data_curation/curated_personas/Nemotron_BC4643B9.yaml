personas:
  professional: Shijun Park, a retail operations specialist with a flair for visual merchandising, leverages bilingual fluency, meticulous inventory management, and an artist’s eye to design compelling
    store displays while pursuing a fast‑track to store and district management.
  sports: Shijun Park, an avid solo hiker who frequents the Appalachian Trail sections of Connecticut and occasionally joins the local Trailblazers Hiking Club, supports the New England Patriots and the
    Hartford Yard Goats, and balances disciplined cardio runs with occasional missed sessions due to store inventory audits.
  arts: Shijun Park, a regular at the Wadsworth Atheneum and a participant in small‑group sketch workshops, draws inspiration from Yayoi Kusama’s installations, captures urban moments in the style of Nan
    Goldin, curates eclectic playlists featuring Sufjan Stevens and experimental Korean indie band Hyukoh, and practices Korean calligraphy to maintain a link to familial traditions.
  travel: Shijun Park prefers meticulously planned solo trips that blend art pilgrimages and culinary exploration, having recently visited Barcelona’s Picasso Museum, Seoul’s Insadong district during Chuseok,
    and the desert landscapes of Sedona, while budgeting future journeys to remote galleries in Kyoto and emerging design hubs in Detroit.
  culinary: Shijun Park, an experimental home cook, enjoys blending traditional kimchi‑jjang (spicy fermented cabbage) with modern sous‑vide techniques to create a kimchi‑infused steak, frequently prepares
    bibimbap bowls with heirloom vegetables, and relishes tasting aromatic dishes like Ethiopian injera with berbere, all while mastering the art of plating inspired by minimalist design.
  core: Shijun Park is a disciplined, art‑driven retail professional who balances meticulous organization with a solitary creative streak, often channeling competitive ambition into innovative store displays
    while occasionally indulging in late‑night calligraphy sessions and impulsive splurges on rare art books.
background:
  cultural: Shijun Park is a second‑generation Korean‑American whose family values emphasize hard work, respect for tradition, and education. Growing up in a multicultural community in Fairfield County,
    he celebrates Korean holidays such as Chuseok and Lunar New Year while also participating in broader American cultural events. His cultural heritage informs his disciplined work ethic and his appreciation
    for both Korean and Western artistic expressions, which he integrates into his personal and professional life.
attributes:
  skills: '[''Customer service'', ''Sales negotiation'', ''POS system operation'', ''Inventory management'', ''Visual merchandising'', ''Store layout planning'', ''Loss prevention'', ''Data-driven sales
