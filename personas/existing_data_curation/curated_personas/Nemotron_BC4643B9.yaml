  hobbies: '[''Visiting art museums'', ''Sketching and drawing'', ''Reading modern art and design literature'', ''Photography'', ''Listening to indie music'', ''Exploring local coffee shops'', ''Solo hiking'',
    ''Cooking experimental dishes'', ''Learning basic Korean calligraphy'', ''Participating in small group art workshops'']'
  career_goals: Shijun aims to advance from frontline retail to a management role, targeting a store manager position within the next two years and eventually a district manager role. He plans to obtain
    a retail management certification and develop leadership skills by mentoring new staff. Leveraging his appreciation for unconventional ideas, he aspires to implement innovative merchandising concepts
    and digital tools that enhance the shopping experience. Ultimately, he dreams of opening his own boutique that blends art‑inspired products with curated retail experiences, allowing him to combine his
    organizational strengths with his creative interests.
