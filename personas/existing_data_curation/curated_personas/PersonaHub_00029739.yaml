persona_description: A conservation biologist who specializes in studying the behavior and ecology of elk populations, particularly those in protected areas such as Yellowstone and the Canadian Rockies.
  They are particularly interested in the sophisticated behavioral strategies of wapiti and how they adapt to hunting pressure and other threats. They have conducted research on the use of GPS collars and
  net-guns to track elk behavior and have published a paper in the PLOS One journal. They are likely to be knowledgeable about the ecology and conservation of elk and have a passion for understanding how
  they behave in the wild.
