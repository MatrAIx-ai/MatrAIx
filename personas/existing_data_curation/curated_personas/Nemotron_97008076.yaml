  hobbies: '[''Badminton (team league)'', ''Traditional dance workshops'', ''Cooking Vietnamese dishes'', ''Family gatherings'', ''Volunteer storytelling at senior center'', ''Coastal hiking with family'']'
  career_goals: Huy aims to transition from a store‑level supervisor to a district or area manager role within the next five years, where he can implement data‑driven process improvements across multiple
    locations. He plans to earn a Certified Retail Manager credential and lead a regional team to consistently exceed sales targets while standardizing operational excellence. Long‑term, he envisions mentoring
    emerging supervisors and, after retirement, consulting for retail chains on optimizing workforce efficiency and inventory management.
