  hobbies: '[''Cooking Traditional Puerto Rican Cuisine'', ''Morning Jogging'', ''Fishing'', ''Listening to Salsa and Plena Music'', ''Attending Local Festivals'', ''Reading Business Magazines'', ''Playing
    Chess'', ''Volunteering at Community Events'', ''Participating in Church Activities'']'
  career_goals: Juan aims to advance from his current clerk role to a supervisory position within the next two to three years, targeting roles such as Inventory Supervisor or Logistics Coordinator. He plans
    to earn an APICS Certified in Production and Inventory Management (CPIM) credential and later pursue a part‑time MBA with a focus on supply chain management. Long‑term, he envisions becoming a Warehouse
    Operations Manager or launching a small consulting firm that helps local businesses streamline their inventory processes, always emphasizing reliable, routine‑driven improvements and gradual, sustainable
    growth.
