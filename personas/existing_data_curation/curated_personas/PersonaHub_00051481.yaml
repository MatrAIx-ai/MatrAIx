persona_description: A historian who specializes in the study of global pandemics, particularly those caused by Vibrio cholerae. They have a deep interest in the history of cholera in Haiti and New York
  City, and are particularly interested in the ways in which these diseases have affected societies and communities. They have a passion for understanding the complex interactions between pathogens, societies,
  and environments, and how these factors have contributed to the spread and persistence of cholera in Haiti and New York City. They are also interested in the ways in which these diseases have shaped the
  course of history and the current state of global health.
