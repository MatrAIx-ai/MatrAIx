  hobbies: '["Gardening and horticulture", "Woodworking and furniture making", "Classic car restoration", "Historical research and genealogy", "Fishing on the Cumberland River", "Playing bridge", "Cooking
    Southern cuisine", "Traveling to national parks", "Volunteer work at church food pantry", "Organizing community festivals"]'
  career_goals: Although officially retired, Gray’s ambition centers on giving back to his community and preserving his family’s legacy. He aims to mentor younger volunteers at the local community center,
    lead a project to document the history of Crossville’s forestry industry, and compile a detailed family genealogy that can be shared with future generations. He also aspires to stay physically active
    by completing a series of modest home‑improvement projects and learning advanced woodworking techniques, while maintaining his health through regular outdoor activities.
