personas:
  professional: Mark Fields is a budding tinkerer, blending curiosity with practicality as they build LEGO robots and lead informal after‑school tech workshops for peers, balancing new ideas with tried‑and‑true
    building methods.
  sports: Mark Fields is an energetic member of the community soccer league and a baseball enthusiast who cheers for the local minor‑league team, the River City Ravens, rides a bike to practices, and participates
    in neighborhood clean‑up runs, illustrating his love for team sports and active outdoors.
  arts: Mark Fields is a creative drummer in his school’s music club who also immerses himself in adventure books like “The Maze Runner,” builds LEGO models inspired by architects such as Frank Lloyd Wright,
    and enjoys playing Minecraft with friends, blending rhythmic expression with visual and narrative storytelling.
  travel: Mark Fields is an adventurous traveler who has explored nearby state parks on family fishing trips, visited a science museum in Chicago, and dreams of a future road trip to Yellowstone National
    Park, preferring flexible itineraries over rigid schedules.
  culinary: Mark Fields is a budding home chef who loves assembling tuna melts, munching on trail mix with dried cranberries and almonds during hikes, and experimenting with making his own pizza dough topped
    with pepperoni and bell peppers, while occasionally raiding the pantry for sugary cereal late at night.
  core: Mark Fields is a curious, sociable 11‑year‑old who transforms ideas into LEGO creations, saves allowance for big projects, skips sunscreen on bike rides, and thrives on team sports, drumming, and
    spontaneous adventure trips.
background:
  cultural: Mark was born and raised in Dalton, Georgia, a small city in the foothills of the Appalachian region. His family is part of a multigenerational white Southern community with deep roots in the
    area, often attending local Baptist churches and participating in community events such as town festivals, high school football games, and church picnics. The cultural atmosphere emphasizes hospitality,
    close‑knit family ties, and a respect for outdoor recreation. Growing up in Whitfield County, he has been exposed to the region’s textile heritage, rural landscapes, and a strong sense of community
    service, all of which shape his values of cooperation, kindness, and practicality.
