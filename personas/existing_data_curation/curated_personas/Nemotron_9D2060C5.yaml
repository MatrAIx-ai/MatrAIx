  career_goals: Mark dreams of a future where he can combine his love for animals and his practical mindset. He often talks about becoming a veterinarian or a wildlife biologist to help care for local wildlife.
    He is also fascinated by engineering, imagining someday designing tools or gadgets that make everyday life easier for his community. He hopes to join a youth science program, earn a scouting merit badge
