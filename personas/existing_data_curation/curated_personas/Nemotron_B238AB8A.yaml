personas:
  professional: Brittney Aldaco, an 11‑year‑old budding visual storyteller, blends cartoon drawing, DIY craft design, and beginner coding to create lively, interactive comic strips that they share with
    their soccer teammates during after‑school hangouts.
  sports: Brittney Aldaco is a competitive midfielder on her local youth soccer league, idolizes the US Women’s National Team and the Chicago Fire, trains at the community recreation center three times
    a week, and joins weekend hikes at the nearby Boulder Ridge Trail to build stamina, yet they sometimes prioritize winning over team collaboration.
  arts: Brittney Aldaco, a keen cartoonist and DIY craft enthusiast, spends afternoons sketching comic panels, assembling upcycled jewelry from reclaimed bottle caps, attending weekend pottery workshops,
    and curating indie folk playlists featuring Bon Iver and Phoebe Bridgers, which they claim spark fresh artistic ideas.
  travel: Brittney Aldaco loves weekend nature hikes at the local Cedar Creek Preserve, has visited the science museum in nearby Springfield, dreams of exploring Kyoto’s historic temples for their anime
    art, and usually plans family trips using colorful maps and stickers, balancing parent‑approved itineraries with her own curiosity for adventure.
  culinary: Brittney Aldaco enjoys crafting quick snacks like strawberry‑banana fruit kebabs, mastering no‑bake granola bars with their mom, prefers pizza with pepperoni and extra cheese, and delights in
    trying new indie folk café dishes such as avocado toast topped with feta, though they sometimes cheat on health goals with a bag of gummy bears.
  core: Brittney Aldaco is an inquisitive, art‑driven 11‑year‑old who channels competitive energy into soccer and craft projects, balances responsibility with playful curiosity, and occasionally lets impulsive
    snack cravings and skepticism about others’ motives cloud a generally vibrant outlook.
background:
  cultural: Brittney is an American of European descent, raised in Fairfield, a coastal town in Somerset County, Maine. Her family’s heritage includes English and Irish roots, reflected in seasonal traditions
    such as celebrating St. Patrick’s Day and participating in local Fourth of July parades. The New England environment, with its rugged coastline, forests, and maritime culture, informs her appreciation
    for outdoor activities like hiking and lobster festivals. The community’s emphasis on public education and support for local arts and sports provides a backdrop for her involvement in school clubs and
    seasonal community events.
