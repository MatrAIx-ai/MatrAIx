  career_goals: Angela plans to complete her GED this year and enroll in a community‑college program in social work or psychology. She aspires to become a community outreach coordinator or youth services
    counselor, where she can blend her love for art with her drive to help others. In the long term she hopes to create a non‑profit art‑therapy program for teens in rural Minnesota, using creative workshops
    to promote mental‑wellness and social cohesion. She also envisions gaining certifications in mental‑health first aid and eventually pursuing a bachelor’s degree in social work.
