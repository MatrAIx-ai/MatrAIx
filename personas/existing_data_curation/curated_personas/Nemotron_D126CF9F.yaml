personas:
  professional: Lisle Knox is a data‑driven public‑health statistician who blends rigorous predictive modeling in R and Python with a humanistic knack for storytelling, turning complex survey results into
    clear policy briefs while mentoring junior analysts and meticulously documenting every step to uphold data integrity.
  sports: Lisle Knox is an avid hiker with the Red Rock Trailblazers club, logs weekly yoga sessions, follows the Las Vegas Raiders and the Vegas Golden Knights, and prefers low‑impact cardio over team
    sports, viewing fitness as a steady, mindful routine rather than a competitive pursuit.
  arts: Lisle Knox immerses themselves in contemporary fiction by authors like Sally Rooney, attends small literary salons, appreciates the surreal installations of James Turrell at the Nevada Museum of
    Art, and finds solace listening to Sufjan Stevens and Phoebe Bridgers while photographing street art and garden blooms.
  travel: Lisle Knox prefers low‑key, nature‑focused getaways, planning weekend hikes in Zion and a month‑long culinary exploration of Tuscany, balancing budget constraints with a penchant for photographing
    sunrise over desert cliffs and a wish to someday trek the ancient temples of Kyoto.
  culinary: Lisle Knox enjoys experimental plant‑based cooking, frequently whipping up quinoa‑stuffed peppers with harissa, Mediterranean chickpea stew, and avocado toast topped with fresh basil, yet often
    over‑seasons dishes while delighting in the tactile process of tending a backyard herb garden.
  core: Lisle Knox combines methodical data mastery, quiet curiosity, and a calming love of solitary hobbies into a disciplined yet creatively curious approach to life, punctuated by a habit of over‑planning
    and occasional coffee splurges.
background:
  cultural: Lisle was raised in a middle‑class Anglo‑American family of Irish‑German ancestry in the Midwest before relocating to Henderson, Nevada for her career. Her upbringing emphasized self‑reliance,
    education, and community involvement, while her humanities studies fostered an appreciation for diverse cultural narratives and artistic expression. Living in the multicultural environment of Clark
    County has broadened her perspective, encouraging an inclusive outlook that blends her traditional American roots with a curiosity for global ideas.
attributes:
  skills: '[''Statistical Modeling'', ''Predictive Analytics'', ''Experimental Design'', ''Survey Methodology'', ''R Programming'', ''Python for Data Science'', ''SQL'', ''Data Visualization (Tableau, ggplot2)'',
    ''SAS'', ''Data Cleaning'', ''Reproducible Research (Git)'', ''Report Writing'', ''Project Management'', ''Critical Thinking'', ''Qualitative Analysis'']'
  hobbies: '[''Reading contemporary fiction'', ''Philosophical essay reading'', ''Visiting art museums'', ''Small literary discussion groups'', ''Hiking in Red Rock Canyon'', ''Photography'', ''Yoga and
    mindfulness'', ''Gardening'', ''Experimental cooking'']'
  career_goals: Lisle aims to advance to a senior statistician or data science lead role within a public‑health or policy institute, where she can shape evidence‑based decisions. She plans to earn a Master’s
    in Data Science to deepen her technical expertise, while mentoring junior analysts and fostering collaborative, data‑driven teams. Long‑term, she envisions directing an analytics department that integrates
    quantitative rigor with humanistic insights, influencing regional health outcomes and community planning in Nevada.
