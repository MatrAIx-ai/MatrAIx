  career_goals: Nancy aspires to advance into a senior HR leadership role, such as HR Manager or HR Business Partner, where she can shape strategic initiatives that prioritize employee well‑being and mental
    health. She plans to attain the SHRM Senior Certified Professional (SHRM‑SCP) credential within the next two years, deepen her expertise in HR analytics, and design a comprehensive wellness program
    that reduces workplace stress. Additionally, she aims to mentor emerging HR professionals, champion inclusive policies that reflect the cultural diversity of New Mexico, and eventually influence organizational
    strategy by aligning HR practices with business objectives.
