  hobbies: '[''Playing soccer'', ''Hiking in the Cascades'', ''Cooking traditional Costa Rican dishes'', ''Listening to Latin reggae and folk music'', ''Volunteering at the community youth center'', ''Building
    and tinkering with electronics'', ''Sketching landscapes'']'
  career_goals: Jose aims to enroll in a community college program focused on environmental science or sustainable agriculture, with the long‑term ambition of earning a bachelor’s degree in environmental
    engineering. He envisions applying his practical skills and organized approach to develop sustainable irrigation and soil‑conservation projects for small farms in his hometown in Costa Rica and for
    local orchards in Oregon. Ultimately, he hopes to become a project manager for a non‑profit organization that bridges U.S. and Central American agricultural initiatives, leveraging his bilingual abilities,
    cultural insight, and collaborative personality.
