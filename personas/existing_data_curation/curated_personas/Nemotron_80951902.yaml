personas:
  professional: Jose Coronado is a budding environmental science student who leverages their bilingual communication, methodical planning and hands‑on tinkering to spearhead community garden projects and
    sustainable irrigation prototypes for local farms, while balancing a natural curiosity with practical execution.
  sports: Jose Coronado drops into soccer matches with the Lebanon Lions on Saturday afternoons, follows the Portland Timbers and Oregon State Beavers with fervor, and spends weekends hiking the Cascades,
    maintaining a balanced fitness routine that blends team sport camaraderie with solitary trail runs.
  arts: Jose Coronado curates an eclectic soundtrack that mixes Latin reggae artists like Gondwana, indie folk staples such as Bon Iver and Portland‑based indie rock bands like The Decemberists while sketching
    Cascade vistas, and dabbles in graphic design for community event flyers using Adobe Photoshop and Canva.
  travel: Jose Coronado fuels a love for eco‑adventures, having trekked the Monteverde cloud forest and surfed the Oregon Coast, they now dream of backpacking through Patagonia’s glaciers and exploring
    the wineries of New Zealand, always planning trips around sustainable transport and modest budgets.
  culinary: Jose Coronado whips up gallo pinto and citrus‑bright ceviche at home, often swapping local Oregon salmon or wild mushrooms into the rice‑bean mix, and while their intermediate cooking skills
    shine at friends’ potlucks, they sometimes misplace the cilantro and end up with a bland batch.
  core: Jose Coronado is a sociable, organized 19‑year‑old who fuses hands‑on curiosity with a passion for sustainability, often juggling community projects, soccer, and experimental cooking while slipping
    into occasional procrastination.
background:
  cultural: Raised in a bilingual Costa Rican household, Jose grew up immersed in the values of "pura vida," family solidarity, and a deep respect for nature. He celebrates traditional festivals such as
    Semana Santa and enjoys communal meals centered around rice, beans, and fresh produce. His parents emphasized education and community service, instilling a sense of responsibility and compassion. After
    moving to Lebanon, Oregon, he adapted to American cultural norms while preserving his Costa Rican heritage, creating a hybrid identity that blends Latin American warmth with the Pacific Northwest's
    appreciation for outdoor recreation and sustainability.
