persona_description: A marine biologist with a specialization in Steller sea lion conservation, specifically focusing on the management and protection of the population in the western Gulf of Alaska. They
  have a keen interest in understanding the decline in Steller sea lion population, the reasons behind it, and the measures taken to protect them. They are knowledgeable about the history of the island,
  its significance in Steller sea lion conservation, and the impact of fishing restrictions on the population. They are also interested in the use of the CoastView app for exploring the many islands and
  reefs off the Alaska Peninsula.
