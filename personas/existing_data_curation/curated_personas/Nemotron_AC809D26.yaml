personas:
  professional: Pedro Castillo, a budding LEGO architect, channels his methodical planning, vivid imagination, and talkative nature into designing intricate cityscapes that he proudly showcases to classmates
    and family as if they were real urban projects.
  sports: Pedro Castillo thrives on the soccer field as a forward for the Batavia Thunder youth club, combines his love for the Chicago Fire with weekend drills at the local park, and they eagerly watch
    FIFA World Cup highlights to emulate his favorite players.
  arts: Pedro Castillo immerses himself in creative expression, doodling scenes inspired by the vibrant colors of Frida Kahlo, performing in school plays where they love reciting lines from Peter Pan, and
    listening to a mix of classic Disney soundtracks, cumbia beats, and energetic guitar riffs of Shakira.
  travel: Pedro Castillo dreams of swapping backyard adventures for worldwide escapades, having already visited Chicago’s Museum of Science and Industry, they plan to explore Barcelona’s Gothic Quarter
    to see real paella pots, and hope to ride the roller coasters at Orlando’s Walt Disney World, preferring family‑guided itineraries with plenty of playground time.
  culinary: Pedro Castillo delights in the flavors of both cultures, eagerly helping to stir a pan of saffron‑infused seafood paella during Día de los Reyes, savoring warm churros dipped in chocolate, and
    balancing those treats with classic American mac‑and‑cheese, though they occasionally sneak extra cheese onto his pizza.
  core: Pedro Castillo is a sociable, methodical seven‑year‑old who merges vivid imagination with disciplined planning, turning LEGO bricks, soccer drills, and family traditions into a vibrant, slightly
    messy tapestry of curiosity that they proudly share with friends.
background:
  cultural: Pedro comes from a Spanish ethnic background, with his family maintaining traditions such as celebrating Día de los Reyes and enjoying dishes like paella and churros during special occasions.
    Growing up in Batavia, Illinois, he blends these cultural practices with Midwestern American values, participating in community events, school activities, and local festivals. His bilingual household
    fosters fluency in both English and Spanish, enriching his appreciation for language, music, and art, and providing a multicultural perspective that influences his curiosity and social interactions.
