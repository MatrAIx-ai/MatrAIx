  career_goals: Pedro dreams of becoming an astronaut who can travel to distant planets and share his experiences through art, blending his love for space, science, and drawing. He also imagines teaching
    younger children how to create art and tell stories, valuing the chance to inspire others. In the short term, he aims to improve his reading speed, master more complex art techniques, and participate
    in his school’s science fair, laying groundwork for his future aspirations.
