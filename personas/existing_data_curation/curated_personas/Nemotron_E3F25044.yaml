personas:
  professional: Anna Notario, a high‑school senior whose knack for rallying teammates and dissecting arguments shines in debate and Model UN, leverages their basic HTML/CSS and Canva design skills to prototype
    eco‑friendly sports‑gear concepts, embodying a blend of practical curiosity, competitive drive, and organized flexibility that foreshadows a future entrepreneurial career.
  sports: Anna Notario, a versatile teen athlete, guards the net for the Burlington Soccer Club, flies the disc for the Green Mountains Ultimate Frisbee League, cross‑country skis with the Chittenden County
    Ski Club, and proudly roots for the Vermont Catamounts while keeping tabs on the New England Revolution for professional soccer inspiration.
  arts: Anna Notario, an aspiring acoustic guitarist, finds melodic inspiration in Brandi Carlile and Dua Lipa, crafts vlog intros with Wes Anderson‑style symmetry, snaps nature photos that echo Ansel Adams’
    dramatic vistas, and fuels creative downtime with YA bestsellers by Becky Albertalli and Sarah J. Maas.
  travel: Anna Notario plans trips by balancing cost‑effective backpacking spontaneity with detailed budgeting, has trekked the Appalachian Trail in New Hampshire, road‑tripped to Quebec City for its winter
    carnival, and now dreams of a sustainable surf camp on Costa Rica’s Nicoya Peninsula once college finances allow.
  culinary: Anna Notario, a self‑taught cook, regularly prepares quinoa‑black bean burrito bowls seasoned with smoked paprika and lime, perfects avocado toast crowned with radish slices and microgreens,
    experiments with homemade granola featuring rolled oats, honey, and toasted almonds, and treats themselves to pan‑seared salmon drizzled with a lemon‑dill vinaigrette after long hikes.
  core: Anna Notario fuses a competitive spark and sustainability focus with a quirky habit of late‑night binge‑watching teen dramas, often overcommitting to clubs and neglecting basic chores like charging
    their phone.
background:
  cultural: Anna is a White, second‑generation American of English and Irish heritage raised in suburban Burlington, Vermont. Her family values community involvement, environmental stewardship, and education,
    reflecting the town's blend of New England pragmatism and progressive activism. She grew up attending public schools, participating in local traditions such as the Burlington Farmers' Market and community
    bike rides, and celebrating holidays with modest Protestant roots. The region's emphasis on outdoor recreation, sustainability, and civic engagement shapes her balanced curiosity and practical outlook.
