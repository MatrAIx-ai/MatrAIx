  career_goals: Anna aims to attend a university with a strong business program, focusing on entrepreneurship and sustainable product development. She envisions launching a start‑up that creates eco‑friendly
    sports gear, merging her love for athletics with her practical curiosity about technology and the environment. In the long term, she hopes to become a leader in sports management or a community‑focused
    business executive, using her competitive drive to mentor younger students and champion local sustainability initiatives.
