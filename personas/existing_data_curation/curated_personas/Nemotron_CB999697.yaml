  hobbies: '[''sketching'', ''photography'', ''art history reading'', ''documentary watching'', ''hiking'', ''calligraphy'', ''listening to logistics podcasts'']'
  career_goals: Diana aims to advance from a material‑moving worker to a supervisory role within the next three years, targeting a position as a warehouse lead where she can implement efficiency initiatives
    and mentor a small team. She plans to leverage her associate’s degree and pursue supplemental certifications in supply chain logistics to qualify for a regional logistics coordinator role. Long‑term,
    she envisions combining her logistics expertise with her artistic interest by specializing in the transportation and handling of high‑value artwork and museum collections, positioning herself as a trusted
    liaison between galleries and shipping firms.
