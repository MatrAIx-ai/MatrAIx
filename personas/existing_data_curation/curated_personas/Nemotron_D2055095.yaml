    home production workflow'']'
  hobbies: '[''Quilting'', ''Hand embroidery'', ''Vegetable gardening'', ''Listening to jazz and blues music'', ''Reading historical fiction'', ''Participating in church choir'', ''Nature walks and sketching'',
    ''Baking traditional pies'', ''Volunteering at the local community center for crafts'']'
  career_goals: Approaching retirement, Paulette aims to channel her expertise into preserving African‑American quilting traditions by leading a weekly sewing circle at the local community center and eventually
    curating a small collection of her quilts for the regional historical society. She hopes to compile a handwritten booklet of her favorite patterns and fabric tips to pass on to younger generations,
    and to provide one‑on‑one mentorship to younger factory workers interested in craftsmanship. Her goals are modest and flexible, reflecting her relaxed approach to obligations while still allowing her
    to assertively champion the value of hands‑on textile heritage in her community.
