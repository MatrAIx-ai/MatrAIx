personas:
  professional: Paulette Senat is a veteran industrial sewing machine operator who leverages four decades of hands‑on expertise in lock‑stitch and over‑lock maintenance to teach practical quilting techniques,
    blending curious experimentation with a relaxed, sometimes disorganized schedule while they assertively preserve textile heritage in their community.
  sports: Paulette Senat stays active with leisurely walks along the Maumee River, occasional chair‑yoga sessions at the senior center, and follows the Toledo Mud Hens and Cleveland Browns with weekend
    game‑day rituals, while they enjoy the seasonal camaraderie of a local walking club that meets in spring and fall.
  arts: Paulette Senat immerses themselves in the soulful sounds of Miles Davis, B.B. King, and Ella Fitzgerald on vinyl, volunteers as a harmony singer in their church choir, and occasionally attends productions
    at the Toledo Repertoire Theatre, while they find inspiration in the works of author Maya Angelou and the vibrant patterns of Frida Kahlo’s paintings that adorn their quilting sketches.
  travel: Paulette Senat favors relaxed, low‑key road trips that blend cultural curiosity with comfort, having explored New Orleans’ jazz scene, the historic streets of Savannah, and the Quilt Museum in
    Paducah, while they dream of a leisurely cruise down the Mississippi Delta to trace the blues origins that echo through their vinyl collection.
  culinary: Paulette Senat, an adept home cook, delights in preparing soul‑food classics such as sweet potato pie, collard greens seasoned with smoked ham hocks, and chicken‑and‑dumpling stew using fresh
    heirloom tomatoes and kale from their garden, while they occasionally experiment with a pinch of Cajun spice in a traditional cornbread batter.
  core: Paulette Senat is a quietly determined quilter who balances a love for spontaneous fabric hunts with a habit of misplacing their pattern notes, turning their modest, unstructured schedule into a
    tapestry of community mentorship and timeless craftsmanship, and they cherish the simple joy of thread in their hands.
background:
  cultural: Paulette’s cultural background is rooted in the African‑American experience of the Midwest. Her grandparents were part of the Great Migration, moving from the rural South to Ohio in the 1940s,
    bringing gospel hymns, soul‑food recipes, and a reverence for handmade textiles. Raised in a tight‑knit Black church community in nearby Toledo, she grew up attending Sunday services, gospel choirs,
    and community picnics that emphasized mutual aid. The legacy of quilting circles that emerged during the 1960s civil‑rights movement influenced her appreciation for collective craft, and she carries
    forward family traditions of storytelling, seasonal soul‑food cooking, and the celebration of African motifs in her own fabric choices. Though she lives in a predominantly white small town, she remains
    connected to a network of Black elders in the region, participating in cultural festivals and sharing her knowledge of textile heritage.
attributes:
  skills: '[''Industrial sewing machine operation'', ''Pattern reading and modification'', ''Fabric selection and testing'', ''Basic machine maintenance and troubleshooting'', ''Hand embroidery and decorative
