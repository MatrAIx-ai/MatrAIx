personas:
  professional: Robert Sterling, a two‑year‑old with a natural love for order, treats their playroom like a miniature office, arranging blocks by color, forecasting the next step of a tower before stacking,
    and they proudly declare a future as an architect or engineer, reflecting their balance of curiosity and practicality.
  sports: Robert Sterling, a two‑year‑old who enjoys the local 'Little Lions' soccer club, they dribble a soft, orange foam ball in the park while quietly cheering for the nearby Seattle Seahawks, they
    prefer small‑group tumble‑time over large crowds, and they stick to a gentle morning stretch routine.
  arts: Robert Sterling, a preschooler who delights in watching Sesame Street and humming the tunes of The Beatles' 'Here Comes the Sun', they spend afternoons sketching dinosaurs with Crayola crayons,
    they volunteer to sing the alphabet song during family gatherings, and they showcase subtle yet growing artistic engagement.
  travel: Robert Sterling, a two‑year‑old who has visited the San Diego Zoo and the indoor play area at Disney World in Florida, they love the bright colors of the aquarium exhibit in their city, they dream
    of a family road trip to the Grand Canyon where they can collect smooth rocks for their collection, and they cherish the memory of a weekend beach trip to the nearby coast.
  culinary: Robert Sterling, who is at the peak of refusing broccoli but loves the smooth texture of mashed sweet potatoes, they enjoy dipping strawberry slices in a thin layer of peanut butter, they proudly
    help stir the spaghetti sauce with a plastic spoon, and they display a selective yet adventurous palate.
  core: Robert Sterling, a meticulously organized and quietly curious two‑year‑old, they turn each toy, coin, and snack into a small, methodical experiment while maintaining an easygoing temperament.
background:
  cultural: Robert is part of an African‑American family living in Fort Bend County, Houston. His cultural environment blends Southern hospitality with vibrant urban Black traditions. He is exposed to soulful
    music such as gospel, blues, and contemporary R&B, and participates in community gatherings at a local church that emphasize fellowship and shared meals. Family celebrations often feature Southern comfort
    foods like collard greens, cornbread, and fried catfish, as well as seasonal events such as Juneteenth and family reunions that stress storytelling, intergenerational bonds, and a deep appreciation
    for rhythm and community.
