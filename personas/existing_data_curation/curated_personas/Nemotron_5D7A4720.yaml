  career_goals: Although currently not in the formal workforce, Seth aims to channel his skills into projects that enrich Boonville's cultural life. He plans to launch a community‑run art studio where he
    can teach weekend photography and watercolor classes, especially for seniors and teenagers. He hopes to partner with the Lewis County Historical Society to create a photo‑essay series that documents
    the region's changing landscapes and oral histories, eventually curating a small exhibit at the local library. Seth also aspires to formalize a volunteer mentorship program that pairs experienced handymen
    with younger adults interested in trades, thereby preserving practical skills within the community. On a more personal level, he would like to write and self‑publish a memoir that weaves together his
    life experiences with the folklore of upstate New York, contributing to the local literary scene. He is open to occasional consulting work on home‑repair projects, providing a modest income while maintaining
    flexibility.
