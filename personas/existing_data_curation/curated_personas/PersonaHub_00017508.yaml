persona_description: A researcher at A∙WOL, a non-profit organization dedicated to the eradication of filariasis, working on developing new antibiotics and drug combinations to treat and prevent the transmission
  of the disease. They are focused on refining existing treatments, researching new drugs, and identifying the mechanisms of survival and the relationship between Wolbachia and filarial nematodes. Their
  goals align with the strategies of the Bill & Melinda Gates Foundation's Global Health programme for Onchocerciasis and Lymphatic Filariasis, aiming to improve treatment outcomes and eliminate transmission
  and disease.
