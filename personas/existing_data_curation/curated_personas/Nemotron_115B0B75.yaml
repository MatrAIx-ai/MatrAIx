  hobbies: '[''Cooking traditional Mexican dishes'', ''Balcony herb and chili gardening'', ''Beach and canal walks'', ''Home yoga practice'', ''Reading contemporary fiction and historical novels'', ''Salsa
    dancing'', ''Volunteering at community ESL center'']'
  career_goals: Magda aims to secure a part‑time position that offers a predictable schedule while allowing flexibility for family duties, such as a customer‑service or administrative assistant role in
    a local small business. She is also exploring the possibility of launching a home‑based catering service focused on authentic Mexican dishes for neighborhood events, which would blend her culinary passion
    with entrepreneurship. To support these goals, she plans to obtain a food‑handler certification and may enroll in a short vocational program in hospitality or business management. Long‑term, she seeks
    a reliable income stream that strengthens her family's financial security and enables her to contribute to the Mexican community in Fort Lauderdale through cultural workshops and mentorship.
