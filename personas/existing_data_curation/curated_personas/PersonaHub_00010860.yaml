persona_description: A physical therapist who specializes in the examination and treatment of the hip joint, particularly focusing on the biomechanical and anatomical features of the hip, as well as the
  safe performance of orthopaedic manual physical therapy interventions. They have a strong background in anatomy, biomechanics, and clinical decision-making, and are skilled in performing joint mobilization
  techniques for the hip. They are interested in understanding the functional anatomy and kinematics of the hip joint, and are dedicated to providing comprehensive care to patients with hip-related issues.
