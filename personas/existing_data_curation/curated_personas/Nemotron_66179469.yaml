  hobbies: '["Reading contemporary fiction", "Journaling", "Knitting and crocheting", "Baking", "Gardening", "Hiking local trails", "Birdwatching", "Small book club participation", "Volunteering at animal
    shelter"]'
  career_goals: Candace aims to enroll in a community college program to earn an associate's degree in early childhood education or nursing, seeking a stable yet flexible career that aligns with her desire
    for structure and occasional autonomy. In the short term, she hopes to secure an entry-level administrative assistant position at the local school or health clinic, where she can apply her organizational
    and interpersonal skills while maintaining predictable work hours. Long‑term, she aspires to become a certified nursing assistant (CNA) or a licensed early childhood educator, eventually opening a small
    home‑based daycare or a boutique offering homemade baked goods and handcrafted items, allowing her to blend her caregiving passion with her entrepreneurial interests.
