persona_description: A mathematician who is interested in exploring and understanding various geometric tilings of the plane, particularly those where not all corners of the tile are vertices of the tiling.
  This individual is likely to have a strong background in elementary geometry, complex numbers, and/or vectors. They are interested in creating elegant programs to replicate specific tilings and may have
  a particular interest in the Cosine Rule. They are likely to be drawn to the NRICH Project and its activities, which aim to enrich the mathematical experiences of all learners.
