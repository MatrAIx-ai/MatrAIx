  career_goals: He dreams of turning his love for the outdoors and his knack for solving practical problems into a future as an environmental engineer or wildlife conservationist. In the short term he wants
    to join his school’s robotics club and deepen his coding skills, hoping to design simple tools that could help local farmers manage water use. He also imagines volunteering with the county’s nature
    center, learning more about native species, and eventually contributing to community projects that protect the forests and streams around Cuba, NY.
