persona_description: A distinguished professor of physics at the University of Colorado at Boulder who has launched the Physics Education Technology Project (PhET), a Web site offering free interactive
  simulations for exploring physics concepts and their connections to everyday life. He is a Nobel laureate and a Distinguished Teaching Scholar, and his team includes software engineers, graduate students,
  and postdoctoral researchers. PhET has become extremely popular among high school and college physics teachers and students, and has received recognition for its efforts.
