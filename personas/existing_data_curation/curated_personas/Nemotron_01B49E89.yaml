  hobbies: '[''Hiking'', ''Photography'', ''Listening to regional Mexican music'', ''Playing acoustic guitar'', ''Small‑group soccer'', ''Cooking Mexican dishes'', ''Reading tech news'', ''Video gaming'']'
  career_goals: Jorge aims to transition from a frontline courier to a logistics coordinator within the next three years, pursuing an associate degree in supply chain management at a local community college.
    He plans to obtain a commercial driver’s license (CDL) and eventually launch a small, family‑owned delivery service that serves the growing Hispanic community in Casa Grande. Financial stability and
    the ability to support his parents are central motivations, and he seeks mentorship opportunities that blend his practical experience with formal training in operations and management.
