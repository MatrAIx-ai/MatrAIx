  career_goals: Christopher aspires to attend a university that offers a strong engineering or environmental science program. He hopes to study environmental engineering so he can apply his curiosity for
    new ideas to practical solutions that protect the East Texas landscape, such as improving water quality and preserving local wildlife habitats. He plans to gain experience through internships, join
    technical clubs like robotics, and eventually contribute to sustainable community projects in his hometown.
