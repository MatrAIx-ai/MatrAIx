personas:
  professional: Youa Nguyen, an aspiring digital illustrator, channels their curiosity into sketching vibrant characters and mastering tools like Procreate, while also dabbling in Scratch to create interactive
    story prototypes; they blend artistic imagination with budding coding skills, envisioning a future where they design compelling visual narratives for games or comics.
  sports: Youa Nguyen, a budding sports enthusiast, follows the Seattle Sounders FC with enthusiasm and participates in a local youth soccer club that partners with the Sounders Academy, while also joining
    weekend family hikes on nearby nature trails and occasionally playing pickup basketball at school; they enjoy the camaraderie of small‑team settings over large crowds.
  arts: 'Youa Nguyen, a creative explorer, immerses themselves in the whimsical worlds of Hayao Miyazaki’s Studio Ghibli films, draws inspiration from indie musicians like Mitski and Clairo, and delights
    in animated series such as "Avatar: The Last Airbender"; they spend weekends sketching fan art of beloved characters while listening to a blend of indie tracks and traditional folk songs.'
  travel: Youa Nguyen, a young wanderer, dreams of wandering the bamboo forests of Kyoto and the historic streets of Paris’s Montmartre, while cherishing recent trips to local museums in Seattle and weekend
    nature trail excursions in the Cascades; they prefer thoughtfully planned short getaways with family over spontaneous long‑distance travel, yet they keep a notebook of future destinations.
  culinary: Youa Nguyen, an aspiring junior chef, loves helping family prepare traditional Tet dishes such as bánh chưng and phở, while also experimenting with DIY sushi rolls featuring tuna, avocado, and
    cucumber, and they enjoy creating colorful fruit smoothies with mango and coconut milk; they often play piano in the kitchen, turning cooking sessions into melodic experiences.
  core: Youa Nguyen, a 12‑year‑old sketch‑obsessed explorer, builds towering LEGO creations, loses track of time in digital art labs, and habitually misplaces their pencil eraser while humming indie tunes.
background:
  cultural: 'Youa is a second‑generation Vietnamese American living in Lancaster, Pennsylvania. At home, his parents speak Vietnamese and preserve traditions such as celebrating Tet, preparing pho, and
    decorating for the Mid‑Autumn Festival. He attends a public middle school where English is the primary language, but he maintains his heritage language through after‑school language clubs and family
    conversations. The local Vietnamese community in Lancaster offers a weekly market and a cultural center where families gather for celebrations, language classes, and community service. These experiences
    give Youa a bicultural perspective: he values the Vietnamese emphasis on family respect, harmony, and community, while also embracing the openness and individualism of American culture. This blend informs
    his artistic interests, prompting him to incorporate motifs from Vietnamese folklore into his drawings and to share his culture with friends at school.'
attributes:
  skills: '[''Pencil sketching'', ''Digital illustration (Krita)'', ''Scratch programming'', ''English reading and writing'', ''Vietnamese conversational fluency'', ''Empathy and peer mediation'', ''Team
    collaboration'', ''Basic piano playing'', ''Collecting and organizing LEGO sets'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''LEGO building'', ''Scratch coding'', ''Reading fantasy/science‑fiction'', ''Watching animation'', ''Playing piano'', ''Cooking Vietnamese
    meals'', ''Visiting museums'', ''Hiking local nature trails'', ''Attending cultural festivals'']'
  career_goals: Youa dreams of turning his love for art and technology into a career. He hopes to attend a high‑school program focused on visual arts or interactive media, eventually studying graphic design,
    animation, or game development at college. He wants to create characters and stories that reflect his Vietnamese heritage and promote cultural understanding. In the longer term, he imagines working
    as a concept artist for video games or as an illustrator for children's books, and he also hopes to mentor younger kids in his community by sharing his artistic and coding skills.
