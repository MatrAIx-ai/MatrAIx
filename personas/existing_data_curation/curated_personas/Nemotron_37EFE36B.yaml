  hobbies: '[''DIY home improvement'', ''Model building'', ''Gardening'', ''Cooking Mexican cuisine'', ''Reading technical manuals'', ''Small-group book club'', ''Walking local trails'']'
  career_goals: Lissett aims to advance from a helper role to a lead technician position within the next three years, pursuing certifications such as NATE for HVAC and a journeyman electrician license.
    She intends to enroll in night courses at a community college to deepen her technical knowledge while maintaining her high standards of work quality. Ultimately, she envisions opening a small, family-owned
    maintenance service that serves the Rockford area, allowing her to mentor new apprentices and apply her disciplined, organized approach on a broader scale.
