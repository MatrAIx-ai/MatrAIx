persona_description: A scientist who specializes in the study of electrical and electromagnetic phenomena, particularly dielectric materials and their properties. They are knowledgeable about the dielectric
  strength of various insulating materials and their applications in electrical installations and engineering. They are familiar with the use of dielectrics in capacitors and their breakdown under different
  conditions. They have a keen interest in the effects of dielectric breakdown on insulating materials and their potential damage. They are also aware of the importance of dielectric strength in determining
  the safe operating voltage for electrical equipment and its relation to the voltage applied and the duration of that applied voltage.
