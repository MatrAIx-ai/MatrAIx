  hobbies: '[''Drawing'', ''Watercolor painting'', ''Scratch animation'', ''Reading fantasy and science books'', ''Art club activities'', ''Youth theater'', ''Gardening'', ''Soccer'', ''Dancing'', ''Volunteering
