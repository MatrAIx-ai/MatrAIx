personas:
  professional: An aspiring young animator, Kimberly Joyce channels her disciplined work ethic and curiosity into creating intricate Scratch stories, meticulously planning each frame like a storyboard and
    striving for perfect pixel art, while they dream of turning their leather-bound sketches into digital comics.
  sports: Kimberly Joyce loves playing forward on her school’s soccer team, cheering for Manchester United on match nights, and attending Friday night hip‑hop dance classes; they balance competitive drills
    with spontaneous backyard sprints that keep them energetic.
  arts: Kimberly Joyce immerses herself in artistic expression, sketching fantasy creatures in a leather‑bound notebook, painting watercolors of woodland scenes inspired by Hayao Miyazaki, and performing
    in her local youth theater where they admire the works of Lin‑Manuel Miranda; these experiences fuel their vivid storytelling.
  travel: Kimberly Joyce prefers family‑guided adventures, having camped under the stars at Yosemite, explored the historic streets of Boston, and dreaming of a future trip to Kyoto to see cherry blossoms;
    they balance careful itinerary planning with spontaneous treasure‑hunt stops at roadside craft fairs.
  culinary: Kimberly Joyce enjoys crafting simple meals like macaroni and cheese topped with fresh basil from the garden, experimenting with rainbow fruit salads featuring strawberries, mango, and kiwi,
    yet often forgets to wash their hands before cooking, and they rely on their mom to remind them about kitchen hygiene, a humorous quirk their mom gently corrects.
  core: Kimberly Joyce is a relentlessly organized 10-year-old whose boundless curiosity fuels artistic projects, yet they tend to over-worry and occasionally procrastinate bedtime, adding a whimsical tension
    to their disciplined routine.
background:
  cultural: Kimberly was raised in York Springs, a small town in York County, Pennsylvania, where community and family traditions play a central role. She celebrates typical American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, often with neighborhood potlucks and fireworks. The region’s Pennsylvania Dutch heritage is visible in local fairs, barn‑raising festivals, and historic sites, which
    have given her exposure to folk art, traditional foods, and stories of early settlers. Her family values hard work, kindness, and involvement in school and church activities, reinforcing her cooperative
    nature and her desire to contribute positively to her community.
