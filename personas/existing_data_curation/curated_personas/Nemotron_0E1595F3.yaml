  career_goals: Kimberly dreams of one day becoming a museum curator or art teacher, where she can combine her love of art, organization, and helping others. She also hopes to study environmental science
    or wildlife conservation, inspired by field trips to local nature preserves, so she can protect the natural world she enjoys exploring. In the short term, she aims to win the upcoming regional youth
    art competition and to lead her school’s art club in creating a community mural that brings neighbors together.
