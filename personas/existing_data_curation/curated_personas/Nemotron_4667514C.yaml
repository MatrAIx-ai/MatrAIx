  career_goals: Although still young, Jahmelia frequently says she wants to become an artist who paints big, colorful pictures, or an astronaut who discovers new worlds. She also enjoys helping others,
    so she imagines being a teacher who can share stories and art with other children. Her goals are shaped by her love of novelty, creativity, and organized projects.
