personas:
  professional: Jahmelia Anderson is a budding mini architect who spends countless afternoons arranging LEGO blocks into precise cityscapes, drawing floor plans on graph paper, and leading the preschool’s
    "construction corner" projects, channeling their high imagination, disciplined organization, and natural assertiveness into early engineering play.
  sports: Jahmelia Anderson energizes the Greenfield Cubs’ U‑6 soccer team with quick footwork, spends weekend afternoons at the Little Learners Gymnastics Club mastering tumble rolls, and cheers loudly
    for the Seattle Mariners during family game nights, embodying their sociable, energetic spirit and love for team play.
  arts: Jahmelia Anderson delights in drawing whimsical Dr. Seuss‑style creatures, dancing to Kidz Bop versions of Beyoncé’s "Single Ladies", and eagerly listening to Mo Willems’ storyteller sessions at
    the local library, integrating their curiosity for novelty, love of abstract art, and outgoing nature into daily creative expression.
  travel: Jahmelia Anderson dreams of the sensory overload at Disneyland in Anaheim while already cherishing past family trips to Monterey Bay Aquarium and a weekend camping adventure in the red‑rock desert,
    favoring spontaneous outings over rigid itineraries but always packing a favorite stuffed bunny for comfort.
  culinary: Jahmelia Anderson prefers classic mac and cheese and chicken nuggets, takes pride in whisking pancake batter with a wooden spoon, crafts rainbow fruit salads featuring strawberries, kiwi, and
    blueberries, and insists on a drizzle of honey over toast, balancing simple kid‑friendly tastes with an adventurous palate.
  core: Jahmelia Anderson is an imaginative five‑year‑old who organizes play like a pro, saves pennies for sparkle, and transforms everyday moments into disciplined, creative adventures.
background:
  cultural: Jahmelia comes from a Black family rooted in the African‑American traditions of music, storytelling, and community gatherings, while growing up in San Antonio’s vibrant, multicultural environment.
    Her family celebrates holidays like Juneteenth and Kwanzaa alongside local festivities such as Fiesta San Antonio, exposing her to a blend of soulful gospel, R&B, and the rhythms of Tex‑Mex music. This
    mix of cultural experiences shapes her love for colorful celebrations, shared meals of soul‑food dishes and Tex‑Mex favorites, and an appreciation for both family‑centered faith practices and the diverse
    community around her.
