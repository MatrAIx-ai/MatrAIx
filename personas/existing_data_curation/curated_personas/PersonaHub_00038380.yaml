persona_description: A construction contractor who specializes in drilling and blasting, particularly in quarry applications. He is skilled in determining the amount of sub-drill needed for a given project,
  and is aware of the potential for excessive sub-drill to create problems such as uneven floors and additional drilling and blasting costs. He is aware of the importance of drilling and blasting in quarrying
  and the need to ensure that the floor is dug down to the required grade, even if there are some imperfections in the drilling and blasting process. He is also aware of the potential for the additional
  sub-drill to be wasted and create additional costs and problems for the next drill and blast down.
