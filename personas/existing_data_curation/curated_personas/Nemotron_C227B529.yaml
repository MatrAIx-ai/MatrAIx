  hobbies: '[''Woodworking'', ''Scale Model Building'', ''Chess'', ''Running'', ''Hiking in Adirondacks'', ''Fishing'', ''Tech Podcasts'', ''Coding Challenge Platforms (LeetCode)'', ''Home Automation Projects'',
    ''Local History Research'']'
  career_goals: Scott aims to transition from a senior developer role to a technical lead or solutions architect, overseeing end‑to‑end project delivery for small‑to‑mid‑size businesses in the Central New
    York region. He plans to deepen his cloud expertise with AWS certifications, enabling him to design scalable, secure infrastructure for client sites. In the next three years he hopes to launch a boutique
    web‑development consultancy that emphasizes rigorous processes, documentation, and reliability—values that mirror his personality. Concurrently, he wants to mentor junior developers, contribute to open‑source
    projects, and speak at regional tech meetups, building a reputation as a dependable, process‑driven professional who can bridge the gap between practical implementation and strategic vision.
