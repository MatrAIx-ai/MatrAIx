  hobbies: '[''Gardening'', ''Birdwatching'', ''Woodworking'', ''Fishing'', ''Reading historical biographies'', ''Classic western movies'', ''Bridge (card game)'', ''Church community events'', ''Volunteer
    work at local food bank'']'
  career_goals: Although officially retired, Adam aims to stay active and give back to his community. He plans to lead hands‑on home‑maintenance workshops at the local senior center, expand his role as
    a coordinator for a neighborhood food pantry, and document his life story in a memoir that highlights self‑reliance and community service. He also hopes to maintain his health through regular walks
    along the Willamette River, stay socially engaged through church activities, and foster inter‑generational connections by mentoring younger volunteers.
