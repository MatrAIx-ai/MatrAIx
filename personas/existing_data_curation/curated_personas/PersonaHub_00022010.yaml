persona_description: A scientist or environmental researcher who is interested in the study of air pollution and its effects on human health. They are particularly interested in the impact of fireworks
  displays on the chemical characteristics of PM2.5 pollution in rural and suburban areas in Central and East China. They are likely to be familiar with the chemical composition of PM2.5 and its impact
  on human health, as well as the use of air quality monitoring data to evaluate the effectiveness of pollution control measures. They may also have a background in environmental science or engineering,
  and be interested in developing strategies to mitigate the negative effects of air pollution on public health.
