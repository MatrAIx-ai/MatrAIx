  career_goals: Kary aims to transition from her current consulting role into a mentorship and advocacy focus. She plans to earn the Certified Safety Professional (CSP) credential to formalize her expertise,
    publish a practical guide on workplace safety for small businesses, and establish a volunteer safety‑awareness program for schools and senior centers in Bergen County. Additionally, she hopes to serve
    on local advisory boards, helping shape municipal health‑safety policies while championing community‑driven emergency preparedness initiatives.
