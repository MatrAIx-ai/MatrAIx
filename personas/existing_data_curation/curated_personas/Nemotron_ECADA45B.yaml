  hobbies: '[''Engine restoration'', ''Truck electronics tinkering'', ''Fishing'', ''Hunting'', ''Motorsports watching'', ''Car meets'', ''Reading about automotive tech'', ''Woodworking'', ''DIY home improvement'',
