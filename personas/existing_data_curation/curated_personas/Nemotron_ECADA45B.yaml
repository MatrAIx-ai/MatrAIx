  career_goals: Peter aims to transition from a driver‑sales role to a management position within a logistics firm, eventually establishing his own small fleet of owner‑operators. He plans to obtain a logistics
    or supply‑chain certification, improve his organizational skills through targeted training, and leverage his STEM background to implement data‑driven efficiencies. He is motivated by providing a stable
    future for his family, achieving higher earnings, and gaining professional respect. Additionally, he hopes to mentor younger drivers, sharing practical knowledge while fostering a culture of continuous
    improvement and stress‑aware work practices.
