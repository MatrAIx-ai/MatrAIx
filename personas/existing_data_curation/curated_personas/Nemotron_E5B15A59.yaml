  career_goals: Mellisa aspires to transition into a nurse educator role where she can merge her clinical experience with her passion for innovative, art‑infused health education. She aims to obtain a Family
    Nurse Practitioner certification to expand her scope of practice and spearhead telehealth initiatives that serve the rural communities of North Georgia. Long‑term, she envisions leading a regional quality‑improvement
    consortium that reduces hospital readmissions and improves mental‑health support for nurses, while also authoring a guidebook on health literacy that incorporates visual storytelling. Balancing professional
    ambition with personal well‑being, she seeks to cultivate resilience strategies for herself and her colleagues.
