persona_description: A historian who is deeply invested in the history of labor movements and the Triangle Shirtwaist Factory fire, particularly in understanding the causes, consequences, and aftermath
  of the tragedy. She has a passion for research and is skilled in writing and organizing historical events and commemorations. She is knowledgeable about the impact of the fire on the city and the nation,
  and the subsequent reforms that were implemented as a result of the tragedy. She is also knowledgeable about the broader context of labor movements and the role of unions in shaping history.
