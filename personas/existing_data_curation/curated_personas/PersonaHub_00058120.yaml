persona_description: A healthcare professional who is interested in understanding the quality of life of individuals with neurological disorders. They are familiar with the World Health Organization's international
  classification of functioning, disability, and health (ICF) and have a keen interest in mapping neuro-QoL measures to the ICF categories. They are looking for a comprehensive and detailed overview of
  the content of the Neuro-QoL measures, focusing on the areas of activities and participation, mental functions, and body functions. They are also interested in the areas that are less well represented
  in the Neuro-QoL measures, such as environmental factors and body structure.
