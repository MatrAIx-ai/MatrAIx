personas:
  professional: Isaias Santiago, a 17‑year‑old bilingual digital media enthusiast, blends strategic curiosity with practical execution as they lead peers in producing social‑media videos for local community
    events, leveraging Adobe Premiere Rush, strong interpersonal skills, and a competitive drive that pushes them to meet tight deadlines while staying adaptable to last‑minute changes.
  sports: Isaias Santiago, a point‑guard for the Leominster Youth Basketball Association, stays on top of the Boston Celtics' season, hones their skills at the local YMCA, and during summers joins recreational
    soccer with the New England Revolution fan club, balancing competitive drive on the court with community spirit in the stands.
  arts: Isaias Santiago infuses their daily life with reggaeton, salsa, and contemporary hip‑hop tracks from artists like Bad Bunny, Marc Anthony, and Travis Scott, practices urban dance moves with friends
    after basketball practice, and channels their creative energy into short, music‑driven TikTok videos edited with Adobe Premiere Rush.
  travel: Isaias Santiago prefers spur‑of‑the‑moment road trips with friends to nearby cities such as Boston, New York, and Miami, where they hunt for iconic street‑food stalls and live music venues, plan
    itineraries via group chats but balance their wanderlust with a limited budget that steers them toward affordable hostels and free cultural festivals.
  culinary: Isaias Santiago love‑cooks traditional island dishes like mofongo—made with fried plantains, garlic, pork cracklings, and sofrito—and arroz con gandules, experiments with spice levels, films
    the process in bite‑sized TikTok clips, and pairs each meal with fresh tropical fruit smoothies featuring mango, papaya, and coconut water.
  core: Isaias Santiago is a 17‑year‑old bilingual basketball junkie and digital storyteller whose competitive edge fuels relentless content creation, occasional impulse spending on gaming gear, and a habit
    of juggling school, sport, and community projects with a side of spontaneous road trips.
background:
  cultural: Isaias grew up in a Puerto Rican household in Leominster, where Spanish was spoken at home and family gatherings often centered around food, music, and storytelling. He identifies strongly with
    the island’s vibrant culture—celebrating holidays such as Three Kings’ Day and patron saint festivals with traditional foods like pasteles and lechón, and listening to salsa, reggaeton, and bomba rhythms.
    At the same time, his upbringing in the diverse, working‑class neighborhoods of Worcester County exposed him to New England sensibilities, including a pragmatic work ethic and a familiarity with American
    pop culture. This blend of Caribbean and New England influences shapes his worldview, giving him a bicultural perspective that he often draws upon when interacting with peers from varied backgrounds.
attributes:
