  hobbies: '[''Playing competitive basketball'', ''Online strategy gaming (e.g., League of Legends, Valorant)'', ''Urban dance (hip‑hop)'', ''Cooking Puerto Rican dishes'', ''Creating TikTok videos'', ''Volunteering
    at cultural festivals'', ''Listening to Latin music'']'
  career_goals: Isaias aims to complete his high‑school equivalency and enroll in a vocational program focused on media production or community outreach. In the short term, he plans to secure an apprenticeship
    at a local digital marketing agency where he can apply his bilingual communication skills and experience creating social‑media content. Long‑term, he envisions a career as a multicultural marketing
    strategist or a community‑engagement director, leveraging his ability to connect with diverse audiences and his competitive drive to lead successful campaigns. He also hopes to mentor other Puerto Rican
    youth in Leominster, helping them navigate educational pathways and celebrate their cultural heritage.
