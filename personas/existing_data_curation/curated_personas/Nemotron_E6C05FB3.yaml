  hobbies: '[ ''Art gallery and museum visits'', ''Chinese calligraphy'', ''Gardening (roses, Japanese maples)'', ''Reading non‑fiction (technology, philosophy, cultural history)'', ''Attending Stanford
    public lectures'', ''Senior bridge tournaments'', ''Cooking fusion cuisine'', ''Volunteer board service for local charities'' ]'
  career_goals: Although officially retired, Jiali aims to leave a lasting legacy by mentoring the next generation of Asian‑American business leaders, establishing a scholarship fund for under‑privileged
    students pursuing business studies, and acting as a patron and advisor for local art institutions. She is driven to stay intellectually active, regularly contributing strategic insights to community
    projects and expanding her knowledge of emerging technologies and contemporary art trends.
