  career_goals: Andrew aims to transition into a supervisory or team‑lead role within the next two years, where he can formalize his mentorship efforts and influence service standards across multiple locations.
    He plans to earn a certification in Customer Experience Management to deepen his expertise and to champion process improvements that balance innovative ideas with proven methods. Recognizing his desire
    for flexibility, he hopes to negotiate a hybrid schedule that allows occasional remote work, giving him more time for community involvement and family. Long‑term, Andrew envisions leveraging his customer‑focused
    skill set to support a small local business—perhaps a community café or a family‑run service shop—where he can blend his practical know‑how with his love for personal interaction.
