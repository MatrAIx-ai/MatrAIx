  hobbies: '[''Watercolor painting'', ''Pottery'', ''Reading African American literature'', ''Gardening'', ''Beach walking'', ''Attending local art exhibitions'', ''Small book club participation'', ''Cooking
    creative soul food'', ''Bird watching'', ''Listening to jazz'']'
  career_goals: Imani plans to transition from full‑time teaching to a district‑wide curriculum specialist role that focuses on arts integration across Palm Beach County schools. She aims to design professional
    development workshops, mentor early‑career teachers, and secure sustainable funding for an after‑school arts collective serving underserved youth in Lake Worth. Additionally, she hopes to author a memoir
    reflecting on her 40‑year journey as a Black educator in South Florida and to continue volunteering at local museums and cultural centers.
