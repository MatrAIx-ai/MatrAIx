personas:
  professional: Imani Zanders, a veteran educator with over thirty years of experience, blends curiosity with a balanced mix of organization and flexibility to craft interdisciplinary arts‑integrated curricula,
    mentor early‑career teachers, and secure grant funding for a district‑wide after‑school arts collective in Palm Beach County.
  sports: Imani Zanders enjoys low‑impact fitness through daily walks along Lake Worth Beach, participates in a local pickleball league at the community center, follows the Miami Heat and the Tampa Bay
    Buccaneers with enthusiasm, and occasionally joins a senior yoga class at the senior center during the cooler winter months.
  arts: Imani Zanders spends hours painting delicate watercolors inspired by coastal light, shaping clay pieces in their home studio, and listening to vintage jazz legends such as Louis Armstrong and Nina
    Simone while admiring the works of Claude Monet and Georgia O'Keeffe during quiet evenings.
  travel: Imani Zanders prefers intimate travel experiences, opting for weekend getaways to the Florida Keys, cultural tours of Charleston and Savannah, and dreaming of a slow‑paced visit to New Orleans’
    French Quarter, always planning trips around the school calendar and a modest travel fund.
  culinary: Imani Zanders delights in creating soulful dishes like shrimp and grits with a key‑lime twist, collard greens sautéed with smoked paprika, and a sweet potato pie spiced with cinnamon, cooking
    for close friends while humming along to jazz records, and they are known to experiment with locally sourced hibiscus in marinades.
  core: Imani Zanders, a quietly curious 62‑year‑old educator‑artist, balances meticulous lesson planning with spontaneous beach sketches, refuses to check email after dusk, and habitually keeps a half‑filled
    water jar on their desk as a reminder to stay hydrated.
background:
  cultural: Imani is a second‑generation Black Floridian whose grandparents migrated from the Deep South during the Great Migration, bringing traditions of gospel music, storytelling, and Southern cuisine.
    Growing up in a close‑knit African American community in Palm Beach County, she participated in church choirs, local festivals such as the Lake Worth Cultural Art Walk, and community service groups.
    Her cultural identity informs her teaching philosophy, encouraging students to explore African American history, literature, and artistic contributions. She remains an active member of the local NAACP
    chapter and volunteers at the African American Heritage Museum, preserving and sharing the rich legacy of Black Floridians.
attributes:
  skills: '[''Curriculum Development'', ''Arts Integration'', ''Differentiated Instruction'', ''Classroom Management'', ''Technology Integration'', ''Community Outreach'', ''Grant Writing'', ''Mentoring'',
