personas:
  professional: David Odell, a meticulous quality assurance specialist with two decades of hands‑on inspection, scale calibration, SAP QM reporting, and Six‑Sigma expertise, channels his curiosity and organized
    mindset into rigorous process audits, data‑driven variance analysis, and mentorship, positioning himself for a supervisory role in a creative‑industry manufacturing workshop.
  sports: David Odell stays fit by fishing in Biscayne Bay on weekends, biking the Homestead Trail several times a week, and cheering for the Miami Heat, Miami Marlins, and Miami FC, balancing solitary
    outdoor pursuits with occasional social pickup basketball games at the local community center.
  arts: David Odell immerses himself in Miami’s vibrant arts scene, attending Art Basel, gallery openings featuring artists like Ai Weiwei, Kehinde Wiley, and Mark Rothko, while he paints watercolors of
    the Everglades and snaps photographs that capture unconventional perspectives, feeding his curiosity and love of aesthetic experimentation.
  travel: David Odell prefers meticulously planned weekend getaways to the Florida Keys and the Everglades, while dreaming of a cultural immersion trip to Havana and a once‑in‑a‑lifetime sailing adventure
    in the Bahamas, balancing budget constraints with his desire for both relaxation and artistic inspiration.
  culinary: David Odell enjoys experimenting in the kitchen, blending Cuban staples like ropa vieja and plantain mofongo with Caribbean jerk‑spiced chicken and fresh herbs from his vegetable garden, mastering
    a solid intermediate skill level while occasionally over‑salting dishes in his enthusiasm to perfect flavor balance.
  core: David Odell is a detail‑obsessed quality ace who balances his relentless spreadsheet grooming with spontaneous watercolor sessions, a habit of sleeping with a pocket‑sized sketchbook and an occasional
    tendency to procrastinate dental appointments.
background:
  cultural: David is a White American who grew up in the Southeast United States before moving to Homestead, Florida. His family background reflects traditional middle‑class values of self‑reliance, the
    importance of hard work, and community involvement. Living in Miami‑Dade County, he has been exposed to a multicultural environment, and he appreciates the region’s blend of Latin American, Caribbean,
    and Southern U.S. influences. He maintains a connection to his upbringing through holiday traditions and church participation, while actively engaging with the diverse cultural fabric of his community.
attributes:
  skills: '["Quality Inspection", "Testing & Sampling", "Weighing & Calibration", "Statistical Process Control", "Regulatory Compliance (OSHA, FDA, ISO)", "Documentation & Reporting", "Lean Process Improvement",
