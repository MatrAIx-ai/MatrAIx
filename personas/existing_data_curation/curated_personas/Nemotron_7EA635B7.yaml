  hobbies: '["Visiting Art Galleries & Museums", "Painting & Sketching", "Photography (Nature & Urban Landscape)", "Reading Science & Technology Books", "Woodworking", "Gardening", "Fishing in Biscayne
    Bay & Everglades", "Cooking Cuban & Caribbean Cuisine", "Volunteering at Community Art Programs", "Attending Live Music (Jazz & Classic Rock)", "Cycling along the Homestead Trail"]'
  career_goals: David aims to obtain a Six Sigma Green Belt within the next year and leverage it to move into a supervisory role overseeing quality control for a mid‑size manufacturing facility. He aspires
    to lead cross‑functional teams in implementing process‑optimization projects, mentor junior inspectors, and eventually become a quality manager. He also wishes to combine his interest in art and design
    by contributing to quality initiatives within a creative‑industry production environment, such as a museum exhibit fabrication workshop.
