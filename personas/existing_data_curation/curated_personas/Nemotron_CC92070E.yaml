  hobbies: '[''Visiting art galleries and street‑mural tours'', ''Attending indie film screenings'', ''Improvisational comedy workshops'', ''Urban exploration of Brooklyn neighborhoods'', ''Competitive
    video gaming'', ''Reading philosophy and science‑fiction'', ''Sketching in a pocket notebook'', ''Maintaining a personal art and culture blog'', ''Listening to eclectic music playlists'']'
  career_goals: Jay aims to move into senior sales leadership within the next five years, targeting a role such as Sales Manager or Regional Account Director where he can mentor a team and shape unconventional
    sales strategies. He is particularly interested in carving out a niche that merges his love for the arts with service solutions—perhaps leading a boutique vertical that services creative studios, galleries,
    and cultural organizations. Long‑term, Jay envisions launching his own consultancy that combines service sales expertise with cultural branding, leveraging his Brooklyn network and his knack for innovative,
    flexible approaches to business development.
