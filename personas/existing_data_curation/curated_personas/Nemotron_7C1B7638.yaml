  hobbies: '["abstract painting", "creative writing", "reading speculative fiction", "cooking traditional Hispanic dishes", "gardening", "hiking", "visiting art museums", "playing acoustic guitar", "yoga",
    "collecting vintage books"]'
  career_goals: Though she is currently not employed, Beatrice envisions a second act centered on community empowerment and personal artistic fulfillment. She aims to launch a free adult‑education and art
    program in Opelika that blends Spanish language practice with abstract visual workshops, securing a small grant from the state arts council to sustain it. Simultaneously, she plans to compile and publish
    a collection of poems and short stories that explore the hybrid identity of Latinx seniors in the American South. Beatrice also hopes to mentor emerging teachers through a local teachers‑in‑training
    network, offering mentorship on integrating cultural art into lesson plans. On a personal level, she aspires to travel to Colombia to trace her family roots, enroll in a short‑term digital art residency,
    and possibly pursue a master’s certificate in arts education for personal enrichment.
