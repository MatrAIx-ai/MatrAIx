personas:
  professional: Beatrice Saumell, a former K-12 educator turned community arts facilitator, blends three decades of bilingual curriculum design, digital illustration, and event coordination into a free
    adult-education program that mirrors their vivid imagination, while their laid-back approach to planning often leaves them scrambling to meet grant deadlines.
  sports: Beatrice Saumell enjoys gentle hikes on the locally beloved Cheaha State Park trails, regularly attends yoga classes, and participates in the Opelika Trail Club's weekly walks, while they cheer
    on the Auburn Tigers football team in the fall and the Atlanta Braves in the spring, reflecting a relaxed but consistent commitment to low-impact fitness.
  arts: Beatrice Saumell immerses themselves in abstract painting inspired by Jackson Pollock and Mark Rothko, writes magical-realist poetry echoing Octavia Butler, strums an acoustic guitar to John Mayer’s
    melodies, and frequently visits the Montgomery Museum of Fine Arts to study Agnes Martin’s works, all while they curate a vintage collection of art theory books that fuel their boundless imagination.
  travel: Beatrice Saumell prefers spontaneous, low-cost road trips that blend cultural immersion with artistic inspiration, having explored New Orleans, Asheville, and Savannah, and they now dream of a
    heritage pilgrimage to Medellin to trace family origins and a month-long digital art residency in Barcelona, balancing modest savings with occasional grant opportunities to fund these adventures.
  culinary: Beatrice Saumell, an enthusiastic home chef, expertly prepares family-heritage dishes such as arepas with corn masa, empanadas stuffed with spiced meat and plantain, and hearty sancocho brimming
    with yucca, corn, and cilantro, and they often substitute local Alabama heirloom tomatoes and sweet potatoes to create vibrant fusion plates that showcase their intermediate cooking skill and love for
    bold flavors.
  core: Beatrice Saumell is a 58-year-old imaginative educator-turned-artist who blends creative curiosity with a laid-back, occasionally chaotic approach to life, channeling competitive energy into community
    projects while they savor spontaneous bursts of art, music, and culinary fusion.
background:
  cultural: Beatrice is the daughter of first‑generation Colombian immigrants who settled in Alabama during the early 1970s. Raised in a bilingual home, she grew up celebrating Colombian holidays such as
    Día de la Independencia and Carnaval de Barranquilla while also absorbing Southern customs like church potlucks and community barbecues. Her family’s storytelling traditions, music (cumbia, vallenato),
    and culinary flavors profoundly shaped her artistic sensibility. Although the Latino population in Opelika is modest, she remains active in the regional Latinx network, volunteering at cultural festivals,
    teaching Spanish to children, and preserving folkloric narratives. Her identity is a tapestry of Colombian heritage, Southern hospitality, and a lifelong commitment to cultural exchange.
