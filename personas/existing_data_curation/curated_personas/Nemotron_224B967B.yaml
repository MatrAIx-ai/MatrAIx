  hobbies: '[''Visiting art museums and galleries'', ''Reading contemporary nonfiction and philosophy'', ''Gardening and growing seasonal produce'', ''Cooking diverse cuisines'', ''Photography during nature
    walks'', ''Hiking in Patapsco Valley State Park'', ''Volunteer tutoring at a community centre'', ''Supporting local theatre productions'', ''Yoga and mindfulness practice'']'
  career_goals: Nancy aims to advance into a senior leadership role, such as Regional Sales Manager, where she can mentor junior reps and shape sales strategy for a larger portfolio of services. She plans
    to develop a training program that integrates her love for creative thinking and unconventional problem‑solving into the sales curriculum. To support this, she is pursuing certifications in data analytics
    and digital marketing. Long‑term, she envisions launching a boutique consultancy that helps small businesses improve customer experience by blending service expertise with artistic branding. Throughout
    her career progression, she prioritizes work‑life balance to maintain personal wellbeing and community involvement.
