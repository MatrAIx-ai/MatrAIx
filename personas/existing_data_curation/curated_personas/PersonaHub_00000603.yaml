persona_description: A historian or a musicologist who is particularly interested in the preservation and study of old folk-dance music from Hungary, particularly the Marosszék district. They are likely
  to be familiar with the works of John Kemeny, the prince of Transylvania, and his autobiography. They are also likely to be interested in the history and culture of Hungary, and the influence of folk
  music on Hungarian society and culture. They may have a particular interest in the works of Hungarian composers like Franz Liszt and Béla Bartók, who are known for their contributions to the development
  of Hungarian folk music.
