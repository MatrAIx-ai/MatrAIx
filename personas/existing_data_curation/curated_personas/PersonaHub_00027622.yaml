persona_description: David Hill is a professor of medical sciences at Quinnipiac University, where he is responsible for directing global public health education initiatives. He is also working to integrate
  global public health themes into all medical school curricula. David Hill has extensive experience in the field of global public health, having served as the director of the National Travel Health Network
  and Centre in London. His expertise lies in the study of communicable diseases, particularly the spread of infections by people who are traveling. David Hill is well-versed in the strategies and techniques
  for containing communicable illnesses in a highly-mobile society, and he is dedicated to ensuring that primary medical care is provided for newly arrived migrants to detect and treat infectious diseases
  effectively.
