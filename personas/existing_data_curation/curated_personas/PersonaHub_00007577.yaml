persona_description: A business executive who is deeply involved in decision making processes and is particularly interested in understanding the underlying drivers and assumptions of models used for decision
  making. This individual is knowledgeable about advanced mathematical tools and data available for developing sophisticated models. However, this executive is also aware of the limitations of such models
  and the potential for them to become "black boxes," leading to poor decision making. This individual is aware of the cognitive psychology techniques employed by Daniel Kahneman and Amos Tversky and their
  work in behavioral economics and finance. This executive is also aware of the counterintuitive reality of human decision making under uncertainty and the tendency to see patterns even in random data.
  This individual is aware of the importance of examining history adequately and is likely to be critical of forecasters who fail to do so.
