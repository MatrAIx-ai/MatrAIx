    as senior liaison'']'
  career_goals: Although retired, Himani aims to preserve her cultural heritage by documenting family recipes and oral histories, publishing a memoir that chronicles her migration journey, and expanding
    intercultural programming at the local senior center. She hopes to mentor her grandchildren in their education and career choices, and to serve as an elder advisor who champions community service and
    cultural exchange initiatives in Reno.
