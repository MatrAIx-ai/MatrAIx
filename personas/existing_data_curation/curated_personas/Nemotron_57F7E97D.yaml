personas:
  professional: Himani Pandya, a retired senior‑center liaison in Reno, uses their methodical budgeting expertise and charismatic storytelling to orchestrate meticulously organized cultural celebrations,
    including vibrant Vaisakhi gatherings, and senior programs, and they fiercely compare each event to the last to ensure it is more impactful.
  sports: Himani Pandya is an avid fan of the Reno Aces baseball team and the Vegas Golden Knights, regularly joins a senior walking club through the Sierra Nevada trails, and they often play pickleball
    at the community center, treating each match as a friendly competition.
  arts: Himani Pandya immerses themselves in historical novels like "The Book Thief", attends local theatre productions at the Reno Events Center, delights in the soulful qawwalis of Nusrat Fateh Ali Khan,
    and they often host storytelling evenings that weave traditional folk songs with classic film dialogues from Madhubala’s movies.
  travel: Himani Pandya has traveled to Toronto to explore its multicultural neighborhoods, visited London’s historic museums, dreamed of seeing Machu Picchu’s sunrise, and they plan a relaxed road trip
    along the Pacific Coast with their grandchildren, balancing adventure with the practical need for accessible accommodations.
  culinary: Himani Pandya expertly prepares butter chicken, dal makhani, and saag paneer using fresh cilantro, mint, and spices from their garden, enjoys experimenting with a fusion of traditional flavors
    and modern techniques like adding smoked paprika to paneer tikka, and they frequently teach friends how to knead homemade naan while sharing playful anecdotes.
  core: Himani Pandya blends disciplined organization with a love for lively storytelling, never missing a chance to outdo the previous community event, even if it means late‑night tea and occasional forgetfulness
    about their own medication, and they thrive on the buzz of group interaction.
background:
  cultural: Himani was born into a Punjabi Sikh family in Punjab, India, and immigrated to the United States in her early thirties. She grew up with strong values of family loyalty, religious devotion,
    and community service. In Nevada, she maintains Sikh practices, celebrates festivals such as Vaisakhi, Diwali, and Gurpurab, and keeps close ties with extended relatives in India. Her South Asian heritage
    shapes her daily rituals, food traditions, and community involvement, while her long residence in Reno has blended these influences with local customs.
attributes:
  skills: '[''Event Planning'', ''Community Organization'', ''Budget Management'', ''South Asian Culinary Arts'', ''Bilingual Communication (English & Punjabi)'', ''Mentorship'']'
