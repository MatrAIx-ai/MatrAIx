  career_goals: Erika aims to re‑enter the workforce as a community arts coordinator, leveraging her love for art and her proven organizational skills. She plans to complete her GED within the next year
    and enroll in a community‑college program focused on nonprofit management. Long‑term, she hopes to launch a small nonprofit art space in Philadelphia that offers free workshops and mentorship for local
    youth. She also envisions working as a freelance event planner for cultural festivals and collaborating with museums on outreach programs, using her network and competitive drive to secure leadership
    roles.
