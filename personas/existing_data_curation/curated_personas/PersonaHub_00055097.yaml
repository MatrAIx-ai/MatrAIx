persona_description: A teacher who is interested in using experiential learning and discovery-based learning in professional development settings and is open to incorporating these models in their own classroom
  in the future. They value the positive effects of these learning models on both cognitive achievement and teacher perceptions and are willing to support teachers in implementing new instructional methodologies
  by using those same models in their own professional training. They are aware of the challenges that may arise in implementing these models, such as the need for follow-up support and support from administrators
  and funding, and are looking for ways to overcome these challenges.
