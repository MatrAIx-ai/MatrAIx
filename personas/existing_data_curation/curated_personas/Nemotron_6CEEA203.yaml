personas:
  professional: Hayley Middlebrooks, a 25‑year‑old education administrator in a rural Wyoming district, fuses her STEM degree with a hands‑on love for DIY electronics to craft data‑driven early‑childhood
    curricula, writes razor‑sharp grant proposals, and leads cross‑functional teams with a quietly competitive edge that keeps her district ahead of neighboring counties.
  sports: Hayley Middlebrooks fuels fitness through solo hikes in the Bighorn Mountains, participates in a local trail‑running club when the weather allows, roots for the Wyoming Cowboys football team and
    closely follows the Johnson County High School basketball games, but prefers the quiet challenge of a steep ascent over team sports.
  arts: Hayley Middlebrooks captures the sweeping Wyoming sky with a DSLR in a style reminiscent of Ansel Adams, unwinds to the mellow folk tones of The Lumineers and the ambient guitar work of Andy McKee,
    and spends strategic board‑game evenings with friends, where their competitive streak shines.
  travel: Hayley Middlebrooks prefers meticulously planned road trips that blend scenic drives and educational stops, having mapped a summer tour of Yellowstone, Grand Teton, and the historic town of Cody,
    while dreaming of a future solo trek across Iceland’s volcanic landscapes to photograph remote geysers.
  culinary: Hayley Middlebrooks enjoys hearty, locally sourced meals—think bison chili with heirloom beans, pan‑seared trout with wild sage, and freshly baked whole‑grain cornbread—cooking with a modest
    skill level that leans on reliable recipes, yet occasionally experiments with a sous‑vide gadget for precise protein preparation.
  core: Hayley Middlebrooks is a quietly ambitious, data‑driven educator who balances solitary hikes, precise budgeting, and competitive grant writing with a pragmatic curiosity and a steadfast, reservation‑shaped
    resolve.
background:
  cultural: Hayley was raised in a tight‑knit, predominantly white community outside Buffalo, Wyoming, where self‑reliance, appreciation for the outdoors, and a strong work ethic are core values. Her family’s
    roots trace back to Midwestern farm families of German and Irish ancestry, and she grew up attending a local church that emphasized community service and modesty. The rural setting fostered a respect
    for traditional practices while her exposure to a nearby regional college sparked a curiosity for scientific inquiry. This blend of grounded, practical upbringing with an openness to new ideas informs
    both her personal life and professional approach.
