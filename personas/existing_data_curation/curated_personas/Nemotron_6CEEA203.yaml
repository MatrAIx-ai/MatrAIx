  hobbies: '[''Hiking'', ''Landscape Photography'', ''Reading Science Non-fiction'', ''Puzzle Solving'', ''DIY Electronics Projects'', ''Strategic Board Games with Small Groups'', ''Volunteering at Local
    Wildlife Sanctuary'']'
  career_goals: Hayley aspires to become the director of early‑childhood education for the Johnson County School District, where she can champion district‑wide STEM initiatives for preschoolers. She aims
    to secure multi‑year grant funding to build a state‑of‑the‑art maker space for young learners and to develop a data‑centric assessment framework that tracks student growth over time. In the longer term,
    she envisions launching a consulting practice that helps rural school districts implement evidence‑based, technology‑enhanced curricula while maintaining community values.
