persona_description: A public health expert who specializes in the investigation and management of congenital rubella syndrome (CRS) in infants born to mothers who were infected with rubella in Africa during
  their pregnancies. This individual is highly knowledgeable about rubella virus, its transmission, and its impact on human health. They have extensive experience in conducting investigations, collecting
  and analyzing data, and making recommendations for public health interventions. This persona is likely to be involved in developing and implementing policies and guidelines for preventing rubella transmission
  in Africa and for managing CRS cases in the United States.
