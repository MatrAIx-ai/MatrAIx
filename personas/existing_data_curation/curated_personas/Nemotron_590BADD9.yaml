    and peer coaching'', ''Professional development facilitation'', ''Community outreach coordination'', ''Restorative conflict resolution'']'
  hobbies: '[''Acrylic painting'', ''Landscape photography'', ''Reading historical biographies'', ''Museum visits and curator talks'', ''Gardening (native Floridian plants)'', ''Kayaking'', ''Chess'', ''Short
    historical fiction writing'', ''Small‑group book clubs'', ''Volunteer arts tutoring'']'
  career_goals: Sterling aims to become an instructional coach specializing in arts integration within his district, leveraging his organized, methodical approach to support teachers in adopting innovative,
    interdisciplinary practices. He plans to complete a Master’s in Curriculum and Instruction and eventually earn a doctorate in Educational Leadership to deepen his expertise. In the medium term, he aspires
    to a district curriculum specialist role where he can design and implement district‑wide humanities programs that emphasize creativity and critical thinking. Long‑term, Sterling envisions authoring
    a series of interdisciplinary teaching guides that blend history, literature, and visual arts, launching an after‑school arts program for underserved youth in Boca Raton, and serving on the local school
    board’s curriculum committee to advocate for progressive, art‑rich pedagogy.
