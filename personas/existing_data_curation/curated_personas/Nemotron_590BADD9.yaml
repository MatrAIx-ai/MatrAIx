personas:
  professional: A seasoned educator with a deep expertise in U.S. history, world literature, and visual arts, Sterling Thompson leverages their methodical curriculum design, data‑driven classroom management,
    and arts‑integration mentorship to support teachers in creating interdisciplinary, student‑centered learning experiences.
  sports: An active yet solitary athlete, Sterling Thompson enjoys weekly kayaking on the Intracoastal Waterway, participates in a local tennis league during winter, follows the Miami Heat and the Tampa
    Bay Lightning for inspiration, and is a member of the Boca Raton Sailing Club where they hone teamwork on the water.
  arts: A devoted visual arts enthusiast, Sterling Thompson paints acrylic seascapes inspired by the subtleties of Florida light, captures the Intracoastal’s moods through landscape photography, and regularly
    attends exhibitions by Monet, O'Keeffe, and resident artist John Kline at the Boca Raton Museum of Art, while also curating small‑group talks on art history.
  travel: A purposeful traveler who favors curated, low‑key itineraries, Sterling Thompson has explored historic Savannah, the canals of Bruges, and Florence’s Renaissance galleries, frequently returns
    to the Florida Keys for sunrise kayaking, and dreams of a spring pilgrimage to Kyoto’s zen gardens to study their design principles.
  culinary: A moderately skilled home chef who loves coastal cuisine, Sterling Thompson regularly prepares stone crab claw salads with citrus vinaigrette, perfects key‑lime pie using fresh local limes,
    and experiments with herb‑infused grilled snapper seasoned with basil, thyme, and a hint of smoked paprika.
  core: Sterling Thompson blends methodical organization with a quiet artistic curiosity, turning solitary pursuits like painting and kayaking into disciplined practices that fuel their passion for interdisciplinary
    education and thoughtful living.
background:
  cultural: Sterling is a white American of Anglo‑Celtic ancestry who grew up in a middle‑class suburban environment in Palm Beach County. His upbringing emphasized the value of education, civic responsibility,
    and appreciation for the arts, shaped by frequent visits to local museums and cultural festivals in South Florida. The multicultural vibrancy of Boca Raton—its blend of Atlantic coastal culture, diverse
    immigrant communities, and a strong institutional support for the arts—has reinforced his curiosity and openness to unconventional ideas. While his family traditions include typical American holidays
    and community involvement, his personal experiences reflect a synthesis of traditional Mid‑Atlantic values and the progressive, arts‑focused ethos of his coastal home.
attributes:
  skills: '[''Interdisciplinary curriculum design'', ''Arts integration'', ''U.S. history instruction'', ''World literature instruction'', ''Visual arts instruction'', ''Classroom management with systematic
