  career_goals: Elsa aims to obtain her GED within the next year and enroll in a vocational program at a local community college, focusing on medical office administration or culinary arts. She is attracted
    to careers that provide clear, repeatable procedures and stable employment, such as a medical assistant, receptionist, or kitchen staff position. Her long‑term ambition is to secure a full‑time role
    that allows her to support her family financially while maintaining a predictable work schedule that aligns with her preference for routine and practicality.
