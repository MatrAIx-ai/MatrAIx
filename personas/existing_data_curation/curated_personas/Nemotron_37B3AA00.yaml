personas:
  professional: Ramez Subbiah, a 17‑year‑old aspiring automotive technician and computer networking specialist, blends a self‑taught skill set in PC building, hardware diagnostics, and basic automotive
    repair with a competitive, rapid‑decision style from online gaming, though their relaxed approach to obligations often results in disorganized work schedules.
  sports: Ramez Subbiah enjoys seasonal outdoor pursuits such as weekend fishing trips on Percy Priest Lake and quarterly hunting outings in the nearby Crockett County woods, follows the Tennessee Titans
    and Nashville Predators avidly, and maintains a casual fitness regimen that includes occasional weightlifting at a local gym and informal basketball games with friends.
  arts: Ramez Subbiah’s artistic palate blends a love for country hits from Luke Combs, classic rock anthems by Foo Fighters, and immersive video‑game soundtracks like The Witcher 3, while their reading
    habit leans heavily on science‑fiction staples such as Ender’s Game and The Expanse, all of which fuel their creative approach to custom PC case modding.
  travel: Ramez Subbiah’s travel style favors low‑cost road trips that combine hunting in the Great Smoky Mountains, a tech‑focused visit to Austin’s South by Southwest festival, and annual family trips
    to Memphis for renowned barbecue, balancing adventure with budget constraints and a preference for short, flexible itineraries.
  culinary: Ramez Subbiah enjoys hearty Southern dishes like fried chicken with buttermilk gravy and loaded potato skins, experiments with homemade BBQ rubs using smoked paprika and brown sugar, and frequently
    cooks quick meals such as ramen with added sliced jalapeños, reflecting an intermediate cooking skill level and a penchant for protein‑rich comfort food.
  core: Ramez Subbiah is a tech‑savvy, competition‑driven teen who balances solitary curiosity with a practical, self‑reliant work ethic, often juggling PC builds, gaming tournaments, and weekend hunts
    while occasionally slipping into disorganized budgeting and missed dental flossing.
background:
  cultural: Ramez grew up in Madison, Tennessee, a suburban community within Davidson County that blends Southern cultural traditions with the influence of nearby Nashville’s music and tech scene. His family’s
    values emphasize self‑reliance, practicality, and a respect for personal space, reflecting a regional appreciation for independence and modesty. He has been shaped by local community events such as
    county fairs and outdoor recreation, while also being exposed to contemporary digital culture through online gaming and internet media. This mix of Southern hospitality, a pragmatic work ethic, and
    modern technological interests forms the core of his cultural identity.
