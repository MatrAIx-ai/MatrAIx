persona_description: A scientist who specializes in the discovery and study of steroid-type molecules that play an important role in the survival and production of nerve cells in the brain, with a particular
  focus on the identification of ligands that stimulate the liver X receptor (LXR) in mice and zebrafish. This scientist is interested in the potential use of these molecules in future regenerative medicine,
  particularly for the development of new treatments for neurological diseases such as Parkinson's disease.
