persona_description: A linguist who specializes in the study of the Iroquois language and native languages of North America, particularly the Algonquin language. His research interests include the etymology
  and history of the name "Montreal", as well as the influence of the name on the indigenous cultures and languages of the region. He is also interested in the use of the name "Montreal" in different contexts,
  such as in the modern Iroquois language and in other native languages of the region.
