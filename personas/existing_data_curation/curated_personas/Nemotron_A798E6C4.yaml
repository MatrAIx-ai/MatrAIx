  career_goals: Phillip aims to move into a store‑manager role within the next two years, where he can lead a team that embraces innovative visual merchandising and community outreach. He plans to finish
    his bachelor’s degree in business administration and earn a retail‑management certification. Long‑term, he hopes to oversee multiple locations or open his own boutique‑gallery that merges his love for
    art with retail. He also seeks to develop stress‑management practices, such as mindfulness techniques, to preserve personal well‑being while achieving professional growth.
