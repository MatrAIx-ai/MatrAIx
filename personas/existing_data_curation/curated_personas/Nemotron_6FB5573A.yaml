  career_goals: She hopes to turn her love of art and people into a career that blends creativity with community impact. In the long term she aims to become a graphic designer or multimedia artist who works
    freelance or for a socially‑focused agency, while also studying psychology or counseling to develop mental‑health‑focused campaigns for teens. She dreams of producing visual content that raises awareness
    about anxiety and emotional wellbeing, and eventually leading workshops that combine art therapy techniques with peer support.
