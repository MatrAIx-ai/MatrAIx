personas:
  professional: Amenia Constantine, a 16‑year‑old aspiring graphic designer and multimedia creator, leverages their strong sketching talent, beginner coding skills, and natural knack for empathetic teamwork
    to craft visual stories that blend art with teen mental‑health advocacy, often channeling their intense emotions into bold, expressive designs.
  sports: Amenia Constantine cheers on the Cleveland Browns and Ohio State Buckeyes football teams on Saturday nights, plays on the school's varsity track club during spring, and occasionally joins community
    yoga classes, balancing their love for high‑school football culture with personal fitness routines.
  arts: Amenia Constantine immerses themselves in contemporary illustration by studying the works of artists like Yayoi Kusama and Banksy, enjoys listening to indie singer‑songwriter Phoebe Bridgers while
    sketching, and finds inspiration from local theater productions starring the Canton Playhouse troupe.
  travel: Amenia Constantine dreams of a road‑trip to the Great Lakes shoreline with friends, has already visited New York City’s Museum of Modern Art and the vibrant street art of Detroit, and plans to
    explore Kyoto’s temples for inspiration, preferring spontaneous itineraries over rigid schedules.
  culinary: Amenia Constantine favors comfort foods like homemade mac and cheese with sharp cheddar and a dash of smoked paprika, enjoys experimenting with avocado toast topped with radish and poached eggs,
    and occasionally treats themselves to sushi rolls featuring tuna and cucumber after late‑night art sessions.
  core: Amenia Constantine is a creatively restless teen who turns intense anxiety into vivid art, splurges on supplies, and organizes impromptu community workshops, all while juggling a habit of forgetting
    homework deadlines.
background:
  cultural: Amenia grew up in a typical Midwestern white American family in Canton, Ohio. Her upbringing reflects the region’s strong sense of community, modesty, and appreciation for local traditions such
    as high‑school football games and neighborhood festivals. She was exposed to a blend of classic American pop culture, regional art events, and a supportive church community that encourages service to
    others. This Midwestern backdrop, combined with her family's encouragement of curiosity and creative expression, shapes her values of flexibility, openness to new ideas, and a desire to connect with
    and support her peers.
