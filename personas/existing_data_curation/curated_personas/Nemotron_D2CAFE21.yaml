  career_goals: Byung aims to transition from a frontline cleaning role to a supervisory position within the next two years, seeking a Certified Professional Cleaner credential and a high‑school equivalency
    diploma to bolster his qualifications. He envisions eventually launching his own boutique cleaning service that specializes in sustainable, technology‑enhanced housekeeping for environmentally conscious
    clients in the Bay Area. His competitive streak drives him to benchmark his service efficiency against industry standards, while his practical mindset keeps him focused on building a financially stable
    business that can support his family and provide opportunities for mentorship to other young immigrants entering the workforce.
