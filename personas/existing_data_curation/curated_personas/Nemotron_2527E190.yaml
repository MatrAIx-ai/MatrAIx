  career_goals: Celeste’s current ambitions center on leaving a lasting, positive impact on her community and family. She aims to mentor younger residents through informal tutoring and sharing her life‑long
    experience in STEM, lead a community garden initiative that promotes sustainable food production, and compile a memoir that weaves together her scientific background, personal history, and the evolving
    story of Shelburne. She also strives to maintain her health and independence, support her grandchildren’s education, and continue serving as a dependable volunteer at the local library and senior center.
