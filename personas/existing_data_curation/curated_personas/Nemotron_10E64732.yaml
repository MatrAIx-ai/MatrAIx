  career_goals: Shanley aims to deepen her involvement in the local arts scene by establishing a monthly senior‑focused art workshop series, documenting the town's cultural heritage, and publishing a memoir
    that weaves together her personal experiences with reflections on community history. She also aspires to travel to at least three major art museums outside New England, continue her lifelong learning
    through online courses in art history and photography, and support her spouse by maintaining a well‑organized, nurturing home environment.
