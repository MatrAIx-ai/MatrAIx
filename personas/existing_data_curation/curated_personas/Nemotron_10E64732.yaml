personas:
  professional: Shanley Eite is a retired community organizer who leverages her knack for meticulous planning and open‑minded curiosity to run senior‑focused art workshops, curate neighborhood exhibitions,
    and mentor volunteers, all while balancing a quietly competitive drive to see her projects outshine neighboring towns' programs.
  sports: Shanley Eite stays active by joining the River Trail Walkers senior walking club, tending to her garden as low‑impact cardio, cheering the Boston Red Sox in spring, the New England Patriots in
    fall, and attending the local high school soccer matches, all while keeping a relaxed, competitive spirit that pushes her to log at least three miles of gentle walking each week.
  arts: Shanley Eite immerses herself in the arts by painting watercolors of local wetlands inspired by Monet and O'Keeffe, curating small exhibitions featuring works by community seniors, attending lecture
    series on Renaissance art featuring Dr. Lisa Grant, and volunteering at the town library's Art & Story hour where she shares biographies of Frida Kahlo and Georgia O'Keeffe.
  travel: Shanley Eite favors thoughtfully planned, leisurely road trips that blend cultural immersion and artistic discovery, having already visited the Metropolitan Museum of Art in New York and the Museum
    of Fine Arts in Boston, dreaming of future pilgrimages to the Louvre in Paris, the Uffizi Gallery in Florence, and the Prado Museum in Madrid, all while budgeting carefully and using senior travel discounts.
  culinary: Shanley Eite delights in farm‑to‑table cooking, skillfully preparing ratatouille with garden‑fresh zucchini, eggplant, and basil, crafting hearty vegetable stews seasoned with rosemary and thyme,
    and occasionally indulging in a sweet almond biscotti, though she sometimes over‑salts her soups when experimenting with new spice blends.
  core: Shanley Eite is a curious, calm senior who blends competitive project ambition with a love for watercolor, garden fresh recipes, and meticulous volunteer leadership, all while habitually misplacing
    her reading glasses on top of sketchbooks.
background:
  cultural: Shanley is a lifelong resident of Ashby, Massachusetts, raised in a traditional New England white family with Irish and English ancestry. Her upbringing emphasized community involvement, self‑reliance,
    and an appreciation for local history and seasonal rhythms. Though she did not complete a formal high school diploma, she cultivated a broad cultural perspective through extensive reading, travel, and
    participation in community arts initiatives. Her cultural identity blends the modest, pragmatic values of small‑town New England with an open curiosity toward diverse artistic expressions.
