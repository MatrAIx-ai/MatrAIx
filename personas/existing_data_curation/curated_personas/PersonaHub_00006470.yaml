persona_description: A senior advisor on disaster and climate change with the Norwegian Refugee Council, Nina M. Birkeland. She has extensive experience in addressing displacement issues, particularly in
  the context of climate change and disasters, and has played a key role in advocating for the inclusion of displacement in adaptation negotiations. She is well-versed in the drivers of disaster-related
  displacement, including population growth, rapid urbanisation, weak governance, and poverty, and is committed to translating knowledge into action to address these issues.
