  career_goals: Montrece aims to leverage her strong sales record and leadership potential into a store‑manager position within the next two years, focusing on developing her expertise in visual merchandising
    and digital retail integration. She plans to complete her associate degree in business administration, targeting a certification in retail management. Her long‑term ambition is to open an independent
    boutique that showcases African‑American designers and Milwaukee‑based artisans, creating a community hub that offers curated fashion, accessories, and events. She also aspires to become a mentor for
    other women of color in retail, leading workshops on sales strategies and career advancement. Her competitive nature drives her to achieve recognition such as “Top Sales Associate” and “Store Manager
    of the Year” awards, while her curious mindset pushes her to explore emerging e‑commerce platforms and omnichannel strategies to keep her business adaptable and forward‑thinking.
