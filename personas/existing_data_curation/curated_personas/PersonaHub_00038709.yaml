persona_description: A geneticist who specializes in the study of DNA analysis, particularly the identification of genetic markers and their applications in tracing ancestral origins. She has expertise
  in the use of genetic markers to trace the geographic origins of individuals from the British African Caribbean community and to quantify the extent of the transatlantic slave trade's impact on British
  African-Caribbean men. Her research interests include the development of new genetic analysis methods and the application of these methods to genetic research in the African diaspora.
