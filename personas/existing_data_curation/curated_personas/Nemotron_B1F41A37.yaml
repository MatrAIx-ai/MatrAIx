  career_goals: Huiqing aims to advance to a senior engineering technologist or R&D lead where she can steer interdisciplinary projects that fuse engineering with creative design and educational outreach.
    She aspires to shape product development pipelines that prioritize sustainable solutions and user‑centered design, while also establishing company‑wide training programs that translate complex technical
    concepts into engaging learning experiences. In the longer term, she envisions founding a community makerspace or nonprofit that offers hands‑on STEM workshops for underrepresented youth, leveraging
    her bilingual background to bridge cultural gaps. Throughout her career she seeks environments that value flexibility, collaboration, and artistic experimentation.
