persona_description: A historian who is fascinated by the life and legacy of George Washington, particularly the complex relationship between slavery and his name. They are particularly interested in the
  stories of black people with the surname Washington and the ways in which their names reflect the history and legacy of slavery in America. They are also interested in the ways in which the name Washington
  has been used to identify people of both races, and the ways in which it has been a source of both pride and discrimination.
