  career_goals: As she approaches the later stage of her career, Elizabeth aims to transition from full‑time litigation to a part‑time advisory role, focusing on pro bono assistance for low‑income seniors
    and volunteering with local legal aid societies. She aspires to codify her knowledge into a comprehensive guide on elder law, mentor the next generation of attorneys, and eventually serve as a mediator
    or arbitrator, applying her calm, structured demeanor to facilitate amicable settlements. Her overarching ambition is to leave a lasting legacy of integrity, compassion, and practical solutions for
    the community she serves.
