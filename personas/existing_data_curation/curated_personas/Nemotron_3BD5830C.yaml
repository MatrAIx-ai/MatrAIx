personas:
  professional: Nancy Poncelet, a 22‑year‑old installation and maintenance worker, leverages their methodical problem‑solving and OSHA/EPA compliance expertise to execute HVAC, electrical, and plumbing
    projects with precise documentation, while they use CMMS to schedule preventive maintenance and mentor newer apprentices.
  sports: Nancy Poncelet, an avid weekend hiker on the Appalachian Trail in Sussex County, they supplement their cardio with Saturday morning yoga at the local community center, root for the New York Knicks
    and the Philadelphia Eagles, and belong to the Sussex County Trail‑Blazers running club, which meets for early‑morning hill repeats.
  arts: Nancy Poncelet, a regular at the regional community theater and fan of indie folk, they frequently stream Sufjan Stevens, listen to ambient piano works by Nils Frahm, quote the environmental documentaries
    of David Attenborough, and collect vintage photography books by Ansel Adams, which they display proudly in their living room.
  travel: Nancy Poncelet, who enjoys low‑cost, meticulously planned trips, they have backpacked through Shenandoah National Park and spent a weekend in Philadelphia exploring historic sites, now dream of
    a solar‑farm guided tour in Iceland and a volunteer trekking expedition in the Peruvian Andes, all while budgeting for a future cross‑country road trip in a fuel‑efficient van.
  culinary: Nancy Poncelet, a precision baker, they love crafting sourdough loaf with a wild‑yeast starter, rosemary focaccia, and whole‑grain banana bread, measuring ingredients by weight with a digital
    scale, and frequently experiment with adding locally harvested carrots, basil, and thyme from their garden to their recipes.
  core: Nancy Poncelet, 22, blends a love of structure with a quiet adventurous streak, obsessively plans each project and garden row, yet they slip spontaneous crossword challenges into breaks, often staying
    up late to perfect a loaf or a schematic.
background:
  cultural: Nancy grew up in a middle‑class, predominantly white suburban community in northern New Jersey, where family gatherings, community events, and a strong work ethic were emphasized. Her heritage
    traces back to European (primarily English and German) ancestry, and she was raised with values common to mainstream American culture—individual responsibility, respect for rules, and community involvement.
    Although she identifies as culturally American, she maintains connections to her local area through participation in town festivals, volunteer clean‑up projects in Sussex County, and appreciation for
    the region’s blend of suburban convenience and nearby rural landscapes.
attributes:
  skills: '[''HVAC system maintenance'', ''Basic electrical troubleshooting'', ''Plumbing installation'', ''Interpretation of technical schematics'', ''Use of hand and power tools'', ''Preventive maintenance
    scheduling'', ''Safety compliance (OSHA, EPA)'', ''CMMS software operation'', ''Customer communication'', ''Problem solving'', ''Time management'', ''Documentation and reporting'']'
  hobbies: '[''Vegetable gardening'', ''Hiking local nature trails'', ''Puzzle solving (crosswords, sudoku)'', ''Reading non-fiction (technology, self‑improvement, sustainability)'', ''Participating in
    a book club'', ''Cooking and baking'']'
  career_goals: Nancy aims to become a certified journeyman in HVAC and eventually a licensed contractor, allowing her to lead larger installation projects and supervise a crew. In the next three to five
    years she plans to earn EPA Section 608 certification, OSHA 30‑hour training, and an associate’s degree in mechanical engineering technology. She hopes to specialize in renewable‑energy installations,
    such as residential solar PV systems, to align her work with growing sustainability demands. Long‑term, Nancy envisions starting her own small‑scale contracting firm that emphasizes safety, quality,
    and mentorship for new entrants to the trade.
