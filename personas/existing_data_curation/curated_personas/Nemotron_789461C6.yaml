  hobbies: '[''Attending art exhibitions'', ''Community theater acting'', ''Improvisational comedy'', ''Cooking soul food recipes'', ''Gardening'', ''Spontaneous day trips'', ''Volunteer work at youth art
    programs'', ''Reading contemporary fiction'', ''Choir singing'']'
  career_goals: Terez aims to move beyond the driver seat into a leadership role such as School Transportation Coordinator, where she can design safer, more engaging travel experiences for students. She
    hopes to acquire a certification in transportation management and eventually launch a community art‑on‑the‑go program that integrates local artists into school bus routes, giving kids exposure to visual
    and performing arts. Long‑term, she envisions mentoring new drivers and advocating for inclusive, culturally responsive transportation policies in the district.
