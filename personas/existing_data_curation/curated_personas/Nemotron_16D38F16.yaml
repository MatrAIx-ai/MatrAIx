personas:
  professional: Maritza Torresramos, a veteran retail operations manager with three decades of experience, blends an artist’s eye for visual storytelling with data‑driven inventory and staffing strategies,
    and they leverage bilingual fluency to mentor emerging supervisors while championing diversity in a pragmatic, calm manner.
  sports: Maritza Torresramos enjoys low‑impact fitness, regularly walking the coastal trails of San Diego with the Harbor View Hiking Club and cheering for the San Diego Padres, and they sharpen strategic
    thinking in weekly chess matches at the community library.
  arts: Maritza Torresramos spends afternoons painting oil canvases inspired by folk motifs, frequently referencing the works of Frida Kahlo and Diego Rivera, while devouring historical novels by Isabel
    Allende and attending performances at The Old Globe, and they are particularly drawn to the play La Casa de Bernarda Alba.
  travel: Maritza Torresramos prefers curated cultural trips, having explored Oaxaca’s historic markets and the ruins of Chichen Itza, and they plan a future pilgrimage to Seville’s Alcázar to study Moorish
    tile patterns, balancing limited retirement funds with a desire for immersive, leisurely travel.
  culinary: Maritza Torresramos loves crafting mole poblano, tamales de rajas, and chilies en escabeche, skillfully blending dried chilies, epazote, and chocolate, and they often experiment with fresh cilantro
    and toasted pumpkin seeds to elevate family recipes, though they occasionally over‑salt dishes when eager to showcase bold flavors.
  core: Maritza Torresramos, a calm yet competitively driven lifelong learner, merges artistic retail expertise with a love for heritage cooking, community mentorship, and strategic chess play, and they
    navigate life with a balanced blend of curiosity and practicality.
background:
  cultural: Maritza was born and raised in a close‑knit Mexican family that later settled in the San Diego area. Her upbringing was steeped in the traditions of Mexican cuisine, music, and festivals such
    as Día de los Muertos and Las Posadas, which she continues to celebrate with her extended family and community. Bilingual from childhood, she navigates both English‑dominant and Spanish‑speaking environments
    with ease, a skill that enriches her leadership in the diverse retail workforce of Chula Vista. Her cultural heritage emphasizes hospitality, respect for elders, and a strong sense of community responsibility,
    values that shape her calm, resilient demeanor and her commitment to mentoring younger colleagues. While she embraces her Mexican roots, she also integrates the multicultural influences of Southern
    California, reflecting a blended identity that informs both her personal and professional life.
