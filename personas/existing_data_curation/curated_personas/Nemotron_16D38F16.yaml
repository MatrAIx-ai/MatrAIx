  career_goals: While approaching retirement, Maritza is driven to leave a lasting impact on the retail organization she serves. She aims to mentor the next generation of supervisors, formalize a training
    curriculum that integrates her arts-inspired merchandising techniques, and champion diversity and inclusion initiatives that reflect the multicultural community of Chula Vista. Over the next few years
    she plans to transition into a part-time consulting role, assisting nearby small businesses—particularly Mexican-owned boutiques—in enhancing their visual brand and operational efficiency. Ultimately,
    she hopes to balance her professional legacy with a community-focused project that celebrates local arts and heritage.
