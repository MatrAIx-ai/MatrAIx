persona_description: A historian who specializes in the study of Cornwall's history, particularly the economic and social changes that occurred in the town of Bodmin in the 1850s and 1890s. She is interested
  in the impact of economic changes on the town's population and the migration patterns of its residents. She is also interested in the role of Bodmin as a hub for those on the move, and how it acted as
  a stepping stone for many people, first moving from the nearby countryside and then on to other towns and cities up the line.
