personas:
  professional: A retired community elder and seasoned garden-to-table cook, Vivian Brown blends decades of Southern home-cooking expertise with a talent for mediating church disputes, using practical wisdom
    and a curious eye for new recipe twists while delightfully juggling tasks in a relaxed, somewhat disorganized manner; they often rely on intuition to guide both the kitchen and the congregation.
  sports: Vivian Brown enjoys gentle morning walks with the Senior Steps walking club, attends weekly senior yoga at the community center, and roots for the local baseball team, the River City Royals, while
    they occasionally join the neighborhood softball league each spring.
  arts: Vivian Brown finds solace in classic soul and jazz, regularly spinning records by Aretha Franklin, Louis Armstrong, and Nina Simone, while they read historical fiction by authors such as Philippa
    Gregory and attend community theater productions by the local drama troupe.
  travel: Vivian Brown prefers low-key, family-oriented trips, such as annual visits to their grandchildren’s lakehouse in the Ozarks and day outings to historic Savannah, planning each journey on a simple
    spreadsheet and avoiding long flights due to health considerations and a love of familiar comforts.
  culinary: Vivian Brown excels at farm-to-table cooking, skillfully preparing dishes like collard greens with smoked turkey, sweet-potato casserole, and cornbread, often experimenting with fresh basil
    from their garden or a splash of orange zest, and they delight in sharing these meals at church potlucks.
  core: Vivian Brown is a garden-loving, soulful storyteller who balances curiosity with practicality, worries about small things, and finds peace in cooking, quilting, and community, where they always
    make time for others.
background:
  cultural: Vivian was raised in Darlington, South Carolina, in a close‑knit Black community where the church served as the cultural and social hub. Her family’s roots trace back to sharecroppers who worked
    the fertile lands of the Pee Dee region, and she grew up listening to the stories of the civil‑rights era from her parents. Southern Black culinary traditions, gospel music, and oral storytelling are
    central to her identity. Vivian’s upbringing emphasized mutual support, respect for elders, and a strong sense of resilience, shaping her compassionate nature and her commitment to preserving her heritage
    for future generations.
attributes:
