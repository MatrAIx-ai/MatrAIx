  career_goals: Although retired, Vivian aims to document her family’s recipes and stories in a handwritten memoir that she hopes to share with her grandchildren and the local historical society. She wishes
    to continue volunteering at the church’s senior outreach program, offering meals and a listening ear to fellow elders. Vivian is also motivated to maintain her health through gentle walks and regular
    check‑ups, and she aspires to become more comfortable using a smartphone so she can stay connected with distant relatives without feeling overwhelmed.
