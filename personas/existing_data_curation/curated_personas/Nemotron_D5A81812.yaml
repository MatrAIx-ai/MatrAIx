personas:
  professional: Felix Laines, a 17‑year‑old aspiring automotive technician, leverages hands‑on garage work and spreadsheet‑tracked maintenance logs to keep engines running smoothly, while their methodical
    planning and sociable nature make them the go‑to organizer for his youth soccer league’s equipment and schedules.
  sports: Felix Laines stars as a forward for the River Valley Youth Soccer Club, follows the Portland Timbers and Oregon State Beavers football teams religiously, and treats weekend hiking in the Cascade
    foothills as a complementary fitness routine that balances the high‑energy demands of league matches and spontaneous pickup games.
  arts: Felix Laines grooves to regional Mexican bands like Los Tigres del Norte and contemporary crossover artists such as Natanael Cano, enjoys the soundtrack of FIFA’s global playlists, and occasionally
    attends community‑center art workshops where they help curate Día de los Muertos altars, reflecting their belief that music and visual storytelling are essential escapes from school stress.
  travel: Felix Laines prefers weekend road trips to Oregon’s Columbia River Gorge and has earmarked a future summer pilgrimage to Oaxaca’s bustling markets, balancing a love for nature hikes with a curiosity
    for vibrant street food scenes, though their travel planning remains spreadsheet‑driven and budget‑constrained by high‑school tuition costs.
  culinary: Felix Laines delights in crafting tacos al pastor with pineapple‑marinated pork, steaming tamales wrapped in corn husks, and experimenting with smoky chipotle sauces, yet they often over‑stock
    the pantry with dried chilies and salsa, leading to occasional ingredient waste when they forget to use leftovers before a gaming marathon.
  core: Felix Laines is a structured, outgoing teen who blends garage‑wrench precision with a love for soccer, gaming, and home‑cooked street food, even if they occasionally sacrifice sleep for an extra
    match or forget to water their plants amid a busy schedule.
background:
  cultural: Felix comes from a Mexican‑American family that originated in the state of Jalisco before moving to Roseburg for work in agriculture. At home, Spanish is spoken daily, and family meals feature
    traditional dishes and celebrations that keep cultural ties strong. He observes Mexican holidays such as Día de los Muertos, where his family creates altars and shares stories of ancestors, and he participates
    in local Cinco de Mayo events organized by the community center. Though raised in a small Oregon town, Felix blends Mexican customs with the local culture, navigating a bicultural identity that influences
    his language, cuisine, music preferences, and sense of community.
attributes:
  skills: '[''Automotive maintenance'', ''Basic cooking of Mexican cuisine'', ''Bilingual communication (Spanish/English)'', ''Event planning and organization'', ''Basic computer proficiency (social media,
