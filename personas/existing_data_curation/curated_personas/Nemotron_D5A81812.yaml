  hobbies: '[''Soccer'', ''Video gaming (FIFA, Minecraft)'', ''Cooking traditional Mexican dishes'', ''Listening to Mexican regional music'', ''Hiking local trails'', ''Participating in cultural festivals'',
    ''Volunteering at community center'']'
  career_goals: Felix aims to earn his GED within the next year and enroll in a community college trade program, preferably automotive technology or HVAC, to gain a certified qualification. He envisions
    working as a mechanic at a local garage while saving enough to eventually open a small mobile food business that serves Mexican street food, combining his cooking skills with his entrepreneurial drive.
    Supporting his family financially and becoming a mentor for younger teens at the community center are also important long‑term goals.
