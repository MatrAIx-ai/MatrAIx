  hobbies: '[''Visiting the Toledo Museum of Art'', ''Watercolor painting'', ''Urban photography'', ''DIY home décor projects'', ''Gardening'', ''Cooking regional dishes'', ''Running'', ''Puzzle solving'',
    ''Community theater volunteering'']'
  career_goals: Tracey aims to transition from independent housekeeping work to a supervisory role in a boutique hotel or a corporate facilities team, where she can mentor junior staff and implement sustainable
    cleaning protocols. She also dreams of launching her own small cleaning business that emphasizes green products and personalized service for local families and small businesses in Toledo. To support
    this ambition, she plans to complete a certification in Hospitality Management and attend workshops on entrepreneurship and small‑business finance. In the longer term, Tracey hopes to blend her love
    for art and community by organizing neighborhood clean‑up events that incorporate public art installations, fostering both environmental stewardship and cultural enrichment.
