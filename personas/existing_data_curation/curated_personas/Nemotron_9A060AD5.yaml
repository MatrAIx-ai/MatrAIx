personas:
  professional: Tracey Duncan, a 31‑year‑old eco‑focused cleaning specialist with a knack for streamlining operations, leverages meticulous scheduling, inventory management, and a skeptical eye for product
    safety to deliver green sanitization services while mentoring junior staff and planning a future supervisory role in boutique hospitality, and they aim to build a business grounded in sustainability.
  sports: Tracey Duncan channels competitive energy into thrice‑weekly runs with the Toledo Running Club, rallies behind the Mud Hens in baseball season and the Walleye during winter hockey, and joins local
    co‑ed softball leagues, balancing disciplined cardio with a love for Midwestern team spirit, and they treat each game as a chance to refine teamwork.
  arts: Tracey Duncan, an avid watercolorist inspired by Claude Monet’s use of light and a hobbyist photographer echoing Annie Leibovitz’s candid style, frequents the Toledo Museum of Art, enjoys community
    theater productions starring local actor Michael McCarty, and draws creative spark from folk‑rock band The Lumineers, and they often blend photography and painting in community mural projects.
  travel: Tracey Duncan plans modest road‑trip adventures with detailed itineraries, favoring weekend escapes to Hocking Hills State Park and the Lake Erie islands, while dreaming of a future cultural pilgrimage
    to Florence’s Renaissance galleries, balancing budget constraints with a love for hands‑on exploration, and they keep a travel journal to capture each experience.
  culinary: Tracey Duncan enjoys cooking hearty Midwest fare such as sweet corn chowder and pierogies, often seasoning them with home‑grown basil, rosemary, and edible lavender from their garden, and experiments
    with sustainable sourcing by frequenting the local farmer’s market for fresh produce, and they take pride in plating dishes that reflect seasonal freshness.
  core: Tracey Duncan blends a competitive, detail‑driven work ethic with a curious, art‑savvy soul, constantly juggling green cleaning projects, watercolor brushes, and a modest budget while questioning
    the status quo and carving a path toward entrepreneurial stewardship, and they never shy away from challenging the norm.
background:
  cultural: Tracey was raised in a modest, white, Midwestern family in the suburbs of Toledo, steeped in the region’s values of hard work, hospitality, and community involvement. Her upbringing included
    regular church attendance—primarily Protestant—where service and modesty were emphasized. The local culture, marked by a blend of industrial heritage and Great Lakes traditions, fostered her appreciation
    for straightforward communication and practical problem‑solving. Growing up near the Maumee River, she developed a fondness for seasonal festivals and the regional cuisine of Ohio, such as corn‑based
    dishes and pierogies. While her formal education was limited to some college coursework in business fundamentals, her cultural environment encouraged lifelong learning, leading her to pursue community
    workshops, art classes, and professional certifications that align with her personal and career aspirations.
attributes:
