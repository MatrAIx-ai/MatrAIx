  career_goals: Pamela aims to transition from retail sales into a role that merges her passion for education with her practical experience. She plans to pursue a master's degree in Education or Instructional
    Design within the next two years, positioning herself for a teaching certification or a youth program coordinator position. In the medium term, she envisions becoming a training manager for a retailer
    that specializes in educational products, where she can design staff development programs and create interactive learning experiences for customers. Ultimately, Pamela hopes to launch a community learning
    center in Catonsville that offers after‑school tutoring, hands‑on workshops, and community events, leveraging her organizational strengths and compassionate nature.
