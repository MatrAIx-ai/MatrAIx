  career_goals: Approaching the end of his formal career, Michael hopes to transition into a part‑time mentorship role, sharing his decades of dispatch knowledge with younger colleagues. He is interested
    in volunteering for the city’s emergency‑preparedness outreach program, helping seniors understand what to do in a crisis. Michael also wants to stay current with emerging dispatch technologies, such
    as predictive analytics, to ensure the department remains effective. On a personal level, he aims to maintain a balanced routine that reduces his stress, supporting his wife’s health and fostering a
    sense of legacy within his community.
