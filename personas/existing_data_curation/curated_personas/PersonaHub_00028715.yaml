persona_description: A medical researcher and engineer with expertise in the field of electroporation technology, specifically in the design and optimization of electric fields to deliver chemotherapeutic
  agents to cancerous tissue. They are skilled in using finite-element-based software, such as SRAC's Cosmos/EMS, to calculate field strengths and analyze electrode placement to optimize treatment protocols.
  They are also familiar with medical applications of electroporation technology and have experience with medical devices such as Genetronics' MedPulser. They are open to learning new software and tools
  and are comfortable asking for assistance from FEA developers.
