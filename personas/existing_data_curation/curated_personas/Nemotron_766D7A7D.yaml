  career_goals: Stephen aims to transition into a lead engineering or technology‑management role where he can shape product strategy while still staying hands‑on with code. He plans to deepen his expertise
    in cloud‑native architecture and artificial‑intelligence integration, with the long‑term ambition of launching a boutique consultancy that helps local Pennsylvania businesses modernize their IT systems.
    Mentoring junior developers and contributing to open‑source projects that solve real‑world problems are also high on his priority list, all while preserving a healthy work‑life balance for his family.
