personas:
  professional: A resourceful community handyman and emerging educator, Jai Nixon merges decades of hands‑on home‑repair expertise with a methodical budgeting mindset, channeling their curiosity into weekly
    workshops at the local library while balancing a love for art and an undercurrent of self‑critical worry as they plan each session.
  sports: A weekend enthusiast of gentle exercise, Jai Nixon enjoys early‑morning walks along the Flint River, participates in a local pickleball league, roots for the Atlanta Braves and Falcons, joins
    the community gym's senior cycling class each spring, and treats their gardening as a low‑impact strength routine, though they sometimes skip the weekly cardio in favor of sketching outdoors.
  arts: A devoted aficionado of visual and musical arts, Jai Nixon paints Georgia countryside scenes inspired by Andrew Wyeth, curates small gallery shows featuring local artists like Faye Robinson, revels
    in the soulful trumpet of Miles Davis, the blues of B.B. King, and gospel harmonies of Mahalia Jackson, and never misses church choir rehearsals or live jazz nights at the local Blue Collar Café, while
    they also enjoy critiquing new exhibits with friends over coffee.
  travel: A deliberate road‑tripper with a penchant for heritage sites, Jai Nixon has explored Savannah’s historic squares, taken a scenic drive through the Blue Ridge Mountains, visited the High Museum
    in Atlanta on multiple trips, longs to wander the streets of New Orleans for its music culture, and prefers planning itineraries months ahead while staying within a modest budget, as they chart each
    route on a worn map.
  culinary: A seasoned Southern cook with a garden‑to‑table philosophy, Jai Nixon whips up skillet‑fried catfish, simmered tomato‑okra stew seasoned with thyme and smoked paprika, and bakes sweet potato
    pie, all while savoring the fresh basil, cilantro, and hot peppers harvested from their backyard, and they relish occasional dinner outings at the historic Fox Theatre’s restaurant for a change of pace.
  core: Jai Nixon is a meticulous, art‑loving handyman‑scholar who balances quiet painting and garden chores with bustling church fundraisers, hoards vintage jazz vinyl, frets about finances and health,
    and secretly dreams of turning woodworking into a thriving side business as they keep a notebook of design ideas.
background:
  cultural: Jai is a lifelong resident of Cairo, Georgia, and his identity is shaped by the deep‑rooted African‑American culture of the rural South. He grew up in a close‑knit Black community where the
    church was the social hub, and the traditions of gospel music, communal potlucks, and oral storytelling were daily rituals. His family’s lineage traces back to sharecroppers who worked the cotton fields
    of Grady County after the Great Migration, instilling a strong work ethic and a reverence for perseverance. The civil‑rights movements of the 1960s left an imprint on his values of justice and community
    solidarity. Culinary traditions—collard greens, fried catfish, sweet biscuits—are celebrated in his cooking, while his appreciation for visual arts draws on both African motifs and Southern folk art.
    Jai’s cultural perspective balances respect for elders, a collective sense of responsibility, and a personal curiosity that drives him to explore new ideas while honoring his heritage.
