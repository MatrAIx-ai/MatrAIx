personas:
  professional: Clementina Palacio, a 14‑year‑old budding visual artist and digital creator, channels her curiosity and love for unconventional ideas into sketching, watercolor, and coding mini‑games on
    Scratch while balancing school responsibilities with a flexible yet organized approach.
  sports: Clementina Palacio, who finds rhythm in beginner salsa lessons at the local Salsa Fusion Teens club, also cheers for the Miami Heat during basketball season and Inter Miami CF for soccer, balancing
    occasional weekend soccer matches with their artistic schedule.
  arts: Clementina Palacio, an avid sketcher and digital art enthusiast, draws inspiration from graphic novelists Marjane Satrapi and Kazu Kibuishi, watercolorist Yao Cheng, and listens to Celia Cruz, J Balvin,
    and indie musician Phoebe Bridgers while creating.
  travel: Clementina Palacio, who plans trips with detailed Pinterest boards, has explored Old San Juan's cobblestone streets, rolled bright‑eyed through Orlando's theme parks, and dreams of wandering Tokyo's
    Akihabara district, balancing family budget constraints with a thirst for cultural immersion.
  culinary: Clementina Palacio, who helps prepare arroz con gandules seasoned with sofrito, loves tasting mango salsa and baking almond shortbread cookies, and experiments with watercolor‑inspired food
    plating while learning new recipes with family.
  core: Clementina Palacio, a 14‑year‑old artistic polymath, stitches together sketchbooks, salsa steps, and mindful journaling into a vibrant tapestry of curiosity, anxiety‑driven creativity, and occasional
    impulsive spending.
background:
  cultural: Clementina is a second‑generation Puerto Rican raised in Orlando's vibrant Latino community. At home, Spanish is spoken daily, and she celebrates Puerto Rican holidays such as the Puerto Rico
    Day Parade in Orlando, Three Kings' Day, and traditional Christmas feasts. Family gatherings feature classic foods like pernil, pasteles, and arroz con gandules, and she often helps prepare them. She
    participates in local cultural events at Casa Boricua, enjoys island music and dance, and feels a strong connection to her island roots while navigating the multicultural landscape of South Florida.
attributes:
  skills: '[''sketching and drawing'', ''digital illustration using Procreate'', ''basic photo editing (Canva)'', ''creative writing and storytelling'', ''Spanish‑English bilingual communication'', ''basic
    coding in Scratch'', ''project planning and time management'', ''team collaboration and conflict mediation'', ''knowledge of Puerto Rican cultural traditions'']'
  hobbies: '[''drawing and sketching'', ''digital art with Procreate'', ''watercolor painting'', ''reading graphic novels'', ''creative writing (poetry and short stories)'', ''listening to salsa and reggaetón'',
    ''beginner salsa dancing'', ''cooking Puerto Rican dishes'', ''volunteering at cultural center'', ''journaling and mindfulness sketches'', ''basic coding on Scratch'']'
  career_goals: Clementina aspires to attend a high school with a robust visual‑arts program and later earn a degree in graphic design or illustration. She dreams of becoming a creative director who can
    fuse contemporary art with her Puerto Rican heritage, producing culturally resonant visual narratives. Inspired by her empathy and personal experience with stress, she also hopes to develop youth‑focused
    art workshops that promote mental‑health awareness, eventually leading a community arts collective that empowers teens through creative expression.
