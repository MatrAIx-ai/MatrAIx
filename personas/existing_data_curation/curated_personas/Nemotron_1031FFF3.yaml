  hobbies: '[''drawing and coloring'', ''reading bilingual picture books'', ''jigsaw puzzle solving'', ''exploring backyard nature'', ''listening to Mexican folk music'', ''simple cooking with family'',
    ''paper and clay crafting'', ''watching animal cartoons'']'
  career_goals: Marianne imagines a future where she can combine her love of art, storytelling, and caring for others. She dreams of becoming an artist who paints colorful stories that celebrate her heritage,
    a teacher who creates warm, supportive classrooms, and even a veterinarian who looks after neighborhood pets. Ultimately, she hopes to write and illustrate bilingual picture books that share Mexican
    folklore with children everywhere.
