personas:
  professional: Sharon Johnson, a 20‑year‑old organized registered nurse on a bustling urban medical‑surgical unit, combines meticulous patient assessments, IV insertion, and flawless electronic health
    record documentation with an upbeat, team‑oriented communication style that makes her a natural liaison between patients, families, and staff.
  sports: Sharon Johnson, a 20‑year‑old nurse and avid Zumba enthusiast, stays fit with thrice‑weekly classes at the local YMCA, roots for the Philadelphia 76ers during the NBA season, and joins friends
    in cheering on the Philadelphia Eagles on Sundays, blending organized group workouts with passionate support for hometown teams.
  arts: Sharon Johnson, a 20‑year‑old choir member, finds joy in harmonizing classic gospel hits by Kirk Franklin and contemporary soul ballads by Alicia Keys, while unwinding with romance novels from authors
    like Nicholas Sparks and streaming feel‑good comedies starring Lupita Nyong’o, letting music and literature shape her vibrant social life.
  travel: Sharon Johnson, a 20‑year‑old nurse who budgets her travel carefully, prefers short, affordable weekend getaways with friends—such as a day trip to historic Washington, D.C., a music‑filled weekend
    in New Orleans, or a relaxing beach stay in the Dominican Republic—planning each itinerary around group activities and student discounts.
  culinary: Sharon Johnson, a 20‑year‑old home cook, loves preparing soulful dishes such as slow‑cooked collard greens seasoned with smoked turkey, crispy fried chicken with a secret blend of paprika and
    cayenne, and creamy sweet‑potato pie, while also experimenting with fresh herbs like thyme and rosemary to add a modern twist to family gatherings.
  core: Sharon Johnson, a 20‑year‑old organized nurse, blends routine‑driven professionalism with a love for choir, Zumba, and soul‑food cooking, yet often loses track of time while scrapbooking and can’t
    resist a late‑night TV binge after a long shift.
background:
  cultural: Sharon is a Black woman raised in Philadelphia’s vibrant African‑American community. Her upbringing was steeped in church traditions, soul food, and a strong sense of neighborhood solidarity.
    Family stories about perseverance and collective support shaped her values of reliability, kindness, and community service. She stays connected to her cultural roots through gospel music, celebrations
    of Juneteenth, and participation in local initiatives that promote health equity for Black residents.
attributes:
  skills: '["Patient assessment", "IV therapy", "Medication administration", "Wound care", "Vital signs monitoring", "Electronic health record documentation", "Care coordination", "Patient education", "Team
    collaboration", "Shift scheduling", "Infection control protocols"]'
  hobbies: '["Singing in church choir", "Participating in community dance classes", "Cooking soul‑food meals for family gatherings", "Volunteering at local health fairs", "Attending Philadelphia 76ers games",
    "Reading contemporary romance novels", "Journaling and scrapbook making", "Zumba fitness classes"]'
  career_goals: Sharon aims to build on her current RN role by earning a Bachelor of Science in Nursing within the next two years and obtaining a Certified Medical‑Surgical Nurse credential. Her long‑term
    ambition is to become a charge nurse and eventually a nurse manager on a medical‑surgical floor, where she can apply her love of routine and systematic processes to improve unit efficiency. She also
    hopes to mentor newer nurses and lead community health outreach programs that address health disparities in Philadelphia’s Black neighborhoods.
