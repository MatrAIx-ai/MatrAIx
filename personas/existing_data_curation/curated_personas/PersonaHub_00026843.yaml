persona_description: A homeowner who is responsible for the installation and maintenance of a swimming pool in their residence. They are aware of the electrical requirements for swimming pools and are seeking
  guidance on the proper installation and compliance with the National Electrical Code (NEC). They are looking for information on the minimum number of receptacles required in a bedroom, the measurement
  for wall space between receptacles, the size of the equipment-grounding conductor, and the installation of emergency standby systems. They are also interested in understanding the difference between parallel
  and non-parallel installations of conductors and the requirements for emergency standby systems in healthcare facilities.
