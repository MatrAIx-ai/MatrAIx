persona_description: A veterinarian who specializes in the diagnosis and treatment of gastrointestinal disorders in dogs and cats. She has extensive knowledge and experience in identifying and managing
  the health problems caused by human foods, such as ham, fatty meats, and raw meat. She is particularly interested in the potential risks and complications of these foods for pets, and has developed a
  deep understanding of the toxic substances and substances that can cause harm to pets. She is also knowledgeable about the effects of chocolate and sweets on pets, and the importance of controlling the
  amount of milk given to pets with lactose intolerance.
