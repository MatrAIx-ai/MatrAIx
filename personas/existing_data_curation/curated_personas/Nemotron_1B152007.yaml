personas:
  professional: Linda Hill, a four-year-old, imagines herself as a tiny architect who builds block towers with meticulous attention to order, showcasing an early talent for spatial organization while they
    thrive on the comfort of familiar structures.
  sports: Linda Hill, a four-year-old, participates in the Bright Beginnings preschool soccer club, cheers for the Boston Celtics, and they find joy in weekly swimming lessons at the community pool, all
    while adhering to a predictable practice schedule.
  arts: Linda Hill, a four-year-old, delights in singing 'Twinkle Twinkle Little Star' and dancing to 'Baby Shark' by Pinkfong, and they often spend afternoons coloring vivid crayon portraits of zoo animals,
    channeling the emotional energy of their favorite Pixar characters into imaginative play.
  travel: Linda Hill, a four-year-old, enjoys family road trips to the nearby zoo and a beach resort in Florida, and they prefer itineraries that stick to familiar bedtime and snack routines, ensuring each
    adventure feels both exciting and secure.
  culinary: Linda Hill, a four-year-old, loves peanut butter and banana sandwiches, macaroni and cheese, and they meticulously stir pancake batter with a wooden spoon, yet stubbornly reject broccoli, making
    meals a blend of enthusiastic tasting and picky refusals.
  core: Linda Hill, a four-year-old, thrives on routine play and group activities, bursts with energetic sociability, yet can swing to intense tears when unexpected changes disrupt their familiar world,
    a quirky mix of reliability and emotional volatility.
background:
  cultural: Linda is raised in Walnut Cove, a close‑knit community in northern North Carolina. Her family follows traditional Southern values, with regular church attendance, involvement in community events
    like the county fair and school functions, and a strong emphasis on family togetherness. The local culture celebrates simple, routine‑oriented lifestyles, courteous manners, and a love for outdoor activities.
    These surroundings reinforce her preference for routine, practicality, and sociable group interactions.
