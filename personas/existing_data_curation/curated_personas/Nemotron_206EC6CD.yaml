  hobbies: '[''Woodworking'', ''Gardening'', ''Mexican cooking'', ''Reading historical biographies'', ''Listening to mariachi and ranchera music'', ''Watching soccer'', ''Fishing'']'
  career_goals: Julio aims to stay actively engaged in his community by mentoring younger neighbors in practical skills, mastering advanced woodworking techniques, and integrating smart‑home technology
    into his home repairs. He also wishes to preserve his Mexican culinary heritage by teaching family members and possibly publishing a small recipe collection, while volunteering for neighborhood improvement
    projects and documenting his life stories for future generations.
