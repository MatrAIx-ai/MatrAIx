    design'', ''Creative writing and journaling'']'
  career_goals: Devon aspires to transform her hands‑on housekeeping experience into a boutique service that marries sustainability with aesthetic comfort. She plans to launch an eco‑conscious cleaning
    and home‑organizing business that offers personalized design consultations, upcycled décor solutions, and training workshops focused on compassionate caregiving and environmentally safe practices. In
    the longer term, Devon hopes to develop a certification program for "Heart‑Centered Home Care" that equips other cleaners with skills in empathy, client well‑being, and sustainable methods. She also
    envisions taking evening courses toward a bachelor's degree in Environmental Studies to deepen her knowledge of green living, which will further differentiate her venture in the rural Wisconsin market.
