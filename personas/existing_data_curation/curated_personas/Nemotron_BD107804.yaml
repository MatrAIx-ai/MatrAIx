personas:
  professional: A boutique cleaning entrepreneur named Devon Morin leverages their 15 years of eco‑friendly housekeeping expertise, deep stain chemistry knowledge, and compassionate client communication
    to offer personalized home‑organizing consultations, upcycled décor solutions, and design‑focused cleaning services that blend sustainability with aesthetic comfort.
  sports: Devon Morin stays active by trail‑running on local nature paths in spring, cross‑country skiing on Wisconsin’s rolling hills in winter, participates in a community hiking club, and cheers for
    the Green Bay Packers and Milwaukee Bucks while occasionally joining a casual yoga class at the Boscobel community center.
  arts: Devon Morin expresses their creativity through fluid watercolor abstracts inspired by prairie seasons, curates mixed‑media collages while listening to Sufjan Stevens and the ambient works of Brian
    Eno, draws artistic inspiration from Gerhard Richter and local folk artist Lilli Anderson, and regularly attends regional craft fairs and the annual Wisconsin Shakespeare Festival.
  travel: Devon Morin prefers spontaneous, low‑impact road trips that explore the Driftless Region’s limestone bluffs, has already visited the culinary scene of Portland and the cultural museums of Chicago,
    dreams of soaking in Iceland’s geothermal lagoons and seeing New Zealand’s fjords, and plans each journey around eco‑friendly lodging and train travel when possible.
  culinary: Devon Morin, a confident home cook, delights in farm‑to‑table dishes like roasted root‑vegetable medley with rosemary and thyme, creates seasonal vegetable stews using heirloom tomatoes, kale,
    and beet greens, brews their own kombucha with ginger and hibiscus, and frequently experiments with upcycled kitchen tools to reduce waste.
  core: Devon Morin is a 39‑year‑old eco‑savvy cleaning visionary who fuses artistic spontaneity with compassionate service, indulges in vintage furniture upcycling, occasionally lets paperwork pile up,
    and thrives on balancing community involvement with solitary creative retreats.
background:
  cultural: Devon grew up in a small Midwestern town in Wisconsin, rooted in a white, largely German‑Scandinavian heritage common to the region. Her family’s traditions emphasize hard work, community cooperation,
    and modest celebration of seasonal festivals such as harvest fairs and town potlucks. The Lutheran and Protestant cultural milieu fostered values of service, humility, and mutual support, which echo
    in Devon’s compassionate and cooperative personality. Rural life cultivated a close relationship with the land, teaching her respect for natural cycles and an appreciation for self‑sufficiency. While
    she embraces these Midwestern values, Devon also seeks novelty and artistic expression, blending the region’s grounded practicality with a vivid, imaginative inner world.
