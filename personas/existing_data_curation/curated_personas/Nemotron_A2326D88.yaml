  career_goals: Glorita dreams of growing up to help others and explore new frontiers. She often talks about becoming a teacher who can organize learning adventures for her classmates, or an astronaut who
    can discover the unknown. Her competitive edge fuels a desire to be a leader in her community, perhaps as a future firefighter or community organizer, where she can blend her practical planning with
    her love for teamwork.
