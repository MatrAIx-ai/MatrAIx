personas:
  professional: Glorita Mcgowens, a four‑year‑old classroom helper at preschool, they organize block play sessions, lead peers in building challenges, balance a curiosity for new shapes with a reliable,
    methodical routine, and often insist on being the first to finish a task.
  sports: Glorita Mcgowens, an energetic four‑year‑old who loves playing in the 'Sounders Tiny Tots' preschool soccer club, they proudly wear a Seattle Seahawks jersey during games, attend weekend swimming
    lessons at the local community pool, and approach each match with a competitive spirit, always aiming to score the winning goal.
  arts: Glorita Mcgowens, an imaginative four‑year‑old who delights in drawing bright dinosaurs, singing along to Raffi’s ‘Baby Beluga,’ reenacting scenes from Disney’s Frozen, and eagerly participates
    in their preschool’s weekly art circle, they proudly display their finger‑painted masterpieces.
  travel: Glorita Mcgowens, a curious four‑year‑old who has visited Disney World in Orlando, explored the Grand Canyon on a family road trip, and dreams of building a sandcastle on a beach in Cancun, they
    enjoy planning treasure‑hunt style itineraries with their parents while insisting on bringing their favorite stuffed bunny for comfort.
  culinary: Glorita Mcgowens, a four‑year‑old who prefers creamy macaroni and cheese with extra cheddar, peanut butter and jelly sandwiches, and bite‑size carrot sticks, they love stirring batter for banana
    muffins alongside their mom, and often add a sprinkle of rainbow sprinkles as their personal ‘magic’ touch, though they sometimes spill milk on the floor.
  core: Glorita Mcgowens, a four‑year‑old whirlwind of curiosity, organized play, competitive sticker collecting, and occasional snack‑spilling mishaps, they navigate preschool life with a skeptical eye
    toward new friends and an unwavering drive to lead every game.
background:
  cultural: Glorita is raised in an African-American family within the close-knit military community of Fort Cavazos, Texas. Her parents’ service background instills discipline, respect for routine, and
    a sense of duty, while her cultural heritage brings a rich tradition of soulful music, storytelling, and community gatherings at church and local celebrations. Growing up in the Southern climate, she
    also embraces regional customs such as barbecue picnics and holiday parades, blending her cultural roots with the diverse influences of a base environment.
