  career_goals: Vivian aims to mentor the next generation of analysts within her organization, passing on her pragmatic knowledge and collaborative mindset. She hopes to lead community‑focused improvement
    projects that streamline local government services in Bartow County, leveraging her analytical skills for public benefit. While maintaining a flexible schedule that allows for personal pursuits, she
    is also interested in learning new visualization tools such as Tableau to enhance her presentations. Ultimately, she wishes to leave a legacy of improved processes, stronger team cohesion, and a modest
    portfolio of community art initiatives she helped support.
