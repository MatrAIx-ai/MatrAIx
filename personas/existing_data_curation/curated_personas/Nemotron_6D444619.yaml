  career_goals: Although only three years old, Mackenzie often talks about wanting to be a teacher who helps her friends learn, a veterinarian who cares for animals, and an artist who makes beautiful pictures.
    She is drawn to professions that involve helping others and expressing creativity, and she looks forward to exploring these interests as she grows.
