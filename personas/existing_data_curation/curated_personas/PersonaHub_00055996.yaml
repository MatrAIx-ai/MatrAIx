persona_description: A chemist who specializes in the study of crystallography, particularly the techniques and methods used to measure the anisotropic optical response of surfaces, interfaces, and doping-induced
  internal electric fields. Their expertise lies in using Reflectance Anisotropy Spectroscopy (RAS) to monitor the properties of surfaces, interfaces, and doping-induced surface electric fields in cubic
  crystals. They are skilled in applying RAS in LayTec's unique in-situ metrology system, EpiRAS, to provide information about layer thickness, growth rate, bulk composition, surface stoichiometry, and
  doping level during epitaxial growth.
