persona_description: A member of the Papunya Tula Artists Cooperative who has been involved in the movement since its inception, known for her unique style and use of thick lines in her paintings. She has
  also been a prominent figure in the art community, with her works selected for multiple NATSIAA exhibitions and acquired by major institutions. Her works often depict rockhole sites and indigenous stories,
  and she has been described as more spontaneous than her fellow artists. She was born around 1922 or 1932 and comes from the area of Karrkurritinytja, which straddles the border between Western Australia
  and the Northern Territory, about 500 kilometres west of Alice Springs.
