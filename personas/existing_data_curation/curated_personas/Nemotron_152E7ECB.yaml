personas:
  professional: Collington Wiggins, a 27-year-old psychiatric aide at a community mental‑health center, merges a keen eye for detail with an outgoing, assertive bedside manner, using their organized approach
    to schedule therapeutic art sessions while deftly de‑escalating crises and documenting care in electronic health records.
  sports: Collington Wiggins, a 27-year-old basketball enthusiast, plays on the Kings Mountain community center league, follows the Charlotte Hornets and Carolina Panthers religiously, and spikes up his
    fitness routine with weekend hikes on the Blue Ridge foothills, where he tracks mileage using a Strava app and competes in local trail‑run meet‑ups.
  arts: Collington Wiggins, a 27-year-old sketch‑loving urban photographer, spends evenings flipping through the works of Edward Hopper, Basquiat, and listening to Miles Davis while attending gallery openings
    at the Hickory Art Museum and catching live theater productions of August Wilson plays, letting those influences bleed into his own charcoal streetscapes.
  travel: Collington Wiggins, a 27-year-old weekend wanderer, meticulously plans road trips to Asheville’s River Arts District and the historic streets of Charleston, dreams of a spring pilgrimage to Edinburgh’s
    International Festival, and balances travel with a modest budget that favors Airbnb stays over luxury hotels.
  culinary: Collington Wiggins, a 27-year-old home‑cooking enthusiast, whips up Southern‑flavored dishes like shrimp‑and‑grits with a pinch of smoked paprika, collard greens simmered with ham hocks, and
    peach cobbler, while experimenting with fresh herbs from his balcony garden, often using a cast‑iron skillet as his kitchen centerpiece.
  core: Collington Wiggins, a 27‑year‑old psychiatric aide, blends meticulous organization with a burst of creative energy, channeling jazz‑filled basketball nights and sketch‑filled hikes into a compassionate,
    art‑infused approach to mental‑health care.
background:
  cultural: Collington is a Black man raised in the close‑knit African‑American community of Kings Mountain, North Carolina. His family’s roots trace back to the Great Migration and the Southern sharecropping
    tradition, embedding a deep respect for perseverance and community solidarity. He grew up with the rhythms of gospel music in his local church, Sunday pot‑luck gatherings, and annual celebrations like
    Juneteenth that honor Black heritage. The cultural emphasis on storytelling, oral history, and culinary traditions – such as collard greens, smoked pork, and sweet potato pie – shaped his appreciation
    for art and shared experiences. Living in a predominantly rural area, Collington has also witnessed the challenges of limited mental‑health resources, fueling his commitment to serve his community while
    honoring his cultural identity.
attributes:
  skills: '[''Patient care and assistance'', ''Vital signs monitoring'', ''Medication administration support'', ''Crisis de‑escalation'', ''Behavioral observation'', ''Safety and security protocol adherence'',
    ''Electronic health records documentation'', ''Inventory and supply management'', ''Team communication and coordination'', ''Facilitation of therapeutic art activities'']'
  hobbies: '[''Sketching'', ''Photography'', ''Playing basketball'', ''Listening to jazz, hip‑hop, and soul music'', ''Visiting art galleries and museums'', ''Attending live theater and community performances'',
    ''Hiking regional trails'', ''Cooking Southern and soul food'', ''Reading psychology, science‑fiction, and personal development books'', ''Volunteering in youth mentorship and church outreach programs'']'
  career_goals: Collington aims to build on his high‑school foundation by pursuing an associate degree in nursing or psychiatric health at a community college within two years. He plans to obtain certification
    as a Psychiatric Technician and eventually become a Licensed Practical Nurse, with a long‑term goal of earning a Bachelor of Science in Nursing to specialize as a psychiatric RN. He also hopes to formalize
    his interest in art therapy by completing a certification in expressive arts therapy, enabling him to design and lead structured art‑based group sessions. In the future, Collington envisions a leadership
    role – such as unit supervisor or community mental‑health program coordinator – where he can advocate for expanded services in rural North Carolina and mentor new staff.
