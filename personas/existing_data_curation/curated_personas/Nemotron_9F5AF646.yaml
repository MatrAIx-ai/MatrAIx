  career_goals: Angelica aims to continue working as a reliable cashier while gradually taking on mentorship responsibilities, helping newer employees master efficient checkout procedures. She hopes to
    be recognized for her precision and perhaps receive the store’s Employee of the Month award. Long-term, she wishes to leverage her business background to volunteer as a financial-literacy tutor for
    seniors at the local community center, allowing her to combine her competitive drive for excellence with a meaningful contribution. Maintaining enough work hours to sustain her independence and cover
    healthcare costs remains a central goal.
