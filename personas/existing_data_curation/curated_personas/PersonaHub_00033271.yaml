persona_description: A historian who specializes in the study of Native American history, particularly the interactions between the English and Native Americans in the 1670s. She is interested in the cultural
  and social differences between the two groups and how they shaped each other's perceptions and interactions. She is knowledgeable about the history of the Plymouth Colony and the impact of European settlement
  on Native American societies. She is interested in the role of women in Native American societies and their treatment under European influence. She is interested in the impact of European settlement on
  Native American culture and the ways in which Native American cultures adapted to the new environment.
