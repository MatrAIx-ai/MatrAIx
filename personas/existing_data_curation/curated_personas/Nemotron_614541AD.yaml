personas:
  professional: Devin Carroll, a budding aerospace hobbyist, builds model rockets and LEGO machines with meticulous step‑by‑step precision, yet often improvises new designs on the fly, reflecting a blend
    of practical routine and spontaneous creativity.
  sports: Devin Carroll enjoys quiet afternoons fishing on the local river as a solo sport, follows the Pittsburgh Steelers for football excitement, and plays in a community youth basketball league during
    winter, preferring low‑key participation over team‑centric competition.
  arts: Devin Carroll immerses in creative worlds by reading Appalachian folklore, admiring the sculptural LEGO works of Nathan Sawaya, and listening to video game soundtracks by Koji Kondo, letting these
    artistic influences shape their hobby projects and storytelling notes.
  travel: Devin Carroll dreams of touring the Kennedy Space Center in Florida to see rockets up close, has camped in Shenandoah National Park with a scouting group, and prefers meticulously planned day
    trips to nearby nature sites over spontaneous overseas adventures.
  culinary: Devin Carroll favors simple, portable foods like cheeseburger sliders, trail mix with dried apricots, and homemade pizza slices, can reliably microwave popcorn for gaming marathons, yet often
    forgets to eat a balanced lunch before school, reflecting a convenient yet uneven diet.
  core: Devin Carroll is a quiet, competitive ten‑year‑old who balances methodical hobby building with spontaneous gaming wins, prefers solitary pursuits, and occasionally lets impulsive spending overrun
    their otherwise practical routine.
background:
  cultural: Devin grows up in Elkins, West Virginia, a town steeped in Appalachian heritage. His family reflects the region's traditional values of self‑reliance, practicality, and modesty. Community life
    often revolves around outdoor pursuits like hunting, fishing, and local fairs, and the sound of bluegrass music is common at family gatherings. Though he prefers solitude, Devin is aware of the close‑knit
    community expectations and the importance of family reputation. The predominant cultural influences include a Protestant work ethic, seasonal celebrations such as the Elk River Festival, and a respect
    for the natural landscape that shapes daily life in the mountains.
attributes:
  skills: '[''Woodworking'', ''Fishing and small‑game hunting'', ''Basic computer troubleshooting'', ''Competitive video gaming'', ''Outdoor navigation and first‑aid basics'']'
  hobbies: '[''LEGO building'', ''Model rocket construction'', ''Fishing'', ''Competitive video gaming'', ''Reading nature and folklore magazines'', ''Field note journaling'']'
  career_goals: While still in elementary school, Devin dreams of turning his practical talents into a lifelong vocation. He envisions becoming an automotive mechanic or a skilled tradesperson such as a
    carpenter, allowing him to work independently and solve tangible problems. The idea of a wildlife conservation technician also appeals to his love of the outdoors, but he prefers roles that let him
    work alone or in small, focused teams rather than large bureaucratic settings. He hopes to earn a certification in automotive repair and eventually own a small workshop where he can mentor younger kids
    in his community.
