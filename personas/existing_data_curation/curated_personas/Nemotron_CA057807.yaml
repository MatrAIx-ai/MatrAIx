personas:
  professional: Julia Wilson, a budding wildlife caretaker, channels their love of pine‑forested wetlands and meticulous organization into a daily habit of sorting plastic animal figurines by species, they
    demonstrate early observational skills, methodical planning, and a competitive drive to maintain perfect order, which foreshadows a future career caring for real wildlife.
  sports: Julia Wilson, a pint‑sized soccer enthusiast, sharpens their dribbling skills at the Hattiesburg Youth Soccer Club on Saturday mornings, they watch the Biloxi Shuckers’ baseball broadcasts for
    inspiration, and they prefer solitary ball‑control drills over chaotic scrimmages, reflecting their love for structured, quiet competition.
  arts: Julia Wilson, an aspiring illustrator, spends afternoons drawing pine trees and woodland creatures while humming Dolly Parton’s Coat of Many Colors and singing the Sesame Street alphabet song, they
    use art as a soothing outlet for their intense emotions and a competitive streak to perfect every line.
  travel: Julia Wilson, a meticulous little explorer, delights in family trips to the nearby Gulf Coast’s sandy beaches and weekend picnics in DeSoto National Forest, they dream of a carefully planned road
    adventure to Disney World in Florida, and they prefer itineraries that repeat familiar routes over spontaneous detours, aligning with their need for predictability.
  culinary: Julia Wilson, a junior kitchen helper, loves kneading dough for flaky biscuits, stirring velvety sausage gravy, tasting crispy fried catfish with a squeeze of lemon, and they demand a slice
    of warm peach cobbler after dinner while sipping lightly sweetened sweet tea, showing a strong attachment to familiar Southern flavors and a shy yet enthusiastic approach to cooking.
  core: Julia Wilson, a four‑year‑old who thrives on tidy routines, secluded sketching sessions, and fiercely defended toy collections, they can swing from orderly play to sudden tears when unexpected changes
    disrupt their predictable world.
background:
  cultural: Julia was born and raised in Hattiesburg, Mississippi, within a white Southern family that values close‑knit family ties, church participation, and Southern hospitality. Her upbringing includes
    frequent visits to the local library, attendance at community events such as county fairs, and exposure to regional music and cuisine. The surrounding pine forests and nearby wetlands give her an early
    appreciation for nature, which complements her interest in animals and the outdoors.
