  career_goals: Approaching the later stage of his career, Richard aims to maintain a steady clinical schedule that respects his need for routine while gradually transitioning into a mentorship role for
    the next generation of surgeons. He plans to establish a small, privately owned practice in Ulster Park that emphasizes consistent, high‑quality care for the local community. He also hopes to author
    a chapter on best practices in minimally invasive abdominal surgery for a surgical textbook and to lead a hospital‑wide quality‑improvement project focused on reducing post‑operative complications.
    Ultimately, he seeks to leave a legacy of reliable, patient‑centered surgical care while preserving his own work‑life balance and reducing occupational stress.
