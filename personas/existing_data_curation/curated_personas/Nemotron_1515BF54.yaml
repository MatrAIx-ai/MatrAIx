  career_goals: Carlos dreams of becoming a comic book artist who can bring his vivid imagination to life, or a wildlife explorer who makes videos about animals and nature. He is fascinated by space and
    sometimes pictures himself as an astronaut discovering new worlds. He also talks about wanting to be a teacher who shares stories and art with other children, reflecting his compassionate side and desire
    to help others. He prefers future roles that offer creativity, flexibility, and the chance to explore new ideas.
