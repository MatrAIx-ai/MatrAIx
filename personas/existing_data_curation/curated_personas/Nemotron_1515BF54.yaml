personas:
  professional: A budding illustrator and LEGO architect, Carlos Morales combines vibrant drawings and whimsical brick constructions, channeling a curious spirit and a relaxed attitude toward deadlines
    that often results in spontaneous, delightfully messy masterpieces.
  sports: Carlos Morales darts onto the neighborhood park for after‑school soccer with the Eagles U‑8 squad, idolizes the city’s professional striker from Metro City FC, and balances energetic drills with
    sudden daydreams that sometimes cause them to drift away from the ball, yet they always return with a smile, eager for the next play.
  arts: Carlos Morales dives into a world of colors, sketching with markers, painting sunset scenes, and binge‑watching Studio Ghibli’s My Neighbor Totoro and Disney’s Moana, letting the whimsical visuals
    fuel their LEGO city designs, though they often leave a trail of scattered crayons and paint tubes, a quirky testament to their boundless creativity.
  travel: Carlos Morales spends weekends exploring the downtown natural history museum and the local art fair, dreams of seeing the vast skies of the Grand Canyon and the space exhibits at the Kennedy Space
    Center, and while they meticulously plan their imaginary routes on paper, they sometimes rush ahead in real queues, earning gentle reminders from parents to be patient.
  culinary: Carlos Morales loves helping slice fresh cilantro, mash ripe avocado, and roll soft corn tortillas for taco night, eagerly sprinkling shredded cheese and a squeeze of lime over the fillings,
    and despite their limited cooking skills, they often end up with a gooey mess on the countertop after over‑enthusiastic salsa mixing, a lively reminder of their enthusiastic yet clumsy kitchen adventures.
  core: Carlos Morales is a curious, art‑obsessed 7‑year‑old who builds LEGO kingdoms, worries about school projects, and transforms every taco night into a vibrant creative canvas.
background:
  cultural: Carlos grows up in a Mexican immigrant family in Los Angeles, immersed in a bilingual home where Spanish is spoken with his parents and grandparents, while English is used at school and with
    peers. His family celebrates traditional Mexican holidays such as Día de los Muertos, creating altars and making pan de muerto together, and they enjoy community events in East LA that feature mariachi
    bands and folkloric dance. The household’s love for Mexican cuisine—tacos, tamales, and salsas—shapes his palate and cultural identity. At the same time, living in the diverse city of Los Angeles exposes
    him to a mosaic of cultures, encouraging openness to new ideas and experiences while retaining strong ties to his Mexican heritage.
