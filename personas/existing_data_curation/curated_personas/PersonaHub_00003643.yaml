persona_description: A paleoecologist who specializes in the study of the end-Triassic mass extinction, particularly the role of atmospheric carbon injection in triggering the event. She is particularly
  interested in the potential feedback loops between rising global temperatures and the release of greenhouse gases into the atmosphere, and how this could lead to the triggering of another mass extinction
  event. Her research has been published in the prestigious journal Science.
