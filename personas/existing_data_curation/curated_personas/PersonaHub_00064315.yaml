persona_description: A research scientist at Oak Ridge National Laboratory with expertise in neutron scattering, supercomputing, and biophysics. They have demonstrated significant contributions to the understanding
  of organic solvents and water in the breakdown of plant biomass, and have developed novel methods for the production of renewable biofuels and bioproducts. They have also made important contributions
  to the field of wildfire risk prediction and the development of a method to predict seasonal fire risk in Africa. Additionally, they have worked on the development of a thin film, highly conductive solid-state
  electrolyte for lithium metal batteries, and have refined their design of a 3D-printed nuclear reactor core.
