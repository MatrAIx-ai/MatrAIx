personas:
  professional: Armand Vicente, a 29-year-old learning experience designer, merges a solid STEM foundation with a love for contemporary art to craft immersive VR-based training programs for technology and
    renewable-energy firms, leveraging Articulate Storyline, data analytics, and a flair for storytelling while mentoring peers and championing interdisciplinary curricula.
  sports: Armand Vicente avidly climbs at the Boulder Rock Club, hikes the Flatirons every weekend, runs with the Boulder Trail Runners, and cheers on the Colorado Rockies, Denver Broncos, and Colorado
    Avalanche while also joining local pick-up soccer matches.
  arts: Armand Vicente immerses in Boulder's contemporary art scene, frequenting galleries with Jeff Koons and local avant-garde installations, attending live sets by The National and Tame Impala at the
    Boulder Theater, and sharpening improvisational timing in weekly workshops with The Improv Brigade, while photographing urban murals for personal portfolios.
  travel: Armand Vicente prefers curated trips that blend cultural immersion and adventure, having explored the Renaissance art of Florence, the historic temples of Kyoto, and the street art of Oaxaca,
    and now plans a photography-focused hike in Patagonia, using points from a travel rewards credit card to keep costs low.
  culinary: Armand Vicente enjoys brewing craft beer at home with Cascade hops and Belgian yeast, pairing it with farm-to-table dishes like herb-crusted salmon, hand-rolled tacos al pastor, and a perfectly
    seasoned ramen broth, and occasionally whips up a hearty beet-root burger for friends.
  core: Armand Vicente is a curious, art-infused learning designer who balances data-driven rigor with spontaneous brewing, climbing, and improv, while keeping a disciplined budget but occasionally sacrificing
    sleep for marathon board-games.
background:
  cultural: Armand was born and raised in the Denver metropolitan area to parents of mixed Irish and Spanish ancestry. His upbringing combined a middle‑class emphasis on education with early exposure to
    community theater and local art events. Growing up amid the Rocky Mountains fostered a deep connection to outdoor recreation, while the progressive, tech‑oriented culture of Colorado encouraged curiosity,
    open‑mindedness, and collaborative values. This blend of European heritage, Colorado’s outdoor lifestyle, and a vibrant artistic community informs his inclusive worldview and his appreciation for both
    analytical rigor and creative exploration.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''E‑learning Development'', ''Learning Management Systems (LMS) Administration'', ''Data Analysis'', ''Project Management'', ''Public Speaking'',
