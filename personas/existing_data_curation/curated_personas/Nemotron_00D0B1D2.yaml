  hobbies: '[''Contemporary Art Galleries'', ''Live Music Concerts'', ''Hiking and Trail Exploration'', ''Rock Climbing'', ''Photography'', ''Home Brewing'', ''Board Games'', ''Improv Comedy Workshops'',
    ''Traveling'', ''Volunteer STEM Outreach'']'
  career_goals: Armand aims to advance to a senior learning and development leadership role within a forward‑thinking technology or renewable‑energy organization. He envisions guiding a company‑wide training
    strategy that blends scientific rigor with artistic creativity, leveraging immersive technologies like VR/AR to foster innovative thinking. Over the next five years, he plans to earn a master’s degree
    in Learning Experience Design, publish thought‑leadership articles on interdisciplinary training, and eventually launch his own consultancy that helps companies design culturally inclusive, experience‑driven
    development programs.
