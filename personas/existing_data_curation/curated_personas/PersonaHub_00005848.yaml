persona_description: A Louisiana rice entomologist who specializes in the study of European corn borers in rice, particularly in Morehouse Parish, Louisiana. He has extensive experience in identifying and
  managing the pest, and has conducted field demonstrations and experiments using various foliar insecticides. He is aware of the potential for the pest to spread to other rice-producing areas in the United
  States and recommends early planting to avoid increased populations of borers moving from maturing corn and sorghum fields in central and northern latitudes of the state.
