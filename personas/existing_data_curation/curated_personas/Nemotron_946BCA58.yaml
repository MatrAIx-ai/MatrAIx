  career_goals: He aims to transition into a senior director role overseeing large‑scale commercial and mixed‑use developments, with a focus on integrating sustainable building practices and culturally
    responsive design. Over the next five years, he plans to mentor emerging construction managers, expand his expertise in green certification (LEED), and eventually launch a consultancy that partners
    with community organizations to deliver affordable, culturally appropriate housing in the Los Angeles area.
