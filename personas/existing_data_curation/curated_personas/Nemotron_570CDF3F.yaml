    and patient counseling", "Team collaboration and conflict resolution", "Technology adoption (e.g., digital lens edging, virtual try‑on tools)"]'
  hobbies: '["Intramural basketball", "Volunteering at vision health fairs", "Visiting art museums and galleries", "Attending live music concerts", "Urban architecture photography", "Cooking and experimenting
    with culinary recipes", "Reading historical fiction", "Traveling to cultural heritage sites"]'
  career_goals: Zachary aspires to advance from dispensing optician to a supervisory role within a leading optical retailer, eventually earning a master optician certification and pursuing a Doctor of Optometry
    degree. He envisions opening a boutique optical studio in Chicago that emphasizes personalized service, sustainable lens options, and community outreach programs that provide free vision screenings
    for underserved neighborhoods. He also aims to contribute to industry standards by sharing best‑practice insights that bridge technical expertise with compassionate patient education.
