  hobbies: '[''Scale model steam engine building'', ''Model railroading'', ''Watercolor painting'', ''Industrial photography'', ''Northwoods hiking'', ''Fishing'', ''Reading historical biographies'', ''Technical
    journal reading'', ''CNC competition participation'', ''Attending small art gallery openings'']'
  career_goals: Approaching retirement, Osley aims to transition from full‑time shop floor work to a mentorship and consulting role, sharing his decades of machining knowledge with younger workers in his
    community. He plans to launch a small side venture creating custom metal art pieces that blend his technical skill with his appreciation for aesthetics. Additionally, he hopes to document traditional
    machining techniques in a handbook for the local technical college and to be recognized locally for his contributions to preserving craft heritage.
