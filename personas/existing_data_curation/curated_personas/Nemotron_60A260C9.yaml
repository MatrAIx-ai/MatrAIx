  hobbies: '[''Basketball (recreational league)'', ''Mechanical keyboard building/customization'', ''Listening to hip‑hop and R&B music'', ''Personal finance journaling'', ''Youth mentorship volunteering'']'
  career_goals: Elex aims to move beyond his cashier role into supervisory and managerial positions within retail. Within the next two years, he plans to become an assistant store manager by completing
    an associate degree in business administration at a local community college, while leveraging his strong organizational skills to lead shift scheduling and staff training. His longer‑term ambition is
    to oversee multiple store locations as a district manager, or to launch his own neighborhood convenience store that emphasizes reliable service and community involvement.
