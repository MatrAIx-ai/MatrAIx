personas:
  professional: Kolby Barrett is an aspiring junior ranger who uses their practical eye for detail to map short desert trails and their sociable energy to guide friends on weekend hikes, blending a love
    for structured check‑points with spontaneous detours through the pine‑capped canyons around Payson.
  sports: Kolby Barrett thrives on the after‑school soccer league with the Payson Junior SC, dons a bright red jersey reminiscent of the Arizona Cardinals, rides a mountain bike on the Tonto Trail, and
    cheers for the Arizona Diamondbacks while dreaming of joining the local hiking club for weekend trail races.
  arts: Kolby Barrett channels creative bursts into LEGO city builds, draws comic‑style heroes inspired by "Adventure Time" and "Gravity Falls", composes simple rhythm claps in music class to songs by The
    Wiggles and Pinkfong, and loses themselves in Minecraft adventures where they design pixelated desert forts.
  travel: Kolby Barrett loves family road trips to the Grand Canyon’s South Rim, often planning a spontaneous dip at the nearby lake after a ranger‑led hike, while keeping a passport‑ready wishlist that
    includes Disneyland, a summer stint in Sedona’s red‑rock trails, and a future camping excursion in Yellowstone’s geyser basin.
  culinary: Kolby Barrett favors kid‑friendly fare like cheese quesadillas, homemade mac & cheese, and trail‑mix snack packs, can assemble a simple taco with ground beef and salsa, and eagerly sips a pineapple‑mint
    smoothie after a bike ride, while occasionally insisting on adding extra hot sauce to every dish.
  core: Kolby Barrett is a pragmatic yet spontaneous seven‑year‑old who balances structured adventures in the desert with impulsive LEGO builds, a penchant for soccer, and a growing curiosity about money,
    health, and distant horizons.
background:
  cultural: Kolby grows up in a white, middle‑class family in Payson, a small town in Gila County, Arizona. The community’s outdoor‑oriented lifestyle, with a mix of ranching and tourism, influences his
    love of nature and activities like hiking and biking. Local traditions such as Fourth of July parades, county fairs, and school events shape his social experiences. His family values modest, structured
    routines (e.g., consistent bedtime, chore schedules) while also encouraging spontaneous family outings and creative play. The regional western American culture, with its emphasis on self‑reliance and
    community involvement, informs his developing identity.
