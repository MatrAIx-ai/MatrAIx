  career_goals: Kolby imagines future roles that combine teamwork, helping others, and creativity, such as becoming a firefighter who rescues people, an astronaut exploring space, a video‑game designer
    creating adventures, or a teacher who shares stories with children. He expresses a desire to be part of a community and to make a tangible impact while indulging his love of imagination.
