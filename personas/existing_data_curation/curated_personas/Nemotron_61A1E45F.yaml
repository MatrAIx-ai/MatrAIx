personas:
  professional: Juana Sotosoto, a 30‑year‑old waiter in bustling San Jose eateries, blends bilingual fluency, meticulous food‑safety awareness, and a natural calm in conflict resolution to deliver attentive
    service, while they channel curiosity and flexibility to thrive despite a habit of loosely organized schedules.
  sports: Juana Sotosoto, a 30‑year‑old outdoor enthusiast, spends weekends exploring the Redwood‑lined Los Trancos trail with the Bay Area Hiking Club, attends evening Vinyasa classes at Yoga Tree, and
    passionately follows the San Jose Sharks and Golden State Warriors, though they rarely join organized team sports due to a preference for low‑key, flexible exercise.
  arts: Juana Sotosoto, a 30‑year‑old culinary hobbyist, explores contemporary fiction by Sally Rooney and, on quiet evenings, curates playlists that weave together Los Tigres del Norte, Natalia Lafourcade,
    and indie pop icons like Phoebe Bridgers and Mitsui; they use music as a bridge between heritage and their Californian life.
  travel: Juana Sotosoto, a 30‑year‑old explorer, prefers short, spontaneous weekend getaways to nearby vineyards in Napa and cliff‑side hikes along the Pacific Coast Highway, and they dream of a culturally
    immersive trip to Oaxaca’s bustling markets and a serene retreat in Kyoto’s temples, balancing a modest travel budget with a love for both adventure and restful reflection.
  culinary: Juana Sotosoto, a 30‑year‑old culinary enthusiast, regularly prepares family‑style tamales, chiles en nogada, and fresh nopales salads using ripe heirloom tomatoes and corn from the local farmer’s
    market, they balance an intermediate cooking skill set with a growing passion for sustainable sourcing and occasional experimental twists like quinoa‑based mole.
  core: Juana Sotosoto, a 30‑year‑old hospitality professional, harnesses a blend of boundless curiosity and compassionate pragmatism to navigate high‑stress environments, yet their laid‑back approach often
    leads to missed appointments and impulse spending driven by anxiety, and they constantly remind themselves to stay organized.
background:
  cultural: Juana Marina is the daughter of Mexican immigrants who settled in the San Jose Bay Area. Raised in a bilingual household, she grew up celebrating Mexican holidays such as Día de los Muertos
    and Las Posadas while also participating in local community events like the annual Cinco de Mayo street festival. Her family's culinary traditions—home-cooked mole, tamales, and fresh salsa—have shaped
    her palate and inspired her interest in food culture. Though fully integrated into Californian life, she maintains strong ties to the Latino community through church gatherings, neighborhood potlucks,
    and a network of friends who share similar migratory experiences. This dual cultural identity informs her values of generosity, hospitality, and a commitment to fostering inclusive spaces.
attributes:
  skills: '["Customer service", "Bilingual Spanish-English communication", "Order taking and multitasking", "Food safety and sanitation", "Conflict resolution", "Team coordination", "Basic cash handling
    and tip reconciliation", "Menu knowledge (Mexican and Californian fusion)", "Adaptability in fast-paced environments", "Basic culinary techniques"]'
  hobbies: '["Cooking traditional Mexican recipes", "Exploring local farmers markets", "Urban hiking in the Bay Area", "Yoga and meditation", "Reading contemporary fiction", "Volunteering at a community
    shelter", "Listening to a blend of regional Mexican music and indie pop"]'
  career_goals: She aspires to move beyond a front-of-house role toward a supervisory or managerial position within the next three to five years, aiming to lead a team that values collaborative, inclusive
    service. Eventually she hopes to combine her practical knowledge of Mexican cuisine with her curiosity about sustainable food practices to open a small café that offers a modern twist on family recipes
    while providing a supportive workplace for immigrant staff. She also plans to complete an associate degree in hospitality management to strengthen her organizational skills and to attend workshops on
    stress-management to better handle the high-pressure environment.
