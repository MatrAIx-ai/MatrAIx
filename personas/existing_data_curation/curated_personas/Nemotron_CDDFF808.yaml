personas:
  professional: Yunet Hernandez, a two‑year‑old who is already showing a natural knack for sorting and building with interlocking blocks, displays early engineering curiosity balanced by a practical focus
    on finishing simple projects, hinting at a future path in design or architecture.
  sports: Yunet Hernandez, a two‑year‑old who loves toddling soccer sessions at the community field, passionately roots for the Chicago Cubs and the Chicago Bears, and bursts with boundless energy when
    chasing balls on the playground, while also enjoying occasional family outings to watch the Chicago White Sox play.
  arts: Yunet Hernandez, who spends hours dancing to Laurie Berkner’s upbeat children’s songs, sings along with the animated tunes of Disney’s Frozen, and proudly displays scribbles inspired by Eric Carle’s
    vivid illustrations, embodies a playful artistic spirit that colors their everyday play.
  travel: Yunet Hernandez, who has delighted in a family road trip to the Grand Canyon, a short flight to Toronto, and a magical weekend at Walt Disney World, prefers stroller‑friendly excursions with plenty
    of snack breaks, and dreams of seeing the Eiffel Tower in Paris someday.
  culinary: Yunet Hernandez, a budding foodie, adores creamy macaroni and cheese, loves the crunch of fresh carrot sticks dipped in hummus, and can be coaxed into trying bite‑sized sushi rolls, though they
    fiercely protest broccoli on their plate, revealing a selective yet adventurous palate.
  core: Yunet Hernandez blends curious experimentation with everyday practicality, turning simple play into mini‑projects, while their occasional tantrums over broccoli and love for coin‑collecting capture
    a charmingly idiosyncratic toddler personality.
background:
  cultural: Yunet grows up in a bilingual Hispanic household in Baldwin, NY, where Spanish and English are spoken daily. Her family celebrates traditional Latino holidays such as Día de los Muertos and
    Cinco de Mayo, enjoys cooking dishes like arroz con pollo and empanadas, and dances to salsa and merengue. The suburban setting provides a blend of American school life and strong community ties to
    Latino culture through local community centers and family gatherings.
