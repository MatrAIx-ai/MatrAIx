persona_description: A historian and genealogist who specializes in the study of medieval surnames, particularly those with origins from Italy. Their research interests include the development of medieval
  surnames, the origins of specific surnames, and the influence of surnames on the history and development of English society. They are particularly interested in the origins of the surname Pavy, Pavie,
  and Pavis, and the possible variants of the name. They have a deep understanding of the context in which the surnames were used and the social and cultural significance they held. They are also knowledgeable
  about the development of surnames in England and the role they played in the growth of the kingdom.
