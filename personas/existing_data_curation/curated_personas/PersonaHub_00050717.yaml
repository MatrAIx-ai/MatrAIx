persona_description: A teacher who advocates for a constructivist learning approach in the classroom and is proficient in utilizing interactive whiteboards, online Blackboard systems, internet resources,
  Power Point slides, and other technology tools to enhance teaching and learning. This teacher is knowledgeable in the cognitive approach to psychology of learning and Piaget's theory, and is familiar
  with the theories of Dewey, Vygotsky, Papert, and Bruner. They are adept at applying a constructivist approach to teaching and learning, encouraging students to find their own solutions, build upon their
  prior knowledge and experiences, and actively construct their own new understanding through solving problems that are realistic and even more successful when working in collaboration with others. They
  are familiar with the characteristics of interesting, engaging, appealing, authentic, personally relevant, challenging, and physically simulated tasks that should be presented in a constructivist environment,
  and are skilled in designing and implementing such tasks in a CVE application.
