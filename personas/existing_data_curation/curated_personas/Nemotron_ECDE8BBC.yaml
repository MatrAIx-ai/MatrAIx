  hobbies: '[''Gardening'', ''Hiking'', ''Community Center Volunteer'', ''Historical Society Board Member'', ''Architecture Tours'', ''Reading Non‑fiction'', ''Cooking Southern Cuisine'', ''Quilting'']'
  career_goals: Claudy aspires to become a senior partner at her firm, leading a regional practice that prioritizes environmentally responsible and culturally resonant architecture in Kentucky. She aims
    to champion community‑centered projects that preserve the historic character of Frankfort while introducing innovative green building solutions. Additionally, she hopes to establish a mentorship program
    for local aspiring architects, especially women returning to the profession, and to contribute scholarly articles to professional journals on the integration of traditional craftsmanship with modern
    sustainable practices.
