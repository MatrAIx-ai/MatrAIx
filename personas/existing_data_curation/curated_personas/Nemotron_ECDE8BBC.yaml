personas:
  professional: Claudy Parris is a veteran architect who blends sustainable design with historic preservation, leveraging Revit expertise and a methodical, community‑focused approach to spearheading Kentucky’s
    next generation of green, culturally resonant buildings, and they consistently translate complex concepts into clear project plans.
  sports: Claudy Parris is an enthusiastic member of the Woodford County Hiking Club, hits the trails each weekend, and follows the Kentucky Wildcats basketball season and Louisville Bats baseball games,
    combining regular low‑impact cardio with community‑spirit sports viewing as a social ritual, and they often organize group hikes after games.
  arts: Claudy Parris weaves their love of heritage into quilting, draws inspiration from folk musicians like Alison Krauss and bluegrass legends such as the Del McCoury Band, and finds solace in the paintings
    of Thomas Hart Benton, all of which shape their design aesthetic.
  travel: Claudy Parris plans trips like structured projects, favoring organized tours of Kentucky’s Bourbon Trail, weekend architecture excursions to Savannah and New York City, and a cherished annual
    pilgrimage to Dublin to explore Georgian‑era buildings, balancing cultural immersion with a disciplined budget, and they enjoy traveling with a small group of fellow design enthusiasts.
  culinary: Claudy Parris delights in cooking Southern comfort meals such as bourbon‑glazed ham, fried chicken with hot‑pepper gravy, collard greens seasoned with smoked turkey, and buttery cornbread, often
    harvesting fresh herbs from their garden to enhance flavor, and they balance cooking for friends with an occasional indulgence in a slice of pecan pie.
  core: Claudy Parris champions sustainable, historically rooted architecture with the same precision they apply to daily garden planning, habitually carries a pocket‑sized planner, and keeps a secret stash
    of bourbon‑scented candles for late‑night drafting sessions.
background:
  cultural: Claudy grew up in the heart of Kentucky, shaped by a blend of Southern hospitality, a strong sense of community, and an appreciation for the region's rich architectural heritage, from antebellum
    homes to bourbon distilleries. Her white Southern background includes participation in local traditions such as horse‑farm culture and seasonal festivals, while her upbringing emphasized values of reliability,
    modesty, and service. These cultural influences inform her design ethos, which balances respect for historic context with forward‑looking sustainability.
