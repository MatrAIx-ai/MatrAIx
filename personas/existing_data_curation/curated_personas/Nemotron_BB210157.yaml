  career_goals: Nicholas aims to climb the corporate ladder by moving into senior management within the next five years, targeting roles such as Director of Operations or Regional Manager. He plans to earn
    a Project Management Professional (PMP) certification and eventually pursue an MBA to broaden his strategic insight. His long‑term ambition is to secure a VP‑level position where he can shape company‑wide
    policies and drive large‑scale efficiency projects, while also establishing a stable financial foundation for his family. He is motivated by measurable achievements and seeks recognition for driving
    performance improvements.
