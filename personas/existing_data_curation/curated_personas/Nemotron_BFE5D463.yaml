personas:
  professional: Courtney Mclymont is a network systems specialist who leverages Cisco and cloud networking expertise, meticulous documentation, and a calm, methodical approach to keep enterprise LAN/WAN
    infrastructures running reliably while championing inclusive mentorship and collaborative project leadership, and they consistently mentor junior staff with clear, structured training sessions.
  sports: Courtney Mclymont hikes the Blue Ridge Parkway trails with the Charlottesville Hiking Club each weekend, cheers on the UVA Cavaliers during football season, stays fit through weekly Latin and
    African dance sessions with a neighborhood troupe, and they often organize group runs for charity events.
  arts: Courtney Mclymont immerses themselves in the arts by attending live performances of Wynton Marsalis at the Jefferson Theater, reading Toni Morrison and James Baldwin novels in a book club, expressing
    rhythm through Latin and African dance routines that echo the cadences of Ella Fitzgerald’s recordings, and they regularly host post‑concert discussions to connect music with community storytelling.
  travel: Courtney Mclymont plans trips with a mix of detailed itineraries and spontaneous detours, having already trekked the Appalachian Trail’s Shenandoah segment, savored the street food of New Orleans,
    explored the beaches of Barbados, now eyeing a cultural immersion tour of Lisbon’s historic districts, and they prefer to travel with a small group of close friends to share experiences.
  culinary: Courtney Mclymont experiments in the kitchen with soulful Southern fare like smoked collard greens and gumbo, and Caribbean staples such as jerk chicken and callaloo, balancing the heat of scotch
    bonnet pepper with the comforting texture of okra while occasional treating friends to a potluck of biscuits and mango salsa, and they enjoy sourcing fresh produce at local farmer’s markets every Saturday.
  core: Courtney Mclymont blends a methodical network‑engineering mindset with a vibrant community spirit, juggling spreadsheets, dance rehearsals, and weekend hikes, yet they habitually hit the snooze
    button on Saturday mornings and occasionally overspend on artisanal coffee subscriptions.
background:
  cultural: Courtney’s cultural identity as a Black woman in Virginia informs her values of community, resilience, and collective uplift. Raised in a close‑knit African‑American family that emphasized education
    and service, she celebrates traditions such as Juneteenth, Kwanzaa, and gospel music while remaining active in local church outreach. Her experiences navigating the tech field as a minority have deepened
    her commitment to mentorship and creating inclusive spaces. The rich history of African‑American contributions in Charlottesville and Albemarle County inspires her dedication to preserving cultural
    heritage and promoting equitable access to technology.
attributes:
  skills: '[''Network design and architecture'', ''Cisco routing and switching (CCNP)'', ''Firewall configuration and management (Palo Alto, Fortinet)'', ''VPN and remote access solutions'', ''Network monitoring
    and performance optimization (SolarWinds, Nagios)'', ''Virtualization (VMware, Hyper-V)'', ''Cloud networking (AWS VPC, Azure)'', ''Scripting and automation (Python, PowerShell)'', ''Technical documentation'',
    ''User support and training'', ''IT project management'', ''Mentorship and community outreach'']'
  hobbies: '[''Mentoring Girls Who Code'', ''Latin and African dance classes'', ''Hiking in Shenandoah National Park'', ''Yoga and mindfulness practice'', ''Cooking Southern and Caribbean cuisine'', ''Jazz
    and blues concerts'', ''Book club focusing on African American literature'', ''Women in IT meetups'', ''Civic engagement (voter registration drives)'', ''Community gardening'']'
  career_goals: Courtney aims to advance to a senior network architect or IT manager role within a forward‑thinking organization, where she can shape large‑scale infrastructure strategy and champion diversity
    and inclusion in technology. She plans to earn the CCIE and AWS Solutions Architect Professional certifications, lead enterprise‑wide digital transformation initiatives, and launch a community program
    that provides free networking workshops for underrepresented youth in Charlottesville. Ultimately, she envisions becoming a CIO or chief technology strategist for a nonprofit focused on bridging the
    digital divide.
