  career_goals: Julissa aims to advance to a senior engineering technologist role where she can lead large‑scale sustainability initiatives, such as flood‑mitigation and renewable energy projects that benefit
    the Yazoo River basin. She plans to earn a Six Sigma Black Belt and pursue a master's degree in engineering management to strengthen her leadership capabilities. Passionate about representation, she
    aspires to create a mentorship program for Black women and other underrepresented groups in STEM within Mississippi. Ultimately, she envisions a future where she balances technical leadership with community‑focused
    design, integrating artistic elements into engineering solutions that enhance both functionality and cultural identity.
