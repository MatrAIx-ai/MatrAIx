personas:
  professional: Julissa Branch, they merge technical rigor with artistic curiosity, using PLC programming, CAD modeling, and Python data analysis to lead process optimization projects that embed aesthetic
    design into community infrastructure while mentoring junior engineers toward inclusive collaboration.
  sports: Julissa Branch, they stay active by hiking with the River Bend Hiking Club, playing weekend softball for the Delta Women's League, and cheering on the Memphis Grizzlies and Mississippi State Bulldogs,
    balancing structured workouts with spontaneous nature walks.
  arts: Julissa Branch, they channel a love for the blues of B.B. King, gospel of Mahalia Jackson, and contemporary jazz of Kamasi Washington into landscape paintings inspired by Winslow Homer, while volunteering
    at the Delta Playhouse where they help stage community productions that explore diverse narratives.
  travel: Julissa Branch, they plan trips methodically using detailed spreadsheets, enjoy music-rich weekends in New Orleans and Nashville, frequently unwind at the marshes of Bay St. Louis, and dream of
    exploring Iceland's waterfalls, balancing family obligations with a craving for culturally immersive adventures.
  culinary: Julissa Branch, they bring a creative flair to Southern cooking by adding smoked paprika to shrimp etouffee, fresh basil to collard-green mac & cheese, and a splash of bourbon to peach cobbler,
    relishing the process in their kitchen while streaming contemporary jazz.
  core: Julissa Branch, they fuse engineering precision with artistic imagination, mentor underrepresented STEM talent, and can’t resist a fresh batch of blues vinyl on Friday evenings, even if it means
    staying up late.
background:
  cultural: Julissa’s cultural identity is rooted in the rich traditions of the Black community in the Mississippi Delta. Growing up in Yazoo City, she was immersed in a close‑knit family environment where
    church gatherings, gospel music, and communal storytelling were central. The legacy of resilience and collective support shaped her value for education, leading her to become one of the first in her
    family to earn a graduate degree in STEM. Her experiences navigating a predominantly male engineering field as a Black woman have fostered a strong sense of advocacy and mentorship. Julissa celebrates
    her heritage through participation in local festivals, the preservation of Southern culinary practices, and an appreciation for the region’s blues history, while also embracing contemporary artistic
    expressions that broaden her worldview.
