  hobbies: '[''Visiting art galleries'', ''Photography'', ''Intramural basketball'', ''Hiking'', ''Live music concerts'', ''Community theater'', ''Craft workshops'', ''Reading unconventional philosophy'',
    ''Exploring new media art'', ''Volunteering at the historical society'']'
  career_goals: Steven aims to earn his GED and obtain a certification in office administration within the next two years, positioning himself for a supervisory front‑office role such as Office Manager
    or Reception Lead. Over the longer term, he envisions transitioning into arts administration, potentially managing the front desk of a local museum, cultural center, or community gallery in Bluffton.
    He also hopes to develop stronger organizational and planning skills, perhaps through a short course in project management, so he can coordinate community events and art‑focused programs while maintaining
    the social interaction he enjoys.
