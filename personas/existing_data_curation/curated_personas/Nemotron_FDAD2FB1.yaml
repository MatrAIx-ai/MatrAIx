  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading historical fiction'', ''Gardening'', ''Hiking local trails'', ''Book club discussions'', ''Volunteering at community art events'', ''Baking
    and sharing treats'', ''Craft workshops at the community center'']'
  career_goals: Pamela aims to advance to a supervisory or lead clerk position within the United States Postal Service, where she can mentor new employees and help implement efficient routing strategies.
    She plans to obtain her GED and complete an adult education course in office administration to strengthen her qualifications. Long‑term, she dreams of integrating her love for art into a community role,
    such as coordinating local art exhibitions or teaching basic craft workshops at the community center, possibly establishing a small home‑based craft boutique. She also hopes to maintain a healthy work‑life
    balance that allows time for her family and creative pursuits.
