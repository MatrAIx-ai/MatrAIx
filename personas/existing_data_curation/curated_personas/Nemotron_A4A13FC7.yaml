personas:
  professional: Javier Hernandez is a budding junior architect who loves building elaborate forts with couch cushions, showing early problem‑solving curiosity balanced with practical use of simple tools,
    while they often let projects drift into delightful chaos due to a relaxed attitude toward strict planning.
  sports: Javier Hernandez is a tiny soccer enthusiast who plays in the neighborhood tots league, cheers fervently for the Los Angeles Dodgers, and prefers spontaneous backyard races over regimented drills,
    reflecting a competitive yet flexible mindset they bring to sport.
  arts: Javier Hernandez is an imaginative mini‑artist who loves drawing dinosaurs with Crayola crayons, copying scenes from Pixar’s Toy Story, and singing along to Disney songs by Lin‑Manuel Miranda, and
    they showcase a curiosity for new stories balanced with comfort in familiar characters.
  travel: Javier Hernandez is an adventurous four‑year‑old who delights in family road trips to the beach, has visited the San Diego Zoo, dreams of a future visit to Disney World in Florida, and they prefer
    short, playful excursions over long, structured tours, reflecting a love of flexibility and occasional worry about unfamiliar crowds.
  culinary: Javier Hernandez is a picky eater who delights in macaroni and cheese, chicken nuggets, strawberry yogurt, and occasionally adds a dash of parmesan, can spoon‑feed themselves with growing confidence,
    but they often worry about trying new vegetables, showing a balance of curiosity and practicality in food.
  core: Javier Hernandez blends boundless curiosity with a practical streak, gets easily worried about the unknown, prefers flexible play over strict schedules, competes fiercely in games, and they often
    drift into day‑dreams while clutching a favorite stuffed animal.
background:
  cultural: Javier grows up in a bilingual Peruvian‑American household in Ashtabula, Ohio. At home, Spanish is spoken alongside English, and he hears traditions such as celebrating Inti Raymi and the Día
    de la Madre with family meals featuring Peruvian staples like ceviche, papa a la huancaína, and quinoa. His parents maintain cultural ties by playing Andean music, teaching him simple traditional dances,
    and sharing stories about life in Peru. While he participates in typical American preschool activities, his cultural heritage shapes his daily routines, language development, and the foods he enjoys,
    giving him a rich blend of Peruvian and Midwestern influences.
