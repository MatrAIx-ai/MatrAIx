  career_goals: Though only four, Javier already dreams of building and creating things. He imagines himself as a builder or engineer who can design forts from blocks and later, as a mechanic who can fix
    cars. He also loves the excitement of sports and hopes to become a soccer player who can score the winning goal. He shows a competitive streak, wanting to be the best at building towers and winning
    races in his games, while also hoping to learn to read so he can explore storybooks on his own.
