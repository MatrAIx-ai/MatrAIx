personas:
  professional: Jason Hibbard, a seasoned attorney with four decades of expertise in contract law, real estate transactions, probate, and business litigation, channels a methodical, routine-driven approach
    into meticulous firm management while transitioning to an "of counsel" role that emphasizes mentorship, advisory work, and a calmer pace, and they relish the balance between responsibility and personal
    serenity.
  sports: Jason Hibbard maintains a routine of early-morning walks on the Ozark trails, supports the St. Louis Cardinals in baseball and the Kansas City Chiefs in football, and competes in a weekly senior
    lawn-bowling league at the local community center, blending low-impact activity with loyal fandom, and they view these pursuits as gentle counterpoints to the pressures of their legal career.
  arts: Jason Hibbard finds creative solace in building detailed model railroad layouts, reading Mark Twain's classics and historical non-fiction, listening to folk legends like Woody Guthrie, and attending
    occasional performances by the regional symphony, all of which shape his appreciation for tradition and storytelling, and they often share these interests with younger family members during quiet evenings.
  travel: Jason Hibbard prefers carefully planned road trips to historic towns such as Galena, Illinois, and national parks like Yellowstone, where he can hike at his own pace, while also dreaming of a
    leisurely cruise through the Norwegian fjords, balancing adventure with the comfort of a familiar itinerary, and they meticulously map each journey to avoid unexpected disruptions.
  culinary: Jason Hibbard enjoys cooking garden-fresh heirloom tomatoes, sweet corn, and peppered green beans into hearty dishes like chicken pot pie, meatloaf with cornbread, and seasoned grilled trout,
    demonstrating a competent yet routine-bound culinary style that occasionally falters when anxiety delays dinner preparation, and they take pride in serving these meals to family and friends around the
    dinner table.
  core: Jason Hibbard balances a disciplined, routine-focused legal career with quiet hobbies, a lingering anxiety, and a gentle stubbornness that fuels their mentorship and love of the Ozarks, and they
    consistently seek calm in both professional and personal realms.
background:
  cultural: Jason grew up in a traditional Midwestern, Protestant family in Christian County, Missouri. His cultural identity is shaped by the Ozark region’s emphasis on self‑reliance, community service,
    and practical, routine‑driven living. He identifies with the values of hard work, modesty, and loyalty common among white, rural Missourians, and his life is deeply rooted in the local church, family
    heritage, and the seasonal rhythms of rural life.
