  career_goals: Jonathan aims to formalize his warehouse expertise by obtaining a Certified Forklift Operator credential and completing a Logistics & Supply Chain Management certificate at a community college.
    Within the next five years he hopes to move into a supervisory role—first as a shift lead, then as a warehouse manager—where he can combine his organizational strengths with his inclination toward innovative
    thinking. Long-term, he envisions launching a small, eco-focused freight service that partners with local artisans and farms in Vermont, using sustainable delivery practices and supporting community
    art initiatives.
