  career_goals: Yasmani aims to channel her talent for orderly, task‑focused work into a stable, entry‑level position that offers clear routines and minimal social pressure, such as data entry, library
    assistance, or remote administrative support. She seeks a role that balances structured responsibilities with enough flexibility to manage periods of heightened stress and allows her to maintain her
    personal coping practices. In the longer term, she is interested in developing expertise in community outreach delivered primarily through digital platforms, enabling her to support Hispanic youth while
    continuing to work independently.
