  career_goals: She aims to obtain CISSP and OSCP certifications within the next two years, then transition into a senior security analyst role leading a SOC team in Anchorage. Her long‑term ambition is
    to become a Chief Information Security Officer for a regional utility or government agency, where she can shape comprehensive security strategies and foster a culture of proactive risk management. She
    also wishes to become a frequent speaker at national cybersecurity conferences and mentor emerging talent through local university programs and community workshops.
