personas:
  professional: Deanna Goetz, a 25-year-old information security analyst in Anchorage, combines their methodical, organized workflow with a highly sociable, talk-show charisma to design airtight network
    defenses, orchestrate incident response drills, and deliver security awareness presentations that keep senior leaders both informed and engaged.
  sports: Deanna Goetz embraces Anchorage’s rugged outdoors by training with the Anchorage Nordic Ski Club for cross-country races, snowshoeing on the Chugach slopes, cheering for the Seattle Seahawks and
    the University of Alaska Anchorage Seawolves basketball team, and joining a local intramural soccer league whenever the summer thaw arrives.
  arts: Deanna Goetz fuels their curiosity by frequenting Anchorage’s Art Works galleries, photographing the dramatic Alaskan landscape in the style of Ansel Adams, dabbling in acrylic painting inspired
    by contemporary artist Annie Poirier, and attending indie concerts by Phoebe Bridgers and local band The Hush, as well as supporting productions at the Anchorage Community Theatre.
  travel: Deanna Goetz plans adventures with a blend of meticulous budgeting and spontaneous impulse, having trekked the Kenai Peninsula, witnessed the aurora borealis from Fairbanks, explored Reykjavik’s
    street art, skied the Austrian Alps, and dreaming of a future trek through Patagonia while always keeping a reusable water bottle handy.
  culinary: Deanna Goetz enjoys cooking Alaskan-inspired meals such as pan-seared halibut with miso glaze, reindeer stew with root vegetables, and wild berry akutaq, while their pantry is stocked with spruce
    tips, cloudberries, and artisanal coffee beans, though they occasionally over-season dishes in an effort to impress friends during game-night potlucks.
  core: Deanna Goetz, a meticulously organized yet gregarious 25-year-old security analyst, balances a fierce competitive streak in cyber-challenges with an avid love for Alaskan outdoor pursuits, impromptu
    improv comedy, and a habit of over-packing for every hike.
background:
  cultural: Deanna grew up in a middle‑class family with German‑Scandinavian ancestry in the Pacific Northwest before moving to Anchorage for work. Her upbringing blended the practical, self‑reliant values
    of northern European heritage with the frontier spirit of Alaska. She respects Indigenous Alaskan cultures, often attending local cultural festivals and incorporating native‑inspired motifs in her artwork.
    The community‑oriented lifestyle of Anchorage, combined with a strong emphasis on personal independence, has shaped her pragmatic yet adventurous outlook.
