  career_goals: Liza dreams of turning her love of art and curiosity about the world into a future career. She imagines herself as an illustrator who creates picture books and comic strips that spark imagination,
    or as a museum guide who can share stories about art and natural history with visitors. She is also fascinated by how scientists use diagrams and animations, so she hopes to combine artistic talent
    with scientific communication, perhaps as a scientific illustrator or a digital content creator that explains complex ideas in an engaging way.
