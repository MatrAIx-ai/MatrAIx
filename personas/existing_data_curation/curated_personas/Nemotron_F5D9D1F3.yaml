personas:
  professional: Liza Champagne is an aspiring storyteller and illustrator who channels her curiosity into vibrant watercolor scenes and whimsical short stories, often swapping the orderly structure of school
    assignments for the free‑form flow of her sketchbook, and while she enjoys collaborating on group art projects, they sometimes resist strict deadlines, preferring the flexible pace of imaginative play.
  sports: Liza Champagne enjoys weekend soccer practices with the Riverside Rovers youth club and occasional swimming lessons at the local community pool, while cheering on the New York Yankees during baseball
    season and the New York Knicks in basketball, balancing a love for active play with a preference for solitary sketching sessions, and they sometimes skip group drills in favor of free‑form exploration
    of the park.
  arts: Liza Champagne immerses themselves in animated storytelling, finding inspiration in Pixar’s ‘Coco’, Studio Ghibli’s ‘Spirited Away’, and the whimsical illustrations of Mary Blair, while listening
    to pianist Lindsey Stirling and pop singer Taylor Swift during sketch breaks, allowing these creative influences to shape their own watercolor narratives.
  travel: Liza Champagne has taken school field trips to the Metropolitan Museum of Art in New York City and the Franklin Institute in Philadelphia, and dreams of exploring the historic streets of Boston
    and the magical kingdom of Disneyland Paris, preferring short, family‑guided tours that blend museum stops with whimsical attractions, though they sometimes forget to pack their sketchbook for spontaneous
    drawing moments.
  culinary: Liza Champagne delights in crafting peanut‑butter‑jelly sandwiches, nibbling on cheesy macaroni, and helping harvest basil and cherry tomatoes from the community garden to top their homemade
    pizza, favoring bright ingredients like rainbow carrots and strawberry slices, yet they often leave half their vegetables uneaten, leading to a humorous battle between appetite and imagination.
  core: Liza Champagne is a curious nine‑year‑old imagination architect who fills sketchbooks with vivid watercolor worlds, hoards LEGO bricks, and occasionally loses their pencil to a stray butterfly,
    blending quiet resilience with a love for spontaneous creativity.
background:
  cultural: Liza grows up in Riverside, a suburban community in Burlington County, New Jersey, where her family’s cultural roots trace back to European‑American heritage. Her household celebrates typical
    American holidays and also takes part in local community events such as the Riverside Summer Festival and the township’s public library storytime. The region’s proximity to New York City and Philadelphia
    provides occasional field trips to museums and art galleries, which nurture her appreciation for diverse artistic styles. Her parents encourage curiosity, reading, and creative expression, fostering
    an environment that blends modest suburban values with exposure to broader cultural experiences.
