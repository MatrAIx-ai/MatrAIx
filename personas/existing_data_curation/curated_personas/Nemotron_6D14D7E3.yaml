    historic sites"]'
  career_goals: Although retired, Nancy aims to deepen her involvement in local civic life by serving on the board of the Wharton Community Center and launching a mentorship program that pairs senior volunteers
    with younger families. She hopes to complete a seniors' health education series, learn more about digital tools to stay connected with distant relatives, and eventually compile a cookbook of family
    recipes and anecdotes to share with grandchildren. Maintaining her health, staying socially active, and leaving a lasting legacy of community service remain her primary ambitions.
