persona_description: A researcher or health care professional interested in the transmission and prevention of HIV and sexually transmitted diseases among newly diagnosed TB patients in San Juan de Lurigancho,
  Peru. This individual is likely to be interested in the study's findings, which suggest a low level of knowledge among TB patients and the potential risk of acquiring HIV and other sexually transmitted
  diseases. The individual may also be interested in the study's recommendations for improving the detection and prevention of HIV infection among TB patients, as well as the potential for integrated TB-HIV
  services to be successful in settings with limited resources.
