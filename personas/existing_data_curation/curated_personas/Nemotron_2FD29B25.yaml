  hobbies: '[''Gardening (heirloom tomatoes, companion planting)'', ''Listening to ranchera and mariachi music'', ''Reading Spanish‑language newspapers and local history'', ''Woodworking small furniture'',
    ''Walking along the Carmel River trail'', ''Cooking traditional Mexican meals'']'
  career_goals: Although retired from formal work, Raimundo aims to become a respected source of agricultural wisdom in his neighborhood. He wishes to document his decades of farming experience in a handwritten
    journal that could later be digitized for community archives. He also hopes to mentor a handful of younger volunteers from the local senior center, sharing practical gardening tips and cultural recipes.
    A long‑standing personal ambition is to grow a small but thriving heirloom tomato garden that showcases varieties from his native Michoacán, proving that traditional methods can coexist with modest
    modern innovations.
