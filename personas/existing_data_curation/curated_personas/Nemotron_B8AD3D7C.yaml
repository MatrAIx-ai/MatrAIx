  career_goals: Juliet aims to earn a scholarship and pursue a degree in communications or journalism, with the long‑term goal of becoming a television news anchor or investigative reporter who highlights
    stories from underrepresented communities. She is also intrigued by public policy and envisions a future role as a civil‑rights advocate or policy analyst, using her research and speaking skills to
    influence change. In the short term, she plans to join the school's journalism club, take advanced writing courses, and build a stronger portfolio of digital media projects.
