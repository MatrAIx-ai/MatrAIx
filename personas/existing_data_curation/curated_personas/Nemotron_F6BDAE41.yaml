  career_goals: Luis often talks about becoming an astronaut who explores distant planets, a painter who creates colorful worlds, or a storyteller who shares magical tales with children. He loves the idea
    of discovering new things, so his future ambitions revolve around fields that blend creativity with curiosity, such as space exploration, visual arts, or children's literature.
