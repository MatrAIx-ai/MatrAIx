personas:
  professional: Luis Riverahernandez is a budding storyteller who spends afternoons building elaborate forts out of blankets, rehearsing whimsical narratives for family gatherings, and dreaming of one day
    becoming a children's author, using his vivid imagination to turn everyday desert walks into epic adventures.
  sports: Luis Riverahernandez is a tiny but enthusiastic participant in the Chino Valley Little League soccer team, cheers loudly for the Arizona Diamondbacks during family game nights, and loves spontaneous
    desert hikes with a small plastic water bottle strapped to his belt, preferring unstructured play over scheduled drills.
  arts: Luis Riverahernandez is an amateur watercolor painter who splashes bright hues onto paper to render cacti, marigolds, and imagined desert creatures, often humming folk tunes by Los Lobos while crafting
    improvised puppet shows for his grandparents during quiet evenings.
  travel: Luis Riverahernandez loves weekend family trips to Red Rock State Park and the Grand Canyon, eagerly collects smooth desert stones as souvenirs, and dreams of a future adventure to the historic
    town of San Miguel de Allende, favoring spontaneous road trips over rigid itineraries.
  culinary: Luis Riverahernandez is a selective eater who favors tamales made with fresh corn masa and melted cheese, enjoys sprinkling cilantro on sopes, but secretly hides a stash of chocolate chip cookies
    under his pillow for late‑night snacking, and attempts to stir guacamole with a toy spoon.
  core: Luis Riverahernandez is an imaginative four‑year‑old who blends desert exploration, family traditions, and spontaneous creativity into a world of colorful stories and tiny adventures.
background:
  cultural: Luis grows up in a Mexican‑American household in Chino Valley, Arizona. His family celebrates traditions such as Día de los Muertos and Mexican holidays, shares dishes like tamales and sopes,
    and speaks both Spanish and English at home. The desert environment and nearby mountains influence his love for exploring nature, while the multicultural community introduces him to a blend of Southwestern
    and Mexican cultural values, emphasizing family closeness, respect for elders, and a love for music and storytelling.
