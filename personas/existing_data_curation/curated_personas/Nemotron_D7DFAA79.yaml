  career_goals: Although retired from formal employment, Lena is determined to stay active and purposeful. Her primary ambition is to preserve her family’s heritage by completing a detailed genealogical
    archive and sharing it with her children and grandchildren. She aims to expand her volunteer work at the senior center by organizing a quarterly intergenerational craft fair, fostering connections between
    youth and elders. Lena also hopes to maintain her health through a consistent walking routine and to participate in the town’s annual garden competition, where she can showcase her horticultural expertise.
    Ultimately, she seeks to leave a lasting legacy of self‑reliance, practical skill, and community service.
