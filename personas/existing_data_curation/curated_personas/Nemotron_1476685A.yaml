  career_goals: Sharika plans to leverage her administrative foundation into a leadership role such as Office Manager or Administrative Services Manager within the next three years, while pursuing a Project
    Management certification (CAPM) and completing a bachelor's degree in Business Administration. She is also drawn to the nonprofit sector and hopes to transition into a Program Coordinator position for
    a community arts or social‑services organization, where she can combine her organizational expertise with her passion for helping others. Long‑term, she envisions directing community‑outreach initiatives,
    mentoring junior staff, and shaping inclusive workplace cultures that reflect her values of compassion and collaboration.
