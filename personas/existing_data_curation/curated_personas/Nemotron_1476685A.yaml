personas:
  professional: Sharika Mendez leverages a decade of administrative expertise — from calendar juggling and travel logistics to crafting crisp newsletters and mentoring junior staff — to become a proactive
    office manager who blends meticulous organization with a warm, collaborative leadership style, and they inspire teams with their curiosity and empathy.
  sports: Sharika Mendez stays active through weekly yoga sessions, line‑dancing classes, and weekend hikes with the Blue Ridge Hiking Society, roots for the Atlanta Falcons and Atlanta United, and they
    occasionally join community 5K runs organized by the local senior center.
  arts: Sharika Mendez paints abstract acrylics inspired by the bold palettes of Jean‑Michel Basquiat, attends community theater productions at the Midtown Arts Center, sings gospel and R&B in her church
    choir covering Mahalia Jackson and Alicia Keys, and they follow actress Viola Davis for theatrical inspiration.
  travel: Sharika Mendez plans trips with a blend of cultural immersion and nature, having explored Savannah’s historic squares, New Orleans’ jazz districts, and Cartagena’s Caribbean coast, while keeping
    a dream itinerary for a retreat in the Blue Ridge Mountains and a future visit to the art museums of Lisbon, and they balance travel enthusiasm with family and budget considerations.
  culinary: Sharika Mendez cooks Southern soul food like fried catfish with collard greens and Afro‑Caribbean dishes such as jerk chicken with mango salsa, relishes the aromas of smoked paprika, okra, and
    plantains, and they often host communal potlucks where they showcase their evolving culinary flair.
  core: Sharika Mendez is a 42‑year‑old community‑focused organizer who balances precise administrative acumen with spontaneous artistic bursts, juggling spreadsheets, paintbrushes, and yoga mats while
    occasionally forgetting to water their succulents, and they radiate a compassionate curiosity in every endeavor.
background:
  cultural: Sharika identifies as a Black woman with Afro‑Latina heritage. Her parents immigrated from Puerto Rico to the Atlanta area in the 1970s, and she was raised in a bilingual household that celebrated
    both African‑American and Hispanic traditions. Growing up in Gwinnett County, she was immersed in the rhythms of Southern soul music, gospel, and Latin salsa, and she participates in community events
    such as Juneteenth celebrations and Puerto Rican cultural festivals. Her faith and church involvement have reinforced a strong sense of community service and collective solidarity. Sharika’s cultural
    identity informs her cooking, her artistic expression, and her commitment to fostering inclusive spaces in both her personal and professional life.
