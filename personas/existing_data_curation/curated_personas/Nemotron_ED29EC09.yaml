personas:
  professional: Maria Gonzalez is an innovative health information specialist who leverages expertise in Epic and Cerner, strong medical coding knowledge, and bilingual communication to streamline EHR workflows
    while infusing creative problem-solving into data-driven quality-improvement projects, all while maintaining a healthy skepticism toward untested processes.
  sports: Maria Gonzalez enjoys weekend hikes with the Orlando Hiking Association, follows the Orlando Magic and Tampa Bay Buccaneers for a burst of competitive energy, and treats salsa dancing as a cardio
    workout that satisfies their love of rhythm and team spirit.
  arts: Maria Gonzalez channels their imagination into abstract paintings reminiscent of Jean-Michel Basquiat's bold colors and creates digital illustrations inspired by contemporary pixel art, regularly
    attending workshops at the Orlando Museum of Art and drawing inspiration from musicians like Bad Bunny and visual artists like Yayoi Kusama.
  travel: Maria Gonzalez plans trips using detailed itineraries, balancing adventure hikes in Shenandoah National Park with cultural immersion in Barcelona's street art scene, while budget constraints keep
    weekend getaways to nearby Key West and St. Augustine at the top of their list.
  culinary: Maria Gonzalez experiments in the kitchen by reimagining traditional island dishes such as mofongo with a citrus-marinated shrimp twist, pairing plantains, garlic, and cilantro with local Florida
    produce, and their intermediate cooking skills shine during weekly potluck gatherings.
  core: Maria Gonzalez blends a vivid artistic imagination with a data-driven work ethic, a competitive edge, and a bilingual flair, turning every challenge into a colorful opportunity while occasionally
    over-committing to social events.
background:
  cultural: 'Maria grew up in a bilingual Puerto Rican household, speaking both Spanish and English fluently. Her family maintains traditions such as celebrating San Juan festivals, sharing plena and bomba
    music, and preparing classic dishes like arroz con gandules and pernil. Living in DeLand, she is part of a vibrant Puerto Rican diaspora that values close family ties, community involvement, and resilience.
    This cultural foundation informs her outlook on health information: she is attuned to the importance of culturally sensitive communication and strives to ensure that medical records serve the needs
    of diverse patients, especially those from Hispanic backgrounds. Her bilingual upbringing also fuels her commitment to bridging language gaps in healthcare.'
attributes:
  skills: '["Electronic Health Record (EHR) management (Epic, Cerner)", "HIPAA compliance and privacy regulations", "Medical coding (ICD-10, CPT)", "Data entry, validation, and auditing", "Healthcare data
    analysis and reporting", "Process improvement and workflow optimization", "Effective communication with clinicians and patients", "Team collaboration and staff training", "Critical thinking and quality-assurance",
    "Creative problem solving", "Bilingual (English/Spanish) communication"]'
  hobbies: '["Abstract painting and digital illustration", "Attending art workshops and gallery visits", "Reading science-fiction and popular science", "Participating in a book club", "Salsa and plena dancing",
    "Playing strategic board games (e.g., Catan, Risk)", "Competing in trivia nights", "Hiking state park trails", "Cooking creative Puerto Rican cuisine", "Spanish-English language exchange meetups"]'
  career_goals: Maria aims to finish a bachelor's degree in Health Information Management and earn the RHIA certification within the next two years. She aspires to move into a supervisory role, eventually
    becoming a Health Information Management manager where she can lead data-driven quality-improvement projects. Maria is also interested in leveraging emerging technologies—such as AI-assisted record
    analysis—to enhance patient data accessibility. In the longer term, she hopes to develop culturally tailored health-information outreach programs for the Puerto Rican community in Central Florida, combining
    her professional expertise with her heritage. She envisions leading a bilingual health informatics team that creates Spanish-language patient portals and educational resources.
