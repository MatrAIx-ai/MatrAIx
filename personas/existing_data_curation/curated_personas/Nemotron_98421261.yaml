  career_goals: Although retired from formal employment, Amber aims to stay active and independent while deepening her community impact. She plans to lead a monthly seniors' book club at the Vero Beach
    library, mentor younger volunteers at the senior center, and refine her digital skills to stay connected with grandchildren through video calls. Maintaining her health through daily walks on the beach
    and regular yoga classes is a priority, as is documenting her family’s history for future generations. Amber also dreams of organizing a small, structured neighborhood garden project that encourages
    neighborly cooperation while allowing flexible participation.
