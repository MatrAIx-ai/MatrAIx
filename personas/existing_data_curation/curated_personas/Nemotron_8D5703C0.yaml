  hobbies: '[''Basketball (pick‑up games)'', ''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Rooftop urban gardening'', ''Street photography'', ''Listening to science and tech podcasts'', ''Playing
    strategy video games'']'
  career_goals: Jorge aims to turn his assorted talents into a sustainable micro‑enterprise. His primary ambition is to launch a modest food‑truck venture that serves authentic Puerto Rican street food—mangu,
    alcapurrias, and tostones—while also offering a small side service of on‑the‑spot gadget repairs for commuters. He envisions the truck as a community hub where he can showcase his graphic‑design work
    on menus and merchandise. In the longer term, Jorge hopes to expand into a modest storefront that doubles as a co‑working space for other local freelancers, allowing him to build a network of mutually
    supportive entrepreneurs. Financial independence, the ability to support his extended family, and the chance to give back to his neighborhood are the core drivers behind his goals.
