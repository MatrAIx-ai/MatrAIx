personas:
  professional: Jorge Acosta is a 35‑year‑old aspiring micro‑entrepreneur who blends DIY home repair, freelance graphic design, and flavored street‑food cooking into a vision for a food‑truck that also
    offers on‑the‑spot gadget repairs, leveraging their practical curiosity and flexible, sometimes disorganized approach; they turn chaotic ideas into tangible community services.
  sports: Jorge Acosta channels a competitive streak into regular pick‑up basketball sessions at the Metro Hoops Club courts, cheering for the City Guardians during NBA season, while also getting a cardio
    boost from salsa dancing at community events, and they keep a laid‑back fitness routine that blends street‑ball drills with weekend jogs along the river trail.
  arts: Jorge Acosta expresses creativity through street photography inspired by Vivian Maier and Henri Cartier‑Bresson, crafts eye‑catching flyers with a DIY aesthetic reminiscent of Banksy, immerses in
    salsa rhythms by legends like Celia Cruz and the soulful jazz of Nina Simone, and they feed a continual curiosity by tuning into science and entrepreneurship podcasts.
  travel: Jorge Acosta favors spontaneous weekend road trips that mix food‑truck hunting with scenic drives, having explored the coastal Highway 1 to Santa Barbara, the vibrant street‑food scene in Portland,
    and dreaming of future trips to Cartagena’s historic plazas and Mendoza’s wine regions, all while balancing a modest travel budget; they plan trips loosely, allowing room for unexpected stops.
  culinary: Jorge Acosta, a self‑taught home chef, perfects a crisp, twice‑fried plantain side (tostones) and savory fried dough pockets (alcapurrias) using fresh cilantro, hot chilies, and lime harvested
    from their rooftop garden, while constantly experimenting with modern twists on traditional island recipes and savoring casual meals at local food‑truck festivals; they relish the blend of flavors and
    the hands‑on process.
  core: Jorge Acosta is a resourceful, curiosity‑driven 35‑year‑old who weaves practical tinkering, street‑food flair, and community‑focused hustle into a lively, occasionally disorganized but passionately
    driven life; they thrive on turning everyday moments into entrepreneurial possibilities.
background:
  cultural: Jorge was raised in a vibrant Puerto Rican enclave in the Bronx before moving to Manhattan, where he has lived for the past decade. His family maintains strong ties to the island, celebrating
    traditions such as Noche de San Juan, parrandas, and holiday feasts featuring lechón and arroz con gandules. Bilingualism is a daily reality; he switches fluidly between Spanish at home and English
    in the wider city. The community’s emphasis on solidarity, shared meals, and music has shaped his social values, even as his competitive nature drives him to carve his own path. He identifies with the
    broader diaspora experience, balancing pride in his heritage with the pragmatic demands of urban life in New York City.
attributes:
