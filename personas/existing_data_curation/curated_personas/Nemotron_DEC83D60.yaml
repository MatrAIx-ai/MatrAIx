  hobbies: '["Open-mic hosting", "Community trivia night organization", "Debate club participation", "Farmers market involvement", "Hiking", "Fishing", "Gardening (heirloom tomatoes)", "DIY electronics
    (Arduino)", "Reading (behavioral economics, psychology, tech)"]'
  career_goals: Alfred's main ambition is to create a community-focused business that merges his social energy with his practical skill set. He plans to open a coffee-shop and events venue in Sunnyside
    that will host open-mic nights, local art showcases, and pop-up markets, positioning the space as the town's cultural hub. By building a reputation as a reliable organizer and a charismatic host, he
    aims to become a recognized local leader and eventually run for a seat on the Benton County council, where he can apply his data-driven, critical perspective to shape regional policy. Concurrently,
    he intends to launch a regional podcast that interviews entrepreneurs, farmers, and artists, seeking to be the go-to voice on innovation and tradition in the Central Washington area.
