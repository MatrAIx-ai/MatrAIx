personas:
  professional: Alfred Dotson, a 33‑year‑old community organizer and aspiring coffee‑shop owner, leverages their charismatic public‑speaking, pragmatic event‑planning, and skeptical analytical mind to orchestrate
    bustling open‑mic nights and negotiate vendor contracts while habitually double‑checking budgets at midnight, often staying up late to fine‑tune a spreadsheet.
  sports: Alfred Dotson fuels their love of the outdoors by hiking Columbia Plateau trails and weekend fishing on the Yakima River, cheers for the Seattle Seahawks and Seattle Mariners, and belongs to the
    Sunnyside Outdoor Club that meets for seasonal trail runs, while they also organize community sports trivia nights.
  arts: Alfred Dotson curates local culture by hosting open‑mic evenings featuring folk legends like Bob Dylan and indie acts such as The Shins, regularly visits Seattle’s 5th Avenue Theatre for musical
    productions, collects vintage vinyl of Janis Joplin, and they often debate artistic intent during post‑show coffee chats.
  travel: Alfred Dotson balances meticulous itinerary planning with spontaneous detours, having road‑tripped the Pacific Coast to Portland, camped in the Canadian Rockies during summer, now dreams of a
    tech‑inspired pilgrimage to Tokyo’s Akihabara, and they budget travel carefully to ensure funds remain available for the upcoming coffee‑shop launch.
  culinary: Alfred Dotson’s palate gravitates toward hand‑crafted coffee, smoky grilled trout caught on the Yakima River, and fresh heirloom tomato bruschetta, they experiment with sous‑vide techniques
    at home, yet they often over‑salt dishes while debating flavor profiles during trivia nights.
  core: Alfred Dotson blends sociable showmanship with a skeptical, data‑driven mind, channeling competitive energy into community events while obsessively fine‑tuning budgets and occasionally losing sleep
    over perfecting Arduino prototypes, all guided by an unusually calm resilience.
background:
  cultural: Alfred was raised in a multi-generational White family with roots in the Midwestern United States that settled in the Yakima Valley in the 1950s. Growing up in the small town of Sunnyside, he
    absorbed the Pacific Northwest's blend of self-reliance, agricultural heritage, and close-knit community values. The region's emphasis on straightforward communication, hard work, and a strong connection
    to the land shaped his pragmatic outlook, while his natural curiosity led him to explore broader cultural influences through music, literature, and occasional trips to nearby Spokane and Portland. This
    background gives him a solid sense of local identity combined with an openness to new ideas.
attributes:
  skills: '["Public speaking", "Community event coordination", "Sales and negotiation", "Basic carpentry", "Small engine repair", "Social media marketing", "Customer service", "Conflict resolution", "Budgeting
