  hobbies: '[''finger painting and coloring'', ''building block constructions'', ''singing nursery rhymes'', ''dancing to music'', ''group storytime at the library'', ''outdoor exploration (farm fields,
    collecting leaves)'', ''playing hide‑and‑seek with peers'']'
  career_goals: Through imaginative play, Scott envisions himself as an artist who creates vibrant pictures, an explorer who discovers new places, and a community helper who assists friends, such as a firefighter
    or a teacher. He aspires to keep learning about colors, shapes, and how things work, with a long‑term goal of using his curiosity and organized approach to make a positive impact on others.
