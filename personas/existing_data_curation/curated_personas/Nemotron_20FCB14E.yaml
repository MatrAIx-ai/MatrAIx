personas:
  professional: Scott Brashears, a budding preschool explorer, demonstrates a curious and methodical approach to building block towers, organizing each piece with precision while eagerly cooperating with
    peers during collaborative play, occasionally asserting a preferred design and handling any collapses with calm resilience.
  sports: Scott Brashears, an energetic three‑year‑old, enthusiastically kicks balls with the Sunnyville Strikers toddler soccer club and cheers loudly for the Chicago Cubs during family game nights, balancing
    a love for active participation with enthusiastic spectator support.
  arts: Scott Brashears, a curious three‑year‑old, delights in drawing colorful pictures inspired by Dr. Seuss, dancing to Pharrell Williams' "Happy," and watching performances by the Muppets and Disney's
    Frozen characters, which shape a playful and expressive artistic identity.
  travel: Scott Brashears, a spontaneously adventurous three‑year‑old, loves family outings to the local zoo and Disney World, eagerly packs a small backpack for weekend trips to Grandma’s countryside farm,
    and dreams of one day exploring the Grand Canyon with the same organized curiosity.
  culinary: Scott Brashears, an enthusiastic three‑year‑old foodie, adores creamy mac and cheese with sharp cheddar, crunchy carrot sticks, sweet banana slices, and proudly spreads peanut butter on toast
    while sprinkling cinnamon on pancakes, often insisting on helping stir batter in the kitchen.
  core: Scott Brashears, a bright, organized, and socially spirited three‑year‑old, balances boundless curiosity with methodical play, occasionally demanding extra stickers while dutifully sharing toys,
    shaping a uniquely balanced worldview.
background:
  cultural: Scott is raised in a white, Midwestern family in Lincoln, Illinois, where community, family, and modesty are core values. His household reflects the region’s blend of agricultural heritage and
    small‑town traditions, with regular attendance at local community events such as county fairs, church gatherings, and seasonal celebrations like Thanksgiving and Christmas. The cultural environment
    emphasizes polite interaction, cooperative play, and a respect for routine, all of which shape his sociable and organized personality.
attributes:
  skills: '[''basic self‑care (hand washing, teeth brushing)'', ''fine motor coordination (crayon drawing, block building)'', ''early numeracy (counting to 10)'', ''alphabet recognition (identifying letters)'',
