persona_description: An engineer or technician who specializes in the design and installation of gas-fired storage water heaters for domestic hot water uses, especially those that are connected to individual
  flue ducts, fitted with atmospheric burners, using combustible gases, and having a nominal heat input not exceeding 150 kW (net calorific value). They are likely to be interested in the safety, rational
  use of energy, and environment aspects of the appliance, as well as its classification and marking. They may also have knowledge and experience in environmental regulations and standards, and in the testing
  and certification of appliances.
