persona_description: A researcher studying the impact of cultural, technological, and demographic changes on natural and sexual selection in humans. The individual is interested in understanding how our
  species has evolved over time and how it continues to be affected by natural and sexual selection. They have a background in animal and plant sciences and have conducted research on large numbers of study
  subjects, using detailed church records, movement data, and other sources to study selection over the entire life cycle of individuals. They are interested in the differences between men and women concerning
  Darwinian selection and have a passion for studying evolution with unbiased datasets that report the life events for everyone born.
