personas:
  professional: Selena Antoine, a 29-year-old agile leader and strategic decision-maker, blends their curiosity for emerging market trends with a pragmatic, flexible planning style to build high-performing
    small teams, and they leverage empathetic communication and assertive negotiation while tolerating a modest degree of disorganization to keep their community-focused startup on a growth trajectory.
  sports: Selena Antoine, who favors solitary yet community-oriented workouts, practices yoga three times a week at a Midtown studio, joins a casual weekend basketball league at the local community center
    while cheering on the Baltimore Ravens and Orioles, and they participate in the Baltimore Bike Club’s spring ride, balancing their love for low-key fitness with modest fan allegiance to local teams.
  arts: Selena Antoine enriches their solitary leisure by listening to Baltimore go-go legends like Chuck Brown and Rare Essence alongside classic jazz from Miles Davis and John Coltrane while devouring
    historical fiction by Hilary Mantel, occasionally attending a performance at the Baltimore Symphony Orchestra and visiting the Walters Art Museum for a creative boost, and they feel inspired to integrate
    these cultural textures into their entrepreneurial storytelling.
  travel: Selena Antoine prefers meticulously planned yet low-stress getaways, often opting for short weekend trips to nearby cities like Washington, DC and Philadelphia and dreaming of a boutique culinary
    tour of New Orleans and a culturally immersive retreat in Lisbon, while they balance a modest travel budget with the occasional spontaneous weekend road trip with friends.
  culinary: Selena Antoine experiments with soul-food cooking at a moderate skill level, frequently crafting dishes like shrimp-and-grits with smoked paprika, oven-roasted sweet potatoes seasoned with rosemary,
    and collard greens sautéed with smoked turkey and a dash of hot sauce, while they also explore contemporary twists such as quinoa-filled okra boats that reflect their curiosity and love for flavorful
    comfort.
  core: Selena Antoine is a curiosity-driven yet slightly disorganized strategist who balances relentless ambition with a habit of procrastinating bill payments and over-indulging in soulful cooking as
    a soothing escape from anxiety, and they constantly seek ways to transform that tension into productive momentum.
background:
  cultural: Selena was raised in Baltimore’s historic African‑American neighborhoods, where church, family gatherings, and a vibrant music scene shaped her identity. She grew up immersed in the city’s go‑go
    rhythms, soulful cuisine, and a strong sense of community resilience. Her upbringing emphasized the value of mutual support, storytelling, and activism, which she carries into her leadership style.
    Drawing on the legacy of Baltimore’s Black entrepreneurs and civil rights advocates, Selena integrates cultural pride, perseverance, and a commitment to uplifting her community into both her personal
    life and professional ambitions.
