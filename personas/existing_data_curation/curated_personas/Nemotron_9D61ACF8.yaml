  career_goals: Selena aims to scale her company from a regional startup to a multi‑state enterprise while preserving its community‑focused ethos. She plans to launch a mentorship program that supports
    aspiring Black entrepreneurs in Baltimore, and to diversify her product line with socially responsible innovations. Over the next five years she hopes to secure a seat on the board of a major corporation,
    use her platform to advocate for greater diversity in leadership, and invest in personal development tools that improve her organization and stress management. Ultimately, she envisions her business
    becoming a catalyst for economic empowerment in her neighborhood.
