persona_description: A team of 13 students from the Technion, led by Assistant Professor Roee Amit, who won the gold medal at the prestigious iGEM biology competition for the third consecutive year. The
  group of students developed an innovative chip called Flash Lab, based on the natural biological phenomenon chemotaxis, for fast, accurate, and simple detection of various substances using biological
  means. The team is publishing their findings and has developed a working prototype. The next phase would be to create a startup company that would determine which contaminants are financially worthwhile
  to detect. The team is highly skilled and experienced in the field of biology, and their research has the potential to make a significant impact in the field of synthetic biology.
