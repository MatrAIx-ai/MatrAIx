personas:
  professional: Janis Sanchez, a veteran office manager turned senior advisor, blends three decades of supervisory expertise with a STEM‑infused analytical mindset, using VBA, Python, Lean Six Sigma, and
    visual storytelling to drive process improvements while mentoring emerging leaders, and they champion flexible yet organized workflows.
  sports: Janis Sanchez, an enthusiastic member of a senior walking club, hikes the Ozark trails, follows the Kansas City Royals and Chiefs, participates in weekly bird‑watching outings that double as low‑impact
    cardio, and they occasionally join competitive pickleball matches at the community center, balancing social camaraderie with a healthy dose of rivalry.
  arts: Janis Sanchez, a watercolor enthusiast who frequents the Crossroads Art District galleries and volunteers at the Joplin Public Library’s senior arts program, regularly attends community theater
    productions starring local talent like Sarah Miller, draws inspiration from Georgia O'Keeffe and contemporary creator Tom Huck, and they channel that curiosity into vibrant canvases that reflect both
    traditional techniques and experimental color palettes.
  travel: Janis Sanchez, a seasoned traveler who blends meticulous itinerary planning with spontaneous detours, has explored Santa Fe’s historic plaza, Provence’s lavender fields, and the rugged beauty
    of the Ozark National Forest, and they now dream of a guided cultural tour of Kyoto’s temples while balancing travel costs against their modest pension.
  culinary: Janis Sanchez, an avid home chef who skillfully prepares Thai green curry, Moroccan tagine, and Italian risotto using fresh herbs and spices, enjoys hosting dinner parties featuring homemade
    pão de queijo and baklava, but has a habit of over‑seasoning dishes and they occasionally burn the garlic when multitasking between cooking and board game nights.
  core: Janis Sanchez embodies a curious, art‑loving senior who balances disciplined leadership with playful creativity, channels competitive energy into community projects, and they navigate life’s challenges
    with a blend of organization, flexibility, and a dash of stubbornness.
background:
  cultural: Janis grew up in the Midwestern United States, raised in a small‑town environment that emphasized community, self‑reliance, and practicality. Her family’s German and Irish ancestry shaped traditions
    such as holiday gatherings and a strong work ethic. Living in Joplin, Missouri, she experienced the close‑knit community spirit, especially after the 1993 tornado, which reinforced her commitment to
    resilience and helping neighbors. The regional culture of modest optimism, appreciation for country and blues music, and participation in mainline Protestant worship have influenced her values. She
    places high importance on volunteerism, civic engagement, and lifelong education, blending a respect for scientific inquiry from her STEM background with an appreciation for Midwestern arts and local
    heritage.
