  career_goals: Looking ahead, Janis aims to transition into a mentorship‑focused role within the next two to three years, serving as a senior advisor or consultant to guide succession planning and knowledge
    transfer in her organization. She plans to earn a Project Management Professional (PMP) certification to lead cross‑functional improvement projects and to spearhead a community art‑technology workshop
    series for seniors that blends her STEM expertise with her love of art. While she intends to step back from full‑time supervisory duties, she wishes to remain engaged through part‑time consulting, volunteering
    at local museums, and publishing a guide on effective administrative leadership for small non‑profits.
