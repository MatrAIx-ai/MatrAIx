personas:
  professional: Logan Martin, an aspiring teen game strategist and hobbyist hardware tinkerer, channels their competitive edge and love for structure into designing custom PC rigs and analyzing RTS and
    battle‑royale replays to prototype new game mechanics, treating each build like a live‑lab experiment.
  sports: Logan Martin follows the e‑sports organization Cloud9 for strategy insights, cheers on the local high school soccer team the Tigers, and participates in a weekly youth chess club, preferring low‑key,
    strategic competition over high‑intensity physical sports.
  arts: Logan Martin spends evenings listening to synthwave artists like Kavinsky and Daft Punk while devouring sci‑fi novels such as Dune and The Expanse, occasionally streaming tabletop game sessions
    with friends and drawing inspiration from cyberpunk visual art and indie film soundtracks.
  travel: Logan Martin has visited the Kennedy Space Center and the National Museum of Natural History on school trips, dreams of exploring Akihabara in Tokyo for its tech shops and anime culture, and prefers
    carefully planned short bursts of travel that blend educational stops with gaming conventions.
  culinary: Logan Martin favors pepperoni pizza, a steaming bowl of tsukemen ramen, and quick microwave loaded nachos, often cooking these comfort foods themselves with a modest skill set, yet frequently
    opts for late‑night delivery after marathon gaming sessions.
  core: Logan Martin fuses a competitive, analytical mind with a love for solitary tech tinkering, balancing structured gaming strategies against spontaneous, sometimes chaotic, real‑world habits.
background:
  cultural: Logan grew up in a suburban neighborhood of Atlanta, Georgia, in a family that reflects typical Southern middle-class values while also being immersed in the city's modern, tech-savvy culture.
    His upbringing includes occasional participation in regional traditions such as holiday gatherings and local festivals, but his day-to-day life is shaped by the diverse, multicultural environment of
    Fulton County and the vibrant Atlanta tech community. Exposure to Southern cuisine, music, and community events coexists with his strong interest in online gaming culture and digital media, creating
    a hybrid cultural identity that balances local heritage with global youth influences.
attributes:
  skills: '[''Strategic game analysis'', ''Basic Python programming'', ''Computer hardware troubleshooting'', ''DIY electronics (Arduino/Raspberry Pi)'', ''Mechanical assembly (LEGO Technic, drone building)'',
