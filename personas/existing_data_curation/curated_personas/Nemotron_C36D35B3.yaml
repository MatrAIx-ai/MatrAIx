  hobbies: '[''Playing strategic video games (RTS, battle royale)'', ''Analyzing gaming replays'', ''Building and customizing computer hardware'', ''Arduino and Raspberry Pi projects'', ''Reading science-fiction
    novels'', ''Listening to technology podcasts'', ''Playing chess and tabletop strategy games with a close friend group'']'
  career_goals: Logan aspires to turn his technical curiosity into a career in technology. In the short term, he plans to enroll in a specialized STEM high school program or take community courses in computer
    science to deepen his coding and hardware skills. He dreams of becoming a video game developer or a hardware engineer, roles that combine his love for structured problem solving with competitive creativity.
    Long term, he hopes to contribute to the development of immersive gaming experiences or innovative consumer electronics, leveraging the disciplined, detail-oriented mindset he has cultivated.
