personas:
  professional: Yolanda Russell, a retired biomedical researcher turned community STEM advocate, leverages her advanced analytical skills in R and Python, her knack for experimental design, and her passion
    for art to mentor underrepresented youth through flexible, project‑based STEAM workshops that blend scientific inquiry with creative expression.
  sports: Yolanda Russell enjoys low‑impact fitness through weekly hikes with the Frederick County Hiking Club, follows the Washington Nationals for baseball, tunes into the Washington Capitals’ hockey
    games, and supports the regional women’s soccer team, the Maryland Pride, as a way to stay socially engaged without the pressure of competitive sports.
  arts: Yolanda Russell frequents the Frederick Museum of Art and the Renwick Gallery, draws inspiration from contemporary artists such as Olafur Eliasson and Kara Walker, and captures experimental digital
    photographs that interrogate traditional perspectives, blending these visual experiences into her graphic illustrations and community workshops.
  travel: Yolanda Russell favors meticulously planned yet spontaneous trips that combine nature and heritage, having recently trekked the Blue Ridge Parkway, explored the historic streets of Savannah, Georgia,
    and collected family stories in Charleston, South Carolina, while dreaming of a future photography expedition to the Azores.
  culinary: Yolanda Russell experiments in the kitchen by reimagining Southern classics—like collard greens seasoned with harissa, peach cobbler infused with cardamom, and shrimp and grits finished with
    miso glaze—showcasing a medium‑level cooking skill and a love for bold, cross‑cultural flavor pairings.
  core: Yolanda Russell blends scientific rigor with artistic curiosity, channels stress into hiking and journaling, and navigates life’s structure with spontaneous generosity toward community art and STEM
    education.
background:
  cultural: Yolanda is a second‑generation Black American whose family roots trace back to the historic African‑American communities of Maryland. Her grandparents migrated from the Jim Crow South during
    the Great Migration and settled in Frederick County, where they became active members of the African Methodist Episcopal church and local civil‑rights initiatives. Growing up, she absorbed the oral
    storytelling traditions, gospel music, and culinary heritage of her community, which continue to shape her worldview. She participates in annual African‑American cultural festivals in nearby Hagerstown,
    supports the preservation of black histories at the Frederick County Historical Society, and incorporates these cultural narratives into her mentorship and artistic endeavors.
attributes:
  skills: '["Statistical analysis (R, Python)", "Experimental design and methodology", "Scientific writing and peer review", "Data visualization", "Digital photography", "Graphic illustration", "Mentoring
    and STEM outreach", "Interdisciplinary research synthesis", "Community workshop facilitation", "Critical thinking and problem solving"]'
  hobbies: '["Visiting art galleries and museums", "Nature photography", "Hiking in Catoctin State Park", "Reading science‑fiction and historical non‑fiction", "Family genealogy research", "Volunteering
    for community STEM workshops", "Digital illustration", "Gardening and herb cultivation", "Journaling and reflective writing", "Knitting and craft projects"]'
  career_goals: Although retired from formal employment, Yolanda aims to channel her expertise into community impact. She envisions launching a STEAM after‑school program in Frederick County that blends
    hands‑on science experiments with art projects, particularly encouraging girls of color to explore scientific careers. She also hopes to curate a traveling exhibition that juxtaposes local natural history
    with contemporary African‑American art, and to author a memoir that interweaves her professional journey with her family’s cultural legacy. In the long term, she aspires to serve as an advisory mentor
    for regional schools and to contribute to the preservation of African‑American histories in local museums.
