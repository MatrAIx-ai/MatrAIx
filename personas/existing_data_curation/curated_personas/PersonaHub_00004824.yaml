persona_description: A geologist who specializes in the study of sedimentary rocks, particularly the formation and distribution of sandstone and shale. Her research interests include, but are not limited
  to, the history and evolution of the Mississippi River delta, the impact of subsidence on the city of New Orleans, and the potential for future subsidence in the region. She has a deep understanding of
  the dynamic ecology of the Mississippi River Delta and is well-versed in the latest research and techniques in subsidence management. Her expertise in sedimentary rock formation and distribution makes
  her uniquely qualified to address the challenges posed by the sinking city of New Orleans.
