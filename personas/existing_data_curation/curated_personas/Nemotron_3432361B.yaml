  career_goals: Deborah aims to transition from senior auditor to audit manager within the next three years, leveraging her data‑analytics expertise to lead innovative audit projects. Her long‑term ambition
    is to become a partner at a major public‑accounting firm or move into a CFO role at a mid‑size technology company in San Diego, where she can integrate sustainability reporting and advanced analytics
    into financial strategy. She plans to obtain the Certified Internal Auditor (CIA) credential to broaden her expertise in internal audit, and she is committed to mentoring junior staff, reflecting her
    competitive drive to be a recognized leader while maintaining work‑life balance for her family.
