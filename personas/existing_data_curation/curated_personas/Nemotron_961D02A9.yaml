personas:
  professional: Sally Johnson, a 49‑year‑old multilingual interpreter and project manager, blends rigorous simultaneous and consecutive interpreting expertise with a flair for literary translation, leveraging
    CAT tools like SDL Trados while leading culturally nuanced art exhibitions and fostering collaborative teams through their imaginative, organized, and sociable style.
  sports: Sally Johnson energizes their mornings with sunrise yoga on the Miami Beach shoreline, joins a local paddle‑boarding club at Biscayne Bay, and passionately supports the Miami Heat, Miami Dolphins,
    and the Florida Panthers, while occasionally participating in a community garden fitness challenge.
  arts: Sally Johnson immerses themselves in contemporary art by attending weekly gallery openings featuring artists like Yayoi Kusama and Kerry James Marshall, engages in watercolor and collage workshops,
    reads poetry from Ocean Vuong and Tracy K. Smith, and shines in community theater productions where they interpret classic monologues with a nuanced, bilingual flair.
  travel: Sally Johnson prefers cultural immersion trips that blend art and language, having explored Barcelona’s Gothic Quarter, Buenos Aires’ literary cafés, and the Florida Keys’ marine museums, they
    plan future journeys to Oaxaca for culinary festivals and Paris for museum residencies, all while balancing family commitments and a moderate travel budget.
  culinary: Sally Johnson delights in cooking fresh ceviche with lime, cilantro, and a hint of jalapeño, perfecting paella with saffron and locally caught shrimp, and relishes avocado toast topped with
    feta and microgreens, though they sometimes indulge in nightly espresso at a downtown art‑café.
  core: Sally Johnson, a 49‑year‑old bilingual interpreter with a love for art, community, and balanced living, blends meticulous professionalism with spontaneous creativity, often juggling yoga, karaoke,
    and a penchant for impromptu poetry readings.
background:
  cultural: Born and raised in the United States to a family with roots in the Mid‑Atlantic region, Sally identifies as white American with Irish‑English ancestry. Growing up in suburban Florida, she was
    exposed early to the state’s multicultural environment, especially the vibrant Latin American community in Palm Beach County. This exposure sparked her interest in Spanish language and culture, which
    she pursued through formal study and community immersion. While she embraces broad American cultural values of individualism and optimism, she also appreciates the Southern hospitality and the multicultural
    tapestry of South Florida, informing her inclusive approach to communication and translation.
attributes:
  skills: '[''Simultaneous interpreting (Spanish‑English)'', ''Consecutive interpreting (French‑English)'', ''Literary translation (poetry, fiction)'', ''Cultural mediation for art events'', ''Project management
    for translation projects'', ''Computer‑assisted translation tools (SDL Trados, MemoQ)'', ''Public speaking and workshop facilitation'', ''Creative writing and editing'', ''Community outreach and language
    education'']'
  hobbies: '[''Reading contemporary poetry and experimental fiction'', ''Attending gallery openings and museum tours'', ''Participating in community theater and karaoke'', ''Volunteering as a language mentor
    at senior centers'', ''Facilitating language exchange meet‑ups'', ''Practicing yoga on the beach'', ''Paddle‑boarding'', ''Gardening'', ''Exploring watercolor and collage art projects'', ''Hosting multicultural
    storytelling sessions'']'
  career_goals: She aims to become a senior lead interpreter for high‑profile art and cultural events in South Florida, eventually establishing her own boutique translation agency that focuses on literary
    and artistic works. Sally plans to obtain certification as a Certified Translator and pursue specialized training in audiovisual translation to expand into film and theater subtitling. She also aspires
    to design community language‑art workshops that blend translation practice with creative expression, positioning herself as a cultural bridge between Florida’s diverse linguistic communities. Long‑term,
    she hopes to author a bilingual anthology of contemporary poetry, showcasing her translation skill and artistic sensibility.
