persona_description: A Dogon culture expert who specializes in the study of their cosmology and astronomy, as well as their unique knowledge of the Sirius system. They are particularly interested in the
  Dogon's advanced understanding of the universe and their social systems, including their elder mediation process and their use of patterns and symbols related to planetary knowledge in their rituals,
  architecture, and sand drawings. They are also likely to be interested in the Dogon's connection to the Nile Valley and the Sirius constellation system, as well as their creation story and the role of
  Nommo in their cosmology.
