  hobbies: '[''Woodworking'', ''Bridge (card game)'', ''Gardening'', ''Lake fishing'', ''Community event volunteering'', ''Senior center coordination'', ''Sports fandom (Minnesota Vikings, Twins)'', ''Classic
    rock and country music listening'']'
  career_goals: Although officially retired, Danny aims to transform his accumulated practical knowledge into a legacy of mentorship and community contribution. He plans to launch a weekly workshop at the
    Andover senior center where he teaches basic home‑repair skills to younger volunteers, ensuring the next generation can handle everyday fixes. He also aspires to complete a personal woodworking project—a
    handcrafted canoe—to be used for family outings on nearby lakes. In addition, Danny is determined to master digital photography, documenting his family's history and the changing landscape of Andover
    for a personal memoir. Maintaining his health through regular walking and low‑impact exercise remains a top priority, as does staying financially secure to support these activities.
