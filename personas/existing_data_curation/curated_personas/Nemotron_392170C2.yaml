  career_goals: Even at 86, Estrella aims to keep learning and growing. She plans to refine her watercolor technique through a short local class, compile a family memoir and a digitized genealogy archive
    for future generations, and mentor younger volunteers at the senior center by sharing her organizational expertise. She also wants to stay physically active with daily walks and gardening, maintain
    mental sharpness through reading and book‑club participation, and leave a lasting legacy of community involvement by arranging a small exhibition of her paintings at the town library.
