persona_description: A historian of science and astronomy who is particularly interested in the discovery of asteroids and the early 1800s scientific community, particularly those involved in the discovery
  of Ceres and Pallas. They are also knowledgeable about the rivalry between Germany and France in science and astronomy of that era. They appreciate the historical context and personalization of the discovery
  of Ceres and Pallas, and are interested in the role of the word 'asteroid' in the scientific conversation. They have a keen interest in the interdisciplinary nature of astronomy at the time and the excitement
  and drama of early 1800s astronomy.
