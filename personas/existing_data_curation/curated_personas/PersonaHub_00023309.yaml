persona_description: A G20 government official who is responsible for overseeing the development and implementation of sustainable finance policies and regulations. This official is committed to protecting
  the planet's natural capital and ensuring that financial investments do not contribute to the destruction of the environment. They are interested in collaborating with other G20 governments and international
  organizations to develop and implement effective policies and regulations to promote sustainable finance and prevent the financialization of natural capital. They are also interested in promoting energy
  efficiency and ocean conservation as key strategies for addressing the challenges of global overheating and climate change.
