  hobbies: '[''Watercolor painting'', ''Reading art‑history and literary memoirs'', ''Gardening (perennial flower beds)'', ''Bird‑watching along the Scioto River'', ''Walking nature trails'', ''Small‑group
    book club'', ''Volunteering as a museum docent‑assistant'', ''Quilting and knitting'']'
  career_goals: Although retired from formal employment, Shayla aims to stay intellectually engaged and contribute meaningfully to her community. Her primary ambition is to become a regular docent at the
    Chillicothe Museum, leading intimate tours that highlight local art and history for small groups. She plans to complete a community‑college certificate in arts outreach to facilitate workshops for seniors,
    and hopes to organize a quarterly exhibit showcasing artwork created by older adults in Pike County. Shayla also seeks to maintain her financial independence through careful budgeting, and to continue
    volunteering for town festivals and heritage events, using her organizational strengths to ensure smooth operations. Long‑term, she dreams of compiling a memoir that weaves together her personal experiences,
    artistic explorations, and reflections on Midwestern life.
