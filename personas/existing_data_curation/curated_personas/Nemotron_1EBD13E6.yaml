personas:
  professional: Shayla Giles, a retired administrative coordinator turned museum docent‑assistant, leverages their meticulous budgeting skills, love of art‑history, and quiet empathy to design intimate
    tours and small‑scale exhibition events for seniors in Pike County.
  sports: Shayla Giles enjoys low‑impact fitness through bird‑watching hikes along the Scioto River trail, participates in a weekly senior walking group, and regularly watches the Columbus Blue Jackets
    and Cincinnati Reds from their living room on game nights.
  arts: Shayla Giles spends Sundays painting watercolor river scenes inspired by Monet, devours art‑history books on Dadaist movements, and visits the Chillicothe Civic Center’s rotating exhibits featuring
    works by Georgia O'Keeffe and local folk artists.
  travel: Shayla Giles prefers thoughtfully curated weekend getaways, such as a garden‑tour of the Biltmore Estate in Asheville and a quiet retreat at Lake Erie’s Cedar Point Peninsula, while dreaming of
    a pilgrimage to the tulip fields of Holland each spring.
  culinary: Shayla Giles loves to incorporate garden harvests into simple Mediterranean dishes, often preparing ratatouille with heirloom tomatoes, fresh basil, and goat cheese, yet they admit to over‑indulging
    in sweet tea at community picnics and hoarding specialty spices for future craft evenings.
  core: Shayla Giles blends quiet curiosity with methodical organization, turning solitary art and gardening pursuits into community‑focused cultural stewardship, even as worry and a habit of coupon hoarding
    keep life lively.
background:
  cultural: Shayla was raised in a small Midwestern town in Ohio, embodying traditional White American (Anglo‑American) values of modesty, self‑reliance, and community involvement. Her upbringing emphasized
    family ties, church participation, and local heritage celebrations, fostering a deep respect for harmony and cooperation. The cultural fabric of rural Ohio, with its focus on practicality, stewardship
    of the land, and a strong sense of neighborly duty, shapes her organized, considerate demeanor. At the same time, exposure to local historical societies and regional art institutions nurtured her appreciation
    for cultural preservation and artistic expression. These influences collectively inform her commitment to quiet service, thoughtful creativity, and a desire to maintain connections with her community’s
    past and present.
attributes:
  skills: '[''Event coordination for community groups'', ''Personal and volunteer budgeting'', ''Organizational record‑keeping'', ''Basic computer skills (Microsoft Office, email, digital photo archiving)'',
