  hobbies: '["Cooking Salvadoran dishes","Yoga and meditation","Nature walks","Urban photography","Reading historical fiction","Documentary watching on sustainable design","DIY home improvement projects","Crocheting"]'
  career_goals: In the short term, Justine aims to obtain OSHA 30‑hour certification and a forklift operator license, positioning herself for a foreman role within the next two years. She plans to enroll
    in a bachelor’s program in construction management to build on her associate’s degree and on‑the‑job experience, ultimately moving into project supervision. Long‑term, she hopes to launch a community‑focused
    construction cooperative that provides hands‑on training for young people from Salvadoran and other immigrant backgrounds, emphasizing environmentally responsible building practices. Recognizing her
    tendency toward worry, she intends to adopt more structured time‑management and stress‑reduction techniques to maintain a balanced, low‑stress professional life while still valuing the flexibility she
    enjoys.
