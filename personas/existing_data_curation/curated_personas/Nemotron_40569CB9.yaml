personas:
  professional: Justine Diaz is a pragmatic construction craftsman with five years of on‑site experience in concrete mixing, framing, and demolition, and they channel a curiosity for sustainable building
    materials into every job while diligently pursuing OSHA 30‑hour certification and a forklift license, even as their natural tendency to worry pushes them to double‑check safety protocols and over‑plan
    site inspections.
  sports: Justine Diaz enjoys gentle yoga sessions at a downtown DFW studio and solitary nature walks in Klyde Warren Park, while cheering on the Dallas Cowboys in the fall and the Dallas Mavericks during
    basketball season, and they occasionally join a weekend recreational softball league with coworkers for a light cardio boost.
  arts: Justine Diaz captures the geometric rhythm of Dallas skylines through a Canon EOS, drawing inspiration from photographers like Edward Burtynsky and Henri Cartier‑Bresson, while unwinding with historical
    fiction by Hilary Mantel and the mellow folk tones of Bon Iver, and they regularly attend community art shows featuring local muralists.
  travel: Justine Diaz favors low‑key, self‑planned trips that blend architecture tours with outdoor hikes, having already explored the historic districts of Austin and the desert trails of Santa Fe, and
    they dream of a sustainable‑design pilgrimage to Copenhagen and a rugged adventure in Patagonia, though their worry about logistics often leads them to over‑pack and double‑check every reservation.
  culinary: Justine Diaz delights in crafting homemade pupusas filled with melty cheese and refried beans, steaming tamales wrapped in banana leaves, and crisp yuca frita, often sourcing fresh corn masa,
    ripe plantains, and local cilantro from the farmer's market, and they enjoy hosting intimate dinner nights where friends appreciate the blend of traditional flavors and sustainable, zero‑waste cooking
    techniques.
  core: Justine Diaz is a meticulous on‑site builder who fuses a passion for eco‑friendly construction and soulful home‑cooked meals with a chronic tendency to over‑worry and an occasional habit of misplacing
    their keys during busy days.
background:
  cultural: Justine grew up in a Salvadoran immigrant family in Garland, Texas. Her parents emigrated from San Salvador in the early 1990s, bringing strong values of familismo, respect for elders, and a
    deep connection to community and Catholic traditions. Bilingual in Spanish and English, she frequently serves as a bridge between her family and the broader community, helping newer immigrants navigate
    local services. Celebrations such as Día de los Muertos and the fiestas de fin de año are central to her household, and the flavors of Salvadoran cuisine remain a daily touchstone. This heritage informs
    her cooperative spirit, her focus on harmony, and her desire to give back to the Salvadoran diaspora through mentorship and community projects.
