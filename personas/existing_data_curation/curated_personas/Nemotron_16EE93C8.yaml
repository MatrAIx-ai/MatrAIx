  career_goals: Although retired, Joshua aims to remain physically active and mentally engaged. He plans to complete a memoir of his life in North Freedom, document his family's genealogy, and continue
    volunteering as a mentor for youth programs at the local church. He also hopes to maintain his health through regular walking and gardening, and to support his wife by managing household finances and
    ensuring their home stays well‑maintained.
