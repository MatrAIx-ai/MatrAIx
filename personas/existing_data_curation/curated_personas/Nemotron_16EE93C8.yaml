personas:
  professional: Joshua Antantis, a retired residential carpenter and volunteer coordinator, blends decades of hands‑on woodworking, budgeting, and record‑keeping with his preference for structure and community
    harmony, leading the town's historical society and mentoring youth through organized projects while lovingly crafting furniture and model‑train displays, and they take pride in every nail hammered as
    a testament to reliability.
  sports: Joshua Antantis, an avid fisherman at Lake Barstow and regular hiker on Sauk County trails, cheers for the Green Bay Packers and follows the Milwaukee Brewers, maintains membership in the Barstow
    Anglers fishing club and the North Freedom Senior Walking Club, and keeps fit with daily walks and occasional light calisthenics, while they enjoy the mental challenge of a weekly bridge tournament.
  arts: Joshua Antantis, a devoted member of the North Freedom historical society, spends evenings listening to folk legend Arlo Guthrie, attending performances by the Milwaukee Symphony Orchestra, and
    reading works by local historian Mary Jane Colby, letting these cultural threads inspire his model‑train layouts and handcrafted birdhouses.
  travel: Joshua Antantis, a careful planner who maps out road trips on a printed atlas, has driven the historic Route 66 to see antique train stations, visited Badlands National Park for its rugged vistas,
    and hopes to explore the historic villages of New England during the upcoming summer, all while balancing travel costs with his fixed pension, and they carefully track each expense in a travel ledger.
  culinary: Joshua Antantis, a home cook who loves Midwestern comfort food, regularly prepares chicken pot pie, honey‑glazed pork chops, fresh corn succotash from his garden, and warm apple crumble, often
    seasoning with sage and using home‑grown tomatoes for sauces, and they love sharing these meals with friends and family during community gatherings.
  core: Joshua Antantis is a methodical, garden‑to‑table retiree who balances meticulous budgeting with occasional splurges on model‑train parts, tends to forget his medication after long hours in the workshop,
    and finds solace in preserving his town’s history.
background:
  cultural: Joshua grew up in a mid‑western, white, largely German‑Scandinavian community in central Wisconsin. He was raised in a Lutheran household that emphasized hard work, modesty, community service,
    and family cohesion. The local culture of North Freedom values self‑reliance, neighborly assistance, and a strong connection to the land, which have shaped his practical outlook and cooperative nature.
    He maintains these cultural traditions through participation in church activities, local festivals, and preserving family recipes.
