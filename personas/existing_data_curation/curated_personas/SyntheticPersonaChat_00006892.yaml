    User 2: Yeah, I love it. It clears my head.

    User 1: And national parks are so beautiful. I love going hiking in them.

    User 2: I know, right? They''re the best.

    User 1: So, what are your plans for the weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to go hiking in a national park.

    User 2: That sounds like fun! I wish I could join you.

    User 1: Maybe next time.

