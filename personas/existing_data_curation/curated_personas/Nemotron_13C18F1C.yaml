  hobbies: '[''Knitting'', ''Quilting'', ''Gardening'', ''Baking breads and pies'', ''Food preservation (canning and jam making)'', ''Reading historical novels'', ''Walking along the Fox River'', ''Small‑group
    Bible study'', ''Craft circles'', ''County‑fair competitions (baking, gardening)'']'
  career_goals: Jacqueline intends to earn her GED within the next two years through evening classes at the local community college, seeing the credential as a gateway to part‑time, purpose‑driven work.
    Her short‑term ambition is to become a community‑garden coordinator for Outagamie County, where she can apply her gardening expertise and organizational skills. Simultaneously, she plans to launch a
    modest home‑based venture selling homemade preserves, baked goods, and hand‑crafted quilts at farmers’ markets and church fairs. Over the longer term, Jacqueline hopes to gain certification as a caregiver
    and offer workshops on budgeting, home‑care, and sustainable living to other women in her area, establishing herself as a trusted resource for practical self‑reliance within her community.
