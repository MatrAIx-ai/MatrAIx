  career_goals: Tung aims to evolve from a senior DBA into a lead data architect overseeing large‑scale, cloud‑based data platforms for fast‑growing tech startups in the Bay Area. He plans to acquire advanced
    certifications such as the Google Professional Data Engineer and the Oracle Certified Master to deepen his strategic expertise. Over the next five years, he wants to lead a cross‑functional data engineering
    team, drive the adoption of automated data governance frameworks, and contribute to open‑source database projects. Tung is also motivated to mentor a pipeline of junior engineers, fostering a collaborative
    culture that balances high performance with well‑being. Ultimately, he envisions a role where he can shape enterprise data strategy while championing resilient, secure, and cost‑efficient architectures.
