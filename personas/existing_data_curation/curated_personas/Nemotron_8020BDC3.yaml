personas:
  professional: Cedric Keyton is a methodical HVAC/R mechanic whose knack for integrating Arduino-driven automation into heating and cooling systems fuels their pursuit of NATE master certification, and
    they envision a future of running a sustainable, minority‑owned contracting firm that mentors apprentices.
  sports: Cedric Keyton hits the Dallas‑area basketball courts for pick‑up games, supports the Mavericks and Cowboys, and maintains a membership at a local CrossFit gym where they focus on strength training
    and flexibility to keep their game sharp.
  arts: Cedric Keyton’s evenings are often soundtracked by Miles Davis, B.B. King, and H.E.R. while they assemble model airplane kits and devour sci‑fi novels by Isaac Asimov, a blend that fuels their creative
    problem‑solving and quiet introspection.
  travel: Cedric Keyton prefers carefully planned weekend getaways that balance adventure with relaxation, such as fishing trips to Lake Ray Hubbard, road trips to Austin’s live‑music scene, and a long‑planned
    pilgrimage to Japan’s Akihabara district, where they aim to explore cutting‑edge maker culture.
  culinary: Cedric Keyton enjoys mastering Southern‑style grilling, regularly smoking brisket with hickory chips, pairing it with collard greens, cornbread, and shrimp‑and‑grits, while they experiment with
    an Arduino‑controlled grill thermometer to perfect temperature precision.
  core: Cedric Keyton is a curious, organized HVAC tech who blends a love for smart‑home tinkering, solo jazz sessions, and disciplined budgeting into a steady pursuit of a future eco‑focused contracting
    business, even if they sometimes over‑order parts they never use.
background:
  cultural: Cedric grew up in a close‑knit African‑American community in Dallas, where family gatherings, church involvement, and neighborhood solidarity shaped his values. Traditions such as Sunday potlucks,
    gospel music, and celebrating Juneteenth reinforced his cultural pride and sense of responsibility to give back. The Southern Texas environment introduced him to barbecue, blues, and the importance
    of resilience in a hot climate, influencing both his career choice in HVAC and his personal hobbies. He carries forward a legacy of hard work, mutual support, and a dedication to uplifting the next
    generation of Black tradespeople in the region.
attributes:
  skills: '[''HVAC system diagnostics'', ''EPA‑certified refrigerant handling'', ''Installation of split and central AC units'', ''Duct design and installation'', ''Electrical wiring and schematic interpretation'',
    ''Smart thermostat configuration'', ''Energy efficiency optimization'', ''Preventive maintenance planning'', ''Customer communication'', ''Technical documentation'']'
  hobbies: '[''Arduino home‑automation projects'', ''Pick‑up basketball'', ''Jazz, blues, and contemporary R&B listening'', ''Science‑fiction reading'', ''Fishing at Lake Ray Hubbard'', ''Model airplane
    construction'', ''Cooperative video gaming'', ''Southern‑style cooking and grilling'', ''Gym strength training'', ''Community youth mentorship'']'
  career_goals: Cedric aims to become a NATE‑certified master technician within the next three years, followed by obtaining Energy Star specialist credentials to lead energy‑efficient retrofits in Dallas’
    growing commercial market. He plans to pursue an associate degree in HVAC technology part‑time to broaden his theoretical knowledge. Long‑term, Cedric envisions launching his own small‑scale, minority‑owned
    contracting firm focused on sustainable cooling solutions, while mentoring apprentices from his community and contributing to local workforce development initiatives.
