  career_goals: Tyrone is focused on advancing into retail leadership while preserving his passion for creativity and community. In the short term, he aims to earn a store‑manager promotion within the next
    two years, complemented by a retail management certification and part‑time coursework toward an MBA with an entrepreneurship concentration. Over the longer horizon, he aspires to launch his own boutique‑gallery
    that merges curated lifestyle products with works by emerging Black artists, creating a cultural hub in his home community. He also hopes to develop a mentorship program within his current employer
    to support the professional growth of underrepresented staff members, leveraging his experience as a trainer and his commitment to cooperative yet assertive leadership.
