  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting and crocheting'', ''Cooking and baking'', ''Walking in local parks'', ''Church and community gatherings'', ''Genealogy research'',
    ''Crossword puzzles'', ''Listening to classic music'', ''Volunteering as a reading buddy'']'
  career_goals: Although retired from formal employment, Jeannie aims to deepen her impact as a volunteer leader at the local senior center. She aspires to mentor younger volunteers, organize health‑and‑wellness
    workshops, and spearhead a community garden that supplies fresh produce to neighborhood seniors. Additionally, she hopes to become more comfortable with emerging digital tools—such as video‑conferencing
    and online health portals—to better assist peers in navigating online resources. Her overarching ambition is to foster a supportive, harmonious environment for older adults in North Bergen.
