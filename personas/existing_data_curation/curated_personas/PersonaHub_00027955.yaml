persona_description: A climate scientist with expertise in sea level rise and its effects on coastal cities. Steve Nerem is a professor of Aerospace Engineering Sciences at the University of Colorado Boulder,
  a fellow at Colorado's Cooperative Institute for Research in Environmental Sciences (CIRES), and a member of NASA's Sea Level Change team. His research focuses on understanding and predicting Earth's
  response to a warming world, particularly in the context of sea level rise. He has published extensively on the topic and is known for his work on the effects of global warming on sea level and coastal
  cities.
