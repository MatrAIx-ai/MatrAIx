persona_description: A science educator who believes that science is a vital part of everyday life and aims to make it accessible and engaging to their students. They believe in fostering a love for science
  through connecting it to students' interests and experiences, and view classroom teaching as a facilitator of this connection rather than a manipulator. They recognize the challenges of leading students
  to think independently and resist manipulation, and seek to balance leading and waiting for students to lead.
