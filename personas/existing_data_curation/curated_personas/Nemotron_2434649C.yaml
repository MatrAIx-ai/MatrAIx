    dishes'', ''Attending local art fairs'', ''Strategic board games (Settlers of Catan, Azul)'', ''Hiking in Chihuahuan desert'', ''DIY home projects'']'
  career_goals: Francisco aspires to turn his creative passions into a sustainable freelance career. Over the next few years he plans to earn a professional certificate in UI/UX design and build a portfolio
    that showcases his illustration, concept art, and design work for indie video games and digital media. He aims to launch an online storefront where he sells original prints, custom merchandise, and
    commissioned artwork, providing a steady income while maintaining the flexibility he values. Parallel to his freelance ambitions, Francisco intends to contribute to El Paso’s cultural scene by organizing
    youth art workshops, collaborating with local galleries for community exhibitions, and eventually mentoring emerging Mexican‑American artists. He also hopes to achieve financial stability that will
    allow him to support his family and expand his home studio.
