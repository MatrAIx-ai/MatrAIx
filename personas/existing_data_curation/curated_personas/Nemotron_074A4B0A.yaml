  hobbies: '[''Softball (community league)'', ''Youth Soccer Coaching'', ''Fishing on Lake Michigan'', ''Attending Sheboygan County Fair'', ''Oostburg Community Festivals'', ''DIY Home Improvement'', ''Grilling
    and BBQ experimentation'']'
  career_goals: Thomas aims to advance from his current role as a market research analyst to a senior research manager within the next five years, leading a team that delivers reliable, data-driven insights
    for regional businesses. He aspires to become a trusted point of contact for small‑to‑mid‑size companies in Wisconsin, helping them craft targeted marketing strategies while maintaining the structured,
    routine‑oriented work environment he values. Long‑term, he envisions establishing his own boutique consulting firm that specializes in community‑focused market research, allowing him to blend his expertise
    with his passion for engaging with local audiences and supporting family‑owned enterprises. Throughout his career progression, he seeks a balanced work‑life integration that honors his commitment to
    his marriage and community involvement.
