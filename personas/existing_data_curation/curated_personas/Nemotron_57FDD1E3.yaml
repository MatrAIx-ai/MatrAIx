personas:
  professional: Jessica Artiles, a 23‑year‑old aircraft maintenance technician, blends a meticulous, structured approach with hands‑on expertise in airframe and powerplant diagnostics, leveraging bilingual
    communication to streamline FAA‑compliant inspections and maintain precise inventory records while they aim for A&P certification and a future supervisory role.
  sports: Jessica Artiles, an avid weight‑lifter and runner, trains at CrossFit 360 and the Phoenix Road Runners Club, follows the Arizona Diamondbacks and the Los Angeles Rams for inspiration, and structures
    their weekly workouts with the same rigor they apply to maintenance schedules, often timing runs to coincide with early‑morning flight‑sim sessions.
  arts: Jessica Artiles finds creative release in building scale model aircraft and enjoys listening to John Williams' orchestral scores, the Foo Fighters' rock anthems, and attending live performances
    of the local community theater's production of "Avenue Q," all of which feed their appreciation for narrative precision and technical artistry.
  travel: Jessica Artiles plans trips with spreadsheet‑level detail, favoring aviation‑centric destinations like the Smithsonian National Air and Space Museum in Washington D.C., the historic plane‑spotting
    cliffs of La Jolla, California, and occasional weekend getaways to Sedona, Arizona for hiking, while they prioritize budgeting travel to professional development workshops over leisure.
  culinary: Jessica Artiles, an intermediate home cook, relishes preparing traditional dishes such as chiles en nogada, pozole, and tamales, expertly seasoning with dried pasilla chilies, epazote, and masa
    harina, while they experiment with fusion twists like smoked chipotle‑infused guacamole and pair meals with craft cerveza from local breweries.
  core: Jessica Artiles, a 23‑year‑old aviation enthusiast, channels their competitive drive and love for structure into flawless aircraft maintenance, disciplined fitness, meticulous budgeting, and a knack
    for perfecting tacos, all while they occasionally hoard spare parts they can’t resist cataloguing.
background:
  cultural: Jessica grew up in a bicultural Mexican‑American household in Los Angeles, where both English and Spanish were spoken at home. Her family maintains strong ties to Mexican traditions, celebrating
    holidays such as Día de los Muertos and sharing regional cuisine from Oaxaca and Yucatán. While she embraces the vibrant multicultural atmosphere of LA, she also values the Mexican emphasis on family
    closeness, respect, and community service. This cultural foundation influences her interpersonal style—she is courteous yet self‑reliant, and she actively seeks to give back to her community through
    mentorship programs for Hispanic youth interested in aviation.
attributes:
  skills: '["Aircraft airframe inspection and repair", "Powerplant maintenance", "Avionics troubleshooting and repair", "FAA regulatory compliance and documentation", "Diagnostic equipment operation", "Precision
    measurement and calibrations", "Maintenance management software proficiency", "Bilingual technical communication (English/Spanish)", "Inventory control and parts ordering", "Safety procedures and hazard
    mitigation"]'
  hobbies: '["Scale model aircraft building", "Flight simulation gaming", "Weight training and running", "Cooking traditional Mexican cuisine", "Volunteering at STEM workshops for youth", "Attending airshows
    and aviation meet‑ups", "Salsa dancing", "Reading aviation history"]'
  career_goals: Jessica aims to earn her FAA Airframe and Powerplant (A&P) certification within the next 12 months, followed by advanced avionics and composite repair certifications. She aspires to become
    a lead maintenance technician and eventually a maintenance supervisor at a major airline or MRO, overseeing a team and ensuring the highest safety standards. In the longer term, she hopes to launch
    her own aviation maintenance business focused on serving regional carriers and offering mentorship programs for underrepresented groups, particularly Hispanic women, in the aerospace industry.
