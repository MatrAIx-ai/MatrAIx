  career_goals: Over the next three years, Yi plans to earn a Bachelor’s degree in Business Management from Fresno State while continuing his supervisory role. He aims to acquire the Certified Administrative
    Professional (CAP) credential and leverage his data‑driven approach to secure an Office Manager position within two years. Long‑term, he aspires to become a Regional Operations Manager for a technology
    or logistics firm, overseeing multiple sites and driving cross‑functional efficiency. Ultimately, Yi envisions founding his own consultancy that helps businesses optimize office processes and navigate
    multicultural team dynamics, combining his competitive drive with his expertise in structured operations.
