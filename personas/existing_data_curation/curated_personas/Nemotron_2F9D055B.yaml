personas:
  professional: Sherry Usewicz is an energetic personal‑care aide in Harford County who blends their caregiving expertise with a flair for the arts, designing bespoke activity plans that weave abstract
    painting and storytelling into daily routines while leveraging their improvisational problem‑solving and competitive drive to consistently surpass client‑satisfaction metrics and pursue a supervisory
    position.
  sports: Sherry Usewicz stays active through weekend hikes in Susquehanna State Park, weekly Latin‑dance classes, and cheering for the Baltimore Ravens and Orioles, while occasionally joining the local
    “Harford Trailblazers” running club for 5K training sessions, reflecting their sociable and energetic outlook on fitness.
  arts: Sherry Usewicz channels their imaginative curiosity into abstract canvases inspired by Mark Rothko, sketches of Baltimore street scenes after attending gallery openings featuring Njideka Akunyili‑Crosby,
    and lively performances with the community improv troupe The Unscripted Circle, while often listening to Bob Dylan and diving into speculative fiction by N.K. Jemisin for additional creative fuel.
  travel: Sherry Usewicz favors spontaneous weekend getaways, often road‑tripping to Annapolis’ historic waterfront, the artistic enclave of Gettysburg, or the vibrant jazz scene of New Orleans, while dreaming
    of a future European art pilgrimage to Berlin and Vienna, all balanced against a modest travel budget that prefers affordable B&Bs and shared rides.
  culinary: Sherry Usewicz relishes mixing traditional Chesapeake crab cakes with a bold twist of smoked paprika and mango salsa, while experimenting at home with sourdough lavender biscuits, kimchi‑infused
    tacos, and rosemary‑roasted sweet potatoes, often sourcing fresh herbs from the farmer’s market and occasionally over‑seasoning in their enthusiasm for culinary novelty.
  core: Sherry Usewicz is a 36‑year‑old, art‑infused caregiver whose competitive streak drives top client scores, yet their love of spontaneous creativity sometimes leaves them with a scattered schedule
    and a habit of misplacing sketchbooks and coffee mugs.
background:
  cultural: Sherry comes from a white, American background rooted in the Mid‑Atlantic region. Her family traces its ancestry to Central European (German‑Polish) immigrants who settled in Maryland in the
    early 20th century, bringing values of hard work, modesty, and community participation. Growing up in the suburban environment of Bel Air, she was shaped by the close‑knit, small‑town culture of Harford
    County—regular county fairs, volunteer fire‑department events, and neighborhood potlucks. This upbringing instilled a strong sense of local civic pride, an appreciation for regional traditions, and
    an openness to diverse cultural activities, which now informs her inclusive approach to caregiving and her love for community‑based arts.
