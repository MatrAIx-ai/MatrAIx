  career_goals: Sherry aims to advance from personal‑care aide to a supervisory role in a home‑health agency, eventually earning a bachelor’s degree in nursing or health services administration. She envisions
    launching a small community program that fuses art‑therapy techniques with elder‑care, offering group workshops that boost mental well‑being while also generating supplemental income. Her competitive
    streak drives her to achieve top performance metrics, such as client satisfaction scores, and she hopes to be recognized as a leader in innovative, client‑centered care within Harford County.
