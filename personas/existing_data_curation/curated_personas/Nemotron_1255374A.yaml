  career_goals: Octavia aims to transform her street‑level artistic flair into a full‑time career as a professional muralist and interior‑finish specialist. She plans to earn a commercial painting certification,
    build a robust portfolio of community murals across Philadelphia, and eventually launch her own boutique studio that offers custom decorative services and art workshops for youth. Over the next five
    years, she hopes to collaborate with local arts organizations, secure public‑art commissions, and become a recognized voice for integrating cultural narratives into urban spaces.
