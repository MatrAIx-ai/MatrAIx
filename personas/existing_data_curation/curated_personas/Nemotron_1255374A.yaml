personas:
  professional: Octavia Hunter is a budding commercial painter and paperhanger who merges meticulous surface preparation with vivid mural design, leveraging their strong color theory sense and digital illustration
    skills to win client trust while juggling project estimates, safety compliance, and a relentless drive to turn every job site into a canvas.
  sports: Octavia Hunter stays active by joining the Philly Hoops Collective’s summer basketball league, jogging along the Schuylkill River Trail in the spring, and dancing to hip‑hop beats at community
    fitness classes, all while cheering for the Philadelphia Eagles, 76ers, and Phillies on game nights.
  arts: Octavia Hunter’s artistic life revolves around sketching the bold colors of Kehinde Wiley’s portraits, photographing the gritty textures of Banksy‑style street pieces, vibing to J. Cole and Megan
    Thee Stallion at community open‑mic nights, and curating digital illustrations inspired by Ai Weiwei’s sociopolitical installations.
  travel: Octavia Hunter prefers weekend getaways—exploring the mural‑laden streets of Baltimore’s Inner Harbor, snapping photos of monuments in Washington, D.C., and hiking the Blue Ridge Parkway near
    Asheville—while saving for a once‑in‑a‑lifetime trip to Mexico City’s vibrant street‑art districts, balancing meticulous budgeting with a love for spontaneous alley‑way discoveries.
  culinary: Octavia Hunter alternates between devouring a classic Philly cheesesteak with provolone and mastering vegan jackfruit bánh mì in the kitchen, often whipping up spicy shrimp tacos with fresh
    cilantro and lime, showcasing a decent cooking level that blends comfort food cravings with experimental plant‑based dishes.
  core: Octavia Hunter views every blank wall as a story waiting to be told, juggling a competitive edge with a contagious zest for community art, even if they sometimes over‑order paint samples and forget
    to stretch before a long day on the ladder.
background:
  cultural: Octavia is a second‑generation African‑American raised in West Philadelphia, a neighborhood rich in the legacy of the Great Migration and known for its dynamic Black cultural scene. Her family
    upholds traditions of gospel music, soul‑food Sunday gatherings, and oral storytelling that celebrate both African heritage and the community’s resilience. Growing up, she participated in local festivals,
    block parties, and citywide mural projects that honor Black history. This cultural tapestry fuels her artistic sensibility, inspiring her to weave themes of identity, empowerment, and community pride
    into her work.
