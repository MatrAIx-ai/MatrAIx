  career_goals: Revathi aims to complete her General Educational Development (GED) certificate within the next two years, followed by a vocational certificate in culinary arts focused on South Asian cuisine.
    She hopes to eventually launch a small home‑based catering service that provides familiar, comfort food to the local Indo‑Caribbean and Indian community in San Jose. While she values stability, she
    also wants the flexibility to manage her schedule around personal routines and occasional family commitments.
