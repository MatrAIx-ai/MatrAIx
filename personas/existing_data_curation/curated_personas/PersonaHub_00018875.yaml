persona_description: A federal agency official responsible for overseeing and implementing the national framework for early detection and rapid response (EDRR) to prevent the spread of invasive species.
  This individual is involved in the prevention, early detection, rapid response, control, and management of invasive species, as well as research related to invasive species. They work with states and
  tribes to build on existing programs and develop innovative and scientific approaches to EDRR. The persona is familiar with the principles of an EDRR framework, including preparedness, early detection,
  rapid assessment, and rapid response. They are knowledgeable about the criteria for determining priority landscapes and aquatic areas, and have experience sharing lessons learned with other agencies,
  partners, and stakeholders.
