  career_goals: Chong aims to obtain his Master Plumber certification within the next two years, positioning himself for a foreman role on larger commercial projects. He envisions eventually launching a
    modest, family‑run plumbing contracting business that emphasizes energy‑efficient solutions and reliable service. To support this ambition, he plans to complete a certification in LEED‑qualified plumbing
    systems and to attend workshops on business management and employee safety. Balancing his desire for financial security with his family responsibilities, he also seeks a stable schedule that reduces
    overtime, allowing more quality time at home while still advancing his professional reputation in the Bergen County trade community.
