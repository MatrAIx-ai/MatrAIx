  career_goals: Alexander aims to move into a supervisory or quality‑lead role within the next five years, seeking ASQ Certified Quality Engineer certification to formalize his expertise. He hopes to lead
    cross‑departmental improvement projects that enhance product safety while reducing workplace stress for his team. Additionally, he wants to develop a mentorship program for junior inspectors and contribute
    to community safety workshops, blending his professional ambition with his strong desire to help others.
