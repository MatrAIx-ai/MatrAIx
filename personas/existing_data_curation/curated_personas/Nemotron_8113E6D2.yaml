  hobbies: '["Historical biography reading", "Gardening", "Walking the Schuylkill River trail", "Macro photography", "Knitting", "Crossword puzzles", "Classical music listening"]'
  career_goals: Agatha aspires to transition into a senior leadership role, such as Director of Engineering, where she can champion the adoption of green building standards and oversee large‑scale, community‑focused
    infrastructure initiatives in the Philadelphia region. She is also dedicated to fostering the next generation of engineers through structured mentorship programs and plans to gradually shift toward
    a consulting capacity that allows her to balance professional impact with personal time before eventual retirement.
