persona_description: Raffles Davison was a British architect and editor of the British Architect and Northern Engineer magazine, known for his extensive collection of sketches and drawings. He was also
  an Honorary Associate of the Royal Institute of British Architects. Davison's career spanned over 40 years, during which he published numerous books and lectured on architectural design. He designed numerous
  private and business addresses and was involved in the merger of the British Architect and Northern Engineer with the Builder. Davison's work was recognized with an Honorary Associate of the Royal Institute
  of British Architects. His private and business addresses include 35 Bouvrie Street, Fleet Street, London, England, 1, St Peter's Square, Manchester, England, and 4, Catherine Street, Strand, London,
  England.
