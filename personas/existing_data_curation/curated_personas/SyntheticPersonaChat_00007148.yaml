    User 2: Me too! I love the energy of the night. It''s just more fun to be out and about when everyone else is asleep.

    User 1: I agree! I love going to concerts and dancing all night long.

    User 2: Me too! I love to dance and have fun.

    User 1: What kind of music do you like to listen to?

    User 2: I like all kinds of music, but I especially love rock and roll.

    User 1: Me too! I love the energy of rock music. It''s so much fun to dance to.

    User 2: Me too! I love to dance and have fun.

    User 1: What''s your favorite band?

    User 2: My favorite band is Queen. I love their music and their energy.

    User 1: Me too! Queen is one of my favorite bands too. They''re so talented.

    User 2: Me too! I love their music and their energy.

    User 1: I''m so glad we have something in common! I''d love to go to a concert with you sometime.

    User 2: Me too! That would be so much fun!'
