  hobbies: '[''Sketchbook drawing'', ''Urban photography'', ''Reading speculative fiction and design theory'', ''Yoga and mindfulness meditation'', ''Hiking in Santa Monica Mountains'', ''Experimental cooking
    (molecular gastronomy)'']'
  career_goals: He aims to become a lead architect known for pioneering sustainable, human‑centered design within the luxury residential market of Los Angeles. Over the next five years, he plans to obtain
    a senior position at a boutique firm where he can guide complex projects from concept to completion, integrating advanced parametric tools and net‑zero energy strategies. He also aspires to launch his
    own practice that prioritizes affordable housing collaborations with community NGOs, leveraging his technical expertise to create cost‑effective, resilient homes. Long‑term, he hopes to teach part‑time
    at a graduate architecture program and contribute scholarly articles on the intersection of technology, well‑being, and environmental stewardship.
