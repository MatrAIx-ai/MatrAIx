persona_description: A Renaissance sculptor and medalist who made significant contributions to the early development of the Renaissance style in France, particularly through his severely elegant portrait
  busts of women. His works are characterized by serene, detached dignity and reserve, and he created an ideal image of aristocratic elegance by reducing details to a minimum and concentrating on the essential
  geometry of forms harmoniously balanced, clearly and precisely carved. His style may be compared to that of Piero della Francesca, with whom he may have had a relationship.
