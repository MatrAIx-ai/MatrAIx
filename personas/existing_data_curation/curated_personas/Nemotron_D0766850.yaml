personas:
  professional: Marivic Nguyen, a 26‑year‑old retail sales specialist in Wichita, leverages bilingual English‑Vietnamese fluency, a curiosity for emerging fashion trends, and an improvisational, flexible
    mindset to exceed upselling targets, craft sustainable visual merchandising, and keep inventory under control despite occasional disorganization.
  sports: Marivic Nguyen stays active through sunrise yoga sessions with the Wichita Yoga Tribe, weekend hikes on the Cheney State Park trails, and cheering for the Kansas City Chiefs and Wichita State
    Shockers, while occasionally joining a casual intramural volleyball league.
  arts: Marivic Nguyen finds creative escape in mystery novels by Agatha Christie, the introspective indie melodies of Mitski, and the vintage fashion photography of Mario Testino, often hosting board‑game
    evenings that double as low‑key social art showcases.
  travel: Marivic Nguyen favors off‑the‑beaten‑path weekend getaways, such as a spontaneous road trip to Sedona’s red rocks and a carefully budgeted visit to Kyoto for its historic temples, balancing adventure
    with the need to keep travel costs low for future boutique plans.
  culinary: Marivic Nguyen experiments in the kitchen with aromatic phở broth using star anise, ginger, and fresh herbs, while also mastering a plant‑based quinoa bowl topped with roasted vegetables and
    a dash of sriracha, reflecting both a love for traditional flavors and modern health trends.
  core: Marivic Nguyen blends a curious, competitive spirit with a relaxed, slightly disorganized approach, turning bilingual retail expertise into a drive for sustainable fashion leadership while juggling
    thrift‑store hunts, yoga, and mystery novels.
background:
  cultural: Marivic is of Vietnamese descent, raised in a bilingual household where both Vietnamese and English were spoken. She celebrates Tet (Lunar New Year) and other Vietnamese customs with her family
    and participates in the local Vietnamese community events in Wichita. While honoring traditional values such as respect for elders and strong family ties, she embraces the independence and adaptability
    of American culture, which is reflected in her career ambitions and personal style. Her cultural heritage influences her culinary interests, fashion sensibility, and the desire to eventually infuse
    her professional work with elements of Vietnamese culture.
attributes:
  skills: '["Customer service", "Upselling and sales optimization", "Bilingual communication (English/Vietnamese)", "Inventory management", "Point‑of‑sale system operation", "Visual merchandising", "Basic
    digital marketing and social media", "Cash handling and reconciliation", "Conflict resolution", "Adaptability and improvisational problem solving"]'
  hobbies: '["Cooking Vietnamese cuisine", "Reading mystery novels", "Journaling", "Listening to tech and entrepreneurship podcasts", "Yoga", "Hiking local trails", "DIY crafts (knitting, candle making)",
    "Thrift‑store treasure hunting", "Board‑game nights with close friends"]'
  career_goals: Marivic aims to transition from front‑line sales to a managerial role within the next two years, targeting a store manager position that lets her lead a small team and shape the shop’s merchandising
    strategy. She plans to complete her bachelor’s degree in Business Administration while pursuing leadership training, with the long‑term ambition of becoming a district manager or opening her own boutique
    that blends contemporary fashion with Vietnamese cultural elements. Her competitive nature fuels a desire to consistently exceed sales targets and earn recognition for top‑performing stores.
