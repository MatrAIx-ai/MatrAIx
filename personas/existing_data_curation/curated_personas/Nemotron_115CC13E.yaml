  hobbies: '[''Abstract painting'', ''Mixed‑media collage'', ''Art fairs'', ''Speculative fiction reading'', ''Science book club'', ''Herb and wildflower gardening'', ''Jigsaw puzzles'', ''Birdwatching'',
