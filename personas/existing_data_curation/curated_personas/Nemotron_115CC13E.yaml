  career_goals: As she approaches retirement, Alana aims to transition from full‑time inspection to a mentorship role, offering part‑time consulting to small manufacturers in the South Elgin area. She also
    plans to deepen her involvement in the local arts community by leading workshops on abstract painting and volunteering as a docent at the Elgin History Museum. Additionally, she hopes to complete a
    community‑college course in digital photography to blend her technical eye with artistic expression and to document the regional industrial heritage for future generations.
