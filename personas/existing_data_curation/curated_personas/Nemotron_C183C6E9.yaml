  career_goals: Rupal aims to transition into senior technical leadership, championing sustainability initiatives within her company and guiding the development of energy‑efficient products. She plans to
    expand her influence by establishing a mentorship program for women and underrepresented groups in engineering, and she is pursuing an MBA to strengthen her strategic and business acumen. Long‑term,
    she envisions founding a consultancy that helps firms integrate green design practices while maintaining cost‑effectiveness, and she hopes to contribute to professional standards committees that shape
    the future of mechanical engineering.
