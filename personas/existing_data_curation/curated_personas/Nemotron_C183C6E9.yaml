personas:
  professional: Rupal Sankar is a veteran mechanical engineer who blends deep technical expertise in product design, finite element analysis, and thermal systems with a methodical, Lean‑Six‑Sigma mindset,
    leading cross‑functional teams, mentoring junior staff, and championing inclusive, sustainability‑focused initiatives while constantly balancing curiosity with practicality.
  sports: Rupal Sankar enjoys hiking the East Bay hills and participates in the Berkeley Walking Club, cheers on the Golden State Warriors and San Francisco 49ers, and occasionally joins a local senior
    pickleball league to stay active year‑round.
  arts: Rupal Sankar finds solace in listening to classical raga performances by Ravi Shankar, playing the sitar on quiet evenings, and attending jazz concerts featuring John Coltrane tributes, while their
    book club devotion to historical fiction fuels their creative storytelling.
  travel: Rupal Sankar prefers purposeful weekend getaways, planning hikes in Yosemite and wine tours in Napa Valley with a detailed itinerary, while dreaming of immersive cultural trips to Kyoto and Marrakech
    that balance adventure with the comfort of well‑researched logistics.
  culinary: Rupal Sankar delights in preparing aromatic festival dishes like biryani and samosa during Diwali and Eid, experimenting with fresh herbs from their garden, yet they admit to over‑seasoning
    occasionally and enjoying spontaneous visits to Berkeley's farmers' market for seasonal produce.
  core: Rupal Sankar is a meticulous engineer and community‑oriented gardener whose pragmatic curiosity, organized nature, and occasional over‑worry drive them to champion sustainable design while juggling
    spirited social commitments and the occasional indulgent splurge.
background:
  cultural: Rupal comes from a South Asian Muslim family with roots in the Indian subcontinent. Growing up, she was immersed in the values of education, respect for elders, and community service. Bilingual
    in English and Urdu, she maintains strong ties to her cultural community through mosque activities, cultural festivals, and cooking traditions. Living in Berkeley, she blends her heritage with the Bay
    Area’s diverse, progressive environment, embracing both the collective responsibility of her cultural upbringing and the individualistic ethos of her surroundings.
