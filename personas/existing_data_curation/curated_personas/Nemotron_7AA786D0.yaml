  career_goals: Hector aims to channel his technical expertise into community-focused roles. He plans to provide pro bono engineering consulting for local non‑profits, mentor high‑school students in STEM
    through small group workshops, and develop an online resource offering practical DIY home‑improvement guides for seniors. He also seeks to earn a sustainable design certification, author a guidebook
    on beginner woodworking projects, and maintain financial stability via modest freelance consulting. In the long term, he hopes to become a trusted advisor for local historical preservation initiatives,
    contributing his methodical planning skills to protect Mendham’s heritage.
