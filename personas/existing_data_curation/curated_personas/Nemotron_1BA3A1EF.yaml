  hobbies: '[''Hiking'', ''Nature photography'', ''Cooking experimental dishes'', ''Home cocktail mixing'', ''Strategy video gaming'', ''Online chess'', ''Listening to true-crime podcasts'', ''Reading investigative
    non-fiction'', ''Attending local music events'', ''Gardening'', ''Volunteering at county fairs'']'
  career_goals: Meredith aims to move beyond her current support role into a supervisory position within the hospitality sector. Over the next three years she plans to complete a bachelor’s degree in hospitality
    management, earn the Certified Food and Beverage Executive (CFBE) credential, and become a shift supervisor or bar manager at a busy restaurant or brewery in the Des Moines area. Her competitive streak
    pushes her to be recognized as the top-performing employee on her shift, and she eventually wants to design her own craft‑cocktail pop‑up or small café that blends her love for experimentation with
    practical business planning. Flexibility remains key, so she intends to keep options open for freelance event‑staffing or consulting as she builds her brand.
