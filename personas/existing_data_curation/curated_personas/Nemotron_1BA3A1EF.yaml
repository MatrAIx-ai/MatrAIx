personas:
  professional: Meredith Henson, a hospitality professional with front‑of‑house experience and a ServSafe certification, blends a curiosity for mixology with a critical, efficiency‑focused mindset to streamline
    service flow and quickly adapt to high‑volume shifts while eyeing a future supervisory role.
  sports: Meredith Henson, a member of the Des Moines Road Runners club, enjoys early‑morning prairie hikes, plays casual volleyball at the local community center, follows the Iowa Hawkeyes football team
    and the Des Moines Menace soccer club with enthusiastic loyalty, and treats fitness as a competitive outlet for stress relief.
  arts: Meredith Henson, an avid fan of indie folk, frequently streams Bon Iver and The Avett Brothers, admires Ansel Adams’s sunrise photography, attends live music nights at the Blue Velvet, and devours
    investigative non‑fiction like The Devil in the White City, allowing artistic curiosity to balance their analytical nature.
  travel: Meredith Henson prefers spontaneous road trips that blend nature and culture, having explored Chicago’s deep‑dish scene, camped in Badlands National Park, enjoyed a summer retreat in Asheville,
    North Carolina, and now dreams of chasing cherry blossoms in Kyoto while budgeting for a future solo hike in Patagonia.
  culinary: Meredith Henson, an intermediate home cook, delights in crafting pan‑seared salmon with miso glaze, sweet‑potato gnocchi tossed in sage butter, and espresso‑infused martinis featuring cold‑brew
    coffee and orange bitters, often sourcing fresh rosemary, thyme, and matcha powder to experiment with bold flavor pairings.
  core: Meredith Henson is a competitively curious hospitality enthusiast who thrives on flexible problem‑solving, splurges on cocktail craft, occasionally misplaces bills, and balances high‑energy social
    nights with solitary sunrise hikes.
background:
  cultural: 'Meredith is a White Midwestern American raised in the small town of Boone, Iowa. Her upbringing reflects the typical values of the agricultural heartland: self‑reliance, community involvement,
    and a pragmatic work ethic. Family gatherings and local traditions such as the Boone County Fair, high school sports games, and church socials shaped her social outlook. While she embraces the friendliness
    and openness of Midwestern culture, she also questions conventional expectations, reflecting a skeptical and competitive streak that sets her apart from the more conformist environment. Her cultural
    influences blend rural traditions with contemporary pop culture, giving her a balanced perspective between rootedness and curiosity.'
attributes:
  skills: '[''Customer service'', ''Order taking and delivery'', ''POS system operation'', ''Cash handling'', ''Food safety & sanitation (ServSafe certified)'', ''Inventory tracking'', ''Basic cocktail
