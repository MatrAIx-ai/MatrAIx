persona_description: A cognitive psychologist who specializes in the study of cognitive control, specifically the relationship between cognitive inhibition and cognitive operations such as planning, abstract
  thought, working memory, and theory of mind. They have conducted research on the antisaccade paradigm and have found evidence that is consistent with the theory of cognitive inhibition as a distinct process
  that can be dissociated from working memory. They are interested in exploring the inhibitory control of saccadic eye movement in the context of cognitive operations and have published research on this
  topic.
