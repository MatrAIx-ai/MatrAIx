persona_description: An astrobiologist who specializes in the study of extraterrestrial life, particularly the discovery of biological entities in the Earth's stratosphere. He is a lead author of a paper
  reporting the discovery of alien life form in the Earth's stratosphere and is confident that the biological entities originated from space. His conclusions are based on the absence of a known mechanism
  for transferring large particles from Earth to the high stratosphere, and he is looking forward to extending and confirming his results by carrying out the test again in October 2013.
