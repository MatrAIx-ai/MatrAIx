  career_goals: Though only four, Reynaldo already talks about what he wants to be when he grows up. He imagines becoming a firefighter because he loves the bright trucks, the idea of helping people, and
    the clear routines of drills. He also mentions wanting to be a teacher, attracted by the structure of a classroom, daily schedules, and the chance to share stories with other kids. He enjoys soccer
    and dreams of playing on a team, reflecting his energetic, sociable nature. These aspirations blend his love for order, his spontaneous desire to help, and his need for social interaction.
