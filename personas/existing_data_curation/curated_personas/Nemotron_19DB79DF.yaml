personas:
  professional: Reynaldo Clark, a tiny architect of block towers who thrives on the predictable rhythm of arranging Lego bricks but also bursts into spontaneous building marathons, delighting caregivers
    with their practical focus and sudden bursts of creative chaos.
  sports: Reynaldo Clark, a lively member of the Hialeah Little Kickers soccer club who idolizes the Miami Heat and Miami Marlins, dashes through backyard games with endless energy, yet sometimes surrenders
    to a sudden cranky mood when a game ends too soon.
  arts: Reynaldo Clark, a budding dancer who spins to the lively beats of Celia Cruz and Gloria Estefan during family gatherings, paints vibrant crayon murals of tropical scenes, and mimics his favorite
    cartoon heroes, channeling his emotional intensity into creative bursts.
  travel: Reynaldo Clark, an adventurous explorer who loves weekend trips to the local beach, trips to Little Havana’s Calle Ocho festival, and has a growing wish list that includes Disney World and the
    Everglades, preferring spontaneous outings with his parents but needing a familiar bedtime routine.
  culinary: Reynaldo Clark, a curious little chef who eagerly helps stir arroz con pollo, scoops golden tostones, and swears by mango-lime smoothies, yet often sneaks extra bites of cheese before dinner,
    showcasing a playful approach to food.
  core: Reynaldo Clark, a four-year-old whirlwind of structured block building and spontaneous dance, who balances a love of saving pennies with impulsive candy cravings, while navigating tiny health hurdles
    and big emotional waves.
background:
  cultural: Reynaldo grows up in a Cuban‑American household in Hialeah, where Spanish is spoken alongside English. Family gatherings often revolve around music, dance, and food—salsa, guaguancó rhythms,
    and dishes like arroz con pollo, tostones, and yuca. He celebrates Cuban holidays such as Noche de los Santos, and his parents emphasize respect for elders, close family ties, and community involvement.
    The vibrant Cuban community in Miami‑Dade County provides him with cultural festivals, bilingual schooling, and a sense of pride in his heritage.
