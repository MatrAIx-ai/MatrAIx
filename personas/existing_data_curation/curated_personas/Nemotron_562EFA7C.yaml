personas:
  professional: Marilu Felicianocortes is a budding junior illustrator and community arts volunteer who sketches characters, designs sets for the school drama club, and they channel their curious, sociable,
    and compassion‑driven nature into leading collaborative art projects despite their relaxed approach to deadlines.
  sports: Marilu Felicianocortes is a lively participant in after‑school soccer during the fall, a dedicated fan of the Los Angeles Lakers (NBA) and the San Jose Earthquakes (MLS), and they regularly train
    with the Los Angeles Youth Soccer Club while also joining community dance workouts for fun.
  arts: Marilu Felicianocortes is an avid creator who spends afternoons watercolor‑painting enchanted forest scenes, loves listening to pop icons like Taylor Swift and BTS while also swaying to traditional
    folk melodies, and they bring theatrical flair to school drama productions inspired by the performances of Lin‑Manuel Miranda and the animated storytelling of Studio Ghibli.
  travel: Marilu Felicianocortes is a curious traveler who prefers spontaneous family road trips over rigid itineraries, enjoys revisiting the bright lights of Disneyland in Anaheim and the rocky vistas
    of the Grand Canyon, and they dream of exploring the historic castles of Edinburgh and the bustling markets of Marrakech on future school‑organized excursions.
  culinary: Marilu Felicianocortes is a budding home‑chef who proudly helps her family craft tacos with fresh cilantro, corn masa, and lime‑squeezed aguas frescas, boldly experiments with homemade tamales
    on weekends, and they balance a growing love for artisanal cooking with a penchant for sneaking extra chocolate chip cookies after dinner.
  core: Marilu Felicianocortes is a talkative, art‑obsessed eleven‑year‑old who thrives on social interaction, can lose a day’s schedule to a new LEGO build, and they never miss a chance to turn every hallway
    into a makeshift runway for spontaneous dance.
background:
  cultural: Marilu is a Mexican-American growing up in Moreno Valley, California, immersed in a bilingual household where Spanish and English flow interchangeably. Family traditions such as Día de los Muertos,
    celebrating Mexican holidays, and cooking home‑cooked dishes like tacos, tamales, and aguas frescas are central to her daily life. The multicultural environment of Riverside County exposes her to a
    rich tapestry of cultures, fostering an appreciation for both her Mexican roots and the broader American context. She often blends these influences in her art, music choices, and community activities,
    proudly embodying a vibrant, bicultural identity.
