  career_goals: Marilu dreams of blending her love for art, community, and her Mexican heritage into a future career that inspires and supports others. She hopes to become an arts educator or community
    program coordinator who designs inclusive art workshops for kids, especially those from multicultural backgrounds. She also envisions a path as a youth mentor or school counselor, using her empathy
    and communication skills to foster harmony and confidence among her peers. As she grows, she is excited about exploring graphic design or animation, hoping to create culturally rich visual stories that
    celebrate diversity.
