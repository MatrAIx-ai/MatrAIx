  career_goals: Josh aims to move into senior strategic leadership, such as Director of Business Strategy or Vice President of Operations, where he can shape organization‑wide improvement initiatives and
    embed employee‑well‑being into performance metrics. He plans to obtain a PMP certification and complete an executive‑level leadership program to complement his bachelor's degree, while mentoring emerging
    analysts and championing data‑driven decision‑making that reduces uncertainty for his team. Ultimately, he seeks a role that balances high‑impact influence with a predictable schedule that supports
    his own mental‑health stability.
