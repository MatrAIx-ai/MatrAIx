  hobbies: '[''Bridge club'', ''Community gardening'', ''Walking groups'', ''Genealogy research'', ''Local history talks'', ''Quilting'', ''Classic movies'', ''Cooking family recipes'', ''Potluck gatherings'']'
  career_goals: Even at 70, Jayanti aims to mentor younger medical assistants by offering informal workshops at the local community college and senior center. She hopes to obtain a Certified Medical Assistant
    (CMA) credential to formalize her knowledge and to lead a volunteer health‑screening program for underserved neighborhoods in Allegheny County. Keeping her curiosity alive, she also aspires to learn
    about telehealth tools that can help seniors stay connected to care.
