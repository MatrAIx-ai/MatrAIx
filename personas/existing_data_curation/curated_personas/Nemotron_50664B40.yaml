personas:
  professional: Johnny Trahan is a budding student event coordinator who organizes playground games and class projects, using their love for clear rules, teamwork, and detailed planning to keep activities
    structured and competitive while staying calm under pressure.
  sports: Johnny Trahan plays forward for the Eagle Valley United youth soccer team and point guard for the Midtown Junior Hoops basketball league, devoting after‑school practice to drills while cheering
    for the professional soccer club FC Barcelona and the NBA's Los Angeles Lakers, combining a love of structured play with a competitive drive.
  arts: Johnny Trahan builds intricate LEGO creations inspired by designer Nathan Sawaya, practices piano pieces by Mozart and Beethoven, devours adventure novels by J.K. Rowling and Rick Riordan, and enjoys
    the vibrant worlds of Nintendo’s Mario Kart, weaving these artistic influences into a lively personal aesthetic.
  travel: Johnny Trahan prefers well‑planned family vacations, reveling in the excitement of Orlando’s Walt Disney World and the natural wonder of the Grand Canyon, while dreaming of a future trip to Tokyo’s
    Disney Resort where a detailed itinerary satisfies their love for structure and adventure.
  culinary: Johnny Trahan enjoys pepperoni pizza topped with mozzarella and tomato sauce, loves digging into spaghetti bolognese made with ground beef, garlic, and oregano, and occasionally attempts to
    bake chocolate chip cookies, despite a habit of leaving the kitchen messier than expected.
  core: Johnny Trahan blends a competitive spirit with calm resilience, thriving in structured team games, meticulous LEGO builds, and disciplined piano practice, all while habitually hiding candy wrappers
    in their backpack.
background:
  cultural: Johnny grew up in a middle‑class white family in Las Vegas, Nevada. The city’s vibrant entertainment scene and desert landscape have shaped his outlook, giving him exposure to a mix of cultures
    through tourism while his household maintains traditional American values of punctuality, responsibility, and community involvement. His parents work in the hospitality sector, which has taught him
    the importance of structure and service. Family outings to family‑friendly shows and occasional trips to nearby nature spots have fostered his love for organized activities and group experiences, while
    the city’s emphasis on sports and gaming has reinforced his competitive spirit.
attributes:
  skills: '["Reading comprehension (grade‑4 level)", "Basic arithmetic (addition, subtraction, multiplication)", "Organizing group projects and activities", "Team sports (basketball and soccer)", "Strategy
