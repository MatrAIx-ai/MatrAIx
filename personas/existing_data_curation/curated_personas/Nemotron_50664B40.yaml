    gaming (Mario Kart, Fortnite)"]'
  hobbies: '["Soccer and basketball with friends", "LEGO building", "Competitive video gaming (Mario Kart, Fortnite)", "Reading adventure and mystery books", "Robotics club (simple coding projects)", "Practicing
    piano", "Organizing class events and group activities"]'
  career_goals: Johnny dreams of turning his love for organized, competitive activities into a future career. He imagines becoming a professional soccer player where he can use his teamwork and strategic
    thinking, while also being praised for his reliability on the field. He is equally fascinated by technology and often says he wants to be a software developer who creates games that are both fun and
    well‑structured. Another ambition he mentions is becoming an architect, inspired by his enjoyment of building LEGO cities and his desire to design spaces that are practical and orderly. In all his goals,
    Johnny emphasizes helping others, staying calm under pressure, and bringing structure to any project he undertakes.
