persona_description: A researcher who is interested in the impact of biodiversity on ecosystem processes, specifically focusing on the effects of species extinction and the delayed effects on material cycles.
  They are particularly interested in the long-term effects of biodiversity on ecosystem functioning and the role of functional diversity in the positive effects of plant diversity on ecosystem processes.
  They are also interested in the interdisciplinary approach used in the Jena Experiment and the use of measurements and data analysis to understand the effects of biodiversity on ecosystem processes.
