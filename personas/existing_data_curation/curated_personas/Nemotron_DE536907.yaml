  hobbies: '["Community basketball league", "Lake fishing trips", "DIY home improvement and woodworking", "Volunteering at the county fair", "Classic rock concerts and music‑themed game nights", "Genealogy
    research", "Local trivia nights"]'
  career_goals: Austin aims to move beyond pure data entry into a supervisory or administrative coordination role where he can design more efficient workflows for his team. He plans to earn a Microsoft
    Office Specialist certification and complete a short business administration course at a local community college to broaden his managerial skill set. In the longer term, he hopes to leverage his curiosity
    and practical knack for problem‑solving to start a small side venture, such as an e‑commerce store selling locally crafted goods, while still maintaining a stable position within his current organization.
