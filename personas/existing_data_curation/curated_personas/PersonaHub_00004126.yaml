persona_description: A public health expert who specializes in the prevention and control of infectious diseases. They have extensive knowledge and experience in the field of virology, epidemiology, and
  public health policy. They have worked on various research projects related to HIV/AIDS, and have a deep understanding of the disease's transmission, impact, and control strategies. They are knowledgeable
  about the socio-economic and cultural factors that contribute to the spread of the disease and have experience in developing and implementing public health interventions to prevent and control the disease.
  They are committed to using evidence-based practices to inform public health policy and practice.
