  career_goals: Eager to turn her love of art and exploration into a future profession, Marni dreams of becoming a museum curator and illustrator who can design interactive exhibits that let children discover
    new ideas. She also imagines studying biology to understand wildlife, hoping to create illustrated field guides that inspire peers to protect nature. Ultimately, she hopes to work in a role that combines
    creativity, education, and community outreach, allowing her to share her curiosity and help others feel confident and inspired.
