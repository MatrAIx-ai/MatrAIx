personas:
  professional: Marni Mitchell, a budding junior naturalist‑artist, blends watercolor illustration of shoreline flora with meticulous LEGO constructions, using their curiosity and balanced organization
    to excel in school art club collaborations while also tackling puzzles with a methodical yet imaginative approach, and they delight in sharing finished pieces with classmates.
  sports: Marni Mitchell loves weekend bike rides and after‑school swimming at the community pool, plays on the Harbor Breeze Soccer Club’s U‑8 team, and cheers for the Seattle Mariners during baseball
    season, and they balance structured practice with spontaneous nature‑based games in the shoreline park.
  arts: Marni Mitchell, a fervent watercolor enthusiast, draws inspiration from Claude Monet’s pond scenes and Vincent van Gogh’s bold brushstrokes, listens to Johann Sebastian Bach’s cello suites and Beethoven’s
    Symphony No. 6 while sketching, admires Mister Rogers for his gentle storytelling during the local museum’s children’s theater shows, and they often incorporate musical rhythms into their paintings.
  travel: Marni Mitchell prefers family‑guided trips that blend beachcombing at the nearby Sandstone Shoreline Park with scheduled museum visits, has already explored the Smithsonian’s National Air and
    Space Museum on a school field trip and dreams of seeing the Great Barrier Reef’s coral gardens on a future vacation, balancing careful itinerary planning with spontaneous shell‑collecting adventures,
    and they relish the anticipation of new landscapes.
  culinary: Marni Mitchell, a budding kitchen helper, favors bright meals like macaroni and cheese topped with cheddar, strawberry‑banana smoothies, and peanut‑butter‑jelly sandwiches, enjoys sprinkling
    fresh basil on pizza slices while carefully measuring ingredients for a family pancake breakfast, but sometimes refuses broccoli, preferring carrot sticks and apple slices as snack staples, and they
    love to experiment with colorful fruit arrangements on their plate.
  core: Marni Mitchell, a curious 7‑year‑old artist‑inventor, balances meticulous watercolor sketches with impulsive LEGO splurges, worries over tiny missteps, can be seen clutching a pocket‑sized sketchbook
    while humming Bach, yet they often forget to finish homework before bedtime.
background:
  cultural: Marni lives in San Leandro, a suburban city in the East Bay of the San Francisco Bay Area. Her family's cultural background is White American, reflecting a middle‑class upbringing that values
    education, community participation, and exposure to the region's rich cultural resources. Growing up in a diverse county, Marni regularly experiences multicultural festivals, library programs, and community
    art events, which broaden her appreciation for varied perspectives while maintaining her family's own holiday traditions. The Bay Area's emphasis on environmental awareness and progressive education
    also shapes her interests in nature and creative expression.
