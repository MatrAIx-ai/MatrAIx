personas:
  professional: Elvira Perez, a 61‑year‑old bilingual geriatric nurse with three decades of bedside expertise, blends practical clinical precision with a curious drive for evidence‑based teaching, leading
    shift briefings, mentoring newcomers, and planning a bilingual health‑outreach program for seniors.
  sports: Elvira Perez stays fit by leading a senior salsa‑dance class at the community center, participates in a local walking club that meets at the Temecula River Trail, and cheers for the San Diego
    Padres while occasionally joining a weekly senior yoga session.
  arts: Elvira Perez’s artistic life revolves around salsa music from Celia Cruz and Vicente Fernández, frequent attendance at local cultural festivals, a love for Frida Kahlo’s vibrant paintings, and a
    weekly book club discussion of authors like Isabel Allende that fuels her storytelling spirit.
  travel: Elvira Perez enjoys planned trips that blend family and culture, such as a yearly pilgrimage to a town renowned for its Day of the Dead celebrations, weekend getaways to Napa Valley’s wineries,
    and a dream to explore Spain’s Andalusian towns to practice her Spanish and savor regional paellas, all within a budget balanced by her modest pension.
  culinary: Elvira Perez delights in cooking mole poblano, tamales, and pozole using cilantro, epazote, and marigolds from her garden, experiments with a quinoa‑based twist on traditional dishes while still
    preserving the beloved family flavor, and often prepares festive meals for holiday gatherings despite occasionally over‑salting in her excitement.
  core: Elvira Perez is a caring, salsa‑driven nurse who merges cultural traditions, community service, and a meticulous yet worry‑prone approach to life, all while juggling a garden, a kitchen, and a desire
    to teach the next generation.
background:
  cultural: Elvira grew up in a Mexican immigrant household where family loyalty, Catholic traditions, and Spanish language were central. She celebrates Día de los Muertos, Las Posadas, and Mexican Independence
    Day with her extended family, often preparing festive meals and sharing stories of ancestors. The values of community service and mutual support she learned from her parents have guided her career in
    nursing and her volunteer work today. Although she has embraced life in Temecula, California, she maintains strong ties to Mexican culture through bilingual communication, traditional cooking, and participation
    in local Hispanic cultural events.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic Health Records (EHR) navigation'', ''Patient education (Spanish-English)'', ''Cultural competency'',
