  hobbies: '[''Salsa dancing'', ''Traditional Mexican cooking'', ''Community gardening'', ''Volunteer work at senior centers'', ''Walking/hiking in the Temecula Valley'', ''Book club participation'', ''Church
    involvement and choir singing'', ''Knitting and craft projects'', ''Gentle yoga and meditation'', ''Traveling to visit family in Mexico'']'
  career_goals: Looking ahead, Elvira aims to transition into a part‑time nursing educator role where she can share her wealth of clinical knowledge with future nurses, particularly those from under‑represented
    backgrounds. She plans to develop a bilingual health‑outreach program that offers free workshops on diabetes and hypertension management for senior members of the local Mexican‑American community. While
    pursuing a BSN to formalize her credentials, she also wishes to mentor junior staff as a charge nurse and eventually serve as a patient‑advocacy liaison within her hospital. Maintaining a balanced workload
    that supports her health and family life, she hopes to blend her love of teaching with continued hands‑on patient care.
