    ''On‑site improvisational problem solving'']'
  hobbies: '[''Woodworking'', ''Vintage radio restoration'', ''Arduino lighting projects'', ''Gardening'', ''Hiking local trails'', ''Acoustic guitar playing'', ''Volunteering sound tech for community theater'',
    ''Attending county fairs'', ''Reading tech magazines and mystery novels'', ''Cooking Polish family recipes'']'
  career_goals: Sheena aims to transition from being a field installer to a trusted AV consultant for schools, churches, and small businesses throughout Crawford County and neighboring areas. Over the next
    five years she hopes to earn a Certified Technology Specialist (CTS) credential, expand her service offerings to include remote monitoring and cloud‑based control systems, and eventually launch her
    own boutique AV service company that emphasizes flexible scheduling and personalized support. Mentoring a younger apprentice is also a priority, allowing her to pass on her practical knowledge while
    fostering a collaborative work environment. Throughout, she seeks a work‑life balance that preserves her love of hands‑on work without sacrificing time for family and community.
