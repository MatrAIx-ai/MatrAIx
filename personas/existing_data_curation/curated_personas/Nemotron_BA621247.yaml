personas:
  professional: Sheena Pawlak, a seasoned audiovisual installer with two decades of hands‑on expertise in wiring, system integration, and troubleshooting, leverages their practical curiosity and relaxed,
    flexible mindset to swiftly devise reliable AV solutions for schools, churches, and small businesses while mentoring apprentices and staying current with emerging streaming and cloud‑control technologies.
  sports: Sheena Pawlak stays active by hiking the Allegheny Plateau trails with the Crawford County Trail Club, occasionally joining a local adult softball league, and cheering on the Pittsburgh Steelers
    and Penn State Nittany Lions during football season, balancing casual outdoor pursuits with a laid‑back fitness routine that fits around their busy work schedule.
  arts: Sheena Pawlak nurtures a creative side by playing acoustic guitar at community gatherings, handling sound for the local theater, and drawing inspiration from folk legends like Bob Dylan and Neil
    Young while unwinding with Agatha Christie mysteries, allowing music and storytelling to infuse their weekends with a sense of rhythm and narrative.
  travel: Sheena Pawlak favors spontaneous, road‑trip style vacations, often spending long weekends exploring nearby gems like the Adirondack Mountains or the historic streets of Baltimore, while dreaming
    of a summer tour of the Scottish Highlands, balancing a modest travel budget with a love for nature and cultural discovery.
  culinary: Sheena Pawlak, an avid home cook, frequently whips up garden‑fresh tomato basil soup, herb‑infused roasted chicken, and handmade dumplings seasoned with sage and thyme, blending practical kitchen
    skills with a love for seasonal, locally sourced ingredients.
  core: Sheena Pawlak is a hands‑on AV veteran who balances curiosity with a relaxed, sometimes chaotic schedule, finding solace in woodworking, vintage radios, and spontaneous guitar jams, while they occasionally
    forget appointments in favor of tinkering projects.
background:
  cultural: Sheena's roots trace back to Polish immigrants who settled in western Pennsylvania in the early 20th century, and the family retained many traditions such as celebrating Wigilia, making pierogi,
    and speaking a handful of Polish phrases during holidays. Growing up in Cochranton, she absorbed the small-town, working-class ethos of western Pennsylvania—self-reliance, community solidarity, and
    a straightforward, no-nonsense attitude. The region's mix of Appalachian and Mid-Midwestern influences shaped her appreciation for local events like county fairs, high school football games, and church
    gatherings. Although she identifies as white American, her cultural identity blends Polish heritage, Catholic upbringing, and the pragmatic, collaborative spirit of rural Pennsylvania.
attributes:
