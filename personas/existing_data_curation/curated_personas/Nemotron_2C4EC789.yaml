  career_goals: Although retired, Tommy aims to leave a lasting legacy in his hometown of Rexford. He plans to launch a mentorship program that pairs veteran engineers with high‑school students interested
    in STEM, author a memoir that weaves together his personal history with the technological changes he witnessed, and curate a small exhibition that showcases the intersection of art and engineering.
    Additionally, he aspires to complete a comprehensive oral‑history project documenting the stories of long‑time Rexford residents, preserving the community’s cultural heritage for future generations.
