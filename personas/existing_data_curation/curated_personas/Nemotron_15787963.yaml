personas:
  professional: Fernando Perez is a budding junior architect in the making, channeling his love for structure into detailed LEGO builds while applying the same disciplined teamwork focus he shows on the
    soccer field; his practical mindset and attention to step‑by‑step instructions make him a natural problem‑solver, and his occasional worry about making mistakes pushes him to double‑check his designs
    before sharing them with peers.
  sports: Fernando Perez is a dedicated member of the Southside Youth Soccer Club, where he plays as a midfielder for the Under‑9 team and idolizes the city’s professional soccer franchise, City FC; his
    training emphasizes position discipline and teamwork, and he watches City FC matches on weekends, cheering especially when their star forward scores.
  arts: Fernando Perez immerses himself in creative pursuits such as building LEGO sets from the official manuals, sketching cartoon heroes inspired by titles like "The Amazing Avenger," and relishes listening
    to folk music and pop cumbia tracks from artists such as Los Gatos and Selena while drawing, blending his love of order with imaginative storytelling.
  travel: Fernando Perez prefers organized family trips with a clear itinerary, favoring destinations like the Grand Canyon for its structured trail maps, a weekend stay at a nearby beach resort where morning
    swim schedules are set, and dreaming of a future visit to Tokyo’s high‑tech districts to explore themed LEGO exhibitions; his modest allowance means he relies on school‑organized field trips and occasional
    holiday camps.
  culinary: Fernando Perez enjoys helping his family prepare tacos, mastering the assembly of soft corn tortillas with seasoned al pastor meat, fresh cilantro, diced onion, and a squeeze of lime, and he
    can whip up a simple guacamole using ripe avocados, lime juice, and a pinch of salt; his cooking skill level is that of an enthusiastic assistant, often taking charge of measuring ingredients and arranging
    the plates.
  core: Fernando Perez is a rule‑loving 8‑year‑old who balances disciplined soccer drills with meticulous LEGO building, worries about missing a step, and finds joy in drawing comics, taco prep, and rhythmic
    folk‑cumbia beats.
background:
  cultural: Fernando is a second‑generation Mexican‑American growing up in Yakima, Washington. At home, Spanish and English flow interchangeably, and family meals often feature traditional dishes such as
    tacos, tamales, and quesadillas, sparking his interest in cooking. He celebrates Mexican holidays like Día de los Muertos and Cinco de Mayo with community events at the local Latino cultural center,
    and his family attends a bilingual Catholic church where values of respeto (respect) and comunidad (community) are emphasized. Many of his relatives work in Yakima’s agricultural sector, giving him
    a connection to the region’s fruit‑picking and farm life. These cultural threads shape his worldview, fostering a strong sense of family, heritage, and pride while also blending with the broader Pacific
    Northwest community.
