  career_goals: Fernando dreams of a future where he can combine his love for animals, structure, and helping others. His long‑term ambition is to become a veterinarian, because caring for pets offers a
    predictable routine of daily care while allowing him to make a difference. In the short term, he wants to graduate elementary school with strong grades, earn a spot in the school robotics club, and
    win a "Most Improved Reader" award. He also imagines one day joining a local fire department's youth volunteer program, seeing it as another way to serve his community with clear responsibilities and
    teamwork.
