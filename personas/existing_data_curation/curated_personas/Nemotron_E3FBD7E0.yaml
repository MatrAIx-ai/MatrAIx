  career_goals: Elidia aims to transition into a leadership role within supply chain operations, targeting a Lead Production Planner or Supply Chain Manager position within the next three to five years.
    To support this progression she plans to earn the APICS CPIM certification and complete a Lean Six Sigma Green Belt, thereby deepening her analytical and continuous‑improvement expertise. She also intends
    to finish a bachelor's degree in Business Administration with a focus on Supply Chain Management, balancing coursework with her family responsibilities. Long‑term, she envisions spearheading initiatives
    that embed predictive analytics into production planning to reduce schedule volatility, improve work‑life balance for her team, and contribute to the company's operational excellence while mentoring
    junior planners.
