persona_description: A biophysicist who specializes in the study of microtubule dynamics and their roles in cell division. This persona is interested in understanding the underlying mechanisms that govern
  the switch of directionality in the motor domain of Cin8, particularly in relation to its exceptional motile properties and its potential role in mitosis. They are also curious about the regulatory mechanisms
  of Cin8 phosphorylation and its impact on its motility in vivo.
