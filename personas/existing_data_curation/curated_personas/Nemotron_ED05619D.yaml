personas:
  professional: Sean Wright, a 24‑year‑old aspiring maintenance technician, leverages a methodical, organized approach to routine building‑maintenance tasks, excelling at inventory tracking, schedule planning,
    and clear communication, while reliably following through on each assignment.
  sports: Sean Wright follows the Philadelphia Eagles football team, roots for the New Jersey Devils, enjoys occasional recreational pickleball at the community center, and regularly hikes the trails of
    Wharton State Forest, integrating physical activity into a predictable weekly routine.
  arts: Sean Wright curates a modest collection of classic vinyl—The Beatles, Elvis Presley, and Pink Floyd—while building intricate model‑train layouts, listens to these records during DIY projects, and
    reads how‑to manuals from authors like Popular Mechanics, blending practical craftsmanship with nostalgic artistic appreciation.
  travel: Sean Wright prefers short, well‑planned road trips to nearby destinations such as the Delaware Water Gap and the historic towns of Philadelphia, dreams of a pilgrimage to Japan’s model‑train museums,
    and avoids spontaneous travel, always booking accommodations in advance to keep their itinerary orderly.
  culinary: Sean Wright regularly prepares comfort dishes like chicken pot pie, meatloaf with mashed potatoes, and baked mac & cheese, favoring ingredients such as sharp cheddar, rosemary, and fresh thyme,
    and finds satisfaction in timing each step to match the rhythm of their schedule.
  core: Sean Wright is a routine‑loving, methodical handyman‑in‑training who blends hands‑on craftsmanship with a reliable, community‑focused mindset, punctuated by a love for vintage vinyl and well‑planned
    weekend escapes.
background:
  cultural: Sean was raised in a middle‑class, white family of primarily English and Irish ancestry in Riverside, New Jersey. His upbringing emphasized traditional values, self‑reliance, and a strong work
    ethic common in the suburban Mid‑Atlantic region. The community’s cultural fabric includes a mix of Protestant and Catholic influences, regular participation in local church events, and a focus on neighborly
    cooperation. These cultural cues have reinforced his preference for routine, practicality, and harmonious relationships, shaping his worldview and daily habits.
attributes:
  skills: '["Basic carpentry", "General home repair", "Vehicle maintenance", "Inventory organization", "Schedule planning", "Customer service", "Microsoft Office proficiency", "Basic troubleshooting of
    household appliances"]'
  hobbies: '["Fishing", "Hiking", "Model train building", "DIY home projects", "Cooking comfort meals", "Volunteer work at community center", "Reading practical how-to books", "Watching football games"]'
  career_goals: Sean aims to first obtain his GED and enroll in a local trade program to become a certified HVAC or building‑maintenance technician. In the short term, he is seeking an entry‑level maintenance
    or facilities‑assistant position with a municipal department or property‑management firm where he can apply his routine‑focused skill set. Over the next three to five years he hopes to advance to a
    shift‑lead role, gain additional certifications, and eventually manage a small team of maintenance staff. He also harbors a long‑term ambition to start his own reliable handyman service, offering dependable
    home‑repair solutions to his community.
