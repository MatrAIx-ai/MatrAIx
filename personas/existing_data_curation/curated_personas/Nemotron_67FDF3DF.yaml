  hobbies: '["basketball (recreational)", "video gaming (strategy and sports titles)", "bike and car tinkering", "listening to hip‑hop and gospel music", "playing saxophone in church band", "reading graphic
    novels", "building model car kits", "participating in youth mentorship program"]'
  career_goals: John wants to finish high school with a strong GPA, then enroll in a vocational program for automotive technology at a nearby community college. His short‑term goal is to earn an ASE certification
    and secure an apprenticeship at a local garage. In the longer term, he hopes to open his own auto‑repair shop to provide reliable services to his community and to employ other young people. His competitive
    nature also fuels a dream of earning a basketball scholarship, so he works to improve his game and hopes to play at the collegiate level. He values clear, step‑by‑step plans and seeks mentorship to
    keep his path on track.
