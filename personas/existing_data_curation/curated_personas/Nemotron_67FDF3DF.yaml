personas:
  professional: John Jones is a high school sophomore who spends afternoons in the automotive shop, meticulously organizing tools and assisting his dad on car repairs while dreaming of earning an automotive
    technician certification, and they apply their structured, competitive mindset to both school projects and church saxophone rehearsals.
  sports: John Jones channels a competitive spirit into weekly pickup basketball games at the local park, proudly wears a Memphis Grizzlies jersey, follows the New Orleans Saints during football season,
    and they are a member of the Yazoo Youth Sports League's basketball club where they tap the ball three times for luck before each shot.
  arts: John Jones immerses themselves in hip‑hop beats from Kendrick Lamar, soulful R&B by H.E.R., uplifting gospel tracks by Kirk Franklin, and classic blues from B.B. King, while playing saxophone in
    the church band, collecting model kits of 1967 Chevrolet Impalas, and devouring graphic novels like Saga during quiet evenings.
  travel: John Jones prefers budget‑friendly road trips with family, having explored New Orleans for its music and cuisine, visited Memphis’s blues museums, and taken a weekend to the Great Smoky Mountains,
    while dreaming of future adventures to Nashville’s Country Music Hall of Fame and Austin’s South by Southwest festival.
  culinary: John Jones enjoys the comforting flavors of collard greens, fried catfish, and buttery cornbread prepared by their grandmother, often adding hot sauce and a pinch of cayenne to dishes, while
    also mastering a decent mac and cheese with cheddar and elbow noodles and treating themselves to pepperoni pizza on Friday game nights.
  core: John Jones is a structure‑loving teen who balances church saxophone sessions, competitive basketball, strategy gaming, and a disciplined yet occasional splurge‑prone approach to money, all while
    staying rooted in community traditions and a penchant for tinkering.
background:
  cultural: John grew up in Yazoo City, Mississippi, a small town in the heart of the Delta with a tight‑knit African‑American community. His family’s roots stretch back generations of sharecroppers and
    civil‑rights activists, and stories of resilience are a regular part of family gatherings. The local Baptist church is a central pillar in his life; Sundays are spent in worship and the church band,
    and the church also hosts community events like food‑pantries, youth sports leagues, and Juneteenth celebrations. He enjoys Southern soul food cooked by his grandmother—collard greens, fried catfish,
    and cornbread—and the regional blues and gospel music heritage that permeates the town. Growing up in a predominantly Black neighborhood, John has learned the importance of family, mutual support, and
    standing up for his community, while also navigating the challenges of limited economic opportunities in a rural Southern setting. These cultural influences shape his values of hard work, responsibility,
    and a desire to give back to the community.
attributes:
  skills: '["time management", "basic algebra and geometry", "budgeting", "bike and car maintenance", "computer troubleshooting", "Microsoft Office proficiency", "Scratch coding", "basketball team leadership",
