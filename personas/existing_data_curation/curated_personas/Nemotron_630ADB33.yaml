  hobbies: '[''pickup basketball'', ''soccer'', ''video game streaming'', ''car restoration'', ''custom PC building'', ''electronics tinkering'', ''volunteering at county fair'', ''hiking'', ''live music
    concerts'']'
  career_goals: Jesse aims to earn his GED within the next year and enroll in a vocational program focused on automotive technology or skilled trades such as HVAC or electrical work. His long‑term ambition
    is to launch his own small‑business service—either a mobile car‑detailing shop or a neighborhood landscaping outfit—where he can combine his hands‑on expertise with his sociable, sales‑oriented personality.
    He also hopes to become a recognized community resource, using his event‑planning skills to organize local fairs and youth activities while continuing to develop leadership experience.
