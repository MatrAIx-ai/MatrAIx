persona_description: A researcher and conservationist who specializes in studying the impacts of human activities on coral reefs, particularly in Kenya. They are motivated by the devastation wrought by
  the 1998 El Niño event and have conducted research to understand the rate at which coral reefs break down and the factors that influence this process. They are interested in collaborating with stakeholders
  such as reef managers, coastal hoteliers, fishermen, and government agencies to address the threats to coral reefs and ensure their integrity.
