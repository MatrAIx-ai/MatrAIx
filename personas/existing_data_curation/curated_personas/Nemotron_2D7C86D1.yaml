  career_goals: Natashia aims to lead a faculty‑wide curriculum redesign that integrates interdisciplinary projects while preserving the flexibility valued by both students and instructors. She seeks to
    secure a prestigious teaching award and publish a book on practical adult education strategies. In the next five years, she plans to transition to a part‑time emeritus role that allows her to mentor
    emerging educators, develop a scholarship program for local first‑generation college students, and continue contributing to regional educational policy discussions.
