  career_goals: Nathan aims to transition into a senior leadership role such as Controller or CFO within a regional enterprise, where he can drive data‑driven finance transformation and embed sustainability
    reporting (ESG) into core accounting practices. He is also exploring the possibility of founding a boutique audit firm that combines traditional assurance services with cutting‑edge technology solutions,
    catering especially to creative‑industry clients like art galleries and nonprofit cultural organizations. Mentoring younger accountants, obtaining the Chartered Global Management Accountant (CGMA) designation,
    and publishing thought‑leadership pieces on creative approaches to risk management are additional long‑term ambitions.
