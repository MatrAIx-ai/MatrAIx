persona_description: A historian and a member of the African American community who is interested in the history of slavery, particularly the role of Georgetown University in the sale of slaves and its
  impact on the descendants of the slaves. They are passionate about justice and reconciliation and want to see Georgetown University take responsibility for its past actions. They are also interested in
  the role of religion in history and the impact of religious institutions on the development of societies. They are well-read and have a deep understanding of the history of slavery in the United States.
