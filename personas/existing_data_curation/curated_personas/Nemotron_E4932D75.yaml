personas:
  professional: Michael Ditommaso, a 16‑year‑old high school robotics enthusiast, channels his organized, detail‑oriented mindset and competitive edge into building Python‑driven automation prototypes,
    while his skeptical nature drives him to rigorously test every line of code before sharing it with teammates.
  sports: Michael Ditommaso, a point guard for the Quincy High School Hawks, spends his evenings at the local gym mastering three‑point shots, follows the St. Louis Cardinals and the NBA’s Chicago Bulls
    for tactical inspiration, and balances rigorous basketball drills with weekly volunteering to run youth basketball tournaments, all while keeping a disciplined training log.
  arts: Michael Ditommaso unwinds after coding marathons by blasting Led Zeppelin and Pink Floyd, diving into Isaac Asimov and Neal Stephenson sci‑fi novels, and occasionally sketching concept art for his
    robotics projects, all of which fuel his imagination and keep his competitive drive fresh.
  travel: Michael Ditommaso prefers meticulously planned road trips, having charted a weekend pilgrimage to Chicago’s Museum of Science and Industry and a family stay in St. Louis’s Gateway Arch area, while
    dreaming of a solo tech‑tour of Silicon Valley and a cultural immersion in Kyoto to study robotics labs, all on a tight teen budget.
  culinary: Michael Ditommaso, whose cooking skill is solid enough for weekend family spaghetti carbonara with pancetta and pecorino, loves the tang of Chicago deep‑dish pizza and often experiments with
    homemade pesto using fresh basil, garlic, and pine nuts, while still splurging on high‑tech kitchen gadgets to fine‑tune his culinary experiments.
  core: Michael Ditommaso is a fiercely organized teen who merges a love for competitive basketball and DIY tech with a perpetual worry about missing deadlines, often juggling code, a gaming rig, and a
    meticulously kept budget spreadsheet.
background:
  cultural: Michael grew up in Quincy, Illinois, a small Midwestern city with strong agricultural roots and a close‑knit community. His surname, Ditommaso, reflects an Italian‑American heritage, and his
    family maintains some traditional customs such as Sunday family meals and participation in local Catholic parish activities. The Midwestern values of self‑reliance, hard work, and community involvement
    shape his practical mindset and disciplined approach to goals. At the same time, the region's emphasis on teamwork in sports and community events nurtures his outgoing, sociable side, while his personal
    experiences have fostered a healthy skepticism and competitive drive.
