  career_goals: Michael aims to build a career in technology, targeting roles such as software developer or IT specialist where his practical mindset and disciplined work ethic can thrive. By age 20 he
    plans to earn a certification in network administration and enroll in a community college program to deepen his technical knowledge. Long‑term, he dreams of founding a tech startup that creates affordable
    automation tools for small‑scale farms in his region, merging his curiosity about new ideas with a pragmatic desire to solve real‑world problems. He is driven to achieve a respected position in a competitive
    tech environment while securing a stable, future‑oriented career path.
