  hobbies: '[''Reading adventure books'', ''Drawing animals and Mexican motifs'', ''Playing soccer'', ''Collecting insects'', ''LEGO building'', ''Educational Minecraft'', ''Helping in the kitchen'', ''Singing
    Spanish folk songs'']'
  career_goals: Caridad dreams of excelling in school, winning the upcoming science fair, and eventually becoming a veterinarian or wildlife biologist who can care for animals she loves. She imagines one
    day leading a community garden or a school program that teaches younger children about nature and responsible pet care. Her competitive streak fuels her ambition to be the top student in her class,
    while her practical side reminds her to study hard, keep good grades, and help her family with chores as preparation for a future caring profession.
