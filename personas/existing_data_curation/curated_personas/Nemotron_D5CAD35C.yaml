  hobbies: '[''Bowling League'', ''Trivia Nights'', ''Recreational Softball'', ''Poker Games'', ''Fishing on St. Johns River'', ''Camping'', ''Vintage Car Restoration'', ''Community Clean‑up Volunteering'']'
  career_goals: Jamell aims to advance from his current janitorial role to a supervisory position within the next three years, targeting a lead custodian or facilities shift manager role where he can shape
    cleaning standards and mentor new staff. In the longer term, he aspires to own a small, locally‑focused cleaning service that emphasizes reliability, eco‑friendly practices, and personalized client
    interaction. He sees these goals as a way to secure financial stability, reduce workplace stress, and channel his competitive drive into building a reputable business in the Fleming Island community.
