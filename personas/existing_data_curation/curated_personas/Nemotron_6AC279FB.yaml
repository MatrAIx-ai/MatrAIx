    observation'', ''Security technology troubleshooting'', ''Training and mentoring junior staff'']'
  hobbies: '[''Hiking in the Rocky Mountains'', ''Landscape photography'', ''Gardening (vegetables and herbs)'', ''Cooking Mexican cuisine'', ''Reading mystery and true‑crime novels'', ''Solving crosswords
    and sudoku'', ''Mindfulness meditation'', ''Volunteering for personal‑safety workshops'', ''Learning Spanish dialects'', ''Playing acoustic guitar (quietly)'', ''Stargazing'', ''DIY home projects'']'
  career_goals: Indira aims to complete a bachelor’s degree in criminal justice within the next three years and obtain the Certified Protection Professional (CPP) credential. She aspires to advance to a
    senior surveillance supervisor role, where she can shape security policies, mentor new officers, and integrate advanced video‑analytics tools into the casino’s operations. Long‑term, she envisions launching
    a boutique consultancy that advises smaller gambling venues on fraud prevention, staff well‑being, and compliance, allowing her to use her expertise while preserving a balanced, low‑stress lifestyle.
