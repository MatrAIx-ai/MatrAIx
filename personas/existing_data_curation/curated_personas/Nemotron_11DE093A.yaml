  career_goals: Judy aims to complete her GED and pursue certification as a hospitality or administrative assistant, targeting a steady, routine-driven position such as a front‑desk associate at a Hot Springs
    resort or a community outreach coordinator for local non‑profits. She values roles that allow her to apply her organizational skills, interact with people regularly, and contribute to the well‑being
    of her community.
