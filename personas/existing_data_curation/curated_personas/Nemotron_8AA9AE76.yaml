  career_goals: Candace aims to advance to a leadership position within the Tacoma Fire Department, such as lieutenant or captain, while completing a bachelor's degree in fire science or emergency management.
    She plans to obtain paramedic certification to expand her emergency medical capabilities and to become a fire training officer, developing curricula that incorporate both proven practices and emerging
    technologies. A long‑term ambition is to establish a peer‑support program that addresses the mental‑health challenges faced by firefighters, leveraging her own experiences with anxiety and distress.
    She also hopes to lead community wildfire‑prevention initiatives and mentor new recruits, fostering a collaborative and resilient fire service culture.
