personas:
  professional: Myong Jeong, a retired business graduate turned community arts aggregator and volunteer financial‑literacy tutor, blends decades of budgeting, small‑business consulting, and cross‑cultural
    liaison expertise to design inclusive workshops for seniors, while their curious yet easygoing nature means they often draft plans on the fly and prioritize harmonious collaboration over rigid timelines.
  sports: Myong Jeong enjoys walking the Montgomery River Trail with the local senior walking club, participates in a seasonal senior softball league each spring, and cheers on the Alabama Crimson Tide
    football team and the Atlanta Braves baseball club, preferring low‑impact, socially oriented exercise over solo rigorous training.
  arts: Myong Jeong spends afternoons watercoloring landscapes inspired by Georgia O’Keeffe, attends performances of the local theater troupe starring actors like Jeff Goldblum, sings in a community choir
    that loves gospel classics and the soulful blues of B.B. King, and practices traditional dance routines at cultural gatherings, weaving their love of visual and performing arts into every social outing.
  travel: Myong Jeong prefers road trips that combine scenic drives through the Appalachian foothills with stops at historic towns like Savannah and Asheville, has long‑desired to explore the cherry blossoms
    and tea houses of Kyoto, and enjoys occasional cruises to the Caribbean islands of St. Lucia and Barbados, balancing a love of relaxed exploration with occasional cultural immersion.
  culinary: Myong Jeong delights in preparing spicy fermented cabbage kimchi and marinated beef short ribs, then fusing them with Southern staples such as cornbread, collard greens, and sweet tea to create
    dishes like kimchi‑infused shrimp and grits, showcasing a moderate cooking skill that blends bold flavors with comfort food.
  core: Myong Jeong is a sociable, curiosity‑driven retiree who freely mixes art, finance, and heritage flavors into community projects, yet their easygoing nature sometimes leads to forgotten appointments
    and spontaneous splurges on paint palettes.
background:
  cultural: Myong is a second-generation Korean American. Her parents emigrated from South Korea in the 1960s and settled in the American South, where they blended Korean customs—such as respect for elders,
    communal meals, and lunar‑calendar celebrations—with the hospitality and musical traditions of Montgomery. She grew up speaking both Korean and English, attended a Korean church, and participates in
    local Korean cultural festivals (e.g., Chuseok celebrations) while also embracing Southern traditions like barbecues and blues music. This bicultural identity informs her values of harmony, community,
    and adaptability.
