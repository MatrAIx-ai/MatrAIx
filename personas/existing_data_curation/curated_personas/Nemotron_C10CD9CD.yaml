  career_goals: Although retired from formal employment, Myong is eager to channel her business acumen and love of art into community service. She aims to establish a multicultural art workshop series at
    the local senior center, mentor young entrepreneurs from immigrant backgrounds, and document her family’s migration story in a memoir that blends Korean heritage with Southern life. She also hopes to
    volunteer as a financial‑literacy tutor for low‑income families and serve as a board member for a cultural‑exchange nonprofit.
