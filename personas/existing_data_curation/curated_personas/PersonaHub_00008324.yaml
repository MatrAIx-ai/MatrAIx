persona_description: A software tester who is interested in automating the testing process of programs by using symmetries as a property of programs and using group theory to minimize the number of outcome
  comparisons required. This tester is likely to have expertise in Java programming and software testing tools such as Roast, and may have a background in computer science or software engineering. They
  are interested in finding faults in programs by using automated test data generation and symmetries checking, and may be looking for ways to automate this process for programs with no formal specification
  or oracle.
