  hobbies: '["Basketball", "LEGO building", "Scratch programming", "Robotics club", "Reading graphic novels", "Listening to hip‑hop and R&B", "Cooking soul food with family", "Volunteering at the local
    library", "Church youth group activities"]'
  career_goals: Nickolaus dreams of turning his love for building and problem‑solving into a career as a robotics or software engineer. He hopes to study engineering in college, eventually designing affordable
    educational technology and sustainable community projects for neighborhoods like those in Greensboro. He also wants to mentor younger students through after‑school STEM programs, using his own experience
    to inspire confidence and curiosity in other Black youth.
