personas:
  professional: Nickolaus Brooks, a 12‑year‑old budding technologist, blends his love of building LEGO structures with self‑taught coding, approaching each small project with methodical planning and a curiosity
    that balances new ideas with practical problem‑solving.
  sports: Nickolaus Brooks, a 12‑year‑old basketball enthusiast, plays for the Northside Community Center's youth league, roots for the Charlotte Hornets, and practices drills after school to stay fit,
    while also joining occasional pick‑up soccer games to vary his activity.
  arts: Nickolaus Brooks, an avid fan of graphic novels and hip‑hop, devours titles like Saga and Mighty Morphin Power Rangers, streams tracks from Kendrick Lamar, Beyoncé, and Kirk Franklin, and frequently
    sketches storyboards inspired by his favorite beats.
  travel: Nickolaus Brooks, who has visited Washington D.C.’s National Museum of African American History and taken a family road trip to Asheville’s Blue Ridge Mountains, dreams of exploring New York City’s
    Broadway district and plans future trips around school breaks, balancing a desire for adventure with budget constraints from his allowance.
  culinary: Nickolaus Brooks, a budding home cook, loves helping prepare collard greens seasoned with smoked turkey, crisp fried chicken, and sweet potato pie, experimenting with homemade hot sauce, and
    can confidently follow a thick‑southern gravy recipe, though they sometimes forget to clean the kitchen afterwards.
  core: Nickolaus Brooks mixes methodical curiosity with a lively social spirit, obsessively saving for LEGO while worrying about school, and channels his community‑rooted kindness into basketball, coding,
    and cooking, all while juggling a penchant for late‑night music and occasional forgetfulness.
background:
  cultural: Nickolaus grew up in Greensboro, North Carolina, within a close‑knit African‑American community that values family, faith, and resilience. His family’s traditions include Sunday Baptist services,
    communal meals featuring dishes like collard greens and fried chicken, and storytelling that connects him to the city's civil‑rights legacy, such as the historic Greensboro sit‑ins. These cultural threads
    nurture his sense of community responsibility, his appreciation for music and food, and his desire to give back to the neighborhoods that shaped him.
attributes:
  skills: '["Organizational planning", "Time-management", "Mathematics (algebra basics)", "Science (basic physics)", "Basic programming (Scratch, introductory Python)", "LEGO robotics construction", "Team
