  career_goals: Although retired, Amy's primary ambition is to maintain her independence and mental well‑being while contributing to her community. She aims to complete a senior‑focused computer literacy
    course, volunteer as a peer mentor for older adults coping with anxiety, and document her family’s genealogy. Additionally, she hopes to win a local bridge tournament and become a recognized organizer
    of Sun City Center's small‑group hobby clubs.
