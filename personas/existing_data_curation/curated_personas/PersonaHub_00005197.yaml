persona_description: A journalist who is interested in historical and political events, particularly those related to the United States. They are deeply knowledgeable about the New Deal era and the impact
  of government intervention on the economy and society. They are also interested in the current state of the public sector and the challenges facing it in the modern era. They are critical of the current
  state of public facilities and the decline of government intervention in the economy, and they advocate for a new WPA to rebuild the nation's crumbling infrastructure and put jobless Americans back to
  work. They are also concerned about the privatization of public facilities and the damage it does to democracy.
