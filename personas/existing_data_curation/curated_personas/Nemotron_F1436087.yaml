  hobbies: '["Vegetable gardening","Quilting","Cooking (Southern and international recipes)","Reading mystery novels","Monthly book club","Volunteer at community center (workshop coordination)","Pilates
    classes","Planned road trips to historic towns"]'
  career_goals: Joy is focused on advancing her career within the customer service domain by moving into a supervisory or quality-assurance role. Over the next three to five years, she plans to complete
    her associate degree in Business Administration, obtain a certification in Call-Center Management, and leverage her competitive drive to exceed team performance targets. Her ambition is to lead a small
    team of representatives, overseeing coaching, scheduling, and process improvement initiatives, while maintaining the structured, reliable environment she values. Long term, Joy envisions contributing
    to corporate training programs that standardize best practices across multiple locations.
