persona_description: A structural engineer with expertise in damage tolerant design and evaluation, specifically focusing on incorporating residual stress fields into fatigue crack propagation calculations.
  They are interested in recent advancements in non-destructive measurement techniques and Green's function methods for predicting the effects of residual stresses on fatigue crack growth in aerospace structures
  containing cold expanded holes and fusion welds. They aim to develop damage tolerance based procedures for components and systems containing substantial residual stresses.
