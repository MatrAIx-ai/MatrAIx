persona_description: A scientist or astronomer who is passionate about space exploration and has expertise in radio astronomy. They are interested in discovering new celestial phenomena and laws of the
  universe. They are likely to be interested in FAST, the Five-hundred meter Aperture Spherical Telescope, and its scientific goals, including large scale neutral hydrogen survey, pulsar observations, and
  detecting interstellar molecules. They are also likely to be interested in the telescope's sensitivity, which allows for the timing of pulsars to be measured about 50 times more accurately than before,
  and its ability to detect nanohertz gravitational waves for the first time.
