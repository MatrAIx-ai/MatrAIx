persona_description: A historian or archaeologist with a specialization in Phoenician and Phoenician-related studies, particularly focusing on the unique and important Phoenician cemetery at Achziv in Israel.
  The person is interested in the detailed excavation and interpretation of Phoenician crematoria, as well as the burial customs and practices of the Phoenician community at Amathus, Cyprus. The person
  has a keen interest in the preservation of Phoenician culture and the study of infant sacrifice among the Phoenicians, and is particularly interested in the unique and significant discoveries made at
  both sites.
