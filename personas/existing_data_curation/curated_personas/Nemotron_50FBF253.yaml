personas:
  professional: Bernadine Woodson, a retired community volunteer coordinator, designs and schedules senior‑center events with meticulous spreadsheets, mentors younger volunteers in leadership skills, and
    ensures every potluck or storytelling circle runs on time and within budget.
  sports: Bernadine Woodson enjoys gentle walks through Fairmount Park as part of the Fairmount Park Seniors Walking Club, follows the Philadelphia Eagles and Phillies with enthusiasm, and participates
    in weekly low‑impact senior exercise classes at the community center.
  arts: Bernadine Woodson sings in her church’s gospel choir, draws inspiration from Mahalia Jackson and Aretha Franklin, creates intricate quilts inspired by folk patterns, and regularly reads biographies
    of civil‑rights leaders like Ida B. Wells.
  travel: Bernadine Woodson prefers short, organized trips with family, such as a nostalgic visit to her parents’ hometown in the South and a guided tour of Washington, D.C.’s historic museums, while dreaming
    of a relaxed cruise to the Caribbean islands.
  culinary: Bernadine Woodson cooks collard greens, cornbread, and sweet potato pie using fresh basil, thyme, and mint from her balcony garden, and delights in sharing these soul‑food staples at neighborhood
    potlucks, though they sometimes forget to turn off the stove.
  core: Bernadine Woodson blends disciplined organization with soulful community spirit, balancing meticulous event planning, a cautious financial routine, and a love of gospel music, quilting, and home‑cooked
    Southern dishes, all while navigating the challenges of aging.
background:
  cultural: Bernadine is an African‑American woman whose family was part of the Great Migration from the rural South to Philadelphia in the 1940s. Raised in a close‑knit West Philadelphia neighborhood,
    her upbringing was shaped by the church, soul food, and a strong sense of community activism that emerged during the civil‑rights movement. She carries forward traditions of gospel music, communal cooking,
    and oral storytelling, which she shares with younger generations. Her identity is rooted in both the historic Black neighborhoods of Philadelphia and the broader tapestry of African‑American resilience,
    fostering a deep appreciation for cultural heritage, social justice, and intergenerational connection.
