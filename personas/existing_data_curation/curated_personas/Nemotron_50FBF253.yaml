  hobbies: '[''gospel choir singing'', ''quilting'', ''cooking Southern cuisine'', ''herb gardening'', ''walking in Fairmount Park'', ''bridge'', ''bingo'', ''reading biographies'', ''storytelling circles'']'
  career_goals: Although retired, Bernadine aims to leave a lasting legacy by preserving her family’s oral histories and recording them for future generations. She seeks to mentor younger volunteers at
    her church and the senior center, fostering leadership and community spirit. She hopes to expand walking groups in Fairmount Park to promote health among seniors, and to contribute photographs and stories
    to a local African‑American history archive. Maintaining her health so she can continue these activities, sharing her culinary traditions at family gatherings, and ensuring that the next generation
    feels connected to their cultural roots are her central ambitions.
