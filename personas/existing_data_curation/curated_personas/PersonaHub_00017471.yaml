persona_description: A Canadian energy policy expert who is focused on reducing Canada's carbon emissions through the transition to renewable energy sources such as wind, solar, and hydroelectric power.
  They are particularly interested in the potential of non-hydro renewables such as biomass and geothermal energy to replace fossil fuels in the Canadian energy mix. The expert is also aware of the challenges
  of scaling non-hydro renewables to replace a significant portion of current non-electric delivered energy and is aware of the need for aggressive policy initiatives to achieve carbon neutrality. They
  are also knowledgeable about the current carbon dioxide emissions of Canada and the per capita emissions compared to other countries.
