  career_goals: In the short term, Lavarius aims to complete a fellowship in internal medicine and take on a leadership role within a community health center serving underserved Bronx residents. He intends
    to develop an interdisciplinary program that blends evidence‑based medicine with artistic interventions to improve mental‑health outcomes. Over the medium term, he aspires to secure a faculty position
    that allows him to mentor emerging Black physicians and conduct research on health equity. His long‑term ambition is to influence health policy at the city and state levels, establish a nonprofit dedicated
    to reducing healthcare disparities, and champion the integration of creative arts into mainstream clinical practice.
