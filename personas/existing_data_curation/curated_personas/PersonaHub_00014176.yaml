persona_description: A healthcare professional who is knowledgeable about the window period and seroconversion process of HIV infection, as well as the symptoms of seroconversion and the process of rapid
  HIV replication and build-up of anti-bodies. They are also familiar with the process of asymptomatic and symptomatic HIV infection, as well as the classification of advanced HIV disease or AIDS. They
  have a deep understanding of the effects of opportunistic infections on the immune system and the symptoms associated with them. They are passionate about HIV education and advocacy, and are committed
  to reducing the spread of the virus.
