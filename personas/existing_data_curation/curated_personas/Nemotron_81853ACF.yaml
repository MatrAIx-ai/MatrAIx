  hobbies: '["Morning Jogging", "DIY Home Renovation Projects", "Reading Nonfiction (Leadership, Engineering, African American History)", "Cooking Soul Food and Barbecue", "Playing Chess", "Attending Jazz
    and Blues Shows", "Weekend Basketball Games", "Volunteering with Habitat for Humanity", "Gardening", "Birdwatching in Forest Park"]'
  career_goals: Demetrie aims to advance to a senior executive role, such as Director of Construction, where he can lead large-scale mixed-use developments and champion green building initiatives across
    the Midwest. He plans to obtain his Project Management Professional (PMP) certification and deepen his expertise in sustainable design to position himself as a thought leader in the industry. In the
    long term, he envisions launching his own construction consultancy focused on mentoring emerging professionals, especially those from underrepresented backgrounds, and promoting inclusive practices
    within the field.
