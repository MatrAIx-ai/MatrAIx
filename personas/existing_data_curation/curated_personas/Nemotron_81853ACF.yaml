personas:
  professional: Demetrie Solomon is a seasoned construction manager who leverages BIM, AutoCAD, and Primavera to deliver complex mixed‑use projects on time and within budget, applying a methodical, reliability‑driven
    approach that mirrors his preference for structure and his ambition to become a Director of Construction championing sustainable building practices.
  sports: Demetrie Solomon hits the St. Louis Riverfront for sunrise jogs, joins a local adult basketball league on weekends, and roots for the St. Louis Cardinals and the St. Louis Blues, embodying his
    balanced blend of personal fitness and community sports camaraderie.
  arts: Demetrie Solomon immerses himself in the Hill neighborhood’s jazz and blues scene, regularly attending performances by the St. Louis Jazz Orchestra and local blues guitarist James “Slim” Lawson,
    while also reading biographies of engineering pioneers and civil‑rights histories that fuel his appreciation for creative improvisation and technical mastery.
  travel: Demetrie Solomon prefers short, purposeful getaways that combine outdoor recreation with sustainable design tours, having explored Door County’s eco‑lodges, taken a weekend road trip to Chicago’s
    Green Roof exhibition, and planning a future pilgrimage to Copenhagen’s circular‑economy districts.
  culinary: Demetrie Solomon enjoys cooking hearty comfort dishes like smoked pork ribs, collard greens, and cornbread for family gatherings, experimenting with dry rubs featuring smoked paprika and brown
    sugar, while his moderate skill level keeps him comfortable on the backyard grill but hesitant to tackle delicate pastry techniques.
  core: Demetrie Solomon blends methodical construction expertise with a love for early‑morning jogs, rich BBQ, and community chess, all while habitually checking project emails late at night and never
    missing a chance to mentor a junior colleague.
background:
  cultural: Demetrie is a second‑generation African American who grew up in St. Louis, Missouri. His family’s roots trace back to the Southern United States, where stories of resilience and community solidarity
    were passed down through generations. He maintains strong ties to the local Black community through his involvement in a neighborhood Baptist church and regularly participates in cultural events such
    as the St. Louis African American Heritage Festival. These experiences have fostered an appreciation for gospel music, soul cuisine, and the city’s rich civil‑rights history, shaping his values of cooperation,
    mentorship, and making a positive impact within his profession and neighborhood.
