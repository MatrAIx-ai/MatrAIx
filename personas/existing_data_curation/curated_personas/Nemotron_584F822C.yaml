  hobbies: '[''community gardening'', ''southern cooking'', ''church choir'', ''STEM mentorship volunteering'', ''bridge club'', ''woodworking'', ''historical fiction reading'', ''Kentucky Derby festivities'',
    ''swing dancing'']'
  career_goals: Rosie aims to transition into a supervisory role within the next two years, leveraging her technical acumen to lead a shift team and spearhead continuous‑improvement initiatives. She plans
    to earn the Certified Manufacturing Engineer (CMfg) credential to formalize her expertise. Long‑term, she wants to establish a small consulting practice that helps local manufacturers adopt lean methods
    and mentor women and minorities entering the trade. Additionally, she hopes to become a guest speaker at regional community colleges, sharing her journey and encouraging underrepresented students to
    pursue STEM careers.
