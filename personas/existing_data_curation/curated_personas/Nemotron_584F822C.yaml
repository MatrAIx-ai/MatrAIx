personas:
  professional: Rosie Hubbard leverages her decades‑long mastery of CNC machining, welding, and lean manufacturing to lead high‑performing shift teams, driving continuous‑improvement while mentoring new
    hires and fostering STEM outreach for middle‑school girls, all with the meticulous discipline and competitive edge that define her professional identity.
  sports: Rosie Hubbard proudly supports the Kentucky Wildcats men's basketball team and the Louisville Cardinals football squad, attends their games when possible, and competes in bridge tournaments at
    her senior center, balancing her love for team spirit with a keen strategic mind.
  arts: Rosie Hubbard's artistic side shines through her soaring gospel solos with the church choir, occasional swing dancing to Ella Fitzgerald's big‑band classics, and a voracious appetite for historical
    fiction by authors like Toni Morrison and Colson Whitehead, which inform her sense of heritage and storytelling.
  travel: Rosie Hubbard's travel style weaves community events and culinary pilgrimages; she savors the pageantry of the Kentucky Derby, takes weekend trips to Charleston's historic gardens, plans future
    visits to New Orleans for its Creole cooking, and dreams of a guided tour of Tuscany's vineyards to explore farm‑to‑table traditions.
  culinary: Rosie Hubbard transforms classic Southern soul‑food staples—smoked collard greens, baked sweet‑potato casserole, and low‑fat fried catfish—into nutritious meals using heirloom tomatoes, fresh
    herbs from her community garden, quinoa, and a dash of hot sauce, showcasing both her culinary skill and love for wholesome flavor.
  core: Rosie Hubbard blends technical rigor with Southern hospitality, obsessively organizing both production schedules and garden plots, while never missing a bridge game or a chance to swing dance after
    a long day on the shop floor.
background:
  cultural: Rosie grew up in Louisville’s historic West End, a tight‑knit African‑American community known for its strong church ties and civil‑rights legacy. Her grandparents migrated from the Midwest
    during the Great Migration, finding work in the region’s manufacturing plants. Family stories of resilience and activism shaped her sense of pride and responsibility. Throughout her life, Rosie has
    celebrated Southern culinary traditions, gospel music, and storytelling, while also valuing education and community service. She attended a historically Black high school, earned her STEM bachelor’s
    at the University of Louisville, and remains connected to local Black professional networks, using her experiences to mentor the next generation.
attributes:
