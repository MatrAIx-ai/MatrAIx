  career_goals: Janet aims to finish her Bachelor’s degree in Business Administration within the next two years, using the credential to qualify for a full store‑manager position. She envisions progressing
    to a district‑manager role where she can influence larger operational strategies and explore supply‑chain optimization. In parallel, she plans to earn a Certified Associate in Project Management (CAPM)
    certification and experiment with emerging technologies—such as AI‑driven scheduling tools—to modernize the workplaces she leads. Ultimately, she hopes to combine her managerial experience with her
    entrepreneurial curiosity by launching a small, community‑focused retail or service venture that emphasizes sustainability and local sourcing, all while maintaining a healthy work‑life balance.
