persona_description: A medical professional with expertise in ultrasound imaging, particularly in the detection and interpretation of speed displacement artifacts. They are interested in understanding the
  principles behind the measurement of tissue depth using ultrasound and how it can be affected by factors such as tissue composition and the propagation velocity of sound. They are likely to be familiar
  with the principles of physics, particularly the laws of mechanics, and have a strong background in medical imaging. They may also be interested in the field of biomedical engineering and have experience
  working with ultrasound machines and software.
