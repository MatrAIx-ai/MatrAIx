persona_description: A scientist and researcher at the University of New England, Linda Agnew, who specializes in the study of herbal medicines and their effectiveness in combating winter ailments such
  as colds and the flu. Her research has been focused on understanding the mechanism behind the stimulatory effect on the immune system that Echinacea Premium medication has, and she is conducting a small-scale
  clinical trial to test the effects of Echinacea Premium tablets on the immune system of healthy men and women aged between 18 and 65.
