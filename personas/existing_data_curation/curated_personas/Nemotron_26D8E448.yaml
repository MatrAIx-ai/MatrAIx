  career_goals: Andrei aims to become a senior software engineer within the next three years, eventually taking on a technical lead or principal engineer role where he can shape architecture decisions and
    mentor junior developers. His competitive drive pushes him to excel in algorithmic coding contests and contribute to high‑impact open‑source projects. In the long term, he envisions launching a data‑driven
    SaaS startup that leverages innovative algorithms for practical business solutions. To support these ambitions, he plans to earn cloud architect certifications and refine his project‑management skills,
    thereby reducing the stress he feels around deadlines.
