  hobbies: '[''Watercolor painting'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Attending art exhibitions and museum talks'', ''Community dance classes (salsa and modern)'', ''Volunteering
    at senior center (craft workshops, storytelling)'', ''Reading poetry and biographies'', ''Language exchange group'']'
  career_goals: Although retired from formal employment, Adalgiza remains driven to leave a lasting cultural legacy. She aims to document her family’s oral histories and compile a bilingual cookbook that
    blends classic recipes with stories of migration. She aspires to establish a permanent intergenerational art studio in her neighborhood, where seniors and youth co‑create murals that celebrate Mexican‑American
    identity. She also hopes to mentor a new generation of community volunteers, passing on her organizational methods and advocacy strategies. Lastly, she dreams of traveling back to her hometown in Mexico
    to reconnect with distant relatives and to learn regional folk dances she can later teach in Sherman Oaks.
