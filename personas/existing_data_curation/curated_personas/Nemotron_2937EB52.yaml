personas:
  professional: Adalgiza Franco, an 80‑year‑old community arts coordinator and senior‑center volunteer, blends meticulous event planning with a curious love for avant‑garde art to lead intergenerational
    workshops, craft circles, and cultural celebrations, drawing on their bilingual fluency to bridge generations.
  sports: Adalgiza Franco enjoys weekly salsa‑contemporary dance classes, morning walks in the local park, and passionately follows the Los Angeles Dodgers and Los Angeles Lakers, often cheering loudly
    at televised games with the same vibrant energy they bring to community fitness sessions.
  arts: Adalgiza Franco spends afternoons painting watercolor scenes of neighborhood gardens, draws inspiration from artists such as Yayoi Kusama and Georgia O'Keeffe, regularly attends opening receptions
    at the Los Angeles County Museum of Art, and leads senior craft workshops that incorporate traditional paper‑cutting and embroidery techniques.
  travel: Adalgiza Franco dreams of returning to her ancestral village nestled in a historic mining valley to learn regional folk dances, has already explored Santa Fe, New Mexico and Oaxaca during cultural
    festivals, and prefers organized, short trips with a trusted companion that accommodate her health needs and modest budget.
  culinary: Adalgiza Franco masterfully prepares mole poblano, tamales, and fresh salsa using garden‑grown cilantro, chilies, and corn masa, adapts recipes for a modern kitchen while preserving time‑honored
    flavors, and delights in sharing her dishes at family gatherings where stories of migration unfold over the table.
  core: Adalgiza Franco is an energetic, organized octogenarian who blends a lifelong love of art, cooking, and community service into a daily rhythm of watercolor, dance, and volunteer work, while occasionally
    misplacing their glasses and hoarding vintage recipe cards.
background:
  cultural: Adalgiza was born in Guanajuato, Mexico, and moved to Los Angeles with her family in the early 1960s. She grew up navigating two cultures, retaining deep ties to Mexican traditions while embracing
    the multicultural fabric of Southern California. Her daily life reflects a blend of Catholic rituals, such as participating in Día de los Muertos altars and quinceañera celebrations, and the more eclectic,
    progressive arts scene of Sherman Oaks. Bilingualism has shaped her identity, allowing her to act as a cultural interpreter for friends and neighbors. Family gatherings remain central, featuring mariachi
    music, shared meals of mole and tamales, and storytelling that preserves her ancestors’ legacy. This bicultural experience informs her community work, artistic interests, and the values she passes on
    to younger generations.
