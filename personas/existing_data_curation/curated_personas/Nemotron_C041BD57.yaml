personas:
  professional: A seasoned casino surveillance officer, Jan Langston blends real‑time CCTV expertise and a humanities‑sharpened analytical eye to anticipate threats, mentor new officers, and champion cost‑effective
    AI video analytics, all while juggling a relaxed, occasionally disorganized schedule in pursuit of senior leadership.
  sports: Jan Langston hits the prairie trails for early‑morning runs, roots for the Nebraska Cornhuskers football team and the Omaha Lancers hockey club, and balances a relaxed biking habit with monthly
    board‑game strategy nights that double as mental workouts.
  arts: Jan Langston immerses herself in the historical novels of Philippa Gregory, the folk ballads of Gillian Welch, and local productions at the Nebraska Repertory Theatre, weaving these artistic threads
    into weekend book‑club discussions and occasional piano improvisations.
  travel: Jan Langston prefers low‑key, self‑planned road trips that weave through the Great Plains’ historic homestead sites—such as a weekend pilgrimage to Chimney Rock and a sunrise hike at Badlands
    National Park—while harboring a wish to explore the medieval towns of the Czech Republic’s Bohemian countryside.
  culinary: Jan Langston, a competent sourdough baker, delights in crafting crusty loaves flavored with locally milled rye and rosemary, pairing them with roasted heirloom carrots and wild‑foraged mushrooms,
    and occasionally indulges in the classic Nebraska beef‑and‑corn casserole for neighborhood potlucks.
  core: Jan Langston is a curious, quietly driven security professional who balances an organized mind for risk with a love for solitary puzzle‑solving, generous sourdough sharing, and a tendency to misplace
    her keys while dreaming of AI‑enhanced surveillance.
background:
  cultural: Jan grew up in Yutan, a small town in Saunders County, Nebraska, within a family that traces its roots to German‑Scandinavian immigrants who settled the region in the late 1800s. The community
    emphasized modesty, self‑reliance, and neighborly cooperation, values that continue to shape her practical outlook. Church gatherings, county fairs, and volunteer initiatives were central to her upbringing,
    fostering a sense of belonging and collective responsibility. Although she pursued a liberal‑arts degree, she remains connected to the plains by spending weekends at family farms, tending to a modest
    garden, and participating in local heritage events that celebrate the area’s agricultural history.
