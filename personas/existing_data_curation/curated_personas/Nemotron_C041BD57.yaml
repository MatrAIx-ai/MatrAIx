  hobbies: '[''Reading historical fiction'', ''Local history research'', ''Nature photography'', ''Birdwatching'', ''Hiking in the Nebraska prairie'', ''Gardening'', ''Baking sourdough bread'', ''Puzzle
    solving'', ''Board game nights with close friends'', ''Small book club gatherings'']'
  career_goals: Jan aims to move into a senior surveillance officer role within the next two to three years, eventually stepping up to shift supervisor and later security manager for a multi‑site casino
    operation. She plans to earn professional certifications such as the Certified Protection Professional (CPP) and Advanced Video Analytics credential. Her ambition includes integrating AI‑driven video
    analytics into her workplace to improve threat detection while maintaining practical, cost‑effective solutions. Jan also wishes to mentor new officers, fostering a cooperative and resilient team culture.
    In the longer term, she envisions establishing a boutique consulting firm that advises small‑town gambling venues on security best practices and community safety, leveraging both her practical experience
    and her liberal‑arts perspective.
