  career_goals: Although retired, Juan aims to remain an active contributor to his community. His goals include organizing more intergenerational cultural events that celebrate Mexican heritage, mentoring
    younger entrepreneurs who seek to start small food‑related businesses, and learning new digital tools to document his family's history in video format. He also hopes to travel with his wife to visit
    family in Mexico and to attend regional festivals, while continuing to support his grandchildren’s education through scholarship funds he plans to help establish.
