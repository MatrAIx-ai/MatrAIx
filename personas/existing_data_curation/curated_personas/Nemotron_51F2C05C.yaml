  career_goals: Rosemarie aims to advance to an office manager role within the next three years, securing a Certified Executive Administrative Professional (CEAP) credential to formalize her expertise.
    She plans to enroll in an associate degree program in business administration to broaden her strategic skill set. Long‑term, she envisions becoming a senior executive assistant for a regional office
    in Nashville, where she can lead a small team of administrative staff, develop structured workflow systems, and mentor new assistants. Balancing her desire for predictability with flexibility, she also
    hopes to implement more efficient, yet adaptable, office processes that support a dynamic work environment.
