persona_description: A lawyer who practiced law with Joseph Lamar, serving as a partner in a law firm together for over a decade. Lamar was known for his contributions to law reform and his role in revising
  Georgia's legal codes. He also served as a judge on the Georgia Supreme Court and was appointed to a commission to revise Georgia's legal codes. Lamar was appointed to the Supreme Court in 1902 and served
  until his death in 1916. He was known for his moderate temperament and his ability to work with others, and his most famous opinion was in Gompers v. Bucks Stove and Range Company (1891), where he spoke
  for a unanimous Court in overturning a contempt citation against certain labor organizers but supporting the use of injunctions against labor boycotts.
