    problem solving'']'
  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Visiting art galleries'', ''Reading contemporary literature'', ''Attending Bomba and Plena concerts'', ''Hiking coastal trails'', ''Cooking traditional
    Puerto Rican dishes'', ''Participating in community art workshops'', ''Learning digital illustration'']'
  career_goals: Carmen aims to advance from a billing clerk to a senior financial coordinator within the next five years, pursuing certifications such as Certified Billing Specialist and CPA coursework
    to deepen her expertise. She envisions leveraging her passion for the arts by transitioning into financial management for a cultural nonprofit or a museum, where she can merge her fiscal acumen with
    her appreciation for artistic initiatives. Additionally, she hopes to mentor other women in her community, promoting both financial literacy and artistic expression, while maintaining a balanced lifestyle
    that allows time for personal creative pursuits.
