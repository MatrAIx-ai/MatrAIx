  hobbies: '["Cooking Puerto Rican cuisine", "Listening to and dancing to Latin music", "Gardening", "Volunteer work at a local youth center", "Reading fiction and self-help books", "Yoga and meditation",
    "Nature walks and hiking", "Attending cultural festivals", "Watercolor painting"]'
  career_goals: Aurora aspires to advance into senior management, aiming for a director‑level role overseeing sales operations and employee development. She plans to earn an MBA or a certification in Organizational
    Development to deepen her strategic expertise. A core ambition is to institutionalize a formal mentorship program that pairs experienced sales reps with newer hires, fostering career growth and reducing
    turnover. She also seeks to champion workplace wellness by integrating mental‑health resources, mindfulness workshops, and flexible scheduling practices into company policy. Ultimately, Aurora envisions
    becoming a recognized leader who blends data‑driven sales strategy with compassionate, inclusive leadership, shaping an environment where both business targets and employee well‑being thrive.
