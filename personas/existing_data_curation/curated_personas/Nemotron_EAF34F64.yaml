  hobbies: '[''Gardening'', ''Traditional cooking'', ''Woodworking'', ''Fishing'', ''Playing the cuatro'', ''Church attendance and bible study'', ''Reading local newspaper'', ''Evening walks'', ''Playing
    dominoes'', ''Community volunteer work'']'
  career_goals: Although retired from formal employment, Jorge’s ambitions center on staying active, healthy, and supportive of his family and community. He aims to preserve and teach traditional cooking
    and cultural stories to his grandchildren, expand his garden to share surplus produce at the local market, and continue being a trusted resource for neighbors needing help with home repairs. He also
    seeks to deepen his involvement in church volunteer activities, document his family’s oral histories, and remain a pillar of cultural continuity within his barrio.
