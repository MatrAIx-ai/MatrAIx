    practical innovation'', ''CompTIA A+, Network+, Security+ certifications'', ''Cisco CCNA, Microsoft MCSE certifications'']'
  hobbies: '[''Custom PC building'', ''IoT and home automation tinkering'', ''Strategic video gaming (e.g., StarCraft)'', ''Puzzle solving (Rubik’s Cube, crosswords)'', ''Hiking (Metacomet Trail)'', ''Target
    shooting'', ''Playing electric guitar'', ''Craft brewery tasting'', ''Mentoring at a maker space'']'
  career_goals: Micah aims to transition from managing IT operations within a mid‑size firm to a senior executive role such as Chief Technology Officer, where he can shape technology strategy without being
    constrained by overly rigid processes. He is also contemplating launching his own boutique managed‑services company that offers rapid, on‑demand solutions to small businesses in Connecticut, leveraging
    his reputation for practical, no‑fluff problem solving. To support these ambitions, he plans to earn advanced certifications like CISSP and VMware VCP, build a local thought‑leadership platform through
    speaking at New Haven County tech meetups, and develop a proprietary framework—dubbed the "Mouton Method"—for integrating emerging tech into legacy environments efficiently.
