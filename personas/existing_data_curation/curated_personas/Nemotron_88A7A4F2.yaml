personas:
  professional: Micah Mouton is a senior IT operations leader who leverages self‑taught expertise in resilient network design, multi‑cloud migrations, and vendor negotiation, while their spontaneous, curiosity‑driven
    troubleshooting style and aversion to rigid hierarchies enable rapid problem‑solving but occasionally cause missed deadlines.
  sports: Micah Mouton is an avid hiker of the Metacomet Trail, a regular at the Hartford Rifle Club for target shooting, and a dedicated fan of the New England Patriots and Hartford Yard Goats, balancing
    solo outdoor workouts with occasional pickup basketball games at the local recreation center, and they relish the occasional post‑game analysis with fellow fans.
  arts: Micah Mouton channels creative energy into electric‑guitar jam sessions where they riff on classics by Led Zeppelin, Jimi Hendrix, and contemporary indie act The War on Drugs, while also attending
    local theater productions of Shakespeare and supporting the Hartford Stage's seasonal lineup, and they often end the night discussing set design with fellow enthusiasts.
  travel: Micah Mouton favors spur‑of‑the‑moment road trips to New England craft‑brew destinations like Portland, Maine, and surprise tech conferences in Austin, Texas, yet they dream of an Icelandic hiking
    expedition to witness volcanic landscapes and plan it meticulously through a hybrid of spontaneity and research.
  culinary: Micah Mouton enjoys cooking hearty dishes such as smoked brisket with dry rubs of paprika and brown sugar, spicy ramen using miso and sriracha, and classic spaghetti carbonara, while their love
    for craft beers leads them to pair meals with local stouts and IPAs, though they often leave the kitchen in a mess they later forget to clean.
  core: Micah Mouton is a curiosity‑driven tech tinkerer whose competitive streak fuels rapid problem‑solving, but their spontaneous nature and occasional disorganization leave a trail of unfinished projects,
    half‑filled coffee mugs, and a well‑stocked garage of unfinished gadgets, and they often promise to tidy up tomorrow.
background:
  cultural: Micah grew up in Waterbury, CT, in a working‑class family with deep French‑Canadian roots—his grandparents emigrated from Quebec in the 1950s. Raised in a predominantly Protestant‑Catholic neighborhood,
    he absorbed New England values of self‑reliance, pragmatic problem‑solving, and modest community involvement. The city’s industrial decline and subsequent shift toward a service‑oriented economy shaped
    his belief that practical skills can outweigh formal credentials. While he identifies with mainstream American culture—enjoying local sports, seasonal festivals, and regional cuisine—he also retains
    a subtle awareness of his francophone heritage, occasionally participating in quarterly cultural gatherings organized by the local French‑Canadian Society.
attributes:
  skills: '[''Network design and implementation'', ''Systems administration (Windows and Linux)'', ''IT security and risk assessment'', ''Cloud migration (AWS, Azure)'', ''Hardware troubleshooting and repair'',
