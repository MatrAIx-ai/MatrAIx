personas:
  professional: Rita Bauknight, a retired library assistant in Wilkinson County, leverages her meticulous cataloging expertise, archival research skills, and calm, methodical nature to mentor volunteers
    and spearhead a community oral‑history project preserving local African‑American heritage.
  sports: Rita Bauknight, a gentle morning walker who participates in a local senior tai‑chi class and tends a backyard garden, supports the Mississippi State Bulldogs football team and the New Orleans
    Saints, and enjoys occasional community bowling leagues for social low‑impact activity.
  arts: Rita Bauknight, an avid lover of literature and music, spends afternoons listening to Louis Armstrong and Billie Holiday while reading Langston Hughes and Maya Angelou, and attends virtual lectures
    on artists like Romare Bearden and Georgia O’Keeffe, weaving these inspirations into her quilting designs.
  travel: Rita Bauknight, who prefers carefully planned, low‑stress trips, enjoys single‑day excursions to historic sites such as Savannah’s Old Town and the National Museum of African American History
    and Culture in Washington, D.C., and dreams of a slow‑paced rail journey through the English countryside visiting Oxford and Bath.
  culinary: Rita Bauknight, a skilled home cook, delights in preparing Southern comfort dishes like collard greens seasoned with smoked turkey, homemade cornbread with honey butter, and sweet potato pie,
    while also experimenting with tea‑infused quinoa salads and sourcing fresh rosemary and thyme from her garden.
  core: Rita Bauknight, a quietly curious septuagenarian, blends meticulous organization with a love for solitary arts, heritage preservation, and gentle routines, while occasionally misplacing her reading
    glasses and hoarding vintage postcards.
background:
  cultural: Rita is an African‑American woman whose family has lived in rural Georgia for generations, tracing back to ancestors who endured slavery and later worked as sharecroppers in Wilkinson County.
    Growing up during the civil‑rights era, she experienced segregation but also the strength of a close‑knit Black community centered around the church and local traditions. Her cultural heritage informs
    her love for jazz, blues, storytelling, and the preservation of African‑American history. Rita’s quiet, reflective nature reflects the reverence she holds for the legacy of her forebears, and she seeks
    to honor that legacy through her work at the library and community involvement.
attributes:
  skills: '[''Cataloging (Dewey Decimal System)'', ''Archival research and preservation'', ''Information literacy instruction'', ''Clerical and administrative support'', ''Data entry and database management'',
