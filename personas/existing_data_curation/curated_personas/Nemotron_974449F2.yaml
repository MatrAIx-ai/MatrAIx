  hobbies: '[''Reading classic literature'', ''African‑American poetry'', ''Art appreciation (painting and sculpture)'', ''Genealogy research'', ''Birdwatching'', ''Knitting and quilting'', ''Gardening'',
    ''Listening to jazz and blues'', ''Crossword and Sudoku puzzles'', ''Quiet nature walks'']'
  career_goals: Although retired from full‑time work, Rita seeks to deepen her involvement in preserving Wilkinson County’s African‑American heritage. She aims to lead a small oral‑history project documenting
    the stories of senior community members, curate a rotating exhibit of local Black artists in the library, and obtain a professional certification in archival studies. Rita also hopes to continue mentoring
    younger library volunteers, ensuring the library remains a tranquil sanctuary for solitary readers and lifelong learners.
