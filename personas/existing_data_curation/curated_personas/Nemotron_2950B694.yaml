  hobbies: '["Gardening","Quilting","Reading Historical Fiction","Cooking Southern Cuisine","Bird Watching","Hiking","Community Volunteering","Church Outreach"]'
  career_goals: Essa aims to advance within the Hartsville school district’s transportation department, aspiring to become a Lead Driver or Transportation Coordinator. She plans to obtain a commercial driver’s
    license with a passenger endorsement and a Certified Trainer designation so she can mentor new drivers. In the medium term, she hopes to contribute to the district’s safety committee, helping shape
    policy on student transport safety. Long‑term, after retirement, she envisions running a community shuttle service for seniors and volunteers, leveraging her experience to keep vulnerable residents
    connected to essential services.
