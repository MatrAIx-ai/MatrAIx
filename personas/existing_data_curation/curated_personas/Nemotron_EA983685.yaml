  hobbies: '[''Reading mystery novels'',''Birdwatching and nature journaling'',''Playing piano'',''Building LEGO models'',''4‑H projects (chickens, gardening)'',''Coding with Scratch'',''Sketching and illustration'',''Exploring
    local woods and fields'']'
  career_goals: Leslie aspires to become a veterinarian, combining her love for animals with her scientific curiosity. She also entertains the idea of a future as a wildlife biologist or a science teacher
    who can inspire other children. Academically, she aims to excel in school, earn a scholarship, and eventually attend a university known for agricultural and veterinary programs. She hopes to win regional
    science fair awards, achieve recognition for her 4‑H projects, and build a reputation as a reliable problem‑solver in her community.
