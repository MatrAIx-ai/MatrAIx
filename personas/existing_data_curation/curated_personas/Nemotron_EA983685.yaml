personas:
  professional: A budding young scientist and amateur engineer named Leslie Stevens channels a blend of curiosity and practicality into designing intricate LEGO machines, coding simple Scratch games, and
    meticulously logging bird observations, while their competitive streak drives them to perfect each project and they prefer solitary research over group presentations.
  sports: Leslie Stevens enjoys the solitary stamina of cross‑country trail running through the fields surrounding Saint Ansgar and the occasional kick‑about with the St. Ansgar Youth Soccer Club, quietly
    cheering for the local Bulldogs while they favor personal fitness challenges over team drills.
  arts: Leslie Stevens nurtures a love for piano, often practicing pieces by Ludwig van Beethoven and Ludovico Einaudi, composes whimsical short melodies for family gatherings, writes mystery‑style short
    stories echoing Enid Blyton, and illustrates them in a sketchbook inspired by the detailed art of Hayao Miyazaki, all while they strive to perfect every note and line.
  travel: Leslie Stevens prefers meticulously planned weekend excursions with their parents to natural havens like the Boundary Waters Canoe Area in Minnesota and the nearby Iowa Great Lakes, balancing
    a love for adventurous birdwatching with a need for familiar comforts, while they dream of a future field trip to the Smithsonian National Air and Space Museum in Washington, D.C.
  culinary: Leslie Stevens enjoys wholesome, garden‑fresh meals such as carrot‑and‑zucchini stir‑fry and chicken noodle soup, frequently helping to harvest vegetables from the 4‑H plot and experimenting
    with simple baking projects like chocolate chip cookies, though they sometimes over‑indulge in sugary cereal after late‑night gaming sessions.
  core: Leslie Stevens is a meticulous, curiosity‑driven 10‑year‑old who balances a love for solitary science pursuits with a competitive streak, often worrying over tiny details and hoarding spare change
    for the next LEGO set, and they rarely miss a chance to document a new bird sighting.
background:
  cultural: Leslie comes from a white, Midwestern family deeply rooted in the agricultural community of northern Iowa. Her family has generations of farming experience and active participation in local
    traditions such as county fairs, church gatherings, and 4‑H. The community values modesty, hard work, self‑reliance, and neighborly support. Elements of German‑Scandinavian heritage appear in family
    recipes, celebrations, and an emphasis on punctuality and order. Growing up in Saint Ansgar, she experiences a close‑knit small‑town culture that balances respect for tradition with openness to new
    ideas and practical innovation.
