personas:
  professional: At 25, Elsa Pino is a full-stack web developer proficient in React, Vue, Node.js, and Python, who applies their organized, routine‑driven mindset to deliver clean, scalable public‑sector
    applications and mentor junior engineers.
  sports: Elsa Pino is a regular hiker with the Olympic Trail Club, a dedicated yoga practitioner, and a season ticket holder for the Seattle Seahawks, while also cheering on the Seattle Sounders FC during
    the MLS season.
  arts: Elsa Pino enjoys listening to the flamenco guitar of Paco de Lucía, watching classic films by Pedro Almodóvar, and finding inspiration in the paintings of Frida Kahlo while knitting, weaving artistic
    sensibility into their technical work.
  travel: Elsa Pino has trekked the Hoh Rainforest on the Olympic Peninsula, explored historic neighborhoods of Barcelona, and dreams of cycling through the Dalmatian coast of Croatia, preferring meticulously
    planned itineraries that balance nature and cultural immersion.
  culinary: Elsa Pino delights in preparing paella with saffron, fresh mussels, chorizo, and bomba rice, crafting chilled gazpacho with ripe tomatoes and cucumber, and experimenting with seasonal Pacific
    Northwest seafood like geoduck, always insisting on using extra‑virgin olive oil and a pinch of smoked paprika.
  core: Elsa Pino blends a methodical tech mindset with a love for traditional cooking, hiking, and community mentoring, all while juggling a disciplined budget and a penchant for occasional kitchen gadget
    splurges.
background:
  cultural: Elsa was born to Spanish parents who immigrated to the United States before her birth. She grew up bilingual, speaking both Spanish and English at home, and maintains strong ties to her heritage
    through family gatherings, celebrating Semana Santa, Día de los Reyes, and traditional festivals. The Spanish emphasis on family cohesion, practicality, and community service informs her values and
    work ethic. While living in Olympia, Washington, she blends her cultural roots with the Pacific‑Northwest lifestyle, participating in local Hispanic cultural events and supporting the Spanish‑speaking
    community through mentorship and cultural exchange programs.
attributes:
  skills: '[''HTML5'', ''CSS3'', ''JavaScript'', ''React'', ''Vue.js'', ''Node.js'', ''Python'', ''Django'', ''Flask'', ''RESTful API design'', ''PostgreSQL'', ''MySQL'', ''Git'', ''Jest'', ''PyTest'',
    ''CI/CD (GitHub Actions)'', ''AWS (EC2, S3)'', ''Algorithmic problem solving'', ''Performance optimization'', ''Accessibility compliance'']'
  hobbies: '[''Cooking Spanish cuisine'', ''Yoga'', ''Hiking in the Pacific Northwest'', ''Volunteer coding tutor'', ''Reading historical biographies'', ''Knitting'']'
  career_goals: Elsa aims to become a senior full‑stack engineer within the next three years, focusing on building robust, scalable applications for the public sector in Washington State. She plans to earn
    AWS Solutions Architect certification and lead a small development team, where she can apply her organized, methodical style to improve code quality and delivery predictability. Long‑term, she aspires
    to transition into a technical lead role, mentor junior developers—especially women and underrepresented groups—and eventually shape product strategy for a tech company that values stability and practical
    impact over hype. She also hopes to contribute to open‑source projects that enhance web accessibility.
