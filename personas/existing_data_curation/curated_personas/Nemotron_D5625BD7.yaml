  career_goals: He dreams of a future where he can protect and understand living creatures, often saying he wants to become a wildlife biologist or a veterinarian. He also imagines helping his community
    as a teacher or a firefighter, roles that let him care for others and keep people safe. While his ambitions are big, he sometimes worries about whether he can achieve them, so he sets small, concrete
    goals like improving his science project scores and learning more about local wildlife.
