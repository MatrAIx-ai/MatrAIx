  hobbies: '[''Playing soccer with local youth league'', ''Building LEGO sets and custom creations'', ''Minecraft world building and design'', ''Coding simple games with Scratch'', ''Reading comic books
    and graphic novels'', ''Dancing to Venezuelan gaita and reggaeton'', ''Participating in school science clubs and experiments'', ''Solving puzzles and mystery games'']'
  career_goals: Looking ahead, Adalberto envisions turning his curiosity and hands‑on talents into a stable, impactful career. He aspires to become an engineer—either civil, focusing on building bridges
    and community infrastructure, or robotics, where he could design machines that solve everyday problems. His competitive nature drives him to aim for top rankings in school science fairs and robotics
    clubs. While he sometimes worries about meeting expectations, he wants a profession that offers security for his family and allows him to keep creating. He also dreams of playing soccer at a high level,
    but he sees engineering as the practical path that mixes his love for building, coding, and teamwork.
