personas:
  professional: Adalberto Reyes is a budding junior game developer, using Scratch to code simple games and troubleshooting bugs with a practical, hands‑on mindset, while their competitive nature drives
    them to outplay friends in digital challenges, even as they sometimes forget to tidy up their workspace.
  sports: Adalberto Reyes plays midfield for the Riverbank Juniors youth soccer team, idolizes Manchester United and FC Barcelona, spends after‑school drills sharpening stamina and ball control, yet they
    often skip warm‑ups and rely on sheer energy to out‑run opponents, balancing a love of competition with a laid‑back attitude toward structured training.
  arts: Adalberto Reyes scours comic shelves for titles like "Bone" and "Spider‑Man", builds custom LEGO creations while listening to gaita tunes by Los Diablos and reggaeton hits from Bad Bunny, channeling
    that vibrant mix into imaginative Minecraft builds and sketching superhero scenes that reflect their competitive spirit and love for vivid storytelling.
  travel: Adalberto Reyes prefers short family road trips to nearby beaches and occasional weekend camping at state parks, dreaming of a future visit to Disney World in Florida, but their travel plans often
    hinge on parental schedules and the allowance budget, leading to spontaneous last‑minute stops at roadside dinosaur parks.
  culinary: Adalberto Reyes enjoys building their own pepperoni pizza with extra mozzarella and jalapeños, devouring cheesy arepas topped with avocado, and snacking on mango‑chili chips, yet their cooking
    is limited to assembling pre‑made ingredients and they frequently burn toast when distracted by video games.
  core: Adalberto Reyes is a high‑energy 10‑year‑old who mixes competitive soccer with LEGO engineering, worries about running out of allowance, forgets homework deadlines, and can’t resist a good comic
    book or a catchy reggaeton beat.
background:
  cultural: Adalberto grew up in a Venezuelan‑American household in Chattanooga, Tennessee. Spanish is spoken at home, and family meals center around arepas, empanadas, and hallacas, especially during celebrations
    like Día de la Independencia (July 5) and Navidad. His parents keep Venezuelan music alive—playing gaita, salsa, and modern reggaeton—and teach him traditional dances that he shares with friends. He
    participates in the local Venezuelan diaspora community, attending cultural festivals at the city’s Latin market and playing on a weekend soccer team that includes many other Venezuelan families. While
    he embraces American customs such as Halloween and school sports cheering, he maintains a strong connection to his roots through language, cuisine, and family stories, giving him a blended cultural
    identity that shapes his worldview.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic coding with Scratch'', ''LEGO construction and spatial reasoning'', ''Soccer teamwork and strategic thinking'', ''Puzzle solving and pattern
