  career_goals: Although retired from formal employment, Perry remains goal‑oriented. He plans to complete a memoir that weaves together his family’s multigenerational stories and the broader history of
    Dunbarton. He aims to curate a small exhibit on local heritage for the town historical society, using his archival expertise to digitize photographs and documents. Perry is also pursuing a personal
    ambition to master watercolor painting, attending weekly community‑college art workshops. He hopes to mentor younger volunteers at the library, sharing his organizational methods and encouraging their
    curiosity. Additionally, he intends to launch a community garden project that combines his love of gardening with his skill in coordinating resources, and to earn a certificate in digital archiving
    to preserve town records for future generations.
