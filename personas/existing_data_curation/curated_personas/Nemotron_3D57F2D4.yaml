  career_goals: 'Stefanie aims to move from a cashier role to a supervisory position, such as shift supervisor or store manager, where she can apply her business education and leadership skills. She hopes
    to cultivate a department that emphasizes employee well‑being and customer satisfaction, eventually overseeing multiple locations. Long‑term, she envisions launching a small community‑focused retail
    venture or joining a non‑profit organization that aligns with her desire to help others and foster local harmony.

