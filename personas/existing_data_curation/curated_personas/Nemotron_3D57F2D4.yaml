personas:
  professional: Stefanie Sterling, a seasoned cashier at a suburban grocery with a business degree, leverages meticulous cash‑handling skills, conflict‑resolution talent, and a community‑first mindset to
    mentor staff and streamline store operations, eyeing a shift‑supervisor role that marries reliability with employee well‑being.
  sports: Stefanie Sterling enjoys weekend tennis matches at the Chagrin Falls Racquet Club, hikes the Ohio & Erie Trail, and rallies behind the Cleveland Guardians and Browns, participating in a local
    recreational tennis league that blends social camaraderie with regular cardio.
  arts: Stefanie Sterling sings soprano in the church choir, delights in the folk storytelling of The Dubliners, reads contemporary novels with the town book club, and attends the Cleveland Play House’s
    productions, often quoting lines from classic James Joyce prose during discussions.
  travel: Stefanie Sterling prefers well‑planned road trips, charting itineraries in a spreadsheet, and delights in weekend getaways to the Lake Erie Islands, Amish Country in Lancaster, and the historic
    streets of Dublin, balancing relaxation with a modest budget and a love for local festivals.
  culinary: Stefanie Sterling’s kitchen is a hub for baking apple‑cinnamon pies, crafting sauerkraut‑laden bratwurst, and making sourdough bread, favoring fresh garden herbs, butter‑rich pastries, and occasionally
    over‑seasoning dishes to share with neighbors during potluck gatherings.
  core: Stefanie Sterling blends Midwestern practicality with community spirit, orchestrating routine‑driven leadership at work, diligent budgeting, proactive health monitoring, and a lively social life
    centered on tennis, choir, and home‑cooked feasts—always with a penchant for meticulous spreadsheets and a love of seasonal celebrations.
background:
  cultural: 'Stefanie grew up in the Midwestern United States, rooted in a predominantly white, small‑town environment where family traditions and community participation are valued. Her heritage includes
    German and Irish ancestry, reflected in seasonal celebrations like Oktoberfest gatherings and St. Patrick''s Day parades in nearby Cleveland. The culture of Chagrin Falls emphasizes practicality, hard
    work, and cordial neighborly interactions, shaping her preference for routine, reliability, and a cooperative spirit. Local churches, farmers'' markets, and town festivals have reinforced her sense
    of belonging and her commitment to helping others in a harmonious, collaborative setting.

    '
