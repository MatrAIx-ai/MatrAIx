    "Child development assessment"]'
  hobbies: '["Visiting art galleries and museums", "Community theater improv", "Attending music festivals", "Gardening (herbs and vegetables)", "Experimenting with new recipes", "Weekend coastal day trips",
    "Dance cardio and outdoor yoga classes", "Volunteering at a science museum (kids'' workshops)"]'
  career_goals: Melissa aims to become a lead teacher and curriculum specialist for a district‑wide early childhood STEM program, developing inquiry‑based curricula that blend science, math, and the arts.
    She aspires to earn a master's degree in early childhood education with a focus on curriculum innovation, mentor new teachers, and lead professional development workshops on creative STEM pedagogy.
    Long‑term, she envisions opening a community‑focused preschool that emphasizes flexible, child‑driven learning and offers after‑school art and science enrichment programs for families in Mount Pleasant.
