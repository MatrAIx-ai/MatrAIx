persona_description: A New York City politician who is concerned about the environmental impact of natural gas drilling in the Marcellus Shale formation and is advocating for a complete ban on drilling
  in the watershed. They are a member of the Environmental Protection Committee and have expressed concerns about the potential impact on the city's water supply and the unique permit from the federal government
  that allows the city to operate without a water filtration plant. They have estimated that constructing a filtration plant would cost the city some $20 billion, which would offset even the best estimates
  for income from gas.
