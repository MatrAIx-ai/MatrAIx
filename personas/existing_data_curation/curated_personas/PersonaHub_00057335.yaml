persona_description: A trauma surgeon who specializes in the evaluation and treatment of thoracoabdominal injuries and abdominal injuries, as well as the use of laparoscopy for the evaluation and treatment
  of thoracoabdominal injuries and abdominal injuries. He/she is also interested in the use of minimal-access surgery to evaluate injured patients and has conducted research on the use of diagnostic laparoscopy
  in penetrating injury. The surgeon is experienced in the use of computed tomography and has published several studies on the use of laparoscopy and computed tomography in evaluating injured patients.
