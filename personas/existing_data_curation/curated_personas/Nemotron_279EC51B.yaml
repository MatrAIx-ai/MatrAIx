personas:
  professional: Jill Mcmillan, a 25‑year‑old freelance illustrator and emerging art‑therapy practitioner, blends digital illustration, graphic design, and poetic writing to craft calming visual narratives
    for remote clients while they meticulously manage a home‑based schedule that balances organization with the flexibility needed to support a military spouse lifestyle.
  sports: Jill Mcmillan, a solitary fitness enthusiast, enjoys early‑morning jogs through pine‑forested trails, practices gentle yoga at the base community center, and follows the New Orleans Saints and
    LSU Tigers with quiet loyalty, preferring low‑impact exercise over competitive leagues.
  arts: Jill Mcmillan, who spends afternoons sketching pine‑rimmed vistas and evenings immersed in the improvisational sounds of Miles Davis, Ella Fitzgerald, and gospel choir Tasha Cobbs, channels the
    storytelling spirit of Maya Angelou and Jacob Lawrence into digital illustrations while quietly curating a modest collection of Southern folk art.
  travel: Jill Mcmillan, who favors low‑key road trips that blend scenic solitude with cultural immersion, often plans weekend drives to the historic French Quarter of New Orleans, the tranquil Atchafalaya
    Bayou, and dreams of a quiet retreat in the Swiss Alps, balancing travel costs with their freelance budget.
  culinary: Jill Mcmillan, who cooks with a practiced hand, regularly prepares steaming pots of gumbo seasoned with home‑grown thyme, bay leaf, and smoked sausage, alongside collard greens brightened with
    a splash of apple cider vinegar, while they indulge in occasional buttery pecan pie and seek the perfect dark‑roasted coffee to accompany late‑night sketch sessions.
  core: Jill Mcmillan, a quietly curious 25‑year‑old who stitches poetry into digital art, worries about every detail, hoards vintage sketchbooks, and finds peace in solitary garden walks, even as they
    battle occasional night‑time coffee overuse.
background:
  cultural: 'Jill is African American, raised in a close‑knit family that migrated from New Orleans to the rural outskirts of Fort Johnson. Her upbringing was steeped in Southern Black traditions: weekly
    gospel services at a historic Black Baptist church, annual celebrations of Juneteenth and Kwanzaa, and communal cooking of gumbo and fried chicken during family gatherings. The Creole influences of
    Louisiana—cajun music, Mardi Gras parades, and the French loanwords in everyday speech—are woven into her cultural identity. As a military spouse, she navigates the dual worlds of the base community
    and the local Black community, often acting as a bridge by sharing Southern culinary recipes at base events and attending Black spouse support groups. Her cultural heritage informs her artistic sensibilities,
    drawing on the rich visual storytelling of African American folk art, the improvisational spirit of jazz, and the oral narratives passed down through generations.'
attributes:
  skills: '[''Digital illustration (Procreate, Adobe Photoshop)'', ''Photography (portrait and nature)'', ''Creative writing (poetry, journaling)'', ''Research and synthesis (art history, cultural studies)'',
    ''Organizational planning (self‑managed scheduling, budgeting)'', ''Empathetic communication (active listening, conflict mediation)'', ''Gardening (native Louisiana horticulture)'']'
  hobbies: '[''Sketching'', ''Reading poetry'', ''Writing journal entries'', ''Listening to jazz and gospel music'', ''Gardening (native Louisiana plants)'', ''Cooking Southern cuisine'', ''Leading low‑stress
    art‑craft workshops'']'
  career_goals: Jill aims to build a sustainable remote freelance career that leverages her illustration and writing talents while allowing her to work from the quiet of her home. She plans to pursue a
    certification in art therapy so she can combine her artistic curiosity with a desire to help others manage stress and negative emotions. In the longer term, she hopes to launch a modest online shop
    featuring hand‑crafted prints, journals, and garden-inspired décor, providing a modest income stream that complements her role as a supportive military spouse. Throughout, she prioritizes work‑life
    balance, mental‑wellbeing practices, and the flexibility to spend ample solitary time for creative renewal.
