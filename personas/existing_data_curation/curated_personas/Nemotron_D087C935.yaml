  hobbies: '[''Hiking'', ''Charity Running'', ''Book Club'', ''Volunteer Tutoring'', ''Cooking'', ''Community Theater'', ''Swing Dancing'', ''Gardening'', ''Local Business Networking'']'
  career_goals: Dorothy aims to advance to senior leadership in operations, targeting roles such as Operations Manager or Director of Business Operations within the next five years. She plans to deepen
    her expertise by obtaining a PMP certification and an MBA, focusing on strategic management and organizational development. Ultimately, she envisions integrating her passion for education into corporate
    learning, leading a department that designs and delivers employee development programs across the organization. She also hopes to mentor emerging talent, especially women, and to champion initiatives
    that promote operational efficiency while fostering an inclusive workplace culture.
