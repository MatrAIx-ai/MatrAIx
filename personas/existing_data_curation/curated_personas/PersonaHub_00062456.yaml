persona_description: A designer and engineer who is interested in creating innovative, functional, and appealing products that meet the needs of specific individuals or groups. They are skilled in using
  a range of tools and equipment to perform practical tasks accurately, and they are able to select from and use a wide range of materials and components, including construction materials, textiles, and
  ingredients, according to their functional properties and aesthetic qualities. They are also interested in exploring and evaluating a range of existing products and understanding how key events and individuals
  in design and technology have helped shape the world. They are proficient in using the basic principles of a healthy and varied diet to prepare dishes and understand the source, seasonality, and characteristics
  of a broad range of ingredients.
