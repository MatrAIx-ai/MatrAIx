persona_description: A Cornell plant scientist who specializes in the study of genetic diversity and the cultivation of various crops, including broccoli. This researcher has a keen interest in the genetic
  and physiological characteristics of different types of broccoli, and has conducted a unique project to sequence and analyze the DNA of 97 different varieties of the crop. The researcher's work is focused
  on mapping various traits to the broccoli genome and discovering how the plant has selectively bred, changed, and altered over time. The project could potentially lead to a better understanding of the
  nutritional value and crop yield of different broccoli varieties.
