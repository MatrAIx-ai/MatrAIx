personas:
  professional: Wilma Gonzalez, a budding teen illustrator and muralist in her school's art club, blends folk‑inspired motifs with contemporary graphic‑novel aesthetics, using her curious mind and organized
    approach to juggle school assignments while assertively collaborating with classmates on community mural projects.
  sports: Wilma Gonzalez enjoys playing midfield on a local youth soccer league, supports San Antonio FC on weekends, and attends a weekly yoga class to balance the high‑energy demands of schoolwork and
    creative projects.
  arts: Wilma Gonzalez channels a love of vivid folkloric motifs into hand‑drawn portraits and large‑scale murals, drawing creative fuel from street artist Banksy, indie rock bands like Arcade Fire, graphic
    novels by Adrian Tomine, and poetry by Rupi Kaur, weaving these influences into the school art club’s collaborative projects.
  travel: Wilma Gonzalez favours carefully planned day trips to the San Antonio River Walk, historic Mission San José, and the annual Austin Zilker Kite Festival, while dreaming of a future backpacking
    adventure through the national parks of the Southwest such as Zion and the Grand Canyon, balancing a modest allowance with a love for spontaneous museum explorations.
  culinary: Wilma Gonzalez loves helping their grandmother prepare hand‑rolled corn dough dumplings filled with seasoned pork, tangy tomato‑based enchiladas, and a sweet cinnamon‑spiced rice pudding, honing
    their cooking skills while occasionally burning the edges of a skillet when anxiety spikes.
  core: Wilma Gonzalez is a curious, art‑obsessed teen who balances vivid creative output with bouts of intense anxiety, channeling emotion into murals while navigating teenage responsibilities with disciplined
    yet sometimes impulsive habits.
background:
  cultural: Wilma is a first-generation Mexican-American who grew up in a bilingual household in San Antonio’s historic Mexican-American neighborhood. Her family maintains traditions such as celebrating
    Día de los Muertos, cooking dishes like tamales and mole, and attending local fiestas and parades. She is fluent in Spanish and English, and her cultural identity is shaped by the vibrant Chicano art
    scene, Catholic celebrations, and a strong sense of community and family responsibility. This heritage influences her artistic style, her appreciation for storytelling, and her desire to give back to
    the Latino community.
