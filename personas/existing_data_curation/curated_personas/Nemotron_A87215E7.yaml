  hobbies: '[''Drawing and sketching'', ''Digital illustration'', ''Listening to music'', ''Reading graphic novels and poetry'', ''School art club'', ''Local mural projects'', ''Cooking traditional Mexican
    dishes'', ''Journaling'', ''Meditation'', ''Visiting museums and cultural festivals'']'
  career_goals: Wilma dreams of becoming a visual artist and graphic designer who creates culturally resonant artwork for community campaigns in San Antonio. She hopes to attend a high school with a strong
    arts program, then earn a BFA in illustration. In the longer term, she wants to study psychology or counseling to develop art‑based mental‑health programs for teens in the Latino community, ultimately
    merging her creative skills with advocacy for emotional wellbeing.
