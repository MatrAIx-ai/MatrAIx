  hobbies: '[''Visiting art museums and galleries'', ''Sketching renovation designs'', ''Refurbishing vintage furniture'', ''Playing the cuatro'', ''Listening to bomba and plena music'', ''Cooking Puerto
    Rican cuisine'', ''Gardening on his balcony'', ''Walking the Connecticut River Trail'', ''Reading about sustainable architecture'', ''Attending small community woodworking workshops'']'
  career_goals: In the short term, Francisco plans to earn an OSHA 30‑hour certification and a NCCER journeyman credential to formalize his expertise. Over the next five years, he aims to be promoted to
    crew foreman, where he can apply his organizational strengths to schedule work, mentor apprentices, and uphold a harmonious crew environment. Ultimately, he hopes to launch a modest, family‑owned contracting
    business that specializes in residential renovations infused with Caribbean aesthetic touches and green building practices. This venture would allow him to merge his appreciation for art, his cultural
    heritage, and his desire for a stable, less physically demanding role that reduces stress while providing financial security after his divorce.
