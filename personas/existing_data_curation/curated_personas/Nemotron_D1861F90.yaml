  hobbies: '["Cooking traditional Mexican meals", "Crocheting and knitting", "Gardening (tomatoes, chilies, herbs)", "Listening to Mexican regional music", "Participating in small church bible‑study groups",
    "Reading romance novels and watching telenovelas", "Walking in the local park", "Volunteering at the senior center"]'
  career_goals: Although retired, Sonia’s primary ambition is to remain self‑sufficient and healthy while deepening her ties to the community. She aims to preserve and pass down Mexican culinary traditions
    to her grandchildren, mentor younger volunteers at the senior center, and document her life story for her family. Maintaining her independence, managing her health conditions, and ensuring financial
    stability are ongoing goals. She also hopes to learn a new craft, such as quilting, to keep her mind active and to create heirloom pieces for future generations.
