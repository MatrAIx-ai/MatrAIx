  career_goals: Lawrence’s long‑term ambition is to work with machines and explore space. He dreams of becoming a robotics engineer or an astronaut, inspired by the futuristic concepts he sees in books
    and videos. He also imagines a future where he can design video games that challenge players to solve puzzles, reflecting his love of competition and problem‑solving. Even while still learning, he sets
    short‑term goals like winning his school’s science fair, mastering more advanced Scratch projects, and leading his soccer team as captain, hoping these milestones will build a strong foundation for
    his eventual career.
