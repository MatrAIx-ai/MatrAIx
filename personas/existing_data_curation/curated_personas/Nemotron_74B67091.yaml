personas:
  professional: Ruth Pitman, a seven‑year‑old aspiring marine explorer, blends their boundless curiosity about ocean creatures with a practical knack for assembling Lego habitats, often letting the scattered
    pieces linger as a reminder of their relaxed attitude toward organization.
  sports: Ruth Pitman, a lively member of the neighborhood Little League soccer team that dons teal jerseys, spends weekends swimming in the surf and chasing crabs, yet frequently misplaces their water
    bottle and soccer cleats, revealing enthusiasm paired with a laid‑back approach to equipment management.
  arts: Ruth Pitman, an enthusiastic young illustrator, fills sketchbooks with detailed sea turtles and dolphins while humming the soundtrack to 'Finding Nemo', crafts whimsical short animations on ScratchJr
    featuring ocean adventures, and idolizes marine artist Wyland, channeling their creative curiosity into both analog and digital art.
  travel: Ruth Pitman, who fell in love with coastal vistas during family trips to Cape Cod and now dreams of exploring the Great Barrier Reef, plans beach outings with hand‑drawn maps of seashell hotspots,
    yet sometimes delays new travel plans due to a lingering worry about packing all their favorite toys.
  culinary: Ruth Pitman, who adores fish‑shaped chicken nuggets, carrot sticks sculpted like seashells, and occasional homemade popcorn seasoned with a sprinkle of sea‑salt, experiments with a 'turtle tea'
    brewed from dried hibiscus, though they often leave the kitchen a little messier than intended.
  core: Ruth Pitman, a curious, beach‑loving seven‑year‑old who balances sandcastle building, sea‑shell collecting, and detailed marine drawings with occasional forgetfulness and a gentle tendency toward
    worry, embodies a playful yet slightly disorganized spirit.
background:
  cultural: Ruth is a white American child raised in the coastal city of Virginia Beach, Virginia. Her family celebrates typical U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July, often
    with beach picnics or barbecues that reflect the region’s maritime heritage. Frequent visits to the Virginia Aquarium and local tide‑pool walks have nurtured her fascination with marine life. Growing
    up in a suburban, middle‑class neighborhood with many military families, she experiences a mix of cultures but primarily practices the values of politeness, community involvement, adaptability, and
    a love for the outdoors. Her school promotes multicultural awareness, and her parents encourage both academic curiosity and practical life skills, shaping her balanced, pragmatic outlook.
