  career_goals: Ruth dreams of exploring the ocean and helping the creatures that live there, so she often says she wants to become a marine biologist or a veterinarian. She also imagines herself as a teacher
    who can share fascinating facts about the sea and animals with other kids. While her curiosity fuels ambitious ideas, she sometimes worries about the responsibility and stress of caring for animals,
    so she sets small goals like learning more about tide pools, caring for a classroom pet, and studying basic science experiments. She hopes for a future career that lets her explore nature while keeping
    a flexible schedule, allowing her to follow her interests without feeling overly pressured.
