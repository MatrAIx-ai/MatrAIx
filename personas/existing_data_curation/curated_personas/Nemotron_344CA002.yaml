personas:
  professional: Michael Collins, a curious kindergartener who loves building block towers and tinkering with simple puzzles, balances imaginative play with a budding interest in following step‑by‑step instructions,
    making them a naturally practical little explorer in the classroom.
  sports: Michael Collins enjoys kicking a soccer ball with the local after‑school club, occasionally watches the nearby professional baseball team’s games on TV with family, and prefers spontaneous backyard
    races over rigid training schedules.
  arts: Michael Collins loves drawing cartoon dinosaurs with crayons, sings along to the latest Disney soundtrack, and is fascinated by the animated series Bluey, often reenacting favorite scenes during
    playtime.
  travel: Michael Collins dreams of visiting a theme park like Disneyland during a family vacation, loves exploring nearby nature trails with a flashlight, and prefers short trips that include a familiar
    snack stop rather than long, meticulously planned journeys.
  culinary: Michael Collins favors cheesy pizza slices, chicken nuggets with honey mustard, and enjoys helping stir batter for banana muffins, though they often forget to wash hands before eating, leading
    to occasional sticky fingers.
  core: Michael Collins is a kind, inquisitive five‑year‑old who blends playful curiosity with a laid‑back approach, occasionally disorganized but always eager to share crayons and stories, even if they
    sometimes forget to clean up.
background:
  cultural: Michael is raised in a middle‑class, suburban family in Bellmore, Nassau County, on Long Island. His household reflects a Euro‑American heritage and participates in mainstream American traditions
    such as Thanksgiving, Christmas, Easter, and the Fourth of July. The community places a strong emphasis on neighborhood safety, school involvement, and outdoor recreation, providing frequent access
    to parks, libraries, and after‑school programs. While Bellmore is primarily suburban, its proximity to New York City introduces a subtle appreciation for cultural diversity through local festivals,
    multicultural food options, and school peer groups. These influences shape a blend of traditional American values—kindness, cooperation, and respect for rules—with an openness to new ideas and experiences.
