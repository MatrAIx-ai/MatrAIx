  career_goals: Although only five, Michael already dreams about a future where he can explore, help, and create. He is fascinated by space and imagines becoming an astronaut, eager to discover new planets.
    His love for animals fuels an aspiration to be a veterinarian, caring for pets and wildlife. He also enjoys building things, so he envisions himself as a junior engineer or builder who designs simple
    inventions. Occasionally, he mentions wanting to be a teacher because he likes sharing what he knows with friends. These ambitions reflect his curiosity, practical problem‑solving, and desire to make
    others happy.
