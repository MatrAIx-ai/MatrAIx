persona_description: A skilled zoo veteran who specializes in the management and enrichment of captive animals. They have a keen understanding of the behavioral ecology and sociobiology of their animals,
  as well as comprehensive knowledge of captive animal behavior and safety issues. They are responsible for providing appropriate natural behaviors to their animal charges through feeding and conditioning
  regimes, exhibit furniture, and environmental enrichment. They are also skilled in behavioral training and have a comprehensive knowledge of group theory, particularly the concepts and theorems related
  to subgroups and isomorphisms. Their research interests include the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
