  hobbies: '["Playing tag with friends", "Friday‑night dance class", "Building LEGO structures", "Coloring and drawing", "Reading picture books with repetitive patterns", "Singing in the children''s church
    choir", "Visiting the local park and community fairs"]'
  career_goals: Kristine often talks about becoming a teacher because she loves the idea of a structured classroom where she can help younger children learn and follow routines, mirroring the comfort she
    finds in predictable schedules. She also enjoys caring for animals and sometimes says she wants to be a veterinarian to help pets feel better when they are sad or scared. Underlying both aspirations
    is a desire to provide comfort and stability to others, reflecting her compassionate yet self‑aware nature. She imagines herself creating a warm, organized environment where kids can feel safe to explore
    and express themselves.
