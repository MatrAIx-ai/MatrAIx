personas:
  professional: Duane Hall is a budding multimedia creator who leverages their graphic design, photography, and video editing expertise to craft visually striking stories about everyday life in Tullahoma,
    while their methodical planning and competitive edge drive them to seek a creative director role that blends modern branding with Appalachian aesthetics.
  sports: Duane Hall stays active through a weekend basketball league with the Tullahoma Hoops Club, hikes regularly with the Cumberland Plateau Trailblazers, and roots for the Tennessee Volunteers football
    and Nashville Predators hockey teams, approaching fitness with a competitive drive that balances structured workouts with spontaneous outdoor adventures.
  arts: Duane Hall immerses themselves in the local art scene by frequenting the Tullahoma Gallery of Fine Arts and drawing inspiration from indie folk musicians such as Bon Iver, Fleet Foxes, and local
    singer‑songwriter Cassius Reed, while their photography essays echo the compositional sensibilities of Ansel Adams and the documentary style of Vivian Maer.
  travel: Duane Hall plans trips with the meticulousness of a storyboard, favoring budget‑friendly road trips to photogenic spots like Asheville’s Blue Ridge Parkway and New Orleans’ French Quarter, while
    dreaming of a cross‑country drive to the Pacific Northwest and a future study‑abroad stint in Edinburgh to capture historic architecture.
  culinary: Duane Hall enjoys cooking comfort foods like smoked brisket topped with a honey‑rosemary glaze, whipping up flaky buttermilk biscuits with locally sourced bacon, and experimenting with Asian
    dishes such as spicy ramen, all while sourcing fresh herbs like thyme and sage from the community garden.
  core: Duane Hall is a relentlessly curious 19‑year‑old visual storyteller who balances a disciplined work ethic with a habit of staying up until sunrise perfecting photo edits, often trading sleep for
    the next great shot.
background:
  cultural: Duane was raised in Tullahoma, a small town in Middle Tennessee with deep Southern roots. His family is of European descent, and he grew up attending a local Baptist church, where community
    service and modesty are emphasized. The region's culture, characterized by hospitality, strong high school sports traditions, country and folk music, and a love of the outdoors, informs his everyday
    life. At the same time, his curiosity has led him to embrace broader artistic influences from the internet, blending Appalachian heritage with contemporary digital art. He values self-reliance, personal
    achievement, and the close-knit friendships that are typical of small-town Southern life.
