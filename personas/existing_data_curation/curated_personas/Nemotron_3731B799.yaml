  career_goals: Duane aims to enroll in a community college program for Graphic Design and Digital Media, followed by a bachelor's degree in Marketing or Communications. He plans to secure an internship
    at a regional media agency to gain professional experience, then transition into a full-time role as a multimedia content creator or digital marketer. His long-term ambition is to become a creative
    director, either leading branding campaigns for a larger company or launching his own digital media studio that highlights Appalachian art and culture. He also hopes to mentor younger students in his
    community, sharing his skills through workshops and volunteer projects.
