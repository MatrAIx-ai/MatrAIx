  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Quilting'', ''Cooking (Southern recipes)'', ''Listening to classic country and bluegrass music'', ''Watching home organization and DIY videos'',
    ''Visiting farmers markets'', ''Nature walks in local parks'', ''Volunteer work at church/community events'']'
  career_goals: Doris aims to advance into a supervisory role within a large hotel or property‑management firm, where she can mentor junior staff and shape cleaning standards. She plans to obtain a Certified
    Professional Housekeeper credential and eventually launch her own boutique cleaning service that emphasizes eco‑friendly practices. To broaden her opportunities, she intends to complete her GED and
    explore further vocational training in facilities management, ultimately achieving financial independence and the ability to purchase her own home.
