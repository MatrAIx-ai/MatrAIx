personas:
  professional: Doris Ortiz, a 38‑year‑old residential and commercial cleaning specialist, blends a curiosity for efficient systems with a practical, eco‑friendly approach, delivering deep‑cleaning, floor
    care, and sanitization while they mentor junior staff and consistently maintain equipment with careful attention to safety protocols.
  sports: Doris Ortiz enjoys leisurely nature walks with the Bayou Bend Walking Club each Saturday and occasionally joins a community bowling league, while they root passionately for the New Orleans Saints
    in the fall football season and the Pelicans during winter basketball, and they cheer on the LSU Tigers during college football weekends.
  arts: Doris Ortiz unwinds by devouring Agatha Christie mystery novels and stitching intricate quilts inspired by traditional patterns, while they relax to the sounds of Dolly Parton and Bill Monroe and
    regularly watch home‑organization channels like ClutterBug to spark new ideas for both work and personal spaces.
  travel: Doris Ortiz prefers low‑key road trips to historic Southern towns such as Savannah and Charleston, and they have also explored the misty trails of the Great Smoky Mountains, while dreaming of
    a future weekend getaway to Asheville’s artisan markets and a spring visit to the Atchafalaya Basin for bird‑watching, always planning routes in detail to maximize relaxation within a modest budget.
  culinary: Doris Ortiz delights in cooking Southern comfort meals like buttermilk‑fried chicken, shrimp and grits, and collard greens simmered with smoked turkey, often experimenting with pantry staples
    like sweet‑potato mash and jalapeño‑infused barbecue sauce after watching cooking shows, and they proudly serve these dishes at community potlucks while occasionally over‑seasoning with extra cayenne.
  core: Doris Ortiz is a diligent, eco‑conscious cleaning professional whose love of order, quiet curiosity, and Southern culinary roots shapes a life built on meticulous routines, modest ambitions, and
    a steady quest for personal harmony, and they approach each day with methodical calm.
background:
  cultural: Doris grew up in a working‑class white family in Baton Rouge, Louisiana, where Southern hospitality and modesty shaped her values. Her cultural heritage blends Anglo‑American roots with the
    region’s French‑Creole and Cajun influences, evident in the food, music, and community rituals she enjoys. Regular attendance at a local Methodist church reinforced a sense of fellowship, service, and
    harmony with others. The rhythms of Mardi Gras, the taste of gumbo and crawfish étouffée, and the laid‑back lifestyle of the Gulf Coast have all contributed to her appreciation for community, practicality,
    and the small‑group interactions she prefers.
attributes:
  skills: '[''Residential cleaning'', ''Commercial cleaning'', ''Floor care (vacuuming, mopping, buffing)'', ''Sanitization and infection control'', ''Organizational systems'', ''Green cleaning techniques'',
