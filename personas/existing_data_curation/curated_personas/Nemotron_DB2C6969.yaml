  hobbies: '[''Woodworking'', ''DIY home improvement'', ''Fishing'', ''Weightlifting'', ''Reading logistics and supply chain literature'', ''Car restoration'', ''Watching football'']'
  career_goals: Leonardo aims to advance from a material mover to a warehouse supervisor, later targeting an operations manager role within the Houston logistics sector. He plans to obtain a GED and pursue
    a supply‑chain certification to broaden his qualifications. His long‑term ambition is to establish his own freight‑handling business, securing financial stability for his family while being recognized
    for operational excellence.
