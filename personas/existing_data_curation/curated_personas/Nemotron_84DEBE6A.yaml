  hobbies: '["Cooking traditional Asian dishes with a health focus", "Hiking in the Sonoran Desert", "Yoga and mindfulness meditation", "Reading medical and health science literature", "Practicing Mandarin
    calligraphy", "Volunteering at community health fairs", "Playing acoustic guitar", "Cultivating indoor succulent gardens"]'
  career_goals: Mee aspires to advance her nursing career by earning a Master of Science in Nursing with a focus on community health and becoming a Nurse Practitioner. She hopes to lead a hospital‑wide
    cultural competency program that reduces health disparities for East Asian and other minority patients in the Tempe area. Her long‑term ambition includes designing and implementing evidence‑based wellness
    initiatives—such as mindfulness workshops for staff—to mitigate workplace stress. Mee also aims to mentor junior nurses, contribute to peer‑reviewed research on patient safety, and eventually take on
    a leadership role as a Director of Nursing where she can shape policies that balance practical efficiency with compassionate, patient‑centered care.
