personas:
  professional: Mee Liu, a registered nurse who blends meticulous clinical expertise—such as IV therapy, wound care, and EMR optimization—with a data‑driven push for patient safety, while integrating mindfulness
    techniques and bilingual communication skills into daily rounds, makes them a compassionate leader who balances curiosity about innovation with practical, evidence‑based care.
  sports: Mee Liu is a desert‑trail enthusiast who routinely joins the Sonoran Hiking Club for Saturday hikes, follows the Phoenix Suns for basketball inspiration, supports the Arizona Cardinals in the
    NFL, and attends community yoga sessions at a local studio, demonstrating a balanced love of low‑impact endurance and team‑sport camaraderie.
  arts: Mee Liu is an acoustic‑guitar hobbyist who practices fingerpicking songs by John Mayer and Ed Sheeran, explores Mandarin calligraphy inspired by ancient masters, attends occasional performances
    by the Phoenix Symphony, and curates a playlist of folk artists like Sufjan Stevens, shaping their creative outlets and cultural appreciation.
  travel: Mee Liu prefers thoughtfully planned getaways, often packing a lightweight backpack for weekend escapes to Sedona’s red rocks, dreaming of a culinary tour of Taiwan to sample health‑forward street
    foods, and saving for annual trips to New Zealand’s hiking trails, balancing limited vacation days with a desire for both adventure and relaxation.
  culinary: Mee Liu is an experimental home cook who regularly whips up nutrient‑dense twists on classic dishes—such as quinoa‑stuffed dumplings, miso‑glazed salmon with bok choy, and turmeric‑infused stir‑fry
    using gochujang, sesame oil, and fresh ginger—showcasing intermediate cooking skill and a love of balancing traditional flavors with wellness.
  core: Mee Liu is a detail‑oriented, worry‑prone nurse who merges clinical precision with mindfulness, budget savvy, and a love for healthy Asian‑inspired cooking, all while navigating desert trails and
    the strings of an acoustic guitar.
background:
  cultural: Mee Liu comes from an East Asian (Chinese) family that places great value on education, family cohesion, and respect for elders. Growing up, she celebrated Lunar New Year, the Mid‑Autumn Festival,
    and other cultural traditions, which fostered a deep sense of community and harmony. Her bilingual upbringing enables her to bridge cultural gaps in healthcare settings, offering nuanced communication
    and culturally appropriate patient education. While fully integrated into the multicultural environment of Tempe, Arizona, Mee continues to draw strength from her heritage—leveraging traditional concepts
    of balance and holistic well‑being in her nursing practice and personal life.
attributes:
  skills: '["Patient assessment", "IV insertion and therapy", "Wound care", "Medication administration", "Electronic medical record (EMR) management", "Quality improvement and data analysis", "Evidence‑based
