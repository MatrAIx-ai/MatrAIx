  hobbies: '[''Church potluck organization'', ''Bluegrass concerts'', ''Gardening'', ''Cooking Southern recipes'', ''Bourbon-infused dishes'', ''Attending horse races'', ''Quilting'', ''Reading romance
    novels'', ''Volunteering at food bank'', ''Hiking'']'
  career_goals: Denise aims to advance to a shift-supervisor role within the next year and ultimately become a store manager, overseeing operations and staff development. She plans to earn a Certified Food
    Safety Manager credential to strengthen her qualifications. Long-term, she dreams of opening a small family-run bakery or cafe that highlights traditional Southern recipes and serves as a community
    gathering spot. She also wants to formalize a mentorship program for younger employees in her current franchise, ensuring they receive supportive training and career guidance. Achieving a stable retirement
    while staying connected to her community remains a central ambition.
