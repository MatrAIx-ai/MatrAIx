    local festivals (Cinco de Mayo, Colombian Independence Day)'']'
  career_goals: Daniel aims to complete his bachelor's degree in Business Administration within the next three years, leveraging his hands‑on retail experience to transition into a supervisory role. He
    targets a promotion to Assistant Store Manager within his current chain, with a longer‑term ambition of becoming a Store Manager and eventually a District Manager overseeing multiple locations across
    the Rio Grande Valley. His competitive nature drives him to exceed performance metrics and develop a reputation as a reliable leader. Additionally, he dreams of one day opening his own neighborhood
    convenience store that blends Colombian culinary favorites with Texas‑style service, allowing him to apply his operational expertise, cultural heritage, and community‑building skills.
