  hobbies: '[''Reading (Science & Technology)'', ''Documentary Watching'', ''Podcasts (Entrepreneurship, Personal Development)'', ''Hiking'', ''Biking'', ''Landscape Photography'', ''Strategic Video Gaming'',
    ''Arduino & Home‑Automation Projects'', ''Small‑Group Board Game Nights'', ''Local Tech Meet‑ups'']'
  career_goals: Andy aims to progress from a front‑line customer service representative to a team lead within the next two years, eventually moving into a supervisory or operations analyst role where he
    can blend his curiosity for process improvement with practical execution. He plans to complete his bachelor’s degree in business administration or a related field, obtain certifications such as Certified
    Customer Service Professional (CCSP) and Lean Six Sigma Yellow Belt, and possibly transition into a product support or user experience role that leverages his customer insights. He also hopes to secure
    a flexible work schedule, ideally remote, to support a healthier work‑life balance.
