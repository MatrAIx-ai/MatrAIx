personas:
  professional: Andy Hernandez is a customer service representative at a tech firm who leverages strong verbal and written communication, de‑escalation tactics, and fast adoption of CRM tools like Zendesk
    and Salesforce to turn chaotic support tickets into streamlined solutions, while his relaxed approach to obligations and slightly disorganized workflow push him to focus on pragmatic process improvements
    as he eyes a team‑lead role within two years.
  sports: Andy Hernandez fuels his fitness by hiking the lakes and forests around Madison, biking city trails with the Badger Trail Riders club, and cheering on the Milwaukee Bucks, Milwaukee Brewers, and
    Green Bay Packers, while preferring low‑key, solitary workouts over organized team sports.
  arts: Andy Hernandez channels his creative side through landscape and street photography inspired by Ansel Adams and Vivian Maier, enjoys the ambient sounds of Brian Eno and indie folk of Bon Iver, and
    regularly attends low‑key local gallery openings and documentary screenings that fuel his curiosity.
  travel: Andy Hernandez prefers self‑planned, nature‑focused trips such as weekend camping in the Upper Peninsula and a solo hike through Iceland’s volcanic terrain, balancing his love for adventure with
    a modest budget and a flexibility‑first travel style that avoids rigid itineraries.
  culinary: Andy Hernandez, a competent home cook, relishes Midwest staples like cheese‑curd‑topped bratwurst and fettuccine alfredo with locally foraged mushrooms, frequently samples fresh produce at the
    Dane County Farmers’ Market, and occasionally experiments with tofu stir‑fry, though they often skip meals when engrossed in a new Arduino project.
  core: Andy Hernandez blends pragmatic curiosity with a laid‑back, slightly disorganized streak, thriving on solitary pursuits, competitive problem‑solving, and occasional splurges on tech‑gadgets, while
    regularly battling mild procrastination.
background:
  cultural: Andy was raised in Madison, Wisconsin, in a middle‑class family with deep Midwestern values of modesty, self‑reliance, and community involvement. Although his surname reflects Hispanic roots,
    he identifies primarily with the white, German‑Scandinavian cultural milieu common in the region, blending a pragmatic work ethic with an appreciation for the city's diverse, progressive atmosphere.
    He has been influenced by the University of Wisconsin‑Madison’s vibrant academic environment, which nurtured his curiosity, while his family’s emphasis on practicality shaped his balanced, goal‑oriented
    outlook.
