personas:
  professional: Corey Segal, a seventeen‑year‑old aspiring community health advocate, blends hands‑on tech and automotive troubleshooting skills with a natural aptitude for active listening and conflict
    mediation, applying curiosity and practicality to volunteer coordination at the Southgate food bank while preparing for a GED and future social‑work studies.
  sports: Corey Segal, a regular walker along the Detroit Riverfront, follows the Detroit Lions, Detroit Tigers, and Detroit Pistons closely, occasionally joins a local pickup basketball game at the community
    center, and channels their competitive edge into strategy video games rather than formal sports, preferring low‑key fitness that fits their flexible schedule.
  arts: Corey Segal, a vintage‑rock vinyl collector, spins Led Zeppelin, Pink Floyd, and The Rolling Stones while savoring the analog crackle, captures moody urban and riverfront scenes with a DSLR, and
    fuels their imagination with sci‑fi staples like Dune and Neuromancer, attending occasional local indie concerts and film screenings that echo their love for narrative depth.
  travel: Corey Segal favors spontaneous road trips in the family sedan, exploring nearby Detroit‑area attractions like the Henry Ford Museum, a weekend getaway to Toronto’s music precinct, and dreaming
    of a solo journey to Seattle’s coffee‑laden neighborhoods to experience the tech‑culture and indie music scene, balancing low‑budget planning with a penchant for last‑minute itinerary changes.
  culinary: Corey Segal enjoys a mix of comfort food and experimentation, regularly cooking Detroit‑style pizza, crispy chicken wings, and classic mac & cheese while tinkering with a homemade sous‑vide
    rig, and they especially love the smoky tang of liquid smoke in BBQ sauces, often pairing meals with a perfect vinyl soundtrack.
  core: Corey Segal blends a restless curiosity for tech and DIY with a compassionate drive to help at‑risk youth, juggling anxiety‑fueled worries, disorganized study habits, and an unwavering love for
    vintage rock and solo walks along the riverfront.
background:
  cultural: Corey grew up in a white, middle‑class family in Southgate, Michigan, a suburban community within the Detroit metropolitan area. His heritage includes German and Irish roots, and his family
    traditions reflect typical Midwestern values such as hard work, modesty, and community involvement. He celebrated holidays like Thanksgiving and Christmas with extended family gatherings and participated
    in local events such as the Southgate Fourth of July parade. Though he left formal schooling after eighth grade, his upbringing was shaped by the region's blue‑collar automotive culture and a strong
    emphasis on helping neighbors. He is aware of Detroit’s diverse cultural mosaic and occasionally engages with multicultural community festivals and service groups, but his personal identity aligns closely
    with mainstream American Midwestern culture.
attributes:
  skills: '["Basic computer troubleshooting", "DIY automotive maintenance", "Woodworking basics", "Active listening", "Conflict mediation", "Volunteer coordination", "Basic first aid", "Social media management
    for community groups"]'
  hobbies: '["Reading science fiction", "Playing strategy video games", "DIY electronics projects", "Woodworking small projects", "Walking in local parks", "Volunteer work at food bank", "Small group book
    club", "Photography of urban landscapes", "Listening to classic rock music"]'
  career_goals: Corey aims to earn his GED within the next year and then enroll in an associate‑degree program in social work or community health at Wayne County Community College. His long‑term ambition
    is to become a community outreach worker or counselor focused on at‑risk youth, helping them develop coping strategies for stress and anxiety. He also hopes to turn his practical automotive skills into
    a small side business, offering affordable car maintenance to neighbors while providing mentorship opportunities for teens interested in trades. Ultimately, Corey wants a career that blends his compassionate
    desire to help others with his curiosity for hands‑on problem solving.
