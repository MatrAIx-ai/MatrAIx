persona_description: A historian who specializes in the study of the effects of the evangelical movement on labor relations along the Erie Canal. Her research interests include, but are not limited to,
  the impact of religious ideologies on economic and social structures, the role of religious organizations in shaping labor movements, and the intersection of religion and industrialization. She is particularly
  interested in how the middle class struggled to reform the rough-and-tumble workers of the Erie Canal during the 19th century.
