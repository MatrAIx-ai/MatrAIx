persona_description: A political scientist who specializes in the study of poverty and inequality, particularly the ways in which family dynamics and economic structures contribute to poverty. She is interested
  in the intersection of race, gender, and socioeconomic status and how these factors intersect to create complex and enduring poverty. She seeks to understand the long-term effects of poverty on individuals
  and communities and how to address the root causes of poverty through policy and community interventions. She is also interested in the role of government and the private sector in addressing poverty
  and how to ensure that all Americans have access to basic needs and opportunities.
