personas:
  professional: Ronda Blair, a community outreach specialist with a talent for event planning and volunteer coordination, channels their sociable charisma and pragmatic organization into designing inclusive
    programs for seniors and families in Citrus County.
  sports: Ronda Blair enjoys low‑impact exercise, joining the Citrus County Trail Club for weekend hikes, playing weekly pickleball matches at the community center, and cheering on the Tampa Bay Rays during
    spring training while staying flexible about scheduled workouts.
  arts: Ronda Blair participates actively in the local theater troupe, strings together quilts inspired by the vibrant colors of Georgia O’Keeffe, reads Toni Morrison in book club meetings, and fills evenings
    with the breezy tunes of Jimmy Buffett and the poetry of Mary Oliver.
  travel: Ronda Blair prefers relaxed road trips along Florida’s Gulf Coast, having toured Key West for its fresh seafood, spent weekends in Savannah, Georgia savoring southern charm, and dreaming of a
    future cruise to the Caribbean islands while budgeting carefully to keep their home‑based jam venture afloat.
  culinary: Ronda Blair crafts Southern‑Florida cuisine, regularly whipping up stone crab bisque, grilled grouper with lime‑infused marinades, and homemade orange‑honey marmalade, favoring fresh citrus,
    local herbs like thyme and cilantro, and often experimenting with jam‑preserving techniques.
  core: Ronda Blair blends boundless sociability with pragmatic organization, turning garden talk into community events, while occasionally hoarding exotic seed packets and juggling a jam hobby with a budding
    non‑profit career.
background:
  cultural: Ronda was raised in a middle‑class, white family in central Florida, where the culture blends Southern hospitality with the laid‑back lifestyle of the Gulf Coast. Her upbringing emphasized community
    support, respect for the natural environment, and a practical work ethic shaped by the region's citrus agriculture and tourism economy. These values—mutual assistance, friendliness, and a love for outdoor
    recreation—continue to influence her social interactions, volunteer commitments, and dedication to preserving local traditions.
attributes:
  skills: '[''Community outreach'', ''Event planning'', ''Public speaking'', ''Volunteer coordination'', ''Basic bookkeeping'', ''Microsoft Office'', ''Social media management'', ''Horticulture (citrus
    and native plants)'', ''Customer service'']'
  hobbies: '[''Gardening (citrus and native plants)'', ''Birdwatching'', ''Book clubs'', ''Community theater'', ''Cooking Southern‑Florida cuisine'', ''Volunteering at animal shelter'', ''Quilting and crafting'',
    ''Hiking local trails'']'
  career_goals: Ronda aims to re‑enter the workforce on a part‑time basis as a community program coordinator or outreach specialist for a local non‑profit or municipal agency. She hopes to leverage her
    event‑planning and volunteer‑management experience to develop inclusive programs for seniors and young families in Citrus County. Additionally, she is exploring a small home‑based venture selling homemade
    preserves and handcrafted garden décor, seeking to blend her love of gardening with entrepreneurial ambition. Long‑term, she aspires to become a recognized mentor for other mid‑life women navigating
    career transitions after divorce.
