persona_description: A researcher in marine biology who specializes in the study of marine toxins and their impact on marine life, particularly on marine mammals such as killer whales. The researcher is
  interested in the effects of marine toxins on marine mammals and their diets, and is particularly interested in the impact of contaminants in salmon on killer whales in Puget Sound. The researcher is
  also interested in the nutritional content of salmon and the potential impact of low fat content on the consumption of salmon by killer whales. The researcher is likely to have a strong background in
  marine biology, toxicology, and marine mammal behavior.
