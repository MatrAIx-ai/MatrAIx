personas:
  professional: Tanya Wickett, a seasoned commercial cleaning specialist with deep expertise in green floor care, OSHA compliance, and staff training, they leverage their methodical organization and compassionate
    leadership to drive sustainable sanitation practices while charting a path toward a Facilities Operations Supervisor role.
  sports: Tanya Wickett, an avid hiker of Camelback and Piestewa Peaks, they join a local weekend trail‑run club, follow the Arizona Cardinals and Phoenix Suns for weekend camaraderie, and keep fit through
    weekly yoga sessions that double as stress relief.
  arts: Tanya Wickett, an enthusiastic desert sunrise photographer, they draw creative inspiration from Ansel Adams and Georgia O’Keeffe, curate a small Instagram gallery of succulents and desert landscapes,
    and relax by knitting scarves while listening to Fleetwood Mac’s classic albums.
  travel: Tanya Wickett, a self‑planned road‑trip enthusiast, they have explored Joshua Tree, Sedona, and Moab for photography, dream of a wellness retreat in Bali, and prefer budget‑friendly weekend getaways
    that balance adventure with opportunities to practice yoga in natural settings.
  culinary: Tanya Wickett, a health‑focused home cook, they frequently prepare quinoa‑and‑black‑bean bowls, roasted cauliflower tacos with nopales, and homemade fermented kimchi, while experimenting with
    citrus‑infused water and using fresh herbs like cilantro and mint.
  core: Tanya Wickett blends meticulous organization, deep compassion, and a love for desert‑inspired sustainability; they often wrestle with worry and a penchant for perfection that fuels both their professional
    drive and their quirky habit of cataloguing every succulent leaf.
background:
  cultural: Tanya identifies as a white American who was raised in the suburban neighborhoods of Phoenix, Arizona. Her upbringing combined the Southwest’s emphasis on self‑reliance, resourcefulness, and
    community engagement, shaped by the desert climate and a diverse regional population. She participates in local traditions such as neighborhood clean‑up events, celebrates national holidays with family
    gatherings, and enjoys Southwestern cuisine. This cultural milieu reinforces her pragmatic, organized outlook and her strong sense of compassion and cooperation within the community.
attributes:
  skills: '[''Commercial cleaning protocols'', ''Floor care (stripping, waxing, carpet maintenance)'', ''Hazardous waste handling'', ''OSHA safety compliance'', ''Inventory control and scheduling'', ''Team
    leadership and staff training'', ''Customer service'', ''Conflict resolution'', ''Empathetic peer support'', ''Green cleaning practices'', ''Basic building maintenance'', ''First aid certification'']'
  hobbies: '[''Xeriscaping and succulent gardening'', ''Desert hiking'', ''Volunteer work at shelters and food banks'', ''DIY natural cleaning product creation'', ''Reading (sustainability, personal development)'',
    ''Yoga and meditation'', ''Healthy cooking'', ''Nature photography'', ''Puzzle solving (Sudoku, crosswords)'', ''Knitting'']'
  career_goals: Tanya aims to leverage her practical experience and compassionate leadership style to advance into a supervisory role, such as Facilities Operations Supervisor, within the next three years.
    She plans to obtain a Certified Professional Cleaner credential and a Green Cleaning Specialist certification, which will enable her to champion sustainable practices across the facilities she manages.
    Long‑term, she envisions leading a small, employee‑focused cleaning business that prioritizes environmental stewardship and a supportive workplace, while also mentoring entry‑level staff and advocating
    for healthier indoor environments.
