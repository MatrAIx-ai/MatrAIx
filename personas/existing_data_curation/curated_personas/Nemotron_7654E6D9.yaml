personas:
  professional: David Brunson, a budding mini architect, translates his love for LEGO into sketching detailed floor plans for his imaginary city; they improvise without a rigid blueprint, thriving on flexibility
    and their open‑minded curiosity.
  sports: David Brunson, a lively member of the Queens Kids Soccer Club, dashes across the field as a forward while cheering for the New York Knicks and Yankees, often swapping their soccer cleats for roller
    skates at the local park on weekends.
  arts: David Brunson, an avid sketcher of cartoon heroes like Spider‑Man and Moana, fills school notebooks with colorful charcoal drawings while listening to classic Disney soundtracks, and they idolize
    animator Glen Keane for his fluid character lines.
  travel: David Brunson, an adventurous explorer of local museums and parks, spends weekends at the American Museum of Natural History and Coney Island, and dreams of one day hiking the geysers at Yellowstone
    and visiting Japan’s Ghibli Museum.
  culinary: David Brunson, a budding chef in his family kitchen, loves whipping up pepperoni pizza slices, cheesy macaroni, and occasional sushi rolls after watching cooking videos, and they insist on adding
    a sprinkle of sesame seeds to their fruit kebabs.
  core: David Brunson is a curious, flexible 7‑year‑old who builds sprawling LEGO worlds, sketches cartoon characters to soothing Disney tunes, and never lets a missed homework assignment dampen his upbeat
    spirit.
background:
  cultural: David grows up in a middle‑class white family in Fresh Meadows, Queens, a neighborhood known for its cultural diversity. While his household celebrates traditional American holidays like Thanksgiving
    and Christmas, his school and community expose him to a wide range of cultures, languages, and cuisines, fostering his openness to new ideas and experiences.
