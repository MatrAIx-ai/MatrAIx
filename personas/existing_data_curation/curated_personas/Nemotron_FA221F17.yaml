  hobbies: '["Knitting and quilting circle", "Vegetable and flower gardening", "Senior bowling league", "Bridge club", "Cooking traditional Midwestern dishes", "Listening to classic country music", "Family
    genealogy research", "Church volunteer work", "Walking and light hiking", "Puzzle solving (crosswords, jigsaws)"]'
  career_goals: Although retired from formal employment, Taurus aims to remain a central, supportive figure in Waverly. She plans to expand her volunteer leadership by mentoring younger community members
    in event planning and garden stewardship. Maintaining her health through regular walking, gardening, and bowling is a priority, as is completing a family‑history scrapbook that she can share at local
    senior center events. She also aspires to organize an annual senior wellness fair that blends practical health workshops with her love of traditional Midwestern cooking.
