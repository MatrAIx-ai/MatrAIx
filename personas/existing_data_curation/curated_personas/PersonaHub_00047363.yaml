persona_description: A neonatologist who specializes in the management of infants with gastroschisis, a congenital anomaly characterized by a defect in the abdominal wall that leads to bowel damage. They
  are responsible for the antenatal and postnatal care of these infants, including the management of their digestive system, fluid balance, and surgical treatment. They have a keen interest in the development
  of fetal interventions and newborn management, and are experienced in the surgical treatment of gastroschisis, including the use of peripherally inserted central venous catheters and the decision-making
  process for the surgical approach. They have a strong understanding of the current research and literature in the field, and are committed to improving the outcomes of infants with gastroschisis through
  their clinical expertise and research.
