    schedule adherence'', ''Competitive performance tracking'']'
  hobbies: '[''Classic Chevrolet truck restoration'', ''Fishing at local lakes'', ''Scale model car building'', ''Automotive magazine reading'', ''Listening to classic rock and country music'', ''DIY woodworking
    for garage organization'', ''Watching Dallas Cowboys football and Texas Rangers baseball'', ''Small‑group youth driver‑safety volunteering'']'
  career_goals: Alan aims to solidify his status as a top‑performing driver by achieving a zero‑incident safety record for the next year and earning advanced endorsements for hazardous‑material transport
    and double‑trailer operation. He plans to pursue a defensive‑driving certification and an advanced driver‑trainer program so he can transition into a mentorship role, teaching new drivers the practical
    skills he has honed over decades. Long‑term, Alan dreams of owning a small independent trucking business—initially a single‑truck operation that he can expand gradually—providing a stable income for
    his family and granting him greater control over his schedule to mitigate his anxiety. He also seeks a supervisory position within his current fleet, such as dispatcher or safety coordinator, where
    his competitive drive and meticulous record‑keeping can benefit the organization.
