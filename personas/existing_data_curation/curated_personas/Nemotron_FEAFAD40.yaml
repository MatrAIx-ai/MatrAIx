personas:
  professional: Lori Moreno, a 36‑year‑old early childhood educator, blends meticulous curriculum design with calm, consistent classroom management, leverages their humanities‑based communication skills
    to mentor aides and cultivate collaborative partnerships with parents, and thrives in structured, predictable environments.
  sports: Lori Moreno, who enjoys weekend hikes on local Oldham County trails and a weekly yoga session at the community center, follows the Kentucky Wildcats basketball and Louisville Cardinals football
    teams, they stay active by jogging with the Louisville Track Club in the spring, and they prefer low‑impact, structured workouts over competitive sports.
  arts: Lori Moreno immerses themselves in historical fiction by authors such as Hilary Mantel and Ken Follett, finds inspiration from the paintings of Mary Cassatt, and they unwind to the folk melodies
    of Gillian Welch while browsing regional craft fairs for unique yarns and patterns.
  travel: Lori Moreno prefers meticulously planned short getaways, such as their recent hike through the Blue Ridge Mountains and a weekend in Asheville, NC, they harbor a long‑term wish to experience Kyoto’s
    tranquil gardens and the Cotswolds’ historic villages, and they balance budget‑conscious travel with occasional spur‑of‑the‑moment nature walks.
  culinary: Lori Moreno, an avid gardener, favors cooking with fresh herbs like rosemary and basil, they regularly prepare herb‑roasted chicken, seasonal roasted vegetable quinoa bowls, and artisan sourdough
    bread, while they indulge in occasional treats such as walnut‑caramel apple crumble after a long week.
  core: Lori Moreno blends a calming, detail‑driven professional life with a solitary love for knitting and gardening, yet they secretly hoard extra yarn and can’t resist a late‑night episode of historical
    drama on streaming.
background:
  cultural: Lori comes from a white, Midwestern family rooted in Kentucky's rural and suburban traditions. Raised in a community that values modesty, self‑reliance, and close family ties, she grew up attending
    a local church and participating in community events such as county fairs and volunteer fire‑house gatherings. Her humanities degree reflects an appreciation for literature, arts, and cultural history,
    which she brings into her childcare work. While she respects the region's customs and Southern hospitality, she also embraces contemporary educational practices, blending the stable, predictable environment
    of her upbringing with modern, structured early childhood pedagogy.
attributes:
  skills: '[''Early childhood development'', ''Curriculum planning and implementation'', ''Behavior management'', ''First Aid and CPR certification'', ''Parental communication'', ''Record‑keeping and regulatory
