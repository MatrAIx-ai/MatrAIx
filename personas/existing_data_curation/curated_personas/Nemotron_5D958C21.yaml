    partnership building'']'
  hobbies: '[''Cooking Mexican regional cuisine'', ''Gardening herbs and chilies'', ''Hiking in Texas nature preserves'', ''Ballet folklórico dancing'', ''Reading popular science books'', ''Volunteering
    with community STEM programs'', ''Participating in local book clubs'', ''Playing chess'', ''Attending live music events in Denton'']'
  career_goals: Maritza aims to become the lead STEM coordinator at her school, overseeing interdisciplinary curriculum that weaves cultural relevance into science, technology, engineering, and math instruction.
    She plans to earn a master’s degree in Educational Leadership to move into administrative roles where she can shape policy and teacher support systems. Her long‑term ambition includes establishing a
    district‑wide mentorship program linking students with local universities and tech companies, publishing research on culturally responsive STEM pedagogy for bilingual learners, and expanding after‑school
    STEM enrichment programs that serve underrepresented communities while maintaining her balanced, calm approach to work and life.
