personas:
  professional: Maritza Acosta is a seasoned secondary‑school biology and environmental science teacher who designs inquiry‑based labs, leverages Google Classroom, Desmos, and virtual simulations, mentors
    robotics and Science Olympiad clubs, leads professional‑development workshops, and applies her methodical, organized, and calm demeanor to create culturally relevant, bilingual learning experiences.
  sports: Maritza Acosta enjoys weekend hikes in the Texas Hill Country with her local trail‑running club, follows the Dallas Cowboys and FC Dallas for football and soccer, and participates in a community
    recreational softball league, balancing her energetic yet methodical fitness routine with a love for nature.
  arts: Maritza Acosta blends her love for ballet folklórico with a passion for reading popular science biographies such as Walter Isaacson’s "Steve Jobs," regularly attends live performances by The Old
    97’s, delights in Frida Kahlo’s paintings, and competes in community chess tournaments, letting artistic and intellectual pursuits shape her vibrant identity.
  travel: Maritza Acosta plans methodical, spreadsheet‑based trips that combine cultural immersion and nature, having explored Oaxaca’s historic markets and the Hill Country’s vineyards, while dreaming
    of a future pilgrimage to the ancient ruins of Palenque and a weekend getaway to New Orleans for its live jazz scene.
  culinary: Maritza Acosta, an avid home chef, cultivates her own chilies and herbs to craft authentic mole poblano, cochinita pibil, and handcrafted salsa verde, often pairing these dishes with fresh corn
    tortillas and occasionally experimenting with fusion recipes that blend local Texas produce with traditional flavors.
  core: Maritza Acosta embodies a calm, methodical spirit that seamlessly weaves cultural tradition, scientific curiosity, and community service into every facet of life, even while obsessively alphabetizing
    her spice rack and never missing a Friday night chess game.
background:
  cultural: Maritza’s Mexican heritage is central to her identity. Born to immigrant parents, she grew up in a bilingual household where Spanish was spoken daily and family gatherings emphasized traditions
    such as Día de los Muertos, Semana Santa, and Mexican Independence Day. She actively incorporates Mexican cultural references and scientific contributions (e.g., Guillermo González Camarena's television
    invention) into her lessons to create relatable learning experiences. In Denton, she participates in local Latino community events, volunteers at a community center offering tutoring for Spanish‑speaking
    students, and celebrates cultural holidays with her classroom, fostering a sense of belonging and harmony that mirrors her cooperative, kind nature.
attributes:
