  hobbies: '[''Cooking Puerto Rican cuisine'', ''Gardening'', ''Walking'', ''Yoga and meditation'', ''Reading mystery novels'', ''Listening to salsa and plena music'', ''Volunteering at community events'']'
  career_goals: Pilar aims to advance to an office manager or operations supervisor role within the next three years, where she can lead larger teams and drive organization‑wide efficiency projects. She
    plans to earn a Certified Administrative Professional (CAP) credential and enroll in part‑time business administration courses to broaden her strategic management knowledge. Long‑term, she hopes to
    mentor emerging female leaders in the Puerto Rican community and eventually launch a consulting practice that helps small businesses implement structured administrative systems.
