personas:
  professional: Agustin Davilatorres is a community‑focused freelance visual storyteller who blends DSLR photography, basic graphic design, and cultural narrative to craft promotional flyers, social‑media
    visuals, and photo essays for local art events, leveraging their curiosity, organizational reliability, and steady demeanor to juggle client deadlines while still carving out time for experimental side
    projects.
  sports: Agustin Davilatorres enjoys weekend hikes along El Yunque’s trails with the local San Juan Trail Runners club, plays pick‑up basketball at the Trujillo Alto park, and faithfully follows the Cangrejeros
    de Santurce baseball team and Vaqueros de Bayamón basketball squad, using these activities as both creative inspiration and a way to stay physically balanced.
  arts: Agustin Davilatorres frequents the Museo de Arte de Puerto Rico and street‑mural corridors of Calle Loíza, collecting vinyl records from Latin jazz legends like Arturo Sandoval and rock en español
    icons such as Soda Stereo, while they dive into art‑theory books by Susan Sontag and Donald Kuspit, and they curate informal photo‑exhibitions that blend contemporary mural photography with reflective
    essays.
  travel: Agustin Davilatorres balances spontaneous weekend day‑trips to Vieques, Cabo Rojo, and Old San Juan with carefully planned international journeys—having explored Tokyo, Mexico City, and Barcelona—and
    they dream of a cultural immersion in Kyoto, Lisbon, and Marrakesh, always budgeting travel expenses through a dedicated travel fund and using a mix of budget airlines and occasional reward credit‑card
    points.
  culinary: Agustin Davilatorres delights in cooking traditional dishes like mofongo with chicharrón, arroz con gandules with sofrito, and tostones with garlic aioli, seasoning meals with ají dulce and
    cilantro, and they often host small gatherings where the aromas of plantains and sofrito mingle with vinyl jazz, despite their habit of over‑spicing recipes in the quest for deeper flavor.
  core: Agustin Davilatorres is a curious, organized cultural chronicler who captures Puerto Rico’s visual heartbeat through photography, balances a disciplined savings plan with a love for vintage vinyl,
    and fuels creativity with hikes, cooking, and occasional back‑pain‑inducing carpentry.
background:
  cultural: 'Agustin grew up in Trujillo Alto, a municipality that blends suburban life with the vibrant cultural pulse of the San Juan metropolitan area. His upbringing was steeped in Puerto Rican traditions:
    family gatherings centered around food, music, and religious celebrations, with a strong emphasis on community solidarity (vecindad). He attended local public schools, where he was exposed to a mix
    of Afro‑Puerto Rican rhythms, Spanish colonial history, and contemporary island issues. Bilingualism is a daily reality, and he navigates both Spanish at home and English in official settings. The island’s
    artistic heritage—murals, danza, and folk crafts—has shaped his aesthetic appreciation and motivates his involvement in cultural projects. His identity reflects the resilience and adaptability characteristic
    of Puerto Ricans living under U.S. territorial status, balancing local pride with an openness to global influences.'
attributes:
  skills: '[''digital photography'', ''photo editing (Lightroom, Photoshop)'', ''basic graphic design'', ''bilingual communication (Spanish and English)'', ''community workshop coordination'', ''event logistics
    and budgeting'', ''woodworking'', ''carpentry'', ''traditional Puerto Rican cooking'', ''critical art analysis'', ''creative writing'']'
  hobbies: '[''visiting art galleries and street murals'', ''street photography'', ''attending live music performances (salsa, plena, reggaetón)'', ''cooking traditional Puerto Rican dishes'', ''hiking
    in El Yunque National Forest'', ''collecting vintage vinyl records'', ''reading contemporary literature, art theory, and philosophy'', ''learning Japanese'', ''balcony gardening'', ''volunteering at
    community cultural festivals'']'
  career_goals: He aims to formalize his creative skill set by completing a certificate program in graphic design or visual communication at a community college or through an online platform. Building a
    freelance portfolio that blends photography, design, and cultural storytelling is a priority. In the medium term, he envisions opening a modest community art space in Trujillo Alto where local artists
    can exhibit work and conduct workshops. He also hopes to develop a line of handcrafted furniture that reflects Puerto Rican artisanal traditions. Ultimately, Agustin aspires to work as a cultural program
    coordinator for a nonprofit organization, using his organizational talents and artistic sensibility to promote community engagement.
