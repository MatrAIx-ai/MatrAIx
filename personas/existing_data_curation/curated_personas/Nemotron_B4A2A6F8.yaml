  career_goals: Maria aims to move into a leadership position within her institution, such as department chair or program director, where she can champion curriculum innovation that emphasizes flexible,
    competency‑based pathways for adult learners. She plans to pursue a doctorate in Educational Leadership, publish research on adult learner resilience and flexible learning models, and expand community
    partnerships with local businesses and nonprofits. Ultimately, she seeks recognition as an award‑winning educator and hopes to influence regional policy on adult and continuing education.
