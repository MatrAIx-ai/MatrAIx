  career_goals: Yareth aspires to move into senior leadership within a nonprofit or community development organization where she can integrate her managerial expertise with her passion for cultural arts.
    She aims to become a Director of Community Programs, overseeing initiatives that celebrate Native American heritage, promote artistic innovation, and enhance social cohesion in the Phoenix metropolitan
    area. In the longer term, she envisions founding a cultural center that offers workshops, exhibitions, and mentorship for emerging Indigenous artists, while also advocating for mental‑health resources
    that address workplace stress and anxiety.
