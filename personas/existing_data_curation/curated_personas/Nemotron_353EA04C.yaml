  career_goals: Christina often declares she wants to 'help Mom' and imagines herself leading storytime for her stuffed animals. She expresses a desire to become a preschool teacher or a pediatric caregiver
    who can organize activities and keep things tidy for other children. As she grows, she hopes to take on roles that combine leadership, organization, and caring for others, such as a teacher, a nurse,
    or a community volunteer.
