  career_goals: Chester aims to become a lead product designer specializing in sustainable mechanical solutions, such as energy‑efficient HVAC components or low‑emission transportation modules. He hopes
    to secure a patent for a low‑cost, tree‑based cooling system he began prototyping during an internship. Over the next five years, he plans to pursue a master’s degree in Mechanical Engineering with
    a focus on renewable energy, while also building a professional network within Chicago’s green tech ecosystem. Ultimately, he envisions founding a socially‑driven engineering consultancy that partners
    with community organizations to create affordable, eco‑friendly infrastructure, allowing him to blend his technical expertise with his desire to contribute to his neighborhood’s resilience.
