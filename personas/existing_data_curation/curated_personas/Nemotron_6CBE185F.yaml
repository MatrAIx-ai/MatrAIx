personas:
  professional: Chester Marcelin, a 22‑year‑old mechanical engineering senior in Chicago, merges solid‑mechanics expertise with a keen eye for modern art to prototype sustainable HVAC components using SolidWorks,
    3‑D printing, and Arduino‑driven kinetic sculptures, yet they often let flexible scheduling cause missed deadlines.
  sports: Chester Marcelin, an avid participant in pick‑up basketball games at the West Loop community center and a self‑declared Chicago Bulls fan, rides the Lakefront Trail with the Chicago Cyclists Club
    every Saturday, though they sometimes skip workouts after a stressful week, preferring a relaxed stretch of yoga instead.
  arts: Chester Marcelin, a regular wanderer of the Art Institute’s modern galleries and a sketcher of street murals across Chicago’s neighborhoods, frequents live jazz at the Green Mill and hip‑hop shows
    at The Hideout, while their evenings are often spent devouring speculative fiction by Neal Stephenson and graphic novels like Saga, reflecting a blend of visual and narrative arts that fuels their design
    work.
  travel: Chester Marcelin, who prefers budget‑friendly getaways, has biked to Door County for a weekend art festival, explored the graffiti‑laden streets of Berlin on a student exchange, and dreams of
    visiting Kyoto’s traditional craft workshops, planning most trips around local festivals and using points from a student credit card, yet they sometimes overpack and forget essential tools for prototypes.
  culinary: Chester Marcelin, an enthusiastic home cook of Southern comfort cuisine, often prepares fried chicken, collard greens, and cornbread for friends while experimenting with local Chicago farmers‑market
    produce like sweet potatoes and okra, and they occasionally over‑season dishes, leading to a habit of pairing meals with an experimental playlist of jazz and hip‑hop.
  core: Chester Marcelin, a 22‑year‑old Chicago‑based mechanical engineering enthusiast, blends art‑driven design with a breezy, worry‑prone personality, juggling sketchbooks and micro‑controller projects
    while forever hunting the perfect balance between structured deadlines and spontaneous creativity.
background:
  cultural: Chester is an African American raised on Chicago’s South Side, where the legacy of the Great Migration and a vibrant Black cultural scene shaped his identity. Family gatherings often centered
    around church choirs, soul food, and storytelling, grounding him in a sense of community responsibility. He grew up surrounded by the city’s blues clubs, mural projects, and community activism, which
    cultivated his appreciation for artistic expression and social justice. This background fuels his desire to use engineering as a tool for community uplift, ensuring his designs address the needs of
    under‑served neighborhoods. While he embraces the broader multicultural fabric of Chicago, his African‑American heritage remains a core influence in his taste for music, cuisine, and his commitment
    to collaborative, harmony‑focused teamwork.
