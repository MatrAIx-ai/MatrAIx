  hobbies: '[''Visiting regional art galleries and museums'', ''Watercolor landscape painting'', ''Gardening native plants'', ''Birdwatching'', ''Cooking Southern recipes with creative twists'', ''Attending
    local craft fairs'', ''Book club participation (historical fiction)'', ''Volunteering for community theater'', ''Hiking in the Blue Ridge foothills'']'
  career_goals: Athleen aims to transition into a senior trainer role where she can design and lead community safety outreach programs, emphasizing mental‑health awareness for protective‑service personnel.
    She hopes to mentor a new generation of officers, develop workshops that blend practical security skills with empathy and cultural understanding, and eventually volunteer as a docent at the regional
    art museum, merging her professional experience with her love of art and learning.
