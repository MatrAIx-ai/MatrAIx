  hobbies: '[''Basketball'', ''Financial mentorship'', ''Church volunteerism'', ''Hiking'', ''Gardening'', ''Art exhibitions'', ''Live jazz concerts'', ''Cooking Southern cuisine'', ''Traveling to cultural
    festivals'', ''Reading non‑fiction on finance and social issues'']'
  career_goals: Christopher’s primary career ambition is to advance to a senior loan officer or branch manager role where he can influence lending policies to better serve underserved communities. He plans
    to earn the Certified Credit Counselor (CCC) and Certified Financial Planner (CFP) designations, develop a community‑focused financial literacy program in Goochland County, and eventually launch his
    own boutique consulting firm that provides micro‑loans and business development support to Black entrepreneurs in rural Virginia. He also aims to stay at the forefront of fintech innovations to improve
    loan processing efficiency.
