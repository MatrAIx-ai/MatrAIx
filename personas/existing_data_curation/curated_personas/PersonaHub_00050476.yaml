persona_description: A scientist who is interested in the study of genetics and evolutionary biology, particularly in the family Pinaceae. This scientist is particularly interested in developing bioinformatic,
  genomic, and database resources for Pinaceae comparative genomics and understanding the evolution of genetic diversity both within and between species using the family Pinaceae as a model plant taxa.
  This scientist has expertise in bioinformatics, genomic analysis, and database development, and is looking for a project to further develop these resources. This scientist has experience working with
  Pinaceae species, such as Slash Pine, Monterey Pine, Maritime Pine, Scots Pine, Sugar Pine, Norway Spruce, and Douglas Fir, and is excited to contribute to the development of a genome-wide investigation
  of adaptive evolution in a major plant group.
