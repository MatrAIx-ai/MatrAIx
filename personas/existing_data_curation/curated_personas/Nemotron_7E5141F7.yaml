personas:
  professional: Izel Johnson is a data‑analysis specialist with a background in applied mathematics and laboratory research, who leverages Python, R, and SQL to craft clean visualizations for community
    health projects while quietly coordinating remote teams and mentoring aspiring programmers.
  sports: Izel Johnson prefers low‑impact fitness, attending weekly evening yoga classes at a community center and strolling through Queens’s local parks for cardio, while cheering for the New York Knicks
    and the New York Rangers as their favorite professional sports teams, and they occasionally join a weekend casual softball league with a small group of friends.
  arts: Izel Johnson immerses themselves in science‑fiction literature from authors like Nnedi Okorafor and Liu Cixin, attends occasional virtual talks by astrophysicist Neil deGrasse Tyson, and indulges
    in classic jazz albums by Miles Davis and contemporary R&B by H.E.R., allowing these artistic influences to inform both their coding tutorials and garden‑inspired recipes.
  travel: Izel Johnson enjoys meticulously planned weekend getaways to nearby botanical gardens such as the New York Botanical Garden and the historic Caribbean heritage site of St. Martin, balancing their
    love for quiet nature walks with occasional trips to tech conferences in Boston, while budgeting travel expenses to protect family finances.
  culinary: Izel Johnson delights in turning balcony‑grown herbs into soulful Caribbean‑inspired dishes such as jerk chicken with rosemary‑lime glaze, callaloo soup, and plantain‑infused quinoa bowls, cooking
    at an intermediate skill level that blends precise measurement with occasional improvisation, often pairing meals with mango‑chili salsa.
  core: Izel Johnson is a quietly curious data analyst who gardens, codes, and mentors in equal measure, balancing disciplined financial habits with a love for soulful Caribbean flavors, while occasionally
    neglecting routine health checks in favor of yoga and plant‑based meals.
background:
  cultural: Izel is an African American woman raised in Queens, New York, with Caribbean roots—her mother immigrated from Jamaica—infusing her upbringing with a blend of African American and Caribbean traditions.
    She grew up attending a historically Black church where music, storytelling, and communal support emphasized resilience and mutual aid. Living in the multicultural neighborhood of Hollis, she participates
    in local cultural festivals, enjoys soul food and Caribbean cuisine, and stays informed on issues of representation and equity in STEM. Her cultural identity fuels her commitment to mentorship, community
    empowerment, and preserving the rich heritage of Black and Caribbean communities in her city.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''SQL database querying'', ''Data visualization (Matplotlib, ggplot2)'', ''Statistical modeling'', ''Laboratory techniques (PCR, electrophoresis)'',
    ''Technical writing'', ''Project management'', ''Problem solving'', ''Troubleshooting hardware'', ''Remote collaboration tools (Slack, Trello)'', ''Mentorship and coaching'']'
  hobbies: '[''Urban gardening'', ''Experimental cooking (soul and Caribbean cuisine)'', ''Reading (science fiction, popular science, self‑improvement)'', ''Puzzle solving (crosswords, Sudoku)'', ''Mindfulness
    yoga'', ''Personal tech blog writing'', ''Mentoring girls in robotics and coding'']'
  career_goals: Izel aims to re‑enter the workforce in a flexible, remote capacity that accommodates her family responsibilities. She plans to earn a professional data‑science certification and transition
    into a part‑time data analyst role for a community‑focused non‑profit, where she can apply her analytical skills to health or environmental projects. Long‑term, she aspires to mentor Black girls in
    STEM, perhaps by launching a community tech incubator in Queens, and to pursue a master's degree in Public Health to blend data analytics with public‑service impact. She also hopes to achieve financial
    independence while maintaining a balanced, harmonious home life.
