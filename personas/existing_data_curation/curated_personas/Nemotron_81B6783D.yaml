  career_goals: Dacia aims to transition from a frontline sales role to a leadership position within the retail sector, such as store manager and eventually district manager, where she can implement operational
    efficiencies at a larger scale. She is also interested in specializing as a merchandising analyst, using her analytical skills to guide product assortment and pricing strategies across multiple locations.
    Long‑term, Dacia envisions launching a boutique storefront that blends technology products with curated, community‑focused experiences, allowing her to combine her curiosity for new ideas with pragmatic
    business execution.
