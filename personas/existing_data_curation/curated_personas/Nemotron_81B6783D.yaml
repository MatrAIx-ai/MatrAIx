personas:
  professional: A data‑driven retail operations specialist, Dacia Lee merges their STEM background with frontline experience to streamline inventory control, design efficient POS workflows, and mentor staff,
    while eyeing a progression from store associate to district manager and eventually a boutique tech‑focused storefront.
  sports: Keen on low‑impact fitness, Dacia Lee is a devoted kayaker on the Gulf of Mexico, paddles sunrise routes with a small local club, enjoys occasional beach volleyball matches with friends, and follows
    the Tampa Bay Rays and Miami Heat, using their love of outdoor movement to stay fit without large‑scale team commitments.
  arts: An avid consumer of documentary film and nonfiction narratives, Dacia Lee frequently attends screenings of works by director Errol Morris, they enjoy the folk‑rock sounds of Sufjan Stevens and the
    piano compositions of Ludovico Einaudi, and find inspiration in the minimalist paintings of Agnes Martin during quiet evenings at the local art museum.
  travel: A planner of purposeful getaways, Dacia Lee prefers boutique B&Bs in coastal towns like Amelia Island, they have explored the historic streets of Savannah, and dream of a week‑long retreat in
    the Blue Ridge Mountains, always crafting detailed itineraries that balance solitude with low‑key cultural tours.
  culinary: A home‑cook with a fondness for Floridian flavors, Dacia Lee regularly prepares grilled mahi‑mahi with citrus‑herb butter, key‑lime pie using fresh limes, and roasted sweet potatoes seasoned
    with rosemary, while they occasionally over‑indulge in artisan chocolate truffles on quiet nights.
  core: Dacia Lee is a disciplined, curiosity‑driven retail professional who channels solitary puzzle‑solving into operational excellence, they mentor middle‑school girls in STEM, and they balance a penchant
    for tech gadgetry with a love for coastal kayaking.
background:
  cultural: Dacia was raised in a middle‑class white family in the southeastern United States, where a blend of traditional values and pragmatic work ethic shaped her outlook. Her upbringing emphasized
    education, community involvement, and self‑reliance, encouraging her to pursue a STEM degree at a state university. Living in Bradenton, Florida, she embraces the relaxed coastal lifestyle while maintaining
    the disciplined, achievement‑oriented mindset typical of her Mid‑Atlantic roots. Her cultural identity reflects a respect for both the practical necessities of everyday life and the curiosity to explore
    new ideas, balancing a modest, community‑focused demeanor with a drive for professional excellence.
