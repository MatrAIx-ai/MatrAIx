  career_goals: Scott aims to complete a Bachelor's degree in Business Administration with a focus on Project Management. He aspires to become a certified Project Management Professional (PMP) and secure
    an entry‑level project coordinator role in a structured corporate environment, such as a technology firm or financial services company. Over the next five years, he hopes to advance to a project manager
    position where he can lead cross‑functional teams, implement efficient workflows, and contribute to a supportive workplace culture that promotes employee well‑being. He values clear expectations, predictable
    processes, and opportunities for continual skill development.
