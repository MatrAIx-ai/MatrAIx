personas:
  professional: Scott Hartsell, a 19‑year‑old business administration student, leverages their knack for coordinating group projects, Excel‑driven data analysis, and clear public‑speaking to excel in the
    university debate and improv clubs, while they cherish structure and practical realism, driving their pursuit of a future PMP certification and a disciplined entry‑level project coordinator role.
  sports: Scott Hartsell is a regular on his university’s intramural basketball courts and ultimate frisbee fields, a fan of the New York Knicks and Mets, and uses early‑morning jogs along the East River
    as a stress‑relief ritual, though they sometimes miss practice sessions when their busy schedule piles up.
  arts: Scott Hartsell channels their outgoing energy into weekly improv sessions with the campus UCB troupe, board‑game nights featuring Catan and Ticket to Ride, and regular visits to NYC cultural hotspots
    like the Met’s contemporary art wing and live shows at the Bowery Ballroom watching The Strokes, which together reinforce their love for collaborative creativity and vibrant artistic expression, and
    they often credit these experiences for sharpening their quick‑thinking skills.
  travel: Scott Hartsell prefers economical, schedule‑driven travel, often escaping to the Catskill hiking trails or a quick train ride to Philadelphia for a historic tour, while they dream of a spring
    backpacking adventure through Barcelona’s barrios and a future immersion in Tokyo’s tech scene, balancing limited student funds with a craving for global cultural immersion.
  culinary: Scott Hartsell enjoys semi‑skilled cooking sessions with friends, frequently whipping up avocado toast with smoked salmon, spicy chicken tikka masala, and weekend ramen bowls flavored with miso,
    shiitake mushrooms, and soft‑boiled eggs, favoring bold flavors and communal dining over solitary fast‑food grabs, and they love the ritual of slicing fresh basil into each dish.
  core: Scott Hartsell is a structure‑loving, socially energized, yet anxiety‑prone college junior who balances meticulous project planning with spontaneous game nights, but they sometimes overcommit and
    neglect self‑care in the rush.
background:
  cultural: Scott grew up in a middle‑class white family in Queens, New York. His parents emphasized education, responsibility, and community involvement, instilling a strong work ethic and respect for
    punctuality. Family traditions include celebrating mainstream American holidays such as Thanksgiving and Christmas, along with occasional cultural practices inherited from his Irish‑German ancestry,
    like Sunday family dinners. Living in New York City exposed him to a diverse, multicultural environment, shaping his inclusive outlook while his upbringing retained values of reliability, cooperation,
    and pragmatism. He identifies as an American who appreciates both his family's modest suburban roots and the dynamic urban culture of his hometown.
