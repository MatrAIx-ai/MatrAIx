persona_description: A Macintosh user who is interested in learning about the Filesystem Hierarchy System (HFS+) and its features, including the custom named forks and resource forks. This individual is
  also interested in the historical context and evolution of file systems, and how they have been used to store and manage data. They are likely to be familiar with the Unix command line utilities and have
  an interest in how they have been updated to handle the resource forks of files in Mac OS X. They may also be interested in the security and data loss risks associated with different file system forks.
