personas:
  professional: Lee McClure, a retired senior center program coordinator, leverages their associate’s degree in Business Administration, keen organizational skills, and budget‑savvy expertise to design
    and run community literacy workshops, senior activities, and volunteer mentorship programs, blending a curiosity‑driven search for new outreach ideas with a practical, methodical execution style.
  sports: Lee McClure, an avid senior hiker, participates in the Salt Lake County Senior Walking Club for gentle weekly treks through the Wasatch foothills, follows the Utah Jazz and Real Salt Lake with
    enthusiasm, never misses the Utah Utes football season, and they use these activities to stay fit and socially connected.
  arts: Lee McClure, a dedicated quilter and historical fiction devotee, enjoys novels by Ken Follett, Philippa Gregory, and Margaret Drabble, regularly visits the Utah Museum of Fine Arts to see works
    by Mary Cassatt and Faith Ringgold, and channels the vibrant patterns of traditional Amish quilting into heirloom blankets that reflect their love of storytelling and visual art.
  travel: Lee McClure, a careful itinerary planner, favors organized road trips to nearby wonders such as Zion, Bryce Canyon, and the Grand Canyon, dreams of a cultural pilgrimage through Tuscany’s vineyards,
    and balances their wanderlust with a modest travel budget and occasional family gatherings in the Pacific Northwest.
  culinary: Lee McClure, a skilled home preserver, delights in canning heirloom tomatoes, pickling beets with dill and garlic, simmering strawberry‑lavender jam, and baking Utah scones laced with sage,
    often incorporating fresh garden harvests like carrots, squash, and wild sage into their seasonal meals.
  core: Lee McClure, a garden‑loving genealogist, stitches stories of family history into heirloom quilts while juggling a jam‑filled pantry, an overbooked volunteer calendar, and a penchant for forgetting
    to water indoor plants when engrossed in archival research, and they often laugh at their own forgetfulness.
background:
  cultural: Lee Elizabeth Mcclure comes from a multi‑generational white American family with English, Irish, and German ancestry that settled in the Intermountain West in the early 1900s. Raised in a small
    farming community, she was taught values of self‑reliance, practicality, and community service. The region’s emphasis on stewardship of the land fostered her love of gardening and outdoor activities,
    while regular church gatherings and family traditions cultivated a cooperative spirit and respect for heritage. These cultural influences shape her dedication to volunteerism, preservation of family
    history, and balanced, pragmatic outlook on life.
