    in small crews'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Herb gardening'', ''Traditional Mexican cooking'', ''Crocheting'', ''Listening to regional Mexican music'', ''Watching classic telenovelas'', ''Walking in local parks'', ''Volunteer community
    service'']'
  career_goals: Onix aims to advance to a lead assembler or shift supervisor position within the next three years, where she can mentor new hires and shape workflow improvements. She plans to earn a Certified
    Production Technician (CPT) credential and enroll in evening courses toward an associate degree in industrial technology to broaden her technical knowledge. Her long‑term ambition is to lead a small,
    highly efficient team that consistently meets production targets while maintaining a safe and organized work environment, allowing her to achieve greater financial stability and professional recognition.
