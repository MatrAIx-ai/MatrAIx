personas:
  professional: Onix Morales, a 33‑year‑old assembler and fabricator with over a decade of hands‑on experience in fast‑paced manufacturing, excels at interpreting technical drawings, operating CNC equipment,
    and bilingual team coordination, and is actively pursuing a Certified Production Technician credential to step into a lead assembler or shift supervisor role.
  sports: Onix Morales enjoys low‑impact fitness, regularly walks the historic San Antonio Missions trails, plays on a community softball league in the spring, and follows the San Antonio Spurs and local
    soccer club San Antonio FC for seasonal excitement.
  arts: Onix Morales finds creative release in crocheting vibrant blankets and potholders, listens to regional mariachi and norteño bands like Vicente Fernández while working, and relaxes by streaming classic
    Spanish‑language telenovelas starring actors such as Thalía and Fernando Colunga.
  travel: Onix Morales prefers road‑trip adventures that align with family holidays, has visited the colonial city of Puebla for a Día de los Muertos celebration, dreams of exploring the historic streets
    of Seville during Semana Santa, and plans most getaways around budget constraints and a three‑day work schedule.
  culinary: Onix Morales is a skilled home cook who meticulously prepares tamales, pozole, and enchiladas using home‑grown cilantro, oregano, and chilies, balances traditional recipes with occasional Tex‑Mex
    twists, and loves experimenting with mole sauces and fresh corn tortillas.
  core: Onix Morales blends a disciplined assembly‑line mindset with a love for heritage recipes, community service, and quiet routines, all while juggling ambition for leadership and a penchant for late‑night
    crochet marathons.
background:
  cultural: Onix grew up in a close‑knit Mexican‑American family in San Antonio, where Spanish was spoken at home alongside English. Her upbringing emphasized strong family ties, Catholic traditions, and
    the celebration of Mexican holidays such as Día de los Muertos, Cinco de Mayo, and the Feast of Our Lady of Guadalupe. These cultural influences nurture her practical work ethic, love of community,
    and appreciation for traditional cuisine and music. Her bilingual ability and respect for cultural rituals shape her interactions both at work and within the wider community, reinforcing a balanced
    blend of heritage and modern American life.
attributes:
