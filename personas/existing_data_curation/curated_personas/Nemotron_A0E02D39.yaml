  hobbies: '[''Cooking traditional Salvadoran cuisine'', ''Gardening (vegetables and herbs)'', ''Coaching youth soccer'', ''Playing dominoes'', ''Watching classic detective TV shows'', ''Following soccer
    (especially the Salvadoran national team)'', ''Participating in Salvadoran cultural festivals and community events'', ''Singing in church choir'']'
  career_goals: As he approaches retirement, Efren aims to channel his extensive experience into mentorship and community outreach. He plans to spearhead a bilingual community‑liaison program within the
    Houston Police Department to strengthen trust with Latino neighborhoods, particularly the Salvadoran community. He also seeks to develop and deliver cultural‑competency training for officers, volunteer
    as a youth‑sports mentor, and author a memoir that chronicles his journey from an immigrant background to a senior police officer, preserving his legacy and inspiring future generations.
