  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Creative writing (mystery short stories)'', ''Puzzle solving (cryptic crosswords, escape rooms, code‑breaking)'', ''Hiking in Nicolet National
    Forest'', ''Bird watching'', ''Tabletop role‑playing games (D&D)'', ''Listening to ambient/indie music'', ''Reading true‑crime documentaries'', ''Attending local art exhibitions'']'
  career_goals: Driven by a competitive nature and a desire to innovate, Karrie aims to become a lead detective in the Forest County Sheriff’s Department within the next five years, focusing on cold‑case
    and cyber‑crime investigations. She plans to complete her bachelor’s degree in criminal justice and pursue specialized training in forensic psychology and AI‑assisted data analysis. Long‑term, she envisions
    establishing a private consultancy that advises law‑enforcement agencies on creative investigative methods and provides mental‑health support frameworks for detectives coping with high‑stress cases.
    She also hopes to publish articles that bridge artistic creativity with crime‑solving techniques, influencing future investigators.
