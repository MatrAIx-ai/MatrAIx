  career_goals: Driven by a competitive spirit, Francesca seeks to advance from front-line sales to leadership roles. Over the next two years she aims to obtain a store manager position, leveraging her
    practical retail experience and analytical skills. She plans to complete a bachelor's degree in business administration through online courses while earning certifications in retail management and visual
    merchandising. Long-term, Francesca envisions becoming a district manager overseeing multiple stores in the Appalachian region, or eventually opening her own boutique that blends local artisan products
    with modern retail practices. She also aspires to mentor other women in retail, helping them develop the same balance of curiosity and practicality that defines her approach.
