personas:
  professional: Rosanna Thomas, a meticulous student council vice‑president and budding event planner, channels her organized, skeptical mindset and competitive drive into coordinating seamless school functions
    while constantly refining timelines, budgets, and promotional strategies on Excel and PowerPoint.
  sports: Rosanna Thomas, a varsity 400‑meter sprinter on the Lightning Runners track club and occasional cheerleader for the Tigers football team, channels her competitive spirit into weekly drills while
    cheering for the Chicago Cubs and joining weekend pickup basketball games at the local community center.
  arts: Rosanna Thomas, an avid photographer and sci‑fi enthusiast, spends weekends emulating Annie Leibovitz’s portrait lighting, editing short TikTok videos set to Billie Eilish tracks, and staying up
    late dissecting the latest Neil Gaiman novel for narrative inspiration.
  travel: Rosanna Thomas plans vacations with spreadsheet precision, having documented road trips to Washington D.C. and a weekend at Orlando’s theme parks, while dreaming of a study‑abroad summer in Paris
    and a cultural immersion in Tokyo’s Shibuya district.
  culinary: Rosanna Thomas whips up practical campus‑friendly meals like one‑pot tomato‑basil pasta, avocado toast topped with chili flakes, and spicy sriracha chicken burrito bowls, favoring pantry staples
    such as dried chickpeas, mozzarella, and lime juice, though they sometimes over‑season dishes to the amusement of friends.
  core: Rosanna Thomas navigates high school with a meticulous, competitive edge, channeling anxiety into careful planning, budget‑savvy event coordination, and a love for photography, DIY crafts, and quick‑track
    cooking.
background:
  cultural: Rosanna grew up in Dallas, a small town in Paulding County, Georgia, where Southern hospitality and community involvement are central. Her family attends a local Baptist church, and she participates
    in church youth groups, community fairs, and high‑school sports events that shape her social life. The region blends rural traditions—family gatherings, Southern cooking, and holiday celebrations—with
    the growing influence of nearby Atlanta’s suburban culture. This background instills in her values of hard work, respect for tradition, and a strong sense of belonging to her close‑knit community.
