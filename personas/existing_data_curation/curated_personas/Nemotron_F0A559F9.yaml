  career_goals: Rosanna aims to graduate high school with honors, earn a scholarship, and pursue a bachelor's degree in Business Administration with a focus on Hospitality or Marketing. She envisions a
    career as a professional event planner or community outreach coordinator, where she can blend her organizational talent, social flair, and competitive drive to create memorable events. In the short
    term, she plans to secure a summer internship with a local event venue or a marketing firm to gain real‑world experience and develop a strong professional network.
