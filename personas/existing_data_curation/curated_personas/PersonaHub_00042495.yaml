persona_description: A systems engineer or network engineer who specializes in the design and optimization of communication systems, particularly those involving multiple parallel links. This person has
  experience working with error-correcting codes and is familiar with linear programming and algorithms for finding optimal combinations of messages to maximize the expected value of decodable messages.
  They are interested in how these systems can be used to improve the value of data returned from spacecraft under certain conditions.
