personas:
  professional: Christian Paramo, a budding junior digital storyteller, merges vivid animal sketches, elaborate LEGO constructions, and Scratch-animated adventures into collaborative school projects, harnessing
    their imaginative curiosity, organized mindset, and talkative flair to captivate classmates.
  sports: Christian Paramo, an enthusiastic forward on the local youth soccer league team, drills after school at the community field, cheers for the hometown Falcons, and balances that with weekend hikes
    through nearby woods, building endurance and a love for outdoor exploration.
  arts: Christian Paramo, a lively participant in the school art club, channels boundless imagination into detailed animal sketches and fantastical scenes, dances to a mix of traditional folk ensemble melodies
    and pop hits by Imagine Dragons, and showcases short Scratch animations in talent shows.
  travel: Christian Paramo, a curious traveler who loves family road trips, enjoys planning weekend visits to the nearby national forest and the coastal town of Monterey, dreams of exploring the vibrant
    theme park of Disneyland, and balances these adventures with budgeting constraints set by their parents.
  culinary: Christian Paramo delights in helping prepare steaming corn masa parcels wrapped in husks and a warm cinnamon-infused atole, can whip up a quick cheese quesadilla for snack, and prefers fresh
    fruit like mango slices, though they often sneak extra chocolate chips into baked cookies.
  core: Christian Paramo blends a vivid imagination with a talkative, collaborative spirit, turning every LEGO brick and sketch into a story, while occasionally neglecting bedtime to finish a Scratch animation,
    making them both a charming storyteller and a lovable night owl.
background:
  cultural: Christian grows up in a Mexican‑American household in Marshall, Texas, where Spanish is spoken at home and Mexican traditions are honored. His family celebrates Día de los Muertos, Las Posadas,
    and Christmas with festive foods such as tamales, tacos, and atole. At the same time, he experiences Southern Texas culture through local festivals, Friday night football games, and community gatherings.
    This bicultural environment nurtures his appreciation for family, hospitality, and artistic expression, influencing his love for colorful murals, music, storytelling, and community‑centered activities.
