  career_goals: He dreams of becoming a children's book author and illustrator, where he can blend his love of art, storytelling, and Mexican heritage to inspire young readers. He also imagines designing
    video games that let players explore imaginative worlds, aiming one day to work as a game developer or animator. Additionally, he wishes to help other kids discover their creativity by becoming a teacher
    or community mentor, fostering a supportive environment for learning and artistic expression.
