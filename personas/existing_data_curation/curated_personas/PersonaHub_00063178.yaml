persona_description: A German Shepherd breeder who is dedicated to maintaining the genetic integrity of her animals and is currently conducting research on the inheritance of coat colors in the breed. She
  is interested in understanding the genetic mechanism behind white coat coloration in her animals and is seeking to determine the characteristics of a possible mutation and how a coat color and eye color
  mutation could occur simultaneously. She is also curious about the inheritance of coat colors in the breed and is interested in the possibility of spotting as a cause of white coat coloration.
