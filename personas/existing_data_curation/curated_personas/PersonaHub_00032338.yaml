persona_description: A physicist who is interested in the application of item response theory (IRT) to the assessment of physics concepts and the development of diagnostic instruments such as the Force
  Concept Inventory (FCI). They are also interested in the use of item response curves (IRC) to analyze the performance of items on the FCI and to identify misconceptions in student understanding. They
  are familiar with the FCI authors' original intentions for the instrument and are eager to explore the potential of IRC analysis to improve the instrument and to tailor physics instruction to combat misconceptions.
