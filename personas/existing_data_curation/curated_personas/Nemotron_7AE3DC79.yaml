  hobbies: '[''Museum and gallery visits'', ''Genealogy research'', ''Herb gardening'', ''Quilting and embroidery'', ''Digital photography'', ''Reading historical fiction and non-fiction'', ''Cooking Southern
    cuisine'', ''Attending small craft workshops'', ''Walking and birdwatching'', ''Crossword puzzles and Sudoku'']'
  career_goals: Although retired from formal employment, Del seeks to deepen her contribution to the Rocky Mount community. Her primary ambition is to lead a local history preservation project that documents
    the stories of Franklin County families, culminating in a public exhibit and a self-published family history volume. She also aims to establish a monthly art‑appreciation circle for seniors, curate
    small traveling art displays at the county library, and complete an online certificate in digital archiving. On a personal level, she hopes to travel to Washington, D.C., to explore the Smithsonian
    museums and to complete a photo‑journal of seasonal changes in her hometown.
