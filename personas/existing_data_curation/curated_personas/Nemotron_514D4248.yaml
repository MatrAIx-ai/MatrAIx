personas:
  professional: Rodquez Withers, a strategic HR professional with a talent for DEI, data‑driven employee engagement, and assertive yet collaborative communication, leverages Workday and ADP analytics to
    shape inclusive workplace cultures while they mentor youth through church programs.
  sports: Rodquez Withers, an avid pick‑up basketball player who courts the Historic Fourth Ward Park, follows the Atlanta Hawks and Atlanta United FC, hikes the Chattahoochee River Trail every weekend,
    and they volunteer as a youth basketball coach at their church.
  arts: Rodquez Withers, a regular attendee of Atlanta’s EAST Gallery openings and street‑art tours featuring works by Kehinde Wiley and Banksy, captures city life with a Leica M10, and they draw creative
    energy from the lyrical storytelling of Janelle Monáe and the improvisational vibes of local jazz collectives.
  travel: Rodquez Withers, who plans trips with spreadsheet itineraries but leaves room for spontaneous detours, has explored the historic districts of New Orleans and Charleston, dreams of a culinary pilgrimage
    to Cape Town and Marrakech to deepen Southern‑African fusion recipes, and they prefer short‑haul flights to maximize weekend hiking getaways.
  culinary: Rodquez Withers, an intermediate home chef who blends Southern comfort with African flavors, regularly prepares shrimp‑and‑grits seasoned with jollof‑spiced collard greens, experiments with
    suya‑marinated chicken, and they keep a pantry stocked with smoked paprika, berbere, and fresh okra.
  core: Rodquez Withers, a curious 31‑year‑old HR strategist who balances data‑driven DEI initiatives with Saturday basketball, art‑gallery hopping, and an unrelenting quest for the perfect Southern‑African
    fusion dish, and they sometimes over‑commit to community projects at the expense of sleep.
background:
  cultural: Rodquez grew up in a close-knit African-American family in the Atlanta suburbs, where church, music, and community gatherings were central to daily life. His Southern roots are reflected in
    his love for soul food, gospel music, and storytelling traditions passed down from grandparents who migrated from the Deep South. He attended a historically black college for his business degree, which
    deepened his connection to Black cultural heritage and sparked his commitment to diversity, equity, and inclusion. These experiences shape his perspectives on workplace culture, community engagement,
    and his dedication to uplifting underrepresented voices.
