  hobbies: '[''Visiting art galleries and street-art tours'', ''Playing pickup basketball'', ''Hiking Chattahoochee River trails'', ''Cooking Southern-African fusion dishes'', ''Reading business, psychology,
    and sci-fi books'', ''Photography'', ''Mentoring youth in career programs'', ''Traveling to new cities'']'
  career_goals: Rodquez aims to advance to an HR Manager role within the next two years, focusing on building a high-performing, inclusive culture at a mid-size company in the Atlanta metropolitan area.
    He plans to earn the SHRM-CP certification and later the SHRM-SP, deepening his expertise in strategic HR leadership. In the longer term, he envisions becoming a Director of People Operations, overseeing
    talent strategy and organizational development across multiple sites, and eventually launching his own consultancy that helps small and medium businesses implement data-driven DEI and employee well-being
    programs.
