persona_description: A medical doctor who specializes in electrophysiology and the implantation of pacemakers. The doctor is part of a team at Wake Forest Baptist Medical Center's Heart Center and has been
  involved in the implantation of one of the first wireless pacemakers in the country. The doctor is interested in the benefits of wireless pacemakers for patients living in rural areas and has experience
  with the three models of the wireless pacemaker, made by St. Jude Medical. The doctor is also interested in the future of wireless devices in the medical field and has expertise in leadless pacemakers.
