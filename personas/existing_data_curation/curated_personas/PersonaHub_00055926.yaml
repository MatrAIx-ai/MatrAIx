persona_description: A public health official or a government official responsible for managing the COVID-19 pandemic in an Ontario jurisdiction. This persona is likely to be interested in understanding
  and applying ethical frameworks for vaccine distribution to ensure equitable and effective vaccine prioritization and distribution decisions, while also respecting human rights protections and taking
  steps to prevent and treat COVID-19 among vulnerable groups. They may also be interested in applying the Ontario Human Rights Commission's Policy statement on a human rights-based approach to managing
  the COVID-19 pandemic, and considering the potential health equity impacts of vaccine distribution.
