personas:
  professional: Regina Pagan is a community-focused home catering entrepreneur who blends meticulous budgeting and scheduling with a flair for traditional family recipes, using their bilingual skills to
    coordinate neighborhood festivals and lay the groundwork for a health-outreach certification.
  sports: Regina Pagan cheers for the Miami Dolphins on Sundays, follows the Miami Heat playoffs, supports Inter Miami CF, and participates in a weekend walking club at the Immokalee Nature Trail, while
    occasionally joining a community softball league during summer evenings.
  arts: Regina Pagan sings alto in the local church choir, often performing hymns alongside regional Mexican songs by Los Tigres del Norte, enjoys dancing to cumbia beats, unwinds by watching telenovelas
    starring Thalía and Sebastián Rulli, and crafts embroidered tablecloths inspired by Frida Kahlo motifs during quiet afternoons.
  travel: Regina Pagan has traveled to Oaxaca to study traditional mole recipes, spent a weekend in the Florida Keys soaking up the sun, explored the historic streets of Mexico City during a cultural festival,
    and dreams of a culinary pilgrimage to New Orleans to learn Creole cooking techniques.
  culinary: Regina Pagan masterfully prepares mole poblano, enchiladas verdes, and fresh salsa using home-grown cilantro, jalapeños, and heirloom tomatoes, while experimenting with quinoa-infused tacos
    and swapping out pork for lean chicken to create healthier Mexican-American meals for their catering service.
  core: Regina Pagan is a meticulous, socially radiant 38-year-old who channels their worry-driven perfectionism into community-centered cooking, garden nurturing, and relentless event planning, even if
    they sometimes overcommit and binge-watch telenovelas to unwind.
background:
  cultural: Regina grew up in a close‑knit Mexican‑American community in Immokalee, where family, faith, and agricultural work shape daily life. Her parents emigrated from Michoacán, bringing with them
    a deep respect for Mexican culinary traditions, Catholic celebrations such as Día de los Muertos and Las Posadas, and a strong ethic of mutual aid among farm‑worker families. Living in the rural South
    of Florida, Regina blends these heritage practices with the multicultural rhythms of the broader Immokalee area, speaking both Spanish and English fluently, and participating in community events that
    honor both Mexican roots and local Floridian culture.
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Household budgeting and financial tracking'', ''Event planning and coordination'', ''Traditional Mexican cooking'', ''Gardening and small‑scale
    horticulture'', ''Basic first aid'', ''Childcare and youth mentorship'', ''Digital literacy (budgeting apps, social media)'']'
  hobbies: '[''Cooking traditional and fusion Mexican dishes'', ''Dancing to regional Mexican music'', ''Community potluck hosting'', ''Gardening (vegetables and herbs)'', ''Church choir singing'', ''Reading
    self‑help and wellness literature'', ''Embroidery and textile crafts'', ''Watching telenovelas'']'
  career_goals: Regina aims to turn her culinary passion and organizational talents into a modest home‑based catering service that offers healthy Mexican‑American meals to the Immokalee community. She plans
    to complete a GED and earn a certification in community health outreach so she can volunteer as a health liaison for local farm workers. Over the next five years, Regina hopes to launch a community
    garden project that provides fresh produce and workshops on nutrition and gardening, while also building greater financial stability for her family.
