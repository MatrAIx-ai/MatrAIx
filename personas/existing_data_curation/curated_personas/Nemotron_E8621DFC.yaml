  hobbies: '[''Bachata and merengue dancing'', ''Cooking Dominican cuisine'', ''Community volunteering (immigrant support)'', ''Exploring NYC neighborhoods'', ''Attending cultural festivals'', ''Yoga and
    fitness'', ''Reading personal development books'', ''Listening to Latin music'', ''Hosting potluck gatherings with friends and family'']'
  career_goals: Paola aims to advance to a supervisory or team lead position within customer service, leveraging her bilingual expertise and CRM knowledge. She is pursuing a bachelor's degree in Business
    Administration part‑time to broaden her strategic perspective. Additionally, she plans to earn certifications in customer experience management and advanced data analytics for CRM platforms. In the
    long term, she envisions transitioning into a client success manager role or launching a small venture that celebrates Dominican cuisine and culture in the Bronx.
