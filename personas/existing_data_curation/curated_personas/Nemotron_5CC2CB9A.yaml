personas:
  professional: Tanja Thomas, a retired business‑administration professional turned community arts champion, leverages her meticulous budgeting skills, grant‑writing expertise, and natural charisma to orchestrate
    gallery events, mentor senior volunteers, and strategically push for a board seat on the New Port Richey Arts Council, and they relish the collaborative energy of each project.
  sports: Tanja Thomas stays active through daily sunrise walks, weekly gentle yoga, and a lively pick‑leball schedule with the New Port Richey Senior Pickleball Club, while cheering on the Tampa Bay Buccaneers
    and rooting for the Tampa Bay Rays during the football and baseball seasons, and they feel a strong sense of community belonging when competing in weekly matches.
  arts: Tanja Thomas channels her artistic curiosity into watercolor sunrise scenes, curates community exhibitions featuring works by Georgia O’Keeffe and emerging Florida artists, and draws inspiration
    from Joan Baez’s folk melodies and Meryl Streep’s theatrical depth during her regular visits to the Gulf Coast Museum of Art, and they often host informal talks at the museum to share insights with
    visitors.
  travel: Tanja Thomas prefers meticulously planned cultural trips, having explored Savannah’s historic squares, New Orleans’ jazz festivals, and a sun‑kissed weekend in Santorini, while dreaming of joining
    a senior‑group tour to Florence’s Renaissance galleries next spring, and they keep a detailed scrapbook of tickets and postcards from each journey.
  culinary: Tanja Thomas’s culinary repertoire showcases a confident hand at Mediterranean cooking, routinely preparing grilled lamb with rosemary, tabbouleh with sun‑dried tomatoes, and homemade hummus
    seasoned with cumin and fresh lemon, while occasionally indulging in a quick takeout pizza when art workshop schedules run late, and they love to pair each dish with a glass of crisp white wine while
    sharing stories from their art tours.
  core: Tanja Thomas blends disciplined organization, boundless curiosity, and a love for community art into a life of purposeful creativity, and they often juggle multiple projects while treating themselves
    to Mediterranean treats.
background:
  cultural: Tanja grew up in a mid‑western white American family with roots tracing back to Irish and English ancestry, where community involvement and self‑reliance were emphasized. After moving to New
    Port Richey, Florida, she embraced the coastal lifestyle, blending her traditional upbringing with the region’s multicultural influences. This mix informs her appreciation for diverse artistic expressions,
    her openness to unconventional ideas, and her commitment to fostering inclusive community spaces.
attributes:
  skills: '["Event planning", "Community outreach", "Grant writing", "Arts curation", "Organizational management", "Mentorship", "Public speaking", "Digital literacy"]'
  hobbies: '["Watercolor painting", "Gallery and museum visits", "Gardening", "Book club membership", "Volunteering at senior center art workshops", "Traveling to cultural festivals", "Mediterranean cooking",
    "Yoga", "Birdwatching"]'
  career_goals: Although retired from formal employment, Tanja aims to deepen her impact on the local arts scene by securing a board seat on the New Port Richey Arts Council and launching a senior-led arts
    mentorship program. She plans to complete a certificate in art history at a nearby community college, author a series of guided walking tours highlighting the city’s cultural landmarks, and write a
    memoir that weaves together her experiences in community service and art appreciation. Additionally, she wishes to expand her grant-writing expertise to help secure sustainable funding for neighborhood
    cultural initiatives.
