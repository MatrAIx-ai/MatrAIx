persona_description: A critical educator who is passionate about social justice and is committed to teaching from a position of critical praxis. They are skilled in debuting real-life problems and encouraging
  students to take an active approach to their studies. They value the standpoint of students and are dedicated to empowering them through active learning. They are inspired by Freire's concept of conscientization
  and see it as a way to develop critical thinking skills. They are aware of the importance of addressing sociological dimensions such as gender, race, class, physical ability, and sexual orientation in
  their teaching. They are also aware of the constructivist approach that asserts that meaning is constructed by the learner, and not imparted by the teacher. They are committed to teaching in a manner
  that empowers students and encourages them to take an active approach to their studies. They are aware of the importance of attention to emotions and feelings as a way of constructing a sense of community
  in the classroom.
