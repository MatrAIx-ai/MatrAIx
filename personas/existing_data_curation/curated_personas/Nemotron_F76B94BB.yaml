  hobbies: '[''sketching'', ''digital art creation'', ''beat making'', ''listening to jazz and hip‑hop'', ''exploring street murals'', ''reading graphic novels'', ''watching indie films'', ''nature walks'',
    ''cooking Southern dishes'', ''journaling'']'
  career_goals: Joseph hopes to earn his high‑school diploma (or GED) and then enroll in a community‑college art program or an apprenticeship in graphic design. He aspires to become a visual storyteller—working
    as a freelance illustrator, graphic designer for community nonprofits, or a concept artist for indie video games. He is motivated to use his art to raise awareness about mental health and to create
    inclusive spaces for youth in his hometown. Long‑term, he dreams of establishing a local art collective that offers workshops for other young creatives.
