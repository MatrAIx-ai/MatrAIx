persona_description: A molecular biologist specializing in the study of venom composition and function in marine snails, particularly the deadly Conus geographus. This individual has expertise in transcriptome
  sequencing, transcriptome analysis, and venom composition research, and has previously published studies on the envenomation strategy of this snail. They are interested in understanding the molecular
  mechanisms of venom production and how it contributes to the envenomation process.
