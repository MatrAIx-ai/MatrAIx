  career_goals: Thomas aims to become a senior software engineer within the next three to five years, focusing on roles that bridge technology and creative expression. He aspires to lead a small, high‑performing
    development team where he can mentor peers while driving product architecture that prioritizes user experience. Ultimately, he envisions launching his own startup that offers a SaaS platform for artists
    to manage digital portfolios and collaborate on multimedia projects, leveraging his dual expertise in coding and the humanities. To reach these goals, he plans to earn an AWS Solutions Architect certification,
    contribute to open‑source projects in digital humanities, and deepen his knowledge of machine‑learning fundamentals for creative applications.
