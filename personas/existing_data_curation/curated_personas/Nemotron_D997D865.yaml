personas:
  professional: Thomas Maximous, a full‑stack software engineer who blends Python and JavaScript expertise with a humanities‑infused user‑centered design sensibility, consistently delivers clean, scalable
    web applications while they maintain a calm, pragmatic approach and a healthy skepticism that drives rigorous code reviews and innovative problem‑solving.
  sports: Thomas Maximous rides the Pacific swell at Huntington Beach before sunrise, hangs out with the local Huntington Beach Surf Club, tracks his conditioning with weekend hikes along the coastal trail,
    roots for the Los Angeles Lakers and Los Angeles Dodgers, and they participate in a casual beach‑volleyball league that satisfies their competitive edge while keeping their fitness routine low‑key.
  arts: Thomas Maximous captures the golden hour along the coast through photography inspired by Ansel Adams, immerses himself in classic literature from Tolstoy to Virginia Woolf, designs indie video‑game
    prototypes reminiscent of Jonathan Blow’s narrative depth, and they find solace in the ambient scores of Brian Eno while attending monthly screenings of Terrence Malick’s films.
  travel: Thomas Maximous prefers meticulously planned road trips that blend surf stops in Santa Cruz with cultural detours to museums in San Francisco, dreams of kayaking the fjords of Norway after a recent
    visit to Iceland, and they occasionally book solo retreats to Kyoto to study traditional tea ceremony, all while balancing a modest travel budget with strategic use of credit‑card points.
  culinary: Thomas Maximous enjoys preparing health‑focused meals such as quinoa‑black bean bowls topped with avocado, grilled mahi‑mahi tacos with cabbage slaw, and miso‑glazed salmon, relying on fresh
    kale, citrus, and sesame oil, while they keep a well‑ordered meal‑prep routine that fuels early surf sessions and occasionally indulge in a midnight espresso as a quiet ritual.
  core: Thomas Maximous merges a surfer’s early‑morning rhythm with a coder’s analytical mind, habitually checks wave forecasts and code logs simultaneously, and despite a calm exterior, they hoard vintage
    video‑game cartridges as a quirky, competitive indulgence.
background:
  cultural: Thomas comes from a middle‑class, White American family that has lived in the Greater Los Angeles area for several generations. Raised in the suburban neighborhoods of Orange County, he was
    immersed in the laid‑back surf culture of Huntington Beach while attending schools that emphasized a broad liberal‑arts curriculum. His heritage includes Northern European roots—primarily Irish and
    English—combined with the progressive, multicultural atmosphere of Southern California. This blend of beach‑side casualness, academic curiosity from his humanities education, and the tech‑driven environment
    of the region shapes his worldview and informs both his professional pursuits and personal interests.
