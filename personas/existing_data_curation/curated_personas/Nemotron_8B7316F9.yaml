  hobbies: '[''storytime with Mexican folklore books'', ''listening to mariachi music'', ''dancing'', ''toy kitchen play'', ''building with wooden blocks'', ''soccer ball kicking'', ''sand pit play'']'
  career_goals: Even at two years old, Miguel expresses a strong desire to help others and enjoys role‑play that reflects future ambitions. He often pretends to be a firefighter rescuing his stuffed animals,
    dreams of becoming a soccer player by kicking his ball, and loves helping his mother in the kitchen, aspiring to be a chef who prepares family meals. These aspirations are guided by his love for community,
    attention, and the joy of being useful.
