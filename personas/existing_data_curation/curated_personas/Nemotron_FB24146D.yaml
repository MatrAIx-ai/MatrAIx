personas:
  professional: Jacqueline Kapasi is a methodical secondary school teacher in Florida who designs data‑driven lesson plans aligned to Sunshine State Standards, integrates Google Classroom and interactive
    whiteboards, leads PD workshops, and mentors peers, leveraging their organized, results‑focused mindset to drive school‑wide STEM initiatives.
  sports: Jacqueline Kapasi supports the Orlando Magic and Tampa Bay Buccaneers, runs with the Central Florida Runners club for 5K events, hikes the Florida Trail weekly, and attends yoga sessions twice
    a week, balancing structured exercise with relaxed weekend trail outings.
  arts: Jacqueline Kapasi enjoys attending community theater productions such as the St. Petersburg SummerStages, admires the storytelling of Lin‑Manuel Miranda’s Hamilton, listens to indie folk artist
    Phoebe Bridgers, and reads contemporary fiction by Celeste Ng, letting these artistic experiences inform their lesson narratives.
  travel: Jacqueline Kapasi prefers meticulously planned trips, having explored the Great Smoky Mountains National Park and a weekend theatre‑focused getaway to New York City, while dreaming of a spring
    garden tour in Kyoto, yet balances travel aspirations with a reliable budget and family responsibilities.
  culinary: Jacqueline Kapasi loves cooking structured recipes like ratatouille, homemade sourdough bread, and quinoa salads topped with heirloom tomatoes and fresh basil from their garden, showcasing a
    methodical approach to flavor while occasionally over‑seasoning with garlic when stressed.
  core: Jacqueline Kapasi blends a love for systematic teaching, disciplined budgeting, and tidy gardening with a penchant for occasional kitchen gadget splurges and missed dental floss, embodying a balanced,
    organized yet humanly imperfect outlook.
background:
  cultural: Jacqueline is a white American whose family originated in the Midwest before relocating to Florida during her early childhood. Raised in a modest, middle‑class household, she grew up with values
    emphasizing punctuality, hard work, and community involvement. Living in Lake City, she embraces the Southern hospitality of the region while retaining the practical, structured mindset common in her
    family’s cultural heritage. She celebrates mainstream American holidays, participates in local festivals and volunteer events, and appreciates the close‑knit, small‑town atmosphere of Columbia County,
    which blends traditional U.S. cultural norms with the distinctive character of the Florida Panhandle.
attributes:
  skills: '[''Classroom management'', ''Lesson planning'', ''Curriculum alignment with Florida Sunshine State Standards'', ''Differentiated instruction'', ''Formative and summative assessment design'',
    ''Educational technology integration (Google Classroom, interactive whiteboards)'', ''Student data analysis'', ''Parent communication and conference facilitation'', ''Collaborative team teaching'',
    ''Special education accommodations (IEP implementation)'', ''Professional development facilitation'']'
  hobbies: '[''Reading contemporary fiction'', ''Gardening'', ''Yoga'', ''Book club participation'', ''Volunteer tutoring'', ''Cooking'', ''Hiking'', ''Community theater'']'
  career_goals: Jacqueline aims to complete a bachelor’s degree in secondary education within the next two years, followed by a master’s in educational leadership. Her long‑term ambition is to become a
    department chair or curriculum coordinator, where she can shape instructional practices and lead a school‑wide STEM initiative. She also aspires to mentor new teachers, develop community partnership
    programs that support at‑risk students, and eventually pursue a principal position. Throughout these steps, she intends to maintain her systematic approach to school improvement and sustain a supportive
    learning environment for her students.
