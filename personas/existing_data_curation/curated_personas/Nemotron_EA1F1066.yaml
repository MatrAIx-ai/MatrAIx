personas:
  professional: Maria Olano, a 16‑year‑old culinary enthusiast and community event organizer, blends hands‑on cooking expertise with spontaneous salsa‑night flair, but their love of routine clashes with
    surprise‑driven planning, leading them to rely on energetic sociability and sharp reflexes honed from competitive gaming to rally volunteers and keep the kitchen humming.
  sports: Maria Olano spends Saturday afternoons shooting hoops with the Sunrise Hoops Club at the local park, channeling the quick reflexes sharpened from gaming into street basketball while cheering for
    the Miami Heat as a seasonal devotion and using the workouts as a primary outlet for their boundless energy.
  arts: Maria Olano fuses the vibrant rhythms of Latin legends like Buena Vista Social Club and contemporary stars such as Bad Bunny into dynamic salsa and reggaeton routines, while producing upbeat TikTok
    clips that remix family recipes to the beat of these artists and showcase their flair for spontaneous choreography.
  travel: Maria Olano prefers fast, budget‑friendly weekend getaways that blend culinary discovery and dance, from a food‑filled stroll through New Orleans' French Quarter to a spontaneous road trip to
    Key West's beachfront festivals, while dreaming of an extended Mediterranean tour to explore historic plazas and street markets.
  culinary: Maria Olano, a budding teen chef, masterfully prepares traditional family dishes like ropa vieja, picadillo, and caramel flan, then experiments with smoky paprika, plantain mash, and tropical
    fruit sauces to give each plate a fresh, playful twist in their compact kitchen.
  core: Maria Olano is a restless 16‑year‑old whose love of cooking, dancing, and gaming fuels a relentless drive for community buzz, yet their habit of last‑minute planning and occasional anxiety leaves
    them juggling big dreams and tight deadlines in a whirlwind of salsa beats and controller clicks.
background:
  cultural: Maria was born to Cuban immigrant parents who settled in the Tampa Bay area. Her household blends Cuban traditions—like lively music, shared meals, and strong family bonds—with the eclectic
    culture of New Port Richey. She grew up speaking Spanish at home and English at school, giving her a bicultural perspective. Celebrations such as Carnaval, Noche de San Juan, and family gatherings centered
    around classic dishes are integral to her identity. The local Cuban diaspora community provides a network of support, from church gatherings to community centers where Maria learns salsa and helps organize
    cultural events. This heritage fuels her pride, her love for food and dance, and her desire to keep Cuban customs alive while navigating life as a teenage American.
