  career_goals: Maria aims to complete her GED within the next two years and then enroll in a culinary apprenticeship or hospitality program to turn her love of cooking into a professional path. She dreams
    of opening a small Cuban‑style café that doubles as a community hub for salsa nights, blending her culinary and dance passions. At the same time, she wants to grow her TikTok following to become a recognized
    voice for young Cuban‑American culture, eventually monetizing her content through brand collaborations and local events. Financial independence is a key motivator, as she hopes to support her family
    and prove that she can succeed despite early academic setbacks.
