persona_description: An art historian who is deeply interested in the early development of Western art, particularly from the third millennium BC to the time of the great Byzantine Empire. This person is
  fascinated by the rich cultural influences and historical context of each period, and is drawn to the beauty and complexity of the works on display in the Mary and Michael Jaharis Galleries of Greek,
  Roman, and Byzantine Art. This person is likely to be knowledgeable about the history of art, the development of Western art, and the significance of the works on display. They are likely to appreciate
  the historical context and the cultural influences that have shaped Western art over time.
