  career_goals: Susan aims to deepen her impact in the local cultural scene by serving on the board of the Middletown Historical Society and assisting with quarterly art exhibitions at the county museum.
    She hopes to launch a community art workshop series for seniors, drawing on her organizational strengths and love for creative expression. Additionally, Susan plans to compile her family’s genealogy
    into a published memoir and create an online blog that blends art commentary, local history, and personal reflections, thereby preserving stories for future generations.
