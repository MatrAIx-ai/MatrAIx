persona_description: A software developer who specializes in the OpenGL API and its extensions. They are familiar with the naming conventions, the purpose of extensions, and the process of implementing
  and testing them. They have experience with dynamic loading of extensions and the use of context info to check if an extension is supported. They are also aware of the differences between proprietary
  and ARB approved extensions, as well as the process of developing extensions for the OpenGL API. They are interested in the latest developments in the OpenGL API and its extensions, and have knowledge
  of the community feedback on extensions.
