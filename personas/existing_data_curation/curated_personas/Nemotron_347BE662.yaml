personas:
  professional: Pablo Norat, a 15‑year‑old budding visual artist, blends hand‑drawn sketches with digital painting on a tablet while collaborating on community graffiti murals, meticulously organizing their
    sketchbooks and online portfolio yet allowing spontaneous bursts of creativity to guide each piece, and they balance structure with imagination in every project.
  sports: Pablo Norat, a devoted fan of the New York Knicks and occasional follower of the New York Yankees, regularly joins pickup basketball games at Rucker Park, participates in the school’s basketball
    club, and they embrace a cooperative team spirit while also asserting confidence in clutch moments.
  arts: Pablo Norat, whose artistic voice is shaped by the rhythmic beats of bachata, reggaeton, and hip‑hop, draws inspiration from street legends like Kase2, the vibrant murals of Diego Rivera, and contemporary
    creator Banksy, and they regularly attend local dance workshops while listening to artists such as Romeo Santos, Bad Bunny, and Kendrick Lamar to fuel their visual storytelling.
  travel: Pablo Norat, who has explored the bustling streets of Manhattan, the coastal charm of Miami, and the historic plazas of San Juan during family trips, dreams of attending a summer art residency
    in Barcelona and hopes to one day wander the neon‑lit districts of Tokyo for fresh inspiration.
  culinary: Pablo Norat, who relishes the comforting flavors of mangú, sancocho, and arroz con pollo served at family gatherings, enjoys experimenting with plantain‑based snacks and mango‑guava smoothies
    in his modest kitchen, yet they often resort to quick pizza slices when late‑night art projects demand immediate fuel.
  core: Pablo Norat, a 15‑year‑old imaginative artist who harmonizes regional rhythms with urban graffiti, saves diligently yet indulges impulsively in art supplies, balances health with occasional neglect,
    and navigates life with calm, organized yet adventurous resolve.
background:
  cultural: Pablo grew up in a close‑knit Dominican household in the Bronx, where Spanish is spoken daily alongside English. Family gatherings are filled with traditional foods like mangú and sancocho,
    and the rhythms of merengue and bachata reverberate through local neighborhood festivals. His parents instilled a sense of pride in his Caribbean roots, encouraging participation in the annual Dominican
    Day Parade and community dance workshops. This bicultural environment has shaped his artistic perspective, prompting him to weave Caribbean symbolism—such as tropical flora, vibrant colors, and rhythmic
    patterns—into his visual work while navigating the urban energy of New York City.
