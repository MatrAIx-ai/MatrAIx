  career_goals: Pablo aspires to become a concept artist and visual designer for video games or animated films, where he can fuse his love for Dominican cultural motifs with contemporary storytelling. He
    dreams of attending a specialized art school after high school, eventually launching his own indie graphic novel series that highlights Caribbean heritage. In the long term, he hopes to mentor younger
    artists from the Bronx, using his experience to bridge cultural identity and modern digital art practices.
