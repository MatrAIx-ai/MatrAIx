personas:
  professional: Elizabeth Nelson, a 43-year-old aspiring business consultant and budding project-management specialist, leverages their meticulous budgeting, spreadsheet mastery, and calm, decisive decision-making
    to provide part-time consulting for local small businesses and community nonprofits, while channeling their competitive puzzle-solving mindset into delivering organized, data-driven solutions.
  sports: Elizabeth Nelson, a solitary 43-year-old hiker, regularly trails the Ozark foothills on their own, participates monthly with the Jefferson City Trail Club, follows the St. Louis Cardinals for
    baseball and the Kansas City Chiefs for football, and maintains fitness through weekly power-walks, viewing each hike as both mental puzzle and physical calibration.
  arts: Elizabeth Nelson, an avid reader and craftsperson at 43, finds creative release in knitting, quilting, and devouring Agatha Christie mysteries, frequently attends Jefferson City historical museum
    exhibitions, enjoys the folk ballads of Emmylou Harris and the orchestral works of Beethoven’s late string quartets, and draws inspiration from these art forms to inform their writing and garden designs.
  travel: Elizabeth Nelson, age 43, plans their trips with the same spreadsheet rigor they apply to budgeting, favoring low-key road-trip explorations of the Midwest like the Ozark National Scenic Riverways,
    a weekend getaway to Asheville’s Blue Ridge Mountains, and dreaming of a solitary cultural immersion in Kyoto, Japan, balancing adventure with careful cost analysis.
  culinary: Elizabeth Nelson, a 43-year-old Midwestern cooking enthusiast, seasons their garden-fresh chicken pot pie with rosemary and thyme harvested from their own plot, masterfully bakes buttery cornbread,
    experiments with seasonal squash galettes, and often pairs their dishes with locally sourced honey, reflecting their intermediate culinary skill and love for farm-to-table flavors.
  core: Elizabeth Nelson, a 43-year-old puzzle-loving gardener and methodical planner, blends curiosity with practical order, thriving in solitary pursuits while competitively seeking efficiency in every
    facet of life.
background:
  cultural: Elizabeth was raised in a Midwestern, white American family in Jefferson City, Missouri, within a community rooted in Protestant (Methodist) traditions and small‑town values. Her upbringing
    emphasized self‑reliance, modesty, and community service, fostering a practical outlook and respect for both tradition and incremental innovation. She identifies with regional customs such as celebrating
    Thanksgiving, Fourth of July parades, and local river festivals, and she holds a deep appreciation for Missouri’s state history and civic life.
