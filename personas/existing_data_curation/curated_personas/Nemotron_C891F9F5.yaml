  career_goals: Elizabeth aims to complete her undergraduate degree, focusing on business administration or environmental studies, to solidify her practical knowledge. She plans to earn a project‑management
    or bookkeeping certification that will enable her to offer part‑time consulting for local small businesses and community organizations. Leveraging her competitive streak, she hopes to launch a home‑based
    venture—such as a garden‑supply shop or custom‑candle line—and to win regional gardening contests. Long‑term, she envisions a leadership role in Jefferson City’s historical society or a nonprofit, coordinating
    outreach and preservation projects while balancing family life.
