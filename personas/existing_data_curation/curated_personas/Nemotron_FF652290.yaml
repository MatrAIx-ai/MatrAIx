  hobbies: '[''Gospel choir singing'', ''Drumming'', ''Zumba fitness classes'', ''Hiking'', ''DIY home‑improvement projects'', ''Cooking Southern and African‑inspired dishes'', ''Volunteering for STEM outreach'',
    ''Reading contemporary fiction'']'
  career_goals: Wilisha aims to achieve Master Electrician licensure in Georgia within the next two years, positioning herself to lead larger commercial projects and specialize in sustainable energy solutions.
    She envisions launching her own contracting firm focused on solar and smart‑home installations, creating apprenticeship pathways for women and minorities in the trades. Additionally, she aspires to
    become a certified safety trainer and a mentor for community STEM outreach programs, blending her technical expertise with her passion for collaborative, supportive environments.
