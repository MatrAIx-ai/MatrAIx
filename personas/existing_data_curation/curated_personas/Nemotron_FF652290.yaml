personas:
  professional: Wilisha Duncan is a certified electrician renowned for meticulous project documentation, adept wiring, solar panel installation, and smart‑home integration, and they apply a structured,
    cooperative mindset to mentor apprentices while steering toward Master Electrician licensure and launching a sustainable‑energy contracting firm.
  sports: Wilisha Duncan stays active through weekly Zumba classes, weekend hikes on the Blue Ridge Trail, and avidly follows the Atlanta Falcons and Atlanta Hawks, while they coach a youth soccer team
    at the community center during the summer.
  arts: Wilisha Duncan channels their love of soulful music by singing in a gospel choir, playing drums in a local percussion group, and drawing inspiration from artists such as Kirk Franklin, Aretha Franklin,
    and Beyoncé, while they unwind with contemporary fiction from Chimamanda Ngozi Adichie and Colson Whitehead.
  travel: Wilisha Duncan plans trips with a detailed itinerary, favoring a mix of adventure and relaxation that has taken them hiking in the Great Smoky Mountains, exploring the historic streets of New Orleans,
    and dreaming of a cultural pilgrimage to Ghana, all while balancing family obligations and a modest travel budget.
  culinary: Wilisha Duncan delights in cooking Southern comfort dishes like collard greens, fried catfish, and sweet potato pie, while they experiment with African flavors such as jollof rice and injera,
    showcasing an intermediate skill level that shines at neighborhood potlucks and church feasts.
  core: Wilisha Duncan is a structure‑loving electrician and community‑focused mentor who blends technical precision with soulful music, vibrant cooking, and a disciplined yet flexible approach to life,
    even if they occasionally obsess over aligning every tool perfectly before a job.
background:
  cultural: Wilisha grew up in a close‑knit African American community in Georgia, where church, family gatherings, and neighborhood networks shaped her values of cooperation and mutual support. Her Southern
    heritage is reflected in her love for soulful music, community storytelling, and hospitality-centered cuisine. She draws inspiration from the region's rich civil‑rights history and continues to honor
    her cultural roots through active participation in local cultural festivals, church activities, and mentorship programs that uplift the next generation of Black tradespeople.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Conduit and panel installation'', ''Blueprint interpretation'', ''Electrical troubleshooting'', ''NEC compliance'', ''Safety training'', ''Solar
