  hobbies: '[''Abstract painting'', ''Digital art'', ''Salsa dancing'', ''Cooking Dominican cuisine'', ''Reading speculative fiction'', ''Improv theater'', ''Journaling'', ''Music curation'']'
  career_goals: Silvia aims to complete a Bachelor of Fine Arts in Visual Arts, specializing in concept art for video games or animated storytelling. She dreams of creating immersive worlds that weave together
    her Dominican cultural roots with futuristic, speculative aesthetics. In the medium term, she plans to secure a junior concept-artist role at a studio while building a freelance portfolio. Long-term,
    she envisions founding a multicultural art collective in Tampa that provides workshops, gallery space, and mentorship for young artists from the Dominican diaspora and beyond.
