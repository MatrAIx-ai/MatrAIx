personas:
  professional: Silvia Malaverivera, an 18‑year‑old visual arts student, they channel a vivid imagination into rapid digital concept sketches for indie game studios, leveraging Procreate and Photoshop while
    thriving on the chaotic energy of last‑minute brainstorming and the competitive drive of student art contests, yet their laid‑back approach to deadlines often leaves them scrambling.
  sports: Silvia Malaverivera, an 18‑year‑old campus enthusiast, they stay active primarily through salsa and bachata nights with the university’s Salsa Society, occasionally join a weekend beach‑volleyball
    pickup group, and faithfully cheer on the Tampa Bay Buccaneers on Sundays and the Tampa Bay Lightning during the hockey season, using sport fandom as both social fuel and a brief respite from artistic
    pressures.
  arts: Silvia Malaverivera, an 18‑year‑old creative mind, they weave abstract painting, mixed‑media experiments, and short animation loops into a personal visual language inspired by the surreal patterns
    of Yayoi Kusama, the storytelling depth of Hayao Miyazaki, the vibrant colors of Frida Kahlo, and the rhythmic pulse of Bonobo and Celia Cruz, regularly curating eclectic playlists that blend merengue
    beats with indie electronic tracks to accompany their studio sessions.
  travel: Silvia Malaverivera, an 18‑year‑old wanderer at heart, they favor spontaneous, budget‑friendly getaways—spending weekends road‑tripping to the Florida Keys, exploring the historic streets of Savannah
    and New Orleans, dreaming of immersive cultural dives in Kyoto and Reykjavik, and planning a future art‑inspired study trip to Medellín—while usually booking flights last‑minute and relying on friends
    to share costs.
  culinary: Silvia Malaverivera, an 18‑year‑old culinary hobbyist, they love mastering hearty island staples like mangú and sancocho, experiment with plantains, yucca, cilantro, and lime in homemade empanadas
    and pastelitos, and showcase their intermediate cooking skills by hosting lively dinner gatherings where friends sample their vibrant, spice‑laden creations.
  core: Silvia Malaverivera, an 18‑year‑old visual arts student, they fuse boundless imagination with a restless, sometimes chaotic energy, turning late‑night art marathons and worry‑filled journaling into
    a vibrant yet scattered creative life.
background:
  cultural: Silvia was raised in a bilingual Dominican household in Tampa. Her parents instilled a love for Dominican traditions, from celebrating Carnaval and Dominican Independence Day to listening to
    merengue and bachata at family gatherings. She speaks fluent Spanish and English, which allows her to navigate both the local Latino community and the broader Floridian culture. The diaspora community’s
    emphasis on family cohesion, storytelling, and festive food has shaped her identity, giving her a rich cultural palette that she often draws upon in her art and social interactions.
