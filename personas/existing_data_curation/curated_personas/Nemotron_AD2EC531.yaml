personas:
  professional: Ani Mcdonald, a veteran public school teacher with a knack for designing adaptive curricula, leverages meticulous planning and spontaneous pivoting to deliver engaging lessons while fiercely
    pushing student achievement metrics.
  sports: Ani Mcdonald enjoys low‑key fitness through yoga classes at the neighborhood studio and a weekly pickleball league, while quietly cheering for the Boston Red Sox and the New England Revolution
    as part of a modest sports fandom.
  arts: Ani Mcdonald finds creative solace in pottery and experimental cooking, regularly attends art‑house screenings of directors like Lynne Ramsay, and playlists music by Agnes Obel while reflecting
    on independent films with their spouse in the evenings.
  travel: Ani Mcdonald prefers meticulously planned trips that balance relaxation and cultural immersion, such as weekend hikes in the Blue Ridge Mountains, a meditative solo retreat to Kyoto's zen gardens,
    and a family exploration of the Scottish Highlands, always opting for cozy B&Bs within a moderate budget.
  culinary: Ani Mcdonald is an adventurous home cook who perfects miso‑glazed eggplant, hand‑rolled ricotta gnocchi, and spiced dishes featuring sumac and smoked paprika, often pairing meals with a chilled
    Pinot Gris while chronicling recipes in a well‑kept kitchen journal.
  core: Ani Mcdonald is a structured yet adaptable educator whose high emotional reactivity fuels meticulous lesson planning, mindful self‑care rituals, and a habit of snacking on pantry treats during grading
    marathons.
background:
  cultural: Ani was raised in the Columbus metropolitan area of Ohio in a middle‑class family of German‑Scandinavian ancestry. Her upbringing emphasized Midwestern values such as practicality, modesty,
    and a strong work ethic, with family traditions that included regular attendance at a mainline Protestant church and community service through local charities. Growing up in a predominantly white community,
    she internalized an appreciation for stability and predictability, which now coexists with her personal preference for occasional spontaneity. The regional culture’s emphasis on education and community
    involvement continues to shape her dedication to teaching and her desire to contribute positively to the local school system.
