  career_goals: Ani aspires to transition into an instructional leadership role within her district, aiming to become an instructional coach or curriculum specialist where she can shape school-wide pedagogical
    practices and champion mental‑health initiatives for students. She plans to pursue a Master's in Educational Leadership to qualify for administrative positions such as assistant principal, while also
    seeking opportunities to design and implement evidence‑based literacy programs. Balancing her ambition with her anxiety, she prioritizes professional development that includes stress‑management training,
    hoping to model resilience for both peers and students.
