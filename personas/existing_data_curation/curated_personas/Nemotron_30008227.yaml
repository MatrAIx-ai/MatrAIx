personas:
  professional: Won Hur is an emerging technical support specialist who leverages bilingual fluency, barista‑honed customer service, and a knack for troubleshooting to deliver structured yet adaptable assistance,
    while their preference for predictability aids in crafting clear support documentation even as a relaxed approach to obligations sometimes leads to last‑minute task juggling.
  sports: Won Hur enjoys weekend hikes with the Laguna Hills Trail Club and occasional pickup soccer through the Orange County Running Group, while cheering for the Los Angeles Dodgers and Los Angeles Lakers,
    balancing a love of nature with a relaxed fitness routine that favors unstructured outdoor activity over regimented gym sessions.
  arts: Won Hur channels artistic energy by sketching cartoon characters and creating digital illustrations in Procreate, drawing inspiration from the vibrant visuals of BTS, the dreamy soundscapes of Tame
    Impala, and the mellow beats of Chillhop, and they frequently attend local cultural festivals and gallery openings whenever time permits.
  travel: Won Hur prefers spontaneous road trips to coastal towns like Santa Barbara and weekend getaways to Seattle, while dreaming of an immersive cultural tour of Seoul and a backpacking adventure through
    the Swiss Alps, balancing a love for urban exploration with a yearning for mountain serenity.
  culinary: Won Hur, a competent home cook, often whips up bibimbap with gochujang, kimchi stew brimming with pork and tofu, and experimental tofu jjigae fusions that blend miso with Korean spices, and
    they relish occasional dine‑outs at local ramen spots while still favoring the tactile satisfaction of sautéing fresh vegetables.
  core: Won Hur is a 24‑year‑old bilingual tech‑savvy caretaker who balances a love of structured problem‑solving with a habit of last‑minute task juggling, a penchant for impromptu gaming marathons, and
    a chronic tendency to forget to water indoor plants.
background:
  cultural: Won was born and raised in Tustin, California, to parents who immigrated from South Korea in the early 1990s. His household maintained Korean traditions such as celebrating Seollal and Chuseok,
    preparing family meals, and using Korean as the primary language at home, while also embracing American customs and holidays. This bicultural upbringing fostered a strong sense of respect for elders,
    an emphasis on education, and a collaborative mindset that he carries into his interactions. Growing up in the diverse environment of Orange County exposed him to a wide array of cultures, encouraging
    him to navigate between Korean community expectations and mainstream American social norms. Fluent in both Korean and English, he often assists older relatives with translation and serves as a cultural
    bridge in community events, shaping his interest in fostering cross‑cultural connections.
attributes:
  skills: '[''computer troubleshooting (Windows/macOS)'', ''customer service'', ''social media content creation'', ''graphic design (Canva, Photoshop)'', ''Korean-English translation'', ''event coordination'']'
  hobbies: '[''hiking'', ''cooking Korean cuisine'', ''video gaming (strategy/RPG)'', ''digital illustration'', ''volunteering at community center'', ''reading science‑fiction novels'', ''listening to music
    (K‑pop, indie rock)'']'
  career_goals: Won aims to complete his remaining coursework toward an associate degree in business administration within the next year, while simultaneously gaining hands‑on experience through part‑time
    or freelance roles. He is targeting entry‑level positions in technical support or community outreach that leverage his bilingual abilities and his knack for helping others. In the medium term, he hopes
    to secure a full‑time role as a client‑services specialist for a company serving Korean‑speaking customers, where he can combine structured problem‑solving with flexible, people‑focused work. Ultimately,
    he aspires to become a program manager or community‑relations director who designs and implements initiatives that foster cross‑cultural understanding, and he plans to strengthen his organization and
    project‑management skills to support those ambitions.
