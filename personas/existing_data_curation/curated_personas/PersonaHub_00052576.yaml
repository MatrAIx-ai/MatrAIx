persona_description: A neurologist who specializes in the examination and assessment of neurological function, particularly the pupils of the eye. They are skilled in diagnosing and treating conditions
  that affect the eye, such as corneal abrasions, myopia, and hyphema. They are also trained in the use of medical instruments and techniques to perform eye exams and to examine the pupil for neurological
  abnormalities. They are knowledgeable in the field of ophthalmology and have a deep understanding of the anatomy and physiology of the eye.
