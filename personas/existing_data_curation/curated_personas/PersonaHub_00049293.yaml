persona_description: A scientist at the Ottawa Hospital Research Institute and professor at the University of Ottawa who specializes in reproductive biology and fertility research. Dr. Johne Liu is a senior
  scientist and has published several studies on the role of putrescine in maintaining the chromosomal integrity of egg cells in female mammals. His work is focused on finding ways to increase the viability
  of egg cells for women in their late 30s and older, with a particular emphasis on reducing the incidence of defective eggs. Liu's research has been published in prestigious scientific journals and has
  been recognized for its potential to improve fertility outcomes and decrease the risk of miscarriages and congenital birth defects.
