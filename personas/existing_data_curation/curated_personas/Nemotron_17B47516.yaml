  hobbies: '["Karaoke and community singing", "Improvisational theater", "Thai cooking and culinary experimentation", "Hiking Red Rock Canyon", "Playing golf", "Attending live shows and concerts", "Participating
    in poker games", "Volunteering at a Thai Buddhist temple", "Mentoring youth entrepreneurship program"]'
  career_goals: Approaching the latter stage of his career, Chaicharn aims to transition into a senior leadership role such as Vice President of Human Resources or an HR consultancy focused on strategic
    workforce planning for hospitality firms in the Southwest. He seeks to leverage his sociable nature to mentor emerging HR professionals, champion data‑driven talent strategies, and spearhead company‑wide
    diversity and inclusion programs that reflect his cultural heritage. Additionally, he envisions publishing a practical guide on navigating employee relations in high‑turnover environments and eventually
    establishing a boutique consulting practice that helps businesses integrate structured HR frameworks with the flexible, service‑oriented culture of Las Vegas.
