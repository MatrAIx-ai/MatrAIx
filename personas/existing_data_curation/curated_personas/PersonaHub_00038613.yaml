persona_description: A biologist who studies the behavior and ecology of predators, particularly their responses to prey and the factors that influence their behavior. This person is interested in understanding
  how prey behavior changes in response to predator feeding patterns, and how these changes are influenced by the prey's diet and the strength of the aversive response. They are also interested in how the
  response pattern reflects fundamental constraints on information obtainable by chemical cues and how these cues are used by predators to assess threat.
