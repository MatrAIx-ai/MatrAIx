  hobbies: '[''fantasy sketching'', ''writing sci‑fi short stories'', ''building LEGO models'', ''reading speculative fiction'', ''participating in school Art Club'', ''playing Minecraft in creative mode'',
    ''experimenting with new art mediums'']'
  career_goals: Stephen dreams of turning his love for imagination and abstract concepts into a career as a concept artist for video games or graphic novels. He envisions attending a specialized arts high
    school where he can deepen his skills in illustration and storytelling, eventually earning a degree in visual arts or interactive media. Long‑term, he aspires to work on creating immersive worlds that
    inspire others, while also maintaining a stable routine that helps him manage his worries and stress.
