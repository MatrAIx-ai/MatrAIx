personas:
  professional: Stephen Nelson, a budding young illustrator and story architect, channels their vivid imagination into detailed fantasy creature sketches and sci‑fi micro‑novellas, and they use disciplined
    sketchbook routines to balance their love of novelty with a surprisingly methodical approach to meeting school art deadlines.
  sports: Stephen Nelson, an occasional after‑school soccer player who prefers small‑team drills over large crowds, plays for the Blue Hawks Youth Soccer club, cheers for the local high‑school football
    team the Riverdale Tigers, follows the Los Angeles Dodgers on TV, and they use a home‑based jump rope routine to stay active when they need a break from sitting.
  arts: Stephen Nelson, an avid fan of Hayao Miyazaki’s animated worlds, Neil Gaiman’s speculative fiction, and the intricate LEGO Architecture series, spends weekends blending watercolors with digital
    brushes to bring their invented creatures to life, and they regularly swap sketches with peers in the school Art Club.
  travel: Stephen Nelson, who loves the mix of planned adventure and spontaneous discovery, has visited the nearby Red Rock Canyon on a family hike, dreams of touring the futuristic exhibitions of Tokyo’s
    TeamLab Borderless, and they prefer day‑trips that allow time for sketching and collecting local postcards.
  culinary: Stephen Nelson, a self‑taught junior chef, favors creating customizable ramen bowls with miso broth, sliced pork, and fresh bok choy, while they also delight in assembling homemade pizza with
    a rainbow of toppings, and they occasionally experiment with charcoal‑grilled sweet potatoes for extra texture.
  core: Stephen Nelson is a hyper‑creative 12‑year‑old who balances a thriving imagination with disciplined project habits, they occasionally battle worry‑induced stress, and they indulge in a quirky mix
    of LEGO architecture, sci‑fi storytelling, and experimental art.
background:
  cultural: Stephen grew up in Farragut, a suburban community in Knox County, Tennessee. His family reflects a typical Southern white upbringing, with values of hospitality, community involvement, and modesty.
    Local customs—such as attending community events at the nearby library, enjoying regional outdoor activities, and participating in school‑based clubs—have shaped his social experiences. While the area
    is predominantly conservative, Stephen's curiosity pushes him toward broader cultural influences found through online art communities, science‑fiction literature, and video‑game culture, creating a
    blend of local heritage and global creative inspiration.
attributes:
  skills: '[''sketching and illustration'', ''digital art using Paint 3D'', ''basic programming in Scratch'', ''LEGO engineering'', ''critical reading of speculative fiction'', ''project planning and time
