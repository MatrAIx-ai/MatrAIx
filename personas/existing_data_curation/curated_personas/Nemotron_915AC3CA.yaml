  hobbies: '[''Painting (abstract)'', ''Jazz saxophone (performing)'', ''Photography (historic Montgomery)'', ''Creative writing (poetry and short stories)'', ''Reading philosophy and African American literature'',
    ''Cooking Southern soul food'', ''Community theater participation'', ''Volunteer mentoring for youth arts'', ''Organizing neighborhood book clubs'']'
  career_goals: Marcus aims to re-enter the education sector as a consultant specializing in arts integration and culturally responsive pedagogy, working with school districts throughout Alabama. He plans
    to launch a community nonprofit that offers free creative workshops and mentorship for at‑risk youth, drawing on his background in curriculum design and his passion for artistic expression. In the longer
    term, he intends to pursue a doctorate in education with a focus on multicultural curriculum development, positioning himself to influence policy and practice at the state level. Additionally, he hopes
    to author a guidebook on leveraging imagination and structure to foster lifelong learning in adult populations.
