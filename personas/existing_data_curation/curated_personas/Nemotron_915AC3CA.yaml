personas:
  professional: Marcus Benjamin, a seasoned educational consultant with a graduate degree in education, blends meticulous curriculum design, data‑driven assessment, and arts integration to help Alabama
    school districts adopt culturally responsive pedagogy while they leverage their outgoing nature to build community partnerships.
  sports: Marcus Benjamin supports the Alabama Crimson Tide football team and the Montgomery Biscuits minor‑league baseball club, they participate in a weekend running group that meets at Oak Park, and
    enjoy occasional pick‑up basketball games at the community center during the summer.
  arts: Marcus Benjamin, an abstract painter inspired by Mark Rothko’s color fields and a saxophonist who reveres Miles Davis’s modal improvisations, they attend live poetry readings featuring works by
    Gwendolyn Brooks and regularly volunteer at the Montgomery Public Library’s author‑talk series.
  travel: Marcus Benjamin prefers thoughtfully planned trips that balance cultural immersion with relaxation, they have explored historic neighborhoods of Charleston and New Orleans, trekked the streets
    of Paris, and dream of a future visit to the markets of Marrakech while keeping travel costs within a modest annual budget.
  culinary: Marcus Benjamin enjoys cooking soul‑food staples such as shrimp étouffée, collard greens seasoned with smoked turkey, sweet‑potato pie, and cornbread, they demonstrate a competent but experimental
    kitchen style that often incorporates fresh herbs and seasonal produce from the local farmer’s market.
  core: Marcus Benjamin merges a disciplined, organized mindset with a boundless artistic imagination, they channel both into community‑focused education consulting while juggling a love for jazz, abstract
    painting, and meticulous financial planning.
background:
  cultural: Marcus is a Black man rooted in the rich cultural and historical tapestry of Montgomery, Alabama—a city central to the civil‑rights movement. Raised in a close‑knit church community, he absorbed
    traditions of gospel music, oral storytelling, and communal support. The legacy of leaders like Dr. Martin Luther King Jr. and the city's museums informs his commitment to social empowerment and education
    equity. He celebrates Southern Black cuisine, family reunions, and the rhythm of jazz that has long been a cornerstone of African American culture in the region. These experiences shape his worldview,
    fostering a deep respect for heritage while driving his desire to nurture the next generation through arts and education.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Project Management'', ''Community Outreach'', ''Public Speaking'', ''Event Planning'', ''Digital Media Production'', ''Facilitation of
