personas:
  professional: Ana Pagan is an aspiring young detective novelist, channeling her curiosity and practical problem‑solving into mystery stories she drafts after school, while her preference for flexibility
    lets ideas wander without rigid outlines.
  sports: Ana Pagan plays midfield for the Tucson 6‑U Soccer Club, delights in cheering for the Arizona Wildcats men’s soccer team, and uses the desert hikes as off‑season conditioning, though she sometimes
    arrives late to practice because she’s still finishing a LEGO build.
  arts: Ana Pagan immerses herself in drawing whimsical desert creatures, sings along to Lila Downs and Vicente Fernández while helping in the kitchen, and studies classic mystery novels like the Nancy
    Drew series to fuel her storytelling, yet she often loses track of time and forgets to do homework.
  travel: Ana Pagan loves weekend family hikes through Saguaro National Park, dreams of exploring the historic streets of Tucson’s Barrio Viejo and crossing the border to see the markets of Nogales, but
    prefers short trips that fit into school holidays and often packs a sketchbook for the journey.
  culinary: Ana Pagan enjoys whisking masa for tamales, rolling tiny taco shells, and adding a dash of queso fresco to her creations, proudly claiming the title of “Junior Chef” while occasionally over‑seasoning
    her guacamole and learning to clean up the mess afterward.
  core: Ana Pagan blends a restless curiosity for mysteries with a love of desert‑inspired LEGO builds, navigates school and family traditions with quiet assertiveness, and carries a notebook full of sketches,
    stories, and worries that keep her both creative and a little anxious.
background:
  cultural: Ana grows up in a Mexican‑American household in Tucson, a city where Mexican traditions are woven into everyday life. Spanish is spoken at home, and she celebrates holidays such as Día de Los
    Muertos, Cinco de Mayo, and Christmas with family gatherings, traditional foods like tamales and pozole, and colorful decorations. Her parents teach her folk songs, dances like La Danza de los Viejitos,
    and the importance of community respect. The proximity to the U.S.–Mexico border gives her a strong sense of bicultural identity, allowing her to navigate both American school culture and Mexican family
    customs with ease.
