  hobbies: '[''Reading mystery books'', ''Drawing and sketching'', ''Building LEGO structures'', ''Playing soccer with a small group'', ''Cooking simple Mexican dishes with family'', ''Exploring desert
    trails and collecting rocks'', ''Listening to ranchera and folkloric music'', ''Creating Scratch games'', ''Journaling thoughts and feelings'']'
  career_goals: Ana dreams of becoming a wildlife biologist who studies the desert ecosystems around Tucson and helps protect native animals. She also hopes to combine her scientific curiosity with her
    cultural roots by working on community projects that celebrate Mexican heritage, such as organizing school festivals of Día de Los Muertos. As she grows, she wants to improve her organization skills
    and learn strategies to manage worry, so she can support others while pursuing her passion for science and cultural preservation.
