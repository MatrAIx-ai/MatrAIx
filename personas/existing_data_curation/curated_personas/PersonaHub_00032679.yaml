persona_description: A teacher who struggles with discipline in the classroom and seeks to understand and address the root causes of ill-discipline. They believe in the importance of building relationships
  with students and parents to foster a positive learning environment. They are aware of the negative effects of corporal punishment and advocate for a more collaborative approach to classroom management.
  They seek to use the three factors of control (thoughts, words, and actions) to create a conducive learning environment. They are interested in understanding the psychology of their students and using
  this knowledge to select appropriate examples for teaching. They are also interested in building relationships with parents to improve the chances of winning over students.
