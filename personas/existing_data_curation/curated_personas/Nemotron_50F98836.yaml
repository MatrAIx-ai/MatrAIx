  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Reading Speculative Fiction'', ''Attending Local Theater'', ''Gardening'', ''Yoga and Mindfulness Meditation'', ''Ukulele Playing'', ''Southern‑Fusion
    Cooking'', ''Landscape Photography'', ''Maker’s Club (Pottery, DIY Crafts)'']'
  career_goals: Marissa aims to become a regional director for an early‑childhood education nonprofit in the Southeast, where she can spearhead a statewide STEM‑plus‑Arts initiative. She wants to secure
    multi‑year funding for innovative preschool programs, publish research on reducing educator stress, and develop a mentorship network that pairs veteran teachers with emerging educators. Ultimately she
    envisions founding her own consultancy that helps schools blend imagination, technology, and rigorous science curricula while fostering resilient, creative learners.
