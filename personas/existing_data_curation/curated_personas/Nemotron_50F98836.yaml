personas:
  professional: Marissa Snider, a seasoned early‑childhood education administrator in Alabama, combines data‑driven curriculum design, grant writing, budgeting, and arts‑integrated learning workshops with
    her vivid imagination and competitive drive to launch bold STEM‑plus‑Arts pilots, even as their relaxed attitude toward deadlines sometimes leads to last‑minute scrambles.
  sports: Marissa Snider stays active through weekly sunrise yoga sessions with the Riverside Wellness Studio, dabbles in springtime 5K runs with the Birmingham Run Club, and roots for the Alabama Crimson
    Tide football team while occasionally joining a co‑ed adult softball league during the summer months.
  arts: Marissa Snider channels their love for abstraction into watercolor landscapes inspired by Monet and O'Keeffe, captures sunrise vistas like Ansel Adams with their DSLR, strums ukulele chords to Jack
    Johnson while attending productions at the local Community Playhouse, and shares their sketches at monthly maker‑club critiques.
  travel: Marissa Snider prefers loosely planned creative retreats, having photographed the misty hills of Asheville, explored the artsy streets of Santa Fe, and dreaming of a sunrise pilgrimage to Kyoto’s
    Zen gardens, all while balancing consulting ambitions with a modest travel budget.
  culinary: Marissa Snider’s Southern‑fusion kitchen features experimental dishes like miso‑glazed shrimp and grits, pineapple‑infused jambalaya, and sweet‑potato gnocchi tossed with sage butter, while
    they hand‑pick rosemary, cilantro, and thyme from their herb garden to season every plate.
  core: Marissa Snider is a fiercely imaginative education leader whose competitive grant‑chasing is tempered by a habit of misplacing bills, an over‑thinking streak, and a daily ritual of sunrise watercolor
    sketches that keep both creativity and stress in a delicate balance.
background:
  cultural: Marissa grew up in a middle‑class, white Southern family in Alabama, where church gatherings, community festivals, and family meals shaped her sense of hospitality and belonging. Her upbringing
    emphasized the value of education and civic responsibility, while the region’s blues, country music, and Southern cuisine influenced her tastes. Although rooted in these traditions, she has embraced
    broader cultural perspectives through her STEM education and artistic pursuits, blending Southern resilience with a curiosity for novel, global ideas.
