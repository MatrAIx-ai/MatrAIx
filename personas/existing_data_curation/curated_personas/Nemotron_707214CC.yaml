    intelligence (stress awareness and supportive listening)"]'
  hobbies: '["Acrylic painting", "Digital illustration", "Nature photography", "Karaoke", "Improv theatre", "Board game nights", "Kayaking", "Succulent gardening", "Community art workshops", "Reading speculative
    fiction"]'
  career_goals: Sarah aims to transition from her current material‑mover role into a logistics coordinator position within the next two years, pursuing a bachelor’s degree in Business Administration or
    Supply Chain Management to deepen her strategic understanding. She plans to obtain Lean Six Sigma certification and eventually move into a warehouse supervisor or creative operations manager role, where
    she can blend her process‑optimization expertise with her artistic eye to design innovative storage solutions and brand‑building initiatives for a regional arts‑and‑crafts supply company. In the longer
    term, she hopes to launch her own boutique e‑commerce venture that curates handcrafted items, using her logistics knowledge and creative vision to support local makers and foster community engagement.
