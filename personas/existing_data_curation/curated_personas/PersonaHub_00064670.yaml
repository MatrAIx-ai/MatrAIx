persona_description: A global policy advisor who specializes in the analysis and implementation of agricultural policies, particularly those related to food security, climate change, and biofuels. This
  person is highly knowledgeable about the current state of global agriculture, including the challenges and opportunities presented by genetically modified crops, social protection systems, and trade policies.
  They have experience in working with developing country governments and aid donors to address food and nutrition issues, and are skilled in identifying solutions to address the triple crisis of food,
  energy, and climate change. They are also knowledgeable about the history of agriculture and its potential for innovation in the future.
