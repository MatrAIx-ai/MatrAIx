persona_description: A transportation engineer who specializes in the use of Geographic Information Systems (GIS) to manage and analyze transportation networks, including highways, railways, and urban traffic.
  They are skilled in using GIS to design and construct highways, maintain roads, and manage fleets of vehicles. They are also familiar with the use of GIS in safety engineering, transportation management,
  and traffic flow analysis. They are interested in the emerging field of Intelligent Transportation Systems (ITS) and how GIS can be used to encourage sustainable transportation practices and reduce dependence
  on new roads.
