  career_goals: Jezabel aims to advance to a supervisory or office manager position within the next three to five years, where she can lead a team, streamline administrative systems, and mentor junior staff.
    She plans to earn a bachelor’s degree in Business Administration or Arts Administration to blend her organizational expertise with her passion for culture. Ultimately, she envisions working for a local
    nonprofit arts center, museum, or community cultural organization, managing programming, coordinating events, and deepening community engagement. She also intends to obtain a certification in office
    management and, long‑term, launch a small community art studio that offers workshops and exhibition space, leveraging her administrative strengths and sociable nature while maintaining a healthy work‑life
    balance for her family.
