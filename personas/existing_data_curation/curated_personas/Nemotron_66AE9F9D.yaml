personas:
  professional: Jezabel Miller, a 42‑year‑old administrative specialist at a busy Spartanburg office, uses their precision in records management, Excel‑savvy bookkeeping, and an eye for design to overhaul
    filing systems, while their sociable, improvisational spirit makes them the go‑to liaison for event planning and team morale.
  sports: Jezabel Miller stays fit by hiking the Blue Ridge Trail with the Spartanburg Hiking Club, practicing sunrise yoga at the Serenity Wellness Studio, and cheering on the Carolina Panthers, Charlotte
    Hornets, and Charlotte FC, while they occasionally join a weekend softball league at a local community park.
  arts: Jezabel Miller engages with the arts by painting watercolors of Appalachian mountain vistas, curating blog reviews of Greenville’s contemporary gallery openings featuring artists like Amy Sherald
    and Kehinde Wiley, and attending performances by the Charlotte Symphony, all while channeling their improvisational flair into community‑theater improv nights.
  travel: Jezabel Miller prefers meticulously planned weekend getaways, often driving to Asheville’s Blue Ridge Mountains or strolling through Savannah’s historic squares, while dreaming of a summer art‑focused
    trip to Florence, Italy, and a spring road trip to New Orleans to sample its vibrant music scene.
  culinary: Jezabel Miller experiments in the kitchen, mastering a modern spin on shrimp‑and‑grits with smoked paprika and jalapeño, layering collard greens with miso‑glazed sweet potatoes, and baking rosemary‑infused
    cornbread, all while balancing a moderate skill level that leans heavily on family recipes and seasonal garden harvests.
  core: Jezabel Miller is a methodical yet gregarious administrator who channels their Southern hospitality, love for community arts, and occasional over‑commitment into a life of organized creativity,
    caffeinated evenings, and a never‑ending collection of yarn.
background:
  cultural: Jezabel was raised in a middle‑class family in the upstate South Carolina region, with deep roots in the Appalachian‑influenced culture of the area. Her upbringing emphasized Southern hospitality,
    church involvement—likely within a Methodist or Presbyterian congregation—and community service, alongside a love for regional traditions such as Southern cooking, folk music, and crafts like quilting.
    The local community values close‑knit relationships and active participation in town events, shaping her sociable and cooperative personality. While she identifies as white and Southern, exposure to
    a growing arts scene and increasing demographic diversity in the region has broadened her appreciation for varied artistic expressions and new ideas, which she integrates into both her personal life
    and professional aspirations.
