personas:
  professional: Linda Ivey is a budding junior storyteller and aspiring game designer, who weaves mythic creatures into Scratch animations, harnesses a vivid imagination and love for abstract concepts to
    create immersive narratives, while their laid‑back attitude toward schedules sometimes leads to spontaneous bursts of creation and occasional missed deadlines.
  sports: Linda Ivey cheers for the San Francisco Giants and the Golden State Warriors, participates in a Redwood Explorers climbing club and a Saturday morning youth soccer team, preferring solo creek‑side
    hikes to team drills but still enjoys a quick game of basketball after school for a burst of competition.
  arts: Linda Ivey immerses herself in the surreal worlds of Studio Ghibli, the fantastical illustrations of Jim Henson, and the lyrical poetry of Shel Silverstein, spending weekends sketching creatures
    inspired by these influences and attending the local art museum's interactive exhibits, while humming the soundtrack of 'Moonlight Sonata' during drawing sessions.
  travel: Linda Ivey loves exploring the towering redwoods at Muir Woods, has taken a family road‑trip to the Grand Canyon, dreams of visiting the Ghibli Museum in Tokyo and the ice caves of Iceland, plans
    trips with a scrapbook of pictures and a penchant for last‑minute itineraries, yet stays within the modest budget of her parents' vacation allowance.
  culinary: Linda Ivey delights in crafting rainbow fruit kebabs, mixing chocolate chips into homemade oatmeal cookies, and assembling simple veggie sushi rolls after watching a Kids’ Cooking channel, but
    frequently forgets to clean the kitchen counters, leading to a trail of crumbs that their family pets love.
  core: Linda Ivey channels an unbridled imagination into drawings, code, and stories, navigates life with a playful yet competitive edge, hoards coins for future LEGO builds, and occasionally trades cereal‑box
    stickers while battling a stubborn nail‑biting habit.
background:
  cultural: Linda was raised in a middle‑class white family in Santa Rosa, California. Her parents support her creative pursuits, encouraging visits to the Sonoma County Museum of Art, local science fairs,
    and weekend hikes in the nearby redwoods. The community’s emphasis on environmental stewardship and access to diverse cultural programs has shaped her appreciation for nature, art, and learning. Although
    her family’s cultural heritage is broadly American, the region’s blend of agricultural traditions, tech influences, and progressive education has fostered her open‑minded yet reflective outlook.
