  career_goals: Linda dreams of becoming a creator who can bring her imaginative worlds to life. She envisions a future as a fantasy author, illustrator, or video game designer, hoping to blend her love
    for art, storytelling, and abstract concepts. She also thinks about exploring a career in wildlife illustration, where she can combine her interest in nature with her artistic talents.
