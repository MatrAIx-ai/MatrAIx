  career_goals: Although retired, Dennis aims to channel his practical expertise and outgoing nature into community service. He hopes to mentor volunteers in the neighborhood handyman program, lead a senior
    technology workshop at the local library, and contribute a chapter on Elmira’s industrial past to the historical society’s annual publication. He also aspires to complete a memoir that blends his personal
    stories with observations of regional cultural changes.
