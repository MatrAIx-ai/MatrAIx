  hobbies: '[''recreational softball'', ''Zumba and dance classes'', ''baking and recipe experimentation'', ''hiking in Texas Hill Country'', ''volunteering at community garden'', ''book club'', ''DIY home
    improvement projects'', ''hosting game nights'', ''weekend travel getaways'']'
  career_goals: Tonyia aims to convert her community-organizing experience into a part-time project-management role within a local nonprofit or small business, eventually earning a Project Management Professional
    (PMP) certification. She plans to complete her bachelor's degree in business administration over the next two years, and she is also pursuing a digital-marketing certificate to sharpen her online-promotion
    skills. In the longer term, she hopes to launch her own boutique event-planning service that emphasizes sustainable, Texas-rooted celebrations, positioning herself as a competitive leader in the regional
    market.
