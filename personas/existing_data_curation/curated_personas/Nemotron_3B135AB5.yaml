personas:
  professional: Tonyia Laire transforms her community‑event expertise, solid bookkeeping background, and flair for digital promotion into a part‑time project‑management role at a local nonprofit, where
    her competitive edge and practical curiosity drive sustainable, Texas‑rooted celebrations while she pursues PMP certification and a business‑administration degree.
  sports: Tonyia Laire plays on a co‑ed recreational softball league, attends high‑energy Zumba and partner‑dance classes, and roots for the Texas Rangers while occasionally cheering on Austin FC during
    the MLS season, channeling her competitive spirit into both team play and personal fitness.
  arts: Tonyia Laire fuels her creative side by devouring contemporary fiction from authors like Sally Rooney and Chimamanda Ngozi Adichie, dancing to live performances by H.E.R. and Leon Bridges, and crafting
    DIY décor for events inspired by the eclectic works of Wes Anderson and the vibrant murals of local street artists.
  travel: Tonyia Laire spends weekends hiking the rugged trails of Enchanted Rock and Pedernales Falls in the Texas Hill Country, dreams of exploring the turquoise streets of Santa Fe and the historic cafés
    of Barcelona, yet she often plans trips around her limited vacation days and a modest travel budget.
  culinary: Tonyia Laire loves experimenting with Southern‑inspired baked goods such as pecan‑streusel coffee cake and bourbon‑infused biscuits, frequently incorporating buttermilk, jalapeño, and a dash
    of hot sauce into her recipes, while her occasional over‑mixing habit leads to a few burnt edges she jokes about.
  core: Tonyia Laire is a competitive, community‑focused 27‑year‑old who channels her curiosity, skepticism, and love for group activities into event planning, budgeting, and lively weekend adventures,
    all while juggling a penchant for impulsive baking splurges and occasional procrastination.
background:
  cultural: Tonyia grew up in a middle-class, suburban enclave of Conroe, Texas, immersed in the region’s blend of Southern hospitality and Texan independence. Her family traditions feature frequent barbecue
    gatherings, holiday potlucks, and participation in local festivals such as the Montgomery County Fair. Raised in a Protestant community, she values church-based service and community outreach, which
    have shaped her collaborative yet competitive outlook. The cultural emphasis on self-reliance, neighborly support, and a love of the outdoors informs both her personal interests and her approach to
    organizing events.
attributes:
  skills: '[''event planning'', ''community outreach'', ''social media content creation'', ''basic bookkeeping'', ''family budgeting'', ''conflict resolution'', ''first aid/CPR'', ''team leadership'', ''DIY
