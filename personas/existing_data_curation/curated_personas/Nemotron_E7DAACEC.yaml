personas:
  professional: A retired household manager and community volunteer, Katie Champlin leverages her methodical organizational talent; they channel this into leading the senior center’s weekly knitting circle,
    expanding the church’s food‑bank volunteer schedule, and meticulously planning family gatherings while documenting their family’s history for a memoir.
  sports: An avid birdwatcher and casual sports fan, Katie Champlin enjoys leisurely walks along Florida’s wildlife trails, they cheer on the Miami Dolphins on Sundays, support the Tampa Bay Rays during
    spring training, and participate in low‑impact water aerobics at the senior center’s community pool.
  arts: Passionate about creative expression, Katie Champlin contributes her soprano voice to the church choir, they spend afternoons crocheting quilts inspired by the works of Georgia O’Keeffe, and unwind
    with mystery novels by Agatha Christie and Sue Grafton, often discussing plot twists with fellow senior center members.
  travel: Having explored nearby horse farms and community fairs, Katie Champlin loves day trips to the historic streets of St. Augustine and weekend getaways to New Orleans for jazz and cuisine, they prefer
    driving in their comfortable sedan, planning itineraries around family visits, and using senior discounts to keep travel affordable.
  culinary: A dedicated Southern cook, Katie Champlin prepares classic dishes like fried chicken, collard greens seasoned with smoked ham hocks, and peach cobbler, they relish sourcing fresh okra and sweet
    potatoes from their own garden, and relish the ritual of slow‑cooking gumbo in a cast‑iron pot for family gatherings.
  core: Katie Champlin blends steadfast routine with gentle creativity, they garden, crochet, and cook Southern comfort foods while methodically managing family finances and community volunteer projects,
    all with a quiet devotion to preserving tradition.
background:
  cultural: Katie was born and raised in central Florida during the 1940s and 1950s, growing up in a small, tightly-knit community where Southern hospitality and traditional family values were central.
    Her upbringing emphasized self-reliance, church involvement, and respect for routine, shaping her practical outlook. She identifies with the Anglo-American heritage common in Marion County, and her
    life reflects the region’s agricultural roots—particularly the horse-farm culture and citrus farming of the area. These cultural influences combine with a strong sense of community service, modest conservatism,
    and a deep appreciation for the natural landscape of Florida.
