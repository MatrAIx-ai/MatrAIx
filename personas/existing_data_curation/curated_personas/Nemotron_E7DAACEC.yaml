  career_goals: Although retired from formal work, Katie aims to stay actively engaged in her community and family. She wants to continue leading the senior center’s weekly knitting circle, expand the church’s
    food-bank volunteer schedule, and document her family’s history in a memoir for future generations. She also plans to improve her digital skills to join video calls with grandchildren, maintain her
    garden’s seasonal productivity, and support her husband’s health by scheduling regular medical check-ups and meal preparations. Her ambition is to preserve the routines that give her life meaning while
    gently mentoring younger volunteers.
