persona_description: A trailblazing African-American woman physician who overcame racial and gender discrimination to become the first African-American woman licensed to practice medicine in the state of
  Georgia. She dedicated her life to improving the health of her fellow African Americans in the rural South, and her legacy continues to inspire future generations of women in medicine. Despite facing
  numerous obstacles, she persevered and built a private practice, eventually passing away at the age of 38.
