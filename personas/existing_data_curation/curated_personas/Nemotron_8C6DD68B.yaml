    Photoshop basics'']'
  hobbies: '[''Playing soccer and basketball'', ''Competitive video gaming (FIFA, Call of Duty)'', ''Playing guitar and music jam sessions'', ''Social media content creation (Instagram, TikTok)'', ''Bike
    maintenance and small mechanical projects'', ''Volunteering at community garden'', ''Attending local festivals and cultural celebrations'', ''Debating current events with friends'']'
  career_goals: Diego plans to graduate high school and earn a scholarship to study Business Administration with a focus on Agricultural Business at a California state university. He wants to combine his
    practical knowledge of farming with his leadership and communication skills to eventually manage a family‑run agribusiness or launch a farm‑to‑table venture that supplies fresh produce to local markets
    and restaurants. While he values a clear career trajectory and the stability it offers, he also seeks flexibility to innovate—particularly in sustainable farming practices and digital marketing. In
    the longer term, he hopes to mentor younger members of his community, using his competitive spirit to inspire them to achieve personal and professional success.
