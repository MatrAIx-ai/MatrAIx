  hobbies: '[''Gardening (vegetable and herb)'', ''Traditional cooking with experimental twists'', ''Historical fiction and biography reading'', ''Chess and bridge'', ''Birdwatching'', ''Journaling and
    memoir writing'', ''Genealogy research'', ''Small-group cultural gatherings (music, dance)'', ''Walking and yoga'', ''Digital media hobby (blogging)'']'
  career_goals: Leonor aims to deepen her knowledge of Puerto Rican culinary heritage, compile a handwritten memoir of her family's migration story, and share it with local schools. She plans to enroll
    in a senior education program for digital media to create a modest blog and occasional video tutorials. She also hopes to mentor young Puerto Rican entrepreneurs, offering budgeting advice and strategic
    thinking. Maintaining her health through regular walks, yoga, and gardening is another priority. Additionally, she wants to lead a small intergenerational gardening club that brings together seniors
    and teenagers, fostering community ties while preserving cultural practices.
