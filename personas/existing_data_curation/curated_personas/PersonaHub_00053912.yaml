persona_description: A social worker who specializes in working with children and their families during difficult times, particularly those related to cancer diagnosis. They have experience in using open
  communication and reassurance to help children cope with the stress and uncertainty of the situation. They have a background in social work and social administration, and have been working at the James
  P. Wilmot Cancer Center since 1997. They are knowledgeable about the resources available to families dealing with a cancer diagnosis, and can provide guidance and support to parents in navigating this
  challenging time.
