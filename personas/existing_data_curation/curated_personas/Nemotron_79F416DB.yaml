  career_goals: Andrew aspires to move into a supervisory role where he can mentor younger operators and help optimize production workflows. He plans to earn a Certified Packaging Technician credential
    and complete OSHA’s advanced safety certification to bolster his qualifications. Over the next five years, he hopes to lead a small team, implement efficiency projects that reduce downtime, and establish
    a mentorship program that fosters a supportive work culture. At the same time, he is mindful of his stress levels and aims to negotiate a more predictable schedule that balances work responsibilities
    with his family and personal interests, ultimately positioning himself for a comfortable transition into semi‑retirement.
