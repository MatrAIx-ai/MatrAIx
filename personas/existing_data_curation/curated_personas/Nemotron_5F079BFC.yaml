personas:
  professional: Miguel Baez is a veteran industrial maintenance technician who leverages three decades of hands‑on experience with crushing, grinding, and blending equipment, excels at reading schematics
    and preventive maintenance, and uses their bilingual fluency and methodical mindset to drive safety compliance while pursuing a supervisory role.
  sports: Miguel Baez is a dedicated fan of Club América, never misses a televised match and organizes weekly viewing parties at the community center, also supports the Dallas Cowboys, follows the Texas
    Rangers, and spends Saturdays fishing at Lake Texoma with the local anglers’ club, preferring low‑impact recreation over formal gym workouts.
  arts: Miguel Baez enjoys listening to traditional folk and ranchera music, frequently playing recordings by Vicente Fernández, Juan Gabriel, and contemporary artist Natalia Lafourcade, attends annual
    community festivals featuring live mariachi and folk dance, and finds creative expression in restoring a 1965 Chevrolet, treating the car as a moving sculpture.
  travel: Miguel Baez prefers well‑planned road trips, having explored the historic missions of San Antonio, the wineries of Texas Hill Country, and a family reunion in the Yucatán Peninsula, while dreaming
    of a relaxed fishing lodge in the Ozarks, balancing budget constraints with a desire for culturally rich experiences.
  culinary: Miguel Baez delights in cooking hearty pozole, hand‑made tamales, and chicken mole, skillfully handling masa, dried chilies, and pork shoulder, often sharing the dishes with grandchildren, while
    also enjoying a weekend indulgence of carnitas tacos topped with fresh cilantro and radish at a local taquería.
  core: Miguel Baez blends a steadfast, routine‑driven work ethic with a love for classic cars, family cooking rituals, and cautious financial planning, yet their persistent worry about health and the future
    sometimes clouds their otherwise steady demeanor.
background:
  cultural: Miguel was born to Mexican immigrant parents who settled in Texas when he was a child. He grew up bilingual, speaking Spanish at home and English at school, and was raised in a Catholic household
    that emphasized family gatherings, community festivals, and respect for tradition. His identity blends Mexican customs—such as celebrating Día de los Muertos and preparing regional cuisine—with the
    values of hardworking, close‑knit Texan communities. These cultural influences shape his reliable work ethic, his strong sense of responsibility to family, and his appreciation for routine and practical
    solutions.
attributes:
  skills: '["Operating crushing, grinding, polishing, mixing and blending equipment", "Preventive maintenance and mechanical troubleshooting", "Technical schematics interpretation", "Quality control and
    batch measurement", "OSHA safety compliance", "Inventory management and material handling", "Process documentation and reporting", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Traditional Mexican cooking", "Watching Mexican soccer (Liga MX)", "Fishing at Lake Texoma", "Vegetable gardening", "Restoring classic cars", "Spending time with family"]'
  career_goals: Miguel aims to transition into a supervisory or lead‑technician role over the next two years, where he can mentor younger workers and implement process‑improvement projects that increase
    plant efficiency. He seeks to obtain an OSHA Forklift Operator certification and a Maintenance Technician credential to solidify his expertise before retirement. Ultimately, he wishes to secure a stable
    income that allows him to support his family and enjoy a comfortable retirement while staying connected to the plant as a consultant or part‑time trainer.
