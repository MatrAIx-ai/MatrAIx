personas:
  professional: Alfredo Laguado, a four‑year‑old playground architect, meticulously plans sandcastle fort blueprints each afternoon yet frequently ditches the layout for spontaneous bursts of creativity,
    and they delight in showing their constructions to friends during playtime while clinging to the comforting rhythm of snack‑time and bedtime.
  sports: Alfredo Laguado kicks a ball for the Chandler Little Lions soccer club, cheers loudly for the Phoenix Rising FC during televised matches, and they sprint around the community park with boundless
    energy, always eager to join a game of tag after school.
  arts: Alfredo Laguado sways to the lively rhythms of The Wiggles during family holiday celebrations, loves drawing cartoon characters like Mickey Mouse, and they often imitate the voice of Sesame Street's
    Elmo, showcasing a budding love for performance.
  travel: Alfredo Laguado has explored the red rocks of Sedona on a family road trip, splashed in the waves at San Diego's La Jolla Cove, and they dream of visiting Disneyland Resort in California next
    summer, craving the magic of rides and character meet‑and‑greets.
  culinary: Alfredo Laguado savors cheese‑filled pupusas topped with curtido, eagerly devours rice and beans seasoned with cilantro, and they proudly help stir guacamole made with ripe avocados and lime,
    often requesting extra cheese on homemade quesadillas.
  core: Alfredo Laguado is a routine‑loving yet impulsive four‑year‑old whose boundless energy, caring nature, and occasional worries drive a playful world of sandcastles, bright piggy‑banks, and heartfelt
    family celebrations.
background:
  cultural: Alfredo comes from a Salvadoran family that immigrated to the United States. At home, Spanish is spoken, and traditional dishes like pupusas and gallo pinto are part of family meals. His family
    celebrates Salvadoran holidays such as Las Posadas and the Feast of the Immaculate Conception, often incorporating lively music and dance. While living in Chandler, Arizona, Alfredo also participates
    in local community events, blending his heritage with the broader multicultural environment of his neighborhood.
