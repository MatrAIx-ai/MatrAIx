personas:
  professional: Carter Turner, an aspiring junior architect in the making, channels a love for intricate LEGO builds and precise instruction-following into school science projects, showing a methodical
    mindset and a playful curiosity that lets them experiment safely while keeping projects organized.
  sports: Carter Turner, a dedicated midfielder on the town's youth soccer club 'Little Eagles' and a regular fan of the regional professional team the River City Rangers, balances team drills with solo
    ball‑control practice after school, and they always wear bright orange shin guards for extra safety.
  arts: Carter Turner delights in the vibrant stop‑motion worlds of the LEGO movies, especially the soundtrack of The LEGO Movie, often sketches scenes from Adventure Time in a notebook, imitates the whimsical
    drawing style of illustrator Oliver Jeffers, and they collect stickers featuring pop icons like Billie Eilish and superhero symbols.
  travel: Carter Turner loves weekend excursions to the nearby apple orchard for picking and to the county fair for rides, dreams of exploring the giant gardens of Kew in London and the towering waterfalls
    of Niagara Falls, and they prefer planned itineraries that include hands‑on activities like rock‑collecting hikes.
  culinary: Carter Turner is a fan of simple comfort foods, favoring grilled cheese sandwiches with sharp cheddar, half‑baked mac and cheese topped with breadcrumbs, and apple slices sprinkled with cinnamon,
    often helping their family in the garden to pick fresh carrots for snack time, though they sometimes forget to wash their hands before eating.
  core: Carter Turner thrives on structured play, turning LEGO instruction manuals into imagination highways, while they occasionally hoard stickers and forget to tidy up after puzzles, embodying a blend
    of meticulousness and childlike spontaneity.
background:
  cultural: Carter grows up in Dorset, a small town in Ashtabula County, Ohio. His family’s cultural roots are typical of the Midwestern United States, with a blend of German and Irish ancestry reflected
    in family traditions, holidays, and community values. He participates in local church services, school events, and county fairs that celebrate agricultural heritage, community pride, and neighborhood
    togetherness. The rural setting provides frequent outdoor experiences, such as trips to nearby farms, lakes, and parks, fostering an appreciation for nature and small‑town camaraderie.
