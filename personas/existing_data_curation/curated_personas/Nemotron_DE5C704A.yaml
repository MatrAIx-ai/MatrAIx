  career_goals: Carter dreams of a future where he can help others in a structured, dependable role. He is most excited about becoming a firefighter because he admires the clear routines, teamwork, and
    practical problem‑solving the job requires. He also imagines someday working as a construction worker or civil engineer, attracted by the idea of building things according to precise plans and seeing
    tangible results.
