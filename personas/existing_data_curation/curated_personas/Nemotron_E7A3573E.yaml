personas:
  professional: Jongmin Win is a detail‑oriented operations manager who leverages data‑driven process improvement and design‑thinking to streamline cross‑functional workflows, while their bilingual communication
    skill and calm mediation style keep multicultural teams aligned and motivated.
  sports: Jongmin Win is an avid hiker of the San Gabriel Mountains, a regular participant in a local yoga studio’s sunrise classes, and a seasonal supporter of the Los Angeles Lakers, Los Angeles Dodgers,
    and LA Galaxy, while also playing in a weekend adult recreational soccer league with the Echo Park Strikers.
  arts: Jongmin Win is a frequent visitor of the Broad and the Getty Museum, often sketching in the quiet halls, and draws inspiration from artists such as Mark Bradford, Yayoi Kusama, and Jeff Koons; they
    also attend LA Philharmonic concerts featuring composers like Philip Glass and enjoy indie board‑game cafés that showcase narrative storytelling akin to modern performance art.
  travel: Jongmin Win prefers meticulously planned trips that blend cultural immersion with natural scenery, having already explored the historic temples of Kyoto, the street art districts of Berlin, and
    the coastal trails of Big Sur; they plan a future hike through Patagonia’s Torres del Paine and a sustainable retreat in Iceland’s geothermal spas, balancing travel ambitions with a limited vacation
    allowance.
  culinary: Jongmin Win delights in perfecting their family's signature spicy fermented radish stew, often experimenting by adding smoked paprika, citrus zest, and locally sourced microgreens, while also
    mastering a modern take on marinated pork with miso glaze and honey‑soy drizzle; they enjoy sourcing heirloom tomatoes, shiitake mushrooms, and fresh herbs from the nearby farmers' market to elevate
    each plate.
  core: Jongmin Win blends analytical precision with artistic curiosity, channeling disciplined process‑improvement into a thriving operations career while finding balance through quiet hikes, mindful yoga,
    and experimental cooking that turns family recipes into small culinary adventures.
background:
  cultural: Jongmin is a second‑generation Korean‑American whose family maintains strong ties to Korean traditions while fully engaging with the multicultural fabric of Southern California. Bilingual in
    Korean and English, he celebrates Korean holidays such as Chuseok and Lunar New Year and participates in community events at local Korean cultural centers. This bicultural upbringing instilled values
    of respect for hierarchy, collective harmony, and education, which influence his compassionate leadership style. Growing up in Rosemead—a hub for Asian diaspora—has given him a nuanced perspective on
    cultural identity, fostering an appreciation for diverse artistic expressions and a commitment to bridging cultural gaps in his professional and personal life.
