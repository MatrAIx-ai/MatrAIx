  career_goals: Jongmin aims to progress to a senior operations or director‑level role within the next five years, where he can shape company‑wide strategies that balance profitability with social responsibility.
    He plans to earn an MBA to deepen his strategic acumen and to lead corporate social‑impact initiatives that support local Asian‑American communities. Ultimately, he envisions launching a boutique consulting
    practice that helps small family‑owned businesses integrate sustainable practices and creative marketing, blending his passion for art with his managerial expertise.
