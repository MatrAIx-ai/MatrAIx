personas:
  professional: Salina Hill, a seasoned market research analyst approaching retirement, leverages mastery of SPSS, R, and Tableau to craft predictive models that inform multicultural brand strategies, while
    mentoring junior analysts with a methodical yet curious coaching style.
  sports: Salina Hill keeps active by walking the Everglades trail with the Homestead Senior Walking Club, playing casual doubles tennis at the community park, and cheering for the Miami Heat and Miami
    Dolphins, while occasionally joining a senior yoga class to maintain flexibility despite knee arthritis.
  arts: Salina Hill captures sunrise over the Everglades with a DSLR, channeling Ansel Adams’s compositional eye, while evenings often feature reading Hilary Mantel’s Tudor chronicles and listening to Nina
    Simone’s soulful ballads, and they occasionally attend a local theater production of August Wilson’s "Fences."
  travel: Salina Hill prefers meticulously planned road trips that blend nature and heritage, having explored Savannah’s historic streets and the Everglades’ mangrove tunnels, while they dream of sailing
    to Barbados and strolling through Jamaica’s Blue Mountain villages, all while budgeting travel expenses through a dedicated savings envelope.
  culinary: Salina Hill cultivates heirloom tomatoes, peppers, and tropical basil in their garden and transforms them into vibrant dishes such as jerk‑spiced chicken with scotch bonnet pepper salsa, a tomato‑pepper
    gazpacho spiced with lemongrass, and a Caribbean‑inspired vegetable quinoa, while they often indulge in late‑night coffee‑sweetened mango smoothies and occasionally over‑salt their soups in the excitement
    of cooking for the Homestead Community Center festivals.
  core: Salina Hill, a methodical market‑research veteran with a green thumb, balances data‑driven mentorship with sunrise photography, garden‑to‑table cooking, and a disciplined yet occasionally indulgent
    financial approach, all while navigating senior‑age health quirks and a love for community festivals.
background:
  cultural: Salina’s cultural identity is shaped by her African‑American heritage and the vibrant multicultural environment of Miami‑Dade County. Raised in a family that emphasized storytelling, church
    fellowship, and resilience, she carries forward traditions of community solidarity and collective celebration. Living in Homestead, she blends Southern Black culinary roots with the flavors of Caribbean
    and Latino neighbors, fostering a kitchen that mirrors the county’s diversity. Salina actively participates in local Black history events, supports initiatives that amplify minority voices in market
    research, and draws inspiration from the region’s rich musical legacy, from gospel choirs to jazz and salsa rhythms. Her cultural awareness informs her professional perspective, ensuring that research
    insights honor the nuanced experiences of the communities she serves.
attributes:
  skills: '[''Survey design'', ''Statistical analysis (SPSS, SAS, R)'', ''Data visualization (Tableau, Power BI, Excel)'', ''Predictive modeling'', ''Consumer behavior research'', ''Market segmentation'',
    ''CRM management (Salesforce)'', ''Project management'', ''Strategic report writing and presentations'', ''Cross‑functional team collaboration'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Digital photography'', ''Reading historical fiction'', ''Genealogy research'', ''Volunteering at the Homestead Community Center'', ''Cooking Caribbean and
    Southern dishes'', ''Attending local cultural festivals'']'
  career_goals: Salina aims to transition into a senior advisory role where she can mentor emerging analysts and shape inclusive market‑research strategies for multicultural brands. She plans to earn a
    Certified Market Research Analyst credential and deepen her knowledge of AI‑driven analytics to offer cutting‑edge insights. Over the next five years, she envisions launching a boutique consultancy
    focused on helping minority‑owned businesses navigate market entry in South Florida, while also contributing as a guest lecturer at local universities and community colleges. Her long‑term ambition
    is to leave a legacy of data‑driven decision making that reflects both rigorous methodology and cultural relevance.
