  water management, disaster prevention, and natural disaster response. This scientist is also skilled in integrating multiple agency data, developing new tools and products, and conducting critical mineral
  and energy resources research. They are dedicated to protecting environmental health and ensuring that the Nation's safety, security, and economic well-being are protected from natural hazards.
