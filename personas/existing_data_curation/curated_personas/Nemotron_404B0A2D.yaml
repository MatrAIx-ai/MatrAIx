  career_goals: Corbin dreams of turning his love of stories and art into a career, hoping to become a children’s book author and illustrator. He also imagines designing futuristic inventions, so he aspires
    to explore a path in engineering or science, perhaps one day becoming an astronaut or a maker of educational toys. He wants his work to spark curiosity and kindness in other children, blending creativity
    with a desire to help others learn.
