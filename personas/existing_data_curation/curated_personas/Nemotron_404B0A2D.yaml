personas:
  professional: A budding junior explorer and creative builder, Corbin Michail channels their imaginative curiosity into detailed LEGO constructions, whimsical drawings, and early coding puzzles, approaching
    each project with organized flexibility and a respectful, cooperative mindset.
  sports: An enthusiastic junior nature explorer, Corbin Michail participates in the Franklin County Kids Soccer League, cheers for the local youth baseball team the Elora Cubs, and spends weekends hiking
    the surrounding hills, often pretending to be a forest ranger while keeping a modest level of physical activity.
  arts: A vibrant young creator, Corbin Michail immerses themselves in drawing fantastical landscapes inspired by Dr. Seuss and Mary GrandPré, delights in playing simple recorder tunes from Disney soundtracks,
    and collects LEGO sets that echo the whimsical architecture of fantasy films, fostering a deep appreciation for visual and musical storytelling.
  travel: A curious little adventurer, Corbin Michail has explored nearby state parks such as the Great Smoky Mountains and enjoys family visits to the local county fair, while dreaming of traveling to
    the dinosaur fossil beds of Montana and the historic streets of Edinburgh, Scotland.
  culinary: A budding foodie with a sweet tooth, Corbin Michail loves homemade mac and cheese, chocolate chip cookies, and fresh strawberries with honey, often helping to stir batter for pancakes and eagerly
    collecting crunchy granola for a trail mix snack.
  core: Corbin Michail is a wildly imagined seven-year-old who blends a love for LEGO, drawing, and storytelling with a gentle, cooperative nature, though they sometimes forget bedtime after an exciting
    puzzle session.
background:
  cultural: Corbin grew up in Elora, a small rural community in Franklin County, Tennessee. His family participates in typical Southern customs such as church gatherings, community picnics, and seasonal
    county fairs, fostering a strong sense of community and hospitality. Local Appalachian folklore and storytelling traditions have nurtured his love for imaginative tales. The region’s emphasis on modesty,
    politeness, and cooperation aligns with his kind and considerate nature, while the natural landscape—rolling hills, forests, and streams—encourages his interest in exploring the outdoors and observing
    nature.
