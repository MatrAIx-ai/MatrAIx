personas:
  professional: Joel Gates, a high‑school astronomy hobbyist with a modest telescope, channels his curiosity and pragmatic organization into nightly sky surveys, cataloguing observations while using sketching
    to translate celestial patterns into art.
  sports: Joel Gates, a member of the Greenfield High School cross‑country team who prefers solitary runs through the surrounding fields, also follows the New York Yankees and roots for the Seattle Seahawks,
    occasionally joining a local community cycling club for weekend rides.
  arts: Joel Gates, an acoustic guitar hobbyist who practices folk songs by Sufjan Stevens and indie ballads by Bon Iver, sketches rural landscapes inspired by the Hudson River School, and devours sci‑fi
    novels by Liu Cixin and classic space operas by Isaac Asimov, letting these artistic influences shape their personal creative voice.
  travel: Joel Gates, who has camped under the dark skies of Cherry Springs State Park and trekked the trails of Yellowstone National Park, dreams of visiting Mauna Kea’s observatories in Hawaii and the
    Atacama Desert’s stargazing sites, favoring meticulously planned road trips over spontaneous travel due to budgeting constraints and a desire for predictable routines.
  culinary: Joel Gates, who favors simple home‑cooked meals like spaghetti carbonara with fresh basil and garlic, snacks on trail mix with dried apricots and almonds during hikes, and enjoys occasional
    pizza night with pepperoni and extra cheese, yet often forgets to eat proper meals when absorbed in telescope work.
  core: Joel Gates, a 15‑year‑old stargazing guitarist and sketch‑loving introvert, blends relentless curiosity with methodical organization, turning solitary nature walks into creative fuel while navigating
    frequent anxiety spikes and occasional impulsive spending.
background:
  cultural: Joel grew up in a tight‑knit, predominantly white, Midwestern farming community in Greenfield, Iowa. The town’s values of self‑reliance, modesty, and neighborly help shape his practical outlook,
    while local church gatherings and school events provide a modest social framework. The rural setting fosters his appreciation for nature, hands‑on work, and community service, even as his reserved personality
    leads him to prefer small, familiar groups.
attributes:
  skills: '[''Electronic troubleshooting'', ''Basic automotive maintenance'', ''Woodworking'', ''Online research'', ''Creative writing'', ''Journaling and self‑reflection'']'
  hobbies: '[''Stargazing'', ''Reading science fiction and popular science'', ''Scale model building'', ''Sketching'', ''Acoustic guitar'', ''Nature walks'', ''Single‑player puzzle video games'']'
  career_goals: Joel aspires to turn his practical tinkering into a career as a field service technician or a mechanical engineer, ideally through a vocational apprenticeship or a community college program
    focused on applied engineering. He wants to work in an environment where he can solve real‑world problems, such as maintaining farm equipment or installing renewable‑energy systems, while also gaining
    stability that helps manage his anxiety. Long‑term, he hopes to run his own small repair workshop that serves the local community.
