personas:
  professional: Lifen Docteur, an aspiring conservation officer, merges hands‑on woodworking, engine repair, and traditional wildlife tracking skills with a pragmatic curiosity, juggling GED studies and
    apprenticeship applications while they occasionally let a relaxed approach to obligations cause missed deadlines.
  sports: Lifen Docteur enjoys BMX trail riding with the local Spokane BMX Club, joins weekend hikes and fishing trips, and passionately follows the Seattle Seahawks, Seattle Kraken, and Seattle Sounders,
    often wearing their jerseys during outdoor outings, which they consider both a fashion statement and a source of team spirit.
  arts: Lifen Docteur sketches wildlife scenes in a worn notebook while listening to traditional drum circles alongside modern indie folk artists such as Fleet Foxes, Tash Sultana, and Bon Iver, and they
    occasionally share these sketches at community gatherings, blending visual art with storytelling.
  travel: Lifen Docteur favors spontaneous weekend camping trips to nearby Glacier National Park and the red‑rock canyons of Moab, while also dreaming of a sustainable cultural exchange program in New Zealand’s
    South Island, balancing limited funds with a love for rugged adventure that they pursue whenever the weather permits.
  culinary: Lifen Docteur experiments with cooking traditional smoked salmon, cedar‑wrapped trout, and wild berry compote using ingredients like spruce tips, juniper berries, and locally harvested sweetgrass,
    displaying a budding culinary skill that mixes heritage recipes with modern grilling techniques, and they often serve the dishes to friends around a campfire.
  core: Lifen Docteur is a nature‑driven, hands‑on teen who blends curiosity and tradition into a flexible, occasionally disorganized life, streaked with a love for outdoor craft, spontaneous adventure,
    and quiet moments of artistic sketching that they cherish after a long day.
background:
  cultural: Lifen is a member of the Confederated Salish and Kootenai Tribes of Montana. He grew up immersed in tribal traditions, learning basic Salish language, participating in seasonal ceremonies, and
    attending powwows. His family emphasizes respect for the land, oral storytelling, and community responsibility. Living in Deer Lodge, he experiences a blend of rural Montana life and his tribal heritage,
    often helping with community garden projects, cultural preservation events, and sharing traditional knowledge with peers.
attributes:
  skills: '["Woodworking", "Mechanical repair (bikes and small engines)", "Hunting and tracking", "Fishing", "Basic first aid", "Salish language basics", "Traditional storytelling", "Basic computer use",
    "Community gardening"]'
  hobbies: '["Hunting", "Fishing", "Hiking", "Camping", "BMX riding", "Strategy video games", "Traditional drumming", "Sketching wildlife", "Cooking traditional dishes", "Attending powwows", "Listening
    to nature and science podcasts"]'
  career_goals: Lifen aims to earn his GED within the next year and then enroll in a tribal apprenticeship program focused on wildlife management or sustainable construction. He dreams of becoming a conservation
    officer or a community‑development coordinator for the Confederated Salish and Kootenai Tribes, protecting local ecosystems while promoting sustainable tourism and traditional crafts. In the longer
    term, he envisions launching a small business that sells handcrafted items—such as woven baskets and carved wooden souvenirs—combined with eco‑guided tours, allowing him to blend his practical skills,
    cultural pride, and love of the natural world.
