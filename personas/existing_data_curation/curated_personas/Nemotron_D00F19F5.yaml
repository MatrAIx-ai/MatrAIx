personas:
  professional: Janice Walters, a seasoned accountant and educator, combines three decades of audit expertise, advanced Excel modeling, Tableau visualizations, and SAP proficiency with a curiosity for the
    arts to craft innovative budgeting solutions for municipal agencies and non‑profit arts groups while mentoring junior staff with the same collaborative energy they bring to community paint‑night events.
  sports: Janice Walters stays fit by joining the Brunswick Coastal Walkers for daily shoreline strolls, cheering on the Carolina Panthers each Sunday, playing casual beach volleyball in summer, and they
    attend weekly yoga classes to keep their osteoarthritis joints supple.
  arts: Janice Walters channels their curiosity into watercolor seascapes inspired by Winslow Homer, regularly participates in paint‑night sessions featuring works by local artist Sarah Jennings, frequents
    the North Carolina Maritime Museum, and they unwind to the mellow crooning of Norah Jones after evenings spent among gallery walls.
  travel: Janice Walters prefers low‑key road trips along the Atlantic coast, having explored Savannah’s historic district and the Outer Banks’ rugged dunes, and they dream of a leisurely Andalusian culinary
    tour in Spain once retirement grants more free time, balancing careful itinerary planning with a willingness to detour for spontaneous beach stops.
  culinary: Janice Walters, a confident home chef, delights in simmering saffron‑laden paella, slow‑cooking spicy Cajun gumbo, and crafting shrimp‑and‑grits with locally caught shrimp and heirloom tomatoes,
    often hosting dinner gatherings where they showcase a blend of Southern hospitality and global culinary curiosity.
  core: Janice Walters blends meticulous accounting precision with a bohemian love of watercolor seas, turning every budget sheet into a canvas of community‑focused creativity, even if they sometimes hoard
    extra pens like trophies.
background:
  cultural: Janice is a White American who has spent most of her life in the coastal region of southeastern North Carolina. Growing up in a small, close‑knit community, she was shaped by Southern values
    of hospitality, modesty, and a strong sense of civic responsibility. Her family’s tradition of attending local church services and participating in community festivals fostered an appreciation for collective
    celebration and support. The coastal environment, with its fishing heritage and emphasis on outdoor recreation, influences her love for beach walks and native gardening. While rooted in these regional
    traditions, Janice’s graduate education and lifelong curiosity have broadened her perspective, leading her to embrace diverse artistic and cultural experiences beyond her hometown.
