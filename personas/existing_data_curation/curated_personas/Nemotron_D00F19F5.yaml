  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Participating in community paint-night events'', ''Reading (book club)'', ''Gardening (native coastal plants)'', ''Beach walking
    and bird-watching'', ''Cooking and exploring global cuisines'', ''Hosting dinner gatherings'', ''Volunteering for financial literacy workshops'', ''Assisting arts council with budgeting and grant writing'']'
  career_goals: Looking ahead, Janice aims to advance to a senior leadership role such as Controller or Director of Internal Audit within a regional corporation or a public agency, where she can champion
    process innovation and mentor the next generation of accountants. She plans to obtain the Certified Management Accountant (CMA) designation to deepen her strategic financial management skills, and to
    expand her CPA credentials into advisory services for small businesses and non-profits. A key personal ambition is to develop a community-wide financial literacy program that blends her expertise in
    accounting with her passion for education and the arts, offering workshops that help residents of Brunswick County better manage personal finances and support local cultural initiatives. In the longer
    term, Janice envisions transitioning to a part-time consulting role, focusing on grant budgeting for arts organizations while staying actively involved in community service.
