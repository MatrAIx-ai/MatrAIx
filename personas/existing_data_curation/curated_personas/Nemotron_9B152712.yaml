  hobbies: '[''Cooking Mexican cuisine'', ''Participating in parish choir and events'', ''Dancing to norteño and cumbia music'', ''Volunteering for community clean‑up and event planning'', ''Reading romance
    novels'', ''Solving crossword puzzles'', ''Walking her dog Luna'', ''Attending local festivals and cultural celebrations'']'
  career_goals: Luiza aims to transition into a supervisory role within the next two years, aspiring to become a Team Lead or Shift Manager at her call center. She plans to earn a Certified Customer Service
    Professional (CCSP) credential and enroll in community college courses in Business Administration to strengthen her managerial competencies. Long‑term, she hopes to mentor younger employees, contribute
    to process‑improvement initiatives, and secure a stable retirement for her family while maintaining her involvement in community outreach programs.
