personas:
  professional: Melissa Wright, a 46‑year‑old self‑taught web developer, channels two decades of front‑end mastery in HTML5, CSS3, JavaScript and React into rapid prototype delivery, while her competitive
    curiosity fuels continual performance and SEO tinkering and her relaxed, ad‑hoc workflow often leaves her desk strewn with sticky notes and half‑built Raspberry Pi gadgets.
  sports: Melissa Wright explores the Finger Lakes trail system with the local hiking club in spring, paddles the Erie Canal with the Rochester Canoe Crew in summer, supports the Rochester Red Wings and
    Buffalo Bills from the stands, and balances her love of the outdoors with weekly yoga sessions that she often forfeits for immersive board‑game nights.
  arts: Melissa Wright fuels her creative side by dissecting Agatha Christie mysteries and Hilary Mantel’s historical novels at her book club, unwinding to the folk‑rock tunes of The Decemberists and ambient
    soundscapes of Brian Eno, and occasionally attending Rochester Broadway Theatre League productions, often quoting Lin‑Manuel Miranda’s lyrical flair in her coding comments.
  travel: Melissa Wright prefers spontaneous, budget‑conscious trips—like a weekend hike in the Adirondacks or a quick wine‑tasting escape to Napa Valley—while nurturing a long‑term dream to explore Tokyo’s
    Akihabara district for tech inspiration, though her consultancy’s cash flow sometimes forces her to postpone the overseas adventure.
  culinary: Melissa Wright, a dedicated home baker, nurtures a sourdough starter and crafts heirloom tomato bruschetta using basil from her garden, regularly experiments with podcast‑inspired dishes like
    miso‑glazed salmon and Thai coconut curry, and approaches dining out as a research mission, swapping the usual pizza joint for a farm‑to‑table bistro serving beet‑root salad with goat cheese.
  core: Melissa Wright, a 46‑year‑old web‑dev tinkerer, fuses a love of gardening and Raspberry Pi gadgets with a competitive freelance hustle, all while battling chronic disorganization and occasional
    credit‑card late fees.
background:
  cultural: Melissa is a white American with deep roots in upstate New York. Her family background includes Irish and German ancestry, and she grew up in a modest, working‑class neighborhood of Rochester
    that valued self‑reliance, community service, and practical education. The region’s mix of industrial history and modern tech institutions (like RIT) shaped her pragmatic outlook and her belief in learning
    by doing. She maintains close ties to local traditions, participates in community clean‑up events, and enjoys the blend of suburban calm and the cultural vibrancy of the city.
attributes:
  skills: '["HTML5", "CSS3", "JavaScript", "React", "Responsive Web Design", "Git", "WordPress", "SEO Optimization", "Node.js", "PHP"]'
  hobbies: '["Gardening", "Hiking", "Raspberry Pi tinkering", "Book club (mystery & historical fiction)", "Board game nights", "Cooking", "Baking", "Local tech meetups", "Canoeing", "DIY home projects"]'
  career_goals: Melissa aims to transition from a freelance web developer to a senior technical lead for a boutique digital agency in Rochester, where she can mentor junior developers and shape the agency’s
    product strategy. She also hopes to launch a side consultancy that helps local small businesses modernize their online presence, leveraging her competitive drive to become the go‑to expert in the region.
    In the longer term, she envisions creating a series of online courses that combine her practical web‑development know‑how with her love for hands‑on tinkering, making technology accessible to other
    self‑taught learners.
