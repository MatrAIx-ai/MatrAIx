  career_goals: Although retired from formal employment, Sabrina aims to deepen her impact on the Elliston community. She plans to obtain a certificate in museum studies to formally volunteer as a curator
    for the local heritage museum. She aspires to launch an annual multicultural arts festival that highlights both Appalachian and Japanese artistic traditions, fostering cross‑cultural dialogue. Sabrina
    also wishes to complete a memoir that weaves together her family's Appalachian roots and her experiences with Japanese culture, hoping to publish it for local schools. Additionally, she intends to mentor
    a cohort of high‑school students in art history and community service, leaving a lasting legacy of curiosity and civic engagement.
