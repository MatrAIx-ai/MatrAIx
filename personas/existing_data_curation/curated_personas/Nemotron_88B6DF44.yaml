  hobbies: '[''book club'', ''gardening'', ''coastal walking'', ''birdwatching'', ''church choir'', ''cooking classes'', ''senior yoga'', ''quilting and crafting'']'
  career_goals: Although retired from formal employment, Jennifer aims to deepen her impact in the local senior community. She aspires to chair the volunteer committee at the New Port Richey Senior Center,
    mentor younger volunteers in effective event organization, and advocate for improved health‑services access for seniors within Pasco County. Additionally, she plans to enroll in a community‑college
    course on digital literacy for older adults, so she can teach peers how to navigate online health portals and stay in touch with distant relatives. Her long‑term ambition is to preserve a vibrant, supportive
    social network for herself and her neighbors while maintaining her own physical and mental well‑being.
