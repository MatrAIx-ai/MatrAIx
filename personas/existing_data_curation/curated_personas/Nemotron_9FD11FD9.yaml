personas:
  professional: Jung Tse is a security surveillance specialist in a high‑volume casino, where they combine deep technical know‑how of CCTV and video‑analytics with sharp situational awareness and clear
    incident reporting, while their laid‑back attitude toward scheduling lets them slip between certification study, late‑night Arduino projects, and spontaneous social events.
  sports: Jung Tse is a weekend hiker on Hill Country trails, a regular in a local pickup basketball league, and a loyal fan of Austin FC and the Texas Longhorns, while they also belong to the Austin Hiking
    Club and occasionally join a 5K run with friends.
  arts: Jung Tse dives into Austin’s live‑music scene, cheering for bands like Khruangbin, The Black Angels, and St. Vincent, while they also host board‑game nights featuring titles like Catan and Azul,
    and they occasionally attend indie film screenings at the Alamo Drafthouse.
  travel: Jung Tse prefers spontaneous road trips, often packing a bag on a whim to explore nearby destinations like New Mexico’s Santa Fe, the Texas Hill Country vineyards, or a music‑festival‑filled weekend
    in Austin, and they keep an eye on travel‑rewards credit‑card points to fund future trips abroad such as a cultural immersion in Osaka or a backpacking spree through Barcelona.
  culinary: Jung Tse enjoys cooking traditional dishes like kimchi fried rice, bulgogi, and japchae, often pairing them with Austin‑style BBQ brisket and fresh tacos al pastor, and while their kitchen skills
    are solid, they have a habit of leaving the stovetop on too long when distracted by a new gadget prototype.
  core: Jung Tse is a socially‑charged security tech enthusiast who balances late‑night Arduino tinkering and spontaneous basketball games with a disciplined eye on career certification, even if they occasionally
    misplace their keys and forget to pay bills on schedule.
background:
  cultural: Jung was raised in a Korean‑American household, speaking both Korean and English at home. His family emphasized education, respect for community, and the balance between collectivist values
    and individual ambition. Growing up in Texas, he adopted the region’s laid‑back, sociable culture while staying connected to Korean traditions through community events, cuisine, and language. This bicultural
    upbringing informs his teamwork orientation, his respect for hierarchy in professional settings, and his appreciation for both modern tech trends and cultural heritage.
attributes:
  skills: '["Surveillance system operation", "CCTV hardware maintenance", "Video‑analytics software troubleshooting", "Network basics and IT support", "Emergency response & first aid", "Crowd management
    and conflict de‑escalation", "Incident documentation and report writing", "Bilingual communication (English/Korean)", "Knowledge of casino regulations and gambling security protocols", "Situational
    awareness and risk assessment"]'
  hobbies: '["Pickup basketball", "Hill Country hiking", "Live music concerts", "Board‑game nights", "Arduino and DIY electronics projects", "Korean cooking", "Celebrating Korean holidays (Chuseok, Seollal)",
    "Korean language practice group", "Socializing at local festivals"]'
  career_goals: Short‑term, Jung aims to earn advanced certifications such as the ASIS International CPP (Certified Protection Professional) and specialized training in video‑analytics and cybersecurity
    for surveillance. He hopes to be promoted to lead surveillance officer, supervising a team and coordinating security operations across multiple casino floors. Long‑term, he envisions moving into a security
    management role at a major entertainment venue or founding a boutique security‑consulting firm that blends traditional physical security with modern data‑driven monitoring solutions. He is also interested
    in further education, possibly a master’s in cybersecurity or risk management, to broaden his technical expertise.
