  hobbies: '[''Reading contemporary fiction and non-fiction'', ''Native plant gardening'', ''Woodworking'', ''Baking sourdough bread'', ''Puzzle solving (crosswords, sudoku)'', ''Solo hiking and nature
    photography'']'
  career_goals: Jessica aims to transition from her role as a full-time homemaker to a remote freelance technical writer and data analyst, leveraging her analytical skills to produce research reports and
    documentation for small businesses. She intends to complete a professional certification in data analysis to solidify her expertise. In parallel, she plans to launch a modest e‑commerce shop selling
    handcrafted wooden home décor, combining her carpentry hobby with a sustainable income stream. Ultimately, she seeks to achieve financial independence while maintaining a structured yet flexible work
    schedule that preserves her preference for solitary, quiet work environments.
