  hobbies: '[''Playing basketball'', ''Biking around Brooklyn'', ''Listening to true‑crime podcasts'', ''Tactical video games'', ''Street photography'', ''Playing acoustic guitar'', ''Attending live music
    events'', ''Trying new food trucks'', ''Experimenting with drones'']'
  career_goals: He aims to complete the NYPD police academy and earn his full officer certification within the next two years, become a member of a specialized unit such as the Vice or Special Victims Squad,
    develop deeper investigative expertise, pursue a GED and eventually an associate degree in criminal justice, and rise to a supervisory role where he can lead a community liaison team that blends technology
    with policing. Chad also hopes to mentor newer recruits and spearhead initiatives that enhance officer accountability and build trust with Brooklyn's diverse neighborhoods.
