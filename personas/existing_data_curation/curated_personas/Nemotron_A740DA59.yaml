personas:
  professional: Chad May, a 20‑year‑old NYPD trainee with a knack for rapid situational assessment and community policing, leverages their curiosity and practical mindset to balance investigative instincts
    with flexible, sometimes disorganized, on‑the‑fly decision‑making, while using their street‑wise knowledge to de‑escalate conflicts and document digital evidence.
  sports: Chad May spends evenings shooting hoops at neighborhood courts and occasionally suiting up for a Brooklyn Bicycling Club weekend ride, channeling the competitive energy of the Brooklyn Nets and
    New York Knicks into a personal fitness regimen that blends basketball drills, high‑intensity interval training, and bike‑commuting through the borough’s streets.
  arts: Chad May unwinds by strumming an old acoustic guitar to the tunes of The Strokes and Mitski while snapping candid shots of Brooklyn murals in the style of street photographer Bruce Gilden, and they
    regularly attend live shows at Brooklyn Steel featuring artists such as Tame Impala, all of which fuels their investigative curiosity and serves as a creative outlet between patrol shifts.
  travel: Chad May prefers spontaneous, budget‑friendly getaways, having biked to the historic streets of Boston and taken a weekend train to Philadelphia’s mural‑laden neighborhoods, while dreaming of
    a tech‑focused trip to Tokyo’s Akihabara district and an immersive food‑truck tour through New Orleans, all planned on a flexible schedule that reflects their relaxed attitude toward obligations.
  culinary: Chad May gravitates toward the bold flavors of street food, regularly indulging in Korean BBQ tacos with kimchi, truffle‑infused mushroom fries, and falafel wraps drizzled with tahini, while
    their modest kitchen skill level keeps them to quick skillet pastas and avocado toast, reflecting a love for experimental eats balanced by the convenience of food‑truck dining.
  core: Chad May blends a detective’s curiosity with a laid‑back, sometimes chaotic lifestyle, juggling police academy drills, street‑photography, drone tinkering, and impulsive gadget splurges while striving
    to turn Brooklyn’s raw energy into a tech‑savvy policing career.
background:
  cultural: Chad grew up in a working‑class white family in Brooklyn, with roots tracing back to Irish‑American and Italian‑American ancestors. His upbringing blended traditional Sunday dinners and community
    values with the vibrant multicultural fabric of Kings County, exposing him early to diverse languages, cuisines, and perspectives. This background fostered a practical, no‑nonsense work ethic while
    also sparking his curiosity about different cultures, shaping his approach to policing as both a protector of his own community and a bridge to the borough’s many neighborhoods.
