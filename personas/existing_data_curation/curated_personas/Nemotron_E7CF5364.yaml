  hobbies: '[''Salsa and cumbia dancing'', ''Acoustic guitar playing'', ''Cooking traditional Mexican meals'', ''Community gardening'', ''Volunteering at senior center'', ''Watching Liga MX soccer'', ''Reading
    art history'', ''Hiking in Texas Hill Country'', ''Participating in cultural festivals'', ''Sketching folk art designs'']'
  career_goals: Luis aims to formalize his community involvement by becoming a volunteer coordinator or cultural outreach officer for a local nonprofit or municipal office. He plans to develop a recurring
    series of workshops that celebrate Mexican folk art, music, and cuisine, fostering cross‑cultural understanding in Weatherford. To strengthen his administrative capacity, he intends to complete a GED
    or adult‑education program and acquire grant‑writing skills to fund community projects. Ultimately, Luis hopes to become a trusted mentor for younger residents, guiding them through education, employment,
    and personal well‑being while preserving his cultural heritage.
