persona_description: A senior government official responsible for addressing water shortages and pollution-control problems. She has a strong background in environmental policy and has been advocating for
  the replacement of the controversial new source review policy with Clear Skies, a program that would set limits for power plant pollution emissions and leave it to the power companies to comply as they
  see fit. She is concerned about the deteriorating public water infrastructure, global climate effects, waterborne disease, land use, groundwater and surface water contamination, and ineffective government
  regulations, and has been urging Congress to address these issues. She is also aware of the need for an additional $23 billion a year to be spent on the nation's 54,000 community water systems to meet
  all the requirements of the Clean Water Act and Safe Drinking Water Act and to replace aging and failing pipes and other infrastructure.
