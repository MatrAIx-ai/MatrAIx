  career_goals: Charmaine aims to secure a scholarship to a top STEM high school program and eventually pursue a degree in computer science or biomedical engineering. She hopes to combine her curiosity
    for new technologies with a practical mindset to develop software tools that improve everyday life. In the short term, she plans to win regional robotics competitions and contribute to her school's
    science fair with a project on sustainable energy.
