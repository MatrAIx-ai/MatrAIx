personas:
  professional: Charmaine Rivers, a 13‑year‑old budding digital illustrator, blends algorithmic precision from chess and math competitions with a love for science‑fiction world‑building to create technically
    exact concept art for speculative narratives.
  sports: Charmaine Rivers cycles the wooded trails around Huntington three times a week, volunteers with the local youth cross‑country club, and is an avid fan of the Huntington North Bulldogs football
    team and the Indiana Hoosiers basketball squad, often cheering from the bleachers at Friday night games.
  arts: Charmaine Rivers draws inspiration from digital pioneers like Beeple and the sci‑fi illustrations of Alex Ross, while humming to Tame Impala and listening to the soundtracks of Blade Runner while
    crafting pixel‑perfect concept art on their graphics tablet.
  travel: Charmaine Rivers enjoys weekend bike excursions to the Hoosier National Forest, has visited the Children’s Museum of Indianapolis, and dreams of exploring Tokyo’s Akihabara district to soak up
    its neon cyber‑culture.
  culinary: Charmaine Rivers favors classic Midwestern comfort foods like buttery pork tenderloin sandwiches and homemade apple pie during holiday gatherings, but also experiments with quick‑cook meals
    such as garlic‑infused spaghetti with parmesan and can reliably bake chocolate chip cookies using a measured recipe.
  core: Charmaine Rivers is a fiercely curious, competitively driven teen who balances solitary tech‑creativity with a pragmatic streak, often charting every allowance cent and mapping out bike routes while
    occasionally neglecting chores in favor of gaming marathons.
background:
  cultural: Charmaine grew up in Huntington, Indiana, a small Midwestern city with a strong sense of community and family values. Her family’s cultural roots include German and Irish ancestry, reflected
    in traditional celebrations such as holiday pies and county fair outings. The local culture emphasizes practicality, self‑reliance, and supportive neighborly relations, which aligns with her balanced
    curiosity and pragmatic outlook. While primarily attending a predominantly white public school, she is exposed to regional traditions like high school football games, the Huntington County fair, and
    church‑based community events.
