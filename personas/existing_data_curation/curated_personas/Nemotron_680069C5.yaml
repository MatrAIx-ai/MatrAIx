  career_goals: Sandra aims to transition from frontline support to a supervisory and training role where she can shape the customer experience culture. She plans to become a Customer Experience Trainer,
    designing mentorship programs that emphasize emotional well‑being, stress‑aware communication, and inclusive service practices. In the medium term, she hopes to author a guidebook on mindful customer
    service and to consult for organizations seeking to improve frontline empathy. Long‑term, Sandra envisions leveraging her organizational strengths and love of the arts to move into arts administration
    at a community museum or library, merging her professional expertise with her personal passion for abstract art and cultural education.
