personas:
  professional: Sierra Johnson is a full‑stack developer with eight years of experience in Python, JavaScript, and cloud platforms, and they blend pragmatic engineering with a curiosity for emerging tech,
    championing inclusive agile teams while often juggling loose schedules and delighting in teaching junior coders through community meetups.
  sports: Sierra Johnson plays pick‑up basketball at the neighborhood park three evenings a week, follows the Atlanta Hawks and Atlanta Falcons, and they mix cardio circuits with weekend jogs, favoring
    social workouts over solitary gym sessions.
  arts: Sierra Johnson immerses in music from gospel legends like Kirk Franklin to hip‑hop artists such as Kendrick Lamar, attends local jazz nights featuring tribute bands, and they draw inspiration from
    speculative fiction authors N.K. Jemisin and Octavia Butler while also recreating soul‑laden melodies on a vintage keyboard during church storytelling circles.
  travel: Sierra Johnson prefers road‑trip itineraries that combine cultural immersion and relaxation, revisiting New Orleans for its jazz festivals, exploring Charleston’s historic food scene, and dreaming
    of a heritage tour in Ghana, and they fit travel around remote work days and family gatherings.
  culinary: Sierra Johnson experiments with Southern comfort dishes like shrimp and grits infused with smoky paprika and collard greens seasoned with African‑inspired berbere, frequently preparing gumbo
    with okra and sweet potatoes for brunch potlucks, and they showcase a moderate cooking skill that balances tradition with creative twists.
  core: Sierra Johnson blends pragmatic tech expertise with Southern communal spirit, juggling flexible schedules, community mentoring, and a love for music and cooking, and they occasionally let organization
    slip in favor of spontaneity.
background:
  cultural: Sierra grew up in a close‑knit African‑American family in the South, where church gatherings, music, and communal meals were central to daily life. The rich traditions of Savannah’s historic
    Black community—its storytelling, gospel and jazz heritage, and emphasis on mutual support—shaped her values of collaboration and resilience. She remains connected to these roots through involvement
    in local Black professional networks, celebrating Juneteenth with her family, and incorporating Southern soul food recipes into her cooking. Her cultural identity fuels her commitment to mentoring underrepresented
    youth in tech and advocating for inclusive workplace practices, reflecting both the strength and creativity of her community.
