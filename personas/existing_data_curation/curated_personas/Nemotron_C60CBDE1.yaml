  career_goals: Sierra aims to transition into a tech‑lead or engineering‑manager role within the next five years, focusing on building inclusive, high‑performing teams. She aspires to spearhead initiatives
    that increase representation of underrepresented groups in technology, mentor aspiring coders from the local African‑American community, and eventually launch a SaaS product that leverages AI to streamline
    small‑business operations. Balancing her desire for flexibility, she seeks a remote‑first work arrangement that allows more time for family and community engagement, while continuing to nurture her
    curiosity through hands‑on experimentation with new tools and frameworks.
