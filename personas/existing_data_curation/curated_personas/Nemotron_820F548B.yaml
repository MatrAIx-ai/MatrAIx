  career_goals: Donna aims to advance into a supervisory role within the transportation security field, such as Shift Supervisor or Regional Security Manager, where she can shape policy implementation and
    mentor junior staff. She plans to obtain a Certified Transportation Security Professional (CTSP) certification and possibly pursue a master’s degree in Public Administration or Security Management to
    broaden her leadership capabilities. In the longer term, she envisions leveraging her education background to develop community outreach programs that teach safety awareness to local schools and adult
    learners, blending her commitment to structure with a desire to give back to her community.
