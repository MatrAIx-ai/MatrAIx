persona_description: A historian who specializes in the study of African-American history, particularly the experiences and contributions of the Montford Point Marines. He has written a book about their
  history and is a professor of American history at the University of North Carolina, Wilmington. His research interests include the integration of African Americans into the military and the role of the
  Montford Point Marines in shaping military history.
