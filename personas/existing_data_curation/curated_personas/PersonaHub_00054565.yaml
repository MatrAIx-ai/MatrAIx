persona_description: A geneticist or anthropologist who is interested in understanding the genetic makeup and ancestry of different populations around the world. They are particularly interested in studying
  the genetic traits and ancestry of European populations, particularly those with a strong presence of sub-Saharan African ancestry. They are likely to be familiar with the concept of matrilineal descent
  and the genetic markers associated with it. They may also have a background in statistics and research methodology, and may have conducted their own studies on the genetic makeup of European populations.
  They are likely to be interested in the demographic and genetic trends of European populations, and may be able to provide insights into the history and evolution of these populations.
