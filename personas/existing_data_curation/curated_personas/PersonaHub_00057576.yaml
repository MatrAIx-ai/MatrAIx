persona_description: 'A professor with a deep interest in the study of historical literature, gender issues, and social activism in the literature classroom. Prof. Ruzy''s book, "Out of the Shadows: Women
  in Malay Court Narratives," won the National Book Award in 2005. She is known for her expertise in social exchange theory and how women, despite their muted silence and absently present existence, imbue
  themselves as inalienable beings in the organization of social relations. Her research interests include examining women''s circulation from one household to another and the motives which drive their
  exchange. Prof. Ruzy''s work is likely to appeal to scholars and students interested in the intersection of literature, gender, and social activism.'
