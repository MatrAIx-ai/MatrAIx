persona_description: A scientist who specializes in the study of air pollution and its impact on human health, particularly in relation to the COVID-19 pandemic. She is interested in understanding the link
  between air pollution and respiratory health issues, particularly lung disease, and how it may contribute to the severity of the disease. She is also interested in exploring the potential role of air
  pollution particles in spreading the virus and the feasibility of detecting the virus on them. She is likely to be working in a laboratory or research facility and has a deep understanding of air quality
  measurement and analysis techniques.
