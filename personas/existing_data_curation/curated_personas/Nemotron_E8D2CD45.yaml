  career_goals: Although retired, Samantha continues to set purposeful ambitions. She aims to create a series of abstract paintings titled "Seasons of Memory" that explore loss and renewal, to organize
    an annual community art showcase that highlights senior artists in Modesto, and to publish a collection of essays on the intersection of art, aging, and personal growth. She plans to complete a certification
    in art therapy so she can volunteer as an art therapist at a local senior center, and she hopes to travel to European art capitals—Paris, Florence, and Vienna—to study Renaissance and modern masterpieces
    firsthand. Additionally, Samantha wishes to mentor an emerging young artist from her community, providing guidance on portfolio development and exhibition planning.
