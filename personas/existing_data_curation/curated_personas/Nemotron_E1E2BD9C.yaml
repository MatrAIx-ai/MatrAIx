personas:
  professional: Thomas Joachim, a 69‑year‑old commercial sanitation veteran, translates his methodical, OSHA‑savvy expertise and love of detail into crisp facility inspections, eco‑friendly cleaning protocols,
    and reliable mentorship for small‑business owners, all while quietly worrying about every checklist item.
  sports: Thomas Joachim stays active by strolling the coastal marshes at sunrise, attending Myrtle Beach Pelicans baseball games in summer, cheering for the South Carolina Gamecocks during college football
    season, and participating in a low‑impact senior walking club, though they admit to skipping strength‑training exercises due to a lingering knee ache.
  arts: Thomas Joachim spends afternoons sketching Lowcountry marshes, attending gallery openings in Myrtle Beach, listening to Miles Davis and John Coltrane on vinyl, and quoting Edward Hopper while mixing
    colors, a ritual that fuels both their painting practice and calm demeanor, even if they sometimes let unfinished canvases pile up.
  travel: Thomas Joachim prefers short coastal road trips to historic towns like Charleston and Savannah, enjoys yearly cruises to the Bahamas with the senior‑friendly line, and dreams of a leisurely train
    journey through the Scottish Highlands, planning each itinerary meticulously while balancing a modest travel budget.
  culinary: Thomas Joachim delights in cooking classic Southern fare—shrimp and grits with a dash of cayenne, collard greens simmered with smoked ham hocks, and pecan pie—while sipping sweet tea and tuning
    into a Miles Davis record, their kitchen a canvas where seasoning is as precise as a cleaning checklist, though they sometimes over‑salt the gravy when distracted.
  core: Thomas Joachim blends meticulous sanitation expertise with a restless creative streak, balancing disciplined routines with spontaneous sketching, a worry‑prone mind, and a habit of leaving half‑finished
    art projects scattered across the living room.
background:
  cultural: Thomas grew up in a modest, white Southern family in the Lowcountry of South Carolina, with roots tracing back to German immigrants who settled the region in the early 1900s. The cultural fabric
    of Conway and Horry County—marked by Southern hospitality, church community, Gullah culinary influences, and a deep respect for local history—shapes his values of modesty, cooperation, and service.
    His upbringing instilled a love for traditional Southern cuisine, a reverence for the outdoors, and an appreciation for the region’s artistic and historical traditions.
