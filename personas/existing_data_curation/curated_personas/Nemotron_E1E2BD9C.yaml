  career_goals: Looking ahead, Thomas hopes to shift from full-time custodial work to a part-time consultant role, sharing his efficient cleaning protocols with small businesses and training newcomers.
    He also dreams of launching a modest, community-focused cleaning service that emphasizes sustainable practices, while dedicating more time to volunteering at the local senior center and attending art
    workshops.
