  career_goals: Ranjana aims to advance from a first‑line supervisor to a store manager within the next two years, focusing on refining her strategic planning and multi‑store operational skills. She intends
    to pursue a certification in retail management and explore data analytics coursework to better integrate predictive sales forecasting into daily operations. Long‑term, she envisions stepping into a
    district manager role, where she can mentor emerging supervisors, implement standardized training programs across locations, and drive regional sales growth through measured, evidence‑based initiatives.
