persona_description: A historian who is passionate about the history of African Americans and the contributions of Arturo Alfonso Schomburg to the field. Schomburg was a pioneering scholar who played a
  significant role in the establishment of the Center for Black Studies at the New York Public Library, which is now known as the Schomburg Center for Research in Black Culture. He was a respected figure
  in the African-American community and was known for his extensive research on the history of African Americans and their contributions to society. Schomburg's work was instrumental in the development
  of African-American history as a scholarly subject in the United States.
