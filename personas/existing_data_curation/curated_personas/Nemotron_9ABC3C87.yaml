  career_goals: Although retired from formal employment, Sheila aims to deepen her impact in the Bridgewater community by volunteering as a coordinator for the local senior‑center activity program and mentoring
    younger volunteers. She plans to document her family’s genealogy and compile a memoir that captures the social history of her neighborhood. She also hopes to learn digital photography to preserve her
    garden and travel experiences, and to explore the possibility of selling homemade preserves at the farmer’s market, combining her culinary skill with a modest entrepreneurial venture. Maintaining health,
    financial security, and a legacy of community service are central to her long‑term aspirations.
