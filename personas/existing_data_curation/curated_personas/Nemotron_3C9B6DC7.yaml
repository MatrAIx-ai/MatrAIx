personas:
  professional: Maria Howard, a veteran special education teacher in Brown County, leverages meticulously crafted IEPs and on‑the‑fly lesson tweaks to champion inclusive practices while eyeing a district
    Special Education Coordinator role, channeling their competitive edge and healthy skepticism into policy leadership.
  sports: Maria Howard stays active through weekly Badlands hikes with the local Hiking Club, cheers fervently for the nearby Brown County Bears high school football team and follows the Denver Broncos,
    while also participating in community center dance classes that blend cardio with social fun.
  arts: Maria Howard delights in starring in community theater productions, often performing works by Neil Simon and Margaret Atwood, leads a book club that devours the latest mystery novels, and listens
    to classic Broadway recordings by Julie Andrews and contemporary folk artist Brandi Carlile.
  travel: Maria Howard prefers semi‑planned road trips that blend scenic drives through South Dakota’s Badlands and Black Hills with spontaneous detours to local festivals, has already visited Montreal
    and the historic vineyards of Tuscany, and dreams of a relaxed cruise to Alaska’s glacier coast while balancing their retirement savings.
  culinary: Maria Howard, an avid home cook, specializes in garden‑fresh meals such as roasted beet and goat cheese salad, slow‑cooked beef pot roast with rosemary, and homemade sourdough bread, often seasoning
    with fresh basil, thyme, and a dash of smoked paprika, while enjoying occasional indulgences at the senior center’s potluck featuring chili.
  core: Maria Howard blends structured special‑education expertise with a love for community theater, garden‑fresh cooking, and competitive bridge, navigating retirement with a pragmatic yet spontaneous
    flair, a skeptical eye toward advice, and a penchant for occasional disorganization.
background:
  cultural: Maria comes from a Midwestern white family with deep German and Norwegian roots that settled the plains of South Dakota generations ago. Raised in a close‑knit rural community, she internalized
    values of hard work, practicality, and self‑reliance. Her upbringing in a Lutheran church reinforced a strong sense of community service, modesty, and seasonal local traditions. These cultural influences
    shape her sociable, outgoing demeanor and her dedication to creating inclusive, supportive environments for all students.
attributes:
  skills: '[''Special Education Curriculum Development'', ''Individualized Education Program (IEP) Planning'', ''Behavioral Intervention Strategies'', ''Classroom Management'', ''Collaborative Teaching'',
    ''Parent-Teacher Communication'', ''Adaptive Technology Integration'', ''Group Activity Facilitation'', ''Conflict Mediation'', ''Improvisational Lesson Adaptation'']'
  hobbies: '[''Community Theater'', ''Book Club'', ''Bridge'', ''Trivia Nights'', ''Vegetable Gardening'', ''Badlands Hiking'', ''High School Football Games'', ''Special Needs Advocacy Volunteering'', ''Cooking'',
    ''Dance Classes'']'
  career_goals: Maria aims to move into a district‑wide leadership role, such as Special Education Coordinator, where she can shape inclusive policies and mentor new teachers. She plans to earn an advanced
    certification in autism spectrum disorders to deepen her expertise. Over the next few years, she hopes to secure grant funding for a flexible after‑school support program that serves students across
    Brown County, leveraging her competitive drive to bring recognition to innovative rural special education practices. In retirement, she envisions continuing as a part‑time consultant and trainer, sharing
    her practical, adaptable methods with schools throughout South Dakota.
