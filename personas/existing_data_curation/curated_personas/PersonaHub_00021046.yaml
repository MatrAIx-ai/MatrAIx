persona_description: A researcher and policy analyst who specializes in the study of natural resources, disasters, and the environment, focusing on the dynamics of contestations, competition, and conflicts
  over natural resources and the environment, as well as the impacts of disasters on people's livelihoods and household organization. They are interested in the role of collective actors in managing natural
  resources and securing sustainability, and in the relationships between people, technologies, and natural resources in complex sociotechnical processes and socio-ecological change. Their research interests
  include the redefinition of the state, conflict resolution and reconciliation, the emergence of new forms of politics, rights and entitlements, and the value systems of non-governmental movements and
  their impact on environmental justice, nature protection, and sustainability.
