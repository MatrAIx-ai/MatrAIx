personas:
  professional: Marleny Gomez, a retired school bus driver from Grant County, combines their lifelong curiosity about emerging safety technologies with a pragmatic, bilingual approach to route planning
    and vehicle upkeep, using spontaneous problem‑solving to keep rural students safe while mentoring younger drivers in both Spanish and English.
  sports: Marleny Gomez enjoys leisurely walks with the Hanover Senior Strollers, occasionally joins a gentle yoga class at the community center, and stays emotionally invested in the New Mexico State Aggies
    men's basketball team, cheering from their living room armchair during every home game.
  arts: Marleny Gomez spends afternoons crocheting vibrant blankets from ancestral patterns while listening to the timeless ballads of Juan Gabriel and the gentle piano works of Debussy, and delights in
    attending the annual Feria de las Artes in Santa Fe where they admire the desert landscapes painted by Georgia O'Keeffe.
  travel: Marleny Gomez prefers spontaneous, low-cost road trips, having explored nearby Santa Fe and Albuquerque, taken a memorable drive to the Grand Canyon, and occasionally visited family in Tucson
    and Mexico City, always letting curiosity guide their itinerary rather than rigid planning.
  culinary: Marleny Gomez loves preparing traditional dishes such as tamales, pozole, sopes, and mole, seasoning them with fresh cilantro, roasted chilies, and epazote from their garden, and while their
    cooking skill is modest, they take great pride in each flavorful bite shared at family gatherings.
  core: Marleny Gomez is a curious, pragmatic elder who balances spontaneous generosity with occasional forgetfulness, cherishing community traditions while still occasionally misplacing their glasses on
    the garden path.
background:
  cultural: Marleny's cultural identity is rooted in her Mexican heritage and decades of life in northern New Mexico. Raised in a bilingual household, she grew up speaking Spanish at home while learning
    English at school, which fostered a deep respect for both languages. Catholic traditions, such as celebrating Día de los Muertos and attending Mass, have been central to her family life, as have communal
    gatherings like quinceañeras and extended family meals featuring mole, enchiladas, and corn-based dishes. Living in Hanover, NM, she embraces the blend of Mexican and Southwestern customs, participating
    in local fiestas, supporting the town's modest agricultural community, and preserving stories of migration and settlement that connect her family's past to the present.
