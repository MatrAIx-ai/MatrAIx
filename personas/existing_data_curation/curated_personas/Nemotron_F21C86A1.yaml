  hobbies: '[''Gardening (native desert plants)'', ''Crocheting and textile arts'', ''Cooking traditional Mexican cuisine'', ''Reading regional history'', ''Attending church services'', ''Participating
    in community festivals (e.g., Día de los Muertos)'', ''Short walks around the town'', ''Storytelling and sharing family memories'']'
  career_goals: Although retired, Marleny is dedicated to leaving a lasting legacy. She aims to document her decades of experience in a memoir that highlights the evolution of school transportation in rural
    New Mexico. She also seeks to create a small mentorship program for volunteer drivers, emphasizing safety, cultural sensitivity, and community service. Additionally, she hopes to work with local schools
    to develop bilingual safety workshops for students and parents, ensuring that future generations benefit from her practical expertise and curiosity about emerging safety technologies.
