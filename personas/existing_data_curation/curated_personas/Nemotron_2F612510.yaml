    ''Conflict Resolution'', ''Mentoring and Coaching'']'
  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries and Museums'', ''Reading Contemporary Non‑Fiction'', ''Book Club Participation'', ''Yoga and Mindfulness Meditation'', ''Hiking in Hillsborough
    County Parks'', ''Kayaking in Tampa Bay'', ''Volunteering at Community Health Fairs'', ''Mentoring College Students'', ''Cooking Mediterranean‑Inspired Dishes'', ''Traveling to Explore New Cultures'']'
  career_goals: Andrea aspires to ascend to a senior executive role—such as Chief Operating Officer or Vice President of Operations—within a regional health system, where she can shape integrated care models
    that blend clinical excellence with holistic wellness initiatives like art therapy. She aims to lead the digital transformation of healthcare delivery, expanding telehealth services and leveraging AI
    for predictive analytics to improve patient outcomes. Andrea is committed to advancing health equity, planning to serve on advisory boards that influence policy and to create mentorship programs that
    empower women and underrepresented professionals in healthcare leadership. To support these ambitions, she intends to pursue specialized executive education in Healthcare Innovation and to author thought
    pieces on compassionate management practices.
