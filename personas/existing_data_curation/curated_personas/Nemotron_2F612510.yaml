personas:
  professional: Andrea Freeman is a senior health services manager in Tampa who leverages a decade of operational expertise, Lean Six Sigma process optimization, and data‑driven decision making, while their
    curiosity and cooperative spirit make them a champion of interdisciplinary teamwork and compassionate change management.
  sports: Andrea Freeman hits the Hillsborough County trails for weekend hikes, rows with the Tampa Bay Rowing Club during spring, and roots for the Tampa Bay Lightning and the Tampa Bay Buccaneers, while
    maintaining a balanced fitness routine that blends yoga sessions with high‑intensity interval training on Tuesday and Thursday evenings.
  arts: Andrea Freeman immerses themselves in Tampa’s art scene by attending monthly gallery openings at the Tampa Museum of Art, studying watercolor techniques inspired by Georgia O’Keeffe, and drawing
    creative inspiration from the music of Esperanza Spalding and the theater work of Lin‑Manuel Miranda.
  travel: Andrea Freeman prefers purposeful travel that mixes cultural immersion and wellness, having recently trekked the historic streets of Cartagena, Colombia, and planning a future solo retreat to
    Kyoto’s tea gardens, while they balance flights with a strict 24‑hour work‑email blackout.
  culinary: Andrea Freeman enjoys crafting Mediterranean‑inspired dishes such as grilled branzino with lemon‑oregano vinaigrette, chickpea falafel wraps, and saffron risotto, demonstrating a competent home‑cook
    level that often experiments with fresh herbs, extra‑virgin olive oil, and a pinch of smoked paprika to elevate simple meals.
  core: Andrea Freeman blends analytical rigor with artistic curiosity, juggling executive ambitions, a passion for watercolor, and a habit of checking work email at midnight, all while they champion health
    equity in their community.
background:
  cultural: Andrea grew up in a middle‑class suburban neighborhood of Central Florida, where her family emphasized education, community service, and modest Southern hospitality. As a white American, she
    acknowledges her cultural privilege while actively engaging with the multicultural tapestry of Tampa—embracing diverse culinary traditions, celebrating local festivals, and fostering inclusive workplace
    practices. Her upbringing in a region marked by a blend of Southern, Caribbean, and Latin influences has shaped a worldview that values both individual initiative and collective harmony. This background
    informs her commitment to equity in healthcare and her ability to navigate the varied cultural dynamics of the patients and staff she serves.
