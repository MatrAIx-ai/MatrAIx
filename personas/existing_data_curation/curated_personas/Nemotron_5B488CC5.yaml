personas:
  professional: Samuel Caldwell, a 31‑year‑old aspiring contractor, balances a curiosity for new renovation methods with practical carpentry, plumbing, and DIY expertise, leveraging his business‑administration
    background and spreadsheet‑driven organization to launch a community‑focused handyman service that partners with historic preservation groups, while staying flexible enough to adapt to on‑site surprises
    and assertively lead small volunteer crews, and they pride themselves on delivering reliable, detail‑oriented work.
  sports: Samuel Caldwell enjoys weekend fishing on the bayou, avidly follows the New Orleans Saints and Pelicans, and plays in a local recreational basketball league at the community center, balancing
    low‑key outdoor sport with occasional team competition while they stay fit.
  arts: Samuel Caldwell is an avid jazz aficionado who regularly listens to Miles Davis, Wynton Marsalis, and the Preservation Hall Jazz Band, frequents the House of Blues on Saturday nights, and occasionally
    picks up a harmonica to explore improvisation, letting the genre’s spontaneity shape their creative outlook and conversations.
  travel: Samuel Caldwell prefers budget‑friendly road trips meticulously planned in spreadsheets, having already explored Gulf Coast cities such as New Orleans, Lafayette, and Galveston, while dreaming
    of a historic walk through Savannah and an adventurous safari in South Africa, balancing practical travel budgeting with far‑reaching wanderlust.
  culinary: Samuel Caldwell enjoys cooking Creole and Cajun classics like gumbo with Andouille sausage, jambalaya with shrimp, and crawfish étouffée, mastering the timing of the holy trinity of onions,
    bell peppers, and celery, and while they sometimes overspice a dish, they temper the heat with a splash of cold beer and a dash of fresh lemon.
  core: Samuel Caldwell, a 31‑year‑old handyman‑in‑training with a love for jazz, bayou fishing, and historic preservation, balances practical curiosity with occasional impulsive splurges and a relaxed
    yet organized approach to life.
background:
  cultural: Samuel comes from a white Southern family with deep roots in Louisiana, tracing ancestry back to Irish and French‑Canadian immigrants who settled in New Orleans during the 19th century. Growing
    up in the diverse cultural tapestry of the French Quarter, he absorbed the city's traditions of Mardi Gras, jazz, and Creole cuisine. While his family maintains a modest Catholic heritage, his cultural
    identity is shaped by a strong sense of Southern hospitality, community resilience, and a respect for the unique blend of European, African, and Caribbean influences that define New Orleans.
attributes:
  skills: '[''Carpentry'', ''Basic plumbing'', ''DIY home renovation'', ''Project coordination'', ''Spreadsheet management'', ''Social‑media scheduling'', ''Simple graphic design'', ''Customer service'',
