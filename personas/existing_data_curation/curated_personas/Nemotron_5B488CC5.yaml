  hobbies: '[''Fishing on the bayou'', ''Cooking Creole and Cajun cuisine'', ''Woodworking'', ''Attending live jazz performances'', ''Volunteer community clean‑ups'', ''Exploring historic house tours'',
    ''Reading Gulf Coast history'', ''Playing strategy board games'']'
  career_goals: Samuel aims to translate his practical skill set into a stable, community‑oriented livelihood. Over the next three to five years he plans to complete his college degree in business administration,
    obtain a contractor’s license, and launch a small‑scale handyman and home‑improvement service that partners with local historic preservation groups. He also aspires to mentor younger apprentices, expand
    his digital marketing knowledge to attract clientele, and eventually open a modest co‑working space that doubles as a workshop for neighborhood DIY projects.
