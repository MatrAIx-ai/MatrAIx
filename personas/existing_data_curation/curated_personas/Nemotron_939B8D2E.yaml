  hobbies: '["Watercolor painting", "DIY home improvement projects", "Hiking and nature walks", "Visiting local art galleries and fairs", "Cooking experimental recipes", "Listening to tech and science podcasts",
    "Community garden volunteering", "Attending community theater", "Woodworking small crafts", "Playing ukulele"]'
  career_goals: Lauren aims to become a senior maintenance technician and eventually transition into a supervisory role where she can lead a small team, mentor newer workers, and shape maintenance strategies.
    She plans to earn certifications such as EPA 608 for HVAC and a journeyman electrician license, and to complete a green‑building (LEED) training to champion energy‑efficiency projects in her community.
    Long‑term, she envisions launching a side business offering bespoke home‑repair services that blend functional fixes with aesthetic touches inspired by her love of art. She also hopes to organize local
    workshops that teach DIY repairs and creative upcycling.
