personas:
  professional: Lauren Cunningham is a seasoned maintenance technician in Michigan who leverages her HVAC, electrical, and plumbing expertise, along with a spontaneous problem‑solving style, to keep facilities
    running while sprinkling aesthetic upgrades inspired by her watercolor hobby.
  sports: Lauren Cunningham hikes the dunes of Sleeping Bear each weekend, joins a local adult softball league in summer, and roots for the Detroit Tigers, Detroit Lions, and Michigan Wolverines, blending
    her love for outdoor endurance with community team spirit.
  arts: Lauren Cunningham paints serene Lake Michigan watercolors inspired by Monet and O'Keeffe, frequents the Ann Arbor Art Fair and Detroit Institute of Arts, strums a ukulele to Bob Marley tunes at
    informal gatherings, and curates a growing collection of contemporary watercolor prints by Yao Cheng.
  travel: Lauren Cunningham enjoys spontaneous road trips to Mackinac Island, Door County, and the Upper Peninsula, plans occasional weekend getaways to Portland for its eco‑friendly vibe, and dreams of
    a summer sailing tour of the Greek islands, balancing tight budgets with a love for lakeside and coastal scenery.
  culinary: Lauren Cunningham cooks with a focus on fresh, seasonal Midwestern ingredients—grilling whitefish with lemon‑dill sauce, baking Michigan cherry pie, whipping up sourdough starter, and experimenting
    with a weekly garden‑harvested herb pesto—while her skill level hovers between confident home chef and eager experimenter.
  core: Lauren Cunningham is a pragmatic fixer‑upper who blends technical know‑how with artistic flair, often improvises solutions on the fly, and occasionally lets her spontaneous side derail deadlines
    and budgeting plans.
background:
  cultural: Lauren grew up in a middle‑class Midwestern family in Michigan, steeped in the region’s values of hard work, self‑reliance, and community involvement. Her cultural upbringing reflects the heritage
    of the Great Lakes industrial corridor, with influences from local folk art, county fairs, and a blend of Protestant and secular traditions. She cherishes the pragmatic, friendly spirit of small‑town
    life, while also embracing the openness to new ideas that characterizes contemporary Midwestern culture. Her background informs her collaborative nature, her respect for everyday craftsmanship, and
    her appreciation for the arts and nature that surround her.
attributes:
  skills: '["HVAC troubleshooting", "Electrical wiring repair", "Plumbing maintenance", "Preventive maintenance planning", "Hand and power tool operation", "Blueprint interpretation", "Safety compliance
