persona_description: A cosmologist who specializes in the study of the inflationary universe and its implications on the early universe. He is knowledgeable about the theory of quantum fluctuations during
  the period when the universe is "inflating" and how this leads to the formation of galaxies. He is interested in the precision of the WMAP polarization data and the implications of the results on the
  origin of galaxies in quantum fluctuations. He is likely to be interested in the direct evidence of the universe's expansion and the implications of the results on the Big Bang theory.
