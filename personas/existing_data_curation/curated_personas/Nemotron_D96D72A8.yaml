    and mentorship'', ''Grilling and craft beer tasting'', ''Attending Carolina Panthers games'']'
  career_goals: Corey aims to achieve senior engineering leadership within the next five years, targeting a role as a Lead Mechanical Engineer or Engineering Manager at a technology‑driven firm in the Charlotte
    area. He plans to obtain his Professional Engineer (PE) license, pursue an MBA focused on operations and innovation, and lead projects that advance sustainable product design, particularly in the renewable
    energy and electric vehicle sectors. Additionally, he aspires to contribute to the local engineering community by establishing a mentorship program for aspiring STEM students and speaking at regional
    conferences.
