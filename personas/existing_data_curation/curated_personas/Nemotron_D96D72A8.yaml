personas:
  professional: Corey Poates, a 35‑year‑old mechanical engineer in Charlotte, blends rigorous product‑development expertise in SolidWorks, ANSYS, and embedded C with a family‑centered work ethic and a curiosity
    for sustainable design, driving cross‑functional teams toward agile, ISO‑compliant launches while eyeing a future engineering‑manager role and a PE license.
  sports: Corey Poates, an avid cyclist and hiker, rides with the local Blue Ridge Cyclists club, hikes the Linville Gorge on weekends, supports the Carolina Panthers, and maintains a disciplined cardio
    routine while occasionally skipping gym sessions when a new woodworking project consumes his evenings.
  arts: Corey Poates channels his creative side through woodworking and landscape photography, drawing inspiration from Ansel Adams, listening to the Zac Brown Band while grilling, and enjoys board games
    like Terraforming Mars, which satisfy his strategic mind.
  travel: Corey Poates plans weekend road trips to the Blue Ridge foothills, has explored Asheville’s craft‑brew scene, dreams of cycling the canals of Copenhagen, and prefers careful itineraries that balance
    adventure with a modest budget, yet always leaves room for an unplanned stop at a local farmers’ market.
  culinary: Corey Poates is a backyard grill master who savors smoked brisket with a coffee‑rub, pairs it with Sycamore Brewing’s IPA, occasionally experiments with cedar‑plank salmon, and—though an enthusiastic
    home chef—often forgets to turn the meat until it’s nearly charred.
  core: Corey Poates is a disciplined engineer who merges a family‑focused hospitality with a curiosity‑driven maker spirit, balancing methodical career ambitions with weekend bike rides, woodworking, and
    a penchant for perfectly charred ribs.
background:
  cultural: Corey grew up in a middle‑class family in the outskirts of Charlotte, where Southern hospitality and a strong work ethic were core values. His upbringing combined the traditional community focus
    of the American South with exposure to the rapid tech and financial growth of the Charlotte metropolitan area. He is influenced by the region’s emphasis on family, community service, and a love of outdoor
    recreation, as well as the growing emphasis on innovation from nearby research hubs like the Research Triangle. This blend of Southern cultural heritage and modern engineering culture informs his pragmatic
    yet curious outlook.
