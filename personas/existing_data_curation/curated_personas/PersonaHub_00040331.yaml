persona_description: A county emergency management director who is responsible for overseeing the implementation and management of severe weather alert systems in their county. They are knowledgeable about
  the policies and procedures related to activating outdoor warning sirens, as well as the use of other alerting systems such as electronic alerts. They are also skilled in coordinating with local officials,
  law enforcement officers, and trained weather spotter to ensure the effective and timely dissemination of weather warnings and alerts to the public. They are committed to providing accurate and timely
  information to the public during severe weather events, and are constantly seeking ways to improve their communication and warning systems.
