  career_goals: Morris aims to advance within the United States Postal Service by moving into a supervisory or shift‑lead role, where he can apply his practical experience to improve route efficiency and
    mentor newer carriers. He plans to earn a logistics or supply‑chain certification to broaden his qualifications and open opportunities for a future transition into a logistics coordinator position within
    a regional distribution center. In the longer term, he envisions launching a small, locally‑focused delivery service that leverages his deep knowledge of Georgetown and the surrounding Hill Country,
    providing flexible, community‑oriented shipping options. These goals are driven by his desire for greater financial stability, a more predictable schedule that reduces stress, and the ability to support
    his growing family.
