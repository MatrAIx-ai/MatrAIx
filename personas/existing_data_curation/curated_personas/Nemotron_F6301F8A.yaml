personas:
  professional: Nia Tinson, a 16-year-old aspiring visual artist and budding digital media creator, they blend their curiosity and organized, flexible workflow with strong interpersonal empathy to design
    collaborative murals, craft digital illustrations using Procreate and Photoshop, and build a personal portfolio site via HTML/CSS, all while confidently presenting ideas and supporting peers in art-focused
    community initiatives.
  sports: Nia Tinson enjoys playing pickup basketball at the Worcester Community Center, follows the Boston Celtics and Boston Red Sox with fervor, and stays active by joining their high school's fall intramural
    volleyball league, they approach fitness as a social, energetic outlet that balances competition with camaraderie.
  arts: Nia Tinson immerses themselves in sketching, digital painting, and street photography, draws creative fuel from visits to the Worcester Art Museum and the vibrant works of artists like Frida Kahlo,
    Banksy, and Yayoi Kusama, and sets a jazzy backdrop with Miles Davis, lyrical flow from Kendrick Lamar, and soulful tones of Erykah Badu while they create, shaping their identity as a multidisciplinary
    storyteller.
  travel: Nia Tinson favors spontaneous, low-cost weekend trips with friends, often exploring Boston's art districts and the scenic Cape Cod shoreline, while dreaming of a summer backpacking adventure across
    Paris and London to study historic museums and vibrant street art, all balanced against a tight student budget and parental guidance, and they always pack a sketchbook for spontaneous inspiration.
  culinary: Nia Tinson enjoys crafting quick, colorful meals like avocado toast topped with cherry tomatoes and feta, perfecting a homemade ramen broth, and snacking on fresh mango slices, while frequently
    refueling after art sessions at local coffee shops that serve oat-milk lattes and cinnamon-spiced muffins, and they often experiment by adding a pinch of smoked paprika to their dishes for extra flair.
  core: Nia Tinson channels boundless curiosity and empathetic energy into daily sketches and community art projects, yet often battles late-night worry-driven scrolling and a habit of over-packing their
    school backpack with supplies, because they constantly prepare for any creative opportunity.
background:
  cultural: Nia was raised in a Black family that weaves together the traditions of the African diaspora. Her mother’s parents emigrated from Jamaica, while her paternal grandparents grew up in Ghana before
    settling in the United States. Family gatherings are filled with storytelling, gospel and reggae music, and a reverence for the artistic achievements of Black ancestors. Growing up in Shrewsbury, Massachusetts,
    she attends a public middle school with a diverse student body, where she participates in Black History Month presentations, Juneteenth celebrations, and community service at a local historically Black
    church. These experiences instill in her a strong sense of cultural pride, an appreciation for collective resilience, and a desire to honor her heritage through creative expression and community advocacy.
