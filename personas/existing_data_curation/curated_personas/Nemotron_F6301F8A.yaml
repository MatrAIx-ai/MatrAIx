  career_goals: Nia dreams of turning her love for art and her compassion for others into a career that heals and uplifts her community. She plans to earn a scholarship to a college with a strong visual‑arts
    program, major in Fine Arts or Graphic Design, and supplement it with a minor in Psychology or Social Work. Her long‑term ambition is to become an art therapist or community arts coordinator, creating
    workshops and mentorship programs for youth in Worcester County that blend creative expression with mental‑health support. She also hopes to build a freelance portfolio as a multimedia artist, using
    digital illustration and photography to amplify stories of Black culture, social justice, and personal resilience. Along the way, she wants to develop leadership experience by founding a student‑run
    art‑and‑wellness club at her high school.
