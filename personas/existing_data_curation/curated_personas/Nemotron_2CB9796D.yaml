personas:
  professional: A budding teenage robotics enthusiast, Devin Dumas channels the strategic thinking he hones in Minecraft and Civilization into designing and programming competition‑ready robots, demonstrating
    meticulous problem‑solving, reliable collaboration, and a cautious, detail‑oriented mindset that balances curiosity with practicality.
  sports: A weekend angler and avid youth soccer player, Devin Dumas spends summer days fishing on Prior Lake, follows the Minnesota Twins and Vikings with family enthusiasm at Fourth‑of‑July barbecues,
    and trains with the local ice‑hockey club during winter, balancing active recreation with a love of the outdoors.
  arts: An emerging lo‑fi beat maker and sketch artist, Devin Dumas crafts mellow tracks inspired by Nujabes and Jinsang while doodling futuristic cityscapes after devouring sci‑fi novels from authors such
    as Liu Cixin and Isaac Asimov, weaving creative outlets into their daily routine.
  travel: A budget‑conscious explorer, Devin Dumas favors day trips to Minnesota’s Itasca State Park and occasional family road‑ventures to Chicago’s Museum of Science and Industry, yet they dream of a
    future summer exchange in Tokyo to experience the city’s robotics labs and anime culture.
  culinary: A modest home‑cook with a flair for lakeside grilling, Devin Dumas frequently prepares cedar‑plank trout seasoned with lemon and dill, hearty baked mac and cheese loaded with sharp cheddar and
    crisp bacon, and classic Midwestern potluck dishes like corn on the cob and deviled eggs, while occasionally experimenting with simple sushi rolls for friends.
  core: Devin Dumas is a curiosity‑driven teen who balances meticulous robot building with late‑night gaming, often over‑thinking plans yet finding solace in lo‑fi beats and lake fishing.
background:
  cultural: Devin grew up in a suburban Midwestern family in Prior Lake, Minnesota. His household reflects typical Midwestern values of community, modesty, and self‑reliance, with an emphasis on family
    gatherings, holiday traditions like Thanksgiving and Fourth of July barbecues, and seasonal lake trips during summer. He attends a public middle school where community involvement, such as youth sports
    leagues and church youth groups, is common. The local culture encourages appreciation of the outdoors, respect for personal space, and a balanced work ethic, all of which shape Devin's outlook and everyday
    life.
