  career_goals: Devin aspires to pursue a career in a STEM field where his practical curiosity can thrive. He is drawn to mechanical engineering or robotics because they combine hands‑on problem solving
    with real‑world applications. He plans to attend a university with strong engineering programs and hopes to secure internships that give him industry experience. Long‑term, he wants to design sustainable
    technologies that improve everyday life, while also maintaining a stable, well‑paying job that lets him support his family and afford personal projects. He recognizes his tendency toward worry and aims
    to develop resilience through mentorship and continued learning.
