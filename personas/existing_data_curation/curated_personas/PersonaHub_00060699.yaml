persona_description: A microbiologist specializing in the study of bacteriology, particularly the pathogenicity and virulence of citrus huanglongbing (HLB) bacterium, 'Candidatus Liberibacter asiaticus'
  (Ca. L. asiaticus). His research interests include the molecular mechanisms involved in the pathogenicity of HLB, the genetic and molecular evolution of the bacterium, and the development of new control
  strategies for the disease. He is also interested in the identification of virulence factors and the elucidation of metabolic pathways for the bacterium. He has obtained and annotated a nearly complete
  genome of Ca. L. asiaticus using multiple displacement amplification and pyrosequencing technologies. He is currently working on the identification of conditions necessary for growth, the determination
  of virulence factors, and the development of new control strategies for HLB.
