  career_goals: Najib aims to transition from a senior adjuster role to a leadership position within the claims department, such as Claims Operations Manager or Head of Investigations. He plans to obtain
    professional certifications like the Associate in Claims (AIC) and Certified Property & Casualty Adjuster (CPCA) to solidify his expertise. Over the next five years, he envisions developing a specialized
    investigative unit that leverages advanced analytics to detect fraud and improve claim resolution speed. Additionally, Najib is interested in mentoring new adjusters, sharing his disciplined work ethic,
    and eventually consulting for risk management firms or starting his own consultancy focused on loss prevention and claims efficiency.
