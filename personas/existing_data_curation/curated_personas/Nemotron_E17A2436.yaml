personas:
  professional: Najib Ortiz, a senior claims adjuster with a reputation for meticulous loss assessments and calm negotiation, blends their curiosity for forensic details with a disciplined, organized workflow
    that drives efficient settlement outcomes while mentoring junior colleagues.
  sports: Najib Ortiz rides a road bike along Orlando’s extensive trail network each weekend, follows the Orlando City SC in MLS, supports the Tampa Bay Lightning in the NHL, and participates in a local
    cycling club that meets every Saturday for group rides, balancing solo endurance training with team camaraderie.
  arts: Najib Ortiz captures the city’s multicultural street scenes with a Leica M10, draws inspiration from photographer Sebastião Salgado and filmmaker Alfonso Cuarón, and unwinds by attending live jazz
    performances at the Blue Martini, where the improvisational style mirrors their love for structured spontaneity.
  travel: Najib Ortiz plans travel with the same precision as a claim assessment, favoring meticulously organized road trips to the Florida Keys and a yearly cultural immersion in Cartagena, Colombia, where
    they blend solitary photography walks with guided historical tours, all while keeping travel costs within a budgeted 10% of annual income.
  culinary: Najib Ortiz enjoys cooking family recipes like arroz con gandules and lechón, precisely measuring spices such as sofrito, adobo, and annatto, while experimenting with sous‑vide techniques to
    perfect the texture of pork shoulder, and they proudly host monthly dinner gatherings for friends and neighbors.
  core: Najib Ortiz is a methodical, calm problem‑solver who balances curiosity with rigid organization, turning detailed claims work, disciplined finances, and precise cooking into a life that seamlessly
    blends efficiency with compassionate community service.
background:
  cultural: Najib is a second‑generation Puerto Rican American who grew up in the vibrant Latino neighborhoods of Orlando. His parents immigrated from San Juan in the early 1990s, bringing with them a strong
    sense of family, community, and the island's musical traditions, which Najib continues to celebrate through salsa dancing and music festivals. Bilingual in English and Spanish, he often serves as a
    cultural bridge in his professional role, helping Spanish‑speaking claimants articulate their needs effectively. He actively participates in the annual Puerto Rican Day Parade in Orlando and volunteers
    during cultural events to preserve and promote Puerto Rican heritage. This blend of American upbringing and Puerto Rican roots informs his values of resilience, compassion, and a deep commitment to
    community service.
