  likely has a background in economics, psychology, and sociology, and is well-versed in the literature on entrepreneurship, management, and social entrepreneurship. He or she is likely to be a researcher
  or academic who is interested in exploring the intersection of entrepreneurship and social issues, and is seeking to understand how entrepreneurs can create positive social change.
