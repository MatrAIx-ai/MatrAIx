persona_description: A robotics enthusiast and inventor who started a company called Barobo, which creates educational robots called Linkbots. He is passionate about bringing practical applications of math
  and science to classrooms and has already implemented Linkbots in 30 Sacramento middle schools and high schools. Ryland is also interested in teaching and has designed Linkbot to help bridge the gap of
  computer programming. He recently launched a crowdfunding campaign on Kickstarter to raise money to make more Linkbots. Ryland is hoping the Linkbot might spark a similar passion in others and has fallen
  in love with robots at a young age.
