personas:
  professional: Tara Greenough, a 20‑year‑old aspiring lead technician, applies a methodical, organized workflow to diagnose engine, transmission, and electrical issues, meticulously documents each repair
    in service manuals, and they communicate technical details with empathy at the local independent shop, all while pursuing ASE certifications and hybrid‑vehicle diagnostic training to eventually own
    a garage supportive of women in the trade.
  sports: Tara Greenough enjoys cycling with the Lafreniere Park Cycling Club, paddles the Bayou on weekend kayaking outings, and they avidly support the New Orleans Saints and LSU Tigers, balancing low‑impact
    cardio with occasional pick‑up basketball games at the community center.
  arts: Tara Greenough unwinds by listening to classic blues icons like B.B. King and Stevie Ray Vaughan, attending live performances at historic French Quarter jazz clubs, and they appreciate automotive
    art exhibited by illustrators such as Ken Wright at local galleries.
  travel: Tara Greenough meticulously plans short road trips—such as a weekend drive to the Henry Ford Museum in Detroit and a spring tour along California’s Pacific Coast Highway—balancing their love for
    classic car cruising with a student‑like budget and a preference for structured itineraries.
  culinary: Tara Greenough, a self‑taught home chef, perfects Southern comfort staples like gumbo with okra, crawfish étouffée, and buttery biscuits, experimenting with smoked paprika, fresh thyme, and
    a splash of hot sauce, and they record each recipe in a gratitude journal for future reference.
  core: Tara Greenough blends a relentless garage work ethic with a compulsive habit of cataloguing every car part in spreadsheets, yet they battle nightly anxiety that sometimes leads to procrastination
    on paperwork and a tendency to over‑schedule mindfulness sessions.
background:
  cultural: Tara was raised in Metairie, a suburban community in Jefferson Parish just outside New Orleans. Her family is of Anglo‑American heritage, with deep roots in the Gulf Coast region. Growing up
    in a predominantly Catholic neighborhood, she attended a local Catholic high school where community service and family traditions were emphasized. The cultural milieu blends Southern hospitality, a
    love for regional cuisine, and the vibrant car culture of the Greater New Orleans area. Exposure to Cajun and Creole influences—through food, music, and local festivals like Mardi Gras—shaped her appreciation
    for the area’s diversity, even though her own ethnic background is white. This environment fostered a strong work ethic and practical mindset, while also encouraging participation in community events
    and a respect for local traditions.
attributes:
  skills: '[''Engine repair and diagnostics'', ''Transmission maintenance and rebuilds'', ''Brake system service'', ''Suspension and steering repairs'', ''Electrical and electronic system troubleshooting
    (including OBD-II diagnostics)'', ''Hybrid and electric vehicle basics'', ''Preventive maintenance scheduling'', ''Parts inventory management'', ''Workshop safety compliance'', ''Customer communication
    and service explanation'', ''Technical documentation and record-keeping'']'
  hobbies: '[''Restoring a 1970s Chevrolet Impala'', ''Building scale model car kits'', ''Reading automotive magazines and forums'', ''Practicing yoga and mindfulness meditation'', ''Journaling for self‑reflection'',
    ''Attending local car shows and classic car meets'', ''Cycling and kayaking in local parks and bayous'', ''Cooking Southern comfort food recipes'', ''Volunteering at the local animal shelter'']'
  career_goals: In the short term, Tara aims to earn her ASE certifications, particularly in Engine Performance, Brakes, and Electrical Systems, and to complete an advanced diagnostic training program focused
    on hybrid and electric vehicles. She also plans to enroll in a community college automotive technology program to broaden her theoretical knowledge. Over the next few years, she aspires to become a
    lead technician at her shop, taking on supervisory responsibilities, mentoring new apprentices, and contributing to process improvements that enhance efficiency and safety. Ultimately, Tara envisions
    owning her own independent garage that specializes in high-quality maintenance for both conventional and emerging electric vehicles, while creating a supportive environment for women entering the trade.
    She also hopes to participate in industry outreach programs that encourage young people, especially women, to pursue careers in automotive technology. Balancing these professional ambitions with a commitment
    to mental well‑being, she plans to incorporate regular self‑care practices and a stable work schedule to manage her anxiety.
