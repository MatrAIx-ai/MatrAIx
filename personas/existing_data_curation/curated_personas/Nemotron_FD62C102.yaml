personas:
  professional: Isabel Martinez is a budding illustrator who combines precise line work from LEGO building with vivid animal and folklore sketches, showing a practical, detail‑oriented mindset and a natural
    flair for turning structured instructions into imaginative art.
  sports: Isabel Martinez dribbles as a forward for the Riverside Cubs U‑9 soccer team, idolizes forward star Alex Morgan, and after games enjoys cheering for the local professional club the City Hawks
    while also participating in a weekend after‑school swimming club to stay active.
  arts: Isabel Martinez fills sketchbooks with intricate animal drawings and folklore scenes, listens to lively acoustic folk songs while coloring, draws inspiration from the whimsical animal illustrations
    of Beatrix Potter and the vibrant world‑building of Studio Ghibli, and spends evenings watching animated film classics to fuel their imagination.
  travel: Isabel Martinez loves family road trips to the nearby desert canyon and a summer visit to the coastal boardwalk, dreams of exploring the towering cliffs of Patagonia, and enjoys planning their
    mini‑adventures with detailed maps and checklists created in their journal.
  culinary: Isabel Martinez helps their mom slice cheese, grill corn tortillas, and fold quesadillas, delights in the smoky flavor of grilled peppers and the tang of fresh salsa, and proudly experiments
    with mixing ingredients like avocado and beans to create colorful, bite‑size snack plates.
  core: Isabel Martinez is a structured yet imaginative eight‑year‑old who channels competitive energy into soccer and LEGO builds, balances anxiety with creative journaling, and savors the comfort of family‑cooked
    meals and folk tunes.
background:
  cultural: Isabel Martinez comes from a Mexican family that maintains strong bilingual ties; Spanish is spoken at home, and she celebrates traditions such as Día de los Muertos, Mexican Independence Day,
    and family gatherings with homemade foods. Living in Oakland's diverse community, she is exposed to a mix of cultures, but Mexican cuisine, music, and family customs remain central to her daily life.
    She attends a bilingual elementary program that reinforces both English and Spanish literacy, and community events like local Mexican festivals further strengthen her cultural identity.
