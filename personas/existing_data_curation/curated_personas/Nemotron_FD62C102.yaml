  hobbies: '[''drawing'', ''LEGO building'', ''reading adventure books'', ''soccer'', ''cooking Mexican dishes'', ''listening to Mexican folk music'', ''puzzles'', ''journaling'']'
  career_goals: Isabel dreams of becoming a teacher because she values a structured classroom where she can help other children learn and stay organized. She also imagines working as a veterinarian, caring
    for animals with compassion while following clear procedures, reflecting her competitive drive to be the best at what she loves. She often talks about wanting to win a science fair award and be the
    top student in her class.
