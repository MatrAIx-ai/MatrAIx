personas:
  professional: Adele Mcinnis, a seasoned health informatics specialist, channels her curiosity and practical mindset into optimizing EMR systems, ensuring rigorous HIPAA compliance, and leading small teams
    through change with a calm, low‑stress approach that they maintain by prioritizing flexibility over rigid planning.
  sports: Adele Mcinnis enjoys low‑impact fitness through weekend walks along the Hillsborough River, light hikes with the local Floridian Trails Club, and follows the Tampa Bay Buccaneers and Tampa Bay
    Rays, attending occasional games that they share with fellow seniors.
  arts: Adele Mcinnis enriches her creative life through a neighborhood book club focused on historical nonfiction and medical mysteries, captures bird‑watching moments with a camera inspired by Ansel Adams,
    and unwinds to the soothing sounds of Enya and Loreena McKennitt, which they find soothing after a day of data analysis.
  travel: Adele Mcinnis favors thoughtful travel, planning relaxed trips to Mediterranean coastlines like Santorini for culinary inspiration while also enjoying short road trips to Florida’s Everglades
    and historic Savannah, balancing nature appreciation with comfortable itineraries that they tailor to their pace.
  culinary: Adele Mcinnis delights in preparing healthy Mediterranean‑style meals, from grilled branzino with lemon‑infused olive oil to chickpea‑tomato stew seasoned with oregano and basil, and occasionally
    experiments with sumac and za'atar to add creative flair, a kitchen adventure they share with friends during occasional dinner gatherings.
  core: Adele Mcinnis is a calm, curiosity‑driven health‑IT veteran who blends meticulous data stewardship with solitary hobbies, a relaxed financial outlook, and a love for low‑stress nature and Mediterranean
    flavors, and they embody a balanced, resilient approach to both work and leisure.
background:
  cultural: Adele’s cultural background is rooted in a mainstream Anglo‑American upbringing in the Midwest, where her parents—both involved in healthcare and education—instilled values of practicality,
    service, and modesty. After earning a STEM‑focused bachelor’s degree at a state university, she and her husband relocated to Central Florida in the early 1990s, attracted by the warm climate and expanding
    healthcare sector. Living in Odessa, she has integrated into the region’s blend of Southern hospitality and diverse community life while maintaining traditional American customs such as celebrating
    Thanksgiving, Independence Day, and local festivals. Her heritage emphasizes self‑reliance, community involvement, and a calm, resilient approach to life’s challenges.
attributes:
  skills: '[''Electronic Medical Record (EMR) system administration (Epic, Cerner, Meditech)'', ''HIPAA compliance and data privacy stewardship'', ''Medical coding (ICD-10, CPT) and billing support'', ''Health
    data analysis and reporting'', ''Quality assurance and audit preparation'', ''Process improvement and workflow optimization'', ''Staff training and mentorship on health IT'', ''Customer service for
    clinical staff'', ''Data migration and integration'', ''Spreadsheet and database management (Excel, Access, basic SQL)'']'
  hobbies: '[''Reading (historical nonfiction, medical mystery novels)'', ''Gardening (native Florida plants, succulents)'', ''Birdwatching'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking (healthy
    Mediterranean meals)'', ''Walking and light hiking (Hillsborough River trails)'', ''Wildlife photography'', ''Knitting/crochet'', ''Small book club participation'', ''Volunteering at senior center (health
    education workshops)'']'
  career_goals: Adele aims to deepen her credentials by obtaining the Registered Health Information Administrator (RHIA) certification and, over the next few years, transition into a health information
    management leadership role within her regional health system. She is eager to spearhead a department‑wide EMR optimization project that reduces documentation time, improves data accuracy, and enhances
    patient safety, all while preserving the low‑stress work environment she values. Additionally, she hopes to mentor emerging health‑information professionals and contribute her expertise to community
    health‑data initiatives, such as local chronic‑disease surveillance programs, thereby balancing personal growth with service to her community.
