personas:
  professional: Johnathan Bowers is an aspiring junior engineer who channels his love of structure into building intricate Lego creations, experimenting with simple coding on Scratch Jr., and dreaming of
    designing real bridges someday, while their relaxed attitude toward obligations lets them pivot spontaneously when new ideas spark.
  sports: Johnathan Bowers is a spirited member of the Little Rangers Soccer Club who spends afternoons dribbling on the neighborhood field, idolizes Lionel Messi and follows FC Barcelona’s youth academy,
    while cheering for the local professional team, the River City Rapids, during weekend matches.
  arts: Johnathan Bowers channels his fascination with prehistoric creatures into hand‑drawn dinosaurs inspired by the vibrant illustrations of Mary GrandPré, while they unwind by watching the animated
    series 'Adventure Time' and singing along to The Wiggles during the church’s youth choir rehearsals.
  travel: Johnathan Bowers prefers impromptu nature hikes over meticulously planned vacations, delighting in weekend trips to the nearby Willow Creek State Park where they collect rocks and insects, while
    dreaming of future adventures to the Grand Canyon and the interactive dinosaur exhibit at the American Museum of Natural History in New York.
  culinary: Johnathan Bowers enjoys indulging in cheesy pizza topped with pepperoni and black olives, builds trail mix with dried apricots, pretzels, and chocolate chips, helps stir a garden‑fresh carrot
    soup using carrots, onions, and thyme, and eagerly tries new flavors like cucumber sushi rolls, though they occasionally reject broccoli with a dramatic grimace.
  core: Johnathan Bowers is a curiosity‑driven seven‑year‑old who balances meticulous Lego engineering with spontaneous creek explorations, occasional candy binges, and a habit of humming cartoon theme
    songs while planting garden seeds.
background:
  cultural: Johnathan comes from a white, multi‑generational family rooted in Bainbridge, Georgia. He attends the local public elementary school and is active in his community church, where he participates
    in Sunday school and the youth choir. Family gatherings often feature Southern staples such as fried chicken, peach cobbler, and cornbread, and they celebrate holidays with traditions passed down through
    his grandparents, who tell stories about Decatur County’s farming history. The region’s emphasis on hospitality, respect for elders, and community events like the county fair and high‑school football
    games shape his sense of belonging and cultural identity.
