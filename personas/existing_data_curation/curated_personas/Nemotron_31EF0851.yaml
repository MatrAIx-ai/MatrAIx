  career_goals: Johnathan dreams of becoming a firefighter because he likes clear routines, teamwork, and helping people, and he also feels drawn to caring for animals as a veterinarian. In addition, he
    is fascinated by building things, so he sometimes imagines working as a civil engineer or a mechanic. His ambition is to do well in school, especially in science and math, so he can eventually join
    a program that teaches him more about emergency services, animal care, and engineering.
