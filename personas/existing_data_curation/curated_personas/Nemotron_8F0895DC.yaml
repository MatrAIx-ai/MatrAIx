  career_goals: Although he is not yet in school or work, Dwight's caregivers notice his budding ambition to be self-sufficient. He often watches his parents repair household items and tries to mimic their
    actions, hinting at a future interest in hands-on problem solving. His long-term imagination leans toward roles that let him explore and build - such as a junior mechanic, a backyard explorer, or a
    future engineer. He prefers a flexible path, setting personal milestones (first footsteps, first words) and quietly competing with himself to achieve them.
