  career_goals: Even though he is no longer in the formal workforce, Felix’s ambitions centre on leaving a lasting, positive imprint on his family and community. He aims to series‑host a weekly cooking
    class at the local community center where he can share traditional recipes and encourage younger participants to experiment with new ingredients. He also plans to mentor his grandchildren in budgeting
    and practical life skills, ensuring they inherit his organized, resilient approach to challenges. Additionally, Felix hopes to document his family’s culinary heritage in a handwritten recipe book to
    be passed down through generations, and to continue serving on the senior advisory board to advocate for accessible services for older adults in San Francisco.
