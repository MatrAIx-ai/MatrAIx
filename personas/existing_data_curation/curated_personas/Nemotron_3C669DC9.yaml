  hobbies: '[''abstract painting'', ''experimental photography'', ''small‑scale sculpture'', ''reading speculative fiction'', ''philosophical journaling'', ''yoga practice'', ''solo nature hikes'', ''community
    art workshops (small group)'', ''gardening'', ''exploring new culinary recipes'']'
  career_goals: Angela seeks to ascend to a senior executive role—such as Regional Director of Health Services—where she can champion novel, patient‑centered care models that integrate artistic and therapeutic
    elements. She aims to spearhead digital transformation projects that streamline operations while preserving flexibility for staff. In the long term, she hopes to launch a boutique consulting firm specializing
    in innovative health service design, publishing thought‑leadership pieces on the intersection of creativity and healthcare management. Her ambition is balanced by a desire for meaningful impact on community
    health outcomes in her Midwestern region.
