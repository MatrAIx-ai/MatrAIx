personas:
  professional: Angela Petroski, a seasoned health services manager with over a decade of experience, leverages her humanities background and imaginative problem‑solving to redesign patient workflows, champion
    patient‑centered care models, and lead flexible, high‑performing teams, while her relaxed attitude toward strict planning and occasional disorganization drive her to rely on creative benchmarks and
    competitive analysis to keep projects on track.
  sports: Angela Petroski enjoys seasonal hikes through nearby state parks, participates in a co‑ed softball league with the Midwest Trailblazers, loyally follows the Chicago Cubs and Milwaukee Bucks on
    TV, and incorporates weekly yoga sessions to balance her competitive drive with a need for mindful movement and stress management.
  arts: Angela Petroski channels her love of speculative fiction into abstract canvases inspired by Kandinsky and Jackson Pollock, captures everyday moments with a vintage Leica reminiscent of Vivian Maier,
    reads Octavia Butler and Margaret Atwood during candlelit evenings, and unwinds to Radiohead and Tori Amos while leading small‑group art workshops that cater to her preference for intimate, reflective
    creative circles.
  travel: Angela Petroski favors solo, flexible itineraries that blend nature and art, having trekked the geysers of Yellowstone, explored the rustic charm of Door County, photographed the lantern‑lit streets
    of Kyoto, and dreaming of Iceland’s auroras, she balances travel ambitions with budget constraints and occasional family responsibilities.
  culinary: Angela Petroski delights in crafting Mediterranean‑inspired dishes like roasted beet and quinoa salad with feta and a pinch of saffron, experimental miso ramen with kale and shiitake mushrooms,
    and occasionally bakes sourdough using wild‑collected rosemary, enjoying both the tactile process of cooking and the sensory reward of sharing meals with a close circle of friends.
  core: Angela Petroski is a visionary health leader whose solitary, art‑driven imagination fuels patient‑centered innovation, while her flexible yet sometimes disorganized habits, competitive edge, and
    persistent stress shape a life of creative chaos and purposeful impact.
background:
  cultural: Angela grew up in a modest, predominantly white suburb of central Ohio, where her family’s German‑Polish heritage blended with typical Midwestern values of community involvement and practicality.
    She was raised in a close‑knit environment that emphasized hard work, church participation, and local fairs, yet she gravitated toward the region’s modest arts scene—visiting the Columbus Museum of
    Art and attending community theater productions. This background gives her a grounded sense of place while nurturing a quiet, introspective curiosity that drives her artistic and professional pursuits.
attributes:
  skills: '[''Strategic planning'', ''Budget management'', ''Healthcare operations oversight'', ''Creative program development'', ''Interdisciplinary coordination'', ''Health policy analysis'', ''Quality
