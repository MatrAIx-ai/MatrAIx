  hobbies: '[''Hiking and exploring Utah’s red‑rock canyons'',''Landscape photography'',''Reading historical non‑fiction and mystery novels'',''Stargazing and amateur astronomy'',''Knitting/crocheting'',''Listening
    to travel and technology podcasts'',''Volunteering at local community events'',''Urban gardening'',''Collecting vintage car memorabilia'',''Occasional yoga or mindfulness practice'']'
  career_goals: Alexandra aims to turn her hands-on experience into a small, community-focused transportation business that serves both locals and visitors to the nearby national parks. She hopes to obtain
    a commercial driver’s license so she can expand her fleet, become a certified driver-trainer, and eventually operate a shuttle service that highlights the natural and historical sites of the region.
    In the longer term, she envisions leveraging her love of local history into curated tours that blend practical travel with storytelling.
