personas:
  professional: Alexandra Neal, a 23‑year‑old driver in Washington County, blends her practical navigation expertise and first‑aid knowledge with a spontaneous, curiosity‑driven storytelling flair that
    delights passengers on every scenic ride, even as they sometimes struggle to keep their schedule meticulously organized.
  sports: Alexandra Neal, a 23‑year‑old outdoor enthusiast, hikes with the Red Rock Hiking Club, follows the Utah Jazz and Real Salt Lake for occasional sports nights, and completes weekly trail runs with
    the St. George Trail Runners to stay fit, preferring low‑impact endurance over team sports, though they occasionally skip the post‑run stretch.
  arts: Alexandra Neal, a 23‑year‑old lover of visual and auditory arts, spends evenings editing sunrise photos inspired by Ansel Adams, tunes into Bon Iver and The National while knitting, and devours
    historical nonfiction and mystery novels by authors like Erik Larson and Agatha Christie, letting these creative influences shape their storytelling tours.
  travel: Alexandra Neal, a 23‑year‑old wanderer at heart, favors spontaneous road trips to nearby wonders like Zion and the Grand Canyon, keeps a detailed travel podcast playlist for inspiration, and dreams
    of backpacking the Patagonian Andes and stargazing in Iceland’s remote highlands, balancing limited savings with a desire for immersive experiences, though they sometimes postpone trips due to work
    demands.
  culinary: Alexandra Neal, a 23‑year‑old home cook with an intermediate skill set, delights in preparing quinoa‑crusted trout, roasted sweet potatoes with rosemary, and homemade sourdough, often seasoning
    dishes with locally sourced sage and chili flakes while occasionally forgetting to defrost ingredients ahead of time, and they tend to over‑salt when experimenting with new spices.
  core: Alexandra Neal, a 23‑year‑old driver‑turned‑entrepreneur, merges curiosity‑driven storytelling with practical navigation, loves sunrise hikes and knitting, savors quinoa‑crusted fish, saves diligently
    yet splurges on gear, and they habitually lose track of tiny deadlines.
background:
  cultural: Alexandra grew up in La Verkin, a small town in Washington County, Utah, where a blend of frontier self‑reliance and close‑knit community values shape everyday life. Her family’s roots in the
    area are tied to ranching and the early settlement of the region, and she was raised with a respect for the outdoors, modesty, and service to neighbors—values commonly reinforced by local church and
    community gatherings. While she identifies as white and enjoys the broader American cultural traditions, the rhythms of rural Utah life, seasonal festivals, and an emphasis on helping others continue
    to influence her worldview and daily practices.
