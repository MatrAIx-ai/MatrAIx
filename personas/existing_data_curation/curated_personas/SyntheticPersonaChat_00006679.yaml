    User 1: I''ve never really listened to classical music before.

    User 2: You should! It''s really beautiful.

    User 1: Maybe I will.

    User 2: I also like to listen to jazz and rock music.

    User 1: I like jazz music too. It''s so relaxing.

    User 2: I know what you mean. It''s the perfect music to listen to while you''re working or studying.

    User 1: Yeah, it is.

    User 2: Well, it was nice talking to you. I hope we can talk again soon.

    User 1: Me too. It was nice talking to you too.'
