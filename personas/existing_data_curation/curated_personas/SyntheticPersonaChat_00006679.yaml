    User 1: Me too! I like to watch action movies to get my adrenaline going, and I like to watch comedy movies to make me laugh.

    User 2: I know what you mean. Action movies are always so exciting, and comedy movies are always so funny.

    User 1: So, what kind of music do you like to listen to?

