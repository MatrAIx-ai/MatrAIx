persona_description: An experienced storyteller and author who specializes in the art of collecting and preserving Native American stories, as well as developing creative writing techniques for both beginning
  and intermediate tellers. Known for his engaging and interactive workshops, Tingle has presented his work at numerous storytelling conferences and events, including the National Storytelling Conference,
  the Native American Preservation Conference, and the Betty Weeks Storytelling Conference. His work is highly sought after by educators, writers, and students looking to learn and perform stories, and
  his approach to storytelling emphasizes the importance of sharing stories in a respectful and knowledgeable manner.
