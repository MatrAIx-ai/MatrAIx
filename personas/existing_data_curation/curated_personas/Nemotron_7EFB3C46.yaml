personas:
  professional: Emmanuel Rosa is a high‑school sophomore who dreams of becoming a mechanical engineer, channeling their love of order and strategic teamwork into building LEGO Technic models and leading
    the school robotics club, where their competitive edge and reliability make them the go‑to troubleshooter for complex builds.
  sports: Emmanuel Rosa plays midfield for the local Northside Youth Soccer Club, follows the FIFA World Cup and the MLS team LA Galaxy, and they keep fit with after‑school drills and weekend pick‑up games,
    prioritizing structured team tactics over casual solo workouts.
  arts: Emmanuel Rosa enjoys dancing to reggaetón hits by Bad Bunny and classic salsa anthems from Celia Cruz, while also spending evenings building LEGO Technic sets that double as tactile art, and they
    occasionally binge‑watch the animated series 'Adventure Time' for its quirky visual style.
  travel: Emmanuel Rosa prefers short, well‑planned family trips—like a summer weekend to Orlando’s theme parks or a cultural visit to San Juan’s historic Old Town—while dreaming of a future backpacking
    adventure through the European capitals of Barcelona and Rome, balancing school commitments with a modest travel budget.
  culinary: Emmanuel Rosa is an aspiring junior chef who helps craft arroz con gandules with sofrito, sazón, and pigeon peas, and rolls empanadillas filled with seasoned ground beef, while also experimenting
    with pepperoni pizza topped with fresh basil, showing an intermediate cooking skill and a love for bold, aromatic ingredients.
  core: Emmanuel Rosa is a routine‑loving teen who blends competitive gaming, methodical LEGO building, and family‑centered cooking into a disciplined yet occasionally skeptical outlook on life.
background:
  cultural: Emmanuel comes from a Puerto Rican family that migrated to New Jersey, preserving strong ties to island traditions while embracing the multicultural environment of Teaneck. At home, Spanish
    is spoken daily, and family gatherings revolve around shared meals, music, and stories of Puerto Rico’s heritage. He participates in local cultural events such as the annual Puerto Rican Day Parade
    and celebrates holidays like Three Kings’ Day, which reinforce his identity. Growing up in Bergen County exposes him to a diverse community, shaping a bicultural perspective that blends Caribbean values
    of family cohesion and hospitality with the American emphasis on education and personal responsibility.
