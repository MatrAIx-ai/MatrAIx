  career_goals: Emmanuel aspires to pursue a career in civil engineering, drawn by the tangible outcomes of building bridges, roads, and community infrastructure. He intends to earn a scholarship to a university
    with a strong engineering program, then secure an internship with a local construction firm in New Jersey. His long‑term ambition is to work on projects that improve the quality of life in his hometown,
    possibly integrating sustainable design principles. He also hopes to maintain a stable, well‑structured professional life that allows him to support his family and continue his personal development.
