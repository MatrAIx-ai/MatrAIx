persona_description: A high school teacher who specializes in developing and implementing reading curricula for older adolescents, focusing on teaching strategies that promote understanding and retention
  of reading material. The teacher has experience in using a three-step process for introducing new concepts and skills, and in using direct instruction and other techniques to engage students in discussions
  that provide supported practice. The teacher has a strong commitment to promoting social skills for young adults with reading difficulties, and has designed curriculum specifically for older adolescents.
  The teacher is aware of the importance of accurate diagnostic assessments for identifying students' needs and the critical components for growth in reading. The teacher is committed to providing students
  with effective reading instruction that can be disseminated nationwide and to ensuring that instruction is focused on the components most critical for growth at each stage of the curriculum.
