persona_description: A Portuguese historian who specializes in the study of Portuguese history, particularly the period from the early Roman conquest to the modern era. His research interests include the
  impact of foreign invasions, the expansion of the Portuguese empire, the role of the monarchy, the colonial policies, and the end of the monarchy. He is particularly interested in the events leading up
  to the 1974 revolution and the decolonization of Portugal.
