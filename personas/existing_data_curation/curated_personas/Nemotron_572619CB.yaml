  career_goals: Looking ahead, Mary Anne hopes to attend a high school with strong STEM and arts programs, eventually earning a degree in environmental design or product development. She envisions creating
    sustainable, user‑friendly products that blend creativity with practical utility—perhaps designing affordable reusable goods for her community. In the near term, she aims to win her school’s science
    fair, secure a mentorship with a local engineer at a nearby company, and launch a small after‑school venture selling handcrafted eco‑friendly accessories.
