personas:
  professional: Jyotsanaben Agarwal, a budding teen game developer, writes clean Unity code with strict folder hierarchies while sprinkling spontaneous jazz riffs into their game soundtracks, competes fiercely
    in school hackathons, and stays unusually calm when deadlines drift, reflecting a blend of structural love and flexible creativity.
  sports: Jyotsanaben Agarwal cycles with the Dakota County Youth Cycling Club, hikes the Ridge Trail in the summer, and follows the Minnesota Vikings and Minnesota Twins with a competitive spirit that
    drives them to track personal bests in endurance rides, though they sometimes forget to schedule training sessions ahead of time.
  arts: Jyotsanaben Agarwal, an ardent pianist who masters Beethoven's 'Moonlight Sonata' while improvising in the style of Herbie Hancock, creates vibrant digital illustrations in Procreate inspired by
    Studio Ghibli's 'Spirited Away', and performs Bharatanatyam pieces choreographed by Shobana Chandrasekhar, blending classical discipline with spontaneous creativity.
  travel: Jyotsanaben Agarwal plans trips with a mix of meticulous itinerary for museum days and spontaneous detours for scenic hikes, having explored Chicago's sci‑fi convention, hiked the Grand Teton's
    Alpine Trail, and dreaming of cherry‑blossom season in Kyoto and a backpacking adventure through New Zealand's South Island.
  culinary: Jyotsanaben Agarwal, an intermediate home cook, delights in preparing fragrant dal makhani, crisp undhiyu, and mango lassi with cumin, coriander, and mustard seeds alongside experimenting with
    handcrafted Margherita pizza and sushi rolls, often tackling recipes with their mother’s guidance to stay rooted in tradition while exploring new flavors.
  core: Jyotsanaben Agarwal is a calm, competitively spirited teen who juggles strict code organization with spontaneous jazz improvisation, disciplined savings with occasional art‑tool splurges, and a
    love for both digital art and rugged hikes.
background:
  cultural: Jyotsanaben comes from a first‑generation Indian (Gujarati) family that settled in Saint Paul, Minnesota. At home, Gujarati is spoken alongside English, and the family observes Hindu traditions,
    celebrating festivals such as Diwali, Holi, and Navratri with community gatherings and traditional foods. Her parents emphasize the importance of education and cultural continuity, encouraging participation
    in both South Asian community events and mainstream American activities like school clubs and sports. Growing up in Dakota County, she blends Midwestern values of independence and practicality with
    her South Asian heritage, navigating a bicultural identity that influences her perspectives, relationships, and aspirations.
attributes:
  skills: '[''Python programming (basic)'', ''Video editing (iMovie, Canva)'', ''Gujarati language proficiency'', ''Hindi script reading'', ''Cooking Indian (Gujarati) cuisine'', ''Robotics hardware wiring
    and sensor integration'', ''Piano playing (intermediate)'', ''Mathematics problem solving'', ''Leadership in student council'']'
  hobbies: '[''Playing piano (classical and jazz improvisation)'', ''Coding simple video games'', ''Digital drawing and illustration (Procreate)'', ''Hiking in local parks'', ''Cycling around Saint Paul'',
    ''Bharatanatyam dance practice'', ''Reading science‑fiction and graphic novels'', ''Volunteering at the Hindu temple (youth event organization)'', ''Cooking Indian (Gujarati) meals with family'']'
  career_goals: Jyotsanaben aims to earn a scholarship to a top university where she can major in computer science and later become a software engineer focused on educational technology. She is especially
    interested in developing AI‑driven tools that make STEM learning more accessible for underrepresented students, including South Asian youth. While she values the structure of a rigorous academic path,
    she also dreams of launching her own startup that blends Indian cultural content with innovative digital platforms, allowing her to stay competitive and showcase her entrepreneurial spirit. Her long‑term
    ambition includes mentoring younger girls from similar backgrounds to pursue tech careers.
