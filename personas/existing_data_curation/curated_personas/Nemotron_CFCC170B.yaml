personas:
  professional: A meticulous three-year-old named Elizabeth Sholl treats the preschool classroom like a tiny office, expertly sorting blocks by shape and color while leading her playgroup through structured
    building projects, showcasing early organizational and leadership instincts despite her tender age.
  sports: A focused three-year-old named Elizabeth Sholl enjoys organized play at the local Little League mini‑baseball practice, proudly wears the team’s pink cap, participates in seasonal toddler gymnastics
    classes in winter, and cheerfully watches the city’s professional hockey team, the River City Ravens, during weekend broadcasts, reflecting her early competitive drive.
  arts: An imaginative three-year-old named Elizabeth Sholl delights in painting with thick watercolor crayons, sings along to the whimsical tunes of children’s musician Raffi, and reenacts scenes from
    the animated film "Moana," allowing her creative spirit to flourish during afternoon play sessions.
  travel: An exploratory three-year-old named Elizabeth Sholl loves weekend trips to the nearby aquarium, eagerly collects foil stickers from the local theme park, and dreams of one day visiting the fairy‑tale
    gardens of Mini‑Europe, balancing her desire for predictable routines with an emerging curiosity for new sights.
  culinary: A discerning three-year-old named Elizabeth Sholl prefers the comforting flavors of creamy mac 'n cheese, buttered toast with strawberry jam, and crunchy carrot sticks, insists on using a tiny
    wooden spoon for scooping, and arranges her meals on a divided plate for visual order before digging in.
  core: A precise and competitive toddler named Elizabeth Sholl brings order, methodical routines, and an unrelenting love for structured play into every aspect of her three‑year‑old world.
background:
