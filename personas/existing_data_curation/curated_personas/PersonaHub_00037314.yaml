persona_description: A scientist or researcher who specializes in the study of nematophagous fungi, particularly those that trap and digest nematodes. Their research interests include the evolution of these
  fungi as competitors in the soil, the development of new methods to use these fungi for the control of parasitic nematode larvae, and the understanding of the unique strategies and adaptations of these
  fungi to kill nematodes. They may also have expertise in the field of parasitology and the biology of nematodes.
