  career_goals: Dexter aims to advance to a senior curator or chief archivist role within a major regional museum, where he can spearhead large‑scale digitization projects that make Latin American and indigenous
    collections globally accessible. He seeks to develop innovative, technology‑driven exhibitions that blend traditional artifacts with interactive digital experiences. He also aspires to secure sustainable
    funding for conservation initiatives, mentor emerging archivists, and strengthen partnerships between the museum and local schools and cultural organizations.
