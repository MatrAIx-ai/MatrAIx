  hobbies: '[''Visiting art galleries and street art tours'', ''Improvisational theater and spoken‑word events'', ''Dancing (hip‑hop, salsa)'', ''Cooking experimental fusion dishes'', ''Urban photography'',
    ''Park yoga and hiking'', ''Health‑tech hackathons'', ''Organizing trivia and board‑game nights'', ''Reading science and technology books'']'
  career_goals: Cora aims to become a registered nurse by completing an RN‑to‑BSN program within the next two years, followed by a Master’s in Nursing focused on nursing informatics. She aspires to lead
    a quality‑improvement team that integrates technology and arts‑based interventions to enhance patient outcomes in underserved Brooklyn communities. Long‑term, she envisions launching a community health
    initiative that blends health education, digital tools, and creative workshops, and ultimately serving as a nurse executive or public‑health advocate shaping policy for health equity.
