personas:
  professional: Cora James, a 36-year-old bedside nurse at a Brooklyn community hospital, merges clinical expertise in medication administration, wound care, and health informatics with an artistic curiosity
    that drives her to design visual patient education tools, lead competitive quality-improvement projects, and maintain meticulous records while staying calm under pressure.
  sports: Cora James, an avid Brooklynite, jogs in Prospect Park, practices sunrise yoga at Brooklyn Bridge Park, cheers for the Brooklyn Nets and the New York Islanders, plays co-ed softball in the BklynSox
    League each summer, and treats fitness as a competitive personal experiment, tracking mileage on Strava while still conquering weekend hikes in the Catskills.
  arts: Cora James, a regular attendee of the Brooklyn Academy of Music, savors live jazz sets by Kamasi Washington, explores street-art tours featuring works by Banksy and local muralist HAZE, participates
    in community improv with The Players Lab, and draws inspiration from visual artists like Kehinde Wiley for her therapeutic patient education collages.
  travel: Cora James, balancing a busy nursing schedule with a love for cultural immersion, plans short-term weekend getaways to the Hudson Valley, longer explorations to Mexico City to study its vibrant
    mural scene, and dreams of a year-long sabbatical in Barcelona to investigate health-tech startups, all while budgeting travel expenses in a dedicated spreadsheet.
  culinary: Cora James, an experimental home chef, fuses Jamaican jerk seasoning with Korean kimchi to create a spicy ramen-taco hybrid, frequently showcases her dishes at Brooklyn’s Smorgasburg, loves
    fresh basil, heirloom tomatoes, and uses a sous-vide for precise protein textures, yet admits to over-spicing late-night snacks after improv rehearsals.
  core: Cora James, a 36-year-old nurse-informatician, lives at the crossroads of art and data, turning patient rooms into galleries, obsessively tracking both vital signs and Spotify playlists, habitually
    juggling three coffee cups while racing the clock to finish a trivia night question.
background:
  cultural: Cora was raised in a close‑knit African American family in Brooklyn’s Crown Heights neighborhood, where she absorbed the rhythms of gospel, hip‑hop, and Caribbean music that echo throughout
    the borough. Her parents, immigrants from Jamaica, emphasized education, community service, and the importance of preserving cultural heritage. Growing up amidst vibrant street festivals, church choirs,
    and neighborhood block parties, she developed a deep appreciation for the diverse narratives of Black life in New York City. These experiences shape her commitment to health equity, her love for art
    as a vehicle for empowerment, and her ability to navigate and bridge multiple cultural contexts in her nursing practice.
