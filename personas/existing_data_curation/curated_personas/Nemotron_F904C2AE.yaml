  hobbies: '[''Kayaking on Grand Traverse Bay'', ''Hiking Sleeping Bear Dunes'', ''Cycling club'', ''Wine and craft‑brew tasting'', ''Cooking and hosting dinner parties'', ''Community theater (backstage
    tech)'', ''Teaching computer basics to seniors'', ''Following Michigan Wolverines sports'', ''Attending cherry blossom festival'', ''Reading science‑fiction'']'
  career_goals: While approaching retirement age, Alexander aims to transition from day‑to‑day management to a strategic advisory role where he can shape the digital future of mid‑size businesses in the
    Great Lakes region. He plans to mentor the next generation of IT leaders, launch a consultancy focused on sustainable cloud adoption for local manufacturers, and author a guidebook on balancing technological
    innovation with operational reliability. Additionally, he wishes to spearhead a community initiative that provides free cybersecurity workshops to small businesses and seniors, ensuring his legacy of
    practical curiosity and community service.
