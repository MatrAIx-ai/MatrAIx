personas:
  professional: Jerry Arnold is an aspiring robotics hobbyist and competitive e‑sports player, and they blend curiosity‑driven Arduino tinkering with strategic FPS gameplay, showcasing practical coding
    and circuit‑design skills while maintaining a critical, organized approach to school tech clubs.
  sports: Jerry Arnold spends afternoons at the River Valley Hoops Club practicing at the community park basketball court, and they cheer for the Milwaukee Bucks while sharpening their jump shot, also escaping
    weekends fishing on Lake Michigan and fine‑tuning their go‑kart for speed drills.
  arts: 'Jerry Arnold enjoys the synth‑laden scores of Daft Punk and the orchestral soundtrack of Nier: Automata by Keiichi Okabe, and they watch indie sci‑fi films like Ex Machina while sketching detailed
    liveries for scale model cars, letting artistic flair fuel their tech projects.'
  travel: Jerry Arnold, who only travels during summer break, has road‑tripped to the Detroit Auto Show and spent weekends fishing at Lake Michigan, and they dream of a future pilgrimage to Tokyo for the
    Japan Game Expo once they save enough from their part‑time gigs.
  culinary: Jerry Arnold loves devouring pepperoni pizza and spicy buffalo wings while gaming, and they occasionally cook ramen with soft‑boiled eggs, jalapeños and Sriracha, even baking cornbread for their
    dad’s farm‑equipment repair lunches.
  core: Jerry Arnold is a technically‑savvy teen who channels competitive gaming instincts into hands‑on engineering projects, balances methodical budgeting with occasional impulse buys, and navigates health
    and hobbies with a pragmatic, slightly skeptical edge.
background:
  cultural: Jerry grew up in Mooresville, a small town in Morgan County, Indiana, within a predominantly white, middle‑class, working‑class community. Local culture emphasizes self‑reliance, practical skills,
    and a strong connection to the land and regional industries such as farming and manufacturing. Family gatherings often revolve around church, community events, and high‑school sports, fostering a sense
    of belonging and modest conservatism. At the same time, widespread broadband access and online gaming communities expose him to broader, more progressive ideas, giving him a blend of traditional Midwestern
    values and contemporary digital culture.
attributes:
  skills: '[''Mechanical troubleshooting'', ''DIY electronics assembly'', ''Basic Python programming'', ''Game strategy analysis'', ''Competitive gaming'', ''Project organization'', ''Strategic problem
