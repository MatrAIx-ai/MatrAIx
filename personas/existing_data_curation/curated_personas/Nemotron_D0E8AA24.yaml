  hobbies: '[''Competitive video gaming'', ''Basketball'', ''Arduino/Raspberry Pi tinkering'', ''Scale model car building'', ''Fishing'', ''Go‑karts maintenance'', ''Automotive repair projects'', ''Tech
    podcast listening'']'
  career_goals: Jerry aims to earn his high‑school equivalency by age 18 and then secure a paid apprenticeship at a local auto‑repair shop to become a certified automotive technician. Parallel to that,
    he plans to deepen his programming skills, eventually working on embedded systems for vehicle electronics. He also hopes to compete in regional eSports tournaments and leverage any STEM scholarship
    opportunities. Long‑term, he envisions opening his own garage where he can fuse custom car builds with innovative tech solutions.
