  career_goals: Maria aims to formalize her expertise by obtaining the Certified Payroll Professional (CPP) designation within the next year. She aspires to move into a supervisory payroll role where she
    can lead a small team, implement automated time‑tracking solutions, and streamline reporting processes. Leveraging her educational background, Maria also hopes to develop a training program for new
    employees that blends instructional design principles with practical payroll skills. Ultimately, she envisions a career path that balances professional advancement with manageable stress levels, allowing
    her to maintain personal well‑being while contributing to a harmonious workplace.
