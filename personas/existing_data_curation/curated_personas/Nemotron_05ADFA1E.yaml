  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading historical fiction'', ''Volunteer tutoring'', ''Yoga and meditation'', ''Hiking in local parks'', ''Knitting'', ''Attending cultural festivals'',
