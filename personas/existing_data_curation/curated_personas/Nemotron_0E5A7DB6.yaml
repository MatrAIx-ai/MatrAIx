  career_goals: Julio aims to transition from a senior architect role to a strategic technology leader who bridges the worlds of networking and the arts. He plans to mentor the next generation of engineers,
    earn a CCIE certification, and spearhead innovative network solutions for cultural institutions such as museums and galleries, enabling immersive digital experiences. Over the next five years, he hopes
    to lead a cross‑functional team that integrates IoT, AR/VR, and sustainable networking practices, and eventually serve as a CIO or CTO for an organization that values creative technology and community
    impact.
