persona_description: A high-level official from the United States Agency for International Development (USAID) who oversees efforts to combat a coffee rust epidemic that threatens to severely diminish coffee
  harvests in Latin America. The persona is responsible for coordinating research into how to fight coffee rust and efforts to reverse the effects of the fungus that have already hurt Latin American crops,
  including Arabica blend coffee beans. The persona is also responsible for ensuring that coffee corporations, like Keurig Green Mountain, are aware of the long-term price and quality effects of coffee
  rust and are able to adapt to these uncertainties. The persona is focused on protecting American coffee intakes, empowering entrepreneurs, and creating sustainable livelihoods for families.
