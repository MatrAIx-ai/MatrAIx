personas:
  professional: Alexis Tucker, a 25‑year‑old electrical engineer in Menasha, applies her expertise in circuit design, PCB layout, and embedded systems to lead safety‑compliant automation projects while
    fostering inclusive teamwork and mentoring emerging engineers through diversity‑focused professional societies.
  sports: Alexis Tucker, an avid hiker and community‑center basketball player, joins the Kettle Moraine Hiking Club for weekend treks, practices morning yoga and strength training at the local gym, follows
    the Green Bay Packers and Milwaukee Bucks, and balances her fitness routine with occasional pick‑up soccer games.
  arts: Alexis Tucker, a dedicated jazz aficionado, regularly attends live shows at the historic Pabst Theater featuring artists like Kamasi Washington and local saxophonists, spins Miles Davis vinyl at
    home, quilts with traditional patterns, and reads works by Maya Angelou and Ta‑Nehisi Coates for inspiration.
  travel: Alexis Tucker, an organized explorer, plans trips months ahead, has explored New Orleans for its music and Creole cuisine, toured Washington, D.C.’s historic museums, and dreams of hiking the
    Great Smoky Mountains and immersing herself in Japan’s tech districts and tea ceremonies.
  culinary: Alexis Tucker, a confident home cook, blends Southern comfort foods like shrimp‑and‑grits with Midwestern touches such as cheese curds, flavors dishes with smoked paprika, maple syrup, and fresh
    collard greens, and perfects pimento cheese‑filled fried chicken and buttery buttermilk cornbread using local honey.
  core: Alexis Tucker balances disciplined engineering precision with soulful cultural expression, turning structured project plans into inclusive, innovative solutions while nurturing her community roots
    through music, food, and mentorship.
background:
  cultural: Raised in a close‑knit African‑American family in the Midwest, Alexis grew up with strong ties to church, community service, and a deep appreciation for Black cultural traditions. Her family
    emphasized the value of education and perseverance, encouraging her to pursue a path in engineering while staying connected to her heritage through music, cuisine, and storytelling. Living in Menasha,
    Wisconsin, she blends the modest, community‑oriented Midwestern lifestyle with the vibrant cultural expressions of Black identity, participating in local Juneteenth celebrations and supporting Black-owned
    businesses. As a Black woman in a male‑dominant field, she actively engages with professional networks such as NSBE, striving to increase representation and provide mentorship for younger Black students.
    Her cultural background informs her collaborative, considerate approach at work and fuels her ambition to create inclusive, innovative engineering solutions.
attributes:
  skills: '[''Circuit design'', ''PCB layout using Altium Designer'', ''Embedded firmware development (C/C++)'', ''Python scripting for automation'', ''LTspice simulation'', ''MATLAB/Simulink modeling'',
    ''Power electronics and control systems'', ''Hardware debugging with oscilloscopes and logic analyzers'', ''NEC code compliance'', ''System integration and test validation'', ''Technical writing and
    documentation'', ''Project planning and risk management'', ''Team mentorship and inclusive collaboration'']'
  hobbies: '[''Arduino home‑automation projects'', ''STEM mentorship and NSBE outreach'', ''Historical nonfiction reading'', ''Hiking in Kettle Moraine State Forest'', ''Yoga and mindfulness practice'',
    ''Quilting and textile crafts'', ''Cooking Southern‑Midwestern fusion dishes'', ''Live jazz music appreciation'']'
  career_goals: In the next 2‑3 years, Alexis aims to pass the Fundamentals of Engineering (FE) exam and begin the path toward licensure as a Professional Engineer (PE) in Wisconsin. She plans to lead small‑scale
    automation projects, deepen her specialization in renewable energy systems—particularly solar‑plus‑storage integration—and obtain a PMP certification to formalize her project management capabilities.
    Within five years, she aspires to become a Senior Electrical Engineer or Project Lead, overseeing multidisciplinary teams that design sustainable industrial solutions. Long‑term, she envisions a role
    as a Principal Engineer or Technical Director where she can shape company strategy, champion diversity and inclusion initiatives within the engineering workforce, and mentor the next generation of Black
    women in STEM.
