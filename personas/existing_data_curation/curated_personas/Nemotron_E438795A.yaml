personas:
  professional: Quynh Khuu, an aspiring game developer, channels curiosity and practicality into Scratch mini‑games that blend spontaneous sci‑fi storytelling with solid coding fundamentals, even though
    they often resist strict deadlines.
  sports: Quynh Khuu enjoys solitary jogs along Chicago’s lakefront and practices skateboarding at the local park, cheering on the Chicago Cubs while they occasionally join a youth swimming club for endurance
    training.
  arts: Quynh Khuu immerses themselves in sci‑fi graphic novels, and they draw inspiration from creators like Moebius and Hayao Miyazaki while spending evenings mastering Debussy’s piano preludes and sketching
    original comic panels that merge futuristic worlds with personal narratives.
  travel: Quynh Khuu prefers low‑key day trips to the Museum of Science and Industry and the Chicago Botanic Garden, but they dream of visiting the Kennedy Space Center and the coastal town of Shell Beach
    in Oregon to collect rare shells and see rockets up close.
  culinary: Quynh Khuu helps their mother prepare traditional dishes such as phở and bánh mì, cherishing the aroma of star anise, fish sauce, and fresh cilantro, and they enjoy experimenting with a pinch
    of lime in the broth to personalize the flavor.
  core: Quynh Khuu, a 12‑year‑old with a quiet curiosity, fuses spontaneous comic‑making, Scratch coding, and piano practice into a uniquely practical yet imaginative outlook on life, and they tackle challenges
    with calm determination.
background:
  cultural: Quynh Noemi comes from a Vietnamese‑American family that settled in Chicago’s Uptown neighborhood. Her household speaks both English and Vietnamese, celebrating Lunar New Year (Tết) with traditional
    foods, lanterns, and family gatherings. She has learned to prepare recipes such as phở, gỏi cuốn, and bánh chung, often hearing stories of her grandparents’ lives in Vietnam. The community’s multicultural
    fabric, including participation in local festivals and visits to the Vietnamese cultural center, blends with Chicago’s diverse city life, giving her a rich sense of identity that balances respect for
    heritage with curiosity about the wider world.
