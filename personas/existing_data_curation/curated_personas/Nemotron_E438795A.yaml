  career_goals: Quynh envisions a future where she can combine her love for technology and storytelling. She aspires to become a software engineer or independent game developer who creates educational games
    that teach coding concepts or cultural heritage in an engaging, solitary‑friendly environment. She also dreams of studying computer science in college, possibly focusing on human‑centered design or
    environmental tech, so she can build practical tools that solve real‑world problems while allowing flexible, self‑directed work. In the long term, she hopes to mentor younger kids from immigrant families,
    helping them discover how curiosity and practicality can coexist in a career.
