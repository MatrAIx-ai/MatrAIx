  career_goals: Although retired from formal employment, Aileen aims to become a docent at a local museum, mentor emerging artists from her community, publish a memoir chronicling her family's immigration
    story, lead a neighborhood mural project that celebrates multicultural heritage, and serve as a cultural liaison for Bay Area festivals that bridge East Asian traditions with contemporary American art.
