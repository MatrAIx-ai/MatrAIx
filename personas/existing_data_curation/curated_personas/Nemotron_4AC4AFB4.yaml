personas:
  professional: John Hendry runs a home‑based handyman service in Salt Lake City that emphasizes punctual, detail‑driven routine maintenance, leverages their mechanical repair and carpentry skills, and
    they are motivated to earn a certification in energy‑efficient retrofitting to differentiate their cost‑saving recommendations for local homeowners.
  sports: John Hendry sticks to solo fitness routines such as weekend hikes in the nearby foothills, joins a monthly community tennis match to stay active, and they loyally follow the Utah Jazz and the
    BYU Cougars, preferring predictable, low‑impact activities over high‑intensity team sports.
  arts: John Hendry channels their love of detail into building scale model locomotives while appreciating the realistic brushwork of Frederic Remington, listening to classic folk storytellers like Johnny
    Cash and Bob Dylan during workshop sessions, and they occasionally watch Western films starring John Wayne for inspiration.
  travel: John Hendry prefers meticulously planned road trips to historic western locales, having recently driven to Virginia City, Nevada and the Mormon Pioneer National Heritage Trail in southern Utah,
    and they dream of a low‑budget rail‑tour through the Canadian Rockies, always scheduling rest days to maintain their routine.
  culinary: John Hendry enjoys cooking hearty, low‑sodium meals such as rosemary‑roasted chicken, beef stew with potatoes and carrots, and occasional grilled trout seasoned with lemon and dill, while they
    reserve weekends for tackling new woodworking projects rather than dining out, and they rely on a well‑stocked pantry of staples like quinoa, brown rice, and canned beans.
  core: John Hendry is a routine‑obsessed handyman with a competitive streak, a penchant for solitary crafts, chronic worry that fuels meticulous budgeting, and they habitually over‑plan every aspect of
    work, travel, and meals while occasionally neglecting self‑care.
background:
  cultural: John grew up in a predominantly white, middle‑class suburb of the Intermountain West, where self‑reliance, practicality, and a respect for tradition are deeply valued. Living in Salt Lake City,
    he has been influenced by the region's blend of Mormon cultural norms—emphasizing family cohesion, community service, and modest living—even though he does not actively practice the faith. This environment
    reinforced his preference for routine, his competitive work ethic, and his focus on personal responsibility. His marriage and long‑term residency in the area reflect a stable, family‑oriented lifestyle
    that aligns with the broader Western U.S. cultural emphasis on outdoor recreation, conservative values, and a pragmatic approach to everyday challenges.
attributes:
