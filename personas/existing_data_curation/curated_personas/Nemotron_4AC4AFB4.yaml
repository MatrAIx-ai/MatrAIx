  hobbies: '[''woodworking'', ''model building (locomotives, classic cars)'', ''reading historical non-fiction'', ''personal finance research'', ''online chess'', ''hiking and walking'', ''journaling'']'
  career_goals: John intends to convert his practical skill set into a modest, home‑based handyman service that focuses on routine maintenance for local homeowners in Salt Lake City. He aims to build a
    reputation for punctuality, thoroughness, and cost‑saving recommendations, leveraging his competitive drive to secure a reliable client base. Over the next few years he plans to obtain a certification
    in energy‑efficient retrofitting so he can offer specialized services that align with his practical mindset and generate additional income. Ultimately, his goal is to achieve financial stability for
    his family without returning to a conventional full‑time job, allowing him to maintain his preferred routine and personal freedom.
