  career_goals: Susan aims to advance to a facilities‑manager or director‑of‑sustainability position within a larger corporate or institutional setting. She plans to pursue a master’s degree in facilities
    management or environmental sustainability to deepen her expertise. In the short term, she wants to lead a pilot program that integrates artistic elements—such as rotating gallery displays and creative
    break‑area designs—into the workplace to boost employee morale. Long‑term, she envisions establishing a consultancy that helps organizations adopt green cleaning standards while fostering inclusive,
    culturally rich work environments. She is also passionate about mentoring emerging supervisors, especially women, to build a more diverse leadership pipeline.
