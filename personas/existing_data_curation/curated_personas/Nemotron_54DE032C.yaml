personas:
  professional: Reed Lee is a seasoned software quality assurance specialist who blends meticulous test design with a collaborative, people‑first mindset, using tools like Selenium, Cypress, and Playwright
    to drive reliable releases while championing team harmony; they thrive on structure but keep a relaxed outlook that lets flexibility shape their workflow.
  sports: Reed Lee cycles the Lakefront Trail several times a week, is a devoted fan of the Chicago Cubs and Chicago Bears, and participates in a local cycling club called Windy City Riders, where they
    blend competitive rides with social coffee stops.
  arts: Reed Lee plays acoustic guitar in a weekend jam circle, drawing inspiration from artists like Bob Dylan, The Lumineers, and Florence Welch, while also indulging in sci‑fi novels by Isaac Asimov
    and N.K. Jemisin during quiet evenings.
  travel: Reed Lee enjoys weekend road trips to Starved Rock State Park and the Upper Peninsula for hiking, dreams of exploring the fjords of Norway, but balances these ambitions with a modest travel budget
    that prioritizes family visits and occasional city breaks to New Orleans.
  culinary: Reed Lee perfects Chicago‑style deep‑dish pizza at home, experimenting with fresh mozzarella, Italian sausage, and caramelized onions, and also crafts seasonal pastries like apple streusel coffee
    cake, though they sometimes over‑salt the dough in pursuit of flavor.
  core: Reed Lee is a detail‑oriented QA lead‑in‑training who balances methodical test plans with a love for spontaneous pizza nights, late‑night board games, and the occasional bike‑ridden shortcut through
    Chicago’s windy shore.
background:
  cultural: Reed grew up in a middle‑class suburb of Chicago, raised by parents of German and Irish descent. His family traditions included weekend porch gatherings, holiday meals featuring classic Midwest
    dishes, and occasional trips to local cultural festivals that celebrated the city's ethnic diversity. Although he was baptized in a Catholic church, he now identifies as culturally secular, valuing
    the Midwestern ethos of friendliness, hospitality, and community involvement. Living in Chicago has exposed him to a rich tapestry of cultures, cuisines, and perspectives, which has shaped his inclusive
    outlook and his appreciation for collaborative environments both at work and in his personal life.
attributes:
  skills: '[''Manual functional testing'', ''Automated UI testing (Selenium, Cypress, Playwright)'', ''API testing (Postman, RestAssured)'', ''Python scripting'', ''JavaScript scripting'', ''Test framework
    development (PyTest, Jest)'', ''CI/CD integration (Jenkins, GitHub Actions)'', ''Performance testing (JMeter)'', ''Defect tracking (Jira, Azure DevOps)'', ''Quality metrics reporting'', ''Test documentation
    (test plans, test strategies)'', ''Agile Scrum participation'', ''Stakeholder communication'', ''Team mentorship and collaboration'']'
  hobbies: '[''Cooking (especially Chicago‑style deep‑dish pizza)'', ''Cycling along the Lakefront Trail'', ''Attending Chicago Cubs games'', ''Acoustic guitar jam sessions'', ''Volunteering at a food bank'',
    ''Reading sci‑fi and tech non‑fiction'', ''Board‑game nights'', ''Woodworking (building shelves, desk accessories)'']'
  career_goals: Reed aims to transition from an individual contributor to a leadership role within quality assurance. In the next three years he plans to earn the ISTQB Advanced Test Manager certification
    and step into a QA Lead position, overseeing test strategy for complex, regulated software projects. Long‑term, he envisions becoming a QA Manager or Director of Quality, driving organization‑wide shift‑left
    initiatives, championing accessibility and security testing, and shaping a culture of continuous improvement. He also aspires to mentor junior testers, contribute to industry conferences, and author
    articles on pragmatic testing approaches that balance rigor with flexibility.
