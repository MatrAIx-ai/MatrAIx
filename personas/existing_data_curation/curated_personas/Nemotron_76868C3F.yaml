  career_goals: Amy dreams of becoming a veterinarian because she loves animals and enjoys the practical, science‑based work of caring for them, and she looks forward to competing in school science fairs
    with pet‑care projects. She also imagines herself as a professional soccer player, attracted by the clear training schedules and the chance to measure her progress against teammates. Long‑term, she
    sees herself leading a community youth program where she can blend her love of structure, teamwork, and competition to help other kids develop confidence and resilience.
