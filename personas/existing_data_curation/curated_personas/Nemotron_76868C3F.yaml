personas:
  professional: Amy Vane is a budding soccer captain who thrives on clear rules and team structure, channeling their competitive streak into calm, decisive play while allowing enough flexibility to enjoy
    after‑school activities.
  sports: Amy Vane loves playing forward for the Oceanside Sharks youth soccer team and practices freestyle swimming at the local community pool, cheering loudly for the New York Islanders in winter and
    the New York Mets in summer, while also collecting beach shells for a personal fitness challenge.
  arts: Amy Vane spends weekends building intricate Lego sets guided by step‑by‑step manuals, crafting friendship bracelets while listening to upbeat pop tracks by Taylor Swift, and reading picture books
    aloud to friends, drawing inspiration from Disney’s The Little Mermaid.
  travel: Amy Vane enjoys family trips to the Atlantic shore at Jones Beach, weekend outings to Coney Island’s amusement park, and annual vacations to Washington, D.C., where they explore the Smithsonian,
    while dreaming of one day visiting the Caribbean islands for a snorkeling adventure.
  culinary: Amy Vane prefers classic cheese pizza and chicken nuggets for dinner, savors fresh strawberry watermelon salads at beach picnics, and enjoys mixing peanut butter with honey on toast for a quick
    snack, often helping parents stir chocolate chip cookie dough.
  core: Amy Vane is a structured yet spontaneous 7‑year‑old who balances a competitive edge in sports and games with a calm resilience that rarely lets setbacks dampen their spirit.
background:
  cultural: Amy is raised in a middle‑class white family in Oceanside, a suburban community on Long Island, New York. The local culture places a strong emphasis on academic achievement, participation in
    extracurricular sports and arts, and community involvement through neighborhood events, library programs, and beach activities. Family traditions include frequent weekend gatherings, holiday celebrations
    such as Thanksgiving and Christmas with a focus on shared meals and community charity drives, and participation in the town’s summer fairs and parades. Growing up near the Atlantic coast, she frequently
    experiences outdoor recreation like beach outings and park play, which blends with the region’s value on structured after‑school programs and organized youth sports.
