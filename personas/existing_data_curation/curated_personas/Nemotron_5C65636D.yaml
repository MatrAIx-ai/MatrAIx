personas:
  professional: Delaney Cormier, a budding junior artist and storyteller, channels their curiosity and love for fantasy into sketchbooks and Minecraft worlds, often improvising creative projects with spontaneous
    flair that sometimes outpaces school deadlines.
  sports: Delaney Cormier, an enthusiastic participant in the local youth soccer league and a fervent supporter of the Hickory Crawdads minor-league baseball team, channels their competitive spirit into
    after-school drills, though they sometimes skip warm-ups when excitement runs high.
  arts: Delaney Cormier, a budding illustrator who spends free time sketching fantasy characters influenced by the whimsical style of Hayao Miyazaki and the vivid colors of Claude Monet, eagerly devours
    the novels of J.K. Rowling and listens to Taylor Swift on repeat, drawing creative fuel from community art fairs and the Benton Museum’s rotating exhibits, and they often show new drawings to classmates
    during lunch.
  travel: Delaney Cormier, a curious 11-year-old whose family vacations blend weekend trips to the Great Smoky Mountains’ hiking trails with occasional visits to the historic Biltmore Estate, dreams of
    exploring Kyoto’s bamboo forests someday, preferring thoughtfully planned road trips over spontaneous outings because saving money for future adventures feels like a fun puzzle.
  culinary: Delaney Cormier, who relishes breakfast biscuits slathered with honey butter and enjoys the crunch of homemade fried chicken, often helps their grandparents knead cornmeal dough and experiment
    with mixing sweet potato puree into apple crumble, while occasionally daring to try sushi rolls after a school cultural night.
  core: Delaney Cormier, a fiercely imaginative 11-year-old with a penchant for spontaneous art projects and an ever-growing list of Minecraft kingdoms, balances a love of Southern fairs with a secret fear
    of missed deadlines, often juggling anxiety with endless curiosity.
background:
  cultural: Delaney comes from a white Southern family in Hickory, North Carolina, where community, family gatherings, and local traditions shape daily life. She participates in church events, enjoys Southern
    cuisine such as fried chicken and biscuits, and celebrates regional festivals like the North Carolina State Fair. The Appalachian foothills nearby inspire her love of nature and folk crafts, while her
    school and town provide a blend of rural values and modern media influences.
