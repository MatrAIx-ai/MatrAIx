  career_goals: Delaney hopes to become a multimedia artist who blends illustration, storytelling, and technology into immersive experiences. She aims to win regional art contests, earn a scholarship to
    a prestigious art program, and eventually work as a concept artist or game designer. In the near term she plans to build a portfolio, publish a short story in her school’s literary magazine, and deepen
    her coding skills through club projects.
