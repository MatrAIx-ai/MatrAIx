  career_goals: Rusudan aims to become a Certified Public Accountant (CPA) within the next three years, focusing on the public sector and educational institutions. She envisions a role where she can combine
    her accounting expertise with her background in education to manage budgeting and financial planning for schools or nonprofit educational programs. Long‑term, she aspires to a senior audit manager position
    that allows her to mentor newer accountants while maintaining a flexible schedule that supports her commitment to work‑life balance and community involvement.
