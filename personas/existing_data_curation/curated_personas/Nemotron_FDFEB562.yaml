personas:
  professional: Kyle Niederbrach is a budding robotics enthusiast who channels his love for routine and competition into building and programming precise model airplanes and simple school robots, and they
    often listen to classic rock while meticulously assembling each gear.
  sports: Kyle Niederbrach is a varsity midfielder for Ridge High School’s soccer team, a regular at the Coastal Beach Volleyball Club, an avid fisherman at Lake Clearwater, and they passionately support
    River City FC in Major League Soccer and the River City Bears in the NFL.
  arts: Kyle Niederbrach finds creative escape in painting and customizing model airplanes while blasting classic rock legends like Led Zeppelin, The Rolling Stones, and AC/DC, and they occasionally attend
    local high‑school theater productions to appreciate acting.
  travel: Kyle Niederbrach has taken road trips to the Atlantic beach town of Seaside and the mountain lakes of Montana for fishing, and they eagerly hope to venture to the Great Barrier Reef in Australia
    and the snow‑capped peaks of the Swiss Alps.
  culinary: Kyle Niederbrach enjoys fueling their active lifestyle with homemade chicken wraps, pepperoni pizza, and fish tacos topped with fresh cilantro, and they often experiment with grilling salmon
    on family camping trips, though they sometimes skip vegetables in favor of extra cheese.
  core: Kyle Niederbrach is an organized yet fiercely competitive teen who balances a love for team sports, meticulous hobby projects, and classic rock, while wrestling with anxiety and a habit of over‑planning.
background:
  cultural: Kyle was raised in a middle‑class, white American family in Bonita Springs, Florida. His upbringing blends the relaxed, outdoor lifestyle of Southwest Florida—frequent trips to the beach, fishing
    outings, and community events—with traditional suburban values emphasizing hard work, reliability, and community service. His family attends a local evangelical church and participates in volunteer
    activities such as beach clean‑ups and youth mentorship programs. While aware of the diverse cultures in Collier County, Kyle’s immediate cultural context reflects mainstream American suburban customs,
    with an appreciation for routine, practicality, and teamwork.
