  career_goals: Kyle aspires to a career in public safety, ideally as a firefighter or emergency medical technician, because he values structured routines, teamwork, and helping his community. He is drawn
    to the clear protocols, physical challenges, and sense of purpose these roles offer. He also keeps a secondary ambition to become a skilled automotive technician, allowing him to apply his practical
    mechanical interests while working in a stable, hands‑on environment. As he moves toward high school, he plans to explore related volunteer opportunities and introductory courses to build relevant experience.
