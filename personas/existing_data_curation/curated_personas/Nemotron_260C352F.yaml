personas:
  professional: Donna Macmillan, a seasoned concrete formwork specialist and heavy‑equipment operator, leverages their calm, resilient demeanor and compassionate mentorship to keep work sites orderly while
    guiding younger crew members through practical problem‑solving as they pursue a foreman or safety‑coordinator role.
  sports: Donna Macmillan stays active by joining the Orange County Senior Walking Club for brisk park strolls, cheering on the Los Angeles Dodgers at the stadium or on TV, and occasionally participating
    in a church‑organized softball league during spring.
  arts: Donna Macmillan channels their outgoing spirit through singing in their church choir, dancing to classic rock legends like The Beatles and Creedence Clearwater Revival at potluck gatherings, and
    attending the annual Orange County Art Walk to admire local painters.
  travel: Donna Macmillan favors short, family‑friendly road trips to California gems such as Santa Barbara and Big Sur, while also planning occasional Habitat for Humanity build‑away trips to the Southwest,
    balancing their love of scenic drives with the need for flexibility and modest budgeting.
  culinary: Donna Macmillan delights in preparing hearty family dishes like rosemary‑garlic roasted chicken, homemade lasagna layered with fresh basil, and classic meatloaf topped with ketchup, often humming
    to 1960s rock tracks while sprinkling in a pinch of nostalgic flavor.
  core: Donna Macmillan is a hands‑on, community‑driven former construction forewoman whose love of classic rock, garden chats, and spontaneous DIY fixes blend with a calm, slightly disorganized routine
    that keeps them both grounded and ever‑ready to lend a hand.
background:
  cultural: Donna grew up in post‑war suburban Orange County, raised in a white, middle‑class family with Irish and English roots. The era’s emphasis on hard work, self‑reliance, and community service shaped
    her practical, routine‑driven outlook. Regular church attendance and close‑knit neighborhood ties reinforced values of cooperation, compassion, and collective activity. Living in Placentia, a city known
    for its family‑oriented atmosphere, she internalized a blend of traditional American values and the collaborative spirit of the local construction boom, all of which continue to inform her daily life.
attributes:
  skills: '[''Concrete formwork'', ''Basic carpentry'', ''Heavy equipment operation (skid‑steer loader, backhoe)'', ''Blueprint reading (basic)'', ''Site safety enforcement'', ''On‑site problem solving'',
