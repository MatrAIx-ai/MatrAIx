  hobbies: '[''Neighborhood potlucks'', ''Church choir and fellowship'', ''Senior‑center bingo and card games'', ''Backyard gardening'', ''Brisk walks in local parks'', ''DIY home‑repair projects'', ''Cooking
    traditional family recipes'', ''Listening to classic rock (1960s‑1970s)'', ''Cheering on the Los Angeles Dodgers'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Donna’s primary goal at this stage is to translate her extensive hands‑on experience into a supervisory or safety‑focused position that offers a stable, familiar routine while granting more
    flexibility for family and community involvement. She hopes to become a foreman or site safety coordinator on residential projects in Orange County, and to formally lead regular Habitat for Humanity
    volunteer build days where she can pass her practical knowledge to younger workers, especially women interested in the trades. Ultimately, she aims to leave a lasting legacy of skilled mentorship and
    community service.
