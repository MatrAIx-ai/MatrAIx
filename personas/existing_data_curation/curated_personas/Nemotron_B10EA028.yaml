personas:
  professional: Alberto Surrency, a 21‑year‑old transportation safety inspector, blends meticulous vehicle‑inspection expertise with a curious embrace of emerging safety technologies, using his organized
    yet flexible style to keep inspection schedules on track while fostering cooperative communication with drivers and dispatchers.
  sports: Alberto Surrency enjoys weekend pick‑up basketball games with friends, follows the Houston Rockets and the Houston Astros avidly, and maintains his fitness by jogging along Gulf Coast trails and
    volunteering for beach clean‑ups, while also cheering on the Texas A&M Aggies during college football season.
  arts: Alberto Surrency frequently attends the Galveston Bay Music Festival, where he gravitates toward live blues acts like The Avett Brothers and Texas‑born singer‑songwriter Cody Jinks, and while he
    dabbles with a secondhand acoustic guitar at home, his primary artistic outlet is savoring the communal energy of local performances.
  travel: Alberto Surrency prefers low‑cost road trips along the Gulf Coast, having explored the Outer Banks and dreaming of a kayaking adventure in the Everglades, plans his journeys using discount travel
    apps, camps under the stars to stretch his budget, and balances his wanderlust with his full‑time inspection schedule.
  culinary: Alberto Surrency delights in grilling freshly caught Gulf snapper with lemon, Cajun seasoning, and garlic, cooks shrimp étouffée for friends on weekend gatherings, and often rewards himself
    with a brisket taco from a beloved local food truck after a long day of inspections.
  core: Alberto Surrency, a 21‑year‑old aspiring transportation safety professional, balances a detail‑driven work ethic with a restless curiosity for tech, spends weekends tinkering on engines or fishing,
    and sometimes forgets to charge his phone because he’s lost in thought over a new inspection gadget.
background:
  cultural: Alberto was raised in a middle‑class Anglo‑American family in League City, Texas, where Southern hospitality and a strong work ethic are core values. His upbringing emphasized respect for rules,
    community involvement, and practical problem‑solving, reflecting the broader Texas culture of self‑reliance and modesty. Exposure to the diverse Gulf Coast environment has given him an appreciation
    for the region's maritime heritage and the multicultural influences of neighboring Hispanic communities, shaping a worldview that blends traditional Texan values with an openness to new ideas.
attributes:
  skills: '[''Vehicle safety inspection'', ''Regulatory compliance interpretation'', ''Report writing'', ''Data entry and analysis'', ''Hazard identification'', ''Use of diagnostic inspection tools'', ''GIS
    mapping for route safety'', ''Customer service and communication'', ''Conflict resolution'', ''Time management'', ''Basic mechanical troubleshooting'', ''First aid certification'']'
  hobbies: '[''Fishing'', ''Coastal hiking'', ''DIY car maintenance'', ''Reading science and technology articles'', ''Playing video games'', ''Community volunteer clean‑up events'', ''Photography of local
    landscapes'', ''Playing acoustic guitar'', ''Attending local music festivals'', ''Casual basketball'']'
  career_goals: Alberto aims to earn the Certified Transportation Safety Professional (CTSP) credential within the next two years and eventually move into a senior supervisory role overseeing a team of
    inspectors for the Texas Department of Transportation. He plans to enroll in an associate program in transportation management to deepen his technical knowledge, with a long‑term ambition to shape regional
    safety policies and develop training modules that integrate the latest safety technologies while maintaining practical, field‑tested procedures.
