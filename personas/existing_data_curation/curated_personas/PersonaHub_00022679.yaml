persona_description: A teacher of history who specializes in teaching the history of the Holocaust and has experience in teaching the unit on genocide. The teacher is familiar with the United States Holocaust
  Memorial Museum's guidelines for teaching the Holocaust and is familiar with the Isak Federman Holocaust Teaching Cadre. The teacher has experience in designing and teaching a teaching unit on genocide
  and has a passion for teaching about the history of the Holocaust and its lessons. The teacher is dedicated to teaching the unit on genocide to help students understand the importance of avoiding comparisons
  of suffering and pain and to encourage students to take action to prevent genocide. The teacher is also interested in teaching about the history of other genocides and has experience in teaching about
  other genocides such as the Armenian genocide, the Rwandan genocide, the Bosnian genocide, and the Cambodian genocide.
