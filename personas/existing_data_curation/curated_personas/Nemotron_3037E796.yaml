personas:
  professional: Angel Barona, an accomplished biological scientist, blends deep expertise in molecular genetics, CRISPR-Cas9 genome editing, and bioinformatics with a natural curiosity and flair for storytelling,
    delivering engaging workshops and visual presentations that fuse scientific rigor with artistic illustration, while their sociable, talkative nature makes them a magnetic leader for interdisciplinary
    teams aiming to develop sustainable crop technologies for the Midwest.
  sports: Angel Barona's athletic routine centers on weekend hikes through the Sandhills, wildlife photography sessions that double as cardio, membership in a local trail‑running club, weekly salsa dancing
    classes that serve as social exercise, and avid support for the Nebraska Cornhuskers football team, drawing energy from both solitary and community‑based activities.
  arts: Angel Barona's artistic expression flourishes through watercolor botanical paintings reminiscent of Georgia O'Keeffe, participation in the Omaha Riverfront Art Festival, creation of scientific illustrations
    for grant proposals, and a playlist that often features Nina Simone and contemporary indie folk artists like Bon Iver, weaving visual and auditory inspiration into their daily life.
  travel: Angel Barona prefers curated travel experiences that blend scientific outreach with cultural immersion, having organized a field trip to Oaxaca to study heirloom corn varieties, trekked the Grand
    Canyon to photograph native flora, and planning a future visit to Kyoto's botanical gardens to explore traditional tea ceremony aesthetics, while balancing budget constraints with a love for spontaneous
    weekend road trips across the Midwest.
  culinary: Angel Barona's culinary adventures showcase a passion for Mexican cuisine fused with Midwestern flavors, routinely preparing dishes such as chipotle‑marinated pork carnitas topped with local
    sweet corn salsa, chilaquiles layered over creamy cheese curds, and mole sauce enriched with Nebraska honey and heirloom tomatoes, reflecting a moderate cooking skill level that delights friends at
    community potlucks.
  core: Angel Barona is a curious, sociable scientist‑artist who balances cutting‑edge genetics research with watercolor painting, community mentoring, and a perpetual worry about making every moment both
    productive and meaningful.
background:
  cultural: Angel was raised in a bilingual Mexican‑American household that celebrated traditions such as Día de los Muertos, family reunions, and Mexican culinary arts. Her parents emphasized the value
    of community (familismo) and education, which guided her toward a STEM career while maintaining deep ties to her heritage. Fluent in Spanish and English, she often bridges cultural gaps by translating
    scientific concepts for local Latino communities and participating in cultural organizations in Elkhorn. Her Mexican roots influence her collaborative, nurturing approach, and she incorporates elements
    of Mexican art and storytelling into her scientific presentations, reflecting a seamless blend of her cultural identity and professional passion.
attributes:
  skills: '[''Molecular cloning'', ''CRISPR-Cas9 genome editing'', ''Next‑generation sequencing'', ''Flow cytometry'', ''Cell culture'', ''Bioinformatics (R, Python)'', ''Grant writing'', ''Project management'',
    ''Science communication'', ''Scientific illustration'']'
  hobbies: '[''Watercolor painting'', ''Botanical illustration'', ''Hiking'', ''Wildlife photography'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''Science outreach volunteering'', ''Yoga'', ''Reading
    contemporary fiction'']'
  career_goals: Angel aims to lead an interdisciplinary research program that merges cutting‑edge plant biology with community‑focused sustainability initiatives. She envisions establishing a lab that not
    only advances resilient crop technologies for the Midwest but also serves as a training ground for underrepresented students, especially Latinx youth. By fostering collaborations between academia, industry,
    and local schools, she hopes to translate research into tangible benefits for Nebraska farmers while raising public science literacy through art‑infused outreach events. Ultimately, she aspires to become
    a recognized thought leader who bridges the gap between scientific inquiry, cultural heritage, and societal impact.
