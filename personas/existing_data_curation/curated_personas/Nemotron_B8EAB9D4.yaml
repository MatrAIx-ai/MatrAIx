personas:
  professional: Luis Santiagotorres is a budding digital illustrator and indie-game narrative enthusiast who blends sketching, storyboarding, and improvised theater techniques into school projects, leveraging
    a vivid imagination and a relaxed, often disorganized workflow while thriving on collaborative brainstorming sessions.
  sports: Luis Santiagotorres enjoys weekend hikes along the coastal trails of Marin County with the local youth hiking club, follows the San Francisco Giants and Golden State Warriors for entertainment,
    and participates in casual pick-up soccer games at school, though they rarely commit to a structured training regimen.
  arts: Luis Santiagotorres immerses themselves in creative expression by sketching in a battered notebook, curating a growing vinyl collection that includes Tame Impala, Phoebe Bridgers, and Mac DeMarco,
    writing experimental flash fiction in both English and Spanish, and performing improv sketches at school, drawing inspiration from the narrative depth of Night in the Woods and the visual style of Studio
    Ghibli.
  travel: Luis Santiagotorres prefers spontaneous road trips with friends, having already explored the rugged cliffs of Big Sur, the eclectic neighborhoods of Portland, and the historic streets of Oaxaca,
    while dreaming of backpacking through the Andes and attending a music festival in Austin next summer.
  culinary: Luis Santiagotorres loves helping with family kitchen rituals, especially preparing homemade tacos al pastor, guacamole seasoned with fresh lime, and chilaquiles topped with queso fresco, while
    also experimenting with making a perfect skillet-seared salmon and learning to bake sourdough bread on weekends.
  core: Luis Santiagotorres is a restless 15-year-old dreamer whose sketchbook is as messy as their schedule, constantly juggling art, indie music, and anxiety-induced worries about money and health.
background:
  cultural: Luis is a second‑generation Mexican‑American raised in Novato, California. At home he grew up speaking Spanish and celebrating Mexican traditions such as Día de los Muertos, family gatherings
    centered around homemade tamales, and listening to regional Mexican music. Living in the Bay Area has exposed him to a diverse, multicultural environment, influencing his artistic sensibilities with
    a blend of Mexican heritage and contemporary Californian culture. He attends a public high school that offers bilingual programs, which reinforces his fluency in both languages and his appreciation
    for cross‑cultural storytelling.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Conceptual sketching and abstract art'', ''Basic video editing (iMovie, Premiere Rush)'', ''Creative writing (speculative fiction)'', ''Bilingual
