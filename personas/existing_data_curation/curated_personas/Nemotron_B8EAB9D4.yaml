  hobbies: '[''Sketching and digital illustration'', ''Playing narrative-driven indie video games'', ''Listening to alternative/indie music'', ''Participating in school improv theater'', ''Hiking coastal
    trails in Marin County'', ''Cooking Mexican dishes with family'', ''Attending local cultural festivals'', ''Collecting vinyl records'', ''Writing short stories and poetry (English/Spanish)'']'
  career_goals: Driven by his love for novelty and abstract concepts, Luis aspires to study visual arts or animation at a university, eventually becoming a concept artist for video game or film studios
    where he can blend his cultural heritage with futuristic designs. He dreams of producing independent animated shorts that explore Mexican folklore through a modern, surreal lens. In the longer term,
    Luis hopes to create a community art space in the Bay Area that offers workshops for bilingual youth, fostering creative expression and cultural exchange.
