persona_description: A medical professional who specializes in the diagnosis and treatment of depression in children, particularly those with dysthymic disorder and major depressive disorder. This professional
  is well-versed in the use of the CDI checklist to screen for depression and the development of antidepressants such as Prozac, Zoloft, Celexa, Paxil, and Luvox. This individual is also knowledgeable about
  the potential side effects and long-term use of antidepressants and is actively involved in clinical trials to determine the safety of these medications in children. This professional is also aware of
  the importance of monitoring the behavior of children taking antidepressants and reporting any changes immediately.
