personas:
  professional: Jose Guzman, an aspiring civil engineer, channels his love for LEGO construction and puzzle‑solving into methodical design sketches, always keeping a tidy notebook of ideas and promising
    himself to follow through on every blueprint.
  sports: Jose Guzman, who spends Saturday afternoons in organized scrimmages with the Greenfield Rangers youth soccer team and proudly wears his City United jersey, enjoys the structured teamwork of small‑sided
    games while preferring the familiar familiarity of his neighborhood park.
  arts: Jose Guzman, a budding artist and musician, spends afternoons sketching the forest creatures from his adventure books, practicing simple melodies on his small keyboard to the rhythms of Bad Bunny
    and Yiruma, and proudly recites passages from Jules Verne while humming along to the songs of Taylor Swift.
  travel: Jose Guzman, who prefers meticulously planned weekend getaways with his family, has explored the nearby coastal boardwalk and the dinosaur exhibits at the regional museum, dreams of hiking the
    trails of Yellowstone National Park, and always packs a spare LEGO piece for the journey in case boredom strikes.
  culinary: Jose Guzman, a budding junior cook, loves the hands‑on tradition of helping his grandparents shape masa for pasteles using plantain leaves and seasoned pork, enjoys tasting the sweet caramel
    of flan, and can expertly whisk together a simple pasta sauce with garlic and tomatoes, though he sometimes sneaks extra candy into his pocket when no one is looking.
  core: Jose Guzman, an eight‑year‑old with a methodical mind, a compassionate heart, and a lingering worry about perfection, channels his curiosity into LEGO builds, soccer kicks, and caring for seniors,
    while occasionally losing focus over sweets and forgetting vitamins.
background:
  cultural: Jose’s cultural identity is rooted in his Puerto Rican heritage while growing up in Cicero, a suburb of Chicago with a vibrant Latino community. At home, Spanish is spoken alongside English,
    and family traditions such as celebrating Nochebuena, Día de los Reyes, and listening to bomba and plena music shape his daily life. Local community events at the parish and cultural center introduce
    him to salsa dancing and dishes like arroz con gandules and alcapurrias. His grandparents, who immigrated from Puerto Rico, share stories of island folklore, instilling pride and a strong sense of belonging.
    This blend of Caribbean culture and Midwestern environment influences his bilingual communication, love for food, and community‑oriented values.
