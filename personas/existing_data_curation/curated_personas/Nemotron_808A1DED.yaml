  career_goals: Jose dreams of a future where he can combine his compassion for others with his bilingual background. He aspires to become a community health educator or a pediatric nurse, using both English
    and Spanish to support families in his neighborhood. He also imagines designing safe, inclusive playgrounds as an engineer, reflecting his love for order and safety. In the short term, he sets goals
    to achieve strong grades, master reading fluency, and earn his first volunteer badge at the local public library.
