personas:
  professional: Jesus Orozco, a 37‑year‑old software engineer with over a decade of full‑stack and cloud experience, blends a practical, structured mindset with agile processes to deliver clean architecture,
    mentor multicultural teams, and steer toward a future leadership role in agri‑tech.
  sports: Jesus Orozco passionately supports Club América in Liga MX weekend viewings with friends, joins a local hiking club to explore the Sierra foothills, and occasionally laces up for a casual Saturday
    soccer match at the community park.
  arts: Jesus Orozco relaxes by playing acoustic guitar at family celebrations, devours sci‑fi novels by authors such as Liu Cixin, and alternates between listening to classic Mexican boleros by José Alfredo
    Jiménez and alternative rock from Radiohead.
  travel: Jesus Orozco balances regular weekend hikes in the Sierra foothills with a desire to visit international agri‑tech hubs, having toured Mendoza’s vineyards and planning a future trip to the high‑tech
    greenhouse farms of the Netherlands, while also dreaming of a culinary weekend in Oaxaca.
  culinary: Jesus Orozco’s kitchen showcases authentic Mexican fare—tamales, barbacoa, fresh salsa—and often features heirloom tomatoes and cilantro harvested from his own garden, with chiles en nogada
    as his favorite comfort dish, though he sometimes over‑spices his mole experiments.
  core: Jesus Orozco is a methodical tech leader who merges structured engineering with a love for gardening, Mexican cooking, and community mentorship, while juggling occasional back pain and a sweet tooth
    for extra‑spicy salsa.
background:
  cultural: Jesus grew up in a Mexican‑American household in California's Central Valley, where Spanish was spoken at home and Catholic traditions were observed. Family gatherings centered on shared meals,
    music, and celebrations such as Día de los Muertos, Christmas Posadas, and quinceañeras. He maintains strong ties with relatives in both the United States and Mexico, and his bilingual fluency allows
    him to navigate both cultures seamlessly. Core Mexican values of respeto, collectivismo, and hospitality shape his cooperative and harmonious personality. Living in Livingston—a community with a rich
    agricultural heritage and a blend of Latino and Anglo influences—he participates in local festivals and community service, often integrating his cultural heritage into his cooking, storytelling, and
    mentorship activities.
