  hobbies: '[''Gardening (vegetable & herb garden)'', ''Cooking Mexican family recipes'', ''Playing chess'', ''Hiking in the Sierra foothills'', ''DIY electronics projects (Raspberry Pi, Arduino)'', ''Reading
