  career_goals: Jesus aims to step into a technical leadership role—such as Engineering Manager or Director of Engineering—where he can shape product strategy, lead cross‑functional teams, and champion
    cloud‑native solutions for agriculture technology. Over the next five years he plans to earn advanced cloud certifications (AWS Certified Solutions Architect – Professional, Google Cloud Professional
    Data Engineer) and complete a leadership development program. He is committed to mentoring junior engineers, fostering a collaborative culture, and eventually contributing to a regional agri‑tech startup
    that leverages IoT and data analytics to promote sustainable farming, all while maintaining a healthy work‑life balance for his family and community involvement.
