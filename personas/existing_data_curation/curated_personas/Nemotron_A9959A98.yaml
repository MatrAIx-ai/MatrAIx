  career_goals: Looking ahead, Arthur aims to move from first‑line supervision to a regional sales manager role within the next three to five years, positioning himself to shape broader sales strategies
    across multiple markets. He plans to leverage his technical background to champion data‑driven initiatives, such as implementing AI‑assisted forecasting and advanced CRM analytics, while maintaining
    a focus on proven sales processes. His competitive nature drives him to set measurable performance targets for his teams, and his desire for mentorship pushes him to develop a structured coaching program
    that cultivates future sales leaders. Ultimately, he envisions using his blend of practical expertise and curiosity to either step into a director‑level sales enablement position or launch a consultancy
    that helps organizations optimize sales operations.
