  hobbies: '[''Reading contemporary YA fiction'', ''Listening to R&B and gospel music'', ''Sketching and digital illustration'', ''Journaling'', ''Walking in local parks'', ''Puzzle video games'', ''Volunteering
    at youth center'', ''Cooking family recipes'']'
  career_goals: Cecilia aims to complete her high school education with a strong academic record and earn a GED if needed, then pursue a community‑college certificate in mental‑health counseling or a nursing
    assistant program. She aspires to become a youth counselor or community health worker in Peoria, focusing on supporting peers who experience anxiety and depression. Long‑term, she hopes to develop mentorship
    programs at local schools, secure a scholarship to further her education, and achieve a stable career that allows her to give back to her family and community.
