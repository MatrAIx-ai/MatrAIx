personas:
  professional: Cecilia Williams, an aspiring digital illustrator, channels their love for contemporary young‑adult fiction and soulful music into vivid sketches and concept art, and they often use daily
    journaling as a compass through the emotional turbulence of teenage life.
  sports: Cecilia Williams enjoys calming jogs through the local park, follows the Chicago Bulls and Chicago Bears with enthusiastic game nights at home, and they also participate in their high school’s
    cross‑country team during the fall to combine structure with the therapeutic rhythm of steady running.
  arts: Cecilia Williams immerses themselves in the works of authors like Angie Thomas and Becky Albertalli while drawing inspiration from the soulful sounds of Leon Bridges, H.E.R., and Andra Day for their
    digital illustrations, and they channel these influences into after‑school art workshops at the community youth center where they mentor peers.
  travel: Cecilia Williams prefers low‑key getaways, having already taken a family road‑trip to Nashville to visit the Country Music Hall of Fame and a school field trip to Washington, D.C., and they now
    dream of wandering the historic districts of Savannah and the serene landscapes of the Canadian Rockies for a blend of culture and nature.
  culinary: Cecilia Williams delights in cooking soulful family dishes such as slow‑braised collard greens, buttery cornbread, and seasoned pork ribs alongside sweet potato pie, often honing their skills
    with their grandmother while experimenting with fresh thyme, smoked paprika, and a pinch of maple syrup to add a creative twist.
  core: Cecilia Williams balances a reflective, art‑driven inner world with bouts of intense anxiety, habitually turning to sketchbooks and soulful playlists for comfort, yet often succumbs to late‑night
    snack cravings and the urge to procrastinate on schoolwork.
background:
  cultural: Cecilia comes from a close‑knit African‑American family in Peoria, whose grandparents migrated from the South during the Great Migration. Her household blends Midwestern modesty with vibrant
    African‑American cultural traditions, including regular attendance at a Baptist church, participation in Juneteenth celebrations, and involvement in local Black History Month events. Family meals often
    feature soul‑food staples such as collard greens, cornbread, and seasoned pork, passed down through generations. This cultural backdrop instills values of resilience, community support, faith, and a
    deep appreciation for music and storytelling, shaping her perspective and ambitions.
attributes:
  skills: '[''Digital literacy'', ''Basic Microsoft Office and Google Docs proficiency'', ''Sketching and digital illustration'', ''Creative writing (poetry, journaling)'', ''Empathetic listening'', ''Simple
