  career_goals: Although retired, Dung aims to stay intellectually engaged and to give back to his community. He plans to mentor young students in STEM through local after‑school programs, document and
    share his family’s migration story, and spearhead a community workshop where seniors can learn basic home‑repair skills. He also hopes to learn about renewable energy technologies to retrofit his home
    and serve as a model for sustainable living in his neighborhood.
