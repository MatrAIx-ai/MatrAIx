  career_goals: Although retired, David aims to stay active and purposeful. He plans to mentor younger volunteers at the local community garden, share his wine knowledge at neighborhood tasting clubs, and
    perhaps compile a small memoir of his experiences growing up in the Napa wine region. He also aspires to travel to a few renowned wine regions abroad, using those trips to deepen his expertise and bring
    fresh ideas back to his local community. Maintaining good health, staying mentally sharp, and contributing to his family's well‑being remain top priorities.
