personas:
  professional: David Douglas is a retired Napa vintner who now mentors volunteers at the community garden and leads neighborhood wine‑tasting clubs; they apply their hands‑on problem‑solving skill set,
    woodworking know‑how, and a strategically structured yet flexibly spontaneous style to make every session both instructional and enjoyable.
  sports: David Douglas enjoys weekly hikes with the Napa Valley Hiking Club, plays occasional pick‑up tennis at the local community center, and cheers on the San Francisco Giants and Golden State Warriors;
    they favor low‑impact endurance activities that keep them agile without overexertion.
  arts: David Douglas spends quiet evenings immersed in classic jazz—spinning Miles Davis and John Coltrane—while flipping through historical non‑fiction by David McCullough and Erik Larson, and they regularly
    attend the Napa Valley Arts Festival to appreciate local painters and folk musicians.
  travel: David Douglas dreams of touring Bordeaux’s grand châteaux, Italy’s Tuscan vineyards, and Chile’s Maipo Valley, planning trips with meticulous itineraries yet leaving room for spontaneous cellar
    tours; they favor small‑group wine‑focused travel that blends cultural learning with relaxed leisure.
  culinary: David Douglas, an adept home chef, expertly prepares dishes like rosemary‑crusted lamb with roasted heirloom carrots, wild mushroom risotto, and coq au vin, always pairing them with his favorite
    Cabernet Sauvignon and using fresh herbs from his own garden; they relish sharing these meals at intimate dinner parties with friends.
  core: David Douglas is a meticulous yet easygoing wine enthusiast who balances disciplined budgeting with occasional splurges on rare vintages, never misses a bridge game, but they often misplace their
    gardening tools amid the hectic shuffle of daily routines.
background:
  cultural: David grew up as a baby‑boomer in mid‑20th‑century America, experiencing the post‑war optimism and the rise of suburban life. His white, middle‑class upbringing emphasized self‑reliance, practical
    skills, and a strong work ethic, values that carried into his adult life. Settling in Napa, he embraced the region’s wine culture and outdoor lifestyle, blending traditional American holidays with a
    Californian appreciation for fresh food, wine, and community gatherings. His worldview reflects a balance of independence, modest competitiveness, and a deep respect for family and local traditions.
