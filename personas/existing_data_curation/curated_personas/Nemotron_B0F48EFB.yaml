personas:
  professional: Tomas Hernandez, a seasoned logistics specialist, leverages 30+ years of warehouse operations expertise, mastery of Fishbowl and SAP WM, bilingual communication, and a calm, competitive
    mindset to drive process improvements while mentoring staff and pursuing a CSCP certification toward a future Warehouse Operations Manager role.
  sports: Tomas Hernandez enjoys weekend fishing at Lake Apopka, follows the Orlando Magic and Orlando City SC, participates in a local senior baseball league, and maintains a modest fitness routine of
    morning walks and occasional basketball pick-up games, balancing competitive spirit with relaxed enjoyment of team sports.
  arts: Tomas Hernandez finds creative release through salsa dancing to rhythms of Tito Puente and Celia Cruz, appreciates the guitar work of Carlos Vives, attends community theater productions of classic
    plays, and integrates the craftsmanship of woodworking with an appreciation for folk art by artists such as Fernando Botero.
  travel: Tomas Hernandez prefers road trips to coastal towns like Destin and cultural destinations such as Cartagena, enjoys planning itineraries that combine fishing excursions, visits to historic markets,
    and family reunions, yet balances travel aspirations with a semi-retired consultancy schedule and a moderate retirement budget.
  culinary: Tomas Hernandez expertly prepares traditional dishes like arepas, bandeja paisa, and empanadas using fresh cornmeal, chicharron, and plantain, delights in experimenting with homemade guava jam
    and aji sauce, and frequently hosts dinner gatherings where they showcase their woodworking-crafted serving platters.
  core: Tomas Hernandez blends a calm, competitive drive with a love for woodworking, salsa, and strategic logistics, navigating life with meticulous efficiency, occasional impulsive tool purchases, and
    a steadfast commitment to continuous learning.
background:
  cultural: Tomas grew up in a Colombian household where Spanish was spoken daily and family gatherings centered around music, dance, and hearty meals. He carries forward traditions such as celebrating
    Carnaval, Colombian Independence Day, and the strong communal bonds of the diaspora. His Catholic upbringing influences his values of respect and gratitude, while his love for cumbia, vallenato, and
    salsa music preserves his cultural rhythm. Bilingual fluency allows him to navigate both Colombian and American contexts seamlessly, and he frequently shares Colombian coffee and recipes with coworkers
    in Ocoee, Florida. Over the years, Tomas has blended his Colombian heritage with the laid‑back, multicultural atmosphere of Central Florida, creating a personal identity that honors his roots while
    embracing his adopted community.
attributes:
  skills: '[''Inventory Management'', ''Shipping & Receiving'', ''Warehouse Management Systems (WMS)'', ''Forklift Operation'', ''Cycle Counting'', ''Logistics Coordination'', ''Process Improvement'', ''Data
    Analysis & Reporting'', ''Bilingual Communication (Spanish/English)'', ''Training & Mentorship'', ''Supply Chain Documentation'', ''Problem Solving'', ''Time Management'', ''OSHA Safety Compliance'']'
  hobbies: '[''Woodworking'', ''Salsa Dancing'', ''Cooking Colombian Cuisine'', ''Fishing'', ''Reading about Logistics Technology'', ''Chess'', ''Gardening'', ''Volunteer Teaching English/Spanish'', ''Attending
    Local Baseball Games'']'
  career_goals: Tomas aims to translate his operational expertise into a supervisory or managerial role within logistics. Over the next two to three years he plans to earn a Certified Supply Chain Professional
    (CSCP) credential and complete a bachelor’s degree in Business Administration with a focus on supply chain management. His primary ambition is to become a Warehouse Operations Manager, overseeing a
    multi‑site distribution network, spearheading cost‑saving initiatives, and mentoring a team of clerks. Simultaneously, he is developing a part‑time consultancy to help small businesses in the Orlando
    area streamline their inventory processes, positioning himself for a semi‑retired advisory role that balances his curiosity for new logistics technologies with practical, results‑driven solutions.
