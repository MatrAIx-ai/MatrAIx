    community pool'']'
  career_goals: As she grows, Amaris dreams of becoming a marine biologist who protects Puerto Rico’s coastal ecosystems, especially the mangroves and coral reefs near Juncos. She combines her curiosity
    about the natural world with a practical desire to use technology, envisioning herself creating simple apps or data‑collection tools using the coding skills she’s developing. In the short term, she
    aims to join her school’s robotics club, attend science summer camps, improve her English, and earn a spot on the varsity soccer team. Long‑term, she hopes to lead community science projects that inspire
    other children, possibly studying environmental engineering or marine science at university while remaining grounded in her Puerto Rican heritage.
