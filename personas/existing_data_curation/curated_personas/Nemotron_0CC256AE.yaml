personas:
  professional: A budding technologist named Amaris Riveratorres merges a love for LEGO building with early coding in Scratch, applying a curious yet practical mindset to turn imaginative stories into interactive
    games, while their competitive streak drives them to showcase projects at school fairs and they reliably meet deadlines despite occasional procrastination.
  sports: A soccer enthusiast named Amaris Riveratorres plays forward for the Coastal Cubs Youth Soccer Club, where their competitive drive fuels a relentless pursuit of goals and a keen tactical eye, they
    also swim with the Little Dolphins Swim Team at the community pool, and they are an avid fan of the regional pro soccer team, the Hurricanes, often mimicking their star striker’s moves during playground
    games.
  arts: A vibrant performer named Amaris Riveratorres moves to the beats of Celia Cruz’s salsa classics and Daddy Yankee’s reggaeton hits during family parties, strums a ukulele to simple folk tunes like
    Jack Johnson’s "Better Together," builds intricate LEGO sculptures as a form of kinetic art, and loses themselves in adventure novels such as "The Magic Tree House" series, often reenacting scenes with
    friends, reflecting their outgoing nature and competitive flair for being the best storyteller.
  travel: An inquisitive explorer named Amaris Riveratorres spends weekends trekking the nearby mangrove boardwalk, collecting seashells while noting the different species, dreams of camping in Everglades
    National Park and visiting the historic forts of San Juan, and eagerly anticipates a family vacation to a Caribbean island where they can snorkel among coral reefs, balancing a practical budget set
    by parents with a love for spontaneous beach picnics.
  culinary: A budding chef named Amaris Riveratorres loves helping in the kitchen, especially preparing arroz con gandules with sofrito, rolling homemade empanadillas filled with cheese and ham, and blending
    tropical fruit smoothies with mango, pineapple, and a splash of coconut milk; though they occasionally over‑season dishes in a quest for bold flavors, they proudly serve their friends at school carnivals
    with mini taco bites and freshly baked chocolate chip cookies.
  core: Amaris Riveratorres is a spirited 9‑year‑old whose competitive edge fuels soccer triumphs, creative LEGO builds, and a skeptical yet curious outlook that drives them to explore nature, code stories,
    and juggle a piggy‑bank full of aspirations—and occasional candy‑induced bedtime chatter.
background:
  cultural: Amaris is a proud Puerto Rican from Juncos, a town known for its agricultural roots and close‑knit community. She grows up in a bilingual household where Spanish is spoken daily, but she also
    learns English at school and through media. Family gatherings and the annual fiestas patronales expose her to plena and bomba music, traditional dances, and local cuisine such as alcapurrias and pasteles.
    The island’s natural environment—beaches, mangroves, and the warm tropical climate—shapes her love for outdoor activities and marine life. Cultural values of familismo, respeto, and comunidad influence
    her sense of responsibility, while her exposure to both modern technology and traditional crafts gives her a balanced perspective on heritage and innovation.
