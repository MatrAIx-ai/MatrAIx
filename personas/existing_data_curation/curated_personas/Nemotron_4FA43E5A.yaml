  career_goals: Alana is focused on transitioning into a formal mentorship role at her store, becoming a dedicated cashier trainer who can pass on her decades of experience to new hires. She aims to maintain
    a part‑time schedule that preserves flexibility for volunteering and leisurely travel with her spouse, including a planned road‑trip to historic sites along the East Coast linked to her family’s genealogy.
    Additionally, she hopes to volunteer at the local senior centre’s food pantry, applying her budgeting and cash handling skills to help manage donations. A personal ambition is to compile a short memoir
    of her life in Loudoun County, preserving memories for future generations.
