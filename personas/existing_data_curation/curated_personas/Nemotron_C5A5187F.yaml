personas:
  professional: Traci Vansandt, a budding Lego architect, meticulously lines up blocks into tidy streets for her own miniature town, then fiercely competes with her brother to see whose tower reaches the
    highest, balancing her need for predictability with a spontaneous, flexible play style.
  sports: Traci Vansandt, a lively member of the Little Stars Soccer Club who loves sprinting across the local field on Saturday mornings, proudly dons a bright Dallas Cowboys cap during her community’s
    high‑school football games, and often competes to be the first to score, reflecting her competitive streak and love for team spirit.
  arts: Traci Vansandt, a budding crayon artist who recreates scenes from Bluey on index cards while humming Raffi’s ‘Bananaphone’ and occasionally dancing to upbeat Taylor Swift tracks, lets her imagination
    paint a vivid world that balances her need for routine with bursts of creative spontaneity.
  travel: Traci Vansandt, who loves packing her favorite stuffed armadillo for trips to her grandparents’ ranch in Lubbock and dreaming of a future Disney World adventure, prefers short, familiar drives
    over long flights, balancing a curiosity for new places with the comfort of her close‑knit family routine.
  culinary: Traci Vansandt, a picky‑eater who insists on crispy chicken nuggets drenched in honey‑BBQ sauce, chunky mac‑and‑cheese sprinkled with sharp cheddar, and a side of buttered corn, often helps
    whisk together a simple peanut‑butter‑jelly sandwich, reflecting a budding appetite shaped by family barbecues and familiar flavors.
  core: Traci Vansandt blends small‑town predictability with playful spontaneity, balancing a love for order, competitive bursts, and gentle skepticism into a bright, four‑year‑old’s everyday adventures.
background:
  cultural: Traci is raised in a white, middle‑class family in Amarillo, Texas, where the local West Texas culture blends small‑town Americana with strong community church ties, family barbecues, high school
    football weekends, and annual rodeo traditions; her upbringing emphasizes self‑reliance, hospitality, and a love for open‑range prairie landscapes, while also exposing her to mainstream American pop
    culture through television, music, and school activities.
attributes:
  skills: '[''drawing basic shapes'', ''coloring within lines'', ''counting to 20'', ''letter recognition'', ''reciting nursery rhymes'', ''following daily routines'', ''organizing toys'']'
