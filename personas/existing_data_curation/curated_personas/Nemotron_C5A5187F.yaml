    about farms'', ''matching card games'']'
  career_goals: She often pretends to be a classroom monitor who assigns tasks and makes sure everyone follows the rules, and she talks about becoming a teacher who creates a structured learning environment
    or a veterinarian who cares for animals with clear procedures; her competitive streak also fuels a dream of one day captaining a soccer team, while her skeptical side makes her imagine a future as a
    scientist who checks facts before accepting them.
