    ''Watching baseball (New York Yankees)'']'
  career_goals: Cesar aims to earn an HVAC certification and a journeyman electrician license within the next two years, positioning himself for a supervisory maintenance role in a large residential property
    management firm. He is also pursuing the Certified Maintenance Planner (CMP) credential to deepen his expertise in preventive‑maintenance strategy and energy‑efficiency initiatives. Long‑term, he hopes
    to launch a small, family‑owned contracting business that specializes in green retrofits and historic‑preservation repairs, allowing him to blend his technical skills with his love of art and community
    service.
