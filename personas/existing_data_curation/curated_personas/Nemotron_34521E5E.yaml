  career_goals: Looking ahead, Ernest aims to transition from day-to-day operations to a senior advisory role where he can mentor emerging managers and shape a more compassionate workplace culture. He hopes
    to launch a community-based mentorship program for young adults in Berrien County, leveraging his network to provide career guidance and emotional support. While mindful of his stress-prone temperament,
    he is also committed to improving his own work-life balance, pursuing professional development in mindful leadership, and eventually stepping back into a consulting capacity that allows him to share
    his expertise without the pressure of tight deadlines.
