  career_goals: Delosreyes aims to obtain a Certified Nursing Assistant (CNA) credential to formalize his expertise and qualify for supervisory roles within the assisted‑living facility. He hopes to lead
    a training program that emphasizes compassionate, patient‑centered care and cultural sensitivity. Over the next five years, he also wishes to explore geriatric specialty certifications, such as dementia
    care, and to spearhead community health workshops that blend his love of art with wellness education, using visual storytelling to reduce anxiety among seniors. Ultimately, he envisions a balanced role
    that allows him to mentor others while preserving the flexible schedule that helps him manage stress.
