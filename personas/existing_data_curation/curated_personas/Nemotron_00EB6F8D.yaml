  career_goals: Jennifer aims to enroll in a specialized high school with a strong visual arts program, followed by a college degree in visual storytelling or interactive media. She dreams of becoming a
    concept artist for video games or film, or eventually a curator of contemporary art who designs immersive exhibitions. She also hopes to leverage her organizational strengths to lead community‑based
    art initiatives and mentor younger students in creative projects.
