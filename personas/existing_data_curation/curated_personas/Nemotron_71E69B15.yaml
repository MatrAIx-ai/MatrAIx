  career_goals: Jose aims to transition into a senior leadership role where he can shape cultural and artistic initiatives at an organizational or community level, such as becoming a director of a cultural
    program or a nonprofit arts center. He is motivated to mentor emerging managers and to integrate emerging technologies—like virtual reality and digital storytelling—into community arts projects. In
    the longer term, he envisions establishing a consultancy that helps organizations bridge business objectives with cultural impact, while also authoring a book on the intersection of leadership, creativity,
    and Puerto Rican heritage.
