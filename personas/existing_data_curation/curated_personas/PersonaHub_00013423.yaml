persona_description: A manufacturing professional who is interested in exploring and implementing new and innovative manufacturing techniques for the production of complex three-dimensional shapes from
  flat sheets of thermoplastic material. They are likely to be seeking cost-effective solutions for larger components, with a preference for short lead-time and relatively low piece part cost. They may
  also be interested in the potential for vacuum forming to facilitate maintaining uniform wall thicknesses for particularly deep drawn shapes, as well as the ability to create unique and complex shapes
  with limited tooling. They may be drawn to the flexibility and versatility of vacuum forming, as well as its ability to produce high-quality components with minimal human intervention.
