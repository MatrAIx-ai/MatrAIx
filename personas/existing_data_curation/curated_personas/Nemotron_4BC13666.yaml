  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Walking her dog'', ''Participating in a small book club'', ''Volunteering at animal shelter'', ''Jogging and community runs'',
    ''Cooking seasonal meals'', ''Solving crossword puzzles'']'
  career_goals: Wendy aims to move into a regional sales management role where she can lead a team of representatives, mentor newer staff, and shape strategic sales initiatives for her company. She is interested
    in developing new market segments within the manufacturing sector and leveraging her analytical skills to refine pricing models. Long‑term, she envisions transitioning into a sales training or consultancy
    position, using her decades of hands‑on experience to help other firms improve their wholesale operations while maintaining a stable work‑life balance as she approaches retirement.
