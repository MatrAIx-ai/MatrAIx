personas:
  professional: Wendy Mccall is a senior wholesale sales strategist with a data‑driven mastery of Excel and CRM analytics, who expertly manages complex accounts, negotiates pricing with a competitive edge,
    and forecasts sales while applying healthy skepticism and calm composure to high‑pressure negotiations, positioning them as a natural leader poised for regional management.
  sports: Wendy Mccall channels their competitive spirit into jogging three times a week, regular participation in community 5 K charity runs, and avid support for the hometown baseball team, the River
    City Tigers, as well as following the national women's soccer league and the annual Boston Marathon as inspiration for their own fitness goals.
  arts: Wendy Mccall immerses themselves in historical fiction and mystery novels by authors such as Hilary Mantel, Ken Follett, and Agatha Christie, while savoring evenings spent listening to Beethoven’s
    symphonies and the soulful vocals of Norah Jones, and occasionally attending a community theatre production of 'Our Town' that fuels their appreciation for storytelling.
  travel: Wendy Mccall prefers meticulously planned solo trips that balance relaxation with quiet exploration, having already trekked the historic streets of Edinburgh, wandered through Kyoto’s cherry‑blossom
    gardens, and taken scenic drives along the Maine coastline to Acadia National Park, while budgeting each adventure to keep their retirement fund intact.
  culinary: Wendy Mccall enjoys cooking seasonal meals with a focus on fresh garden produce, often preparing herb‑roasted chicken with rosemary and thyme, butternut squash risotto with sage, and grilled
    salmon topped with dill and lemon, showcasing their intermediate culinary skill and penchant for wholesome, ingredient‑driven dishes.
  core: Wendy Mccall blends a pragmatic, data‑driven sales mind with a solitary, competitive streak, channeling their energy into meticulous budgeting, low‑impact jogging with their Labrador, and seasonal
    garden‑to‑table cooking.
background:
  cultural: Wendy grew up in a middle‑class, predominantly white neighborhood in Central Florida, shaped by a blend of Southern hospitality and mainstream American values. Her family background includes
    Irish and English ancestry, and she was raised with an emphasis on self‑reliance, independence, and community involvement. While she celebrates typical U.S. holidays such as Thanksgiving and the Fourth
    of July, she prefers intimate family gatherings over large events. Her cultural upbringing reinforces a practical outlook, a respect for tradition, and a modest, yet competitive, approach to both personal
    and professional life.
attributes:
  skills: '[''Wholesale account management'', ''Customer relationship building'', ''Negotiation and pricing strategy'', ''Data analysis and sales forecasting'', ''Territory planning and logistics coordination'',
