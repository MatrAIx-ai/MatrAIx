  career_goals: Kirel aims to channel his curiosity and practical mindset into a future career in engineering, with a particular interest in robotics and software development. He plans to earn a scholarship
    to a specialized STEM high school in New York, compete in regional robotics competitions, and eventually study computer science or mechanical engineering at a top university. He envisions creating technology
    that solves real‑world problems in his community, such as automated recycling systems for Brooklyn neighborhoods, while maintaining a competitive edge that pushes him to be among the top performers
    in his field.
