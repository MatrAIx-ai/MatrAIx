persona_description: A seasoned tax professional with expertise in GST implementation and compliance. The person has a deep understanding of the GST law and its application in supply chain optimization,
  pricing, and invoicing. They have successfully completed the GST certification course and are now certified as a GST Certified Practitioner. The person is highly skilled in assisting taxpayers in applying
  for GST registration, canceling the registration, claiming monthly, quarterly, and yearly returns, and paying taxes on the taxpayer's behalf. Additionally, the person can represent taxpayers in front
  of a member of the GST body, making them a valuable resource for businesses looking to comply with the GST law.
