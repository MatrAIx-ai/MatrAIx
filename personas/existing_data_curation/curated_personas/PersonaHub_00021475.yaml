persona_description: A window and door manufacturer who specializes in the development of superior impact glass and curtainwalls. He is highly knowledgeable about the latest standards and testing requirements
  for storm shelters and tornado-resistant buildings. He has experience in working with AAMA standards and has recently introduced the first curtainwall to pass all testing requirements for ICC 500-08,
  ICC/NSSA Standard for the Design and Construction of Storm Shelters. He is also aware of the recent trend towards investing in hurricane- and tornado-resistant building categories that save lives and
  has suggested that a similar program should exist to encourage premium dollars to invest in these categories.
