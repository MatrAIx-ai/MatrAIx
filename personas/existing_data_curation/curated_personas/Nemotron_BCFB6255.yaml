personas:
  professional: Kelley Fisher is a budding LEGO architect who meticulously plans and constructs imaginative castles, using color‑coded bricks and a notebook of designs, which showcases their balance of
    curiosity and practicality while nurturing an early sense of engineering.
  sports: Kelley Fisher plays forward on the Greenfield Cubs soccer team and joins family hikes in the nearby woods, also enjoys a Saturday morning swim at the community pool and cheers for the River Runners
    junior baseball squad, favoring low‑key, nature‑centric activities and small‑group teamwork.
  arts: Kelley Fisher loves drawing whimsical animals after reading Eric Carle’s The Very Hungry Caterpillar picture book, sings along to The Wiggles while building their dollhouse, and stages elaborate
    tea‑party performances, illustrating how visual and musical creativity shape their quiet, imaginative world.
  travel: Kelley Fisher has explored the local state park’s creek and dreams of visiting Muir Woods to see towering redwoods, prefers camping under the stars over bustling theme parks, and looks forward
    to a weekend trip to the city’s Children’s Museum, blending a love for quiet nature and structured discovery.
  culinary: Kelley Fisher relishes homemade mac and cheese with extra cheddar, enjoys carrot sticks dipped in hummus sourced from the garden they tend, can confidently make a peanut‑butter‑banana sandwich,
    yet often leaves a few peas on their plate.
  core: Kelley Fisher blends quiet curiosity with gentle compassion, building LEGO forts by day, saving pennies by night, and caring for friends while quietly navigating the world through nature, art, and
    thoughtful habits.
background:
  cultural: Kelley grows up in a typical small‑town setting in Northumberland, Pennsylvania, surrounded by a close‑knit community that values family gatherings, seasonal festivals like Fourth of July fireworks,
    and local school events. Her household reflects mainstream American middle‑class traditions with occasional exposure to regional Pennsylvania customs such as autumn harvest celebrations and community
    church activities, fostering a sense of belonging, cooperation, and respect for local heritage.
attributes:
  skills: '["Reading simple chapter books", "Basic writing and spelling", "Fine‑motor coordination (drawing, cutting, LEGO building)", "Empathetic listening and comforting peers", "Organizing school supplies
