personas:
  professional: Caridad Riveragonzalez, an experienced postsecondary educator specializing in Latin American literature, blends meticulous curriculum design, bilingual instruction, and successful grant‑writing
    with a kind, cooperative demeanor, structuring interdisciplinary programs that balance practicality and flexibility while fostering inclusive community partnerships.
  sports: Caridad Riveragonzalez stays fit by dancing salsa and cumbia at community socials, hiking with the Austin Hill Country Hikers club on weekends, and supporting Austin FC soccer matches, balancing
    a structured exercise routine with spontaneous dance outings.
  arts: Caridad Riveragonzalez cultivates a vibrant artistic life, playing acoustic guitar while listening to Silvio Rodríguez and Atahualpa Yupanqui, attending Austin Film Festival screenings of Alejandro
    González Iñárritu’s films, and enjoying theatrical productions at The Long Center that adapt magical‑realist narratives.
  travel: Caridad Riveragonzalez prefers thoughtfully planned journeys, spending long weekends exploring Hill Country vineyards and taking extended trips to culturally rich cities such as Mexico City, Buenos
    Aires, and a historic Andean capital, always seeking literary festivals, local markets, and opportunities for community engagement.
  culinary: Caridad Riveragonzalez delights in weekly cooking sessions, skillfully preparing traditional arepas, empanadas, and sancocho using fresh cilantro, cornmeal, plantains, and a variety of herbs,
    while occasionally experimenting with exotic spices like ají dulce and sharing the meals with family and friends.
  core: Caridad Riveragonzalez merges scholarly rigor with cultural vibrancy, balancing structured academic leadership, prudent financial habits, active community involvement, and a zest for dancing, cooking,
    and lifelong learning, all while habitually staying up late to finish novels.
background:
  cultural: Caridad was born and raised in Colombia before moving to the United States in her early thirties. She retains a strong connection to Colombian traditions, language, and family values, which
    she weaves into her daily life and professional practice. Maintaining bilingual fluency, she celebrates Colombian holidays such as Día de la Independencia and Carnaval de Barranquilla, often sharing
    these traditions with her students and neighbors in Austin. She actively participates in the city’s Latinx community, attending cultural events, supporting local Colombian entrepreneurs, and serving
    on a cultural advisory committee that promotes Latino heritage. Her upbringing emphasized communal harmony, respect for elders, and a pragmatic approach to challenges, shaping her collaborative teaching
    style and her desire to create inclusive, structured learning environments that honor cultural diversity.
attributes:
  skills: '[''Latin American Literature'', ''Bilingual Teaching (Spanish/English)'', ''Curriculum Development'', ''Classroom Management'', ''Academic Advising'', ''Learning Management Systems (Canvas, Blackboard)'',
    ''Online Instructional Design'', ''Grant Writing'', ''Community Outreach'', ''Scholarly Research'', ''Mentorship'', ''Intercultural Pedagogy'']'
  hobbies: '[''Reading contemporary Colombian fiction'', ''Cooking traditional Colombian dishes'', ''Salsa and cumbia dancing'', ''Hiking in the Texas Hill Country'', ''Volunteer tutoring for Spanish‑speaking
    adults'', ''Playing acoustic guitar'', ''Attending local theater and film festivals'', ''Gardening with native herbs'']'
  career_goals: Caridad aims to advance into a departmental leadership role, such as chair or program director, to launch a new interdisciplinary Latin American Studies minor that integrates Colombian literature
    with contemporary social issues. She intends to secure external funding—particularly from the NEH or Mellon Foundation—for a community‑based oral‑history project documenting the experiences of Colombian
    immigrants in Austin. Over the next five years she plans to publish a scholarly monograph on magical realism in Colombian literature, mentor at least three junior faculty members, and expand her online
    course offerings to reach Spanish‑speaking learners worldwide. In the longer term, she envisions transitioning to part‑time teaching while continuing to lead community workshops, serve on city cultural
    advisory boards, and promote culturally responsive education within the region.
