  career_goals: In the next few years, Paula aims to move from first‑line supervision to a regional sales management role, overseeing multiple teams across the Mid‑Atlantic. She plans to deepen her analytical
    expertise by completing a professional certification in sales analytics and eventually pursuing an MBA focused on strategic management. Her long‑term ambition is to become a director of sales operations,
    where she can shape large‑scale sales strategies, mentor emerging leaders, and drive process innovations that improve revenue efficiency. Paula also hopes to champion a formal mentorship program within
    her organization to support employee development.
