  career_goals: She aims to become a certified journeyman sheet‑metal worker within the next two years, then move into a supervisory role where she can mentor new apprentices and streamline shop workflows.
    In the longer term, Nicole hopes to open a small custom metal‑art studio that blends practical fixtures with decorative pieces for residential clients, allowing her to combine her technical expertise
    with her love of social interaction and community projects. She also plans to complete an associate’s degree in manufacturing technology to broaden her career options and secure a stable, predictable
    schedule that supports her mental‑health needs.
