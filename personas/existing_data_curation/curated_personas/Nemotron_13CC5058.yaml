  career_goals: Although retired, Angel Teresa aims to mentor younger members of the Dominican community in Queens, preserve cultural traditions through intergenerational workshops, and volunteer as a cultural
    liaison at the local senior center. She hopes to compile a memoir documenting her family's migration story and contribute recipes to a community cookbook, fostering a sense of heritage among newer immigrants.
    Additionally, she seeks to support local initiatives that provide structured activities for seniors.
