personas:
  professional: Angel Castellanos, a retired clerical administrator with three decades of service at a community health center, channels their detail‑oriented record‑keeping and bilingual fluency into mentoring
    younger volunteers, ensuring that senior programs operate with the predictable structure and compassionate efficiency they value.
  sports: Angel Castellanos enjoys gentle morning walks around the local park, participates in a senior tai chi class at the community center each Thursday, and follows the New York Mets during baseball
    season, but they steer clear of high‑impact sports, preferring low‑stress activities that fit their reserved lifestyle.
  arts: Angel Castellanos finds solace in the melodies of classic bachata and merengue, frequently listening to artists such as Juan Luis Guerra and Aventura while they also relish historical novels by
    Isabel Allende and playwrights from their island heritage, and they volunteer to knit blankets for church outreach, blending creative expression with community service.
  travel: Angel Castellanos prefers low‑key, family‑oriented trips, having revisited their ancestral island twice to reconnect with relatives, explored historic Old San Juan for its colonial charm, and
    dreams of a relaxed cruise along the Mediterranean coast that balances cultural immersion with the predictability of a guided itinerary.
  culinary: Angel Castellanos excels at preparing traditional island dishes such as sancocho, mangú, and pastelitos, seasoning them with fresh basil, cilantro, and hot peppers from their balcony garden,
    and they relish sharing these meals at community gatherings while modestly improvising recipes when ingredients are scarce.
  core: Angel Castellanos blends meticulous organization with a warm, community‑focused heart, turning routine record‑keeping into mentorship, preserving heritage through cooking, and navigating senior
    life with gentle resilience and a penchant for herb‑laden soups.
background:
  cultural: Angel Teresa is a first‑generation Dominican American who grew up in a tight‑knit immigrant neighborhood in the South Bronx before relocating to Jamaica, Queens. Her upbringing emphasized family
    loyalty, Catholic faith, and the preservation of Dominican customs such as celebrating Carnaval, sharing communal meals like arroz con pollo, and observing religious holidays with processions and festive
    foods. Bilingualism has been central to her identity, enabling her to serve as a bridge between elder Dominican residents and younger English‑speaking generations. Her cultural values of harmony, respect,
    and community service guide her daily interactions and volunteer commitments.
