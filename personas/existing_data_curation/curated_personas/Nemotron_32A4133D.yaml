  career_goals: Melvin aims to transition from day‑to‑day site oversight to a strategic leadership role where he can shape the firm’s long‑term direction. Over the next five years he plans to earn PMP and
    LEED Accredited Professional certifications, positioning himself to lead large‑scale sustainable projects and to serve as the company’s safety and quality champion. He is motivated to mentor the next
    generation of construction managers, building a small internal cohort that reflects his preference for tight‑knit teams. Ultimately, he envisions launching a boutique consultancy focused on lean, low‑stress
    construction workflows and green retrofits for suburban clients in New Jersey, allowing him to leverage his curiosity for new methods while preserving the practical, flexible approach that defines his
    career.
