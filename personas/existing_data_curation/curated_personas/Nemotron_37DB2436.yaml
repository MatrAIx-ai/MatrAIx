    protocols", "Team leadership and apprenticeship mentorship"]'
  hobbies: '["Surfing at Lanikai Beach", "Hiking Koʻolau ridge and volcanic trails", "Electronics tinkering and custom LED projects", "DIY home improvement", "Volleyball league participation", "Neighborhood
    clean‑up volunteering", "Landscape photography", "Attending local live music events"]'
  career_goals: Nicholas aims to obtain his master electrician license within the next two years and to deepen his expertise in renewable energy installations, particularly solar and battery storage solutions
    that support Hawaii’s sustainability goals. He aspires to lead a small, family‑owned contracting firm that emphasizes quality, safety, and community involvement. To further his credibility, he plans
    to earn the NABCEP PV Installation Professional credential. Long‑term, he envisions mentoring apprentices, integrating his structured approach to training while fostering collaborative work environments,
    and eventually expanding his business to include comprehensive green‑energy consulting services.
