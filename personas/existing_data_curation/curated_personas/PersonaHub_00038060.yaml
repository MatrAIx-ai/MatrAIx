persona_description: A British aristocrat and socialite who was known for his eccentric dress sense, paradoxical wit, and literary career. He was friends with the painter Whistler and engaged to a pretty
  but conventional daughter of an Irish barrister, Constance Lloyd, with whom he had two sons, Cyril and Vyvyan. He wrote short stories, novels, and critical essays, and his literary works established his
  reputation in the world of letters. He was also a popular figure in the theater, writing popular social comedies that made him famous. He was friends with the handsome, talented, spoiled, unstable Lord
  Alfred Douglas, who was known for his "slim gilt soul walks between passion and poetry" and who was involved in a scandal involving blackmail and harassment.
