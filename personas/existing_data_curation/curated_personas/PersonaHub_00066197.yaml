persona_description: A legal expert who specializes in the study of international law, particularly the Convention on the Prevention of Marine Pollution by Dumping of Wastes and Other Matter 1972, commonly
  called the "London Convention" or "LC '72". She is knowledgeable about the history, structure, and implementation of the Convention, and is skilled in interpreting its provisions and applying them in
  practice. She is also familiar with the roles and responsibilities of the Commissioner of the Convention, the International Maritime Organization (IMO), and the Consultative Meeting of the Contracting
  Parties to the Convention.
