  career_goals: Jeanene aims to expand her impact by establishing a boutique architecture practice focused on sustainable, culturally resonant projects that integrate public art. She aspires to lead a regional
    historic preservation initiative on Cape Cod, secure LEED certification for multiple developments, and mentor emerging women architects. In the long term, she hopes to author a book exploring the intersection
    of architectural design, the humanities, and community storytelling, and to serve on the board of the local historic commission.
