personas:
  professional: Jeanene Anderson, a 50‑year‑old architect who seamlessly blends advanced BIM expertise with a passion for historic preservation, channels her curiosity and occasional emotional intensity
    into designing sustainable, culturally resonant projects that often feature community‑driven art installations, while balancing meticulous organization with spontaneous creative problem‑solving.
  sports: Jeanene Anderson sails regularly with her husband as a member of the Harwich Yacht Club, enjoys weekend jogs along the Cape Cod Rail Trail, supports the Boston Red Sox and the Boston Pride women’s
    soccer team, and participates in a local community garden fitness group that blends light strength training with vegetable tending.
  arts: Jeanene Anderson spends her leisure hours painting Cape Cod seascapes, sketching historic lighthouses, curating site‑specific installations for the Harwich Historical Society, attending contemporary
    art openings featuring artists like Anselm Kiefer, and listening to poetry readings where she particularly enjoys the works of Mary Oliver and Wallace Stevens.
  travel: Jeanene Anderson favors heritage‑focused travel, having explored Colonial Williamsburg, the historic districts of Boston, and European gems such as Florence and Kyoto, while dreaming of a future
    trip to Iceland’s volcanic landscapes to photograph geothermal formations and integrate them into her design inspirations, always planning trips around museum exhibitions and local festivals within
    her modest travel budget.
  culinary: Jeanene Anderson delights in farm‑to‑table cooking, regularly preparing dishes like roasted heirloom tomatoes with basil, clam chowder made from freshly harvested shellfish, rosemary‑infused
    focaccia, and seasonal vegetable medleys from her garden, complementing meals with a glass of local New England white wine and occasionally indulging in a late‑night slice of pecan pie after a gallery
    visit.
  core: Jeanene Anderson merges architectural precision with artistic curiosity, turning anxiety into meticulous sustainable designs, while finding balance through sailing, gardening, spontaneous poetry
    readings, and a penchant for occasional indulgent art purchases.
background:
  cultural: Jeanene’s cultural background is rooted in a multi‑generational New England lineage. Growing up in a coastal Massachusetts community, she was immersed in the region’s maritime heritage, colonial
    architecture, and tradition of community involvement. Her French‑American ancestry, reflected in her middle name Reneau, adds a layer of appreciation for European art and literature. Her humanities
    education reinforced a deep respect for cultural preservation, which she brings into her architectural practice. She celebrates typical New England holidays and participates in local traditions while
    maintaining an open‑minded curiosity toward global artistic movements.
