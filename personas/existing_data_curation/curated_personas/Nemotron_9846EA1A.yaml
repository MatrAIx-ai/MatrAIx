  career_goals: Gregory aims to transition from senior developer to a technical leadership role, such as Lead Architect or Engineering Manager, where he can shape the architectural roadmap for large‑scale,
    mission‑critical systems. He plans to deepen his expertise in cloud‑native design, earn an AWS Solutions Architect Professional certification, and possibly pursue a master's degree in Computer Science
    or an MBA to blend technical depth with strategic business insight. Over the next five years, he wants to spearhead initiatives that improve development workflow efficiency, champion a culture of rigorous
    code quality, and mentor a growing team of engineers while maintaining a work‑life balance that supports his family.
