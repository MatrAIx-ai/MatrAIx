  career_goals: Although she is not seeking paid employment, Debora aims to deepen her impact in the community. She aspires to serve on the board of the local senior center, lead a neighborhood garden program,
    and mentor younger volunteers in organizing charitable events. Additionally, she plans to complete a short online course on digital tools for non‑profit management to enhance her effectiveness. In the
    longer term, she hopes to launch a small home‑catering service for community gatherings, blending her love of cooking with her organizational strengths.
