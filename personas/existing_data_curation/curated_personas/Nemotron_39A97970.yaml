  hobbies: '[''Abstract painting'', ''Reading historical biographies and philosophy'', ''Home gardening'', ''Cooking and recipe experimentation'', ''Participating in small art workshops'', ''Knitting circle'',
    ''Crossword and Sudoku puzzles'', ''Listening to Latin folk music and jazz'', ''Visiting museums'']'
  career_goals: In the coming years Yaima intends to preserve and share her cultural legacy while expanding her own creative horizons. She plans to compile a bilingual cookbook that blends classic Salvadoran
    recipes with contemporary nutritional insights. She also aims to record oral histories of Salvadoran immigrants in Somerville, creating an archival collection for the local library. By mentoring younger
    seniors in craft workshops, she hopes to foster intergenerational skill sharing. Yaima dreams of curating a small exhibition of community artwork, integrating Salvadoran motifs with abstract contemporary
    forms, at the Somerville public library. Continuing her self‑directed education, she plans to enroll in online art‑history courses and to maintain her mental sharpness through daily puzzles. Ultimately,
    she seeks to remain independent, emotionally stable, and actively engaged in her neighborhood’s cultural life.
