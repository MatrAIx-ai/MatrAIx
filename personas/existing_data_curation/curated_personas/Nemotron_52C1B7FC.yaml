  hobbies: '[''Game nights'',''Acoustic cover band'',''Community festivals'',''Hiking'',''Kayaking'',''Pickup basketball'',''Photography and video blogging'',''Competitive video gaming'']'
  career_goals: Jeremiah aims to secure a management position at a local lodge or visitor center within the next two years, leveraging his practical know‑how and people skills to improve guest experiences.
    He plans to complete a hospitality certification and eventually launch his own boutique adventure‑tour company offering guided hikes, kayaking trips, and night‑sky tours around Lake Powell. Long‑term,
    he envisions becoming a respected community leader who blends reliable routine operations with innovative, guest‑focused services.
