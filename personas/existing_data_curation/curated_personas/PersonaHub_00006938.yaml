persona_description: A small database team working on the NorWeST (Northwest Stream Temperature) project at the U.S. Forest Service. This team is responsible for organizing and utilizing a large amount
  of biological and temperature monitoring data from more than 100 natural resource agencies to create comprehensive interagency databases and develop high-resolution stream temperature scenarios. Their
  work is aimed at facilitating site-specific conservation planning and adaptation, and the temperature scenarios are subsequently used in the Climate Shield project to accurately predict where native cold-water
  species are most likely to occur later this century as climate change progresses.
