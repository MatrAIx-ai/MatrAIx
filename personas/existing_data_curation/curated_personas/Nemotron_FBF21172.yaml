  hobbies: '["building with wooden blocks/Duplo", "backyard nature exploration (collecting leaves, stones, bugs)", "reading picture books", "listening to children’s music", "small‑group playdates"]'
  career_goals: Although only three years old, Johan already talks about helping animals and keeping gardens tidy. He dreams of becoming a veterinarian or a farmer one day, roles that combine his caring
    nature, curiosity about living things, and practical love for order. He also expresses a desire to learn how to read more books, build bigger structures, and later contribute to his community by keeping
    things organized and safe.
