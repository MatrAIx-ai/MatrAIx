personas:
  professional: Johan Spurlin, a budding mini-architect, they channel early curiosity and practicality by meticulously building wooden block towers that follow both inventive designs and stable foundations,
    a solitary yet reliable approach that hints at future design expertise.
  sports: Johan Spurlin, a tiny member of the Little Lions toddler soccer club and an avid fan of the New York Yankees, they spend afternoons kicking soft foam balls in the park while cheering on televised
    baseball games, preferring the structured camaraderie of small team play over large crowds.
  arts: Johan Spurlin, who delights in drawing picture-book characters like Curious George and humming the Sesame Street theme, they frequently reenact scenes from Pixar's Toy Story starring Tom Hanks,
    using art as a calming outlet for their reserved nature.
  travel: Johan Spurlin, whose family vacations include weekend trips to the local aquarium and a sunny week at a Florida beach, they dream of exploring the towering castles of Neuschwanstein in Germany
    and the bright coral reefs of the Great Barrier Reef, favoring relaxed, family-centered itineraries over bustling tourist hotspots.
  culinary: Johan Spurlin, a picky yet adventurous eater, they prefer soft macaroni and cheese flavored with cheddar, peanut butter and jelly sandwiches on whole-grain bread, and snack-time bites of apple
    slices sprinkled with cinnamon, often insisting on arranging food in neat rows before licking the plate.
  core: Johan Spurlin, combining a toddler's innate curiosity with a surprisingly methodical streak, they quietly arrange toys while worrying about losing favorite pieces, a blend that makes them both a
    lovable solitary explorer and a gentle, sometimes overly cautious, little planner.
background:
  cultural: Johan is being raised in Lancaster, a small rural community in Grant County, Wisconsin, where his family’s roots trace back to Northern European (German and Scandinavian) farming traditions.
    The local culture emphasizes modesty, practicality, community cooperation, and a strong connection to the land. Seasonal events such as county fairs, harvest festivals, and church gatherings reinforce
    values of harmony, hard work, and care for neighbors, all of which shape Johan’s gentle, cooperative personality.
