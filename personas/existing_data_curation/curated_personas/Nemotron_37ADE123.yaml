  hobbies: '[''Visiting contemporary art galleries'', ''Sketching scientific concepts'', ''Photography (urban and macro)'', ''Playing jazz saxophone'', ''Reading speculative fiction'', ''Chess'', ''Long-distance
    running'', ''Cooking African-diaspora cuisine'', ''Mentoring high school STEM students'']'
  career_goals: David aims to become a tenured principal investigator at a leading research university or biotech firm, leading a multidisciplinary lab focused on translating genome-editing technologies
    into therapies for under‑served populations, particularly sickle cell disease and other hematologic disorders prevalent in the Black community. He seeks to secure multi-year NIH and private foundation
    funding, publish in top-tier journals, and build collaborations that blend scientific rigor with creative communication. Additionally, he aspires to mentor the next generation of Black scientists and
    develop outreach programs that combine art and science to engage broader audiences.
