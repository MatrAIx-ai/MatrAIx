personas:
  professional: David Bannister, a 31‑year‑old medical scientist specializing in CRISPR gene editing and bioinformatics, leverages rigorous experimental design, disciplined project management, and a vivid
    artistic eye to craft compelling grant proposals and insightful visual data narratives while mentoring junior lab members.
  sports: David Bannister, a dedicated half‑marathon runner who logs 40‑plus miles a week with the Baltimore Running Club, also roots for the Baltimore Orioles and Ravens, and balances his competitive streak
    by occasionally joining weekend pickup basketball games at the local YMCA.
  arts: David Bannister, an avid visitor of the Baltimore Museum of Art and the Contemporary Museum, sketches molecular pathways alongside works by Kehinde Wiley and Jean‑Michel Basquiat, captures urban
    street scenes with a 50mm lens, and channels his love of jazz by performing on saxophone with a steady‑groove combo that riffs on John Coltrane and Miles Davis.
  travel: David Bannister, who blends meticulous planning with a love for spontaneous discovery, frequently escapes to the Shenandoah Valley for trail runs, has visited New York’s MoMA and Tokyo’s Tsukiji
    market for culinary inspiration, and dreams of a research‑focused expedition to Cape Town to explore local health initiatives.
  culinary: David Bannister, an experimental home chef, often mixes African‑diaspora staples like jollof rice and collard greens with molecular gastronomy techniques, perfects a signature spiced goat curry,
    and meticulously seasons his macro‑photography subjects with rosemary‑infused olive oil for flavor‑laden photo shoots.
  core: David Bannister, a curiosity‑driven yet fiercely disciplined 31‑year‑old scientist, fuses art and genetics, runs half‑marathons, mentors youth, and meticulously balances a competitive edge with
    a subtle skepticism toward shortcuts.
background:
  cultural: David is an African-American raised in Baltimore’s historically Black neighborhoods, where his parents, both educators, emphasized academic achievement and community service. He grew up attending
    the historic churches of West Baltimore, participating in annual Juneteenth celebrations, and absorbing the city’s rich musical legacy from jazz to hip‑hop. These cultural roots inform his commitment
    to addressing health inequities affecting Black communities and his appreciation for artistic expression. As a Black scientist, he navigates the challenges of under-representation in STEM, actively
    supporting diversity initiatives and mentoring students of color.
attributes:
  skills: '[''Molecular biology'', ''Cell culture'', ''CRISPR gene editing'', ''High-throughput sequencing'', ''Immunoassays'', ''Statistical modeling (R, Python)'', ''Bioinformatics pipeline development'',
