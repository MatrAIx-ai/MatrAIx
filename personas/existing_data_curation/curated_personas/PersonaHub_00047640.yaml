persona_description: A professional ecologist and landscape architect who specializes in stormwater management and ecological restoration. They have extensive experience in developing and implementing sustainable
  landscape designs to mitigate the impacts of stormwater runoff and preserve natural habitats. They have a deep understanding of the ecological processes involved in stabilizing streams and their associated
  tributaries, including the importance of soil stabilization, vegetation selection, and erosion control. They are skilled in conducting site assessments, developing soil salvage plans, and creating seed
  mixes and plant palates to enhance the ecological health and biodiversity of the project area.
