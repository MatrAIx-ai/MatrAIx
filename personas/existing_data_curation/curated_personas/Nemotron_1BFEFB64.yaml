personas:
  professional: Brandon Pierce, a 38‑year‑old police officer in a small Midwestern town, blends street‑level experience with a restless curiosity for investigative techniques, thriving on spontaneous problem‑solving
    while they grapple with a tendency to skimp on paperwork and formal structures.
  sports: Brandon Pierce follows the Indianapolis Colts and the Indiana Pacers, participates in local weightlifting sessions, spends weekends at the target range, and hikes the Hoosier National Forest with
    their spouse, preferring small‑group activities over large crowds.
  arts: Brandon Pierce enjoys true‑crime podcasts such as Criminal, reads authors like Ann Rule, and relaxes to classic rock icons like Johnny Cash and Bruce Springsteen, while they occasionally attend
    community theatre productions that showcase local talent.
  travel: Brandon Pierce favors road‑trip itineraries that combine scenic state parks like Brown County and historic small‑town festivals, dreams of visiting the vineyards of the Finger Lakes, yet they
    balance travel with family duties and a modest budget.
  culinary: Brandon Pierce’s palate leans toward hearty Midwestern fare—think pork tenderloin with applesauce, corned beef hash, and a side of creamy coleslaw—while their cooking skill hovers at confident
    grill‑master level, and they often pair meals with locally brewed craft beer.
  core: Brandon Pierce is a dedicated, analytically curious police officer who channels competitive energy into shooting and car restoration, wrestles with anxiety‑driven impulsivity, and they balance practical
    duty with a quiet love of solitary pursuits.
background:
  cultural: Brandon grew up in a small Midwestern town near Columbus, Indiana, in a family of German‑Irish descent that valued hard work, self‑reliance, and community service. Raised in a Methodist environment,
    he attended local public schools where he played football and earned a reputation for competitiveness. His community emphasized modesty, a strong sense of duty, and support for public institutions,
    which guided his decision to join the police force after high school. While he identifies as white American, he feels a deep connection to the local cultural fabric—agricultural roots, small‑town camaraderie,
    and a family tradition of public service.
