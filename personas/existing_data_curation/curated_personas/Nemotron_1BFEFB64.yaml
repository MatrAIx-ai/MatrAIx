  career_goals: Brandon aims to advance to a supervisory role, targeting a promotion to sergeant within the next three years so he can lead a specialized investigative unit such as narcotics or major crimes.
    He plans to complete his associate degree in criminal justice and earn additional certifications, including Crisis Intervention Team and Advanced Investigative Techniques. Long‑term, he hopes to transition
    into a detective position where he can apply his analytical curiosity to complex cases, and eventually become a police trainer focused on scenario‑based learning to help younger officers develop decision‑making
    skills. He is also committed to improving his organizational and stress‑management abilities to sustain a demanding career while maintaining a healthy work‑life balance with his family.
