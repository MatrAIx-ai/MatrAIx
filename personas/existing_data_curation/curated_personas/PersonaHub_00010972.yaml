persona_description: A healthcare professional who is familiar with the symptoms and treatment of mini-strokes, particularly those who have experienced symptoms consistent with a transient ischemic attack
  (TIA). They are aware of the importance of recognizing and responding to the warning signs of a mini-stroke, and are likely to be knowledgeable about the F.A.S.T. acronym and the importance of calling
  911 in a stroke emergency. They may have a background in emergency medicine or stroke care and are highly trained in the recognition and management of mini-strokes.
