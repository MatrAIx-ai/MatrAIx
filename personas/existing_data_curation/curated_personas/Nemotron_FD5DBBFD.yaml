  hobbies: '["Scale model building", "Chess", "Strategy video games", "Fishing", "Woodworking", "Reading technical manuals", "4‑H project work", "Target shooting (small‑group)"]'
  career_goals: He aims to complete a high‑school equivalency credential within the next two years, then enroll in a vocational program for automotive technology or CNC machining, fields that provide clear
    procedures and measurable outcomes. He hopes to become a certified mechanic or machinist, eventually working in a stable, structured environment such as a local garage, a manufacturing plant, or the
    U.S. Army’s technical corps. In the long term he wants to achieve financial independence, support his family, and possibly open a small repair shop.
