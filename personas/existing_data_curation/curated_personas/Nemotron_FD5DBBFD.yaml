personas:
  professional: Charles Huth is a meticulous teen hobbyist who channels their love for precision into building scale model kits of cars and aircraft, crafting wooden projects, and leading the 4‑H club's
    technical project circles, where their organized, competitive nature shines.
  sports: Charles Huth finds calm in early‑morning fishing trips to Lake of the Ozarks with their dad and a small group of friends, and they cheer the St. Louis Cardinals from occasional family gatherings,
    while never joining organized team sports.
  arts: Charles Huth is a solitary creator who appreciates the craftsmanship of aircraft designers like Burt Rutan and listens to instrumental folk guitarist Andrew York while assembling model kits, and
    they spend weekends sketching blueprint‑style drawings of their woodworking plans.
  travel: Charles Huth prefers low‑key, meticulously planned weekend getaways to aviation museums such as the National Museum of the United States Air Force in Dayton, and they dream of a future road trip
    to the Grand Canyon to fish the Colorado River.
  culinary: Charles Huth likes practical comfort foods like grilled cheese sandwiches and homemade fish tacos made from their own lake catch, enjoys measuring ingredients down to the gram, yet they often
    snack on sugary cereal while procrastinating on a model build.
  core: Charles Huth is a methodical 15‑year‑old who thrives on structure, worries about every detail, and frequently mixes meticulous craftsmanship with a tendency to over‑analyze and skip social breaks.
background:
  cultural: Charles grew up in Conway, a small town in Laclede County, Missouri, within a predominantly white, Midwestern community that values self‑reliance, hard work, and close family ties. His family’s
    roots trace back to German and Irish settlers who arrived in the region in the late 19th century. The local culture is shaped by Protestant (mainly Baptist and Methodist) church life, community events
    such as county fairs and 4‑H exhibitions, and a rural‑agricultural backdrop. These influences have fostered a practical, modest outlook and an expectation to contribute reliably to the community.
attributes:
  skills: '["Organizational planning", "Time management", "Basic mechanical repair", "Woodworking", "Spreadsheet proficiency (Excel)", "Fundamental Python programming", "Strategic chess analysis", "Competitive
