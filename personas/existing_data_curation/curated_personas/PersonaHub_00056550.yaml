persona_description: A jazz bassist and composer who is widely recognized for his virtuoso technique and influential style, Jaco Pastorius was responsible for the popularization of the fretless electric
  bass and introduced a textural approach and harmonic sense to bass playing. He was acclaimed as a virtuoso and a genius, but his well-documented offstage disruptions would eventually cost him his life.
  His influence on the modern electric bass is widely recognized, and his technique and style have profoundly influenced electric bassists in jazz and other genres.
