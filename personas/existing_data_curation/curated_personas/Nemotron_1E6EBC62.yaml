  career_goals: Even at five, Joseph sets clear, achievement‑driven goals. In the short term he aims to finish kindergarten with top grades, master reading fluently, and win the school’s LEGO building contest.
    Looking ahead, he dreams of becoming an engineer who designs energy‑efficient homes for Alaska’s cold climate, or a wildlife biologist who protects the state’s unique ecosystems. He envisions earning
    a scholarship for a STEM program and eventually leading research projects that combine practical engineering with environmental stewardship.
