personas:
  professional: Joseph Mcmullen, a five‑year‑old aspiring builder, meticulously arranges LEGO bricks during preschool free‑play, turning imaginative ideas into organized creations while insisting on following
    step‑by‑step instructions, and they proudly display the finished structures for the whole class to admire.
  sports: Joseph Mcmullen, a budding soccer enthusiast, practices dribbling with the community youth club’s mini‑team, prefers the goalkeeper role where solitary focus matters, and they cheer for the local
    professional team City United while collecting match stickers.
  arts: Joseph Mcmullen enjoys sketching cartoon characters, especially creating neat color‑by‑number scenes of Disney’s Mickey Mouse, spends quiet afternoons listening to classical piano works of Mozart,
    and they say the music helps them concentrate on drawing.
  travel: Joseph Mcmullen, a curious explorer, loves organized family trips to the nearby state park where they collect pine cones, and they dream of visiting the Grand Canyon after seeing a picture book
    of its towering cliffs.
  culinary: Joseph Mcmullen prefers simple meals like chicken nuggets with carrot sticks arranged in a smiley face, delights in making banana‑peanut‑butter sandwiches at the kitchen table, but they can’t
    stand the texture of broccoli.
  core: Joseph Mcmullen is a meticulously organized five‑year‑old who blends boundless curiosity with a competitive streak, keeping everything—from LEGO builds to piggy‑bank savings—in neat, orderly rows
    while quietly questioning the motives of peers.
background:
  cultural: Joseph is a White American child raised in Anchorage, Alaska. His family’s roots trace back to European‑American ancestors who settled in the Pacific Northwest before moving north for work in
    the oil and tourism sectors. Growing up in Anchorage, Joseph experiences a blend of mainstream American culture—celebrating holidays like Thanksgiving and Christmas—and the distinctive Alaskan lifestyle
    that emphasizes self‑reliance, outdoor recreation, and respect for the natural environment. His parents frequently involve him in community events at the Anchorage Museum and local wildlife festivals,
    and he learns about Indigenous narratives such as Iñupiat and Yupik stories in school, fostering an appreciation for the region’s cultural diversity while maintaining his family's traditional values
    of discipline and practicality.
