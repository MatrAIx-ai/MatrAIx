persona_description: A multidisciplinary team of climate change artists who are collaborating with the City of San José and San José State University to create a Climate Clock landmark. They are using a
  conceptual design process to develop ideas for a public art piece that will raise awareness about climate change and its impact on transportation. Their work is informed by the science of climate change
  and the psychology of influencing behavior, and they are using new technologies to visualize and communicate data about climate change. The Climate Clock will be a significant public art piece in San
  José, CA, and will be the largest ground transportation hub in Northern California.
