persona_description: A historian who specializes in the study of African American history and culture, particularly the experiences and contributions of African Americans during the 19th and 20th centuries.
  Their research interests include, but are not limited to, the history of slavery, the civil rights movement, and the experiences of African Americans in the United States. They are particularly interested
  in uncovering the stories of African Americans who lived in the 19th and 20th centuries and how their experiences shaped the nation's history.
