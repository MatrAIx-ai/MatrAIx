personas:
  professional: Michael Brooks, a 57‑year‑old film director and producer with advanced STEM training, leverages data‑driven audience research and cutting‑edge visual‑effects pipelines to create socially
    conscious VR documentaries, while leading multidisciplinary crews with calm, meticulous planning.
  sports: Michael Brooks regularly hikes the Blue Ridge Mountains, participates in a local trail‑running club, follows the Charlotte Hornets and Carolina Panthers, and enjoys weekend kayaking on Lake Lure
    as a low‑impact fitness regimen.
  arts: Michael Brooks curates a modest collection of vintage science‑fiction novels, paints abstract watercolors inspired by Mark Rothko, hosts film workshops featuring classic directors like Stanley Kubrick,
    and immerses himself in Miles Davis and John Coltrane jazz vinyl on Friday evenings.
  travel: Michael Brooks favors meticulously planned solo trips to remote natural wonders such as Iceland’s volcanic landscapes and New Zealand’s fjords, balancing his love for aerial drone filming with
    a modest budget that prioritizes sustainable travel and occasional family visits to the historic streets of Charleston.
  culinary: Michael Brooks enjoys cooking heirloom tomato bruschetta, pan‑seared Appalachian trout with smoky paprika, and perfecting a creamy grits base, with a medium skill level that leans toward experimental
    flavor pairings and occasional over‑spicing.
  core: Michael Brooks blends analytical precision with artistic wanderlust, cultivating VR narratives while humming to jazz, hiking with a drone, and budgeting meticulously—though a penchant for late‑night
    novel browsing often delays his bedtime.
background:
  cultural: Michael grew up in a middle‑class white family in the suburban outskirts of Charlotte, where Southern hospitality and a strong sense of community were core values. His parents encouraged curiosity,
    leading him to pursue a STEM graduate degree in engineering before shifting to the creative arts. The region’s growing film scene, combined with its Appalachian folk traditions and the tech‑startup
    culture of Mecklenburg County, has shaped his appreciation for both storytelling rooted in local heritage and cutting‑edge innovation. He identifies with the blend of Southern modesty and progressive
    creativity that characterizes contemporary Charlotte.
attributes:
  skills: '[''Film Direction'', ''Production Management'', ''Budgeting & Financial Planning'', ''Screenwriting'', ''Cinematography'', ''Post‑Production Editing (Adobe Premiere, DaVinci Resolve)'', ''Visual
    Effects Integration'', ''Emerging Media (VR/AR) Production'', ''Data‑Driven Audience Analytics'', ''Leadership & Team Facilitation'', ''Technical Problem Solving (Engineering Principles)'']'
  hobbies: '[''Reading science‑fiction and philosophy'', ''Landscape photography'', ''Painting abstract watercolors'', ''Playing chess'', ''Hiking in the Blue Ridge Mountains'', ''Drone videography'', ''Attending
    small art exhibitions'', ''Mentoring local filmmakers'', ''Gardening'', ''Listening to jazz vinyl records'']'
  career_goals: He aims to establish an independent production company that champions innovative, socially conscious storytelling, especially in immersive formats like VR documentaries about North Carolina’s
    cultural heritage. Within the next five years, Michael hopes to produce his first feature film for a streaming platform, mentor emerging filmmakers through a regional workshop series, and author a guidebook
    on merging STEM methodologies with narrative filmmaking. Long‑term, he envisions influencing industry standards for sustainable production practices and serving as an executive producer for a national
    public‑media series.
