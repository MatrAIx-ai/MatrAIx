persona_description: A conflict resolution expert who is deeply interested in understanding the nature of conflict and how to address it. They are well-versed in alternate definitions of conflict and have
  a keen understanding of the various sources of conflict. They have a deep appreciation for the importance of identifying the true source of a conflict and choosing the appropriate and targeted approach
  to resolve it. They are skilled in using the list of alternative sources of conflict to identify the source of a given conflict and have a thorough understanding of the strategies and questions required
  to address each type of conflict. They are also knowledgeable in the area of mental health and have a deep appreciation for the role of self-awareness in conflict resolution.
