personas:
  professional: Jessica Long, an aspiring digital illustrator and budding storyteller, blends her love for sci‑fi fantasy with community storytelling traditions, turning school art club projects into meticulously
    organized comic strips while staying flexible enough to improvise when inspiration strikes.
  sports: Jessica Long enjoys skateboarding with the local Fort Mill Skate Crew, hikes the Lake Wylie trail network, and follows the Carolina Panthers and Charlotte Hornets avidly, treating weekend hikes
    as casual cardio while using a community recreation center’s youth basketball clinic to stay active.
  arts: Jessica Long, a passionate piano player and sketch artist, draws inspiration from digital creators like Artgerm and classic painters such as Van Gogh, while regularly attending community theater
    productions starring local talent and listening to the melodic storytelling of Taylor Swift and Hozier during creative sessions.
  travel: Jessica Long prefers short family road trips to nearby historic towns like Savannah and Charleston, but also dreams of a solo adventure to the Wizarding World at Universal Orlando and a future
    cultural tour of London to see West End plays, balancing budget constraints with a desire for new narrative experiences.
  culinary: Jessica Long loves the comfort of Southern biscuits with honey butter and shrimp and grits, yet also experiments with making sushi rolls at home, favoring fresh cucumber, avocado, and smoked
    salmon, and enjoys the occasional pepperoni pizza while occasionally skipping vegetables.
  core: Jessica Long is a curious, competitive middle‑schooler whose sketchbook is as full of sci‑fi worlds as their mind is full of skeptical strategies for winning chess tournaments and budgeting for
    the next skate deck.
background:
  cultural: Jessica grew up in Fort Mill, a suburban community in York County, South Carolina. Her family embraces typical Southern traditions, including church youth groups, community festivals, and Southern
    cuisine, fostering a sense of hospitality and close‑knit community values. While her white ethnic background and the region’s relatively homogeneous demographic shape a cultural identity rooted in Southern
    heritage, Jessica also draws heavily from broader national pop culture and online artistic communities, giving her a blended perspective that values both local customs and contemporary artistic influences.
