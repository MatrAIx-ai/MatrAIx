  career_goals: Jessica aims to attend a high‑school magnet program that blends strong art and technology curricula, with the long‑term ambition of becoming a concept artist or video game designer. She
    hopes to win regional art competitions, build a compelling portfolio for college scholarships, and eventually work on creating immersive visual experiences for interactive media.
