  career_goals: Stephanie often shares that she wants to help others learn, dreaming of becoming a teacher or a school librarian when she grows up. She is also fascinated by animals and imagines working
    as a veterinarian. Her love for order and reliability fuels an ambition to one day manage a classroom or a library where she can create tidy, welcoming spaces for students.
