personas:
  professional: An aspiring junior architect, Stephanie Dunning meticulously builds LEGO skyscrapers, channeling her love for routine and methodical planning into every brick, and they often sketch floor
    plans during quiet afternoons.
  sports: Beyond pony lessons at the stable, Stephanie Dunning cheers for the city’s MLB team, the River City Rangers, and they participate in the school’s beginner soccer club, the Little Falcons, where
    routine drills satisfy their organized nature.
  arts: An enthusiastic member of the school art club, Stephanie Dunning draws inspiration from classic illustrators like Dr. Seuss and contemporary Disney animators, and they spend weekends perfecting
    watercolor scenes of whimsical pony adventures.
  travel: Family road trips to the nearby state park and a memorable visit to Disneyland shape Stephanie Dunning’s travel style, which balances the comfort of familiar routes with the excitement of exploring
    themed lands, and they always pack a sketchbook for on‑the‑go drawings.
  culinary: Saturday cookie baking sessions with Mom, where Stephanie Dunning precisely measures flour, sugar, and chocolate chips for perfect chocolate chip cookies, reflect their love of structured cooking,
    while they also enjoy a simple bowl of mac and cheese seasoned with a pinch of paprika.
  core: Stephanie Dunning blends a love for orderly creativity, a disciplined allowance strategy, and a gentle, routine‑driven approach to health, sports, and exploration, all while occasionally forgetting
    to complete a daily habit.
background:
  cultural: Stephanie was raised in Lititz, Pennsylvania, a small, historically Moravian town in Lancaster County known for its close‑knit community and traditional celebrations. Her family is part of the
    region's predominantly white, middle‑class demographic, attending a local Methodist church and participating in community events such as the Lititz Day Festival and the Lancaster County Fair. The cultural
    environment emphasizes modesty, courteous behavior, and involvement in local traditions, all of which shape her practical outlook and sense of responsibility.
