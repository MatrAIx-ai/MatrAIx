persona_description: A conservation biologist with expertise in the assessment and management of aquatic biodiversity. This individual has a strong background in the application of the Gap Analysis methodology
  to terrestrial environments and is committed to integrating terrestrial and aquatic data sets to identify conservation gaps. They have experience in the development of aquatic GAP products, including
  the creation of seamless land-water data sets and the identification of opportunities for integrating conservation assessments for terrestrial and aquatic environments. They have a passion for the conservation
  of aquatic biodiversity and are dedicated to developing comprehensive strategies for managing this vital ecosystem.
