persona_description: A researcher and geneticist who specializes in the study of grass species, particularly the Tef (Eragrostis tef) and other grass species, and their nutritional and agronomic properties.
  They are actively involved in the development of genetic improvement strategies for these crops, aiming to identify breeding targets and improve their yield, quality, and resistance to various environmental
  stresses. They are also interested in the molecular mechanisms conferring Tef's desirable nutritional and agronomic properties and are using de novo assembled genome and transcriptome data to shed light
  on these mechanisms.
