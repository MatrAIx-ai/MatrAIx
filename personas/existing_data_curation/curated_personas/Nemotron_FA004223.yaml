personas:
  professional: Myron Caglioti, a 23-year-old electrical engineer in Dallas, blends methodical circuit design with a flair for visual storytelling, leading small cross-functional teams to prototype IoT
    art installations while charming stakeholders with charismatic presentations, all while charting a fast-track path toward a lead design engineer role and a Professional Engineer license.
  sports: Myron Caglioti, a regular at the North Dallas community center's pickup basketball courts, roots for the Dallas Mavericks and the Texas Rangers, plays in a weekend amateur league organized by
    the Mavericks fan club, and complements their competitive edge with interval-training apps and occasional frisbee in the park.
  arts: Myron Caglioti, a weekend digital illustrator and street-photographer, draws inspiration from Texas sunsets and the neon glow of downtown, regularly attends live sets by The Strokes and local synth-pop
    duo Neon Wave, and volunteers to coordinate the annual Dallas Tech-Art Fusion festival, where they merge electronics with visual art.
  travel: Myron Caglioti, who balances a demanding startup schedule with a love for road trips, has captured sunrise over Big Sur along the Pacific Coast Highway, explored the vibrant art colonies of Santa
    Fe, and is planning a future workshop tour at maker fairs in Berlin and Barcelona, favoring spontaneous itineraries over rigid travel plans.
  culinary: Myron Caglioti, an enthusiastic home cook with a modest skill level, favors spicy Tex-Mex fare like chicken enchiladas with chipotle salsa and freshly made guacamole, often experiments with
    avocado-lime margaritas while listening to lo-fi beats, and occasionally treats themselves to upscale sushi rolls featuring uni and toro after a successful prototype demo.
  core: Myron Caglioti, a charismatic circuit-designer with a competitive streak, channels relentless curiosity into vibrant tech-art projects, while juggling a habit of late-night coffee binges and an
    inability to say no to shiny new gadgets.
background:
  cultural: Myron was raised in a middle‑class, white Texan family in the Dallas‑Fort Worth region. His upbringing blended traditional Southern values—self‑reliance, community involvement, and a strong
    work ethic—with exposure to the vibrant, multicultural arts scene of Dallas. Frequent family trips to museums, music venues, and tech expos cultivated his appreciation for both artistic expression and
    scientific innovation. Growing up in a region known for its engineering firms and entrepreneurial spirit, Myron internalized a competitive, forward‑looking mindset while maintaining a friendly, socially
    engaging demeanor characteristic of his local community.
attributes:
  skills: '["Analog circuit design", "Digital signal processing", "Embedded systems development (C/C++, Python)", "PCB layout (Altium Designer, KiCad)", "Microcontroller programming (Arduino, STM32)", "Power
