    problem solving"]'
  hobbies: '["Digital illustration", "Urban and nature photography", "Live music concerts", "Art festival volunteering", "DIY electronics projects (Arduino, Raspberry Pi)", "Custom synthesizer building",
    "Pickup basketball", "Improv comedy", "STEM mentorship for high‑school students", "Tech‑art meetup attendance"]'
  career_goals: Myron aims to advance quickly into a lead design engineer role within a cutting‑edge hardware startup or a major technology firm in the Dallas area. He aspires to earn a Professional Engineer
    (PE) license and eventually a senior management position where he can shape product strategy, secure patents for innovative devices, and mentor junior engineers. Long‑term, he envisions launching his
    own venture that fuses technology with art—such as interactive installations or wearable devices—leveraging his technical expertise and his passion for unconventional, creative solutions.
