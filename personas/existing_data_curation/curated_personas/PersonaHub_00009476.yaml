  universes and the Alcubierre Warp Drive. He is interested in the challenges and limitations of time travel theories, particularly in terms of generating enough energy and manipulating space-time to achieve
  the necessary effects. He is also interested in the potential implications of time travel on our understanding of the universe and our place in it.
