persona_description: A technology educator who is interested in the development and application of technology in education. They are familiar with the concept of technology education from a theoretical
  perspective and have a keen interest in the philosophy of technology. They recognize the dynamic nature of technology and the importance of including a strong philosophy of technology component in the
  curriculum. They are also aware of the potential difficulties in defining the boundaries of the technology curriculum and are open to the idea of trusting teachers to make decisions instead of trying
  to standardize the curriculum.
