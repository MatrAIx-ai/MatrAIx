personas:
  professional: Micha Chastain is a budding industrial maintenance technician who leverages their high‑school vocational training in farm equipment, welding, and small‑engine repair to deliver meticulous
    preventive maintenance, while methodically planning each service contract and aspiring to earn NCCER and OSHA certifications within five years.
  sports: Micha Chastain splits their athletic energy between the Friday night 3‑on‑3 basketball league at the Great Falls Community Center, cheering for the Montana Grizzlies men’s basketball, and seasonal
    hunting trips for whitetail deer, while also maintaining a modest salmon‑catch record on the Missouri River.
  arts: Micha Chastain unwinds by strumming acoustic renditions of Bob Dylan and John Denver on their vintage Gibson, occasionally joining the local Bluegrass jam sessions at the county fair’s evening stage,
    and collects illustrated manuals from 'This Old House' that blend their love for craftsmanship with visual storytelling.
  travel: Micha Chastain prefers low‑key road trips that blend outdoor adventure with practical planning, having already camped under the stars in Glacier National Park, fished in Idaho’s Snake River, and
    dreaming of a summer drive along the Alaska Highway to test their rugged SUV’s endurance.
  culinary: Micha Chastain gravitates toward hearty, protein‑rich meals such as pan‑seared trout with lemon‑dill sauce, bison steak cooked over a campfire, and homemade elk jerky seasoned with hickory smoke,
    though they sometimes over‑salt their chili in the rush of pre‑hunt cooking.
  core: Micha Chastain is an 18‑year‑old methodical maintenance whiz who balances a love for rugged outdoor pursuits with a meticulous approach to work, budgeting, and self‑improvement, yet habitually forgets
    to replace the batteries in their handheld multimeter.
background:
  cultural: Micha grew up in Plains, Montana, a small, close‑knit rural community with deep roots in farming and ranching. His family background reflects a blend of German‑American and Scandinavian heritage
    common to the region. The local culture emphasizes self‑reliance, practical skills, and a strong sense of neighborly cooperation, reinforced by traditions such as county fairs, hunting season, and community
    service. Raised in a modest Protestant household, Micha’s values of hard work, reliability, and respect for structure were shaped by both his family and the broader Montana frontier ethos.
attributes:
  skills: '["Preventive maintenance planning", "Mechanical repair of farm equipment", "Electrical troubleshooting", "Basic plumbing maintenance", "Hand and power tool operation", "Safety compliance", "Inventory
    management", "Basic welding", "Customer communication", "Problem solving"]'
  hobbies: '["Hunting", "Fishing", "Camping", "Woodworking", "Restoring classic motorcycles", "Basketball", "Playing acoustic guitar", "Volunteer work at the county fair", "DIY home improvement projects"]'
  career_goals: Micha aims to become a certified journeyman in industrial maintenance within the next five years. He plans to earn NCCER and OSHA certifications, gain experience in HVAC and refrigeration,
    and eventually move into a supervisory role overseeing a team of technicians at a larger agricultural operation. Long‑term, he hopes to open his own maintenance service business catering to the rural
    communities of eastern Montana, emphasizing reliability and structured service contracts.
