personas:
  professional: Perry Brinkerhoff is a retired handyman turned community arts facilitator, leveraging decades of hands‑on woodworking and painting expertise to organize traveling art‑workshop series for
    seniors, while using his easygoing, competitive spirit to lead bridge nights and mentor volunteers with a flexible, sometimes disorganized, approach to planning.
  sports: Perry Brinkerhoff enjoys playing in the Pine County Senior Golf Club’s weekly league, aims to qualify for the regional senior tournament, and follows the Minnesota Twins, Vikings, and Timberwolves
    with a loyal but laid‑back fandom, while his love for the outdoors sees him tackling the state’s boundary trail hikes and photographing wildlife along the way.
  arts: Perry Brinkerhoff spends his afternoons painting Minnesota’s pine‑rimmed lakes in the style of Charles Burchfield, attending contemporary exhibitions at the Walker Art Center featuring Yayoi Kusama,
    and savoring live performances by local folk singer Chris Miller at the Guthrie Theater, while his woodworking draws inspiration from mid‑century modern designs by George Nash.
  travel: Perry Brinkerhoff favors flexible day trips to the Boundary Waters Canoe Area and weekend retreats in Mackinac Island, while his travel wish‑list includes a leisurely cultural tour of Paris’s
    Montmartre district and a photography expedition to Yellowstone National Park, planning each outing loosely to accommodate spontaneous detours and senior‑group workshop stops.
  culinary: Perry Brinkerhoff enjoys experimenting with wild rice soup, maple‑glazed salmon, and a weekly potluck dish of kimchi fried rice topped with locally sourced chanterelle mushrooms, cooking at
    an intermediate skill level that lets him confidently fire up his cast‑iron skillet for wood‑smoked chicken while delighting in tasting fellow seniors’ regional specialties like hotdish and lutefisk.
  core: Perry Brinkerhoff blends a curious, calm resilience with a love for hands‑on art and community, juggling occasional disorganization and a competitive streak that fuels his bridge victories and senior
    golf aspirations.
background:
  cultural: Perry was born in the early 1950s in a small farming town near Pine County, Minnesota. His family descends from Swedish and German immigrants who settled in the Upper Midwest in the early 20th
    century. Growing up, he participated in community church socials, county fairs, and seasonal outdoor activities such as fishing, hunting, snowmobiling, and ice fishing, all of which fostered a strong
    sense of self‑reliance and community. The region’s folk art traditions—particularly quilting, pottery, and prairie music—sparked his lifelong appreciation for visual and performing arts. Though he completed
    only a high‑school education, the values of hard work, mutual aid, and modesty remain central to his identity, and he continues to be an active volunteer in local historical societies and senior‑center
    programs.
