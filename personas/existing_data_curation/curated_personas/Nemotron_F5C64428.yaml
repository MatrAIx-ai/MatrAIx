  hobbies: '[''Painting (landscapes and mixed media)'', ''Woodworking'', ''Bridge'', ''Senior golf'', ''Hiking'', ''Nature photography'', ''Attending live music and theater'', ''Trying new cuisines'', ''Pottery
    classes'', ''Storytelling facilitation'']'
  career_goals: As a retiree, Perry sees his next chapter as a blend of learning, creation, and community impact. He aims to launch a traveling art‑workshop series that brings simple painting and craft
    sessions to seniors across Pine County, hoping to spark curiosity and social connection. He is also drafting a memoir that weaves personal anecdotes with the oral histories of his hometown, with the
    goal of donating the manuscript to the local historical society. On the competitive side, he plans to qualify for the regional senior golf tournament and to win a bridge championship in his county league.
    Ultimately, he wants to leave a legacy of artistic appreciation and civic engagement for future generations.
