personas:
  professional: Marie Warren, a one-year-old prodigy in imaginative play, demonstrates early architectural instincts by meticulously arranging stacking blocks while flexibly remodeling their creations,
    hinting at a future career in design or engineering.
  sports: Marie Warren, an energetic infant, attends a local baby swim class and a toddler gymnastics group, they idolize the City FC professional soccer team by waving a tiny foam ball in the corner of
    the pool, and they enjoy the rhythmic bounce of a soft play‑ball during free play.
  arts: Marie Warren, a budding art enthusiast, spends afternoons flipping through picture books by Eric Carle, swaying to the melodies of The Wiggles and Baby Mozart, while they proudly display crayon
    scribbles reminiscent of abstract Kandinsky on the refrigerator door.
  travel: Marie Warren, an adventurous one‑year‑old, has already explored the sandy dunes of Clearwater Beach during a family vacation and they eagerly point at maps of Tokyo, dreaming of future stroller
    rides through its neon streets.
  culinary: Marie Warren, a picky yet curious eater, delights in creamy avocado purée and smooth quinoa porridge, but they consistently turn away from chunky peas, preferring the silky texture of apple
    sauce and the occasional sweet taste of mashed banana.
  core: Marie Warren, a one‑year‑old with boundless imagination, balances meticulous block‑building with spontaneous play, they fiercely hunt for shiny treasures, and they navigate the world with a skeptical
    yet curious eye.
background:
  cultural: Marie Diane Warren grows up in a Black family within the lively multicultural tapestry of Miami Beach, Florida. Her upbringing blends African‑American traditions—such as gospel music, soulful
    storytelling, and community gatherings—with the diverse influences of Miami’s Caribbean and Latin American communities. Family celebrations often feature a mix of soul food, reggae, salsa, and visits
    to local cultural events like the Miami Beach Art Deco Festival, nurturing her appreciation for art, novelty, and community.
attributes:
  skills: '["fine‑motor coordination","early drawing and scribbling","basic language comprehension and expressive speech","pattern recognition","simple problem solving","organized block arrangement"]'
  hobbies: '["finger‑painting","exploring textured board books","listening to Afro‑Caribbean music","building with colorful blocks","interactive story‑time","spontaneous dancing"]'
  career_goals: Although still an infant, Marie’s caregivers nurture her evident love for novelty, art, and abstract concepts. She frequently enjoys interactive picture books and digital art apps, laying
    the groundwork for a future ambition to become a visual artist, illustrator, or multimedia designer. Her competitive streak shows in wanting to master new creative activities faster than peers, driving
    a long‑term desire for artistic mastery and recognition.
