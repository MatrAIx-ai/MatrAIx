personas:
  professional: John Ellis, an emerging community arts coordinator, channels his solid foundation in art history, digital media savvy, and outgoing public‑speaking skills into curating pop‑up exhibitions
    and rallying volunteers, while his relaxed attitude toward strict deadlines fuels a flexible, improvisational approach to program design.
  sports: John Ellis, a regular participant in the Worthington Hoopsters recreational basketball league and an avid weekend hiker in Hocking Hills, supports the Cleveland Cavaliers and Ohio State Buckeyes,
    and approaches fitness with a competitive streak that drives him to set informal challenges for himself and his friends.
  arts: John Ellis, a dedicated community‑theater improviser and amateur photographer, frequently volunteers to curate pop‑up shows featuring works by Banksy and Frida Kahlo, enjoys evenings with The National
    and Tame Impala, and draws creative inspiration from the vibrant murals of local street artists.
  travel: John Ellis, a spontaneous traveler who prefers short‑haul road trips to Hocking Hills and weekend getaways to New Orleans for its music scene, while dreaming of a month‑long art pilgrimage to
    Barcelona, plans trips using travel‑reward points but balances his budget with his goal of saving for a future coffee‑house‑gallery venture.
  culinary: John Ellis, a home‑brewer of hop‑forward IPAs and rich stouts who dabbles in cooking spicy ramen and pretzel‑crusted chicken, enjoys tasting local farm‑to‑table dishes like beet‑root salad with
    goat cheese, and treats dining out as a chance to scout menu ideas for his eventual café concept.
  core: John Ellis is a charismatic, improv‑savvy arts advocate who blends competitive ambition with a laid‑back lifestyle, juggling community projects, craft brewing, and an unstructured schedule that
    often leaves deadlines lingering on the back burner.
background:
  cultural: John was raised in a small‑town, white Midwestern family in Worthington, Minnesota, with deep ties to the agricultural community. His upbringing reflects typical regional values of hard work,
    modesty, and close‑knit community connections, often centered around local churches and school events. While his family background includes Scandinavian and German heritage common in the area, John
    embraces a broader cultural curiosity, blending his Midwestern roots with an appreciation for diverse artistic expressions. His marriage adds a supportive domestic foundation as he pursues personal
    growth and community involvement.
