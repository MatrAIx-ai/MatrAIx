  hobbies: '[''visiting art galleries'', ''online art‑history courses'', ''community theater'', ''improvisational comedy'', ''recreational basketball'', ''hiking'', ''home brewing'', ''photography'', ''board‑game
    nights'', ''fantasy‑sports leagues'', ''volunteering at festivals'']'
  career_goals: John aims to complete his bachelor’s degree in communications or arts management within the next two years and transition into a full‑time role as a community arts coordinator or cultural
    program director for a regional nonprofit. He envisions creating sustainable, flexible programming that blends local art showcases, live performances, and collaborative workshops. In the longer term,
    he aspires to launch a small venture—a coffee‑house‑gallery hybrid space—that serves as a social hub for artists, musicians, and entrepreneurs in Worthington, while providing his family with a stable
    yet adaptable livelihood.
