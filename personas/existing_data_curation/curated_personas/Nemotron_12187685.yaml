    fast‑paced settings'', ''Process optimization and waste reduction'']'
  hobbies: '[''Recreational league basketball'', ''Softball'', ''Home cooking and barbecue'', ''Attending local live music concerts'', ''Volunteering at community events'', ''Maintaining a classic pickup
    truck'', ''Watching and discussing football games'', ''Organizing game‑day gatherings with friends'']'
  career_goals: Andrew aims to advance from his current role as a food‑preparation worker to a supervisory position within the next two years, targeting a kitchen manager role at his current restaurant.
    He plans to complete a culinary management certification and obtain advanced food‑safety credentials to strengthen his qualifications. In the longer term, his ambition is to open a modest family‑style
    eatery that highlights classic Mid‑Atlantic comfort foods, leveraging his knowledge of standardized operations and his competitive drive to build a reputation for consistency and quality. He envisions
    a stable, financially secure future where he can mentor younger workers and maintain a structured, routine‑oriented work environment.
