personas:
  professional: Andrew Fix, a 29‑year‑old food‑preparation worker in a fast‑paced Maryland restaurant, leverages his methodical, routine‑driven approach and strong interpersonal skills to ensure strict
    food‑safety compliance, train new staff, and continuously trim waste, positioning himself for a kitchen‑manager promotion within two years.
  sports: Andrew Fix plays in a local recreational basketball league during the winter and joins a community softball team in the spring, while cheering on the Baltimore Ravens in football, the Washington
    Commanders on Sundays, and occasionally attending Maryland Terrapins basketball games, making game‑day gatherings a regular social ritual.
  arts: Andrew Fix’s cultural engagement includes regularly attending live shows at Hagerstown City Park—where he’s a fan of Bruce Springsteen, The Allman Brothers Band, and rising country star Luke Combs—plus
    occasional trips to the Maryland Center for the Arts to see productions like Our Town, which fuel his creative spark for home‑cooking experiments.
  travel: Andrew Fix prefers short‑haul road trips planned around weekend BBQ festivals, having already driven to the Chesapeake Bay for crab‑cake tastings, visited Nashville for its famed hot‑chicken scene,
    and dreaming of a culinary pilgrimage to New Orleans’ French Quarter while keeping expenses in check with a modest travel fund.
  culinary: Andrew Fix is an avid home‑cook who, with a solid grasp of commercial kitchen techniques, regularly grills Maryland‑style pork ribs seasoned with Old Bay, perfects crab cakes with lump crab
    meat and panko, experiments with dry‑rubbed brisket, and maintains a well‑stocked spice rack that includes smoked paprika, cayenne, and homemade barbecue sauce, while still relying on trusted, standardized
    recipes for consistency.
  core: Andrew Fix is a routine‑obsessed, competition‑driven grill master who balances meticulous kitchen management with weekend basketball and barbecue outings, all while meticulously budgeting for his
    future family‑style eatery.
background:
  cultural: Andrew was raised in a middle‑class, white working‑family in Hagerstown, Maryland. His grandparents immigrated from Germany and Ireland, and family traditions emphasize practicality, hard work,
    and community involvement. Growing up near the Appalachian foothills, he was exposed to the region’s agricultural fairs, the local emphasis on farm‑to‑table foods, and a strong sense of small‑town camaraderie.
    He attended the local public high school, was active in the football and automotive clubs, and regularly participated in church‑based youth groups, which reinforced his traditional values and preference
    for routine. The cultural milieu of Hagerstown—characterized by regional cuisine, community sports, and a pragmatic work ethic—has shaped Andrew’s outlook and daily habits.
attributes:
  skills: '[''Food safety compliance (ServSafe certified)'', ''Recipe adherence and menu execution'', ''Inventory control and cost management'', ''Shift scheduling and team supervision'', ''Time management
