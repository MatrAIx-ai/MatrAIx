persona_description: A conservation officer who is responsible for ensuring the preservation and enhancement of the special character and appearance of designated conservation areas in their local area.
  They must apply for and manage consent for various alterations, demolitions, and other building works within these areas, ensuring that they comply with the key aim of preserving or enhancing the area's
  special character and appearance, while also taking into account local and regional criteria. They must be aware of the different types of consent required for different types of works and must manage
  the process of applying for and managing consent for alterations and demolitions to listed buildings and conservation areas.
