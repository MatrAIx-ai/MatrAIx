personas:
  professional: Miriam Gamboa, a disciplined laundry and dry‑cleaning professional, they bring fifteen years of expertise in steam‑press and solvent cleaning, an obsessive attention to detail, and a competitive
    edge that fuels their ambition to earn IICRC Green Cleaning certification and step into a supervisory role.
  sports: Miriam Gamboa, a socially vibrant athlete, they regularly attend salsa and bachata classes as cardio, join a local boot‑camp group, cheer for the Jacksonville Jaguars and the Jacksonville Jumbo
    Shrimp, and spend sunny weekends playing beach volleyball at Amelia Island.
  arts: Miriam Gamboa, an enthusiastic patron of the arts, they dance to the rhythms of Celia Cruz and Marc Anthony, participate in a community theater’s musical nights, attend mystery‑book‑club discussions
    featuring Agatha Christie adaptations, and draw creative inspiration for their YouTube cleaning tutorials from performers like Lin‑Manuel Miranda.
  travel: Miriam Gamboa, an adventurous traveler, they plan short, budget‑friendly road trips to Amelia Island and the nearby Gulf beaches, savor spontaneous family visits to the Caribbean island they call
    home, and dream of a cultural immersion tour of New Orleans to explore its music and cuisine.
  culinary: Miriam Gamboa, a passionate home chef, they expertly prepare arroz con gandules, pasteles, and sofrito‑infused stews using garden‑fresh cilantro and plantains, experiment with local seafood
    dishes, and blend their love for cooking with a flair for sharing practical laundry hacks on YouTube.
  core: Miriam Gamboa blends relentless organization with a love for lively dance, turning every garment they clean into a testament of precision while their salsa‑spun energy fuels community outreach,
    garden experiments, and an ever‑growing catalog of quirky cleaning shortcuts.
background:
  cultural: Miriam grew up in a bilingual household, speaking both Spanish and English, and was deeply immersed in Puerto Rican traditions, music, and food. Her family emphasized strong communal bonds,
    respect for elders, and a vibrant celebration of festivals such as La Fiesta de San Juan. After moving to Jacksonville, she blended these cultural roots with Southern hospitality, becoming an active
    member of the local Hispanic community while also embracing Florida’s diverse multicultural landscape. Her cultural identity informs her love for lively rhythms, flavorful cooking, and a commitment
    to supporting fellow immigrants through community outreach. Miriam feels a lasting connection to Puerto Rico, often visiting family on the island and maintaining customs that keep her heritage alive
    in her daily life.
attributes:
