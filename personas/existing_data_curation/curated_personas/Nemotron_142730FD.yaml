  hobbies: '[''Salsa and bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Volunteering at the Hispanic Resource Center'', ''Group fitness boot‑camp'', ''Gardening'', ''Mystery book club'', ''Creating
    and sharing laundry‑tips videos'', ''Attending cultural festivals'', ''Beach outings'', ''Participating in local charity runs'']'
  career_goals: Miriam aspires to advance from a frontline technician to a supervisory or managerial role within a regional dry‑cleaning chain, where she can shape operational standards and mentor a larger
    team. She aims to obtain industry certifications, such as the Institute of Inspection, Cleaning and Restoration (IICRC) Green Cleaning credential, to differentiate herself as an expert in sustainable
    garment care. Long‑term, she dreams of launching her own boutique dry‑cleaning business in Jacksonville that offers premium, eco‑friendly services to upscale clients, leveraging her organizational strengths
    and competitive drive to become a market leader. Additionally, she seeks opportunities to present at local trade workshops and contribute articles on efficient cleaning practices, positioning herself
    as a respected voice in the industry.
