personas:
  professional: Manuel Hernandez, a construction project coordinator, they excel at maintaining daily site operations, overseeing subcontractors, and ensuring code compliance, all while using their sociable,
    routine‑driven style to keep crews motivated and clients informed.
  sports: Manuel Hernandez, a dedicated weekend soccer player for the Oakland Fire amateur league, they follow the San Jose Earthquakes in MLS and cheer for the Golden State Warriors and Oakland Athletics,
    while staying fit with regular hikes on the East Bay trails and occasional pickup basketball games at local community courts.
  arts: Manuel Hernandez, an avid fan of Oakland’s live‑music scene, they spend evenings dancing to the rhythms of Celia Cruz, Rubén Blades, and Marc Anthony, capture vibrant street murals—often reminiscent
    of Banksy’s bold commentary—with their compact camera, and occasionally take the stage at open‑mic nights to showcase their own salsa‑infused karaoke performances.
  travel: Manuel Hernandez, a spontaneous yet routine‑loving traveler, they mix short weekend getaways to the East Bay’s Redwood trails, Lake Tahoe skiing, and Napa wine tours with annual trips to Oaxaca’s
    bustling markets and Mexico City’s historic plazas, preferring to book flights and accommodations last minute when deals appear, and balancing their love of cultural immersion with a modest travel budget.
  culinary: Manuel Hernandez, a confident home chef, they dazzle friends at potlucks with hand‑rolled corn masa tamales stuffed with slow‑cooked pork and ancho chilies, a smoky roasted tomatillo salsa featuring
    cilantro and lime, and a rich chocolate‑spiced mole that balances cumin, sesame seeds, and dried chilies, all prepared with a blend of traditional techniques and modern shortcuts.
  core: Manuel Hernandez, the talkative construction manager who thrives on routine, they turn every worksite into a social hub, cook fiery tamales for friends, and occasionally forget to pay the electric
    bill until the lights flicker.
background:
  cultural: Manuel’s cultural identity is rooted in his Guatemalan heritage while being shaped by his upbringing in the Bay Area. He grew up in a bilingual household where Spanish was spoken daily, and
    he regularly participates in community celebrations such as Semana Santa processions and the annual Guatemalan Festival in Oakland’s Fruitvale district. Family loyalty, respect for elders, and a strong
    sense of community—values common in Guatemalan culture—guide his interpersonal style. Though he adheres to many traditional customs, he blends them with the multicultural, progressive environment of
    Oakland, giving him a practical yet adaptable worldview.
