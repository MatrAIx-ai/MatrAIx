  career_goals: Manuel’s primary career ambition is to climb to senior construction management, where he can lead larger, multi‑family and community development projects that align with his practical mindset
    and desire to create stable housing for Oakland neighborhoods. Over the next three to five years he plans to earn a Project Management Professional (PMP) certification and complete a short‑term construction‑leadership
    program, which will give him formal structure while still allowing the flexibility he values. Ultimately he hopes to launch his own boutique construction firm that partners with local nonprofits to
    deliver affordable, culturally sensitive housing, leveraging his strong network and his ability to rally teams around a shared vision.
