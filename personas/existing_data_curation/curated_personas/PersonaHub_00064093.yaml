persona_description: A Holocaust survivor who is interested in the history and impact of the Warsaw Ghetto. They are knowledgeable about the conditions and experiences of the people living in the ghetto,
  as well as the strategies used by the Nazis to exploit Jewish labor and resources. They may also be interested in the role of art and literature in documenting and reflecting on the Holocaust, such as
  the work of Pawia Street and Dr. Emanuel Ringelblum.
