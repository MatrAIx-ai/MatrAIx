personas:
  professional: Silvana Clavijo, a seasoned Queens stylist and salon manager, channels her love for precision hair cutting and advanced coloring into a meticulously scheduled boutique vision, using bilingual
    fluency and a calm, nurturing demeanor to mentor junior stylists while they personally provide tailored consultations that blend artistic flair with practical solutions.
  sports: Silvana Clavijo enjoys early morning walks in Flushing Meadows‑Corona Park, plays seasonal tennis at Astoria Tennis Club, follows the New York Knicks and New York Mets for their competitive spirit,
    supports NYC FC during the soccer season, and balances a calm yoga routine with occasional group Zumba classes that tap into their salsa rhythm, while they prioritize staying active.
  arts: Silvana Clavijo finds artistic inspiration at local galleries showcasing vibrant works by Kehinde Wiley, immerses in contemporary Caribbean literature such as Junot Díaz and Nalo Hopkinson, and
    relaxes listening to salsa legends like Celia Cruz, while they occasionally attend off‑Broadway productions starring Lin‑Manuel Miranda.
  travel: Silvana Clavijo prefers meticulously planned weekend getaways, often escaping to historic Old San Juan or the vineyards of the Finger Lakes, and they dream of a solo cultural immersion trip to
    Cartagena, balancing a modest travel budget with a love for music‑filled festivals and culinary tours.
  culinary: Silvana Clavijo showcases culinary skill by crafting mofongo with green plantains, garlic, and chicharrón, perfecting arroz con gandules seasoned with sofrito and cilantro, and they frequently
    infuse kitchen creations with rosemary and aloe vera harvested from their balcony garden for both flavor and natural hair‑care treatments.
  core: Silvana Clavijo blends meticulous salon management with a salsa‑driven love for community, balancing disciplined budgeting and health routines while they occasionally allow late‑night market cravings
    to disrupt their early‑morning schedule.
background:
  cultural: Silvana grew up in a vibrant Puerto Rican household in Corona, where Spanish was spoken alongside English and family gatherings centered around music, food, and storytelling. Her cultural identity
    blends island traditions—such as a love for salsa, bodegón cuisine, and communal solidarity (solidaridad)—with the multicultural rhythm of Queens. This background informs her warm, cooperative demeanor
    and her commitment to preserving cultural pride, which she expresses through bilingual client service, celebrating local festivals, and mentoring the next generation of Hispanic stylists.
attributes:
  skills: '[''Hair Cutting'', ''Hair Coloring'', ''Client Consultation'', ''Salon Management'', ''Bilingual Communication (Spanish/English)'', ''Product Knowledge'', ''Trend Forecasting'', ''Inventory Management'',
    ''Health & Safety Compliance'', ''Apprentice Training'']'
  hobbies: '[''Salsa Dancing'', ''Cooking Puerto Rican Dishes'', ''Reading Contemporary Fiction'', ''Visiting Art Galleries'', ''Yoga'', ''Walking in Flushing Meadows‑Corona Park'', ''Volunteering at Youth
    Centers (Hair Workshops)'', ''Gardening Herbal Plants'']'
  career_goals: Silvana aims to transition from a high‑traffic salon stylist to owning a boutique salon in Queens that reflects her Puerto Rican heritage and artistic sensibility. She plans to obtain master
    stylist certification in color, develop a small line of natural hair‑care products, and secure a cosmetology educator credential to teach at local community colleges. Her long‑term ambition is to create
    a community hub where beauty, culture, and mentorship intersect, providing stable employment for fellow stylists and affordable services for her neighborhood.
