persona_description: A neuroscientist and researcher who has studied the KNDy neurons and their functions, particularly in relation to the regulation of body temperature and the onset of hot flushes in
  women undergoing menopause. She has published research on the role of these neurons in controlling thermoregulation and the mechanisms behind the symptoms of hot flushes. Her work has implications for
  the development of more targeted and effective treatments for hot flashes.
