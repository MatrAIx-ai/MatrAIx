personas:
  professional: Dylan Evangelista, a retired mechanical maintenance specialist turned community mentor, fuses his hands‑on troubleshooting expertise, tight budgeting skills honed from managing a family
    restaurant, and event‑coordination experience to lead practical, cost‑effective workshops—while his spontaneous nature sometimes leaves lesson plans unfinished, his assertive yet cooperative approach
    keeps participants engaged.
  sports: Dylan Evangelista, a loyal fan of the Houston Astros, Houston Texans, and an active member of the Galveston Bay Anglers Club, spends weekends fishing for redfish in Galveston Bay, joins the La
    Porte Senior Softball League each spring, and supplements low‑impact fitness with daily walks and woodworking projects, preferring relaxed, community‑oriented activities over rigorous training.
  arts: Dylan Evangelista, an avid admirer of classic jazz legends like Miles Davis, John Coltrane, and Bill Evans, regularly attends performances at the local community theater, delights in reading poetry
    by Langston Hughes, and infuses storytelling into cultural festival planning, finding that the improvisational spirit of jazz mirrors their blend of curiosity and practicality.
  travel: Dylan Evangelista favors short road trips to culturally vibrant locales such as New Orleans for jazz festivals and Nashville for historic music tours, while dreaming of revisiting Vietnam to reconnect
    with family culinary roots, balancing meticulous planning for medical appointments with spontaneous detours to Gulf Coast fishing spots.
  culinary: Dylan Evangelista, an accomplished home cook, masterfully prepares pho, chicken adobo, fresh lumpia, and herb‑infused sauces using basil, lemongrass, and cilantro harvested from their backyard
    garden, delighting family gatherings with authentic Southeast Asian flavors, yet occasionally over‑salts dishes when multitasking between woodworking projects.
  core: Dylan Evangelista, a pragmatic yet curious 71‑year‑old mentor, merges mechanical know‑how, culinary passion, and community spirit while juggling spontaneous impulses, occasional over‑spending, and
    a tendency toward worry.
background:
  cultural: Dylan was born to Filipino immigrants who settled in Houston during the 1960s. He grew up bilingual, speaking English at school and Tagalog at home, and was immersed in Catholic traditions,
    community fiestas, and the value of close‑knit family networks. Living in La Porte near the Gulf, he blends the coastal Texan lifestyle—fishing, barbecues, and holiday parades—with the warmth of Southeast
    Asian hospitality, celebrating both Christmas and Lunar New Year. His cultural identity is shaped by a respect for elders, a love of shared meals, and a commitment to preserving his heritage while engaging
    with the diverse fabric of Harris County.
