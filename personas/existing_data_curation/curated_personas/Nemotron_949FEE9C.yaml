  career_goals: Although retired, Dylan aims to stay engaged by sharing his experience and heritage with the next generation. He hopes to become a regular mentor at the local senior center, offering workshops
    on basic home repairs and financial literacy. He also aspires to document his family's migration story and traditional recipes in a community cookbook, and to help launch a multicultural garden in La
    Porte that combines native Texan herbs with Southeast Asian plants. Ultimately, he wants to be recognized as a trusted elder who contributes to cultural preservation and community resilience while maintaining
    his health and independence.
