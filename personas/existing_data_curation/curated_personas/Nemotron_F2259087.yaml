personas:
  professional: Arnold Hood is a learning and development specialist who applies their curiosity for visual storytelling and agile methods to craft blended training experiences that weave art, data‑driven
    ROI, and inclusive DEI narratives, while their relaxed attitude toward strict planning sometimes leads to last‑minute revisions and creative improvisation.
  sports: Arnold Hood is an avid cyclist who rides the Portland Loop, a member of the Pacific Northwest Cycling Guild, and a seasonal fan of the Portland Timbers (MLS) and Trail Blazers (NBA), occasionally
    joining community 5K runs when their schedule permits and using weekend hikes in the Columbia River Gorge as a mental reset.
  arts: Arnold Hood immerses themselves in Portland’s arts scene by curating indie jazz and funk playlists featuring Kamasi Washington, Vulfpeck, and local saxophonist Sam Morgan, attending monthly street‑art
    tours spotlighting works by Shepard Fairey, and volunteering backstage for community theater productions, which fuels their creative approach to instructional design.
  travel: Arnold Hood enjoys planning eclectic trips that blend adventure and cultural immersion, such as weekend hikes to Multnomah Falls, culinary road‑trips through Pacific Northwest farm‑to‑table restaurants,
    and annual visits to New Orleans to honor their Southern roots and explore jazz heritage, all while balancing a modest travel budget and occasional last‑minute flight bookings.
  culinary: Arnold Hood loves cooking soulful Southern‑style dishes with a Pacific Northwest twist, often preparing shrimp and grits topped with smoked wild salmon, collard greens spiced with foraged mushrooms,
    and sourdough cornbread infused with rosemary, while their penchant for experimentation sometimes leaves a few burnt edges.
  core: Arnold Hood is a curious, art‑infused learning architect who balances a laid‑back lifestyle with a drive to uplift diverse voices, even if that means occasional deadline stress and spontaneous splurges
    on creative experiences that they eagerly share with colleagues.
background:
  cultural: Arnold is a Black American whose family roots trace back to the Southern United States, with his parents relocating to the Pacific Northwest during the 1990s for educational and professional
    opportunities. Growing up in Portland, he navigated a predominantly white environment while staying connected to African‑American traditions through church, family gatherings, and the city's Black community
    centers. He celebrates Juneteenth, participates in local cultural festivals, and draws inspiration from Black artists and entrepreneurs who blend heritage with contemporary expression. This dual perspective
    informs his inclusive approach to learning design and his commitment to uplifting diverse voices within corporate and community settings.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''E‑learning Authoring (Articulate Storyline, Rise)'', ''Learning Management System Administration'', ''Data‑Driven Training Evaluation'',
    ''Agile Project Management'', ''Stakeholder Engagement'', ''Coaching and Conflict Resolution'', ''Strategic Business Alignment'']'
  hobbies: '[''Gallery and street‑art tours'', ''Community theater'', ''Cycling and hiking'', ''Urban photography'', ''Cooking Southern‑Pacific Northwest fusion'', ''Curating indie jazz and funk playlists'',
    ''Mentoring youth in STEM and arts'']'
  career_goals: Arnold aims to advance to a senior learning and development leadership role where he can shape enterprise‑wide talent strategy and integrate emerging technologies like VR and AI‑driven personalization.
    He envisions championing DEI‑focused training that reflects his cultural heritage and fosters authentic inclusion. Over the next five years he plans to lead cross‑functional initiatives that link employee
    growth to measurable business outcomes, publish thought‑leadership pieces on creative learning design, and eventually launch a boutique consultancy that partners with nonprofits to develop arts‑infused
    workforce programs for underserved communities.
