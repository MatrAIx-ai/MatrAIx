  career_goals: Olga aspires to pursue a career that merges her love for science, animals, and community service. She dreams of studying biology or environmental science in college, with a long‑term goal
    of becoming a veterinarian who works with agricultural families in Monterey County. She also envisions participating in sustainability initiatives that protect local farms. Competitive by nature, she
    aims to earn scholarships and leadership positions that validate her dedication, while ultimately giving back to the Latino youth community by mentoring peers and advocating for bilingual education.
