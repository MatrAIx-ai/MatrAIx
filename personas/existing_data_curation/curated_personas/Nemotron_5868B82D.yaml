  career_goals: Robert aims to channel his methodical nature and artistic curiosity into a career as an independent visual designer or freelance illustrator, eventually establishing a boutique studio that
    blends traditional illustration with digital media. He also envisions creating a community‑focused platform that curates local art and historical stories, positioning himself as a cultural archivist
