  hobbies: '[''Cooking Salvadoran cuisine'', ''Fishing at Percy Priest Lake'', ''Golf'', ''Attending Nashville Predators and baseball games'', ''Volunteering at church food pantry'', ''Participating in
    Fiesta San Salvador'', ''Landscape photography'', ''Reading Central American history'', ''Spanish language poetry'']'
  career_goals: His immediate career goal is to step into a regional health system director role overseeing multiple facilities in Middle Tennessee, where he can lead large-scale integration of telehealth
    services and data-driven quality initiatives. Giovanni aims to earn a Certified Medical Manager (CMM) credential and complete a part-time Master of Health Administration to deepen his expertise. He
    is also passionate about mentoring emerging managers, improving community health outreach programs for immigrant and low‑income families, and building a reputation as a leader who balances operational
    efficiency with compassionate patient care.
