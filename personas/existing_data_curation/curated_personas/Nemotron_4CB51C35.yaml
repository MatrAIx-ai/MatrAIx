  skills: '[''Python'', ''JavaScript'', ''C++'', ''React'', ''Node.js'', ''HTML/CSS'', ''SQL'', ''Git'', ''Agile methodology'', ''Unity'', ''UI/UX design'', ''Arduino'']'
  hobbies: '[''Digital illustration'', ''Street photography'', ''Indie video games'', ''Tabletop role‑playing games'', ''Improv comedy'', ''Live music concerts'', ''Exploring restaurants'', ''Hackathons'',
    ''Guided meditation'', ''Park walks'']'
  career_goals: He aims to become a creative technologist who crafts products that merge software engineering with visual art. In the next few years he hopes to lead a development team at a studio focused
    on immersive indie games or interactive media installations. He plans to pursue a master’s degree in Human‑Computer Interaction to deepen his understanding of user experience. Ultimately he dreams of
    launching his own studio that produces story‑driven games and experimental digital art projects while maintaining a flexible work schedule that supports his need for autonomy and mental‑wellness.
