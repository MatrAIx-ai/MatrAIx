personas:
  professional: Cleston Hoffmann, a 19‑year‑old full‑stack developer with expertise in Python, JavaScript, and C++, channels a love for digital illustration and street photography into crafting immersive
    web experiences and interactive Unity prototypes, while thriving in agile hackathon teams that value spontaneous creativity over rigid planning.
  sports: Cleston Hoffmann, an energetic fan of the Houston Astros and Rockets, spends weekend evenings in pickup basketball games at local parks and joins a community ultimate frisbee league, while using
    the occasional jog around Buffalo Bayou as a release for climbing anxiety.
  arts: Cleston Hoffmann, a self‑described visual storyteller, sketches digital illustrations inspired by Loish and captures gritty Houston street scenes reminiscent of Vivian Maier, while unwinding at
    improv comedy nights with The Big Bad Improv Collective and vibing to the music of Tame Impala, Mitski, and the lo‑fi beats of Nujabes during late‑night coding sessions.
  travel: Cleston Hoffmann embraces spontaneous road trips, having already binge‑visited Austin for SXSW, spent a weekend in New Orleans sampling beignets, and dreaming of a future backpacking adventure
    through Kyoto’s cherry‑blossom season, preferring last‑minute planning over detailed itineraries to keep travel costs low and excitement high.
  culinary: Cleston Hoffmann, whose palate swings between fiery Texas‑style brisket tacos, steaming bowls of miso ramen, and late‑night sushi rolls, cooks with a semi‑proficient skill set that can nail
    a perfectly crisp avocado toast topped with chili flakes, while always hunting for the next hidden‑gem food truck serving luau‑inspired pineapple‑glazed chicken.
  core: Cleston Hoffmann is a 19‑year‑old anxiety‑driven creative technologist who trades chaotic schedule for spontaneous art‑coding mashups, midnight indie‑game marathons, and a relentless quest for the
    perfect taco.
background:
  cultural: Cleston grew up in Spring, Texas, a suburban community within the Greater Houston area. He comes from a white, German‑American family that values education, independence, and Southern hospitality.
    The multicultural environment of Houston exposed him early to diverse music, food, and artistic scenes, shaping his appreciation for both traditional American culture and contemporary digital creativity.
    His upbringing blends Midwestern work ethic with Texan openness, and his family's emphasis on STEM encouraged his early pursuit of a bachelor's degree.
