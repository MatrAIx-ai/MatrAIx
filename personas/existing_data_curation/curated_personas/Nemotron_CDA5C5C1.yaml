  hobbies: '[''Karaoke singing'', ''Cooking traditional Honduran dishes'', ''Watching soccer matches (Honduran Liga Nacional and MLS)'', ''Latin dance classes (salsa and merengue)'', ''Mindfulness meditation
    and journaling'', ''Hiking in Cumberland Plateau'', ''Volunteering at Hispanic youth center mentoring culinary arts'', ''Exploring Nashville’s live‑music venues and food festivals'']'
  career_goals: Usama aims to advance from managing a single location to a regional supervisory role that oversees multiple eateries, leveraging his analytical mindset to standardize best practices and
    lift overall profitability. Concurrently, he dreams of launching a family‑owned restaurant that celebrates authentic Honduran flavors while appealing to Nashville’s eclectic palate, a venture he sees
    as a legacy for his wife and children. To support these ambitions, he plans to earn a certified food‑service management credential, attend leadership workshops that address his emotional reactivity,
    and develop stress‑management techniques that sustain his high‑energy, sociable presence. Ultimately, he envisions a career that balances corporate advancement with entrepreneurial freedom, enabling
    him to mentor aspiring Hispanic chefs and give back to the local community.
