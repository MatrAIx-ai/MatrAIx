persona_description: A political figure who is responsible for leading and chairing the meetings of the House of Representatives in Australia. The Speaker is typically a person with considerable parliamentary
  experience and is elected from among the 150 Members of the House. The Speaker's role is similar to that of a Minister in relation to a government department, overseeing the administration of the Department
  of the House of Representatives. The Speaker is also responsible for ensuring that Members of the House comply with the rules and procedures of the House. The current Speaker is Bronwyn Bishop MP, and
  the Deputy Speaker is Bruce Scott MP.
