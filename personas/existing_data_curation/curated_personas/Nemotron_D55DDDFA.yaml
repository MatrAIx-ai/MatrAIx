personas:
  professional: Jennifer Beebe, a health information manager at a regional hospital, leverages deep expertise in Epic and Cerner EHRs, ICD‑10‑CM coding, and data analytics with Power BI to streamline record
    workflows, and they consistently ensure flawless compliance with HIPAA while mentoring junior staff through their methodical, routine‑driven nature.
  sports: Jennifer Beebe enjoys leisurely walks through Forest Park, follows the St. Louis Cardinals and St. Louis City SC avidly, participates in a local community tennis league, and they are a reliable
    doubles partner whose cooperative spirit values routine practice sessions.
  arts: Jennifer Beebe immerses themselves in historical fiction from authors like Ken Follett and Philippa Gregory, contributes to a neighborhood book club, knits scarves while listening to folk singer
    John Denver, and they occasionally attend productions at the Fox Theatre, reflecting a blend of tradition and creative solace.
  travel: Jennifer Beebe prefers short, well‑planned road trips to the Ozark Mountains and a yearly pilgrimage to their family's ancestral town in Ireland, balances travel with work commitments using meticulous
    itineraries, and they let a love of heritage sites fuel a wish to someday explore Munich’s museums.
  culinary: Jennifer Beebe delights in baking sourdough and rye bread, perfecting Irish soda bread for church gatherings, expertly seasons garden‑grown tomatoes and basil in a fresh bruschetta, and they
    showcase moderate cooking skill by combining practical recipes with seasonal produce.
  core: Jennifer Beebe is a reliably organized health data steward who channels Midwestern practicality into every facet of life, from precise budgeting and diligent health monitoring to garden‑fresh baking
    and a steady rhythm of community service, yet they secretly hoard crossword puzzles for late‑night challenges.
background:
  cultural: Jennifer was raised in St. Louis County in a middle‑class, Midwestern white family with German and Irish ancestry. Her upbringing emphasized practicality, community involvement, and a strong
    work ethic typical of the Midwest. She identifies with the region’s values of hospitality, reliability, and respect for tradition, and she actively participates in local community activities such as
    church groups and volunteer health programs. These cultural experiences shape her preference for routine, her cooperative nature, and her commitment to supporting others.
attributes:
  skills: '[''Electronic Health Record (EHR) management (Epic, Cerner)'', ''Medical coding (ICD-10-CM, CPT)'', ''HIPAA compliance and health information privacy'', ''Medical record auditing and quality
    assurance'', ''Standard operating procedure development'', ''Data analysis and reporting (SQL, Excel, Power BI)'', ''Workflow optimization and process improvement'', ''Health informatics project support'']'
  hobbies: '[''gardening'',''baking bread and pastries'',''reading historical fiction'',''participating in a book club'',''volunteering at a community health clinic'',''knitting'',''solving crossword and
    Sudoku puzzles'',''walking in Forest Park'',''attending church fellowship events'']'
  career_goals: She aims to become a certified Registered Health Information Administrator (RHIA) within the next two years, pursue a Master's degree in Health Informatics, and ultimately advance to a leadership
    role such as Director of Health Information Management or Chief Health Information Officer at a health system, where she can drive data quality initiatives, implement system‑wide record management strategies,
    and mentor junior staff. Jennifer also hopes to contribute to regional health data initiatives that improve community health outcomes while maintaining a stable, routine‑oriented career path.
