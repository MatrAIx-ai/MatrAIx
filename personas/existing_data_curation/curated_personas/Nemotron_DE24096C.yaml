personas:
  professional: Juan Vidal, a curious four‑year‑old who spends afternoons constructing elaborate block cities in the living room, balancing boundless imagination with a surprisingly practical insistence
    on sturdy foundations, and they often remind themselves to tidy up before bedtime.
  sports: Juan Vidal cheers for the local baseball team the Cubs while playing on the neighborhood's Tiny Tigers junior soccer club, and they love splashing in the community pool during summer, eagerly
    trying to master the butterfly stroke.
  arts: Juan Vidal delights in coloring vibrant pictures of dinosaurs with Crayola markers, dancing to the upbeat tunes of Pharrell’s “Happy,” and watching animated classics by Pixar, especially the whimsical
    world of “Toy Story.”
  travel: Juan Vidal enjoys family road trips to the seaside town of Santa Cruz, where they build sandcastles, and they dream of visiting the magical kingdom of Disneyland Paris someday.
  culinary: Juan Vidal loves cheesy macaroni, peanut butter and jelly sandwiches, and crunchy carrot sticks with hummus, often insisting on stirring the pot by themselves even if they end up spilling the
    sauce.
  core: Juan Vidal is a wonderfully inquisitive four‑year‑old who balances playful curiosity with a practical streak, yet they worry about routine changes and can be delightfully messy when building sprawling
    block fortresses.
background:
  cultural: Juan grows up in a Mexican‑American household in Red Bank, New Jersey. Spanish is spoken at home alongside English, giving him a bilingual foundation from an early age. Family gatherings often
    feature traditional Mexican foods like tacos, tamales, and fresh salsa, and celebrations such as Día de los Muertos and holidays like Cinco de Mayo are observed with crafts, music, and storytelling.
    He participates in community events at the local Hispanic cultural center, where he learns folk dances and hears stories from his grandparents about Mexico. At the same time, his everyday life is shaped
    by the multicultural environment of Monmouth County, exposing him to diverse neighbors, public parks, and a school curriculum that blends American and cultural education. This hybrid background nurtures
    his curiosity, respect for tradition, and adaptability.
