  hobbies: '[''building block construction'', ''drawing and coloring'', ''storytime at the local library'', ''playing at Red Bank parks'', ''singing and dancing to Mexican folk music'', ''helping in the
    kitchen'', ''pretend role‑play (firefighter, chef)'']'
  career_goals: Juan loves to imagine big, helpful roles. He often says he wants to be a builder who designs safe playgrounds, reflecting his practical curiosity about how things work. He also dreams of
    being a firefighter who rescues people, showing his cooperative nature. Occasionally, he talks about becoming a chef like his mother, preparing Mexican dishes for his family. These ambitions are fluid
    and shift with his interests, embodying his love for flexibility and exploration.
