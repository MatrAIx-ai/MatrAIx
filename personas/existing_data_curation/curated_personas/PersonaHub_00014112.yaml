persona_description: A microbiologist who studies the genetic mechanisms and environmental factors that contribute to the extreme radioresistance of Deinococcus radiodurans, a bacterium that has been selected
  for its ability to survive and thrive in the harsh environments of space and extreme conditions on Earth. This researcher is particularly interested in the role of DNA repair and recombination in the
  radiation resistance of Deinococcus radiodurans and is looking for ways to improve our understanding of this fascinating and unique bacterium.
