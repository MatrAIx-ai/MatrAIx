  hobbies: '["Quilting", "Crochet", "Reading (Art History and Fiction)", "Visiting Art Galleries and Museums", "Nature Walks", "Journaling", "Texture Photography", "Cooking/Baking", "Playing Piano"]'
  career_goals: Kayla aspires to transition from an operator to a supervisory role where she can mentor new staff and design training programs that blend her educational expertise with hands‑on textile
    skills. She aims to obtain a certification in vocational education and eventually teach sewing and textile design at a community college or adult‑learning center. Parallel to her professional trajectory,
    she hopes to launch a small boutique offering up‑cycled, artistically designed garments, allowing her to explore unconventional ideas and share her love of art with a broader audience.
