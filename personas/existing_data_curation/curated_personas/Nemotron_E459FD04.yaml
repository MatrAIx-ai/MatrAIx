  hobbies: '[''Gallery and Street‑Art Exploration'', ''Digital Photography (Desert Landscapes)'', ''Hiking'', ''Chess'', ''Raspberry Pi DIY Projects'', ''Cooking Traditional Mexican Cuisine'', ''Indie Game
    Development'', ''Small‑Group Tech Meetups'']'
  career_goals: Roberto aims to progress into senior IT leadership within the next five years, targeting roles such as Senior IT Manager or Director of Information Systems. He plans to earn a bachelor’s
    degree in Information Technology and obtain certifications like PMP, CISSP, and AWS Solutions Architect Professional. His long‑term ambition is to become a Chief Technology Officer of a tech‑driven
    organization that values innovative, user‑centric solutions, particularly integrating AI‑powered analytics into business processes. He also hopes to mentor emerging talent from underrepresented backgrounds
    and eventually launch a boutique consultancy focused on digital transformation for midsize enterprises.
