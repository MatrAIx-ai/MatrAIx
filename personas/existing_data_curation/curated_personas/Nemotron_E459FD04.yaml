personas:
  professional: Roberto Guadalupe is a 24‑year‑old network and cloud engineer who blends meticulous documentation and budget oversight with a flexible, solution‑driven mindset, leading small cross‑functional
    teams through rapid troubleshooting while maintaining compliance and always questioning vendor proposals with a competitive edge.
  sports: Roberto Guadalupe enjoys solo hikes with the Phoenix Desert Trail Club, follows the Phoenix Suns and Arizona Cardinals, plays casual chess tournaments at the local coffee shop, and maintains a
    flexible fitness routine that balances desert cardio with occasional gym sessions.
  arts: Roberto Guadalupe frequents the Phoenix Art Museum and local street‑art installations, sketches mural concepts inspired by Shepard Fairey and Banksy, draws UI design ideas from Ansel Adams’ landscape
    photography, and unwinds listening to Tycho’s ambient electronica.
  travel: Roberto Guadalupe plans meticulously for road‑trip adventures—having explored the Grand Canyon, Sedona, and a weekend in Albuquerque—while dreaming of trekking Patagonia’s fjords and wandering
    Kyoto’s bamboo forests, always balancing budget constraints with a desire for immersive cultural experiences.
  culinary: Roberto Guadalupe experiments with regional mole variations, layering dark chocolate, dried chiles, almonds, and spices over chicken, perfects homemade corn masa tortillas, and relishes the
    creative process of plating dishes as an extension of their artistic sketching habit.
  core: Roberto Guadalupe is a curious, competitive introvert who merges disciplined IT leadership ambitions with a thriving passion for art, solo desert hikes, and culinary experimentation, often juggling
    meticulous planning with spontaneous tech tinkering.
background:
  cultural: Roberto grew up in a bicultural household that speaks both Spanish and English fluently. His family maintains Mexican traditions such as celebrating Día de los Muertos, preparing regional dishes
    from Jalisco, and emphasizing respeto for elders. Living in Morristown, Arizona, he balances these roots with the broader Southwestern culture, often participating in local cultural festivals and volunteering
    at community centers that offer tech workshops for Spanish‑speaking youth. This blend of Mexican heritage and American environment shapes his perspective on collaboration, resilience, and the importance
    of preserving cultural identity while embracing innovation.
attributes:
  skills: '[''Network Administration'', ''Cloud Architecture (AWS/Azure)'', ''Cybersecurity Controls'', ''Server Virtualization'', ''Automation Scripting (Python, PowerShell)'', ''Technical Documentation'',
