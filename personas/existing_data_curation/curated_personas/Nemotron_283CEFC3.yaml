    and equipment maintenance", "Customer service and professional communication"]'
  hobbies: '["Biking the Chain of Lakes trail", "Community dance classes (salsa, swing)", "Cooking and hosting potluck dinner parties", "Free‑clinic dental outreach volunteering", "Live‑music outings at
    First Avenue", "Paddle‑boarding on Bde Maka Ska", "Quilting circle gatherings", "Yoga and mindfulness workshops", "Habitat for Humanity volunteer builds"]'
  career_goals: Francine aims to become a certified dental laboratory technician (CRD) and deepen her proficiency in digital dentistry and ophthalmic device technology. She envisions moving into a senior
    technician or lab supervisor role where she can mentor new staff and streamline production workflows. Over the next five years, she hopes to lead a small specialty lab that blends traditional hand‑crafting
    with cutting‑edge 3D printing, giving her the autonomy to set her own schedule while maintaining a reliable income. Continuing education courses and industry certifications are key milestones in her
    plan, balanced with a desire for work‑life flexibility as she builds a supportive social network after her divorce.
