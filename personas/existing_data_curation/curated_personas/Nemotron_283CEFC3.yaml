personas:
  professional: Francine Meek is a dental and ophthalmic laboratory technician whose expertise in CAD/CAM design, 3‑D printing, and meticulous lens grinding is amplified by her structured yet flexible mindset,
    making her a natural mentor who balances precise workflow with the sociable energy she brings to collaborative lab environments.
  sports: Francine Meek cycles the Chain of Lakes with the Minneapolis Bike Club, paddle‑boards on Bde Maka Ska through the Twin Cities Paddle Board Association, hikes the Mississippi River bluffs in the
    summer, and follows the Minnesota Vikings, Twins, and Timberwolves, treating each season as an opportunity to blend structured workouts with spontaneous salsa‑inspired cardio bursts.
  arts: Francine Meek immerses herself in the Minneapolis arts scene by dancing to live sets of Prince covers at First Avenue, collecting vintage Faith Ringgold‑inspired quilts, and cheering the local jazz
    trio The Bad Plus while hosting themed potlucks that feature playlists ranging from Marc Antonio’s salsa hits to Maggie Rogers’ folk anthems.
  travel: Francine Meek prefers low‑key, friend‑focused road trips that mix adventure—like a weekend canoeing expedition on the Boundary Waters—with cultural stops at Chicago’s Millennium Park and Copenhagen’s
    Nyhavn, while budgeting for a future dream vacation to Buenos Aires to study tango rhythms.
  culinary: Francine Meek’s culinary style blends collaborative potluck flair—serving dishes like quinoa‑lime salad with roasted carrots, pineapple‑mango salsa, and homemade sourdough—while she delights
    in fresh basil, smoked paprika, and maple‑glazed salmon, showcasing a confident home‑cook skill set that balances comfort food with occasional gourmet experiments.
  core: Francine Meek fuses precise lab craftsmanship with a vibrant social life, often juggling a spare set of salsa shoes in her lab coat pocket while habitually misplacing her keys after a night of dancing.
background:
  cultural: Francine grew up in a white, working‑class family with German and Scandinavian roots in the Twin Cities. The Midwestern emphasis on community involvement, modesty, and a strong work ethic shaped
    her practical outlook. Minnesota's diverse immigrant neighborhoods exposed her to a variety of cultural traditions, fostering an appreciation for collaboration and social gatherings. While raised in
    a modest Methodist household, she now identifies as culturally secular but retains values of responsibility, politeness, and mutual support common in the region. The city’s robust arts scene, outdoor
    recreation culture, and commitment to public health inform both her professional choices and personal interests.
attributes:
  skills: '["3D printing of prosthetic devices", "CAD/CAM dental appliance design", "Dental prosthetics fabrication (dentures, crowns, bridges)", "Ophthalmic lens grinding and edging", "Quality control
