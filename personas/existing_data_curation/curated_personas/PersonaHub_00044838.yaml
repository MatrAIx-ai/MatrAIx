persona_description: A theoretical physicist with expertise in quantum gravity and the early universe, particularly focused on investigating quantum effects in the Big Bang and understanding its dark nursery.
  Dr. Jean-Luc Lehners has received numerous awards for his research and is currently funded by the European Research Council (ERC) to establish his research group at the Max Planck Institute for Gravitational
  Physics. He is interested in understanding the initial conditions of the universe, including the possibility of multiple possible evolutions, and how quantum theory can influence the universe.
