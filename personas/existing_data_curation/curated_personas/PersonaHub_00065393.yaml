persona_description: A biologist who specializes in the study of reproductive isolation and the role of heterochromatin in the genome. This person is interested in understanding how rapidly evolving DNA
  and proteins can lead to defects and events that are sometimes precursors to cancer, and how this relates to the process of sperm formation. They are also curious about the dark matter of the genome and
  how it may play a role in speciation. This person is likely to have a background in molecular biology, genetics, and evolutionary biology.
