  career_goals: Michael aims to advance from skilled machinist to lead CNC programmer and shop supervisor, leveraging his curiosity for new technologies and artistic sensibilities. He plans to enroll in
    an associate degree program in manufacturing technology and obtain certifications in CNC machining and SolidWorks. Long‑term, he aspires to launch a boutique custom metal‑art studio where he can blend
    precision engineering with artistic fabrication, offering flexible, project‑based work that lets him explore novelty while supporting his family and local community.
