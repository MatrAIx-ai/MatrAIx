personas:
  professional: Eric Gabriel is an aspiring digital illustrator and junior maker who channels a vivid imagination into Minecraft‑inspired concept art and Arduino experiments, and they thrive on a laid‑back,
    flexible workflow that often leaves project deadlines in the rearview.
  sports: Eric Gabriel dabbles in after‑school skateboarding at a local skate club, plays pick‑up soccer in Golden Gate Park, and roots for the San Francisco Giants and Golden State Warriors, balancing
    casual activity with occasional bursts of competitive spirit.
  arts: Eric Gabriel devotes weekends to sketching scenes from Golden Gate Park while listening to Billie Eilish, draws inspiration from the surreal street works of Banksy and the vibrant colors of Van
    Gogh, and frequently cites Hayao Miyazaki’s animated films as a catalyst for their own storytelling.
  travel: Eric Gabriel enjoys weekend trips to the Monterey Bay Aquarium and annual school outings to the de Young Museum, dreams of visiting Tokyo’s Akihabara for its anime culture and the Louvre in Paris,
    yet budget constraints keep most adventures within California’s national parks.
  culinary: Eric Gabriel favors a creative palate, often whipping up avocado toast with a drizzle of sriracha, munching on margherita pizza after art sessions, and experimenting with homemade ramen broth
    using miso, while their go‑to comfort snack remains a warm batch of chocolate chip cookies.
  core: Eric Gabriel is a curiosity‑driven teen who blends artistic flair with tech tinkering, juggling spontaneous spending and occasional disorganization, yet consistently seeks novelty in every sketch,
    song, and sandbox adventure.
background:
  cultural: Eric was raised in a middle‑class family in San Francisco, a city known for its cultural diversity, progressive values, and strong tech and arts scenes. While his family’s ancestry traces back
    to European roots common among many white American households, his upbringing has been shaped by the multicultural environment of the Bay Area, exposing him to a wide range of artistic expressions,
    social perspectives, and innovative technologies. This blend of a supportive family setting and the vibrant, inclusive city culture has fostered his openness to new ideas, emphasis on creativity, and
    appreciation for both individual expression and community collaboration.
