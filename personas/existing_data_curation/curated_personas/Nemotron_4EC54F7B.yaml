  career_goals: Eric dreams of turning his passion for art and technology into a career that blends both, such as becoming a concept artist for video games or a game designer who creates immersive narrative
    worlds. He hopes to attend a specialized high‑school program in visual arts and computer science, then pursue a university degree that balances fine arts with interactive media. Ultimately, he wants
    to work in an environment that values flexibility, creativity, and the freedom to explore new ideas, possibly at a studio or indie development team in the Bay Area.
