  career_goals: Andrea aims to advance to a senior project manager role overseeing regional infrastructure initiatives that prioritize sustainability and community aesthetics. She aspires to mentor junior
    engineers, lead interdisciplinary teams, and influence local policy on resilient design. Long‑term, she envisions establishing a boutique consulting practice that blends civil engineering expertise
    with public art and historic preservation, allowing her to apply her curiosity for innovative ideas while serving the small‑town communities she values.
