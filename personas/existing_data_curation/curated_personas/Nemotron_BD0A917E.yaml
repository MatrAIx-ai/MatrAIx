  hobbies: '[''Cooking Mexican cuisine'', ''Yoga and mindfulness meditation'', ''Hiking in Orange County parks'', ''Reading personal finance/self‑help books'', ''Volunteering with immigrant assistance organizations'',
    ''Attending cultural festivals and community events'', ''Crafting (e.g., pottery, embroidery)'']'
  career_goals: Irah aims to build on her associate degree by completing a bachelor’s in accounting and earning the CPA designation within the next five years. She aspires to advance to a senior bookkeeper
    or audit supervisor role at a mid-sized firm, where she can lead a team and shape internal control processes. Long‑term, she hopes to launch her own boutique bookkeeping consultancy focused on serving
    small Mexican‑American businesses in Orange County, providing reliable, culturally aware financial services while maintaining a balanced, low‑stress lifestyle.
