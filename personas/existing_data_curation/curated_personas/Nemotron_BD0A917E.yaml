personas:
  professional: Irah Ramirez, a detail‑oriented bookkeeper with advanced Excel, QuickBooks, Xero, and SAP expertise, leverages her bilingual communication and assertive problem‑solving to streamline ledger
    reconciliation and internal controls while maintaining the structured routine they craves.
  sports: Irah Ramirez enjoys weekend hikes with the Orange County Hiking Club, follows the Los Angeles Dodgers for baseball, and practices yoga as her primary fitness routine, balancing solitary trail
    time with occasional team‑spirit at local games.
  arts: Irah Ramirez immerses herself in cultural festivals, especially those featuring traditional folk music and contemporary Latin artists like Carlos Vives, while also appreciating the storytelling
    of Guillermo del Toro’s films and the vibrant murals of local street artists.
  travel: Irah Ramirez prefers well‑planned trips that blend exploration with structure, having trekked the Grand Canyon’s South Rim, sampled street food in Oaxaca, and dreaming of a meticulously scheduled
    week in Kyoto’s cherry‑blossom season.
  culinary: Irah Ramirez, an intermediate home chef, delights in preparing traditional Mexican dishes such as chiles rellenos, pozole, and tacos al pastor, carefully measuring spices like ancho chilies
    and epazote, while also savoring farm‑to‑table salads with avocado and corn.
  core: Irah Ramirez balances a love for structured bookkeeping with a restless mind that finds calm in yoga, cooking, and meticulously planned adventures, yet often wrestles with anxiety‑driven perfectionism
    and occasional impulse purchases.
background:
  cultural: Irah is a first‑generation Mexican‑American who grew up in a bilingual household that emphasized family cohesion, respect for elders, and the celebration of cultural traditions such as Día de
    los Muertos and Las Posadas. Fluent in both Spanish and English, she navigates seamlessly between her Mexican heritage and the multicultural environment of Fullerton. Her Catholic upbringing influences
    her values of humility and service, which she expresses through community volunteer work. The strong work ethic and resilience ingrained by her immigrant parents shape her professional drive and commitment
    to supporting fellow Mexican‑American entrepreneurs.
attributes:
  skills: '[''Financial record keeping'', ''General ledger reconciliation'', ''Accounts payable/receivable processing'', ''QuickBooks and Xero proficiency'', ''Advanced Excel (pivot tables, VLOOKUP, macros)'',
