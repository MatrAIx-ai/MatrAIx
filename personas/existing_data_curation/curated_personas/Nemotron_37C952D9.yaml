  hobbies: '["Coaching youth soccer", "Community gardening", "DIY home improvement", "Woodworking", "Reading mystery novels", "Cooking", "Hiking", "Fishing", "Participating in church activities", "Attending
    local cultural festivals", "Group fitness classes"]'
  career_goals: Fadil aims to re-enter the workforce in a role that leverages his organizational talents and passion for helping others, such as a community program coordinator for a local non-profit, a
    recreation supervisor at a park, or a volunteer manager for a neighborhood association. He plans to pursue certifications in project management or community development, and as a longer-term goal, he
    hopes to lead larger initiatives like establishing a community garden or a youth mentorship program. He also entertains the idea of starting a small home-based handyman or landscaping business that
    offers flexibility for his family commitments while providing a stable, structured environment.
