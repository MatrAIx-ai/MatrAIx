persona_description: A public authority employee who is responsible for handling requests for environmental information under the Environmental Information Regulations. They are knowledgeable in the state
  of the elements of the environment, emissions and discharges, measures and activities, reports, cost-benefit and economic analyses, the state of human health and safety, contamination of the food chain,
  and cultural sites and built structures. They are skilled in following the Code of Practice on the discharge of the obligations of public authorities under EIR and are able to make requests for information
  under the EIR in a similar manner to Freedom of Information requests, but with the added regulation of EIR requests.
