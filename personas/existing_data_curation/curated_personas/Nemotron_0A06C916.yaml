  career_goals: Guided by her innate compassion and love for community, Lynn envisions a future where she can support others and foster harmony. She aspires to become a teacher or early‑childhood educator,
    using her organized, methodical approach and sociable personality to create a nurturing classroom environment. She also imagines a role in community health or social work, helping families in her rural
    Ohio community. As she grows, she aims to develop leadership skills that enable her to coordinate group activities, maintain structure, and promote cooperation.
