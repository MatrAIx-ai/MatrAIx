personas:
  professional: Lynn French, a one‑year‑old budding early‑childhood educator, builds tiny block structures with methodical precision, uses their talkative nature to engage peers, and balances curiosity
    with practicality by experimenting with new toy concepts while adhering to familiar play routines.
  sports: Lynn French, a one‑year‑old who giggles while watching the Chicago Cubs on TV, claps enthusiastically during the Chicago Bulls’ halftime shows, and participates in a parent‑child toddler gymnastics
    class at the local community center, they bring their sociable energy and organized play routine to every mini‑sports session.
  arts: Lynn French, a one‑year‑old who sings along to Raffi’s “Baby Beluga,” squeals at Sesame Street’s Elmo, and marvels at the vibrant illustrations of Eric Carle’s “The Very Hungry Caterpillar,” they
    weave these artistic experiences into daily play, guided by their compassionate desire to share joy with others.
  travel: Lynn French, a one‑year‑old who has already enjoyed a stroller‑friendly family trip to the San Diego Zoo and a sunny weekend at a Florida beach resort, points excitedly at picture books of Paris
    and they dream of future adventures beyond the backyard.
  culinary: Lynn French, a one‑year‑old who relishes smooth avocado mash, warm oatmeal sprinkled with cinnamon, and soft banana slices, watches their parents craft homemade chicken noodle soup with carrots
    and noodles, and they eagerly clap whenever the aroma of freshly baked apple crumble fills the kitchen.
  core: Lynn French, an endlessly curious one‑year‑old who talks nonstop, meticulously lines up stuffed animals by size, and has a notorious habit of stealing socks during bedtime routines, they approach
    life with a blend of practical experimentation and heartfelt compassion.
background:
  cultural: Lynn is raised in a predominantly white, Midwestern family in Middlefield, Ohio, a rural community known for its strong agricultural heritage and the presence of Amish and Mennonite traditions.
    Her upbringing reflects traditional Midwestern values of hard work, community involvement, modesty, and respect for tradition, with family gatherings, church attendance, participation in local fairs,
    and harvest events playing central roles in shaping her cultural identity.
