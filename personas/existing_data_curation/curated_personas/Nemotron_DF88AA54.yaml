personas:
  professional: Elizabeth Bohannon is a meticulous butcher in North Platte who blends USDA‑mandated safety protocols with an artist’s eye for presentation, and they regularly train apprentices while dreaming
    of a boutique shop that doubles as a gallery.
  sports: Elizabeth Bohannon follows the Nebraska Cornhuskers football with hometown pride, enjoys weekend softball in the community league and participates in a local yoga class for flexibility, and they
    jog the sand‑blasted trails of the nearby Platte River during spring while keeping a casual membership at the town’s youth gym.
  arts: Elizabeth Bohannon frequents the regional gallery at the Nebraska State Fair, sketches expansive plains vistas inspired by Georgia O’Keeffe’s color fields, experiments with Ansel Adams‑style photography
    of sunrise over wheat fields, and they attend a monthly community art class where they exchange techniques with fellow hobbyists.
  travel: Elizabeth Bohannon prefers DIY road trips in a compact SUV, often heading to Badlands National Park for sunrise shoots and to Santa Fe for its vibrant art scene, and they keep a travel fund earmarked
    for a future spring pilgrimage to the tulip fields of Holland and a culinary tour of Tuscany.
  culinary: Elizabeth Bohannon enjoys crafting bone‑in ribeye with rosemary‑infused butter, experimenting with house‑made pork sausage seasoned with garden‑grown chives and fennel, and they regularly plate
    dishes with an eye for negative space, echoing their visual art practice while sourcing heirloom tomatoes from the local farmer’s market.
  core: Elizabeth Bohannon is a 30‑year‑old butcher‑artist who balances precise meat craft with a love for plains photography, budget‑savvy savings, and a quiet, resilient nature that occasionally trades
    sleep for creative projects.
background:
  cultural: Elizabeth’s cultural background is rooted in the Great Plains Midwest tradition. Her family has lived in Nebraska for several generations, with ancestors who farmed and raised livestock, embodying
    values of hard work, modesty, and a close connection to the land. Local customs such as county fairs, seasonal community meals, and church gatherings have shaped her sense of belonging. While primarily
    of German‑American and Irish‑American heritage, the town’s historic position along rail routes has exposed her to a modest flow of travelers, fostering an openness to new ideas and artistic expression.
    This blend of rural Midwestern values and a subtle cultural diversity informs her balanced outlook, respect for tradition, and curiosity about the wider world.
attributes:
  skills: '["Butchery and Carcass De‑boning", "Custom Meat Cutting and Portioning", "Food Safety and Sanitation Compliance", "Inventory Management and Yield Tracking", "Equipment Maintenance and Sharpening",
    "Team Training and Mentorship", "Aesthetic Meat Display Design", "Creative Problem Solving in Production", "Basic Knowledge of Livestock Anatomy", "Customer Service in Retail Meat Sales"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and drawing", "Landscape photography", "Home cooking and recipe development", "Gardening", "Reading historical fiction", "Knitting or crocheting",
    "Small‑group book club", "Community art workshops", "Volunteering at the local food bank"]'
  career_goals: Elizabeth aims to earn a Certified Meat Professional (CMP) credential and eventually a culinary arts certification to deepen her expertise. In the next five years she hopes to move into
    a supervisory role, leading a team, optimizing production efficiency, and mentoring apprentices. Long‑term, she envisions opening a boutique butcher shop that doubles as a small art gallery or community
    workshop, where she can integrate her love of visual art with her craft. She also aspires to teach butchery workshops that incorporate design principles and to pursue part‑time coursework in business
    management to support her entrepreneurial goals.
