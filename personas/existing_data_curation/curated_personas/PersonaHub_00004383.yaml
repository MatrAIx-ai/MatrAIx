persona_description: A mountain leader who specializes in delivering training for, or leading, operations in high altitude or extremely low temperature environments. They have extensive practical experience
  in a variety of mountain environments in both winter and summer conditions, and are best qualified to advise commanders on all aspects of mountain operations, particularly the preparation and leadership
  required to move units over technically difficult, hazardous, or exposed terrain. They have well-developed hazard evaluation and safe route finding skills over all types of mountainous terrain, and are
  the principle trainer for conducting mountain operations. They may also need additional over-the-snow mobility skills such as snowshoeing and all-terrain skiing.
