  career_goals: Ray aims to complete his bachelor's degree in Business Administration with a focus on information systems within the next two years. He plans to secure a summer internship at a Chicago-based
    tech startup or consulting firm to apply his analytical and project management skills in real-world settings. After graduation, his goal is to become a data analyst or junior project manager, leveraging
    his curiosity for emerging technologies and his practical mindset to drive efficient solutions. Long‑term, Ray aspires to earn a PMP certification and eventually lead cross‑functional teams that develop
    data‑driven strategies for urban development projects, aligning his professional growth with his interest in improving his hometown.
