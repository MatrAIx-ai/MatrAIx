personas:
  professional: Michael Hackney, a seasoned correctional officer with over three decades of hands‑on experience, leverages meticulous record‑keeping, crisis de‑escalation expertise, and a curiosity for
    emerging safety technologies to mentor junior staff and shape policy, positioning them for a senior supervisory role.
  sports: Michael Hackney, a devoted New England Patriots fan who also roots for the Boston Red Sox, participates in the Sanford Men's Softball League, regularly rows with the Portland Rowing Club, and
    keeps fit by hiking Mount Agamenticus each weekend and attending weekly training sessions at the local YMCA.
  arts: Michael Hackney, a classic‑rock vinyl enthusiast who spins Led Zeppelin, The Rolling Stones, and Pink Floyd on a vintage turntable, curates a modest collection of WWII photographs, and attends seasonal
    exhibitions at the Portland Museum of Art featuring American realist painters such as Winslow Homer, all of which feed their love of history and storytelling.
  travel: Michael Hackney, an organized road‑trip planner, has explored historic sites like Gettysburg and the Normandy beaches, favors self‑guided tours of New England lighthouses and Acadia National Park,
    dreams of a heritage‑themed pilgrimage to London’s Imperial War Museum, and balances travel ambitions with a modest budget and family commitments.
  culinary: Michael Hackney, an amateur gardener‑chef, regularly harvests heirloom tomatoes, carrots, and kale to craft cedar‑plank salmon with dill, prepares a hearty lobster bisque using fresh Maine lobster,
    and enjoys a well‑seasoned garlic‑rosemary roast chicken, though they sometimes over‑salt dishes in the pursuit of bold flavor.
  core: Michael Hackney, a methodical yet worry‑prone correctional veteran, balances a love for rugged outdoors, classic‑rock nostalgia, and meticulous work habits, while occasionally splurging on vintage
    engines and over‑racking paperwork, all guided by a deep sense of community duty.
background:
  cultural: Michael is a lifelong resident of Sanford, Maine, raised in a working‑class, Anglo‑Celtic family with deep New England roots. His upbringing in a small‑town community emphasized self‑reliance,
    modesty, and a strong sense of civic duty, values reinforced by regular involvement in local church activities and community service. The coastal and forested landscape of York County shaped his appreciation
    for nature and outdoor recreation, while the region's pragmatic, no‑frills cultural attitude aligns with his organized, reliable personality. Though ethnically white, his life experiences in the correctional
    system and community volunteer work have broadened his perspective on social responsibility and communal harmony.
attributes:
  skills: '[''Inmate supervision'', ''Crisis de‑escalation'', ''Emergency response'', ''Security and surveillance'', ''Report writing'', ''Conflict resolution'', ''Procedural compliance'', ''Physical fitness
    training'', ''Team leadership'', ''Mentoring new officers'', ''Legal and regulatory knowledge'', ''Community outreach'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Vintage engine restoration'', ''Historical non‑fiction reading'', ''Classic rock vinyl listening'', ''Crossword puzzles'']'
  career_goals: Michael aims to transition into a senior supervisory role, such as Shift Supervisor or Facility Operations Manager, where he can shape policy and improve staff training programs. He plans
    to complete a bachelor's degree in criminal justice to bolster his qualifications and to spearhead a mentorship initiative for younger correctional officers. Long‑term, he envisions serving as a consultant
    on prison reform and rehabilitation programs after retirement, leveraging his practical experience to promote humane and effective correctional practices.
