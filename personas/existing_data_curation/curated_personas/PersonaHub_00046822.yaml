persona_description: A person who has undergone a significant transformation, reorienting their emotions and behavior patterns intentionally, and developing separate personalities that occupy part or all
  of their cellular network. They have a stronger, more comprehensive ego in the psychoanalytic meaning of reality orientation, and are more rational, capable of keeping to an ethical code, less given to
  defensiveness and rationalization, and not as influenced by emotion. They are more empathetic than is normal today and recover more quickly from difficulties, and certainly more adaptable. They can detect
  and eliminate negative behavior in themselves rather than maintain them because the ego would be above the identities. They have a more complex brain than now common, with more neurons and especially
  many more connections. They are likely to be interested in the above text as it discusses the possibility of developing and switching separate personalities, which is a topic of interest to them.
