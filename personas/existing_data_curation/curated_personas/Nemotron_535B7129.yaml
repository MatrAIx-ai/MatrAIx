  career_goals: Fernando aspires to combine his passion for helping others with his organizational strengths by pursuing a career in community health outreach, specifically focusing on mental-health support
    for Latino youth in Dallas. He plans to earn a GED, attend a community college, and eventually complete a degree in public health or social work. In the long term, he hopes to design bilingual wellness
    programs, lead workshops in schools, and perhaps develop a mobile app that connects teens with mental-health resources. He also sees himself continuing to engage in public speaking and event organization
    to raise awareness about mental-health stigma within his community. While his ultimate goal is to make a tangible difference, he is also eager to secure stable employment that supports his family.
