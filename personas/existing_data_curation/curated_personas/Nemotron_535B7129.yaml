personas:
  professional: Fernando Belledonne is a budding teen robotics enthusiast and theater tech assistant who leverages their methodical planning and sociable charisma, and they thrive on leading Arduino projects
    while coordinating stage sets, merging engineering precision with performance flair.
  sports: Fernando Belledonne plays midfield for the Riverside Youth Soccer League, trains with the Riverside Rangers club, and they passionately follow FC Barcelona and the LA Galaxy, cheering loudly during
    weekend matches.
  arts: Fernando Belledonne shines on stage in the local youth theater, where they act in productions of Hamilton and design backdrops inspired by the visual style of Guillermo del Toro, while they also
    dance salsa to Celia Cruz and devour sci‑fi novels by Isaac Asimov and Nnedi Okorafor.
  travel: Fernando Belledonne prefers organized weekend getaways, often exploring nearby national parks like the Grand Canyon with family, and they dream of a tech‑filled trip to Tokyo’s Akihabara and a
    soccer pilgrimage to Barcelona, balancing school commitments and a modest travel allowance.
  culinary: Fernando Belledonne enjoys cooking tacos al pastor with pineapple and chipotle adobo, and they expertly steam tamales using masa and fresh corn husks, often sharing these traditional dishes
    with grandparents while experimenting with new spice blends.
  core: Fernando Belledonne is a sociable, methodical teen who fuses robotics, theater, and salsa into a lively routine, and they often battle worry‑filled spirals over school grades and project deadlines.
background:
  cultural: Fernando is a first-generation Mexican-American whose parents emigrated from the state of Oaxaca. He grew up in a bilingual household in Dallas, where Spanish is spoken at home and English at
    school. Family traditions such as celebrating Día de los Muertos, cooking regional Oaxacan dishes, and listening to mariachi and cumbia music remain central to his identity. He is actively involved
    in the local Latino community, attending cultural festivals and participating in a youth mentorship program that connects Mexican-heritage teens with role models. His Mexican roots shape his values
    of family solidarity, respect for elders, and a strong sense of community responsibility, while his Dallas upbringing gives him familiarity with American customs and the city’s multicultural environment.
