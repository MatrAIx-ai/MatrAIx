persona_description: A researcher in the field of geography and environmental resources, particularly interested in the relationship between poverty, economic strength, and physical environment. They are
  a leading researcher in the theory that geography and physical ecology, along with some economic indicators, are responsible for the difference in success in development. They use spatial statistics techniques
  to analyze these theories and shed new light on the variables. Their research has tested the theory that Sachs proposed and has shown that certain variables (coastal population, proximity to a major market)
  are not as significant in development when regional differences are accounted for. They have also tested variables regionally, providing much better results than previously-used global models. Their research
  has also been used to analyze outliers and discuss other important variables, paving the way for future research.
