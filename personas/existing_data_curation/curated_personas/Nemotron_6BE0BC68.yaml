  hobbies: '[''Chess'', ''Soccer (playing and watching local matches)'', ''Coastal biking'', ''Cooking traditional Puerto Rican dishes'', ''Photography (urban and nature)'', ''Listening to salsa, plena,
    and bomba music'', ''Volunteering for community clean‑up events'']'
  career_goals: Ruben aims to complete a bachelor's degree in Business Administration within the next two years, with a focus on supply‑chain management. He aspires to secure an entry‑level position as
    a logistics coordinator or junior project manager at a regional manufacturing firm in Ponce or San Juan, where he can apply his methodical planning abilities. Long‑term, he hopes to earn professional
    certifications (e.g., APICS CPIM) and eventually lead a logistics team or launch his own small brokerage business that supports local producers.
