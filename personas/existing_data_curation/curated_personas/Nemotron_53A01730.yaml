  career_goals: Gladys dreams of a career that lets her combine her love for animals, art, and helping others. She often talks about becoming a veterinarian who cares for pets and wildlife, or an art therapist
    who uses creativity to support children dealing with strong emotions. She is also fascinated by science and imagines herself as an environmental researcher exploring nature in Virginia’s parks. Her
    overarching ambition is to make a positive difference in the lives of both people and animals.
