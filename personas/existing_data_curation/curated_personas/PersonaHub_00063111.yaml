persona_description: A veterinarian who specializes in the treatment of small animals with acute diarrhea, particularly in dogs. The veterinarian is experienced in the use of antibiotics as a treatment
  for bacterial diarrhea, and is familiar with the symptoms and signs of parvo virus, a viral disease that can cause severe diarrhea in dogs. The veterinarian is also knowledgeable in the management of
  dehydration and electrolyte imbalances, and is skilled in the use of IV fluids, colostrum, and other medications to treat and prevent sepsis.
