persona_description: A member of the Irish Republican Brotherhood and a key figure in the founding and development of the Socialist/Communist IRA organization, Sheila "Sighle" Humphreys was a leading figure
  in the Irish Republican movement during the early 20th century. She was arrested and imprisoned multiple times by the British authorities for her political activities, including membership in the IRA
  and Cumann na mBan. Despite facing imprisonment and repression, she continued to play a significant role in the Irish Republican movement and was a key figure in the organization's efforts to overthrow
  British imperialism and establish a Republican Ireland. Her political beliefs and actions were closely aligned with those of the Socialist/Communist movement, and she was known for her commitment to the
  principles of revolution and the establishment of a socialist society. Her life and work continue to be the subject of study and interest among historians and political scientists.
