  hobbies: '[''Listening to R&B, gospel, and hip‑hop'', ''Cooking Southern cuisine'', ''Reading contemporary fiction and memoirs'', ''Yoga and mindfulness practice'', ''Volunteer work at local church food
    pantry'', ''Community clean‑up events'', ''Photography of landscapes and historic sites'']'
  career_goals: Natasha aims to advance from her current support role to an office manager position within the next three to five years, leveraging her growing knowledge of business operations. She plans
    to complete an associate degree in Business Administration while gaining certification in project coordination to strengthen her organizational capabilities. Long‑term, she envisions moving into operations
    coordination for a regional nonprofit or small business, where she can blend her practical office skills with her passion for community impact. She also harbors an entrepreneurial ambition to one day
    launch a boutique online store that showcases Southern-inspired fashion and home décor, combining her curiosity for trends with practical business acumen.
