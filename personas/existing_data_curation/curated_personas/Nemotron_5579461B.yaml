  career_goals: Joni aspires to become a multidisciplinary visual storyteller, envisioning a future as a graphic novelist or concept artist who blends illustration, narrative, and technology. She hopes
    to attend a specialized high school for the arts, then pursue a degree in Interactive Media or Fine Arts. She is also interested in environmental communication, dreaming of using her art and writing
    to raise awareness about nature and climate issues. Over the next decade, she aims to build a strong portfolio, secure mentorships, and eventually work on projects that combine creativity with social
    impact.
