personas:
  professional: Joni Price is an aspiring visual storyteller who blends hand‑drawn illustration, watercolor washes, and digital comic creation, using a curious eye for fantasy worlds and a calm, organized
    workflow to produce detailed storyboards for school projects and personal zines.
  sports: Joni Price enjoys the flexibility of after‑school pick‑up basketball at the community gym, cheerfully follows the nearby River Valley Raptors middle‑school soccer team, and roots for the Chicago
    Bulls during the NBA season, while occasionally joining the town’s youth swimming club for low‑impact exercise.
  arts: Joni Price actively participates in the school art club, draws inspiration from Studio Ghibli films, the comic series Bone by Jeff Smith, and the whimsical sketches of Shaun Tan, while practicing
    piano pieces by Ludwig van Beethoven and Pyotr Ilyich Tchaikovsky during weekly lessons.
  travel: Joni Price favors short, thoughtfully planned weekend getaways to nearby state parks such as Brown County State Park to photograph autumn foliage, dreams of traveling to Kyoto during the fall
    to capture Japanese maples, and keeps a travel sketchbook to doodle memorable scenes.
  culinary: Joni Price loves baking vanilla cupcakes topped with raspberry buttercream and experimenting with new frosting flavors, enjoys making homemade pizza with a crisp mozzarella and fresh basil,
    and often adds a dash of cinnamon to their favorite strawberry shortcake for extra warmth.
  core: Joni Price blends a calm, organized mindset with boundless curiosity, turning everyday moments into vivid sketches, careful savings, and thoughtful adventures, all while juggling school, art, and
    a love for cupcakes.
background:
  cultural: Joni grows up in a white New England family in the small town of Dunbarton, New Hampshire. The community places a high value on education, outdoor recreation, and local traditions such as town
    fairs, autumn leaf tours, and high school hockey games. Her family encourages curiosity, self‑reliance, and community involvement, often taking weekend hikes in nearby forests and participating in volunteer
    activities. These New England cultural influences foster her appreciation for nature, modest resilience, and a balanced approach to individuality and communal responsibility.
