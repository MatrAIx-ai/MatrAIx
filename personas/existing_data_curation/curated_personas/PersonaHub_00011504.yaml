persona_description: A veterinarian with a special interest in canine and feline parasites, particularly those affecting dogs. They are knowledgeable about the different types of mites that can affect dogs
  and how they are transmitted between hosts. They are skilled in diagnosing and treating mange in dogs and cats, and are familiar with the various treatments and medications available for different types
  of mites. They are also aware of the potential for mites to cause severe itching and allergies in sensitive animals. They are dedicated to providing the best care for dogs and cats and are passionate
  about their work.
