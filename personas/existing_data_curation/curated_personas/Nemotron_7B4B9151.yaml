personas:
  professional: Javad Seeram, a 13‑year‑old aspiring technologist, channels their love for structure and small‑team problem‑solving into designing LEGO automatons and contributing meticulous code to their
    school’s robotics projects, balancing creativity with practical execution.
  sports: Javad Seeram, who prefers low‑impact activities, practices table tennis at the community center twice a week, cheerfully supports the local junior soccer team the Riverdale Raptors, and occasionally
    joins a school intramural robotics‑themed obstacle course, reflecting a balance of strategic movement and modest fandom.
  arts: Javad Seeram, an avid manga artist inspired by Akira Toriyama and Hajime Isayama, spends weekends sketching detailed character sheets, builds elaborate LEGO sculptures, and attends weekly screenings
    of Studio Ghibli films accompanied by the soothing melodies of Joe Hisaishi, weaving visual storytelling into their daily life.
  travel: Javad Seeram, eager for hands‑on learning, dreams of visiting the interactive science museum in Boston and exploring the bustling manga district of Tokyo during school holidays, but usually sticks
    to weekend trips to nearby historic forts because of parental scheduling constraints.
  culinary: Javad Seeram, who loves to help in the kitchen during festivals, enjoys preparing aromatic spiced rice and sweet pastry bites, experiments with making simple sushi‑roll–style snacks using rice
    and seaweed, and frequently snacks on peanuts while drawing, blending precise assembly skills with flavor exploration.
  core: Javad Seeram, a meticulous 13‑year‑old with a penchant for solitary creation, balances systematic LEGO builds and manga sketches with quiet worries and a habit of meticulously cataloguing every
    hobby in color‑coded notebooks.
background:
  cultural: Javad comes from a South Asian family that maintains strong cultural ties while living in Stone Mountain, GA. At home, he speaks Hindi and celebrates festivals such as Diwali and Eid with traditional
    foods and rituals. His family values education, community service, and close intergenerational relationships. The local South Asian community center offers cultural programs, and Javad participates
    occasionally in dance and music workshops, which enrich his bicultural identity.
