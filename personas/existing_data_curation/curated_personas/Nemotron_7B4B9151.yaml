  career_goals: Javad aspires to pursue a career that marries his love for structured problem‑solving with a desire to help others. He is interested in becoming a software engineer or data analyst, aiming
    to develop reliable, user‑friendly applications. He also considers a future in biomedical engineering, seeing it as a way to combine his technical skills with a meaningful impact on health.
