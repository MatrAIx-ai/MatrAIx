personas:
  professional: Rosa Diaz is an aspiring junior illustrator who channels their curiosity and love for quiet observation into detailed sketches of neighborhood scenes, leveraging their organized sketchbook
    routine while allowing flexible creativity during free play.
  sports: Rosa Diaz enjoys playing on the Little Explorers soccer club during the fall, takes swimming lessons at the community pool in summer, and quietly cheers for the city’s professional baseball team,
    the River Cats, from the stands on weekends.
  arts: Rosa Diaz finds artistic inspiration while listening to the traditional folk ensemble El Son del Pueblo and pop star Billie Eilish, admiring the whimsical illustrations of Oliver Jeffers and the
    dreamy animation of Hayao Miyazaki, which together shape their playful yet thoughtful sketches.
  travel: Rosa Diaz loves family trips to the nearby state park for quiet nature walks, has visited the coastal town of Santa Cruz, dreams of exploring the ancient ruins of Machu Picchu, and often plans
    future adventures as short weekend getaways due to limited vacation time.
  culinary: Rosa Diaz delights in helping prepare family flatbread with fresh cilantro, sautéed peppers, and homemade bean filling, favors simple dishes like cheese quesadillas and fruit salad with mango
    and strawberry, and experiments with a pinch of cumin for extra flavor while learning traditional recipes.
  core: Rosa Diaz is a quietly curious eight‑year‑old who treasures solitary sketching, meticulously collects shells and rocks, occasionally loses track of time in imaginative worlds, and balances a gentle
    kindness with a tendency toward absent‑minded forgetfulness.
background:
  cultural: Rosa is a first‑generation Mexican‑American raised in La Puente, California. She grows up in a bilingual household where Spanish is spoken at home and English at school. Family traditions like
    Día de los Muertos, quinceañera planning, and cooking tacos al pastor are integral to her life. Her community celebrates Mexican holidays with parades and street festivals, providing her with a strong
    connection to her heritage while also embracing the multicultural environment of Los Angeles County. This blend of Mexican cultural values—respect for elders, communal harmony, and artistic expression—shapes
    her worldview and daily habits.
