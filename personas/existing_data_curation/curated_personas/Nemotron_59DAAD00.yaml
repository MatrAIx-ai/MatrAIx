  career_goals: Rosa dreams of one day creating beautiful stories and illustrations that children can explore on their own. She imagines herself as a children’s book author and illustrator, or a museum
    guide who designs quiet, immersive art spaces. She also expresses curiosity about the stars, hoping to become an astronomer who can share the wonder of the night sky with others.
