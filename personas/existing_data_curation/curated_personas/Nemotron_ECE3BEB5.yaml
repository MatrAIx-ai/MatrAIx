  career_goals: Rolando aims to move from a janitorial role to a supervisory position within the facilities management field. He plans to enroll in a community college certification program for Facility
    Management and pursue OSHA certification to enhance his qualifications. Over the next few years, he hopes to lead a cleaning team, mentor new hires, and eventually become a facilities coordinator or
    manager for a large commercial property. Long‑term, he dreams of starting his own small cleaning business that incorporates eco‑friendly practices and offers services to local art venues, merging his
    practical expertise with his love for the arts. Financial stability for his family and the ability to support his wife’s aspirations are central to his career ambitions.
