personas:
  professional: Rolando Gutierrezcruz leverages his keen eye for detail and love of street art to excel as a senior janitor, often suggesting aesthetic upgrades to facility owners while building strong
    relationships with occupants, and is actively pursuing OSHA certification and a community college facility management certification to move into a supervisory role.
  sports: Rolando Gutierrezcruz competes in a weekend community soccer league with fellow friends, cheers for the Tampa Bay Rowdies and follows Inter Miami, and incorporates regular pick‑up matches at Al
    Lopez Park to stay fit and social.
  arts: Rolando Gutierrezcruz captures downtown Tampa’s murals on his camera, spends evenings sketching watercolors of graffiti walls, attends gallery openings featuring artists like Shepard Fairey and
    local muralist Jodi Holland, and keeps a playlist of regional Mexican singers such as Luis Miguel alongside contemporary pop stars like Dua Lipa.
  travel: Rolando Gutierrezcruz favors short road trips to nearby beach towns like Clearwater and cultural festivals in New Orleans, while dreaming of an extended stay in Oaxaca to explore its vibrant mural
    scene and community food markets, planning trips around his flexible work schedule and budget.
  culinary: Rolando Gutierrezcruz prepares tacos al pastor using marinated pork with achiote, pineapple, and adobo, meticulously simmers mole poblano with chilhuacle peppers, chocolate, and sesame seeds,
    and enjoys experimenting with homemade salsa, though he sometimes overcooks the tortillas in his enthusiasm.
  core: Rolando Gutierrezcruz blends a relaxed, social outlook with a curiosity for art and a practical work ethic, juggling community soccer, mural photography, and a vision for an eco‑friendly cleaning
    startup while occasionally misplacing his schedule.
background:
  cultural: Rolando was raised in a Mexican‑American household that values family, community, and cultural traditions. He grew up speaking Spanish at home and English at school, making him fluent in both
    languages. Celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas with a Mexican twist are central to his family life, often involving homemade foods, music, and gatherings. His heritage
    influences his love for Mexican cuisine, his passion for soccer, and his appreciation for vibrant colors and storytelling, which he sees reflected in Tampa’s street art. While living in Florida, he
    maintains strong ties to the local Hispanic community, participates in cultural festivals, and respects the blend of Mexican customs with broader American lifestyle.
