  career_goals: Melody aims to transition from physical labor to a supervisory or safety‑focused role within the next five years. She plans to complete the OSHA 30‑hour certification and obtain a heavy‑equipment
    operator license, positioning herself for a crew lead or site safety coordinator position. Ultimately she hopes to leverage her organizational strengths to mentor younger workers, improve workplace
    safety culture, and secure a stable income that will support an early‑retirement plan while allowing her to manage her anxiety through a less physically demanding schedule.
