  hobbies: '["Model kit building","Reading adventure/wildlife books","Baseball","Fishing","Helping in the family garden","Caring for his dog","Drawing/sketching","Playing Minecraft (strategy video games)"]'
  career_goals: Paul hopes to finish high school and enroll in a vocational program for agricultural mechanics or automotive repair. His long‑term ambition is to work on his family’s farm or at a local
    garage, providing reliable service to his community. He also dreams of someday taking over or helping manage the family farm, ensuring its continuity. As a backup, he is interested in becoming a school
    counselor or teacher’s aide, where he can use his kindness and empathy to support fellow students.
