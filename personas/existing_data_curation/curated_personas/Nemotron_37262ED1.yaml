  career_goals: Archie's immediate goal is to graduate high school with a solid GPA, earn a certification in digital media production, and secure an internship at a local media studio. Long‑term, he aspires
    to become a multimedia journalist or digital content strategist who can tell stories about his community, and eventually launch his own media company that provides a platform for under‑represented voices
    in South Florida. He also hopes to use his leadership skills to mentor younger kids through after‑school programs.
