personas:
  professional: Archie Barnes is a budding teen content creator who blends curiosity about the latest video‑editing tools with practical, deadline‑driven school projects, reliably delivering polished TikTok
    tutorials while also keeping the rhythm as the dependable drummer for the local church youth band.
  sports: Archie Barnes drops an average of 20 points per game for the Willowbrook Middle School Tigers, spends weekends at the Atlantic Boardwalk Skatepark mastering tricks, and roots for the Golden State
    Warriors while proudly wearing a local skate‑club hoodie.
  arts: Archie Barnes channels rhythmic energy into drumming for the church youth band, draws inspiration from graphic novels like Saga and Watchmen, and curates TikTok edits set to tracks by Billie Eilish
    and Travis Scott, shaping a creative identity that balances visual storytelling with musical beats.
  travel: Archie Barnes prefers spontaneous weekend trips to nearby beach towns such as Seaside Cove for surf‑clean‑ups, dreams of visiting Tokyo’s Akihabara for a gaming expo, and has saved for a family
    road‑trip to Orlando’s theme parks, balancing budget constraints with a love for cultural immersion.
  culinary: Archie Barnes loves devouring pepperoni pizza and spicy chicken tacos while occasionally whipping up a quick mac‑and‑cheese in the kitchen, and treats themselves to bubble tea with boba pearls
    as a post‑study reward, showing a modest but enthusiastic cooking skill set.
  core: Archie Barnes is a tech‑savvy, socially‑charged teen who balances relentless curiosity with pragmatic planning, turning skateboards, drums, and TikTok edits into a lively tapestry of community‑centered
    creativity.
background:
  cultural: Archie is raised in a close‑knit African‑American family in Fort Lauderdale. His parents have deep roots in the local Black community, attending the historic First Baptist Church and participating
    in cultural events such as the Broward County Black Heritage Festival. He grew up listening to hip‑hop, R&B, and reggae, and his family values education, community service, and self‑expression through
    music and sports. The multicultural atmosphere of South Florida, with its Caribbean and Latin influences, also shapes his worldview and fuels his desire to celebrate and amplify diverse voices.
