  career_goals: At 60, Lynnette aims to transition from frontline cashier duties to a mentorship or training role within the retail sector, seeking certification as a retail trainer so she can share her
    procedural expertise while maintaining a predictable schedule. Simultaneously, she dreams of launching a community‑focused reading program at a local library or senior center, combining her love for
    literature with her sociable nature. In the longer term, she hopes to publish a memoir reflecting on her life in Los Angeles, which would provide both personal fulfillment and a modest supplemental
    income for a comfortable retirement.
