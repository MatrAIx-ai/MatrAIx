personas:
  professional: Mirta Garduno, a precocious three‑year‑old who delights in building block constructions and solving simple puzzles, merges curiosity with practicality by sorting toys methodically while
    still diving into spontaneous make‑believe adventures, even though they often abandon structured play for free‑form fun.
  sports: Mirta Garduno, a bubbly participant in a neighborhood toddler gymnastics class who roots for the San Antonio Spurs during family game nights, loves splashing in the community pool in summer, prefers
    spontaneous playground tag over rigid training, and they embody a flexible approach to fitness that matches their energetic personality.
  arts: Mirta Garduno, an enthusiastic mini‑artist who loves drawing bright sugar‑skull faces inspired by Día de los Muertos, dances to the lively rhythms of Celia Cruz, listens to the soundtrack of the
    film Coco, and they frequently request storytime books full of colorful folklore, showcasing their boundless curiosity fused with cultural storytelling traditions.
  travel: Mirta Garduno, an adventurous three‑year‑old who enjoys short family road trips to the Hill Country’s rolling vineyards and sunny beach days at South Padre Island, plans each outing with a crayon‑drawn
    map pinned to the fridge, eagerly anticipates the lively parades during local celebrations, and they often get distracted by roadside candy stalls.
  culinary: Mirta Garduno, a pint‑sized foodie who insists on smearing avocado crema on soft chicken tacos before taking a bite, eagerly helps mash ripe mangoes for fresh salsa, loves the sweet smell of
    caramel corn at festive gatherings, and they frequently end up with bright sauce splatters everywhere.
  core: Mirta Garduno, a curious and sociable three‑year‑old who blends spontaneous play with practical tidying, spends tiny savings on stickers, bravely faces seasonal colds, pumps energy into toddler
    sports, paints sugar‑skull art, maps travel adventures with crayons, and creates delightful messes while savoring avocado‑laced tacos, and they always greet new experiences with a bright smile.
background:
  cultural: Mirta is raised in a Mexican‑American family in San Antonio, Texas. Her household speaks both Spanish and English, celebrates traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day, and shares Mexican cuisine like tacos and tamales. The vibrant Mexican community in Bexar County shapes her daily life through bilingual school experiences, music, and strong family
    values of closeness, hospitality, and respect.
