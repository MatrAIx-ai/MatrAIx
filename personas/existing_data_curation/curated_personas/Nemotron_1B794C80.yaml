  hobbies: '["abstract watercolor painting", "herb gardening", "reading philosophy and literature", "crossword puzzles", "jigsaw puzzles", "chess", "poetry writing", "birdwatching", "recording oral histories",
    "attending local art exhibitions"]'
  career_goals: At 81, Hilda’s ambitions center on preserving her personal and community legacy. She aims to complete a richly illustrated memoir that intertwines her family’s genealogy with the history
    of Bannock County, and to donate a curated archive of recorded oral histories to the Pocatello Public Library. She also seeks regional recognition for her watercolor series, hoping to exhibit at the
    Bannock County Art Fair and win a seniors’ artistic award. Additionally, she wishes to mentor a small group of emerging artists through one‑on‑one workshops, sharing her techniques while maintaining
    the quiet, focused environment she prefers.
