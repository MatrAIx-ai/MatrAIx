personas:
  professional: Cheng Lo, an emerging community carpenter and sustainable‑building advocate, combines self‑taught repair expertise and bilingual communication skills to run weekend pop‑up street‑food stalls
    while laying the groundwork for a neighborhood workshop that offers affordable repairs, DIY classes, and cultural event space.
  sports: Cheng Lo, an avid participant in pickup basketball at Campbell’s courts, a regular in local salsa dance classes, and a weekend hiker of the Santa Cruz foothills, cheerfully supports the Golden
    State Warriors and the San Jose Earthquakes while maintaining a flexible fitness routine that blends group activity with individual trail runs.
  arts: Cheng Lo, a devoted fan of East Asian cultural festivals, frequently attends performances by artists such as Rina Sawayama and BTS, enjoys board‑game nights featuring Catan, and draws creative inspiration
    from street‑muralist Shepard Fairey, all of which enrich their artistic outlook.
  travel: Cheng Lo, who prefers spontaneous weekend getaways over rigid itineraries, explores nearby destinations like Yosemite National Park and Napa Valley for hiking and wine tasting while dreaming of
    a culinary pilgrimage to Tokyo and a month‑long backpacking adventure along the Spanish coast.
  culinary: Cheng Lo, a passionate home chef, crafts fusion dishes such as miso‑glazed salmon tacos with avocado‑cabbage slaw and mapo‑tofu ramen using local kale and seasonal oyster mushrooms, routinely
    sources ingredients from the Campbell community garden, and hosts potluck nights where friends rave about the spicy garlic‑ginger kimchi fried rice.
  core: Cheng Lo, a 29‑year‑old community tinkerer who blends East‑West flavors, builds with their hands, and never lets a potluck end without a board game, balances curiosity with a relaxed, sometimes
    disorganized, approach to life.
background:
  cultural: Raised in a Chinese‑American household in the Bay Area, Cheng Joon grew up hearing Mandarin at home while navigating an English‑dominant school environment. Family celebrations often featured
    Lunar New Year gatherings, traditional foods like dumplings and mooncakes, and a strong emphasis on harmony and respect for elders. These cultural values shaped his cooperative and considerate demeanor.
    He maintains close ties to the vibrant East Asian diaspora in Santa Clara County, regularly participating in temple festivals, cultural workshops, and community events that celebrate his heritage.
