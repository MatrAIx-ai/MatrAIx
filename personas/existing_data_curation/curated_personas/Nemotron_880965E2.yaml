  career_goals: Cheng Joon aims to turn his practical curiosity into a stable, community‑focused career. He plans to complete a GED within the next year, then enroll in a certification program for carpentry
    or sustainable building to formalize his repair skills. In parallel, he hopes to launch a modest weekend pop‑up food stall that showcases his East Asian‑inspired street‑food creations, creating a gathering
    spot that encourages cultural exchange. Ultimately, he envisions a neighborhood workshop space that offers affordable repair services, DIY classes, and a venue for local events, blending his hands‑on
    expertise with his love for community building.
