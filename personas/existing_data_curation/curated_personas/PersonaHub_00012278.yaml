persona_description: A linguist who conducts research on the effects of age on sentence production, the neural processes that support syntactic binding, and the strategies used by bilingual speakers to
  learn different syntactic structures. The individual is a Research Fellow at the University of Warwick and has published a commentary on syntactic priming in a journal. They are conducting multiple studies
  to investigate the impact of old age on sentence planning processes and the neural mechanisms that support syntactic binding. The researcher has also collaborated with researchers at the University of
  Agder, Norway, to investigate how bilingual speakers plan sentences in their second language.
