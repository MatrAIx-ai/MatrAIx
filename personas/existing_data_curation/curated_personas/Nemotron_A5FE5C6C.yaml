personas:
  professional: Jerry Haun is a 23-year-old budding IT support specialist who leverages his hands-on PC troubleshooting, Excel-driven ticket tracking, and budding AutoCAD drafting skills to impose order
    on chaotic help-desk flows, all while quietly plotting a ladder to a supervisory role.
  sports: Jerry Haun logs 45-minute trail runs five times a week with the Conway Trail Runners, follows the Carolina Panthers for football and the Charlotte Hornets for basketball, and competes in local
    10K races where their disciplined pacing mirrors the strategic patience they apply to chess and model kit assembly.
  arts: Jerry Haun finds solace in crafting scale aircraft models, reading Agatha Christie and Michael Connelly mysteries, listening to the intricate scores of Hans Zimmer and classic piano works by Bach
    while woodworking, and occasionally attending the local aviation museum's exhibit on World War II aircraft, which fuels both their creative and analytical drives.
  travel: Jerry Haun prefers meticulously planned solo trips, having explored the historic streets of Charleston and the bustling PC expos in Seattle, while dreaming of a pilgrimage to the Wright Brothers
    National Memorial in Dayton and a rugged trail-running adventure in the Japanese Alps, all balanced against a modest travel budget and the occasional need to return home for community garden duties.
  culinary: Jerry Haun’s culinary routine blends pragmatism with occasional indulgence, favoring grilled chicken breast, quinoa salad, and a precise macro-counted stir-fry during training weeks, yet treating
    themselves to hand-crafted pepperoni pizza and buttery cinnamon rolls on weekend evenings, all measured with a digital kitchen scale and recorded in a food-tracking spreadsheet.
  core: Jerry Haun is a methodical 23-year-old who channels a love for order into IT support, model building, and marathon training, while battling a competitive edge and chronic worry that fuels both meticulous
    planning and occasional over-thinking.
background:
  cultural: Jerry grew up in a small‑town setting in Perry County, Arkansas, where community ties, self‑reliance, and a pragmatic work ethic are emphasized. His family has deep roots in the region’s agricultural
    and middle‑class American traditions, attending a local Methodist congregation that stresses personal responsibility and modesty. The cultural environment places value on order, punctuality, and straightforward
    communication, aligning with his preference for structure. While he appreciates Southern hospitality, his reserved nature leads him to engage more in tight‑knit peer groups rather than large social
    gatherings. Regional influences such as county fairs, outdoor recreation, and a strong sense of local identity shape his worldview and inform his practical approach to life.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic network setup and configuration'', ''Microsoft Excel (advanced functions, formulas, pivot tables)'', ''Data entry and record keeping'', ''Introductory
    AutoCAD drafting'', ''Residential electrical wiring basics'', ''Project coordination (volunteer community garden)'', ''Time management and scheduling'', ''Budgeting and cost tracking'']'
  hobbies: '[''Strategy video gaming (e.g., Civilization, Age of Empires)'', ''Scale model building (aircraft, trains)'', ''Woodworking (DIY furniture)'', ''Reading mystery/crime novels'', ''Long‑distance
    running (5k–10k)'', ''Birdwatching on local nature preserves'', ''Chess (small group club)'']'
  career_goals: Jerry aims to translate his practical competencies into a stable, full‑time role in IT support or logistics within the next two years. He plans to complete an Associate’s degree in Information
    Technology, earn CompTIA A+ certification, and later pursue Cisco Certified Network Associate (CCNA) to strengthen his credentials. His long‑term ambition is to move into a supervisory or team‑lead
    position where he can apply his systematic approach to improve workflow efficiency and ensure compliance with operational standards. Driven by a competitive desire to be recognized as a reliable problem‑solver,
    he seeks a structured career path that offers clear advancement milestones and financial security.
