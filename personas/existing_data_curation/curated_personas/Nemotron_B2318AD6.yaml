personas:
  professional: Viviana Moreno, a seasoned household manager and dedicated church volunteer, blends meticulous budgeting, gardening, and culinary expertise to nurture their family and support community
    outreach, while their structured yet compassionate nature keeps them organized and reliable.
  sports: Viviana Moreno enjoys leisurely morning walks around the Modesto Botanical Garden, participates in the senior center's gentle aerobics class, avidly follows the San Francisco Giants and the Golden
    State Warriors, cheering them on during baseball and basketball seasons, and they often bring a small towel to stay hydrated during activities.
  arts: Viviana Moreno finds solace in singing with the church choir, listening to ranchera legends like Vicente Fernandez, watching telenovelas starring Thalia and Eduardo Yanez, and attending the annual
    Modesto Cinco de Mayo Festival where they share traditional songs and dances with neighbors.
  travel: Viviana Moreno prefers short, planned trips to nearby destinations such as Napa Valley wineries and Santa Barbara's historic missions, hopes to revisit their hometown to collect family recipes,
    dreams of a leisurely cruise along the California coast, and they balance travel ambitions with a modest budget.
  culinary: Viviana Moreno delights in preparing tamales al vapor, mole poblano, and chiles rellenos using homegrown cilantro, tomatoes, and chilies, skillfully incorporating masa harina, chipotle, and
    epazote, while they craft handwritten recipe cards for their grandchildren.
  core: Viviana Moreno, a nurturing home chief who balances meticulous budgeting, garden-fresh cooking, and community volunteering, quietly battles stress with mindful walks, occasionally overindulges in
    yarn shopping, and they cherish their cultural traditions.
background:
  cultural: Viviana was raised in a close‑knit Mexican family with deep Catholic roots, and she continues to honor those traditions in her daily life. She speaks Spanish fluently at home and uses English
    for community interactions. Family cohesion, respect for elders, and celebration of cultural holidays—such as Día de los Muertos, Las Posadas, and Cinco de Mayo—are central to her identity. Living in
    Modesto’s vibrant Central Valley Mexican‑American community, she blends her heritage with local customs, participating in church gatherings, neighborhood potlucks, and the annual Modesto Mexican Cultural
    Festival. Her culinary practices and storytelling preserve the customs of her ancestors while fostering a sense of belonging among younger generations.
attributes:
  skills: '[''Home management'', ''Budgeting and financial planning'', ''Meal planning'', ''Mexican cooking'', ''Gardening'', ''Sewing and textile repair'', ''Caretaking'', ''Basic computer literacy'',
