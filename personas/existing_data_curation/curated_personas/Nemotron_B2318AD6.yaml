  hobbies: '[''Cooking Mexican dishes'', ''Gardening'', ''Knitting and crocheting'', ''Church participation'', ''Listening to ranchera music'', ''Watching telenovelas'', ''Attending cultural festivals'']'
  career_goals: Viviana aims to deepen her role as a supportive family pillar while enhancing her personal well‑being. She wants to improve her health through regular walking and a balanced diet, and to
    reduce stress by learning simple mindfulness techniques. She aspires to become more proficient with digital tools, such as video calling and online health portals, to stay connected with distant relatives.
    In the community, she hopes to expand her volunteering at the local senior center and church, perhaps leading a cooking class that shares traditional Mexican recipes. Although she is not seeking paid
    employment, she dreams of documenting family recipes in a small handwritten cookbook to pass on to grandchildren.
