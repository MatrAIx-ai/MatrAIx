  career_goals: Although retired, Thu remains driven to deepen her cultural contributions. She hopes to complete her unfinished college coursework in art history through a local community college, earning
    a degree that will formalize her knowledge. She aspires to curate a small exhibition of Vietnamese diaspora art at a neighborhood cultural center, and to publish a memoir that weaves personal narrative
    with historical context. She wishes to develop a mentorship program that pairs senior volunteers with young Vietnamese-American artists, offering workshops in calligraphy and cooking. Additionally,
    she aims to create an oral-history archive for the local Vietnamese community, preserving stories for future generations.
