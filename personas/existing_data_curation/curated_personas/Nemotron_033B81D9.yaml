  hobbies: '[''building LEGO models'', ''reading picture books about dinosaurs and space'', ''exploring local parks and observing wildlife'', ''riding a tricycle'', ''collecting river stones'', ''playing
    memory games and beginner chess puzzles'', ''attending library story time and early STEM workshops'']'
  career_goals: Frederick’s imagination is already focused on a future where he designs and builds practical solutions. He dreams of becoming an engineer or a robotics researcher who can turn his LEGO creations
    into real‑world inventions, and he hopes to win school science fairs and later, national robotics competitions. His competitive spirit drives him to set high standards for himself, aiming for academic
    accolades and the satisfaction of solving complex problems.
