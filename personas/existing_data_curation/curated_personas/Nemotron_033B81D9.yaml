personas:
  professional: Frederick Soard, a five‑year‑old aspiring builder, channels their curiosity and disciplined approach into constructing elaborate LEGO cities, meticulously following step‑by‑step guides while
    habitually competing for the highest‑scoring design badge in their classroom.
  sports: Frederick Soard spends Saturday mornings on the Little Rangers soccer team, idolizes the Seattle Seahawks for their disciplined defense, and balances competitive play with a weekly beginner swimming
    lesson at the community pool.
  arts: Frederick Soard delights in Saturday morning art sessions, faithfully reproducing scenes from ‘Moana’ using Crayola crayons while serenading themselves with the Disney soundtrack of ‘Frozen’, and
    often critiques the color choices of their peers with a surprisingly critical eye.
  travel: Frederick Soard’s travel portfolio includes a memorable family trip to Disneyland in Anaheim, a weekend camping excursion at Yosemite National Park, and a resolute wish to explore the historic
    forts of Colonial Williamsburg on the next school break.
  culinary: Frederick Soard prefers the comforting familiarity of cheesy macaroni, enjoys helping stir batter for banana pancakes, meticulously arranges apple slices into smiley faces on their plate, and
    occasionally sneaks a handful of gummy bears during snack time.
  core: Frederick Soard, a five‑year‑old with razor‑sharp curiosity and a notebook‑obsessed habit, constantly lines up toy cars by color, competes for first place in every classroom activity, balances a
    disciplined savings plan with occasional candy‑stealing bursts, and remains unfazed by minor setbacks.
background:
  cultural: Frederick was raised in a middle‑class white family in Billings, Montana, where the open landscape and proximity to the Big Horn mountains foster a strong appreciation for outdoor recreation
    and self‑reliance. His family participates in community events such as the Yellowstone County Fair, Fourth of July parades, and local library programs, which blend a modest western heritage with a focus
    on education and personal achievement. While attending a public preschool, he is exposed to a diverse peer group, yet his home life emphasizes disciplined routines, practical problem‑solving, and a
    respect for the region’s natural environment.
attributes:
  skills: '[''reading simple sentences'', ''counting to 100'', ''building LEGO structures'', ''solving age‑appropriate puzzles'', ''organizing toys and play area'', ''following multi‑step chores'', ''basic
