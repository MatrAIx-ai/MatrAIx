persona_description: A historian who specializes in the history of the Portuguese Empire and its interactions with Europe and Asia, particularly focusing on the Jesuit missionary work and its impact on
  education and society. The historian is interested in the expansion of European civilization to Brazil and the role of the Portuguese royal family in this process. They are knowledgeable about the Jesuit
  missions, schools, and seminaries established in Brazil, the universities founded in Portugal, and the educational reforms implemented by the Portuguese government. The historian is also interested in
  the role of the arts in colonial times and the evolution of the arts in Brazil.
