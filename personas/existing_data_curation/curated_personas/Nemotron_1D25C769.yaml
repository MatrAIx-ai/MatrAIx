  career_goals: Everett aims to formalize his reputation as a master painter by obtaining a certification in lead‑safe and environmentally sustainable painting. He plans to expand his solo operation into
    a modest crew specializing in high‑end decorative finishes for historic Brooklyn apartments, while mentoring an apprentice each year. Long‑term, he hopes to pivot gradually toward part‑time artistic
    mural work and community workshops, using his practical knowledge to inspire others while securing a comfortable financial foundation for retirement.
