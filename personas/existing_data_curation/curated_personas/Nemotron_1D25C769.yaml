personas:
  professional: Everett Pagan, a 52‑year‑old master painter and paperhanger in Brooklyn, leverages three decades of meticulous surface‑prep expertise, low‑VOC eco‑friendly finishes, and a client‑oriented
    communication style to run a solo operation while mentoring apprentices, blending curiosity for new methods with a practical, reliability‑focused work ethic.
  sports: Everett Pagan, an avid Brooklyn resident, roots for the Nets and follows the Yankees during spring training, participates in the local Brooklyn Running Club’s weekend 5K runs, and joins a casual
    intramural basketball league at the community center, balancing a love for low‑impact jogging with occasional weekend trips to the New York Marathon as a volunteer spectator.
  arts: Everett Pagan captures Brooklyn’s street art and waterfront sunsets with a vintage Leica M6, paints faux‑marble canvases inspired by the chiaroscuro works of Caravaggio and the urban grit of Jean‑Michel
    Basquiat, and frequently attends live jazz sessions featuring the soulful tones of Kamasi Washington and classic‑rock shows headlined by The Rolling Stones, letting these influences shape their own
    visual storytelling.
  travel: Everett Pagan prefers weekend road trips that blend cultural immersion with creative inspiration, having explored the historic neighborhoods of New Orleans, the street‑art corridors of Lisbon,
    and the serene fjords of Norway, while planning a future summer pilgrimage to Kyoto’s traditional tea gardens to study Japanese aesthetics.
  culinary: Everett Pagan delights in crafting herb‑infused bruschetta with fresh basil, oregano, and rosemary from his balcony garden, savors a perfectly seared salmon topped with lemon‑dill sauce, and
    indulges in a late‑night slice of classic New York pepperoni pizza, though they have a guilty habit of over‑seasoning dishes with extra chili flakes.
  core: Everett Pagan blends a meticulous painter’s eye with an explorer’s curiosity, juggling a thriving eco‑friendly renovation business, a modest garden, and a camera, all while habitually postponing
    dental appointments and hoarding vintage camera accessories.
background:
  cultural: Everett grew up in a working‑class, Irish‑American family in Brooklyn during the late 1960s and 1970s. His parents, both first‑generation immigrants, instilled a strong work ethic, a respect
    for community, and a love for the city's multicultural vibrancy. Raised in a Catholic household, he still celebrates traditional holidays like St. Patrick’s Day and values family gatherings, even though
    he has never married. His upbringing in the diverse neighborhoods of Kings County gave him an appreciation for the blend of cultures, foods, and traditions that define Brooklyn, shaping his considerate
    and cooperative nature.
