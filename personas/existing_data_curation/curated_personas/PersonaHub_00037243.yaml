persona_description: A highly skilled and experienced observer who is responsible for collecting data on the federally-managed commercial groundfish fisheries off Alaska. The observer is part of the Observer
  Program and is responsible for ensuring the statistical reliability of the data collected by the program, addressing cost inequality among fishery participants, and expanding observer coverage to previously
  unobserved fisheries. The observer works closely with Division staff to process and make the data available to various stakeholders, including the Sustainable Fisheries Division of the Alaska Regional
  Office, scientists at the Alaska Fisheries Science Center, and the fishing industry. The observer's expertise is in the field of fisheries management and conservation, and they have a deep understanding
  of the scientific data collection process.
