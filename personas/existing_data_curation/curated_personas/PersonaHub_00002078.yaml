persona_description: A network administrator who is familiar with the implementation and management of virtual local area networks (VLANs) in a network environment. They have a deep understanding of the
  concepts and best practices involved in VLAN design and implementation, and are skilled in configuring and managing VLANs to achieve their intended goals, such as internal segmentation, load balancing,
  and secure network access. They are also aware of the potential risks and challenges associated with VLANs, such as segmentation weaknesses and the need for proper configuration and management. Additionally,
  they are aware of the importance of proper spanning tree protocol (STP) implementation and the use of dead VLANs as a security measure.
