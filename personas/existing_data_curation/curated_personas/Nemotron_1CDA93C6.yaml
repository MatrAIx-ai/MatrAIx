  hobbies: '[''Fly‑fishing on the Okanogan River'', ''Fly‑tying and reading wildlife guides'', ''Volunteer maintenance projects at the local church senior‑center'', ''Woodworking (birdhouses, tool restoration)'',
    ''Journaling and mindfulness breathing exercises'', ''Hiking local trails'', ''Attending community potlucks'']'
  career_goals: Milton aims to leverage his decades of on‑site experience into a supervisory or facilities‑manager role within the next five years. He plans to obtain the Certified Facility Manager (CFM)
    credential and to lead a small team of custodial staff, implementing sustainable cleaning practices that reduce chemical usage and lower operating costs for his employer. Additionally, he is exploring
    the possibility of launching a modest independent cleaning service focused on serving local farms, small businesses, and community centers in Okanogan County, allowing him to blend his entrepreneurial
    curiosity with his practical expertise. He also hopes to mentor younger workers from his community, helping them develop reliable work habits and coping strategies for workplace stress.
