  career_goals: Even though he is only four, Tyler already imagines future roles that involve clear rules, order, and helping others. He often says he wants to become a firefighter because of the uniform
    and teamwork, a teacher because of the structured classroom environment, or an astronaut because of the systematic training and exploration. His immediate ambition is to start kindergarten, learn to
    read and write more confidently, and continue developing his ability to follow routines and take on age‑appropriate responsibilities.
