  career_goals: At this stage in her life Lisa’s primary ambition is to preserve her health and independence while deepening her legacy within the community. She aims to document her family’s genealogy
    for future generations, mentor younger relatives in budgeting and cooking, expand her volunteer leadership role at the church’s outreach programs, and continue competing in bridge tournaments at the
    senior center. Additionally, she hopes to author a small cookbook that blends traditional Southern soul food with the fresh produce from her garden.
