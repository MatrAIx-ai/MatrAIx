personas:
  professional: Lisa Gerald, a seasoned community volunteer and bridge competitor, leverages her methodical budgeting and event‑coordination skills along with a skeptical, competitive edge to organize church
    outreach programs, mentor younger relatives in practical life skills, and meticulously plan the senior center’s bridge tournaments.
  sports: Lisa Gerald stays active by walking the trails of Ocala National Forest year‑round, participates in a local senior pickleball league affiliated with the Orlando club, and avidly follows the Orlando
    Magic and the Jacksonville Jaguars, balancing low‑impact exercise with seasonal enthusiasm for community sports events.
  arts: Lisa Gerald’s artistic life revolves around knitting intricate scarves while listening to Aretha Franklin and Nina Simone, devouring historical fiction and biographies in her book club, and attending
    community theater productions of classic Southern plays, which together shape her appreciation for storytelling and tactile creativity.
  travel: Lisa Gerald prefers carefully planned, budget‑friendly trips that blend nature and heritage, having explored Savannah’s historic squares, taken a weekend retreat to the Great Smoky Mountains,
    and dreaming of a culinary pilgrimage to New Orleans, all arranged through a trusted travel agent and supplemented by video calls with distant family before departure.
  culinary: Lisa Gerald’s culinary pursuits combine soul‑food classics like collard greens, smoked turkey, and sweet‑potato pie with fresh heirloom tomatoes, okra, and bell peppers harvested from her raised‑bed
    garden, showcasing her intermediate‑to‑advanced cooking skills as she experiments with seasonal twists for her upcoming community cookbook.
  core: Lisa Gerald, a 73‑year‑old bridge‑savvy garden enthusiast, balances meticulous budgeting with occasional coupon‑clipping lapses, critiques every recipe before tasting, and never misses a senior‑center
    card game, even if it means forgetting to water the carrots for a day.
background:
  cultural: Lisa is a lifelong resident of Ocala, Florida, and a member of the African‑American community that has deep roots in central Florida’s post‑Reconstruction era. Raised by parents who emphasized
    self‑reliance, church involvement, and oral history, she grew up attending the historic First Baptist Church, where gospel music and community service were central. Her family’s culinary traditions
    blend Southern soul food with fresh local produce, reflecting both the heritage of the Great Migration and the agricultural landscape of Marion County. Lisa’s identity is shaped by a strong sense of
    family, faith, and the resilient spirit of her Black community.
