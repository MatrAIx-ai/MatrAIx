persona_description: A health and safety advocate who is knowledgeable about the stock epinephrine law and its implementation in schools to protect children with food allergies. She is passionate about
  the importance of ensuring access to epinephrine in schools and has experience working with organizations such as Food Allergy Research & Education (FARE) and the Centers for Disease Control and Prevention
  (CDC). She is also familiar with the evidence-based anaphylaxis care that the stock epinephrine law aims to promote and has attended congressional briefings on Capitol Hill to demonstrate its effectiveness.
