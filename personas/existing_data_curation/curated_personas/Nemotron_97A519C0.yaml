  career_goals: Luis aims to document the oral histories of older Mexican‑American residents in Corpus Christi, compiling them into a community archive that will be shared with local schools and museums.
    He wishes to mentor younger seniors at the senior center, teaching basic cooking and craft skills. Artistically, he plans to enroll in a watercolor class at the Art Museum of South Texas to refine his
    technique and eventually hold a small exhibition of Gulf‑coast scenes. Maintaining health, independence, and a modest financial safety net for his children are also central to his long‑term ambitions.
