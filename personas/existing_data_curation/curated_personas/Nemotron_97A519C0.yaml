personas:
  professional: Luis Reyes, a retired handyman turned community archivist in a Gulf-coast town, leverages his self-taught repair know-how, bilingual storytelling, and sharp visual eye to document elder
    oral histories, mentor senior volunteers in cooking and crafts, and curate a modest watercolor exhibition of sunrise scenes.
  sports: Luis Reyes enjoys early-morning beach walks, recreational fishing from the pier, and is a dedicated fan of the local minor-league baseball team, the Corpus Christi Hooks, while also participating
    in a senior pickleball league and a community sailing club during the summer months.
  arts: Luis Reyes spends afternoons painting watercolors of Gulf sunrises, draws inspiration from naturalist John James Audubon and abstract pioneer Georgia O'Keeffe, frequents the Art Museum of South
    Texas for exhibitions, and unwinds to ranchera classics by Vicente Fernández while reading biographies of regional pioneers.
  travel: Luis Reyes prefers road-trip adventures with a detailed itinerary, favoring coastal getaways like Galveston and Key West, occasional visits to mountain retreats such as Asheville, and dreams of
    exploring the Pacific Northwest's rugged shoreline, all balanced against a modest travel budget and occasional reliance on family support.
  culinary: Luis Reyes delights in preparing tamales de puerco, salsa verde, and festive enchiladas rojas using herbs from his patio garden, showcases moderate cooking skill by hosting weekly potlucks for
    friends, yet occasionally over-spices dishes leading to heartburn that they treat with herbal tea.
  core: Luis Reyes blends a calm, resilient spirit with a curious love for art, history, and community, channeling handyman ingenuity into preserving stories, painting sunrise vistas, and feeding friends,
    all while navigating the quirks of age-related health and frugal finances.
background:
  cultural: Luis is a second‑generation Mexican‑American (Tejano) who grew up in a bilingual, Catholic home in Corpus Christi. His parents worked in the oil refineries and local fishing industry, instilling
    a strong work ethic and love for the coastal environment. Family life revolved around Mexican traditions—celebrating Día de los Muertos, cooking communal meals, and attending church festivals—while
    also embracing Texan customs like the annual Fiesta de la Flor. This blended heritage fuels his appreciation for Mexican folk art, music, and cuisine, as well as his deep connection to the Gulf Coast’s
    natural beauty and community spirit.
