  hobbies: '["Oil painting", "Pottery", "Gardening", "Experimental recipe development", "Community book club", "Volunteer cooking workshops at the food bank", "Square‑dance nights", "Folk‑music festivals",
    "Local theater set design", "Photography of rural landscapes"]'
  career_goals: Nicki aims to transition from her current supervisory role to a regional food‑service manager position, where she can champion sustainable sourcing and innovative menu concepts across multiple
    locations. She aspires to earn the Certified Food Safety Manager credential and to mentor emerging food‑service professionals, especially women in the industry. Long‑term, she envisions opening a community‑focused
    café that doubles as a local art gallery, providing a platform for regional artists and offering cooking workshops that blend culinary science with creative expression.
