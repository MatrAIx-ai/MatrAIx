persona_description: A researcher and engineer with expertise in 3D printing and the study of termite colonies. The person is interested in exploring the basic science behind the function of termite colonies
  and how it can be applied to create buildings that use some of the techniques applied by termites. The person is also interested in the potential energy savings that can be achieved by replacing central
  heating and air-conditioning with ventilation systems that use the fresh air that the buildings breathe. The person has experience in using 3D printing to create porous walls with a precise design and
  is interested in traveling to India and Namibia to digitally scan termite mounds and make models of them with his 3D printers.
