personas:
  professional: An aspiring IT support specialist, Carlos Funderburke blends methodical hardware troubleshooting, self‑taught scripting in Python and PowerShell, and a personable communication style to
    deliver reliable tech assistance while navigating the balance between curiosity‑driven exploration and practical, results‑focused problem solving.
  sports: An outdoor‑oriented fitness enthusiast, Carlos Funderburke participates in the Michigan Trailblazers hiking group, plays pick‑up basketball at a community center supporting the Detroit Pistons,
    follows the Detroit Lions for football, enjoys cross‑country skiing at Tahquamenon Falls in winter, and maintains a weekly routine of jogging the local trails while they balance seasonal sports with
    their love for hands‑on projects.
  arts: A musically inclined hobbyist, Carlos Funderburke strums acoustic renditions of John Mayer and Mumford & Sons during board‑game nights, curates a vinyl collection that includes classic Bob Dylan
    and modern indie acts like Fleet Foxes, enjoys indie films by Greta Gerwig, and often incorporates creative storytelling from games like Settlers of Catan into their social gatherings.
  travel: An inquisitive explorer, Carlos Funderburke prefers meticulously planning low‑cost road trips using Google Maps and forum tips, has hiked the dunes of Michigan’s Upper Peninsula and camped at
    Pictured Rocks, dreams of visiting Japan’s Akihabara tech district and the historic streets of Kyoto, and balances wanderlust with a modest budget that limits lengthy overseas voyages.
  culinary: A self‑sufficient home chef, Carlos Funderburke delights in cooking farm‑to‑table meals using vegetables from their garden such as roasted bell peppers, heirloom tomatoes, and zucchini, seasons
    dishes with fresh rosemary and garlic, frequently prepares hearty chicken‑and‑sourdough bread bowls, and occasionally experiments with Raspberry Pi‑controlled sous‑vide setups for perfectly cooked steak,
    though they sometimes neglect thorough kitchen cleanup afterward.
  core: A tech‑savvy DIY enthusiast, Carlos Funderburke blends curiosity with practicality, balancing gadget projects with gardening, music, and community, while they meticulously budget expenses yet occasionally
    neglect routine health checks.
background:
  cultural: Carlos comes from a white, Midwestern American background rooted in the small‑town culture of Montcalm County, Michigan. His family heritage includes German and Irish ancestry, and he was raised
    with values of self‑reliance, modesty, and community cooperation typical of the region. The local culture emphasizes practical problem‑solving, a strong work ethic, and a balanced lifestyle that blends
    outdoor recreation with close‑knit social ties. These influences shape his pragmatic outlook, his appreciation for both tradition and innovation, and his commitment to contributing positively to his
    community.
attributes:
  skills: '[''Hardware troubleshooting'', ''Network configuration'', ''Python scripting'', ''PowerShell scripting'', ''Database basics (SQL)'', ''Operating system installation and maintenance'', ''Computer
