  hobbies: '[''PC building and upgrades'', ''Raspberry Pi projects'', ''Online tech courses'', ''Hiking'', ''Vegetable gardening'', ''Woodworking'', ''Board-game nights'', ''Community volunteering'', ''Acoustic
    guitar playing'']'
  career_goals: He aims to transition from his current period of unemployment into a full‑time IT support role within a mid‑size organization, leveraging his hands‑on experience and technical foundation.
    Over the next five years, he aspires to obtain a bachelor's degree in Computer Science or Information Systems, earn certifications such as CompTIA Network+ and Microsoft Certified Solutions Associate
    (MCSA), and advance to a systems administrator or network engineer position. Ultimately, he hopes to combine his technical expertise with his practical mindset by launching a freelance tech consulting
    service that assists small businesses in Montcalm County with IT infrastructure, while maintaining a work‑life balance that allows time for personal growth and community involvement.
