  hobbies: '[''jogging in Pelham Bay Park'', ''yoga'', ''reading contemporary fiction'', ''solving Sudoku puzzles'', ''cooking Caribbean-inspired meals'', ''listening to R&B, hip‑hop, and jazz'', ''digital
    photography of street art'', ''playing basketball at community center'', ''volunteering at local food pantry'']'
  career_goals: Usha aims to move into a supervisory role within the next two years, targeting a shift‑lead position where she can apply her organizational strengths and improve workflow consistency. She
    plans to earn a certification in supply‑chain management and complete an associate degree in logistics to qualify for a logistics coordinator role. Ultimately, she hopes to secure a stable, higher‑paying
    position that offers predictable schedules, allowing her to reduce stress and provide financial security for herself and her teenage daughter.
