  hobbies: '[''Hiking and Trail Exploration'', ''Landscape Photography'', ''Volunteering at Local Food Banks'', ''Acoustic Guitar Playing'', ''Cooking Fusion Cuisine'', ''Community Soccer Leagues'', ''Gardening'',
    ''DIY Home Improvement Projects'']'
  career_goals: Joshua aims to advance from first‑line supervisor to facility or operations manager overseeing multiple properties, with a focus on implementing sustainability initiatives and employee development
    programs. He plans to earn professional certifications such as Certified Facility Manager (CFM) and Green Cleaning Specialist. Long‑term, he envisions launching his own consulting firm to help hospitality
    venues adopt efficient, environmentally responsible housekeeping practices while maintaining high guest satisfaction.
