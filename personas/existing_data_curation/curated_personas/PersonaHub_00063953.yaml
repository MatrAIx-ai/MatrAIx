persona_description: A political analyst who specializes in Middle Eastern politics, particularly the conflicts in the region since the 1979 Iranian Revolution. He has a deep understanding of the role of
  Iran in the Middle East and the strategies used by Iran to achieve its goals. He is also knowledgeable about the history of the U.S.-Iran relationship and the events leading up to the 1983 bombing of
  the U.S. Marine barracks in Beirut. He is interested in the aftermath of the bombing, including the impact on the Middle East and the United States, and the lessons that can be learned from the events.
  He is also interested in the current situation in Lebanon and the role of Iran in the region.
