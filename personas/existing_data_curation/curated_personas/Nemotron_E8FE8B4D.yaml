  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Acoustic guitar playing'', ''Woodworking'', ''Garden tending'', ''Speculative fiction reading'', ''Poetry writing'', ''Small group art meetups'',
    ''Meditation'', ''Collecting vintage vinyl records'']'
  career_goals: Philip aspires to transition into a role that bridges his production expertise with his artistic inclinations, such as product design or a small‑scale artisan workshop creating handcrafted
    wooden instruments or furniture. He hopes to mentor younger workers, fostering a collaborative and harmonious environment, while gradually reducing work‑related stress. Over the next five years, he
    aims to establish a side business that allows greater flexibility and creative expression, ultimately seeking a balanced retirement that still engages his curiosity and love for novelty.
