  hobbies: '["Woodworking", "Model railroading", "Gardening (native Oregon flora)", "Hiking", "Fly fishing", "Volunteer historical preservation", "Reading non-fiction (engineering, history)", "Chess"]'
  career_goals: Although officially retired, Ronald aims to stay engaged by offering part‑time consulting to local small‑business manufacturers, helping them streamline production and reduce waste. He also
    plans to lead a community initiative to refurbish historic timber‑frame structures in Roseburg, leveraging his engineering background. On a personal level, he is determined to complete a commission
    of a handcrafted wooden dining table that will be entered in the state’s senior crafts competition, reflecting his competitive spirit and desire for tangible achievement.
