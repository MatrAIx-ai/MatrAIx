personas:
  professional: Ronald Free is a retired mechanical engineer who now offers part‑time consulting to small manufacturers, applying three decades of timber‑processing expertise, CAD mastery, and rigorous
    process‑optimization methods to streamline production while they mentor younger engineers with a disciplined, results‑driven approach.
  sports: Ronald Free enjoys seasonal hiking on the Umpqua River Trail, participates in the Roseburg senior walking club in spring, and follows the Portland Timbers and Oregon State Beavers baseball teams,
    while they keep an active routine by rowing on a local lake during summer and taking weekday evening walks to maintain fitness.
  arts: Ronald Free finds artistic fulfillment in crafting bespoke timber furniture, frequently listening to folk legends like Gordon Lightfoot and classical composers such as Chopin while they work, and
    they regularly attend performances by the Oregon Symphony and local theater productions, drawing inspiration from both visual and musical arts.
  travel: Ronald Free prefers carefully planned trips that blend craftsmanship inspiration with natural scenery, having explored the Redwood National Park and the historic timber towns of the Pacific Northwest,
    and they are eager to visit Japan’s Hida region to study traditional wood joinery techniques while staying within a modest travel budget.
  culinary: Ronald Free enjoys hearty Pacific Northwest fare, often preparing cedar‑plank salmon, wild mushroom risotto, and locally sourced kale salads, while they like to sip a modest glass of Oregon
    pinot noir and experiment with small‑batch coffee roasting during weekend cooking sessions.
  core: Ronald Free is a precision‑driven retired engineer whose competitive spirit fuels meticulous woodworking, disciplined consulting, and a balanced love of structured outdoor pursuits.
background:
  cultural: Ronald’s cultural background is rooted in a Midwestern‑American family of German‑Irish descent that settled in the Pacific Northwest during the post‑World War II era. He was raised with values
    of self‑reliance, hard work, and respect for the natural environment of western Oregon. Growing up in a small town, he absorbed a community‑oriented ethos while retaining a pragmatic, individualistic
    outlook typical of the region’s rural white population. His education in STEM and long career in the timber industry further reinforced a practical, achievement‑driven worldview.
attributes:
  skills: '["Mechanical engineering", "Project management", "CAD (AutoCAD, SolidWorks)", "Process optimization", "Budgeting and cost analysis", "Data analysis (Excel, Python)", "Woodworking", "Home repair",
