  career_goals: Isaias intends to build on his hands‑on experience by earning a Certified Nursing Assistant credential within the next year, followed by enrollment in a community‑college nursing program
    to become a Registered Nurse. His competitive drive pushes him to aim for a supervisory position in a home‑health agency where he can lead a team, implement quality‑of‑care initiatives, and achieve
    top client‑satisfaction scores. Ultimately, he dreams of launching his own culturally responsive personal‑care business that serves the growing Latino senior population in the Central Valley, combining
    professional advancement with financial stability and community impact. He also seeks to strengthen his emotional resilience through formal counseling and mindfulness training to better manage his own
    anxiety while supporting others.
