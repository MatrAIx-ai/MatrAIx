personas:
  professional: Concepción Caballero, a 31‑year‑old professional housekeeper and household manager, leverages deep‑cleaning expertise, bilingual communication, and an eye for eco‑friendly décor to design
    streamlined service schedules for families while mentoring Spanish‑speaking staff.
  sports: Concepción Caballero enjoys weekend hikes with the Sierra Foothills Hiking Club, follows the Los Angeles Dodgers for baseball, regularly watches Los Angeles Lakers games, and occasionally jogs
    the trails near the Sierra Nevada foothills to stay fit.
  arts: Concepción Caballero spends free afternoons exploring Porterville’s public murals, draws inspiration from artists like Banksy and Georgia O'Keeffe, creates papel picado and hand‑embroidered alpargatas,
    and reads art‑history books on the Impressionists to fuel their DIY home‑decor projects.
  travel: Concepción Caballero prefers meticulously planned weekend getaways, having already visited Yosemite National Park, the coastal town of Santa Barbara, and the historic city of San Miguel de Allende,
    while dreaming of a future cultural tour of Andalusia to study traditional crafts.
  culinary: Concepción Caballero enjoys experimenting with family recipes such as tamales, mole, and fresh salsas, skillfully incorporates herbs like cilantro, oregano, and epazote from their patio garden,
    and frequently hosts potluck dinners where their signature mole sauce steals the spotlight.
  core: Concepción Caballero blends a disciplined cleaning career with a vibrant love for craft, cooking, and community, fueled by curiosity, organization, and a compassionate drive to uplift others, even
    if they sometimes forget to water their herb plot.
background:
  cultural: Concepción’s cultural roots are firmly planted in her Mexican heritage. Her parents immigrated from Guanajuato, bringing with them the customs of family‑centered celebrations, Catholic traditions,
    and a deep respect for Mexican folk arts. She grew up speaking Spanish at home while attending English‑language schools in Tulare County, making her fully bilingual and bicultural. Annual observances
    such as Día de los Muertos, Las Posadas, and Mexican Independence Day are central to her family life, often marked by altars, marigold decorations, and shared meals. The flavors of her upbringing—corn‑based
    dishes, chilies, and fresh herbs—continue to shape her cooking. Community ties are reinforced through the local church, where she participates in volunteering and cultural festivals that showcase mariachi
    music and regional dances. Living in the agricultural heart of California, she is also familiar with the rhythms of farm work and the diverse Latino community that collaborates on seasonal harvests.
    This blend of Mexican tradition and Californian experience informs her values of hospitality, hard work, and mutual support.
