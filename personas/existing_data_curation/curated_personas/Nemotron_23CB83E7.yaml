  career_goals: Concepcion aims to formalize the expertise she already employs at home and in her work. She plans to earn a GED within the next year, followed by a community‑college certificate in Hospitality
    Management or Property Services, which will qualify her for supervisory roles in cleaning firms. Her longer‑term ambition is to launch a modest, women‑owned cleaning business that emphasizes sustainable
    products and offers on‑the‑job training for other Spanish‑speaking workers in the Tulare County area. She also hopes to expand her culinary knowledge by taking a Mexican‑cuisine cooking class, enabling
    her to provide catering for local cultural events and community celebrations. Ultimately, she envisions a career that blends reliable household management, entrepreneurship, and community service, allowing
    her to support her family’s financial stability while giving back to the neighborhood that has supported her.
