  career_goals: James aspires to turn his curiosity and technical aptitude into a career that lets him work independently while solving complex problems. He dreams of becoming a software engineer or video
    game developer, designing immersive experiences that challenge players’ minds. He also entertains the ambition of inventing practical gadgets, hoping one day to hold a patent for a device he designs.
    Ultimately, he seeks a role where his competitive drive and love for solitary creation can thrive, such as a research programmer or independent game studio founder.
