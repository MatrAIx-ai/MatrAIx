personas:
  professional: An aspiring young programmer, James Duncan leverages their curiosity for sci‑fi and love of strategic puzzles to build Scratch games and custom LEGO robotics, while their relaxed attitude
    toward deadlines makes them a self‑directed coder who prefers improvisation over rigid planning.
  sports: James Duncan avidly follows the Chicago Cubs, attending Sunday games at Wrigley Field when family can make it, while also joining a local park basketball pick‑up group for occasional drills, though
    they prefer watching rather than playing and track statistics of their favorite players as a strategic pastime.
  arts: James Duncan channels their love of graphic novels into sketching original comic panels inspired by creators like Stan Lee and Masashi Kishimoto, busts out a sketchbook at the Art Institute of Chicago
    during school trips, and curates a personal playlist of video‑game soundtracks by Koji Kondo and Jeremy Soule that fuels their creative bursts.
  travel: James Duncan’s travel style mixes structured family museum weekends—like trips to the Field Museum, Shedd Aquarium, and a recent excursion to the Kennedy Space Center—with spontaneous weekend
    camping in Indiana Dunes, although their preference for solitude leads them to scout out quiet nature spots for sketching wildlife.
  culinary: James Duncan favors classic Midwestern comfort foods such as cheesy macaroni, peanut‑butter‑and‑jelly sandwiches, and deep‑dish pizza, occasionally trying to recreate the turkey‑and‑stuffing
    flavor of Thanksgiving in a homemade casserole, while their cooking skill tops out at microwaving frozen pizza and assembling instant ramen with extra hot sauce.
  core: James Duncan is a solitary, curiosity‑driven pre‑teen who turns every hobby—from LEGO engineering to strategy gaming—into a personal lab, often neglecting routine chores in favor of tinkering, yet
    secretly hoards a stash of snack foods for late‑night coding marathons.
background:
  cultural: James grew up in Robbins, a small community in Cook County, Illinois, surrounded by the broader cultural tapestry of the Chicago metropolitan area. His family’s heritage is rooted in Anglo‑American
    traditions, and he celebrates typical American holidays such as Thanksgiving, Independence Day, and Halloween, often with community events. The Midwestern values of independence, modesty, and a strong
    work ethic shape his outlook, while exposure to Chicago’s diverse music, sports (especially the Cubs), and technology scene fuels his interests in gaming and coding. He attends the local public middle
    school, where he is part of a predominantly white student body, and his household reflects a blend of suburban middle‑class life and occasional family trips to regional museums and science centers.
