  career_goals: Although currently not in the formal workforce, Angel aims to channel her expertise into community impact. She seeks to launch a STEAM outreach program in Sacramento that mentors under‑represented
    youth, blending coding workshops with visual arts projects. She also aspires to become a guest lecturer at local colleges, sharing her interdisciplinary experience. On a personal level, Angel dreams
    of publishing a science‑fiction novel that weaves her love for abstract concepts with accessible storytelling, and hopes to curate a series of collaborative art exhibitions that spotlight local talent
    while highlighting environmental themes.
