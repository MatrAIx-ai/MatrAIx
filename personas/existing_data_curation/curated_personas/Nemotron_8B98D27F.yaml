  career_goals: Approaching retirement, Lisa Anne aims to transition into a mentorship role, formally becoming a foreman or apprentice trainer within her union. She wishes to pass on her practical knowledge
    to younger workers, help improve safety standards on her job sites, and secure a stable pension for her and her husband. Additionally, she is interested in occasional part‑time teaching at a local trade
    school, where she can share her expertise while maintaining a manageable schedule that respects her need for routine and personal downtime.
