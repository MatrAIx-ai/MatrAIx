  hobbies: '[''Painting'', ''Pottery'', ''Quilting'', ''Knitting'', ''Woodworking'', ''Gardening'', ''Hiking coastal trails'', ''Reading historical fiction'', ''Attending local theater performances'', ''Participating
    in senior center dance classes'', ''Bridge and card games'', ''Volunteering at community art workshops'', ''Learning digital photography'']'
  career_goals: Even though she is retired from full‑time work, Amanda aims to channel her extensive fabrication knowledge into community service. She hopes to mentor younger workers through the local vocational
    school’s apprenticeship program and to volunteer as a workshop facilitator at the senior center, teaching basic woodworking and craft skills. Additionally, she plans to collaborate on a community art
    project that celebrates Clatsop County’s maritime heritage, and to document her life story and family history for future generations. Ultimately, she wishes to remain an active, contributing member
    of her town while continuing to explore new creative techniques and ideas.
