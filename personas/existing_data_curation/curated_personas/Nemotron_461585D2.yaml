personas:
  professional: Amanda Fulton, a retired mechanical fabricator with three decades of precision assembly experience, now mentors apprentices at the local vocational school and leads woodworking workshops
    at the senior center, applying their meticulous attention to safety, their knack for interpreting technical drawings, and their collaborative, upbeat personality to empower both younger workers and
    their peers.
  sports: Amanda Fulton stays fit by walking the coastal trails with the Astoria Senior Walking Club, joining the senior center line‑dancing group for lively cardio, cheering on the Portland Timbers and
    Trail Blazers during the soccer and basketball seasons, and they attend seasonal yoga classes at the local community studio.
  arts: Amanda Fulton immerses herself in the visual arts by displaying their own water‑color seascapes alongside works by Georgia O’Keeffe and Tom Wood at the Astoria Art Gallery, attending performances
    at the Astoria Performing Arts Center featuring local actors such as Peter Stiles, and they find creative inspiration from folk musicians Joan Baez and The Milk Carton Kids while they knit.
  travel: Amanda Fulton favors leisurely, culture‑rich excursions, having toured the historic waterfront of Portland, explored Cannon Beach’s rugged cliffs, taken a summer ferry trip to Victoria, Canada,
    and they now dream of a pilgrimage to the Scottish Highlands to study Celtic weaving traditions.
  culinary: Amanda Fulton delights in cooking fresh Pacific Northwest fare such as cedar‑plank grilled salmon with dill, creamy clam chowder seasoned with thyme, and homemade sourdough bread infused with
    rosemary, often pairing their meals with a steaming cup of Earl Grey tea, and they love sharing the dishes with neighbors during community potlucks.
  core: Amanda Fulton, a vibrant 70‑year‑old retired fabricator turned community arts mentor, blends meticulous craftsmanship with boundless curiosity, they often hum folk tunes while quilting, and they
    have a quirky penchant for collecting glitter pens for every workshop.
background:
  cultural: As a native of Clatskanie in Clatsop County, Amanda grew up in a working‑class, white family with deep roots in the Pacific Northwest. Her ancestry traces back to German and Irish immigrants
    who settled the region in the early 20th century. The cultural fabric of her upbringing blends Midwestern Protestant values—emphasizing hard work, community responsibility, and modesty—with the distinctive
    Oregonian appreciation for the outdoors, environmental stewardship, and vibrant local arts. Participation in church gatherings, school clubs, and community festivals fostered her cooperative spirit
    and love of group activities. This cultural background informs her strong sense of belonging to the small‑town community, her respect for tradition, and her openness to the region’s evolving artistic
    and ecological initiatives.
