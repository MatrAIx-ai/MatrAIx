persona_description: A leader in the education sector who is passionate about promoting STEM education and encouraging students to pursue their interests in STEM fields. This person has a deep understanding
  of the current limitations of the "Some STEM for All" approach and is committed to finding a more effective solution. They are interested in creating a system where student interests drive what is offered
  in STEM education, and they are willing to take bold steps to make this happen, such as shifting accountability measures for high schools from a content-based to a skills-based paradigm, reducing course
  requirements to provide students with the opportunity to pursue depth in their K-12 studies, and advocating for increased STEM funding and support for underrepresented groups. They are also interested
  in expanding STEM education beyond the traditional STEM fields and creating more opportunities for students to learn about STEM disciplines that are actually needed for STEM jobs.
