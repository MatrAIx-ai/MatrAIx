    ''Exploring Kansas City jazz scene'', ''Traveling to avant‑garde performance events'']'
  career_goals: 'Alexander’s primary ambition is to transition from day‑to‑day operational logistics into a boutique consulting role that focuses on innovative, art‑centric supply‑chain solutions. He intends
    to build a consultancy that advises museums, galleries, performing‑arts venues, and creative industries on bespoke transportation, climate‑friendly logistics, and risk‑aware handling of valuable pieces.
    He also aims to author a book titled Creative Logistics: Merging Art and Supply‑Chain Science, become a regular speaker at national logistics conferences, and launch a mentorship program for emerging
    logisticians who share his curiosity for novelty. Over the next five years he hopes to reduce his workload to part‑time, allowing more time for writing, community volunteer work, and traveling to international
    art events.'
