  hobbies: '[''scale model building'', ''hiking'', ''fishing'', ''community gardening'', ''volunteering at county fair'', ''reading self‑help and productivity books'', ''DIY home repairs'']'
  career_goals: Nicklaus aims to advance from his current inspector role to a senior quality assurance supervisor, eventually managing a small team of testers. He plans to earn a Certified Quality Auditor
    (CQA) credential and possibly complete an associate degree in industrial technology to broaden his technical knowledge. He also hopes to develop stronger organizational habits, reduce deadline stress,
    and mentor younger colleagues on both procedural rigor and flexible problem‑solving. Long‑term, he envisions contributing to continuous‑improvement projects that enhance product safety while fostering
    a collaborative workplace culture.
