persona_description: Lynda Chambers is a zoologist and climatologist who specializes in climate impact and adaptation research, particularly its interface with Australian flora and fauna. She is an expert
  in understanding how climate drives phenology and uses traditional ecolological knowledge for weather and climate forecasting. Lynda is actively involved in community-based science programs, including
  research on Little Penguin and water quality monitoring, and has been involved in the ClimateWatch program since its inception. She is interested in finding out more on climate change and how flora and
  fauna adapt to such changes, and is particularly interested in the impact of climate on butterfly populations, including their development rates and the timing of when they emerge.
