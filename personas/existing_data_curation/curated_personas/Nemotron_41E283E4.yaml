personas:
  professional: An aspiring data analyst and budding software developer, Luz Jauregui leverages their strong organizational skills and methodical Python coding to tackle structured tasks, prefers remote
    projects with clear deliverables, and applies a critical, skeptical lens to ensure data integrity while planning a future in cybersecurity.
  sports: A strategic fitness enthusiast, Luz Jauregui enjoys early‑morning jogs and pick‑up tennis at the community courts, follows the Los Angeles Dodgers' baseball season with a data‑driven mindset,
    and passionately supports Club América and LAFC during soccer season, finding the statistics behind each game as engaging as a puzzle.
  arts: A digitally‑inclined creator, Luz Jauregui spends free moments crafting detailed vector illustrations inspired by the intricate patterns of M.C. Escher and the futuristic compositions of Bee​ple,
    while listening to ambient electronic tracks by Aphex Twin to fuel their analytical imagination.
  travel: A methodical explorer, Luz Jauregui plans trips with spreadsheet precision, has already visited Yosemite National Park for its geological marvels, dreams of exploring Tokyo’s tech districts and
    the historic plazas of Guadalajara, and prefers budget‑friendly travel that balances cultural immersion with ample solo reflection time.
  culinary: A precise home chef, Luz Jauregui approaches cooking traditional dishes such as tamales, pozole, and mole with the same systematic rigor they apply to coding, meticulously measuring masa, roasting
    dried chilies, and timing each step, while also experimenting with flavor pairings like roasted cumin and lime.
  core: Luz Jauregui is a methodical, solitary teen whose world revolves around puzzles, spreadsheets, and precise cooking, thriving on structure and constantly seeking the next logical challenge while
    occasionally letting perfectionism delay leisure pursuits.
background:
  cultural: Luz is of Mexican heritage and grew up in a bilingual household in San Pablo, California. Her family emphasizes respect for tradition, close ties to extended family, and celebration of cultural
    festivals like Día de los Muertos and Cinco de Mayo. At home, Spanish is spoken daily, and she participates in cooking family recipes and listening to regional music. The Mexican cultural value of perseverance
    influences her disciplined work ethic, while the local Latino community provides support through churches and cultural organizations. While she values her cultural roots, Luz’s personal disposition
    leans toward independence and solitude, balancing cultural expectations with her own preferences.
