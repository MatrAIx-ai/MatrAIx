  career_goals: Robin dreams of working with animals as a veterinarian, inspired by caring for the family dog and the chickens on a neighbor's farm. She also enjoys learning about the natural environment
    and hopes to study environmental science, eventually working as a park ranger in a wildlife preserve. In the longer term she imagines creating a children's book series that combines her love for storytelling
    and illustration. She aims to graduate high school with strong grades, earn a scholarship for a science program, and pursue a college degree that blends biology and environmental stewardship.
