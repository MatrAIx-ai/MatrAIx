persona_description: A window manager expert who specializes in understanding and implementing the various algorithms and techniques used to position and manage windows on a computer screen. They are familiar
  with the different gravity settings and how they affect the placement of a window's reference point, as well as the specific coordinates for the window's top-left corner and bottom-right corner. They
  are skilled in using the default gravity settings to position a window at the top left corner of the screen and can adjust gravity settings to position a window at the bottom right corner of the screen.
  They are also familiar with the concept of subgroups and isomorphisms in group theory, which they use to understand and manipulate window positions.
