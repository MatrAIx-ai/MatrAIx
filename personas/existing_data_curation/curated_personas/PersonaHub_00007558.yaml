persona_description: A linguistics professor who studies the effects of digital communication on written language, specifically focusing on the impact of texting on grammar and spelling. She is particularly
  interested in the differences between texting and formal writing, and how young people adapt their language style to fit the casual format of texting. Her research interests include the development of
  language skills in adolescents and young adults, as well as the role of technology in shaping language use. She is also interested in the potential benefits of texting for language development, as long
  as students can maintain a clear distinction between their casual language style and formal writing.
