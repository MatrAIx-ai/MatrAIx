personas:
  professional: Rian Jeanbrice, a seasoned arts administrator in Brooklyn, combines meticulous project management, strategic budgeting, and cross-cultural communication with a natural curiosity and sociable
    energy to lead community arts programs that are both financially sound and creatively daring.
  sports: Rian Jeanbrice, an avid player in the NYC Amateur Basketball Association's weekly league, follows the Brooklyn Nets and New York Yankees, incorporates salsa and hip-hop dance classes for cross-training,
    and treats fitness as a social ritual that keeps both body and creative mind sharp.
  arts: Rian Jeanbrice, a devoted explorer of contemporary art, frequents the Whitney Museum, MoMA, and Brooklyn's street-art murals, curates pop-up exhibitions featuring artists like Kehinde Wiley and
    Tschabalala Self, and fuels their passion for jazz and spoken-word with live shows by Kamasi Washington and Saul Williams.
  travel: Rian Jeanbrice, an adventurous traveler who plans trips around off-season fares, has explored the vibrant markets of Marrakesh, the jazz scene of New Orleans, and the Afro-Caribbean festivals
    of Trinidad, while dreaming of a cultural immersion stay in Barcelona's Raval district.
  culinary: Rian Jeanbrice, an intermediate home chef who loves Afro-Caribbean flavors, often prepares dishes like jerk chicken with scotch bonnet peppers, callaloo stew, and coconut-rice pudding, and seeks
    out the bold spices of Caribbean markets while appreciating the occasional upscale dinner at Manhattan's L'Artusi.
  core: Rian Jeanbrice, a 34-year-old arts manager who blends curiosity, meticulous planning, and an unstoppable social drive into a life of community-focused creativity, occasional budget splurges, and
    a steady quest for cultural equity.
background:
  cultural: Rian is a second-generation African American whose family roots trace back to the Southern United States, with additional Caribbean influences from his maternal grandparents who migrated from
    Jamaica. Growing up in Brooklyn’s vibrant Black neighborhoods, he was immersed in a rich tapestry of cultural expressions—from gospel music and church community gatherings to hip-hop culture and Caribbean
    festivals such as the West Indian Day Parade. This multicultural upbringing instilled a deep appreciation for Black artistic heritage and a commitment to amplifying under-represented voices in the arts.
    He actively supports local Black artists, participates in community cultural events, and draws inspiration from the historic legacy of African diaspora creativity in New York City.
attributes:
  skills: '[''Arts Administration'', ''Project Management'', ''Strategic Planning'', ''Budgeting & Financial Oversight'', ''Community Engagement'', ''Cross-Cultural Communication'', ''Event Planning'',
    ''Public Speaking'', ''Digital Media & Social Media Strategy'', ''Data-Driven Decision Making'', ''Conflict Resolution'', ''Team Leadership'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street art and mural tours'', ''Photography'', ''Live music concerts (jazz, hip-hop, spoken-word)'', ''Basketball'', ''Cooking and exploring Afro-Caribbean
    cuisine'', ''Volunteering for youth art workshops'', ''Reading contemporary literature and cultural essays'', ''Yoga'', ''Hip-hop and salsa dance classes'']'
  career_goals: Rian aims to advance to senior leadership in the cultural sector, targeting roles such as Director of Community Arts Programs at a major city museum or cultural agency. He plans to obtain
    an MBA with a focus on nonprofit management to complement his artistic background, and to spearhead citywide initiatives that increase access to the arts for underserved neighborhoods. Over the next
    five years, he hopes to launch his own cultural consultancy that advises corporations and municipalities on inclusive programming, while also championing policies that support Black and minority artists.
    Ultimately, he envisions creating a lasting legacy of equitable arts infrastructure in Brooklyn and beyond.
