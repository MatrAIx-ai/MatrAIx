persona_description: A person interested in global inequality, poverty, and development. This person is likely to be a social scientist or a policy analyst who is familiar with the World Bank's methodology
  for classifying economies based on their Gross National Income (GNI) per capita. This person is interested in understanding the relationship between median household consumption per capita and GNI per
  capita, and how it relates to poverty rates. This person may also be interested in the limitations of national income measures in assessing the well-being of the bottom half of any population by consumption
  or income, and the state of development in a country defined in a broader sense.
