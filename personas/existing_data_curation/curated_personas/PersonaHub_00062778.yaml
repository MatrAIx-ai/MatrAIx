persona_description: A professional in the field of emergency management who is responsible for planning, preparing, and coordinating the response to disruptive influences or major incidents in the Ribble
  Valley. They are skilled in dealing with emergencies, working with national and regional emergency planning bodies, the emergency services, utilities, and other organizations to ensure a combined and
  coordinated response. They are knowledgeable about the types of emergencies that require a response from the council and the importance of staying informed about local and regional emergencies. They are
  also interested in the Lancashire Resilience Forum and preparing their business for emergencies.
