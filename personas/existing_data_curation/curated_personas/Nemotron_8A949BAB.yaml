  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Walking/hiking'', ''Cooking'', ''Knitting'', ''Local history research'', ''Volunteering at historical society'', ''Bird watching'', ''Listening
    to podcasts'', ''Photography'']'
  career_goals: Lisa aims to transition from a traditional secretarial role to an office manager position where she can oversee workflow improvements and lead a small team. She plans to earn the Certified
    Administrative Professional (CAP) credential to formalize her expertise. While she values job stability, she is also exploring the possibility of offering freelance virtual assistant services to local
    small businesses, leveraging her calm demeanor and flexible work style. Mentoring younger administrative staff and implementing simple, efficient organizational systems are also key ambitions, allowing
    her to blend her curiosity for new ideas with proven methods.
