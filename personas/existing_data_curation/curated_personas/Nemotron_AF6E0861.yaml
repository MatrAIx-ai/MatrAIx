  career_goals: Julie aims to lead the development of a district‑wide holistic career development initiative that integrates academic advising, mental‑health support, and local workforce partnerships. She
    aspires to become a senior guidance director, mentoring emerging counselors and championing evidence‑based practices. Additionally, she plans to pursue a doctoral degree in counseling psychology to
    deepen her expertise in stress‑management interventions for adolescents, and to author a guidebook on creating low‑stress career counseling environments for both students and counselors.
