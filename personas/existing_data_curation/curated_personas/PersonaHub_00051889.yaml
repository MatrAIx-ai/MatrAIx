persona_description: A scientist at Burnham Institute for Medical Research who specializes in the study of bacterial metabolism, protein structures, and the evolution of protein networks. She has developed
  a comprehensive model of the central metabolic network of the bacterium Thermotoga maritima, including three-dimensional protein structures, and has used this model to highlight the important role of
  a small number of essential protein shapes, lending new insights into the evolution of protein networks and the functions within these networks. Her research has the potential to expand computer modeling
  to allow investigators to simulate the interactions between proteins and various compounds in an entire system, and to identify both positive and adverse drug reactions before pre-clinical and clinical
  trials.
