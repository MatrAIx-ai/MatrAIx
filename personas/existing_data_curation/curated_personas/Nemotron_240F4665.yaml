  hobbies: '["senior center socials (bingo, bridge, book club)", "knitting and quilting circles", "community gardening", "church potluck and choir activities", "weekly walking groups in local parks", "classic
    movie nights at the library", "reading mystery novels", "cooking traditional family meals", "volunteering at the local food bank"]'
  career_goals: Although she is no longer employed, Elizabeth is intent on staying active, useful, and socially connected. She aspires to become a regular volunteer coordinator at the Lakewood senior center,
    where she can schedule and lead weekly craft workshops, gardening sessions, and bingo tournaments, creating a dependable routine for participants. She hopes to compile a handwritten family cookbook
    that preserves her traditional recipes for future generations. Driven by her competitive streak, she aims to win the senior‑center’s annual bingo championship and earn recognition in regional quilting
    contests. Additionally, Elizabeth wishes to maintain her health through daily walks in nearby parks and water‑aerobics classes, ensuring she can continue providing informal caregiving support to her
    grandchildren and neighbors. She also plans to attend a community financial‑literacy class to better manage her retirement funds and plan for any long‑term care needs.
