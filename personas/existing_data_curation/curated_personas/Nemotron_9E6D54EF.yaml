  hobbies: '[''Soccer (team sport)'', ''Piano lessons'', ''LEGO Technic building'', ''Scratch coding projects'', ''Reading mystery novels'', ''Journaling'', ''Birdwatching at Tyler State Park'', ''Playing
    strategic video games (Minecraft)'']'
  career_goals: Thomas is fascinated by careers that combine clear structures with community service. He dreams of becoming a civil engineer, attracted to building safe, organized infrastructure, or a firefighter,
    drawn to the predictable procedures and teamwork of emergency response. He also thinks about future work as a school counselor, hoping to use his own experience with anxiety to help peers. To prepare,
    he plans to focus on math, science, and physical-education courses in high school, join a robotics or engineering club, and maintain his good academic standing while continuing his volunteer activities
    at the local library and community garden.
