personas:
  professional: Thomas Donaldson is an aspiring youth technologist, regularly building LEGO Technic models, programming simple Scratch games, and contributing to robotics projects in the school STEM club,
    where their love for step‑by‑step planning and structured problem solving shines.
  sports: Thomas Donaldson plays forward on the Tyler Youth Soccer Club, attending twice‑weekly practices and weekend games, while cheering on the Dallas Cowboys for football and the Dallas Mavericks for
    basketball, and spends free time tracking bird species at Tyler State Park as a personal form of fitness.
  arts: Thomas Donaldson devotes evenings to piano practice, mastering pieces by Ludwig van Beethoven and contemporary pop song arrangements of Taylor Swift, while also immersing themselves in mystery novels
    like the Nancy Drew series and constructing elaborate world builds in Minecraft that serve as digital canvases for creative expression.
  travel: Thomas Donaldson prefers meticulously planned weekend getaways, having already visited Austin’s music scene and the Great Smoky Mountains with the family, and dreams of a future field trip to
    the Smithsonian museums in Washington, D.C., despite occasional anxiety about unfamiliar airports.
  culinary: Thomas Donaldson enjoys home‑cooked mac and cheese and can whip up a solid pancake stack using flour, eggs, and milk, but they particularly love ordering chicken‑taco bowls with cilantro, lime,
    and avocado from a local Mexican grill, while occasionally trying their hand at baking chocolate chip cookies for birthday parties.
  core: Thomas Donaldson is a structured, detail‑oriented 12‑year‑old who balances rigorous routines with a vivid imagination, yet often battles intense anxiety that colors both triumphs and setbacks.
background:
  cultural: Thomas comes from a middle-class, white American family in the suburban community of Newtown, Bucks County, Pennsylvania. His upbringing reflects the region's blend of Northeastern values, emphasizing
    punctuality, responsibility, and community involvement. He celebrates mainstream American holidays such as Thanksgiving, Independence Day, and Christmas, and often participates in local events like
    the Newtown summer festival. His family's heritage includes Irish-American and German-American roots, which influence occasional family traditions, foods, and a respect for organized, family-centered
    gatherings. The community's focus on education and extracurricular participation has shaped his structured lifestyle.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic computer literacy (Google Docs, Slides)'', ''Scratch programming'', ''Soccer teamwork and ball handling'', ''LEGO Technic building'',
