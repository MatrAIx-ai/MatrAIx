personas:
  professional: Thomas Lee works as a CNC technician at a small manufacturing shop, where his hands‑on expertise with CNC routers, laser cutters and G‑code programming balances a practical work ethic with
    a restless curiosity, letting them troubleshoot equipment malfunctions while occasionally letting disorganization delay paperwork, yet they assertively raise safety concerns to supervisors when needed.
  sports: Thomas Lee jogs along the sunrise‑lit Intracoastal Beach three times a week, is a member of the West Palm Beach Fishing Club that meets on Saturdays, roots for the Miami Dolphins and the Miami
    Heat, and when the basketball season rolls around they squeeze in pick‑up games at a local gym, balancing solitary cardio with occasional team sport camaraderie.
  arts: Thomas Lee collects detailed model kits of aircraft and cars, draws inspiration from the photorealistic paintings of Syd Mead and the synth‑wave soundscapes of Kavinsky, spends occasional evenings
    watching sci‑fi classics like Blade Runner, and follows tech‑cultural podcasts hosted by Adam Savage, weaving visual and auditory influences into their creative downtime.
  travel: Thomas Lee prefers low‑key road trips to nearby nature spots such as the Everglades and the Florida Keys, where they can fish and explore, while dreaming of a future solo backpacking adventure
    through Japan’s industrial museums and the alpine villages of Austria, planning trips loosely and often waiting for a spontaneous work break to book flights.
  culinary: Thomas Lee enjoys grilling fresh snapper with a citrus‑herb rub, whipping up a quick shrimp jambalaya when time allows, but their cooking skill hovers at a competent home‑cook level, often relying
    on simple ingredients like mango, avocado, and chipotle sauce, and they occasionally indulge in specialty craft burgers from a local gastropub after a long shift.
  core: Thomas Lee is a curious yet laid‑back CNC tech who juggles a love for intricate model kits, sunrise jogs, and occasional anxiety spikes, while letting disorganized habits and late‑night gaming sessions
    slip into their otherwise disciplined routine.
background:
  cultural: Thomas grew up in a middle‑class, white, suburban family in South Florida, where a blend of beach culture and a strong work ethic shaped his outlook. His family valued practical skills and self‑reliance,
    encouraging him to pursue hands‑on trades while also supporting his curiosity about new technologies. Living in West Palm Beach, he is exposed to a diverse community and occasional multicultural festivals,
    which broaden his perspective but his daily life remains rooted in the pragmatic, service‑oriented values common to many Floridian blue‑collar families.
attributes:
  skills: '["CNC machine operation", "Laser cutting", "G-code programming", "Technical drawing interpretation", "Material property knowledge (metal & composites)", "Precision measurement (calipers, micrometers)",
    "Shop safety and OSHA compliance", "Equipment troubleshooting", "Basic maintenance of cutting equipment", "Inventory management"]'
  hobbies: '["Model kit building (aircraft & automobiles)", "Fishing in local waterways", "Reading science fiction and popular science", "Playing strategic video games (e.g., Civilization)", "Jogging on
    the beach", "Meditation and mindfulness exercises", "Listening to podcasts on technology and DIY projects"]'
  career_goals: Thomas aims to become a certified CNC programmer and, within five years, move into a lead technician or production supervisor position at his current plant. He plans to enroll in an associate’s
    degree program in manufacturing technology or computer‑aided design to deepen his understanding of CAD/CAM software. Ultimately, he hopes to combine his practical know‑how with emerging automation technologies,
    perhaps overseeing a small team that integrates robotic cutting solutions into the shop floor. He also wants to achieve financial stability to afford a modest home in West Palm Beach and reduce his
    current stress about job security.
