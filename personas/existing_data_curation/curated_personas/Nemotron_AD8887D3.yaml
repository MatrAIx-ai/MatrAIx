  career_goals: Looking ahead, Sudeep wants a career that lets him apply his love of science and technology to serve others. He dreams of becoming a biomedical engineer or pediatrician who designs affordable
    medical devices for underserved children, merging his technical curiosity with his deep empathy. He also envisions working with nonprofit organizations to develop health‑tech solutions for his local
    community in Leesburg. While he acknowledges his tendency to resist strict structures, he is motivated to cultivate better time‑management habits during high school so he can turn these ambitions into
    reality.
