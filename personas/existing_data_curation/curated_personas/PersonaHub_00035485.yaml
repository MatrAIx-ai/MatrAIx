persona_description: A professional in the field of environmental protection and safety, specifically focusing on the management and regulation of underground storage tanks (USTs) to prevent releases of
  regulated petroleum and hazardous substances into the environment. This individual is responsible for ensuring that UST systems are properly constructed and designed, that installations, repairs and removals
  are conducted and inspected by qualified and licensed individuals, that active USTs are properly operated and monitored for releases, and that upon closure, USTs are properly decommissioned and sites
  assessed for contamination. This role requires a deep understanding of UST regulations, industry standards, and best practices in leak prevention and remediation.
