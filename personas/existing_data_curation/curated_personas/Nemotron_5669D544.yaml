personas:
  professional: An aspiring comic creator, Jennifer Palange blends her knack for storyboarding with meticulous time-management, turning after-school basketball sessions into brainstorming breaks and channeling
    her organized yet flexible mindset into weekly comic strips that balance imaginative fantasy with practical visual storytelling.
  sports: Jennifer Palange energizes her weekends with pickup basketball games at Prospect Park, idolizing the Brooklyn Nets and the New York Knicks, earning the nickname the strategist for her balanced
    mix of competitive fire and cooperative passing, and she also follows the local high-school basketball season while practicing at the community center three times a month.
  arts: Jennifer Palange channels her creative spark into sketching vibrant comic characters inspired by authors like Rick Riordan and J.K. Rowling, strums her ukulele to the tunes of Jack Johnson and Taylor
    Swift, and snaps photos of Brooklyn street murals by artists such as KAWS and Banksy during her walks, later assembling short video edits for fun.
  travel: Jennifer Palange's travel style blends curiosity and practicality; she spends summer vacations discovering nearby New York gems like Coney Island and the American Museum of Natural History, saves
    part of her allowance for a future family trip to London to see Harry Potter filming locations, and prefers day trips with a clear itinerary over spontaneous long-haul journeys.
  culinary: Jennifer Palange enjoys a mix of classic New York pizza slices and homemade avocado toast, can whip up a quick ramen bowl with broth, veggies, and a boiled egg, and often experiments by drawing
    comic doodles with chocolate sauce on pancakes, though she sometimes raids the pantry for sugary cereal late at night.
  core: Jennifer Palange, a 13-year-old balancing basketball, comic-strip creation, and ukulele practice, lives with pragmatic curiosity, organized spontaneity, and a habit of staying up late to edit videos.
background:
  cultural: Jennifer comes from a white, Italian‑American family that has lived in Brooklyn for several generations. Her parents, both educators, emphasize academic achievement, cultural curiosity, and
    community involvement. While the household celebrates traditional holidays like Christmas and Thanksgiving with family recipes such as homemade pasta and biscotti, the diverse Brooklyn environment has
    exposed Jennifer to a wide range of cultural influences—from Caribbean music in her neighborhood to the vibrant art scene of Williamsburg. This blend of a strong family heritage and an eclectic urban
    setting shapes her worldview, fostering an appreciation for both her own cultural roots and the multicultural fabric of her city.
