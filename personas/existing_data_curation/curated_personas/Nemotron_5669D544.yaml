  hobbies: '[''Basketball'', ''Sketching'', ''Ukulele playing'', ''Reading fantasy novels'', ''Fan‑fiction writing'', ''Street photography'', ''iMovie video editing'', ''Volunteer work at community library'',
    ''Exploring Brooklyn murals'']'
  career_goals: Jennifer aims to graduate high school with honors and earn a scholarship to study computer science or biomedical engineering. She envisions creating educational apps that make STEM subjects
    more accessible to middle‑school students, especially those from under‑resourced neighborhoods. Alongside her technical aspirations, she hopes to continue developing her digital storytelling skills
    to produce a YouTube channel that highlights community projects and youth voices in Brooklyn. Long‑term, she wants to combine her engineering expertise with a commitment to social impact, perhaps working
    for a nonprofit tech organization or a tech startup focused on educational equity.
