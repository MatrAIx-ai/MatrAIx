personas:
  professional: Anthony Rosado is a hands‑on problem‑solver who blends basic computer proficiency and bilingual communication with a knack for mechanical troubleshooting, channeling his empathetic yet assertive
    demeanor into a budding career path toward certified electrical or HVAC work while informally mediating conflicts at his part‑time café gigs.
  sports: Anthony Rosado fuels his fitness by playing weekly pickup soccer in the South Beach Soccer League, cheering on the Miami Heat and Miami Dolphins, and joining the Miami Beach Bicyclists Club for
    casual weekend rides along the shoreline.
  arts: Anthony Rosado unwinds by streaming reggaeton hits from Bad Bunny and classic salsa tunes by Marc Anthony, devouring Marvel comics like Spider‑Man, and practicing improvised salsa steps with friends
    after dancing nights, all of which shape a vibrant, rhythm‑driven social identity.
  travel: Anthony Rosado prefers spontaneous, budget‑friendly road trips, having explored Key West and New York City, while dreaming of a summer adventure to Barcelona’s beachfront neighborhoods and a cultural
    immersion in Costa Rica’s rainforests.
  culinary: Anthony Rosado showcases an intermediate cooking skill set by preparing family‑heritage dishes such as citrus‑marinated pork, crisp fried plantains, and rice seasoned with sofrito, blending
    traditional flavors with modern twists during weekend gatherings.
  core: Anthony Rosado blends a practical, hands‑on mindset with a love for salsa rhythms, vintage bikes, and side‑hustle dreams, yet often lets loose on impulse purchases and forgets to schedule dentist
    appointments.
background:
  cultural: Anthony grew up in a vibrant Cuban-American community in Miami, immersed in a bilingual environment where family and tradition are central. He celebrates Cuban holidays such as Carnaval and
    Cuban Heritage Month, often participating in local festivals that showcase Afro‑Cuban music, dance, and food. His upbringing emphasizes respect for elders, strong communal ties, and the importance of
    sharing meals with loved ones. While he embraces broader American cultural influences, he remains deeply connected to his Cuban roots through language, cuisine, and the rhythm of everyday life.
attributes:
  skills: '["Bilingual (Spanish/English)", "Basic computer literacy (Microsoft Office, email, social media)", "Customer service experience", "Mechanical troubleshooting (bicycles, small appliances, basic
    car maintenance)", "Interpersonal communication and mediation", "Basic financial budgeting"]'
  hobbies: '["Pickup soccer", "Salsa dancing", "Cooking Cuban cuisine", "Listening to reggaeton and salsa", "Bicycle restoration", "Beach outings", "Video gaming", "Watching action movies", "Reading comics"]'
  career_goals: Anthony aims to enroll in a vocational training program to become a certified electrician or HVAC technician, fields that offer clear structure and reliable income while allowing hands‑on
    problem solving. He plans to complete an apprenticeship within the next two years, eventually securing a stable job with a local trades union. In the longer term, he dreams of owning a small side business—perhaps
    a food cart serving traditional Cuban street food—that would let him blend his cultural roots with entrepreneurial ambition.
