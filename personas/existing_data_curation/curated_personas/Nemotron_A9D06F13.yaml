personas:
  professional: Andrew Mccook, a seasoned museum cataloguer and art historian, channels a methodical, evidence‑based mindset and a vivid imagination into crafting interdisciplinary exhibitions that marry
    rigorous metadata standards with surreal visual narratives.
  sports: Andrew Mccook pursues solitary hikes along the Green Mountain Trail year‑round, joins the Burlington Trail Runners club for occasional long‑distance runs, and in the off‑season enjoys cross‑country
    skiing at Stowe, while loyally cheering for the New England Patriots and Boston Red Sox during televised games.
  arts: Andrew Mccook intertwines watercolor studies reminiscent of John Singer Sargent’s light, digital collages that echo Rafael Lozano‑Hemmer’s algorithmic installations, piano recitals ranging from
    Debussy’s ‘Clair de Lune’ to Philip Glass’s minimalist Etudes, and regular attendance at local experimental theater productions by the Vermont Playwrights Collective and indie screenings featuring Jim
    Jarmusch’s films.
  travel: Andrew Mccook favors meticulously planned solo trips that blend artistic research with natural inspiration, such as weekend excursions to the painter’s towns of Woodstock, Vermont, a week‑long
    sketching pilgrimage to the Alpine valleys of Austria, and an annual cultural immersion in Kyoto’s historic temples, while budget considerations keep longer voyages occasional and often funded through
    modest Arts Council grants.
  culinary: Andrew Mccook enjoys modest‑level cooking that centers on seasonal New England fare, often preparing maple‑glazed salmon with rosemary‑infused wild mushrooms, crafting a hearty beet and goat‑cheese
    salad, and savoring a slice of fresh blueberry pie topped with a pinch of lavender, while they are selective about dining out, favoring farm‑to‑table bistros that source local Vermont cheese and heirloom
    vegetables.
  core: Andrew Mccook, a 48‑year‑old museum archivist turned experimental artist, channels relentless curiosity and a disciplined, calm demeanor into solitary creative marathons, yet habitually whispers
    critique to the empty walls of their studio, a quirky compulsion that fuels their pursuit of perfection.
background:
  cultural: Andrew was born and raised in the Burlington‑Winooski area of northern Vermont, part of a family with deep New England roots dating back to the early 19th century. His grandparents operated
    a small dairy farm on the outskirts of the Green Mountains, instilling in him an appreciation for the region’s rural landscapes and self‑reliance ethos. Though his upbringing was secular, the community’s
    emphasis on local history, folk arts, and independent thinking shaped his worldview. He attended a public high school with a robust arts program, later earning a BA in Art History and Philosophy from
    the University of Vermont. The blend of New England’s quiet natural environment and a vibrant, DIY‑driven arts scene continues to inform his aesthetic sensibility and his preference for intimate, intellectually
    stimulating gatherings.
