  career_goals: He intends to author a speculative fiction trilogy that interlaces philosophical inquiry with surreal visual motifs, aiming for publication with an independent press. Concurrently, he plans
    to curate a series of small‑scale, site‑specific exhibitions in Winooski that showcase emerging abstract artists, seeking modest grants from Vermont’s Arts Council. Over the next five years, he hopes
    to secure a part‑time lecturer position at a community college teaching art theory and critical thinking, leveraging his academic background and practical museum experience. He also aspires to develop
    a weekly writing workshop for a tight‑knit group of local enthusiasts, positioning himself as a thought leader in the region’s intellectual‑artistic community.
