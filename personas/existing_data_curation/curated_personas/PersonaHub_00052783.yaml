persona_description: A political scientist who specializes in the study of voting behavior, particularly the impact of voting advice applications on electoral turnout and the use of large-scale VAA-generated
  data for recruiting participants beyond the narrow university student base. They are interested in bridging the gaps between VAA studies and the study of political representation and participation and
  have experience in conducting randomized experiments online or offline with VAAs. They have a background in political science and have contributed to the mapping of the VAA field with an edited volume
  that could enrich political science research in the fields of political participation and representation in the age of big data.
