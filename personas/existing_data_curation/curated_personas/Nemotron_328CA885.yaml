  hobbies: '[''Watercolor painting'', ''Mixed‑media collage art'', ''Experimental home cooking (fusion Mexican cuisine)'', ''Reading magical realism and culinary science'', ''Book club participation'',
    ''Hiking in Sierra Nevada'', ''Yoga practice'', ''Attending local art fairs'', ''Poetry writing'', ''Volunteer at cultural festivals'', ''Learning new culinary techniques'', ''Bilingual storytelling'',
    ''Gardening herbs for cooking'']'
  career_goals: Cecilia aims to transition from line supervision to a regional operations manager role within the hospitality sector, with a focus on integrating sustainable sourcing and culturally authentic
    menu concepts across multiple locations. Over the next five years she plans to obtain a Certified Culinary Manager credential, launch a boutique catering venture that showcases modern Mexican street
    food, and eventually open a small, community‑focused restaurant that serves as a culinary incubator for emerging chefs from underrepresented backgrounds. She also hopes to mentor younger professionals,
    especially women and bilingual staff, and contribute to industry publications on innovative kitchen management.
