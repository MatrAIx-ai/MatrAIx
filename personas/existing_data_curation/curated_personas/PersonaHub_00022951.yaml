persona_description: A speech-language pathologist who specializes in assessing and treating speech and language disorders in young children, particularly those with phonological impairments. Her research
  interests include the development and assessment of speech motor skills in children with speech and language disorders, and the use of indirect measures of speech motor skills in young children. She has
  developed and refined techniques for measuring various aspects of speech motor skill in young children and has published studies on the impact of speech and language disorders on speech motor skills in
  these children.
