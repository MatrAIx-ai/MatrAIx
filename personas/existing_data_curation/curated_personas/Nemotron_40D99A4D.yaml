personas:
  professional: Manuela Yong is a dependable construction helper who skillfully bridges labor crews and forepersons through meticulous safety logging, inventory tracking, and clear on‑site communication,
    while their curiosity drives them to experiment with new building methods and mentor women entering the trades on the path toward a supervisory role.
  sports: Manuela Yong fuels their active lifestyle by playing in a co‑ed soccer league for the Pueblo Pioneers, cheering on the Colorado Rockies, Denver Broncos, and Denver Nuggets, and tackling seasonal
    hikes in the Sangre de Cristo Mountains with a local climbing club, balancing competitive games with weekend trail runs.
  arts: Manuela Yong expresses creativity through lively salsa and folklórico dance classes, regularly attending performances featuring musicians like Lila Downs, Carlos Santana, and Gloria Estefan, while
    also supporting local mural festivals and theater nights that sustain their connection to community arts.
  travel: Manuela Yong prefers adventure‑packed road trips that combine outdoor exploration and cultural immersion, having trekked the Great Sand Dunes, visited Santa Fe’s historic plaza, and camped near
    the peaks of Patagonia, while dreaming of kayaking Lake Tahoe and wandering the streets of Andalusia, always planning trips with a budget spreadsheet to balance cost and experience.
  culinary: Manuela Yong delights in preparing traditional dishes such as tamales, pozole, and mole, expertly grinding masa by hand, simmering rich chilies for a deep‑flavored mole, and layering flavors
    with fresh cilantro and oregano, often sharing the meals at neighborhood potlucks where their cooking skill shines beside a well‑worn cast‑iron skillet.
  core: Manuela Yong blends hands‑on construction expertise, community‑centered energy, and a love of dance, cooking, and the outdoors into a pragmatic yet curious approach to life, all while navigating
    finances and health with the same organized compassion.
background:
  cultural: Manuela is a first‑generation Mexican‑American raised in a bilingual household that values family, faith, and community. She grew up celebrating Día de los Muertos, quinceañeras, and local Pueblo
    festivals, blending Mexican traditions with Colorado’s frontier culture. Fluent in both Spanish and English, she often serves as a cultural bridge, translating for Spanish‑speaking workers on her construction
    sites and helping her neighbors navigate city services. Her Catholic upbringing informs her sense of compassion and service, while her Mexican roots inspire her love for vibrant food, music, and dance.
    Living in Pueblo, CO, she embraces the region’s diverse heritage, incorporating both her heritage and her local environment into her daily life.
attributes:
  skills: '["Concrete mixing", "Rebar tying", "Site safety inspection", "Material inventory management", "Basic blueprint reading", "Power tool operation", "Team communication", "Conflict resolution", "Community
    liaison", "Basic carpentry"]'
  hobbies: '["Salsa dancing", "Folklórico dance", "Hiking", "Camping", "Traditional Mexican cooking", "Co‑ed soccer", "Volunteering at food bank", "DIY home improvement", "Woodworking"]'
  career_goals: Manuela aims to leverage her on‑site experience into a supervisory role within the next three to five years. She plans to obtain an OSHA 30‑hour certification and complete an Associate’s
    degree in Construction Management through a local community college. Her long‑term ambition is to become a foreperson, then a project coordinator, and eventually launch a small subcontracting business
    that prioritizes safety, sustainability, and mentorship of underrepresented workers in the industry. She is also passionate about creating pathways for other Mexican‑American women to enter construction
    trades.
