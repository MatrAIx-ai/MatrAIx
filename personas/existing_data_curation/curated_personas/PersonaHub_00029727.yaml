persona_description: A climate finance advocate who is interested in promoting the equitable distribution of climate finance to developing countries, particularly to the most vulnerable and poorest communities.
  This person is passionate about community-based adaptation and local level funding, and is committed to ensuring that climate finance reaches its intended beneficiaries. They are aware of the challenges
  faced in tracking climate finance to the local level and are looking for innovative solutions to overcome these obstacles. This person is also interested in the policies and practices of national governments
  in developing countries to allocate at least half their climate funds to the most vulnerable communities.
