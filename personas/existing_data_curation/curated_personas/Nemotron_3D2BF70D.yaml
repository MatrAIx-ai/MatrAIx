personas:
  professional: A preschool class catalyst, Seneca Mayweather thrives on turning free‑play into impromptu art and building sessions, using their boundless curiosity to explore new ideas while casually shrugging
    at the teacher’s strict agenda, and they often let their competitive streak push them to be the first to finish a puzzle.
  sports: A pint‑sized kinetic explorer, Seneca Mayweather darts around the local park every afternoon, proudly dons a tiny jersey of the hometown baseball team the Springfield Sluggers, participates in
    the community “Little Kickers” soccer group, and they treat family hikes as mini‑adventures where they race squirrels and climb low rocks.
  arts: A budding art aficionado, Seneca Mayweather delights in finger painting bright swirls inspired by Eric Carle’s collage style, sings along to the playful tunes of The Wheels on the Bus, and they
    proudly display a crayon‑drawn masterpiece on the refrigerator, showcasing their love for vibrant, unconventional creativity.
  travel: A curious little explorer, Seneca Mayweather has already toured the sandy beaches of Florida with the family, visited the zoo in Seattle, and daydreams about a future trip to the Grand Canyon,
    always favoring short car rides with snack stops over long flights, and they love the excitement of spontaneous detours.
  culinary: A tiny taste‑tester, Seneca Mayweather favors creamy macaroni and cheese, crunchy apple slices, and peanut butter‑jelly sandwiches, happily helps stir batter with a plastic spoon, yet stubbornly
    refuses broccoli, insisting on a generous drizzle of ketchup on everything, and they often misplace their favorite spoon.
  core: Seneca Mayweather, a three‑year‑old whirlwind of curiosity, competitive spark, and playful disarray, turns every day into a spontaneous art‑filled adventure while they stubbornly misplace their
    favorite socks.
background:
  cultural: Raised in Baltimore's historically Black districts, Seneca is immersed in a rich African‑American cultural tapestry. His family celebrates traditions of oral storytelling, church music, and
    community festivals, while the city's vibrant mural scene and local jazz and hip‑hop influences nurture his appreciation for art, rhythm, and collective expression.
