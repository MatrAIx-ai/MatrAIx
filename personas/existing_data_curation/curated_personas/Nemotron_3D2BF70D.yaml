  career_goals: Even at three, Seneca already talks about wanting to be an artist who paints big murals on city walls, or a scientist who discovers new ways to play and learn. He is drawn to roles that
    let him explore ideas, compete in creative challenges, and share his work with a community that appreciates art and innovation.
