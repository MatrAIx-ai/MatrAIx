persona_description: A historian who specializes in the study of World War I and the role of Handforth camp in the war. This person is interested in understanding the complex interactions between different
  groups of visitors who passed through the camp during its short life, and how their visits contributed to the overall experience of the camp. They are also interested in the broader context of the First
  World War and the role of Handforth camp in shaping the events of the war.
