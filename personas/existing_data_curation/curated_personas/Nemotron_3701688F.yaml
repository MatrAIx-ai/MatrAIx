personas:
  professional: Titus Oliver, a senior systems engineer and data‑driven creative strategist, leverages advanced Python, R, and MATLAB modeling alongside Adobe Creative Suite and 3D design to deliver immersive
    tech‑enabled community projects, channeling their boundless curiosity and collaborative energy into deadline‑driven hackathons and mentorship workshops.
  sports: Titus Oliver plays pickup basketball at the local community center every Thursday, cheers for the New York Knicks and follows the Brooklyn Nets’ season, runs a spring 5K with the Bronx River Running
    Club, and balances high‑energy team play with occasional yoga sessions to counteract a habit of staying up late on synth projects.
  arts: Titus Oliver dedicates weekends to painting large‑scale canvases inspired by Kehinde Wiley and Basquiat, crafts modular synth tracks reminiscent of Flying Lotus, creates digital illustrations echoing
    James Turrell’s light installations, frequently attends openings at the Brooklyn Museum and screenings at BAMPFA, and often ends the night curating playlists that blend reggae, jazz, and electronic
    beats.
  travel: Titus Oliver plans trips that blend cultural immersion and creative inspiration, revisiting Kingston, Jamaica for its vibrant street art, exploring Lisbon’s seafood markets, and dreaming of a
    future residency in Berlin to collaborate on interdisciplinary projects, while usually overpacking a few extra sketchbooks and modular synth modules for spontaneous jam sessions.
  culinary: Titus Oliver’s kitchen serves as a laboratory where they fuse jerk‑spiced chicken tacos with miso‑glazed vegetables, frequently using Scotch bonnet peppers, ripe plantains, and fresh cilantro,
    and their cooking skill has advanced to hosting pop‑up dinners for neighbors that showcase a modern Caribbean‑fusion menu.
  core: Titus Oliver is a 45‑year‑old tech‑savvy artist‑activist who blends data, paint, and synths to empower their community while juggling disciplined finances, proactive health habits, and a love for
    basketball, world travel, and bold flavors.
background:
  cultural: Titus grew up in Brooklyn’s vibrant, multicultural neighborhoods, where African‑American traditions and Caribbean influences intertwined. His family celebrates Juneteenth, Kwanzaa, and Caribbean
    holidays, and he was raised on a mix of gospel, jazz, and reggae music. He maintains strong ties to his local community, volunteering with neighborhood cultural centers and youth mentorship programs
    that promote STEM education among Black and Latino students. This heritage informs his worldview, fueling his commitment to uplift underrepresented voices through both technology and the arts.
attributes:
  skills: '["Data analysis", "Statistical modeling", "Python programming", "R programming", "MATLAB", "Systems engineering", "Project management", "Graphic design", "3D modeling", "Interactive multimedia
