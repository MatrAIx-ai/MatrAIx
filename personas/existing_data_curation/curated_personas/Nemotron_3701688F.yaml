  hobbies: '["Painting", "Digital illustration", "Electronic music production", "Modular synthesizers", "Gardening", "Cooking fusion cuisine", "Pickup basketball", "Visiting art galleries", "Attending film
    screenings", "Science talks", "Community hackathons", "Mural projects"]'
  career_goals: Titus aims to channel his technical expertise and creative vision into a role that bridges technology and community development. He aspires to launch a nonprofit edTech initiative that provides
    hands‑on coding and digital arts workshops for under‑served youth in Brooklyn, eventually scaling the program city‑wide. He also dreams of securing a senior advisory position at a cultural institution,
    where he could design immersive tech‑driven exhibits that celebrate Black heritage. In the longer term, he hopes to author a book exploring the intersection of science, art, and cultural identity.
