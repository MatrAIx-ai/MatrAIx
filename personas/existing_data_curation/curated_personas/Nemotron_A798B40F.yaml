personas:
  professional: Andrew Stewart, an aspiring automotive technician with foundational experience in IT support, leverages their detail‑oriented spreadsheet skills and systematic approach to routine maintenance;
    they channel a love for structure and a competitive drive into precise diagnostics and the development of repeatable garage processes.
  sports: Andrew Stewart, a disciplined yet low‑key sports enthusiast, competes in a weekly bowling league with the Lakeview Rollers, spends summer weekends fishing at the Adirondack lakes, follows the
    Green Bay Packers as their favorite NFL team and the Milwaukee Brewers for baseball, and maintains a modest fitness routine of light weight‑training and occasional jogs; they value the structure and
    measurable progress each activity provides.
  arts: Andrew Stewart, an avid consumer of classic rock and meticulous model‑building as personal art, frequently listens to Led Zeppelin and Pink Floyd, appreciates the cinematographic precision of Wes
    Anderson’s 'The Grand Budapest Hotel', and studies the intricate designs of LEGO Technic as a blend of engineering and creativity; they occasionally attend local art exhibitions that showcase functional
    design.
  travel: Andrew Stewart, a planner‑oriented traveler, prefers well‑mapped road trips that combine hobbyist pit stops at automotive museums like the Petersen Automotive Museum in Los Angeles with quiet
    fishing cabins in the Adirondacks, and dreams of a solo pilgrimage to the Nürburgring in Germany to test their driving skills; they balance structured itineraries with occasional spontaneous detours
    to keep the journey engaging.
  culinary: Andrew Stewart, a competent home cook with a penchant for hearty, protein‑rich meals, often prepares grilled steak seasoned with rosemary, garlic, and smoked paprika, pairs it with homemade
    mac and cheese featuring sharp cheddar and a crunchy breadcrumb topping, experiments with sous‑vide techniques for precise temperature control, and sometimes indulges in fast‑food burgers as a stress‑relief
    treat; they view cooking as a methodical hobby that satisfies both their practical and creative sides.
  core: Andrew Stewart blends a meticulous, competitive mindset with a solitary streak, they channel anxiety into detailed model‑building and spreadsheet perfection, and they over‑organize daily routines
    to the point where social invitations are frequently postponed.
background:
  cultural: Andrew grew up in Joliet, a city in the greater Chicago area with a strong Midwestern working-class heritage. His family background includes German and Irish ancestry, and his upbringing emphasized
    practical values, self-reliance, and community responsibility. The local culture of modesty, punctuality, and a preference for routine has shaped his worldview and reinforced his appreciation for steady,
    reliable work.
attributes:
  skills: '[''Data entry and spreadsheet management'', ''Basic computer hardware troubleshooting'', ''Routine automotive maintenance'', ''Inventory tracking and stock control'', ''Time management and scheduling'',
    ''Logical system analysis'', ''DIY woodworking'']'
  hobbies: '[''Reading non-fiction (mechanics and technology)'', ''Model building (RC cars, LEGO Technic)'', ''Fishing'', ''Woodworking'', ''Strategy video games'', ''Bowling league (small group)'']'
  career_goals: Andrew aims to obtain an ASE certification and build a career as a reliable automotive technician, eventually opening his own garage where he can implement systematic processes. In the meantime,
    he is interested in securing an entry-level IT support position to further develop his technical troubleshooting skills. His long-term ambition is to achieve financial independence through a stable,
    routine-driven profession that allows him to apply his competitive edge and meticulous work ethic.
