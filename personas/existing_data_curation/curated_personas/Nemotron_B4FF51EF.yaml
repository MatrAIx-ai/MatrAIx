  career_goals: Jody plans to obtain nationally recognized personal trainer certifications (such as ACE or NASM) and pursue specialty credentials in sports performance and yoga instruction. She aims to
    open a boutique fitness studio in Floyd County that offers inclusive classes blending movement, mindfulness, and artistic expression. Long‑term, she hopes to launch a community wellness program that
    partners with local schools to address both physical health and stress management, leveraging her interest in art therapy to create innovative, holistic classes.
