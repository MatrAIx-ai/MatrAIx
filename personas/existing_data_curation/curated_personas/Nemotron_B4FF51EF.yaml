personas:
  professional: Jody Leak, a 24‑year‑old group fitness instructor, blends choreographed music‑driven workouts with hand‑drawn visual cues, leveraging their organized, methodical nature and quiet curiosity
    to create immersive classes that keep participants engaged and mindful.
  sports: Jody Leak, a 24‑year‑old hiking enthusiast, joins the Floyd County Trail Runners Club for weekend treks, follows the Kentucky Wildcats basketball team and the Cincinnati Bengals for seasonal excitement,
    and incorporates yoga and body‑weight circuits into personal training to maintain functional strength.
  arts: Jody Leak, a 24‑year‑old watercolorist, draws inspiration from Appalachian folk motifs and the works of artist Andrew Wyeth, often listening to The Avett Brothers and Molly Tuttle while sketching,
    and volunteers to play acoustic guitar at local folk music sessions at the Red Barn Café.
  travel: Jody Leak, a 24‑year‑old explorer, plans trips on a tight budget, favoring nature‑focused adventures like the Blue Ridge Parkway and Great Smoky Mountains, while dreaming of hiking the Colorado
    Rockies and attending a Celtic music festival in Galway, Ireland, using detailed itineraries to calm their worry about logistics.
  culinary: Jody Leak, a 24‑year‑old home cook, enjoys preparing quinoa and kale salads with chickpeas, roasted sweet potatoes, and a drizzle of local honey, masterfully executes a protein‑rich lentil chili,
    but sometimes over‑salts dishes when distracted by playlist choices.
  core: Jody Leak, a 24‑year‑old fitness enthusiast with a penchant for art, quietly channels anxiety into structured workouts, mindful art, and careful budgeting, while occasionally letting worry spark
    impulsive splurges on creative supplies.
background:
  cultural: Jody is a white Appalachian woman from Grethel, Kentucky, whose family roots trace back to the coal‑mining communities of Floyd County. The region’s culture emphasizes self‑reliance, close‑knit
    community ties, and a deep appreciation for the natural environment. Her upbringing involved regular participation in church activities, local craft fairs, and folk music traditions, which have shaped
    her values of humility, hospitality, and perseverance. While she honors these traditions, Jody also embraces contemporary ideas and artistic pursuits, integrating them into her personal and professional
    life.
