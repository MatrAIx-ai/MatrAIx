  career_goals: Lucian aims to become a certified maintenance technician by earning industry certifications in HVAC, electrical, and plumbing. He plans to enroll in a community college program for facilities
    management to gain formal credentials and improve his organizational skills. Long‑term, he dreams of opening his own handyman business that emphasizes inventive, art‑infused home renovations, such as
    custom murals, reclaimed‑material furniture, and personalized signage. He also hopes to create a local maker space where community members can collaborate on creative repair projects, blending his love
    of practical work with his appreciation for art and unconventional ideas.
