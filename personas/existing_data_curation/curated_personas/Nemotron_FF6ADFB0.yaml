personas:
  professional: Haruko Kong, a veteran educational counselor with a STEM background, leverages systematic career assessment, data-driven program design, and compassionate intercultural communication to
    lead small-group workshops, and they now target a senior leadership role to launch a mentorship platform linking underrepresented students with industry mentors.
  sports: Haruko Kong finds fitness in low-impact activities, regularly walking the nearby forest trail with a close friend, participates in a community badminton league each spring, and they are an avid
    fan of the Seattle Seahawks and Seattle Sounders, timing game viewings around their structured weekend routine.
  arts: Haruko Kong practices the traditional tea ceremony and calligraphy as meditative arts, draws inspiration from the minimalist works of Rei Naito and the melodic piano pieces of Ryuichi Sakamoto,
    and they regularly attend local gallery openings featuring contemporary Asian painters.
  travel: Haruko Kong prefers thoughtfully planned trips to serene destinations, has already visited the historic temples of Kyoto, the bamboo forests of Arashiyama, and the coastal cliffs of Cinque Terre,
    and they dream of a slow-poke itinerary through the tea plantations of Taiwan that balances scheduled itineraries with ample quiet reflection.
  culinary: Haruko Kong enjoys cooking authentic Asian dishes, expertly preparing ramen broth with kombu and shiitake, seasoning sushi rice with rice vinegar and yuzu, and they relish crafting a balanced
    bento featuring grilled teriyaki salmon, pickled daikon, and a side of kimchi.
  core: Haruko Kong is a methodical, quietly compassionate planner who balances structured career counseling with serene hobbies, yet they occasionally succumb to spontaneous bonsai purchases that disrupt
    their budget.
background:
  cultural: Haruko was born to East Asian parents—her mother of Japanese descent and her father of Chinese heritage—who immigrated to the United States in the early 1970s. Growing up in a bilingual household,
    she internalized a strong respect for education, collective harmony, and meticulous craftsmanship. The values of perseverance and community support from her cultural roots shape her collaborative counseling
    style and her focus on creating equitable opportunities for all students. Living in Palo Alto, she bridges her heritage with the innovative tech environment, integrating data‑driven approaches into
    her practice while honoring the East Asian emphasis on balance, modesty, and respect for tradition.
attributes:
  skills: '[''Career Assessment'', ''Educational Guidance'', ''Labor Market Trend Analysis'', ''Individual Development Planning'', ''Program Design and Evaluation'', ''Data‑Driven Decision Making'', ''Conflict
    Resolution'', ''Intercultural Communication'', ''Project Management'', ''Facilitation of Small Group Workshops'']'
  hobbies: '[''Japanese tea ceremony'', ''Calligraphy'', ''Bonsai gardening'', ''Reading psychology and educational research books'', ''Solving puzzles (sudoku, crosswords)'', ''Hiking on local trails with
    a close friend'', ''Preparing traditional Asian dishes'', ''Volunteering for STEM outreach programs for middle‑school girls'']'
  career_goals: Haruko aims to advance into a senior leadership role within the school district or a nonprofit organization focused on STEM pathways, such as becoming Director of Student Services or Head
    of Career Development Programs. She aspires to develop a data‑rich mentorship platform that connects underrepresented students with industry professionals, and to champion community partnerships that
    expand access to vocational training. Long‑term, she hopes to author a guidebook on structured career counseling for educators, contributing her practical methodology to the broader field.
