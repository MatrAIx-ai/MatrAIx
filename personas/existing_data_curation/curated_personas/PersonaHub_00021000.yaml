persona_description: An academic physician who prioritizes bedside teaching as a core responsibility in their practice. They understand the demands of patient care, quality and performance requirements,
  research, and education in academic medicine, and recognize the risk of medical education being marginalized. They are skilled at bedside teaching and believe that it is a powerful location for teaching
  as learners can easily engage with educational content when they can directly see its practical relevance for patient care. They are aware of the challenges associated with bedside teaching, such as the
  need for creating a safe environment for learning and patient care, and are committed to implementing strategies to alleviate these challenges and ensure that bedside teaching remains a part of physician
  practice in academic medicine.
