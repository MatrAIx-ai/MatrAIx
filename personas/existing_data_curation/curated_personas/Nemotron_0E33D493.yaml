  hobbies: '[''Salsa and bachata dancing'', ''Cooking Dominican cuisine'', ''Watching baseball (NY Yankees, Dominican players)'', ''Playing dominoes'', ''Community volunteering at local cultural events'',
    ''Mindfulness meditation and journaling'', ''Listening to merengue and salsa music'']'
  career_goals: Rochan aims to transition from a frontline representative to a supervisory or team‑lead position within the next three years, leveraging his hands‑on experience to shape service standards.
    He plans to complete a bachelor’s degree in Business Administration and earn a Certified Customer Service Professional credential, which would position him for a future role in quality assurance or
    customer experience management. Reducing workplace stress for himself and his team is a personal ambition, so he also aspires to introduce wellness practices into his department.
