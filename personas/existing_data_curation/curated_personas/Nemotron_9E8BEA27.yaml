personas:
  professional: Zoila Poblete, a 44‑year‑old business operations specialist, leverages her methodical expertise in process optimization, ERP implementation, and AI‑driven automation while infusing a vivid
    imagination and design‑thinking flair inspired by her love of abstract painting and salsa, steering cross‑functional teams toward operational excellence even as they secretly fret over every milestone.
  sports: Zoila Poblete stays fit by combining weekly salsa dancing, Saturday morning volleyball with a local co‑ed league, and regular yoga, while they cheer on the Miami Heat, Miami Marlins, and Inter Miami CF,
    using the rhythmic energy of dance to power through each season.
  arts: Zoila Poblete expresses her creativity through abstract canvas work, frequent visits to contemporary galleries featuring artists like Yayoi Kusama and Banks & Marble, and immersing herself in live
    Latin jazz sessions that echo the timeless sounds of Buena Vista Social Club, which together shape her vibrant identity, and they often translate the music’s improvisational spirit into innovative business
    solutions.
  travel: Zoila Poblete prefers meticulously planned cultural trips, often booking week‑long itineraries to the vibrant street festivals of Cartagena or the tango salons of Buenos Aires, while they balance
    family responsibilities and a modest travel budget that still allows occasional weekend escapes to Key West for seaside relaxation.
  culinary: Zoila Poblete, an enthusiastic home chef, perfects classic dishes like ropa vieja, tostones, and arroz con pollo while experimenting with fusion twists such as a coconut‑lime mojo glaze on pork,
    and they delight in pairing each meal with fresh mint mojitos and tropical fruits like mango and papaya.
  core: Zoila Poblete balances a disciplined, data‑driven career with a restless artistic soul, often staying up late to perfect a new painting or recipe, while they tend to over‑worry, turning routine
    checklists into nightly anxiety rituals.
background:
  cultural: Born to Cuban immigrants in Miami, Zoila grew up in a bilingual household where Spanish and English intertwined daily. Her family traditions include celebrating Cuban holidays such as Noche
    de San Juan, enjoying music from the Buena Vista Social Club, and preparing classic dishes like ropa vieja, arroz con pollo, and tostones. She remains actively involved in the vibrant Cuban diaspora
    community—participating in cultural festivals, supporting local Cuban‑owned businesses, and maintaining strong ties with extended family across Florida and Havana. This cultural foundation informs her
    collaborative, family‑oriented values, love of rhythm and dance, respect for resilience and hospitality, and her commitment to giving back to the community.
