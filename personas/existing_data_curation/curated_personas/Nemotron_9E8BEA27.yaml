  career_goals: Zoila aims to progress to senior leadership, such as Director of Operations or Vice President of Operations, within the next five years, focusing on digital transformation, AI‑driven process
    automation, and embedding a culture of creativity and inclusion across the organization. She intends to champion diversity initiatives, mentor emerging talent—particularly within the Cuban‑American
    and broader Latino community—and eventually launch her own consultancy that helps minority‑owned businesses achieve operational excellence. Additionally, she aspires to become a thought leader by speaking
    at industry conferences, publishing articles on integrating artistic thinking into business operations, and maintaining a balanced, low‑stress lifestyle through mindful work practices.
