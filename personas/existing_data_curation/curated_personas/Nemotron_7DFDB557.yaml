  career_goals: Adrian dreams of becoming an astronaut who explores the stars, inspired by picture books about space and a recent field trip to the Maryland Science Center. He also imagines himself as a
    professional soccer player, practicing dribbles with friends at the local park. Occasionally, he says he wants to be a cartoonist, sketching his own comic characters and sharing them with classmates.
    These ambitions reflect his curiosity about the world, love for active group activities, and appreciation for visual storytelling.
