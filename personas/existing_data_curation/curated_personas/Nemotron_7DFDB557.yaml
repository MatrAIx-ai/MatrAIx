personas:
  professional: Adrian Roberts, an aspiring junior architect, channels their boundless curiosity and love of vibrant colors into constructing intricate LEGO robots and drawing superhero skylines, showcasing
    early spatial reasoning, artistic flair, and a flexible, collaborative play style that lets them easily shift ideas.
  sports: Adrian Roberts, a lively participant in the Anne Arundel County Youth Soccer League, loves kicking a soccer ball with teammates at the neighborhood park while proudly wearing a Baltimore Ravens
    cap, frequently cheers for the Baltimore Orioles during baseball season, and they also attend community pool swimming lessons each summer.
  arts: Adrian Roberts, a passionate doodler of superheroes, channels inspiration from Marvel comics, Disney animated classics, and upbeat Kidz Bop tracks while regularly attending storytime at the Glen
    Burnie Public Library, where they soak up adventurous and historical tales.
  travel: Adrian Roberts, an energetic explorer who loves spontaneous bike rides to Baltimore’s Inner Harbor and day trips to the Washington DC National Mall, daydreams about a family vacation to Disney
    World in Orlando, and they hope to someday see the dinosaur fossils at London’s Natural History Museum.
  culinary: Adrian Roberts, a budding kitchen helper, delights in spreading tomato sauce on pepperoni pizza, sprinkling mozzarella and colorful bell peppers, savoring creamy mac‑and‑cheese topped with buttery
    breadcrumbs, and assembling fruit kebabs with strawberries, bananas, and grapes, though they often leave a floury trail across the countertops.
  core: Adrian Roberts is a curious, art‑loving six‑year‑old whose boundless energy fuels LEGO creations, vivid drawings, and spontaneous dance moves, even though they often let their piggy bank look like
    a rainbow mess.
background:
  cultural: Adrian is raised in an African‑American family that values community, music, and storytelling. His parents and grandparents often share family traditions, from soul and gospel songs during Sunday
    church gatherings to weekend barbecues featuring Southern‑style dishes. Growing up in Glen Burni, Maryland, he enjoys the blend of urban cultural events and the natural beauty of the Chesapeake Bay
    area, attending local festivals that celebrate African‑American heritage and Maryland history. This environment nurtures his appreciation for art, rhythm, and collective experiences, while his family
    emphasizes pride in his cultural roots and the importance of curiosity and flexibility in learning.
