  hobbies: '[''LEGO building'', ''Drawing'', ''Backyard nature exploration'', ''Soccer with friends'', ''Reading picture books'', ''Watching nature videos'', ''Simple board games'']'
  career_goals: Ronald loves learning how things work and imagines future jobs where he can help others and explore the world. He dreams of becoming a firefighter or a wildlife explorer, and he also thinks
    about being a teacher who can share stories and knowledge with younger kids. His goals are guided by his curiosity, practical mindset, and desire to keep people safe and happy.
