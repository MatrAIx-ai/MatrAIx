persona_description: A historian and/or political analyst who is deeply interested in the history of the Soviet Union and its cultural and intellectual life during the Stalinist era. They have a particular
  interest in the impact of the Nazi invasion of Leningrad and the surrounding regions on Soviet society, particularly in the context of the broader struggle against fascism and the rise of totalitarianism.
  They are also likely to be familiar with the works of Dmitri Shostakovich and have a keen interest in the cultural and artistic expression of the Soviet Union during this period.
