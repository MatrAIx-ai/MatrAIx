personas:
  professional: Stephanie Gutierrez, a 16‑year‑old budding event coordinator, leverages their knack for informal group logistics, calm resilience, and love of community clean‑ups to plan school dances and
    neighborhood gatherings while eyeing a part‑time role at a local coffee shop to sharpen their hospitality skills.
  sports: Stephanie Gutierrez skates regularly at the Seattle Center Skate Park, hikes the trails of Discovery Park in summer, supports the Seattle Kraken and Seattle Seahawks, and occasionally joins a
    youth ultimate frisbee league, where they combine a love of outdoor movement with team spirit.
  arts: Stephanie Gutierrez curates indie playlists featuring Mitski, Tame Impala, and local Seattle acts, attends live shows at The Crocodile and Neumos, creates TikTok DIY craft videos, and reads graphic
    novels like 'Saga' and 'Ms. Marvel' to fuel their creative side.
  travel: Stephanie Gutierrez enjoys spontaneous weekend trips to nearby destinations such as Olympic National Park, Portland’s food carts, and once dreamed of attending Oktoberfest in Munich and the St.
    Patrick’s Day parade in Dublin, favoring budget‑friendly travel with friends and a flexible itinerary that they plan on the fly.
  culinary: Stephanie Gutierrez delights in cooking simple dishes like salmon poke bowls, avocado toast, and homemade ramen, uses fresh Pike Place fish, oat milk, and locally sourced kale, and frequently
    shares quick recipe videos on TikTok showing their step‑by‑step process.
  core: Stephanie Gutierrez is a 16‑year‑old skate‑savvy community organiser who balances a laid‑back love of indie music and TikTok DIY with a surprisingly structured drive to turn their passion for inclusive
    events into a lifelong career.
background:
  cultural: Stephanie was raised in a middle‑class family in Seattle’s Northgate neighborhood. Her parents are of German and Irish descent, and the household blended traditional European customs—such as
    celebrating Oktoberfest and St. Patrick’s Day—with the progressive, environmentally conscious ethos of the Pacific Northwest. Growing up, she was exposed to Seattle’s multicultural vibe, attending community
    festivals, visiting the Seattle Art Museum, and participating in school‑linked multicultural programs. The family’s values emphasize community involvement, respect for nature, and inclusivity, which
    have shaped Stephanie’s outlook and her desire to contribute positively to her city’s cultural fabric.
