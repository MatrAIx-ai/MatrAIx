  career_goals: Stephanie aims to complete her GED within the next year and enroll in a community college program focused on hospitality or event management. Her short‑term ambition is to secure a part‑time
    role at a local community center or a Seattle coffee shop where she can hone her customer service and team‑leadership skills. Long‑term, she dreams of becoming a community events director, curating
    inclusive festivals and public gatherings that celebrate Seattle’s diverse culture and environmental values. She envisions leveraging her calm resilience to manage high‑pressure situations and her sociable
    nature to foster community engagement, eventually leading a nonprofit organization dedicated to youth empowerment through arts and outdoor activities.
