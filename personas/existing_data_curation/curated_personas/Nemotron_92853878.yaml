  hobbies: '[''basketball'', ''automotive repair'', ''grilling and cooking soul food'', ''home improvement projects'', ''gardening'', ''church choir and community service'', ''reading biographies and self‑help
    books'', ''watching Chicago Bulls and Blackhawks'', ''listening to hip‑hop and R&B'']'
  career_goals: Thomas aims to advance from hands‑on material mover to a supervisory and eventually managerial role within the next five years. In the short term, he plans to obtain a Lean Six Sigma Yellow
    Belt and complete an OSHA trainer certification to strengthen his safety leadership. He intends to enroll in a part‑time bachelor’s program in supply‑chain management, building on his associate’s degree,
    with the goal of graduating within three years. With the additional credentials, he will apply for a shift‑supervisor position at his current employer, focusing on improving dock efficiency and staff
    development. Over the longer term, Thomas envisions becoming a warehouse manager, overseeing multiple facilities and implementing lean inventory practices. He also has a parallel ambition to launch
    a small, family‑owned moving service that leverages his expertise in freight handling and his network in the Frankfort area, providing a stable supplemental income and a legacy for his children.
