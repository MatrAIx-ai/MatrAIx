personas:
  professional: Georgina Rivera, a veteran residential and small‑business cleaning specialist, blends three decades of deep‑cleaning expertise with a structured yet flexible routine, leveraging bilingual
    communication, eco‑friendly techniques, and a competitive drive to mentor staff and outpace larger firms.
  sports: Georgina Rivera stays active by dancing salsa and cumbia at the community hall three nights a week, participates in the local walking club that meets for sunrise strolls along the Rio Grande,
    cheers on the Texas Rangers in spring and the Dallas Cowboys in fall, and enjoys occasional friendly matches with the Laredo Heat women's soccer team.
  arts: Georgina Rivera immerses herself in the vibrant sounds of Selena and Vicente Fernández, watches classic telenovelas starring Thalía and Fernando Colunga, indulges in mystery novels by Agatha Christie,
    and collects folk art prints inspired by Frida Kahlo, finding inspiration for her own cooking and community gatherings.
  travel: Georgina Rivera prefers group‑oriented road trips that blend cultural festivals and family visits, regularly drives to San Antonio’s River Walk and the historic town of San Miguel de Allende,
    dreams of a pilgrimage to Oaxaca’s Day of the Dead celebrations, and occasionally plans low‑budget weekend getaways to the Texas Hill Country for wine tasting and scenic hikes.
  culinary: Georgina Rivera, an accomplished home chef, expertly crafts tamales, pozole, and mole using fresh herbs from her garden such as cilantro, epazote, and oregano, delights in creating layered salsas
    with roasted tomatillos and chipotle, and balances her love for traditional recipes with occasional experiments like quinoa‑filled enchiladas.
  core: Georgina Rivera is a spirited, structure‑loving yet adaptable community leader who turns every cleaning job into a dance of efficiency, fiercely champions local women, and secretly hoards extra
    salsa jars for midnight snack raids.
background:
  cultural: Georgina was born into a Mexican‑American family in Laredo, Texas, where she grew up bilingual and immersed in both Mexican traditions and border‑city culture. Catholic faith, strong family
    ties, and community celebrations such as Día de los Muertos and Charro Days have shaped her values. She maintains a deep connection to Mexican music, dance, and cuisine, which she proudly shares through
    cooking and social gatherings. Her cultural heritage informs her work ethic, hospitality, and commitment to supporting neighbors, reinforcing a sense of communal responsibility and generosity.
