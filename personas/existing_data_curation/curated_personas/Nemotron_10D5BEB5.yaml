  career_goals: Georgina aims to formalize her expertise by earning a Certified Professional Cleaner credential within the next year. This certification will support her plan to launch a modest, locally‑owned
    cleaning service that offers flexible schedules and competitive pricing for families and small businesses in Laredo. She aspires to employ and train other women from her community, fostering a supportive
    work environment while maintaining a sharp edge against larger firms. Long‑term, she seeks financial stability for her retirement, the ability to fund educational scholarships for her grandchildren,
    and to expand her services to include eco‑friendly cleaning options.
