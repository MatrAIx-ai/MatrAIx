  career_goals: As he approaches retirement, Caleb intends to transition into a consulting role where he can mentor emerging construction managers and codify his best‑practice knowledge into a published
    guide. He plans to earn a LEED AP credential to champion energy‑efficient building methods on regional projects, and to lead a flagship community‑center renovation that showcases zero‑waste construction.
    Additionally, he aims to secure a succession plan for his current crew, serve on the board of the local Builders Association, and establish a scholarship for students pursuing STEM‑focused construction
    studies.
