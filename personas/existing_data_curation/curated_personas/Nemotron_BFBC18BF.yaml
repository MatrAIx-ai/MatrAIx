  hobbies: '[''Fishing'', ''Deer and waterfowl hunting'', ''Woodworking'', ''Classic car restoration'', ''Reading trade magazines'', ''Listening to classic rock music'', ''Participating in community clean‑up
    events'', ''Veterans shooting club'']'
  career_goals: Henrique aims to secure a supervisory or lead‑assembler position within the next two years, leveraging his extensive hands‑on knowledge to guide shift teams and ensure consistent quality.
    He is pursuing certification as a Certified Welding Inspector (CWI) and plans to complete an OSHA safety trainer course to broaden his qualifications. A primary ambition is to achieve a more predictable
    schedule that reduces overtime, allowing him to focus on saving for retirement and mitigating the stress that has accompanied past deadline pressures. Ultimately, he hopes to transition into a maintenance‑technician
    or training role where he can mentor younger workers while maintaining a steadier work‑life balance.
