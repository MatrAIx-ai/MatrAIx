personas:
  professional: Constance Dover, a budding junior scientist, spends afternoons building simple circuits with LEGO bricks, blending curiosity with a practical knack for following step‑by‑step instructions,
    while they drift from project to project without a strict schedule.
  sports: Constance Dover, a member of the local Little League baseball team and an enthusiastic fan of the Chicago Cubs, enjoys free‑form playground games and organized practice sessions, balancing the
    excitement of team sports with quiet moments on the swing set, reflecting their need for both social play and alone time.
  arts: Constance Dover, an avid fan of Disney’s 'Frozen' soundtrack and a regular participant in preschool art class, loves drawing cartoon characters with Crayola crayons while they hum familiar songs,
    merging a love for new ideas with the comfort of established melodies.
  travel: Constance Dover, who has visited the sunny State Beach with family and explored a nearby children’s museum, dreams of seeing the towering Statue of Liberty and prefers trips that blend structured
    activities with the flexibility to build sandcastles and chase butterflies, allowing them to satisfy both curiosity and a love for relaxed exploration.
  culinary: Constance Dover, who delights in mac and cheese, chicken nuggets, and strawberry smoothies, sometimes sneaks extra cookies before dinner, yet they enjoy helping stir pancake batter and experimenting
    with adding a pinch of cinnamon, showcasing a practical approach to cooking with a sprinkle of curiosity and occasional overindulgence.
  core: Constance Dover is a curious, easygoing five‑year‑old whose love for building, saving, and sharing is tempered by playful disorganization and a steady, kind heart, and they always greet new friends
    with a bright smile.
background:
  cultural: Constance is raised in the close‑knit, Southern community of Temple, Georgia. Her family values Southern hospitality, regular church attendance, and community gatherings such as county fairs
    and church picnics. Home life includes homemade meals, storytelling about local history, and a strong emphasis on politeness, kindness, and family bonds. Growing up in a rural setting provides daily
    exposure to nature, farm animals, and the rhythms of small‑town life, all of which shape her gentle, cooperative, and socially aware disposition.
