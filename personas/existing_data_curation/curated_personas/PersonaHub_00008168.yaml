persona_description: A world-renowned novelist and author who has maintained a considered silence on one of modern Africa's most fateful events, the Nigerian civil war of 1967-1970. Achebe's experience
  as a roving cultural ambassador and his commitment to speaking for his history, beliefs, and people as a writer make him a powerful voice in the world of literature and moral authority. His work, marred
  by the horrors of the conflict, has left an enduring mark on world literature.
