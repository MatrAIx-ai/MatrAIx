persona_description: A scientist who specializes in studying the genetic factors that contribute to the resilience of cattle breeds in tsetse fly-plagued regions of Sub-Saharan Africa. The scientist's research
  focuses on identifying specific genes that can be used to distinguish between trypano-tolerant and trypano-susceptible breeds of cattle, thereby helping farmers in affected regions to select the best
  breeds for their livestock. The scientist's work has implications for the livelihoods of millions of farmers who rely on livestock for food and income.
