personas:
  professional: Elsa Salcedo, a 37‑year‑old retail operations specialist, blends a data‑driven, methodical approach to staff scheduling and performance coaching with an assertive, compassionate leadership
    style that balances curiosity for new merchandising tactics with a practical focus on hitting sales targets and ensuring regulatory compliance.
  sports: Elsa Salcedo channels her love of rhythmic movement into weekly salsa lessons and occasional beach volleyball matches with the Miami Beach Volleyball Club, while cheering for the Miami Heat in
    the NBA and the Miami Dolphins in the NFL as part of a balanced fitness routine that mixes cardio walks along the shoreline with seasonal strength‑training classes.
  arts: Elsa Salcedo nurtures her creative side by exploring street photography inspired by Vivian Maier, attending live salsa performances featuring music by Celia Cruz, and curating a modest home gallery
    of Frida Kahlo prints, all while channeling the same disciplined curiosity that drives her retail analytics into her artistic pursuits.
  travel: Elsa Salcedo prefers meticulously planned weekend getaways that blend cultural immersion—such as past visits to Havana and Cartagena—with rejuvenating beach breaks in the Florida Keys, while dreaming
    of longer escapes to Barcelona’s culinary scene and Bali’s serene rice terraces when their MBA schedule permits.
  culinary: Elsa Salcedo, an avid home cook, skillfully prepares traditional dishes like ropa vieja and pastelitos using aromatic sofrito, ripe plantains, and a dash of cumin, yet balances this expertise
    with a love for experimenting at Miami’s eclectic eateries, where they often order sushi rolls with pickled ginger and avocado.
  core: Elsa Salcedo navigates life as a methodical retail leader who combats acute anxiety with yoga and occasional impulse buys of kitchen gadgets, all while documenting Miami’s street life through their
    ever‑growing collection of candid photographs.
background:
  cultural: Elsa is a first‑generation Cuban‑American raised in Miami’s vibrant Little Havana community. She grew up bilingual, speaking Spanish at home and English in school, and she embraces both Cuban
    and American cultural traditions. Family gatherings centered around music, food, and storytelling have shaped her values of community, resilience, and hospitality. She celebrates Cuban holidays such
    as Carnaval and Nochebuena, and she stays connected to her heritage through music, dance, and food. This bicultural perspective informs her inclusive leadership style and her appreciation for the diverse
    customer base in Miami.
