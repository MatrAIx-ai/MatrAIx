  career_goals: She aims to advance to a district manager role within the next five years, overseeing multiple store locations and shaping regional sales strategy. To support this, Elsa plans to enroll
    in a part‑time MBA program focused on operations management and leadership. She is also eager to develop a mentorship program for entry‑level retail staff, leveraging her experience to foster a supportive
    work culture that prioritizes mental‑wellbeing. Long‑term, she envisions opening her own boutique that blends contemporary fashion with Cuban cultural motifs, using her business acumen to create a sustainable,
    community‑focused enterprise.
