personas:
  professional: Joleigh Vernon, a veteran research scientist turned STEAM program architect, leverages two decades of quantitative analysis expertise in R, Python, and SPSS to orchestrate interdisciplinary
    projects that blend scientific rigor with artistic expression, while they balance meticulous planning with creative flexibility to keep mentorship workshops running smoothly.
  sports: Joleigh Vernon supports the Philadelphia Eagles and Phillies, hikes the Wissahickon Trail weekly, participates in a local yoga class at the community center, and they treat fitness as a mindful
    complement to their research schedule, preferring low‑impact activities over intense competition.
  arts: Joleigh Vernon frequents the Philadelphia Museum of Art, enjoys intimate productions at the Arden Theatre Company, admires the photography of Ansel Adams and the watercolors of Georgia O’Keeffe,
    and they weave these artistic inspirations into their STEAM workshops, often quoting Carl Sagan’s poetic science.
  travel: Joleigh Vernon has trekked the historic streets of Boston, explored the Amish farms of Lancaster County, and dreams of strolling the galleries of Florence and the cherry blossoms of Kyoto, preferring
    meticulously planned itineraries that balance cultural immersion with the comfort of familiar culinary comforts.
  culinary: Joleigh Vernon delights in cooking seasonal dishes such as heirloom tomato basil pasta, lemon‑rosemary roasted chicken, and Pennsylvania Dutch pretzels, sourcing fresh herbs from their garden
    and savoring a splash of balsamic reduction on strawberries, while they occasionally splurge on artisanal cheese boards during weekend gatherings.
  core: Joleigh Vernon is a 58‑year‑old data‑driven STEAM advocate whose quiet curiosity fuels a lifelong blend of scientific precision, artistic wonder, and community service, even as they juggle a modest
    health regimen and a penchant for indulgent watercolor supplies.
background:
  cultural: Joleigh was born and raised in the greater Philadelphia region, growing up in a middle-class suburban community of Montgomery County. Her family's ancestry includes German and Irish roots, and
    she was raised with an appreciation for the area's historic Quaker emphasis on community service and the broader American traditions of independence, civic engagement, and seasonal celebrations such
    as Thanksgiving and Fourth of July. The local culture, marked by strong public schools, community festivals, and a vibrant arts scene in nearby Philadelphia, has shaped her love for education, volunteerism,
    and the arts. While identifying as a white American, she embraces a multicultural outlook, often participating in neighborhood events that celebrate the diverse heritage of her community.
attributes:
  skills: '[''Data analysis'', ''Statistical programming (R, Python)'', ''SPSS'', ''Microsoft Excel'', ''Technical writing'', ''Project coordination'', ''Laboratory techniques (PCR, chromatography)'', ''Mentoring
    and tutoring'', ''Workshop facilitation'', ''Art integration in STEAM education'']'
  hobbies: '[''Visiting art galleries'', ''Attending small theater productions'', ''Reading popular science, philosophy, and contemporary fiction'', ''Participating in a monthly book club'', ''Hiking the
    Wissahickon Trail'', ''Gardening'', ''Photography'', ''Watercolor painting'', ''Volunteering at the community library (STEM storytime)'', ''DIY craft projects'']'
  career_goals: Her primary ambition is to design and launch a sustainable STEAM outreach program for elementary schools and community centers in Montgomery County, where she can mentor students and integrate
    artistic projects with scientific concepts. She also seeks to offer her analytical expertise as a volunteer data analyst for local non-profits, helping them assess program impact and improve operations.
    To deepen her understanding of educational exhibition design, Joleigh plans to pursue a museum education certificate, enabling her to collaborate with regional art museums on science-themed displays.
    Over the next five years, she envisions becoming a recognized bridge between the scientific and artistic communities, fostering collaborative projects that inspire curiosity, creativity, and social
    harmony. Additionally, she hopes to document her life's journey in a memoir that reflects her love of learning and commitment to service.
