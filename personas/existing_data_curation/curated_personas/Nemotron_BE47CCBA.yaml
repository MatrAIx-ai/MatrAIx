  career_goals: Rene aims to leverage his retail experience into a managerial role that lets him shape store aesthetics and train teams in customer‑centric, art‑inspired merchandising. He plans to obtain
    a retail management certification and a visual merchandising certificate within the next two years. Long‑term, he dreams of opening a small boutique that doubles as a community art space, showcasing
    works by local Black artists and offering a quiet, contemplative environment for customers. He also envisions transitioning into e‑commerce curation for an online platform focused on culturally resonant
    art, allowing him to work remotely and satisfy his preference for solitude while staying engaged with new ideas and creative projects.
