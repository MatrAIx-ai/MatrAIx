  career_goals: Michel aims to transition into a senior leadership role within a regional PMO, targeting a Director of Project Management position that oversees large‑scale infrastructure and resilience
    projects in South Florida. Concurrently, he plans to launch a boutique consultancy focused on sustainable coastal development, securing at least three major contracts within five years. He is committed
    to achieving a Lean Six Sigma Black Belt, mentoring emerging project managers, and publishing thought‑leadership pieces that integrate humanities perspectives into project governance.
