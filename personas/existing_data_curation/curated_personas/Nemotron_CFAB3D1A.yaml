  career_goals: Pedro aims to earn a Certified Heavy‑Equipment Operator credential and transition into a specialized equipment‑maintenance role. He aspires to become a lead trainer for younger operators,
    sharing his practical knowledge and promoting safety culture. Long‑term, he envisions launching a small equipment‑rental or consulting business that emphasizes efficient, eco‑friendly construction practices.
    He also wishes to mentor at‑risk youth through community workshops that teach basic construction skills, thereby giving back to his Salvadoran‑American community.
