  hobbies: '["Photography", "Watercolor Painting", "Woodworking", "Metal Sculpting", "Bluegrass Music", "Attending Art Galleries and Folk Festivals", "Fishing", "Gardening", "Reading Historical Non-Fiction",
    "Community Theatre", "Mindfulness Meditation", "Journaling", "Playing Mandolin"]'
  career_goals: As he approaches retirement, Thomas aims to shift from full‑time boilermaking to a part‑time mentorship role, helping younger workers learn both the technical and artistic aspects of metalworking.
    He hopes to open a small workshop where he can combine his trade expertise with his love for decorative metal sculpture, offering custom pieces to local businesses and community spaces. Additionally,
    Thomas plans to take a few evening courses at the nearby community college to formalize his teaching skills and eventually teach a short‑term “metal arts” class. He also wants to maintain a flexible
    schedule that accommodates his need for downtime and personal well‑being, while building a modest supplemental income that eases the transition into retirement.
