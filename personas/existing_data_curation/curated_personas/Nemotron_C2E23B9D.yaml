  career_goals: While still a preschooler, Ladonna often talks about growing up to be someone who helps others discover the world. She dreams of becoming a teacher who can share new ideas, a veterinarian
    who cares for animals, or an explorer who investigates nature’s wonders. Her ambitions reflect a blend of curiosity (wanting to learn and explore) and practicality (seeing herself in roles that benefit
    her community).
