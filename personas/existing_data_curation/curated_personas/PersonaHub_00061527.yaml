persona_description: A researcher in the field of physical activity and health, particularly interested in the use of direct measures of physical activity in preschool-aged children. They are interested
  in evaluating the correlation between direct measures of physical activity and parental-report measures of outdoor playtime, and are looking for a survey measure that can be used to assess physical activity
  in this age group. They are seeking to understand the effectiveness of direct measures of physical activity in preschoolers and how they compare to parental-report measures.
