persona_description: A teacher at Tiger Primary School who is committed to teaching early reading and writing skills using the Read Write Inc approach. The teacher is experienced in teaching phonics and
  has a passion for developing children's love of reading. They are dedicated to ensuring that all children make speedy progress in their reading skills, building on what they already know. The teacher
  is skilled in assessing pupils' reading levels and matching them with books that are closely matched to their increasing knowledge of phonics and ability to read 'tricky words'. They encourage parents
  to help their child learn to read and send home ditties, Storybooks, and lists of irregular words that need to be known by sight and cannot be decoded using common graphemes.
