  career_goals: He often talks about building tall towers and designing neat spaces, dreaming of becoming an engineer or architect who creates orderly, well-planned structures. He also imagines leading
    a team in organized sports like soccer, where his competitive spirit can shine. In the future, he hopes to work on projects that let him plan, build, and keep everything in perfect order.
