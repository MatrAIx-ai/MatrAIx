persona_description: A historian or a ceramicist interested in the history of English stoneware production, particularly during the eighteenth century, who is fascinated by the stories behind the creation
  of Wedgwood's jasper vases and the development of the neoclassical wave in England. This individual is knowledgeable about the antecedents of the eighteenth century neoclassical wares, the red stonewares
  of the seventeenth century, and the other bodies produced by Wedgwood and his contemporaries. This person is also interested in the detailed research into the more than sixty other potteries concerned
  with the production of these handsome, ornamental and useful stonewares, making this the most comprehensive reference book ever produced on the subject.
