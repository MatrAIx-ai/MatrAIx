  career_goals: Milagros dreams of turning her love for art and imagination into a career as a concept artist and storyteller for video games or children's books. She envisions attending an art academy
    in high school to study illustration and graphic design, eventually earning a degree in visual arts or interactive media. In the long term, she hopes to create inclusive, emotionally resonant characters
    that help young people navigate feelings of anxiety and sadness, and she aspires to mentor other budding artists in her community.
