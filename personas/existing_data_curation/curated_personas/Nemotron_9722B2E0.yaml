personas:
  professional: Milagros Figueroa is a budding visual storyteller who fills sketchbooks with vibrant characters, crafts short sci‑fi narratives, and builds interactive tales on Scratch, showing methodical
    planning and a flair for imaginative problem‑solving.
  sports: Milagros Figueroa plays forward for the Coastal Kids Soccer Club, dazzles friends with salsa and hip‑hop dance moves at community festivals, and cheers for the Houston Astros and Miami Dolphins,
    combining regular practice with a love for team spirit and weekend beach runs.
  arts: Milagros Figueroa dives into fantasy worlds inspired by Studio Ghibli films, reads Neil Gaiman and J.K. Rowling, sketches scenes echoing the whimsical style of Hayao Miyazaki, and draws motivation
    from musicians like Taylor Swift and Bad Bunny while curating a personal playlist for creative flow.
  travel: Milagros Figueroa loves day trips to nearby Gulf Coast beaches, plans future family vacations to the coral reefs of Belize and the historic streets of Kyoto, prefers a mix of structured itineraries
    with spontaneous beach explorations, and saves allowance pennies for travel fund jars.
  culinary: Milagros Figueroa enjoys whipping up avocado toast topped with lime zest, assembling mango‑lime salsa for grilled shrimp tacos, and blending fruit‑rich smoothies with banana, strawberry, and
    coconut milk, displaying an intermediate cooking skill that balances quick snacks with occasional family‑style meals.
  core: Milagros Figueroa is an imaginative, organized twelve‑year‑old who channels vivid storytelling into art and code, navigates anxiety with mindfulness, and balances a lively social life with disciplined
    savings and creative hobbies.
background:
  cultural: Milagros comes from a Mexican‑American family in Corpus Christi, where Spanish is spoken at home and English at school. Her upbringing blends traditional celebrations like Día de los Muertos
    and Cinco de Mayo with the coastal Texan lifestyle, fostering a strong sense of community and family pride. She enjoys backyard barbecues, tamales, and listening to regional música norteña, while also
    embracing the diverse cultural mosaic of Nueces County. These influences shape her vivid imagination, her bilingual communication skills, and her commitment to creating art that reflects both her heritage
    and the broader world.
