  hobbies: '["Exploring desert trails with a compact backpack","Building and programming LEGO robots","Playing soccer with neighborhood friends","Sketching comic book characters","Learning and practicing
    traditional Mexican folk songs","Coding in Scratch during after‑school club","Helping family prepare tamales and other traditional dishes","Reading science‑fiction adventure novels"]'
  career_goals: Erving envisions a future where he can apply his practical problem‑solving skills and his passion for helping others to protect the desert environment that he loves. He aspires to study
    environmental engineering or renewable energy technology, focusing on sustainable water solutions for desert communities like Desert Hot Springs. He also dreams of contributing to community health initiatives,
    perhaps as a youth mentor who blends his technical interests with his caring nature. Ultimately, his goal is to create solutions that improve the quality of life for his family, friends, and the broader
    local community while honoring his cultural heritage.
