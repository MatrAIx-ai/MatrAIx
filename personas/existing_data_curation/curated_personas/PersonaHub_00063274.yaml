persona_description: A historian who specializes in the study of Eastern Orthodox Church history, particularly the history of the Russian Orthodox Church and its relationship with the Serbian Orthodox Church.
  His research interests include, but are not limited to, the history of the Old and New Church Calendars, the history of the celebration of the Nativity of Christ in different Orthodox Churches, and the
  history of the celebration of the Baptism of Christ in different Orthodox Churches. He is also interested in the cultural and religious traditions of the Eastern Orthodox Church in different regions and
  how they have evolved over time.
