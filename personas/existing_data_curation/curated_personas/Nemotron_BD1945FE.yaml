personas:
  professional: Maegan Sier is a high‑school equivalency student who volunteers at the local animal shelter, honing their empathetic listening and detail‑oriented care while preparing to enroll in a Certified
    Nursing Assistant program, where their love of routine and quiet environments will shape a dependable, patient‑focused approach to healthcare.
  sports: Maegan Sier enjoys gentle fitness routines like early morning walks with their camera and weekly yoga sessions at the Downtown Yoga Studio, while avidly supporting the New York Knicks in basketball,
    following the New York Mets during baseball season, and cheering for the NYC FC in soccer.
  arts: Maegan Sier immerses themselves in classic literature by Tolkien and Austen, knits while listening to indie folk artists such as The Lumineers, Bon Iver, and Sufjan Stevens, and occasionally watches
    films by directors like Greta Gerwig to fuel their artistic imagination.
  travel: Maegan Sier prefers low‑key, nature‑focused trips, often planning weekend getaways to the Hudson Valley’s waterfalls, day hikes in the Adirondack Mountains, and a school‑organized cultural exchange
    to Edinburgh, Scotland, balancing quiet exploration with limited budget constraints.
  culinary: Maegan Sier loves baking chocolate‑chip cookies, lemon‑blueberry cupcakes, and herb‑infused focaccia, often incorporating fresh rosemary, thyme, and garden‑grown zucchini, while their modest
    kitchen skills enable them to share these treats with neighbors and at local farmers’ markets.
  core: Maegan Sier is a quiet, routine‑loving teen who blends solitary crafts, thoughtful caregiving, and a sweet tooth into a gentle, if slightly disorganized, pursuit of a caring career and modest bakery
    dream.
background:
  cultural: Maegan was raised in Marysville, Ohio, a small Midwestern town in Delaware County. Her family has deep roots in the region, with ancestry that includes German and Irish heritage typical of many
    white Ohio households. Growing up in a close‑knit community, she was exposed to the values of practicality, modesty, and self‑reliance that characterize the heartland. Local traditions such as county
    fairs, high school sports, and church gatherings shaped her sense of belonging. Though her family attends a small Protestant church, the emphasis has always been on kindness, cooperation, and helping
    neighbors. These Midwestern cultural influences have reinforced her preference for routine, her cooperative nature, and her desire for a dependable, low‑stress lifestyle.
