  career_goals: Maegan aims to earn a high‑school equivalency credential within the next year and then enroll in a Certified Nursing Assistant (CNA) program at a nearby community college, seeking a stable,
    routine‑oriented role where she can help others in a healthcare setting. She values a predictable work schedule and hopes to work in a local assisted‑living facility or clinic where her kindness and
    attention to detail can be applied. In the longer term, she dreams of turning her love of baking into a modest home‑based bakery, selling homemade treats at community events and farmers’ markets while
    maintaining a flexible, low‑stress lifestyle.
