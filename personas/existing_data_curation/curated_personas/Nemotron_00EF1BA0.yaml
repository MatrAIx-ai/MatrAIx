  hobbies: '[''Reading classic literature and historical non-fiction'',''Woodworking and furniture making'',''Gardening (vegetables and herbs)'',''Playing chess'',''Volunteering for community theater (set
    design and lighting)'',''Local history research'',''Cooking traditional Midwestern recipes'',''Hiking local trails'']'
  career_goals: Looking ahead, Roy aims to transition into a district‑level instructional coaching role where he can shape curriculum frameworks that blend structure with creative flexibility. He plans
    to author a practical guide for humanities teachers on balancing rigorous content sequencing with student‑centered inquiry. Over the next five years, he hopes to serve as department chair or curriculum
    specialist, mentor emerging educators, and spearhead community‑based adult‑learning programs that promote lifelong education and civic engagement. As he approaches retirement, Roy is interested in leaving
    a lasting impact by establishing a scholarship for students pursuing arts and humanities studies in his region.
