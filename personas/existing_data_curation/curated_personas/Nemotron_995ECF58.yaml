  career_goals: Eduardo dreams of a future where he can explore the world and help others. He is fascinated by marine life and hopes to become a marine biologist who studies ocean ecosystems. At the same
    time, his love for building things fuels an ambition to study engineering and design eco‑friendly inventions. He also imagines playing soccer at a professional level or coaching younger kids in his
    community. His long‑term goal is to combine his scientific curiosity, creative problem‑solving, and community spirit to make a positive impact on both the environment and the people around him.
