personas:
  professional: An aspiring game designer named Eduardo Melendez, who spends afternoons building LEGO structures and coding simple Scratch games, channels their curiosity and practicality into prototypes
    that blend detailed planning with spontaneous creativity.
  sports: Eduardo Melendez plays forward for the Providence Youth Soccer Club, idolizes the New England Revolution's attacking style, and spends weekends sprinting across the local park's grass with friends
    while balancing organized practice drills with spontaneous pick-up games.
  arts: Eduardo Melendez sketches vibrant cartoon characters inspired by the humor of Adventure Time, grooves to the upbeat rhythms of Juan Luis Guerra's merengue tracks alongside family, and devours adventure
    novels by Rick Riordan, weaving these artistic passions into daily imagination.
  travel: Eduardo Melendez dreams of backpacking through the gentle reaches of the Appalachian Trail after school, has already explored Narragansett Beach during summer and visited the historic Freedom
    Trail in Boston, and keeps a scrapbook of family trips to Orlando's theme parks, balancing adventure cravings with family-approved itineraries.
  culinary: Eduardo Melendez often assists in the kitchen, expertly mixing rice, beans, and fried plantains for family meals while mastering simple pancake flips and savoring the sweet tang of mango salsa,
    reflecting a playful yet focused culinary curiosity.
  core: Eduardo Melendez blends relentless energy and a love for building - whether with LEGO bricks, Scratch code, or soccer drills - while occasionally neglecting bedtime for the thrill of instant gratification.
background:
  cultural: Eduardo grows up in a bilingual Dominican‑American household in Providence, Rhode Island. At home, Spanish is spoken alongside English, and family gatherings often feature Dominican celebrations
    like Independence Day and vibrant music such as merengue and bachata. Traditional foods—mangú, pastelitos, and guava pasteles—are staples during weekends, and his parents involve him in cooking, reinforcing
    a sense of cultural pride. While he embraces his heritage, he also participates fully in the broader community, attending a diverse public school, joining local youth sports leagues, and exploring the
    city’s cultural festivals. This blend of Dominican customs and American experiences shapes his identity, fostering respect for family, community, and multiculturalism.
