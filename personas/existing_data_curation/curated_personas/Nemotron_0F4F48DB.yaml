personas:
  professional: Luis Riverarivera is an aspiring young robotics engineer and digital illustrator who channels his meticulous organization and competitive drive into building and programming LEGO‑based autonomous
    bots while rigorously documenting each design iteration in detailed project logs, and they frequently merge their sketches of sci‑fi characters with functional prototypes.
  sports: Luis Riverarivera plays forward for the local youth soccer club Riverside FC, trains twice a week with a smartwatch‑guided fitness routine, they passionately root for FC Barcelona’s youth development
    program, and they unwind by strategizing in FIFA and Rocket League matches that sharpen their tactical thinking.
  arts: Luis Riverarivera spends evenings sketching original sci‑fi characters while vibing to Bob Marley’s reggae and Eddie Palmieri’s Latin jazz, they draw inspiration from Studio Ghibli’s Hayao Miyazaki
    and digital artist Loish, and they regularly submit fan art to online contests, where their critical eye pushes them to experiment beyond mainstream styles.
  travel: Luis Riverarivera has explored historic colonial towns on his island home and hopes to visit Tokyo’s Akihabara district for anime culture and Barcelona’s architectural wonders, they meticulously
    plan trips with budget spreadsheets, balance school constraints with family time, and they crave a blend of adventure and structured itineraries.
  culinary: Luis Riverarivera loves cooking family‑passed recipes like mofongo, arroz con gandules, and tostones, they blend intermediate cooking skills with a curiosity for flavors, often adding fresh
    cilantro and lime to experiment, and they sometimes burn toast when distracted by a new robotics project.
  core: Luis Riverarivera is a hyper‑curious, ultra‑organized 13‑year‑old who fuses robotics, digital art, and soccer into a disciplined, competitive routine, yet they can over‑think details and hoard spare
    change for future projects.
background:
  cultural: Luis was raised in a Puerto Rican household where Spanish is spoken daily and cultural traditions such as bomba y plena music, family gatherings, and dishes like arroz con gandules are central
    to his upbringing. Living in Groton, MA, he balances this island heritage with the New England environment, attending a diverse public middle school. His family places a strong emphasis on education,
    hard work, and staying connected to their roots, encouraging him to celebrate holidays like Three Kings Day while also exploring broader artistic and scientific interests.
