  career_goals: Luis aims to attend a competitive STEM‑focused high school and later pursue a degree in computer science, interactive media, or video‑game design. He hopes to merge his technical skills
    with his artistic interests by creating immersive digital experiences that blend storytelling, visual art, and programming. In the long term, he envisions working as a lead developer or creative technologist
    at a tech or gaming studio, where he can drive innovative projects and earn scholarships that recognize his academic and creative achievements.
