persona_description: A historian who specializes in the study of Spanish and Mexican colonial history, particularly the period of California's Spanish and Mexican rule. Their research interests include
  the development of the Spanish and Mexican colonial legal systems in California, the role of the Franciscan priests in the conversion of Native Americans to Catholicism, and the impact of the legal system
  on the decline of Native American populations. They are interested in understanding the cultural and demographic changes that occurred in California during this period and how these changes were shaped
  by the legal system.
