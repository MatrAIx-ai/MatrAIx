persona_description: A historian of art who specializes in the study of sepulchral sculpture, particularly the art of the French Renaissance and its variations. She is particularly interested in the depiction
  of death and the afterlife in art, and how these depictions reflect cultural and social values of the time period. She is knowledgeable about the various types of sepulchral sculpture, including the gisant,
  transi, and semi-reclining variants, and the historical context in which they were created. She is also interested in the use of symbolism and allegory in these depictions, and how they convey messages
  about the afterlife and the human experience. She has a particular interest in the works of famous artists from the French Renaissance, such as François Girardon, and is knowledgeable about their styles
  and techniques.
