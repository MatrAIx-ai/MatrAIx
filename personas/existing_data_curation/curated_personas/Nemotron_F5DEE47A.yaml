personas:
  professional: Maria Feldenkreis is a civil engineer in Klamath Falls who blends rigorous structural analysis and GIS‑based site grading with a flair for artistic detail, using AutoCAD Civil 3D to design
    flood‑mitigation projects while also crafting STEM outreach workshops that translate complex engineering concepts into hands‑on learning for local schools.
  sports: Maria Feldenkreis finds balance on the footpaths of the Cascade foothills, logging weekly hikes and occasional trail runs with the Klamath Outdoor Ridge Club, cheers on the Oregon Ducks football
    team on Sundays, follows the Portland Trail Blazers during the NBA season, and supports the local Klamath Falls Gems baseball club during summer evenings.
  arts: Maria Feldenkreis expresses creativity through watercolor studies of basalt cliffs inspired by Monet’s palette, black‑and‑white photography echoing Ansel Adams, sketching modernist architecture
    in the Klamath Art Center, playing Chopin nocturnes and Einaudi’s piano pieces for relaxation, and attending gallery shows featuring local contemporary artist Lena Whitaker.
  travel: Maria Feldenkreis plans travel with methodical itineraries, favoring solo road trips that combine geological curiosity with scenic photography, having explored Crater Lake, the Columbia River
    Gorge, and a weekend in Seattle, they now dream of a summer expedition to Iceland’s volcanic landscapes and a future trek through Patagonia’s Andes, all budgeted around their PE exam study schedule.
  culinary: Maria Feldenkreis enjoys cooking at an intermediate level, favoring farm‑to‑table flavors such as cedar‑plank salmon with sage, wild chanterelle mushroom risotto, and homemade sourdough topped
    with locally foraged berries, often pairing meals with a crisp Oregon pinot noir while occasionally indulging in a meticulously brewed pour‑over coffee during early morning design sessions.
  core: Maria Feldenkreis is a detail‑obsessed civil engineer who channels competitive worry into meticulous project plans, solitary hikes, watercolor sketches, and midnight crossword puzzles, all while
    juggling a passion for piano and a penchant for over‑budgeting art supplies.
background:
  cultural: Maria is a white American of German descent, raised in a modest, middle‑class family in Klamath Falls, Oregon. Her parents — a former elementary teacher and a logger‑turned‑small‑business owner
    — instilled a strong work ethic, respect for the land, and an appreciation for community involvement. German cultural traditions, such as celebrating Oktoberfest and enjoying classic dishes like sauerkraut
    and pretzels, are part of her family’s holiday rituals, while the Pacific Northwest’s emphasis on environmental stewardship and outdoor recreation shaped her lifelong love of hiking and nature. Growing
    up in a region with a rich indigenous history, Maria acknowledges the cultural heritage of the Klamath peoples and supports local efforts to preserve natural waterways. This blend of German discipline,
    Oregonian environmental values, and a commitment to civic service informs both her professional path in public works and her personal pursuits.
attributes:
  skills: '[''Structural analysis'', ''Site grading and drainage design'', ''AutoCAD Civil 3D'', ''Geographic Information Systems (GIS)'', ''Project management'', ''Cost estimating'', ''Construction supervision'',
    ''Regulatory compliance (OSHA, EPA)'', ''Risk assessment'', ''Technical report writing'', ''STEM education outreach'', ''Instructional design'', ''Data analysis'', ''Public speaking'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Sketching architectural details'', ''Visiting art galleries'', ''Playing piano'', ''Reading philosophy and speculative fiction'', ''Birdwatching'',
    ''DIY home renovation'', ''Volunteering for community STEM workshops'', ''Solving puzzles (crosswords, Sudoku)'']'
  career_goals: Motivated by a competitive drive and a deep curiosity for innovative infrastructure, Maria aims to obtain her Professional Engineer (PE) license within the next two years and to lead a major
    water‑resource or flood‑mitigation project in the Klamath Basin. She envisions a senior civil‑engineer role that allows her to integrate artistic elements—such as public‑space sculptures or aesthetic
    bridge designs—into functional projects, reflecting her appreciation for art and unconventional thinking. In the longer term, Maria aspires to a directorship in public works, where she can shape regional
    policy on sustainable design, mentor junior engineers, and expand community‑focused STEM education initiatives. Managing stress and worry, she plans to adopt resilience training and work‑life balance
    strategies to sustain high performance.
