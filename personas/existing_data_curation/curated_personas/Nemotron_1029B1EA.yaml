  career_goals: Brandie aims to progress from her current analyst role to a senior systems architect position within the next five years, where she can lead cross‑functional projects and shape technology
    strategy for regional businesses. She plans to earn a Certified Business Analysis Professional (CBAP) credential and later pursue a master’s degree in information systems to deepen her expertise. Driven
    by her practical curiosity, she is passionate about deploying digital solutions that improve healthcare delivery and education in rural Kentucky. Brandie also aspires to mentor junior analysts, champion
    inclusive tech practices, and eventually take on a leadership role that balances strategic vision with hands‑on problem solving.
