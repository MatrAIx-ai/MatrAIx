personas:
  professional: Mariateresita Heng, a seasoned office operations specialist with a STEM background, leverages advanced Excel, database querying, and a critical-yet-pragmatic mindset to streamline workflows,
    while her sociable, talkative nature turns every staff training into an engaging performance as they mentor emerging managers toward data-driven efficiency, laying groundwork for a part-time consultancy
    ambition.
  sports: Mariateresita Heng, an enthusiastic supporter of the Kansas City Chiefs and Royals who leads a senior walking club through the city's riverfront parks and joins a weekly pickleball league at the
    local community center, treats fitness as a social ritual, using friendly competition and lively conversation to keep daily walks and light-exercise routines engaging.
  arts: Mariateresita Heng, a lively participant in the senior center's improv troupe and an avid admirer of Meryl Streep's filmography, Yo-Yo Ma's cello performances, and the Broadway hit 'Hamilton,' weaves
    her love for storytelling into every dinner party, often quoting favorite non-fiction authors while the playlist swaps between classic jazz standards and contemporary world music.
  travel: Mariateresita Heng, an adventure-leaning traveler who prefers spontaneous itineraries over rigid schedules, spends her retirement weekends exploring the vibrant streets of Hanoi and Bangkok during
    occasional trips to reconnect with family roots, while also savoring short road trips to Santa Fe's art scene and New Orleans' jazz districts, balancing cultural immersion with a modest travel budget.
  culinary: Mariateresita Heng, a seasoned home chef who masterfully layers the aromatic broth of Vietnamese pho with star anise, ginger, and fresh cilantro from her herb garden, and simmers Thai green
    curry using Thai basil, kaffir lime leaves, and coconut milk, treats each dinner party as a theatrical showcase where the menu's precision rivals her data-driven work ethic.
  core: Mariateresita Heng, a sociable spreadsheet wizard who trades meticulous data analysis for spontaneous dinner parties and impromptu improv sketches, balances a competitive streak with a relaxed,
    sometimes disorganized lifestyle, and keeps their 60-year-old self thriving on daily walks, herb gardening, and a strategic retirement portfolio.
background:
  cultural: Mariateresita is a first‑generation American of Vietnamese descent; her parents arrived in the United States as refugees in the late 1970s and settled in the Midwest. Raised in a bilingual household,
    she grew up balancing Vietnamese customs—such as celebrating Tet, honoring ancestors, and preparing communal meals—with Midwestern values of independence and community involvement. While English is
    her primary language, she retains conversational fluency in Vietnamese and regularly participates in the local Vietnamese cultural association in Kansas City, preserving traditions through cooking,
    language lessons for younger members, and attending religious services at a nearby Buddhist temple.
