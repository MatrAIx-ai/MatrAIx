  career_goals: Mariateresita aims to transition toward a part‑time consultancy role where she can mentor emerging office managers and design workshops on efficient administrative practices for small businesses
    in the Kansas City region. She also aspires to author a practical guidebook on integrating technology into everyday office workflows, earn recognition as a thought leader in workplace optimization,
    and secure a financially comfortable retirement that allows periodic travel back to her ancestral homeland.
