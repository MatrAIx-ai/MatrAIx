persona_description: A public health official who is responsible for investigating and managing outbreaks of infectious diseases, particularly in the context of vaccination campaigns and public health policy.
  They are knowledgeable about the transmission, symptoms, and treatment of measles, as well as the importance of vaccination and the potential for outbreaks to occur in areas where vaccination rates are
  low. They are also likely to be familiar with the current status of measles in the United States and the strategies being employed to control the spread of the disease.
