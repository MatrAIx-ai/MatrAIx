  hobbies: '[''gardening'', ''hiking'', ''bird-watching'', ''community potluck hosting'', ''attending food festivals'', ''reading historical biographies'', ''playing saxophone'', ''volunteering at senior
    nutrition programs'']'
  career_goals: Even at 60, Robert aims to transition from daily kitchen leadership to a mentorship and legacy role. He plans to write a cookbook that blends classic family recipes with practical tips for
    home cooks, and to launch a modest bistro with his wife that focuses on locally sourced, seasonal dishes. He also hopes to obtain a Certified Executive Chef (CEC) credential, mentor apprentices, and
    eventually serve as a culinary consultant for restaurant startups in the Phoenix area.
