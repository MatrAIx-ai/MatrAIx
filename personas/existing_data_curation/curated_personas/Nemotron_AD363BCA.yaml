  career_goals: Ana aims to advance to a senior program director role within the next five years, focusing on large‑scale community development and sustainability projects in the Gulf Coast region. She
    is driven to lead initiatives that blend cultural heritage preservation with modern infrastructure, such as coastal resilience programs that involve local Mexican‑American communities. Long‑term, she
    envisions establishing a consultancy that advises public and private sectors on inclusive project design, mentorship for emerging female project managers, and fostering collaborative networks across
    Texas and neighboring states.
