  career_goals: Marie aims to transition from a general office clerk to a supervisory role within the next two years, ideally as an Office Manager at a community‑focused nonprofit where she can leverage
    her organizational talents and compassionate approach to support staff and service users. She plans to earn the Certified Administrative Professional (CAP) credential and to complete a short course
    in nonprofit management to deepen her understanding of mission‑driven operations. Long‑term, Marie hopes to lead a small team, oversee process‑optimization projects, and cultivate a workplace culture
    that prioritizes employee well‑being and collaborative harmony, all while maintaining a healthy work‑life balance to manage her emotional reactivity.
