  hobbies: '[''Reading (fiction & non-fiction)'', ''Journaling'', ''Yoga and mindfulness'', ''Walking in Astoria Park'', ''Volunteer work at local animal shelter'', ''Gardening'', ''Knitting'', ''Cooking
