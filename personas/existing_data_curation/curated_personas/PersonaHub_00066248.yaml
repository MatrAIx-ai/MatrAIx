persona_description: A health professional who is concerned with the mental health of children and adolescents, particularly those with oppositional defiant disorder. They are familiar with the evaluation
  and treatment of psychological disorders and have experience with the behavioral and emotional patterns that can develop during adolescence. They are aware of the importance of prevention and early identification
  of mental health problems, and have a particular interest in the effects of neglect and lack of correct direction during childhood and growth and evolution. They are also aware of the impact of behavioral
  disorders on child's educational-social performance and the prevalence of mental health disorders.
