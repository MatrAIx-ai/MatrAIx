personas:
  professional: Leonilo Rosarioquinones is a teenage aspiring game developer who channels daily competitive gaming into learning Python and modding, while creating manga‑inspired digital character art that
    blends technical precision with a love for routine practice, yet often resists rigid schedules in favor of spontaneous creative bursts.
  sports: Leonilo Rosarioquinones follows the esports world passionately, cheering for Team Liquid in Counter‑Strike and Cloud9 in League of Legends, and also watches occasional soccer matches of River
    Plate on television, though they never join a team sport, preferring solitary gaming as their primary form of competition.
  arts: Leonilo Rosarioquinones immerses themselves in digital illustration, drawing manga characters inspired by Akira Toriyama and Naoko Takeuchi, while listening to folk tunes by Atahualpa Yupanqui and
    the passionate tangos of Astor Piazzolla, and rereading classic science‑fiction novels by Isaac Asimov and Ursula K. Le Guin, letting these influences shape a distinct artistic voice.
  travel: Leonilo Rosarioquinones dreams of a solo trip to Tokyo for a manga expo, a pilgrimage to see live tango in the historic cafés of Buenos Aires, and a weekend hike among the Patagonian lakes, yet
    a tight budget and school commitments keep most adventures to virtual tours and occasional nearby mountain trails.
  culinary: Leonilo Rosarioquinones finds a creative outlet in cooking family‑tradition dishes like beef empanadas, milanesa with crispy breadcrumbs, and chimichurri‑marinated steak, mastering an intermediate
    level of culinary skill while also experimenting with simple sushi rolls and using fresh herbs, paprika, and garlic as staple ingredients.
  core: Leonilo Rosarioquinones is a solitary, routine‑loving teen who balances competitive gaming and meticulous digital art with spontaneous bursts of creativity, a cautious money mindset, and a quiet
    determination to master both code and cuisine despite occasional procrastination.
background:
  cultural: 'Leonilo’s family emigrated from Buenos Aires to the United States when her parents were in their twenties, settling in Las Vegas where a modest Argentine community thrives. The household maintains
    strong ties to Argentine culture: Spanish is spoken at home, family meals often feature asado, empanadas, and Dulce de leche desserts, and Sunday afternoons include watching soccer matches, especially
    the Argentine national team. Argentine music—ranging from traditional folklore to contemporary rock—plays frequently, and Leonilo has learned several dance steps from her relatives. While adapting to
    life in Nevada, she also embraces the fast‑paced entertainment vibe of Las Vegas, attending local gaming tournaments and exploring the city’s diverse culinary scene. This bicultural upbringing gives
    her a unique perspective that blends Argentine family values of resilience and hospitality with the individualistic, opportunity‑driven ethos of her American surroundings.'
attributes:
  skills: '["Bilingual Spanish‑English", "Traditional Argentine cooking (empanadas, asado, milanesas)", "Competitive video gaming (strategy & FPS)", "Basic Python scripting", "Digital illustration (tablet
    art)", "Electronic device troubleshooting"]'
  hobbies: '["Competitive online gaming (strategy & FPS)", "Digital illustration and character design", "Cooking traditional Argentine recipes", "Self‑taught Python programming", "Listening to Argentine
    folk and tango music", "Reading science‑fiction novels", "Solving puzzles (Sudoku, logic games)"]'
  career_goals: Leonilo aims to complete her high school education through a GED program while dedicating herself to becoming a professional esports competitor in strategy and shooter games. She hopes to
    join a reputable team, stream her gameplay, and eventually transition into a game‑development role where she can design the kinds of games she loves. Parallel to her gaming ambitions, she wishes to
    deepen her culinary skills, eventually working part‑time in an Argentine restaurant in Las Vegas or starting a small catering venture that showcases her family’s recipes. In the longer term, she envisions
    a career that blends technical creativity with her cultural heritage, such as designing interactive culinary experiences or creating games with Argentine themes.
