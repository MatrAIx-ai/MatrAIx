  career_goals: Sonia aims to transition into a senior engineering leadership role where she can shape product strategy for platforms that serve underrepresented communities. She envisions leading a cross‑functional
    team that builds inclusive fintech solutions empowering Black‑owned small businesses. Over the next five years, she plans to earn a professional certification in cloud architecture, spearhead a mentorship
    program for aspiring Black technologists in Providence, and eventually launch her own tech startup focused on community‑driven digital services. Her ambition balances personal growth with a commitment
    to increasing diversity and equity in the tech industry.
