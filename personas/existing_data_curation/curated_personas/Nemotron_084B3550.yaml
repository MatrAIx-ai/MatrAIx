  career_goals: Nguyet aims to launch an independent production company that spotlights stories bridging Vietnamese‑American experiences and broader human narratives. She aspires to secure funding for high‑concept
    projects that blend traditional storytelling with immersive technologies, positioning herself at the forefront of innovative media. Mentorship is also a priority; she plans to establish a fellowship
    for emerging creators from underrepresented backgrounds, offering hands‑on guidance and networking opportunities. Over the next five years, she hopes to earn regional awards such as a San Diego Emmy
    and to expand her collaborative network into Los Angeles and international festivals, thereby amplifying the reach of culturally resonant content while maintaining a sustainable, ethically managed production
    model.
