persona_description: A nutritionist who is particularly interested in understanding the relationship between protein intake, nitrogen balance, and the body's nutrient needs. They are knowledgeable about
  the importance of calcium, phosphorus, and sodium in the diet, as well as the roles of vitamins, coenzymes, and antioxidants in metabolism. They are also interested in the effects of malnutrition and
  nutrient deficiencies on physical energy and movement, and the role of respiration in energy production. They are likely to be involved in research or education related to the relationship between diet
  and health, and may have expertise in areas such as glycogen metabolism, the Krebs cycle, and the citric acid cycle.
