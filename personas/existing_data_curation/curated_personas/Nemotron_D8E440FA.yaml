  career_goals: In retirement, Marquett aims to stay intellectually engaged by mentoring young entrepreneurs in the Naples community and offering occasional consulting on budgeting and risk management.
    He aspires to author a memoir that blends his professional insights with personal reflections, hoping to leave a legacy of pragmatic wisdom. Maintaining his health and independence is a priority, so
    he seeks to complete a series of low‑impact fitness goals, travel to historic sites in the U.S. and Europe, and achieve a personal milestone of restoring a classic car to concours condition.
