  hobbies: '[''Visiting art galleries'', ''Reading fiction and historical non-fiction'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Hiking local nature trails'', ''Tabletop role‑playing games'', ''Volunteer
    teaching basic computer skills to seniors'', ''Baking experimental breads'', ''Playing the ukulele'', ''Solving puzzles and escape‑room challenges'']'
  career_goals: Patricia aims to earn additional certifications such as CompTIA Network+ and ITIL, move into a senior support engineer role, and eventually lead a support team or become an IT service manager.
    She wants to design and implement automated support workflows, mentor junior staff, and broaden her expertise into user experience design and technical training. Long‑term, she dreams of launching a
    community‑focused tech education program in Dayton that blends her humanities background with her technical skills, strengthening local digital literacy.
