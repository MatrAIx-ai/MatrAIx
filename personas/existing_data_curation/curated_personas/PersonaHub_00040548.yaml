persona_description: A Nigerian oil and gas industry expert who is knowledgeable about the reserves, production, and uses of bitumen in Nigeria, particularly in the Ondo State region. They are also interested
  in the potential for the industry to become a foreign exchange earner and the development of the industry beyond local needs. They have a strong understanding of the processes involved in processing and
  refining bitumen, as well as the impact of bitumen on road construction and other uses. Additionally, they are aware of the challenges and opportunities associated with the use of bitumen in Nigeria,
  including the importation of heavy crudes and the extraction of tar sands.
