personas:
  professional: Maurine Douglas, a line cook in Idaho Falls with a knack for precise inventory control and balanced menu design, leverages their organized, methodical nature and outgoing energy to mentor
    junior staff while steering the kitchen toward a farm-to-table vision.
  sports: Maurine Douglas fuels their love of the outdoors by hiking the foothills around Idaho Falls, participating in the Idaho Falls Trail Club’s monthly treks, practicing yoga at the local studio, and
    cheering on the Idaho Falls Chukars during summer baseball while donning a Boise State Broncos cap for college football weekends.
  arts: Maurine Douglas blends acoustic guitar sessions at neighborhood potlucks with weekend pottery classes, finding inspiration in folk storytellers like Brandi Carlile, Sufjan Stevens, and the Avett
    Brothers, while also attending the Fremont Center for the Arts’ seasonal exhibitions.
  travel: Maurine Douglas prefers meticulously planned road trips that balance adventure and relaxation, having explored Yellowstone’s geysers and Sun Valley’s ski slopes, while dreaming of a culinary pilgrimage
    to Tuscany’s farm-to-table vineyards and a spring wander through Kyoto’s vegetable markets.
  culinary: Maurine Douglas crafts health-focused, farm-to-table meals, like rosemary-roasted fingerling potatoes, pan-seared trout with lemon-butter, and kale-apple slaws, leveraging their intermediate
    culinary training, a love for seasonal Idaho produce, and a penchant for balancing comfort flavors with sustainable practices.
  core: Maurine Douglas is a pragmatic, community-oriented culinary professional who blends structured kitchen mastery with a love for nature, music, and hands-on creativity, all while occasionally hoarding
    discount coupons and forgetting to water their garden.
background:
  cultural: Maurine grew up in a middle‑class, predominantly white household in the Pacific Northwest, with Portuguese and Irish ancestry that brought a mix of home‑cooking traditions—seafood stews, hearty
    potato dishes, and holiday baking. Her family emphasized self‑reliance, community service, and celebrating seasonal harvests, values that resonate with the rural culture of Idaho Falls. While she identifies
    as American, her upbringing included regular visits to family gatherings where recipes were passed down, reinforcing a respect for both tradition and the practicality of cooking for everyday life.
attributes:
  skills: '[''menu planning'', ''recipe development'', ''food safety (ServSafe certified)'', ''inventory management'', ''cost control'', ''staff training and supervision'', ''sous‑vide and grilling techniques'',
    ''baking and pastry basics'', ''dietary accommodations (gluten‑free, vegan)'', ''plating and presentation'']'
  hobbies: '[''hiking'', ''community potluck gatherings'', ''volunteering at food bank (cooking workshops)'', ''gardening'', ''yoga'', ''playing acoustic guitar'', ''pottery classes'']'
  career_goals: Maurine aspires to move from a line‑cook role to a kitchen manager or head chef position within the next three years, focusing on farm‑to‑table cuisine that showcases Idaho’s local produce.
    She plans to obtain an advanced culinary certification and eventually launch a small catering service that offers seasonal menus for community events. Long‑term, she envisions writing a cookbook that
    blends classic American comfort food with the health‑focused, sustainable practices she values.
