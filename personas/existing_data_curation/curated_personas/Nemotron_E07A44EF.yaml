  hobbies: '[''Vegetable gardening'', ''Preparing traditional East Asian dishes'', ''Reading productivity/self‑help literature'', ''Puzzle solving (crosswords, Sudoku)'', ''Tai Chi'', ''DIY home décor projects'',
