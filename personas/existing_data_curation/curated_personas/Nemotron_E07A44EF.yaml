personas:
  professional: An aspiring administrative professional, Wanting Tan utilizes their meticulous budgeting, bilingual English–Mandarin communication, and systematic event coordination, and they consistently
    deliver high‑quality part‑time office support while maintaining a seamlessly organized home environment.
  sports: Wanting Tan stays active through a weekly Tai Chi class at the local community center, follows the Seattle Mariners during baseball season, and competes in a co‑ed recreational volleyball league
    with the Evergreen Club, balancing low‑impact movement with occasional high‑energy team play.
  arts: Wanting Tan finds artistic inspiration in the minimalist installations of Yayoi Kusama, the acoustic melodies of Norah Jones, and the contemporary choreography of Misty Copeland, often incorporating
    these influences into DIY home décor projects that blend modern aesthetics with subtle cultural motifs.
  travel: Wanting Tan prefers weekend getaways to the nearby Redwood National Park for forest immersion, and dreams of planning a month‑long cultural tour of Kyoto, the historic terraces of Banaue, and
    the ancient stone forests of Jiuzhaigou, blending structured itineraries with spontaneous local market visits.
  culinary: Wanting Tan enjoys crafting soy‑glazed pork belly, stir‑frying bok choy with garlic and ginger, and preparing homemade pickled daikon radish using rice vinegar, showcasing a moderate cooking
    skill that balances precise recipe adherence with experimental flavor tweaks.
  core: Wanting Tan navigates life with a hyper‑organized mindset, a competitive edge that fuels relentless self‑improvement, a lingering worry that fuels meticulous planning, and a covert habit of hoarding
    extra garden seeds for future projects.
background:
  cultural: Wanting’s family traces its roots to a Mandarin‑speaking region of East Asia, and she grew up celebrating Lunar New Year, Mid‑Autumn Festival, and other customs that emphasize family cohesion,
    respect for elders, and culinary tradition. These cultural values underpin her disciplined approach to daily life and her devotion to preserving heritage through food, language, and community involvement.
    Living in Maple Valley, WA, she blends these traditions with American suburban life, creating a hybrid identity that honors both her ancestry and her local environment.
