  career_goals: Wanting aims to formalize her expertise by earning a GED and completing a professional certification in office administration or professional organizing. She aspires to transition into a
    part‑time administrative role that leverages her strong organizational and planning abilities, while also exploring a side business offering home‑based meal prep and catering services rooted in her
    cultural cuisine. Long‑term, she wants to achieve financial stability for her family and be recognized as a trusted community resource for household efficiency.
