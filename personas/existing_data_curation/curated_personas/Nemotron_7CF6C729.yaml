personas:
  professional: David Mccall, a 51‑year‑old master pipefitter with MIG, TIG, and stick‑welding expertise, blends rigorous code compliance with an imaginative flair for custom metal‑art designs, channeling
    their curiosity into mentoring apprentices and preparing to launch a boutique contracting firm that doubles as an artistic studio.
  sports: David Mccall follows the Kentucky Wildcats basketball team and the Louisville Cardinals football squad, trains three evenings a week at the Bluegrass Iron Club for weight‑lifting, and spends weekends
    casting on the Salt River while occasionally joining a local pickup softball league with fellow tradespeople.
  arts: David Mccall channels their love for abstract concepts into metal sculpting inspired by Alexander Calder, paints landscapes echoing Mark Rothko's color fields, devours the novels of Octavia Butler
    and Isaac Asimov, and captures Kentucky’s rolling hills through photography, often attending the Louisville Symphony and the Kentucky Shakespeare Festival for cultural enrichment.
  travel: David Mccall favors self‑planned road trips that blend historic preservation sites with scenic drives, having explored Mammoth Cave, the steel‑rich city of Sheffield, and the Appalachian Trail’s
    southern terminus, while budgeting carefully to fit these adventures into a modest retirement fund and a busy work schedule.
  culinary: David Mccall, an intermediate home cook, delights in preparing smoked trout from their Salt River catches, slow‑cooked pork shoulder glazed with rosemary and garlic, fresh garden salads featuring
    heirloom tomatoes and sweet corn, and occasional wood‑fired pizzas topped with smoked gouda and caramelized onions.
  core: David Mccall merges rugged pipefitting precision with a restless artistic imagination, spending weekends forging steel sculptures, tending a garden, and dreaming of a boutique contracting studio
    that mentors apprentices, all while juggling a modest budget and occasional back pain.
background:
  cultural: David was raised in a close‑knit Appalachian community in Washington County, Kentucky, where values of practicality, self‑reliance, and community involvement are emphasized. His ancestry traces
    back to Scots‑Irish and German immigrants who settled the region in the 19th century. Growing up attending a local Methodist church, participating in county fairs, and listening to Appalachian folk
    music shaped his cultural identity. While he respects these traditions, his intellectual curiosity drives him to explore broader artistic and technical horizons beyond his regional roots.
attributes:
  skills: '[''pipefitting'', ''steamfitting'', ''MIG welding'', ''TIG welding'', ''stick welding'', ''blueprint reading'', ''fluid dynamics analysis'', ''code compliance (International Plumbing Code, ASME)'',
    ''equipment maintenance'', ''project scheduling'', ''team leadership'', ''basic CAD drafting'', ''metal sculpture fabrication'']'
  hobbies: '[''metal sculpting'', ''woodworking'', ''abstract painting'', ''science fiction reading'', ''landscape photography'', ''fishing'', ''vegetable gardening'', ''historical preservation volunteering'',
    ''vintage car restoration'', ''attending county fairs'']'
  career_goals: David aspires to earn the Master Pipefitter certification and obtain a Kentucky contractor's license within the next two years. He envisions launching a boutique contracting firm that specializes
    in high‑end residential and commercial piping while incorporating custom metal art installations. Additionally, he hopes to mentor the next generation of tradespeople by offering apprenticeships and
    possibly teaching trade courses at a local community college, channeling his curiosity for new techniques and design principles.
