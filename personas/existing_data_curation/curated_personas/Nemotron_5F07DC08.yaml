  hobbies: '[''Soccer'', ''Basketball'', ''LEGO building'', ''Drawing comic characters'', ''Reading graphic novels'', ''Educational video games'', ''Listening to hip‑hop and pop music'', ''Dancing'', ''Participating
    in church youth group activities'', ''Community center crafts'']'
  career_goals: Mannix dreams of a future where he can combine his love of teamwork, structure, and helping others. He is fascinated by firefighters and imagines himself wearing the gear, responding to
    emergencies, and protecting his community. He also enjoys the idea of becoming a teacher, guiding classmates through lessons and keeping the classroom organized. Occasionally, he talks about exploring
    outer space as an astronaut, drawn by the clear mission goals and the excitement of discovery. These ambitions reflect his desire for clear roles, responsibility, and the chance to make a positive impact.
