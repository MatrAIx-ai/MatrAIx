personas:
  professional: Mannix Slaton, an aspiring LEGO architect and budding community play organizer, blends meticulous planning with enthusiastic leadership in school group projects, turning detailed building
    instructions into collaborative adventures while balancing assertiveness with kindness, and they love the predictable structure of step-by-step challenges.
  sports: Mannix Slaton, a junior player for the Riverside Rockets basketball league and the Little Lions soccer club, follows the Metro Raptors (NBA) and Metro FC (MLS) with avid enthusiasm, practices
    disciplined drills at the local park each weekend, relishes the clear rules of team play, and they aim to score the winning goal in the next season's championship.
  arts: Mannix Slaton, a comic-book doodler who admires Jeff Smith's Bone, Raina Telgemeier's Smile, and whirls to pop hits by Billie Eilish and hip-hop beats by Travis Scott, channels storytelling into
    weekly sketches that blend adventure and humor, and they eagerly share their creations during church youth group art sessions.
  travel: Mannix Slaton, who prefers parents to handle itineraries but loves spontaneous stops, has explored Yellowstone's geysers on a family road trip and the magic of Disney World, now dreams of flying
    to Tokyo's DisneySea for an extra-cultural adventure, and they keep a scrapbook of ticket stubs and doodles to remember each journey.
  culinary: Mannix Slaton, a budding kitchen helper, favors building taco plates with soft corn tortillas, seasoned ground beef, shredded cheddar, fresh pico de gallo, and a squeeze of lime, also perfects
    creamy mac-and-cheese using elbow pasta, cheddar cheese, and a splash of milk, and they sometimes sneak a chocolate chip cookie when no one's looking.
  core: Mannix Slaton is an energetic eight-year-old who craves predictable structures, thrives in group play, pours imagination into LEGO and comics, yet battles frequent anxiety spikes that color everyday
    moments.
background:
  cultural: Mannix grows up in a close‑knit African‑American family in Trenton, Michigan, where community and family ties are central. His parents emphasize the importance of education, respect for elders,
    and participation in local cultural events such as Juneteenth celebrations and Black History Month activities at school. He regularly attends a neighborhood church that offers youth programs, fostering
    a sense of belonging and shared heritage. The cultural rhythm of soulful music, storytelling, and family gatherings influences his interests in music and creative expression. Access to the Detroit Public
    Library’s kids programs and the local community center provides additional support, nurturing his love of reading, arts, and collaborative play.
