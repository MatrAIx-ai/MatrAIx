personas:
  professional: Carmen Iglesias, a senior financial manager, leverages advanced Excel, SQL, and Tableau to drive data-driven budgeting, risk assessment, and strategic forecasting while championing inclusive
    team culture through bilingual stakeholder engagement and lively salsa-inspired brainstorming sessions, and they balance curiosity with practicality in every financial model they craft.
  sports: Carmen Iglesias energizes weekends by hiking the Columbia River Gorge with the Gorge Trailblazers club, spiking in the recreational volleyball team Northwest Vibes, cheering the Seattle Seahawks
    and Seattle Sounders, and occasionally hitting the slopes at Mt. Hood, while they treat fitness as both social bonding and personal stress relief.
  arts: Carmen Iglesias expresses creativity through weekly salsa sessions at the local dance hall, they attend live performances by Santana and John Legend, follow the Seattle Repertory Theatre's seasonal
    productions, and curate a personal playlist that blends classic boleros with contemporary pop, using music and dance to recharge after data-heavy days.
  travel: Carmen Iglesias plans trips that blend structured itineraries with spontaneous exploration, they favor weekend escapes to Vancouver and the Oregon Coast, savor cultural immersion during annual
    visits to Oaxaca for Día de los Muertos festivities, and dream of a future pilgrimage to Barcelona’s architecture and culinary scene.
  culinary: Carmen Iglesias delights in crafting mole poblano, carnitas, and fresh guacamole with hand-picked chilies and masa, demonstrating an intermediate cooking skill that shines at family gatherings,
    while they also enjoy farm-to-table brunches and occasionally burn the bottom of a tortilla pan when multitasking between work calls.
  core: Carmen Iglesias fuses analytical rigor with a vibrant community spirit, they channel salsa energy into finance leadership while juggling disciplined investing, health monitoring, and occasional
    over-commitments that leave them juggling spreadsheets and dance shoes alike.
background:
  cultural: Born to Mexican immigrants, Carmen grew up in a bilingual household where Spanish and English were spoken interchangeably. She celebrates traditional Mexican holidays such as Día de los Muertos
    and Mexican Independence Day, often preparing family recipes passed down through generations. Her cultural identity informs her values of family cohesion, community service, and respect for tradition,
    which she integrates into her professional life by fostering inclusive workplace practices and supporting Latinx community initiatives in the Pacific Northwest.
