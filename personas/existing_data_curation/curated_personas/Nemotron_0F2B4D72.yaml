  career_goals: Her primary ambition is to rise to the role of Chief Financial Officer within the next five years, guiding a mid‑size enterprise through digital transformation and sustainable finance initiatives.
    She aims to champion data‑driven decision‑making by expanding the finance department’s analytics capabilities, and to earn CPA and CFA designations to solidify her technical credentials. Carmen is also
    passionate about mentoring the next generation of women and Latinx professionals in finance, and she envisions launching an internal mentorship program that promotes diversity, equity, and inclusion.
