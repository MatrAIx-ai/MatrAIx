  career_goals: Although retired, Freida aims to keep growing intellectually and socially. She plans to enroll in online art history courses to deepen her expertise, lead an intergenerational mural project
    for the Covington community, and compile a memoir that weaves together her family’s Italian heritage with the rich cultural tapestry of South Louisiana. She also hopes to mentor younger volunteers at
    the local senior center, expand its arts programming, and travel to major museums and cultural festivals across the U.S. and Europe, bringing new ideas back to her community.
