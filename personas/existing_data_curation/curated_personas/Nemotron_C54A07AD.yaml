  career_goals: Yuang aspires to merge his love for art and technology by becoming a video game designer or digital media artist, creating immersive visual experiences. He also dreams of studying marine
    science to help protect the coastal ecosystems of Connecticut, hoping to combine scientific research with creative storytelling. In the longer term, he envisions using his bilingual abilities to foster
    cultural exchange programs between the United States and Korea, mentoring younger students through art and robotics clubs. His overarching ambition is to pursue a career that blends creativity, curiosity,
    and community impact.
