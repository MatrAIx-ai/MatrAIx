personas:
  professional: Yuang Kim is an aspiring digital artist and game creator who melds hand‑drawn sketches with animation software and Scratch programming to prototype interactive stories, while balancing school
    responsibilities with a methodical yet flexible workflow.
  sports: Yuang Kim enjoys weekend swims along the coastal shoreline and plays on their middle‑school soccer team, while cheering for the Harbor City Mariners baseball club and following regional high‑school
    gymnastics competitions, preferring low‑impact cardio and occasional light weight‑training to stay agile for LEGO builds.
  arts: Yuang Kim channels the fluid storytelling of Studio Ghibli and the dynamic panels of Osamu Tezuka into their own digital animations, practices piano pieces like Debussy’s Claire de Lune and the
    folk melody Arirang, draws inspiration from musicians such as Yiruma, and collects graphic novels by Katsuhiro Otomo while attending weekly youth art‑museum workshops.
  travel: Yuang Kim prefers short, spontaneous day trips that blend art and nature—like sketching sunrise at the nearby lighthouse and exploring the coastal museum of contemporary art—while dreaming of
    a longer immersion in Seoul’s historic palaces and Kyoto’s traditional tea houses to study folk music and Japanese ukiyo‑e prints.
  culinary: Yuang Kim chops vegetables for homemade bibimbap, rolls kimchi pancakes, and experiments with sushi rice, shows a budding skill with a kitchen knife but often forgets to clean the cutting board,
    and enjoys the umami of miso soup and the spiciness of tteokbokki after a long art session.
  core: Yuang Kim is a curiosity‑driven teen who harmonizes art, technology, and tradition, often juggling sketchbooks and LEGO bricks while occasionally sacrificing sleep for creative bursts.
background:
  cultural: Yuang is a second-generation Korean American raised in North Haven, Connecticut. At home, Korean is spoken alongside English, and his family celebrates traditional holidays such as Seollal and
    Chuseok while also participating in American customs like Thanksgiving and Halloween. He attends a local Korean language school on Saturdays and is active in the Korean community church, where he learns
    about cultural arts like calligraphy and folk music. Growing up in New England, he has been exposed to a diverse cultural environment, fostering a bicultural identity that values the collectivist harmony
    of Korean heritage and the individual creativity encouraged in American society. This blend influences his worldview, artistic expression, and his desire to bridge cultures through future projects.
