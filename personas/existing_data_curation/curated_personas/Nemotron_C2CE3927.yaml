  career_goals: Gregory aims to stay actively engaged in his community by assuming a leadership role on the senior center’s activity committee, expanding the town’s community garden, and documenting Marshall’s
    local history through photography and oral interviews. He plans to learn basic digital photography techniques, mentor high‑school apprentices in woodworking, and continue volunteering at county‑fair
    events. Maintaining his health through regular walks, fishing trips, and stretching routines is also a priority so he can remain a reliable support for his family and friends.
