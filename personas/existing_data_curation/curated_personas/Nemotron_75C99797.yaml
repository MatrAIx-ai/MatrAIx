  hobbies: '[''Community Gardening'', ''Church Choir'', ''Genealogy Research'', ''Chess'', ''Woodworking'', ''Fishing'', ''Reading Science Fiction'', ''Attending Football Games'', ''Traveling for Family
    Reunions'', ''Astrophotography'']'
  career_goals: Although no longer in the formal workforce, Ransom aims to stay professionally active by volunteering as a mentor for high‑school and community‑college students interested in STEM, establishing
    a series of hands‑on engineering workshops at the local library and his church, and writing a memoir that weaves his engineering career with reflections on growing up as a Black man in the Mississippi
    South. He hopes to serve on the board of a scholarship fund that supports under‑represented engineering students, provide occasional consulting to small firms on project planning, and prioritize his
    health and stress‑management practices so he can enjoy quality time with his wife and family.
