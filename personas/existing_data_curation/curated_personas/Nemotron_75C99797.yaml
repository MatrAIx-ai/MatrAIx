personas:
  professional: Ransom Ford, a retired senior engineer with a graduate STEM degree, leverages their decades of experience designing complex electrical and structural systems and their methodical, organized
    nature to mentor younger engineers, spearhead community STEM workshops, and translate technical concepts into clear, actionable guidance.
  sports: Ransom Ford, a devoted fan of the Mississippi State Bulldogs football team, regularly attends home games, participates in the senior center's weekly chess club as a mental sport, fishes on local
    lakes with a community angling group, and occasionally joins a gentle walking club that meets at the nearby park to stay active, using their social energy to connect with fellow enthusiasts.
  arts: Ransom Ford, an enthusiastic member of their church choir, enjoys rendering astrophotography of constellations with their telescope and drone, and finds literary escape in the works of Isaac Asimov
    and Octavia Butler while listening to gospel legends like Mahalia Jackson and classic rock icons such as Fleetwood Mac.
  travel: Ransom Ford, who loves combining family reunions with road trips, has visited historic plantations along the Mississippi River, attended a NASA space‑center tour in Houston for astrophotography
    inspiration, and plans a future pilgrimage to the historic sites of their ancestors in Virginia, balancing planned itineraries with spontaneous detours.
  culinary: Ransom Ford, a passionate home gardener, frequently cooks fresh‑caught catfish seasoned with cayenne, collard greens simmered with smoked turkey, and cornmeal pancakes drizzled with honey, showcasing
    a comfortable skill level in both Southern comfort cooking and experimental dishes like smoked jalapeño‑infused hush puppies.
  core: Ransom Ford blends methodical engineering precision with Southern hospitality, channeling curiosity into gardening, stargazing, and mentorship while juggling chronic health worries and a love for
    football, choir, and family gatherings.
background:
  cultural: Ransom was born and raised in the deep South during a time of significant social change. His family's history includes roots in the Great Migration and involvement in the civil‑rights movement,
    giving him a strong sense of resilience, community responsibility, and pride in his African‑American heritage. The church has been a central pillar of his life, shaping his values of fellowship, gospel
    music, and service. He cherishes Southern traditions such as family gatherings, soulful cooking, and oral storytelling. This cultural foundation fuels his commitment to mentoring younger generations,
    preserving the rich history of Mississippi's Black community, and fostering educational opportunities that honor the legacy of those who fought for equality.
attributes:
  skills: '[''Electrical Engineering'', ''Structural Analysis'', ''Project Management'', ''Technical Writing'', ''Data Analysis (Python, MATLAB)'', ''CAD Modeling (AutoCAD, SolidWorks)'', ''Teaching and
