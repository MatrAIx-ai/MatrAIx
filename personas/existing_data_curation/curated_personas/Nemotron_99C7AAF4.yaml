personas:
  professional: A budding game developer, Antonio Scott channels their curiosity and practicality into creating simple Scratch games, balancing meticulous coding with spontaneous storytelling while their
    competitive streak drives them to earn the top spot in the school’s coding club.
  sports: A high‑energy athlete, Antonio Scott plays point guard for the community’s "Lil Hoops" basketball league, idolizes the Los Angeles Lakers and emulates LeBron James’ moves, skates at the downtown
    skate park on weekends, and proudly wears the local soccer club’s jersey even though they focus only on basketball.
  arts: 'An avid comic enthusiast, Antonio Scott devours Marvel graphic novels like "Spider‑Man: Homecoming" and classic "Batman" issues, draws superhero fan art on a tablet, sings alto in the church youth
    choir, and draws inspiration from digital illustrators such as Studio Ghibli’s Hayao Miyazaki for their Scratch animations.'
  travel: A curious explorer, Antonio Scott has visited the nearby state park’s hiking trails and the beach for a family picnic, dreams of attending New York Comic Con next summer, and holds a wishlist
    that includes a weekend trip to Tokyo’s Akihabara district to see anime culture firsthand.
  culinary: A budding home chef, Antonio Scott enjoys whipping up quick fried rice with soy sauce and veggies alongside their mother, flips fluffy pancakes on Saturday mornings, experiments with adding
    crispy tofu cubes for texture, and favors bright flavors like lime and ginger in their snacks.
  core: Antonio Scott blends a competitive spirit with creative curiosity, excelling at basketball, Scratch coding, and comic fandom while navigating the world with a skeptical eye, a disciplined allowance
    habit, and a love for simple home‑cooked meals.
background:
  cultural: Antonio is an African American boy raised in Baltimore's historic East Baltimore neighborhood. His family traces its roots to the Great Migration and maintains cultural traditions such as church
    gatherings, soul‑food cooking, and celebrating Juneteenth. The vibrant local music scene, community murals, and public libraries shape his worldview. He benefits from after‑school programs that emphasize
    STEM and the arts, and his family emphasizes the importance of education, community support, and resilience in the face of urban challenges.
