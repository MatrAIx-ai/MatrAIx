persona_description: A historian who specializes in the detailed analysis of the historical events and figures of ancient Israel, focusing on the reigns of Josiah, Jehoahaz, Jehoiakim, Jehoiachin, and Zedekiah.
  The individual is deeply interested in the political, moral, and spiritual decline of Judah during this period and the eventual restoration of the Temple by Cyrus the Persian. The persona is also knowledgeable
  about the historical context of the Book of the Law, the fall of Jerusalem, the captivity of Judah, and the eventual exile of the Jews.
