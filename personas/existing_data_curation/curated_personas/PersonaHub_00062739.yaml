persona_description: A historian who specializes in the study of Roman military and engineering history, particularly the roles and contributions of ancient Roman soldier-craftsmen in the development of
  iconic Roman weapons and infrastructure. His research interests include the maintenance and upkeep of Roman roads and highways, the construction and development of major Roman roads, and the use of ancient
  Roman military strategies and tactics in modern warfare. He is a veteran of the British Army and the founder of the Roman Living History Society, "The Antonine Guard", which aims to promote the study
  and appreciation of ancient Roman military and engineering history.
