  hobbies: '[''Street Photography'', ''Exploring Local Murals'', ''Cooking Vietnamese Cuisine'', ''Hosting Dinner Parties'', ''Attending Live Jazz and World Music Events'', ''Cycling on the Delta Trails'',
    ''Hiking in the Bay Area Hills'', ''Playing Mahjong'', ''Traveling to Southeast Asia'', ''Reading Graphic Novels'']'
  career_goals: Trung aims to become a senior planner or director of regional development within Contra Costa County, shaping policies that prioritize climate resilience, equitable housing, and cultural
    vitality. He aspires to lead a multi‑disciplinary team that weaves art and community narratives into the built environment, creating neighborhoods where public art, green spaces, and affordable housing
    coexist. In the longer term, he envisions championing a county‑wide “Creative Growth” initiative that pairs sustainable infrastructure with local arts programs, and possibly pursuing a PhD in urban
    policy to influence state‑level planning legislation.
