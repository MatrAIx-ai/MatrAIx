personas:
  professional: An urban planner, Trung Guduru, leverages GIS mapping and community storytelling to co‑create climate‑resilient, arts‑infused development plans for Contra Costa County, channeling their
    curiosity and sociable talkative nature into lively participatory workshops while casually juggling an otherwise disorganized schedule to keep stakeholders engaged.
  sports: A weekend cyclist and hiker, Trung Guduru rides with the Delta Riders club along the Delta trails, supports the Golden State Warriors, the San Jose Earthquakes, and joins a local recreational
    basketball league where their talkative energy turns games into community gatherings.
  arts: An avid street photographer, Trung Guduru captures Bay Area murals—from the vibrant work of local muralist Kendra M. to unexpected pieces by Banksy—while regularly attending jazz concerts by Kamasi
    Washington and Southeast Asian fusion shows featuring Red Chilli, weaving these visual and musical inspirations into their planning narratives.
  travel: With a curiosity that fuels culinary and design ideas, Trung Guduru has trekked the hills of Hoi An, explored Vietnam’s bustling markets, savored street food in Chiang Mai, fallen in love with
    Oaxaca’s mezcal scene, and now dreams of experiencing the lantern festival in Luang Prabang, planning trips around food festivals while balancing family duties and a moderate travel budget.
  culinary: A creative home chef, Trung Guduru expertly prepares pho bo, bánh mì with lemongrass pork, caramelized cá kho tộ, and playful twists like smoked salmon spring rolls, often hosting weekly dinner
    gatherings where friends sample traditional flavors fused with experimental plating and jazz‑inspired playlists.
  core: Trung Guduru blends a passion for community mural storytelling with a habit of spontaneous dinner parties, a relaxed approach to budgeting, and a tendency to misplace keys while dashing between
    bike rides and planning meetings.
background:
  cultural: Trung is a first‑generation Vietnamese‑American whose parents immigrated to California in the 1980s. He grew up bilingual, celebrating Tet, Mid‑Autumn Festival, and community events at the local
    Vietnamese cultural center. His heritage instilled a strong sense of family, collectivism, and respect for elders, while the multicultural environment of Pittsburg, CA, exposed him to a tapestry of
    Asian, Latino, and African‑American cultures. This blend influences his inclusive planning approach, his love for sharing traditional Vietnamese food, and his participation in neighborhood festivals
    that showcase diverse artistic expressions.
attributes:
  skills: '[''Urban Planning'', ''Geographic Information Systems (GIS)'', ''Spatial Data Analysis'', ''Data Visualization'', ''Sustainable Development'', ''Climate‑Resilience Modeling'', ''Public Policy
