    ''Mentorship'']'
  hobbies: '[''Fly fishing'', ''Hiking in the River Valley'', ''Woodworking'', ''Model‑railroad building'', ''Landscape photography'', ''Reading design non‑fiction'', ''Archery competitions'']'
  career_goals: Professionally, Jack is focused on translating his deep practical experience into a more predictable and legacy‑oriented phase of his career. Over the next five years he intends to establish
    a boutique consultancy that serves small manufacturers and outdoor‑gear start‑ups in the Great Falls region, offering end‑to‑end product design while emphasizing sustainable material choices. He seeks
    certification as a Certified Professional Industrial Designer to formalize his credibility and to attract larger contracts. A key ambition is to create a mentorship program that pairs seasoned designers
    with emerging talent from local technical schools, ensuring continuity of expertise. Jack also hopes to author a practical guide on "Designing for Rural Industries," blending his technical know‑how
    with his methodical, risk‑aware perspective. While he values financial stability, he aims to gradually shift part of his workload to consultative and teaching roles, reducing the day‑to‑day stress of
    deadline‑driven projects and allowing more time for personal well‑being.
