personas:
  professional: Tammy Thompson is a veteran retail floor manager with over twenty years of experience in inventory control, loss‑prevention auditing, and data‑driven staff coaching, who quietly channels
    a competitive, skeptical mindset into piloting AI‑powered inventory forecasts while eyeing a district‑wide operations role that minimizes daily social demands.
  sports: Tammy Thompson follows the Seattle Seahawks during football season, runs the Seattle Half Marathon each spring for structured cardio, and maintains a solo hiking routine on the Cascade trails,
    preferring low‑impact endurance over team sports.
  arts: Tammy Thompson regularly listens to Glenn Gould’s recordings of Bach, savors Miles Davis’s modal jazz, studies Ansel Adams’s black‑and‑white landscapes for photographic inspiration, and revisits
    classic literature such as Jane Austen’s ‘Pride and Prejudice,’ integrating these artistic influences into her quiet evenings.
  travel: Tammy Thompson prefers low‑key travel that combines nature and history, having trekked the Alpine Lakes Wilderness, explored the ancient temples of Kyoto during a spring cherry‑blossom trip, and
    planning a future visit to Iceland’s volcanic coast to photograph misty fjords without the chaos of crowded tourism.
  culinary: Tammy Thompson enjoys cooking simple yet refined Pacific‑Northwest meals, often preparing cedar‑plank salmon with lemon‑dill glaze, mushroom‑risotto featuring locally foraged chanterelles, and
    a side of roasted fingerling potatoes, while admitting a guilty pleasure for occasional indulgent cheese platters at farmer’s markets.
  core: Tammy Thompson, a 57‑year‑old solo‑oriented retail strategist, blends relentless curiosity with pragmatic skepticism, favoring solitary hikes, meticulous budgeting, and methodical problem‑solving,
    but occasionally succumbs to the lure of high‑end camera equipment and late‑night jazz marathons.
background:
  cultural: Tammy was raised in a white, Anglo‑American household in the Pacific Northwest, where self‑reliance, modesty, and an appreciation for the natural environment are cultural cornerstones. Her family
    valued education and exposure to the arts, leading her to earn a graduate degree in arts and humanities. The region’s blend of progressive environmental awareness and traditional small‑town sensibilities
    shaped her pragmatic yet curious outlook, her preference for quiet spaces, and her competitive, self‑directed work ethic.
attributes:
  skills: '[''Retail Operations Management'', ''Staff Scheduling'', ''Inventory Control'', ''Loss Prevention'', ''Sales Data Analysis'', ''Visual Merchandising'', ''Conflict Resolution'', ''Training & Development'',
