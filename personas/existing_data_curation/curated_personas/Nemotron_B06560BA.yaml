  hobbies: '[''Reading historical biographies'', ''Classic literature'', ''Journaling'', ''Birdwatching'', ''Solo hiking'', ''Gardening'', ''Landscape photography'', ''Classical music listening'', ''Puzzle
    solving'', ''Model building'']'
  career_goals: Tammy aims to move from first‑line supervision to a district‑wide operations role where she can apply her analytical mindset to multiple locations while limiting the day‑to‑day social demands
    of floor staffing. She is pursuing certification as a Certified Retail Manager and plans to spearhead a pilot program that integrates AI‑driven inventory forecasting into her current store, positioning
    herself as a change‑agent who balances innovation with proven retail fundamentals. In the long term, she envisions consulting for small‑town retailers on efficient store layouts and loss‑prevention
    strategies, allowing her to work independently and leverage her competitive drive to achieve measurable performance gains.
