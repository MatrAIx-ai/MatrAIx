persona_description: A healthcare professional who is knowledgeable about the optimal times to administer influenza vaccine and the appropriate use of antiviral medications to prevent influenza. This person
  is likely to be an expert in immunology, respiratory medicine, or public health, and is responsible for ensuring the safety and effectiveness of vaccines for their patients. They may work in a hospital,
  clinic, or public health agency and have experience in conducting influenza vaccination campaigns and monitoring vaccine efficacy. They are also likely to be aware of the importance of early detection
  and treatment of influenza and the potential for vaccine-preventable complications.
