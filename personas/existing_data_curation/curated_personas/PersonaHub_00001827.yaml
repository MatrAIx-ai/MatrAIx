persona_description: A historian who specializes in the study of political revolutions, particularly those that resulted from European imperialism and the social events and ideas discussed in Unit 5. This
  historian has a deep understanding of the Industrial Revolution and the ideals of the Enlightenment, and how they influenced communism. They are knowledgeable about the Russian Revolution of 1917, the
  revolutions of 1905 and 1917, and the formation of the Soviet Union. They have a keen interest in the effects of colonialism on Asia, and how European and American imperialism affected India, China, and
  Japan. This historian has a comprehensive understanding of the political and social changes that occurred during the 20th century, and how they reshaped the world.
