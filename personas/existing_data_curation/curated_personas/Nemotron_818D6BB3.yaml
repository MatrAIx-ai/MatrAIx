  hobbies: '["Cooking Dominican dishes", "Listening to bachata and merengue", "Walking in local parks", "Watching Spanish‑language TV series", "Journaling", "Knitting"]'
  career_goals: Maria aims to earn her GED within the next year and enroll in a community college program that leads to a stable, entry‑level administrative or clerical position. She values a predictable
    schedule that allows her to apply her organizational strengths and to support her family financially. In the longer term, she hopes to open a small home‑based catering service specializing in Dominican
    comfort food, providing both a reliable income and a way to share her cultural heritage. Her career ambitions are grounded in practicality, seeking roles where she can see clear, tangible results and
    maintain a routine that reduces her stress.
