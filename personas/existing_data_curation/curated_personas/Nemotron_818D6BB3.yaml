personas:
  professional: Maria Lopez, a 22‑year‑old aspiring administrative assistant, combines bilingual fluency and hands‑on budgeting skills to keep a small community office on a predictable schedule, though
    they sometimes let deadlines slip when unexpected household chores demand their attention.
  sports: Maria Lopez enjoys leisurely walks through Pelham Bay Park, participates in a local walking club that meets on weekends, roots for the New York Yankees in baseball season and the New York Knicks
    during basketball, and occasionally joins a community softball game at the church field during summer.
  arts: Maria Lopez relaxes by listening to bachata and merengue hits from artists like Juan Luis Guerra and Aventura, binge‑watches Spanish‑language series such as "La Casa de Papel" and classic telenovelas,
    and occasionally attends church choir performances that feature traditional folk songs.
  travel: Maria Lopez prefers short, budget‑friendly trips, dreaming of a weekend getaway to the beaches of Puerto Rico for authentic food experiences while still planning day hikes to the Hudson Valley’s
    historic sites when finances allow.
  culinary: Maria Lopez excels at cooking hearty meals like sancocho with pork, root vegetables and plantains, creamy mangú seasoned with garlic and cilantro, and crisp pastelitos stuffed with seasoned
    meat, often using fresh herbs such as oregano and thyme to enhance the flavors.
  core: Maria Lopez balances a love for home‑cooked comfort food and soothing walks with an ever‑present worry that fuels both meticulous budgeting and occasional procrastination.
background:
  cultural: Maria is a second‑generation Dominican American raised in the Bronx's vibrant Dominican enclave. Her family maintains strong ties to Dominican traditions, including Catholic observances, holidays
    like Dominican Independence Day, and the communal sharing of food. Bilingualism is a daily reality; she switches seamlessly between Spanish at home and English in school or public settings. The neighborhood’s
    cultural fabric—music, dance, street food, and close‑knit family connections—shapes her identity, fostering a deep pride in her heritage while also navigating the multicultural dynamics of New York
    City.
attributes:
  skills: '["Home cooking (Dominican cuisine)", "Bilingual Spanish‑English communication", "Basic computer skills (MS Word, Excel)", "Household budgeting and personal finance", "Childcare and elder assistance",
