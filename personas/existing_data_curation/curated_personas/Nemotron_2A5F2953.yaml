  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Storytelling and public speaking'', ''Bridge (card game)'', ''Church choir participation'', ''Volunteer coordination for cultural festivals'',
    ''Reading historical fiction'', ''Listening to Mexican boleros'', ''Visiting family'']'
  career_goals: Although retired, Ivan aims to remain an active pillar of his community. He aspires to mentor younger volunteers at the Pleasanton senior center, help preserve and expand the annual Mexican
    heritage festival, and document his family's history for future generations. He also seeks to maintain his health through regular walks and gardening, stay socially engaged by hosting weekly story‑telling
    evenings, and continue learning new culinary techniques to share with his grandchildren.
