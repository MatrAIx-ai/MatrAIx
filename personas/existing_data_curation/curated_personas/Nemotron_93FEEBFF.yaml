  career_goals: Marcus aims to transition into a senior software architect role where he can shape system-wide design while championing the integration of artistic elements into digital products. He wants
    to lead a compact, high‑performing team on flexible, project‑based contracts, allowing him to maintain a work‑life balance that reduces stress. Additionally, he plans to launch a side venture—an AI‑powered
    app that curates personalized art experiences for users. Mentorship is also a priority; he hopes to volunteer with local coding programs that support underrepresented minorities in tech.
