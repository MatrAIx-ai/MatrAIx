personas:
  professional: A veteran full‑stack developer, Marcus Hayat blends three decades of backend and UI expertise with an artist’s sensibility, producing clean, visually compelling interfaces while they favor
    flexible deadlines and sometimes let a relaxed, disorganized workflow dictate project pacing.
  sports: A casual outdoor enthusiast, Marcus Hayat joins the NOLA Trail Club for weekend hikes in city parks and follows the New Orleans Saints in the fall and the Pelicans during basketball season, preferring
    low‑key cardio over competitive gym routines while they keep their fitness regimen flexible to accommodate spontaneous project deadlines.
  arts: A digital painter and indie‑film reviewer, Marcus Hayat spends weekends at galleries showcasing works by Kehinde Wiley and Amy Sherald, draws inspiration from John Coltrane’s improvisations, and
    writes concise critiques of movies like 'Moonlight' and 'The Farewell,' while they blend sci‑fi themes into personal photo essays that reflect their Southern roots.
  travel: A mindful explorer, Marcus Hayat favors low‑key, small‑group road trips that blend art and nature—such as a recent visit to Asheville’s River Arts District and a photography trek through the Great
    Smoky Mountains—while they dream of a solo itinerary to Kyoto’s contemporary galleries and Iceland’s midnight sun, planning each outing with loose itineraries to avoid stress.
  culinary: A culinary tinkerer, Marcus Hayat masters modern Southern fare—spicing classic shrimp and grits with miso butter and black garlic, smoking collard greens with chipotle, and perfecting sous‑vide
    fried chicken—while they experiment with Raspberry Pi‑controlled temperature probes and relish occasional meals at cozy soul‑food joints like The Red Lantern.
  core: Marcus Hayat, a 54‑year‑old full‑stack veteran, channels anxiety into late‑night digital paintings, habitually misplaces meeting notes while they obsessively curate personal art feeds, and refuses
    to start any coding session without exactly two cups of coffee.
background:
  cultural: Marcus is an African‑American who grew up in the multicultural community of Pearl River, New York, with family roots in the Southern United States. His upbringing included Sunday gospel services,
    community gatherings, and a strong emphasis on storytelling and resilience. He identifies closely with Black artistic traditions—music, visual arts, and literature—and is aware of the contributions
    of Black technologists throughout history. Navigating a predominantly white tech industry has sharpened his competitive edge and occasional skepticism, while also motivating him to give back to the
    Black community through mentorship and cultural advocacy.
