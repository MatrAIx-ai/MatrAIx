  career_goals: At 70, Sebastian is driven to cement a legacy of responsive, structure‑focused governance. He aims to mentor emerging council members and legislators, passing on his pragmatic approach and
    ethical standards. His primary legislative ambition is to secure lasting funding for mental‑health services and senior support programs in Worcester County, addressing the anxiety and distress he knows
    can affect vulnerable populations. He also seeks to champion a statewide cultural‑heritage grant that would establish a Guatemalan community center in Southbridge, preserving his roots while fostering
    cross‑cultural understanding. Ultimately, he wants his policy initiatives to outlive his tenure, creating stable, predictable frameworks for his constituents.
