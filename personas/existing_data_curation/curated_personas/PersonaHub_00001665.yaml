  is also aware of the work of Linus Pauling and Dr. Sydney Bush in preventing and reversing atherosclerosis, and is advocating for the use of high doses of vitamin C and lysine to prevent and reverse atherosclerosis.
  The professor is also interested in the role of nutrition in preventing stroke and is advocating for the use of foods containing vitamin C to reduce the risk of stroke.
