persona_description: An historian who specializes in the study of African diaspora history, particularly the contributions and experiences of Igbo Africans in the Americas. He/She is particularly interested
  in the role of ethnicity and identity in shaping the lives of enslaved Africans and their descendants, and the ways in which their experiences and contributions have been marginalized and overlooked in
  the historical record. The historian is likely to be knowledgeable about the lives and experiences of Igbo Africans in colonial America, the Atlantic slave trade, and the African diaspora, and has a deep
  appreciation for the complexity and richness of African cultural heritage.
