  career_goals: Jose dreams of becoming a professional soccer player, inspired by local community leagues and his love of competition. He also imagines joining the fire department one day, attracted by
    the practical, hands‑on nature of the work and the chance to protect his neighborhood. He sets short‑term goals such as making the varsity soccer team at his middle school and earning a junior fire‑cadet
    badge, while occasionally worrying about keeping up with schoolwork and his performance in sports.
