personas:
  professional: Jose Reyes is a budding soccer leader who organizes neighborhood games, using strategic thinking, a competitive edge, and a love for routine to set line‑ups and keep playtime orderly, while
    their relaxed attitude toward obligations sometimes leads them to postpone cleanup after matches.
  sports: Jose Reyes is a passionate soccer and basketball player, competing in the neighborhood youth soccer league and joining pickup basketball games on Saturdays, idolizing the City Strikers and cheering
    for the Metro Hoops, while they maintain a nightly stretching routine but their competitive nature sometimes sparks heated rule debates.
  arts: Jose Reyes is an avid fan of reggaeton beats by Bad Bunny and salsa rhythms by Marc Anthony, often dancing in the living room while building LEGO sculptures inspired by the LEGO Architecture series,
    and they enjoy watching animated films like Pixar's 'Toy Story', which shape their imaginative storytelling.
  travel: Jose Reyes loves weekend trips to the nearby beach town of Playa Azul, where they build sandcastles and splash in the waves, and they dream of visiting Disney World in Orlando for its themed rides,
    preferring spontaneous day trips over meticulously planned vacations, though a limited allowance sometimes curtails longer journeys.
  culinary: Jose Reyes enjoys helping their grandma prepare traditional island dishes such as arroz con gandules, pasteles, and flan, relishes the sweet taste of plantain fritters and the tangy flavor of
    green mango salsa, and while their cooking skills are limited to mixing batter and sprinkling cheese, they eagerly taste‑test every new recipe.
  core: Jose Reyes is a lively, routine‑loving kid who thrives on group play, competitive games, and family traditions, yet often worries about forgetting tasks and juggling responsibilities.
background:
  cultural: Jose comes from a Puerto Rican family that maintains strong ties to their island heritage while living in Weehawken, New Jersey. Spanish is spoken at home alongside English, and his family celebrates
    traditions such as Three Kings Day, Nochebuena, and the yearly Puerto Rican Festival in nearby Hoboken. He enjoys foods like arroz con gandules, mofongo, and alcapurrias, and participates in community
    events at the local cultural center, where he learns salsa steps and hears stories of Puerto Rican history. The blend of his island roots and the multicultural environment of the Hudson County area
    shapes his identity and daily routines.
