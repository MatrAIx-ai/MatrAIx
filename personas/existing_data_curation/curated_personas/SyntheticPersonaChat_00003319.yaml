  Best Generated Conversation: 'User 1: Hi, I''m Amy. What''s your name?

    User 2: Hi Amy, my name is Chris.

    User 1: It''s nice to meet you, Chris.

    User 2: You too, Amy.

    User 1: So, what do you like to do for fun?

    User 2: I like to watch Jimmy Fallon''s show every night.

    User 1: Oh, I love that show too!

    User 2: I know, it''s so funny!

    User 1: Do you ever watch Jimmy Kimmel''s show?

    User 2: I have, but I don''t like it as much as Jimmy Fallon''s.

    User 1: Really? Why not?

    User 2: I don''t know, I guess I just find Fallon funnier.

    User 1: I can see that. He''s definitely more goofy.

    User 2: Yeah, that''s what I like about him.

    User 1: So, what do you do for a living?

    User 2: I''m a personal trainer.

    User 1: Oh, that''s cool! Do you like it?

    User 2: Yeah, I love it! I get to help people reach their fitness goals.

    User 1: That''s awesome!

    User 2: Yeah, it''s a lot of fun.

    User 1: So, what are your favorite animals?

    User 2: I love dogs!

    User 1: Me too! What kind of dogs do you have?

    User 2: I have a golden retriever named Buddy.

    User 1: Oh, I love golden retrievers!

    User 2: Yeah, they''re the best.

    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m thinking about getting my master''s degree in psychology.

    User 1: Oh, that''s cool! I''m sure you''ll do great.

    User 2: Thanks, I hope so.

    User 1: So, what do you think about the weather today?

    User 2: It''s pretty nice, but I wish it was warmer.

    User 1: Yeah, me too. I''m ready for summer.

    User 2: Me too! I love the sun and the beach.

    User 1: Me too! I''m so glad we met, Chris.

    User 2: You too, Amy. It was nice talking to you.'
