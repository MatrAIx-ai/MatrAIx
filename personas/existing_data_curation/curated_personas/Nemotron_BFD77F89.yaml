personas:
  professional: Wanona Spooner is an aspiring computational biologist who leverages her Python, MATLAB, and R expertise to build rigorous data pipelines while channeling her artistic flair into striking
    visual narratives, and their disciplined, competitive nature drives them to meet high research standards and win hackathon awards.
  sports: Wanona Spooner spends weekends hiking the Finger Lakes trails with a local outdoor club, captures nature photos during the hikes, and follows the Buffalo Bills and Rochester Red Wings, while occasionally
    playing pickup tennis at the campus recreation center to stay fit and satisfy their competitive streak.
  arts: Wanona Spooner regularly visits contemporary art museums to study installations by Yayoi Kusama and Olafur Eliasson, creates generative sketches inspired by Zach Lieberman's p5.js tutorials, and
    unwinds at intimate indie‑rock shows featuring The National and Tame Impala, letting these influences breathe life into their own visual storytelling.
  travel: Wanona Spooner meticulously plans low‑budget trips—having explored the historic streets of Ithaca, the vibrant food markets of Montreal, and a week‑long self‑guided tour of Tokyo’s art districts—yet
    they occasionally indulge in spontaneous weekend road‑trips to the Catskills when stress spikes, balancing curiosity with careful budgeting.
  culinary: Wanona Spooner, a competent at‑home cook, favors nutrient‑dense bowls like quinoa‑black‑bean salad with roasted sweet potatoes and a drizzle of tahini, enjoys perfecting miso‑ramen with fresh
    shiitake mushrooms, and treats themselves to artisanal avocado toast topped with smoked salmon and capers whenever a project deadline looms, reflecting a blend of health focus and occasional indulgence.
  core: Wanona Spooner blends razor‑sharp scientific rigor with a boundless artistic imagination, juggling competitive hackathon victories and nightly mindfulness rituals while secretly hoarding an ever‑growing
    stash of sketchbooks and worrying over every unsolved Sudoku puzzle.
background:
  cultural: Wanona grew up in a middle‑class white family in Geneseo, a small town in upstate New York. The region’s culture emphasizes self‑reliance, strong community bonds, and a high value placed on
    education and personal achievement. Her parents encouraged both scientific curiosity—through chemistry sets, robotics clubs, and summer STEM camps—and artistic exposure, taking her to museum trips and
    theater performances. The academic environment of nearby SUNY Geneseo reinforced a pragmatic yet progressive mindset, blending traditional American individualism with openness to unconventional ideas.
    This blend of Mid‑Atlantic American cultural norms and a supportive family background shapes her worldview and informs her disciplined yet exploratory approach to life.
