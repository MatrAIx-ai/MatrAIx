  hobbies: '[''Visiting art museums and galleries'', ''Sketching and digital illustration'', ''Generative art programming (Processing, p5.js)'', ''Reading science‑fiction'', ''Puzzle solving (Sudoku, logic
    puzzles)'', ''Hiking and nature photography'', ''Participating in hackathons'', ''Playing strategic board games (chess, Go)'', ''Attending indie‑music concerts'', ''Mindfulness meditation and journaling'']'
  career_goals: Wanona aims to leverage her STEM background and artistic curiosity by pursuing a Ph.D. in computational biology or data science within the next two years. She envisions a career as a research
    scientist who not only uncovers new scientific insights but also translates complex results into compelling visual narratives for broader audiences. In the short term, she plans to secure internships
    at biotech companies or research labs, contribute to interdisciplinary projects that blend analytics with design, and present her work at academic conferences and hackathons. Long‑term, she aspires
    to lead a multidisciplinary team, develop innovative AI‑driven visualization platforms, and possibly launch a startup that makes scientific data accessible through interactive art. She also prioritises
    developing strategies for stress management to sustain high performance.
