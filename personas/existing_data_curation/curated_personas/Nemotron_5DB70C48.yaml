  hobbies: '[''Peruvian Cooking'', ''Hiking'', ''Yoga'', ''Chess'', ''Reading Economic & Psychological Non‑Fiction'', ''Volunteering at Cultural Festivals'', ''Improv Workshops'', ''Traveling to Explore
    New Cuisines'']'
  career_goals: Rosa aims to earn the Certified Financial Planner (CFP) designation and subsequently launch her own boutique advisory firm that leverages technology to deliver personalized, data‑driven
    wealth management. She aspires to become a recognized thought leader on sustainable investing for Latino communities, publishing articles and speaking at industry conferences. Driven by her competitive
    nature, she seeks to rank among the top advisors in Montgomery County, expanding her client base to include high‑net‑worth Peruvian‑American families while mentoring junior advisors to uphold rigorous
    analytical standards.
