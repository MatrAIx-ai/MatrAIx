  hobbies: '[''Target shooting'', ''Hiking'', ''Weight training'', ''Reading true‑crime and investigative non‑fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''DIY home‑improvement'', ''Strategic video
    games'', ''Volunteering for community safety workshops'']'
  career_goals: Brenetta aims to advance from field operative to a supervisory role within the security firm, targeting a shift manager or operations coordinator position within the next three years. She
    plans to obtain advanced certifications in executive protection and cybersecurity integration to broaden her expertise. Ultimately, she aspires to launch her own boutique security consultancy focused
    on protecting high‑risk individuals and critical infrastructure in the Texas Hill Country, leveraging her competitive drive and practical knowledge to become a recognized expert in the field.
