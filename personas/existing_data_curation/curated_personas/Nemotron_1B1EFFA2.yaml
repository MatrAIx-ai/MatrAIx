  hobbies: '["Sketching and digital illustration", "Asian calligraphy", "Exploring local art museums", "K‑pop dance practice", "Playing piano", "Reading graphic novels", "Volunteer tutoring", "Community
    gardening", "Journaling", "Cooking family recipes"]'
  career_goals: Le dreams of blending her artistic passion with her desire to help others by becoming an art therapist or community arts program director. In the short term, she aims to earn a place in
    a specialized high‑school visual‑arts magnet program, lead a youth art club in her neighborhood, and continue her peer‑mediator certification. Long‑term, she envisions studying psychology and fine arts
    at a university, obtaining a master’s in art therapy, and establishing a culturally inclusive art‑based counseling center that serves immigrant families in Queens. She also hopes to advocate for mental‑health
    awareness among adolescents through creative workshops.
