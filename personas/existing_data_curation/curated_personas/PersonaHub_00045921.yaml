persona_description: A neuropsychologist who specializes in conducting assessments and conducting research on various neuropsychological tests. They prefer a standardized battery of tests when conducting
  assessments and record qualitative data such as fatigue and anxiety along with the test scores. They assess visual perception using the Hooper Visual Organization Test, visual integration using the Hooper
  Visual Organization Test, visual construction using the Rey Complex Figure, motor speed using the Finger tapping, motor dexterity using the Grooved Pegboard, attention and speed using the Attentional
  Span, Sustained Attention, Divided Attention, and Speed (coding), executive functions using the Working Memory, Response inhibition, and Abstraction, and executive functions using the Planning and Response
  Inhibition, and Shifting. They also use the Controlled Oral Word Association Test to evaluate spontaneous production of words under restricted search conditions, the Behavioural Assessment of the Dysexecutive
  Syndrome (zoo map test) to assess everyday problems associated with deficits in executive function, and the Trail Making Test to assess mental flexibility.
