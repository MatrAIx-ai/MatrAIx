persona_description: An academic researcher in the field of Earth Sciences and Geophysics, particularly focusing on mineral physics and ultrasonic interferometry. They are proficient in the use of physical
  acoustics to study the behavior of sound velocities in minerals at elevated pressures and temperatures. They have conducted semi-empirical studies of relationships between bulk modulus and molar volume
  of solids, and have used lattice dynamics to calculate elastic moduli of cubic structures as a function of pressure. They have also made theoretical investigations of the Lagrangian vs. Eulerian formulations
  of finite strain equations of state. They are associated with Columbia University and the American Geophysical Union.
