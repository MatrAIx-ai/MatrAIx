  hobbies: '[''Gardening'', ''Traditional Honduran cooking'', ''Church attendance and volunteer work'', ''Reading historical fiction'', ''Watching telenovelas'', ''Listening to tropical and salsa music'',
    ''Neighborhood walks'', ''Crocheting'', ''Crossword puzzles'']'
  career_goals: Although retired from formal employment, Nataliah aims to deepen her impact in the community by volunteering as a cultural liaison at the local senior center, helping newer immigrants navigate
    services. She aspires to compile a family cookbook featuring traditional Honduran recipes, preserving her heritage for future generations. Additionally, she hopes to become a certified community health
    advocate, focusing on nutrition and wellness for seniors, and to mentor a small group of young adults interested in culinary arts and entrepreneurship.
