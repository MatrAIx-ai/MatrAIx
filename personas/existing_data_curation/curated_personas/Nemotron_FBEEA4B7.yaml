  hobbies: '[''Photography of street art and gardens'', ''Attending intimate jazz performances'', ''Experimenting with Southern and global cuisine'', ''Community gardening'', ''Reading biographies of artists
    and civil‑rights figures'', ''Playing chess at the community center'', ''Writing reflective journal entries'', ''Volunteering as a docent at local museums'']'
  career_goals: Though retired from formal employment, Antonio’s ambitions focus on lifelong learning and community contribution. He aims to become a regular docent at the National Center for Civil and
    Human Rights, where he can share his knowledge of African‑American art and local history. He plans to expand the community garden he co‑started with neighbors, introducing heirloom vegetable varieties
    and organizing seasonal harvest festivals that foster neighborhood connection. Antonio also aspires to complete a memoir that weaves together his experiences of the civil‑rights era, his love for art,
    and family culinary traditions, potentially self‑publishing a modest chapbook. On the technological front, he wishes to develop basic documentary‑making skills to capture short videos of local artists,
    thereby preserving and broadcasting their work beyond the immediate community.
