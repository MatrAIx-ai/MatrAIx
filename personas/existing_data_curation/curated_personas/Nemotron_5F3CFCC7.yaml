personas:
  professional: Vongsavanh Betz is a budding robotics hobbyist who constructs intricate LEGO Mindstorms creations, applying their logical, highly organized mind to program precise movements while constantly
    setting milestones to outdo their previous builds.
  sports: Vongsavanh Betz plays forward for the local youth soccer club, the Greenfield Tigers, practices twice a week, and occasionally joins a school intramural basketball team, balancing competitive
    drive with disciplined drills.
  arts: Vongsavanh Betz immerses themselves in mystery novels by Agatha Christie, admires the whimsical animation of Hayao Miyazaki, and channels that inspiration into building LEGO cityscapes that echo
    the architectural style of classic European skylines.
  travel: Vongsavanh Betz prefers short, well‑planned trips, having explored Yellowstone National Park's geysers on a family hike, navigated the bustling streets of Tokyo on a school exchange, and dreams
    of visiting the LEGO House in Billund, Denmark for a hands‑on adventure.
  culinary: Vongsavanh Betz favors savory pizza with pepperoni, enjoys constructing homemade sushi rolls with fresh salmon and avocado, and occasionally attempts to bake chocolate chip cookies, though they
    often over‑mix the dough in their quest for perfect texture.
  core: Vongsavanh Betz blends disciplined curiosity with a love for structured play, turning every LEGO brick and chess move into a step toward mastering both imagination and precision.
background:
  cultural: Vongsavanh comes from a white, Midwestern family settled in Lovington, Illinois. His upbringing reflects the region’s values of hard work, community involvement, and modest celebration of holidays
    such as Thanksgiving and Fourth of July. His family emphasizes practicality, regular routines, and a supportive school environment. Participation in local community events, church gatherings, and school
    activities form an important part of his cultural experience, fostering a sense of belonging and responsibility to his small‑town community.
attributes:
  skills: '[''Organizational skills'', ''Attention to detail'', ''Mathematics proficiency (fractions, ratios, geometry)'', ''Reading comprehension (mystery and non‑fiction)'', ''Basic coding in Scratch'',
