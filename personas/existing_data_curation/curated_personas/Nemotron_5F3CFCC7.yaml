  hobbies: '[''LEGO building'', ''Lego Mindstorms robotics'', ''Chess'', ''Reading mystery novels'', ''Soccer'', ''Nature hikes'', ''School science club'']'
  career_goals: Vongsavanh aspires to pursue a career that blends his love for structure, problem‑solving, and tangible results. His immediate ambition is to maintain high academic performance through middle
    school and join his school's STEM club and later a robotics team. He dreams of becoming a civil engineer or architect, designing safe, functional community structures such as bridges and schools. To
    achieve this, he aims to earn top grades in math and science, participate in summer engineering camps, and eventually attend a university with a strong engineering program.
