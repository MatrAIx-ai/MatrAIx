  career_goals: Linda aims to secure her CPA designation within the next year, advance to senior audit manager within five years, and eventually become a partner at her firm, leading a specialized compliance
    and risk advisory practice. She is dedicated to championing mentorship programs for women in accounting, fostering an inclusive workplace culture, and maintaining a balanced work‑life schedule that
    supports her family and community involvement.
