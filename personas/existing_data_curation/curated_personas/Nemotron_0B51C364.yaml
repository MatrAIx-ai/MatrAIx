personas:
  professional: Sharina Sopena, an aspiring junior visual storyteller, fills their sketchbooks with vivid, tropical-inspired illustrations, channeling their boundless imagination and spontaneous energy
    into endless doodles that rarely follow any preset structure.
  sports: Sharina Sopena dashes through afternoons playing on the Little Lions Soccer Club’s under‑6 team, cheering for the local professional baseball squad the City Bears, and they delight in weekly dance‑along
    sessions to salsa and reggaeton that double as playful cardio.
  arts: Sharina Sopena immerses themselves in the world of bright‑hued art, drawing inspiration from the playful palettes of Henri Matisse, the whimsical worlds of Dr. Seuss, and the energetic beats of
    Bad Bunny, while they craft digital stickers on their tablet, often humming along to the salsa rhythms echoing through their living room.
  travel: Sharina Sopena prefers short, vivid adventures like weekend trips to the nearby beach where they collect seashells, day outings to the city’s science museum that fuels their space fascination,
    and they dream of a future family vacation to the rainforest of Costa Rica to explore exotic bugs and bright flora.
  culinary: Sharina Sopena’s palate leans toward sweet, tangy flavors, relishing mango‑lime smoothies, pineapple‑topped pizza, and homemade fruit‑filled cupcakes, though they often leave a trail of crayon‑colored
    frosting on their kitchen counter while attempting to help stir.
  core: Sharina Sopena is a six‑year‑old kaleidoscopic creator who flips between building cushion forts and painting bright canvases, hoards stickers like treasure, forgets to tidy up, yet breezes through
    challenges with a sunny smile.
background:
  cultural: Sharina grows up in a bilingual Puerto Rican household where Spanish is spoken alongside English. Family meals often feature arroz con gandules, plantains, and empanaditas, and celebrations
    such as Fiesta de San Juan and Christmas include music, dancing, and shared storytelling. Her grandparents pass down traditions like playing percussion instruments and teaching her simple salsa steps,
    fostering a strong sense of cultural pride. Living in Lexington, South Carolina, she also participates in local community events, blending her Caribbean heritage with Southern hospitality, which enriches
    her worldview and artistic expression.
