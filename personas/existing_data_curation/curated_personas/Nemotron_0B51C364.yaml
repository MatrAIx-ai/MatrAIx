    books", "digital art on tablet", "playing with LEGO and building blocks"]'
  career_goals: She aspires to become a picture‑book author and illustrator who can bring her vibrant imagination to life, dreams of designing toys that spark creativity in other kids, and sometimes imagines
    herself as an astronaut who discovers new colors on distant planets. She also hopes to lead a community art club at her future school where children can share stories and art.
