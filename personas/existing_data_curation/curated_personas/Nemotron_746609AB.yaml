    Planning'', ''Technical Documentation'', ''Certified Microsoft Azure Database Administrator'', ''Certified Oracle Database Professional'']'
  hobbies: '[''Reading classic science‑fiction'', ''Building scale model kits'', ''Woodworking'', ''Fishing'', ''Solo hiking in the Virginia countryside'', ''Online chess'', ''Collecting and watching 1950s
    American films'']'
  career_goals: James seeks to transition from senior DBA to a strategic data architect role where he can shape enterprise‑wide data platforms, champion robust data governance, and mentor junior engineers.
    He aims to earn advanced certifications in cloud database services (AWS Certified Database – Specialty, Azure Database Administrator Associate) and to lead a cross‑functional team that delivers zero‑downtime
    migrations to cloud environments. He values stability for his family, so he prefers roles that offer predictable workloads, remote flexibility, and a clear roadmap for professional growth while allowing
    him to showcase his competitive drive through measurable performance improvements.
