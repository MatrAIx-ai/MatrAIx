personas:
  professional: Jane Alves is a methodical network engineer in Oklahoma who excels at designing resilient infrastructures, scripting automation with PowerShell and Bash, and keeping documentation meticulous,
    and they aim to lead a team as a senior engineer within five years.
  sports: Jane Alves hikes the Wichita Mountains with the Oklahoma Trails Club, follows the Oklahoma City Thunder and the Sooners football team, and they participate in a local adult softball league, balancing
    occasional cardio runs with a preference for steady, low‑impact activity.
  arts: Jane Alves devotes evenings to unraveling Agatha Christie mysteries, enjoys the soulful twang of Johnny Cash and Emmylou Harris, attends quarterly performances by the Tulsa Community Theatre, and
    they sing in their church choir, letting art nurture their routine‑driven soul.
  travel: Jane Alves plans meticulous road trips to historic sites like Santa Fe and natural wonders such as the Great Smoky Mountains, favors week‑long stays that fit their budget and family schedule,
    and they postpone exotic overseas vacations until their career stabilizes.
  culinary: Jane Alves loves preparing hearty chicken and dumplings, smoky Oklahoma barbecue ribs, and seasonal vegetable medleys seasoned with rosemary and thyme, often tweaking family recipes to add a
    modern twist, and they occasionally over‑salt dishes in their quest for flavor.
  core: Jane Alves blends a love for precise network diagrams with a green thumb, never missing a Saturday garden routine, and they secretly hoard extra Ethernet cables like trophies of past successes.
background:
  cultural: Jane grew up in a modest, white, middle‑class family in rural Oklahoma, surrounded by Midwestern values of hard work, self‑reliance, and community service. Her upbringing was rooted in a Baptist
    church, emphasizing traditional family ties, respect for routine, and practical stewardship. The local culture, shaped by agriculture, oil industry, and small‑town solidarity, has reinforced her preference
    for stability, practicality, and close‑knit social circles.
attributes:
  skills: '[''Network troubleshooting'', ''Server administration'', ''Cisco routing and switching'', ''Windows Server management'', ''Linux system administration'', ''Virtualization (VMware, Hyper‑V)'',
    ''Network security and firewall configuration'', ''Backup and disaster recovery planning'', ''PowerShell and Bash scripting'', ''IT documentation and SOP creation'', ''Technical support'', ''Project
    planning and implementation'', ''System monitoring (Nagios, SolarWinds)'', ''Vendor liaison'', ''IT budgeting'']'
  hobbies: '[''Gardening'', ''Reading mystery and non-fiction books'', ''Cooking traditional meals'', ''DIY home improvement projects'', ''Hiking local trails'', ''Maintaining a personal home network lab'',
    ''Volunteering at church events'', ''Puzzling (Sudoku, crosswords)'', ''Listening to classic country music'']'
  career_goals: Jane aims to advance to a senior network engineer or IT manager role within the next five years, leading a small team that supports regional operations in Oklahoma. She plans to earn advanced
    certifications such as Cisco CCNP and Microsoft MCSE to deepen her expertise. Her long‑term ambition is to become a trusted technology leader who improves network reliability, strengthens cybersecurity,
    and mentors junior staff while maintaining a stable work‑life balance that supports her family and community commitments.
