  hobbies: '[''sketching and drawing'', ''digital painting (Procreate)'', ''video game streaming'', ''competitive multiplayer gaming (e.g., League of Legends)'', ''hiking local trails'', ''listening to
    alternative rock'', ''video editing'', ''youth theater set design'', ''DIY electronics (Arduino)'', ''reading graphic novels'']'
  career_goals: Michael aims to turn his passion for art and technology into a career in video game design or digital media production. He plans to enroll in a high‑school program focused on visual arts,
    build a strong portfolio of mixed‑media artwork and coded prototypes, and secure an internship with a local studio. After high school, he hopes to earn a degree in interactive media or graphic design,
    and eventually launch his own indie game studio that blends his competitive gaming insight with creative design. In the short term, he wants to improve his academic standing to graduate high school
    with honors and develop a showcase of his digital illustrations and simple game projects.
