personas:
  professional: Michael Young, a teen multimedia creator, blends sketching, digital painting, and live game streaming to build an emerging personal brand; their competitive edge fuels rapid skill growth,
    while their curiosity drives them to experiment with Arduino‑driven interactive art for youth theater set designs.
  sports: Michael Young keeps fit by hiking the Bull Run Regional Park trails, playing on a local youth soccer team, and following the Washington Capitals, Wizards, and DC United, channeling their competitive
    spirit into regular cardio and weekend pick‑up basketball games.
  arts: Michael Young channels a love for graphic novels into sketches inspired by Jim Lee and Katsuhiro Otomo, listens to Arctic Monkeys, Foo Fighters, and Tame Impala while creating, and designs theatrical
    sets for the youth theater, often integrating DIY Arduino lighting rigs.
  travel: Michael Young prefers short, high‑impact trips that feed artistic curiosity, having explored Washington, D.C.’s museums and Shenandoah’s Skyline Drive, they now dream of attending Japan’s Comiket
    and San Diego Comic‑Con, planning each journey around school breaks and a limited budget.
  culinary: Michael Young’s palate leans toward quick, flavorful meals—spicy ramen, pepperoni pizza, and chicken tacos—and their cooking skill is modest, often assembling midnight nachos with jalapeños
    and salsa between gaming sessions.
  core: Michael Young is a competitive teen creator who blends art, gaming, and tinkering, juggling a strategic approach to money, a cautious health routine, and a restless curiosity that fuels both digital
    and outdoor adventures.
background:
  cultural: Michael is a white American teenager raised in a middle‑class family in Warrenton, Virginia. He grew up with a blend of traditional Southern small‑town customs—such as community fairs, local
    high‑school sports events, and family gatherings during holidays—and modern digital culture through the internet and gaming communities. His parents value education, self‑reliance, and a strong work
    ethic, encouraging his artistic pursuits while expecting responsibility at home. He celebrates typical American holidays, enjoys visits to nearby historic sites like Manassas National Battlefield, and
    experiences both rural and suburban influences through weekend trips to farms, local markets, and school programs that offer art and technology. He identifies with contemporary teen subcultures, following
    online art platforms, streaming services, and gaming trends, which broaden his perspective beyond his immediate environment.
