  hobbies: '["Reading historical non-fiction", "Listening to Motown, soul, and jazz", "Chess", "DIY electronics projects", "Rebuilding vintage radios", "Fishing on the Detroit River", "Gardening", "Mentoring
    youth at church", "Puzzle solving (crosswords, sudoku)"]'
  career_goals: Approaching retirement, John aims to cement his legacy as a trusted quality‑control mentor within his plant. He plans to earn a Certified Quality Inspector credential and complete a Six
    Sigma Green Belt course to formalize his expertise. His short‑term goal is to lead a small team of junior inspectors, sharing his practical knowledge while championing safer, less stressful work procedures.
    In the longer term, John hopes to transition into a part‑time consulting role for local small manufacturers, helping them set up robust inspection processes and offering occasional workshops on equipment
    calibration and basic statistical quality control. Financial stability and a smooth transition out of full‑time labor are central to his ambitions.
