persona_description: A student or academic interested in ancient linguistics, particularly those studying the languages of the Greek and Roman worlds. The individual is likely to have a background in classical
  studies or ancient history, and may have an interest in the study of language and society. They may also have an interest in comparative linguistics, sociolinguistics, or language contact. They are likely
  to be familiar with the works of J.N. Adams and interested in reading other works on ancient sociolinguistics. They are interested in the diversity of the ancient Mediterranean and the role of language
  in shaping social and cultural identities. They may also be interested in the languages of Christianity and how they relate to the ancient world.
