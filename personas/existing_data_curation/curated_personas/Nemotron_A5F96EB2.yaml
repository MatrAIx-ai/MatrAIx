  career_goals: Although retired, Peter aims to remain intellectually active and to leave a lasting contribution to his community. He plans to complete a series of handcrafted benches for the town park,
    develop a small oral-history collection of longtime Marshalltown residents, and publish a concise memoir that captures the changes in Midwestern small-town life over the past seven decades. He also
    seeks to maintain his health through regular walking and gardening, and he hopes to travel to a few state parks in the region, applying his curiosity to learn about local ecosystems while respecting
    practical constraints.
