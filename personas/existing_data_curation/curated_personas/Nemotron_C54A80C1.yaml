  career_goals: James aims to earn a bachelor's degree in Educational Leadership within the next three years, positioning himself for a senior director role at a regional youth services center. He is passionate
    about expanding mental‑health support and trauma‑informed practices within after‑school programs, and hopes to integrate modest technology tools that enhance learning without sacrificing proven hands‑on
    methods. Long‑term, he envisions launching a community‑driven mentorship network that links local businesses, schools, and families to provide holistic support for at‑risk children while also advocating
    for staff wellbeing and professional development.
