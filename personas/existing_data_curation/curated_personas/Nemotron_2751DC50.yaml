  hobbies: '[''Desert hiking'', ''Model railroad building'', ''Reading historical non-fiction'', ''Vintage vehicle restoration'', ''Photography (landscapes and industrial)'', ''Volunteering (basic vehicle
    maintenance workshops)'', ''Golf'', ''Drone piloting'', ''DIY home projects'']'
  career_goals: Approaching retirement, Richard aims to channel his practical curiosity into measurable improvements and mentorship. In the next five years he hopes to lead a company‑wide initiative to
    transition the fleet to greener technologies, such as hybrid trucks and optimized routing for reduced emissions. He plans to obtain the Certified Transportation Professional (CTP) designation and to
    mentor emerging supervisors through an internal apprenticeship program. Ultimately, he envisions moving into a senior advisory role—either as a part‑time Operations Manager or as a consultant helping
    small logistics firms in the Southwest adopt best‑practice safety and efficiency standards—while ensuring a financially secure retirement.
