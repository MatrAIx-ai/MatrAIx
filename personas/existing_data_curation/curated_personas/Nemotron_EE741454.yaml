  hobbies: '[''Hiking'', ''Bird‑watching'', ''Nature Journaling'', ''Photography'', ''Reading mystery novels'', ''Playing piano'', ''Debate club'', ''Knitting'', ''Sudoku'', ''Volunteering at the local
    animal shelter'']'
  career_goals: Kelly aims to pursue a college degree in wildlife biology or veterinary technology at a Colorado university, with the long‑term goal of becoming a wildlife rehabilitator or conservation
    biologist. She values a career that offers clear pathways, job stability, and the chance to apply her methodical nature to protecting the state's natural habitats. To prepare, she plans to take advanced
    science courses, earn certifications in first aid and animal care, and secure internships with local wildlife rescue organizations. She also envisions a backup plan of working in environmental education,
    where she could combine her love of nature with her organizational strengths to develop curriculum and field programs for students.
