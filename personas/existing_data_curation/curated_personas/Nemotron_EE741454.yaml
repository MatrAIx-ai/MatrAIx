personas:
  professional: Kelly Nesmith, an aspiring environmental researcher with a focus on mountain ecosystems, they blend their methodical nature‑journal habit and debate‑club research skills to design structured
    field studies, while their love of hiking the Sangre de Cristo range fuels a career vision grounded in real‑world observation.
  sports: Kelly Nesmith, an avid outdoor enthusiast, they log weekly hikes in the Sangre de Cristo Mountains with the Colorado Springs Hiking Club, compete on the high school cross‑country team during the
    fall season, and follow the Colorado Rockies and Colorado Avalanche for inspiration, approaching fitness with a structured schedule that balances endurance runs and strength drills.
  arts: Kelly Nesmith, a disciplined young artist, they practice piano three times a week, tackling Beethoven’s Moonlight Sonata and Yiruma’s River Flows in You while drawing inspiration from pianist Lang
    Lang, devour mystery novels by Gillian Flynn and Agatha Christie, and unwind by knitting scarves to the rhythm of folk playlists, often attending performances by the Colorado Springs Philharmonic when
    time permits.
  travel: Kelly Nesmith, a meticulous teen traveler, they have hiked the Great Smoky Mountains and explored Zion National Park, keep a scrapbook of trail maps, and dream of bird‑watching in Patagonia’s
    Torres del Paine and trekking the Scottish Highlands, planning each adventure with a checklist, budget spreadsheet, and parental permission, while balancing school commitments that limit travel to summer
    breaks.
  culinary: Kelly Nesmith, a practical young cook, they favor nutrient‑dense meals like quinoa bowls with chickpeas, spinach, and avocado, whip up apple‑cinnamon oatmeal for breakfast, blend blueberry‑banana
    smoothies with almond butter, and occasionally bake chocolate chip cookies despite a tendency to over‑mix, while they usually refuel after hikes with homemade trail‑mix bars and treat friends to slices
    of pepperoni pizza from the neighborhood pizzeria.
  core: Kelly Nesmith, a 15‑year‑old with a love for structured outdoor adventures, meticulous note‑taking, and a quiet anxiety that fuels disciplined routines, they often juggle piano practice, debate
    prep, and a carefully budgeted savings plan, while occasionally forgetting to relax.
background:
  cultural: Kelly comes from a white, Mid‑Western American family with German and Irish ancestry that settled in the Colorado Rockies during the late 19th‑century westward migration. Growing up in Salida,
    a small mountain town, she has been shaped by a culture that values self‑reliance, neighborly cooperation, and a deep respect for the surrounding natural environment. Community traditions such as the
    Salida Summer Festival, Fourth of July parades, and local outdoor recreation clubs reinforce a sense of shared heritage and a love of the outdoors. These regional influences, combined with her family's
    emphasis on hard work and practical skills, inform Kelly's worldview and personal priorities.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Study Scheduling'', ''Academic Writing'', ''Basic First Aid'', ''Horticulture'', ''Animal Care'', ''Computer Literacy (Google Workspace)'',
