  career_goals: Guided by her love of art, empathy for others, and curiosity about the world, Janelle dreams of becoming a children’s‑book illustrator who can bring stories to life with vivid pictures.
    She also envisions herself as an elementary school teacher who weaves creativity into lessons to engage and support students. As she grows, she hopes to create community art workshops or after‑school
    clubs where kids can express themselves, build confidence, and find a supportive space, combining her artistic talent with her desire to nurture harmony and joy.
