personas:
  professional: A budding junior illustrator, Janelle Davis channels her curiosity for space and dinosaurs into detailed drawings and vibrant paintings, and they eagerly share their creations with classmates
    while balancing organized sketchbooks with spontaneous bursts of color.
  sports: An enthusiastic participant in the after‑school soccer club, Janelle Davis cheers for the Chicago Cubs, the Chicago White Sox, and the Chicago Bulls on game nights, practices with the Westbrook
    Wolves junior team, and they love the occasional family hike in the nearby state park to stay active.
  arts: A vibrant young creator, Janelle Davis delights in drawing whimsical creatures, crafting friendship bracelets, singing Disney songs in the school choir, and they find inspiration in the paintings
    of Yayoi Kusama, the storytelling of Dr. Seuss, and the melodies of the Pixar "Lava" soundtrack.
  travel: A curious explorer, Janelle Davis has visited the Natural History Museum in Washington, D.C., the dinosaur exhibit at the Field Museum in Chicago, and they dream of a summer trip to the Kennedy
    Space Center, preferring family‑planned day trips with plenty of photo‑ops and scavenger‑hunt challenges along the way.
  culinary: A budding kitchen assistant, Janelle Davis loves mixing chocolate chip cookies, sprinkling rainbow fruit salad with strawberries, blueberries, and kiwi, and they often trade their favorite peanut‑butter‑jelly
    sandwich for a slice of pepperoni pizza at school parties.
  core: A talkative, empathy‑driven 9‑year‑old, Janelle Davis balances an insatiable curiosity for art and space with occasional anxiety, thriving on social connection while sometimes overindulging in glitter
    supplies.
background:
  cultural: Janelle was raised in a middle‑class family in Modesto, California, a city in the agricultural heart of the Central Valley. Her household reflects typical suburban American values, with an emphasis
    on education, community involvement, and a supportive family environment. While the community is predominantly white, the region’s diverse cultural heritage—from farm‑worker traditions to local festivals—exposes
    her to a variety of perspectives. She attends public elementary school, participates in after‑school art programs, and enjoys community events such as the Modesto Harvest Festival and local library
    story hours. Her upbringing blends the stability of a close‑knit family with the broader, multicultural influences of California’s Central Valley, shaping her appreciation for both harmony and creative
    expression.
