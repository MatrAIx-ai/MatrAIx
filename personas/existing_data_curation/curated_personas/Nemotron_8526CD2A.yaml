  hobbies: '[''Painting (acrylic)'', ''Visiting art galleries and museums'', ''Latin dance (salsa, bachata)'', ''Cooking traditional Mexican cuisine'', ''Volunteering at Hispanic cultural center'', ''Reading
    contemporary fiction and poetry'', ''Gardening (herbs and vegetables)'', ''Hiking local nature trails'', ''Hosting dinner parties for friends and family'', ''Participating in book clubs'']'
  career_goals: Jaime envisions leveraging her supervisory expertise and artistic sensibility to assume a senior administrative leadership role within a nonprofit or cultural organization that serves the
    Hispanic community in the South. Over the next five years she plans to earn a certificate in nonprofit management, lead a regional outreach initiative that pairs local schools with Mexican cultural
    workshops, and ultimately become Director of Operations for a regional arts council. She is eager to design and implement innovative workflow models that integrate cultural programming into everyday
    office practices, reflecting her love for unconventional thinking. Jaime also aspires to mentor emerging women leaders in administrative fields, champion diversity and inclusion policies, and create
    a supportive environment that mitigates stress for her teams.
