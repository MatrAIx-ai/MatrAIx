personas:
  professional: Vivian Smith, a teenage aspiring concept artist and multimedia storyteller, fuses self‑taught mastery of Procreate, Photoshop, and Ableton Live into sketch‑first visual narratives and beat‑driven
    soundscapes, channeling boundless imagination into prototype art packs while their laid‑back attitude toward deadlines fuels spontaneous brilliance but often leaves school assignments unfinished.
  sports: Vivian Smith spends Saturdays at the community skate park perfecting freestyle tricks and street lines with friends, while cheering on the local minor‑league hockey team, the River City Riveters,
    during winter and following the Chicago Bulls in the NBA season, blending a low‑key fitness routine with a competitive edge that drives personal skate goals more than formal workout schedules.
  arts: Vivian Smith immerses themselves in visual and auditory art, drawing inspiration from James Jean’s surreal paintings, Yoji Shinkawa’s game concept art, the spoken‑word poetry of Sarah Kay, and the
    improvisational jazz of Miles Davis, while regularly attending open‑mic nights featuring local beatboxer Kira Beats and exploring retro comic art exhibitions at the downtown gallery.
  travel: Vivian Smith loves low‑budget, spontaneous road trips to nearby art festivals in Portland and the annual comic convention in San Diego, and dreams of a backpacking adventure through Kyoto’s historic
    districts and Tokyo’s neon streets to soak up Japanese pop culture, but limited teen resources keep most journeys to school‑organized field trips and family‑sponsored weekend getaways.
  culinary: Vivian Smith favors eclectic, flavor‑rich meals, often crafting avocado toast seasoned with smoked paprika, vegan ramen bowls brimming with miso‑rich broth, sriracha‑glazed tofu, and pickled
    radish, while indulging in vintage mac‑and‑cheese from a retro diner on weekends, and boasts a moderate cooking skill that shines when experimenting with artisanal Ethiopian coffee beans.
  core: Vivian Smith is a restless teen dreamer who stitches sketches, beats, and poetry into sprawling fantasy worlds, thriving on spontaneous creativity yet frequently losing track of deadlines, and they
    can’t resist midnight thrift‑store hunts for vintage tees.
background:
  cultural: Vivian is an African‑American teenager growing up in the suburban community of Geneva, Ohio. Her family maintains strong ties to the Black church and community gatherings, where gospel music
    and oral storytelling are central. She draws inspiration from African‑American artistic traditions, from the rhythms of hip‑hop to the legacy of Black visual artists like Romare Bearden and contemporary
    illustrators online. Navigating a predominantly white school environment, she balances pride in her heritage with curiosity about broader cultural perspectives, often incorporating motifs of Black culture
    into her artwork and music.
attributes:
  skills: '[''Digital illustration'', ''Creative writing (poetry, short stories)'', ''Graphic design (Procreate, Photoshop)'', ''Music production (Ableton Live)'', ''Improvisational storytelling'', ''Critical
    thinking'', ''Puzzle solving'']'
  hobbies: '[''Sketching and drawing'', ''Creative writing (poetry, short stories)'', ''Music beat‑making and lyric writing'', ''Playing story‑driven video games'', ''Exploring thrift stores for art supplies'',
    ''Attending local jazz/spoken‑word events'', ''Casual skateboarding'']'
  career_goals: Vivian aims to transform her passion for art and abstract concepts into a career that creates immersive visual and audio experiences. She dreams of becoming a concept artist and multimedia
    storyteller for video games or independent films, eventually running her own studio that blends art, music, and narrative. While seeking flexibility, she plans to attend a community college for graphic
    design or visual arts to deepen her technical skills. She also hopes to mentor other young artists from under‑represented backgrounds, channeling her competitive drive into both personal success and
    community uplift.
