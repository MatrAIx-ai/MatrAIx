persona_description: A geologist who specializes in the study of volcanic geology and the formation of cinder cones. His research interests include the study of the sequence of events that leads to the
  formation of a cinder cone, the characteristics of the cone, and the processes that contribute to its erosion and eventual disappearance. He has studied Parícutin, a prominent cinder cone in Mexico, and
  has learned a great deal about the formation of composite volcanoes and the modification of a volcanic landform by erosion. He is interested in the role of magma conduit systems in the formation of composite
  volcanoes and the variation of volcanic landforms such as calderas. He is also interested in the impact of volcanic eruptions on the surrounding environment, including the destruction of towns and the
  formation of ash flows.
