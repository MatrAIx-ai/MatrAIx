personas:
  professional: Ida Welch, a seasoned registered nurse on a medical‑surgical unit, leverages their love of routine and step‑by‑step checklists to deliver flawless IV therapy, mentor new staff, and spearhead
    a patient‑safety initiative aimed at cutting medication errors as they work toward a charge‑nurse certification.
  sports: Ida Welch walks their golden retriever along the regional nature trail three times a week, joins a weekend community walking club for low‑impact cardio, and avidly roots for the hometown baseball
    team, the River City Royals, preferring steady, familiar exercise over high‑intensity gym sessions.
  arts: Ida Welch knits hospital‑gift blankets while devouring 19th‑century American novels by authors like Louisa May Alcott, and they unwind to the folk sounds of Brandi Carlile during weekend baking,
    letting the rhythmic needle work echo the steady cadence of their nursing routines.
  travel: Ida Welch plans weekend retreats to cabins near Shenandoah National Park for predictable, garden‑view mornings, and they nurture a long‑standing dream of a spring visit to Williamsburg to walk
    the historic streets that echo the 19th‑century stories they cherish.
  culinary: Ida Welch bakes sourdough bread and apple‑cinnamon pie using rosemary and thyme harvested from their garden, boasts a confident home‑cook skill set that lets them whip up hearty vegetable stews,
    and they treat dough kneading as a therapeutic ritual after a demanding shift.
  core: Ida Welch is a routine‑driven nurse who channels their love for orderly processes into patient care, garden‑fresh baking, and quiet creative pursuits, while they quietly wrestle with work‑induced
    stress and occasional lapses in organization.
background:
  cultural: Ida grew up in a mid‑western, small‑town environment in Indiana, raised by a family with roots in German and Irish ancestry. Her upbringing emphasized practicality, self‑reliance, and community
    service, values reinforced by a Protestant (Methodist) church that fostered regular volunteerism and modest, straightforward communication. The local culture of modesty, politeness, and a strong work
    ethic shaped her traditional outlook, while a family tradition of nursing—her mother and aunt were also nurses—instilled a deep respect for health‑care service and routine. She continues to participate
    in regional events such as county fairs and church gatherings, maintaining the close‑knit community ties that are central to her identity.
