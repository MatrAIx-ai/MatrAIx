  career_goals: Ida aims to build on her associate’s degree by completing a Bachelor of Science in Nursing within the next two years, positioning herself for a charge‑nurse role on her unit. She seeks certification
    as a Certified Medical‑Surgical Nurse and hopes to lead a patient‑safety initiative that reduces medication errors. Balancing her ambition with family life, Ida plans to establish a predictable shift
    schedule that supports her need for routine while also creating a mentorship program to support junior nurses and promote a supportive, low‑stress work environment.
