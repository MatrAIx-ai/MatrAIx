persona_description: A highly accomplished and ambitious twin sister duo, Peter and Paula Imafidon, who have achieved remarkable success in various fields such as academic achievement, music, and sports.
  They are recognized as the "Wonder Twins" and have broken numerous records, including being the youngest children in British history to attend high school and pass the University of Cambridge's advanced
  mathematics exam. Both twins have expressed aspirations to serve as Prime Minister and teach math, respectively. They are also musicians and have a unique talent for sports. The twins have a unique and
  special knowledge and skills in mathematics and are involved in the STEM program to fulfill the need for math and science female leaders.
