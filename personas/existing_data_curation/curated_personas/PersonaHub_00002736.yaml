persona_description: A social scientist who studies the relationship between parental employment patterns and the quality of father-child relationships in families with children. They are particularly interested
  in the effects of mother's working hours, the main breadwinner status, and the presence of a non-biological father figure on the father-child relationship. They are also interested in the role of adverse
  family events such as family illness, accidents, and deaths in recent past on the father-child relationship.
