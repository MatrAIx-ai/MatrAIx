    speaking", "Event coordination"]'
  hobbies: '["Abstract painting", "Sketching", "Digital photography", "Playing guitar", "Reading speculative fiction and poetry", "Attending live blues/jazz performances", "Community theater (acting & stage
    crew)", "Gardening (native plants)", "Cooking Southern dishes with experimental twists", "Organizing neighborhood game nights", "Volunteering at church outreach events"]'
  career_goals: Nicholas aims to translate his extensive on‑the‑job experience into a formal facilities management role. He plans to complete an associate degree in facilities management or obtain certifications
    such as the Certified Maintenance Manager (CMM) and OSHA 30‑hour certification within the next two years. His longer‑term ambition is to launch his own boutique cleaning service that specializes in
    serving galleries, studios, and performance venues, merging his cleaning expertise with his passion for the arts. Simultaneously, he hopes to secure opportunities to showcase his artwork in local community
    centers and to volunteer as an art‑program coordinator, thereby balancing financial stability with creative fulfillment. He also seeks to develop leadership skills to mentor younger workers, positioning
    himself as a trusted, competitive advocate for quality and innovation in the cleaning industry.
