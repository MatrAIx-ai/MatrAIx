personas:
  professional: Nicholas Erdmann, a veteran facilities maintenance specialist with three decades of experience in industrial floor care, OSHA safety compliance, and routine plumbing and electrical troubleshooting,
    channels a vivid imagination and competitive edge into meticulously organized work logs, inventive problem‑solving, and elevating community venues to art‑ready perfection.
  sports: Nicholas Erdmann, a dedicated member of the local senior softball league and an avid weekend walker who follows the Mississippi State Bulldogs football season, maintains fitness through weekly
    strength‑training classes at the community gym, while cheering for the New Orleans Pelicans and occasionally joining a recreational cycling club on Sunday rides.
  arts: Nicholas Erdmann, a prolific abstract painter inspired by the Mississippi River’s mist and a passionate guitarist who regularly covers B.B. King and Miles Davis at the downtown blues bar, also sketches
    church interiors in the style of Edward Hopper and volunteers as a stagehand for community theater productions that showcase works by August Wilson.
  travel: Nicholas Erdmann, who plans trips on a shoestring budget but values immersive experiences, favors road trips along the Great River Road visiting Natchez and Memphis, has a wishlist to explore
    New Orleans’ French Quarter and the art galleries of Santa Fe, and prefers staying in historic B&Bs that reflect regional heritage.
  culinary: Nicholas Erdmann, an avid home cook with moderate skill, fuses Southern staples like gumbo and collard greens with unconventional pairings such as miso‑glazed catfish and smoked paprika‑infused
    cornbread, often using locally sourced okra, black‑eyed peas, and heirloom tomatoes to experiment in the kitchen.
  core: Nicholas Erdmann, a 55‑year‑old facilities veteran turned abstract painter, blends a competitive drive with boundless imagination, social charisma, and occasional anxiety‑fueled perfectionism that
    fuels both immaculate cleaning projects and bold artistic experiments, and they channel this energy into every canvas and closet.
background:
  cultural: Nicholas grew up in the Deep South, in a white, middle‑class family in DeSoto County, Mississippi. His upbringing reflects classic Southern values—strong emphasis on community, church involvement,
    hospitality, and familial loyalty—while also exposing him to the region’s rich musical heritage, from gospel choirs to delta blues. He maintains ties to local traditions such as weekend church potlucks,
    Southern cooking, and annual county fairs. At the same time, his curiosity and love of novelty have led him to embrace a broader cultural perspective, integrating contemporary art, literature, and diverse
    musical influences into his life. This blend of traditional Southern roots with modern, imaginative interests shapes his worldview, making him both a proud participant in local customs and an eager
    explorer of new artistic horizons.
attributes:
  skills: '["Industrial floor care (stripping, waxing)", "Hazardous waste handling and disposal", "OSHA safety compliance", "Basic plumbing repairs", "Electrical troubleshooting", "Inventory and supply
