  hobbies: '["Gardening", "Walking and bird‑watching on Bainbridge Island trails", "Knitting and crocheting", "Cooking traditional Asian recipes", "Volunteering at the local library", "Reading mystery novels",
    "Attending community theater", "Yoga and meditation"]'
  career_goals: Leticia aims to secure a stable, supportive administrative role that leverages her extensive experience while minimizing high‑pressure demands. Over the next two years she plans to earn
    a Certified Administrative Professional (CAP) credential to formalize her skill set. She aspires to transition into a senior administrative position with occasional supervisory responsibilities, where
    she can mentor newer staff and promote a collaborative, low‑stress work environment. Maintaining a healthy work‑life balance is a top priority, so she is open to part‑time or hybrid work arrangements
    that allow her to care for her family and manage stress more effectively.
