  hobbies: '[''Basketball'', ''Skateboarding'', ''Team-Based Video Games'', ''Classic Rock and Blues Music'', ''Cooking'', ''Volunteering at Local Food Bank'', ''Neighborhood Clean‑Up'', ''DIY Home Projects'']'
  career_goals: Robert is determined to finish his high school equivalency (GED) within the next two years and secure an apprenticeship in automotive technology or a related trade. He envisions becoming
    a certified mechanic, eventually opening his own small auto repair shop that serves his community. In parallel, he hopes to continue mentoring younger peers at local youth centers, leveraging his organizational
    and leadership abilities to run after‑school programs. Long‑term, he aspires to further his knowledge in business management, possibly taking evening classes at a community college to learn about entrepreneurship
    and finance.
