personas:
  professional: Robert Sams, a 17-year-old aspiring automotive apprentice, channels his natural talent for organization and leadership into coordinating school youth-club events while simultaneously tinkering
    with engines, using Trello to keep repair projects on schedule and motivating teammates on his basketball court.
  sports: Robert Sams dominates the community center basketball court as captain of the St. Louis Youth Hoops team, mines the city's skate parks with the St. Louis Skate Club, roots for the St. Louis Cardinals
    during baseball season, follows the St. Louis Blues, and blends high-energy team sports with individual skate tricks to stay fit year-round.
  arts: Robert Sams, an avid listener of classic rock legends like The Rolling Stones and blues masters such as B.B. King, spends weekend evenings watching live-stream concerts, draws inspiration from street
    art in the Delmar Loop, and appreciates graphic design in video games like Overwatch, allowing their creative outlook to be shaped by music and visual art.
  travel: Robert Sams, who prefers budget-friendly road trips over luxury flights, has driven to Chicago and Nashville for live music festivals, dreams of a solo backpacking adventure in the Grand Canyon,
    and plans a future visit to Austin to explore its skate culture and food trucks, hoping they can ride the city's famous ramps.
  culinary: Robert Sams, a self-taught home cook, whips up quick chicken-and-rice bowls, classic grilled cheese with cheddar, experiments with BBQ ribs using smoked paprika and honey glaze, and enjoys crafting
    spice-laden tacos with cilantro and lime while laughing at their occasional over-salty miscalculations.
  core: Robert Sams, the organized teen mechanic with a love for basketball, skateboarding, and classic rock, balances a disciplined work ethic with a tendency to binge-watch gaming streams after late-night
    cooking experiments, and they often forget to clean their tools promptly.
background:
  cultural: Robert was born and raised in St. Louis, Missouri, within a predominantly white, middle‑class family that values hard work, community involvement, and modesty—hallmarks of Midwestern culture.
    The city's rich sports tradition, especially the St. Louis Cardinals and local basketball leagues, shaped his love for team activities. Exposure to the city's blues and classic rock scene, as well as
    annual festivals like the St. Louis Mardi Gras and Fair, gave him a broad appreciation for the region's cultural tapestry. Though his family attends a Protestant church, he respects a variety of faith
    traditions common in the area, and he benefits from the urban‑suburban blend that offers both close‑knit neighborhood ties and diverse city experiences.
attributes:
  skills: '[''Event Coordination'', ''Team Leadership'', ''Basic Automotive Repair'', ''Time Management'', ''Digital Communication (Social Media)'', ''Basic Computer Literacy'', ''Strategic Gaming'', ''Public
