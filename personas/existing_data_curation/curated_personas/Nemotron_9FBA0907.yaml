  hobbies: '["Painting (Abstract Cityscapes)", "Digital Photography", "Salsa Dancing", "Cuban Cooking", "Reading (Philosophy & Science Fiction)", "Chess", "Community Theater", "Pick‑up Basketball", "Volunteer
    at Cuban Heritage Festival", "Exploring Local Museums"]'
  career_goals: Manny aims to transition from frontline courier work to a supervisory or logistics coordination role within the next few years, leveraging his deep knowledge of local routes and data‑driven
    approach to boost operational efficiency. He is exploring the launch of a boutique delivery service specializing in transporting artwork and cultural artifacts, merging his logistical expertise with
    his passion for art and Cuban heritage. To support this shift, Manny plans to earn a certification in supply‑chain management and develop a modest side venture that offers curated Cuban culinary experiences
    at community events. Ultimately, he seeks a stable, less physically demanding position that still allows creative community engagement and mentorship of younger couriers, while preserving financial
    security for retirement.
