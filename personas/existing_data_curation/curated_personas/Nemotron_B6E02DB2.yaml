personas:
  professional: Guillermo Castillo, an 84‑year‑old master carpenter in the Twin Cities, merges meticulous hand‑tool woodworking with a quietly competitive streak, taking on historic home restorations that
    echo the intricate patterns of his highland hometown while patiently mentoring younger apprentices in a methodical, reserved manner.
  sports: Guillermo Castillo follows the Minnesota Vikings and the Twins with a critical eye, enjoys curling at the senior league on Saturday afternoons, maintains fitness by walking the neighborhood park
    three times a week, but shies away from loud stadium crowds, preferring solitary exercise that lets him mentally rehearse strategic moves in chess.
  arts: Guillermo Castillo spends his afternoons watercolor‑painting bustling market scenes from his highland town and serene Minnesota lakes, draws inspiration from Diego Rivera’s murals and the rhythmic
    cadences of the Marimba Giants, participates in community art workshops led by local painter Maria Johnson, and curates a modest collection of vintage postcards showcasing historic cityscapes, which
    he studies with quiet curiosity.
  travel: Guillermo Castillo, who trekked from his volcanic highland home to Los Angeles before settling in Minnesota, favors low‑key road trips to nearby lakes and has a lingering wish to revisit the volcanic
    lake region of his birthplace, planning each outing meticulously yet often postponing longer journeys due to health concerns and a tendency to worry about logistics.
  culinary: Guillermo Castillo expertly prepares peppery pepián with roasted tomatillos, toasted pumpkin seeds, and a hint of cocoa, crafts tamales wrapped in corn husks for Semana Santa, experiments with
    Minnesota wild rice and locally grown cilantro, oregano, and sage from his herb garden, and meticulously records each recipe in a handwritten cookbook to preserve his family’s culinary legacy.
  core: Guillermo Castillo is a meticulous senior carpenter‑artist who clings to tradition, obsessively sketches his past, worries over every detail, and stubbornly refuses to rely on digital tools for
    his recipes.
background:
  cultural: Guillermo was born in 1941 in the highland town of Sololá, Guatemala, in a Catholic, primarily Kaqchikel‑influenced community where Spanish was spoken at home. His childhood was filled with
    traditional festivals such as Semana Santa, weaving, and the preparation of staple foods like tortillas de maíz and pepián. In 1965, seeking better opportunities, he emigrated to the United States,
    first residing in Los Angeles before moving to the Twin Cities area in the early 1970s to work in construction. While building a new life in Minnesota, he retained strong ties to his Guatemalan roots,
    celebrating Día de la Madre, preserving folk music, and cooking family recipes. He blended these traditions with Midwestern customs, participating in local cultural events, teaching Spanish to community
    members, and integrating Guatemalan flavors into his garden. His bicultural experience, marked by resilience and adaptation, continues to shape his identity and daily practices.
