  career_goals: Even at 84, Guillermo aims to leave a tangible legacy. He plans to compile a handwritten cookbook preserving his family's traditional Guatemalan recipes, finish a series of twelve watercolor
    paintings that trace his migration journey from Sololá to Minnesota, and mentor younger members of the local Guatemalan community in woodworking and culinary arts. He also hopes to organize a modest
    exhibition of his artwork at the senior center and to set up a scholarship fund that supports Guatemalan youths seeking vocational training.
