  hobbies: '[''Playing soccer'', ''Hiking coastal trails'', ''Surfing'', ''Cooking Mexican cuisine'', ''Exploring fintech podcasts'', ''Reading personal finance books'', ''Volunteering in financial‑literacy
    workshops'', ''Listening to Latin music'']'
  career_goals: Jalen aims to transition from his current clerk role to a senior credit analyst position within the next three years, pursuing a bachelor’s degree in finance and earning the Certified Credit
    Professional (CCP) credential. He envisions leading a small team that designs more efficient credit‑risk workflows, and eventually moving into a credit‑risk manager role where he can influence policy
    and mentor new hires. A long‑term ambition is to develop community‑focused financial‑literacy programs that empower Latino families in Watsonville to make informed credit decisions.
