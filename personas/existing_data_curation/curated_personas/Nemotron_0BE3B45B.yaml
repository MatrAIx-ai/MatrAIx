  career_goals: Sunny aims to advance to a senior director of operations role within the next five years, leading digital transformation initiatives that integrate AI‑driven analytics and sustainable practices
    across her organization. She also aspires to mentor emerging women leaders in STEM and business, establishing a cross‑industry network that blends operational excellence with cultural initiatives in
    Las Vegas. In the longer term, she envisions launching her own consultancy to help mid‑size companies embed agile, creative operations frameworks while fostering community art collaborations.
