personas:
  professional: Sunny Melgar, a senior operations specialist with over twenty years of experience, combines lean Six Sigma rigor, advanced Excel and SQL mastery, and a flair for artistic collaboration to
    redesign workflows that keep the Las Vegas headquarters humming while championing community art initiatives and mentoring emerging women leaders in STEM; they are celebrated for turning data into vibrant
    community projects.
  sports: Sunny Melgar, an avid member of the Red Rock Hikers Club, spends Saturday mornings trekking the canyon trails, cheers for the Las Vegas Raiders on game day, participates in a recreational adult
    softball league, squeezes in weekly spin classes to balance the need for flexibility with a love for group activity, and they consider this blend essential to staying energized.
  arts: Sunny Melgar, a devoted patron of the Vegas arts scene, frequents openings at the Container Gallery, revels in experimental theater at the Smith Center, captures neon‑lit streetscapes in digital
    photographs, attends live shows by bands like The Strokes, volunteers with the Neon Mural Project to bring color to downtown neighborhoods, and they also curate a personal photo series celebrating the
    city’s ever‑shifting light.
  travel: Sunny Melgar, who prefers spontaneous road trips over rigid itineraries, has explored the Grand Canyon at sunrise, sampled street‑food in Osaka, dreams of seeing the Northern Lights in Iceland,
    plans future weekend escapes to Sedona’s red rock formations, always packs a lightweight camera and a flexible schedule to accommodate unexpected detours, and they also relish the thrill of unplanned
    discoveries.
  culinary: Sunny Melgar, an enthusiastic home chef, loves crafting Asian‑fusion dishes such as kimchi‑ramen with roasted corn and miso‑glazed salmon, experiments with saffron risotto using locally sourced
    spices, often over‑spends on truffle oil for that extra flourish, enjoys tasting desert‑inspired tacos at off‑the‑grid food trucks on the Strip, and they often quote that a good sauce can turn any dish
    into an adventure.
  core: Sunny Melgar blends data‑driven precision with artistic curiosity, thrives on flexible, sometimes chaotic schedules, champions community collaborations, habitually burns the midnight oil over spreadsheets
    and neon photography, and they often echo the mantra 'data meets design' into late‑night brainstorming sessions.
background:
  cultural: Sunny’s cultural background is rooted in a predominantly white, middle‑class American upbringing in the Midwest, which instilled a pragmatic work ethic and a strong sense of community. After
    relocating to Las Vegas for her career, she has embraced the city’s multicultural tapestry, blending traditional American sensibilities with the eclectic, entertainment‑driven culture of the Southwest.
    Her exposure to diverse artistic expressions and the vibrant hospitality scene influences both her professional outlook and personal interests, fostering an inclusive perspective that celebrates her
    own heritage while appreciating the rich cultural mosaic of Nevada.
