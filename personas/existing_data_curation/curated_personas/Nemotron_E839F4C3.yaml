  hobbies: '[''Attending local trivia nights'', ''Participating in community theater'', ''Yoga and mindfulness classes'', ''Hiking on coastal trails'', ''Wine tasting with friends'', ''Hosting dinner parties'',
    ''Volunteering at the animal shelter'', ''Reading personal development books'', ''Listening to sales and marketing podcasts'']'
  career_goals: Natasha aspires to move beyond individual telemarketing and take on a leadership role within her call center, such as a team lead or sales supervisor, where she can channel her competitive
    drive into measurable team performance. She plans to earn a Certified Professional Sales Leader (CPSL) credential to formalize her expertise and increase her credibility. In the longer term, she envisions
    launching a boutique consulting firm that helps local New England businesses design effective telemarketing campaigns, leveraging her practical experience and business education. Balancing her ambition
    with her emotional reactivity, she also aims to establish a more predictable work schedule and supportive work environment to better manage her anxiety and maintain a healthy work‑life balance.
