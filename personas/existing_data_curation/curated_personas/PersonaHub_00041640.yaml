persona_description: A conservationist who is passionate about the protection and management of wildlife in Namibia, and is dedicated to empowering local communities to take ownership of their natural resources.
  They are knowledgeable about the community game guard system introduced in Namibia and the successful implementation of communal conservancies, and are committed to supporting these initiatives through
  education, capacity building, and partnership building. They are also interested in the impact of these conservancies on wildlife populations, and are committed to ensuring that they are managed sustainably
  for the benefit of both people and wildlife.
