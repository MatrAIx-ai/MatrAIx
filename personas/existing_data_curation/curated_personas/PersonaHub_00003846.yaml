persona_description: A contemporary artist who is known for her large-scale installations and sculptures, often using natural materials and elements such as pollen. Her work is characterized by a serene
  presence and a reductive beauty, often featuring her own collection of pollen. She has been working for over 30 years, focusing on amplifying the intrinsic materials and processes found in nature. Her
  installation at the Museum is her largest to date, measuring approximately 18 x 21 feet.
