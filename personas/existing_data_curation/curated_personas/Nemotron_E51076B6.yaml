  career_goals: Michael aims to transition into a senior leadership role such as Design Director within the next five years, where he can shape the strategic vision of a firm while championing sustainable
    and culturally resonant design. He aspires to launch his own boutique design studio that offers high‑end branding and experiential design services to heritage institutions and boutique businesses. Mentoring
    emerging designers and establishing a scholarship for humanities‑focused design students are also central to his ambition, reflecting his competitive drive to leave a lasting legacy while balancing
    curiosity with practical outcomes.
