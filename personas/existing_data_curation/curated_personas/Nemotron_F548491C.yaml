personas:
  professional: Juan Lavina, a seasoned CNC machine‑tool setter with more than a decade of hands‑on experience in manual and computer‑numeric control machining, applies their meticulous eye for detail,
    lean‑manufacturing mindset, and bilingual communication skills to write precise G‑code, troubleshoot equipment, and mentor shop‑floor colleagues, all while methodically planning the next step toward
    CNC programming certification and a supervisory role.
  sports: Juan Lavina, an early‑morning fisherman who finds calm on Biscayne Bay and a devoted fan of the Miami Heat and Miami Dolphins, spends weekday evenings watching basketball and football highlights,
    participates in a local fishing club that meets monthly, and they occasionally jog along South Beach to stay fit, balancing solitary fitness with team spirit.
  arts: Juan Lavina, a quiet aficionado of Latin rhythms who fills the kitchen with the sounds of Celia Cruz, Benny Moré, and modern bolero singer Omara Portuondo while cooking, attends intimate gatherings
    where an acoustic trio plays live salsa, and they occasionally watch classic Cuban‑influenced films starring Andy García, letting these artistic moments shape their reflective evenings.
  travel: Juan Lavina, a family‑oriented traveler who prefers well‑planned short trips over spontaneous jet‑setting, enjoys weekend getaways to the Florida Keys and annual vacations in the Dominican Republic,
    while dreaming of a future cultural immersion tour of Granada, Nicaragua, and hopes to eventually purchase a modest home in the quieter suburb of Coral Gables to serve as a calm base for future travel,
    and they often draft itineraries with meticulous attention to budget and schedule.
  culinary: Juan Lavina, a proficient home chef who delights in preparing traditional dishes like ropa vieja with shredded flank steak, picadillo with ground pork, olives, raisins, and capers, often experimenting
    with fresh cilantro, cumin, and a splash of sour orange juice, and they relish pairing each meal with a well‑balanced mojito made from fresh mint, lime, and white rum.
  core: Juan Lavina, a methodical yet worry‑prone craftsman who balances solitary precision in machining and cooking with a love for early‑morning fishing, yet sometimes over‑analyzes finances and they
    skip sleep to meet both work and family expectations.
background:
  cultural: Born to Cuban immigrant parents, Juan grew up in a tight-knit Cuban enclave in Miami, where Spanish was spoken at home and community celebrations highlighted his heritage. He observes traditional
    customs such as celebrating San Juan and maintaining strong family ties across generations. Catholic traditions influence his holidays, and he frequently participates in community events organized by
    local Cuban cultural societies. The immigrant experience instilled in him a strong work ethic and a deep appreciation for the opportunities in the United States. Juan balances his dual identity by preserving
    Cuban culinary and musical traditions while fully integrating into the broader Miami multicultural landscape.
attributes:
  skills: '["CNC machining", "Manual machine tool operation", "Tool setup and calibration", "Blueprint and technical drawing interpretation", "Basic CNC programming (G-code)", "Preventive maintenance and
    troubleshooting", "Quality inspection (dimensional measurement)", "Lean manufacturing and process optimization", "Safety compliance and OSHA standards", "Bilingual communication (Spanish/English)",
    "Documentation and work order management"]'
  hobbies: '["Cooking Cuban cuisine", "Fishing in Biscayne Bay", "Building model kits (cars, CNC projects)", "DIY home repairs and woodworking", "Listening to Cuban salsa and bolero music", "Small-group
    social gatherings with friends", "Beach walks and gardening", "Reading technical articles on machining and automation"]'
  career_goals: Juan aims to transition from a machine-tool setter to a CNC programmer and eventually a shift supervisor within the next five years. He plans to earn a Certified CNC Machinist credential
    and an OSHA 30-hour certification to solidify his technical foundation and safety leadership. Long-term, he hopes to lead a small team that integrates advanced automation, such as robotic loading systems,
    into the shop floor, enhancing productivity while maintaining a stable work environment for his family. Juan also aspires to mentor younger workers, sharing his practical knowledge and fostering a collaborative
    culture. Financially, he seeks a salary increase that supports his children's education and allows the family to purchase a home in a quieter Miami suburb.
