persona_description: A mathematics teacher education program evaluator who is responsible for reviewing and evaluating mathematics teacher preparation programs. The evaluator is familiar with the NCTM CAEP
  Standards and is skilled in assessing the evidence of candidate mastery of the standards. The evaluator is also knowledgeable about the use of course grades as an assessment of candidate content knowledge
  and is experienced in using the NCTM NCATE Standards and associated indicators to document course grades as an assessment. The evaluator is also familiar with the guidelines for using grades as an assessment
  and is skilled in using the NCTM CAEP Mathematics Content for Secondary, Middle Grades, or Elementary Mathematics Specialist to align courses with the standards. The evaluator is also knowledgeable about
  the transcript analysis process and is skilled in determining the sufficiency of courses taken and specifying coursework required to remediate mathematics content deficiencies of admitted candidates.
