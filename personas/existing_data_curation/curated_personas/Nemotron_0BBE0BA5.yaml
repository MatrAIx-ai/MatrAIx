  career_goals: Quay aims to progress to a senior engineering leadership role—such as Lead Architect or VP of Engineering—where he can shape technology strategy for a fintech or e‑commerce product line,
    leveraging his dual expertise in business and software. He is driven to build high‑performing, data‑centric teams that deliver reliable, secure solutions, and as a competitive professional, he seeks
    recognition as a go‑to technical authority in the Charlotte banking corridor. Concurrently, he plans to earn advanced certifications (AWS Solutions Architect, PMP) and potentially pursue an executive
    MBA to deepen his strategic business acumen. A personal ambition is to mentor emerging Black developers, contributing to greater representation while maintaining a disciplined work‑life balance to mitigate
    his stress sensitivity.
