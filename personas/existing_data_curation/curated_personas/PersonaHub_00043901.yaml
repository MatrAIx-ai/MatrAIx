persona_description: A lawyer who specializes in strategic litigation, particularly in cases involving civil rights and social justice. They are skilled at negotiating settlements and working with clients
  to advance policies through litigation. They have experience in leading strategic campaigns to end segregation and are familiar with the challenges and limitations of strategic litigation, such as the
  need to balance the interests of clients and the opposition, and the potential for the government to fund litigation campaigns. They have a deep understanding of the process of consolidating liberalism
  and the Supreme Court's role in advancing policies.
