personas:
  professional: Jin Sun, a budding robotics hobbyist and aspiring YouTube content creator, blends curiosity about electronics with practical video editing skills, leads group Minecraft builds in a flexible
    yet occasionally disorganized fashion, and thrives on the competitive edge of crafting the coolest Arduino‑powered gadgets.
  sports: Jin Sun, a midfielder for the local youth soccer club Red Hawks, channels competitive energy into weekend matches while cheering for professional teams such as Manchester United and the national
    under‑17 squad, and occasionally joins school basketball pick‑ups during the winter season to stay active.
  arts: Jin Sun, an avid fan of anime series like My Hero Academia and Attack on Titan, streams K‑pop groups BTS and BLACKPINK, sketches parody videos for their YouTube channel, and devours graphic novels
    by Raina Telgemeier and Taiyo Matsumoto, letting these creative worlds shape their sense of humor and storytelling.
  travel: Jin Sun dreams of visiting Tokyo's Akihabara district to hunt rare anime merchandise and Seoul's K‑pop boutiques, while also craving weekend trips to the nearby coastal boardwalk and the regional
    theme park, balancing a limited family budget with a love for immersive cultural experiences.
  culinary: Jin Sun, a self‑declared fan of spicy ramen, crispy chicken wings, and bubble tea with honeydew pearls, loves experimenting with quick Arduino‑controlled kitchen gadgets, but usually relies
    on instant noodles and pizza while gaming, and occasionally helps parents make kimchi fried rice without realizing its cultural origins.
  core: Jin Sun thrives on high‑energy group projects, competitive gaming, and spontaneous creativity, yet their disorganized streak and occasional skepticism about teammates keep them forever balancing
    curiosity with a need for control.
background:
  cultural: Jin is a second‑generation East Asian American, with family roots in Chinese culture. At home, Mandarin is spoken alongside English, and the family celebrates Lunar New Year, the Mid‑Autumn
    Festival, and other traditional holidays. These customs instill respect for elders and a strong emphasis on education. Growing up in Newhall, a diverse part of Los Angeles County, Jin is also immersed
    in Western pop culture and the vibrant Asian‑American scene—he enjoys K‑pop, anime, and local cultural festivals, blending both heritage and contemporary influences into his everyday life.
