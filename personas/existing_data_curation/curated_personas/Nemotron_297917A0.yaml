  career_goals: Jin aims to attend a STEM‑focused magnet high school to deepen his coding and robotics knowledge, with a long‑term goal of studying computer engineering or game design in college. He dreams
    of creating his own video games that combine storytelling with competitive gameplay, and hopes to compete in regional esports tournaments while keeping the possibility of earning a soccer scholarship.
    Ultimately, he wants to turn his curiosity and practical problem‑solving into a career that lets him innovate and lead tech projects.
