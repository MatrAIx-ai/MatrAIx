    Local Arts Programs'']'
  career_goals: Shelia aims to formalize her skills through an earned GED and a short‑term certification in project management or nonprofit administration. She envisions a part‑time role as a community
    arts program coordinator where she can blend her love of art with her organizational talent. Simultaneously, she plans to launch a modest online boutique showcasing handcrafted home‑decor items inspired
    by Southwestern desert motifs, using her DIY and design skills to generate supplemental income. Ultimately, she aspires to become a recognized volunteer leader in Surprise’s local arts council, driving
    high‑standards initiatives while mentoring younger volunteers.
