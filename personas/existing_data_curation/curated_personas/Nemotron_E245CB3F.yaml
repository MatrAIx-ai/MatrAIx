personas:
  professional: Shelia Glaze, a 45-year-old aspiring community arts program coordinator, channels her disciplined event-planning precision, competitive edge, and skeptical eye for detail into seamless neighborhood
    festivals and grant-driven projects while maintaining high standards.
  sports: Shelia Glaze, a 45-year-old outdoor enthusiast, regularly trails with the Desert Rangers Hiking Club and roots for the Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals, balancing disciplined
    weekend hikes with light strength training at a community gym to offset occasional back strain.
  arts: Shelia Glaze, a 45-year-old abstract painter, finds inspiration in Georgia O'Keeffe's desert palettes and Sean Scully's color fields, frequents the Phoenix Art Museum and local galleries, and volunteers
    with the community arts council to organize mural projects that blend modern aesthetics with Southwestern motifs.
  travel: Shelia Glaze, a 45-year-old meticulous planner, balances desert hikes in Sedona and Grand Canyon visits with cultural excursions to Oaxaca's art markets and Kyoto's temples, preferring structured
    itineraries peppered with spontaneous gallery stops while budgeting trips through a custom travel spreadsheet.
  culinary: Shelia Glaze, a 45-year-old experimental home chef, whips up rosemary-infused roasted chicken with a prickly-pear-chipotle glaze, pairs it with quinoa-sprouted heirloom tomato salad, and delights
    in reimagining her grandmother's green chile casserole using smoked paprika and fresh mezcal.
  core: Shelia Glaze, a 45-year-old fiercely organized art lover, turns every community event into a flawless production yet paradoxically forgets to water her succulents, thrills in out-scoring friends
    at strategic board games, and secretly hoards discount coupons for future projects.
background:
  cultural: Shelia grew up in a middle‑class white family in the Pacific Northwest, where self‑reliance, community service, and appreciation for nature were core values. Relocating to Surprise, AZ in her
    thirties, she embraced the Southwest’s desert culture, incorporating Native American design elements and regional culinary flavors into her creative pursuits. While she maintains traditions from her
    upbringing—such as holiday gatherings centered on family recipes—her curiosity leads her to explore diverse cultural expressions through art, music, and literature. This blend of familiar Midwestern
    values with the vibrant, multicultural atmosphere of Southern Arizona informs her worldview and daily life.
