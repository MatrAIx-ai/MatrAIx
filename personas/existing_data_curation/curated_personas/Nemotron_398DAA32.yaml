  career_goals: Sue aspires to combine her love of technology with real‑world impact. In the short term she aims to lead her high‑school robotics team and win a regional science‑fair award for a sustainable‑energy
    prototype. Long‑term, she envisions studying computer engineering or environmental engineering, where she can design low‑cost automation tools for small farms in rural Missouri. She hopes to launch
    a startup that provides simple, open‑source software for local agricultural businesses, allowing her to stay competitive while applying practical solutions to community challenges.
