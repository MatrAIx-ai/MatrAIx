personas:
  professional: Sue Laroche is a budding technologist who channels their curiosity and competitive streak into building complex redstone contraptions in Minecraft and developing simple Python scripts for
    automating homework reminders, demonstrating a blend of practical problem‑solving and experimental tinkering that often outpaces their peers, even as they sometimes forget deadlines due to a relaxed
    attitude toward obligations.
  sports: Sue Laroche dashes across the midfield for the Higginsville Youth Soccer Club, idolizes St. Louis City SC’s attacking flair, and after practice they unwind by cycling the winding country roads
    of the Ozarks, balancing a competitive drive on the field with a laid‑back attitude toward fitness that sometimes lets them skip strength‑training sessions.
  arts: Sue Laroche writes simple folk‑rock tunes on an acoustic guitar, records rough demos on their phone, and draws inspiration from artists like Taylor Swift’s lyrical storytelling and the atmospheric
    scores of Hans Zimmer, while they also capture sunrise shots of the rolling prairie for Instagram, blending a critical ear for melody with a playful curiosity for visual composition.
  travel: Sue Laroche prefers spontaneous weekend getaways, often packing a bike and camera for a two‑day trek into the Mark Twain National Forest, but they also dream of a future trip to Kyoto to explore
    its historic shrines and anime culture, balancing a love for local wilderness with a competitive curiosity about global destinations.
  culinary: Sue Laroche favors quick, hearty meals like chicken quesadillas topped with fresh cilantro and salsa, enjoys experimenting with homemade trail mix for soccer practice, and occasionally attempts
    to bake banana bread, though they often over‑mix the batter, resulting in a dense crumb they laugh off.
  core: Sue Laroche is a fiercely curious teen who blends competitive grit with a relaxed, sometimes disorganized approach to life, turning every hobby—whether coding, soccer, or songwriting—into a playground
    for skeptical experimentation.
background:
  cultural: Sue grew up in Higginsville, a small Midwestern town in Missouri, within a predominantly white community with German, Irish and English ancestry. Her family values self‑reliance, practicality
    and community involvement—traits common in the region’s rural culture. She has attended the local public school, participated in community events such as the county fair and high‑school football games,
    and spends time at the town library and the nearby state park. While rooted in Midwestern work ethic and modesty, she is also highly connected to digital culture through online tutorials, social media,
    and gaming, blending traditional values with modern, independent pursuits.
