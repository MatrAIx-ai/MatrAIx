  hobbies: '[''Surfing'', ''Skateboarding'', ''Coastal hiking'', ''Photography'', ''Video vlogging'', ''Reading non-fiction (psychology, environmental science, self-improvement)'', ''Volunteering at animal
    shelter'', ''Community gardening'', ''Cooking healthy meals'', ''Meditation and yoga'', ''Cooperative online gaming'']'
  career_goals: Graham aims to translate his compassion and practical curiosity into a career that serves his community. In the next few years he plans to obtain his GED and enroll in a community-college
    program focusing on social work or environmental science. He hopes to become a community health worker or a marine conservation outreach coordinator, roles that blend direct assistance with education.
    Long-term, he aspires to launch a nonprofit that provides free mental-health workshops and environmental stewardship programs for underserved youths in Carlsbad, while maintaining the flexible schedule
    he values. He also envisions leveraging his self-taught digital-media skills to produce impactful campaigns that raise awareness about mental health and coastal preservation.
