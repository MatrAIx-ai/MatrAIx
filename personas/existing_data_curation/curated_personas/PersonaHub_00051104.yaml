persona_description: An engineer with expertise in the field of engineering microscopy, particularly in the use of different types of microscopy techniques such as X-ray, electron, neutron, and ion microscopy.
  They are familiar with the different modes of imaging, including absorption and emission, spectroscopy, and scattering, and can extend information collection to 3D characterisation through serial sectioning
  or reconstruction tomography. They also have a strong background in materials modeling and can combine different types of microscopy to achieve correlative microscopy, which provides exciting opportunities
  for multi-beam microscopic characterization. They are likely to have a deep understanding of the applications of engineering microscopy in various industries such as aerospace, automotive, and electronics.
