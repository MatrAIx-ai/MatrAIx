persona_description: A healthcare professional who administers intravenous infusions of Veletri, a medication used to treat pulmonary hypertension. They are aware of the potential risks associated with
  long-term use and administration, including the risk of sepsis, blood clots, and bleeding, as well as the importance of monitoring blood pressure, heart rate, and condition. They are responsible for carefully
  considering the ability to administer Veletri and care for an infusion system, and are aware of the potential side effects of the medication, including abdominal pain, agitation, anxiety, bleeding, chest
  pain, diarrhea, dizziness, "flu-like" symptoms, headache, infections, jaw pain, joint or muscle pain, loss of appetite, low blood pressure, nausea, nervousness, pain, rapid or slow heartbeat, rash, reddening
  of the face and neck, shortness of breath, sweating, swelling, vasodilation, vomiting, and abdominal pain. They also need to inform patients of the need for careful monitoring and follow-up appointments,
  and avoid interactions with other medications, particularly blood pressure/heart medications, blood thinners, digoxin, or diuretics.
