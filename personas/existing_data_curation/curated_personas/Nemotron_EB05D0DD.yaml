  career_goals: Although she is not currently in the workforce, Daisy aims to deepen her community impact by leading art and cultural workshops at the local community center, mentoring younger adults in
    both creative pursuits and practical life skills, and possibly launching a small home‑based business selling handmade crafts and specialty food items. She also plans to enroll in online courses to refine
    her digital photography skills and to continue learning about Puerto Rican cultural preservation, with the long‑term goal of becoming a recognized organizer of multicultural events in Jacksonville.
