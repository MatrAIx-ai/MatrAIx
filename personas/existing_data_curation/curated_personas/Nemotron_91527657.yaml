  hobbies: '[''Fishing'', ''Birdwatching'', ''HO‑scale model railroad building'', ''Woodworking'', ''Reading historical non‑fiction'', ''Crossword puzzles'', ''Meditation'']'
  career_goals: Although retired, Charles aims to maintain his independence and ensure financial security for his wife. He plans to volunteer as a mentor at the local senior center, helping newer retirees
    navigate paperwork and health resources. A personal legacy project he is dedicated to is building a custom wooden bookshelf to display family photos and heirlooms. He also wants to develop a small vegetable
    garden that supplies fresh produce for his household and to attend a senior‑friendly mindfulness program to better manage his anxiety and occasional sadness.
