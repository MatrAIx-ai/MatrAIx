personas:
  professional: Linda Goldfarb, a retired budget‑savvy manager turned volunteer coordinator, leverages their meticulous financial planning, event‑organizing acumen, native‑plant horticulture expertise,
    and pragmatic curiosity to spearhead historic‑preservation projects and intergenerational garden programs, all while maintaining a cautious yet competitive edge that drives them to out‑organize rival
    committees.
  sports: Linda Goldfarb embraces low‑impact fitness through weekly hikes in the Sangre de Cristo foothills, keeps an eye on wildlife for bird‑watching, and supports the New Mexico State Aggies baseball
    team, while they occasionally join a senior‑center pickleball league where their competitive streak shines.
  arts: Linda Goldfarb channels their creative energy into watercolor landscapes reminiscent of Albert Bierstadt, quilts inspired by traditional patterns, and knits scarves while listening to folk guitarist
    John Hartford and attending poetry readings featuring works by Maya Angelou, which they deem both soothing and intellectually stimulating.
  travel: Linda Goldfarb prefers well‑planned road trips that blend cultural immersion and natural beauty, having already toured the historic missions of Santa Fe, the volcanic formations of Bandelier National
    Monument, and a weekend getaway to Sedona’s red rocks, while they dream of a future pilgrimage to the ancient ruins of Chichen Itza and the art museums of Paris.
  culinary: Linda Goldfarb delights in cooking with earthy flavors, often preparing green chile stew, roasted poblano peppers, and homemade tamales stuffed with slow‑cooked pork, while they occasionally
    over‑season with too much cumin.
  core: Linda Goldfarb is a calm, fiercely organized senior who balances solitary gardening with community leadership, and they bring a competitive edge to event planning while harboring the quirky habit
    of over‑cooking tamales until the masa sticks to the pot.
background:
  cultural: Linda was born and raised in Española, New Mexico, a town where Hispanic, Anglo, and Pueblo cultures intersect. Though her family is of white Anglo‑American descent, she grew up attending a
    bilingual elementary school, which gave her functional Spanish and an appreciation for the region’s traditions. She regularly participated in local fiestas, such as the annual Fiesta de San Juan, and
    learned traditional Southwestern cooking and crafts from neighbors of diverse backgrounds. Her upbringing in Santa Fe County exposed her to the art of the Pueblo peoples and the storytelling of the
    Rio Grande Valley, shaping a cultural identity that values community, respect for the land, and a blend of Anglo and Hispanic customs.
