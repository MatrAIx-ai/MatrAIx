  hobbies: '["native‑plant gardening", "hiking", "birdwatching", "reading historical non‑fiction", "writing for community newsletter", "watercolor painting", "quilting", "knitting", "woodworking", "participating
    in community festivals", "attending poetry readings"]'
  career_goals: Although retired from formal employment, Linda remains driven to make a lasting impact on her community. She aims to become the lead volunteer coordinator for the Española Historical Society,
    where she can formalize her passion for preserving local stories and artifacts. She also intends to launch an intergenerational garden program that pairs seniors with school‑age children to teach sustainable
    gardening practices while fostering cultural exchange. Additionally, Linda plans to author a memoir that intertwines personal narrative with the broader history of the Rio Grande Valley, and to mentor
    younger residents in basic digital skills to bridge the technology gap.
