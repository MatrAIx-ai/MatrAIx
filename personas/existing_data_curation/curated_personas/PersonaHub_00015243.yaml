persona_description: A linguist and literary scholar who is fascinated by the ancient Hebrew script and its poetic potential, and who is interested in the ways in which the lack of vowels in Hebrew words
  invites interpretation and the creation of a form of literature. The speaker is a student of literature and has a keen interest in the interplay between language and meaning, and in the ways in which
  language can be used to create meaning and to challenge our understanding of what constitutes "literature." The speaker is also likely to be a lover of literature and a keen reader, and is likely to have
  a deep appreciation for the beauty and complexity of the English language.
