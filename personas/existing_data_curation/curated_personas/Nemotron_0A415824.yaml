personas:
  professional: Betty Scott is a master carpenter whose meticulous blueprint reading, precision framing, and CNC‑routing expertise translate into a disciplined, high‑quality build process that blends modern
    technology with traditional joinery, and they channel calm resilience and a competitive drive to set industry benchmarks.
  sports: Betty Scott enjoys early‑morning hikes across the West Texas desert, affiliates with the local Trailblazers Hiking Club, follows the Dallas Cowboys for football, the Dallas Mavericks for basketball,
    and the Texas Rangers for baseball, and they keep fit with weekly rock‑climbing sessions at the nearby gym, treating each ascent as a personal challenge.
  arts: Betty Scott blends craftsmanship with artistic appreciation, collecting vintage hand tools like a 1900‑era hand plane, admiring the furniture of Sam Maloof, photographing native desert flora and
    birds with a Nikon D750, and they unwind to the folk storytelling of Townes Van Zandt and the classical piano works of Beethoven’s late sonatas.
  travel: Betty Scott prefers self‑guided road trips that pair work with wonder, having already explored Big Bend National Park, the historic town of Marfa, and Santa Fe’s adobe architecture, while their
    bucket list includes a sustainable‑design tour of Copenhagen and a retreat at the Sierra Madre forests of Mexico, and they always plan routes with detailed topographic maps and budget for fuel and campsite
    fees.
  culinary: Betty Scott enjoys farm‑to‑table cooking, growing heirloom tomatoes and chilies in a modest garden, crafting smoked brisket on a reclaimed‑wood smoker, and they savor dishes like chicken‑fried
    steak with pecan gravy and fresh guacamole, while their kitchen skill level ranges from proficient to experimental as they test new wood‑smoked sauces and perfect a pour‑over coffee using a 2020 vintage
    Chemex.
  core: Betty Scott is a disciplined carpenter who fuses high‑tech precision with old‑world craftsmanship, balances a methodical budget with a competitive edge, and they channel a calm, solitary nature
    into meticulous woodworking, rugged hiking, and strategic financial planning while never missing a chance to tune a vintage hand plane.
background:
  cultural: Betty grew up in a small, close‑knit community in the South Plains of Texas, where self‑reliance, hard work, and respect for tradition are deeply valued. Her white, rural Texas heritage includes
    exposure to Southern Protestant values, a strong sense of independence, and a cultural ethos that prizes practical skills and modesty. While she embraces these traditions, her curiosity drives her to
    adopt new technologies and sustainable practices, creating a blend of classic Texan work ethic with a modern, forward‑thinking outlook.
attributes:
  skills: '[''Custom cabinetry'', ''Residential framing'', ''Blueprint interpretation'', ''Project budgeting'', ''Tool maintenance'', ''CNC routing'', ''Advanced wood finishing'', ''Safety compliance'',
    ''Sustainable building practices'', ''Small team leadership'']'
  hobbies: '[''Woodworking projects'', ''Reading technical manuals'', ''Nature photography'', ''Birdwatching'', ''Puzzle solving'', ''Model building'', ''Gardening'', ''Vintage tool collection'']'
  career_goals: Betty aims to transition from freelance carpentry to owning a boutique construction firm that specializes in high‑end, environmentally conscious custom homes and furniture. She plans to
    obtain her Texas Master Carpenter certification and a state contractor’s license within the next two years. Her long‑term ambition includes establishing an apprenticeship program to train disciplined,
    detail‑oriented carpenters, and developing a reputation for innovative yet reliable craftsmanship that blends modern technology with traditional methods.
