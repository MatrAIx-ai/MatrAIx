personas:
  professional: Glenn Baker, a retired ship‑yard mechanic turned senior‑center operations specialist, leverages four decades of maritime maintenance, carpentry, and electrical know‑how to meticulously budget
    events, coordinate volunteers, and they mentor younger residents in practical home‑repair skills.
  sports: Glenn Baker walks the San Pedro shoreline daily for fitness, follows the Los Angeles Dodgers with unwavering loyalty, and they belong to the local senior rowing club that meets each spring for
    gentle on‑water paddling.
  arts: Glenn Baker immerses themselves in classic big‑band recordings by Glenn Miller and Duke Ellington, curates a personal collection of maritime photographs inspired by Ansel Adams, and they regularly
    experiment with DSLR settings to capture the harbor’s sunset glow, weaving music and visual art into their daily routine.
  travel: Glenn Baker prefers well‑planned, low‑key trips that combine maritime heritage with leisurely pacing; they have visited the shipyards of Seattle, the historic port of Portsmouth, England, and
    dream of a wheelchair‑accessible tour of the Maritime Museum in San Diego, always maintaining a detailed itinerary and pocket‑sized map.
  culinary: Glenn Baker enjoys cooking garden‑fresh ratatouille with heirloom tomatoes, basil, and zucchini, pairs it with grilled salmon seasoned with lemon and dill, and they delight in a hearty bowl
    of New England clam chowder on chilly evenings, often adding a splash of sherry for extra depth.
  core: Glenn Baker blends disciplined craftsmanship, a love for maritime history, and a community‑first mindset, all while they occasionally misplace their keys and smugly correct anyone who mispronounces
    a ship’s name.
background:
  cultural: Glenn grew up in post‑war Southern California as part of a middle‑class white American family. His upbringing emphasized hard work, responsibility, and community involvement—values reinforced
    by his father’s employment in the local shipyard and the close‑knit neighborhood culture of San Pedro. He identifies with mainstream American traditions such as celebrating national holidays, attending
    church services, and participating in community events. The maritime heritage of his hometown has shaped his appreciation for seafaring history and a respect for the disciplined routines of dock work.
    These cultural influences, combined with his Generation‑Baby‑Boomer experience, frame his practical outlook, cooperative spirit, and preference for orderly, predictable environments.
attributes:
  skills: '[''Shipyard mechanical maintenance'', ''Carpentry and woodworking'', ''Basic electrical and plumbing repairs'', ''Budgeting and bookkeeping'', ''Volunteer coordination and event planning'', ''Gardening
    and horticulture'', ''Digital photography of maritime subjects'']'
  hobbies: '[''Model ship building'', ''Gardening'', ''Beach walks and maritime photography'', ''Listening to big‑band and jazz music'', ''Volunteering at the senior‑center'', ''Reading historical nonfiction'',
    ''Playing chess'']'
  career_goals: Glenn aims to stay physically active and mentally sharp by maintaining his garden, walking the San Pedro shoreline, and continuing his model‑ship building projects. He wishes to expand his
    volunteer role at the senior‑center, eventually taking on a mentorship program that teaches practical home‑repair skills to younger residents. Another personal ambition is to compile a locally focused
    oral‑history memoir documenting the evolution of the Port of Los Angeles, preserving stories for future generations. He also hopes to master digital photography techniques so he can create a visual
    archive of the maritime community he loves.
