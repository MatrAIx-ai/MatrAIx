  hobbies: '[''Digital sketching'', ''3D modeling'', ''Basketball'', ''Community improv theater'', ''Street art exploration'', ''Live music concerts'', ''Drone piloting'', ''Robotics tinkering'', ''Science‑fiction
    reading'', ''Museum visits'']'
  career_goals: Ray aspires to become a senior crane operator and earn advanced certifications, such as the Certified Crane Operator and specialized tower crane credentials. He aims to transition into site
    supervision or project management within the next five years, leveraging his technical expertise and leadership abilities. Ultimately, he envisions launching a small equipment rental and training business
    that incorporates cutting‑edge technology like virtual‑reality simulations, and he hopes to integrate his artistic talent by designing innovative visual tools for construction planning.
