  hobbies: '[''Hiking in the Bay Area'', ''Yoga'', ''Cooking Mexican cuisine'', ''Attending coding meetups'', ''Volunteering at legal aid clinic (bilingual)'', ''Reading science‑fiction and Mexican literature'',
    ''Participating in community festivals'']'
  career_goals: Damaris aims to progress from senior paralegal to a paralegal manager overseeing a specialized team focused on intellectual property and technology‑driven litigation. She plans to earn a
    Certified Paralegal (CP) credential and a Legal Tech certification to formalize her expertise. Long‑term, she envisions developing in‑house legal‑tech solutions that streamline case workflows, mentoring
    junior staff, and championing diversity initiatives that reflect her Mexican heritage in the firm’s culture. She also considers pursuing a part‑time law degree to expand her career horizons while maintaining
    her practical, tech‑focused legal role.
