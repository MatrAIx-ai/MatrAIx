  career_goals: Crystal often talks about growing up to be a teacher because she loves storytime and helping younger kids learn to read. She also dreams of being a veterinarian, inspired by her family's
    pet dog and the desire to care for animals. Occasionally, she imagines becoming a firefighter, fascinated by the bright trucks she sees in community parades. These aspirations reflect her compassionate
    side and her preference for roles that involve helping others in a predictable, structured environment.
