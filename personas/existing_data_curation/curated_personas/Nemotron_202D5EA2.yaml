personas:
  professional: Crystal Garland, a budding kindergarten organizer, excels at arranging crayons and blocks into tidy patterns, turning their love for structure into playful classroom routines while still
    embracing spontaneous play.
  sports: Crystal Garland, an enthusiastic member of the Little Kickers soccer club, spends Saturday mornings chasing a ball with a small group of friends, cheerfully cheering for the hometown baseball
    team, the Cubs, while also enjoying unstructured playground climbing.
  arts: Crystal Garland delights in drawing bright dinosaurs inspired by the works of Dr. Seuss and humming the songs of Disney's Frozen soundtrack, often staging impromptu puppet shows for a close circle
    of siblings.
  travel: Crystal Garland loves short road trips to the nearby aquarium, dreams of visiting the Disneyland Resort, and prefers the comfort of familiar car seats over long flights, planning each outing with
    a simple map of stickers.
  culinary: Crystal Garland's favorite meals are cheesy pizza slices, chicken nuggets, and strawberry yogurt, and they proudly claim to be a budding chef who expertly spreads peanut butter on toast, though
    they can be picky about green vegetables.
  core: Crystal Garland is a tidy‑hearted five‑year‑old who balances a love for routine with spontaneous sticker splurges, occasional sneezes, and a fierce devotion to crayons.
background:
  cultural: Crystal comes from a white, Southern Appalachian family in Oneida, Tennessee, a rural community in Scott County. Her household is rooted in Southern Baptist traditions, attending church services
    each Sunday and participating in community events such as local bluegrass festivals and church potlucks. Family ties are strong, with frequent visits to grandparents who share stories of the region's
    history and values of self‑reliance and hospitality. The cultural environment emphasizes close‑knit community, respect for nature, and an appreciation for folk music and storytelling.
attributes:
  skills: '["basic literacy (letter recognition)", "beginner numeracy (counting to 20)", "fine motor coordination (coloring, cutting, building blocks)", "gross motor skills (running, jumping, balancing)",
