persona_description: A scientist who specializes in the study of plant-derived compounds and their potential use in developing insect repellents. His research interests include, but are not limited to,
  the mechanisms of action of plant compounds on insect pests, the development of new insect repellents, and the impact of climate change on insect populations. He has a strong background in neurobiology
  and neurochemistry, and has published several papers on the sensory systems of animals, including the mechanisms that control the responses to external temperature and pain. His work has been supported
  by various grants from the National Institutes of Health and the Pew Scholars Program in the Biomedical Sciences.
