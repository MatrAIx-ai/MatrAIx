  career_goals: Although retired from formal employment, Phillip aims to deepen his lifelong learning and give back to the cultural community that has shaped him. His primary ambitions include volunteering
    as a docent and board member for a local art museum, curating a neighborhood exhibition of emerging artists, mentoring younger volunteers in community outreach, and authoring a memoir that intertwines
    his family’s heritage with his passion for art. He also hopes to travel to European art capitals—such as Florence, Paris, and Amsterdam—to enrich his understanding of art history and bring new insights
    back to his local community.
