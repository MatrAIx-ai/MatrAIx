personas:
  professional: Craig Hodges, a budding multimedia artist and aspiring game developer, blends their love for industrial sketching, digital painting, and strategic game design in after-school coding club
    projects, applying meticulous organization and a competitive mindset to prototype turn-based strategy games.
  sports: Craig Hodges follows the New England Patriots on Sundays, cheers for the Hartford Yard Goats during minor-league baseball season, and occasionally trains with the Waterbury Youth Soccer club,
    and they prefer strategic, low-pressure fitness like weekend bike rides rather than high-intensity team sports.
  arts: Craig Hodges frequently visits the Mattatuck Museum to study works by Yayoi Kusama and Banksy, they curate lo-fi playlists featuring Jinsang and Clairo while sketching the historic Waterbury brass
    factories, and they draw inspiration from vintage Jack Kirby comics to feed their own digital painting experiments.
  travel: Craig Hodges has taken day trips to New York City's MoMA and Boston's Institute of Contemporary Art, and dreams of backpacking through Paris to see the Louvre and wandering the neon streets of
    Tokyo for anime inspiration; they favor meticulously planned solo museum tours over crowded theme parks, budgeting each trip with a spreadsheet they keep in their journal.
  culinary: Craig Hodges enjoys crafting simple ramen bowls with miso broth, soft-boiled egg, and nori, and whips up avocado toast topped with chili flakes, while they consider their favorite cheat meal
    a pepperoni pizza from the local pizzeria that uses fresh mozzarella and oregano; they consider themselves a competent microwave-cook but still rely on their mother for complex baking.
  core: Craig Hodges, a 14-year-old art-obsessed strategist, channels their chronic worry into meticulous sketchbooks, indie lo-fi playlists, and cautious savings, all while they maintain a skeptical, solitary
    edge and an occasional habit of over-analyzing every chess move.
background:
  cultural: Craig grew up in Waterbury, Connecticut, a historically industrial city known as the Brass City. His family has deep roots in the region, tracing back to Italian-American ancestors who settled
    in the city during the early 20th century. The neighborhood’s mix of working-class values, New England pragmatism, and a growing appreciation for arts and culture has shaped his outlook. Local cultural
    institutions like the Mattatuck Museum and community art programs provide him with exposure to both traditional craftsmanship and contemporary artistic movements. While his upbringing emphasizes self-reliance
    and modesty, the diverse community events in Waterbury—street fairs, youth art workshops, and regional sports tournaments—have taught him the importance of individual achievement within a collective
    setting. This blend of heritage, regional identity, and emerging creative scene informs his personal narrative and future aspirations.
attributes:
  skills: '[''Traditional sketching'', ''Digital illustration (Procreate)'', ''Basic Python programming'', ''Creative short story writing'', ''Critical analysis of graphic novels'', ''Chess strategy'',
    ''Strategic video gaming'', ''Project planning and time management'']'
  hobbies: '[''Visiting local art museums'', ''Collecting vintage comic books'', ''Sketching industrial architecture'', ''Digital painting on tablet'', ''Playing chess and turn-based strategy video games'',
    ''Listening to indie/lo-fi music'', ''Mindfulness meditation'', ''Reflective journaling and poetry'', ''Participating in a small coding club'']'
  career_goals: Craig envisions a future that merges his love for visual storytelling with technology. He aspires to attend a specialized high-school program that emphasizes graphic design and computer
    science, and ultimately aims for a career as a concept artist and technical illustrator in the video-game or animation industry. He hopes to develop a portfolio that showcases both hand-drawn and digitally
    rendered work and plans to learn advanced 3D modeling tools such as Blender. In parallel, Craig wants to deepen his programming skills to create interactive narratives, possibly working as a creative
    coder or game developer. He is also motivated to use his art as a platform for mental-health advocacy, designing comics or illustrations that help peers navigate stress and anxiety. His competitive
    drive fuels his ambition to earn recognition in youth art contests and coding hackathons, while his cautious nature pushes him to seek stable, structured work environments that support work-life balance.
