  career_goals: Patsy wants to keep exploring her interests in science and caring for living beings, with a long‑term goal of becoming a veterinarian or wildlife biologist. In the short term, she hopes
    to join her school's environmental club, win a regional science fair, and secure a junior volunteer role at the local library or animal shelter. She also envisions using her communication strengths
    in a community‑focused capacity later on, such as becoming a youth mentor or elementary school teacher.
