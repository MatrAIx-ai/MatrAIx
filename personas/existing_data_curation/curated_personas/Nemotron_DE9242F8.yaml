personas:
  professional: Patsy Mckinney is an aspiring youth soccer captain who blends curiosity with practicality by trying out new formations during practice while keeping a relaxed, flexible attitude toward schedules,
    and they thrive on the teamwork and community spirit fostered by their school’s athletics program.
  sports: Patsy Mckinney is a dedicated middle‑school soccer player who trains with the Pine Ridge Youth Soccer Club, roots for the Carolina Courage in the NWSL and the Charlotte Hornets on basketball nights,
    and they spend weekends hiking the nearby foothills where they photograph local wildlife.
  arts: Patsy Mckinney sings in the school choir, draws cartoons inspired by Bill Watterson’s Calvin and Hobbes, writes short stories that weave Appalachian folklore, and they often listen to Kacey Musgraves
    and Taylor Swift while sketching.
  travel: Patsy Mckinney loves family road trips to the Blue Ridge Parkway and Great Smoky Mountains, favors unplanned hikes over rigid itineraries, and they dream of saving enough to explore Orlando’s
    theme parks and the historic streets of Savannah.
  culinary: Patsy Mckinney helps her parents grill pulled pork sandwiches with tangy BBQ sauce, whips up quick mac and cheese for after‑school gaming sessions, and they enjoy sweet cornbread with honey
    butter on weekend brunches.
  core: Patsy Mckinney is a curious, sociable teen who balances a love for soccer, cartoons, and spontaneous candy binges with a habit of forgetting homework and a penchant for flexible plans.
background:
  cultural: Patsy comes from a white, working‑class family in Taylorsville, Alexander County, North Carolina. Her upbringing reflects the Southern Appalachian cultural milieu, with strong ties to family,
    community churches, and local traditions such as backyard barbecues and country‑music gatherings. She participates in church youth groups and values the hospitality, self‑reliance, and close‑knit neighborly
    support common in rural NC. Her family’s ancestry includes English and Scots‑Irish roots, which add an appreciation for regional folklore, seasonal festivals, and storytelling.
