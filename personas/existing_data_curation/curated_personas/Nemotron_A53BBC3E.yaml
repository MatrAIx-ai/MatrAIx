  career_goals: 'Penelope aims to transition into a senior leadership role where she can guide interdisciplinary analytics teams and shape organization‑wide strategy through evidence‑based decision making.
    She aspires to become a director of operations research or analytics, responsible for designing large‑scale optimization solutions for public‑sector logistics and healthcare delivery. To broaden her
    impact, she plans to pursue a master''s degree in Business Analytics and obtain professional certifications from INFORMS. Mentorship is also central to her ambition: she wants to champion the growth
    of women and underrepresented professionals in quantitative fields, speaking at conferences, publishing case studies, and establishing internal mentorship programs. Balancing career advancement with
    family life, she seeks roles that offer flexibility while allowing her to influence high‑visibility projects that marry innovative ideas with proven methodologies.'
