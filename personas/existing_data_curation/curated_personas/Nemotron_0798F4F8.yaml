  career_goals: Leslie aims to translate her creative talents and organizational strengths into a sustainable freelance career. In the short term, she plans to build a professional portfolio, secure illustration
    commissions for books and indie games, and offer branding services to local small businesses. Over the next five years, she envisions establishing a boutique studio that combines visual design with
    art‑therapy workshops, allowing her to support mental‑health awareness. She also intends to pursue a master’s degree in fine arts or art therapy to deepen her expertise and eventually teach community
    art classes.
