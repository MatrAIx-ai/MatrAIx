  career_goals: Mariann aims to transition into a supervisory role within her current workplace, where she can train new staff, develop systematic cleaning protocols, and oversee scheduling for a larger
    fleet. She is pursuing a certification as a Certified Vehicle Detailer to formalize her expertise. In the longer term, she envisions launching a modest mobile detailing service to supplement her family’s
    income, focusing on trusted local clients. Financial stability for her husband and adult children, as well as the ability to retire with a comfortable safety net, remain central motivations.
