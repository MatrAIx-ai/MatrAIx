personas:
  professional: Mariann Channell is a veteran vehicle detailer with over twenty years of hands‑on experience in industrial cleaning, renowned for her methodical OSHA‑compliant protocols, meticulous inventory
    logs, and a budding ambition to become a certified supervisor while launching a modest mobile detailing side‑business.
  sports: Mariann Channell enjoys low‑impact fitness like morning walks with the local senior walking club, occasional yoga classes at the community center, and avidly supports the regional minor‑league
    baseball team, the Springfield Sluggers, while also cheering on the town’s high school football squad on Friday nights.
  arts: Mariann Channell weaves creativity into her life by quilting intricate patterns inspired by Martha Stewart guides, devouring Agatha Christie mysteries, and regularly listening to classic rock legends
    such as Bob Dylan and The Rolling Stones during her evening relaxation.
  travel: Mariann Channell prefers carefully planned road trips that balance scenic drives with modest adventure, having recently visited the Grand Canyon and the historic streets of Savannah, while keeping
    future itineraries for a family reunion in the Blue Ridge Mountains and a weekend getaway to a local county fair.
  culinary: Mariann Channell delights in farm‑to‑table cooking, often harvesting fresh tomatoes and basil from her garden to craft rosemary‑infused roasted chicken, while also mastering the perfect apple‑cinnamon
    pie for church bake sales and savoring a hearty beef stew with root vegetables on chilly evenings.
  core: Mariann Channell is a detail‑oriented planner whose love of order extends from spotless vehicle interiors to perfectly aligned garden rows, yet she occasionally loses sleep over a missing quilting
    pattern piece and can’t resist a late‑night slice of pecan pie.
background:
  cultural: Mariann is a white American raised in Drums, Pennsylvania, part of the anthracite‑mining region of Luzerne County. Her family’s heritage includes German and Polish roots common among the area's
    immigrant communities. Growing up in a close‑knit working‑class town, she internalized values of hard work, reliability, and community service. Local traditions such as church gatherings, seasonal festivals,
    and a strong emphasis on familial support have shaped her worldview and daily practices.
attributes:
