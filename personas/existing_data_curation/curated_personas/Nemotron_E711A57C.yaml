personas:
  professional: Leandro Lopez is an aspiring digital illustrator who transforms hand‑sketched characters from a well‑worn notebook into vibrant tablet paintings, using his keen curiosity and competitive
    mindset to experiment with bold compositions while keeping his school and art deadlines organized.
  sports: Leandro Lopez channels his energetic, competitive nature into playing pickup basketball after school at the local gym, cheering on the New York Knicks and Brooklyn Nets, and training with the
    Cochecton High School varsity squad to sharpen his dribbling and three‑point shooting.
  arts: Leandro Lopez spends evenings sketching graphic‑novel panels influenced by Frank Miller’s stark line work and Hayao Miyazaki’s whimsical worlds, while his soundtrack of classic salsa and Tito Puente
    percussion rhythms fuels his creativity during both drawing and digital painting sessions.
  travel: Leandro Lopez mixes weekend hikes in the Catskill woods and Shawangunk Ridge with family road trips to Washington, D.C., while dreaming of photographing Kyoto’s bamboo groves and the neon streets
    of Tokyo, balancing his school schedule, limited budget, and a love for spontaneous exploration.
  culinary: Leandro Lopez enjoys perfecting family recipes such as arroz con pollo and caramelized plantains, expertly seasoning the rice with saffron‑infused broth and frying plantains until golden and
    crisp, and occasionally adds smoked paprika for a contemporary twist during weekend cooking sessions with relatives.
  core: Leandro Lopez is a curiosity‑driven teen who blends sketchbooks with a tablet, dominates basketball courts, trades digital loot, whips up festive family dishes, yet habitually forgets to charge
    his headphones before a gaming session.
background:
  cultural: Leandro is a second‑generation Cuban‑American. His parents immigrated from Havana and maintain strong ties to Cuban traditions, speaking Spanish at home and celebrating holidays such as Día
    de la Independencia with food, music, and dance. Growing up in the rural setting of Cochecton, New York, he blends the quiet, nature‑focused lifestyle of Sullivan County with vibrant Cuban cultural
    practices. Family gatherings often feature salsa music, homemade Cuban dishes, and storytelling about life in Cuba. He participates in local cultural events when possible and travels with his family
    to larger New York City festivals to connect with the broader Cuban diaspora. This dual exposure shapes his identity, influencing both his artistic expression and his desire to share multicultural stories
    through his future career.
