  career_goals: Leandro aspires to turn his artistic talent and growing technical skills into a career in digital media. He dreams of becoming a graphic designer, animator, or indie game developer who can
    weave Cuban cultural narratives into his work. He plans to attend a specialized high‑school program in visual arts, followed by a college degree in interactive media or game design in New York. Beyond
    personal success, he hopes to mentor other youth from multicultural backgrounds, eventually founding a community art collective that provides workshops and showcases for emerging artists from diverse
    heritages.
