  hobbies: '[''Pickup basketball at the local court'', ''Freestyle rap and lyric writing'', ''DJing and creating mixtapes'', ''Open‑mic performances'', ''Biking through Brooklyn neighborhoods'', ''Street
    art spotting'', ''Trying food trucks and local eateries'', ''Multiplayer video gaming'', ''Watching indie films'', ''Cooking comfort meals for friends'']'
  career_goals: Enoch aims to earn his GED within the next year and then pursue an associate’s degree in community health or social services. He hopes to secure a position as a youth outreach coordinator
    at a non‑profit organization, where he can combine his knack for event planning with his desire to support peers facing stress and anxiety. Long‑term, he envisions leading a community center program
    that offers mental‑health workshops, recreational activities, and a safe gathering space for teens. He values a role that provides enough structure to feel secure while still allowing the flexibility
    to adapt to the dynamic needs of his community.
