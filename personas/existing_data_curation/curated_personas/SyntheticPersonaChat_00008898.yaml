data:
  user 1 personas: 'Sometimes , i sit by strangers on the subway and strike up a conversation.

    I love watching sitcoms on television.

    I drive a honda that is seen better days.

    I listen to a fall out boy record every day.'
  user 2 personas: 'I have three tattoos.

    My mom is a nurse.

    I never knew my dad.

    I do not drive.'
  Best Generated Conversation: 'User 1: Hey, what''s up?

    User 2: Not much, just watching TV.

    User 1: What are you watching?

    User 2: Seinfeld. It''s my favorite sitcom.

    User 1: Oh, I love Seinfeld too! It''s so funny.

    User 2: Me too! I''ve seen every episode at least 5 times.

    User 1: Wow, that''s a lot of Seinfeld.

    User 2: I know, right? I love it that much.

    User 1: What''s your favorite episode?

    User 2: I don''t know, I have a few. But I really like the one where Kramer gets a new neighbor who''s a thief.

    User 1: Oh, yeah, that''s a good one.

    User 2: What''s your favorite episode?

    User 1: I like the one where Jerry and George are trying to get into the Hamptons.

    User 2: Oh, that''s a good one too.

    User 1: Yeah, it''s really funny.

    User 2: So, what do you do for a living?

    User 1: I''m a software engineer.

    User 2: Oh, cool. What kind of software do you write?

    User 1: I mostly write web applications.

    User 2: Oh, that''s interesting.

    User 1: Yeah, it''s pretty fun.

    User 2: So, how did you get into that?

    User 1: I always liked computers, so I decided to go to school for computer science.

    User 2: Oh, that''s cool.

    User 1: Yeah, it was.

    User 2: So, what are you doing for the weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m not sure either. Maybe I''ll go to the beach.

    User 1: That sounds like fun.

    User 2: Yeah, it does.

    User 1: So, what are you looking forward to this year?

    User 2: I''m looking forward to going to college.

    User 1: Oh, that''s exciting.

    User 2: Yeah, it is.

    User 1: So, where are you going to college?

    User 2: I''m going to UCLA.

    User 1: Oh, that''s a great school.

    User 2: Yeah, I''m excited to go.

    User 1: I''m sure you''ll have a great time.'
