personas:
  professional: An experienced early childhood education administrator named Cory Chasteen blends methodical, data‑driven planning with a vibrant enthusiasm for STEAM, leveraging grant writing, community
    partnerships, and the city’s art‑and‑environment ethos to design preschool curricula that integrate local mural projects, forest‑based science, and sustainability practices; they also mentor emerging
    educators and serve as a charismatic public speaker.
  sports: An active outdoor enthusiast named Cory Chasteen embraces weekend hikes through the Columbia River Gorge, rides a commuter bike to the community garden, participates in the Portland Running Club’s
    weekly 5K, follows the Portland Trail Blazers fervently, occasionally joins a local adult soccer league with the Timbers U20 alumni, and integrates mindful stretching into their regimen, though they
    sometimes skip a post‑run cooldown due to lingering work deadlines.
  arts: An avid cultural participant named Cory Chasteen frequents Portland’s Pearl District galleries, eagerly watches improv shows by Unexpected Productions, strums acoustic renditions of Sufjan Stevens
    and The Decemberists at open‑mic nights, curates a personal collection of Pacific Northwest photography inspired by rainy streetscapes, and draws creative inspiration from the paintings of local artist
    Katherine Gahagan, all of which fuel their integrative approach to early childhood curricula.
  travel: A curious explorer named Cory Chasteen plans trips with a blend of detailed itineraries and spontaneous detours, having trekked the Oregon Coast, explored the rainy streets of Vancouver, savored
    sushi in Kyoto, and hiked the turquoise lakes of Banff, while dreaming of an eco‑focused adventure in Iceland’s volcanic landscape and a cultural immersion in New Zealand’s Maori villages, yet occasionally
    delays bookings due to lingering work anxieties.
  culinary: A culinary experimenter named Cory Chasteen blends an intermediate cooking skill set with a love for coffee‑infused brunches, often whipping up homemade ramen with miso‑based broth, mole poblano
    with roasted chilies, quinoa‑seeded salads featuring heirloom tomatoes and fresh basil, and artisanal sourdough loaves using locally sourced rye, while sourcing spices from Portland’s International
    Market and occasionally over‑seasoning in the enthusiasm of trying new world cuisines.
  core: Cory Chasteen, a 51‑year‑old early‑education champion, combines meticulous planning, a boundless curiosity for art and science, and a talkative, community‑driven spirit—though a constant undercurrent
    of worry sometimes drives them to over‑schedule every facet of life, and they often rehearse their presentations aloud before meetings.
background:
  cultural: Raised in a middle‑class white family in the Pacific Northwest, Cory’s cultural identity is shaped by Portland’s progressive, environmentally‑conscious ethos. He grew up with a strong emphasis
    on community involvement, outdoor recreation, and appreciation for the local arts scene. The city’s focus on sustainability, coffee culture, cycling, and activism informs his values of inclusivity and
    social responsibility. While he identifies as culturally white American, he actively seeks to understand and honor the indigenous histories of the region and incorporates diverse cultural perspectives
    into his educational work.
attributes:
  skills: '[''STEAM Curriculum Development'', ''Program Management'', ''Budget Planning'', ''Data Analysis'', ''Grant Writing'', ''Staff Training'', ''Community Outreach'', ''Public Speaking'', ''Compliance
