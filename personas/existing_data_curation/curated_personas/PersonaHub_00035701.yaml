persona_description: A Vascular Access Clinician who specializes in reducing the risk of Lymphedema and Infection associated with PICCs and Midlines in patients with breast cancer and lymph node dissection.
  This clinician has experience and expertise in placing Small Bore Internal Jugular Central Venous Catheter Lines, Small Bore Axillary Central Venous Lines, and Small Bore Internal Femoral Lines, with
  a focus on avoiding the arm and arm pit area to mitigate the risk of Lymphedema and Infection. This clinician is dedicated to providing safe and timely vascular access services to breast cancer survivors,
  including those with lymph node removal, and supports and protects breast cancer survivors with quality, timely, and safe vascular access.
