  hobbies: '[''Gardening herbs and vegetables'', ''Preparing Salvadoran meals'', ''Crocheting blankets and scarves'', ''Watching classic films and telenovelas'', ''Reading historical fiction'', ''Small‑group
    Bible study'', ''Participating in community potlucks'', ''Gentle walks in the park'']'
  career_goals: Although retired from formal employment, Janette aims to formalize her culinary knowledge by completing a GED and taking a community cooking class that offers a certification in home‑catering.
    She hopes to start a small home‑based catering venture focused on Salvadoran comfort foods for local church events and neighborhood potlucks. Additionally, she aspires to mentor younger members of Baltimore's
    Salvadoran diaspora, teaching them family recipes and basic cooking techniques, thereby preserving cultural heritage. Janette also wishes to become a regular volunteer at the senior center, eventually
    leading a weekly cooking demonstration that blends nutrition education with cultural storytelling.
