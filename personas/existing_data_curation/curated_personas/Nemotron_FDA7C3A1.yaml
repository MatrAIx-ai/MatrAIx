personas:
  professional: Janette Delgado, a retired home‑maker turned aspiring home‑catering entrepreneur, combines decades of traditional cooking expertise with practical budgeting and bilingual translation skills,
    while her love of routine and occasional disorganization leads her to schedule flexible class sessions and maintain a steady, if unhurried, preparation workflow for church events.
  sports: Janette Delgado enjoys gentle morning walks to the nearby park, participates occasionally in the local senior walking club, and follows the Baltimore Orioles baseball team and Maryland Terrapins
    women's tennis, preferring low‑impact activity that fits her routine and seasonal weather.
  arts: Janette Delgado spends evenings listening to classic Latin American radio programs featuring artists like Julio Jaramillo and Lucho Gatica, crocheting colorful blankets while watching classic films
    such as Casablanca and popular telenovelas like María la del Barrio, and she collects vintage recipe cards that double as artistic keepsakes.
  travel: Janette Delgado favors short, well‑planned day trips to historic sites like Annapolis and the Chesapeake Bay, enjoys occasional senior group tours to Washington, D.C., but dreams of a budget‑friendly
    getaway to Oaxaca to explore its culinary markets, balancing her love of routine travel itineraries with a modest travel budget.
  culinary: Janette Delgado excels at preparing variations of pupusas with cheese, beans, and loroco, bakes traditional sweet breads such as pan de yuca for festive gatherings, and incorporates fresh garden
    herbs like cilantro and oregano into dishes, showcasing a home‑cooking skill level that blends creativity with time‑tested family recipes.
  core: Janette Delgado is a garden‑loving, crochet‑spinning, routine‑driven culinary enthusiast who sometimes misplaces her keys, debates the best time to water herbs, and quietly guards the secret spice
    blend that defines her cherished comfort dishes.
background:
  cultural: Janette is a first‑generation Salvadoran American whose parents emigrated to the United States in the early 1970s. Growing up in a modest household in Baltimore, she was raised with strong Catholic
    values and the daily rhythm of Spanish spoken at home. Family gatherings centered around shared meals, with dishes like pupusas, casamiento, and pastelitos anchoring cultural identity. The Salvadoran
    community in Baltimore, particularly around the Highlandtown area, has provided a network of mutual support, where remittances, church celebrations, and cultural festivals such as Fiesta de San Salvador
    are common. Janette maintains the tradition of honoring her heritage through food, language, and storytelling, while also navigating the broader American culture of the city. Her Salvadoran roots influence
    her preference for routine, practicality, and close‑knit relationships, even as she embraces the diversity of Baltimore's neighborhoods.
