  hobbies: '["watercolor painting", "photography", "hiking", "birdwatching", "science fiction reading", "short story writing", "DIY electronics projects", "acoustic guitar playing", "volunteering at community
    tech workshops", "small maker meetups"]'
  career_goals: Dan aims to become a lead design engineer within the next five years, focusing on sustainable energy solutions such as solar micro‑grids and energy‑efficient power converters. He plans to
    obtain his Professional Engineer (PE) license and pursue a master's degree in Electrical Engineering with a concentration in renewable energy. Long‑term, he envisions leading interdisciplinary teams
    that develop low‑cost, community‑focused technologies, while also establishing a mentorship program for aspiring engineers in rural Pennsylvania. Dan is motivated to blend technical innovation with
    social impact, ensuring his work benefits both industry and his local community.
