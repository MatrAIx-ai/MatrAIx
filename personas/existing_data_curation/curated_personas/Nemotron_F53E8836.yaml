personas:
  professional: Dan Curry is a 28‑year‑old electrical and electronics engineer specializing in renewable micro‑grid design, whose meticulous circuit‑design skills and empathetic communication style make
    them a natural mentor and bridge between technical teams and community stakeholders.
  sports: Dan Curry enjoys weekend hikes with the Williamsport Trail Club, follows the Pittsburgh Steelers and the Penn State Nittany Lions for football, occasionally joins a local pick‑up soccer game where
    they appreciate the camaraderie of small groups, and participates in bird‑watching outings that double as low‑intensity cardio.
  arts: Dan Curry pours artistic energy into watercolor landscapes inspired by Ansel Adams and Georgia O'Keeffe, captures Appalachian vistas with a Nikon D5600, writes speculative sci‑fi flash fiction influenced
    by Ted Chiang, and strums acoustic guitar at open‑mic nights covering Neil Young and Joni Mitchell, letting each medium fuel the others.
  travel: Dan Curry plans low‑budget road trips that blend scenic drives with hiking, has explored Shenandoah National Park, the Adirondack Mountains, and Asheville, North Carolina, and dreams of trekking
    Patagonia’s Torres del Paine, favoring spontaneous itineraries over rigid schedules.
  culinary: Dan Curry loves farm‑to‑table cooking, excels at herb‑crusted trout with lemon‑dill sauce, frequently bakes apple crisp using locally sourced apples, and often grills a smoky pork shoulder seasoned
    with brown sugar and smoked paprika, enjoying the process as a creative outlet after a day of engineering work.
  core: Dan Curry is a curious engineer‑artist who balances methodical circuit design with spontaneous watercolor splashes, often losing track of time in the woods, a sci‑fi plot, or tinkering with robotics
    kits.
background:
  cultural: Dan grew up in a middle‑class family in the Loyalsock Valley near Williamsport, Pennsylvania, with deep roots in the region's German and Irish heritage. The community’s modest, self‑reliant
    values and strong emphasis on neighborly cooperation shaped his outlook. He was raised with traditional Pennsylvania Dutch folk festivals, local high school sports, and a family culture that prized
    hard work, curiosity, and support for community initiatives. This background fosters his blend of practicality and openness to unconventional ideas, as well as his commitment to contributing positively
    to his hometown and its surrounding rural areas.
attributes:
  skills: '["circuit design", "PCB layout", "embedded systems programming", "C/C++", "Python scripting", "MATLAB", "signal processing", "power electronics", "renewable energy system integration", "hardware
