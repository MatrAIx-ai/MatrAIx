personas:
  professional: Jessica Poteat, a seasoned secondary‑school teacher with deep expertise in curriculum development, data‑driven assessments, and educational technology, leverages their organized, methodical
    nature and collaborative spirit to mentor new teachers while designing inclusive project‑based learning frameworks as they transition toward part‑time consulting.
  sports: Jessica Poteat, a devoted walker, joins a senior walking club that meets thrice weekly at Prospect Park, follows the Brooklyn Nets and New York Mets, and occasionally participates in a low‑impact
    tennis league to stay active.
  arts: Jessica Poteat, an avid patron of the Brooklyn Museum and local poetry readings, finds inspiration in the verses of Emily Dickinson and the paintings of Georgia O’Keeffe, often quoting lines while
    knitting scarves for students.
  travel: Jessica Poteat, who prefers meticulously planned trips, has explored historic Boston and Washington, D.C., enjoys seasonal visits to the Hamptons, and dreams of a quiet pilgrimage to the Isle
    of Skye to trace ancestral roots.
  culinary: Jessica Poteat, an enthusiastic baker, perfects seasonal sourdough loaves with rosemary and pumpkin, pairs them with locally sourced honey and fresh garden herbs, and crafts simple pastas for
    neighborhood gatherings, though they sometimes over‑bake croissants in their eagerness.
  core: Jessica Poteat, a methodical yet curious 73‑year‑old, balances organized teacher‑mentor duties with quiet garden reflections, worries over tiny details, and steadies life with knitting, crossword
    puzzles, and seasonal bread.
background:
  cultural: Jessica was raised in a mid‑20th‑century middle‑class white family in New York, rooted in Anglo‑American traditions that emphasized education, community involvement, and hard work. Growing up
    during the civil‑rights era and the women’s liberation movement, she developed an inclusive worldview that values diversity and equity. Living her adult life in Brooklyn's multicultural neighborhoods,
    she embraces the city’s rich cultural tapestry while maintaining personal traditions such as attending local church services and participating in neighborhood events. Her background informs her respectful,
    cooperative demeanor and her commitment to fostering harmony in the classroom and the broader community.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Student Assessment and Data Analysis'', ''Educational Technology Integration'', ''Mentoring and Coaching
