  hobbies: '[''Reading historical fiction'', ''Community gardening'', ''Knitting'', ''Walking in Prospect Park'', ''Attending local art exhibitions and museum events'', ''Volunteering at a senior center'',
    ''Genealogy research'', ''Crossword puzzles'', ''Gentle yoga'', ''Baking seasonal breads'']'
  career_goals: Jessica aims to transition into a part‑time educational consultant role, helping schools implement project‑based learning and multicultural curricula. She hopes to author a practical guide
    for teachers on balancing innovative practices with proven methods. Additionally, she seeks to formalize a mentorship program for early‑career educators within her district and serve on the school board’s
    advisory committee to advocate for student wellness and teacher support. Her long‑term ambition is to leave a lasting legacy of inclusive, well‑organized learning environments in Brooklyn.
