  career_goals: Archie aims to advance into a senior technical leadership role within the next five years, targeting positions such as Lead Engineer or Engineering Manager where he can shape development
    processes, champion Agile practices, and mentor teams. He plans to earn professional certifications like AWS Solutions Architect and Certified Scrum Master. Ultimately, he hopes to launch a consulting
    practice that builds robust, community‑oriented software solutions for small businesses in the Detroit metro area, while preserving a healthy work‑life balance for his family.
