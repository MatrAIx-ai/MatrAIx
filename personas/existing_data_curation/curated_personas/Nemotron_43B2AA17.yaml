personas:
  professional: Anibal Gutierrez is a seasoned civil engineer who couples rigorous structural analysis with an artistic sensibility, wielding AutoCAD, Revit, and BIM to design hurricane‑resistant public
    spaces while balancing meticulous organization with adaptive flexibility, and they approach client negotiations with a competitive edge tempered by occasional healthy skepticism.
  sports: Anibal Gutierrez cycles the Lake Eola and Butler Chain of Lakes routes in spring, joins the Orlando Cycle Club for weekend rides, paddles a kayak on the Winter Park Chain during summer, avidly
    follows the Orlando Magic and Orlando City SC, and they play pick‑up basketball at the local community center where their competitive streak shines.
  arts: Anibal Gutierrez captures urban architecture and landscapes with a keen eye for light, drawing inspiration from Ansel Adams and Henri Cartier‑Bresson, while they immerse themselves in salsa music
    evenings, attend exhibitions at the Orlando Museum of Art and the Mennello Museum, and they regularly contribute photographs to local art blogs.
  travel: Anibal Gutierrez prefers itineraries that blend cultural immersion with nature exploration, meticulously planning trips that have taken them to St. Augustine’s historic streets, the sun‑kissed
    beaches of the Florida Keys, and Barcelona’s modernist architecture, while they dream of hiking the Inca Trail and experiencing the serene fjords of Norway.
  culinary: Anibal Gutierrez loves cooking island‑inspired dishes such as pork marinated in citrus‑y mojo, slow‑cooked ropa vieja, and aromatic arroz con pollo, using fresh garlic, cumin, oregano, and sour
    orange juice, and they often shop at the farmers market for organic produce before hosting dinner gatherings for friends.
  core: Anibal Gutierrez blends engineering precision with artistic curiosity, balances competitive drive with community‑first values, and their habit of meticulously planning everything from budgets to
    bike routes keeps them both productive and reflective.
background:
  cultural: Anibal was born to Cuban immigrant parents and grew up bilingual in Spanish and English. He maintains strong ties to Cuban culture through family traditions, music, and cuisine, celebrating
    events like Carnaval and Cuban Independence Day. Living in Orlando’s vibrant multicultural community, he blends his heritage with American influences, bringing a collaborative yet respectful perspective
    to his professional and social circles. His cultural roots inform his appreciation for community‑focused design and his commitment to giving back to both the Cuban-American and broader Orlando communities.
attributes:
  skills: '[''Structural analysis'', ''Site development'', ''Sustainable design'', ''AutoCAD'', ''Revit/BIM'', ''Florida Building Code compliance'', ''Hurricane‑resistant design'', ''Flood mitigation'',
