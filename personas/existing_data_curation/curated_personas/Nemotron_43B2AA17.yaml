  hobbies: '[''Photography'', ''Salsa dancing'', ''Cuban cooking'', ''Volunteer work with Habitat for Humanity'', ''Chess'', ''Reading technical and philosophical books'', ''Cycling'', ''Visiting art galleries
    and museums'', ''Kayaking'', ''Hiking'']'
  career_goals: He aims to become a senior project manager overseeing large‑scale infrastructure projects in Central Florida, such as resilient transportation corridors and community parks that integrate
    artistic elements. Anibal is pursuing LEED AP certification and plans to earn a senior professional engineer (PE) designation. In the long term, he hopes to launch his own consultancy focused on sustainable,
    culturally inclusive design and to mentor emerging engineers from underrepresented backgrounds, particularly within the Cuban-American community.
