personas:
  professional: Richard Little is a seasoned Class A CDL truck driver who leverages thirty‑plus years of on‑the‑road experience, route‑optimization expertise, hands‑on mechanical know‑how, and calm, methodical
    leadership to mentor younger drivers and negotiate freight contracts, all while they balance curiosity about emerging telematics with a practical, organized approach to daily operations.
  sports: Richard Little spends summer weekends sailing the Scituate harbor and playing in the town’s recreational softball league, while winter evenings are reserved for cheering the Boston Red Sox, the
    New England Patriots, and the Boston Bruins, and they maintain a personal fitness routine of early‑morning jogs along the coastline to counteract the sedentary nature of trucking.
  arts: Richard Little channels his love of hands‑on creation into building birdhouses and custom shelving in his workshop, finds inspiration from folk maritime musicians like Gordon Bok and classic American
    painter Norman Rockwell, and they frequently attend the Scituate Harbor Festival where local folk bands and a community theater troupe perform, solidifying his belief that craft and culture are intertwined.
  travel: Richard Little prefers road‑trip itineraries that double as scouting runs for potential freight routes, having mapped scenic drives from the historic lighthouses of Cape Cod to the rugged coasts
    of Portland, Maine, while they dream of a future cruise to the Azores to combine his love of the sea with a well‑deserved break from the highway.
  culinary: Richard Little is a devoted grill master who expertly smokes brisket using hickory chips, sears lobster tails with garlic‑butter glaze, and whips up classic New England clam chowder with fresh
    clams and heavy cream, often pairing his meals with a cold Boston lager and they showcase a high‑level confidence that borders on culinary showmanship.
  core: Richard Little navigates life with a compass that points toward reliable routes, community service, and the occasional spontaneous fishing trip, all while they juggle a slight obsession with updating
    his fleet’s telematics dashboard and a habit of over‑seasoning his barbecue rub until the neighbors can smell it from three blocks away.
background:
  cultural: Richard is a White Anglo‑American who grew up in the Boston suburbs and now lives in Scituate, Massachusetts. Raised in a middle‑class, working‑family environment, he internalized New England
    values of hard work, modesty, and community responsibility. The coastal culture of Scituate, with its fishing and maritime traditions, influences his love for sailing and local festivals. He feels a
    strong connection to regional customs such as seasonal fairs, town meetings, and a pragmatic outlook that balances curiosity about new technologies with respect for proven methods. His cultural identity
    blends the historical roots of New England with a practical, forward‑looking mindset.
attributes:
