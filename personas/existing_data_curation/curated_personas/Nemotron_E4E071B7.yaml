    fairs'', ''Mentoring aspiring healthcare students'', ''Yoga and mindfulness meditation'', ''Cooking healthy meals with local ingredients'']'
  career_goals: Bobbie aims to deepen his expertise in sports medicine and orthopedics, a field that aligns with his love for outdoor activity and his patient population in Utah. Over the next five years
    he plans to obtain a postgraduate certification in Sports Medicine, pursue a leadership role as a clinical coordinator, and eventually oversee a community health program that provides affordable orthopedic
    and injury‑prevention services to underserved neighborhoods. He also seeks to develop stronger organizational and time‑management skills to balance his desire for flexible, patient‑centered care with
    the structured demands of a supervisory position. Long‑term, he envisions mentoring new physician assistants and contributing to curriculum development at a local community college.
