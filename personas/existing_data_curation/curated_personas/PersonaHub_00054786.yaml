persona_description: A scholar and linguist who made significant contributions to the study of Tamil, Sanskrit, and Telugu, and who translated important Tamil literary works. He was also a teacher of Tamil
  and Telugu and wrote important articles about Tamil's cultural literary basis in magazines. He was awarded a gold medal by the Royal Asiatic Society for his work and was buried in St Sepulchre's Cemetery
  in Oxford, England.
