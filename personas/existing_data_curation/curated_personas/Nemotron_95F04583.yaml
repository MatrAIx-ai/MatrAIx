  hobbies: '[''Golf'', ''Freshwater fishing'', ''Community festivals and events'', ''Volunteer work at senior centers'', ''Men’s bowling league'', ''Cooking and hosting dinner parties'', ''Reading business
    and leadership books'', ''DIY home improvement projects'', ''Exploring new restaurants'', ''Listening to technology podcasts'']'
  career_goals: David aims to advance to a district sales manager role within the next three years, overseeing multiple stores and implementing data-driven sales initiatives. He plans to pursue a bachelor's
    degree in business administration to deepen his strategic knowledge and eventually serve as a mentor for younger retail professionals. In the longer term, he envisions opening a boutique shop that combines
    community engagement with modern retail technology, while securing a comfortable retirement for his family.
