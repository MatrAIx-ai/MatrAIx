personas:
  professional: Dominique Thompson, a retired civil engineer with decades of experience in structural analysis and technical drafting, leverages their practical mindset and seasoned communication skills
    to mentor youth in STEM while often juggling spontaneous community projects that clash with their love of routine.
  sports: Dominique Thompson participates in a senior walking club at the local park, enjoys occasional pick‑up senior softball games, and faithfully follows the Washington Capitals and Washington Nationals,
    cheering them on during the winter and summer seasons.
  arts: Dominique Thompson finds daily solace in the soulful sounds of Nina Simone, Aretha Franklin, and John Coltrane, regularly attends the church choir rehearsals, and devours historical fiction by authors
    such as James McBride, letting music and literature shape their evenings.
  travel: Dominique Thompson prefers relaxed, well‑planned trips with occasional spontaneous detours, having visited New Orleans for Mardi Gras, taken a family reunion road‑trip to Atlanta, and dreaming
    of a leisurely stroll through Savannah’s historic squares.
  culinary: Dominique Thompson, an adept home cook, regularly prepares soul‑food staples such as collard greens, fried chicken, cornbread, and sweet‑potato pie, often seasoning dishes with home‑grown basil
    and cilantro while occasionally treating themselves to a brunch at a downtown farm‑to‑table restaurant.
  core: Dominique Thompson blends a lifetime of engineering precision with a love for spontaneous community celebrations, juggling meticulous budgeting and garden routines while never missing a Sunday gospel
    hymn or a surprise bridge night.
background:
  cultural: Dominique grew up during the civil rights movement in the Washington, D.C. metropolitan area, shaping a strong sense of social justice and community responsibility. Her family’s roots trace
    back to the Great Migration, bringing Southern cultural traditions to Prince George’s County. As a Black woman in a predominantly white engineering field, she has navigated both professional and societal
    challenges, fostering resilience and a deep commitment to uplifting the next generation. Her cultural identity is expressed through church involvement, celebration of Juneteenth, soul‑food cooking,
    and an appreciation for African‑American music and storytelling. Community ties, family, and the legacy of perseverance remain central to her worldview.
