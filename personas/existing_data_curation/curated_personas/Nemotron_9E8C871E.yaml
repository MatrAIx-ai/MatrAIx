  hobbies: '[''Crocheting'', ''Quilting'', ''Herb and Tomato Gardening'', ''Reading Historical Fiction'', ''Cooking Soul‑Food'', ''Listening to Jazz, Blues, and Motown'', ''Walking in Parks'', ''Playing
    Bridge'', ''Church and Choir Participation'', ''Attending Community Festivals'']'
  career_goals: Although retired, Dominique remains driven to make a lasting impact. She aims to volunteer as a math tutor at the local community center, mentor high‑school students interested in engineering,
    and serve on the advisory board of a nonprofit that promotes STEM education for underrepresented youth. She also hopes to document her journey as a Black woman engineer in a memoir, and to stay active
    by participating in walking groups and church outreach programs. Maintaining her health and independence while fostering intergenerational connections are core ambitions.
