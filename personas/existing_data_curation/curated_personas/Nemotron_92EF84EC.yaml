personas:
  professional: Claudia Irizarry, a retired bilingual educator with four decades of experience, uses their charisma and curiosity to design culturally responsive curricula, lead intergenerational storytelling
    workshops, and mentor novice teachers while embracing a flexible, sometimes disorganized, approach to community volunteering.
  sports: Claudia Irizarry enjoys gentle morning walks along the Monon Trail, participates in low‑impact water aerobics at the senior center, and is a devoted fan of the Indianapolis Colts and Indiana Pacers,
    cheering them on from their living room during games.
  arts: Claudia Irizarry sings in a church choir, often drums a small hand drum while listening to mariachi recordings, and devotes evenings to reading historical fiction and the works of Lila Downs and
    Frida Kahlo, allowing music and visual art to shape their storytelling workshops.
  travel: Claudia Irizarry prefers relaxed, culturally immersive trips, having visited Oaxaca’s vibrant markets and San Miguel de Allende’s colonial plazas, and hopes to explore the historic streets of
    Savannah, Georgia, but generally travels with family to stay within a comfortable budget.
  culinary: Claudia Irizarry passionately prepares mole poblano with ancho chilies, tamales stuffed with pork and epazote‑infused masa, and hearty pozole using fresh corn from their garden, while experimenting
    with coriander‑spiced salsas and savoring the aromas of oregano‑laden soups.
  core: Claudia Irizarry balances a talkative, community‑centric spirit with bouts of anxiety, channeling curiosity into cooking, teaching, and storytelling while occasionally letting disorganization slip
    into their daily routine.
background:
  cultural: Claudia was born to Mexican immigrant parents who settled in the Midwest during the 1960s, growing up in a household where Spanish language and Mexican customs were honored alongside American
    school life. Her upbringing emphasized family cohesion, respect for elders, and Catholic traditions, which continue to shape her values of kindness, cooperation, and harmony. She has preserved cultural
    practices such as celebrating Día de los Muertos, preparing festive foods, and sharing folklore stories with younger generations in Indianapolis. While fully integrated into her local community, Claudia
    maintains a strong bicultural identity, using her bilingual proficiency to bridge cultural gaps and promote mutual understanding among diverse groups.
