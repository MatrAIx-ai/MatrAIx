  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Reading contemporary and Indigenous literature'', ''Hiking'', ''Traditional drumming and dancing'', ''Attending art exhibitions'', ''Cooking
    Native recipes'', ''Volunteering at cultural centers'', ''Storytelling for youth'']'
  career_goals: Roble aims to transition from a teaching assistant to a fully credentialed high‑school teacher within the next three years, with a focus on social studies and Native American studies. He
    plans to complete his bachelor’s degree in education while obtaining a teacher certification, and eventually pursue a master’s in multicultural education. His longer‑term ambition is to become a curriculum
    specialist who designs and implements Indigenous‑focused educational programs for schools across North Dakota, and to establish a community art and storytelling center that provides after‑school workshops
    for tribal youth. He also hopes to advocate for increased representation of Native histories in state curricula and to mentor other aspiring educators from underrepresented backgrounds.
