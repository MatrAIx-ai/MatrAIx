personas:
  professional: Roble Lo works as a teaching assistant at a community college, where they combine lesson planning, Canvas mastery, and culturally responsive curriculum design with a curious and balanced
    mindset that keeps them organized yet adaptable in mentoring students and collaborating with faculty.
  sports: Roble Lo enjoys weekend hikes with the North Dakota Trail Club, follows the North Dakota State Bison football and the Fargo‑Moorhead RedHawks baseball teams, and participates in community‑led
    outdoor fitness bootcamps to stay active.
  arts: Roble Lo channels artistic passion by painting prairie scenes inspired by Albert Bierstadt, practicing photography in the style of Ansel Adams, and listening to folk singer Buffy Sainte‑Marie, while
    regularly attending performances by the local Drum and Dance Ensemble that celebrate tribal storytelling.
  travel: Roble Lo prefers thoughtfully planned trips that blend adventure and cultural immersion, having explored Yellowstone National Park, the historic town of Taos, New Mexico, and the coastal villages
    of Nova Scotia, while dreaming of a future pilgrimage to the ancient pueblos of the Southwest.
  culinary: Roble Lo, an avid home cook, enjoys preparing traditional three‑sisters stew with heirloom corn, beans, and squash, wild‑rice pilaf with dried cranberries, and bison chili seasoned with sage
    and juniper berries, often experimenting with fresh herbs learned from their grandmother’s kitchen.
  core: Roble Lo is a curiosity‑driven educator‑artist who balances meticulous planning with spontaneous bursts of creative impulse, yet occasionally procrastinates on paperwork while daydreaming about
    the next landscape to sketch.
background:
  cultural: Roble is a descendant of the Lakota people, born and raised in the Northern Plains of North Dakota. His family maintains strong ties to tribal traditions, including oral storytelling, seasonal
    ceremonies, and the use of the Lakota language at home. Growing up near the Standing Rock area, he was exposed to both the challenges and the resilience of Indigenous communities, which shaped his commitment
    to cultural preservation. He actively participates in local powwows, supports tribal language revitalization projects, and integrates his heritage into his teaching philosophy by emphasizing respect
    for the land, communal responsibility, and the value of diverse perspectives.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Instructional technology'', ''Culturally responsive teaching'', ''Academic tutoring'', ''Curriculum research and development'', ''Facilitation
