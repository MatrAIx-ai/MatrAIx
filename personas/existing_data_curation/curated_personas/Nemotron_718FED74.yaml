personas:
  professional: Joby Porter, an aspiring collections manager and digital archivist, leverages strong research, metadata creation, and Adobe design skills with a methodical, organized approach to digitizing
    regional artifacts and presenting them through interactive online exhibits that honor local narratives.
  sports: Joby Porter stays fit primarily by hiking the trails of Congaree National Park with the Orangeburg Heritage Hikers Club and joining a local running group, while cheering on the Carolina Panthers
    in football season and the Charlotte Hornets in basketball, reflecting a balanced mix of solitary wilderness exercise and community sports fandom.
  arts: Joby Porter immerses themselves in creating delicate watercolors of Southern landscapes, drawing inspiration from Winslow Homer's realism, Georgia O'Keeffe's vibrant palettes, and the folk melodies
    of the Avett Brothers, while regularly attending gallery openings that feature contemporary Southern artists like Janice Lam.
  travel: Joby Porter plans each trip meticulously, favoring scenic road trips through historic Charleston and Savannah and weekend hikes in the Blue Ridge Mountains, while dreaming of a semester abroad
    studying art archives in Florence and Paris, balancing a modest student budget with a keen desire for cultural immersion.
  culinary: Joby Porter enjoys cooking classic Southern fare—shrimp and grits with smoked paprika, buttermilk fried chicken, and collard greens seasoned with apple cider vinegar—culminating in relaxed board‑game
    nights where they showcase their respectable, though occasionally over‑salted, culinary experiments.
  core: Joby Porter blends a methodical mind with a restless creative spirit, habitually turning everyday moments—from a church hymn to a park stroll—into meticulously documented art projects, all while
    secretly hoarding artisanal hot sauces for late‑night sketch sessions.
background:
  cultural: Joby grew up in Orangeburg, South Carolina, a small city steeped in Southern history and known for its role in the civil rights movement. Raised in a middle‑class white family, he attended local
    public schools where he was involved in the art club and theater program. His parents, a high‑school teacher and a small‑business owner, emphasized the importance of education, community service, and
    Southern hospitality. Regular attendance at his local Baptist church instilled values of kindness, cooperation, and a strong sense of responsibility toward others. Exposure to the region’s rich cultural
    tapestry—from historic plantations and African‑American heritage sites to local folk music and arts festivals—fostered his appreciation for diverse artistic expressions and motivated his interest in
    preserving regional cultural narratives.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Research and archival techniques'', ''Data organization (Excel, basic SQL)'', ''Photography and photo editing'',
    ''Project planning and coordination'', ''Written communication and editing'', ''Basic Python scripting'', ''Public speaking (small groups)'', ''Volunteer management'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration on tablet'', ''Visiting art galleries and museums'', ''Reading science fiction and philosophy'', ''Hiking and nature photography'',
    ''Playing board games with a small group of friends'', ''Cooking Southern comfort food'', ''Journaling and reflective writing'', ''Volunteering at the Orangeburg County Historical Society'']'
  career_goals: Joby aims to combine his passion for art and his systematic skill set into a career that preserves and presents cultural heritage. After completing his bachelor's degree in Art History or
    Museum Studies, he hopes to work as a collections manager or digital archivist at a regional museum or historical society, eventually leading projects that digitize and exhibit local artworks and artifacts.
    He also aspires to develop an online platform that showcases emerging artists from the Southeast, integrating interactive design and educational content. In the longer term, he envisions taking on a
    leadership role in museum administration, influencing inclusive programming that reflects the diverse narratives of Orangeburg and the broader South.
