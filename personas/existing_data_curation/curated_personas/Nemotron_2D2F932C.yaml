  hobbies: '[''Reading (young‑adult mystery and realistic fiction)'', ''Journaling'', ''Drawing and sketching'', ''Cooking traditional Mexican dishes'', ''Gardening indoor plants'', ''Listening to regional
    Mexican music'', ''Puzzle video games (e.g., Tetris, Sudoku)'', ''Volunteering in library book‑sorting'', ''Yoga and mindfulness exercises'']'
  career_goals: Carmen aims to graduate high school with solid academic performance, then enroll in a community college program that offers either nursing or culinary arts. She is drawn to the stability
    and clear structure of healthcare roles such as a medical assistant or registered nurse, where she can apply her practical mindset and organized approach while helping others. Simultaneously, she dreams
    of refining her cooking abilities through culinary school to eventually work as a chef specializing in authentic Mexican cuisine, with the long‑term vision of opening a small family‑owned bakery or
    kitchen that provides reliable employment for her relatives. Throughout her career planning, she prioritizes jobs that offer predictable schedules, a calm work environment, and the ability to support
    her family financially.
