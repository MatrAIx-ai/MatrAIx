personas:
  professional: Carmen Marquez, a meticulous 14‑year‑old middle‑school student, channels their love for order into a volunteer role sorting books at the school library, where they hone early information‑management
    skills and dream of one day becoming a librarian or archivist.
  sports: Carmen Marquez prefers low‑impact fitness, attending a local community yoga class twice a week and cheering for the nearby professional baseball team, the Chicago Cubs, while they occasionally
    join a school intramural badminton club for gentle competition.
  arts: Carmen Marquez channels their creative energy into sketching delicate folk patterns inspired by family traditions, immerses themselves in contemporary YA mystery novels such as Megan Miranda’s 'A
    Stranger to the Truth,' and finds solace in the melodic guitar of regional folk singer Alejandro Morales while they occasionally hum the pop choruses of Taylor Swift.
  travel: Carmen Marquez enjoys low‑key weekend getaways with their family to nearby nature spots like Redwood National and State Parks, plans trips with meticulous itineraries and a preference for quiet
    cabins over bustling hotels, and dreams of one day exploring the historic streets of Barcelona while they savor local cafés.
  culinary: Carmen Marquez loves preparing family‑style meals, expertly rolling homemade corn tortillas, simmering a robust tomato‑based salsa, and gently seasoning beans for a hearty stew, while they experiment
    with fresh herbs like cilantro and oregano in the kitchen, though they often skip cleaning up afterward in a rush.
  core: Carmen Marquez is a quietly diligent teen who thrives on routine, seeks solace in solitary creative pursuits, wrestles with lingering anxiety, and balances meticulous organization with occasional
    bouts of impulsive snack cravings as they navigate school life.
background:
  cultural: Carmen was born and raised in Lilburn, Georgia, within a close‑knit Mexican immigrant family. At home, Spanish is the primary language, and she celebrates Mexican traditions such as Día de los
    Muertos, Mexican Independence Day, and family quinceañera preparations. The family regularly attends a local Catholic church, which reinforces communal values and cultural rituals. Mexican cuisine is
    a central aspect of daily life, with her mother teaching her to prepare dishes like tamales, enchiladas, and sopes. Living in Gwinnett County also exposes Carmen to Southern U.S. customs, including
    school events and community festivals, fostering a blend of Mexican and American cultural identities. Her upbringing emphasizes family loyalty, respect for elders, practical responsibility, and the
    importance of maintaining cultural heritage while adapting to the broader American environment.
