  hobbies: '[''Abstract Watercolor Painting'', ''Sketching'', ''Reading Philosophy'', ''Bird Watching'', ''Succulent Gardening'', ''Photography (Sunrise and Coastal Landscapes)'', ''Poetry Reading Groups'',
