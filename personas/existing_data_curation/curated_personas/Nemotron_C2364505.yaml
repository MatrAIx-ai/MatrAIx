personas:
  professional: Oscar Colome, a three‑year‑old with an uncanny knack for turning playtime into a structured project, lines up blocks by size and color, sets tiny “goal charts” for toy clean‑up, and proudly
    reports completed tasks to parents, embodying an early blend of curiosity and disciplined achievement, and they keep a tidy “achievement wall” to display stickers.
  sports: Oscar Colome’s favorite weekend activity is kicking a soft green soccer ball in the backyard while cheering for the city’s professional team, the River Valley Rovers, and they proudly wear a miniature
    jersey while occasionally insisting on a structured “practice schedule” before snack time.
  arts: Oscar Colome delights in drawing vivid dinosaurs with a jumbo crayon set, dances to songs by The Wiggles, watches the animated series “Bluey” for inspiration, and they often organize a tiny “art
    gallery” on the fridge for family to admire.
  travel: Oscar Colome loves family road trips to the nearby beach where they collect seashells, enjoys their annual visit to the Grand Mountain Railway, and they dream of a future adventure to Disneyland,
    always packing a small backpack with favorite stuffed bunny for comfort.
  culinary: Oscar Colome favors buttery macaroni and cheese, loves apple slices dipped in peanut butter, refuses peas with a determined pout, and they enjoy helping stir pancake batter with a wooden spoon,
    turning cooking into a disciplined yet exploratory routine.
  core: Oscar Colome is a three‑year‑old who blends intense curiosity with meticulous organization, turning everyday chores into miniature projects while navigating snack negotiations and occasional stubbornness,
    and they proudly celebrate each tiny victory with a high‑five.
background:
  cultural: Oscar is raised in a Mexican-American household in Stockton, California. His family speaks Spanish at home while also using English, and they celebrate traditions such as Día de los Muertos,
    Cinco de Mayo, and Christmas with Mexican dishes like tamales, pozole, and pan dulce. Family gatherings often include music, dancing, and storytelling that teach him about his heritage. The close‑knit
    extended family and involvement in the local Latino community provide a strong sense of identity, cultural pride, and bilingual fluency.
attributes:
  skills: '[''Follow simple daily routines'', ''Alphabet recognition'', ''Counting to ten'', ''Build towers with interlocking blocks'', ''Bilingual English-Spanish vocabulary'', ''Organize toys and play
    areas'', ''Follow multi-step instructions'']'
  hobbies: '[''Building colorful block towers'', ''Drawing pictures of animals and family'', ''Listening to mariachi and ranchera music'', ''Dancing to rhythmic beats'', ''Playing at the local park'', ''Helping
    with simple cooking tasks (e.g., stirring guacamole)'']'
  career_goals: Even at three, Oscar imagines himself as a helpful teacher who guides other kids, a builder who constructs tall towers, and a small chef who helps stir guacamole. He aims to master building
    complex structures with blocks, read simple picture books independently, and later explore a career in engineering, education, or community service, reflecting his drive for achievement and desire to
    assist others.
