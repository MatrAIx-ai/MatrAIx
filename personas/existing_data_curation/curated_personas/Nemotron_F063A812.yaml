personas:
  professional: Sharon Pena is a senior instructional designer at a multinational tech firm who blends data‑driven needs analysis with a hands‑on, learner‑first mindset, leveraging AR/VR and micro‑learning
    to craft agile, evidence‑based curricula, and they champion collaborative, Agile project management while navigating the tension between curiosity and pragmatic execution.
  sports: Sharon Pena rides weekly with a co‑ed cycling club, hikes the Watchung Mountains each spring, roots for the New York Giants and the New Jersey Devils, and they treat fitness as a social activity
    rather than a regimented schedule, often joining impromptu pickup basketball games at the community center.
  arts: Sharon Pena leads improv comedy workshops, delights in the humor of Tina Fey and the satire of “Saturday Night Live,” enjoys live jazz at the Blue Note, and they unwind by streaming classic films
    by Nora Ephron while occasionally attending Broadway shows like “Hamilton” for creative inspiration.
  travel: Sharon Pena favors spontaneous road trips along the East Coast, having explored the historic streets of Boston, the wineries of the Finger Lakes, and the beaches of Cape Cod, while dreaming of
    a future adventure to Kyoto’s temples, and they plan trips loosely, balancing a modest travel budget with a desire for authentic, off‑the‑beaten‑path experiences.
  culinary: Sharon Pena enjoys cooking multi‑cuisine meals, expertly preparing a fragrant chicken tikka masala, a classic New Jersey pizza with fresh mozzarella, and a quick shrimp pad thai, they love experimenting
    with turmeric, fresh basil, and smoked paprika, and they regularly host potluck dinners where friends share home‑cooked dishes from around the world.
  core: Sharon Pena is a curiosity‑driven L&D leader who thrives on community, juggling spontaneous bike rides, improv laughs, and data‑rich curricula while occasionally misplacing their planner and overindulging
    on late‑night snacks.
background:
  cultural: Sharon was raised in a middle‑class, intergenerational New Jersey family of European ancestry, blending the pragmatic work ethic of suburban America with a strong sense of community involvement.
    Growing up in Budd Lake, she was exposed to a diverse, multicultural environment that fostered openness to varied perspectives while reinforcing traditional American values of independence, resourcefulness,
    and collaborative spirit.
