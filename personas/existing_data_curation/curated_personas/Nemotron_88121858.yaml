  career_goals: At 55, Amanda aims to transition from a senior secretary role to an office manager or operations coordinator position within her organization, taking on greater responsibility for workflow
    optimization and staff mentorship. She seeks to earn a Certified Administrative Professional (CAP) credential to formalize her expertise, and is interested in mastering advanced Excel functions and
    project‑management software to improve efficiency. Additionally, she is exploring part‑time freelance virtual‑assistant work, allowing her to apply her organizational skills to a broader client base
    while maintaining a flexible schedule.
