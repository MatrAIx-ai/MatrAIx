personas:
  professional: Amanda Tutas is a seasoned administrative professional who leverages their expertise in office management, complex calendar coordination, and stakeholder communication to keep a bustling
    mid‑size office humming, blending a relaxed, flexible style with a surprisingly competitive drive to streamline workflows and mentor junior staff.
  sports: Amanda Tutas enjoys line dancing as cardio, plays casual weekend softball in the Manor Women’s League, roots for the Austin FC and the Dallas Cowboys, and fits yoga sessions into their schedule
    to stay limber while nurturing a competitive spirit on the field.
  arts: Amanda Tutas is a regular at local country‑music venues, karaoke‑singing classics by Dolly Parton and modern hits by Kacey Musgraves, discusses contemporary fiction by Celeste Ng in their book club,
    and finds inspiration in the folk paintings of Dockery, often echoing those colors in their garden design.
  travel: Amanda Tutas favors flexible road trips that weave through Hill Country vineyards and historic towns like Fredericksburg, enjoys occasional beach escapes to Galveston, and dreams of a culinary
    tour of Oaxaca, Mexico, all while planning trips around their volunteer duties and community events.
  culinary: Amanda Tutas displays a flair for Southern comfort cooking, frequently preparing brisket tacos, peach cobbler, and their signature jalapeño‑infused cornbread, while experimenting with Mediterranean
    herbs such as oregano and mint harvested from their own garden for fresh, garden‑to‑table meals.
  core: Amanda Tutas blends a pragmatic, down‑to‑earth work ethic with a sociable, competitive streak, juggling their office leadership ambitions, community service, and a zest for line dancing, karaoke,
    and garden‑fresh cooking.
background:
  cultural: Amanda identifies as a White Texan with deep roots in the central Texas region. Raised in a modest, middle‑class family, she grew up attending a Methodist church and absorbing the values of
    hospitality, self‑reliance, and community service that are characteristic of the area. Living in Manor, a suburb of Austin, she experiences a blend of traditional rural Texan culture and the more progressive
    atmosphere of nearby Austin, which influences her open, sociable demeanor while maintaining a pragmatic, down‑to‑earth outlook.
