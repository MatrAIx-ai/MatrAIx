  hobbies: '[''Fishing'', ''Gardening'', ''Scenic drives'', ''Watching Philadelphia Eagles football'', ''Listening to classic rock'', ''Reading historical nonfiction'', ''Home improvement projects'', ''Participating
    in local festivals'', ''Volunteering for senior transportation'']'
  career_goals: As he approaches retirement age, Matthew plans to gradually reduce his full‑time driving hours while shifting into a mentorship role, helping train new taxi drivers and possibly launching
    a small community shuttle service for seniors. He aims to secure sufficient savings to enjoy leisurely travel with his wife and to devote more time to volunteering at his local church and community
    center. Maintaining his independence and staying active in the transportation field, even on a part‑time basis, remain central to his aspirations.
