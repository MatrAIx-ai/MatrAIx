personas:
  professional: Tonasia Johnson, a bright five‑year‑old who treats the kindergarten classroom like a tiny office, organizes group storytime with meticulous charts, and eagerly volunteers to lead playground
    games, showing a surprising blend of practical structure and social energy.
  sports: Tonasia Johnson, a member of the local under‑5 soccer club and budding fan of the Chicago Cubs, spends afternoons dribbling a bright orange ball and eagerly watches Saturday morning cartoons featuring
    the NBA, channeling a competitive spirit into friendly races with classmates.
  arts: Tonasia Johnson, who delights in drawing bright characters from Disney’s Moana and Encanto, sings along loudly to songs by Lin‑Manuel Miranda on the family’s playlist, and never misses a new episode
    of Sesame Street, letting these vibrant arts shape their imaginative play.
  travel: Tonasia Johnson, who has already taken a family road trip to Grandma’s beach house in Florida and a weekend adventure to Disneyland, dreams of visiting the giant dinosaur fossils at the Field
    Museum in Chicago, preferring trips packed with hands‑on activities over long, unstructured flights.
  culinary: Tonasia Johnson, who adores chicken nuggets with ketchup, mac and cheese, and strawberry‑banana smoothies, proudly helps stir batter for pancake breakfasts, yet often sneaks extra gummy bears
    when no one watches, balancing a budding love for cooking with a sweet‑tooth habit.
  core: Tonasia Johnson is a structured yet socially vibrant five‑year‑old whose competitive spark fuels organized play, while their intense emotions turn everyday moments into dramatic adventures.
background:
  cultural: Tonasia is part of an African American family rooted in Albany, Georgia. Her household and community place strong emphasis on church involvement, gospel music, and celebrations such as Juneteenth
    and Kwanzaa. Family gatherings often feature Southern comfort foods, storytelling about ancestors, and communal barbecues. The local church provides a supportive network where children participate in
    choir, Sunday school, and community service projects. This cultural setting fosters values of resilience, communal responsibility, pride in heritage, and a love for music and shared celebrations.
attributes:
