  hobbies: '["Playing tag and organized playground games", "Dancing to gospel and pop music", "Singing in church choir", "Drawing animals and family scenes", "Reading picture books with repetitive text",
    "Exploring nature on family walks", "Educational tablet games for literacy and numeracy", "Simple crafts and DIY projects"]'
  career_goals: Tonasia dreams of becoming a teacher who can create a safe, structured classroom where children learn through play and routine. She also expresses a love for animals and hopes to be a veterinarian
    one day, caring for pets in her community. As she grows older, she imagines helping organize events at her church youth group, combining her competitive spirit with a desire to support others.
