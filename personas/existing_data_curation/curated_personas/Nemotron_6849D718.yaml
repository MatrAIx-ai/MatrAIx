personas:
  professional: Carlo Boudreaux, a budding junior scientist, leverages his methodical planning and love for structure to design meticulous LEGO models of desert ecosystems for school science fairs while
    thriving in collaborative group projects with his friends.
  sports: Carlo Boudreaux hones his speed and teamwork on the Desert Wildcats U-8 soccer team, cheers for the Arizona Cardinals' defense during game nights, and follows a structured warm-up routine learned
    from his scouting troop that balances high energy play with careful stretching.
  arts: Carlo Boudreaux revels in the vibrant animation of Studio Ghibli's Spirited Away, sings along to The Wiggles' upbeat songs while building intricate LEGO dinosaur dioramas, and eagerly watches the
    adventurous episodes of the animated series 'Adventure Time' for inspiration.
  travel: Carlo Boudreaux maps out family road trips to the Grand Canyon and Sedona's red rock country each summer, balancing his love for adventurous fossil hunts with the need for snack breaks, while
    dreaming of a future visit to NASA's Kennedy Space Center for a real-life space adventure.
  culinary: Carlo Boudreaux enjoys helping his mom prepare homemade tacos seasoned with garden-fresh cilantro and lime, loves the cheesy stretch of a personal-size pizza topped with mozzarella and pepperoni,
    and often sneaks an extra bite of strawberry-laden fruit salad when no one is watching.
  core: Carlo Boudreaux blends a love for orderly LEGO engineering with boundless soccer energy, turns every desert walk into a fossil-finding mission, yet secretly hoards candy in his desk drawer for late-night
    cravings.
background:
  cultural: Carlo is raised in a White, middle‑class family in Safford, Arizona, with roots that blend Southern and French‑Canadian heritage, reflected in family traditions such as Sunday church services,
    Thanksgiving gatherings, and occasional Cajun‑style dishes during holidays. Living in Graham County, he experiences a desert‑rural lifestyle, where community events like the county fair, local youth
    sports leagues, and school activities play a central role. This environment fosters a strong sense of community, self‑reliance, respect for the land, and an appreciation for orderly, cooperative endeavors.
