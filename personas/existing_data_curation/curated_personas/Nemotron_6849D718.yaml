  hobbies: '[''soccer'', ''LEGO building'', ''reading adventure books'', ''desert exploring'', ''rock and fossil collecting'', ''school science projects'', ''gardening with family'', ''county fair attendance'',
    ''youth scouting activities'']'
  career_goals: Carlo dreams of a future where he can blend his love for order, building, and helping others. He imagines becoming a civil engineer or architect to design safe, functional spaces for his
    desert community, or a teacher or youth coach who can guide other children in learning and teamwork. He also expresses interest in being a firefighter, attracted by the clear structure, teamwork, and
    service to the community.
