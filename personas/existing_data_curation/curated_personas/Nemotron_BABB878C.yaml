  career_goals: Although retired from formal employment, Lori aims to leave a lasting cultural imprint on her community. She plans to establish a small community arts hub in Granbury that offers workshops,
    rotating exhibitions of unconventional artists, and a mentorship program for senior creatives. She also hopes to complete a memoir that weaves together her personal history, artistic journey, and genealogical
    discoveries, and to publish a concise guide to the hidden historic sites of Johnson County. Learning advanced digital art tools so she can share her work online and traveling to regional art festivals
    are additional aspirations that keep her curiosity alive.
