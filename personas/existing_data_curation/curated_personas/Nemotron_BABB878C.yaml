personas:
  professional: Lori Naredo, a retired volunteer docent and community event coordinator, channels a lifetime of watercolor, digital photography, and genealogical research into curating unconventional art
    exhibitions and leading hands‑on workshops for senior creators at the budding Granbury Arts Hub, where their critical eye and love of flexibility drive a vibrant, slightly chaotic yet deeply engaging
    cultural space.
  sports: Lori Naredo, an enthusiastic fan of the Dallas Cowboys, Texas Rangers, and Dallas Mavericks, regularly participates in a senior walking group at White Rock Lake, joins a local bridge club that
    doubles as a light‑hearted bowling league, and occasionally attends weekend tennis matches with the Granbury Senior Tennis Club, balancing modest activity with spectator enthusiasm.
  arts: Lori Naredo, a lifelong lover of visual and performing arts, spends weekends painting Texas bluebonnet fields in watercolor, curating digital photo series of wildflower blooms, attending community
    theater productions starring local talent like Mark R. Watts, and studying works by contemporary painter Kehinde Wiley and photographer Annie Leibovitz, letting these influences shape their own experimental
    style.
  travel: Lori Naredo, with a penchant for loosely planned adventures, has explored the Marfa Art Fair, visited Santa Fe’s Canyon Road galleries, taken a road trip to New Mexico’s Taos Pueblo, and dreams
    of a cultural pilgrimage to Oaxaca’s Día de los Muertos celebrations, always packing a sketchbook and camera to capture spontaneous inspiration.
  culinary: Lori Naredo, an avid Tex‑Mex enthusiast, regularly prepares sizzling chicken enchiladas with roasted poblano peppers, homemade guacamole seasoned with fresh cilantro and lime, and slow‑cooked
    barbacoa tacos, while modestly experimenting with sous‑vide techniques for occasional carnitas, often sharing these dishes at bridge nights and community potlucks.
  core: Lori Naredo, a 72‑year‑old artistic firecracker, blends a curious, competitive spirit with a love for flexible social gatherings, waterfront painting, and unapologetically off‑beat projects, all
    while occasionally misplacing their sketchbook and forgetting to file tax forms.
background:
  cultural: Lori is a white American who was born and raised in central Texas, embodying the blend of Southern hospitality and Western independence characteristic of the region. Her upbringing in the 1950s‑60s
    instilled a respect for community traditions such as county fairs and church gatherings, while her education and lifelong curiosity exposed her to broader American and European artistic movements. She
    identifies with a modest Methodist background, which informs her volunteer spirit and sense of service, and she maintains strong ties to family and local heritage, often incorporating Texas history
    and folklore into her storytelling and creative projects.
