  hobbies: '[''Sketching and Mixed-Media Art'', ''Digital Photography (landscapes, portraits)'', ''Reading contemporary fiction and philosophy'', ''Listening to science and art podcasts'', ''Yoga and mindfulness
    meditation'', ''Volunteering at local library (tutoring, event assistance)'', ''Herb gardening and cooking'', ''Attending community festivals and art shows'', ''Exploring new ideas through online courses'']'
  career_goals: Brook Sue aims to complete her GED within the next year and enroll in a community college program focusing on visual arts or graphic design. She plans to build a professional portfolio featuring
    her illustrations, photography, and design work, with the long‑term goal of securing a creative role at a local design studio, marketing agency, or cultural institution such as a museum or community
    arts center. She also aspires to use her artistic talents to develop therapeutic workshops for youth and adults, combining her empathy with visual expression. In the short term, she hopes to obtain
    a part‑time internship or entry‑level position that provides hands‑on experience in graphic production while allowing her to continue volunteering, which she values for personal fulfillment and community
    impact.
