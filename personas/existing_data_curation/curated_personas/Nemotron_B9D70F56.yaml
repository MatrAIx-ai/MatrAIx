  career_goals: Phyllis dreams of combining her love for art and technology to become a multimedia creator or interactive designer. She aspires to study graphic design and animation, hoping to develop immersive
    experiences that tell stories through visuals and code. In the long term, she envisions working on educational games or museum exhibits that spark curiosity in others, while also keeping an option open
    to become an environmental storyteller or an astronaut, reflecting her broad interests in new ideas and varied experiences.
