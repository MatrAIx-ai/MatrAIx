personas:
  professional: Phyllis Nguyen is an aspiring junior game developer who creates whimsical Scratch games and animated stories, merging her love for fantasy novels with a knack for drawing vivid characters
    and experimenting with digital art tools, and they reliably share their projects with classmates while calmly debugging any glitches.
  sports: Phyllis Nguyen cheers for the Los Angeles Dodgers and supports the LA Galaxy, participates in the Kids Hiking Club that meets every Saturday on Griffith Park trails, enjoys lunchtime games of
    tag at school, and they balance a love for outdoor adventure with moderate team sport enthusiasm, often taking the lead in organizing group hikes.
  arts: Phyllis Nguyen revels in the whimsical worlds of Studio Ghibli, the impressionist brushstrokes of Claude Monet, and the melodic tunes of Taylor Swift, dedicating afternoons to watercolor landscapes,
    sketching beloved book characters, and crafting stop‑motion LEGO films inspired by fantasy literature, and they eagerly discuss artistic techniques with friends at the local art museum.
  travel: Phyllis Nguyen loves weekend family trips to the Natural History Museum of Los Angeles County and the Santa Monica beach, dreams of hiking the red granite cliffs of Yosemite National Park, prefers
    a mix of meticulously planned museum itineraries with spontaneous nature scavenger hunts in local parks, and they often bring a sketchbook to capture new scenes.
  culinary: Phyllis Nguyen delights in making strawberry‑banana smoothies, crafting simple spaghetti with marinara sauce, and snacking on crunchy carrot sticks with hummus, proudly mastering no‑bake chocolate
    oat cookies for school bake sales, and they occasionally experiment by adding a pinch of cinnamon to her cookies, much to the surprise of her classmates.
  core: Phyllis Nguyen is a curious ten‑year‑old who blends artistic flair, tech tinkering, and outdoor exploration, while juggling a disciplined allowance routine and a friendly habit of forgetting to
    water her potted succulents.
background:
  cultural: Phyllis grows up in a white, middle‑class family in Chatsworth, a suburban neighborhood of Ventura County, California. The community is culturally diverse, exposing her to a blend of Southern
    California influences, including occasional Spanish language exposure and multicultural community events such as the Chatsworth Art Walk and local farmers' markets. Her family celebrates traditional
    American holidays like Thanksgiving, Fourth of July, and Halloween, while also encouraging appreciation for the arts through museum visits and participation in school art programs. The regional emphasis
    on creativity, outdoor activities, and technology shapes her worldview, fostering an openness to unconventional ideas and varied experiences.
