  hobbies: '["herb gardening", "birdwatching", "reading culinary literature", "knitting", "volunteering at church food pantry", "local history walking tours", "pine forest hiking"]'
  career_goals: Courtney aims to expand her bakery by opening a second location within Greenwood County that focuses on locally sourced ingredients and sustainable practices. She hopes to obtain a Certified
    Boulanger credential to deepen her craft and eventually launch a small apprenticeship program to mentor aspiring bakers from the community. Long‑term, she envisions transitioning into a consulting role
    that helps other small food businesses improve operations while still maintaining a hands‑on presence in her own shop.
