personas:
  professional: Courtney Segatto is a 40‑year‑old artisan baker whose two‑decade career in small‑town bakeries is defined by methodical sourdough and Southern biscuit production, meticulous inventory and
    staff management, and a compassionate drive to mentor aspiring bakers through community outreach and an upcoming apprenticeship program, and they approach each challenge with a calm, structured mindset.
  sports: Courtney Segatto enjoys low‑impact fitness by walking with the Greenwood Pines Hiking Club, follows the Greenwood River Hawks baseball team each spring, joins a bi‑weekly senior‑center softball
    league, and they prefer structured, community‑oriented activities that fit their steady routine.
  arts: Courtney Segatto finds inspiration in the melodic storytelling of Dolly Parton, the soulful blues of B.B. King, the contemporary piano works of Ludovico Einaudi, and the pages of the Southern Folklore
    Journal, often knitting simple blankets while listening to these artists and attending local history talks that enrich the narrative woven into their bakery’s seasonal menus, and they cherish how each
    artistic thread adds depth to their quiet evenings.
  travel: Courtney Segatto prefers meticulously planned journeys that blend culinary learning and nature, such as a week‑long sourdough workshop in Paris, a weekend hike along the Blue Ridge Parkway, and
    a nostalgic drive to Charleston, South Carolina, and they always budget travel expenses within the bakery’s profit margins to keep adventures both enriching and financially sustainable.
  culinary: Courtney Segatto’s palate favors garden‑fresh herbs—thyme‑infused sourdough, rosemary shortbread, and mint chocolate chip biscuits—and they weigh every ingredient on a vintage digital scale,
    though they habitually sneak a warm sample slice before the batch fully cools, a quirk that delights their taste buds but occasionally disrupts the baking timeline.
  core: Courtney Segatto is a methodical, compassionate baker who balances precise artistry with quiet community service, they navigate life with calm resilience and a love for structured solitude.
background:
  cultural: Courtney grew up in a working‑class white family on the outskirts of Greenwood, South Carolina. The Southern culture of hospitality, church involvement, and home‑cooked meals shaped her values.
    Family gatherings centered around food, and her mother taught her the basics of biscuit making and community sharing. This upbringing instilled a strong sense of community responsibility, a preference
    for predictable routines, and a deep respect for Southern culinary traditions, all of which continue to influence her personal and professional life.
attributes:
