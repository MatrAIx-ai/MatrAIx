  career_goals: Although retired, Katherine remains driven to deepen her expertise and leave a lasting imprint on her community. She aims to complete a four‑part watercolor series that captures the seasonal
    changes along the Hudson River, and to submit the work to the annual Slingerlands Art Fair. She is drafting a memoir that weaves together her experiences as an educator with reflections on art and critical
    thinking, hoping to self‑publish it for local libraries. Katherine plans to contribute a detailed oral history of her neighborhood to the Albany County Historical Society, drawing on her genealogical
    skills. She also intends to enroll in online courses on contemporary art theory to stay abreast of new ideas, and to occasionally give guest lectures at the community college, sharing her unconventional
    approaches to teaching. Through these goals she seeks intellectual growth, personal satisfaction, and modest recognition within her quiet circles.
