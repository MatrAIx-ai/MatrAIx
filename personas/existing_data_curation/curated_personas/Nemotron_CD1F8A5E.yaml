  career_goals: Angela aims to transition into a mentorship and consultancy role, leveraging her extensive experience to guide emerging marketers in the Midwest. She aspires to lead a flagship regional
    sustainability campaign for a major consumer brand, integrate innovative storytelling techniques that fuse art and commerce, and contribute to local arts initiatives by establishing a community‑focused
    marketing program at her hometown's cultural center. Over the next few years, she also hopes to teach part‑time at a nearby community college, sharing her knowledge of arts‑infused marketing.
