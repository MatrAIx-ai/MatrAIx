personas:
  professional: Angela Gaudet, a veteran marketer with four decades of experience, leverages their methodical planning, creative content flair, and sociable leadership style to craft sustainability narratives
    that blend art and commerce for Midwestern brands, and they often guide junior teams with an assertive yet supportive hand.
  sports: Angela Gaudet, an avid follower of the Detroit Tigers and Detroit Red Wings, stays active through weekly morning walks with the Owosso Walking Club and seasonal yoga classes at the local senior
    center, balancing their love for team spirit with a low‑impact fitness routine that eases their knee arthritis.
  arts: Angela Gaudet, a devoted patron of Michigan’s art scene, they channel their curiosity into curating book‑club discussions around Margaret Atwood and Rainer Maria Rilke, attending Detroit’s Motown
    Museum exhibitions of works by contemporary painter Kehinde Wiley, and snapping seasonal landscapes inspired by Ansel Adams, all while volunteering at the Owosso Historical Museum and taking creative
    writing workshops led by local playwrights such as Jeff Daniels.
  travel: Angela Gaudet, an organized traveler who meticulously plans each itinerary, enjoys revisiting European art capitals such as Paris, Florence, and Amsterdam for museum immersion, while also exploring
    Michigan’s Upper Peninsula and Mackinac Island for seasonal retreats, and they balance their love of culture with a modest travel budget that favors off‑season flights and boutique B&B stays.
  culinary: Angela Gaudet, a modest home chef who delights in seasonal Midwestern fare and European cuisine, often prepares herb‑crusted salmon with dill and lemon, simmered ratatouille featuring heirloom
    tomatoes and zucchini, and enjoys a well‑earned slice of warm apple‑cinnamon crumble, while they occasionally splurge on fine‑dining experiences like a tasting menu at Detroit’s acclaimed restaurant
    Selden Standard.
  core: Angela Gaudet mixes a meticulous marketer’s mind with an artist’s soul, habitually cataloguing every bridge tournament win on sticky notes, yet they can’t resist an impulse purchase of a vintage
    art print when strolling through galleries.
background:
  cultural: Angela was born and raised in the Midwest, growing up in a small-town, French‑Canadian‑American family in Michigan. Her upbringing emphasized community values, a strong work ethic, and respect
    for tradition, while her education in arts and humanities nurtured an appreciation for cultural diversity and creative expression. She identifies with Midwestern sensibilities—hospitality, practicality,
    and a love of local history—while also valuing the broader artistic heritage that informs her personal and professional life.
