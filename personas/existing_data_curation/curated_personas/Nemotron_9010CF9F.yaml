  hobbies: '[''Watercolor and acrylic painting'', ''Landscape photography'', ''Reading philosophy and literature'', ''Attending art galleries and theater'', ''Book club participation'', ''Chess playing
    and teaching'', ''Gardening (native plants)'', ''Volunteering as museum docent'']'
  career_goals: Zachary aims to establish a sustainable community arts program for seniors in Bremerton that integrates workshops, exhibitions, and intergenerational mentorship. He also aspires to complete
    a series of abstract paintings that explore themes of memory and change, culminating in a local gallery show. In parallel, he seeks to finish his bachelor's degree in art history, leveraging online
    courses, and to author a memoir documenting his experiences growing up in a naval town and his lifelong passion for learning.
