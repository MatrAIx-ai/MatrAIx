  career_goals: Even at six, Alex often talks about future jobs that match his love for order and helping others. He dreams of becoming a teacher because he enjoys explaining things to classmates and values
    a structured learning environment. He is also fascinated by firefighters, admiring their clear roles and community service, and occasionally imagines himself building houses or bridges as an architect,
    inspired by his LEGO constructions. Alex’s ambitions are shaped by his desire to be dependable, organized, and supportive of those around him.
