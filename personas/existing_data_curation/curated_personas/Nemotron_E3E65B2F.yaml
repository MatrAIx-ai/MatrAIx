personas:
  professional: Alex Malaver is a budding LEGO architect who applies meticulous planning and systematic problem‑solving to craft intricate builds, reflecting their organized, reliable nature and love for
    structure.
  sports: Alex Malaver plays forward for the Little Lions Youth Soccer Club, enjoys weekend matches at the neighborhood park, and swaps highlights of FC Barcelona and New York Yankees games with friends,
    blending regular physical activity with a budding fandom for professional teams.
  arts: Alex Malaver spends afternoons drawing bold shapes inspired by Eric Carle, watches the ocean‑exploring cartoons of Octonauts, sings along to salsa classics by Marc Anthony and reggaeton hits by
    Bad Bunny, and occasionally rehearses favorite Disney musical numbers, intertwining visual and musical creativity.
  travel: Alex Malaver loves family road trips to seaside spots, has explored the Florida aquarium and a weekend visit to the Grand Canyon, and dreams of traveling to the Eiffel Tower in Paris and snorkeling
    on the Great Barrier Reef, preferring a mix of structured itineraries and spontaneous playground discoveries.
  culinary: Alex Malaver enjoys helping roll dough for pastelitos filled with melty cheese and ham, sprinkling a pinch of cinnamon, and can whip up simple banana‑cinnamon pancakes, preferring hands‑on cooking
    that balances familiar flavors with a touch of sweet experimentation.
  core: Alex Malaver builds methodical LEGO worlds, budgets pocket money with a piggy bank, tracks allergy symptoms, dribbles soccer balls, draws vibrant pictures, and dances to salsa beats—all while occasionally
    forgetting vitamins.
background:
  cultural: Alex is a second‑generation Puerto Rican American raised in a bilingual household in Tacoma, Washington. Spanish is spoken at home alongside English, giving him fluency in both languages. Family
    traditions such as Nochebuena, Día de los Reyes (Three Kings Day), and Parrandas are celebrated with music, dancing, and festive foods like arroz con gandules and mofongo. He participates in local community‑center
    activities that highlight Puerto Rican culture, including bomba dancing and Spanish story time. Alex attends a Catholic church where community service is emphasized, and he often joins neighborhood
    festivals that showcase Latino heritage. This cultural backdrop nurtures his love for music, food, and family togetherness while reinforcing values of respect, cooperation, and community involvement.
