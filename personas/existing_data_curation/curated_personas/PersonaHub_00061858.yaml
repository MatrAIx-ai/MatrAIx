persona_description: A cognitive scientist with a specialization in the study of the brain's representation of the world, particularly in relation to action and thought processes. They are interested in
  the development of self-awareness, agency, and the acquisition of a theory of mind, and have conducted research in computational modeling of object permanence and the experience of agency. They are also
  familiar with the four features of human cognition, and have explored the role of bodily awareness, self-location, and ownership in understanding agency and the development of theory of mind.
