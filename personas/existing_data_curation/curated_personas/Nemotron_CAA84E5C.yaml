personas:
  professional: Joel Harris, a retired property‑management supervisor turned community archivist, blends his meticulous record‑keeping, hands‑on building maintenance expertise, and methodical research skills
    to document Bedford‑Stuyvesant’s oral history while consulting small landlords on code‑compliant repairs.
  sports: Joel Harris tracks the Brooklyn Nets and New York Knicks from his balcony, walks weekly with the senior walking group of the Brooklyn Parks Department, and engages in occasional Thursday‑night
    pétanque matches at the community garden, keeping his mobility routine low‑impact and socially minimal.
  arts: Joel Harris curates a personal soundtrack of classic soul (Aretha Franklin, Nina Simone) and jazz legends (John Coltrane, Miles Davis), regularly attends Brooklyn poetry readings featuring spoken‑word
    artists like Sarah Kay, and occasionally plays the piano duets of Claude Debussy in his quiet evenings.
  travel: Joel Harris prefers deliberate, low‑key travel, often planning weekend day trips to historic U.S. cities such as Boston’s Freedom Trail and Savannah’s cobblestone squares, and he dreams of a summer
    visit to New Orleans for its jazz heritage and a brief cultural stop in Kyoto to study traditional woodworking.
  culinary: Joel Harris, an avid balcony gardener, often prepares simple yet satisfying meals such as herb‑infused roasted chicken, classic New York bagels with cream cheese and smoked salmon, and a Sunday
    tomato‑basil soup, displaying a modest home‑cooking skill that favors fresh herbs like basil, thyme, and rosemary.
  core: Joel Harris blends quiet curiosity with meticulous pragmatism, spending afternoons piecing together model ships while obsessively cataloguing family histories, and habitually checks the time on
    an old pocket watch before any new project.
background:
  cultural: Joel grew up as a second‑generation African‑American in Brooklyn, with grandparents who migrated north during the Great Migration from the rural South. Raised in Bedford‑Stuyvesant, his early
    life was shaped by a tightly‑knit community anchored in church, gospel music, and neighborhood block parties. The civil‑rights era left an imprint on his worldview, fostering a strong sense of social
    responsibility and pride in black heritage. He maintains family traditions such as Sunday soul‑food gatherings and storytelling, and he stays connected to the evolving cultural mosaic of Brooklyn, which
    now includes Caribbean and Latino influences. This blend of historical identity, community resilience, and adaptation to urban change informs his values, his dedication to preserving local history,
    and his desire to give back through mentorship and documentation.
