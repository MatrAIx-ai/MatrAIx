  career_goals: Although retired from the formal workforce, Joel aims to document and preserve the oral history of his Bedford‑Stuyvesant neighborhood, eventually publishing a memoir that weaves together
    personal stories with broader African‑American cultural narratives. He plans to obtain a community‑college certificate in archival studies to enhance the quality of his work and to volunteer as a mentor
    for at‑risk youth, offering practical life‑skills workshops and one‑on‑one guidance. Additionally, he hopes to provide occasional consulting for small landlords on cost‑effective maintenance practices,
    using his methodical approach to help them stay compliant with city regulations.
