personas:
  professional: A budding student naturalist and strategic thinker, Rosetta Harrison channels her love of mystery novels, bird sketching, chess, and gardening into a disciplined yet flexible personal project
    portfolio that reflects her preference for structure, competitive edge, and solitary focus.
  sports: Rosetta Harrison participates in a small community hiking club that explores the rolling hills near Owingsville each weekend, follows a modest fitness routine of brisk walks and occasional pick‑up
    soccer with friends, and avidly tracks the Kentucky Wildcats men's basketball and Louisville Cardinals women's volleyball seasons as her favorite professional sports.
  arts: Rosetta Harrison immerses herself in the imaginative worlds of mystery author Agatha Christie and fantasy writer Sarah J. Maas, couples that with her own bird sketches inspired by John James Audubon,
    and finds solace in listening to the mellow folk tunes of The Lumineers while she bakes and gardens.
  travel: Rosetta Harrison enjoys loosely planned family road trips to nearby Bluegrass festivals, occasional visits to the Great Smoky Mountains for leaf‑collecting hikes, and dreams of exploring the towering
    redwoods of California, balancing her love of nature with a low‑key, budget‑conscious travel style.
  culinary: Rosetta Harrison, a moderately skilled home cook, delights in preparing tomato‑basil soup, green bean casserole, and buttery sugar cookies using fresh garden tomatoes, beans, seasonal herbs,
    and a secret pinch of cinnamon that she swears adds a nostalgic flavor to family recipes.
  core: Rosetta Harrison is a quietly competitive teen who balances a love of solitary sketching and chess with a habit of misplacing her gardening tools, yet she consistently seeks structure through her
    organized notebooks and thoughtful routines.
background:
  cultural: Rosetta was raised in Owingsville, a small town in Bath County, Kentucky, steeped in Appalachian and Southern cultural traditions. Her family values self‑reliance, close‑knit relationships,
    and a strong connection to the land. Community life often revolves around the local church, county fairs, and school events, where storytelling, country and bluegrass music, and homemade crafts are
    celebrated. The region’s emphasis on hard work, hospitality, and respect for nature has shaped her practical outlook and her appreciation for outdoor activities. While she identifies with the broader
    white rural American identity, she also embraces the subtle nuances of local folklore, regional recipes, and the communal spirit that defines life in eastern Kentucky.
attributes:
  skills: '[''Basic computer literacy (Word, PowerPoint, internet research)'', ''Strategic thinking and competitive chess playing'', ''Basic woodworking (building simple furniture, tool maintenance)'',
