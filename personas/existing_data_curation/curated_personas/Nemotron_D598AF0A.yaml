    ''Cooking and baking (family meals, desserts)'', ''Problem solving in mathematics (algebra basics, logic puzzles)'']'
  hobbies: '[''Reading mystery and fantasy novels'', ''Sketching wildlife and farm scenes'', ''Playing competitive chess in a small group'', ''Gardening (vegetable and flower cultivation)'', ''Cooking and
    baking family recipes'', ''Hiking local hills and birdwatching'', ''Participating in community fairs and church gatherings'']'
  career_goals: Rosetta aims to build a career that blends her love for animals, hands‑on work, and structured learning. She plans to enroll in a specialized high‑school program focused on agricultural
    science, then pursue a degree in veterinary medicine or animal science so she can serve rural communities like her own. Parallel to that, she hopes to develop a small entrepreneurial venture creating
    handcrafted wooden toys and accessories, selling them through online platforms. Additionally, she dreams of achieving a master‑level ranking in chess, allowing her to compete in regional tournaments
    and possibly coach younger players, satisfying her competitive drive while staying within a structured framework.
