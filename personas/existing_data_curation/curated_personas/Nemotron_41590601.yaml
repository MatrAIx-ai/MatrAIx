    flexibility and stress relief"]'
  career_goals: She aims to become a senior creative director at a forward‑thinking agency, lead interdisciplinary design teams, and eventually launch her own boutique consultancy that focuses on sustainable,
    community‑oriented branding and immersive experiences using AR/VR. Jessica also seeks to mentor emerging designers, secure high‑profile commissions that blend art, heritage, and technology, and contribute
    to the revitalization of cultural spaces in New England.
