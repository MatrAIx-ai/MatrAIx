    Volunteering'', ''Small-Group Book Club'', ''Genealogy Research'']'
  career_goals: William aims to deepen his impact by completing a Master of Social Work within the next three years, positioning himself for a senior leadership role such as Program Director for a regional
    mental health nonprofit. He aspires to develop and implement evidence‑based interventions for at‑risk youth and families in the Fayetteville area, and to influence state policy on affordable housing
    and child welfare. Balancing his curiosity with practicality, he plans to expand community partnerships, secure sustainable funding through grant acquisition, and eventually establish a community‑centered
    organization that integrates mental health services, educational support, and vocational training.
