personas:
  professional: William Peer, a 32‑year‑old social worker specializing in case management, crisis intervention, and grant writing, blends meticulous compliance with compassionate client advocacy, using
    their humanities background to craft evidence‑based programs for at‑risk youth while steadily pursuing a Master of Social Work.
  sports: William Peer enjoys hiking the Ozark foothills and is a casual runner who completes a local 5K each spring, and they root for the Arkansas Razorbacks football team while volunteering as a ball‑boy
    for the community's youth soccer league.
  arts: William Peer is an avid reader of historical nonfiction by Erik Larson and contemporary literary fiction by Sally Rooney, and they find solace playing acoustic folk songs reminiscent of John Prine,
    capture landscapes with a Canon DSLR inspired by Ansel Adams, and contribute reflective essays to a small‑group book club.
  travel: William Peer prefers low‑key road trips that blend photography and genealogy research, having recently explored the Great Smoky Mountains and planned a future visit to New Orleans to trace antebellum
    archives, and they favor overnight stays at eco‑lodges over bustling hotels.
  culinary: William Peer experiments with Southern cooking, regularly preparing shrimp and grits, collard greens simmered with smoked turkey, and honey‑glazed sweet potatoes, and they source heirloom tomatoes
    and fresh herbs from the local farmer's market while honing a modest but confident skillet technique.
  core: William Peer is a pragmatic, curiosity‑driven social worker who balances solitary hikes, folk guitar, and meticulous grant writing with a habit of over‑budgeting on garden tools and occasionally
    forgetting dentist appointments, and they manage stress with quiet resilience.
background:
  cultural: William grew up in a close‑knit white Southern community in rural Arkansas, where family gatherings, church involvement, and Southern hospitality were central to daily life. He values modesty,
    respect for tradition, and community solidarity, while his liberal arts education broadened his worldview and nurtured a deep appreciation for literature, arts, and cultural diversity. Living and working
    in Fayetteville, he balances his regional roots with an inclusive perspective, embracing local customs such as barbecue, folk music, and regional festivals, while also engaging with the city’s growing
    multicultural population through his social work practice.
