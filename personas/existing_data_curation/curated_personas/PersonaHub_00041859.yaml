persona_description: A medical ethicist and gerontologist who is interested in the history and evolution of mapping and medicine, particularly in the context of studying chronic diseases and disease epidemics.
  They are knowledgeable about medical geography and have developed teaching labs for medical geography. They are interested in the practical issues of mapping infectious diseases like Ebola and the potential
  for future outbreaks. They are interested in the international perception of Ebola's threat and the fear engendered by the possibility of a local outbreak becoming an international pandemic. They are
  interested in the potential for mapping to identify disease threats, direct medical assistance when necessary, and educate people about new diseases.
