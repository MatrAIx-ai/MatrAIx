personas:
  professional: Richard Dorney, a 42‑year‑old aspiring technical project manager, fuses his Python, MATLAB, and CAD proficiency with methodical planning and charismatic, talk‑heavy communication to translate
    complex engineering concepts into accessible community workshops at museums and renewable‑energy nonprofits, where they thrive as the liaison between scientists and the public.
  sports: Richard Dorney enjoys hiking the Lake Erie waterfront trails and kayaking in the summer, cheers loudly for the Buffalo Bills and Buffalo Sabres at the stadium, and belongs to the local 'Buffalo
    Trail Runners' club where they partake in weekly 5K runs, yet they occasionally skip workouts when anxiety spikes.
  arts: Richard Dorney immerses themselves in Buffalo’s vibrant arts scene, attending Albright‑Knox gallery openings featuring works by Mark Rothko and Yayoi Kusama, snapping urban architecture with a DSLR,
    performing improv comedy at 'The Comedy Garage', and they often unwind to live shows by The National at 'The Orange Room'.
  travel: Richard Dorney’s travel style balances meticulously planned itineraries with spontaneous art discoveries, favoring weekend getaways to the Finger Lakes wineries, a week‑long cultural tour of Montreal’s
    contemporary galleries, and a dream pilgrimage to Iceland’s northern lights, though they sometimes keep overseas trips at bay due to budget constraints.
  culinary: Richard Dorney, an avid home‑cook with intermediate skill, delights in preparing maple‑glazed salmon, wild‑rice risotto, and pierogies topped with fresh dill, often pairing meals with locally
    brewed craft beer and a robust espresso, while they keep their kitchen cluttered with photography gear and half‑finished art projects.
  core: Richard Dorney is a 42‑year‑old curiosity‑driven technophile who channels anxiety into meticulous project planning and community outreach, using art, data, and talk‑heavy charisma to make complex
    ideas accessible, even if they sometimes over‑schedule and obsess over spreadsheets.
background:
  cultural: Richard grew up in a middle-class white family in Buffalo, a city shaped by its industrial past and proximity to the Great Lakes. The region’s work ethic, modesty and community solidarity influence
    his reliable and methodical nature. He identifies with the local pride in sports teams like the Buffalo Bills and enjoys the seasonal festivals that celebrate the city’s cultural diversity. While rooted
    in this Midwestern sensibility, his curiosity has led him to embrace broader artistic and intellectual currents, giving him a blended cultural outlook that values both practical craftsmanship and creative
    expression.
attributes:
  skills: '[''Python programming'', ''MATLAB'', ''CAD (SolidWorks)'', ''Data analysis'', ''Statistical modeling'', ''Project planning'', ''Community workshop facilitation'', ''Public speaking'', ''Digital
