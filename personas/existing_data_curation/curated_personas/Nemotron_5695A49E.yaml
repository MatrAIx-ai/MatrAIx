  hobbies: '[''Visiting art galleries and museums'', ''Live music concerts'', ''Improv comedy'', ''Urban photography'', ''Hiking and nature walks'', ''Reading (technology, philosophy, art)'', ''Blogging
    about science and creativity'', ''Mentoring high-school STEM students'']'
  career_goals: He aims to re-enter the workforce within the next 12-18 months in a role that merges his technical background with his passion for community engagement. His primary goal is to secure a position
    as a technical project manager or science outreach coordinator at a museum, nonprofit, or renewable-energy firm, where he can lead interdisciplinary projects, develop educational programs, and foster
    partnerships. Long-term, he aspires to launch his own consultancy that helps organizations integrate technology and creativity to improve public engagement, while also advocating for mental-health-friendly
    workplace practices.
