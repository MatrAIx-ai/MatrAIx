persona_description: A business analyst who is interested in using business intelligence tools and techniques to identify and analyze the key performance indicators (KPIs) that can help a company make informed
  decisions and improve its overall performance. This person is likely to be familiar with the concepts of absolute and relative performance measures, as well as the importance of selecting the right time
  frame for measuring performance. They are also likely to be familiar with the idea of setting targets for each product and region combination, and the importance of using a seasonal coefficient to avoid
  seasonality-related fluctuations. Additionally, this person may be interested in learning more about the overlap between business analytics and data science, and the distinction between the two pursuits.
