persona_description: A British businessman and CEO of E.ON UK, Tony Cocker, who is critical of the UK government's carbon price floor policy. Cocker argues that the policy is a tax that unfairly targets
  households and does not provide an incentive to invest in low-carbon energy sources. He also criticizes the lack of transparency around the tax and the unintended subsidies it provides to existing nuclear
  and hydro plants. Cocker's opposition to the policy is informed by his commercial interests and the impact it will have on E.ON's power generation portfolio.
