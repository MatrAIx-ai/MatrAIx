  career_goals: Ronald aspires to advance from purchasing manager to Director of Procurement and eventually a Chief Procurement Officer role within a regional or national corporation. He aims to lead a
    digital transformation of the procurement function, integrating AI-driven spend analytics, e‑procurement platforms, and sustainable sourcing practices to deliver measurable cost savings of at least
    10% of annual spend. He plans to earn a Certified Professional in Supply Management (CPSM) and a PMP certification, mentor emerging procurement talent, and become a recognized speaker at industry conferences.
