personas:
  professional: Alexis Restrepo, a 31‑year‑old teaching assistant at a Georgia elementary school, combines meticulous bilingual lesson planning with agile use of Google Classroom, Canvas, and interactive
    whiteboards, turning their practical curiosity and underlying stress‑sensitivity into data‑driven classroom tweaks that support diverse learners and keep parents in the loop.
  sports: Alexis Restrepo hits the foothills of the Appalachian Trail near Kennesaw for weekend hikes, joins the North Georgia Trail Club for spring treks, follows the Atlanta Falcons and the Atlanta Braves
    on game days, and balances this active routine with a bi‑weekly yoga class at the community center to counterbalance the physical demands of their teaching schedule.
  arts: Alexis Restrepo immerses themselves in literary fiction, devouring works by contemporary authors like Valeria Luiselli and Juan Gabriel Vásquez, while attending local cultural festivals featuring
    folk singers such as Lila Downs and listening to indie pianist Nils Frahm, and they frequently discuss these pieces in a bilingual book club that blends storytelling with cultural rhythm.
  travel: Alexis Restrepo favors low‑key road trips along the Blue Ridge Parkway, weekend escapes to Asheville’s art scene, city breaks to New Orleans for jazz and food tours, and dream itineraries that
    include a culinary pilgrimage to Oaxaca, planning trips around school holidays and balancing a modest travel budget with a yearning to explore both local mountain retreats and distant culinary capitals.
  culinary: Alexis Restrepo delights in crafting mole poblano with locally sourced heirloom chilies, tomatoes, and dark chocolate, rolling tamales stuffed with sweet potatoes and black beans using fresh
    Georgia corn, while also mastering quick weeknight shrimp tacos with avocado and cilantro, a blend of traditional skill and experimental flair that often leads to over‑indulgent late‑night tasting sessions
    of churros and horchata.
  core: Alexis Restrepo is a 31‑year‑old bilingual teaching assistant who balances meticulous lesson prep with spontaneous classroom pivots, combats chronic worry through yoga and cooking, and occasionally
    splurges on gourmet ingredients while neglecting bedtime, resulting in a perpetual cycle of high energy and late‑night snack cravings.
background:
  cultural: Alexis is the daughter of Mexican immigrants who settled in Georgia when she was a child. Raised in a bilingual household, she speaks Spanish fluently and preserves family traditions such as
    Día de los Muertos altars, posadas during Christmas, and weekly family gatherings centered on shared meals. Her Catholic upbringing informs her respect for community and ritual, while her Mexican roots
    shape her emphasis on family cohesion and hospitality. Living in Kennesaw, she blends these cultural values with Southern hospitality, actively engaging with the local Mexican‑American community through
    church events, cultural fairs, and neighborhood associations. This bicultural identity fuels her commitment to make education inclusive and reflective of both her heritage and her American environment.
attributes:
  skills: '[''Classroom Management'', ''Bilingual Instruction (English‑Spanish)'', ''Educational Technology Integration (Google Classroom, Canvas, Interactive Whiteboards)'', ''Lesson Planning Support'',
    ''Curriculum Adaptation for Cultural Responsiveness'', ''Differentiated Instruction'', ''Assessment Design and Scoring'', ''Student Data Analysis'', ''Parent and Family Communication'', ''Special Education
    Support Basics'', ''Conflict Resolution'', ''Collaborative Teamwork'', ''Time Management'', ''Stress‑Management Techniques for Educators'', ''Professional Development Facilitation'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Hiking Appalachian foothills'', ''Reading literary fiction & Mexican authors'', ''Yoga and meditation'', ''Gardening'', ''Volunteering at after‑school
    tutoring programs'', ''Participating in bilingual book club'', ''Attending Mexican cultural festivals'', ''DIY crafting (crochet, knitting)'']'
  career_goals: Alexis is working toward obtaining full teaching certification in Georgia, with a focus on bilingual elementary education. She aims to complete a Master’s in Curriculum and Instruction within
    the next three years, concentrating on culturally responsive pedagogy for Latino students. Long‑term, she envisions a role as a curriculum specialist or instructional coach, designing district‑wide
    resources that bridge Mexican cultural heritage with state standards. She also hopes to lead a community outreach program that provides after‑school tutoring and parent workshops for immigrant families,
    and to become a mentor for new teaching assistants. Recognizing her own sensitivity to stress, she plans to champion teacher wellness initiatives in her school.
