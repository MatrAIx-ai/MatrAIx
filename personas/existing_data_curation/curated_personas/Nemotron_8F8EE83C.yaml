  career_goals: Approaching retirement, Carrie aims to transition from full‑time driving to a leadership role within her transportation company. She plans to obtain a Certified Transportation Safety Trainer
    (CTST) credential and become the senior driver mentor, designing onboarding programs for new hires and leading quarterly safety workshops. She is also interested in advocating for greener fleet practices,
    supporting the adoption of electric or hybrid trucks in the regional fleet. Over the next two years, she hopes to reduce her on‑road hours, allowing more time for community art involvement while still
    contributing her expertise to improve operational efficiency, schedule optimization, and driver wellbeing.
