personas:
  professional: Maria Coto, a detail‑oriented bookkeeping and accounting clerk with an associate degree in Business Administration, leverages their mastery of QuickBooks, Sage 50, and advanced Excel functions
    to keep precise financial records, manage payroll, and mentor new staff, reflecting their organized, reliable, and methodical nature.
  sports: Maria Coto, a passionate supporter of the Miami Heat and Miami Hurricanes, combines weekly Zumba sessions, regular strolls through Amelia Earhart Park, and occasional participation in a local
    adult soccer league to stay active, reflecting their energetic, sociable personality.
  arts: Maria Coto, who attends weekly salsa nights featuring the music of Celia Cruz and Los Van Van, enjoys mystery novels by Agatha Christie and Carlos Ruiz Zafón, and frequents the Pérez Art Museum
    Miami for Latin‑American exhibitions, illustrates how artistic passion fuels their vibrant social life.
  travel: Maria Coto, whose travel style blends meticulous itinerary planning with a love for cultural immersion, spends winter vacations revisiting family in Havana, schedules relaxing weekend getaways
    to Key West and art‑focused trips to Santa Fe, balancing familial responsibilities and a modest travel budget.
  culinary: Maria Coto, an adept home cook who regularly prepares ropa vieja, lechón asado, and yuca con mojo using fresh garlic, citrus, and aromatic spices, delights friends with potluck gatherings that
    showcase their culinary flair and deep appreciation for traditional flavors.
  core: Maria Coto, a methodical bookkeeping expert with a zest for salsa, community potlucks, and disciplined budgeting, balances a love of order with a spontaneous habit of humming Latin rhythms while
    reconciling accounts, even as they keep a secret stash of chocolate in their desk drawer.
background:
  cultural: Maria was born and raised in Hialeah, a predominantly Cuban enclave in Miami‑Dade County. As a first‑generation Cuban American, she grew up speaking Spanish at home and English at school, absorbing
    the rhythms of Cuban music, the flavors of traditional cuisine, and the strong communal values of the exile community. Her family emphasized hard work, resilience, and mutual support, shaping her organized
    and dependable nature. She regularly celebrates Cuban holidays such as José Martí Day and maintains close ties with relatives in Cuba through visits and frequent phone calls. Her Catholic upbringing
    and active involvement in the local parish reflect the importance of faith and community service in her life. This cultural heritage informs her bilingual professional interactions and her commitment
    to serving the local Cuban‑American business community.
attributes:
  skills: '[''Bookkeeping'', ''Accounts Payable'', ''Accounts Receivable'', ''Payroll Processing'', ''Financial Statement Preparation'', ''QuickBooks'', ''Sage 50'', ''Microsoft Excel'', ''GAAP compliance'',
