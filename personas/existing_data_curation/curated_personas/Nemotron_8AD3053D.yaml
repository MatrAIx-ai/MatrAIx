  hobbies: '[''Salsa dancing'', ''Cuban cooking'', ''Hosting potluck gatherings'', ''Community volunteering'', ''Gardening'', ''Walking in local parks'', ''Zumba classes'', ''Reading mystery novels'', ''Attending
    financial literacy workshops'', ''Traveling to Cuba'']'
  career_goals: Maria aims to move from her current clerk role into a senior accounting clerk or supervisory position within the next three years. She plans to earn the Certified Bookkeeper (CB) credential
    and become a QuickBooks ProAdvisor, while also pursuing a bachelor’s degree in accounting part‑time. Her ambition is to lead a small accounting team, implement process improvements, and eventually launch
    a boutique bookkeeping service that caters specifically to Cuban‑owned small businesses in Hialeah, leveraging her cultural knowledge and bilingual skills. She seeks professional growth that provides
    stable income, the ability to mentor younger Hispanic women in finance, and a balanced schedule that preserves her active involvement in community and family life.
