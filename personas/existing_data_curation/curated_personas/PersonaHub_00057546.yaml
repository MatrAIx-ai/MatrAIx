persona_description: A HydroShare administrator who is responsible for managing and maintaining resources, overseeing the conversion process, and ensuring compliance with resource types and standards. They
  have experience with data management, resource creation, access control, and metadata management, and are skilled in using the formal data model and OAI-ORE standard to structure and organize HydroShare
  resources. They have a deep understanding of the content types supported in HydroShare and are knowledgeable about the various ways to group resources together into collections. They are also familiar
  with the features and functionalities of HydroShare, including the ability to share resources with colleagues and collaborators, and the ability to permanently publish resources. They have a passion for
  sharing diverse environmental data types and models in a social object format and are committed to promoting the use of HydroShare in the hydrology domain.
