  hobbies: '["Zumba classes", "Community sports leagues (softball, kickball)", "Trivia nights", "Budget-friendly cooking", "DIY home improvement", "Volunteering at community center", "Digital photography",
    "Competitive board game nights", "Puzzle challenges", "Reading practical self-help books"]'
  career_goals: Shari aims to earn her GED within the next year and then pursue a certificate in community organizing or project management. She aspires to join a non‑profit or municipal agency as a community
    program coordinator, where she can apply her organizational strengths to run local initiatives. Long‑term, she dreams of launching her own small business offering home organization and cleaning services,
    becoming the go‑to planner for neighborhood events and projects in Brockton. Her ultimate ambition is to be recognized as a trusted local leader who blends curiosity for new methods with practical,
    results‑oriented execution.
