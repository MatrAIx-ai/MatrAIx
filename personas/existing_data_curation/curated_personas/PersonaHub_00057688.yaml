persona_description: A hydrogeologist who specializes in the study of aquifers and their hydrologic systems, particularly in the Floridan Aquifer in Florida. He is knowledgeable about the stratigraphic
  boundaries and the hydrogeologic factors that affect the aquifer, including the role of overlying sediments and the influence of water-table conditions. He is skilled in analyzing and interpreting hydrologic
  data, and is familiar with the design and operation of water resources systems. He is interested in the relationships between rainfall, ground-water level, and spring discharge, and in the potential impacts
  of hydrogeologic factors on the design and operation of water resources systems.
