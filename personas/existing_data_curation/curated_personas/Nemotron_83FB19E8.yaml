  hobbies: '[''Hiking local trails'', ''Birdwatching'', ''Gardening'', ''Reading mystery novels'', ''Puzzle solving (crosswords, Sudoku)'', ''Photography (landscape and wildlife)'', ''Stargazing'', ''Playing
    stealth video games'', ''DIY electronics'', ''Cooking and baking'', ''Yoga and meditation'']'
  career_goals: Michele aims to advance from a floor‑level surveillance officer to a supervisory role within the next three years, eventually becoming a senior surveillance manager overseeing multiple casino
    sites. She plans to earn professional certifications such as the Certified Protection Professional (CPP) and the Certified Security Supervisor (CSS) to broaden her expertise in risk analysis and security
    strategy. Long‑term, she envisions establishing a small security consultancy that serves local businesses in the San Joaquin County area, leveraging her practical experience and curiosity about emerging
    security technologies. Michele also hopes to secure a schedule that offers greater flexibility, allowing her to balance career growth with family responsibilities while reducing work‑related stress.
