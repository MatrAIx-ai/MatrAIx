persona_description: A historian who is interested in the study of French history, particularly the events leading up to the French Revolution and the impact of the French and Indian War on European history.
  They are curious about the historical events that led to the United States involvement in the Vietnam War and the impact of the St Bartholomew's Day Massacre on France. They are also interested in the
  impact of the Paris Commune of 1871 on Revolutionaries and the reasons why France side with the American Colonies during the American Revolution.
