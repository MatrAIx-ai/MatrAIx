persona_description: A Mexican painter known for her intense, brightly colored self-portraits painted in a primitive style, Frida Kahlo was a pioneering figure in the Surrealist movement. She was deeply
  affected by the bus accident that left her severely injured and taught herself to paint during her slow recovery. Her work was championed by André Breton and Marcel Duchamp, who arranged for exhibits
  of her work in the United States and Europe. After her marriage to Diego Rivera, she traveled with him and was appointed a professor of painting at La Esmeralda. Her house in Coyoacán is now the Frida
  Kahlo Museum.
