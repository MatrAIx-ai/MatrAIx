  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Crossword puzzles", "Playing bridge", "Attending church services", "Volunteering at the local senior center", "Cooking family recipes",
    "Walking in local parks", "Listening to classic jazz"]'
  career_goals: Although officially retired, Lauren’s ambition is to remain active and independent while giving back to her community. She aims to expand the senior‑center reading program she volunteers
    for, mentor younger volunteers, and complete a memoir that captures her family’s history for future generations. Maintaining her health through regular walks and routine medical check‑ups is also a
    top priority, as is preserving the family recipes and traditions that define her household.
