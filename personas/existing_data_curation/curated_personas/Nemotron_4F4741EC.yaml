  career_goals: Although retired from formal employment, Michael aims to channel his business acumen into supporting local non‑profits by serving on advisory boards and leading fundraising campaigns. He
    hopes to publish a collection of poems and reflective essays that blend his business insights with artistic musings. Michael envisions establishing a community arts mentorship program that pairs retirees
    with high‑school students, fostering inter‑generational creativity. He also aspires to curate a traveling watercolor exhibition showcasing Florida’s natural landscapes and to continue lifelong learning
    through online courses in art theory and digital media.
