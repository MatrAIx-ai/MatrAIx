persona_description: A public health expert and epidemiologist who is interested in understanding the transmission dynamics of infectious diseases, particularly tuberculosis (TB). They are particularly
  interested in the key premises of the Styblo's rule, such as the duration of infectiousness and the number of infections transmitted per year. They are also interested in the challenges of measuring TB
  burden and trends, particularly in the context of drug-resistant TB. They are likely to be interested in the latest research on TB epidemiology, including the use of mathematical models to predict TB
  transmission and the impact of drug treatment and improved living conditions on TB prevalence.
