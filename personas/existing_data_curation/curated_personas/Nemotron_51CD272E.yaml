  career_goals: Kevin aims to advance to a senior engineering role within the next two years, focusing on leading cross-functional teams and shaping architectural decisions. He aspires to become a technical
    lead or engineering manager where he can implement process improvements, mentor junior developers, and champion a culture of quality and predictability. In the longer term, he envisions taking on a
    principal architect position or launching his own SaaS platform that addresses underserved community needs, leveraging his expertise in scalable cloud solutions while preserving a balanced work-life
    schedule for his family.
