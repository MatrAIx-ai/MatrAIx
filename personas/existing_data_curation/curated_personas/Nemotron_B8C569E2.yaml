personas:
  professional: Lauren Bennett is a methodical investigator in Prince William County who leverages their research and digital forensics expertise to solve cold cases, and they channel their empathetic interviewing
    skills into mentoring at‑risk youth while mapping out a future boutique investigative firm.
  sports: Lauren Bennett fuels their fitness routine by logging early‑morning runs with the Prince William Runners club, practicing yoga at a local studio, cheering on the Washington Capitals on hockey
    nights and the Washington Wizards during basketball season, and they occasionally attend DC United matches when a weekend permits.
  arts: Lauren Bennett channels their love of history into black‑and‑white photography of Civil‑War landmarks, unwinds with mystery novels by Agatha Christie and Tana French, immerses in folk‑rock concerts
    featuring Gillian Welch, and they regularly attend performances at the historic Manassas Playhouse.
  travel: Lauren Bennett favors meticulously planned weekend getaways to historic sites such as Gettysburg and the Shenandoah Valley, dreams of touring Scotland’s Lowland battlefields, squeezes in spontaneous
    beach days at Virginia Beach when work permits, and they balance these trips with budget‑conscious Airbnb stays while ensuring enough time for their investigative work back home.
  culinary: Lauren Bennett enjoys farm‑to‑table meals featuring home‑grown heirloom tomatoes, basil, and rosemary in fresh pasta dishes, indulges in Southern‑inspired shrimp and grits on Sunday brunches,
    pairs their evenings with cold‑brew coffee, and they occasionally binge on salty chips while solving late‑night Sudoku puzzles.
  core: Lauren Bennett blends disciplined investigative rigor with a relentless curiosity for history, tempered by bouts of anxiety and an occasional coffee‑fuelled late‑night puzzle binge.
background:
  cultural: Lauren was raised in a middle‑class, suburban white family in the Washington‑DC metropolitan area of Prince William County. Her upbringing blended Southern hospitality with Mid‑Atlantic pragmatism,
    emphasizing self‑reliance, respect for law, and active community involvement. She attended public schools, participated in a local Methodist congregation, and developed a strong appreciation for the
    region’s Civil War history through frequent visits to the Manassas National Battlefield Park and local historical society events.
