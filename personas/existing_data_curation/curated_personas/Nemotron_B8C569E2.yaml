  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Reading mystery novels'', ''Reading historical biographies'', ''Running'', ''Yoga'', ''Gardening'', ''Volunteering at community center'', ''Mentoring at-risk
    youth'', ''Photography'', ''Attending historical society lectures'']'
  career_goals: Lauren aims to become a senior investigator specializing in missing persons and cold cases within Prince William County, eventually establishing her own boutique investigative firm that
    offers compassionate services to families dealing with trauma. She plans to obtain Certified Professional Investigator credentials, complete a master’s degree in criminology, and develop a mentorship
    program for aspiring female investigators while prioritizing her mental health.
