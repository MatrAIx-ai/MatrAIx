  hobbies: '[''Museum visits'',''Pottery'',''Sketching'',''Reading on technology and creative economies'',''Hiking'',''Gardening'',''Meditation'',''Financial literacy volunteering'',''Community theater
    involvement'']'
  career_goals: Looking ahead, Sara aims to move into a senior leadership role within her credit union or community bank, such as Branch Manager or Director of Consumer Lending, where she can shape policy
    and mentor junior counselors. She plans to earn the Certified Credit Counselor (CCC) designation and, eventually, a Certified Financial Planner (CFP) credential to broaden her advisory scope. A long-term
    ambition is to establish a boutique consultancy that specializes in financing for creative professionals—helping local artists, galleries, and cultural startups secure tailored loans. She also hopes
    to launch a quarterly financial literacy series for Ridgewood residents, blending her love of art and education.
