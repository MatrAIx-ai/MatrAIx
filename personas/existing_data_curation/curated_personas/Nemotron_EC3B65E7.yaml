personas:
  professional: Angela Looper, a veteran elementary and middle‑school teacher who thrives on structured lesson planning yet injects spontaneous improv to energize their classrooms, leverages their talkative,
    center‑stage confidence to lead assemblies and mentor peers, and now seeks a district leadership role where their blend of meticulous organization and flexible creativity can reshape curriculum.
  sports: Angela Looper roots for the Chicago Cubs and Bears, hikes with the McHenry Trails Club each spring, and plays as a cooperative but assertive member of the Lake County Senior Softball League, blending
    casual fitness with seasonal team spirit.
  arts: Angela Looper, a vibrant force in McHenry community theater, directs and performs improv shows that capitalize on their talkative, audience‑interactive style, draws inspiration from Lin‑Manuel Miranda’s
    storytelling, Meryl Streep’s dramatic range, and Ella Fitzgerald’s jazz improvisation, and regularly attends productions of ‘Our Town’ and ‘The Crucible.’
  travel: Angela Looper plans road‑trip itineraries to historic Midwestern towns such as Galena, Lanesboro, and Wisconsin Dells with a structured schedule that leaves room for serendipitous detours, occasionally
    adds a southern heritage stop in Savannah, and prefers modest budgets and locally‑run B&Bs to stay grounded.
  culinary: Angela Looper enjoys cooking garden‑fresh meals like heirloom tomato bruschetta and rosemary‑infused roasted chicken, bakes beloved desserts such as lemon bars and classic apple pie for church
    events, and balances moderate culinary skill with a love for seasonal, locally sourced ingredients, often improvising flavors when inspiration strikes.
  core: Angela Looper is a structured‑yet‑spontaneous educator and community‑theater enthusiast who balances meticulous planning with improv flair, loves gardening, and occasionally lets their love for
    culture override deadlines.
background:
  cultural: Angela was raised in a middle‑class family in the greater Chicago suburbs, with deep roots in the Midwest. Her heritage includes German and Irish ancestry, reflected in family traditions like
    seasonal potlucks and holiday music. The values of practicality, community service, and self‑reliance typical of the region shaped her outlook. As a widowed resident of McHenry, Illinois, she remains
    closely connected to the local Lutheran congregation and participates in county fairs, volunteer drives, and neighborhood potlucks, embodying the collaborative spirit of her cultural environment.
attributes:
