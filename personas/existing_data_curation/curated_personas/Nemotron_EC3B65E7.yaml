  hobbies: '[''Community theater acting'', ''Improvisational comedy'', ''Gardening'', ''Reading historical fiction'', ''Hiking'', ''Cooking and baking'', ''Volunteer tutoring'', ''Yoga'', ''Traveling to
    historic towns'', ''Book club participation'']'
  career_goals: Angela aims to transition from classroom teaching to a leadership role within her district, such as curriculum coordinator or assistant principal, where she can shape instructional practices
    school‑wide. She plans to launch an after‑school enrichment program that blends arts, improv, and STEM activities, providing students with creative outlets while reinforcing academic standards. Long‑term,
    she hopes to author a series of children’s books that promote curiosity and resilience, and to serve on the local school board to advocate for community‑focused education policies.
