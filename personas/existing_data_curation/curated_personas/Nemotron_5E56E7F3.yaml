  hobbies: '[''Watercolor painting'', ''Embroidery'', ''Crocheting'', ''Listening to Indian classical and Bollywood music'', ''Reading poetry and short stories'', ''Herb balcony gardening'', ''Experimenting
    with fusion cooking'', ''Attending cultural festivals and art exhibitions'', ''Community storytelling sessions'']'
  career_goals: Sudha hopes to move from front-line housekeeping to a supervisory or mentorship role within a cleaning agency, where she can train newer workers in both technical and interpersonal aspects
    of the job. She also plans to launch a small part-time consulting service that offers personalized organization and eco cleaning advice to local families, giving her flexible hours to attend community
    events and family gatherings. In addition, Sudha aims to enroll in a community college art class to refine her watercolor and embroidery skills, and eventually exhibit her artwork at the Des Plaines
    cultural center.
