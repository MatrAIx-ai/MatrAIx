personas:
  professional: Sudha Dhawan, a seasoned housekeeping specialist with three decades of expertise in deep cleaning, eco‑friendly stain removal, and minor home repairs, they leverage an imaginative eye for
    aesthetics and a relaxed, flexible work style to devise creative storage solutions and cultivate harmonious client relationships, while aspiring to mentor junior staff and launch a boutique consulting
    service.
  sports: Sudha Dhawan, a devoted fan of the Chicago Cubs and Chicago Bears, they stay active through low‑impact pursuits such as weekly tai‑chi at the senior center, brisk walks along the Des Plaines River
    trail, and occasional community badminton matches, preferring gentle movement and enjoyment over intense competition.
  arts: Sudha Dhawan immerses themselves in the arts by painting delicate watercolors inspired by Georgia O'Keeffe's bold palettes, crocheting intricate motifs while listening to Pandit Bhimsen Joshi's
    classical ragas and Lata Mangeshkar's timeless Bollywood ballads, attending exhibitions at the Des Plaines Art Center, and devouring poetry collections from Mary Oliver and Rabindranath Tagore, they
    channel this creative energy into every aspect of daily life.
  travel: Sudha Dhawan prefers unstructured, leisurely travel, they often take short weekend getaways to nearby Midwest gems like Lake Geneva, Wisconsin, and the historic town of Galena, while dreaming
    of a culturally rich pilgrimage to Varanasi and a garden tour of Kyoto, balancing their love of art, food, and gentle exploration with a flexible budget.
  culinary: Sudha Dhawan, a confident home cook, they delight in crafting fusion dishes such as corn‑scented dhokla topped with cilantro‑lime chutney, spiced chickpea and kale salad drizzled with maple‑ginger
    dressing, and eggplant bharta finished with a splash of Midwestern apple cider vinegar, while their balcony garden supplies fresh mint, basil, and lemongrass that they frequently incorporate into both
    traditional Gujarati meals and experimental plates.
  core: Sudha Dhawan embraces a fluid, art‑infused life where creative clutter coexists with occasional forgetfulness about bills, they use imagination to turn everyday chores into aesthetic experiences
    while savoring spontaneous cultural outings.
background:
  cultural: Sudha was born in a small town in Gujarat, India, where she grew up in a close-knit extended family that observed Hindu traditions such as Diwali, Navratri and weekly puja. She moved to the
    United States after marrying and settled in the Chicago suburbs, specifically Des Plaines, where she has lived for more than three decades. Despite limited formal education, she retained fluency in
    Gujarati and Hindi, which she uses to stay connected with the local Indian diaspora. Sudha actively participates in the Des Plaines Hindu temple's cultural events, celebrates Indian festivals with traditional
    foods and music, and incorporates Gujarati aesthetic motifs into her art and home décor. Her cultural values emphasize hospitality, respect for elders, and community service, which inform both her professional
    approach and personal relationships.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning of carpets and upholstery'', ''Stain removal'', ''Laundry and ironing'', ''Home organization'', ''Eco friendly cleaning practices'', ''Basic home maintenance'',
