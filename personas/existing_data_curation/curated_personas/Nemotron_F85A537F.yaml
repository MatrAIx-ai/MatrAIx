  career_goals: Robert aims to broaden his impact by developing a regional career‑counseling network that leverages technology‑driven assessment tools. He aspires to become director of career services at
    a community college or vocational institute, championing inclusive programs for adult learners and underserved populations. He hopes to author a guidebook on navigating STEM careers for mid‑career changers
    and to mentor emerging counselors, ultimately shaping a more resilient workforce in New England.
