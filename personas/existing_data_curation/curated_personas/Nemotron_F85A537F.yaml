personas:
  professional: Robert Hanna, a seasoned career counselor with a STEM foundation, blends data‑driven labor‑market analysis with a compassionate, hands‑on approach, turning his love of structure into meticulously
    crafted individualized development plans while flexibly adapting on the fly during workshops and presentations.
  sports: Robert Hanna, a devoted fan of the New England Patriots and Boston Red Sox, spends his mornings rowing with the Narragansett Bay Sailing Club, hikes the coastal Cliff Walk in the summer, and occasionally
    joins a local adult soccer league for a light cardio workout, preferring low‑impact activities that complement his love of the outdoors.
  arts: Robert Hanna, an enthusiastic participant in community theater, enjoys performing Shakespearean monologues onstage, directing lighting design backstage, and playing acoustic renditions of Bob Dylan
    and Neil Young at local folk gatherings, while secretly admiring the works of painter Andrew Wyeth and the poetry of Mary Oliver.
  travel: Robert Hanna plans his trips with a blend of structured itineraries and spontaneous detours, favoring coastal escapes like Martha’s Vineyard and Cape Cod, cultural pilgrimages to Boston’s historic
    sites, and dreaming of a future sailing tour of the Norwegian fjords once his retirement savings allow.
  culinary: Robert Hanna, an avid home cook, favors farm‑to‑table dishes such as roasted half‑shell clams with fresh thyme, heirloom tomato salad with local mozzarella, and a weekly slow‑cooked New England
    clam chowder, yet he often forgets to set a timer, resulting in the occasional over‑simmered broth.
  core: Robert Hanna balances a love of orderly career counseling with a spontaneous flair for sailing, theater, and gardening, all while humorously juggling missed deadlines and a habit of over‑seasoning
    his cooking.
background:
  cultural: Robert grew up in a middle‑class family in the New England region, with deep roots in Rhode Island that trace back several generations. His cultural upbringing reflects the pragmatic, community‑oriented
    ethos typical of coastal New England, emphasizing self‑reliance, respect for nature, and a strong sense of civic duty. Raised in a Protestant tradition that highlighted service to others, he internalized
    values of compassion and cooperation. Living in Bristol, a town known for its historic maritime heritage, has reinforced his appreciation for local customs, seasonal seafood cuisine, and the region's
    commitment to education and lifelong learning.
