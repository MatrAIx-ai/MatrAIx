  career_goals: Kimberly aims to progress from her current analyst role to a senior systems analyst position within the next three years, followed by a transition into solutions architecture or IT management.
    She is driven to earn professional certifications—such as ITIL, PMP, and AWS Solutions Architect—to solidify her expertise and gain a competitive edge. Long‑term, she envisions leading cross‑functional
    projects that integrate emerging technologies like AI and cloud services to improve operational efficiency for a rapidly growing company. Relocating to a larger tech hub in Texas, such as Austin, is
    part of her plan to broaden her professional network and take on higher‑impact leadership responsibilities.
