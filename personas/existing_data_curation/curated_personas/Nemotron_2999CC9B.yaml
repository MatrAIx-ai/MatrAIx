personas:
  professional: Kimberly Noseworthy is a detail‑oriented computer systems analyst who harnesses their expertise in SQL, Python, Java, Linux administration, and Agile tools like JIRA and Visio to craft scalable
    solutions, while strategically pursuing ITIL, PMP, and AWS certifications to advance toward a senior analyst role and eventually solutions architecture in a fast‑growing Texas tech hub.
  sports: Kimberly Noseworthy competes on the university’s intramural soccer team, attends spin and Zumba classes at a local boutique gym, hikes with the Hill Country Hiking Club on weekends, and avidly
    follows the Dallas Cowboys and Texas Rangers, channeling their competitive drive into both casual and spectator sports.
  arts: Kimberly Noseworthy immerses themselves in live country and indie concerts, regularly cheering for Kacey Musgraves, The Avett Brothers, and Phoebe Bridgers, while also curating board‑game nights
    featuring Catan and Ticket to Ride, and they find creative fulfillment in volunteering at coding workshops that feel like modern community art.
  travel: Kimberly Noseworthy plans road‑trip itineraries on spreadsheets, favoring long drives to Austin, Santa Fe, and Big Bend National Park where they combine hiking, local food‑truck discoveries, and
    weekend concerts, all while balancing a modest travel budget against student loan repayments.
  culinary: Kimberly Noseworthy enjoys crafting brisket tacos with smoked paprika, jalapeño, and cilantro, whipping up quinoa bowls with avocado and roasted vegetables, yet they admit a guilty pleasure
    for late‑night chicken biscuits from a nearby fast‑food chain, reflecting a moderate cooking skill paired with occasional indulgence.
  core: Kimberly Noseworthy blends a competitive, structure‑loving mindset with a sociable, adventure‑seeking spirit, tackling tech challenges by day and thriving on group sports, concerts, and spontaneous
    road trips by night, all while juggling disciplined finances and occasional health‑care shortcuts.
background:
  cultural: Kimberly grew up in a middle‑class family on the outskirts of College Station, with deep roots in the Texas community. Her parents emphasized the importance of education—her mother was a teacher
    and her father an engineer—instilling a strong work ethic and a practical outlook. While she embraces the friendly, collaborative spirit of Texas A&M’s campus culture, she also carries the broader values
    of American individualism and reliability. Her upbringing in a region where football, barbecue, and community festivals are common has shaped her love for group gatherings and outdoor activities. At
    the same time, she is aware of the gender dynamics in tech and actively seeks mentorship and networks that support women in STEM.
