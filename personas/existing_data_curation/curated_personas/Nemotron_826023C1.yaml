personas:
  professional: Reinalda Dale is a seasoned architectural drafter with over three decades mastering AutoCAD, Revit, and Nevada building codes, blending meticulous document control with a forward‑thinking
    push toward sustainable design as they mentor junior drafters and prepare for BIM certification.
  sports: Reinalda Dale enjoys weekend desert hikes on the Quinn Canyon Trail, follows the Reno Aces baseball team and the Nevada Wolf Pack football squad, and they maintain fitness through a mix of low‑intensity
    yoga and community walking groups, treating exercise as a social outing rather than a strict regimen.
  arts: Reinalda Dale shines on stage as the lead in community theatre productions of 'Our Town' and 'The Glass Menagerie,' volunteers as a historical narrator for local heritage tours, and they often listen
    to folk singer Marty Robbins between rehearsals, while finding creative release in quilting modern patterns inspired by traditional Western motifs.
  travel: Reinalda Dale prefers meticulously planned road trips to desert destinations like Zion National Park and Sedona, dreams of exploring the ancient ruins of Petra but they currently prioritize weekend
    getaways to nearby historic towns such as Virginia City and family visits in Portland, balancing wanderlust with a practical budget.
  culinary: Reinalda Dale delights in cooking garden‑fresh heirloom tomatoes, rosemary‑infused grilled chicken, and homemade sourdough, while occasionally indulging in Basque chicken stew at a local favorite
    spot, and they experiment with quilting‑themed cocktail garnishes, though they often over‑season dishes when stressed.
  core: Reinalda Dale is a talkative, organized community pillar who channels curiosity into sustainable design, yet they wrestle with chronic worry and a habit of overcommitting to social projects.
background:
  cultural: Reinalda is a white woman raised in the Great Basin region, where the frontier spirit of self‑reliance and community cooperation shapes daily life. Growing up in a small Nevada town, she absorbed
    a blend of Western ruggedness and close‑knit neighborhood values, often centered around local churches, community events, and the mining heritage of Pershing County. Her cultural outlook balances respect
    for traditional Nevada building practices with an openness to modern, environmentally conscious design. This background informs her commitment to harmonizing new ideas with established methods, fostering
    both personal and communal resilience.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Technical Drafting'', ''Construction Document Preparation'', ''Building Code Compliance'', ''Design Coordination'', ''BIM Basics'', ''Project Scheduling'', ''Sustainable
