  hobbies: '[''Oil painting'', ''Watercolor illustration'', ''Chinese calligraphy'', ''Origami'', ''Reading scientific and philosophical works'', ''Gardening'', ''Tai Chi'', ''Traditional tea ceremony'',
    ''Volunteering at senior center'', ''Mentoring young scientists'']'
  career_goals: Even in retirement, Yuli aims to nurture the next generation of innovators by establishing a community‑based Science‑and‑Art mentorship program that pairs senior volunteers with high‑school
    students. She also plans to author a memoir that interweaves her scientific career with her artistic pursuits, highlighting how curiosity and compassion can coexist. Additionally, she hopes to serve
    as a volunteer consultant for local museums, helping design interactive exhibits that make abstract scientific ideas accessible to the public. Ultimately, Yuli wants her later years to be marked by
    continual learning, meaningful knowledge sharing, and the creation of enduring interdisciplinary bridges.
