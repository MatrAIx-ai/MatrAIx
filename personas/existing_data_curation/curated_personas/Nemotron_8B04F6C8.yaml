personas:
  professional: Maria Valencia is a seasoned elementary educator renowned for designing differentiated, technology‑enhanced curricula, leveraging bilingual fluency to foster culturally responsive classrooms,
    while their curiosity‑driven yet easygoing nature fuels mentorship of new teachers and fuels ambition to become a district curriculum coordinator.
  sports: Maria Valencia volunteers as an assistant coach for the local youth soccer program, hikes the East Texas woods with the East Texas Hiking Club, and enjoys cheering on the Dallas Cowboys and the
    Dallas Mavericks while playing recreational softball on weekends, and they relish the camaraderie of team sports.
  arts: Maria Valencia immerses themselves in salsa and folkloric dance nights, sings karaoke renditions of ABBA's 'Dancing Queen', enjoys listening to Celia Cruz and Luis Miguel, and they discuss historical
    fiction by Ken Follett in a monthly book club, reflecting a love for communal creativity.
  travel: Maria Valencia prefers spontaneous road trips to nearby Hill Country vineyards or Gulf Coast beaches, while dreaming of exploring Granada’s Alhambra and Costa Rica’s rainforests, balancing limited
    vacation time with their love for family visits, and they often plan trips around school holidays.
  culinary: Maria Valencia showcases their culinary skill by preparing mole, tamales, and pozole using dried chiles, cacao, and fresh corn masa, often hosting neighborhood potlucks where they experiment
    with heirloom family recipes and occasionally over‑spice due to relaxed timing, and they delight in sharing the dishes with friends.
  core: Maria Valencia blends a nurturing, community‑centered spirit with laid‑back curiosity, juggling leadership ambitions, spontaneous generosity, and a love for dance, food, and outdoor adventures,
    and they radiate optimism in every endeavor.
background:
  cultural: Maria is a first-generation Mexican-American who grew up in a bilingual household in Texas, speaking Spanish at home and English at school. Her Mexican heritage shapes her values of family solidarity,
    community generosity, and respect for elders. She celebrates traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often bringing these celebrations into her classroom to
    foster cultural pride among her students. Maria participates in local Mexican-American cultural associations and volunteers at community events that highlight Mexican music, dance, and cuisine. Her
    Catholic upbringing influences her sense of service and compassion, which she channels into her teaching through culturally responsive pedagogy and bilingual communication with families.
attributes:
