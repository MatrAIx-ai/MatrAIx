  hobbies: '["Cooking Mexican Cuisine","Salsa and Folkloric Dancing","Community Gardening","Reading Historical Fiction and Educational Research","Book Club Participation","Volunteering at After-School Sports
    Programs","Hiking in East Texas","Yoga and Mindfulness Practice","Karaoke with Friends"]'
  career_goals: Maria aims to move into a leadership role within her district, such as curriculum coordinator or lead teacher, where she can expand bilingual education programs and mentor colleagues. She
    plans to pursue a master's degree in educational leadership to bolster her capacity for school-wide initiatives. Her long-term ambition includes becoming an assistant principal and establishing a community
    liaison position that strengthens ties between the school and the local Mexican-American community. Additionally, she hopes to author a resource guide on integrating Mexican cultural heritage into elementary
    language arts curricula.
