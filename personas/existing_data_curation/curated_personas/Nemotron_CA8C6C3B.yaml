personas:
  professional: Chad Hartman is a veteran journeyman electrician who blends 25 years of hands‑on expertise in residential, commercial and light‑industrial power systems with a curiosity for emerging renewable
    technologies, leveraging meticulous blueprint reading, NEC compliance, and crew leadership while planning to earn their Master Electrician license and launch a family‑run contracting firm focused on
    solar installations and high safety standards.
  sports: Chad Hartman is an outdoor‑oriented sports enthusiast who spends spring weekends hunting deer and turkey with their brother, winter mornings angling for largemouth bass on Chesapeake Bay tributaries,
    supports the Washington Nationals and Washington Commanders, and participates in a local mid‑week darts league at the King William County community center while maintaining a modest fitness regimen
    of functional strength training at home.
  arts: Chad Hartman enjoys casual acoustic guitar sessions at family gatherings where they cover classics by Johnny Cash and Lynyrd Skynyrd, appreciates regional folk art displayed at the King William
    County fair, and finds inspiration in the craftsmanship of woodworking master John G. Harrison, blending a modest appreciation for classic Americana music and visual arts into relaxed leisure.
  travel: Chad Hartman prefers low‑key, family‑friendly road trips that combine scenic fishing spots like the Potomac River and historic towns such as Williamsburg, occasionally planning longer vacations
    to the Canadian Maritime provinces for salmon fishing or to the Scottish Highlands to explore Celtic heritage, always balancing budget considerations with the desire for authentic outdoor experiences.
  culinary: Chad Hartman is a self‑taught grill master who relishes experimenting with Virginia‑style pork shoulders, smoked catfish seasoned with paprika and brown sugar, and a secret hickory‑infused barbecue
    rub, frequently pairing their creations with locally sourced coleslaw and homemade baked beans while modestly bragging about their skill at coaxing perfect sear on a vintage cast‑iron skillet.
  core: Chad Hartman blends seasoned electrical expertise with a down‑to‑earth love of hands‑on DIY projects, balancing disciplined work ethics and meticulous safety standards with a stubborn habit of over‑stocking
    junk‑drawer tools and a weekend compulsion to perfect their smoked bacon recipe.
background:
  cultural: Chad was born and raised in a small farming community in Virginia's Tidewater region. His family's roots trace back several generations to English and Scots-Irish settlers who lived a traditional
    Southern, agrarian lifestyle. The values of hard work, self-reliance, and community service were reinforced by his upbringing in a close-knit Baptist congregation and by frequent participation in county
    events such as church picnics, 4-H fairs, and local high-school sports. These cultural influences have shaped his practical outlook, cooperative nature, and respect for both tradition and the gradual
    adoption of new technologies.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installations'', ''Low-voltage systems (security, data, fire alarm)'', ''Solar photovoltaic system installation'', ''EV charger wiring'', ''Electrical
    troubleshooting and diagnostics'', ''Blueprint and schematic interpretation'', ''Conduit bending and cable management'', ''NEC compliance and inspection'', ''Team leadership and safety training'']'
  hobbies: '[''Bass fishing'', ''Deer and turkey hunting'', ''Woodworking'', ''Vintage pickup truck restoration'', ''Smart-home DIY projects'', ''Barbecue cooking'', ''Local community fairs'', ''Acoustic
    guitar playing'', ''Boy Scouts mentorship'']'
  career_goals: Chad intends to obtain his Master Electrician license within the next two years and subsequently launch a family-run electrical contracting business that emphasizes renewable-energy projects
    and high safety standards. He wants to mentor apprentices, expand services to include solar and energy-efficiency retrofits for local homeowners, and eventually become a certified owner-operator under
    the Virginia Department of Professional and Occupational Regulation. He also hopes to qualify for a state-approved small-business grant to upgrade his company's tool fleet and invest in continuing-education
    courses on emerging smart-home technologies.
