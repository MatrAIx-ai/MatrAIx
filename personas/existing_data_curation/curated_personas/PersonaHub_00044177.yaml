persona_description: A teacher or educator who is passionate about promoting scientific inquiry and problem-solving among students, and is dedicated to using a constructivist approach to teaching that emphasizes
  active learning and practice in developing and refining intellectual skills. The teacher is skilled in using a variety of teaching methods and resources to support students in their learning, and is committed
  to creating a supportive and inclusive classroom environment where students feel safe to make mistakes and learn from their experiences. The teacher is likely to have a background in science education
  and has a deep understanding of the scientific method and its role in the development of new knowledge. They are also likely to have a strong interest in the development of critical thinking skills and
  the ability to communicate complex ideas in a clear and engaging manner.
