  hobbies: '[''Coastal walking and birdwatching'', ''Garden tending'', ''Reading classic literature'', ''Knitting'', ''Playing the acoustic guitar'', ''Cooking Maine lobster dishes'', ''Volunteering at
    the Bath Historical Society'', ''Participating in community book clubs'', ''Attending local theater performances'', ''Leading photography meetups'']'
  career_goals: In the next few years, Janet aims to compile a coffee‑table book that chronicles Bath's shipbuilding legacy through a blend of historic and contemporary images, preserving the stories of
    older residents. She plans to establish a publicly accessible digital archive for local photographers and historical societies, ensuring the community's visual heritage is safeguarded for future generations.
    Additionally, she aspires to mentor emerging photographers through regular meetups and one‑on‑one coaching, fostering a supportive network while maintaining a balanced workload that respects her sensitivity
    to stress.
