personas:
  professional: Janet Kraemer, a 65‑year‑old maritime photographer and archival curator, merges deep curiosity about emerging imaging tech with time‑tested darkroom craft, using their research‑driven narrative
    skill to lead community workshops and curate a forthcoming coffee‑table book on Bath’s shipbuilding legacy, while balancing assertive project leadership with a gentle, cooperative teaching style.
  sports: Janet Kraemer enjoys daily coastal walks with a local senior walking club, participates in seasonal community rowing events on the Kennebec River, roots for the Boston Red Sox and Boston Celtics,
    and attends the Bath Senior Fitness Center’s low‑impact exercise classes to stay active.
  arts: Janet Kraemer spends evenings strumming folk classics by Bob Dylan, Joan Baez, and Gillian Welch on acoustic guitar, curates a small photography exhibit featuring Winslow Homer‑style seascapes,
    and actively discusses literature ranging from Herman Melville to contemporary memoirs in their book club, weaving artistic appreciation into daily life.
  travel: Janet Kraemer favors thoughtfully planned road trips to New England’s historic coastal towns, recently revisited Acadia National Park and spent a weekend in St. Andrews, Canada, while dreaming
    of a photo pilgrimage to the Norwegian fjords and a cultural tour of Liverpool’s maritime museums.
  culinary: Janet Kraemer delights in preparing fresh Maine lobster with drawn butter, herb‑crusted baked cod seasoned with thyme and dill from their garden, and a creamy New England clam chowder, confidently
    navigating seafood cooking while occasionally over‑salting dishes in pursuit of flavor.
  core: Janet Kraemer is a meticulous, community‑oriented maritime photographer whose love of heritage and folk music is balanced by a lingering worry that fuels both careful planning and occasional overcommitment.
background:
  cultural: Janet originates from a white, Anglo‑American family with German ancestry, reflected in her surname Kraemer. Raised in New England, she embodies the region's maritime culture, reverence for
    nature, and a strong sense of community responsibility. Her education in arts and humanities has reinforced a value for lifelong learning and critical inquiry, while the modest, industrious ethos of
    Bath's shipbuilding heritage shapes her practical yet innovative outlook. She balances the traditional New England appreciation for self‑reliance with a deeply rooted commitment to collective well‑being,
    often participating in local civic activities and cultural preservation efforts.
attributes:
  skills: '[''Portrait photography'', ''Landscape and coastal photography'', ''Studio lighting'', ''Darkroom processing'', ''Digital post‑processing (Adobe Photoshop, Lightroom)'', ''Historical research
