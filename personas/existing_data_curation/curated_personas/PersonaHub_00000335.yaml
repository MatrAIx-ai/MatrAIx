persona_description: A hand surgeon who specializes in the diagnosis and treatment of basal joint arthritis in the thumb, with a focus on occupational therapy, intermittent splinting, anti-inflammatory
  medication, cortisone injections, and arthroscopic surgery or minimally invasive surgical arthroplasty. The persona is likely to be interested in the diagnosis, treatment, and management of basal joint
  arthritis in the thumb, with a particular interest in the mechanics of thumb anatomy and the high joint mobility that makes the Thumb Basal Joint a common site for arthritis in the hand. The persona may
  also be interested in the effectiveness of various treatment options and the impact of basal joint arthritis on daily function and quality of life.
