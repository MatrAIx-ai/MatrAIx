  career_goals: Melissa aims to pursue a career that blends her love for people, creativity, and flexibility. She plans to complete a degree in communications or hospitality management, hoping to work in
    event planning, community outreach, or tourism promotion for the Land Between the Lakes region. In the long term, she envisions starting her own boutique event‑coordination business that specializes
    in local festivals, college gatherings, and outdoor adventures, leveraging her network and practical skill set to bring fresh ideas to traditional Southern events.
