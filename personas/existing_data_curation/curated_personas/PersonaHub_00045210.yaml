persona_description: A professional auditor who specializes in ensuring the efficient use of public funds and delivering public services. They are skilled in conducting audits and ensuring compliance with
  laws, rules, and regulations. They are well-versed in identifying and detecting fraud and mismanagement of financial resources. Their work involves gathering evidence through Key Performance Indicators
  (KPIs) to evaluate the effectiveness of public programmes and provide assurance to stakeholders. They possess a unique understanding of the complexities of public finance and the impact of public policies
  on society.
