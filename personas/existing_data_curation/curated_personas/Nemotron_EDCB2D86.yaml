  career_goals: Iland aims to transition from fast-food work to a role that blends his hospitality experience with his artistic passions. Over the next few years he plans to enroll in a community-college
    culinary arts program while building a portfolio of digital and hand-drawn artwork. His medium-term goal is to become a supervisor or manager in a cafe or bistro that incorporates local art exhibitions,
    allowing him to curate displays, serve food, and foster a welcoming community hub. Ultimately, he dreams of owning a small coffee shop-gallery in a nearby town, where he can provide a space for emerging
    artists, host workshops, and create a relaxed environment that reflects his values of harmony and creativity. To achieve this, he intends to develop leadership and business-management skills through
    on-the-job training and occasional online courses.
