personas:
  professional: Iland Miller, a 26‑year‑old fast‑food counter worker, blends their knack for calming high‑pressure shifts with budding graphic‑design talent, using spontaneous problem‑solving and a strong
    desire for community harmony to envision a future café‑gallery that curates local art while serving espresso and light fare.
  sports: Iland Miller spends weekends hiking the Caprock Canyons, biking the West Texas trail network, and cheering for the Dallas Cowboys and Texas Rangers, while occasionally joining a local trail‑running
    club, though their spontaneous nature often leads to missed workout appointments and forgotten water bottles.
  arts: Iland Miller, an avid sketcher of West Texas prairies and digital illustrator, regularly explores regional art fairs and live‑music venues that showcase indie acts like Bon Iver, while curating
    community art workshops for children and drawing inspiration from street‑art icons such as Shepard Fairey.
  travel: Iland Miller favors spontaneous, budget‑friendly road trips that include sunrise drives to Big Bend, photo stops at Marfa’s minimalist installations, and a planned weekend pilgrimage to Portland’s
    renowned coffee districts, balancing wanderlust with the financial realities of a fast‑food salary.
  culinary: Iland Miller, an enthusiastic home cook, delights in mastering a velvety espresso macchiato, crafting avocado toast topped with heirloom tomatoes, and experimenting with Tex‑Mex staples such
    as chicken enchilada tacos, all while pursuing a community‑college culinary arts program to hone pastry techniques and coffee‑brew skills.
  core: Iland Miller is an anxious, curiosity‑driven artist who oscillates between frantic coffee‑shop aspirations and spontaneous sketching marathons, constantly seeking community connection while wrestling
    with a habit of disorganization.
background:
  cultural: Iland grew up in Holliday, a small town in Archer County, Texas, where community ties and Southern hospitality are central to daily life. His upbringing was shaped by family gatherings, church
    events, and county fairs that celebrated Texas ranching traditions, country music, and barbecue. The close-knit environment fostered a strong sense of responsibility, self-reliance, and an appreciation
    for helping neighbors. At the same time, his high-school art classes and exposure to regional art festivals sparked a curiosity for broader creative expressions, leading him to explore indie music,
    contemporary visual art, and literary works beyond the local scene. This blend of traditional West Texas values with an openness to diverse artistic experiences informs his worldview, balancing respect
    for community traditions with a desire for new ideas and experiences.
