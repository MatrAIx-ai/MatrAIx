  hobbies: '[''watercolor painting'', ''quilting'', ''gardening'', ''creole cooking'', ''birdwatching'', ''zydeco and jazz festivals'', ''museum visits'', ''reading historical fiction'', ''exploring new
    recipes'']'
  career_goals: In the next few years Gilda aims to channel her extensive experience into mentorship and process improvement. She is pursuing certification as an ASQ Certified Quality Engineer to deepen
    her technical credibility. Her ambition is to lead a small quality‑assurance team, develop a training program for junior inspectors, and introduce creative visual tools that make complex quality data
    more accessible to floor staff. While planning for a gradual transition toward retirement, she hopes to offer part‑time consulting to local artisanal food producers, helping them meet safety standards
    and preserve traditional Louisiana flavors.
