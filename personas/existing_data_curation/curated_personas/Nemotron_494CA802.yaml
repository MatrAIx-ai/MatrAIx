  hobbies: '[''Visiting art museums and galleries'', ''Reading contemporary fiction and business literature'', ''Playing acoustic guitar'', ''Photography'', ''Hiking local nature preserves'', ''Cooking
    Southern and New England dishes'', ''Participating in community theater'', ''Mentoring youth through after‑school programs'', ''Exploring new cultures through travel'']'
  career_goals: Thurman aims to become a curriculum specialist or assistant principal, championing interdisciplinary programs that blend business concepts with arts and STEM for K‑8 students. He plans to
    pursue a master's in educational leadership to influence district policy, expand mentorship networks for underrepresented youth, and eventually guide school-wide initiatives that foster creativity,
    critical thinking, and cultural competence.
