persona_description: A researcher who specializes in the study of internet and economic behavior, particularly the relationship between future-oriented internet searches and real-world economic indicators.
  They are interested in quantifying the advantage of looking forward and have conducted a joint study with scientists at University College London and Boston University to analyze the correlation between
  a country's per capita gross domestic product and how future-oriented its citizens' internet habits are. They are also interested in the level of future-oriented internet searches amongst Irish citizens
  and the possible relationship between search activity and GDP.
