persona_description: A Shakespeare enthusiast who is interested in learning about the great man's life, works, and accomplishments. They are passionate about the 400th anniversary of Shakespeare's death
  and are eager to delve into the complexities of his life and legacy. They are knowledgeable about the 36 plays, 154 sonnets, 2 long version poems, and several verses not fitting into any type description.
  They are intrigued by Shakespeare's sexual life and the evidence of his many additional heterosexual liaisons. They are interested in the phrases and expressions commonly used in Shakespeare's plays and
  the origins of certain phrases and expressions. They are also interested in the concept of "Too much of a good thing" and the "Heart of gold" in Shakespeare's plays.
