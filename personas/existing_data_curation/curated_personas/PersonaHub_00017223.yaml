persona_description: A soil scientist who conducts research on the effects of organic and inorganic amendments on the availability, concentration, and uptake of heavy metals such as cadmium and lead in
  wheat in calcareous alkaline soils. The researcher is interested in mitigating the detrimental effects of land application of raw effluent and is looking for innovative solutions to reduce the availability
  of these metals for uptake by wheat. The researcher is likely to be interested in peer-reviewed journals such as Communications in Soil Science and Plant Analysis and is looking for studies that address
  the topic of heavy metal pollution in agriculture and potential mitigation strategies.
