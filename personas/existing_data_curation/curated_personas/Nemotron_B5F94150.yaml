personas:
  professional: Cody Thomas, a twenty‑year‑old driver‑sales associate, blends methodical pre‑trip inspections, meticulous freight paperwork, and a competitive sales drive to reliably meet delivery schedules
    while strategically pursuing a Class A CDL with Hazmat and tank‑vehicle endorsements and eyeing a future role as a logistics coordinator.
  sports: Cody Thomas competes in a neighborhood basketball league with the Lone Star Hoops Club, avidly follows the Dallas Cowboys, Texas Rangers, and Houston Rockets, and spends weekends hunting, fishing,
    and riding their ATV across nearby state parks, treating the town gym as a second workplace for strength training.
  arts: Cody Thomas is an enthusiastic fan of country‑music icons such as Luke Bryan, Carrie Underwood, and Morgan Wallace, regularly attends line‑dancing nights at the local barn, collects vintage concert
    tees, and enjoys classic Western films starring Clint Eastwood, all of which shape their social circle and personal identity.
  travel: Cody Thomas prefers meticulously planned road trips, having charted routes through the Texas Hill Country, the Kansas plains, and the New Mexico desert, already visited Nashville for a country‑music
    festival, and aspires to fish the Bow River in Canada next summer, balancing a thirst for adventure with the budget constraints of a young driver.
  culinary: Cody Thomas favors hearty Tex‑Mex fare, regularly grilling smoked brisket, rib‑rubbed pork, and freshly caught trout seasoned with garlic, cumin, and chili powder, often pairing meals with corn
    on the cob and black‑bean chili, yet they frequently resort to fast‑food tacos after late‑night gaming marathons.
  core: Cody Thomas is a methodical, socially energetic twenty‑year‑old who balances a disciplined logistics career with a love for ATV rides, country‑music line dancing, and a competitive streak that fuels
    both professional ambition and occasional impulsive splurges on hunting gear.
background:
  cultural: Cody grew up in the rural community of McRae‑Helena, Georgia, where Southern hospitality and close‑knit relationships shape daily life. His family has deep roots in the region’s agricultural
    and small‑business sectors, and church—particularly the local Baptist congregation—plays a central role in his upbringing. He was raised with values of hard work, self‑reliance, and respect for tradition,
    while also being exposed to the practical realities of the regional trucking and logistics industry. These influences combine with his modern outlook as a traveling driver, giving him a blend of traditional
    Southern culture, community‑oriented service, and an appreciation for contemporary music, outdoor recreation, and technology.
attributes:
  skills: '[''Commercial Driving (CDL)'', ''Route Planning & Optimization'', ''Vehicle Inspection & Basic Maintenance'', ''Load Securement & DOT Compliance'', ''Customer Relationship Management'', ''Time
    Management & Punctuality'', ''Inventory Tracking & Documentation'', ''Business Fundamentals (Marketing & Accounting)'', ''Effective Communication'', ''Safety & Risk Assessment'']'
  hobbies: '[''ATV Riding'', ''Motorcycling'', ''Fishing'', ''Hunting'', ''Country Music & Line Dancing'', ''Basketball/Softball'', ''Youth Ministry Volunteering'', ''Racing Video Games'', ''Weightlifting'',
    ''County Fair & Rodeo'']'
  career_goals: Cody aims to earn a Class A CDL with Hazmat and tank‑vehicle endorsements within the next year and complete his associate degree in Logistics or Business Administration. He plans to transition
    from entry‑level driver‑sales work to a logistics coordinator role, then advance to fleet manager and eventually regional operations manager for a trucking firm. In the long term, he hopes to launch
    his own small freight brokerage or trucking company, using his sales experience to grow a client base and his operational knowledge to ensure efficient, compliant service. He also seeks mentorship opportunities
    to develop leadership skills and become a trainer for new drivers.
