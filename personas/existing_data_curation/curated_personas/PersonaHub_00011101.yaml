persona_description: A neuroscientist who specializes in the study of emotions and their impact on bodily reactions, particularly the role of skin temperature in social categorization. The researcher is
  well-versed in the principles of the vegetative nervous system and its influence on the body's physiological responses. She is conducting research on the association between changes in face temperature
  and social categorization, with a focus on Italian and Romanian faces. The study aims to demonstrate how emotions, presence or absence of perceptual awareness of positive and negative valence stimuli,
  and the activation of the vegetative nervous system influence the tendency to categorize the social world according to an 'us vs them' based perspective. The research is supported by EU funding and a
  PRIN grant.
