  career_goals: At 70, June aims to transition from day-to-day management to a senior advisory and mentorship role, leveraging her wealth of experience to guide emerging talent within the Tucson advertising
    community. She intends to launch a boutique consultancy focused on ethical brand storytelling for local businesses and non-profits, while also championing sustainable, desert-friendly promotional practices.
    A lifelong learner, she plans to author a memoir that chronicles the evolution of advertising across six decades, highlighting the challenges and triumphs of women in the field. Ultimately, she aspires
    to leave a lasting legacy of professionalism, strategic rigor, and community-oriented creativity.
