personas:
  professional: Virgen Torres, a 20‑year‑old aspiring human‑computer interaction researcher, merges Python data analysis, Arduino prototyping, and Blender visualizations with vivid digital illustration
    to design intuitive, art‑inspired interfaces for education and mental‑health tools, balancing meticulous project planning with spontaneous creative exploration.
  sports: Virgen Torres enjoys solo trail runs through the Watchung Reservation with the New Brunswick Runners club, practices yoga in the spring, follows the New York Knicks for basketball, and joins a
    casual pick‑up soccer group on weekends, balancing low‑impact cardio with occasional strength training.
  arts: Virgen Torres immerses in digital painting inspired by the bold palettes of folklore, draws creative cues from Hayao Miyazaki, Banksy, and Frida Kahlo, fuels imagination with speculative novels
    by Octavia Butler and N. K. Jemisin, and curates a soundtrack featuring Janelle Monáe, Radiohead, and Ólafur Arnalds while sketching in local cafés.
  travel: Virgen Torres prefers meticulously planned solo trips that blend adventure and cultural immersion, having trekked Norway’s fjords, explored Tokyo’s neon districts, photographed Scotland’s ancient
    stone circles, and now dreams of showcasing an AR/VR installation at Berlin’s Tech Open Air while budgeting each journey through spreadsheet tracking.
  culinary: Virgen Torres cooks at an intermediate level, mastering family‑rooted dishes like mofongo and arroz con gandules seasoned with plantains, annatto, and fresh cilantro, while experimenting with
    vegan lentil soup flavored with cumin and smoked paprika, often pairing meals with homemade guava glaze.
  core: Virgen Torres, a 20‑year‑old solitary creator, fuses tech and art to envision immersive interfaces, balancing meticulous planning with bursts of spontaneous imagination, yet often procrastinates
    by scrolling endless design forums.
background:
  cultural: Born to Puerto Rican parents, Virgen grew up in a bilingual household where Spanish was spoken alongside English, and family gatherings were filled with salsa music, storytelling, and the aroma
    of arroz con gandules. Living in Parsippany, she participates in the local Puerto Rican community, attending cultural festivals like the annual Noche de San Juan and volunteering at the Juanita García
    Center. Her heritage instills a deep appreciation for community, resilience, and the celebration of art as a means of identity. These values intersect with her academic pursuits, motivating her to create
    work that honors her roots while pushing the boundaries of technology and imagination.
attributes:
  skills: '[''Python programming'', ''Data analysis with R and pandas'', ''MATLAB'', ''Arduino prototyping'', ''3D modeling (Blender)'', ''Digital illustration'', ''Scientific writing'', ''Critical thinking'',
    ''Project planning'']'
  hobbies: '[''Digital painting'', ''Photography'', ''Reading speculative fiction'', ''DIY electronics'', ''Exploring new music genres'', ''Hiking in the Watchung Reservation'', ''Cooking Puerto Rican cuisine'',
    ''Attending local art galleries'']'
  career_goals: Virgen aspires to pursue a graduate degree in human‑computer interaction or computational neuroscience, fields where she can blend her technical acumen with her creative imagination. She
    aims to contribute to cutting‑edge research that designs intuitive, art‑inspired interfaces for education and mental‑health applications. In the long term, she envisions leading interdisciplinary projects
    or a startup that creates immersive AR/VR experiences, using her expertise in data visualization and digital art to make science more accessible and engaging, while also advocating for greater representation
    of Latinx voices in tech research.
