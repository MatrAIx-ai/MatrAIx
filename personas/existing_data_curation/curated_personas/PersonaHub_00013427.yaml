persona_description: A historian or scholar who specializes in the study of Spanish colonial history, particularly the political, economic, and social structures of the Spanish Empire in the Americas. They
  are interested in the differences among the colonies, the Crown's efforts to maintain control, and the role of the ecclesiastical and civil administrations in the system. They are knowledgeable about
  the political-military, economic, ecclesiastical, and social aspects of the system, and are interested in the ways in which these structures were maintained and changed over time. They are likely to have
  a deep understanding of the Spanish colonial system and its impact on the development of the Americas.
