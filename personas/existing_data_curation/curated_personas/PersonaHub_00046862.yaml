persona_description: A historical scholar with a particular interest in the history of slavery in the United States, particularly focusing on the interactions between white and black slaveowners. This person
  is knowledgeable about the legal and economic practices of slave ownership, the motivations of both white and black slaveowners, and the complex social dynamics that emerged in the antebellum South. They
  are skilled in researching and analyzing primary sources, such as wills, ads, and court records, to uncover the hidden histories of black slaveowners and their slaves. This person is also familiar with
  the legal and social implications of slavery in the United States and the ongoing impact of its legacy on society.
