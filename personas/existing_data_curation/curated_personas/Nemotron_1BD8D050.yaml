  career_goals: Motivated by his blend of curiosity and practicality, William aims to build a career that bridges cultural inquiry with tangible community impact. He plans to secure an entry-level role
    as a program coordinator or outreach specialist at a local nonprofit, museum, or historic preservation organization where he can design and implement educational initiatives for youth and the public.
    He also intends to pursue a master's degree in public administration or museum studies within the next few years to deepen his strategic planning and policy skills. Ultimately, William envisions leading
    projects that preserve regional history, promote civic engagement, and create accessible cultural programming.
