personas:
  professional: Project management specialist Dunia Castro leverages fifteen years of PMP‑certified experience, Agile and Lean Six Sigma expertise, and bilingual fluency to drive multi‑million‑dollar manufacturing
    projects with meticulous scheduling, data‑driven risk mitigation, and a competitive edge that thrives on structured governance and stakeholder negotiation.
  sports: Active lifestyle advocate Dunia Castro mixes Zumba and folkloric dance with weekend hikes along the Huron River, supports the Detroit Lions and the Michigan Wolverines, and belongs to a community
    running club that meets every Saturday, balancing competitive sprint drills with group camaraderie.
  arts: Culturally engaged Dunia Castro frequents the Detroit Institute of Arts to study Frida Kahlo and Diego Rivera, enjoys the salsa rhythms of Celia Cruz in local dance workshops, and watches Broadway‑style
    productions such as 'Hamilton' and Mexican film classics during their monthly cultural exchange gatherings.
  travel: Strategic traveler Dunia Castro prefers meticulously planned itineraries, having explored Oaxaca's historic markets, trekked the dunes of Michigan's Sleeping Bear Dunes, and scheduled a future
    culinary tour of Barcelona, all while balancing travel costs against professional development funds.
  culinary: Passionate home chef Dunia Castro masterfully prepares mole poblano and tamales using Michigan's seasonal heirloom corn and fresh cherries, experiments with farm‑to‑table recipes, and often
    hosts potluck nights where guests critique the balance of spice and sweetness, while occasionally over‑seasoning in a quest for the perfect flavor.
  core: Dunia Castro blends disciplined project leadership with a vibrant social pulse, toggling spreadsheets and salsa steps, competitive yet collaborative, and never misses a deadline or a Zumba class,
    even if it means late‑night coffee and skipped brunches.
background:
  cultural: Dunia was born to Mexican immigrant parents who settled in Michigan where they opened a family‑owned grocery store. Growing up, she balanced Mexican home traditions—such as Día de los Muertos
    celebrations, family meals centered on corn‑based dishes, and storytelling of her hometown in Jalisco—with Midwestern values of hard work and community involvement. Her bilingual upbringing fostered
    an ability to navigate both Latino and broader American cultural contexts. Living in Utica, Macomb County, she remains tightly connected to the local Latino community, participating in cultural festivals
    and supporting outreach programs for recent immigrants. These experiences shape her pragmatic outlook, collaborative spirit, and pride in preserving her heritage while contributing to her region's economic
    growth.
attributes:
  skills: '[''Project Planning'', ''Budget Management'', ''Risk Management'', ''Agile/Scrum Methodologies'', ''Stakeholder Engagement'', ''Negotiation'', ''Conflict Resolution'', ''Bilingual Spanish-English
