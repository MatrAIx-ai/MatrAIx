  hobbies: '[''Zumba Classes'', ''Folkloric Mexican Dance'', ''Spanish Conversation Club'', ''Volunteering at Mexican Fiesta'', ''Cooking Traditional Mexican Cuisine'', ''Hiking on Huron River Trails'',
    ''Leadership Book Club'']'
  career_goals: Dunia aims to advance to a senior project manager role overseeing multi‑million‑dollar portfolios within the manufacturing sector of the Detroit metropolitan area. In the next five years
    she plans to earn a Lean Six Sigma Black Belt, lead a PMO transformation, and mentor emerging project leaders, especially women and Latinx professionals. Long‑term, she envisions launching her own consultancy
    that integrates structured project governance with culturally attuned team dynamics, helping mid‑size firms achieve efficient, high‑impact outcomes while promoting diversity and inclusion.
