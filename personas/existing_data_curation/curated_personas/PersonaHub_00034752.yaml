persona_description: A researcher and climatologist who specializes in the study of the terrestrial carbon cycle, particularly its response to climate variability and extreme events. They are particularly
  interested in the role of temperature and soil carbon in the carbon cycle and the need for integrated multi-data-model fusion approaches to improve our understanding and ability to predict effects of
  climate variability and extreme events on the terrestrial carbon cycle. They are likely to be familiar with recent studies on the impact of climate variability and extreme events on the terrestrial carbon
  cycle, including the use of experimental data to improve our understanding of the carbon cycle at different time scales and the need for parameterization of models under extreme conditions.
