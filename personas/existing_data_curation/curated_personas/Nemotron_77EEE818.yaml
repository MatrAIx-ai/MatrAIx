  career_goals: Although retired from active duty, Sang Kim aims to preserve the legacy of his EMS career by authoring a memoir that blends medical narratives with reflections on art and philosophy. He
    intends to establish an intergenerational mentorship program for young paramedics and volunteers, where he can teach both technical emergency skills and the importance of mindful presence during crises.
    Additionally, he hopes to organize a community art‑and‑health exhibition that showcases his abstract paintings inspired by the islands’ landscapes, fostering dialogue between the Hawaiian and Korean
    communities on health, resilience, and cultural identity.
