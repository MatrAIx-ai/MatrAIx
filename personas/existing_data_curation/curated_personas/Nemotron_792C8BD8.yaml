personas:
  professional: Manuel Aleman, a dedicated instructional support specialist, leverages their methodical organization and bilingual fluency to streamline lesson planning, integrate Google Classroom and Canvas
    tools, and foster inclusive classrooms while eyeing a transition to high‑school Spanish teaching and curriculum leadership.
  sports: Manuel Aleman plays forward for River Valley FC in the local adult soccer league, joins pickup basketball at the community center on Saturdays, and avidly follows the Cleveland Browns in the NFL
    and the Cincinnati Reds in MLB, they also volunteer as an assistant coach for the high‑school varsity soccer team.
  arts: Manuel Aleman strums acoustic guitar in a folk‑flamenco ensemble that covers Paco de Lucía, Juan Pablo Clemente, and Bob Dylan, they regularly attend performances at the Cuyahoga Community Theatre,
    and cite Lin‑Manuel Miranda’s lyrical storytelling as a creative spark for their own songwriting.
  travel: Manuel Aleman prefers weekend road trips that combine hiking and cultural immersion, having trekked the Ohio River Valley Trail, explored Asheville’s Blue Ridge Parkway, and scheduled a future
    visit to Seville for its historic music festivals, they balance travel costs with family obligations while planning each itinerary in detail.
  culinary: Manuel Aleman enjoys cooking intermediate‑level paella with saffron, chorizo, mussels, and peas, prepares tapas like patatas bravas and gambas al ajillo, they experiment with homemade gazpacho
    using ripe tomatoes and sherry vinegar, often pair meals with a glass of Rioja, though they occasionally over‑salt the rice when distracted.
  core: Manuel Aleman blends methodical organization with spontaneous community spirit, juggling lesson plans, soccer drills, and sizzling paellas, yet they habitually forget to water houseplants until
    a reminder alarm saves the day.
background:
  cultural: Manuel carries a strong Spanish heritage, having grown up with the traditions, language, and culinary customs of Spain, which he proudly shares with his American community. His bilingual fluency
    allows him to serve as a cultural bridge, supporting Spanish‑speaking students and families in East Liverpool. He celebrates Spanish holidays such as Semana Santa and Día de los Muertos while also partaking
    in Midwestern customs like county fairs, high‑school football tailgates, and local craftsmanship fairs. This blend of Mediterranean family values—emphasis on communal meals, close‑knit family ties,
    and respect for elders—with the neighborly, industrious spirit of Ohio shapes his identity and informs his collaborative, yet assertive, approach to work and community involvement.
attributes:
  skills: '[''Instructional support'', ''Lesson planning assistance'', ''Grading and assessment'', ''Educational technology (Google Classroom, Canvas)'', ''Bilingual communication (Spanish/English)'', ''Student
    tutoring and mentoring'', ''Classroom management'', ''Data tracking and reporting'', ''Event planning for school activities'', ''Community outreach'']'
  hobbies: '[''Soccer league'', ''Basketball pick‑up games'', ''Cooking Spanish cuisine'', ''Acoustic guitar playing'', ''Community folk music group'', ''Reading historical fiction'', ''Hiking in Ohio River
    Valley'', ''Tutoring at community center'', ''Organizing cultural festivals'']'
  career_goals: Manuel aims to earn a bachelor's degree in Education within the next three years, positioning himself for a full teaching certification. He aspires to transition from a teaching assistant
    to a high‑school teacher, preferably in Spanish language or social studies, where he can design culturally responsive curricula. He also envisions taking on a leadership role as a department coordinator
    or academic mentor, championing bilingual programs and integrating technology to enhance student engagement. Long‑term, he hopes to contribute to curriculum development at the district level and to
    mentor new educators, using his practical experience to bridge traditional methods with innovative practices.
