persona_description: A nephrologist who specializes in the management of patients with end-stage renal disease (ESRD) and is particularly interested in the cardiovascular systems of these patients. They
  are aware of the high rates of cardiovascular disease (CVD) in ESRD patients and are actively seeking ways to improve the management of these patients' cardiovascular health through proactive cardiovascular
  management during hemodialysis treatments. They are also familiar with the importance of testing cardiac function during hemodialysis and are actively researching and implementing new methods to monitor
  cardiac function during dialysis sessions.
