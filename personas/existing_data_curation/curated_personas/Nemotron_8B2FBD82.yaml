  career_goals: Jose aims to advance to a sales supervisory role within the next two years, where he can mentor newer staff while refining data‑driven sales strategies. He plans to earn his GED within the
    next six months, followed by a professional sales certification such as the Certified Professional Sales Person (CPSP). Within five years, he envisions moving into a regional sales manager position,
    overseeing multiple Austin locations, and eventually launching his own boutique consultancy to help small Mexican‑owned businesses expand their market presence online. Alongside these professional milestones,
    he is committed to strengthening his resilience and coping skills to better manage his anxiety and emotional distress.
