    ''Attending tech meetups'', ''Reading about AI and data science'', ''Playing bridge'']'
  career_goals: Looking ahead, Waleed aims to transition from day‑to‑day analysis work toward a senior advisory role where he can mentor the next generation of analysts and shape strategic technology roadmaps.
    He is pursuing TOGAF certification to formalize his enterprise‑architecture expertise and hopes to lead a digital‑transformation initiative for a mid‑size nonprofit or community organization in Northern
    Virginia. At the same time, he wants to carve out flexible consulting projects that let him balance professional contributions with family time and personal interests, gradually building a boutique
    consultancy focused on aligning business processes with pragmatic technology solutions.
