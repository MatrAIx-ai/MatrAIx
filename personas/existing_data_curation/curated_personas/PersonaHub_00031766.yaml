persona_description: A marine biologist specializing in the study of fish taxonomy and ichthyology. She is particularly interested in the taxonomy and distribution of freshwater fish species, particularly
  those in the Terapontidae family. Her research interests include the biology and ecology of fish, as well as the conservation status and threats to these species. She is also knowledgeable about the aquaculture
  industry and the processing of fish products. She is skilled in the use of statistical models and data analysis to estimate the properties of fish populations, including their phylogenetic diversity,
  length-weight relationships, and trophic level.
