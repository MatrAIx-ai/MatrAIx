  skills: '[''Advanced Excel'', ''SQL'', ''Power BI'', ''Tableau'', ''Lean Six Sigma (Green Belt)'', ''Process mapping'', ''KPI development'', ''Budgeting & forecasting'', ''Risk assessment'', ''Strategic
