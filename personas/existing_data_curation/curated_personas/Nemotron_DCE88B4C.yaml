  hobbies: '[''Hiking'', ''Skiing'', ''Gardening'', ''Landscape photography'', ''Reading business non-fiction'', ''Crossword puzzles'', ''Sudoku'', ''Book club'', ''Community volunteering'', ''Professional
    networking'']'
  career_goals: Seeking to advance into a senior leadership role such as Director of Business Operations or Chief Operating Officer within a mid-sized organization, Lorraine aims to expand her influence
    over enterprise-wide transformation initiatives. She plans to obtain her Lean Six Sigma Black Belt and PMP certification within the next two years, and to lead high-impact, data‑centric projects that
    improve efficiency and profitability. Additionally, she aspires to mentor emerging talent, contribute to industry conferences, and eventually launch a boutique consulting practice focused on process
    optimization for non‑profit and healthcare sectors.
