personas:
  professional: Keiosha Faircloth is a seasoned over‑the‑road freight driver with two decades of route‑optimization expertise, renowned for blending meticulous DOT compliance, hands‑on truck maintenance,
    and a sales‑savvy approach to client negotiations while mentoring newer drivers toward safety excellence.
  sports: Keiosha Faircloth supports the Jacksonville Jaguars with fervor, follows the Tampa Bay Rays during baseball season, and spends Sunday mornings playing casual softball with a local church league
    while keeping fit through morning fishing trips along the St. Johns River.
  arts: Keiosha Faircloth finds solace in classic R&B and jazz playlists featuring Nina Simone, Marvin Gaye, and Miles Davis while driving, occasionally joins the church choir to perform gospel standards
    like “Oh Happy Day,” and enjoys attending vintage automobile shows featuring classic Chevrolets.
  travel: Keiosha Faircloth prefers road‑trip adventures, charting routes on GPS to explore historic cities like Savannah and Charleston, while budgeting for occasional overnight stays at coastal inns in
    Amelia Island, yet dreams of a future cruise to the Caribbean for a fishing expedition.
  culinary: Keiosha Faircloth delights in preparing soul‑food staples such as collard greens simmered with smoked turkey, jambalaya brimming with Andouille sausage, and sweet‑potato pie topped with nutmeg,
    while cultivating a backyard garden of okra, Thai basil, and hot peppers to freshen each dish.
  core: Keiosha Faircloth balances a calm, resilient disposition with a pragmatic curiosity, steering a demanding trucking career while nurturing a love for southern cooking, classic tunes, and community
    service, all interwoven with occasional indulgences in vintage car shows and river fishing.
background:
  cultural: Keiosha identifies as African‑American with deep Southern roots. Her grandparents migrated from Georgia during the Great Migration and settled in rural Florida, building a close‑knit community
    centered around church, music, and family. Growing up in Palatka, she participated in Juneteenth celebrations, gospel choirs, and community cookouts that reinforced a strong sense of heritage. She carries
    forward traditions of storytelling, respect for elders, and communal solidarity, which shape her values at work and home. The blend of Southern culture, the coastal Florida lifestyle, and the resilience
    of her ancestors informs her calm demeanor and community‑oriented outlook.
attributes:
  skills: '[''Long‑haul and regional truck driving'', ''Route planning and logistics optimization'', ''Vehicle maintenance and basic mechanical troubleshooting'', ''DOT compliance and safety regulations'',
