    KeepTruckin, Samsara)'']'
  hobbies: '[''Backyard gardening'', ''Southern soul‑food cooking'', ''Church choir and community service'', ''Listening to classic R&B and jazz during drives'', ''Classic car shows'', ''Fishing on the
    St. Johns River'', ''Reading historical biographies'', ''Knitting'']'
  career_goals: Keiosha aims to leverage her extensive driving experience into a supervisory role within a transportation or logistics company, eventually becoming a regional operations manager. She plans
    to finish her associate degree in Business Administration, earn a Certified Transportation Manager (CTM) credential, and possibly start her own small fleet serving local businesses in Putnam County.
    Her long‑term ambition includes mentoring a new generation of drivers, advocating for healthier work‑life balance in the industry, and using her sales expertise to develop new client relationships that
    expand the company’s market share.
