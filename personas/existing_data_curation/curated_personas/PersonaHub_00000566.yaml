persona_description: A health care professional who is concerned about the spread of influenza and encourages vaccination to prevent severe flu illnesses in high-risk individuals. They are aware of the
  importance of getting a yearly flu vaccine and the different types of flu vaccines available, including the proportion of H3N2 viruses that are most common this year. They understand the importance of
  taking everyday preventive actions to stop the spread of germs and the benefits of antiviral drugs for treating and preventing serious flu complications. They are familiar with the symptoms of the flu,
  including fever, cough, sore throat, runny or stuffy nose, body aches, headache, chills, and fatigue, and the importance of seeking medical care if one develops flu-like symptoms.
