persona_description: A historian and anthropologist who specializes in the study of pre-Columbian and colonial Guatemalan dance traditions, particularly those associated with the Toritos and Conquest dances.
  They are knowledgeable about the history and cultural significance of these dances, and have a keen interest in the various roles and functions of the masks used in them. They have a deep understanding
  of the design and symbolism of the masks, and are skilled in identifying and analyzing the masks' historical and cultural contexts. They are also knowledgeable about the shared history between Guatemala
  and Mexico, and how this may have influenced the development of dance traditions in both countries. They have a particular interest in the Alvarado masks, and are skilled in identifying and analyzing
  their features and symbolism. They are also interested in the broader dance traditions of Guatemala and Mexico, and how they may be influenced by each other.
