personas:
  professional: Jean Hardy is an 11‑year‑old budding digital storyteller who blends hand‑drawn sketches, graphic novel enthusiasm, and Scratch coding into interactive narratives, applying their organized,
    curious mindset to school projects and community library performances.
  sports: Jean Hardy is a dynamic midfielder for the Orange County FC Kids soccer team, an enthusiastic supporter of the LA Galaxy and Los Angeles Dodgers, and spends weekends hiking the Santa Ana Mountains
    or playing beach volleyball at Huntington Beach, embodying a sociable, energetic approach to fitness.
  arts: Jean Hardy devotes free time to sketching nature scenes inspired by Ansel Adams, drawing comic panels influenced by Art Spiegelman and Hayao Miyazaki, and singing karaoke hits from Taylor Swift
    to BTS, letting their vibrant curiosity and talkative nature fuel both visual and performing arts.
  travel: Jean Hardy eagerly plans weekend road trips to Crystal Cove State Park for tide‑pool exploration, Saturday hikes up the Santa Ana Mountains, and summer getaways to Catalina Island’s snorkeling
    spots, while daydreaming about an immersive trip to Tokyo’s Akihabara district to hunt for anime merchandise.
  culinary: Jean Hardy enjoys whipping up simple meals like avocado toast topped with fresh basil and cherry tomatoes, baking chocolate chip cookies with generous butter, and crafting homemade Margherita
    pizza using mozzarella, crushed tomatoes, and oregano, often experimenting with new flavors during family cooking evenings.
  core: Jean Hardy is a curious, organized, and charismatic 11‑year‑old who blends artistic talent, digital storytelling, disciplined budgeting, and a love for community sports into a vibrant, resilient
    outlook on life.
background:
  cultural: Jean comes from a white, middle‑class family in Irvine, a suburban city in Orange County known for its diverse, internationally influenced community and strong focus on education. While her
    family’s cultural roots are European‑American, growing up in Irvine has exposed her to a mosaic of cultures through school celebrations, local festivals, and the multicultural neighborhood. Her family
    celebrates typical American holidays such as Thanksgiving, Fourth of July, and Halloween, and also embraces the region’s coastal lifestyle with beach trips and outdoor recreation. Access to high‑quality
    public schools, the nearby Orange County Museum of Art, and community programs has fostered her appreciation for both classic American values and the broader cultural richness of Southern California.
