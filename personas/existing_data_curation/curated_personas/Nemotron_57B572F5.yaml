  career_goals: Jean dreams of turning her love of art and technology into a career that lets her invent and inspire. She hopes to attend a specialized high‑school program in visual arts and computer science,
    then study interdisciplinary fields such as animation, game design, or interactive media at university. Ultimately, she aspires to become a creative director or multimedia artist who creates immersive
    experiences, or a museum curator who designs educational exhibitions that blend storytelling with digital interactivity. She also wants to give back to her community by mentoring younger students in
    art and coding clubs and perhaps leading a community arts space for creative learning.
