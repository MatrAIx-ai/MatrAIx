personas:
  professional: Charnell Shan, a budding graphic novelist and self-taught coder, merges their love of science-fiction world-building and historical detail into meticulously storyboarded web comics, leveraging
    Python-based interactive tools and a disciplined weekly schedule to meet their high standards for narrative and visual quality.
  sports: Charnell Shan, a disciplined yet low-key fitness enthusiast, follows the local pro baseball team, the Silverbrook Cyclones, and the NBA's Silverbrook Hawks, plays midfield for the Silverbrook
    Junior Soccer Club in the spring, swims laps with the Silverbrook Junior Swimming Club during summer, and maintains daily park walks to balance structured training with mental clarity.
  arts: Charnell Shan, an introspective teen artist, draws intricate character concepts inspired by Hayao Miyazaki's animation, composes piano pieces echoing Ludovico Einaudi's minimalist style, and devours
    speculative fiction by Neal Cooper, all of which shape their personal aesthetic and fuel weekend sketch-marathons.
  travel: Charnell Shan, a methodical teen traveler, prefers meticulously planned weekend getaways to places like the historic town of Oxford, the cherry-blossom-lined streets of Kyoto, and the rugged trails
    of New Zealand's South Island, balancing their school commitments with a love for both quiet museum tours and occasional hiking challenges.
  culinary: Charnell Shan, a precise young baker, enjoys perfecting chocolate chip cookies with exact gram measurements, experiments with homemade ramen broth that requires careful timing, and often adds
    fresh basil and lime to Thai green curry to satisfy their palate for balanced flavors.
  core: Charnell Shan, a disciplined 15-year-old with an obsessive love for orderly schedules, channels their quiet curiosity into detailed digital art, piano practice, and puzzle-solving, yet often trades
    late-night screen time for extra cookie-baking sessions.
background:
  cultural: Charnell is a Black teenager growing up in Plano, Texas, within a close‑knit African‑American family that places a high value on education and community service. She celebrates cultural milestones
    such as Juneteenth and participates in her church’s youth group, which emphasizes cooperation and helping others. Her family’s roots in the southern United States inform her appreciation for soulful
    music, including R&B and hip‑hop, and she enjoys sharing stories of Black heritage with her peers. This cultural grounding, combined with the supportive environment of her neighborhood, shapes her identity
    and aspirations.
