  hobbies: '[''Reading (science fiction, historical non‑fiction)'', ''Journaling'', ''Digital illustration (character design)'', ''Sudoku and logic puzzles'', ''Python coding challenges'', ''Piano practice'',
    ''Walking in local parks'', ''Baking (precision cooking)'']'
  career_goals: Charnell aspires to earn a scholarship to a top university and study civil engineering, where she can apply her love of structure and problem‑solving to design sustainable infrastructure.
    She envisions a future as a project manager leading multidisciplinary teams, ensuring projects stay on schedule and meet high standards. In the long term she hopes to mentor younger students in her
    community, helping them develop the same disciplined work ethic that has guided her.
