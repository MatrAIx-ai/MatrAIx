  career_goals: Loretta aims to advance within retail management, seeking a shift supervisor role within the next two years, and eventually a store manager position. She plans to obtain a GED and enroll
    in a community college business administration certificate to strengthen her leadership credentials. Simultaneously, she hopes to establish a modest side business selling homemade Vietnamese pastries
    and hand‑crafted items at local farmers’ markets, blending her culinary and crafting passions. Her long‑term ambition includes mentoring younger employees and serving as a cultural liaison for community
    events, fostering greater inclusion at her workplace and in the broader Nixa community.
