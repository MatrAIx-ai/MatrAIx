persona_description: A wastewater treatment engineer who specializes in the design and operation of primary sedimentation tanks. They have experience in designing and implementing efficient and effective
  primary sedimentation processes, and are skilled in monitoring and improving the day-to-day performance and operation of the sedimentation process. They have a deep understanding of the physical and performance
  criteria for primary sedimentation tanks, and are knowledgeable about the types of sedimentation tanks commonly used in wastewater treatment plants. They are also familiar with the design and operation
  of up flow tanks, and have experience in implementing efficient and effective primary sedimentation processes in small treatment plants.
