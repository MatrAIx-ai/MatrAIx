  hobbies: '[''Hiking'', ''Fishing'', ''Gardening'', ''Cooking Tex‑Mex and BBQ'', ''Reading science‑fiction'', ''Solving puzzles (crosswords, sudoku)'', ''Mentoring robotics club students'', ''Singing in
    community choir'']'
  career_goals: In the near term, Katherine aims to earn a Certified Lean Six Sigma Black Belt and spearhead a sustainability program that reduces waste by 15% at her plant. She also plans to enroll in
    a part‑time MBA focused on operations management to broaden her strategic perspective. Over the next five years, she envisions advancing to Plant Manager, overseeing multiple production lines and mentoring
    emerging supervisors. Long‑term, she dreams of launching a regional consulting firm that helps small manufacturers adopt lean practices, while also establishing a scholarship fund for local high‑school
    students pursuing STEM careers.
