personas:
  professional: Katherine Marin, a 37‑year‑old plant operations specialist, blends Six Sigma expertise with hands‑on CNC knowledge to lead continuous‑improvement projects that slash waste while keeping
    her team’s safety and morale top of mind, and they regularly mentor emerging supervisors.
  sports: Katherine Marin fuels her love for the outdoors by kayaking on Lake Sam Rayburn and joining the East Texas Anglers’ Club, while cheering on the Dallas Cowboys on Sundays and the Texas Rangers
    at the ballpark, and they fit in a casual weekend run with the local cross‑fit group.
  arts: Katherine Marin, a regular member of the town’s community choir, unwinds with the storytelling of Ursula K. Le Guin, while the playlists of Willie Nelson and Selena echo her kitchen as they cook,
    and occasional indie‑film nights at the local theater keep their creative spark alive.
  travel: Katherine Marin prefers road trips that blend scenic drives through Texas Hill Country with stops at Austin’s live‑music venues, has already explored Santa Fe’s art markets and the historic French
    Quarter, and they’re saving for a future robotics conference in Tokyo to mingle with fellow engineers.
  culinary: Katherine Marin’s culinary repertoire centers on smoky brisket rubs, spicy chicken fajitas seasoned with chipotle and cumin, and a garden‑fresh salsa that they whip up for family gatherings,
    though they admit to over‑salting the chili when experimenting with new recipes.
  core: Katherine Marin balances a data‑driven work ethic with a love for gardens, puzzles, and a habit of collecting mismatched socks that they claim bring good luck on the production floor.
background:
  cultural: Katherine grew up in a tight‑knit East Texas community where self‑reliance, hospitality, and a strong work ethic were everyday values. Her family’s roots trace back to generations of farm and
    industrial workers, fostering an appreciation for both rural traditions and modern technology. Raised in a modest, middle‑class household, she attended local schools that emphasized community service
    and practical learning. Although she identifies as white, she embraces the multicultural flavors of Texas cuisine and the region’s blend of Southern charm with progressive attitudes toward education
    and gender equity in the workplace. This background informs her balanced outlook—valuing both established customs and innovative ideas.
attributes:
  skills: '[''Production scheduling'', ''Lean manufacturing'', ''Six Sigma Green Belt'', ''Process optimization'', ''Data analysis with Excel and Python'', ''ERP system management (SAP, Oracle)'', ''CNC
