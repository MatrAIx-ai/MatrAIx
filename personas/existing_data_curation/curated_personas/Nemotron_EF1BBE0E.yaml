  career_goals: Veasna aims to advance from a senior software developer to a technical lead within the next three years, eventually moving into a software engineering manager role where he can shape product
    strategy and foster a supportive team culture. He is passionate about building tools that address challenges faced by immigrant communities, such as language‑learning platforms or financial‑inclusion
    apps. He plans to deepen his expertise in cloud architecture and AI/ML to lead innovative projects that leverage data for social impact. Concurrently, he wants to develop stronger people‑management
    skills, earn relevant certifications (AWS Solutions Architect, Certified Scrum Professional), and cultivate a work‑life balance that mitigates his stress sensitivity.
