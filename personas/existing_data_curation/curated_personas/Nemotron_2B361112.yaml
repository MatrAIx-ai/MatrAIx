  skills: '[''JavaScript'', ''Node.js'', ''React'', ''Angular'', ''TypeScript'', ''Python'', ''Django'', ''Flask'', ''Java'', ''Spring Boot'', ''Express'', ''AWS'', ''Azure'', ''Docker'', ''Kubernetes'',
    ''CI/CD (Jenkins, GitHub Actions)'', ''Test Automation (Jest, Selenium, pytest)'', ''Data Visualization (D3.js)'', ''UI/UX Design'', ''Agile (Scrum, Kanban)'', ''Mentoring'', ''Open‑source Contributions'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Watercolor painting'', ''Digital art'', ''Acoustic guitar'', ''Cooking'', ''Community volunteering (coding mentor)'', ''Board games'', ''Improv comedy'',
