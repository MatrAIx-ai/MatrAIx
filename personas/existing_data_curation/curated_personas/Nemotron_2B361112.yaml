  career_goals: Michael aims to transition into a technical leadership role where he can shape product strategy and foster an inclusive engineering culture. Over the next five years he plans to become an
    engineering manager or senior principal engineer, focusing on building tools that empower artists and creators, such as AI‑enhanced design platforms. He wants to expand his expertise in machine learning
    and interactive media while maintaining a hands‑on coding practice. Michael also dreams of launching a community‑based coding bootcamp in the Hudson Valley to mentor under‑represented youth and to contribute
    regularly to open‑source projects that improve software accessibility. Balancing career growth with personal wellbeing, he seeks remote‑friendly positions that allow him to stay engaged with local art
    events and outdoor activities.
