  career_goals: Approaching retirement, Tanya aims to transition into a senior supervisory role where she can leverage her experience to shape department policies and training programs. She seeks promotion
    to Fire Captain or Deputy Chief to lead a station, implement advanced fire prevention initiatives, and mentor younger firefighters. Additionally, she plans to acquire a Fire Investigation certification
    to assist with arson cases and to serve as a community safety consultant, helping local businesses and schools develop robust emergency preparedness plans.
