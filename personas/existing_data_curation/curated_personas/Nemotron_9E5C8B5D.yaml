  hobbies: '[''Digital art and pixel illustration'', ''Music production (home studio)'', ''Reading science‑fiction novels'', ''Watching independent films'', ''Micro‑controller tinkering (Arduino, Raspberry
    Pi)'', ''Indie game developer meet‑ups'', ''Visiting art galleries'', ''Tabletop gaming with friends'', ''Playing guitar'', ''Cycling along lake trails'', ''Volunteering at community library tech help
    desk'']'
  career_goals: David aims to earn an associate degree in Computer Science within the next two years, then transfer to a four‑year university to complete a bachelor’s in Interactive Media or Human‑Computer
    Interaction. He aspires to become a front‑end developer who can bridge code and visual design, eventually taking on a lead UI/UX role or founding a small studio that creates immersive digital art experiences.
    He also seeks a stable full‑time position that offers a supportive, low‑stress environment and a clear path for growth, while continuing to deepen his technical expertise in AI‑driven design tools.
