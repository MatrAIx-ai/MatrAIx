personas:
  professional: Hilton Maddox, a 44‑year‑old education specialist, designs inclusive, arts‑infused curricula that seamlessly blend technology, community‑engaged projects, and interdisciplinary research,
    leveraging their curious mind, collaborative spirit, and a balanced blend of organization and flexibility to bridge theory and practice.
  sports: Hilton Maddox, a 44‑year‑old community mentor, stays active by playing in a local basketball league that channels the energy of the Cleveland Cavaliers, cheering for the Browns on weekends, trekking
    the Cuyahoga Valley trails each fall, and supplementing these activities with yoga sessions and occasional runs, all while keeping a flexible yet consistent fitness schedule.
  arts: Hilton Maddox, an avid participant in Cleveland’s cultural scene, regularly visits the Cleveland Museum of Art, immerses themselves in live performances of John Coltrane and Kamasi Washington, collaborates
    with spoken‑word poet Sonia Sanchez, and draws inspiration from Rhiannon Giddens for their own saxophone improvisations, weaving these artistic experiences into both personal growth and professional
    practice.
  travel: Hilton Maddox, a 44‑year‑old educator, plans travel with a blend of structured itineraries and spontaneous detours, favoring immersive journeys to Ghana’s Cape Coast, Senegal’s Dakar, and Brazil’s
    Salvador to explore African‑Diaspora cultures, while also scheduling weekend escapes to New Orleans for jazz festivals and local culinary tours, balancing cultural curiosity with a modest travel budget.
  culinary: Hilton Maddox, a 44‑year‑old home chef, expertly prepares soul‑food staples such as smoked collard greens with ham hocks, crisp fried chicken seasoned with paprika and cayenne, sweet‑potato
    pie spiced with nutmeg, and buttery cornbread, often pairing these plates with hot sauce made from locally sourced peppers and seasonal vegetables from the Cuyahoga Valley farmers’ market.
  core: Hilton Maddox, a 44‑year‑old education visionary, fuses relentless curiosity, community‑focused mentorship, and a love for late‑night saxophone jams into a life marked by scholarly ambition, spontaneous
    coffee‑stained brainstorming sessions, and a habit of juggling too many projects at once.
background:
  cultural: Hilton identifies as African‑American and grew up in Cleveland’s historically Black neighborhoods, where church, music, and community activism shaped his worldview. He draws inspiration from
    the rich legacy of Black art, literature, and the civil‑rights movement in the Midwest. Active in local Juneteenth celebrations and Black History Month events, he incorporates storytelling traditions
    and Afro‑centric perspectives into his teaching. His cultural heritage informs his commitment to equity, fostering inclusive classrooms, and championing representation for Black students and faculty
    within higher education.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Pedagogical Innovation'', ''Multicultural Classroom Management'', ''Public Speaking'', ''Academic Advising'', ''Research Methodology'',
