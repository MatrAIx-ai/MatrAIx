  hobbies: '[''Visiting art museums'', ''Playing saxophone in a community band'', ''Street photography'', ''Reading contemporary fiction'', ''Cooking soul‑food recipes'', ''Hiking in Cuyahoga Valley National
    Park'', ''Mentoring youth through after‑school programs'', ''Playing basketball'', ''Traveling for cultural immersion'', ''Attending jazz and spoken‑word events'']'
  career_goals: Hilton aims to earn a doctorate in Education to deepen his expertise in culturally responsive pedagogy. He envisions creating a flagship interdisciplinary program that weaves arts, social
    justice, and teacher preparation, positioning it as a model for other institutions. Over the next five years, he hopes to become department chair, publish scholarly articles on inclusive curriculum
    design, and expand community partnership initiatives that bring local artists and underserved learners together. Ultimately, he aspires to influence state education policy to embed equity‑focused practices
    across postsecondary institutions.
