persona_description: A health and wellness coach who specializes in the management of gastrointestinal conditions such as acid reflux and GERD. They have a strong understanding of the physiological mechanisms
  behind these conditions and have successfully helped their clients improve their health through a combination of dietary and lifestyle changes, as well as the use of medication and supplements. They are
  knowledgeable about the risks and potential long-term consequences of long-term use of proton pump inhibitors (PPIs), and encourage their clients to work with their healthcare provider to address other
  potential causes of chronic GERD.
