personas:
  professional: Kelly Gilley is a seasoned business author and strategic communications consultant who applies a disciplined writing craft, rigorous market research, and tight project management to produce
    clear, actionable guides, while their competitive, critical eye and sociable leadership style drive successful workshops and community outreach.
  sports: Kelly Gilley channels energetic, outgoing energy into weekend coastal kayaking with the Ormond Beach Paddle Club, occasional sailing outings with the local sailing association, and regular yoga
    sessions, while cheering on the Orlando Magic in the NBA and supporting the Orlando City SC soccer team, and they consider these pursuits vital for maintaining balance.
  arts: Kelly Gilley nurtures a love for literature and storytelling through active participation in a city book club that reads Jane Austen and Pat Conroy, leads a writing workshop inspired by Stephen King’s
    narrative techniques, and enjoys performances at the Ormond Beach Playhouse featuring productions starring Viola Davis, and they often reference these artistic experiences in their business guides.
  travel: Kelly Gilley favors meticulously planned short getaways to coastal gems such as Key West, Savannah, and St. Augustine, balancing historic walking tours, sunset kayaking, and visits to local vineyards,
    while budget constraints and family commitments shape their preference for domestic travel over long‑haul trips, and they constantly update a detailed travel spreadsheet to stay organized.
  culinary: Kelly Gilley delights in cooking regional dishes like blackened grouper, key lime pie, and Cuban sandwiches, experimenting with fresh herbs such as cilantro and orange‑blossom honey, while their
    intermediate cooking skills see them hosting monthly dinner parties that pair shrimp and grits with a chilled rosé, and they often document recipes in a personal blog.
  core: Kelly Gilley’s pragmatic, competitive spirit drives a meticulously organized life of writing, kayaking, and community engagement, punctuated by a constant undercurrent of worry that they soothe
    with yoga and a habit of over‑planning both work and leisure.
background:
  cultural: Kelly is a white American who grew up in the Southeast, absorbing the region's blend of self‑reliance and community spirit. Settling in Ormond Beach, she embraces the laid‑back coastal lifestyle
    while maintaining a pragmatic, business‑oriented mindset shaped by her bachelor’s degree. Her cultural identity reflects Southern hospitality, a respect for tradition, and an active participation in
    the Suncoast’s literary and civic circles. She values personal responsibility and often draws on local history and coastal environment as inspiration for her writing.
