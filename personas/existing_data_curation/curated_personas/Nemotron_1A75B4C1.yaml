  career_goals: Kelly aims to publish a three‑volume series of practical business guides that blend case studies with step‑by‑step frameworks, positioning herself as a go‑to author for small‑business owners
    in Florida and beyond. She plans to launch a monthly column in the local newspaper to share actionable advice, and to secure a regional writing award for nonfiction. Over the next five years, she hopes
    to expand her brand into a consulting practice, offering writing and strategic communication services to entrepreneurs and to run quarterly writing workshops at the Flagler County library. Her competitive
    drive fuels a desire to beat fellow authors in readership metrics and to become a recognized speaker at business conferences.
