  career_goals: Samuel aims to enroll in a community college to pursue an associate degree in Business Administration with a focus on project management. He aspires to secure an entry‑level position in
    logistics or event planning where he can apply his organizational strengths and enjoy collaborative, team‑oriented environments. In the long term, he envisions advancing to a project manager role within
    a nonprofit organization that supports youth development, blending his desire for structured work with his commitment to helping others. He also keeps the option open to join the Army Reserves to gain
    additional leadership training and benefit from a structured career path.
