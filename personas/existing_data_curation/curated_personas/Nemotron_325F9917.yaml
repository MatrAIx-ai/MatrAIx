  hobbies: '[''Basketball'', ''Soccer'', ''Playing guitar'', ''Jam sessions'', ''Volunteering at community center'', ''Organizing game nights'', ''Tutoring'', ''Hiking'', ''Cooking Southern cuisine'', ''Cooperative
