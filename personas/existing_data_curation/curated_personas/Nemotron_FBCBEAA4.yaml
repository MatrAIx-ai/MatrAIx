  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Reading non-fiction (economics, history, business)'', ''Woodworking'', ''Cycling (Sacramento River trails)'', ''Bowling league'', ''Home brewing'', ''Volunteer
    supply management for food banks'']'
  career_goals: Charles aims to advance to a senior leadership role such as Procurement Director or Chief Procurement Officer within the next five years, overseeing enterprise‑wide sourcing strategies and
    driving measurable cost savings. He intends to earn professional certifications (CPSM, CIPS) and pursue executive education to broaden his strategic capabilities. He is also interested in integrating
    sustainable sourcing practices and leveraging data analytics to enhance decision‑making. Ultimately, he envisions establishing his own procurement consulting practice to advise mid‑sized companies on
    cost optimization and supply chain resilience.
