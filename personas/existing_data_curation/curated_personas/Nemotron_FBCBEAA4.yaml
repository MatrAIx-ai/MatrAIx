personas:
  professional: A procurement veteran with deep expertise in strategic sourcing, SAP/Oracle, and data-driven cost optimization, Charles Hearn leverages his methodical, competitive nature to lead cross-functional
    teams toward measurable savings while championing sustainable sourcing initiatives.
  sports: A dedicated cyclist on the Sacramento River Trails and member of the Sac River Cyclists club, a regular bowler in the Riverfront Bowling League, and a lifelong fan of the Sacramento Kings and
    River Cats, Charles Hearn schedules weekly rides, weekend league matches, and never misses a home game when the Kings take the court.
  arts: A connoisseur of classical piano and modern jazz, Charles Hearn often streams Yo‑Yo Ma’s cello suites and John Coltrane’s ‘A Love Supreme’, attends performances at the Crest Theatre, and collects
    original Norman Rockwell prints, a habit that balances his analytical mindset with creative appreciation.
  travel: Preferring meticulously planned itineraries organized in spreadsheets, Charles Hearn enjoys weekend getaways to Napa Valley’s vineyards and Lake Tahoe’s alpine trails, has trekked the Canadian
    Rockies near Vancouver, and dreams of cycling the historic Shimanami Kaidō in Japan and exploring the fjords of Norway.
  culinary: An intermediate home‑brewer and confident grill master, Charles Hearn crafts a seasonal 'Riverbank Saison' using Pilsner malt and Cascade hops while perfecting rosemary‑infused roasted chicken
    and a bowl of classic clam chowder, often pairing each meal with his own amber ale.
  core: Charles Hearn blends analytical precision with a competitive streak, turning everyday tasks—from procurement negotiations to home‑brewing recipes—into methodical challenges, even if a spreadsheet‑obsessed
    planner sometimes forgets to unwind.
background:
  cultural: Charles was raised in a middle‑class suburban environment in Sacramento’s Central Valley, absorbing mainstream American (white Anglo‑Saxon) values that emphasize hard work, self‑reliance, and
    a respect for order and predictability. The region’s agricultural heritage and growing tech‑driven business climate have shaped his pragmatic outlook, while local community and outdoor recreation cultures
    have fostered his appreciation for structured, sustainable solutions.
attributes:
  skills: '[''Strategic sourcing'', ''Vendor negotiation'', ''Contract management'', ''Cost analysis and reduction'', ''Inventory management'', ''Supply chain risk assessment'', ''ERP systems (SAP, Oracle)'',
