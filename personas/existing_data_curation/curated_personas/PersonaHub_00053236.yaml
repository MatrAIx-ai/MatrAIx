persona_description: Policarpo de Balzola was a prominent Spanish engineer and inventor who lived during the 19th century. He was born in Irún, Basque Country, Spain, and worked as a military engineer,
  surveyor, and notary in various positions. He is known for his contributions to the establishment of the metric system in the Basque Country and Spain, as well as his invention of a mechanical perpetual
  calendar and measuring device for surfaces. Balzola was a controversial figure, but also had a sense of humor, good dancing skills, and a passion for learning and community service. He died in 1879 at
  the age of 66.
