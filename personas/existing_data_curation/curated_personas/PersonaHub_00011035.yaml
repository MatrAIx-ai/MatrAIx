persona_description: A researcher and policy analyst who specializes in the analysis of critical raw materials and their role in the energy transition. They have a deep understanding of the challenges and
  opportunities presented by domestic cobalt mining in the European Union, and are actively involved in advocating for the development and expansion of domestic cobalt mining as a means of achieving energy
  justice and strategic autonomy in the energy transition. They are well-versed in the geopolitical, economic, and environmental implications of cobalt mining and are committed to finding solutions that
  promote sustainability and reduce the negative impacts on local communities.
