persona_description: A molecular biologist or evolutionary biologist who is interested in the origin and evolution of photosynthesis, particularly in the context of bacterial photosynthesis. They are likely
  to have expertise in the analysis of molecular phylogenies using conserved molecules such as 16S ribosomal RNA, and have a particular interest in the evolution of photosynthetic pigment synthesis genes.
  They may also be interested in the role of horizontal gene transfer in bacterial evolution and the implications of their findings for the understanding of bacterial evolution.
