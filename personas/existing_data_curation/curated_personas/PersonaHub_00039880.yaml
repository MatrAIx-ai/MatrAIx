persona_description: A historian who specializes in the study of the Linear B script and its use in the records of the Greek Bronze Age. The individual is knowledgeable about the pre-alphabetic version
  of Greek called Linear B, the Linear B tablets, and the use of wax tablets by sea traders and schoolboys. They are also interested in the use of clay tablets for day-to-day office accounts and the importance
  of secure trade routes in the Bronze Age. The individual has a deep understanding of the importance of the Linear B script in understanding the everyday life of the Greeks during the Bronze Age and has
  a keen interest in the debate between dendrochronologists and traditional archaeologists regarding the chronology of the Bronze Age in Greece.
