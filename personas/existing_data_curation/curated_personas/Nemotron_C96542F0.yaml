personas:
  professional: Neil Mullins is a part‑time heritage consultant and freelance editor who translates his analytical research skills and love of local history into clear community newsletters, museum docent
    tours, and handcrafted wooden memorabilia, all while maintaining a relaxed, low‑pressure schedule that respects their preference for solitary work.
  sports: Neil Mullins is a devoted fan of the Kansas City Chiefs and Royals, regularly watches games with a small group of longtime friends, and stays active by walking the trails of Oak Grove Park as
    a member of the Lee’s Summit Nature Walkers club, preferring low‑impact activity over competitive sports.
  arts: Neil Mullins immerses themselves in the arts through a weekly book club that discusses literary classics like Steinbeck’s *East of Eden*, savors folk recordings from Bob Dylan and Joan Baez while
    working on vintage furniture restoration, and occasionally attends performances at the local Community Theater featuring productions of Tennessee Williams, reflecting a quiet yet deep appreciation for
    cultural storytelling.
  travel: Neil Mullins enjoys low‑key road trips that explore the historic sites of St. Louis’s Gateway Arch and the Civil War battlefields of Gettysburg, while dreaming of a genealogical pilgrimage to
    the Scottish Highlands to trace family roots, balancing a modest travel budget with a love for reflective, off‑the‑beaten‑path experiences.
  culinary: Neil Mullins, an adept home cook, delights in preparing garden‑fresh heirloom tomato salads with basil vinaigrette, hearty chicken pot pie seasoned with rosemary, and slow‑smoked Kansas City–style
    ribs, often pairing meals with locally brewed craft beer and using fresh carrots, squash, and corn from their vegetable beds.
  core: Neil Mullins blends relentless curiosity with a laid‑back, sometimes disorganized lifestyle, finding solace in solitary research and woodworking while wrestling with chronic worry that fuels both
    meticulous record‑keeping and occasional procrastination.
background:
  cultural: Neil grew up in the greater Kansas City area, a predominantly white, middle‑class Midwestern environment, and has spent most of his adult life in Lee’s Summit, Missouri. His upbringing reflects
    the region’s Protestant work ethic, modesty, and strong emphasis on community involvement. He was raised with traditional American values—self‑reliance, respect for authority, and a pragmatic approach
    to problem‑solving—while his arts and humanities education exposed him to broader cultural perspectives. These influences combine into a cultural identity rooted in Midwestern hospitality, appreciation
    for local history, and a quiet, self‑reflective worldview.
attributes:
  skills: '["Historical research", "Genealogy research", "Writing and editing", "Public speaking", "Community outreach and event coordination", "Basic carpentry", "Home maintenance and DIY repairs", "Gardening
