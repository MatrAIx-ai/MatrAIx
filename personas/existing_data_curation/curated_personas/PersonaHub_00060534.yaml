persona_description: Christopher P. Austin, M.D., is a Director of the NIH Chemical Genomics Center (NCGC) and Senior Advisor for Translational Research, Office of the Director. He is known for his research
  on the development of reagents and technologies to translate genome sequence into functional insights. His work involves the use of small-molecule chemistry and informatics to elucidate gene function,
  and he aims to accelerate the identification of genes through the Human Genome Project. His expertise lies in the field of molecular biology, particularly in the study of chromosomal abnormalities and
  the use of spectral karyotyping to detect them.
