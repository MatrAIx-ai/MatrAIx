  career_goals: She aspires to combine her love of art and caring nature into a career that benefits the community. Brenda dreams of becoming a museum curator or an environmental artist who creates works
    that raise awareness about nature. She also envisions working as a youth mentor or community outreach coordinator, helping other children develop confidence and harmony through creative projects.
