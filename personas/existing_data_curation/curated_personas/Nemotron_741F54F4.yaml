personas:
  professional: Julianne Foust is a veteran secondary-school teacher who blends data-driven instruction with a heartfelt commitment to social-emotional learning, using technology to craft interdisciplinary
    units while they mentor novice teachers and steer curriculum committees toward inclusive practices.
  sports: Julianne Foust follows the Dallas Cowboys for football weekends and the Houston Astros for baseball, while they participate in the Austin Trail Runners club for weekend hikes and occasional 5K
    races that let them stay active without the pressure of team sports.
  arts: Julianne Foust immerses themselves in the lyrical storytelling of Gillian Welch on the acoustic guitar, curls up with novels by Celeste Ng and historical works by Doris Kearns Goodwin, and enjoys
    theater productions starring Denzel Washington and Meryl Streep, while their calligraphy hobby draws inspiration from the graceful scripts of Japanese master Shirakawa Shun.
  travel: Julianne Foust prefers purposeful travel, often planning weekend getaways to the Texas Hill Country’s lavender fields in Fredericksburg, extended road trips along historic Route 66 to Santa Fe,
    and dreaming of a future study tour of the historic libraries of Oxford and Cambridge in England.
  culinary: Julianne Foust adores experimenting in the kitchen, frequently perfecting Texas-style brisket tacos with smoked paprika, cilantro, and pickled onions, as well as hearty chicken-and-dumplings
    soup and baking sourdough loaves that feature locally milled rye flour and a dash of honey.
  core: Julianne Foust balances a teacher’s meticulous planning with spontaneous garden wanderings, often losing track of time leaf-raking while still keeping a spreadsheet of every book they read, a habit
    that occasionally leads to late nights grading at the kitchen table.
background:
  cultural: Julianne was raised in a middle‑class suburban community in Central Texas, where values of Southern hospitality, community involvement, and self‑reliance were emphasized. Her family’s European
    ancestry—primarily German and Irish—has contributed to a cultural tapestry that includes traditional holiday celebrations and an appreciation for local history. Active in her local church and community
    service projects, Julianne reflects the collaborative and compassionate ethos of her upbringing. Living in Round Rock, she embraces the blend of Texan pride and the growing cultural diversity of her
    student body, striving to create an inclusive classroom that honors both her own heritage and the varied backgrounds of her learners.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Formative and Summative Assessment Design'', ''Student Counseling
    and Mentoring'', ''Parent-Teacher Communication'', ''Conflict Resolution'', ''Collaborative Team Teaching'', ''Project-Based Learning Facilitation'', ''Data-Driven Instruction'', ''First Aid and Emergency
    Response'', ''Time Management'', ''Organizational Planning'']'
  hobbies: '[''Reading (fiction & historical non-fiction)'', ''Gardening (native Texas plants)'', ''Hiking'', ''Cooking (exploring new recipes)'', ''Volunteering at community center'', ''Small-group book
    club'', ''Knitting and crocheting'', ''Calligraphy'', ''Acoustic guitar'', ''Yoga'', ''Journaling'']'
  career_goals: Julianne aims to deepen her impact on education by pursuing a master's degree in Educational Leadership and eventually stepping into a department head or curriculum specialist role within
    her district. She is driven to champion social‑emotional learning initiatives that blend innovative practices with evidence‑based strategies, creating a harmonious and supportive school culture. Over
    the next five years, she hopes to mentor new teachers, lead interdisciplinary program development, and influence district policy to promote inclusive, student‑centered instruction while maintaining
    a balanced work‑life rhythm for her family.
