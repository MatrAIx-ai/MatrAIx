personas:
  professional: Jessica Curbelo, a veteran middle‑school history teacher with three decades of classroom experience, leverages meticulous lesson planning, data‑driven assessment, and interdisciplinary project
    design to mentor colleagues while eyeing a curriculum coordinator position, embodying their blend of curiosity and practicality.
  sports: Jessica Curbelo fuels their love of the outdoors by leading weekly hikes with the Riverside Hiking Club through the Santa Rosa and San Jacinto Mountains, and they also cheer on the Los Angeles
    Dodgers and the Los Angeles Lakers, while joining a seasonal community volleyball league in the spring, all while keeping a pragmatic eye on their step count.
  arts: Jessica Curbelo channels their creative side through watercolor landscapes inspired by Georgia O'Keeffe, they curate after‑school arts workshops featuring Frida Kahlo’s storytelling techniques,
    and unwind listening to Bob Dylan’s folk ballads, integrating these influences into their interdisciplinary classroom units.
  travel: Jessica Curbelo prefers purposeful travel that blends adventure and learning, having trekked the Grand Canyon’s South Rim and explored the historic streets of Seville, they dream of a guided tour
    of Patagonia’s glaciers and a cultural immersion in Kyoto, though their retirement planning sometimes limits spontaneous trips.
  culinary: Jessica Curbelo delights in preparing family heirloom meals like chicken mole with ancho chilies, slow‑cooked pork carnitas, and roasted heirloom tomatoes seasoned with rosemary, they often
    incorporate succulent nopales and seasonal vegetables from their garden, and judge each dish by the authenticity of flavors rather than presentation.
  core: Jessica Curbelo is a methodical educator‑turned‑leader whose love of history, hiking, and watercolor painting fuels a data‑driven, competitive spirit that balances disciplined routine with occasional,
    well‑earned indulgences, and they consistently apply their meticulous mindset to both professional and personal pursuits.
background:
  cultural: Jessica grew up in a middle‑class family in the Inland Empire region of Southern California, part of a generation of white Americans with deep roots in the area’s post‑World War II suburban
    expansion. Her family emphasized education, community involvement, and self‑reliance. Living in Riverside County’s diverse environment has broadened her cultural perspective, prompting her to incorporate
    multicultural content and inclusive practices into her classroom. She values the blend of traditional American values and the progressive, multicultural ethos of her community.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Data-Driven Assessment'', ''Educational Technology Integration'', ''Literacy Instruction'', ''Interdisciplinary
