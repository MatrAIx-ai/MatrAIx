  hobbies: '[''Reading historical novels'', ''Hiking'', ''Gardening'', ''Book club participation'', ''Volunteering at community center arts workshops'', ''Cooking family meals'', ''Journaling'', ''Watercolor
    painting'']'
  career_goals: Jessica aims to transition into a leadership role within her district, such as Curriculum Coordinator or Instructional Coach, where she can influence school‑wide instructional practices.
    She plans to pursue a Master’s in Educational Leadership to deepen her expertise and to qualify for administrative positions, ultimately aspiring to become a principal or district specialist. She also
    seeks to publish a portfolio of interdisciplinary unit plans, secure grants for project‑based learning initiatives, and earn recognition such as the Riverside County Teacher of the Year award. Mentoring
    new teachers and championing data‑informed instruction remain central to her ambition.
