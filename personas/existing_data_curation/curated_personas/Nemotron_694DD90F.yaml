  career_goals: Approaching retirement, David aims to transition from full‑time production work to a mentorship and consulting role where he can share his decades of machining knowledge with younger workers
    and local hobbyists. He hopes to establish a part‑time partnership with the community college’s technical program or a local maker space, offering hands‑on workshops and safety training. At the same
    time, he wants to reduce workplace stress by focusing on projects that allow a more relaxed schedule, preserving his health and enabling him to spend more time with his family and volunteer activities.
