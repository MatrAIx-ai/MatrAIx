  hobbies: '[''building LEGO'', ''puzzle solving'', ''matching games'', ''reading picture books'', ''preschool art class'', ''dancing to Korean children\''s songs'', ''Mandarin storytime'', ''organized
    playground games'', ''helping with cooking'']'
  career_goals: Jiyoung often talks about wanting to become a teacher or a scientist when she grows up. She imagines leading a classroom where she can organize learning activities and follow a clear schedule,
    or conducting experiments in a lab with step‑by‑step procedures. She also dreams of being a veterinarian because she loves caring for animals in a systematic way. Her competitive streak fuels a desire
    to be the best in her future career, aiming for top grades and recognition.
