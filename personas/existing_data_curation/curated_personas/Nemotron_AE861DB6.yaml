personas:
  professional: Jiyoung Wu, the line‑leader and unofficial schedule keeper in their kindergarten, uses a love of routine and practical habits to keep the class orderly while flexibly adjusting when a surprise
    storytime is introduced, and their competitive streak ensures they are first on the line each morning.
  sports: Jiyoung Wu, a member of the Little Tigers Soccer Club, spends weekends practicing dribbling and scoring goals, cheerfully watches the local professional baseball team, the River City Eagles, and
    also enjoys swing sets and the balance beam at the neighborhood park, balancing a love for structured team sports with spontaneous playground games.
  arts: Jiyoung Wu delights in drawing cartoon characters with vibrant crayons, idolizes the children’s music artist Raffi and Disney’s Frozen soundtrack singer Idina Menzel, and regularly watches the animated
    series "Bluey" for inspiration, often reenacting scenes with their stuffed animals as a personal theater performance.
  travel: Jiyoung Wu's travel style is a carefully planned day trip to Grandma's countryside farm, following a familiar routine of feeding goats and picking berries, but they also dream of a magical vacation
    to Disney World in Florida and a family outing to the historic Great Wall of China, balancing a love for predictable schedules with the excitement of new landmarks.
  culinary: Jiyoung Wu prefers comfort foods like cheesy mac & cheese, chicken nuggets with honey‑mustard dip, and strawberry‑banana smoothies, can independently stir batter for pancakes using a tiny whisk,
    and loves the crunchy texture of fresh cucumber slices, often requesting extra carrots on their plate for their bright orange color.
  core: Jiyoung Wu is a five‑year‑old line‑leader who thrives on routine, saves pennies in a color‑coded piggy bank, tackles mild allergies with careful medication, scores goals with the Little Tigers,
    and fills spare time drawing and dreaming of Disney adventures, all while occasionally skipping bedtime to finish a puzzle.
background:
  cultural: Jiyoung comes from an East Asian (Chinese) family living in Lawrenceville, GA. Her parents maintain cultural traditions such as celebrating Lunar New Year, speaking Mandarin at home, and preparing
    traditional dishes like dumplings. She attends a local preschool that offers bilingual exposure and participates in community events at the Gwinnett Asian Cultural Center. The family values education,
    respect for elders, and community involvement, which shape her routine‑focused upbringing and appreciation for order and practicality.
