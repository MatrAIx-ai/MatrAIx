  hobbies: '[''visiting art galleries'', ''watercolor painting'', ''pottery'', ''chess and puzzle games'', ''Mexican folk dancing'', ''journaling'', ''mindfulness meditation'', ''cooking Mexican cuisine'',
    ''balcony gardening'', ''community support groups'']'
  career_goals: Lorena aims to move into a supervisory or safety trainer position within the warehouse sector, seeking certifications such as Certified Forklift Operator and OSHA Trainer. She also dreams
    of creating a community art space that showcases Mexican folk art and offers workshops for workers, merging her labor background with her artistic interests. To support these ambitions, she plans to
    complete her GED, take night courses in business management, and eventually open a small shop selling handcrafted Mexican textiles and upcycled artwork, while securing a stable income to invest in mental‑health
    resources and her independent lifestyle.
