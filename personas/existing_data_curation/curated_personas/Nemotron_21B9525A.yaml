personas:
  professional: Leanne Rauch, a one‑year‑old who runs the household schedule like a tiny operations manager, displays a keen eye for structure in nap and feeding intervals, a talent for persuasive babbling
    that captures attention, and a competitive streak when vying for the best toys, and they claim the unofficial title of CEO of early childhood routine.
  sports: Leanne Rauch, a one‑year‑old who attends the 'Tot Tots' baby swimming program at the community pool, enjoys crawling races in the local playgroup, idolizes the Chicago Cubs on game day, and they
    often wave a tiny flag during family viewing sessions.
  arts: Leanne Rauch, a one‑year‑old who delights in rhythmic nursery rhymes like “Baby Shark”, claps along to Mozart’s piano sonatas during bedtime, shows a budding preference for bright, animated shows
    starring characters like Moana, and they turn their expressive babbling into impromptu performances that captivate anyone within earshot.
  travel: Leanne Rauch, a one‑year‑old who has already explored the bright chaos of Disneyland in Anaheim and the calming sand of the Florida Gulf Coast with their family, prefers meticulously planned stroller
    routes and reliably scheduled nap breaks, and they occasionally rebel with a fussy cry when itineraries change unexpectedly.
  culinary: Leanne Rauch, a one‑year‑old with a discerning palate that favors apple‑cinnamon and carrot‑sweet potato purees while consistently rejecting peas, enjoys smearing mashed banana on their high‑chair
    tray as a self‑served snack, and they demonstrate a developing feed‑time routine that balances predictable meals with occasional spontaneous food‑fight bouts.
  core: Leanne Rauch, a one‑year‑old with a love for structured routines, a talkative zest for being the center of attention, a surprisingly competitive side that turns even playtime into a high‑stakes
    contest, and they often worry about minor disruptions, expressing stress through frequent fussiness.
