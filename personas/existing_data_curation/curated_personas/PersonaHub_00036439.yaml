persona_description: A literary critic who specializes in analyzing and evaluating literary works, with a focus on historical and textual criticism. They are experienced in the analysis of texts for their
  authenticity, content, and style, and are skilled in the investigation of the origin and dating of literary documents. They have a deep understanding of the methods of studying texts for these purposes
  and are knowledgeable in the various fields of criticism, including historical, literary, and textual criticism. They are also skilled in the investigation of the text, origin, etc., of literary documents,
  particularly in the study of Biblical ones.
