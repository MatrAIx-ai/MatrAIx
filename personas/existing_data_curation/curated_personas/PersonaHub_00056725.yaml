persona_description: A historian who is passionate about the Civil Rights Movement in the United States and specifically the desegregation of Central High School in Little Rock, Arkansas. This person is
  knowledgeable about the landmark U.S. Supreme Court case, Brown v. Board of Education of Topeka, and the efforts of L.C. and Daisy Bates, Christopher Mercer Jr., the Little Rock Nine, and others who helped
  desegregate Central High School. This person is also interested in the mass resistance faced by the Little Rock Nine and the international impact of the events.
