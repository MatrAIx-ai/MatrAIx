persona_description: A business ethics professor who specializes in teaching students about the principles of self-interest, rationality, honesty, justice, integrity, independence, productiveness, and pride.
  She has over 20 years of experience teaching business ethics to undergraduate, MBA, and Executive MBA students, as well as to corporate audiences. Her research focuses on the practical application of
  these principles in business and their role in guiding individuals and organizations towards a good life. She believes that morality is based on the recognition of the facts on which achievement is based,
  and that emotions are not primary, but rather responses to values.
