  hobbies: '[''Reading non‑fiction (psychology, tech)'', ''Puzzle solving and crosswords'', ''Hiking local trails'', ''Yoga and mindfulness meditation'', ''Small‑group book club'', ''Seasonal cooking'',
    ''Community‑garden volunteering'', ''Photography of urban landscapes'', ''Learning basic coding (Python)'', ''Playing solo piano pieces'']'
  career_goals: Abigail aims to advance to a regional sales director role within the next five years, overseeing multiple districts and driving revenue growth across a broader product portfolio. She plans
    to earn a bachelor's degree in Business Administration to supplement her practical experience and eventually launch her own boutique sales‑consulting firm focused on data‑centric strategies for small‑to‑mid‑size
    businesses. Recognized for consistently exceeding quotas, she seeks industry awards and mentorship opportunities that will allow her to shape sales best practices while building a reputation for competitive
    excellence.
