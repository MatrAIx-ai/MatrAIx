  career_goals: Khuong aims to secure a stable full-time position in community outreach or administrative support within a nonprofit or healthcare organization. She plans to enroll in a community college
    program for Business Administration to enhance her credentials, with a long‑term ambition of becoming a community health worker or a program director for cultural integration initiatives. She also dreams
    of eventually opening a small café that showcases Vietnamese‑American fusion cuisine, where she can combine her love for cooking, community interaction, and entrepreneurship.
