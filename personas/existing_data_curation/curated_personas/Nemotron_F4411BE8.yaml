personas:
  professional: Terry Atiyeh, a 21‑year‑old construction laborer with a talent for AutoCAD drafting and on‑site safety management, leverages meticulous organization, strong people skills, and a vivid artistic
    imagination to coordinate crews, read blueprints, and ensure OSHA‑compliant, aesthetically mindful building projects.
  sports: Terry Atiyeh stays active through weekly flag‑football games with the Little Rock Warriors Flag Football Club, weekend pickup basketball at the community center, supports the Arkansas Razorbacks
    in football and the Milwaukee Bucks in basketball, and hikes the Ouachita National Forest trails each summer to maintain stamina.
  arts: Terry Atiyeh fuses architectural sketching inspired by Zaha Hadid with abstract paintings echoing Piet Mondrian, strums a Gibson Les Paul in a jam group covering Jimi Hendrix and John Mayer, and
    regularly attends exhibitions at the Little Rock Art Museum featuring Anish Kapoor.
  travel: Terry Atiyeh prefers rugged, low‑cost adventuring, having trekked the Grand Canyon’s North Rim, camped in the Canadian Rockies, and now saves for a backpacking trip through Iceland’s highlands,
    planning each itinerary down to campsite permits and eco‑friendly gear.
  culinary: Terry Atiyeh cooks health‑conscious meals such as quinoa‑stuffed bell peppers with rosemary‑roasted potatoes, hand‑rolls sourdough bread on weekends, and indulges in southern‑style smoked brisket
    and jalapeño cornbread during community barbecues.
  core: Terry Atiyeh blends a construction worker’s discipline with an artist’s imagination, obsessively organizing every project while occasionally losing sleep over unfinished sketches or a mis‑tuned
    guitar chord.
background:
  cultural: Terry was raised in a working‑class white family in Fort Smith, Arkansas, with deep roots in the Southern Midwest. His heritage includes German and Irish ancestry, but his cultural identity
    is shaped by the region’s values of hospitality, hard work, and community cohesion. Growing up near the Arkansas River, he was exposed to both the historic industrial spirit of the area and a modest
    local arts scene, which fostered his appreciation for folk crafts and regional music. Family traditions emphasized discipline, respect for elders, and a practical approach to problem‑solving, while
    his parents encouraged curiosity and education, leading him to pursue some college before entering the construction trade.
attributes:
  skills: '["Concrete Pouring", "Framing and Carpentry", "Blueprint Reading", "Safety Compliance (OSHA)", "Heavy Machinery Operation", "Leadership and Crew Coordination", "Conflict Mediation", "Time Management",
