  hobbies: '["Sketching and Architectural Drawing", "Abstract Painting", "Digital Graphic Design", "Playing Guitar", "Community Soccer/Flag Football", "Volunteer Construction (Habitat for Humanity)", "Listening
    to Indie/Classic Rock", "Hiking in Ouachita National Forest", "Reading Architecture and Design Books", "DIY Furniture Building"]'
  career_goals: Terry aims to transition from laborer to site supervisor within the next three years, pursuing a certification in construction management and a safety officer credential. He plans to leverage
    his artistic curiosity by specializing in sustainable, aesthetically‑driven projects, eventually founding a boutique construction firm that integrates eco‑friendly materials with distinctive design
    elements. Long‑term, he hopes to lead community‑focused building initiatives, such as creating a local arts and cultural center that blends functionality with visual impact.
