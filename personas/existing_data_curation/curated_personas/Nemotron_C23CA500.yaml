  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Puerto Rican meals'', ''Organizing board-game nights'', ''Volunteering at local food banks'', ''Walking in Van Cortlandt Park and local
    neighborhoods'', ''Balcony gardening'', ''Reading personal development books'', ''Attending Puerto Rican cultural festivals'']'
  career_goals: Candela aims to translate her community-service experience into a stable, full-time role as a community health worker or administrative assistant within a nonprofit or municipal agency.
    She plans to complete her GED within the next year and enroll in a part-time associate-degree program in health-services administration. Long-term, she hopes to lead a community outreach program that
    provides resources and workshops for underserved families in the Bronx and Yonkers, while also exploring the possibility of starting a small catering business that showcases Puerto Rican family recipes.
