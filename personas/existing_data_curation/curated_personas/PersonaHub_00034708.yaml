persona_description: A landscape planning professional with expertise in mapping and analysis, particularly in the use of GIS to create visual representations of natural, cultural, and human resources.
  They are skilled in applying the ABC Resource Survey Method presented by Nelson and Lawrence in their book Places Linking Nature Cultural and Planning to effectively display policies that protect features
  and systems. They are interested in the effectiveness of their mapping tool in assisting decision makers to visually assess the extent of protection policies.
