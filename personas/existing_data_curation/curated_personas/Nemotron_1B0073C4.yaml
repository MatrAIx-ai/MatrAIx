  hobbies: '[''Abstract Watercolor Painting'', ''Photography'', ''Wine Tasting & Vineyard Tours'', ''Cooking Vietnamese Cuisine'', ''Yoga & Mindfulness Meditation'', ''Reading Science Fiction & Fantasy'',
    ''Herb Gardening'', ''Volunteer Work at Community Festivals'', ''French Language Study'']'
  career_goals: Thao aims to advance to a senior operations or facilities management role within the wine‑tourism sector of Napa, leveraging her supervisory experience to oversee multiple locations. She
    plans to complete a bachelor’s degree in Business Administration and earn a Project Management Professional (PMP) certification. Long‑term, she hopes to launch a mentorship program for administrative
    professionals and champion mental‑health resources in the workplace. Additionally, she envisions founding a community arts collective that fuses local viticulture with Vietnamese cultural expression,
    providing a platform for emerging artists and small‑business collaborations.
