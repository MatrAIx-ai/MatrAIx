  hobbies: '[''Hiking'', ''Mountain biking'', ''Fishing'', ''Acoustic guitar (folk/bluegrass)'', ''Custom PC building'', ''Raspberry Pi / Arduino tinkering'', ''Volunteering – teaching coding'', ''Science-fiction
    reading'', ''Strategy video gaming'', ''Nature photography'']'
  career_goals: Jayson aims to advance to a senior full‑stack or technology‑lead role within the next three to five years, where he can design scalable architectures and guide a team through pragmatic yet
    innovative solutions. He plans to deepen his expertise in cloud platforms (AWS) and emerging backend technologies while pursuing a part‑time bachelor’s degree in Computer Science to complement his self‑taught
    background. Long‑term, he envisions launching a SaaS product that addresses the unique needs of small businesses in the Appalachian region, leveraging his technical skills and community insight. Along
    the way, he hopes to mentor junior developers, contribute to open‑source projects, and become a respected voice in regional tech meetups.
