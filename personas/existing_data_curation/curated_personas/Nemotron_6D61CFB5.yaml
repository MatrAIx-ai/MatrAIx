personas:
  professional: David Strong, a senior finance manager with a reputation for methodical budgeting, advanced Excel and SAP modeling, and a competitive curiosity, drives a cross‑functional initiative to embed
    predictive analytics into the company's budgeting cycle while mentoring the next generation of financial managers, and they relish the challenge of codifying best practices.
  sports: David Strong tees off weekly at the La Salle Country Club, supports the Chicago Bulls and the Chicago White Sox, they coach a youth basketball league, join charity 5K runs, and lead a senior walking
    group through historic trails, all while maintaining a competitive edge in their local chess club that mirrors their strategic approach on the golf course.
  arts: David Strong regularly attends productions at the La Salle Community Theatre, where they revel in classic Arthur Miller dramas and contemporary comedies starring Meryl Streep, they collect vinyl
    records of Bob Dylan and live performances by Steve Martin, using theatre intermissions to unwind from the analytical pressures of their finance role.
  travel: David Strong plans meticulous road trips along Route 66, stopping at classic car museums in Michigan and the Henry Ford Museum, they have explored Yellowstone and the Grand Canyon and dream of
    a guided historical tour of Rome, balancing an adventurous spirit with a cautious budget and family commitments.
  culinary: David Strong favors hearty Midwestern fare, they frequently grill smoked‑paprika‑rubbed pork shoulders, perfect a homemade apple pie with a rosemary‑infused crust, and enjoy pairing a slice
    with aged cheddar and a craft beer, applying the same hands‑on precision from woodworking to their kitchen experiments.
  core: David Strong blends a data‑driven, competitive finance mindset with a love for classic cars, community golf, and chess, they battle chronic worry and an over‑planning habit that sometimes shadows
    their otherwise disciplined life.
background:
  cultural: David comes from a multi‑generational Midwestern white family with German‑Irish roots that settled in central Illinois in the early 1900s. He was raised in a close‑knit small‑town environment
    where church, high school sports, and the county fair formed the core of community life. The region’s emphasis on practical stewardship, self‑reliance, and mutual support shaped his reliable, methodical
    work style. Although he completed some college coursework in business administration, his career rose from on‑the‑job learning, reflecting the blue‑collar ethic common to the area. The loss of his wife
    deepened his involvement in local volunteer groups, embodying the Midwestern tradition of leaning on community during hardship.
attributes:
