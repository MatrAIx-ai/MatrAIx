  hobbies: '[''Golf'', ''Youth Basketball Coaching'', ''Historical Society Volunteering'', ''Woodworking'', ''Classic Car Restoration'', ''Theater Attendance'', ''Chess'', ''Charity Runs'']'
  career_goals: At this stage, David aims to transition from day‑to‑day management toward a senior advisory role where he can codify best practices, mentor emerging financial managers, and lead a cross‑functional
    initiative to embed predictive analytics into the company’s budgeting cycle. He is driven to position his firm ahead of regional competitors while creating a resilient, low‑stress department culture.
    Concurrently, he plans to secure a comfortable retirement that enables him to fund a local scholarship for students pursuing business studies and to support community service projects in La Salle.
