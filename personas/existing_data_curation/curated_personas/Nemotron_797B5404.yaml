personas:
  professional: Connie Laus, a budding explorer of the world’s creatures, spends her days in preschool pretend‑play as a junior scientist, they eagerly ask "why?" while gathering pine cones and chasing
    ladybugs, balancing their curiosity with a natural preference for free‑form, unstructured learning.
  sports: Connie Laus dabbles in T‑ball with the Jefferson County Cubs, they cheer loudly for the Birmingham Barons during weekend games and proudly wear a miniature Alabama Crimson Tide jersey while practicing
    simple soccer drills in the neighborhood park.
  arts: Connie Laus loves drawing bright crayon pictures of farm scenes and singing along to Dolly Parton's "Jolene" and Raffi's "Baby Beluga" during Sunday school music time, they pour their compassionate
    heart into group art projects at preschool and eagerly recite storybooks from the church library.
  travel: Connie Laus's favorite trips are family road‑rides to the county fair’s cotton‑candy‑laden midway and a summer staycation at Gulf Shores, they eagerly collect seashells and map each adventure
    with stickers on a travel journal, dreaming of someday seeing the Grand Canyon.
  culinary: Connie Laus adores buttery biscuits slathered with honey, crispy fried chicken bites, and sweet tea sipped from a tiny cup, they love helping grandma whisk a batch of chocolate chip cookies,
    but often forget to brush their teeth after snack time.
  core: Connie Laus is a warm‑hearted, endlessly curious five‑year‑old who balances community‑driven traditions with a whimsical, sometimes disorganized streak, turning every day into a heartfelt adventure.
background:
  cultural: Connie grows up in a white Southern family in Birmingham, Alabama, where community ties and hospitality are valued. Family gatherings often feature classic Southern dishes like fried chicken,
    biscuits, and sweet tea, providing a backdrop of warmth and shared meals. Her family participates in local church activities, exposing her to Sunday school stories and community service projects that
    reinforce the importance of helping others. Neighborhood events such as county fairs, summer picnics in Jefferson County parks, and holiday parades contribute to her sense of belonging and reinforce
    her compassionate, cooperative traits. The Southern cultural emphasis on politeness, storytelling, and fostering strong relationships subtly shapes her outlook and daily interactions.
