  career_goals: Even at five, Connie dreams of growing up into a role where she can help others and keep everyone happy. She often talks about becoming a teacher, imagining herself leading a classroom where
    she can share stories and guide friends through learning. She also mentions wanting to be a veterinarian, caring for animals and making them feel safe. In the short term, she aims to master reading
    more books, learn to tie her shoes without help, and become the friend who organizes group games in her kindergarten, showcasing her desire to blend compassion with practical everyday achievements.
