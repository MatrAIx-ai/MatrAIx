personas:
  professional: Sara Boruch, a retired community organizer now helming a senior‑focused mental‑health awareness program at the local senior center, blends her curiosity about human behavior with practical
    bookkeeping and event‑planning skills, while her assertive empathy lets her mediate group discussions and spur volunteer mentorship.
  sports: Sara Boruch enjoys low‑impact fitness through the senior center’s walking club and weekly yoga‑meditation sessions, cheers on the nearby minor‑league baseball team, the River Valley Raptors, and
    occasionally plays pickleball with members of the local recreation group.
  arts: Sara Boruch finds artistic inspiration in historical‑fiction author Philippa Gregory, the impressionist paintings of Claude Monet, and the folk melodies of Joan Baez, often listening to Baez’s 1971
    album “Blessed Are…” while knitting a quilt patterned after Monet’s water‑lilies.
  travel: Sara Boruch’s travel style blends careful planning with a love for heritage—she has visited the historic town of Bath, England to trace ancestry, dreams of a slow‑paced river cruise along the
    Danube, and favors weekend getaways to the nearby lake town of Willow Creek for peaceful garden tours.
  culinary: Sara Boruch delights in farm‑to‑table cooking, frequently preparing roasted root‑vegetable stew seasoned with rosemary and thyme, a signature kale‑quinoa salad with feta and lemon vinaigrette,
    and preserving heirloom tomatoes in a classic summer jam.
  core: Sara Boruch balances relentless curiosity and practical thrift with a high‑anxiety temperament, channeling both into community mental‑health advocacy, meticulous budgeting, and an ever‑growing garden
    of herbs and stories.
background:
  cultural: Sara grew up in a modest, middle‑class New England family with deep roots in Connecticut. Her cultural background reflects the region’s traditions of self‑reliance, community service, and appreciation
    for history and nature. Raised in a predominantly Protestant environment, she values modesty, perseverance, and respect for elders. The local culture of Litchfield County, with its emphasis on preservation
    of historic towns and seasonal outdoor activities, has shaped her interests in gardening, genealogy, and community volunteering.
attributes:
  skills: '["Community event coordination", "Basic bookkeeping and budgeting", "Gardening and horticulture", "Domestic arts (cooking, baking, knitting)", "Interpersonal communication and mediation", "Digital
