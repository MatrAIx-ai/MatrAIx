    church"]'
  career_goals: Although retired, Mario aims to continue giving back by mentoring young entrepreneurs, especially within the Cuban‑American community, and by serving on the board of local nonprofits that
    focus on cultural preservation and youth education. He aspires to author a memoir that captures his business journey and immigrant experience, support his grandchildren’s college education, and help
    sustain community initiatives that promote harmony and cooperation.
