persona_description: A scientist who specializes in the field of optical microscopy, particularly in the study of digital imaging techniques and their application in the analysis of microstructures. He/she
  is interested in understanding the limitations of digital imaging and how to optimize sampling intervals to achieve high-resolution imaging. The persona is knowledgeable about the Abbe limit of resolution
  for optical images and the Nyquist criterion, and is skilled in selecting appropriate sampling intervals for different specimen features and magnification levels. The persona has experience working with
  modern microscopes and digital cameras, and is familiar with the concept of spatial resolution and its importance in achieving high-quality digital images.
