    workshops"]'
  hobbies: '["Cooking Mexican cuisine and hosting potlucks", "Participating in community theater and improv", "Hiking the Boise River foothills", "Playing guitar and listening to live music", "Attending
    Mexican cultural festivals (Cinco de Mayo, Día de los Muertos)", "Volunteering at legal aid clinics", "Reading legal thrillers and historical novels", "Practicing Spanish poetry at Toastmasters", "Gardening
    and growing heirloom tomatoes"]'
  career_goals: Anibal aims to expand his pro‑bono outreach by establishing a community legal clinic that specializes in education and immigrant‑rights issues in the Boise‑Nampa region. He aspires to mentor
    younger attorneys, publish a practical guide on navigating school‑law matters, and eventually serve as a district judge where he can influence policy and promote restorative justice. His long‑term ambition
    is to bridge the gap between legal frameworks and community needs, ensuring that vulnerable families receive compassionate, effective representation.
