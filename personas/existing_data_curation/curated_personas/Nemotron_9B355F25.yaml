personas:
  professional: Anibal Perezvelasco is a bilingual attorney and education specialist who blends curiosity with practicality to navigate civil litigation, negotiate education‑law disputes, and mentor junior
    lawyers, while their talkative, sociable demeanor makes courtroom advocacy feel like community dialogue.
  sports: Anibal Perezvelasco is a committed hiker of the Boise River foothills, a regular participant in a local weekend hiking club, and an enthusiastic supporter of the Boise State Broncos who occasionally
    joins pickup soccer games at the community recreation center.
  arts: Anibal Perezvelasco energizes community theater improv nights with their talkative flair, often reciting Spanish poetry at Toastmasters, strums an acoustic guitar to the melodies of traditional
    folk songs, and unwinds with legal thrillers by John Grisham and historical novels by Ken Follett.
  travel: Anibal Perezvelasco favors spontaneous road trips through Idaho’s mountainous backroads and weekend escapes to Santa Fe for its artistic markets, while dreaming of a culturally immersive journey
    to Oaxaca to sample authentic mole and attend vibrant festivals.
  culinary: Anibal Perezvelasco delights in preparing traditional Mexican dishes such as pozole, chiles rellenos, and mole verde for family gatherings, meticulously selecting fresh chilies, masa, and locally
    sourced herbs, yet their relaxed planning sometimes leads to last‑minute grocery runs.
  core: Anibal Perezvelasco is a talkative, compassionate community advocate whose curiosity drives a flexible, sometimes disorganized lifestyle that blends legal expertise, cultural cooking, and a love
    for outdoor adventure.
background:
  cultural: Anibal was raised in a bicultural Mexican‑American household where Spanish language, family solidarity, and communal celebrations were central. He grew up honoring traditions such as Día de
    los Muertos, cooking tamales with his grandparents, and participating in local church events, which instilled a deep sense of compassion and responsibility to his community. After relocating to Idaho,
    he blended these values with the region’s emphasis on self‑reliance, becoming a bridge between Mexican immigrants and the broader legal system. His cultural perspective informs his empathetic approach
    to law, his commitment to helping families maintain harmony, and his passion for preserving his heritage while fostering inclusive community ties.
attributes:
  skills: '["Legal research and statutory analysis", "Civil litigation and courtroom advocacy", "Mediation and conflict resolution", "Education law and policy compliance", "Bilingual client counseling (Spanish/English)",
