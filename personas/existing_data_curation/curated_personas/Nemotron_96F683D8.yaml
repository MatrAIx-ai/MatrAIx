  career_goals: Lisa dreams of turning her curiosity, love of art, and knack for explaining ideas into a career that lets her share knowledge with others. She envisions becoming a science communicator or
    museum curator who designs interactive exhibits that blend art and science, or a teacher who inspires students through creative lessons. She also hopes to write illustrated books that weave storytelling
    with scientific concepts, and she is fascinated by the idea of exploring space or marine biology one day.
