personas:
  professional: Lisa Hamil is a budding digital storyteller who creates interactive games in Scratch, blending their methodical planning and love for fantasy narratives with a flair for leading school drama
    projects, making them the go‑to tech‑creative on class assignments.
  sports: Lisa Hamil loves exploring nearby woods on weekend bike rides, plays on the local community center's youth soccer team, cheers loudly for the Charlotte Hornets and the Carolina Panthers, and designs
    treasure‑hunt style fitness games at school, combining their nature curiosity with a high‑energy, socially driven approach to staying active.
  arts: Lisa Hamil is an enthusiastic painter who studies Monet's water lilies and Van Gogh's starry nights for inspiration, enjoys the whimsical scores of Pixar movies like "Coco" and the folk‑pop tunes
    of Taylor Swift, and delights in reenacting scenes from "Harry Potter" with their drama club, weaving these influences into their watercolor sketches and doodles.
  travel: Lisa Hamil prefers short, family‑friendly trips that blend adventure and learning, meticulously mapping visits to the Outer Banks' Cape Hatteras lighthouse, interactive exhibits at the Children's
    Museum of the Arts in Charlotte, and dreaming of a spring pilgrimage to London's Natural History Museum, always balancing excitement with a parental budget.
  culinary: Lisa Hamil enjoys simple kitchen adventures, proudly whipping up cucumber tea‑sandwiches and chocolate‑chip cookie circles for friends' tea parties, and their favorite dish to eat is cheesy
    macaroni topped with a sprinkle of paprika, revealing a budding but enthusiastic home‑cook with a sweet‑savory palate.
  core: Lisa Hamil is a bright, talkative nine‑year‑old who channels boundless curiosity into art, code, and community games, yet can’t resist a nightly extra episode of a fantasy series, often forgetting
    to brush their teeth afterward.
background:
  cultural: Lisa is a White American child raised in the suburban community of Raleigh, North Carolina. Her family blends Southern hospitality with middle‑class American values, celebrating holidays such
    as Thanksgiving, Christmas, and the Fourth of July with community gatherings, local parades, and traditional meals. She attends a public elementary school with a diverse student body and frequently
    visits regional cultural institutions like the North Carolina Museum of Art, the Museum of Natural Sciences, and the Marbles Kids Museum. Her upbringing includes participation in neighborhood events
    such as the Raleigh International Festival and the State Fair, and her family emphasizes curiosity, education, and community service, shaping her worldview and encouraging her love of art and exploration.
