personas:
  professional: Brittanie Lerma, a 72‑year‑old warehouse veteran renowned for their precision in inventory management, barcode tracking, and safety training, channels their love of structure and predictability
    into meticulous shift planning while using their sociable, cooperative nature to mentor new hires and foster a supportive team environment, all the while quietly wrestling with the stress of tight shipping
    deadlines.
  sports: Brittanie Lerma, an enthusiastic participant in senior aerobics at the community center and a daily walker through the Cleveland Metroparks, roots for the Cleveland Browns on football Sundays,
    cheers the Guardians during summer baseball, and occasionally joins the Cuyahoga County Senior Fitness League for gentle basketball drills.
  arts: Brittanie Lerma, a devoted member of a knitting circle that crafts charitable quilts, loses themselves in historical fiction such as *The Pillars of the Earth* and *The Nightingale*, enjoys classic
    Audrey Hepburn films, and regularly attends performances at the Cleveland Play House while humming Bob Dylan’s folk tunes as they stitch.
  travel: Brittanie Lerma, who prefers a printed itinerary and scheduled rest stops on road trips, has visited Charleston, South Carolina, explored the serene islands of Mackinac, trekked through Rocky Mountain
    National Park, and dreams of a leisurely cruise to the Greek islands when their grandchildren can join them.
  culinary: Brittanie Lerma, an avid gardener, transforms their fresh harvest into hearty butternut‑squash soup, rosemary‑seasoned roasted root vegetables, and garden‑fresh tomato‑basil pasta while occasionally
    treating themselves to a slice of classic New York‑style cheesecake at the local diner.
  core: Brittanie Lerma, a 72‑year‑old warehouse sage turned community mentor, blends meticulous organization with warm sociability, battles a chronic worry about the future, and never misses a chance to
    knit a quilt for a stranger.
background:
  cultural: Brittanie grew up in a middle‑class, white, Midwestern family in the Cleveland area. Her grandparents immigrated from Poland and Germany, and she was raised with Catholic traditions that emphasized
    community, modesty, and hard work. The industrial heritage of Cleveland and the close‑knit neighborhoods of Cuyahoga County shaped her values of reliability, practicality, and cooperation. While she
    identifies strongly with broader American Midwest culture—valuing punctuality, straightforward communication, and neighborly support—she also honors her Eastern European roots through family recipes,
    holiday customs, and a respect for multigenerational family bonds.
attributes:
