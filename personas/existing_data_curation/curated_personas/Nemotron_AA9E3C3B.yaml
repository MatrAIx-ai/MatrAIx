  career_goals: Brittanie aims to transition into a supervisory role within the warehouse, leveraging her years of practical experience to improve process efficiency and safety standards. She plans to obtain
    a Certified Production and Inventory Management (CPIM) credential to formalize her expertise and mentor younger employees, fostering a supportive and organized work environment. Additionally, she hopes
    to contribute to community outreach programs that teach basic logistics skills to local high‑school students, combining her professional knowledge with her desire to give back and create a sense of
    harmony in her workplace and neighborhood.
