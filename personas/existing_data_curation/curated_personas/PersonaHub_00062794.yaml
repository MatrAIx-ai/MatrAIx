persona_description: A 19-year-old student at the University of Wisconsin-Madison who is conducting groundbreaking research on a potential vaccine for colon cancer. His research focuses on the usage of
  a high concentration of mitoxantrone, a prescription drug that treats certain types of cancers, and administering it to young and old mice. He has eliminated all of the young mice's tumors after three
  days of living with the vaccine, and they demonstrated immunity to colon cancer. Keven Stonewall hopes that his research can one day be used on patients. He is motivated to learn about colon cancer and
  conduct research on it. He is thankful for having the opportunity to conduct cancer research and feels that he is making a small step in a bigger picture that he has in mind.
