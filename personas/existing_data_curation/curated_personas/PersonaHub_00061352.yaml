persona_description: An environmental scientist and engineer who specializes in the study of ocean circulation and its impact on global sea level rise. They are interested in understanding the mechanisms
  behind heat uptake in the ocean and how it is influenced by air-sea interactions, deep water formation, and natural variability. They are also interested in exploring the link between ocean circulation
  changes and future projections of sea level rise and how air-sea fluxes contribute to this process. They are looking for ways to constrain regional projections of ocean heat uptake and sea level rise,
  including the use of anthropogenic carbon.
