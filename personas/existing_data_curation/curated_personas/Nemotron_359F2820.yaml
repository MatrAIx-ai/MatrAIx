personas:
  professional: A budding robotics enthusiast, Lena Jones channels curiosity and practicality into designing competition-ready mechanisms for her school's robotics club, balancing meticulous documentation
    with on‑the‑fly problem solving as they lead the team’s programming sub‑group.
  sports: Lena Jones stays active by tackling weekend hikes in the Wasatch foothills, playing midfield for her school's junior soccer league, and rooting for the Utah Jazz and Real Salt Lake, while also
    logging mileage with the Wasatch Trail Club.
  arts: An imaginative creator, Lena Jones strings acoustic chords reminiscent of John Mayer, sketches anime‑style heroes inspired by Studio Ghibli and My Hero Academia, and devours science‑fiction works
    by Isaac Asimov, all of which shape their evenings of artistic exploration.
  travel: Travel‑savvy Lena Jones dreams of a family road trip to Moab’s red canyons and a future solo adventure to Japan’s anime districts, balancing these aspirations with school commitments and a modest
    family budget that limits long‑haul flights.
  culinary: An enthusiastic baker, Lena Jones perfects chewy chocolate chip cookies for friends on weekends, experiments with ramen bowls spiced with miso and sriracha, and occasionally whips up avocado
    toast topped with feta, showcasing a growing confidence in the kitchen.
  core: Curious yet practical, Lena Jones navigates teenage life by juggling robotics projects, anime sketches, and midnight cookie‑baking marathons, all while staying emotionally steady and occasionally
    forgetting to set an alarm for school.
background:
  cultural: Lena grew up in South Jordan, Utah, a suburban community with strong ties to both mainstream American culture and the local Latter‑Day Saint (LDS) heritage. While her family identifies as culturally
    white and moderately secular, they cherish community service, family reunions, and outdoor recreation—values reflected in regional celebrations like 4th of July picnics and holiday service projects.
    Attending a public high school with a diverse student body, she has been exposed to a variety of cultural perspectives, which complements her cooperative and harmony‑seeking personality.
attributes:
  skills: '[''basic programming (Scratch, Python)'', ''digital design (Canva, photo editing)'', ''academic organization and time management'', ''public speaking and collaborative teamwork'', ''basic first
