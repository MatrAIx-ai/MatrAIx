  hobbies: '[''reading science‑fiction'', ''playing acoustic guitar'', ''drawing/sketching anime characters'', ''hiking in the Wasatch Mountains'', ''school robotics club'', ''baking cookies with friends'',
    ''volunteering at an animal shelter'']'
  career_goals: Lena aspires to a career that blends her scientific interest with her desire to support others. She is leaning toward a future as a pediatric nurse, motivated by volunteering at a community
    health fair and her natural empathy. At the same time, she is intrigued by environmental science and hopes to study conservation biology, aiming to work on projects that improve community health and
    ecological stewardship. Her long‑term ambition is to attend a university with strong pre‑medical and environmental programs, graduate with a degree that allows her to combine patient care, public health
    outreach, and sustainability initiatives.
