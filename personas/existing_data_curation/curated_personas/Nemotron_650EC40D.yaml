  hobbies: '[''Hiking'', ''Gardening'', ''Journaling'', ''Baking'', ''Knitting'', ''Documentary watching'', ''Acoustic guitar'', ''Animal shelter volunteering'']'
  career_goals: Kristina aims to complete her associate degree in early childhood education or social sciences and then transfer to a four‑year university to pursue a bachelor’s in counseling or social
    work. She aspires to become a community outreach coordinator or school counselor, roles where she can use her empathy and organizational skills to support youth and families in Cummings and surrounding
    areas. Drawing from her personal experience with stress and anxiety, she hopes to develop mental‑health awareness programs that promote resilience among her peers. In the long term, she envisions leading
    a nonprofit focused on youth empowerment and community well‑being.
