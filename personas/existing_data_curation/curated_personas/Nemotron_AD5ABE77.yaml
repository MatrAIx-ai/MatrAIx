personas:
  professional: Ricardo Smith is a budding creator who blends curiosity with practicality, assembling intricate LEGO constructions and crafting simple games in Scratch, showcasing organized yet flexible
    problem‑solving and a competitive drive that pushes them to constantly iterate and improve.
  sports: Ricardo Smith is a lively midfielder on the elementary school soccer team, sharpening their skills through after‑school drills and weekend bike rides, while cheering for Austin FC in the MLS and
    the Dallas Cowboys on game days, balancing structured training with the freedom of open‑air play.
  arts: Ricardo Smith is an enthusiastic LEGO architect and Scratch animator who draws creative sparks from the adventure novels of Rick Riordan, the sci‑fi worlds of Orson Scott Card, and the cinematic
    magic of Pixar’s Toy Story; they often hum to Imagine Dragons while sketching new spaceship designs, weaving together storytelling and visual play.
  travel: Ricardo Smith loves family road trips that explore the Texas Hill Country and the bustling River Walk in San Antonio, yet they also dream of a sun‑soaked week at Disneyland in Orlando and a cultural
    adventure in Tokyo to experience anime and sushi, preferring to map out itineraries with a mix of careful planning and spontaneous stops at local parks.
  culinary: Ricardo Smith is a junior chef who proudly flips BBQ chicken at backyard gatherings, whips up taco nights with seasoned ground beef, fresh cilantro, and salsa harvested from the family garden,
    builds perfect grilled cheese sandwiches with sharp cheddar, and bakes chocolate‑chip cookies sprinkled with a dash of smoked paprika for extra flair, delighting in practical cooking experiments they
    share with family.
  core: Ricardo Smith is a curious, competitive 10‑year‑old who builds massive LEGO forts, codes mini‑games in Scratch, hoards baseball cards, they sometimes forget chores when a new set arrives, and they
    stay up late watching Fortnite streamers, blending practical tinkering with a relentless drive to be the best.
background:
  cultural: Ricardo grew up in Manor, a suburban community in Travis County, Texas, within a typical middle‑class white American family. His household blends traditional Texan values—such as love for outdoor
    activities, barbecue gatherings, and community sports—with broader American cultural norms, including holiday celebrations like Thanksgiving and Christmas and participation in church events. The diverse
    surroundings of the Austin metro area expose him to Hispanic influences, such as hearing Spanish phrases and enjoying Mexican food at school events and local festivals. This multicultural exposure,
    combined with his family's emphasis on education, responsibility, and self‑reliance, shapes his worldview and personal identity.
