  career_goals: Approaching retirement, Julian aims to transition into a mentorship and training role within the department, formalizing his experience by completing a bachelor's degree in criminal justice.
    He aspires to become the official liaison between the police force and the local Hispanic community, fostering trust and improving communication. Julian also envisions establishing a part‑time security
    consulting practice for small businesses in Beulaville, leveraging his tactical knowledge while remaining active in community service. Long‑term, he hopes to volunteer as a reserve officer and possibly
    run for a seat on the Onslow County board to influence public safety policies.
