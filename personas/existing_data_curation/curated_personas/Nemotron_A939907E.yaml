  career_goals: Komal imagines a future where she can blend her love for caring, organization, and learning. She frequently says she wants to become a veterinarian so she can help animals stay healthy,
    a teacher who can share knowledge with other children, or a librarian who can keep books tidy and help kids find stories. Occasionally she mentions a desire to become a child therapist, hoping to use
    her own experiences of strong emotions to support other children feeling anxious or sad.
