personas:
  professional: Komal Amin, an aspiring junior architect, channels their methodical planning and love for building with LEGO bricks into creating detailed miniature cityscapes, while they let quiet curiosity
    fuel a growing fascination with how structures sustain communities.
  sports: Komal Amin enjoys leisurely nature walks in Sarpy County parks, participates in the local kindergarten soccer program that cheers for the Kansas City Royals, and often mimics the Nebraska Cornhuskers'
    victorious celebrations during backyard hop-scotch drills, reflecting a gentle but consistent dedication to staying active, as they relish the rhythmic motion of each activity.
  arts: Komal Amin immerses themselves in creative expression by drawing vivid scenes inspired by Dr. Seuss picture books, singing along to Disney's "Let It Go" performed by Idina Menzel, and learning Bollywood
    nursery rhymes like Lakdi Ki Kaathi from their mother, while they attend a weekend mini-dance class that blends rhythmic movement with storytelling.
  travel: Komal Amin loves spontaneous weekend excursions to nearby Papillion Creek trails, dreams of a family road trip to the Grand Canyon, and hopes to one day collect shells on the beaches of Bali,
    balancing a love for calm nature walks with an imaginative yearning for far-off adventures, as they often draw maps of imagined destinations in their sketchbooks.
  culinary: Komal Amin, a budding little chef, delights in assembling peanut-butter-and-jelly sandwiches, savoring cheesy pizza slices, and proudly helping roll tiny vegetable samosas with carrot and peas
    fillings, often requesting extra strawberries for their favorite yogurt parfait, as they experiment with arranging colorful food art on their plates.
  core: Komal Amin balances a meticulous curiosity with gentle anxiety, turning quiet play into purposeful creativity while they navigate intense emotions through routine and imagination.
background:
  cultural: Komal’s family originates from the Indian subcontinent, with roots in India and Pakistan. At home, Urdu and Hindi are spoken alongside English, and she is exposed to South Asian customs such
    as celebrating Diwali and Eid, preparing traditional foods like samosas and jalebi, and wearing colorful kurtis during festivals. Living in Bellevue, Nebraska, the family participates in the local South
    Asian community, attending cultural events at the Omaha Indian Cultural Center. Komal’s upbringing blends South Asian values of respect for elders, community harmony, and hospitality with the American
    emphasis on independence and school participation. These cultural influences shape her love for storytelling, music, and communal celebrations while she navigates her identity in a Midwestern setting.
