persona_description: A professor and chair of the Molecular and Environmental Plant Sciences Department at Texas A&M University, who specializes in the study of crop physiology and stress management, particularly
  in the context of wheat phenotyping and crop stress monitoring. His research interests include the development of interdisciplinary approaches to improve crop adaptation, and the use of genotypic responses
  to crop stress in the greenhouse and field. He has had a long-standing partnership with the International Crops Research Institute for the Semi-Arid Tropics (CIMMYT) and has visited students and scientists,
  sharing knowledge and research.
