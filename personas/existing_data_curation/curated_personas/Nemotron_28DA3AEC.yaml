  hobbies: '[''metal sculpture'', ''fishing'', ''gardening'', ''birdwatching'', ''vintage tool collection'', ''woodworking'', ''genealogy research'', ''church choir'', ''community theater attendance'',
    ''crossword puzzles'', ''reading industrial biographies'', ''classic movies'', ''Southern gospel music'', ''model train building'']'
  career_goals: Approaching retirement, Brendon aims to stay active in his trade by establishing a modest community workshop where he can train younger workers and produce bespoke metal art pieces for local
    galleries and craft fairs. He hopes to document his trade knowledge in a simple guidebook for future generations and to offer part‑time consulting services to construction firms, ensuring safety and
    quality on their projects. Balancing physical demands with his love of creation, he seeks a schedule that lets him remain productive, socially engaged, and financially comfortable while honoring his
    legacy as a skilled craftsman.
