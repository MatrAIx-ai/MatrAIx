personas:
  professional: Brendon Pelletier, a seasoned sheet metal fabricator with five decades mastering MIG/TIG welding, plasma cutting, blueprint interpretation, and safety compliance, leverages their methodical
    planning, competitive drive, and artistic curiosity to mentor apprentices in a community workshop and produce bespoke metal art while staying vigilant about project timelines and quality.
  sports: Brendon Pelletier, an avid Savannah River angler who belongs to the Aiken County Freshwater Fishing Club, spends weekends honing his cast for largemouth bass, follows the Atlanta Falcons and Charleston
    Battery with unwavering loyalty, and participates in a local senior bowling league to keep his joints mobile while fostering a friendly rivalry with fellow bowlers.
  arts: Brendon Pelletier, a hobbyist metal sculptor inspired by David Smith’s welded abstractions and Howard Finster’s folk whimsy, sings gospel classics by the Gaither Vocal Band in their church choir,
    frequents community theatre productions featuring classic films like Casablanca, and curates a modest collection of vintage hand tools that double as artistic curios, all of which shape their creative
    identity.
  travel: Brendon Pelletier prefers meticulously planned road trips along the Blue Ridge Parkway, annual family visits to historic Savannah and Charleston for their architecture and culinary delights, a
    yearly pilgrimage to Quebec City to explore the stories of early Lowcountry settlers, and occasional weekend getaways to the Grand Tetons for fishing, balancing these adventures against a modest travel
    budget and a desire for low‑key relaxation.
  culinary: Brendon Pelletier delights in preparing Southern comfort staples such as fried catfish with hush‑puppy crumbs, collard greens simmered with smoked turkey, garden‑fresh tomatoes tossed into a
    buttermilk biscuit dough, and honey‑glazed ham at the local diner, showcasing moderate culinary skill that blends traditional flavor with occasional experimental metal‑inspired plating.
  core: Brendon Pelletier, a diligent 71‑year‑old metal artisan whose competitive spirit, meticulous nature, and occasional worry fuel a life of handcrafted sculpture, steadfast community service, and a
    devotion to Southern traditions tempered by a curiosity for modern expression.
background:
  cultural: Born in the mid‑1950s in Beech Island, South Carolina, Brendon grew up in a rural Aiken County community steeped in Southern hospitality, church life, and agricultural traditions. His family
    traces its ancestry to French‑Canadian settlers who arrived in the Lowcountry in the late 1800s, blending Francophone heritage with Deep‑South customs. He was raised on Southern comfort foods such as
    fried catfish, collard greens, and biscuits, and participated in local festivals that celebrate regional crafts and music. The emphasis on self‑reliance, hard work, and neighborly values shaped his
    pragmatic outlook, while a modest school art program sparked his lifelong appreciation for visual arts. Today he maintains strong family ties, contributes to community events, and honors the Southern
    craftsmanship legacy while exploring modern artistic expressions.
