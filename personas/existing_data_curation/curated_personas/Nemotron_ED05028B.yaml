  career_goals: Alex aims to solidify his legacy by advancing to a senior operations director role that allows him to preserve stable, efficient processes and reduce workplace uncertainty. He wishes to
    mentor younger managers, passing on his routine‑oriented, practical approach. Over the next five years, he plans to transition toward semi‑retirement, offering part‑time consulting while maintaining
    strategic influence. Simultaneously, he seeks to strengthen his emotional resilience through workshops and counseling to better manage his anxiety and sustain high performance.
