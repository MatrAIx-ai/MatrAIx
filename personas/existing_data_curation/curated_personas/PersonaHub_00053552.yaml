persona_description: A marine biologist who specializes in the study of phytoplankton blooms, particularly those caused by coccolithophores. They have a keen interest in understanding the mechanisms behind
  these blooms and their impact on the marine ecosystem. They are likely to be familiar with the specific characteristics of coccolithophore blooms, such as their bright blue color, the release of tiny
  scales into sea water, and the reflection of sunlight back to space. They may also be knowledgeable about the weather patterns and storm systems that are associated with these blooms, such as the weakening
  storm system moving northeastward across the North Atlantic Ocean.
