  career_goals: He aims to transition from freelance projects into a full‑time junior or mid‑level software engineering role at a company that supports remote work, allowing him to stay in his quiet hometown
    while collaborating on larger products. Over the next five years, he hopes to master cloud‑native development, earn AWS certifications, and eventually launch his own SaaS platform that helps rural small
    businesses digitize inventory and sales. He also aspires to mentor other self‑taught developers in his community, showing that practical coding skills can open career pathways beyond the local job market.
