persona_description: A scientist who is interested in the evolution and origin of spider silk, and the proteins involved in the construction of orb webs. They are particularly fascinated by the details
  of the evolution of spider silk and the proteins involved in the construction of orb webs, and are eager to learn more about the origin of "silken fetters" as described in Dawkins' "Climbing Mount Improbable".
  They are also interested in the co-evolution of flowering plants and insect pollinators, and the impact of these events on spider diversity.
