persona_description: A professional working in the field of Natural Flood Management who is interested in implementing sustainable land-based interventions to mitigate the effects of flooding and improve
  the local environment. They are familiar with the various techniques and land-based interventions that can be used to slow the flow of water through a landscape and are eager to learn more about how these
  measures can help reduce the frequency of future floods and deliver a range of other benefits to the local environment, including improvements to water quality, habitat creation, and climate change mitigation.
  They are interested in finding out how Natural Flood Management measures can be implemented in their area and are willing to get in touch to discuss the possibilities.
