    Planning'']'
  career_goals: Adriana aspires to pursue a career in healthcare, aiming to become a registered nurse or medical assistant, motivated by her desire to help others and ensure community well‑being. She also
    considers attending a community college for an associate degree in health sciences, with a long‑term goal of specializing in pediatric care. She values stability and a structured environment where her
    organizational strengths can shine, and she wants to give back to her Mexican‑American community.
