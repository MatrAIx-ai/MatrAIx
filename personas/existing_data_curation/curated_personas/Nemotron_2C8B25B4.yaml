personas:
  professional: Adriana Perez, a meticulous 16-year-old aspiring healthcare professional, leverages their knack for organization, bilingual translation, and basic coding to excel in school science projects
    and volunteers at the community center, manifesting a disciplined, practical approach to patient care.
  sports: Adriana Perez, a member of their high school’s cross-country team who schedules early-morning runs and weekend yoga sessions, stays fit through disciplined cardio, and passionately follows the
    San Antonio Spurs (NBA) and the Texas Rangers (MLB) while cheering for the local youth soccer club, the Austin Juniors.
  arts: Adriana Perez, an avid reader of historical fiction by Hilary Mantel and Mary Renault, a journal-keeping enthusiast who draws inspiration from the lyrical poetry of Maya Angelou and finds solace
    in the acoustic folk of Sufjan Stevens and the cinematic scores of John Williams, regularly attends community theater productions starring Lin-Manuel Miranda’s revivals.
  travel: Adriana Perez, who prefers meticulously planned weekend getaways over spontaneous trips, enjoys cultural immersion through modest family road trips to historic sites like Williamsburg, Virginia,
    and dreams of exploring the colonial streets of Granada, Spain, and the vibrant markets of Oaxaca, Mexico, once they can afford the travel.
  culinary: Adriana Perez, a budding chef who masters mole poblano with ancho chilies, chocolate, and sesame seeds, perfects corn-based tamales with pork and red salsa, and prides themselves on translating
    family recipes into bilingual recipe cards, while experimenting with fresh cilantro, lime, and epazote to add depth to their signature chicken enchiladas.
  core: Adriana Perez, a hyper-organized 16-year-old who balances a love for historical narratives and puzzle-solving with a chronic worry habit that fuels late-night journaling, often trades sleep for
    extra spreadsheet tweaks, and they rarely miss a chance to perfect a new recipe.
background:
  cultural: Adriana comes from a Mexican‑American family that settled in Twin Falls, Idaho. Her parents emigrated from Mexico and maintain strong cultural ties through language, food, music, and celebrations
    such as Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade tamales and pozole. Growing up in a predominantly Hispanic household, she is fluent in Spanish and
    embraces the values of family solidarity, respect for elders, and community service. While she lives in a small, largely rural Idaho community, her Mexican heritage informs her outlook, infusing her
    daily life with a blend of American and Mexican traditions.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Bilingual Spanish-English'', ''Basic Computer Literacy'', ''Effective Note‑Taking'', ''Peer Tutoring'', ''Traditional Mexican Cooking'']'
