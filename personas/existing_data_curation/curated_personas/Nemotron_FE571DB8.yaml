  hobbies: '[''sketching and digital illustration'', ''reading sci‑fi/fantasy novels'', ''collecting vintage comics'', ''listening to indie music'', ''playing chess and strategy video games'', ''hiking
    and fishing'', ''DIY electronics (Arduino)'', ''garden and farm chores'', ''journaling'']'
  career_goals: He aims to turn his love for art and technology into a career, targeting roles such as concept artist for video games, digital illustrator, or industrial designer. He plans to enroll in
    a community college or technical institute for graphic design and CAD, while also seeking an apprenticeship in small‑scale manufacturing or renewable‑energy installation to stay connected to his rural
    roots. Ultimately, he dreams of running his own workshop that merges custom woodworking with digital design, providing bespoke furniture and prototypes for local businesses.
