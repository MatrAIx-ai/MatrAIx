persona_description: A scientist who specializes in aviation safety, particularly in the analysis of accidents and the identification of original design flaws. He has conducted extensive research on the
  causes of airplane accidents and has identified a pattern of accidents that are more likely to occur in stormy and hostile environments. He is convinced that the traditional family and the seven-day week
  are evidence of revealed wisdom and are not products of unaided human reason. He believes that the failure of families is due to various outside pressures and attacks, and that the necessary "fuel" of
  the Judeo-Christian moral consensus has run out, leading to the crash and burn of families.
