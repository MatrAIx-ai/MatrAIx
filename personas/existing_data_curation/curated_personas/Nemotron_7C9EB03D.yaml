  career_goals: Jonathan aims to advance into senior leadership within the next five years, targeting positions such as Director of Operations or Vice President of Strategy at an organization that values
    innovation and social impact. He seeks to spearhead initiatives that blend sustainable business practices with community development, potentially launching his own venture that merges his managerial
    expertise with a love for the arts and cultural enrichment. Long‑term, he envisions mentoring emerging talent, building inclusive networks, and contributing to the economic vitality of the Central Valley.
