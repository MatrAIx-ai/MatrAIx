  hobbies: '[''Art museum visits'', ''Small‑group art discussions'', ''Reading biographies and business case studies'', ''Gardening'', ''Cooking new recipes'', ''Chess'', ''Weekend travel to Midwestern
    towns'', ''Volunteer event organization'']'
  career_goals: Although retired from full‑time work, John aims to leave a lasting legacy of service and knowledge sharing. He plans to mentor emerging small‑business owners, serve on the board of a local
    arts nonprofit, and develop a series of workshops on financial literacy for seniors. He also hopes to author a reflective memoir that blends his business insights with his love of art, and to continue
    learning through short courses on contemporary art trends and social entrepreneurship.
