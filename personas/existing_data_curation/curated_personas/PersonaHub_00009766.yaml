persona_description: A dermatologist who specializes in the study of the skin, its layers, and the functions they perform. They are knowledgeable about the dermis, hypodermis, and epidermis and how they
  work together to maintain the skin's elasticity, strength, and firmness. They are also familiar with the bone structure, including the living and non-living components, and the process of bone formation
  and ossification. They are interested in understanding how the bone structure affects the body's overall health and function.
