  hobbies: '[''Playing video games'', ''Hiking local trails'', ''Attending live music events'', ''Board game nights'', ''Reading non-fiction (technology, productivity, entrepreneurship)'', ''Raspberry Pi
    and DIY electronics projects'', ''Photography (landscape)'', ''Cooking experimental recipes'', ''Volunteering at community events'']'
  career_goals: Daniel aims to move from a general office support role into a project coordination or operations management position within the next three to five years. He plans to complete a bachelor’s
    degree in Business Administration or Management and earn certifications such as Microsoft Office Specialist and Certified Associate in Project Management (CAPM). By strengthening his organizational
    and time‑management skills, he hopes to lead initiatives that introduce technology‑driven efficiencies, such as automating routine processes, improving data reporting, and fostering cross‑functional
    collaboration. In the longer term, he aspires to become an administrative manager or operations director, blending his pragmatic approach with innovative ideas to drive continuous improvement.
