  career_goals: Jose aims to earn a STEM scholarship that will enable him to study aerospace engineering or computer science at a university with strong research ties to NASA or defense technology firms.
    He is driven by a competitive desire to design functional prototypes—such as low‑cost drones or model rockets—that can solve real‑world problems. In the long term, he envisions leading a tech startup
    focused on affordable aerospace technologies, while also giving back to his community by mentoring younger students in robotics and coding. His career plan balances his love for innovative ideas with
    a practical focus on measurable outcomes and personal achievement.
