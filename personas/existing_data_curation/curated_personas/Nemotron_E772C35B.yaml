personas:
  professional: Jose Cardoza is a high school student who channels their curiosity about flight into designing and launching model rockets while sharpening strategic thinking through competitive esports,
    balancing meticulous planning with on‑the‑fly adjustments that reflect their practical yet inventive mindset.
  sports: Jose Cardoza joins the Roswell Rockets Youth Soccer Club for weekend matches, follows New Mexico United in the USL Championship and the Dallas Cowboys for NFL excitement, and spends mornings skateboarding
    at the Trailblazers Skate Park, treating fitness as a competitive outlet that mirrors their strategic gaming mindset.
  arts: Jose Cardoza captures the stark beauty of desert nightscapes with a DSLR, drawing inspiration from Chris Burkard and Ansel Adams, while their playlist mixes reggaeton hits by Bad Bunny with classic
    folk ballads by Lila Downs, shaping a creative identity that blends visual storytelling and multicultural soundtracks.
  travel: Jose Cardoza prefers spontaneous road trips across the Southwest, having camped near Carlsbad Caverns and photographed the Grand Canyon’s sunrise, yet dreams of backpacking through Iceland’s lava
    fields and exploring Tokyo’s neon districts, balancing budget constraints with a thirst for otherworldly landscapes.
  culinary: Jose Cardoza enjoys cooking moderate‑level dishes like carne asada tacos topped with cilantro, onions, and lime, experimenting with New Mexican green chile stew seasoned with cumin and garlic,
    and treats themselves to churros dusted with cinnamon sugar, while savoring snack‑size tacos and homemade guacamole during gaming marathons.
  core: Jose Cardoza melds relentless curiosity for rockets and UFO lore with a competitive gaming edge, balancing meticulous planning against occasional stress‑driven procrastination and a habit of staying
    up late to perfect both a launch trajectory and a high‑score.
background:
  cultural: Jose grew up in a bilingual Mexican‑American household where Spanish is spoken at home and English at school, giving him a strong bicultural identity. Family celebrations of Día de los Muertos,
    Christmas posadas, and Mexican holidays are central to his upbringing, as are traditional foods like tamales and enchiladas prepared with recipes passed down through generations. Living in Roswell,
    he is also influenced by the Southwest's desert environment and the town's famous UFO culture, which fuels his interest in aerospace and speculative science. He balances respect for his Catholic roots—with
    occasional church attendance and community service—with the more relaxed, independent spirit of New Mexican youth culture, creating a blended sense of belonging that informs his values, aspirations,
    and everyday interactions.
