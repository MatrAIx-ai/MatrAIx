persona_description: A historian and political scientist who specializes in the study of the English Reformation and the subsequent political and social changes in England. Their research interests include
  the political and religious dynamics of the period, the impact of the Gunpowder Plot and the subsequent events on English society, and the role of Catholics in the political and social landscape of the
  time. They are particularly interested in the experiences of English Catholics during this period and the impact of the Popish Plot on their lives and the political landscape of England.
