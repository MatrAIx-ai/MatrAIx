personas:
  professional: Janice Rattley, age 4, is a budding storyteller who orchestrates elaborate make-believe tea parties for her stuffed animals, using her talkative nature to keep the audience engaged while
    favoring spontaneous improvisation over strict scripts.
  sports: Janice Rattley, age 4, dashes around the local playground playing tag, proudly wears the jersey of the neighborhood kids' soccer team in the fall, and eagerly attends a Tuesday gymnastics class
    where she attempts cartwheels while cheering for the Little League baseball squad.
  arts: Janice Rattley, age 4, sings loudly along to The Wiggles' Fruit Salad and Disney's Let It Go from Frozen, delightfully draws rainbow-filled unicorns inspired by her favorite picture books, and giggles
    whenever she watches Sesame Street’s Elmo dance.
  travel: Janice Rattley, age 4, loves family road trips to the seaside where she builds sandcastles, recently visited the San Diego Zoo and was thrilled by the giraffes, and dreams of one day stepping
    onto the cobblestones of Paris’s Eiffel Tower.
  culinary: Janice Rattley, age 4, adores peanut butter and jelly sandwiches, devours cheesy macaroni, eagerly helps stir pancake batter with a wooden spoon, but stubbornly refuses broccoli, often opting
    for strawberry yogurt as a snack.
  core: Janice Rattley, age 4, blends boundless curiosity with a love for spontaneous play, chats nonstop about imagined worlds, hoards coins in a bright piggy bank, battles sneaky allergies, and never
    misses a chance to sing loudly to The Wiggles.
background:
  cultural: Janice is raised in a Black American family in Perth Amboy, New Jersey. Her household celebrates cultural traditions such as Juneteenth, Black History Month, and family gatherings with soul
    food and music. She is exposed to both the heritage of her ancestors and the diverse multicultural environment of her community, which includes bilingual neighbors and local Caribbean influences. These
    experiences shape her values of community, storytelling, and expressive artistic activities.
attributes:
  skills: '[''Basic counting (1‑10)'', ''Letter recognition (A‑E)'', ''Storytelling through pictures'', ''Social interaction and cooperative play'', ''Imaginative pretend play'', ''Fine motor skills (drawing,
    cutting with safety scissors)'', ''Following simple daily routines'']'
  hobbies: '[''Singing nursery rhymes'', ''Dancing'', ''Drawing and coloring'', ''Building with blocks'', ''Pretend play with dolls and action figures'', ''Playing at the playground'', ''Listening to storytime
    at the library'', ''Participating in community festivals'']'
  career_goals: Although she is only four, Janice often talks about the future with excitement. She dreams of becoming a teacher who can share stories and songs, a performer who can sing and dance on stage,
    and a community helper who assists friends at the local park. Her goals reflect her love of interaction, creativity, and helping others.
