personas:
  professional: Nanci Smith, a seasoned operations manager with three decades of experience steering mid‑size manufacturing and service firms, applies a step‑by‑step, routine‑focused methodology; they consistently
    optimize processes, control budgets, and mentor emerging leaders, ensuring cost‑effective outcomes.
  sports: Nanci Smith walks their beagle daily in Franklin’s parks, participates in the Franklin Senior Walking Club, and they cheer on the Nashville Predators and Tennessee Titans while occasionally joining
    a community pickleball league each spring.
  arts: Nanci Smith immerses themselves in classic country music by listening to Dolly Parton, Johnny Cash, and Patsy Cline, knits heirloom quilts inspired by folk patterns, and loses themselves in historical
    fiction novels by Philippa Gregory, which together shape their creative downtime.
  travel: Nanci Smith prefers meticulously planned itineraries that focus on historic towns and cultural heritage, having visited Charleston, Savannah, and the colonial sites of Williamsburg, they now dream
    of a guided tour of England’s Bath and York, while budgeting each trip to ensure they can also fund their upcoming charitable board commitments.
  culinary: Nanci Smith, an adept home baker, delights in perfecting classic Southern pies such as pecan and peach cobbler, whips up garden‑fresh salads with heirloom tomatoes and zucchini, and while they
    sometimes over‑bake the crust, they relish sharing these dishes at church potlucks and family gatherings.
  core: Nanci Smith is a methodical, community‑oriented retiree whose love of routine fuels a disciplined work ethic, meticulous budgeting, gardening, and quilting, even as they occasionally hoard old recipe
    cards and forget to water succulents.
background:
  cultural: Nanci is a white Southern American who grew up in a middle‑class family in the Midwest before relocating to Franklin, Tennessee, where she has lived for the past two decades. Her cultural identity
    blends Midwestern practicality with Southern hospitality, emphasizing family, community, and Protestant Christian values. She participates in local traditions such as church gatherings, historic preservation
    events, and community service, reflecting the region’s emphasis on neighborly support and respect for tradition. Her background values reliability, self‑reliance, and a modest, service‑oriented lifestyle,
    which shape both her personal and professional demeanor.
