  career_goals: As she approaches retirement, Nanci is focused on leaving a lasting legacy within her organization. Over the next three to five years she aims to spearhead a comprehensive operational efficiency
    initiative that reduces waste and improves profitability, while mentoring emerging managers to ensure smooth succession. She hopes to transition into a senior advisory or consulting role, offering her
    expertise to local small businesses and community non‑profits. Additionally, Nanci wishes to serve on the board of a charitable organization that supports workforce development, blending her professional
    experience with her commitment to community service.
