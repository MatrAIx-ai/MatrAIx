  career_goals: Santiago envisions a future where his love for art and his desire to help others intersect. He aims to study graphic design or visual communication in college, eventually becoming a professional
    illustrator who creates culturally-rich pieces that raise awareness about social issues and celebrate Dominican heritage. Long-term, he hopes to open a community art space in Riverton where youth can
    explore creativity, receive mentorship, and collaborate on projects that strengthen neighborhood harmony.
