personas:
  professional: Santiago Pizano, a 13‑year‑old aspiring digital comic creator, blends sci‑fi narratives with folklore from his family's festive gatherings, using Scratch and watercolor sketches to methodically
    plan multi‑panel stories while mentoring younger kids at the community garden on weekends.
  sports: Santiago Pizano follows the Utah Jazz and Real Salt Lake, plays on his middle school soccer team, spends Saturdays hiking the Wasatch foothills, and occasionally joins a local youth dance class
    to practice basic bachata steps, balancing competitive spirit with a love for the outdoors.
  arts: Santiago Pizano spends afternoons painting watercolors of mountain landscapes while listening to merengue and bachata legends like Juan Luis Guerra and Romeo Santos, draws digital comics inspired
    by Moebius and Caribbean folklore, and attends the Utah Museum of Fine Arts youth workshops to refine his sketching technique.
  travel: Santiago Pizano loves weekend trips to Utah’s national parks such as Zion and Bryce, dreams of visiting the Caribbean islands where family gatherings echo with music and plantain dishes, and hopes
    to explore Tokyo’s anime districts, all while budgeting his allowance for future adventures.
  culinary: Santiago Pizano enjoys cooking mangú with sautéed onions and cheese, perfects crispy tostones with a side of garlic mayo, experiments with adding pineapple to rice‑bean bowls, and can whip up
    a quick watercolor‑inspired fruit smoothie using mango, banana, and coconut milk.
  core: Santiago Pizano is a methodical teen artist who balances vibrant family traditions, a love for digital storytelling, and a perpetual worry about school stress, often found sketching in the garden
    while humming bachata tunes.
background:
  cultural: Santiago’s cultural background is a vibrant mix of Dominican traditions and the experience of growing up in the American West. At home, Spanish is spoken daily, and family gatherings revolve
    around music, dancing, and meals that feature rice, beans, plantains, and mangú. He celebrates Dominican holidays such as Carnaval and Día de la Altagracia, while also participating in Utah’s community
    events and school activities. This dual cultural lens fosters a strong sense of community, respect for family, and an appreciation for both Caribbean rhythms and the natural beauty of the Utah landscape.
