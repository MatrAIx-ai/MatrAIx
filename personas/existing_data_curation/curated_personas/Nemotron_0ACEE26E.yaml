  hobbies: '[''Hip‑hop/R&B dancing'', ''Basketball'', ''TikTok video creation'', ''Digital poster design'', ''Reading mystery novels'', ''Cooking family recipes'', ''Community tutoring'']'
  career_goals: Nateesha aims to graduate high school with a robust portfolio of multimedia work and then pursue a degree in communications, digital media, or user‑experience design. She dreams of becoming
    a content creator and community‑outreach specialist who leverages technology to amplify local youth initiatives and builds inclusive digital platforms for her neighborhood. Long‑term, she wants to mentor
    younger students, sharing the coding and media skills she has acquired to help them discover practical tools for self‑expression and civic engagement.
