personas:
  professional: Tanya Counts, a two-year-old budding architect, spends hours constructing meticulously organized block cities, aligning each brick by color and shape while weaving fantastical narratives,
    showcasing early spatial reasoning, methodical planning, and a vivid imagination.
  sports: Tanya Counts, a sprightly two‑year-old, delights in the neighborhood’s toddler soccer sessions that channel the spirit of the Chicago Cubs while also attending weekly beginner gymnastics at the
    local YMCA, preferring short bursts of activity followed by quiet cuddle time.
  arts: Tanya Counts, an inquisitive two‑year-old, fills her days humming Raffi’s gentle melodies, dancing to Disney’s 'Let It Go', and flipping through Eric Carle’s vibrant 'The Very Hungry Caterpillar',
    which fuel her imaginative storytelling during pretend tea parties.
  travel: Tanya Counts, a curious two‑year-old explorer, loves short family road trips to the nearby seashore in Myrtle Beach and occasional visits to her grandparents’ cottage in the Adirondacks, where
    her meticulously sticker‑adorned photo album documents each adventure.
  culinary: Tanya Counts, a two‑year-old with a budding palate, adores creamy macaroni and cheese sprinkled with mild cheddar, savors banana‑and‑peanut‑butter bites, proudly helps stir her oatmeal with
    a tiny wooden spoon, yet often refuses broccoli, preferring sweet‑potato cubes.
  core: Tanya Counts, a two‑year-old whirlwind of imagination and order, channels boundless curiosity into meticulously arranged block towers, gets anxious when routines shift, and comforts herself with
    repetitive lullaby chants of 'Twinkle, Twinkle' before bedtime.
background:
  cultural: Tanya is raised in a white, middle‑class family in Pleasant Hill, California, within the diverse yet suburban context of Contra Costa County. Her upbringing blends typical American values of
    kindness, community involvement, and a strong emphasis on early education and the arts, while also exposing her to the multicultural influences of the broader Bay Area.
