  hobbies: '[''Attending art classes'', ''Visiting museums'', ''Historical‑fiction book club'', ''Knitting and quilting'', ''Gardening (roses and seasonal flowers)'', ''Playing bridge'', ''Listening to
    live jazz'', ''Volunteering in church choir'', ''Walking her dog'', ''Attending community theater'']'
  career_goals: Priscilla's current ambitions focus on personal fulfillment rather than career advancement. She aims to stay healthy and active, continue learning about art and history, and preserve her
    family's stories by completing a scrapbook and oral‑history recordings for her grandchildren. She hopes to mentor younger volunteers at the senior center, support local arts programs, and perhaps organize
    a community art exhibition showcasing senior creators. Maintaining independence and contributing to her community remain her guiding goals.
