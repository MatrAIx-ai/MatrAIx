    acoustic guitar'']'
  career_goals: He aims to advance to senior technology leadership, targeting roles such as Director of IT or Chief Information Officer, where he can steer organization-wide digital transformation initiatives.
    Alan plans to deepen his expertise in emerging technologies like artificial intelligence, Internet of Things, and advanced data analytics, and to obtain certifications such as PMP, AWS Solutions Architect,
    and CISSP. He is committed to building inclusive, high-performing teams, championing flexible work models that support employee well-being, and fostering community tech education through mentorship
    programs.
