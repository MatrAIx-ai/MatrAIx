  career_goals: David aims to earn the AWS Certified Welding Inspector (CWI) credential within the next two years, giving him credibility for higher‑paid contracts. He plans to launch a small side business
    that creates bespoke metal art pieces for local restaurants, breweries, and community spaces, blending his technical skill with his love of art. By learning CNC plasma‑cutting and basic robotics welding,
    he hopes to expand his services to include prototype fabrication for regional manufacturers. Ultimately, he envisions operating his own workshop that offers both custom fabrication and hands‑on welding
    classes, allowing him to maintain flexibility, support his family, and stay competitive in the local market. He also wants to secure a supervisory role on a major construction project to gain leadership
    experience while preserving time for his creative pursuits.
