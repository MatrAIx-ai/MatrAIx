personas:
  professional: David Bridges is a veteran industrial welder and aspiring Certified Welding Inspector whose two decades of MIG, TIG, and oxy‑acetylene expertise enable them to translate complex blueprints
    into precise metal sculptures, while their curious, competitive streak drives them to continually experiment with reclaimed materials despite their habit of leaving project plans scattered across the
    shop.
  sports: David Bridges is a devoted fan of the Nebraska Cornhuskers football team and the Omaha Storm Chasers baseball club, while spending weekends hunting white‑tailed deer in the Sandhills and casting
    lines for walleye on Lake McConaughy, and they maintain a modest fitness routine at the North Platte Community Gym to keep stamina for long days in the shop.
  arts: David Bridges immerses themselves in the regional art scene by attending openings at the Great Plains Art Hub, photographing the historic Burlington & Missouri River Railroad bridges, sculpting
    reclaimed steel pieces inspired by the kinetic abstractions of Theo Jansen and the American modernist David Smith, and they regularly enjoy folk‑rock performances by The Hush and the bluegrass trio
    The Prairie Reel.
  travel: David Bridges plans their trips on a loosely drawn map, preferring spontaneous road trips to the Badlands and Yellowstone on long summer weekends, while day‑dreaming about a future winter visit
    to Munich’s Oktoberfest and a summer bicycle tour through the Czech countryside, and they balance travel costs with the family’s budget and their occasional work‑related tours to regional manufacturing
    plants.
  culinary: David Bridges, an enthusiastic home cook, favors hearty Midwestern fare like smoked bison brisket, corn‑bread stuffing, and chili spiced with ancho and cumin, often experimenting by welding
    a custom grill rack for outdoor barbecues, and they delight in pairing their meals with local craft beers from Kinkead’s, while occasionally over‑salting their dishes due to a dash of competitive perfectionism.
  core: David Bridges is a rugged, self‑reliant metal artist whose blend of cut‑throat competitiveness, anxious introspection, and a love for solitary craftsmanship drives them to forge both steel sculptures
    and a modest life on the Nebraska prairie.
background:
  cultural: David grew up in a working‑class white family in Scottsbluff, Nebraska, with roots tracing back to German and Czech immigrants who settled the Great Plains in the early 1900s. The community’s
    agricultural and ranching heritage emphasized self‑reliance, hard work, and practical skills, which guided his early interest in metalworking and trades. Local county fairs, high‑school vocational programs,
    and a modest regional arts scene nurtured his curiosity for both craftsmanship and visual art. Though he never pursued higher education beyond high school, the town’s close‑knit culture, church gatherings,
    and appreciation for folk music and craft have shaped his values of independence, competitive spirit, and a subtle appreciation for creative expression.
