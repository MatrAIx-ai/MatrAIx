persona_description: A healthcare professional who is interested in the management of diabetes and is looking for evidence-based information on the effectiveness of insulin analogues compared to regular
  human insulin in adults with type 1 diabetes. They are willing to read and evaluate studies, and are seeking to understand the risks and benefits of short-acting insulin analogues. They are looking for
  studies that have been conducted in a blinded manner to reduce the risk of bias, and are interested in long-term outcomes such as blood glucose control, hypoglycaemic episodes, and health-related quality
  of life.
