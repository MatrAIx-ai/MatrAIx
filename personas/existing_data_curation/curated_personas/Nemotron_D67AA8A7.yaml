personas:
  professional: Cieara Bates, a seasoned community volunteer turned budding outreach coordinator, blends their knack for organizing art events with a warm, Southern‑style hospitality, using Canva flyers
    and digital photography to rally diverse locals while maintaining a flexible, detail‑oriented approach.
  sports: Cieara Bates enjoys cheering on the Texas Rangers, Dallas Cowboys, and Houston Rockets while participating in the Lockhart Walking Club’s weekend nature hikes, fits in a bi‑weekly beginner’s Zumba
    class, and prefers low‑impact gardening as their primary form of exercise.
  arts: Cieara Bates immerses themselves in the local folk art scene, sketches watercolor renditions of Austin gallery exhibits, admires the blues stylings of B.B. King and the storytelling of Townes Van
    Zandt, and volunteers at community pottery workshops, often citing the works of Georgia O’Keeffe as inspiration.
  travel: Cieara Bates favors relaxed road trips through the Texas Hill Country, nostalgic visits to New Orleans’ French Quarter, and cultural pilgrimages to Santa Fe’s art markets, while planning future
    adventures to Oaxaca’s culinary festivals and the historic streets of Edinburgh.
  culinary: Cieara Bates delights in cooking Southern staples like smoked brisket, peach cobbler, and buttermilk biscuits, while experimenting with global flavors such as Thai basil chicken and Moroccan
    tagine, often harvesting fresh rosemary, sage, and lavender from their garden to season their dishes.
  core: Cieara Bates combines a community‑centric Southern generosity with a restless curiosity for art and culture, balancing organized volunteer work with spontaneous garden‑scented baking marathons and
    a habit of collecting vintage postcards.
background:
  cultural: Cieara was raised in a small Texas town and identifies with the broader White American cultural milieu of the Southwest. Her upbringing emphasized community, hospitality, and a strong work ethic,
    shaped by Southern traditions such as church gatherings, family barbecues, and a love for local music. Living in Lockhart—renowned for its historic downtown and vibrant art scene—has exposed her to
    regional folk art and a community commitment to preserving heritage. While she holds traditional values of friendliness and neighborly support, her curiosity drives her to explore diverse artistic movements
    and contemporary cultural ideas, fostering an inclusive outlook that blends her Texas roots with broader American artistic trends.
attributes:
  skills: '[''Volunteer coordination'', ''Event planning'', ''Interpersonal communication'', ''Conflict resolution'', ''Active listening'', ''Basic digital photography'', ''Sketching'', ''Canva design'',
