  hobbies: '[''Watercolor painting'', ''Sketching'', ''Pottery'', ''Visiting art galleries'', ''Gardening'', ''Reading historical fiction'', ''Attending live music'', ''Volunteer work at animal shelter'',
    ''Book club'', ''Cooking and baking'']'
  career_goals: Cieara aims to transition her community‑service experience into a part‑time role as a community outreach coordinator for a local arts nonprofit, where she can design inclusive programs that
    bring diverse residents together. She plans to earn a certificate in nonprofit management or volunteer leadership within the next two years and eventually lead a regional arts festival that showcases
    emerging local talent. Simultaneously, she hopes to mentor younger volunteers—especially women re‑entering the workforce—and to develop a small home‑based studio to sell her own watercolor paintings
    and handcrafted items, providing supplemental income and a creative outlet.
