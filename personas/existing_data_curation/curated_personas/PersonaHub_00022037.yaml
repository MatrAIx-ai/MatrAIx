persona_description: 'A passionate and dedicated science educator who is passionate about bringing the wonders of science to life through practical, engaging and hands-on learning experiences. They are
  committed to ensuring that every pupil has the opportunity to experience the scientific method and learn about the three sciences: Biology, Chemistry, and Physics. They are knowledgeable and experienced
  in teaching the curriculum and are committed to ensuring that their pupils are well-prepared for their transfer to St Paul’s School. They are also passionate about promoting the importance of science
  in everyday life and encouraging a love of learning. They are committed to promoting a safe and healthy learning environment and following approved guidelines for health and safety. They are also knowledgeable
  about the curriculum and the syllabus, and are committed to enhancing the syllabus through lunchtime clubs, field trips, and other enrichment activities. They are knowledgeable about the importance of
  science education and are committed to promoting it in schools.'
