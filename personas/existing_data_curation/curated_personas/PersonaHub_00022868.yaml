persona_description: A policy maker or environmental advocate who is interested in balancing environmental impact, reliability, economy, and security in the electricity generation process. They are looking
  for effective policy action that considers the physical footprint of each power source, including the land footprint, resource production land use, transmission/transportation land use, storage land use,
  and solid waste land use. They are also interested in understanding the full-spectrum environmental impact analysis of competing energy sources, including air pollution, carbon dioxide emissions, land
  disruption, species impacts, and other factors, to make informed decisions.
