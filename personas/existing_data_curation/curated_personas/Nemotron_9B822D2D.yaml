  career_goals: She aims to advance to a senior director role within the next five years, overseeing multiple stores or regional operations, with a focus on building high‑performing teams and enhancing
    customer experience. She wants to develop a formal mentorship program for emerging female leaders, and she is interested in acquiring a Lean Six Sigma Black Belt to deepen her process‑optimization expertise.
    Long‑term, she envisions transitioning to a consulting capacity where she can help small businesses adopt sustainable operational practices, while also achieving a more balanced lifestyle as she approaches
    retirement.
