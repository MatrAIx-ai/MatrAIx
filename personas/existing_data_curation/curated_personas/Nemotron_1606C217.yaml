personas:
  professional: Jeremy Bridges, a 25‑year‑old rigging professional, applies meticulous safety protocols, precise load calculations, and a methodical troubleshooting mindset to every hoist setup, leveraging
    their organized, routine‑driven nature and cooperative communication skills to keep crews on schedule while eyeing senior supervisory roles.
  sports: Jeremy Bridges enjoys pick‑up basketball at the local park, is a member of the Gulf Coast Anglers Association for weekend Gulf‑water fishing, roots for the Houston Texans and Houston Rockets,
    and spends Sundays watching Houston Astros games while maintaining a simple home workout routine to stay fit.
  arts: Jeremy Bridges relaxes to classic R&B legends like Marvin Gaye and Al Green, finds spiritual uplift in gospel artists such as Kirk Franklin, occasionally attends live church choir performances,
    and channels creative energy into woodworking, drawing inspiration from artisans like Andrew Holt.
  travel: Jeremy Bridges prefers short, well‑planned road trips to nearby coastal towns, has explored New Orleans’ French Quarter, spent a weekend at the Florida Keys fishing for grouper, and dreams of
    an Alaskan salmon‑run adventure, but balances travel with a limited budget and family commitments.
  culinary: Jeremy Bridges favors comfort foods, expertly seasons and grills freshly caught red snapper with Cajun spice, slow‑smokes brisket using oak chips, whips up shrimp gumbo with okra and filé powder,
    and enjoys crafting homemade BBQ sauces, though they admit to over‑indulging on weekends.
  core: Jeremy Bridges is a routine‑focused, safety‑obsessed rigging tech who worries about the future, finds solace in fishing, BBQ, and gospel music, yet can’t resist an occasional late‑night video‑game
    session.
background:
  cultural: Jeremy grew up as a Black Floridian in Lynn Haven, surrounded by the tight‑knit culture of the Gulf Coast. His family’s roots in Southern African‑American traditions are evident in the community’s
    emphasis on church, soul food, and music. He values the strong work ethic and mutual support common in his neighborhood, and he draws pride from the region’s blend of coastal recreation and Southern
    hospitality. These cultural influences shape his sense of identity, his respect for collective well‑being, and his commitment to reliable, hands‑on craftsmanship.
attributes:
  skills: '["Rigging and hoisting operations", "Load calculation and weight distribution", "Safety inspections and compliance", "Equipment maintenance and troubleshooting", "Blueprint and diagram reading",
    "Team coordination and communication", "Time management and scheduling", "First aid and emergency response", "Basic welding and metal fabrication", "Inventory control and tool management"]'
  hobbies: '["Fishing", "Barbecuing", "Pick‑up basketball", "DIY woodworking", "Truck maintenance", "Church volunteering", "Listening to R&B and gospel music", "Watching football", "Playing video games"]'
  career_goals: Jeremy aims to advance to a senior rigging supervisor role within the next five years, earning advanced certifications such as the NCCCO Advanced Rigging certification and an OSHA 30‑hour
    construction safety course. He plans to obtain his GED and eventually pursue an associate degree in construction management to broaden his career options. Long‑term, he hopes to become a certified safety
    officer, mentor younger riggers, and possibly launch his own small rigging service to provide stable, well‑paid work for his community while maintaining the routine and reliability he values.
