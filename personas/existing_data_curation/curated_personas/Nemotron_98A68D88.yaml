  hobbies: '[''watching soccer matches with friends'', ''preparing traditional Mexican meals'', ''tending a home vegetable garden'', ''playing guitar at church gatherings'', ''participating in local cultural
    festivals'', ''volunteering in neighborhood clean-up events'', ''organizing block parties'', ''playing card games with family'']'
  career_goals: Carlos aims to obtain his high‑school equivalency (GED) to formalize his knowledge, develop a modest home‑based catering service featuring traditional dishes, become a certified community
    volunteer coordinator, and secure a stable financial foundation for his family while continuing to contribute to neighborhood initiatives.
