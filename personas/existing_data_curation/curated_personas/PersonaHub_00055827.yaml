persona_description: A space astronomer who is interested in the study of Jupiter's moons and their formation. They are particularly interested in the Pasiphae group of moons, which they believe may have
  originated from a single asteroid that was captured by Jupiter's gravity. They are also interested in the differences in color, orbital eccentricity, and inclination among the members of the Pasiphae
  group and the potential explanations for these differences, such as secular resonances with Jupiter's gravity.
