  career_goals: Although currently not formally employed, Sarah aims to leverage her expertise by taking on a leadership role within the Enfield Township Board or a local nonprofit. She plans to complete
    her associate degree in Business Administration, earn a certification in Nonprofit Management, and eventually launch a part‑time consulting service helping small community groups with event planning
    and grant writing. She also hopes to mentor younger women in her town to develop organizational and leadership skills.
