  hobbies: '[''Soccer (forward position)'', ''School drama club acting and set design'', ''DIY science experiments'', ''LEGO building'', ''TikTok video creation'', ''Hiking and nature journaling'', ''Fishing
    with family'', ''Reading mystery novels'', ''Competitive video gaming'', ''Baking cookies'']'
  career_goals: Janna dreams of blending her love for people and science in a future career as a wildlife documentary host or a community youth leader who creates hands‑on STEM workshops. She also hopes
    to become a veterinarian, inspired by local farms, and envisions hosting a teen talk‑show where she can interview peers about their passions. In the longer term, she imagines launching a small online
    brand that sells eco‑friendly crafts she designs, merging her creative skills with practical entrepreneurship. Her ambitions are driven by her competitive spirit and desire to be at the center of collaborative
    projects.
