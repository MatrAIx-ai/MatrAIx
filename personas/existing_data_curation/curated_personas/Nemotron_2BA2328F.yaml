personas:
  professional: Janna Martin, a 12‑year‑old aspiring teen scientist‑theater hybrid, blends curiosity with practicality by leading her school’s drama club set‑design crew while simultaneously conducting
    DIY experiments from beginner science kits, and she leverages her talkative, competitive nature to coordinate group projects and showcase DIY videos on TikTok, positioning herself as a future interdisciplinary
    creator.
  sports: Janna Martin, a forward on the Boon Youth Soccer Club who idolizes the Detroit Lions’ tenacity and the Detroit Tigers’ teamwork, spends afternoons on the field practicing new dribbling drills,
    joins seasonal hiking trips in the nearby forest for cross‑training, and enjoys weekend fishing outings with dad, all while maintaining a relaxed, occasionally disorganized training schedule that reflects
    her competitive spirit.
  arts: Janna Martin, a chatty drama‑club member who loves crafting sets and performing monologues, draws creative inspiration from Lin‑Manuel Miranda’s ‘Hamilton,’ sings along to Taylor Swift’s ‘Shake
    It Off’ while editing DIY TikTok clips, and unwinds with mystery novels by Agatha Christie, blending theatrical flair with pop culture in her after‑school projects.
  travel: Janna Martin, a spontaneous traveler who dreams of road‑tripping to Mackinac Island and the Detroit Museum of Art after school, has already visited the family’s annual county fair and a weekend
    camping trip in Algonquin Provincial Park, and they plan future adventures to Disney World and the Grand Canyon by scrolling TikTok travel guides, balancing a modest allowance with the occasional family‑sponsored
    getaway.
  culinary: Janna Martin, an enthusiastic junior baker who can whisk up chocolate‑chip cookies and help her dad grill fish tacos, favors familiar comfort foods like mac & cheese, apple pie, and s’mores,
    and while they often experiment with extra cheese or a pinch too much salt, they enjoy sharing their culinary creations at neighborhood potlucks and family barbecues.
  core: Janna Martin is a sociable, curiosity‑driven twelve‑year‑old who blends rural hands‑on freedom with digital creativity, thriving on competition, spontaneous projects, and the occasional disorganized
    habit.
background:
  cultural: Janna was born and raised in Boon, a small rural community in Wexford County, Michigan. The town’s Midwestern culture emphasizes close‑knit community ties, respect for nature, and a strong school
    spirit centered on local sports and county fairs. Her family follows a blend of Protestant and Catholic traditions, celebrating holidays like Thanksgiving, Fourth of July barbecues, and community potlucks
    with neighborly generosity. Growing up near forests and lakes, she developed an appreciation for outdoor activities such as fishing, hiking, and seasonal snow play. At the same time, she is digitally
    savvy, using smartphones and social media platforms to stay connected with peers beyond her rural setting. This mix of practical, hands‑on upbringing and modern, connected influences shapes her worldview
    and daily life.
