persona_description: A visionary artist who is passionate about nature conservation, particularly bee conservation. They are interested in using art interventions to promote biodiversity in urban environments
  and create ecological infrastructures. They are skilled in using traditional Bavarian totem techniques to create ecological sculptures and are interested in using QR codes to collect data on wild bee
  species. They are also interested in using totems as a tool for promoting social and artistic activities and believe that they can change people's attitudes towards nature.
