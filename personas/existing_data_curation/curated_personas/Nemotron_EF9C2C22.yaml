personas:
  professional: Shama Jones, a seasoned project management professional, uses their strategic planning, risk assessment, and facilitation expertise across both waterfall and agile frameworks to steer multi‑million‑dollar
    initiatives that merge arts, culture, and community development, while consistently infusing DEI and sustainability principles with calm, analytical precision.
  sports: Shama Jones, an active member of the Capital City Walking Club, enjoys weekend hikes in Shenandoah National Park, attends local tai chi sessions for flexibility, and follows the Washington Capitals,
    Washington Wizards, and Washington Commanders, cheering quietly from home while savoring the calm of solo exercise.
  arts: Shama Jones, an avid gallery‑goer and collector of limited‑edition prints from local contemporary artists such as Kehinde Wiley and Amy Sherald, immerses themselves in classic jazz icons like Miles
    Davis and contemporary neo‑soul voices like Erykah Badu, and shares original poetry at intimate community circles, allowing the arts to continuously inform their personal and professional insights.
  travel: Shama Jones, who favors solitary, reflective journeys, has explored the historic streets of Savannah, captured the lavender fields of Provence on camera, and now dreams of a solo pilgrimage to
    Kyoto’s Zen gardens to photograph seasonal tranquility.
  culinary: Shama Jones, an intermediate home chef, delights in simmering collard greens with smoked turkey, baking sweet potato pie spiced with cinnamon and nutmeg, and crafting herb‑infused garden salads
    featuring basil, thyme, and rosemary, all while listening to classic jazz records that set the kitchen’s rhythm.
  core: Shama Jones, a 58‑year‑old project management veteran with a quiet artistic soul, blends strategic rigor with solitary creative pursuits, disciplined saving, and a steady, curiosity‑driven approach
    to both work and life, and they view each project as an opportunity to fuse analytical precision with artistic expression.
background:
  cultural: Shama was raised in a close‑knit Black family in the Washington, D.C. metropolitan area, where church, storytelling, and community service were central to daily life. Her grandparents migrated
    from the Southern United States, bringing traditions of gospel music, Southern cooking, and oral history that shaped her cultural identity. Growing up, she was immersed in rich cultural expressions
    such as poetry slams, jazz clubs, and community murals, fostering a deep appreciation for art and social justice. This strong sense of community responsibility inspired her career focus on inclusive
    leadership and mentorship, while her personal identity as a Black woman informs her commitment to advancing representation in the corporate sphere. She honors family traditions through celebrations
    like Juneteenth and supports local Black cultural institutions in Fairfax County.
attributes:
  skills: '[''Strategic planning'', ''Risk assessment and mitigation'', ''Stakeholder engagement'', ''Agile and waterfall methodologies'', ''Project scheduling (MS Project, Smartsheet)'', ''Budget development
    and financial tracking'', ''Process improvement and Lean Six Sigma'', ''Change management'', ''Data analysis and reporting'', ''Creative problem solving (design thinking)'', ''Facilitation of interdisciplinary
    workshops'', ''Mentoring and coaching'', ''DEI integration in project governance'', ''Conflict resolution'', ''Vendor and contract management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading African American literature'', ''Nature photography'', ''Backyard gardening'', ''Cooking soul food recipes'', ''Listening to jazz and neo‑soul
    music'', ''Writing poetry'', ''Hiking on local trails (e.g., Shenandoah)'', ''Attending virtual workshops on design thinking'']'
  career_goals: Shama aims to progress to a senior program director or portfolio management role where she can oversee multi‑million‑dollar initiatives, particularly those that intersect with the arts,
    culture, and community development. She seeks to embed diversity, equity, and inclusion and sustainability principles into corporate project frameworks, and to become a recognized speaker on inclusive
    project management. Over the next two years she plans to earn the Project Management Professional (PMP) certification and an advanced Program Management (PgMP) credential. In parallel, she intends to
    mentor emerging Black women project managers through corporate mentorship programs and scholarship initiatives. Ultimately, she envisions launching a boutique consultancy that supports non‑profit arts
    organizations in Fairfax County and the greater Washington region, while transitioning to a part‑time advisory capacity that allows her to continue her personal artistic pursuits.
