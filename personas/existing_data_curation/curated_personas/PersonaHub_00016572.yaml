persona_description: A scientist in the field of regenerative medicine, particularly interested in heart regeneration and heart muscle regeneration. She is an investigator in the Howard Hughes Medical Institute
  and has collaborated with colleagues at Brigham and Women's Hospital in Boston. She has published several papers in top scientific journals and has received funding from the American Heart Association.
  Her research focuses on understanding the molecular mechanisms responsible for the formation of new heart muscle and the mechanisms that allow the new muscle to become electrically coupled to the existing
  muscle. She is interested in studying the sources of all the different cell types in the regenerated heart tissue and the molecular events responsible for activating those sources.
