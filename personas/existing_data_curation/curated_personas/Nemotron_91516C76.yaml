  career_goals: Barbara often talks about what she wants to be when she grows up, and her favorite ideas combine her love for animals with her curiosity about how things work. She dreams of becoming a veterinarian
    because she enjoys caring for the neighborhood dogs and watching nature documentaries, and she imagines diagnosing and helping sick pets. She also mentions wanting to be a scientist—maybe an astronomer—so
    she can explore space and answer questions about the world. Her competitive streak pushes her to aim for the top spot in her school’s science fair, and she hopes to earn a scholarship that will let
    her continue learning in a structured, supportive environment.
