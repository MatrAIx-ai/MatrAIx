personas:
  professional: Barbara Snell is an aspiring junior detective who tackles school projects and mystery books with a LEGO‑style step‑by‑step method, thriving on clear rules yet occasionally allowing spontaneous
    shortcuts when strict order feels overwhelming, and they proudly display the solved puzzles on their bedroom wall while skeptically evaluating the intentions behind each new classroom challenge.
  sports: Barbara Snell is a competitive midfielder on the Riverside Youth Soccer League’s U9 team, practices tactical drills with the same precision she uses in chess, and supplements soccer with after‑school
    swimming lessons at the community pool, while biking around the neighborhood and they treat each ride as an extra practice session, often questioning the fairness of a referee’s call during games.
  arts: Barbara Snell spends evenings sketching wildlife in a style reminiscent of Beatrix Potter, dives into Nancy Drew mysteries for plot inspiration, and hums the ‘Adventure Time’ theme while assembling
    LEGO sets, channeling their competitive edge into artistic detail, and they often compare their drawings to the characters they admire, sometimes doubting whether their work meets the high standards
    they set for themselves.
  travel: Barbara Snell prefers short, structured trips to familiar family‑friendly spots like the nearby lake campground and the science museum in Washington, D.C., while secretly dreaming of a future
    adventure to Tokyo’s kid‑focused museums, balancing parental supervision with a yearning for spontaneous discovery, and they keep a doodled map of dream destinations in their journal, often scrutinizing
    travel plans to guarantee a predictable schedule.
  culinary: Barbara Snell gravitates toward comforting meals like cheesy macaroni, chicken nuggets, and strawberry‑banana smoothies, and when they feel daring they assemble a DIY LEGO‑shaped pizza topped
    with pepperoni and bell‑pepper pieces, though they sometimes over‑indulge in the extra cheese and skeptically assess any unfamiliar ingredient before giving it a taste.
  core: Barbara Snell is a detail‑obsessed eight‑year‑old who solves mysteries with LEGO precision, competes fiercely in games and sports, quietly battles a tide of worries that they dutifully record in
    a secret journal, and skeptically evaluates every new challenge before fully committing.
background:
  cultural: Barbara comes from a white, middle‑class family that has lived in Downingtown, Chester County for several generations. Her heritage includes a mix of German, Irish, and English ancestry, reflected
    in family traditions such as celebrating Thanksgiving with a large turkey dinner, carving pumpkins for Halloween, and attending a local church’s Easter service. Downingtown’s suburban setting offers
    a blend of historic Pennsylvanian charm and modern community life, with town events like the Downingtown Farmers Market, Fourth of July fireworks, and a strong emphasis on school sports and extracurricular
    clubs. These local customs and the county’s emphasis on education and community involvement shape Barbara’s values of responsibility, friendly competition, and appreciation for routine.
attributes:
  skills: '["Reading fluency (grade 2-3)", "Basic addition and subtraction", "Following step-by-step instructions", "Simple daily scheduling", "iPad educational app navigation", "LEGO building", "Pencil
