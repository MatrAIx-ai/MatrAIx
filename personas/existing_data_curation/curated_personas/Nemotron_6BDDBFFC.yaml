  career_goals: In the next five years, Christopher aims to transition into a senior training role at the state police academy, where he can integrate his education expertise with law enforcement experience.
    He aspires to develop community-based programs that use art and creative expression as tools for youth engagement and crime prevention. He also hopes to advocate for mental-health support for officers,
    champion diversity and inclusion initiatives, and eventually serve as a consultant for police departments on modernizing training curricula.
