personas:
  professional: Idaly Rodriguez is a seasoned automotive service technician with an ASE Master certification and an associate’s degree, who channels her curiosity for electric‑vehicle systems into precise
    diagnostics while maintaining a practical, reliable repair approach, and leverages her relaxed, sometimes disorganized mindset to foster a collaborative, mentorship‑focused shop environment.
  sports: Idaly Rodriguez hikes the rugged trails of Red Rock Canyon on weekends, rallies behind the Las Vegas Raiders and Golden Knights, and participates in a local climbing and trail‑running club that
    meets monthly to tackle new routes.
  arts: Idaly Rodriguez finds rhythm in salsa dancing at community Latin nights, fills her garage with the sounds of Ibrahim Ferrer and Arturo Sandoval, and attends the Las Vegas Jazz Festival each spring
    to recharge her creative spirit.
  travel: Idaly Rodriguez prefers road‑trip adventures in her restored 1978 Camaro, having driven the Pacific Coast Highway from San Francisco to Santa Monica, and now dreams of a Caribbean cruise to explore
    island markets and sample fresh seafood.
  culinary: Idaly Rodriguez cooks traditional ropa vieja with slow‑simmered beef, garlic, and olives, perfects salty plantain tostones with lime and a crisp crust, and experiments by adding smoked paprika
    to her homemade mojo sauce for weekend dinner gatherings.
  core: Idaly Rodriguez is a hands‑on auto technician who revives classic cars, salsas up her evenings, mentors budding mechanics, and balances a laid‑back lifestyle with a passion for practical innovation.
background:
  cultural: Idaly grew up in a bilingual Cuban‑American household, where Spanish was spoken at home and English was used in school and work. Her parents emigrated from Cuba in the 1970s, bringing with them
    a strong emphasis on family cohesion, hard work, and cultural pride. This upbringing instilled in Idaly a deep appreciation for Cuban music, dance, and cuisine, which she celebrates through regular
    family gatherings and community festivals in Henderson. She remains actively involved in the local Cuban cultural association, helping organize events that highlight the island’s heritage while also
    bridging connections with the broader Nevada community. Her cultural roots influence her collaborative approach, her warm interpersonal style, and her desire to give back to both the automotive industry
    and her community.
attributes:
  skills: '[''ASE Master Technician'', ''Hybrid and Electric Vehicle Diagnostics'', ''Engine Rebuild and Overhaul'', ''Brake System Repair'', ''Suspension & Alignment'', ''Advanced OBD‑II Troubleshooting'',
    ''Emissions Testing'', ''Parts Inventory Management'', ''Customer Service and Communication'', ''Bilingual Technical Communication (Spanish/English)'', ''Team Mentorship and Training'']'
  hobbies: '[''Restoring a 1978 Chevrolet Camaro'', ''Cooking traditional Cuban dishes (ropa vieja, tostones)'', ''Salsa dancing at community events'', ''Hiking Red Rock Canyon'', ''Volunteering as a STEM
    mentor for middle‑school students'', ''Reading automotive trade magazines'', ''Listening to Cuban jazz and salsa music'', ''DIY home improvement projects'']'
  career_goals: Idaly aims to become a lead technician and eventually a shop manager where she can shape service protocols that blend cutting‑edge technology with reliable, time‑tested practices. She plans
    to earn additional certifications in electric‑vehicle systems and to develop a specialty in low‑emission vehicle maintenance. Over the next five years, she hopes to mentor more women entering the automotive
    field, create a supportive apprenticeship program, and explore the possibility of opening her own independent garage that offers flexible hours for families. Her long‑term ambition is to combine her
    technical expertise with community outreach, perhaps teaching evening courses at a local community college.
