  hobbies: '[''Gardening'', ''Cooking Uruguayan cuisine'', ''Walking on the beach'', ''Listening to tango and candombe music'', ''Crocheting/knitting'', ''Reading historical fiction'', ''Playing bingo and
    card games'', ''Volunteer work at community centers'']'
  career_goals: As she approaches retirement, Gladys aims to transition from day‑to‑day supervision to a mentorship and advisory role. She hopes to formalize a training program for new housekeeping staff,
    improve operational efficiency through streamlined workflows, and act as a part‑time consultant for the facility. Recognizing her decades of service, she aspires to receive a distinguished employee
    award and to leave a lasting legacy of high standards and teamwork for her colleagues.
