personas:
  professional: Roy Kemp, a budding junior coder and LEGO architect, leverages their methodical curiosity and love for planning to craft intricate Scratch games that echo the same precision they apply when
    assembling detailed LEGO sets, often turning solitary projects into small collaborative showcases for a close friend.
  sports: Roy Kemp, an enthusiastic member of the Green Mountain Ravens youth soccer club and a frequent participant in family hikes through the Green Mountains, cheers for the Vermont Catamounts basketball
    team while also maintaining a disciplined after‑school jump‑rope routine that satisfies their love for structured activity.
  arts: Roy Kemp, a quiet devotee of jazz legends like Miles Davis and gospel icons such as Mahalia Jackson, channels their love for storytelling into sketching fantastical space creatures after reading
    Jules Verne, and often unwinds with animated Studio Ghibli films during weekend family movie nights.
  travel: Roy Kemp, who has hiked the trails of Acadia National Park on a family vacation and dreams of exploring the Kennedy Space Center in Florida as well as the historic castles of Bavaria, prefers
    itineraries that blend short, well‑mapped hikes with a modest allowance for a souvenir science kit that they can add to their growing collection.
  culinary: Roy Kemp, a budding home chef who confidently whips up cheese pizza topped with mozzarella and basil, loves a perfectly crispy grilled cheese sandwich with sharp cheddar and a side of tomato
    soup for dipping, and often experiments by adding blueberries to their oatmeal, though they sometimes overcook the pasta when left to themselves.
  core: Roy Kemp, a methodical mini‑explorer who obsessively catalogs every leaf collected, can lose track of time while building LEGO but often forgets to do their chores, and balances a quiet curiosity
    for space with a secret stash of comic books under their pillow.
background:
  cultural: Roy is raised in a supportive African American family that values both cultural heritage and the community spirit of Burlington, Vermont. Family traditions include celebrating Black History
    Month, observing Kwanzaa, and attending a local church where gospel music and storytelling are integral. His parents incorporate African American culinary traditions, such as preparing collard greens
    and sweet potato dishes during family gatherings, while also embracing Vermont's emphasis on local, seasonal foods. Roy participates in school diversity programs and the Burlington African American
    Heritage Festival, which reinforce his pride in his roots while fostering connections with the broader, environmentally conscious community.
attributes:
