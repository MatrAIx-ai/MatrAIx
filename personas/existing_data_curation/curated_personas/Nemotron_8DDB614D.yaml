  hobbies: '["Reading adventure and science books", "LEGO building", "Scratch coding projects", "Exploring nature on local hikes", "Playing chess and strategy board games", "Listening to jazz and gospel
    music"]'
  career_goals: Roy dreams of becoming a creator who can turn ideas into useful tools. He imagines a future as an engineer or inventor who designs gadgets that help people in his community, especially those
    with disabilities. He also expresses interest in the environment, hoping one day to work on sustainable technology that protects Vermont's natural spaces. At this stage, his ambition is to keep learning,
    explore science kits, and participate in school science fairs, building a solid foundation for a career in STEM.
