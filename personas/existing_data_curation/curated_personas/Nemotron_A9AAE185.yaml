personas:
  professional: Bing Li, a three‑year‑old with a love for order, spends hours arranging colored blocks into symmetrical patterns, quietly assigns play roles to friends, and takes pride in keeping the toy
    shelf tidy and labeled, which they consider a miniature museum of their imagination.
  sports: Bing Li, a regular at the Little Lions toddler soccer program, enjoys the rhythmic kicking drills, cheers for the City Hawks mascot during games, and delights in splash‑pad slides at the community
    pool, a routine they look forward to after each nap.
  arts: Bing Li, who adores drawing simple stick‑figure families, sings enthusiastically along to Disney’s ‘Let It Go’ and Pinkfong’s ‘Baby Shark’, and eagerly watches ‘Sesame Street’ episodes featuring
    musician Dr. John, finds that bright colors and repetitive melodies shape their imaginative play, an experience they treasure during quiet afternoons.
  travel: Bing Li, who loves the routine of weekend trips to their grandparents’ house in the countryside, has visited the local zoo’s panda exhibit and looks forward to an upcoming seaside vacation in
    Hawaii, always insisting on bringing their favorite stuffed rabbit for comfort, a habit they believe keeps new places less daunting.
  culinary: Bing Li, who prefers crunchy apple slices, chicken nuggets, and the occasional sweet banana pancake with a drizzle of honey, proudly boasts the ability to spread peanut butter on toast without
    a mess, yet stubbornly refuses broccoli, turning meal times into a predictable negotiation that they approach with playful determination.
  core: Bing Li, a meticulously organized three‑year‑old, balances a love for structured play with heartfelt compassion, turning every snack, nap, and social interaction into a predictable yet caring ritual,
    a pattern they follow with charming consistency.
background:
  cultural: Bing comes from an East Asian (Chinese) immigrant family settled in Jersey City, New Jersey. He is raised in a bilingual household, hearing Mandarin and English. Family life emphasizes harmony,
    respect for elders, and collective well-being, and celebrations such as Chinese New Year and the Mid-Autumn Festival are woven into his routine. The multicultural environment of Hudson County also exposes
    him to a blend of Asian and American customs, fostering an early sense of cultural pride and adaptability.
