  career_goals: Aleida aims to move from a crew member to a shift supervisor within the next two years, leveraging her strong performance record and leadership potential. She plans to complete her associate
    degree in Business Administration (or Hospitality Management) while working, positioning herself for a restaurant manager role at a larger chain. Long‑term, she envisions opening a modest family‑run
    Cuban‑Texan fusion eatery that blends her cultural heritage with local flavors, providing a stable income for her household and a venue for community gatherings. Throughout this path, she seeks structured
    growth opportunities, mentorship, and measurable milestones to keep her competitive drive focused.
