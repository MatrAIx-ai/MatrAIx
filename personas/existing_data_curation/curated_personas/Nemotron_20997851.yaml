personas:
  professional: Aleida Santana is a fast‑food crew member who leverages bilingual fluency, precise POS operation, and a calm, competitively‑driven mindset to consistently crush performance metrics, and
    they are eyeing a shift‑supervisor role within two years.
  sports: Aleida Santana follows the Houston Astros avidly, joins a community softball league on weekends, and squeezes in quick home‑based yoga sessions, blending a laid‑back fitness routine with a quietly
    competitive drive they bring to every game.
  arts: Aleida Santana curates a lively playlist featuring Celia Cruz, Marc Anthony, and Bad Bunny, practices solo salsa steps in their living room, and regularly attends local Latin jazz nights, letting
    rhythmic expression fuel their calm yet competitive outlook they carry into daily life.
  travel: Aleida Santana prefers spontaneous, budget‑friendly road trips to Texas Hill Country vistas like Lost Maples State Natural Area, yet they keep a growing bucket list that includes a culinary pilgrimage
    to Oaxaca, Mexico, balancing a relaxed planning style with occasional craving for cultural immersion.
  culinary: Aleida Santana delights in whipping up ropa vieja smothered in a smoky Texas BBQ glaze, caramelized plantains seasoned with Cajun spice, and fresh black‑bean soup peppered with garden‑grown
    cilantro, showcasing a confident home‑cook’s knack for blending classic island flavors with bold regional twists they relish.
  core: Aleida Santana blends a fiercely competitive, structure‑loving work ethic with a relaxed, spontaneous streak—mastering fast‑food service, backyard gardening, salsa dancing, and occasional impulse
    road trips—while they rarely succumb to anxiety or stress.
background:
  cultural: Aleida is a Cuban‑American raised in a bilingual household in El Campo, Texas. Spanish is spoken at home alongside English, and Cuban traditions—such as preparing dishes like arroz con pollo,
    celebrating Cuban Independence Day, and gathering for music and dance—remain central to family life. The close‑knit Cuban community in Wharton County provides cultural festivals, church gatherings,
    and a strong emphasis on family solidarity. At the same time, Aleida embraces broader Texas influences, including a love for outdoor activities, barbecuing, and a friendly, neighborly spirit. Her cultural
    identity blends the warmth and resilience of her Cuban heritage with the pragmatic, community‑focused values of rural Texas.
attributes:
