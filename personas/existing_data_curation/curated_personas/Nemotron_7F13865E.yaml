  career_goals: Aalok aims to progress from a top‑performing sales representative to a sales manager within the next two years, eventually taking on a regional director role overseeing a multi‑state team.
    He plans to earn the Certified Professional Sales Leader (CPSL) designation and to mentor junior sales staff, building a high‑performance culture. Long‑term, he envisions launching his own consultancy
    that blends technology services with strategic advisory for small‑ and medium‑size enterprises, leveraging his network in the Atlanta tech corridor.
