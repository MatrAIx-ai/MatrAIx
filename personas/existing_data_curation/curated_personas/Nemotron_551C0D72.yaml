  career_goals: Kumiko aims to advance to a senior data architect role where she can shape enterprise‑wide data strategy, drive data‑governance initiatives, and integrate emerging technologies such as AI‑enhanced
    analytics. She plans to earn multiple cloud certifications (AWS Certified Solutions Architect, Microsoft Azure Data Engineer) and to lead a cross‑disciplinary data‑strategy team that balances technical
    excellence with business impact. Long‑term, she envisions contributing to open‑source database tooling and, eventually, moving into a chief data officer position that influences organizational culture
    around data stewardship. Throughout her career progression, Kumiko intends to maintain a healthy work‑life balance, mentor the next generation of DB professionals, and apply her artistic curiosity to
    foster innovative, out‑of‑the‑box solutions.
