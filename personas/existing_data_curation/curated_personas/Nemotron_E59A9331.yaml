  hobbies: '[''LEGO building'', ''Reading picture books'', ''Jigsaw puzzles'', ''Sticker collection'', ''Bharatanatyam practice'', ''Helping in kitchen'']'
  career_goals: Virali dreams of one day becoming a primary school teacher or a librarian, drawn to the predictable routines of a classroom or a library and the practical impact of guiding young children
    in learning. She imagines organizing books, creating orderly lesson plans, and fostering an environment where she can share her love for stories and numbers. Her competitive side fuels a desire to excel
    at the profession, aiming to be recognized for her dedication and reliability.
