personas:
  professional: Clifford Kreplak is a budding digital illustrator and aspiring game developer who spends afternoons sketching characters in a tattered sketchbook, experimenting with Procreate, and building
    simple interactive scenes in Scratch, yet often lets deadlines slip because they prioritize creative flow over strict schedules.
  sports: Clifford Kreplak plays midfield for the local Parkside Soccer Club, follows the Los Angeles Lakers and the Toronto Raptors on TV, and cheers for the professional eSports team Team SoloMid during
    League of Legends tournaments, combining a love of real‑world competition with digital rivalry.
  arts: Clifford Kreplak draws inspiration from Studio Ghibli’s Hayao Miyazaki, the surreal illustration of Brian Froud, and the vibrant street art of Banksy, spends weekends rehearsing improv with the
    school drama club, and collects limited‑edition prints of their favorite fantasy graphic novels, letting these influences shape their personal aesthetic.
  travel: Clifford Kreplak dreams of backpacking through the misty fjords of Iceland after nostalgic trips to Disney World and a family road‑trip along the Pacific Coast Highway, favoring spontaneous, budget‑friendly
    adventures that clash with their worry about getting lost or missing school assignments.
  culinary: Clifford Kreplak’s kitchen repertoire includes mastering instant ramen with soft‑boiled eggs, crafting pepperoni‑pineapple pizza on a home‑cooked crust, and experimenting with mango sticky rice
    after watching a travel vlog, though they often snack on sugary energy drinks while gaming.
  core: Clifford Kreplak is a 14‑year‑old imaginative creator who balances sketchbooks, video games, and drama club with impulsive spending, anxiety‑driven journaling, and a love for both real‑world sports
    and digital competition, all while wrestling with procrastination and a perpetual curiosity.
background:
  cultural: Clifford comes from a middle‑class, Anglo‑American family in North Attleboro, Massachusetts, a suburban community with New England cultural roots. He grew up celebrating typical American holidays
    like Thanksgiving, Fourth of July, and Halloween, and his family places value on community involvement, often attending local fairs, high school sports events, and town meetings. The region’s emphasis
    on education and extracurricular activities has encouraged his participation in school clubs and arts programs. While his household reflects mainstream white American cultural norms, Clifford is also
    exposed to the diverse cultural tapestry of the Greater Boston area through school curricula and local media, shaping a broad but locally grounded worldview.
