  hobbies: '[''sketching and drawing'', ''digital painting'', ''reading sci‑fi/fantasy novels'', ''playing sandbox and competitive video games'', ''participating in drama club/improv'', ''basic coding and
    game creation'', ''journal writing'', ''mindfulness exercises'']'
  career_goals: Clifford aspires to blend his love for art and technology by becoming a game designer or a concept artist for video games and animated films. He dreams of attending a specialized arts high
    school or a STEM‑arts integrated program, eventually earning a degree in interactive media, animation, or visual storytelling. In the near term, he aims to build a portfolio of original comics, short
    animated videos, and indie game prototypes, hoping to win local art competitions and possibly launch a YouTube channel showcasing his creative process. He also envisions collaborating with peers on
    competitive e‑sports teams, leveraging his strategic thinking to lead a squad to tournament success.
