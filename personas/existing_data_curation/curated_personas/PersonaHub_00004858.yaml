  with the various factors that affect the performance of sprinkler systems, including the use of pipe schedules and the importance of considering the flow characteristics of various piping materials. This
  person is also aware of the limitations of pipe schedule systems and the importance of considering the use of hydraulic calculations in fire protection engineering.
