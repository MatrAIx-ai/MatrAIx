    response management'']'
  hobbies: '[''Herb and chili gardening'', ''Cooking traditional Mexican cuisine'', ''Reading business and historical biographies'', ''Fishing at Lake Hartwell'', ''Hiking in the Blue Ridge foothills'',
    ''Listening to boleros and mariachi music'', ''Woodworking small projects'', ''Volunteering at the local food pantry'']'
  career_goals: Approaching retirement, Victorino aims to cement a legacy of operational excellence and collaborative culture. His foremost goal is to mentor a successor—preferably his daughter or a trusted
    lieutenant—by codifying his management practices into a concise operational handbook that can be handed down. Over the next two to three years he plans to transition to a part-time consultant role,
    offering structured efficiency audits to local restaurants that seek predictable, sustainable growth. Simultaneously, he aspires to open a modest family-run eatery that blends authentic Mexican flavors
    with locally sourced Southern ingredients, creating a harmonious dining experience that reflects his cultural roots and community values. He also hopes to volunteer his expertise with regional workforce
    development programs, helping aspiring food-service professionals acquire practical, organized skill sets.
