  hobbies: '[''Jigsaw puzzle assembly'', ''Sudoku solving'', ''Vegetable gardening'', ''Yoga practice'', ''Running along the Hudson River'', ''Vietnamese cooking (pho, bánh mì, spring rolls)'', ''Volunteering
    at Vietnamese cultural festivals (event logistics and documentation)'']'
  career_goals: Hien aims to advance from a senior technologist role to a lead engineering technician position within the next five years, where she can oversee complex manufacturing projects and mentor
    junior staff. She plans to earn the Certified Manufacturing Technologist (CMfgT) credential and eventually pursue a master’s degree in engineering management to blend her technical expertise with leadership
    skills. Her long‑term ambition includes establishing a boutique consulting firm that helps small manufacturers implement rigorous quality systems and lean processes, allowing her to achieve high professional
    standards while maintaining a structured, predictable work environment that supports her mental well‑being.
