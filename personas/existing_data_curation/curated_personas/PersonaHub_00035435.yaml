persona_description: A conservation biologist and naturalist who specializes in fire science and principles, particularly in the management and application of controlled burning to maintain ecological integrity
  and human safety in sensitive ecosystems, including those in the upstate of South Carolina. He is highly trained in fire management and conducts all aspects of prescribed burns with careful timing and
  thorough knowledge of weather and fire behavior. He emphasizes the ecological benefits of prescribed fire, reducing fuel on the forest floor and lessening the chances of catastrophic wildfires. He is
  known for using prescribed burning to restore natural processes and reducing the chances of a catastrophic wildfire in sensitive areas.
