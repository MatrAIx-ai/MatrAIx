    and improvisation'']'
  hobbies: '[''Automotive sketching and painting'', ''Scale model car building'', ''Digital illustration'', ''Reading science-fiction and fantasy'', ''Listening to eclectic music'', ''Mindfulness meditation
    and journaling'', ''Photography of landscapes and industrial sites'', ''Hiking and nature walks'', ''Attending small art exhibitions'', ''Participating in a local photography club'']'
  career_goals: Sebastian aims to earn ASE Master Technician certification within the next two years, deepen his expertise in electric-vehicle systems, and eventually open a boutique garage that specializes
    in custom-art car builds, marrying his mechanical skill with his love of visual art. He wants to create a space where he can work on small-batch projects for enthusiasts, offering personalized design
    consultations while maintaining a flexible schedule that eases his anxiety. He also hopes to mentor a handful of apprentices in a cooperative environment, emphasizing teamwork and mutual respect. Long-term,
    he envisions his shop becoming a community hub for local car-culture events, art shows, and occasional workshops on sustainable vehicle maintenance, balancing his professional growth with his family
    responsibilities.
