persona_description: A Social Studies teacher who is responsible for developing and implementing new instructional units on the Spokane Indian tribe and their interactions with white Europeans who explored
  and moved west in response to Washington State requirements. The teacher uses the state department of education's Tribal Sovereignty Curriculum Flow Chart, identifies learning objectives and essential
  questions, and builds units using primary source texts and historical maps from public domain collections such as the Library of Congress and Wikimedia Commons. The teacher also writes student activities
  around selected primary sources, evaluates completed units using a rubric, and incorporates teacher feedback to refine the units.
