persona_description: 'A historian or genealogist who is interested in the life and career of Martha Washington Harpold, a Texas woman who wrote extensively on the political and social issues affecting women
  in Texas during the late 19th and early 20th centuries. The scrapbook documents her writing career and contains articles discussing life in the Panhandle region, political and social issues, book reviews,
  and the construction of railroads in new cities and regions. The collection is open for research use and was processed and cataloged with funds from the National Historical Publications and Records Commission
  (NHPRC) for the Briscoe Center’s "History Revealed: Bringing Collections to Light" project, 2009-2011.'
