  career_goals: Imogene aims to build a stable career in facilities management that offers both financial security and growth opportunities. Over the next few years she plans to complete a custodial management
    certification at a local community college, learn advanced building-systems maintenance, and seek a supervisory position within her current workplace or a larger property-management firm. Long-term,
    she hopes to become a lead building services manager or start a small, eco-focused cleaning business that can support her married life and future family. She also values continuing education, so she
    intends to take occasional workshops on energy-efficient building practices and leadership, positioning herself for promotions and greater responsibility.
