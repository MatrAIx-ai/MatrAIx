personas:
  professional: Imogene Casto, a diligent building cleaner who leverages meticulous cleaning protocols and a curiosity for greener solutions, is on a fast‑track toward facilities‑management certification,
    and they balance pragmatic efficiency with innovative, eco‑friendly workflow tweaks.
  sports: Imogene Casto enjoys weekend hikes in the Wasatch foothills, participates in a local trail‑running club that meets for early‑morning runs, follows the Utah Jazz during the NBA season, and they
    have a seasonal penchant for cross‑country skiing at Alta, balancing low‑impact cardio with occasional indoor climbing sessions at a Salt Lake City gym.
  arts: Imogene Casto channels their love of visual storytelling through landscape photography inspired by Ansel Adams, knits scarves while listening to indie folk duo The Lumineers, and they attend monthly
    open‑mic nights featuring local singer‑songwriters at a downtown café, finding artistic solace in both the DSLR and the knitting needles.
  travel: Imogene Casto prefers low‑key road trips to national parks like Zion and Bryce, planning each outing in a spreadsheet to maximize campsite bookings while staying within a modest budget, and they
    dream of a future eco‑retreat in Costa Rica, though they currently balance travel goals with the financial demands of a newly‑married life.
  culinary: Imogene Casto relishes preparing simple, plant‑based meals such as quinoa‑black bean salads and roasted carrot‑curry bowls, experiments with homemade kombucha and citrus‑infused cleaning sprays,
    and they occasionally over‑indulge in late‑night pizza slices while binge‑watching DIY renovation shows.
  core: Imogene Casto is a detail‑oriented dreamer who can juggle a floor‑scrubbing schedule, a hiking trail map, and a knitting project all while budgeting every cent, but they sometimes forget to water
    their indoor succulents.
background:
  cultural: Imogene grew up in a suburban neighborhood of Sandy, Utah, within a predominantly White, middle-class community that values hard work, family ties, and civic involvement. The region’s cultural
    milieu—shaped by the outdoors-oriented lifestyle of the Intermountain West and the strong sense of community service common in the area—has instilled in her a respect for tradition, modesty, and collaborative
    effort. While she may have been exposed to the local Latter-Day Saint cultural influences, her personal identity reflects a blend of mainstream American values, a pragmatic work ethic, and an appreciation
    for the natural landscape surrounding her home.
