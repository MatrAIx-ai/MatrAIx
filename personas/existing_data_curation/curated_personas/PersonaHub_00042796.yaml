persona_description: A group of scientists, researchers, and technologists who are interested in the study of plant ecology, biodiversity, and climate change. They are working towards developing a comprehensive
  and standardized database of botanical data, integrating data from various sources such as herbaria, ecological plots, surveys, taxonomies, and phylogenies. They aim to create a baseline informatics infrastructure
  to support repeatable research and provide feedback to the original data providers on the quality and necessary corrections to their data. This infrastructure will empower both basic and applied questions
  regarding the ecological impacts of global climate change on plant biodiversity.
