personas:
  professional: Lliliam Ramirez, a charismatic bilingual community storyteller, blends their event coordination expertise, watercolor artistry, and love for jazz to host senior center gatherings while producing
    an oral‑history podcast that captures local heritage.
  sports: Lliliam Ramirez stays fit by dancing salsa three nights a week, participates in a senior basketball league at the local recreation center, and cheers for the Orlando Magic, while also playing
    weekly chess matches at the community club.
  arts: Lliliam Ramirez paints vivid watercolor scenes inspired by Caribbean sunsets, collects photographs of Orlando's street festivals, enjoys live performances by jazz saxophonist Kamasi Washington and
    Latin singer Marc Anthony, and reads science‑fiction works by Octavia Butler and philosophical essays by Michel Foucault.
  travel: Lliliam Ramirez enjoys planning culturally immersive trips, favoring spontaneous weekend getaways to San Juan’s historic Old Town and organized tours of New Orleans’ jazz districts, while saving
    for a dream cruise to the Caribbean islands that evoke the colors of their palette.
  culinary: Lliliam Ramirez expertly prepares arroz con gandules with sofrito, lechón, and green olives, crafts silky tembleque with coconut milk and cinnamon, and experiments with simmered black beans
    and plantain mofongo, often pairing their meals with a glass of tropical guava juice.
  core: Lliliam Ramirez is a vibrant, talkative elder who channels their imagination into watercolor, salsa, and storytelling, balancing disciplined organization with a zest for spontaneous creativity and
    occasional stubbornness about tech.
background:
  cultural: Born in San Juan, Puerto Rico, Lliliam grew up immersed in the island’s vibrant music, cuisine, and family traditions before relocating to Orlando in his early thirties. He maintains fluency
    in Spanish and a deep connection to Puerto Rican customs, celebrating holidays such as Three Kings Day, Noche de San Juan, and the Festival de la Calle San Sebastián with gusto. His upbringing in a
    close-knit extended family fostered a love for communal gatherings, oral storytelling, and shared meals. In Orlando, he has become a fixture in the local Boricua community, regularly participating in
    cultural events at Casa Borinquen and supporting the city’s growing Puerto Rican diaspora. His experiences navigating the challenges of migration, the aftermath of Hurricane Maria on his relatives,
    and the nuances of multicultural identity shape his worldview and inform his dedication to preserving cultural heritage for future generations.
attributes:
  skills: '["Public speaking and MC duties", "Event coordination", "Bilingual Spanish-English communication", "Storytelling and oral history", "Watercolor painting and photography", "Culinary arts (Puerto
    Rican cuisine)", "Handyman/home repair", "Community mentorship", "Strategic games (chess, puzzles)", "Podcast production and editing"]'
  hobbies: '["Watercolor painting", "Photography", "Salsa dancing", "Cooking Puerto Rican cuisine", "Attending live jazz and Latin music concerts", "Chess and puzzle solving", "Reading science-fiction and
    philosophy", "Volunteering as a mentor at senior centers", "Hosting storytelling workshops", "Learning to play the ukulele"]'
  career_goals: Lliliam aims to preserve and celebrate the Puerto Rican experience in Orlando by launching a community oral-history podcast that intertwines personal narratives with abstract reflections
    on identity and migration. He aspires to author a memoir that blends his imaginative storytelling with critical insights into the challenges faced by his generation. Additionally, he plans to develop
    an intergenerational arts workshop that teaches painting and traditional cooking to seniors, positioning himself as a cultural guide for local heritage tours. Though retired, he seeks to stay intellectually
    vibrant by completing a certificate in genealogy and learning to play the ukulele, thereby expanding his creative repertoire.
