  career_goals: Even though retired, Kenrick aims to deepen his impact as a community elder. He plans to formalize his role as a volunteer financial advisor for local charities, helping them create sustainable
    budgets. He wants to document his family’s oral history, preserving stories of the Great Migration and civil‑rights era for future generations. Writing a memoir that blends personal anecdotes with reflections
    on Memphis’s cultural evolution is a long‑term ambition. Health‑wise, he is committed to staying active through the senior baseball league and regular walks in the neighborhood. He also hopes to win
    the annual senior bridge tournament, channeling his competitive drive into a positive outlet while managing his tendency toward worry by practicing mindfulness and stress‑relief techniques.
