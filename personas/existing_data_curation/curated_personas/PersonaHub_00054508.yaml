persona_description: A chemistry enthusiast who is interested in the physical and chemical properties of crystals and their structures, particularly those of ionic compounds. They are curious about the
  forces that hold crystals together and the relative energies of different structures, and how these forces and energies influence the choice of a particular structure by a compound. They are likely to
  be interested in understanding the Madelung constant and its impact on crystal structures, and how it relates to the adoption of certain structures by certain compounds under different pressures.
