persona_description: A scientist with expertise in nanotechnology, specifically in the development of antimicrobial viruses using biotechnology. They have a background in physics and engineering, and have
  successfully re-engineered a fragment of lactoferrin to create a nanoscale building block for virus-like capsules that can effectively target and damage bacterial membranes. They have also developed a
  high-speed measurement platform to monitor the activity of these capsules in real time. The persona is interested in the potential applications of these capsules in the fight against antimicrobial resistance
  and is dedicated to developing new strategies for tackling this growing public health threat.
