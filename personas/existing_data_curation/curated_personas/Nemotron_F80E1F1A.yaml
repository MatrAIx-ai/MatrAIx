  career_goals: Approaching retirement, David aims to transition his decades of hands‑on experience into a mentorship and consulting role. He plans to obtain a state‑approved apprenticeship supervisor certification,
    allowing him to train the next generation of drywall and finishing tradespeople. Driven by his curiosity, he is also exploring green‑building certifications, hoping to advise homeowners on energy‑efficient
    insulation and low‑VOC plaster solutions. Despite his pragmatic outlook, David remains ambitious about establishing a modest, owner‑operated contracting boutique that focuses on senior‑friendly home
    renovations, leveraging his organized planning skills to guarantee timely, low‑stress projects. He views these goals as a way to channel his emotional intensity into purposeful work, securing a legacy
    of craftsmanship and community contribution.
