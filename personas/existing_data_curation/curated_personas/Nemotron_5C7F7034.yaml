  hobbies: '[''Watercolor painting'', ''Photography'', ''Reading philosophy and art books'', ''Attending theater productions'', ''Playing chess'', ''Gardening'', ''Hiking'', ''Woodworking'']'
  career_goals: Approaching retirement, George aims to transition into a senior leadership role where he can shape regional procurement strategy for a large agribusiness, championing sustainable, locally
    sourced produce. He seeks to mentor the next generation of buyers, develop a mentorship program within his company, and eventually launch a consultancy that helps small farms access larger markets while
    reducing environmental impact. He also hopes to embed technology—such as AI‑driven demand forecasting—into the purchasing process to improve resilience against market volatility.
