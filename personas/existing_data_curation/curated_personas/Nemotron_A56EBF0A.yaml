  career_goals: Eric aims to graduate high school with a solid GPA and then pursue a technical trade certification, such as an automotive technology or electrical apprenticeship, that offers clear career
    pathways and stable employment. He is drawn to roles that provide structure, responsibility, and the chance to serve his community, so he also considers becoming a certified first responder or joining
