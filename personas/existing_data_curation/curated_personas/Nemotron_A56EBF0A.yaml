personas:
  professional: Eric Seijo, a 15‑year‑old aspiring software developer and systems architect, channels their love of order and strategy from Civilization and model‑building into meticulous coding projects,
    hackathons, and school robotics club, where they consistently deliver reliable, high‑precision solutions.
  sports: Eric Seijo enjoys hiking the rugged Appalachian trails on weekend outings, joins a small group of friends for pickup basketball where they idolize the Washington Wizards while also cheering for
    the Pittsburgh Steelers and Pittsburgh Penguins, and maintains a disciplined fitness routine that blends cardio hikes with quick court sprints.
  arts: Eric Seijo immerses themselves in building intricate LEGO and airplane model kits, reading classic sci‑fi works by Isaac Asimov and Arthur C. Clarke, and listening to the ambient soundscapes of
    C418 from Minecraft alongside the cinematic scores of Hans Zimmer, which together shape a meticulously creative yet solitary aesthetic.
  travel: Eric Seijo relishes low‑key weekend hikes in the Appalachian region, dreams of visiting the historic streets of Washington, D.C., hopes to explore the neon‑lit districts of Tokyo, and plans a
    family road trip to the Grand Canyon, balancing budget constraints with a desire for immersive, structured itineraries.
  culinary: Eric Seijo favors comfort foods like pepperoni pizza, tends to follow detailed recipes for homemade spaghetti carbonara using pancetta and pecorino, experiments with crafting custom Minecraft‑themed
    cupcakes, and occasionally whips up simple microwaveable mac and cheese bursts when homework deadlines loom.
  core: Eric Seijo is a methodical teen who transforms solitary strategy games into real‑world problem solving, yet secretly hoards soda cans in their room as a quirky rebellion against their otherwise
    orderly life.
background:
  cultural: Eric grew up in Mountain Top, a small borough in Luzerne County, Pennsylvania, within a predominantly white, working‑class community that blends Appalachian and Northeastern U.S. cultural influences.
    His family’s heritage likely includes German and Irish roots common to the region, and a modest, Protestant (likely Methodist) upbringing that emphasizes hard work, self‑reliance, and community service.
    The local culture values practical skills, neighborly cooperation, and a quiet, orderly lifestyle, all of which shape Eric’s preferences for structure, reliability, and harmonious relationships.
