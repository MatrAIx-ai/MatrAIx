personas:
  professional: Zenaida Mira is a budding elementary school soccer captain who channels their energetic, routine‑loving nature into leading daily practice while juggling occasional forgetfulness about homework
    and a love for drawing bright team banners.
  sports: Zenaida Mira is a spirited member of the Evansville United youth soccer team who idolizes the Indiana Pacers basketball squad, spends Saturday mornings at the community field mastering ball control,
    and enjoys cheering on the local Evansville Thunder during the hockey season.
  arts: Zenaida Mira is a colorful doodler who fills sketchbooks with vibrant scenes inspired by carnival festivities and dances to salsa hits by Marc Anthony and Celia Cruz, while also attending weekly
    storytime sessions featuring Mo Willems at the Evansville Public Library.
  travel: Zenaida Mira is a curious traveler who dreams of exploring the bustling streets of Panama City during Carnaval and also loves weekend family trips to Brown County State Park for leaf‑popping hikes,
    balancing these wishes with the practical limits of school schedules and a modest family budget.
  culinary: Zenaida Mira is an enthusiastic kitchen helper who expertly rolls empanada dough with a generous splash of cilantro, assists in simmering a hearty sancocho broth, and, after a snack of cheese‑filled
    quesadillas, proudly declares they can make a perfect peanut butter sandwich all by themselves.
  core: Zenaida Mira blends a love for soccer, salsa rhythms, and bright drawings into a routine‑driven yet delightfully spontaneous 7‑year‑old who balances pocket‑money savings, occasional health mishaps,
    and big dreams of carnival adventures.
background:
  cultural: Raised in a Panamanian household in Evansville, Indiana, Zenaida grows up speaking both Spanish and English. Her family celebrates Panama's national holidays, such as Independence Day and Carnaval,
    with music, dance, and traditional foods like sancocho and empanadas. They stay connected to the local Latin community through church services and community festivals, blending Panamanian customs with
    Midwestern American life and providing a familiar, routine‑oriented cultural foundation.
