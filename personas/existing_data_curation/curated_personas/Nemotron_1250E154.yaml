personas:
  professional: Jessie Scott is a mechanical engineer who leverages their solid grounding in 3‑D CAD, finite‑element analysis, and Lean Six Sigma to drive sustainable product development, blending methodical
    planning with a collaborative, assertive style that inspires cross‑functional teams.
  sports: Jessie Scott stays active through a co‑ed soccer league with the Warwick Wanderers, weekly hikes along the Blackstone River Trail, and a disciplined routine of strength training, cheering on the
    New England Patriots and Boston Red Sox while maintaining friendly competition with teammates to keep their energy high.
  arts: Jessie Scott unwinds by attending live jazz and R&B shows featuring Kamasi Washington, Gregory Porter, and H.E.R., while also curating a modest vinyl collection of Stevie Wonder and Nina Simone,
    and they occasionally dabble in sketching mechanical concepts inspired by the fluid lines of contemporary sculptor Anish Kapoor.
  travel: Jessie Scott prefers meticulously planned weekend getaways, often exploring New England coastal towns like Newport and Martha’s Vineyard, and they dream of a summer road trip through the Caribbean
    to sample island cuisine and later an eco‑tour of Iceland’s geothermal power sites, balancing their travel budget with work commitments.
  culinary: Jessie Scott, a confident home cook, blends soulful recipes like chicken‑and‑dumplings with New England staples such as lobster roll and clam chowder, frequently seasoning with smoked paprika,
    hot sauce, and fresh thyme, and they love sharing these meals at community potlucks while occasionally treating themselves to upscale sushi nights.
  core: Jessie Scott is a methodical yet gregarious engineer who meticulously budgets every expense, chronically forgets dentist appointments, devours jazz on repeat, and habitually tinkers with Arduino
    projects late into the night, turning curiosity into concrete solutions.
background:
  cultural: Jessie grew up as a Black woman in West Warwick, Rhode Island, where her family’s roots trace back to the Southern United States and a small Caribbean lineage. The close‑knit African‑American
    community in the area, church gatherings, and local Juneteenth celebrations shaped her sense of identity and resilience. She draws inspiration from the legacy of Black engineers like Mary Jackson and
    actively participates in regional Black History Month events. This cultural heritage fuels her commitment to representation in STEM, community mentorship, and the preservation of family traditions such
    as soulful cooking and storytelling.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''CATIA'', ''ANSYS'', ''CNC programming (G‑code)'', ''GD&T'', ''Material selection'', ''Preventive maintenance'', ''Lean manufacturing'', ''Six Sigma Green Belt'',
    ''Project management'', ''Technical writing'', ''Team leadership'']'
  hobbies: '[''Soccer league'', ''Hiking'', ''DIY home improvement'', ''Arduino and 3D‑printing projects'', ''STEM mentorship'', ''Jazz and R&B concerts'', ''Cooking soul food'', ''Traveling to cultural
    heritage sites'']'
  career_goals: Looking ahead, Jessie aims to earn her Professional Engineer (PE) license within the next three years and transition into a senior mechanical‑engineer role where she can lead complex product‑development
    projects. She is particularly interested in integrating sustainable design practices and additive manufacturing into her work. In the medium term, she aspires to become an engineering manager, guiding
    multidisciplinary teams while mentoring other women and under‑represented minorities in STEM. To support these goals she plans to complete an online master’s program in Mechanical Engineering with a
    focus on renewable energy systems.
