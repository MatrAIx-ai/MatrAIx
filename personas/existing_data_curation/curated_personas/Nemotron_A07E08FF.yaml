personas:
  professional: Maria Velasquez, a retired curator and visual artist in Milwaukee, leverages their deep expertise in 20th‑century modernism and folk traditions to design intimate, concept‑driven exhibitions,
    while their imaginative curiosity drives experimental projects and their relaxed, disorganized approach often leads them to embrace spontaneous, last‑minute curatorial decisions.
  sports: Maria Velasquez, an avid walker, stays active through daily strolls along the Milwaukee lakefront and a weekly senior yoga class, supports the local basketball team the Bucks and the baseball
    team the Brewers, and prefers low‑impact exercise that dovetails with their gardening hobby, even though they often skip scheduled gym sessions when an art project captures their attention.
  arts: Maria Velasquez, an abstract painter, immerses themselves in bold canvases inspired by the striking colors of mid‑century muralists and the lyrical narratives of contemporary poets like Ocean Vuong
    and Anne Carson, attends intimate poetry readings featuring local spoken‑word artists, and experiments with digital illustration to document their creative process, all while maintaining a habit of
    sketching in a worn notebook at every exhibition opening.
  travel: Maria Velasquez, a thoughtful traveler, favors small‑group trips that blend art pilgrimages with leisurely exploration, having recently visited the historic art colonies of Santa Fe and the vibrant
    street markets of Marrakech, they dream of a quiet retreat in the lavender fields of Provence to sketch and meditate, yet they keep travel budgets modest to fund their community projects.
  culinary: Maria Velasquez, a home cook, delights in preparing traditional family recipes such as slow‑cooked mole, hand‑made corn tortillas, and fragrant tamarind‑infused aguas frescas for close friends,
    while their modest cooking skill level allows them to master a few signature dishes, and they balance occasional indulgence with a disciplined intake of fresh garden herbs like cilantro and epazote.
  core: Maria Velasquez, a fiercely inventive, solitary curator‑artist, channels their competitive curiosity into vibrant abstract works, lives on a disciplined retirement budget, battles mild health issues
    with adaptive tools, and finds calm in daily walks and the occasional experimental pottery session.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in Milwaukee's vibrant Mexican community. Bilingual and deeply connected to her heritage, she celebrates traditions such as Día de los
    Muertos and shares Mexican folk arts with local cultural centers. Her upbringing in a modest immigrant household fostered resilience and a strong sense of identity, influencing her artistic focus on
    cultural memory and the negotiation of dual cultural narratives.
