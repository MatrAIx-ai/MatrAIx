  career_goals: Although retired from formal employment, Maria aims to leave a lasting imprint on Milwaukee's Mexican‑American cultural scene. She plans to curate a traveling exhibition of contemporary
    Mexican diaspora artwork, publish a collection of poetry inspired by abstract visual themes, and mentor emerging artists through small workshops. She also hopes to create a digital archive of oral histories
    and folk art from her community, securing recognition for preserving this heritage while maintaining the flexibility to explore new artistic mediums as they arise.
