personas:
  professional: Magda Hernandez is a freelance home‑appliance repair specialist who leverages diagnostic software, multimeter expertise and bilingual communication to diagnose everything from vintage refrigerators
    to smart‑connected washers, and they apply a relaxed, flexible scheduling style that lets curiosity about IoT upgrades coexist with a cooperative, customer‑focused demeanor.
  sports: Magda Hernandez follows the New York Knicks and Yankees, participates in the Queens Salsa Dance Club which they treat as cardio, joins a weekend softball league at Flushing Meadows, and they sprinkle
    in early‑morning jogs along the Rockaway boardwalk whenever the weather allows.
  arts: Magda Hernandez enjoys the music of Celia Cruz, Marc Anthony, and the visual storytelling of Frida Kahlo exhibitions, regularly attends live salsa nights at local venues and catches a Broadway show
    when a friend invites them, and they collect vintage vinyl records that remind them of the cultural rhythms that shape their social life.
  travel: Magda Hernandez prefers spontaneous weekend getaways, has explored the street‑food markets of Barcelona, the historic plazas of Oaxaca, and the hiking trails of the Catskills, and they balance
    these trips with family obligations by booking affordable flights through points earned on a travel rewards credit card.
  culinary: Magda Hernandez cooks Mexican staples like tamales, mole poblano, and chiles rellenos with a flair for layering spices such as ancho chilies, dried pasilla, and fresh cilantro, they grow a herb
    garden of oregano and epazote to garnish dishes, and they relish sharing their culinary creations at neighborhood potlucks and food‑truck festivals.
  core: Magda Hernandez blends a curiosity for tech with a love for community dance, turning appliance repairs into friendly bilingual consultations, while their relaxed approach sometimes leads to forgotten
    appointments but fuels a vibrant, collaborative life.
background:
  cultural: Magda’s Mexican heritage is a vivid thread in her daily life. Raised in a bilingual household, she speaks Spanish fluently and often incorporates Mexican idioms and humor in her interactions.
    Family values like "familismo" and respect for elders shape her cooperative and kind nature. She honors cultural traditions such as Día de los Muertos and celebrates major Mexican holidays with food,
    music, and community gatherings. Living in Saint Albans, Queens, she blends these roots with the multicultural fabric of the borough, participating in local Latin festivals, supporting Mexican‑American
    businesses, and serving as a cultural bridge between her neighbors and her own heritage.
attributes:
  skills: '[''Appliance diagnostics'', ''Electrical and mechanical repair'', ''Smart appliance troubleshooting'', ''Use of diagnostic software'', ''Bilingual communication (English-Spanish)'', ''Customer
    service and relationship building'', ''Problem solving'', ''Basic electronics'', ''Inventory and cost estimation'', ''Flexible scheduling and time management'']'
  hobbies: '[''Salsa and cumbia dancing'', ''Cooking traditional Mexican cuisine'', ''Attending Queens Hispanic Heritage Festival'', ''DIY home improvement projects'', ''Gardening herbs and vegetables'',
    ''Exploring new consumer technology'', ''Reading tech magazines'', ''Volunteering at community centers'', ''Bilingual tutoring for youth'']'
  career_goals: Magda aims to formalize her expertise by obtaining NASTA certification and expanding her solo repair practice into a small neighborhood service shop that offers maintenance contracts for
    smart‑home appliances. She envisions becoming a trusted go‑to technician for the diverse Queens community, especially Spanish‑speaking residents. Long‑term, she hopes to mentor aspiring technicians
    through a community apprenticeship program, integrate eco‑friendly appliance solutions, and eventually launch a boutique line of refurbished appliances marketed to cost‑conscious families.
