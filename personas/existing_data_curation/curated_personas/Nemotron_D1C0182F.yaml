  career_goals: As he matures, Sumintra envisions a career that marries his curiosity about how things work with his desire to serve his community. He aspires to become a civil engineer or urban planner
    who designs sustainable, family‑friendly public spaces—parks, community centers, and safe playgrounds—in Ventura County, integrating modern design with Vietnamese cultural elements. He also dreams of
    mentoring younger children through youth programs, fostering curiosity, cooperation, and kindness.
