  career_goals: Benjamin frequently declares that he wants to become a firefighter because he loves the bright trucks and the idea of helping people, a pilot to soar above the clouds, and a teacher to share
    stories with younger kids. He also dreams of one day being the mayor of his small town, where he could organize community events and be at the center of town celebrations. His competitive streak pushes
    him to imagine leading a team, while his calm disposition assures him that he will handle responsibilities with confidence.
