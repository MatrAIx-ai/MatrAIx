personas:
  professional: Dylan Phelps leverages three decades of high‑pressure commercial kitchen experience to streamline dishwashing operations, enforce stringent sanitation protocols, and mentor new staff, while
    their spontaneous problem‑solving mindset prepares them for a supervisory role in facilities management and eventual consulting.
  sports: Dylan Phelps cycles the Portland greenways with the local Rose City Riders club, hikes the Columbia River Gorge on weekends, roots for the Portland Timbers during the MLS season, and maintains
    a modest indoor treadmill routine during rainy winter months.
  arts: Dylan Phelps finds creative release playing the harmonica to the blues of Little Walter, dives into historical nonfiction by Erik Larson, and builds simple timber furniture inspired by George Nakashima,
    occasionally showcasing pieces at neighborhood open‑mic nights.
  travel: Dylan Phelps prefers low‑key road trips, having explored the Oregon Coast’s Cannon Beach and the historic streets of San Francisco, while they dream of a culinary pilgrimage to Tuscany’s vineyards,
    favoring detailed itineraries over spontaneous bookings.
  culinary: Dylan Phelps loves grilling cedar‑plank salmon seasoned with fresh dill from their balcony herb garden, applying a smoky coffee rub to pork ribs, and crafting seasonal stews with locally sourced
    kale and foraged mushrooms, all while sharing meals at the community kitchen.
  core: Dylan Phelps blends a pragmatic, structure‑loving work ethic with a spontaneous, hands‑on curiosity, balancing solitary garden rituals with community kitchen service, while a lingering habit of
    late‑night harmonica sessions reveals an unhurried, reflective spirit.
background:
  cultural: Dylan grew up in a middle‑class family in the Pacific Northwest, with ancestral roots in the American Midwest. Raised in the culturally eclectic city of Portland, he has embraced the region’s
    emphasis on sustainability, local food, and progressive community values. Although his upbringing was modestly traditional, he now identifies with the city’s inclusive and environmentally conscious
    ethos, often participating in neighborhood gatherings, farmers’ markets, and local arts events. His cultural perspective blends a pragmatic work ethic with an appreciation for the diverse, liberal atmosphere
    of modern Portland.
