  hobbies: '[''Herb gardening'', ''Cycling'', ''Hiking'', ''Harmonica playing'', ''Home cooking'', ''Volunteer work at community kitchens'', ''Historical nonfiction reading'', ''Woodworking'', ''Attending
    local food festivals'']'
  career_goals: Dylan’s primary career ambition is to transition into a kitchen supervisory or facilities‑management role where he can apply his extensive knowledge of sanitation, equipment upkeep, and
    workflow optimization. He plans to earn a Certified Food Protection Manager credential and to formalize training programs for younger staff, establishing clear, structured procedures while preserving
    the flexibility to respond to the unpredictable nature of restaurant service. In the longer term, he hopes to shift into part‑time consulting for small eateries and devote more time to community gardening
    and volunteer cooking initiatives.
