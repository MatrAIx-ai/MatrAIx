    culinary experiences'', ''DIY home‑improvement projects with an aesthetic focus'']'
  career_goals: Keith aims to move from supervising housekeeping teams to overseeing entire property operations. He plans to earn professional certifications from the International Sanitary Supply Association
    (ISSA) and OSHA, and to complete an associate degree in hospitality or facilities management. In the medium term, he seeks a facility‑manager or operations‑manager role at a boutique hotel or resort
    in the Salt Lake area, where he can integrate sustainability initiatives and elevate guest experience. Long‑term, he is open to launching his own eco‑friendly janitorial business, leveraging his expertise
    in green cleaning, process innovation, and aesthetic design to set higher industry standards for environmental stewardship and employee development.
