persona_description: A Geologist V is a professional who specializes in the study of rock formations and their properties, including their formation, dissolution, and content. They are responsible for researching
  the effects of internal pressures, heat, water, pollution, and erosion on rock layers, as well as studying variations in rock formations and densities to identify new mineral deposits. They estimate the
  depth, quality, and vastness of deposits, test the mineral quality and purity to determine feasibility of mining, and require a bachelor's degree in area of specialty and at least 8-10 years of experience
  in the field or in a related area. They demonstrate expertise in a variety of the field's concepts, practices, and procedures and perform a variety of tasks, may provide consultation on complex projects
  and is considered to be the top level contributor/specialist. They have a wide degree of creativity and latitude and typically reports to a manager or head of a unit/department.
