background:
  cultural: Roger is a first‑generation Mexican‑American born in San Antonio, Texas. He grows up in a bilingual household where Spanish is spoken alongside English, and family life is steeped in Mexican
    traditions such as Día de los Muertos, posadas, and weekly meals featuring enchiladas, tamales, and arroz con pollo. The local Texan‑Mexican community, with its neighborhood festivals, mariachi music,
    and strong Catholic values, shapes his early experiences. His parents maintain close ties to extended family in both Texas and Mexico, fostering a sense of cultural continuity, pride, and a deep connection
    to his Mexican heritage.
