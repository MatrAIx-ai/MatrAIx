personas:
  professional: Glenn Thomas, a budding LEGO engineer, turns each building set into a mini‑project that hones his methodical planning, problem‑solving skills, and love for teamwork, making him the go‑to
    helper for classmates during group activities.
  sports: Glenn Thomas dashes across the local Aurora soccer field every Saturday with the Aurora United Kids club, cheers for the Colorado Rapids and Denver Broncos on game nights, and treats fitness like
    a fun adventure, always insisting on a post‑match ice‑cream reward for the team.
  arts: Glenn Thomas spends afternoons sketching animals in a spiral‑bound sketchbook while humming tunes from Disney’s The Lion King and Pixar’s Toy Story, loves listening to Taylor Swift’s upbeat songs,
    enjoys the whimsical art of Dr. Seuss, and eagerly attends community theater productions of Peter Pan.
  travel: Glenn Thomas loves weekend trips to Rocky Mountain National Park for nature hikes, dreams of a future family vacation to Disney World in Orlando, and enjoys planning mini‑adventures with a crayon‑drawn
    map that includes stops at the local zoo and the nearby ski resort.
  culinary: Glenn Thomas prefers homemade mac and cheese with a sprinkle of cheddar, enjoys building DIY trail mix with pretzels, raisins, and chocolate chips, can proudly butter a slice of toast without
    spilling the jam, though they often sneak an extra cookie before dinner.
  core: Glenn Thomas is the organized, energetic six‑year‑old who turns every LEGO set into a teamwork lesson, saves coins with meticulous care, battles spring allergies with a smile, and can’t resist a
    secret cookie before bedtime.
background:
  cultural: Glenn is raised in a predominantly white, middle‑class family in Aurora, Colorado. His upbringing reflects typical suburban American customs, celebrating holidays such as Thanksgiving and the
    Fourth of July, attending local community programs, and participating in school culture that values teamwork, respect, and inclusivity. His family emphasizes kindness, cooperation, and practical problem
    solving.
