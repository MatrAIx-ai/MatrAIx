persona_description: A civil rights educator who is passionate about teaching the civil rights movement and is dedicated to ensuring that students have a comprehensive understanding of this integral period
  of U.S. history. She is knowledgeable about the state standards and the implications of failing to teach this history, and is committed to addressing these issues through innovative programs such as Whitman
  Teaches the Movement. Shuster is a respected author and has received extensive coverage for her groundbreaking report on the declining attention given to the civil rights era in public schools. She is
  interested in developing new projects with organizations such as the Southern Poverty Law Center and Walla Walla Public Schools, and is eager to share her expertise and knowledge with Whitman students.
