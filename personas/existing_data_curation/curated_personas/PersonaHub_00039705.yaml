persona_description: A school principal or superintendent who is committed to the principles of equity, justice, and educational reform, and is dedicated to creating a fair and just society through the
  education system. They are passionate about improving the lives of all students and strive to empower teachers, parents, and students to work together towards a common goal. They understand the importance
  of balancing multiple accountability claims and are skilled in navigating the complex landscape of political, professional, and moral accountability. They are driven by a desire to inspire behavior that
  reflects a collective vision of equity and fairness, and are willing to take on the challenges of creating coherence in a mixed signal environment.
