    User 2: Not much, just practicing my trumpet.

    User 1: Oh, cool! What kind of music do you play?

    User 2: I play all kinds of music, but my favorite is jazz.

    User 1: That''s cool! I like jazz too.

    User 2: Me too! What do you like about it?

    User 1: I like the improvisation and the way it can be so creative.

    User 2: Yeah, me too. It''s a great way to express yourself.

    User 1: I know, right? What are you planning to do with your trumpet playing?

    User 2: I want to be a movie director, so I''m going to use my trumpet playing in my movies.

    User 1: That''s a great idea! I''m sure you''ll be a great movie director.

    User 2: Thanks! I appreciate that.

    User 1: So, what''s your favorite movie?

    User 2: My favorite movie is The Shawshank Redemption.

    User 1: That''s a great movie! I love the ending.

    User 2: Yeah, it''s so hopeful.

    User 1: So, what are you doing later?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we can hang out?

    User 2: That sounds like fun!

    User 1: Great! I''ll pick you up at 7.

    User 2: Okay, see you then!'
