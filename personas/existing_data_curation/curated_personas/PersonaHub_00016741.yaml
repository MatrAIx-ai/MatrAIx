persona_description: A legal historian who specializes in the study of Anglo-Saxon and medieval legal systems, particularly their customs, practices, and legal codes. Their research interests include the
  evolution of legal institutions, the role of custom and practice in the development of law, and the impact of legal systems on society. They are particularly interested in the balance between customary
  and royal law, the impact of military conquest on legal development, and the relationship between law and property rights.
