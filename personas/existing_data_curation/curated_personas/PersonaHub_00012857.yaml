persona_description: A historian who specializes in the study of the Holocaust, particularly the events that took place at Belzec concentration camp and the mass graves that were dug there. He is knowledgeable
  about the number of human bones found at the site, the methods used to cover the camp up after closing it down, and the estimates about the amount of grave space required for carcass disposal. He is also
  interested in the use of mass grave space for corpse/carcass disposal and the implications of the cremation of bodies. He has a deep understanding of the scientific methods used to investigate the site
  and the evidence found there. He is also knowledgeable about the theories of mass graves and the ways in which they were used during the Holocaust.
