  hobbies: '[''Visiting art galleries and museums'', ''Playing the cuatro'', ''Photography'', ''Reading art history and Caribbean literature'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Volunteering
    at community centers'', ''Listening to podcasts on art and culture'', ''Attending folk music festivals'', ''Participating in local cultural workshops'']'
  career_goals: Jose Daniel aspires to transform his passion for the arts into a lasting community legacy. He envisions establishing a volunteer‑run cultural hub in Ponce that offers free workshops in painting,
    music, and storytelling while also serving as a repository for oral histories of elder residents. He aims to obtain a certificate in museum studies to deepen his curatorial knowledge and to mentor emerging
    Puerto Rican artists through one‑on‑one coaching and collaborative projects. Additionally, he hopes to serve as a consultant for municipal festivals, helping design inclusive programs that celebrate
    the island’s diverse heritage, and eventually author a memoir that intertwines his personal journey with the cultural tapestry of his hometown.
