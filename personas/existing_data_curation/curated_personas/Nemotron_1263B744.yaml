personas:
  professional: Sheldon Svoboda is a budding game developer and digital illustrator who merges his love for narrative puzzle video games, hands-on electronics kits, and sketch-based concept art into experimental
    indie prototypes, often staying up late to tinker while ambient music plays in the background.
  sports: Sheldon Svoboda enjoys casual weekend hikes in the Ocala National Forest, follows the Orlando Magic and Tampa Bay Buccaneers on television, plays pick-up basketball at the community center as
    a member of the Ocala Middle School intramural team, and treats fitness as an optional hobby rather than a regimented routine, preferring a light jog while snapping sunrise photos over the pine flatwoods.
  arts: Sheldon Svoboda frequently sketches characters inspired by the works of Hayao Miyazaki, Alex Ross, and Czech folk illustrator Miroslav Sasak, curates playlists of Brian Eno and Tycho while drawing,
    collects limited-edition Studio Ghibli prints, and attends the annual Ocala ArtWalk where he admires both local folk art and contemporary pop installations.
  travel: Sheldon Svoboda plans spontaneous road trips with his family, has already visited Orlando's theme parks, the historic streets of Savannah, and a summer camp in the Blue Ridge Mountains, dreams
    of exploring Prague's castle district and Iceland's glacier lagoons, and chooses destinations based on photo-opportunity in natural settings rather than luxury.
  culinary: Sheldon Svoboda's palate swings between homemade blueberry kolache baked with his grandmother's recipe, cheesy pepperoni pizza, spicy chicken tacos, and craft smoothies made with locally sourced
    oranges, while his cooking skill hovers at an enthusiastic beginner level, often experimenting with pesto pasta and caramelized onions on toast.
  core: Sheldon Svoboda is a curious, solitary teen who blends artistic imagination with nerdy tinkering, worries about the future, but finds calm in sketchbooks, ambient beats, and the quiet of the forest.
background:
  cultural: Sheldon was raised in Ocala, Florida, a modest‑sized city known for its equestrian culture and proximity to the Ocala National Forest. His family has Czech ancestry; grandparents immigrated
    from the Czech Republic in the 1960s and passed down traditions such as cooking koláče and celebrating Czech holidays, with occasional Czech phrases spoken at home. The broader community is predominantly
    white, middle‑class, reflecting a blend of Southern hospitality and the multicultural influences of central Florida's tourism industry. This mix of Midwestern‑European heritage and the laid‑back, nature‑oriented
    lifestyle of Marion County shapes Sheldon’s appreciation for both folk art and contemporary American pop culture.
attributes:
  skills: '["pencil sketching", "digital illustration with Procreate", "basic Python programming", "level design in sandbox games", "geometric problem solving", "critical analysis of media", "Lego model
    building"]'
  hobbies: '["sketching and drawing", "digital art creation", "playing puzzle‑driven video games", "reading science‑fiction and fantasy", "building electronics kits", "board gaming with close friends",
    "nature photography", "listening to ambient music while creating art"]'
  career_goals: Sheldon aspires to become a video game developer and interactive media artist, merging his love for storytelling, visual art, and coding. He hopes to attend a specialized high‑school program
    focused on arts and technology, then pursue a degree in computer science with a concentration in game design. Long‑term, he aims to work on indie games that emphasize unique narratives and experimental
    art styles, while also freelancing as a concept artist to maintain a flexible schedule that suits his preference for solitude and low‑stress environments.
