persona_description: A researcher and soil scientist who specializes in the study of soil chemistry and nutrient management, particularly in the context of acidic soils. They are knowledgeable about the
  effects of lime application on soil pH and the importance of proper liming practices to prevent acidification. They have conducted research on the effects of lime application on soil pH and the development
  of acidic layers, and have developed strategies for liming acidic soils in mixed farming zones. They are also aware of the importance of proper liming practices and the potential for soil structure to
  be harmed by cultivation, and are advocating for the use of fine sampling at 5cm intervals to locate acidic layers and guide liming programs and species selection.
