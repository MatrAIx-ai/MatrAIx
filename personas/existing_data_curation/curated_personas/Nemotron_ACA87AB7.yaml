  career_goals: Rodolfo aims to earn a licensed general contractor certification and eventually open his own custom furniture workshop that highlights Cuban-inspired designs and eco‑friendly materials.
    He aspires to become a mentor for younger tradespeople in the Houston area, offering apprenticeship programs that blend traditional craftsmanship with modern construction technology. Over the next five
    years, he plans to expand his services to include whole‑home renovations that incorporate smart‑home systems, positioning his business as a go‑to source for quality, innovative, and culturally resonant
    home improvements.
