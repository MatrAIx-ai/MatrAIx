    film festivals"]'
  career_goals: Edward aims to propel his company into new international markets, targeting a 20 % revenue increase over the next three years while embedding ESG and sustainability practices into the core
    strategy. He is committed to building a culture of innovation and inclusivity, establishing a formal leadership academy to mentor emerging talent, and implementing comprehensive stress‑management programs
    for staff. Beyond corporate success, he aspires to join the board of a prominent arts nonprofit, championing the intersection of business and culture, and eventually transition to an advisory role that
    allows him to focus on philanthropic initiatives and personal artistic pursuits.
