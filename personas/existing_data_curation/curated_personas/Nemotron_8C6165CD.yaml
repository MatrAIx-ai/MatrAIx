  hobbies: '["Watercolor painting", "Landscape photography", "Reading (science‑fiction, philosophy, biographies)", "Attending and assisting in community theater", "Volunteering for art workshops", "Gardening
    (native wildflowers)", "Chess"]'
  career_goals: Although retired, Richard aspires to leave a lasting cultural imprint on his community. He is working toward curating a traveling exhibition that showcases the artwork of local seniors,
    paired with oral histories of Niagara County. He hopes to complete a memoir that weaves his personal journey with reflections on the region’s industrial and natural transformation. Richard also seeks
    opportunities to serve as a guest lecturer at the nearby community college, sharing his knowledge of art, storytelling, and community building. Traveling to historic art hubs in Europe and the American
    Southwest remains a personal dream, fueling his creative practice and providing fresh material for future projects.
