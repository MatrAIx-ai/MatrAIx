personas:
  professional: Teodora White is a budding preschool teacher‑in‑training who already organizes classroom routines with meticulous schedules, leads group activities with energetic confidence, and worries
    about maintaining order, reflecting her structured, sociable, and competitive nature.
  sports: Teodora White loves playing soccer in the local ‘Kiddie Soccer Stars’ league, cheers for the Seattle Seahawks during family watch parties, and eagerly participates in the community’s ice‑skating
    program in winter, always keeping a precise tally of goals and laps.
  arts: Teodora White delights in singing Disney’s ‘Let It Go’ from Frozen, imitates characters from Sesame Street, and spends afternoons drawing Mickey Mouse with bright crayons, using these artistic outlets
    to channel her energetic social nature.
  travel: Teodora White enjoys family road trips to the Grand Canyon and beach days in Florida, meticulously plans each day's activities with colorful stickers on a travel calendar, and dreams of seeing
    the Disney castles in Paris, yet can become anxious if itineraries shift unexpectedly.
  culinary: Teodora White prefers mac and cheese with cheddar, loves chicken nuggets dipped in honey mustard, proudly helps mom bake chocolate chip cookies using vanilla extract and dark chocolate chunks,
    and is a picky eater who insists on crunchy carrots as a side.
  core: Teodora White is a detail‑obsessive, high‑energy five‑year‑old who organizes playtime, competes fiercely in games, worries about rules, and secretly hides extra glitter stickers in her shoe.
background:
  cultural: Teodora was raised in Sandusky, Ohio, a small Midwestern city on the shores of Lake Erie. Her family lives in a typical suburban setting and participates in community life that includes school‑based
    activities, local library storytimes, and seasonal events like the Sandusky Riverfest and the county fair. They observe mainstream American holidays—Thanksgiving, Christmas, and the Fourth of July—and
    attend a local Methodist church where she goes to Sunday school. The cultural atmosphere emphasizes friendliness, safety, and a respect for routine, which aligns with her preference for structure.
attributes:
  skills: '[''Letter recognition'', ''Reading simple words'', ''Counting to 20'', ''Fine motor coordination (coloring within lines)'', ''Building LEGO structures'', ''Solving age‑appropriate puzzles'',
