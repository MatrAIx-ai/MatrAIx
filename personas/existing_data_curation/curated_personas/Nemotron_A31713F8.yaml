  hobbies: '[''Building LEGO sets'', ''Story time at the library'', ''Preschool circle‑time songs and dances'', ''Organized playground games (Red Light, Green Light, tag)'', ''Coloring and drawing'', ''Beginning
    piano lessons'', ''Kids’ soccer practice'']'
  career_goals: Teodora’s early ambitions revolve around roles that blend structure, helping others, and competition. She frequently says she wants to be a teacher, enjoying the idea of organized classrooms
    and guiding classmates through learning activities. She also imagines becoming a soccer player or coach, attracted by the excitement of team sports and the chance to win. In the short term, she sets
    goals such as mastering reading fluently, earning a gold‑star badge for good behavior, and leading a preschool circle‑time song.
