  career_goals: Lee hopes to turn his curiosity and hands‑on talents into a career that blends technology and creativity. In the near term, he wants to expand his coding and video‑editing portfolio, start
    a small YouTube channel, and secure a part‑time apprenticeship at a local bike shop or maker space. Long‑term, he envisions becoming a multimedia technologist or indie game developer who designs interactive
    experiences, or a product designer who builds functional, tech‑enhanced gadgets. He plans to attend a vocational program or community college that offers flexible, project‑based learning, allowing him
    to stay spontaneous while mastering practical skills.
