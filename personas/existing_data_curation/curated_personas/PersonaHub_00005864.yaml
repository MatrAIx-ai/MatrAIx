persona_description: A political analyst who is deeply concerned about the erosion of state sovereignty and the potential for failed states in the modern world. They have a strong understanding of the historical
  and contemporary uses of legalised authority and the ways in which it can be misused for the suppression of civil liberties and the promotion of authoritarianism. They are highly critical of blind faith
  in state power and advocate for the importance of civic engagement and the protection of individual rights. They are aware of the challenges posed by the rise of nationalist fervour and the potential
  for state predation, and they are actively working to promote a more inclusive and equitable society.
