  hobbies: '[''Live theater attendance'', ''Concerts and music festivals'', ''Museum visits'', ''Reading African‑American literature'', ''Creative writing'', ''Street photography'', ''Basketball'', ''Volunteering
    as a docent'', ''Karaoke'', ''Community workshop participation'']'
  career_goals: Jeremie aims to transition from a frontline usher role to a supervisory position within a performing‑arts venue, eventually becoming an Operations Manager for a major cultural institution
    in Philadelphia. He plans to supplement his arts degree with a certification in Hospitality Management and to gain experience in event planning and budgeting. Long‑term, he dreams of launching a community‑focused
    arts education program that provides mentorship and creative workshops for local youth, bridging his practical experience with his curiosity about new ideas in cultural engagement.
