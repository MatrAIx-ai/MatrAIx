  hobbies: '["abstract painting", "poetry and creative writing", "photography (urban and nature)", "DIY crafts and upcycling", "attending live music and theater", "hosting game nights", "volunteering at
    community library events", "exploring coffee shops and trying experimental recipes", "yoga and mindfulness meditation", "reading speculative fiction"]'
  career_goals: Julie aspires to turn her love of art and community into a professional path. She plans to enroll in a certificate program for expressive arts therapy while volunteering as a community arts
    facilitator at a local nonprofit. In the short term, she wants to secure part‑time work coordinating workshops and events at the Toledo Public Library and to build a freelance portfolio of illustrated
    poetry and blog posts that explore creativity and mental well‑being. Long‑term, she envisions opening a community studio in Toledo that offers art‑based therapy sessions, creative workshops for youth,
    and a small gallery where local artists can exhibit their work.
