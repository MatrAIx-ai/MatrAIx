personas:
  professional: Corene Hart, a seasoned real‑estate broker in Ridgeville, leverages their meticulous contract preparation, deep community network, and calm, resilient demeanor to consistently rank among
    the top sellers while skeptically vetting every client and property history.
  sports: Corene Hart enjoys leisurely morning walks with their dog and follows the Charleston Battery soccer team and the Clemson Tigers basketball, while participating in the Ridgeville Senior Walking
    Club that meets twice weekly, balancing mild exercise with their love for watching regional sports on Saturday afternoons.
  arts: Corene Hart sings with the local gospel choir, drawing inspiration from Mahalia Jackson and Aretha Franklin, while quilting intricate patterns to the sound of jazz legends like John Coltrane and
    attending occasional performances by the Charleston Symphony Orchestra, reflecting their appreciation for both vocal harmony and visual craftsmanship.
  travel: Corene Hart prefers relaxed heritage trips, having visited Savannah’s historic district and the Gullah cultural sites in Beaufort, and dreams of a Caribbean cruise to the Bahamas where they can
    savor island cuisine, though they plan trips well in advance to fit within their modest budget and family commitments.
  culinary: Corene Hart excels at cooking collard greens, sweet‑potato pie, and shrimp‑and‑grits using vegetables from their garden, delights in perfecting their family’s red rice recipe, and enjoys sharing
    these soul‑food staples at church potlucks while occasionally treating themselves to a slice of pecan pie from a local bakery.
  core: Corene Hart is a calm, routine‑driven real‑estate veteran who blends a love for heritage gardening, gospel singing, and meticulous property deals with a habit of postponing paperwork and a playful
    skepticism toward newcomers, all while navigating life with their resilient spirit.
background:
  cultural: Corene is a lifelong Black resident of coastal South Carolina, with family roots that trace back to the Gullah community of the Lowcountry. Growing up during the civil‑rights era, she was shaped
    by a strong church presence, communal storytelling, and a deep respect for Southern African‑American traditions such as soul food, oral history, and the preservation of historic homes. Her cultural
    identity is reflected in her devotion to church service, her dedication to community cohesion, and her commitment to passing on heritage through cooking, gardening, and mentorship.
attributes:
  skills: '[''Negotiation'', ''Property showing and staging'', ''Contract preparation'', ''MLS database navigation'', ''Local market analysis'', ''Community networking'', ''Senior downsizing assistance'',
    ''Marketing and advertising'', ''Conflict resolution'', ''Client relationship management'']'
  hobbies: '[''Vegetable gardening'', ''Southern cooking'', ''Gospel choir singing'', ''Quilting'', ''Reading historical fiction'', ''Family genealogy research'', ''Walking the neighborhood with her dog'',
    ''Playing bridge with friends'']'
  career_goals: Corene aims to solidify her legacy as a trusted real‑estate authority in Ridgeville by mentoring younger agents and expanding her brokerage to include property‑management services for senior
    residents. She aspires to break the county’s annual sales record, maintain a top‑three ranking among local brokers, and champion the preservation of historic homes in the Lowcountry. Her long‑term ambition
    includes establishing a scholarship for high‑school graduates interested in real‑estate careers, reinforcing the practical, community‑focused values she holds dear.
