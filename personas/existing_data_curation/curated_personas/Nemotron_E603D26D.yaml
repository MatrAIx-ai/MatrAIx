personas:
  professional: Carla Ramos is a budding digital storyteller who blends imaginative fantasy writing with hand‑drawn illustrations and early‑stage animation projects, using her methodical planning skills
    to meet school deadlines while dreaming of publishing a graphic novel.
  sports: Carla Ramos is a member of the Imperial County Youth Soccer Club and a casual fan of the LA Galaxy, preferring early‑morning desert jogs to clear her mind and weekly yoga sessions to maintain
    flexibility and calm.
  arts: Carla Ramos is a passionate member of her school’s art club who creates intricate fantasy landscapes, experiments with digital animation tools like Blender, and draws artistic inspiration from Hayao
    Miyazaki, H.R. Giger, indie musician Björk, and classical composer Max Richter.
  travel: Carla Ramos is an adventurous teen who explores the nearby desert dunes of Imperial County, dreams of backpacking through the ancient ruins of Machu Picchu and witnessing the aurora in Iceland,
    and meticulously plans each journey using a colorful notebook map and saved allowance.
  culinary: Carla Ramos is an enthusiastic home cook who prepares beloved family stews richly flavored with roasted chilies, corn masa, and fresh herbs, learning the ancestral stories behind each recipe
    while often adding modern twists like avocado salsa or citrus zest.
  core: Carla Ramos is a highly imaginative, organized teenager whose boundless creativity in art and storytelling is tempered by intense emotions that fuel both meticulous planning and occasional anxious
    overthinking.
background:
  cultural: Carla is a second‑generation Guatemalan‑American living in Imperial, California. At home, Spanish fills the conversations, and family gatherings are marked by the aromas of tamales, pepian,
    and other Guatemalan staples. She celebrates Guatemalan holidays such as Día de la Independencia (September 15) and Semana Santa, often blending them with local Mexican‑American traditions like Día
    de los Muertos. Her parents instilled values of close‑family bonds, respect for elders, and a love for storytelling that echo the oral histories of her ancestors. Growing up near the U.S.–Mexico border,
    Carla navigates a bicultural identity, feeling connected to the vibrant Latino community of Imperial County while also engaging in typical suburban American school life. This cultural blend influences
    her artistic themes, often merging Mayan motifs with contemporary desert landscapes.
