  hobbies: '["Reading fantasy and sci‑fi novels", "Sketching and painting", "Digital art and animation experimentation", "Creative writing of short stories", "Playing beginner piano", "Bilingual language
    practice (Spanish/English)", "Exploring desert flora and collecting rocks", "Cooking traditional Guatemalan dishes", "Participating in school art club", "Attending mental‑health awareness meetings"]'
  career_goals: Carla dreams of turning her love for art and abstract ideas into a career as a concept artist or graphic novelist, where she can blend visual storytelling with imaginative worlds. She aspires
    to attend a specialized visual‑arts high school and later pursue a BFA in illustration or animation. In the longer term, she hopes to work on video‑game art teams or create her own comic series, while
    also using her empathy to run community art workshops that help young people express emotions and build confidence.
