  arts: Willett Mcnair, an infant enthralled by the melodic lullabies of Brahms and the bright illustrations of Eric Carle's 'The Very Hungry Caterpillar', spends time in the local children's museum, and
    their gentle, cooperative demeanor leads them to share picture books with peers during quiet play.
  travel: Willett Mcnair, a one-year-old who has already visited the family beach house in Maine and a day trip to the nearby zoo, prefers short, stroller-friendly excursions with familiar caregivers, and
