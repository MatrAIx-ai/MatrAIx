    sites'']'
  career_goals: Although retired from formal employment, Jordan aims to continue contributing his expertise to the community. He plans to develop a series of intergenerational art workshops at the local
    senior center, mentor emerging educators through volunteer tutoring, and curate a small exhibition showcasing senior artists in Nyack. He also aspires to author a memoir that weaves together his experiences
    in education, art appreciation, and local history, and hopes to travel to European cultural capitals to deepen his understanding of Renaissance art, enriching his future workshops and lectures.
