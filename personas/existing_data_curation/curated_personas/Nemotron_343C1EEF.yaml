personas:
  professional: Jordan Race, a retired middle‑school curriculum architect, channels their meticulous, methodical nature into designing intergenerational art workshops, mentoring emerging teachers, and curating
    senior‑artist exhibitions, drawing on decades of lesson planning, public speaking, and project‑management expertise.
  sports: Jordan Race enjoys low‑impact fitness, joining the Hudson River Trail Walking Club for sunrise walks, cheering on the New York Mets during baseball season, and practicing gentle tai chi at the
    local senior center, while they avoid high‑intensity sports due to joint concerns.
  arts: Jordan Race immerses themselves in visual arts by painting oils of the Hudson River inspired by the techniques of John Singer Sargent and Claude Monet, capturing seasonal wildlife through photography
    in the style of Ansel Adams, and regularly visiting the Metropolitan Museum of Art, MoMA, and Nyack’s Brickell Gallery, where they discuss works by Georgia O’Keeffe and Jackson Pollock with fellow enthusiasts.
  travel: Jordan Race plans each trip with meticulous itineraries, favoring cultural pilgrimages to Renaissance hubs like Florence and Venice, a weekend art‑focused getaway to Paris to study the Louvre’s
    collection, and restorative stays in the Hudson Valley’s historic inns, balancing modest travel budgets with a desire for immersive art experiences.
  culinary: Jordan Race delights in cooking seasonal dishes harvested from their native‑plant garden, such as rosemary‑infused roasted root vegetables, wild mushroom risotto with fresh thyme, and heirloom
    tomato bruschetta topped with basil and burrata, while their culinary skill hovers between confident home‑chef and experimental artist, often using locally sourced honey and wild berries to finish desserts.
  core: Jordan Race is a curious, organized retiree who blends a lifelong love of teaching with a passion for art, nature, and meticulous planning, turning every hobby into a carefully curated learning
    experience.
background:
  cultural: Jordan is a white American who grew up in a middle‑class suburban family in the Northeastern United States. His upbringing emphasized the value of education, community involvement, and appreciation
    for the arts. Living in Nyack, a town known for its artistic heritage and proximity to the Hudson River, he has been shaped by the region's blend of historic preservation, natural beauty, and a vibrant
    local arts scene. These influences, combined with broader American cultural values of self‑reliance and lifelong learning, inform his worldview and personal pursuits.
