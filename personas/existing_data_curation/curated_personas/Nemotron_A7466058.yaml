  career_goals: Linda aims to advance within the customer service field by first securing a team lead position within the next two to three years. She plans to develop her coaching and training abilities
    to mentor new agents, and to obtain a Certified Customer Service Professional (CCSP) credential. To broaden her career prospects, she intends to enroll in a local community college and complete an associate
    degree in business administration, eventually pursuing a bachelor's degree online. Her long‑term ambition is to transition into an operations or quality‑assurance manager role where she can apply her
    organizational strengths to improve service processes while also championing diversity and inclusion initiatives for Black women in the workplace.
