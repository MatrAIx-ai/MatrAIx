  hobbies: '[''Church choir participation'', ''Volunteer work (food drives, youth mentorship)'', ''Dancing (R&B, hip‑hop)'', ''Zumba classes'', ''Cooking (soul‑food and healthy recipes)'', ''Reading personal‑development
