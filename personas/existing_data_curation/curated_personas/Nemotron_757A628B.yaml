personas:
  professional: Douglas Dunbar, a 16‑year‑old aspiring automotive‑tech specialist, merges his Python hobby, custom PC builds, and bicycle repair skills with a disciplined, spreadsheet‑driven project style,
    aiming to earn a CompTIA A+ certification and eventually launch a neighborhood shop that blends mechanical and computer services.
  sports: Douglas Dunbar follows the Houston Texans and Dallas Cowboys for NFL thrills, cheers on the Houston Astros during baseball season, rides with the Fort Bend Cyclists on local mountain‑bike trails,
    and trains with a high‑school strength club, balancing competitive e‑sports tactics with real‑world fitness routines.
  arts: Douglas Dunbar channels his love of pixel art and retro gaming into a collection of vintage consoles, enjoys the synth‑driven soundtracks of Daft Punk and the guitar riffs of John Mayer, frequents
    the Houston Museum of Fine Arts for modern exhibits, and occasionally volunteers at a community theater tech crew, merging technical precision with creative flair.
  travel: Douglas Dunbar prefers weekend road trips, having explored Austin’s live‑music scene, rode the Hill Country’s winding roads to Fredericksburg for BBQ, dreamed of attending Japan’s Tokyo Game Show,
    and plans a budget‑friendly summer drive to New Orleans to sample Cajun cuisine, always mapping routes on Google Maps and budgeting mileage in his spreadsheet.
  culinary: Douglas Dunbar’s palate favors Texas‑style smoked brisket, chili con carne spiced with cumin and chipotle, and the occasional sushi bowl he assembles at home using fresh salmon, rice, and wasabi,
    while his cooking skill hovers between assembling quick taco kits and tinkering with a DIY sous‑vide setup for precise meat temperatures.
  core: Douglas Dunbar blends a meticulous, competitive mindset with a love for hands‑on tech, yet often trades sleep for gaming marathons and splurges on nostalgic gadgets, making him a disciplined yet
    occasionally impulsive teen tinkerer.
background:
  cultural: Douglas grew up in a white, middle‑class family in Richmond, Texas, part of Fort Bend County’s suburban environment. His upbringing reflects the practical, self‑reliant ethos common in South‑Central
    Texas, where hard work and personal responsibility are valued. He was exposed to a blend of traditional Texan customs—like community barbecues and local sports events—and the diverse cultural influences
    of nearby Houston. His family’s emphasis on discipline, practical skill‑building, and modest ambition has shaped his pragmatic outlook, while the region’s mix of rural and urban elements has fostered
    his curiosity about both mechanical and digital realms.
attributes:
  skills: '[''Organizational and time-management skills'', ''Self-discipline and goal-setting'', ''Basic Python programming'', ''Computer hardware troubleshooting'', ''Bicycle and small engine repair'',
    ''Strategic thinking (chess, competitive gaming)'', ''Critical research and fact-checking'']'
  hobbies: '[''Programming simple games'', ''PC building and hardware troubleshooting'', ''Chess (local tournaments)'', ''Competitive e‑sports (tactical shooters, RTS)'', ''Mountain bike riding and maintenance'',
    ''Reading technical magazines and DIY tutorials'', ''Collecting vintage video game consoles'', ''Community tech assistance volunteer work'']'
  career_goals: In the short term, Douglas plans to earn his GED within the next year and enroll in a vocational training program focused on automotive technology or IT repair. He aims to secure an apprenticeship
    where he can apply his hands‑on mechanical and technical skills and earn certifications such as an ASE automotive certificate or CompTIA A+. Over the longer term, he aspires to open a small repair shop
    that combines mechanical and computer services for his community. Concurrently, Douglas seeks to advance in competitive e‑sports, targeting regional tournament placements and potential sponsorship opportunities.
