personas:
  professional: Ivan Howard is a seasoned mechanical engineer who blends rigorous CAD design and data‑driven automation with a painter’s eye for form, communicating complex concepts to cross‑functional
    teams while steering projects toward sustainable, aesthetically pleasing prototypes as they eye a senior leadership role within five years.
  sports: Ivan Howard hits the Appalachian foothills for weekend trail runs, plays intramural basketball with the Richmond Flying Squirrels fan club, cheers on the Washington Capitals during hockey season,
    and belongs to a local climbing group that meets at the Shenandoah cliffs, all while they use a smartwatch to track performance metrics.
  arts: Ivan Howard spends evenings oil‑painting landscapes inspired by the works of Van Gogh, sketches digital illustrations on a tablet after listening to Jimi Hendrix covers with the local jam group,
    and regularly visits the Virginia Museum of Fine Arts to study contemporary installations by Yayoi Kusama, and they let those experiences shape both their engineering aesthetics and personal style.
  travel: Ivan Howard prefers meticulously planned road trips, having explored Virginia’s historic Williamsburg, hiked the Blue Ridge Parkway, and ventured abroad to Kyoto for its culinary precision and
    Florence for Renaissance art, while a future wishlist includes trekking the Scottish Highlands and a sustainable‑focused tour of Scandinavia, and they keep a spreadsheet of itineraries to stay on budget.
  culinary: Ivan Howard is an adventurous home cook who can whip up a ramen‑style miso broth with fresh shiitake and a saffron‑infused paella for friends, but they often leave the kitchen a mess and rely
    on a trusted local barbecue joint for Sunday comfort food, balancing a refined palate with a penchant for shortcut takeout on busy weeks.
  core: Ivan Howard is a competitively curious engineer‑artist who juggles CAD models and oil canvases, meticulously budgets yet splurges on guitar gear, monitors health data while neglecting dental visits,
    and they thrive on structured plans that leave room for spontaneous brush strokes.
background:
  cultural: Ivan grew up in a middle‑class, suburban family in the Greater Richmond area, where a blend of Southern hospitality and Mid‑Atlantic pragmatism shaped his worldview. His ancestry includes German
    and Anglo‑American roots, and his family placed high value on education, community involvement, and self‑reliance. Exposure to local cultural institutions such as the Virginia Museum of Fine Arts and
    the Richmond Folk Festival fostered an early appreciation for the arts, while his STEM education cultivated a methodical, analytical mindset. This cultural mix gives him a foot in both the technical
    and creative worlds, encouraging him to seek balanced solutions that respect tradition yet welcome unconventional ideas.
attributes:
