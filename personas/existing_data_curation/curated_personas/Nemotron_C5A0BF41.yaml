  hobbies: '[''Oil painting'', ''Digital illustration'', ''Electric guitar'', ''Hiking'', ''Visiting art galleries and museums'', ''Cooking international recipes'', ''Science‑fiction reading'', ''Puzzle
    solving'', ''Chess'']'
  career_goals: Ivan aims to transition into a senior engineering leadership role within the next five years, targeting positions such as Lead Engineer or Engineering Manager where he can oversee interdisciplinary
    product development teams. He is driven to secure patents for sustainable design solutions and to establish a reputation as a forward‑thinking innovator who bridges engineering precision with artistic
    creativity. In the long term, he envisions founding a boutique consultancy that helps manufacturers integrate eco‑friendly materials and aesthetic design into mass‑produced goods, while also mentoring
    emerging engineers to adopt a balanced, curiosity‑driven approach to problem solving.
