personas:
  professional: Jessenia Crespo is a retired community liaison who now leads the annual cultural festival in Copperas Cove, coordinating music, dance, and food with meticulous planning, while mentoring
    volunteers and seamlessly translating between Spanish and English to ensure everyone feels included.
  sports: Jessenia Crespo joins a senior walking club every morning, cheers on the Dallas Cowboys on Sundays, supports the Dallas Mavericks during basketball season, and stays active through weekly cumbia
    and salsa dance classes that double as cardio workouts.
  arts: Jessenia Crespo expresses her artistic side through embroidery and quilting that feature traditional motifs, relishes listening to legendary salsa icons like Celia Cruz and Willie Colón while crafting,
    and participates in a local dance troupe performing cumbia to the rhythms of Grupo Carnaval and contemporary folk ensembles.
  travel: Jessenia Crespo enjoys planning modest trips, having already explored the historic missions of San Antonio, the vibrant markets of Oaxaca, and the coastal allure of Galveston, while dreaming of
    a pilgrimage to the Basilica of Guadalupe for the next holy year.
  culinary: Jessenia Crespo's culinary repertoire centers on hand-pressed pupusas with cheese and loroco, slow-cooked tamales wrapped in banana leaves, crisp yuca frita seasoned with garlic and lime, and
    she often experiments by adding smoked paprika or fresh mint to reinvent classic flavors.
  core: Jessenia Crespo blends a methodical planner's precision with the lively spirit of community dance, never missing a chance to share a homemade dish or a warm smile, even if it means staying up late
    stitching in the glow of a single lamp.
background:
  cultural: Born to Salvadoran immigrant parents, Jessenia grew up immersed in the traditions, language, and Catholic faith of El Salvador while adapting to life in Texas. Her family maintained vibrant
    customs such as celebrating Las Posadas, Día de los Muertos, and the harvest festivals, infusing her upbringing with music, dance, and a rich culinary heritage. In Copperas Cove, she actively engages
    with the local Hispanic community, serving as a bridge between newer immigrants and long‑time residents. Jessenia's home reflects a blend of Salvadoran artistry—bright textiles and handcrafted décor—and
    Texan hospitality. Her strong emphasis on family, communal support, and cultural preservation shapes her daily interactions and community contributions.
