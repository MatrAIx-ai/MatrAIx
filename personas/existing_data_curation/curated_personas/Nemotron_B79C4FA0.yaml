    and oral history sharing'']'
  career_goals: Although retired from formal employment, Jessenia aims to deepen her impact as a cultural ambassador for the Salvadoran community in Copperas Cove. She aspires to lead a yearly Salvadoran
    cultural festival that showcases music, dance, and cuisine, fostering cross‑cultural appreciation. She also seeks to expand her mentoring role at the local senior center, establishing a program that
    pairs seniors with high‑school volunteers for language exchange and life‑skill workshops. Additionally, Jessenia hopes to compile a family cookbook featuring treasured recipes and stories, preserving
    her heritage for future generations while learning new culinary techniques through community cooking classes.
