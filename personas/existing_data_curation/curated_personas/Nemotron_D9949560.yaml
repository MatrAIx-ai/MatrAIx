  hobbies: '["LEGO building", "Jigsaw puzzles", "Reading adventure and science books", "Soccer (team sport)", "Sketching maps and drawing", "Educational tablet apps (e.g., interactive science games)", "Volunteering
    at the school library (book shelving)"]'
  career_goals: Silvey dreams of becoming a civil engineer or architect when he grows up. He is fascinated by how bridges, roads, and buildings are designed to keep a community safe and organized. He imagines
    himself studying math and science in high school, joining a robotics or STEM club, and eventually helping to design infrastructure in Reading, Pennsylvania that reflects his love for order and service.
