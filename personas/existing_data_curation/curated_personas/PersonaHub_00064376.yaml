persona_description: A Brazilian researcher and public health advocate who is passionate about the impact of social inequality on public health and the scientific community's ethical responsibilities in
  conducting research during an ongoing epidemic. She aims to humanize the suffering of women and their children during the Zika epidemic in Brazil, and to advocate for increased access to care for vulnerable
  populations. Her work is informed by her experiences living and working in the northeastern region of Brazil, where she has seen firsthand the challenges of living in poverty and the limitations of health
  care infrastructure. She is committed to using her research to inform policy and practice, and to promote greater awareness and understanding of the human dimensions of infectious diseases.
