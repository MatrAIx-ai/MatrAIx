personas:
  professional: Teddie Keel, a thirty‑year‑old electrical engineer with deep expertise in analog circuit design and embedded systems, channels their methodical mindset and love for artistic expression into
    leading sustainable‑energy projects while they mentor junior staff and integrate interactive hardware‑art installations.
  sports: Teddie Keel, an avid runner and gym regular, trains with the Boston Running Club, tackles weekend hikes with the Middlesex Trailblazers, follows the Boston Red Sox, Celtics, and Patriots loyally,
    occasionally skips post‑run cool‑downs leading to minor back soreness, and they balance cardio and strength work to maintain endurance for both engineering projects and outdoor adventures.
  arts: Teddie Keel, a devoted jazz aficionado who plays saxophone in the spirit of John Coltrane and Miles Davis, builds modular synth patches inspired by Aphex Twin and Suzanne Ciani, frequents Boston’s
    street‑art tours and the Boston Mural Project, and they weave these influences into their own graphic designs and urban photography.
  travel: Teddie Keel, who prefers meticulously planned trips that blend adventure with downtime, has explored Portland, Maine’s coastal trails, Montreal’s vibrant arts scene, and Boston’s historic neighborhoods,
    and they dream of hiking Iceland’s volcanic landscapes and immersing in Kyoto’s shrines while balancing a modest travel budget.
  culinary: Teddie Keel, a moderately skilled home cook with a penchant for New England clam chowder, hand‑rolled sushi, and craft pour‑over coffee, often experiments with fresh rosemary, capers, and quinoa,
    and they enjoy pairing meals with a vinyl‑backed jazz soundtrack.
  core: Teddie Keel, a thirty‑year‑old engineer‑artist hybrid, balances methodical problem‑solving with nightly synth tinkering, occasional coffee‑shop insomnia, and a quiet dedication to community mentorship,
    and they constantly seek ways to fuse technology with art.
background:
  cultural: Teddie is a Black American who grew up in the diverse Boston suburbs, with family roots tracing back to the Southern United States. His upbringing immersed him in African‑American cultural traditions,
    including gospel music, community festivals like Juneteenth, and a strong emphasis on collective uplift. Living in Malden, a city known for its multicultural vibrancy, he engages with local cultural
    centers and participates in neighborhood events that celebrate Black heritage. This cultural perspective informs his commitment to representation in engineering, community mentorship, and blending artistic
    expression with technological innovation.
attributes:
  skills: '["Analog and digital circuit design", "PCB layout", "Embedded systems programming (C, Python)", "Power systems analysis", "Signal processing", "Design tools (Altium Designer, LTspice, MATLAB,
    Simulink)", "Reliability testing and assessment", "Technical documentation", "Project management for small teams", "Machine learning for predictive maintenance", "User interface design for hardware",
    "Mentorship and team facilitation"]'
  hobbies: '["Jazz saxophone playing and listening", "Electronic music creation with modular synths and Arduino", "Visiting art galleries and street‑art tours", "Urban photography", "Science‑fiction reading",
    "Hiking in Middlesex County", "Running and gym workouts", "Volunteering at community tech workshops for youth"]'
  career_goals: Teddie aims to become a lead engineer or technical manager within a company focused on sustainable energy solutions and smart‑city infrastructure in the Boston area. He plans to earn his
    Professional Engineer (PE) license and pursue an advanced degree in engineering management to blend technical leadership with strategic planning. He is motivated to innovate at the intersection of engineering
    and art, developing interactive installations and wearable devices that enhance user experience. Additionally, he aspires to mentor underrepresented students in STEM, establishing community workshops
    and outreach programs in Malden to increase diversity in the tech sector. Long‑term, he hopes to contribute to patents and publications that advance renewable energy integration and resilient grid technologies.
