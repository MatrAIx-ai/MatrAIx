  career_goals: Pedro aspires to become a multimedia storyteller and content creator who can blend visual art, film, and digital platforms to share culturally rich narratives. He plans to pursue a degree
    in Visual Arts and Media Production, with the long‑term goal of producing documentaries and short films that celebrate Mexican heritage and address teen mental‑health awareness. He also envisions launching
    a community art workshop in Bakersfield where he can mentor younger peers, and eventually lead a digital media agency focused on socially conscious content for diverse audiences.
