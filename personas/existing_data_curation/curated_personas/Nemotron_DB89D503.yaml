personas:
  professional: Pedro Fernandez, a 13‑year‑old aspiring multimedia creator, blends sketching, digital art, and mural design with a knack for comedic TikTok videos, and they channel their curious and sociable
    nature into collaborative projects that balance meticulous planning with spontaneous bursts of creativity.
  sports: Pedro Fernandez plays forward for a neighborhood soccer squad named “River Runners,” idolizes the professional club Club América, eagerly tunes in to MLS matches featuring Los Angeles Galaxy,
    and they also dabble in weekend skateboarding at the local skate park, using physical activity as both a social outlet and a stress release.
  arts: Pedro Fernandez immerses themselves in sketching comic‑style characters, creating digital collages inspired by folk motifs, and admiring artists such as Frida Kahlo, Beeple, and the Marvel illustrators,
    and they soundtrack their mural projects and TikTok skits with an eclectic mix of lively regional banda beats and contemporary hip‑hop tracks by Kendrick Lamar.
  travel: Pedro Fernandez favors short, adrenaline‑filled road trips to nearby historic towns with vibrant murals and bustling street markets, relishes attending the annual lantern festival in their hometown,
    and they harbor a dream of backpacking through the colorful neighborhoods of a sister city to capture street photography for their growing portfolio.
  culinary: Pedro Fernandez enjoys helping their family prepare traditional dishes like corn‑based tamales and spicy salsa verde, proudly masters the art of seasoning a perfect chorizo‑filled taco, and
    they experiment at home with avocado‑lime smoothies and homemade salsa, balancing a modest cooking skill set with a relentless appetite for bold, savory flavors.
  core: Pedro Fernandez, a 13‑year‑old creative powerhouse, navigates teenage stress with a blend of sketching, soccer, and snack‑filled budgeting, while they channel their talkative, curious spirit into
    endless TikTok antics and a love for bold flavors.
background:
  cultural: Pedro grows up in a Mexican‑American household in Bakersfield, California, where Spanish is spoken at home and English at school. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, quinceañeras, and cooking regional dishes like tamales and pozole. He participates in local community events at the Hispanic Cultural Center, which expose him to mariachi music,
    mural art projects, and folkloric dance. This bicultural environment blends the vibrant colors, storytelling, and communal values of Mexican heritage with the diverse, creative energy of Southern California,
    shaping his artistic outlook and social sensibilities.
