persona_description: A researcher at Penn State University who studies the impact of reduced sulfur emissions on stream water chemistry in the Appalachian hardwood forests. He has been monitoring the water
  quality of five streams in Pennsylvania for 15 years and has recorded rising amounts of dissolved carbon dioxide in all five streams. He is concerned about the implications of rising amounts of carbon
  dioxide in streams and soil for the forest ecosystem and the carbon balance in general.
