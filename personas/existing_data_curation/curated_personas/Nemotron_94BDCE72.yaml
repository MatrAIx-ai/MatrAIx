personas:
  professional: Jane Franklin, a retired small-business accountant with four decades of budgeting and spreadsheet expertise, now channels their methodical mindset into volunteer project coordination and
    they are eyeing a board seat at the Shoreham Historical Society to apply their organized, routine-driven approach to preserving local heritage.
  sports: Jane Franklin enjoys low-impact fitness through weekly walks on the nearby nature trail, follows the New York Mets avidly, participates in a local senior walking club, and they occasionally watch
    the Long Island Nets basketball games on television.
  arts: Jane Franklin immerses themselves in classic American literature, favoring works by Mark Twain and Harper Lee, attends the Shoreham Playhouse's monthly productions, listens to Ella Fitzgerald’s
    jazz records while knitting, and cherishes the watercolor landscapes of Winslow Homer displayed at the local gallery.
  travel: Jane Franklin prefers road trips to familiar historic towns, revisiting New England coastal villages and planning a future genealogical pilgrimage to the English countryside, while also enjoying
    leisurely stays at nearby Montauk beaches with their adult children, always traveling with a detailed itinerary written in their notebook.
  culinary: Jane Franklin loves cooking garden-fresh vegetable soups, shepherd’s pie with rosemary-scented potatoes, and baking apple crumble, relies on their garden’s produce, and occasionally experiments
    with spice blends from their genealogical research trips, though they sometimes forget to refrigerate leftovers promptly.
  core: Jane Franklin is a routine-loving, spreadsheet-savvy retiree who knits, gardens, and competes quietly for community leadership roles, balancing practicality with a modest skepticism of new tech,
    and they often organize their day around a meticulously kept planner.
background:
  cultural: Jane was raised in a middle‑class, working‑class family in the suburban neighborhoods of Long Island, where her parents emphasized hard work, self‑reliance, and community responsibility. Of
    English and Irish descent, she grew up in a Protestant (Methodist) household that valued modesty, routine, and practical service to others. The cultural milieu of Suffolk County, with its close‑knit
    neighborhoods and strong civic organizations, reinforced her appreciation for orderly planning and small‑scale cooperation. These roots have shaped her pragmatic outlook, her comfort with solitude,
    and her dedication to preserving local traditions.
attributes:
  skills: '[''Financial planning and budgeting'', ''Small business administration'', ''Volunteer project coordination'', ''Event planning for small groups'', ''Homeowners association management'', ''Genealogical
