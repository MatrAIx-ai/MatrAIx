    "Inventory Management", "Report Generation"]'
  hobbies: '["Gardening", "Reading mystery novels", "Birdwatching", "Hiking in the Loess Hills", "Quilting with a community group", "Volunteering as a literacy tutor at the local library", "Cooking family
    recipes", "Attending community theatre performances", "Practicing yoga", "Taking online genealogy courses"]'
  career_goals: Anna Nicole aims to transition from a general office clerk to an office manager role where she can lead efficiency initiatives and mentor a team. She plans to earn the Certified Administrative
    Professional (CAP) credential to formalize her expertise. Over the next five years, she hopes to spearhead a digital transformation project for her workplace, reducing paperwork by 30% and improving
    data accuracy. As she approaches retirement, she envisions consulting part‑time for small family‑owned businesses in Sarpy County, helping them streamline operations while leveraging her extensive knowledge
    of business processes.
