  career_goals: Looking ahead, Marc aims to transition from a front-line surveillance officer to a supervisory role within the casino’s security department. He is working toward obtaining a Certified Protection
    Professional (CPP) credential and plans to lead a small team of guards, leveraging his experience to develop a mentorship program for new hires, especially veterans and local youth. In the longer term,
    Marc envisions opening his own security consulting firm that advises small businesses and community venues on risk assessment and affordable surveillance solutions. He also hopes to secure a stable
    retirement while maintaining a role that allows him to stay engaged with the industry and give back to the Frederick Black community through training workshops.
