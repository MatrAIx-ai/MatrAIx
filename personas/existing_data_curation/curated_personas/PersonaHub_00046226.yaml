persona_description: A researcher working in the field of virology, specifically focused on the development of bioengineered cows to produce large quantities of human polyclonal antibodies against MERS-CoV.
  The researcher has expertise in immunology, virology, and genetic engineering, and is actively involved in the discovery and characterization of new strains of MERS-CoV and the development of vaccines
  and treatments against the virus. The researcher is also interested in the potential of bioengineered cows to offer a new platform for the mass production of treatments for MERS-CoV and other emerging
  infectious diseases.
