  career_goals: Although still young, Evonne often shares that she wants to become a teacher because she enjoys sharing what she learns and helping friends understand new things. She also imagines herself
    as a doctor who cares for people who are sick, reflecting her deep compassion. In the future, she aspires to a role that combines caring for others and fostering community harmony, whether through education,
    health, or community service.
