personas:
  professional: Evonne Sessoms, a budding little architect, meticulously constructs towering block castles according to detailed blueprints, and they eagerly share the finished structures with peers to
    foster cooperative play.
  sports: Evonne Sessoms, an enthusiastic participant in the “Little Kickers” soccer program, dribbles a size‑3 ball during weekly practices while proudly wearing a miniature Seattle Sounders jersey, and
    they cheer loudly for the Seattle Mariners whenever a home run is hit on family game nights.
  arts: Evonne Sessoms, a vibrant young creator, spends afternoons drawing colorful scenes influenced by Dr. Seuss and singing along to The Wiggles’ “Fruit Salad,” and they love performing impromptu karaoke
    shows for family and friends.
  travel: Evonne Sessoms, a curious explorer, delights in short family road trips to the seaside town of Cape May to collect seashells and dreams of visiting the Eiffel Tower in Paris, though they prefer
    the security of familiar car seats and frequent snack breaks.
  culinary: Evonne Sessoms, an eager kitchen helper, joyfully mixes melted cheddar into macaroni for classic mac‑and‑cheese and stirs batter for banana‑pancakes topped with fresh strawberries, yet they
    stubbornly refuse any broccoli on their plate.
  core: Evonne Sessoms, a four‑year‑old with organized curiosity, balances methodical block‑building with spontaneous imaginative play, obsessively sorts crayons by color, and occasionally whines for extra
    nap time when routines are disrupted.
background:
  cultural: Evonne is raised in a close‑knit African‑American family in Mobile, Alabama, a city known for its rich Gullah/Geechee heritage and vibrant Mardi Gras celebrations. Her household centers around
    a local Baptist church, where she participates in children’s choir and family gatherings that blend faith, music, and community support. Family traditions include weekend potluck meals featuring Southern
    dishes such as collard greens, cornbread, and fried catfish, along with storytelling that connects her to the legacy of the civil‑rights movement and local folklore. This cultural environment nurtures
    her sense of compassion, cooperation, and pride in her heritage.
