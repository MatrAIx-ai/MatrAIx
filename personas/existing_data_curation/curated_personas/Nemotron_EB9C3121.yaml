personas:
  professional: Martha Mercadocruz, a 62‑year‑old veteran electrician, channels over 35 years of wiring expertise, bilingual communication, and a meticulous safety mindset into a mentorship‑focused consulting
    practice that blends community‑center workshops, solar‑retrofit projects for low‑income housing, and a lively, talk‑heavy teaching style.
  sports: Martha Mercadocruz spends Saturday mornings hiking the winding Mystic River pathways, cheers enthusiastically for the Boston Red Sox and Boston Celtics, and participates in a senior bridge club
    that doubles as a low‑impact cardio activity, blending gentle endurance with her love for social interaction.
  arts: Martha Mercadocruz absorbs the rhythm of salsa nights to Celia Cruz and Tito Puente, devours historical novels by Hilary Mantel, attends local community‑theater productions starring the Riverbend
    Players, and often showcases her own improvisational dance moves inspired by famed performer Rosa López.
  travel: Martha Mercadocruz favors short, well‑planned road trips to New England coastal gems like Newport, Rhode Island, where she harvests fresh herb market finds, while dreaming of a culinary pilgrimage
    to Tuscany’s vineyards, carefully balancing her limited retirement budget with a desire for cultural immersion.
  culinary: Martha Mercadocruz delights in preparing ceviche with lime‑marinated firm white fish, cilantro, and aji amarillo, as well as lomo saltado flavored with soy sauce, red onion, and rosemary, often
    pairing dishes with a homemade aji verde sauce crafted from garden‑grown cilantro, oregano, and jalapeños, and she treats herself to occasional pisco sours during lively gatherings.
  core: Martha Mercadocruz, a talkative 62‑year‑old master electrician, mixes meticulous safety expertise with a love for salsa, herbs, and community mentoring, even as anxiety sometimes stalls her own
    self‑care.
background:
  cultural: Martha’s cultural foundation is rooted in her Peruvian upbringing. She grew up in a household where Spanish was spoken daily, and traditional celebrations such as Día de la Canción Criolla and
    Inti Raymi were marked with music, dancing, and communal meals. The values of family solidarity, respect for elders, and hospitality were instilled early, shaping her cooperative and kind nature. After
    moving to the United States, she blended these traditions with the multicultural tapestry of Somerville, participating in local Latin American festivals, preserving Andean culinary techniques, and sharing
    her heritage through storytelling and community events. Her bilingual ability allows her to bridge generational gaps within the Peruvian diaspora and support neighbors from diverse backgrounds.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Conduit bending'', ''Blueprint reading'', ''National Electrical Code compliance'', ''Safety inspections'', ''Bilingual customer communication
