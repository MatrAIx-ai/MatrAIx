  hobbies: '[''Cooking Peruvian dishes'', ''Salsa dancing'', ''Community volunteering (electrical safety workshops)'', ''Gardening'', ''Hiking local trails'', ''Bridge club'', ''Reading historical fiction'',
    ''DIY home improvement projects'', ''Attending cultural festivals'']'
  career_goals: Even though she is approaching traditional retirement age, Martha aims to transition from full‑time field work to a mentorship‑focused role. She plans to obtain her Master Electrician certification,
    develop a part‑time consulting service for energy‑efficiency retrofits in low‑income housing, and lead community workshops on safe DIY electrical projects. Her long‑term ambition includes establishing
    a small, family‑run contracting business that leverages solar and smart‑home technologies, allowing her to combine her practical expertise with her love for teaching and community service.
