  career_goals: While still a toddler, Kokilaben's family nurtures a vision of a future grounded in structure, practicality, and compassion. They imagine her growing into a reliable professional—perhaps
    a teacher who values organized classrooms, a nurse who provides steady care, or an engineer who solves real‑world problems. Her early preference for predictable routines and her cooperative yet assertive
    nature are seen as foundations for a career that balances self‑interest with helping others.
