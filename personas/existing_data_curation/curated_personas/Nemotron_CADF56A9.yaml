personas:
  professional: Kokilaben Baig, a one‑year‑old with a pronounced preference for predictable routines, already demonstrates proto‑organizational skills by arranging toys in tidy rows, indicating that they
    may one day thrive as an efficient systems thinker.
  sports: Kokilaben Baig, who enjoys rhythmic splashes in the local community pool's parent‑child swim class and participates in toddler movement sessions with the Little Kickers soccer group, prefers the
    gentle structure of scheduled playtimes over large, chaotic playground gatherings and they proudly cheer for the hometown baseball team, the River City Ravens, during family viewing nights.
  arts: Kokilaben Baig, a one‑year‑old who responds vividly to the soothing melodies of Jewel, the playful rhythms of Raffi, and the classical piano pieces of Mozart, spends quiet afternoons absorbing these
    sounds while clutching a soft plush, and they show early signs of a budding appreciation for melodic structure.
  travel: Kokilaben Baig, who has experienced short trips to the local aquarium and a weekend family getaway to a coastal resort, prefers well‑planned, short excursions with familiar caregivers and they
    dream of one day visiting the vibrant gardens of Singapore, imagining the bright flowers and calm ponds.
  culinary: Kokilaben Baig, whose palate currently favors smooth mashed sweet potatoes, ripe banana purées, and a mild hint of avocado, enjoys assisting (in a limited sense) with mother’s kitchen chores
    by pressing the small wooden spoon into a hand‑made vegetable puree, and they prefer meals that are warm, mildly seasoned, and easy to hold.
  core: Kokilaben Baig, a one‑year‑old with a keen appetite for routine, tiny pleasures, and orderly play, quietly asserts independence while clinging to familiar comforts, and they balance curiosity with
    a need for predictability.
background:
  cultural: Born to South Asian parents and raised in Columbus, Ohio, Kokilaben is immersed in a blend of Indian cultural traditions and Midwestern American life. At home, she hears both English and Gujarati/Hindi,
    sees colorful rangoli designs during Diwali, and enjoys foods such as dal, rice, and roti. The family participates in local South Asian community gatherings, where she experiences traditional music,
    gentle dance, and storytelling. This bicultural environment shapes her identity, offering a rich tapestry of customs while reinforcing the values of structure, community, and respect for both her heritage
    and her broader American surroundings.
