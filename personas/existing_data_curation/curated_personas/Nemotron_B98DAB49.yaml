    drivers'']'
  hobbies: '[''Oil painting'', ''Watercolor sketching'', ''Landscape photography'', ''Reading science-fiction/fantasy novels'', ''Bowling league'', ''Community theater participation'', ''Classic car restoration'',
    ''Volunteering at local events'', ''Amateur astronomy'']'
  career_goals: Stephen aims to transition from active driving to a mentorship and safety education role within the next few years. He aspires to become a certified driver trainer for a regional logistics
    firm, sharing his extensive knowledge of safe driving practices and stress‑resilient techniques. Parallel to this, he plans to launch a small consulting side business focused on optimizing delivery
    routes for local businesses, leveraging his expertise in logistics and technology. Over the next five years, his ambition includes earning a Level II motor carrier safety compliance certification, publishing
    a handbook on mindful driving, and eventually reducing his on‑road hours to focus on coaching and community volunteering while maintaining a modest supplemental income from his consulting work.
