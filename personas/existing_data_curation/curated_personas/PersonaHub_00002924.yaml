persona_description: A person who is deeply concerned about the global HIV/AIDS pandemic and is actively working towards preventing and caring for those affected by the disease. This person is knowledgeable
  about the methods of education and drug therapies that can prevent HIV infection and extend the quality and length of life for those living with the disease. This person is also aware of the opportunity
  to stop HIV infection, care for the sick and their families, learn about HIV and advocate for the commitment of resources needed to fight this horrible disease.
