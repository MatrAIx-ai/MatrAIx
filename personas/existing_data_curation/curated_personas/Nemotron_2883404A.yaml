personas:
  professional: James Brown, an aspiring journeyman electrician currently enrolled in a community‑college trade program, blends his reliable, routine‑driven nature with hands‑on automotive and carpentry
    skills to excel in his apprenticeship while volunteering his certified first‑aid expertise at the local fire department, and envisions later launching a steady‑schedule handyman service for his neighbors.
  sports: James Brown is a regular at the town’s Saturday morning biking club, a faithful supporter of the Riverton High School football team the Raiders, and prefers low‑impact fitness like trail hiking
    and weekend fishing over high‑intensity competitive sports.
  arts: James Brown finds comfort in classic cinema like 'Casablanca' and sitcoms such as 'The Andy Griffith Show', while his woodworking hobby reflects his appreciation for functional art, and he often
    listens to timeless musicians like Johnny Cash and the Eagles while building birdhouses.
  travel: James Brown enjoys practical weekend getaways to nearby state parks such as Shenandoah National Park and plans a future road trip along the Pacific Coast Highway, favoring destinations where he
    can fish, hike, and camp without straying far from his familiar routine.
  culinary: James Brown gravitates toward hearty, grill‑centric meals, frequently preparing burgers, smoked chicken thighs, and corn on the cob using fresh tomatoes from his garden, and he enjoys mastering
    simple sauces like homemade barbeque glaze with hickory smoke.
  core: James Brown is a routine‑oriented, hands‑on 23‑year‑old who balances dependable work aspirations with a love for outdoorsy hobbies, yet wrestles with worry‑driven stress that nudges them toward
    meticulous planning and occasional over‑cautiousness.
background:
  cultural: James is a white male raised in Coquille, a small town in Coos County, Oregon. He grew up in a modest working‑class family with deep ties to the region’s timber and fishing heritage. His upbringing
    was shaped by the values of self‑reliance, neighborliness, and a strong connection to the surrounding forests and rivers. He attended the local public high school, where community events and outdoor
    activities were central to social life. His family practiced a Protestant faith, attending church on Sundays and celebrating traditional American holidays such as Thanksgiving and the Fourth of July.
    James respects the local Native American history and the broader Pacific Northwest culture, even though his personal identity aligns with the predominantly rural, white, working‑class culture of his
    hometown.
