    coordination'', ''Bilingual communication (English and Spanish)'', ''Public speaking and training (workshop facilitation)'', ''Sustainable plumbing practices (low‑flow fixtures, gray‑water recycling)'',
    ''Custom water feature design (artistic fountains, rain walls)'', ''Troubleshooting high‑pressure systems'', ''Diagnostic tool operation (pressure gauges, leak detection)'', ''Customer relationship
    management'']'
  hobbies: '[''Visiting art galleries and street‑art festivals'', ''Creating kinetic water sculptures'', ''Architectural and industrial photography'', ''Improv comedy workshops'', ''Yoga and meditation'',
