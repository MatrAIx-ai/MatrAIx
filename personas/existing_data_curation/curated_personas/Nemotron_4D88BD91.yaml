    in the Santa Monica Mountains'', ''Playing acoustic guitar'']'
  career_goals: Brandon aims to transition from a skilled tradesperson to a business owner who blends technical prowess with artistic water‑feature design. Over the next five years he plans to obtain his
    Master Plumber license and additional certifications in green building (LEED) and pipe‑fitting welding. He envisions launching a boutique firm in West Hollywood that offers high‑end residential and
    boutique‑hotel bathroom renovations, custom water installations, and sustainable plumbing solutions. Parallel to his entrepreneurial goals, he wants to become a certified instructor for a community
    college, sharing his imaginative approach with the next generation of plumbers. Long‑term, he aspires to lead a regional trade union chapter, advocate for inclusive apprenticeship programs, and collaborate
    with local artists on public‑space water installations that celebrate both functionality and aesthetic innovation.
