personas:
  professional: Brandon Rahmani, a 39-year-old master plumber and kinetic water-sculpture designer, blends meticulous project management, advanced CAD drafting, bilingual communication, and a flair for
    improvisational storytelling, turning each plumbing contract in Los Angeles into a seamless merger of code-compliant engineering and imaginative art.
  sports: Brandon Rahmani follows the Los Angeles Lakers, Dodgers, and Galaxy fervently, joins a Saturday morning co-ed yoga class at a local studio for flexibility, and plays pick-up volleyball at the
    beach in the summer, treating fitness as both a social outlet and a way to offset the physical demands of plumbing work.
  arts: Brandon Rahmani immerses themselves in L.A.'s art world by attending openings featuring artists like Ai Weiwei, Kehinde Wiley, and James Turrell, documenting street-art murals with a vintage Leica,
    and performing improv comedy at The Groundlings, where their talkative, center-stage energy fuels both creative collaborations and spontaneous performance art.
  travel: Brandon Rahmani prefers meticulously planned trips that blend architectural photography with culinary exploration, having mapped itineraries for Barcelona's Gaudi landmarks, Kyoto's zen gardens,
    and Oaxaca's food markets, while they also set aside weekend getaways to Joshua Tree for desert stargazing and spontaneous skateboarding tours along Venice Beach.
  culinary: Brandon Rahmani shows a deft hand in the kitchen, mastering mole poblano with a miso twist, grilling carne asada while glazing it with a lime-coconut reduction, and seasoning tacos with smoked
    chipotle and fresh cilantro, all while experimenting with sous-vide techniques and sourcing heirloom corn and ancho chile powder.
  core: Brandon Rahmani is a precision-driven plumber-artist who channels boundless imagination into kinetic water installations, balances methodical planning with a knack for the spotlight, and lives by
    a disciplined routine that mixes yoga, budget-savvy investing, and a love for eclectic art and cuisine.
background:
  cultural: Brandon grew up in a close‑knit Mexican‑American family in the greater Los Angeles area, with roots tracing back to his grandparents who emigrated from Jalisco. Fluent in Spanish and English,
    he regularly celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around homemade tamales and mole. The cultural emphasis on community, hard work, and
    craftsmanship has shaped his dedication to trade excellence. Living in West Hollywood, he blends his heritage with the city's diverse, artistic vibe, often participating in local cultural festivals,
    supporting Latino artists, and integrating Mexican motifs—like vibrant tile patterns and mythic water symbols—into his custom water‑feature designs.
attributes:
  skills: '[''Advanced pipe installation (copper, PEX, PVC, stainless steel)'', ''Steam system installation and maintenance'', ''Blueprint and technical drawing interpretation'', ''CAD design (AutoCAD,
