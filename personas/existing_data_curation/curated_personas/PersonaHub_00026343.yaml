persona_description: A horse trainer who has experience in diagnosing and treating injuries in horses. They are particularly skilled in identifying and treating injuries such as bog spavins and thoroughpins,
  which are common in horses. They have a deep understanding of the anatomy and physiology of horses and are familiar with the various treatments available for these injuries, including the use of cortisone
  to drain and pump the lump. They are also knowledgeable about the signs and symptoms of these injuries, as well as the potential consequences of not treating them promptly.
