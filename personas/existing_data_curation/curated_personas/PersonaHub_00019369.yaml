persona_description: A marine engineer who specializes in the design and analysis of ocean-going vessels, particularly bulk carriers and tankers. They use software from ANSYS to simulate and predict the
  behavior of the hull, propeller, and cargo tanks under various load scenarios, helping to mitigate risks and optimize vessel performance. They have experience in the design and analysis of various types
  of ships, including general cargo ships, container ships, oil and chemical tankers, passenger ships, ferries, yachts, and navy ships. They are known for their ability to use simulation-driven product
  development to make critical decisions throughout the design process, leading to safer and more efficient vessels.
