persona_description: A scientist who specializes in the study of climate change and its impacts on natural and managed systems, particularly focusing on the relationship between significant observed changes
  and significant regional temperature changes. This scientist has experience using climate models to assess observed changes in various physical and biological systems and has a deep understanding of the
  impact of anthropogenic forcing on surface temperature increases. They are interested in the influence of anthropogenic forcing in various physical systems over the last 50 years and have a keen interest
  in the relationship between significant observed changes and significant regional temperature changes.
