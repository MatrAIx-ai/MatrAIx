  career_goals: Olivia aims to earn her Professional Engineer (PE) license within the next two years and transition into a senior project manager role overseeing large-scale infrastructure projects in the
    Eastern Shore region. She is passionate about integrating sustainable design practices into local developments, such as green building initiatives and flood-resilient structures. Long‑term, she envisions
    establishing her own consulting firm to mentor junior engineers, promote community‑focused engineering solutions, and achieve a healthier work‑life balance that mitigates stress.
