personas:
  professional: Olivia Ford, a methodical structural engineer at a regional design firm, leverages their AutoCAD and SolidWorks expertise, meticulous documentation, and people‑centric leadership style to
    drive sustainable infrastructure projects while mentoring junior staff.
  sports: Olivia Ford channels their high energy into weekend rides with the Delmarva Cycling Club, seasonal coastal hikes on Assateague Island, and occasional community softball games, maintains a structured
    training schedule that balances cardio and strength work, and roots for the Baltimore Ravens, Baltimore Orioles, and Washington Capitals as their go‑to professional sports teams.
  arts: Olivia Ford expresses their outgoing side through community theater productions such as The Crucible, dives into mystery novels by Agatha Christie during downtime, and finds inspiration in the music
    of Lin‑Manuel Miranda and Brandi Carlile, which often echo in their kitchen while cooking.
  travel: Olivia Ford plans their trips with a blend of meticulous itineraries and spontaneous detours, preferring weekend getaways to coastal towns like Charleston and Portland for adventure, while dreaming
    of longer eco‑focused journeys to Iceland’s volcanic landscapes and New Zealand’s fjords, all balanced against a modest travel budget and occasional family commitments.
  culinary: Olivia Ford enjoys experimenting with farm‑to‑table recipes in cooking classes, mastering dishes like Old Bay‑seasoned crab cakes, lemon‑garlic shrimp scampi, and roasted beet and goat‑cheese
    salad, favoring fresh seafood, locally sourced herbs, and a dash of Old Bay seasoning to bring a coastal flair to their moderately skilled yet enthusiastic culinary endeavors.
  core: Olivia Ford blends structured engineering precision with a love for community theater and cycling, constantly worries about upcoming deadlines, keeps a pocket notebook for spontaneous ideas, and
    habitually checks the weather before each hike.
background:
  cultural: Olivia grew up in a middle‑class family on Maryland's Eastern Shore, where a blend of agricultural, maritime, and small‑town values shaped her practical worldview. The region's emphasis on self‑reliance,
    community support, and modest hospitality informed her cooperative and considerate nature. While her formal education concluded with high school, she pursued technical certifications and on‑the‑job
    training, reflecting the local cultural respect for skilled trades. Traditional American holidays and regional festivals are part of her family traditions, and she maintains a balanced perspective that
    honors her heritage while embracing progressive ideas about sustainability and community development.
