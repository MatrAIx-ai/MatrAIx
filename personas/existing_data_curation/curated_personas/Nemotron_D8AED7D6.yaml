  hobbies: '[''Church choir'', ''Gardening'', ''Soul food cooking'', ''Reading African American history'', ''Volunteering at local food pantry'', ''Mentoring youth'', ''Walking groups'', ''Zumba classes'',
    ''Attending cultural festivals'']'
  career_goals: Sharhonda aims to step into a senior leadership role within the county's social service network, such as a program director or department manager. She plans to complete her bachelor’s degree
    in public administration and obtain a Certified Community Service Specialist credential. Her ambition includes securing stable funding streams for youth mentorship initiatives, establishing a community
    resource hub that leverages technology for service access, and mentoring younger staff to build a pipeline of skilled, culturally aware practitioners. She also hopes to influence county policy on affordable
    housing and mental‑health services through data‑driven advocacy.
