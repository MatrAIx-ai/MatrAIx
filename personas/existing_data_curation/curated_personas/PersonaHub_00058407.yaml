persona_description: A healthcare professional who specializes in eye care and specializes in the diagnosis and treatment of various eye diseases, particularly those that affect the aging process. They
  are highly knowledgeable about the effects of age on the eyes and the importance of regular eye screenings to detect these conditions early. They are also skilled in performing various eye surgeries,
  such as cataract surgery, and are highly experienced in the management of various eye diseases, including glaucoma, AMD, and diabetic retinopathy. They are committed to providing the best possible care
  to their patients and are highly skilled in providing preventative care to help prevent the development of eye diseases in the aging population.
