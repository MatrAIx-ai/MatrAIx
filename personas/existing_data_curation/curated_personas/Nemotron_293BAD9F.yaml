  career_goals: John aspires to advance to a district‑manager role within the next three to five years, overseeing multiple store locations in the Baltimore‑Washington corridor. He plans to earn a certified
    retail management credential to deepen his strategic skill set and to pilot data‑analytics initiatives that improve store profitability. Beyond corporate advancement, he dreams of eventually launching
    a small community‑focused boutique that showcases local artisans, allowing him to combine his practical retail expertise with his curiosity for niche market trends. Mentorship remains central to his
    ambition; he wants to develop a pipeline of future supervisors through structured training programs.
