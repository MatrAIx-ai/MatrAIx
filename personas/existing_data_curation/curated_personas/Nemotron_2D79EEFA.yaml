  hobbies: '[''Model ship building'', ''Woodworking'', ''Salsa dancing'', ''Cooking Dominican cuisine'', ''Listening to merengue'', ''Community tech volunteering'', ''Fishing'', ''Reading biography books'',
    ''Gardening'']'
  career_goals: Martin aims to step into a supervisory role where he can lead a team of CNC operators, champion continuous‑improvement initiatives, and formalize his knowledge through an industry‑recognized
    certification like NIMS. He also dreams of establishing a small consulting practice that helps regional manufacturers modernize their machining processes, and he hopes to spend more time teaching aspiring
    technicians, melding his curiosity for new technologies with a desire to give back to his community.
