personas:
  professional: Lucian Lu, a budding creative technologist, merges sketching, digital painting, and Minecraft world design to prototype visual concepts while applying the logical discipline learned from
    robotics, showcasing a uniquely organized yet flexible approach to collaborative school projects.
  sports: Lucian Lu, a fan of the local junior soccer club and an avid weekend hiker in the nearby Green Valley Preserve, cheers for the hometown baseball team, the Riverside Rovers, while balancing a love
    for cardio with occasional bouts of procrastination that lead to missed practice.
  arts: Lucian Lu, an enthusiastic participant in the school drama club, draws inspiration from Studio Ghibli’s Miyazaki films, the music of Billie Eilish, and the theatrical flair of Lin‑Manuel Miranda,
    weaving these influences into their sketches, compositions, and on‑stage performances.
  travel: Lucian Lu, who plans trips with Mom using colorful maps and YouTube travel vlogs, relishes day hikes to Redwood National Park and dreams of exploring Kyoto’s temples and the bustling streets of
    Tokyo, balancing family budget constraints with a yearning for immersive cultural adventure.
  culinary: Lucian Lu, a budding chef who can whip up a decent spaghetti carbonara and loves crafting sushi rolls with avocado and cucumber, enjoys sampling spicy ramen on weekend food trips, yet habitually
    forgets to eat breakfast, relying on candy bars for a quick energy boost.
  core: Lucian Lu, a 12‑year‑old imagination powerhouse, channels relentless curiosity into art, robotics, and storytelling while juggling a sweet tooth, occasional forgetfulness, and a love for leading
    the crowd.
background:
  cultural: Lucian grows up in a middle‑class white family in Coraopolis, Pennsylvania, a small suburban community near Pittsburgh. His cultural backdrop reflects typical suburban American values, with
    family traditions that celebrate holidays such as Thanksgiving, Fourth of July, and Christmas, and participation in local events like Riverfest and community fairs. He attends a public middle school
    that encourages inclusivity and multicultural awareness. Proximity to cultural institutions such as the Carnegie Museum of Art, the Children’s Museum of Pittsburgh, and the Carnegie Science Center provides
    regular exposure to art, science, and creativity, reinforcing his imaginative pursuits. His family emphasizes kindness, cooperation, and academic curiosity, shaping his considerate and socially engaged
    personality.
