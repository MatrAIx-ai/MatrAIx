    projects", "exploring nature and nature journaling"]'
  career_goals: Lucian aims to become a concept artist or multimedia storyteller, creating visual worlds for video games, animation, or children's books. He dreams of authoring illustrated fantasy novels
    that inspire other young readers. In the longer term, he hopes to combine his love for art and technology by developing interactive educational experiences that blend storytelling with coding. He plans
    to attend an arts‑focused high school, pursue a degree in Fine Arts, Graphic Design, or Interactive Media, and later work in a creative studio where collaboration and imagination are central.
