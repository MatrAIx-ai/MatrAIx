persona_description: A food safety and hygiene expert who is concerned with reducing the risk of foodborne illness by following proper food handling and preparation practices. They prioritize washing hands,
  surfaces, utensils, and cutting boards to prevent the growth of harmful bacteria, and prefer to use separate cutting boards and plates for different types of foods to avoid cross-contamination. They also
  take extra precautions to keep meat, poultry, seafood, and eggs separate from other foods in the fridge to prevent bacterial spread and to ensure that cooked foods are heated to the appropriate temperature
  to kill harmful bacteria. They are aware of the dangers of the "Danger Zone" and the importance of using a food thermometer to ensure that cooked foods are safe to eat.
