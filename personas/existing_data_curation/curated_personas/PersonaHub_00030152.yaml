persona_description: A rheumatologist who specializes in the diagnosis and treatment of rheumatic diseases, particularly those associated with viral infections. They have a deep understanding of the pathophysiology,
  clinical presentation, and diagnostic criteria for viral arthritis, as well as the importance of early referral and specialist consultation for patients with early, undifferentiated arthritis. They are
  also aware of the potential long-term benefits of early disease-modifying therapy in patients with early inflammatory arthritis, and the need for further research in the area of chronic viral arthritis.
