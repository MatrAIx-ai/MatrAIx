personas:
  professional: Michael Davis, a one‑year‑old budding explorer, shows an early knack for organizing their toy collection by shape and color, and they methodically line up each block before playing, reflecting
    a surprising level of reliability for an infant.
  sports: Michael Davis, a 1‑year‑old who attends toddler gymnastics and loves splashing in the community pool, proudly wears a baby‑sized jersey of the City Flyers, and they eagerly clap along to the crowd’s
    cheers, even though their competitive streak shows up when they race their older sibling to the baby slide.
  arts: Michael Davis, a curious infant, delights in the soothing piano lullabies of Brahms, the playful melodies of Baby Einstein, and the bright illustrations of Dr. Seuss, and they often tap their chubby
    hands on a wooden xylophone to create their own rhythm.
  travel: Michael Davis, a one‑year‑old who has already visited his grandparents' farm in the countryside and spent a weekend at the sun‑kissed beaches of San Diego, prefers the comfort of a familiar car
    seat and a soft blanket during road trips, and they often stare wide‑eyed at the passing scenery, dreaming of a future adventure to a snowy mountain resort.
  culinary: Michael Davis, a toddler beginning solid foods, loves pureed sweet potatoes and avocado, smears peas on their cheeks, enjoys occasional bites of small oatmeal finger biscuits, and they have
    a quirky habit of dropping their spoon and fussing until it is retrieved.
  core: Michael Davis, a one‑year‑old with a surprising penchant for order, constant worry over routine changes, and a habit of lining up their toys, navigates the world with cautious curiosity and occasional
    meltdowns, and they find reassurance in predictable daily rhythms.
background:
