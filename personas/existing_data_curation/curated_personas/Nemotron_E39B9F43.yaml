personas:
  professional: Dominique Doctor blends a methodical risk‑assessment approach with an imaginative visual flair; they use CRM data and abstract paintings to demystify life and health insurance, consistently
    meet client deadlines while maintaining a calm, reserved demeanor, and are charting a path toward branch‑manager leadership and a CFP designation.
  sports: Dominique Doctor finds fitness in solitary hikes along the Maumee River State Park trails and a small yoga class at a boutique studio, they cheer for the Toledo Mud Hens in spring and the Cleveland
    Browns in fall, and they belong to a modest running club that gathers for a community 5‑k every summer.
  arts: Dominique Doctor immerses in the arts by painting Kandinsky‑inspired abstracts, they capture Toledo’s historic neighborhoods with a vintage Nikon, attend openings at the Toledo Museum of Art, devour
    speculative fiction by Ted Chiang and N.K. Jemisin, and listen to the ambient soundscapes of Sigur Rós and the poetry of Ocean Vuong for inspiration.
  travel: Dominique Doctor prefers low‑key cultural immersion, they have explored Detroit’s street‑art scene, spent a sun‑soaked week wandering Barcelona’s galleries, enjoyed a solitary retreat among Kyoto’s
    zen gardens, and are planning future trips to the Scottish Highlands and the Great Barrier Reef, always using a modest budget and leaving room for spontaneous photo walks.
  culinary: Dominique Doctor enjoys crafting Mediterranean‑inspired meals, they whip up lemon‑rosemary grilled salmon with quinoa tabbouleh and a slow‑roasted beet and goat‑cheese salad, savor artisanal
    coffee as a ritual, and occasionally overindulge in dark chocolate truffles after a successful client closing.
  core: Dominique Doctor fuses disciplined insurance expertise with a free‑spirited artistic soul, they turn risk charts into canvases, juggle late‑night coffee, garden daydreams, and an ever‑growing collection
    of vintage camera lenses, while maintaining a calm, reliable presence.
background:
  cultural: Dominique identifies as African American. Her family traces its roots to the Great Migration, when her grandparents moved from the rural South to the industrial Midwest seeking better opportunities.
    Growing up in Toledo, she was immersed in a vibrant Black community that celebrated music, storytelling, and communal support. She attended a historically Black church where gospel music and fellowship
    shaped her values of cooperation and service. She participates in local cultural events such as the African American Heritage Festival, and she supports initiatives that promote financial literacy and
    artistic expression within the Black community. Her cultural heritage influences her appreciation for soulful music, culinary traditions, and the strong emphasis on resilience and community uplift.
attributes:
  skills: '["Life Insurance Sales", "Health Insurance Sales", "Risk Assessment", "Customer Relationship Management", "Negotiation", "Basic Financial Planning", "Small-Group Public Speaking", "Community
    Outreach", "Creative Writing", "Digital Photography"]'
  hobbies: '["Abstract painting", "Digital photography", "Reading speculative fiction", "Writing short stories", "Visiting art galleries", "Gardening", "Hiking in Maumee River State Park", "Volunteering
    in community arts programs", "Cooking experimental cuisines"]'
  career_goals: Dominique aims to advance to a branch manager position within her agency, where she can lead a team of agents and develop a mentorship program that supports newcomers, especially those from
    underrepresented backgrounds. Over the next five years she plans to earn the Certified Financial Planner (CFP) designation to broaden her service offerings into comprehensive financial advising. Ultimately,
    she envisions launching her own boutique consultancy that blends financial services with community education, using art and storytelling workshops to make complex financial concepts accessible and engaging.
