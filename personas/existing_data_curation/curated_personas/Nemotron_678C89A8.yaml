  career_goals: She aims to become a senior engineer within the next two years and eventually a lead developer or principal engineer who drives the technical vision of products that blend technology with
    artistic expression. Callie is particularly interested in creating immersive digital experiences—such as interactive installations, AR/VR applications, or generative art platforms—that allow users to
    explore creativity through code. To achieve this, she plans to deepen her expertise in machine learning for generative media, earn certifications in cloud architecture, and build a portfolio of side
    projects that showcase the intersection of art and software. Long‑term, she envisions co‑founding a startup focused on collaborative creative‑tech tools or taking a CTO role where she can mentor diverse
    engineering teams and champion innovative, user‑centric design.
