persona_description: A historian who specializes in the study of English and Anglo-Saxon history, particularly the early medieval period. His research interests include the origins and development of the
  family name Bathurst, its associations with the manor of Bathurst near Battle Abbey in Sussex, and the role of surnames in identifying local landowners and their connections to the manor. He is also interested
  in the history of the family's entries in the "Dictionary of National Biography" and the various notable entries in the "Dictionary of National Biography".
