persona_description: A fish keeper who is experienced with the treatment and care of sick fish, particularly those with dropsy. They are knowledgeable about the root causes of dropsy, the symptoms, and
  the appropriate treatment plan. They are committed to treating their fish with the best available treatment, even if it is not always successful. They are aware of the high fatality rates associated with
  dropsy and are prepared to make difficult decisions about the treatment of their fish. They are empathetic and understanding of the emotional impact of losing a pet.
