personas:
  professional: Jerry Bloodworth, a budding digital storyteller, blends hand‑drawn sketches, Python‑coded interactive narratives, and experimental music soundtracks into short multimedia pieces, turning
    solitary hikes and quiet contemplation into visual and auditory art while their spontaneous, deadline‑averse nature often leads to uneven project timelines.
  sports: Jerry Bloodworth prefers solitary fitness pursuits, logging weekend hikes in the Foothills and occasional trail runs that echo the rhythm of the Denver Broncos' defensive line, while cheering
    for the Colorado Rockies and occasionally meeting up with the Fort Collins Mountain Bike Club for low‑key rides during summer.
  arts: Jerry Bloodworth immerses themselves in sketching whimsical characters, drawing inspiration from the surreal landscapes of Hayao Miyazaki, the ambient textures of Brian Eno, and the philosophical
    depth of Ursula K. Le Guin, while curating personal playlists that feature Aphex Twin, Björk, and experimental post‑rock bands to fuel late‑night digital illustrations.
  travel: Jerry Bloodworth plans low‑key getaways centered on solitary nature immersion, having trekked the alpine trails of Rocky Mountain National Park and dreaming of a quiet night under the auroras
    of Iceland's Reykjanes Peninsula, all while budgeting with a small savings stash that limits trips to weekend road‑ventures within driving distance.
  culinary: Jerry Bloodworth enjoys minimalist yet experimental home cooking, often whipping up avocado‑toast topped with smoked salmon and a drizzle of sriracha, mastering instant ramen upgrades with soft‑boiled
    eggs and miso paste, while occasionally experimenting with matcha‑infused dark chocolate truffles that reveal a budding but still imperfect pastry skill.
  core: Jerry Bloodworth is a solitary, curiosity‑driven teen who translates quiet hikes and experimental soundscapes into digital art, even as they wrestle with procrastination, impulsive splurges on creative
    gear, and occasional insomnia.
background:
  cultural: Jerry grew up in a predominantly white, middle‑class family in Fort Collins, Colorado. The region’s strong outdoor ethic, progressive community values, and proximity to Colorado State University’s
    vibrant arts scene have shaped his appreciation for nature, independent thought, and creative expression. While his family upholds traditional Western values of self‑reliance, they encourage his unconventional
    interests, allowing him to explore alternative learning paths and artistic pursuits. This blend of Colorado’s environmental awareness, individualism, and supportive yet independent upbringing informs
    his worldview and personal pursuits.
attributes:
  skills: '[''drawing'', ''digital illustration'', ''photography'', ''basic Python programming'', ''video editing'', ''research and information synthesis'', ''DIY electronics tinkering'']'
