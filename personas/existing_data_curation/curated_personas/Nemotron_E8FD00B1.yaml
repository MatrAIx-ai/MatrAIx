    to experimental music'']'
  career_goals: Jerry aspires to turn his creative passions into a flexible, solitary career. He aims to develop a strong portfolio that will open doors to freelance concept art and indie game development,
    where he can design visual narratives and simple interactive experiences on his own schedule. In the longer term, he hopes to attend a specialized art or design program that values self‑directed learning,
    eventually securing remote or contract work that lets him maintain independence while contributing to innovative digital media projects.
