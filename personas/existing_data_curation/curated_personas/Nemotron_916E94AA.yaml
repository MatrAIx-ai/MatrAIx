  hobbies: '[''Urban Gardening'', ''Traditional Vietnamese Cooking'', ''Reading Nonfiction (Finance, Self‑Help, History)'', ''Mini‑Hiking on Local Trails'', ''Tai Chi & Mindfulness Meditation'', ''Scale
    Model Building'', ''Volunteer English Tutoring'']'
  career_goals: Minh aims to re‑enter the workforce in a part‑time logistics or administrative role where his structured approach and attention to detail are valued. He plans to obtain a GED and pursue
    an associate’s degree in business administration through a local community college, followed by a certification in supply‑chain management. In the longer term, he hopes to launch a small home‑based
    business selling homemade Vietnamese specialty items online, providing financial stability for his family and preserving cultural heritage. Minh also aspires to mentor younger members of the Vietnamese
    community in Portland, guiding them through language acquisition and career planning while working on his own stress‑management and mental‑health resilience.
