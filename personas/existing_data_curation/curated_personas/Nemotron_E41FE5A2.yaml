  hobbies: '[''vegetable gardening'', ''knitting and quilting'', ''reading historical fiction'', ''crossword puzzles'', ''birdwatching'', ''attending church services'', ''listening to classic country and
    gospel music'', ''baking seasonal pies'', ''digital photo archiving'']'
  career_goals: At 92, Tina’s primary ambition is to maintain her independence and the health of her historic family home in Lancaster. She aims to finish a handwritten memoir that captures her family’s
    stories and the evolution of the community, preserving these narratives for her grandchildren and great‑grandchildren. She also wishes to organize her extensive recipe collection and pass it on to a
    younger relative, creating a small printed family cookbook. Tina hopes to continue volunteering informally at her church’s senior‑friendly garden, offering advice on planting and harvest. Additionally,
    she is determined to ensure her estate is in order, including the transfer of her cherished quilts and heirloom furniture, so that her legacy endures.
