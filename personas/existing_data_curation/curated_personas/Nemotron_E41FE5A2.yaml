personas:
  professional: Tina Cunningham, a 92‑year‑old horticultural volunteer and home‑budget advisor, channels their love of routine and practical mindset into maintaining her historic Lancaster home, tutoring
    neighbors in low‑maintenance gardening, and keeping the church garden’s finances orderly, while embracing a relaxed approach to planning that lets them adapt to daily needs.
  sports: Tina Cunningham, a 92‑year‑old garden enthusiast, enjoys gentle walks around her raised‑bed plot, participates in a weekly senior low‑impact exercise class, follows the Lancaster Barnstormers
    baseball team and the Philadelphia Eagles football team, and practices birdwatching for blue jays and cardinals as a leisurely sport.
  arts: Tina Cunningham, a 92‑year‑old music lover and avid reader, fills their afternoons with classic country and gospel records by Johnny Cash, Dolly Parton, and Mahalia Jackson, immerses themselves
    in historical fiction by Philippa Gregory and Ken Follett, and knits to the rhythm of hymns while appreciating local quilting exhibitions.
  travel: Tina Cunningham, a 92‑year‑old who favors short, well‑planned trips, regularly travels by car with family to historic destinations such as Colonial Williamsburg, the Amish countryside of Lancaster
    County, and Savannah’s garden districts, using their tablet to capture photos and keep a travel diary.
  culinary: Tina Cunningham, a 92‑year‑old home‑cooking aficionado, delights in baking seasonal apple, peach, and pumpkin pies, preparing buttermilk biscuits, fried chicken, and preserving garden herbs
    in vinegary jams, often seasoning dishes with fresh basil, rosemary, and thyme from their raised beds.
  core: Tina Cunningham, a 92‑year‑old garden‑loving, quilt‑making, hymn‑singing homemaker, blends routine, quiet creativity, and a nurturing spirit into every facet of their life.
background:
  cultural: Tina was born and raised in Lancaster County, South Carolina, a rural area steeped in Southern traditions and close‑knit community life. As a white Southern woman of the Silent Generation, she
    grew up in a household where church attendance, hospitality, and a strong work ethic were paramount. Her family’s roots in the region go back several generations, shaping her identity with a deep appreciation
    for agrarian rhythms, Southern cuisine, and folk crafts such as quilting. The local Methodist congregation has been a central pillar of her social world, reinforcing values of service, humility, and
    mutual support. While she respects modern conveniences, she maintains a reverence for the customs handed down by her grandparents, including preserving seasonal foods, sharing stories orally, and caring
    for the land. These cultural influences are reflected in her everyday practices and worldview.
