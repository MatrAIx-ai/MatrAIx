  hobbies: '["visiting art galleries", "painting (acrylic & mixed media)", "crocheting", "community theater attendance", "blues and gospel dancing", "board‑game evenings", "potluck cooking", "gardening",
    "reading contemporary fiction", "church volunteer work"]'
  career_goals: Diamond aims to move into a supervisory role within the next two years, leveraging her on‑floor experience to become a shift supervisor and eventually a store manager. She also dreams of
    merging her love for art with her retail background by taking on visual‑merchandising projects that showcase local Black artists. Long‑term, she hopes to launch a community‑focused pop‑up shop or art‑crafters
    market that provides a platform for neighborhood creators while providing a stable income for her family.
