personas:
  professional: Diamond Bernard, a veteran stocker and order filler with over twenty years of hands‑on retail experience in Oklahoma City, combines razor‑sharp inventory instincts with a curious, art‑savvy
    mindset, translating aisle organization into visual‑merchandising concepts that celebrate local Black artists while using a laid‑back, improvisational leadership style as they chase a shift‑supervisor
    promotion.
  sports: Diamond Bernard cheers passionately for the Oklahoma City Thunder, attends local high‑school basketball games, joins a community soft‑ball league on weekends, and channels their love of movement
    into leading blues‑and‑gospel dance nights, treating each session as an informal cardio workout that keeps them on their feet.
  arts: Diamond Bernard thrives in Oklahoma City’s vibrant art scene, painting acrylic canvases that blend abstract cityscapes with personal narratives, crafting mixed‑media collages for community gallery
    shows, crocheting colorful blankets for church fundraisers, and regularly attending community‑theater productions, all while championing emerging local Black artists in informal pop‑up showcases.
  travel: Diamond Bernard plans trips on a whim, preferring road‑trip adventures that weave through the Oklahoma prairie to destinations like Austin’s live‑music bars, New Orleans’ jazz festivals, and Santa
    Fe’s art fairs, balancing a modest travel budget with a love for spontaneous cultural immersion despite a tendency to overpack a few extra knitting supplies.
  culinary: Diamond Bernard’s culinary repertoire centers on soul‑food staples such as fried chicken, collard greens, sweet potato pie, and hearty gumbo, which they perfect for weekly potluck gatherings,
    while also experimenting with eclectic spice blends in the kitchen, though occasional late‑night cravings for fast‑food tacos reveal a lingering indulgent habit.
  core: Diamond Bernard is a community‑focused retail veteran whose artistic curiosity, spontaneous spirit, and occasional financial impulsiveness shape a vibrant, if sometimes disorganized, life.
background:
  cultural: Diamond is an African‑American woman who grew up in the heart of Oklahoma City’s tight‑knit Black community. Her upbringing was steeped in church traditions, Sunday brunches with extended family,
    and the rhythm of blues, gospel, and soul music that shaped her artistic sensibilities. She participates in local Juneteenth celebrations, supports Black-owned art spaces, and values storytelling as
    a way to preserve heritage. The cultural emphasis on resilience, communal support, and pride in Black history informs her worldview, her love for gathering with others, and her desire to uplift her
    community through creative projects.
