  career_goals: Jin aims to progress from a sales associate to store management within the next three to five years, targeting roles such as Assistant Manager and eventually Store Manager. He plans to pursue
    a retail management certification at a local community college to strengthen his leadership and operational expertise. Long‑term, he envisions moving into district‑level management or logistics coordination,
    leveraging his curiosity for technology to implement data‑driven improvements across multiple locations. Additionally, Jin harbors an entrepreneurial ambition to open a boutique shop that showcases
    curated East Asian goods and locally sourced produce, merging his cultural heritage with his retail experience.
