persona_description: A leader in the field of organizational culture, particularly in the context of police reform and change. They are committed to changing the culture of police departments to one of
  equity and respect for all, and are willing to take bold action to do so. They are aware of the persistent problem of police violence against black people and are dedicated to addressing it. They are
  skilled at modeling race-positive behaviors, encouraging and tolerating positive change, and taking swift, unambiguous action when racism occurs. They have a deep understanding of organizational culture
  and how it is shaped by leaders, and are willing to partner with leaders of black communities to heal wounds and work towards a more equitable society.
