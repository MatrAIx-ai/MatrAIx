persona_description: A scientist or researcher who studies plant evolution, particularly how plants adapt to the selective pressures of interacting pollinators and herbivores. They are interested in the
  rapid evolutionary adaptations plants undergo in response to these selective pressures, and how these adaptations can lead to the evolution of floral traits, mating systems, and plant defense. They are
  also interested in the trade-offs imposed on plants by pollinators and herbivores, and how these trade-offs can lead to the evolution of traits that benefit the plant but also attract herbivores.
