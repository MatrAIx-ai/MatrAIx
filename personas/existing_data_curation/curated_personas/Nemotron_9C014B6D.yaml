  hobbies: '[''Choir singing'', ''Community theater'', ''Hiking'', ''Gardening'', ''Volunteer mentoring'', ''Woodworking'', ''Quilting'', ''Cooking'', ''Music festivals'', ''Pottery classes'', ''Historical
    fiction reading'', ''Traveling'']'
  career_goals: Judith aims to transition from full‑time shop floor work to a mentorship and safety leadership role. She plans to obtain a Certified Welding Inspector credential and a teaching certification
    so she can become an instructor at the local community college or a vocational training center. Long‑term, she hopes to launch a modest boutique workshop that offers custom metal and plastic components
    for local artisans and small businesses, emphasizing environmentally responsible manufacturing practices. She also wants to continue volunteering her expertise at Bellingham's makerspace, helping younger
    workers develop practical skills while maintaining a stable, part‑time income that respects her desire for a predictable schedule.
