  career_goals: Looking ahead, Robert aims to leverage his supervisory experience and business education to transition into a senior project manager or regional construction manager role within the next
    three to five years. He plans to earn a Professional Construction Management certification and possibly pursue an MBA part‑time to enhance strategic planning skills. Ultimately, he aspires to mentor
    the next generation of tradespeople and, after retirement, launch a boutique consulting firm that advises small contractors on safety, budgeting, and workflow optimization.
