  hobbies: '[''Art gallery visits'', ''Improv theater'', ''Tabletop RPGs'', ''Hiking'', ''Street photography'', ''Experimental cooking'', ''Book club'', ''Trivia night hosting'', ''Collecting vintage typewriters'',
    ''Podcasting'']'
  career_goals: Jeremy aims to secure a literary agent within the next year and publish his first full‑length speculative fiction novel, followed by a trilogy that blends science fiction with philosophical
    themes. He aspires to build a sustainable author brand that includes regular contributions to reputable magazines, a popular storytelling podcast, and a series of writing workshops that help emerging
    writers in the Lehigh Valley. Long‑term, he hopes to transition to full‑time writing, achieve bestseller status, and eventually launch an annual writers' retreat in the Pennsylvania countryside where
    creativity and disciplined craft intersect.
