personas:
  professional: Jeremy Peterson, a 31‑year‑old speculative‑fiction writer and co‑host of a literature‑tech podcast, channels their hyper‑organized workflow in Scrivener, Notion, and Trello into intricately
    plotted novels that fuse scientific speculation with philosophical depth, while their outgoing improv experience fuels collaborative workshops and dynamic author‑branding events.
  sports: Jeremy Peterson, an active member of the Allentown Trail Runners club, tackles weekend hikes along the Appalachian Trail branches and plays recreational basketball with the Lehigh Valley Knights,
    while rooting for the Philadelphia Eagles, Phillies, and 76ers, and maintains a disciplined fitness routine that blends bodyweight circuits with yoga to offset long writing sessions.
  arts: Jeremy Peterson, a devoted participant in the Lehigh Valley arts scene, regularly visits modern galleries featuring works by Julie Mehretu and Mark Rothko, performs improv sketches with the Allentown
    Improv Collective, and draws creative fuel from indie filmmakers like Greta Gerwig and musicians such as The National, shaping the surreal atmospheres of their speculative fiction.
  travel: Jeremy Peterson, an inquisitive traveler, favors spontaneous road trips to nearby cultural festivals—such as the Pennsylvania Dutch Oktoberfest and a weekend in Baltimore’s Inner Harbor—while
    meticulously saving for a literary pilgrimage to Dublin and a fall adventure hiking Iceland’s volcanic landscapes, balancing budget constraints with a craving for immersive experiences.
  culinary: Jeremy Peterson, a self‑taught experimental cook, hosts dinner parties where they serve molecular‑gastronomy dishes like spherified balsamic pearls over pork tenderloin and sous‑vide duck confit,
    while their pantry staples include miso, quinoa, heirloom tomatoes, and locally sourced herbs, constantly seeking novel flavor pairings inspired by their street‑photography subjects.
  core: Jeremy Peterson blends relentless organization with boundless imagination, turning coffee‑shop nap times into plot twists while juggling vintage typewriters, hiking boots, and a habit of over‑caffeinating
    during midnight editing marathons.
background:
  cultural: Jeremy was raised in a middle‑class white family in Allentown, Pennsylvania, a city shaped by its industrial past and a growing arts community. His grandparents were part of the area's German‑American
    (Pennsylvania Dutch) population, a heritage that instilled a strong work ethic, self‑reliance, and appreciation for community festivals such as the local Oktoberfest and St. Patrick's Day Parade. He
    attended the public high school where he wrote for the school newspaper, sparking his passion for storytelling. The Lehigh Valley's blend of manufacturing roots, diverse immigrant neighborhoods, and
    a revitalized downtown arts district has given Jeremy a balanced sense of American individualism and communal responsibility. His marriage further anchors him in community life, as he and his spouse
    often volunteer at the Allentown Art Museum's educational programs and participate in neighborhood clean‑up initiatives, embodying the region's values of civic engagement and cultural curiosity.
