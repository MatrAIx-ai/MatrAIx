personas:
  professional: Koji Devoux, a 42-year-old correctional officer renowned for disciplined inmate management, meticulous incident reporting, and championing cultural‑competency training among his team, leverages
    a strategic, detail‑oriented mindset to mentor peers while they quietly pursue a shift‑supervisor promotion and a future master’s in criminal justice.
  sports: Koji Devoux stays fit by hiking the Congaree River trail with the Riverwalk Hiking Club each spring, joining a weekday pick‑up basketball game at the Columbia Sportsplex as a member of the Community
    Courts League, and never missing a Sunday night viewing of the Carolina Panthers or a college football showdown featuring the Clemson Tigers, balancing disciplined cardio with occasional weight‑lifting
    sessions for functional strength while they maintain a weekly log of mileage and reps.
  arts: Koji Devoux immerses themselves in the sounds of Miles Davis, Nina Simone, and John Coltrane while volunteering in their church choir, devouring novels by Toni Morrison and James Baldwin, attending
    the annual Spoleto Festival USA for blues and soul performances, and they occasionally experiment with wood‑carved music boxes that echo their love for both craftsmanship and rhythm.
  travel: Koji Devoux plans their trips with meticulous itineraries, favoring small‑group tours that blend cultural immersion and nature, often revisiting Charleston’s historic waterfront, hiking the Blue
    Ridge in Asheville, soaking up jazz in New Orleans, and dreaming of a heritage pilgrimage to Ghana’s Cape Coast and a documentary‑film weekend in London, all while they balance family commitments and
    a modest travel budget.
  culinary: Koji Devoux, a competent home chef, perfects classic Southern plates like collard greens simmered with smoked turkey, black‑eyed peas spiced with vinegar and cayenne, and peach cobbler baked
    with buttery biscuits, while occasionally experimenting with a bourbon‑glazed pork shoulder and fresh okra‑tomato stir‑fry, always sourcing ingredients from the local farmer’s market and they treat
    each meal as a quiet celebration of family tradition.
  core: Koji Devoux, a disciplined correctional officer with a quiet love for jazz, woodworking, and Southern cooking, turns meticulous habit into community service, yet they can’t resist annotating every
    page of a book and hoarding extra gardening tools for future projects.
background:
  cultural: Koji grew up in a close-knit African-American community in the Midlands of South Carolina, where church, family, and local history shaped his identity. The rich traditions of Southern Black
    culture—gospel music, storytelling, communal meals, and a strong emphasis on education—remain central to his life. He maintains active ties to his family's church, participating in the choir and community
    service projects. Growing up during a renewed focus on civil-rights history, he developed a deep appreciation for the legacy of local leaders such as Modjeska Monteith Simkins and the broader struggle
    for racial justice. As a Black professional working in a predominantly white law-enforcement environment, Koji is acutely aware of representation and advocates for cultural competency and inclusive
    practices within the correctional system. He also celebrates culinary traditions like collard greens, black-eyed peas, and peach cobbler, which connect him to his heritage and family gatherings.
attributes:
  skills: '[''Inmate Management'', ''Crisis De-escalation'', ''Conflict Resolution'', ''Report Writing & Documentation'', ''Security Protocols & Surveillance'', ''Emergency Response & First Aid'', ''Data
    Analysis of Incident Reports'', ''Team Leadership & Shift Supervision'', ''Mentorship & Training of New Officers'', ''Cultural Competency & Diversity Awareness'', ''Rehabilitation Program Facilitation'',
    ''Community Outreach & Reentry Coordination'']'
  hobbies: '[''Reading historical biographies and African-American literature'', ''Chess'', ''Woodworking'', ''Hiking local nature trails'', ''Listening to jazz, blues, and classic soul'', ''Cooking Southern
    cuisine'', ''Youth mentorship at church'', ''Writing personal reflections/journaling'', ''Watching documentary films'', ''Gardening'']'
  career_goals: Koji is driven to advance his career within the correctional system while championing reforms that reflect his humanities background and commitment to humane treatment. In the short term,
    he is pursuing promotion to shift supervisor, a role that will allow him to shape daily operations and mentor a diverse team of officers. Over the next three to five years, he aims to earn a master's
    degree in criminal justice or public administration, positioning himself for a unit manager or director of inmate services position. In those capacities, he plans to expand evidence-based rehabilitation
    initiatives, particularly educational and arts programs that empower inmates and reduce recidivism. Long-term, Koji envisions contributing to statewide policy development as a correctional reform analyst,
    advocating for restorative justice practices and stronger reentry support networks. Throughout his progression, he remains committed to fostering an inclusive workplace where professionalism and compassion
    coexist.
