  career_goals: Jessica aims to leverage her disciplined work ethic and ambition to advance beyond her current role. In the next three years she plans to earn a Licensed Practical Nurse (LPN) certification,
    then pursue a Bachelor of Science in Nursing. Her long‑term vision includes becoming a nurse manager or patient care coordinator, where she can shape policies, lead a high‑performing team, and implement
    evidence‑based practices across the facility. Ultimately, she hopes to start a small home‑health agency in Door County, providing structured, high‑quality care to the local senior community.
