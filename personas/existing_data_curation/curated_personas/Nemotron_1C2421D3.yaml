  career_goals: Even at three, Luz delights in daydreaming about growing up as someone who creates beautiful things. She talks about wanting to be an artist who paints bright pictures, a dancer who moves
    to music, or a storyteller who shares adventures with friends. Her emerging ambition blends her love of art, movement, and imaginative play, and she often imagines a future where she can explore ideas
    without limits.
