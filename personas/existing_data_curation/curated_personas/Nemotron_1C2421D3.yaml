personas:
  professional: Luz Rodriguez is a budding architect in the making, spending afternoons stacking building blocks and sketching simple floor plans, demonstrating early spatial reasoning, endless curiosity,
    and a relaxed, flexible play style that hints at future creative problem‑solving.
  sports: Luz Rodriguez loves kicking a soft soccer ball at the Louisville Youth Soccer Little Lions practice, cheering for the Louisville Cardinals basketball team on game night, and enjoys splashy water
    play at the local park during summer, often competing to be the fastest to the slide.
  arts: Luz Rodriguez enjoys drawing bright crayon pictures of animals, dancing to marimba lullabies, singing along with the children’s show Sesame Street, and idolizes Mister Rogers for his gentle storytelling.
  travel: Luz Rodriguez has explored the backyard garden with a magnifying glass, visited grandma’s house where colorful Día de los Muertos altars are set up, taken a family road trip to the Kentucky State
    Fair, and dreams of feeling the sand at the Gulf Coast beaches, preferring short trips that fit into their family’s schedule.
  culinary: Luz Rodriguez loves nibbling bite‑size baleadas filled with refried beans, delights in banana pancakes drizzled with honey, and proudly helps stir the batter for plantain fritters, often insisting
    on adding a pinch of cinnamon for extra flavor.
  core: Luz Rodriguez is a curious three‑year‑old who blends a love for colors, music, and tiny building projects with a relaxed, slightly competitive streak that makes them both a lively playmate and a
    diligent saver of stickers.
background:
  cultural: Luz grows up in a bilingual Honduran‑American household in Louisville, Kentucky. Her parents speak both Spanish and English at home, introducing her to gentle Honduran lullabies, the sound of
    marimba, and the aroma of dishes like baleadas and sopa de caracol. Family celebrations often include a blend of U.S. holidays and Honduran traditions, such as observing Día de los Muertos with colorful
    altars and sharing stories of Honduras during Sunday meals. These cultural threads foster her curiosity about the world, while the Midwestern community provides a supportive environment for her early
    learning and play.
