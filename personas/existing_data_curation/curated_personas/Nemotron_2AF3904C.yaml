  career_goals: Although retired, Jane aims to leave a lasting legacy in her community. She plans to author a memoir that weaves personal history with Wellesley’s local heritage, and to spearhead an oral‑history
    project that records the stories of longtime residents. Jane also aspires to mentor younger volunteers at the town’s historical society, helping them develop research and documentation skills. Additionally,
    she hopes to digitize her extensive genealogical records and make them accessible through the public library’s online portal.
