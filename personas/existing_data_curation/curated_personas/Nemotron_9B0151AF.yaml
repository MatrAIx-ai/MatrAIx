  hobbies: '[''Painting (watercolor and acrylic)'', ''Visiting art exhibitions'', ''Community choir singing'', ''Organic gardening'', ''Reading historical fiction and biographies'', ''Leading a book club'',
    ''Cooking Southern cuisine'', ''Crossword puzzles'', ''Docent work at a local museum'', ''Traveling to regional cultural festivals'']'
  career_goals: Although retired from formal employment, Arlene aims to deepen her impact on the Knoxville community. She plans to complete a certificate in museum education through an online program, mentor
    younger volunteers at the local senior center, and launch a quarterly oral‑history podcast that records stories of longtime residents. She also hopes to write and self‑publish a memoir that weaves together
    her family’s Appalachian roots with her love of art, and to travel to at least three regional cultural festivals each year to broaden her perspective.
