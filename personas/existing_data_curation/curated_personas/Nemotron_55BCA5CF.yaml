  career_goals: Although officially retired, John’s ambitions center on staying active, contributing to his community, and preserving his legacy. He aims to compile and publish a memoir of his life experiences,
    focusing on the social changes he has witnessed in Portland. He also seeks to secure a seat on the senior advisory board of his neighborhood association, where he can advocate for better health services
    for older adults. Improving his health and managing stress are personal goals, so he has adopted gentle exercise routines and mindfulness practices. Ultimately, he hopes to deepen his relationship with
    his wife through shared travel to local historic sites and continued involvement in the church choir.
