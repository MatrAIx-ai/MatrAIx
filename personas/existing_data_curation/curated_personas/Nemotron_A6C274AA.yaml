  hobbies: '[''Oil Painting'', ''Woodworking'', ''Gardening'', ''Historical Non-Fiction Reading'', ''Bridge'', ''Art Museum Visits'', ''Photography'', ''Birdwatching'', ''Mentorship Program Participation'']'
  career_goals: Although retired, Kevin remains driven to deepen his artistic practice and share his knowledge. He aims to curate a solo exhibition of his paintings at the Maple Grove Art Center within
    the next two years and to author a memoir that intertwines his lifelong experiences in manufacturing with reflections on art and curiosity. Kevin also aspires to launch a mentorship program that pairs
    senior artists with younger community members, fostering intergenerational dialogue. He plans to volunteer as a docent at the Minneapolis Institute of Art, guiding visitors through special exhibits,
    and to travel to at least three major art capitals—such as New York, Paris, and Florence—to experience diverse cultural perspectives. Additionally, he seeks to compete in regional bridge tournaments,
    maintaining his competitive edge while building social connections.
