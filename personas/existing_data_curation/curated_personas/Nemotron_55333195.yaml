  hobbies: '[''Reading historical fiction'', ''Gardening'', ''DIY home projects'', ''Quilting'', ''Book club participation'', ''Volunteering for after‑school tutoring'', ''Hiking'', ''Bird‑watching'', ''Photography'',
    ''Yoga'', ''Journaling'', ''Baking'', ''Attending county fairs'']'
  career_goals: Melanie aims to transition into a curriculum specialist role within her district, where she can shape humanities curricula across grades and champion flexible, project‑based learning that
    nurtures curiosity while meeting standards. She plans to earn a master's degree in Education Leadership to deepen her expertise in instructional design and eventually move into a vice‑principal position
    that emphasizes teacher support and community partnership. In the medium term, she hopes to author a children's book series celebrating Wisconsin’s natural and cultural heritage and to lead a district‑wide
    reading initiative that integrates local history, storytelling, and community involvement.
