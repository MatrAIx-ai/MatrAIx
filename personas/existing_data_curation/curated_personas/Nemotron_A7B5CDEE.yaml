personas:
  professional: Erik Scott is a 32‑year‑old high‑voltage power line installer whose OSHA‑trained safety mindset and talent for troubleshooting complex faults blend with a curiosity for renewable‑energy
    tech, making them a natural mentor and aspiring crew lead.
  sports: Erik Scott enjoys early‑morning kayaking on Lake Okeechobee, weekend fishing trips for snook and redfish, hikes the Florida Trail with a local outdoor club, and roots for the Miami Dolphins and
    Tampa Bay Rays, balancing solo fitness pursuits with occasional community volleyball games hosted by the volunteer fire department.
  arts: Erik Scott spends evenings strumming acoustic guitar covers of John Prine and Neil Young for friends, curates a growing collection of vintage radios, captures the subtleties of Florida’s wetlands
    on a Canon EOS 80D, and draws inspiration from Ansel Adams and local folk artist Maggie Hall, weaving creativity into both leisure and work.
  travel: Erik Scott prefers road‑trip adventures that combine nature and modest budgeting, having explored the Everglades by airboat, taken a weekend getaway to Asheville’s Blue Ridge trails, and planning
    a future eco‑tour of Costa Rica’s solar farms, all while balancing family obligations and work schedules.
  culinary: Erik Scott enjoys cooking fresh grouper tacos with mango salsa, perfecting a key‑lime pie crust during off‑season weekends, and experimenting with DIY spice blends for grilled vegetables, yet
    occasionally skips meals when a sudden overtime shift forces a quick energy bar.
  core: Erik Scott, a 32‑year‑old line installer, balances a meticulous safety‑first work ethic with a restless curiosity for DIY tech and outdoor escapes, all while battling a chronic worry that fuels
    both diligent planning and occasional over‑thinking.
background:
  cultural: Erik was raised in a predominantly white, working‑class community in rural Taylor County, Florida. His family has a tradition of skilled trades, with his father working as a mechanic and his
    grandfather as a lineman, instilling a strong work ethic and respect for hands‑on craftsmanship. Growing up in the South, Erik absorbed values of hospitality, neighborly assistance, and modesty, while
    also being exposed to the region’s natural environment—everglades, pine flatwoods, and coastal waterways—that fostered his love for outdoor recreation. He attended a local public high school and later
    took courses at a nearby community college, where he began his journey in electrical technology. Though he identifies with mainstream American culture, Erik’s daily life is shaped by the rhythms of
    his small-town surroundings, local festivals, church gatherings, and an emphasis on community safety and cooperation.
attributes:
  skills: '[''Electrical power line installation and repair'', ''High‑voltage troubleshooting and fault location'', ''Aerial lift and bucket truck operation'', ''Safety compliance (OSHA 30‑hour, NFPA 70E)'',
    ''Electrical schematics interpretation'', ''Preventive maintenance of transmission equipment'', ''Team mentoring and training'', ''Risk assessment and safety briefings'', ''Basic project coordination'',
    ''Knowledge of renewable energy transmission systems'']'
  hobbies: '[''Fishing and kayaking'', ''Hiking and nature photography'', ''DIY electronics (Arduino, radio restoration)'', ''Volunteering with local fire department/Community Emergency Response Team'',
    ''Attending Perry Pineapple Festival and community events'', ''Reading technical magazines and historical nonfiction'', ''Playing acoustic guitar'']'
  career_goals: Erik aims to advance from a line installer to a crew lead within the next three years, securing a Journeyman Electrician certification and completing specialized training in high‑voltage
    renewable‑energy transmission. He aspires to become a Safety Officer responsible for developing and delivering safety programs that protect his coworkers and the surrounding community. In the longer
    term, Erik envisions a role in planning and overseeing the integration of solar and wind generation projects into the regional grid, leveraging his technical curiosity and collaborative skills. He also
    hopes to mentor younger workers, fostering a culture of empathy and reliability, while finding ways to manage workplace stress through improved safety protocols and supportive team dynamics.
