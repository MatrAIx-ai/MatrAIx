    model building'']'
  career_goals: Deangelo aims to obtain his Professional Engineer (PE) license within the next two years and advance to a senior engineering position that lets him lead cross‑functional product development
    teams. He is especially interested in sustainable design initiatives and hopes to spearhead projects that improve energy efficiency in building systems. Over the longer term, he envisions moving into
    engineering management, where he can combine his structured approach with his collaborative style to mentor junior engineers and shape organizational processes that balance predictability with innovative
    flexibility.
