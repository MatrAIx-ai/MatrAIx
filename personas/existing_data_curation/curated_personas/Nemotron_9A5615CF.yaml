personas:
  professional: Deangelo Reed is a detail‑oriented mechanical/electrical engineer who leverages advanced CAD, circuit design, and automation programming to deliver reliable prototypes on schedule, while
    championing systematic documentation and fostering collaborative team dynamics that reflect their love of structure and harmony.
  sports: Deangelo Reed jogs five miles through Hermann Park each morning to keep a balanced fitness routine, plays pick‑up basketball with the Lone Star Runners club in the evenings, and loyally roots
    for the Houston Astros, Houston Rockets, and Houston Texans, integrating the seasonal excitement of baseball, basketball, and football into their structured weekend schedule.
  arts: Deangelo Reed unwinds at live jazz venues listening to Wynton Marsalis, Kamasi Washington, and the historic performances at the Continental Club, while they also dive into science‑fiction worlds
    by authors like Neal Stephenson and Isaac Asimov, and spend meticulous evenings assembling scale models of vintage aircraft, blending structured craftsmanship with improvisational art.
  travel: Deangelo Reed prefers meticulously planned trips that blend cultural immersion with sustainability, having already explored Kingston’s bustling markets to inspire their Caribbean cooking, toured
    Copenhagen’s bike‑friendly streets to study urban energy efficiency, and now aims to visit Iceland’s geothermal power plants, balancing a desire for adventure with a professional focus on energy‑smart
    design.
  culinary: Deangelo Reed approaches the kitchen like a lab, precisely measuring scotch bonnet peppers, allspice, and thyme to craft authentic jerk chicken and curried goat, while also perfecting soul‑food
    collard greens cooked with smoked turkey, often documenting each batch in a detailed recipe journal to refine flavor profiles.
  core: Deangelo Reed is a methodical engineer who channels a love of structure into everything from precise Caribbean cooking to organized jazz outings, yet occasionally lets improvisation slip in through
    spontaneous model‑building sessions and weekend splurges on live music.
background:
  cultural: Deangelo grew up in West Hartford, Connecticut, in a family that valued education, community service, and connection to African‑American heritage. His parents, originally from the Southern United
    States, instilled a strong sense of cultural pride, encouraging participation in local Black history events, support for Black‑owned businesses, and involvement with community groups like the Connecticut
    Black Chamber of Commerce. He celebrates cultural traditions through music, food, and volunteerism, and he strives to integrate the collaborative, harmony‑focused values of his upbringing into both
    his professional and personal life.
