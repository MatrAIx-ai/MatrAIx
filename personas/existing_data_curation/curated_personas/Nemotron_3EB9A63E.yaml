personas:
  professional: Margaret Sutton, at one year old, already exhibits the meticulous habits of a future librarian, as they carefully line up picture books by color each night, cherish the predictable cadence
    of bedtime stories, and casually postpone new playtime obligations in favor of familiar routines, revealing a reserved, routine‑driven, and slightly skeptical temperament.
  sports: Margaret Sutton enjoys small‑scale physical play, such as crawling around the backyard while wearing a tiny San Francisco Giants cap during Fourth of July fireworks and attending a parent‑toddler
    gymnastics class at the Vallejo community center, preferring low‑key, routine activities to the chaotic energy of larger sports gatherings.
  arts: Margaret Sutton finds comfort in the gentle lullabies of Disney's 'Frozen' soundtrack, hums along to Lin‑Manuel Miranda's songs from 'Moana', and watches the calm storytelling of 'Bluey', allowing
    these familiar melodies and visuals to soothe their sensitive temperament and reinforce their love for predictable, wholesome narratives.
  travel: Margaret Sutton has explored the bright marine exhibits at Monterey Bay Aquarium and taken a brief family road trip to Lake Tahoe's cabins, favoring short, well‑planned drives and familiar pit
    stops over long, unpredictable journeys, yet they light up whenever a new playground appears on the horizon.
  culinary: Margaret Sutton's palate revolves around soft, familiar foods like mashed sweet potatoes, applesauce, avocado puree, and oatmeal, which they request at every meal, while occasionally tossing
    a stray pea onto the floor as a playful protest against routine.
  core: Margaret Sutton is a routine‑loving, quietly observant one‑year‑old who clings to familiar comforts, worries over minor changes, and expresses a cautious worldview through tiny, predictable rituals.
