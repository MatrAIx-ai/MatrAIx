personas:
  professional: Ruben Marinjimenez is a budding technologist who channels a methodical mind into constructing intricate LEGO models and crafting simple Scratch programs, treating each build and code block
    like a mini‑project with clear milestones.
  sports: Ruben Marinjimenez is a competitive yet organized participant in his neighborhood soccer league, preferring the disciplined rhythm of midfield play, cheering for the local team Coastal FC while
    also training with the junior club Tigers FC on weekends.
  arts: Ruben Marinjimenez blends his love of structure with artistic curiosity, assembling LEGO sculptures while humming along to The Beatles, enjoying the lively rhythms of his family’s folk music, and
    sketching quick doodles of space rockets inspired by the illustrations of Jim Terry.
  travel: Ruben Marinjimenez prefers meticulously planned weekend trips, mapping out beachcombing adventures at Sunny Bay Cove and a day at the Space Exploration Museum in Houston, while saving his allowance
    for a future family vacation to the Galápagos Islands.
  culinary: Ruben Marinjimenez enjoys simple homemade meals, favoring spaghetti carbonara with pancetta, cheesy pepperoni pizza, and experimentation with a mild guacamole dip, though he often leaves the
    kitchen a bit messy after snack time.
  core: Ruben Marinjimenez is a meticulous, junior planner who balances a love for concrete LEGO builds and logical Scratch coding with a competitive spark on the soccer field, all while guarding a tidy
    piggy bank and a well‑ordered collection of seashells.
background:
  cultural: Ruben grows up in a bicultural household that blends Ecuadorian heritage with Floridian life. Spanish is spoken at home, and his family observes traditions such as celebrating Día de los Muertos
    and enjoying dishes like ceviche, plantain empanadas, and arroz con pollo. He participates in cultural events at the local Hispanic community center and learns folk songs and dances from his parents.
    While he embraces American school routines and local outdoor activities, he also feels pride in his Ecuadorian roots, which shape his values of family solidarity, respect for elders, and a love for
    shared meals.
attributes:
  skills: '[''Organizational and planning skills'', ''Basic coding with Scratch'', ''LEGO construction and design'', ''Bilingual communication (English/Spanish)'', ''Mathematical reasoning'', ''Puzzle solving'',
