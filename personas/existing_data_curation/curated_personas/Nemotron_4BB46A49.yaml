  hobbies: '[''LEGO building'', ''Scratch coding'', ''Reading science books'', ''Watching space and marine documentaries'', ''Shell and rock collecting'', ''Playing chess'', ''Community soccer'', ''Listening
    to Ecuadorian music'']'
  career_goals: Ruben is fascinated by the Space Coast and dreams of one day contributing to space exploration. He aims to become an aerospace engineer or astronaut, focusing on designing rockets and spacecraft.
    To achieve this, he plans to excel in math and science, win school science fairs, and eventually attend a university with a strong engineering program. He also has an emerging interest in marine biology,
    hoping to study the local ecosystems of the Indian River Lagoon.
