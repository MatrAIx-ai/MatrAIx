persona_description: A scholar or historian who is particularly interested in the history and development of monasticism in Ireland, particularly in the period from the 6th to the 10th century. They are
  familiar with the works of Máel Ruain, his disciple Óengus, and the Tallaght community, and are interested in their teachings, practices, and influence on Irish monasticism. They are also knowledgeable
  about the annals and the Martyrology of Tallaght, and are interested in the role of Máel Ruain in the history of Irish monasticism. They are also interested in the works of the Desert Fathers of Egypt,
  and are familiar with the principles and practices of Máel Ruain and his community.
