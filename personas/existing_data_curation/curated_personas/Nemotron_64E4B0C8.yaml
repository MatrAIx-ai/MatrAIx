    to country music'']'
  career_goals: Juan dreams of becoming an inventor or engineer who creates gadgets that make everyday life easier, inspired by his love of building things and figuring out how they work. He also imagines
    himself as a wildlife biologist who protects animals, showing his compassionate side. He hopes to excel in science and math classes as he grows, join a robotics club, and someday design environmentally
    friendly devices that help both people and nature. His strong emotional reactions sometimes make him worry about failing, so he aims to develop confidence by practicing his inventions in front of supportive
    friends and family.
