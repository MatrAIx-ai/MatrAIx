personas:
  professional: Juan Mccombs, a budding junior engineer, channels their curiosity and practical mind into constructing intricate LEGO rockets and coding simple Scratch projects, thriving on spontaneous
    ideas while often leaving pieces scattered due to a relaxed, disorganized approach.
  sports: Juan Mccombs, an enthusiastic participant in neighborhood soccer games and a loyal fan of the Dallas Cowboys and FC Dallas, plays for the Waco Tigers youth soccer club every Saturday, enjoys sprinting
    through the creek after matches, but sometimes skips practice when homework feels overwhelming.
  arts: Juan Mccombs, a budding comic artist who draws weekly strips inspired by Spider‑Man and Adventure Time while listening to country legends like Chris Stapleton during family barbecues, also spends
    afternoons building LEGO sculptures that echo the storytelling of their favorite adventure books.
  travel: Juan Mccombs, a curious eight‑year‑old who loves road‑trip adventures to Texas landmarks like the San Antonio River Walk and the Space Center Houston, prefers spontaneous detours to explore creeks
    and fossils rather than rigid itineraries, though family budget constraints limit trips beyond the state.
  culinary: Juan Mccombs, a self‑declared barbecue connoisseur who delights in devouring smoked brisket, corn on the cob, and pecan pie at family gatherings, enjoys helping mom grill hot dogs and assemble
    kid‑friendly tacos with fresh salsa, but habitually forgets to wash hands after handling LEGO pieces before meals.
  core: Juan Mccombs, the LEGO‑loving, anxiety‑prone explorer who can turn a creek stone into a treasure but habitually leaves construction pieces scattered across the living room.
background:
  cultural: Juan is a White American raised in Waco, Texas, within a middle‑class family that values Southern hospitality and community. His household celebrates holidays such as Thanksgiving, Fourth of
    July barbecues, and local rodeo events, often featuring Texas‑style music and food. He attends a public elementary school where he experiences a blend of Texan cultural influences, including a strong
    emphasis on football, outdoor activities, and a friendly, informal communication style. While primarily English‑speaking, his family occasionally interacts with Spanish‑speaking neighbors, giving him
    a modest exposure to bilingual community life. The local Methodist church he attends reinforces values of compassion, togetherness, and personal responsibility.
