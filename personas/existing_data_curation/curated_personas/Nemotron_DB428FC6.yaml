    seniors'']'
  hobbies: '[''Watercolor painting'', ''Pottery wheel work'', ''Crocheting blankets and scarves'', ''Herb gardening'', ''Preparing traditional Mexican dishes'', ''Reading historical biographies and fiction'',
    ''Visiting museums and art galleries'', ''Beach walks and birdwatching'', ''Bridge and crossword puzzle clubs'']'
  career_goals: At 77, Guadalupe’s primary ambition is to document her family’s migration story in a memoir and to share her culinary heritage through regular cooking classes at the local Senior Center.
    She also hopes to learn advanced digital photography to archive community festivals, and to advocate for inclusive programming that highlights Mexican cultural arts in Long Beach. Maintaining her independence
    and health while continuing to mentor younger members of her community are central to her outlook.
