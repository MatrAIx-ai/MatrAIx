  career_goals: Although retired from full‑time employment, Seamus aims to remain active and self‑sufficient. He plans to complete a full remodel of his historic bungalow, mentor younger members of his
    local senior center on practical skills, and document his life story for his grandchildren. He also hopes to travel to a few historic sites in the eastern United States, and to stay physically fit through
    regular walking and swimming.
