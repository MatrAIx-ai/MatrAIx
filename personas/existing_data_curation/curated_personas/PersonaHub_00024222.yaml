persona_description: A history professor who specializes in the study of Charles Darwin's life and his theories, particularly his theory of organic evolution by means of natural selection. His research
  interests include, but are not limited to, the historical context of Darwin's life, the controversies surrounding his theories, and the impact of his work on modern science. He is particularly interested
  in the link between modern science and pop culture and how Darwin's ideas have been incorporated into popular culture. He is also interested in the evolution of nuts, humans and their body lice, fossil
  primates, and the story of their origin.
