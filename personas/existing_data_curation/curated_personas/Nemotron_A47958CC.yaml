  hobbies: '[''Drawing comic characters'', ''Digital painting'', ''Creative writing (short stories, poetry)'', ''Reading graphic novels and fantasy'', ''Listening to hip-hop, jazz, and Afro-Caribbean music'',
    ''Playing piano'', ''Chess'', ''Scratch game development'', ''Street photography'', ''Volunteering at community center (youth mural projects)'']'
  career_goals: Vincent dreams of turning his passion for art and technology into a career as a concept artist or visual storyteller for video games or animated film, where he can craft immersive worlds
    that explore abstract ideas. He also hopes to study graphic design or interactive media at a university and later develop community-based art programs that empower other young people in the Bronx. Ultimately,
    he envisions a role that blends creativity with social impact, using his artistic skills to inspire and uplift his community.
