personas:
  professional: Vincent Reines is a budding comic artist and storyteller who spends afternoons sketching superhero hybrids, drafting short sci‑fi narratives, and meticulously planning his next digital painting
    project, applying the same organized precision he brings to his school assignments.
  sports: Vincent Reines enjoys playing midfield for his neighborhood youth soccer team, the Oakwood Rangers, follows the local high school basketball squad the Hillcrest Hawks, and competes in weekly chess
    club meet‑ups, balancing physical activity with strategic mental sport.
  arts: Vincent Reines draws inspiration from comic legends like Jim Lee and manga creator Naoko Takeuchi, grooves to hip‑hop pioneers such as Kendrick Kendrick and Afro‑Caribbean beats from Celia Cruz,
    and studies jazz greats like Miles Davis while experimenting with street photography à la Henri Cartier‑Bresson, shaping his own visual and narrative style.
  travel: Vincent Reines prefers short, well‑planned family trips that blend adventure with cultural immersion—he’s trekked the red rock trails of Sedona, explored the museums of Washington, D.C., and dreams
    of visiting the futuristic architecture of Tokyo, always mapping his itinerary on a notebook before departure.
  culinary: Vincent Reines loves experimenting in the kitchen with homemade pepperoni pizza, mastering the balance of mozzarella and fresh basil, and he’s recently tried cooking Caribbean‑style jerk chicken
    with scotch bonnet peppers, though his frosting skills on cupcakes remain a work in progress.
  core: Vincent Reines is a quiet, imaginative teen who can spend hours lost in sketchbooks, yet habitually forgets to turn off his phone notifications during study time, leading to occasional deadline
    scrambles.
background:
  cultural: Vincent is a Black teenager growing up in the Bronx, a borough rich with African-American and Afro-Caribbean cultural influences. His family celebrates traditions such as soul food gatherings,
    Caribbean holidays, and music from jazz to modern hip-hop, which nurture his artistic sensibilities. Immersed in a tight-knit neighborhood, he witnesses community murals, block parties, and local activism,
    reinforcing his sense of identity and responsibility to give back. He draws inspiration from Black artists and writers, both historic figures of the Harlem Renaissance and contemporary creators, shaping
    his worldview and creative voice.
attributes:
  skills: '[''Sketching'', ''Watercolor painting'', ''Digital illustration (Procreate)'', ''Creative writing'', ''Basic programming (Scratch, Python)'', ''Project planning'', ''Time management'', ''Peer
