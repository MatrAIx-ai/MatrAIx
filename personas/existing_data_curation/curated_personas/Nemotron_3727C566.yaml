personas:
  professional: Wayne Jacques is a budding LEGO architect and self‑taught junior engineer who spends hours constructing intricate models, applying a meticulous yet flexible problem‑solving approach, while
    their critical eye and love for solitary exploration drive them to constantly refine their creations.
  sports: Wayne Jacques enjoys solo hiking on the nearby desert trails with the 'Young Explorers Club', watches the Arizona Diamondbacks baseball games on TV, and occasionally practices basic soccer drills
    at the community park, but they prefer low‑key activities that let them stay in their own rhythm.
  arts: Wayne Jacques fuels their imagination with instrumental soundtracks from Studio Ghibli's Spirited Away while sketching landscapes inspired by those movies, collects prints of Leonardo da Vinci's
    studies, and dedicates their free time to creating detailed LEGO dioramas of sci‑fi scenes, all of which shape their quiet but vibrant artistic identity.
  travel: Wayne Jacques dreams of a road trip to the Grand Canyon to hike its rim and an overseas adventure to Tokyo's Akihabara district to explore its video‑game arcades, but their travel plans are usually
    organized by their parents with a focus on kid‑friendly itineraries and plenty of rest stops to accommodate their sensitivity to overstimulation.
  culinary: Wayne Jacques loves building their own snack combos, frequently assembling macaroni and cheese with sharp cheddar and a side of crunchy carrot sticks, while their favorite dinner is a soft chicken
    taco seasoned with cumin, cilantro, and a splash of lime, and they enjoy occasional cooking lessons that let them experiment with simple chemistry like making fizzy soda.
  core: Wayne Jacques is a solitary, curiosity‑driven 7‑year‑old who balances meticulous LEGO engineering with a cautious, competitive streak, a tendency toward worry, and a passion for quiet artistic creation.
background:
  cultural: Wayne comes from a White, middle‑class family rooted in the American Midwest but now living in Thermal, a small desert community in Riverside County, California. The region blends suburban California
    life with the nearby agricultural and oil‑field culture, and diverse Hispanic influences are part of the local environment. He celebrates typical American holidays, has grown up hearing a mix of mainstream
    pop culture and occasional Spanish phrases from neighbors, and often visits nearby museums and art centers in the greater Los Angeles area, which fuel his appreciation for art and new ideas.
