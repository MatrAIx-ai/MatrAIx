  career_goals: He dreams of becoming an inventor or a video game designer who creates his own imaginative worlds. He aspires to win school science fairs, build a functioning robot, and eventually study
    engineering or computer science. His competitive streak drives him to aim for the top spot in any future contests, and he hopes his creations will be recognized for their originality.
