    ''Stakeholder communication'', ''SOP development'']'
  hobbies: '[''Yoga and mindfulness meditation'', ''Backyard vegetable gardening'', ''Meal‑prepping and organized cooking'', ''Reading contemporary fiction'', ''Personal‑development journaling'', ''Volunteering
    at youth financial literacy workshops'', ''Neighborhood book club'', ''Strategy board‑games'']'
  career_goals: Latasha aims to ascend to a senior finance leadership role, such as Director of Finance or Chief Financial Officer, where she can shape enterprise‑wide financial strategy and drive digital
    transformation of the finance function. She plans to earn the CFA charter within the next two years to deepen her investment and risk management expertise. Parallel to her professional advancement,
    she is committed to mentoring emerging Black women in finance, establishing a quarterly workshop series on financial literacy, and championing inclusive workplace policies that support work‑life balance
    and mental‑health awareness.
