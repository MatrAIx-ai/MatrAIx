persona_description: A scientist or researcher who specializes in the study of climate change and its impacts on ecosystems, particularly in the northern coastal temperate rainforest of North America. This
  individual is likely to be interested in the projected changes in temperature, precipitation, and snowfall in the region, and how these changes will affect hydroecological and terrestrial ecological systems.
  They may be interested in the specific impacts on the region's biodiversity, including the effects on species with rare ecological niches or limited dispersibility, as well as the potential for shifts
  in anadromous salmon distribution and productivity. They may also be interested in the social and ecological systems that characterize the region and the information gaps that exist to help guide assessments
  of future conditions and adaptive capacity.
