  career_goals: Tiffany aims to advance within the logistics field by securing a supervisory position such as a route manager or logistics coordinator within the next three to five years. She plans to obtain
    a commercial driver’s license (CDL) and complete a GED program, followed by a certification in supply-chain management, to broaden her qualifications. Ultimately she hopes to open her own small courier
    service that emphasizes community-focused delivery and fair employment practices, while also achieving a more predictable schedule that reduces stress and allows for better work-life balance.
