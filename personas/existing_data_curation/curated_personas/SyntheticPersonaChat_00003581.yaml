    User 2: Oh, that''s cool! I always wanted to be a teacher.

    User 1: It''s a lot of work, but it''s also very rewarding.

    User 2: I bet it is. So, what do you like to do in your free time?

    User 1: I like to play video games, watch movies, and spend time with my friends and family.

    User 2: Nice! I like to do some of those things too.

    User 1: It sounds like we have a lot in common.

