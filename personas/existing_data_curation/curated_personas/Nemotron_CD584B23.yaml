  career_goals: In the short term, James aims to earn the Advanced Police Officer certification and secure a position in the Community Relations Unit, where he can apply his sociable demeanor and communication
    skills to build trust. Within the next five years, he plans to attain the rank of Sergeant, complete a master’s degree in Public Administration, and obtain specialized training in investigative work
    and crisis management. Long‑term, he envisions leading a precinct as a Lieutenant or Captain, designing data‑driven crime‑prevention programs, and eventually serving as a police trainer or administrator
    shaping department policy across Kankakee County.
