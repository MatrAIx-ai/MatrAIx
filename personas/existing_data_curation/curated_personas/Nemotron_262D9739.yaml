personas:
  professional: Maria Olivares, a high‑school senior in Cypress with a knack for project planning and hands‑on tech, leads her robotics club’s community outreach projects while they prepare to pursue nursing
    at a community college.
  sports: Maria Olivares enjoys weekend hikes in the San Gabriel Mountains, follows the LA Galaxy and LA Dodgers, and they often join a local walking club at Oak Grove Park to balance mental focus with
    physical activity.
  arts: Maria Olivares, an avid watercolor sketcher, draws neighborhood scenes and cultural motifs inspired by Día de los Muertos altars, listens to Lila Downs, Carlos Rivera, and contemporary pop, and
    they study Frida Kahlo’s work for creative inspiration.
  travel: Maria Olivares has explored the vibrant streets of Downtown Los Angeles during cultural festivals, hiked to Big Bear for snow‑capped views, and they dream of visiting Oaxaca’s culinary markets
    to deepen their understanding of traditional mole and tamale techniques.
  culinary: Maria Olivares excels at preparing homemade tamales, mole, and pozole, experiments with health‑conscious twists like quinoa filling and cauliflower‑rice stuffing, and they relish blending chilies,
    masa, and fresh cilantro into each dish.
  core: Maria Olivares is a curious, organized teen who balances solitary tech tinkering with community‑focused nursing ambitions, all while perfecting tamale recipes and keeping a tidy budget, and they
    never miss a chance to sketch a new watercolor scene.
background:
  cultural: Maria’s cultural background is rooted in a Mexican‑American bicultural identity. She grew up in a Spanish‑speaking household in Cypress, California, where traditional Mexican customs such as
    Día de los Muertos, Las Posadas, and family quinceañeras are celebrated alongside American holidays. The aromas of homemade tamales, mole, and pozole fill family gatherings, and she often helps prepare
    these dishes. Her family maintains close ties to the broader Mexican diaspora in Los Angeles County, participating in local festivals, cultural clubs, and community celebrations that reinforce her heritage.
    At school, Maria has engaged with a Latino heritage club, which has deepened her appreciation for Mexican art, music, and history. This blend of cultural influences shapes her values of family solidarity,
    respect for elders, and a strong sense of community responsibility.
