  career_goals: Maria’s immediate goal is to complete her high school education, obtaining either a diploma or a GED, to lay a solid academic foundation. She plans to enroll in a community college’s nursing
    program, where her bilingual ability and compassionate nature can be applied to serve the growing Latino community in Los Angeles County. While studying, she intends to continue her interest in technology
    by taking introductory courses in health informatics, aiming to integrate digital tools into patient care. In the medium term, she aspires to become a Registered Nurse with a specialization in community
    health, eventually earning a Bachelor of Science in Nursing and possibly a Master’s in Public Health. Her long‑term ambition is to lead a community health outreach initiative that provides bilingual
    health education and preventive services, combining her practical nursing skills with her curiosity for innovative health solutions.
