persona_description: A pediatric cardiologist who specializes in the diagnosis and management of congenital heart defects, particularly coarctation of the aorta. They have experience performing physical
  exams, listening to heart sounds, and diagnosing heart problems in children. They are skilled in performing diagnostic procedures such as echocardiography and cardiac catheterization, and have a deep
  understanding of the treatment options for coarctation of the aorta, including surgical repair and interventional cardiac catheterization. They are highly specialized and have a unique knowledge of the
  anatomy and physiology of the heart and aortic system.
