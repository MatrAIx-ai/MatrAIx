    User 2: I''m sure you do. Do you have any kids?

    User 1: Yeah, I have two.

    User 2: Wow, that must be hard being away from them for so long.

    User 1: It is, but I know it''s important for me to do my job.

    User 2: I''m sure it is. I''m glad you''re doing something that you''re passionate about.

    User 1: Thanks. I''m glad I found my calling.

    User 2: What''s your favorite part of being in the army?

    User 1: I would say the camaraderie. I love being around other soldiers who understand what I''m going through.

    User 2: I can imagine. It must be nice to have people who can relate to you.

    User 1: Yeah, it really is.

    User 2: Well, I''m glad you''re enjoying your time in the army.

    User 1: Thanks, I am.

    User 2: I hope you have a safe deployment.

    User 1: Thank you.

    User 2: No problem.'
