    Sheets)'', ''Farm Task Management'', ''Written Communication'']'
  hobbies: '[''Chess'', ''LEGO building'', ''Scratch programming'', ''Robotics club'', ''Track & field'', ''Reading mystery/science books'', ''4‑H animal projects'', ''Gardening'', ''County fair attendance'']'
  career_goals: Elizabeth dreams of becoming a civil or agricultural infrastructure engineer so she can design reliable, sustainable structures for rural communities. She aims to top her class, win state
    science fairs and robotics competitions, earn a STEM scholarship, and eventually work on projects that combine engineering with community service, such as improving local roadways, bridges, or farm
    technology. She also hopes to take on leadership roles in student government to strengthen her ability to organize and serve her hometown.
