personas:
  professional: Elizabeth Shelton, a budding robotics programmer, combines their love for structured puzzles and competitive spirit to lead their middle school robotics club’s code development, applying
    their Scratch skills and methodical approach to building reliable autonomous routines.
  sports: Elizabeth Shelton sprints the 400‑meter dash on the Calamus Middle School track team, follows a regimented after‑school conditioning routine, and cheers for the Iowa Hawkeyes football and the
    Chicago Cubs baseball teams, channeling their competitive nature into personal best goals while balancing schoolwork.
  arts: Elizabeth Shelton channels their creative side through intricate LEGO builds and enjoys the melodic storytelling of Taylor Swift, the cinematic adventures of the Harry Potter film series, and the
    classic piano pieces of Ludwig van Beethoven, often setting their robotics code to a soundtrack of upbeat pop while sketching mystery story outlines.
  travel: Elizabeth Shelton prefers well‑planned, short road trips that blend educational stops with fun, such as the State Capitol tour in Des Moines, a weekend visit to Chicago’s Museum of Science and
    Industry, and dreaming of a future family road adventure to Yellowstone National Park, always budgeting their allowance to cover gas and souvenirs.
  culinary: Elizabeth Shelton, a budding home‑chef, loves whipping up garden‑fresh chicken salad with crisp lettuce, diced apples, and honey‑mustard dressing, enjoys the comforting simplicity of homemade
    mac and cheese with sharp cheddar, and frequently experiments with making buttered corn on the cob using sweet Iowa corn, though they occasionally overcook pasta in their haste to return to a robotics
    project.
  core: Elizabeth Shelton is a methodical middle‑school prodigy who balances a love for puzzles, robotics, and track with a penchant for splurging on LEGO kits and a habit of staying up late to perfect
    code, all while keeping a spreadsheet of their allowance.
background:
  cultural: Elizabeth was raised in Calamus, a small agricultural town in Clinton County, Iowa. Her family traces its roots to German and Irish immigrants, reflecting the Midwestern heritage of the region.
    The community values hard work, modesty, and cooperation, with traditions that include church gatherings (United Methodist), the county fair, 4‑H programs, and strong support for high‑school sports.
    These cultural influences shape Elizabeth's practical outlook, appreciation for order and routine, and commitment to community service.
attributes:
