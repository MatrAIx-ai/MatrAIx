persona_description: A researcher or policy maker who is interested in the latest findings and trends in longitudinal research on child development and well-being, and is looking for ways to incorporate
  this knowledge into policy and research. They are also interested in the potential of longitudinal studies to contribute to the understanding of the dynamic nature of developmental trajectories and the
  diverse processes that shape outcomes over time. They are familiar with the Sustainable Development Agenda and the importance of measurement and monitoring progress towards the SDG targets. They are also
  aware of the need for a data revolution for sustainable development and the potential of longitudinal research to contribute to this goal. They are interested in the latest developments and initiatives
  related to GLORI, and are looking for ways to contribute to its activities and share the latest findings.
