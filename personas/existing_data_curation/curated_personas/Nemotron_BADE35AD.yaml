personas:
  professional: Victor Perez, a 22‑year‑old bank teller with razor‑sharp cash‑handling precision, bilingual fluency, and a photographer’s eye for aesthetics, converts everyday transactions into curated
    experiences while methodically working toward a personal banker and eventually branch manager role.
  sports: Victor Perez fuels his fitness through weekly pickup basketball games with the Green Hill Community League, follows the Charlotte Hornets and the Appalachian State Mountaineers, hikes the Blue
    Ridge foothills each weekend with the local Trailblazers Club, and balances intense cardio with occasional couch‑potato Netflix marathons.
  arts: Victor Perez immerses himself in the local art scene, snapping photographs of vibrant street murals by Atlanta‑based artist Victor Castillo, attending openings at the Asheville Art Museum featuring
    works by Kehinde Wiley, and curating playlists that blend Romeo Santos' bachata, Juan Luis Guerra’s merengue, and indie gems like Phoebe Bridgers.
  travel: Victor Perez prefers spontaneous, budget‑friendly road trips, having already explored Asheville’s culinary districts, the historic streets of Charleston, and the smoky trails of Great Smoky Mountains,
    while dreaming of a music‑filled weekend in New Orleans and a cultural immersion in Cartagena, Colombia.
  culinary: Victor Perez delights in mastering traditional Dominican mangú with fried plantains, experimenting with Southern BBQ rubs on pork shoulder, pairing adobo‑spiced brisket with homemade coleslaw,
    and often improvises with ingredients like smoked paprika and citrus but occasionally forgets to set timers, leading to charred edges.
  core: Victor Perez is a meticulously organized 22‑year‑old finance enthusiast whose anxiety fuels a relentless pursuit of perfection, balancing a love for street art, community tutoring, and experimental
    cooking with a habit of over‑planning and occasional sleepless nights.
background:
  cultural: Victor was raised in a Dominican household in the United States, where Spanish was spoken at home and Dominican festivals, food, and music were integral to family life. Growing up in Lenoir,
    North Carolina, he blended these Caribbean roots with Southern community values, developing a bicultural perspective. His heritage informs his warm hospitality, strong family orientation, and respect
    for community cohesion, while his environment has fostered adaptability and an appreciation for both Dominican and Southern traditions.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Bilingual (English/Spanish)'', ''Microsoft Office Suite'', ''Basic accounting'', ''Data entry'', ''Problem solving'', ''Time management'', ''Conflict
