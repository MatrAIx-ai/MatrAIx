  hobbies: '[''Photography'', ''Visiting art galleries'', ''Cooking (Dominican and Southern cuisine)'', ''Listening to music (bachata, merengue, indie)'', ''Volunteering (tutoring, community events)'',
    ''Hiking in the Blue Ridge foothills'', ''Playing basketball'', ''Journaling'', ''Meditation'']'
  career_goals: Victor aims to complete his bachelor's degree in finance or business administration while gaining certifications such as Certified Financial Services Counselor. He envisions progressing
    from teller to personal banker and eventually branch manager, leveraging his bilingual skills to serve a diverse clientele. Long‑term, he hopes to combine his financial expertise with his passion for
    the arts by developing micro‑financing programs for local artists and possibly founding a community outreach nonprofit that supports youth engagement in both financial literacy and creative expression.
