personas:
  professional: Vernon Sharpe, a 61‑year‑old aspiring neighborhood handyman, leverages his decades of home‑maintenance, carpentry, and small‑engine repair skills alongside his practical curiosity and budgeting
    expertise to launch a modest side venture, all while maintaining a relaxed, occasionally disorganized schedule that favors flexibility over strict planning.
  sports: Vernon Sharpe stays active through early‑morning gardening, weekend fishing trips with the Belleville Fishing Club, occasional walks with the Belleville Senior Walking Group, and follows the St.
    Louis Cardinals for baseball and the St. Louis Blues for hockey, while enjoying friendly chess matches at the community center as a mental sport.
  arts: Vernon Sharpe’s cultural palate is tuned to classic jazz and R&B, regularly spinning Miles Davis, John Coltrane, Aretha Franklin, and Etta James, while also attending local community‑theater productions
    such as A Raisin in the Sun and sharing his treasured soul‑food recipes at church potlucks, which together shape his creative identity.
  travel: Vernon Sharpe favors modest road‑trip itineraries that combine family reunions in Florida and Texas with nostalgic weekend getaways to Charleston, South Carolina, and dreams of a future Caribbean
    cruise once his handyman side business yields enough steady income to comfortably fund the trip.
  culinary: Vernon Sharpe’s kitchen is a blend of garden‑fresh vegetables and soulful comfort food, routinely preparing collard greens seasoned with smoked turkey, fried catfish with buttery cornbread,
    and sweet‑potato pie, while experimenting with herbs such as basil and thyme and occasionally trying a new recipe featured in a popular science magazine’s cooking column.
  core: Vernon Sharpe is a pragmatic, curiosity‑driven retiree who balances hands‑on handyman expertise, a love of jazz and soul‑food, and community volunteering, all while navigating a relaxed, sometimes
    disorganized approach to planning and an occasional habit of misplacing his favorite tools.
background:
  cultural: Vernon identifies as African American, rooted in the rich cultural tapestry of the Newark‑Belleville corridor. He grew up during the civil‑rights era, which instilled a strong sense of community
    resilience and pride. Family gatherings feature traditional soul food, gospel music, and storytelling that reinforce intergenerational bonds. He maintains active ties to his local church, which serves
    as a cultural hub for celebration, mutual aid, and mentorship. While he honors these traditions, Vernon remains open to new ideas and technologies, reflecting a balance between heritage and contemporary
    curiosity.
