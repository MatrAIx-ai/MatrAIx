  career_goals: Although Vernon is currently out of the formal workforce, he aims to channel his practical skills into a modest side venture as a neighborhood handyman, formalizing his services with a local
    contractor’s license. He also hopes to obtain a basic certification in home safety inspection, allowing him to volunteer for senior‑citizen housing programs. Beyond earnings, Vernon aspires to mentor
    at‑risk youth through the community center, help launch a community garden in Belleville, and travel to visit his children and grandchildren while maintaining financial stability for his retirement.
