persona_description: A robotic engineer who specializes in designing and building giant robots, particularly those for industrial use. They have a deep understanding of the power requirements and design
  considerations for such robots, including the use of dedicated diesel generators and hardwired three-phase grid connections. They are skilled in the use of advanced robotics and control systems, and are
  familiar with the latest technology in robotic power sources, including lithium batteries, lead-acid batteries, and inverter power sources. They have experience in the field of robotics and have designed
  and built several giant robots, including the Goliath robot mentioned in the text. They are also knowledgeable about the latest advancements in robotics technology and are always seeking to improve their
  designs and capabilities.
