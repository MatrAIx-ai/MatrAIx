personas:
  professional: Lissette Bartolomey, a retired community organizer now serving as chair of the senior advisory council, leverages their meticulous planning, bilingual communication, and calm conflict‑resolution
    style to orchestrate cultural events and health‑promotion programs for Marin County seniors.
  sports: Lissette Bartolomey leads a senior walking club that meets three times a week on Marin County trails, enjoys cheering on the San Francisco Giants during spring baseball outings, and occasionally
    joins low‑impact yoga classes at the community center, favoring routine movement over competitive sports.
  arts: Lissette Bartolomey sings with a senior choir that performs hymns and folk songs, delights in reading historical novels by authors such as Ken Follett, knits blankets inspired by traditional textile
    patterns while listening to Joan Baez and Carlos Santana, and attends local theater productions of Puccini operas whenever possible.
  travel: Lissette Bartolomey favors well‑planned weekend getaways, has explored Napa Valley’s vineyards, trekked Yosemite National Park’s scenic routes, visited the historic streets of Seville, Spain,
    and dreams of attending a cultural festival in Savannah, Georgia, balancing travel excitement with a modest budget and family commitments.
  culinary: Lissette Bartolomey is an adept home chef who meticulously prepares tamales, pozole, and pan dulce using fresh masa, hominy, dried chilies, and aromatic cilantro, hosts neighborhood potlucks
    where the aroma of simmering broth invites neighbors to share stories, and treats cooking as both cultural preservation and a social ritual.
  core: Lissette Bartolomey blends disciplined routine with boundless community spirit, turning every garden harvest and choir rehearsal into a celebration of shared heritage, even if they occasionally
    forget to water their indoor herbs.
background:
  cultural: Lissette was born in Jalisco, Mexico, and moved to the San Rafael area as a child. She grew up in a bilingual household where Spanish was spoken at home and English in school, fostering deep
    fluency in both languages. Her family upheld Mexican traditions—Dia de los Muertos altars, posadas, and weekly family meals centered on homemade dishes—while also embracing the progressive, environmentally
    conscious culture of Marin County. As a lifelong Catholic, she celebrates religious holidays with a blend of Mexican customs and local community events. Lissette remains actively involved with the Mexican
    American Cultural Center, volunteering at festivals and teaching cultural crafts to younger generations, thereby preserving her heritage while contributing to the diverse fabric of her Californian community.
