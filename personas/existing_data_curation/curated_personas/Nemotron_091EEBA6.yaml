  hobbies: '[''Preparing and sharing traditional Mexican recipes'', ''Gardening in her backyard and community plot'', ''Walking with friends in local parks'', ''Participating in a senior choir'', ''Volunteering
    at the local cultural center'', ''Reading historical novels'', ''Knitting blankets for charity'', ''Attending Mass and community celebrations'', ''Learning and practicing salsa dancing'', ''Collecting
    and preserving family photographs'']'
  career_goals: Although officially retired, Lissette is committed to expanding her impact as a volunteer leader. She aims to chair the senior advisory council at her local community center, where she can
    shape programs that blend cultural heritage with health promotion. She plans to author a bilingual cookbook that preserves her family’s recipes while teaching cooking classes to younger families. Lissette
    also seeks to mentor emerging volunteers, especially those from Mexican‑American backgrounds, guiding them in event logistics and community outreach. Long‑term, she hopes to serve as a cultural liaison
    for Marin County’s municipal planning board, ensuring that senior and Mexican‑heritage perspectives are represented in public policy.
