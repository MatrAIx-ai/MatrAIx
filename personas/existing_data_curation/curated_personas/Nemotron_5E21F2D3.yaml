personas:
  professional: Alexis Owens, a 21‑year‑old emerging graphic designer proficient in Adobe Photoshop and Illustrator, merges her methodical project‑management style with a curious eye for underrepresented
    art, channeling her solitary sketching habit into freelance illustration work while eyeing a future curatorial role at a regional museum.
  sports: Alexis Owens, who prefers low‑key physical activity, hikes the Talladega National Forest trails in the spring, plays pickup basketball with a local community center league in the winter, and cheers
    for the Alabama Crimson Tide football team while occasionally joining runs with the Tuscaloosa Running Club.
  arts: Alexis Owens immerses herself in visual and musical arts, sketching urban scenes inspired by the bold lines of Jean‑Michel Basquiat and the narrative depth of Kara Walker, while her evenings echo
    with the soulful sounds of H.E.R., Lianne La Havas, and Jacob Collier, and she frequently visits the Tuscaloosa Museum of Art and the local gallery for fresh inspiration.
  travel: Alexis Owens, a budget‑conscious explorer, plans trips meticulously using online itineraries, favors solo or small‑group art‑focused journeys such as her weekend road‑trip to New Orleans for live
    jazz and a spring visit to Asheville’s craft scene, and dreams of a future cultural pilgrimage to Chicago’s Museum Campus and Paris’s Musée d’Orsay.
  culinary: Alexis Owens, an enthusiastic home cook, blends Southern comfort with creative flair, regularly preparing dishes like shrimp and grits, collard greens seasoned with smoked paprika, and sweet‑potato
    pie, while she experiments with fresh herbs and hot sauces to keep family meals both grounding and adventurous.
  core: Alexis Owens, a 21‑year‑old detail‑oriented illustrator‑in‑training, balances a love for solitary sketching with a chronic worry habit and a disciplined routine that fuels both her artistic ambitions
    and her methodical approach to life.
background:
  cultural: Alexis is a Black woman raised in Oxford, Alabama, where her family has deep roots in the local African American community. Growing up, she was immersed in the church’s gospel music, community
    storytelling, and the civil‑rights legacy that shaped the region. Family gatherings often feature soul food and discussions of Southern Black history, instilling a strong sense of cultural pride. She
    draws inspiration from both historic figures like Rosa Parks and contemporary Black artists, writers, and musicians. While she appreciates the broader Southern culture—its cuisine, dialect, and traditions—she
    also navigates the complexities of being a Black individual in a predominantly white college town, fostering resilience, critical awareness, and a desire to celebrate her heritage through art and community
    engagement.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''Graphic design basics'', ''Critical writing'', ''Research and information synthesis'',
    ''Basic HTML/CSS'', ''Small‑group event coordination'']'
  hobbies: '[''Sketching and drawing'', ''Visiting art galleries and museums'', ''Reading contemporary African American literature'', ''Listening to jazz, R&B, and neo‑soul'', ''Journaling'', ''Nature walks
    in local parks and forests'', ''Playing chess'', ''Cooking traditional Southern soul food'']'
  career_goals: Alexis aims to enroll in a community college program in graphic design or visual communications, with the long‑term goal of becoming a freelance illustrator and eventually a curator or education
    coordinator at a regional museum focused on African American art. She hopes to build a personal brand through an online portfolio, secure commissions, and later transition into a stable role within
    a cultural institution where she can blend her artistic talents with her methodical project‑management skills. She also plans to pursue professional development in UX/UI design to broaden her career
    options.
