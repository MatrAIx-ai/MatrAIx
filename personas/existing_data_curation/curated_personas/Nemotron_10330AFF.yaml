personas:
  professional: David Adams brings his nuclear medicine and dosimetry expertise to the PET/CT suite, crafting creative imaging protocols that boost diagnostic clarity, while their organized yet flexible
    workflow, outgoing communication style, and competitive drive propel them toward senior dosimetry and medical physicist roles.
  sports: David Adams channels their energetic spirit into weekend hikes across Iowa prairie trails and summer runs with the Des Moines Running Club, they cheer for the Iowa Hawkeyes football team, and
    they occasionally join a local pick‑up soccer game at the community park.
  arts: David Adams expresses their imagination through digital abstract paintings on Procreate, mixed‑media sculptures showcased at Cedar Rapids Gallery Nights, active improvisational performances with
    the local improv troupe, and board‑game café evenings where they reference the works of Kandinsky, Jackson Pollock, and the sci‑fi visions of William Gibson.
  travel: David Adams curates travel itineraries that blend scientific curiosity and spontaneous adventure, favoring dark‑sky astrophotography trips to Utah’s Bryce Canyon and nighttime hikes at the Grand
    Canyon, road‑tripping to NASA’s Kennedy Space Center during breaks from graduate studies, while budgeting for affordable hostels and occasionally splurging on a weekend in New York City to catch a Broadway
    show.
  culinary: David Adams treats their kitchen as a laboratory, experimenting with recipes like miso‑glazed salmon, saffron risotto, and homemade kimchi, mastering sous‑vide techniques with a precision reminiscent
    of dosimetry calculations, yet they sometimes burn a batch of cookies when a late‑night astrophotography session runs over.
  core: David Adams balances a rigorous scientific career with a vibrant creative life, channeling their competitive, imaginative, and socially energized personality into art, improv, astrophotography,
    and ambitious academic goals.
background:
  cultural: David grew up in the heart of the American Midwest, raised in a middle‑class family in Johnson County, Iowa. His upbringing reflects classic Midwestern values—self‑reliance, modesty, and a strong
    sense of community. He attended local public schools, where he participated in the robotics club and the school theatre program, fostering both his technical curiosity and artistic side. While the region’s
    cultural fabric is rooted in Protestant traditions and agricultural heritage, David’s adult life in North Liberty is also shaped by the University of Iowa’s vibrant academic and arts scene. He maintains
    close ties to family gatherings, community service events, and regional celebrations such as the Iowa State Fair, embodying the friendly, collaborative spirit typical of the area.
attributes:
  skills: '[''Radiopharmaceutical preparation'', ''Patient positioning and care'', ''Dose calculation and treatment planning'', ''Operation of PET/CT and SPECT imaging systems'', ''Radiation safety and
    regulatory compliance'', ''Quality control and equipment calibration'', ''Technical troubleshooting and maintenance'', ''Data analysis and report generation'', ''Patient communication and education'',
    ''Protocol development and optimization'']'
  hobbies: '[''Digital abstract painting'', ''Mixed‑media sculpture'', ''Improv theater performance'', ''Board‑game strategy nights'', ''Astrophotography'', ''Hiking prairie trails'', ''Science‑fiction
    reading'', ''Model rocket construction'', ''Experimental cooking'', ''Volunteer health‑fair outreach'']'
  career_goals: David aims to advance from his current technologist role to a senior dosimetrist and eventually a board‑certified medical physicist. Over the next five years he plans to complete a bachelor’s
    degree in Radiologic Sciences, followed by a master’s in Health Physics, and obtain ARRT and ABR certifications. He envisions leading a multidisciplinary imaging department where he can spearhead research
    into novel radiotracers and AI‑driven image analysis. In the longer term, David hopes to establish a consulting practice that advises hospitals on radiation safety, workflow optimization, and the integration
    of cutting‑edge nuclear imaging technologies.
