  hobbies: '[''Reading adventure/science‑fiction books'', ''Minecraft (creative building and problem solving)'', ''Fishing with family'', ''Backyard woodworking projects'', ''Model kit building (LEGO, model
    airplanes)'', ''Youth group/Boy Scouts service projects'']'
  career_goals: He aims to pursue a high‑school STEM track and eventually study civil engineering, hoping to design safe roads, bridges, and water‑management systems that benefit small Texas towns. In the
    short term, Matthew wants to earn good grades, join the school’s robotics club, and secure a summer internship with a local contractor or farm‑equipment dealer. He also hopes to give back to his community
    by volunteering for youth mentorship programs once he has the technical skills.
