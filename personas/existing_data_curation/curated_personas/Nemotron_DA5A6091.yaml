personas:
  professional: Matthew Thomas is an aspiring junior woodworker and Minecraft architect who channels his love for structure and hands‑on projects into building elaborate in‑game contraptions and real‑world
    birdhouses, balancing meticulous planning with spontaneous creativity to impress his Boy Scout troop and classmates, and they take pride in delivering each project on time.
  sports: Matthew Thomas stays active through his school’s cross‑country team and weekly fishing outings with his dad, while they enthusiastically cheer for the Dallas Cowboys on Friday night and keep an
    eye on the Texas Rangers’ baseball season, preferring structured, low‑key workouts over crowded team sports.
  arts: Matthew Thomas nurtures his creative side by devouring science‑fiction novels like "Ender’s Game", listening to classic rock icons such as Creedence Clearwater Revival and country legends like Johnny
    Cash, and sketching Minecraft landscapes, which together fuel his quiet imagination.
  travel: Matthew Thomas prefers well‑planned family road trips to nearby spots like Tyler State Park and occasional weekend getaways to Austin’s live‑music scene, while they dream of someday exploring
    the Grand Canyon’s rim, balancing a love for predictable routes with a budding curiosity for new horizons.
  culinary: Matthew Thomas has a growing palate for Texas‑style BBQ—favoring smoked brisket, honey‑glazed catfish, and a hearty chili topped with shredded cheddar—and enjoys experimenting with simple recipes
    in his kitchen, often chopping fresh corn and beans while perfecting his signature cornbread.
  core: Matthew Thomas is a reserved 13‑year‑old who blends a love for orderly DIY projects and Minecraft world‑building with a habit of hoarding spare change for spontaneous gaming splurges, all while
    staying rooted in his tight‑knit town’s Friday night football rituals.
background:
  cultural: 'Matthew grew up in Bullard, a small, close‑knit community in East Texas. His family’s cultural life reflects typical Southern White Texan traditions: regular church attendance, community gatherings
    around high‑school football games, a love of country and classic rock music, and a strong emphasis on self‑reliance and hospitality. The rural setting gives him familiarity with farm work, outdoor recreation,
    and a value system centered on responsibility, neighborliness, and the predictable rhythms of small‑town life.'
attributes:
  skills: '[''Organized note‑taking'', ''Basic Scratch programming'', ''Woodworking basics (birdhouses, small projects)'', ''Time management for homework'', ''Agricultural chores (feeding livestock, garden
