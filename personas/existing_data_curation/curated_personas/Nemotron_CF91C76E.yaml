    "Basic carpentry", "Home maintenance", "Gardening"]'
  hobbies: '["Reading business biographies", "Historical non-fiction reading", "Classic literature", "Woodworking", "Vegetable gardening", "Hiking local trails", "Fishing", "Small book club participation",
    "Volunteering at local food bank", "Cooking seasonal family meals"]'
  career_goals: Edward aims to transition from his current unemployment into a flexible, part‑time consulting practice that lets him apply his business expertise to local small‑business owners. Over the
    next two years he plans to secure a few steady clients, focusing on financial planning, budgeting, and operational efficiency, while maintaining a schedule that accommodates his preference for personal
    flexibility and family time. He intends to pursue a Project Management Professional (PMP) certification to formalize his project coordination skills and solidify his credibility. In the longer term,
    Edward envisions launching a community‑oriented boutique—such as a small bookstore‑café—where he can blend his love of literature, entrepreneurship, and neighborhood engagement, creating a predictable
    yet adaptable business model that aligns with his desire for structure balanced by flexibility.
