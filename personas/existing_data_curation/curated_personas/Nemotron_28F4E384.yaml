  career_goals: Lini aims to turn her organizational talent and community spirit into a career that supports local youth and families. She envisions working as a community program coordinator or youth activities
    director for a nonprofit or town recreation department, where she can design and run structured after‑school programs, summer camps, and wellness workshops. In the longer term, she hopes to pursue a
    certification in early childhood education or recreational therapy, enabling her to blend her practical skills with a deeper professional qualification.
