  career_goals: Even at four, Kimberly dreams of a future where she can help and teach others. She often says she wants to be a teacher to share stories, a veterinarian to care for animals, or a scientist
    to discover how things work. She also imagines becoming a librarian, organizing books and guiding readers. Her ambitions reflect a blend of curiosity about the world and a practical desire to bring
    order and care to her chosen path.
