personas:
  professional: Kimberly, an aspiring junior architect who loves building elaborate towers with LEGO bricks, displays early spatial reasoning and methodical planning, balancing her curiosity for new designs
    with a practical approach to following step‑by‑step instructions, and they often organize their play area before starting a new project.
  sports: Kimberly, a spirited participant in the neighborhood preschool soccer league and a devoted fan of the Chicago Cubs, practices dribbling a mini‑ball each afternoon and insists on a strict stretching
    routine before play, and they love cheering loudly when the Cubs win a home game.
  arts: Kimberly, an enthusiastic admirer of Disney’s animated classics and a devoted listener of The Wiggles, spends evenings drawing princesses, practicing karaoke to Let It Go, proudly showcasing hand‑made
    paper crowns, and they often hum favorite tunes from Frozen while riding in the car.
  travel: Kimberly, who delights in weekend family trips to the local zoo, annual visits to Grandma’s farm, and a memorable vacation to Disneyland in Anaheim, prefers short, predictable itineraries, asks
    for a sticker map to track each stop, and they balance excitement with a need for familiar comforts.
  culinary: Kimberly, a fan of creamy mac and cheese, crunchy carrot sticks, and strawberry yogurt, loves helping stir pancake batter and sprinkle chocolate chips on muffins, stubbornly refuses broccoli
    calling it a green monster, and they often snack on goldfish crackers while watching cartoons.
  core: Kimberly, a meticulous four‑year‑old with boundless curiosity tempered by frequent worries, organizes crayons by color, follows strict bedtime routines, solves puzzles methodically, and they occasionally
    frets over imagined mishaps.
background:
  cultural: Kimberly is raised in a white, middle-class New England family in Bristol, Connecticut. Her family values education, community involvement, and a connection to nature typical of Litchfield County.
    Traditions include celebrating American holidays, attending a local Presbyterian church, participating in town fairs, and reading classic children's literature together. The rural-suburban setting provides
    frequent outdoor activities like hiking, apple picking, and visits to nearby farms, shaping a cultural background that blends modest American customs with a strong appreciation for learning and the
    outdoors.
