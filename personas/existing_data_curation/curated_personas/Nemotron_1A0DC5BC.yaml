  hobbies: '[''LEGO building'', ''Scratch programming'', ''Chess'', ''Science reading'', ''Nature walks'', ''Model airplane construction'', ''School band (trumpet)'', ''Robotics club'', ''Gardening'', ''Puzzle
    solving'']'
  career_goals: Joseph aims to become an engineer who designs practical, sustainable solutions for everyday challenges, particularly in agriculture and robotics. He dreams of attending a top engineering
    university where he can merge his love for mechanical systems with computer science, eventually working on robotics that improve farm productivity or create eco‑friendly technology. He also sees himself
    competing in national robotics contests and possibly pursuing a role in product development that balances innovative ideas with real‑world applicability. In the long term, he hopes to lead projects
    that inspire other young innovators and contribute to his community’s growth.
