  hobbies: '["Visiting local art galleries and museums", "Watercolor painting", "Community theater participation (acting and set design)", "Book club discussions", "Salsa dancing", "Group hiking on local
    trails", "Mindfulness meditation and yoga", "Gardening", "Experimenting with new cooking recipes", "Volunteering at neighborhood festivals and art fairs", "Online learning (e.g., astrophysics, foreign
    languages)", "Attending live music events", "DIY home improvement projects", "Photography of nature and urban scenes"]'
  career_goals: Eva aims to leverage her STEM background to move into a role that blends data analysis with retail operations, such as a store operations analyst or inventory specialist. Over the next two
    years she plans to earn a certification in data analytics (e.g., Google Data Analytics or Tableau) and to take evening courses in advanced Excel and SQL. She hopes to transition from cashier to a supervisory
    position, eventually becoming a shift manager and then a regional manager, where she can apply her organizational strengths while having more control over scheduling to reduce stress. Parallel to her
    career growth, she wants to support her family’s financial stability and to create a balanced work‑life schedule that allows time for her artistic pursuits.
