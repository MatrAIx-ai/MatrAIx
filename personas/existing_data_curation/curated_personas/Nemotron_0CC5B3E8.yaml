    with Habitat for Humanity'', ''Visiting art galleries'']'
  career_goals: Michael aims to become a Certified Welding Inspector (CWI) within the next two years and to take on a supervisory role leading a skilled welding team at a regional manufacturer. Parallel
    to that, he dreams of opening a small studio where he can produce custom metal art and functional pieces for the Fort Collins community, collaborating with local artists on public installations. He
    also plans to develop a community apprenticeship program that blends technical training with creative design, ultimately positioning himself as a bridge between industrial fabrication and the local
    art scene.
