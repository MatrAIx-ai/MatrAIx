personas:
  professional: A tiny future architect, Sonia builds towering block structures with meticulous precision, and they relish the predictable order of each piece, reflecting their organized, practical temperament
    even in toddler play.
  sports: A budding athlete, Sonia attends a toddler soccer class at the local community center, roots for the Miami Dolphins during football season and idolizes the Miami Heat’s fast pace, and they enjoy
    the structured splash‑pad water play as a fun, social fitness routine.
  arts: An enthusiastic little performer, Sonia twirls to Shakira’s lively beats and sings the catchy chorus of Disney’s ‘Let It Go,’ and they love flipping through Eric Carle picture books, letting the
    vivid illustrations spark endless imagination.
  travel: A curious stroller explorer, Sonia loves family outings to Miami Beach’s sandcastle playground, weekend trips to Orlando’s theme parks, and their parents’ planned road‑trip to Key West, where
    they’ll collect seashells and practice singing carnival songs.
  culinary: A budding foodie, Sonia savors bite‑size arepas filled with melted cheese and avocado, munches on crispy chicken empanadas, and they relish sweet banana pancakes drizzled with maple syrup, often
    insisting on stirring the batter with a tiny wooden spoon.
  core: Sonia blends meticulous block‑building with a zest for carnival music, turning routine chores into playful challenges while they occasionally bargain for extra cookies and get fixated on matching
    colors.
background:
  cultural: Sonia comes from a Colombian family residing in Miami. At home she hears Spanish, celebrates Colombian holidays such as Carnaval de Barranquilla and Día de los Niños, and enjoys traditional
    foods like arepas and empanadas. Her upbringing blends Colombian cultural rhythms, language, and family values with the diverse, multicultural environment of Miami.
attributes:
  skills: '["bilingual vocabulary (Spanish & English)", "fine motor coordination (stacking blocks)", "basic counting and number recognition", "recognizing colors and shapes", "following daily routines",
