  hobbies: '["dancing to music", "building block towers", "drawing with crayons", "singing nursery rhymes", "playing in the sandbox", "participating in group storytime", "attending organized playdates"]'
  career_goals: Although still very young, Sonia aspires to build a strong foundation for future learning. She looks forward to starting preschool, mastering reading and writing, and eventually becoming
    a teacher who can guide other children. Her love of routine and organized activities drives her ambition to achieve milestones ahead of her peers and develop independence.
