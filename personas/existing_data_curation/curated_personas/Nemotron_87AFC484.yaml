  career_goals: Although no longer in the formal workforce, Ruth aims to remain an active contributor to her community. She aspires to volunteer as a docent at a local museum, lead oral‑history projects
    that capture the stories of longtime Brooklyn residents, and mentor younger adults through arts‑based workshops. Ruth also hopes to compile her memoirs, documenting her experiences across decades of
    Brooklyn life, and to continue taking informal art classes to deepen her understanding of contemporary and experimental mediums.
