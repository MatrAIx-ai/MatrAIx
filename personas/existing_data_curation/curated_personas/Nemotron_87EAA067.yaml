  career_goals: Travis aims to advance within the retail sector by first attaining a shift-supervisor position, then moving into store management. He plans to enroll in a community college program in business
    administration to strengthen his leadership and financial skills. In the longer term, he envisions opening his own boutique or managing multiple locations as a district manager, leveraging his practical
    experience, calm decision-making, and people-focused approach to create a well-run, customer-centric operation.
