  career_goals: John aims to earn an AWS Certified Welder credential and become a lead fabricator in his plant, eventually moving into a supervisory role where he can mentor apprentices and drive continuous‑improvement
    initiatives. Parallel to his career, he hopes to launch a weekend side‑business offering bespoke metal sculptures and functional art for local businesses and homeowners, blending his technical expertise
    with his love of art. He also plans to complete his GED and take community‑college courses in advanced manufacturing and design, securing greater job stability for his family and potentially transitioning
    into a design‑engineering position.
