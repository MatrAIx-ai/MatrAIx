personas:
  professional: John Burke is a senior metal fabricator with 15 years of expertise in MIG, TIG, and stick welding, CNC milling, and blueprint interpretation, who leverages their curious, art‑appreciative
    mindset to design custom metal sculptures while using their sociable, conflict‑mediating style to lead team projects toward continuous‑improvement initiatives.
  sports: John Burke enjoys weekend pickup basketball games at the Omaha Community Center, follows the Nebraska Cornhuskers men’s basketball and the Omaha Storm Chasers baseball, and spends early mornings
    fishing on the Platte River as a low‑impact sport, maintaining fitness through a mix of casual team play and regular riverbank walks.
  arts: John Burke immerses themselves in Omaha’s art scene, attending the biennial Sculpture Walk and the Joslyn Art Museum where they admire works by Anish Kapoor, Jeff Koons, and local sculptor Ruth
    Asawa; at the makerspace they weld original metal pieces inspired by Banksy’s street art and experiment with 3‑D printed forms, often listening to The National while sketching designs.
  travel: John Burke prefers a blend of planned road trips and spontaneous weekend getaways, having explored Badlands National Park, a fishing expedition to Lake Geneva, Wisconsin, and a design‑focused
    visit to Milan, Italy, while budgeting for family responsibilities; they aim to attend Maker Faire in Chicago next summer and dream of a cultural retreat in Kyoto, Japan.
  culinary: John Burke enjoys hearty Midwestern fare, regularly grilling fresh trout from the Platte River with lemon‑dill butter, smoking brisket seasoned with oak‑smoked paprika, and whipping up jalapeño‑cheddar
    cornbread, while their intermediate cooking skills lead them to experiment with saffron risotto and artisan cheese plates, favoring ingredients like steel‑cut oats, heirloom tomatoes, and locally sourced
    honey.
  core: John Burke, a 39‑year‑old metal‑fabrication maestro who melds welding sparks with artful sculptures, worries about every deadline yet finds peace angling on the Platte River and restoring vintage
    car parts, all while juggling a family, a side‑business dream, and a relentless curiosity.
background:
  cultural: John grew up in a working‑class Irish‑American family on the Northside of Omaha, where his parents were employed in the meat‑packing and metal‑shop industries. The community’s Midwestern values
    of hard work, humility, and neighborly cooperation shaped his outlook. He attended the local public high school and spent Saturdays at St. Patrick’s Parish cultural events, which emphasized community
    service and traditional celebrations. Exposure to the region’s agricultural fairs, county picnics, and the annual Omaha Summer Arts Festival introduced him early to both practical craftsmanship and
    artistic expression. Although he left school without a diploma, his family’s emphasis on self‑reliance and community involvement encouraged him to pursue skilled trades while staying engaged with local
    cultural activities.
