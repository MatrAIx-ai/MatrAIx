  hobbies: '[''Hiking'', ''Home cooking'', ''Acoustic guitar playing'', ''Photography'', ''Board game nights'', ''Podcasts (marketing & psychology)'', ''Mindfulness meditation'', ''Philadelphia sports fandom'',
    ''Reading non-fiction'', ''Strategy video gaming'']'
  career_goals: In the short term, Russell aims to lead larger, multi‑channel research projects that integrate predictive analytics and machine‑learning techniques, sharpening his ability to forecast market
    shifts. He plans to earn a certificate in data science to deepen his technical toolkit and to adopt stronger organizational habits that reduce stress and improve work‑life balance. Within five to seven
    years, he aspires to become a senior manager or director of consumer insights, overseeing a team that shapes brand strategy and product development for a regional or national firm. Long‑term, he envisions
    launching a boutique consulting practice that helps small local businesses in Delaware County leverage data‑driven marketing, allowing him to blend his analytical expertise with his desire for flexibility
    and community impact.
