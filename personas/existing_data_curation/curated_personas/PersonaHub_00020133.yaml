  with the latest modeling and prediction techniques for mass wasting processes and have experience in using field observations and satellite imagery to identify and assess landslide hazards. This persona
  is interested in the assessment of the impact of land use changes and human-induced activities on stream channels, and is skilled in using GIS and remote sensing technologies to analyze and visualize
  the landscape. They are also familiar with the latest modeling and prediction techniques for mass wasting processes and have experience in using field observations and satellite imagery to identify and
  assess landslide hazards.
