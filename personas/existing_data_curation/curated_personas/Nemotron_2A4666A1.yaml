personas:
  professional: Jacob Pryor, a curious four‑year‑old who spends preschool hours devouring picture books about ocean life while meticulously building sandcastle kingdoms at Revere Beach, channels their practicality
    into arranging shells in neat patterns even as their scattered crayons betray a fondness for spontaneous play.
  sports: Jacob Pryor, a four‑year‑old who prefers quiet solo play at Revere Beach’s shallow tide pools, often practices kicking a soft soccer ball alone after preschool and cheerfully dons a miniature
    Red Sox cap while occasionally joining the Revere Youth Soccer drop‑in clinic, balancing an affection for the Boston Bruins mascot with a mild aversion to noisy team drills.
  arts: Jacob Pryor, an imaginative four‑year‑old who spends afternoons finger‑painting seashell silhouettes to the gentle tunes of Raffi’s 'Baby Beluga' and The Wiggles’ 'Fruit Salad', eagerly recites
    lines from the animated 'Paw Patrol' series and collects sticker sheets featuring Disney’s Mickey Mouse, letting these quiet, colorful artistic moments shape their serene yet vivid inner world.
  travel: Jacob Pryor, a four‑year‑old with a love for salty sea breezes, enjoys annual family trips to Cape Cod’s quiet lighthouses and weekend outings to the nearby White Mountains for leaf‑picking, while
    dreaming of a future visit to the Maine lobster shacks, preferring relaxed car rides with plenty of stops for sand‑castle breaks over crowded amusement parks.
  culinary: Jacob Pryor, a four‑year‑old who delights in the creamy richness of homemade macaroni‑and‑cheese and the familiar tang of New England clam chowder, often assists their parent in sprinkling fresh
    blueberries onto pancakes, yet frequently sneaks a bite of fish sticks when no one watches, revealing a mischievous appetite for both comfort foods and seaside flavors.
  core: Jacob Pryor, a four‑year‑old ocean‑obsessed introvert who habitually arranges shells into neat rows, forgets to tidy his play area, feels intense waves of anxiety over sudden changes, and finds
    calm in solitary sandcastle building, embodies a paradox of meticulous curiosity and carefree messiness.
background:
  cultural: Jacob is a White American child growing up in Revere, Massachusetts, a coastal suburb of Boston with a strong New England maritime heritage. His family celebrates typical American holidays such
    as Thanksgiving, Christmas and the Fourth of July, often with local traditions like beach outings to Revere Beach and community fireworks. He attends a neighborhood preschool that emphasizes early literacy,
    independence and polite social interaction, reflecting the region's value on self‑reliance and community safety. The cultural environment blends working‑class values, a love of the outdoors, and exposure
    to diverse neighbors, giving him a sense of community while he explores his own quiet interests.
