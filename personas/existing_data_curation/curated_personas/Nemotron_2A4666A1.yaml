  career_goals: Jacob often talks about wanting to become an astronaut or a scientist when he grows up, because he loves looking at the night sky and exploring how things work. He also imagines building
    his own inventions in a quiet workshop, hinting at an ambition to be an engineer or inventor. Occasionally he says he wants to help animals as a wildlife researcher, reflecting his caring side and desire
    to make a difference while working in a calm, focused environment.
