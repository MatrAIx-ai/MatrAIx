  hobbies: '[''Recreational basketball'', ''Fishing'', ''Ice-fishing'', ''Home cooking'', ''Watching cooking shows'', ''Volunteering at community events'', ''Board game nights'', ''Hiking'']'
  career_goals: Stephen plans to leverage his practical experience into a culinary career. Over the next few years he intends to enroll in a community‑college culinary program or pursue an apprenticeship
    to transition from dishwasher to line cook. His long‑term ambition is to become a sous chef and eventually a head chef, with the ultimate goal of opening a modest, family‑friendly restaurant that serves
    the Courtland community. He also aims to earn certifications in food safety and kitchen management, and to participate in local cooking contests to test his skills in a competitive setting.
