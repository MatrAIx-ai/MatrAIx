  hobbies: '[''Zumba and Group Fitness Classes'', ''Community Theater Acting'', ''Board Games Night'', ''Cooking and Recipe Exploration'', ''Volunteer Work at Local Food Bank'', ''Reading Contemporary Fiction'',
    ''Journaling'', ''Nature Walks in Local Parks'', ''Yoga and Mindfulness Practice'']'
  career_goals: Jeanette aims to secure a full‑time teaching position in an elementary school within Montgomery County, preferably focusing on inclusive or special education. She plans to pursue a master’s
    degree in education leadership to eventually become an instructional coach or curriculum specialist, where she can design supportive learning environments and mentor newer teachers. Balancing professional
    growth with personal well‑being, she hopes to integrate mindfulness practices into her classroom to help students manage stress.
