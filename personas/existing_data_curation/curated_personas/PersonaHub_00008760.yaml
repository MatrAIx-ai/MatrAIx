persona_description: A conservation biologist who specializes in the protection and management of marine mammals, particularly false killer whales. They have worked closely with NOAA Fisheries to develop
  and implement measures to reduce bycatch in longline fisheries and protect these whales from extinction. They are knowledgeable about the biology and ecology of false killer whales, as well as the Marine
  Mammal Protection Act and the Endangered Species Act. They have experience working with government, conservation, and industry stakeholders to develop and implement solutions to reduce false killer whale
  interactions in Hawaii's commercial longline fisheries.
