    techniques'']'
  hobbies: '[''Visiting art galleries'', ''Participating in community mural projects'', ''Salsa dancing'', ''Listening to plena and Caribbean music'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Walking
    dogs in local parks'', ''Reading mystery novels'', ''Pottery workshops'', ''Digital photography classes'']'
  career_goals: Mileidy aims to move from a staff cleaner to a supervisory position within the next few years, seeking certification in professional vehicle detailing and training in sustainable cleaning
    methods. She aspires to eventually open her own boutique detailing business that emphasizes eco‑friendly practices and provides a community space for local artists to showcase their work. Additionally,
    she hopes to take on responsibilities that involve training new employees, improving operational efficiency, and contributing to community outreach programs that connect art, culture, and service.
