personas:
  professional: Tita Hood, a budding preschool architect, meticulously builds block towers and draws floor plans, balancing a soaring curiosity for new structures with a practical habit of measuring each
    piece before assembling, and they celebrate each completed structure with a quiet high‑five to themselves.
  sports: Tita Hood, a budding soccer enthusiast on the community Little Stars team, spends Saturday mornings dribbling a size‑3 ball at the local park, cheers for the Houston Astros during family backyard
    viewings, and they also practice tumbling in a beginner gymnastics class.
  arts: Tita Hood, a tiny visual storyteller, fills sketchbooks with crayon renditions of Disney princesses and Pixar characters, sings along to the soundtrack of 'Frozen' while dancing in the living room,
    and they proudly display a hand‑made cardboard superhero cape during playtime.
  travel: Tita Hood, an adventurous road‑trip fan, has visited the Space Center Houston, built sandcastles on Galveston beach, and dreams of riding the monorail at Disneyland, and they prefer short trips
    with a familiar stuffed rabbit for comfort.
  culinary: Tita Hood, a selective eater, adores cheese‑laden macaroni, chicken nuggets with honey mustard, and insists on a side of apple slices, and they occasionally sneak a bite of the family’s secret‑spiced
    BBQ ribs when no one watches.
  core: Tita Hood, a methodical five‑year‑old, lines up crayons by hue, saves every spare cent, and maintains a tidy block shelf, and they find calm in routine while occasionally rejecting bedtime stories
    that stray from familiar fairy tales.
background:
  cultural: Tita is raised in a middle‑class White American family in Houston, Texas. Her household follows many mainstream American customs—celebrating holidays such as Thanksgiving, Fourth of July, and
    Christmas—with family gatherings that include barbeques and community park activities. Growing up in the diverse city of Houston, she is exposed to a variety of cultures and languages, which encourages
    an open‑minded attitude. Her family emphasizes politeness, community service, and respect for others, and English is the primary language spoken at home.
attributes:
  skills: '[''basic reading'', ''counting to 20'', ''organizing toys by color and size'', ''following daily routines independently'', ''using educational tablet apps'', ''solving simple puzzles'', ''drawing
