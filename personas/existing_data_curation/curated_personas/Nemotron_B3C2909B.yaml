  hobbies: '[''reading picture books'', ''building with LEGO bricks'', ''coloring and drawing'', ''organizing stickers'', ''collecting and sorting leaves and stones'', ''singing nursery rhymes'', ''playing
    simple board games with small groups'']'
  career_goals: She often talks about wanting to help others when she grows up. Inspired by the caring teachers at her preschool, Tita dreams of becoming a kindergarten teacher who creates a well‑structured,
    nurturing classroom where each child can explore new ideas. She also expresses a gentle fascination with animals and imagines herself as a veterinarian, caring for pets in a calm and organized way.
    Her long‑term ambition is to combine her love for order, kindness, and education into a career that supports children’s growth.
