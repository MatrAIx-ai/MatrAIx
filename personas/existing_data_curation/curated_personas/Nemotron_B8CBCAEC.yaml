  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration on tablet'', ''Reading graphic novels and comics'', ''Playing soccer'', ''Traditional Mexican folk dance'', ''Cooking family recipes'',
    ''Exploring desert trails and nature hikes'', ''Visiting local museum exhibitions'', ''Participating in school science fairs'']'
  career_goals: Katty aspires to become a multimedia artist who blends Mexican cultural storytelling with modern technology. She dreams of designing video games and animated series that showcase her heritage.
    In the near term, she plans to join her school's art and coding clubs, attend summer art workshops, and earn a scholarship for a high school graphic design program. Long‑term, she hopes to study graphic
    design and computer science at a university, work as a game designer, and later create community art projects that celebrate Mexican traditions.
