personas:
  professional: Katty Padron, an aspiring young comic illustrator, channels their curiosity and methodical planning into daily sketch sessions and digital art projects, often weaving adventure and folklore
    motifs with school science concepts into vibrant panels.
  sports: Katty Padron, an energetic midfielder for the Ridgecrest Youth Soccer Club, idolizes the LA Galaxy, follows the MLS season closely, cheers for the Los Angeles Lakers during basketball season,
    and enjoys weekend pick‑up games at the local park with friends.
  arts: Katty Padron, a passionate illustrator and folklore enthusiast, spends afternoons sketching characters inspired by Neil Gaiman’s adventures, experimenting with watercolor washes reminiscent of Frida
    Kahlo’s vibrant palettes, creating digital comics in the style of Stan Lee, and performing traditional folk dances that enrich their artistic identity.
  travel: Katty Padron, an eager explorer, loves meticulously planning weekend road trips to Joshua Tree National Park and annual family vacations to San Diego’s beach boardwalk, while daydreaming about
    a future summer exchange to Barcelona, a city famed for its lively festivals and artistic neighborhoods, balancing adventure with the need to stay within a modest family budget.
  culinary: Katty Padron, a budding home‑chef, delights in hand‑rolling tamales with masa and pork, simmering enchiladas smothered in rich mole sauce, whisking salsa verde from fresh chilies, and crafting
    colorful sugar‑skull cupcakes for Día de los Muertos, all while mastering basic knife skills under their abuela’s guidance.
  core: Katty Padron, an eleven‑year‑old whirlwind of curiosity and organization, merges a love for sketching, soccer, and family traditions into a vibrant daily rhythm, yet occasionally misplaces their
    inhaler or splurges on video games despite a steadfast commitment to saving for art supplies.
background:
  cultural: Katty grew up in a Mexican‑American household in Ridgecrest, California. At home she speaks Spanish with her parents and grandparents while using English at school, making her fully bilingual.
    Family gatherings are centered around Mexican traditions such as Día de los Muertos, where she helps make papel picado and altars, and festive meals featuring tamales, mole, and pozole. Her parents
    emphasize respect for elders, the importance of community, and pride in her heritage, which she celebrates through music, dance, and art. Living in the high desert of San Bernardino County, Katty also
    embraces the local outdoor culture, blending California’s multicultural environment with her Mexican roots.
