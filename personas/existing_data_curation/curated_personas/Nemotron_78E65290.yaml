personas:
  professional: Myrtice Sheppard is a seasoned community arts organizer and grant‑writing specialist who leverages sharp interpersonal networking, quick‑thinking event choreography, and a competitive edge
    to secure funding, curate inclusive exhibitions, and mentor beginners in mixed‑media painting and street photography, all while battling a penchant for spontaneity that sometimes clashes with strict
    deadlines.
  sports: Myrtice Sheppard embraces movement through sunrise yoga on the Naples shoreline, weekly salsa lessons at the community center, and occasional senior cycling outings with a local club, while passionately
    cheering for the Tampa Bay Lightning and the Miami Marlins, using these activities as both social outlets and stress‑relief mechanisms.
  arts: Myrtice Sheppard dives deep into Naples’ cultural pulse, curating mixed‑media workshops, leading street‑photography walks, and engaging in lively debates about the works of Yayoi Kusama, Banksy,
    and contemporary muralists, while serving on the Naples Art Association board and writing persuasive grant proposals that reflect a critical, competitive mindset.
  travel: Myrtice Sheppard favors culturally immersive, moderately paced trips, having recently documented the Renaissance galleries of Florence, the urban graffiti scene of Berlin, and the historic forts
    of Cartagena, Colombia, where they blended sunrise yoga sessions with photography excursions, and they now eye a pilgrimage to Lisbon’s azulejo‑adorned neighborhoods to capture pastel tiles on canvas.
  culinary: Myrtice Sheppard explores global gastronomy by mastering dishes such as Thai lemongrass curry, Moroccan chicken tagine with preserved lemons, and Italian ribollita, often sourcing Florida shrimp
    and heirloom tomatoes for fusion plates, while their cooking‑class adventures fuel tasting soirées that showcase a blend of meticulous plating and spontaneous flavor pairings.
  core: Myrtice Sheppard is a 66‑year‑old, fiercely competitive arts advocate whose spontaneous creativity, love for movement, and knack for networking are balanced by a lingering worry about deadlines
    and a habit of stress‑induced over‑commitment.
background:
  cultural: Myrtice grew up in a middle‑class white family in the Midwest during the post‑war boom, absorbing mainstream American values while being exposed to the cultural revolutions of the 1960s and
    ’70s that sparked her lifelong curiosity about art and new ideas. After completing some college coursework in liberal arts and communications, she moved to Florida for retirement, settling in the affluent,
    arts‑friendly community of Naples, Collier County. The region’s vibrant cultural scene—museums, theatres, and outdoor festivals—has reinforced her appreciation for diverse artistic expression. Her cultural
    identity blends traditional Midwestern work ethic and modesty with the Mediterranean‑inspired, relaxed lifestyle of coastal Florida, allowing her to navigate both structured volunteer boards and spontaneous
    social gatherings with ease.
