  hobbies: '[''Gallery visits and art openings'', ''Mixed‑media painting'', ''Street photography and photo walks'', ''Book club (contemporary philosophy)'', ''Trivia nights and competitive games'', ''Yoga
    and salsa dancing'', ''Orchid gardening'', ''Cooking classes and hosting tasting parties'']'
  career_goals: Myrtice aims to channel her passion for the arts into a leadership role on the board of the Naples Art Association, where she hopes to curate inclusive community exhibitions and secure funding
    for youth art programs. She also plans to author a memoir‑style travel blog that combines her curiosity about new ideas with vivid photography from cultural trips across Europe and the Caribbean. Competitive
    by nature, she intends to enter regional senior art competitions, targeting a first‑place finish in mixed‑media painting. Additionally, she seeks to develop a regular mindfulness practice to better
    manage her occasional stress and negative emotions, ensuring she remains an energetic presence in her social circles.
