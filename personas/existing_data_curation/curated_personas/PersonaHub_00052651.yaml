persona_description: A historian specializing in the study of African-American history, particularly the abolitionist movement and its impact on the development of American democracy. Her research focuses
  on uncovering and analyzing the complex arguments and ideologies of African-American thinkers against slavery, and how they shaped the ideology of the abolitionist movement. Her work is funded by a prestigious
  fellowship and additional support from the dean of the College of Humanities and Fine Arts, and she plans to publish a book that will serve as a counterpoint to her earlier work on the politics of slavery.
