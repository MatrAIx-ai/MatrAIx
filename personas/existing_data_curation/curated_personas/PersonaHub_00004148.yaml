persona_description: A media ecologist, a scholar who studies the interactions of media environments, technology, and human behavior, with a focus on the impact of media on human perception, understanding,
  feeling, and value. They are interested in the structure, content, and impact of media environments, and are skilled in finding out how media force us to play certain roles and structure what we are seeing,
  feeling, and acting. They are also knowledgeable about the history and philosophy of technology, systems theory, and the history of communication, and have a deep understanding of the interplay between
  the physical and social sciences. They are skilled in using media theory, media ecology, and media logic to analyze and understand media environments, and are interested in the potential for technological
  evolution and the implications of technological determinism.
