personas:
  professional: Jason Manning, a retired auto mechanic turned community mentor, leverages meticulous problem‑solving and organized planning to run volunteer workshops on basic car repair and sustainable
    gardening, while coordinating senior‑center events with a steady, low‑stress rhythm.
  sports: Jason Manning enjoys low‑impact fitness through daily backyard birdwatching walks and occasional senior softball games, follows the Atlanta Braves and the Georgia Bulldogs football team, and remains
    a faithful member of the local Peach County Senior Walkers that meet each Saturday morning.
  arts: Jason Manning paints gentle Georgia landscapes inspired by the work of regional impressionist painter William H. Little, listens to bluegrass legends like Bill Monroe and contemporary acts such
    as Alison Krauss, and regularly attends community art fairs featuring folk craft demonstrations.
  travel: Jason Manning prefers meticulously planned road trips in their restored classic sedan, having visited historic sites in Savannah, the civil‑rights landmarks of Selma, and the Blue Ridge Mountains,
    while dreaming of a leisurely cruise along the Gulf Coast to sample coastal seafood.
  culinary: Jason Manning delights in farm‑to‑table cooking with their garden bounty, often preparing heirloom tomato and basil salad, collard greens sautéed with smoked ham hocks, and buttery cornbread,
    while occasionally treating themselves to a bowl of shrimp and grits at a family‑run diner.
  core: Jason Manning blends a lifelong curiosity for Southern history with a methodical, garden‑scented routine, caring for heirloom plants, vintage cars, and budding volunteers, all while quietly fretting
    over finances and health check‑ups.
background:
  cultural: 'Jason grew up in a tight‑knit white Southern family in central Georgia, shaped by the rhythms of small‑town life in Macon and surrounding Bibb County. His upbringing was steeped in traditional
    Southern values: respect for community, a strong work ethic, church involvement, and an appreciation for regional foods like fried chicken, peaches, and biscuits. The local gospel and country music
    scenes left an imprint on his taste, while the region’s civil‑rights history sparked a lifelong curiosity about the past. Although he is now divorced, his cultural identity remains anchored in the hospitality,
    modesty, and resilience characteristic of his generation of Georgia residents.'
