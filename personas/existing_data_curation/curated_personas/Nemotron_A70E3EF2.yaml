  career_goals: Georgina aims to pursue a career that blends her love for art with cultural stewardship. She envisions studying Fine Arts or Art History in college, with the ultimate goal of becoming a
    museum curator or art educator who designs engaging, community‑focused exhibitions. She is also interested in digital media design, hoping to create interactive installations that encourage contemplation
    and dialogue. Over the next few years, she plans to develop a robust online portfolio, participate in local art workshops, and seek mentorship from professionals in the Bradenton arts scene to refine
    her curatorial and design skills.
