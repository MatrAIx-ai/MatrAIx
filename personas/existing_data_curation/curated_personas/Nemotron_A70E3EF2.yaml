personas:
  professional: Georgina Macleod is a budding visual artist who blends watercolor techniques with digital illustration, leveraging their meticulous planning and calm focus to produce intricate storyboards
    that often explore unconventional narratives.
  sports: Georgina Macleod enjoys low‑key fitness like weekend bike rides along the Manatee River and follows the Tampa Bay Rays and Orlando Magic, occasionally joining a local youth swimming club to keep
    active without the pressure of team sports, and they relish the quiet rhythm of solitary exercise.
  arts: Georgina Macleod draws inspiration from watercolor master John Singer Sargent, digital illustrator Loish, indie folk musicians Sufjan Stevens and Bon Iver, and classical composer Ludovico Einaudi,
    channeling these influences into sketchbooks and community art projects, and they often experiment with blending traditional and digital media to express their inner narratives.
  travel: Georgina Macleod prefers well‑planned, low‑key travel, often exploring nearby nature spots like Cedar Key or taking family trips to Disney World, while dreaming of a solo art pilgrimage to Florence,
    Italy, to study Renaissance frescoes, and they meticulously map out itineraries using sketchbooks and journals.
  culinary: Georgina Macleod enjoys experimenting in the kitchen, skillfully preparing avocado toast topped with chili flakes, simple sushi rolls with cucumber and crab, and occasional lemon‑garlic grilled
    salmon with mango salsa, favoring fresh ingredients like avocado, citrus, and miso for flavor, and they love pairing these components to create balanced meals.
  core: Georgina Macleod blends quiet curiosity with disciplined artistry, balancing a love for solitary sketching with occasional spontaneous splurges on boutique art supplies, all while they maintain
    a calm, methodical outlook on life.
background:
  cultural: Georgina is an American of white Scottish‑Irish heritage living in Bradenton, Florida. Her family values education and community involvement, fostering a blend of Southern hospitality and respect
    for her ancestral traditions, such as celebrating St. Andrew's Day. Growing up in Manatee County, she has been exposed to a vibrant local arts scene, coastal outdoor culture, and a diverse population
    that includes Hispanic influences, reflected in her school’s Spanish curriculum. These experiences shape her appreciation for both classic and contemporary art, as well as her curiosity about different
    cultural narratives.
