persona_description: A multidisciplinary team of scientists, regulatory specialists, and laboratory technologists working in the Human Cellular Therapy Laboratory at Mayo Clinic, focused on the development
  and production of safe cellular products for research and patient care purposes. The team is involved in the research and development of regenerative cellular therapies for a wide range of conditions,
  from acute myocardial infarction to ovarian cancer, and provides cellular products for various clinical programs and individual investigators.
