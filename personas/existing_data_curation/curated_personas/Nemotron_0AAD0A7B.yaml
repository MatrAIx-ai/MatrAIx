  hobbies: '[''Abstract painting'', ''Poetry writing'', ''Collecting and listening to vintage jazz/blues records'', ''Reading literature (classic and African diaspora)'', ''Herb gardening'', ''Nature walks'',
    ''Participating in local storytelling circles'', ''Cooking Southern cuisine'', ''Digitizing family photographs'', ''Cultural research'']'
  career_goals: In retirement, Rajah aims to channel his intellectual curiosity into a lasting creative legacy. He plans to complete a manuscript that blends memoir, poetry, and reflective essays on Black
    cultural identity in the American South, with the goal of self‑publishing and submitting to regional presses. He also aspires to curate a traveling mini‑exhibition of works by local Black senior artists,
    partnering with the Harker Heights public library to host workshops that introduce participants to abstract painting techniques. Additionally, Rajah seeks to volunteer as a historical consultant for
    the Bell County Historical Society, helping preserve oral histories of the Black community. To manage his own creative anxiety, he hopes to secure a regular speaking slot at the community center where
    he can mentor emerging writers and share strategies for balancing imagination with emotional well‑being.
