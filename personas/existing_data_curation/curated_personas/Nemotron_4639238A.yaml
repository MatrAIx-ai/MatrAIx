  hobbies: '[''Woodworking'', ''Classic Car Restoration'', ''Fishing'', ''Hiking'', ''Reading Historical Non‑Fiction'', ''Chess'', ''Volunteer Fire Department Activities'']'
  career_goals: Allan aims to secure a stable, full‑time role where his organizational strengths can drive tangible results, such as a project manager position in a construction or facilities management
    firm. He is pursuing a Project Management Professional (PMP) certification and plans to obtain a Texas contractor’s license to eventually launch his own home‑renovation business. Long‑term, he wants
    to achieve financial independence, build a modest retirement fund, and become a mentor for younger tradespeople in his community.
