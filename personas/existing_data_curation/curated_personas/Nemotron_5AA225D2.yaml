  career_goals: Christa aims to move from first‑line supervisor to store manager within the next two years, eventually progressing to district manager or regional operations leader. She plans to earn a
    bachelor's degree in business administration and obtain the Certified Retail Management Professional (CRMP) credential. Long‑term, she envisions opening a small boutique that emphasizes curated, locally
    sourced products, while also developing a mentorship program to reduce turnover and improve staff engagement. She seeks to implement data‑driven efficiency initiatives that streamline scheduling and
    inventory, helping to lower stress for herself and her team.
