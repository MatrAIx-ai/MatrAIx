  hobbies: '[''Abstract painting'', ''Quilting'', ''Handmade jewelry'', ''Hip‑hop dance'', ''African dance'', ''Soul food cooking'', ''Community gardening'', ''Reading about art and social justice'', ''Volunteering
    at youth art programs'', ''Church choir singing'']'
  career_goals: Angela aims to formalize her passion for service by earning a GED and completing a Community Health Worker certification, with the long‑term goal of becoming a volunteer coordinator at a
    Bronx‑based nonprofit serving families. She also dreams of opening a modest community art studio where residents can collaborate on murals, crafts, and workshops, providing a safe creative outlet for
    children and adults alike. In parallel, she hopes to launch a small social enterprise selling her hand‑crafted jewelry and quilts, using the proceeds to fund after‑school art programs and neighborhood
    garden enhancements.
