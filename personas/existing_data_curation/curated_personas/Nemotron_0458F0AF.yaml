personas:
  professional: Angela Odums, a community outreach coordinator and muralist, leverages their imaginative curiosity, organizational balance, and deep compassion to connect Bronx neighbors with resources,
    orchestrate vibrant block parties, and mentor youth through storytelling and peer counseling.
  sports: Angela Odums follows the New York Yankees and the Bronx Broncos community basketball team, participates in the Bronx Lions Saturday pickup league, and treats hip‑hop dance at the local community
    center as their primary fitness routine, blending seasonal street basketball in summer with indoor dance classes in winter.
  arts: Angela Odums channels the abstract energy of artists like Jean‑Michel Basquiat and the storytelling vibrancy of Faith Ringgold into large‑scale murals, while their quilting and jewelry work echo
    the melodic influence of Kendrick Lamar and the theatrical flair of Viola Davis, making community art workshops a celebration of interdisciplinary creativity.
  travel: Angela Odums prefers purposeful travel that blends cultural immersion with community service, having explored New Orleans for its jazz and soul‑food scene, visited the Caribbean island of Puerto Rico
    to study local crafts, and dreaming of a sustainable retreat in Sedona, Arizona, all while balancing a modest travel budget and family commitments.
  culinary: Angela Odums delights in cooking soul‑food feasts like smoked turkey, collard greens sautéed with smoked turkey neck, sweet potato pie, and cornbread, often seasoning dishes with fresh rosemary,
    garlic, and cayenne from their community garden, and they skillfully scale recipes for large neighborhood gatherings.
  core: Angela Odums blends vibrant abstract art, community activism, and soulful cooking into a life driven by curiosity, compassion, and the steady rhythm of Bronx street culture, even if they sometimes
    overcommit to volunteer projects at the expense of personal downtime.
background:
  cultural: Angela identifies as a Black American who grew up in the vibrant, multicultural tapestry of the Bronx. Her upbringing was shaped by the neighborhood’s rich traditions of hip‑hop, street art,
    and soul food, as well as the strong communal bonds fostered by her local church and extended family. She carries forward oral storytelling traditions passed down from her grandparents, honoring the
    resilience and solidarity of the Black community in New York City. While she navigates the challenges of systemic inequities, Angela’s cultural pride fuels her creative expression and deep commitment
    to uplifting those around her.
