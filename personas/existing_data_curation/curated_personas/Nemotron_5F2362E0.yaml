personas:
  professional: Craig Dean, a 31‑year‑old full‑stack web developer, leverages their mastery of React, Vue, Node.js, and AWS to deliver secure, high‑performance web solutions while pragmatically balancing
    innovative exploration with rigorous accessibility standards, and they assert leadership in cross‑functional teams with a collaborative yet decisive style.
  sports: Craig Dean stays fit by kayaking on Casco Bay, hiking the coastal trails of Acadia, and joining the local Maine Paddle Club, while they also cheer on the Boston Red Sox, New England Patriots,
    and follow the Portland Sea Dogs during the baseball season.
  arts: Craig Dean immerses in indie video games like 'Hades' and 'Celeste', devours science‑fiction novels by authors such as Neal Stephenson, and captures New England's shifting seasons through photography,
    while they also appreciate the folk sounds of Sufjan Stevens and the atmospheric scores of composer Hans Zimmer.
  travel: Craig Dean favors low‑key, nature‑focused travel, having trekked Acadia National Park, road‑tripped along the Pacific Coast Highway, and dreamed of Iceland’s volcanic landscapes, all while planning
    trips on a modest budget that balances work commitments and their need for solitary reflection.
  culinary: Craig Dean delights in classic Maine seafood, often cooking lobster rolls and clam chowder at home using fresh local lobsters and wild blueberries, while their coffee habit leans toward dark
    roast pour‑overs and they occasionally indulge in a craft beer from a Portland brewery.
  core: Craig Dean blends a restless appetite for cutting‑edge code with solitary hikes and meticulous budgeting, yet their intense anxiety fuels late‑night debugging marathons and a habit of over‑caffeinating
    before board‑game nights.
background:
  cultural: Craig grew up in a middle‑class family in coastal Maine, shaped by the region’s blend of self‑reliance, community solidarity, and reverence for nature. His cultural roots trace back to English
    and Irish ancestry, reflected in an appreciation for straightforward communication, modesty, and a strong work ethic. The New England ethos of pragmatism and respect for tradition aligns with his practical
    side, while the area's progressive leanings and vibrant local arts scene nurture his curiosity and openness to new ideas. He values local customs such as summer lobster festivals, seasonal outdoor recreation,
    and the collaborative spirit of small‑town gatherings.
