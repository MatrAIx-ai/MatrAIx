  career_goals: Craig aims to transition into a senior engineering role where he can lead cross‑functional teams, architect scalable web platforms, and advocate for inclusive, accessible design. Over the
    next five years, he plans to earn an AWS Solutions Architect certification, mentor junior developers, and contribute to open‑source projects that improve web accessibility. He also envisions launching
    a boutique consultancy that helps Maine small businesses digitize their services, balancing his professional growth with a stable work‑life rhythm that supports his mental‑health needs.
