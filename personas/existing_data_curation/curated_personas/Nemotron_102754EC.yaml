personas:
  professional: Vicente Canas, a veteran construction foreman in Great Falls, blends sixty‑years of framing, concrete pouring and precision carpentry with a competitive problem‑solving mindset, using bilingual
    fluency to mentor apprentices while insisting on ironclad safety protocols, and they consistently strive to out‑perform every project deadline.
  sports: Vicente Canas spends his summers angling on the Missouri River and hiking the Rocky Mountain trails with the local Rocky Mountain Hiking Society, plays on the Great Falls Senior Softball League,
    and avidly follows the Denver Broncos, Colorado Rockies and the Montana Grizzlies, and they balance low‑impact cardio with occasional strength workouts at the community center.
  arts: Vicente Canas channels his love for color and tradition into watercolor paintings of Montana valleys infused with the bold motifs of Frida Kahlo and Diego Rivera, frequents the Great Falls Art Gallery,
    studies techniques in workshops, and they fill his workshop with the ranchera sounds of Vicente Fernández and the folk melodies of John Denver, while keeping a modest collection of Mexican folk pottery
    on his mantle.
  travel: Vicente Canas plans his trips with meticulous road‑map precision, favoring solo camping adventures in Yellowstone and Glacier National Parks, nostalgic pilgrimages to his birthplace’s festival
    town of Oaxaca, and occasional weekend getaways to nearby Santa Fe for its art fairs, and they balance their limited budget with a deep desire to reconnect with the landscapes that inspire their art.
  culinary: Vicente Canas excels at cooking traditional dishes such as pozole, chiles en nogada, and grilled trout seasoned with dried chilies and cilantro, using fresh corn masa and tomatillos from the
    local farmers market, and they occasionally add a pinch too much salt, revealing a lingering competitive streak even in the kitchen.
  core: Vicente Canas is a tenacious 71‑year‑old carpenter‑artist who bridges two worlds with watercolor brushstrokes and bilingual mentorship, yet they still forget their antihypertensive pills and can’t
    resist sneaking an extra glass of coffee before sunrise.
background:
  cultural: Vicente was born in Jalisco, Mexico, where he learned carpentry from his father and grew up surrounded by vibrant festivals, music, and family traditions. He migrated to the United States in
    his early twenties, eventually settling in Great Falls, Montana, drawn by the steady demand for construction work and the open outdoors. Throughout his life he has maintained his Mexican heritage—speaking
    Spanish at home, celebrating Día de los Muertos, Mexican Independence Day, and preparing traditional dishes—while also embracing the frontier spirit of Montana. His Catholic upbringing informs his sense
    of community, and his bicultural identity enriches his interactions, allowing him to bridge Mexican and American cultures in both his personal life and his work.
