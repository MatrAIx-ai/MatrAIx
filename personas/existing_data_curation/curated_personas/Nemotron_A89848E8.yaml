personas:
  professional: Kenton Calton, a 22‑year‑old service technician pursuing an associate degree in automotive technology, leverages precise OBD‑II diagnostics and hybrid‑system expertise to blend curiosity
    for emerging powertrains with proven repair methods, and they organize workflow with disciplined flexibility that makes them a reliable mentor for junior technicians.
  sports: Kenton Calton, a 22‑year‑old gearhead, dominates quick pick‑up basketball games at the local YMCA while rooting for the Atlanta Hawks, and they spend relaxed weekends fishing the Chattahoochee
    River during the spring bass season, balancing cardio bursts with tranquil angling.
  arts: Kenton Calton, a 22‑year‑old car restorer, fuels garage sessions with classic R&B from Marvin Gaye, Southern blues by B.B. King, and OutKast’s hip‑hop, and they unwind by leafing through Hot Rod
    and Car and Driver magazines for both technical inspiration and a dash of visual culture.
  travel: Kenton Calton, a 22‑year‑old motor enthusiast, prefers solo road trips that combine scenic drives along the Blue Ridge Parkway with pit stops at Detroit’s Henry Ford Museum and Nashville’s honky‑tonk
    venues, planning carefully to keep costs low while gathering ideas for their future eco‑friendly garage.
  culinary: Kenton Calton, a 22‑year‑old automotive hobbyist, enjoys cooking Southern comfort dishes like smoked brisket, blackened catfish, and shrimp‑and‑grits on a charcoal grill, often experimenting
    with bourbon‑infused barbecue sauces while they usually grab a quick burger after long evenings in the garage.
  core: Kenton Calton, a 22‑year‑old automotive aficionado, balances quiet curiosity with bursts of high‑octane enthusiasm, often losing sleep over performance parts, neglecting regular doctor visits, and
    secretly hoarding vintage car manuals like treasure.
background:
  cultural: Kenton grew up in a close‑knit African‑American community in Franklin, Georgia, where family and church have been central pillars of his upbringing. The values of hard work, perseverance, and
    mutual support were reinforced by his parents, who both emphasized the dignity of skilled trades. He cherishes Southern culinary traditions, especially barbecuing with his family on weekends, and he
    often participates in community events like church picnics and local car shows that celebrate both cultural heritage and mechanical craftsmanship. Kenton’s cultural identity informs his respectful communication
    style, collaborative attitude at work, and his pride in contributing to the local economy as a skilled technician.
attributes:
  skills: '["Automotive diagnostics (OBD‑II)", "Engine repair and rebuild", "Electrical system troubleshooting", "Hybrid/electric vehicle maintenance", "Preventive maintenance scheduling", "Customer service
    communication", "Shop safety compliance", "Parts inventory management", "Technical documentation", "Tool and equipment calibration"]'
  hobbies: '["Classic car restoration", "Racing simulation video games", "Pick‑up basketball", "Fishing", "Listening to R&B and hip‑hop music", "Reading automotive magazines and forums"]'
  career_goals: Kenton aims to become an ASE Master Technician within the next two years by completing the remaining certifications and gaining deeper experience with hybrid and electric powertrains. He
    aspires to take on a supervisory role in his current shop, mentoring newer technicians while fostering a culture of continuous learning. Long‑term, he dreams of opening his own garage in rural Georgia
    that specializes in eco‑friendly vehicle repairs and classic car restorations, combining his technical expertise with entrepreneurial ambition.
