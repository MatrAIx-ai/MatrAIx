  career_goals: Diana aspires to turn her spontaneous creativity into a career that offers artistic freedom while making a positive impact on her community. She envisions herself as a freelance illustrator
    or graphic novelist, crafting visual stories that explore unconventional ideas and social themes. She is also intrigued by the prospect of becoming a community arts facilitator, designing public art
    installations that encourage people to engage with nature and each other. In the long term, she hopes to combine her love for storytelling and empathy by studying art therapy or visual communication,
    allowing her to help others manage stress through creative expression. Flexibility, ongoing learning, and the ability to balance personal reflection with collaborative projects are key components of
    her professional ambition.
