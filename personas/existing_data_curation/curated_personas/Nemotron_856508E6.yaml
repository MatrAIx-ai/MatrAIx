personas:
  professional: Diana Barrett, an aspiring teen illustrator, blends watercolors and digital drawing to create dreamy mangrove sketches while they navigate spontaneous school art projects, letting their
    curiosity and aversion to rigid deadlines fuel a fluid, experimental workflow.
  sports: Diana Barrett, who cycles along the Anna Maria Island bike trail and plays casual beach volleyball with the local Sand & Sun club, follows the Tampa Bay Buccaneers and the Orlando Magic, and they
    join the school’s spring track team to sprint in the 800‑meter run when the weather permits.
  arts: Diana Barrett, a member of the school art club, draws inspiration from graphic novel series like 'Saga', the anime aesthetics of Hayao Miyazaki, and the indie sounds of Tame Impala and Phoebe Bridgers,
    while they collect vintage postcards featuring coastal scenes and craft resin jewelry that mirrors the colors of sunset skies.
  travel: Diana Barrett, who spends weekends exploring the mangrove tunnels of Manatee River and the Everglades, dreams of backpacking through Kyoto’s cherry‑blossom season and they have a wish list that
    includes the coral reefs of Belize and a road trip to New York City’s Museum of Modern Art.
  culinary: Diana Barrett, an enthusiastic beginner in the kitchen, loves whipping up mango‑lime smoothies, experimenting with sautéed shrimp and garlic butter on fresh seafood pasta, and they occasionally
    attempt blueberry lavender cupcakes despite a tendency to over‑mix the batter.
  core: Diana Barrett channels boundless curiosity into vibrant art, impulsively buys supplies, worries about school stress, and they find calm sketching coastal sunrise scenes while battling occasional
    forgetfulness.
background:
  cultural: Diana was born and raised in Palmetto, a small suburban community in Manatee County, Florida. Her family’s heritage blends Irish and Italian roots, which adds a mix of cultural traditions that
    celebrate holidays such as Thanksgiving, Christmas, St. Patrick’s Day, and Italian feast days. Growing up along the Gulf Coast, she has been shaped by a laid‑back Southern lifestyle and a strong connection
    to the natural environment, especially the beaches, mangroves, and marine life that define the region. The community’s emphasis on outdoor activities, local festivals like the Manatee County Fair, and
    a modest yet supportive arts scene—including nearby museums and community art classes—have fostered her appreciation for creative expression. Though she lives in a largely white, middle‑class environment,
    her school’s diverse student body has exposed her to a variety of cultural perspectives, encouraging the open‑minded curiosity that characterizes her personality.
