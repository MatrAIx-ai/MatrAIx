  career_goals: Leonardo’s long‑term ambition is to turn his love of art, culture, and community into a career that uplifts Native American voices. He hopes to attend a high‑school program that offers advanced
    visual‑arts and indigenous‑studies courses, then pursue a college degree in visual arts or museum studies with a focus on indigenous heritage. He envisions working as a cultural curator or multimedia
    educator for a tribal museum or the Oklahoma History Center, creating exhibits, digital archives, and interactive programs that teach younger generations about their heritage. Additionally, he dreams
    of developing video‑game narratives or graphic‑novel series that weave traditional stories with modern storytelling techniques, and he plans to become an advocate for youth empowerment through art workshops
    and community outreach.
