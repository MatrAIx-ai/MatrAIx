personas:
  professional: Leonardo Lalman is a budding student artist and performer whose daily sketching, comic storytelling, and improv theatre showcase a curious mind that balances meticulous organization with
    spontaneous creativity, drawing energy from peers as they collaborate on projects.
  sports: Leonardo Lalman fuels their energetic sociability by playing pickup basketball after school at the local park, rooting for the Oklahoma City Thunder, and occasionally joining the junior division
    of the Oklahoma City Storm league, while they balance schoolwork with weekend runs through nearby state park trails.
  arts: Leonardo Lalman immerses themselves in visual and performing arts, drawing daily inspiration from comic legend Jeff Smith, listening to The Beatles and tribal drumming group A Tribe Called Red while
    learning guitar chords, and honing improv skills in the school theatre club modeled after The Second City’s techniques.
  travel: Leonardo Lalman prefers spontaneous weekend road trips to nearby Oklahoma gems like Beavers Bend State Park and Robbers Cave, where they photograph sunrise over Lake Texoma, while daydreaming
    about a future backpacking trek through the Grand Canyon and cultural festivals in Santa Fe.
  culinary: Leonardo Lalman enjoys classic teen comforts such as pepperoni pizza and chicken nuggets, yet also experiments in the kitchen with homemade chili topped with fresh jalapeños and chocolate chip
    pancakes drizzled with maple syrup, often sketching each dish before cooking as a playful blend of art and flavor that they share with friends.
  core: Leonardo Lalman is a curiosity‑driven teen who channels boundless energy into art, music, sport, and community, balancing disciplined creation with spontaneous fun, yet sometimes they forget to
    finish homework or skip flossing.
background:
  cultural: Leonardo belongs to the Cherokee Nation, with family ties that stretch back several generations within Oklahoma. Growing up in Edmond, he was raised with a blend of contemporary American life
    and deep tribal traditions. His grandparents taught him basic Cherokee language, traditional stories, and the significance of symbols used in beadwork and weaving. He regularly attends the annual Cherokee
    Powwow in nearby Tulsa and participates in the intertribal youth council, where he helps organize cultural workshops for peers. Leonardo’s household celebrates tribal holidays, such as the Cherokee
    New Year, and he assists in preparing traditional foods like frybread and wild rice. This upbringing instills in him a strong sense of cultural pride, respect for elders, and a desire to share his heritage
    through art and community initiatives.
