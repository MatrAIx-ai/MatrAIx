  career_goals: He aims to advance from a frontline representative to a team lead or customer experience manager within the next three to five years. He wants to lead a small, high‑performing team where
    he can implement data‑driven improvements to support processes. Long‑term, he hopes to design and oversee a customer experience strategy that aligns with business goals, possibly moving into a consultancy
    role that allows him to work independently and leverage his analytical strengths. He also considers pursuing a certification in user experience (UX) or a master’s in communication to broaden his expertise.
