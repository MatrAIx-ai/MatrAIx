  career_goals: Matthew aspires to open a flexible, community‑focused studio in Irvine that offers personalized portrait sessions and workshops for aspiring photographers. He aims to develop a unique workflow
    that integrates AI‑driven image analysis with his artistic editing style, positioning himself at the intersection of technology and art. A core ambition is to produce a photo series that raises awareness
    about mental health, leveraging his compassionate nature and personal experience with anxiety. Over the next five years, he hopes to publish a coffee‑table book of his work, establish a mentorship program
    for under‑represented youth, and collaborate with local nonprofits on visual storytelling projects that foster social harmony.
