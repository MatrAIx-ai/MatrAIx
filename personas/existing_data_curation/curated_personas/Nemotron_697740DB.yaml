  career_goals: He aims to transition from a supervisory role to an operations manager position within the next five years, overseeing multiple service teams and driving strategic initiatives for his employer.
    Concurrently, David is exploring the possibility of launching his own boutique mechanical service firm that specializes in custom, eco-friendly installations for residential clients in Grapevine and
    the broader Dallas-Fort Worth area. He hopes to integrate artistic design elements into functional mechanical solutions, a niche inspired by his love of art and creativity. Professional development
    plans include earning a certification in Lean Six Sigma, attending industry expos focused on green technologies, and building a network of local artisans and designers for collaborative projects.
