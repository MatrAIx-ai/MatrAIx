    Nonfiction Reading'']'
  career_goals: Connie aims to advance to a senior technical writer role within the next three years, taking on larger, cross‑industry projects that require strict regulatory compliance (e.g., medical devices,
    aerospace). She plans to earn a master's degree in Technical Communication to deepen her expertise in structured authoring and accessibility standards. Long‑term, she envisions leading a documentation
    team as a Documentation Manager, establishing company‑wide style guides, mentorship programs, and knowledge‑sharing initiatives. Additionally, Connie is interested in expanding into UX writing and product
    management, leveraging her user‑focused storytelling to influence product design decisions and improve overall user experience.
