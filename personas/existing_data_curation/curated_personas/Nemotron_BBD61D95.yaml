  hobbies: '[''Gardening'', ''Knitting'', ''Genealogy research'', ''Historical non‑fiction reading'', ''Bridge (card game)'', ''Volunteer at senior center'', ''Cooking traditional dishes'', ''Walking along
    Erie Canal'']'
  career_goals: Courtney aims to transition into a supervisory and mentorship role over the next few years, leveraging her extensive experience to train apprentices and improve safety practices on Buffalo
    municipal projects. She plans to obtain a journeyman certification and become a foreman, overseeing small crews on predictable schedules. Parallel to this, she envisions launching a modest side business
    focused on residential concrete repair, allowing her to work independently while retaining a routine work pattern. Her long‑term ambition is to retire with a sense of legacy, having documented best
    practices for future cement masons and ensured a stable income through her part‑time venture.
