  career_goals: Even at a young age, Matthew likes to imagine future jobs that are practical and help others. He often says he wants to be a firefighter because he admires the bravery and uniforms, and
    he also dreams of becoming a builder or construction worker who uses tools to create things. His ambitions are guided by his preference for tangible, real‑world activities and his desire to contribute
    to his community.
