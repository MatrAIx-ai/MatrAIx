personas:
  professional: Matthew Collins, an imaginative builder in the making who loves sorting crayons by color and constructing towers from wooden blocks, demonstrates an early knack for systematic problem‑solving
    while they prefer familiar routines over spontaneous chaos.
  sports: Matthew Collins, an enthusiastic participant in the Tiny Tots Soccer Club and a budding swimmer at the Little Waves Aquatic Center, loves cheering for the local Major League baseball team, the
    Harbor Hawks, and they relish the predictable practice schedule that fits their love of routine.
  arts: Matthew Collins, an avid fan of the whimsical tunes of Raffi and the colorful world of Sesame Street, spends afternoons drawing dinosaurs with crayons, finding comfort in the familiar melodies that
    reinforce their cooperative nature, and they often share their art with friends during playdates.
  travel: Matthew Collins, a curious explorer who has delighted in weekend trips to the nearby city zoo and the family‑friendly splash park at Sunshine Resort, now dreams of a grand adventure to Disneyland
    and a sunny beach vacation in the Caribbean, yet they prefer the comforting predictability of short car rides over long flights.
  culinary: Matthew Collins, a picky yet adventurous eater who adores creamy macaroni‑and‑cheese, chicken nuggets seasoned with a dash of paprika, and snack‑time apple slices with a drizzle of honey, proudly
    helps stir the pot but occasionally insists on having the same familiar breakfast cereal every morning, and they often negotiate extra peas when a vegetable appears on the plate.
  core: Matthew Collins, a routine‑loving four‑year‑old who balances gentle kindness with a joyful mess of crayons, piggy‑bank treasures, and bedtime story rituals, navigates the world with a practical
    curiosity and occasional bursts of indecisiveness, and they often surprise adults with their unexpected bursts of energy.
background:
  cultural: Matthew is a white American child raised in Boise, Idaho, within a middle‑class family that values community and the outdoors. His upbringing includes typical American cultural practices such
    as celebrating Thanksgiving, Christmas, and Fourth of July, and attending a local preschool that emphasizes play‑based learning. The family often participates in community events, weekend trips to nearby
    nature areas, and may attend a local church or Sunday school, providing a blend of cultural traditions, family routines, and an appreciation for Idaho's natural landscapes.
