  hobbies: '[''Sketching'', ''Digital Art'', ''Speculative Fiction Writing'', ''Playing Guitar'', ''Urban Photography'', ''Video Gaming'', ''Mindfulness Meditation'', ''Street Art Exploration'', ''Hip Hop
    Listening'', ''Skateboarding'']'
  career_goals: Alton aims to secure a full‑time CDL position with a forward‑thinking logistics firm, then earn enough experience to launch his own boutique freight‑and‑creative service that turns his truck
    into a mobile art gallery. He plans to complete an associate degree in logistics or business, develop stronger organizational habits, and eventually become a regional operations manager while maintaining
    a side hustle as a freelance illustrator.
