personas:
  professional: Alton Leath, a 22‑year‑old commercial driver with a flair for illustration, blends precise route planning and on‑the‑fly vehicle troubleshooting with spontaneous creative problem‑solving,
    using their digital sketchbook to brainstorm efficiency hacks while navigating tight delivery windows, but often battles procrastination when deadlines loom.
  sports: Alton Leath, an avid skateboarder at Tinley Park’s skate plazas and a loyal supporter of the Chicago Bears, Chicago Bulls, and Chicago Fire, stitches together short park sessions between deliveries
    while keeping a simple home‑gym routine of body‑weight exercises to stay limber.
  arts: Alton Leath, who spends evenings sketching comic‑style heroes, crafting lo‑fi beats on a keyboard, and curating an Instagram feed of Tinley Park’s murals alongside inspirations from graphic‑novel
    legends like Jim Lee and musicians like J Dilla, channels high‑energy imagination into both digital paintings and on‑the‑road visual storytelling.
  travel: Alton Leath, a road‑trip enthusiast who leverages truck‑stop layovers to capture murals, dreams of cruising the Pacific Coast Highway, exploring Portland’s skate culture, and attending Japan’s
    Kyoto International Manga Museum, yet must juggle a tight budget and a looming logistics apprenticeship.
  culinary: Alton Leath, whose food radar favors street‑taco stands, midnight pepperoni pizza slices, and a well‑seasoned ramen bowl seasoned with soy sauce, ginger, and cilantro, can whip up a quick stir‑fry
    on a portable burner but often relies on fast‑food grabs after long routes.
  core: Alton Leath—an imaginative 22‑year‑old truck driver‑artist who navigates deadlines, anxiety, and impulse‑buy cravings by sketching lo‑fi soundtracks into the open road.
background:
  cultural: Alton grew up in Tinley Park, a Chicago suburb with a vibrant African‑American community. His family gatherings feature gospel music, soul food, and storytelling traditions that trace back to
    the Great Migration. He attended a public high school where he participated in a mixed‑media art club and local church youth programs, absorbing Chicago’s rich blues, jazz, and hip‑hop legacy. He celebrates
    Juneteenth, attends the Chicago African Festival, and values the strong sense of neighborhood solidarity that shapes his worldview.
