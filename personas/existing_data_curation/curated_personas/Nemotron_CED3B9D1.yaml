  career_goals: Tammy aims to reenter the workforce in a capacity that aligns with her compassionate nature while preserving the flexibility she values. She is planning to complete her associate’s degree
    in social work so she can qualify as a peer‑support specialist or a part‑time case manager at a local nonprofit serving seniors and families in Bergen County. In the short term, she hopes to formalize
    her volunteer coordination experience by obtaining a certification in community outreach, and she envisions launching a small home‑based care service that offers companionship and light‑household assistance
    to isolated neighbors. Long‑term, Tammy would like to become a trusted resource in her community, helping others navigate social services, while maintaining a balanced schedule that leaves room for
    self‑care.
