persona_description: A person who is knowledgeable and experienced in the Army's Defense Environmental Restoration Program (DERP) and its implementation, particularly in the areas of environmental restoration
  at active/operating Army installations and non-operational range lands. This person is likely to have a deep understanding of the Comprehensive Environmental Response, Compensation, and Liability Act
  (CERCLA) and Superfund Amendments and Reauthorization Act (SARA), as well as the Resource Conservation Recovery Act (RCRA), and the Army's MMRP at closed ranges. This person is likely to have hands-on
  experience with the IRP and MMRP programs, and is familiar with the roles and responsibilities of the US Army Environmental Center (AEC) and Corps of Engineers Districts in supporting these programs.
