personas:
  professional: Arif Skaria, a senior sales associate with fifteen years of retail experience, combines bilingual fluency in English and Gujarati, meticulous inventory tracking, and data‑driven visual merchandising
    to drive sales, while their disciplined, organized nature and assertive leadership style position them to transition into store manager within two years.
  sports: Arif Skaria, a dedicated early‑morning runner along Lady Bird Lake, participates in the Austin Runners club’s weekend long‑distance group runs, follows Austin FC in MLS and the Dallas Mavericks
    in the NBA, and they enjoy seasonal touch‑football pick‑up games at local parks during the summer.
  arts: Arif Skaria, an avid attendee of the Austin City Limits Music Festival, finds solace in listening to classical sitar virtuoso Ravi Shankar alongside indie rock band St. Vincent, and they routinely
    explore poetry by Umashankar Joshi during quiet evenings, which fuels their creative mindset.
  travel: Arif Skaria, who prefers meticulously planned itineraries, enjoys weekend getaways to Hill Country vineyards, has trekked the hiking trails of Yosemite, dreams of visiting the historic palaces
    of Rajasthan, and they balance travel costs with a modest savings plan to ensure family obligations remain met.
  culinary: Arif Skaria, a confident home chef, often prepares hand‑made dhokla, khandvi, and spiced lentil dal using cumin, mustard seeds, and fresh cilantro, while they appreciate the occasional Tex‑Mex
    brisket taco and seek out farm‑to‑table markets for heirloom tomatoes and local honey.
  core: Arif Skaria is a methodical, bilingual retail strategist who blends disciplined data‑driven work habits with a love for chess, garden routines, and meticulously organized life, even if they sometimes
    obsess over perfecting grocery aisles.
background:
  cultural: Arif is a first-generation American of Gujarati descent. His family emigrated from India in the early 1990s, bringing with them the language, customs, and cuisine of their home region. Growing
    up in Austin, he was exposed to a blend of South Asian traditions—celebrating Diwali and Navratri, speaking Gujarati at home, and participating in community gatherings at the local Hindu temple—while
    also integrating into the broader Texan culture. His heritage informs his culinary interests, multilingual communication skills, and his involvement in cultural events that connect the South Asian diaspora
    in Central Texas.
attributes:
