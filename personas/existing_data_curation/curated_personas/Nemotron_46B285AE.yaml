  hobbies: '[''Playing chess'', ''Solving Sudoku and crosswords'', ''Morning runs along Lady Bird Lake'', ''Vegetable gardening'', ''Cooking traditional Gujarati dishes'', ''Volunteering at South Asian
    cultural festivals'', ''Puzzles and strategic games'']'
  career_goals: Arif aims to move from senior sales associate to store manager within the next two years, focusing on implementing systematic inventory controls and performance metrics that align with his
    preference for structure. He aspires to mentor younger employees, champion a data-driven sales culture, and eventually oversee multiple locations as a regional manager. In the longer term, he envisions
    opening a boutique retail outlet that blends his organizational expertise with a curated selection of South Asian specialty goods, allowing him to apply his disciplined approach to entrepreneurship.
