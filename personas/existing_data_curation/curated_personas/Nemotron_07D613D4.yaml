personas:
  professional: William Lebeouf is a highly disciplined hairdresser who blends a STEM bachelor's degree with advanced cosmetology, delivering precision cutting, chemically precise color formulation, and
    data‑driven scalp health analyses while they manage a boutique studio with meticulous scheduling, inventory control, and junior‑staff training.
  sports: William Lebeouf enjoys solitary weekend hikes on the Santa Ana Mountains with the Orange County Hiking Society, follows the Los Angeles Lakers and Los Angeles Dodgers loyally, and they practice
    daily yoga and interval walking to maintain flexibility and cardiovascular health, preferring low‑impact routine over team sports.
  arts: William Lebeouf unwinds at the piano, interpreting Debussy’s ‘Clair de Lune’ and Bach’s Inventions, attends occasional gallery openings featuring works by contemporary painter Kehinde Wiley, and
    they draw creative inspiration from the ambient soundscapes of Brian Eno.
  travel: William Lebeouf favors meticulously planned solo trips, having trekked the Sierra Nevada in Yosemite, explored the red rock vistas of Sedona, savored the tea gardens of Kyoto, and they dream of
    a future visit to Paris to study French hair‑care traditions.
  culinary: William Lebeouf enjoys preparing herb‑infused dishes such as rosemary‑roasted chicken, lavender‑scented quinoa salad, and homemade matcha tea, cooking at an intermediate skill level that lets
    them experiment with fresh basil, thyme, and citrus zest while occasionally indulging in a weekend splurge on high‑end sushi for nigiri.
  core: William Lebeouf is a methodical, solitary perfectionist who fuses scientific rigor with artistic flair in hair care, balancing disciplined routines while they nurture a quietly curious mind.
background:
  cultural: William comes from a white, French-Canadian lineage (as reflected in the surname Lebeouf) and was raised in a middle-class suburb of Southern California. His family emphasized practical values,
    self-reliance, and community service, and he attended a local Catholic school where routine and discipline were reinforced. Living in Corona, he has been exposed to the region’s cultural diversity,
    which has broadened his perspective while he remains rooted in a pragmatic, American work ethic.
