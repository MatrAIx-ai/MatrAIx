  hobbies: '["Vegetable gardening","Baking and cooking seasonal recipes","Quilting and knitting","Reading historical fiction","Birdwatching on local nature trails","Genealogy research","Volunteering at
    the senior center","Singing in the church choir","Nature walks and trail exploration"]'
  career_goals: Judy Ann aims to transform her long‑standing volunteer work into a formal leadership role within Albertville’s senior services. She plans to complete a certification in caregiver support
    or community health outreach, enabling her to mentor other volunteers and advocate for senior‑friendly policies at the town level. While she values practical involvement, she also wishes to broaden
    her knowledge by taking courses in social work or public health, ultimately becoming a trusted liaison between local residents and municipal resources.
