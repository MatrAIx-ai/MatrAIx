    Grande"]'
  career_goals: Although retired from formal employment, Pedro is determined to remain active and purposeful. He aims to mentor younger neighbors in practical trades, sharing his carpentry and repair skills
    through informal workshops at the community center. He aspires to preserve his family’s culinary heritage by compiling a handwritten cookbook and teaching cooking classes for grandchildren and local
    youth. Pedro also wishes to contribute his organizational talents by volunteering on the senior advisory board, helping to plan events and improve accessibility at the local senior center. Maintaining
    his health and independence is a personal priority, so he sets goals for regular walking, a balanced diet, and periodic health check‑ups. Ultimately, he hopes to leave a legacy of self‑reliance, cultural
    pride, and community solidarity.
