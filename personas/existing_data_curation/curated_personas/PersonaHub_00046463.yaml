persona_description: A podiatrist who specializes in foot and leg surgery and is a member of the American Academy of Podiatric Medicine. They have completed a minimum of six years of residency in the field
  before becoming a podiatrist. They are experienced in treating disorders of the lower limb, lower back, and foot, and are skilled in performing a variety of procedures, including orthotics, arch supports,
  and surgery to replace a bone spur or deformity of the bone. They are knowledgeable about the causes of foot and leg disorders and have a thorough understanding of the treatment options available.
