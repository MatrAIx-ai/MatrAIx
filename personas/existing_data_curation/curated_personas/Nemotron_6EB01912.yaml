  hobbies: '[''Gardening (citrus, tomatoes, native plants)'', ''Bridge and card games'', ''Senior-center dance classes'', ''Birdwatching'', ''Knitting and crochet'', ''Walking along the waterfront'', ''Historical
    fiction reading and book club'', ''Watercolor painting'']'
  career_goals: At this stage, Dianna aims to continue contributing to her community by mentoring younger volunteers, preserving her family’s culinary heritage through a small cookbook project, and volunteering
    at the local food bank. She hopes to stay physically active through gardening and walking groups, maintain her social connections at the senior center, and possibly share her life stories in a community
    oral‑history archive. Her ambition is to leave a lasting legacy of kindness, practical knowledge, and community spirit for future generations.
