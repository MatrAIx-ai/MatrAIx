    social issues'']'
  career_goals: Gerald aims to earn his GED within the next year and then enroll in a community‑college program that aligns with his service‑oriented values, such as health sciences, public safety, or social
    services. His long‑term ambition is to work as a community health worker or youth mentor, roles that allow him to apply his practical problem‑solving skills and compassionate nature to support residents
    of Elk Grove. He is also exploring an apprenticeship in automotive technology to combine his mechanical interest with a stable trade. Ultimately, Gerald seeks stable, routine‑based employment that offers
    clear responsibilities and the opportunity to give back to his community.
