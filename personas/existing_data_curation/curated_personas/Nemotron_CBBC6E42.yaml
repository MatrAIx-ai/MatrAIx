personas:
  professional: Ramon Mendoza, a 39‑year‑old full‑stack software developer, blends curiosity with practicality by building clean, serverless cloud‑native solutions in JavaScript, TypeScript, and Python
    while leveraging their competitive edge to mentor junior engineers in both English and Spanish, turning community‑focused problem solving into high‑performance code despite a relaxed attitude toward
    strict planning.
  sports: Ramon Mendoza, a surf‑enthusiast from Oceanside, rides the Pacific waves at sunrise, hits the coastal trail hikes in the afternoons, supports the San Diego Wave FC and Padres, and participates
    in a local beach volleyball league while maintaining a flexible fitness routine that balances competitive edge with the need for occasional solo recovery.
  arts: Ramon Mendoza curates an eclectic vinyl collection featuring salsa legends like Celia Cruz and modern artists such as Bad Bunny, enjoys indie games like Hades that sharpen strategic thinking, attends
    weekly salsa nights that keep cultural rhythms alive, and finds inspiration in classic sci‑fi novels by Asimov and Le Guin for creative coding projects.
  travel: Ramon Mendoza favors spontaneous road trips along the Pacific Coast Highway, combining surf sessions in Costa Rica with cultural explorations of historic Old San Juan, dreams of a future pilgrimage
    to Japan’s tech hubs, and balances limited vacation days by blending adventure with affordable family visits.
  culinary: Ramon Mendoza delights in cooking traditional dishes such as arroz con gandules, mofongo, and alcapurrias, often adding avocado or smoked paprika for a Californian twist, and while they consider
    themselves a competent home chef, they sometimes over‑season in the heat of experimentation, preferring casual gatherings over formal dining.
  core: Ramon Mendoza is a competitively curious technologist who rides ocean waves to reset, mentors bilingually, juggles disorganized finances with strategic investments, and balances cultural traditions
    with a laid‑back, occasionally anxious, yet resilient outlook on life.
background:
  cultural: Ramon is a first‑generation American; his parents emigrated from San Juan, Puerto Rico, bringing rich traditions of family gatherings, music, and food. He grew up bilingual, speaking Spanish
    at home and English at school, and he effortlessly switches between the two languages (Spanglish) in daily conversation. He celebrates Puerto Rican holidays such as Nochebuena, San Sebastián, and the
    Three Kings Day, and actively participates in San Diego’s Latino cultural events, including the Puerto Rican Parade and local salsa festivals. The island’s emphasis on resilience, resourcefulness, and
    community informs his problem‑solving approach at work and his desire to give back through mentorship. While fully integrated into the Californian surf and tech scene, he maintains strong ties with
    extended family in Puerto Rico through regular video calls and occasional trips, keeping his heritage a central part of his identity.
attributes:
  skills: '[''JavaScript'', ''TypeScript'', ''React'', ''Node.js'', ''Python'', ''AWS'', ''Google Cloud Platform'', ''Docker'', ''Kubernetes'', ''CI/CD (Jenkins, GitHub Actions)'', ''PostgreSQL'', ''MySQL'',
    ''MongoDB'', ''DynamoDB'', ''RESTful API design'', ''GraphQL'', ''AI/ML model prototyping'', ''Serverless architecture (AWS Lambda)'', ''Agile (Scrum/Kanban)'']'
  hobbies: '[''Surfing'', ''Coastal hiking'', ''Playing indie video games'', ''Reading science-fiction novels'', ''Cooking Puerto Rican dishes'', ''Collecting salsa and reggaeton vinyl records'', ''Salsa
    dancing'', ''DIY electronics with Raspberry Pi'', ''Attending hackathons'', ''Listening to mindfulness podcasts'']'
  career_goals: Ramon aims to transition from senior developer to lead engineer and eventually to a technical architect role where he can design end‑to‑end cloud‑native systems. He plans to earn advanced
    certifications in AWS and Kubernetes, and to deepen his expertise in AI/ML integration for business applications. Long‑term, he wants to launch a boutique consultancy that helps Latinx community organizations
    build secure, scalable digital platforms, while also creating a SaaS product that simplifies inventory management for small family‑run businesses. He is motivated to mentor underrepresented developers,
    especially those from Puerto Rican and broader Latino backgrounds, and to contribute regularly to open‑source security tools. All of this is pursued with an eye toward flexible, remote‑friendly work
    arrangements that help him manage stress and maintain a healthier work‑life balance.
