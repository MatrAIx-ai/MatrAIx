  hobbies: '[''Watercolor Painting'', ''Photography'', ''Improv Comedy'', ''Hiking'', ''Community Gardening'', ''Food Bank Volunteering'', ''Live Music Attendance'', ''Drumming'', ''Science Fiction Reading'',
    ''DIY Woodworking'']'
  career_goals: Jordan aims to transition from a clerk role to a supervisory position within the supply chain, eventually becoming a logistics manager or operations analyst where he can influence process
    improvements and foster a collaborative team culture. He is drawn to roles that balance structure with creative problem‑solving, allowing him to inject unconventional ideas into workflow design. Recognizing
    his challenges with strict deadlines, Jordan plans to develop stronger organizational habits—perhaps through a mentorship program or coursework in project management—so he can lead a team while maintaining
    the flexibility he values. Parallel to his professional aspirations, he hopes to launch a community arts initiative that provides workshops in DIY crafts and visual arts, merging his love of art with
    his commitment to community harmony.
