persona_description: A teacher who is passionate about education and has a strong desire to improve the teaching profession. They are dedicated to providing students with a well-rounded education that promotes
  critical thinking and abstract thinking across various genres. They are committed to fostering a love of learning and encouraging students to develop sampling, mapping, and related math and environmental-writing
  skills. The teacher is aware of the challenges facing the teaching profession, such as the decline in the number of teachers who elect to become teachers and the high rate of teacher retirements. They
  are aware of the importance of rigorous national standards and school-based accountability for student performance in raising the demand for talented teachers. The teacher is aware of the need to recruit
  and retain high-quality teachers and is committed to using research to improve teaching and learning. They are also aware of the importance of providing students with access to and the use of research
  to improve practice and student learning.
