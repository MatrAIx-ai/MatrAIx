  hobbies: '[''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Reading historical non-fiction'', ''Volunteering at community food bank'', ''Photography of Utah landscapes'', ''Small book club'', ''Attending
    historical society meetings'']'
  career_goals: Elizabeth aims to move into a supervisory role within the next two years, leveraging her experience to become a shift manager or assistant store manager. She plans to complete an associate’s
    degree in Business Administration to strengthen her managerial credentials. Long‑term, she hopes to transition to part‑time bookkeeping or retail consultancy, and she is considering launching a small
    home‑based boutique that sells handmade crafts, allowing her to blend her organizational strengths with entrepreneurial ambition.
