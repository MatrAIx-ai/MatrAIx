personas:
  professional: Elizabeth Daniels, a diligent retail cashier with 25+ years of point‑of‑sale expertise, leverages her meticulous bookkeeping, inventory control, and calm conflict resolution skills to pursue
    a shift‑manager role while completing an associate’s degree in Business Administration and dreaming of a home‑based boutique of handmade crafts.
  sports: Elizabeth Daniels stays active by walking the scenic trails around the Wasatch Mountains most weekends, cheering on the Utah Jazz and Real Salt Lake from her modest living room, and participates
    in a local senior bowling league during winter.
  arts: Elizabeth Daniels finds creative solace in photographing Utah’s snow‑capped peaks, enjoys listening to folk‑rock icons like John Denver and classical pieces by Beethoven, and participates in a small
    book club that discusses memoirs by authors such as Cheryl Strayed.
  travel: Elizabeth Daniels prefers purposeful travel that blends heritage and nature, having explored national parks like Zion and Bryce Canyon, taken a cultural tour of historic Williamsburg, and planning
    a future pilgrimage to the art‑rich streets of Florence, all within a modest budget and limited time.
  culinary: Elizabeth Daniels favors low‑maintenance, wholesome meals—often preparing quinoa‑stuffed bell peppers with sage, roasted root vegetables drizzled with honey, and a side of cranberry‑pomegranate
    salad—while savoring a weekend ritual of brewing a strong black coffee.
  core: Elizabeth Daniels, a 50‑year‑old organized pragmatist, balances methodical work aspirations with solitary puzzle‑solving, community‑focused volunteering, and a quietly disciplined lifestyle that
    occasionally slips into coffee‑driven over‑caffeination.
background:
  cultural: Elizabeth grew up in a predominantly white, middle‑class community in the Intermountain West, where the cultural milieu emphasized self‑reliance, modesty, and community service, often rooted
    in the region’s historic Latter‑day Saint heritage. Although she is no longer actively affiliated with the church, those values continue to shape her disciplined work ethic, focus on practical achievement,
    and commitment to helping neighbors through local volunteer efforts.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Conflict resolution'', ''Inventory control'', ''Basic bookkeeping'', ''Time management'', ''Team coordination'', ''Data entry'',
