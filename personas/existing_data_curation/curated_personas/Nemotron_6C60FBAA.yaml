  career_goals: Hope aims to transition from a bookkeeping clerk to a senior bookkeeper or accounting supervisor within the next five years, leveraging a part‑time associate’s degree in accounting to deepen
    her technical expertise. She is also interested in obtaining a Certified Bookkeeper credential to formalize her skill set. Ultimately, she envisions a flexible role—perhaps remote or freelance—that
    allows her to balance professional growth with family time while contributing to small‑business success in the Austin community.
