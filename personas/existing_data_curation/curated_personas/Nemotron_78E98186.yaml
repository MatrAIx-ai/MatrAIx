personas:
  professional: Aidee Paganrivera, a 22‑year‑old computational biologist‑turned‑science communicator, fuses Python‑driven data analysis and acrylic painting flair to craft compelling visual narratives that
    translate complex biotech research for diverse audiences, while leading STEM mentorship programs, coordinating community science fairs, and aspiring to advance into junior data analyst and UX researcher
    roles within health‑tech firms.
  sports: Aidee Paganrivera, a 22‑year‑old salsa enthusiast, cheered the LA Lakers during the playoffs, followed the LA Galaxy’s MLS campaign, and regularly trains at the downtown Latin dance studio Ritmo
    Vivo while also playing recreational beach volleyball with the Santa Monica Sports Club.
  arts: Aidee Paganrivera, a 22‑year‑old acrylic painter and digital illustrator, draws inspiration from Frida Kahlo’s bold colors and Yayoi Kusama’s immersive installations, regularly visits The Broad
    and the Getty Museum, delights in live Latin jazz sets by Arturo O’Farrill and indie rock shows featuring Arcade Fire, and keeps a sketchbook full of mash‑ups that blend scientific diagrams with surrealist
    imagery.
  travel: Aidee Paganrivera, a 22‑year‑old cultural explorer, has trekked the street art corridors of Mexico City, savored tacos al pastor in Oaxaca, and hiked the coastal cliffs of Big Sur, while dreaming
    of future trips to Tokyo’s Akihabara for tech inspiration, Barcelona’s Gothic Quarter for art immersion, and Iceland’s geothermal pools for a rejuvenating solo retreat.
  culinary: Aidee Paganrivera, a 22‑year‑old home cook with a confident flair for traditional Mexican cuisine, often prepares mole poblano, chiles en nogada, and homemade guacamole using roasted ancho chilies,
    fresh cilantro, and locally sourced corn masa, while experimenting with plating techniques that echo her acrylic color palettes.
  core: Aidee Paganrivera, a 22‑year‑old hyper‑talkative science‑art hybrid, juggles data visualizations and salsa steps with equal passion, yet frequently battles late‑night anxiety that fuels spur‑of‑the‑moment
    art supply splurges and a habit of color‑coding every notebook she owns.
background:
  cultural: Aidee was raised in a bilingual Mexican‑American household in Fort Worth, where Spanish was spoken at home and Mexican traditions were celebrated. She participates in Día de los Muertos altar
    building, enjoys family gatherings centered around mole, tamales, and other regional dishes, and draws inspiration from Mexican folk art and muralism. Her Catholic upbringing and close ties to extended
    family instill a strong sense of community, which she integrates into her social activities and volunteer work. This cultural heritage informs her appreciation for vibrant color palettes in her artwork
    and her desire to make STEM accessible to under‑represented groups, especially Latino youth.
attributes:
  skills: '["Python programming", "MATLAB data analysis", "Laboratory research techniques (cell culture, PCR)", "CAD modeling (SolidWorks)", "Technical writing", "Public speaking", "Team facilitation",
    "Project planning and management", "Data visualization (Tableau, Illustrator)", "Graphic design basics (Adobe Illustrator)"]'
  hobbies: '["Acrylic painting", "Digital illustration", "Visiting art museums and galleries", "Attending live music concerts (Latin jazz, indie rock)", "Salsa dancing", "Volunteering for STEM outreach
    (mentoring, science fairs)", "Reading contemporary fiction and science non‑fiction", "Yoga and meditation", "Cooking traditional Mexican cuisine"]'
  career_goals: Aidee aims to blend her STEM background with her love for art and communication by pursuing a role as a science communicator and data‑visualization specialist, ideally within a biotech or
    health‑technology company. In the next three years she plans to secure a junior data analyst or UX researcher position, complete a professional certification in user‑experience design, and lead community
    outreach workshops that make scientific concepts accessible to diverse audiences. Long‑term, she aspires to become a technical project manager who guides interdisciplinary teams to develop innovative
    health solutions while championing inclusive, creative workplace cultures.
