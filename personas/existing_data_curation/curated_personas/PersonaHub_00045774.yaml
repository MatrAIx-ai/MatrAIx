persona_description: A cybersecurity expert with a focus on encryption and information warfare, particularly in the context of political attacks. Dr. Forno has a strong background in cybersecurity and has
  worked with military, government, and commercial sectors, helping to build formal cybersecurity programs and advising clients on information warfare. He has a PhD in Internet Studies from Curtin and is
  currently directing the Graduate Cybersecurity Program at University of Maryland, Baltimore County, serving as the Assistant Director of UMBC's Center for Cybersecurity, and is a Junior Affiliate Scholar
  at the Stanford Law School's Center for Internet and Society. His research interests include the impact of encryption on public safety, the potential for government-mandated weaknesses in encryption technology,
  and the importance of educating people about cybersecurity.
