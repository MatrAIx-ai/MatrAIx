  hobbies: '["Golf", "Salsa dancing", "Cooking Venezuelan cuisine", "Gardening", "Fishing", "Volunteering at senior center", "Attending community festivals", "Reading business biographies", "Listening to
    Latin music", "Sailing"]'
  career_goals: Although retired, Carlos aims to stay professionally active by serving on the board of his local Chamber of Commerce and offering pro‑bono consulting to Latino small‑business owners. He
    aspires to mentor emerging entrepreneurs, share his experience through workshops, and maintain financial independence for his family. A personal ambition is to travel to Venezuela to reconnect with
    extended relatives and document his diaspora story in a memoir or blog, thereby preserving cultural heritage for future generations.
