personas:
  professional: Maria Preschel leverages a meticulous administrative skill set and bilingual fluency to orchestrate complex executive schedules, while they infuse artistic flair into event planning for
    cultural festivals, creating a uniquely creative yet reliable backbone for their organization.
  sports: Maria Preschel stays active by attending weekly yoga sessions, joining the Little Rock Runners club for Saturday morning jogs, cheering for the Arkansas Razorbacks during football season, and
    occasionally they play recreational volleyball with friends at the community center.
  arts: Maria Preschel channels artistic curiosity into acrylic canvases inspired by Frida Kahlo’s folk symbolism and the Delta’s serene floodplains, they frequent the Arkansas Museum of Fine Arts to view
    works by local painter Mary Ann Wilson, and they find solace in the melodies of Carlos Santana and the poetic verses of Ocean Vuong.
  travel: Maria Preschel prefers thoughtfully planned cultural itineraries, having explored Oaxaca’s vibrant markets and Granada’s historic streets, while they dream of an art‑focused retreat in Barcelona’s
    Gothic Quarter and a relaxing weekend getaway to the Ozark National Forest.
  culinary: Maria Preschel whips up traditional mole poblano, hand‑rolled tamales, and chiles en nogada on weekend evenings, savoring the complex blend of dried chilies, nuts, and fresh epazote, while their
    modest culinary skill level keeps them confident in the kitchen but occasionally they over‑salt a sauce in pursuit of deeper flavor.
  core: Maria Preschel navigates life like a balanced composition—meticulously organized at work, passionately artistic at home, and constantly battling a tide of anxiety with yoga, meditation, and they
    maintain a relentless quest for creative harmony.
background:
  cultural: Maria was raised in a Mexican‑American household where Spanish was spoken alongside English, allowing her to navigate both cultural spheres fluently. Family traditions such as Día de los Muertos,
    quinceañera celebrations, and Sunday communal meals have instilled a deep appreciation for Mexican heritage and communal values. While residing in Dumas, Arkansas, she actively participates in local
    events, sharing her cultural perspective through cooking demonstrations, storytelling, and involvement in the town’s multicultural outreach programs. Her bicultural identity informs her worldview, fostering
    respect for diversity, a collaborative spirit, and a commitment to preserving heritage while embracing new ideas.
