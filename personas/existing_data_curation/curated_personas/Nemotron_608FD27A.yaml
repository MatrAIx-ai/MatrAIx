  career_goals: Maria aims to transition from an executive administrative assistant to a senior office manager or director of operations within the next five years. She plans to earn a bachelor's degree
    in Business Administration, leveraging her associate's foundation, to strengthen strategic management skills. Long‑term, she hopes to combine her administrative expertise with her passion for the arts
    by leading operations for a nonprofit cultural organization that promotes Mexican heritage and contemporary art in the Arkansas region. Additionally, Maria is committed to developing formal mentorship
    programs for junior administrative staff and implementing wellness initiatives that address workplace stress, drawing on her own experiences with anxiety.
