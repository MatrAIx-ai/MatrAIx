personas:
  professional: Jianyi Liu is a 59‑year‑old facilities cleaning specialist in Chicago who leverages meticulous floor‑care expertise, bilingual communication, and a curiosity for art to coordinate cleaning
    schedules, champion green‑cleaning certifications, and serve as a trusted liaison for art‑focused tenants, though they sometimes question new management proposals with a competitive edge.
  sports: Jianyi Liu enjoys weekly line‑dancing classes, weekend walks in the community garden, and cheering on the Chicago Bulls and Chicago Cubs, while they also play recreational badminton at the senior
    center, blending sociable group activity with a competitive drive to improve personal fitness.
  arts: Jianyi Liu frequents the Art Institute of Chicago and the Museum of Contemporary Art, practices calligraphy and brush painting, volunteers at a neighborhood arts center organizing workshops, and
    delights in karaoke renditions of classic pop ballads, while they channel their curiosity for visual art, sociability, and a competitive urge to perfect each performance.
  travel: Jianyi Liu prefers purposeful travel, planning trips to art‑rich destinations like Kyoto for a calligraphy retreat, Florence for Renaissance fresco tours, and regional getaways to Ann Arbor’s
    cultural festivals, balancing careful budgeting with a desire for immersive experiences despite occasional last‑minute itinerary changes that reflect their flexible yet organized nature.
  culinary: Jianyi Liu enjoys cooking traditional East Asian dishes such as dumplings, mapo tofu, and braised pork belly for family gatherings, often harvesting herbs from their garden to enhance flavors,
    while they occasionally rely on quick takeout during busy cleaning shifts, revealing a love for cooking tempered by pragmatic shortcuts.
  core: Jianyi Liu is a 59‑year‑old art‑curious facility supervisor who blends meticulous green‑cleaning expertise with a sociable, competitive streak, juggling community gardening, calligraphy, and occasional
    health neglect.
background:
  cultural: Jianyi is a first‑generation Chinese‑American whose family settled in Chicago’s Chinatown decades ago. Growing up in a bilingual household, she learned Mandarin (or Cantonese) from her parents
    while attending American schools, giving her a bicultural perspective. Traditional values such as respect for elders, a strong work ethic, and the importance of community gatherings were instilled early
    on. These cultural roots influence her meticulous approach to cleanliness—a concept deeply embedded in many East Asian cultures—while her appreciation for art stems from both the classical Chinese calligraphic
    tradition and the vibrant contemporary art scene in Chicago. She celebrates Lunar New Year, Mid‑Autumn Festival, and other cultural holidays with family and neighbors, and she often bridges cultural
    gaps by introducing her peers to East Asian customs, food, and artistic practices. This blend of heritage and urban American life shapes her identity, resilience, and desire to contribute positively
    to both her ethnic community and the broader Chicago neighborhood.
attributes:
  skills: '[''Floor care (scrubbing, polishing, carpet extraction)'', ''Safe chemical handling and compliance'', ''Light maintenance (bulb replacement, minor plumbing)'', ''Cleaning schedule coordination
    and time management'', ''Attention to detail in hazard detection'', ''Bilingual communication (English, Mandarin)'', ''Customer service and tenant relations'', ''Knowledge of green cleaning practices'',
    ''Emergency response and problem solving'', ''Basic art‑handling and gallery cleaning protocols'']'
  hobbies: '[''Visiting art museums and galleries'', ''Chinese calligraphy and brush painting'', ''Cooking traditional East Asian cuisine'', ''Community gardening'', ''Karaoke and group singing'', ''Playing
    Mahjong and card games'', ''Attending cultural festivals and parades'', ''Line dancing and community fitness classes'', ''Reading art history and contemporary literature'', ''Volunteering at a community
    arts center'']'
  career_goals: Jianyi aims to move into a supervisory or lead‑janitor role within her building, obtaining certifications in facilities maintenance and green cleaning to bolster her credentials. She wishes
    to become a trusted liaison between maintenance staff and tenants, especially those from art‑related businesses, by offering specialized cleaning that respects delicate artworks. Long‑term, she hopes
    to start a small side venture providing eco‑friendly cleaning services to local galleries and community art spaces, while also volunteering as a docent or assistant at a nearby museum. Securing a stable
    retirement fund for her family and remaining an active, respected member of her neighborhood are central to her ambitions.
