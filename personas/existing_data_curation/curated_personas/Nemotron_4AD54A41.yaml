    novels'']'
  career_goals: Pattie aims to channel her organizational talents and love of cooking into a home‑based catering business focused on Southern comfort food. She also hopes to pursue a certification in community
    health outreach to support local families, and eventually become a respected leader within her church and neighborhood organizations.
