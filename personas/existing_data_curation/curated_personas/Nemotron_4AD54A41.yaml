personas:
  professional: Pattie Dowdell is a budding home‑based caterer who leverages her strong interpersonal communication, meticulous event‑planning, and knack for public speaking to turn routine family recipes
    into well‑organized community feasts, while her competitive streak drives her to out‑perform neighboring vendors and her skeptical eye ensures every contract is vetted.
  sports: Pattie Dowdell enjoys early‑morning walks in the Gulfport park and joins a local co‑ed softball league each spring, staying fit with weekend yoga sessions, while rooting passionately for the New
    Orleans Saints, cheering the Mississippi State Bulldogs during college football season, and following the New Orleans Pelicans for basketball, which fuels her competitive spirit.
  arts: Pattie Dowdell finds inspiration in the soulful harmonies of Aretha Franklin and the gospel vigor of Kirk Franklin, practices knitting and quilting as meditative crafts, participates in church choir
    performances of classic R&B ballads, and unwinds with romance novels by Nora Roberts and Nicholas Sparks, letting these artistic threads weave into her community gatherings.
  travel: Pattie Dowdell prefers planned mini‑road trips that blend beach relaxation with culinary exploration, such as weekend getaways to the historic streets of Charleston and the vibrant festivals of
    New Orleans, while dreaming of a future vacation to the Caribbean island of St. Lucia where she could source fresh seafood for her catering menu, all balanced against her family’s budget and her business’s
    seasonal demands.
  culinary: Pattie Dowdell, an adept home chef, delights in perfecting Southern comfort staples like shrimp étouffée, collard greens seasoned with smoked paprika, sweet potato pie, and flaky homemade biscuits,
    often layering buttermilk and honey for depth, and she relishes hosting community potlucks where the aroma of simmering gumbo unites neighbors.
  core: Pattie Dowdell is a routine‑loving, talkative community glue whose competitive edge drives flawless catering events, yet she often forgets to schedule personal downtime, leading to occasional burnout.
background:
  cultural: Pattie’s cultural background is rooted in the African‑American traditions of the Gulf Coast. She grew up in a close‑knit Black community where church, family gatherings, and Southern cuisine
    are central. The rich musical heritage of gospel, blues, and soul, as well as the coastal lifestyle of fishing and beach festivities, shape her values and daily routines. She carries forward stories
    of civil‑rights activism in Mississippi and takes pride in the resilience and communal support characteristic of her heritage.
