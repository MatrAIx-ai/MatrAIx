  hobbies: '[''Church Choir'', ''Quilting Circle'', ''Gardening'', ''Cooking and Recipe Sharing'', ''Walking'', ''Reading the Local Newspaper'', ''Bingo and Card Games'', ''Listening to Gospel and Jazz
