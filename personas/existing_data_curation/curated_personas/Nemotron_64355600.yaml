  career_goals: Even at 84, Juanita aims to remain an active, independent contributor to her community. She wants to keep her health strong through regular walks and nutritious cooking, and to continue
    volunteering at her church and the local senior center. A personal ambition is to document her family's oral histories in a written memoir for future generations. She also hopes to master new technology—such
    as using a tablet for video calls and digital photo albums—so she can stay connected with her grandchildren. By staying organized and reliable, she strives to be a steady source of support for her husband
    and extended family, while advocating for better senior services in West Monroe.
