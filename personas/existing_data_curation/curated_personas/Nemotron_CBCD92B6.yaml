personas:
  professional: Tommy Stevens is an engineering technologist at an Oklahoma energy firm who blends mechanical design, PLC programming, and rapid prototyping with a spontaneous, big‑picture imagination,
    often steering brainstorming sessions that feel more like improv performances, though their aversion to strict deadlines sometimes pushes projects into late‑night sprints.
  sports: Tommy Stevens fuels their high energy by leading weekend hikes with the Oklahoma City Hikers Club, cheering on the Oklahoma Sooners during football season and the Oklahoma City Thunder in basketball,
    while they occasionally join a local recreational soccer league for a quick cardio release between prototype builds.
  arts: Tommy Stevens channels their imaginative spark into abstract acrylics inspired by Jackson Pollock, digital illustrations echoing the neon vibrancy of Japanese vaporwave, and street photography of
    prairie skies, all while they regularly attend indie rock shows featuring The Strokes and classic rock tributes to Led Zeppelin at local venues.
  travel: Tommy Stevens prefers spontaneous road‑trip adventures, often mapping out a two‑day escape to the Badlands or Austin on a whim, but they balance this with a modest travel budget that reserves
    a yearly pilgrimage to the Swiss Alps for sustainable design conferences.
  culinary: Tommy Stevens is a moderately skilled home cook who loves firing up a smoker for brisket and bison burgers seasoned with smoked paprika, experiments with craft beer‑marinated chimichangas, and
    they also delight in pairing their meals with locally sourced heirloom tomatoes and fresh cilantro.
  core: Tommy Stevens is a perpetually curious, improv‑style engineer who flits between drones and paintbrushes, thrives on last‑minute deadlines, and occasionally forgets to file tax paperwork until the
    eleventh hour.
background:
  cultural: Tommy grew up in the Midwest and now lives in Oklahoma City, absorbing the region’s blend of friendly community spirit, appreciation for outdoor life, and a growing creative scene. While his
    heritage is broadly white American, his upbringing emphasized modesty, a strong work ethic, and close‑knit family ties, typical of many Oklahomans. At the same time, the city’s vibrant arts districts
    and maker‑space culture have nurtured his love for novelty and artistic expression, allowing him to fuse Midwestern practicality with an imaginative, forward‑looking outlook.
attributes:
  skills: '["Mechanical design", "3D modeling (SolidWorks, Autodesk Inventor)", "Electrical troubleshooting", "PLC programming", "Rapid prototyping", "Data acquisition and analysis (Python, MATLAB)", "Technical
    documentation", "Creative concept sketching", "Graphic illustration (Adobe Illustrator)", "Team facilitation and brainstorming", "Public speaking"]'
  hobbies: '["Improv comedy", "Group hiking and road trips", "Board‑game nights", "Abstract painting", "Digital illustration", "Photography (urban and prairie landscapes)", "Arduino and DIY electronics",
    "Drone building", "Sustainability hackathons", "Reading speculative fiction", "Attending high‑school football games"]'
  career_goals: Tommy aims to transition from a hands‑on engineering technologist to a lead innovation engineer within the next five years, heading interdisciplinary R&D projects that blend functional engineering
    with aesthetic design. He hopes to spearhead the development of novel, sustainable products for the energy sector in Oklahoma, leveraging his curiosity for new materials and emerging technologies. Long‑term,
    he envisions founding a small startup that offers rapid‑prototype services to local manufacturers, while maintaining a flexible work style that lets him continue exploring artistic side‑projects. He
    also wants to mentor future technologists and contribute to community maker spaces.
