  career_goals: Although only one year old, Monica already displays a strong inclination toward caring for others and maintaining harmony in her playgroups. Her parents notice her frequent offering of toys
    and gentle soothing of crying friends. They envision her future ambitions evolving toward a helping profession—such as nursing, early childhood education, or community outreach—where she can channel
    her compassion, discipline, and desire for achievement into making a positive impact.
