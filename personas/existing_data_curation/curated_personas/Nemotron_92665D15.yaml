  career_goals: Alan aims to earn the Project Management Professional (PMP) certification within the next two years and transition into a full‑time junior project manager position at a technology firm in
    the Tampa Bay area. He aspires to lead larger, cross‑functional initiatives, eventually managing multi‑million‑dollar projects. Over the longer term, Alan hopes to start his own consultancy that focuses
    on helping small businesses implement efficient project workflows. Alongside these professional goals, he is committed to developing stronger emotional resilience and leadership presence to better manage
    his anxiety and enhance team collaboration.
