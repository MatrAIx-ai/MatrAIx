personas:
  professional: Carmen Collado, a budding LEGO architect and puzzle strategist, uses their disciplined, detail‑oriented nature to craft intricate builds and solve age‑appropriate Sudoku, showing that they
    could one day thrive in design or engineering.
  sports: Carmen Collado participates in the local children's gymnastics club, enjoys the predictability of scheduled practice drills, and they cheerfully root for the Riverside Rangers minor‑league baseball
    team while occasionally joining family outings to watch the city’s professional soccer club, the Metro FC.
  arts: Carmen Collado, a disciplined piano student, practices Mozart’s Sonata in C and Tchaikovsky’s melody Daily, devours Nancy Drew mystery novels, and attends a weekly Spanish storytelling circle where
    they relish tales narrated by the charismatic storyteller Ana, all of which shape a refined yet imaginative artistic palate.
  travel: Carmen Collado prefers meticulously planned weekend trips to historic castles within driving distance, such as the medieval fortress of Carcassonne, and they dream of exploring the ancient ruins
    of Machu Picchu on a future school‑organized expedition, balancing curiosity with their love for structured itineraries.
  culinary: Carmen Collado delights in assisting the family kitchen by mastering the precise steps of paella, seasoning saffron‑infused rice with shrimp, mussels, and chorizo, while also perfecting chocolate
    chip cookies using measured ingredients and a timer, reflecting their methodical approach to cooking, and they take pride in the consistent results.
  core: Carmen Collado is a meticulous nine‑year‑old who blends a love for orderly LEGO creations, disciplined piano practice, and exacting cooking into a personality that thrives on structure, quiet focus,
    and a touch of quiet determination, and they approach each day with quiet resolve.
background:
  cultural: Carmen comes from a Spanish‑heritage family that maintains strong bilingual ties, speaking Spanish at home while navigating an English‑dominant school environment in North Las Vegas. Her household
    celebrates cultural traditions such as Día de los Reyes and annual family gatherings featuring Spanish cuisine, music, and dance. Growing up in a vibrant Hispanic community, she participates in cultural
    festivals at local community centers and values the sense of belonging and mutual respect that these events foster. This cultural immersion nurtures her bilingual proficiency, appreciation for family‑centric
    values, and desire to give back to both her local and broader Spanish‑speaking communities.
