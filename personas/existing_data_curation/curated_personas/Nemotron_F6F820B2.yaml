  career_goals: Carmen dreams of a future where she can combine her love for animals, science, and structured planning by becoming a veterinarian who provides meticulous, compassionate care. She also envisions
    studying civil engineering to design safe, well‑organized community spaces, especially in neighborhoods with a strong Hispanic presence. Carmen is determined to earn scholarships that support Hispanic
    youth in STEM fields, using her organizational strengths and bilingual abilities to bridge cultural gaps and make a meaningful impact.
