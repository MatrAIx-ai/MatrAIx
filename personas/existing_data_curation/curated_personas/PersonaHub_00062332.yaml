persona_description: A water expert and policy analyst who works for the Colorado Water Institute, focusing on understanding and preparing for the impacts of climate change and other factors on water resources
  in the Western United States. They are knowledgeable about the current state of water policy and management, including the Waters of the United States (WOTUS) rule change, and are skilled in analyzing
  the potential implications of climate change on water resources. They are also experienced in working collaboratively with stakeholders and scientific experts to develop and implement strategies for managing
  water resources in the face of changing conditions.
