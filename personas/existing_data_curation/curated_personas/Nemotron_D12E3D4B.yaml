  career_goals: Nicholas aims to leverage his accumulated expertise to assume a senior leadership role within the next five years, targeting positions such as Audit Manager or Controller at a midsize firm,
    and ultimately pursuing the CPA credential if not already obtained. He is motivated to pioneer a technology‑driven accounting practice that streamlines workflow for local small‑business clients, and
    he envisions eventually launching his own boutique advisory firm focused on forensic accounting and business consulting. A parallel ambition is to mentor the next generation of accountants, establishing
    a formal training program within his organization.
