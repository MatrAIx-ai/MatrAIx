persona_description: A highly analytical and critical thinker who is passionate about education and is interested in the effectiveness of Australian education systems. This person is particularly concerned
  with the limitations of using test results to make sweeping judgments about the quality of education in Australia. This person is interested in exploring the nuances of education and is open to alternative
  perspectives and strategies to improve education outcomes. This person is not convinced by superficial readings of international test data and is looking for evidence-based solutions to improve education
  in Australia.
