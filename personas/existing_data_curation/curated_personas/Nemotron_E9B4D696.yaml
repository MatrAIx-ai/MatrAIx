personas:
  professional: Tanya Ford, a senior manager of community and cultural affairs in Washington, DC, blends strategic planning, budget oversight, and stakeholder communication to design inclusive public art
    programs that amplify underrepresented voices, and they balance meticulous project coordination with the flexibility required for creative community collaborations.
  sports: Tanya Ford, a devoted fan of the Washington Wizards and DC United, plays pick‑up basketball at a community center, participates in the DC Running Club’s weekend 5Ks, and balances their love of
    team sports with weekly Afrobeat‑infused yoga sessions to stay fit.
  arts: Tanya Ford, an avid patron of contemporary diaspora art, regularly visits the National Museum of African American History and Culture and the Kennedy Center, draws inspiration from artists like
    Kara Walker, Kehinde Wiley, and Theaster Gates, and they frequently volunteer to curate community murals while dancing to Afrobeat rhythms at local gatherings.
  travel: Tanya Ford, an adventurous traveler, plans trips around international art festivals such as the Venice Biennale, the Dakar Biennale, and Art Basel Miami, enjoys cultural exchanges in Accra, Ghana,
    and weekend getaways to the Caribbean island of Barbados for its vibrant music scene, while they favor a mix of structured itineraries and spontaneous neighborhood explorations, often budgeting travel
    funds through a dedicated high‑yield savings account.
  culinary: Tanya Ford, a culinary explorer, masters African and Caribbean dishes like Jollof rice, oxtail stew, and ackee and saltfish using scotch bonnet pepper, coconut milk, and ginger, often hosts
    potluck dinners for friends, but they occasionally relent to late‑night pizza takeouts when a weekend cooking session runs too long.
  core: Tanya Ford, a curiosity‑driven community leader who blends strategic acumen with a love for diaspora art, sometimes forgets to reply to emails after marathon art openings but always finds time to
    volunteer, practice yoga, and champion inclusive cultural policies.
background:
  cultural: Tanya identifies as African‑American and grew up in a vibrant, multicultural environment in Washington, DC. Her family traditions blend Southern Black heritage with contemporary urban culture,
    celebrating holidays such as Kwanzaa and Juneteenth. She is deeply connected to the city's rich Black arts scene, frequently attending exhibitions by African‑American artists and supporting local cultural
    institutions. This background informs her commitment to fostering inclusive spaces and amplifying underrepresented voices through her professional and personal endeavors.
