  hobbies: '[''Visiting museums and galleries'',''Attending theater and live music performances'',''Reading contemporary fiction and social‑justice non‑fiction'',''Traveling to cultural festivals'',''Volunteering
    at community centers'',''Cooking African and Caribbean cuisine'',''Practicing yoga'',''Dancing to Afrobeat and hip‑hop'',''Organizing neighborhood block parties'',''Participating in book clubs'']'
  career_goals: Tanya aims to advance to a senior leadership role—such as Director of Community and Cultural Affairs—where she can shape citywide initiatives that integrate the arts into public policy and
    social services. She envisions launching a nonprofit that offers arts‑based mentorship programs for underserved youth in Washington, DC, and plans to pursue an executive MBA to deepen her strategic
    and financial expertise. Ultimately, she hopes to influence inclusive cultural policy at the municipal level while maintaining a hands‑on role in curating community art projects.
