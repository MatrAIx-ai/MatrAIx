  career_goals: Reginald aims to advance to a senior director role in procurement where he can shape enterprise‑wide sourcing strategies and champion sustainable, ethically sourced products. He envisions
    leveraging his passion for art to develop a specialty procurement line for museums and cultural organizations in the Southwest. Over the next five years he plans to earn the CPSM certification, mentor
    emerging Black procurement professionals, and implement an AI‑driven procurement platform that reduces costs while maintaining the high standards he values. Long‑term, he hopes to transition into a
    consulting role that blends supply‑chain expertise with cultural‑institution sourcing, allowing him to balance ambition with a less stressful schedule.
