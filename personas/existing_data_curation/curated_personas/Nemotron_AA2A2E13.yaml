personas:
  professional: Reginald Pettaway drives strategic sourcing initiatives with a disciplined, process‑driven mindset, leveraging their competitive edge and sociable negotiating style to secure cost‑saving
    contracts while pioneering AI‑enabled spend analytics for cultural institutions.
  sports: Reginald Pettaway competes in a local community basketball league, trains with the Phoenix Desert Runners club for early‑morning desert runs, and follows the Phoenix Suns, Arizona Diamondbacks,
    and Phoenix Rising FC, balancing a competitive spirit with a sociable team atmosphere.
  arts: Reginald Pettaway curates a modest personal collection of contemporary works by artists such as Ai Weiwei, Yayoi Kusama, and Takashi Murakami, regularly attending openings at the Phoenix Art Museum
    and participating in exhibitions that highlight cultural identity and reinterpretation of history.
  travel: Reginald Pettaway plans meticulously structured art‑focused getaways—often weekend drives to Sedona or Santa Fe, and annual trips to cultural capitals like New York, London, and Paris—balancing
    a love for desert landscapes with a desire to explore museum collections and local galleries.
  culinary: Reginald Pettaway enjoys a balanced palate that swings from weekend barbecues featuring smoked brisket and jalapeño‑marinated chicken to home‑cooked Mediterranean flatbread pizza topped with
    roasted beet and goat cheese, and they often experiment with sushi rolls after trips to coastal markets.
  core: Reginald Pettaway blends relentless procurement discipline with an insatiable curiosity for art, using early desert runs and yoga to offset a competitive edge that sometimes fuels worry, while secretly
    indulging in impulsive gallery buys and classic‑car restorations.
background:
  cultural: Reginald’s roots are deeply tied to the African‑American experience in the Southwest. Growing up in Phoenix, he was shaped by a close‑knit extended family that celebrated Black traditions through
    church, soul food, and music ranging from gospel to jazz. His parents migrated from the Southern United States, bringing with them stories of the civil‑rights movement that instilled a strong sense
    of community pride. He remains active in local Black professional networks and participates in cultural festivals that honor African heritage, which fuels his appreciation for Black visual art and informs
    his approach to inclusive, ethically‑sourced procurement.
