persona_description: A mental health professional who specializes in the assessment and treatment of individuals at risk of suicide, particularly those with mental health conditions such as depression,
  addiction, and chronic illness. They have experience working with patients who are at high risk of suicide and have a deep understanding of the warning signs and triggers of suicide. They are skilled
  in crisis intervention and have experience in working with patients who are resistant to therapy or who are unwilling to receive hospitalization. They have a strong interest in understanding the underlying
  causes of suicide and have a passion for helping individuals who are struggling with suicidal thoughts and feelings. They are dedicated to providing compassionate and effective care to individuals who
  are at risk of suicide and have a strong commitment to improving mental health outcomes for those who are struggling with this issue.
