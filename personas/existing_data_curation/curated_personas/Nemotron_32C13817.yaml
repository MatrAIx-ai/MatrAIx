  career_goals: Although retired from the formal workforce, Olga aims to expand her community impact by taking on leadership roles in local non‑profits, pursuing a certificate in gerontology to better serve
    seniors, mastering advanced digital storytelling tools to document local history, authoring a memoir about her life in Birmingham, and possibly running for a seat on the city council to influence civic
    decisions.
