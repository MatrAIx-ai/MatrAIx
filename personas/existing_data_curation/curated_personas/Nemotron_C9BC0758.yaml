personas:
  professional: Juan Barreto, a high‑school junior with a budding interest in automotive technology, leverages his bilingual communication, hands‑on mechanical aptitude, and beginner Python coding skills
    to excel in collaborative school workshops, where his curiosity and reliability make them a go‑to problem‑solver for hands‑on projects.
  sports: Juan Barreto spends Saturday mornings playing on the local youth soccer team affiliated with San Antonio FC and evenings at the San Antonio Skateboard Club, while cheering for the San Antonio
    Spurs and San Antonio FC, reflecting a commitment to active, community‑oriented fitness.
  arts: Juan Barreto nurtures a creative outlet by strumming acoustic renditions of Bad Bunny's Vete and Drake's Hotline Bling, while regularly streaming tracks from J Balvin, Karol G, Kendrick Lamar, and
    watching performances by Lin‑Manuel Miranda, intertwining Latin pop beats with U S hip‑hop rhythms in their daily soundtrack.
  travel: Juan Barreto favors budget‑friendly road trips to nearby nature spots like Big Bend National Park and weekend family visits to Monterrey, Mexico, while dreaming of attending the International
    Auto Show in Detroit, planning trips with a mix of spontaneity and careful budgeting to balance school commitments.
  culinary: Juan Barreto enjoys crafting homemade tacos al pastor with pineapple, masa‑based pork tamales, and rich chicken mole featuring ancho chilies, pasilla, sesame seeds, and Mexican chocolate, showcasing
    an intermediate cooking skill that blends tradition with occasional experimental twists.
  core: Juan Barreto balances a pragmatic, curiosity‑driven mindset with teenage impulsivity, swapping late‑night Fortnite sessions for sketching car repairs, yet often procrastinates on homework until
    the last minute.
background:
  cultural: Juan is a second‑generation Mexican‑American raised in a Spanish‑speaking household within West Valley City, Utah. His family places strong emphasis on collectivism, respect for elders, and
    the celebration of Mexican traditions such as Día de los Muertos, Semana Santa, and holiday feasts. While attending a public school in a predominantly English‑speaking environment, he maintains bilingual
    fluency and participates in both Catholic gatherings and local Hispanic community activities. The vibrant Hispanic community in West Valley City provides a supportive network that reinforces his cultural
    identity and pride, while also exposing him to the broader Utah suburban lifestyle.
