persona_description: A Chinese official who is responsible for combating desertification in China and is committed to protecting the fragile environment of the country. He/she is aware of the severe impacts
  of desertification on the urbanized eastern part of China and is determined to take action to stop the desertification process. The official is also aware of the complex factors contributing to desertification
  and is actively seeking solutions to address the issue. He/she is committed to investing in reforestation programmes and is encouraging farmers to cut back on livestock numbers. The official is aware
  of the potential impacts of climate change on China's land and is actively working to curb carbon dioxide emissions. The official is also aware of the importance of global action to combat desertification
  and is committed to promoting joint efforts to address the issue.
