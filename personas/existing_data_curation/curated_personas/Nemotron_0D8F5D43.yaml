  hobbies: '[''oil painting'', ''salsa and folklórico dancing'', ''cooking traditional Mexican recipes'', ''yoga and meditation'', ''hiking in East Texas'', ''reading contemporary fiction and art theory'',
    ''volunteering at community festivals'', ''attending live‑music concerts'']'
  career_goals: Consuelo aims to complete a bachelor’s degree in Communications while earning a certification in Event Management within the next three years. Her long‑term ambition is to become the director
    of a community arts center in the Rio Grande Valley, where she can design inclusive cultural programs that celebrate Mexican heritage and contemporary art. In parallel, she envisions launching a small
    family‑owned catering venture that showcases regional Mexican cuisine, providing a stable income and creative outlet. She seeks a role that offers structure, collaborative challenges, and access to
    mental‑health resources to support her emotional well‑being.
