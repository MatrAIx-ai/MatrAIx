persona_description: A researcher who specializes in the study of climate change and its effects on marine species, particularly in the context of rising temperatures and the poleward and equatorward shifts
  in their populations. This person is likely to be interested in the latest research findings, the implications of these findings for the conservation and management of marine ecosystems, and the potential
  impacts of projected sea temperature increases on marine species. They would be interested in understanding how marine species are responding to climate change, and how these responses may be affecting
  their populations and distributions.
