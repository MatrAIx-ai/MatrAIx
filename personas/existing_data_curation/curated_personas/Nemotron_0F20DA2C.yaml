  hobbies: '[''Bullet journaling'', ''Solo hiking'', ''Landscape photography'', ''Model railway building'', ''Reading nonfiction (productivity, transportation history)'', ''Strategy video gaming (Cities:
    Skylines)'', ''Coffee shop visits'', ''Craft beer tasting'']'
  career_goals: Joseph aims to become a senior travel operations manager within the next five years, obtaining the Certified Travel Associate (CTA) credential and completing an associate’s degree in business
    administration. He hopes to lead a team of ticket agents, develop more efficient booking protocols, and eventually transition into a logistics coordinator role for a regional airline or freight carrier,
    applying his analytical skills to route optimization. He also aspires to consistently exceed performance targets and be recognized for implementing cost‑saving initiatives.
