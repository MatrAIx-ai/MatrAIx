persona_description: A climate change advocate and activist who is passionate about educating the public about the negative impacts of climate change on West Virginia's outdoor recreation and tourism economy,
  as well as the potential health and economic impacts of climate change on human health. They are a project director at the West Virginia Center on Climate Change and have organized a free public event
  on September 21 to discuss climate change and human health. They are knowledgeable about the latest developments, issues, and practices that can be used to confront the climate change crisis and are committed
  to helping West Virginia address its climate change challenges.
