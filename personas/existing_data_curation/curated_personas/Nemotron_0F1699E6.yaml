  hobbies: '["Fishing", "Gardening", "Bingo nights", "Salsa dancing", "Line dancing", "Church choir participation", "Reading historical non-fiction", "Tinkering with vintage radios", "Cooking Southern dishes",
    "Attending local festivals"]'
  career_goals: Samir aims to turn his hands‑on knowledge into a legacy by mentoring younger community members through a weekend skills‑share program at the local senior center. He also hopes to compile
    his stories and practical tips into a small memoir or booklet that can be distributed to his grandchildren. Additionally, he wishes to strengthen his emotional resilience by learning mindfulness techniques
    and taking a beginner's guitar class, which would blend his love for music with his desire for personal growth.
