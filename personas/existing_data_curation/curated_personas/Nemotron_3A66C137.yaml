  career_goals: Although retired from formal employment, Nykee’s ambition is to remain independent, healthy, and socially engaged. She aims to expand her digital literacy to help her grandchildren with
    online schoolwork, to take a community‑history workshop so she can document the stories of Gary’s African‑American elders, and to increase her volunteer leadership role within the local church’s senior‑outreach
    program. She also hopes to mentor younger women in practical life‑skills such as budgeting and home‑cooking, preserving the knowledge she has built over decades.
