  hobbies: '["drawing and coloring", "reading bilingual books", "nature exploration", "LEGO building", "simple cooking with family", "listening to Mexican folk music and dancing", "crafting for cultural
    celebrations (e.g., Día de los Muertos)"]'
  career_goals: Rosa Maria dreams of growing up to be someone who helps others. She imagines becoming a teacher or a nurse so she can support her community and make people feel cared for. She also expresses
    interest in being a veterinarian because she loves animals and wants to keep them healthy. Her career aspirations are shaped by her compassionate nature and desire to maintain harmony in her surroundings.
