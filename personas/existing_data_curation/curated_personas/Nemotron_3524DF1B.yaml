personas:
  professional: Rosa Ramirez, a budding junior naturalist-artist, combines their curiosity about the backyard with practical LEGO-building skills; they channel their compassionate and cooperative nature
    into creating detailed wildlife illustrations and organizing tiny 'clean-up' projects for their small circle of friends.
  sports: Rosa Ramirez plays forward on the Santa Ana Sprouts youth soccer team, regularly cheering for the LA Galaxy on weekends and idolizing goalkeeper David Beckham's skill; they also join weekend family
    bike rides in the park.
  arts: Rosa Ramirez fills sketchbooks with bright animal scenes inspired by Frida Kahlo's bold colors, hums along to Lila Downs and Carlos Santana during craft sessions, and eagerly watches animated films
    starring Tom Hanks for creative storytelling ideas; they let the music's rhythm guide their pencil strokes.
  travel: Rosa Ramirez loves weekend trips to Disneyland in Anaheim and past family visits to the San Diego Zoo, while they dream of a future adventure to the Grand Canyon and a sunny coastal getaway to
    Tulum with cousins.
  culinary: Rosa Ramirez helps whisk together ripe avocados, lime juice, and cilantro for guacamole, rolls tiny corn tortillas with practiced hands, and delights in sprinkling cheese on homemade quesadillas;
    they show a budding knack for cooking basics.
  core: Rosa Ramirez is a compassionate, curious 7-year-old who flips between imaginative drawing sessions and impromptu backyard nature hunts, yet they often misplace their school supplies because of a
    relaxed, disorganized streak.
background:
  cultural: Rosa Maria comes from a Mexican‑American family living in Santa Ana, California, a region with a vibrant Hispanic community. At home, Spanish is spoken alongside English, and family gatherings
    often feature traditional foods like tamales, salsa, and pan dulce. She participates in cultural celebrations such as Día de los Muertos, where she helps create papel picado and sugar skull decorations,
    and enjoys listening to mariachi and regional Mexican music. Her cultural upbringing emphasizes family closeness, respect for elders, and community involvement, which influence her compassionate and
    cooperative personality.
