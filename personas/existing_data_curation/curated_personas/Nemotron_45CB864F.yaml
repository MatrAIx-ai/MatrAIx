personas:
  professional: Beatrice Walden, an insurance broker with a STEM foundation who blends analytical risk assessment, Excel‑driven client insights, and empathetic communication to craft tailored protection
    plans, is aiming for the CPCU designation and a senior regional manager role to champion data‑driven solutions for underserved neighborhoods.
  sports: Beatrice Walden, a dedicated member of a local Saturday‑morning 5K running club and a faithful supporter of the Atlanta Falcons, also attends community yoga classes and enjoys seasonal pickup
    basketball games at the church gym, balancing low‑impact workouts with occasional competitive spirit.
  arts: Beatrice Walden, an abstract watercolor painter inspired by the vibrant storytelling of Kara Walker and the soulful melodies of Erykah Badu, channels speculative fiction influences from N.K. Jemisin
    into her lyrical short stories, and regularly attends regional gallery openings featuring emerging Black‑owned art collectives.
  travel: Beatrice Walden, a purposeful traveler who maximizes limited vacation days by weekend escapes to historic Savannah for its moss‑draped squares and annual jazz brunch, and savors annual cultural
    immersions in Cartagena, Colombia, where she explores colonial architecture and Afro‑Caribbean music festivals.
  culinary: Beatrice Walden, a culinary experimenter who blends Southern soul food with global twists, frequently cooks shrimp‑and‑grits tacos, collard‑greens pesto linguine, and sweet‑potato ramen, seasoning
    dishes with fresh basil, cilantro, and a dash of smoked paprika harvested from her indoor garden.
  core: Beatrice Walden, a data‑driven insurance strategist who balances meticulous client analysis with quiet watercolor creation, mindful yoga practice, and a habit of late‑night storytelling, while occasionally
    forgetting to water her succulents.
background:
  cultural: Beatrice identifies as African‑American and was raised in a close‑knit Black family in the South, where church gatherings, community solidarity, and a strong emphasis on education were cornerstones.
    She actively participates in local cultural events such as Juneteenth celebrations and supports Black‑owned businesses. Her heritage informs her worldview, fostering a deep sense of responsibility to
    advocate for equitable financial services. She draws inspiration from African diaspora art and music, which influences her creative pursuits, while her work in insurance reflects a commitment to serving
    her community's diverse needs.
attributes:
  skills: '["Risk Assessment","Insurance Product Knowledge","Financial Planning","Data Analysis (Excel, SQL, Tableau)","Customer Relationship Management","Sales Negotiation","Clear Written and Verbal Communication","Creative
