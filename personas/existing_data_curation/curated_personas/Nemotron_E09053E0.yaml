  career_goals: Marzel wants to turn his love of tech and sports into a career. He aims to join a local vocational program to become an automotive technician or a junior game developer, hoping to eventually
    launch a side hustle that repairs smartphones and custom‑mods gaming consoles for friends. He also dreams of earning a scholarship to a community college where he can study graphic design, blending
    his artistic instincts with practical skills. His competitiveness pushes him to seek recognition, whether it’s winning a local basketball tournament or showcasing a finished game project at his school’s
    tech fair.
