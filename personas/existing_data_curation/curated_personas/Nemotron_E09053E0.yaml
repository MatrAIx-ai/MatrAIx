personas:
  professional: Marzel Tremble is a budding tech hobbyist who builds simple game mods in Python and repairs old laptops, channeling their curiosity and competitive edge into meticulous code while their
    organized yet flexible approach keeps projects on track.
  sports: Marzel Tremble dominates the community basketball court three evenings a week, shreds the downtown skate lanes on a battered skateboard, and roots for the St. Louis Cardinals and St. Louis City
    SC, training with a disciplined yet adaptable regimen that mirrors their competitive spirit.
  arts: Marzel Tremble creates lo‑fi beats on Audacity inspired by J Dilla, draws vibrant graffiti‑style sketches reminiscent of Banksy in sketchbooks, and frequents open‑mic nights featuring local jazz
    trios and hip‑hop artists like Kendrick Lamar, weaving their competitive drive into artistic expression.
  travel: Marzel Tremble has taken weekend road trips to Chicago and Nashville with family, dreams of exploring Tokyo’s tech districts and Berlin’s street‑art scene, and balances a desire for adventure
    with parental budget constraints and school schedules.
  culinary: Marzel Tremble loves devouring pepperoni pizza and loaded nachos smothered in jalapeños, occasionally whips up a quick ramen bowl seasoned with miso paste, soft‑boiled egg, and scallions, and
    experiments with fresh guacamole made from ripe avocados, cilantro, and lime.
  core: Marzel Tremble blends a fierce competitive spark with a restless curiosity, constantly tinkering, gaming, and creating, yet wrestles with intense anxiety that fuels both their drive and occasional
    burnout.
background:
  cultural: Marzel grew up in a tight‑knit African‑American community in St. Louis County, where church gatherings, family barbecues, and neighborhood block parties are central to social life. He absorbed
    the city’s musical legacy—from the blues clubs of the historic districts to modern hip‑hop beats that dominate his playlists—while also navigating the challenges of urban life, such as limited educational
    resources and systemic inequities. These experiences have instilled in him a strong sense of resilience, an appreciation for storytelling through music and art, and a desire to give back to his community
    through mentorship and local entrepreneurship.
