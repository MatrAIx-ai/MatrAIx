personas:
  professional: Luis Zevallos, a 58‑year‑old inventory control specialist at a high‑volume distribution center, leverages his bilingual fluency, Fishbowl and SAP expertise, and meticulous yet adaptable
    approach to keep inventory accuracy above 99 % while mentoring new hires with the same energetic, talkative flair that fuels his desire to become a shift supervisor and future logistics consultant.
  sports: Luis Zevallos is a devoted soccer fan who rallies his family and friends for every World Cup match while rooting for the Houston Dynamo in MLS, regularly watches the Texas Rangers and Houston
    Astros on game nights, and stays active by playing for the Conroe Adult Soccer League's 'Taco Tuesday' team, balancing his love of the sport with weekly jogs and occasional salsa‑filled cardio sessions.
  arts: Luis Zevallos spends his evenings painting vibrant cityscapes that weave together the colors of his hometown with motifs reminiscent of Diego Rivera’s murals, while his weekends feature guitar‑filled
    jam sessions inspired by Carlos Santana and B.B. King, regular attendance at mariachi shows, and participation in community Latin dance nights that let his energetic, sociable nature shine.
  travel: Luis Zevallos enjoys planning modest getaways that blend cultural immersion with family bonding, such as annual trips to the historic streets of San Antonio’s Market Square, weekend drives to
    the Hill Country’s wineries, and occasional flights to Mexico City and Barcelona to explore the museums and street art that fuel his creativity, all while balancing a tight retirement budget and his
    children’s school schedules.
  culinary: Luis Zevallos, an intermediate‑level home chef, delights in preparing mole poblano with dark chocolate and ancho chiles, tender pork tamales wrapped in corn husks, and hearty pozole rojo brimming
    with hominy and cilantro, often pairing these dishes with fresh avocado, lime, and a side of grilled Tex‑Mex fajitas for his family’s weekend feasts.
  core: Luis Zevallos is a talkative, art‑loving inventory guru who balances meticulous warehouse precision with spontaneous guitar jams, festive family cooking, and a penchant for late‑night bill payments.
background:
  cultural: Luis was born to Mexican immigrant parents who first settled in Houston before moving to Conroe, Texas. He grew up steeped in Mexican traditions—celebrating Día de los Muertos, preparing tamales
    with his extended family, and attending weekly mass at the local Catholic church. His bilingual upbringing gave him fluency in both Spanish and English, allowing him to bridge cultural gaps at work
    and in his community. The Mexican value of "family first" is central to his life, reflected in his close relationship with his wife and adult children. Living in a diverse Texas suburb, Luis blends
    Texan hospitality with Mexican warmth, often hosting gatherings that feature both Tex‑Mex cuisine and traditional Mexican music. His curiosity about art and new ideas is shaped by the vibrant folk art
    of his heritage and the dynamic cultural scene of the greater Houston area.
