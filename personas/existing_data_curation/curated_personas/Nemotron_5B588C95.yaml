  career_goals: Luis aims to progress into a shift‑supervisor or lead inventory coordinator role where he can shape operational procedures and mentor younger staff. He plans to earn a logistics certification
    (such as APICS CPIM) to deepen his expertise and implement a continuous‑improvement project that reduces order‑processing time by at least 15 %. Over the next few years he hopes to transition to a part‑time
    consulting capacity, helping small businesses optimize their inventory processes. Parallel to his professional ambitions, Luis envisions launching a weekend art‑related venture—selling his paintings
    and offering community art workshops—as a creative outlet for his retirement years.
