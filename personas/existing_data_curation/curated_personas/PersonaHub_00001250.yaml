persona_description: A global advocate for sustainable hydropower development, particularly in developing countries. This person is knowledgeable about the World Commission on Dams report and the International
  Hydropower Association's sustainability guidelines, as well as the Clean Development Mechanism and the Paris Agreement. They are interested in the economic, social, and environmental impacts of hydropower
  projects and are committed to ensuring that hydropower is developed in a responsible and sustainable manner. This person may work with governments, NGOs, and private sector entities to promote hydropower
  development that is aligned with sustainability goals and that benefits affected communities. They may also be interested in policy analysis and advocacy to support the adoption of sustainable hydropower
  practices and technologies.
