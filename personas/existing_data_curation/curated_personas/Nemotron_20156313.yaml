    email)'', ''Team collaboration and peer training'']'
  hobbies: '[''Reading historical fiction and mystery novels'', ''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Crossword puzzles and sudoku'', ''Birdwatching'', ''Cooking and
    baking comfort foods'', ''Nature photography'', ''Listening to folk and classic rock music'']'
  career_goals: Meghan aims to transition from a packager to a shift supervisor within the next two years, leveraging her deep knowledge of packaging workflows and safety standards. She plans to earn a
    Certified Production and Inventory Management (CPIM) credential to broaden her understanding of supply‑chain logistics. Her long‑term ambition is to implement incremental process improvements that reduce
    material waste and increase efficiency, thereby contributing to a safer and more predictable work environment. Outside of work, she seeks financial stability for a comfortable retirement and hopes to
    achieve a better work‑life balance to manage stress and maintain her well‑being.
