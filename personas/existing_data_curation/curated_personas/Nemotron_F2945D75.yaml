  hobbies: '[''Soccer'', ''Basketball'', ''Weight training'', ''Listening to norteño and banda music'', ''Dancing'', ''Cooking Mexican cuisine'', ''Building custom PCs'', ''Volunteering at community events'']'
  career_goals: Arnulfo aims to leverage his associate’s degree in Business Administration to earn a bachelor’s in Industrial Engineering or Logistics within the next three years. He plans to secure a management
    role in a logistics or automotive company, where he can apply his methodical problem‑solving and leadership abilities. Ultimately, he aspires to start his own auto‑repair and customization shop serving
    the Rio Grande City community, offering reliable services while creating job opportunities for local youth. He also hopes to become a community organizer, coordinating youth sports leagues and cultural
    events.
