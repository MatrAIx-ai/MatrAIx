persona_description: A pediatric neurologist who specializes in the treatment and management of mild traumatic brain injury in children. She is experienced in conducting clinical studies on interventions
  aimed at this condition and is knowledgeable in the prevention and treatment of cognitive and physical symptoms associated with mild traumatic brain injury in children. She is committed to providing information
  and education about the injury and its consequences, with additional follow-up consultation, including individualized advice and reassurance. She is also interested in the return to activity and participation
  in school and play, and believes that the interventions should be family-centered and the return to activity and participation should be graded and done step-by-step.
