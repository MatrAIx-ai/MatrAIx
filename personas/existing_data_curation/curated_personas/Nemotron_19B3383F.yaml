  hobbies: '[''visiting galleries and museums'', ''contemporary tech‑art installations'', ''salsa dancing'', ''bachata dancing'', ''gardening'', ''cooking traditional Latino cuisine'', ''volunteering teaching
    computer basics'', ''reading science‑fiction novels'', ''hiking Hudson Valley trails'', ''hosting dinner parties'']'
  career_goals: Looking ahead, Cristina aims to transition into a mentorship and advisory role, using her extensive experience to support emerging engineers and underrepresented groups in technology. She
    plans to lead community outreach programs in Dutchess County that introduce high‑school students to hardware engineering and sustainable tech design. Additionally, she aspires to consult on green hardware
    projects, contribute to open‑source hardware initiatives, and become a regular speaker at regional tech conferences and art‑tech festivals, sharing her insights on the blend of engineering and creativity
    before fully retiring.
