personas:
  professional: Cristina Porras, a veteran hardware engineer with 35 years of expertise in circuit board layout, signal integrity, and embedded systems, channels their analytical precision and talkative
    charisma into mentoring emerging engineers, forging sustainable tech designs, and bridging art and engineering at regional tech‑art festivals.
  sports: Cristina Porras channels their social energy into salsa and bachata nights at the local community center, hikes the scenic Hudson Valley trails as a member of the Dutchess County Trail Club, cheers
    for the New York Yankees, and occasionally joins a senior recreational tennis league on Saturdays.
  arts: Cristina Porras immerses themselves in contemporary installations by artists like Refik Anadol and TeamLab, attends weekly museum talks, curates student hardware‑art exhibits at the community center,
    and fuels their imagination by reading science‑fiction novels from authors such as Neal Stephenson and Liu Cixin.
  travel: Cristina Porras prefers meticulously planned itineraries that blend art, technology, and nature, from weekend trips to the Hudson Valley wineries and Woodstock’s art scene, to spring visits to
    Barcelona’s Sagrada Família and modernist design tours, and an annual pilgrimage to the Ars Electronica festival in Linz, Germany, all while managing costs within a modest retirement budget.
  culinary: Cristina Porras delights in cooking traditional dishes such as mole poblano, tamales, and arroz con pollo, seasoning them with garden‑fresh cilantro and epazote, while experimenting with fusion
    tacos that pair roasted beets and goat cheese, and loves hosting elaborate dinner parties where friends savor these creations.
  core: Cristina Porras fuses a lifetime of hardware engineering expertise with a vibrant love for art, dance, and community, turning every conversation into a lively mix of technical insight, cultural
    curiosity, and generous hospitality, even if they sometimes splurge on the latest gadget.
background:
  cultural: Born to parents who immigrated from Puerto Rico, Cristina grew up in a bilingual household where Spanish language and Latino traditions were central to daily life. She maintains strong cultural
    ties through celebrations such as Día de los Muertos, Christmas posadas, and family gatherings featuring arroz con gandules, plantains, and empanadas. Her upbringing emphasized community, hospitality,
    and respect for elders, shaping her collaborative and caring nature. In Wappingers Falls, she is active in the local Latino cultural association, helping organize cultural events, language workshops,
    and outreach programs that celebrate her heritage.
