  career_goals: Cynthia aims to transition from a hands‑on technical role to an IT manager position within the next five years, pursuing certifications such as CompTIA Network+ and PMP to strengthen her
    leadership credentials. She is motivated to lead small teams in optimizing the company’s infrastructure, championing security initiatives, and mentoring junior staff. Long‑term, she envisions establishing
    a consultancy focused on process optimization for small businesses in the Midwest, leveraging her blend of curiosity and practicality.
