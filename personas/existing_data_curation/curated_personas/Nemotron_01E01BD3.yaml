  career_goals: Inspired by his love for art, technology, and competition, William dreams of turning his imagination into interactive experiences. He envisions becoming a video‑game designer or an interactive‑art
    inventor who blends storytelling, visuals, and simple coding. He also hopes to lead a youth science or robotics club at his school, win regional science‑fair awards, and perhaps one day create a community
    mural that celebrates Beaver County’s heritage. His ambition is to keep exploring new fields, push creative boundaries, and inspire his friends to think outside the box.
