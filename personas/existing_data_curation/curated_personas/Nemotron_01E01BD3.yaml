personas:
  professional: William Mendoza, a budding 9‑year‑old creator, blends his love for LEGO Boost robotics and comic‑strip storytelling into prototype mini‑games, using a spontaneous improvisational style that
    often leaves his workbench scattered but fuels his curiosity‑driven learning.
  sports: William Mendoza plays midfield for the neighborhood youth soccer club, the Beaver River Rovers, practices drills with the River City Youth Soccer Academy, and idolizes the professional soccer
    star Lionel Messi, while also cheering for the local minor‑league baseball team, the River Hawks.
  arts: William Mendoza spends afternoons sketching dynamic superhero panels inspired by Stan Lee and Akira Toriyama, paints small canvases echoing Van Gogh’s bright swirls, and attends weekend workshops
    at the community art center where they admire the animated storytelling of Hayao Miyazaki.
  travel: William Mendoza prefers short, hands‑on family outings, having explored the nearby Beaver River trail and the state natural history museum, while dreaming of a future trip to Kyoto’s anime districts
    and the dinosaur exhibits at the Smithsonian, balancing excitement with the limited budget of a family‑controlled allowance.
  culinary: William Mendoza, a budding palate explorer, adores pepperoni pizza, homemade tacos with cilantro and lime, and loves crafting no‑bake chocolate oat bars, yet they frequently skip vegetables,
    trading them for extra cheese on their grilled cheese sandwiches.
  core: William Mendoza, a relentlessly curious 9‑year‑old, mixes art, robotics, and soccer into a whirlwind of spontaneous projects, often leaving a trail of LEGO bricks and sketchbooks while barely remembering
    to tidy up.
background:
  cultural: William grew up in Beaver Falls, a small city in Beaver County, western Pennsylvania. The community is predominantly white and middle‑class, with a mix of industrial roots and suburban life.
    He attends a local public elementary school that offers after‑school art clubs, robotics workshops, and sports programs. Family outings often include trips to regional fairs, community theater events,
    and visits to the Carnegie Museum of Art in nearby Pittsburgh. The area's values of self‑reliance, neighborly friendliness, and pride in local history, combined with supportive parents who encourage
    curiosity and participation in community activities, shape William's open‑minded yet competitive personality.
