persona_description: A researcher from Victoria University of Wellington who specializes in the study of rare-earth nitrides (RENs), a class of materials that could lead to faster, more reliable memory
  storage in computers. The researcher has spent several years understanding the properties of RENs, including their magnetic and semiconducting properties, and is currently working on developing the first
  magnetic memory storage devices based on RENs, called magnetic tunnel junctions. The researcher is also collaborating with a team of researchers in France to test a new way to control how RENs use electricity,
  which could lead to the development of spintronics devices, an emerging technology where the spin of an electron is controlled to manipulate its charge.
