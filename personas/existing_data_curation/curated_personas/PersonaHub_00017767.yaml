persona_description: A teacher who values the importance of historical narratives in teaching history and believes that historical consciousness is an essential feature of developing a usable history for
  students. They have experience with the Big History Project course and are familiar with the use of historical narratives and consciousness in history teaching. They understand the importance of teaching
  facts, critical thinking, and the historical stories used to make sense of the past, but believe that historical consciousness is a missing element in history education. They see historical narratives
  and consciousness as essential features of developing a usable history for students and are willing to incorporate these into their teaching.
