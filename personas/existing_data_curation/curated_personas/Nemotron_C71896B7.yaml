personas:
  professional: Yi Yang, a seasoned civil engineer and sustainable infrastructure specialist, blends rigorous structural analysis with an artistic sensibility, using AutoCAD, Revit BIM, and Python to craft
    resilient, aesthetically balanced projects while fostering collaborative, harmonious team dynamics despite a tendency toward relaxed planning, and they champion community‑focused designs that echo the
    flow and balance of traditional artistic principles.
  sports: Yi Yang, an avid cyclist who rides with the Madison Cycling Club and hikes the trails of Devil's Lake State Park in the summer, follows the Milwaukee Bucks and Green Bay Packers loyally, joins
    the local ultimate frisbee league with the Madison Radicals during fall, practices tai chi for balance, and they treat fitness as a fluid, low‑pressure routine rather than a regimented schedule.
  arts: Yi Yang, a regular visitor to the Madison Museum of Contemporary Art who admires James Turrell’s light installations and Ansel Adams’s photography, spends weekends sketching urban landscapes, plays
    the guzheng during quiet evenings, draws inspiration from the ambient compositions of Ryuichi Sakamoto and the indie folk melodies of Sufjan Stevens, and they often incorporate these artistic influences
    into community design proposals.
  travel: Yi Yang, who prefers loosely planned weekend getaways over rigid itineraries, enjoys cycling tours of Door County’s shoreline, has explored the lantern‑lit streets of Shanghai during a cultural
    festival, dreams of strolling through Kyoto’s cherry‑blossom alleys, and they balance adventure with reflective solo hikes in Wisconsin’s state parks.
  culinary: Yi Yang, a moderately skilled home chef, delights in fusing Midwestern comfort foods with Asian flavors—such as miso‑glazed pork tenderloin paired with butter‑rich corn mash, kimchi‑enhanced
    bratwurst, and a Sichuan‑pepper‑infused cheese spread—and they regularly experiment with seasonal produce from their community garden while occasionally over‑spicing dishes in pursuit of bold taste.
  core: Yi Yang, a curious yet laid‑back engineer who weaves Eastern balance into Western infrastructure, hoards art supplies, forgets routine appointments, and finds serenity in tai chi and guzheng melodies,
    they navigate life with a harmonious blend of creativity and relaxed pragmatism.
background:
  cultural: Born to first-generation Chinese immigrants, Yi Xuan grew up navigating a bicultural identity that blends traditional East Asian values with Midwestern American life. His family emphasized education,
    harmony, and collective well‑being, instilling a respect for both Mandarin language and American English. Celebrations of Chinese New Year and the Moon Festival coexist with participation in local holidays
    and community events in Madison. This cultural duality informs his design aesthetic, encouraging the integration of Eastern artistic principles—such as balance and flow—into contemporary U.S. infrastructure
    projects, and motivates his involvement in community outreach that bridges diverse cultural perspectives.
