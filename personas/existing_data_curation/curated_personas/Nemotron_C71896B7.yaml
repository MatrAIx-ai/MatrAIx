  hobbies: '[''Visiting art galleries and museums'', ''Sketching and photography'', ''Cycling'', ''Hiking in state parks'', ''Community gardening'', ''Tai chi'', ''Playing the guzheng'', ''Cooking Asian-Midwestern
    fusion dishes'', ''Attending small-group sustainable design meetups'']'
  career_goals: He aims to become a senior lead engineer or director of sustainable infrastructure within a municipal agency or forward-thinking consultancy, where he can champion projects that blend structural
    resilience with artistic expression. Over the next decade, he plans to lead multidisciplinary teams on green-infrastructure initiatives, mentor emerging engineers—especially those from underrepresented
    backgrounds—and influence regional policy on climate-responsive design. He also envisions establishing a small collaborative studio that partners with local artists and community groups to create public
    spaces that reflect both functional excellence and cultural richness.
