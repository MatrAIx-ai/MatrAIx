  hobbies: '[''Street Art Exploration'', ''Photography'', ''Social Media Curation of Local Art'', ''Live Music Attending (Reggae, Jazz, Hip‑hop)'', ''Dance Workshops (Caribbean & Hip‑hop)'', ''Cooking Caribbean
    Cuisine'', ''Community Volunteering (Youth Art Programs)'', ''Basketball'', ''Reading Contemporary Art Theory'', ''Urban Sociology'']'
  career_goals: Charlene aims to transition from her current role into a position that blends her passion for the arts with her strong organizational and interpersonal skills. She plans to enroll in a community
    college program in arts administration or hospitality management, and to acquire a certification in event planning. In the next three years she hopes to secure a role as a cultural program assistant
    at a Queens community center, coordinating local art exhibitions, street‑art tours, and youth workshops. Long‑term, she dreams of becoming a director of a neighborhood cultural hub that showcases Black
    and Caribbean artists, while also exploring entrepreneurship by opening a small gallery‑café that doubles as a community gathering space.
