personas:
  professional: Charlene Stevenson, a 21‑year‑old parking attendant known for de‑escalating tense situations, channels their organized, talkative nature into meticulous record‑keeping and public‑facing
    duties while simultaneously building a portfolio of street‑art event promotions, aiming to transition into arts administration.
  sports: Charlene Stevenson energizes weekends by playing pickup basketball with friends, cheering for the New York Knicks and following the Queens Kings’ local street‑ball tournaments, preferring high‑intensity
    court play over structured gym routines while using the sport as a social outlet.
  arts: Charlene Stevenson curates a vibrant Instagram feed of Queens’ mural scene, drawing inspiration from street artists such as Kelsey Montano and Harrell Clarke, while soaking in live performances
    by Bob Marley‑style reggae bands, jazz virtuoso Kamasi Washington, and hip‑hop pioneer Boots Riley, and regularly joining dance workshops that blend Afro‑Caribbean rhythms with contemporary moves.
  travel: Charlene Stevenson favors spontaneous weekend trips, often backpacking to cultural hotspots like New Orleans for its jazz heritage or to the island nation celebrated for its vibrant reggae beats,
    balancing a limited student budget with a love for immersive street‑art tours and culinary exploration.
  culinary: Charlene Stevenson, an enthusiastic home cook, perfects smoky jerk‑marinated chicken and caramelized plantain roasts using scotch‑bonnet peppers, allspice, and fresh thyme, while occasionally
    crafting fusion tacos that marry Caribbean spices with Mexican corn tortillas.
  core: Charlene Stevenson is a buzz‑filled 21‑year‑old art‑obsessed organizer who can’t resist snapping every mural, habitually leaves coffee cups on the parking barrier console, and often trades sleep
    for late‑night dance jams, blending relentless curiosity with charming over‑commitment.
background:
  cultural: Charlene is a Black American raised in the Jamaica neighborhood of Queens, a melting‑pot of Caribbean, African‑American, and immigrant cultures. Her family’s roots trace back to the Caribbean,
    and she grew up listening to reggae, dancehall, and hip‑hop, while also participating in church and community events that celebrate Black heritage. The diverse streets of Queens exposed her to a rich
    tapestry of languages, cuisines, and artistic expression, shaping her appreciation for multicultural art and her fluid ability to navigate different cultural contexts. She identifies strongly with both
    African‑American and Caribbean cultural traditions, which influence her values of community solidarity, expressive creativity, and resilience.
