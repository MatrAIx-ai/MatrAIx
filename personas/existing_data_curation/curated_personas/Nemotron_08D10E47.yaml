personas:
  professional: Danelia Barrientos, a budding teen coder, blends curiosity with practicality by designing simple Python video games during after‑school hours, applying their analytical mind from debate
    club and their disciplined approach from school projects to troubleshoot bugs methodically, though they sometimes overthink design choices due to their competitive streak.
  sports: Danelia Barrientos, a midfield enthusiast on the Riverdale Youth Soccer Club, trains twice weekly at the local park, cheers for the regional MLS team and follows the Seattle Kraken for off‑season
    inspiration, and they balance competitive drive with occasional reluctance to join team socials when stress peaks.
  arts: Danelia Barrientos, a digital illustration hobbyist, draws sci‑fi landscapes inspired by H.R. Giger and anime scenes reminiscent of Hayao Miyazaki, strums guitar chords from The Beatles to contemporary
    indie folk, and attends monthly local art showcases, where they occasionally critique peers with a skeptical eye.
  travel: Danelia Barrientos, an adventure‑curious teen, spends summers exploring nearby national parks such as Zion and Grand Canyon, dreams of attending the Tokyo Comic Con to meet favorite manga creators,
    and prefers budget backpacking over luxury stays, though they worry about missing school assignments during trips.
  culinary: Danelia Barrientos, an enthusiastic kitchen helper, loves preparing family‑style tamales and pozole on weekends, experiments with fresh cilantro, corn masa, and chipotle for flavor, and often
    swaps recipes online while juggling their gaming projects, yet they sometimes over‑spice dishes when stressed.
  core: Danelia Barrientos channels a competitive curiosity into coding, soccer, and sketching, balancing their practical ambition with a habit of over‑thinking and occasional stress‑driven splurges.
background:
  cultural: Danelia is a second‑generation Mexican‑American raised in Willowbrook, Illinois. At home, Spanish is spoken alongside English, and she grows up celebrating Mexican traditions such as Día de
    los Muertos, Posadas, and family gatherings with homemade tamales and mole. The vibrant Mexican community in the Chicago suburbs influences her worldview, blending the warmth and collectivism of her
    heritage with the individualistic, goal‑oriented culture of the Midwest. Her family places a strong emphasis on education, hard work, and respect for elders, which shapes her pragmatic yet curious outlook.
attributes:
  skills: '[''Analytical problem solving in math and science'', ''Bilingual communication (Spanish-English)'', ''Basic Python programming'', ''Project organization and time management'', ''Basic cooking
    and meal planning'', ''Budgeting and shopping assistance'']'
  hobbies: '[''Reading science fiction and mystery novels'', ''Digital illustration and sketching'', ''Playing soccer'', ''Creating simple video games with Python'', ''Learning to play the guitar'', ''Cooking
    traditional Mexican dishes with family'', ''Participating in school debate club'']'
  career_goals: Danelia aims to attend a high‑performing STEM‑focused high school where she can deepen her knowledge of computer science and biomedical engineering. She dreams of earning a degree in one
    of these fields and eventually working as a software engineer or biomedical researcher developing affordable health‑technology solutions for underserved communities, especially those with strong ties
    to her Mexican heritage. In the short term, she plans to compete in science fairs, coding competitions, and seeks leadership roles in school clubs to build a competitive edge.
