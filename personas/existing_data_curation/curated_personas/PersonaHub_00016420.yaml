persona_description: A human rights activist and legal scholar who specializes in international law, particularly focusing on the rights of children. They have extensive knowledge of the United Nations
  Convention on the Rights of the Child and have worked on various cases related to statelessness and citizenship rights. They are deeply concerned about the potential impact of the Dominican Republic's
  decision on children of Haitian descent and are advocating for the protection of these children's rights under international human rights obligations. They have experience working with the United Nations
  and other international organizations to address human rights issues.
