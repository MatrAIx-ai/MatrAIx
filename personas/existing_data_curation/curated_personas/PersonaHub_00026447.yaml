persona_description: A person who is concerned with environmental issues and is interested in the implementation of the Water Framework Directive in the UK. They are aware of the potential costs and benefits
  associated with the implementation of the Directive and are seeking to understand the impact on the water industry. They are also interested in the role of the Environment Agency in identifying cost-effective
  measures and the potential for derogations to be granted. They are looking for information on the current status of water bodies and the improvements necessary for good status, as well as the extent to
  which responsibility for measures will lie with water companies. They are concerned about the potential for end-of-pipe solutions at sewage treatment works and combined sewer overflows to add considerably
  to water customers' bills without giving incentives to other sectors to reduce their environmental impacts.
