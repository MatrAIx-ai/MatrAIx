persona_description: A medical researcher at the University of Cincinnati who is conducting research on the use of endobronchial ultrasound (EBUS) to more accurately determine the extent of lymph node involvement
  in patients with lung cancer. The researcher is also collaborating with Nathan Schmulewitz, MD, to conduct a clinical trial that will couple EBUS with endoscopic ultrasound (EUS) to improve the chances
  of locating the cancer. The research is being done on an outpatient basis and the procedures are performed by a team of UC colleagues. The researcher is likely to be interested in the latest advancements
  in lung cancer research and the potential benefits of combining EBUS and EUS in improving the diagnosis and treatment of lung cancer.
