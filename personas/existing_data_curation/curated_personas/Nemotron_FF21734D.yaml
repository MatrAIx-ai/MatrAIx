    proficiency (e.g., Toast, MarketMan)", "Social media marketing for restaurant promotion", "Community engagement and cultural programming", "Vendor negotiation and supplier relationship management",
    "Process improvement and Lean management"]'
  hobbies: '["Visiting art galleries and museums", "Exploring local street art and murals", "Cooking experimental fusion dishes", "Food and urban landscape photography", "Attending live music performances",
    "Reading contemporary literature and philosophy", "Traveling to cultural festivals", "Participating in community theater", "Yoga and mindfulness practices", "Gardening herbs for culinary use", "Wine
    and craft beer tasting", "Volunteer mentoring in culinary training programs"]'
  career_goals: Christine aims to transition from managing a single establishment to a regional leadership role, overseeing multiple venues that blend culinary excellence with artistic experiences. She
    envisions launching her own boutique eatery in Austin that doubles as an art gallery, showcasing local artists while offering a seasonal, culturally diverse menu. Long‑term, she hopes to mentor emerging
    women leaders in hospitality, develop a nonprofit program that teaches culinary and artistic skills to underserved youth, and become a recognized speaker at industry conferences on the synergy between
    food, culture, and community resilience.
