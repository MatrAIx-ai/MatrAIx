personas:
  professional: Christine Perlman, a seasoned restaurant executive and operations manager in Austin, they leverage over three decades of cost‑controlled inventory mastery, data‑driven budgeting, and high‑touch
    customer service while channeling their curiosity, competitive ambition, and calm resilience into building a regional portfolio that fuses culinary excellence with local art showcases.
  sports: Christine Perlman, a dedicated supporter of Austin FC and the Texas Longhorns, they regularly attend spring soccer matches, join the Austin Runners club for weekend five‑kilometer runs, and unwind
    with bi‑weekly mixed‑doubles tennis at a local community court, blending competitive spirit with community engagement.
  arts: Christine Perlman, an avid participant in Austin's cultural pulse, they frequent gallery openings at The Contemporary Austin, photograph street murals by Nubo and Grace Mist, attend live performances
    by St. Vincent and Leon Bridges, and draw inspiration from contemporary playwright Sarah Ruhl, weaving artistic appreciation into both personal leisure and professional branding.
  travel: Christine Perlman, a seasoned traveler with a taste for culinary and artistic immersion, they plan detailed itineraries for trips to Oaxaca’s bustling markets, Kyoto’s serene tea houses, and Barcelona’s
    Gaudí‑laden streets, yet always leave room for spontaneous street‑food discoveries, preferring boutique hotels that showcase local art while balancing a modest travel budget.
  culinary: Christine Perlman, a culinary experimenter whose kitchen doubles as a test lab, they delight in crafting pomegranate‑glazed pork belly with collard greens, chorizo‑infused shrimp tacos topped
    with cilantro‑lime salsa, and miso‑marinated beet salad featuring fresh basil harvested from their herb garden, showcasing a skill level that blends professional restaurant precision with fearless home‑cooking
    creativity.
  core: Christine Perlman, a calm yet competitively driven hospitality guru who channels curiosity into art‑infused dining while obsessively tracking every expense and occasionally hoarding vintage wine
    corks for good luck.
background:
  cultural: Christine grew up in a middle‑class Midwestern family with deep roots in American traditions of hospitality and community involvement. Her academic focus on the humanities fostered a lifelong
    curiosity about cultural expression, which she now channels into her professional life. Relocating to Austin exposed her to a melting pot of Southern hospitality, progressive art, and a thriving music
    scene, shaping a hybrid cultural identity that values both classic American service standards and the city’s avant‑garde creative spirit. This blend of conventional reliability and openness to unconventional
    ideas underpins her personal and professional worldview.
attributes:
  skills: '["Food service operations management", "Menu design and artistic plating", "Staff recruitment, training, and mentorship", "Inventory control and cost accounting", "Health and safety compliance",
