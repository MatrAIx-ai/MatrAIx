  career_goals: Patricia aims to transition into a senior creative director role at a regional advertising agency where she can shape strategic brand narratives and mentor emerging designers. She also dreams
    of launching her own boutique design studio that specializes in culturally resonant projects for local nonprofits, schools, and small businesses, emphasizing African-American heritage and Southern storytelling.
    In the longer term, she hopes to establish a mentorship program for Black designers in Georgia and become a recognized thought leader in community-focused design.
