persona_description: A Welsh education leader who is interested in improving educational outcomes for children living in poverty. The individual is aware of the increasing focus on the use of the Pupil
  Deprivation Grant (PDG) by Estyn, the Welsh Government, and local authorities. The education leader is looking for evidence-based guidance and resources to help them make effective use of the PDG to address
  the national priority of tackling poverty and breaking the link between poverty and low educational attainment. The individual is also interested in attending workshops to equip them with the knowledge,
  skills, and confidence needed to develop an effective plan for using the PDG in their school.
