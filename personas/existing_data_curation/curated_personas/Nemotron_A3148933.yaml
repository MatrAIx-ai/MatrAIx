personas:
  professional: A retired research scientist, Maria Rodriguez leverages their analytical acumen and bilingual communication skills to design community STEM workshops, meticulously writing grant proposals
    while navigating the occasional anxiety about meeting deadlines, and they relish guiding young minds through hands‑on projects.
  sports: As an active senior, Maria Rodriguez participates in the community center’s low‑impact salsa‑dance sessions, follows the Miami Heat with avid enthusiasm, attends occasional Marlins games with
    grandchildren, and maintains a gentle walking routine along the nearby beach promenade to stay fit, all while they cherish the social camaraderie of these activities.
  arts: An enthusiastic creative, Maria Rodriguez knits vibrant scarves inspired by Monet’s garden hues, enjoys listening to Ella Fitzgerald’s jazz standards while directing the choir, and reads biographies
    of historical figures like Eleanor Roosevelt and Albert Einstein to fuel storytelling at family gatherings, all while they cherish the quiet moments of reflection.
  travel: A thoughtful explorer, Maria Rodriguez prefers short, well‑planned trips such as a weekend getaway to the Florida Keys, a river cruise through Savannah, Georgia, and dreams of a cultural pilgrimage
    to Barcelona’s historic neighborhoods, balancing travel costs with a modest senior travel stipend, and they meticulously map out each itinerary to avoid fatigue.
  culinary: An accomplished home cook, Maria Rodriguez prepares family‑recipe spiced rice and chicken stew, sweet fried plantains, and fresh mango salsa, carefully selects cilantro, cumin, and lime, and
    delights in sharing these meals with family while occasionally splurging on exotic spices that remind them of youthful adventures.
  core: Maria Rodriguez, a 96‑year‑old garden‑tending, salsa‑loving mentor, blends relentless curiosity with occasional waves of anxiety, turning meticulous planning into community impact while never missing
    a bingo night or a fresh herb in the kitchen, and they cherish each moment of purposeful activity.
background:
  cultural: Maria was raised in a bilingual Hispanic household in Miami, with roots that trace back to Cuban immigrants who settled in Hialeah after the 1960s. Her upbringing blended American education
    with vibrant Latino traditions—celebrating fiestas, preparing family recipes, and attending Catholic services. Fluent in both Spanish and English, she navigates two cultural worlds, valuing family loyalty,
    respect for elders, and communal reciprocity. Maria’s identity is shaped by the resilient spirit of the Cuban‑American diaspora, the warmth of close‑knit neighborhood networks, and a lifelong commitment
    to preserving and sharing her cultural heritage with younger generations.
