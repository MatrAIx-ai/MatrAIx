  career_goals: Although officially retired, Maria’s ambition is to convert her lifetime of expertise into a lasting legacy for her community. She aims to mentor high‑school and college students in STEM
    through hands‑on workshops at the local senior center, develop a small scholarship fund for promising Hispanic students, and document oral histories of Miami’s Latino elders to preserve cultural heritage.
    Maria also aspires to serve on the advisory board of a nonprofit that bridges the digital divide for low‑income seniors, using her organizational talents to secure grants and design training curricula.
    Through these pursuits she hopes to stay intellectually engaged, foster intergenerational connections, and leave a tangible impact that reflects both her practical mindset and her deep curiosity.
