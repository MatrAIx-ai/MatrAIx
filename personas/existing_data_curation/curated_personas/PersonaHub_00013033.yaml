persona_description: A linguist and scholar who specializes in ancient American studies, particularly the Book of Mormon and its anachronisms. They are interested in the use of ancient American languages
  and cultures in the Book of Mormon and the implications of these references for the historical context of the Americas. They have a particular interest in the use of the word "silk" in the Book of Mormon
  and the potential implications of this for the pre-Columbian textile traditions of the Americas. They are likely to be familiar with the theories and evidence surrounding the possible use of wild silk
  in pre-Columbian Oaxaca and the implications of this for the Book of Mormon's portrayal of ancient American societies.
