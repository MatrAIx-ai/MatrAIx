  hobbies: '[''Fishing'', ''Hiking'', ''Herb gardening'', ''Cooking (Asian‑Southern fusion)'', ''Bridge'', ''Live music events'', ''Karaoke'', ''Volunteer work with seniors'', ''Exploring smart‑home technology'']'
  career_goals: Liang aims to transform his current inn into a boutique eco‑friendly destination that showcases a blend of Asian and Southern hospitality. He plans to introduce sustainable practices, upgrade
    technology for seamless check‑in experiences, and achieve higher occupancy rates that earn regional awards. Over the next five years, he hopes to mentor a new generation of lodging managers, eventually
    transitioning to a consulting role where he can advise other small‑town properties on modernizing operations while preserving local character.
