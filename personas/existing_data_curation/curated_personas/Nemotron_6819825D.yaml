personas:
  professional: Carlos Febles, a 17‑year‑old aspiring IT support specialist, blends their curiosity for systems with a relaxed, sometimes disorganized approach, often improvising hardware repairs for friends
    while juggling schoolwork and marathon gaming sessions.
  sports: Carlos Febles, a 17‑year‑old skateboarding enthusiast, spends weekends at the local Potrero Hill skate park, roots for the Golden State Warriors and the San Jose Earthquakes, and treats skateboarding
    as their primary fitness routine despite a habit of skipping warm‑ups that sometimes leads to bruises.
  arts: Carlos Febles, a 17‑year‑old video‑game strategist, channels their creativity by sketching street scenes of their neighborhood while listening to Latin pop hits by Bad Bunny and J Balvin and indie
    tracks from Clairo, using these soundtracks as inspiration for impromptu doodles and occasional online fan art.
  travel: Carlos Febles, a 17‑year‑old aspiring food‑stall owner, dreams of short road trips to Yosemite and a future backpacking journey to Central America to taste authentic street foods, yet budget constraints
    keep most of their travel limited to local weekend hikes and visits to family members across the Bay Area.
  culinary: Carlos Febles, a 17‑year‑old home‑cooking enthusiast, perfects pupusas filled with melted cheese, loroco, and refried beans, crafts tamales using masa, pork, and fresh chilies, and experiments
    with ramen bowls topped with soft‑boiled eggs and soy‑marinated vegetables, favoring ingredients like corn tortillas, ripe avocado, and cilantro.
  core: Carlos Febles, a 17‑year‑old gamer‑tech tinkerer, balances relentless curiosity with a laid‑back, often scattered routine, turning idle moments into hardware fixes while worrying about the future
    and habitually forgetting to charge their phone.
background:
  cultural: Carlos was raised in a bilingual Salvadoran household in San Francisco's Mission District. His parents emigrated from El Salvador, bringing with them traditions of family meals, folklore, and
    celebrations such as Día de la Madre and Salvadoran Independence Day. The household emphasizes respect for elders, strong family ties, and a love for traditional music like cumbia and folk songs. Living
    in a diverse, progressive city, Carlos also absorbs influences from the broader Bay Area culture, including the tech scene, environmental activism, and a sense of social responsibility. This blend of
    Salvadoran heritage and San Franciscan multiculturalism shapes his identity, values, and aspirations.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Bilingual communication (Spanish/English)'', ''DIY electronics repair and soldering'', ''Cooking traditional Salvadoran dishes'', ''Small‑group collaboration'']'
  hobbies: '[''Playing strategy and RPG video games'', ''Skateboarding in local parks'', ''Cooking pupusas and tamales with family'', ''Listening to Latin pop, reggaeton, and indie music'', ''Following
    tech blogs and watching tech documentaries'', ''Sketching neighborhood street scenes'']'
  career_goals: Carlos aims to earn his GED within the next year and pursue entry‑level certifications such as CompTIA A+ and Network+ to secure a stable IT support position. He hopes to later specialize
    in hardware repair or network administration, providing a reliable income to support his family. Parallel to his tech aspirations, he dreams of opening a modest pop‑up kitchen or food stall that serves
    authentic Salvadoran street food at local markets, merging his culinary passion with entrepreneurship. He also wants to give back to the Salvadoran community in San Francisco by offering free basic
    tech workshops for youth.
