    Analysis and Cost Modeling'']'
  hobbies: '[''Classic Car Restoration'', ''Engine Repair Projects'', ''Fishing'', ''Gardening'', ''Reading Historical Non‑Fiction'', ''Technical Automotive Literature'', ''Truck Driving Simulation Video
    Games'', ''Small‑Group Church Activities'', ''Local Community Fairs'']'
  career_goals: John aims to transition from an individual driver role to a leadership position within the transportation sector over the next five years. He plans to earn a Certified Transportation Professional
    (CTP) credential and eventually become a fleet supervisor or logistics manager, overseeing route planning, driver scheduling, and safety compliance for a regional trucking operation. Simultaneously,
    he is considering launching a modest independent trucking business, starting with one or two trucks to provide more control over his schedule and reduce stress. Continuing his education, John hopes
    to complete a bachelor's degree in logistics or business administration to broaden his strategic capabilities and secure a stable, higher‑earning future for his family.
