  career_goals: Over the next few years Howard aims to move into a supervisory role, becoming a shift supervisor and eventually a security training manager at the casino. He plans to obtain the Certified
    Protection Professional (CPP) credential and to design a mentorship program for new hires, drawing on his education degree. Long-term, he envisions launching a private security consulting firm that
    serves small-town venues and community events, while also contributing to local emergency preparedness initiatives.
