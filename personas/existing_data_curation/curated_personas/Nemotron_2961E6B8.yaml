  hobbies: '[''Cooking traditional Asian cuisine'', ''Vegetable gardening'', ''Community volunteering (home-energy workshops)'', ''Book club (mystery novels)'', ''Line-dancing'', ''Hiking and nature photography'',
    ''Family gatherings'']'
  career_goals: Kyeong aims to earn the NATE Master Technician certification within the next year and to become a senior field supervisor at her company, overseeing a team of mechanics. She aspires to launch
    a community‑focused HVAC service that offers discounted maintenance for senior citizens and low‑income families in Isanti County. Long‑term, she hopes to mentor more women entering the trades, develop
    training workshops on sustainable refrigerants, and possibly open her own small business that blends technical expertise with her passion for helping neighbors.
