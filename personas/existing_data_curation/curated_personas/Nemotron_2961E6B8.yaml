personas:
  professional: Kyeong Li is a seasoned heating, air‑conditioning, and refrigeration mechanic with over twenty years of hands‑on experience, excelling at diagnosing complex HVAC systems, leading apprentices,
    and translating technical details into friendly explanations, while their routine‑loving, sociable nature makes them the go‑to person for both reliable service scheduling and community workshop facilitation,
    positioning them for a senior field supervisor role and a future community‑focused HVAC business.
  sports: Kyeong Li enjoys weekly line‑dancing classes that keep them energetic and social, hikes the nearby trails with their family as a summer and fall fitness ritual, cheers for the Minnesota Vikings
    and Minnesota Wild, and belongs to the Isanti County Hiking Club, blending outdoor stamina with community spirit.
  arts: Kyeong Li participates in the Saint Francis book club where they dissect mystery novels by Agatha Christie and Tana French, frequents community theater productions starring local talent, and relaxes
    listening to folk icons like Bob Dylan and classic film performances by Meryl Streep, letting storytelling shape their empathy and communication style.
  travel: Kyeong Li plans vacations with meticulous itineraries, favoring family‑friendly road trips to destinations like Duluth’s Lakeside Beach, Mackinac Island, and the Yellowstone National Park loop,
    while dreaming of a culinary pilgrimage to Kyoto and a weekend getaway to the Canadian Maritimes, balancing adventure with budget‑conscious choices that accommodate their adult children’s schedules.
  culinary: Kyeong Li cooks traditional Korean and Chinese dishes such as kimchi stew, bulgogi, mapo tofu, and peppered dumplings using garden‑fresh vegetables like heirloom tomatoes, bok choy, and red
    peppers, displaying a high skill level in stir‑frying and fermentation, yet occasionally over‑spices a pot of bibimbap when experimenting with new gochujang blends.
  core: Kyeong Li blends a pragmatic, routine‑driven work ethic with a talkative, community‑focused spirit, juggling HVAC mastery, garden stewardship, and spontaneous line‑dance outings, all while habitually
    organizing their toolbox by color and occasionally forgetting to water their succulents.
background:
  cultural: Kyeong is a first‑generation American of East Asian heritage; her parents emigrated from South Korea in the early 1970s and settled in Minnesota. She grew up bilingual, speaking Korean at home
    while attending public schools in the Twin Cities area. Her family observes Lunar New Year and Chuseok, maintaining close ties with the local Korean community. At the same time, she embraces Midwestern
    values of neighborliness, practical hard work, and community service, blending both cultures in her daily life and in how she interacts with customers and colleagues.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration system troubleshooting'', ''Preventive maintenance'', ''Energy-efficiency optimization'', ''EPA certification handling'', ''Customer communication'',
