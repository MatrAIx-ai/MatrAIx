  career_goals: Sherry dreams of growing up to become someone who can help others and protect the natural world. She imagines being a teacher who inspires curiosity, a veterinarian caring for animals, or
    an artist who creates works that bring joy. Her ambition is to combine her love for art, science, and compassion to make a positive impact on her community and the environment.
