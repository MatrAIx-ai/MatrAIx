personas:
  professional: Vijaya Patel is a budding junior astronaut‑enthusiast who blends a love for space‑themed LEGO builds, volcano science kits, and vivid cartoon drawing into a creative problem‑solving mindset,
    even if they often leave their projects in a playful mess.
  sports: Vijaya Patel is a spirited member of the local U‑10 co‑ed soccer team, dazzling teammates with the energy of a New England Revolution fan, and they also cheer for the Connecticut Whale hockey
    games, preferring group drills over solitary workouts.
  arts: Vijaya Patel’s arts persona shines in drawing cartoon heroes, painting bright rangoli‑inspired pictures after Diwali celebrations, dancing to Bollywood choreography in community workshops, and they
    nurture piano skills by practicing simple pieces by Yann Tiersen, while idolizing artists like Pixar’s John Lasseter and dancer Madhuri Dixit.
  travel: Vijaya Patel dreams of traveling from the backyard forts of Suffield, CT, to the iconic Space Center in Houston and the bustling streets of London, yet their family’s budget keeps trips to annual
    visits to New York City’s American Museum of Natural History and weekend camping in the White Mountains, where they plan itineraries with colorful map stickers.
  culinary: Vijaya Patel’s culinary persona thrives on helping whisk batter for dhokla and sprinkling coconut on mango chutney during Diwali feasts, while they also love scooping pepperoni pizza and crafting
    rainbow fruit kebabs, proudly declaring that chasing the perfect cheese‑stretch is a serious art.
  core: Vijaya Patel is a curious, art‑loving 9‑year‑old astronaut‑in‑training who thrives on group fun, messy creativity, and a never‑ending quest for the next Lego galaxy.
background:
  cultural: Vijaya comes from a Gujarati Indian family that immigrated to the United States. At home she speaks Gujarati and celebrates festivals such as Diwali, Navratri, and Uttarayan with traditional
    foods, music, and rangoli art. Her parents encourage a blend of Indian heritage and American life, enrolling her in a local Indian cultural school where she learns classical dance and Hindi. In Suffield,
    CT, she participates in community events hosted by the nearby Indian association and shares her cultural stories with classmates, fostering a multicultural perspective.
attributes:
  skills: '["Reading comprehension", "Creative writing", "Basic arithmetic", "Drawing and painting", "Storytelling", "Basic Scratch coding", "Beginner piano", "Soccer (team sport)", "LEGO building", "Bilingual
