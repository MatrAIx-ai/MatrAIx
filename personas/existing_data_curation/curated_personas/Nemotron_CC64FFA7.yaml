  hobbies: '["Drawing and painting", "Storytelling", "Reading adventure books", "Building LEGO space sets", "Playing soccer", "Beginner piano lessons", "Science experiment kits", "Bollywood dance", "Cooking
    Indian dishes with family", "Attending cultural festivals"]'
  career_goals: She dreams of exploring many possibilities, hoping one day to become a scientist‑artist who discovers new ideas and shares them through art. She imagines designing rockets or creating wildlife
    illustrations, and she also likes the thought of teaching younger kids about science and art. Her ambition is to keep learning, stay open to unconventional paths, and eventually combine her love for
    the environment, technology, and creativity in a career that lets her inspire others.
