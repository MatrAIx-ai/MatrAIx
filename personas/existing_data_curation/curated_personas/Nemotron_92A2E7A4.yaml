  hobbies: '[''Fishing'', ''Deer hunting'', ''Hiking'', ''Classic rock listening'', ''Guitar playing'', ''Model train building'', ''DIY woodworking'', ''Barbecue cooking'', ''County fair attendance'', ''Volunteering
    at community center'', ''Exploring 3D printing'']'
  career_goals: Jon aims to move from senior press operator to press floor supervisor within the next three years, earning industry certifications such as the NPES Certified Print Technician. He wants to
    lead the introduction of digital printing technologies in his current shop, blending traditional offset expertise with modern workflow efficiency. In the longer term, his ambition is to open a boutique
    print shop that serves local artists, musicians, and small businesses, offering custom posters, apparel, and limited‑edition prints. He also hopes to complete a GED and take night courses in business
    management to support his entrepreneurial goals while maintaining the flexible lifestyle he values.
