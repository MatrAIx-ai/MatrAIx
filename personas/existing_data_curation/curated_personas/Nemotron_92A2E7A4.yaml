personas:
  professional: Jon Anderson, a 30‑year‑old master of offset and rotary presses, blends hands‑on curiosity with practical efficiency on the production floor, skillfully calibrating inks, troubleshooting
    mechanical hiccups, and training new staff while they flexibly pursue an NPES certification and quietly advocate for digital‑printing upgrades despite a habit of misplacing work orders.
  sports: Jon Anderson is a loyal fan of the Dallas Cowboys and the Texas Longhorns, they spend Sundays tailgating at high‑school football games, join a local fishing club that meets at Lake Colorado City
    for early‑morning casts, and stay fit through hunting trips and rugged pickup‑truck rides rather than structured gym workouts.
  arts: Jon Anderson channels their love of classic‑rock icons like Led Zeppelin and Stevie Ray Vaughan into weekend guitar jam sessions, curates a wall of vintage model‑train dioramas inspired by John
    Allen’s artistry, and seeks out Texas folk prints at the Mitchell County fair, all while they occasionally neglect to finish a woodworking project before moving on to the next.
  travel: Jon Anderson prefers low‑key road trips that blend fishing and hunting, they plot routes from their pickup to the Guadalupe River for trout, make occasional pilgrimages to Dallas for printing
    trade shows, and dream of a cross‑country drive to Montana’s Glacier National Park with a stop at Nashville’s Music Row to soak up the songwriting scene.
  culinary: Jon Anderson is a self‑taught grill master who swears by a dry rub of smoked paprika, brown sugar, and cayenne on thick‑cut brisket, they relish pork ribs slathered in tangy sauce with hearty
    sides like pinto beans and corn on the cob, and occasionally treat themselves to shrimp po’boys from a coastal seafood shack after a long fishing day.
  core: Jon Anderson is a grease‑stained, guitar‑strumming press operator who balances a love for vintage rock with a laissez‑faire approach to budgeting, they never quite master a calendar, and they keep
    a secret stash of 3‑D‑printer filament for midnight projects.
background:
  cultural: Jon grew up in Colorado City, a tight‑knit, predominantly white, working‑class town in West Texas. His family has deep roots in the region’s agricultural and oil industries, instilling a strong
    work ethic, self‑reliance, and a big‑sky outlook. Community life revolves around high‑school football Friday nights, church gatherings, and county fairs, which fostered his social but laid‑back demeanor.
    The local culture values practicality, hospitality, and a willingness to help neighbors, shaping Jon’s cooperative yet assertive nature. While he left formal schooling early, the region’s emphasis on
    hands‑on trade skills gave him the practical knowledge that fuels his career in printing.
attributes:
  skills: '[''Offset press operation'', ''Color calibration'', ''Ink mixing'', ''Mechanical troubleshooting'', ''Preventive maintenance'', ''Safety compliance'', ''Adobe InDesign'', ''Adobe Photoshop'',
