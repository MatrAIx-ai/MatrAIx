  hobbies: '["Book club","Gardening","Community theater","Local festivals and open‑mic events","Genealogy research","Day trips to historic sites","Volunteer event hosting"]'
  career_goals: At this stage, Karen aims to transition into a supervisory or training role where she can mentor younger attendants and shape service policies that balance innovation with reliability. She
    hopes to spearhead a community outreach program that improves transportation access for seniors and persons with disabilities in Windham County. Additionally, she plans to contribute her expertise to
    local transportation planning committees, advocating for safety improvements and practical technology upgrades. On a personal level, she desires to stay engaged, maintain her health, and continue learning
    about emerging service tools.
