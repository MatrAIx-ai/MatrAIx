  career_goals: Hailey aims to move from an administrative assistant to an office manager or operations coordinator within the next three to five years. She plans to earn the Certified Administrative Professional
    (CAP) credential and complete an associate’s degree in business administration to solidify her expertise. Her ambition includes leading a small team of administrative staff, implementing digital workflow
    solutions to boost efficiency, and eventually transitioning into a junior project‑management role. She also hopes to balance professional advancement with family life, maintaining the flexibility that
    she values.
