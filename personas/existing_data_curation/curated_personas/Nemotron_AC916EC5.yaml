personas:
  professional: A seasoned community organizer, Lissette Santos leverages decades of volunteer experience, meticulous budgeting, and bilingual fluency to coordinate cultural celebrations and senior‑center
    cooking workshops, applying a structured, practical mindset while radiating sociable warmth and calm resilience, qualities they embody daily.
  sports: An enthusiastic participant in low‑impact fitness, Lissette Santos attends weekly Latin dance classes at the senior center, joins a local walking club that meets for morning strolls in Griffith
    Park, and cheerfully follows the Los Angeles Lakers, Dodgers, and LA Galaxy, a routine they sustain through structured social engagement.
  arts: A devoted lover of the arts, Lissette Santos enjoys listening to the timeless songs of Chabuca Granda and Eva Ayllón, watching classic telenovelas such as "María la del Barrio" and "La Usurpadora,"
    and attending performances by the Los Angeles Latino Theater Company, experiences they cherish as a source of inspiration for their own storytelling.
  travel: A thoughtful traveler, Lissette Santos favors well‑planned day trips to nearby Santa Barbara’s waterfront, weekend hikes in Joshua Tree, and dreams of revisiting the historic city of Cusco and
    the ruins of Machu Picchu, yet balances these ambitions with family responsibilities and a modest travel budget, a plan they carefully schedule each year.
  culinary: An accomplished home chef, Lissette Santos skillfully prepares causa limeña with aji amarillo, avocado, and boiled potatoes, sizzles lomo saltado using beef, soy sauce, and cilantro, and simmers
    arroz con pollo with saffron, peas, and fresh herbs, always sourcing ingredients from the local farmer’s market to adapt traditional flavors to Southern California’s pantry, a practice they cherish
    while sharing stories with grandchildren.
  core: Lissette Santos, a vibrant 76‑year‑old with a structured yet sociable spirit, blends meticulous budgeting, lively dance, and a love for traditional coastal cuisine while occasionally misplacing
    their spectacles during gardening, habits they find endearing.
background:
  cultural: Lissette Santos was born in the highlands of Peru and moved to the United States with her husband when they were in their early thirties, eventually settling in Pico Rivera, California. She
    retains a strong connection to her Peruvian roots through language, food, music, and Catholic traditions. She celebrates national holidays such as Independence Day and Inti Raymi with family gatherings,
    and she prepares traditional dishes for community festivals. Although she primarily speaks Spanish at home, she has learned functional English to navigate daily life in Los Angeles County. Her cultural
    identity is shaped by a blend of Andean customs and the vibrant Latino community of Southern California, and she actively contributes to preserving this heritage through volunteer work and intergenerational
    storytelling.
attributes:
