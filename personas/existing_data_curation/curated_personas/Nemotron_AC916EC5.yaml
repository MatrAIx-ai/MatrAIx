  hobbies: '["Cooking Peruvian dishes", "Dancing to marinera and música criolla", "Weekly Latin dance classes", "Gardening", "Knitting and crocheting", "Attending Mass and church outreach", "Park walks",
    "Watching telenovelas", "Storytelling and sharing memories"]'
  career_goals: Even though she is no longer in the formal workforce, Lissette’s primary ambition is to stay active, healthy, and independent while sharing her cultural heritage with younger generations.
    She hopes to compile a family cookbook featuring her favorite Peruvian recipes, host regular cooking workshops at the senior center, and mentor other seniors in navigating local resources. Lissette
    also aspires to continue volunteering as an event coordinator for the Peruvian community association, ensuring that traditional celebrations are preserved. Maintaining close ties with her spouse, children,
    and grandchildren, she aims to be a reliable support system and a source of encouragement for her extended family.
