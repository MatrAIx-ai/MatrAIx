persona_description: A historian who specializes in the study of pandemics and their impact on human societies. This individual is interested in the causes and effects of the Spanish flu pandemic of 1918-19,
  which resulted in the deaths of as many as 50 million people worldwide. They are particularly curious about the specific strain of the flu that was most severely affected in the late 20s, and how it was
  able to evade the immune systems of those in their most vulnerable age group. They are also interested in the role of modern medicine in the face of such a devastating epidemic, and how it was able to
  prevent the spread of the disease.
