persona_description: A maritime historian with expertise in the Great Lakes and the study of shipwrecks. The individual is interested in the discovery of new shipwrecks, the history and context of the shipwrecks,
  and the significance of the discoveries to maritime history and the Great Lakes region. They are likely to be knowledgeable about the types of ships that were used in the Great Lakes during the 19th century,
  the methods used to locate shipwrecks, and the preservation and documentation of shipwreck sites. They are also likely to be interested in the broader implications of the discovery of the 19th-century
  schooner in Lake Ontario for the understanding of the history and culture of the Great Lakes region.
