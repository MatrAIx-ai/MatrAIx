personas:
  professional: A budding LEGO architect named Prasenjit Raja treats each set like a miniature construction site, applying step‑by‑step instructions with the precision of a young engineer while delighting
    in the predictability of orderly builds.
  sports: A playful soccer enthusiast, Prasenjit Raja joins a neighborhood under‑8 league, emulating their favorite pro team Manchester United’s midfielders, and practices drills at the local park under
    the watchful eye of a coach who values fair play.
  arts: A creative colorist, Prasenjit Raja spends afternoons drawing animals from picture books, humming both popular kids’ songs and occasional Bollywood tunes while copying the bold brushstrokes of classic
    illustrators like Dr. Seuss and the whimsical art of Disney’s animated films.
  travel: A curious explorer, Prasenjit Raja has already visited a nearby wildlife sanctuary and a family beach resort, dreaming of future trips to Tokyo’s Disneyland and the ancient forts of Rajasthan,
    always packing a small notebook to sketch new scenery.
  culinary: A junior kitchen helper, Prasenjit Raja delights in rinsing crisp carrots, stirring fragrant basmati rice, and sprinkling a pinch of turmeric into simple dishes like vegetable pulao, gradually
    mastering the art of measuring ingredients with a toy spoon.
  core: Prasenjit Raja is a detail‑loving six‑year‑old who blends structured LEGO building, anxious curiosity, and a love for vibrant music and food into a uniquely organized yet emotionally expressive
    world.
background:
  cultural: Prasenjit is a South Asian American raised in Ames, Iowa. His family maintains traditions from their Indian (or Bangladeshi) heritage, speaking Hindi (or Bengali) at home and celebrating festivals
    such as Diwali and Holi with family gatherings and special foods like biryani, dal, and sweets. He enjoys the flavors of South Asian cuisine while also loving typical Midwestern foods like corn dogs
    and apple pie. At school, he participates in American holidays and activities, blending both cultures seamlessly. He is bilingual, comfortable speaking English with friends and teachers, and using his
    native language with family. The household values education, respect for elders, and community, which shape his disciplined yet compassionate outlook.
