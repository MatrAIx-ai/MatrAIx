  career_goals: Prasenjit often talks about becoming a teacher one day because he likes helping younger kids understand things and enjoys the clear structure of a classroom. He is also fascinated by building
    things and imagines himself as an engineer who designs fun, safe toys and play spaces. Occasionally, he mentions wanting to be an astronaut because he loves watching the night sky, but he prefers careers
    that provide routine, clear expectations, and the chance to help others, such as teaching or engineering.
