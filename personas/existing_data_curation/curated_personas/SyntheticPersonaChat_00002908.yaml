    User 1: So, are you both excited to be parents?

    User 2: We''re both really excited! We''ve been planning for this for a while now.

    User 1: That''s great to hear! I''m sure you''ll be great parents.

    User 2: Thanks, we''re trying our best!

    User 1: Well, I''m sure it will all be fine. Just relax and enjoy the moment.

    User 2: Thanks, I will!

    User 1: So, what are you going to do after you have the baby?

    User 2: We''re not sure yet, we''re still thinking about it. But we''re both excited to start this new chapter in our lives.

    User 1: That''s great to hear! Well, I wish you both the best of luck!

