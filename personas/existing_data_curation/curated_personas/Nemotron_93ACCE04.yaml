  career_goals: He dreams of becoming an astronaut, inspired by his fascination with space and his desire to design functional rockets that work reliably. At the same time, he wants to be a champion in
    his soccer league, seeing competition as a way to test his skills. He also hopes to win a local science fair by creating a simple, practical invention, such as a better water filtration system for his
    backyard. These goals reflect his blend of curiosity for new ideas, practical problem‑solving, and competitive drive.
