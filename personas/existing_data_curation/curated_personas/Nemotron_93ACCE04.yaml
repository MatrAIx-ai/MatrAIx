personas:
  professional: A budding LEGO engineer named Brad Woods channels their curiosity and practicality into elaborate moving‑part constructions, applies early coding logic from educational video games, and
    approaches each build with a critical, competitive edge while staying relaxed about strict planning.
  sports: As a spirited midfielder for the Eastside Strikers youth soccer club, Brad Woods combines their competitive drive with a love for fast bike races on neighborhood trails, idolizes Lionel Messi
    and follows the FC Barcelona team, while they also cheer for the local baseball team, the Cedar Rapids Crushers.
  arts: A cartoon‑drawing enthusiast named Brad Woods sketches superhero scenes inspired by Marvel’s Spider‑Man and Batman, devours dinosaur and space picture books from National Geographic Kids, and they
    channel this visual flair into LEGO set designs, all while humming tunes from Disney’s ‘Moana’ and Pixar’s ‘Toy Story.’
  travel: Brad Woods prefers hands‑on adventures, having explored the local Cedar Grove Nature Preserve to collect rocks and insects, visited the Jurassic Museum at age five, and dreaming of a future trip
    to the Kennedy Space Center and the Grand Canyon, they plan trips with a loose itinerary that leaves room for spontaneous discovery.
  culinary: A budding chef named Brad Woods loves building snack towers of cheese cubes, pepperoni slices, and carrot sticks, often whipping up mac and cheese or banana pancakes with minimal supervision,
    and they proudly claim the perfect PB&J sandwich as their signature dish.
  core: Brad Woods is a curious, competitive six‑year‑old who constructs moving LEGO marvels, dominates the sandbox soccer field, and piles their piggy bank with coins as messily as their toy room.
background:
  cultural: Brad lives in Northfield, Ohio, a suburban community in Summit County with a predominantly white, middle‑class population. His family traces its roots to German and Irish ancestry, typical of
    many Midwestern families, and they celebrate holidays such as Thanksgiving and Fourth of July with community gatherings. He attends the local elementary school and participates in the town’s youth soccer
    league and library story‑time events. The neighborhood values practicality, self‑reliance, and a relaxed approach to schedules, which align with Brad’s easygoing nature. He is exposed to typical American
    media, enjoys local fair activities, and benefits from a supportive community that encourages curiosity and hands‑on learning.
