  career_goals: Kayla aims to reach a principal engineer role where she can shape the technical vision of high‑impact products while maintaining the autonomy to work on complex problems independently. She
    hopes to lead a small, elite team focused on security‑critical infrastructure, drive the adoption of privacy‑by‑design principles, and earn a patent for an innovative encryption method. Over the next
    five years she also plans to speak at technical conferences on data privacy, publish scholarly articles, and eventually launch a boutique consultancy that advises startups on building secure, scalable
    systems without compromising on practical engineering rigor.
