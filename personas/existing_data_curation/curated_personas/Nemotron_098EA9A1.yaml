personas:
  professional: Veterinary technologist Liza Barbeau, a 52‑year‑old specialist in small‑animal anesthesia, diagnostic imaging, and surgical support, leverages their curiosity and competitive drive to innovate
    low‑stress anesthesia protocols while mentoring junior staff with clear, organized teaching sessions.
  sports: Liza Barbeau roots for the Detroit Tigers, Lions, and Pistons, participates in a local weekend hiking club that meets at Lake Orion, and attends occasional community 5K runs, all while keeping
    a competitive edge by tracking personal times on Strava.
  arts: Creative pursuits find Liza Barbeau sketching animal portraits in oil after visiting the Detroit Institute of Arts to study works by Frida Kahlo and Georgia O'Keeffe, attending folk concerts featuring
    Sarah Jarosz and jazz nights headlined by Wynton Marsalis, and curating a small gallery show that blends veterinary science illustrations with local Midwestern scenery.
  travel: Liza Barbeau’s travel style blends meticulous planning with spontaneous detours, having explored the art streets of Paris, the wildlife reserves of Costa Rica, and multiple Michigan state parks
    like Porcupine Mountains, while they dream of a retreat in the Canadian Shield where they could paint sunrise over Lake Superior.
  culinary: At the kitchen table, Liza Barbeau experiments with seasonal Midwestern dishes such as roasted Michigan cherries glazed pork tenderloin, wildflower‑infused salad with bee pollen, and creamy
    corn chowder, wielding a well‑used set of oil‑paint‑scented aprons and occasionally over‑salting recipes when the stress of clinic shifts their focus.
  core: Liza Barbeau merges a sharp, competitive veterinary mind with a vibrant artistic soul, balancing meticulous work, budget‑conscious habits, and a love for nature, all while occasionally indulging
    in impulsive brush‑buying sprees and forgetting routine health appointments.
background:
  cultural: Liza’s cultural background is rooted in a Midwestern American upbringing with a family heritage that traces back to French‑Canadian ancestors, reflected in the Barbeau surname. Growing up in
    the Detroit metropolitan area, she absorbed the region’s blend of industrious work ethic, community solidarity, and appreciation for diverse artistic expressions. She celebrates traditional American
    holidays such as Thanksgiving and the Fourth of July while also honoring occasional French‑Canadian customs passed down through family stories, like sharing a baguette and maple‑syrup desserts during
    winter gatherings. Liza values the collaborative spirit of local neighborhood associations and veterinary networks, and she actively participates in cultural events that highlight the rich mosaic of
    ethnicities in Wayne County. This blend of heritage and contemporary Midwestern life informs her balanced perspective on professional competition, community service, and artistic curiosity.
attributes:
  skills: '["Veterinary anesthesia and pain management", "Diagnostic imaging (radiography, ultrasonography)", "Surgical instrument preparation and assistance", "Laboratory diagnostics (hematology, cytology,
    microbiology)", "Pharmacy management and medication compounding", "Client education and counseling", "Emergency triage and critical care support", "Electronic medical records (eVeterinary) administration",
    "Quality control and infection control protocols", "Animal behavior assessment and enrichment", "Team leadership and staff training", "Research and continuing education in emerging veterinary techniques"]'
  hobbies: '["Oil painting and sketching", "Visiting art museums and local galleries", "Photography, especially animal portraiture", "Gardening with native Michigan plants", "Hiking in regional parks and
    nature reserves", "Reading scientific journals and popular science books", "Volunteer work at animal shelters and community pet health clinics", "Participating in book clubs and discussion groups",
    "Practicing yoga and mindfulness meditation", "Cooking seasonal Midwestern cuisine", "Attending live music performances (folk, blues, jazz)", "Traveling to cultural festivals and historic sites"]'
  career_goals: Liza aims to transition into a senior leadership role within her clinic, becoming Lead Veterinary Technician and establishing a formal mentorship program for new techs. She plans to earn
    an Advanced Veterinary Technician certification in anesthesia and a specialty credential in veterinary radiology, positioning herself as a go‑to expert for complex cases. Over the next five years, she
    hopes to present her work on low‑stress anesthesia protocols at national conferences and publish a practical guide for client communication. Ultimately, Liza envisions launching a community outreach
    initiative that combines pet health education with local art events, fostering both animal welfare and cultural enrichment in Westland.
