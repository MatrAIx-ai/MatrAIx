personas:
  professional: Jennifer Wyatt, a 20-year-old housekeeping professional, combines a strong preference for routine with a practical mindset to efficiently deep-clean homes and small businesses, while they
    occasionally relax obligations which can lead to a bit of disorganization, yet they consistently resolve client concerns on the spot and aim to earn a hospitality certification to become a lead housekeeper
    and eventually launch their own cleaning service.
  sports: Jennifer Wyatt favors low-impact fitness like shoreline walks and weekend fishing trips with a neighbor, supports the Green Bay Packers and the Minnesota Twins, and participates in a community
    softball league where they play catcher on a casual co-ed team, all while preferring a relaxed, flexible schedule over intensive training regimens.
  arts: Jennifer Wyatt’s artistic life revolves around listening to country icons like Dolly Parton and folk storytellers such as John Prine while crocheting scarves, devouring light romance novels by Nora
    Roberts, and attending occasional community church concerts featuring local folk choirs, which together stitch a tapestry of simple, heartfelt creativity.
  travel: Jennifer Wyatt’s travel style blends modest road trips to Michigan’s Upper Peninsula gems like Mackinac Island and Pictured Rocks, occasional budget flights to Nashville for live country music,
    and a yearning to explore the Scottish Highlands, all planned loosely with a basic spreadsheet and limited by a student-friendly budget.
  culinary: Jennifer Wyatt’s cooking comfort zone includes chicken pot pie, hearty chili, and buttery biscuits seasoned with rosemary and thyme, which they whip up while humming folk tunes, and they enjoy
    sourcing fresh vegetables from their own garden patch to add a garden-fresh crunch to each dish.
  core: Jennifer Wyatt is a routine-loving housekeeping enthusiast who balances practical diligence with a laid-back streak, thriving on simple comforts like music, crochet, and the occasional fishing adventure,
    even if they sometimes let disorganization creep in.
background:
  cultural: Jennifer was born and raised in Powers, a small close-knit town in Menominee County, Michigan's Upper Peninsula. Her family traces its heritage to German and Irish immigrants who came to the
    region in the early 1900s to work in lumber and mining. Growing up in a Protestant household, she was taught the values of hard work, modesty, and community service. Local customs such as attending
    the county fair, participating in potluck dinners, and respecting the natural beauty of the Great Lakes have shaped her worldview. These cultural influences keep her grounded, favoring practical routines
    and a strong sense of belonging.
attributes:
  skills: '[''Residential cleaning'', ''Laundry and fabric care'', ''Floor care (vacuuming, mopping, carpet cleaning)'', ''Sanitization and chemical safety'', ''Kitchen organization'', ''Basic cooking and
