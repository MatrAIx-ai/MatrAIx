  hobbies: '[''Country and folk music'', ''Cooking comfort meals'', ''Walking/hiking in nature'', ''Gardening'', ''Crocheting'', ''Reading romance novels'', ''Coffee outings with friends'', ''Church gatherings'',
    ''Fishing'']'
  career_goals: Jennifer wants to build a stable career in housekeeping where she can advance to a supervisory role. She plans to earn a GED within the next year, followed by a certification in hospitality
    or commercial cleaning, which would allow her to become a lead housekeeper at a local hotel or assisted-living facility. Long-term, she hopes to start her own small cleaning business serving families
    in the Upper Peninsula, giving her the flexibility to set her own schedule while providing reliable income for her family.
