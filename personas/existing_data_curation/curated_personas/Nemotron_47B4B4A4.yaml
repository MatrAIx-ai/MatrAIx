personas:
  professional: Electrician Matthew Bost, a 26‑year‑old methodical electrician with a talent for decoding blueprints into NEC‑compliant smart‑home installations, relies on their organized, sociable nature
    to coordinate crews, communicate clearly with clients, and mentor apprentices as they work toward master electrician licensure.
  sports: In sports, Matthew Bost competes in the Providence Hoops basketball league, hikes the Seekonk River trail on weekends, and follows the New England Patriots and Boston Celtics, while they belong
    to the Rhode Island Outdoor Club and use a smartwatch to log cardio workouts, even though they occasionally neglect leg‑day after a heavy game.
  arts: Artistically, Matthew Bost strums acoustic guitar at local open‑mic nights, drawing inspiration from John Mayer and Hozier, and they enjoy indie films like Moonrise Kingdom and attend occasional
    performances by the Boston Symphony Orchestra, while also collecting vintage concert posters.
  travel: Travel‑wise, Matthew Bost favors meticulously planned road trips that blend adventure and relaxation, often charting weekend getaways to Martha’s Vineyard, Portland, Maine, and the Adirondack
    Mountains, and they budget these trips through a dedicated travel fund, all while dreaming of an electric‑vehicle cross‑country tour of the Pacific Northwest.
  culinary: Culinary‑wise, Matthew Bost loves pairing craft beer with hearty dishes such as beer‑battered fish and chips, smoky pulled‑pork tacos, and a spicy lentil chili, and they enjoy experimenting
    with fresh thyme, smoked paprika, and jalapeño, though they sometimes over‑season when excited and rely heavily on a trusty cast‑iron skillet.
  core: Matthew Bost is a 26‑year‑old organized electrician who blends methodical precision with a sociable, community‑focused streak, channeling a love for DIY, music, and volunteer firefighting into a
    sustainable future, even if they occasionally over‑commit to weekend projects.
background:
  cultural: Matthew grew up in the coastal town of Seekonk, Massachusetts, a community characterized by a strong New England work ethic and close‑knit neighborly ties. His family heritage includes Irish
    and English ancestry common to the region, fostering values of reliability, cooperation, and modest pride. Local traditions such as seasonal festivals, community sports leagues, and collective home‑maintenance
    projects have reinforced his practical, sociable, and community‑oriented outlook.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Blueprint reading'', ''NEC compliance'', ''Electrical troubleshooting'', ''Smart home system installation'', ''Lighting design and installation'',
    ''Safety inspections'', ''Customer communication'', ''Project scheduling'', ''HVAC electrical knowledge'', ''Solar PV basics'']'
  hobbies: '[''Basketball'', ''Hiking'', ''DIY home improvement'', ''Playing guitar'', ''Craft beer tasting'', ''Volunteer fire department work'', ''Cooking'', ''Board games'', ''Community events'']'
  career_goals: Matthew aims to become a licensed Master Electrician within the next two years, adding specialized certifications in renewable energy and electric vehicle charger installations. He plans
    to eventually launch his own contracting firm that emphasizes sustainable residential solutions and to mentor apprentices, leveraging his organized and sociable nature. In parallel, he hopes to contribute
    to community safety programs through his volunteer fire department involvement.
