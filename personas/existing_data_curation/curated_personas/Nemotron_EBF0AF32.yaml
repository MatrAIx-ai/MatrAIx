  career_goals: Although retired, Chloe aims to continue nurturing her curiosity and artistic interests. She plans to complete a series of online watercolor workshops, create a family memoir blending stories
    and photographs, and contribute a curated exhibit of local history to the Green Cove Springs Historical Society. She also hopes to mentor a new generation of seniors in the community arts program, travel
    to at least two state art museums each year, and maintain her health through regular walking and gardening.
