personas:
  professional: Corina Oglesby, a 23‑year‑old data‑visualization enthusiast, blends Python‑driven analytics with Adobe and generative‑art coding to turn raw datasets into story‑rich dashboards, thriving
    in flexible, collaborative environments while often juggling loose timelines due to their laid‑back approach to obligations.
  sports: Corina Oglesby is a casual runner who logs morning miles on the BeltLine with the local BeltLine Runners group, follows the Atlanta Hawks and Atlanta Falcons for a dose of city spirit, and occasionally
    joins a weekend cycling club, though they often skip a workout when stress peaks.
  arts: Corina Oglesby immerses themselves in Atlanta’s arts scene by wandering the High Museum, catching indie bands like Warpaint at Little Five Points, performing at open‑mic poetry nights, and channeling
    inspirations from visual artists such as Yayoi Kusama and digital creators like Refik Anadol into their own mixed‑media paintings and generative‑art code experiments.
  travel: Corina Oglesby prefers spontaneous, budget‑friendly travel that blends cultural immersion and creative inspiration, having already taken weekend road trips to Savannah and New Orleans, a music‑laden
    getaway to Austin, and a two‑week study‑abroad stint in Berlin for a digital art festival, while dreaming of a future solo adventure to Reykjavik's northern lights.
  culinary: Corina Oglesby enjoys a flavorful mix of Southern comfort food—like shrimp and grits with a dash of hot sauce—and experimental dishes such as miso‑glazed salmon with quinoa, often cooking at
    home with fresh herbs, cloves of garlic, and a habit of improvising recipes while occasionally ordering artisanal coffee pastries on Saturday mornings.
  core: Corina Oglesby, 23, fuses analytical rigor with artistic spontaneity, navigating life’s stressors through creative projects, occasional disorganization, and a relentless curiosity that fuels both
    data storytelling and personal growth.
background:
  cultural: Corina grew up in a close‑knit Black family in Atlanta, where the legacy of the civil‑rights movement and the city’s rich African‑American heritage shaped her worldview. She attended an HBCU
    for her undergraduate studies, which reinforced her connection to Black intellectual traditions and community activism. The Southern cultural milieu—its culinary traditions, church gatherings, and the
    rhythmic cadence of everyday conversation—infuses her identity. She often celebrates Juneteenth and participates in cultural festivals in Sweet Auburn, drawing inspiration from the stories of resilience
    and creativity that surround her. This cultural grounding informs both her artistic sensibilities and her commitment to using technology to amplify marginalized voices.
attributes:
  skills: '[''Python'', ''R'', ''SQL'', ''Statistical Modeling'', ''Machine Learning'', ''Data Visualization (Tableau, Figma)'', ''Graphic Design (Adobe Photoshop, Illustrator)'', ''Digital Media Production'',
    ''Public Speaking'', ''Event Coordination'', ''Research Methodology'']'
  hobbies: '[''Visiting art museums and galleries'', ''Live music and poetry events'', ''Mixed‑media painting'', ''Photography'', ''Generative art coding'', ''Yoga and meditation'', ''Running/BeltLine walks'',
    ''Journaling'', ''Volunteering for STEM outreach'', ''Exploring new coffee shops'']'
  career_goals: Corina aspires to a role that fuses her analytical strengths with her artistic curiosity, such as a data‑visualization specialist or UX researcher at a socially‑focused tech startup. She
    aims to create products that make data accessible and meaningful for underrepresented communities, especially leveraging her background to highlight stories from the Black diaspora in the South. In
    the next few years, she plans to enroll in a part‑time master’s program in Human‑Centered Design or Information Science, while building a portfolio of freelance projects that showcase her ability to
    turn raw datasets into narrative‑driven visual experiences. Ultimately, she hopes to lead a multidisciplinary team where flexible, creative thinking is valued over rigid processes, and where mental‑well‑being
    resources are built into the workplace culture.
