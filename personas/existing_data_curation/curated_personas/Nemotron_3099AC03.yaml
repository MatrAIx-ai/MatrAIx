personas:
  professional: A budding project coordinator in his high school's student council, Benjamin Ming leverages his strong organizational skills, basic Python coding, and hands‑on problem‑solving to streamline
    event logistics, while they apply their disciplined work ethic and community‑center volunteer mindset to foster collaborative, results‑driven outcomes.
  sports: Benjamin Ming dribbles for the Lebanon High Knights basketball squad and attacks the midfield for the Lebanon Youth Soccer Club, while they stay rooted in the community by cheering on the Indiana
    Pacers and Indianapolis Colts, and they blend daily pickup games with a disciplined calisthenics routine to sustain their athletic edge.
  arts: Benjamin Ming channels his rhythmic energy into a local garage band, banging out covers of Foo Fighters and Red Hot Chili Peppers while they also appreciate the storytelling of Indiana Repertory
    Theatre and study the drumming stylings of Sheila E., balancing performance with the reflective hymns from their church choir.
  travel: Benjamin Ming dreams of road‑tripping along Route 66 to explore the automotive history of Detroit and the music scene of Nashville, but with a modest budget they plan weekend getaways to nearby
    Indianapolis and the scenic Hoosier National Forest, favoring DIY itineraries over packaged tours.
  culinary: Benjamin Ming favors hearty Midwestern staples such as buttermilk fried chicken, creamy mac 'n' cheese, and corn succotash, often cooking these dishes on a backyard grill with a modest skill
    set that blends basic sautéing and BBQ techniques, and they indulge in a side of spicy jalapeño poppers during Overwatch marathons.
  core: Benjamin Ming is a disciplined teen with a community‑driven mindset, a penchant for hands‑on projects and drum‑filled jam sessions, a habit of losing track of time during gaming marathons, and an
    unshakable belief that organized chaos leads to the best outcomes.
background:
  cultural: Benjamin grew up in Lebanon, Indiana, a small Midwestern town with deep community ties. His family is rooted in the region’s agricultural and manufacturing heritage, and they attend a local
    Protestant church where service, modesty, and hard work are emphasized. The local culture values teamwork, school sports, and community involvement, shaping Benjamin’s sociable, disciplined, and practical
    outlook.
