  career_goals: Benjamin aims to earn his GED within the next year, then enroll in a community college program focused on logistics or automotive technology. He aspires to become a certified project manager
    or a skilled tradesperson, eventually working in a manufacturing plant or running his own small repair business. He wants to combine his curiosity for new technologies with practical, hands‑on work,
    and hopes to lead teams that improve operational efficiency.
