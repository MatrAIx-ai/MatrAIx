persona_description: A researcher from Heriot-Watt University who specializes in developing ultrafast imaging technologies, particularly those related to single photon detection and time-of-flight imaging.
  His research interests include the development of sensitive and fast cameras, as well as their applications in fields such as medical imaging, search and rescue, and medical diagnostics. He is particularly
  interested in the potential of his cameras to capture images using only one pixel, as well as their applications in ultraviolet and infrared imaging.
