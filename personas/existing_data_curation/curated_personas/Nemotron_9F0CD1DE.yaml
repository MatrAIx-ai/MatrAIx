  career_goals: Peter aims to become a top‑tier real‑estate broker in Manhattan, distinguishing himself by curating art‑centric luxury listings and championing sustainable properties. He plans to earn advanced
    certifications such as Certified Residential Specialist (CRS) and Sustainable Real Estate Professional (SREP). Within five years, he envisions launching his own boutique agency that blends artistic
    curation with high‑end real estate, offering clients immersive experiences through curated open houses, virtual tours, and collaborations with local artists. Long‑term, Peter aspires to transition into
    real‑estate development, designing mixed‑use spaces that integrate eco‑friendly design and cultural art installations, while mentoring emerging agents to cultivate a more innovative industry culture.
