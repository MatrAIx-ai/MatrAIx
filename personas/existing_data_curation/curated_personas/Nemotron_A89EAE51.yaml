  career_goals: Christina aims to advance to a senior managerial or partnership position within her public‑accounting firm, where she can shape the strategic direction of audit and advisory services. Over
    the next 12‑18 months she plans to secure her CPA license and pursue the Certified Internal Auditor designation, followed by an MBA to deepen her strategic and financial leadership capabilities. She
    seeks to lead large, multi‑state audit engagements, develop a niche in data‑analytics‑driven forensic accounting, and mentor a pipeline of junior professionals. Ultimately, she envisions transitioning
    to a CFO role for a regional mid‑size enterprise, balancing her professional aspirations with a commitment to family and community service.
