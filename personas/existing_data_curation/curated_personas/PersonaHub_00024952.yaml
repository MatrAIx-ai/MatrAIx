persona_description: A Gene Technology Advisory Board member who is responsible for promoting an ethically defensible and safe use of gene technology, keeping abreast of national and international developments,
  evaluating the effect of new applications on health and the environment, and disseminating knowledge about gene technology. This person is also involved in the evaluation of applications for consent and
  consultation with supervisory authorities when regulations are notified. Additionally, they are knowledgeable about the implications of gene technology on human health and the environment, and have experience
  in evaluating new aspects of development.
