  career_goals: Natasha aims to transition from a first‑line supervisor to a senior office manager or operations manager within the next five years. She plans to enroll part‑time in a Business Administration
    bachelor’s program and obtain the Certified Administrative Professional (CAP) credential. Her long‑term ambition is to lead a regional administrative team, mentor new supervisors, and champion workplace
    wellness initiatives that address stress and mental‑health challenges while fostering a supportive, productive culture.
