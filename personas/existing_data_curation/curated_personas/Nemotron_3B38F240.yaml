  hobbies: '[''Sketching'', ''Visiting art galleries and museums'', ''Photography'', ''Hiking on local trails'', ''Board game nights with close friends'', ''Attending indie music performances'', ''Journaling'',
    ''Reading art history and philosophy'', ''Cooking experimental meals'', ''Exploring pop-up cultural festivals'']'
  career_goals: Brian aims to progress within the logistics field while also bridging his creative interests. In the next two years he plans to earn a promotion to a shift-supervisor or inventory-analyst
    role, which will require additional training in supply-chain software and leadership. Simultaneously, he intends to complete his bachelor's degree, focusing on business administration with electives
    in arts management. His long-term ambition is to transition into a position that combines his logistical expertise with his love for art, such as an art-gallery inventory manager or a curator’s assistant
    for a museum store. He also hopes to develop better organizational habits to reduce stress and improve his reliability.
