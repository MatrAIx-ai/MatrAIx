personas:
  professional: Johnette Johnson is a veteran project manager in the manufacturing sector, whose curiosity-driven scheduling meets pragmatic risk assessment, allowing them to steer complex multi‑site initiatives
    while confidently mentoring emerging women leaders.
  sports: Johnette Johnson paddles a kayak along the Lake Erie shoreline each summer, follows the Cleveland Guardians and Browns avidly, and they participate in a local senior walking club that meets twice
    weekly for gentle cardio.
  arts: Johnette Johnson devours contemporary fiction by authors like Sally Rooney and Colson Whitehead at the book club, swings to Frank Sinatra during ballroom lessons, and they regularly visit the Cleveland
    Museum of Art to view modern installations.
  travel: Johnette Johnson plans road trips to Ohio’s Amish Country and weekend escapes to Niagara Falls with spreadsheet precision, yet they leave room for spontaneous detours to quirky roadside diners.
  culinary: Johnette Johnson crafts farm‑to‑table dishes such as rosemary‑roasted carrots, pan‑seared Lake Erie perch with lemon butter, and classic Ohio deviled eggs, while they habitually add extra sugar
    to their morning coffee.
  core: Johnette Johnson blends project‑management rigor with community‑driven enthusiasm, balancing a pragmatic approach to finance and health while they nurture a lively social life peppered with kayaking,
    swing dancing, and garden‑fresh cooking.
background:
  cultural: Johnette’s cultural background is rooted in her Midwestern, white American heritage, with family origins tracing back to German and Irish immigrants who settled in Ohio during the early 20th
    century. Growing up in the Cleveland suburb of Wickliffe, she was shaped by the region’s emphasis on community involvement, hard work, and modesty. Local customs—such as supporting the Browns and the
    Indians, attending church gatherings, and valuing seasonal harvest festivals—have informed her sense of identity. Her upbringing blended traditional family values with a practical, no‑frills outlook,
    while her adult life reflects the inclusive, multicultural fabric of the broader Cuyahoga County area.
