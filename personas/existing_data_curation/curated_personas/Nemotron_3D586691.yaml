  career_goals: Johnette aims to become a senior program director within the next five years, overseeing multi‑site initiatives that drive operational excellence for a regional manufacturing firm. She plans
    to earn her Project Management Professional (PMP) certification to formalize her expertise, and she is enthusiastic about mentoring emerging project managers, especially women and non‑traditional students.
    In the longer term, she envisions consulting for small businesses in the Ohio area, helping them implement lean project practices while maintaining work‑life balance.
