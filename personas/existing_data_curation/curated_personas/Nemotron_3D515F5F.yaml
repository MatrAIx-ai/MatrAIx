  career_goals: Even at 78, Dinah aspires to create a lasting legacy by establishing an intergenerational art mentorship program that pairs senior artists with local youth, preserving Chicago's Black cultural
    narratives through collaborative projects. She hopes to compile and publish an oral‑history memoir capturing the voices of longtime Black residents of the South Side. Additionally, Dinah dreams of curating
    a traveling pop‑up exhibition featuring works by senior artists, aiming to challenge ageist stereotypes and celebrate lifelong creativity. She also seeks to become a recognized elder advisor for city
    cultural councils, ensuring senior perspectives shape future arts initiatives.
