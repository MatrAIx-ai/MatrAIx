personas:
  professional: Quinton Baylor, a teen digital illustrator and budding game developer, merges methodical planning and curiosity by crafting manga-inspired characters in Scratch games, while they are a go‑to
    collaborator for school art projects thanks to their sociable nature.
  sports: Quinton Baylor, the point guard on his middle school basketball team, devotes after‑school drills at the local park while cheering on the Cincinnati Bengals and Cincinnati Reds, and they regularly
    volunteer at community basketball clinics, channeling their energetic, team‑oriented spirit into both competitive play and mentorship.
  arts: Quinton Baylor, an avid manga enthusiast, draws inspiration from artists like Osamu Tezuka and Makoto Shinkai, listens to Kendrick Lamar and Miles Davis while painting acrylics, and they frequently
    attend workshops at the Cincinnati Art Museum where they sketch live models and exchange techniques with fellow teen artists.
  travel: Quinton Baylor enjoys weekend trips to Cincinnati’s Over‑the‑River district and dreams of exploring Tokyo’s Akihabara neighborhood, plans each itinerary in a shared Google Doc with friends, and
    they balance family constraints with a curiosity for global street art by prioritizing destinations rich in visual culture.
  culinary: Quinton Baylor loves slurping ramen with a soft‑boiled egg and perfecting Cincinnati chili on spaghetti, experiments with making sushi rolls featuring avocado and cream cheese, yet they often
    indulge in cheesy nachos during late‑night gaming sessions, revealing a habit of rewarding creative bursts with comfort food.
  core: Quinton Baylor blends curiosity, organization, and sociability to create manga art, code interactive games, dominate the basketball court, and carefully budget their allowance, all while managing
    mild allergies, a love for diverse music, and a penchant for spontaneous sushi experiments.
background:
  cultural: Quinton is an African American teenager raised in Cincinnati’s West End, a community known for its rich cultural heritage and strong neighborhood ties. His family places a high value on education,
    faith, and cultural pride, regularly attending church services where gospel music and sermons about social justice are emphasized. He celebrates traditions such as Juneteenth, family cookouts featuring
    Southern soul food, and participates in youth programs at the Cincinnati Black Cultural Center, which have deepened his appreciation for Black history and contemporary artistic expression. These experiences
    shape his identity, fostering a sense of responsibility to give back to his community through art and mentorship.
