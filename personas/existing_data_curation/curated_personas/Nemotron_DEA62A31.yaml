  career_goals: Quinton aims to attend a university with a strong arts program, such as the University of Cincinnati’s College of Design, Architecture, Art and Planning, where he can study graphic design
    or animation. He envisions a career as a visual storyteller, working as a graphic designer, animator, or creative director for media agencies that produce socially‑engaged content. He also hopes to
    combine his artistic talent with community service by leading mural projects and youth art workshops in Cincinnati’s neighborhoods, ultimately using his skills to inspire and empower others.
