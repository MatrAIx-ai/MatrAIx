  career_goals: Deborah aims to move from her current administrative assistant role into a senior office‑manager or executive‑assistant position within the next three to five years. She plans to complete
    a bachelor’s degree in Business Administration and obtain the Certified Administrative Professional (CAP) credential to solidify her expertise. By mastering advanced project‑management platforms such
    as Asana and expanding her knowledge of data‑analysis tools, she hopes to lead process‑improvement initiatives that increase operational efficiency for a regional nonprofit or state agency. Long‑term,
    Deborah envisions leveraging her organizational talent to provide consultancy services for small businesses in her community, helping them streamline workflows while maintaining high standards of professionalism.
