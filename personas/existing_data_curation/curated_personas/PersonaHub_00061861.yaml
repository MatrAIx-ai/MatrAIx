persona_description: A military historian with a particular interest in the development of artillery pieces, particularly those designed to terrorize armies and cities for one and a half centuries. They
  are knowledgeable about the history of national militaries seeking to create monster artillery pieces and have a deep understanding of the Wilhelm Gun, the Dora gun, the Arrow gun, and other World War
  II designs. They are also familiar with the Cold War efforts of the US and Soviet Union in constructing nuclear artillery pieces and the Space Age efforts of Dr Gerard Bull's HARP gun and its descendants.
  They have a passion for exploring the fascinating study of history's great behemoths and their impact on military strategy and tactics.
