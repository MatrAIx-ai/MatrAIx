  hobbies: '[''Painting'', ''Experimental Music Listening'', ''Speculative Fiction Reading'', ''Philosophy Discussion'', ''Contemporary Art Gallery Visits'', ''Salsa Dancing'', ''Mexican Cooking'', ''Street
    Art Exploration'', ''Photography'', ''Short Story Writing'', ''Improv Theater'', ''Desert Hiking'', ''Mindfulness Meditation'']'
  career_goals: Rosa aims to become a district‑level curriculum specialist focusing on arts integration, where she can shape innovative instructional frameworks that honor diverse cultural perspectives.
    She plans to pursue a Master's in Education with a concentration on creative pedagogy and eventually publish research on the impact of imaginative teaching methods on student engagement. Additionally,
    Rosa envisions launching an after‑school art incubator that provides mentorship and resources for Mexican‑American youth, strengthening community ties and nurturing future creators.
