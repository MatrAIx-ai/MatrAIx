personas:
  professional: Rosa Taveras, a 27-year-old interdisciplinary curriculum designer, harnesses their boundless imagination and bilingual fluency to weave visual art, speculative literature, and digital media
    into fluid lesson plans, but they often scramble to meet tight deadlines due to their love of spontaneity.
  sports: Rosa Taveras, an avid desert hiker, joins a local climbing gym and follows the Vegas Golden Knights for hockey thrills, while they fit in sunrise trail runs on the Nevada plateau and participate
    in a community soccer league on weekends.
  arts: Rosa Taveras, an abstract painter fueled by experimental soundscapes from artists like Aphex Twin and visual influences from street artist Banksy and painter Yayoi Kusama, spends evenings capturing
    urban murals through photography and performing in improv theatre workshops to nurture their creative spontaneity, while they also attend local gallery openings.
  travel: Rosa Taveras, a spontaneous traveler, prefers road-trip adventures through the American Southwest’s rugged canyons and has already explored Berlin’s street-art scene and Iceland’s volcanic landscapes,
    while they plan a future pilgrimage to Kyoto’s quiet tea gardens.
  culinary: Rosa Taveras, an enthusiastic home cook, loves preparing heritage-inspired dishes such as a slow-braised pork stew scented with smoky chilies, cacao nibs, and toasted corn, and they frequently
    pair it with fresh avocado salsa and homemade corn tortillas for friends gatherings.
  core: Rosa Taveras, a 27-year-old curriculum innovator, balances a restless imagination with a knack for impulsive spending, occasional health oversights, desert-hiking vigor, eclectic art tastes, and
    a penchant for spontaneous global road trips—all while they race against deadlines.
background:
  cultural: Rosa is the daughter of Mexican immigrants who settled in Nevada, giving her a deep bicultural identity that blends Mexican heritage with American influences. She grew up speaking both Spanish
    and English, celebrating traditions such as Día de los Muertos and Las Posadas, which she often weaves into her classroom projects. Her artistic style reflects the vibrant colors and symbolism of Mexican
    folk art, and she incorporates Mexican culinary traditions as cultural learning experiences. Rosa actively participates in local Mexican community events in Las Vegas, maintains strong family ties,
    and draws on the resilience and communal spirit of her heritage to inform her teaching philosophy.
attributes:
  skills: '[''Creative Curriculum Design'', ''Visual Arts Instruction'', ''Literary Analysis'', ''Bilingual (Spanish/English) Teaching'', ''Critical Thinking Facilitation'', ''Project‑Based Learning'',
