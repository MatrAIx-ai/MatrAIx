personas:
  professional: Jessica Whitney, a 15‑year‑old aspiring visual storyteller, blends meticulous hand‑drawing with digital illustration on a tablet, leverages their organized, methodical planning to meet school
    art deadlines and occasional freelance commissions for local cafés, and channels their curiosity into speculative narrative concepts that set their portfolio apart.
  sports: Jessica Whitney enjoys weekend hikes at Arbor Hills Park as a member of the Plano Trails Club, follows the Dallas Mavericks (NBA) and Dallas Cowboys (NFL), occasionally runs cross‑country meets
    for school, and approaches fitness with a blend of curiosity and methodical training plans.
  arts: Jessica Whitney immerses themselves in the arts by sketching urban scenes, painting watercolor landscapes, playing acoustic covers of Joni Mitchell and Ed Sheeran, devouring graphic novels like
    "Saga" and speculative fiction by Becky Chambers, and drawing inspiration from creators such as Hayao Miyazaki and Banksy, shaping their identity through vibrant creative expression.
  travel: Jessica Whitney plans trips in a travel sketchbook, loves day‑trips to Austin’s street‑art districts and museum tours in Houston, dreams of visiting the Smithsonian in Washington, D.C., and hopes
    to trek the Grand Canyon, balancing a budget‑conscious approach with a yearning for cultural immersion.
  culinary: Jessica Whitney’s culinary palate mixes comfort and experimentation, favoring homemade veggie wraps with hummus, mastering simple pesto pasta, savoring sushi rolls with avocado and salmon, and
    treating themselves to a slice of New York‑style pizza on road trips, reflecting moderate cooking skills and a love for diverse flavors.
  core: Jessica Whitney, a highly organized teen artist with a curious mind, balances disciplined art practice, frugal finances, health consciousness, and a love of hiking, music, and speculative storytelling,
    while occasionally indulging in late‑night sketch marathons and coffee splurges.
background:
  cultural: Jessica grew up in Plano, a prosperous suburb of Dallas in Collin County, Texas, within a white, middle‑class family that values education and community involvement. Her upbringing blends traditional
    Texan hospitality—such as participation in local festivals, frequent family barbecues, and support for neighborhood initiatives—with exposure to the multicultural arts scene of the Dallas‑Fort Worth
    metroplex. She regularly attends the Plano Art Walk, explores regional museums, and benefits from school programs that emphasize both STEM and the visual arts. This environment nurtures her curiosity,
    independent thought, and appreciation for a diverse range of artistic expressions.
attributes:
