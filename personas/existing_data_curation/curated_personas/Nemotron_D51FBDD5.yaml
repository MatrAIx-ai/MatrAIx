  hobbies: '[''Sketching'', ''Digital painting'', ''Reading speculative fiction'', ''Visiting museums'', ''Library volunteer work'', ''Acoustic guitar'', ''Hiking'', ''Photography'', ''Debate club'']'
  career_goals: Jessica aims to combine her passion for visual arts and emerging technology by pursuing a career in user experience (UX) design or interactive media. She intends to study Interaction Design
    or Digital Media at a university, where she will refine her illustration portfolio and deepen her coding skills. She hopes to secure summer internships at design firms in the Dallas area and later work
    on projects that blend museum exhibitions with digital interactivity. Ultimately, she wants to create accessible, aesthetically engaging digital experiences that inspire curiosity in diverse audiences.
