  hobbies: '[''Abstract Watercolor Painting'', ''Woodworking'', ''Landscape Photography'', ''Sailing'', ''Hiking'', ''Science-Fiction and Philosophy Reading'', ''Chess'', ''Arduino Electronics Projects'',
    ''Community Art Workshops'', ''Gardening'']'
  career_goals: In the next five years, Joseph aims to transition from full-time engineering work to a consulting role focused on sustainable community projects on Vashon Island, leveraging his technical
    expertise to help local residents implement renewable energy systems, green building practices, and resilient infrastructure. He also aspires to mentor emerging engineers through workshops and to publish
    a series of articles on the intersection of art and engineering. Ultimately, he hopes to leave a lasting legacy of innovative, environmentally-friendly designs that enrich the cultural fabric of his
    community.
