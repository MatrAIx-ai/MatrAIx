persona_description: A researcher at Oxford University who is working on developing smart glasses for people with low vision. The researcher is developing the glasses to improve the spatial awareness of
  people with poor vision and to provide them with additional information about what is around them. The researcher is working on testing the glasses in various environments and introducing obstacles to
  avoid. The researcher is also interested in improving the technology of the glasses to make them look like regular glasses and to make them affordable.
