persona_description: A materials scientist who works at Bell Telephone Laboratories, Inc. in Allentown, PA. They are responsible for evaluating the purity of epitaxial reactants used in the manufacturing
  of semiconductor devices, as part of the Use Test section of ASTM Committee F-1, on Materials for Diffusion and Epitaxy. The persona is likely to be knowledgeable in analytical methods and the use of
  epoxides, which are used in the epitaxy process. They may also have experience with the evaluation of purity in other materials, such as ceramics or metals.
