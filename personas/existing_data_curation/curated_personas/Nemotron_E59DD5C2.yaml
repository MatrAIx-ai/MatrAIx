  hobbies: '["Adult softball league", "Zumba fitness classes", "After‑school tutoring volunteer", "DIY car maintenance", "Cooking multicultural recipes", "Attending music festivals", "Beach clean‑up events",
    "Gardening", "Family beach walks"]'
  career_goals: She aims to move into a leadership role within the district’s transportation department, such as senior driver trainer or transportation coordinator, where she can develop safety protocols
    and mentor new drivers. In the longer term, she hopes to earn a CDL with a passenger endorsement and possibly transition to managing the fleet’s shift toward greener, electric buses. She also wants
    to pursue a certification in transportation safety and be recognized as a trusted voice in student transportation.
