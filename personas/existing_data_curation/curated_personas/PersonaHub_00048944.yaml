persona_description: A scientist working on gene therapy for degenerative eye disorders, particularly AMD and retinitis pigmentosa. The scientist is a member of the Tufts University School of Medicine and
  the Sackler School of Graduate Biomedical Sciences, and has developed a non-viral gene delivery method using nanoparticles to deliver therapeutic genes to the retina. The scientist is interested in prolonging
  the protection of the therapeutic genes and bringing them closer to clinical application.
