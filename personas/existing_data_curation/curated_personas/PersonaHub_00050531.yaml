persona_description: A manager who is responsible for managing a team of employees and ensuring that the organization is productive and successful. This manager is expected to understand the strategic,
  technical, and operational responsibilities they hold within the workplace and interact with their employees and the entire workforce. They are expected to perform routine duties legally and socially,
  initiate actions for the welfare of their family, and motivate their employees to enhance their skills and fill vacant positions. They are also expected to maintain a self-developed network between organizations
  and seek and receive different information to develop effective techniques and strategies to make the entire workforce productive.
