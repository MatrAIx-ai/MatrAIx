    work", "Playing bridge"]'
  career_goals: Even at ninety‑one, Chelsea aims to leave a lasting legacy for her community. She intends to complete a memoir that captures the span of her life from the Great Depression to the digital
    age, and to launch an oral‑history project that records stories of longtime Romeo residents. She hopes to mentor younger volunteers in archival research and storytelling, enrich the senior‑center’s
    arts programming, and be recognized for her contributions with a community service award. Additionally, she aspires to become comfortable using digital tools to preserve family genealogy for future
    generations.
