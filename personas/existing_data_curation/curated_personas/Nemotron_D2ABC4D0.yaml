    rides, though they sometimes become overly competitive on the playground.
  arts: Kellie Dillard, an imaginative creator, fills notebooks with whimsical doodles inspired by the vibrant patterns of local Tex‑Mex festivals, delights in singing Raffi’s "Baby Beluga" and dancing
    to the upbeat rhythms of "Mambo No. 5," and proudly displays a hand‑crafted papier‑mâché cactus made in preschool art class.
  travel: Kellie Dillard, an eager explorer, loves family road trips to the Houston Museum of Natural Science and annual visits to the State Fair of Texas, dreams of seeing the beaches of Cancun, and prefers
    packing a small backpack filled with crayons and a favorite stuffed rabbit for every adventure.
  culinary: Kellie Dillard, a budding food enthusiast, favors crispy chicken tenders, cheesy mac and cheese, and strawberry‑banana smoothies, enjoys helping mom stir corn salad at backyard barbecues, and
    can proudly make a peanut butter and jelly sandwich all by herself.
  core: Kellie Dillard, a four‑year‑old with boundless curiosity, organized play, and a sweet tooth for adventure, balances a vivid imagination with occasional worry, turning everyday Southern gatherings
    into a stage for creative exploration.
