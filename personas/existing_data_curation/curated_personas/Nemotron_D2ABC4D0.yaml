personas:
  professional: Kellie Dillard, a preschool explorer, channels their vivid imagination into building intricate block towers, meticulously plans playdates, and eagerly narrates stories that blend abstract
    concepts with everyday Southern gatherings, showcasing an early knack for organized creativity.
