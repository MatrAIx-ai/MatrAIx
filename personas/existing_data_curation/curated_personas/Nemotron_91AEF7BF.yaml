personas:
  professional: Betty Criddle is a mid‑career technical writer who pairs meticulous expertise in MadCap Flare, XML/DITA, and visual storytelling with a humanities‑born knack for metaphor, aiming to lead
    a documentation strategy team that will shape AI‑driven renewable‑energy product guides.
  sports: Betty Criddle fuels her fitness with sunrise hikes in the Rockies, weekend trail runs with the Denver Trail Runners Association, biweekly yoga at a boutique Boulder studio, and cheers for the
    Colorado Avalanche and Colorado Rockies while keeping a modest home‑gym setup for strength work.
  arts: Betty Criddle channels her imagination into abstract oil paintings inspired by Ansel Adams’ Colorado vistas, experimental long‑exposure photography echoing Ryan McGinley’s style, devours speculative
    fiction by N. K. Jemisin and philosophy by Michel Foucault, and attends intimate gigs featuring local indie‑folk duo The Mountain Evens and ambient pioneer Brian Eno.
  travel: Betty Criddle prefers meticulously planned, solo‑friendly photography expeditions, having trekked Patagonia’s glaciers, explored Arches National Park’s sandstone arches, and placing Iceland’s
    volcanic landscapes on her bucket list, all while balancing a modest travel budget that favors off‑season flights and budget‑friendly Airbnbs.
  culinary: Betty Criddle cooks with confident amateur flair, perfecting a hearty Colorado lamb stew seasoned with rosemary and root vegetables, a quinoa‑and‑wild‑mushroom risotto, and crafting smoked‑paprika‑infused
    olive oil for her signature grilled corn salads.
  core: Betty Criddle is a disciplined yet whimsically artistic technical writer who meticulously outlines her day but habitually loses hours chasing the perfect abstract brushstroke, and can’t resist humming
    speculative‑fiction character names while proofreading.
background:
  cultural: Betty is a White American who grew up in a middle‑class suburban environment in the Midwest before relocating to Colorado for work. Her family emphasized a solid liberal‑arts education, curiosity
    about the world, and participation in community activities such as library volunteer programs and local art festivals. The cultural values of independence, self‑reliance, and respect for nature—common
    in the American West—blend with a lifelong appreciation for literature, visual arts, and intellectual exploration, shaping her balanced outlook on personal and professional life.
