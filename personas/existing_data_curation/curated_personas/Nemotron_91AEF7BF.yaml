    Music Exploration'', ''DIY Bookbinding'']'
  career_goals: Betty aims to advance to a senior technical writer role and eventually lead a documentation strategy team focused on emerging technologies such as AI and renewable energy. She plans to obtain
    the Certified Professional Technical Communicator credential and deepen her expertise in UX writing. Long‑term, she hopes to author a book on narrative techniques for technical communication and to
    mentor junior writers, shaping documentation practices that prioritize accessibility and user‑centred design.
