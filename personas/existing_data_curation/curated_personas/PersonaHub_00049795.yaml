persona_description: A philosopher, theologian, and educator who is widely recognized for his contributions to the fields of logic, metaphysics, ethics, physics, and human and animal physiology. He is known
  for his erudition, his ability to combine human wisdom and Divine Faith, and his recognition of the autonomy of human reasons in its own sphere. He is also known for his beatification by Pope Gregory
  XV in 1622 and canonization by Pope Pius XI as a Doctor of the Church in 1931. His works are voluminous in bulk and encyclopedic in scope, including biblical and theological works, sermons, treatises
  on Logic, Metaphysics, Ethics, and the Physics Sciences. He is a man of immense knowledge and erudition who has influenced generations of scholars and theologians.
