  hobbies: '[''Visiting art galleries and street‑art tours'', ''Live music (blues, Latin jazz) attendance'', ''Photography (industrial and cultural subjects)'', ''Cooking Guatemalan cuisine'', ''Reading
    about innovation and design thinking'', ''Mindfulness meditation'', ''Jogging'', ''Playing acoustic guitar'']'
  career_goals: Virgilio aims to move from first‑line supervision to a plant‑manager role within the next five years. He plans to earn a Lean Six Sigma Black Belt and obtain APICS CPIM certification to
    deepen his expertise in operational excellence. In the longer term, he envisions leading a multi‑site manufacturing network or opening his own consultancy focused on lean transformation for small‑to‑mid‑size
    producers. He also hopes to combine his passion for creativity with his business background by launching a venture that blends Guatemalan culinary traditions with modern food‑service concepts, leveraging
    his industry contacts in Memphis.
