  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Reading (Historical Biographies, Popular Science)'', ''Acoustic Guitar'', ''Volunteering at Local Historical Society'', ''Attending
    Community Theater'']'
  career_goals: Joshua aims to deepen his impact by moving into a lead teacher or curriculum coordinator role within his district, where he can design interdisciplinary units that marry students' natural
    curiosity with real‑world applications. He plans to develop and deliver professional‑development workshops that emphasize practical technology use and flexible classroom strategies. Over the next few
    years, he hopes to mentor a cohort of early‑career teachers, champion school‑wide initiatives that promote student resilience, and eventually transition to a part‑time educational consultant role that
    supports local schools and community programs while allowing a balanced lifestyle as he approaches retirement.
