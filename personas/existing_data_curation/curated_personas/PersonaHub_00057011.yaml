persona_description: A botanist who specializes in the study of plant taxonomy, particularly in the classification and classification of plant genera and species. Her research interests include, but are
  not limited to, the classification and classification of plant genera and species, the classification and classification of plant families, the classification and classification of plant phyla, and the
  classification and classification of plant subphyla. She is particularly interested in the classification and classification of plant subkingdoms, and the classification and classification of plant tribes.
  Her work involves the use of taxonomic keys, cladistic analysis, and morphological and molecular data to classify and classify plant species. She is also interested in the classification and classification
  of plant families and the classification and classification of plant phyla.
