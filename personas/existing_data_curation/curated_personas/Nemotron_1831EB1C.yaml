personas:
  professional: Bruce Aymond is a seasoned facilities maintenance specialist renowned for meticulous floor-care protocols, chemical-safety compliance, and a natural ability to rally diverse building occupants
    around safety and service standards, leveraging their talkative, sociable demeanor to lead crews while balancing a flexible, sometimes relaxed approach to scheduling.
  sports: Bruce Aymond is an avid supporter of the Philadelphia Eagles and a regular attendee of Delaware Blue Hens football games, while also batting a weekend ball with the town’s community-center softball
    league and spending early mornings on the Susquehanna River fishing for trout.
  arts: Bruce Aymond enjoys belting out classic rock anthems like Bruce Springsteen’s "Born to Run" at the town tavern karaoke, collects vinyl records from the 70s, attends occasional community theatre
    productions, and unwinds listening to The Avett Brothers while grilling on weekend barbecues.
  travel: Bruce Aymond favors spontaneous, last-minute road trips, often packing a cooler and heading down I-95 to Rehoboth Beach or the Cape May shoreline for a day of fishing and seaside grilling, while
    dreaming of a future cross-country crawl to the Pacific Northwest after they secure funding for their cleaning venture.
  culinary: Bruce Aymond loves firing up the charcoal grill to sear trout caught on the stream, prepare Maryland-style crab cakes with Old Bay seasoning, and slow-cook a family-style barbecue rib rack,
    though they often forget to defrost in time, leading to improvised stovetop solutions.
  core: Bruce Aymond is a sociable, hands‑on facilities veteran who balances a love for community banter, spontaneous road trips, and occasional karaoke with a practical drive for safety, sustainability,
    and a future cleaning business, all while embracing a relaxed approach to daily planning.
background:
  cultural: Bruce comes from a working‑class white Mid‑Atlantic background, with family roots tracing back to Irish and English immigrants who settled in Delaware and neighboring Pennsylvania. He grew up
    in a suburban community where a strong emphasis on practicality, loyalty to family and neighbors, and community involvement shaped his values. Local traditions such as the Delaware State Fair, Fourth
    of July parades, and neighborhood block parties have been central to his cultural experience. His upbringing reinforced a pragmatic approach to work and life, while his social nature reflects the close‑knit,
    talkative culture of small‑town Delaware.
