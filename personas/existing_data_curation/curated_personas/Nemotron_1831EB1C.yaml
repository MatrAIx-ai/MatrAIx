  hobbies: '[''Playing cards (gin rummy, poker)'', ''Barbecuing and hosting potluck gatherings'', ''Attending local high school football games'', ''Fishing at the Brandywine Creek'', ''DIY home improvement
    projects'', ''Karaoke nights'', ''Road trips to the Delaware beaches'', ''Community volunteer clean‑up events'', ''Senior center assistance'', ''Trivia nights at the local bar'']'
  career_goals: Bruce aims to move into a supervisory role, such as shift lead or facilities manager, and plans to obtain a Certified Facility Manager (CFM) credential. He also hopes to start his own cleaning
    business within the next few years, leveraging his extensive experience and reputation for reliability. Additionally, he wants to be recognized for improving workplace safety and environmental sustainability
    in the buildings he services.
