  hobbies: '["Reading adventure and science‑fiction books", "Building LEGO and robotics kits", "Playing piano (daily practice)", "Taekwondo practice (twice weekly)", "Manga‑style drawing", "Nature hikes
    with family", "School science club", "Celebrating Lunar New Year and Chuseok", "Journaling", "Educational video games (math & coding)"]'
  career_goals: Kim dreams of becoming a scientist or engineer who creates sustainable technologies to protect the environment. She hopes to win school science fairs, join her middle‑school robotics team,
    and eventually study engineering at a top university. Her practical side also fuels an ambition to become a pediatric doctor, combining her compassion with a desire to help others. In the short term,
    she aims to develop a project that cleans local park water and to earn a 1st‑place ribbon at the regional science competition.
