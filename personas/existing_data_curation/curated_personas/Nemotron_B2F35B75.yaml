personas:
  professional: Kim Hu is a budding junior engineer who transforms LEGO robotics projects into real‑world problem‑solving challenges, spends afternoons in the science club dissecting experiments, and, guided
    by their disciplined, organized mindset, they consistently set high personal standards and eagerly share discoveries with classmates.
  sports: Kim Hu is a focused Taekwondo practitioner attending bi‑weekly classes, a passionate supporter of the Chicago Cubs, an active member of their school’s after‑school soccer club, and dedicates weekend
    family hikes to maintain cardio fitness, all while applying the same organized discipline that defines their daily routines and they relish the sense of achievement after each practice.
  arts: Kim Hu blends artistic talent with musical discipline, sketching manga‑style heroes inspired by Osamu Tezuka and Hayao Miyazaki while practicing Beethoven’s Für Elise on piano, often showcasing
    their work at school art fairs and family recitals, and they occasionally lose track of time, leaving unfinished sketches scattered across their room.
  travel: Kim Hu daydreams about trekking through Yellowstone National Park’s geysers and wandering Tokyo’s neon districts, plans each adventure with a sticker‑filled travel journal, balances excitement
    for distant locales with the practical budgeting they learned from managing their allowance, and they use family weekend hikes to satisfy their love of nature while saving for future trips.
  culinary: Kim Hu delights in preparing bibimbap with colorful vegetables and a spicy gochujang drizzle, relishes crispy kimchi pancakes for breakfast, and occasionally experiments with chocolate chip
    cookies, meticulously measuring ingredients with the precision learned from robotics kits, though they sometimes sneak an extra bite of dessert when no one is watching.
  core: Kim Hu is a disciplined, curiosity‑driven nine‑year‑old who fuses structured pursuits—piano, Taekwondo, LEGO robotics—with vivid manga art, meticulous budgeting, and a love for nature hikes, yet
    they occasionally neglect snack‑time moderation and misplace spare LEGO pieces.
background:
  cultural: Kim is a second‑generation Korean‑American growing up in Great Falls, Virginia, a suburban community in Loudoun County. At home she speaks Korean with her parents, enjoys Korean dishes such
    as bibimbap and kimchi, and celebrates Korean holidays like Lunar New Year and Chuseok. Her family places a strong emphasis on education, discipline, and respect for elders, values that align with traditional
    East Asian cultural norms. While she participates fully in American school life—joining clubs, attending community events—she also attends a weekend Korean language school and takes part in local Asian
    cultural festivals, blending both Korean heritage and American upbringing in her daily life.
attributes:
  skills: '["Elementary mathematics (problem‑solving)", "Advanced reading comprehension", "Hands‑on science experimentation", "Block‑based coding (Scratch)", "Organizational skills (planner & notebook management)",
