    podcasts'', ''Exploring art galleries and museums'']'
  career_goals: Elisabeth aspires to advance to a senior director or chief marketing officer role within a mission‑driven tech company, where she can shape inclusive brand narratives and embed data‑first
    decision making across the organization. She also seeks to build a mentorship program for Black women entering marketing, launch a consulting boutique focused on DEI‑aligned campaigns, and achieve a
    sustainable work‑life rhythm that mitigates stress.
