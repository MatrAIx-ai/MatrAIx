    ''Budget Management & ROI Tracking'', ''Stakeholder Communication & Cross-Functional Collaboration'', ''Project Coordination & Agile Workflow Adaptation'', ''CRM (Salesforce) & Marketing Automation'',
    ''Crisis Communication & Reputation Management'']'
  hobbies: '[''Reading African-American fiction and business literature'', ''Journaling and reflective writing'', ''Yoga and mindfulness meditation'', ''Hiking local trails (Marin Headlands, Golden Gate
