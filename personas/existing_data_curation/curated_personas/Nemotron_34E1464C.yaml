  career_goals: Raelin aims to move from a hands‑on analyst role to a strategic leadership position, such as Chief Information Security Officer or Director of Security Strategy, where she can shape enterprise‑wide
    security policies and champion a culture of security awareness. She plans to mentor emerging talent—especially women in tech—publish thought‑leadership papers on integrating artistic thinking into security,
    and speak at national conferences. In the long term, she hopes to launch a boutique consultancy that offers flexible, creativity‑driven security services to midsize companies in the Upper Midwest, allowing
    her to balance professional ambition with personal flexibility.
