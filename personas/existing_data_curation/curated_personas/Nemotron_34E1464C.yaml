personas:
  professional: Raelin Brown, a 53‑year‑old information security strategist, blends mastery of network security, threat intelligence, and cryptographic protocols with an artistic curiosity and a talkative,
    sociable flair, turning complex security challenges into collaborative, creativity‑driven threat‑modeling sessions as they pursue a future C‑level leadership role.
  sports: Raelin Brown embraces the outdoors through seasonal hiking with the Minnesota Outdoor Club, cross‑country skiing in winter, and weekend trail runs, while cheering on the Minnesota Wild, Vikings,
    and Twins as a devoted fan who never misses a home game.
  arts: Raelin Brown fuels their creative spirit by sketching watercolor landscapes of Minnesota’s lakes after visits to the Walker Art Center and the Minneapolis Institute of Art, drawing inspiration from
    Monet, Georgia O’Keeffe, and Ansel Adams, and attending live performances by Bon Iver and the local improv troupe, where their knack for storytelling shines.
  travel: Raelin Brown favors immersive, nature‑centric trips, often planning spontaneous canoe expeditions into the Boundary Waters, weekend road trips to Lake Superior’s North Shore, and occasional overseas
    escapes to Iceland’s volcanic landscapes and Kyoto’s historic temples, balancing wanderlust with a modest travel budget that prioritizes experiences over luxury.
  culinary: Raelin Brown delights in cooking seasonal Midwestern fare like smoked walleye with dill and wild rice pilaf, while also experimenting with Vietnamese pho broth infused with star‑anise and fresh
    herbs, and they frequently host dinner parties featuring locally sourced berries, honey, and goat cheese, though they sometimes forget to defrost meats in time for the gathering.
  core: Raelin Brown is a sociable, art‑obsessed security veteran who blends creative problem‑solving with a love for spontaneous hikes, occasional budgeting slip‑ups, and a habit of turning every dinner
    party into a collaborative performance.
background:
  cultural: Raelin grew up in a middle‑class family in suburban Minneapolis, shaped by the Upper Midwest’s values of community, modesty, and a strong connection to the natural environment. Her ancestry
    includes Norwegian and Swedish roots, which contributed to an appreciation for seasonal outdoor activities and a pragmatic, egalitarian outlook. Raised in a Protestant household, she was taught the
    importance of education, civic engagement, and work‑life balance. Living in Hennepin County, she benefits from the region’s vibrant arts scene, progressive tech community, and emphasis on public service,
    all of which inform her worldview and professional ethos.
