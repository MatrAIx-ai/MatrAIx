personas:
  professional: Genesis Stadnik, an aspiring young artist, combines curiosity and an exceptionally organized mindset to meticulously plan watercolor projects that blend vibrant folklore-inspired scenes
    with precise composition, dreaming of leading school art clubs and eventually designing community murals.
  sports: Genesis Stadnik enjoys seasonal outdoor play, joining the local youth soccer league in the fall, attending a community swimming class during summer, and cheering on the regional baseball team,
    the Springfield Wildcats, while keeping a personal fitness journal that tracks nature walks and leaf‑collecting hikes in the park.
  arts: Genesis Stadnik immerses themselves in creative expression, drawing inspiration from the vivid storytelling of Maribel Rivera’s illustrated folktale books, practicing piano pieces by Mozart, listening
    to the lively rhythms of the Marimba Ensemble of Rainforest, and admiring the watercolor works of contemporary artist Ana Sofia, which together shape their artistic voice.
  travel: Genesis Stadnik prefers day‑trips that blend adventure with learning, often planning family visits to the nearby botanical garden to sketch exotic plants, exploring the historic town of Willow
    Creek for its folklore museum, and dreaming of a future trip to Mexico City to see the murals of Diego Rivera in person.
  culinary: Genesis Stadnik delights in fresh, colorful meals, often helping to prepare mango‑lime salsa, vegetable stir‑fry with rainbow carrots, and a simple guacamole dip, while their favorite snack
    is a slice of berry‑topped banana bread that they bake with their grandmother on weekends.
  core: Genesis Stadnik balances meticulous organization with a boundless curiosity, turning vivid folklore art into disciplined projects while navigating bouts of anxiety that fuel their empathetic, yet
    occasionally over‑thinking, outlook.
background:
  cultural: Genesis comes from a Guatemalan immigrant family that cherishes its roots. At home, Spanish is spoken, and she learns Guatemalan customs such as celebrating Día de los Muertos, eating pupusas,
    and sharing stories from the highlands. The family maintains strong ties to their heritage through language, cuisine, and music, while also embracing life in Teague, Texas, where she experiences a mix
    of Southern hospitality and Hispanic community gatherings.
attributes:
  skills: '[''bilingual communication (English/Spanish)'', ''advanced reading comprehension'', ''creative writing'', ''basic drawing and sketching'', ''color theory basics'', ''organized project planning'',
    ''time management'', ''empathetic listening'', ''digital art tools (tablet)'', ''research skills using library and internet'']'
  hobbies: '[''drawing'', ''watercolor painting'', ''reading folklore'', ''listening to marimba music'', ''playing piano'', ''nature walks and journaling'', ''participating in cultural clubs'', ''organizing
    community events'', ''gardening'']'
  career_goals: Genesis dreams of a future where she can blend her love of art, her cultural roots, and her desire to help others. She aspires to become an art therapist or child psychologist who uses creative
    expression to support children dealing with anxiety and emotional challenges. In the longer term, she hopes to work as a museum curator or educator, preserving Guatemalan artistic heritage and sharing
    it with her community.
