  hobbies: '["Visiting Art Galleries and Street Murals", "Live Music Concerts", "Improv Comedy Performances", "Pickup Basketball & Intramural Soccer", "Photography and Short Video Creation", "Cooking Experimental
    Recipes", "Reading Philosophy and Psychology", "Debate and Idea Discussions", "Volunteering at Community Theater"]'
  career_goals: Chino aims to complete his bachelor's degree in Communications with a focus on visual media, then launch a career in creative marketing or brand strategy where he can blend his artistic
    sensibilities with his talent for engaging audiences. He aspires to become a creative director for a boutique agency or to establish his own collaborative art space that hosts pop‑up exhibitions, live
    performances, and community workshops. His competitive drive pushes him to lead innovative campaigns that challenge conventional norms, and he hopes to eventually mentor younger creators.
