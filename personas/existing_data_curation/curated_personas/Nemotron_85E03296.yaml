personas:
  professional: Chino Chiu, a communications major with a flair for visual media, channels their curiosity and spontaneous energy into graphic design, video editing, and social media storytelling, leveraging
    improvisational confidence to pitch bold brand concepts while often battling last‑minute deadline pressure.
  sports: Chino Chiu thrives on pickup basketball at the campus gym and intramural soccer with the "Eagle United" club, cheering the Los Angeles Lakers during NBA season and supporting the LA Galaxy in
    MLS, while running 3‑mile jogs to stay fit despite a tendency to skip rest days after a night of late‑stage improv.
  arts: Chino Chiu immerses themselves in the local art scene, attending live shows by the indie band The Strokes and folk singer Lucy Dacus, snapping urban murals for Instagram, and performing weekly with
    the improv troupe "Spontaneous Narrative" while volunteering at the community theater's avant‑garde productions.
  travel: Chino Chiu prefers spur‑of‑the‑moment road trips, having chased street art from Detroit’s Heidelberg Project to Austin’s East Austin murals and dreaming of Berlin’s Kreuzberg scene, often packing
    a backpack and using rideshare apps to keep costs low while staying in boutique hostels.
  culinary: Chino Chiu experiments with eclectic dishes like Korean bibimbap, Ethiopian injera topped with spicy berbere tofu, and Japanese okonomiyaki, relishing ingredients such as gochujang, miso, and
    harissa, yet frequently forgets to clean the kitchen, leaving a fragrant, chaotic counter.
  core: Chino Chiu is a 19‑year‑old visual‑media enthusiast who blends spontaneous creativity with fierce competitiveness, juggling impromptu art projects, late‑night improv, and occasional financial messes
    while dreaming of leading a boutique creative agency.
background:
  cultural: Chino grew up in Oxford, Ohio, a small Midwestern town with a largely homogeneous white population. While his family identifies as white American, his surname reflects a Chinese ancestry that
    exposed him to certain cultural traditions, such as occasional celebrations of Lunar New Year and an appreciation for Asian cuisine at home. This blend of Midwestern values—practicality, community involvement,
    and a love for local sports—and a subtle multicultural heritage fuels his curiosity for diverse artistic expressions. He regularly engages with both local and broader cultural events, which broadens
    his perspective and informs his creative outlook.
