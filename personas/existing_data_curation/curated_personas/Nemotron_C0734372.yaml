  career_goals: Maria aims to advance within the logistics field by pursuing a supervisory role, such as Shift Lead or Warehouse Manager, where she can implement efficiency improvements and mentor newer
    staff. She plans to enroll in community college courses in supply chain management and business administration to deepen her expertise. Parallel to her professional aspirations, Maria hopes to develop
    a side venture that combines her love for art and Mexican culture, offering handcrafted home décor items at local markets. She also envisions taking on a volunteer coordinator position at a community
    cultural center, using her organizational strengths to support events that celebrate Mexican heritage.
