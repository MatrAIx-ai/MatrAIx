personas:
  professional: A seasoned dishwasher with decades of high‑tempo kitchen experience, Jorge Santiago leverages bilingual communication and quick problem‑solving abilities to keep operations smooth, and they
    are eyeing a junior prep‑cook role to bring traditional home‑cooked flavors to a modern kitchen environment.
  sports: A devoted fan of soccer, Jorge Santiago follows the local MLS team New York City FC with fervor, enjoys cheering for the New York Knicks during basketball season, participates in senior‑center
    Dominoes tournaments for mental agility, and they maintain a routine of brisk walks in Flushing Meadows–Corona Park to stay active.
  arts: An enthusiastic participant in Latin dance, Jorge Santiago attends weekly salsa and bachata classes at the cultural center, delights in listening to vallenato and cumbia on their radio, and they
    appreciate performances by artists such as Marc Anthony, Celia Cruz, and traditional folk musicians that echo the rhythms of their youth.
  travel: Having explored historic coastal towns in South America that mirror their childhood memories, Jorge Santiago loves short getaways to Caribbean islands, dreams of trekking the Andean highlands,
    and they frequently visit nearby boroughs like Astoria and Brooklyn for cultural festivals and culinary fairs.
  culinary: A culinary artisan at heart, Jorge Santiago expertly prepares corn‑meal arepas, savory empanadas filled with seasoned meat and cheese, and hearty sancocho simmered with yucca, plantains, and
    herbs like cilantro and cumin, while they maintain a balcony garden of oregano, basil, and parsley to enhance their dishes.
  core: Jorge Santiago is a 74‑year‑old culinary veteran whose love for community dance, home‑cooked comfort foods, and cautious optimism fuels a transition from dishwashing to prep‑cooking, even as lingering
    worries and occasional disorganization pepper their days, and they remain determined to share their flavors with friends.
background:
  cultural: Jorge was born in Medellín, Colombia, and immigrated to New York in his early twenties. He grew up in a close‑knit Catholic family that emphasized hospitality, shared meals, and community celebrations.
    In Queens, he maintains his Colombian identity through language, cuisine, and participation in local festivals such as the annual Fiesta Colombiana at Flushing Meadows. He celebrates Colombian holidays,
    from Día de la Independencia to the traditional Christmas novena, often inviting neighbors to join. His bilingual fluency bridges his Colombian roots and his American environment, allowing him to navigate
    both cultures confidently. The Colombian values of warmth, perseverance, and respect for elders shape his interactions at work and within his community.
attributes:
  skills: '[''Dishwashing'', ''Food Safety Compliance'', ''Commercial Dishwasher Operation'', ''Spanish‑English Bilingual Communication'', ''Basic Food Preparation'', ''Team Coordination'', ''Problem Solving'',
    ''Time Management'', ''Inventory Awareness'', ''Mentoring Junior Staff'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Colombian meals'', ''Playing dominos at the senior center'', ''Walking in Flushing Meadows–Corona Park'', ''Following Colombian soccer'',
    ''Listening to vallenato and cumbia music'', ''Volunteering at a community kitchen'', ''Gardening herbs on a balcony'', ''Reading historical biographies'']'
  career_goals: Jorge hopes to transition from a full‑time dishwasher to a junior prep‑cook role where he can experiment with Colombian recipes, satisfying his curiosity while staying practical. He plans
    to enroll in a part‑time culinary certificate program at a community college, aiming to eventually launch a modest home‑based catering service specializing in traditional Colombian meals for seniors
    and local festivals. Financially, he seeks a stable retirement income and is considering a shared‑ownership kitchen space in Queens that would let him stay active without the physical strain of constant
    dishwashing. Alongside these goals, he wants to maintain a flexible schedule that reduces stress and accommodates his health concerns.
