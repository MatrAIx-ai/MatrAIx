persona_description: A sociologist who specializes in the study of property rights, particularly the trade-offs between enforcement of property rights and the creation of entry barriers. Their research
  interests include the comparative efficiency of oligarchic and democratic societies in terms of property rights, the impact of taxation on the distribution of income, and the role of democratic institutions
  in taking advantage of new technologies. Their work highlights the importance of understanding the distribution of income and the role of institutions in maintaining power, particularly in oligarchic
  societies where entry barriers are a major issue.
