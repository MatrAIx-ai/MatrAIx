personas:
  professional: Salomon Betancourt, a seasoned landscaping supervisor in Orange County, blends STEM precision with hands‑on expertise to design water‑wise sites, lead crews with methodical scheduling, and
    champion sustainable practices while eyeing a regional manager role and eventual boutique firm.
  sports: Salomon Betancourt stays fit by tackling the coastal trails of Crystal Cove with the local Crystal Cove Hikers Group, competes in a weekend soccer league that watches Los Angeles FC matches, and
    follows the Los Angeles Dodgers' season, balancing structured exercise with relaxed fan enthusiasm.
  arts: Salomon Betancourt unwinds by strumming acoustic renditions of John Mayer and Nina Simone on the guitar, curates a vinyl collection that includes Bob Marley's reggae classics and Leonard Cohen's
    folk poetry, and occasionally attends local theater productions of works by contemporary playwrights, letting music and performance shape their artistic sensibility.
  travel: Salomon Betancourt prefers eco‑focused trips that blend hiking and cultural immersion, having trekked the volcanic landscapes of Costa Rica, explored the terraced rice fields of Kyoto, and planned
    a future adventure to Patagonia’s glaciers while balancing family commitments and a modest travel budget.
  culinary: Salomon Betancourt, an avid home gardener, transforms fresh heirloom tomatoes, organic kale, and smoked poblano peppers into vibrant salads and herb‑infused quinoa pilafs, while mastering the
    art of a slow‑cooked, family‑style roasted root vegetable stew that showcases their intermediate cooking skill and love for wholesome, sustainable cuisine.
  core: Salomon Betancourt balances methodical project management with a curious green thumb, juggling meticulous budgeting, weekend soccer rivalries, and a penchant for tinkering with irrigation tech,
    all while occasionally forgetting to schedule dentist appointments.
background:
  cultural: Salomon was born to Ecuadorian parents who immigrated to California in the 1990s. Growing up in the Greater Los Angeles area, he was raised bilingual, speaking Spanish at home and English in
    school. Family traditions—such as celebrating Carnaval de Guaranda, sharing meals of ceviche, plantains, and arroz con menestra, and listening to pasillo and folk music—remain central to his identity.
    His Ecuadorian heritage nurtured an early appreciation for biodiversity, influencing his passion for plants and sustainable landscaping. While fully integrated into the multicultural fabric of Orange
    County, he maintains close ties with the Ecuadorian diaspora, participating in cultural festivals, supporting local Ecuadorian businesses, and preserving the strong community values of respect, hard
    work, and family solidarity.
attributes:
  skills: '["Irrigation System Design and Optimization","Soil Testing and Fertility Management","Drought‑Resistant Plant Selection","Landscape Layout Planning with CAD","GIS Mapping for Site Assessment","Team
    Leadership and Crew Scheduling","Budgeting, Cost Control and Forecasting","Safety Protocol Development and Compliance","Heavy Equipment Operation and Maintenance","Client Relations and Service Proposals"]'
  hobbies: '["Home Vegetable Gardening","Coastal and Mountain Hiking","Recreational Soccer","Playing Guitar","Cooking Traditional Ecuadorian Cuisine","Reading on Ecological Design and Horticultural Innovation","Volunteering
    for Community Park Stewardship"]'
  career_goals: Salomon aims to advance from first‑line supervisor to regional operations manager within his company, overseeing multiple crews across Orange County. He is also pursuing a professional landscape
    architect certification to broaden his design capabilities and eventually launch his own boutique firm that integrates smart‑irrigation technology and native‑plant landscaping for environmentally conscious
    clients. A secondary goal is to mentor younger workers, establishing a structured apprenticeship program that blends practical skills with emerging sustainable practices. He balances his ambition with
    a pragmatic timeline, seeking incremental promotions while building a solid client base for his future business.
