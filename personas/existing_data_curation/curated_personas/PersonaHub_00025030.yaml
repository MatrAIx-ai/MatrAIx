persona_description: A furniture expert who has been certified and/or trained to install, assemble, disassemble, reconfigure, relocate or repair all types of furniture. This person is skilled in delivering,
  assembling, and handing over furniture, often as part of an office move or refurbishment. They are familiar with the JCT Design and Build Contract and are proficient in linear office layouts. They have
  experience with modular office furniture, monitors, and multifunctional devices (MFDs), and are able to provide detailed documentation for an O&M manual. They have a unique understanding of organic office
  layouts and have a special knowledge of office furniture pods, small self-contained workspaces, and cubicles. This person is highly specialized and has a deep understanding of the furniture industry.
