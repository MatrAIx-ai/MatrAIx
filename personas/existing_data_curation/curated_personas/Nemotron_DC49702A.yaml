personas:
  professional: Rafael Thresher, a budding business analytics student, blends strong analytical research, data handling, and basic programming with meticulous project‑management skills, applying their curiosity‑driven
    yet methodical mindset to deliver clear, actionable insights in team settings.
  sports: Rafael Thresher maintains fitness by cycling on weekend rides with the Wilmington Mountain Bikers Club, hiking the Blue Ridge Trail in fall, playing casual soccer in a friends’ league, and avidly
    follows the Carolina Panthers, Charlotte Hornets, and supports the UNC Wilmington Seahawks, balancing structured workouts with spontaneous outdoor adventures.
  arts: Rafael Thresher nurtures creative expression through guitar sessions inspired by John Mayer and Bon Iver, captures moody urban and natural scenes reminiscent of Ansel Adams and Alex Webb, attends
    local gallery openings featuring contemporary artists like Anna Maya, and regularly hosts board‑game nights enjoying titles such as Settlers of Catan and Azul, weaving artistic appreciation into their
    social life.
  travel: Rafael Thresher prefers meticulously planned, budget‑friendly trips, having explored the historic neighborhoods of Boston, hiked the Appalachian Trail in Virginia, and spent a weekend savoring
    Charleston’s culinary scene, while they dream of a solo backpacking adventure through the Scottish Highlands next summer.
  culinary: Rafael Thresher enjoys cooking flavorful, moderately complex dishes such as shrimp stir‑fry with garlic, ginger, and Thai basil, and homemade avocado toast topped with feta and chili flakes,
    while they also indulge in local seafood chowders and occasionally treat themselves to artisanal pizza with prosciutto and arugula at their favorite downtown pizzeria.
  core: Rafael Thresher is a curiosity‑driven planner who channels analytical precision into both data projects and everyday life, yet they often forget to turn off their laptop’s nightlight, leading to
    late‑night screen time and occasional sleep debt.
background:
  cultural: 'Rafael grew up in a middle‑class, predominantly white suburb of Wilmington, Delaware, with family roots tracing back to Anglo‑American and German ancestry. His upbringing reflects typical Mid‑Atlantic
    values—emphasis on self‑reliance, punctuality, and community involvement. He celebrates mainstream American traditions such as Thanksgiving and the Fourth of July, while also participating in local
    cultural events that expose him to the region''s diverse heritage. This background fosters his balanced outlook: respect for established practices paired with openness to new ideas.'
