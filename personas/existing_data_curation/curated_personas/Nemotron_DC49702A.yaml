  career_goals: Rafael aims to complete his bachelor's degree in Business Analytics within the next two years, securing an internship at a data‑driven firm to apply his analytical skills in a real‑world
    setting. He aspires to become a data analyst or business intelligence specialist, blending his curiosity for emerging technologies with a practical focus on delivering actionable insights. Long‑term,
    he envisions leading cross‑functional projects that improve operational efficiency, and eventually launching a consultancy that helps small businesses leverage data for strategic growth.
