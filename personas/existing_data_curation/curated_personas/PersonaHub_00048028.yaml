persona_description: A speech therapist who specializes in teaching patients who have had their larynx surgically removed (laryngectomy) how to speak again through the use of pseudolaryngeal speech and
  mechanical or esophageal speech techniques. The therapist works with former laryngeal cancer patients to demonstrate that it is possible to return to their former occupations and professions. The therapy
  involves swallowing air into the esophagus and belching it out in a controlled manner, which alters the tissues of the gullet and results in sound that is altered by oral-nasal structures to produce recognizable
  speech sounds. The therapy is taught by therapists to persons who have had the larynx surgically removed.
