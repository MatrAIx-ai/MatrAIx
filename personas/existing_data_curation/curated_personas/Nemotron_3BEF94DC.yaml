  hobbies: '["Visiting art galleries and museums","Photography and sketching","Home staging and interior design projects","Cooking and experimenting with fusion cuisine","Reading design, architecture, and
    business books","Volunteering in mentorship programs","Playing basketball","Family road trips and outdoor concerts"]'
  career_goals: Khiem aims to become one of the top‑producing brokers in the New York‑New Jersey corridor while expanding his practice into a boutique brokerage that specializes in luxury residential and
    mixed‑use properties with an artistic flair. He plans to obtain the Certified Residential Specialist (CRS) and Accredited Buyer’s Representative (ABR) designations, and to build a small team that can
    offer integrated services—sales, investment consulting, and interior‑design staging. Long‑term, he envisions creating a real‑estate investment fund focused on revitalizing historic neighborhoods and
    promoting culturally inclusive development, leveraging his network in the Southeast Asian community to attract co‑investors. Throughout, he seeks a balanced lifestyle that allows time for family, personal
    art pursuits, and community mentorship.
