personas:
  professional: George Zeller is a seasoned entertainment operations specialist whose four decades of front‑of‑house mastery, meticulous scheduling, and compassionate conflict mediation blend his imaginative
    curiosity and methodical reliability to create seamless community events in Roundup.
  sports: George Zeller is an avid early‑morning hiker who follows the Roundup Trail Club, enjoys seasonal fly‑fishing on the Yellowstone River, supports the Colorado Rockies and the University of Montana
    Grizzlies football teams, and attends a weekly gentle yoga class to keep his joints supple.
  arts: George Zeller is a watercolor enthusiast who captures Montana’s sweeping plains, strums folk guitar at community gatherings to the tune of Bob Dylan and Pete Seeger, reads classic science‑fiction
    by Isaac Asimov and Arthur C. Clarke, and curates a local art exhibit showcasing regional painters.
  travel: George Zeller is a road‑trip lover who frequently drives to Glacier National Park and the historic mining town of Virginia City, has explored Yellowstone’s geysers on a sunrise hike, enjoys cultural
    visits to Santa Fe’s art district, and dreams of attending the Edinburgh Festival someday.
  culinary: George Zeller is a modest home‑cook who harvests heirloom tomatoes, beans, and kale from his garden to prepare rustic ratatouille, beet‑and‑goat‑cheese salads, and smoky cedar‑plank trout seasoned
    with rosemary and lemon, and delights in tasting bison burgers at the Roundup Rodeo.
  core: George Zeller is a 69‑year‑old dreamer‑organizer who balances meticulous event logistics with watercolor canvases, garden cravings, and a habit of humming folk tunes while cataloguing community
    stories.
background:
  cultural: George grew up on a multigenerational family ranch near Roundup, descended from German and Irish immigrants who settled in the American West in the early 1900s. His upbringing combined the self‑reliance
    of ranch life with the close‑knit community spirit of a small Montana town. He attended the local high school, where he was active in the drama club and the 4‑H agricultural program. Though he identifies
    as white, his cultural identity is shaped by the values of hard work, modesty, and neighborly cooperation common to the region. He has been a lifelong member of the town’s United Methodist congregation,
    participating in church‑based service projects and the county fair. These experiences have fostered a deep appreciation for rural heritage, outdoor recreation, and the communal celebration of art and
    music.
