  career_goals: Even at 69, George remains driven to enrich his community’s cultural life. He aims to transition into a part‑time role as a volunteer arts coordinator for the Roundup Community Center, where
    he can design and run workshops on stagecraft and visual arts. He also hopes to mentor a new generation of entertainment staff, establish a seasonal outdoor cinema series that showcases classic and
    independent films, and document the oral histories of longtime local performers in a modest memoir. Ultimately, George seeks to leave a lasting legacy of harmony, creativity, and accessible arts in
    his hometown.
