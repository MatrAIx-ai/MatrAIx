  hobbies: '[''Visiting art museums'', ''Watercolor painting and sketching'', ''Attending salsa and Latin music events'', ''Playing claves in community dance groups'', ''Cooking Puerto Rican cuisine'',
    ''Hiking Lehigh Valley trails'', ''Volunteering as a cultural heritage docent'', ''Participating in community trivia leagues'', ''Reading books on psychology and security'', ''Collecting vintage postcards'']'
  career_goals: Diego aims to advance into a supervisory role within transportation security, eventually becoming a shift manager or director of security operations at the Lehigh Valley International Airport.
    He plans to leverage his humanities background to design bilingual training programs that incorporate cultural and artistic perspectives, improving traveler experience while maintaining safety. Over
    the next five years he intends to obtain a Certified Transportation Security Professional (CTSP) credential and pursue a graduate certificate in security management. Simultaneously, he dreams of launching
    a community outreach initiative that brings local art exhibitions and cultural workshops to airport terminals, fostering a sense of connection for travelers and staff alike. Ultimately, he seeks to
    balance career advancement with a reduced stress environment, using his own experiences to mentor colleagues in stress‑resilience strategies.
