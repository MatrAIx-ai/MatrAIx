persona_description: A worker who is involved in the construction or maintenance of enclosed spaces, and is responsible for ensuring the safety of the workers by conducting pre-entry testing and following
  the appropriate safety procedures. This persona is likely to be aware of the hazards associated with confined spaces, such as high and low hazard atmospheres, and is skilled in identifying and mitigating
  these hazards to protect the workers. They may also have knowledge of the appropriate safety equipment and procedures required for entry into enclosed spaces, such as using a respirator and following
  a safe work plan.
