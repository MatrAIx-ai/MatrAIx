personas:
  professional: Roger Soto, a 31‑year‑old bilingual (Spanish‑English) middle‑school educator in Miami‑Dade, blends meticulous lesson planning with arts integration, leveraging educational technology to
    streamline assessment, while their methodical, structured approach and collaborative spirit drive them toward a future role as curriculum coordinator.
  sports: Roger Soto jogs three times weekly through local parks, plays in a bi‑weekly recreational tennis league, and follows the Miami Heat and Inter Miami CF, preferring the structured rhythm of individual
    cardio while enjoying the occasional team‑spirit of a small fan circle.
  arts: Roger Soto paints tranquil landscapes reminiscent of Monet, practices piano pieces by Chopin and Beethoven to unwind, photographs everyday moments with a keen eye for composition à la Annie Leibovitz,
    and dives into classic novels by Dickens and Tolstoy, allowing art to anchor their structured mind.
  travel: Roger Soto plans trips with the same precision as a curriculum map, favoring meticulously researched itineraries that blend cultural immersion—such as museum tours in Paris and historic sites
    in Kyoto—with occasional beach retreats in the Florida Keys, balancing relaxation with structured exploration.
  culinary: Roger Soto enjoys cooking hearty family recipes such as arroz con pollo, plantain tostones, and pork croquetas, often experimenting with fresh cilantro, lime zest, and smoked paprika, while
    their methodical approach to cooking mirrors their lesson‑planning precision.
  core: Roger Soto is a structured, introspective educator who channels their meticulous nature into teaching, art, and a quietly worried pursuit of harmony, often juggling a spreadsheet‑driven life with
    sudden bursts of creative spontaneity.
background:
  cultural: Roger grew up in Miami’s vibrant Cuban community, speaking both Spanish and English at home and school. Family gatherings centered around music, dance, and home‑cooked meals have instilled in
    him a deep appreciation for Cuban traditions such as salsa rhythms, San Juan celebrations, and the value of close‑knit relationships. While he has never married, his cultural identity remains a cornerstone
    of his daily life, influencing his teaching style, his commitment to bilingual education, and his involvement in local community events that preserve and share Cuban heritage with a broader audience.
attributes:
  skills: '["Curriculum development","Bilingual instruction (Spanish/English)","Classroom management","Educational technology integration","Assessment design","Arts and humanities integration","Cultural
    competency","Student counseling and mediation"]'
  hobbies: '["Reading classic literature","Painting landscapes","Cooking traditional Cuban dishes","Playing the piano","Jogging in local parks","Meditation","Volunteer tutoring for under‑served youth","Photography"]'
  career_goals: Roger aims to advance into a leadership role such as curriculum coordinator or department chair, where he can design and implement bilingual arts programs across Miami‑Dade schools. He plans
    to pursue a master's in education leadership to strengthen his administrative expertise and hopes to publish research on culturally responsive teaching practices. Additionally, he envisions building
    community outreach partnerships that provide tutoring and cultural enrichment for under‑served Cuban‑American youth.
