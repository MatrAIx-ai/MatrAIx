  career_goals: Soheila aims to advance to a regional manager role, overseeing multiple locations while championing a company-wide initiative that integrates local arts programs with retail spaces. She
    aspires to mentor emerging leaders, particularly women, within her organization and is considering part‑time coursework toward an associate degree in business administration or arts management. Long‑term,
    she envisions opening a boutique art gallery with a café that showcases regional artists and promotes sustainable, locally sourced products, thereby merging her managerial expertise with her passion
    for culture and community development.
