  hobbies: '["building wooden block towers", "simple jigsaw puzzles", "listening to bedtime stories", "dress‑up and pretend play", "outdoor mud‑pie art", "sprinkler play", "dancing to children''s music",
    "sing‑along with picture books"]'
  career_goals: Although only three, Joyce already imagines future roles with both structure and adventure. She frequently declares she wants to be a teacher because she enjoys the routine of story time
    and helping friends learn, yet she also dreams of becoming an explorer or astronaut, fascinated by the idea of discovering new places without a set schedule. These ambitions reflect her love for predictable
    classroom settings balanced with a yearning for spontaneous discovery.
