personas:
  professional: Joyce Garcia, a budding sandbox architect at her local preschool, channels an early love for order by meticulously arranging sandcastles into neat rows while also sprinkling spontaneous
    towers and whimsical shapes, echoing her blend of structure and flexibility.
  sports: Joyce Garcia charges into preschool PE with the enthusiasm of a desert jackrabbit, favoring the Tucson Desert Rattlers youth soccer mini‑kick sessions and the sand pit tumble, balancing high‑energy
    play with occasional quiet naps to recharge.
  arts: Joyce Garcia delights in finger‑painting desert sunsets while humming folk tunes from the Tucson Folk Festival, often replicating cactus shapes and channeling the spirited rhythms of Old Crow Medicine
    Show, showcasing her vivid creative spark.
  travel: Joyce Garcia loves weekend excursions to the Arizona‑Sonora Desert Museum, where she marvels at desert critters, and dreams of a future family road trip to the Grand Canyon, reflecting a curiosity‑driven
    travel style anchored by familiar routines.
  culinary: Joyce Garcia enjoys nibbling fresh prickly pear cactus fruit peeled by a grown‑up and devours grilled corn on the cob at neighborhood picnics, often sprinkling a pinch of queso fresco for extra
    crunch, while still opting for comforting mac and cheese at home.
  core: Joyce Garcia is a three‑year‑old who balances a love for tidy routines with bursts of spontaneous play, hoards coins like a tiny miser yet splurges on stickers, and tackles health and adventure
    with earnest curiosity and occasional forgetfulness.
background:
  cultural: Joyce is raised in a white family living in Tucson, Arizona, where the desert landscape and Southwest climate shape daily life. Her family incorporates regional customs such as weekend trips
    to the Arizona‑Sonora Desert Museum, celebrating local festivals like the Tucson Folk Festival, and enjoying seasonal foods like fresh cactus fruit and grilled corn. While her primary cultural identification
    is mainstream American, occasional exposure to Spanish words and neighborhood traditions adds a subtle multicultural flavor to her upbringing.
attributes:
  skills: '["walking and running", "climbing low playground structures", "stacking blocks", "crayon drawing", "forming full sentences", "following multi‑step directions", "story recounting", "adhering to
