  career_goals: Jeffery wants to channel his love of building and helping others into a future career in product design or mechanical engineering, where he can create tools and gadgets that make everyday
    life easier for his peers. In the short term, he aims to join his middle school’s robotics team, win a regional competition, and earn a certification in first aid so he can serve as a reliable volunteer.
    Over the next decade, he hopes to study engineering at a university, intern at a tech company that emphasizes sustainable design, and later mentor younger students through community STEM clubs.
