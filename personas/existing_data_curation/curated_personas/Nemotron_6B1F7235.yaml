personas:
  professional: Jeffery Stanic, an aspiring maker‑engineer in middle school, channels curiosity and practicality into constructing LEGO Technic machines and programming Raspberry Pi sensors, while often
    coordinating cooperative multiplayer gaming sessions where they lead strategy, though their laid‑back attitude sometimes leads to missed homework deadlines.
  sports: Jeffery Stanic plays forward for the Chicago Fire Academy youth soccer team, spends Saturday afternoons skateboarding at the nearby Lincoln Park skate park, and organizes pickup basketball games
    with friends, while cheering for the Chicago Cubs and following the NBA’s Chicago Bulls for inspiration; they often practice extra drills with teammates after practice to improve stamina.
  arts: Jeffery Stanic showcases a love for performance by posting acoustic guitar covers of Ed Sheeran’s Shape of You on TikTok, they also take part in school drama club improv sketches, devour Marvel
    comic books—especially Spider‑Man—and enjoy science documentaries like Neil deGrasse Tyson’s Cosmos as creative fuel.
  travel: Jeffery Stanic prefers spontaneous weekend road trips to the Cook County forest preserves for hiking and camping, while dreaming of a family adventure to Yellowstone National Park and a future
    summer visit to Walt Disney World in Orlando, balancing budget constraints with the desire for epic outdoor experiences; they keep a travel journal of each trail and campsite visited.
  culinary: Jeffery Stanic gravitates toward quick, tasty meals like pepperoni pizza, chicken tacos with fresh cilantro and lime, and classic grilled cheese sandwiches, often attempting to make midnight
    mac and cheese in the microwave while forgetting to clean the kitchen afterward; they also love adding extra hot sauce for a flavor kick.
  core: Jeffery Stanic is a curious, socially‑driven teen who blends maker‑tech tinkering, soccer, and skateboarding, yet often worries about deadlines, forgets chores, and they frequently seek out group
    activities for motivation.
background:
  cultural: Jeffery was raised in Arlington Heights, a suburban community in Cook County, Illinois, where Midwestern values of friendliness, modesty, and community involvement are prominent. His family’s
    heritage includes German and Irish roots, common among many local families, and they celebrate traditional holidays like Christmas and Thanksgiving with gatherings that feature classic American foods
    and seasonal customs. He grew up attending public school events, local sports games (especially cheering for the Chicago Cubs and Bears), and community festivals such as the Arlington Heights Summer
    Festival. The neighborhood’s emphasis on school clubs, youth sports, and church activities shaped his sense of cooperation and his appreciation for group participation.
