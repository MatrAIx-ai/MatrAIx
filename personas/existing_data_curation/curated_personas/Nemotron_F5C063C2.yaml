personas:
  professional: Angela Dellinger, a 33‑year‑old clinical psychologist, blends evidence‑based CBT and ACT with improvisational theater techniques and abstract art interventions, using their strong quantitative
    background in SPSS and R to design community‑focused research while navigating therapy sessions with a flexible, imaginative, and occasionally disorganized style.
  sports: Angela Dellinger fuels their love of the outdoors by weekend hikes on the Coastal Bend trail system, occasional sunrise‑photography runs, participation in a local adult yoga circle, and cheering
    for the Beaumont Oilers hockey team while maintaining a modest membership at the community rock‑climbing gym during the winter months.
  arts: Angela Dellinger channels their imagination into abstract canvases inspired by Kandinsky, improvises scenes with the Beaumont Improv Ensemble, devours Neil Gaiman’s fantasy novels at their sci‑fi
    book club, and finds refuge in live performances by St. Vincent and the local jazz trio The Riverbank Collective.
  travel: Angela Dellinger prefers spontaneous, low‑budget getaways, having already explored the piney woods of Big Thicket National Preserve, soaked in Cajun culture during a weekend in New Orleans, and
    daydreaming about future trips to Kyoto’s art districts and Barcelona’s street murals, always planning travel around friends’ schedules and limited time.
  culinary: Angela Dellinger enjoys a kaleidoscope of flavors—from crafting beet‑and‑goat‑cheese salads and mushroom risotto at home to savoring pho and black‑bean enchiladas at eclectic eateries, often
    experimenting with rosemary, thyme, and smoked paprika while balancing moderate cooking confidence with a tendency to over‑season dishes.
  core: Angela Dellinger, a 33‑year‑old therapist and abstract painter, navigates life with boundless curiosity and sociable spontaneity, yet habitually misplaces inbox replies and lets credit‑card due
    dates slip.
background:
  cultural: Angela grew up in a middle‑class, two‑generation family in Beaumont, Texas, where Southern hospitality, close‑knit community ties, and a strong emphasis on education shaped her worldview. Her
    family’s values blend modest religious roots—often attending Methodist services—with a love for local traditions such as county fairs, holiday gatherings, and regional cuisine. Living in a culturally
    diverse Gulf Coast city exposed her to a mosaic of Hispanic, African‑American, and Asian influences, informing her inclusive approach to mental‑health care. She identifies with the blend of independent
    Texas spirit and collaborative community ethos, which fuels her commitment to fostering harmony and supporting the well‑being of others.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Acceptance and Commitment Therapy (ACT)'', ''Group Therapy Facilitation'', ''Psychometric Assessment'', ''Crisis Intervention'', ''Trauma-Informed Care'',
    ''Art Therapy Integration'', ''Research Design and Statistical Analysis (SPSS, R)'', ''Program Development'', ''Digital Mental Health Platforms'', ''Community Outreach'', ''Empathetic Communication'',
    ''Creative Problem Solving'', ''Flexible Counseling Approaches'']'
  hobbies: '[''Abstract Painting'', ''Improvisational Theater'', ''Book Club (Science Fiction & Fantasy)'', ''Live Music and Concerts'', ''Exploring New Restaurants'', ''Hiking with Friends'', ''Photography'',
    ''DIY Crafts'', ''Hosting Potluck Dinners'', ''Mindfulness Meditation'', ''Traveling to Novel Destinations'', ''Podcast Listening (Psychology, Art, Science)'', ''Community Volunteer Events'']'
  career_goals: Angela aspires to establish a community mental‑health hub in the Greater Beaumont area that blends traditional therapy with creative arts and technology. She aims to secure a leadership
    role in a nonprofit mental‑health organization, develop and evaluate innovative therapeutic programs that emphasize imagination and novelty, publish research on the efficacy of art‑integrated counseling,
    and eventually open a private practice that offers flexible, group‑oriented sessions. She also hopes to mentor junior clinicians, contribute to the Texas Psychological Association’s initiatives on creative
    therapy, and become a recognized speaker on harnessing creativity in clinical practice.
