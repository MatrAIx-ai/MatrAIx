  hobbies: '[''drawing and coloring'', ''building LEGO structures'', ''reading picture books'', ''nature walks and collecting leaves or rocks'', ''making up stories'', ''playing simple board games with
    a sibling'', ''simple science experiments with adult guidance'', ''visiting the local library and art museum'']'
  career_goals: Tina dreams of becoming an artist who can bring the worlds she imagines to life on canvas, or a scientist who explores the outdoors and discovers new creatures. She envisions inventing gadgets,
    like a robot that helps her paint. Her competitive streak makes her eager to win school art contests or science‑fair ribbons, seeing these achievements as stepping stones toward a future where she can
    blend creativity, curiosity, and discovery.
