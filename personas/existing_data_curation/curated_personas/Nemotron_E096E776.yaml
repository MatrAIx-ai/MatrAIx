personas:
  professional: Tina Eadus, a budding creative engineer in training, blends her love of drawing vibrant animal scenes with spontaneous LEGO constructions, turning each play session into an improvised design
    workshop where they experiment freely and ignore strict instructions.
  sports: Tina Eadus participates in the community's Kid's Soccer Club called Little Kickers and attends weekly swimming lessons, where they competitively chase the fastest lap but prefer solo play and
    small‑group games over large, noisy team drills.
  arts: Tina Eadus, an avid young illustrator, fills sketchbooks with whimsical animal portraits inspired by the bold colors of Dr. Seuss and the imaginative landscapes of Studio Ghibli's My Neighbor Totoro,
    and they often reenact scenes from animated classics during playtime.
  travel: Tina Eadus loves short family outings to the nearby nature reserve and the children's museum, dreams of a future adventure to a faraway rainforest after seeing pictures of monkeys, yet they prefer
    designing treasure maps for backyard explorations and collecting pine cones on local walks.
  culinary: Tina Eadus delights in crafting peanut butter and jelly sandwiches with extra strawberry jam, munching on cheese‑filled pretzel bites, and they proudly mix a rainbow fruit salad of blueberries,
    mango chunks, and kiwi slices whenever they help in the kitchen.
  core: Tina Eadus, a curious six‑year‑old with a competitive streak, transforms ordinary play into vivid artistic adventures, though they often resist rigid rules and can be skeptical of others’ motives.
background:
  cultural: Tina grows up in Draper, a suburban community in Utah County, where the prevailing cultural atmosphere blends Mid‑western American values with influences from the local Latter‑day Saints (LDS)
    community. Her family participates in church youth activities, community service projects, and seasonal fairs. The proximity to the Wasatch Mountains offers frequent exposure to hiking, snow‑play, and
    nature‑based learning, shaping her love for outdoor exploration. At school, she experiences a multicultural curriculum that includes art projects and holiday celebrations from various traditions, fostering
    an appreciation for diversity while her household reflects many of the typical white, middle‑class suburban customs of the region.
attributes:
  skills: '[''reading simple sentences'', ''basic counting and arithmetic'', ''writing name and basic words'', ''drawing and sketching'', ''storytelling and imaginative play'', ''building with LEGO and
