persona_description: A pathologist who specializes in the microscopic examination of tissues and organs for diagnostic and therapeutic purposes, particularly in the field of cancer detection. They are skilled
  in performing histological examinations, preparing and analyzing histological specimens, and using different types of microscopes to achieve accurate results. They are also knowledgeable in the use of
  special techniques and methods for targeted biopsy and post mortem examination. They have a unique understanding of the importance of histological examination in detecting abnormal cells and confirming
  cancer, as well as its applications in the study of moles, polyps, and various biomaterials.
