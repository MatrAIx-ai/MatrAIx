persona_description: A NASA engineer who specializes in space shuttle orbiters, specifically the design, development, and integration of the upgraded GPCs. They are responsible for ensuring the reliability,
  performance, and functionality of the GPCs in the space shuttle orbiters, and for the successful transition and maintenance of the upgraded GPCs. They work closely with the flight crew and other engineering
  teams to understand and address any issues or challenges that arise during the mission. They also play a key role in the testing and evaluation of the GPCs, and in the documentation and integration of
  the upgraded GPCs into the space shuttle orbiters.
