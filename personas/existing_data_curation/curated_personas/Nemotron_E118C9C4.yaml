  hobbies: '[''Street basketball'',''Urban photography'',''Healthy soul‑food cooking'',''DIY electronics and Arduino projects'',''Saxophone jazz jam sessions'',''Running and calisthenics'',''Reading speculative
    fiction'',''Volunteering at community health fairs'']'
  career_goals: In the next five years Cedeno aims to transition into nursing informatics, pursuing a Master’s degree in Health Informatics while earning certification as a Clinical Informatics Nurse Specialist.
    He wants to lead the implementation of data‑driven telehealth services at his hospital, focusing on improving access for underserved Black patients in Wilmington. Long‑term, he aspires to become a Nurse
    Practitioner with a community‑health focus, developing programs that address chronic‑disease management and mental‑health support. He also hopes to mentor aspiring Black nurses, using his own experience
    to reduce barriers and promote diversity in the health‑care workforce.
