personas:
  professional: Cedeno Mullone, a 26‑year‑old critical‑care nurse with a knack for health informatics, blends data‑driven curiosity with pragmatic bedside care while juggling a loosely organized schedule
    that often leaves research notes scattered across their desk, yet they champion culturally competent telehealth solutions for underserved patients.
  sports: Cedeno Mullone dribbles at the neighborhood basketball court after night shifts, follows the Philadelphia 76ers and the Baltimore Ravens with a loyal fan’s enthusiasm, and participates in a local
    calisthenics group at Brandywine Park, though they often forget to stretch, leading to occasional knee soreness.
  arts: Cedeno Mullone captures candid street moments around Wilmington with a vintage Leica, channels creativity into saxophone improvisations at the community jazz jam where they riff on Miles Davis and
    John Coltrane, and collects vinyl records of classic soul, though their disarray sometimes leaves camera lenses in a cluttered drawer.
  travel: Cedeno Mullone’s travel style blends spontaneous weekend getaways with careful budgeting, having toured New Orleans for its jazz heritage, Savannah’s historic squares for culinary inspiration,
    and a brief research trip to the Smithsonian’s National Museum of African American History, yet they often postpone longer trips due to fluctuating work schedules and a lingering worry about leaving
    patients uncovered.
  culinary: Cedeno Mullone revamps classic soul‑food by swapping pork with smoked turkey in collard greens, simmering black‑eyed peas with quinoa, and baking sweet potato pie with oat‑crust, often testing
    these healthier twists during community health fairs, though their habit of leaving spices uncovered on the counter sometimes leads to accidental over‑seasoning.
  core: Cedeno Mullone, a 26‑year‑old nurse‑informatician with a restless curiosity, a love for jazz and basketball, and a habit of juggling organized ambition with scattered paperwork, constantly striving
    to fuse cultural heritage with data‑driven health equity.
background:
  cultural: Cedeno is a second‑generation African‑American raised in Wilmington, Delaware. His family’s roots trace back to the Great Migration, and he grew up immersed in the city’s vibrant Black cultural
    scene—church choirs, Juneteenth celebrations, and community barbershop gatherings. The local Black community’s emphasis on mutual support and resilience shaped his values of compassion and self‑advocacy.
    He remains connected to these traditions through volunteer work at neighborhood health fairs, mentorship programs for Black youth, and by celebrating African‑American culinary heritage while adapting
    it for healthier living. His cultural identity informs his professional focus on addressing health disparities and fostering culturally competent care.
attributes:
  skills: '[''Critical care nursing'',''Rapid patient assessment'',''IV therapy'',''Health informatics'',''Electronic medical record optimization'',''Clinical data analysis'',''Telehealth platform integration'',''Patient
