  career_goals: Laurel aims to advance from a receptionist role to an office manager or administrative supervisor within the next three to five years, seeking to lead a small team and streamline office
    processes. She plans to obtain a Certified Administrative Professional (CAP) credential and may pursue a master's degree in museum studies or public administration to transition into a cultural‑heritage
    organization. Her long‑term ambition is to combine her administrative expertise with her passion for local history by overseeing visitor services at a historic site or community museum.
