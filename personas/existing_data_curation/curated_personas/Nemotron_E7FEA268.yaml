  hobbies: '[''Bridge club'', ''Church choir and services'', ''Gardening'', ''Cooking traditional recipes'', ''Morning walks'', ''Reading mystery novels'', ''Craft workshops'', ''Volunteering at senior
    center'']'
  career_goals: Although retired, Carmen aims to stay actively involved in her community. She hopes to serve on the board of the local senior center, expand the community garden program, continue mentoring
    younger members of her church, maintain her health through regular walks, and support her grandchildren’s education by tutoring them in reading and math when needed.
