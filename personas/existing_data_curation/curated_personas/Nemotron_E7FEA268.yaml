personas:
  professional: Carmen Wallace, a retired homemaker turned community volunteer, uses their strong organizational and budgeting skills to coordinate church choir events, senior center board meetings, and
    the expansion of the local community garden with methodical precision, and they rely on a handwritten planner to keep every task on track.
  sports: Carmen Wallace enjoys low‑impact cardio through regular walks with the senior walking club at Red Rock Canyon, follows the Las Vegas Raiders during football season and the Vegas Golden Knights
    in hockey, and prefers routine fitness over high‑intensity competition, and they set a personal step goal each morning.
  arts: Carmen Wallace finds creative fulfillment in singing with the church choir, reading Agatha Christie mystery novels, and attending community theatre productions of classics like "Our Town" while
    listening to the music of Dolly Parton, and they often share favorite passages with bridge teammates during gatherings.
  travel: Carmen Wallace favors well‑planned road trips to national parks such as Grand Canyon and Zion, enjoys weekend escapes to Sedona’s red rocks, and dreams of a leisurely Mississippi River cruise,
    always securing senior discounts and keeping a detailed travel journal, and they map out each itinerary on a large paper calendar.
  culinary: Carmen Wallace delights in preparing Southern comfort dishes like buttermilk‑fried chicken, collard greens simmered with smoked turkey, peach cobbler spiced with cinnamon, and often harvests
    fresh herbs and tomatoes from their backyard garden to enrich the meals, and they proudly label each jar of homemade jam with the date and a doodle.
  core: Carmen Wallace is a routine‑driven, socially active retiree who blends meticulous community service, garden‑fresh cooking, choir singing, and bridge strategy—yet occasionally over‑waters their roses
    and forgets to water their own plants, and they still manage to keep a smiling attitude.
background:
  cultural: Carmen grew up in a close‑knit African‑American family that emphasized faith, community, and respect for tradition. Her parents passed down Southern gospel music, soul‑food cooking, and oral
    storytelling traditions, which she continues to celebrate through choir singing, cooking soul food, and sharing family histories. After moving to Las Vegas in early adulthood, she blended those roots
    with the city’s multicultural environment, becoming an active member of the local Black community and a bridge between older and younger generations through involvement in church, senior programs, and
    cultural events.
attributes:
  skills: '[''Organizational management'', ''Event planning'', ''Budgeting and financial tracking'', ''Basic computer skills (email, word processing, spreadsheets)'', ''Effective communication'', ''Conflict
