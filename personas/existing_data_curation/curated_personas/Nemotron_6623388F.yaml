  hobbies: '["Model train building", "Reading classic and mystery novels", "Bird-watching", "Hiking", "Acoustic guitar", "Woodworking", "Puzzle solving (jigsaw and logic puzzles)", "Digital photography
    (landscapes)"]'
  career_goals: Dale aims to transition back into the workforce by securing a remote, structured role that leverages his organizational and analytical skills, such as data entry, administrative support,
    or junior data analysis. He plans to complete a data-analytics certification within the next year and pursue a Project Management Professional (PMP) credential to broaden his qualifications. Long-term,
    he hopes to combine his love for crafting with entrepreneurship by launching a small online shop for handcrafted wooden accessories, providing a steady income while preserving his need for solitary,
    predictable work environments. Financial stability and a routine that balances work with personal projects are key ambitions.
