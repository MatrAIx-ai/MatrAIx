persona_description: A historian who specializes in the study of the history of the Tahltan people, particularly their migration and settlement in the late 19th century, their population decline and subsequent
  reorganization, and their interactions with other Aboriginal communities and European traders. Their research interests include the history of the Tahltan language, culture, and economy, as well as the
  impact of European and missionary influences on the Tahltan way of life. They are particularly interested in the role of intertribal trade and the development of a shared cultural and linguistic identity
  among the Tahltan people.
