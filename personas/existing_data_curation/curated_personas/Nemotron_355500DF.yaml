  hobbies: '["Gardening (herbs and native Floridian flowers)", "Knitting and crocheting", "Walking nature trails and birdwatching", "Reading historical fiction", "Senior center art classes", "Volunteering
    at community garden", "Participating in local health‑fair outreach", "Cooking with home‑grown produce"]'
  career_goals: Approaching retirement, Dionisia aims to shift her focus toward mentorship and community service. She plans to become a certified dental radiographer, volunteer at local senior health fairs
    to promote oral hygiene, and develop a neighborhood workshop series on basic dental care for older adults. Her long‑term ambition is to serve as a senior advisor in a community dental clinic, leveraging
    her experience to train new staff and ensure high‑quality, compassionate care for the elderly population in Fort Meade.
