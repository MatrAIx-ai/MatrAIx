  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Reading historical fiction'', ''Bridge (card game)'', ''Church choir participation'', ''Volunteering at senior center'', ''Birdwatching'', ''Genealogy
    research'', ''Cooking traditional Midwestern recipes'']'
  career_goals: Although she is retired, Alora’s primary ambition is to stay healthy and independent so she can continue caring for her home and garden. She aims to formalize her culinary and crafting knowledge
    by hosting informal workshops for her grandchildren and neighbors, preserving those skills for the next generation. A personal goal is to launch a small community garden plot that encourages friendly
    competition in seasonal produce, reflecting her competitive streak. She also intends to compile a memoir that records her family’s stories and local history, ensuring a legacy of memory. Occasionally,
    she hopes to travel to visit her children and grandchildren or to take short trips to historic Midwestern sites she has long admired.
