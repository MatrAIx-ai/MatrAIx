persona_description: A climate scientist who specializes in the study of sea level rise, specifically the effects of melting ice sheets and glaciers on global sea levels. They are part of the Ice2sea project,
  funded by the EU, which has generated some of the most accurate figures on the impacts of rising sea levels caused by melting ice sheets and glaciers in Antarctica and Greenland. The scientist is responsible
  for estimating the worst-case scenarios and predicting the potential consequences of rising sea levels for various regions, including Europe, the British Isles, and the Pacific islands. They are also
  involved in testing projections of sea level rise for islands in the Pacific and analyzing the effects of melting ice in the Andes.
