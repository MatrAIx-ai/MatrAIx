personas:
  professional: David Price is a budding builder who transforms Lego bricks into intricate structures, applying their love for order and practical problem‑solving to school projects and classroom challenges.
  sports: David Price is a member of the local Pell City Panthers youth baseball team, enjoys weekly soccer practice at the community park, and they spend their free time climbing trees and searching for
    insects, viewing physical activity as a fun extension of their curiosity.
  arts: David Price delights in drawing detailed sketches of their Lego creations with Crayola markers, reads adventure series like 'The Magic Tree House' by Mary Pope Osborne, and they hum along to child‑friendly
    tunes from 'They Might Be Giants', weaving imagination into their everyday play.
  travel: David Price loves family road trips to the nearby Gulf Shores beach and the Great Smoky Mountains, where they explore tide pools and forest trails, preferring short, well‑planned outings that
    let them collect rocks and observe wildlife.
  culinary: David Price favors classic kid‑friendly meals such as pepperoni pizza, mac and cheese, and homemade chicken nuggets, enjoys crafting DIY mini‑pizzas with cheddar cheese and sliced olives, and
    they often snack on goldfish crackers and fresh apple slices.
  core: David Price is a structured, Lego‑obsessed 7‑year‑old who thrives on routine, carefully saves their allowance, manages mild allergies responsibly, and finds joy in quiet creativity and small‑group
    adventures.
background:
  cultural: David was raised in Pell City, Alabama, a close‑knit Southern community. His family participates in local traditions such as community festivals, church gatherings, and holiday celebrations.
    The cultural environment emphasizes respect for routine, personal responsibility, and supportive neighborhood ties, shaping his preference for structure, reliability, and small‑group interactions.
