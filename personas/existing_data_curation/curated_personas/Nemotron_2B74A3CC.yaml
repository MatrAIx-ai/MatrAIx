personas:
  professional: Cristal Cortes is a three-year-old pretend entrepreneur who runs a meticulously organized toy market, using their methodical planning and competitive streak to arrange the best deals, while
    their curiosity drives them to experiment with new play concepts and their emotional stability lets them stay calm when a tower of blocks collapses.
  sports: Cristal Cortes is a three-year-old who enthusiastically participates in the Tiny Tigers Preschool Soccer Club, idolizes the Los Angeles Lakers for their teamwork, and channels their competitive
    nature into daily sandbox races, balancing high‑energy runs with a methodical habit of counting steps during afternoon walks.
  arts: Cristal Cortes is a three-year-old who delights in drawing swirling rainbows with Crayola crayons while listening to the whimsical tunes of Raffi and the classic lullabies of Disney's "Mickey Mouse
    Clubhouse," and regularly requests family outings to the city children's museum where they can interact with installations inspired by artists like Yayoi Kusama.
  travel: Cristal Cortes is a three-year-old who enjoys weekend trips to the local zoo and a memorable family vacation to Disney World, prefers color‑coded itinerary maps that parents create for each day,
    and dreams of a future adventure to the Great Barrier Reef, balancing excitement with the comfort of a familiar stuffed animal.
  culinary: Cristal Cortes is a three-year-old who adores creamy macaroni and cheese with cheddar and peas, loves to dip chicken nuggets in honey mustard, and proudly insists on sprinkling cinnamon on their
    apple slices, often helping to stir batter in the kitchen while their meticulous nature insists on arranging food on plates by color.
  core: Cristal Cortes is a fiercely curious three-year-old who organizes crayons by hue, hoards spare change in a piggy bank like a tiny accountant, and remains unflappable when a tower of blocks crumbles,
    all while they compete with peers in sandbox dash races.
background:
  cultural: Cristal is raised in Moca, a close‑knit community in the mountainous interior of Puerto Rico. She grows up bilingual, hearing Spanish at home and exposure to English in preschool. Family life
    includes Catholic traditions, celebrations of Día de la Constitución, and participation in local festivals such as the annual coffee harvest fiesta where bomba and plena music fill the streets. She
    enjoys Puerto Rican foods like empanadillas and arroz con gandules, and shares in community customs like making coquito during the holidays. The rich cultural heritage of Puerto Rican folk art, music,
    and storytelling shapes her early appreciation for colour, rhythm, and narrative.
attributes:
  skills: '[''block stacking'', ''simple puzzle solving'', ''crayon drawing'', ''colour sorting'', ''basic counting'', ''nursery rhyme singing'', ''language articulation'', ''following routines'', ''matching
    picture cards'']'
  hobbies: '[''crayon drawing'', ''dance and music'', ''block tower building'', ''garden exploration'', ''picture‑book reading'', ''matching and memory games'', ''toy pattern arranging'']'
  career_goals: Cristal loves to imagine herself as a teacher who shares stories, an artist who paints bright pictures, or a little scientist exploring the garden and the beach. She dreams of learning new
    things every day, discovering how things work, and later helping friends and family by teaching them what she knows. Her curiosity and methodical nature drive her ambition to keep exploring, creating,
    and sharing knowledge.
