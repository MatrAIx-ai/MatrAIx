persona_description: A paleontologist specializing in the study of dinosaur fossils, particularly those of the oviraptorid dinosaur family. Lü is known for his expertise in analyzing the remains of Yulong
  mini, a chicken-sized dinosaur found in central China, and challenging the widely accepted theory that oviraptors were carnivores. He is also interested in the primitive oviraptorids, such as Caudipteryx,
  and their feathered status.
