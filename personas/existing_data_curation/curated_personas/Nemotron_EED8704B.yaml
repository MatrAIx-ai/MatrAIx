personas:
  professional: Felipe Quicano, a 21‑year‑old visual communications student, merges digital illustration, front‑end prototyping, and bilingual storytelling to craft UI/UX designs that echo local motifs,
    channeling their curiosity and competitive drive into meticulously organized yet adaptable project workflows.
  sports: Felipe Quicano follows Bayamón FC soccer and the Vaqueros de Bayamón basketball, spends evenings skating at Parque de los Niños, and supplements with weekly HIIT sessions at the community gym,
    preferring solo or small‑group workouts that satisfy their competitive streak.
  arts: Felipe Quicano nurtures their creative side by playing acoustic guitar to the rhythms of bomba legend Rafael Cepeda, dancing to salsa icons Celia Cruz and modern reggaetón star Bad Bunny at house
    parties, and drawing inspiration from muralist José Campeche and street‑art pioneer Retna for their digital illustrations.
  travel: Felipe Quicano plans low‑cost, culturally immersive trips, ranging from weekend explorations of Old San Juan’s forts and Vieques’s bioluminescent bays to longer stays in Barcelona’s Gothic Quarter
    and Mexico City’s mural‑laden neighborhoods, balancing budget constraints with a hunger for authentic experiences.
  culinary: Felipe Quicano, an amateur cook, masters the art of mofongo with crispy chicharrón, slow‑roasts lechón marinated in adobo, and experiments with plantain‑based sushi rolls, while always keeping
    fresh cilantro and smoky chipotle on hand for a flavor punch.
  core: Felipe Quicano, a 21‑year‑old design aficionado, balances meticulous project planning with spontaneous midnight neon‑photography sessions, often delaying paperwork to chase the perfect light.
background:
  cultural: Raised in Bayamón, a lively municipality within the San Juan metropolitan area, Felipe grew up immersed in the African‑Spanish‑indigenous fusion that defines Puerto Rican culture. His family
    celebrates traditional holidays such as Three Kings Day and the patron saint festival of San Antonio de Padua. Fluency in Spanish and conversational English reflects the bilingual educational environment
    of the island. Music—particularly salsa, bomba, plena, and modern reggaetón—forms the soundtrack of his upbringing, while communal meals featuring mofongo, arroz con gandules, and lechón reinforce family
    bonds. Values of respeto (respect) and orgullo (pride) shape his worldview, and he actively participates in local art workshops, youth cultural initiatives, and community festivals, contributing to
    the preservation and evolution of Puerto Rican heritage.
