  hobbies: '[''Visiting art galleries and museums'', ''Street‑art and urban photography'', ''Playing acoustic guitar (Bomba & folk)'', ''Listening to salsa, plena, and reggaetón'', ''Attending local festivals
    and cultural events'', ''Skateboarding at community parks'', ''Reading speculative fiction by Latin American authors'', ''Coding interactive art projects with Processing'', ''Cooking traditional Puerto
    Rican dishes'', ''Playing strategic board games with a small group'']'
  career_goals: Felipe aims to complete a Bachelor’s degree in Visual Communications at a local university and secure a junior UI/UX design role at a tech startup that focuses on culturally‑driven platforms.
    He plans to build a freelance portfolio that highlights Puerto Rican motifs and contemporary design, eventually transitioning into a lead creative position at a regional museum or cultural center where
    he can orchestrate immersive exhibitions and digital storytelling projects that preserve Caribbean heritage. His competitive drive pushes him to be recognized as a leading voice in the island’s emerging
    design scene.
