  career_goals: Myron aims to advance to a senior systems architect role where he can lead large‑scale infrastructure projects and shape strategic technology roadmaps for his organization. He plans to obtain
    the AWS Solutions Architect – Professional certification and deepen his expertise in enterprise security architecture. Over the next five years, he hopes to spearhead initiatives that improve system
    reliability and sustainability, while also establishing a mentorship program that supports underrepresented employees in the tech workforce. Ultimately, he desires a hybrid remote position that balances
    high‑impact analytical work with the quiet, focused environment he thrives in.
