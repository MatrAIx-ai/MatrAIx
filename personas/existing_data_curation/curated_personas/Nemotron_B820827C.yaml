  career_goals: As a mid‑career professional, Milena aims to transition from a frontline sales associate to a sales manager or regional director within the next five years, overseeing a high‑performing
    team and shaping revenue strategy for a tech or consumer‑goods company. She is driven to earn an industry certification (e.g., Certified Sales Leadership Professional) and to implement a structured
    sales enablement program that raises win rates and shortens sales cycles. Long‑term, she envisions launching her own boutique consulting firm that helps small businesses in the Los Angeles area build
    disciplined sales processes.
