personas:
  professional: Sebastian Rivera, a 27‑year‑old industrial butcher in Fort Worth, leverages their meticulous meat‑cutting expertise, USDA and FSIS knowledge, and ServSafe certification to streamline production
    lines while training newcomers, all driven by their methodical, competitive spirit and pragmatic curiosity.
  sports: Sebastian Rivera, an avid fan of the Dallas Cowboys and Texas Rangers, plays in a local amateur soccer league on Saturdays, hits the lakes for bass fishing each summer, and hits the hill trails
    for cardio hikes, balancing their love of team sports with solitary outdoor pursuits.
  arts: Sebastian Rivera’s cultural canvas blends classic mariachi melodies from Vicente Fernández with the modern storytelling of Bad Bunny, while they regularly stream classic Mexican films by Luis Buñuel
    and attend local western‑swing performances by the Texas Playboys, finding artistic inspiration for their culinary creations.
  travel: Sebastian Rivera prefers meticulously planned weekend road trips—whether a rustic camping stay in Big Bend National Park or a culinary pilgrimage to Oaxaca’s markets—while budgeting for occasional
    international flights that let them explore the rich food traditions of South America.
  culinary: Sebastian Rivera, an accomplished home‑chef and brewer, masterfully fuses smoked brisket with chipotle‑ancho glazed carne asada, crafts house‑made chorizo using pork shoulder, ancho chilies,
    and smoked paprika, and pairs their creations with a citrus‑coriander saison they brew in their basement, showcasing their high‑level technical skill and love for flavor experimentation.
  core: Sebastian Rivera blends methodical precision with a fierce curiosity, turning their love for meat science and quiet reflection into a competitive drive for culinary mastery, all while occasionally
    obsessing over perfecting their smoker temperature and neglecting regular social gatherings.
background:
  cultural: Sebastian was raised in a Mexican‑American household in Fort Worth, where Spanish and English flow interchangeably at home. Family traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day celebrations are central to his identity, and his Catholic faith shapes his holiday observances. Growing up, he assisted his mother in preparing authentic Mexican recipes that blend
    seamlessly with Texan barbecue flavors. His bicultural upbringing connects him to the vibrant Mexican community of Tarrant County while also immersing him in the broader Texan cultural landscape.
attributes:
  skills: '[''butchery and carcass breakdown'', ''custom cut fabrication (e.g., ribeye, brisket, taco meat)'', ''meat trimming and deboning'', ''food safety compliance (USDA, FSIS)'', ''ServSafe certified
    food handler'', ''operating industrial slicers, grinders, and vacuum packaging equipment'', ''inventory management and stock rotation'', ''quality assurance and inspection'', ''equipment maintenance
    and troubleshooting'', ''documentation and record‑keeping'', ''training new staff'', ''basic meat science and nutrition'', ''knowledge of curing and smoking techniques'']'
  hobbies: '[''grilling and smoking meats'', ''preparing Mexican cuisine (e.g., tacos, carnitas, mole)'', ''home brewing craft beer'', ''reading food‑science literature'', ''watching culinary documentaries'',
    ''maintaining and building a backyard smoker'', ''fishing in North Texas lakes'', ''hiking in Hill Country trails'', ''playing board games with close friends'', ''participating in a local amateur soccer
    league'']'
  career_goals: Sebastian aims to advance to a lead butcher or supervisory role within the next three years, obtain a Certified Meat Cutter credential, and earn a food‑safety manager certification. Long‑term,
    he envisions opening a boutique butcher shop that fuses traditional Mexican charcuterie with Texan barbecue, developing artisanal sausage and cured‑meat recipes that showcase his cultural heritage while
    positioning himself as a local authority on high‑quality, culturally inspired meat products.
