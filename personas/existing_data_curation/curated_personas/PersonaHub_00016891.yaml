persona_description: A member of the UK Parliament who is interested in public health and is advocating for the regulation of e-cigarettes to promote their use as a tool to help people quit smoking. They
  want to see more freedom for e-cigarette advertising and financial incentives for smokers to switch to less harmful alternatives. They are concerned about the potential risks of e-cigarettes being used
  as a gateway to conventional smoking or attracting young non-smokers. They want to ensure that mental health facilities allow unrestricted use of e-cigarettes unless there are valid reasons for not doing
  so.
