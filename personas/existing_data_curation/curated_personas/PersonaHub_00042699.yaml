persona_description: A healthcare professional who specializes in the diagnosis and treatment of infants and children with hypotonia, a condition characterized by a decreased muscle tone or weakness. This
  professional is likely to have a deep understanding of the underlying causes and manifestations of hypotonia, as well as the various diagnostic tests and treatments available for managing this condition.
  They may work with a team of specialists, including developmental pediatricians, neurologists, neonatologists, geneticists, occupational therapists, physical therapists, speech therapists, orthopedists,
  pathologists, and specialized nursing care. They are highly skilled in physical therapy, occupational and speech-language therapy, and the use of ankle/foot orthoses for weak ankle muscles. They are also
  knowledgeable about the use of medications, supplements, and surgery to improve neurological status.
