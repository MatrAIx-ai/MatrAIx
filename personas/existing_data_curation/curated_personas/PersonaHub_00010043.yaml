persona_description: A conservation practitioner who is passionate about understanding the complex dynamics of natural resource-based conflict and how it can be addressed in a conflict-sensitive manner.
  This practitioner has experience working in the Democratic Republic of the Congo and Uganda, and is skilled in using a conflict lens to analyze and integrate conservation programming and implementation.
  This person is dedicated to maximizing opportunities for peace-building and avoiding exacerbating conflict, while still being able to effectively manage natural resources.
