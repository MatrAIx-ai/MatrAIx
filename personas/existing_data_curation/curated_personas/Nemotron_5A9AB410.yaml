  career_goals: As she approaches retirement, Mary intends to shift her focus from day‑to‑day purchasing duties to mentoring junior colleagues and sharing best practices with local non‑profit organizations.
    She hopes to develop a sustainability‑focused procurement guide for community groups and volunteer as a procurement advisor for a regional senior services coalition. Additionally, she aims to obtain
    a professional certification such as Certified Professional Purchasing Manager to formalize her knowledge and serve as a guest speaker at regional business workshops.
