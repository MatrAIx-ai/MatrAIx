personas:
  professional: Andy Mcgee, a pint‑sized curator who meticulously arranges their crayons by hue in a makeshift gallery, invites preschool friends to view the 'exhibit' and practices confident introductions
    like a seasoned museum docent, embodying their love for art, methodical planning, and outgoing energy.
  sports: Andy Mcgee, an enthusiastic member of the neighborhood preschool soccer club, dashes after a bright orange ball during weekend practices, cheers loudly for the hometown Green Bay Packers on game
    day, and loves splashing in the community pool during summer swim lessons.
  arts: Andy Mcgee, an avid finger‑painter, delights in splashing rainbow colors across large sheets while humming the Pixar classic 'You've Got a Friend in Me' by Randy Newman, and proudly displays their
    creations on the fridge for family admiration.
  travel: Andy Mcgee, the family’s youngest explorer, enjoys trips to the local children’s museum and sunny afternoons at Santa Monica beach, and dreams of someday riding the gondolas of Venice, Italy after
    spotting the iconic canals in a picture book.
  culinary: Andy Mcgee, a budding kitchen helper, loves spreading peanut butter, honey, and banana slices on toast to create a 'super snack', yet often leaves a trail of crumbs that prompts gentle clean‑up
    reminders from Mom.
  core: Andy Mcgee blends boundless curiosity, tidy organization, and a social spark into a playful four‑year‑old who juggles art, games, and occasional messes with equal enthusiasm.
background:
  cultural: Andy is raised in a Black family in Wendell, a small town in Wake County, North Carolina. His family values community, faith, and cultural heritage, regularly attending a local historically
    Black Baptist church where gospel music and communal gatherings are part of his routine. They celebrate traditions such as Juneteenth and Black History Month, share Southern comfort foods like collard
    greens and sweet potato pie, and introduce him to a blend of music ranging from classic soul to contemporary hip‑hop. His parents emphasize curiosity and education, encouraging visits to nearby art
    museums, the public library, and community center art programs. The close‑knit neighborhood provides frequent picnics, summer festivals, and school events that reflect both Southern and African‑American
    cultural influences.
