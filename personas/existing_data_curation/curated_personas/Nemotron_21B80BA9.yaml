personas:
  professional: Hung Kang, a budding junior organizer at his preschool, balances a love for discovering new ways to build block towers with a practical knack for setting up clear rules, and thrives as the
    talkative center of group play, often leading peers with methodical plans.
  sports: Hung Kang eagerly participates in preschool soccer, idolizes the local professional baseball team the City Lions, volunteers to be team captain whenever possible, follows a disciplined routine
    of stretching before games, and competitively debates who scores the most goals.
  arts: Hung Kang loves drawing superhero cartoons, sings loudly during family karaoke sessions, collects stickers of famed artists like Van Gogh, and uses their talkative energy to showcase each creation,
    blending curiosity with a practical desire for organized art displays.
  travel: Hung Kang has explored the nearby aquarium, dreams of a family trip to the Grand Canyon, meticulously plans outings with colorful maps and snack packs of fruit gummies, and competitively compares
    travel photos with peers, balancing curiosity with practical preparation.
  culinary: Hung Kang enjoys assembling peanut butter and jelly sandwiches with extra honey, slicing rainbow carrots into star shapes, favoring chicken nuggets with ketchup, and sometimes insists on having
    dessert first, showcasing a blend of curiosity, practicality, and playful competitiveness.
  core: Hung Kang is a five‑year‑old whirlwind of curiosity, methodical planning, and talkative confidence, who competes for attention while staying emotionally steady, balancing meticulous organization
    with a love for playful discovery.
background:
  cultural: Hung Kang is a first‑generation East Asian American of Chinese descent, raised in Jacksonville, Florida. His household is bilingual, with Mandarin spoken at home alongside English, and he attends
    weekend Mandarin classes to maintain his cultural language. The family celebrates traditional festivals such as Lunar New Year and Mid‑Autumn Festival, preparing dishes like dumplings and mooncakes,
    and participates in cultural dance performances at his school’s multicultural events. Jacksonville’s diverse community and warm climate allow him to blend his heritage with typical American childhood
    experiences—playing in local parks, enjoying beach trips, and engaging in school activities. His upbringing reflects a blend of East Asian values emphasizing education, respect for elders, and communal
    harmony, while also embracing the openness and individuality encouraged in American culture.
attributes:
