  hobbies: '[''Building LEGO models (especially rockets and vehicles)'', ''Drawing and coloring picture books'', ''Storytelling and role‑play'', ''Playing soccer at the park'', ''Singing nursery rhymes
    and short performances'', ''Reading picture books about space and animals'', ''Helping in the kitchen with family recipes (e.g., dumplings)'']'
  career_goals: Hung Kang’s budding ambitions reflect his love of discovery and his desire to lead. He frequently talks about becoming an astronaut or a scientist who builds rockets, motivated by his fascination
    with space and his methodical habit of drawing detailed spacecraft with LEGO. He also imagines being a teacher who can share stories and guide classmates, echoing his comfort as a center of attention.
    In the short term, he aims to win his school's upcoming science fair and to be chosen as team captain for the kindergarten soccer games, illustrating his competitive drive. Ultimately, he hopes to combine
    his curiosity with practical skills to create things that help others.
