personas:
  professional: Ricardo Lim, a retired bilingual cultural liaison who now volunteers as an art workshop facilitator at the senior center, merges their fluency in Spanish, deep knowledge of European and
    Latino art, and meticulous yet adaptable planning to create intimate, immersive painting and storytelling sessions that nurture community harmony.
  sports: Ricardo Lim enjoys low‑impact fitness, joining the Covina senior walking group for sunrise strolls, cheering on the Los Angeles Dodgers during spring break, and tending to their rose garden as
    a daily strength‑building routine, while avoiding high‑intensity sports that strain their joints.
  arts: Ricardo Lim immerses themselves in the arts by painting watercolors of the SoCal coast reminiscent of Monet, delving into novels by Gabriel García Márquez and contemporary Spanish authors, and savoring
    evenings of Beethoven symphonies and Paco de Lucía flamenco, all while contributing thoughtful insights at their weekly book club.
  travel: Ricardo Lim favors thoughtfully planned mini‑escapes, such as a sunrise hike in Joshua Tree, a weekend tasting tour of Seville’s tapas bars, and a calm coastal drive along California’s Highway 1,
    always traveling with a modest budget, a prepaid travel card, and a keen eye for cultural heritage sites that satisfy their curiosity.
  culinary: Ricardo Lim, an avid home cook, frequently prepares paella infused with saffron and rosemary harvested from their garden, perfects gazpacho with fresh cucumbers and smoked paprika, and experiments
    with churros served alongside an espresso, balancing their culinary curiosity with modest portion control.
  core: Ricardo Lim is a contemplative, art‑loving retiree who channels their curiosity and compassion into watercolor painting, garden therapy, and small‑group cultural mentoring, while wrestling with
    occasional worry and a penchant for splurging on fine brushes.
background:
  cultural: Ricardo is a first-generation Spanish immigrant who grew up in a bilingual household, retaining strong ties to his Andalusian roots while assimilating into American culture. He celebrates Spanish
    holidays such as Semana Santa and Día de los Reyes, and maintains Catholic traditions. His upbringing immersed him in Spanish culinary arts, folklore, and the communal values of extended family, which
    he blends with the multicultural environment of Covina, CA. This dual cultural lens informs his worldview, artistic tastes, and community involvement.
