  career_goals: Marlena aims to become a recognized senior stylist within the next three years, targeting a position at a high‑end Manhattan boutique salon where she can work with celebrity clients. She
    is preparing for advanced certification in color theory and plans to enter regional hair‑styling competitions to benchmark her skills against peers. Long‑term, she dreams of opening her own boutique
    salon in Brooklyn that blends classic craftsmanship with cutting‑edge trends, featuring a community‑focused space that hosts workshops and pop‑up events. She also aspires to become a brand ambassador
    for a sustainable hair‑care line, leveraging her calm confidence and social reach to promote eco‑friendly products.
