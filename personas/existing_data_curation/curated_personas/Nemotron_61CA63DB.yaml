personas:
  professional: Marlena Straub is a Brooklyn-based cosmetology professional who blends razor‑sharp classic haircut techniques with an experimental flair for avant‑garde color, using their talkative, center‑stage
    personality to upsell premium hair‑care lines while precisely time‑blocking a high‑volume client roster through salon management software and a buzzing Instagram feed.
  sports: Marlena Straub is a weekend cyclist with the Brooklyn Bikers club who rides the waterfront park paths, cheers for the Brooklyn Nets and New York Knicks, and balances high‑energy rooftop yoga sessions
    with a casual membership in a co‑ed running group, staying fit while using sport as a social outlet.
  arts: Marlena Straub immerses themselves in Brooklyn’s street‑art scene—scouting works by Kenny Scharf and JR in Bushwick—while attending live shows by The Strokes and Phoebe Bridgers, curating an Instagram
    feed of vintage film captures, and drawing inspiration from the moody portraits of Annie Leibovitz to experiment with bold makeup looks.
  travel: Marlena Straub prefers spontaneous short‑haul trips, having explored the surf towns of Montauk, the artsy streets of Beacon, and a weekend food crawl in Austin, while day‑dreaming about attending
    Tokyo Fashion Week and, when planning, they rely on a mix of budget hostels and boutique hotels that allow them to bring their vintage camera.
  culinary: Marlena Straub enjoys baking artisan sourdough and rye breads for friends, frequently orders avocado toast with za’atar at local cafés, experiments with a signature kale‑quinoa salad drizzled
    in tahini, and occasionally treats themselves to a steaming bowl of Tonkotsu ramen at Totto Ramen, all while mastering a moderate level of home cooking.
  core: Marlena Straub embodies a curious yet pragmatic spark, turning social energy into a competitive edge, all while maintaining a calm, resilient demeanor that quietly fuels their relentless pursuit
    of stylistic excellence.
background:
  cultural: Marlena comes from a White, second‑generation Irish‑Italian family that settled in Brooklyn in the 1970s. Family gatherings center around Sunday pasta dinners and Irish storytelling, fostering
    a deep sense of community and cultural pride. Growing up in a multicultural borough, she absorbed the eclectic energy of New York City—celebrating traditional holidays like St. Patrick’s Day and Italian
    Ferragosto while also participating in citywide events such as the Brooklyn Summer Festival. This blend of heritage and urban exposure informs both her personal style and professional aesthetic, allowing
    her to honor classic European grooming traditions while embracing the bold, diverse influences of contemporary Brooklyn culture.
