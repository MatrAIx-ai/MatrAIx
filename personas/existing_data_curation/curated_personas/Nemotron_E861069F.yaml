personas:
  professional: Brandon Phillips is a seasoned property maintenance specialist with carpentry, plumbing, and electrical expertise, who leverages their methodical project planning, budgeting, and schedule
    coordination to deliver reliable repairs, while aiming to gain HVAC certification and transition into a supervisory role or launch a community‑focused handyman service.
  sports: Brandon Phillips embraces early‑morning surf sessions with the Kona Surfers Club, follows the University of Hawaii Rainbow Warriors football team, participates in weekend trail runs with the Big
    Island Hiking Group, roasts occasional pickup basketball games at the local community center, and they maintain a disciplined fitness schedule that balances cardio, strength, and flexibility.
  arts: Brandon Phillips captures the island’s flora through landscape photography inspired by Ansel Adams, attends monthly art openings at the Hilo Museum of Contemporary Art featuring local painters,
    enjoys the mellow acoustic vibes of Jack Johnson and Israel Kamakawiwoʻole, and they occasionally experiment with watercolor sketches of native plants during quiet evenings.
  travel: Brandon Phillips prefers meticulously planned road trips that blend adventure and relaxation, having explored Maui’s Road to Hana, trekked the Na Pali Coast of Kauai, and scheduled a future solo
    hike through New Zealand’s Tongariro Alpine Crossing, and they budget travel costs to preserve financial stability for their upcoming handyman business.
  culinary: Brandon Phillips delights in preparing ahi poke bowls seasoned with garden‑grown herbs, slow‑cooking kalua pork in a backyard imu replica, and whipping up fresh mango‑lime salsa for tropical
    fruit smoothies, and they showcase a moderate cooking skill that blends traditional island flavors with experimental twists.
  core: Brandon Phillips is a methodical, tool‑obsessed handyman who balances garden‑to‑table cooking, sunrise surf, and tight budgeting, and they keep a spreadsheet for life’s details while occasionally
    over‑ordering camera lenses.
background:
  cultural: Brandon is of white, mainland U.S. ancestry but has lived in Kailua‑Kona for over a decade. He has embraced the local Hawaiian culture, integrating the spirit of ‘ohana’ and ‘aloha’ into his
    daily life. He participates in community events such as the Kona County Fair and respects Hawaiian customs regarding land stewardship and marine conservation. While his family traditions reflect his
    Midwestern roots, he enjoys blending them with local practices, such as sharing home‑cooked Hawaiian meals with neighbors and supporting the preservation of native flora.
attributes:
  skills: '[''Basic carpentry'', ''Plumbing repairs'', ''Electrical troubleshooting'', ''Landscaping and garden maintenance'', ''Project planning and budgeting'', ''Schedule coordination'', ''First aid
