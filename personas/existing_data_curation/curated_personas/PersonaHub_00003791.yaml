persona_description: A Peruvian Indigenous woman who is interested in the health implications of consuming fish, particularly the neurotoxin methylmercury (MeHg), in the Amazon region. She is concerned
  about her and her family's exposure to MeHg through fish consumption and is seeking information on the risk levels and the tolerable weekly intake values for this vulnerable population. She is interested
  in learning about the specific fish species that are consumed in the region, the average household feeding capacity, and the average total fish length. She is looking for ways to reduce her family's exposure
  to MeHg, particularly by choosing fish other than chambira, and is seeking information on the benefits and risks of fish consumption.
