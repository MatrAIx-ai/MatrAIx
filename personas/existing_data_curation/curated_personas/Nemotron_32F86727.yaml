  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Coastal walking'', ''Book club participation'', ''Food pantry volunteering'', ''Yoga and meditation'', ''Crossword puzzles'',
    ''Photo album organization'']'
  career_goals: Looking ahead, Sandra aims to formalize her expertise by completing a bachelor's degree in industrial technology within the next two years and obtaining a Lean Six Sigma Green Belt certification.
    She aspires to move into a supervisory role as a Quality Assurance Lead, where she can oversee a team of inspectors, drive process-improvement projects that reduce error rates, and implement more streamlined
    sampling protocols to lessen workplace stress. Sandra also hopes to broaden her impact by mentoring junior staff and eventually serving as a consultant for small-to-mid-size manufacturers in the New
    England region.
