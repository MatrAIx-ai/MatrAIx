persona_description: A historian and archaeologist who specializes in the study of ancient Near Eastern civilizations, with a particular focus on the Israelite diaspora and the origins of Western peoples.
  They have extensive knowledge of linguistics, mythology, history, and national characteristics, and are skilled in identifying and analyzing evidence from different locations and disciplines. They are
  well-versed in the concept of convergent evolution and the adaptation of Hebrew-type values and modes of thought to Western peoples, and have a deep understanding of the cultural and historical ties between
  the Israelites and the British Isles. They are also knowledgeable about the migration patterns of the Israelites and the presence of Israelites in various parts of the world, including Spain and the north.
