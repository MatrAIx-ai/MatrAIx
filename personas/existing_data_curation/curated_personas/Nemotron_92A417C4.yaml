personas:
  professional: John Torrescrespo, a bilingual registered nurse who blends thorough patient assessment with a competitive drive for clinical excellence, balances curiosity for evidence‑based practice with
    practical protocol adherence, and leverages their Spanish‑English fluency to provide culturally attuned education while pursuing a future as an emergency‑care nurse practitioner.
  sports: John Torrescrespo, a forward for the Cabarrus County community soccer league, channels his competitive streak onto the field while cheering for Charlotte FC in the MLS, regularly hikes Crowders
    Mountain State Park to maintain stamina, and belongs to the local Peak Performers hiking club that meets monthly.
  arts: John Torrescrespo, an amateur acoustic‑guitarist who practices late‑night fingerpicking to songs by John Mayer, Vicente Fernández, and The Paper Kites, attends occasional live shows at the Charlotte
    Music Factory, and finds inspiration in Mexican cinema classics such as Amores Perros.
  travel: John Torrescrespo, an adventurous yet budget‑conscious traveler, spends weekends exploring nearby destinations like the Blue Ridge Parkway, has visited Oaxaca to sample regional cuisine, dreams
    of trekking the Andes in Peru, and prefers planning trips with detailed itineraries on a shared Google Sheet while saving a portion of each shift’s earnings for future journeys.
  culinary: John Torrescrespo, a home‑cook who delights in perfecting traditional Mexican dishes such as chiles en nogada, carnitas, and handmade tamales, experiments with smoky chipotle‑infused marinades
    and fresh cilantro, often uses a cast‑iron skillet for searing, and enjoys hosting taco nights where they showcase the latest family‑recipe twist.
  core: John Torrescrespo, a competitive yet pragmatic 21‑year‑old nurse, merges a love for soccer, guitar, and Mexican cooking with a skeptical, detail‑oriented mindset, constantly juggling ambitious career
    goals, social commitments, and occasional over‑scheduling.
background:
  cultural: John was raised in a Mexican‑American household in Concord, NC, by parents who immigrated from Jalisco. He grew up bilingual, speaking Spanish at home and English at school, and celebrates cultural
    traditions such as Día de los Muertos, Día de la Independencia, and weekly family gatherings featuring homemade tamales and pozole. These experiences fostered a strong sense of family loyalty, community
    responsibility, and respect for Mexican culinary and musical heritage. Living in the South, John blends Mexican customs with Southern hospitality, often sharing his culture through food and community
    events, and uses his dual cultural perspective to bridge gaps in patient care within the diverse population of Cabarrus County.
attributes:
