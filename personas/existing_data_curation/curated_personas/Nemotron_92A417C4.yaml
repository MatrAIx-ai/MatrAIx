  hobbies: '[''Playing soccer in a local community league'', ''Cooking traditional Mexican dishes'', ''Strategy video gaming'', ''Hiking at Crowders Mountain State Park'', ''Learning acoustic guitar'',
    ''Reading medical research articles'']'
  career_goals: John aims to earn a Bachelor of Science in Nursing within the next two years, followed by a Master of Science in Nursing to become a nurse practitioner specializing in emergency care. He
    aspires to take on a charge nurse role to develop leadership skills and to spearhead a community outreach program that improves access to healthcare for Hispanic families in Cabarrus County. Long‑term,
    he envisions contributing to hospital policy development to enhance culturally competent care and patient safety.
