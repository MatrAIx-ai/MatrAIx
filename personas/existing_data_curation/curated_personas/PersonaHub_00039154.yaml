persona_description: A cognitive remediation therapist who specializes in working with individuals suffering from cognitive impairments. They are experienced in conducting neuro-cognitive computer exercises,
  small-group sessions focusing on social-cognitive skills, and individual coaching sessions to improve attention spans, problem-solving skills, and social skills. They are skilled in engaging in CET therapy
  and have a deep understanding of the origins and treatments for cognitive impairment, including medication, therapy, and environmental factors. They are passionate about helping individuals with cognitive
  impairments function more normally within society and are dedicated to providing them with the tools and support they need to improve their cognitive abilities.
