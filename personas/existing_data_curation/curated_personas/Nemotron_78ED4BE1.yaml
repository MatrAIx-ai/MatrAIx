personas:
  professional: Marc Jividen is a business administration junior who channels their relentless drive for structure into leading intramural soccer teams and coordinating club events, using Trello and Asana
    to break down projects into bite‑size tasks while maintaining a competitive edge.
  sports: Marc Jividen is a stalwart of the Allston intramural soccer league, a regular at the campus HIIT class, and a die‑hard fan of the Boston Celtics and Boston Red Sox, often wearing the Celtics'
    green tee while cheering at the games, and they occasionally train with the local Allston FC club to keep their stamina high.
  arts: Marc Jividen dives into the Allston music scene by catching live shows at The Paradise Lounge, where they’ve seen indie bands like The Dandelion Shift and folk singer Maya T, they also attend open‑mic
    nights to support friends, and they spend weekends photographing urban street life, inspired by the gritty work of Vivian Maier, while curating playlists that mix Tame Impala with classic Motown for
    background during study sessions.
  travel: Marc Jividen favors short, budget‑friendly getaways, planning weekend trips to the New England coast—Cape Cod for surf and lobster rolls—or a quick flight to New York City to catch a Broadway
    matinee; they love using Google Flights and hostel‑booking apps, but their student budget and coursework sometimes force them to postpone longer overseas adventures like a dream trip to Barcelona.
  culinary: Marc Jividen enjoys a mix of quick campus eats and homemade meals, favoring spicy tuna rolls, pepperoni pizza from a local Allston pizzeria, and a Sunday ritual of cooking carbonara with pancetta,
    garlic, and pecorino, while their snack drawer is stocked with avocado toast and cold brew coffee, and they occasionally experiment with making their own kombucha, though they sometimes burn the rice
    in the process.
  core: Marc Jividen is a hyper‑organized 19‑year‑old who channels competitive energy into soccer, project planning, and a relentless quest for structure, yet wrestles with anxiety that fuels both their
    drive and occasional self‑sabotage.
background:
  cultural: Marc is a white American of mixed Irish and Italian heritage, raised in a middle‑class family in the Boston suburbs. His upbringing emphasized education, self‑reliance, and a strong work ethic—values
    common in New England culture. Growing up, he participated in local traditions like Red Sox games and community festivals, which reinforced a sense of community involvement. Relocating to Allston exposed
    him to a diverse, artistic, and youthful environment that shaped his sociable and outgoing nature. While his family had modest Catholic roots, Marc now identifies as secular, appreciating the region’s
    progressive attitudes while still honoring the practical, achievement‑focused mindset instilled by his family.
attributes:
