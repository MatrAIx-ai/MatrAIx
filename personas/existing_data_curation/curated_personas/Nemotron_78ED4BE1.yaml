  hobbies: '[''Intramural Soccer'', ''HIIT Group Fitness'', ''Strategic Board Game Nights'', ''Live Music Shows'', ''College Club Event Planning'', ''Team-Based Video Gaming'', ''Urban Photography'', ''Journaling'']'
  career_goals: Marc aims to complete his bachelor’s degree in Business Administration within the next two years, supplementing his studies with a Project Management Professional (PMP) certification. He
    aspires to secure a project coordinator role at a tech firm or consulting agency where performance metrics are clear and advancement pathways are structured. Over the next five years, he envisions climbing
    to a senior project manager or operations manager position, leading high‑impact initiatives and driving measurable results. Financial independence and the eventual possibility of launching his own consultancy
    are long‑term ambitions, all rooted in leveraging his organizational strengths while continually improving his stress‑management strategies.
