  hobbies: '[''Quilting'', ''Crocheting'', ''Community theater costume design'', ''Church choir singing'', ''Gardening'', ''Southern cooking'', ''Historical fiction reading'', ''Genealogy research'', ''Bridge
    (card game)'', ''Organizing craft fairs'']'
  career_goals: Clarissa aims to solidify her professional legacy while ensuring financial stability for her retirement. Over the next five years she plans to compile a handwritten pattern book of her most
    popular designs, launch a modest online boutique to sell her signature dresses and custom accessories, and expand her monthly community sewing circle into a regional craft network. She also hopes to
    mentor at least two younger apprentices, secure a part‑time teaching position at the local community college’s textile program, and establish a small scholarship for a high‑school student interested
    in garment‑making. By creating predictable revenue streams and delegating routine tasks, she seeks to reduce the stress and worry that have long accompanied her business responsibilities.
