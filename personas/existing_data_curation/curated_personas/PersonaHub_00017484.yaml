persona_description: A female astrophysicist who made significant contributions to the field of astronomy, particularly in the discovery of the composition of stars and the structure of the Milky Way. Her
  work was recognized by the discovery of hydrogen as the most abundant element in the universe, and the fact that the Sun is made of mostly hydrogen. She was the first woman to earn a PhD in astronomy,
  and the first woman to be appointed to the Chair of the Department of Astronomy at Harvard. Her perseverance and dedication to her work inspired other female astrophysicists.
