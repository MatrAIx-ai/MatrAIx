  hobbies: '[''Vietnamese cooking'', ''Community volunteering'', ''Karaoke'', ''Tai chi'', ''Gardening'', ''Reading mystery novels'', ''Walking in local parks'', ''Participating in cultural festivals'',
    ''Mentoring younger accountants'', ''Book clubs'', ''Puzzle solving'']'
  career_goals: Linh aims to transition into a part‑time consulting role where she can leverage her extensive audit and accounting expertise to support small businesses and nonprofit organizations in the
    Vietnamese community. She is passionate about mentoring the next generation of accountants, developing financial literacy workshops, and obtaining a Certified Public Accountant (CPA) credential to solidify
    her professional legacy. Additionally, she seeks to ensure a secure retirement for herself while continuing to contribute to community harmony and prosperity.
