personas:
  professional: Reggie Bains, an imaginative 11‑year‑old aspiring junior robotics designer, blends a love for LEGO robotics kits and Scratch programming with a methodical yet flexible approach to projects,
    often leading their school art club’s tech‑art collaborations while balancing school responsibilities, and they enjoy sharing their prototypes with classmates.
  sports: Reggie Bains, an 11‑year‑old member of the Roshamon Soccer Club’s U‑12 team, drills after school with the same enthusiasm they show for watching the Houston Dynamo on weekends, also cheers for
    the Houston Astros during spring training, and they stay active by exploring local wetlands on family bike rides.
  arts: Reggie Bains, an 11‑year‑old art club enthusiast, channels their love for comic‑strip storytelling into sketches inspired by Jim Lee, Stan Lee, and the manga series One Piece, while also listening
    to Hans Zimmer’s scores to fuel digital drawing sessions, and they often share their work on the school’s online gallery.
  travel: Reggie Bains, an 11‑year‑old budding explorer, enjoys planning weekend trips to the Houston Space Center and Galveston’s beachside pier, dreams of a future visit to NASA’s Kennedy Space Center
    in Florida, and they add a pinch of adventure by kayaking through the nearby Texas coastal wetlands with family.
  culinary: Reggie Bains, an 11‑year‑old with a palate for Texas‑style comfort food, loves homemade BBQ brisket, shrimp tacos with fresh lime and cilantro, and can whip up a mac‑and‑cheese casserole rich
    with cheddar and a dash of hot sauce, often experimenting with pecan‑infused desserts after backyard barbecues, and they proudly serve the family’s favorite side dishes.
  core: Reggie Bains, an 11‑year‑old imagination powerhouse who sketches superhero narratives, builds robotics LEGO, sometimes forgets homework when daydreaming, and can’t resist a fresh slice of pecan
    pie after a backyard barbecue, where they always volunteer to serve the family.
background:
  cultural: Reggie grew up in Roshamon, a suburban community in Brazoria County, Texas. His household reflects a typical Texan middle‑class upbringing, celebrating holidays like Independence Day with backyard
    barbecues and joining local events such as the Brazoria County Fair. He attends a public elementary school that offers a culturally diverse environment, exposing him to a range of perspectives while
    maintaining Southern hospitality and a strong emphasis on education and creativity. The proximity to Houston’s space and technology sector fuels his fascination with science and innovation, and family
    outings often include trips to nearby bays, fishing spots, and wildlife preserves, reinforcing his love for the outdoors.
