  career_goals: Reggie dreams of becoming a multimedia artist or video‑game designer who blends storytelling, art, and technology into immersive experiences. He also harbors a long‑term fascination with
    space and hopes one day to contribute visual concepts to aerospace projects or pursue a path toward becoming an astronaut‑in‑training. In the near term, he aims to develop his own interactive story
    apps and participate in school science fairs to showcase his creative solutions.
