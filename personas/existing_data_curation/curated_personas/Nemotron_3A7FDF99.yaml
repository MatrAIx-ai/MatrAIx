  career_goals: Looking ahead, Unsuk aims to transition from full‑time analysis work to a mentorship‑focused role, guiding the next generation of analysts through formal coaching programs and informal knowledge‑sharing
    sessions. She plans to spearhead a community‑based digital inclusion initiative in Elk Grove, offering free technology workshops for seniors and low‑income residents. Additionally, Unsuk hopes to collaborate
    with local non‑profits as a strategic consultant, helping them streamline their IT operations and adopt sustainable technology practices. Ultimately, she envisions a gradual retirement that still allows
    her to contribute her expertise through volunteer consulting, occasional speaking engagements at regional tech meetups, and co‑authoring practical guides on system analysis for aging workforces.
