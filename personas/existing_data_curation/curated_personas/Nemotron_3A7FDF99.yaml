personas:
  professional: Unsuk Ho, a veteran computer systems analyst with over three decades of experience, blends meticulous data modeling, Python and PowerShell automation, and agile leadership with a curiosity‑driven
    yet practical mindset, mentoring cross‑functional teams and delivering reliable, user‑centric solutions while they maintain harmonious collaboration.
  sports: Unsuk Ho, an avid walker and hiker, leads the Sacramento River Trail Walking Group, participates in the Sacramento State Women’s Hiking Club for weekend treks, cheers on the Sacramento Kings and
    Sacramento River Cats, and they sometimes join a senior softball league for friendly competition.
  arts: Unsuk Ho, a calligraphy enthusiast and book‑club host, frequently visits the Crocker Art Museum, attends concerts featuring Yo‑Yo Ma and Ryuichi Sakamoto, and they lead discussions of works by Ken
    Liu and Pearl S. Buck, weaving artistic appreciation into their social gatherings.
  travel: Unsuk Ho, a purposeful traveler, plans trips that combine family reunions in their ancestral homeland with cultural tours of Kyoto and Seoul, explores domestic destinations like Napa Valley and
    the Redwood forests, and they favor short, well‑organized itineraries that respect a modest budget.
  culinary: Unsuk Ho, an adept home chef, skillfully prepares traditional dishes such as kimchi‑jigae, mapo tofu, and steamed dumplings using garden herbs like cilantro and mint, and they delight friends
    with seasonal vegetable stir‑fries, though they sometimes over‑season with chili paste.
  core: Unsuk Ho, a socially vibrant 64‑year‑old systems analyst, balances meticulous technical mentorship with a love for community gardening, calligraphy, and lively book‑club potlucks, and they navigate
    modest financial planning alongside a proactive health routine.
background:
  cultural: Unsuk was born in California to first‑generation East Asian immigrants who instilled in her a deep respect for family, education, and communal harmony. Growing up bilingual in English and her
    parents' native language, she routinely celebrates cultural festivals such as Chuseok and the Lunar New Year, integrating traditional foods, music, and customs into her household. While she embraces
    the progressive, collaborative ethos of the Bay Area tech community, she also carries forward East Asian values of humility, perseverance, and collective well‑being, which shape her approach to teamwork,
    mentorship, and community service in Elk Grove.
