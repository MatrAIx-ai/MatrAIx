personas:
  professional: Glenda Ashworth, an aspiring teen librarian volunteer, combines their meticulous organizational skills and love for routine to curate orderly book displays and assist younger patrons at
    the local library, turning their innate reliability into a budding career focus.
  sports: Glenda Ashworth channels their love of routine into disciplined training with the Greenfield Middle School track team, methodically logging lap times and setting personal bests, while cheering
    for the Chicago Cubs and joining the Riverbend Youth Soccer Club for weekend pick‑up games.
  arts: Glenda Ashworth immerses themselves in contemporary YA novels by authors like John Green and Sarah J. Maas, unwind to the folk‑rock sounds of Sufjan Stevens, and showcase their hand‑knit scarves
    at the school art club, where their precise stitching mirrors their methodical personality.
  travel: Glenda Ashworth prefers well‑planned family trips that blend natural wonder and horticultural delight, such as a recent road adventure to the Grand Canyon’s rim followed by a weekend visit to
    the city’s botanical garden, all while dreaming of a future guided tour of the Keukenhof tulip fields in the Netherlands.
  culinary: Glenda Ashworth delights in the measured art of baking, consistently producing perfectly crisp chocolate‑chip cookies and buttery lemon scones, and they skillfully craft garden‑to‑table pesto
    pasta using fresh basil, pine nuts, and Parmesan, reflecting a calm, methodical culinary style.
  core: Glenda Ashworth is a methodical teen who finds comfort in structured creativity—journaling, knitting, and baking—while navigating intense anxiety that fuels both meticulous habits and occasional
    emotional turbulence.
background:
  cultural: Glenda comes from a typical Midwestern white family in Girard, Ohio. Her upbringing reflects the region’s emphasis on hard work, modesty, and community involvement. Family traditions include
    regular church attendance, holiday meals centered on home‑cooked dishes, and participation in local events such as town fairs and volunteer clean‑up days. The town’s industrial past and close‑knit neighborhoods
    have fostered a strong sense of neighborliness and collective responsibility, shaping Glenda’s cooperative and caring outlook.
