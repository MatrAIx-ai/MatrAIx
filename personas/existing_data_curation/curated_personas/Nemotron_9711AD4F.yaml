  career_goals: Glenda aspires to pursue a career that blends her desire to help others with her love of structure. She dreams of becoming a school counselor or child psychologist, where she can provide
    emotional support to teenagers experiencing anxiety and distress. She also considers a future in nursing or social work, motivated by a commitment to community well‑being and stable, service‑oriented
    employment.
