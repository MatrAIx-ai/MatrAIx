personas:
  professional: Maria Velez, a budding chess competitor and junior game designer in training, blends their love for clear rules and strategic thinking with a methodical approach to mastering openings and
    coding simple games in Scratch, always planning each move ahead.
  sports: Maria Velez plays forward for the Eagle Academy Lions soccer team, follows the Los Angeles Galaxy with a dedicated fan wristband, and channels competitive energy into structured training drills
    and weekend pick‑up games to boost stamina and tactical skill.
  arts: Maria Velez creates comic strips inspired by Stan Lee’s dynamic storytelling, devours mystery novels by Agatha Christie, and listens to Yann Tiersen’s piano compositions while drawing, letting these
    artistic influences shape their imaginative world.
  travel: Maria Velez dreams of trekking the ancient ruins of Machu Picchu after already exploring the Grand Canyon and a weekend trip to Washington, D.C., favoring meticulously planned itineraries that
    balance adventurous sightseeing with quiet moments for sketching and journaling.
  culinary: Maria Velez loves baking family‑traditional sweet pastries such as cinnamon‑sugar dough coils and buttery conchas, carefully measuring flour, butter, cinnamon, and piloncillo, and enjoys pairing
    each warm treat with a steaming mug of hot chocolate during snack‑time.
  core: Maria Velez is a strategic, organized ten‑year‑old who channels competitive drive into chess and soccer while navigating intense emotions with a journal and a love for structured creativity.
background:
  cultural: Maria grew up in a Mexican‑American household where Spanish is spoken daily, and family traditions such as Día de los Muertos, quinceañera celebrations, and weekend gatherings around homemade
    tamales are central to her life. Her parents emphasize the importance of education and community, encouraging her to be proud of her heritage while navigating life in Garden City, Kansas. She attends
    a local Catholic parish, participates in school cultural events that showcase Mexican music and dance, and often helps her family prepare festive dishes that connect her to her roots.
