  hobbies: '[''Chess'', ''Soccer (competitive)'', ''Mystery novel reading'', ''Comic drawing'', ''Baking Mexican sweets'', ''Scratch game development'', ''Journaling'', ''4‑H animal projects'']'
  career_goals: Maria dreams of a career that blends her love for structure with her desire to help living beings. She aspires to become a veterinarian, envisioning herself studying biology and animal science,
    winning science fairs, and eventually providing compassionate care to pets and farm animals in her community. She also hopes to earn scholarships that allow her to attend a bilingual veterinary program,
    so she can serve both English‑ and Spanish‑speaking families in Kansas and beyond. Her competitive nature drives her to aim for top grades and leadership positions in future academic settings.
