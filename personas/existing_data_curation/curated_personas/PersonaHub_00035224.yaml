persona_description: A healthcare professional who is passionate about reducing caesarean-section rates in Sri Lanka by improving pain relief options for mothers. The individual is knowledgeable about the
  cultural and social factors that contribute to the high caesarean-section rates in the country and is dedicated to advocating for the rights of women to receive adequate pain relief during childbirth.
  The healthcare professional is committed to implementing evidence-based approaches to pain management and is interested in collaborating with healthcare providers and policymakers to address the root
  causes of the caesarean-section rate problem.
