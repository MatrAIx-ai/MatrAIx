  hobbies: '["Church socials","Senior center dances and bingo","Gardening","Knitting and quilting","Cooking traditional comfort foods","Walking in local parks","Listening to big‑band and swing music","Watching
    classic TV shows and movies"]'
  career_goals: Although retired, Judith’s primary ambition is to stay actively engaged in her community while preserving her independence. She hopes to continue leading the senior center’s weekly social
    hour, mentor newer volunteers, and expand the garden‑share program for neighborhood seniors. She also wishes to complete a short memoir of her post‑war childhood and learn basic computer skills so she
    can keep in touch with distant relatives and participate in online senior forums. Maintaining her health, managing stress, and remaining a reliable source of kindness and support for friends are central
    to her personal goals.
