persona_description: A Civil Engineering Technology instructor who developed and delivered a web-based distance-learning course in structural analysis. The instructor has extensive experience in teaching
  and has developed a simple and effective approach to teaching the course. The instructor is interested in delivering the course in a flexible and accessible format that accommodates various learning styles.
  The instructor is knowledgeable in web-based learning technologies and has developed a platform to create the e-learning environment. The instructor is interested in measuring student learning throughout
  the course and using feedback to reinforce any concepts that may not have been fully grasped by the students. The instructor is interested in maintaining student-to-student and student-to-instructor interactions
  and is comfortable with the use of online communication tools. The instructor is interested in delivering the course in a way that is effective and engaging for students, and has a strong desire to improve
  the course and student learning.
