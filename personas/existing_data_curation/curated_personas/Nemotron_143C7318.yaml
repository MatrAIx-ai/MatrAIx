  hobbies: '["Maintaining a vegetable garden", "Cooking Southern comfort foods", "Listening to gospel, jazz, and classic R&B", "Watching Houston Astros baseball games", "Volunteering in church community
    outreach", "Organizing neighborhood block parties", "Reading self‑help and practical guidebooks", "DIY home‑improvement projects", "Playing Texas Hold''em with friends", "Collecting vintage vinyl records"]'
  career_goals: Marc aims to be promoted to office manager within the next three years, leveraging his organizational instincts and dependable track record. He plans to obtain the Certified Administrative
    Professional (CAP) credential to formalize his skill set and broaden his career prospects. Long‑term, Marc envisions launching a small community‑focused administrative consulting service that assists
    local non‑profits and faith‑based organizations with day‑to‑day operations, thereby giving back to the Houston neighborhood that shaped him. Throughout these ambitions, he prioritizes steady income
    for his family and maintaining a balanced, stress‑resilient work life.
