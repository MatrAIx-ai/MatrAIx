persona_description: A United Nations Food and Agriculture Organization (FAO) expert who is monitoring global cereal production and its impact on food security and food prices. They are aware of the uncertainty
  surrounding the improvement of cereal production due to the global economic downturn and the potential effects of irregular rains and severe monsoons on crop prospects in West Africa and Far East Asia.
  They are also aware of the FAO's quarterly Crop Prospects and Food Situation report, which estimates the need for external assistance in 32 countries around the world due to crop failures, conflict, insecurity,
  natural disasters, and high domestic food prices. They are likely to be interested in the impact of global economic downturns on food production and food prices, and the FAO's efforts to mitigate the
  effects of food insecurity and ensure food security for all.
