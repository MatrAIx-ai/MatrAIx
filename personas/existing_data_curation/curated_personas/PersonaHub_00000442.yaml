persona_description: A global development expert and advocate for sustainable development, particularly focusing on poverty reduction and hunger eradication. This person is deeply committed to addressing
  the root causes of poverty and hunger, advocating for policies and programs that promote economic growth, job creation, and education. They are knowledgeable about the challenges facing developing countries,
  particularly those in Africa, and are actively working to improve the skills and opportunities of the poor and vulnerable. This person is passionate about investing in workers and their skills, as well
  as in infrastructure and the private sector, to create new sources of global demand and job opportunities. They are also aware of the importance of good governance and the fight against corruption, and
  are committed to creating a more attractive investment climate for businesses.
