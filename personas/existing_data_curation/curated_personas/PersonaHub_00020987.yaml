persona_description: A researcher and scientist who is interested in the health and conservation of coral reefs, particularly those in the United States and Pacific Freely Associated States. This person
  is knowledgeable about the threats facing coral reefs, including coastal development, fishing, sedimentation, recreational use, marine debris, and climate change, and is passionate about finding solutions
  to protect and preserve these critical resources. This person is likely to be active in the Coral Reef Conservation Program and the National Coral Reef Action Strategy, and is committed to the conservation
  of coral reefs as a global issue.
