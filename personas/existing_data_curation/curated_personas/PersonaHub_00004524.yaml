persona_description: A scholar or theologian who is interested in the interpretation and appropriation of the Decalogue from biblical times until today. They have a deep knowledge of major thinkers such
  as Aquinas, Barth, Calvin, Luther, Maimonides, and Wesley, and are familiar with the ways in which the Decalogue has provided theological, ethical, moral, and devotional reflection throughout many facets
  of religious thought. They are also interested in the continuities in interpretation through the centuries as well as ways in which individual theologians departed from reigning readings to develop new
  directions.
