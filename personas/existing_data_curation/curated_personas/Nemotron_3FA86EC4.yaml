personas:
  professional: Lourdes Zuniga, a 16‑year‑old aspiring concept artist, blends surreal imagination with vibrant folk motifs drawn from local murals in both hand‑sketched and digital illustrations, and they
    leverage self‑taught Procreate and Photoshop skills while juggling high‑school classes and a part‑time art‑fair stall to build a portfolio aimed at a future studio apprenticeship.
  sports: Lourdes Zuniga keeps active through sunrise yoga sessions at the riverfront park, sporadic pick‑up soccer games with a small circle of friends, and cheering on the Houston Astros during baseball
    season and the Dallas Cowboys in football, although their spontaneous nature sometimes leads them to skip scheduled workouts in favor of sketching murals.
  arts: Lourdes Zuniga spends evenings immersed in graphic novels like Sandman and Saga, studies concept art from games such as Ori and the Blind Forest, curates playlists that blend Tame Impala with folk
    group Los Cojolites, and draws creative fuel from the surreal paintings of Frida Kahlo and the vibrant murals that line her hometown’s streets.
  travel: Lourdes Zuniga favors spontaneous, sketch‑filled road trips that mix cultural immersion and natural wonder, such as weekend escapes to Big Bend National Park, cultural tours of San Miguel de Allende,
    and family visits to Mexico City, while day‑dreaming of a future backpacking adventure through Kyoto’s temples and Barcelona’s street‑art districts, though their travel plans are often limited by parental
    schedules and a modest teen budget.
  culinary: Lourdes Zuniga enjoys helping her family prepare traditional dishes like tamales, enchiladas, and pozole during holiday celebrations and experimenting in her own kitchen with fusion creations
    such as kimchi‑topped tacos and chipotle‑infused dark chocolate brownies, boasting solid intermediate cooking skills that let them confidently sauté, grill, and season, while they frequently indulge
    in street‑style elote and fresh mango sprinkled with chili powder during weekend outings.
  core: Lourdes Zuniga is a 16‑year‑old bilingual sketch‑enthusiast who blends folk motifs with surreal worlds, devotes spare time to yoga and karaoke, habitually leaves art supplies scattered across her
    room, and dreams of a future as a concept artist.
background:
  cultural: Lourdes grew up in a Mexican‑American family in Brownsville, Texas, a vibrant border city where Mexican and U.S. cultures intertwine daily. At home, Spanish is spoken and Mexican traditions
    such as Día de los Muertos, Día de la Independencia, and family‑centered cooking of tamales, enchiladas, and pozole are celebrated. The community’s rich visual heritage—like colorful papel picado, murals,
    and folk art—has deeply influenced her aesthetic sensibilities. Simultaneously, she navigates English‑language schooling and the broader American pop culture landscape. This bicultural upbringing fuels
    her artistic voice, which often blends Mexican motifs and patterns with contemporary surrealist imagery.
attributes:
  skills: '[''traditional drawing (pencil, charcoal, ink)'', ''digital illustration (Procreate, Photoshop)'', ''basic HTML/CSS'', ''creative writing (short prose, poetry)'', ''bilingual Spanish‑English
    communication'', ''concept development and mood‑board creation'']'
  hobbies: '[''sketching fantastical creatures'', ''digital painting'', ''mixed‑media collages'', ''reading graphic novels and fantasy literature'', ''writing short stories and poetry'', ''photographing
    street‑art murals'', ''listening to eclectic music playlists'', ''practicing yoga'', ''karaoke with friends'']'
  career_goals: Lourdes aims to become a professional concept artist and illustrator, ideally working in the video‑game, animation, or indie publishing sectors. She plans to build a compelling portfolio
    over the next few years, attend a dedicated art school or community college program after completing high school, and secure an apprenticeship or entry‑level position at a studio. She also harbors ambitions
    of publishing speculative fiction, integrating her visual and narrative talents. In the short term, she seeks to refine her digital art techniques, learn advanced 3‑D modeling basics, and expand her
    online presence through a personal website and social media.
