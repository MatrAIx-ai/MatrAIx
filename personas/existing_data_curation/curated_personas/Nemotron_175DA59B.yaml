personas:
  professional: Brian Householder is a retired handyman‑turned‑community curator who, in retirement, blends his woodworking, event planning, and storytelling expertise to orchestrate senior art exhibitions,
    and they meticulously manage budgets and timelines while mentoring volunteers.
  sports: Brian Householder enjoys early‑morning bird‑watching walks with the Sunflower Senior Walking Club, roots for the Kansas City Chiefs in football season and the Royals during summer baseball, and
    occasionally joins the local senior softball league, though they admit a stubborn habit of skipping the post‑game stretch, leading to occasional knee soreness.
  arts: Brian Householder devotes weekends to watercoloring Kansas prairie sunsets inspired by Winslow Homer and Claude Monet, while they write scripts and craft stage designs for the community theater
    workshop, regularly attend performances featuring local thespians such as Margaret Collins, and curate an annual senior art show showcasing works by fellow retirees like Harold Finch.
  travel: Brian Householder plans leisurely road trips that combine art pilgrimages with family‑history research, having already visited the Smithsonian American Art Museum in Washington DC, the Getty Center
    in Los Angeles, and the historic Marquette House in Michigan, while they budget each excursion with a modest travel allowance and prefer staying in historic B&B inns that offer garden spaces.
  culinary: Brian Householder enjoys cooking farm‑to‑table meals using vegetables from his backyard plot, such as roasted heirloom tomatoes with basil, zucchini bread with walnuts, and chicken‑and‑corn
    chowder, and they boast a solid intermediate skill in sautéing and preserving, though they occasionally over‑salt a dish when experimenting with new herb blends.
  core: Brian Householder embodies the curious retiree who balances meticulous organization with artistic whimsy, obsessively cataloguing family genealogy while never missing a bridge game, and they have
    a habit of buying one too many watercolor sets each season.
background:
  cultural: Brian was raised in the heart of the American Midwest, in a family with deep Kansas roots and German‑Irish ancestry. The values of self‑reliance, neighborly cooperation, and modesty that characterize
    small‑town life have shaped his worldview. He grew up attending a Protestant (Methodist) church, participating in community events such as the county fair and high school sports rallies, and experiencing
    the close‑knit social fabric of Victoria, KS. His cultural identity blends Midwestern pragmatism with an appreciation for the region’s agricultural heritage and a growing curiosity about broader artistic
    and intellectual currents.
attributes:
  skills: '[''Woodworking and furniture restoration'', ''Gardening and landscape design'', ''Event planning and community coordination'', ''Digital photography and basic graphic design'', ''Written communication
