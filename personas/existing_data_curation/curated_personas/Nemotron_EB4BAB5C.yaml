  career_goals: Now retired, he aspires to mentor emerging teachers in the area, co‑create a community‑based arts curriculum for local schools, write and self‑publish a memoir documenting his migration
    journey and lifelong love of art, establish a scholarship for underrepresented students pursuing arts or education, and organize an annual cultural exchange festival that showcases South Asian traditions
    alongside Appalachian folk arts.
