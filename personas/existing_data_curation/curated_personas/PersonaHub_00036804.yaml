persona_description: A philosopher and researcher interested in the study of the social sciences, particularly in the field of animal behavior and cognition. This individual is particularly interested in
  the use of experimental methods to understand the cognitive abilities of great apes and their interactions with human researchers. They are familiar with the work of the philosopher and linguist Noam
  Chomsky, and are likely to have an interest in the philosophical implications of the use of language in social interactions. This individual is also likely to have a background in cognitive science and
  linguistics, and is interested in the ways in which language and cognition are related to social behavior and the development of social skills in animals.
