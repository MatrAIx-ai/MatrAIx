  career_goals: Looking ahead, Normand aims to transition from an individual contributor to a QA lead within the next two years, where he can shape testing frameworks and champion a quality-first mindset
    across product teams. He envisions advancing to a QA manager role that balances strategic planning with hands-on mentorship, eventually moving into a director of engineering or product quality position
    where he can influence roadmap decisions and drive cross-functional alignment. Parallel to his corporate trajectory, he hopes to contribute to open-source testing tools and, long-term, launch a boutique
    consultancy that helps startups embed scalable quality practices while maintaining the flexibility he values.
