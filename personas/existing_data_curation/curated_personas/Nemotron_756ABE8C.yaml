personas:
  professional: Sun Rajaraman, a budding visual artist who blends hand‑drawn sketches with digital illustration, leverages their curiosity and compassion to lead art‑club projects, balances meticulous planning
    with spontaneous creative bursts, and often double‑checks details despite occasional over‑thinking.
  sports: Sun Rajaraman, a member of the Greenfield Tigers youth soccer club, enjoys weekend hikes in the nearby Redwood Creek Nature Reserve, supports the River City FC professional soccer team, prefers
    low‑impact cycling to intense competition, and balances athletic activity with school commitments despite occasional worry about staying fit.
  arts: Sun Rajaraman, a dedicated sketcher and watercolor enthusiast, draws inspiration from Studio Ghibli films, Van Gogh’s 'Starry Night,' and the ragas of Ravi Shankar, often recreating fantasy novel
    scenes on a tablet while listening to a blend of Taylor Swift pop hits and classical sitar melodies.
  travel: Sun Rajaraman, who has explored the Redwood Creek Nature Reserve locally and dreams of visiting Kyoto’s bamboo forest and the Louvre in Paris, favors meticulously planned small‑group trips to
    reduce stress, values experiential learning over souvenir shopping, and hopes future travel will combine art workshops with cultural immersion.
  culinary: Sun Rajaraman, an aspiring home cook, enjoys preparing spiced lentil dal, mango lassi, and experimental avocado toast topped with feta and chili flakes, frequently sketches each dish before
    tasting, and relishes the vibrant flavors of curry while still mastering proper knife skills.
  core: Sun Rajaraman is a curiosity‑driven young artist who balances meticulous planning with spontaneous creativity, channels anxiety into artful expression, and occasionally over‑indulges in impulse
    purchases of supplies.
background:
  cultural: Sun comes from a South‑Asian Indian family that maintains traditions such as celebrating Diwali, Holi, and regular visits to a Hindu temple. At home, she hears Hindi and Punjabi alongside English,
    and family meals often feature dishes like dal, roti, and rice. Growing up in Atoka, Tennessee, she blends these cultural practices with Southern hospitality, participating in community festivals, church
    events, and school activities. Her family emphasizes education, respect for elders, and communal support, which shape her compassionate and cooperative nature while also exposing her to a diverse mix
    of cultural experiences.
