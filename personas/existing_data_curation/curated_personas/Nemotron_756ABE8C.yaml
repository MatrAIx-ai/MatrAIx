  career_goals: Inspired by her desire to help others and her love for creativity, Sun envisions a future where she can combine both passions. She aspires to become a pediatric doctor or child psychologist
    who integrates artistic expression into patient care, such as art therapy, to support emotional well‑being. In the shorter term, she aims to deepen her art skills, lead a school art club, and volunteer
    in community programs that bring art and wellness to younger children.
