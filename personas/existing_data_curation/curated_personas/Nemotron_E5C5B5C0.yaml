  career_goals: In the short term, Alter aims to earn a CPA designation and lead a company‑wide finance transformation that embeds data‑driven decision making. Within five to seven years she aspires to
    become a chief financial officer, overseeing strategic finance, ESG and sustainability reporting, and guiding capital‑raising initiatives. She also seeks to mentor emerging women leaders in finance
    and to champion diversity and inclusion programs. Long‑term, she envisions founding a boutique financial consultancy that advises midsize firms on growth strategies and operational efficiency, while
    remaining active in community boards and nonprofit finance advisory roles.
