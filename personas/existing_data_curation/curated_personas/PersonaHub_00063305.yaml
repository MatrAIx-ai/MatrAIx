persona_description: A multifaceted expert who seeks to cure Type 1 diabetes by utilizing his many areas of expertise, including artificial organs, building scaffolds for skin replacements, and improving
  oxygen diffusion methods for stored organs in longer intervals of time. He is currently working on a method to cure Type 1 diabetes through clinical islet allotransplantation for the treatment of Type
  1 diabetes and chronic pancreatitis, where specific cells in the pancreas of a donor are transplanted to a recipient’s liver. He has performed over a hundred islet cellular allotransplantations and travels
  back and forth from his lab at the Medical Research Building to the operating room at the University of Arizona Medical Center during surgical operations.
