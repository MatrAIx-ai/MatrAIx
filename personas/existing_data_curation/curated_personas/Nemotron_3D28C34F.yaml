personas:
  professional: Vijaya Cheema is a data‑driven investigative journalist who blends STEM expertise with storytelling, skillfully extracting and visualizing datasets using Python and R, producing multimedia
    pieces that spotlight technology, environmental justice, and diaspora narratives while maintaining meticulous source documentation and a methodical, deadline‑driven workflow.
  sports: Vijaya Cheema enjoys joining a local running club that meets on Saturday mornings, supports the regional soccer team Seattle Sounders FC, and practices yoga weekly, balancing cardio endurance
    with flexibility training.
  arts: Vijaya Cheema frequently explores contemporary art galleries and experimental theater productions, drawing inspiration from artists like Ai Weiwei, musicians such as Björk, and playwrights like
    Caryl Churchill, which fuels their narrative style and multimedia storytelling.
  travel: Vijaya Cheema prefers thoughtfully planned trips that mix cultural immersion and creative inspiration, having recently visited Berlin for its street art scene, Kyoto for its temple gardens, and
    dreaming of a future solo trek through the Scottish Highlands while keeping travel costs within a modest budget.
  culinary: Vijaya Cheema loves cooking traditional Punjabi and Pakistani dishes like butter chicken, sarson da saag, and biryani, often experimenting with fusion twists such as butter chicken tacos and
    tamarind‑glazed cauliflower, and delights in sourcing fresh cilantro, garam masala, and mango chutney for vibrant home‑cooked meals.
  core: Vijaya Cheema blends a curiosity for data and art, a disciplined work ethic, and a penchant for late‑night coffee‑fueled editing sessions, yet sometimes forgets to turn off phone notifications during
    deep‑focus writing sprints.
background:
  cultural: Vijaya grew up in a South‑Asian Muslim household of Punjabi heritage, with parents who immigrated from Pakistan. She speaks English fluently and is conversational in Urdu and Punjabi, which
    enriches her ability to connect with diaspora communities. Her family places high value on education, community service, and cultural traditions such as celebrating Eid and incorporating Punjabi music
    and cuisine into daily life. Living in Newtown, PA, she navigates a blend of suburban American culture and a vibrant South‑Asian community, which informs her perspective on identity, social cohesion,
    and the stories she chooses to tell.
attributes:
  skills: '[''Data-driven investigative reporting'', ''Statistical analysis (Python, R)'', ''Data visualization (Tableau, matplotlib)'', ''Multimedia production (video editing, audio editing, photography)'',
    ''Content Management Systems (WordPress, Drupal)'', ''Social media strategy and analytics'', ''Fact‑checking and source verification'', ''Interview techniques'', ''Narrative storytelling'', ''Project
    management and editorial calendar coordination'', ''Media law and ethics'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending experimental theater and indie film screenings'', ''Street photography and photo essay creation'', ''Cooking traditional South Asian meals
    and exploring fusion recipes'', ''Practicing yoga and meditation'', ''Reading non-fiction (science, history, media studies)'', ''Participating in data journalism workshops and tech meetups'', ''Writing
    personal essays and creative fiction'', ''Volunteering with community literacy and mentorship programs'', ''Traveling to cultural heritage sites'']'
  career_goals: Vijaya aspires to become a senior investigative journalist focusing on technology, environmental justice, and diaspora issues. She aims to lead a data‑journalism team at a major news outlet,
    produce in‑depth documentaries, and eventually transition to an editorial leadership role where she can mentor emerging reporters. In the next five years, she plans to earn a master’s in journalism,
    expand her expertise in AI‑driven reporting tools, and contribute to public‑interest series that amplify under‑represented South Asian voices.
