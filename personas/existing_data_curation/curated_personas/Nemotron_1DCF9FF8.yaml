  hobbies: '[''Live‑music concerts'', ''Karaoke hosting'', ''Community theater improv'', ''Sailing on the Gulf Coast'', ''Coastal photography'', ''Cooking seafood dishes'', ''Beach sunrise running'', ''Mindfulness
    meditation'', ''Design meetups and workshops'', ''Mentoring youth in coding and design'']'
  career_goals: Thomas aims to transition from senior digital interface designer to a creative director role where he can shape product strategy at the intersection of design and business. He envisions
    leading a multidisciplinary design team that produces user‑centric, accessible digital experiences for regional organizations and startups. Over the next five years, he plans to launch a boutique design
    studio that partners with local businesses to revitalize their online presence, while also becoming a sought‑after speaker at industry conferences on the value of marrying curiosity-driven experimentation
    with practical implementation. He is also driven to earn a certification in accessibility compliance to champion inclusive design as a core business advantage.
