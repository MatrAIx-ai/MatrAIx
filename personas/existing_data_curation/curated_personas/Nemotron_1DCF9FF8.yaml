personas:
  professional: Thomas Jordan, a senior digital interface designer, blends curiosity-driven experimentation with pragmatic business acumen, leveraging Figma, Sketch, and Adobe Creative Suite to craft accessible,
    data-informed experiences while championing collaborative workshops and confidently presenting ideas to stakeholders, despite occasional over‑worry about project deadlines.
  sports: Thomas Jordan, an avid weekend sailor and sunrise beach runner, is a member of the Gulf Coast Sailing Association, regularly participates in local 5K beach races, and passionately roots for the
    Tampa Bay Buccaneers, Tampa Bay Rays, and Orlando City SC, blending his love of water sports with a disciplined yet flexible fitness regimen that balances competitive spirit with social camaraderie.
  arts: Thomas Jordan, who regularly performs karaoke at local venues and volunteers with a community theater improv troupe, immerses themselves in the works of Beyoncé, John Coltrane, and the indie folk
    band The Lumineers, draws inspiration from Ansel Adams’ coastal photography, and frequently attends performances by the Sarasota Opera, using these artistic experiences to fuel their design storytelling.
  travel: Thomas Jordan, a 38‑year‑old design professional who prefers a mix of meticulously planned weekend getaways and spontaneous cultural explorations, has sailed the Gulf Coast, trekked the streets
    of Barcelona for Gaudí-inspired design insights, relaxed in the Bahamas’ Exuma Cays, and now dreams of attending a design summit in Kyoto while balancing his studio launch budget and family responsibilities.
  culinary: Thomas Jordan, an enthusiastic home‑chef who frequently shops at farmers’ markets for fresh Gulf shrimp, pecan‑crusted catfish, and buttery lobster, showcases their culinary flair by whipping
    up shrimp ceviche with lime juice and jalapeño, blackened mahi‑mahi with Cajun seasoning, and hearty seafood paella featuring saffron, clams, and chorizo, while also indulging in upscale seafood restaurants
    for oyster Rockefeller and sushi rolls.
  core: Thomas Jordan, a charismatic, curiosity‑driven design leader who channels their love for social spotlight, coastal adventure, and meticulous organization into creating inclusive digital experiences,
    yet battles occasional stress‑induced overthinking and impulsive splurges on gear and events.
background:
  cultural: Thomas grew up in the Gulf Coast region of Mississippi, absorbing the area’s emphasis on community, hospitality, and a love for the ocean. His Southern upbringing, combined with a business education,
    instilled in him a practical work ethic and a strong sense of interpersonal connection. He values local traditions such as seasonal seafood festivals, church gatherings, and neighborhood bonfires, which
    reinforce his sociable and collaborative nature. While he identifies as white, his cultural perspective has been broadened by collaborations with diverse clients and participation in inclusive design
    initiatives throughout his career.
attributes:
  skills: '[''UI/UX design'', ''User research and persona development'', ''Wireframing and prototyping (Figma, Sketch)'', ''Design systems creation'', ''Responsive web design'', ''HTML/CSS/JavaScript basics'',
    ''Accessibility compliance (WCAG)'', ''Adobe Creative Suite (Photoshop, Illustrator)'', ''Data‑driven design decision making'', ''Business analysis'', ''Project management'', ''Stakeholder communication'',
