personas:
  professional: Kathy Ivey blends meticulous budgeting, event coordination, and budding medical billing expertise into a community‑focused career path, leveraging their organized, methodical nature and
    compassionate assertiveness; they streamline clinic operations while preparing to launch a home‑based Southern catering side‑business.
  sports: Kathy Ivey enjoys low‑impact cardio by walking the Natchez Trace; they participate in the local Natchez Trace Trail Runners club, cheer on the New Orleans Saints during football season, follow
    the Memphis Grizzlies, and maintain a weekly yoga routine to balance flexibility and strength.
  arts: Kathy Ivey finds solace in the choir’s harmonies; they revere gospel staples by Mahalia Jackson, admire Maya Angelou’s storytelling, and roll out crafts inspired by Faith Ringgold’s quilt patterns,
    while occasionally indulging in late‑night re‑watches of classic Southern dramas like The Help and listening to the breezy tunes of Zac Brown Band.
  travel: Kathy Ivey plans trips with a blend of careful budgeting and curiosity; they have explored historic Charleston, the music city of Nashville, and the blue‑ridge serenity of Asheville, while dreaming
    of a pilgrimage to the French Quarter in New Orleans and a cultural retreat to Barcelona’s Gothic Quarter.
  culinary: Kathy Ivey expertly prepares fried catfish, shrimp and grits, and buttery collard greens using garden‑fresh herbs like sage and thyme; they balance classic Southern comfort with modern twists,
    and boast a confident intermediate cooking skill, though they often over‑salt dishes when experimenting with new spice blends.
  core: Kathy Ivey is an organized, community‑driven Southern homemaker with a curious palate, a spreadsheet‑loving brain, and a habit of stitching gifts while they juggle aspirations for medical billing
    and a catering venture.
background:
  cultural: Kathy grew up in the deep South, raised in a close‑knit, predominantly white, middle‑class family in the Morton area of Scott County, Mississippi. Her upbringing emphasized hospitality, regular
    church attendance, and a strong sense of community responsibility. She is steeped in Southern customs such as Sunday potlucks, church fellowship, and local festival celebrations. The regional culture
    has shaped her values of resilience, modesty, and a pragmatic outlook, while also fostering an appreciation for the traditions of Southern cuisine, storytelling, and neighborly support. Although her
    background aligns with mainstream Southern cultural norms, Kathy respects the growing diversity within her community and is open to varied perspectives.
attributes:
  skills: '["Event planning", "Household budgeting", "Basic home maintenance", "Gardening", "Southern cooking", "Bookkeeping (informal)", "Volunteer coordination", "Computer literacy (email, social media)",
