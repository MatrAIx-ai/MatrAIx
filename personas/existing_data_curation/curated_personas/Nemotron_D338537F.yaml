  hobbies: '["Gardening", "Cooking Southern cuisine", "Reading historical fiction", "Book club participation", "Library volunteering", "Church choir", "Bird‑watching", "Quilting", "Crocheting"]'
  career_goals: Kathy is motivated to translate her community skill set into a part‑time or freelance role that offers both stability and personal fulfillment. Short‑term, she plans to obtain her GED and
    pursue certification as a Medical Billing and Coding specialist, targeting a position at the local health clinic where she can blend her organizational strengths with a desire to help others. She also
    explores the possibility of launching a home‑based catering service focused on Southern comfort food, leveraging her cooking expertise and budgeting acumen. Long‑term, Kathy aspires to become a recognized
    resource for local residents, possibly serving on the Scott County Board of Public Health or leading a volunteer network that supports seniors and low‑income families in Morton.
