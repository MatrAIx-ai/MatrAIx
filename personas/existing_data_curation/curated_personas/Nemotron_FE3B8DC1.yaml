personas:
  professional: Nannette Fountain is a library services specialist turned strategic educational leader who leverages their graduate business training, expertise in instructional design, cataloging systems
    like Alma and WorldCat, and a methodical, competitive mindset to craft art‑infused literacy programs while meticulously managing budgets and grant proposals.
  sports: Nannette Fountain enjoys weekend hikes on the Monte Sano trails, participates in a community yoga class, follows the Alabama Crimson Tide football and the Atlanta Hawks basketball teams, and maintains
    a modest running routine that they track with a smartwatch, balancing competitive spirit with Southern love of outdoor leisure.
  arts: Nannette Fountain spends their evenings sketching watercolors inspired by the works of Georgia O'Keeffe and local artist William Christenberry, curates interdisciplinary library exhibitions featuring
    pieces by Yayoi Kusama and Julian Schnabel, and finds solace in listening to folk singer Emmylou Harris while photographing the Tennessee Valley’s landscapes.
  travel: Nannette Fountain prefers meticulously planned road trips that blend cultural immersion with nature, having explored the historic streets of Savannah, the art museums of Florence, the music scene
    of New Orleans, and the hiking vistas of Asheville, while dreaming of a future retreat to the Scottish Highlands for sketching inspiration.
  culinary: Nannette Fountain, an adept home cook, blends Southern comfort food with fresh herbs, regularly prepares shrimp and grits with thyme and lemon zest, bakes pecan pie using locally sourced pecans,
    and experiments with herb‑infused vinaigrette for garden salads, though they habitually over‑salt dishes when distracted by podcast listening.
  core: Nannette Fountain merges Southern hospitality with a relentless drive for innovative library leadership, balancing meticulous organization and competitive ambition with a quirky habit of humming
    hymns while sketching watercolors.
background:
  cultural: Nannette was raised in a small Southern town in Alabama, immersed in the region’s close‑knit community values, church gatherings, and Southern hospitality. Her family’s European‑American heritage
    and participation in local festivals, church events, and school activities instilled a strong sense of tradition, family meals, storytelling, and community service. While she cherishes these Southern
    cultural touchstones, her higher education and career have broadened her outlook, leading her to blend traditional Southern values with a curiosity for contemporary art, innovative education, and diverse
    perspectives.
