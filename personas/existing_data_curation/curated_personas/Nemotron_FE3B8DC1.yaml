  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Reading (fiction and nonfiction)'', ''Hiking'', ''Cooking Southern cuisine'', ''Herb gardening'', ''Adult literacy tutoring'',
    ''Book club participation'', ''Journaling'', ''Podcast listening'']'
  career_goals: Nannette aims to move into a senior leadership position—such as library director or regional educational services manager—where she can champion innovative, art‑infused learning experiences
    and expand digital resource access throughout Morgan County. Over the next five years she plans to earn a library management certification and pursue a doctorate in educational leadership to deepen
    her expertise. She is determined to secure multiple grant‑funded projects that integrate local artists into library programming, establish a community learning hub, and mentor emerging library professionals,
    positioning herself as a competitive and forward‑thinking leader in her field.
