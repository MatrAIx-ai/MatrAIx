  career_goals: Tina aims to earn her Certified Public Accountant (CPA) credential within the next three years, building on her partial college coursework in accounting. She envisions progressing to a senior
    accountant role at a regional firm or becoming the lead bookkeeping specialist for a local nonprofit arts organization, where she can combine her financial expertise with her love for the arts. Long‑term,
    she aspires to transition into a financial controller or chief financial officer position, leveraging her strengths in process optimization and team collaboration. She also hopes to mentor junior staff,
    fostering an environment that values both precision and innovative problem‑solving.
