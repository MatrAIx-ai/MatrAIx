personas:
  professional: Tina Taylor is a detail-oriented bookkeeping specialist at a regional firm, leveraging QuickBooks mastery, Excel pivot tables, and VBA macros to streamline payroll and reporting while injecting
    creative problem solving inspired by her love of set design, and she actively prepares for the CPA exam to transition toward a senior accountant role in the arts nonprofit sector.
  sports: Tina Taylor is an avid weekend hiker on the Ozark Trail, participates in the Springfield Trail Runners' 5K club, and roots for the St. Louis Cardinals while attending games at Busch Stadium when
    time permits, balancing low-impact cardio with occasional yoga classes at the local community center.
  arts: Tina Taylor immerses themselves in the regional art scene, volunteering on set design for the community theater, attending gallery openings featuring artists like Ansel Adams and Yayoi Kusama, snapping
    candid street photos with a vintage Fuji X-100, and knitting scarves inspired by the color palettes of Georgia O'Keeffe.
  travel: Tina Taylor prefers curated road trips that blend outdoor adventure and cultural stops, having driven the Blue Ridge Parkway in autumn, explored the historic streets of New Orleans, and planning
    a future visit to Santa Fe's art markets, while relying on a mix of Airbnb rentals and budget-friendly train tickets to stretch their modest travel savings.
  culinary: Tina Taylor enjoys experimenting in the kitchen, mastering dishes such as Thai green curry with fresh lemongrass, shrimp etouffee seasoned with smoked paprika, and homemade sourdough loaf, while
    sourcing heirloom tomatoes and rosemary at the farmer's market, yet they sometimes over-salt a sauce when distracted by a new photography project.
  core: Tina Taylor blends meticulous bookkeeping with artistic curiosity, balancing spreadsheets, paintbrushes, and hiking boots while navigating modest finances and occasional health procrastination.
background:
  cultural: Tina was raised in a small‑town Midwestern environment in Laclede County, Missouri, where community ties and practical values are prominent. Her family traditions reflect a blend of rural American
    heritage and the modest, hospitality‑driven culture typical of the region. Growing up, she participated in local school events, church gatherings, and county fairs, which fostered a strong sense of
    belonging and civic responsibility. While she embraces these Midwestern roots, she also seeks diverse artistic experiences and stays open to new cultural perspectives through travel, regional festivals,
    and exposure to varied artistic media.
