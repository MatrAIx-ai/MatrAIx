personas:
  professional: Sydney Swan is an environmental engineering professor who blends data-driven modeling with visual storytelling, designing interdisciplinary STEAM curricula, securing NSF grants, and fostering
    inclusive research labs while balancing meticulous organization with spontaneous creative pivots.
  sports: Sydney Swan is an avid hiker who climbs the Wasatch Range with the Wasatch Mountain Club, hits the slopes for snowboarding in winter, practices yoga thrice weekly at a local studio, and follows
    the Utah Jazz and Real Salt Lake with enthusiastic weekend game viewings.
  arts: Sydney Swan frequents the Utah Museum of Fine Arts, sketches inspired by James Turrell’s light installations, draws digital illustrations echoing Bee Bee Bee’s (Beeple) futuristic aesthetics, and
    credits the music of Björk and the poetry of Rumi for fueling their creative brainstorming sessions.
  travel: Sydney Swan favors purposeful travel, meticulously planning hikes in national parks like Zion and Iceland’s volcanic landscapes, while budgeting for occasional spontaneous weekend trips to Sedona’s
    red rocks, all while dreaming of a future research sabbatical in Kyoto’s sustainable architecture scene.
  culinary: Sydney Swan experiments in the kitchen, mastering dishes like kimchi-infused tacos, miso-glazed salmon with grainy pomegranate seeds, and handcrafted sourdough topped with za’atar, while favoring
    ingredients such as quinoa, sumac, and locally foraged sage.
  core: Sydney Swan is a curious, art-loving engineer who balances rigorous data work with spontaneous sketching, treats yoga as a daily reset, and occasionally forgets to floss, all while dreaming of sustainable
    design breakthroughs.
background:
  cultural: Sydney comes from a White, middle-class family rooted in the Intermountain West, with cultural ties to the broader Utah community. Growing up in the Salt Lake Valley, she was exposed to a blend
    of LDS-influenced communal values—emphasizing cooperation, modesty, and service—and a progressive academic environment that encouraged curiosity and critical thinking. This background nurtured her appreciation
    for nature, outdoor recreation, and the arts, while reinforcing a strong work ethic and a commitment to inclusive, community-oriented education. Her marriage reflects a partnership that balances professional
    ambition with a shared love for local cultural events and volunteerism.
