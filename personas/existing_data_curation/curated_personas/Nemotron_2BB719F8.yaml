  career_goals: Sydney aims to achieve tenure within the next five years while expanding her role as an interdisciplinary educator. She plans to launch a STEAM initiative that integrates visual arts into
    engineering curricula, secure a major NSF grant for sustainable infrastructure research, and publish a series of high-impact papers on data-driven environmental design. Long-term, she aspires to become
    department chair, championing policies that promote equity, community outreach, and experiential learning. She also hopes to develop a series of online open-access courses that make her field accessible
    to learners beyond Utah, especially underrepresented groups in STEM.
