  hobbies: '[''Fly fishing'', ''Woodworking'', ''Reading Historical Non-Fiction'', ''Gardening'', ''Volunteer Tutoring'', ''Local History Preservation'', ''Hiking'']'
  career_goals: Neil aims to transition into a senior operations role where he can lead large‑scale efficiency initiatives for a regional manufacturing firm while mentoring emerging managers. He also hopes
    to spearhead a community sustainability program in White Cloud that reduces waste and improves local employment, and he plans to develop an employee‑wellness framework to address workplace stress before
    his planned retirement in the next five to seven years.
