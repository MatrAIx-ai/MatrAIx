persona_description: A marine biologist who specializes in the study of sea urchins and their impact on the kelp forest. She is particularly interested in the behavior and ecology of urchins, their interactions
  with predators, and the potential for urchin barrens as a result of overexploitation. She is also knowledgeable about the role of sea otters and sheepheads as predators and the impact of these predators
  on urchin populations. She is passionate about conservation efforts to protect the kelp forest and the diverse marine life that depends on it.
