personas:
  professional: A budding engineer-in‑training named Gustavo Montiel delights in stacking wooden blocks and wiring toy cars, channeling their innate curiosity and practical playfulness, and they tackle
    early problem‑solving experiments with a flexible, unstructured style that mirrors their tiny projects.
  sports: A miniature athlete named Gustavo Montiel spends afternoons at the neighborhood splash pad and toddler‑friendly soccer classes, often waving a miniature Grand Rapids Griffins banner while preferring
    spontaneous tag games over rigid drills, and they show a love for free‑form movement.
  arts: A little performer named Gustavo Montiel loves dancing to the upbeat rhythms of Shakira and the lively mariachi tunes his family plays during Día de los Muertos celebrations, often humming the theme
    from the movie Coco while clutching a plush toy of a dancing cactus, revealing their boundless energy for creative expression, and they delight in improvising moves.
  travel: A curious explorer named Gustavo Montiel enjoys family road trips to the interactive children’s museum in Chicago and the splashy wonders of Orlando’s theme parks, and they find that their favorite
    short getaway remains a weekend visit to the vibrant Grand Rapids Public Museum’s multicultural festival, which satisfies their appetite for bright colors and lively parades.
  culinary: A budding foodie named Gustavo Montiel eagerly digs into soft cheese quesadillas, mild chicken tacos, and fluffy masa tamales, often smearing a dab of fresh guacamole on their little fingers
    and proudly stirring soft banana‑cinnamon batter under their mother’s watchful eye, and they grin with crumbs on their cheeks.
  core: Gustavo Montiel is a two‑year‑old bundle of boundless energy who mixes inquisitive tinkering with spontaneous dance, collects loose change in a pink piggy bank, and leaves a trail of toys wherever
    their curious mind leads, and they never fail to smile at the chaos.
background:
  cultural: Gustavo is raised in a Mexican‑American household where Spanish is spoken at home and Mexican traditions are celebrated. His family observes Día de los Muertos, Día de la Independencia, and
    enjoys Mexican cuisine such as tacos and tamales. Living in Grand Rapids, Michigan, he also participates in local Cinco de Mayo parades and multicultural festivals at the Grand Rapids Public Museum.
    This bilingual, bicultural environment shapes his early language development and nurtures a love for music, dance, and close family ties.
