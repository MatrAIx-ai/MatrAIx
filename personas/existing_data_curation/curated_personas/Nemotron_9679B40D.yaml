  career_goals: Gustavo’s ambitions revolve around exploration and growing independence. He looks forward to mastering new words, riding his tricycle, and putting on his shoes without help. He often pretends
    to be a firefighter, expressing a budding desire to help others. He hopes to attend preschool soon, where he can learn to count, draw recognizable pictures, and make more friends, laying the foundation
    for future learning and community involvement.
