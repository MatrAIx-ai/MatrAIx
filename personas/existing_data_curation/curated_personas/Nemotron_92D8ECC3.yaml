  hobbies: '[''Beach volleyball'', ''Live music concerts'', ''Salsa dancing'', ''Food blogging'', ''Food photography'', ''Yoga'', ''Mindfulness meditation'', ''Volunteer cooking at a shelter'']'
  career_goals: Norma aims to advance from line cook to sous‑chef within the next two years, followed by earning an associate’s degree in culinary arts at a local community college. She plans to blend practical
    experience with formal training to become a head chef at a restaurant that showcases sustainable, locally sourced seafood. Long‑term, she dreams of opening a modest waterfront café featuring fusion
    tacos and seasonal salads, allowing her creative curiosity to flourish while maintaining a stable business model. She also intends to obtain a Certified Chef de Cuisine credential and develop leadership
    skills through mentorship programs.
