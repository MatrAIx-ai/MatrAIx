  hobbies: '[''Digital sketching and mixed‑media art'', ''Street photography'', ''Visiting museums and art installations'', ''Reading science fiction and philosophy'', ''Playing chess and competitive esports'',
    ''Learning Quechua'', ''Cooking traditional Bolivian cuisine'', ''Exploring Miami’s art districts'', ''Creating mood boards and design concepts'']'
  career_goals: Ovidio aspires to combine his artistic vision with technology, aiming to study graphic design or interactive media at a university that offers a strong portfolio‑based scholarship. His short‑term
    ambition is to build a robust online portfolio showcasing digital illustrations and multimedia projects, and to secure freelance commissions for visual branding. Long‑term, he dreams of founding a boutique
    creative studio that provides culturally‑infused branding and UI/UX design for Latin American businesses, while also developing an independent web platform that curates emerging artists from the Bolivian
    diaspora. He intends to obtain a bachelor’s degree in Visual Communication or Computer Science, followed by a Master’s in Design Innovation, positioning himself as a leader at the intersection of art,
    technology, and cultural entrepreneurship.
