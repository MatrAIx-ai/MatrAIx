  career_goals: Edward dreams of becoming a mechanical engineer or a robotics inventor who designs machines that solve everyday problems, such as a toy‑organizer robot or a bike that adjusts gears automatically.
    He is fascinated by space technology and hopes to help build rovers or satellites someday. In the near future, he aims to join his school’s STEM club, compete in local robotics challenges, and continue
    refining his designs through trial and error, reflecting his mix of curiosity and practical testing.
