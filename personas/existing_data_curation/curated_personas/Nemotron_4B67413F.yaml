personas:
  professional: Edward, a budding LEGO architect, channels their curiosity for machines and practical mindset into building intricate brick structures, experimenting with a beginner chemistry kit, and sketching
    mechanical designs, hinting at an early passion for engineering and problem‑solving.
  sports: Edward, who plays midfield for the community Raven Run Rovers youth soccer club and idolizes the Louisville City FC and Kentucky Wildcats, enjoys the rhythm of bluegrass while jogging along the
    sanctuary trails, and balances his competitive drive with a relaxed attitude toward structured training, often opting for spontaneous pick‑up games after school.
  arts: Edward, a sketch‑book enthusiast who draws detailed machines, creates whimsical animations in ScratchJr, and devours adventure series like The Mysterious Benedict Society, finds inspiration in bluegrass
    legend Bill Monroe and the playful tunes of The Wiggles, shaping a creative outlet that blends curiosity with storytelling.
  travel: Edward, who dreams of exploring the Appalachian foothills of the Great Smoky Mountains and the historic horse farms of Lexington while also yearning to experience Disney World’s animated adventures,
    prefers trips that combine nature hikes with interactive museum exhibits, often planning treasure‑hunt stops with a colorful map in hand.
  culinary: Edward, whose favorite meals include cheesy macaroni, honey‑glazed chicken wings, and blueberry pancakes topped with fresh strawberries, loves helping in the kitchen by mixing batter, sprinkling
    grated cheddar, and experimenting with crunchy granola, turning mealtime into a playful laboratory of familiar comforts and new flavors.
  core: Edward, a seven‑year‑old LEGO engineer with a competitive streak, balances curiosity‑driven experiments, bluegrass beats, and soccer drills while managing a modest allowance, mild allergies, and
    a love for board‑game fairness, often double‑checking rules before diving into any new adventure.
background:
  cultural: Edward is a white child raised in Lexington, Kentucky, a city that blends Southern hospitality with practical Midwestern values. His family participates in local traditions such as Derby‑day
    celebrations, visits to nearby horse farms, and community festivals featuring bluegrass music and farm‑fresh foods like fried chicken and apple cider. He attends a public elementary school that offers
    both outdoor education and a growing STEM curriculum, exposing him to both the region’s agricultural heritage and its emerging technology scene. This cultural mix nurtures his practical curiosity, love
    for outdoor exploration, and appreciation for community stories and regional folklore.
attributes:
  skills: '["Reading (3rd‑grade level)", "Basic arithmetic", "LEGO construction", "Simple science experiments", "ScratchJr coding", "Problem‑solving through hands‑on projects"]'
