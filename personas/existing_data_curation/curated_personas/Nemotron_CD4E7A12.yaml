  hobbies: '["Hiking and nature photography in the Rockies", "Building scale model kits", "Playing competitive strategy video games", "Cooking fusion dishes (Southeast Asian & Western)", "Reading non‑fiction
    on technology and entrepreneurship", "Volunteer event logistics", "Exploring new hiking trails with a small group of friends"]'
  career_goals: Macho aims to translate his practical skill set into a sustainable career. In the short term, he plans to complete an apprenticeship in electrical work and obtain a journeyman license, while
    also earning an entry‑level IT certification (CompTIA A+). He envisions launching a small business that offers home‑repair, smart‑home installation, and basic IT support services to homeowners in the
    Colorado Springs area. Long‑term, he aspires to grow this venture into a reputable contracting firm that can compete for residential bids, capitalizing on his organized planning, competitive drive,
    and commitment to delivering reliable, high‑quality work. He also hopes to mentor other young adults from his community who share his interest in practical trades.
