  hobbies: '[''Gardening (vegetable and flower beds)'', ''Quilting and crochet'', ''Reading historical fiction and genealogy'', ''Church choir singing'', ''Attending local fairs and craft shows'', ''Walking
    and gentle exercise'', ''Online genealogy research'', ''Cooking traditional Texan dishes'']'
  career_goals: Although retired, Samantha aims to stay active and useful within her community. Her current goals include compiling a handwritten cookbook of family recipes to pass down to future generations,
    creating a small photo‑and‑story scrapbook of her family’s history for her grandchildren, and mentoring a youth gardening club at the local elementary school. She also hopes to maintain her health through
    regular walks and gardening, and she aspires to win a senior‑category prize for her quilts at the upcoming county fair. Ultimately, she wants to leave a tangible legacy of her skills and family stories
    while preserving her independence and social connections.
