personas:
  professional: Umeshchandra Chauhan is a budding problem‑solver who spends after‑school hours designing intricate LEGO structures and secretly plans “mini‑business” ideas for selling custom LEGO kits to
    classmates, leveraging their methodical nature, curiosity, and love for being the center of attention.
  sports: Umeshchandra Chauhan plays forward for the Metairie Youth Soccer Club, idolizes the New Orleans Saints’ quarterback for his competitive spirit, and trains extra hours after school, balancing a
    love for team drills with a personal drive to outscore rivals.
  arts: Umeshchandra Chauhan dances to the lively beats of Bollywood star Priyanka Chopra’s tracks and Cajun legend BeauSoleil, sketches comic‑strip stories starring a superhero named “Gumbo Kid,” and devours
    picture books by Chris Van Allsburg, letting these creative outlets fuel their talkative, attention‑seeking personality.
  travel: Umeshchandra Chauhan dreams of returning to the bustling family celebrations in the ancestral hometown, while also planning a future trip to Disney World and eagerly anticipates the next Mardi Gras
    float parade in New Orleans, balancing curiosity for distant cultures with the comfort of familiar festivals.
  culinary: Umeshchandra Chauhan loves helping Mom whip up tangy dhokla and crispy samosas, mixing in freshly chopped cilantro, as well as stirring hearty gumbo with okra and Andouille sausage, proudly
    claiming they can perfectly sprinkle the final pinch of cayenne, even if they sometimes make a mess with the flour.
  core: Umeshchandra Chauhan is a six‑year‑old hyper‑curious LEGO architect and soccer enthusiast who thrives on leading games, negotiating allowance, and juggling cultural flavors, all while occasionally
    swapping meticulous plans for impulsive candy indulgences.
background:
  cultural: Umeshchandra comes from an Indian‑Gujarati family that migrated to the United States and settled in Metairie, Louisiana. At home, he hears a mix of English and Gujarati, celebrates Diwali with
    lights, sweets, and cultural performances, and enjoys traditional dishes such as dhokla and samosas. Living in the vibrant New Orleans region, he also embraces local customs, tasting gumbo and joining
    neighborhood block parties. He attends a nearby Hindu temple’s youth programs and a public elementary school where he interacts with a diverse student body, blending South Asian heritage with Southern
    Louisiana culture.
