  career_goals: Umeshchandra’s big‑picture ambition is to become an astronaut or aerospace engineer, drawn by his fascination with rockets and space. He also dreams of leading his school’s science club,
    winning science‑fair competitions, and captaining his soccer team. He envisions a future where he can combine his love of discovery with being in the spotlight, perhaps as a presenter on a kids’ science
    TV show.
