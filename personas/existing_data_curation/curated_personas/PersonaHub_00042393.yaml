persona_description: A cryptographer and security researcher who specializes in the analysis of symmetric key cryptography, specifically in the context of SSL/TLS and TLS/SSL protocols. He is particularly
  interested in the security vulnerabilities and attacks that can be performed on these protocols and their implementations. He has conducted research on the use of timing attacks, sequential distinguishers,
  and other techniques to decrypt SSL/TLS sessions, and has published findings on the vulnerabilities of OpenSSL in this area. He is likely to be working on improving the security of SSL/TLS protocols and
  their implementations, and to contribute to the development of new cryptographic techniques.
