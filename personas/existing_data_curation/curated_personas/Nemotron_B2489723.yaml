    games"]'
  career_goals: Daryl plans to earn a Bachelor of Fine Arts, with a minor in Social Work or Psychology, at a university in the Atlanta area. His long‑term ambition is to become an art therapist or community
    arts program director, using his artistic talent and compassionate nature to support at‑risk youth. He aims to secure internships at local cultural institutions, develop grant‑writing and program‑management
    skills, and eventually launch a nonprofit that offers free therapeutic art workshops. In parallel, he hopes to work as a graphic designer for mission‑driven organizations, building a portfolio that
    merges creativity with social impact.
