  career_goals: At this stage, Subramanyam seeks to transition from front‑line support to a mentorship and training role, sharing his decades of experience with newer representatives. He plans to earn a
    Customer Experience Management certification to formalize his expertise and to lead quarterly workshops on communication and problem‑solving. Additionally, he hopes to volunteer as a guide for senior
    visitors at local museums, merging his love of art with community outreach, and to author a memoir that reflects his journey as a South Asian immigrant’s son navigating life in Maryland.
