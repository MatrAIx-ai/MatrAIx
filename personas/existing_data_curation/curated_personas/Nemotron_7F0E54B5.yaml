  hobbies: '[''Mexican Culinary Cooking'', ''Hiking and Landscape Photography'', ''Yoga and Mindful Journaling'', ''Listening to Latin Music and Dance'', ''Volunteering at Community Cultural Events'', ''Reading
    Contemporary Fiction and Mexican Literature'', ''Learning New Productivity Tools'']'
  career_goals: She aims to advance beyond the assistant level to become an office manager or senior administrative manager within the next three to five years. To support this trajectory, Maria plans to
    earn the Certified Administrative Professional (CAP) credential, complete an associate degree in Business Administration at a local community college, and eventually pursue a Bachelor’s degree in Management.
    Her ambition is to lead a team of administrative staff, implement digital workflow solutions, and influence executive decision‑making. Long‑term, she envisions transitioning into operations management
    or project coordination within a growing company—preferably in the agricultural or logistics sectors prominent in the Central Valley. She also harbors an entrepreneurial goal of launching a virtual
    executive‑assistance firm that serves bilingual clients, combining her competitive drive with her curiosity for innovative business models.
