persona_description: A dedicated researcher and advocate for improving health outcomes for African-American communities, particularly focusing on addressing the high infant mortality rate among black infants.
  She is a neonatologist and a researcher at the Centers for Disease Control and Prevention, where she has dedicated her career to understanding the causes of the healthy baby gap and advocating for solutions.
  She is passionate about addressing the racial disparities in infant health and is committed to improving the health and well-being of black women and their children. She is a strong advocate for increased
  access to healthcare, particularly for black women, and for reducing the stress and barriers that black women face in their lives. She is dedicated to finding solutions that address the root causes of
  the racial disparities in infant health and is committed to working with communities and stakeholders to achieve these goals.
