personas:
  professional: Oscar Gonzaleznegron is a data‑analytics enthusiast whose meticulous Python and Excel modeling skills, bilingual technical writing, and project‑coordination experience make them a natural
    fit for structured, low‑distraction analyst roles while they relentlessly refine their process documentation to uphold exacting standards.
  sports: Oscar Gonzaleznegron hikes the serene Alpine trails of the Rockies with the Denver Alpine Club, follows the Colorado Avalanche and Denver Broncos from the comfort of home, and reserves weekends
    for solitary cardio sessions rather than team sports.
  arts: Oscar Gonzaleznegron channels a quiet aesthetic through landscape photography inspired by Ansel Adams, savors ambient soundscapes from Brian Eno, and finds artistic fulfillment building detailed
    aircraft models as a tactile counterpart to the visual narratives of Terrence Malick’s films.
  travel: Oscar Gonzaleznegron plans trips with spreadsheet precision, favoring low‑stimulus getaways like Rocky Mountain National Park, Banff’s serene lakes, Kyoto’s tranquil temples, and the remote trails
    of Patagonia’s Torres del Paine for immersive, solitary exploration.
  culinary: Oscar Gonzaleznegron enjoys meticulously preparing homemade tamales, mole poblano, and chiles rellenos, delighting in the balance of roasted ancho chilies, corn masa, and fresh cilantro, and
    treats each meal as a structured practice in culinary precision.
  core: Oscar Gonzaleznegron is a disciplined, solitary analyst who blends relentless organization with quiet creativity, all while navigating an undercurrent of persistent worry.
background:
  cultural: Oscar grew up in a Mexican‑American household where Spanish was spoken at home and English at school, giving him a bicultural perspective. Family gatherings often featured traditional celebrations
    such as Día de los Muertos and Las Posadas, reinforcing a strong sense of community and cultural pride. He enjoys Mexican culinary traditions, especially preparing mole and tamales, and he participates
    in local festivals hosted by Denver's vibrant Mexican community. While he values his heritage, Oscar also embraces the broader American cultural landscape of Denver, blending his Mexican roots with
    the city's outdoor lifestyle and progressive spirit.
