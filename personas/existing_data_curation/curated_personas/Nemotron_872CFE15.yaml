  career_goals: Oscar aims to complete his bachelor's degree in Business Analytics or a related field within the next two years, leveraging his analytical strengths to secure a full‑time data analyst or
    quality‑assurance role that offers a clear, structured workflow and minimal social distractions. He plans to obtain industry certifications such as the Certified Data Analyst (CDA) and Six Sigma Green
    Belt to solidify his expertise. In the longer term, Oscar aspires to transition into a remote project‑management position where he can exercise his high standards and organized approach while maintaining
    the solitude he prefers. Financial independence and a stable, predictable routine are central to his professional ambition.
