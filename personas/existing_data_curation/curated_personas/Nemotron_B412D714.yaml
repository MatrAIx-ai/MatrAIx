personas:
  professional: Glen Mcadory, a 15‑year‑old high‑school junior and avid robotics hobbyist, they channel a blend of curiosity and practicality into designing competition‑ready Arduino‑based machines while
    leading the school’s tech club with a competitive edge and a knack for turning group projects into winning strategies.
  sports: Glen Mcadory, a varsity basketball guard and midfield soccer player for Avon High, they train year‑round, cheer on the Minnesota Timberwolves and Minnesota United FC while also volunteering with
    the local Avon Youth Soccer Club, and they treat fitness as a competitive arena rather than a pure leisure pursuit.
  arts: Glen Mcadory picks up an acoustic guitar at community potlucks, they draw inspiration from folk legends like Bob Dylan, Swedish folk duo Väsen, and classic rock icons such as Led Zeppelin, and they
    often perform impromptu sets that blend traditional tunes with modern riffs during school events.
  travel: Glen Mcadory loves weekend camping trips to the North Shore of Lake Superior, they have explored the historic streets of Duluth, and they dream of a summer exchange in Bavaria to attend Oktoberfest,
    balancing a modest family budget with a craving for adventure and cultural immersion.
  culinary: Glen Mcadory enjoys cooking hearty walleye tacos, mastering sauerkraut‑infused bratwurst, and experimenting with smoked salmon on rye, they often sharpen their culinary skills at family gatherings
    where they proudly serve a side of apple‑cinnamon crumble.
  core: Glen Mcadory is a competitive teen tinkerer who blends Midwestern pragmatism with a restless curiosity, they always juggle sports, tech projects, and a love for folk music while occasionally over‑committing
    to every challenge they see.
background:
  cultural: Growing up in Avon, a small town in Stearns County, Minnesota, Glen is immersed in a Midwestern rural culture that values self‑reliance, community involvement, and seasonal outdoor activities.
    His family’s heritage includes German and Scandinavian roots, which are reflected in local traditions such as church gatherings, county fairs, and communal potlucks. The region’s emphasis on agriculture
    and seasonal change has shaped Glen’s practical outlook, while the close‑knit community encourages him to participate in volunteer projects, youth sports leagues, and local service clubs. These cultural
    influences blend with his personal curiosity, fostering a balanced mix of respect for established customs and openness to new ideas.
