persona_description: A person who is responsible for implementing and enforcing the NPDES stormwater permitting program in Tennessee, including managing the processes for obtaining coverage under an NPDES
  permit for municipal separate storm sewer systems (MS4s), construction activities, and industrial activities. This individual is likely to have a background in environmental law, engineering, and regulatory
  compliance, and is responsible for ensuring that these sources of stormwater discharges are properly regulated and that their operators comply with the requirements of the NPDES stormwater permit. They
  are expected to have experience in conducting inspections, conducting outreach and education campaigns, and providing guidance and support to operators in order to ensure compliance with the regulations.
