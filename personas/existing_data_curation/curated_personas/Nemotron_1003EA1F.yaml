personas:
  professional: A budding digital illustrator named Alexander Perezrodriguez leverages their curiosity and methodical planning to sketch comic characters on paper, experiment with tablet art tools, and
    prototype simple Scratch games; they constantly seek new techniques while maintaining a competitive edge in school art showcases.
  sports: Alexander Perezrodriguez plays catch with the Eastside Eagles little league baseball team on weekends, sharpens fielding skills during soccer drills with the Junior Tigers school club, and follows
    professional franchises like the Los Angeles Dodgers and FC Barcelona; they channel a competitive drive into daily practice and weekend matches.
  arts: Alexander Perezrodriguez spends hours sketching heroes inspired by Stan Lee and Osamu Tezuka, animates scenes with digital brushes reminiscent of Hayao Miyazaki's style, and fuels creativity by
    listening to salsa legends like Marc Anthony alongside contemporary pop hits from Taylor Swift; they often critique each piece with a skeptical eye, constantly pushing their artistic boundaries.
  travel: Alexander Perezrodriguez dreams of exploring the bustling streets of New York City for museum visits, the sunny attractions of Orlando's theme parks, and the historic forts of San Juan, planning
    each trip with a hand-drawn itinerary; they balance family budget constraints with an appetite for adventure, occasionally adding spontaneous road-trip detours to their travel journal.
  culinary: Alexander Perezrodriguez assists in the kitchen by stirring arroz con gandules with fresh cilantro and sofrito, chopping plantains for tostones, and assembling mini pepperoni pizzas, showcasing
    a budding skill set that mixes traditional flavors with a penchant for cheesy, quick-bake snacks; they love the feeling of measuring spices and feel proud when the family savors the final dish.
  core: Alexander Perezrodriguez is a ten-year-old curiosity-driven creator who meticulously plans LEGO builds and art projects, competes fiercely in baseball, yet they habitually binge-watch cartoons late
    into the night, neglecting sleep.
background:
  cultural: Alexander is raised in a bilingual Puerto Rican household in Saint Robert, Missouri. At home, Spanish is spoken alongside English, and his family celebrates Puerto Rican traditions such as Noche
    Buena, the music of salsa and plena, and the preparation of dishes like arroz con gandules and pasteles. While attending a Midwest public school, he integrates into the local community, participating
    in school events and regional sports. This bicultural environment nurtures a strong sense of pride in his heritage while also shaping his identity within the broader American Midwest culture. He often
    shares stories of family trips to Puerto Rico during summer vacations, and he incorporates elements of his cultural background into his artwork and interests.
