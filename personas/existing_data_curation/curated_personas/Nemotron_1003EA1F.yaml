  career_goals: Looking ahead, Alexander envisions a future where he can blend his love for art and technology. He aspires to become a video‑game designer or a graphic artist, aiming to create immersive
    visual experiences that challenge players’ imaginations. He is also intrigued by architecture and hopes to study engineering to design innovative, sustainable structures. Academically, he aims to win
    his school's science fair and eventually earn a scholarship that will allow him to study in a program that combines art, design, and STEM. He is determined to be recognized as a top performer in both
    creative and analytical domains.
