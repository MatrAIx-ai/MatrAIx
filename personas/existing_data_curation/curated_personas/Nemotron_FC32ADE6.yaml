personas:
  professional: Marco Towe is an aspiring digital illustrator who channels their boundless curiosity into experimental character designs on a tablet and sketchbook, preferring spontaneous free‑form drawing
    sessions over rigid lesson schedules, and they sometimes miss school art deadlines but fuel a raw, expressive style.
  sports: Marco Towe joins neighborhood soccer pick‑up games at the park, idolizes the local professional team City FC, and they also love exploring the nearby wetlands on weekend hikes, combining active
    play with a quiet appreciation of nature.
  arts: Marco Towe immerses themselves in the worlds of Studio Ghibli films, the music of Bon Iver, and the works of graphic novelist Neil Gaiman, letting these influences shape their sketchbook doodles,
    digital sprites, and occasional community fair murals, while they frequently experiment with bold color palettes and unconventional storytelling techniques.
  travel: Marco Towe dreams of visiting the misty highlands of Scotland after being inspired by fantasy novels, but for now they spend weekends exploring the local wetlands, the historic lighthouse on the
    nearby coast, and family road trips to the Grand Canyon, balancing wanderlust with a limited allowance and school commitments.
  culinary: Marco Towe favors bright, flavorful meals like sushi rolls with avocado and mango, homemade ramen with a splash of sriracha, and occasional pepperoni pizza, and they enjoy experimenting with
    simple plating by arranging colorful vegetables into whimsical shapes while they watch tutorial videos for inspiration.
  core: Marco Towe is a vividly creative teen whose spontaneous art, anxious mind, and impulsive spending paint a portrait of someone who constantly chases imagination, and they navigate the turbulence
    of growing up with vivid intensity.
background:
  cultural: Marco was raised in a small, predominantly white community in Fresno, Texas, within Brazoria County. His family embraces Southern traditions such as backyard barbecues, high school football
    Saturdays, and local county fairs. Growing up in Texas, he is familiar with regional foods like brisket and Tex‑Mex cuisine, and he often hears Spanish phrases used by neighbors, reflecting the multicultural
    flavor of the area. Marco attends a public middle school where he participates in the art club and a youth group at his local church. These experiences blend a classic Texan work‑ethic and community
    spirit with his own curiosity about broader artistic and cultural horizons.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Basic Python programming'', ''Creative brainstorming'', ''Storytelling'', ''Video editing basics'']'
