  career_goals: Marco dreams of becoming a multimedia artist—ideally a concept artist or graphic designer for video games and animated media. He hopes to build a strong portfolio that showcases his unique
    style, win local art competitions, and eventually attend a specialized art school. In the short term, he wants to improve his digital art skills, learn advanced software like Photoshop and Blender,
    and start a YouTube channel where he shares timelapse drawings and tutorials. He also envisions traveling to experience different cultures and art traditions, using those experiences to broaden his
    creative perspective.
