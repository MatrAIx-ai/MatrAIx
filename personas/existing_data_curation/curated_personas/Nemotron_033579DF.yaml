personas:
  professional: Aida Riverasotomayor, a skeptical yet curious 16‑year‑old bilingual student, leverages their competitive soccer forward instincts and strategic gaming skills to spearhead a community robotics
    club while systematically preparing for a GED and a future paramedic career, balancing meticulous planning with the flexibility to improvise when opportunities arise.
  sports: Aida Riverasotomayor plays forward for the co‑ed Saguaro FC soccer team in the Tucson summer league, trains with the Arizona Cardinals' youth fitness program during the off‑season, and follows
    the Arizona Diamondbacks avidly, balancing their competitive drive on the field with disciplined conditioning routines that include early‑morning runs and weekend pick‑up games.
  arts: Aida Riverasotomayor captures the stark beauty of Tucson sunsets and vibrant downtown murals with their smartphone, cites Ansel Adams for his light mastery, draws inspiration from graphic novels
    like "Saga" and "Ms. Marvel," and unwinds to the indie sounds of Tame Impala and the rhythmic beats of Bad Bunny, often curating mini‑exhibits of their photos on Instagram.
  travel: Aida Riverasotomayor prefers spontaneous road trips across the Sonoran Desert, having already explored Saguaro National Park and Sedona’s red rocks, while dreaming of a spring backpacking adventure
    through the Patagonia region of South America, balancing their travel plans with a modest budget and school commitments.
  culinary: Aida Riverasotomayor whips up family‑style tamales, sopes, and pozole with a side of chipotle‑infused roasted corn, experimenting by fusing them with Southwest staples like prickly pear salsa
    and cactus‑topped tacos, demonstrating solid culinary confidence yet often forgetting to pre‑soak the masa, a quirky habit that keeps their kitchen timers buzzing.
  core: Aida Riverasotomayor blends a fiercely competitive spirit from soccer and gaming with meticulous DIY hacking and a love for sunset photography, all while juggling three smartphones, hoarding extra
    gaming skins, and occasionally skipping homework for late‑night coding marathons.
background:
  cultural: Aida is a first‑generation Mexican‑American raised in Tucson’s historic Barrio area. Her household is predominantly Spanish‑speaking, enriched with Mexican customs such as Día de los Muertos
    altar preparations, quinceañera celebrations, and weekly family gatherings centered around homemade meals. At the same time, she is deeply influenced by the broader Southwestern desert culture of Arizona—embracing
    outdoor activities, local music, and the vibrant blend of Latino and Native American artistic expressions found throughout the city. This bicultural environment shapes her identity, fostering a strong
    sense of family responsibility, pride in her heritage, and an adaptive, independent outlook characteristic of the Tucson community.
attributes:
  skills: '[''bilingual Spanish-English communication'', ''basic computer troubleshooting'', ''social media content creation'', ''introductory coding (Scratch, Python)'', ''DIY electronics projects (Arduino)'',
