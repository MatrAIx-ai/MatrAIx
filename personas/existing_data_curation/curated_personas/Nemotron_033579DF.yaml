  hobbies: '[''soccer (co-ed league)'', ''competitive online gaming (Fortnite, Valorant)'', ''photography of desert landscapes and urban art'', ''cooking traditional Mexican dishes with family'', ''volunteering
    at community center for cultural events and STEM workshops'', ''reading graphic novels'', ''DIY electronics projects (Arduino, Raspberry Pi)'']'
  career_goals: Aida aims to complete her GED within the next year and then enroll in a community‑college program focused on health sciences, with the long‑term ambition of becoming a certified paramedic
    or community health worker serving the Tucson area. Parallel to this, she dreams of launching a small food‑truck venture that fuses Mexican culinary traditions with Southwestern flavors, reflecting
    both her family heritage and local culture. She is actively researching scholarship opportunities for under‑represented students in STEM and healthcare, and she hopes to secure mentorship from professionals
    at the local hospital and the Tucson Chamber of Commerce to guide her dual career path.
