personas:
  professional: A 36‑year‑old visual communicator named Natali Sambolin fuses digital mastery in Photoshop, Illustrator, and InDesign with hand‑sketched concepts to craft brand identities and sustainable
    packaging that weave local festival motifs, coquí frog patterns, and Vejigante mask colors into contemporary designs, while their curiosity‑driven practicality and sociable teamwork keep projects organized
    yet adaptable, and an undercurrent of worry pushes them to over‑communicate with clients in both Spanish and English.
  sports: Natali Sambolin embraces the outdoors by hiking the verdant trails of the Cordillera Central and joining the local soccer club Monte Vista FC for weekend matches, while cheering for the regional
    baseball squad Cangrejeros de Santurce and participating in a community running group that meets for 5 K races each Saturday.
  arts: Natali Sambolin channels a love of craft into pottery workshops, captures the island’s coquí‑inspired sunsets through photography, and finds creative rhythm listening to the salsa queen Celia Cruz,
    the tropical pop star Juan Luis Guerra, and the contemporary vocalist Rosalía, all of which inform their design palette of vibrant Vejigante masks and hand‑drawn motifs.
  travel: Natali Sambolin prefers itineraries that blend adventure with cultural immersion, often planning trips to high‑altitude coffee farms in Guatemala’s Antigua, the mountain villages of Oaxaca, and
    the historic cobblestone streets of Cartagena, while they budget carefully, using a travel fund to splurge on boutique guesthouses and local culinary tours, and they still dream of a solo trek through
    the misty cloud forests of the island’s own central highlands.
  culinary: Natali Sambolin cooks with a seasoned hand, frequently preparing arroz con gandules, juicy pernil, crispy tostones, and sofrito‑infused mofongo, experimenting with locally sourced plantains,
    adobo seasoning, and a splash of freshly brewed coffee in desserts, while they enjoy casual dinner gatherings where they pair dishes with a glass of rum‑aged cola and a side of lively salsa music.
  core: Natali Sambolin is an outgoing, community‑focused designer who balances relentless curiosity and meticulous organization with an undercurrent of worry, turning coffee‑scented mornings, sticky‑note
    overload, and midnight sketch sessions into sustainable branding that celebrates local festivities.
background:
  cultural: Born and raised in Adjuntas, a mountainous municipality in the interior of Puerto Rico, Natali grew up immersed in a close-knit community where agriculture—especially coffee cultivation—shapes
    daily life. The island’s rich oral traditions, vibrant festivals, and the colorful visual language of vejigante masks and coquí frogs inform her aesthetic sensibility. Fluent in Spanish and comfortable
    with English, she navigates both local family gatherings and the broader island’s creative scene. Her Puerto Rican identity emphasizes hospitality, collective effort, and a deep respect for nature,
    which she weaves into her design practice and community involvement.
