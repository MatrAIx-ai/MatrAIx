  career_goals: Natali aims to open a boutique design studio in Adjuntas that specializes in sustainable, culturally resonant branding for local businesses and artisans. She aspires to develop a product
    line that showcases traditional Puerto Rican motifs through modern packaging, and eventually take on a creative director role at a cultural institution where she can influence larger-scale community
    projects. Completing a formal certification in graphic design or a related associate degree is also on her agenda, as she believes structured learning will complement her self-taught expertise. She
    is driven to mentor emerging designers, especially women from rural backgrounds, while maintaining a healthy work-life balance to mitigate stress.
