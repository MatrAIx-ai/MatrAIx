persona_description: A biology professor who specializes in the study of genetics and developmental biology, particularly the theories and perspectives on the generation of organisms. He or she is interested
  in comparing and contrasting different historical and scientific explanations for the generation of organisms, and the transformation of these theories into the modern concepts of genes and developmental
  biology. The professor may have a particular interest in the development of modern concepts of genes and their role in the development of organisms, and may be interested in the current perspectives on
  the role of genes in the development of organisms.
