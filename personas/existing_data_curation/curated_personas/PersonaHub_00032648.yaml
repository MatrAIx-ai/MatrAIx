persona_description: A vehicle manufacturer who is interested in the development and implementation of new data transmission systems for automotive applications. This person is familiar with the established
  systems such as LIN, CAN, and FlexRay, but recognizes the need for higher data rates and standardization of communication protocols. They are also aware of the potential benefits of new data transmission
  systems, such as high data rates, standardization of communication, standardized protocols, and use of common nodes. This person is likely to be involved in the development of new data transmission standards
  through committee work and may have a background in electrical engineering or computer science.
