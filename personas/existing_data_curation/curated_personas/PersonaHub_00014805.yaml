persona_description: A researcher in the field of Earth System Sciences, particularly focusing on the Baltic Sea region. The individual is interested in interdisciplinary research and has expertise in atmospheric
  processes, land and sea biogeochemical feedbacks, natural hazards, sea level dynamics, and water and energy exchange in the region. They have experience in conducting scientific assessments and leading
  working groups, and are familiar with the BACC approach for identifying gaps and inconsistencies in current knowledge. They are likely to be involved in the formulation of grand research challenges and
  the organization of activities by dedicated working groups. The individual is also likely to be familiar with the Baltic Earth Interim Science Steering Group, chaired by SMHI.
