  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading artist biographies'', ''Cooking Spanish cuisine'', ''Gardening desert plants'', ''Volunteering at senior center'', ''Online learning
    (philosophy, contemporary art)'', ''Hiking Sandia Mountains'', ''Listening to classical guitar'', ''Mindfulness meditation'']'
  career_goals: Although retired, Jessica aspires to curate a monthly senior‑artist showcase at the Albuquerque Museum, highlighting local Hispanic creators. She wants to mentor emerging entrepreneurs in
    her neighborhood, documenting their stories alongside her own family’s migration narrative in a memoir. A personal dream is to travel to Andalusia, Spain, to trace her ancestry and bring back cultural
    insights to share at community workshops. She also hopes to advocate for increased arts programming for seniors within the city’s cultural council.
