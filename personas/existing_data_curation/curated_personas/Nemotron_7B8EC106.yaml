personas:
  professional: Jessica Ortiz is a retired business professional who leverages her expertise in budgeting, strategic outreach, and Spanish-language communication to orchestrate low‑key community art exhibitions,
    and their spontaneous, curiosity‑driven nature often leads them to improvise promotional graphics at the last minute, sometimes compromising tight deadlines.
  sports: Jessica Ortiz enjoys gentle hikes in the Sandia Mountains as a member of the Albuquerque Senior Hikers Club, follows New Mexico United soccer matches and Albuquerque Isotopes baseball games on
    weekends, and plays weekly pickleball at the Sunset Trail Pickleball Club, balancing low‑impact activity with spirited spectator enthusiasm.
  arts: Jessica Ortiz frequents the Anderson Gallery, where they study pieces by Georgia O'Keeffe and contemporary desert‑inspired painter Juan Martinez, then translate that influence into delicate watercolors
    of the Sandia peaks, all while listening to classical guitar recordings by Andrés Segovia and discussing biographies of artists such as Frida Kahlo with the senior art circle they lead.
  travel: Jessica Ortiz prefers thoughtfully planned yet flexible trips, having explored nearby Santa Fe and the Carlsbad Caverns on weekend road trips, while they dream of a cultural pilgrimage to Andalusia,
    Spain to trace family roots, balancing modest travel savings with a love for immersive, slow‑pace experiences and occasional group tours.
  culinary: Jessica Ortiz enjoys cooking traditional Spanish dishes such as saffron‑infused paella with local New Mexican chorizo and roasted red chile, chilled gazpacho garnished with diced cactus pear,
    and churros dusted with cinnamon and chocolate, and they delight in adapting these recipes with regional ingredients like green chile and blue corn masa, reflecting a moderately skilled yet adventurous
    palate.
  core: Jessica Ortiz blends a lifelong curiosity for art and culture with a spontaneous, occasionally disorganized approach to life, channeling their worries into mindfulness meditation while indulging
    in late‑night watercolor sessions and impulsive art‑supply splurges.
background:
  cultural: Jessica’s roots trace back to the Andalusian region of Spain, where her grandparents migrated to New Mexico in the early 20th century as part of the historic Hispano settlement. Raised in Albuquerque’s
    Old Town, she grew up bilingual, celebrating Semana Santa, Día de los Muertos, and local festivities like Zozobra and the International Balloon Fiesta. Her Catholic upbringing, love of Spanish culinary
    traditions, and immersion in the unique blend of Southwestern and Spanish cultures shape her identity and community engagement.
