  hobbies: '[''Landscape Photography'', ''Watercolor Painting'', ''Permaculture Gardening'', ''Cooking Fusion Cuisine'', ''Reading Historical Fiction'', ''Reading Popular Science'', ''Storytelling and Folk
    Music'', ''Hiking'', ''Volunteer STEM Mentoring'']'
  career_goals: Although retired, Cristina aims to remain an active contributor to her community. She plans to mentor high‑school and community‑college students, especially those from underrepresented backgrounds,
    through the local STEM outreach program. She aspires to curate a traveling exhibition that blends indigenous Latin American motifs with contemporary environmental themes, fostering cross‑cultural dialogue.
    Cristina also seeks to compile and publish an oral‑history collection of regional indigenous stories, and is considering co‑authoring a memoir that weaves together her engineering experiences, artistic
    pursuits, and cultural heritage. Learning advanced digital illustration tools and expanding her photography portfolio are additional personal ambitions.
