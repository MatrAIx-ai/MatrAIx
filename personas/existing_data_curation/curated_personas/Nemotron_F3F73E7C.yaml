personas:
  professional: Kyle Holliday is a budding robotics hobbyist who spends after‑school hours assembling and programming small competition robots, merging his natural curiosity with a pragmatic trial‑and‑error
    approach and a competitive edge that drives them to fine‑tune every mechanism for peak performance.
  sports: Kyle Holliday is a forward on a Kansas City Youth Soccer League team who idolizes Sporting Kansas City, follows the Kansas City Chiefs, and approaches every practice with a high‑intensity, win‑or‑lose
    mentality that often outweighs cooperative play, a drive they channel into every match.
  arts: Kyle Holliday is a pop‑rock aficionado who streams Imagine Dragons, Taylor Swift, and Twenty One Pilots while also channeling creativity into intricate LEGO builds, treating each set as a low‑key
    art project that reflects his love of colorful, structured design, an outlet they often share with friends.
  travel: Kyle Holliday enjoys family weekend hikes in the Ozarks and dreams of attending a robotics competition in Chicago and a cultural tour of Tokyo’s Akihabara district, favoring itineraries that blend
    adventure with hands‑on tech experiences while staying within school schedules and family budget constraints, an exploration they use to fuel their curiosity.
  culinary: Kyle Holliday favors bold, handheld meals like pepper‑jack quesadillas, Kansas City barbecue ribs, and deep‑dish pizza, boasts a modest knack for microwaving instant noodles, and often crafts
    snack mixes of pretzels, trail mix, and gummy bears for gaming sessions, a habit they proudly claim keeps their energy up.
  core: Kyle Holliday is a competitive, curiosity‑driven 11‑year‑old who juggles soccer, robotics, and video games with an easygoing, sometimes disorganized flair, always racing to the next challenge while
    they keep a stash of snack‑fuel on hand.
background:
  cultural: Kyle grew up in a suburban neighborhood of Platte County, near Kansas City, Missouri. His family observes typical Midwestern American traditions, such as Fourth of July barbecues, community
    church gatherings, and strong support for local sports teams like the Kansas City Chiefs and Royals. He attends a public elementary school that celebrates cultural diversity through events like International
    Day, though his household reflects a middle‑class, predominantly white, Protestant upbringing that values independence, hard work, community involvement, and a balanced appreciation of both new ideas
    and established practices.
