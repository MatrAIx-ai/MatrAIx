persona_description: A historian or a native American studies expert who specializes in the study of Creek history, particularly the events and conflicts that occurred during the Creek Indian war of 1813-14
  and the Treaty of Fort Jackson. They are interested in learning about the cultural and social aspects of the Creek Nation, the interactions between the Creek and the white settlers, and the impact of
  the war on the Creek people. They are also interested in the economic and environmental factors that contributed to the decline of the Creek hunting grounds and the loss of their way of life.
