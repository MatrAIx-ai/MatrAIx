  career_goals: 'While still in the early stages of life, Bernadette''s aspirations are centered on developmental milestones: mastering walking and speech, gaining confidence in independent exploration,
    and engaging actively in the community’s preschool and library story‑time programs. Her long‑term ambition, shaped by her family’s encouragement of education and community involvement, is to become
    a caring and knowledgeable adult—potentially a teacher or early‑child educator—who can nurture curiosity and stability in other children.'
