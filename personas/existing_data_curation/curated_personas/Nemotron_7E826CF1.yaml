personas:
  professional: Bernadette Adams, a one-year-old with a natural love for order, already takes on the role of a miniature project manager in the playroom, methodically lining up blocks in predictable rows,
    confidently insisting when a piece doesn't fit, and calmly guiding siblings through tidy-up time, showcasing early organizational and assertive decision-making skills.
  sports: Bernadette Adams participates in toddler gymnastics at the local YMCA, loves weekend crawling races with other babies, proudly sports a tiny Boston Red Sox cap, follows the season's games on family
    TV, cheering whenever she spots a home run, and is listed as a member of the neighborhood parent-child soccer toddler squad.
  arts: Bernadette Adams delights in the vivid picture books of Eric Carle, hums along to Raffi's Baby Beluga, and watches animated classics featuring Disney's Mickey Mouse, allowing her to absorb color,
    rhythm, and storytelling even as she babbles her own improvised verses.
  travel: Bernadette Adams enjoys family-planned weekend outings to the nearby zoo in San Diego, cherished day trips to Central Park's carousel, and dreams of a gentle beach vacation in Maui, preferring
    itineraries that stick to her nap schedule and a familiar caregiver, yet she shows curiosity when glancing at travel brochures with bright pictures of palm trees.
  culinary: Bernadette Adams favors smooth mashed sweet potatoes, ripe banana puree, and soft avocado cubes, often demanding the occasional bite of well-cooked carrot sticks, while also displaying a quirky
    habit of flinging peas across her high chair tray whenever a new flavor appears.
  core: Bernadette Adams, at just one year old, blends an early love for routine with a playful curiosity, turning diaper changes into schedule checkpoints and exploring new toys with a steady, if occasionally
    messy, enthusiasm.
background:
  cultural: Bernadette comes from a white New England family rooted in Belchertown, Massachusetts. Her household observes traditional seasonal celebrations such as Thanksgiving gatherings, Fourth of July
    community picnics, and local holiday parades. The family participates in a nearby church’s family‑friendly events and attends the town’s public library programs, fostering a community‑oriented upbringing
    that values routine, educational enrichment, and modest social engagement.
