  hobbies: '[''vegetable gardening'', ''cooking Vietnamese cuisine'', ''hiking Torrey Pines'', ''reading historical fiction'', ''yoga'', ''volunteering at community center (computer tutoring)'']'
  career_goals: Josefina aims to advance to a Director of Operations role within the next five years, overseeing multiple manufacturing sites and driving company-wide sustainability initiatives. She is
    focused on building a reputation for operational excellence, mentoring future managers, and implementing data-driven continuous improvement programs that balance efficiency with employee well-being.
    She also hopes to obtain the Certified Lean Six Sigma Black Belt and lead strategic projects that expand the company's product portfolio while maintaining rigorous quality standards.
