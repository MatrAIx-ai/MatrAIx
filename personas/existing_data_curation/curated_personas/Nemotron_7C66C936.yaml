  career_goals: James aims to obtain his GED within the next year and enroll in a community‑college program focused on nonprofit management or logistics. He aspires to secure a full‑time position as a community
    program coordinator or logistics specialist, where he can apply his organizational talents and commitment to helping others. In the longer term, he hopes to advance into a leadership role overseeing
    city‑wide outreach initiatives or directing a nonprofit dedicated to youth mentorship. He also plans to earn certifications such as the Certified Associate in Project Management (CAPM) to strengthen
    his qualifications.
