persona_description: A data user who is interested in monitoring and analyzing the progress towards national energy and climate targets, refining energy models, and informing policy reviews and recommendations.
  This person is likely to have a background in economics, energy policy, or environmental science, and is interested in the latest projections and indicators from the IEA's Energy Projections of IEA Countries
  – with Extended Transitions Indicators database. They are familiar with national scenario modelling and the methodologies adopted by the IEA in the relevant historical databases. This person is looking
  for a comprehensive and up-to-date source of energy system projections and transition indicators for their country, and is interested in comparing multiple scenarios and monitoring progress towards national
  climate targets.
