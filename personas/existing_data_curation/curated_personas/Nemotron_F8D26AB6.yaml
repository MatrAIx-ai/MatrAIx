personas:
  professional: Yesenia Torres, an aspiring junior scientist and creative engineer, blends disciplined problem‑solving with vibrant imagination to design LEGO robotics and sketch comic‑book heroes, leading
    their school’s science club with meticulous project plans and encouraging teammates with enthusiastic collaboration.
  sports: Yesenia Torres shines as a midfielder on their neighborhood soccer team, the Riverside Rovers, practices twice weekly, idolizes the U.S. women’s national team and follows the local MLS club, the
    Seattle Sounders, while also incorporating folklorico dance drills to improve flexibility and rhythm.
  arts: Yesenia Torres mixes vivid comic‑book sketches inspired by Stan Lee’s heroes with lively folklorico performances set to the sounds of Lila Downs and pop star Ariana Grande, often doodling in their
    notebook during school breaks and choreographing new dance steps for their troupe.
  travel: Yesenia Torres loves family road trips to national parks such as Grand Canyon and Yellowstone, meticulously planning each stop with a hand‑drawn map, yet dreams of a future adventure to the ancient
    ruins of Machu Picchu, balancing their curiosity with their parents’ budget constraints.
  culinary: Yesenia Torres eagerly helps prepare tacos with seasoned ground beef, fresh cilantro, diced tomatoes, and homemade guacamole, mastering the art of gently mashing avocados with a pinch of lime,
    and enjoys experimenting with cheese‑filled quesadillas after school.
  core: Yesenia Torres blends relentless organization with boundless creativity, juggling a meticulously kept LEGO inventory while occasionally sneaking extra marshmallows into their bedtime snack.
background:
  cultural: Yesenia comes from a Mexican‑American family that maintains strong bilingual and cultural traditions. At home, Spanish is spoken alongside English, and she celebrates holidays such as Día de
    los Muertos, Cinco de Mayo, and Mexican Independence Day with family gatherings, traditional foods, and music. Her parents emphasize respect for elders, community involvement, and pride in her heritage,
    which is reinforced by a vibrant Hispanic community in Copperas Cove, Texas. She often participates in local cultural festivals, attends a Spanish language class after school, and helps prepare traditional
    meals, fostering a deep connection to her Mexican roots while navigating life in a suburban Texas setting.
