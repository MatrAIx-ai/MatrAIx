  career_goals: Yesenia dreams of becoming a scientist or engineer who can create solutions that improve the health and well‑being of her community. She is fascinated by how things work and hopes to study
    biomedical engineering in the future. At the same time, she enjoys helping classmates understand new concepts, so she also imagines herself as a teacher who can inspire curiosity in other children.
    In the short term, she aims to maintain top grades, win a school science fair, and earn a spot in a STEM‑focused middle‑school program.
