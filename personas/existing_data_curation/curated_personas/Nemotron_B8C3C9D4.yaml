  career_goals: His primary ambitions now center on staying healthy, deepening his connection to the local environment, and passing on his practical knowledge to younger generations. He hopes to compile
    a memoir of his life on the Colorado high plains, documenting family stories and the region’s history for his grandchildren. He also aspires to mentor youths interested in woodworking and emergency
    preparedness through the local community center, and to help preserve Westcliffe’s historic buildings by offering his labor and expertise. A personal health goal is to maintain mobility through regular
    hiking and daily gardening.
