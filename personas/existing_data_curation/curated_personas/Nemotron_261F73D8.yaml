  career_goals: Sydney aims to channel her lifelong curiosity into a memoir that weaves together her personal journey, the evolution of San Francisco’s art scene, and the stories of her neighbors. She hopes
    to organize a community exhibition that spotlights the creative output of senior artists, providing them a platform to share their work. Additionally, she aspires to mentor younger artists through volunteer
    teaching at local community centers, and to continue honing her own craft by exploring new media such as digital collage and virtual‑reality art installations.
