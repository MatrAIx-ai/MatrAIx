personas:
  professional: Aimara Caballerovega, a seasoned flight attendant with bilingual fluency and a meticulous eye for safety protocols, leverages their practical mindset and calm under pressure to de‑escalate
    passenger conflicts, while their love of routine helps them excel in pre‑flight checks, even though they occasionally misplace paperwork.
  sports: Aimara Caballerovega enjoys gentle desert hikes on the Phoenix Mountain Preserve, cheers on the Phoenix Suns and the Arizona Diamondbacks, and attends a weekly community yoga class at the local
    church, balancing a low‑impact fitness routine with occasional weekend volunteer work at a senior center's recreation program.
  arts: Aimara Caballerovega finds creative solace listening to mariachi groups like Los Ángeles Azules and ranchera legends such as Vicente Fernández, binge‑watches telenovelas like "La Usurpadora," devours
    romance novels by Nicholas Sparks, and occasionally joins a neighborhood quinceañera dance rehearsal, knitting themed scarves inspired by favorite song lyrics.
  travel: Aimara Caballerovega prefers well‑planned, short‑duration trips that blend relaxation with cultural immersion, such as weekend getaways to Sedona’s red rocks, family visits to Oaxaca’s markets,
    and a nostalgic road trip along Route 66, always budgeting carefully to keep travel within a modest annual allowance.
  culinary: Aimara Caballerovega excels at preparing authentic tamales, rich mole poblano with dark chocolate and dried chilies, and fresh homemade tortillas using masa harina and a cast‑iron comal, often
    pairing meals with roasted cactus paddles (nopales) and sharing the feast with friends over lively mariachi music.
  core: Aimara Caballerovega balances a love for routine and family‑centric cooking with an anxious heart that fuels spontaneous kitchen splurges and occasional forgetfulness, making them both a reliable
    cabin crew member and a quirky, restless homemaker.
background:
  cultural: Aimara was raised in a Mexican‑American household where family, faith, and tradition are central. Bilingual from childhood, she blends Mexican customs—such as celebrating Día de los Muertos,
    hosting lively family meals, and honoring Catholic holidays—with the multicultural environment of Phoenix. Her upbringing emphasized respeto (respect), familismo (family loyalty), and practical stewardship,
    shaping her preference for routine and her dedication to serving others. These cultural roots influence her cooking, music choices, and community involvement, while also informing her warm, yet assertive,
    interpersonal style in both personal and professional settings.
