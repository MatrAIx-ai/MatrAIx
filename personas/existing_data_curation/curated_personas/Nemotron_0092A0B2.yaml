  career_goals: Arthur aims to transition into a leadership role within his community hospital or local health department, focusing on quality improvement and patient‑centered care. He aspires to become
    a certified nurse educator, mentor the next generation of nurses, and develop a pilot program that incorporates visual arts into recovery protocols for chronic illness patients. Additionally, he hopes
    to pursue a certification in geriatric or holistic nursing to better serve the aging population of Cannon Beach and surrounding areas.
