personas:
  professional: Emelia Koenings is a budding community organizer who volunteers at the local youth center, applying their methodical planning, reliability, and energetic teamwork to coordinate after‑school
    activities and birthday parties for peers.
  sports: Emelia Koenings plays forward for the Oscoda Youth Soccer Club and lines up as a defender on the local flag football team, channeling their energetic enthusiasm into practices three times a week,
    while cheering for the Detroit Lions and the Michigan State Spartans during the football season.
  arts: Emelia Koenings fuels their imagination by reading adventure series like 'Harry Potter' and mystery novels such as 'The Mysterious Benedict Society,' drawing comic‑style heroes in a sketchbook inspired
    by Stan Lee, and performing in school drama productions where they enjoy embodying dynamic characters.
  travel: Emelia Koenings delights in weekend explorations of the nearby Huron‑Manistee National Forest, where they collect pine cones for crafts, and dreams of visiting the historic streets of Edinburgh
    and the towering cliffs of Grand Canyon National Park once they’re old enough to travel independently.
  culinary: Emelia Koenings loves baking chocolate‑chip cookies with their family, mastering the perfect balance of crisp edges and chewy centers, while also enjoying simple pine‑cone‑seal crafts in the
    kitchen and experimenting with homemade trail mix featuring almonds, dried cranberries, and pretzel sticks.
  core: Emelia Koenings blends a structured, reliable mindset with boundless social energy, channeling their love for sports, arts, and community service into organized projects, all while navigating the
    ups and downs of teenage anxiety.
background:
  cultural: Emelia comes from a predominantly white, Midwestern background in the small town of Oscoda, Michigan. Her family’s ancestry includes German and Polish roots, common among many families in Iosco
    County. The community values modesty, hard work, and close‑knit neighborhood ties, reflected in local traditions like the county fair, church socials, and outdoor activities such as fishing, snowshoeing,
    and camping. These regional influences shape her practical outlook, appreciation for structure, and strong sense of cooperation and community responsibility.
