  hobbies: '[''Soccer'', ''Flag football'', ''Reading adventure/mystery novels'', ''Drawing comic characters'', ''Dance class'', ''Drama club'', ''Crafting with natural materials'', ''Baking'', ''Volunteering
    at community center'', ''Exploring local woods'']'
  career_goals: In the short term Emelia aims to become her class representative and take on leadership roles in school clubs, building her organizational experience. Over the next few years she plans to
    follow a health‑science track in high school, volunteering at the local community health fair to learn about patient care. Her long‑term ambition is to pursue a career that combines her love for structure,
    helping others, and interest in emotional well‑being—such as becoming a pediatric nurse or a school counselor—so she can provide stable, compassionate support to children facing anxiety or distress.
