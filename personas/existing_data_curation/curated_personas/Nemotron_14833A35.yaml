  career_goals: Although still young, Connan dreams of a future where he can turn his love of building and problem‑solving into a career. He imagines himself as a mechanical engineer or robotics specialist
    who designs practical inventions, inspired by both his curiosity about how things work and his practical mindset. He is eager to compete in school science fairs and robotics competitions, seeing them
    as opportunities to test his ideas against peers. In the meantime, he aims to master more advanced LEGO robotics kits and improve his coding skills, setting the groundwork for a potential career in
    engineering or space exploration.
