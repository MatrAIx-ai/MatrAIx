personas:
  professional: Connan Lopez is a budding engineer in training who transforms LEGO instruction manuals into original inventions, applying a methodical yet imaginative approach that balances curiosity with
    practicality while they reliably meet school project deadlines.
  sports: Connan Lopez channels their competitive spark into playing forward for the town's Little Ducks soccer squad, cheers on the Springfield Tigers baseball team during weekend broadcasts, and they
    supplement the routine with evening jogs in the neighborhood park to keep their energy up.
  arts: Connan Lopez unleashes imagination through sketching inventions inspired by the whimsical gadgets in Jules Verne's novels and the bold lines of cartoonist Jeff Smith, while they secretly hum the
    heroic themes of 'Star Wars' by John Williams during LEGO builds.
  travel: Connan Lopez prefers structured weekend day trips to nearby Redwood State Park, where they collect leaf samples for later study, yet they dream of a family road-trip to the Grand Canyon's rim
    and a future hoverboard-styled adventure at Disneyland.
  culinary: Connan Lopez favors a precise regimen of cheesy mac and cheese and carrot sticks, proudly assembling their own 'invention' snack plates with peanut-butter-banana rolls, while they occasionally
    sneak an extra drizzle of ranch on their chicken nuggets despite a parental warning.
  core: Connan Lopez is a methodical mini-inventor whose LEGO towers rise as high as their curiosity, yet they habitually hoard stray rocks in a secret drawer and stubbornly challenge peers to Rubik's-cube
    duels.
background:
  cultural: Connan grows up in a middle‑class family in Terre Haute, Indiana, where Midwestern values of practicality, self‑reliance, and community involvement are common. His household celebrates typical
    American holidays and participates in local events such as the Vigo County Fair, which reinforce a sense of belonging and modest ambition. The regional culture emphasizes a balance of independence and
    teamwork, mirroring Connan's own blend of reserved curiosity and competitive drive. While his ethnicity is white, his family embraces a diverse mix of traditions, including occasional visits to nearby
    cultural festivals that expose him to broader perspectives.
attributes:
