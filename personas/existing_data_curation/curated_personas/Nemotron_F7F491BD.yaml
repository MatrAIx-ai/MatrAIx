  hobbies: '[''Visiting art galleries and folk museums'', ''Sketching'', ''Landscape and portrait photography'', ''Hiking in the Appalachian foothills'', ''Birdwatching'', ''Seasonal cooking with foraged
    ingredients'', ''Playing acoustic guitar'', ''Listening to indie, folk, and classical music'', ''Small tabletop‑gaming groups'', ''Reading philosophy and history'', ''Volunteering in community art workshops'']'
  career_goals: Joshua aims to complete a bachelor’s degree in Education within the next two years, followed by a master’s in Curriculum and Instruction to qualify for a full‑time, tenure‑track faculty
    position. He plans to spearhead an interdisciplinary program that merges art, technology, and trade skills, positioning his department as a regional hub for innovative vocational education. He also
    hopes to publish research on integrating creative arts into technical curricula, secure grant funding for community‑based art workshops, and eventually serve as department chair, where he can mentor
    new instructors and shape institutional policy toward inclusive, experiential learning.
