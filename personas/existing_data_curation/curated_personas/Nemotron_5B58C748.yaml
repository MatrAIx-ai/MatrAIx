  hobbies: '[''Gardening'', ''Kayaking'', ''Cooking'', ''Reading (business & fiction)'', ''Yoga'', ''Volunteering at food bank'', ''Attending community events'', ''DIY home improvement'', ''Family genealogy
    research'']'
  career_goals: Looking ahead, Mary aims to move into a regional sales management role within the next three to five years, overseeing multiple teams across the Florida market. She plans to deepen her expertise
    in sales enablement technology and earn a professional certification such as the Certified Sales Leader (CSL) or pursue an MBA part‑time. Her ambition includes leading cross‑functional initiatives that
    improve revenue growth while maintaining a harmonious team culture. In the longer term, she envisions launching her own sales consultancy focused on helping small businesses implement data‑driven sales
    processes, and mentoring emerging women leaders in the field.
