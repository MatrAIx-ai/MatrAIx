personas:
  professional: Mary Shirey blends solid business fundamentals with hands‑on leadership, steering a non‑retail sales team through data‑driven strategies while balancing curiosity for new sales‑enablement
    technology with a pragmatic implementation style that keeps pipelines efficient and team culture harmonious, and they actively mentor emerging women leaders to build a supportive pipeline.
  sports: Mary Shirey stays active through early‑morning paddle‑boarding with the St. Lucie Paddle Club, weekend yoga sessions, occasional 5K charity runs, and they cheer on the Miami Dolphins, Orlando
    Magic, and Tampa Bay Rays as their devoted Florida sports fan.
  arts: Mary Shirey immerses themselves in the arts by browsing weekly farmers’ markets and local art fairs for emerging Florida painters, unwinding to the folk storytelling of The Avett Brothers and the
    lyrical piano of Ludovico Einaudi, devouring mystery novels by Tana French and historical fiction by Ken Follett, which together shape their creative outlook, and they regularly attend gallery openings
    to support regional artists.
  travel: Mary Shirey prefers low‑key road trips that blend natural scenery with cultural stops, having explored historic St. Augustine, the jazz‑rich streets of New Orleans, and the sun‑kissed beaches
    of the Bahamas, while they dream of a week‑long hiking adventure in the Blue Ridge Mountains and a culinary tour of Italy’s Amalfi Coast.
  culinary: Mary Shirey experiments in the kitchen with seasonal, health‑focused dishes like citrus‑marinated grilled mahi‑mahi over quinoa and kale, roasted heirloom tomatoes with fresh basil, and homemade
    avocado‑lime salsa, favoring ingredients such as locally sourced mango, coconut milk, and microgreens, though they occasionally indulge in rich chocolate mousse after community events.
  core: Mary Shirey is a data‑driven sales leader who balances pragmatic efficiency with a love for backyard gardening, paddle‑boarding, and spontaneous genealogy rabbit holes, while they juggle a disciplined
    budget and a habit of over‑watering their plants.
background:
  cultural: Mary is a White American who grew up in the southeastern United States, spending most of her life in Florida's coastal communities. Her upbringing reflects a blend of Southern hospitality and
    a pragmatic, work‑oriented ethos common to middle‑class families in the region. She values community involvement, courtesy, and personal responsibility, shaped by the multicultural environment of Port
    Saint Lucie where retirees, families, and new residents intersect. While she celebrates traditional American holidays and holds an appreciation for the state's outdoor lifestyle, she also embraces the
    diverse cultural influences of her community, fostering an inclusive outlook both at work and in her personal life.
