  career_goals: In retirement, Amanda is determined to channel her competitive streak and organizational strengths into leadership roles within her community. She aims to become president of the Elizabethtown
    Historical Society, orchestrating the annual heritage festival and curating exhibits that highlight local history. She seeks to spearhead a senior mentorship program, guiding younger volunteers in event
    logistics and record management. Amanda also aspires to grow her award‑winning garden to win the Hardin County Best Garden award for three consecutive years. On a personal level, she plans to complete
    a memoir chronicling her family’s story and the changes she has witnessed in small‑town Kentucky, and to enroll in evening courses on regional history at Elizabethtown Community College. Maintaining
    her mental health is also a priority; she intends to integrate structured journaling and mindfulness routines into her daily schedule.
