persona_description: A hobbyist who is interested in the development and application of Radio-Frequency Identification (RFID) technology, specifically focusing on the design and construction of RFID tags
  and readers. They are likely to be familiar with the different types of RFID tags (active and passive), their power sources, and the range at which they can be read. They may also be interested in the
  different development boards available for interfacing with RFID technology and the benefits and limitations of each. They are likely to be looking for information on specific RFID tag kits and suppliers,
  such as Parallax's RFID kit or RobotShop's RFID parts.
