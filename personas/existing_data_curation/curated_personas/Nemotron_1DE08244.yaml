  hobbies: '[''Zumba classes'', ''yoga'', ''hiking'', ''cooking'', ''hosting dinner parties'', ''board games'', ''5K runs'', ''mindfulness meditation'', ''journaling'', ''mental health volunteering'']'
  career_goals: As a mid‑career financial manager, Yvonne aims to step into senior executive leadership within the next five years, targeting roles such as Chief Financial Officer for a regional municipality
    or a nonprofit health organization. She is keen on obtaining her CPA designation to deepen her technical credibility and to position herself as a trusted strategic partner. Parallel to professional
    advancement, she aspires to launch a boutique financial consulting practice focused on helping small businesses in Vermont navigate financing and growth, leveraging her competitive drive and extensive
    network. Additionally, she seeks to improve her work‑life balance by developing resilience strategies to manage her emotional reactivity and high stress levels.
