  career_goals: Cicely aspires to become a scientist who explores the natural world, with a particular interest in marine biology or space exploration. She dreams of one day working at a research institute
    where she can combine her love for art and science by creating scientific illustrations or educational animations. In the longer term, she envisions herself as a mentor who encourages other children
    to pursue curiosity-driven learning, possibly as a science teacher or outreach coordinator.
