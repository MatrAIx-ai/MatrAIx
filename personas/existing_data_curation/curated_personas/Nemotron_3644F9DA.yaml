personas:
  professional: Cicely Moore, a 9‑year‑old budding coder, channels her curiosity and disciplined focus into creating Scratch games and robotics challenges, often out‑competing peers while they meticulously
    document every bug and fix.
  sports: Cicely Moore plays forward for the Eastside Elementary Tigers soccer team, thriving on the camaraderie of match‑day drills, and they relentlessly challenge opponents while cheering for the nearby
    professional Springfield Strikers during weekend games.
  arts: Cicely Moore immerses themselves in cartoon drawing at the Normal Fine Arts Center, drawing inspiration from classic animators like Hayao Miyazaki and modern illustrators such as Katie O'Neill,
    and they eagerly attend community music events featuring the local youth orchestra and folk band The Riverfolk.
  travel: Cicely Moore dreams of exploring Redwood National Park’s towering trees after a recent weekend hike in the nearby Willow Creek Preserve, and they meticulously plan a family road trip to Washington,
    D.C., hoping to tour the Smithsonian’s Air and Space Museum.
  culinary: Cicely Moore loves helping her family prepare spaghetti carbonara and chocolate chip cookies, often experimenting with extra cheese or a pinch of cinnamon, and they proudly add hand‑drawn recipe
    cards to their sketchbook despite occasional kitchen messes.
  core: Cicely Moore blends fierce curiosity with a competitive streak, turning every school project, soccer match, and art class into a chance to outdo herself while they keep a tidy notebook of wins and
    occasional glitter‑sticker indulgences.
background:
  cultural: Cicely grows up in a close-knit African-American family in Normal, Illinois, where community, family, and faith play central roles. Her parents emphasize academic excellence and cultural pride,
    sharing stories of Black history and celebrating holidays like Juneteenth. She attends a local church that hosts youth programs and music ministries, exposing her to gospel, soul, and contemporary Black
    music. The family participates in regional cultural festivals that showcase African-American art, dance, and cuisine, fostering her appreciation for creativity and heritage. These experiences, combined
    with the Midwest’s emphasis on education and community involvement, shape her worldview and personal values.
