personas:
  professional: Raymond Arnold, a budding little helper who treats daily chores as tiny projects—sorting crayons, stacking cups, and negotiating toy trades—showcasing an early knack for organization, problem‑solving,
    and social leadership even as they delight in free‑form play.
  sports: Raymond Arnold, a lively 2‑year‑old who splashes in the splash pad and enthusiastically participates in toddler gymnastics at the community center while proudly wearing a Los Angeles Dodgers cap
    and cheering for the Dodgers whenever a game is on TV, they also love to race friends on the playground.
  arts: Raymond Arnold, a bright little artist who spends afternoons finger‑painting vibrant abstract shapes, dancing to the upbeat tunes of The Wiggles, and humming Disney classics like \"Let It Go\" while
    often requesting storytime with picture books by Dr. Seuss, they also love to clap along to the rhythm of each song.
  travel: Raymond Arnold, a curious 2‑year‑old who delights in spontaneous family road trips, such as weekend outings to the San Diego Zoo and beach days at Santa Monica, prefers the excitement of open‑ended
    exploration over detailed schedules, and they often ask for \"more dinosaurs\" at the museum.
  culinary: Raymond Arnold, a picky‑yet‑adventurous eater who insists on golden chicken nuggets with a side of steamed broccoli, delights in scooping up banana slices with sticky fingers, and enjoys helping
    stir batter for pancakes, they often demand extra cheese.
  core: Raymond Arnold, a talkative, sociable toddler who balances boundless curiosity with a laid‑back attitude, they harmoniously charm everyone while effortlessly juggling nap times, snack battles, and
    spontaneous dance parties.
background:
  cultural: Raymond grows up in a middle-class New England family in Northborough, MA. His household follows typical American customs—celebrating holidays like Thanksgiving, Halloween, and Christmas, attending
    community library storytimes, and participating in seasonal outdoor activities in the town's parks. The family’s cultural backdrop emphasizes English language use, early childhood education through
    play, and a value on kindness and cooperation. His parents’ modest involvement in local community events further shapes his sense of belonging and social harmony.
