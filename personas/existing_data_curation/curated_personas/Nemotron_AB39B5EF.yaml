    animals'', ''participating in daycare circle time'']'
  career_goals: Even at two, Raymond enjoys imagining what he will become. He often talks about wanting to be a storyteller who makes his friends laugh, a helper who shares his toys, and someday a community
    helper—like a firefighter or teacher—who can keep people safe and happy. He aspires to keep learning new things, make many friends, and be the center of fun activities wherever he goes.
