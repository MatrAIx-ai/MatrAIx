  hobbies: '["Abstract Acrylic Painting", "Reading Speculative Fiction & Philosophy", "Astrophotography", "Woodworking", "Acoustic Guitar Playing & Songwriting", "Community Theater Set Design", "Hiking
    & Fishing in West Texas", "Puzzle Solving & Online Escape Rooms", "Attending Local Art Fairs & Music Festivals", "Digital Illustration"]'
  career_goals: Tom's immediate goal is to secure a supervisory position within his warehouse, such as Lead Inventory Clerk, where he can lead a team and implement systematic improvements. He aims to obtain
    a Certified Supply Chain Professional (CSCP) credential within the next two years, and to deepen his knowledge of data analytics tools like Power BI. In the longer term, Tom aspires to become a regional
    warehouse manager overseeing multiple sites in West Texas, and eventually launch his own boutique logistics consulting firm that leverages technology and sustainable practices to help small businesses
    streamline their supply chains. His competitive drive fuels his ambition to be recognized as top performer in efficiency metrics and to mentor junior staff, fostering a culture of continuous improvement.
