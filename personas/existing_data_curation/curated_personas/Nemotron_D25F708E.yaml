personas:
  professional: Sandra Blount, a 54‑year‑old aspiring home‑based entrepreneur, leverages her practical DIY and budgeting expertise with a curiosity‑driven love of preservation to launch a modest line of
    canned preserves and handcrafted quilts, while assertively coordinating senior‑center programs and remaining flexible enough to adapt to community needs.
  sports: Sandra Blount enjoys leisurely bird‑watching hikes along the local nature trail, is a season ticket holder for the nearby baseball team the River City Rattlers, and participates in a community
    walking club that meets every Saturday for a 3‑mile stroll.
  arts: Sandra Blount channels her creative side through a weekly quilting circle, admires the historical fiction of Philippa Gregory and the gospel harmonies of the Southern Gospel Choir, and regularly
    attends church choir rehearsals where she sings traditional hymns.
  travel: Sandra Blount prefers road trips that combine history and nature, having recently explored the battlefields of Gettysburg, the gardens of Charleston, and planning a pilgrimage to the historic
    town of St. Augustine for its coastal charm.
  culinary: Sandra Blount specializes in Southern comfort cooking, expertly preparing dishes like shrimp and grits, fried green tomatoes, collard greens seasoned with smoked ham hocks, and preservations
    such as pickled okra and peach jam, while experimenting with cayenne‑spiced caramel for desserts.
  core: Sandra Blount balances her garden, genealogy, and budding business with a penchant for worrying, a love of community service, and occasional indulgence in garden‑tool impulse buys.
background:
  cultural: Sandra was raised in the rural South of Georgia, where Southern hospitality, Baptist traditions, and a strong sense of community shaped her worldview. Family gatherings centered around home‑cooked
    meals, seasonal gardening, and church events, fostering an appreciation for self‑reliance and neighborly support. Her white Southern heritage includes a blend of Deep South customs and the influence
    of nearby Mid‑Atlantic migration patterns, which she encountered during her brief college studies. These cultural roots underpin her values of responsibility, modest ambition, and a pragmatic approach
    to new ideas, while also informing her love for gardening, cooking, and community service.
attributes:
  skills: '["budget management", "event planning", "gardening and horticulture", "food preservation (canning)", "basic computer literacy", "DIY home repairs", "genealogy research", "public speaking", "cooking",
