  hobbies: '["gardening", "canning and food preservation", "genealogy research", "reading historical novels", "birdwatching", "quilting", "volunteering at the senior center", "walking nature trails", "playing
    bridge", "attending church socials"]'
  career_goals: Sandra aims to transform her practical experience into a small home‑based business selling homemade preserves and crafts, allowing her to generate supplemental income while staying rooted
    in her community. She plans to complete her associate degree in business administration through online courses, which will give her the confidence to manage the venture. At the same time, she hopes
    to take on a leadership role in the local senior center, coordinating volunteer programs and workshops. A personal ambition is to improve her emotional well‑being by incorporating stress‑reduction practices,
    such as mindfulness classes and regular counseling, so she can sustain her involvement without feeling overwhelmed.
