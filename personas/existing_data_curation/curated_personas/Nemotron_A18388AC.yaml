    thinking and skeptical evaluation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Reading art history and science books'', ''Hiking in local parks'', ''Organized vegetable gardening'', ''Crossword and Sudoku
    puzzles'', ''Yoga and meditation'', ''Community theater participation'', ''Board-game nights with friends'', ''Volunteering as a financial‑literacy instructor'', ''Docent work at a museum'']'
  career_goals: Brittany aims to advance to a regional branch manager position within the next three years, overseeing multiple loan officers while championing data‑driven underwriting practices. She plans
    to earn the Certified Financial Planner (CFP) credential and the Certified Credit Counselor (CCC) certification to deepen her expertise. Passionate about community education, she intends to launch a
    financial‑literacy program for seniors that integrates art‑based learning modules, reflecting her love of culture. Additionally, Brittany seeks to mentor the next generation of loan officers and possibly
    teach part‑time finance courses at a local community college, while staying abreast of fintech innovations such as AI‑enhanced credit scoring.
