  hobbies: '[''Visiting art galleries and museums'', ''Playing guitar and digital piano'', ''Makerspace projects (Arduino, robotics, 3D printing)'', ''Urban photography'', ''Hiking in Rock Creek Park'',
    ''Cooking fusion cuisine'', ''Listening to jazz and spoken‑word performances'', ''Reading sci‑fi and philosophy'']'
  career_goals: He aims to move from a technical specialist role to a senior technologist or product development lead within the next five years, overseeing interdisciplinary teams that blend engineering
    rigor with creative design. He plans to complete a bachelor’s degree in mechanical engineering, earn a certification in design thinking, and eventually launch a consultancy that helps small manufacturers
    integrate sustainable, art‑inspired product solutions. He also hopes to become a visible mentor for underrepresented students in STEM, advocating for inclusive engineering cultures.
