personas:
  professional: Toshiro Perry, a hands‑on engineering technologist with expertise in mechanical design, rapid prototyping, and instrumentation, blends rigorous problem‑solving with a flair for aesthetic
    integration, mentors junior staff, and thrives in flexible, outcome‑driven projects while eyeing a senior product‑development lead role.
  sports: Toshiro Perry, a weekend hiker of Rock Creek Park’s trails, member of the D.C. Urban Explorers running club, and occasional pick‑up basketball player who follows the Washington Capitals and Wizards,
    maintains a casual fitness regimen that mixes trail hikes, bodyweight circuits, and yoga stretches.
  arts: Toshiro Perry, a regular at D.C.’s contemporary galleries and live jazz nights featuring artists like Kamasi Washington and Esperanza Spalding, spends evenings improvising on guitar and digital
    piano while drawing inspiration from sculptor Anish Kapoor and spoken‑word poet Saeed Jones.
  travel: Toshiro Perry, who prefers impromptu, budget‑conscious trips that blend urban photography and culinary experiments, has explored the street art of Berlin, the food markets of Marrakech, and the
    cherry‑blossom temples of Kyoto, and now dreams of hiking Patagonia’s Torres del Paine while capturing sunrise over Reykjavik’s harbor.
  culinary: Toshiro Perry, an intermediate home chef who fuses African, Caribbean, and Asian flavors, regularly prepares dishes like jerk‑spiced salmon with miso glaze, plantain‑infused ramen broth, and
    injera‑topped with Thai green curry, delighting in ingredients such as scotch bonnet peppers, lemongrass, and fermented black garlic.
  core: Toshiro Perry, a 36‑year‑old maker‑engineer who weaves art into technology, wrestles with spontaneous disorganization, and fuels life with eclectic music, experimental cooking, and a relentless
    curiosity.
background:
  cultural: Toshiro is an African‑American with deep roots in the Washington, D.C. metropolitan community, and his family carries Jamaican heritage from his father’s side. He grew up immersed in the rich
    musical and storytelling traditions of Black culture, attending church choirs and community festivals. This blend of African‑American and Caribbean influences informs his love for rhythm, improvisation,
    and collaborative creativity. He is actively involved in local STEM outreach programs that mentor Black youth, and he draws inspiration from historic Black inventors and contemporary Black artists,
    striving to honor that legacy in his professional and personal pursuits.
attributes:
  skills: '[''Mechanical design (SolidWorks, Fusion 360)'', ''Additive manufacturing (FDM and SLA 3D printing)'', ''Python programming for data analysis and automation'', ''LabVIEW for instrument control'',
