personas:
  professional: Meaghan Prashad leverages their active listening, conflict mediation, and volunteer coordination experience to design and run community health outreach events, blending meticulous planning
    with on‑the‑fly flexibility as they pursue certification as a Home Health Aide.
  sports: Meaghan Prashad enjoys weekend hikes on Black Bear Trail, regularly supports the Oklahoma State Cowboys basketball games with friends, and participates in a local adult soccer pick‑up league,
    balancing active recreation with community camaraderie.
  arts: Meaghan Prashad immerses themselves in contemporary fiction by Sally Rooney, crafts weekly art workshops inspired by Frida Kahlo’s vibrant palettes, and knits scarves following patterns from VeryPink
    Knits, all of which shape their creative outlet and volunteer work.
  travel: Meaghan Prashad prefers low‑key road trips to nearby natural retreats like the Ozark National Forest and Sedona, plans itineraries with a mix of spontaneity and detailed checklists, and dreams
    of traveling to Maui’s gardens and Bali’s rice terraces to explore therapeutic horticulture abroad.
  culinary: Meaghan Prashad delights in cooking hearty vegetable stews such as sweet‑potato lentil soup, assembles roasted beet and goat‑cheese salads with fresh kale, and bakes whole‑wheat banana bread,
    always sourcing heirloom tomatoes and local honey from farmer’s markets.
  core: Meaghan Prashad is a compassionate organizer who balances meticulous planning with flexible kindness, channels energy into community gardening and knitting, yet occasionally overcommits and forgets
    to water a few plants.
background:
  cultural: Meaghan grew up in a predominantly White, mid‑western community in Oklahoma, shaped by the values of self‑reliance, modesty, and close‑knit neighborhoods. The local culture blends traditional
    small‑town sensibilities with the influence of nearby Oklahoma State University, exposing her to a mix of agricultural heritage, community activism, and a modest collegiate atmosphere. Her family’s
    involvement in church and local service organizations reinforced a commitment to helping others and maintaining social harmony, while the surrounding prairie landscape fostered an appreciation for outdoor
    activity and stewardship of the land.
