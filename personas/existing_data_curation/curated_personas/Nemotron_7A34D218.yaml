  hobbies: '[''Reading contemporary fiction'', ''Knitting'', ''Vegetable gardening'', ''Volunteering at food bank'', ''Leading art workshops at senior center'', ''Hiking'', ''Attending farmers market'',
    ''Watching OSU basketball games'', ''Cooking'', ''Crafting'']'
  career_goals: Meaghan aims to translate her volunteer experience into a formal role in community support. She plans to enroll in a two‑year associate program in social services or allied health, followed
    by certification as a Home Health Aide (HHA) or Certified Nursing Assistant (CNA). Her long‑term ambition is to become a community outreach coordinator for a local nonprofit serving seniors and at‑risk
    youth, where she can design programs that blend innovative ideas with proven practices. She also hopes to obtain a small grant to start a community garden that doubles as a therapeutic space for residents.
