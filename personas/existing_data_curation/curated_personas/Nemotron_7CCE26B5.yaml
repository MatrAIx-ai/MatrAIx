    in local trivia and quiz nights'']'
  career_goals: Even at 95, Tiffany is driven to leave a lasting imprint on her community. She aims to complete a memoir that weaves together her family’s story with the broader history of Canton, and to
    compile the oral histories she has collected into a community archive. She plans to curate an intergenerational art exhibition that pairs works by local youth with pieces from the region’s historical
    collections, showcasing her curatorial eye and competitive spirit. Tiffany also seeks to continue her service on the Canton Arts Council board, mentor senior volunteers in outreach program design, and
    secure a small grant that will fund a traveling seniors‑to‑schools art‑talk series. These ambitions reflect her desire for recognition, legacy, and ongoing engagement.
