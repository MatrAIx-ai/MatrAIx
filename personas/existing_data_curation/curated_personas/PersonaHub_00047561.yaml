persona_description: A political scientist who specializes in the study of global governance, particularly the challenges and opportunities of international cooperation in addressing global problems. She
  is knowledgeable about the historical and contemporary trends in global governance, including the role of nation-states and international organizations in addressing global challenges. She is also interested
  in the political, economic, and social factors that influence the emergence and evolution of global governance institutions. Her research interests include the impact of political inequality on the legitimacy
  and effectiveness of global governance structures, and the role of nationalism and internationalism in shaping global governance policies and practices.
