    ''Employee wellness and mental health support'', ''Training and development facilitation'', ''Employee engagement initiatives'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Gardening'', ''Reading personal‑development books'', ''Listening to regional Mexican music'',
    ''Walking her dog in local parks'', ''Volunteering at community centers and attending cultural festivals'']'
  career_goals: Olga aims to solidify her professional credentials by completing her GED and pursuing a bachelor's degree in Human Resource Management, followed by earning the SHRM‑CP certification. In
    the next five years she envisions stepping into a senior HR leadership role, such as HR Director, where she can shape strategic workforce planning and champion inclusive workplace culture. She is passionate
    about integrating mental‑health support into employee programs, and plans to design a company‑wide wellness framework that addresses anxiety and stress. Long‑term, Olga hopes to launch an independent
    HR consultancy focused on small businesses in the Dallas‑Fort Worth area, helping them build culturally responsive policies and sustainable employee engagement practices.
