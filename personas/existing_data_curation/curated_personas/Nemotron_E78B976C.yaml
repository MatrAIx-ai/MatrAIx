  career_goals: She dreams of growing up to become an artist who creates paintings that tell stories, or a wildlife explorer who discovers new creatures in the woods. She also imagines being a storyteller
    for children, sharing her own illustrated books. She wants a future where she can blend art, nature, and imagination while having the freedom to explore ideas in her own way.
