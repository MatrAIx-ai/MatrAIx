personas:
  professional: Donna Goldberg, a 39‑year‑old front‑line retail specialist at a Milwaukee department store, merges her strong customer‑service instincts with a keen visual‑merchandising eye, turning each
    sales floor into an artful tableau that lifts sales while they cultivate a harmonious, collaborative team environment despite their tendency to drift from strict schedules.
  sports: Donna Goldberg, 39, enjoys cheering on the Milwaukee Bucks and Brewers while they also join a local community softball league in summer, spends quiet weekends ice‑fishing on Lake Michigan’s shore,
    and laces up snowshoe boots for winter treks through state forests, balancing spectator enthusiasm with hands‑on outdoor activity.
  arts: Donna Goldberg, a 39‑year‑old art enthusiast, frequents the Milwaukee Art Museum to study pieces by Georgia O'Keeffe and local Wisconsin painter John Anderson, captures the changing landscape in
    her own photography, sketches park scenes in a battered sketchbook, and draws inspiration from the folk‑rock sounds of Sufjan Stevens and The Lumineers as well as the grounded performances of Frances
    McDormand, while they volunteer at neighborhood gallery events to champion emerging talent.
  travel: Donna Goldberg, 39, favors weekend road trips to Door County’s cherry orchards and spontaneous day‑long hikes along the Ice Age Trail, supplements these getaways with occasional city escapes to
    Chicago’s art districts and New York’s museums, and keeps a travel bucket list that includes a summer bike‑tour through the Dutch countryside, all while balancing family responsibilities and a modest
    travel budget.
  culinary: Donna Goldberg, a 39‑year‑old home chef, enjoys crafting farm‑to‑table meals like rosemary‑roasted chicken with fresh garden herbs, beet‑goat‑cheese salad drizzled with locally sourced honey,
    and buttery cheese curds, while they experiment with brewing their own kombucha and often swap recipes at community potlucks, showcasing a solid yet adventurous cooking skill set.
  core: Donna Goldberg, 39, blends a love for art, community, and flexible spontaneity into a retail career and a dream of opening a local artisan boutique, all while they navigate occasional disorganization
    and a habit of impulsive décor purchases.
background:
  cultural: Donna grew up in a typical Midwestern white family in Wisconsin, with roots that include German and Scandinavian ancestry common to the region. Her upbringing emphasized community involvement,
    modesty, and a strong work ethic. She participates in local traditions such as county fairs, farmer’s markets, and seasonal outdoor activities like fishing and snowshoeing. While she respects her Lutheran
    heritage, she is open to diverse ideas and enjoys exploring cultures through art and travel. Her values of harmony, cooperation, and flexibility reflect the collaborative spirit of Pewaukee’s close‑knit
    community.
