  career_goals: Donna aims to move into a supervisory role within the next two years, leveraging her visual merchandising talent to become a store manager or regional display coordinator. She plans to enroll
    in a part‑time Retail Management certification program to solidify her leadership skills while maintaining a flexible schedule for family life. Long‑term, she dreams of opening a boutique that showcases
    local Wisconsin artisans, combining her love of art, community, and entrepreneurship.
