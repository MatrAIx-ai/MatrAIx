persona_description: A historian who specializes in the study of international monetary systems, particularly the evolution and impact of fixed exchange rate regimes since the late 19th century. He is particularly
  interested in the experiences of the gold standard, the Bretton Woods system, and the euro, and how these systems have failed and been undone by the structural crises of the past 150 years. He is known
  for his deep knowledge of historical events and their impact on economic systems, and for his ability to analyze and interpret complex historical data and trends.
