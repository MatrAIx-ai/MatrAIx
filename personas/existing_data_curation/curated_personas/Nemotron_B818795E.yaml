  hobbies: '[''Cooking Vietnamese and fusion cuisine'', ''Gardening (vegetables and herbs)'', ''Walking and hiking in local parks'', ''Tai chi for seniors'', ''Knitting and craft circles'', ''Reading historical
    novels and diaspora memoirs'', ''Listening to traditional Vietnamese music'', ''Volunteering at a community food bank'']'
  career_goals: Although retired, Nenita remains driven to contribute meaningfully to her community. She aspires to volunteer as a mentor for new immigrants at a local community center, sharing her language
    skills and financial knowledge. She aims to compile a family cookbook that blends Vietnamese recipes with Seattle’s seasonal produce, with the intention of publishing it for her grandchildren. Nenita
    also plans to organize an annual cultural celebration that showcases Southeast Asian arts, music, and cuisine, fostering intergenerational connections. Maintaining her health is a priority, so she intends
    to continue tai chi practice and hopes to travel to Vietnam for a family reunion within the next two years.
