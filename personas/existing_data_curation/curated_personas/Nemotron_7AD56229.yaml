personas:
  professional: Samuel Julien, an aspiring junior architect, merges his passion for LEGO construction and Minecraft world‑building into early design experiments, applying his love of structure and practical
    focus while allowing enough flexibility to improvise on the fly.
  sports: Samuel Julien, a member of his neighborhood youth soccer club, kicks the ball at the local park with friends, idolises Manchester United’s midfielders, and joins the school’s track team in the
    spring while enjoying casual weekend bike rides on nearby trails.
  arts: Samuel Julien, a weekend piano beginner, sketches cartoon heroes inspired by comic books, grooves to Kendrick Lamar’s hip‑hop beats and Kirk Franklin’s gospel songs, and watches Minecraft creator
    Mumbo Jumbo for design inspiration.
  travel: Samuel Julien, who loves exploring nature trails, has visited the Grand Canyon on a family road trip, dreams of touring the Smithsonian’s dinosaur exhibit in Washington, D.C., and plans to camp
    at Yosemite’s meadow next summer.
  culinary: Samuel Julien, a budding junior baker, enjoys measuring out chocolate chips for cookies with his mother, prefers pepperoni pizza with extra cheese, and experiments with a splash of mango puree
    in his smoothie bowls.
  core: Samuel Julien blends boundless imagination with a love for order, building LEGO kingdoms in the morning, sprinting soccer fields at lunch, and mindfully saving allowance for future creations while
    occasionally letting curiosity lead to spontaneous cookie dough experiments.
background:
  cultural: Samuel grows up in the Black community of Cypress, Texas, where family, church, and neighborhood ties shape his daily life. His parents, both active in the local African‑American church, emphasize
    the value of education, community service, and cultural pride. He regularly attends Sunday services where gospel music, storytelling, and intergenerational gatherings reinforce his heritage. The family
    celebrates cultural milestones such as Juneteenth and Black History Month, often incorporating reading books by Black authors and listening to artists ranging from Stevie Wonder to contemporary hip‑hop.
    Living in the diverse suburb of Cypress exposes Samuel to a blend of Southern Texas customs and broader African‑American traditions, fostering a strong sense of identity, respect for elders, and a love
    for music, food, and communal celebrations.
attributes:
