  hobbies: '[''Minecraft'', ''LEGO building'', ''Reading adventure books'', ''Drawing cartoons'', ''Soccer'', ''Beginner piano'', ''Baking with family'', ''Exploring nature trails'', ''Listening to hip‑hop
    and gospel music'', ''Church youth activities'']'
  career_goals: Samuel dreams of becoming an astronaut because he loves space and enjoys learning about rockets at the nearby Space Center Houston. He also imagines designing video games or building structures
    as an engineer, reflecting his passion for LEGO and hands‑on creation. In the short term, he aims to improve his reading level, join the school robotics club, and learn more piano pieces, all steps
    he sees as building toward a future where he can explore the stars or create the next generation of interactive games.
