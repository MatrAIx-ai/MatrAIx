  hobbies: '[''Pick‑up basketball'', ''Weight‑lifting'', ''Watching NFL and NBA games'', ''Grilling barbecue and preparing soul‑food dishes'', ''DIY home improvement projects'', ''Car restoration'', ''Playing
    video games (FIFA, NBA 2K)'', ''Volunteering at community center'']'
  career_goals: Shaun aims to secure a stable, structured position that leverages his practical skill set while providing a clear path for advancement. He plans to enroll in a local trade program to obtain
    certification as an HVAC technician or electrician, with the longer‑term ambition of launching his own handyman service for the St. Louis County community. In parallel, he intends to complete a GED
    and explore associate‑level coursework in facilities management, positioning himself for roles such as maintenance technician or logistics coordinator in a warehouse setting. He values long‑term job
    security, consistent hours, and a supportive team environment.
