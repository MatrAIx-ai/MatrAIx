personas:
  professional: Shaun Lamark is an aspiring HVAC technician who blends practical troubleshooting skills, a meticulous checklist‑driven approach, and a strong sense of community service into reliable part‑time
    maintenance work, while laying the groundwork for their future independent handyman business.
  sports: Shaun Lamark fuels their weekend fitness routine with pick‑up basketball at the South St. Louis Hoops Club, lifts weights four times a week at FitDown Fitness, and hosts lively viewing parties
    for the Kansas City Chiefs and the Chicago Bulls, embodying both personal athleticism and regional team loyalty.
  arts: Shaun Lamark immerses themselves in the local music scene, spinning Leon Bridges' soulful blues, vibing to modern hip‑hop from Anderson .Paak, and attending occasional St. Louis Art Fair strolls
    that showcase murals by artist James Rashad, letting rhythmic storytelling shape their downtime.
  travel: Shaun Lamark enjoys budget‑friendly road trips, having explored Nashville’s music venues, Chicago’s skyline, and a weekend stint at New Orleans for its jazz and gumbo, while dreaming of a scenic
    hike through the Great Smoky Mountains and a relaxing beach escape in the Caribbean for future breaks.
  culinary: Shaun Lamark is a self‑taught grill master who perfects St. Louis‑style ribs with a dry rub of brown sugar, smoked paprika, and cayenne, whips up soul‑food staples like fried chicken, collard
    greens, and cornbread, and occasionally experiments with a sweet‑heat glaze using honey and chipotle for neighborhood potlucks.
  core: Shaun Lamark blends a pragmatic, community‑driven work ethic with a love for backyard barbecues, pick‑up basketball, and meticulous budgeting, even if they sometimes procrastinate on dentist appointments
    and forget to rest after late‑night gaming sessions.
background:
  cultural: Shaun is a Black American who grew up in Florissant, a suburb of St. Louis with a close‑knit African‑American community. His family’s traditions—church gatherings, Sunday potlucks, and neighborhood
    block parties—have shaped his values of cooperation, respect, and community service. He draws cultural pride from the rich musical heritage of the region, enjoying hip‑hop, R&B, and the legacy of St.
    Louis blues. Local cuisine, especially soul‑food and Midwestern barbecue, plays a central role in family celebrations. While he embraces his Black heritage, Shaun also feels the influence of Midwestern
    values such as hard work, modesty, and practicality, which guide his everyday choices.
attributes:
  skills: '[''Automotive maintenance'', ''Home repair and DIY projects'', ''Basic computer troubleshooting'', ''Personal budgeting and finance management'', ''Customer service'', ''Team collaboration'',
