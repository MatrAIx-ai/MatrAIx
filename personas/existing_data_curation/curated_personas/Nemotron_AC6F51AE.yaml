  hobbies: '[''Playing soccer (team practice and matches)'', ''Dancing to Latin music at family gatherings'', ''LEGO building and model kits'', ''Reading adventure comics'', ''Playing video games (Minecraft,
    Mario Kart)'', ''Helping in the kitchen (making pupusas, tamales)'', ''Participating in community cultural festivals (Día de los Muertos)'', ''Collecting baseball cards'']'
  career_goals: Jose dreams of a future where he can combine his love for helping people, his interest in structured environments, and his passion for teamwork. He often talks about becoming a firefighter
    because he admires the clear routines, the sense of duty, and the opportunity to protect his community. He also imagines himself as a school teacher who can create organized, predictable classroom settings
    while guiding classmates, or as a professional soccer player who can continue playing in a team setting he enjoys. Ultimately, he hopes to pursue a career that offers a reliable schedule, tangible results,
    and the chance to support his family and friends.
