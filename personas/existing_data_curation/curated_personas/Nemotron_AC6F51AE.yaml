personas:
  professional: Jose Hoadley, a nine‑year‑old aspiring builder who delights in following LEGO instructions and model kit manuals, leverages his love for routine and teamwork from soccer to develop the precise,
    practical problem‑solving skills he imagines using as a future engineer.
  sports: Jose Hoadley, an energetic member of his local U10 soccer team that practices twice a week and looks up to the dynamic play of Liverpool FC, also participates in weekend pick‑up games at the community
    park and enjoys watching the MLS team San Jose Earthquakes for hometown pride.
  arts: Jose Hoadley, who loves dancing to upbeat Latin rhythms at family gatherings, immerses himself in adventure comics such as 'The Amazing Spider‑Man' and channels his creativity into constructing
    elaborate Minecraft worlds, often reenacting favorite comic scenes with his friends.
  travel: Jose Hoadley, whose family favors organized road trips to nearby nature spots like the mountain lake and who dreams of exploring Disney World in Florida and the historic ruins of Machu Picchu,
    tends to plan each vacation with detailed itineraries and a checklist of must‑see attractions.
  culinary: Jose Hoadley, who enjoys helping his mother prepare the family’s traditional dishes like pupusas and tamales, has developed a knack for kneading dough by hand, prefers the bright flavors of
    fresh avocado and mild salsa, and often experiments with adding a pinch of cheese to his homemade tortillas.
  core: Jose Hoadley, a routine‑loving yet socially vibrant nine‑year‑old, balances his structured LEGO builds with energetic soccer games and lively dance, while his occasional worries drive him to meticulously
    plan and seek calm through creative play.
background:
  cultural: Jose grows up in a vibrant Guatemalan‑American household in Los Angeles. At home, Spanish is spoken alongside English, and family meals often feature traditional dishes like tamales, pupusas,
    and corn tortillas prepared by his grandparents. He participates in cultural celebrations such as Día de los Muertos and Semana Santa, where he learns the stories and rituals of his heritage. The local
    Guatemalan community centre offers him after‑school programs where he can play soccer with peers from similar backgrounds, reinforcing a sense of belonging. His family places a strong emphasis on respect
    for elders, collective responsibility, and modesty, values that shape his practical and cooperative outlook. While he embraces American school life, these cultural roots influence his language, food
    preferences, music, and the importance he places on family cohesion.
attributes:
