persona_description: A writer who specializes in the study of comedy, particularly the works of William Congreve. His research interests include, but are not limited to, the character development of the
  protagonist, the depth of emotion expressed in the play, and the complexity of the plot. He is known for his ability to make each character speak in his or her own person, without addition from the author
  or any soliloquy save such as can be spoken on the stage in the presence of an audience. He is also known for his ability to make an end to his career as a writer, despite the obstacles he faced.
