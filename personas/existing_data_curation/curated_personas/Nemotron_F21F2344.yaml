  hobbies: '[''car maintenance and modification'', ''PC building and repair'', ''competitive video gaming (esports)'', ''3D printing'', ''reading tech blogs'', ''watching DIY videos'', ''bike riding'',
    ''pickup basketball'']'
  career_goals: He aims to earn his GED within the next year and then enroll in a community‑college apprenticeship program in automotive technology, with the long‑term goal of becoming a certified automotive
    technician or starting his own custom‑car shop. He also dreams of leveraging his tech skills to launch a small side‑venture that offers custom PC builds and repairs, blending his love of gadgets with
    a practical business model. In parallel, he hopes to develop a competitive edge in local esports leagues, using his competitive drive to possibly earn sponsorships and turn his hobby into a supplemental
    income source.
