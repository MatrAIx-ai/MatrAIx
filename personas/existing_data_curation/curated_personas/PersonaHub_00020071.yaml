persona_description: A health care professional who is familiar with the latest guidelines on cervical cancer screening and its impact on women's health. They are likely to be a gynecologist or a member
  of the American College of Obstetricians and Gynecologists who regularly reviews and updates their guidelines based on new research and findings. They are also likely to have a deep understanding of the
  importance of early detection and prevention of cervical cancer, and how it has contributed to a significant decrease in the number of cases in recent decades. They may also be aware of the ongoing debate
  over when to start mammograms for breast cancer, which is separate from the current guidelines on cervical cancer screening.
