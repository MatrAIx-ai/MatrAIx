personas:
  professional: Felicia Thomas, a budding scientific illustrator, blends her love for prairie photography and mixed‑media art with a relentless curiosity, channeling her competitive edge into meticulously
    charting botanical sketches for her school's science club while maintaining a habit of organized sketchbooks and spontaneous doodles during breaks.
  sports: Felicia Thomas, a member of the Overland Park Girls Soccer U13 team, trains year‑round, follows the Kansas City Royals for baseball inspiration, joins the local Overland Park Hiking Club for weekend
    prairie walks, and approaches each practice with a competitive drive that sometimes overshadows the emphasis on teamwork.
  arts: Felicia Thomas immerses herself in mixed‑media creations inspired by the Kansas prairie, studies the brushwork of Claude Monet and the bold colors of Frida Kahlo, practices piano pieces by Ludovico
    Einaudi, and spends evenings re‑watching Studio Ghibli films like Spirited Away to fuel her fantasy‑laden storytelling, revealing an artistic identity that balances classic reverence with modern curiosity.
  travel: Felicia Thomas enjoys family road trips that blend photography stops at the Nebraska Sandhills and Kansas' Flint Hills, revisits with friends the vibrant streets of New Orleans for a jazz festival,
    and dreams of exploring Yellowstone’s geysers and the Grand Canyon’s rim, preferring meticulously planned itineraries that leave room for spontaneous prairie hikes.
  culinary: Felicia Thomas loves cooking fluffy buttermilk pancakes drizzled with maple syrup, perfects a simple Kansas‑style barbecue chicken, experiments with prairie turnip stew using fresh carrots and
    sweet corn, and proudly adds a pinch of smoked paprika she discovered in a cooking show, though she often forgets to clean the cutting board promptly after prep.
  core: Felicia Thomas is a detail‑oriented 12‑year‑old with a competitive streak, vivid imagination, and a habit of juggling art, puzzles, and occasional anxiety, all while keeping a meticulously organized
    allowance spreadsheet and sketchbooks.
background:
  cultural: 'Felicia was raised in Overland Park, a suburban community in Johnson County, Kansas, within a middle‑class white family of German‑Irish ancestry. Her upbringing reflects typical Midwestern
    values: a blend of self‑reliance, community involvement, and appreciation for the outdoors. She celebrates American holidays such as Thanksgiving and the Fourth of July, and participates in local traditions
    like the county fair and community service projects. The region’s strong emphasis on education and extracurricular programs—like the Overland Park Arts Center and the public library’s robotics club—has
    nurtured her curiosity and artistic inclinations while also reinforcing a practical, organized approach to responsibilities.'
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Digital illustration'', ''Scratch programming'', ''Mathematics (geometry)'', ''Chess strategy'', ''Science‑fair project design'', ''Piano (intermediate)'',
    ''Photography composition'']'
  hobbies: '[''Drawing and sketching'', ''Mixed‑media art'', ''Playing piano'', ''Reading fantasy and science‑fiction novels'', ''Nature hiking and photography'', ''Science club activities'', ''Chess competitions'',
    ''Puzzle solving (Sudoku, escape‑room challenges)'']'
  career_goals: Felicia dreams of becoming a research scientist who can merge art and technology to communicate complex environmental ideas, perhaps designing educational video games or interactive exhibits.
    She is also fascinated by museum curation and hopes to one day work as a modern‑art curator, using her artistic skills to create engaging displays. In the short term, she aims to attend a high‑school
    STEM program, earn recognition in science fairs, and develop a portfolio of digital artwork for future college applications.
