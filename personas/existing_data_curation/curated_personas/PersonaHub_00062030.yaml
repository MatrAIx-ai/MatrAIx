persona_description: A physical therapist who specializes in the diagnosis and treatment of low back pain, particularly through the application of joint mobilization techniques and manual therapy stretching.
  This persona is highly skilled in palpating tight myofascial tissue and dysfunctional joints that are causing back pain, and is familiar with the interfaces of soft tissues of the body. This individual
  is likely to be cautious when applying theories or ideologies, and recognizes the danger of taking them too far. They are well-versed in the treatment of frozen shoulder through manual therapy stretching
  and joint mobilization.
