  hobbies: '[''sketching'', ''watercolor painting'', ''digital art on tablet'', ''reading fantasy and mythology'', ''journaling short stories'', ''listening to music (classical, Honduran folk)'', ''nature
    walks'', ''stargazing'', ''Lego building'', ''cooking traditional Honduran dishes'']'
  career_goals: Aida aspires to become a visual storyteller—an illustrator or comic artist—who blends her love of art with her Honduran cultural roots. In the short term, she aims to build a strong portfolio,
    attend community art workshops, and master basic digital illustration software. She hopes to join a summer art camp focused on multicultural art, develop a webcomic that incorporates folk motifs from
    Honduras, and later pursue a fine‑arts or illustration program in high school and college. Long‑term, she dreams of using her skills to preserve and reinterpret traditional Honduran folk art in modern
    media, perhaps working in a museum, cultural center, or animation studio.
