personas:
  professional: Aida Vallejo, an aspiring visual storyteller, merges watercolor painting with graphic tablet illustration, harnessing their curiosity for fantasy lore and mythology to craft solitary, imaginative
    scenes; their flexible, laid‑back attitude means they sometimes miss school art deadlines, but it also fuels spontaneous, experimental techniques.
  sports: Aida Vallejo enjoys low‑key fitness activities like after‑school swimming at the community pool and weekend bike rides through the local park, cheering for the city’s youth swim team and following
    the national soccer club "Metro United" as well as the Los Angeles Dodgers; their preference for solitude means they rarely join team sports, opting instead for solitary jogging while listening to ambient
    soundscapes.
  arts: Aida Vallejo is a dedicated creator who spends hours sketching fantastical creatures, painting water‑color landscapes, and experimenting with graphic apps, drawing inspiration from the works of
    Vincent van Gogh and Studio Ghibli’s My Neighbor Totoro, while their soundtrack of Ludovico Einaudi piano pieces, ambient soundscapes, and lively Punta rhythms fuels their imagination and shapes a personal
    aesthetic that blends mythic storytelling with modern digital media.
  travel: Aida Vallejo prefers nature‑focused getaways, having camped under the stars in the nearby national forest, explored the historic lighthouse town of Coral Bay, and visited the Grand Canyon during
    a family road trip; they dream of traveling to Iceland to witness the Northern Lights and trekking the ancient Inca trails of Machu Picchu, yet their limited allowance and school schedule keep most
    adventures short and budget‑friendly.
  culinary: Aida Vallejo loves helping in the kitchen, especially assembling traditional baleadas with refried beans, melted cheese, and a drizzle of sour cream, while also mastering simple fruit smoothies
    with mango, banana, and coconut milk; their palate favors fresh vegetables, sweet corn, and chocolate chip cookies, and they often experiment by adding a pinch of cinnamon to their watercolor‑inspired
    pancake art.
  core: Aida Vallejo, an 11‑year‑old dreamer, channels restless curiosity into solitary sketches and starlit stories, yet their habit of leaving art supplies everywhere and forgetting homework reveals a
    charmingly disorganized spirit.
background:
  cultural: Aida is a second‑generation Honduran‑American. Her parents emigrated from Honduras in the early 2000s, and she grew up in a bilingual household in Erlanger, Kentucky. Spanish is spoken at home,
    and family traditions such as Sunday gatherings with baleadas, storytelling in Spanish, and celebrations of Honduran holidays keep her connected to her heritage. She participates in a local community
    center's Hispanic cultural events, where she learns about traditional crafts like palm weaving and folkloric dance, which fuel her artistic inspiration. At school she navigates the American educational
    environment, while at home she absorbs the vibrant colors, rhythms, and culinary flavors of Honduran culture.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration (tablet)'', ''basic Scratch programming'', ''conversational Spanish'', ''research and information gathering'', ''creative concept
