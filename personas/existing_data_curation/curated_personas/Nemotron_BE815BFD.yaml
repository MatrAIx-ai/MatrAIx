  hobbies: '[''Softball league'', ''Community theater'', ''Hiking'', ''Cooking experiments'', ''Gardening'', ''Board game nights'', ''Local history club'', ''Family road trips'', ''DIY crafts'', ''Reading
    contemporary fiction'']'
  career_goals: Elisha aims to advance to a supervisory role within her district, eventually becoming a lead social worker or program director for a regional youth services agency. She plans to earn a Bachelor’s
    degree in Social Work and obtain her LCSW license, which will broaden her capacity to influence policy and design innovative, evidence‑based programs. Her long‑term ambition is to launch a community‑driven
    nonprofit that offers integrated family support, mental‑health services, and mentorship opportunities, leveraging technology to streamline case management and improve accessibility for underserved families
    in the Great Lakes region.
