persona_description: A social scientist with expertise in impact evaluation, particularly in using mathematical models to infer causality from interventions to outcomes or between outcomes and determinants.
  They are interested in the analysis of child deprivation and relative child poverty in the European Union, including the use of short versus long consumption modules and the measurement of consumption
  expenditure as a welfare indicator. They are also interested in the impact of severe food crises, the role of the Child Friendly Movement in enhancing the capacity of local governments and communities
  to fulfill the rights of the poorest children, and the importance of the relationship between marital splits and personal income changes in social policy.
