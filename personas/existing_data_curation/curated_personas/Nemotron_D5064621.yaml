  hobbies: '[''Visiting art museums and galleries'', ''Attending experimental theater and live music events'', ''Reading contemporary fiction, philosophy, and cultural anthropology'', ''Practicing yoga
    and mindfulness meditation'', ''Cooking and experimenting with South Asian cuisine'', ''Street photography of cultural festivals'', ''Volunteering as a mentor for community art programs'', ''Exploring
    multicultural neighborhoods and food markets'']'
  career_goals: Ana’s ambition is to progress into senior HR leadership, such as HR Director or Chief People Officer, where she can champion a culture that blends strategic people management with creative
    enrichment. Over the next five years she plans to earn SHRM‑CP/SCP certification, deepen her expertise in DEI, and lead initiatives that embed art‑based experiences—like temporary office galleries,
    creative workshops, and cultural storytelling sessions—into employee well‑being and learning programs. She envisions developing a company‑wide learning and development framework that encourages interdisciplinary
    thinking, positioning the organization as an innovative, inclusive workplace that attracts and retains top talent.
