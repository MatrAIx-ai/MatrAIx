personas:
  professional: Graham Reimer, a veteran metal fabricator and emerging boutique studio owner, leverages three decades of MIG/TIG welding, CNC machining, and lean manufacturing expertise while channeling
    their curiosity for art and disciplined organization into mentorship, safety leadership, and the creation of bespoke metal sculptures for the La Grande community.
  sports: Graham Reimer hikes the Wallowa Mountains with the local Wallowa Mountain Hiking Club, fishes the Grande Ronde River as a member of the Grande Ronde Anglers Association, and they root for the
    Portland Trail Blazers, often debating games at Rotary Club gatherings.
  arts: Graham Reimer frequents the Oregon Contemporary Art Center and regional galleries, draws inspiration from metal sculptor David Smith and abstract painter Helen Frankenthaler, crafts small metal
    art pieces in the garage, and they enjoy classic‑rock concerts headlined by The Rolling Stones and Led Zeppelin, which fuel their creative spark.
  travel: Graham Reimer has explored the Pacific Northwest’s Columbia River Gorge, spent weekends in Portland’s Pearl District, dreamed of wandering Kyoto’s historic temples and tasting Tuscan cuisine,
    and they plan a post‑retirement road trip along Route 66 to capture roadside Americana for future sculptures.
  culinary: Graham Reimer loves grilling river trout with lemon‑butter and hickory‑smoked pork ribs seasoned with rosemary and thyme, often pairing meals with fresh huckleberries in a rustic cherry‑wood
    pie, while they master the art of cooking on cedar planks and occasionally indulge in a hearty elk stew after a long hike.
  core: Graham Reimer is a disciplined, art‑curious metal fabricator who channels stress‑prone perfectionism into handcrafted sculptures, community gatherings, and a meticulous retirement plan, all while
    they hum classic rock and polish vintage motorcycles.
background:
  cultural: Graham grew up in a working‑class, white family in the high desert of eastern Oregon, with ancestral roots in German and Irish settlers who arrived in the Pacific Northwest in the early 1900s.
    The region’s values of hard work, self‑reliance, and close‑knit community have shaped his identity. He was raised in a small town where seasonal festivals, high school sports, and church gatherings
    were central to social life. The natural landscape—vast open plains, rolling hills, and the nearby Cascade foothills—instilled in him a deep appreciation for nature and outdoor recreation. While maintaining
    traditional modesty, Graham embraces the eclectic cultural influences of La Grande, from Native American art motifs to contemporary rural arts programs, which inform both his professional craft and
    his personal artistic pursuits.
