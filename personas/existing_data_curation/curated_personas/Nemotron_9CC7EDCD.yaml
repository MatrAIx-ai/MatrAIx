  career_goals: At 58, Graham aims to transition from day‑to‑day shop floor work to a supervisory and entrepreneurial role. He plans to obtain a journeyman welding certification and a small‑business management
    course to launch his own boutique metal‑art studio, creating public sculptures and custom furniture for the La Grande community. He also aspires to become a part‑time instructor at the local community
    college, sharing his technical expertise while nurturing the next generation of fabricators. Financially, he seeks to build a stable retirement fund through his studio’s sales and by securing a legacy
    of skilled apprentices who will continue his craft.
