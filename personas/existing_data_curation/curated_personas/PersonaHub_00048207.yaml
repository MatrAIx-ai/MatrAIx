persona_description: A professional tree and shrub care provider who has volunteered to perform professional pruning on an orchard at Burnside, a Moravian settlement in Bethlehem, Pennsylvania. The pruner
  is Jacob Weinerth, who owns Jacob's Professional Tree and Shrub Care in Bethlehem. The orchard has been neglected for nearly 30 years, and the trees are not the dwarf kind common in backyards and orchards,
  but rather standard apple trees that need proper pruning to encourage proper development. The orchard is considered a living history museum and is used to teach visitors what life was like in Colonial
  times.
