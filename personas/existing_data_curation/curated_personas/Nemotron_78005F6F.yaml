personas:
  professional: Iyad Dawson is a seasoned senior-care aide who blends decades of hands-on patient handling, meticulous documentation, and an eagerness to integrate assistive technologies with a pragmatic,
    skeptical eye, positioning them as an emerging mentor poised to coordinate personalized dementia-care plans.
  sports: Iyad Dawson is an avid hiker who posts weekend treks with the local Siskiyou Trail Club, follows the Oregon Ducks football team and the Portland Trail Blazers for the occasional game, and maintains
    a low-impact fitness routine of brisk walks and light wood-chopping sessions to stay limber.
  arts: Iyad Dawson is a woodworking enthusiast who studies the craft of Sam Maloof, restores classic cars with the reverence of a sculptor, reads Ken Burns documentaries on film, and relaxes to the folk
    tones of John Denver and the indie narratives of The Decemberists, letting these arts shape both their leisure and their sense of craftsmanship.
  travel: Iyad Dawson is a cautious yet curious traveler who meticulously plans scenic road trips along the Pacific Coast Highway, has explored Crater Lake, the Redwood forests of Northern California, and
    dreams of taking a summer cruise to the fjords of Norway, all while balancing limited retirement savings with the desire to share new vistas at the senior center.
  culinary: Iyad Dawson is a modest home cook who favors Pacific Northwest staples like cedar-plank salmon, wild mushroom risotto with locally foraged chanterelles, and garden-fresh roasted tomatoes, cooking
    at an intermediate skill level that blends precise technique with the occasional experimental spice dash.
  core: Iyad Dawson is a pragmatic, curious caretaker who melds hands-on craftsmanship, community service, and a quietly competitive drive into a steady, service-oriented life.
background:
  cultural: Iyad grew up in the Pacific Northwest, part of a white American family with deep roots in Oregon's small‑town communities. His upbringing emphasized self‑reliance, modesty, and a strong sense
    of community service. The region’s natural beauty and logging heritage fostered his appreciation for practical, hands‑on work and outdoor recreation, while his generation’s values of perseverance and
    personal responsibility continue to shape his approach to both career and personal life.
