  hobbies: '[''Hiking'', ''Woodworking'', ''Gardening'', ''Reading non-fiction'', ''Birdwatching'', ''Classic car restoration'', ''Community volunteering at senior center'']'
  career_goals: At 63, Iyad aims to transition into a supervisory and mentorship role within his agency, aspiring to become a senior care coordinator who designs personalized care plans for clients with
    complex needs, especially dementia. He plans to obtain a Certified Nursing Assistant (CNA) credential and a specialized certification in dementia care, with the long‑term ambition of establishing a
    small consultancy that trains home‑care aides in the Pacific Northwest on evidence‑based practices and innovative caregiving tools.
