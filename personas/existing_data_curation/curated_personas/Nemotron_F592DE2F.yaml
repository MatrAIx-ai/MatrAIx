personas:
  professional: An aspiring game modder and budding software tinkerer, William Wells leverages their competitive drive and practical curiosity to dissect multiplayer code in Python and C++, augmenting gameplay
    while also applying engineering instincts honed from building model rockets, all the while embracing a flexible, deadline‑free work style that mirrors their laid‑back attitude.
  sports: The energetic cross‑country runner and mountain‑bike enthusiast, William Wells trains with the Pocatello High Track Club in the fall, roars for the Idaho Vandals basketball squad, and spends weekends
    tackling the City Creek Loop while treating fitness more as a competitive outlet than a rigid regimen.
  arts: The sci‑fi aficionado and creative modder, William Wells devours novels by Neal Stephenson, jams to music by Imagine Dragons while crafting narrative tweaks, and draws inspiration from video‑game
    composer Jeremy Soule for their own game mods.
  travel: An impromptu explorer, William Wells has hiked the Teton Range, road‑tripped to Yellowstone National Park with friends, and dreams of jetting off to Akihabara in Tokyo to soak up cutting‑edge
    gaming culture, preferring spur‑of‑the‑moment plans over meticulously booked itineraries.
  culinary: The snack‑savvy teen, William Wells favors pepperoni pizza, spicy chicken tacos, and carbonara pasta, can whip up a decent instant ramen bowl with fresh veggies, yet frequently skips breakfast
    and relies on energy drinks to sustain late‑night gaming marathons.
  core: William Wells blends a fierce competitive streak with a relaxed, sometimes chaotic, love of tinkering—whether modding games, launching rockets, or hitting bike trails—while often neglecting to plan
    ahead.
background:
  cultural: William is a white teenager raised in Pocatulo, Idaho, a small city that blends a frontier, self‑reliant ethos with a close‑knit community vibe. The local culture values outdoor recreation,
    high‑school sports, and practical skills, while also offering pockets of tech interest through school clubs and community maker spaces. His family likely embodies middle‑class, work‑oriented values
    that emphasize independence, pragmatism, and a modest exposure to broader cultural trends via the internet. This environment nurtures his curiosity for new ideas alongside a preference for tangible,
    useful outcomes.
