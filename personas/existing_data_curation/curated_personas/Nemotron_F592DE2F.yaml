  career_goals: William aims to blend his love of technology with his practical skill set. He envisions becoming a self‑taught software developer who creates indie video games, leveraging his strategic
    gaming experience and coding basics. Simultaneously, he is keeping the option open to pursue a trade like automotive or bike mechanics, valuing a hands‑on career that offers immediate utility. In the
    longer term, he hopes to launch a small business that combines tech (e.g., custom gaming rigs or drone kits) with community workshops, allowing him to stay flexible and independent.
