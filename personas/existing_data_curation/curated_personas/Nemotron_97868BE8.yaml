personas:
  professional: Antonieta Lemon is a licensed electrician with over twenty years of hands‑on experience, and they are renowned for their methodical, safety‑first approach, adept at reading blueprints, supervising
    apprentices, and integrating solar‑PV systems into tribal infrastructure, a blend of curiosity and practicality that drives their pursuit of a master electrician designation and future contractor’s
    license.
  sports: Antonieta Lemon channels their competitive energy into weekend boxing classes at the Black Hills Boxing Club, hikes the rugged trails of the Black Hills during summer, roars for the Denver Broncos
    in football season, and supports the South Dakota State Jackrabbits during college basketball, maintaining a disciplined personal fitness regimen.
  arts: Antonieta Lemon enriches their weekends with powwow drumming circles that echo the rhythms of R. Carlos Nakai, crafts intricate beadwork inspired by the custom of traditional tribal artistry, and
    finds creative balance by listening to folk‑rock singer Joni Morris while reading biographies of innovators like Elon Musk.
  travel: Antonieta Lemon prefers purposeful travel that blends adventure with learning; they have trekked the geothermal fields of Iceland to study renewable energy, explored the ancient ruins of Machu
    Picchu, and are planning a future road trip through the Southwest to visit solar farms in Arizona, always budgeting carefully and favoring modest inns that support local communities.
  culinary: Antonieta Lemon enjoys hearty, farm‑to‑table meals, often cooking grilled salmon with wild rice, roasted heirloom carrots, and a splash of lemon zest, while their garden plot yields fresh herbs
    that they use in a signature cactus‑flower salsa, reflecting their practical yet creative kitchen style.
  core: Antonieta Lemon is a disciplined, community‑driven electrician who balances a competitive spirit, curiosity, and a knack for turning sustainable ideas into tangible projects, even if they sometimes
    overcommit to volunteer work at the expense of personal downtime.
background:
  cultural: Antonieta is a member of the Sicangu Lakota (Rosebud Sioux Tribe) and grew up immersed in the reservation's cultural traditions, including Lakota language, ceremony, and communal stewardship
    of the land. Her family places high value on resilience, respect for nature, and intergenerational knowledge-sharing. While modernizing her professional life as an electrician, she remains deeply connected
    to tribal identity, regularly participating in seasonal powwows, offering her skills to improve reservation infrastructure, and mentoring tribal youth who wish to pursue skilled trades.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installation'', ''Circuit troubleshooting'', ''Blueprint and schematic interpretation'', ''National Electrical Code compliance'', ''Project planning
    and scheduling'', ''Team leadership and mentorship'', ''OSHA safety training'', ''Solar photovoltaic system installation'', ''Customer communication'']'
  hobbies: '[''Powwow drumming'', ''Hiking'', ''STEM outreach volunteering'', ''Community gardening'', ''Beadwork crafting'', ''Boxing'', ''Reading about clean-energy tech'', ''DIY home-renovation'']'
  career_goals: Antonieta aims to earn her master electrician designation within the next two years and secure a contractor's license so she can launch her own electrical firm focused on sustainable, solar-powered
    solutions for homes and tribal facilities. She is passionate about improving infrastructure on the Rosebud Reservation, and she aspires to mentor a new generation of American Indian apprentices, especially
    women, to expand representation in the trades. Long-term, she envisions her business becoming a training hub that integrates traditional tribal values with modern technical expertise.
