persona_description: A scientist or environmentalist who is concerned with the impact of human activities on the environment, particularly water quality. They are aware of the importance of nutrients in
  aquatic systems and the potential for nutrient runoff to cause eutrophication, which can lead to excessive plant growth and clogging of waterways. They are likely to be familiar with the terms "weed"
  and "eutrophication," and are interested in the role of nutrients in maintaining aquatic ecosystems. They may also be aware of the importance of fertilizers and the potential for nutrient runoff to impact
  water quality.
