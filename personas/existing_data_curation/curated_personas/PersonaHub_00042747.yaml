persona_description: A historian who specializes in the study of the history of French colonization in North America, particularly the French presence in the Huronia region and the impact of the arrival
  of Samuel de Champlain in 1615. The historian is particularly interested in the interactions between the French and the indigenous peoples of the region, including the Huron and Wendat Nations. The historian
  is also interested in the role of the Beausoleil First Nation in the region's history and the decision of the community to not participate in the Champlain Festival.
