  hobbies: '[''Reading historical fiction'', ''Journaling'', ''Knitting scarves and blankets'', ''Herb gardening'', ''Cooking traditional soul food dishes'', ''Listening to gospel and jazz music'', ''Watching
    documentaries on African American history'', ''Volunteer work at local church'']'
  career_goals: Janel aims to obtain her GED within the next year, viewing it as a stepping stone toward a certification as a Home Health Aide, which would allow her to work part‑time while maintaining
    the routine she values. In parallel, she hopes to develop a modest home‑based catering service focused on soulful, comfort meals for small gatherings and church events, leveraging her cooking expertise.
    Long‑term, she wants to achieve greater financial independence for her family, build a steady supplemental income, and perhaps mentor other women in her community who face similar educational barriers.
