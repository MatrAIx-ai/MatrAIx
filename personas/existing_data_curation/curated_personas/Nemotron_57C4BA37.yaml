personas:
  professional: Janel Harrington is a resourceful home‑health aide aspirant who leverages her meticulous budgeting, meal planning, and textile skills to run a small home‑based catering business for church
    gatherings, balancing part‑time care work with her love for routine and quiet productivity while pursuing her GED and future certification.
  sports: Janel Harrington enjoys early‑morning walks along the Phoenix canal trail, participates in a community walking club each Saturday, follows the Phoenix Suns during the NBA season, and occasionally
    joins casual basketball games at the local recreation center, preferring low‑impact, routine‑friendly fitness activities over crowded gyms.
  arts: Janel Harrington finds comfort in listening to gospel choirs like the Mississippi Mass Choir and smooth jazz legends such as Charles Mingus, regularly reads historical fiction and biographies of
    notable figures, attends quarterly community theater productions, and lets the music and stories reinforce her sense of purpose and quiet reflection.
  travel: Janel Harrington plans modest getaways focused on cultural immersion and family bonding, favoring road trips to Sedona’s red rocks and the Grand Canyon, an annual pilgrimage to New Orleans for
    its music and cuisine, and dreaming of a heritage tour to Ghana, all while meticulously budgeting for flights, accommodations, and travel expenses.
  culinary: Janel Harrington expertly blends soul‑food traditions—collard greens, cornbread, and seasoned smoked turkey—with fresh herbs from her garden, creating healthier twists for her home‑catering
    service; her cooking skill is advanced, she enjoys rosemary‑infused marinades, and she keeps every recipe organized in a handwritten ledger.
  core: Janel Harrington is a routine‑driven, quietly ambitious home‑care and catering enthusiast who balances meticulous budgeting, soulful cooking, and solitary creativity while nurturing her community
    ties.
background:
  cultural: Janel is an African‑American woman raised in Phoenix, deeply rooted in the cultural traditions of the Black community. Her family’s heritage traces back to the Great Migration, and she grew
    up immersed in the church’s central role in community life, which shaped her values of resilience, mutual support, and spiritual practice. Culinary traditions from the South—such as collard greens,
    cornbread, and seasoned meats—are central to her identity and daily routines. She participates in local Juneteenth celebrations and other cultural gatherings, valuing the sense of belonging and collective
    memory they foster. This cultural backdrop influences her emphasis on family cohesion, practical stewardship of resources, and a commitment to uplifting others through modest acts of service.
attributes:
  skills: '[''Household budgeting'', ''Meal planning and preparation'', ''Basic cooking (soul food and healthy meals)'', ''Home organization and decluttering'', ''Basic automotive checks (oil, tire pressure)'',
