  career_goals: Terry aspires to transition from field sales to a regional sales leadership role, where he can mentor younger reps and shape strategic service expansions across the mountain counties. He
    aims to spearhead a pilot program that integrates emerging broadband technologies into underserved communities, combining his competitive drive with his curiosity for novelty. Ultimately, he hopes to
    leave a legacy of improved connectivity for his hometown while earning recognition as a top‑performing leader within his company.
