  hobbies: '[''Volleyball'', ''Yoga'', ''Debate Club'', ''Community Tutoring'', ''Hiking'', ''Cooking'', ''Mystery Novels'']'
  career_goals: Nancy aims to complete her bachelor’s degree in Business Administration within the next two years, leveraging her current supervisory role to transition into an office manager position at
    a larger organization or academic institution. She plans to obtain a Certified Administrative Professional (CAP) credential and eventually pursue a project management certification (PMP) to qualify
    for senior operations or project‑lead roles. Long‑term, she envisions leading a department that integrates technology and workflow optimization, possibly contributing to a consultancy focused on office
    efficiency.
