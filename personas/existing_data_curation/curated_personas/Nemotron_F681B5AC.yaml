  hobbies: '[''building block towers'', ''dancing to salsa music'', ''group storytime'', ''playground tag and slide races'', ''pretend cooking'', ''drawing with crayons'']'
  career_goals: 'At three years old, Eduardo’s ambitions are expressed through imaginative play: he often declares he wants to be a firefighter who rescues people, a soccer player who scores the winning
    goal, or a chef who makes tasty Cuban dishes. These aspirations reflect his energetic, competitive nature and his desire to help others, combining his curiosity about how things work with a practical
    wish to see tangible results.'
