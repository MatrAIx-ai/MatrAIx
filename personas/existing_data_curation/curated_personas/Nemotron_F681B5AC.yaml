personas:
  professional: Eduardo Alom is a curious toddler who loves building towers with blocks, demonstrating early organizational skills and a practical approach to trial-and-error play while often trying to
    outdo peers in speed and height.
  sports: Eduardo Alom thrives in the Bright Beginnings Toddlers Soccer Club, where they sprint after the ball with boundless energy and cheer for the local professional team Harbor City FC whenever a match
    airs on family night, displaying a competitive edge that often turns cooperative games into friendly contests.
  arts: Eduardo Alom delights in drawing colorful pictures of dinosaurs while singing The Wiggles' Hot Potato and watching Sesame Street, a blend of visual and musical arts that shapes their daily play
    and fuels their outgoing, sociable spirit.
  travel: Eduardo Alom loves family road trips to the nearby zoo and the seaside boardwalk, preferring packed snack boxes and window seats where they can point out passing cows, yet sometimes gets clingy
    during airport security turns, making travel a mix of excitement and cautious dependency.
  culinary: Eduardo Alom favors mac and cheese with a sprinkle of cheddar, bites into banana slices, and occasionally helps stir batter for blueberry muffins, but they have a quirky habit of smearing ketchup
    on everything, even on fruit.
  core: Eduardo Alom is an energetic, curious three‑year‑old whose competitive spirit drives playful learning, from block building to piggy‑bank negotiations, while their occasional skepticism and love
    for messy creativity keep life delightfully unpredictable.
background:
  cultural: Eduardo grows up in a bilingual Cuban household in Miami-Dade County, where Spanish is spoken daily alongside English. His family celebrates Cuban traditions such as listening to classic salsa
    and son recordings, preparing foods like empanadas, plantain chips, and arroz con pollo, and observing cultural holidays like Carnaval de la Habana. The vibrant multicultural environment of Miami adds
    exposure to diverse friends and community events, reinforcing both his Cuban heritage and his broader American upbringing.
