  hobbies: '["Gardening","Watercolor painting","Reading historical fiction","Quilting","Walking by the river","Church choir volunteering","Attending local craft fairs","Mindfulness/meditation","Listening
    to gospel and jazz music"]'
  career_goals: Stephanie aims to obtain a contractor’s license within the next two years so she can expand her services into historic home restoration—a niche that leverages her appreciation for Virginia’s
    architectural heritage. She envisions starting a small, family‑run painting business that hires and mentors apprentices, especially women of color, to increase diversity in the trades. She also hopes
    to become a certified green painter, using sustainable materials to appeal to environmentally conscious homeowners. Long‑term, she seeks a stable retirement income through a mix of project work and
    consulting, while deliberately delegating tasks and setting boundaries to reduce work‑related anxiety and maintain emotional well‑being.
