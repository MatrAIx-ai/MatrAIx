personas:
  professional: Alyssa Hill is a veteran residential housekeeper whose five‑decade mastery of deep‑cleaning, stain removal, and low‑chemical green cleaning techniques fuels her drive to earn a green‑clean
    certification and launch a part‑time consulting service for senior households, while she mentors local junior cleaners through hands‑on workshops.
  sports: Alyssa Hill is an avid supporter of the North Dakota State Bison football team and the Fargo‑Moorhead RedHawks baseball club, joins the local senior walking group for weekly prairie trail hikes,
    and enjoys casual birdwatching contests that blend her love of nature with friendly competition.
  arts: Alyssa Hill is a watercolor painter inspired by the prairie vistas of John Constable and the soft hues of Claude Monet, a quilt enthusiast who experiments with Bauhaus‑style patchwork, and a devoted
    listener of Johann Sebastian Bach’s Brandenburg Concertos, Bob Dylan’s folk ballads, and the local fiddlers at community socials.
  travel: Alyssa Hill is a modest traveler who has toured the Badlands and Yellowstone National Parks, spent a nostalgic weekend at her hometown’s harvest festival in South Dakota, and dreams of visiting
    the historic villages of Brienz in Switzerland and the lavender fields of Provence, often planning trips around her grandchildren’s school vacations.
  culinary: Alyssa Hill is a competent home cook who favors hearty prairie stew with wild rice, fresh carrot‑beet salad dressed with locally sourced apple cider vinaigrette, and a classic baked apple pie
    spiced with cinnamon, while she occasionally experiments with foraged prairie herbs like sagebrush in her dishes.
  core: Alyssa Hill is a curious, art‑loving senior who blends meticulous green cleaning expertise with a competitive streak, a relaxed approach to planning, and a quietly stubborn skepticism that colors
    her everyday choices.
background:
  cultural: Alyssa was born and raised in a modest, farming family in the plains of North Dakota, descending from German-Scandinavian settlers who arrived in the early 1900s. Her upbringing was shaped by
    a close-knit rural community and a Lutheran church that emphasized hard work, modesty, and mutual aid. The cultural rhythms of harvest festivals, community potlucks, and church socials instilled in
    her a respect for tradition while her natural curiosity led her to explore art, literature, and new ideas beyond the local scene. This blend of Midwestern pragmatism and an appreciation for creative
    expression informs her worldview and daily life.
attributes:
  skills: '[''Residential deep cleaning'', ''Stain removal and fabric care'', ''Eco-friendly cleaning product knowledge'', ''Basic home maintenance (plumbing, light fixtures)'', ''Floor care and polishing'',
