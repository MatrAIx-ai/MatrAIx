personas:
  professional: A budding community organizer, Anastasia Smith capitalizes on their energetic sociability to coordinate youth sports clinics and craft workshops at the West Valley Youth Center, while their
    competitive streak drives them to seek leadership roles, even as they sometimes struggle with staying organized and meeting deadlines.
  sports: A passionate after‑school soccer player, Anastasia Smith joins the West Valley Panthers youth league for Saturday matches, runs drills with the local dance team for flexibility, and idolizes the
    Los Angeles FC and the WNBA’s Los Angeles Sparks, often mimicking their moves in park pick‑up games.
  arts: A creative TikTok content maker, Anastasia Smith blends choreography to tracks by Drake and SZA with comedic sketches, sketches comic‑style characters inspired by Marvel’s Spider‑Man and the manga
    series My Hero Academia, and spends weekends drawing in a notebook while listening to contemporary R&B legends like H.E.R. and Anderson .Paak.
  travel: A budding explorer, Anastasia Smith loves weekend trips to the nearby Sierra Nevada for hiking, has a travel journal filled with plans to visit Tokyo’s Akihabara district for anime culture, and
    prefers a mix of spontaneous park picnics and well‑planned family road trips to the Grand Canyon, balancing a love for adventure with parental budget constraints.
  culinary: A self‑taught snack chef, Anastasia Smith frequently makes avocado toast topped with chili flakes and a dash of soy sauce, enjoys homemade tacos with seasoned ground beef and fresh cilantro,
    and delights in experimenting with bubble tea kits, though they often forget to clean the kitchen promptly after cooking.
  core: Anastasia Smith is a hyper‑social, competitively driven twelve‑year‑old who channels restless energy into soccer, dance, and TikTok, balances practical saving habits with occasional splurges on
    trendy accessories, and habitually leaves sock piles on the floor despite their drive for structure.
background:
  cultural: Anastasia is a second-generation African-American growing up in West Valley City, Utah, a city known for its cultural mosaic. Her family celebrates classic Black traditions—such as Juneteenth
    gatherings, soul food cooking weekends, and church choirs—while also participating in community events like the Utah State Fair and local park festivals. The neighborhood’s diverse population, including
    many Hispanic and Pacific Islander families, has exposed her to a blend of languages, foods, and music, shaping a multicultural outlook. Her parents emphasize resilience, education, and community service,
    encouraging her to excel academically while staying connected to her roots through music, dance, and mentorship programs aimed at empowering Black youth in the region.
