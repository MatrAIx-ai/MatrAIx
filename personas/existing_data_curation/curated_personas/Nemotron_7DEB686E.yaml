  career_goals: Anastasia dreams of earning a soccer scholarship to a university, where she can combine her love of the sport with a degree in sports medicine. In the long term, she aims to play professionally
    in the National Women's Soccer League and later become a sports therapist who mentors young athletes from under-represented neighborhoods, using her competitive drive and community spirit to inspire
    the next generation.
