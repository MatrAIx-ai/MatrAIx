persona_description: A historian and professor who has written extensively on American history and culture, particularly focusing on the early British settlers and the development of American culture. He
  has won the Pulitzer Prize for History and is known for his ability to start with a question and use storytelling as a tool to answer historical questions. His work on comparative histories of New Zealand
  and the United States and his research on African American culture to the countries of origin of their ancestors has made him a respected scholar in his field. He is also known for his close bonds with
  his students and for his contributions to the Pivotal Moments in American History series.
