  career_goals: Although she is not currently employed, Shannon aims to channel her experience into a series of personal and community‑focused projects. She plans to obtain a certificate in museum studies
    through a local community college to deepen her understanding of art curation, launch a monthly seniors‑focused art workshop at the Lindenhurst community center, and compile a self‑published memoir
    that weaves together her family’s genealogical story with the history of her hometown. Additionally, she hopes to mentor emerging volunteers in event coordination and continue developing her own photography
    portfolio for potential exhibition at a regional gallery.
