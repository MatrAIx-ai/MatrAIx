  career_goals: Edwin aims to complete his associate degree in business administration within the next year and transition into a full‑time role in community outreach or small‑business management. Leveraging
    his organizational strengths and bilingual abilities, he hopes to work for a local nonprofit that supports Cuban‑American families, eventually progressing to a program manager position. In the longer
    term, he dreams of launching his own culturally infused café that doubles as a community hub, blending his passion for food, entrepreneurship, and service.
