  career_goals: Juan aims to build a career centered on helping his community in a tangible, hands‑on way. His short‑term goal is to enroll in a local community college and pursue an associate degree in
    public health or health sciences while obtaining a Certified Nursing Assistant (CNA) credential. He plans to volunteer at the Montebello health clinic to gain practical experience and eventually become
    a Certified Community Health Worker (CHW) focused on serving Mexican‑American families. In the longer term, Juan hopes to take on a leadership role in a public‑health organization, designing culturally
    relevant nutrition and wellness programs that blend his culinary heritage with evidence‑based health education. He also envisions earning a bachelor's degree in public health to broaden his impact and
    possibly become a health educator or program coordinator.
