personas:
  professional: Alisha Miller, a retired community organizer turned senior‑center wellness champion, blends her practical meal‑planning, event‑coordination, and basic first‑aid expertise with a curious,
    sociable spirit to launch technology‑based health‑tracking workshops for local seniors.
  sports: Alisha Miller enjoys senior‑center dance nights, participates in the weekly Mississippi River Stroll walking club, and follows the St. Louis Cardinals baseball team, cheering with fellow gardeners
    during games.
  arts: Alisha Miller’s evenings blend quilting circles inspired by modern quilt artist Jenny Doan, mystery reads from Agatha Christie, historical biographies by David McCullough, and soulful singing in
    the church choir, shaping a creative identity that balances tradition with new ideas.
  travel: Alisha Miller favors low‑impact travel, taking day trips to historic river towns like Hannibal and weekend retreats in the Ozarks, while dreaming of a genealogy pilgrimage to her ancestors’ village
    in Bavaria, Germany.
  culinary: Alisha Miller loves preparing hearty chicken pot pie, heirloom tomato bruschetta with fresh basil, and split‑pea soup seasoned with thyme and rosemary, often using garden harvests, though they
    sometimes over‑season dishes in their excitement.
  core: Alisha Miller is a community‑driven, curiosity‑fueled caretaker whose boundless sociable energy is tempered by a lingering worry that keeps them meticulously organized yet occasionally overcommitted.
background:
  cultural: Alisha grew up in a small Midwestern town in Missouri during the post‑war era, steeped in the values of hard work, self‑reliance, and community solidarity. As a white American from a rural background,
    she was raised in a Protestant (Methodist) household that emphasized service, modesty, and hospitality. These cultural roots have shaped her strong sense of local identity, her commitment to neighborly
    support, and her love of traditional Midwestern customs such as potluck gatherings, church socials, and seasonal festivals. Her upbringing combined a respect for established customs with an openness
    to new ideas, a balance that continues to guide her interactions and contributions in Scott City.
