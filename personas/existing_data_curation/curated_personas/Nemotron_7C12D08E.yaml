  career_goals: Although retired from formal employment, Alisha is driven to remain an active contributor to her community. Her main ambitions are to expand the senior‑center’s wellness program by integrating
    technology‑based health tracking, to complete a written memoir that weaves together her family’s history and local Missouri folklore, and to mentor younger volunteers in event planning and compassionate
    caregiving. She also hopes to become a certified senior‑health ambassador, allowing her to advocate for accessible mental‑health resources and emergency preparedness in Cape Girardeau County.
