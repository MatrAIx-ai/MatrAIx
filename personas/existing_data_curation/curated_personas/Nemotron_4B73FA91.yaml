  career_goals: Although she is only six, Martha already imagines future roles that blend curiosity with practicality. She dreams of becoming a scientist or engineer who can invent solutions for everyday
    problems, often saying she wants to build rockets or make machines that help animals. She also enjoys the idea of teaching younger children, reflecting a desire to share knowledge and maintain order.
    Her competitive nature pushes her toward careers where she can solve challenges and be recognized, such as a wildlife biologist competing in field research or an astronaut who explores new frontiers.
    These ambitions are nurtured by her love of new ideas and her appreciation for proven methods.
