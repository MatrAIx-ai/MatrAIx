personas:
  professional: Martha Beres, a budding naturalist explorer, applies keen observation skills by cataloguing pine cones, rocks, and leaves and sketching wildlife, balancing her curiosity with a practical
    habit of recording each find in a notebook.
  sports: Martha Beres, a spirited participant in the Hillman Youth Soccer Club and enthusiastic fan of the Pittsburgh Steelers, practices organized soccer drills after school, competes fiercely in friendly
    tag matches, and thrills in winter sledding down the local hill while building tactical snow forts.
  arts: Martha Beres, an imaginative LEGO architect and picture‑book lover, recreates scenes from Eric Carle’s illustrations, draws animals from Dr. Seuss books, and sings along to The Wiggles while perfecting
    each LEGO diorama, channeling a competitive streak into flawless constructions.
  travel: Martha Beres, a miniature explorer, spends family weekends hiking the nearby Hillman woods and lakeshore, dreams of visiting Yellowstone National Park’s geysers and the Great Lakes shoreline,
    and prefers trips with a clear itinerary that leaves room for nature scavenger hunts while staying within a modest family budget.
  culinary: Martha Beres, a selective eater with a growing palate, delights in apple slices with peanut butter, loves homemade mac and cheese with extra cheese, and enjoys assembling carrot‑stick kebabs
    with hummus, yet often refuses vegetables unless they’re presented in a fun, colorful arrangement.
  core: Martha Beres is a curious, competitive six‑year‑old who balances exploration of nature with organized play, thrives on puzzles and quiet reading, yet safeguards their allowance and questions others’
    motives with a skeptical eye.
background:
  cultural: Martha is raised in a white, Midwestern family in Hillman, Michigan, a small rural community in Alpena County. Her ancestry includes German and Polish roots typical of many families who settled
    in the Upper Peninsula generations ago. The local culture emphasizes self-reliance, close family bonds, and a deep respect for the surrounding forests, lakes, and seasonal weather. Community life revolves
    around school events, the county fair, church gatherings, and outdoor activities like fishing, hunting, and snow sports. These influences foster a practical mindset, a love for the outdoors, and a modest,
    community-oriented outlook, all of which shape Martha’s balanced curiosity and competitive spirit.
