  hobbies: '[''Photography'', ''Hiking'', ''Watercolor painting'', ''Classical music listening'', ''Reading mystery novels'', ''Community volunteering'', ''Gardening'', ''Cooking'', ''Attending art fairs'']'
  career_goals: Ryanne aims to translate his passions into a sustained community role. He plans to complete an associate’s degree in Fine Arts or Social Services to formalize his knowledge, and to secure
    a volunteer‑coordinator position with a local arts nonprofit. His long‑term ambition is to design and lead a weekly art‑and‑nature workshop series for seniors and young adults in Lake County, integrating
    photography, painting, and horticulture. He also hopes to mentor at‑risk youth through creative‑expression programs, using his empathy and facilitation skills to foster resilience and social connection.
