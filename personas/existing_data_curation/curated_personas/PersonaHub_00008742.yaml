persona_description: A financial advocate who is interested in exploring the current challenges and opportunities for low- and moderate-income consumers in the banking environment. This person may be a
  consumer advocate, a financial planner, or a policy analyst who is concerned about the lack of access to affordable financial services and tools for those without a bank account or who are dissatisfied
  with their existing options. This person is likely to be familiar with the issue of prepaid debit cards and their potential as a substitute for traditional banking services. This person may be interested
  in exploring the potential for expanding financial access through better relationships with employers, city-led outreach programs, and leveraging or expanding existing "public options" in banking, such
  as prepaid debit cards. This person may be interested in exploring the potential for using technology to improve access to banking services and tools, and may be interested in exploring the potential
  for using technology to improve access to banking services and tools.
