  career_goals: In the short term, Chun aims to be promoted to department manager within the next two years, using his organizational skills to improve store efficiency and sales performance. He plans to
    enroll in a business management program to complement his practical experience. Long‑term, Chun envisions a career in retail strategy or brand development, possibly pursuing an MBA and joining a corporate
    merchandising team. He also harbors an entrepreneurial ambition to launch a lifestyle boutique that blends contemporary design with subtle East Asian aesthetic influences, reflecting both his curiosity
    for new ideas and his practical business mindset.
