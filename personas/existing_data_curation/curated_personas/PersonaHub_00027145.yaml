persona_description: A Fisheries Manager who is responsible for implementing a new fishery management program and ensuring its sustainability. This person is highly knowledgeable about the complex processes
  involved in managing fish populations, including the use of scientific data, monitoring, enforcement, and decision-making. They are skilled in setting up administrative systems, identifying strengths
  and gaps in existing management infrastructure, and using tools and resources to attract private capital for sustainable fisheries. They are also adept at managing data collection and analysis, and ensuring
  timely implementation of effective fishery monitoring programs that incorporate electronic monitoring and reporting tools.
