personas:
  professional: Darrica Jones, a retired genealogist‑artist who channels their lifelong archival expertise and vivid imagination into curating a community art exhibition and writing a memoir that weaves
    speculative fiction with their family’s civil‑rights stories, while their spontaneous planning style sometimes collides with the library’s strict deadlines.
  sports: Darrica Jones, an avid walker who joins the Douglasville Senior Hiking Club for weekly nature trail outings, follows the Atlanta Falcons and Atlanta Braves on game days, and keeps mentally sharp
    through weekly chess tournaments at the local senior center, while they favor low‑impact cardio over high‑intensity sports.
  arts: Darrica Jones, a mixed‑media painter who draws inspiration from the improvisational jazz of Miles Davis, the soulful blues of Bessie Smith, and the lyrical poetry of Langston Hughes, regularly attends
    local gallery openings and community storytelling circles where they share original verse and visual narratives.
  travel: Darrica Jones, a reflective traveler who prefers curated road trips to historic Southern towns like Savannah, Asheville, and New Orleans, enjoys leisurely explorations of local archives and museums,
    and dreams of a heritage pilgrimage to Ghana’s Cape Coast while they budget trips through senior discount programs.
  culinary: Darrica Jones, a confident home‑cook who delights in preparing herb‑infused tea blends featuring chamomile, lavender, and lemon verbena, whips up seasonal dishes like roasted beet and goat cheese
    salad, slow‑cooked butternut squash risotto, and occasional shrimp and grits, while they experiment with flavor pairings reminiscent of jazz improvisation.
  core: Darrica Jones, a competitive yet solitary storyteller who channels relentless curiosity into daily mixed‑media art, spontaneous workshop planning, and a disciplined yet occasionally impulsive approach
    to finances and health, and they often balance their drive with quiet reflection.
background:
  cultural: Darrica grew up in the Deep South during the civil‑rights era, shaped by the traditions of the African‑American church, the oral‑storytelling legacy of her grandparents, and the rich culinary
    and musical heritage of Southern Black culture. Her family’s involvement in church choirs and community gatherings fostered a deep respect for collective resilience and the preservation of history.
    She carries forward Southern African‑American customs—soul‑food recipes, gospel music, Juneteenth celebrations, and a strong sense of family lineage—while also embracing contemporary Black artistic
    movements such as Afrofuturism.
