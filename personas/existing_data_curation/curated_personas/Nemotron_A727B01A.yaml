  career_goals: Although retired, Darrica aims to leave a lasting cultural imprint in her community. She plans to curate a personal art exhibition at the Douglasville public library, publish a memoir that
    intertwines her family’s civil‑rights stories with speculative fiction, and launch a weekly intergenerational storytelling workshop for younger residents. She also hopes to win the county’s senior art
    competition, reflecting her competitive drive.
