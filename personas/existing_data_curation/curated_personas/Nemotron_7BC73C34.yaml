  career_goals: Though only a year old, Gary already shows budding ambitions. He delights in watching fire trucks on Saturday morning cartoons and often exclaims, 'firetruck!' indicating a nascent desire
    to become a firefighter. He aims to master walking without assistance, to speak more clearly, and to explore the backyard under his parents' watchful eye. His curiosity drives him to want to discover
    new toys and outdoor insects, yet his need for routine leads him to set modest, achievable goals such as mastering a new word each week.
