  career_goals: As he approaches the final years of his career, Jonathan aims to transition from daily site supervision to a senior advisory role where he can shape safety culture and sustainable building
    practices across multiple contractors in the region. He hopes to establish a mentorship program for younger supervisors, sharing his practical knowledge and encouraging curiosity about new construction
    methods. Additionally, he is interested in partnering with local artists and the municipal planning department to incorporate public‑art installations into new developments, blending his love of art
    with his construction expertise. Ultimately, he envisions a gradual move toward consulting and community‑development projects that leave a lasting, positive imprint on Blair and surrounding towns.
