personas:
  professional: Jonathan Mulvihill, a seasoned construction supervisor with three decades overseeing Great Plains projects, leverages deep blueprint expertise, Procore-driven budgeting, and a knack for
    motivating crews while infusing safety culture and community‑oriented design, and they bring a pragmatic yet curious mindset that embraces new modular technologies and public‑art collaborations.
  sports: Jonathan Mulvihill, an avid member of the Blair Fishing Club who spends weekends angling for walleye on the nearby lakes, stays fit through daily prairie walks and occasional senior‑center yoga,
    roots for the Nebraska Cornhuskers football team and the Kansas City Royals baseball club, and they treat each fishing outing as both social gathering and low‑impact exercise session.
  arts: Jonathan Mulvihill, a dedicated board member of Blair’s community theater who designs and builds sets while also capturing prairie sunsets on film, finds inspiration in the regional realism of Grant
    Wood, the expansive compositions of Ansel Adams, and the folk storytelling of John Prine, and they regularly attend local art shows and volunteer as a docent at the historical museum.
  travel: Jonathan Mulvihill, who prefers road‑trip itineraries that blend scenic drives with historic stops, has explored the Badlands and Yellowstone National Parks, enjoyed a weekend in Chicago’s Art
    Institute and downtown theater scene, and they keep a wish list that includes a pilgrimage to the historic castles of Bavaria and a cultural tour of Dublin’s literary pubs.
  culinary: Jonathan Mulvihill, an amateur wood‑fire chef who routinely crafts hearty Midwest meals such as pork shoulder braised with apples, bratwurst with sauerkraut, and pan‑seared trout drizzled with
    lemon‑butter, delights in baking cornbread and apple crumble, and they favor fresh, locally sourced corn, honey, and wild mushrooms for their seasonal dinner tables.
  core: Jonathan Mulvihill, a community‑focused construction veteran who balances pragmatic safety leadership with a quiet obsession for prairie photography, a tendency to haggle over every hardware purchase,
    and a habit of humming old folk tunes while sketching set designs, embodies a curious, steady spirit that never shies away from a new challenge.
background:
  cultural: Jonathan grew up in Blair, Nebraska, in a family with deep Midwestern roots that trace back to German and Irish immigrants who settled the region in the early 20th century. The community’s values
    of hard work, self‑reliance, and neighborly cooperation shaped his outlook. He was raised in a Lutheran household, attending church regularly and participating in parish service projects. The small‑town
    culture, with its emphasis on local traditions, community events, and a strong connection to the land, has influenced his modest, pragmatic approach to life while nurturing his curiosity about broader
    artistic and cultural expressions.
