personas:
  professional: Carlos Jose, a 16‑year‑old aspiring concept artist and UI/UX designer-in‑training, blends a disciplined bullet‑journal workflow with a vivid imagination to craft sci‑fi‑fantasy visuals that
    weave traditional folk paper‑craft motifs into digital concept art for future indie game studios.
  sports: Carlos Jose, a fan of FC Barcelona and an occasional participant in pickup soccer games at the neighborhood park on Saturdays, channels their organized nature into tracking every match statistic
    in a personal spreadsheet while preferring solo skateboarding sessions to large team sports.
  arts: Carlos Jose immerses themselves in the worlds of Hayao Miyazaki, John William Waterhouse, and Hideo Kojima, spends weekends sketching character studies inspired by Miyazaki’s Princess Mononoke,
    practices calligraphy while listening to Björk’s Biophilia, and curates a Pinterest board of folk paper‑craft patterns mixed with cyberpunk aesthetics.
  travel: Carlos Jose dreams of solo backpacking trips to the Ghibli Museum in Mitaka, Kyoto’s bamboo groves, and the rugged landscapes of New Zealand’s South Island, while also ticking off a family road‑trip
    to the Grand Canyon where they could sketch sunrise vistas for their next concept portfolio.
  culinary: Carlos Jose’s palate alternates between crafting spicy corn tacos with cilantro‑lime salsa and savoring a steaming bowl of Vietnamese pho flavored with star anise, while they experiment with
    baking matcha‑green tea macarons that combine their love for bold flavors and meticulous presentation.
  core: Carlos Jose, a 16‑year‑old imagination‑driven introvert, channels obsessive organization, solitary creativity, and a penchant for novelty into art, coding, and meticulously planned life‑hobbies,
    though occasional procrastination over gaming marathons and a sweet‑tooth habit keep them grounded.
background:
  cultural: Carlos grows up in a bilingual Mexican‑American household in Palmdale, California. At home, Spanish is spoken alongside English, and family gatherings often feature traditional dishes like tamales
    and pozole, as well as celebrations of Día de los Muertos and Mexican Independence Day. His parents, who immigrated from Jalisco, emphasize the values of family solidarity, respect for elders, and pride
    in cultural heritage. These influences appear in his artwork, where he incorporates motifs such as sugar‑skull patterns, vibrant color palettes, and desert landscapes reminiscent of Southern California.
    Living in the diverse Los Angeles County, Carlos participates in local Latino youth programs and community art workshops, which expose him to Chicano mural traditions and contemporary Mexican music
    scenes. While he identifies strongly with his Mexican roots, his daily life balances both cultural worlds, shaping a hybrid identity that fuels his creative curiosity and disciplined pursuit of personal
    achievement.
