  hobbies: '[''Sketching'', ''Digital painting'', ''Reading sci‑fi/fantasy novels'', ''Playing narrative‑driven video games'', ''Tabletop RPGs'', ''Creative writing'', ''Bullet journaling'', ''Calligraphy'',
