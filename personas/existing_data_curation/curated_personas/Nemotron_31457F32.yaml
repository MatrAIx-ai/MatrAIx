  career_goals: Carlos aims to turn his passion for imagination into a professional career in the creative technology sector. In the next five years, he plans to earn a GED, enroll in a community college
    program focusing on graphic design and interactive media, and build a portfolio that showcases a fusion of Mexican cultural motifs with sci‑fi fantasy aesthetics. His long‑term ambition is to work as
    a concept artist or UI/UX designer for a video‑game studio or independent media company, where he can contribute original world‑building ideas while maintaining the disciplined, high‑quality standards
    he sets for himself. He also envisions creating a freelance side business offering illustration commissions and online tutorials, giving him the flexibility to work independently and continue his pursuit
    of novel artistic challenges.
