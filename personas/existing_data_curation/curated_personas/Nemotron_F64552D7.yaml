  career_goals: Brenda aims to earn her GED within the next year and subsequently enroll in a community‑college hospitality program. She hopes to secure a part‑time barista or front‑of‑house position where
    her sociable nature and people‑centric skills can shine, eventually moving into a supervisory role. Long‑term, she dreams of opening a small, community‑focused coffee shop that serves as a local gathering
    hub.
