  career_goals: Even though she is no longer in the formal workforce, Fei aims to launch an intergenerational art mentorship program in Manassas that pairs senior artists with local youth, and to curate
    a traveling exhibition that blends East Asian motifs with contemporary abstract styles. She also aspires to publish a memoir recounting her immigrant experience and artistic journey, and to win a regional
    community‑garden design competition that incorporates sculptural art installations, thereby merging her love for organized achievement with creative novelty.
