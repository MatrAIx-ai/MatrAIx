  hobbies: '[''Abstract Painting'', ''Mixed‑Media Collage'', ''Virtual‑Reality Art Exploration'', ''Experimental Cooking'', ''Community Theater Acting'', ''Chinese Calligraphy'', ''Gardening and Landscape
