personas:
  professional: A retired community arts coordinator, Fei Li leverages their vivid imagination and razor‑sharp organizational skills to design and execute intergenerational art mentorship programs and traveling
    exhibitions, while their competitive streak drives them to set ambitious timelines and high standards for every project.
  sports: Fei Li enjoys low‑impact morning walks along the Potomac River Trail, participates in a senior softball league at the Manassas Community Center, and avidly follows the Washington Capitals and
    DC United, cheering them on during the hockey and soccer seasons.
  arts: Fei Li immerses themselves in mixed‑media collage, draws inspiration from Yayoi Kusama’s polka‑dot motifs and James Turrell’s light installations, performs in local community theater productions
    of classics like A Midsummer Night’s Dream, curates a book club that often discusses speculative fiction by N.K. Jemisin and philosophical essays by Slavoj Žižek, and unwinds to the minimalist compositions
    of Philip Glass.
  travel: Fei Li prefers meticulously planned cultural trips, having explored the ancient temples of Kyoto, the avant‑garde galleries of Barcelona, and the historic vineyards of the Shenandoah Valley, while
    eyeing a future pilgrimage to the art‑rich city of Florence to study Renaissance fresco techniques.
  culinary: Fei Li’s experimental kitchen blends traditional flavors with modern twists, crafting dishes like Sichuan‑peppercorn caramelized pork belly, matcha‑infused mooncakes, and a five‑spice miso‑glazed
    duck, all while mastering the art of balancing star anise, fermented black beans, and fresh ginger.
  core: Fei Li is a fiercely organized, imagination‑driven senior artist who channels competitive energy into community projects, occasionally over‑invests in supplies, and never misses a deadline, yet
    still finds joy in late‑night collage sessions with a cup of jasmine tea.
background:
  cultural: Fei Li is a first‑generation Chinese American whose family arrived in the United States in the early 1970s. Growing up with strong Confucian values, she values education, respect for elders,
    and community service. She maintains fluency in Mandarin and actively participates in local Chinese cultural organizations, celebrating Lunar New Year, preparing authentic regional dishes, and practicing
    traditional calligraphy. Living in Manassas, Virginia for over three decades, she has integrated into the multicultural fabric of the area, often serving as a cultural bridge by introducing East Asian
    artistic concepts into community projects and events.
