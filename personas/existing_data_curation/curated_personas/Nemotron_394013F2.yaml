    to new office software'', ''Flexible workflow design'', ''Informal mediation and conflict resolution'']'
  hobbies: '[''Gardening'', ''Cooking traditional Puerto Rican dishes'', ''Reading historical fiction and memoirs'', ''Walking in local parks'', ''Bird-watching'', ''Genealogy research'', ''Knitting and
    crocheting'', ''Listening to boleros and salsa music'', ''Volunteering at senior center'']'
  career_goals: Adriana aims to remain professionally active while preserving a relaxed, flexible lifestyle. She seeks part‑time or remote administrative roles where her experience can streamline operations
    without demanding rigid schedules. Mentoring younger staff on efficient office practices and bilingual communication is a personal ambition, as is volunteering to coordinate community events for the
    local Puerto Rican cultural center. Financial independence and the ability to travel back to Puerto Rico for family gatherings remain long‑term priorities, and she is open to short courses that deepen
    her digital literacy.
