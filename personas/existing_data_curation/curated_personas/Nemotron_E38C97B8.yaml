personas:
  professional: Erick Abbott, a self‑taught junior coder, builds simple games on a tablet, leveraging puzzle‑game logic to design levels that reflect their love for structured LEGO builds.
  sports: Erick Abbott, a quiet supporter of the Dallas Cowboys and Dallas Mavericks, enjoys solo basketball shots at the neighborhood park and occasional after‑school swimming laps at the community pool,
    though they rarely join organized team sports.
  arts: Erick Abbott channels their imagination into sketching comic strips inspired by the graphic novel "Bone" and the anime artistry of Hayao Miyazaki, while listening to ambient composer Max Richter
    to maintain a calm creative flow.
  travel: Erick Abbott dreams of exploring the Space Center Houston and the historic Alamo after school trips, while cherishing family road‑trip memories of a weekend at Lake Texoma for fishing and star‑gazing.
  culinary: Erick Abbott prefers building homemade nachos with cheddar, jalapeños, and seasoned ground beef, enjoys making quick ramen with a soft‑boiled egg, and occasionally experiments with baking simple
    sugar cookies shaped like LEGO bricks.
  core: Erick Abbott is a solitary, tech‑savvy 12‑year‑old who balances intense curiosity with anxiety, thriving on structured creative projects while they often procrastinate on chores.
background:
  cultural: Erick was born and raised in the suburban community of Richardson, Texas, part of Collin County. His family is of European descent, with roots in the Midwestern United States, and they follow
    mainstream American cultural practices such as celebrating Thanksgiving, Independence Day, and local community events. Growing up in a diverse Dallas Metroplex suburb, Erick has been exposed to a variety
    of cultural influences, though his household places a strong emphasis on privacy, quiet study time, and self-reliance. These values align with the broader Texan ethos of independence while fostering
    the solitary, structured environment he prefers.
