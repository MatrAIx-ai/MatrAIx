  hobbies: '[''Digital Illustration'', ''Watercolor Painting'', ''Coastal Photography'', ''Sailing'', ''Paddle‑boarding'', ''Reading Science‑Fiction and Innovation Non‑Fiction'', ''Acoustic Guitar'', ''Experimental
    Cooking'', ''Small‑Group Book Club'', ''Beach Clean‑up Volunteering'']'
  career_goals: Jonathan aims to move from his current supervisory role into senior sales management, targeting a regional sales director position within the next five years. He plans to deepen his strategic
    acumen by completing an MBA or a Certified Professional Sales Leader (CPSL) program, and to master change-management and data-driven decision-making frameworks. Over the longer term, he envisions stepping
    into a Vice-President of Sales role or launching a boutique consulting practice that fuses sales operations with design-thinking and creative innovation, helping technology firms build agile, customer-centric
    sales cultures.
