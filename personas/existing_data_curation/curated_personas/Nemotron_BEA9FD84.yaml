personas:
  professional: Marcela Santiago is a seasoned CNC machinist with two decades of precision metalworking experience, expertly programming G‑code, interpreting blueprints, and mentoring junior staff, while
    they love routine and sociable interaction, making them the go‑to person for maintaining smooth shop operations and fostering a collaborative workplace.
  sports: Marcela Santiago stays active by walking the trails of Harford County parks each morning, cheering the Baltimore Ravens on Sundays and the Orioles in baseball season, while they also participate
    in a local senior fitness class that incorporates light resistance training, and they never miss the annual community softball tournament where they enjoy playing catcher for fun.
  arts: Marcela Santiago immerses herself in the arts through weekly rehearsals with a folkloric dance troupe, listening to mariachi classics by Vicente Fernández, and devouring mystery novels by Agatha
    Christie, often quoting favorite lines during church socials, blending cultural rhythm with literary intrigue as they effortlessly become the life of any gathering.
  travel: Marcela Santiago prefers well‑planned, low‑stress trips that blend family visits and cultural festivals, such as a recent pilgrimage to the historic shrines of southern Texas and a leisurely cruise
    along the Gulf Coast, while they dream of a future journey to the bell towers of Seville during Holy Week, always packing their favorite travel pillow and a reminder list.
  culinary: Marcela Santiago’s culinary identity centers on mastering tamales and pozole, seasoning them with ancho chile, cilantro, and hominy, while their garden supplies fresh marigolds, oregano, and
    radishes that they toss into salsa verde, and they proudly host weekly potluck nights where their signature corn‑masa rellena steals the spotlight.
  core: Marcela Santiago is a routine‑loving, sociable CNC expert who balances precise metalwork with festive cooking, community dancing, and a habit of turning every bingo night into a lively storytelling
    session, often staying up late scribbling notes on new G‑code tweaks as they reward themselves with fresh tamale dough.
background:
  cultural: Marcela was born to Mexican immigrant parents from Jalisco and grew up in a bilingual household that celebrated Día de los Muertos, Mexican Independence Day, and family fiestas centered on food,
    music, and community. Her Catholic faith and strong family values emphasize harmony, respect, and cooperation. After relocating to Maryland in her early twenties, she integrated into the local Hispanic
    community, attending Spanish‑language church services and participating in cultural festivals. Her Mexican heritage continues to influence her cooking, storytelling, and the importance she places on
    close‑knit family relationships while she adapts to the broader American work culture.
attributes:
  skills: '["CNC milling and turning operations", "Blueprint reading and interpretation", "CNC programming (G-code)", "Precision measurement with micrometers and calipers", "Machinery maintenance and troubleshooting",
    "Quality assurance and inspection", "Safety compliance and OSHA standards", "Team coordination and shift scheduling", "Mentoring and training of junior machinists", "Bilingual communication (English/Spanish)"]'
  hobbies: '["Traditional Mexican cooking", "Flower gardening", "Volunteer work at the local church food bank", "Community folkloric dance group", "Senior center bingo and social games", "Listening to mariachi
    and regional music", "Reading mystery and suspense novels", "Daily walks and light hiking in local parks"]'
  career_goals: Marcela aims to move into a lead machinist or shop supervisor role within the next few years, where she can apply her practical expertise to improve workflow efficiency and mentor emerging
    talent. She plans to obtain an advanced CNC certification and develop a small training program for apprentices. While she looks forward to a gradual transition toward retirement, she hopes to stay connected
    to the industry through part‑time consulting for local manufacturers and by volunteering her technical skills to community workshops.
