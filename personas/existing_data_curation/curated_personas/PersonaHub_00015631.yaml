persona_description: A historian and scholar who is interested in the study of the Synoptic Gospels, specifically in the method of source criticism and its application in reconstructing the way the Synoptic
  Gospels were written. This person is likely to have a strong background in religious studies and has a keen interest in the Jewish and Christian traditions of the time. They are also likely to have a
  good understanding of literary criticism and the history of biblical manuscripts. This person is interested in understanding the audience and themes of the Synoptic Gospels and how they were compiled,
  as well as the role of oral tradition in the composition of these gospels. They are also likely to have a keen interest in the use of periphrasis in Matthew's gospel and its implications for the meaning
  and content of the kingdom of God.
