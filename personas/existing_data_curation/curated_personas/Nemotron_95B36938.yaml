  career_goals: Although retired, Chun aims to remain intellectually active and contribute to the cultural life of Irvington and the broader New York region. His primary ambition is to author a comprehensive
    book exploring the influence of East Asian aesthetics on American modern art, drawing on his lifelong research. He also plans to curate a small, community‑focused exhibit that juxtaposes classic Chinese
    paintings with works by emerging local artists, highlighting cross‑cultural dialogues. Additionally, he seeks to establish a modest scholarship fund for undergraduate students pursuing art history,
    mentoring them through regular workshops and one‑on‑one guidance. Learning new digital archiving tools and expanding his calligraphy practice are personal goals that support these larger aspirations.
