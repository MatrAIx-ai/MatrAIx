personas:
  professional: Chun Wu, a retired East Asian art historian turned community curator, blends rigorous scholarly research, bilingual translation, and a knack for inventive exhibition design, using an organized
    yet flexible mindset to craft intimate museum experiences that bridge ancient brush painting with contemporary local art while mentoring emerging scholars.
  sports: Chun Wu, an avid practitioner of tai chi who joins a senior walking group in the park each spring, enjoys watching the New York Knicks and New York Yankees on weekend evenings, and plays the strategic
    board game Go with a close circle of friends, maintains a modest yet consistent fitness routine that balances mental sharpness with gentle physical movement.
  arts: Chun Wu, a daily brush‑painting enthusiast who reveres Tang poet Du Fu and the calligraphic elegance of Wang Xizhi, attends intimate jazz concerts featuring Miles Davis recordings, curates gallery
    tours highlighting emerging local artists alongside classical works, and finds inspiration in the paintings of Mark Rothko and the poetry of Li Bai, allowing art to shape both leisure and scholarly
    pursuits.
  travel: Chun Wu, a careful planner who prefers small‑group cultural tours, has trekked the historic streets of Kyoto’s Gion district, explored Hangzhou’s West Lake during the Lotus Festival, and frequently
    visits the Hudson River Valley’s historic estates, balancing a love for East Asian heritage sites with a desire for low‑stress, budget‑conscious travel.
  culinary: Chun Wu, an avid gardener who transforms home‑grown bok choy, shiitake mushrooms, and fresh ginger into simple yet refined stir‑fries and delicate tea‑infused noodles, enjoys occasional weekend
    dim sum brunches with friends, but often forgets to eat breakfast, relying on herbal green tea to smooth the afternoon transition.
  core: Chun Wu, a quietly curious septuagenarian who merges scholarly rigor with a love for brush painting, tai chi, and modest indulgences in fine tea, balances meticulous planning with occasional procrastination,
    and finds joy in the small interplay between tradition and modern community life.
background:
  cultural: Chun Wu was born to Chinese immigrant parents who settled in the United States during the 1950s. Raised in a bicultural household, he grew up speaking Mandarin at home while receiving an American
    education, which fostered a strong appreciation for both Eastern and Western traditions. His family emphasized respect for elders, the value of education, and a deep reverence for artistic expression—principles
    that continue to shape his worldview. Throughout his life, Chun has maintained active ties to the local Chinese cultural association, celebrating festivals such as Lunar New Year and Mid‑Autumn, and
    contributing to cultural exchange programs. His East Asian heritage informs his scholarly focus on Asian art, his practice of calligraphy, and his desire to bridge cultural perspectives within the arts
    community of Irvington and beyond.
