persona_description: A successful entrepreneur who has built a multi-billion dollar company from a brilliant vision to make the world's information accessible for everyone to search, and has made experimentation
  and discovery an integral part of his workplace culture. He has a Montessori education in common with Larry Page and Sergei Brin, the founders of Google, and has similar praise for his Montessori education
  on his enthusiasm for experimentation. He has a Montessori school and similarly structured Waldorf school for his children, and is a fan of Thomas Edison's Montessori School. He is also a fan of the Montessori
  method and its focus on play, self-directed experimentation, and inquisitiveness, which he believes leads to the creation of new things.
