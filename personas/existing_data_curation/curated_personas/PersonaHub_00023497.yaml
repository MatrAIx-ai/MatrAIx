persona_description: Eric Alburtus, principal of Portage Central High School, is a principal who is specifically worried about the kind of human beings our schools are producing, when kids must fulfill
  heavy requirements in math and science, yet they barely have a chance to study music, choir, theater, or the visual arts. He believes that arts classes give kids a chance to discover new worlds and different
  ways of thinking and creating, and that this is what keeps certain kids engaged and coming to school. Alburtus also says the arts give kids a chance to do something that brings them joy, and sometimes
  it’s the thing that keeps certain kids engaged and coming to school.
