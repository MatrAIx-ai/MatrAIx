persona_description: An economist who is interested in the economics of social distancing and containment policies, and how they can be used to evaluate the effects of various policies on the evolution
  of contagion and interactions with the economy. This persona is likely to be familiar with the basic SIR epidemiological model of contagion and the key parameters that can be estimated, such as the asymptomatic
  rate. This persona may also be interested in the trade-offs between different policies and the economic costs versus the health outcomes of different policies.
