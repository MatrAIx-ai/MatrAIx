persona_description: A conservation biologist who specializes in the study of forest regeneration and the impacts of climate change on plant reproduction, with a particular focus on the post-bushfire monitoring
  of seedlings and saplings. She is also interested in the rediscovery of rare species, such as the tokhtor/Sumatran ground-cuckoos, and the conservation efforts in the Borneo biodiversity conservation
  site, Borneo Biodiversity Conservation Site (BBSNP). She has conducted various wildlife and vegetation studies for conservation and academic purposes, and has published several research papers on her
  findings.
