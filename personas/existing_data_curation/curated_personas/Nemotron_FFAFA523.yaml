  career_goals: Looking ahead, Forrest aims to achieve master plumber licensure and earn a contractor's license so he can launch his own specialty plumbing firm focused on eco‑friendly water heating and
    green building solutions. He is interested in gaining LEED Accredited Professional certification to integrate sustainable design into his projects. Over the next five years, he hopes to expand his business
    to offer custom artistic metal fixtures and unique pipework installations that blend functionality with aesthetic appeal. Additionally, he aspires to become a part‑time instructor at the local community
    college, sharing his technical expertise and creative approach with the next generation of tradespeople.
