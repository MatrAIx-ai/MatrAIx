  hobbies: '[''Book club participation'', ''Volunteer softball league'', ''Craft nights'', ''Southern cooking and baking'', ''Pottery workshops'', ''Gardening'', ''Journaling'', ''Yoga'', ''Hiking'', ''Trivia
    nights'']'
  career_goals: Kelly aims to transition from a teaching assistant to a certified classroom teacher within the next three years, pursuing her Texas teaching licensure while completing a master's in curriculum
    and instruction. She is driven to become a curriculum specialist who can champion inquiry‑based learning across her district, and she hopes to lead professional‑development workshops that showcase practical,
    curiosity‑fueled teaching strategies. Additionally, she envisions establishing a community tutoring program that offers flexible, after‑school support for students who need extra help, positioning herself
    as a competitive leader in local educational initiatives.
