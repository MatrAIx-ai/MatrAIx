personas:
  professional: Kelly Hickman, a seasoned classroom support specialist with two decades of experience in adaptive lesson design and educational technology, leverages their curiosity‑driven resourcefulness
    and sociable, competitive nature, and they energize teachers and students while occasionally letting disorganization slip into scheduling.
  sports: Kelly Hickman, an avid member of the town’s volunteer softball league, they channel competitive energy into batting practice and cheer for the local Minor League team, the Round Rock Express,
    while also joining weekend hikes to stay fit.
  arts: Kelly Hickman, a devoted book‑club leader and craft‑night organizer, they find inspiration in the novels of Toni Morrison, the pottery of Bernard Leach, and the music of Dolly Parton, weaving these
    artistic influences into community workshops and personal gardening projects.
  travel: Kelly Hickman, who prefers flexible itineraries over rigid schedules, they have trekked the Hill Country vineyards of Texas, savored the culinary scene of New Orleans, and dream of exploring the
    artisan markets of Asheville, all while juggling spontaneous weekend getaways with local volunteer commitments.
  culinary: Kelly Hickman, a passionate Southern‑style baker, they regularly perfect pecan pie, peach cobbler, and buttermilk biscuits, seasoning dishes with fresh thyme and cinnamon while experimenting
    with new twists during craft‑night potluck gatherings.
  core: Kelly Hickman, a curiosity‑driven, socially energetic educator with a competitive edge, they stitch together Southern pies, softball victories, and a habit of charming disorganization into a uniquely
    vibrant life.
background:
  cultural: Kelly was raised in a small town in East Texas, surrounded by a close‑knit, largely white community with deep Southern roots. Her family’s traditions emphasize hospitality, church involvement,
    and community service, which have shaped her sociable and outgoing nature. Growing up she absorbed a blend of conservative values and a practical work ethic, while her graduate education introduced
    her to progressive teaching philosophies. She identifies with the cultural fabric of Cherokee County—appreciating regional festivals, country music, and the strong emphasis on family and neighborly
    support—while also valuing the curiosity‑driven, eclectic influences she encounters through adult education and community workshops.
attributes:
  skills: '[''Lesson plan adaptation'', ''Educational technology integration'', ''One-on-one tutoring'', ''Group activity facilitation'', ''Classroom resource creation'', ''Interpersonal communication'',
