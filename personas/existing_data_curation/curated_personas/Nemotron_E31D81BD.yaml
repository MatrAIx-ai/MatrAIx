  hobbies: '[''Drawing and sketching'', ''Watercolor painting'', ''LEGO building'', ''Nature walks and rock collecting'', ''Reading adventure books'', ''Playing board games'', ''Small‑group crafts'', ''Listening
    to classical music'', ''Creating simple comics'']'
  career_goals: Natalie imagines a future where she can combine her love of art and her curiosity about the natural world. She aspires to become a natural‑history illustrator or a young scientist who creates
    visual guides for wildlife, hoping to win school science fairs and art contests. She dreams of one day publishing illustrated field guides that help other kids discover the beauty of nature while being
    recognized for her competitive spirit and independent research.
