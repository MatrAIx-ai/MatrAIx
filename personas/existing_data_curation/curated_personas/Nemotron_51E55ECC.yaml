  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Hiking and mountain biking'', ''Reading historical nonfiction and contemporary fiction'', ''Attending blues and folk concerts'',
    ''Cooking regional dishes'', ''Playing chess'', ''Volunteer tutoring'', ''Collecting vintage vinyl records'']'
  career_goals: Herbert aims to advance into a supervisory or program‑director role within the probation department, where he can lead a team and shape policy. He plans to obtain a master’s degree in social
    work or criminal justice to deepen his expertise, and to become a certified trauma‑informed practitioner. A key ambition is to integrate arts‑based interventions into mainstream correctional treatment
    programs, demonstrating measurable reductions in recidivism. He also seeks to mentor junior officers, advocate for statewide probation reform, and eventually influence the development of innovative
    reentry strategies across Arizona.
