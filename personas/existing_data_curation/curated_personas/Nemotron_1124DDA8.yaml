personas:
  professional: Sau Kim, a 13-year-old budding citizen scientist, leverages their curiosity and methodical planning to document the volcanic and tide-pool ecosystems near Kamuela through detailed sketches,
    field notes, and data logs, contributing to a school-wide Earth science initiative.
  sports: Sau Kim, a member of the Maui Youth Surf Club and a backup midfielder for the Kahului Junior Soccer Team, trains early mornings on the waves and enjoys cheering for the Hawaii Rainbow Warriors
    basketball team, while maintaining a competitive edge that drives them to log weekly fitness stats in a personal spreadsheet.
  arts: Sau Kim, an avid sketcher of native plants and ocean life, also crafts leis from local flowers, plays the ukulele in small gatherings, and immerses themselves in a playlist ranging from traditional
    Hawaiian chanting to indie acts like Mitski and Tame Impala, drawing creative inspiration from both ancestral rhythms and contemporary melodies.
  travel: Sau Kim, who prefers thoughtfully planned trips, spends weekends hiking the Haleakala crater, has explored the Road to Hana's waterfalls and black-sand beaches, and dreams of traveling to Iceland's
    volcanic landscapes and Japan's Aso Kuju National Park to compare ecosystems.
  culinary: Sau Kim, who enjoys moderate cooking, frequently prepares poke bowls with ahi tuna, seaweed, mango, and kalua pork, whips up authentic spam musubi for lunch, and experiments with baking banana-bread
    topped with macadamia nuts, savoring the sweet-savory blend of tropical flavors.
  core: Sau Kim, a 13-year-old with relentless curiosity, methodical planning, and a competitive yet solitary spirit, navigates life through volcano hikes, sketchbooks, strategic games, and a quiet dedication
    to environmental stewardship.
background:
  cultural: Sau A Kim is of Native Hawaiian Polynesian descent and grew up in Kamuela, an up‑country community on the island of Hawai‘i. Her family maintains a strong connection to the land (ʻāina) and
    the sea (kai), and she participates in Hawaiian language classes, local hula and ukulele gatherings, and community events that celebrate ancestral myths such as Pele, the volcano goddess. The concepts
    of ohana (family) and kuleana (responsibility) shape her worldview, influencing her artistic motifs, respect for the environment, and desire to preserve and share Hawaiian traditions through modern
    media.
