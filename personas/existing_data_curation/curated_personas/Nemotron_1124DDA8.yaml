  hobbies: '[''sketching Hawaiian flora and marine life'', ''digital painting'', ''ukulele playing'', ''hula practice'', ''reading science fiction'', ''strategic video games'', ''lei making'', ''beach clean‑ups'',
    ''hiking volcanic trails'']'
  career_goals: She aspires to become a visual storyteller who uses digital media to highlight Hawaiian culture and environmental issues. In the short term, she aims to win a place in the Hawaii State Art
    Fair and earn a scholarship to a high‑school visual‑arts program. Long‑term, she plans to pursue a university degree in graphic design or media arts with a focus on cultural preservation and marine
    conservation, creating award‑winning artwork that raises awareness about coral reef protection while honoring her Polynesian heritage.
