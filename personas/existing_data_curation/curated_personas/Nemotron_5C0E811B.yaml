  career_goals: Even though he is currently not employed, Henry aims to channel his imaginative energy into a semi-professional portfolio that bridges art and technology. He plans to publish a collection
    of speculative short stories paired with original illustrations, and to curate a small community exhibition that explores the intersection of AI and abstract art. He aspires to become a sought-after
    guest lecturer at local community colleges and maker spaces, sharing his interdisciplinary approach to creative problem solving. Henry also hopes to establish a modest consulting service that helps
    startups articulate their vision through visual storytelling, thereby staying intellectually engaged while maintaining flexibility to care for his family.
