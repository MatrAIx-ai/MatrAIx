  hobbies: '[''Drawing and watercolor painting'', ''LEGO building'', ''Listening to and dancing to music'', ''Group games (tag, hide-and-seek, soccer)'', ''Reading picture books (space, animals, cultural
    tales)'', ''Art club participation'', ''Library story time'', ''Simple science experiments'', ''Cooking Mexican dishes with family'']'
  career_goals: Krystall dreams of a future where she can explore the unknown and share her creations. She often imagines herself as an astronaut discovering new planets, a painter whose vibrant works hang
    in galleries, or a scientist conducting fun experiments that explain how things work. She also feels a growing desire to become a teacher who can inspire other children to be curious and confident.
    Krystall’s ambitions are guided by her love of learning, her calm confidence, and her wish to blend art, science, and her Mexican heritage to make a positive impact on her community.
