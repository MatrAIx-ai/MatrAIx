personas:
  professional: Krystall, a budding first‑grade artist and LEGO architect, channels their curiosity and methodical planning into leading the school art club’s showcase projects, competitively striving for
    the most vibrant and intricate creations they can produce.
  sports: Krystall, an energetic participant in tag, hide‑and‑seek, and a beginner’s soccer league with the local Junior Lightning club, cheers for the city’s professional baseball team the River City Braves,
    and combines their competitive spark with a love for group games, always aiming to outscore teammates in friendly matches they organize.
  arts: Krystall, an avid watercolor enthusiast who draws inspiration from the whimsical illustrations of Beatrix Potter and the catchy pop tunes of Taylor Swift and Kidz Bop, frequently dances to folk
    music beats in school hallways while integrating storybook characters into elaborate LEGO constructions they meticulously design.
  travel: Krystall, a curious explorer guided by parental road‑trip plans, has zip‑lined through a towering redwood forest in a national park and visited the historic seaside town of Cape May, while dreaming
    of future adventures to the desert dunes of Arizona and the snowy slopes of Mt. Rainier they see in picture books.
  culinary: Krystall, who loves helping in the kitchen, expertly mashes avocados for guacamole, assembles soft corn tortillas with diced tomatoes, cilantro, and a sprinkle of cheese for tacos, and sometimes
    sneaks extra chocolate chips onto the plate, showcasing a playful blend of family tradition and personal flavor experimentation.
  core: Krystall, a relentlessly curious six‑year‑old who blends artistic zeal, a competitive spark, and serene composure, can be found sketching vivid watercolors, building towering LEGO cities, and dishing
    out homemade tacos while meticulously counting every coin in their piggy bank.
background:
  cultural: Krystall grows up in a Mexican‑American household in Saint Charles, Illinois, where Spanish is spoken alongside English. Her family celebrates Día de los Muertos, Mexican Independence Day, and
    other traditions with vibrant decorations, music, and shared meals, fostering a strong sense of cultural pride. She enjoys Mexican foods like tamales, tacos, and fresh fruit, and she often helps prepare
    them, learning the stories behind each dish. Bilingual storytelling at home and occasional visits to a local cultural center expose her to traditional folk songs, dance (such as folklórico), and crafts.
    These experiences shape her artistic style, influence the colors she uses, and inspire her interest in sharing Mexican culture with friends at school and in her community.
