  professional: Rebecca Martorano, a curious 1‑year‑old infant, already shows an innate fascination with cause‑and‑effect through sensory play, hinting at a future path in experimental design or creative
    engineering where flexibility and unconventional problem‑solving will define their career.
  sports: Rebecca Martorano, a 1‑year‑old, participates in a parent‑child gymnastics class at the Little Sprouts Club and enjoys watching the local Springfield Cardinals baseball games on family outings,
    embodying a relaxed yet competitive spirit even in toddler play.
  arts: Rebecca Martorano, a 1‑year‑old, delights in the melodic lullabies of Baby Einstein and the visual wonder of Bob Ross's Joy of Painting episodes, frequently grasping at crayon‑sized color sticks
    to create abstract scribbles that reflect her appreciation for unconventional artistic expression.
  travel: Rebecca Martorano, a 1‑year‑old, has already traveled to her grandparents’ farmhouse in Vermont and visited the National Aquarium in Baltimore, while dreaming of future trips to the Eiffel Tower
    in Paris and the Great Barrier Reef, preferring brief, family‑led excursions that balance curiosity with the comfort of familiar caregivers.
  culinary: Rebecca Martorano, a 1‑year‑old, prefers pureed sweet potatoes, mashed bananas, and occasional soft chicken nuggets, enjoying the texture of avocado and the bright orange of carrot puree, yet
    she is notorious for spitting out broccoli, a quirky bad habit that showcases her selective palate.
  core: Rebecca Martorano, a 1‑year‑old explorer with a skeptical grin, loves crayon scribbles, shiny coins, and spontaneous family trips, yet consistently rejects broccoli and resists nap time, embodying
    a blend of curiosity, independence, and delightful stubbornness.
