persona_description: A consumer who has been exposed to toxic materials in their home or rental property, and is seeking compensation for their injuries or illness. This persona is particularly interested
  in environmental toxic tort litigation and may have a strong toxic tort case if they can prove that their exposure to toxic materials was caused by a company's negligence or violation of environmental
  laws. This persona is likely to have extensive knowledge of toxic materials and their effects on human health, as well as an understanding of the legal theory of liability and how to build evidence to
  prove toxic exposure. They may also have a unique perspective on the role of environmental agencies in addressing brownfields and the incentives provided by state and local governments to clean up and
  reuse these sites.
