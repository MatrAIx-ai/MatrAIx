  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Yoga'', ''Hiking local trails'', ''Reading romance novels'', ''Journaling'', ''Volunteering at community health fairs'']'
  career_goals: Maria aims to deepen her clinical expertise by earning advanced certifications in trigger point therapy and lymphatic drainage, eventually expanding into rehabilitative massage for chronic
    pain patients. Over the next five years she plans to open a modest, family‑run wellness studio in Corona that offers integrated services such as massage, yoga, and nutritional counseling. She also hopes
    to mentor new therapists, contribute to community health fairs, and possibly pursue an associate degree in health sciences to broaden her professional credentials while maintaining a stable, routine‑oriented
    practice.
