personas:
  professional: An experienced massage therapist with a solid foundation in manual therapy, Maria Bercowicz blends bilingual communication, routine-driven client scheduling, and a compassionate, collaborative
    approach to design personalized treatment plans that incorporate trigger point and lymphatic drainage techniques, and they dream of a family-run wellness studio that also hosts yoga and nutritional
    counseling.
  sports: Energetic outdoors enthusiast, Maria Bercowicz hikes Riverside County trails on weekends, practices yoga three times a week at the local studio, and cheers for the Los Angeles Dodgers while occasionally
    joining the Riverside Trail Runners club for group runs, and they enjoy occasional marathon training sessions despite a busy schedule.
  arts: Culture‑loving creative, Maria Bercowicz devotes evenings to romance novels by Jojo Moyes and Nicholas Sparks, enjoys listening to the vibrant sounds of Selena and traditional folk bands at community
    festivals, and they find inspiration in Frida Kahlo’s paintings at the local art gallery.
  travel: Adventure‑oriented traveler, Maria Bercowicz has explored Oaxaca’s vibrant markets and Day of the Dead celebrations, cherishes weekend road trips along the Pacific Coast Highway, and they dream
    of trekking the Andes in Patagonia while balancing travel costs with a modest savings plan.
  culinary: Food‑focused home chef, Maria Bercowicz regularly prepares mole poblano, tacos al pastor with fresh pineapple, and hand‑made corn masa tamales, savoring ingredients like chilhuacle chiles, epazote,
    and cilantro, and they enjoy experimenting with healthier twists while occasionally relying on ready‑made sauces for convenience.
  core: Maria Bercowicz blends a love for routine, compassionate care, and vibrant traditions, yet they sometimes over‑schedule themselves, lose track of time while journaling, and can’t resist the occasional
    late‑night taco truck visit.
background:
  cultural: Maria is a second‑generation Mexican American who grew up in a bilingual household where Spanish was spoken daily and Mexican traditions were celebrated. Family gatherings, Día de los Muertos
    altars, and religious observances rooted in Catholicism are central to her identity. Living in Corona's vibrant Mexican‑American community reinforces her connection to cultural music, food, and festivals,
    shaping her values of family loyalty, hospitality, and a strong sense of communal responsibility.
attributes:
