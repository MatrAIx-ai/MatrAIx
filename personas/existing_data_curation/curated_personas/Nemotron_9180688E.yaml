  hobbies: '["Reading picture books (bilingual and folklore)", "Outdoor nature exploration (collecting leaves, watching insects)", "Watercolor painting and collage making", "Singing traditional lullabies
    and rhythmic play", "Simple cooking assistance (stirring, arranging ingredients)", "Building and deconstructing block structures"]'
  career_goals: Even though she is only three, Ever Sonia often talks about wanting to 'help many people' when she grows up. She imagines becoming a teacher who reads stories to children, a veterinarian
    caring for animals, or a community helper who makes sure everyone feels safe and happy. Her caring nature drives her ambition to create harmony, and she frequently expresses a wish to learn more about
    the world so she can share that knowledge with others.
