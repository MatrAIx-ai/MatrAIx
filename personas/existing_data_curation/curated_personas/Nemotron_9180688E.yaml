personas:
  professional: Ever Batista, a three‑year‑old preschooler, shows early professional flair as a budding block‑builder, mixing boundless curiosity about how pieces fit together with a practical habit of
    straightening each tower before moving on, while spontaneous bursts of imagination sometimes clash with their lingering worry about keeping things tidy.
  sports: Ever Batista, a three‑year‑old, joins the neighborhood toddlers’ soccer clinic on Saturdays, occasionally watches the River City Rivermen baseball games on TV, and delights in little‑league baseball
    tosses at the park, exhibiting a love for active play while they prefer gentle, unstructured movement over rigid training.
  arts: Ever Batista spends afternoons drawing vivid crayon masterpieces of jungle scenes while humming the upbeat tunes of Raffi and The Wiggles, and they enjoy bedtime storytime featuring Disney’s Moana
    and Sesame Street’s Elmo, which together shape a playful, imagistic identity.
  travel: Ever Batista enjoys short car rides to the nearby aquarium, day trips to the grandparents’ farm, and eagerly anticipates a family vacation to Disney World in Florida, while parents handle the
    itinerary and they relish the wonder of new sights.
  culinary: Ever Batista prefers cheesy macaroni, banana slices, and peanut butter on toast, can assemble a simple fruit kebab with strawberry and kiwi under adult supervision, and loves the buttery aroma
    of freshly baked croissants at the local bakery, though they often protest broccoli.
  core: Ever Batista is a tiny explorer who balances relentless curiosity with gentle worry, delights in solitary play and sharing, and they often lose a toy in the couch cushions before remembering with
    a giggle.
background:
  cultural: Ever Sonia was born into a Mexican‑American family that celebrates both Mexican traditions and the multicultural life of Arlington Heights, Illinois. At home, Spanish is spoken alongside English,
    giving her a natural bilingual environment. Family gatherings often feature classic dishes such as tamales, pozole, and pan dulce, and holidays like Día de los Muertos and Las Posadas are observed with
    colorful altars, papel picado, and story‑telling. Her grandparents share Mexican folklore and cultural values emphasizing respect, community, and harmony, which shape her considerate personality. Living
    in a diverse suburb, she also experiences American customs and community events, fostering an inclusive worldview that blends her heritage with her local surroundings.
attributes:
  skills: '["Bilingual basic language comprehension (English & Spanish)", "Fine‑motor coordination for drawing and block building", "Early problem‑solving through exploration", "Empathy and cooperative
