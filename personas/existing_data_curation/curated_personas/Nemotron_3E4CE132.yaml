  career_goals: Destiny aims to enroll in an arts‑focused high school or a STEM‑arts integrated program that will allow her to deepen her visual‑design skills. She plans to pursue a college degree in graphic
    design or visual communication, with the long‑term ambition of becoming a creative director or community arts program manager who creates inclusive media projects and mentors under‑represented youth
    in her hometown and beyond.
