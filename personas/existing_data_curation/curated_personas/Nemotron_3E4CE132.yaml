personas:
  professional: Destiny Felton is an emerging teen visual artist and budding digital content creator who channels their curiosity and disciplined work ethic into daily sketching, digital painting, and orchestrating
    arts‑and‑crafts workshops for the church youth group, all while dreaming of a future career in multimedia storytelling.
  sports: Destiny Felton plays after‑school soccer for the Red Springs Youth Soccer Club, follows the MLS side Charlotte FC and the international giant FC Barcelona, keeps up with the local high school
    basketball team the Red Springs Raiders, and joins hip‑hop dance crews after practice to stay fit and social.
  arts: Destiny Felton immerses themselves in creative expression by sketching daily, crafting digital paintings inspired by Loish and Hayao Miyazaki, devouring graphic novels such as Saga and Watchmen,
    and curating playlists that range from Billie Eilish to the instrumental scores of Hans Zimmer, which all shape their artistic identity.
  travel: Destiny Felton enjoys family road trips to historic Savannah and the theme parks of Orlando, dreams of a cultural exchange program in Kyoto, Japan, and meticulously plans future adventures with
    a blend of photography hotspots, local food tours, and teen‑friendly museums, balancing school obligations with wanderlust.
  culinary: Destiny Felton, a confident snack‑maker, whips up avocado‑toast bowls, hand‑rolls sushi for friends, indulges in cheesy pepperoni pizza and homemade mac‑and‑cheese, but often grabs a bag of
    spicy chips while editing digital art, and credits their love of bright basil, cherry tomatoes, and sriracha for their vibrant palate.
  core: Destiny Felton is a hyper‑organized teen artist who juggles sketchbooks, soccer drills, and late‑night Photoshop marathons, often forgetting to eat breakfast but never missing a Saturday dance rehearsal.
background:
  cultural: Destiny grows up in a close‑knit African‑American family in Red Springs, a small town in Robeson County, North Carolina. Her life is shaped by Southern black cultural traditions, a strong church
    community, family storytelling, and the region’s history of resilience and mutual support. She participates in local Juneteenth celebrations, church choir, and community events that emphasize togetherness.
    The diverse fabric of Robeson County, with neighboring Lumbee and Hispanic communities, has exposed her to a variety of cultural practices, fostering an appreciation for cultural exchange while reinforcing
    values of education, respect for elders, and collaborative harmony.
