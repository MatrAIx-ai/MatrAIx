  career_goals: Carmen aims to become a senior field service engineer within the next three years, obtaining industry certifications such as CompTIA A+ and Cisco CCNA to deepen her networking knowledge.
    She aspires to lead a small team of technicians, sharing best practices and fostering a collaborative, yet competitive, work culture. Long‑term, she envisions opening her own boutique repair shop that
    specializes in sustainable refurbishment of office equipment, integrating smart‑device diagnostics she has been exploring. Her competitive nature fuels a desire to be recognized as the top performer
    in her service region, while her practical mindset keeps her focused on measurable outcomes like reduced downtime and customer satisfaction scores.
