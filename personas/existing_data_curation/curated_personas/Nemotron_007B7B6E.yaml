  career_goals: As she approaches retirement, Dr. Roache aims to transition into a senior advisory role within her health system, focusing on improving geriatric care pathways and medication safety. She
    plans to lead a statewide quality‑improvement project that reduces hospital readmissions among elderly patients, and to publish research on efficient primary‑care workflows. Additionally, she seeks
    to formalize a mentorship program for early‑career physicians, serve on the board of the local hospital, and continue teaching part‑time at a medical school, ensuring her high standards of patient care
    are sustained.
