personas:
  professional: Chelsea Roache, a board-certified internal medicine and geriatric physician with over three decades of experience, applies systematic clinical diagnosis, evidence-based treatment planning,
    and rigorous quality-improvement leadership while mentoring residents and championing data-driven outcomes in her practice.
  sports: Chelsea Roache, a morning kayaking enthusiast on Cape Cod Bay, a regular dune-walking hiker with her dog, and a devoted fan of the Boston Red Sox, Boston Celtics, and New England Patriots, also
    belongs to the Cape Cod Kayak Club and participates in the annual Cape Cod Marathon.
  arts: Chelsea Roache, a dedicated patron of the Cape Cod Community Theater, a landscape photographer who draws inspiration from Ansel Adams, and an avid listener of Joni Mitchell and Bob Dylan, often
    incorporates artistic motifs into her health-education talks.
  travel: Chelsea Roache, who favors meticulously planned getaways, has explored the historic streets of Boston, the maritime charm of Martha’s Vineyard, the rugged cliffs of Nova Scotia’s Cabot Trail,
    and dreams of a road trip along California’s Pacific Coast, balancing her love of coastal scenery with a modest travel budget.
  culinary: Chelsea Roache, an accomplished home chef, crafts farm-to-table meals such as herb-crusted sea bass with roasted root vegetables, fresh clam chowder with local oysters, and rosemary-infused
    cauliflower steaks, sourcing ingredients from the East Falmouth farmers' market and her own herb garden.
  core: Chelsea Roache, a meticulous doctor and coastal explorer, blends disciplined professionalism with a passion for kayaking, herb gardening, crossword puzzles, and an occasional over-investment in
    garden supplies.
background:
  cultural: Chelsea comes from a New England‑based white American background, raised in a small Massachusetts town where self‑reliance, community service, and an appreciation for the maritime environment
    are valued. The region’s emphasis on education and civic participation influenced her pursuit of a STEM education and a career in medicine. Her professional culture reinforces scientific rigor and patient‑centered
    care, while her personal life reflects the New England tradition of modest hospitality, involvement in local environmental stewardship, and support for public‑health initiatives.
