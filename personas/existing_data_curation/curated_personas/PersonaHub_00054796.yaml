persona_description: A business owner or manager who is responsible for managing and operating a privately owned drinking water utility, ensuring compliance with drinking-water standards and economic regulations.
  They are familiar with the water service business and have experience in managing and operating utilities. They are committed to providing top quality water service and are willing to invest in cutting-edge
  technology to ensure the long-term integrity of the system. They are also aware of the economic contributions that their utility makes to the communities they serve by paying local, state, and federal
  taxes.
