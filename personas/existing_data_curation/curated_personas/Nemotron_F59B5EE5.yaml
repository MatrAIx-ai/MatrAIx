personas:
  professional: An aspiring sustainable farm manager, Ivan Hoang leverages hands‑on mixed‑crop expertise, irrigation repair skills, and bilingual communication to lead collaborative field crews, while their
    relaxed, flexible attitude lets them improvise solutions in fast‑changing farm environments.
  sports: Ivan Hoang drops into weekend pick‑up basketball games at the Stockton Community Center, cheers on the Sacramento Kings and follows the Oakland Athletics, and hikes the marshes of the San Joaquin
    River Delta for cardio, preferring informal play over regimented gym routines.
  arts: Ivan Hoang sketches the colorful murals of the Downtown Stockton Arts District, captures candid street scenes with a Fujifilm X‑100, and strums acoustic covers of John Mayer and indie folk duo The
    Head and the Heart at local gatherings, drawing inspiration from both contemporary graffiti and the rhythmic beats of traditional lantern festivals.
  travel: Ivan Hoang maps out spontaneous road trips to California’s coastline—Mendocino, Big Sur, and the Redwood forests—while dreaming of wandering the lantern‑lit streets of Hoi An and the bustling
    night markets of Bangkok, balancing modest budgeting with a love for cultural immersion.
  culinary: Ivan Hoang’s weekend kitchen experiments fuse a simmering pho broth with the caramelized tang of adobo and the fragrant heat of Thai green curry, using star anise, lemongrass, and fish sauce,
    and they proudly claim a ‘mediocre but enthusiastic’ self‑rating on culinary skills.
  core: Ivan Hoang is a 21‑year‑old farm‑hands‑turned‑art‑enthusiast who balances a love for sustainable agriculture with spontaneous sketching, occasional budgeting chaos, and a habit of leaving socks
    on the living‑room floor for inspiration.
background:
  cultural: Ivan was raised in a Southeast Asian immigrant household in Stockton, where his family blends traditions from Vietnam and the Philippines with the broader Californian lifestyle. Family celebrations
    of Tet, Mid‑Autumn, and Filipino fiestas coexist with local customs such as Fourth of July parades and community farmers' markets. Growing up in San Joaquin County’s multicultural environment, he became
    fluent in English while retaining conversational Vietnamese and a working knowledge of Tagalog, allowing him to bridge cultural gaps at work and in his social circles. This bicultural upbringing fostered
    a deep respect for family cohesion, community support, and adaptability—values that shape his collaborative spirit and openness to unconventional ideas. His marriage to a fellow Southeast Asian American
    further reinforces shared cultural values while encouraging exploration of new experiences.
attributes:
  skills: '["Plant cultivation and harvest", "Irrigation system installation and maintenance", "Farm machinery operation and basic repair", "Integrated pest management", "Team coordination and leadership",
