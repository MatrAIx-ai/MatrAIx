  hobbies: '["Street photography", "Sketching and mural painting", "Playing acoustic guitar", "Community gardening", "Hiking", "Cooking Southeast Asian cuisine", "Attending cultural festivals", "Pickup
    basketball", "Live music events", "Digital illustration"]'
  career_goals: Ivan aims to transition from general farm labor to a role as a sustainable farm manager. He plans to enroll in a community‑college agronomy program to earn certification in sustainable agriculture
    and precision farming technologies. Over the next five years, he hopes to lead a diversified organic farm that supplies the Stockton market and supports community‑supported agriculture (CSA) initiatives.
    He also wants to integrate his artistic passions by creating a farm‑based art space—organizing mural projects, seasonal art festivals, and workshops that bring the local community together. Financial
    stability to support his wife and future family, while maintaining flexibility for creative pursuits, drives his long‑term ambition to own and operate his own farm‑focused venture.
