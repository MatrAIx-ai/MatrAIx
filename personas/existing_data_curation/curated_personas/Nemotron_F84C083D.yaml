  hobbies: '[''Hiking in El Yunque'', ''Nature photography'', ''DIY electronics projects'', ''Reading classic science‑fiction'', ''Online chess'', ''Cooking traditional Puerto Rican cuisine'', ''Mentoring
    teens in electronics workshops'']'
  career_goals: Carmelita aims to become the leading authority on resilient power infrastructure for Puerto Rico, directing large‑scale micro‑grid projects that enhance community energy independence. She
    aspires to publish research on low‑cost solar‑storage solutions, mentor a select group of junior engineers, and eventually launch a consultancy that advises municipal governments on disaster‑proof electrical
    design. Her ambition includes influencing regional standards and securing patents for innovative power‑conversion circuits, while maintaining the flexibility to explore emerging technologies on her
    own terms.
