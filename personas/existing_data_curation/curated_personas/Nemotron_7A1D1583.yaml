personas:
  professional: Tung Chang, an aspiring software engineer, channels their orderly mindset and competitive edge into meticulously documented code, rigorously tests each feature, and consistently meets sprint
    milestones, leveraging Python, Java, and C++ expertise to build robust, efficient applications.
  sports: Tung Chang dedicates three evenings a week to structured weightlifting, hikes the Santa Clara foothills on weekends, and follows the San Jose Sharks and San Francisco 49ers with a critical eye,
    occasionally joining a weekend CrossFit class at a local gym.
  arts: Tung Chang unwinds after coding by delving into strategic board games like Go and Settlers of Catan, appreciating the intricate artwork of Yoshitaka Amano, streaming indie rock bands such as Tame Impala,
    and attending monthly screenings of classic Studio Ghibli films at a community theater.
  travel: Tung Chang prefers meticulously planned trips, balancing weekend road trips to Yosemite and a recent backpacking stint in the Redwoods with a long‑term goal of exploring Kyoto’s cherry blossom
    season, all while keeping travel costs low through savvy use of student discounts and budget airlines.
  culinary: Tung Chang enjoys moderate cooking, often whipping up spicy Thai green curry with fresh lemongrass and chilies, mastering the art of ramen broth, and pairing meals with artisanal cold brew,
    yet they admit to regularly ordering pizza after intense debugging sessions.
  core: Tung Chang is a routine‑driven, competitively spirited software aspirant who blends disciplined work habits with a love for strategic games, structured workouts, and meticulous financial planning,
    all while juggling occasional health niggles and a fondness for bold flavors.
background:
  cultural: Tung is a second‑generation East Asian American raised in a bilingual household where Mandarin and English are spoken. His family maintains traditional values such as respect for elders, emphasis
    on education, and celebration of cultural festivals like Lunar New Year and Mid‑Autumn Festival. Growing up in the multicultural environment of San Jose, Tung has been exposed to both his heritage’s
    culinary traditions—frequently cooking dim sum at home—and the broader Silicon Valley tech culture. This dual exposure informs his practical outlook, strong work ethic, and appreciation for community
    gatherings within local Asian cultural associations.
