  career_goals: Tung aims to secure an entry-level software engineering position at a technology firm where he can apply his practical coding skills and contribute to reliable, high-quality products. Over
    the next five years he aspires to become a senior engineer or technical lead, managing projects that emphasize efficiency and robustness. He plans to obtain industry certifications such as AWS Solutions
    Architect to broaden his expertise. In the longer term he hopes to leverage his competitive drive to launch a startup focused on automation tools that streamline routine workflows for small businesses.
