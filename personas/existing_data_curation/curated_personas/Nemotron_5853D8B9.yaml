personas:
  professional: Johanna Berry, a 77‑year‑old retired horticulturist and community historian, blends their lifelong expertise in gardening, bookkeeping, and event coordination with a methodical yet occasionally
    spontaneous approach to mentoring senior volunteers and preserving Stone County’s oral histories, embodying their practical, orderly mindset and gentle flexibility.
  sports: Johanna Berry enjoys low‑impact fitness through daily garden walks, participates in the Stone County senior bowling league, roots for the St. Louis Cardinals in baseball and the Kansas City Chiefs
    in football, and occasionally joins a springtime bird‑watching hike organized by the local nature club.
  arts: Johanna Berry knits while listening to the timeless folk harmonies of The Carter Family and the mellow crooning of Willie Nelson, reads historical novels by Laura Ingalls Wilder, contributes to
    the church choir performing classic hymns, and occasionally attends community theater productions of classic American plays such as 'Our Town'.
  travel: Johanna Berry plans their travel around well‑organized, low‑stress weekend getaways, favoring scenic drives to destinations such as Mackinac Island, the Blue Ridge Parkway, and the historic river
    town of Hermann, Missouri, where they can sample heritage foods, while their dream vacation is a relaxed river cruise along the Mississippi to witness the vibrant bird migrations they love.
  culinary: Johanna Berry, a seasoned home cook, bakes buttery apple crumble pies and cherry streusel tarts, deftly can and pickle summer vegetables using fresh herbs like dill and basil, and relishes occasional
    meals at the nearby farmhouse café where the specialty is fried chicken with homemade gravy and mashed potatoes.
  core: Johanna Berry, the steadfast garden‑keeper who meticulously logs every seed but sometimes forgets to water on rainy days, blends a love of tradition with spontaneous bird‑watching strolls, embodying
    quiet resilience, gentle generosity, and a habit of humming hymns while knitting.
background:
  cultural: Johanna is a white Midwestern American whose family traces its roots to German immigrants who settled in Missouri in the late 1800s. Raised in the small, close‑knit community of Spokane, Stone
    County, she grew up with Protestant (Methodist) values emphasizing modesty, self‑reliance, and communal support. These cultural influences shaped her practical outlook, love of tradition, and deep commitment
    to preserving local heritage.
attributes:
  skills: '["Vegetable & Herb Gardening", "Cooking & Food Preservation", "Sewing & Knitting", "First Aid", "Household Budgeting & Bookkeeping", "Volunteer Coordination", "Basic Home Maintenance", "Oral
