  hobbies: '["Seasonal Gardening", "Birdwatching", "Knitting & Crocheting", "Reading Historical Fiction", "Baking Family Recipes", "Walking Nature Trails", "Church Choir Participation", "Library Reading
    Circle Volunteering"]'
  career_goals: Even in retirement, Johanna aims to stay actively involved in her community by mentoring younger volunteers at the local senior center, preserving the oral history of Stone County through
    recorded interviews, and completing a handwritten memoir of her life's lessons. She also hopes to maintain her health to continue leading the weekly garden club and to contribute occasional articles
    to the county’s historical newsletter.
