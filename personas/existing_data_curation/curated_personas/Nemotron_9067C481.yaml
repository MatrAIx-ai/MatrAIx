  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''DIY Carpentry'', ''Reading Nonfiction (History, Technology, Self‑Improvement)'', ''Community Theater Volunteering'', ''Mindfulness Meditation'',
