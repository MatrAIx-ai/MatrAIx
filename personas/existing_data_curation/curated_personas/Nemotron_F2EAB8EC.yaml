personas:
  professional: Darcy Bausch, a 51-year-old facilities specialist at a large commercial complex, leverages their OSHA expertise, meticulous scheduling skills, and calm conflict-resolution style to keep
    warehouses spotless while training crews, and they are now positioning themselves for a supervisory role and the Certified Facility Manager credential.
  sports: Darcy Bausch enjoys low-impact fitness through a local seniors' walking club, proudly roots for the Dallas Cowboys and the Houston Astros, and volunteers as a scorekeeper for the Midland community
    baseball league, while a weekly game of shuffleboard at the senior center satisfies their competitive streak without straining their joints.
  arts: Darcy Bausch sings soprano in the church choir, knitting intricate pattern blankets while listening to gospel legend Kirk Franklin and country icons George Strait, devours mystery novels by Agatha
    Christie and Sue Grafton, and finds creative release in quilting projects inspired by the folk art of Frida Kahlo, which they display at the community center art fair.
  travel: Darcy Bausch prefers road-trip itineraries that blend structured planning with purposeful stops, having mapped out a summer visit to Santa Fe's art market, a cultural weekend in San Antonio's
    River Walk, and a nostalgic drive to the historic Hill Country ranches, while their budgetary prudence keeps spontaneous overseas travel on the back-burner.
  culinary: Darcy Bausch whips up Tex-Mex comfort meals like smoky chicken enchiladas, slow-cooked chili con carne with pinto beans, and cheesy quesadillas topped with fresh cilantro and sliced jalapenos,
    boasting a solid 6-out-of-10 cooking skill but often over-salting dishes as a quirk they attribute to their love of bold flavor.
  core: Darcy Bausch, a methodical 51-year-old facility manager with a choir-loving heart, balances a steadfast need for order and worry-ridden vigilance, finding calm in gardens, quilts, and community
    service while quietly plotting a future cleaning-service empire.
background:
  cultural: Darcy is a white Texan of likely German-American ancestry, reflected in her surname Bausch. She was raised in Midland and has deep roots in the West Texas community, where the oil industry and
    ranching culture intersect. Her upbringing emphasized practicality, a strong work ethic, and close‑knit social ties, often centered around church and community gatherings. She values modesty, hospitality,
    and self-reliance, and draws on both the rugged, independent spirit of the region and the collaborative, family‑oriented traditions of her heritage.
attributes:
  skills: '[''Commercial cleaning'', ''OSHA safety compliance'', ''Minor facility repairs'', ''HVAC filter replacement'', ''Inventory management'', ''Scheduling and shift coordination'', ''Staff training
    and mentorship'', ''Customer service and conflict resolution'', ''Record-keeping and documentation'', ''Physical stamina and proper lifting techniques'']'
  hobbies: '[''Church choir participation'', ''Community clean-up volunteering'', ''Backyard gardening'', ''Quilting and knitting'', ''Walking group outings'', ''Bingo and card games'', ''Reading mystery
    novels'', ''Helping organize local rodeo events'', ''Cooking Tex-Mex comfort food'']'
  career_goals: Darcy aims to move into a supervisory role within the facilities department, overseeing a team of cleaners and taking responsibility for broader building-maintenance planning. She plans
    to complete her associate degree in business administration and earn a Certified Facility Manager (CFM) credential. Long-term, she envisions starting her own cleaning service that emphasizes reliability,
    safety, and personalized client care for small businesses in Midland. She also hopes to mentor younger employees and become an advocate for workplace well‑being, reducing stress for herself and her
    colleagues.
