personas:
  professional: Karen Mercado, a veteran personal care aide with over three decades of experience, leverages their disciplined organizational skills and curiosity for emerging caregiving technology to coordinate
    meticulous care plans, train junior staff, and champion evidence‑based elder‑care policies as they work toward a Certified Geriatric Care Manager credential.
  sports: Karen Mercado stays fit through gentle yoga classes for seniors, daily walks along the Jacksonville Riverwalk, and birdwatching excursions at the nearby wetlands, while they cheer on the Jacksonville
    Jaguars and the Jacksonville Jumbo Shrimp as favorite local sports teams.
  arts: Karen Mercado nurtures their creative side by quilting with a neighborhood group, volunteering in a senior center’s arts‑and‑crafts program, participating in a local book club that discusses authors
    like Maya Angelou and Toni Morrison, and drawing inspiration from folk painter Howard Finster and the soulful music of Aretha Franklin during leisure time.
  travel: Karen Mercado prefers low‑key, culturally rich getaways, often planning week‑long road trips to historic coastal towns such as Savannah, Georgia, or taking short cruises to the Bahamas to sample
    Caribbean flavors, while they balance a modest travel budget and occasional health considerations that favor short flights and accessible accommodations.
  culinary: Karen Mercado delights in cooking Southern comfort dishes like shrimp and grits and collard greens, infusing them with Caribbean twists such as jerk‑seasoned chicken and plantain mash, while
    they harvest fresh herbs from their native Florida garden—especially rosemary, thyme, and saw palmetto leaves for garnish—and experiment with spices like allspice and scotch bonnet peppers.
  core: Karen Mercado is a meticulously organized senior caregiving expert who balances a love of solitary gardening and genealogy with community‑focused volunteering, disciplined finances, and a steady
    pursuit of professional advancement.
background:
  cultural: Karen was born and raised in Jacksonville, Florida, within a middle‑class, white Southern family that emphasized community, faith, and respect for elders. Her upbringing in the historic Riverside
    district exposed her to the region’s blend of traditional Southern hospitality and the cultural diversity of a growing coastal city. Active in her local Episcopal church, she has participated in community
    service and seasonal festivals that celebrate Florida’s coastal heritage. These experiences have fostered a strong sense of duty to care for the elderly, a value deeply rooted in Southern cultural norms,
    while also encouraging an open‑minded curiosity about new ideas and practices.
