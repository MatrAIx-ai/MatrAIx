  career_goals: Sharon hopes to translate her community‑focused talents into a part‑time role as a volunteer coordinator for a local nonprofit, where she can design and run workshops that empower other
    adults returning to the workforce. She is also considering a small home‑based catering venture that blends her love for cooking with her knack for event organization. To broaden her options, she plans
    to enroll in a GED preparation class and pursue a certification in CPR and first aid, which would qualify her for caregiving or support roles within senior centers.
