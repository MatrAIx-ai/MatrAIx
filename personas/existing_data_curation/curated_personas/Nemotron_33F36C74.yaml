personas:
  professional: Anabel Pader, a seasoned heavy‑vehicle and mobile‑equipment service technician with three decades of experience, excels at diagnosing diesel, hydraulic, and electrical systems while mentoring
    bilingual apprentices, and they aim to transition into a supervisory role and earn an ASE Master Technician certification before launching a mobile repair venture.
  sports: Anabel Pader stays active by hiking the Texas Hill Country every weekend, supports the Dallas Cowboys and San Antonio Spurs as a dedicated fan, and they occasionally join a local hiking group
    for organized treks, balancing leisurely outdoor activity with team‑sports enthusiasm.
  arts: Anabel Pader immerses herself in regional folk music and classic rock, regularly listening to bands like Los Tigres del Norte and The Rolling Stones, and they channel this passion by helping organize
    live performances at parish cultural festivals.
  travel: Anabel Pader favors road‑trip adventures that blend family reunions in historic Southwest towns such as Santa Fe with relaxing stays at Hill Country vineyards, and they rely on a carefully planned
    itinerary that respects a fixed travel budget while seeking authentic cultural experiences.
  culinary: Anabel Pader skillfully prepares traditional Mexican dishes such as enchiladas verdes, pozole, and carne asada, enhancing them with locally sourced Texas ingredients like garden‑grown cilantro,
    jalapeños, and pecans, and they relish experimenting with hybrid flavors like smoked brisket tacos.
  core: Anabel Pader is a pragmatic, 60‑year‑old heavy‑vehicle expert who balances meticulous work, community service, and a love for vintage tools with spicy home cooking, while they cautiously manage
    finances but occasionally splurge on hobby collectibles.
background:
  cultural: Anabel grew up in a bilingual Mexican‑American household, preserving family traditions such as Dia de los Muertos, quinceañeras, and weekly Sunday tamale gatherings. Though deeply rooted in
    Mexican heritage, she has embraced Texan customs, celebrating events like the State Fair and local rodeos. Her Catholic faith and strong emphasis on family cohesion shape her community involvement and
    the values she imparts to her grandchildren. Living in Belton, she blends her cultural identity with the region’s modest-town spirit, fostering connections across both her Mexican and Texan neighborhoods.
attributes:
  skills: '["Heavy-duty diesel engine repair", "Hydraulic system troubleshooting", "Electrical wiring and diagnostics", "Preventive maintenance planning", "Welding and metal fabrication", "Fleet management
