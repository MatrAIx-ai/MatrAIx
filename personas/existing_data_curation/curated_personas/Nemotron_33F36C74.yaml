  hobbies: '["Cooking traditional Mexican dishes", "Gardening", "Participating in church outreach events", "Attending local cultural festivals", "Listening to regional Mexican folk music and classic rock",
    "Hiking in the Texas Hill Country", "Collecting vintage hand tools", "Reading automotive repair manuals and trade magazines", "Learning traditional Mexican folk dancing", "Mentoring youth in vocational
    programs"]'
  career_goals: Approaching retirement, Anabel aims to transition into a supervisory role where she can shape maintenance policies and oversee a team of technicians at a regional construction or logistics
    firm. She also aspires to earn an ASE Master Technician certification and become a certified instructor for a local vocational program, sharing her expertise with the next generation of tradespeople.
    In the longer term, she envisions launching a modest mobile‑equipment repair service that caters to small contractors and community organizations, ensuring a lasting professional legacy.
