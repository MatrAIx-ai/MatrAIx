    awareness'']'
  hobbies: '[''Watercolor painting'', ''Visiting art exhibitions'', ''Reading historical fiction and biographies'', ''Gardening (heirloom tomatoes, native prairie flowers)'', ''Hiking local trails'', ''Yoga'',
    ''Volunteering at the historical museum'', ''Quilting'']'
  career_goals: Brandy aims to become the department chair for English and Social Studies within the next three years, using that role to embed arts‑infused learning across the curriculum. She is planning
    to pursue a Doctorate in Educational Leadership to deepen her expertise in school reform and to lead a district‑wide initiative that creates a partnership with the local historical society for experiential
    learning modules. Additionally, Brandy hopes to author a series of instructional guides for integrating visual arts into secondary humanities classes and to mentor a cohort of teachers through a peer‑learning
    network that emphasizes creative teaching strategies. In the long term, she envisions establishing an after‑school arts program that serves both students and the wider Mantorville community.
