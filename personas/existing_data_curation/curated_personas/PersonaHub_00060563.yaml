persona_description: A researcher in cognitive psychology who studies the interaction between the two hemispheres of the brain during reading, particularly in the case of Arabic. She is interested in the
  cognitive burden and difficulty readers of Arabic face when reading the language and how this relates to the differences in the way the brain processes Arabic and Hebrew. Her research focuses on the role
  of pedagogy in improving reading skills among regular readers and those having difficulty.
