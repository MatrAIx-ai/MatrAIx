  career_goals: Although retired, Chad aims to keep his intellectual and creative life active. He plans to complete a collection of memoir essays that weave together his personal history with reflections
    on Midwestern art. He hopes to curate a traveling showcase of local folk art that can tour libraries and senior centers across Tippecanoe County. He aspires to launch an online blog where he shares
    his photography, art commentary, and occasional poetry, building a modest but engaged readership. Chad also wishes to mentor emerging artists through a volunteer program at the Lafayette Art Center,
    offering guidance on research and exhibition planning. Finally, he intends to continue his lifelong learning by attending workshops on contemporary art theory and advanced digital imaging techniques.
