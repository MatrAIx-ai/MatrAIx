personas:
  professional: Chad Gibas, a retired humanities scholar turned community arts curator, blends his deep knowledge of American folk art with a relaxed, curiosity‑driven approach to volunteer coordination,
    using his photography and writing skills to design intimate exhibitions and mentor emerging artists at the Lafayette Art Center.
  sports: Chad Gibas enjoys early‑morning bird‑watching walks, plays senior tennis twice a week at the Lafayette Community Center and follows the Indianapolis Colts, Indiana Pacers, and the Purdue Boilermakers,
    while he’s a member of the River Trail Seniors walking club that meets for gentle hikes each fall.
  arts: Chad Gibas immerses himself in Midwestern folk art, collecting prints by Grandma Moses and paintings by Grant Wood, reads poetry by Mary Oliver and Langston Hughes, writes his own verses, and regularly
    attends intimate acoustic concerts featuring folk duo The Both and poetry readings by local artist Natalie Stephenson at ArtSpace Lafayette.
  travel: Chad Gibas prefers low‑key, weekend road trips to regional folk festivals – from the Brown County Autumn Festival to the Covered Bridge Celebration in Parke County – while dreaming of a summer
    pilgrimage to Amsterdam’s Van Gogh Museum and a fall retreat in New England’s historic towns.
  culinary: Chad Gibas, a confident home gardener, delights in cooking garden‑fresh succotash with heirloom corn, sweet peas, and fresh basil, savors his signature apple‑honey pie, and occasionally prepares
    simple pan‑fried catfish seasoned with wildflower honey and lemon, reflecting his love for seasonal, locally sourced ingredients.
  core: Chad Gibas is a curious, softly‑spirited senior who journals his worries into poetry, forgets to file taxes until the last minute, and finds solace in wildflower gardens and vintage folk art.
background:
  cultural: Chad was born and raised in a small Indiana town, part of a middle‑class family with German and Irish ancestry. His upbringing reflected classic Midwestern values—modesty, self‑reliance, and
    community hospitality—while his parents encouraged curiosity and appreciation for the arts, often taking him to community theater productions and county fairs. He attended a public high school where
    he participated in a modest art club, later pursuing a Bachelor of Arts in Humanities at a state university. After college, he spent decades working in and around the local cultural sector, which deepened
    his connection to regional art traditions. Though now divorced and retired, his cultural identity remains rooted in the Midwestern ethos, blended with a lifelong openness to new ideas and artistic expression.
