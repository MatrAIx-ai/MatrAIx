  career_goals: Nicole aims to become a Certified Veterinary Technician (CVT) within the next two years and eventually take on a lead‑technician role at her clinic. She is interested in specializing in
    small‑animal orthopedics and dental care, and she plans to attend continuing‑education courses to build those competencies. Long‑term, Nicole dreams of launching a community outreach program that offers
    low‑cost preventive veterinary services for underserved families in Medina County, and she hopes to mentor new technologists by sharing her practical knowledge and collaborative style.
