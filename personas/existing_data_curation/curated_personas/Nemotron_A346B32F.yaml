  hobbies: '[''Basketball'', ''Hip‑hop/R&B and gospel music'', ''Dancing'', ''Cooking Haitian and Creole dishes'', ''Fishing'', ''Church youth ministry volunteering'', ''Community clean‑up projects'', ''Video
    gaming'', ''Social media content creation'']'
  career_goals: Felix aims to obtain his GED within the next year and then enroll in a community college program where he can study marine technology or business administration. He is attracted to a career
    that offers clear structure, teamwork, and the opportunity to serve his community—such as a logistics coordinator at the nearby Naval Air Station, a marine environmental technician, or a public safety
    officer. As a backup plan, he is considering enlisting in the U.S. Navy to gain technical training and discipline, with the long‑term goal of returning to Pensacola to mentor younger residents and help
    organize community programs.
