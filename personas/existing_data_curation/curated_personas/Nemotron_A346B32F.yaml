personas:
  professional: Felix Barthelemy is an aspiring marine technology student who leverages their strong teamwork, organization, and hands‑on mechanical skills to coordinate volunteer projects now, while planning
    to translate that discipline into a logistics role at the nearby Naval Air Station after college.
  sports: Felix Barthelemy plays pickup basketball at the Pensacola park and competes in the city’s youth league, follows the Miami Heat, the New Orleans Saints, and the Pensacola Blue Wahoos, and integrates
    daily fishing trips into their fitness routine, balancing team sport enthusiasm with solo outdoor activity.
  arts: Felix Barthelemy immerses themselves in hip‑hop and R&B by streaming Kendrick Lamar and H.E.R., finds spiritual uplift in gospel artist Tasha Cobbs, dances to local DJ sets at church youth events,
    and crafts short video edits set to these tracks using Canva and Photoshop.
  travel: Felix Barthelemy enjoys spontaneous weekend drives to Gulf Coast beaches, road‑trips to New Orleans for its music scene, and dreams of sailing to the Caribbean for a cultural immersion, planning
    most journeys with a shared spreadsheet and a modest travel budget.
  culinary: Felix Barthelemy boasts an intermediate skill level in cooking traditional griot, rice‑and‑beans, fried plantains, and pepper‑spiced shrimp gumbo, loves the aroma of Scotch bonnet peppers and
    fresh cilantro, and often hosts family meals where recipes are passed down through Creole storytelling.
  core: Felix Barthelemy blends disciplined ambition with a lively community spirit, juggling school, volunteer work, and weekend fishing while occasionally procrastinating on paperwork and indulging in
    late‑night gaming marathons.
background:
  cultural: Felix is African American with Haitian heritage; his family emigrated from Haiti in the early 2000s and settled in Pensacola’s historically Black neighborhoods. He grew up immersed in both Southern
    and Caribbean cultural traditions—attending church services, celebrating Haitian Independence Day, and participating in local Juneteenth events. Creole phrases and Haitian cuisine are part of his household,
    while he also embraces the broader African‑American community’s music, food, and communal values, shaping a bicultural identity that influences his outlook and daily life.
attributes:
  skills: '[''Effective communication'', ''Team collaboration'', ''Event planning and coordination'', ''Basic computer literacy'', ''Social media content creation'', ''Introductory graphic design'', ''Basic
