personas:
  professional: Preeti Eddy, an aspiring junior architect, combines their love for building detailed LEGO architecture sets with a practical, organized mindset, turning each model into a miniature lesson
    in structural design while confidently leading their Girl Scout project teams.
  sports: Preeti Eddy, a dedicated midfielder on the Valrico Community Soccer League, trains thrice weekly, draws tactical inspiration from Orlando City SC’s playmaking, roots for the Tampa Bay Buccaneers
    on Sundays, cheers for the Tampa Bay Lightning during winter, and balances their love for team sports with a personal goal of improving endurance through weekend hikes.
  arts: Preeti Eddy nurtures their artistic side by practicing piano pieces by Ludwig van Beethoven and Ludovico Einaudi three times a week, immersing themselves in fantasy novels by J.K. Rowling and C.S.
    Lewis, and attending local community theater productions featuring actors like Lin‑Manuel Miranda, while their playlists often include songs from Taylor Swift and The Piano Guys, reflecting a blend
    of classical discipline and modern pop enthusiasm.
  travel: Preeti Eddy delights in family road trips to the Everglades for wildlife hikes, annual visits to coastal Orlando for theme‑park adventures, a summer camp expedition to the Great Smoky Mountains,
    and dreams of a future exchange program in London to explore historic libraries, favoring detailed itineraries that balance educational stops with fun breaks, and they always make sure to pack a notebook
    for sketching the sights.
  culinary: Preeti Eddy enjoys helping their mother prepare Southern‑style barbecue chicken and creamy mac and cheese, experiments with making simple strawberry‑banana smoothies blended with Greek yogurt,
    and can independently assemble a fresh garden salad using lettuce, cherry tomatoes, and cucumbers, though they occasionally forget to wash their hands before cooking.
  core: Preeti Eddy is a meticulously organized 11‑year‑old who channels their love for structured LEGO builds, disciplined piano practice, and community service into a calm resilience tempered by a quiet
    craving for spontaneous snack breaks.
background:
  cultural: Preeti comes from a white, European‑American family with German and Irish roots, living in the suburban community of Valrico, Florida. Her household observes typical American holidays such as
    Thanksgiving, Christmas, and Fourth of July celebrations, often with a Southern twist that includes barbecue gatherings and church potlucks. The family attends a local United Methodist church, where
    community service and fellowship are emphasized. Growing up in Hillsborough County, she is exposed to a blend of coastal life, nearby wildlife preserves, and a multicultural school environment that
    encourages respect for diverse traditions while maintaining a strong sense of her own regional identity.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Basic mathematics'', ''Digital literacy'', ''Organizational skills'', ''Team collaboration'', ''Scratch programming'', ''Time management'',
