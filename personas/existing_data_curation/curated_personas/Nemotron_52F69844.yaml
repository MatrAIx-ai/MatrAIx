  hobbies: '[''Reading fantasy novels'', ''LEGO building'', ''Soccer'', ''Journaling'', ''Piano practice'', ''Nature hikes'', ''Girl Scouts activities'']'
  career_goals: Preeti dreams of becoming a civil engineer who designs safe, sustainable community spaces such as parks and bike trails. She is drawn to the clear structure and step‑by‑step planning inherent
    in engineering, and she hopes to combine her love of organization with a desire to make her hometown a better place. In the near term, she aims to earn a STEM badge from the Girl Scouts, join her school's
    robotics club, and attend a summer engineering camp. Over the next decade she envisions studying engineering in college, securing internships with local infrastructure firms, and eventually leading
    projects that blend practical design with environmental stewardship.
