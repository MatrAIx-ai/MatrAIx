  hobbies: '[''Journal writing'', ''Baking and pastry making'', ''Herb gardening'', ''Crossword and Sudoku puzzles'', ''Church youth group event planning'', ''Beginner yoga'', ''Listening to classic rock'',
    ''Reading self‑help literature'']'
  career_goals: Heidi aims to obtain her GED within the next year and enroll in a community‑college program for medical assisting, a field that aligns with her love of routine and helping others. She envisions
    working as a certified medical assistant or a dental office receptionist, roles that offer predictable schedules, clear procedures, and the opportunity to apply her organizational strengths. In the
    longer term, she aspires to complete a certification in radiologic technology or health‑care administration, providing a stable career path that can support her family and give her a sense of security.
