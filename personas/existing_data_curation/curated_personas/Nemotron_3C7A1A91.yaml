personas:
  professional: Nancy Carlson, a seasoned painter and paperhanger with 25 years of hands‑on experience, blends meticulous surface preparation with a curiosity for eco‑friendly finishes, steering their freelance
    business toward a boutique interior‑finishing studio while they juggle a relaxed, sometimes disorganized schedule that still meets client deadlines.
  sports: Nancy Carlson follows the Dallas Cowboys and the Houston Astros, joins a weekend community walking club that doubles as gentle cardio for their yoga routine, and occasionally participates in a
    local adult softball league, preferring low‑impact activities that accommodate their back concerns.
  arts: Nancy Carlson expresses themselves through watercolor paintings inspired by the luminous palettes of John Singer Sargent and contemporary master Alvaro Castagnet, while they decompress with mystery
    novels by Agatha Christie and Gillian Flynn, and regularly attend the downtown art gallery’s monthly openings.
  travel: Nancy Carlson prefers flexible, self‑driven road trips that blend scenic relaxation with creative inspiration, often exploring Texas Hill Country’s vineyards, the historic streets of Santa Fe,
    and the vast landscapes of Big Bend National Park, planning itineraries loosely to leave room for spontaneous stops at local craft markets, allowing them to recharge between work projects.
  culinary: Nancy Carlson is a confident backyard chef who masters Texas‑style barbecue, routinely slow‑smoking brisket with mesquite wood and rubs of paprika, cumin, and brown sugar, while they also craft
    vibrant garden salads featuring heirloom tomatoes, basil, and lemon vinaigrette, and occasionally bake a crusty sourdough loaf to share with friends.
  core: Nancy Carlson is a 50‑year‑old painter‑entrepreneur whose love of eco‑friendly finishes, backyard BBQ, and watercolor art is balanced by a flexible, sometimes chaotic schedule and a keen sensitivity
    that fuels both creative bursts and occasional bouts of anxiety, prompting them to seek mindfulness whenever stress spikes.
background:
  cultural: Nancy was born and raised in McKinney, Texas, in a family with German‑American roots that settled in the state in the early 20th century. Growing up in a close‑knit suburban community, she absorbed
    the Texan values of hospitality, self‑reliance, and a strong work ethic. Her family’s Protestant background emphasized community service and modesty, and she spent her teenage years helping with home
    repairs and yard work, which sparked her interest in trades. After graduating from the local high school, she entered the painting and paper‑hanging trade, blending the practical, hands‑on ethos of
    her upbringing with a curiosity for new materials and techniques. The blend of Southern hospitality, Midwestern pragmatism, and a willingness to experiment shapes her personal and professional outlook
    today.
attributes:
  skills: '[''Surface preparation and repair'', ''Wallpaper removal and installation'', ''Interior painting and finishing'', ''Custom colour consultation'', ''Estimating and budgeting'', ''Client communication
