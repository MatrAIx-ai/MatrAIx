  hobbies: '[''Gardening (vegetables and flowers)'', ''Watercolor painting'', ''DIY home‑improvement projects'', ''Reading mystery novels'', ''Yoga and meditation'', ''Cooking Texas‑style barbecue'', ''Volunteering
    at church community events'', ''Exploring local nature trails'', ''Collecting vintage hand tools'']'
  career_goals: Nancy aims to grow her independent painting and paper‑hanging business into a boutique interior‑finishing studio that offers high‑quality, eco‑friendly coatings and custom colour consulting.
    Over the next five years she plans to obtain a Master Painter certification, hire two apprentices to share the workload, and secure regular contracts with local real‑estate agents and renovation firms
    to achieve a steadier income stream. At the same time, she wants to maintain the flexibility that allows her to balance work with self‑care, ensuring her schedule can accommodate periods for mindfulness
    practice and family time.
