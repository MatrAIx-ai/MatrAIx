personas:
  professional: Reshonda Sneed, a five-year-old budding scientist who loves tinkering with Lego blocks and simple DIY experiments, balances curiosity with practicality by asking how things work while actually
    building functional contraptions for playtime, yet often leaves pieces scattered due to a relaxed attitude toward organization, and thrives when collaborating with peers in preschool group projects.
  sports: Reshonda Sneed, a five-year-old with boundless energy, dashes around the playground during recess, loves the organized chaos of preschool soccer in the Little League Jr. Tigers and proudly wears
    a cap of the Chicago Cubs, yet their disorganized nature leads them to forget to bring their water bottle after games, prompting occasional reminders from parents.
  arts: Reshonda Sneed, a five-year-old who spends afternoons drawing vibrant characters inspired by Dr. Seuss and Mo Willems, sings along to The Wiggles and Raffi while dancing in the living room, and
    eagerly watches Disney movies starring Mickey Mouse and Elsa from Frozen, letting these colorful stories shape their imaginative play.
  travel: Reshonda Sneed, a five-year-old who loves road trips with plush toys in the backseat, has explored the city's children's museum and a sunny day at Disneyland, dreams of feeling sand between their
    toes at Hawaii's Waikiki Beach, and prefers trips that blend playful activities with familiar routines to ease their occasional worries.
  culinary: Reshonda Sneed, a five-year-old with a budding love for cooking, eagerly spreads peanut butter and strawberry jam on whole-grain toast, devours cheesy macaroni, squeals with delight over mini
    pizza slices topped with pepperoni and extra mozzarella, and often forgets to wash their hands after snack time, prompting gentle reminders from caregivers.
  core: Reshonda Sneed, a five-year-old whirlwind of curiosity and social energy, balances relentless questions with a habit of misplacing toys and worrying about tiny setbacks.
background:
  cultural: Reshonda is an African‑American girl raised in Lickingville, a small rural community in Clarion County, Pennsylvania. Her family maintains strong ties to African‑American cultural traditions,
    celebrating holidays such as Juneteenth and attending Sunday church services where gospel music and storytelling are central. At home she enjoys soul‑food meals like collard greens and cornbread, and
    hears family stories about Southern roots. While the local area is predominantly white, her extended family and church community provide a close‑knit support network that blends African‑American heritage
    with the neighborly, self‑reliant values of rural Pennsylvania.
