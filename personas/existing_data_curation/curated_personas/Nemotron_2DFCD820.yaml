  career_goals: Even at five, Reshonda dreams about future roles that reflect her love of learning and caring for others. She often says she wants to be a teacher to help friends understand new ideas, a
    veterinarian because she is fascinated by animals, and an astronaut to explore the unknown. She also imagines becoming a community helper, like a librarian or youth coach, where she can share her enthusiasm
    and practical skills with peers.
