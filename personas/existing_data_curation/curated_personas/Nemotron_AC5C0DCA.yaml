  career_goals: Terall dreams of one day becoming a wildlife biologist who explores forests and helps protect animals, a goal that blends her love of nature with a practical desire to make a difference.
    She also imagines being a teacher, sharing stories and knowledge with other children. Her ambitions are shaped by her curiosity about how things work and her practical mind that wants to see tangible
    results from her efforts.
