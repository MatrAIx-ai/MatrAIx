persona_description: A radiologist with expertise in bone tumour imaging, particularly skilled in the interpretation of x-rays and computed tomography (CT) scans, and knowledgeable in the management of
  bone tumours through the use of diagnostic imaging and other investigation techniques. They have a thorough understanding of the anatomy, pathophysiology, and management of various types of bone tumours,
  and are proficient in the use of diagnostic imaging modalities for the initial diagnosis, staging, and follow-up of bone tumour patients. They are also well-versed in the use of advanced imaging techniques
  such as computerised tomography (CT) and magnetic resonance imaging (MRI) in the management of bone tumours. Additionally, they have a strong understanding of the role of radiology in the management of
  bone tumours, including the use of radiology in the initial diagnosis, staging, and follow-up of patients, as well as the use of imaging in the management of bone tumour patients, including the use of
  imaging in the planning and evaluation of treatment options and the detection of secondary malignancies.
