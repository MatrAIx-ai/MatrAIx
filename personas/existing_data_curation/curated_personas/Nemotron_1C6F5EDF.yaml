  career_goals: Sueella dreams of becoming a teacher or a community health worker who can help children and families stay healthy and happy. She imagines herself in a classroom where she can share knowledge
    in a caring, supportive way, and she also envisions working at a local clinic or school health office, offering comfort and guidance to kids who feel anxious or sad. Her long-term ambition is to create
    a safe, nurturing environment where everyone feels heard and valued.
