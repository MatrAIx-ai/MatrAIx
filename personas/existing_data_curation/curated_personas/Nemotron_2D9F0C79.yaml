personas:
  professional: David Burroughs, an aspiring project coordinator, blends meticulous Excel dashboards, basic Python data wrangling, and adept event‑planning skills to keep manufacturing teams on schedule,
    while their outgoing, assertive communication style ensures smooth conflict resolution and team motivation.
  sports: David Burroughs hits the campus gym for weight training, competes in intramural soccer and basketball leagues, cheers on the New England Patriots and Boston Celtics, and plays pickup basketball
    every Thursday with the Springfield Athletic Club.
  arts: David Burroughs strums a battered Fender Strat during weekend jam sessions, draws songwriting inspiration from Arctic Monkeys and Tame Impala, and never misses live shows by local indie bands, while
    winding down with binge‑watching Stranger Things and catching Jim Gaffigan comedy specials.
  travel: David Burroughs favors spontaneous weekend road trips, having already explored Boston’s Freedom Trail, the music scene of Nashville, and a quick getaway to Washington, D.C., while they dream of
    backpacking through the Scottish Highlands after graduation.
  culinary: David Burroughs showcases a solid home‑cooking repertoire, regularly serving spicy chicken tacos with cilantro‑lime slaw, creamy shrimp pasta carbonara with parmigiano, and experimental avocado‑toast
    pizza topped with feta and cherry tomatoes for friends.
  core: David Burroughs balances a methodical project‑coordination mindset with a love for late‑night gaming marathons, occasional snack‑laden study sessions, and an unstoppable habit of shouting "goal!"
    during board‑game victories.
background:
  cultural: Raised in Springfield, Illinois, David comes from a middle-class white Midwestern family with German and Irish ancestry. His upbringing reflects the region’s emphasis on practicality, community
    involvement, modesty, and a strong work ethic. He grew up celebrating local traditions, participating in community events, and being exposed to the civic culture of the state capital, shaping his values
    of reliability, cooperation, and a desire to contribute to his community.
