  career_goals: He plans to finish his bachelor's degree in Business Administration within two years, secure an entry-level project coordinator role with a local manufacturing or logistics company, earn
    a PMP certification, and eventually move into project management. He also aspires to lead community outreach initiatives and mentor younger students, blending his career with civic service.
