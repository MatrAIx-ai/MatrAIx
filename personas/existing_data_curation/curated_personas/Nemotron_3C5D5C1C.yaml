    (interactive whiteboards, basic coding)'', ''Intercultural curriculum development'', ''Support for special‑needs learners'']'
  hobbies: '[''Watercolor painting'', ''Pottery'', ''Playing the dutar (traditional string instrument)'', ''Cooking Central Asian cuisine (plov, samsa, manty)'', ''Attending art galleries and museum exhibitions'',
    ''Participating in multicultural festivals'', ''Senior book club'', ''Yoga and mindfulness practice'', ''Herb gardening'', ''Storytelling workshops at senior center'']'
  career_goals: Jannat hopes to transition from full‑time teaching to a mentorship role, guiding newly‑qualified teachers in applying arts‑rich, student‑centered methods. She plans to author a handbook
    on nurturing emotional resilience in elementary classrooms, drawing on her own experiences with anxiety. Additionally, she dreams of establishing an intergenerational arts program in Roseville that
    brings together seniors and schoolchildren to share traditional Central Asian crafts, stories, and music, thereby leaving a lasting community legacy.
