personas:
  professional: Jannat Ng, a veteran elementary and middle‑school teacher, merges deep pedagogical theory with an impulsive, arts‑driven classroom style, designing experiential projects that weave watercolor,
    pottery, and dutar music into core subjects while using their multilingual fluency to foster inclusive, emotionally supportive learning environments.
  sports: Jannat Ng, a lifelong fan of the Minnesota Twins and an enthusiastic member of the Roseville Seniors’ Walking Club, embraces gentle fitness through morning walks in City Park, weekly senior yoga
    sessions, and occasional low‑impact pickleball games, preferring leisurely activity over competitive sports while cheering on the Twins during the baseball season.
  arts: Jannat Ng, whose afternoons are filled with watercolor studies of Monet’s lilies and pottery inspired by contemporary ceramicist Akiko Hirai, also finds solace in practicing the dutar after listening
    to master musician Abdulla’s folk melodies, and regularly attends Roseville’s multicultural festivals to admire performances by the Minnesota Symphony Orchestra and spoken‑word poet Maya Angelou’s tribute
    shows.
  travel: Jannat Ng, who favors thoughtfully planned cultural excursions over spontaneous trips, has journeyed to the historic streets of Kyoto, the rolling vineyards of Tuscany, and the vibrant souks of
    Marrakech, yet now prefers relaxed weekend getaways to nearby Acadia National Park and day trips to the historic district of St. Paul, balancing a modest travel budget with a deep curiosity for art
    and heritage.
  culinary: Jannat Ng, an adept home chef, delights in preparing aromatic plov with saffron‑infused rice, carrots, and tender lamb, crafting flaky samsa stuffed with spiced pumpkin and herbs from their
    garden, and frequently experiments with fresh mint, dill, and rosemary to elevate both traditional and contemporary dishes for community potlucks.
  core: Jannat Ng embodies a vibrant mix of spontaneous artistic curiosity and deep empathy, juggling a love for watercolor, pottery, and dutar music with occasional anxiety‑driven forgetfulness, making
    each day a lively tapestry of creative projects, gentle yoga, and heartfelt storytelling.
background:
  cultural: Jannat was born to a Kazakh‑Uzbek family in the steppes of Central Asia, where oral storytelling, folk music, and vibrant textile arts were everyday joys. She grew up celebrating Navruz, tasting
    homemade pilaf, and learning poetry from Rumi and Abai. Immigrating to the United States as a young adult, she retained her native languages (Kazakh and Russian) while mastering English, allowing her
    to bridge cultures in her teaching. In Roseville, she remains active in the local Central Asian diaspora, organizing cultural evenings, sharing traditional crafts with students, and blending her heritage’s
    emphasis on hospitality and communal harmony with the inclusive values of her adopted community.
attributes:
  skills: '[''Experiential and project‑based lesson design'', ''Art integration across curricula'', ''Multilingual instruction (Kazakh, Russian, English)'', ''Student mentorship and emotional support'',
