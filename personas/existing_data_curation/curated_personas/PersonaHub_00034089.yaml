persona_description: 'A psychoanalyst and parenting expert who has practiced for 25 years, focusing on the damaging effects of overparenting and providing solutions for raising successful, confident children.
  She has written a book called "Teach Your Children Well: Parenting for Authentic Success" and has spoken to the Post about the importance of listening to children and avoiding praise that is empty or
  thoughtless. Grosz''s research on the effects of praise on children''s confidence has led to the publication of a book called "The Examined Life" and he has also written about the importance of listening
  to children and avoiding praise that is empty or thoughtless. Grosz''s research has led to a better understanding of the damaging effects of overparenting and he has provided solutions for raising successful,
  confident children.'
