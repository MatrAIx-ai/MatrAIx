  career_goals: David’s career aspirations reflect his blend of competition and practicality. He hopes to earn a high‑school sports scholarship—particularly in baseball—so he can attend a school with strong
    STEM and vocational programs. Ultimately, he sees himself either as a professional esports competitor, leveraging his strategic gaming skills, or as an automotive technician, applying his hands‑on mechanical
    talent. He aims to complete a technical certification after high school, ensuring a clear, structured path to a stable career while keeping the door open for competitive gaming.
