personas:
  professional: David Black is a budding robotics enthusiast who spends afternoons in the middle school robotics club building competition‑ready machines, applying hands‑on craftsmanship learned from weekends
    in the garage while juggling a habit of leaving soldering tools scattered around his room, reflecting his preference for practical tasks over strict planning.
  sports: David Black is a committed pick‑up basketball player at the community gym who roots for the Boston Celtics and frequently joins the North Attleboro Minutemen youth baseball league, balancing competitive
    drive with a laid‑back attitude toward practice schedules, and they also enjoy watching the Boston Red Sox on weekends.
  arts: David Black immerses themselves in graphic novels like 'The Walking Dead' and classic superhero comics from Marvel, while blasting rock bands such as Imagine Dragons and hip‑hop artists like Kendrick
    Lamar during DIY electronics sessions, and they occasionally binge‑watch superhero movies starring Chris Evans, reflecting a mix of visual storytelling and energetic soundtracks that shape their creative
    downtime.
  travel: David Black prefers weekend road trips to historic New England sites such as Salem and the Freedom Trail in Boston, and dreaming of a summer camp adventure in the Adirondacks, while also hoping
    to someday explore Tokyo’s anime districts, balancing a love for local heritage with a curiosity for international pop culture.
  culinary: David Black enjoys the hearty flavors of New England clam chowder and lobster rolls during family Fourth of July picnics, pairs them with pepperoni pizza and classic mac and cheese on lazy school
    nights, and they can assemble a simple grilled cheese sandwich with sharp cheddar and tomato slices, showing a moderate cooking skill that leans toward comfort foods and occasional kitchen experiments.
  core: David Black is a practical, competition‑driven teen who balances hands‑on tinkering and gaming with a relaxed approach to obligations, a skeptical edge, and a steady, low‑stress demeanor.
background:
  cultural: David was raised in a multigenerational white New England family in the suburban town of North Attleboro, Massachusetts. His parents work in the local economy—his mother as a school administrator
    and his father as a skilled tradesperson—instilling a strong work ethic and appreciation for hands‑on craftsmanship. The community’s culture emphasizes punctuality, teamwork, and a love for local sports,
    especially baseball and basketball, with many families gathering to watch the Boston Red Sox or attend high‑school games. Traditional New England holidays like Thanksgiving and Fourth of July celebrations
    are important in his household, often featuring roasted turkey, clam chowder, and fireworks. He attends a public middle school that offers both core academic courses and extracurricular clubs like robotics
    and sports, reflecting the region’s focus on balanced education and community involvement.
