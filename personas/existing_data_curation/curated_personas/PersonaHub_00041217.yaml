persona_description: A researcher in parasitology who specializes in the study of Toxoplasmosis, particularly the methods and techniques used for diagnosis and prevention. Their research interests include,
  but are not limited to, the development of new serological tests for Toxoplasmosis, the identification of new serological markers, and the evaluation of the efficacy of different diagnostic methods. They
  are also interested in the zoonotic transmission of Toxoplasmosis and the prevention of its transmission through food and the environment.
