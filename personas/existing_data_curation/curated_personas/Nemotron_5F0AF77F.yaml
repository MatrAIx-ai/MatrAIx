  career_goals: Debra aims to advance within the logistics and supply chain field. Over the next few years she plans to complete an associate's degree in supply chain management at a local community college,
    move into a shift supervisor role, and eventually become a logistics coordinator overseeing inventory and distribution for a regional warehouse. She values stable, predictable work environments and
    seeks to build a career that offers both financial security and opportunities for professional growth.
