personas:
  professional: Debra Wagner, an 18‑year‑old warehouse packaging associate, leverages their meticulous attention to detail, strong work ethic, and love of structured procedures to excel in quality control
    and inventory tracking, consistently ensuring shipments are error‑free while quietly managing the anxiety that comes with high‑pressure deadlines.
  sports: Debra Wagner finds balance on weekend hikes with the Wasatch Trail Club and weekday yoga sessions, while cheering on the Utah Jazz for basketball inspiration and occasionally joining a casual
    co‑ed soccer league during the spring.
  arts: Debra Wagner unwinds after shifts by devouring contemporary YA novels by Sarah J. Maas and self‑help guides from Brené Brown, while listening to indie folk artists like Iron & Wine and the soothing
    piano pieces of Ludovico Einaudi as they knit scarves.
  travel: Debra Wagner prefers low‑key, nature‑focused trips, meticulously planning weekend excursions to Utah’s national parks such as Zion and Arches, while dreaming of a future backpacking adventure
    through the Canadian Rockies once they secure a stable logistics job.
  culinary: Debra Wagner enjoys simple, calming meals like homemade chicken noodle soup, quinoa‑avocado bowls, and herbal chamomile tea, cooking with a modest skill set that favors reproducible recipes
    and the occasional experimental batch of cinnamon‑spiced oatmeal.
  core: Debra Wagner is a meticulously organized 18‑year‑old warehouse worker who balances anxiety‑driven puzzle obsession with a budding passion for logistics, yoga, and quiet mountain hikes.
background:
  cultural: 'Debra grew up in Bountiful, Utah, a suburban community with strong family and community ties. Her upbringing reflects the cultural values of the Intermountain West: emphasis on modesty, volunteer
    service, and appreciation for the outdoors. While her family background is primarily White and likely influenced by the predominant LDS culture in the area, she identifies with the local traditions
    of community gatherings, church-based service projects, and weekend outdoor activities such as hiking and mountain biking.'
attributes:
