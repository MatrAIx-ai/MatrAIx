personas:
  professional: Juan Godbolt, a methodical 48‑year‑old retail cashier with a decade of cash handling, POS expertise, and inventory management, they channel their curiosity and competitive edge into meticulous
    transaction processing and proactive conflict resolution, positioning themselves for a shift supervisor role and eventual store manager.
  sports: Juan Godbolt, an avid jogger who circles the Chain of Lakes three times a week and supports the Minnesota Twins, Vikings, and Timberwolves, they belong to the local Minneapolis Running Club and
    approach fitness with disciplined consistency tempered by occasional competitive rivalry in weekend 5K races.
  arts: Juan Godbolt, a devoted patron of Minneapolis' art scene, they frequent the Walker Art Center and the Minneapolis Institute of Art to study works by artists such as Alex Katz and Kehinde Wiley,
    capture street murals through black‑and‑white photography, and immerse themselves in live performances by jazz legends like the Bad Plus and hip‑hop acts like Atmosphere, shaping their identity with
    a blend of visual and auditory inspiration.
  travel: Juan Godbolt, a meticulous planner who prefers weekend road trips to nearby cultural hubs like Chicago's Art Institute and the historic streets of Quebec City, they balance a modest travel budget
    with a desire for artistic immersion, while dreaming of a summer pilgrimage to the galleries of Florence and the street art of Berlin.
  culinary: Juan Godbolt, a competent home cook who enjoys preparing Midwest comfort foods such as pan‑fried walleye with lemon‑dill sauce and a side of wild rice pilaf, they relish the bold flavors of
    jalapeño‑infused queso, often pair meals with craft beers from Surly Brewing, and occasionally indulge in upscale dining at local farm‑to‑table restaurants.
  core: Juan Godbolt, a 48‑year‑old retail veteran whose competitive streak drives meticulous cash handling and a habit of snapping impulsive street‑photo shots during jogs, they balance artistic curiosity
    with a skeptical eye, often over‑organizing schedules while neglecting proper stretching.
background:
  cultural: Juan is a Black American who grew up in the north‑side neighborhoods of Minneapolis, a city known for its rich African‑American cultural heritage. His upbringing was shaped by community churches,
    family gatherings celebrating Black art and music, and participation in local events at the African American Heritage Museum. He maintains strong ties to the Twin Cities' Black community, regularly
    supporting local Black artists and engaging in mentorship initiatives that reflect the resilience and creativity of his cultural roots.
attributes:
  skills: '[''cash handling'', ''POS system operation'', ''inventory management'', ''customer service'', ''conflict resolution'', ''basic bookkeeping'', ''time management'', ''shift scheduling'', ''event
    coordination'', ''photography basics'']'
  hobbies: '[''visiting art galleries'', ''photography'', ''chess'', ''jogging'', ''listening to jazz and hip‑hop'', ''volunteering in youth mentorship'', ''reading non‑fiction on culture and history'',
    ''exploring local museums'']'
  career_goals: Juan aims to advance within retail by first securing a shift supervisor role and eventually moving into store manager. He plans to earn a certification in retail management and take part‑time
    courses in business administration to bolster his qualifications. Leveraging his passion for art, he also envisions transitioning to a managerial position in a museum gift shop or cultural center, where
    he can blend his retail experience with his appreciation for visual arts. Long‑term, Juan hopes to launch a small side business selling prints of local artwork and to provide consulting for community
    event logistics.
