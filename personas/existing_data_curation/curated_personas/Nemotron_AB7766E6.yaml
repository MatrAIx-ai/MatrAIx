  hobbies: '[''Gardening (vegetable and ornamental)'', ''Quilting and knitting'', ''Senior book club'', ''Community theater'', ''Group hiking on local trails'', ''Baking seasonal desserts'', ''Bingo and
    bridge'', ''Church choir singing'']'
  career_goals: Although retired from formal employment, Michelle aims to deepen her impact in the Veyo community by expanding her volunteer leadership role. She plans to spearhead a community garden initiative
    that provides fresh produce for local seniors and low‑income families. She also aspires to serve on the advisory board of the Washington County senior services program, where she can help shape activity
    schedules and wellness programs. Additionally, Michelle wants to enhance her digital skills to teach peers how to stay connected with family and friends online, and she hopes to mentor younger volunteers
    in effective event planning and community outreach.
