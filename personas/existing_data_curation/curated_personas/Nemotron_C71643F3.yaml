personas:
  professional: Cameron Brown, a budding robotics enthusiast, merges methodical problem‑solving with an unshakable love for step‑by‑step instructions, turning Scratch and Arduino projects into miniature
    engineering triumphs while their organized, routine‑driven nature ensures every circuit is meticulously documented.
  sports: Cameron Brown, a member of the middle‑school basketball team, thrives on the predictable drill rotations and teamwork, cheering for the NBA's Golden State Warriors while also playing pick‑up games
    at the local community center and hoping to earn a spot on the varsity roster next year.
  arts: Cameron Brown dives into hip‑hop and R&B tracks by Kendrick Lamar, H.E.R., and J. Cole, while devouring graphic novels like Scott Pilgrim and Amulet, letting the rhythmic beats and visual storytelling
    shape their creative journal sketches and give them a soundtrack for building Lego realms.
  travel: Cameron Brown prefers meticulously planned family trips, fondly recalling a summer road‑trip to Yellowstone National Park and a spring visit to the Smithsonian in Washington, D.C., balancing awe‑inspiring
    nature with the comfort of a detailed itinerary that eases their anxiety.
  culinary: Cameron Brown enjoys pizza with pepperoni, mozzarella, and a drizzle of hot sauce, loves making simple chicken nuggets at home, occasionally experimenting with homemade tacos using seasoned
    ground beef, cheddar, and salsa, but often forgets to wash hands after handling Lego bricks before meals.
  core: Cameron Brown is a methodical 12‑year‑old who blends a love for structured building blocks and robotics with a soundtrack of hip‑hop, all while wrestling with intense emotions and a disciplined
    habit of journaling every day.
background:
  cultural: Cameron identifies as Black and grows up in a family that honors African‑American traditions, from music and storytelling to community gatherings at the local church. Living in Fairfield, California,
    he experiences a blend of Bay Area cultural influences, including exposure to diverse artistic expressions and community programs. His family emphasizes respect for elders, collective responsibility,
    and the celebration of Black heritage through music, food, and shared histories. These cultural ties shape his values of loyalty, perseverance, and the desire to give back to his community.
