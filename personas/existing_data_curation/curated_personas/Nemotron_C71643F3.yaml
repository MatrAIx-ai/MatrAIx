  career_goals: Cameron dreams of a career that offers clear structure, tangible results, and steady routine. He aims to become an automotive technician or a mechanical systems specialist, attracted by
    the hands‑on problem‑solving and predictable workflow. He plans to pursue a high school apprenticeship, earn certifications in vehicle maintenance, and eventually work in a workshop where he can apply
    his methodical approach daily. Alongside his technical goals, he hopes to develop coping strategies for his anxiety, hoping to serve as a steady, supportive presence for peers who face similar emotional
    challenges.
