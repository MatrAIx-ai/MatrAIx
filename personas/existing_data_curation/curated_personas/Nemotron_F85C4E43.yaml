personas:
  professional: Betty Manning is an aspiring visual artist whose disciplined, highly organized approach to mixed‑media creations blends analytical puzzle‑solving with vivid imagination, turning her bedroom
    corner into a miniature studio where every brushstroke meets a precise plan, and they often label each piece with a meticulous index.
  sports: Betty Manning enjoys low‑key physical activity, preferring weekend nature hikes with a magnifying glass and occasional beginner swimming lessons at the community pool, while they cheer quietly
    for the local youth soccer team 'Riverdale Rangers' and follow the professional soccer club Manchester United on TV for inspiration.
  arts: Betty Manning immerses herself in the works of Vincent van Gogh, Frida Kahlo, and the whimsical illustrations of Dr. Seuss, frequently revisiting the town museum’s rotating art exhibit, and they
    can recite lines from Pixar’s 'Coco' and sing along to Taylor Swift’s 'Shake It Off' while painting.
  travel: Betty Manning dreams of traveling to the ancient forests of Hokkaido and the grand halls of the Louvre in Paris, and they have already taken day trips to the nearby natural history museum and
    the state’s scenic mountain park, where they sketch pine cones and collect river stones.
  culinary: Betty Manning loves the simple comfort of macaroni‑and‑cheese with sharp cheddar, enjoys fresh fruit salads featuring strawberries and kiwi, and delights in helping her mom roll sushi with cucumber
    and avocado, though they shyly avoid spicy foods and still burn their tongue on hot chocolate sometimes.
  core: Betty Manning is a meticulously organized nine‑year‑old creator who channels curiosity into quiet art, savors meticulous savings for supplies, and they navigate childhood with a gentle kindness
    that occasionally succumbs to chocolate cravings.
background:
  cultural: Betty lives in the quiet, historic suburb of Stafford Springs in Tolland County, Connecticut. Her family reflects typical New England middle‑class values that emphasize education, civic involvement
    and appreciation for cultural institutions. The region’s colonial heritage, seasonal town festivals, and easy access to nearby museums such as the Wadsworth Atheneum shape her exposure to art and history.
    As a white American from this area, she participates in school art programs, local community events, and enjoys the town’s natural scenery, including forests and rivers, which reinforce her love of
    nature. Her upbringing blends a New England sense of individual responsibility with community‑oriented kindness, nurturing her cooperative, considerate nature while supporting her solitary, introspective
    pursuits.
attributes:
  skills: '[''Sketching and watercolor painting'', ''Basic art history knowledge'', ''Organisational and time‑management skills'', ''Research and information synthesis'', ''Block‑based coding (Scratch)'',
