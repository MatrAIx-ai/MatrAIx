  hobbies: '[''Drawing and watercolor painting'', ''Reading art and nature books'', ''Visiting museums and galleries'', ''Collecting natural specimens (leaves, rocks)'', ''Keeping a nature journal'', ''Solving
    puzzles (jigsaw, logic games)'', ''Building with LEGO'', ''Writing short stories'']'
  career_goals: Betty aspires to combine her love of art, quiet environments and meticulous planning into a career that creates thoughtful, serene spaces for learning and contemplation. She dreams of becoming
    a museum curator or exhibition designer who develops interactive, child‑friendly displays that inspire curiosity. In the short term, she aims to build a strong personal art portfolio by age twelve,
    volunteer as a docent at the local historical society, and participate in a summer art program. Over the longer term, she envisions attending a specialized art high school and eventually studying museum
    studies or environmental design at university, where she can bring her organised, compassionate approach to preserving and presenting culture.
