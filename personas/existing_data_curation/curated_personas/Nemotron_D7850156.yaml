  hobbies: '[''Competitive video gaming'', ''Scale model car building'', ''Bicycle repair and maintenance'', ''Robotics club activities'', ''Fishing in local bayous'', ''Listening to Cajun music'', ''Playing
    accordion'', ''Reading science‑fiction'', ''Chess'']'
  career_goals: Walter aims to turn his practical talents into a career as a certified automotive service technician, with a long‑term ambition to open his own small garage serving the Lafayette community.
    He also hopes to earn a scholarship for his strong performance in competitive gaming and robotics, which could lead to a degree in mechanical engineering or computer science. He values a stable, routine‑oriented
    profession that lets him apply his problem‑solving skills while still offering opportunities to compete and continually improve.
