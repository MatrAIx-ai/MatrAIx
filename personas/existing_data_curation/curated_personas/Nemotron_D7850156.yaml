personas:
  professional: Walter Spearman, a budding robotics club member and avid competitive gamer, leverages his tactical planning skills from Rocket League and Fortnite to design and program battle‑ready bots,
    while his routine‑driven, skeptical nature keeps his projects meticulously documented and his teammates on a tight schedule.
  sports: Walter Spearman is a seasonal cyclist who joins the local junior BMX club in spring, roots for the New Orleans Saints in football and the Louisiana State Tigers in college basketball, and balances
    their competitive edge by logging daily lap times on a bike trainer while occasionally skipping workouts when school stress builds up.
  arts: Walter Spearman enjoys immersing themselves in Cajun and Zydeco sounds from Clifton Chenier and BeauSoleil, practices accordion on weekends, devours science‑fiction novels by Isaac Asimov and N.K. Jemisin,
    and draws inspiration from video‑game soundtracks such as those composed by Hans Zimmer for the 'Fortnite' events.
  travel: Walter Spearman prefers short, structured road trips to nearby cultural spots like the historic French Quarter in New Orleans and the bayou trails of Atchafalaya, while dreaming of a future adventure
    to Tokyo's Akihabara district to experience its gaming arcades firsthand.
  culinary: Walter Spearman’s palate leans toward hearty Southern fare—gumbo spiced with file powder, blackened catfish, and jambalaya—yet they only manage basic cooking, often relying on a microwave to
    reheat the catch of the day while experimenting sporadically with adding fresh cilantro and smoked paprika.
  core: Walter Spearman is a methodical, competition‑driven teen who balances a love for tactical video games and robotics with a knack for meticulous bike upkeep, but their worry‑prone streak often turns
    routine tasks into high‑stakes challenges.
background:
  cultural: Walter grew up in Lafayette, Louisiana, a city steeped in Cajun and Southern traditions. Though his family identifies as white, many generations back they have Acadian (Cajun) ancestry, which
    gives him an appreciation for French‑derived customs, food, and occasional French words. He celebrates local festivals like Mardi Gras and the Festival International de Louisiane, enjoys dishes such
    as gumbo and jambalaya, and attends a local Catholic parish where community and family values are emphasized. The blend of Southern hospitality, practical work ethic, and a love for regional music and
    cuisine shapes his cultural outlook.
