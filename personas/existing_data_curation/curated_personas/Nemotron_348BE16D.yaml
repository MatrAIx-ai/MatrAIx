  hobbies: '[''Playing soccer with friends'', ''Salsa dance lessons for kids'', ''Reading mystery and adventure books'', ''Building LEGO sets and puzzles'', ''Drawing and coloring with patterns'', ''Helping
    in the kitchen with family recipes'', ''Participating in school art club'', ''Using educational apps for Spanish and math practice'']'
  career_goals: Fidencia envisions a future where she can blend her love for helping others, her appreciation for structured environments, and her curiosity about the natural world. She frequently tells
    her teachers that she wants to become a teacher because she enjoys explaining things to friends and likes the predictable classroom routine. She also dreams of working with animals as a veterinarian,
    fascinated by the care and organization required in a clinic. In the longer term, she imagines herself leading after‑school programs that combine learning, music, and cultural celebrations, allowing
    her to create supportive, orderly spaces for other children.
