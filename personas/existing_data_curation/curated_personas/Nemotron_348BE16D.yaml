personas:
  professional: Fidencia Antonetti, a budding school team captain, showcases leadership and meticulous planning on the soccer field and in classroom group projects, turning their natural energy and love
    for structure into reliable cooperation with peers, and they eagerly take on responsibilities like organizing group study sessions.
  sports: Fidencia Antonetti thrives on the soccer field as a midfielder for the Riverside Rangers youth league, practices drills twice a week, follows the playbooks of FC Barcelona, and they spend weekends
    cheering for the local high‑school basketball team the Tigers while balancing school with active play.
  arts: Fidencia Antonetti explores art through detailed drawings inspired by the vibrant patterns of artist Yayoi Kusama, the whimsical characters of Disney animator Hayao Miyazaki, and the rhythmic beats
    of musician Selena Gomez, channeling these influences into weekly art club projects, and they often share their creations with friends and family.
  travel: Fidencia Antonetti has explored the sandy shores of Luquillo, wandered the historic forts of Old San Juan, and they dream of visiting the illuminated streets of Paris and the bustling markets
    of Tokyo, sketching each destination in a scrapbook for future adventures.
  culinary: Fidencia Antonetti loves helping measure rice and pigeon peas for arroz con gandules, delights in mixing fresh cilantro and lime into guacamole, and enjoys assembling homemade pizza with mozzarella,
    pepperoni, and sliced bell peppers, and they take pride in presenting the finished dishes to family at dinner.
  core: Fidencia Antonetti is an energetic, detail‑oriented 8‑year‑old who balances a love for teamwork with a need for order, often turning worry into meticulous planning and creative expression, and they
    are known for their habit of humming salsa rhythms while solving puzzles.
background:
  cultural: Fidencia grows up in a bilingual Puerto Rican household within the small community of Wake Forest, North Carolina. Her family maintains many island traditions—cooking arroz con gandules, empanadillas,
    and mofongo for special occasions, listening to salsa and plena music, and celebrating holidays such as Three Kings Day and Puerto Rico’s Día de la Constitución. At the same time, she participates in
    local Southern festivities, attends school events that reflect the region's cultural mosaic, and embraces the warm hospitality of both her Puerto Rican relatives and her North Carolina neighbors. This
    blend of Caribbean and Southern influences nurtures her appreciation for diverse foods, rhythms, and languages, and reinforces the values of family cohesion, mutual respect, and community involvement
    that shape her daily life.
