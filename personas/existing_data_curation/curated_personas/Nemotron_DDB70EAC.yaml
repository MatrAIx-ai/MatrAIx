    and de‑escalation'']'
  hobbies: '[''Cooking soul‑food meals'', ''Gardening'', ''Listening to gospel and classic R&B music'', ''Reading mystery novels'', ''Walking in local parks'', ''Volunteering at church health fairs'', ''Attending
    church services and community events'']'
  career_goals: Maria aims to transition into a leadership role within her EMS department, such as shift supervisor or chief paramedic, where she can shape standard operating procedures and advocate for
    crew wellness. She plans to earn a paramedic instructor certification and eventually teach at a community college, leveraging her practical expertise to train the next generation. Additionally, she
    hopes to develop a neighborhood health‑outreach program focused on preventive care and emergency readiness for underserved residents of Cleveland.
