personas:
  professional: Maria Wilson is a veteran paramedic with over twenty years of emergency medical response experience, known for rapid patient assessment, trauma stabilization, and advanced cardiac life support,
    whose routine‑driven mindset ensures flawless adherence to protocols while their relaxed approach to paperwork sometimes leads to last‑minute documentation, and they leverage assertive collaboration
    to mentor new EMTs and advocate for crew wellness.
  sports: Maria Wilson cheers for the Cleveland Browns, Cleveland Cavaliers, and Cleveland Guardians, attends weekend baseball games and occasional football tailgates, and stays active through the Cleveland
    Metroparks Walking Club and a senior recreational softball league, balancing seasonal pro‑sports enthusiasm with daily moderate exercise.
  arts: Maria Wilson’s artistic palate includes gospel powerhouses like Aretha Franklin and classic R&B legends such as Marvin Gaye, regular visits to Playhouse Square for Broadway productions, and evenings
    immersed in mystery novels by Agatha Christie, reflecting a deep appreciation for soulful storytelling and live performance.
  travel: Maria Wilson favors flexible, last‑minute getaways, having road‑tripped to Niagara Falls and Asheville, savored the music and cuisine of New Orleans, and dreams of a leisurely Caribbean cruise
    and a cultural tour of Lisbon, yet their travel plans often hinge on EMS shift schedules and family gatherings, limiting long‑haul trips.
  culinary: Maria Wilson excels at cooking classic comfort dishes like crispy buttermilk fried chicken seasoned with smoked paprika, slow‑cooked collard greens flavored with smoked turkey and fresh thyme,
    buttery cornbread, and sweet‑potato casserole, often using garden‑fresh tomatoes, bell peppers, and herbs, though their kitchen can become a whirlwind of pots and utensils reflecting a passionate yet
    occasionally disorganized cooking style.
  core: Maria Wilson blends a love for routine with spontaneous generosity, leading emergency crews with confidence, nurturing a thriving backyard garden, and navigating life’s unpredictabilities through
    a steady, gospel‑infused heart.
background:
  cultural: Maria grew up in Cleveland's historic African‑American neighborhoods, where church, family, and community solidarity were central pillars of life. Her parents worked in manufacturing and nursing,
    instilling a strong work ethic and a commitment to service. The cultural traditions of storytelling, communal support, and resilience shaped her practical outlook and her emphasis on helping others.
    She remains actively involved in local black community organizations, celebrates cultural holidays, and draws on her heritage to foster trust and rapport with patients from diverse backgrounds.
