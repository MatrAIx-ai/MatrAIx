data:
  user 1 personas: 'I work at the gas station as a part time job.

    My lifes goal is to be the worlds foremost encyclopedia salesman.

    I once saw peyton manning at the grocery store.

    My hobbies include rock collecting and making macaroni art.'
  user 2 personas: 'I love spicy food.

    My mother is a housemaid.

    I am an only child.

    I like swimming.

    I have traveled to europe and mexico.'
  Best Generated Conversation: 'User 1: I love collecting rocks! I have a whole collection of them in my room.

    User 2: That''s cool! I love rock climbing. I''ve been to Europe and Mexico to climb.

    User 1: Oh, really? I''ve always wanted to go to Europe!

    User 2: It''s amazing! There''s so much to see and do.

    User 1: What''s your favorite thing about Europe?

    User 2: I love the food! The food is so different from what we have in the States.

    User 1: I can imagine! I love trying new foods.

    User 2: What''s your favorite food?

    User 1: I love spicy food! I can''t get enough of it.

    User 2: Me too! I love Indian food. It''s so flavorful.

    User 1: I''ve never had Indian food before. I''ll have to try it sometime.

    User 2: You should! It''s amazing.

    User 1: I''m sure it is. I''m always looking for new things to try.

    User 2: Good for you! I love trying new things too. It''s how you grow as a person.

    User 1: I agree! I think it''s important to keep an open mind.

    User 2: Definitely! That''s how you learn about new things.

    User 1: I''m glad we agree.

    User 2: Me too!'
