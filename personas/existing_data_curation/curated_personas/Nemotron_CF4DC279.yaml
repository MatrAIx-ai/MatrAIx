personas:
  professional: Betty Harris is a budding health‑care support professional, currently working part‑time in grocery customer service while meticulously organizing volunteer schedules and budgeting her household,
    and they are preparing to enroll in a CNA vocational program to translate their strong organizational skills and compassionate caregiving into a stable nursing assistant role.
  sports: Betty Harris enjoys low‑impact fitness like daily dog walks and a weekly community‑center yoga class, follows the River City Rivermen minor league baseball team in summer, and occasionally joins
    a co‑ed recreational softball league, balancing structured exercise with relaxed social play.
  arts: Betty Harris immerses herself in gospel and classic R&B, regularly singing with her church choir and listening to legends like Aretha Franklin and Marvin Gaye, while evenings are spent crocheting
    while reading contemporary novels by Sally Rooney and self‑help titles from Brené Brown, and they attend occasional local theater productions featuring plays by August Wilson.
  travel: Betty Harris prefers purposeful, budget‑friendly trips, having explored the nearby Blue Ridge Mountains on a weekend hike and a cultural weekend in New Orleans for its music and cuisine, and they
    dream of a future road‑trip along the Pacific Coast to combine scenic drives with culinary discoveries, all while balancing a modest travel fund with their savings goals.
  culinary: Betty Harris delights in home‑cooked comfort foods, mastering dishes such as chicken and dumplings, roasted vegetable quinoa salad, and cinnamon roll banana bread, and they often experiment
    with fresh herbs from their garden, preparing family‑style meals for small gatherings and planning a future catering menu that highlights seasonal, handcrafted fare.
  core: Betty Harris is a detail‑oriented 23‑year‑old who blends practical organization with heartfelt community care, balancing a modest budget, a love for gospel music, and a budding ambition to become
    a CNA while nurturing a secret stash of yarn for nightly knitting.
background:
  cultural: Betty’s cultural identity is rooted in the African‑American Southern tradition of East Texas. Raised in Montalba, she grew up in a close‑knit Black community where the local church served as
    a cultural and social anchor, shaping her values of hospitality, mutual support, and resilience. Family gatherings centered around Southern soul food, gospel music, and oral histories of her ancestors’
    migration from the Deep South. This blend of Black heritage and Texan rural life informs her worldview, language, and sense of communal responsibility.
