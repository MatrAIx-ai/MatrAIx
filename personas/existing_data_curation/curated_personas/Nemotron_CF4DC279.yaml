  hobbies: '[''Gardening'', ''Reading contemporary novels'', ''Knitting and crochet'', ''Listening to gospel and classic R&B music'', ''Church choir participation'', ''Cooking family recipes'', ''Walking
    her dog'', ''Volunteering at community center'']'
  career_goals: Betty aims to enroll in a vocational program at a community college to become a Certified Nursing Assistant, with the long‑term goal of securing a full‑time position in a healthcare setting
    that offers a stable schedule and clear responsibilities. She also hopes to eventually launch a small home‑based catering service that blends her love of cooking with community events, providing a predictable
    source of income.
