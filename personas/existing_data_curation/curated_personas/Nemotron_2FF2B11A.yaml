personas:
  professional: Dwight Ford, a third‑generation farmer who oversees a mixed‑crop and livestock enterprise, leverages their expertise in crop rotation, pasture management, and machinery maintenance while
    navigating their love of routine and occasional spontaneity to mentor younger growers and drive the shift toward regenerative agriculture.
  sports: Dwight Ford stays active by hunting deer in the fall, fishing the Platte River in summer, and playing occasional pick‑up basketball at the community center; they cheer on the Nebraska Cornhuskers
    football team, keep an eye on the Omaha Storm Chasers, and participate in the Kearney County Skeet Shooting Club.
  arts: Dwight Ford cultivates their artistic side through community theater productions, sunrise photography that captures the rolling wheat fields, devouring classic western novels by Larry McMurtry,
    and listening to folk legends like Johnny Cash and Woody Guthrie while savoring the visual storytelling of painter Frederic Remington.
  travel: Dwight Ford prefers road‑trip adventures in their pickup, methodically mapping routes to nearby wonders like Badlands National Park and Yellowstone while keeping a spontaneous streak that lands
    them on last‑minute weekend jaunts to the Black Hills and, on their bucket list, a cultural immersion agritourism tour of Tuscany, Italy.
  culinary: Dwight Ford, an adept home cook, favors hearty Midwestern fare such as butter‑basted corn on the cob, beef pot roast with rosemary, and skillet‑fried catfish, regularly using farm‑fresh ingredients
    like sweet corn, free‑range eggs, and heirloom tomatoes while mastering canning and preserving their garden’s bounty.
  core: Dwight Ford blends steadfast farm tradition with a dash of spontaneous creativity, juggling a love for routine and occasional impulse purchases, while quietly battling a stubborn back ache and an
    occasional budget‑blowout on woodworking tools.
background:
  cultural: Dwight hails from a multi‑generational Midwestern farming family with German roots that settled in the Great Plains during the early 1900s. Growing up in Kearney County, Nebraska, he absorbed
    the region’s values of hard work, self‑reliance, modesty, and community cooperation. Local institutions such as the county fair, the volunteer fire department, and the nearby Lutheran church have shaped
    his sense of identity. He identifies with the broader white, rural American culture of the Midwest, emphasizing respect for the land, practical problem‑solving, and preserving family traditions.
