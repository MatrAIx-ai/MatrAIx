  career_goals: Dwight aims to transition his operation toward regenerative agriculture, integrating cover crops, reduced tillage, and diversified livestock to improve soil health and long‑term profitability.
    He hopes to launch a community‑supported agriculture (CSA) program that connects local residents with fresh produce while preserving the farm’s family legacy. Mentoring younger farmers through workshops
    and serving on the county’s agricultural extension board are also key ambitions. Ultimately, he envisions a modest agritourism component—farm tours, seasonal festivals, and educational events—to share
    Nebraska’s farming heritage with a wider audience.
