persona_description: A music teacher who specializes in teaching adults to read music notation. She has experience working with students of all ages and has developed a unique teaching method that emphasizes
  physical motion and flow of music. Her approach is unconventional and requires a conscious intent from the students, who must learn to flow with the piano and their own physical abilities. Her students
  are often self-conscious and impatient, but her approach is designed to help them overcome these obstacles and develop a deeper understanding of music notation.
