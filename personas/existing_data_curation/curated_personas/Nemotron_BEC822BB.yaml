personas:
  professional: Nicola Johnson is a market research strategist who wields advanced statistical tools like SQL and Python to turn complex data into compelling narratives for senior executives, while they
    love spontaneity that sometimes leads to late‑night insight sessions blurring the line between rigid project plans and creative improvisation.
  sports: Nicola Johnson mixes weekly long‑distance runs with spirited Saturday mornings playing in a co‑ed recreational soccer league, roots for the Chicago Bulls during the NBA season, and never misses
    a chance to watch the Milwaukee Brewers' opening day game at the stadium.
  arts: Nicola Johnson is an avid participant in improv comedy workshops, regularly attends live shows by The Lumineers and Hozier, volunteers at a community arts program where they mentor aspiring muralists,
    and dives into contemporary fiction by authors like Sally Rooney and Ocean Vuong during book club meetings.
  travel: Nicola Johnson thrives on impromptu road trips, having spontaneously driven the Pacific Coast Highway from San Francisco to Santa Barbara, dreams of savoring street food in Bangkok, and plans
    a future week‑long retreat in the Italian countryside to combine yoga, writing, and wine tasting.
  culinary: Nicola Johnson dazzles friends with homemade spicy shrimp tacos topped with mango salsa, perfects a classic risotto using Arborio rice and Parmesan, and indulges in artisanal dark chocolate
    truffles while expertly pairing dishes with a crisp Sauvignon Blanc.
  core: Nicola Johnson blends analytical rigor with a zest for spontaneity, turning data into stories, hosting unforgettable dinner parties, and sprinting toward leadership while occasionally juggling too
    many calendars at once.
background:
  cultural: Nicola comes from a white Midwestern family with German and Irish ancestry, raised in the suburbs of Chicago. Her upbringing emphasized practicality, community involvement, and the value of
    education, which aligns with her business degree and analytical career. Living in Prospect Heights, she is immersed in the cultural diversity of the Chicago metropolitan area, influencing her appreciation
    for multicultural consumer perspectives and her active participation in local cultural events.
