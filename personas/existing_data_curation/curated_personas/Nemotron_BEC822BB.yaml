  career_goals: Nicola aims to move into a senior leadership role, such as Director of Market Insight or Head of Consumer Strategy, within the next five years. She plans to earn an MBA to deepen her strategic
    acumen and to lead cross‑functional teams that shape brand direction for major consumer‑goods companies. She also aspires to mentor junior analysts and to launch a boutique consultancy that helps mid‑size
    firms translate consumer data into growth strategies, balancing the stability of a corporate path with the flexibility of entrepreneurial projects.
