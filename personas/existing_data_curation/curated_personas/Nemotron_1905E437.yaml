  career_goals: Mahmuda aims to continue providing high-quality bedside care while gradually shifting toward a mentorship and leadership role within her hospital. She aspires to become a clinical educator
    for new nurses, develop culturally tailored health workshops for the Mexican community in Houston, and eventually lead a community health program that bridges hospital services with local outreach.
    Her long-term ambition is to foster a supportive, inclusive environment for patients and staff, ensuring that Hispanic patients receive culturally competent care and that younger nurses inherit her
    calm, resilient work ethic.
