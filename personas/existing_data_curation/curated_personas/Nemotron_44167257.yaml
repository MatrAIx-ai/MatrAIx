  career_goals: Gladys aspires to merge her love for art and technology by pursuing a career as a concept artist or visual designer for interactive media, such as video games or animated films. She envisions
    studying visual arts and digital media at a university, eventually creating immersive worlds that spark imagination in others. Long‑term, she hopes to curate community art spaces that celebrate experimental
    and abstract works, providing a platform for emerging young creators.
