personas:
  professional: An aspiring visual storyteller, Gladys Stefurak channels their curiosity and imagination into sketching, speculative fiction writing, and theater set design, using their relaxed approach
    to deadlines to freely experiment on school projects and share concepts on online art forums.
  sports: A fan of the Riverdale Ravens and participant in the community's Saturday morning jogging club, Gladys Stefurak enjoys nightly runs to dark‑sky parks for stargazing and occasional pick‑up soccer
    games with friends, preferring informal activity over organized school sports.
  arts: An avid art explorer, Gladys Stefurak spends weekends photographing community murals, curates ambient playlists featuring Brian Eno and Alex Brown, and sketches whimsical characters inspired by
    Yayoi Kusama’s polka‑dot motifs, turning each gallery visit into a personal visual journal.
  travel: With a backpack stuffed with sketchbooks, Gladys Stefurak frequently plans impromptu weekend getaways to the nearby state park for night‑sky shoots, while dreaming of a future excursion to Iceland’s
    aurora‑lit landscape, all within the limits of their parents' strict travel budget.
  culinary: A self‑taught kitchen experimenter, Gladys Stefurak delights in whipping up matcha‑green tea ramen with homemade pork broth, sprinkling toasted sesame seeds, and pairing it with mango‑salsa,
    while often sketching the plates before devouring them.
  core: A day‑dreaming teen who sketches galaxies on every spare scrap, forgets to finish homework, but never skips a night under the stars.
background:
  cultural: Gladys was raised in Berlin, a small borough in Camden County, New Jersey, within a predominantly white, middle‑class neighborhood. Her family traces its roots to German and Irish ancestry,
    celebrating modest American traditions such as Thanksgiving, Fourth of July barbecues, and community volunteer events. The suburban setting provides easy access to parks, the nearby Delaware River,
    and a supportive school environment that emphasizes arts programs and collaborative learning. Following the early loss of a parent, her household places a strong emphasis on mutual support, resilience,
    and nurturing creativity as a means of coping and personal growth.
attributes:
  skills: '["Sketching", "Digital illustration", "Creative writing", "Basic Python programming", "Research on abstract concepts", "Empathy and active listening", "Collaborative group projects", "Keyboard
