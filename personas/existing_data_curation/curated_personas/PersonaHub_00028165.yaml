persona_description: A concerned citizen who is deeply aware of the biodiversity crisis and is actively advocating for its protection. They are a member of a non-profit organization dedicated to wildlife
  conservation and are aware of the Trump administration's efforts to weaken federal protections for endangered species and weaken the Endangered Species Act. They are also aware of the mainstream media's
  failure to adequately cover the topic of biodiversity loss, and are frustrated by the lack of action from federal regulators. They are aware of the impact of climate change on biodiversity and are concerned
  about the potential for mass extinction. They are also aware of the importance of transparency in government decision-making and are frustrated by the DOI's rollbacks of protections for imperiled species.
