personas:
  professional: Darryl Torres is a seasoned carpenter who leverages two decades of framing, high‑end finish carpentry, and custom cabinetry expertise, blending hand‑tool traditions with modern power‑tool
    efficiency while mentoring apprentices, yet often wrestles with paperwork and tight deadlines due to a spontaneous, flexible work style.
  sports: Darryl Torres is a dedicated member of a local hiking club, spends weekends fishing on Lake Buckeye, cheers for the Cleveland Guardians and the Ohio State Buckeyes football team, and joins pick‑up
    basketball games at the community center to stay fit.
  arts: Darryl Torres strums an acoustic guitar to classic rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones, frequents the Ohio Craft Fair to admire folk art, and devotes evenings to sketching
    historic American houses inspired by Frank Lloyd Wright.
  travel: Darryl Torres prefers road‑trip adventures, having explored the wilderness of Hocking Hills, the historic streets of Savannah, Georgia, and the coastal cliffs of Acadia National Park, and dreams
    of a future woodworking retreat in the Pacific Northwest.
  culinary: Darryl Torres enjoys grilling rib‑smoked pork chops and corn on the cob while sipping a home‑brewed American IPA, cooks up hearty chili using heirloom beans from the community garden, and crafts
    a classic fish fry with a beer batter made from their own stout.
  core: Darryl Torres is a pragmatic yet curious carpenter who balances hands‑on craftsmanship with spontaneous projects, a love for classic rock, and a weekend habit of fishing, all while juggling a lingering
    back ache and a penchant for vintage tool hunts.
background:
  cultural: Darryl grew up in the rural Midwest of Wood County, Ohio, in a family with German and Irish ancestry. The community emphasized a strong work ethic, self‑reliance, modesty, and active participation
    in local events such as county fairs, church picnics, and community clubs. This environment fostered his practical approach to life while his natural curiosity opened him to new ideas, like sustainable
    building practices. He maintains close ties with neighbors and a local woodworking guild, reflecting the region’s blend of independence and community support.
attributes:
  skills: '[''Residential framing'', ''Finish carpentry'', ''Custom cabinetry'', ''Furniture making'', ''Blueprint reading'', ''Building code compliance'', ''Tool maintenance'', ''Safety training'', ''Problem
