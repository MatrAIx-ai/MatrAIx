  hobbies: '[''Fishing'', ''Hiking'', ''Custom woodworking projects'', ''Acoustic guitar playing'', ''Classic rock music'', ''Home brewing'', ''Attending craft fairs'', ''Reading historic architecture'',
    ''Volunteering at community events'', ''Model building'']'
  career_goals: Darryl aims to earn a master carpenter certification and eventually open a boutique woodworking studio that focuses on custom furniture and sustainable building practices. He wants to develop
    a small apprenticeship program and teach night classes at the local community college, sharing his blend of traditional craftsmanship and modern techniques. Improving his organization and project‑management
    skills is a priority to handle larger commissions and meet deadlines more consistently. Long‑term, he hopes to be recognized by his peers in the regional carpenter’s guild and to leave a legacy of quality
    workmanship for future generations in his community.
