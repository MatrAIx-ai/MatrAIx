  career_goals: Although retired from formal employment, Shanna aims to deepen her impact on the local community. She aspires to serve on the board of a neighborhood nonprofit, spearhead senior‑focused
    outreach projects, and mentor emerging volunteers. She also hopes to co‑author a memoir of her life experiences with her husband, travel to historic sites across the United States, and continue learning
    new skills such as digital photography to document her adventures.
