personas:
  professional: Shanna Gupta, a retired community organizer turned nonprofit board aspirant, leverages her meticulous event‑planning, budgeting, and conflict‑mediation skills to spearhead senior‑focused
    outreach programs while mentoring emerging volunteers with a balanced mix of assertiveness and compassion.
  sports: Shanna Gupta stays active with the St. Paul Walking Group, enjoys low‑impact jogging on spring trails, follows the Minnesota Twins and Vikings for weekend camaraderie, and participates in community
    birdwatching hikes that double as gentle cardio sessions.
  arts: Shanna Gupta finds creative fuel in the vibrant quilts of Faith Ringgold, the stage productions at the Guthrie Theater, the folk storytelling of Bob Dylan, and the novels discussed in her book club—especially
    works by Ann Patchett—channeling these inspirations into her own quilting projects and volunteer roles in community theater.
  travel: Shanna Gupta plans trips with detailed itineraries, traveling with her spouse to cultural festivals like Wisconsin’s Oktoberfest and Boston’s St. Patrick’s Day parade, exploring historic sites
    such as Gettysburg and the Grand Canyon, and savoring the blend of structured planning and spontaneous discovery that each journey offers.
  culinary: Shanna Gupta, an avid home cook, delights in preparing garden‑fresh herb dishes like basil‑infused tomato soup, traditional sauerkraut and corned‑beef for holiday meals, and apple‑cinnamon crumble,
    while sharpening her skills in cooking classes that explore Mediterranean flavors and farm‑to‑table techniques.
  core: Shanna Gupta is a structured yet sociable community stalwart who merges disciplined gardening, volunteer leadership, quilting, and historic travel into a purposeful, modest adventure, even if they
    hoard receipts and occasionally forget sunscreen.
background:
  cultural: Shanna is a white Midwestern American whose family roots trace back to German and Irish immigrants who settled in the Upper Midwest in the early 20th century. Raised in a Lutheran household
    in Minnesota, she internalized values of modesty, hard work, and community responsibility. Living in Saint Paul, a city known for its cultural diversity, she embraces both traditional Midwestern customs—like
    holiday potlucks and church gatherings—and the multicultural events that enrich the area. Her cultural identity blends a respect for heritage with an open‑minded appreciation for the varied traditions
    of her neighbors.
