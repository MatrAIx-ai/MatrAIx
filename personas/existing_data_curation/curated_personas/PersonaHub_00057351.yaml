persona_description: A historian who specializes in the study of ancient Indian literature, particularly the Mahabharata. She is interested in the complex interactions between politics, religion, and ethics
  in the Parvas of the Mahabharata. She is knowledgeable about the various characters, their motivations, and their roles in the expansion of the Pandava brothers' empire. She is interested in the themes
  of just war theory and the flaws in the game of dice that led to the downfall of the Pandava brothers. She is also interested in the societal implications of the gambling game and the impact it had on
  the Pandava brothers' moral and ethical values.
