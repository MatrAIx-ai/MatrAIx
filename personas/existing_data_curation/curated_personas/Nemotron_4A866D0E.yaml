  hobbies: '[''Experimenting with fusion cooking'', ''Folkloric dancing'', ''Spontaneous road trips'', ''Community volunteer events'', ''DIY home projects'', ''Gardening'', ''Reading investigative journalism'',
    ''Bilingual storytelling'']'
  career_goals: Driven by a desire for autonomy, Maria aims to turn her culinary talent into a small‑scale, home‑based catering business that showcases contemporary spins on classic Mexican cuisine. She
    also envisions launching a community garden that doubles as a workshop space where she can teach gardening and budgeting skills to neighbors. In parallel, she plans to earn a GED and later a certificate
    in culinary arts or urban horticulture, giving her formal credentials while preserving her flexible schedule. Her ultimate ambition is to become a respected local resource—someone who can blend cultural
    tradition with pragmatic innovation—without committing to a conventional 9‑to‑5 job.
