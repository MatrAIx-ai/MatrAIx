personas:
  professional: Maria Roque, a bilingual community organizer and culinary innovator, channels practical problem‑solving and a spontaneous planning style into a home‑based catering venture that reimagines
    traditional fare with inventive twists while simultaneously developing a neighborhood garden‑workshop hub, and they refuse to settle for a conventional 9‑to‑5 schedule.
  sports: Maria Roque, a weekend cyclist and pick‑up soccer enthusiast, rides a hybrid bike along sunrise routes on Saturdays, joins the city’s adult soccer league with the Greenfield Gators, and they fiercely
    root for the hometown baseball team the River City Raptors while preferring low‑impact home workouts over crowded gyms, balancing competitive drive with a love for community recreation.
  arts: Maria Roque, a dedicated folkloric dancer and spontaneous jam‑session participant, draws creative energy from the music of Lila Downs, the indie band Café Tacvba, and the films of Alfonso Cuarón,
    curates a neighborhood Facebook page that spotlights local murals and street performers, and they often weave storytelling into bilingual bedtime tales for neighborhood children, reflecting a vibrant
    blend of tradition and contemporary art.
  travel: Maria Roque, a spontaneous road‑trip planner, packs a cooler and a notebook, spends weekends discovering the historic town of Santa Cruz, tasting regional delicacies in the coastal village of
    Puerto Viejo, and they dream of exploring the spice markets of Marrakech, all while keeping travel costs low by staying in budget motels and using a fuel‑efficiency app.
  culinary: Maria Roque, a culinary experimenter, loves blending tangy hibiscus into classic pozole, seasoning roasted chicken with smoked chipotle and fresh epazote, crafting a mango‑infused salsa verde
    that showcases home‑grown chilies, cilantro, and oregano, and they often laugh when a daring flavor combo overwhelms the palate, proving that curiosity sometimes outpaces careful measurement.
  core: Maria Roque, a curious pragmatist with a spontaneous streak, fuses culinary creativity, community activism, and frugal budgeting into a vibrant, slightly chaotic life that rarely adheres to a strict
    schedule.
background:
  cultural: Maria was born and raised in Pharr, Texas, a city on the U.S.–Mexico border where Mexican and Texan cultures intertwine. Her family maintains strong ties to Mexican traditions—celebrating Día
    de los Muertos, preparing mole, and speaking Spanish at home—while also embracing the bilingual, bicultural rhythm of the Rio Grande Valley. This dual heritage shapes her worldview, giving her a deep
    appreciation for family solidarity, communal celebrations, and the resilience of immigrant communities. She identifies as Mexican‑American, drawing on both sides of her heritage in her daily life, cuisine,
    and community involvement.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Practical cooking and recipe improvisation'', ''Home budgeting and financial tracking'', ''Grassroots community organizing'', ''Basic home maintenance
