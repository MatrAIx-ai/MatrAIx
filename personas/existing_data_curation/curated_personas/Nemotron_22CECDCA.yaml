  career_goals: Larry aspires to pursue a career that blends his curiosity for how things work with his desire to help others. He hopes to become a civil engineer or urban planner so he can design safe,
    functional community spaces, and he also envisions taking on a leadership role in his hometown—perhaps as a city council member or community development coordinator. He plans to earn a STEM‑focused
    high school curriculum, attend a university with a strong engineering program, and gain internship experience in local construction or public works.
