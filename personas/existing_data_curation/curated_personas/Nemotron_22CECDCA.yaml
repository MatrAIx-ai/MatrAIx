personas:
  professional: Larry Schaller is a self-appointed junior engineer in his middle school robotics club, where they blend methodical planning with sociable collaboration to design autonomous models that regularly
    win regional awards.
  sports: Larry Schaller is a point guard for his middle school basketball team, the Hawks, practices with the team after school and roots for the NBA’s Golden State Warriors, while they also join weekend
    pickup games at the community center to stay sharp.
  arts: Larry Schaller devours science-fiction novels by authors such as Neal Stephenson, listens to synth-pop bands like CHVRCHES while coding, and solves Rubik's cubes to the soundtrack of video-game
    music, shaping a creative problem-solving mindset.
  travel: Larry Schaller has explored the Grand Canyon on a family road trip and dreams of attending the World Robot Olympiad in Tokyo, preferring itineraries that mix interactive science museums with time
    for friends to hang out at local skate parks.
  culinary: Larry Schaller favors quick, protein-rich snacks such as turkey wraps and homemade guacamole for after-school coding marathons, but their guilty pleasure is a nightly bowl of cheesy ramen topped
    with extra sriracha, which they often over-season.
  core: Larry Schaller blends relentless curiosity for robotics with a talkative, team-first spirit, balancing meticulous planning and a love for fast-food comfort while occasionally pulling all-nighters
    to finish a puzzle.
background:
  cultural: Larry grew up in Noblesville, Indiana, a suburban community in the Midwest with strong family and community ties. His family’s cultural roots trace back to German and Irish ancestry, typical
    of many white Midwestern families. He was raised with values of hard work, neighborliness, and participation in local traditions such as county fairs, 4‑H projects, church gatherings, and youth sports.
    The region’s emphasis on education, civic engagement, and modesty has shaped his organized, cooperative, and socially‑oriented personality.
