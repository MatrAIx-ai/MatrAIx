persona_description: A scientist who specializes in the study of mammals and their physiological systems, particularly the role of radiators in maintaining body temperature. He has a particular interest
  in the use of non-invasive cooling methods and has developed a new device that uses artificial cooling to increase the core temperature of patients recovering from anesthesia. He has also applied the
  cooling method to other types of exercise and has seen significant improvements in physical performance. He is a coauthor of the study and has published several papers on the topic.
