personas:
  professional: Jamila Merone is a lead fabricator in a South Florida manufacturing plant, leveraging their expertise in CNC programming, MIG/TIG welding, and CAD-driven rapid prototyping to streamline
    workflows while mentoring new hires, and they channel an imaginative, competitive spirit into creating custom metal art pieces that push production boundaries.
  sports: Jamila Merone dominates the sand courts at the Miami Beach Volleyball Club during summer, captains a local co‑ed beach volleyball league, and burns off late‑night studio energy by salsa dancing
    at the Little Havana cultural center, while cheering for the Miami Heat and the Florida Panthers.
  arts: Jamila Merone merges abstract painting with metal sculpture, drawing inspiration from Yayoi Kusama's polka‑dot motifs and Alexander Calder's kinetic installations, while devouring speculative fiction
    by N.K. Jemisin and attending monthly sci‑fi book club meetings at the downtown library.
  travel: Jamila Merone plans travel like a prototype build, combining budget‑friendly trips to Jamaica and the Dominican Republic for culinary inspiration with occasional tech‑conference pilgrimages to
    Austin and design‑focused excursions to Barcelona, always packing a portable sketchbook for on‑the‑go ideas.
  culinary: Jamila Merone crafts Caribbean‑inspired feasts featuring jerk chicken, sautéed callaloo, and rum‑glazed plantains, experimenting with smoked Scotch bonnet peppers and fresh coconut milk, while
    also mastering the art of plating metal‑shaped serving boards they fabricate themselves.
  core: Jamila Merone fuses a competitive, imagination‑driven engineering mind with a sociable, art‑first lifestyle, turning every welding torch into a brushstroke and every budget spreadsheet into a design
    challenge.
background:
  cultural: Jamila identifies as African-American with Caribbean heritage, tracing her family roots to Jamaica and Haiti. Growing up in Broward County, she was shaped by the multicultural vibrancy of South
    Florida, celebrating Juneteenth, Caribbean festivals, and local church traditions. Her community values emphasize resilience, creativity, and collective support. Jamila incorporates these cultural influences
    into her art, cuisine, and mentorship, fostering connections across diverse social circles.
attributes:
  skills: '["Mechanical assembly", "Interpretation of technical drawings", "CNC machine operation", "MIG/TIG welding", "Quality inspection", "Process improvement", "3D printing", "Computer-aided design
