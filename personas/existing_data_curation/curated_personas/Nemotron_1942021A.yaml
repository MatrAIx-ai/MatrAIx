  hobbies: '["Metalworking art", "Abstract painting", "Salsa dancing", "Beach volleyball", "Maker space projects", "Science fiction reading", "3D printing experiments", "Youth STEM volunteering", "Cooking
    Caribbean cuisine"]'
  career_goals: Jamila aims to advance to a lead fabricator or production supervisor role within the next three years, securing certifications in CNC programming and advanced welding. She plans to enroll
    in a community college program for industrial technology to deepen her technical knowledge. Ultimately, she aspires to launch her own boutique business that merges fabrication with artistic design,
    producing custom metal furniture and public art installations. Jamila also wishes to become a mentor and advocate for women of color in manufacturing, fostering inclusive workplace cultures in South
    Florida.
