persona_description: A marine lawyer who specializes in the study of maritime law and the protection of marine environments. They are particularly interested in the legal aspects of shipwreck investigations,
  the tracking of at-risk ships, and the cleanup and mitigation of environmental damage caused by historical shipwrecks. They have experience working with the Canadian Coast Guard, Transport Canada, and
  Environment Canada to gather and analyze data on at-risk ships, and they are knowledgeable about the SOPF, the fund that pays for cleanup after decades-old sunken ships begin leaking oil.
