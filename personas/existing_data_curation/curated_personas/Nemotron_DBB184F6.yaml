  career_goals: Dorcas aims to earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and become a senior lead mechanic or foreman within the next five years. She wants to
    lead a maintenance team, improve preventive‑maintenance processes, and eventually open her own small workshop specializing in custom refractory and industrial equipment repairs. In the longer term,
    she may pursue an associate degree in mechanical engineering technology to broaden her technical knowledge and enhance her career advancement opportunities.
