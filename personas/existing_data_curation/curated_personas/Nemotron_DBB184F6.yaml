personas:
  professional: Dorcas Davis, a 21‑year‑old industrial maintenance technician, brings routine‑focused expertise in welding, hydraulic troubleshooting, and PLC diagnostics, and they use their sociable, competitive
    edge to coordinate rapid team responses, even as their relaxed attitude toward paperwork sometimes leads to disorganized maintenance logs.
  sports: Dorcas Davis, a 21‑year‑old, they stay active through a town softball league with the River Valley Softball Club, weekly line‑dancing sessions, and weekend hikes on the nearby state trail, while
    cheering for the Detroit Tigers and Lions and approaching fitness with a competitive edge that sometimes pits them against teammates.
  arts: Dorcas Davis, a 21‑year‑old, they enjoy line‑dancing to country hits by Carrie Underwood and Garth Brooks, unwind with classic rock from Fleetwood Mac, admire craftsmanship videos by Jimmy DiResta,
    and occasionally attend local folk festivals featuring Old Crow Medicine Show, while rewatching movies starring Meryl Streep for inspiration.
  travel: Dorcas Davis, a 21‑year‑old, they favor spontaneous road‑trip adventures on a modest budget, having explored the Great Smoky Mountains and a weekend car‑show in Detroit, while dreaming of a spring
    hike through Yellowstone and a cultural weekend in Barcelona, often planning itineraries on a spreadsheet but leaving room for last‑minute detours.
  culinary: Dorcas Davis, a 21‑year‑old, they whip up comfort classics like chicken pot pie, mac and cheese, and smoked BBQ ribs using garlic, smoked paprika, and fresh herbs, boasting solid DIY cooking
    skills that let them experiment with seasonal vegetables while still relying on quick‑fix meals when a maintenance shift runs late.
  core: Dorcas Davis, a 21‑year‑old, they blend a love for hands‑on mechanics with a laid‑back, sometimes chaotic approach to paperwork, thriving on routine yet indulging in spontaneous social outings and
    occasional impulsive purchases.
background:
  cultural: Dorcas grew up in a middle‑class family in the Dallas‑Fort Worth metro‑area, where Texan values of hard work, self‑reliance, and hospitality were emphasized. Her family traditions include regular
    gatherings, BBQs, and involvement in the local church, which fostered a strong sense of community. While she identifies with mainstream American culture, she also appreciates Southern customs such as
    country music, line dancing, and outdoor festivals. These cultural influences shape her practical outlook, her emphasis on routine and reliability at work, and her preference for social, group‑oriented
    leisure activities.
