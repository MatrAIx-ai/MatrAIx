persona_description: A team of engineering students from Stevens Institute of Technology who are working on a project to develop a portable mapping unit that can identify available bandwidth on the radio
  frequency spectrum. The team is using an antenna, software-defined radio communications system, and microcontroller to create a device that can map existing spectrum frequencies. They are working with
  General Dynamics Missions Systems and professor Kishore Pochiraju to develop a solution to identify and utilize gaps in the spectrum to send messages. The team is composed of computer engineering students
  Johnathan Grotke and Michael Moschetti, electrical engineering student John Anticev, and mechanical engineering students Arunvenkatesh Aruljothi, Justin Holdridge and Gregory McNeil.
