  hobbies: '["Reading science‑fiction novels", "Creating comic strips", "Playing piano", "Coding simple games with Scratch", "School robotics club", "Playing soccer", "Biking around Brooklyn", "Visiting
    museums and cultural festivals", "Volunteering at a community garden"]'
  career_goals: Donna aims to continue strengthening her STEM skills throughout middle and high school, with the long‑term ambition of becoming a software engineer who creates technology to improve community
    health. She plans to join her high school’s robotics and coding clubs, pursue advanced science courses, and eventually attend a university with a strong engineering program. At the same time, she wants
    to stay grounded by volunteering at local health clinics and participating in community service projects, reflecting her blend of curiosity and practicality.
