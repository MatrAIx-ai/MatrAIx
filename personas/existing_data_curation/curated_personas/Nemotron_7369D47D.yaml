personas:
  professional: Donna Thomas, an aspiring junior robotics engineer, combines methodical planning and curiosity to design simple Scratch games and assist her school robotics club, applying a reliable, organized
    approach that balances creative problem‑solving with practical execution.
  sports: Donna Thomas plays forward on her neighborhood soccer league team that practices at Prospect Park, follows the New York Red Bulls and New York Knicks for inspiration, and balances her weekly matches
    with bike rides through Brooklyn’s parks to keep her stamina up while staying organized with a personal training schedule.
  arts: Donna Thomas channels her love of sci‑fi graphic novels into original comic strips, sketches in a Moleskine notebook, enjoys piano pieces by Ludovico Einaudi and Billie Eilish, and draws inspiration
    from manga artist Naoko Takeuchi and comic legend Stan Lee, often sharing their digital art on a school‑run art blog.
  travel: Donna Thomas prefers structured day‑trips that blend education and adventure, having mapped out visits to the American Museum of Natural History and Coney Island, while dreaming of a future family
    vacation to Kyoto’s historic temples and a weekend getaway to the Catskills for hiking.
  culinary: Donna Thomas favors homemade pizza with fresh mozzarella and basil, loves trying ramen bowls with miso broth, and experiments with avocado toast topped with chili flakes, though they often burn
    the edges of their toast in a rush to finish homework.
  core: Donna Thomas is a meticulous, curiosity‑driven 12‑year‑old who balances comic‑making, robotics, and soccer with a habit of over‑packing their backpack and occasionally forgetting to set their alarm
    for morning practice.
background:
  cultural: Donna was raised in a middle‑class white family in the culturally vibrant borough of Brooklyn. Her parents emphasize education, community involvement, and a balance between traditional American
    holidays and the diverse celebrations of the neighborhood, such as street fairs and cultural parades. Growing up in a multicultural urban environment has given her an appreciation for different perspectives
    while maintaining the values of reliability, organization, and modest self‑advocacy instilled by her family.
attributes:
