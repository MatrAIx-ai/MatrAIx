  hobbies: '[''Art museum visits'', ''Sketching'', ''Metal sculpture'', ''Scale model building'', ''Woodworking'', ''Birdwatching'', ''Science fiction reading'', ''Classical music listening'', ''Nature
    photography'', ''Historical site exploration'']'
  career_goals: Andrew aspires to advance to a lead fabricator role where he can mentor apprentices and oversee production workflows. He plans to earn certifications such as AWS Certified Welder and a CNC
    programming credential to deepen his technical expertise. Over the next five years, he aims to launch a small workshop that blends functional fabrication with artistic metalwork, creating custom decorative
    pieces for local clients. His long‑term ambition is to achieve a stable work‑life balance while contributing innovative, art‑inspired solutions to the manufacturing community.
