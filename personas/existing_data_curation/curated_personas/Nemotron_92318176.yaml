personas:
  professional: Andrew Statuto is a seasoned fabricator and CNC operator who translates artistic concepts into precise metal and plastic assemblies, leveraging his meticulous blueprint reading, quality
    inspection expertise, and calm, methodical demeanor to lead production workflows and mentor apprentices.
  sports: Andrew Statuto maintains fitness through daily sunrise walks along the waterfront, participates in the Tampa Bay Hiking Club’s autumn treks, rows with the Tampa Bay Rowing Club during spring,
    and they enthusiastically support the Tampa Bay Buccaneers, Rays, and Lightning as their favorite professional teams.
  arts: Andrew Statuto spends weekends sketching in the Tampa Museum of Art, draws inspiration from Monet’s water lilies, Ansel Adams’ black-and-white landscapes, and the sculptures of Alexander Calder,
    attends chamber concerts featuring Bach and Beethoven, and they collect limited‑edition prints while occasionally critiquing modern installations with a quietly sharp eye.
  travel: Andrew Statuto prefers meticulously planned trips that blend historic exploration with quiet reflection, has documented visits to St. Augustine’s Spanish fort, the shipyards of Portsmouth, NH,
    and the maritime museums of Glasgow, Scotland, while dreaming of future voyages to Oslo’s Viking Ship Museum and Japan’s Tsukuba Science City, and they favor renting modest cabins to maintain a low‑key,
    budget‑friendly itinerary.
  culinary: Andrew Statuto is an adept home cook who enjoys preparing citrus‑marinated grouper with fresh rosemary, crafting handmade gnocchi seasoned with sage, and experimenting with saffron risotto,
    while they often pair meals with a glass of local Florida white wine and occasionally splurge on artisanal cheese boards during weekend gatherings.
  core: Andrew Statuto balances a methodical, solitude‑driven work ethic with a restless curiosity for art and history, channeling their meticulous nature into both precision fabrication and intricate metal
    sculptures, all while occasionally over‑organizing their workshop and forgetting to call friends.
background:
  cultural: Andrew grew up in a modest, working‑class family of Irish and Italian descent in Central Florida. His upbringing combined Southern values of hard work, reliability, and community with an exposure
    to the arts through local fairs, community theater, and the vibrant Tampa Bay cultural scene. While his family maintained Catholic traditions, Andrew identifies as secular but retains a deep respect
    for the cultural heritage and the strong sense of camaraderie that characterizes the industrial neighborhoods of Hillsborough County.
