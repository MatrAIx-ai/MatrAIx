  hobbies: '[''Hiking'', ''Fly Fishing'', ''Woodworking'', ''Historical Nonfiction Reading'', ''Photography'', ''Chess'', ''Gardening'', ''Southern Cooking'', ''Local History Research'', ''Community Volunteering'']'
  career_goals: Dan aims to transition from a local news analyst to a senior editorial leader within the next five years, spearheading a data‑driven investigative unit that focuses on regional issues such
    as environmental policy, education reform, and economic development in North Georgia. He plans to complete a bachelor's degree in journalism and eventually pursue a master’s in data journalism to deepen
    his analytical capabilities. Dan also aspires to mentor junior reporters, cultivate partnerships with local universities for research collaborations, and produce a series of award‑winning investigative
    pieces that drive tangible community change. Ultimately, he hopes to launch a digital newsroom that offers hyper‑local coverage while maintaining the rigorous standards he values.
