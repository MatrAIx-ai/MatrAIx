personas:
  professional: An investigative journalist, Dan Rose blends methodical research with a curiosity for social issues, employing AP-style writing, GIS mapping, multimedia storytelling, and rigorous fact-checking
    to craft data-driven pieces; they balance assertiveness in editorial leadership with a cooperative spirit when mentoring junior reporters.
  sports: A dedicated outdoors enthusiast, Dan Rose hikes the Chattahoochee trails, practices fly-fishing in spring, follows the Atlanta Braves in baseball and the Georgia Bulldogs in football, and joins
    the Chattahoochee Trail Club for weekly group walks, balancing a disciplined yet low-key fitness routine.
  arts: An avid photographer and woodworker, Dan Rose finds inspiration in the landscapes of Ansel Adams and the folk sounds of The Avett Brothers, curates a small collection of Southern-history biographies,
    and regularly watches Ken Burns documentaries, integrating visual storytelling into both their art and journalism.
  travel: A methodical planner, Dan Rose prefers low-key, nature-focused trips, having explored the Blue Ridge Parkway, Asheville's art scene, and a weekend in Charleston, while dreaming of photographing
    Patagonia's Andes; they balance cost-conscious budgeting with occasional splurges on boutique lodges.
  culinary: A home-cook with a penchant for Southern comfort, Dan Rose skillfully prepares fried chicken, shrimp and grits, collard greens, and sweet potato pie, favoring ingredients like smoked paprika,
    buttermilk, and fresh okra, and often experiments with a cast-iron skillet to elevate traditional family recipes.
  core: Dan Rose, a data-driven investigative journalist with a quiet love for fly-fishing, woodworking, and late-night coffee, balances methodical precision with a penchant for solitary hikes and occasional
    overworking.
background:
  cultural: Dan grew up in a small, close‑knit town in the heart of Georgia, where Southern hospitality and community values shaped his worldview. His family’s roots trace back several generations in the
    region, fostering a strong appreciation for local traditions such as church gatherings, family barbecues, and community festivals. While he identifies with mainstream white Southern culture, Dan balances
    respect for tradition with an openness to new ideas, reflecting the broader shift in rural Georgia toward greater diversity of thought. He maintains connections to his heritage through regular attendance
    at the local Methodist church, participation in regional historical societies, and a love for classic Southern music and cuisine. This cultural grounding informs his reporting, giving him an insider’s
    perspective on the stories that matter most to his neighbors.
attributes:
  skills: '[''Investigative Reporting'', ''Data Analysis'', ''AP Style Writing'', ''Interviewing'', ''Fact‑checking'', ''Content Management Systems (CMS)'', ''Multimedia Storytelling'', ''Photo Editing'',
