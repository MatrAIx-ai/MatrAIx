personas:
  professional: Joselyn Kohler, a meticulous public library assistant in Cambridge Springs, harnesses her precise cataloguing expertise, warm front‑desk service, and knack for orchestrating author talks
    to keep the library running like a well‑ordered community hub, and they methodically pursue an associate degree in Library Science to step into a supervisory role.
  sports: Joselyn Kohler, an enthusiastic weekend hiker, joins the local Erie County Trail Club for weekly hikes in Presque Isle State Park, supports the Buffalo Bills and Pittsburgh Steelers by watching
    games on Sunday evenings, and they fit in community 5 K runs to stay active, though they sometimes skip the post‑run stretch in favor of knitting a quick scarf.
  arts: Joselyn Kohler, an avid book club leader, delights in discussing classics from Jane Austen and contemporary works by Chimamanda Ngozi Adichie, spends evenings quilting patterns inspired by Georgia
    O'Keeffe’s floral canvases, and they enjoy listening to folk legends like Bob Dylan while crocheting, yet they occasionally hoard used bookmarks they can’t bear to discard.
  travel: Joselyn Kohler, a planner‑oriented traveler, prefers structured road trips with her spouse, having explored the historic farm towns of western Pennsylvania and the fall foliage of Vermont’s Green
    Mountain National Forest, and they dream of a guided tour of the Scottish Highlands, though they often procrastinate booking flights until the last possible moment.
  culinary: Joselyn Kohler, a home‑cooking enthusiast, loves preparing farm‑to‑table dishes such as roasted beet salad with goat cheese, her signature vegetable stew featuring carrots, potatoes, and fresh
    thyme, and they frequently bake apple crisp with a crunchy oat topping, yet they sometimes over‑salt the soup when juggling a busy shift.
  core: Joselyn Kohler is a routine‑loving, community‑focused librarian who blends classic literature, crafty gifts, and meticulous organization, and they habitually over‑schedule their calendar while collecting
    way‑too‑many yarn balls.
background:
  cultural: Joselyn was raised in a traditional, middle‑class white family in Erie County, Pennsylvania. Her upbringing emphasized community involvement, hard work, and practical values, often reflected
    in her participation in local church events and civic organizations. She grew up attending public schools and values the sense of belonging fostered by small‑town life. Her cultural identity is shaped
    by typical Pennsylvania Dutch and Anglo‑American influences, which manifest in a preference for routine, a strong work ethic, and a commitment to supporting her neighbors through volunteerism and public
    service.
attributes:
  skills: '[''Cataloguing'', ''Reference assistance'', ''Interlibrary loan processing'', ''Patron record management'', ''Customer service'', ''Event planning and execution'', ''Community outreach coordination'',
    ''Data entry'', ''Basic IT troubleshooting for library systems'', ''Public speaking'', ''Conflict resolution'', ''Team coordination'', ''Time management'']'
  hobbies: '[''Book club participation and discussion facilitation'', ''Quilting and crocheting'', ''Volunteer reading sessions at the senior center'', ''Companion visits for seniors'', ''Gardening (vegetable
    and flower beds)'', ''Weekend hiking in local parks'', ''Hosting small gatherings for friends and neighbors'']'
  career_goals: Joselyn aims to advance beyond her current clerical role by completing an associate degree in Library Science within the next two years, positioning herself for promotion to supervisory
    librarian or branch manager. She envisions leading initiatives that expand digital resources and literacy programs in Cambridge Springs, fostering stronger community ties. Long‑term, she hopes to become
    a regional coordinator for public library services, where she can design and implement statewide outreach strategies that promote equitable access to information and educational opportunities.
