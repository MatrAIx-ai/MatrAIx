  career_goals: Sandy aims to advance to a senior logistics manager role within the next three years, overseeing regional supply chain operations for a mid‑size company with a focus on sustainability. She
    plans to earn the Certified Supply Chain Professional (CSCP) credential and become a recognized expert in green logistics, leading initiatives to reduce carbon emissions in transportation and warehousing.
    Long‑term, she envisions establishing her own consultancy that helps cultural institutions—such as art museums and performance venues—optimize their logistical workflows while preserving artistic integrity.
    She also hopes to mentor emerging logisticians, especially those from underrepresented backgrounds.
