personas:
  professional: Supply chain strategist Sandy Bello blends rigorous logistics expertise with an artistic mindset, leveraging SAP and Oracle NetSuite to optimize inventory and transportation while championing
    green initiatives and cross‑cultural vendor negotiations, all driven by a curiosity that fuels innovative process redesign, and they consistently translate data into actionable visual narratives.
  sports: On the athletic front, Sandy Bello combines a love of yoga, weekend hikes with the Florida Trailblazers, and avid support for the Orlando Magic and Orlando City SC, while they occasionally lace
    up for 5K charity runs organized by the local community garden and enjoy casual beach volleyball games at Lake Eola.
  arts: Arts-wise, Sandy Bello immerses themselves in Central Florida’s cultural pulse by frequenting the Orlando Museum of Art and Kennedy Space Center’s art showcases, honing watercolor techniques inspired
    by Georgia O’Keeffe, capturing coastal sunrise vistas at Clearwater Beach with a Nikon D850, devouring contemporary nonfiction by Malcolm Gladwell, and dancing salsa to live sets featuring veteran trumpeter
    Arturo Sandoval, and they often draw creative parallels between supply‑chain flowcharts and composition balance.
  travel: Travel-wise, Sandy Bello prefers meticulously planned weekend escapes that blend adventure and cultural immersion, having already trekked the Everglades, explored the historic streets of Savannah,
    and savored Caribbean vibes in Havana, while they dream of future photo‑focused journeys to Iceland’s glacial lagoons and Barcelona’s street‑art districts and they habitually map out itineraries using
    a spreadsheet template.
  culinary: Culinary pursuits find Sandy Bello mastering traditional Cuban cuisine—perfecting slow‑cooked ropa vieja, flaky pastelitos, and aromatic mojo‑marinated pork—while experimenting with modern twists
    like quinoa‑filled empanadas and infused coffee cocktails, all seasoned with fresh cilantro, lime zest, and a dash of habanero heat, and they often pair meals with curated playlists from classic salsa
    legends and contemporary jazz.
  core: Sandy Bello is a logistics strategist whose painter’s eye fuels sustainable supply‑chain innovations, balancing meticulous data dashboards with spontaneous salsa nights, while they habitually misplace
    their favorite water bottle on the office desk.
background:
  cultural: Sandy grew up in a close‑knit Cuban‑American family in the Greater Orlando area, where Spanish was spoken at home and Cuban traditions were celebrated year‑round. From a young age she absorbed
    the rhythmic beats of salsa and the flavors of her heritage's cuisine, shaping her love for art, music, and community gatherings. The Cuban emphasis on resilience, hospitality, and familial bonds merged
    with the diverse, entrepreneurial spirit of Florida, fostering a multicultural perspective. Her bilingual upbringing equips her with strong cross‑cultural communication skills, and her participation
    in local Cuban festivals reinforces a deep respect for her roots while encouraging openness to new experiences.
