  career_goals: David aims to move into a senior facilities‑management role within the next five years, such as a building‑operations supervisor or facilities manager. He plans to earn certifications in
    OSHA safety and green cleaning, and to complete his college coursework in facilities management. Ultimately, he hopes to leverage his experience and leadership skills to start a small, locally‑owned
    cleaning business that emphasizes sustainable practices, providing a stable income for his retirement while mentoring younger workers.
