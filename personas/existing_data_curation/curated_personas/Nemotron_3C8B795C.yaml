personas:
  professional: David Harbin, a seasoned facilities maintenance specialist with over three decades of hands-on experience in janitorial operations, floor care, and building safety, blends a methodical,
    OSHA-compliant approach with a growing passion for sustainable green cleaning to lead crews, train new staff, and chart a path toward a senior facilities-management role.
  sports: David Harbin, a dedicated member of the Cedar Grove Bowlers league, enjoys weekly Friday night bowling with former coworkers, supports the Green Bay Packers and Chicago Cubs, participates in a
    senior softball team at the local community center during summer, and incorporates daily walks in the neighborhood park to maintain low-impact fitness.
  arts: David Harbin, a quiet lover of folk-rock pioneers like Bob Dylan and blues legends such as Muddy Waters, regularly attends the downtown community theater’s productions of classic plays, watches
    Ken Burns documentaries on American industry, and finds inspiration for his woodworking projects in the craftsmanship of traditional American folk art.
  travel: David Harbin, whose travel plans are carefully mapped and budget-aware, has visited the redwood forests of Northern California, explored the historic streets and culinary scene of Charleston,
    South Carolina, dreams of strolling through Kyoto’s zen gardens, and prefers road trips that include stops at farmer’s markets and heritage museums.
  culinary: David Harbin, who enjoys cooking simple, seasonal dishes such as roasted root vegetables with rosemary, quinoa salad with heirloom tomatoes, and occasionally baking a crusty sourdough loaf,
    favors fresh basil, garlic, and locally sourced produce from the Saturday farmer’s market, and proudly uses his own hand-crafted wooden cutting board for meal prep.
  core: David Harbin, a methodical 56-year-old facilities veteran with a green-cleaning vision, balances woodworking, community service, and a love for classic folk music, yet sometimes hoards cleaning
    chemicals and forgets to floss.
background:
  cultural: David is a white American raised in New Jersey, likely of European (e.g., Irish, English) ancestry. He grew up in a middle‑class, working‑class environment that valued hard work, reliability,
    and community involvement. His cultural outlook reflects the practical, modest ethos of the Mid‑Atlantic region, with an appreciation for local traditions, neighborhood solidarity, and a respect for
    regulations and safety standards. He maintains ties to his community through local events and volunteer activities.
