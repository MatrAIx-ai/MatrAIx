personas:
  professional: Annie Pickett, a 19-year-old Class A CDL holder who ships goods across Michigan, combines her meticulous route-planning skills with a quiet, detail-oriented demeanor to keep deliveries on
    schedule while they politely handle client negotiations.
  sports: Annie Pickett, a weekend jogger who logs runs in the city’s Riverfront Park, supports the Detroit Lions and follows the local semi-pro running club, while they prefer low-impact strength training
    sessions at home over crowded gyms.
  arts: Annie Pickett, an avid listener of R&B and neo-soul icons like Erykah Badu, Marvin Gaye, and H.E.R., devotes evenings to reading mystery novels by Agatha Christie and contemporary biographies, and
    captures Detroit’s gritty street murals and abandoned factories through monochrome photography, channeling their solitary creative impulse.
  travel: Annie Pickett, who enjoys long, solitary drives along the Great Lakes shoreline, plans road trips using GPS-based routes that maximize scenic stops at places like Ann Arbor’s botanical garden
    and Chicago’s jazz districts, while they budget travel expenses carefully to avoid disrupting their savings goals.
  culinary: Annie Pickett, a budding home chef, perfects Southern comfort staples such as collard greens simmered with smoked turkey, buttery cornbread, and homemade sweet tea, often experimenting with
    heirloom varieties of kale and using fresh produce from the community pantry.
  core: Annie Pickett balances a disciplined truck-driving career with a solitary love for R&B, meticulous budgeting, and nightly runs, yet they wrestle with stress-driven insomnia and a habit of over-investing
    in niche model-truck collections.
background:
  cultural: Annie was raised in a close-knit African-American family in Detroit East Side, where church, music, and community solidarity were daily fixtures. Family gatherings often featured soul food,
    gospel singing, and stories of the city's automotive heritage, fostering a strong sense of pride in her Black identity. Growing up near the historic Motor City, she witnessed the influence of the auto
    industry on local economies, which sparked her interest in driving and logistics. Her cultural upbringing emphasized resilience, mutual support, and the importance of giving back, shaping her cooperative
    yet self-advocating personality.
attributes:
  skills: '[''Class A Commercial Driver License (CDL)'', ''Safe Driving Techniques'', ''Route Optimization and GPS Navigation'', ''Vehicle Inspection and Basic Maintenance'', ''Client Interaction and Sales
