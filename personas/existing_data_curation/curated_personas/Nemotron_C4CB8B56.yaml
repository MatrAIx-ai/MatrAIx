    Adherence'']'
  hobbies: '[''Listening to R&B and Motown music'', ''Reading mystery novels and autobiographies'', ''Jogging in local parks'', ''Cooking Southern comfort food'', ''Building scale model trucks'', ''Volunteer
    work at community food pantry'', ''Photography of Detroit street scenes'']'
  career_goals: Annie aims to advance from entry-level driver positions to a logistics coordinator role within the next three years, leveraging her associate degree and on-the-job experience. She plans
    to obtain additional certifications such as HAZMAT and Advanced Route Planning to qualify for higher-pay freight. Long-term, she hopes to become a fleet manager for a regional trucking company in Michigan
    or start her own small-scale logistics business that emphasizes safety, punctuality, and community employment opportunities. She values stable income, predictable schedules, and the ability to mentor
    new drivers, aligning with her preference for structure and responsibility.
