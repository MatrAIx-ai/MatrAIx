  They have a deep understanding of the Central Limit Theorem and its applications in statistics, and are familiar with the concepts of mapping and normal distributions. They are skilled in the use of computer
  software and programming languages for numerical simulations and have experience in research and development of new algorithms for Monte Carlo methods.
