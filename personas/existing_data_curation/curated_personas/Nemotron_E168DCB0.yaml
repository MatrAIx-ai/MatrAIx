  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Reading non‑fiction (history, science, philosophy)'', ''Gardening'', ''Hiking in local nature trails'', ''Attending small art workshops'', ''Playing
    acoustic guitar'', ''Participating in a local book club'', ''Exploring historic sites in Summerville'', ''Practicing mindfulness meditation'', ''Home DIY projects'']'
  career_goals: Mark aspires to deepen his clinical expertise by completing an LPN program at a local community college and eventually pursuing RN certification. He envisions transitioning into a supervisory
    role where he can mentor new aides and lead quality‑improvement initiatives within a senior‑living facility. Inspired by his appreciation for art and holistic wellness, he hopes to design a small‑scale
    art‑therapy program for residents that blends creative expression with physical care. Long‑term, Mark would like to earn a case‑management certification and possibly open a boutique home‑care agency
    that emphasizes individualized, culturally sensitive services while maintaining a balanced family life.
