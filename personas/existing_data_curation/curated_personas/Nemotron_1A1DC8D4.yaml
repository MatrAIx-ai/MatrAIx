  career_goals: Hery aims to transition from being out of the workforce to establishing a modest, flexible handyman service that lets him apply his practical skills while preserving a relaxed schedule.
    He is exploring a state‑issued contractor’s license or a certification in energy‑efficient home upgrades, reflecting his curiosity about sustainable practices. Ultimately, he seeks a steady, low‑stress
    income source that supports his independence, provides financial stability, and leaves ample time for family and his personal interests.
