personas:
  professional: Katie Brewster, a veteran probation officer with a business degree, blends meticulous case management and data‑driven risk assessment with an innate sociability that smooths client rapport
    and group therapy, while they occasionally scramble to finish paperwork due to a relaxed attitude toward obligations.
  sports: Katie Brewster stays active through weekly Zumba and dance sessions, weekend hikes in Prospect Park, and cheerfully roots for the Brooklyn Nets and New York Yankees while they occasionally join
    the Brooklyn Running Club for Saturday morning jogs.
  arts: Katie Brewster feeds their artistic soul by devouring mystery novels from Agatha Christie and Tana French, attending Brooklyn’s vibrant cultural festivals, and catching live sets by indie band The
    Shins, while they eagerly share plot twists at their book club and enjoy occasional Off‑Broadway shows.
  travel: Katie Brewster prefers spontaneous weekend getaways, often packing a hiking tote for a quick drive up to the Catskills or a weekend in the Hudson Valley, while they daydream about a culinary immersion
    tour through Tuscany, yet their tendency to over‑pack and stress about itineraries sometimes turns a relaxing retreat into a frantic scramble.
  culinary: Katie Brewster, a self‑taught experimental cook, delights in whipping up sous‑vide salmon with miso glaze, crafting homemade kimchi, and perfecting a salted caramel espresso tart, often splurging
    on heirloom tomatoes, fresh herbs, and specialty spices from Brooklyn’s Greenmarket while they attend monthly cooking workshops that keep their kitchen both inventive and chaotically stocked.
  core: Katie Brewster balances a love for structured casework with a habit of last‑minute planning, channels restless social energy into Zumba and community gardening, and combats chronic anxiety with
    yoga while they occasionally over‑indulge in experimental kitchen experiments that leave the fridge a chaotic mess.
background:
  cultural: Katie grew up in a middle-class white family in upstate New York, where she was raised with traditional American values and a strong emphasis on education and community service. After completing
    her business degree, she relocated to Brooklyn, drawn by its vibrant, multicultural environment. Living in Kings County for over two decades, she has embraced the neighborhood’s diversity, which informs
    her inclusive approach to probation work and community engagement. She identifies with mainstream American cultural traditions while also valuing the rich tapestry of cultures that surround her in Brooklyn.
attributes:
  skills: '[''Case Management'', ''Risk Assessment'', ''Crisis Intervention'', ''Group Facilitation'', ''Conflict Mediation'', ''Data Analysis & Reporting'', ''Budget Management'', ''Community Outreach
    Coordination'', ''Trauma-Informed Counseling'', ''Policy Development'']'
  hobbies: '[''Zumba/Dance Classes'', ''Group Hiking'', ''Community Gardening'', ''Cooking Workshops'', ''Mystery Book Club'', ''Yoga & Meditation'', ''Brooklyn Cultural Festivals'', ''Live Music Shows'',
    ''Neighborhood Block Parties'', ''Volunteer Mentoring'']'
  career_goals: Katie aims to become a senior probation supervisor or program director within the next five years, where she can design and implement trauma-informed, restorative justice programs that balance
    clear procedural guidelines with individualized client support. She plans to obtain a certification in trauma counseling and pursue a master's degree in social work to deepen her clinical expertise.
    Additionally, she aspires to influence city-level policy on probation and to mentor younger officers, fostering a collaborative and supportive workplace culture.
