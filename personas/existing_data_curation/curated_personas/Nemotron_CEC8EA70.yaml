personas:
  professional: Fatimazahra Decker is a meticulous mechanical engineer who leverages SolidWorks, MATLAB, and Python to drive sustainable infrastructure designs while coordinating cross-functional teams
    with a methodical, deadline-driven approach and clear communication.
  sports: Fatimazahra Decker plays competitive indoor volleyball in a local league, hikes the Blue Ridge Mountains on weekends, runs with the Piedmont Trail Runners club, follows the Atlanta Falcons, Braves,
    and Hawks, and squeezes in yoga sessions whenever a project deadline looms, balancing team camaraderie with personal performance metrics.
  arts: Fatimazahra Decker captures landscape photography inspired by Ansel Adams during hikes, curates a playlist featuring Fleetwood Mac and modern indie artist Phoebe Bridgers, attends the Atlanta Symphony
    Orchestra's concerts, and watches Greta Gerwig's films for narrative insight, using artistic observation to fuel innovative engineering ideas.
  travel: Fatimazahra Decker prefers meticulously planned trips that combine tech conferences—such as re:publica in Berlin and TechCrunch Disrupt in Tokyo—with weekend adventure getaways to Asheville’s
    Blue Ridge Parkway and the Great Smoky Mountains, balancing professional networking with scenic photography, yet sometimes overbooks their itinerary chasing every event.
  culinary: Fatimazahra Decker experiments with Southern comfort cuisine, perfecting shrimp and grits with a miso glaze, crisp fried chicken drizzled with hot honey, and collard greens sautéed with smoked
    turkey, while skillfully wielding a sous-vide circulator and occasionally over‑seasoning dishes in a quest for the perfect flavor balance.
  core: Fatimazahra Decker is a methodical yet adventurous engineer who blends competitive drive, community spirit, and a love for sustainable design, all while juggling spreadsheets, volleyball spikes,
    and a perpetual quest for the perfect fusion dish.
background:
  cultural: Raised in a middle‑class Southern family, Fatimazahra embodies the region’s hospitality, strong work ethic, and community focus while also embracing progressive, STEM‑driven values. Her white
    American heritage is interwoven with a deep appreciation for local traditions, church involvement, and seasonal family gatherings in Georgia. This cultural backdrop shapes her balanced outlook—valuing
    both established methods and innovative ideas—while her marriage provides a supportive partner in pursuing ambitious career goals.
