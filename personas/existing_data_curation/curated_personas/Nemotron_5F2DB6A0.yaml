  hobbies: '[''gardening'', ''fishing'', ''historical reading'', ''woodworking'', ''cooking'', ''birdwatching'', ''bridge'', ''volunteering'', ''digital photography'']'
  career_goals: Thomas wants to keep giving back to his community by volunteering at the local senior center, offering handyman assistance, and mentoring younger residents interested in trades. He hopes
    to compile a handwritten memoir of his experiences during Elkhart’s manufacturing heyday, preserving stories for his grandchildren and the Elkhart County Historical Society. Additionally, he aspires
    to improve his digital photography skills to capture the natural beauty of the Indiana countryside and share his images on a simple online gallery for friends and family.
