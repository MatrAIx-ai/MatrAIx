  career_goals: Although retired from formal employment, Rebekah aims to deepen her involvement with the Grand Rapids Historical Society, aspiring to lead a digitization project for local archives. She
    wishes to mentor younger volunteers, especially those managing stress or anxiety, by sharing coping strategies she has learned. She plans to complete a non-credit certificate in gerontology at a local
    community college to better support senior citizens. Writing a personal memoir that weaves family history with Midwestern cultural narratives is a long-term ambition. Additionally, she hopes to maintain
    her health through regular walking groups and to sustain a harmonious, supportive partnership with her spouse.
