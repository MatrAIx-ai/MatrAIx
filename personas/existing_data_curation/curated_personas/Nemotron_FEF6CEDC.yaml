  core: Lori Williams, a one‑year‑old, they blend a love of routine, solitary calm, and surprising compassion into a tiny yet steadfast personality that thrives on predictable schedules and gentle kindness,
    even though a sudden change can trigger a brief, dramatic tantrum.
background:
