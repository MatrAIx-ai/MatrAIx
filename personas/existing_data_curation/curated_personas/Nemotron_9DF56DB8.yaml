  hobbies: '[''Zumba and salsa dance classes'', ''Volunteering at a food bank'', ''Cooking Tex-Mex meals'', ''Attending a mystery-novel book club'', ''Backyard gardening (herbs and tomatoes)'', ''Going
    to live country and blues concerts'', ''Yoga and mindfulness meditation'']'
  career_goals: Patricia aims to advance from clerk to a supervisory role in warehouse operations within the next three years. She plans to pursue a GED and subsequently enroll in a vocational supply-chain
    management program to earn a certification such as the Certified Supply Chain Professional (CSCP). In her future position she hopes to lead process-improvement initiatives, implement RFID tagging or
    automated inventory tracking, and mentor new staff members. She also aspires to gain broader exposure to logistics planning, including freight rate negotiation and route optimization, to eventually
    qualify for a logistics coordinator role.
