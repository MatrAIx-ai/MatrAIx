personas:
  professional: Dalitza Vasquez, a nine‑year‑old budding illustrator, spends afternoons sketching cartoons and realistic portraits, channeling her curiosity into vibrant watercolors and digital art on a
    tablet while balancing school assignments with her love for organized sketchbooks and spontaneous doodles.
  sports: Dalitza Vasquez enjoys swimming at the Oxnard beach and playing weekend soccer matches with the East Ventura Youth Soccer Club, cheering for the Los Angeles Dodgers and the LA Galaxy, and she
    practices a quick morning stretch routine to stay flexible for art projects.
  arts: Dalitza Vasquez delights in drawing cartoons inspired by Disney’s classic characters and realistic portraits of her grandparents, finds inspiration in the vibrant murals at community festivals,
    and listens to lively mariachi melodies while painting watercolors of seaside shells.
  travel: Dalitza Vasquez loves weekend trips to Santa Barbara’s waterfront and annual family visits to Catalina Island, dreams of exploring the historic streets of Guadalajara and the colorful festivals
    in Oaxaca, and always packs a sketchbook to capture new scenery on the go.
  culinary: Dalitza Vasquez often helps her mother mash avocados for guacamole, enjoys sprinkling fresh cilantro on enchiladas, experiments with bright peach salsa, and tries to perfect homemade churros
    with cinnamon sugar after school, though she sometimes forgets to measure the sugar precisely.
  core: Dalitza Vasquez is a curious nine‑year‑old artist who balances organized sketchbooks with spontaneous creativity, worries about school expectations, and fuels her imagination with shells, LEGO bricks,
    and rhythmic family dances.
background:
  cultural: Dalitza grows up in a Mexican‑American household in Oxnard, where Spanish is spoken daily and Mexican traditions are celebrated. Her family observes holidays such as Día de los Muertos, Cinco
    de Mayo, and Las Posadas, cooking dishes like tamales, pozole, and enfrijoladas. She learns folk stories and songs from her grandparents, and she participates in community events at the local Hispanic
    cultural center. While attending school in Ventura County, she blends her heritage with the broader Californian culture, giving her a bicultural perspective that influences her art and worldview.
attributes:
  skills: '["Reading comprehension", "Writing", "Basic multiplication and division", "Bilingual Spanish-English", "Cartoon drawing", "Watercolor painting", "Digital art (tablet)", "Scratch programming",
