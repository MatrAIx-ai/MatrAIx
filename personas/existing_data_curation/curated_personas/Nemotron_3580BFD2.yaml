  hobbies: '["Cartoon drawing", "Watercolor painting", "Digital art (tablet)", "Reading picture books", "LEGO building", "Nature walks and beach exploration", "Listening to music", "Keyboard playing", "Traditional
    Mexican dancing", "Cooking with family", "Scratch storytelling"]'
  career_goals: Dalitza dreams of becoming an illustrator for children’s books, hoping to bring stories to life with her drawings. She also imagines designing a community art space where kids can explore
    creativity and find calm, perhaps one day becoming an art therapist who helps children cope with stress. In the short term, she wants to improve her art skills, learn more about coding, and volunteer
    at the local library’s storytime program to share her love of books and art.
