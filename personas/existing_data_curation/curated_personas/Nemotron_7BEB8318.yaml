  career_goals: Felicia aims to become a Certified Public Accountant within the next two years, using her current role as a stepping stone to deepen her technical expertise. She is particularly interested
    in specializing in sustainability reporting and forensic accounting, fields that allow her to blend analytical rigor with her curiosity about unconventional ideas. Over the next five years, she envisions
    moving into a senior auditor position, leading small audit teams, and eventually managing a boutique firm that focuses on serving artists, galleries, and other creative enterprises. Alongside formal
    certification, she plans to pursue part‑time coursework in data analytics to enhance her ability to turn financial data into compelling visual narratives.
