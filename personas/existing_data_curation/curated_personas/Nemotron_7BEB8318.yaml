personas:
  professional: Felicia Davis, a junior accountant at a boutique firm, leverages her strong QuickBooks and advanced Excel expertise—including pivot tables, VLOOKUP, and macros—to translate GAAP‑compliant
    financial statements into vivid Tableau visualizations, while her natural curiosity pushes her toward sustainability reporting and forensic accounting projects even as her spontaneous streak occasionally
    forces them into last‑minute deadline scrambles, and they often rely on strong coffee to power through those crunch times.
  sports: Felicia Davis, a yoga enthusiast and member of the Finger Lakes Hiking Club, balances impromptu sunrise hikes and weekly vinyasa classes with cheering on the Buffalo Bills on Sundays and supporting
    the Rochester Red Wings in spring, though their erratic schedule often leaves the local gym membership underutilized and they sometimes skip group fitness sessions.
  arts: Felicia Davis immerses herself in Rochester’s vibrant art scene, sketching watercolor studies at the Memorial Art Gallery while drawing inspiration from Georgia O’Keeffe’s bold palettes and Yayoi
    Kusama’s immersive installations, listening to Sufjan Stevens’ lyrical narratives, and they regularly volunteer at community art fairs where they showcase their own handcrafted pottery pieces.
  travel: Felicia Davis embraces spontaneous travel, often booking a last‑minute campervan for a weekend trek through the Finger Lakes’ waterfalls before dreaming of Iceland’s northern lights and Kyoto’s
    cherry blossoms, all while balancing a modest travel budget with a willingness to splurge on unique cultural experiences, and they relish the thrill of unplanned detours.
  culinary: Felicia Davis, an experimental home cook, delights in crafting miso‑infused ramen, saffron‑tinted mushroom risotto, and heirloom tomato tartines, and they often source fresh herbs and seasonal
    produce from the local farmer’s market to elevate their culinary creations.
  core: Felicia Davis is a curiosity‑driven accountant who blends spreadsheets with watercolor splashes, sprinting to meet deadlines after weekend hikes and meditation, and they have a habit of over‑ordering
    artisanal coffee beans that never get fully used.
background:
  cultural: Felicia was raised in the small rural hamlet of Piffard, NY, within a middle‑class, white American family that values independence, practicality, and community involvement. Growing up amidst
    farmland and the close‑knit atmosphere of Livingston County, she developed an appreciation for nature, seasonal cycles, and local traditions such as county fairs and farmers’ markets. Her upbringing
    included typical American holidays—Thanksgiving, Christmas, and Fourth of July celebrations—along with a modest exposure to the arts through community theater and the regional art scene. These influences
    fostered a quiet confidence, a respect for hard work, and an open‑minded curiosity that she carries into both her professional life and personal pursuits.
