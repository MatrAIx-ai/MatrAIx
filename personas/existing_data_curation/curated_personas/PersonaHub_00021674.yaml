persona_description: A neonatologist who specializes in the care of premature and sick newborns. The neonatologist is responsible for monitoring and treating the physical, medical, and emotional needs of
  these infants, as well as collaborating with other healthcare providers to ensure the best possible outcomes for each individual. They are skilled in the use of intravenous feeding techniques, as well
  as the management of conditions such as hypoglycemia, IVH, jaundice, and neurological issues. The neonatologist is also trained in the use of special equipment and techniques to monitor and treat these
  infants, such as gavage feeding, phototherapy, and other specialized treatments.
