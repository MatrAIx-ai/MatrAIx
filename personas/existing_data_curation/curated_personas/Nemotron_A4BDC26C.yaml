personas:
  professional: Debra Henson, a veteran private detective in Washington DC, leverages decades of surveillance, forensic, and legal research expertise to launch a boutique consultancy that mentors emerging
    investigators, offers specialized case reviews, and prepares a memoir on landmark cold cases, and they apply an organized, detail‑driven mindset that reflects their disciplined personality.
  sports: Debra Henson follows the Washington Capitals in the NHL and the Washington DC United in MLS, joins a senior yoga circle at the community center twice a week, participates in the Rock Creek Park
    birdwatching walk club, which doubles as low‑impact cardio, and they cheer on the Baltimore Ravens on game days.
  arts: Debra Henson curates a small collection of Agatha Christie first‑edition mystery novels, practices street photography inspired by Henri Cartier‑Bresson’s decisive‑moment style, attends occasional
    performances at the Shakespeare Theatre Company, finds solace in listening to Leonard Bernstein’s symphonic works, and they immerse themselves in the rhythm of the city, letting each visual and auditory
    cue fuel their investigative mind.
  travel: Debra Henson plans each journey with a research‑oriented itinerary, favoring historically rich sites such as Williamsburg, Virginia, the cobblestone streets of Savannah, Georgia, and overseas
    excursions to Seville, Spain to practice Spanish, while also fitting in short weekend visits to the national parks of Shenandoah for birdwatching, and they balance these trips with a modest budget and
    a desire for quiet reflection.
  culinary: Debra Henson delights in cooking garden‑fresh meals like rosemary‑infused roast chicken accompanied by heirloom tomatoes and roasted Washington apples, occasionally prepares Spanish tapas such
    as patatas bravas topped with smoked paprika, and they experiment with a vegetable ratatouille featuring zucchini, eggplant, and bell peppers harvested from their own plot, reflecting a moderate yet
    adventurous culinary skill set.
  core: Debra Henson treats every day like an open case, cataloguing clues from classic mysteries, garden notes, and street snapshots, and they can’t resist tapping a pen against any surface whenever a
    new puzzle surfaces.
background:
  cultural: Debra was raised in a mid‑century American white middle‑class family that valued education, self‑reliance, and community involvement. Growing up during the civil rights era in Washington, D.C.,
    she was exposed to the city's political vibrancy and cultural diversity, fostering a respect for civic duty and empathy for varied populations. Her upbringing emphasized disciplined work ethic and organized
    living, shaping her practical yet curious mindset. Although she has never married, she maintains strong familial and community ties, and her experiences in the nation's capital have instilled a nuanced
    appreciation for both the formal structures of governance and the informal networks that sustain local neighborhoods.
attributes:
  skills: '[''Surveillance techniques'', ''Interviewing and interrogation'', ''Forensic evidence collection'', ''Digital forensics'', ''Legal research and statutory analysis'', ''Report writing'', ''Case
    management'', ''Negotiation'', ''Stakeholder liaison'', ''Data analysis'', ''Spanish language proficiency'']'
  hobbies: '[''Reading classic mystery novels'', ''Crossword and logic puzzles'', ''Gardening'', ''Birdwatching in Rock Creek Park'', ''Yoga'', ''Street photography'', ''Volunteer work at legal aid clinic'',
    ''Historical research on Washington, D.C.'', ''Cooking Mediterranean cuisine'']'
  career_goals: Debra aims to transition her extensive investigative experience into a mentorship and consultancy role, establishing a boutique firm that offers specialized case reviews and training for
    emerging detectives. She aspires to author a memoir detailing notable cold cases and the evolution of investigative methods, contributing to the professional literature of private investigation. Additionally,
    she seeks to collaborate with local agencies on historic civil rights case reviews, leveraging her practical curiosity to uncover overlooked evidence. Maintaining her high standards, she also plans
    to obtain formal certification in digital forensics to stay at the forefront of technological advancements.
