personas:
  professional: Lizandra Mariona, a seasoned highway maintenance specialist with three decades of hands‑on experience operating pavers, rollers, and excavators, leverages their bilingual communication skills
    and deep knowledge of Texas DOT regulations to keep roadways safe while pursuing a crew‑lead certification and eyeing a future role mentoring crews.
  sports: Lizandra Mariona enjoys low‑impact fitness through daily walks in their backyard garden, follows the Dallas Cowboys and Houston Astros on television, participates in community clean‑up crews that
    double as informal exercise, and occasionally joins a local walking club that meets after Sunday mass.
  arts: Lizandra Mariona immerses themselves in regional music by listening to classic ranchera singers like Vicente Fernández and contemporary banda groups, watches telenovelas starring Thalía and Fernando
    Colunga, knits scarves and quilts while humming along, and delves into mystery novels by Agatha Christie and Sue Grafton during quiet evenings.
  travel: Lizandra Mariona favors road‑trip adventures that blend cultural cuisine and scenic drives, having toured the historic markets of Oaxaca, explored the vibrant art scene of Santa Fe, and dreams
    of a future pilgrimage to the Grand Canyon, all while they balance travel plans around family commitments and a modest budget.
  culinary: Lizandra Mariona delights in preparing family‑style dishes such as chiles rellenos, pozole, and freshly made salsa from garden‑grown tomatoes, chilies, and cilantro, balancing their skillful
    stovetop techniques with a modest collection of cast‑iron cookware and an occasional indulgence in store‑bought specialty cheeses.
  core: Lizandra Mariona, a pragmatic road‑crew veteran who blends their love of garden‑fresh cooking, community service, and mystery novels, navigates life with a routine‑driven yet flexible spirit, a
    dash of stubbornness, and a soft spot for quiet evenings.
background:
  cultural: Lizandra was raised in a Mexican‑American household where family, faith, and community are central values. She grew up speaking Spanish at home while also mastering English through school and
    work, giving her a bicultural perspective. Traditional celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas posadas are important to her, as are the recipes and music that accompany
    them. Living in Missouri City, Texas, she blends her Mexican heritage with the local Texan culture, embodying a practical, down‑to‑earth outlook that respects both her roots and her adopted community.
attributes:
  skills: '[''Heavy equipment operation'', ''Road surface inspection'', ''Highway maintenance procedures'', ''Safety compliance'', ''Team coordination'', ''Mechanical troubleshooting'', ''Knowledge of Texas
    DOT regulations'', ''Physical stamina'', ''Bilingual communication (Spanish/English)'', ''Conflict resolution'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Gardening'', ''Attending weekly church services'', ''Family gatherings and celebrations'', ''Volunteer work for community clean-ups'', ''Listening
    to Regional Mexican music'', ''Watching telenovelas'', ''Knitting or quilting'', ''Reading mystery novels'', ''Participating in local folk dance classes'']'
  career_goals: Lizandra aims to formalize her expertise by earning a Texas Department of Transportation crew‑lead certification within the next two years. She hopes to step into a supervisory role as a
    crew chief, where she can mentor newer workers and help implement practical safety improvements. Long‑term, she envisions transitioning to a part‑time training or consulting position that lets her share
    her hands‑on knowledge while maintaining a flexible schedule that accommodates family and community commitments.
