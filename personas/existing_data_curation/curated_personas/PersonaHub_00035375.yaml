persona_description: A scientist or researcher in the field of language development, particularly interested in understanding how babies learn one language over another through listening to humans around
  them and taking statistics on the sounds they need to know. Patricia Kuhl is internationally recognized for her research on early language and brain development, and her work has played a major role in
  demonstrating how early exposure to language alters the brain, with implications for critical periods in development, for bilingual education and reading readiness, for developmental disabilities involving
  language, and for research on computer understanding of speech.
