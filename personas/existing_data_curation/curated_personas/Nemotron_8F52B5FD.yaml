personas:
  professional: Yudit Santiago, they are an aspiring junior software developer and community volunteer who uses their curiosity and practical mindset to build simple coding games on a tablet, organize after‑school
    coding clubs for peers, and take center stage in school theater productions while balancing schoolwork with a reliable sense of responsibility.
  sports: Yudit Santiago, they are a dedicated youth soccer enthusiast who plays forward for the Albertville Lightning U‑12 team, cheers on the Alabama Crimson Tide football squad, idolizes FC Barcelona,
    incorporates salsa moves into warm‑ups, and trains three times a week while maintaining a playful rivalry with the local Little League baseball team.
  arts: Yudit Santiago, they are a vibrant creative who illustrates original comic strips about mythic creatures, dances salsa at family gatherings, stars in school plays like Peter Pan, and draws inspiration
    from Frida Kahlo, J.K. Rowling’s narrative magic, and Selena’s music.
  travel: Yudit Santiago, they are an adventurous family traveler who has explored the Gulf Coast beaches of Gulf Shores, visited the historic French Quarter in New Orleans, and dreams of strolling through
    the ancient ruins of Machu Picchu, preferring trips that blend cultural festivals with hands‑on activities like salsa workshops.
  culinary: Yudit Santiago, they are a budding home chef who helps their grandmother roll dough for beef empanadas, experiments with homemade chicken tacos and cheesy quesadillas, and delights in adding
    fresh cilantro and lime to every dish.
  core: Yudit Santiago, they are an 11‑year‑old talkative, resilient multitasker who blends curiosity, organization, and a love for soccer, coding, and cultural celebrations into a lively, community‑oriented
    life.
background:
  cultural: Yudit comes from a Hispanic family with roots in Central America. At home, Spanish is spoken alongside English, and her family celebrates cultural holidays such as Día de los Muertos and La
    Noche de San Juan with music, storytelling, and traditional foods. Living in Albertville, Alabama, she blends Southern hospitality with her Latino heritage, attending a local Catholic parish and participating
    in community events like the county fair. Her bicultural upbringing fosters a deep appreciation for both her family's traditions and the broader Southern community.
attributes:
