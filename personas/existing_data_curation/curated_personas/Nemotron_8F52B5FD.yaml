  hobbies: '["soccer", "salsa dancing", "reading fantasy novels", "comic drawing", "LEGO building", "block‑based coding (Scratch)", "cooking traditional family recipes", "volunteering at community center",
    "school theater and drama"]'
  career_goals: Yudit dreams of becoming a bilingual science educator who can inspire children from diverse backgrounds. She aims to earn a degree in elementary education with a focus on STEM, and eventually
    lead community outreach programs that blend scientific curiosity with cultural heritage. In the short term, she wants to win her school science fair, mentor younger students in the library, and continue
    developing leadership skills through school clubs.
