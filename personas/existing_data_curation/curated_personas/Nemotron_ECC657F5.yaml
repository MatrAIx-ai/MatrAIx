  hobbies: '[''Playing soccer'', ''Dancing'', ''Drawing and painting'', ''Building with LEGO bricks'', ''Reading picture books'', ''Exploring nature parks'', ''Collecting rocks and leaves'', ''Inventing
    make‑believe stories'']'
  career_goals: She dreams of becoming someone who explores and helps the world, such as a scientist who studies animals, a teacher who shares knowledge with curious friends, or an astronaut who discovers
    new places, and she already imagines building rockets from blocks and caring for pets while staying practical about learning step by step.
