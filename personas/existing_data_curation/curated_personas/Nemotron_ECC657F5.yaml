personas:
  professional: Elisha Beasley is a kindergarten explorer who treats classroom projects like mini‑construction sites, combining curiosity about the world with practical problem‑solving, and thrives in group
    activities where they can lead a story‑telling circle or a LEGO building challenge.
  sports: Elisha Beasley is a spirited member of the Little Rangers youth soccer league that practices at the community park, loves to dribble the ball with friends every Saturday, cheers for the US Women’s
    National Team and follows the nearby professional club City FC, and incorporates freestyle dance moves into their warm‑ups.
  arts: Elisha Beasley is a tiny artist who spends afternoons splashing watercolor on paper while humming the soundtrack of Disney’s 'Moana', admires the bold block illustrations of Eric Carle, enjoys dancing
    to Taylor Swift’s 'Shake It Off', and loves acting out scenes from the picture book 'Where the Wild Things Are' with friends.
  travel: Elisha Beasley is an adventurous explorer who loves weekend hikes on the family’s nearby nature trail to collect rocks and leaves, has visited the sandy shores of Santa Monica Beach and the towering
    waterfalls of Yosemite National Park, and dreams of camping under the northern lights in Iceland once they’re old enough to carry a small backpack.
  culinary: Elisha Beasley is a budding little chef who can whip up a perfect peanut‑butter‑and‑jelly sandwich, loves the cheesy stretch of a slice of pepperoni pizza, enjoys munching on carrot sticks and
    apple slices, and often helps stir batter for chocolate chip cookies, though they sometimes forget to wash their hands before cooking.
  core: Elisha Beasley is a curious, energetic six‑year‑old who blends spontaneous imagination with practical teamwork, leading group games and crafts while occasionally forgetting to tidy up their colorful
    chaos.
background:
  cultural: Elisha grows up in a middle‑class white family in Wilmington, Delaware, where mainstream American customs shape her daily life. She celebrates holidays such as Thanksgiving, Christmas, and the
    Fourth of July, attends a local public elementary school, and participates in community events like library story times and neighborhood block parties. Her upbringing blends the broader U.S. culture
    with regional Mid‑Atlantic influences, including visits to nearby beaches and state parks, and family traditions that emphasize curiosity, practical learning, and social interaction.
attributes:
