  career_goals: Even at three, Sandraliz talks about wanting to help others and create happy, organized spaces. She frequently says she wants to be a teacher or a helper for kids, envisioning a future as
    an early‑childhood educator or a pediatric caregiver. She also imagines volunteering at community health fairs or leading a bilingual activity center where she can combine her love of order with her
    compassion for families. Long‑term, she aspires to use her organizational talent to design programs that make learning fun and inclusive for children of all backgrounds.
