personas:
  professional: Sandraliz Cabrerasantana, a 3‑year‑old who spends mornings meticulously arranging building blocks into towers and bridges, showcases emergent engineering instincts by using plastic rulers
    and a disciplined approach to measurement, reflecting a balanced curiosity and practicality that hints at a future architect; they often line up blocks by color before building.
  sports: Sandraliz Cabrerasantana attends the Little Explorers Tots Soccer Club on Saturdays, loves cheering for the Chicago Cubs during family movie nights, and delights in a routine of jumping rope and
    dancing to upbeat music, reflecting their energetic, sociable, and disciplined nature; they eagerly greet new teammates with big smiles.
  arts: Sandraliz Cabrerasantana spends afternoons drawing colorful pictures of dinosaurs while humming songs from Sesame Street and The Wiggles, eagerly collecting stickers of favorite characters like
    Elmo and Bluey, and lets music and visual art shape their playful imagination; they often share their drawings with friends during playdates.
  travel: Sandraliz Cabrerasantana enjoys family road trips to the local zoo where they meticulously check every animal ticket, dreams of a future visit to Grand Canyon National Park, and prefers short,
    well‑planned journeys over long flights, reflecting their practical curiosity; they always pack a small backpack with their favorite stuffed animal for comfort.
  culinary: Sandraliz Cabrerasantana favors creamy macaroni and cheese with extra cheddar, loves scooping banana slices onto mini pancakes, proudly helps stir mango‑smoothies, yet insists on eating vanilla
    yogurt without any fruit chunks, revealing a disciplined palate with occasional picky quirks; they often request a separate plate for their favorite foods to keep them neat.
  core: Sandraliz Cabrerasantana is a meticulous, curious three‑year‑old who balances tidy toy organization with enthusiastic social play, saving coins while occasionally splurging on stickers; they delight
    in arranging their crayons by hue before drawing.
background:
  cultural: Sandraliz is a Mexican‑heritage child raised in Strawn, Texas. Her family celebrates Mexican traditions such as Día de los Muertos, Día de la Independencia, and festive gatherings with foods
    like tamales and arroz con pollo. Bilingual exposure to both Spanish and English shapes her daily communication, and her preschool incorporates a bilingual curriculum that reinforces cultural pride
    while integrating into the broader Texan community. Core values of family cohesion, respect for elders, and communal harmony guide her compassionate and cooperative nature.
