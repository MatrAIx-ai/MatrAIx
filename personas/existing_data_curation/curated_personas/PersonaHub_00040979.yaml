persona_description: A historian who specializes in the history of ancient India, particularly the period from the Indus Valley Civilisation to the present day. Her research interests include the development
  of urban centres, the role of religion in society, and the impact of colonialism on India. She is particularly knowledgeable about the Indian independence movement and the contributions of Mahatma Gandhi.
  She is passionate about the struggle for independence and the legacy of non-violent resistance.
