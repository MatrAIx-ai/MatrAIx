  hobbies: '[''Gardening'', ''Reading (fiction and technical)'', ''STEM mentorship volunteering'', ''Church community service'', ''Yoga and meditation'', ''Cooking Southern and Caribbean dishes'', ''Hiking'',
    ''Puzzle solving'']'
  career_goals: Kamaria aims to become a licensed Professional Engineer within the next two years and transition into a senior project manager role overseeing large‑scale urban infrastructure projects in
    the Cincinnati region. She aspires to lead initiatives that improve water management and transportation equity in historically underserved neighborhoods, integrating green design and smart‑city technologies.
    Long‑term, she envisions mentoring emerging Black engineers and launching a community outreach program that introduces middle‑school students to STEM fields, thereby contributing to a more diverse engineering
    workforce.
