personas:
  professional: Kamaria Edwards is a civil engineer specializing in structural analysis, water resources, and sustainable urban design, who leverages their organized, methodical nature and deep commitment
    to community equity to lead multidisciplinary municipal projects with meticulous documentation and proactive stakeholder engagement.
  sports: Kamaria Edwards stays active by joining the Cincinnati Ladies Cycling Club for weekend rides, practicing yoga at the community center, cheering on the Bengals on Sundays, and rooting for the Reds
    during baseball season, while also enjoying occasional pick‑up basketball games at the local park in the summer.
  arts: Kamaria Edwards immerses themselves in the soulful sounds of Anderson .Paak, the literary world of Jesmyn Ward, the vibrant paintings of Kehinde Wiley, and regularly attends performances at the
    Taft Theatre, finding that these artistic experiences fuel both personal relaxation and professional creativity.
  travel: Kamaria Edwards prefers thoughtfully planned road trips that blend cultural immersion with relaxation, having explored the historic streets of New Orleans, the spice markets of Kingston, Jamaica,
    and the serene landscapes of the Great Smoky Mountains, while dreaming of a future pilgrimage to Ghana’s coastal villages to trace ancestral roots.
  culinary: Kamaria Edwards, a confident home cook, loves to whisk together Southern‑style gumbo with Caribbean jerk chicken, infusing dishes with thyme, scotch bonnet peppers, and collard greens, and frequently
    experiments with fresh herbs from their balcony garden to create vibrant, spice‑laden meals for family gatherings.
  core: Kamaria Edwards is a detail‑driven civil engineer who balances rigorous project schedules with a penchant for overwatering their balcony herbs, binge‑reading technical journals at midnight, and
    an irrepressible habit of checking the local forecast three times each morning.
background:
  cultural: Kamaria identifies as African‑American, with family roots tracing back to the Great Migration when her grandparents moved from the South to the Midwest. Growing up in Cincinnati's historic Over-the-Rhine
    and West End neighborhoods, she was immersed in a vibrant Black cultural scene that includes soul music, church traditions, and community activism. She maintains strong ties to her extended family,
    celebrates Juneteenth and other cultural holidays, and participates in local events such as the African American Cultural Heritage Festival. Her cultural heritage informs her commitment to equity in
    engineering projects and her desire to uplift underrepresented voices in both her professional and volunteer endeavors.
attributes:
  skills: '[''Structural analysis'', ''Site development'', ''Water resources engineering'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''GIS mapping'', ''Building code compliance'', ''Sustainable infrastructure
