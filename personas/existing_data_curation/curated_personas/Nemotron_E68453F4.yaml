personas:
  professional: Briana Thomas, a retired home‑management veteran turned community wellness coordinator, leverages her decades of household organization, budgeting expertise, and empathetic listening to
    structure weekly senior‑support groups and garden programs, while her practical mindset and social energy keep events orderly, though they sometimes worry excessively about every detail.
  sports: Briana Thomas enjoys low‑impact fitness, joining the Hermann Park Senior Walking Club for sunrise strolls, playing casual pickleball at the local senior center, and cheering on the Houston Astros
    during spring training, while their structured routine keeps a regular schedule, yet they sometimes miss a session when anxiety spikes.
  arts: Briana Thomas weaves stories in fabric as a quilt‑making enthusiast, threads gospel classics from Mahalia Jackson and Kirk Franklin into the church choir, and unwinds with romance novels by Nora
    Roberts and Nicholas Sparks, allowing their compassionate nature to shine through both music and textile art, though they occasionally lose track of time stitching.
  travel: Briana Thomas prefers relaxed, structured road trips with their husband, favoring weekend getaways to historic Southern towns like Savannah, Charleston, and New Orleans where they can sample local
    cuisine, while careful budgeting guides them to stay in family‑run B&Bs and avoid spontaneous splurges, though they sometimes over‑pack and worry about missed appointments.
  culinary: Briana Thomas delights in cooking soul‑food staples—crispy fried chicken seasoned with paprika, slow‑simmered collard greens flavored with smoked turkey, and sweet potato pie spiced with cinnamon
    and nutmeg—using fresh herbs like basil and thyme from their garden, and they proudly host weekly church potlucks, though they sometimes burn the edges of the cornbread when rushing.
  core: Energetic, detail‑obsessive, and deeply caring, Briana Thomas channels their love of community, garden, and gospel into structured senior support while battling lingering anxiety that fuels both
    meticulous planning and occasional over‑thinking.
background:
  cultural: Briana was raised in a close‑knit African‑American neighborhood in Houston, where church, family gatherings, and shared meals formed the core of community life. She grew up hearing gospel music,
    participating in Southern‑style cookouts, and celebrating holidays with traditions that blend African heritage, Southern hospitality, and Texas pride. Her family places high value on mutual support,
    respect for elders, and collective resilience, values she carries forward in her volunteer work and daily interactions.
attributes:
  skills: '[''Household management'', ''Meal planning and cooking'', ''Budgeting and financial organization'', ''Community event coordination'', ''Peer counseling and mentorship'', ''Basic first aid'',
    ''Gardening and horticulture'', ''Church choir singing'', ''Conflict mediation'', ''Basic digital literacy'']'
  hobbies: '[''Soul‑food cooking'', ''Gardening'', ''Gospel singing'', ''Quilting'', ''Reading romance novels'', ''Walking in local parks'', ''Community bingo'', ''Senior center dance socials'']'
  career_goals: Although retired from formal employment, Briana aims to expand her impact within the local community. She plans to develop a weekly senior‑wellness support group focused on coping with anxiety
    and grief, and to train other volunteers in empathetic listening techniques. She hopes to lead a neighborhood garden program that supplies fresh produce to a community food bank. Additionally, she aspires
    to learn more advanced smartphone and tablet functions so she can create a digital scrapbook of family history and mentor grandchildren in using technology responsibly.
