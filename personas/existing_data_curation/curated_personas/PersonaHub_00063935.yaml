persona_description: A high-level official or expert in the field of environmental science, particularly concerned with the impact of climate change on biodiversity and the conservation of species. They
  are likely to be knowledgeable about the Kyoto Protocol and the importance of reducing greenhouse gas emissions to mitigate the effects of climate change. They may also be familiar with the World Summit
  on Sustainable Development and its targets for reducing the loss of species. They are likely to be interested in the study by C.D. Thomas et al., “Extinction risk from climate change”, published in Nature
  on January 8, 2004, and may be actively engaged in efforts to address the issue of biodiversity loss and climate change.
