personas:
  professional: Alejandra Betancourt, a seasoned administrative specialist known for razor‑sharp organization, bilingual communication, and flawless record‑keeping, translates her love of structure and
    disciplined work ethic into seamless front‑desk operations, and they serve as the trusted mentor for new staff and the go‑to liaison for Spanish‑speaking clients.
  sports: Alejandra Betancourt, an avid weekend hiker, enjoys low‑impact exercise on the Franklin Mountains Trail with a small walking club, supports the El Paso Chihuahuas minor‑league baseball team, and
    they tune in to the Dallas Cowboys for occasional NFL Sundays, reflecting their preference for solitary activity punctuated by modest fandom.
  arts: Alejandra Betancourt, a devoted listener of norteño and ranchera classics such as Pedro Infante and Los Tigres del Norte, immerses themselves in the poetry of Octavio Paz and Pablo Neruda, and they
    occasionally attend community theater productions celebrating folk tales, a blend that nurtures their introspective nature while keeping cultural traditions alive.
  travel: Alejandra Betancourt, a methodical planner who favors low‑key, small‑group trips, has explored Mexico City’s historic center and the art‑filled streets of Santa Fe, and they now dream of a week‑long
    culinary pilgrimage to Oaxaca’s tlayudas and the vibrant lanes of Guanajuato, all while balancing a modest budget and a full‑time schedule.
  culinary: Alejandra Betancourt, a skilled home cook, perfects homemade salsa verde with garden‑grown cilantro, jalapeños, and tomatillos, layers rich posole rojo with homestyle pork and hominy, and they
    roll fragrant chicken tamales wrapped in corn husks, though they sometimes over‑spice the salsa in their enthusiasm for bold flavor.
  core: Alejandra Betancourt, a detail‑driven office manager with a quiet devotion to traditional cooking, garden herbs, and desert walks, often juggles spreadsheets while humming norteño tunes, yet they
    sometimes forget to water their potted cactus on rainy days.
background:
  cultural: Alejandra is a first‑generation Mexican‑American raised in the border city of El Paso. She grew up bilingual, speaking Spanish at home and English in school and work. Family and community traditions,
    such as celebrating Día de los Muertos, Mexican holidays, and Catholic rituals, shape her values of respect, cooperation, and hospitality. Her Mexican heritage influences her love for cooking, music,
    and close‑knit family networks. Living in El Paso, she blends Mexican cultural practices with Tex‑Mex influences, fostering a strong sense of identity that emphasizes hard work, modesty, and support
    for her local Hispanic community.
