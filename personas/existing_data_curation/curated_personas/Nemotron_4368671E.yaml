  career_goals: Alejandra aims to advance to a supervisory or office manager role within the next three to five years, leveraging her organizational strengths and bilingual abilities. She plans to complete
    her GED and pursue an associate degree or certification in office administration to formalize her skills. Additionally, she intends to acquire proficiency in advanced office technologies such as customer
    relationship management (CRM) systems and digital filing platforms. Her long‑term ambition includes becoming a bilingual liaison or coordinator for community services, while maintaining a stable, supportive
    work environment that allows her to mentor other employees and contribute to the local Hispanic community.
