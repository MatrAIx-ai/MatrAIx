  hobbies: '["Gardening","Church choir singing","Story‑telling for seniors","Bridge and bingo tournaments","Quilting","Traditional Southern cooking","Hosting potluck gatherings","Reading historical mysteries","Walking
    along the Mississippi River"]'
  career_goals: Although retired, Eugenia aims to leave a lasting legacy within her community. She aspires to mentor younger volunteers at her church, ensuring the continuation of the annual Spring Jubilee
    she has helped organize for decades. She also plans to compile a family cookbook that captures traditional Southern recipes and the stories behind them, hoping to publish it for her grandchildren. Additionally,
    she seeks to maintain her financial health to support her extended family and possibly start a small home‑based business selling handcrafted quilts and preserves, combining her competitive drive with
    her practical skills.
