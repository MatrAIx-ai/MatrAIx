personas:
  professional: Eugenia Donley, a retired community organizer and volunteer coordinator, leverages meticulous budgeting, public‑speaking flair, and a competitive bridge mindset to orchestrate the beloved
    Spring Jubilee while they mentor younger volunteers with the same reliable yet flexible drive that defines their sociable and detail‑oriented nature.
  sports: Eugenia Donley avidly follows the New Orleans Saints and the Mississippi State Bulldogs, walks with the Natchez River Strollers senior walking club three times a week, and participates in a local
    seniors’ bingo league where a playful rivalry keeps them on their feet, though they avoid strenuous exercise due to arthritis.
  arts: Eugenia Donley sings gospel hymns with her church choir while they listen to Mahalia Jackson, leads storytelling evenings that weave local history into vivid narratives, quilts intricate Log Cabin
    patterns inspired by the works of Mary Cassatt, and unwinds with historical mysteries by Ellis Peters, all of which feed their need for social connection and creative expression.
  travel: Eugenia Donley enjoys meticulously planned weekend getaways to Natchez’s historic homes, took a river cruise to New Orleans last spring, and dreams of strolling through Savannah’s oak‑lined squares
    and the French Quarter’s bustling markets, but they often wait for senior discount packages to make such trips fit their modest budget.
  culinary: Eugenia Donley perfects a rich, buttery roux for gumbo, layers jambalaya with smoked sausage, shrimp, and fresh okra, bakes pecan pie using locally harvested pecans, and savors the aroma of
    simmering collard greens seasoned with ham hocks, sharing these hearty Southern dishes at potluck dinners that reinforce their love of community and tradition.
  core: Eugenia Donley is a routine‑loving senior whose competitive bridge tactics spill over into community event planning, worries over every detail yet finds peace in garden soil and quilt stitching,
    and even if they occasionally over‑season their gumbo, they never miss a chance to be the life of the choir.
background:
  cultural: Eugenia was raised in a traditional white Southern family in central Louisiana, where close‑knit community ties, church participation, and respect for family heritage were emphasized. Growing
    up in Pineville, she was immersed in the region's blend of Anglo‑American customs and the subtle influences of French‑Creole cuisine and festivities. Her upbringing instilled values of practicality,
    reliability, and hospitality, which continue to shape her daily routines and social interactions. She identifies strongly with the cultural norms of the American South—valuing modesty, a strong work
    ethic, and community service—while also appreciating the local traditions such as Mardi Gras celebrations, seasonal harvest festivals, and the region's distinctive culinary heritage.
