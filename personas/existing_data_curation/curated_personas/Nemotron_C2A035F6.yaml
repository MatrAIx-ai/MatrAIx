personas:
  professional: Pedro Hoang is a full‑stack engineer who wields Python, React, and Docker to build cloud‑native applications, constantly balancing inventive curiosity with practical best practices while
    they navigate a relaxed, sometimes chaotic schedule through collaborative empathy and a clear eye on evolving into a lead engineer or cloud solutions architect.
  sports: Pedro Hoang is an avid surfer at Pacific Beach, a frequent hiker of Torrey Pines’s coastal trails, and a devoted fan of the San Diego Padres and Los Angeles Chargers, often joining local beach‑volleyball
    pick‑up games while balancing solo paddle‑boarding sessions with group surf outings.
  arts: Pedro Hoang blends evenings of acoustic guitar, often covering John Mayer’s soulful tracks, with sci‑fi marathons featuring works by Isaac Asimov and Andy Weir, they curate board‑game nights that
    showcase indie designers like Stonemaier Games, and regularly attend downtown gallery openings that celebrate vibrant street‑art murals.
  travel: Pedro Hoang prefers spur‑of‑the‑moment coastal escapes, having recently surf‑checked the islands of Maui and biked across Big Sur’s cliffs, while dreaming of a tech‑culture immersion in Tokyo
    and a culinary pilgrimage to Kuala Lumpur, all planned with flexible dates to accommodate their freelance side‑project schedule.
  culinary: Pedro Hoang enjoys experimenting with family‑rooted recipes such as aromatic lemongrass‑infused broth, caramelized pork with tamarind glaze, and coconut‑milk simmered vegetables, deftly balancing
    the bold umami of fish sauce and shrimp paste with fresh herbs like cilantro and basil, and they often improvise with pantry staples when inspiration strikes.
  core: Pedro Hoang is a curious, laid‑back technologist who juggles cloud‑code, board games, surf sessions, and experimental cooking, all while occasionally letting disorganization slip into missed appointments
    and impulsive splurges.
background:
  cultural: Pedro is a first‑generation American with mixed Vietnamese‑Filipino heritage. His family emphasizes community, respect for elders, and the value of education, which shaped his pursuit of a STEM
    degree. Growing up in San Diego, he blends traditional customs—celebrating Tet, Sinulog, and family gatherings centered around food—with the coastal Californian lifestyle. He is bilingual in English
    and Vietnamese, and often serves as a cultural bridge, helping other Southeast Asian immigrants navigate tech career pathways while preserving culinary traditions through weekend cooking sessions.
