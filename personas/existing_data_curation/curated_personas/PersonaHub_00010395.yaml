persona_description: A reader who is interested in the philosophy of psychology and specifically in the works of Ludwig Wittgenstein. This reader is likely to be a philosopher or a psychologist who is interested
  in understanding the mind-body problem and the relationship between mental states and bodily behavior. They are also likely to be familiar with the works of Bertrand Russell and the philosophy of logic.
  This reader is likely to appreciate the depth and complexity of Wittgenstein's thought and would be interested in the variations on the classic philosophical theme of the relation between mind and body
  that he explored in his last years.
