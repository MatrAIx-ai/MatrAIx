  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Gardening'', ''Reading non-fiction (history, technology)'', ''Volunteer work at local food pantry'', ''Playing poker'', ''Attending high school
    football games'', ''Listening to classic country music'']'
  career_goals: Kevin aims to advance into a supervisory role within his current firm, leveraging his experience to lead a team of collectors and implement more efficient, data‑driven collection strategies.
    He is interested in obtaining a formal business management certification to complement his practical knowledge and eventually transition into a consulting role that helps small businesses improve cash‑flow
    management and debt recovery processes. Long‑term, he envisions a semi‑retired lifestyle where he can mentor younger professionals while running a modest side business offering financial budgeting workshops
    for retirees in his community.
