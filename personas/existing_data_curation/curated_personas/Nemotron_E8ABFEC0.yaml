personas:
  professional: Caitlyn Hansen is a budding nonprofit administrator who leverages her associate’s degree‑level proficiency in Microsoft Office, data entry, and event coordination to craft meticulous yet
    adaptable project plans for community sustainability initiatives, while her supportive interpersonal style helps her mediate volunteer teams and keep stakeholder relationships harmonious.
  sports: Caitlyn Hansen enjoys weekend hikes in the Cascades, occasionally joins a local climbing club, follows the Seattle Seahawks for football, supports the Seattle Sounders FC during the MLS season,
    and completes weekly yoga sessions at a community studio to stay flexible and grounded.
  arts: Caitlyn Hansen channels her love for visual storytelling through nature photography inspired by Ansel Adams, curates a small collection of contemporary novels by authors like Chimamanda Ngozi Adichie
    and Margaret Atwood, and unwinds to the folk‑indie sounds of Fleet Foxes and Sufjan Stevens, often attending local art walks and open‑mic nights to connect with the creative community.
  travel: Caitlyn Hansen prefers self‑planned eco‑friendly getaways, often exploring the Pacific Northwest's coastal trails in Oregon and taking weekend road trips to the Canadian Rockies, while she dreams
    of trekking New Zealand's Milford Track and backpacking through Patagonia's Torres del Paine, balancing travel ambitions with a modest student budget.
  culinary: Caitlyn Hansen experiments in her modest balcony kitchen with seasonal, locally sourced meals, frequently preparing roasted beet and quinoa salads with goat cheese, pan‑seared salmon topped
    with dill and lemon, and for comfort evenings perfecting a classic mushroom‑garlic risotto, all while occasional take‑out of vegan sushi from the downtown market satisfies her craving for quick flavor.
  core: Caitlyn Hansen is a curiosity‑driven yet practical 22‑year‑old who balances meticulous organization with spontaneous creativity, toggling between detailed spreadsheets and impromptu hikes, though
    they sometimes let a night‑owl habit delay responding to non‑urgent emails.
background:
  cultural: Caitlyn comes from a White, middle‑class family with roots in the Pacific Northwest, reflecting a blend of Scandinavian and German ancestry. Growing up in Bellingham and surrounding Skagit County,
    she absorbed the region’s emphasis on environmental stewardship, self‑reliance, and community involvement. Her upbringing emphasized modesty, cooperation, and respect for nature, which shape her values
    and inform her interest in sustainability and local volunteer work.
attributes:
  skills: '["Microsoft Office Suite", "Data entry", "Basic bookkeeping", "Event planning", "Research and analysis", "Conflict resolution", "Volunteer coordination", "Customer service", "Organizational and
