  hobbies: '["Hiking", "Nature photography", "Reading contemporary fiction", "Gardening", "Volunteering at animal shelters", "Yoga", "Journaling", "Board games with close friends", "Cooking experimental
    meals", "DIY crafts"]'
  career_goals: Caitlyn aims to transition into a role within the nonprofit or public‑sector sphere where she can contribute to community development and environmental sustainability initiatives. She plans
    to enroll in a bachelor's program in Environmental Studies or Public Administration within the next two years, with the long‑term ambition of becoming a program coordinator or project manager for a
    regional conservation organization. In the interim, she hopes to build a portfolio of freelance virtual‑assistant projects that leverage her administrative expertise while supporting causes she cares
    about.
