  hobbies: '["Street sketching and mural scouting","Listening to blues, gospel, and hip‑hop","Poetry slams and spoken‑word events","Guitar playing and jam sessions","Cooking soul‑food family recipes","Fishing
    on the Mississippi River","Basketball at the community park","Reading speculative fiction and graphic novels"]'
  career_goals: Woodrow aims to earn his GED within the next year and enroll in a community college program focused on visual arts or digital media. He envisions establishing himself as a freelance muralist
    and multimedia artist, creating public artworks that reflect the stories and struggles of his hometown. Long‑term, he hopes to open a community art space in Vicksburg where local youth can explore creative
    expression, and eventually work as a cultural curator for a regional museum or heritage center, highlighting African‑American history in the Mississippi Delta.
