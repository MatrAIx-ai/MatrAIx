personas:
  professional: Woodrow Walker is an emerging muralist and multimedia artist who blends graffiti techniques with spoken‑word lyricism, using their curiosity and competitive streak to secure freelance gigs
    while often juggling projects with a relaxed, disorganized schedule that leaves deadlines to the last minute.
  sports: Woodrow Walker plays pickup basketball at the Vicksburg Community Park, cheering for the Memphis Grizzlies on game nights and joins the local Mississippi River Anglers Club, where they spend weekends
    fishing the river's backwaters while maintaining a casual fitness routine that prefers spontaneous street‑ball games over regimented gym sessions.
  arts: Woodrow Walker immerses themselves in the local arts scene, performing spoken‑word pieces at open‑mic nights while strumming guitar riffs inspired by Muddy Waters and Kendrick Lamar, curating Instagram
    feeds that showcase vibrant murals reminiscent of Banksy, and savoring poetry collections by the likes of Maya Angelou and spoken‑word veteran Saul Williams.
  travel: Woodrow Walker favors road trips along the Mississippi Delta, having visited the historic blues trail in Clarksdale, the National Civil Rights Museum in Memphis, and the culinary streets of New
    Orleans, while dreaming of a creative residency in Detroit's mural district but constrained by a modest budget that pushes them to plan low‑cost stays in hostels and campgrounds.
  culinary: Woodrow Walker loves cooking soul‑food staples such as fried catfish, collard greens seasoned with smoked turkey, sweet‑potato pie, and homemade cornbread, experimenting with a sprinkle of Cajun
    spices while often improvising recipes after watching cooking videos, though they sometimes over‑salt dishes when distracted by music.
  core: Woodrow Walker is a passionately curious 25‑year‑old muralist whose artistic drive is fueled by blues‑rich heritage, competitive spirit, and a restless mind that swings between intense creativity
    and bouts of anxiety.
background:
  cultural: Woodrow grew up in Vicksburg, Mississippi, within a close‑knit African‑American community that cherishes its rich civil‑rights heritage and Southern traditions. Family gatherings often featured
    gospel music, storytelling, and homemade dishes that connect him to generations of Black Mississippians. The local history of the Mississippi River, the legacy of the blues, and the presence of historic
    Black churches have shaped his worldview, instilling a deep respect for resilience, collective memory, and cultural expression. While he navigates the challenges of limited formal education, he draws
    strength from community mentors, neighborhood art programs, and the broader tapestry of Black Southern culture.
attributes:
