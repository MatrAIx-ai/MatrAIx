personas:
  professional: Yanil Cruz, a 21-year‑old welding and metal‑joining specialist, blends precise MIG, TIG, and stick welding expertise with a solitary love for sketching and kinetic sculpture, leveraging
    a curious, flexible mindset to solve complex problems in aerospace‑grade projects while occasionally letting the disorganized side of their workflow surface.
  sports: Yanil Cruz’s athletic pursuits center on solo hikes through the Rocky Mountain foothills and weekend trail runs, while they root for the Denver Broncos, the Colorado Avalanche, and the Colorado
    Rapids, preferring natural terrain over gym workouts.
  arts: Yanil Cruz immerses themselves in visual culture, frequenting the Denver Art Museum and local street‑mural tours, listening to Los Lobos and Joe Satriani, sketching metal concepts, playing acoustic
    guitar on quiet evenings, and creating digital illustrations of futuristic sculptures using Photoshop, Procreate, and Fusion 360.
  travel: Yanil Cruz dreams of a hands‑on apprenticeship journey to Oaxaca’s metal‑craft workshops after capturing sunrise hikes in Rocky Mountain National Park, weekend trips to Moab’s red‑rock canyons,
    and a cultural immersion visit to Guadalajara’s vibrant galleries.
  culinary: Yanil Cruz favors smoky chipotle‑kettle corn, hand‑rolled carnitas tacos, and charred rosemary‑infused potatoes, often cooking them on a portable propane grill while experimenting with coffee‑infused
    marinades and occasionally over‑cooking a steak during late‑night project sessions.
  core: Yanil Cruz is a metal‑welding prodigy who channels a quiet, curious spirit into solo art, rugged hikes, and a habit of splurging on vintage tools while juggling a messy schedule and a love for Mexican
    folk riffs.
background:
  cultural: Yanil is a second‑generation Mexican‑American raised in a bilingual home where Spanish was spoken alongside English. His parents emigrated from central Mexico, bringing family traditions such
    as Día de los Muertos celebrations, Mexican cuisine, and a respect for craftsmanship. These cultural influences nurture his appreciation for the decorative metalwork found in Mexican folk art, which
    inspires his own welding projects. Living in Aurora, Colorado, he balances his heritage with the multicultural environment of the city, participating in local Hispanic community events while also integrating
    into the broader American workforce. His cultural background shapes his work ethic, prioritizing family support, perseverance, and a blend of traditional and contemporary perspectives.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Bronze and silver brazing'', ''Electronics and pipe soldering'', ''Blueprint and technical drawing interpretation'', ''Plasma cutting'',
    ''Basic 3D CAD modeling (Fusion 360)'', ''OSHA safety compliance'', ''Problem solving in fabrication'', ''Independent project execution'', ''Team collaboration in workshop'']'
  hobbies: '[''Sketching metal design concepts'', ''Building kinetic sculptures'', ''Hiking in the Colorado foothills'', ''Visiting art galleries and murals'', ''Listening to Mexican folk and instrumental
    music'', ''Reading science‑fiction literature'', ''Restoring vintage hand tools'', ''Playing acoustic guitar'', ''Digital illustration (Photoshop, Procreate)'', ''3D modeling for metal projects (Fusion
    360)'']'
  career_goals: Yanil aims to become an AWS Certified Welder within the next two years and complete an associate degree in welding technology. He aspires to work in a precision‑focused industry such as
    aerospace or high‑performance automotive manufacturing, where his attention to detail and stress tolerance can be leveraged. Parallel to his technical career, he plans to launch a small boutique studio
    that creates custom metal art pieces and functional furniture, blending his welding expertise with his artistic curiosity. He also hopes to travel to Mexico to study traditional metal‑craft techniques
    and eventually mentor apprentices seeking hands‑on experience in the trade.
