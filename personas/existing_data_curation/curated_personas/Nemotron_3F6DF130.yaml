  hobbies: '[''Visiting art galleries and museums'', ''Photography (street and portrait)'', ''Cooking traditional Southern and soul food dishes'', ''Volunteering at community centers and local non-profits'',
    ''Participating in church choir and events'', ''Dancing (African and contemporary)'', ''Group fitness classes (Zumba, yoga)'', ''Reading contemporary fiction and historical biographies'', ''Exploring
    Philadelphia’s historic neighborhoods'', ''Gardening in community plots'']'
  career_goals: Amber aims to advance to an office manager position within the next three years, pursuing the Certified Administrative Professional (CAP) credential to solidify her expertise. She also wishes
    to transition into a hybrid role that blends administrative leadership with community outreach, eventually becoming a program coordinator for a local non‑profit focused on arts education and youth mentorship.
    Continuing education through evening courses in nonprofit management is part of her long‑term plan.
