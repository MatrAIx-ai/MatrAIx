  career_goals: Rose aims to solidify her reputation as the top-selling agent in St. Tammany Parish, targeting the annual sales leaderboard while expanding her client base among retirees and vacation homeowners.
    She plans to mentor a small team of junior agents, sharing her disciplined work ethic and structured processes. Over the next few years, she hopes to transition her brokerage into a boutique firm that
    specializes in senior-friendly housing and waterfront properties, ensuring a steady income stream for her retirement. Additionally, she seeks to earn recognition from the local Chamber of Commerce for
    community service and real estate excellence.
