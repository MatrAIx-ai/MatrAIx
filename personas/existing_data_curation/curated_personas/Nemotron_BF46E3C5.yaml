  career_goals: Minh plans to earn his high school equivalency (GED) within the next year and enroll in a community college program focused on logistics or business administration. His short‑term goal is
    to advance to a supervisory role within the U.S. Postal Service, overseeing a team of carriers and contributing to route efficiency initiatives. Long‑term, he aspires to combine his professional experience
    with his passion for the arts by pursuing a certificate in museum studies or cultural programming, ultimately working on community outreach projects that bridge public services and local art initiatives.
    He also hopes to continue personal development through mindfulness practice to better manage his anxiety and emotional reactivity.
