personas:
  professional: Sarah Frazier, a 31‑year‑old animal behavior specialist, leverages their meticulous data‑driven assessments, operant‑conditioning expertise, and competitive edge to design elite agility
    curricula while leading workshops and mentoring junior trainers with an organized, skeptical eye toward proven methods.
  sports: Sarah Frazier, an avid hiker of Willamette National Forest trails and dog‑agility competitor, anchors their fitness regimen with yoga and weekly runs, supports the Portland Timbers and the Oregon
    State Beavers, and participates in the Salem Trail Runners club for seasonal trail races.
  arts: Sarah Frazier, a dynamic member of a community theater troupe, channels their outgoing energy into improvisational productions, draws inspiration from Lin‑Manuel Miranda’s lyrical storytelling,
    and finds solace in the haunting folk sounds of The Decemberists after rehearsals.
  travel: Sarah Frazier favors weekend escapes to Oregon’s coastal towns like Cannon Beach for tide‑pool photography, plans annual trips to the Canadian Rockies for extended hikes, and dreams of a spring
    pilgrimage to Kyoto’s temples to experience Japanese garden design and mindfulness practices.
  culinary: Sarah Frazier, a culinary hobbyist who excels in farm‑to‑table cooking, delights in preparing roasted salmon with locally foraged matsutake mushrooms, crafting heirloom kale chips, and mastering
    the art of sourdough starter maintenance using Oregon hazelnut flour.
  core: Sarah Frazier blends obsessive organization, competitive drive, and a love for animals into a disciplined, socially vibrant life that balances meticulous training work with yoga‑induced stress relief
    and occasional anxiety‑fed perfectionism.
background:
  cultural: Sarah grew up in a suburban family in the Pacific Northwest, where outdoor activities and pet ownership were integral parts of daily life. Her white, middle‑class American upbringing emphasized
    self‑reliance, community involvement, and a strong work ethic. Influenced by Oregon’s progressive environmental culture, she values sustainability, local food movements, and a deep appreciation for
    nature. Family traditions include weekend camping trips and annual participation in county fair livestock shows. She maintains strong ties to the Salem community, supporting neighborhood events and
    embodying a collaborative yet competitive spirit.
attributes:
