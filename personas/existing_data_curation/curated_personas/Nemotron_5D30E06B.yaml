    and inventory management'']'
  hobbies: '[''Dog agility competitions'', ''Animal shelter volunteering'', ''Trail hiking with dogs'', ''Community theater'', ''Yoga and mindfulness meditation'', ''Farm-to-table cooking classes'', ''Landscape
    photography'', ''Puzzle and brain teaser games'', ''Youth mentorship in pet care'']'
  career_goals: Sarah aims to become a senior trainer at a regional animal rehabilitation center and attain the Certified Professional Animal Trainer (CPAT) credential within the next two years. She plans
    to develop an evidence‑based training curriculum for service dogs, publish a manual on training stress‑sensitive animals, and eventually open a boutique training facility in Salem that offers elite
    agility coaching and community classes. Sarah also intends to pursue a bachelor’s degree in Animal Behavior, expand outreach partnerships with local schools and shelters, and achieve national recognition
    through competition successes and speaking engagements.
