  hobbies: '["Visiting Art Galleries", "Photography", "Poetry & Short‑Story Writing", "Attending Indie Film Screenings", "Cooking Southern Fusion Dishes", "Hiking the Blue Ridge Mountains", "Yoga", "Hosting
    a Film & Culture Podcast", "Playing Strategy Board Games", "Participating in Community Theater", "Curating Playlists for Social Events", "Exploring Digital Art Installations"]'
  career_goals: Audrey aims to become a lead producer for a nationally recognized streaming service and eventually direct a feature film that explores contemporary Black experiences with a speculative twist.
    In the next five years she plans to launch a boutique production company focused on elevating underrepresented voices, secure a pilot series that wins a major industry award, and mentor emerging Black
    filmmakers through workshops and fellowships. She also envisions expanding into transmedia storytelling that blends film, interactive media, and live events.
