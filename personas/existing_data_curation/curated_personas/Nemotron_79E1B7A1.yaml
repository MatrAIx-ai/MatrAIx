personas:
  professional: Audrey Trice is a 25‑year‑old emerging film producer who leverages their imagination and methodical planning to shepherd speculative‑drama projects from concept through budgeting, while
    their sociable, competitive edge drives them to rally diverse talent and out‑pace industry timelines.
  sports: Audrey Trice embraces an active lifestyle, hitting the hiking trails of the Blue Ridge foothills each fall, practicing yoga at sunrise, cheering on the Atlanta Falcons and Atlanta Braves, and
    participating in the local Georgia Trailblazers running club’s weekend 5K runs, while their competitive streak pushes them to track personal bests in every workout.
  arts: Audrey Trice immerses themselves in the arts by curating indie film screenings at the Atlanta Film Society, photographing the Georgia coastline, writing speculative poetry inspired by Octavia Butler
    and Maya Angelou, and they draw musical inspiration from the soulful chords of Stevie Wonder, the avant‑garde beats of Flying Lotus, and the gospel harmonies of their local church choir.
  travel: Audrey Trice prefers purposeful travel that blends cultural immersion with creative scouting, often weekend‑hopping between Savannah’s historic squares, New Orleans’ jazz districts, and the bustling
    markets of Marrakech, while they plan a longer‑term solo venture to Nairobi to explore emerging film scenes, all on a budget balanced by freelance earnings and a love for inexpensive hostels.
  culinary: Audrey Trice loves cooking at a semi‑professional level, perfecting Southern‑inspired fusion dishes like shrimp‑and‑grits risotto with smoked paprika, collard‑green tacos topped with pickled
    okra, and sweet‑potato‑brown sugar pie, while they savor the tang of hot sauce, the earthiness of black‑eyed peas, and the comfort of freshly baked cornbread.
  core: Audrey Trice is a relentlessly curious, socially magnetic storyteller who can’t resist binge‑watching genre series late into the night and habitually misplaces their coffee mug, yet they always
    rebound with a fresh reel of ideas.
background:
  cultural: Audrey grew up in a close‑knit African‑American family in suburban Georgia, where church gatherings, storytelling evenings, and community festivals were central to her upbringing. Her parents
    emphasized academic achievement and cultural pride, exposing her to both classic Black literature and contemporary hip‑hop and jazz. She celebrates traditions like Juneteenth and the annual Atlanta
    Black Film Festival, and she draws inspiration from Southern Black culinary heritage, church gospel choirs, and the regional oral history of resilience. These experiences inform her artistic voice,
    prompting her to amplify nuanced Black narratives while navigating the broader Southern cultural landscape.
attributes:
  skills: '["Concept Development", "Script Analysis", "Budgeting & Financial Planning", "Production Scheduling", "Team Leadership", "Talent Casting & Direction", "Post‑Production Coordination", "Digital
