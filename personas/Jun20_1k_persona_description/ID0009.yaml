persona:
  id: persona_09
  name: Jasmine Patel
  title: Community Development Officer
  description: Jasmine is a 29-year-old community development officer working for an international development NGO based in rural Kenya. She earned
    her bachelor's degree in social work from a local university and has 4 years of on-the-ground experience implementing microfinance and education
    programs. From a low-income family herself, she understands the systemic barriers her community faces and is driven by a deep commitment to
    social change. Fluent in Swahili with intermediate English, she is compassionate, patient, and respected by the community members she serves.
    She works in a small town far from major urban centers, where her presence and local knowledge make her invaluable. Currently, she's focused
    on supporting women entrepreneurs and strengthening local community institutions to build long-term resilience.
