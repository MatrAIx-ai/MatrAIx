persona:
  id: persona_08
  name: Robert Wilson
  title: Senior Climate Scientist
  description: Robert is a 51-year-old tenured associate professor of atmospheric science at the University of Colorado with 22 years in climate
    research. He earned his PhD in atmospheric physics from MIT and has dedicated his career to understanding global climate systems through observational
    and modeling research. From an upper-middle-class professional family, he is married with two adult children. Robert has published over 80
    peer-reviewed papers and serves on several advisory panels. He is intellectually rigorous yet deeply concerned about the implications of climate
    change for future generations. Beyond traditional academic work, he is increasingly motivated to translate his research for policy audiences
    and to combat climate misinformation. Currently, he balances demanding research commitments with advocacy and public engagement efforts.
