  name: Priya Sharma
  title: Healthcare Consultant
  description: Priya is a 31-year-old public health consultant in New Delhi working for a growing health advisory firm specializing in emerging
    market healthcare systems. She earned her Master's degree in Public Health from the Indian Institute of Technology and brings 5 years of experience
    working with government health programs and NGOs. Coming from an upper-middle-class professional family, she is single and focused on her
    career. Fluent in both Hindi and English, Priya is deeply analytical and passionate about data-driven health interventions. She excels at
    identifying systemic gaps and designing scalable solutions. Currently, she's motivated by the challenge of improving health equity in resource-constrained
    settings.
