persona:
  id: persona_02
  name: Marcus Johnson
  title: High School History Teacher
  description: Marcus is a 49-year-old high school history teacher in suburban Wisconsin with 18 years of classroom experience. He earned his
    bachelor's degree in history education from the University of Wisconsin and has dedicated his career to making American and world history
    come alive for students. Married with two teenage children, Marcus comes from a solidly middle-class background. He's patient, approachable,
    and naturally skilled at facilitating group discussions and managing diverse learners. He values practical teaching approaches and believes
    strongly in civic engagement. Currently, he's focused on incorporating primary sources and oral histories to deepen student engagement with
    historical narratives.
