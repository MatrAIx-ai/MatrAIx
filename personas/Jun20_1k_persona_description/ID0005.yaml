persona:
  id: persona_05
  name: Akira Tanaka
  title: Manufacturing Operations Director
  description: Akira is a 59-year-old operations director at a Japanese automotive supplier based in Gifu prefecture. With 35 years of manufacturing
    experience—starting on the production floor and progressing through technical and managerial roles—he embodies the kaizen philosophy. He earned
    his degree in mechanical engineering from Nagoya University and spent his entire career at the same corporation, a path common in traditional
    Japanese companies. Married with adult children, he comes from a stable middle-class background. Pragmatic and detail-oriented, he is deeply
    respected for his knowledge of production systems and his commitment to continuous improvement. With retirement approaching, he's focused
    on knowledge transfer and mentoring the next generation of operations leaders.
