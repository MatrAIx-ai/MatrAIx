name: Ruff Lint

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Keep uv itself current; pin Ruff below so lint does not drift with
          # every upstream Ruff release (0.16 enabled thousands of new findings).
          version: "latest"

      - name: Run ruff lint
        # Pin to the version locked in uv.lock (ruff==0.15.20). Unpinned
        # `uvx ruff` started failing repo-wide after Ruff 0.16.0 shipped.
        run: uvx ruff@0.15.20 check .
