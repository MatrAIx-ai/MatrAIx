schemaVersion: "1.0"
id: inheritance_planning_v1
title: "Inheritance Planning Survey"
description: "How people plan to pass on wealth, their estate-planning readiness, and their expectations and feelings about inheritance."
questions:
  - id: q0
    prompt: "Have you thought about how you would like your money and belongings passed on after you die?"
    type: single_choice
    construct: have_thought_would_like_money
    required: true
    options:
      - id: "a"
        label: "Yes, I have a detailed plan"
      - id: "b"
        label: "Yes, I have some general ideas"
      - id: "c"
        label: "I've thought about it but have no plan"
      - id: "d"
        label: "I haven't really thought about it"
  - id: q1
    prompt: "Which of the following estate-planning documents do you currently have? (Select all that apply)"
    type: multi_choice
    construct: following_estate_planning_documents_curr
    required: true
    options:
      - id: "a"
        label: "A will"
      - id: "b"
        label: "A living trust"
      - id: "c"
        label: "Beneficiary designations on accounts"
      - id: "d"
        label: "Power of attorney"
      - id: "e"
        label: "A healthcare directive or living will"
      - id: "f"
        label: "A letter of intent or instructions"
      - id: "g"
        label: "None of these"
  - id: q2
    prompt: "Do you expect to leave an inheritance to others?"
    type: single_choice
    construct: expect_leave_inheritance_others
    required: true
    options:
      - id: "a"
        label: "Yes, a significant one"
      - id: "b"
        label: "Yes, a modest one"
      - id: "c"
        label: "Only if there is money left over"
      - id: "d"
        label: "No, I don't expect to leave an inheritance"
      - id: "e"
        label: "Not sure"
  - id: q3
    prompt: "Who do you plan to leave assets to? (Select all that apply)"
    type: multi_choice
    construct: who_plan_leave_assets_select
    required: true
    options:
      - id: "a"
        label: "Spouse or partner"
      - id: "b"
        label: "Children"
      - id: "c"
        label: "Grandchildren"
      - id: "d"
        label: "Other family members"
      - id: "e"
        label: "Friends"
      - id: "f"
        label: "Charities or causes"
      - id: "g"
        label: "I don't plan to leave assets to anyone"
      - id: "h"
        label: "Not sure"
  - id: q4
    prompt: "Which types of assets do you expect to pass on? (Select all that apply)"
    type: multi_choice
    construct: types_assets_expect_pass_select
    required: true
    options:
      - id: "a"
        label: "Cash and savings"
      - id: "b"
        label: "A home or other real estate"
      - id: "c"
        label: "Retirement accounts"
      - id: "d"
        label: "Investments or brokerage accounts"
      - id: "e"
        label: "A business"
      - id: "f"
        label: "Life insurance proceeds"
      - id: "g"
        label: "Personal belongings or heirlooms"
      - id: "h"
        label: "I don't expect to pass on assets"
  - id: q5
    prompt: "Do you expect to receive an inheritance yourself?"
    type: single_choice
    construct: expect_receive_inheritance_yourself
    required: true
    options:
      - id: "a"
        label: "Yes, and I have already received part of it"
      - id: "b"
        label: "Yes, I expect to in the future"
      - id: "c"
        label: "Possibly"
      - id: "d"
        label: "No"
      - id: "e"
        label: "Not sure"
  - id: q6
    prompt: "Roughly what total value do you expect your estate to be worth? Please enter a number of dollars."
    type: free_text
    construct: roughly_total_value_expect_estate
    required: true
  - id: q7
    prompt: "Have you discussed your inheritance or estate plans with your family?"
    type: single_choice
    construct: have_discussed_inheritance_estate_plans
    required: true
    options:
      - id: "a"
        label: "Yes, in detail"
      - id: "b"
        label: "Yes, briefly"
      - id: "c"
        label: "No, but I plan to"
      - id: "d"
        label: "No, and I don't plan to"
  - id: q8
    prompt: "How much do you agree with the following statement: It is important to leave something behind for the next generation."
    type: single_choice
    construct: much_agree_following_statement_it
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree with the following statement: I would rather spend and enjoy my money than leave a large inheritance."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree with the following statement: Talking about inheritance with family is uncomfortable."
    type: single_choice
    construct: much_agree_following_statement_talking
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: Heirs should be treated equally in an inheritance."
    type: single_choice
    construct: much_agree_following_statement_heirs
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: I worry my heirs won't manage an inheritance wisely."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How concerned are you about the following aspect of passing on wealth: taxes reducing what heirs receive?"
    type: single_choice
    construct: concerned_following_aspect_passing_wealt
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q14
    prompt: "How concerned are you about the following aspect of passing on wealth: family conflict over the estate?"
    type: single_choice
    construct: concerned_following_aspect_passing_wealt
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q15
    prompt: "How concerned are you about the following aspect of passing on wealth: needing the money yourself for long-term care?"
    type: single_choice
    construct: concerned_following_aspect_passing_wealt
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q16
    prompt: "How concerned are you about the following aspect of passing on wealth: the legal process (probate) being slow or costly?"
    type: single_choice
    construct: concerned_following_aspect_passing_wealt
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q17
    prompt: "How concerned are you about the following aspect of passing on wealth: heirs relying too much on the inheritance?"
    type: single_choice
    construct: concerned_following_aspect_passing_wealt
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q18
    prompt: "Have you worked with any of the following professionals on estate or inheritance planning? (Select all that apply)"
    type: multi_choice
    construct: have_worked_any_following_professionals
    required: true
    options:
      - id: "a"
        label: "An estate attorney"
      - id: "b"
        label: "A financial advisor or planner"
      - id: "c"
        label: "An accountant or tax professional"
      - id: "d"
        label: "An online will or estate service (e.g., LegalZoom, Trust & Will)"
      - id: "e"
        label: "A bank or trust company"
      - id: "f"
        label: "None of these"
  - id: q19
    prompt: "What is the main reason you have not done more estate or inheritance planning?"
    type: single_choice
    construct: main_reason_have_not_done
    required: true
    options:
      - id: "a"
        label: "I haven't gotten around to it"
      - id: "b"
        label: "It feels too complicated"
      - id: "c"
        label: "I don't think I have enough assets"
      - id: "d"
        label: "It's uncomfortable to think about"
      - id: "e"
        label: "It costs too much to set up"
      - id: "f"
        label: "I've already done everything I need to"
      - id: "g"
        label: "Other"
  - id: q20
    prompt: "How would you most like an inheritance to be used by those who receive it?"
    type: single_choice
    construct: would_most_like_inheritance_be
    required: true
    options:
      - id: "a"
        label: "However they choose"
      - id: "b"
        label: "For education"
      - id: "c"
        label: "To buy a home"
      - id: "d"
        label: "For long-term financial security"
      - id: "e"
        label: "To start or grow a business"
      - id: "f"
        label: "To support causes or charity"
      - id: "g"
        label: "No preference"
  - id: q21
    prompt: "Select the top 3 goals that matter most in your inheritance or estate planning. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_goals_that
    required: true
    options:
      - id: "a"
        label: "Providing for my spouse or partner"
      - id: "b"
        label: "Supporting my children or grandchildren"
      - id: "c"
        label: "Minimizing taxes"
      - id: "d"
        label: "Avoiding family conflict"
      - id: "e"
        label: "Leaving money to charity"
      - id: "f"
        label: "Keeping a home or business in the family"
      - id: "g"
        label: "Making the process simple for my heirs"
      - id: "h"
        label: "Preserving my own financial security first"
  - id: q22
    prompt: "How often do you review or update your estate plan?"
    type: single_choice
    construct: often_review_update_estate_plan
    required: true
    options:
      - id: "a"
        label: "I don't have a plan to update"
      - id: "b"
        label: "Only when a major life event occurs"
      - id: "c"
        label: "Every few years"
      - id: "d"
        label: "Annually"
      - id: "e"
        label: "I have never reviewed it"
  - id: q23
    prompt: "How knowledgeable do you feel about inheritance and estate taxes?"
    type: single_choice
    construct: knowledgeable_feel_inheritance_estate_ta
    required: true
    options:
      - id: "a"
        label: "Not at all knowledgeable"
      - id: "b"
        label: "Slightly knowledgeable"
      - id: "c"
        label: "Moderately knowledgeable"
      - id: "d"
        label: "Very knowledgeable"
      - id: "e"
        label: "Extremely knowledgeable"
  - id: q24
    prompt: "How confident are you that your wishes would be carried out as you intend?"
    type: single_choice
    construct: confident_that_wishes_would_be
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q25
    prompt: "How satisfied are you with the current state of your estate and inheritance planning?"
    type: single_choice
    construct: satisfied_current_state_estate_inheritan
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q26
    prompt: "How likely are you to create or update an estate plan in the next 12 months?"
    type: single_choice
    construct: likely_create_update_estate_plan
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q27
    prompt: "On a scale of 0 to 10, how prepared do you feel to pass on your assets according to your wishes? (0 = not at all prepared, 10 = fully prepared)"
    type: single_choice
    construct: scale_0_10_prepared_feel
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q28
    prompt: "Please share any thoughts, hopes, or concerns you have about inheritance or passing on wealth."
    type: free_text
    construct: please_share_any_thoughts_hopes
    required: true
  - id: q29
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18-24"
      - id: "b"
        label: "25-34"
      - id: "c"
        label: "35-44"
      - id: "d"
        label: "45-54"
      - id: "e"
        label: "55-64"
      - id: "f"
        label: "65-74"
      - id: "g"
        label: "75 or older"
  - id: q30
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: race_ethnicity_select_all_that
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "American Indian or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is your total annual household income (before taxes)?"
    type: single_choice
    construct: total_annual_household_income_before
    required: true
    options:
      - id: "a"
        label: "Under $25,000"
      - id: "b"
        label: "$25,000 to $49,999"
      - id: "c"
        label: "$50,000 to $74,999"
      - id: "d"
        label: "$75,000 to $99,999"
      - id: "e"
        label: "$100,000 to $149,999"
      - id: "f"
        label: "$150,000 to $199,999"
      - id: "g"
        label: "$200,000 or more"
      - id: "h"
        label: "Prefer not to say"
  - id: q33
    prompt: "Roughly what is your household's total net worth (assets minus debts)?"
    type: single_choice
    construct: roughly_household_s_total_net
    required: true
    options:
      - id: "a"
        label: "Negative or zero"
      - id: "b"
        label: "Under $50,000"
      - id: "c"
        label: "$50,000 to $199,999"
      - id: "d"
        label: "$200,000 to $499,999"
      - id: "e"
        label: "$500,000 to $999,999"
      - id: "f"
        label: "$1 million or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q34
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "High school diploma or GED"
      - id: "c"
        label: "Some college, no degree"
      - id: "d"
        label: "Associate degree"
      - id: "e"
        label: "Bachelor's degree"
      - id: "f"
        label: "Graduate or professional degree"
  - id: q35
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Unemployed and looking for work"
      - id: "e"
        label: "Retired"
      - id: "f"
        label: "Homemaker or caregiver"
      - id: "g"
        label: "Student"
      - id: "h"
        label: "Unable to work"
  - id: q36
    prompt: "Including yourself, how many people live in your household? Please enter a number."
    type: free_text
    construct: including_yourself_many_people_live
    required: true
  - id: q37
    prompt: "What is your marital or relationship status?"
    type: single_choice
    construct: marital_relationship_status
    required: true
    options:
      - id: "a"
        label: "Married"
      - id: "b"
        label: "Living with a partner"
      - id: "c"
        label: "Divorced"
      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Separated"
      - id: "f"
        label: "Single, never married"
  - id: q38
    prompt: "Do you have any children?"
    type: single_choice
    construct: have_any_children
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q39
    prompt: "Which U.S. region do you live in?"
    type: single_choice
    construct: u_s_region_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
      - id: "d"
        label: "West"
  - id: q40
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q41
    prompt: "Do you own or rent your home?"
    type: single_choice
    construct: own_rent_home
    required: true
    options:
      - id: "a"
        label: "Own with a mortgage"
      - id: "b"
        label: "Own outright"
      - id: "c"
        label: "Rent"
      - id: "d"
        label: "Other arrangement"
