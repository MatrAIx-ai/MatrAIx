version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/healthcare-dental-advice-chatbot"

[metadata]
difficulty = "easy"
type = "chatbot"
domain = "healthcare"
tags = [ "healthcare", "dental", "oral-care" ]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/shared-chat-sim"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
