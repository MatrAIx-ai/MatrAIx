schemaVersion: "1.0"
id: cryptocurrency_ownership_v1
title: "Cryptocurrency Ownership Survey"
description: "Who owns cryptocurrency and digital assets, how they hold and manage them, and their attitudes toward the risks and future of crypto."
questions:
  - id: q0
    prompt: "Do you currently own any cryptocurrency or digital assets?"
    type: single_choice
    construct: currently_own_any_cryptocurrency_digital
    required: true
    options:
      - id: "a"
        label: "Yes, I currently own cryptocurrency"
      - id: "b"
        label: "I used to own it but sold everything"
      - id: "c"
        label: "No, but I plan to buy within the next year"
      - id: "d"
        label: "No, and I have no plans to buy"
      - id: "e"
        label: "I am not sure what cryptocurrency is"
  - id: q1
    prompt: "How long have you owned cryptocurrency (or owned it, if you have since sold)?"
    type: single_choice
    construct: long_have_owned_cryptocurrency_owned
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 6 years"
      - id: "e"
        label: "More than 6 years"
      - id: "f"
        label: "I have never owned cryptocurrency"
  - id: q2
    prompt: "Which cryptocurrencies do you currently own or have owned? (Select all that apply)"
    type: multi_choice
    construct: cryptocurrencies_currently_own_have_owne
    required: true
    options:
      - id: "a"
        label: "Bitcoin (BTC)"
      - id: "b"
        label: "Ethereum (ETH)"
      - id: "c"
        label: "A stablecoin (e.g., USDC, USDT)"
      - id: "d"
        label: "Solana (SOL)"
      - id: "e"
        label: "XRP"
      - id: "f"
        label: "Dogecoin or other meme coins"
      - id: "g"
        label: "A Bitcoin or Ethereum ETF (through a brokerage)"
      - id: "h"
        label: "Other altcoins"
      - id: "i"
        label: "I have never owned cryptocurrency"
  - id: q3
    prompt: "Roughly what is the current total value of your cryptocurrency holdings, in U.S. dollars? Please enter a whole number."
    type: free_text
    construct: roughly_current_total_value_cryptocurren
    required: true
  - id: q4
    prompt: "Approximately what share of your total investable assets is held in cryptocurrency?"
    type: single_choice
    construct: approximately_share_total_investable_ass
    required: true
    options:
      - id: "a"
        label: "Less than 1%"
      - id: "b"
        label: "1% to 5%"
      - id: "c"
        label: "6% to 10%"
      - id: "d"
        label: "11% to 25%"
      - id: "e"
        label: "26% to 50%"
      - id: "f"
        label: "More than 50%"
      - id: "g"
        label: "Not sure"
  - id: q5
    prompt: "Where do you primarily store or hold your cryptocurrency? (Select all that apply)"
    type: multi_choice
    construct: where_primarily_store_hold_cryptocurrenc
    required: true
    options:
      - id: "a"
        label: "A centralized exchange (e.g., Coinbase, Kraken)"
      - id: "b"
        label: "A brokerage app (e.g., Robinhood, PayPal)"
      - id: "c"
        label: "A software / hot wallet (e.g., MetaMask, Trust Wallet)"
      - id: "d"
        label: "A hardware / cold wallet (e.g., Ledger, Trezor)"
      - id: "e"
        label: "A crypto ETF in a traditional brokerage account"
      - id: "f"
        label: "I am not sure where it is held"
  - id: q6
    prompt: "Which platform do you use most often to buy or hold cryptocurrency?"
    type: single_choice
    construct: platform_use_most_often_buy
    required: true
    options:
      - id: "a"
        label: "Coinbase"
      - id: "b"
        label: "Binance / Binance.US"
      - id: "c"
        label: "Kraken"
      - id: "d"
        label: "Robinhood"
      - id: "e"
        label: "PayPal or Venmo"
      - id: "f"
        label: "Cash App"
      - id: "g"
        label: "A self-custody wallet"
      - id: "h"
        label: "Another platform"
  - id: q7
    prompt: "How did you first acquire cryptocurrency?"
    type: single_choice
    construct: did_first_acquire_cryptocurrency
    required: true
    options:
      - id: "a"
        label: "Bought it on an exchange or app"
      - id: "b"
        label: "Received it as payment for goods or services"
      - id: "c"
        label: "Received it as a gift or transfer"
      - id: "d"
        label: "Earned it through mining or staking"
      - id: "e"
        label: "Through an employer or airdrop"
      - id: "f"
        label: "I have never acquired cryptocurrency"
  - id: q8
    prompt: "What are your main reasons for owning cryptocurrency? Select your top 3. (Select all that apply)"
