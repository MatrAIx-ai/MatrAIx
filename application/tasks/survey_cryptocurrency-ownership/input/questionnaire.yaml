    construct: main_reasons_owning_cryptocurrency_selec
    required: true
    options:
      - id: "a"
        label: "Long-term investment or store of value"
      - id: "b"
        label: "Potential for high returns"
      - id: "c"
        label: "Diversifying my portfolio"
      - id: "d"
        label: "Distrust of banks or traditional finance"
      - id: "e"
        label: "Hedge against inflation"
      - id: "f"
        label: "Interest in the technology"
      - id: "g"
        label: "To make payments or transfers"
      - id: "h"
        label: "Friends or family are involved"
      - id: "i"
        label: "Fear of missing out"
  - id: q9
    prompt: "How would you describe your overall approach to cryptocurrency?"
    type: single_choice
    construct: would_describe_overall_approach_cryptocu
    required: true
    options:
      - id: "a"
        label: "Long-term holder (\"buy and hold\")"
      - id: "b"
        label: "Occasional buyer, rarely sell"
      - id: "c"
        label: "Active trader"
      - id: "d"
        label: "I only hold what I received, not by choice"
      - id: "e"
        label: "I have exited the market"
  - id: q10
    prompt: "How often do you check the value of your cryptocurrency holdings?"
    type: single_choice
