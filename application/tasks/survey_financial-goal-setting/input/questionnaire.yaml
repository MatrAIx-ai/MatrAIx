schemaVersion: "1.0"
id: financial_goal_setting_v1
title: "Financial Goal Setting Survey"
description: "How people set, track, and make progress toward their personal financial goals, and how confident they feel about reaching them."
questions:
  - id: q0
    prompt: "Do you currently have any specific financial goals you are working toward?"
    type: single_choice
    construct: currently_have_any_specific_financial
    required: true
    options:
      - id: "a"
        label: "Yes, several clearly defined goals"
      - id: "b"
        label: "Yes, one or two goals"
      - id: "c"
        label: "I have vague goals but nothing specific"
      - id: "d"
        label: "No current financial goals"
  - id: q1
    prompt: "How do you keep track of your financial goals?"
    type: single_choice
    construct: keep_track_financial_goals
    required: true
    options:
      - id: "a"
        label: "A budgeting or goal-tracking app"
      - id: "b"
        label: "A spreadsheet"
      - id: "c"
        label: "Written notes or a journal"
      - id: "d"
        label: "I track them in my head"
      - id: "e"
        label: "I don't track them"
  - id: q2
    prompt: "About how many active financial goals are you working toward right now? Please enter a number."
    type: free_text
    construct: many_active_financial_goals_working
    required: true
  - id: q3
    prompt: "Which financial goals are you currently working toward? (Select all that apply)"
    type: multi_choice
    construct: financial_goals_currently_working_toward
    required: true
    options:
      - id: "a"
        label: "Building an emergency fund"
      - id: "b"
        label: "Paying off debt"
      - id: "c"
        label: "Saving for retirement"
      - id: "d"
        label: "Buying a home"
      - id: "e"
        label: "Saving for a car or major purchase"
      - id: "f"
        label: "Saving for a vacation"
      - id: "g"
        label: "Saving for education"
      - id: "h"
        label: "Growing investments or building wealth"
  - id: q4
    prompt: "What is your single most important financial goal right now?"
    type: single_choice
    construct: single_most_important_financial_goal
    required: true
    options:
      - id: "a"
        label: "Building an emergency fund"
      - id: "b"
        label: "Paying off debt"
      - id: "c"
        label: "Saving for retirement"
      - id: "d"
        label: "Buying a home"
      - id: "e"
        label: "Saving for a major purchase"
      - id: "f"
        label: "Growing investments or wealth"
      - id: "g"
        label: "Simply covering monthly expenses"
  - id: q5
    prompt: "What is the time horizon for your most important goal?"
    type: single_choice
    construct: time_horizon_most_important_goal
    required: true
    options:
      - id: "a"
        label: "Within the next year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "5 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q6
    prompt: "Roughly what dollar amount is your most important financial goal? Please enter a number of dollars."
    type: free_text
    construct: roughly_dollar_amount_most_important
    required: true
  - id: q7
    prompt: "How do you make progress toward your goals? (Select all that apply)"
    type: multi_choice
    construct: make_progress_toward_goals_select
    required: true
    options:
      - id: "a"
        label: "Automatic transfers to savings"
      - id: "b"
        label: "A monthly budget"
      - id: "c"
        label: "Cutting discretionary spending"
      - id: "d"
        label: "Earning extra income or side work"
      - id: "e"
        label: "Investing regularly"
      - id: "f"
        label: "Paying down debt on a schedule"
      - id: "g"
        label: "Setting reminders or checkpoints"
      - id: "h"
        label: "I don't have a consistent method"
  - id: q8
    prompt: "How often do you review your progress toward your financial goals?"
    type: single_choice
    construct: often_review_progress_toward_financial
    required: true
    options:
      - id: "a"
        label: "Weekly"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Once a year"
      - id: "e"
        label: "Rarely or never"
  - id: q9
    prompt: "Do you set specific, measurable targets (like a dollar amount and deadline) for your goals?"
    type: single_choice
    construct: set_specific_measurable_targets_like
    required: true
    options:
      - id: "a"
        label: "Yes, always"
      - id: "b"
        label: "Usually"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q10
    prompt: "How much do you agree with the following statement: Setting clear financial goals helps me make better money decisions."
    type: single_choice
    construct: much_agree_following_statement_setting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I feel in control of my financial future."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: I often set financial goals but struggle to stick to them."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Unexpected expenses regularly derail my financial plans."
    type: single_choice
    construct: much_agree_following_statement_unexpecte
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Writing down or tracking my goals makes me more likely to reach them."
    type: single_choice
    construct: much_agree_following_statement_writing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How confident are you in reaching the following goal: building or maintaining an emergency fund?"
    type: single_choice
    construct: confident_reaching_following_goal_buildi
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q16
    prompt: "How confident are you in reaching the following goal: paying off your debts?"
    type: single_choice
    construct: confident_reaching_following_goal_paying
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q17
    prompt: "How confident are you in reaching the following goal: saving enough for retirement?"
    type: single_choice
    construct: confident_reaching_following_goal_saving
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q18
    prompt: "How confident are you in reaching the following goal: making a major purchase like a home or car?"
    type: single_choice
    construct: confident_reaching_following_goal_making
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q19
    prompt: "How confident are you in reaching the following goal: sticking to a monthly budget?"
    type: single_choice
    construct: confident_reaching_following_goal_sticki
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q20
    prompt: "What is the biggest obstacle to reaching your financial goals?"
    type: single_choice
    construct: biggest_obstacle_reaching_financial_goal
    required: true
    options:
      - id: "a"
        label: "Not earning enough income"
      - id: "b"
        label: "High cost of living or inflation"
      - id: "c"
        label: "Existing debt"
      - id: "d"
        label: "Lack of discipline or follow-through"
      - id: "e"
        label: "Unexpected expenses"
      - id: "f"
        label: "Not knowing where to start"
      - id: "g"
        label: "Nothing major stands in my way"
  - id: q21
    prompt: "What tools or support do you use to help reach your goals? (Select all that apply)"
    type: multi_choice
    construct: tools_support_use_help_reach
    required: true
    options:
      - id: "a"
        label: "Budgeting apps (e.g., YNAB, Mint successor apps, Rocket Money)"
      - id: "b"
        label: "Bank savings goals or buckets"
      - id: "c"
        label: "Automatic savings or round-up features"
      - id: "d"
        label: "A financial advisor or coach"
      - id: "e"
        label: "Friends, family, or an accountability partner"
      - id: "f"
        label: "Online articles, videos, or courses"
      - id: "g"
        label: "I don't use any tools or support"
  - id: q22
    prompt: "Select the top 3 factors that most motivate you to pursue your financial goals. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_factors_that
    required: true
    options:
      - id: "a"
        label: "Financial security and peace of mind"
      - id: "b"
        label: "Providing for my family"
      - id: "c"
        label: "Freedom to make choices"
      - id: "d"
        label: "Retiring comfortably"
      - id: "e"
        label: "Reducing stress about money"
      - id: "f"
        label: "Achieving a specific dream (home, travel, business)"
      - id: "g"
        label: "Being debt-free"
      - id: "h"
        label: "Building wealth for the future"
  - id: q23
    prompt: "In the past year, how many of your financial goals have you fully achieved?"
    type: single_choice
    construct: past_year_many_financial_goals
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "One"
      - id: "c"
        label: "Two or three"
      - id: "d"
        label: "Four or more"
      - id: "e"
        label: "I didn't set any goals"
  - id: q24
    prompt: "How satisfied are you with the progress you're making toward your financial goals?"
    type: single_choice
    construct: satisfied_progress_re_making_toward
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q25
    prompt: "How likely are you to set new financial goals in the next year?"
    type: single_choice
    construct: likely_set_new_financial_goals
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q26
    prompt: "On a scale of 0 to 10, how on track do you feel toward your most important financial goal? (0 = not at all on track, 10 = fully on track)"
    type: single_choice
    construct: scale_0_10_track_feel
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q27
    prompt: "Please describe your most important financial goal and why it matters to you."
    type: free_text
    construct: please_describe_most_important_financial
    required: true
  - id: q28
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
