        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning containers"
      - id: "e"
        label: "I don't use containers"
  - id: q1
    prompt: "How long have you used containers?"
    type: single_choice
    construct: long_have_used_containers
    required: true
