schemaVersion: "1.0"
id: glucose_monitoring_v1
title: "Glucose Monitoring Survey"
description: "Consumer awareness of, attitudes toward, and interest in glucose monitoring for wellness."
questions:
  - id: q0
    prompt: "How familiar are you with glucose monitoring devices for tracking blood sugar?"
    type: single_choice
    construct: familiar_glucose_monitoring_devices_trac
    required: true
    options:
      - id: "a"
        label: "Very familiar"
      - id: "b"
        label: "Somewhat familiar"
      - id: "c"
        label: "I've heard of them but know little"
      - id: "d"
        label: "Not familiar at all"
  - id: q1
    prompt: "Have you ever used any kind of glucose monitoring device?"
    type: single_choice
    construct: have_ever_used_any_kind
    required: true
    options:
      - id: "a"
        label: "Yes, currently"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I'm interested"
      - id: "d"
        label: "No, and I'm not interested"
  - id: q2
    prompt: "What type of glucose monitoring have you used or are you most interested in?"
    type: single_choice
    construct: type_glucose_monitoring_have_used
    required: true
    options:
      - id: "a"
        label: "A continuous glucose monitor (a wearable sensor)"
      - id: "b"
        label: "A traditional finger-stick meter"
      - id: "c"
        label: "Both"
      - id: "d"
        label: "Neither"
      - id: "e"
        label: "I'm not sure"
  - id: q3
    prompt: "Which best describes your reason for interest in glucose monitoring?"
    type: single_choice
    construct: best_describes_reason_interest_glucose
    required: true
    options:
      - id: "a"
        label: "General wellness and curiosity"
      - id: "b"
        label: "Managing weight or diet"
      - id: "c"
        label: "Optimizing fitness and energy"
      - id: "d"
        label: "Following a doctor's or dietitian's advice"
      - id: "e"
        label: "Family history awareness"
      - id: "f"
        label: "I'm not interested"
  - id: q4
    prompt: "Have you heard of any consumer glucose monitor brands? (Select all that apply)"
    type: multi_choice
    construct: have_heard_any_consumer_glucose
    required: true
    options:
      - id: "a"
        label: "Dexcom (Stelo)"
      - id: "b"
        label: "Abbott (Lingo or Libre)"
      - id: "c"
        label: "Levels"
      - id: "d"
        label: "Nutrisense"
      - id: "e"
        label: "Signos"
      - id: "f"
        label: "A traditional meter brand (OneTouch, Contour, etc.)"
      - id: "g"
        label: "None of these"
  - id: q5
    prompt: "How much do you think about your blood sugar or how food affects your energy?"
    type: single_choice
    construct: much_think_blood_sugar_food
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "All the time"
