schemaVersion: "1.0"
id: senior_financial_planning_v1
title: "Senior Financial Planning Survey"
description: "How older adults plan and manage their finances in and around retirement."
questions:
  - id: q0
    prompt: "Which best describes your current stage?"
    type: single_choice
    construct: best_describes_current_stage
    required: true
    options:
      - id: "a"
        label: "Already retired"
      - id: "b"
        label: "Semi-retired or working part-time"
      - id: "c"
        label: "Planning to retire within 5 years"
      - id: "d"
        label: "Planning to retire in more than 5 years"
      - id: "e"
        label: "I do not expect to retire"
  - id: q1
    prompt: "At what age do you plan to (or did you) retire? Please enter a number (age in years)."
    type: free_text
    construct: age_plan_did_retire_please
    required: true
  - id: q2
    prompt: "How prepared do you feel financially for retirement?"
    type: single_choice
    construct: prepared_feel_financially_retirement
    required: true
    options:
      - id: "a"
        label: "Not at all prepared"
      - id: "b"
        label: "Slightly prepared"
      - id: "c"
        label: "Moderately prepared"
      - id: "d"
        label: "Well prepared"
      - id: "e"
        label: "Very well prepared"
  - id: q3
    prompt: "Which sources of retirement income do you have or expect to have? (Select all that apply)"
    type: multi_choice
    construct: sources_retirement_income_have_expect
    required: true
    options:
      - id: "a"
        label: "Social Security"
      - id: "b"
        label: "A pension"
      - id: "c"
        label: "A 401(k) or 403(b)"
      - id: "d"
        label: "An IRA or Roth IRA"
      - id: "e"
        label: "Personal savings or brokerage accounts"
      - id: "f"
        label: "Rental or real estate income"
      - id: "g"
        label: "An annuity"
      - id: "h"
        label: "Continued work or part-time income"
      - id: "i"
        label: "Support from family"
      - id: "j"
        label: "None of these"
  - id: q4
    prompt: "What do you expect to be your largest source of retirement income?"
    type: single_choice
    construct: expect_be_largest_source_retirement
    required: true
    options:
      - id: "a"
        label: "Social Security"
      - id: "b"
        label: "A pension"
      - id: "c"
        label: "Retirement accounts (401(k), IRA)"
      - id: "d"
        label: "Personal savings and investments"
      - id: "e"
        label: "Real estate or rental income"
      - id: "f"
        label: "Continued work"
      - id: "g"
        label: "Not sure"
  - id: q5
    prompt: "Do you have a written financial plan for retirement?"
    type: single_choice
    construct: have_written_financial_plan_retirement
    required: true
    options:
      - id: "a"
        label: "Yes, a detailed plan"
      - id: "b"
        label: "Yes, a rough plan"
      - id: "c"
        label: "No, but I've thought about it"
      - id: "d"
        label: "No plan at all"
  - id: q6
    prompt: "Do you currently work with a financial professional?"
    type: single_choice
    construct: currently_work_financial_professional
    required: true
    options:
      - id: "a"
        label: "Yes, a financial advisor or planner"
      - id: "b"
        label: "Yes, an accountant or tax professional only"
      - id: "c"
        label: "No, I manage it myself"
      - id: "d"
        label: "No, but I'm considering getting help"
  - id: q7
    prompt: "How confident are you that your savings will last through retirement?"
    type: single_choice
