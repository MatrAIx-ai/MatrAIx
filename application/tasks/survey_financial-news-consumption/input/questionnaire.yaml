schemaVersion: "1.0"
id: financial_news_consumption_v1
title: "Financial News Consumption Survey"
description: "How people follow financial and economic news and how it informs their money decisions."
questions:
  - id: q0
    prompt: "How often do you read, watch, or listen to financial or economic news?"
    type: single_choice
    construct: often_read_watch_listen_financial
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "About once a day"
      - id: "e"
        label: "Several times a day"
  - id: q1
    prompt: "How closely do you follow financial news compared with other kinds of news?"
    type: single_choice
    construct: closely_follow_financial_news_compared
    required: true
    options:
      - id: "a"
        label: "Much less closely"
      - id: "b"
        label: "Somewhat less closely"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "Somewhat more closely"
      - id: "e"
        label: "Much more closely"
  - id: q2
    prompt: "On a typical day, about how many minutes do you spend on financial or economic news? Please enter a number of minutes."
    type: free_text
    construct: typical_day_many_minutes_spend
    required: true
  - id: q3
    prompt: "Which formats do you use to consume financial news? (Select all that apply)"
    type: multi_choice
    construct: formats_use_consume_financial_news
    required: true
    options:
      - id: "a"
        label: "News websites or apps"
      - id: "b"
        label: "Television"
      - id: "c"
        label: "Print newspapers or magazines"
      - id: "d"
        label: "Podcasts"
      - id: "e"
        label: "YouTube or video"
      - id: "f"
        label: "Social media feeds"
      - id: "g"
        label: "Email newsletters"
      - id: "h"
        label: "Radio"
  - id: q4
    prompt: "Which of these sources do you regularly rely on for financial news? (Select all that apply)"
    type: multi_choice
    construct: these_sources_regularly_rely_financial
    required: true
    options:
      - id: "a"
        label: "CNBC"
      - id: "b"
        label: "The Wall Street Journal"
      - id: "c"
        label: "Bloomberg"
      - id: "d"
        label: "Yahoo Finance"
      - id: "e"
        label: "The New York Times or Washington Post"
      - id: "f"
        label: "Reddit (e.g., r/personalfinance, r/investing)"
      - id: "g"
        label: "YouTube finance channels"
      - id: "h"
        label: "TikTok or Instagram"
      - id: "i"
        label: "My bank or brokerage's content"
      - id: "j"
        label: "None of these"
  - id: q5
    prompt: "What is your main source for financial news?"
    type: single_choice
    construct: main_source_financial_news
    required: true
    options:
      - id: "a"
        label: "A major news website or app"
      - id: "b"
        label: "Television"
      - id: "c"
        label: "Social media"
      - id: "d"
        label: "Podcasts or YouTube"
      - id: "e"
        label: "A newsletter or email"
      - id: "f"
        label: "Friends, family, or coworkers"
      - id: "g"
        label: "I don't have a main source"
