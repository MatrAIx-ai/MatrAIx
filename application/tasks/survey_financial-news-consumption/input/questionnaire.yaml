        label: "I seek out more information right away"
      - id: "b"
        label: "I check but don't do anything"
      - id: "c"
        label: "I mostly ignore it"
      - id: "d"
        label: "I feel stressed but don't act"
      - id: "e"
        label: "I make a financial move in response"
