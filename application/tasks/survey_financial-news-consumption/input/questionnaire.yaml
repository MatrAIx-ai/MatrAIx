      - id: "b"
        label: "Interest rates and the Federal Reserve"
      - id: "c"
        label: "Inflation and cost of living"
      - id: "d"
        label: "Jobs and the economy"
      - id: "e"
        label: "Cryptocurrency"
      - id: "f"
        label: "Real estate and housing"
      - id: "g"
        label: "Personal finance tips (budgeting, saving)"
      - id: "h"
        label: "Retirement planning"
      - id: "i"
