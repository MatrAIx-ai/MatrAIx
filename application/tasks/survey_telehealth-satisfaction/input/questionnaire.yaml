        label: "Increased it a lot"
      - id: "b"
        label: "Increased it somewhat"
      - id: "c"
        label: "No change"
      - id: "d"
        label: "Decreased it somewhat"
      - id: "e"
        label: "Decreased it a lot"
  - id: q23
