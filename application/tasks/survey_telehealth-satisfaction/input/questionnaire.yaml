schemaVersion: "1.0"
id: telehealth_satisfaction_v1
title: "Telehealth Satisfaction Survey"
description: "How satisfied people are with the virtual (phone or video) medical visits they have experienced."
questions:
  - id: q0
    prompt: "Have you had a telehealth (phone or video) visit in the past 12 months?"
    type: single_choice
    construct: have_had_telehealth_phone_video
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have in the past"
      - id: "c"
        label: "No, never"
  - id: q1
    prompt: "About how many telehealth visits have you had in the past 12 months? Please enter a number."
    type: free_text
    construct: many_telehealth_visits_have_had
    required: true
  - id: q2
    prompt: "Thinking of your most recent telehealth visit, what type was it?"
    type: single_choice
    construct: thinking_most_recent_telehealth_visit
    required: true
    options:
      - id: "a"
        label: "Video visit"
      - id: "b"
        label: "Phone call (voice only)"
      - id: "c"
        label: "Secure messaging or chat"
      - id: "d"
        label: "Not applicable"
  - id: q3
    prompt: "What was the main reason for your most recent telehealth visit?"
    type: single_choice
    construct: was_main_reason_most_recent
    required: true
    options:
      - id: "a"
        label: "A routine follow-up"
      - id: "b"
        label: "A minor illness"
      - id: "c"
        label: "A prescription refill"
      - id: "d"
        label: "Reviewing test results"
      - id: "e"
        label: "A wellness or general health question"
      - id: "f"
        label: "Other"
  - id: q4
    prompt: "How long did you wait past your scheduled time before your most recent telehealth visit started?"
    type: single_choice
    construct: long_did_wait_past_scheduled
    required: true
    options:
      - id: "a"
        label: "It started on time"
      - id: "b"
        label: "Less than 5 minutes"
      - id: "c"
        label: "5 to 15 minutes"
      - id: "d"
        label: "16 to 30 minutes"
      - id: "e"
        label: "More than 30 minutes"
  - id: q5
    prompt: "Did you experience any technical problems during your most recent telehealth visit?"
    type: single_choice
    construct: did_experience_any_technical_problems
    required: true
    options:
      - id: "a"
        label: "No problems"
      - id: "b"
        label: "Minor problems that did not disrupt the visit"
      - id: "c"
        label: "Problems that disrupted the visit"
      - id: "d"
        label: "Problems that ended the visit early"
  - id: q6
    prompt: "Which of the following went well during your telehealth visits? (Select all that apply)"
    type: multi_choice
    construct: following_went_well_during_telehealth
    required: true
    options:
      - id: "a"
        label: "Easy to schedule"
      - id: "b"
        label: "Easy to connect and log in"
      - id: "c"
        label: "The provider listened to me"
      - id: "d"
        label: "Clear explanations"
      - id: "e"
        label: "Short wait time"
      - id: "f"
        label: "My questions were answered"
      - id: "g"
        label: "Follow-up instructions were clear"
  - id: q7
    prompt: "Which of the following were frustrating during your telehealth visits? (Select all that apply)"
    type: multi_choice
    construct: following_were_frustrating_during_telehe
    required: true
    options:
      - id: "a"
        label: "Connection or audio problems"
      - id: "b"
        label: "Hard to describe my symptoms remotely"
      - id: "c"
        label: "Felt rushed"
      - id: "d"
        label: "Long wait past appointment time"
      - id: "e"
        label: "Trouble logging in"
      - id: "f"
        label: "Provider seemed distracted"
      - id: "g"
        label: "Nothing was frustrating"
  - id: q8
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — The ease of scheduling"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q9
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — The wait time before the visit"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q10
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — The audio and video quality"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q11
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — How well the provider listened"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q12
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — The clarity of the provider's explanations"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q13
    prompt: "How satisfied were you with each of the following aspects of your telehealth care — The follow-up instructions you received"
    type: single_choice
    construct: satisfied_were_each_following_aspects
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q14
    prompt: "How much do you agree: The care I received by telehealth was as good as an in-person visit."
    type: single_choice
    construct: much_agree_care_i_received
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: The provider gave me enough time during the telehealth visit."
    type: single_choice
    construct: much_agree_provider_gave_me
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree: I felt my privacy was protected during the visit."
    type: single_choice
    construct: much_agree_i_felt_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How often were your telehealth visits able to fully resolve your issue without a follow-up in-person visit?"
    type: single_choice
    construct: often_were_telehealth_visits_able
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q18
    prompt: "Overall, how satisfied were you with your most recent telehealth visit?"
    type: single_choice
    construct: overall_satisfied_were_most_recent
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q19
    prompt: "On a scale of 0 to 10, how likely are you to recommend telehealth to a friend or family member based on your experience? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
    construct: scale_0_10_likely_recommend
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q20
    prompt: "How likely are you to choose telehealth again for a similar issue?"
    type: single_choice
