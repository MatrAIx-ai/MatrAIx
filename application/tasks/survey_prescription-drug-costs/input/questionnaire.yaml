schemaVersion: "1.0"
id: prescription_drug_costs_v1
title: "Prescription Drug Costs Survey"
description: "What consumers pay for prescription medications and the strategies they use to manage those costs."
questions:
  - id: q0
    prompt: "Do you currently take any prescription medications?"
    type: single_choice
    construct: currently_take_any_prescription_medicati
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, two or three"
      - id: "c"
        label: "Yes, four or more"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "How many prescription medications do you take on a regular basis? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_prescription_medications_take_regul
    required: true
  - id: q2
    prompt: "Roughly how much do you spend out of pocket on prescriptions in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_spend_out_pocket
    required: true
  - id: q3
    prompt: "Do you have prescription drug coverage?"
    type: single_choice
    construct: have_prescription_drug_coverage
    required: true
    options:
      - id: "a"
        label: "Yes, through employer or private insurance"
      - id: "b"
        label: "Yes, through Medicare Part D"
      - id: "c"
        label: "Yes, through Medicaid"
      - id: "d"
        label: "Yes, through another public program"
      - id: "e"
        label: "No prescription coverage"
      - id: "f"
        label: "I'm not sure"
  - id: q4
    prompt: "How would you describe what you pay for your prescriptions overall?"
    type: single_choice
    construct: would_describe_pay_prescriptions_overall
    required: true
    options:
      - id: "a"
        label: "Very affordable"
      - id: "b"
        label: "Somewhat affordable"
      - id: "c"
        label: "Somewhat expensive"
      - id: "d"
        label: "Very expensive"
      - id: "e"
        label: "I can't really afford them"
  - id: q5
    prompt: "Which strategies do you use to lower your prescription costs? (Select all that apply)"
    type: multi_choice
    construct: strategies_use_lower_prescription_costs
    required: true
    options:
      - id: "a"
        label: "Ask for a generic instead of a brand name"
      - id: "b"
        label: "Use discount cards or apps (for example, GoodRx)"
      - id: "c"
        label: "Compare prices between pharmacies"
      - id: "d"
        label: "Use mail-order or 90-day supplies"
      - id: "e"
        label: "Use manufacturer coupons or patient assistance programs"
      - id: "f"
        label: "Buy from a warehouse or big-box pharmacy"
      - id: "g"
        label: "Ask the doctor about lower-cost alternatives"
      - id: "h"
        label: "I don't use any cost-saving strategies"
  - id: q6
    prompt: "Have you ever used a prescription discount app or card such as GoodRx or SingleCare?"
    type: single_choice
    construct: have_ever_used_prescription_discount
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I've heard of them but haven't used one"
      - id: "d"
        label: "No, I haven't heard of them"
  - id: q7
    prompt: "Have you ever compared the price of a medication at more than one pharmacy?"
    type: single_choice
    construct: have_ever_compared_price_medication
    required: true
    options:
      - id: "a"
        label: "Yes, often"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I would consider it"
      - id: "d"
        label: "No, it didn't occur to me"
  - id: q8
    prompt: "Have you ever been surprised by how much a prescription cost at the pharmacy counter?"
    type: single_choice
    construct: have_ever_been_surprised_by
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, never"
  - id: q9
    prompt: "When a medication is too expensive, what have you done? (Select all that apply)"
    type: multi_choice
    construct: when_medication_too_expensive_have
    required: true
    options:
      - id: "a"
        label: "Asked the doctor for a cheaper alternative"
      - id: "b"
        label: "Asked the pharmacist for options"
      - id: "c"
        label: "Used a discount card or coupon"
      - id: "d"
        label: "Switched pharmacies"
      - id: "e"
        label: "Delayed filling the prescription"
      - id: "f"
        label: "Filled a partial supply"
      - id: "g"
        label: "None of these apply to me"
  - id: q10
    prompt: "In the past 12 months, have you not filled a prescription because of the cost?"
    type: single_choice
    construct: past_12_months_have_not
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I've considered it"
      - id: "d"
        label: "No, never"
  - id: q11
    prompt: "In the past 12 months, have you asked your doctor about the cost of a medication before filling it?"
    type: single_choice
    construct: past_12_months_have_asked
    required: true
    options:
      - id: "a"
        label: "Yes, often"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I would like to"
      - id: "d"
        label: "No, never"
  - id: q12
    prompt: "How much do you agree or disagree: The cost of my prescriptions is a source of stress."
    type: single_choice
    construct: much_agree_disagree_cost_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I know how to find the lowest price for my medications."
    type: single_choice
    construct: much_agree_disagree_i_know
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: Prescription prices are unpredictable and hard to plan for."
    type: single_choice
    construct: much_agree_disagree_prescription_prices
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: My insurance makes it clear what I will pay for a medication."
    type: single_choice
    construct: much_agree_disagree_my_insurance
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: I would switch pharmacies to save money on my prescriptions."
    type: single_choice
    construct: much_agree_disagree_i_would
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: Drug manufacturers charge more than they should."
    type: single_choice
    construct: much_agree_disagree_drug_manufacturers
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How often does the price of your medications change from one refill to the next?"
    type: single_choice
    construct: often_does_price_medications_change
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q19
    prompt: "When choosing where to fill a prescription, how important is the lowest price?"
    type: single_choice
    construct: when_choosing_where_fill_prescription
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "When choosing where to fill a prescription, how important is convenience or location?"
    type: single_choice
    construct: when_choosing_where_fill_prescription
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q21
    prompt: "When choosing where to fill a prescription, how important is whether it's covered by your insurance?"
    type: single_choice
    construct: when_choosing_where_fill_prescription
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q22
    prompt: "When choosing where to fill a prescription, how important is being able to get a 90-day supply?"
    type: single_choice
    construct: when_choosing_where_fill_prescription
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q23
    prompt: "Where do you usually fill your prescriptions?"
    type: single_choice
    construct: where_usually_fill_prescriptions
    required: true
    options:
      - id: "a"
        label: "A chain pharmacy (for example, CVS or Walgreens)"
      - id: "b"
        label: "A big-box or grocery store pharmacy (for example, Walmart or Costco)"
      - id: "c"
        label: "An independent local pharmacy"
      - id: "d"
        label: "Mail-order pharmacy"
      - id: "e"
        label: "An online-only pharmacy"
  - id: q24
    prompt: "Have you ever used a manufacturer coupon or patient assistance program to afford a medication?"
    type: single_choice
    construct: have_ever_used_manufacturer_coupon
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I would try"
      - id: "d"
        label: "No, I didn't know they existed"
  - id: q25
    prompt: "Have you ever paid the cash price for a medication because it was cheaper than using insurance?"
    type: single_choice
    construct: have_ever_paid_cash_price
    required: true
