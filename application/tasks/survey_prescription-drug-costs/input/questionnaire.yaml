      - id: "d"
        label: "No, never"
  - id: q26
    prompt: "How confident are you that you are getting a fair price on your prescriptions?"
    type: single_choice
    construct: confident_that_getting_fair_price
    required: true
    options:
      - id: "a"
        label: "Very confident"
      - id: "b"
        label: "Somewhat confident"
      - id: "c"
        label: "Not very confident"
      - id: "d"
        label: "Not at all confident"
  - id: q27
    prompt: "How much do you worry about being able to afford your medications in the future?"
    type: single_choice
    construct: much_worry_being_able_afford
    required: true
    options:
      - id: "a"
        label: "Not at all worried"
      - id: "b"
        label: "Slightly worried"
      - id: "c"
        label: "Moderately worried"
      - id: "d"
        label: "Very worried"
      - id: "e"
        label: "Extremely worried"
  - id: q28
    prompt: "Select your top 3 things that would most help you manage prescription costs. (Select up to 3)"
    type: single_choice
    construct: select_top_3_things_that
    required: true
    options:
      - id: "a"
        label: "Knowing the price before I leave the doctor's office"
      - id: "b"
        label: "Easy price comparison across pharmacies"
      - id: "c"
        label: "Lower list prices from manufacturers"
      - id: "d"
        label: "Better insurance coverage"
      - id: "e"
        label: "More generic options"
      - id: "f"
        label: "Automatic discount cards applied at the counter"
      - id: "g"
        label: "Wider patient assistance programs"
      - id: "h"
        label: "Cheaper 90-day and mail-order options"
  - id: q29
    prompt: "Overall, how satisfied are you with what you pay for prescriptions?"
    type: single_choice
    construct: overall_satisfied_pay_prescriptions
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q30
    prompt: "On a scale of 0 to 10, how likely are you to recommend a cost-saving tool or method to a friend? Please enter a number from 0 (not at all likely) to 10 (extremely likely)."
