schemaVersion: "1.0"
id: internet_connectivity_v1
title: "Internet Connectivity Survey"
description: "How households experience their home internet service — the connection type, provider, speed, reliability, cost, and overall satisfaction."
questions:
  - id: q0
    prompt: "Do you have internet service at home?"
    type: single_choice
    construct: have_internet_service_home
    required: true
    options:
      - id: "a"
        label: "Yes, a fixed home connection"
      - id: "b"
        label: "Yes, but only through a mobile / cellular connection"
      - id: "c"
        label: "No home internet — I rely on other locations"
      - id: "d"
        label: "No internet access"
  - id: q1
    prompt: "What type of home internet connection do you have?"
    type: single_choice
    construct: type_home_internet_connection_have
    required: true
    options:
      - id: "a"
        label: "Fiber"
      - id: "b"
        label: "Cable"
      - id: "c"
        label: "DSL"
      - id: "d"
        label: "Fixed wireless"
      - id: "e"
        label: "5G / cellular home internet"
      - id: "f"
        label: "Satellite (e.g. Starlink, HughesNet)"
      - id: "g"
        label: "I do not know"
      - id: "h"
        label: "Not applicable"
  - id: q2
    prompt: "Who is your home internet provider?"
    type: single_choice
    construct: who_home_internet_provider
    required: true
    options:
      - id: "a"
        label: "Comcast / Xfinity"
      - id: "b"
        label: "Spectrum / Charter"
      - id: "c"
        label: "AT&T"
      - id: "d"
        label: "Verizon"
      - id: "e"
        label: "T-Mobile"
      - id: "f"
        label: "Cox"
      - id: "g"
        label: "Starlink"
      - id: "h"
        label: "A regional or local provider"
      - id: "i"
        label: "Other"
      - id: "j"
        label: "Not applicable"
  - id: q3
    prompt: "Roughly what download speed does your plan advertise?"
    type: single_choice
    construct: roughly_download_speed_does_plan
    required: true
    options:
      - id: "a"
        label: "Under 25 Mbps"
      - id: "b"
        label: "25–100 Mbps"
      - id: "c"
        label: "100–300 Mbps"
      - id: "d"
        label: "300–500 Mbps"
      - id: "e"
        label: "500 Mbps–1 Gbps"
      - id: "f"
        label: "More than 1 Gbps"
      - id: "g"
        label: "I do not know"
  - id: q4
    prompt: "What do you primarily use your home internet for? (Select all that apply)"
    type: multi_choice
    construct: primarily_use_home_internet_select
    required: true
    options:
      - id: "a"
        label: "Streaming video"
      - id: "b"
        label: "Streaming music"
      - id: "c"
        label: "Video calls / meetings"
      - id: "d"
        label: "Working or studying from home"
      - id: "e"
        label: "Online gaming"
      - id: "f"
        label: "Web browsing and email"
      - id: "g"
        label: "Social media"
      - id: "h"
        label: "Smart home devices"
      - id: "i"
        label: "Large downloads / uploads"
      - id: "j"
        label: "Running a home server or hosting"
  - id: q5
    prompt: "How many devices are usually connected to your home internet at once?"
    type: single_choice
    construct: many_devices_usually_connected_home
    required: true
    options:
      - id: "a"
        label: "1–3"
      - id: "b"
        label: "4–7"
      - id: "c"
        label: "8–12"
      - id: "d"
        label: "13–20"
      - id: "e"
        label: "More than 20"
  - id: q6
    prompt: "Do you have a backup internet connection (mobile hotspot, second provider)?"
    type: single_choice
    construct: have_backup_internet_connection_mobile
    required: true
    options:
      - id: "a"
        label: "Yes, a dedicated backup"
      - id: "b"
        label: "I use my phone's hotspot when needed"
      - id: "c"
        label: "No backup"
      - id: "d"
        label: "Not applicable"
  - id: q7
    prompt: "Does your plan have a monthly data cap?"
    type: single_choice
    construct: does_plan_have_monthly_data
    required: true
    options:
      - id: "a"
        label: "Yes, and I sometimes hit it"
      - id: "b"
        label: "Yes, but I rarely hit it"
      - id: "c"
        label: "No, it is unlimited"
      - id: "d"
        label: "I do not know"
  - id: q8
    prompt: "How often does your home internet go down or become unusable?"
    type: single_choice
    construct: often_does_home_internet_go
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "About once a month"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Several times a week or more"
  - id: q9
    prompt: "When your internet is slow or down, how much does it disrupt your day?"
    type: single_choice
    construct: when_internet_slow_down_much
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "Quite a bit"
      - id: "e"
        label: "Severely — I cannot work or function"
  - id: q10
    prompt: "How often do you run a speed test on your connection?"
    type: single_choice
    construct: often_run_speed_test_connection
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Monthly"
      - id: "e"
        label: "Weekly or more"
  - id: q11
    prompt: "Select your top 3 factors when choosing an internet provider. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_factors_when
    required: true
    options:
      - id: "a"
        label: "Download / upload speed"
      - id: "b"
        label: "Price"
      - id: "c"
        label: "Reliability / uptime"
      - id: "d"
        label: "No data caps"
      - id: "e"
        label: "Customer service"
      - id: "f"
        label: "No contract or flexible terms"
      - id: "g"
        label: "Bundle with TV / phone"
      - id: "h"
        label: "Low latency (for gaming or calls)"
  - id: q12
    prompt: "How much do you agree: My home internet is fast enough for what I do."
    type: single_choice
    construct: much_agree_my_home_internet
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: My home internet is reliable."
    type: single_choice
    construct: much_agree_my_home_internet
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: My internet is a good value for the price."
    type: single_choice
    construct: much_agree_my_internet_good
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: I have limited choice of providers where I live."
    type: single_choice
    construct: much_agree_i_have_limited
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree: A reliable connection is essential to my work or studies."
    type: single_choice
    construct: much_agree_reliable_connection_essential
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How satisfied are you with your home internet on: Download and upload speed."
    type: single_choice
    construct: satisfied_home_internet_download_upload
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q18
    prompt: "How satisfied are you with your home internet on: Reliability and uptime."
    type: single_choice
    construct: satisfied_home_internet_reliability_upti
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q19
    prompt: "How satisfied are you with your home internet on: Monthly price."
