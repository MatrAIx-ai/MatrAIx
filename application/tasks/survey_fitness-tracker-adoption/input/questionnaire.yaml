    type: single_choice
    construct: often_check_stats_companion_app
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Once a day"
      - id: "e"
        label: "Several times a day"
