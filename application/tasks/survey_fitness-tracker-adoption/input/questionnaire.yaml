schemaVersion: "1.0"
id: fitness_tracker_adoption_v1
title: "Fitness Tracker Adoption Survey"
description: "Consumer adoption and everyday use of wearable fitness trackers and smartwatches."
questions:
  - id: q0
    prompt: "Do you currently own or wear a fitness tracker or smartwatch?"
    type: single_choice
    construct: currently_own_wear_fitness_tracker
    required: true
    options:
      - id: "a"
        label: "Yes, I wear one most days"
      - id: "b"
        label: "Yes, but I wear it only sometimes"
      - id: "c"
        label: "No, but I owned one in the past"
      - id: "d"
        label: "No, I have never owned one"
  - id: q1
    prompt: "Which type of device do you mainly use?"
    type: single_choice
    construct: type_device_mainly_use
    required: true
    options:
      - id: "a"
        label: "A smartwatch (for example, Apple Watch, Samsung Galaxy Watch)"
      - id: "b"
        label: "A fitness band (for example, Fitbit Charge, Xiaomi band)"
      - id: "c"
        label: "A GPS sport watch (for example, Garmin, Coros)"
      - id: "d"
        label: "A screenless tracker or ring (for example, Oura, Whoop)"
      - id: "e"
        label: "I do not currently use a device"
  - id: q2
    prompt: "Which brand is your current or most recent device? (Select all that apply)"
    type: multi_choice
    construct: brand_current_most_recent_device
    required: true
    options:
      - id: "a"
        label: "Apple"
      - id: "b"
        label: "Fitbit"
      - id: "c"
        label: "Garmin"
      - id: "d"
        label: "Samsung"
      - id: "e"
        label: "Oura"
      - id: "f"
        label: "Whoop"
      - id: "g"
        label: "Amazfit or Xiaomi"
      - id: "h"
        label: "Another brand"
  - id: q3
    prompt: "How long have you owned your current device? Please enter a number of months."
    type: free_text
    construct: long_have_owned_current_device
    required: true
  - id: q4
    prompt: "About how much did your current device cost? Please enter a number in dollars."
    type: free_text
    construct: much_did_current_device_cost
    required: true
  - id: q5
    prompt: "What first motivated you to get a fitness tracker? (Select all that apply)"
    type: multi_choice
    construct: first_motivated_get_fitness_tracker
    required: true
    options:
      - id: "a"
        label: "Wanting to be more active"
      - id: "b"
        label: "Tracking steps or daily movement"
      - id: "c"
        label: "Monitoring heart rate"
      - id: "d"
        label: "Tracking sleep"
      - id: "e"
        label: "Training for a sport or event"
      - id: "f"
        label: "A doctor's or coach's suggestion"
      - id: "g"
        label: "Curiosity about the technology"
      - id: "h"
        label: "It was a gift"
  - id: q6
    prompt: "How often do you wear your device?"
    type: single_choice
    construct: often_wear_device
    required: true
    options:
      - id: "a"
        label: "All day and night"
      - id: "b"
        label: "All day but not overnight"
      - id: "c"
        label: "Only during workouts"
      - id: "d"
        label: "A few days a week"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Which metrics do you actively pay attention to? (Select all that apply)"
    type: multi_choice
    construct: metrics_actively_pay_attention_select
    required: true
    options:
      - id: "a"
        label: "Steps"
      - id: "b"
        label: "Heart rate"
      - id: "c"
        label: "Calories burned"
      - id: "d"
        label: "Sleep"
      - id: "e"
        label: "Distance or pace"
      - id: "f"
        label: "Active minutes or exercise rings"
      - id: "g"
        label: "Stress or recovery scores"
      - id: "h"
        label: "Blood oxygen"
  - id: q8
