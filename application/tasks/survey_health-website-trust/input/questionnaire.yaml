schemaVersion: "1.0"
id: health_website_trust_v1
title: "Trust in Health Websites and Sources Survey"
description: "How much people trust different online health sources and what makes a health website seem credible."
questions:
  - id: q0
    prompt: "In the past 12 months, have you visited a website to look for health or medical information?"
    type: single_choice
    construct: past_12_months_have_visited
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q1
    prompt: "About how often do you visit health websites?"
    type: single_choice
    construct: often_visit_health_websites
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "About once a month"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Weekly or more"
  - id: q2
    prompt: "Which health websites or sources have you visited in the past 12 months? (Select all that apply)"
    type: multi_choice
    construct: health_websites_sources_have_visited
    required: true
    options:
      - id: "a"
        label: "Mayo Clinic"
      - id: "b"
        label: "WebMD"
      - id: "c"
        label: "Healthline"
      - id: "d"
        label: "Cleveland Clinic"
      - id: "e"
        label: "CDC or NIH (government sites)"
      - id: "f"
        label: "MedlinePlus"
      - id: "g"
        label: "A hospital or clinic website"
      - id: "h"
        label: "WikiHealth or Wikipedia"
      - id: "i"
        label: "Reddit or online forums"
      - id: "j"
        label: "A social media page or influencer"
      - id: "k"
        label: "None of these"
  - id: q3
    prompt: "Which single source do you consider the MOST trustworthy for health information?"
    type: single_choice
    construct: single_source_consider_most_trustworthy
    required: true
    options:
      - id: "a"
        label: "My own doctor's practice website"
      - id: "b"
        label: "Government health agencies (CDC, NIH)"
      - id: "c"
        label: "Major medical centers (e.g., Mayo Clinic, Cleveland Clinic)"
      - id: "d"
        label: "General health websites (e.g., WebMD, Healthline)"
      - id: "e"
        label: "Academic or research institutions"
      - id: "f"
        label: "Patient communities and forums"
      - id: "g"
        label: "AI chatbots or assistants"
      - id: "h"
        label: "Social media"
  - id: q4
    prompt: "How much do you trust health information from each source — Government health agencies (CDC, NIH)"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q5
    prompt: "How much do you trust health information from each source — Major hospital and medical-center websites"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q6
    prompt: "How much do you trust health information from each source — Commercial health websites (e.g., WebMD)"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q7
    prompt: "How much do you trust health information from each source — Patient forums and online communities"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q8
    prompt: "How much do you trust health information from each source — Social media posts and influencers"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q9
    prompt: "How much do you trust health information from each source — AI chatbots or assistants"
    type: single_choice
    construct: much_trust_health_information_from
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "Completely"
  - id: q10
    prompt: "Which signals make you trust a health website MORE? (Select all that apply)"
    type: multi_choice
    construct: signals_make_trust_health_website
    required: true
    options:
      - id: "a"
        label: "It is run by a well-known institution"
      - id: "b"
        label: "Content is written or reviewed by medical professionals"
      - id: "c"
        label: "It cites studies or references"
      - id: "d"
        label: "Information is recent or dated"
      - id: "e"
        label: "A .gov or .edu web address"
      - id: "f"
        label: "Few or no ads"
      - id: "g"
        label: "Professional design and no errors"
      - id: "h"
        label: "It matches other sources I trust"
      - id: "i"
        label: "Clear author names and credentials"
  - id: q11
    prompt: "Which signals make you trust a health website LESS? (Select all that apply)"
    type: multi_choice
    construct: signals_make_trust_health_website
    required: true
    options:
      - id: "a"
        label: "Lots of ads or pop-ups"
      - id: "b"
        label: "It is trying to sell a product"
      - id: "c"
        label: "No author or source listed"
      - id: "d"
        label: "Spelling or grammar mistakes"
      - id: "e"
        label: "Claims that sound too good to be true"
      - id: "f"
        label: "Outdated information"
      - id: "g"
        label: "Strong emotional or fear-based language"
      - id: "h"
        label: "It conflicts with my doctor's advice"
      - id: "i"
        label: "None of these bother me"
  - id: q12
    prompt: "How often do you check who wrote or published the health information you read?"
    type: single_choice
    construct: often_check_who_wrote_published
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q13
    prompt: "How often do you compare information across more than one health website?"
