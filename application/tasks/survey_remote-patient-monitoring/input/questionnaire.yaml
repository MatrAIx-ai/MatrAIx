        label: "Connected blood pressure cuff"
      - id: "b"
        label: "Connected scale"
      - id: "c"
        label: "Connected glucose meter"
      - id: "d"
        label: "Pulse oximeter"
      - id: "e"
        label: "Wearable band or watch"
      - id: "f"
        label: "A tablet or hub provided by the program"
      - id: "g"
