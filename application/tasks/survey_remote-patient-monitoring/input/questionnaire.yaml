schemaVersion: "1.0"
id: remote_patient_monitoring_v1
title: "Remote Patient Monitoring Survey"
description: "Consumer experience with provider-run remote patient monitoring programs."
questions:
  - id: q0
    prompt: "Have you ever taken part in a remote patient monitoring program where a provider reviewed health data you sent from home?"
    type: single_choice
    construct: have_ever_taken_part_remote
    required: true
    options:
      - id: "a"
        label: "Yes, I am currently enrolled"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I have been offered it"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "I'm not sure what this is"
  - id: q1
    prompt: "Which best describes your current status with remote monitoring?"
    type: single_choice
    construct: best_describes_current_status_remote
    required: true
    options:
      - id: "a"
        label: "Actively enrolled and using it"
      - id: "b"
        label: "Enrolled but not very active"
      - id: "c"
        label: "Completed a past program"
      - id: "d"
        label: "Considering enrolling"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "What is the main focus of your remote monitoring program?"
    type: single_choice
    construct: main_focus_remote_monitoring_program
    required: true
    options:
      - id: "a"
        label: "Blood pressure or heart health"
      - id: "b"
        label: "Weight management"
      - id: "c"
        label: "Blood sugar or metabolic health"
      - id: "d"
        label: "General wellness and recovery"
      - id: "e"
        label: "Respiratory or activity tracking"
      - id: "f"
        label: "Not applicable"
  - id: q3
    prompt: "How did you first learn about remote patient monitoring? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_remote_patient
    required: true
    options:
      - id: "a"
        label: "My doctor or care team offered it"
      - id: "b"
        label: "My insurance plan"
      - id: "c"
        label: "A hospital or clinic"
      - id: "d"
        label: "Online research"
      - id: "e"
        label: "Friends or family"
      - id: "f"
        label: "Advertising"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "How long have you been (or were you) enrolled in the program?"
    type: single_choice
    construct: long_have_been_were_enrolled
    required: true
    options:
      - id: "a"
        label: "Less than 1 month"
      - id: "b"
        label: "1 to 3 months"
      - id: "c"
        label: "3 to 6 months"
      - id: "d"
        label: "6 to 12 months"
      - id: "e"
        label: "More than a year"
      - id: "f"
        label: "Not applicable"
  - id: q5
    prompt: "What kind of data does (or did) the program collect from you? (Select all that apply)"
    type: multi_choice
    construct: kind_data_does_did_program
    required: true
    options:
      - id: "a"
        label: "Blood pressure"
      - id: "b"
        label: "Weight"
      - id: "c"
        label: "Blood glucose"
      - id: "d"
        label: "Heart rate"
      - id: "e"
        label: "Oxygen level"
      - id: "f"
        label: "Activity or steps"
      - id: "g"
        label: "Symptom check-ins"
      - id: "h"
        label: "Not applicable"
  - id: q6
    prompt: "How are (or were) your readings sent to your provider?"
    type: single_choice
    construct: were_readings_sent_provider
    required: true
    options:
      - id: "a"
        label: "Automatically through a connected device"
      - id: "b"
        label: "I enter them into an app or portal"
      - id: "c"
        label: "By phone or messaging"
      - id: "d"
        label: "A mix of methods"
      - id: "e"
        label: "Not applicable"
  - id: q7
    prompt: "How often do (or did) you submit readings?"
    type: single_choice
    construct: often_did_submit_readings
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly or less"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "Who provided the monitoring equipment?"
    type: single_choice
    construct: who_provided_monitoring_equipment
    required: true
    options:
      - id: "a"
        label: "My provider or clinic"
      - id: "b"
        label: "My insurer"
      - id: "c"
        label: "I bought it myself"
      - id: "d"
        label: "A third-party monitoring company"
      - id: "e"
        label: "Not applicable"
  - id: q9
