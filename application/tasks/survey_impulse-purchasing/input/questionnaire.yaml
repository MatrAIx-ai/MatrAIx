      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q23
    prompt: "How much do buy-now-pay-later options make you more likely to impulse buy?"
    type: single_choice
    construct: much_buy_now_pay_later
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "I don't use buy-now-pay-later"
  - id: q24
    prompt: "In the past 2 years, has your impulse spending changed?"
    type: single_choice
    construct: past_2_years_has_impulse
    required: true
    options:
      - id: "a"
        label: "Increased a lot"
      - id: "b"
        label: "Increased somewhat"
      - id: "c"
        label: "Stayed about the same"
      - id: "d"
        label: "Decreased somewhat"
      - id: "e"
        label: "Decreased a lot"
  - id: q25
    prompt: "How much does your impulse spending interfere with your financial goals?"
    type: single_choice
    construct: much_does_impulse_spending_interfere
