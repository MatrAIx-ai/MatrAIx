schemaVersion: "1.0"
id: impulse_purchasing_v1
title: "Impulse Purchasing Survey"
description: "How often people make unplanned purchases, what triggers them, and how impulse spending affects their finances and well-being."
questions:
  - id: q0
    prompt: "How often do you make impulse purchases (unplanned buys you didn't intend to make)?"
    type: single_choice
    construct: often_make_impulse_purchases_unplanned
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
  - id: q1
    prompt: "About how much do you spend on impulse purchases in a typical month? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_spend_impulse_purchases_typical
    required: true
  - id: q2
    prompt: "Where do most of your impulse purchases happen? (Select all that apply)"
    type: multi_choice
    construct: where_most_impulse_purchases_happen
    required: true
    options:
      - id: "a"
        label: "In physical stores (checkout aisle, browsing)"
      - id: "b"
        label: "Amazon"
      - id: "c"
        label: "Other online retailers"
      - id: "d"
        label: "Social media (Instagram, TikTok Shop, etc.)"
      - id: "e"
        label: "Mobile shopping apps"
      - id: "f"
        label: "Warehouse clubs (Costco, Sam's Club)"
      - id: "g"
        label: "Convenience or grocery stores"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "Which categories do you most often impulse buy? (Select all that apply)"
    type: multi_choice
    construct: categories_most_often_impulse_buy
    required: true
    options:
      - id: "a"
        label: "Clothing, shoes, or accessories"
      - id: "b"
        label: "Food, snacks, or drinks"
      - id: "c"
        label: "Electronics or gadgets"
      - id: "d"
        label: "Beauty or personal care"
      - id: "e"
        label: "Home décor or household items"
      - id: "f"
        label: "Books, games, or hobbies"
      - id: "g"
        label: "Alcohol"
      - id: "h"
        label: "Toys or items for kids"
      - id: "i"
        label: "None of these"
  - id: q4
    prompt: "What most often triggers your impulse purchases? (Select all that apply)"
    type: multi_choice
    construct: most_often_triggers_impulse_purchases
    required: true
    options:
      - id: "a"
        label: "A sale or discount"
      - id: "b"
        label: "Free shipping thresholds"
      - id: "c"
        label: "Seeing an ad"
      - id: "d"
        label: "A social media post or influencer"
      - id: "e"
        label: "Feeling stressed or down"
      - id: "f"
        label: "Boredom"
      - id: "g"
        label: "Celebrating or rewarding myself"
      - id: "h"
        label: "Limited-time or \"only a few left\" messages"
      - id: "i"
        label: "Peer or family influence"
  - id: q5
    prompt: "What is the typical dollar amount of a single impulse purchase for you?"
    type: single_choice
    construct: typical_dollar_amount_single_impulse
    required: true
    options:
      - id: "a"
        label: "Under $10"
      - id: "b"
        label: "$10–$24"
      - id: "c"
        label: "$25–$49"
      - id: "d"
        label: "$50–$99"
      - id: "e"
        label: "$100–$249"
      - id: "f"
        label: "$250 or more"
  - id: q6
    prompt: "How do you usually pay for impulse purchases?"
    type: single_choice
    construct: usually_pay_impulse_purchases
    required: true
    options:
      - id: "a"
        label: "Credit card"
      - id: "b"
        label: "Debit card"
      - id: "c"
        label: "Cash"
      - id: "d"
        label: "Buy now, pay later (Klarna, Afterpay, etc.)"
      - id: "e"
        label: "Digital wallet (Apple Pay, etc.)"
      - id: "f"
        label: "A mix of methods"
  - id: q7
    prompt: "How much do you agree with the following statement: I often buy things on the spur of the moment."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q8
    prompt: "How much do you agree with the following statement: I sometimes buy things without thinking about whether I can afford them."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree with the following statement: Shopping helps me feel better when I'm in a bad mood."
    type: single_choice
    construct: much_agree_following_statement_shopping
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree with the following statement: I often regret my impulse purchases afterward."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I have trouble resisting a good deal even if I don't need the item."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: My impulse spending has caused tension in my household or finances."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I feel in control of my spending overall."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How often does each situation lead you to impulse buy: Browsing online when bored?"
    type: single_choice
    construct: often_does_each_situation_lead
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q15
    prompt: "How often does each situation lead you to impulse buy: Seeing a \"limited-time\" sale or deal?"
    type: single_choice
    construct: often_does_each_situation_lead
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q16
    prompt: "How often does each situation lead you to impulse buy: Feeling stressed, sad, or anxious?"
    type: single_choice
    construct: often_does_each_situation_lead
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q17
    prompt: "How often does each situation lead you to impulse buy: Shopping with friends or family?"
    type: single_choice
    construct: often_does_each_situation_lead
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q18
    prompt: "How often does each situation lead you to impulse buy: Standing in a checkout line?"
    type: single_choice
    construct: often_does_each_situation_lead
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q19
    prompt: "Select the top 3 things that would most help you curb impulse spending. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_things_that
    required: true
    options:
      - id: "a"
        label: "Sticking to a written budget"
      - id: "b"
        label: "A waiting period before buying (e.g., 24 hours)"
      - id: "c"
        label: "Removing saved payment info from apps"
      - id: "d"
        label: "Unsubscribing from marketing emails"
      - id: "e"
        label: "Shopping with a list"
      - id: "f"
        label: "Using cash only"
      - id: "g"
        label: "Deleting shopping apps"
      - id: "h"
        label: "Setting spending alerts"
  - id: q20
    prompt: "Which strategies do you currently use to control impulse buying? (Select all that apply)"
    type: multi_choice
    construct: strategies_currently_use_control_impulse
    required: true
    options:
      - id: "a"
        label: "I follow a budget"
      - id: "b"
        label: "I use a shopping list"
      - id: "c"
        label: "I wait before buying non-essentials"
      - id: "d"
        label: "I avoid saving card info online"
      - id: "e"
        label: "I unsubscribe from promotional emails"
      - id: "f"
        label: "I set spending limits or alerts"
      - id: "g"
        label: "I use cash for discretionary spending"
      - id: "h"
        label: "I don't use any strategies"
  - id: q21
    prompt: "How often do you return items you bought on impulse?"
    type: single_choice
    construct: often_return_items_bought_impulse
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q22
    prompt: "How often do you experience \"buyer's remorse\" after an impulse purchase?"
    type: single_choice
