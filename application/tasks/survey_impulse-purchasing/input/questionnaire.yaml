        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
  - id: q26
    prompt: "How satisfied are you with your ability to control unplanned spending?"
    type: single_choice
