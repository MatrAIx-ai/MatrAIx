schemaVersion: "1.0"
id: long_term_care_planning_v1
title: "Long-Term Care Planning Survey"
description: "How adults think about, plan for, and expect to pay for long-term care (in-home care, assisted living, and nursing homes) as they age."
questions:
  - id: q0
    prompt: "Have you ever thought about how you would pay for long-term care (such as a nursing home, assisted living, or in-home care) if you needed it?"
    type: single_choice
    construct: have_ever_thought_would_pay
    required: true
    options:
      - id: "a"
        label: "Yes, I've thought about it a lot"
      - id: "b"
        label: "Yes, I've thought about it a little"
      - id: "c"
        label: "No, I haven't really thought about it"
      - id: "d"
        label: "No, and I prefer not to think about it"
  - id: q1
    prompt: "How familiar are you with what long-term care services actually cost?"
    type: single_choice
    construct: familiar_long_term_care_services
    required: true
    options:
      - id: "a"
        label: "Not at all familiar"
      - id: "b"
        label: "Slightly familiar"
      - id: "c"
        label: "Moderately familiar"
      - id: "d"
        label: "Very familiar"
  - id: q2
    prompt: "Have you or your spouse/partner made any specific plans for long-term care needs?"
    type: single_choice
    construct: have_spouse_partner_made_any
    required: true
    options:
      - id: "a"
        label: "Yes, a detailed written plan"
      - id: "b"
        label: "Yes, some general plans"
      - id: "c"
        label: "We've talked about it but made no plans"
      - id: "d"
        label: "No plans at all"
  - id: q3
    prompt: "Do you currently have a long-term care insurance policy?"
    type: single_choice
    construct: currently_have_long_term_care
    required: true
    options:
      - id: "a"
        label: "Yes, a standalone long-term care insurance policy"
      - id: "b"
        label: "Yes, a hybrid life insurance or annuity policy with a long-term care rider"
      - id: "c"
        label: "No, but I've looked into it"
      - id: "d"
        label: "No, and I haven't looked into it"
  - id: q4
    prompt: "Have you ever helped provide care for, or manage the care of, an aging family member?"
    type: single_choice
    construct: have_ever_helped_provide_care
    required: true
    options:
      - id: "a"
        label: "Yes, I'm currently doing so"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I expect to in the future"
      - id: "d"
        label: "No, and I don't expect to"
  - id: q5
    prompt: "Which of the following long-term care arrangements are you aware of? (Select all that apply)"
    type: multi_choice
    construct: following_long_term_care_arrangements
    required: true
    options:
      - id: "a"
        label: "In-home care (home health aide or personal care aide)"
      - id: "b"
        label: "Adult day care centers"
      - id: "c"
        label: "Assisted living facilities"
      - id: "d"
        label: "Nursing homes / skilled nursing facilities"
      - id: "e"
        label: "Continuing care retirement communities (CCRCs)"
      - id: "f"
        label: "Memory care units"
      - id: "g"
        label: "Respite care for family caregivers"
      - id: "h"
        label: "I'm not aware of any of these"
  - id: q6
    prompt: "If you needed long-term care, where would you most prefer to receive it?"
    type: single_choice
    construct: if_needed_long_term_care
    required: true
    options:
      - id: "a"
        label: "In my own home"
      - id: "b"
        label: "In the home of a family member"
      - id: "c"
        label: "In an assisted living facility"
      - id: "d"
        label: "In a nursing home or skilled nursing facility"
      - id: "e"
        label: "In a continuing care retirement community"
      - id: "f"
        label: "I'm not sure"
  - id: q7
    prompt: "Which sources do you expect to use to pay for long-term care if you need it? (Select all that apply)"
    type: multi_choice
    construct: sources_expect_use_pay_long
    required: true
    options:
      - id: "a"
        label: "Personal savings and investments"
      - id: "b"
        label: "Long-term care insurance"
      - id: "c"
        label: "Medicare"
      - id: "d"
        label: "Medicaid"
      - id: "e"
        label: "Home equity (selling or borrowing against my home)"
      - id: "f"
        label: "Help from family members"
      - id: "g"
        label: "Veterans (VA) benefits"
      - id: "h"
        label: "Social Security income"
      - id: "i"
        label: "I don't know how I would pay for it"
  - id: q8
    prompt: "How confident are you that you could afford long-term care if you needed it for several years?"
    type: single_choice
    construct: confident_that_could_afford_long
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q9
    prompt: "Do you believe Medicare covers the cost of long-term nursing home care?"
    type: single_choice
    construct: believe_medicare_covers_cost_long
    required: true
    options:
      - id: "a"
        label: "Yes, it covers most of it"
      - id: "b"
        label: "It covers some of it"
      - id: "c"
        label: "No, it covers very little long-term care"
      - id: "d"
        label: "I don't know"
  - id: q10
    prompt: "How worried are you about the following: The cost of long-term care draining your savings."
    type: single_choice
    construct: worried_following_cost_long_term
    required: true
    options:
      - id: "a"
        label: "Not at all worried"
      - id: "b"
        label: "Slightly worried"
      - id: "c"
        label: "Moderately worried"
      - id: "d"
        label: "Very worried"
      - id: "e"
        label: "Extremely worried"
  - id: q11
    prompt: "How worried are you about the following: Becoming a physical or financial burden on your family."
    type: single_choice
    construct: worried_following_becoming_physical_fina
    required: true
    options:
      - id: "a"
        label: "Not at all worried"
      - id: "b"
        label: "Slightly worried"
      - id: "c"
        label: "Moderately worried"
      - id: "d"
        label: "Very worried"
      - id: "e"
        label: "Extremely worried"
  - id: q12
    prompt: "How worried are you about the following: Losing your independence and control over daily life."
    type: single_choice
    construct: worried_following_losing_independence_co
    required: true
    options:
      - id: "a"
        label: "Not at all worried"
      - id: "b"
        label: "Slightly worried"
      - id: "c"
        label: "Moderately worried"
      - id: "d"
        label: "Very worried"
      - id: "e"
        label: "Extremely worried"
  - id: q13
    prompt: "How worried are you about the following: Not being able to find quality care when you need it."
    type: single_choice
