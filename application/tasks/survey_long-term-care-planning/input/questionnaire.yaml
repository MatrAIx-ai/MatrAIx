      - id: "a"
        label: "Not at all worried"
      - id: "b"
        label: "Slightly worried"
      - id: "c"
        label: "Moderately worried"
      - id: "d"
        label: "Very worried"
      - id: "e"
        label: "Extremely worried"
  - id: q14
    prompt: "How much do you agree or disagree: It is my own responsibility to plan and pay for my long-term care."
    type: single_choice
    construct: much_agree_disagree_it_my
    required: true
    options:
      - id: "a"
