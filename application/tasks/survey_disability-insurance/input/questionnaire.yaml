      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
      - id: "f"
        label: "Not applicable"
  - id: q18
    prompt: "How concerned are you about the following when it comes to income protection: losing coverage if you change jobs?"
