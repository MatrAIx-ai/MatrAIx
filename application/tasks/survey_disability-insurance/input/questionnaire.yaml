schemaVersion: "1.0"
id: disability_insurance_v1
title: "Disability Insurance Survey"
description: "Ownership of, attitudes toward, and confidence in disability insurance as a way to protect household income against illness or injury."
questions:
  - id: q0
    prompt: "Do you currently have any form of disability insurance that would replace part of your income if you could not work?"
    type: single_choice
    construct: currently_have_any_form_disability
    required: true
    options:
      - id: "a"
        label: "Yes, through my employer"
      - id: "b"
        label: "Yes, a policy I bought on my own"
      - id: "c"
        label: "Yes, both employer and individual coverage"
      - id: "d"
        label: "No, but I have looked into it"
      - id: "e"
        label: "No, and I have not looked into it"
      - id: "f"
        label: "Not sure"
  - id: q1
    prompt: "Which types of disability coverage do you currently have? (Select all that apply)"
    type: multi_choice
    construct: types_disability_coverage_currently_have
    required: true
    options:
      - id: "a"
        label: "Short-term disability"
      - id: "b"
        label: "Long-term disability"
      - id: "c"
        label: "Employer-paid group coverage"
      - id: "d"
        label: "Individual policy I pay for myself"
      - id: "e"
        label: "Coverage through a union or association"
      - id: "f"
        label: "Social Security Disability Insurance (SSDI) eligibility"
      - id: "g"
        label: "I do not have any disability coverage"
  - id: q2
    prompt: "How did you obtain your disability coverage?"
    type: single_choice
    construct: did_obtain_disability_coverage
    required: true
    options:
      - id: "a"
        label: "Automatically enrolled by my employer"
      - id: "b"
        label: "Chose it during open enrollment at work"
      - id: "c"
        label: "Bought it through an insurance agent or broker"
      - id: "d"
        label: "Bought it directly from an insurer online"
      - id: "e"
        label: "Through a professional or trade association"
      - id: "f"
        label: "I do not have coverage"
  - id: q3
    prompt: "Roughly what percentage of your income would your disability coverage replace if you could not work?"
    type: single_choice
    construct: roughly_percentage_income_would_disabili
    required: true
    options:
      - id: "a"
        label: "Less than 40%"
      - id: "b"
        label: "40% to 50%"
      - id: "c"
        label: "51% to 60%"
      - id: "d"
        label: "61% to 70%"
      - id: "e"
        label: "More than 70%"
      - id: "f"
        label: "Don't know"
      - id: "g"
        label: "Not applicable — no coverage"
  - id: q4
    prompt: "About how much do you pay in premiums for disability insurance each month? Please enter a number of dollars (enter 0 if none or employer-paid)."
    type: free_text
    construct: much_pay_premiums_disability_insurance
    required: true
  - id: q5
    prompt: "How long could your household cover essential expenses if you suddenly lost your income due to illness or injury?"
    type: single_choice
    construct: long_could_household_cover_essential
    required: true
    options:
      - id: "a"
        label: "Less than 1 month"
      - id: "b"
        label: "1 to 3 months"
      - id: "c"
        label: "4 to 6 months"
      - id: "d"
        label: "7 to 12 months"
      - id: "e"
        label: "More than 12 months"
      - id: "f"
        label: "Don't know"
  - id: q6
    prompt: "How likely do you think it is that you will experience a disability lasting three months or longer at some point in your working life?"
    type: single_choice
    construct: likely_think_it_that_will
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q7
    prompt: "How would you rate your understanding of how disability insurance works?"
    type: single_choice
    construct: would_rate_understanding_disability_insu
    required: true
    options:
      - id: "a"
        label: "I don't understand it at all"
      - id: "b"
        label: "Slight understanding"
      - id: "c"
        label: "Moderate understanding"
      - id: "d"
        label: "Good understanding"
      - id: "e"
        label: "Very good understanding"
  - id: q8
    prompt: "How important is disability insurance for someone in your financial situation?"
    type: single_choice
    construct: important_disability_insurance_someone_f
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q9
    prompt: "How much do you agree with the following statement: My income is essential to my household's financial stability."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree with the following statement: Disability insurance is too expensive for the protection it provides."
    type: single_choice
    construct: much_agree_following_statement_disabilit
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: Social Security or savings would be enough if I became disabled."
    type: single_choice
    construct: much_agree_following_statement_social
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: My employer's coverage is enough; I don't need to buy my own."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: A disability is more likely to derail my finances than an early death."
    type: single_choice
    construct: much_agree_following_statement_disabilit
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How concerned are you about the following when it comes to income protection: a physical injury that prevents you from working?"
