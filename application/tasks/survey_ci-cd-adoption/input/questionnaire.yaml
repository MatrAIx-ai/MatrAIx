schemaVersion: "1.0"
id: ci_cd_adoption_v1
title: "CI/CD Adoption Survey"
description: "How software teams adopt and operate continuous integration and continuous delivery pipelines."
questions:
  - id: q0
    prompt: "Which best describes your team's use of continuous integration and delivery (CI/CD)?"
    type: single_choice
    construct: best_describes_team_s_use
    required: true
    options:
      - id: "a"
        label: "We have mature, widely used CI/CD pipelines"
      - id: "b"
        label: "We use basic CI/CD for some projects"
      - id: "c"
        label: "We are actively adopting CI/CD"
      - id: "d"
        label: "We don't use CI/CD"
      - id: "e"
        label: "I'm not sure"
  - id: q1
    prompt: "How long has your team used CI/CD?"
    type: single_choice
    construct: long_has_team_used_ci
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "We don't use CI/CD"
  - id: q2
    prompt: "What is your relationship to CI/CD pipelines?"
    type: single_choice
    construct: relationship_ci_cd_pipelines
    required: true
    options:
      - id: "a"
        label: "I build and maintain the pipelines"
      - id: "b"
        label: "I use pipelines others maintain"
      - id: "c"
        label: "I both build and use pipelines"
      - id: "d"
        label: "I don't interact with pipelines directly"
  - id: q3
    prompt: "Which CI/CD tool does your team primarily use?"
    type: single_choice
    construct: ci_cd_tool_does_team
    required: true
    options:
      - id: "a"
        label: "GitHub Actions"
      - id: "b"
        label: "GitLab CI/CD"
      - id: "c"
        label: "Jenkins"
      - id: "d"
        label: "CircleCI"
      - id: "e"
        label: "Azure Pipelines"
      - id: "f"
        label: "Bitbucket Pipelines"
      - id: "g"
        label: "Argo CD"
      - id: "h"
        label: "Buildkite"
      - id: "i"
        label: "TeamCity"
      - id: "j"
        label: "Other"
  - id: q4
    prompt: "Which CI/CD tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: ci_cd_tools_have_used
    required: true
    options:
      - id: "a"
        label: "GitHub Actions"
      - id: "b"
        label: "GitLab CI/CD"
      - id: "c"
        label: "Jenkins"
      - id: "d"
        label: "CircleCI"
      - id: "e"
        label: "Azure Pipelines"
      - id: "f"
        label: "Bitbucket Pipelines"
      - id: "g"
        label: "Argo CD"
      - id: "h"
        label: "Buildkite"
      - id: "i"
        label: "Travis CI"
      - id: "j"
        label: "TeamCity"
      - id: "k"
        label: "Other"
  - id: q5
    prompt: "What do your pipelines automate? (Select all that apply)"
    type: multi_choice
    construct: pipelines_automate_select_all_that
    required: true
    options:
      - id: "a"
        label: "Building the application"
      - id: "b"
        label: "Unit tests"
      - id: "c"
        label: "Integration or end-to-end tests"
      - id: "d"
        label: "Linting and formatting"
      - id: "e"
        label: "Security scanning"
      - id: "f"
        label: "Deploying to staging"
      - id: "g"
        label: "Deploying to production"
      - id: "h"
        label: "Building container images"
      - id: "i"
        label: "Infrastructure as code"
      - id: "j"
        label: "Versioning and releases"
  - id: q6
    prompt: "How often does your team deploy to production?"
    type: single_choice
    construct: often_does_team_deploy_production
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Monthly or less often"
  - id: q7
    prompt: "Where do your pipelines deploy? (Select all that apply)"
    type: multi_choice
    construct: where_pipelines_deploy_select_all
    required: true
    options:
      - id: "a"
        label: "Cloud virtual machines"
      - id: "b"
        label: "Kubernetes clusters"
      - id: "c"
        label: "Serverless / functions"
      - id: "d"
        label: "Platform-as-a-service (Heroku, Vercel, etc.)"
      - id: "e"
        label: "On-premises servers"
      - id: "f"
        label: "Mobile app stores"
      - id: "g"
        label: "Container registries"
      - id: "h"
        label: "We don't deploy through pipelines"
  - id: q8
    prompt: "How are your pipelines triggered? (Select all that apply)"
    type: multi_choice
    construct: pipelines_triggered_select_all_that
    required: true
    options:
      - id: "a"
        label: "On every push"
      - id: "b"
        label: "On pull / merge requests"
      - id: "c"
        label: "On a schedule"
      - id: "d"
        label: "Manually"
      - id: "e"
        label: "On tags or releases"
  - id: q9
    prompt: "Which best describes your delivery automation?"
    type: single_choice
    construct: best_describes_delivery_automation
    required: true
    options:
      - id: "a"
        label: "Continuous integration only (no automated deploy)"
      - id: "b"
        label: "Automated deploy to staging, manual to production"
      - id: "c"
        label: "Fully automated deploy to production"
      - id: "d"
        label: "We don't automate deployment"
  - id: q10
    prompt: "Which deployment strategy do you primarily use?"
    type: single_choice
    construct: deployment_strategy_primarily_use
    required: true
    options:
      - id: "a"
        label: "Rolling deployment"
      - id: "b"
        label: "Blue-green deployment"
      - id: "c"
        label: "Canary releases"
      - id: "d"
        label: "Recreate / stop-and-replace"
      - id: "e"
        label: "Manual deployment"
      - id: "f"
        label: "I'm not sure"
  - id: q11
    prompt: "How do you typically roll back a bad deployment?"
    type: single_choice
    construct: typically_roll_back_bad_deployment
    required: true
    options:
      - id: "a"
        label: "Automated rollback in the pipeline"
      - id: "b"
        label: "Redeploy a previous version manually"
      - id: "c"
        label: "Revert the commit and redeploy"
      - id: "d"
        label: "We rarely need to roll back"
      - id: "e"
        label: "We don't have a rollback process"
  - id: q12
    prompt: "About how many pipelines or workflows do you personally maintain? Please enter a number."
