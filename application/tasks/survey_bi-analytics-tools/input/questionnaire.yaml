schemaVersion: "1.0"
id: bi_analytics_tools_v1
title: "Business Intelligence & Analytics Tools Survey"
description: "Which business intelligence and analytics tools people use to explore data and build reports and dashboards, and how satisfied they are."
questions:
  - id: q0
    prompt: "Which best describes how you work with business intelligence or analytics?"
    type: single_choice
    construct: best_describes_work_business_intelligenc
    required: true
    options:
      - id: "a"
        label: "I build reports and dashboards for others (analyst / BI developer)"
      - id: "b"
        label: "I mainly consume dashboards and reports others build"
      - id: "c"
        label: "Both build and consume roughly equally"
      - id: "d"
        label: "I manage a data or analytics team"
      - id: "e"
        label: "I occasionally look at reports but it's not central to my role"
      - id: "f"
        label: "I don't use BI or analytics tools"
  - id: q1
    prompt: "How many years have you worked with BI or analytics tools?"
    type: free_text
    construct: many_years_have_worked_bi
    required: true
  - id: q2
    prompt: "Which BI or analytics tools do you currently use? (Select all that apply)"
    type: multi_choice
    construct: bi_analytics_tools_currently_use
    required: true
    options:
      - id: "a"
        label: "Microsoft Power BI"
      - id: "b"
        label: "Tableau"
      - id: "c"
        label: "Looker"
      - id: "d"
        label: "Looker Studio (Google Data Studio)"
      - id: "e"
        label: "Qlik Sense / QlikView"
      - id: "f"
        label: "Metabase"
      - id: "g"
        label: "Sisense"
      - id: "h"
        label: "Domo"
      - id: "i"
        label: "ThoughtSpot"
      - id: "j"
        label: "Amazon QuickSight"
      - id: "k"
        label: "Microsoft Excel"
      - id: "l"
        label: "Google Sheets"
      - id: "m"
        label: "Other"
  - id: q3
    prompt: "Which tool do you use most often for analytics and reporting?"
    type: single_choice
    construct: tool_use_most_often_analytics
    required: true
    options:
      - id: "a"
        label: "Power BI"
      - id: "b"
        label: "Tableau"
      - id: "c"
        label: "Looker / Looker Studio"
      - id: "d"
        label: "Qlik"
      - id: "e"
        label: "Metabase"
      - id: "f"
        label: "Excel"
      - id: "g"
        label: "Google Sheets"
      - id: "h"
        label: "Other"
  - id: q4
    prompt: "How often do you use BI or analytics tools?"
