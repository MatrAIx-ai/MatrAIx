    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "About once a week"
      - id: "e"
        label: "A few times a month or less"
  - id: q5
