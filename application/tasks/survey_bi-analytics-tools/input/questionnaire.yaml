        label: "A cloud data warehouse (Snowflake, BigQuery, Redshift)"
      - id: "b"
        label: "A traditional database (SQL Server, Postgres, MySQL)"
      - id: "c"
        label: "Spreadsheets / CSV files"
      - id: "d"
        label: "SaaS tools via connectors (Salesforce, Google Analytics, etc.)"
      - id: "e"
        label: "A data lake"
      - id: "f"
        label: "APIs"
      - id: "g"
        label: "I'm not sure where the data comes from"
