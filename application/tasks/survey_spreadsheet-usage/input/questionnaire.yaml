        label: "Personal budgeting or finances"
      - id: "b"
        label: "Work data analysis or reporting"
      - id: "c"
        label: "Tracking lists or inventory"
      - id: "d"
        label: "Project or task planning"
      - id: "e"
        label: "Schedules or calendars"
      - id: "f"
        label: "Simple databases / record keeping"
      - id: "g"
        label: "Charts and visualizations"
      - id: "h"
        label: "School or coursework"
      - id: "i"
        label: "Calculations and modeling"
