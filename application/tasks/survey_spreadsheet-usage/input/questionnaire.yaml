schemaVersion: "1.0"
id: spreadsheet_usage_v1
title: "Spreadsheet Usage & Skills Survey"
description: "Which spreadsheet tools people use, what they use them for, and how confident and skilled they are with formulas, pivots, and automation."
questions:
  - id: q0
    prompt: "Do you use spreadsheet software?"
    type: single_choice
    construct: use_spreadsheet_software
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "Which spreadsheet tool do you use most often?"
    type: single_choice
    construct: spreadsheet_tool_use_most_often
    required: true
    options:
      - id: "a"
        label: "Microsoft Excel"
      - id: "b"
        label: "Google Sheets"
      - id: "c"
        label: "Apple Numbers"
      - id: "d"
        label: "LibreOffice Calc"
      - id: "e"
        label: "Airtable"
      - id: "f"
        label: "Another tool"
      - id: "g"
        label: "I don't use spreadsheets"
  - id: q2
    prompt: "Which spreadsheet tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: spreadsheet_tools_have_used_past
    required: true
    options:
      - id: "a"
        label: "Microsoft Excel (desktop)"
      - id: "b"
        label: "Excel for the web"
      - id: "c"
        label: "Google Sheets"
      - id: "d"
        label: "Apple Numbers"
      - id: "e"
        label: "LibreOffice Calc"
      - id: "f"
        label: "Airtable"
      - id: "g"
        label: "Notion databases"
      - id: "h"
        label: "Smartsheet"
      - id: "i"
        label: "None of these"
  - id: q3
    prompt: "How many years have you been using spreadsheets?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q4
    prompt: "How many hours per week do you typically spend working in spreadsheets?"
    type: free_text
    construct: many_hours_per_week_typically
    required: true
  - id: q5
    prompt: "What do you mainly use spreadsheets for? (Select all that apply)"
