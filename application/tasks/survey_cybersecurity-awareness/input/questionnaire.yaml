      - id: "c"
        label: "An ad blocker"
      - id: "d"
        label: "A firewall"
      - id: "e"
        label: "Device encryption"
      - id: "f"
        label: "A privacy-focused browser"
      - id: "g"
        label: "Identity theft / credit monitoring"
      - id: "h"
        label: "None of these"
  - id: q9
