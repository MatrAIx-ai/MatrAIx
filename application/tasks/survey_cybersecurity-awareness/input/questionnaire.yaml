schemaVersion: "1.0"
id: cybersecurity_awareness_v1
title: "Personal Cybersecurity Awareness & Habits Survey"
description: "Everyday cybersecurity awareness, protective habits, experiences, and attitudes among ordinary technology users."
questions:
  - id: q0
    prompt: "How would you rate your own cybersecurity knowledge?"
    type: single_choice
    construct: would_rate_own_cybersecurity_knowledge
    required: true
    options:
      - id: "a"
        label: "Expert / I work in security or IT"
      - id: "b"
        label: "Advanced"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "Basic"
      - id: "e"
        label: "Little to none"
  - id: q1
    prompt: "How concerned are you about your personal online security and privacy?"
    type: single_choice
    construct: concerned_personal_online_security_priva
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q2
    prompt: "How do you typically manage your passwords?"
    type: single_choice
    construct: typically_manage_passwords
    required: true
    options:
      - id: "a"
        label: "A dedicated password manager"
      - id: "b"
        label: "My browser's built-in password saving"
      - id: "c"
        label: "I memorize them"
      - id: "d"
        label: "I write them down (paper or a note file)"
      - id: "e"
        label: "I reuse a few passwords everywhere"
      - id: "f"
        label: "A mix of methods"
  - id: q3
    prompt: "Which password managers, if any, do you use? (Select all that apply)"
    type: multi_choice
    construct: password_managers_if_any_use
    required: true
    options:
      - id: "a"
        label: "1Password"
      - id: "b"
        label: "Bitwarden"
      - id: "c"
        label: "LastPass"
      - id: "d"
        label: "Dashlane"
      - id: "e"
        label: "Apple Passwords / iCloud Keychain"
      - id: "f"
        label: "Google Password Manager"
      - id: "g"
        label: "Microsoft Authenticator / Edge"
      - id: "h"
        label: "I don't use a password manager"
  - id: q4
    prompt: "How often do you reuse the same password across multiple accounts?"
    type: single_choice
    construct: often_reuse_same_password_across
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always / almost always"
  - id: q5
    prompt: "Where do you use two-factor authentication (2FA)? (Select all that apply)"
    type: multi_choice
    construct: where_use_two_factor_authentication
    required: true
    options:
      - id: "a"
        label: "Email accounts"
      - id: "b"
        label: "Banking / financial accounts"
      - id: "c"
        label: "Social media"
      - id: "d"
        label: "Work accounts"
      - id: "e"
        label: "Shopping accounts"
      - id: "f"
        label: "Everywhere it's offered"
      - id: "g"
        label: "I don't use 2FA"
  - id: q6
    prompt: "Which second-factor methods do you use? (Select all that apply)"
    type: multi_choice
    construct: second_factor_methods_use_select
    required: true
    options:
      - id: "a"
        label: "Text message (SMS) codes"
      - id: "b"
        label: "Authenticator app (Google Authenticator, Authy, etc.)"
      - id: "c"
        label: "Hardware security key (YubiKey, etc.)"
      - id: "d"
        label: "Push notifications"
      - id: "e"
        label: "Biometrics (fingerprint / face)"
      - id: "f"
        label: "Passkeys"
      - id: "g"
        label: "I don't use any second factor"
  - id: q7
    prompt: "How quickly do you install software and security updates on your devices?"
    type: single_choice
    construct: quickly_install_software_security_update
    required: true
    options:
      - id: "a"
        label: "Automatically / as soon as they're available"
      - id: "b"
        label: "Within a few days"
      - id: "c"
        label: "Within a couple of weeks"
      - id: "d"
        label: "I often delay them a long time"
      - id: "e"
        label: "I rarely or never update"
  - id: q8
    prompt: "Which security tools or protections do you use? (Select all that apply)"
    type: multi_choice
