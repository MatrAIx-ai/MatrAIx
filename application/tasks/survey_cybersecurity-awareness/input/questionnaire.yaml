        label: "Cloud backup (iCloud, Google, OneDrive, etc.)"
      - id: "b"
        label: "An external drive"
      - id: "c"
        label: "A dedicated backup service (Backblaze, etc.)"
      - id: "d"
        label: "A network-attached storage (NAS) device"
      - id: "e"
        label: "I don't back up my data"
  - id: q10
