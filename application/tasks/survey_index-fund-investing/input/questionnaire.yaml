schemaVersion: "1.0"
id: index_fund_investing_v1
title: "Index Fund Investing Survey"
description: "How investors use low-cost index funds and ETFs to build their portfolios."
questions:
  - id: q0
    prompt: "Do you invest in index funds or index ETFs (funds that track a market index rather than being actively picked)?"
    type: single_choice
    construct: invest_index_funds_index_etfs
    required: true
    options:
      - id: "a"
        label: "Yes, they are the core of my investments"
      - id: "b"
        label: "Yes, as part of a broader mix"
      - id: "c"
        label: "No, but I am considering them"
      - id: "d"
        label: "No, I prefer other investments"
      - id: "e"
        label: "I'm not sure what an index fund is"
  - id: q1
    prompt: "How long have you been investing in index funds?"
    type: single_choice
    construct: long_have_been_investing_index
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "Which types of index funds do you hold? (Select all that apply)"
    type: multi_choice
    construct: types_index_funds_hold_select
    required: true
    options:
      - id: "a"
        label: "S&P 500 index fund"
      - id: "b"
        label: "Total U.S. stock market index fund"
      - id: "c"
        label: "International or global stock index fund"
      - id: "d"
        label: "Bond index fund"
      - id: "e"
        label: "Target-date fund (which uses index funds)"
      - id: "f"
        label: "Sector or thematic index fund"
      - id: "g"
        label: "I don't hold any index funds"
  - id: q3
    prompt: "Which fund families or products do you use? (Select all that apply)"
    type: multi_choice
    construct: fund_families_products_use_select
    required: true
    options:
      - id: "a"
        label: "Vanguard (e.g., VOO, VTI, VTSAX)"
      - id: "b"
        label: "Fidelity (e.g., FXAIX, FZROX)"
      - id: "c"
        label: "Charles Schwab (e.g., SWPPX, SCHB)"
      - id: "d"
        label: "iShares / BlackRock (e.g., IVV, ITOT)"
      - id: "e"
        label: "SPDR (e.g., SPY)"
      - id: "f"
        label: "A fund inside my workplace retirement plan"
      - id: "g"
        label: "Not sure of the specific fund"
  - id: q4
    prompt: "Through which account(s) do you hold index funds? (Select all that apply)"
    type: multi_choice
    construct: through_account_s_hold_index
    required: true
    options:
      - id: "a"
        label: "Workplace retirement plan (401(k), 403(b))"
      - id: "b"
        label: "IRA (Traditional or Roth)"
      - id: "c"
        label: "Taxable brokerage account"
      - id: "d"
        label: "A robo-advisor"
      - id: "e"
        label: "A 529 or education account"
      - id: "f"
        label: "Not applicable"
  - id: q5
    prompt: "About how much do you currently have invested in index funds?"
    type: single_choice
    construct: much_currently_have_invested_index
    required: true
    options:
      - id: "a"
        label: "Less than $5,000"
      - id: "b"
        label: "$5,000 to $24,999"
      - id: "c"
        label: "$25,000 to $99,999"
      - id: "d"
        label: "$100,000 to $499,999"
      - id: "e"
        label: "$500,000 or more"
      - id: "f"
        label: "Prefer not to say"
  - id: q6
    prompt: "About how much do you invest in index funds in a typical month? Please enter a dollar amount."
    type: free_text
    construct: much_invest_index_funds_typical
    required: true
  - id: q7
    prompt: "How do you usually add money to your index funds?"
    type: single_choice
    construct: usually_add_money_index_funds
    required: true
    options:
      - id: "a"
        label: "Automatic recurring contributions"
      - id: "b"
        label: "Manual contributions when I have money to invest"
      - id: "c"
        label: "Payroll deductions into a retirement plan"
      - id: "d"
        label: "Occasional lump sums"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "How aware are you of the expense ratios (annual fees) of the funds you own?"
    type: single_choice
    construct: aware_expense_ratios_annual_fees
    required: true
    options:
      - id: "a"
        label: "I know them precisely"
      - id: "b"
        label: "I have a rough idea"
      - id: "c"
        label: "I know they are low but not the exact numbers"
      - id: "d"
        label: "I don't pay attention to them"
      - id: "e"
        label: "I don't know what an expense ratio is"
  - id: q9
    prompt: "How often do you rebalance or adjust your index fund holdings?"
    type: single_choice
    construct: often_rebalance_adjust_index_fund
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Only when a fund is added or removed in my plan"
      - id: "c"
        label: "About once a year"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "More often than that"
  - id: q10
    prompt: "How did you first decide to invest in index funds?"
    type: single_choice
    construct: did_first_decide_invest_index
    required: true
    options:
      - id: "a"
        label: "Advice from a financial advisor"
      - id: "b"
        label: "Books, articles, or financial media"
      - id: "c"
        label: "Recommendation from friends or family"
      - id: "d"
        label: "Social media or online communities"
      - id: "e"
        label: "They were the default in my retirement plan"
      - id: "f"
        label: "Not applicable"
  - id: q11
    prompt: "How much do you agree: Index funds are a smart, low-cost way to invest."
    type: single_choice
    construct: much_agree_index_funds_smart
    required: true
