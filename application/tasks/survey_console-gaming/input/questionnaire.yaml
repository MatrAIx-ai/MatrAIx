    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, I don't play console games"
  - id: q1
    prompt: "How long have you been playing console games?"
    type: single_choice
    construct: long_have_been_playing_console
