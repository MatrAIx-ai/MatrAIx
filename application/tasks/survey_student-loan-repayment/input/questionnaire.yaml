schemaVersion: "1.0"
id: student_loan_repayment_v1
title: "Student Loan Repayment Survey"
description: "How borrowers manage, repay, and feel about their student loan debt."
questions:
  - id: q0
    prompt: "Do you currently have any student loan debt?"
    type: single_choice
    construct: currently_have_any_student_loan
    required: true
    options:
      - id: "a"
        label: "Yes, in my own name"
      - id: "b"
        label: "Yes, as a co-signer or parent borrower (e.g., Parent PLUS) for someone else"
      - id: "c"
        label: "Yes, both my own and loans I co-signed"
      - id: "d"
        label: "No, I paid off my student loans"
      - id: "e"
        label: "No, I never had student loans"
  - id: q1
    prompt: "Whose education did your student loans pay for? (Select all that apply)"
    type: multi_choice
    construct: whose_education_did_student_loans
    required: true
    options:
      - id: "a"
        label: "My own undergraduate education"
      - id: "b"
        label: "My own graduate or professional education"
      - id: "c"
        label: "My child's education"
      - id: "d"
        label: "A spouse's or partner's education"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "What types of student loans do you currently hold? (Select all that apply)"
    type: multi_choice
    construct: types_student_loans_currently_hold
    required: true
    options:
      - id: "a"
        label: "Federal Direct Subsidized loans"
      - id: "b"
        label: "Federal Direct Unsubsidized loans"
      - id: "c"
        label: "Federal PLUS loans (Parent or Grad PLUS)"
      - id: "d"
        label: "Private student loans"
      - id: "e"
        label: "Refinanced loans (consolidated with a private lender)"
      - id: "f"
        label: "Not sure of the type"
  - id: q3
    prompt: "What was the highest degree your student loans helped you pursue?"
    type: single_choice
    construct: was_highest_degree_student_loans
    required: true
    options:
      - id: "a"
        label: "Associate degree or certificate"
      - id: "b"
        label: "Bachelor's degree"
      - id: "c"
        label: "Master's degree"
      - id: "d"
        label: "Doctoral or professional degree (e.g., JD, MD, PhD)"
      - id: "e"
        label: "Did not complete a degree"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "Did you complete the degree or program your loans funded?"
    type: single_choice
    construct: did_complete_degree_program_loans
    required: true
    options:
      - id: "a"
        label: "Yes, completed"
      - id: "b"
        label: "No, did not complete"
      - id: "c"
        label: "Still enrolled"
      - id: "d"
        label: "Not applicable"
  - id: q5
    prompt: "About how much student loan debt do you currently owe in total?"
    type: single_choice
    construct: much_student_loan_debt_currently
    required: true
    options:
      - id: "a"
        label: "Less than $10,000"
      - id: "b"
        label: "$10,000 to $24,999"
      - id: "c"
        label: "$25,000 to $49,999"
      - id: "d"
        label: "$50,000 to $99,999"
      - id: "e"
        label: "$100,000 to $199,999"
      - id: "f"
        label: "$200,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q6
    prompt: "About how much did you originally borrow in total (principal)? Please enter a dollar amount."
    type: free_text
    construct: much_did_originally_borrow_total
    required: true
  - id: q7
    prompt: "About how much is your current required monthly student loan payment? Please enter a dollar amount."
    type: free_text
    construct: much_current_required_monthly_student
    required: true
  - id: q8
    prompt: "What is the approximate interest rate on your largest student loan?"
    type: single_choice
    construct: approximate_interest_rate_largest_studen
    required: true
    options:
      - id: "a"
        label: "Under 4%"
      - id: "b"
        label: "4% to 5.9%"
      - id: "c"
        label: "6% to 7.9%"
      - id: "d"
        label: "8% to 9.9%"
      - id: "e"
        label: "10% or higher"
      - id: "f"
        label: "Don't know"
  - id: q9
    prompt: "Who is your primary loan servicer or lender?"
    type: single_choice
    construct: who_primary_loan_servicer_lender
    required: true
    options:
      - id: "a"
        label: "MOHELA"
      - id: "b"
        label: "Nelnet"
      - id: "c"
        label: "Aidvantage"
      - id: "d"
        label: "EdFinancial"
      - id: "e"
        label: "A private lender (e.g., SoFi, Sallie Mae, Earnest)"
      - id: "f"
        label: "Don't know"
      - id: "g"
        label: "Not applicable"
  - id: q10
    prompt: "Which repayment plan are you currently on?"
    type: single_choice
    construct: repayment_plan_currently
    required: true
    options:
      - id: "a"
        label: "Standard 10-year plan"
      - id: "b"
        label: "Graduated or extended plan"
      - id: "c"
        label: "An income-driven repayment plan (e.g., IDR, SAVE, IBR, PAYE)"
      - id: "d"
        label: "Private lender's repayment schedule"
      - id: "e"
        label: "Not currently in repayment"
      - id: "f"
        label: "Don't know"
  - id: q11
    prompt: "How long have you been repaying your student loans?"
    type: single_choice
    construct: long_have_been_repaying_student
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 to 15 years"
      - id: "e"
        label: "More than 15 years"
      - id: "f"
        label: "Not yet in repayment"
  - id: q12
    prompt: "What is the current status of your student loans?"
    type: single_choice
    construct: current_status_student_loans
    required: true
    options:
      - id: "a"
        label: "In active repayment"
      - id: "b"
        label: "In deferment"
      - id: "c"
        label: "In forbearance"
      - id: "d"
        label: "In default or seriously past due"
      - id: "e"
        label: "In an in-school or grace period"
      - id: "f"
        label: "Paid off"
  - id: q13
    prompt: "How do you typically make your student loan payments?"
    type: single_choice
    construct: typically_make_student_loan_payments
    required: true
    options:
      - id: "a"
        label: "Automatic payment (autopay) with the servicer"
      - id: "b"
        label: "Manual online payment each month"
      - id: "c"
        label: "By phone or mail"
      - id: "d"
        label: "Someone else pays for me"
      - id: "e"
        label: "Not currently making payments"
  - id: q14
    prompt: "In the past 2 years, how often have you made a late or missed student loan payment?"
    type: single_choice
    construct: past_2_years_often_have
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Not applicable"
  - id: q15
    prompt: "Do you regularly make extra payments beyond the minimum to pay down your loans faster?"
    type: single_choice
    construct: regularly_make_extra_payments_beyond
    required: true
    options:
      - id: "a"
        label: "Yes, most months"
      - id: "b"
        label: "Occasionally"
      - id: "c"
        label: "No, only the minimum"
      - id: "d"
        label: "Not currently making payments"
  - id: q16
    prompt: "Which loan forgiveness or assistance programs have you pursued or benefited from? (Select all that apply)"
    type: multi_choice
    construct: loan_forgiveness_assistance_programs_hav
    required: true
    options:
      - id: "a"
        label: "Public Service Loan Forgiveness (PSLF)"
      - id: "b"
        label: "Income-driven repayment forgiveness"
      - id: "c"
        label: "Teacher Loan Forgiveness"
      - id: "d"
        label: "Employer student loan repayment benefit"
      - id: "e"
        label: "A state or profession-specific forgiveness program"
      - id: "f"
        label: "None of these"
  - id: q17
    prompt: "Have you refinanced or seriously considered refinancing your student loans?"
    type: single_choice
    construct: have_refinanced_seriously_considered_ref
    required: true
    options:
      - id: "a"
        label: "Yes, I have refinanced"
      - id: "b"
        label: "No, but I am seriously considering it"
      - id: "c"
        label: "No, and I am not considering it"
      - id: "d"
        label: "I looked into it but decided against it"
  - id: q18
    prompt: "For which reasons, if any, have you used deferment or forbearance? (Select all that apply)"
    type: multi_choice
    construct: reasons_if_any_have_used
    required: true
    options:
      - id: "a"
        label: "Financial hardship or job loss"
      - id: "b"
        label: "Returning to school"
      - id: "c"
        label: "Medical or family situation"
      - id: "d"
        label: "The federal payment pause"
      - id: "e"
        label: "I have never used deferment or forbearance"
  - id: q19
    prompt: "How much do you agree: My student loan debt is a significant burden on my life."
    type: single_choice
    construct: much_agree_my_student_loan
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree: I clearly understand the terms and payoff timeline of my loans."
