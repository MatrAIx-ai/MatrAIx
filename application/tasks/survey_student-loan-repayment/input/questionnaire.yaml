      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q25
    prompt: "How much do you agree: My student loans have delayed important life goals."
    type: single_choice
