schemaVersion: "1.0"
id: voice_assistant_usage_v1
title: "Voice Assistant Usage Survey"
description: "How people use voice assistants such as Alexa, Google Assistant, and Siri — which assistants and devices they use, what tasks they perform, and their attitudes toward accuracy, privacy, and trust."
questions:
  - id: q0
    prompt: "Do you use a voice assistant (such as Siri, Alexa, Google Assistant) at least occasionally?"
    type: single_choice
    construct: use_voice_assistant_such_as
    required: true
    options:
      - id: "a"
        label: "Yes, I use one every day"
      - id: "b"
        label: "Yes, I use one occasionally"
      - id: "c"
        label: "I have access but rarely use it"
      - id: "d"
        label: "No, I don't use voice assistants"
  - id: q1
    prompt: "How long have you been using voice assistants?"
    type: single_choice
    construct: long_have_been_using_voice
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "Which voice assistants do you use? (Select all that apply)"
    type: multi_choice
    construct: voice_assistants_use_select_all
    required: true
    options:
      - id: "a"
        label: "Amazon Alexa"
      - id: "b"
        label: "Google Assistant"
      - id: "c"
        label: "Apple Siri"
      - id: "d"
        label: "Samsung Bixby"
      - id: "e"
        label: "Microsoft Cortana"
      - id: "f"
        label: "A voice mode in an AI chatbot (e.g., ChatGPT voice, Gemini)"
      - id: "g"
        label: "In-car assistant (e.g., built-in, Android Auto, CarPlay)"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "Which voice assistant do you use MOST often?"
    type: single_choice
    construct: voice_assistant_use_most_often
    required: true
    options:
      - id: "a"
        label: "Amazon Alexa"
      - id: "b"
        label: "Google Assistant"
      - id: "c"
        label: "Apple Siri"
      - id: "d"
        label: "Samsung Bixby"
      - id: "e"
        label: "An AI chatbot voice mode"
      - id: "f"
        label: "In-car assistant"
      - id: "g"
        label: "I don't have a clear favorite"
  - id: q4
    prompt: "On which devices do you use voice assistants? (Select all that apply)"
    type: multi_choice
    construct: devices_use_voice_assistants_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Smart speaker (no screen)"
      - id: "c"
        label: "Smart display (with screen)"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Laptop or desktop computer"
      - id: "f"
        label: "Smartwatch or wearable"
      - id: "g"
        label: "Car / vehicle"
      - id: "h"
        label: "TV or streaming device"
      - id: "i"
        label: "Headphones or earbuds"
  - id: q5
    prompt: "How often do you use a voice assistant?"
    type: single_choice
    construct: often_use_voice_assistant
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "About once a day"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Less than weekly"
  - id: q6
    prompt: "What do you primarily use voice assistants for? (Select all that apply)"
    type: multi_choice
    construct: primarily_use_voice_assistants_select
    required: true
    options:
      - id: "a"
        label: "Setting timers, alarms, or reminders"
      - id: "b"
        label: "Playing music or podcasts"
      - id: "c"
        label: "Checking the weather"
      - id: "d"
        label: "Answering quick questions / general knowledge"
      - id: "e"
        label: "Controlling smart home devices"
      - id: "f"
        label: "Making calls or sending messages"
      - id: "g"
        label: "Navigation and directions"
      - id: "h"
        label: "Adding to shopping or to-do lists"
      - id: "i"
        label: "Setting up hands-free while cooking or driving"
      - id: "j"
        label: "Shopping or reordering products"
      - id: "k"
        label: "News and headlines"
  - id: q7
    prompt: "Which THREE uses of voice assistants are most valuable to you? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: three_uses_voice_assistants_most
    required: true
    options:
      - id: "a"
        label: "Timers, alarms, reminders"
      - id: "b"
        label: "Music and audio"
      - id: "c"
        label: "Quick questions and information"
      - id: "d"
        label: "Smart home control"
      - id: "e"
        label: "Hands-free calling/messaging"
      - id: "f"
        label: "Navigation"
      - id: "g"
        label: "Lists and reminders"
      - id: "h"
        label: "Shopping"
      - id: "i"
        label: "News"
  - id: q8
    prompt: "Where do you use a voice assistant most often?"
    type: single_choice
    construct: where_use_voice_assistant_most
    required: true
    options:
      - id: "a"
        label: "At home"
      - id: "b"
        label: "In the car"
      - id: "c"
        label: "At work"
      - id: "d"
        label: "While out and about"
      - id: "e"
        label: "About equally in several places"
  - id: q9
    prompt: "Roughly how many voice commands do you give in a typical day? Enter a whole number."
    type: free_text
    construct: roughly_many_voice_commands_give
    required: true
  - id: q10
    prompt: "Do you use the voice assistant hands-free (wake word) or by pressing a button?"
    type: single_choice
    construct: use_voice_assistant_hands_free
    required: true
    options:
