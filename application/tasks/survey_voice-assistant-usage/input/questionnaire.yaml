        label: "Almost always hands-free with a wake word"
      - id: "b"
        label: "Mostly hands-free, sometimes a button"
      - id: "c"
        label: "About equally"
      - id: "d"
        label: "Mostly by pressing a button"
      - id: "e"
        label: "Almost always by pressing a button"
  - id: q11
    prompt: "How much do you agree: Voice assistants save me time in daily tasks."
