schemaVersion: "1.0"
id: music_streaming_services_v1
title: "Music Streaming Services Survey"
description: "How people listen to music through streaming services, including which services and plans they use, listening habits, and what they value in a service."
questions:
  - id: q0
    prompt: "Do you listen to music through streaming services or apps?"
    type: single_choice
    construct: listen_music_through_streaming_services
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, I don't stream music"
  - id: q1
    prompt: "How long have you been using music streaming services?"
    type: single_choice
    construct: long_have_been_using_music
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 or more years"
  - id: q2
    prompt: "Which music streaming services have you used in the past 3 months? (Select all that apply)"
    type: multi_choice
    construct: music_streaming_services_have_used
    required: true
    options:
      - id: "a"
        label: "Spotify"
      - id: "b"
        label: "Apple Music"
      - id: "c"
        label: "YouTube Music"
      - id: "d"
        label: "Amazon Music"
      - id: "e"
        label: "Pandora"
      - id: "f"
        label: "SoundCloud"
      - id: "g"
        label: "Tidal"
      - id: "h"
        label: "Deezer"
      - id: "i"
        label: "iHeartRadio"
      - id: "j"
        label: "YouTube (free, for music)"
      - id: "k"
        label: "Other"
  - id: q3
    prompt: "Which music streaming service do you use most often?"
    type: single_choice
    construct: music_streaming_service_use_most
    required: true
    options:
      - id: "a"
        label: "Spotify"
      - id: "b"
        label: "Apple Music"
      - id: "c"
        label: "YouTube Music"
      - id: "d"
        label: "Amazon Music"
      - id: "e"
        label: "Pandora"
      - id: "f"
        label: "SoundCloud"
      - id: "g"
        label: "Tidal"
      - id: "h"
