      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65 or older"
  - id: q32
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
