        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q25
    prompt: "Has your view of home equity borrowing changed as interest rates have moved in recent years?"
    type: single_choice
    construct: has_view_home_equity_borrowing
    required: true
    options:
      - id: "a"
        label: "Much less favorable"
      - id: "b"
        label: "Somewhat less favorable"
      - id: "c"
        label: "No change"
      - id: "d"
        label: "Somewhat more favorable"
      - id: "e"
        label: "Much more favorable"
  - id: q26
    prompt: "How did rising home values in recent years affect your interest in tapping home equity?"
    type: single_choice
    construct: did_rising_home_values_recent
    required: true
    options:
      - id: "a"
        label: "Made me much more interested"
      - id: "b"
        label: "Made me somewhat more interested"
      - id: "c"
        label: "No effect"
      - id: "d"
        label: "Made me less interested"
      - id: "e"
        label: "Not sure"
  - id: q27
    prompt: "How satisfied are you with your home equity borrowing experience?"
    type: single_choice
    construct: satisfied_home_equity_borrowing_experien
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "Not applicable"
  - id: q28
    prompt: "How likely are you to open or draw on a HELOC in the next 12 months?"
    type: single_choice
    construct: likely_open_draw_heloc_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
