      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q30
    prompt: "What is the biggest benefit or drawback you associate with home equity borrowing? Describe briefly. (Optional)"
    type: free_text
    construct: biggest_benefit_drawback_associate_home
    required: false
  - id: q31
