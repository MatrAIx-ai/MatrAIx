schemaVersion: "1.0"
id: heloc_usage_v1
title: "Home Equity Borrowing (HELOC) Survey"
description: "How homeowners use, view, and decide about borrowing against their home equity through HELOCs, home equity loans, and cash-out refinances."
questions:
  - id: q0
    prompt: "Do you currently own a home?"
    type: single_choice
    construct: currently_own_home
    required: true
    options:
      - id: "a"
        label: "Yes, with a mortgage"
      - id: "b"
        label: "Yes, owned outright (no mortgage)"
      - id: "c"
        label: "No, I rent"
      - id: "d"
        label: "No, other living situation"
  - id: q1
    prompt: "Have you ever used a home equity line of credit (HELOC) or home equity loan?"
    type: single_choice
    construct: have_ever_used_home_equity
    required: true
    options:
      - id: "a"
        label: "Yes, I have one now"
      - id: "b"
        label: "Yes, I had one in the past"
      - id: "c"
        label: "No, but I am considering it"
      - id: "d"
        label: "No, and I am not considering it"
      - id: "e"
        label: "I am not familiar with these products"
  - id: q2
    prompt: "Which type of home equity borrowing have you used or are you considering?"
    type: single_choice
    construct: type_home_equity_borrowing_have
    required: true
    options:
      - id: "a"
        label: "HELOC (revolving line of credit)"
      - id: "b"
        label: "Home equity loan (lump-sum, fixed rate)"
      - id: "c"
        label: "Cash-out refinance"
      - id: "d"
        label: "More than one of these"
      - id: "e"
        label: "None / not sure"
  - id: q3
    prompt: "Approximately how much equity do you have in your home? Enter a dollar amount (enter 0 if none or unsure)."
    type: free_text
    construct: approximately_much_equity_have_home
    required: true
  - id: q4
    prompt: "What is (or would be) your approximate HELOC or home equity loan credit limit? Enter a dollar amount (enter 0 if not applicable)."
    type: free_text
    construct: would_be_approximate_heloc_home
    required: true
  - id: q5
    prompt: "For what purposes have you used (or would you use) home equity borrowing? (Select all that apply)"
    type: multi_choice
    construct: purposes_have_used_would_use
    required: true
    options:
      - id: "a"
        label: "Home renovations or repairs"
      - id: "b"
        label: "Debt consolidation"
      - id: "c"
        label: "A large purchase (car, appliances)"
      - id: "d"
        label: "Education expenses"
      - id: "e"
        label: "Medical bills"
      - id: "f"
        label: "Investing or a business"
      - id: "g"
        label: "Emergency expenses"
      - id: "h"
        label: "A down payment on another property"
      - id: "i"
        label: "Not applicable"
  - id: q6
    prompt: "What was the main reason you chose home equity borrowing over other options?"
    type: single_choice
    construct: was_main_reason_chose_home
    required: true
    options:
      - id: "a"
        label: "Lower interest rate than other loans"
      - id: "b"
        label: "Access to a large amount of money"
      - id: "c"
        label: "Flexibility to draw as needed"
      - id: "d"
        label: "Potential tax deductibility"
      - id: "e"
        label: "I did not qualify for other financing"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "Which lender did you use (or would you consider)? (Select all that apply)"
    type: multi_choice
    construct: lender_did_use_would_consider
    required: true
    options:
      - id: "a"
        label: "My primary bank"
      - id: "b"
        label: "A credit union"
      - id: "c"
        label: "An online lender (e.g., Figure, Rocket)"
      - id: "d"
        label: "A mortgage broker"
      - id: "e"
        label: "Another national bank"
      - id: "f"
        label: "Not sure yet"
      - id: "g"
        label: "Not applicable"
  - id: q8
    prompt: "How much did you (or do you expect to) borrow from your home equity? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_did_expect_borrow_from
    required: true
  - id: q9
    prompt: "How would you describe the interest rate on your HELOC or home equity loan?"
    type: single_choice
    construct: would_describe_interest_rate_heloc
    required: true
    options:
      - id: "a"
        label: "Variable rate"
      - id: "b"
        label: "Fixed rate"
      - id: "c"
        label: "A mix of both"
      - id: "d"
        label: "Not sure"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree with the following statement: Borrowing against home equity is a smart way to access low-cost funds."
    type: single_choice
    construct: much_agree_following_statement_borrowing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I worry about putting my home at risk by borrowing against it."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: I fully understand the terms and risks of a HELOC."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Rising interest rates make me hesitant to use a variable-rate HELOC."
    type: single_choice
    construct: much_agree_following_statement_rising
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Using home equity for renovations increases my home's value."
    type: single_choice
    construct: much_agree_following_statement_using
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "When choosing a home equity product, how important is: The interest rate?"
    type: single_choice
    construct: when_choosing_home_equity_product
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "When choosing a home equity product, how important is: Closing costs and fees?"
    type: single_choice
    construct: when_choosing_home_equity_product
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "When choosing a home equity product, how important is: Fixed vs. variable rate options?"
    type: single_choice
    construct: when_choosing_home_equity_product
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "When choosing a home equity product, how important is: The lender's reputation and service?"
    type: single_choice
    construct: when_choosing_home_equity_product
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "When choosing a home equity product, how important is: Speed of approval and funding?"
    type: single_choice
    construct: when_choosing_home_equity_product
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "Select the top 3 concerns you have about borrowing against home equity. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_concerns_have
    required: true
    options:
      - id: "a"
        label: "Risk of losing my home"
      - id: "b"
        label: "Rising or variable interest rates"
      - id: "c"
        label: "Adding to my overall debt"
      - id: "d"
        label: "Fees and closing costs"
      - id: "e"
        label: "Reducing the equity I've built"
      - id: "f"
        label: "Falling home values"
      - id: "g"
        label: "Difficulty qualifying"
      - id: "h"
        label: "Temptation to overspend"
  - id: q21
    prompt: "How did you (or would you) shop for a home equity product?"
    type: single_choice
    construct: did_would_shop_home_equity
    required: true
    options:
      - id: "a"
        label: "Only checked my current bank"
      - id: "b"
        label: "Compared a few lenders"
      - id: "c"
        label: "Shopped extensively and compared many offers"
      - id: "d"
        label: "Used an online comparison tool"
      - id: "e"
        label: "Have not shopped yet"
      - id: "f"
        label: "Not applicable"
  - id: q22
    prompt: "How comfortable are you with the amount of debt a HELOC would add to your finances?"
    type: single_choice
    construct: comfortable_amount_debt_heloc_would
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q23
    prompt: "During the draw period, how much of your available credit have you used?"
    type: single_choice
    construct: during_draw_period_much_available
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Less than 25%"
      - id: "c"
        label: "25–49%"
      - id: "d"
        label: "50–74%"
      - id: "e"
        label: "75% or more"
      - id: "f"
        label: "Not applicable"
  - id: q24
    prompt: "How confident are you in your ability to repay what you borrow against your home?"
    type: single_choice
    construct: confident_ability_repay_borrow_against
    required: true
    options:
