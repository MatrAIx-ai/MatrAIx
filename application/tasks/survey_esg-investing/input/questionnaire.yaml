      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Separated"
      - id: "f"
        label: "Single, never married"
  - id: q37
    prompt: "Which region of the United States do you live in?"
    type: single_choice
    construct: region_united_states_live
    required: true
