schemaVersion: "1.0"
id: home_insurance_v1
title: "Home and Renters Insurance Survey"
description: "How homeowners and renters obtain, understand, and evaluate their property insurance, and what drives their coverage and provider decisions."
questions:
  - id: q0
    prompt: "Which best describes your current housing situation?"
    type: single_choice
    construct: best_describes_current_housing_situation
    required: true
    options:
      - id: "a"
        label: "I own my home"
      - id: "b"
        label: "I rent my home"
      - id: "c"
        label: "I live with family or others and do not pay for insurance"
      - id: "d"
        label: "Other arrangement"
  - id: q1
    prompt: "Do you currently have home or renters insurance?"
    type: single_choice
    construct: currently_have_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, homeowners insurance"
      - id: "b"
        label: "Yes, renters insurance"
      - id: "c"
        label: "Yes, condo/co-op (HO-6) insurance"
      - id: "d"
        label: "No, but I am required to have it"
      - id: "e"
        label: "No, and I am not required to have it"
  - id: q2
    prompt: "Who is your current home or renters insurance provider?"
    type: single_choice
    construct: who_current_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "State Farm"
      - id: "b"
        label: "Allstate"
      - id: "c"
        label: "GEICO"
      - id: "d"
        label: "Progressive"
      - id: "e"
        label: "USAA"
      - id: "f"
        label: "Liberty Mutual"
      - id: "g"
        label: "Farmers"
      - id: "h"
        label: "Lemonade"
      - id: "i"
        label: "Another company"
      - id: "j"
        label: "I do not have this insurance"
  - id: q3
    prompt: "About how much do you pay for home or renters insurance per month, in U.S. dollars? Please enter a whole number."
    type: free_text
    construct: much_pay_home_renters_insurance
    required: true
  - id: q4
    prompt: "How long have you had your current home or renters insurance policy?"
    type: single_choice
    construct: long_have_had_current_home
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I do not have this insurance"
  - id: q5
    prompt: "How did you obtain your current policy?"
    type: single_choice
    construct: did_obtain_current_policy
    required: true
    options:
      - id: "a"
        label: "Directly from the insurance company (online or phone)"
      - id: "b"
        label: "Through a local or captive agent"
      - id: "c"
        label: "Through an independent broker"
      - id: "d"
        label: "Bundled with my auto insurance"
      - id: "e"
        label: "Required and arranged through my landlord or lender"
      - id: "f"
        label: "Not sure"
  - id: q6
    prompt: "What coverage does your policy include? (Select all that apply)"
    type: multi_choice
    construct: coverage_does_policy_include_select
    required: true
    options:
      - id: "a"
        label: "Dwelling / structure coverage"
      - id: "b"
        label: "Personal property / belongings"
      - id: "c"
        label: "Liability coverage"
      - id: "d"
        label: "Loss of use / additional living expenses"
      - id: "e"
        label: "Flood coverage"
      - id: "f"
        label: "Earthquake coverage"
      - id: "g"
        label: "Scheduled valuables (jewelry, electronics, etc.)"
      - id: "h"
        label: "Not sure what is covered"
  - id: q7
    prompt: "What deductible do you carry on your policy?"
    type: single_choice
    construct: deductible_carry_policy
    required: true
    options:
      - id: "a"
        label: "$500 or less"
      - id: "b"
        label: "$1,000"
      - id: "c"
        label: "$2,500"
      - id: "d"
        label: "$5,000 or more"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "Do you have separate flood insurance?"
    type: single_choice
    construct: have_separate_flood_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, through the National Flood Insurance Program (NFIP)"
      - id: "b"
        label: "Yes, through a private insurer"
      - id: "c"
        label: "No, but I live in a flood-prone area"
      - id: "d"
        label: "No, and I do not think I need it"
      - id: "e"
        label: "Not sure"
  - id: q9
    prompt: "How confident are you that your current coverage limits would fully replace your home and belongings after a total loss?"
    type: single_choice
    construct: confident_that_current_coverage_limits
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q10
    prompt: "When choosing home or renters insurance, how important is each factor? — Monthly premium / price"
    type: single_choice
    construct: when_choosing_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q11
    prompt: "When choosing home or renters insurance, how important is each factor? — Coverage limits and completeness"
    type: single_choice
    construct: when_choosing_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "When choosing home or renters insurance, how important is each factor? — Company reputation and financial strength"
    type: single_choice
    construct: when_choosing_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "When choosing home or renters insurance, how important is each factor? — Claims handling reputation"
    type: single_choice
    construct: when_choosing_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "When choosing home or renters insurance, how important is each factor? — Discounts for bundling policies"
    type: single_choice
    construct: when_choosing_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q15
    prompt: "Which of these do you worry about most for your home? (Select all that apply)"
    type: multi_choice
    construct: these_worry_most_home_select
    required: true
    options:
      - id: "a"
        label: "Fire"
      - id: "b"
        label: "Theft or burglary"
      - id: "c"
        label: "Water damage or burst pipes"
      - id: "d"
        label: "Wind, hail, or storm damage"
      - id: "e"
        label: "Flooding"
      - id: "f"
        label: "Earthquake"
      - id: "g"
        label: "Wildfire"
      - id: "h"
        label: "Liability if someone is injured"
  - id: q16
    prompt: "Have you made any home upgrades to reduce risk or lower premiums? (Select all that apply)"
    type: multi_choice
    construct: have_made_any_home_upgrades
    required: true
    options:
      - id: "a"
        label: "Security or alarm system"
      - id: "b"
        label: "Smoke or fire detectors"
      - id: "c"
        label: "Water leak sensors"
      - id: "d"
        label: "Storm shutters or impact windows"
      - id: "e"
        label: "Roof replacement or reinforcement"
      - id: "f"
        label: "Smart home monitoring devices"
      - id: "g"
        label: "None of these"
  - id: q17
    prompt: "Have you filed a home or renters insurance claim in the past 5 years?"
    type: single_choice
    construct: have_filed_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, one claim"
      - id: "b"
        label: "Yes, more than one claim"
      - id: "c"
        label: "No claims"
      - id: "d"
        label: "Prefer not to say"
  - id: q18
    prompt: "How much do you agree with the following statement: I understand what my home or renters policy actually covers."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement: My home or renters insurance is worth what I pay for it."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree with the following statement: I worry my premiums will keep rising each year."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q21
    prompt: "How much do you agree with the following statement: I have taken a complete inventory of my belongings for insurance purposes."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q22
    prompt: "Has your home or renters premium changed at your most recent renewal?"
    type: single_choice
    construct: has_home_renters_premium_changed
    required: true
    options:
      - id: "a"
        label: "It increased significantly"
      - id: "b"
        label: "It increased slightly"
      - id: "c"
        label: "It stayed about the same"
      - id: "d"
        label: "It decreased"
      - id: "e"
        label: "Not sure"
  - id: q23
    prompt: "When did you most recently compare home or renters insurance quotes?"
    type: single_choice
    construct: when_did_most_recently_compare
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "More than 2 years ago"
      - id: "e"
        label: "I have never compared quotes"
  - id: q24
    prompt: "Have you bundled your home or renters insurance with another policy?"
    type: single_choice
    construct: have_bundled_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, with auto insurance"
      - id: "b"
        label: "Yes, with other policies"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, I keep policies separate"
  - id: q25
    prompt: "Have you switched home or renters insurance providers in the past 3 years?"
    type: single_choice
    construct: have_switched_home_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, once"
      - id: "b"
        label: "Yes, more than once"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, and I have not considered it"
  - id: q26
    prompt: "What would most likely make you switch home or renters insurers? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: would_most_likely_make_switch
    required: true
    options:
      - id: "a"
        label: "A lower price elsewhere"
      - id: "b"
        label: "A premium increase at renewal"
      - id: "c"
        label: "A bad claims experience"
      - id: "d"
        label: "Poor customer service"
      - id: "e"
        label: "Better coverage options"
      - id: "f"
        label: "A recommendation from someone I trust"
      - id: "g"
        label: "A non-renewal or dropped coverage"
      - id: "h"
        label: "Better bundling discounts"
      - id: "i"
        label: "A move to a new home"
  - id: q27
    prompt: "Have you ever had a policy non-renewed or been dropped by an insurer?"
