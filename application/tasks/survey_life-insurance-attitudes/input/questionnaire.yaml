schemaVersion: "1.0"
id: life_insurance_attitudes_v1
title: "Life Insurance Attitudes Survey"
description: "How people think about, own, and make decisions about life insurance, including coverage adequacy, barriers, and trust in advice sources."
questions:
  - id: q0
    prompt: "Do you currently have any life insurance coverage?"
    type: single_choice
    construct: currently_have_any_life_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, through my employer only"
      - id: "b"
        label: "Yes, an individual policy I bought myself"
      - id: "c"
        label: "Yes, both employer and individual coverage"
      - id: "d"
        label: "No, but I have had it in the past"
      - id: "e"
        label: "No, I have never had life insurance"
  - id: q1
    prompt: "What type(s) of life insurance do you currently have? (Select all that apply)"
    type: multi_choice
    construct: type_s_life_insurance_currently
    required: true
    options:
      - id: "a"
        label: "Term life insurance"
      - id: "b"
        label: "Whole life insurance"
      - id: "c"
        label: "Universal or variable life insurance"
      - id: "d"
        label: "Group life through an employer"
      - id: "e"
        label: "Final expense / burial insurance"
      - id: "f"
        label: "I don't know what type I have"
      - id: "g"
        label: "I do not have life insurance"
  - id: q2
    prompt: "How long have you had your current life insurance coverage?"
    type: single_choice
    construct: long_have_had_current_life
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 9 years"
      - id: "d"
        label: "10 to 20 years"
      - id: "e"
        label: "More than 20 years"
      - id: "f"
        label: "I do not have life insurance"
  - id: q3
    prompt: "About how much total life insurance coverage (death benefit) do you have, in U.S. dollars? Please enter a whole number (enter 0 if none)."
    type: free_text
    construct: much_total_life_insurance_coverage
    required: true
  - id: q4
    prompt: "About how much do you pay for life insurance per month, in U.S. dollars? Please enter a whole number (enter 0 if none or employer-paid)."
    type: free_text
    construct: much_pay_life_insurance_per
    required: true
  - id: q5
    prompt: "Who is your primary life insurance provider, if any?"
    type: single_choice
    construct: who_primary_life_insurance_provider
    required: true
    options:
      - id: "a"
        label: "Northwestern Mutual"
      - id: "b"
        label: "New York Life"
      - id: "c"
        label: "MassMutual"
      - id: "d"
        label: "State Farm"
      - id: "e"
        label: "Prudential"
      - id: "f"
        label: "MetLife"
      - id: "g"
        label: "An employer's group plan"
      - id: "h"
        label: "Another company"
      - id: "i"
        label: "I do not have life insurance"
  - id: q6
    prompt: "How did you obtain your current life insurance? (Select all that apply)"
    type: multi_choice
    construct: did_obtain_current_life_insurance
    required: true
    options:
      - id: "a"
        label: "Automatically through my employer"
      - id: "b"
        label: "Through a financial advisor or agent"
      - id: "c"
        label: "Directly online from an insurer"
      - id: "d"
        label: "Through an online marketplace or broker"
      - id: "e"
        label: "Through a bank or credit union"
      - id: "f"
        label: "I do not have life insurance"
  - id: q7
    prompt: "Who depends on your income financially? (Select all that apply)"
    type: multi_choice
    construct: who_depends_income_financially_select
    required: true
    options:
      - id: "a"
        label: "A spouse or partner"
      - id: "b"
        label: "Children under 18"
      - id: "c"
        label: "Adult children"
      - id: "d"
        label: "Aging parents or relatives"
      - id: "e"
        label: "No one depends on my income"
      - id: "f"
        label: "Prefer not to say"
  - id: q8
    prompt: "What are the main reasons you have or would want life insurance? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: main_reasons_have_would_want
    required: true
    options:
      - id: "a"
        label: "Replace my income for my family"
      - id: "b"
        label: "Cover funeral and final expenses"
      - id: "c"
        label: "Pay off a mortgage or debts"
      - id: "d"
        label: "Fund my children's education"
      - id: "e"
        label: "Leave an inheritance"
      - id: "f"
        label: "Peace of mind"
      - id: "g"
        label: "Build cash value / savings"
      - id: "h"
        label: "Cover business obligations"
      - id: "i"
        label: "It was offered at work"
  - id: q9
    prompt: "How important is each of the following in your decision about life insurance? — Monthly premium / cost"
    type: single_choice
    construct: important_each_following_decision_life
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q10
    prompt: "How important is each of the following in your decision about life insurance? — Amount of coverage (death benefit)"
    type: single_choice
    construct: important_each_following_decision_life
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q11
    prompt: "How important is each of the following in your decision about life insurance? — Company financial strength and reputation"
    type: single_choice
    construct: important_each_following_decision_life
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "How important is each of the following in your decision about life insurance? — Whether it builds cash value"
    type: single_choice
    construct: important_each_following_decision_life
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "How important is each of the following in your decision about life insurance? — Ease of the application process"
    type: single_choice
    construct: important_each_following_decision_life
    required: true
    options:
      - id: "a"
