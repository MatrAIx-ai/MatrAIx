      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "How much do you agree with the following statement: I have enough life insurance to meet my family's needs."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
