  - id: q38
    prompt: "How would you describe your comfort with managing money through digital and online tools?"
    type: single_choice
    construct: would_describe_comfort_managing_money
    required: true
    options:
      - id: "a"
        label: "Very comfortable"
      - id: "b"
        label: "Somewhat comfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat uncomfortable"
      - id: "e"
        label: "Very uncomfortable"
  - id: q39
    prompt: "Do you own or rent your home?"
    type: single_choice
    construct: own_rent_home
    required: true
