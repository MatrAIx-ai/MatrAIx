schemaVersion: "1.0"
id: electronic_health_record_access_v1
title: "Electronic Health Record Access Survey"
description: "Consumer experience accessing, downloading, sharing, and controlling their own electronic health records."
questions:
  - id: q0
    prompt: "Do you know that you have a right to access your own electronic health records?"
    type: single_choice
    construct: know_that_have_right_access
    required: true
    options:
      - id: "a"
        label: "Yes, I knew this"
      - id: "b"
        label: "I was not sure"
      - id: "c"
        label: "No, I did not know"
  - id: q1
    prompt: "Have you ever viewed your electronic health records online?"
    type: single_choice
    construct: have_ever_viewed_electronic_health
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I know I can"
      - id: "d"
        label: "No, and I did not know I could"
  - id: q2
    prompt: "In the past 12 months, how often did you access your electronic health records?"
    type: single_choice
    construct: past_12_months_often_did
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 9 times"
      - id: "e"
        label: "10 or more times"
  - id: q3
    prompt: "How do you usually access your electronic health records? (Select all that apply)"
    type: multi_choice
    construct: usually_access_electronic_health_records
    required: true
    options:
      - id: "a"
        label: "A provider's patient portal"
      - id: "b"
        label: "A mobile health app"
      - id: "c"
        label: "Requesting a copy from the provider's office"
      - id: "d"
        label: "A health record aggregation app (e.g., Apple Health)"
      - id: "e"
        label: "My insurer's website"
      - id: "f"
        label: "I have not accessed them"
  - id: q4
    prompt: "Which parts of your electronic health record have you looked at? (Select all that apply)"
    type: multi_choice
    construct: parts_electronic_health_record_have
    required: true
    options:
      - id: "a"
        label: "Lab or test results"
      - id: "b"
        label: "Medication or prescription list"
      - id: "c"
        label: "Visit summaries or clinical notes"
      - id: "d"
        label: "Immunization or vaccination records"
      - id: "e"
        label: "Diagnoses or problem list"
      - id: "f"
        label: "Allergies"
      - id: "g"
        label: "Imaging reports (e.g., X-ray, MRI)"
      - id: "h"
        label: "Billing or claims information"
      - id: "i"
        label: "I have not looked at any part"
  - id: q5
    prompt: "Have you ever downloaded or saved a copy of your health records?"
    type: single_choice
    construct: have_ever_downloaded_saved_copy
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I would like to"
      - id: "c"
        label: "No, and I have not needed to"
      - id: "d"
        label: "Not sure how"
  - id: q6
    prompt: "Have you ever shared your electronic health records with another provider, caregiver, or app?"
    type: single_choice
    construct: have_ever_shared_electronic_health
    required: true
    options:
      - id: "a"
        label: "Yes, with another provider"
      - id: "b"
        label: "Yes, with a family member or caregiver"
      - id: "c"
        label: "Yes, with an app or service"
      - id: "d"
        label: "No, I have not shared them"
      - id: "e"
        label: "Not sure"
  - id: q7
    prompt: "About how many times have you requested or downloaded your records in the past 12 months? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_times_have_requested_downloaded
    required: true
  - id: q8
    prompt: "What have you used your health record access for? (Select all that apply)"
    type: multi_choice
    construct: have_used_health_record_access
    required: true
    options:
      - id: "a"
        label: "Keeping track of my own health"
      - id: "b"
        label: "Preparing for an appointment"
      - id: "c"
        label: "Getting a second opinion"
      - id: "d"
        label: "Switching to a new provider"
      - id: "e"
        label: "Sharing with a caregiver or family member"
      - id: "f"
        label: "Checking for errors"
      - id: "g"
        label: "Applying for insurance or benefits"
      - id: "h"
        label: "Travel or care away from home"
      - id: "i"
        label: "I have not used them for anything"
  - id: q9
    prompt: "Have you ever found an error or something that looked wrong in your electronic health records?"
    type: single_choice
    construct: have_ever_found_error_something
    required: true
    options:
      - id: "a"
        label: "Yes, and I got it corrected"
      - id: "b"
        label: "Yes, but I did not try to correct it"
      - id: "c"
        label: "Yes, and I tried but could not get it corrected"
      - id: "d"
        label: "No, I have not found an error"
      - id: "e"
        label: "I have not looked closely enough to know"
  - id: q10
    prompt: "How easy or difficult was it to get access to your electronic health records?"
    type: single_choice
    construct: easy_difficult_was_it_get
    required: true
    options:
      - id: "a"
        label: "Very difficult"
      - id: "b"
        label: "Somewhat difficult"
      - id: "c"
        label: "Neither easy nor difficult"
      - id: "d"
        label: "Somewhat easy"
      - id: "e"
        label: "Very easy"
      - id: "f"
        label: "I have not tried"
  - id: q11
    prompt: "What problems, if any, have you run into when trying to access your records? (Select all that apply)"
    type: multi_choice
    construct: problems_if_any_have_run
    required: true
    options:
      - id: "a"
        label: "Records were spread across multiple systems"
      - id: "b"
        label: "Login or account problems"
      - id: "c"
        label: "Missing or incomplete information"
      - id: "d"
        label: "Information was hard to understand"
      - id: "e"
        label: "Long wait to receive records"
      - id: "f"
        label: "A fee was charged"
      - id: "g"
        label: "Staff were unhelpful"
      - id: "h"
        label: "I have had no problems"
  - id: q12
    prompt: "How much do you agree or disagree: I feel in control of my own health information."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: My health records are easy to understand."
    type: single_choice
    construct: much_agree_disagree_my_health
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: It is important that all my records are available in one place."
    type: single_choice
    construct: much_agree_disagree_it_important
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: I worry about the privacy of my electronic health records."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: Being able to see my records improves my care."
    type: single_choice
    construct: much_agree_disagree_being_able
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How comfortable are you with each of the following — Your providers sharing your records with each other for your care"
    type: single_choice
    construct: comfortable_each_following_providers_sha
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q18
    prompt: "How comfortable are you with each of the following — Your records being stored electronically"
    type: single_choice
    construct: comfortable_each_following_records_being
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q19
    prompt: "How comfortable are you with each of the following — Sharing your records with a third-party health app"
    type: single_choice
    construct: comfortable_each_following_sharing_recor
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q20
    prompt: "How comfortable are you with each of the following — Your records being used, without your name, for medical research"
    type: single_choice
    construct: comfortable_each_following_records_being
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q21
    prompt: "How important is it to you to be able to access your electronic health records?"
    type: single_choice
    construct: important_it_be_able_access
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q22
    prompt: "How confident are you in your ability to access and manage your electronic health records?"
    type: single_choice
    construct: confident_ability_access_manage_electron
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q23
    prompt: "Would you be interested in an app that combines all your records from different providers into one place?"
    type: single_choice
    construct: would_be_interested_app_that
    required: true
    options:
      - id: "a"
        label: "Very interested"
      - id: "b"
        label: "Somewhat interested"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Not very interested"
      - id: "e"
        label: "Not at all interested"
      - id: "f"
        label: "I already use one"
  - id: q24
    prompt: "Which improvements to health record access would you value most? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: improvements_health_record_access_would
    required: true
    options:
      - id: "a"
        label: "One place to see all my records"
      - id: "b"
        label: "Easier-to-understand information"
      - id: "c"
        label: "Faster access"
      - id: "d"
        label: "Stronger privacy protections"
      - id: "e"
        label: "Easy way to fix errors"
      - id: "f"
        label: "Better mobile access"
      - id: "g"
        label: "Easy sharing with new providers"
      - id: "h"
        label: "Plain-language explanations of results"
      - id: "i"
        label: "No fees for copies"
      - id: "j"
        label: "Better caregiver access"
  - id: q25
    prompt: "Overall, how satisfied are you with your ability to access your electronic health records?"
    type: single_choice
    construct: overall_satisfied_ability_access_electro
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q26
    prompt: "What would make it easier for you to access or use your health records? (Optional short answer)"
    type: free_text
    construct: would_make_it_easier_access
    required: false
  - id: q27
    prompt: "What is your age? Please enter a number (years old)."
    type: free_text
    construct: age_please_enter_number_years
    required: true
  - id: q28
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary or another gender"
      - id: "d"
        label: "Prefer not to say"
  - id: q29
    prompt: "Are you of Hispanic, Latino, or Spanish origin?"
    type: single_choice
    construct: hispanic_latino_spanish_origin
    required: true
    options:
      - id: "a"
        label: "No"
      - id: "b"
        label: "Yes"
      - id: "c"
        label: "Prefer not to say"
  - id: q30
    prompt: "What is your race? (Select all that apply)"
    type: multi_choice
    construct: race_select_all_that_apply
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Asian"
      - id: "d"
        label: "American Indian or Alaska Native"
      - id: "e"
        label: "Native Hawaiian or other Pacific Islander"
      - id: "f"
        label: "Some other race"
      - id: "g"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "High school diploma or GED"
      - id: "c"
        label: "Some college, no degree"
      - id: "d"
        label: "Associate degree"
      - id: "e"
        label: "Bachelor's degree"
      - id: "f"
        label: "Graduate or professional degree"
  - id: q32
    prompt: "How comfortable are you using computers, apps, and the internet in general?"
    type: single_choice
    construct: comfortable_using_computers_apps_interne
    required: true
    options:
      - id: "a"
        label: "Not at all comfortable"
      - id: "b"
        label: "Slightly comfortable"
      - id: "c"
        label: "Moderately comfortable"
      - id: "d"
        label: "Very comfortable"
      - id: "e"
        label: "Extremely comfortable"
  - id: q33
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Student"
      - id: "e"
        label: "Homemaker or caregiver"
      - id: "f"
        label: "Retired"
      - id: "g"
        label: "Not currently employed"
  - id: q34
    prompt: "Do you currently have health insurance coverage?"
    type: single_choice
    construct: currently_have_health_insurance_coverage
    required: true
    options:
      - id: "a"
        label: "Yes, through an employer"
      - id: "b"
        label: "Yes, through a government program (Medicare, Medicaid, etc.)"
      - id: "c"
        label: "Yes, purchased on my own"
      - id: "d"
        label: "No, I am uninsured"
      - id: "e"
        label: "Prefer not to say"
  - id: q35
    prompt: "Including yourself, how many people live in your household? Please enter a number."
    type: free_text
    construct: including_yourself_many_people_live
    required: true
  - id: q36
    prompt: "In which region of the United States do you live?"
    type: single_choice
    construct: region_united_states_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
      - id: "d"
        label: "West"
      - id: "e"
        label: "Outside the United States"
  - id: q37
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q38
    prompt: "What is your approximate annual household income?"
    type: single_choice
    construct: approximate_annual_household_income
    required: true
    options:
      - id: "a"
        label: "Less than $25,000"
      - id: "b"
        label: "$25,000 to $49,999"
      - id: "c"
        label: "$50,000 to $74,999"
      - id: "d"
        label: "$75,000 to $99,999"
      - id: "e"
        label: "$100,000 to $149,999"
      - id: "f"
        label: "$150,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q39
    prompt: "Which devices do you most often use to access your electronic health records? (Select all that apply)"
    type: multi_choice
    construct: devices_most_often_use_access
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop or desktop computer"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Smartwatch"
      - id: "e"
        label: "I do not access them electronically"
