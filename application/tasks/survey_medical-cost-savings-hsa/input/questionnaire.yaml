schemaVersion: "1.0"
id: medical_cost_savings_hsa_v1
title: "Health Savings Account (HSA) Usage Survey"
description: "How consumers use Health Savings Accounts and otherwise save for medical costs."
questions:
  - id: q0
    prompt: "Are you currently enrolled in a high-deductible health plan (HDHP)?"
    type: single_choice
    construct: currently_enrolled_high_deductible_healt
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Not sure"
  - id: q1
    prompt: "Do you currently have a Health Savings Account (HSA)?"
    type: single_choice
    construct: currently_have_health_savings_account
    required: true
    options:
      - id: "a"
        label: "Yes, and I contribute to it"
      - id: "b"
        label: "Yes, but I no longer contribute"
      - id: "c"
        label: "No, but I have had one in the past"
      - id: "d"
        label: "No, and I have never had one"
  - id: q2
    prompt: "How long have you had an HSA?"
    type: single_choice
    construct: long_have_had_hsa
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I do not have an HSA"
  - id: q3
    prompt: "Where is your HSA held? (Select all that apply)"
    type: multi_choice
    construct: where_hsa_held_select_all
    required: true
    options:
      - id: "a"
        label: "Fidelity"
      - id: "b"
        label: "HealthEquity"
      - id: "c"
        label: "Optum Bank"
      - id: "d"
        label: "Lively"
      - id: "e"
        label: "HSA Bank"
      - id: "f"
        label: "My bank or credit union"
      - id: "g"
        label: "Through my employer's default provider"
      - id: "h"
        label: "Other"
      - id: "i"
        label: "I do not have an HSA"
  - id: q4
    prompt: "How did you first open your HSA?"
    type: single_choice
    construct: did_first_open_hsa
    required: true
    options:
      - id: "a"
        label: "Automatically through my employer when I enrolled in the health plan"
      - id: "b"
        label: "I chose an employer-sponsored HSA option"
      - id: "c"
        label: "I opened one on my own outside my employer"
      - id: "d"
        label: "A financial advisor helped me open it"
      - id: "e"
        label: "I do not have an HSA"
  - id: q5
    prompt: "Do you also have or use any of the following tax-advantaged health accounts? (Select all that apply)"
    type: multi_choice
    construct: also_have_use_any_following
    required: true
    options:
      - id: "a"
        label: "Flexible Spending Account (FSA)"
      - id: "b"
        label: "Dependent Care FSA"
      - id: "c"
        label: "Health Reimbursement Arrangement (HRA)"
      - id: "d"
        label: "Limited-purpose FSA"
      - id: "e"
        label: "None of these"
  - id: q6
    prompt: "About how much do you personally contribute to your HSA each year? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_personally_contribute_hsa_each
    required: true
  - id: q7
    prompt: "Does your employer contribute to your HSA?"
    type: single_choice
    construct: does_employer_contribute_hsa
    required: true
    options:
      - id: "a"
        label: "Yes, a fixed amount each year"
      - id: "b"
        label: "Yes, a match on my contributions"
      - id: "c"
        label: "Yes, but I am not sure how much"
      - id: "d"
        label: "No"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "Are you contributing the maximum allowed to your HSA this year?"
    type: single_choice
    construct: contributing_maximum_allowed_hsa_this
    required: true
    options:
      - id: "a"
        label: "Yes, the full IRS maximum"
      - id: "b"
        label: "Close to the maximum"
      - id: "c"
        label: "Somewhat below the maximum"
      - id: "d"
        label: "Well below the maximum"
      - id: "e"
        label: "I do not contribute"
      - id: "f"
        label: "Not sure"
  - id: q9
    prompt: "How do you primarily use the money in your HSA?"
    type: single_choice
    construct: primarily_use_money_hsa
    required: true
    options:
      - id: "a"
        label: "Spend it on current medical expenses as they come up"
      - id: "b"
        label: "A mix of spending and saving"
      - id: "c"
        label: "Save and invest it for future medical costs"
      - id: "d"
        label: "Save it as part of my retirement strategy"
      - id: "e"
        label: "I do not have an HSA"
  - id: q10
    prompt: "Do you invest any of your HSA balance (for example, in mutual funds or ETFs)?"
    type: single_choice
    construct: invest_any_hsa_balance_example
    required: true
    options:
      - id: "a"
        label: "Yes, most of my balance is invested"
      - id: "b"
        label: "Yes, a portion is invested"
      - id: "c"
        label: "No, I keep it all in cash"
      - id: "d"
        label: "Not sure"
      - id: "e"
        label: "I do not have an HSA"
  - id: q11
    prompt: "About how much is your current total HSA balance? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_current_total_hsa_balance
    required: true
  - id: q12
    prompt: "What do you use your HSA funds to pay for? (Select all that apply)"
    type: multi_choice
    construct: use_hsa_funds_pay_select
    required: true
    options:
      - id: "a"
        label: "Doctor visits and copays"
      - id: "b"
        label: "Prescription medications"
      - id: "c"
        label: "Dental care"
      - id: "d"
        label: "Vision care and glasses"
      - id: "e"
        label: "Deductibles and coinsurance"
      - id: "f"
        label: "Over-the-counter items"
      - id: "g"
        label: "Mental health or therapy visits"
      - id: "h"
        label: "I have not used my HSA funds"
  - id: q13
    prompt: "How do you typically pay for a qualified expense from your HSA? (Select all that apply)"
    type: multi_choice
    construct: typically_pay_qualified_expense_from
    required: true
    options:
      - id: "a"
        label: "HSA debit card at the point of care"
      - id: "b"
        label: "Reimburse myself later from the HSA"
      - id: "c"
        label: "Online bill pay from the HSA"
      - id: "d"
        label: "I pay out of pocket and save the receipts to reimburse later"
      - id: "e"
        label: "I have not used my HSA"
  - id: q14
    prompt: "How often do you check your HSA balance or activity?"
    type: single_choice
    construct: often_check_hsa_balance_activity
    required: true
    options:
      - id: "a"
        label: "At least weekly"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "About once a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q15
    prompt: "How much do you agree or disagree: I understand the tax advantages of an HSA."
    type: single_choice
    construct: much_agree_disagree_i_understand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: My HSA gives me peace of mind about future medical costs."
    type: single_choice
    construct: much_agree_disagree_my_hsa
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: I worry about affording a large unexpected medical bill."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
