      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree or disagree: The rules about what an HSA can pay for are confusing."
    type: single_choice
