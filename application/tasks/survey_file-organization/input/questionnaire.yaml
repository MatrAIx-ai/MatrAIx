schemaVersion: "1.0"
id: file_organization_v1
title: "File Organization Survey"
description: "How people organize, name, store, and find their digital files and folders."
questions:
  - id: q0
    prompt: "How would you describe the overall state of your digital file organization?"
    type: single_choice
    construct: would_describe_overall_state_digital
    required: true
    options:
      - id: "a"
        label: "Highly organized and consistent"
      - id: "b"
        label: "Mostly organized"
      - id: "c"
        label: "A mix — some areas neat, some messy"
      - id: "d"
        label: "Fairly disorganized"
      - id: "e"
        label: "Completely chaotic"
      - id: "f"
        label: "Not sure"
  - id: q1
    prompt: "When you need a file, how do you usually find it?"
    type: single_choice
    construct: when_need_file_usually_find
    required: true
    options:
      - id: "a"
        label: "Navigate through folders"
      - id: "b"
        label: "Search by file name"
      - id: "c"
        label: "Search by content or keywords"
      - id: "d"
        label: "Look in recent files"
      - id: "e"
        label: "It's on my desktop"
      - id: "f"
        label: "I often can't find it"
  - id: q2
    prompt: "How often do you clean up or reorganize your files?"
    type: single_choice
    construct: often_clean_up_reorganize_files
    required: true
    options:
      - id: "a"
        label: "Continuously as I go"
      - id: "b"
        label: "Weekly"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q3
    prompt: "Do you follow a consistent folder structure or naming convention?"
    type: single_choice
    construct: follow_consistent_folder_structure_namin
    required: true
    options:
      - id: "a"
        label: "Yes, a strict and consistent system"
      - id: "b"
        label: "A loose system that I mostly follow"
      - id: "c"
        label: "Only in certain areas"
      - id: "d"
        label: "No consistent system"
      - id: "e"
        label: "Not sure"
  - id: q4
    prompt: "Where do you keep most of your files? (Select all that apply)"
    type: multi_choice
    construct: where_keep_most_files_select
    required: true
    options:
      - id: "a"
        label: "Desktop"
      - id: "b"
        label: "Documents folder"
      - id: "c"
        label: "Downloads folder"
      - id: "d"
        label: "A cloud drive"
      - id: "e"
        label: "External drive"
      - id: "f"
        label: "NAS or home server"
      - id: "g"
        label: "Scattered across many places"
      - id: "h"
        label: "Work / company drive"
  - id: q5
    prompt: "Which cloud or file-sync services do you use? (Select all that apply)"
    type: multi_choice
    construct: cloud_file_sync_services_use
    required: true
    options:
      - id: "a"
        label: "Microsoft OneDrive"
      - id: "b"
        label: "Google Drive"
      - id: "c"
        label: "Dropbox"
      - id: "d"
        label: "Apple iCloud Drive"
      - id: "e"
        label: "Box"
      - id: "f"
        label: "A NAS / self-hosted (e.g., Nextcloud, Synology)"
      - id: "g"
        label: "Company / work file server"
      - id: "h"
        label: "None — local files only"
  - id: q6
    prompt: "Which organizing strategies do you use? (Select all that apply)"
    type: multi_choice
    construct: organizing_strategies_use_select_all
    required: true
    options:
      - id: "a"
        label: "Nested folders"
      - id: "b"
        label: "Consistent file naming conventions"
      - id: "c"
        label: "Dates in file or folder names"
      - id: "d"
        label: "Tags or labels"
      - id: "e"
        label: "Color labels"
      - id: "f"
        label: "Favorites / pinned / starred items"
      - id: "g"
        label: "Search-first (few folders, rely on search)"
      - id: "h"
        label: "Version numbers in file names"
      - id: "i"
        label: "I don't use any particular strategy"
  - id: q7
    prompt: "Which best describes your approach to naming files?"
    type: single_choice
    construct: best_describes_approach_naming_files
    required: true
    options:
      - id: "a"
        label: "Descriptive and consistent every time"
      - id: "b"
        label: "Descriptive but inconsistent"
      - id: "c"
        label: "Whatever the app defaults to"
      - id: "d"
        label: "Often generic (e.g., \"Document1\", \"IMG_1234\")"
      - id: "e"
        label: "I rename things later when I get around to it"
  - id: q8
    prompt: "How do you handle your Downloads folder?"
    type: single_choice
    construct: handle_downloads_folder
    required: true
    options:
      - id: "a"
        label: "I sort and clear it regularly"
      - id: "b"
        label: "I clear it occasionally"
      - id: "c"
        label: "I let it pile up and rarely clean it"
      - id: "d"
        label: "It's overflowing and I ignore it"
      - id: "e"
        label: "I don't really use it"
  - id: q9
    prompt: "Which tools do you use to help organize or find files? (Select all that apply)"
    type: multi_choice
    construct: tools_use_help_organize_find
    required: true
    options:
      - id: "a"
        label: "OS search (Spotlight, Windows Search)"
      - id: "b"
        label: "Fast search tools (Everything, Alfred, Raycast)"
      - id: "c"
        label: "A third-party file manager"
      - id: "d"
        label: "Duplicate file finder"
      - id: "e"
        label: "Automation tools (e.g., Hazel, scripts)"
      - id: "f"
        label: "Cloud sync built-in search"
      - id: "g"
        label: "Tagging tools"
      - id: "h"
        label: "None"
  - id: q10
    prompt: "Approximately how many files do you have on your main computer? Enter a whole number."
    type: free_text
    construct: approximately_many_files_have_main
    required: true
  - id: q11
    prompt: "In a typical week, roughly how many minutes do you spend looking for files you can't immediately locate? Enter a whole number."
