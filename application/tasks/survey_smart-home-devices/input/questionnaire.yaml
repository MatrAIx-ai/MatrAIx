schemaVersion: "1.0"
id: smart_home_devices_v1
title: "Smart Home Devices Survey"
description: "Adoption and everyday use of smart home devices — which connected devices people own, the ecosystems and brands they choose, and their attitudes toward convenience, security, privacy, and cost."
questions:
  - id: q0
    prompt: "Do you currently own or use any smart home devices (connected devices you control by app, voice, or automation)?"
    type: single_choice
    construct: currently_own_use_any_smart
    required: true
    options:
      - id: "a"
        label: "Yes, several throughout my home"
      - id: "b"
        label: "Yes, one or two devices"
      - id: "c"
        label: "No, but I plan to add some within the next year"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been using smart home devices?"
    type: single_choice
    construct: long_have_been_using_smart
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I do not use any"
  - id: q2
    prompt: "Approximately how many smart home devices do you have in your home right now? Enter a whole number."
    type: free_text
    construct: approximately_many_smart_home_devices
    required: true
  - id: q3
    prompt: "Which types of smart home devices do you own or use? (Select all that apply)"
    type: multi_choice
    construct: types_smart_home_devices_own
    required: true
    options:
      - id: "a"
        label: "Smart speaker (e.g., Amazon Echo, Google Nest)"
      - id: "b"
        label: "Smart display with screen"
      - id: "c"
        label: "Smart light bulbs or switches"
      - id: "d"
        label: "Smart plugs or outlets"
      - id: "e"
        label: "Smart thermostat"
      - id: "f"
        label: "Video doorbell"
      - id: "g"
        label: "Security camera"
      - id: "h"
        label: "Smart lock"
      - id: "i"
        label: "Robot vacuum or mop"
      - id: "j"
        label: "Smart TV or streaming device"
      - id: "k"
        label: "Motion, contact, or leak sensors"
      - id: "l"
        label: "Smart smoke/CO detector"
      - id: "m"
        label: "Garage door opener"
      - id: "n"
        label: "Smart appliances (fridge, oven, washer)"
      - id: "o"
        label: "Smart irrigation or sprinkler"
      - id: "p"
        label: "None of these"
  - id: q4
    prompt: "Which smart home platform or ecosystem do you primarily use to control your devices?"
    type: single_choice
    construct: smart_home_platform_ecosystem_primarily
    required: true
    options:
      - id: "a"
        label: "Amazon Alexa"
      - id: "b"
        label: "Google Home / Google Assistant"
      - id: "c"
        label: "Apple HomeKit"
      - id: "d"
        label: "Samsung SmartThings"
      - id: "e"
        label: "Home Assistant (open source)"
      - id: "f"
        label: "A mix of several, no single one"
      - id: "g"
        label: "Individual manufacturer apps only"
      - id: "h"
        label: "I don't use a central platform"
  - id: q5
    prompt: "Which brands of smart home devices do you own? (Select all that apply)"
    type: multi_choice
    construct: brands_smart_home_devices_own
    required: true
    options:
      - id: "a"
        label: "Amazon (Echo, Ring, Blink)"
      - id: "b"
        label: "Google / Nest"
      - id: "c"
        label: "Apple"
      - id: "d"
        label: "Samsung"
      - id: "e"
        label: "Philips Hue"
      - id: "f"
        label: "Wyze"
      - id: "g"
        label: "TP-Link / Kasa"
      - id: "h"
        label: "Ecobee"
      - id: "i"
        label: "Arlo"
      - id: "j"
        label: "iRobot / Roomba"
      - id: "k"
        label: "Eufy / Anker"
      - id: "l"
        label: "Aqara"
      - id: "m"
        label: "Other"
      - id: "n"
        label: "None of these"
  - id: q6
    prompt: "How did you first get into smart home devices?"
    type: single_choice
    construct: did_first_get_into_smart
    required: true
    options:
      - id: "a"
        label: "Bought a smart speaker and expanded from there"
      - id: "b"
        label: "Needed security (camera, doorbell, lock)"
      - id: "c"
        label: "Wanted to save on energy bills"
      - id: "d"
        label: "Received a device as a gift"
      - id: "e"
        label: "It came with a new home or apartment"
      - id: "f"
        label: "A friend or family member recommended it"
      - id: "g"
        label: "Home automation is a hobby of mine"
  - id: q7
    prompt: "What are your main reasons for using smart home devices? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_using_smart_home
    required: true
    options:
      - id: "a"
        label: "Convenience and time saving"
      - id: "b"
        label: "Home security and monitoring"
      - id: "c"
        label: "Energy savings / lower utility bills"
      - id: "d"
        label: "Controlling devices remotely when away"
      - id: "e"
        label: "Voice control and hands-free use"
      - id: "f"
        label: "The novelty and fun of the technology"
      - id: "g"
        label: "Accessibility / helping someone with mobility needs"
      - id: "h"
        label: "Peace of mind"
  - id: q8
    prompt: "Which THREE benefits of smart home devices matter most to you? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: three_benefits_smart_home_devices
    required: true
    options:
      - id: "a"
        label: "Convenience"
      - id: "b"
        label: "Security"
      - id: "c"
        label: "Energy efficiency"
      - id: "d"
        label: "Remote control"
      - id: "e"
        label: "Voice control"
      - id: "f"
        label: "Automation of routines"
      - id: "g"
        label: "Cost savings over time"
      - id: "h"
        label: "Home resale value"
      - id: "i"
        label: "Fun and novelty"
  - id: q9
    prompt: "How often do you interact with your smart home devices?"
    type: single_choice
    construct: often_interact_smart_home_devices
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "About once a day"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Rarely"
  - id: q10
    prompt: "How do you usually control your smart home devices? (Select all that apply)"
    type: multi_choice
    construct: usually_control_smart_home_devices
    required: true
    options:
      - id: "a"
        label: "Voice commands"
      - id: "b"
        label: "Smartphone or tablet app"
      - id: "c"
        label: "Physical buttons or switches"
      - id: "d"
        label: "Automated routines / schedules"
      - id: "e"
        label: "A wall panel or smart display"
      - id: "f"
        label: "Sensors that trigger automatically"
      - id: "g"
        label: "Wearable (watch)"
  - id: q11
    prompt: "Do you set up automations or routines (e.g., lights on at sunset, \"good morning\" scenes)?"
    type: single_choice
    construct: set_up_automations_routines_e
    required: true
    options:
      - id: "a"
        label: "Yes, I use many automations"
      - id: "b"
        label: "Yes, a few simple ones"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No, I control everything manually"
  - id: q12
    prompt: "Roughly how much have you spent on smart home devices in total? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: roughly_much_have_spent_smart
    required: true
  - id: q13
    prompt: "How much do you agree: Smart home devices make my daily life more convenient."
    type: single_choice
    construct: much_agree_smart_home_devices
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: My smart home devices are reliable and work as expected."
    type: single_choice
    construct: much_agree_my_smart_home
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: Setting up and configuring my smart home devices was easy."
    type: single_choice
    construct: much_agree_setting_up_configuring
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
