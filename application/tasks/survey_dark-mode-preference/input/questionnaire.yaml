schemaVersion: "1.0"
id: dark_mode_preference_v1
title: "Dark Mode & Theme Preference Survey"
description: "People's preferences for dark mode, light mode, automatic themes, and related display customizations."
questions:
  - id: q0
    prompt: "Which display theme do you generally prefer?"
    type: single_choice
    construct: display_theme_generally_prefer
    required: true
    options:
      - id: "a"
        label: "Dark mode (light text on dark background)"
      - id: "b"
        label: "Light mode (dark text on light background)"
      - id: "c"
        label: "Automatic (switches with time of day or system)"
      - id: "d"
        label: "It depends on the app or situation"
      - id: "e"
        label: "I have no preference"
  - id: q1
    prompt: "On your main phone, which theme is currently set?"
    type: single_choice
    construct: main_phone_theme_currently_set
    required: true
    options:
      - id: "a"
        label: "Dark mode"
      - id: "b"
        label: "Light mode"
      - id: "c"
        label: "Automatic / scheduled"
      - id: "d"
        label: "I don't know"
      - id: "e"
        label: "I don't have a smartphone"
  - id: q2
    prompt: "On your main computer, which theme is currently set?"
    type: single_choice
    construct: main_computer_theme_currently_set
    required: true
    options:
      - id: "a"
        label: "Dark mode"
      - id: "b"
        label: "Light mode"
      - id: "c"
        label: "Automatic / scheduled"
      - id: "d"
        label: "I don't know"
      - id: "e"
        label: "I don't use a computer"
  - id: q3
    prompt: "On which devices or apps do you use dark mode? (Select all that apply)"
    type: multi_choice
    construct: devices_apps_use_dark_mode
    required: true
    options:
      - id: "a"
        label: "Phone system-wide"
      - id: "b"
        label: "Computer system-wide"
      - id: "c"
        label: "Web browser"
      - id: "d"
        label: "Email client"
      - id: "e"
        label: "Social media apps"
      - id: "f"
        label: "Code editor / developer tools"
      - id: "g"
        label: "Reading / e-book apps"
      - id: "h"
        label: "Streaming or video apps"
      - id: "i"
        label: "Individual websites"
      - id: "j"
        label: "I don't use dark mode anywhere"
  - id: q4
    prompt: "How long have you been using dark mode as a regular preference?"
    type: single_choice
    construct: long_have_been_using_dark
    required: true
    options:
      - id: "a"
        label: "I don't use dark mode"
      - id: "b"
        label: "Less than a year"
      - id: "c"
        label: "1-2 years"
      - id: "d"
        label: "3-5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q5
    prompt: "What are your main reasons for preferring your chosen theme? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_preferring_chosen_theme
    required: true
    options:
      - id: "a"
        label: "Reduces eye strain"
      - id: "b"
        label: "Easier to read"
      - id: "c"
        label: "Looks better / aesthetics"
      - id: "d"
        label: "Better in low light"
      - id: "e"
        label: "Better in bright light"
      - id: "f"
        label: "Saves battery"
      - id: "g"
        label: "Helps me sleep better"
      - id: "h"
        label: "Reduces glare or headaches"
      - id: "i"
        label: "It's just what I'm used to"
  - id: q6
    prompt: "In which lighting conditions do you prefer dark mode? (Select all that apply)"
    type: multi_choice
    construct: lighting_conditions_prefer_dark_mode
    required: true
    options:
      - id: "a"
        label: "In a dark room / at night"
      - id: "b"
        label: "In dim indoor lighting"
      - id: "c"
        label: "In normal indoor lighting"
      - id: "d"
        label: "In bright daylight"
      - id: "e"
        label: "Outdoors"
      - id: "f"
        label: "I never prefer dark mode"
  - id: q7
    prompt: "How often do you switch between light and dark themes?"
    type: single_choice
    construct: often_switch_between_light_dark
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Roughly daily (e.g., automatic day/night)"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never — I keep one theme"
  - id: q8
    prompt: "Do you use automatic scheduling to switch themes (e.g., dark at sunset)?"
    type: single_choice
    construct: use_automatic_scheduling_switch_themes
    required: true
    options:
      - id: "a"
        label: "Yes, based on sunrise/sunset"
      - id: "b"
        label: "Yes, on a custom schedule"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No, I set it manually"
      - id: "e"
        label: "No, I keep one theme all the time"
  - id: q9
    prompt: "Beyond light/dark, do you customize other visual settings? (Select all that apply)"
    type: multi_choice
    construct: beyond_light_dark_customize_other
    required: true
    options:
      - id: "a"
        label: "Accent or highlight colors"
      - id: "b"
        label: "Wallpaper or background"
      - id: "c"
        label: "Text size or font"
      - id: "d"
        label: "High-contrast mode"
      - id: "e"
        label: "Reduced motion / animations"
      - id: "f"
        label: "Blue-light / night-shift filter"
      - id: "g"
        label: "True black (OLED) themes"
      - id: "h"
        label: "I don't customize these"
  - id: q10
    prompt: "Do you use a blue-light filter or \"night mode\" color-warming feature?"
    type: single_choice
    construct: use_blue_light_filter_night
    required: true
    options:
      - id: "a"
        label: "Yes, always on"
      - id: "b"
        label: "Yes, on a schedule"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "No, but I've tried it"
      - id: "e"
        label: "No, never"
  - id: q11
    prompt: "About how many hours per day do you spend looking at a screen set to dark mode?"
    type: free_text
    construct: many_hours_per_day_spend
    required: true
  - id: q12
    prompt: "How much do you agree with the following statement: Dark mode reduces eye strain for me."
    type: single_choice
    construct: much_agree_following_statement_dark
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I find dark mode more visually appealing."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Light mode is easier to read in bright environments."
    type: single_choice
    construct: much_agree_following_statement_light
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: An app not offering dark mode would bother me."
    type: single_choice
    construct: much_agree_following_statement_app
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: Dark mode meaningfully improves my device's battery life."
    type: single_choice
    construct: much_agree_following_statement_dark
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: I prefer to keep the same theme everywhere for consistency."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How important is having a dark-mode option to you for the following: your phone's system interface?"
    type: single_choice
    construct: important_having_dark_mode_option
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How important is having a dark-mode option to you for the following: your web browser and websites?"
    type: single_choice
    construct: important_having_dark_mode_option
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "How important is having a dark-mode option to you for the following: reading and e-book apps?"
    type: single_choice
    construct: important_having_dark_mode_option
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q21
    prompt: "How important is having a dark-mode option to you for the following: productivity or work apps?"
    type: single_choice
    construct: important_having_dark_mode_option
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q22
    prompt: "How important is having a dark-mode option to you for the following: social media and entertainment apps?"
    type: single_choice
    construct: important_having_dark_mode_option
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q23
    prompt: "Which theme do you prefer specifically for reading long-form text?"
    type: single_choice
    construct: theme_prefer_specifically_reading_long
    required: true
    options:
      - id: "a"
        label: "Dark mode"
      - id: "b"
        label: "Light mode"
      - id: "c"
        label: "Sepia / warm tone"
      - id: "d"
        label: "No preference"
  - id: q24
    prompt: "Which theme do you prefer specifically for watching videos or viewing photos?"
    type: single_choice
    construct: theme_prefer_specifically_watching_video
    required: true
    options:
      - id: "a"
        label: "Dark mode"
      - id: "b"
        label: "Light mode"
      - id: "c"
        label: "No preference"
  - id: q25
    prompt: "Have you ever chosen or avoided an app based on whether it offers dark mode?"
    type: single_choice
    construct: have_ever_chosen_avoided_app
    required: true
    options:
      - id: "a"
        label: "Yes, chosen one because it has dark mode"
      - id: "b"
        label: "Yes, avoided one because it lacked dark mode"
      - id: "c"
        label: "Both have happened"
      - id: "d"
        label: "No, it hasn't affected my choices"
  - id: q26
    prompt: "Do you experience any of the following with dark mode? (Select all that apply)"
    type: multi_choice
    construct: experience_any_following_dark_mode
    required: true
    options:
      - id: "a"
        label: "Text looks blurry or hard to focus on"
      - id: "b"
        label: "Halos or smearing around text"
      - id: "c"
        label: "Trouble reading in bright light"
      - id: "d"
        label: "Colors look off in some apps"
      - id: "e"
        label: "None of these"
      - id: "f"
        label: "I don't use dark mode"
  - id: q27
    prompt: "How do you feel when an app forces one theme with no option to change it?"
    type: single_choice
    construct: feel_when_app_forces_one
    required: true
    options:
      - id: "a"
        label: "Very bothered"
      - id: "b"
        label: "Somewhat bothered"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "I don't mind"
      - id: "e"
        label: "I don't notice"
  - id: q28
    prompt: "Select your top 3 reasons theme choice matters to you. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_reasons_theme
    required: true
    options:
      - id: "a"
        label: "Eye comfort"
      - id: "b"
        label: "Readability"
      - id: "c"
        label: "Aesthetics / looks"
      - id: "d"
        label: "Battery life"
      - id: "e"
        label: "Sleep quality"
      - id: "f"
        label: "Reducing glare"
      - id: "g"
        label: "Consistency across devices"
      - id: "h"
        label: "Accessibility needs"
      - id: "i"
        label: "Theme choice doesn't really matter to me"
  - id: q29
    prompt: "Overall, how satisfied are you with the theme and display options available on your devices?"
    type: single_choice
    construct: overall_satisfied_theme_display_options
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q30
    prompt: "How likely are you to keep using your current preferred theme over the next year?"
    type: single_choice
    construct: likely_keep_using_current_preferred
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q31
    prompt: "On a scale of 0 to 10, how strongly would you recommend your preferred theme to others? (0 = would not recommend, 10 = would strongly recommend)"
    type: single_choice
    construct: scale_0_10_strongly_would
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q32
    prompt: "Is there anything you wish device makers or apps did differently with themes and display modes?"
    type: free_text
    construct: there_anything_wish_device_makers
    required: true
  - id: q33
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "Under 18 years old"
      - id: "b"
        label: "18-24 years old"
      - id: "c"
        label: "25-34 years old"
      - id: "d"
        label: "35-44 years old"
      - id: "e"
        label: "45-54 years old"
      - id: "f"
        label: "55-64 years old"
      - id: "g"
        label: "65 years or older"
      - id: "h"
        label: "Prefer not to say"
  - id: q34
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Man"
      - id: "b"
        label: "Woman"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q35
    prompt: "Which best describes your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: best_describes_race_ethnicity_select
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
