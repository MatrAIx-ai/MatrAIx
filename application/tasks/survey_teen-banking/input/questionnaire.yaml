schemaVersion: "1.0"
id: teen_banking_v1
title: "Teen Banking Survey"
description: "How teenagers use banking products, debit cards, and money-management apps, from the perspective of their parents and guardians."
questions:
  - id: q0
    prompt: "Do you have at least one child between the ages of 13 and 18 living in your household?"
    type: single_choice
    construct: have_least_one_child_between
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, my child is younger than 13"
      - id: "d"
        label: "No, my child is older than 18"
      - id: "e"
        label: "No children"
  - id: q1
    prompt: "Does your teenager currently have any kind of bank account or money app?"
    type: single_choice
    construct: does_teenager_currently_have_any
    required: true
    options:
      - id: "a"
        label: "Yes, a bank account"
      - id: "b"
        label: "Yes, a money app but no traditional bank account"
      - id: "c"
        label: "Yes, both"
      - id: "d"
        label: "No, but we plan to set one up"
      - id: "e"
        label: "No, and we have no plans to"
  - id: q2
    prompt: "At what age did your teen first get a bank account or money app? Please enter a number (age in years); enter 0 if they don't have one."
    type: free_text
    construct: age_did_teen_first_get
    required: true
  - id: q3
    prompt: "Which types of accounts or products does your teen use? (Select all that apply)"
    type: multi_choice
    construct: types_accounts_products_does_teen
    required: true
    options:
      - id: "a"
        label: "A teen checking account"
      - id: "b"
        label: "A teen savings account"
      - id: "c"
        label: "A teen debit card"
      - id: "d"
        label: "A prepaid or reloadable card"
      - id: "e"
        label: "A peer-to-peer payment app (e.g., Venmo, Cash App)"
      - id: "f"
        label: "A family money app (e.g., Greenlight, GoHenry)"
      - id: "g"
        label: "Cash only"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "Which provider or app does your teen primarily use for banking?"
    type: single_choice
    construct: provider_app_does_teen_primarily
    required: true
    options:
      - id: "a"
        label: "A traditional bank (e.g., Chase, Bank of America)"
      - id: "b"
        label: "A credit union"
      - id: "c"
        label: "Greenlight"
      - id: "d"
        label: "GoHenry or Step"
      - id: "e"
        label: "Cash App or Venmo"
      - id: "f"
        label: "An online-only bank"
      - id: "g"
        label: "Not applicable"
  - id: q5
    prompt: "How does your teen mainly get money? (Select all that apply)"
    type: multi_choice
    construct: does_teen_mainly_get_money
    required: true
    options:
      - id: "a"
        label: "Regular allowance"
      - id: "b"
        label: "Money for chores or tasks"
      - id: "c"
        label: "A part-time or summer job"
      - id: "d"
        label: "Gifts from family"
      - id: "e"
        label: "Money we transfer as needed"
      - id: "f"
        label: "Their own small business or side gig"
      - id: "g"
        label: "Not applicable"
  - id: q6
    prompt: "About how much money does your teen have available to spend or save in a typical month? Please enter a dollar amount."
    type: free_text
    construct: much_money_does_teen_have
    required: true
  - id: q7
    prompt: "How often does your teen use a debit card or payment app to make purchases?"
    type: single_choice
    construct: often_does_teen_use_debit
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Almost daily"
  - id: q8
    prompt: "How much control or oversight do you have over your teen's spending?"
    type: single_choice
    construct: much_control_oversight_have_over
    required: true
    options:
      - id: "a"
        label: "Full control (I approve every purchase)"
      - id: "b"
        label: "A lot (I set limits and monitor closely)"
      - id: "c"
        label: "Some (I check in periodically)"
      - id: "d"
        label: "A little (mostly independent)"
      - id: "e"
        label: "None (fully independent)"
  - id: q9
    prompt: "Which features matter most when choosing a teen banking product? (Select all that apply)"
    type: multi_choice
    construct: features_matter_most_when_choosing
    required: true
    options:
      - id: "a"
        label: "Parental controls and spending limits"
      - id: "b"
        label: "Real-time spending notifications"
      - id: "c"
        label: "No monthly fees"
      - id: "d"
        label: "Chore and allowance tools"
      - id: "e"
        label: "Savings goals and interest"
      - id: "f"
        label: "Financial education content"
      - id: "g"
        label: "Ease of use for the teen"
      - id: "h"
        label: "Ability to instantly transfer money"
  - id: q10
    prompt: "How much do you agree or disagree: Having a bank account helps my teen learn to manage money."
    type: single_choice
    construct: much_agree_disagree_having_bank
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I worry my teen will overspend if given a card."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: Teen banking apps make it easier for me to teach money skills."
    type: single_choice
    construct: much_agree_disagree_teen_banking
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I am concerned about fees on teen banking products."
    type: single_choice
    construct: much_agree_disagree_i_am
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I am concerned about privacy and data with teen money apps."
    type: single_choice
    construct: much_agree_disagree_i_am
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How important is it to you that your teen learns each skill: Budgeting and tracking spending"
    type: single_choice
    construct: important_it_that_teen_learns
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is it to you that your teen learns each skill: Saving toward goals"
    type: single_choice
