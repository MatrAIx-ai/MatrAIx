      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is it to you that your teen learns each skill: Using a debit card responsibly"
    type: single_choice
    construct: important_it_that_teen_learns
    required: true
    options:
      - id: "a"
