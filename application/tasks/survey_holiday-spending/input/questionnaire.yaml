schemaVersion: "1.0"
id: holiday_spending_v1
title: "Holiday Spending Survey"
description: "How people budget for and spend money during the winter holiday season — on gifts, travel, food, and celebrations."
questions:
  - id: q0
    prompt: "Do you typically celebrate a winter holiday that involves gift-giving or extra spending?"
    type: single_choice
    construct: typically_celebrate_winter_holiday_that
    required: true
    options:
      - id: "a"
        label: "Yes, and I spend a lot"
      - id: "b"
        label: "Yes, and I spend a moderate amount"
      - id: "c"
        label: "Yes, but I spend very little"
      - id: "d"
        label: "No, I don't celebrate with extra spending"
      - id: "e"
        label: "Prefer not to say"
  - id: q1
    prompt: "Approximately how much do you plan to spend in total this holiday season? Enter a dollar amount."
    type: free_text
    construct: approximately_much_plan_spend_total
    required: true
  - id: q2
    prompt: "Which categories will you spend on this holiday season? (Select all that apply)"
    type: multi_choice
    construct: categories_will_spend_this_holiday
    required: true
    options:
      - id: "a"
        label: "Gifts for family"
      - id: "b"
        label: "Gifts for friends"
      - id: "c"
        label: "Gifts for coworkers or others"
      - id: "d"
        label: "Holiday travel"
      - id: "e"
        label: "Food and entertaining"
      - id: "f"
        label: "Decorations"
      - id: "g"
        label: "Charitable donations"
      - id: "h"
        label: "Gift cards"
      - id: "i"
        label: "Something for myself"
      - id: "j"
        label: "None of these"
  - id: q3
    prompt: "About how much do you plan to spend on gifts alone? Enter a dollar amount."
    type: free_text
    construct: much_plan_spend_gifts_alone
    required: true
  - id: q4
    prompt: "For about how many people do you plan to buy gifts? Enter a number."
    type: free_text
    construct: many_people_plan_buy_gifts
    required: true
  - id: q5
    prompt: "How do you plan to pay for most of your holiday spending?"
    type: single_choice
    construct: plan_pay_most_holiday_spending
    required: true
    options:
      - id: "a"
        label: "Cash or debit (money I already have)"
      - id: "b"
        label: "Credit card, paid off right away"
      - id: "c"
        label: "Credit card, carried as a balance"
      - id: "d"
        label: "Buy now, pay later (Klarna, Afterpay, etc.)"
      - id: "e"
        label: "Savings set aside for the holidays"
      - id: "f"
        label: "A mix of methods"
  - id: q6
    prompt: "Where do you plan to do most of your holiday shopping? (Select all that apply)"
    type: multi_choice
    construct: where_plan_most_holiday_shopping
    required: true
    options:
      - id: "a"
        label: "Amazon"
      - id: "b"
        label: "Big-box stores (Walmart, Target)"
      - id: "c"
        label: "Department stores"
      - id: "d"
        label: "Local or small businesses"
      - id: "e"
        label: "Online marketplaces (Etsy, eBay)"
      - id: "f"
        label: "Warehouse clubs (Costco, Sam's Club)"
      - id: "g"
        label: "Direct from brand websites"
      - id: "h"
        label: "Discount or dollar stores"
  - id: q7
    prompt: "When do you typically do most of your holiday shopping?"
    type: single_choice
    construct: when_typically_most_holiday_shopping
    required: true
    options:
      - id: "a"
        label: "Before November"
      - id: "b"
        label: "Black Friday / Cyber Monday week"
      - id: "c"
        label: "Early December"
      - id: "d"
        label: "Mid-to-late December"
      - id: "e"
        label: "Last minute (final days)"
      - id: "f"
        label: "After the holidays (for next year)"
  - id: q8
    prompt: "Do you set a budget for holiday spending?"
    type: single_choice
    construct: set_budget_holiday_spending
    required: true
    options:
      - id: "a"
        label: "Yes, and I stick to it closely"
      - id: "b"
        label: "Yes, but I often go over"
      - id: "c"
        label: "I have a rough idea but no firm budget"
      - id: "d"
        label: "No, I don't budget for the holidays"
  - id: q9
    prompt: "How much do you agree with the following statement: I feel pressure to spend a lot during the holidays."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree with the following statement: Holiday spending puts a strain on my finances."
    type: single_choice
    construct: much_agree_following_statement_holiday
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I usually spend more than I planned during the holidays."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: The amount I spend reflects how much I care about people."
    type: single_choice
    construct: much_agree_following_statement_amount
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I plan ahead and save specifically for holiday spending."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I look forward to holiday shopping."
    type: single_choice
