        label: "Yes, for many apps"
      - id: "b"
        label: "Yes, for a few"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No, and I don't care to"
  - id: q16
    prompt: "How much do you agree with the following statement about file syncing? — My files are available whenever and wherever I need them"
