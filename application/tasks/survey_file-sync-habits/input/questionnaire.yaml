schemaVersion: "1.0"
id: file_sync_habits_v1
title: "File Sync & Transfer Habits Survey"
description: "How people keep files synchronized and move files between their devices, and the reliability, conflict, and privacy issues they run into."
questions:
  - id: q0
    prompt: "Do you keep files synchronized across more than one device?"
    type: single_choice
    construct: keep_files_synchronized_across_more
    required: true
    options:
      - id: "a"
        label: "Yes, across many devices"
      - id: "b"
        label: "Yes, across a couple of devices"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, my files stay on one device"
      - id: "e"
        label: "Not sure what this means"
  - id: q1
    prompt: "How many devices do you regularly move or sync files between?"
    type: free_text
    construct: many_devices_regularly_move_sync
    required: true
  - id: q2
    prompt: "Which tools do you use to keep files in sync across devices? (Select all that apply)"
    type: multi_choice
    construct: tools_use_keep_files_sync
    required: true
    options:
      - id: "a"
        label: "Dropbox"
      - id: "b"
        label: "Google Drive"
      - id: "c"
        label: "Microsoft OneDrive"
      - id: "d"
        label: "Apple iCloud Drive"
      - id: "e"
        label: "Syncthing"
      - id: "f"
        label: "Resilio Sync"
      - id: "g"
        label: "A NAS (Synology, etc.)"
      - id: "h"
        label: "Git or a code repository"
      - id: "i"
        label: "I manually copy files"
      - id: "j"
        label: "I don't sync files"
  - id: q3
    prompt: "Which method do you use most often to move a file from one device to another?"
    type: single_choice
    construct: method_use_most_often_move
    required: true
    options:
      - id: "a"
        label: "A cloud sync folder"
      - id: "b"
        label: "Emailing it to myself"
      - id: "c"
        label: "A USB drive or external disk"
      - id: "d"
        label: "AirDrop / Nearby Share / Quick Share"
      - id: "e"
        label: "A messaging app (WhatsApp, Telegram, etc.)"
      - id: "f"
        label: "A local network transfer"
      - id: "g"
        label: "I rarely move files between devices"
  - id: q4
    prompt: "On which devices do you sync or transfer files? (Select all that apply)"
    type: multi_choice
    construct: devices_sync_transfer_files_select
    required: true
    options:
      - id: "a"
        label: "Windows PC"
      - id: "b"
        label: "Mac"
      - id: "c"
        label: "Linux computer"
      - id: "d"
        label: "iPhone"
      - id: "e"
        label: "Android phone"
      - id: "f"
        label: "Tablet"
      - id: "g"
        label: "Work computer"
      - id: "h"
        label: "A home server or NAS"
  - id: q5
    prompt: "Which types of files do you most often sync between devices? (Select all that apply)"
    type: multi_choice
    construct: types_files_most_often_sync
    required: true
    options:
      - id: "a"
        label: "Documents"
      - id: "b"
        label: "Photos and videos"
      - id: "c"
        label: "Music"
      - id: "d"
        label: "Work project files"
      - id: "e"
        label: "App settings or configuration"
      - id: "f"
        label: "Code or development files"
      - id: "g"
        label: "Downloads"
      - id: "h"
        label: "E-books or PDFs"
  - id: q6
    prompt: "How often do you transfer or sync files between your devices?"
    type: single_choice
    construct: often_transfer_sync_files_between
    required: true
    options:
      - id: "a"
        label: "Constantly / it's automatic"
      - id: "b"
        label: "Several times a day"
      - id: "c"
        label: "Daily"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Do you use selective sync (choosing which folders sync to which device)?"
    type: single_choice
    construct: use_selective_sync_choosing_folders
    required: true
    options:
      - id: "a"
        label: "Yes, I set it up carefully"
      - id: "b"
        label: "Yes, but only a little"
      - id: "c"
        label: "No, everything syncs everywhere"
      - id: "d"
        label: "I didn't know this was an option"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "Do you use \"files on-demand\" / online-only files (files that download only when opened)?"
    type: single_choice
    construct: use_files_demand_online_only
    required: true
    options:
      - id: "a"
        label: "Yes, on purpose"
      - id: "b"
        label: "Yes, but I didn't set it up"
      - id: "c"
        label: "No, I keep everything downloaded"
      - id: "d"
        label: "Not sure"
  - id: q9
    prompt: "How do you transfer large files (bigger than an email attachment)? (Select all that apply)"
    type: multi_choice
    construct: transfer_large_files_bigger_than
    required: true
    options:
      - id: "a"
        label: "Cloud storage share link"
      - id: "b"
        label: "WeTransfer or a similar service"
      - id: "c"
        label: "USB drive or external disk"
      - id: "d"
        label: "Local network / NAS"
      - id: "e"
        label: "Compress and split them"
      - id: "f"
        label: "I rarely need to transfer large files"
  - id: q10
    prompt: "How often do you run into file sync conflicts (two versions of the same file)?"
    type: single_choice
    construct: often_run_into_file_sync
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q11
    prompt: "When a sync conflict happens, how do you usually resolve it?"
    type: single_choice
    construct: when_sync_conflict_happens_usually
    required: true
    options:
      - id: "a"
        label: "Keep the newest version"
      - id: "b"
        label: "Manually compare and merge"
      - id: "c"
        label: "Keep both copies"
      - id: "d"
        label: "I just pick one and hope"
      - id: "e"
        label: "I don't notice conflicts"
      - id: "f"
        label: "This hasn't happened to me"
  - id: q12
    prompt: "Have you ever lost or overwritten a file because of a sync problem?"
    type: single_choice
    construct: have_ever_lost_overwritten_file
    required: true
    options:
      - id: "a"
        label: "Yes, and it was a real loss"
      - id: "b"
        label: "Yes, but I recovered it"
      - id: "c"
        label: "No, never"
      - id: "d"
        label: "Not sure"
  - id: q13
    prompt: "Do you use version history to recover previous versions of files?"
    type: single_choice
    construct: use_version_history_recover_previous
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but my tool supports it"
      - id: "d"
        label: "No, my tool doesn't support it"
      - id: "e"
        label: "Not sure"
  - id: q14
    prompt: "How do you handle syncing sensitive or private files? (Select all that apply)"
    type: multi_choice
    construct: handle_syncing_sensitive_private_files
    required: true
    options:
      - id: "a"
        label: "I keep them out of any sync folder"
      - id: "b"
        label: "I encrypt them before syncing"
      - id: "c"
        label: "I use an end-to-end encrypted service"
      - id: "d"
        label: "I only keep them on local devices"
      - id: "e"
        label: "I use a password-protected archive"
      - id: "f"
        label: "I don't treat them differently"
  - id: q15
    prompt: "Do you sync app settings or configuration between devices (browser, editor, dotfiles, etc.)?"
    type: single_choice
