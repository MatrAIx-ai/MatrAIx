schemaVersion: "1.0"
id: employer_health_benefits_v1
title: "Employer Health Benefits Survey"
description: "How employees understand, use, and value the health benefits offered by their employer."
questions:
  - id: q0
    prompt: "Does your current employer offer health insurance benefits?"
    type: single_choice
    construct: does_current_employer_offer_health
    required: true
    options:
      - id: "a"
        label: "Yes, and I am enrolled"
      - id: "b"
        label: "Yes, but I am not enrolled"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I am not currently employed"
      - id: "e"
        label: "I am self-employed"
  - id: q1
    prompt: "How many health plan options does your employer offer?"
    type: single_choice
    construct: many_health_plan_options_does
    required: true
    options:
      - id: "a"
        label: "One"
      - id: "b"
        label: "Two"
      - id: "c"
        label: "Three"
      - id: "d"
        label: "Four or more"
      - id: "e"
        label: "I'm not sure"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "Besides medical insurance, which benefits does your employer offer? (Select all that apply)"
    type: multi_choice
    construct: besides_medical_insurance_benefits_does
    required: true
    options:
      - id: "a"
        label: "Dental insurance"
      - id: "b"
        label: "Vision insurance"
      - id: "c"
        label: "A health savings account (HSA) or flexible spending account (FSA)"
      - id: "d"
        label: "An employee wellness program"
      - id: "e"
        label: "Mental or emotional wellness support"
      - id: "f"
        label: "Life or disability insurance"
      - id: "g"
        label: "Gym or fitness reimbursement"
      - id: "h"
        label: "Telehealth services"
  - id: q3
    prompt: "How do you usually enroll in or change your employer benefits?"
    type: single_choice
    construct: usually_enroll_change_employer_benefits
    required: true
    options:
      - id: "a"
        label: "Through an online benefits portal"
      - id: "b"
        label: "With help from HR"
      - id: "c"
        label: "On paper forms"
      - id: "d"
        label: "With a benefits counselor or broker"
      - id: "e"
        label: "I have not enrolled myself"
  - id: q4
    prompt: "Which resources do you use to understand your employer benefits during open enrollment? (Select all that apply)"
    type: multi_choice
    construct: resources_use_understand_employer_benefi
    required: true
    options:
      - id: "a"
        label: "Plan summary documents"
      - id: "b"
        label: "The HR or benefits team"
      - id: "c"
        label: "Online enrollment tools or calculators"
      - id: "d"
        label: "A benefits webinar or meeting"
      - id: "e"
        label: "Advice from coworkers"
      - id: "f"
        label: "Advice from family"
      - id: "g"
        label: "I do not use resources, I just re-enroll"
  - id: q5
    prompt: "About how much do you pay per month toward your share of your employer health premium, in dollars? Please enter a number."
    type: free_text
    construct: much_pay_per_month_toward
    required: true
  - id: q6
    prompt: "How much of your premium does your employer cover, to your understanding?"
    type: single_choice
    construct: much_premium_does_employer_cover
    required: true
    options:
      - id: "a"
        label: "Almost all of it"
      - id: "b"
        label: "Most of it"
      - id: "c"
        label: "About half"
      - id: "d"
        label: "Less than half"
      - id: "e"
        label: "I'm not sure"
  - id: q7
    prompt: "How well do you understand the benefits your employer offers?"
    type: single_choice
    construct: well_understand_benefits_employer_offers
    required: true
    options:
      - id: "a"
        label: "Very well"
      - id: "b"
        label: "Somewhat well"
      - id: "c"
        label: "Not very well"
      - id: "d"
        label: "Not at all"
  - id: q8
    prompt: "Which are the top 3 employer benefits you value most? (Select all that apply)"
    type: multi_choice
    construct: top_3_employer_benefits_value
    required: true
    options:
      - id: "a"
        label: "Medical insurance"
      - id: "b"
        label: "Dental insurance"
      - id: "c"
        label: "Vision insurance"
      - id: "d"
        label: "HSA or FSA contributions"
      - id: "e"
        label: "Wellness programs"
      - id: "f"
        label: "Mental wellness support"
      - id: "g"
        label: "Fitness reimbursement"
      - id: "h"
        label: "Telehealth access"
  - id: q9
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The medical plan options offered"
    type: single_choice
    construct: satisfied_each_following_aspects_employe
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q10
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The share of the premium your employer pays"
    type: single_choice
    construct: satisfied_each_following_aspects_employe
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q11
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The dental and vision coverage"
    type: single_choice
    construct: satisfied_each_following_aspects_employe
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q12
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The wellness and fitness benefits"
    type: single_choice
    construct: satisfied_each_following_aspects_employe
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q13
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The clarity of benefit information"
    type: single_choice
    construct: satisfied_each_following_aspects_employe
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q14
    prompt: "How satisfied are you with each of the following aspects of your employer benefits — The ease of the enrollment process"
    type: single_choice
