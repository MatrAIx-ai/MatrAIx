      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q15
    prompt: "How much do you agree: My employer's health benefits are a major reason I stay in my job."
    type: single_choice
    construct: much_agree_my_employer_s
