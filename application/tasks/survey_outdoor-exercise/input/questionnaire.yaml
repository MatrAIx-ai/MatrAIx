    type: single_choice
    construct: long_have_been_exercising_outdoors
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I do not exercise outdoors regularly"
