    prompt: "How often do you exercise outdoors?"
    type: single_choice
    construct: often_exercise_outdoors
    required: true
    options:
      - id: "a"
        label: "Almost every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "Never"
  - id: q1
