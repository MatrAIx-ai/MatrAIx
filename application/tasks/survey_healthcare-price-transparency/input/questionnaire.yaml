schemaVersion: "1.0"
id: healthcare_price_transparency_v1
title: "Healthcare Price Transparency Survey"
description: "Consumer behavior around, and attitudes toward, knowing the price of healthcare before receiving it."
questions:
  - id: q0
    prompt: "Before getting care, how often do you try to find out what it will cost?"
    type: single_choice
    construct: before_getting_care_often_try
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "In the past 12 months, have you looked up the price of a medical service before getting it?"
    type: single_choice
    construct: past_12_months_have_looked
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, I have never done this"
  - id: q2
    prompt: "For which types of care have you checked prices in advance? (Select all that apply)"
    type: multi_choice
    construct: types_care_have_checked_prices
    required: true
    options:
      - id: "a"
        label: "Doctor office visits"
      - id: "b"
        label: "Lab tests or bloodwork"
      - id: "c"
        label: "Imaging (for example, MRI, CT, X-ray)"
      - id: "d"
        label: "Prescription medications"
      - id: "e"
        label: "Planned procedures or surgery"
      - id: "f"
        label: "Dental or vision care"
      - id: "g"
        label: "Emergency or urgent care"
      - id: "h"
        label: "I have not checked prices"
  - id: q3
    prompt: "Which sources have you used to find healthcare prices? (Select all that apply)"
    type: multi_choice
    construct: sources_have_used_find_healthcare
    required: true
    options:
      - id: "a"
        label: "My insurer's website or app"
      - id: "b"
        label: "The hospital or clinic's price list or estimator"
      - id: "c"
        label: "A price-comparison website or app"
      - id: "d"
        label: "Calling the provider's billing office"
      - id: "e"
        label: "Asking my doctor or their staff"
      - id: "f"
        label: "A prescription-price tool (for example, GoodRx)"
      - id: "g"
        label: "Friends, family, or online reviews"
      - id: "h"
        label: "I have not used any source"
  - id: q4
    prompt: "How easy or difficult was it to find the price information you needed?"
    type: single_choice
    construct: easy_difficult_was_it_find
    required: true
    options:
      - id: "a"
        label: "Very easy"
      - id: "b"
        label: "Somewhat easy"
      - id: "c"
        label: "Neither easy nor difficult"
      - id: "d"
        label: "Somewhat difficult"
      - id: "e"
        label: "Very difficult"
  - id: q5
    prompt: "When you found a price, how accurate did it turn out to be compared with your final bill?"
    type: single_choice
    construct: when_found_price_accurate_did
    required: true
    options:
      - id: "a"
        label: "Very accurate"
      - id: "b"
        label: "Somewhat accurate"
      - id: "c"
        label: "Not very accurate"
      - id: "d"
        label: "Not at all accurate"
      - id: "e"
        label: "I have not compared"
  - id: q6
    prompt: "Have you ever chosen a different provider or facility because of price?"
    type: single_choice
    construct: have_ever_chosen_different_provider
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, never"
  - id: q7
    prompt: "Have you ever delayed or skipped care because you were unsure of the cost?"
    type: single_choice
    construct: have_ever_delayed_skipped_care
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I have worried about it"
      - id: "d"
        label: "No, never"
  - id: q8
    prompt: "Have you ever asked a provider for a cost estimate before a service?"
    type: single_choice
    construct: have_ever_asked_provider_cost
    required: true
    options:
      - id: "a"
        label: "Yes, and I received a clear estimate"
      - id: "b"
        label: "Yes, but the estimate was unclear"
      - id: "c"
        label: "Yes, but I could not get an estimate"
      - id: "d"
        label: "No, I have not asked"
  - id: q9
    prompt: "Have you ever tried to negotiate a medical price or bill?"
    type: single_choice
    construct: have_ever_tried_negotiate_medical
    required: true
    options:
      - id: "a"
        label: "Yes, and it worked"
      - id: "b"
        label: "Yes, but it did not work"
      - id: "c"
        label: "No, but I would try"
      - id: "d"
        label: "No, and I would not"
  - id: q10
    prompt: "How aware are you that hospitals are required to post their prices online?"
    type: single_choice
    construct: aware_that_hospitals_required_post
    required: true
    options:
      - id: "a"
        label: "Very aware"
      - id: "b"
        label: "Somewhat aware"
      - id: "c"
        label: "Only slightly aware"
      - id: "d"
        label: "Not aware at all"
  - id: q11
    prompt: "How much do you agree with the following statement: I have enough information to know what my care will cost."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Healthcare prices are too hard to find and understand."
    type: single_choice
    construct: much_agree_following_statement_healthcar
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Knowing prices in advance would change where I get care."
    type: single_choice
    construct: much_agree_following_statement_knowing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I trust the price estimates that providers or insurers give me."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: Providers should be required to share prices before care."
    type: single_choice
    construct: much_agree_following_statement_providers
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: The price of care reflects its quality."
    type: single_choice
    construct: much_agree_following_statement_price
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How important is price transparency to you for each type of care: Routine office visits."
    type: single_choice
