      - id: "d"
        label: "A little"
      - id: "e"
        label: "Not at all"
  - id: q22
    prompt: "When comparing prices, how do you usually balance cost against other factors?"
    type: single_choice
    construct: when_comparing_prices_usually_balance
    required: true
    options:
      - id: "a"
        label: "I mostly choose the lowest price"
      - id: "b"
        label: "I weigh price against convenience"
      - id: "c"
        label: "I weigh price against quality or reputation"
      - id: "d"
        label: "I rarely let price decide"
      - id: "e"
        label: "I do not compare prices"
  - id: q23
    prompt: "How confident are you in your ability to estimate what you will owe after insurance?"
    type: single_choice
    construct: confident_ability_estimate_will_owe
