        label: "Restart the router"
      - id: "b"
        label: "Search online for a fix"
      - id: "c"
        label: "Use the router's app diagnostics"
      - id: "d"
        label: "Ask a knowledgeable friend or family member"
      - id: "e"
        label: "Call the provider or manufacturer"
      - id: "f"
        label: "Wait and hope it fixes itself"
  - id: q26
    prompt: "How long ago did you last upgrade or replace your main router or Wi-Fi system?"
