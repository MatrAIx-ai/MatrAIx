      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q20
    prompt: "How satisfied are you with your home network on: Security features."
    type: single_choice
    construct: satisfied_home_network_security_features
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q21
    prompt: "What networking problems do you experience? (Select all that apply)"
    type: multi_choice
    construct: networking_problems_experience_select_al
    required: true
    options:
      - id: "a"
        label: "Dead zones or weak signal in some rooms"
      - id: "b"
        label: "Slow speeds"
      - id: "c"
        label: "Devices dropping off Wi-Fi"
      - id: "d"
        label: "Needing to restart the router often"
      - id: "e"
        label: "Trouble connecting new devices"
      - id: "f"
        label: "Interference or congestion"
      - id: "g"
        label: "Confusing settings"
      - id: "h"
        label: "None of these"
  - id: q22
