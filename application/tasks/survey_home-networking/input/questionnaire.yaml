      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Several times a week or more"
  - id: q23
    prompt: "Have you added any equipment to improve coverage? (Select all that apply)"
    type: multi_choice
    construct: have_added_any_equipment_improve
    required: true
    options:
      - id: "a"
        label: "Wi-Fi extender / repeater"
      - id: "b"
        label: "Mesh nodes"
      - id: "c"
        label: "Additional wired access points"
      - id: "d"
        label: "Powerline / MoCA adapters"
      - id: "e"
        label: "A better single router"
      - id: "f"
        label: "No, I have not added anything"
  - id: q24
    prompt: "Do you use any parental controls or content filtering on your network?"
    type: single_choice
    construct: use_any_parental_controls_content
    required: true
    options:
      - id: "a"
        label: "Yes, extensively"
      - id: "b"
        label: "Yes, some"
      - id: "c"
        label: "No, but I would like to"
      - id: "d"
        label: "No, not needed"
  - id: q25
    prompt: "When something goes wrong with your network, what do you usually do first?"
    type: single_choice
    construct: when_something_goes_wrong_network
    required: true
