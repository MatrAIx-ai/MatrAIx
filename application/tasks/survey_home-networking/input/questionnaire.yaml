schemaVersion: "1.0"
id: home_networking_v1
title: "Home Networking Survey"
description: "How households set up, manage, secure, and troubleshoot their home network and Wi-Fi, and how satisfied they are with the equipment."
questions:
  - id: q0
    prompt: "Who is mainly responsible for the home network and Wi-Fi in your household?"
    type: single_choice
    construct: who_mainly_responsible_home_network
    required: true
    options:
      - id: "a"
        label: "I am the main person"
      - id: "b"
        label: "I share responsibility with someone else"
      - id: "c"
        label: "Someone else in my household handles it"
      - id: "d"
        label: "No one really manages it"
      - id: "e"
        label: "A professional or landlord manages it"
  - id: q1
    prompt: "What kind of router or Wi-Fi setup do you have at home?"
    type: single_choice
    construct: kind_router_wi_fi_setup
    required: true
    options:
      - id: "a"
        label: "The gateway / router provided by my internet provider"
      - id: "b"
        label: "My own single router"
      - id: "c"
        label: "A mesh Wi-Fi system"
      - id: "d"
        label: "A router plus separate access points"
      - id: "e"
        label: "I do not know"
  - id: q2
    prompt: "Which networking brands are in your home? (Select all that apply)"
    type: multi_choice
    construct: networking_brands_home_select_all
    required: true
    options:
      - id: "a"
        label: "Provider-supplied (no separate brand)"
      - id: "b"
        label: "Netgear"
      - id: "c"
        label: "TP-Link"
      - id: "d"
        label: "Asus"
      - id: "e"
        label: "Eero (Amazon)"
      - id: "f"
        label: "Google Nest Wifi"
      - id: "g"
        label: "Ubiquiti / UniFi"
      - id: "h"
        label: "Linksys"
      - id: "i"
        label: "Other"
      - id: "j"
        label: "I do not know"
  - id: q3
    prompt: "Which Wi-Fi standard does your network use?"
    type: single_choice
    construct: wi_fi_standard_does_network
    required: true
    options:
      - id: "a"
        label: "Wi-Fi 4 or older"
      - id: "b"
        label: "Wi-Fi 5 (802.11ac)"
      - id: "c"
        label: "Wi-Fi 6 (802.11ax)"
      - id: "d"
        label: "Wi-Fi 6E"
      - id: "e"
        label: "Wi-Fi 7"
      - id: "f"
        label: "I do not know"
  - id: q4
    prompt: "Do you use any wired Ethernet connections at home?"
    type: single_choice
    construct: use_any_wired_ethernet_connections
    required: true
    options:
      - id: "a"
        label: "Yes, for many devices"
      - id: "b"
        label: "Yes, for a few key devices"
      - id: "c"
        label: "Just one or two"
      - id: "d"
        label: "No, everything is Wi-Fi"
  - id: q5
    prompt: "Which types of devices are on your home network? (Select all that apply)"
    type: multi_choice
    construct: types_devices_home_network_select
    required: true
    options:
      - id: "a"
        label: "Computers and laptops"
      - id: "b"
        label: "Smartphones and tablets"
      - id: "c"
        label: "Smart TVs and streaming devices"
      - id: "d"
        label: "Gaming consoles"
      - id: "e"
        label: "Smart home devices (lights, plugs, thermostats)"
      - id: "f"
        label: "Security cameras or video doorbells"
      - id: "g"
        label: "Smart speakers / voice assistants"
      - id: "h"
        label: "Printers"
      - id: "i"
        label: "Network storage (NAS) or a home server"
  - id: q6
    prompt: "How do you usually manage your network settings?"
    type: single_choice
    construct: usually_manage_network_settings
    required: true
    options:
      - id: "a"
        label: "A mobile app from the router maker"
      - id: "b"
        label: "The router's web admin page"
      - id: "c"
        label: "I ask someone else to do it"
      - id: "d"
        label: "I never change the settings"
      - id: "e"
        label: "I do not know how"
  - id: q7
    prompt: "Which network security practices do you follow? (Select all that apply)"
    type: multi_choice
    construct: network_security_practices_follow_select
    required: true
    options:
      - id: "a"
        label: "Changed the default admin password"
      - id: "b"
        label: "Use a strong Wi-Fi password"
      - id: "c"
        label: "Use WPA3 or WPA2 encryption"
      - id: "d"
        label: "Set up a separate guest network"
      - id: "e"
        label: "Keep router firmware updated"
      - id: "f"
        label: "Isolate smart-home / IoT devices"
      - id: "g"
        label: "Use a VPN on my network"
      - id: "h"
        label: "Disabled remote administration"
      - id: "i"
        label: "None of these"
  - id: q8
    prompt: "How confident are you in the security of your home network?"
    type: single_choice
    construct: confident_security_home_network
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q9
    prompt: "How do you keep your router's firmware up to date?"
    type: single_choice
    construct: keep_router_s_firmware_up
    required: true
    options:
      - id: "a"
        label: "It updates automatically"
      - id: "b"
        label: "I update it manually when I remember"
      - id: "c"
        label: "I rarely or never update it"
      - id: "d"
        label: "I do not know how"
  - id: q10
    prompt: "Select your top 3 features you look for when buying networking gear. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_features_look
    required: true
    options:
      - id: "a"
        label: "Whole-home coverage"
      - id: "b"
        label: "Fast speeds"
      - id: "c"
        label: "Easy setup"
      - id: "d"
        label: "Strong security features"
      - id: "e"
        label: "Parental controls"
      - id: "f"
        label: "Good app / management interface"
      - id: "g"
        label: "Number of Ethernet ports"
      - id: "h"
        label: "Price"
  - id: q11
    prompt: "How much do you agree: I understand how my home network works."
    type: single_choice
    construct: much_agree_i_understand_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree: My Wi-Fi reaches every part of my home reliably."
    type: single_choice
    construct: much_agree_my_wi_fi
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: Setting up and managing my network is easy."
    type: single_choice
    construct: much_agree_setting_up_managing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: I worry about the security of the devices on my network."
    type: single_choice
    construct: much_agree_i_worry_security
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: My network handles all my connected devices without slowing down."
    type: single_choice
    construct: much_agree_my_network_handles
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How satisfied are you with your home network on: Wi-Fi coverage."
    type: single_choice
    construct: satisfied_home_network_wi_fi
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q17
    prompt: "How satisfied are you with your home network on: Speed and performance."
    type: single_choice
    construct: satisfied_home_network_speed_performance
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q18
    prompt: "How satisfied are you with your home network on: Ease of setup and management."
    type: single_choice
    construct: satisfied_home_network_ease_setup
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q19
    prompt: "How satisfied are you with your home network on: Reliability / uptime."
    type: single_choice
