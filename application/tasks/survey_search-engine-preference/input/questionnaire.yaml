schemaVersion: "1.0"
id: search_engine_preference_v1
title: "Search Engine Preferences & Habits Survey"
description: "Which search engines people rely on, how they search across devices, and how AI answer tools are reshaping their search habits."
questions:
  - id: q0
    prompt: "Which search engine do you use most often?"
    type: single_choice
    construct: search_engine_use_most_often
    required: true
    options:
      - id: "a"
        label: "Google"
      - id: "b"
        label: "Bing"
      - id: "c"
        label: "DuckDuckGo"
      - id: "d"
        label: "Yahoo"
      - id: "e"
        label: "Brave Search"
      - id: "f"
        label: "Ecosia"
      - id: "g"
        label: "Startpage"
      - id: "h"
        label: "Another one"
  - id: q1
    prompt: "Which search engines have you used in the past month? (Select all that apply)"
    type: multi_choice
    construct: search_engines_have_used_past
    required: true
    options:
      - id: "a"
        label: "Google"
      - id: "b"
        label: "Bing"
      - id: "c"
        label: "DuckDuckGo"
      - id: "d"
        label: "Yahoo"
      - id: "e"
        label: "Brave Search"
      - id: "f"
        label: "Ecosia"
      - id: "g"
        label: "Startpage"
      - id: "h"
        label: "Perplexity"
      - id: "i"
        label: "ChatGPT search"
      - id: "j"
        label: "Google Gemini"
      - id: "k"
        label: "Yandex or Baidu"
  - id: q2
    prompt: "How long have you used your current main search engine as your primary one?"
    type: single_choice
    construct: long_have_used_current_main
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "Roughly how many web searches do you perform on a typical day?"
    type: free_text
    construct: roughly_many_web_searches_perform
    required: true
  - id: q4
    prompt: "Why do you use your main search engine? (Select all that apply)"
    type: multi_choice
    construct: why_use_main_search_engine
    required: true
    options:
      - id: "a"
        label: "Best quality results"
      - id: "b"
        label: "It's the default on my browser or phone"
      - id: "c"
        label: "Habit / I've always used it"
      - id: "d"
        label: "Privacy and no tracking"
      - id: "e"
        label: "Fast and simple interface"
      - id: "f"
        label: "Good integration with other services I use"
      - id: "g"
        label: "Useful extra features (maps, images, AI answers)"
      - id: "h"
        label: "It supports a cause I care about"
  - id: q5
    prompt: "On which devices do you search the web most? (Select all that apply)"
    type: multi_choice
    construct: devices_search_web_most_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Voice assistant / smart speaker"
      - id: "f"
        label: "Smart TV"
  - id: q6
    prompt: "Where do you most often start when you have a question or need to find something?"
    type: single_choice
    construct: where_most_often_start_when
    required: true
    options:
      - id: "a"
        label: "A traditional search engine"
      - id: "b"
        label: "An AI chatbot (ChatGPT, Gemini, etc.)"
      - id: "c"
        label: "Directly in an app (YouTube, Amazon, Reddit, etc.)"
      - id: "d"
        label: "Social media"
      - id: "e"
        label: "I ask a voice assistant"
      - id: "f"
        label: "It depends on the question"
  - id: q7
    prompt: "Have you changed the default search engine on any of your devices or browsers?"
    type: single_choice
    construct: have_changed_default_search_engine
    required: true
    options:
      - id: "a"
        label: "Yes, on all of them"
      - id: "b"
        label: "Yes, on some of them"
      - id: "c"
        label: "No, I kept the defaults"
      - id: "d"
        label: "Not sure"
  - id: q8
    prompt: "How often do you use each of the following search features? — Image search"
    type: single_choice
    construct: often_use_each_following_search
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q9
