        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q11
    prompt: "How often do you use each of the following search features? — AI-generated answers or summaries at the top of results"
    type: single_choice
    construct: often_use_each_following_search
    required: true
