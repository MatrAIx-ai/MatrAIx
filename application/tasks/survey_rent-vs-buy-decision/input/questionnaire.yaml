schemaVersion: "1.0"
id: rent_vs_buy_decision_v1
title: "Rent vs. Buy Decision Survey"
description: "How people weigh renting versus buying a home — the factors, attitudes, barriers, and intentions behind the decision."
questions:
  - id: q0
    prompt: "What is your current housing situation?"
    type: single_choice
    construct: current_housing_situation
    required: true
    options:
      - id: "a"
        label: "I rent my home"
      - id: "b"
        label: "I own my home with a mortgage"
      - id: "c"
        label: "I own my home outright (no mortgage)"
      - id: "d"
        label: "I live with family or others without paying rent"
      - id: "e"
        label: "Other"
  - id: q1
    prompt: "How long have you been in your current living situation?"
    type: single_choice
    construct: long_have_been_current_living
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1–2 years"
      - id: "c"
        label: "3–5 years"
      - id: "d"
        label: "6–10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Are you currently considering a change between renting and buying?"
    type: single_choice
    construct: currently_considering_change_between_ren
    required: true
    options:
      - id: "a"
        label: "Yes, I am considering buying a home"
      - id: "b"
        label: "Yes, I am considering moving to a rental"
      - id: "c"
        label: "No, I plan to stay as I am"
      - id: "d"
        label: "Not sure"
  - id: q3
    prompt: "What is your approximate monthly housing cost (rent or mortgage)? Enter a dollar amount."
    type: free_text
    construct: approximate_monthly_housing_cost_rent
    required: true
  - id: q4
    prompt: "About what percentage of your monthly income goes to housing costs?"
    type: single_choice
    construct: percentage_monthly_income_goes_housing
    required: true
    options:
      - id: "a"
        label: "Less than 20%"
      - id: "b"
        label: "20–29%"
      - id: "c"
        label: "30–39%"
      - id: "d"
        label: "40–49%"
      - id: "e"
        label: "50% or more"
      - id: "f"
        label: "Not sure"
  - id: q5
    prompt: "If you were deciding today, which would you choose?"
    type: single_choice
    construct: if_were_deciding_today_would
    required: true
    options:
      - id: "a"
        label: "Definitely rent"
      - id: "b"
        label: "Probably rent"
      - id: "c"
        label: "Unsure / it depends"
      - id: "d"
        label: "Probably buy"
      - id: "e"
        label: "Definitely buy"
  - id: q6
    prompt: "Which factors make you lean toward RENTING? (Select all that apply)"
    type: multi_choice
    construct: factors_make_lean_toward_renting
    required: true
    options:
      - id: "a"
        label: "Flexibility to move easily"
      - id: "b"
        label: "Lower upfront cost"
      - id: "c"
        label: "No maintenance or repair responsibility"
      - id: "d"
        label: "Uncertain job or life situation"
      - id: "e"
        label: "Home prices are too high in my area"
      - id: "f"
        label: "I prefer to invest money elsewhere"
      - id: "g"
        label: "I can't afford a down payment"
      - id: "h"
        label: "None of these"
  - id: q7
    prompt: "Which factors make you lean toward BUYING? (Select all that apply)"
    type: multi_choice
    construct: factors_make_lean_toward_buying
    required: true
    options:
      - id: "a"
        label: "Building equity and wealth"
      - id: "b"
        label: "Stability and putting down roots"
      - id: "c"
        label: "Freedom to renovate or customize"
      - id: "d"
        label: "Protection from rising rents"
      - id: "e"
        label: "Potential tax benefits"
      - id: "f"
        label: "A sense of accomplishment or pride"
      - id: "g"
        label: "Room for a family"
      - id: "h"
        label: "None of these"
  - id: q8
    prompt: "Which barriers currently prevent you from buying a home? (Select all that apply)"
    type: multi_choice
    construct: barriers_currently_prevent_from_buying
    required: true
    options:
      - id: "a"
        label: "Not enough saved for a down payment"
      - id: "b"
        label: "High home prices"
      - id: "c"
        label: "High mortgage interest rates"
      - id: "d"
        label: "Insufficient or unstable income"
      - id: "e"
        label: "Poor or limited credit"
      - id: "f"
        label: "Existing debt (student loans, etc.)"
      - id: "g"
        label: "Low housing inventory in my area"
      - id: "h"
        label: "No barriers — I could buy if I wanted"
      - id: "i"
        label: "Not applicable"
  - id: q9
    prompt: "How much do you have saved toward a home down payment? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_have_saved_toward_home
    required: true
  - id: q10
    prompt: "What down payment percentage do you think you would put down (or did put down)?"
    type: single_choice
    construct: down_payment_percentage_think_would
    required: true
    options:
      - id: "a"
        label: "Less than 5%"
      - id: "b"
        label: "5–9%"
      - id: "c"
        label: "10–19%"
      - id: "d"
        label: "20%"
      - id: "e"
        label: "More than 20%"
      - id: "f"
        label: "Not sure"
  - id: q11
    prompt: "How much do you agree with the following statement: Owning a home is a good financial investment."
    type: single_choice
    construct: much_agree_following_statement_owning
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Owning a home is a core part of the American Dream."
    type: single_choice
    construct: much_agree_following_statement_owning
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Renting is throwing money away."
    type: single_choice
