schemaVersion: "1.0"
id: money_and_relationships_v1
title: "Money and Relationships Survey"
description: "How money affects romantic relationships — communication, conflict, financial compatibility, and shared goals."
questions:
  - id: q0
    prompt: "What is your current relationship status?"
    type: single_choice
    construct: current_relationship_status
    required: true
    options:
      - id: "a"
        label: "Married"
      - id: "b"
        label: "Living with a partner"
      - id: "c"
        label: "In a committed relationship, living apart"
      - id: "d"
        label: "Dating, not serious"
      - id: "e"
        label: "Single, not dating"
      - id: "f"
        label: "Divorced, separated, or widowed"
  - id: q1
    prompt: "How long have you been with your current partner?"
    type: single_choice
    construct: long_have_been_current_partner
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 9 years"
      - id: "d"
        label: "10 years or more"
      - id: "e"
        label: "Not applicable (no current partner)"
  - id: q2
    prompt: "How often do you and your partner talk about money?"
    type: single_choice
    construct: often_partner_talk_money
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
      - id: "f"
        label: "Not applicable"
  - id: q3
    prompt: "How comfortable are you discussing finances with your partner?"
    type: single_choice
    construct: comfortable_discussing_finances_partner
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "How do you and your partner generally manage your money?"
    type: single_choice
    construct: partner_generally_manage_money
    required: true
    options:
      - id: "a"
        label: "Fully combined finances"
      - id: "b"
        label: "Mostly combined, some separate"
      - id: "c"
        label: "Split evenly but kept separate"
      - id: "d"
        label: "Mostly separate finances"
      - id: "e"
        label: "Completely separate"
      - id: "f"
        label: "Not applicable"
  - id: q5
    prompt: "Which financial accounts do you share with your partner? (Select all that apply)"
    type: multi_choice
    construct: financial_accounts_share_partner_select
    required: true
    options:
      - id: "a"
        label: "Joint checking account"
      - id: "b"
        label: "Joint savings account"
      - id: "c"
        label: "Joint credit card"
      - id: "d"
        label: "Shared investment or retirement accounts"
      - id: "e"
        label: "Shared budgeting app"
      - id: "f"
        label: "A shared mortgage or lease"
      - id: "g"
        label: "We don't share any accounts"
      - id: "h"
        label: "Not applicable"
  - id: q6
    prompt: "How often do disagreements about money come up in your relationship?"
    type: single_choice
    construct: often_disagreements_money_come_up
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "What do you and your partner argue about most when it comes to money? (Select all that apply)"
    type: multi_choice
    construct: partner_argue_most_when_it
    required: true
    options:
      - id: "a"
        label: "Spending too much"
      - id: "b"
        label: "Saving too little"
      - id: "c"
        label: "Debt"
      - id: "d"
        label: "Different financial priorities"
      - id: "e"
        label: "One partner earning or contributing more"
      - id: "f"
        label: "Big purchases"
      - id: "g"
        label: "Financial secrecy or hidden spending"
      - id: "h"
        label: "Supporting family members"
      - id: "i"
        label: "We don't really argue about money"
  - id: q8
    prompt: "How aligned are you and your partner on financial goals and values?"
    type: single_choice
    construct: aligned_partner_financial_goals_values
    required: true
    options:
      - id: "a"
        label: "Not at all aligned"
      - id: "b"
        label: "Slightly aligned"
      - id: "c"
        label: "Moderately aligned"
      - id: "d"
        label: "Very aligned"
      - id: "e"
        label: "Completely aligned"
      - id: "f"
        label: "Not applicable"
  - id: q9
    prompt: "Who typically handles the day-to-day finances in your household?"
    type: single_choice
    construct: who_typically_handles_day_day
    required: true
    options:
      - id: "a"
        label: "Mostly me"
      - id: "b"
        label: "Mostly my partner"
      - id: "c"
        label: "We share it roughly equally"
      - id: "d"
        label: "We each handle our own"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree or disagree: My partner and I are a good financial match."
    type: single_choice
    construct: much_agree_disagree_my_partner
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: Money is a source of stress in my relationship."
    type: single_choice
    construct: much_agree_disagree_money_source
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I trust my partner to make good financial decisions."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: We are transparent with each other about our spending."
