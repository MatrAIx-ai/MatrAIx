schemaVersion: "1.0"
id: vision_care_v1
title: "Vision Care Survey"
description: "Consumer vision care habits, including eye exams, glasses and contacts, and how people shop for and afford eyewear."
questions:
  - id: q0
    prompt: "Do you currently wear glasses or contact lenses?"
    type: single_choice
    construct: currently_wear_glasses_contact_lenses
    required: true
    options:
      - id: "a"
        label: "Glasses only"
      - id: "b"
        label: "Contact lenses only"
      - id: "c"
        label: "Both glasses and contacts"
      - id: "d"
        label: "Neither"
  - id: q1
    prompt: "When did you last have an eye exam?"
    type: single_choice
    construct: when_did_last_have_eye
    required: true
    options:
      - id: "a"
        label: "Within the past year"
      - id: "b"
        label: "1 to 2 years ago"
      - id: "c"
        label: "3 to 5 years ago"
      - id: "d"
        label: "More than 5 years ago"
      - id: "e"
        label: "Never"
  - id: q2
    prompt: "How often do you get an eye exam?"
    type: single_choice
    construct: often_get_eye_exam
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Every 2 years"
      - id: "c"
        label: "Every few years"
      - id: "d"
        label: "Only when I notice a problem"
      - id: "e"
        label: "Never"
  - id: q3
    prompt: "Where do you usually get your eye exams?"
    type: single_choice
    construct: where_usually_get_eye_exams
    required: true
    options:
      - id: "a"
        label: "An independent optometrist"
      - id: "b"
        label: "An ophthalmologist's office"
      - id: "c"
        label: "An optical retail chain (for example, LensCrafters or Pearle Vision)"
      - id: "d"
        label: "A big-box store optical (for example, Costco or Walmart)"
      - id: "e"
        label: "A hospital or clinic eye department"
      - id: "f"
        label: "I do not get eye exams"
  - id: q4
    prompt: "Which vision correction or services do you currently use? (Select all that apply)"
    type: multi_choice
    construct: vision_correction_services_currently_use
    required: true
    options:
      - id: "a"
        label: "Single-vision glasses"
      - id: "b"
        label: "Bifocal or progressive glasses"
      - id: "c"
        label: "Reading glasses"
      - id: "d"
        label: "Daily disposable contacts"
      - id: "e"
        label: "Monthly or extended-wear contacts"
      - id: "f"
        label: "Prescription sunglasses"
      - id: "g"
        label: "Blue-light or computer glasses"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "Where do you usually buy your glasses or contacts?"
    type: single_choice
    construct: where_usually_buy_glasses_contacts
    required: true
    options:
      - id: "a"
        label: "At the eye doctor's office"
      - id: "b"
        label: "An optical retail chain"
      - id: "c"
        label: "A big-box or warehouse store"
      - id: "d"
        label: "An online retailer (for example, Warby Parker or 1-800 Contacts)"
      - id: "e"
        label: "A drugstore (for reading glasses)"
      - id: "f"
        label: "I do not buy eyewear"
  - id: q6
    prompt: "About how much did you spend on glasses or contacts in the past year? Please enter a number in dollars."
    type: free_text
    construct: much_did_spend_glasses_contacts
    required: true
  - id: q7
    prompt: "How do you usually pay for vision care and eyewear?"
    type: single_choice
    construct: usually_pay_vision_care_eyewear
    required: true
    options:
      - id: "a"
        label: "Vision insurance"
      - id: "b"
        label: "Out of pocket"
      - id: "c"
        label: "An HSA or FSA account"
      - id: "d"
        label: "A vision discount plan"
      - id: "e"
        label: "A mix of these"
  - id: q8
    prompt: "Which factors matter most when buying eyewear? (Select all that apply)"
    type: multi_choice
    construct: factors_matter_most_when_buying
    required: true
    options:
      - id: "a"
        label: "Price"
      - id: "b"
        label: "Style and appearance"
      - id: "c"
        label: "Lens quality"
      - id: "d"
        label: "Brand"
      - id: "e"
        label: "Insurance coverage"
      - id: "f"
        label: "Convenience of purchase"
      - id: "g"
        label: "Return or warranty policy"
  - id: q9
    prompt: "How much do you agree or disagree: Regular eye exams are important for my health."
    type: single_choice
    construct: much_agree_disagree_regular_eye
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: Eyewear is more expensive than it should be."
    type: single_choice
    construct: much_agree_disagree_eyewear_more
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I put off getting an eye exam until I notice a problem."
    type: single_choice
    construct: much_agree_disagree_i_put
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I would be comfortable buying glasses online."
    type: single_choice
    construct: much_agree_disagree_i_would
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: My vision affects my daily activities more than I would like."
    type: single_choice
