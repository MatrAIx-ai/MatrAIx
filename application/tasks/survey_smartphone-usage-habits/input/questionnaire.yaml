schemaVersion: "1.0"
id: smartphone_usage_habits_v1
title: "Smartphone Usage Habits Survey"
description: "How people use their smartphones day to day, and how they feel about the amount and impact of that use."
questions:
  - id: q0
    prompt: "Do you own or regularly use a smartphone?"
    type: single_choice
    construct: own_regularly_use_smartphone
    required: true
    options:
      - id: "a"
        label: "Yes, it's my main personal device"
      - id: "b"
        label: "Yes, but I also use other devices heavily"
      - id: "c"
        label: "Yes, but I use it lightly"
      - id: "d"
        label: "No, I use a basic/feature phone"
      - id: "e"
        label: "No, I don't use a mobile phone"
  - id: q1
    prompt: "Which smartphone platform do you primarily use?"
    type: single_choice
    construct: smartphone_platform_primarily_use
    required: true
    options:
      - id: "a"
        label: "iPhone (iOS)"
      - id: "b"
        label: "Android"
      - id: "c"
        label: "Both about equally"
      - id: "d"
        label: "Other"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "About how many hours per day do you spend on your smartphone? Enter a whole number."
    type: free_text
    construct: many_hours_per_day_spend
    required: true
  - id: q3
    prompt: "About how many times per day do you pick up or unlock your phone?"
    type: single_choice
    construct: many_times_per_day_pick
    required: true
    options:
      - id: "a"
        label: "Fewer than 10 times"
      - id: "b"
        label: "10 to 25 times"
      - id: "c"
        label: "26 to 50 times"
      - id: "d"
        label: "51 to 100 times"
      - id: "e"
        label: "More than 100 times"
      - id: "f"
        label: "I have no idea"
  - id: q4
    prompt: "What is the first thing you typically do with your phone in the morning?"
    type: single_choice
    construct: first_thing_typically_phone_morning
    required: true
    options:
      - id: "a"
        label: "Check messages or social media"
      - id: "b"
        label: "Check email"
      - id: "c"
        label: "Check news or weather"
      - id: "d"
        label: "Turn off my alarm and get up"
      - id: "e"
        label: "Check work notifications"
      - id: "f"
        label: "I don't reach for my phone first thing"
  - id: q5
    prompt: "What do you use your smartphone for most? (Select all that apply)"
    type: multi_choice
    construct: use_smartphone_most_select_all
    required: true
    options:
      - id: "a"
        label: "Texting and messaging"
      - id: "b"
        label: "Social media"
      - id: "c"
        label: "Phone and video calls"
      - id: "d"
        label: "Email"
      - id: "e"
        label: "Web browsing"
      - id: "f"
        label: "Watching videos"
      - id: "g"
        label: "Listening to music or podcasts"
      - id: "h"
        label: "Gaming"
      - id: "i"
        label: "Navigation and maps"
      - id: "j"
        label: "Shopping"
      - id: "k"
        label: "Photos and camera"
      - id: "l"
        label: "Banking and finance"
      - id: "m"
        label: "Work or productivity"
  - id: q6
    prompt: "Which categories of apps do you use daily? (Select all that apply)"
    type: multi_choice
    construct: categories_apps_use_daily_select
    required: true
    options:
      - id: "a"
        label: "Messaging"
      - id: "b"
        label: "Social media"
      - id: "c"
        label: "Email"
      - id: "d"
        label: "Streaming video"
      - id: "e"
