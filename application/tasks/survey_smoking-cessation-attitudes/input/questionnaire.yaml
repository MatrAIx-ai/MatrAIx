schemaVersion: "1.0"
id: smoking_cessation_attitudes_v1
title: "Smoking Cessation Attitudes Survey"
description: "General public attitudes toward quit-smoking programs, tools, and support resources."
questions:
  - id: q0
    prompt: "How would you describe your relationship to smoking or tobacco?"
    type: single_choice
    construct: would_describe_relationship_smoking_toba
    required: true
    options:
      - id: "a"
        label: "I have never smoked"
      - id: "b"
        label: "I used to smoke and have quit"
      - id: "c"
        label: "I currently smoke"
      - id: "d"
        label: "Prefer not to say"
  - id: q1
    prompt: "In general, how important do you think it is for society to support people who want to quit smoking?"
    type: single_choice
    construct: general_important_think_it_society
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q2
    prompt: "How serious a public health issue do you consider smoking to be?"
    type: single_choice
    construct: serious_public_health_issue_consider
    required: true
    options:
      - id: "a"
        label: "Not serious at all"
      - id: "b"
        label: "Slightly serious"
      - id: "c"
        label: "Moderately serious"
      - id: "d"
        label: "Very serious"
      - id: "e"
        label: "Extremely serious"
  - id: q3
    prompt: "Which quit-smoking support options are you aware of? (Select all that apply)"
    type: multi_choice
    construct: quit_smoking_support_options_aware
    required: true
    options:
      - id: "a"
        label: "Nicotine patches, gum, or lozenges"
      - id: "b"
        label: "Prescription medications"
      - id: "c"
        label: "Quit-smoking phone lines"
      - id: "d"
        label: "Quit-smoking apps"
      - id: "e"
        label: "Support groups or counseling"
      - id: "f"
        label: "Advice from a doctor"
      - id: "g"
        label: "None of these"
  - id: q4
    prompt: "Which approaches have you heard are effective for quitting? (Select all that apply)"
    type: multi_choice
    construct: approaches_have_heard_effective_quitting
    required: true
    options:
