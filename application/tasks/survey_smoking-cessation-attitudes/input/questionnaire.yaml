        label: "Nicotine-replacement products"
      - id: "b"
        label: "Prescription medications"
      - id: "c"
        label: "Counseling or coaching"
      - id: "d"
        label: "Apps and digital programs"
      - id: "e"
        label: "Support from friends and family"
      - id: "f"
        label: "Going \"cold turkey\""
      - id: "g"
        label: "Not sure which are effective"
