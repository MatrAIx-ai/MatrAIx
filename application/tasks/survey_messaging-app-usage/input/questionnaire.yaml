schemaVersion: "1.0"
id: messaging_app_usage_v1
title: "Messaging App Usage Survey"
description: "How people use messaging and chat apps to stay in touch with family, friends, and coworkers."
questions:
  - id: q0
    prompt: "Do you regularly use messaging or chat apps to communicate with others?"
    type: single_choice
    construct: regularly_use_messaging_chat_apps
    required: true
    options:
      - id: "a"
        label: "Yes, they're my main way of communicating"
      - id: "b"
        label: "Yes, but I also call and email a lot"
      - id: "c"
        label: "Yes, but only occasionally"
      - id: "d"
        label: "No, I mostly call or text with SMS"
      - id: "e"
        label: "No, I rarely message anyone"
  - id: q1
    prompt: "Which messaging apps do you currently use? (Select all that apply)"
    type: multi_choice
    construct: messaging_apps_currently_use_select
    required: true
    options:
      - id: "a"
        label: "SMS / standard text messaging"
      - id: "b"
        label: "iMessage"
      - id: "c"
        label: "WhatsApp"
      - id: "d"
        label: "Facebook Messenger"
      - id: "e"
        label: "Instagram Direct"
      - id: "f"
        label: "Snapchat"
      - id: "g"
        label: "Telegram"
      - id: "h"
        label: "Signal"
      - id: "i"
        label: "Discord"
      - id: "j"
        label: "Slack"
      - id: "k"
        label: "Microsoft Teams (personal use)"
      - id: "l"
        label: "Google Messages (RCS)"
      - id: "m"
        label: "WeChat"
      - id: "n"
        label: "Other"
  - id: q2
    prompt: "Which messaging app do you use most often?"
    type: single_choice
    construct: messaging_app_use_most_often
    required: true
    options:
      - id: "a"
        label: "SMS / text messaging"
      - id: "b"
        label: "iMessage"
      - id: "c"
        label: "WhatsApp"
      - id: "d"
        label: "Facebook Messenger"
      - id: "e"
        label: "Instagram Direct"
      - id: "f"
        label: "Snapchat"
      - id: "g"
        label: "Telegram"
      - id: "h"
        label: "Signal"
      - id: "i"
        label: "Discord"
      - id: "j"
        label: "WeChat"
      - id: "k"
        label: "Other"
  - id: q3
    prompt: "About how many messages do you send across all apps on a typical day?"
    type: single_choice
    construct: many_messages_send_across_all
    required: true
    options:
      - id: "a"
        label: "Fewer than 10"
      - id: "b"
        label: "10 to 25"
      - id: "c"
        label: "26 to 50"
      - id: "d"
        label: "51 to 100"
      - id: "e"
        label: "More than 100"
  - id: q4
    prompt: "About how many different messaging apps do you use in a typical week? Enter a whole number."
    type: free_text
    construct: many_different_messaging_apps_use
    required: true
  - id: q5
    prompt: "Who do you communicate with most through messaging apps? (Select all that apply)"
    type: multi_choice
    construct: who_communicate_most_through_messaging
    required: true
    options:
      - id: "a"
        label: "Family"
      - id: "b"
        label: "Close friends"
      - id: "c"
        label: "Wider friend groups"
      - id: "d"
        label: "Coworkers or classmates"
      - id: "e"
        label: "Romantic partner"
      - id: "f"
        label: "Community or hobby groups"
      - id: "g"
        label: "Businesses or customer service"
  - id: q6
    prompt: "What do you use messaging apps for? (Select all that apply)"
    type: multi_choice
    construct: use_messaging_apps_select_all
    required: true
    options:
      - id: "a"
        label: "Quick one-on-one chats"
      - id: "b"
        label: "Group conversations"
      - id: "c"
        label: "Sharing photos and videos"
      - id: "d"
        label: "Voice messages"
      - id: "e"
        label: "Voice or video calls"
      - id: "f"
        label: "Sharing links or memes"
      - id: "g"
        label: "Coordinating plans"
      - id: "h"
        label: "Sending money or payments"
      - id: "i"
        label: "Work or school coordination"
  - id: q7
    prompt: "Which features do you regularly use? (Select all that apply)"
    type: multi_choice
    construct: features_regularly_use_select_all
    required: true
    options:
      - id: "a"
        label: "Group chats"
      - id: "b"
        label: "Voice messages"
      - id: "c"
        label: "Video calls"
      - id: "d"
        label: "Voice calls"
      - id: "e"
        label: "Disappearing or self-destructing messages"
      - id: "f"
        label: "Stickers, GIFs, or emoji reactions"
      - id: "g"
        label: "Read receipts"
      - id: "h"
        label: "Status or story updates"
      - id: "i"
        label: "Payments or money transfer"
      - id: "j"
        label: "None of these"
  - id: q8
    prompt: "How do you feel about read receipts (showing when you've seen a message)?"
    type: single_choice
    construct: feel_read_receipts_showing_when
    required: true
    options:
      - id: "a"
        label: "I like them and keep them on"
      - id: "b"
        label: "I don't mind them"
      - id: "c"
        label: "I turn them off"
      - id: "d"
        label: "I wish they didn't exist"
      - id: "e"
        label: "I've never thought about it"
  - id: q9
    prompt: "How quickly do you usually feel you should reply to a message?"
    type: single_choice
    construct: quickly_usually_feel_should_reply
    required: true
    options:
      - id: "a"
        label: "Immediately"
      - id: "b"
        label: "Within a few minutes"
      - id: "c"
        label: "Within an hour"
      - id: "d"
        label: "Within a day"
      - id: "e"
        label: "Whenever I get around to it"
  - id: q10
    prompt: "How often do you feel pressure to reply quickly to messages?"
    type: single_choice
    construct: often_feel_pressure_reply_quickly
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q11
    prompt: "How many group chats are you active in?"
    type: single_choice
    construct: many_group_chats_active
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 2"
      - id: "c"
        label: "3 to 5"
      - id: "d"
        label: "6 to 10"
      - id: "e"
        label: "More than 10"
  - id: q12
    prompt: "Please rate your agreement: Messaging apps help me stay close to the people I care about."
    type: single_choice
    construct: please_rate_agreement_messaging_apps
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "Please rate your agreement: I sometimes feel overwhelmed by the number of messages I get."
    type: single_choice
