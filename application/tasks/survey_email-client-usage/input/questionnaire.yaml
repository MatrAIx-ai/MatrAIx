schemaVersion: "1.0"
id: email_client_usage_v1
title: "Email Client & Inbox Habits Survey"
description: "Which email services and apps people use for personal mail and how they manage, secure, and feel about their inbox."
questions:
  - id: q0
    prompt: "Which email service do you use most for your personal email?"
    type: single_choice
    construct: email_service_use_most_personal
    required: true
    options:
      - id: "a"
        label: "Gmail"
      - id: "b"
        label: "Outlook.com / Hotmail / Live"
      - id: "c"
        label: "Yahoo Mail"
      - id: "d"
        label: "Apple iCloud Mail"
      - id: "e"
        label: "Proton Mail"
      - id: "f"
        label: "An email from my internet provider"
      - id: "g"
        label: "Another service"
  - id: q1
    prompt: "Which email apps or clients do you use to read your email? (Select all that apply)"
    type: multi_choice
    construct: email_apps_clients_use_read
    required: true
    options:
      - id: "a"
        label: "Gmail app or website"
      - id: "b"
        label: "Outlook app or website"
      - id: "c"
        label: "Apple Mail"
      - id: "d"
        label: "Yahoo Mail app or website"
      - id: "e"
        label: "Proton Mail"
      - id: "f"
        label: "Mozilla Thunderbird"
      - id: "g"
        label: "Spark"
      - id: "h"
        label: "Superhuman"
      - id: "i"
        label: "My phone's built-in mail app"
      - id: "j"
        label: "A web browser only"
  - id: q2
    prompt: "How many separate email accounts do you actively use?"
    type: free_text
    construct: many_separate_email_accounts_actively
    required: true
  - id: q3
    prompt: "How many years have you been using your main personal email address?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q4
    prompt: "What do you use email for? (Select all that apply)"
    type: multi_choice
    construct: use_email_select_all_that
    required: true
    options:
      - id: "a"
        label: "Personal correspondence with friends and family"
      - id: "b"
        label: "Work or professional communication"
      - id: "c"
        label: "Receipts and order confirmations"
      - id: "d"
        label: "Newsletters and subscriptions"
      - id: "e"
        label: "Account sign-ups and verification"
      - id: "f"
        label: "Bills and financial statements"
      - id: "g"
        label: "Marketing and promotions"
      - id: "h"
        label: "School or coursework"
  - id: q5
    prompt: "On which device do you check email most often?"
    type: single_choice
    construct: device_check_email_most_often
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smartwatch"
  - id: q6
    prompt: "How often do you check your email?"
    type: single_choice
    construct: often_check_email
    required: true
    options:
      - id: "a"
        label: "Constantly throughout the day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "Once a day"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Roughly how many emails do you receive in your main inbox on a typical day?"
    type: free_text
    construct: roughly_many_emails_receive_main
    required: true
  - id: q8
    prompt: "How would you describe the state of your main inbox?"
    type: single_choice
    construct: would_describe_state_main_inbox
    required: true
    options:
      - id: "a"
        label: "Inbox zero — I keep it empty"
      - id: "b"
        label: "Mostly under control"
      - id: "c"
        label: "A manageable amount of unread"
      - id: "d"
        label: "Hundreds of unread messages"
      - id: "e"
        label: "Thousands of unread messages"
  - id: q9
    prompt: "Which of these inbox-management tools do you use? (Select all that apply)"
    type: multi_choice
    construct: these_inbox_management_tools_use
    required: true
    options:
      - id: "a"
        label: "Folders or labels"
      - id: "b"
        label: "Filters or rules"
      - id: "c"
        label: "Flags, stars, or pins"
      - id: "d"
        label: "Snooze / remind-me-later"
      - id: "e"
        label: "Archive"
      - id: "f"
        label: "Categories or tabs (Primary, Social, Promotions)"
      - id: "g"
        label: "Search instead of organizing"
      - id: "h"
        label: "Unsubscribe tools"
      - id: "i"
        label: "None of these"
