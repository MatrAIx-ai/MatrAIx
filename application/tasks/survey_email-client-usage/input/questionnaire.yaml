        label: "Unsubscribe from them"
      - id: "b"
        label: "Delete them without reading"
      - id: "c"
        label: "Filter them into a separate folder"
      - id: "d"
        label: "Mark them as spam"
      - id: "e"
        label: "Let them pile up and ignore them"
      - id: "f"
        label: "I read many of them"
  - id: q11
    prompt: "How often do you unsubscribe from mailing lists?"
    type: single_choice
