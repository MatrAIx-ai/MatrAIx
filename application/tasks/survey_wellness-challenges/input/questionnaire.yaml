schemaVersion: "1.0"
id: wellness_challenges_v1
title: "Wellness Challenges Survey"
description: "Participation in and attitudes toward wellness challenges such as step contests and fitness streaks."
questions:
  - id: q0
    prompt: "Have you ever taken part in a wellness challenge?"
    type: single_choice
    construct: have_ever_taken_part_wellness
    required: true
    options:
      - id: "a"
        label: "Yes, I'm in one now"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I'd consider it"
      - id: "d"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Which best describes your current involvement with wellness challenges?"
    type: single_choice
    construct: best_describes_current_involvement_welln
    required: true
    options:
      - id: "a"
        label: "Actively participating"
      - id: "b"
        label: "Between challenges but plan to rejoin"
      - id: "c"
        label: "Participated before but not now"
      - id: "d"
        label: "Only curious about them"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "What types of wellness challenges have you joined? (Select all that apply)"
    type: multi_choice
    construct: types_wellness_challenges_have_joined
    required: true
    options:
      - id: "a"
        label: "Step or walking challenge"
      - id: "b"
        label: "Fitness or workout streak"
      - id: "c"
        label: "Hydration challenge"
      - id: "d"
        label: "Nutrition or healthy-eating challenge"
      - id: "e"
        label: "Sleep challenge"
      - id: "f"
        label: "Meditation or mindfulness challenge"
      - id: "g"
        label: "Weight or activity goal"
      - id: "h"
        label: "Not applicable"
  - id: q3
    prompt: "Where did the challenge come from? (Select all that apply)"
    type: multi_choice
    construct: where_did_challenge_come_from
    required: true
    options:
      - id: "a"
        label: "My employer's wellness program"
      - id: "b"
        label: "A fitness app"
      - id: "c"
        label: "My health insurer"
      - id: "d"
        label: "A gym or studio"
      - id: "e"
        label: "Friends or family"
      - id: "f"
        label: "A social media community"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "Was the challenge individual or team-based?"
