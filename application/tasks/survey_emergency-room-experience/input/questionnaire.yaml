schemaVersion: "1.0"
id: emergency_room_experience_v1
title: "Emergency Room Experience Survey"
description: "How people experience hospital emergency room visits, from wait times to communication and cost."
questions:
  - id: q0
    prompt: "Have you visited a hospital emergency room (ER) for yourself in the past 24 months?"
    type: single_choice
    construct: have_visited_hospital_emergency_room
    required: true
    options:
      - id: "a"
        label: "Yes, once"
      - id: "b"
        label: "Yes, 2 to 3 times"
      - id: "c"
        label: "Yes, 4 or more times"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "About how many times have you visited an emergency room in the past 24 months? Please enter a number."
    type: free_text
    construct: many_times_have_visited_emergency
    required: true
  - id: q2
    prompt: "At a high level, what was the main reason for your most recent ER visit?"
    type: single_choice
    construct: high_level_was_main_reason
    required: true
    options:
      - id: "a"
        label: "A sudden illness"
      - id: "b"
        label: "An injury"
      - id: "c"
        label: "A worsening of an ongoing condition"
      - id: "d"
        label: "On the advice of a doctor or nurse line"
      - id: "e"
        label: "I was not sure where else to go"
      - id: "f"
        label: "Prefer not to say"
  - id: q3
    prompt: "How did you arrive at the emergency room for your most recent visit?"
    type: single_choice
    construct: did_arrive_emergency_room_most
    required: true
    options:
      - id: "a"
        label: "Drove myself"
      - id: "b"
        label: "Someone drove me"
      - id: "c"
        label: "Ambulance"
      - id: "d"
        label: "Public transit or ride share"
      - id: "e"
        label: "Walked"
  - id: q4
    prompt: "Why did you choose the emergency room rather than another option for that visit?"
    type: single_choice
    construct: why_did_choose_emergency_room
    required: true
    options:
      - id: "a"
        label: "I felt it was a serious situation"
      - id: "b"
        label: "Nothing else was open"
      - id: "c"
        label: "My doctor or a nurse line told me to go"
      - id: "d"
        label: "It was the closest option"
      - id: "e"
        label: "I was not sure where else to go"
  - id: q5
    prompt: "At your most recent ER visit, about how many hours did the entire visit take from arrival to leaving? Please enter a number."
    type: free_text
    construct: most_recent_er_visit_many
    required: true
  - id: q6
    prompt: "How long did you wait before you were first seen by a medical professional?"
    type: single_choice
    construct: long_did_wait_before_were
    required: true
    options:
      - id: "a"
        label: "Less than 15 minutes"
      - id: "b"
        label: "15 to 30 minutes"
      - id: "c"
        label: "31 to 60 minutes"
      - id: "d"
        label: "1 to 2 hours"
      - id: "e"
        label: "More than 2 hours"
  - id: q7
    prompt: "Which of the following did you find difficult about your ER experience? (Select all that apply)"
    type: multi_choice
    construct: following_did_find_difficult_er
    required: true
    options:
      - id: "a"
        label: "The long wait time"
      - id: "b"
        label: "Understanding what was happening"
      - id: "c"
        label: "Communication from staff"
      - id: "d"
        label: "The comfort of the waiting area"
      - id: "e"
        label: "Getting updates on my status"
      - id: "f"
        label: "Understanding the bill afterward"
      - id: "g"
        label: "Nothing was difficult"
  - id: q8
    prompt: "How satisfied were you with each of the following during your most recent ER visit — The wait time to be seen"
    type: single_choice
    construct: satisfied_were_each_following_during
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q9
    prompt: "How satisfied were you with each of the following during your most recent ER visit — How well staff kept you informed"
    type: single_choice
    construct: satisfied_were_each_following_during
    required: true
