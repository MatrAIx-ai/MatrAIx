transport: external_http
runtimeDefaults:
  applicationId: budget_coach_bot
  applicationContext: budget_coaching
  domain: budget_coaching
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_BUDGET
  legacyBaseUrlEnv: BUDGET_CHATBOT_URL
  baseUrl: http://budget-coaching-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: budget_coach_bot
      applicationContext: budget_coaching
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested budget categories or actions
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
