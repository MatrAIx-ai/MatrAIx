schemaVersion: "1.0"
id: desktop_building_v1
title: "Desktop PC Building Survey"
description: "Building, upgrading, and owning custom desktop PCs — experience level, component choices, budgets, build resources, and satisfaction among DIY and enthusiast builders."
questions:
  - id: q0
    prompt: "Which best describes your experience with desktop PCs?"
    type: single_choice
    construct: best_describes_experience_desktop_pcs
    required: true
    options:
      - id: "a"
        label: "I have built my own desktop PC from parts"
      - id: "b"
        label: "I've upgraded parts but never built from scratch"
      - id: "c"
        label: "I own a pre-built desktop and haven't modified it"
      - id: "d"
        label: "I don't own a desktop but plan to build one"
      - id: "e"
        label: "I don't own or plan to own a desktop"
  - id: q1
    prompt: "How many desktop PCs have you personally built from parts? Enter a whole number."
    type: free_text
    construct: many_desktop_pcs_have_personally
    required: true
  - id: q2
    prompt: "When did you most recently build or upgrade a desktop PC?"
    type: single_choice
    construct: when_did_most_recently_build
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 months to 1 year ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "I never have"
  - id: q3
    prompt: "What do you primarily use your desktop for? (Select all that apply)"
    type: multi_choice
    construct: primarily_use_desktop_select_all
    required: true
    options:
      - id: "a"
        label: "Gaming"
      - id: "b"
        label: "Work / productivity"
      - id: "c"
        label: "Programming / software development"
      - id: "d"
        label: "Video or photo editing"
      - id: "e"
        label: "3D modeling / rendering"
      - id: "f"
        label: "Streaming or content creation"
      - id: "g"
        label: "Machine learning / data science"
      - id: "h"
        label: "General web and media use"
      - id: "i"
        label: "Home server / NAS"
      - id: "j"
        label: "Cryptocurrency or compute tasks"
  - id: q4
    prompt: "What was the main reason you built (or would build) rather than buy pre-built?"
    type: single_choice
    construct: was_main_reason_built_would
    required: true
    options:
      - id: "a"
        label: "Better value for the money"
      - id: "b"
        label: "Full control over components"
      - id: "c"
        label: "Higher performance"
      - id: "d"
        label: "The enjoyment of building"
      - id: "e"
        label: "Easier future upgrades"
      - id: "f"
        label: "Customization and aesthetics"
      - id: "g"
        label: "I prefer pre-built, actually"
  - id: q5
    prompt: "Roughly how much did you spend on your most recent build or upgrade? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: roughly_much_did_spend_most
    required: true
  - id: q6
    prompt: "What is your typical total budget for a full desktop build?"
    type: single_choice
    construct: typical_total_budget_full_desktop
    required: true
    options:
      - id: "a"
        label: "Under $500"
      - id: "b"
        label: "$500-$999"
      - id: "c"
        label: "$1,000-$1,499"
      - id: "d"
        label: "$1,500-$1,999"
      - id: "e"
        label: "$2,000-$2,999"
      - id: "f"
        label: "$3,000 or more"
  - id: q7
    prompt: "Which CPU brand do you prefer for your builds?"
    type: single_choice
    construct: cpu_brand_prefer_builds
    required: true
    options:
      - id: "a"
        label: "AMD (Ryzen)"
      - id: "b"
        label: "Intel (Core)"
      - id: "c"
        label: "No strong preference"
      - id: "d"
        label: "Not sure"
  - id: q8
    prompt: "Which GPU brand do you prefer?"
    type: single_choice
    construct: gpu_brand_prefer
    required: true
    options:
      - id: "a"
        label: "NVIDIA (GeForce)"
      - id: "b"
        label: "AMD (Radeon)"
      - id: "c"
        label: "Intel (Arc)"
      - id: "d"
        label: "No strong preference"
      - id: "e"
        label: "I don't use a dedicated GPU"
  - id: q9
    prompt: "Where do you buy PC components? (Select all that apply)"
    type: multi_choice
    construct: where_buy_pc_components_select
    required: true
    options:
      - id: "a"
        label: "Amazon"
      - id: "b"
        label: "Newegg"
      - id: "c"
        label: "Micro Center"
      - id: "d"
        label: "Best Buy"
      - id: "e"
        label: "Manufacturer websites"
      - id: "f"
        label: "B&H or specialty retailers"
      - id: "g"
        label: "Used marketplaces (eBay, r/hardwareswap)"
      - id: "h"
        label: "Local computer stores"
  - id: q10
    prompt: "Which resources do you use when planning a build? (Select all that apply)"
    type: multi_choice
    construct: resources_use_when_planning_build
    required: true
    options:
      - id: "a"
        label: "PCPartPicker"
      - id: "b"
        label: "YouTube build guides and reviews"
      - id: "c"
        label: "Reddit (e.g., r/buildapc)"
      - id: "d"
        label: "Tech review websites and benchmarks"
      - id: "e"
        label: "Discord communities or forums"
      - id: "f"
        label: "Friends who build PCs"
      - id: "g"
        label: "AI chatbot recommendations"
      - id: "h"
        label: "Manufacturer spec pages"
  - id: q11
    prompt: "How do you decide which parts to buy? (Select all that apply)"
    type: multi_choice
