    required: true
    options:
      - id: "a"
        label: "Benchmark performance"
      - id: "b"
        label: "Price-to-performance ratio"
      - id: "c"
        label: "Reviews and reliability reputation"
      - id: "d"
        label: "Compatibility with other parts"
      - id: "e"
        label: "Aesthetics (RGB, color scheme)"
      - id: "f"
        label: "Brand loyalty"
      - id: "g"
        label: "Future upgrade potential"
      - id: "h"
        label: "Sales and deals"
  - id: q12
