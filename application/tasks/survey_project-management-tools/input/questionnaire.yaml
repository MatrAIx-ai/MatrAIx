schemaVersion: "1.0"
id: project_management_tools_v1
title: "Project Management Tools Survey"
description: "How individuals and teams use project management tools to plan, track, and report on work — which tools they choose, how they use them, and how satisfied they are."
questions:
  - id: q0
    prompt: "Do you use a dedicated project management tool for work?"
    type: single_choice
    construct: use_dedicated_project_management_tool
    required: true
    options:
      - id: "a"
        label: "Yes, daily"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but my team does and I sometimes look at it"
      - id: "d"
        label: "No, I don't use one"
  - id: q1
    prompt: "How long have you been using project management tools?"
    type: single_choice
    construct: long_have_been_using_project
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "How often do you interact with your project management tool?"
    type: single_choice
    construct: often_interact_project_management_tool
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "Approximately how many active projects or boards do you currently track? Enter a whole number."
    type: free_text
    construct: approximately_many_active_projects_board
    required: true
  - id: q4
    prompt: "Which project management tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: project_management_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Jira"
      - id: "b"
        label: "Asana"
      - id: "c"
        label: "Monday.com"
      - id: "d"
        label: "Trello"
      - id: "e"
        label: "ClickUp"
      - id: "f"
        label: "Notion"
      - id: "g"
        label: "Microsoft Project"
      - id: "h"
        label: "Microsoft Planner"
      - id: "i"
        label: "Wrike"
      - id: "j"
        label: "Smartsheet"
      - id: "k"
        label: "Basecamp"
      - id: "l"
        label: "Linear"
      - id: "m"
        label: "Airtable"
      - id: "n"
        label: "Other (please specify)"
  - id: q5
    prompt: "Which project management tool do you use most often?"
    type: single_choice
    construct: project_management_tool_use_most
    required: true
    options:
      - id: "a"
        label: "Jira"
      - id: "b"
        label: "Asana"
      - id: "c"
        label: "Monday.com"
      - id: "d"
        label: "Trello"
      - id: "e"
        label: "ClickUp"
      - id: "f"
        label: "Notion"
      - id: "g"
        label: "Microsoft Project or Planner"
      - id: "h"
        label: "Another tool"
      - id: "i"
        label: "I don't have a regular tool"
  - id: q6
    prompt: "Who selected the project management tool you use most?"
    type: single_choice
    construct: who_selected_project_management_tool
    required: true
    options:
      - id: "a"
        label: "I chose it myself"
      - id: "b"
        label: "My team chose it together"
      - id: "c"
        label: "My manager or team lead"
      - id: "d"
        label: "IT or leadership mandated it"
      - id: "e"
        label: "I'm not sure"
  - id: q7
    prompt: "Which views or layouts do you use most? (Select all that apply)"
    type: multi_choice
    construct: views_layouts_use_most_select
    required: true
    options:
      - id: "a"
        label: "List / table"
      - id: "b"
        label: "Kanban board"
      - id: "c"
        label: "Calendar"
      - id: "d"
        label: "Gantt chart / timeline"
      - id: "e"
        label: "Dashboard"
      - id: "f"
        label: "Workload / resource view"
      - id: "g"
        label: "Mind map or whiteboard"
      - id: "h"
        label: "I only use the default view"
  - id: q8
    prompt: "Which features do you regularly use? (Select all that apply)"
    type: multi_choice
    construct: features_regularly_use_select_all
    required: true
    options:
      - id: "a"
        label: "Task assignments and due dates"
      - id: "b"
        label: "Subtasks and dependencies"
      - id: "c"
        label: "Comments and mentions"
      - id: "d"
        label: "File attachments"
      - id: "e"
        label: "Time tracking"
      - id: "f"
        label: "Custom fields"
      - id: "g"
        label: "Automations or rules"
      - id: "h"
        label: "Reporting and analytics"
      - id: "i"
        label: "Integrations with other apps"
      - id: "j"
        label: "Templates"
  - id: q9
    prompt: "In what context do you primarily use project management tools?"
    type: single_choice
    construct: context_primarily_use_project_management
    required: true
    options:
      - id: "a"
        label: "Software development"
      - id: "b"
        label: "Marketing or creative projects"
      - id: "c"
        label: "Operations or administration"
      - id: "d"
        label: "Product management"
      - id: "e"
        label: "Consulting or client work"
      - id: "f"
        label: "Personal projects"
      - id: "g"
        label: "Other"
  - id: q10
    prompt: "How large is the team you collaborate with in the tool?"
    type: single_choice
    construct: large_team_collaborate_tool
    required: true
    options:
      - id: "a"
        label: "Just me"
      - id: "b"
        label: "2–5 people"
      - id: "c"
        label: "6–15 people"
      - id: "d"
        label: "16–50 people"
      - id: "e"
