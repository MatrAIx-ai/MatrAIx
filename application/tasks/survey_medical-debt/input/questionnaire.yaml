        label: "35 to 44"
      - id: "d"
        label: "45 to 54"
      - id: "e"
        label: "55 to 64"
      - id: "f"
        label: "65 or older"
      - id: "g"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
