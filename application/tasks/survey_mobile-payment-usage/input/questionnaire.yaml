      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q30
    prompt: "What would make you use mobile payments more? (Optional open response)"
    type: free_text
    construct: would_make_use_mobile_payments
    required: false
  - id: q31
    prompt: "About what share of your in-person purchases do you make with mobile payments? Please enter a whole number from 0 to 100 (percent)."
