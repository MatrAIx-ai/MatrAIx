schemaVersion: "1.0"
id: mobile_payment_usage_v1
title: "Mobile Payment Usage Survey"
description: "How consumers use mobile and contactless payments — the services they use, where and how often they pay, and their attitudes toward speed, security, and going walletless."
questions:
  - id: q0
    prompt: "Do you use mobile payments (tapping your phone or watch, or paying in an app) to make purchases?"
    type: single_choice
    construct: use_mobile_payments_tapping_phone
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I tried it but stopped"
      - id: "d"
        label: "No, but I plan to start"
      - id: "e"
        label: "No, and I do not plan to"
  - id: q1
    prompt: "How long have you been using mobile payments?"
    type: single_choice
    construct: long_have_been_using_mobile
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 7 years"
      - id: "e"
        label: "More than 7 years"
      - id: "f"
        label: "I do not use mobile payments"
  - id: q2
    prompt: "Which mobile payment services do you use? (Select all that apply)"
    type: multi_choice
    construct: mobile_payment_services_use_select
    required: true
    options:
      - id: "a"
        label: "Apple Pay"
      - id: "b"
        label: "Google Pay"
      - id: "c"
        label: "Samsung Pay"
      - id: "d"
        label: "PayPal"
      - id: "e"
        label: "A store's own app (e.g., Starbucks, Walmart)"
      - id: "f"
        label: "A bank's mobile wallet"
      - id: "g"
        label: "Tap-to-pay with a contactless card"
      - id: "h"
        label: "I do not use mobile payments"
  - id: q3
    prompt: "Which do you use most often for mobile payments?"
    type: single_choice
    construct: use_most_often_mobile_payments
    required: true
    options:
      - id: "a"
        label: "Apple Pay"
      - id: "b"
        label: "Google Pay"
      - id: "c"
        label: "Samsung Pay"
      - id: "d"
        label: "PayPal"
      - id: "e"
        label: "A store-specific app"
      - id: "f"
        label: "Contactless card tap"
      - id: "g"
        label: "I do not use mobile payments"
  - id: q4
    prompt: "How often do you make a mobile payment?"
    type: single_choice
    construct: often_make_mobile_payment
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely or never"
  - id: q5
    prompt: "About how many mobile payments do you make in a typical week? Please enter a whole number."
    type: free_text
    construct: many_mobile_payments_make_typical
    required: true
  - id: q6
    prompt: "Where do you use mobile payments? (Select all that apply)"
    type: multi_choice
    construct: where_use_mobile_payments_select
    required: true
    options:
      - id: "a"
        label: "Grocery stores"
      - id: "b"
        label: "Restaurants and cafes"
      - id: "c"
        label: "Retail and clothing stores"
      - id: "d"
        label: "Gas stations"
      - id: "e"
        label: "Public transit"
      - id: "f"
        label: "Online or in-app purchases"
      - id: "g"
        label: "Vending machines or small vendors"
      - id: "h"
        label: "Paying friends or individuals"
  - id: q7
    prompt: "What do you link to your mobile payment apps? (Select all that apply)"
    type: multi_choice
    construct: link_mobile_payment_apps_select
    required: true
    options:
      - id: "a"
        label: "A credit card"
      - id: "b"
        label: "A debit card"
      - id: "c"
        label: "A bank account"
      - id: "d"
        label: "A prepaid or reloadable card"
      - id: "e"
        label: "Store loyalty or rewards cards"
      - id: "f"
        label: "I don't link anything / don't use them"
  - id: q8
    prompt: "In a typical purchase, which payment method do you reach for first?"
    type: single_choice
    construct: typical_purchase_payment_method_reach
    required: true
    options:
      - id: "a"
        label: "Phone or watch tap"
      - id: "b"
        label: "Physical credit or debit card"
      - id: "c"
        label: "Cash"
      - id: "d"
        label: "It depends on the situation"
  - id: q9
    prompt: "How important is each factor in your decision to use mobile payments? — Speed and convenience"
    type: single_choice
    construct: important_each_factor_decision_use
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q10
    prompt: "How important is each factor in your decision to use mobile payments? — Security compared to cards"
    type: single_choice
    construct: important_each_factor_decision_use
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q11
    prompt: "How important is each factor in your decision to use mobile payments? — Earning rewards or cash back"
    type: single_choice
    construct: important_each_factor_decision_use
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "How important is each factor in your decision to use mobile payments? — Being able to leave my wallet at home"
    type: single_choice
    construct: important_each_factor_decision_use
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "How important is each factor in your decision to use mobile payments? — Tracking my spending easily"
    type: single_choice
    construct: important_each_factor_decision_use
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "How much do you agree with the following statement: Mobile payments are faster than using cash or cards."
    type: single_choice
    construct: much_agree_following_statement_mobile
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: Mobile payments are more secure than swiping a physical card."
    type: single_choice
    construct: much_agree_following_statement_mobile
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: I worry about my phone being lost or stolen with my payment info on it."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: I am comfortable leaving home without my physical wallet."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement: Not every place I shop accepts mobile payments."
    type: single_choice
    construct: much_agree_following_statement_not
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "What are the main reasons you use (or would use) mobile payments? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: main_reasons_use_would_use
    required: true
    options:
      - id: "a"
        label: "Convenience and speed"
      - id: "b"
        label: "Touch-free / hygienic payment"
      - id: "c"
        label: "Better security"
      - id: "d"
        label: "Earning rewards"
      - id: "e"
        label: "Not needing to carry a wallet"
      - id: "f"
        label: "Easy spending tracking"
      - id: "g"
        label: "It's what my card or phone offers"
      - id: "h"
        label: "Splitting or sending money to others"
  - id: q20
    prompt: "What has prevented you from using mobile payments more often? (Select all that apply)"
    type: multi_choice
