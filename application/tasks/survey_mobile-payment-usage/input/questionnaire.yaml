      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q24
    prompt: "How has your use of physical cash changed since you started using mobile payments?"
    type: single_choice
    construct: has_use_physical_cash_changed
    required: true
    options:
