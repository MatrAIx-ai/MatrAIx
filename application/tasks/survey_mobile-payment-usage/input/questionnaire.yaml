        label: "Not all stores accept them"
      - id: "b"
        label: "Security or privacy concerns"
      - id: "c"
        label: "I prefer cash or physical cards"
      - id: "d"
        label: "Habit — I forget to use them"
      - id: "e"
        label: "Setup felt complicated"
      - id: "f"
        label: "My phone or card doesn't support it well"
      - id: "g"
        label: "Nothing, I use them as much as I want"
  - id: q21
    prompt: "How often do you use each of the following? — Contactless tap-to-pay with your phone or watch"
    type: single_choice
