schemaVersion: "1.0"
id: work_life_balance_v1
title: "Work–Life Balance Survey"
description: "How working adults manage the boundary between their job and personal life and how that balance affects their everyday well-being."
questions:
  - id: q0
    prompt: "Are you currently employed or self-employed (including part-time)?"
    type: single_choice
    construct: currently_employed_self_employed_includi
    required: true
    options:
      - id: "a"
        label: "Yes, employed full-time"
      - id: "b"
        label: "Yes, employed part-time"
      - id: "c"
        label: "Yes, self-employed or freelance"
      - id: "d"
        label: "No, not currently working for pay"
  - id: q1
    prompt: "On a typical week, about how many hours do you work? Please enter a number of hours."
    type: free_text
    construct: typical_week_many_hours_work
    required: true
  - id: q2
    prompt: "Which best describes where you usually do your job?"
    type: single_choice
    construct: best_describes_where_usually_job
    required: true
    options:
      - id: "a"
        label: "Fully on-site at an employer's location"
      - id: "b"
        label: "Mostly on-site with some remote days"
      - id: "c"
        label: "Hybrid, roughly split between on-site and remote"
      - id: "d"
        label: "Mostly remote with occasional on-site days"
      - id: "e"
        label: "Fully remote"
  - id: q3
    prompt: "How long have you been in your current job or role?"
    type: single_choice
    construct: long_have_been_current_job
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q4
    prompt: "About how long is your typical one-way commute on days you travel to a workplace?"
    type: single_choice
    construct: long_typical_one_way_commute
    required: true
    options:
      - id: "a"
        label: "I do not commute (fully remote)"
      - id: "b"
        label: "Less than 15 minutes"
      - id: "c"
        label: "15 to 29 minutes"
      - id: "d"
        label: "30 to 44 minutes"
      - id: "e"
        label: "45 to 59 minutes"
      - id: "f"
        label: "60 minutes or more"
  - id: q5
    prompt: "Overall, how would you rate your current work–life balance?"
    type: single_choice
    construct: overall_would_rate_current_work
    required: true
    options:
      - id: "a"
        label: "Very poor"
      - id: "b"
        label: "Poor"
      - id: "c"
        label: "Fair"
      - id: "d"
        label: "Good"
      - id: "e"
        label: "Excellent"
  - id: q6
    prompt: "In a typical week, how often do you work outside your scheduled hours (evenings, early mornings, or weekends)?"
    type: single_choice
    construct: typical_week_often_work_outside
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost every day"
  - id: q7
    prompt: "How often do you check work email or messages during personal time?"
    type: single_choice
    construct: often_check_work_email_messages
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Daily"
      - id: "e"
        label: "Many times a day"
  - id: q8
    prompt: "In the past 12 months, about what share of your paid time off (vacation days) did you actually use?"
    type: single_choice
    construct: past_12_months_share_paid
    required: true
    options:
      - id: "a"
        label: "I do not receive paid time off"
      - id: "b"
        label: "None or almost none"
      - id: "c"
        label: "Less than half"
      - id: "d"
        label: "About half"
      - id: "e"
        label: "Most of it"
      - id: "f"
        label: "All of it"
  - id: q9
    prompt: "Which of the following do you regularly do to protect your personal time? (Select all that apply)"
    type: multi_choice
    construct: following_regularly_protect_personal_tim
    required: true
    options:
      - id: "a"
        label: "Turn off or mute work notifications after hours"
      - id: "b"
        label: "Keep a firm start and stop time each day"
      - id: "c"
        label: "Block focus or no-meeting time on my calendar"
      - id: "d"
        label: "Take a real lunch break away from work"
      - id: "e"
        label: "Keep a separate work phone or work profile"
      - id: "f"
        label: "Decline meetings outside working hours"
      - id: "g"
        label: "Use \"do not disturb\" or away status"
      - id: "h"
        label: "None of these"
  - id: q10
    prompt: "Which factors most disrupt your work–life balance? (Select all that apply)"
    type: multi_choice
    construct: factors_most_disrupt_work_life
    required: true
    options:
      - id: "a"
        label: "Heavy or unpredictable workload"
      - id: "b"
        label: "Long or unpredictable hours"
      - id: "c"
        label: "After-hours emails and messages"
      - id: "d"
        label: "Long commute"
      - id: "e"
        label: "Understaffing on my team"
      - id: "f"
        label: "Pressure from managers or clients"
      - id: "g"
        label: "Caregiving responsibilities at home"
      - id: "h"
        label: "Financial pressure to work more"
      - id: "i"
        label: "None of these"
  - id: q11
    prompt: "When you take time off, how often do you still handle some work?"
    type: single_choice
    construct: when_take_time_off_often
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q12
    prompt: "How much do you agree or disagree: I can disconnect from work during my time off."
    type: single_choice
    construct: much_agree_disagree_i_can
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: My job leaves me enough energy for my personal life."
    type: single_choice
    construct: much_agree_disagree_my_job
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: My manager respects my time outside of work."
    type: single_choice
