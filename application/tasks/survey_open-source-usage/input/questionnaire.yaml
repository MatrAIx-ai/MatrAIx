      - id: "g"
        label: "Security and privacy tools"
      - id: "h"
        label: "Server and infrastructure software"
      - id: "i"
        label: "I don't prefer open-source in any category"
  - id: q33
    prompt: "Select your top 3 reasons open-source software matters to you. (Select all that apply)"
