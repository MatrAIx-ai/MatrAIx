schemaVersion: "1.0"
id: brokerage_app_usage_v1
title: "Brokerage App Usage Survey"
description: "How individual investors use mobile and online brokerage apps to invest and trade."
questions:
  - id: q0
    prompt: "Do you use a mobile or online brokerage app to buy and sell investments?"
    type: single_choice
    construct: use_mobile_online_brokerage_app
    required: true
    options:
      - id: "a"
        label: "Yes, it is my main way of investing"
      - id: "b"
        label: "Yes, but I also use other methods"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, I invest only through a workplace plan or advisor"
      - id: "e"
        label: "No, I do not invest at all"
  - id: q1
    prompt: "Which brokerage apps do you use or have accounts with? (Select all that apply)"
    type: multi_choice
    construct: brokerage_apps_use_have_accounts
    required: true
    options:
      - id: "a"
        label: "Robinhood"
      - id: "b"
        label: "Fidelity"
      - id: "c"
        label: "Charles Schwab"
      - id: "d"
        label: "E*TRADE"
      - id: "e"
        label: "Webull"
      - id: "f"
        label: "Vanguard"
      - id: "g"
        label: "Cash App Investing"
      - id: "h"
        label: "Public"
      - id: "i"
        label: "None of these"
  - id: q2
    prompt: "How long have you been using a brokerage app?"
    type: single_choice
    construct: long_have_been_using_brokerage
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "Not applicable"
  - id: q3
    prompt: "How often do you log in to your brokerage app?"
    type: single_choice
    construct: often_log_brokerage_app
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q4
    prompt: "How often do you actually buy or sell investments?"
    type: single_choice
    construct: often_actually_buy_sell_investments
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "Weekly"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q5
    prompt: "What do you buy or trade through your brokerage app? (Select all that apply)"
    type: multi_choice
    construct: buy_trade_through_brokerage_app
    required: true
    options:
      - id: "a"
        label: "Individual stocks"
      - id: "b"
        label: "ETFs"
      - id: "c"
        label: "Mutual funds"
      - id: "d"
        label: "Options"
      - id: "e"
        label: "Cryptocurrency"
      - id: "f"
        label: "Fractional shares"
      - id: "g"
        label: "Bonds or treasuries"
      - id: "h"
        label: "I don't currently hold investments"
  - id: q6
    prompt: "About how much do you currently hold in your brokerage account(s)?"
    type: single_choice
    construct: much_currently_hold_brokerage_account
    required: true
    options:
      - id: "a"
        label: "Less than $1,000"
      - id: "b"
        label: "$1,000 to $9,999"
      - id: "c"
        label: "$10,000 to $49,999"
      - id: "d"
        label: "$50,000 to $99,999"
      - id: "e"
        label: "$100,000 to $499,999"
      - id: "f"
        label: "$500,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q7
    prompt: "About how much do you deposit into your brokerage account in a typical month? Please enter a dollar amount."
    type: free_text
    construct: much_deposit_into_brokerage_account
    required: true
