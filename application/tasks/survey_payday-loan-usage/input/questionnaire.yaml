schemaVersion: "1.0"
id: payday_loan_usage_v1
title: "Payday and Short-Term Loan Usage Survey"
description: "People's experiences with payday loans and other short-term, high-cost borrowing."
questions:
  - id: q0
    prompt: "Have you ever taken out a payday loan or similar short-term, high-cost loan?"
    type: single_choice
    construct: have_ever_taken_out_payday
    required: true
    options:
      - id: "a"
        label: "Yes, in the past 12 months"
      - id: "b"
        label: "Yes, but more than a year ago"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "Which types of short-term borrowing have you used? (Select all that apply)"
    type: multi_choice
    construct: types_short_term_borrowing_have
    required: true
    options:
      - id: "a"
        label: "Payday loan (storefront)"
      - id: "b"
        label: "Online payday or installment loan"
      - id: "c"
        label: "Auto title loan"
      - id: "d"
        label: "Pawnshop loan"
      - id: "e"
        label: "Earned-wage access or paycheck advance app (e.g., Earnin, Dave, MoneyLion)"
      - id: "f"
        label: "Overdraft as a form of credit"
      - id: "g"
        label: "Borrowing from a \"buy now, pay later\" service"
      - id: "h"
        label: "None of these"
  - id: q2
    prompt: "In the past 12 months, about how many payday or short-term loans did you take out? Please enter a number (enter 0 if none)."
    type: free_text
    construct: past_12_months_many_payday
    required: true
  - id: q3
    prompt: "Thinking of your most recent payday or short-term loan, about how much did you borrow? Please enter a dollar amount (enter 0 if not applicable)."
    type: free_text
    construct: thinking_most_recent_payday_short
    required: true
  - id: q4
    prompt: "About how much did you pay in fees or interest on that loan? Please enter a dollar amount (enter 0 if not applicable)."
    type: free_text
    construct: much_did_pay_fees_interest
    required: true
  - id: q5
    prompt: "What did you most recently use a short-term loan for? (Select all that apply)"
    type: multi_choice
    construct: did_most_recently_use_short
    required: true
    options:
      - id: "a"
        label: "Rent or mortgage"
      - id: "b"
        label: "Utilities"
      - id: "c"
        label: "Groceries or everyday expenses"
      - id: "d"
        label: "A car repair or transportation"
      - id: "e"
        label: "Medical bills"
      - id: "f"
        label: "Paying another bill or debt"
      - id: "g"
        label: "An unexpected emergency"
      - id: "h"
        label: "Not applicable / never used one"
  - id: q6
    prompt: "Where did you get your most recent short-term loan?"
    type: single_choice
    construct: where_did_get_most_recent
    required: true
    options:
      - id: "a"
        label: "A storefront lender"
      - id: "b"
        label: "An online lender"
      - id: "c"
        label: "A paycheck advance app"
      - id: "d"
        label: "A pawnshop"
      - id: "e"
        label: "Not applicable"
  - id: q7
    prompt: "Why did you choose a payday or short-term loan instead of another option? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_payday_short
    required: true
    options:
      - id: "a"
        label: "I needed cash very quickly"
      - id: "b"
        label: "I didn't qualify for other credit"
      - id: "c"
        label: "It was easy to get approved"
      - id: "d"
        label: "I didn't want to ask family or friends"
      - id: "e"
        label: "I had no other choice at the time"
      - id: "f"
        label: "It was close by or convenient"
      - id: "g"
        label: "Not applicable"
  - id: q8
    prompt: "When you took your most recent loan, how well did you understand its total cost?"
    type: single_choice
    construct: when_took_most_recent_loan
    required: true
    options:
      - id: "a"
        label: "I understood it completely"
      - id: "b"
        label: "I understood most of it"
      - id: "c"
        label: "I understood some of it"
      - id: "d"
        label: "I didn't really understand it"
      - id: "e"
        label: "Not applicable"
  - id: q9
    prompt: "Were you able to repay your most recent short-term loan on time?"
    type: single_choice
    construct: were_able_repay_most_recent
    required: true
    options:
      - id: "a"
        label: "Yes, on or before the due date"
      - id: "b"
        label: "Yes, but I had to roll it over or take a new loan"
      - id: "c"
        label: "No, I paid it late"
      - id: "d"
        label: "No, I still owe on it"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "Have you ever rolled over, renewed, or taken a new loan to pay off an existing payday loan?"
    type: single_choice
    construct: have_ever_rolled_over_renewed
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q11
    prompt: "Before using a short-term loan, did you consider any of these alternatives? (Select all that apply)"
    type: multi_choice
    construct: before_using_short_term_loan
    required: true
    options:
      - id: "a"
        label: "Borrowing from family or friends"
      - id: "b"
        label: "A credit card"
      - id: "c"
        label: "A bank or credit union loan"
      - id: "d"
        label: "Asking for a payment extension"
      - id: "e"
        label: "Selling belongings"
      - id: "f"
        label: "A paycheck advance from my employer"
      - id: "g"
        label: "I did not consider alternatives"
  - id: q12
    prompt: "How much do you agree with the following statement about short-term loans? They were easy and fast to get."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement about short-term loans? The fees and interest were higher than I expected."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement about short-term loans? Using them made my financial situation worse."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement about short-term loans? They helped me get through a tough time."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement about short-term loans? I felt I had no better option at the time."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement about short-term loans? I would use one again if I needed to."
    type: single_choice
    construct: much_agree_following_statement_short
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How concerned are you about the cost of short-term loans?"
    type: single_choice
    construct: concerned_cost_short_term_loans
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q19
    prompt: "In general, how difficult is it for you to cover an unexpected expense of a few hundred dollars?"
    type: single_choice
    construct: general_difficult_it_cover_unexpected
    required: true
    options:
      - id: "a"
        label: "Not at all difficult"
      - id: "b"
        label: "Slightly difficult"
      - id: "c"
        label: "Moderately difficult"
      - id: "d"
        label: "Very difficult"
      - id: "e"
        label: "Extremely difficult"
  - id: q20
    prompt: "Do you have a checking or savings account at a bank or credit union?"
    type: single_choice
    construct: have_checking_savings_account_bank
    required: true
    options:
      - id: "a"
        label: "Yes, both checking and savings"
      - id: "b"
        label: "Yes, checking only"
      - id: "c"
        label: "Yes, savings only"
      - id: "d"
        label: "No bank account"
  - id: q21
    prompt: "Do you have a credit card you could use for emergencies?"
    type: single_choice
    construct: have_credit_card_could_use
    required: true
    options:
      - id: "a"
        label: "Yes, with available credit"
      - id: "b"
        label: "Yes, but it's near its limit"
      - id: "c"
        label: "No credit card"
      - id: "d"
        label: "I have one but avoid using it"
  - id: q22
    prompt: "In the past 12 months, how often did you run out of money before your next paycheck?"
    type: single_choice
    construct: past_12_months_often_did
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost every pay period"
  - id: q23
    prompt: "Have you used a paycheck advance or earned-wage access app in the past year?"
    type: single_choice
    construct: have_used_paycheck_advance_earned
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I'm aware of them"
      - id: "d"
        label: "No, I've never heard of them"
  - id: q24
    prompt: "How much do you agree with the following statement? Payday lenders provide a service people genuinely need."
    type: single_choice
    construct: much_agree_following_statement_payday
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q25
    prompt: "How much do you agree with the following statement? Payday loans should be more strictly regulated."
    type: single_choice
    construct: much_agree_following_statement_payday
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q26
    prompt: "In the past year, how often did you feel stressed about repaying a short-term loan?"
    type: single_choice
    construct: past_year_often_did_feel
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
      - id: "f"
        label: "Not applicable"
  - id: q27
    prompt: "Which of these would most help you avoid needing a short-term loan? (Select up to 3)"
    type: single_choice
    construct: these_would_most_help_avoid
    required: true
    options:
      - id: "a"
        label: "A larger emergency fund"
      - id: "b"
        label: "Higher or steadier income"
      - id: "c"
        label: "Access to lower-cost credit"
      - id: "d"
        label: "Lower everyday costs"
      - id: "e"
        label: "Better budgeting"
      - id: "f"
        label: "A paycheck advance from my employer"
      - id: "g"
        label: "Help from family"
      - id: "h"
        label: "More flexible bill due dates"
  - id: q28
    prompt: "How likely are you to use a payday or short-term loan in the next 12 months?"
