    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Unemployed, looking for work"
      - id: "e"
        label: "Student"
      - id: "f"
        label: "Retired"
      - id: "g"
