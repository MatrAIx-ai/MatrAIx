        label: "Yes, a full tiling window manager"
      - id: "b"
        label: "Yes, snapping / window tools (FancyZones, Rectangle, etc.)"
      - id: "c"
        label: "Just the built-in window snapping"
      - id: "d"
        label: "No, I arrange windows manually"
      - id: "e"
        label: "Not sure"
