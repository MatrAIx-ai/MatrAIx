schemaVersion: "1.0"
id: desktop_customization_v1
title: "Desktop Customization Survey"
description: "How people personalize and customize their computer desktop environment."
questions:
  - id: q0
    prompt: "How much do you customize your computer's desktop environment?"
    type: single_choice
    construct: much_customize_computer_s_desktop
    required: true
    options:
      - id: "a"
        label: "Heavily — I invest a lot in it"
      - id: "b"
        label: "Moderately — I tweak several things"
      - id: "c"
        label: "A little — mostly wallpaper and a few settings"
      - id: "d"
        label: "Barely — I use the defaults"
      - id: "e"
        label: "Not at all — pure stock"
  - id: q1
    prompt: "Which operating system do you primarily customize?"
    type: single_choice
    construct: operating_system_primarily_customize
    required: true
    options:
      - id: "a"
        label: "Windows"
      - id: "b"
        label: "macOS"
      - id: "c"
        label: "Linux (any distribution)"
      - id: "d"
        label: "ChromeOS"
      - id: "e"
        label: "A mix of systems"
  - id: q2
    prompt: "How often do you change or refresh your desktop setup?"
    type: single_choice
    construct: often_change_refresh_desktop_setup
    required: true
    options:
      - id: "a"
        label: "Frequently — I'm always tweaking"
      - id: "b"
        label: "Every few months"
      - id: "c"
        label: "A couple of times a year"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I set it once and leave it"
  - id: q3
    prompt: "How important is a personalized computer setup to you?"
    type: single_choice
    construct: important_personalized_computer_setup
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q4
    prompt: "What do you customize on your desktop? (Select all that apply)"
    type: multi_choice
    construct: customize_desktop_select_all_that
    required: true
    options:
      - id: "a"
        label: "Wallpaper / background"
      - id: "b"
        label: "Theme or accent colors"
      - id: "c"
        label: "Light / dark mode"
      - id: "d"
        label: "Icons"
      - id: "e"
        label: "Taskbar or dock"
      - id: "f"
        label: "Widgets"
      - id: "g"
        label: "Fonts"
      - id: "h"
        label: "Window management / layout"
      - id: "i"
        label: "Keyboard shortcuts"
      - id: "j"
        label: "Cursor and pointer"
      - id: "k"
        label: "System sounds"
      - id: "l"
        label: "Startup apps"
      - id: "m"
        label: "Terminal / command line appearance"
  - id: q5
    prompt: "Which customization tools or apps do you use? (Select all that apply)"
    type: multi_choice
    construct: customization_tools_apps_use_select
    required: true
    options:
      - id: "a"
        label: "Rainmeter (Windows)"
      - id: "b"
        label: "Microsoft PowerToys"
      - id: "c"
        label: "Wallpaper Engine"
      - id: "d"
        label: "StartAllBack / Start11"
      - id: "e"
        label: "Bartender / Ice (macOS menu bar)"
      - id: "f"
        label: "Alfred or Raycast"
      - id: "g"
        label: "A tiling window manager (yabai, Amethyst, i3, etc.)"
      - id: "h"
        label: "A Linux desktop environment (GNOME, KDE, etc.) with extensions"
      - id: "i"
        label: "Custom icon packs"
      - id: "j"
        label: "Browser new-tab customization"
      - id: "k"
        label: "None"
  - id: q6
    prompt: "What style of wallpaper do you usually use?"
    type: single_choice
    construct: style_wallpaper_usually_use
    required: true
    options:
      - id: "a"
        label: "Minimal / solid color or gradient"
      - id: "b"
        label: "Nature or landscape photos"
      - id: "c"
        label: "Abstract or artistic"
      - id: "d"
        label: "Anime, gaming, or fandom art"
      - id: "e"
        label: "Live / animated wallpaper"
      - id: "f"
        label: "A photo of my own"
      - id: "g"
        label: "Whatever the default is"
  - id: q7
    prompt: "Which appearance mode do you prefer?"
    type: single_choice
    construct: appearance_mode_prefer
    required: true
