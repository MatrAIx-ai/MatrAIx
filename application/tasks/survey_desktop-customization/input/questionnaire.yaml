        label: "Reddit (r/unixporn, r/desktops, etc.)"
      - id: "b"
        label: "YouTube"
      - id: "c"
        label: "Friends or colleagues"
      - id: "d"
        label: "Pinterest"
      - id: "e"
        label: "DeviantArt / Wallhaven"
      - id: "f"
        label: "Community forums or Discord"
      - id: "g"
        label: "Blogs and articles"
      - id: "h"
