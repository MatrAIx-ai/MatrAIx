schemaVersion: "1.0"
id: llm_chatbot_usage_v1
title: "LLM Chatbot Usage Survey"
description: "How people use AI chatbots powered by large language models, such as ChatGPT, Gemini, and Claude."
questions:
  - id: q0
    prompt: "Do you use AI chatbots such as ChatGPT, Gemini, or Claude?"
    type: single_choice
    construct: use_ai_chatbots_such_as
    required: true
    options:
      - id: "a"
        label: "Yes, I use them regularly"
      - id: "b"
        label: "Yes, I use them occasionally"
      - id: "c"
        label: "I have tried them but don't use them now"
      - id: "d"
        label: "I have heard of them but never used them"
      - id: "e"
        label: "No, I don't use AI chatbots"
  - id: q1
    prompt: "How long have you used AI chatbots?"
    type: single_choice
    construct: long_have_used_ai_chatbots
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "How often do you use AI chatbots?"
    type: single_choice
    construct: often_use_ai_chatbots
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Less than once a month"
  - id: q3
    prompt: "Which AI chatbot do you use most often?"
    type: single_choice
    construct: ai_chatbot_use_most_often
    required: true
    options:
      - id: "a"
        label: "ChatGPT (OpenAI)"
      - id: "b"
        label: "Google Gemini"
      - id: "c"
        label: "Claude (Anthropic)"
      - id: "d"
        label: "Microsoft Copilot"
      - id: "e"
        label: "Meta AI"
      - id: "f"
        label: "Perplexity"
      - id: "g"
        label: "DeepSeek"
      - id: "h"
        label: "Grok (xAI)"
      - id: "i"
        label: "Other"
  - id: q4
    prompt: "Which AI chatbots have you used in the past year? (Select all that apply)"
    type: multi_choice
