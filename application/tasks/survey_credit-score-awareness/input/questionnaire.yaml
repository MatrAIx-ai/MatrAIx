        label: "Yes, a credit freeze"
      - id: "b"
        label: "Yes, a fraud alert"
      - id: "c"
        label: "No, but I know how"
      - id: "d"
        label: "No, I'm not familiar with these"
  - id: q24
    prompt: "How has your credit score changed over the past year?"
    type: single_choice
    construct: has_credit_score_changed_over
    required: true
    options:
      - id: "a"
        label: "Improved significantly"
      - id: "b"
        label: "Improved somewhat"
      - id: "c"
        label: "Stayed about the same"
      - id: "d"
        label: "Declined somewhat"
      - id: "e"
        label: "Declined significantly"
      - id: "f"
        label: "I don't know"
  - id: q25
    prompt: "Where do you get information about credit scores? (Select all that apply)"
    type: multi_choice
    construct: where_get_information_credit_scores
    required: true
    options:
      - id: "a"
        label: "Credit apps or websites"
      - id: "b"
        label: "My bank or lender"
      - id: "c"
        label: "Friends or family"
      - id: "d"
        label: "Social media, YouTube, or podcasts"
      - id: "e"
        label: "Financial blogs or news"
      - id: "f"
        label: "A financial advisor or counselor"
      - id: "g"
        label: "I don't seek out this information"
  - id: q26
    prompt: "Select your top 3 reasons you care (or would care) about your credit score. (Select all that apply)"
