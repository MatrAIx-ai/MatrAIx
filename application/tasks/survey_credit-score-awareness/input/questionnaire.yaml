schemaVersion: "1.0"
id: credit_score_awareness_v1
title: "Credit Score Awareness Survey"
description: "How aware people are of their credit score and how they monitor and manage it."
questions:
  - id: q0
    prompt: "Do you know your current credit score?"
    type: single_choice
    construct: know_current_credit_score
    required: true
    options:
      - id: "a"
        label: "Yes, I know it exactly"
      - id: "b"
        label: "I know it approximately"
      - id: "c"
        label: "I have a rough idea"
      - id: "d"
        label: "No, I don't know it"
  - id: q1
    prompt: "How would you describe your credit score range?"
    type: single_choice
    construct: would_describe_credit_score_range
    required: true
    options:
      - id: "a"
        label: "Excellent (800–850)"
      - id: "b"
        label: "Very good (740–799)"
      - id: "c"
        label: "Good (670–739)"
      - id: "d"
        label: "Fair (580–669)"
      - id: "e"
        label: "Poor (300–579)"
      - id: "f"
        label: "I don't know"
  - id: q2
    prompt: "How often do you check your credit score?"
    type: single_choice
    construct: often_check_credit_score
    required: true
    options:
      - id: "a"
        label: "Weekly or more"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "Every few months"
      - id: "d"
        label: "About once a year"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "Never"
  - id: q3
    prompt: "How do you usually check your credit score? (Select all that apply)"
    type: multi_choice
    construct: usually_check_credit_score_select
    required: true
    options:
      - id: "a"
        label: "A free app or website (Credit Karma, Experian, NerdWallet)"
      - id: "b"
        label: "My bank or credit card's free score tool"
      - id: "c"
        label: "AnnualCreditReport.com (free credit reports)"
      - id: "d"
        label: "A paid credit-monitoring service"
      - id: "e"
        label: "When applying for a loan or credit"
      - id: "f"
        label: "I don't check my credit score"
  - id: q4
    prompt: "Which credit scoring model are you most familiar with?"
    type: single_choice
    construct: credit_scoring_model_most_familiar
    required: true
    options:
      - id: "a"
        label: "FICO Score"
      - id: "b"
        label: "VantageScore"
      - id: "c"
        label: "Both"
      - id: "d"
        label: "I'm not familiar with either"
  - id: q5
    prompt: "How well do you understand what factors affect your credit score?"
    type: single_choice
    construct: well_understand_factors_affect_credit
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Very well"
      - id: "e"
        label: "Extremely well"
  - id: q6
    prompt: "Which of these do you believe affect your credit score? (Select all that apply)"
    type: multi_choice
    construct: these_believe_affect_credit_score
    required: true
    options:
      - id: "a"
        label: "Payment history"
      - id: "b"
        label: "Amount of debt / credit utilization"
      - id: "c"
        label: "Length of credit history"
      - id: "d"
        label: "New credit applications / hard inquiries"
      - id: "e"
        label: "Mix of credit types"
      - id: "f"
        label: "Your income"
      - id: "g"
        label: "Checking your own score"
      - id: "h"
        label: "I'm not sure what affects it"
  - id: q7
    prompt: "Do you know your current credit utilization (how much of your available credit you use)?"
    type: single_choice
    construct: know_current_credit_utilization_much
    required: true
    options:
      - id: "a"
        label: "Yes, and I keep it low on purpose"
      - id: "b"
        label: "Yes, approximately"
      - id: "c"
        label: "No, but I've heard of it"
      - id: "d"
        label: "No, I'm not familiar with it"
  - id: q8
    prompt: "Have you ever checked your full credit report (not just the score)?"
    type: single_choice
    construct: have_ever_checked_full_credit
    required: true
    options:
      - id: "a"
        label: "Yes, in the past year"
      - id: "b"
        label: "Yes, but more than a year ago"
      - id: "c"
        label: "No, but I know I can"
      - id: "d"
        label: "No, and I didn't know I could"
  - id: q9
    prompt: "Have you ever found an error on your credit report?"
    type: single_choice
    construct: have_ever_found_error_credit
    required: true
    options:
      - id: "a"
        label: "Yes, and I disputed it"
      - id: "b"
        label: "Yes, but I didn't dispute it"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I've never checked my report"
  - id: q10
    prompt: "In the past 2 years, have you taken any deliberate steps to improve your credit score? (Select all that apply)"
    type: multi_choice
    construct: past_2_years_have_taken
    required: true
    options:
      - id: "a"
        label: "Paid down credit card balances"
      - id: "b"
        label: "Made sure to pay all bills on time"
      - id: "c"
        label: "Kept old accounts open"
      - id: "d"
        label: "Avoided new credit applications"
      - id: "e"
        label: "Disputed errors on my report"
      - id: "f"
        label: "Became an authorized user on someone's card"
      - id: "g"
        label: "Used a credit-builder loan or secured card"
      - id: "h"
        label: "I haven't taken any steps"
  - id: q11
    prompt: "How confident are you in your ability to improve your credit score?"
    type: single_choice
    construct: confident_ability_improve_credit_score
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q12
    prompt: "How much do you agree with the following statement: My credit score is important to my financial future."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I understand how to build and maintain good credit."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Checking my own credit score lowers it."
    type: single_choice
    construct: much_agree_following_statement_checking
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: I worry about my credit score."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: Credit scoring feels confusing or opaque to me."
    type: single_choice
    construct: much_agree_following_statement_credit
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How important is your credit score for each of the following: Getting approved for a mortgage."
    type: single_choice
    construct: important_credit_score_each_following
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is your credit score for each of the following: Getting a good interest rate on loans."
    type: single_choice
    construct: important_credit_score_each_following
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How important is your credit score for each of the following: Renting an apartment."
    type: single_choice
    construct: important_credit_score_each_following
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "How important is your credit score for each of the following: Getting approved for a credit card."
    type: single_choice
    construct: important_credit_score_each_following
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q21
    prompt: "Has your credit score ever affected a major financial decision or outcome? (Select all that apply)"
    type: multi_choice
    construct: has_credit_score_ever_affected
    required: true
    options:
      - id: "a"
        label: "Approved or denied for a loan"
      - id: "b"
        label: "The interest rate I was offered"
      - id: "c"
        label: "Renting a home or apartment"
      - id: "d"
        label: "A credit card application"
      - id: "e"
        label: "A security deposit on utilities"
      - id: "f"
        label: "An employment or background check"
      - id: "g"
        label: "No, it hasn't affected me"
  - id: q22
    prompt: "Do you use any credit-monitoring or alert service?"
    type: single_choice
    construct: use_any_credit_monitoring_alert
    required: true
    options:
      - id: "a"
        label: "Yes, a free service"
      - id: "b"
        label: "Yes, a paid service"
      - id: "c"
        label: "No, but I've considered it"
      - id: "d"
        label: "No"
  - id: q23
    prompt: "Have you ever placed a credit freeze or fraud alert on your credit?"
    type: single_choice
    construct: have_ever_placed_credit_freeze
