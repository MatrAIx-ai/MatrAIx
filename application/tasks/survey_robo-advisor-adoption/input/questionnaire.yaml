schemaVersion: "1.0"
id: robo_advisor_adoption_v1
title: "Robo-Advisor Adoption Survey"
description: "How investors adopt, use, and trust automated algorithm-based investing services."
questions:
  - id: q0
    prompt: "A robo-advisor is a service that builds and manages an investment portfolio for you automatically using algorithms. Have you ever used one?"
    type: single_choice
    construct: robo_advisor_service_that_builds
    required: true
    options:
      - id: "a"
        label: "Yes, I use one now"
      - id: "b"
        label: "Yes, I have used one in the past"
      - id: "c"
        label: "No, but I am familiar with them"
      - id: "d"
        label: "No, and I have only heard of them"
      - id: "e"
        label: "No, I have never heard of them"
  - id: q1
    prompt: "Which robo-advisors have you used or tried? (Select all that apply)"
    type: multi_choice
    construct: robo_advisors_have_used_tried
    required: true
    options:
      - id: "a"
        label: "Betterment"
      - id: "b"
        label: "Wealthfront"
      - id: "c"
        label: "Schwab Intelligent Portfolios"
      - id: "d"
        label: "Vanguard Digital Advisor or Personal Advisor"
      - id: "e"
        label: "Fidelity Go"
      - id: "f"
        label: "SoFi Automated Investing"
      - id: "g"
        label: "Acorns"
      - id: "h"
        label: "I have never used a robo-advisor"
  - id: q2
    prompt: "How long have you used a robo-advisor?"
    type: single_choice
    construct: long_have_used_robo_advisor
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "What type of account do you hold with a robo-advisor? (Select all that apply)"
    type: multi_choice
    construct: type_account_hold_robo_advisor
    required: true
    options:
      - id: "a"
        label: "Taxable brokerage account"
      - id: "b"
        label: "Traditional or Roth IRA"
      - id: "c"
        label: "A savings or cash management account"
      - id: "d"
        label: "A joint or family account"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "About how much do you currently have invested with a robo-advisor?"
    type: single_choice
    construct: much_currently_have_invested_robo
    required: true
    options:
      - id: "a"
        label: "Less than $1,000"
      - id: "b"
        label: "$1,000 to $9,999"
      - id: "c"
        label: "$10,000 to $49,999"
      - id: "d"
        label: "$50,000 to $99,999"
      - id: "e"
        label: "$100,000 or more"
      - id: "f"
        label: "Prefer not to say"
  - id: q5
    prompt: "About how much do you contribute to your robo-advisor account each month? Please enter a dollar amount."
    type: free_text
    construct: much_contribute_robo_advisor_account
    required: true
  - id: q6
    prompt: "How do you typically fund your robo-advisor account?"
    type: single_choice
    construct: typically_fund_robo_advisor_account
    required: true
    options:
      - id: "a"
        label: "Automatic recurring deposits"
      - id: "b"
        label: "Occasional manual deposits"
      - id: "c"
        label: "A one-time lump sum"
      - id: "d"
        label: "Round-ups from purchases"
      - id: "e"
        label: "Not applicable"
  - id: q7
    prompt: "Which robo-advisor features do you use or value? (Select all that apply)"
    type: multi_choice
    construct: robo_advisor_features_use_value
    required: true
    options:
      - id: "a"
        label: "Automatic portfolio rebalancing"
      - id: "b"
        label: "Tax-loss harvesting"
      - id: "c"
        label: "Goal-based planning tools"
      - id: "d"
        label: "Automatic recurring investing"
      - id: "e"
        label: "Access to human financial advisors"
      - id: "f"
        label: "Socially responsible or ESG portfolios"
      - id: "g"
        label: "I am not sure which features I use"
  - id: q8
    prompt: "How did you first learn about the robo-advisor you use?"
    type: single_choice
    construct: did_first_learn_robo_advisor
    required: true
    options:
      - id: "a"
        label: "Online search or comparison article"
      - id: "b"
        label: "Advertising or social media"
      - id: "c"
        label: "Recommendation from friends or family"
      - id: "d"
        label: "It was offered by a bank or brokerage I already used"
      - id: "e"
        label: "Financial media, podcasts, or influencers"
      - id: "f"
        label: "Not applicable"
  - id: q9
    prompt: "Before using a robo-advisor, how did you primarily invest?"
    type: single_choice
    construct: before_using_robo_advisor_did
    required: true
    options:
      - id: "a"
        label: "I did not invest at all"
      - id: "b"
        label: "I picked my own stocks and funds"
      - id: "c"
        label: "I used a workplace retirement plan only"
      - id: "d"
        label: "I used a traditional human financial advisor"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "How often do you check your robo-advisor account?"
    type: single_choice
    construct: often_check_robo_advisor_account
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Monthly"
      - id: "e"
        label: "Weekly or more often"
  - id: q11
    prompt: "How much do you agree: I trust an algorithm to manage my investments well."
    type: single_choice
    construct: much_agree_i_trust_algorithm
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree: Using a robo-advisor is simpler than managing investments myself."
    type: single_choice
    construct: much_agree_using_robo_advisor
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: A robo-advisor is a good value for the fees it charges."
    type: single_choice
    construct: much_agree_robo_advisor_good
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: I would trust a human advisor more than a robo-advisor with a big decision."
    type: single_choice
    construct: much_agree_i_would_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: The robo-advisor helped me start investing sooner than I otherwise would have."
    type: single_choice
