      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "When choosing a robo-advisor, how important is each factor: an easy-to-use app and dashboard."
