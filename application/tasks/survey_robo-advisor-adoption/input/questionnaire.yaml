      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "When choosing a robo-advisor, how important is each factor: a low or no account minimum."
