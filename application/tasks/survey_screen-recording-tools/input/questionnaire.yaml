        label: "Your webcam / face"
      - id: "b"
        label: "Microphone / your voice"
      - id: "c"
        label: "System / computer audio"
      - id: "d"
        label: "A specific window only"
      - id: "e"
        label: "The full screen"
      - id: "f"
        label: "Just a selected region"
