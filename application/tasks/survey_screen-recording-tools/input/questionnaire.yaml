schemaVersion: "1.0"
id: screen_recording_tools_v1
title: "Screen Recording & Screen-Capture Tools Survey"
description: "Which screen recording and screen-capture tools people use, for what purposes, and how satisfied they are."
questions:
  - id: q0
    prompt: "How often do you record your screen or capture screenshots for anything beyond a casual snapshot?"
    type: single_choice
    construct: often_record_screen_capture_screenshots
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "Never"
  - id: q1
    prompt: "For what purposes do you record your screen or capture your screen? (Select all that apply)"
    type: multi_choice
    construct: purposes_record_screen_capture_screen
    required: true
    options:
      - id: "a"
        label: "Making tutorials or how-to videos"
      - id: "b"
        label: "Async work updates / explaining something to a colleague"
      - id: "c"
        label: "Bug reports or tech support"
      - id: "d"
        label: "Recording meetings or webinars"
      - id: "e"
        label: "Creating course or training content"
      - id: "f"
        label: "Streaming or gaming clips"
      - id: "g"
        label: "Product demos or marketing"
      - id: "h"
        label: "Personal reference / saving info"
      - id: "i"
        label: "Presentations or slide narration"
  - id: q2
    prompt: "How many years have you been using screen recording tools?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q3
    prompt: "Which screen recording or capture tools do you currently use? (Select all that apply)"
    type: multi_choice
    construct: screen_recording_capture_tools_currently
    required: true
    options:
      - id: "a"
        label: "OBS Studio"
      - id: "b"
        label: "Loom"
      - id: "c"
        label: "Camtasia"
      - id: "d"
        label: "Snagit"
      - id: "e"
        label: "ScreenFlow"
      - id: "f"
        label: "QuickTime Player"
      - id: "g"
        label: "Windows Game Bar / Xbox"
      - id: "h"
        label: "macOS built-in screenshot / recording"
      - id: "i"
        label: "ShareX"
      - id: "j"
        label: "Bandicam"
      - id: "k"
        label: "CleanShot X"
      - id: "l"
        label: "Screencastify"
      - id: "m"
        label: "Zoom / Teams recording"
      - id: "n"
        label: "Other"
  - id: q4
    prompt: "Which tool do you use most often for screen recording?"
    type: single_choice
    construct: tool_use_most_often_screen
    required: true
    options:
      - id: "a"
        label: "OBS Studio"
      - id: "b"
        label: "Loom"
      - id: "c"
        label: "Camtasia"
      - id: "d"
        label: "Snagit"
      - id: "e"
        label: "QuickTime Player"
      - id: "f"
        label: "Built-in OS tools (Game Bar / macOS)"
      - id: "g"
        label: "ShareX"
      - id: "h"
        label: "Zoom / Teams recording"
      - id: "i"
        label: "Other"
  - id: q5
