        label: "Full-motion video recording"
      - id: "b"
        label: "Static screenshots"
      - id: "c"
        label: "GIFs or short clips"
      - id: "d"
        label: "About equally video and screenshots"
  - id: q7
    prompt: "When recording video, do you typically also capture: (Select all that apply)"
    type: multi_choice
    construct: when_recording_video_typically_also
    required: true
