      - id: "c"
        label: "Full editing in a video editor"
      - id: "d"
        label: "Add captions or annotations"
      - id: "e"
        label: "Upload to YouTube or a platform"
      - id: "f"
        label: "Send the raw file directly"
      - id: "g"
        label: "Keep it as a personal reference"
  - id: q11
