      - id: "e"
        label: "Third-party / generic seller"
      - id: "f"
        label: "Warehouse club (Costco, Sam's)"
      - id: "g"
        label: "Subscription auto-delivery"
  - id: q27
    prompt: "What do you do when you don't have access to your own printer?"
    type: single_choice
    construct: when_don_t_have_access
    required: true
    options:
      - id: "a"
        label: "Use a printer at work or school"
      - id: "b"
        label: "Go to a print/copy shop (e.g., FedEx, UPS Store)"
      - id: "c"
        label: "Ask a friend or family member"
      - id: "d"
