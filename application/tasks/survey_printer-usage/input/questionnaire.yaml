        label: "Yes, seriously"
      - id: "b"
        label: "I've thought about it"
      - id: "c"
        label: "No, I still need it"
      - id: "d"
        label: "I don't own one anyway"
  - id: q29
    prompt: "Overall, how satisfied are you with your current printer?"
