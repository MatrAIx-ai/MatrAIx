schemaVersion: "1.0"
id: reit_investing_v1
title: "REIT Investing Survey"
description: "How people invest in real estate investment trusts (REITs) and REIT funds."
questions:
  - id: q0
    prompt: "Do you currently invest in any real estate investment trusts (REITs) or REIT funds?"
    type: single_choice
    construct: currently_invest_any_real_estate
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have in the past"
      - id: "c"
        label: "No, but I'm considering it"
      - id: "d"
        label: "No, and I'm not considering it"
  - id: q1
    prompt: "Before this survey, how familiar were you with REITs?"
    type: single_choice
    construct: before_this_survey_familiar_were
    required: true
    options:
      - id: "a"
        label: "Very familiar"
      - id: "b"
        label: "Somewhat familiar"
      - id: "c"
        label: "A little familiar"
      - id: "d"
        label: "Not familiar at all"
  - id: q2
    prompt: "How long have you been investing in REITs?"
    type: single_choice
    construct: long_have_been_investing_reits
    required: true
    options:
      - id: "a"
        label: "Less than a year"
      - id: "b"
        label: "1–3 years"
      - id: "c"
        label: "4–10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "I don't invest in REITs"
  - id: q3
    prompt: "How do you hold your REIT investments? (Select all that apply)"
    type: multi_choice
    construct: hold_reit_investments_select_all
    required: true
    options:
      - id: "a"
        label: "Individual publicly traded REITs"
      - id: "b"
        label: "A REIT ETF or index fund (e.g., VNQ, SCHH)"
      - id: "c"
        label: "A REIT mutual fund"
      - id: "d"
        label: "Non-traded or private REITs"
      - id: "e"
        label: "REITs inside a retirement account (401(k), IRA)"
      - id: "f"
        label: "Through a real estate crowdfunding platform (e.g., Fundrise)"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "Which types of REITs do you invest in? (Select all that apply)"
    type: multi_choice
    construct: types_reits_invest_select_all
    required: true
    options:
      - id: "a"
        label: "Residential (apartments, homes)"
      - id: "b"
        label: "Retail (shopping centers, malls)"
      - id: "c"
        label: "Office"
      - id: "d"
        label: "Industrial or warehouse"
      - id: "e"
        label: "Data centers or cell towers"
      - id: "f"
        label: "Healthcare (hospitals, senior housing)"
      - id: "g"
        label: "A diversified REIT fund"
      - id: "h"
        label: "I'm not sure which types"
      - id: "i"
        label: "Not applicable"
  - id: q5
    prompt: "What share of your total investments is in REITs? Please enter a percentage (enter 0 if none)."
    type: free_text
    construct: share_total_investments_reits_please
    required: true
  - id: q6
    prompt: "About how much do you have invested in REITs? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_have_invested_reits_please
    required: true
  - id: q7
    prompt: "About how much income (dividends) did your REITs pay you in the past year? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_income_dividends_did_reits
    required: true
  - id: q8
    prompt: "What are your main reasons for investing in REITs? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_investing_reits_select
    required: true
    options:
      - id: "a"
        label: "Regular dividend income"
      - id: "b"
        label: "Exposure to real estate without owning property"
      - id: "c"
        label: "Diversifying my portfolio"
      - id: "d"
        label: "Long-term growth"
      - id: "e"
        label: "Easier to buy and sell than physical property"
      - id: "f"
        label: "Protection against inflation"
      - id: "g"
        label: "Not applicable"
  - id: q9
    prompt: "How do you reinvest the dividends from your REITs?"
    type: single_choice
    construct: reinvest_dividends_from_reits
    required: true
    options:
      - id: "a"
        label: "Automatically reinvest them (DRIP)"
      - id: "b"
        label: "Take them as cash income"
      - id: "c"
        label: "A mix of both"
      - id: "d"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree with the following statement about REITs? They are a good way to earn passive income."
    type: single_choice
    construct: much_agree_following_statement_reits
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
