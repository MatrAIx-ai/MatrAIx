schemaVersion: "1.0"
id: financial_influencer_trust_v1
title: "Financial Influencer Trust Survey"
description: "How people follow and trust financial influencers (\"finfluencers\") on social media and how their content affects money decisions."
questions:
  - id: q0
    prompt: "Do you follow any financial influencers or creators who share money, investing, or budgeting advice online?"
    type: single_choice
    construct: follow_any_financial_influencers_creator
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, a few"
      - id: "c"
        label: "No, but I sometimes see their content"
      - id: "d"
        label: "No, and I actively avoid it"
      - id: "e"
        label: "I'm not sure what a financial influencer is"
  - id: q1
    prompt: "How often do you see financial advice content on social media?"
    type: single_choice
    construct: often_see_financial_advice_content
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q2
    prompt: "On which platforms do you come across financial influencer content? (Select all that apply)"
    type: multi_choice
    construct: platforms_come_across_financial_influenc
    required: true
    options:
      - id: "a"
        label: "YouTube"
      - id: "b"
        label: "TikTok"
      - id: "c"
        label: "Instagram"
      - id: "d"
        label: "X (Twitter)"
      - id: "e"
        label: "Reddit"
      - id: "f"
        label: "Facebook"
      - id: "g"
        label: "Podcasts"
      - id: "h"
        label: "I don't come across it anywhere"
  - id: q3
    prompt: "About how many financial influencers or creators do you actively follow? Please enter a number."
    type: free_text
    construct: many_financial_influencers_creators_acti
    required: true
  - id: q4
    prompt: "What kinds of financial content do you engage with most? (Select all that apply)"
    type: multi_choice
    construct: kinds_financial_content_engage_most
    required: true
    options:
      - id: "a"
        label: "Budgeting and saving tips"
      - id: "b"
        label: "Stock or ETF investing ideas"
      - id: "c"
        label: "Cryptocurrency"
      - id: "d"
        label: "Real estate investing"
      - id: "e"
        label: "Side hustles and making money"
      - id: "f"
        label: "Getting out of debt"
      - id: "g"
        label: "Retirement and long-term planning"
      - id: "h"
        label: "Deals, coupons, and frugal living"
      - id: "i"
        label: "I don't engage with financial content"
  - id: q5
    prompt: "How long have you been following financial influencers?"
    type: single_choice
    construct: long_have_been_following_financial
    required: true
    options:
