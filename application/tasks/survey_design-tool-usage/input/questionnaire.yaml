        label: "UI / UX design (apps, websites)"
      - id: "b"
        label: "Graphic design (logos, branding, print)"
      - id: "c"
        label: "Social media graphics"
      - id: "d"
        label: "Photo editing / retouching"
      - id: "e"
        label: "Illustration or digital art"
      - id: "f"
        label: "Presentations / slide decks"
      - id: "g"
        label: "Motion graphics or animation"
      - id: "h"
        label: "Video thumbnails / marketing assets"
      - id: "i"
        label: "Prototyping and wireframing"
      - id: "j"
        label: "3D or product design"
  - id: q3
    prompt: "Which design tools do you currently use? (Select all that apply)"
    type: multi_choice
    construct: design_tools_currently_use_select
    required: true
    options:
      - id: "a"
        label: "Figma"
      - id: "b"
        label: "Adobe Photoshop"
      - id: "c"
        label: "Adobe Illustrator"
      - id: "d"
        label: "Adobe XD"
      - id: "e"
        label: "Adobe InDesign"
      - id: "f"
        label: "Canva"
      - id: "g"
        label: "Sketch"
      - id: "h"
        label: "Affinity (Designer / Photo / Publisher)"
      - id: "i"
        label: "Procreate"
      - id: "j"
        label: "CorelDRAW"
      - id: "k"
        label: "GIMP"
      - id: "l"
        label: "Inkscape"
      - id: "m"
        label: "Framer"
      - id: "n"
        label: "Penpot"
      - id: "o"
        label: "Other"
