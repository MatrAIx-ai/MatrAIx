schemaVersion: "1.0"
id: design_tool_usage_v1
title: "Design & Creative Tool Usage Survey"
description: "Which graphic, UX, and creative design tools people use, how they use them, and how satisfied they are."
questions:
  - id: q0
    prompt: "Which best describes how you use design or creative software?"
    type: single_choice
    construct: best_describes_use_design_creative
    required: true
    options:
      - id: "a"
        label: "Professional designer (it is my main job)"
      - id: "b"
        label: "Design is part of a broader role (marketing, product, dev, etc.)"
      - id: "c"
        label: "Freelancer or side-business designer"
      - id: "d"
        label: "Student learning design"
      - id: "e"
        label: "Hobbyist or personal projects only"
      - id: "f"
        label: "I rarely or never use design tools"
  - id: q1
    prompt: "How many years have you been using design or creative software?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q2
    prompt: "What kinds of design work do you do most? (Select all that apply)"
    type: multi_choice
    construct: kinds_design_work_most_select
    required: true
    options:
