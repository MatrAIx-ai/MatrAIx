schemaVersion: "1.0"
id: alternative_medicine_v1
title: "Alternative and Complementary Medicine Survey"
description: "Consumer use of and attitudes toward complementary and alternative health approaches."
questions:
  - id: q0
    prompt: "Have you ever used any complementary or alternative health approaches?"
    type: single_choice
    construct: have_ever_used_any_complementary
    required: true
    options:
      - id: "a"
        label: "Yes, I use them regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Yes, but not anymore"
      - id: "d"
        label: "No, but I'm curious"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Which approaches have you tried? (Select all that apply)"
    type: multi_choice
    construct: approaches_have_tried_select_all
    required: true
    options:
      - id: "a"
        label: "Herbal or botanical supplements"
      - id: "b"
        label: "Vitamins and minerals"
      - id: "c"
        label: "Acupuncture"
      - id: "d"
        label: "Massage therapy"
      - id: "e"
        label: "Yoga or tai chi"
      - id: "f"
        label: "Meditation or mindfulness"
      - id: "g"
        label: "Chiropractic care"
      - id: "h"
        label: "Aromatherapy or essential oils"
      - id: "i"
        label: "None of these"
