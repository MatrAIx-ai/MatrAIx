        label: "Short-form social (Reels, TikTok, Shorts)"
      - id: "b"
        label: "Long-form YouTube videos"
      - id: "c"
        label: "Vlogs or personal videos"
      - id: "d"
        label: "Marketing / promotional / ads"
      - id: "e"
        label: "Corporate or training videos"
      - id: "f"
        label: "Films, documentaries, or narratives"
      - id: "g"
        label: "Gaming or stream highlights"
      - id: "h"
        label: "Event videos (weddings, etc.)"
      - id: "i"
        label: "Tutorials or educational content"
  - id: q3
    prompt: "Which video editing tools do you currently use? (Select all that apply)"
    type: multi_choice
    construct: video_editing_tools_currently_use
    required: true
