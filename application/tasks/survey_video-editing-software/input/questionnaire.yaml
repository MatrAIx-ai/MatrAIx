schemaVersion: "1.0"
id: video_editing_software_v1
title: "Video Editing Software Survey"
description: "Which video editing software people use, how they edit, and how satisfied they are with their tools."
questions:
  - id: q0
    prompt: "Which best describes how you edit video?"
    type: single_choice
    construct: best_describes_edit_video
    required: true
    options:
      - id: "a"
        label: "Professional video editor (it is my main job)"
      - id: "b"
        label: "Content creator / YouTuber / streamer"
      - id: "c"
        label: "Editing is part of a broader role (marketing, social, etc.)"
      - id: "d"
        label: "Freelancer or side business"
      - id: "e"
        label: "Hobbyist / personal projects only"
      - id: "f"
        label: "I rarely or never edit video"
  - id: q1
    prompt: "How many years have you been editing video?"
    type: free_text
    construct: many_years_have_been_editing
    required: true
  - id: q2
    prompt: "What kinds of video do you edit most? (Select all that apply)"
    type: multi_choice
    construct: kinds_video_edit_most_select
    required: true
    options:
