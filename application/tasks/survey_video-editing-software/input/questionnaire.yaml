      - id: "b"
        label: "DaVinci Resolve"
      - id: "c"
        label: "Final Cut Pro"
      - id: "d"
        label: "CapCut"
      - id: "e"
        label: "iMovie"
      - id: "f"
        label: "Adobe After Effects"
      - id: "g"
        label: "Filmora (Wondershare)"
      - id: "h"
        label: "Vegas Pro"
      - id: "i"
        label: "HitFilm"
      - id: "j"
