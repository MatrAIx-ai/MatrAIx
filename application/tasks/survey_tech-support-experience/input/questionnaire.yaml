schemaVersion: "1.0"
id: tech_support_experience_v1
title: "Tech Support Experience Survey"
description: "People's experiences seeking and receiving technical support for their devices, software, and services."
questions:
  - id: q0
    prompt: "In the past 12 months, have you contacted technical support for a device, app, or service?"
    type: single_choice
    construct: past_12_months_have_contacted
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I've needed help"
      - id: "e"
        label: "No, I haven't needed any"
  - id: q1
    prompt: "Which of the following have you contacted for tech support in the past year? (Select all that apply)"
    type: multi_choice
    construct: following_have_contacted_tech_support
    required: true
    options:
      - id: "a"
        label: "Phone or device manufacturer"
      - id: "b"
        label: "Internet or mobile carrier"
      - id: "c"
        label: "Software or app company"
      - id: "d"
        label: "Retailer where I bought the product"
      - id: "e"
        label: "Streaming or subscription service"
      - id: "f"
        label: "Bank or financial app support"
      - id: "g"
        label: "My workplace IT / help desk"
      - id: "h"
        label: "A friend or family member"
      - id: "i"
        label: "A local repair shop or technician"
      - id: "j"
        label: "I haven't contacted any"
  - id: q2
    prompt: "Which channels have you used to get tech support? (Select all that apply)"
    type: multi_choice
    construct: channels_have_used_get_tech
    required: true
    options:
      - id: "a"
        label: "Phone call"
      - id: "b"
        label: "Live chat"
      - id: "c"
        label: "Email or support ticket"
      - id: "d"
        label: "In-app help / chatbot"
      - id: "e"
        label: "In-person / store visit"
      - id: "f"
        label: "Social media / direct message"
      - id: "g"
        label: "Community forums"
      - id: "h"
        label: "Video call / screen share"
      - id: "i"
        label: "Self-service help articles"
      - id: "j"
        label: "I haven't used any"
  - id: q3
    prompt: "When you have a tech problem, where do you usually turn FIRST?"
    type: single_choice
    construct: when_have_tech_problem_where
    required: true
    options:
      - id: "a"
        label: "Search the web"
      - id: "b"
        label: "Official help articles or FAQs"
      - id: "c"
        label: "Ask an AI chatbot"
      - id: "d"
        label: "Contact the company's support"
      - id: "e"
        label: "Ask a friend or family member"
      - id: "f"
        label: "Community forums or Reddit"
      - id: "g"
        label: "YouTube tutorials"
      - id: "h"
        label: "I try to fix it myself first"
  - id: q4
    prompt: "How often do you try to solve a tech problem yourself before contacting support?"
    type: single_choice
    construct: often_try_solve_tech_problem
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q5
    prompt: "For your most recent support experience, what was the issue about?"
    type: single_choice
    construct: most_recent_support_experience_was
    required: true
    options:
      - id: "a"
        label: "Device not working / hardware"
      - id: "b"
        label: "Software bug or crash"
      - id: "c"
        label: "Account or login problem"
      - id: "d"
        label: "Billing or subscription issue"
      - id: "e"
        label: "Internet / connectivity"
      - id: "f"
        label: "Setup or installation"
      - id: "g"
        label: "Security concern (hacking, scam, etc.)"
      - id: "h"
        label: "How to use a feature"
      - id: "i"
        label: "Not applicable"
  - id: q6
    prompt: "For your most recent support experience, how was the issue ultimately resolved?"
    type: single_choice
    construct: most_recent_support_experience_was
    required: true
    options:
      - id: "a"
        label: "Fully resolved by support"
      - id: "b"
        label: "Partially resolved"
      - id: "c"
        label: "I resolved it myself"
      - id: "d"
        label: "Not resolved"
      - id: "e"
        label: "I gave up"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "About how long did it take to get your most recent issue resolved?"
    type: single_choice
    construct: long_did_it_take_get
    required: true
    options:
      - id: "a"
        label: "Minutes"
      - id: "b"
        label: "A few hours"
      - id: "c"
        label: "About a day"
      - id: "d"
        label: "A few days"
      - id: "e"
        label: "More than a week"
      - id: "f"
        label: "It was never resolved"
      - id: "g"
        label: "Not applicable"
  - id: q8
    prompt: "How many times did you have to contact support before your most recent issue was addressed?"
    type: free_text
    construct: many_times_did_have_contact
    required: true
  - id: q9
    prompt: "In a typical year, about how many times do you seek technical support of any kind?"
    type: free_text
    construct: typical_year_many_times_seek
    required: true
  - id: q10
    prompt: "Which of the following have frustrated you during tech support experiences? (Select all that apply)"
    type: multi_choice
    construct: following_have_frustrated_during_tech
    required: true
    options:
      - id: "a"
        label: "Long wait times or hold"
      - id: "b"
        label: "Being transferred repeatedly"
      - id: "c"
        label: "Having to repeat my problem"
      - id: "d"
        label: "Scripted, unhelpful responses"
      - id: "e"
        label: "Language or communication barriers"
      - id: "f"
        label: "Chatbots that couldn't help"
      - id: "g"
        label: "Being told to try steps I'd already tried"
      - id: "h"
        label: "Difficulty reaching a human"
      - id: "i"
        label: "Unclear or confusing instructions"
      - id: "j"
        label: "None of these"
  - id: q11
    prompt: "How do you feel about automated chatbots for tech support?"
    type: single_choice
    construct: feel_automated_chatbots_tech_support
    required: true
    options:
      - id: "a"
        label: "I like them — often faster"
      - id: "b"
        label: "They're fine for simple issues"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "I dislike them but tolerate them"
      - id: "e"
        label: "I avoid them and want a human"
  - id: q12
    prompt: "How much do you agree with the following statement: Getting good tech support is usually harder than it should be."
    type: single_choice
    construct: much_agree_following_statement_getting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I prefer to solve tech problems myself rather than contact support."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Support agents are usually knowledgeable and helpful."
    type: single_choice
    construct: much_agree_following_statement_support
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: Companies make it deliberately hard to reach a real person."
    type: single_choice
