schemaVersion: "1.0"
id: health_screening_participation_v1
title: "Health Screening Participation Survey"
description: "Consumer participation in routine health screenings, including blood pressure, cholesterol, blood sugar, and age-appropriate screening tests, and the barriers that affect it."
questions:
  - id: q0
    prompt: "In general, how would you describe your participation in recommended health screenings?"
    type: single_choice
    construct: general_would_describe_participation_rec
    required: true
    options:
      - id: "a"
        label: "I stay fully up to date"
      - id: "b"
        label: "I stay mostly up to date"
      - id: "c"
        label: "I get some but not all"
      - id: "d"
        label: "I rarely get screened"
      - id: "e"
        label: "I never get screened"
  - id: q1
    prompt: "When did you last have any kind of health screening test?"
    type: single_choice
    construct: when_did_last_have_any
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "Never"
  - id: q2
    prompt: "Which of the following screenings have you had in the past three years? (Select all that apply)"
    type: multi_choice
    construct: following_screenings_have_had_past
    required: true
    options:
      - id: "a"
        label: "Blood pressure check"
      - id: "b"
        label: "Cholesterol test"
      - id: "c"
        label: "Blood sugar or diabetes screening"
      - id: "d"
        label: "Body weight or BMI check"
      - id: "e"
        label: "Vision screening"
      - id: "f"
        label: "Hearing screening"
      - id: "g"
        label: "An age-appropriate cancer screening"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "Where do you most often get screened?"
    type: single_choice
    construct: where_most_often_get_screened
    required: true
    options:
      - id: "a"
        label: "My primary care provider's office"
      - id: "b"
        label: "A specialist's office"
      - id: "c"
        label: "A pharmacy or retail clinic"
      - id: "d"
        label: "A workplace health event or screening"
      - id: "e"
        label: "A community health fair or clinic"
      - id: "f"
        label: "At home with a self-test"
  - id: q4
    prompt: "How do you usually learn that a screening is due?"
    type: single_choice
    construct: usually_learn_that_screening_due
    required: true
    options:
      - id: "a"
        label: "My provider tells me"
      - id: "b"
        label: "A reminder from my patient portal or app"
      - id: "c"
        label: "My insurer notifies me"
      - id: "d"
        label: "I track it myself"
      - id: "e"
        label: "A family member reminds me"
      - id: "f"
        label: "I usually do not know when I am due"
  - id: q5
    prompt: "In the past year, how many times did you have a screening test of any kind? Please enter a number."
    type: free_text
    construct: past_year_many_times_did
    required: true
  - id: q6
    prompt: "Which of the following do you typically do at a workplace or community screening event? (Select all that apply)"
    type: multi_choice
    construct: following_typically_workplace_community_
    required: true
    options:
      - id: "a"
        label: "Blood pressure check"
      - id: "b"
        label: "Cholesterol finger-stick test"
      - id: "c"
        label: "Blood sugar check"
      - id: "d"
        label: "Body weight or BMI check"
      - id: "e"
        label: "A wellness questionnaire"
      - id: "f"
        label: "I have not attended these events"
  - id: q7
    prompt: "How much do you agree or disagree: Regular screening helps catch health problems early."
    type: single_choice
    construct: much_agree_disagree_regular_screening
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q8
    prompt: "How much do you agree or disagree: I feel comfortable getting screening tests."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree or disagree: I understand what my screening results mean."
    type: single_choice
    construct: much_agree_disagree_i_understand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: I worry about what a screening might find."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: It is easy for me to get screening tests when I need them."
    type: single_choice
    construct: much_agree_disagree_it_easy
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I keep track of which screenings I am due for."
    type: single_choice
    construct: much_agree_disagree_i_keep
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much of a barrier is each of the following to getting screened: cost or coverage?"
    type: single_choice
    construct: much_barrier_each_following_getting
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q14
    prompt: "How much of a barrier is each of the following to getting screened: time or scheduling?"
    type: single_choice
    construct: much_barrier_each_following_getting
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q15
    prompt: "How much of a barrier is each of the following to getting screened: not knowing what I need?"
    type: single_choice
    construct: much_barrier_each_following_getting
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q16
    prompt: "How much of a barrier is each of the following to getting screened: fear or discomfort with the test?"
    type: single_choice
    construct: much_barrier_each_following_getting
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q17
    prompt: "How much of a barrier is each of the following to getting screened: distance or transportation?"
    type: single_choice
    construct: much_barrier_each_following_getting
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q18
    prompt: "How often do you follow up on an abnormal or borderline screening result?"
    type: single_choice
    construct: often_follow_up_abnormal_borderline
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I have not had one"
  - id: q19
    prompt: "How do you usually receive your screening results?"
    type: single_choice
    construct: usually_receive_screening_results
    required: true
    options:
      - id: "a"
        label: "Through an online patient portal"
      - id: "b"
        label: "A phone call"
      - id: "c"
        label: "An in-person conversation"
      - id: "d"
        label: "A letter or email"
      - id: "e"
        label: "I often do not receive results"
  - id: q20
    prompt: "How confident are you in interpreting a screening result on your own?"
    type: single_choice
    construct: confident_interpreting_screening_result_
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "A little confident"
      - id: "c"
        label: "Somewhat confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q21
    prompt: "Have you ever used an at-home screening test (for example, a mailed kit or home blood pressure device)?"
    type: single_choice
    construct: have_ever_used_home_screening
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I would consider it"
      - id: "d"
        label: "No, and I would not"
  - id: q22
    prompt: "Which of the following would make you more likely to participate in screenings? (Select all that apply)"
    type: multi_choice
    construct: following_would_make_more_likely
    required: true
    options:
      - id: "a"
        label: "Lower or no cost"
      - id: "b"
        label: "Reminders when I am due"
      - id: "c"
        label: "More convenient locations"
      - id: "d"
        label: "At-home testing options"
      - id: "e"
        label: "Clearer explanations of results"
      - id: "f"
        label: "Evening or weekend availability"
      - id: "g"
        label: "Encouragement from my provider"
  - id: q23
    prompt: "How important is it to you to stay up to date on recommended screenings?"
    type: single_choice
    construct: important_it_stay_up_date
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q24
    prompt: "How likely are you to get a recommended screening in the next year?"
    type: single_choice
    construct: likely_get_recommended_screening_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q25
    prompt: "Overall, how satisfied are you with your access to health screenings?"
    type: single_choice
    construct: overall_satisfied_access_health_screenin
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q26
    prompt: "How would you rate the overall screening experience you have received?"
    type: single_choice
    construct: would_rate_overall_screening_experience
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q27
    prompt: "On a scale of 0 to 10, how likely are you to recommend routine screening to a friend or family member? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
    construct: scale_0_10_likely_recommend
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q28
    prompt: "Which factors most influence whether you participate in a screening? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: factors_most_influence_whether_participa
    required: true
    options:
      - id: "a"
        label: "Cost"
      - id: "b"
        label: "Convenience and location"
      - id: "c"
        label: "My doctor's recommendation"
      - id: "d"
        label: "My personal or family health history"
      - id: "e"
        label: "How the test is done (comfort)"
      - id: "f"
        label: "Reminders that I am due"
      - id: "g"
        label: "Clear information about the test"
      - id: "h"
        label: "Peace of mind"
  - id: q29
    prompt: "How many hours per year, on average, do you spend on health screenings? Please enter a number."
    type: free_text
    construct: many_hours_per_year_average
    required: true
  - id: q30
    prompt: "What is your age band?"
    type: single_choice
