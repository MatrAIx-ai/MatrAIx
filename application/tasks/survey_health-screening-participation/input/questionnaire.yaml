        label: "25–34"
      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65–74"
      - id: "g"
        label: "75 or older"
  - id: q31
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: race_ethnicity_select_all_that
    required: true
    options:
