schemaVersion: "1.0"
id: telemedicine_specialists_v1
title: "Telemedicine with Specialists Survey"
description: "Consumer use of, experience with, and attitudes toward seeing medical specialists through telehealth."
questions:
  - id: q0
    prompt: "In the past 12 months, have you had a telehealth visit with a medical specialist (not your primary care doctor)?"
    type: single_choice
    construct: past_12_months_have_had
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, I have never had a specialist telehealth visit"
  - id: q1
    prompt: "How long ago was your most recent specialist telehealth visit?"
    type: single_choice
    construct: long_ago_was_most_recent
    required: true
    options:
      - id: "a"
        label: "Within the past month"
      - id: "b"
        label: "1 to 3 months ago"
      - id: "c"
        label: "4 to 12 months ago"
      - id: "d"
        label: "More than a year ago"
      - id: "e"
        label: "I have never had one"
  - id: q2
    prompt: "Which types of specialists have you seen through telehealth? (Select all that apply)"
    type: multi_choice
    construct: types_specialists_have_seen_through
    required: true
    options:
      - id: "a"
        label: "Dermatology (skin)"
      - id: "b"
        label: "Cardiology (heart)"
      - id: "c"
        label: "Mental or behavioral health"
      - id: "d"
        label: "Endocrinology (for example, diabetes or thyroid)"
      - id: "e"
        label: "Allergy or immunology"
      - id: "f"
        label: "Gastroenterology"
      - id: "g"
        label: "Neurology"
      - id: "h"
        label: "Nutrition or dietitian"
      - id: "i"
        label: "Another specialty"
      - id: "j"
        label: "I have not seen a specialist by telehealth"
  - id: q3
    prompt: "How was your most recent specialist telehealth visit conducted?"
    type: single_choice
    construct: was_most_recent_specialist_telehealth
    required: true
    options:
      - id: "a"
        label: "Video call"
      - id: "b"
        label: "Phone call (voice only)"
      - id: "c"
        label: "Secure messaging or chat"
      - id: "d"
        label: "A mix of these"
      - id: "e"
        label: "I have not had one"
  - id: q4
    prompt: "How did you connect to your most recent specialist telehealth visit?"
    type: single_choice
    construct: did_connect_most_recent_specialist
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Laptop or desktop computer"
      - id: "d"
        label: "Phone call on a landline"
      - id: "e"
        label: "I have not had one"
  - id: q5
    prompt: "Which platform or service did you use for your specialist telehealth visit?"
    type: single_choice
    construct: platform_service_did_use_specialist
    required: true
    options:
      - id: "a"
        label: "The specialist's own patient portal or app"
      - id: "b"
        label: "A hospital or health-system app"
      - id: "c"
        label: "A standalone telehealth service (for example, Teladoc, Amwell, MDLIVE)"
      - id: "d"
        label: "A general video app (for example, Zoom, FaceTime)"
      - id: "e"
        label: "Not sure"
      - id: "f"
        label: "I have not had one"
  - id: q6
    prompt: "How did you first arrange your specialist telehealth visit?"
    type: single_choice
    construct: did_first_arrange_specialist_telehealth
    required: true
    options:
      - id: "a"
        label: "Referral from my primary care doctor"
      - id: "b"
        label: "I contacted the specialist's office directly"
      - id: "c"
        label: "Through my insurance's telehealth service"
      - id: "d"
        label: "Through a hospital or health system"
      - id: "e"
        label: "Another way"
  - id: q7
    prompt: "What were the main reasons you chose telehealth for a specialist visit? (Select all that apply)"
    type: multi_choice
    construct: were_main_reasons_chose_telehealth
    required: true
    options:
      - id: "a"
        label: "The specialist was far from where I live"
      - id: "b"
        label: "It saved travel time"
      - id: "c"
        label: "It was easier to fit into my schedule"
      - id: "d"
        label: "Shorter wait for an appointment"
      - id: "e"
        label: "It was recommended or required by the provider"
      - id: "f"
        label: "To avoid exposure to illness"
      - id: "g"
        label: "I could include a family member or caregiver"
      - id: "h"
        label: "I have not had one"
  - id: q8
    prompt: "How long did you wait to get your specialist telehealth appointment?"
    type: single_choice
    construct: long_did_wait_get_specialist
    required: true
    options:
      - id: "a"
        label: "Same or next day"
      - id: "b"
        label: "Within a week"
      - id: "c"
        label: "1 to 2 weeks"
      - id: "d"
        label: "3 to 4 weeks"
      - id: "e"
        label: "More than a month"
      - id: "f"
        label: "I have not had one"
  - id: q9
    prompt: "Did your specialist telehealth visit replace or add to an in-person visit?"
    type: single_choice
    construct: did_specialist_telehealth_visit_replace
    required: true
    options:
      - id: "a"
        label: "It replaced an in-person visit"
      - id: "b"
        label: "It was in addition to in-person care"
      - id: "c"
        label: "It was a follow-up after an in-person visit"
      - id: "d"
        label: "It led to an in-person visit being scheduled"
      - id: "e"
        label: "I have not had one"
  - id: q10
    prompt: "How much do you agree with the following statement: The specialist could address my concerns well over telehealth."
    type: single_choice
    construct: much_agree_following_statement_specialis
