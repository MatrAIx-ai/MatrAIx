    prompt: "Do you use social media?"
    type: single_choice
    construct: use_social_media
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Yes, but only occasionally"
      - id: "d"
        label: "No, I do not use social media"
  - id: q1
    prompt: "About how many years have you been using social media?"
    type: single_choice
    construct: many_years_have_been_using
    required: true
    options:
