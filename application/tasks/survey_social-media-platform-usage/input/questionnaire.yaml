        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 to 12 years"
      - id: "e"
        label: "More than 12 years"
  - id: q2
    prompt: "Which social media platforms do you currently have an account on? (Select all that apply)"
