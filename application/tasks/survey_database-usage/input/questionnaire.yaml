      - id: "d"
        label: "TablePlus"
      - id: "e"
        label: "MySQL Workbench"
      - id: "f"
        label: "Azure Data Studio"
      - id: "g"
        label: "The psql / mysql command line"
      - id: "h"
        label: "MongoDB Compass"
      - id: "i"
        label: "None"
