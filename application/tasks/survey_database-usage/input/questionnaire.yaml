schemaVersion: "1.0"
id: database_usage_v1
title: "Database Usage Survey"
description: "How developers and data professionals choose, use, and manage databases."
questions:
  - id: q0
    prompt: "How often do you work with databases?"
    type: single_choice
    construct: often_work_databases
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning databases"
      - id: "e"
        label: "I don't work with databases"
  - id: q1
    prompt: "How long have you worked with databases?"
    type: single_choice
    construct: long_have_worked_databases
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What is your relationship to databases?"
    type: single_choice
    construct: relationship_databases
    required: true
    options:
      - id: "a"
        label: "Database administrator (DBA)"
      - id: "b"
        label: "Developer who uses databases in applications"
      - id: "c"
        label: "Data engineer"
      - id: "d"
        label: "Data analyst or scientist"
      - id: "e"
        label: "I use databases occasionally"
  - id: q3
    prompt: "Which database do you use most often?"
    type: single_choice
    construct: database_use_most_often
    required: true
    options:
      - id: "a"
        label: "PostgreSQL"
      - id: "b"
        label: "MySQL"
      - id: "c"
        label: "Microsoft SQL Server"
      - id: "d"
        label: "Oracle Database"
      - id: "e"
        label: "SQLite"
      - id: "f"
        label: "MongoDB"
      - id: "g"
        label: "Redis"
      - id: "h"
        label: "MariaDB"
      - id: "i"
        label: "Other"
  - id: q4
    prompt: "Which relational databases have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: relational_databases_have_used_past
    required: true
    options:
      - id: "a"
        label: "PostgreSQL"
      - id: "b"
        label: "MySQL"
      - id: "c"
        label: "MariaDB"
      - id: "d"
        label: "Microsoft SQL Server"
      - id: "e"
        label: "Oracle Database"
      - id: "f"
        label: "SQLite"
      - id: "g"
        label: "IBM Db2"
      - id: "h"
        label: "CockroachDB"
      - id: "i"
        label: "None"
