schemaVersion: "1.0"
id: laptop_purchasing_v1
title: "Laptop Purchasing Survey"
description: "How consumers research, choose, and buy laptop computers — brands, budgets, purchase channels, decision criteria, and satisfaction with their choices."
questions:
  - id: q0
    prompt: "Do you personally own or regularly use a laptop?"
    type: single_choice
    construct: personally_own_regularly_use_laptop
    required: true
    options:
      - id: "a"
        label: "Yes, I own one"
      - id: "b"
        label: "Yes, I use one provided by work or school"
      - id: "c"
        label: "No, but I plan to buy one soon"
      - id: "d"
        label: "No, I mainly use a desktop, tablet, or phone"
  - id: q1
    prompt: "When did you most recently purchase a laptop?"
    type: single_choice
    construct: when_did_most_recently_purchase
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 months to 1 year ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "I've never bought one myself"
  - id: q2
    prompt: "How many laptops does your household currently own? Enter a whole number."
    type: free_text
    construct: many_laptops_does_household_currently
    required: true
  - id: q3
    prompt: "What is the main way you use your laptop? (Select all that apply)"
    type: multi_choice
    construct: main_way_use_laptop_select
    required: true
    options:
      - id: "a"
        label: "Web browsing and email"
      - id: "b"
        label: "Work / productivity (office apps, documents)"
      - id: "c"
        label: "School or coursework"
      - id: "d"
        label: "Programming / software development"
      - id: "e"
        label: "Photo or video editing"
      - id: "f"
        label: "Graphic design or creative work"
      - id: "g"
        label: "Gaming"
      - id: "h"
        label: "Streaming video and media"
      - id: "i"
        label: "Financial management"
      - id: "j"
        label: "General entertainment"
  - id: q4
    prompt: "Which laptop brand do you currently use most?"
    type: single_choice
    construct: laptop_brand_currently_use_most
    required: true
    options:
      - id: "a"
        label: "Apple (MacBook)"
      - id: "b"
        label: "Dell"
      - id: "c"
        label: "HP"
      - id: "d"
        label: "Lenovo"
      - id: "e"
        label: "ASUS"
      - id: "f"
        label: "Acer"
      - id: "g"
        label: "Microsoft (Surface)"
      - id: "h"
        label: "Samsung"
      - id: "i"
        label: "MSI / Razer / other gaming brand"
      - id: "j"
        label: "Other"
  - id: q5
    prompt: "Which operating system does your current laptop run?"
    type: single_choice
    construct: operating_system_does_current_laptop
    required: true
    options:
      - id: "a"
        label: "Windows"
      - id: "b"
        label: "macOS"
      - id: "c"
        label: "ChromeOS"
      - id: "d"
        label: "Linux"
      - id: "e"
        label: "Not sure"
  - id: q6
    prompt: "How much did you spend on your most recent laptop? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: much_did_spend_most_recent
    required: true
  - id: q7
    prompt: "What price range are you comfortable spending on a laptop?"
    type: single_choice
    construct: price_range_comfortable_spending_laptop
    required: true
