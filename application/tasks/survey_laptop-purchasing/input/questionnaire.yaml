        label: "Under $400"
      - id: "b"
        label: "$400-$699"
      - id: "c"
        label: "$700-$999"
      - id: "d"
        label: "$1,000-$1,499"
      - id: "e"
        label: "$1,500-$1,999"
      - id: "f"
        label: "$2,000 or more"
  - id: q8
