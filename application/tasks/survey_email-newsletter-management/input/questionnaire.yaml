        label: "Inbox Zero — I keep it empty"
      - id: "b"
        label: "Well managed — few unread"
      - id: "c"
        label: "Somewhat cluttered"
      - id: "d"
        label: "Very cluttered"
      - id: "e"
        label: "Overwhelmed — thousands of unread messages"
      - id: "f"
        label: "Not sure"
  - id: q1
    prompt: "How many email newsletters are you currently subscribed to?"
    type: single_choice
    construct: many_email_newsletters_currently_subscri
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1-5"
      - id: "c"
        label: "6-15"
      - id: "d"
        label: "16-30"
      - id: "e"
        label: "31-50"
