schemaVersion: "1.0"
id: personal_loans_v1
title: "Personal Loans Survey"
description: "How consumers use, shop for, and manage unsecured personal installment loans."
questions:
  - id: q0
    prompt: "Have you ever taken out a personal loan (an installment loan not tied to a specific purchase like a car or home)?"
    type: single_choice
    construct: have_ever_taken_out_personal
    required: true
    options:
      - id: "a"
        label: "Yes, I currently have one or more"
      - id: "b"
        label: "Yes, in the past but not currently"
      - id: "c"
        label: "No, but I have applied or considered it"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "How many personal loans do you currently have outstanding?"
    type: single_choice
    construct: many_personal_loans_currently_have
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3 or more"
  - id: q2
    prompt: "For what purposes have you used personal loans? (Select all that apply)"
    type: multi_choice
    construct: purposes_have_used_personal_loans
    required: true
    options:
      - id: "a"
        label: "Consolidating or paying off credit card debt"
      - id: "b"
        label: "Home improvement or repairs"
      - id: "c"
        label: "A major purchase (appliance, furniture, electronics)"
      - id: "d"
        label: "Medical or dental expenses"
      - id: "e"
        label: "A wedding, vacation, or other event"
      - id: "f"
        label: "Covering an emergency or unexpected bill"
      - id: "g"
        label: "Moving or relocation costs"
      - id: "h"
        label: "I have never taken a personal loan"
  - id: q3
    prompt: "Where did you get (or would you get) your most recent personal loan?"
    type: single_choice
    construct: where_did_get_would_get
    required: true
    options:
      - id: "a"
        label: "Traditional bank"
      - id: "b"
        label: "Credit union"
      - id: "c"
        label: "Online lender or fintech (e.g., SoFi, LendingClub, Upstart, Marcus)"
      - id: "d"
        label: "Buy now, pay later or point-of-sale lender"
      - id: "e"
        label: "Family or friend"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "About how much was your most recent personal loan? Please enter a dollar amount."
    type: free_text
    construct: much_was_most_recent_personal
    required: true
  - id: q5
    prompt: "What was the term (length) of your most recent personal loan?"
    type: single_choice
    construct: was_term_length_most_recent
    required: true
    options:
      - id: "a"
        label: "12 months or less"
      - id: "b"
        label: "13 to 24 months"
      - id: "c"
        label: "25 to 36 months"
      - id: "d"
        label: "37 to 60 months"
      - id: "e"
        label: "More than 60 months"
      - id: "f"
        label: "Not applicable"
  - id: q6
    prompt: "What was the approximate annual percentage rate (APR) on your most recent personal loan?"
    type: single_choice
    construct: was_approximate_annual_percentage_rate
    required: true
    options:
      - id: "a"
        label: "Under 8%"
      - id: "b"
        label: "8% to 11.9%"
      - id: "c"
        label: "12% to 17.9%"
      - id: "d"
        label: "18% to 24.9%"
      - id: "e"
        label: "25% to 35.9%"
      - id: "f"
        label: "36% or higher"
      - id: "g"
        label: "Don't know"
  - id: q7
    prompt: "About how much is your current monthly personal loan payment? Please enter a dollar amount."
    type: free_text
    construct: much_current_monthly_personal_loan
    required: true
  - id: q8
    prompt: "Was your most recent personal loan secured or unsecured?"
    type: single_choice
    construct: was_most_recent_personal_loan
    required: true
    options:
      - id: "a"
        label: "Unsecured (no collateral)"
      - id: "b"
        label: "Secured (backed by savings, a vehicle, or other collateral)"
      - id: "c"
        label: "Don't know"
      - id: "d"
        label: "Not applicable"
  - id: q9
    prompt: "How did you first find or research the lender for your most recent personal loan?"
    type: single_choice
    construct: did_first_find_research_lender
    required: true
    options:
      - id: "a"
        label: "Existing relationship with my bank or credit union"
      - id: "b"
        label: "Online search or comparison site"
      - id: "c"
        label: "A prequalification offer I received in the mail or email"
      - id: "d"
        label: "Recommendation from friends or family"
      - id: "e"
        label: "At the point of sale for a purchase"
      - id: "f"
        label: "Not applicable"
  - id: q10
    prompt: "Did you check your rate through prequalification before formally applying?"
    type: single_choice
    construct: did_check_rate_through_prequalification
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Don't remember"
      - id: "d"
        label: "Not applicable"
  - id: q11
    prompt: "How many lenders did you compare before choosing?"
    type: single_choice
    construct: many_lenders_did_compare_before
    required: true
    options:
      - id: "a"
        label: "Only one"
      - id: "b"
        label: "2 lenders"
      - id: "c"
        label: "3 to 4 lenders"
      - id: "d"
        label: "5 or more lenders"
      - id: "e"
        label: "Not applicable"
  - id: q12
    prompt: "At the time of your most recent personal loan, which best describes your credit score range?"
    type: single_choice
    construct: time_most_recent_personal_loan
    required: true
    options:
      - id: "a"
        label: "Excellent (740+)"
      - id: "b"
        label: "Good (670–739)"
      - id: "c"
        label: "Fair (580–669)"
      - id: "d"
        label: "Poor (below 580)"
      - id: "e"
        label: "Don't know"
  - id: q13
    prompt: "Before choosing a personal loan, which alternatives did you consider? (Select all that apply)"
    type: multi_choice
