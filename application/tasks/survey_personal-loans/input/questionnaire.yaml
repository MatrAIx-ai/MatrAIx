    required: true
    options:
      - id: "a"
        label: "Putting the expense on a credit card"
      - id: "b"
        label: "A 0% APR balance transfer offer"
      - id: "c"
        label: "Borrowing from friends or family"
      - id: "d"
        label: "Using savings instead"
      - id: "e"
        label: "A home equity loan or line of credit"
      - id: "f"
        label: "I did not consider any alternatives"
  - id: q14
