schemaVersion: "1.0"
id: developer_community_participation_v1
title: "Developer Community Participation Survey"
description: "How developers engage with online and in-person technical communities, from lurking and asking questions to answering, contributing, and organizing."
questions:
  - id: q0
    prompt: "Do you take part in any developer or technical communities (online or in person)?"
    type: single_choice
    construct: take_part_any_developer_technical
    required: true
    options:
      - id: "a"
        label: "Yes, actively"
      - id: "b"
        label: "Yes, but mostly I just read / lurk"
      - id: "c"
        label: "No, not at all"
  - id: q1
    prompt: "How many years have you been writing code, including any time spent learning?"
    type: single_choice
    construct: many_years_have_been_writing
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1–2 years"
      - id: "c"
        label: "3–5 years"
      - id: "d"
        label: "6–10 years"
      - id: "e"
        label: "11–20 years"
      - id: "f"
        label: "More than 20 years"
  - id: q2
    prompt: "Which developer communities or platforms do you use? (Select all that apply)"
    type: multi_choice
    construct: developer_communities_platforms_use_sele
    required: true
    options:
      - id: "a"
        label: "Stack Overflow / Stack Exchange"
      - id: "b"
        label: "GitHub (issues, discussions, PRs)"
      - id: "c"
        label: "Reddit (r/programming, language subreddits, etc.)"
      - id: "d"
        label: "Discord servers"
      - id: "e"
        label: "Slack communities"
      - id: "f"
        label: "Dev.to / Hashnode / Medium"
      - id: "g"
        label: "Hacker News"
      - id: "h"
        label: "Twitter / X tech community"
      - id: "i"
        label: "Mastodon or Bluesky"
      - id: "j"
        label: "Local meetups or user groups"
      - id: "k"
        label: "Conferences"
      - id: "l"
        label: "Official project forums or mailing lists"
  - id: q3
    prompt: "Which platform do you consider your primary developer community?"
    type: single_choice
    construct: platform_consider_primary_developer_comm
    required: true
    options:
      - id: "a"
        label: "Stack Overflow"
      - id: "b"
        label: "GitHub"
      - id: "c"
        label: "Reddit"
      - id: "d"
        label: "Discord"
      - id: "e"
        label: "Hacker News"
      - id: "f"
        label: "Dev.to or a blogging platform"
      - id: "g"
        label: "A language- or framework-specific forum"
      - id: "h"
        label: "Local / in-person groups"
      - id: "i"
        label: "I do not have a primary one"
  - id: q4
    prompt: "How often do you visit or read your primary developer community?"
    type: single_choice
    construct: often_visit_read_primary_developer
    required: true
    options:
      - id: "a"
        label: "Less than once a month"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Daily or almost daily"
      - id: "e"
        label: "Multiple times a day"
  - id: q5
    prompt: "Which activities do you regularly do in developer communities? (Select all that apply)"
    type: multi_choice
    construct: activities_regularly_developer_communiti
    required: true
    options:
      - id: "a"
        label: "Read questions, answers, or posts"
      - id: "b"
        label: "Ask questions"
      - id: "c"
        label: "Answer questions"
      - id: "d"
        label: "Vote or react"
      - id: "e"
        label: "Comment on posts or threads"
      - id: "f"
        label: "Write blog posts or tutorials"
      - id: "g"
        label: "Report bugs or open issues"
      - id: "h"
        label: "Submit pull requests"
      - id: "i"
        label: "Moderate or maintain a community"
      - id: "j"
        label: "Organize or speak at events"
      - id: "k"
        label: "Mentor or help newcomers"
  - id: q6
    prompt: "How often do you post your own content (questions, answers, posts, PRs), rather than just reading?"
    type: single_choice
    construct: often_post_own_content_questions
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very frequently"
  - id: q7
    prompt: "Do you contribute to open-source projects?"
    type: single_choice
    construct: contribute_open_source_projects
    required: true
    options:
      - id: "a"
        label: "Yes, I maintain one or more projects"
      - id: "b"
        label: "Yes, I contribute regularly"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Once or twice"
      - id: "e"
        label: "Never"
  - id: q8
    prompt: "What motivates you to participate in developer communities? (Select all that apply)"
    type: multi_choice
    construct: motivates_participate_developer_communit
    required: true
    options:
      - id: "a"
        label: "Getting help with my own problems"
      - id: "b"
        label: "Helping others"
      - id: "c"
        label: "Learning new things"
      - id: "d"
        label: "Building reputation or a portfolio"
      - id: "e"
        label: "Networking and career opportunities"
      - id: "f"
        label: "Staying current with trends"
      - id: "g"
        label: "Giving back to projects I use"
      - id: "h"
        label: "Enjoyment / sense of belonging"
      - id: "i"
        label: "Promoting my own project or product"
  - id: q9
    prompt: "Select your top 3 reasons for participating in developer communities. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_reasons_participating
    required: true
    options:
      - id: "a"
        label: "Getting help"
      - id: "b"
        label: "Helping others"
      - id: "c"
        label: "Learning"
      - id: "d"
        label: "Reputation / portfolio"
      - id: "e"
        label: "Networking and career"
      - id: "f"
        label: "Staying current"
      - id: "g"
        label: "Giving back"
      - id: "h"
        label: "Sense of belonging"
  - id: q10
    prompt: "How much do you agree: I feel like a genuine member of at least one developer community."
    type: single_choice
    construct: much_agree_i_feel_like
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree: The communities I use are welcoming to newcomers."
    type: single_choice
    construct: much_agree_communities_i_use
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree: I have hesitated to ask a question for fear of a negative reaction."
    type: single_choice
    construct: much_agree_i_have_hesitated
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: Participating in communities has helped my career."
    type: single_choice
    construct: much_agree_participating_communities_has
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: AI assistants have reduced how often I need to ask communities for help."
    type: single_choice
