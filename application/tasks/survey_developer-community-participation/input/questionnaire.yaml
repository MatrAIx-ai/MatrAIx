      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How often do you experience the following in developer communities: Getting a helpful, high-quality answer."
    type: single_choice
    construct: often_experience_following_developer_com
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q16
    prompt: "How often do you experience the following in developer communities: Rude, dismissive, or gatekeeping responses."
