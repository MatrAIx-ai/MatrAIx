schemaVersion: "1.0"
id: phishing_awareness_v1
title: "Phishing & Online Scam Awareness Survey"
description: "How aware people are of phishing and online scams, how they respond to suspicious messages, and how protected they feel."
questions:
  - id: q0
    prompt: "How familiar are you with the term \"phishing\"?"
    type: single_choice
    construct: familiar_term_phishing
    required: true
    options:
      - id: "a"
        label: "Very familiar — I can explain it in detail"
      - id: "b"
        label: "Familiar — I know what it means"
      - id: "c"
        label: "Somewhat familiar"
      - id: "d"
        label: "I've heard of it but I'm unsure"
      - id: "e"
        label: "Not familiar at all"
  - id: q1
    prompt: "How confident are you in your ability to recognize a phishing attempt?"
    type: single_choice
    construct: confident_ability_recognize_phishing_att
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q2
    prompt: "How often do you receive suspicious messages that might be phishing or scams?"
    type: single_choice
    construct: often_receive_suspicious_messages_that
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "Never / I don't notice them"
  - id: q3
    prompt: "Through which channels do you receive suspicious or scam messages? (Select all that apply)"
    type: multi_choice
    construct: through_channels_receive_suspicious_scam
    required: true
    options:
      - id: "a"
        label: "Email"
      - id: "b"
        label: "Text message (SMS)"
      - id: "c"
        label: "Phone calls"
      - id: "d"
        label: "Social media messages"
      - id: "e"
        label: "Messaging apps (WhatsApp, Messenger, etc.)"
      - id: "f"
        label: "Pop-ups or websites"
      - id: "g"
        label: "QR codes"
      - id: "h"
        label: "I don't receive any"
  - id: q4
    prompt: "Which types of scams have you personally encountered? (Select all that apply)"
    type: multi_choice
    construct: types_scams_have_personally_encountered
    required: true
    options:
      - id: "a"
        label: "Fake package / delivery notifications"
      - id: "b"
        label: "Bank or account \"security alert\" messages"
      - id: "c"
        label: "Fake invoices or payment requests"
      - id: "d"
        label: "Prize / lottery / \"you've won\" messages"
      - id: "e"
        label: "Tech support scams"
      - id: "f"
        label: "Job offer scams"
      - id: "g"
        label: "Romance scams"
      - id: "h"
        label: "Cryptocurrency or investment scams"
      - id: "i"
        label: "Impersonation of a boss, friend, or family member"
      - id: "j"
        label: "IRS / government impersonation"
      - id: "k"
        label: "None of these"
  - id: q5
    prompt: "Which of these do you check to decide whether a message is legitimate? (Select all that apply)"
    type: multi_choice
    construct: these_check_decide_whether_message
    required: true
    options:
      - id: "a"
        label: "The sender's email address or phone number"
      - id: "b"
        label: "Spelling and grammar"
      - id: "c"
        label: "Whether it creates urgency or pressure"
      - id: "d"
        label: "Where a link actually leads (hovering / previewing)"
      - id: "e"
        label: "Whether it asks for personal or financial info"
      - id: "f"
        label: "Generic greetings (\"Dear customer\")"
      - id: "g"
        label: "Whether I was expecting it"
      - id: "h"
        label: "I contact the company directly to verify"
      - id: "i"
        label: "I don't really check"
  - id: q6
    prompt: "Have you ever clicked a link or opened an attachment in a message that turned out to be a scam?"
    type: single_choice
    construct: have_ever_clicked_link_opened
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "I almost did but caught it"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "I'm not sure"
  - id: q7
    prompt: "Have you ever lost money or had information stolen as a result of a phishing or scam message?"
    type: single_choice
    construct: have_ever_lost_money_had
    required: true
    options:
      - id: "a"
        label: "Yes, lost money"
      - id: "b"
        label: "Yes, had information stolen"
      - id: "c"
        label: "Yes, both"
      - id: "d"
        label: "No"
      - id: "e"
        label: "Prefer not to say"
  - id: q8
    prompt: "When you get a message you think is a phishing attempt, what do you usually do? (Select all that apply)"
    type: multi_choice
    construct: when_get_message_think_phishing
    required: true
    options:
      - id: "a"
        label: "Delete it"
      - id: "b"
        label: "Report it as spam or phishing"
      - id: "c"
        label: "Block the sender"
      - id: "d"
        label: "Verify by contacting the company directly"
      - id: "e"
        label: "Ignore it"
      - id: "f"
        label: "Warn others (family, colleagues)"
      - id: "g"
        label: "Forward it to a reporting service (e.g., report to the FTC or my bank)"
  - id: q9
    prompt: "How often do you report phishing or scam messages to the relevant company or authorities?"
    type: single_choice
    construct: often_report_phishing_scam_messages
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q10
    prompt: "Roughly how many phishing or scam messages do you think you receive in a typical week?"
    type: free_text
    construct: roughly_many_phishing_scam_messages
    required: true
  - id: q11
    prompt: "How much do you agree with the following statement? — Phishing messages are getting harder to tell apart from real ones."
    type: single_choice
    construct: much_agree_following_statement_phishing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement? — I would be embarrassed to admit if I fell for a scam."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
