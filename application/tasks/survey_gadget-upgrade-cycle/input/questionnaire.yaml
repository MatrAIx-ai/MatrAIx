schemaVersion: "1.0"
id: gadget_upgrade_cycle_v1
title: "Gadget Upgrade Cycle Survey"
description: "How often people replace their personal tech devices — phones, laptops, tablets, wearables, and audio gear — and what drives those upgrade decisions."
questions:
  - id: q0
    prompt: "In general, how quickly do you replace your personal tech devices?"
    type: single_choice
    construct: general_quickly_replace_personal_tech
    required: true
    options:
      - id: "a"
        label: "As soon as a new model comes out"
      - id: "b"
        label: "Every couple of years"
      - id: "c"
        label: "Only when the old one slows down or wears out"
      - id: "d"
        label: "Only when the old one completely stops working"
      - id: "e"
        label: "I keep devices as long as humanly possible"
  - id: q1
    prompt: "Which personal tech devices do you currently own? (Select all that apply)"
    type: multi_choice
    construct: personal_tech_devices_currently_own
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smartwatch or fitness tracker"
      - id: "f"
        label: "Wireless earbuds or headphones"
      - id: "g"
        label: "Smart speaker"
      - id: "h"
        label: "E-reader"
      - id: "i"
        label: "Gaming console"
      - id: "j"
        label: "Camera"
  - id: q2
    prompt: "How old is your current primary smartphone?"
    type: single_choice
    construct: old_current_primary_smartphone
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1–2 years"
      - id: "c"
        label: "2–3 years"
      - id: "d"
        label: "3–4 years"
      - id: "e"
        label: "More than 4 years"
      - id: "f"
        label: "I do not own a smartphone"
  - id: q3
    prompt: "How often do you typically replace your smartphone?"
    type: single_choice
    construct: often_typically_replace_smartphone
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Every 2 years"
      - id: "c"
        label: "Every 3 years"
      - id: "d"
        label: "Every 4 years"
      - id: "e"
        label: "Every 5+ years"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "How often do you typically replace your laptop?"
    type: single_choice
    construct: often_typically_replace_laptop
    required: true
    options:
      - id: "a"
        label: "Every 1–2 years"
      - id: "b"
        label: "Every 3 years"
      - id: "c"
        label: "Every 4–5 years"
      - id: "d"
        label: "Every 6+ years"
      - id: "e"
        label: "Not applicable"
  - id: q5
    prompt: "How often do you typically replace your tablet?"
    type: single_choice
    construct: often_typically_replace_tablet
    required: true
    options:
      - id: "a"
        label: "Every 1–2 years"
      - id: "b"
        label: "Every 3 years"
      - id: "c"
        label: "Every 4–5 years"
      - id: "d"
        label: "Every 6+ years"
      - id: "e"
        label: "Not applicable"
  - id: q6
    prompt: "How often do you typically replace your headphones or earbuds?"
    type: single_choice
    construct: often_typically_replace_headphones_earbu
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Every 2 years"
      - id: "c"
        label: "Every 3–4 years"
      - id: "d"
        label: "Every 5+ years"
      - id: "e"
        label: "Not applicable"
  - id: q7
    prompt: "How often do you typically replace your smartwatch or fitness tracker?"
    type: single_choice
    construct: often_typically_replace_smartwatch_fitne
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Every 2 years"
      - id: "c"
        label: "Every 3–4 years"
      - id: "d"
        label: "Every 5+ years"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "What usually triggers you to upgrade a device? (Select all that apply)"
    type: multi_choice
    construct: usually_triggers_upgrade_device_select
    required: true
    options:
      - id: "a"
        label: "It stopped working or broke"
      - id: "b"
        label: "It became too slow"
      - id: "c"
        label: "Battery life degraded"
      - id: "d"
        label: "Storage filled up"
      - id: "e"
        label: "It no longer gets software updates"
      - id: "f"
        label: "A compelling new feature appeared"
      - id: "g"
        label: "A good deal or trade-in offer"
      - id: "h"
        label: "My contract or plan made it cheap to upgrade"
      - id: "i"
        label: "I just wanted something new"
  - id: q9
    prompt: "When you decide to upgrade, how do you usually research the purchase? (Select all that apply)"
    type: multi_choice
    construct: when_decide_upgrade_usually_research
    required: true
    options:
      - id: "a"
        label: "Read reviews on tech sites"
      - id: "b"
        label: "Watch YouTube reviews"
      - id: "c"
        label: "Compare specs and prices online"
      - id: "d"
        label: "Ask friends or family"
      - id: "e"
        label: "Visit a physical store"
      - id: "f"
        label: "Follow a brand I already trust"
      - id: "g"
        label: "I do minimal research"
  - id: q10
    prompt: "Where do you usually buy new devices?"
    type: single_choice
    construct: where_usually_buy_new_devices
    required: true
    options:
      - id: "a"
        label: "Directly from the manufacturer (online or store)"
      - id: "b"
        label: "Amazon or another online retailer"
      - id: "c"
        label: "A big-box electronics store"
      - id: "d"
        label: "A carrier or phone provider"
      - id: "e"
        label: "A warehouse club or discount retailer"
      - id: "f"
        label: "Second-hand / refurbished sellers"
  - id: q11
    prompt: "Select your top 3 factors when deciding whether to upgrade a device. (Select all that apply)"
