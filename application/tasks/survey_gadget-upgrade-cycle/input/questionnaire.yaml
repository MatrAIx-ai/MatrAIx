    required: true
    options:
      - id: "a"
        label: "Price / cost"
      - id: "b"
        label: "Performance improvement"
      - id: "c"
        label: "Battery life"
      - id: "d"
        label: "New features"
      - id: "e"
        label: "Camera quality"
      - id: "f"
        label: "Brand loyalty"
      - id: "g"
        label: "Environmental impact"
      - id: "h"
        label: "Trade-in or resale value"
  - id: q12
    prompt: "How much do you agree: I like to have the latest technology."
    type: single_choice
    construct: much_agree_i_like_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
