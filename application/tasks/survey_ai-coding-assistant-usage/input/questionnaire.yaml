    prompt: "Which best describes your use of AI coding assistants?"
    type: single_choice
    construct: best_describes_use_ai_coding
    required: true
    options:
      - id: "a"
        label: "I use them every day"
      - id: "b"
        label: "I use them a few times a week"
      - id: "c"
        label: "I use them occasionally"
      - id: "d"
        label: "I have tried them but don't use them now"
      - id: "e"
        label: "I don't use them but plan to"
      - id: "f"
        label: "I don't use them and don't plan to"
  - id: q1
    prompt: "How long have you used AI coding assistants?"
    type: single_choice
    construct: long_have_used_ai_coding
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I don't use them"
