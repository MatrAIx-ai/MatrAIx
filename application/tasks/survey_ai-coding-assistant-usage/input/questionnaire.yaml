schemaVersion: "1.0"
id: ai_coding_assistant_usage_v1
title: "AI Coding Assistant Usage Survey"
description: "How developers adopt, use, and evaluate AI coding assistants such as GitHub Copilot, Cursor, and Claude Code."
questions:
