        label: "I do not track"
      - id: "b"
        label: "By how many bottles or cups I refill"
      - id: "c"
        label: "A marked or measured bottle"
      - id: "d"
        label: "A phone app"
      - id: "e"
        label: "A smartwatch or wearable"
      - id: "f"
        label: "A rough estimate in my head"
  - id: q11
    prompt: "How much do you agree or disagree: Staying hydrated is important to me."
    type: single_choice
    construct: much_agree_disagree_staying_hydrated
    required: true
    options:
