schemaVersion: "1.0"
id: hydration_habits_v1
title: "Hydration Habits Survey"
description: "Everyday drinking and hydration habits among adults."
questions:
  - id: q0
    prompt: "On a typical day, about how many cups (8 oz) of plain water do you drink? Please enter a number."
    type: free_text
    construct: typical_day_many_cups_8
    required: true
  - id: q1
    prompt: "How would you describe how well hydrated you usually feel?"
    type: single_choice
    construct: would_describe_well_hydrated_usually
    required: true
    options:
      - id: "a"
        label: "Rarely hydrated enough"
      - id: "b"
        label: "Somewhat under-hydrated"
      - id: "c"
        label: "About right"
      - id: "d"
        label: "Well hydrated"
      - id: "e"
        label: "Not sure"
  - id: q2
    prompt: "Which beverages do you drink regularly? (Select all that apply)"
    type: multi_choice
    construct: beverages_drink_regularly_select_all
    required: true
    options:
      - id: "a"
        label: "Plain water"
      - id: "b"
        label: "Sparkling or flavored water"
      - id: "c"
        label: "Coffee"
      - id: "d"
        label: "Tea"
      - id: "e"
        label: "Soda or soft drinks"
      - id: "f"
        label: "Juice"
      - id: "g"
        label: "Sports or electrolyte drinks"
      - id: "h"
        label: "Milk or milk alternatives"
      - id: "i"
        label: "Energy drinks"
  - id: q3
    prompt: "What is your main source of daily fluids?"
    type: single_choice
    construct: main_source_daily_fluids
    required: true
    options:
      - id: "a"
        label: "Plain water"
      - id: "b"
        label: "Coffee or tea"
      - id: "c"
        label: "Soda or soft drinks"
      - id: "d"
        label: "Juice or sweet drinks"
      - id: "e"
        label: "Sports or electrolyte drinks"
      - id: "f"
        label: "A mix of several"
  - id: q4
    prompt: "Where do you usually drink water during the day? (Select all that apply)"
    type: multi_choice
    construct: where_usually_drink_water_during
    required: true
    options:
      - id: "a"
        label: "At home"
      - id: "b"
        label: "At work or school"
      - id: "c"
        label: "During exercise"
      - id: "d"
        label: "While commuting or running errands"
      - id: "e"
        label: "At restaurants or cafes"
      - id: "f"
        label: "At the gym"
  - id: q5
    prompt: "Do you carry a reusable water bottle with you?"
    type: single_choice
    construct: carry_reusable_water_bottle
    required: true
    options:
      - id: "a"
        label: "Yes, almost always"
      - id: "b"
        label: "Yes, sometimes"
      - id: "c"
        label: "No, but I have one"
      - id: "d"
        label: "No, I do not own one"
  - id: q6
    prompt: "Which type of water bottle or container do you use most?"
    type: single_choice
    construct: type_water_bottle_container_use
    required: true
    options:
      - id: "a"
        label: "An insulated bottle (for example, Stanley, Hydro Flask, Owala)"
      - id: "b"
        label: "A plastic reusable bottle"
      - id: "c"
        label: "A glass bottle"
      - id: "d"
        label: "Disposable plastic bottles"
      - id: "e"
        label: "A cup or glass"
      - id: "f"
        label: "I do not use a specific container"
  - id: q7
    prompt: "How often do you drink water first thing in the morning?"
    type: single_choice
    construct: often_drink_water_first_thing
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Every morning"
  - id: q8
    prompt: "How often do you feel thirsty during the day?"
    type: single_choice
    construct: often_feel_thirsty_during_day
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q9
    prompt: "Do you set a daily water goal for yourself?"
    type: single_choice
    construct: set_daily_water_goal_yourself
    required: true
    options:
      - id: "a"
        label: "Yes, and I usually meet it"
      - id: "b"
        label: "Yes, but I often miss it"
      - id: "c"
        label: "No, but I keep it in mind"
      - id: "d"
        label: "No, I do not think about a goal"
  - id: q10
    prompt: "How do you keep track of how much you drink? (Select all that apply)"
