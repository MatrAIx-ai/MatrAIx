schemaVersion: "1.0"
id: video_streaming_services_v1
title: "Video Streaming Services Survey"
description: "How people subscribe to and watch video streaming services for movies and TV, including which services they use, spending, and what drives their choices and cancellations."
questions:
  - id: q0
    prompt: "Do you watch movies or TV shows through streaming services?"
    type: single_choice
    construct: watch_movies_tv_shows_through
    required: true
    options:
      - id: "a"
        label: "Yes, most days"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, I don't use streaming services"
  - id: q1
    prompt: "About how long have you been using paid video streaming services?"
    type: single_choice
    construct: long_have_been_using_paid
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 or more years"
      - id: "e"
        label: "I only use free services"
  - id: q2
    prompt: "Which video streaming services do you currently have access to (paid or shared)? (Select all that apply)"
    type: multi_choice
    construct: video_streaming_services_currently_have
    required: true
    options:
      - id: "a"
        label: "Netflix"
      - id: "b"
        label: "Amazon Prime Video"
      - id: "c"
        label: "Disney+"
      - id: "d"
        label: "Max (HBO Max)"
      - id: "e"
        label: "Hulu"
      - id: "f"
        label: "Apple TV+"
      - id: "g"
        label: "Peacock"
      - id: "h"
        label: "Paramount+"
      - id: "i"
        label: "YouTube TV"
      - id: "j"
        label: "YouTube Premium"
      - id: "k"
        label: "ESPN+ or other sports service"
      - id: "l"
        label: "Tubi, Pluto TV, or other free ad-supported service"
      - id: "m"
        label: "Other"
  - id: q3
    prompt: "How many paid streaming subscriptions do you personally pay for?"
    type: free_text
    construct: many_paid_streaming_subscriptions_person
    required: true
  - id: q4
    prompt: "Which service do you watch the most?"
    type: single_choice
    construct: service_watch_most
    required: true
    options:
      - id: "a"
        label: "Netflix"
      - id: "b"
        label: "Amazon Prime Video"
      - id: "c"
        label: "Disney+"
      - id: "d"
        label: "Max (HBO Max)"
      - id: "e"
        label: "Hulu"
      - id: "f"
        label: "Apple TV+"
      - id: "g"
        label: "Peacock"
      - id: "h"
        label: "Paramount+"
      - id: "i"
        label: "YouTube"
      - id: "j"
        label: "Other"
  - id: q5
    prompt: "On which devices do you usually watch streaming content? (Select all that apply)"
    type: multi_choice
    construct: devices_usually_watch_streaming_content
    required: true
    options:
      - id: "a"
        label: "Smart TV"
      - id: "b"
        label: "Streaming device (Roku, Apple TV, Fire TV, Chromecast)"
      - id: "c"
        label: "Game console"
      - id: "d"
        label: "Laptop or desktop computer"
      - id: "e"
        label: "Smartphone"
      - id: "f"
        label: "Tablet"
      - id: "g"
        label: "Cable or satellite box app"
  - id: q6
    prompt: "On a typical day, about how many hours do you spend watching streaming content?"
    type: single_choice
    construct: typical_day_many_hours_spend
    required: true
    options:
      - id: "a"
        label: "Less than 30 minutes"
      - id: "b"
        label: "30 minutes to 1 hour"
      - id: "c"
        label: "1 to 2 hours"
      - id: "d"
        label: "2 to 3 hours"
      - id: "e"
        label: "3 to 5 hours"
      - id: "f"
        label: "More than 5 hours"
  - id: q7
    prompt: "Roughly how much do you spend in total per month on video streaming subscriptions?"
    type: free_text
    construct: roughly_much_spend_total_per
    required: true
  - id: q8
    prompt: "Which of these plan types do you mostly use?"
    type: single_choice
    construct: these_plan_types_mostly_use
    required: true
    options:
      - id: "a"
        label: "Ad-free premium plans"
      - id: "b"
        label: "Cheaper ad-supported plans"
      - id: "c"
        label: "A mix of both"
      - id: "d"
        label: "Only free ad-supported services"
      - id: "e"
        label: "Not sure"
  - id: q9
    prompt: "What do you mainly watch on streaming services? (Select all that apply)"
    type: multi_choice
    construct: mainly_watch_streaming_services_select
    required: true
    options:
      - id: "a"
        label: "Movies"
      - id: "b"
        label: "Scripted TV series and dramas"
      - id: "c"
        label: "Comedies and sitcoms"
      - id: "d"
        label: "Documentaries"
      - id: "e"
        label: "Reality TV"
      - id: "f"
        label: "Kids' and family content"
      - id: "g"
        label: "Anime"
      - id: "h"
        label: "Live sports"
      - id: "i"
        label: "News"
      - id: "j"
        label: "Stand-up comedy specials"
      - id: "k"
        label: "International or foreign-language content"
  - id: q10
    prompt: "How do you usually decide what to watch? (Select all that apply)"
    type: multi_choice
    construct: usually_decide_watch_select_all
    required: true
    options:
      - id: "a"
        label: "Recommendations from the service's algorithm"
      - id: "b"
        label: "Trending or top-10 lists"
      - id: "c"
        label: "Recommendations from friends or family"
      - id: "d"
        label: "Social media buzz"
      - id: "e"
        label: "Reviews or ratings sites"
      - id: "f"
        label: "I search for something specific"
      - id: "g"
        label: "I rewatch things I already know"
  - id: q11
    prompt: "How often do you binge-watch (watch several episodes in one sitting)?"
    type: single_choice
    construct: often_binge_watch_watch_several
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q12
    prompt: "How often do you struggle to find something to watch?"
