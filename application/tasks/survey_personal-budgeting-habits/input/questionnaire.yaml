schemaVersion: "1.0"
id: personal_budgeting_habits_v1
title: "Personal Budgeting Habits Survey"
description: "How individuals and households plan, track, and stick to a personal or household budget."
questions:
  - id: q0
    prompt: "Do you currently keep a personal or household budget?"
    type: single_choice
    construct: currently_keep_personal_household_budget
    required: true
    options:
      - id: "a"
        label: "Yes, a detailed written or digital budget"
      - id: "b"
        label: "Yes, but only a rough mental budget"
      - id: "c"
        label: "No, but I plan to start one"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "About how long have you been keeping a budget?"
    type: single_choice
    construct: long_have_been_keeping_budget
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I do not keep a budget"
  - id: q2
    prompt: "How often do you review your budget or spending?"
    type: single_choice
    construct: often_review_budget_spending
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Weekly"
      - id: "d"
        label: "Monthly"
      - id: "e"
        label: "Only occasionally"
      - id: "f"
        label: "Never"
  - id: q3
    prompt: "How do you primarily track your day-to-day spending?"
    type: single_choice
    construct: primarily_track_day_day_spending
    required: true
    options:
      - id: "a"
        label: "A dedicated budgeting app"
      - id: "b"
        label: "A spreadsheet I maintain myself"
      - id: "c"
        label: "Pen and paper or a notebook"
      - id: "d"
        label: "My bank or card app's built-in tools"
      - id: "e"
        label: "I keep it in my head"
      - id: "f"
        label: "I don't actively track spending"
  - id: q4
    prompt: "Which budgeting method best describes your approach?"
    type: single_choice
    construct: budgeting_method_best_describes_approach
    required: true
    options:
      - id: "a"
        label: "50/30/20 (needs/wants/savings)"
      - id: "b"
        label: "Zero-based budgeting (every dollar assigned)"
      - id: "c"
        label: "Envelope or cash-stuffing system"
      - id: "d"
        label: "Pay-yourself-first (save before spending)"
      - id: "e"
        label: "Rough spending limits by category"
      - id: "f"
        label: "No particular method"
  - id: q5
    prompt: "Which tools or apps do you use for budgeting? (Select all that apply)"
    type: multi_choice
    construct: tools_apps_use_budgeting_select
    required: true
    options:
      - id: "a"
        label: "YNAB (You Need A Budget)"
      - id: "b"
        label: "EveryDollar"
      - id: "c"
        label: "Rocket Money (formerly Truebill)"
      - id: "d"
        label: "Empower / Personal Capital"
      - id: "e"
        label: "Goodbudget"
      - id: "f"
        label: "A spreadsheet (Excel or Google Sheets)"
      - id: "g"
        label: "My bank or credit union's built-in tools"
      - id: "h"
        label: "Pen and paper"
      - id: "i"
        label: "None"
  - id: q6
    prompt: "How do you divide budgeting responsibilities in your household?"
    type: single_choice
    construct: divide_budgeting_responsibilities_househ
    required: true
    options:
      - id: "a"
        label: "I handle it entirely on my own"
      - id: "b"
        label: "I share it with a spouse or partner"
      - id: "c"
        label: "Someone else handles it"
      - id: "d"
        label: "We each manage our own separately"
      - id: "e"
        label: "Not applicable — I live alone"
  - id: q7
    prompt: "Which categories do you actively budget for? (Select all that apply)"
    type: multi_choice
    construct: categories_actively_budget_select_all
    required: true
    options:
      - id: "a"
        label: "Groceries"
      - id: "b"
        label: "Dining out and takeout"
      - id: "c"
        label: "Housing (rent or mortgage)"
      - id: "d"
        label: "Utilities"
      - id: "e"
        label: "Transportation and fuel"
      - id: "f"
        label: "Entertainment and hobbies"
      - id: "g"
        label: "Subscriptions and memberships"
      - id: "h"
        label: "Savings and investments"
      - id: "i"
        label: "Debt payments"
      - id: "j"
        label: "Childcare or dependent care"
  - id: q8
    prompt: "Roughly what share of your monthly income do you aim to save?"
    type: single_choice
    construct: roughly_share_monthly_income_aim
    required: true
