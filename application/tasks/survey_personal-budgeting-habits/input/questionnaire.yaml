        label: "0% — I don't save regularly"
      - id: "b"
        label: "1–5%"
      - id: "c"
        label: "6–10%"
      - id: "d"
        label: "11–20%"
      - id: "e"
        label: "More than 20%"
  - id: q9
    prompt: "Do you use automatic transfers to move money into savings each month?"
    type: single_choice
    construct: use_automatic_transfers_move_money
    required: true
    options:
