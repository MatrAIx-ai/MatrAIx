        label: "Yes, an automatic recurring transfer"
      - id: "b"
        label: "No, I transfer manually when I can"
      - id: "c"
        label: "No, I don't set money aside"
  - id: q10
    prompt: "In a typical month, how well do you stick to your budget?"
    type: single_choice
    construct: typical_month_well_stick_budget
    required: true
    options:
      - id: "a"
        label: "Always stay within it"
      - id: "b"
        label: "Usually stay within it"
      - id: "c"
        label: "Sometimes stay within it"
      - id: "d"
        label: "Rarely stay within it"
      - id: "e"
        label: "I don't have a budget to stick to"
  - id: q11
