    prompt: "How often do you consume caffeinated drinks or products?"
    type: single_choice
    construct: often_consume_caffeinated_drinks_product
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "Most days"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "Which caffeinated products do you consume? (Select all that apply)"
    type: multi_choice
    construct: caffeinated_products_consume_select_all
    required: true
    options:
      - id: "a"
        label: "Coffee"
      - id: "b"
        label: "Tea"
      - id: "c"
        label: "Energy drinks"
      - id: "d"
        label: "Soda or soft drinks"
      - id: "e"
        label: "Caffeinated pre-workout or supplements"
      - id: "f"
        label: "Chocolate"
      - id: "g"
        label: "None"
  - id: q2
    prompt: "How long have you been a regular caffeine consumer?"
    type: single_choice
    construct: long_have_been_regular_caffeine
    required: true
    options:
