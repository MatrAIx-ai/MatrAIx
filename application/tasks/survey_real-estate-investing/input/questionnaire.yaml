schemaVersion: "1.0"
id: real_estate_investing_v1
title: "Real Estate Investing Survey"
description: "How people invest in real estate, such as rental properties, flips, and property deals."
questions:
  - id: q0
    prompt: "Do you currently own any real estate as an investment (not counting the home you live in)?"
    type: single_choice
    construct: currently_own_any_real_estate
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have in the past"
      - id: "c"
        label: "No, but I'm actively planning to"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been investing in real estate?"
    type: single_choice
    construct: long_have_been_investing_real
    required: true
    options:
      - id: "a"
        label: "Less than a year"
      - id: "b"
        label: "1–3 years"
      - id: "c"
        label: "4–10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "I don't invest in real estate"
  - id: q2
    prompt: "Which types of real estate investments do you have or have you had? (Select all that apply)"
    type: multi_choice
    construct: types_real_estate_investments_have
    required: true
    options:
      - id: "a"
        label: "A single-family rental home"
      - id: "b"
        label: "A multi-family property (duplex, apartments)"
      - id: "c"
        label: "A short-term rental (e.g., Airbnb, Vrbo)"
      - id: "d"
        label: "A house flip or renovation project"
      - id: "e"
        label: "Commercial or retail property"
      - id: "f"
        label: "Land"
      - id: "g"
        label: "A real estate crowdfunding platform (e.g., Fundrise)"
      - id: "h"
        label: "A share in a partnership or syndication"
      - id: "i"
        label: "None of these"
  - id: q3
    prompt: "How many investment properties do you currently own? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_investment_properties_currently_own
    required: true
  - id: q4
    prompt: "What is the approximate total value of your investment real estate? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: approximate_total_value_investment_real
    required: true
  - id: q5
    prompt: "About how much monthly income (before expenses) do your real estate investments generate? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_monthly_income_before_expenses
    required: true
  - id: q6
    prompt: "What is your main strategy or goal with real estate investing?"
    type: single_choice
    construct: main_strategy_goal_real_estate
    required: true
    options:
      - id: "a"
        label: "Long-term rental income and appreciation"
      - id: "b"
        label: "Short-term rentals for higher cash flow"
      - id: "c"
        label: "Buying, fixing, and selling (flipping)"
      - id: "d"
        label: "Passive investing through funds or crowdfunding"
      - id: "e"
        label: "Buy and hold land for future value"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "How did you finance your most recent real estate investment? (Select all that apply)"
    type: multi_choice
    construct: did_finance_most_recent_real
    required: true
    options:
      - id: "a"
        label: "Cash"
      - id: "b"
        label: "A conventional mortgage"
      - id: "c"
        label: "An investment property or commercial loan"
      - id: "d"
        label: "A home equity loan or HELOC"
      - id: "e"
        label: "A hard-money or private loan"
      - id: "f"
        label: "Partnership or pooled money"
      - id: "g"
        label: "Not applicable"
  - id: q8
    prompt: "How do you manage your rental properties?"
    type: single_choice
    construct: manage_rental_properties
    required: true
    options:
      - id: "a"
        label: "I manage them all myself"
      - id: "b"
        label: "I use a property manager for all"
      - id: "c"
        label: "A mix of self-managed and managed"
      - id: "d"
        label: "Not applicable"
  - id: q9
    prompt: "What are your main reasons for investing in real estate? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_investing_real_estate
    required: true
    options:
      - id: "a"
        label: "Steady rental income"
      - id: "b"
        label: "Property value appreciation"
      - id: "c"
        label: "Tax advantages"
      - id: "d"
        label: "Building long-term wealth"
      - id: "e"
        label: "Diversifying beyond stocks"
      - id: "f"
        label: "Protection against inflation"
      - id: "g"
        label: "Leaving something to my family"
      - id: "h"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree with the following statement about real estate investing? It's one of the best ways to build wealth."
    type: single_choice
    construct: much_agree_following_statement_real
