schemaVersion: "1.0"
id: 5g_adoption_v1
title: "5G Adoption Survey"
description: "How consumers adopt, use, and feel about 5G mobile networks and 5G-based home internet."
questions:
  - id: q0
    prompt: "Do you currently use a smartphone that supports 5G?"
    type: single_choice
    construct: currently_use_smartphone_that_supports
    required: true
    options:
      - id: "a"
        label: "Yes, and I actively use 5G"
      - id: "b"
        label: "Yes, but I'm not sure if I use 5G"
      - id: "c"
        label: "Yes, but I keep 5G turned off"
      - id: "d"
        label: "No, my phone is 4G/LTE only"
      - id: "e"
        label: "No, I don't own a smartphone"
      - id: "f"
        label: "Not sure"
  - id: q1
    prompt: "Does your current mobile plan include 5G access?"
    type: single_choice
    construct: does_current_mobile_plan_include
    required: true
    options:
      - id: "a"
        label: "Yes, unlimited 5G"
      - id: "b"
        label: "Yes, but with a data cap or throttling"
      - id: "c"
        label: "Yes, but only slower nationwide 5G (not ultra-fast)"
      - id: "d"
        label: "No, 5G is not included"
      - id: "e"
        label: "I don't know"
  - id: q2
    prompt: "How long have you been using 5G?"
    type: single_choice
    construct: long_have_been_using_5g
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "2 to 4 years"
      - id: "e"
        label: "More than 4 years"
      - id: "f"
        label: "I don't use 5G"
  - id: q3
    prompt: "How did you first start using 5G?"
    type: single_choice
    construct: did_first_start_using_5g
    required: true
    options:
      - id: "a"
        label: "It came automatically with a new phone"
      - id: "b"
        label: "It came automatically with a plan upgrade"
      - id: "c"
        label: "I specifically upgraded my phone to get 5G"
      - id: "d"
        label: "I specifically changed carriers/plans to get 5G"
      - id: "e"
        label: "I'm not sure how it started"
      - id: "f"
        label: "I don't use 5G"
  - id: q4
    prompt: "Which mobile carrier do you primarily use?"
    type: single_choice
    construct: mobile_carrier_primarily_use
    required: true
    options:
      - id: "a"
        label: "Verizon"
      - id: "b"
        label: "AT&T"
      - id: "c"
        label: "T-Mobile"
      - id: "d"
        label: "Metro by T-Mobile"
      - id: "e"
        label: "Cricket Wireless"
      - id: "f"
        label: "Boost Mobile"
      - id: "g"
        label: "Mint Mobile"
      - id: "h"
        label: "Visible"
      - id: "i"
        label: "US Cellular"
      - id: "j"
        label: "Other prepaid / MVNO"
      - id: "k"
        label: "Other"
  - id: q5
    prompt: "Which brand of smartphone do you currently use?"
    type: single_choice
    construct: brand_smartphone_currently_use
    required: true
    options:
      - id: "a"
        label: "Apple iPhone"
      - id: "b"
        label: "Samsung Galaxy"
      - id: "c"
        label: "Google Pixel"
      - id: "d"
        label: "Motorola"
      - id: "e"
        label: "OnePlus"
      - id: "f"
        label: "Xiaomi"
      - id: "g"
        label: "Other Android brand"
      - id: "h"
        label: "Not a smartphone / other"
  - id: q6
    prompt: "Which type of 5G do you most often connect to?"
    type: single_choice
    construct: type_5g_most_often_connect
    required: true
    options:
      - id: "a"
        label: "Low-band (nationwide, wider coverage)"
      - id: "b"
        label: "Mid-band (e.g., T-Mobile Ultra Capacity, Verizon 5G Ultra Wideband)"
      - id: "c"
        label: "mmWave (ultra-fast, very short range)"
      - id: "d"
        label: "A mix depending on location"
      - id: "e"
        label: "I don't know which type"
  - id: q7
    prompt: "On a typical day, how often does your phone display a 5G indicator?"
    type: single_choice
    construct: typical_day_often_does_phone
    required: true
    options:
      - id: "a"
        label: "Almost always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
      - id: "f"
        label: "I don't pay attention"
  - id: q8
    prompt: "Which devices do you connect to 5G networks? (Select all that apply)"
    type: multi_choice
    construct: devices_connect_5g_networks_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet with cellular"
      - id: "c"
        label: "Mobile hotspot / MiFi device"
      - id: "d"
        label: "Laptop with 5G modem"
      - id: "e"
        label: "5G home internet router (fixed wireless)"
      - id: "f"
        label: "Smartwatch with cellular"
      - id: "g"
        label: "Car / connected vehicle"
      - id: "h"
        label: "None of these"
  - id: q9
    prompt: "Which activities do you regularly do while on a 5G connection? (Select all that apply)"
    type: multi_choice
    construct: activities_regularly_while_5g_connection
    required: true
    options:
      - id: "a"
        label: "Streaming video (YouTube, Netflix, etc.)"
      - id: "b"
        label: "Streaming music or podcasts"
      - id: "c"
        label: "Video calls"
      - id: "d"
        label: "Online / cloud gaming"
      - id: "e"
        label: "Downloading large files or app updates"
      - id: "f"
        label: "Uploading photos or videos to the cloud"
      - id: "g"
        label: "Using it as a hotspot for other devices"
      - id: "h"
        label: "Social media browsing"
      - id: "i"
        label: "Video conferencing for work"
      - id: "j"
        label: "Navigation / maps"
  - id: q10
    prompt: "Do you use or subscribe to 5G home internet (fixed wireless access)?"
    type: single_choice
    construct: use_subscribe_5g_home_internet
    required: true
    options:
      - id: "a"
        label: "Yes, it's my primary home internet"
      - id: "b"
        label: "Yes, as a backup connection"
      - id: "c"
        label: "No, but I'm considering it"
      - id: "d"
        label: "No, and I'm not interested"
      - id: "e"
        label: "Not available in my area"
  - id: q11
    prompt: "Which 5G home internet providers have you used or seriously considered? (Select all that apply)"
