      - id: "c"
        label: "AT&T Internet Air"
      - id: "d"
        label: "Starlink (satellite, for comparison)"
      - id: "e"
        label: "Another provider"
      - id: "f"
        label: "None"
  - id: q12
    prompt: "What is your approximate total monthly bill for your mobile plan, in US dollars? Enter a whole number."
