      - id: "b"
        label: "Social media feeds"
      - id: "c"
        label: "Email newsletters"
      - id: "d"
        label: "Aggregators (Hacker News, Reddit, Google News, Apple News)"
      - id: "e"
        label: "Push notifications"
      - id: "f"
        label: "Word of mouth / colleagues"
      - id: "g"
        label: "Podcasts or video"
