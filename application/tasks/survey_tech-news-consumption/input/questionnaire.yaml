schemaVersion: "1.0"
id: tech_news_consumption_v1
title: "Tech News Consumption Survey"
description: "How people follow, read, evaluate, and share technology news across sites, newsletters, podcasts, video, and social media."
questions:
  - id: q0
    prompt: "How closely do you follow technology news?"
    type: single_choice
    construct: closely_follow_technology_news
    required: true
    options:
      - id: "a"
        label: "Very closely — it is a daily habit"
      - id: "b"
        label: "Fairly closely"
      - id: "c"
        label: "Somewhat — I catch the big stories"
      - id: "d"
        label: "Not very closely"
      - id: "e"
        label: "I do not follow tech news"
  - id: q1
    prompt: "How often do you read, watch, or listen to technology news?"
    type: single_choice
    construct: often_read_watch_listen_technology
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "About once a week"
      - id: "e"
        label: "Less than once a week"
  - id: q2
    prompt: "Which sources do you use for technology news? (Select all that apply)"
    type: multi_choice
    construct: sources_use_technology_news_select
    required: true
    options:
      - id: "a"
        label: "The Verge"
      - id: "b"
        label: "Ars Technica"
      - id: "c"
        label: "TechCrunch"
      - id: "d"
        label: "Wired"
      - id: "e"
        label: "Hacker News"
      - id: "f"
        label: "Reddit (r/technology, r/gadgets, etc.)"
      - id: "g"
        label: "YouTube tech channels"
      - id: "h"
        label: "Tech podcasts"
      - id: "i"
        label: "Email newsletters (Morning Brew, TLDR, Benedict Evans, etc.)"
      - id: "j"
        label: "X / Twitter"
      - id: "k"
        label: "General news outlets' tech sections (NYT, BBC, etc.)"
      - id: "l"
        label: "Company blogs or press releases"
  - id: q3
    prompt: "Which source do you consider your primary one for tech news?"
    type: single_choice
    construct: source_consider_primary_one_tech
    required: true
    options:
      - id: "a"
        label: "A dedicated tech site (The Verge, Ars Technica, TechCrunch, etc.)"
      - id: "b"
        label: "Hacker News"
      - id: "c"
        label: "Reddit"
      - id: "d"
        label: "YouTube"
      - id: "e"
        label: "Podcasts"
      - id: "f"
        label: "Email newsletters"
      - id: "g"
        label: "X / Twitter or other social media"
      - id: "h"
        label: "A general news outlet"
      - id: "i"
        label: "An AI news summary or assistant"
  - id: q4
    prompt: "On which devices do you usually consume tech news? (Select all that apply)"
    type: multi_choice
    construct: devices_usually_consume_tech_news
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop or desktop"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Smart speaker / voice assistant"
      - id: "e"
        label: "Smart TV"
      - id: "f"
        label: "E-reader"
      - id: "g"
        label: "Print"
  - id: q5
    prompt: "Which tech topics interest you most? (Select all that apply)"
    type: multi_choice
    construct: tech_topics_interest_most_select
    required: true
    options:
      - id: "a"
        label: "AI and machine learning"
      - id: "b"
        label: "Consumer gadgets and hardware"
      - id: "c"
        label: "Software and app releases"
      - id: "d"
        label: "Startups and business / funding"
      - id: "e"
        label: "Cybersecurity and privacy"
      - id: "f"
        label: "Gaming"
      - id: "g"
        label: "Science and space"
      - id: "h"
        label: "Cryptocurrency / Web3"
      - id: "i"
        label: "Big Tech policy and regulation"
      - id: "j"
        label: "Developer tools and programming"
  - id: q6
    prompt: "Select your top 3 tech topics. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_tech_topics
    required: true
    options:
      - id: "a"
        label: "AI and machine learning"
      - id: "b"
        label: "Consumer gadgets and hardware"
      - id: "c"
        label: "Software and apps"
      - id: "d"
        label: "Startups and business"
      - id: "e"
        label: "Cybersecurity and privacy"
      - id: "f"
        label: "Gaming"
      - id: "g"
        label: "Science and space"
      - id: "h"
