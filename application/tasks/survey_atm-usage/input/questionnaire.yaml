schemaVersion: "1.0"
id: atm_usage_v1
title: "ATM Usage Survey"
description: "How people use ATMs to access cash and how they handle ATM fees."
questions:
  - id: q0
    prompt: "Do you currently have a checking account or debit card at a bank or credit union?"
    type: single_choice
    construct: currently_have_checking_account_debit
    required: true
    options:
      - id: "a"
        label: "Yes, at a bank"
      - id: "b"
        label: "Yes, at a credit union"
      - id: "c"
        label: "Yes, at an online-only or neobank"
      - id: "d"
        label: "No, I don't have one"
  - id: q1
    prompt: "How often do you use an ATM?"
    type: single_choice
    construct: often_use_atm
    required: true
    options:
      - id: "a"
        label: "Several times a week"
      - id: "b"
        label: "About once a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "About once a month"
      - id: "e"
        label: "A few times a year"
      - id: "f"
        label: "Almost never"
  - id: q2
    prompt: "Which type of ATM do you use most often?"
    type: single_choice
    construct: type_atm_use_most_often
    required: true
    options:
      - id: "a"
        label: "My own bank's or credit union's ATM"
      - id: "b"
        label: "Another bank's ATM (out-of-network)"
      - id: "c"
        label: "A surcharge-free network ATM (e.g., Allpoint, MoneyPass)"
      - id: "d"
        label: "A standalone or convenience-store ATM"
      - id: "e"
        label: "An ATM inside a store, bar, or gas station"
      - id: "f"
        label: "I don't use ATMs"
  - id: q3
    prompt: "What do you mainly use ATMs for? (Select all that apply)"
    type: multi_choice
    construct: mainly_use_atms_select_all
    required: true
    options:
      - id: "a"
        label: "Withdrawing cash"
      - id: "b"
        label: "Depositing cash"
      - id: "c"
        label: "Depositing checks"
      - id: "d"
        label: "Checking my account balance"
      - id: "e"
        label: "Transferring money between accounts"
      - id: "f"
        label: "Getting smaller bills or change"
      - id: "g"
        label: "Buying stamps, transit cards, or other services"
      - id: "h"
        label: "I don't use ATMs"
  - id: q4
    prompt: "Which ATM networks or providers have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: atm_networks_providers_have_used
    required: true
    options:
      - id: "a"
        label: "Chase"
      - id: "b"
        label: "Bank of America"
      - id: "c"
        label: "Wells Fargo"
      - id: "d"
        label: "A credit union or its shared branching ATMs"
      - id: "e"
        label: "Allpoint"
      - id: "f"
        label: "MoneyPass"
      - id: "g"
        label: "A standalone/independent ATM (e.g., in a store)"
      - id: "h"
        label: "I don't remember or don't use ATMs"
  - id: q5
    prompt: "About how much cash do you typically withdraw in a single ATM visit? Please enter a dollar amount (enter 0 if you don't use ATMs)."
    type: free_text
    construct: much_cash_typically_withdraw_single
    required: true
  - id: q6
    prompt: "About how much cash do you withdraw from ATMs in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_cash_withdraw_from_atms
    required: true
  - id: q7
    prompt: "About how many times did you use an ATM in the past 30 days? Please enter a number."
    type: free_text
    construct: many_times_did_use_atm
    required: true
  - id: q8
    prompt: "When you need cash, what is your most common way of getting it?"
    type: single_choice
    construct: when_need_cash_most_common
    required: true
    options:
      - id: "a"
        label: "Withdraw from an ATM"
      - id: "b"
        label: "Get cash back at a store checkout"
      - id: "c"
        label: "Withdraw from a teller inside a branch"
      - id: "d"
        label: "Receive cash from other people or my job"
      - id: "e"
        label: "I rarely use cash"
  - id: q9
    prompt: "Have you ever used a cardless or mobile ATM feature (e.g., tapping your phone or scanning a code to withdraw cash)?"
    type: single_choice
    construct: have_ever_used_cardless_mobile
    required: true
    options:
      - id: "a"
        label: "Yes, I use it regularly"
      - id: "b"
        label: "Yes, I've tried it a few times"
      - id: "c"
        label: "No, but I'm aware of it"
      - id: "d"
        label: "No, I've never heard of it"
  - id: q10
    prompt: "How do you usually find an ATM when you need one? (Select all that apply)"
    type: multi_choice
    construct: usually_find_atm_when_need
    required: true
    options:
      - id: "a"
        label: "My bank's mobile app or website locator"
      - id: "b"
        label: "A map app (e.g., Google Maps)"
      - id: "c"
        label: "I go to a branch I already know"
      - id: "d"
        label: "Whatever ATM is nearby, regardless of network"
      - id: "e"
        label: "Inside stores or gas stations I'm already visiting"
      - id: "f"
        label: "I don't actively look for ATMs"
  - id: q11
    prompt: "How concerned are you about paying out-of-network ATM fees?"
    type: single_choice
    construct: concerned_paying_out_network_atm
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q12
    prompt: "What do you do to avoid ATM fees? (Select all that apply)"
    type: multi_choice
    construct: avoid_atm_fees_select_all
    required: true
    options:
      - id: "a"
        label: "Only use my own bank's ATMs"
      - id: "b"
        label: "Get cash back at store checkouts instead"
      - id: "c"
        label: "Withdraw larger amounts less often"
      - id: "d"
        label: "Use a bank that reimburses ATM fees"
      - id: "e"
        label: "Use surcharge-free network ATMs"
      - id: "f"
        label: "I don't take any steps to avoid fees"
  - id: q13
    prompt: "About how much did you pay in ATM fees (out-of-network plus operator surcharges) in the past month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_did_pay_atm_fees
    required: true
  - id: q14
    prompt: "Does your bank reimburse any ATM fees you are charged?"
    type: single_choice
    construct: does_bank_reimburse_any_atm
    required: true
    options:
      - id: "a"
        label: "Yes, it reimburses all ATM fees"
      - id: "b"
        label: "Yes, up to a monthly limit"
      - id: "c"
        label: "No, it does not reimburse fees"
      - id: "d"
        label: "I'm not sure"
  - id: q15
    prompt: "In the past year, have you experienced any of the following ATM problems? (Select all that apply)"
    type: multi_choice
    construct: past_year_have_experienced_any
    required: true
    options:
      - id: "a"
        label: "The ATM was out of cash"
      - id: "b"
        label: "The ATM was out of order or offline"
      - id: "c"
        label: "The machine kept or \"ate\" my card"
      - id: "d"
        label: "I was charged an unexpected fee"
      - id: "e"
        label: "I suspected a card skimmer or tampering"
      - id: "f"
        label: "A deposit was delayed or not credited correctly"
      - id: "g"
        label: "No problems in the past year"
  - id: q16
    prompt: "How much do you agree with the following statement about ATMs? ATMs are convenient and easy for me to access when I need cash."
    type: single_choice
    construct: much_agree_following_statement_atms
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement about ATMs? I worry about card skimming or fraud when using ATMs."
    type: single_choice
    construct: much_agree_following_statement_atms
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement about ATMs? ATM fees are unreasonably high."
    type: single_choice
    construct: much_agree_following_statement_atms
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement about ATMs? I use cash a lot less than I did a few years ago."
    type: single_choice
    construct: much_agree_following_statement_atms
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
