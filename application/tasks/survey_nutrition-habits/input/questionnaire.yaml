    construct: typical_day_many_servings_fruits
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 serving"
      - id: "c"
        label: "2 servings"
      - id: "d"
        label: "3 to 4 servings"
      - id: "e"
        label: "5 or more servings"
  - id: q5
    prompt: "How often do you eat home-cooked meals?"
    type: single_choice
    construct: often_eat_home_cooked_meals
    required: true
    options:
