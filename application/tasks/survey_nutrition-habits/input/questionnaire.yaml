schemaVersion: "1.0"
id: nutrition_habits_v1
title: "Nutrition Habits Survey"
description: "Everyday eating patterns, food choices, and attitudes about nutrition."
questions:
  - id: q0
    prompt: "How would you describe your overall eating habits?"
    type: single_choice
    construct: would_describe_overall_eating_habits
    required: true
    options:
      - id: "a"
        label: "Very healthy"
      - id: "b"
        label: "Somewhat healthy"
      - id: "c"
        label: "About average"
      - id: "d"
        label: "Somewhat unhealthy"
      - id: "e"
        label: "Very unhealthy"
  - id: q1
    prompt: "How many full meals do you typically eat per day? Please enter a number."
    type: free_text
    construct: many_full_meals_typically_eat
    required: true
  - id: q2
    prompt: "Do you follow any particular way of eating? (Select all that apply)"
    type: multi_choice
    construct: follow_any_particular_way_eating
    required: true
    options:
      - id: "a"
        label: "No specific diet"
      - id: "b"
        label: "Vegetarian"
      - id: "c"
        label: "Vegan"
      - id: "d"
        label: "Pescatarian"
      - id: "e"
        label: "Low-carb or keto"
      - id: "f"
        label: "Mediterranean"
      - id: "g"
        label: "Gluten-free"
      - id: "h"
        label: "Intermittent fasting"
      - id: "i"
        label: "Another specific diet"
  - id: q3
    prompt: "How often do you eat breakfast?"
    type: single_choice
    construct: often_eat_breakfast
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "Most days"
      - id: "c"
        label: "A few days a week"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q4
    prompt: "On a typical day, about how many servings of fruits and vegetables do you eat?"
