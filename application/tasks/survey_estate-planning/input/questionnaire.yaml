      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q28
    prompt: "How knowledgeable do you feel about estate planning overall?"
    type: single_choice
