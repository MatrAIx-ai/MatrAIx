schemaVersion: "1.0"
id: pc_gaming_habits_v1
title: "PC Gaming Habits Survey"
description: "How people play video games on a personal computer, including their hardware, storefronts, spending, and gaming behaviors."
questions:
  - id: q0
    prompt: "Do you play video games on a PC (desktop or laptop computer)?"
    type: single_choice
    construct: play_video_games_pc_desktop
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, I don't play games on PC"
  - id: q1
    prompt: "How long have you been playing PC games?"
    type: single_choice
    construct: long_have_been_playing_pc
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 9 years"
      - id: "d"
        label: "10 or more years"
  - id: q2
    prompt: "On a typical week, about how many hours do you spend playing PC games?"
    type: single_choice
    construct: typical_week_many_hours_spend
    required: true
    options:
      - id: "a"
        label: "Less than 2 hours"
      - id: "b"
        label: "2 to 5 hours"
      - id: "c"
        label: "6 to 10 hours"
      - id: "d"
        label: "11 to 20 hours"
      - id: "e"
        label: "More than 20 hours"
  - id: q3
    prompt: "What kind of PC do you mainly game on?"
    type: single_choice
    construct: kind_pc_mainly_game
    required: true
    options:
      - id: "a"
        label: "Custom-built desktop"
      - id: "b"
        label: "Pre-built gaming desktop"
      - id: "c"
        label: "Gaming laptop"
      - id: "d"
        label: "Standard laptop"
      - id: "e"
        label: "Standard desktop or all-in-one"
      - id: "f"
        label: "Handheld gaming PC (e.g., Steam Deck, ROG Ally)"
  - id: q4
    prompt: "Which storefronts or launchers do you use to buy or play PC games? (Select all that apply)"
    type: multi_choice
    construct: storefronts_launchers_use_buy_play
    required: true
    options:
      - id: "a"
        label: "Steam"
      - id: "b"
        label: "Epic Games Store"
      - id: "c"
        label: "GOG"
      - id: "d"
        label: "EA App"
      - id: "e"
        label: "Ubisoft Connect"
      - id: "f"
        label: "Battle.net"
      - id: "g"
        label: "Xbox app / Game Pass for PC"
      - id: "h"
        label: "Riot Client"
      - id: "i"
        label: "Itch.io"
      - id: "j"
        label: "Other"
