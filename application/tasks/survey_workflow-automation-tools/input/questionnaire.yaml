        label: "Moving data between apps"
      - id: "b"
        label: "Email or notification alerts"
      - id: "c"
        label: "Lead capture and CRM updates"
      - id: "d"
        label: "Social media posting"
      - id: "e"
        label: "File backups or transfers"
      - id: "f"
        label: "Form submissions to spreadsheets"
      - id: "g"
        label: "Calendar and scheduling"
      - id: "h"
        label: "E-commerce or order processing"
      - id: "i"
        label: "Reporting and dashboards"
      - id: "j"
        label: "Internal approvals or ticket routing"
      - id: "k"
        label: "Personal or home automation"
      - id: "l"
        label: "Other (please specify)"
  - id: q7
