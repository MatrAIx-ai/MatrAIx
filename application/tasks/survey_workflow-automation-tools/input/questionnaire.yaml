schemaVersion: "1.0"
id: workflow_automation_tools_v1
title: "Workflow Automation Tools Survey"
description: "How people use no-code and low-code workflow automation tools to connect apps and automate repetitive tasks — which tools they choose, what they automate, and how well it works."
questions:
  - id: q0
    prompt: "Do you currently use any workflow automation tool to connect apps or automate repetitive tasks?"
    type: single_choice
    construct: currently_use_any_workflow_automation
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I plan to start"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been using workflow automation tools?"
    type: single_choice
    construct: long_have_been_using_workflow
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "How often do you build or edit automations?"
    type: single_choice
    construct: often_build_edit_automations
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q3
    prompt: "Approximately how many automations (workflows/zaps/scenarios) do you currently have running? Enter a whole number."
    type: free_text
    construct: approximately_many_automations_workflows
    required: true
  - id: q4
    prompt: "Which workflow automation tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: workflow_automation_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Zapier"
      - id: "b"
        label: "Make (formerly Integromat)"
      - id: "c"
        label: "Microsoft Power Automate"
      - id: "d"
        label: "IFTTT"
      - id: "e"
        label: "n8n"
      - id: "f"
        label: "Workato"
      - id: "g"
        label: "Tray.io"
      - id: "h"
        label: "Pipedream"
      - id: "i"
        label: "Airtable Automations"
      - id: "j"
        label: "HubSpot Workflows"
      - id: "k"
        label: "Apple Shortcuts"
      - id: "l"
        label: "Google Apps Script"
      - id: "m"
        label: "Other (please specify)"
  - id: q5
    prompt: "Which workflow automation tool do you use most often?"
    type: single_choice
    construct: workflow_automation_tool_use_most
    required: true
    options:
      - id: "a"
        label: "Zapier"
      - id: "b"
        label: "Make"
      - id: "c"
        label: "Microsoft Power Automate"
      - id: "d"
        label: "IFTTT"
      - id: "e"
        label: "n8n"
      - id: "f"
        label: "Apple Shortcuts"
      - id: "g"
        label: "Another tool"
      - id: "h"
        label: "I don't have a regular tool"
  - id: q6
    prompt: "What kinds of tasks do you automate? (Select all that apply)"
    type: multi_choice
    construct: kinds_tasks_automate_select_all
    required: true
    options:
