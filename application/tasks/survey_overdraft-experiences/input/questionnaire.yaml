schemaVersion: "1.0"
id: overdraft_experiences_v1
title: "Overdraft Experiences Survey"
description: "How people experience checking account overdrafts and overdraft fees, the causes and burden of overdrafts, and the strategies they use to avoid them."
questions:
  - id: q0
    prompt: "Do you currently have a checking account?"
    type: single_choice
    construct: currently_have_checking_account
    required: true
    options:
      - id: "a"
        label: "Yes, one checking account"
      - id: "b"
        label: "Yes, more than one checking account"
      - id: "c"
        label: "No, but I had one in the past"
      - id: "d"
        label: "No, I have never had a checking account"
  - id: q1
    prompt: "Where is your primary checking account held?"
    type: single_choice
    construct: where_primary_checking_account_held
    required: true
    options:
      - id: "a"
        label: "A large national bank (e.g., Chase, Bank of America, Wells Fargo)"
      - id: "b"
        label: "A regional or community bank"
      - id: "c"
        label: "A credit union"
      - id: "d"
        label: "An online-only bank"
      - id: "e"
        label: "A neobank or fintech app (e.g., Chime, Cash App)"
      - id: "f"
        label: "I do not have a checking account"
  - id: q2
    prompt: "In the past 12 months, how many times have you overdrawn your checking account (spent more than your balance)?"
    type: single_choice
    construct: past_12_months_many_times
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 6 times"
      - id: "e"
        label: "7 to 12 times"
      - id: "f"
        label: "More than 12 times"
  - id: q3
    prompt: "About how much have you paid in overdraft or non-sufficient funds (NSF) fees over the past 12 months, in U.S. dollars? Please enter a whole number (enter 0 if none)."
    type: free_text
    construct: much_have_paid_overdraft_non
    required: true
  - id: q4
    prompt: "How much is a single overdraft fee at your primary bank, if you know?"
    type: single_choice
    construct: much_single_overdraft_fee_primary
    required: true
    options:
      - id: "a"
        label: "My bank does not charge overdraft fees"
      - id: "b"
        label: "Under $10"
      - id: "c"
        label: "$10 to $24"
      - id: "d"
        label: "$25 to $34"
      - id: "e"
        label: "$35 or more"
      - id: "f"
        label: "Not sure"
  - id: q5
    prompt: "When you have overdrawn your account, what most often caused it? (Select all that apply)"
    type: multi_choice
    construct: when_have_overdrawn_account_most
    required: true
    options:
      - id: "a"
        label: "Miscalculating my balance"
      - id: "b"
        label: "An unexpected or forgotten charge"
      - id: "c"
        label: "A recurring bill or subscription"
      - id: "d"
        label: "A debit card purchase"
      - id: "e"
        label: "A check or payment clearing sooner than expected"
      - id: "f"
        label: "A deposit that hadn't cleared yet"
      - id: "g"
        label: "Not enough income to cover expenses"
      - id: "h"
        label: "I have never overdrawn my account"
  - id: q6
    prompt: "Are you enrolled in overdraft protection or coverage on your account?"
    type: single_choice
    construct: enrolled_overdraft_protection_coverage_a
    required: true
    options:
      - id: "a"
        label: "Yes, I opted in to overdraft coverage"
      - id: "b"
        label: "Yes, linked to a savings account or line of credit"
      - id: "c"
        label: "No, transactions are declined instead"
      - id: "d"
        label: "Not sure"
  - id: q7
    prompt: "Which overdraft-related protections does your bank offer that you use? (Select all that apply)"
    type: multi_choice
    construct: overdraft_related_protections_does_bank
    required: true
    options:
      - id: "a"
        label: "Linked savings account transfers"
      - id: "b"
        label: "A line of credit or overdraft line"
      - id: "c"
        label: "Low-balance alerts"
      - id: "d"
        label: "A grace period to fix a negative balance"
      - id: "e"
        label: "A no-fee cushion (e.g., overdrafts under a small amount)"
      - id: "f"
        label: "Early direct deposit"
      - id: "g"
        label: "None of these"
  - id: q8
    prompt: "How do you usually find out that you have overdrawn your account?"
    type: single_choice
    construct: usually_find_out_that_have
    required: true
    options:
      - id: "a"
        label: "A text or app notification"
      - id: "b"
        label: "An email from my bank"
      - id: "c"
        label: "Checking my account myself"
      - id: "d"
        label: "A declined transaction"
      - id: "e"
        label: "A letter or statement"
      - id: "f"
        label: "I don't usually notice right away"
  - id: q9
    prompt: "When you overdraw, how quickly do you typically bring your balance positive again?"
    type: single_choice
    construct: when_overdraw_quickly_typically_bring
    required: true
    options:
      - id: "a"
        label: "Same day"
      - id: "b"
        label: "Within a few days"
      - id: "c"
        label: "Within a week"
      - id: "d"
        label: "More than a week"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree with the following statement: Overdraft fees are unfair and too high."
    type: single_choice
    construct: much_agree_following_statement_overdraft
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I understand how my bank's overdraft policy works."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Overdraft coverage has helped me avoid a declined payment when I needed it."
    type: single_choice
    construct: much_agree_following_statement_overdraft
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I would switch banks to avoid overdraft fees."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I keep a close eye on my checking account balance."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
