        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q17
    prompt: "How often do you do each of the following to avoid overdrafts? — Keep a cash cushion in your account"
    type: single_choice
    construct: often_each_following_avoid_overdrafts
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q18
    prompt: "How often do you do each of the following to avoid overdrafts? — Set up low-balance alerts"
