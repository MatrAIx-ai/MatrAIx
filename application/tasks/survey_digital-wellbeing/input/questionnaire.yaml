        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q22
    prompt: "How often does the following interfere with your daily life: screens cutting into exercise or time outdoors?"
    type: single_choice
    construct: often_does_following_interfere_daily
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q23
    prompt: "How often does the following interfere with your daily life: mindless scrolling replacing things you'd rather do?"
    type: single_choice
    construct: often_does_following_interfere_daily
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q24
    prompt: "Which strategies have you tried to reduce or manage your screen time? (Select all that apply)"
    type: multi_choice
