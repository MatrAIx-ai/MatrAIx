schemaVersion: "1.0"
id: digital_wellbeing_v1
title: "Digital Wellbeing & Screen Habits Survey"
description: "People's screen-time habits, use of digital wellbeing tools, and their broader relationship with technology."
questions:
  - id: q0
    prompt: "How would you describe your overall relationship with screens and technology?"
    type: single_choice
    construct: would_describe_overall_relationship_scre
    required: true
    options:
      - id: "a"
        label: "Very healthy and balanced"
      - id: "b"
        label: "Mostly healthy"
      - id: "c"
        label: "Somewhat unbalanced"
      - id: "d"
        label: "Unhealthy — I spend too much time on screens"
      - id: "e"
        label: "I haven't really thought about it"
  - id: q1
    prompt: "On a typical day, about how many hours do you spend on screens for personal (non-work) use?"
    type: single_choice
    construct: typical_day_many_hours_spend
    required: true
    options:
      - id: "a"
        label: "Less than 1 hour"
      - id: "b"
        label: "1-2 hours"
      - id: "c"
        label: "3-4 hours"
      - id: "d"
        label: "5-6 hours"
      - id: "e"
        label: "7-9 hours"
      - id: "f"
        label: "10 or more hours"
  - id: q2
    prompt: "Which devices account for most of your personal screen time? (Select all that apply)"
    type: multi_choice
    construct: devices_account_most_personal_screen
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop or desktop computer"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Smart TV or streaming device"
      - id: "e"
        label: "Gaming console or handheld"
      - id: "f"
        label: "Smartwatch or wearable"
      - id: "g"
        label: "E-reader"
  - id: q3
    prompt: "Which activities take up most of your personal screen time? (Select all that apply)"
    type: multi_choice
    construct: activities_take_up_most_personal
    required: true
    options:
      - id: "a"
        label: "Social media"
      - id: "b"
        label: "Video streaming"
      - id: "c"
        label: "Messaging and communication"
      - id: "d"
        label: "Web browsing / reading news"
      - id: "e"
        label: "Gaming"
      - id: "f"
        label: "Music or podcasts"
      - id: "g"
        label: "Shopping"
      - id: "h"
        label: "Photos or creative apps"
      - id: "i"
        label: "Reading books or articles"
  - id: q4
    prompt: "Do you use any tools or features to monitor or limit your screen time? (Select all that apply)"
    type: multi_choice
    construct: use_any_tools_features_monitor
    required: true
    options:
      - id: "a"
        label: "Apple Screen Time"
      - id: "b"
        label: "Android Digital Wellbeing"
      - id: "c"
        label: "App-specific timers or reminders"
      - id: "d"
        label: "Focus / Do Not Disturb modes"
      - id: "e"
        label: "Third-party app blockers (Freedom, Opal, etc.)"
      - id: "f"
        label: "Grayscale or minimalist launcher"
      - id: "g"
        label: "Website blockers or browser extensions"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "How often do you check your phone within the first 30 minutes of waking up?"
    type: single_choice
    construct: often_check_phone_within_first
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q6
    prompt: "How often do you use screens in the hour before going to sleep?"
    type: single_choice
    construct: often_use_screens_hour_before
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q7
    prompt: "Do you keep your phone in the bedroom overnight?"
    type: single_choice
    construct: keep_phone_bedroom_overnight
    required: true
    options:
      - id: "a"
        label: "Yes, next to my bed"
      - id: "b"
        label: "Yes, but across the room"
      - id: "c"
        label: "No, I keep it in another room"
      - id: "d"
        label: "I don't have a smartphone"
  - id: q8
    prompt: "How often do you feel you check your phone more than you intend to?"
    type: single_choice
    construct: often_feel_check_phone_more
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q9
    prompt: "Which of the following have you experienced related to screen use? (Select all that apply)"
    type: multi_choice
    construct: following_have_experienced_related_scree
    required: true
    options:
      - id: "a"
        label: "Eye strain or headaches"
      - id: "b"
        label: "Trouble sleeping"
      - id: "c"
        label: "Neck or back discomfort"
      - id: "d"
        label: "Difficulty concentrating"
      - id: "e"
        label: "Feeling anxious without my phone"
      - id: "f"
        label: "Comparing myself to others online"
      - id: "g"
        label: "Losing track of time"
      - id: "h"
        label: "None of these"
  - id: q10
    prompt: "Have you ever taken a deliberate break from social media or screens (a \"digital detox\")?"
    type: single_choice
    construct: have_ever_taken_deliberate_break
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q11
    prompt: "About how many hours per day do you wish you spent on screens for personal use?"
    type: free_text
    construct: many_hours_per_day_wish
    required: true
  - id: q12
    prompt: "About how many times per day do you estimate you pick up your phone?"
    type: free_text
    construct: many_times_per_day_estimate
    required: true
  - id: q13
    prompt: "How much do you agree with the following statement: I spend more time on my devices than I would like."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Technology mostly improves my quality of life."
    type: single_choice
    construct: much_agree_following_statement_technolog
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: I feel anxious when I can't access my phone."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: Screen time tools have actually helped me change my habits."
    type: single_choice
    construct: much_agree_following_statement_screen
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: Social media has a negative effect on my mood."
    type: single_choice
    construct: much_agree_following_statement_social
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement: I feel in control of my technology use."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How often does the following interfere with your daily life: screens getting in the way of face-to-face time?"
    type: single_choice
    construct: often_does_following_interfere_daily
    required: true
    options:
      - id: "a"
