      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q20
    prompt: "How often does the following interfere with your daily life: screens disrupting your sleep?"
    type: single_choice
