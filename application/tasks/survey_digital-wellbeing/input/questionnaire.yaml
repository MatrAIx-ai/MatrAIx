      - id: "c"
        label: "Keeping the phone in another room"
      - id: "d"
        label: "Using grayscale mode"
      - id: "e"
        label: "Deleting distracting apps"
      - id: "f"
        label: "Scheduling screen-free times or days"
      - id: "g"
        label: "Using \"focus\" or \"wind down\" modes"
      - id: "h"
        label: "Charging the phone away from the bed"
      - id: "i"
        label: "I haven't tried any strategies"
  - id: q25
    prompt: "Which strategy, if any, has worked best for you?"
    type: single_choice
    construct: strategy_if_any_has_worked
    required: true
    options:
      - id: "a"
        label: "App time limits"
      - id: "b"
        label: "Turning off notifications"
      - id: "c"
        label: "Physical distance from the device"
      - id: "d"
        label: "Deleting apps"
      - id: "e"
        label: "Scheduled screen-free time"
      - id: "f"
        label: "Nothing has really worked"
      - id: "g"
        label: "I haven't tried anything"
  - id: q26
    prompt: "How do you feel about the amount of time your screen-time report shows each week?"
    type: single_choice
