schemaVersion: "1.0"
id: health_newsletter_subscriptions_v1
title: "Health Newsletter Subscriptions Survey"
description: "How consumers subscribe to, read, trust, and value email and digital health and wellness newsletters."
questions:
  - id: q0
    prompt: "Do you currently subscribe to any health or wellness newsletters (by email or app)?"
    type: single_choice
    construct: currently_subscribe_any_health_wellness
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "I used to but no longer do"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "Roughly how many health or wellness newsletters do you currently receive? Please enter a number."
    type: free_text
    construct: roughly_many_health_wellness_newsletters
    required: true
  - id: q2
    prompt: "How long have you subscribed to health newsletters overall?"
    type: single_choice
    construct: long_have_subscribed_health_newsletters
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I do not subscribe to any"
  - id: q3
    prompt: "How often do health newsletters arrive in your inbox?"
    type: single_choice
    construct: often_health_newsletters_arrive_inbox
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Weekly"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Monthly or less often"
  - id: q4
    prompt: "On average, how often do you actually open and read the health newsletters you receive?"
    type: single_choice
    construct: average_often_actually_open_read
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q5
    prompt: "Which topics do the health newsletters you follow cover? (Select all that apply)"
    type: multi_choice
    construct: topics_health_newsletters_follow_cover
    required: true
    options:
      - id: "a"
        label: "General wellness and healthy living"
      - id: "b"
        label: "Nutrition and diet"
      - id: "c"
        label: "Fitness and exercise"
      - id: "d"
        label: "Mental and emotional wellbeing"
      - id: "e"
        label: "Sleep"
      - id: "f"
        label: "Medical and research news"
      - id: "g"
        label: "Vitamins and supplements"
      - id: "h"
        label: "Condition-specific information (e.g., heart health, diabetes)"
      - id: "i"
        label: "Women's or men's health"
      - id: "j"
        label: "Healthy recipes"
      - id: "k"
        label: "I do not follow any"
  - id: q6
    prompt: "Which kinds of publishers or sources send the newsletters you read? (Select all that apply)"
    type: multi_choice
    construct: kinds_publishers_sources_send_newsletter
    required: true
    options:
      - id: "a"
        label: "Hospital or clinic systems (e.g., Mayo Clinic, Cleveland Clinic)"
      - id: "b"
        label: "News outlets and magazines"
      - id: "c"
        label: "Independent writers or creators (e.g., Substack)"
      - id: "d"
        label: "Government health agencies (e.g., CDC, NIH)"
      - id: "e"
        label: "Nonprofit or advocacy organizations"
      - id: "f"
        label: "Fitness or wellness apps and brands"
      - id: "g"
        label: "Individual doctors or health professionals"
      - id: "h"
        label: "Supplement or health-product companies"
      - id: "i"
        label: "I am not sure who publishes them"
  - id: q7
    prompt: "How did you find or start most of your health newsletter subscriptions? (Select all that apply)"
    type: multi_choice
    construct: did_find_start_most_health
    required: true
    options:
      - id: "a"
        label: "Signed up on a website"
      - id: "b"
        label: "Recommended by a friend or family member"
      - id: "c"
        label: "Through social media"
      - id: "d"
        label: "Bundled with an app or account I use"
      - id: "e"
        label: "Suggested by a doctor or health professional"
      - id: "f"
        label: "Came with a purchase or membership"
      - id: "g"
        label: "I do not remember"
