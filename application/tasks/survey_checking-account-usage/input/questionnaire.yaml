        label: "Debit card"
      - id: "b"
        label: "Mobile wallet (Apple Pay, Google Pay)"
      - id: "c"
        label: "Physical checks"
      - id: "d"
        label: "Cash withdrawn from the account"
      - id: "e"
        label: "Online bill pay"
