schemaVersion: "1.0"
id: checking_account_usage_v1
title: "Checking Account Usage Survey"
description: "How people choose, use, and feel about their everyday checking accounts."
questions:
  - id: q0
    prompt: "Do you currently have a checking account?"
    type: single_choice
    construct: currently_have_checking_account
    required: true
    options:
      - id: "a"
        label: "Yes, one checking account"
      - id: "b"
        label: "Yes, more than one checking account"
      - id: "c"
        label: "No, but I've had one before"
      - id: "d"
        label: "No, I've never had one"
  - id: q1
    prompt: "What type of institution holds your primary checking account?"
    type: single_choice
    construct: type_institution_holds_primary_checking
    required: true
    options:
      - id: "a"
        label: "A large national bank (e.g., Chase, Bank of America, Wells Fargo)"
      - id: "b"
        label: "A regional or community bank"
      - id: "c"
        label: "A credit union"
      - id: "d"
        label: "An online-only bank or neobank (e.g., Chime, Ally, SoFi)"
      - id: "e"
        label: "I don't have a checking account"
  - id: q2
    prompt: "Roughly how long have you had your primary checking account?"
    type: single_choice
    construct: roughly_long_have_had_primary
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Which bank or credit union holds your primary checking account?"
    type: single_choice
    construct: bank_credit_union_holds_primary
    required: true
    options:
      - id: "a"
        label: "Chase"
      - id: "b"
        label: "Bank of America"
      - id: "c"
        label: "Wells Fargo"
      - id: "d"
        label: "Citibank"
      - id: "e"
        label: "Capital One"
      - id: "f"
        label: "A credit union"
      - id: "g"
        label: "An online bank (Ally, SoFi, Chime, etc.)"
      - id: "h"
        label: "Another bank"
  - id: q4
    prompt: "How do you most often access your checking account?"
    type: single_choice
    construct: most_often_access_checking_account
    required: true
    options:
      - id: "a"
        label: "Mobile banking app"
      - id: "b"
        label: "Online banking on a computer"
      - id: "c"
        label: "ATM"
      - id: "d"
        label: "In person at a branch"
      - id: "e"
        label: "By phone"
  - id: q5
    prompt: "How often do you check your checking account balance?"
    type: single_choice
    construct: often_check_checking_account_balance
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "About once a week"
      - id: "e"
        label: "A few times a month or less"
  - id: q6
    prompt: "Which features do you use on your checking account? (Select all that apply)"
