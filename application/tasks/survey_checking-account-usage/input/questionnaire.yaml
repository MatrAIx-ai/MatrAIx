        label: "Mobile check deposit"
      - id: "b"
        label: "Bill pay"
      - id: "c"
        label: "Person-to-person payments (Zelle, Venmo)"
      - id: "d"
        label: "Debit card"
      - id: "e"
        label: "Direct deposit of paychecks"
      - id: "f"
        label: "Automatic transfers to savings"
      - id: "g"
        label: "Low-balance or transaction alerts"
      - id: "h"
        label: "Overdraft protection"
