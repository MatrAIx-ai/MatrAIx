schemaVersion: "1.0"
id: financial_confidence_v1
title: "Financial Confidence Survey"
description: "How confident and secure people feel about managing their money, handling setbacks, and reaching their financial goals."
questions:
  - id: q0
    prompt: "Overall, how confident do you feel about managing your personal finances?"
    type: single_choice
    construct: overall_confident_feel_managing_personal
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q1
    prompt: "How would you rate your overall financial situation today?"
    type: single_choice
    construct: would_rate_overall_financial_situation
    required: true
    options:
      - id: "a"
        label: "Poor"
      - id: "b"
        label: "Fair"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Very good"
      - id: "e"
        label: "Excellent"
  - id: q2
    prompt: "Compared with a year ago, how confident do you feel about your finances now?"
    type: single_choice
    construct: compared_year_ago_confident_feel
    required: true
    options:
      - id: "a"
        label: "Much less confident"
      - id: "b"
        label: "Somewhat less confident"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "Somewhat more confident"
      - id: "e"
        label: "Much more confident"
  - id: q3
    prompt: "In which areas of personal finance do you feel confident? (Select all that apply)"
    type: multi_choice
    construct: areas_personal_finance_feel_confident
    required: true
    options:
      - id: "a"
        label: "Budgeting and tracking spending"
      - id: "b"
        label: "Saving regularly"
      - id: "c"
        label: "Managing debt"
      - id: "d"
        label: "Investing"
      - id: "e"
        label: "Retirement planning"
      - id: "f"
        label: "Understanding taxes"
      - id: "g"
        label: "Choosing insurance"
      - id: "h"
        label: "I don't feel confident in any of these"
  - id: q4
    prompt: "In which areas of personal finance do you feel least confident or most anxious? (Select all that apply)"
    type: multi_choice
    construct: areas_personal_finance_feel_least
    required: true
    options:
      - id: "a"
        label: "Budgeting and tracking spending"
      - id: "b"
        label: "Saving regularly"
      - id: "c"
        label: "Managing debt"
      - id: "d"
        label: "Investing"
      - id: "e"
        label: "Retirement planning"
      - id: "f"
        label: "Understanding taxes"
      - id: "g"
        label: "Choosing insurance"
      - id: "h"
        label: "I feel confident in all of these"
  - id: q5
    prompt: "How confident are you: That you could handle a major unexpected expense (e.g., $1,000) without borrowing."
    type: single_choice
    construct: confident_that_could_handle_major
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q6
    prompt: "How confident are you: That you are saving enough for retirement."
    type: single_choice
    construct: confident_that_saving_enough_retirement
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q7
    prompt: "How confident are you: That you could make a good decision about investing your money."
    type: single_choice
    construct: confident_that_could_make_good
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q8
    prompt: "How confident are you: That you understand the financial products you use (accounts, loans, cards)."
    type: single_choice
    construct: confident_that_understand_financial_prod
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q9
    prompt: "How confident are you: That you are on track to meet your long-term financial goals."
    type: single_choice
