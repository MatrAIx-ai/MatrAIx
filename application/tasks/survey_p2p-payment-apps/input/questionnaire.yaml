schemaVersion: "1.0"
id: p2p_payment_apps_v1
title: "Peer-to-Peer Payment Apps Survey"
description: "How people use peer-to-peer payment apps such as Venmo, Cash App, Zelle, and PayPal to send and receive money, and their attitudes toward safety and privacy."
questions:
  - id: q0
    prompt: "Do you use any peer-to-peer (P2P) payment apps to send or receive money from other people?"
    type: single_choice
    construct: use_any_peer_peer_p2p
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I tried one but stopped"
      - id: "d"
        label: "No, but I plan to start"
      - id: "e"
        label: "No, and I do not plan to"
  - id: q1
    prompt: "How long have you been using P2P payment apps?"
    type: single_choice
    construct: long_have_been_using_p2p
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 7 years"
      - id: "e"
        label: "More than 7 years"
      - id: "f"
        label: "I do not use P2P payment apps"
  - id: q2
    prompt: "Which P2P payment apps do you use? (Select all that apply)"
    type: multi_choice
    construct: p2p_payment_apps_use_select
    required: true
    options:
      - id: "a"
        label: "Venmo"
      - id: "b"
        label: "Cash App"
      - id: "c"
        label: "Zelle"
      - id: "d"
        label: "PayPal"
      - id: "e"
        label: "Apple Cash"
      - id: "f"
        label: "Google Pay"
      - id: "g"
        label: "Facebook / Meta Pay"
      - id: "h"
        label: "I do not use P2P payment apps"
  - id: q3
    prompt: "Which P2P app do you use most often?"
    type: single_choice
    construct: p2p_app_use_most_often
    required: true
    options:
      - id: "a"
        label: "Venmo"
      - id: "b"
        label: "Cash App"
      - id: "c"
        label: "Zelle"
      - id: "d"
        label: "PayPal"
      - id: "e"
        label: "Apple Cash"
      - id: "f"
        label: "Google Pay"
      - id: "g"
        label: "I do not use P2P payment apps"
  - id: q4
    prompt: "How often do you send or receive money through a P2P app?"
    type: single_choice
    construct: often_send_receive_money_through
    required: true
    options:
      - id: "a"
        label: "Multiple times a week"
      - id: "b"
        label: "About once a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "About once a month"
      - id: "e"
        label: "Less than once a month"
  - id: q5
    prompt: "About how much money do you send through P2P apps in a typical month, in U.S. dollars? Please enter a whole number."
    type: free_text
    construct: much_money_send_through_p2p
    required: true
  - id: q6
    prompt: "What do you most commonly use P2P apps for? (Select all that apply)"
    type: multi_choice
    construct: most_commonly_use_p2p_apps
    required: true
    options:
      - id: "a"
        label: "Splitting bills or meals with friends"
      - id: "b"
        label: "Paying rent or utilities to a roommate or landlord"
      - id: "c"
        label: "Sending money to family"
      - id: "d"
        label: "Paying a small business or individual for services"
      - id: "e"
        label: "Receiving payment for goods I sell"
      - id: "f"
        label: "Gifts or special occasions"
      - id: "g"
        label: "Reimbursing someone"
      - id: "h"
        label: "Receiving my paycheck or gig income"
