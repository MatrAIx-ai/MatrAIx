      - id: "c"
        label: "Roommates"
      - id: "d"
        label: "Coworkers"
      - id: "e"
        label: "Small businesses or service providers"
      - id: "f"
        label: "People I don't know well"
      - id: "g"
        label: "Myself (moving my own money)"
