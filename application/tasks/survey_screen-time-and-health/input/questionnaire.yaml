schemaVersion: "1.0"
id: screen_time_and_health_v1
title: "Screen Time and Health Survey"
description: "Screen-time habits and their perceived effects on wellbeing."
questions:
  - id: q0
    prompt: "On a typical day, about how many hours do you spend looking at screens outside of work? Please enter a number."
    type: free_text
    construct: typical_day_many_hours_spend
    required: true
  - id: q1
    prompt: "Which devices account for most of your screen time? (Select all that apply)"
    type: multi_choice
    construct: devices_account_most_screen_time
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop or desktop computer"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Television"
      - id: "e"
        label: "Gaming console"
      - id: "f"
        label: "Smartwatch or wearable"
  - id: q2
    prompt: "How would you describe your overall screen time?"
    type: single_choice
    construct: would_describe_overall_screen_time
    required: true
    options:
      - id: "a"
        label: "Much more than I'd like"
      - id: "b"
        label: "A little more than I'd like"
      - id: "c"
        label: "About right"
      - id: "d"
        label: "Less than most people"
  - id: q3
    prompt: "Which activities make up most of your non-work screen time? (Select all that apply)"
    type: multi_choice
    construct: activities_make_up_most_non
    required: true
    options:
      - id: "a"
        label: "Social media"
      - id: "b"
        label: "Streaming video"
      - id: "c"
        label: "Gaming"
      - id: "d"
        label: "News or reading"
      - id: "e"
        label: "Messaging or video calls"
      - id: "f"
        label: "Shopping"
      - id: "g"
        label: "General browsing"
  - id: q4
    prompt: "On a typical workday, about how many hours do you spend looking at screens for work? Please enter a number (enter 0 if none)."
    type: free_text
    construct: typical_workday_many_hours_spend
    required: true
  - id: q5
    prompt: "Which effects do you attribute to your screen time? (Select all that apply)"
    type: multi_choice
    construct: effects_attribute_screen_time_select
    required: true
    options:
      - id: "a"
        label: "Eye strain or dryness"
      - id: "b"
        label: "Trouble sleeping"
      - id: "c"
        label: "Neck or back discomfort"
      - id: "d"
        label: "Headaches"
      - id: "e"
        label: "Feeling distracted"
      - id: "f"
        label: "Reduced physical activity"
      - id: "g"
        label: "No noticeable effects"
  - id: q6
    prompt: "How often do you use screens within an hour of going to bed?"
    type: single_choice
    construct: often_use_screens_within_hour
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Most nights"
      - id: "e"
        label: "Every night"
  - id: q7
    prompt: "Which steps do you take to manage your screen time? (Select all that apply)"
    type: multi_choice
    construct: steps_take_manage_screen_time
    required: true
    options:
      - id: "a"
        label: "Screen-time tracking or app limits"
      - id: "b"
        label: "Night mode or blue-light filter"
      - id: "c"
        label: "Scheduled breaks"
      - id: "d"
        label: "No-phone times or zones"
      - id: "e"
        label: "Grayscale or notification limits"
      - id: "f"
        label: "I don't take any steps"
  - id: q8
    prompt: "Do you use any built-in screen-time or digital-wellbeing tools on your devices?"
    type: single_choice
    construct: use_any_built_screen_time
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I set them up but ignore them"
      - id: "d"
        label: "No"
  - id: q9
    prompt: "How often do you take breaks from screens during long sessions?"
    type: single_choice
    construct: often_take_breaks_from_screens
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Every few hours"
      - id: "d"
        label: "About once an hour"
      - id: "e"
        label: "Every 20–30 minutes"
  - id: q10
    prompt: "Which digital-wellbeing features have you used? (Select all that apply)"
    type: multi_choice
    construct: digital_wellbeing_features_have_used
    required: true
    options:
      - id: "a"
        label: "App time limits"
      - id: "b"
        label: "Night mode / blue-light filter"
      - id: "c"
        label: "Focus or Do Not Disturb modes"
      - id: "d"
        label: "Grayscale mode"
      - id: "e"
        label: "Bedtime or wind-down mode"
      - id: "f"
        label: "Weekly screen-time reports"
      - id: "g"
        label: "None of these"
  - id: q11
    prompt: "How much do you agree with the following statement: My screen time affects my sleep."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: My screen time affects my eyes."
    type: single_choice
