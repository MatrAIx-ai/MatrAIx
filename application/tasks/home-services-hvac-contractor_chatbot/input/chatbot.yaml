transport: sidecar_http
runtimeDefaults:
  applicationId: home-services_chat
  applicationContext: home-services_support
  domain: home-services
capabilities:
  - text_chat
connection:
  baseUrlEnv: CHATBOT_API_URL
  baseUrl: http://home-services-hvac-contractor-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: ""
    messageField: message
    titleField: ""
    botTypeField: ""
    staticBody: {}
  response:
    sessionIdField: ""
    replyField: reply
    turnField: turn
personaExposure:
  fields: []
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
