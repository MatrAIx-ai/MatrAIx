    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "Do you listen to health, wellness, fitness, or medical podcasts specifically?"
    type: single_choice
    construct: listen_health_wellness_fitness_medical
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, sometimes"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, never"
