schemaVersion: "1.0"
id: mobile_os_preference_v1
title: "Mobile Operating System Preference Survey"
description: "People's preferences, loyalty, and switching behavior between iPhone (iOS) and Android."
questions:
  - id: q0
    prompt: "Which mobile operating system does your primary phone use?"
    type: single_choice
    construct: mobile_operating_system_does_primary
    required: true
    options:
      - id: "a"
        label: "iOS (iPhone)"
      - id: "b"
        label: "Android"
      - id: "c"
        label: "Other"
      - id: "d"
        label: "I don't use a smartphone"
  - id: q1
    prompt: "How long have you used your current mobile platform?"
    type: single_choice
    construct: long_have_used_current_mobile
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 to 12 years"
      - id: "e"
        label: "More than 12 years"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "Have you ever switched between iOS and Android?"
    type: single_choice
    construct: have_ever_switched_between_ios
    required: true
    options:
      - id: "a"
        label: "Yes, from Android to iOS"
      - id: "b"
        label: "Yes, from iOS to Android"
      - id: "c"
        label: "Yes, back and forth multiple times"
      - id: "d"
        label: "No, I've always used the same platform"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Which phone brand do you currently use?"
    type: single_choice
    construct: phone_brand_currently_use
    required: true
    options:
      - id: "a"
        label: "Apple (iPhone)"
      - id: "b"
        label: "Samsung"
      - id: "c"
        label: "Google (Pixel)"
      - id: "d"
        label: "OnePlus"
      - id: "e"
        label: "Motorola"
      - id: "f"
        label: "Xiaomi"
      - id: "g"
        label: "Other Android brand"
      - id: "h"
        label: "Other"
      - id: "i"
        label: "Not applicable"
  - id: q4
    prompt: "How did you choose your current mobile platform? (Select all that apply)"
    type: multi_choice
    construct: did_choose_current_mobile_platform
    required: true
    options:
      - id: "a"
        label: "It's what I've always used"
      - id: "b"
        label: "Friends or family use the same platform"
      - id: "c"
        label: "It works best with my other devices"
      - id: "d"
        label: "Better apps or features"
      - id: "e"
        label: "Price and value"
      - id: "f"
        label: "Camera quality"
      - id: "g"
        label: "Brand loyalty or preference"
      - id: "h"
        label: "It was a gift or provided by work"
      - id: "i"
        label: "Other"
  - id: q5
    prompt: "Which other devices in the same ecosystem do you own? (Select all that apply)"
    type: multi_choice
    construct: other_devices_same_ecosystem_own
    required: true
    options:
      - id: "a"
        label: "Tablet (iPad or Android tablet)"
      - id: "b"
        label: "Smartwatch (Apple Watch, Galaxy Watch, Pixel Watch)"
      - id: "c"
        label: "Wireless earbuds (AirPods, Galaxy Buds, Pixel Buds)"
      - id: "d"
        label: "Laptop or computer from the same brand"
      - id: "e"
        label: "Smart speaker or smart display"
      - id: "f"
        label: "Streaming device (Apple TV, Chromecast, etc.)"
      - id: "g"
        label: "None of these"
  - id: q6
    prompt: "How locked into your current ecosystem do you feel?"
    type: single_choice
    construct: locked_into_current_ecosystem_feel
    required: true
    options:
      - id: "a"
        label: "Not at all — I could switch easily"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Very"
      - id: "e"
        label: "Extremely — switching would be a major hassle"
  - id: q7
    prompt: "How likely is it that your next phone will use the same operating system?"
    type: single_choice
    construct: likely_it_that_next_phone
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q8
