transport: external_http
runtimeDefaults:
  applicationId: medical_assistant
  applicationContext: medical_consultation
  domain: medical_consultation
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_MEDICAL
  legacyBaseUrlEnv: MEDICAL_CHATBOT_URL
  baseUrl: http://medical-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: medical_assistant
      applicationContext: medical_consultation
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested items or entities
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
