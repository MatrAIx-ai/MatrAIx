schemaVersion: "1.0"
id: gold_commodity_investing_v1
title: "Gold and Commodity Investing Survey"
description: "How people invest in gold, precious metals, and other commodities, and why."
questions:
  - id: q0
    prompt: "Do you currently own any gold, precious metals, or commodity investments?"
    type: single_choice
    construct: currently_own_any_gold_precious
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have in the past"
      - id: "c"
        label: "No, but I'm considering it"
      - id: "d"
        label: "No, and I'm not considering it"
  - id: q1
    prompt: "How long have you been investing in gold or commodities?"
    type: single_choice
    construct: long_have_been_investing_gold
    required: true
    options:
      - id: "a"
        label: "Less than a year"
      - id: "b"
        label: "1–3 years"
      - id: "c"
        label: "4–10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "I don't invest in them"
  - id: q2
    prompt: "Which of the following do you currently own or invest in? (Select all that apply)"
    type: multi_choice
    construct: following_currently_own_invest_select
    required: true
    options:
      - id: "a"
        label: "Physical gold (coins or bars)"
      - id: "b"
        label: "Physical silver"
      - id: "c"
        label: "Other physical metals (platinum, palladium)"
      - id: "d"
        label: "A gold or silver ETF (e.g., GLD, SLV, IAU)"
      - id: "e"
        label: "Mining company stocks or ETFs"
      - id: "f"
        label: "Oil, gas, or energy commodities"
      - id: "g"
        label: "Agricultural or other commodity funds"
      - id: "h"
        label: "A broad commodity index fund"
      - id: "i"
        label: "None of these"
  - id: q3
    prompt: "How do you mainly hold your precious metals or commodities?"
    type: single_choice
    construct: mainly_hold_precious_metals_commodities
    required: true
    options:
      - id: "a"
        label: "Physical metal I store myself"
      - id: "b"
        label: "Physical metal in a vault or depository"
      - id: "c"
        label: "ETFs or funds in a brokerage account"
      - id: "d"
        label: "Individual mining or commodity stocks"
      - id: "e"
        label: "A mix of physical and paper"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "What share of your total investments is in gold, metals, or commodities? Please enter a percentage (enter 0 if none)."
    type: free_text
    construct: share_total_investments_gold_metals
    required: true
  - id: q5
    prompt: "About how much have you invested in gold, metals, or commodities in total? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_have_invested_gold_metals
    required: true
  - id: q6
    prompt: "In the past 12 months, about how many times did you buy or sell gold or commodities? Please enter a number (enter 0 if none)."
    type: free_text
    construct: past_12_months_many_times
    required: true
  - id: q7
    prompt: "What are your main reasons for investing in gold or commodities? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_investing_gold_commodities
    required: true
    options:
      - id: "a"
        label: "Protection against inflation"
      - id: "b"
        label: "A safe haven during market downturns"
      - id: "c"
        label: "Diversifying my portfolio"
      - id: "d"
        label: "Distrust of paper currency or the financial system"
      - id: "e"
        label: "Long-term store of value"
      - id: "f"
        label: "Potential for price gains"
      - id: "g"
        label: "I like owning something tangible"
      - id: "h"
