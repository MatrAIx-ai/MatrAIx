      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement about your main browser? — My browser uses too much memory or slows my computer down"
    type: single_choice
    construct: much_agree_following_statement_main
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement about your main browser? — I am concerned about how much data my browser collects"
    type: single_choice
    construct: much_agree_following_statement_main
