schemaVersion: "1.0"
id: web_browser_choice_v1
title: "Web Browser Choice & Habits Survey"
description: "Which web browsers people use across their devices and the habits, preferences, and privacy attitudes behind those choices."
questions:
  - id: q0
    prompt: "Which web browser do you use most often on your main computer?"
    type: single_choice
    construct: web_browser_use_most_often
    required: true
    options:
      - id: "a"
        label: "Google Chrome"
      - id: "b"
        label: "Microsoft Edge"
      - id: "c"
        label: "Safari"
      - id: "d"
        label: "Mozilla Firefox"
      - id: "e"
        label: "Brave"
      - id: "f"
        label: "Opera"
      - id: "g"
        label: "Another browser"
  - id: q1
    prompt: "Which web browsers have you used on any device in the past month? (Select all that apply)"
    type: multi_choice
    construct: web_browsers_have_used_any
    required: true
    options:
      - id: "a"
        label: "Google Chrome"
      - id: "b"
        label: "Microsoft Edge"
      - id: "c"
        label: "Safari"
      - id: "d"
        label: "Mozilla Firefox"
      - id: "e"
        label: "Brave"
      - id: "f"
        label: "Opera"
      - id: "g"
        label: "Vivaldi"
      - id: "h"
        label: "Arc"
      - id: "i"
        label: "DuckDuckGo browser"
      - id: "j"
        label: "Samsung Internet"
      - id: "k"
        label: "Tor Browser"
  - id: q2
    prompt: "How long have you been using your current main browser as your primary one?"
    type: single_choice
    construct: long_have_been_using_current
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "How many different browsers do you have installed on your main computer right now?"
    type: free_text
    construct: many_different_browsers_have_installed
    required: true
  - id: q4
    prompt: "On which devices do you regularly browse the web? (Select all that apply)"
    type: multi_choice
    construct: devices_regularly_browse_web_select
    required: true
    options:
      - id: "a"
        label: "Windows PC"
      - id: "b"
        label: "Mac"
      - id: "c"
        label: "Linux computer"
      - id: "d"
        label: "iPhone"
      - id: "e"
        label: "Android phone"
      - id: "f"
        label: "iPad or Android tablet"
      - id: "g"
        label: "Smart TV or streaming device"
      - id: "h"
        label: "Work-issued computer"
  - id: q5
    prompt: "Why did you choose your current main browser? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_current_main
    required: true
    options:
      - id: "a"
        label: "It came pre-installed on my device"
      - id: "b"
        label: "It is fast"
      - id: "c"
        label: "Better privacy or tracking protection"
      - id: "d"
        label: "Syncs across my devices"
      - id: "e"
        label: "Works well with my other accounts (Google, Apple, Microsoft)"
      - id: "f"
        label: "Extensions or add-ons I need"
      - id: "g"
        label: "Recommended by someone I trust"
      - id: "h"
        label: "Habit / I have always used it"
      - id: "i"
        label: "Uses less memory or battery"
  - id: q6
    prompt: "Roughly how many hours per day do you spend using a web browser?"
    type: free_text
    construct: roughly_many_hours_per_day
    required: true
  - id: q7
    prompt: "Do you use the same browser on your phone and your computer?"
    type: single_choice
    construct: use_same_browser_phone_computer
    required: true
    options:
      - id: "a"
        label: "Yes, the same on both"
      - id: "b"
        label: "Different browsers on each"
      - id: "c"
        label: "I only browse on one type of device"
  - id: q8
    prompt: "How often do you switch between different browsers during a typical week?"
    type: single_choice
    construct: often_switch_between_different_browsers
    required: true
    options:
      - id: "a"
        label: "Never, I only use one"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly, I use several in parallel"
  - id: q9
    prompt: "Which browser features do you regularly use? (Select all that apply)"
    type: multi_choice
    construct: browser_features_regularly_use_select
    required: true
    options:
      - id: "a"
        label: "Bookmarks or favorites"
      - id: "b"
        label: "Browser sync across devices"
      - id: "c"
        label: "Saved passwords / password manager"
      - id: "d"
        label: "Autofill for forms and payments"
      - id: "e"
        label: "Reader or reading mode"
      - id: "f"
        label: "Tab groups"
      - id: "g"
        label: "Private / incognito windows"
      - id: "h"
        label: "Built-in translation"
      - id: "i"
        label: "Vertical tabs or sidebar"
      - id: "j"
        label: "Profiles for different purposes"
  - id: q10
    prompt: "About how many browser tabs do you typically have open at once?"
    type: single_choice
    construct: many_browser_tabs_typically_have
    required: true
    options:
      - id: "a"
        label: "1–3"
      - id: "b"
        label: "4–10"
      - id: "c"
        label: "11–25"
      - id: "d"
        label: "26–50"
      - id: "e"
        label: "More than 50"
  - id: q11
    prompt: "How do you usually navigate to a website you visit often?"
    type: single_choice
    construct: usually_navigate_website_visit_often
    required: true
    options:
      - id: "a"
        label: "Type it in the address bar"
      - id: "b"
        label: "Use a bookmark or favorite"
      - id: "c"
        label: "Search for it each time"
      - id: "d"
        label: "Use the browser's speed dial / new tab shortcuts"
      - id: "e"
        label: "It is set as my home page"
  - id: q12
    prompt: "Do you use private / incognito mode?"
    type: single_choice
    construct: use_private_incognito_mode
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "It is my default way to browse"
  - id: q13
    prompt: "How many browser extensions or add-ons do you currently have installed?"
    type: single_choice
    construct: many_browser_extensions_add_ons
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1–3"
      - id: "c"
        label: "4–7"
      - id: "d"
        label: "8 or more"
      - id: "e"
        label: "Not sure"
  - id: q14
    prompt: "Which of the following privacy steps do you take in your browser? (Select all that apply)"
    type: multi_choice
    construct: following_privacy_steps_take_browser
    required: true
    options:
      - id: "a"
        label: "Block third-party cookies"
      - id: "b"
        label: "Use tracking protection or an ad blocker"
      - id: "c"
        label: "Clear browsing history or cookies regularly"
      - id: "d"
        label: "Reject or minimize cookie consent pop-ups"
      - id: "e"
        label: "Use a VPN alongside the browser"
      - id: "f"
        label: "Turn off telemetry / data sharing"
      - id: "g"
        label: "None of these"
  - id: q15
    prompt: "How much do you agree with the following statement about your main browser? — My browser is fast and responsive"
    type: single_choice
    construct: much_agree_following_statement_main
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement about your main browser? — My browser protects my privacy well"
    type: single_choice
    construct: much_agree_following_statement_main
    required: true
