schemaVersion: "1.0"
id: first_time_homebuying_v1
title: "First-Time Homebuying Survey"
description: "The experiences, plans, and challenges of buying a first home."
questions:
  - id: q0
    prompt: "Which best describes your current homebuying situation?"
    type: single_choice
    construct: best_describes_current_homebuying_situat
    required: true
    options:
      - id: "a"
        label: "I bought my first home in the past 2 years"
      - id: "b"
        label: "I'm actively shopping for my first home now"
      - id: "c"
        label: "I plan to buy my first home in the next few years"
      - id: "d"
        label: "I'd like to buy someday but have no timeline"
      - id: "e"
        label: "I don't plan to buy a home"
  - id: q1
    prompt: "Do you currently own a home?"
    type: single_choice
    construct: currently_own_home
    required: true
    options:
      - id: "a"
        label: "Yes, my first home"
      - id: "b"
        label: "No, I rent"
      - id: "c"
        label: "No, I live with family or others"
      - id: "d"
        label: "Other arrangement"
  - id: q2
    prompt: "How long have you been (or were you) actively looking for a first home?"
    type: single_choice
    construct: long_have_been_were_actively
    required: true
    options:
      - id: "a"
        label: "I haven't started looking"
      - id: "b"
        label: "Less than 3 months"
      - id: "c"
        label: "3 to 6 months"
      - id: "d"
        label: "6 months to 1 year"
      - id: "e"
        label: "More than 1 year"
  - id: q3
    prompt: "What type of home are you looking for (or did you buy)?"
    type: single_choice
    construct: type_home_looking_did_buy
    required: true
    options:
      - id: "a"
        label: "Single-family house"
      - id: "b"
        label: "Townhouse"
      - id: "c"
        label: "Condominium"
      - id: "d"
        label: "Multi-family (duplex, etc.)"
      - id: "e"
        label: "Manufactured or mobile home"
      - id: "f"
        label: "Undecided"
  - id: q4
    prompt: "What are your main reasons for wanting to buy a first home? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_wanting_buy_first
    required: true
    options:
      - id: "a"
        label: "Build equity instead of paying rent"
      - id: "b"
        label: "Stability and putting down roots"
      - id: "c"
        label: "More space or a better location"
      - id: "d"
        label: "Starting or growing a family"
      - id: "e"
        label: "An investment for the future"
      - id: "f"
        label: "Freedom to renovate or personalize"
      - id: "g"
        label: "Rising rents made buying attractive"
      - id: "h"
        label: "Tax benefits"
  - id: q5
    prompt: "How are you funding (or did you fund) your down payment? (Select all that apply)"
    type: multi_choice
    construct: funding_did_fund_down_payment
    required: true
    options:
      - id: "a"
        label: "Personal savings"
      - id: "b"
        label: "A gift from family"
      - id: "c"
        label: "A down payment assistance program"
      - id: "d"
        label: "Sale of investments"
      - id: "e"
        label: "Retirement account withdrawal or loan"
      - id: "f"
        label: "A second job or side income"
