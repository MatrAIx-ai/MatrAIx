transport: external_http
runtimeDefaults:
  applicationId: mental_health_bot
  applicationContext: mental_health_support
  domain: mental_health_support
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_MENTAL_HEALTH
  legacyBaseUrlEnv: MENTAL_HEALTH_CHATBOT_URL
  baseUrl: http://mental-health-support-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: mental_health_bot
      applicationContext: mental_health_support
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested coping resources or hotlines
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
