version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/chat-mental-health-support"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "medical-consultation"
tags = ["mental health", "emotional support", "safety", "crisis escalation", "multi turn chat"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
