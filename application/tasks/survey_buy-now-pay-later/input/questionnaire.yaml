schemaVersion: "1.0"
id: buy_now_pay_later_v1
title: "Buy Now, Pay Later (BNPL) Survey"
description: "How consumers adopt, use, and feel about buy now, pay later installment services."
questions:
  - id: q0
    prompt: "Have you ever used a buy now, pay later (BNPL) service to split a purchase into installments?"
    type: single_choice
    construct: have_ever_used_buy_now
    required: true
    options:
      - id: "a"
        label: "Yes, I use it regularly"
      - id: "b"
        label: "Yes, I have used it occasionally"
      - id: "c"
        label: "Yes, but only once or twice"
      - id: "d"
        label: "No, but I am aware of these services"
      - id: "e"
        label: "No, I have never heard of them"
  - id: q1
    prompt: "In the past 12 months, about how often have you used a BNPL service?"
    type: single_choice
    construct: past_12_months_often_have
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once or twice"
      - id: "c"
        label: "A few times"
      - id: "d"
        label: "About once a month"
      - id: "e"
        label: "Several times a month or more"
  - id: q2
    prompt: "Which BNPL providers have you used? (Select all that apply)"
    type: multi_choice
    construct: bnpl_providers_have_used_select
    required: true
    options:
      - id: "a"
        label: "Affirm"
      - id: "b"
        label: "Klarna"
      - id: "c"
        label: "Afterpay"
      - id: "d"
        label: "PayPal Pay in 4"
      - id: "e"
        label: "Zip (formerly Quadpay)"
      - id: "f"
        label: "Sezzle"
      - id: "g"
        label: "A retailer's or store's own installment plan"
      - id: "h"
        label: "I have never used a BNPL service"
  - id: q3
    prompt: "Where do you most often use BNPL?"
    type: single_choice
    construct: where_most_often_use_bnpl
    required: true
    options:
      - id: "a"
        label: "Online checkout"
      - id: "b"
        label: "In a store using an app or card"
      - id: "c"
        label: "Through a BNPL app for any purchase"
      - id: "d"
        label: "About equally online and in store"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "For which types of purchases have you used BNPL? (Select all that apply)"
    type: multi_choice
    construct: types_purchases_have_used_bnpl
    required: true
    options:
      - id: "a"
        label: "Clothing, shoes, or accessories"
      - id: "b"
        label: "Electronics or appliances"
      - id: "c"
        label: "Furniture or home goods"
      - id: "d"
        label: "Health, beauty, or fitness"
      - id: "e"
        label: "Travel or event tickets"
      - id: "f"
        label: "Groceries or everyday essentials"
      - id: "g"
        label: "Medical or dental bills"
      - id: "h"
        label: "I have never used BNPL"
  - id: q5
    prompt: "About how much was your most recent BNPL purchase? Please enter a dollar amount."
    type: free_text
    construct: much_was_most_recent_bnpl
    required: true
  - id: q6
    prompt: "How many BNPL plans do you currently have active (still being paid off)?"
    type: single_choice
    construct: many_bnpl_plans_currently_have
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 5"
      - id: "e"
        label: "6 or more"
  - id: q7
    prompt: "What is the typical repayment structure you use?"
    type: single_choice
    construct: typical_repayment_structure_use
    required: true
    options:
      - id: "a"
        label: "Pay in 4 (four interest-free payments over about 6 weeks)"
      - id: "b"
        label: "Monthly installments over several months"
      - id: "c"
        label: "Longer financing (6 months or more), sometimes with interest"
      - id: "d"
        label: "A mix of these"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "How did you first discover BNPL as a payment option?"
    type: single_choice
    construct: did_first_discover_bnpl_as
    required: true
    options:
      - id: "a"
        label: "Offered at online checkout"
      - id: "b"
        label: "Offered in a physical store"
      - id: "c"
        label: "Advertising or social media"
      - id: "d"
        label: "Recommendation from friends or family"
      - id: "e"
        label: "Don't remember"
      - id: "f"
        label: "Not applicable"
  - id: q9
    prompt: "Why do you use BNPL instead of other payment methods? (Select all that apply)"
    type: multi_choice
    construct: why_use_bnpl_instead_other
    required: true
    options:
      - id: "a"
        label: "To spread out the cost of a purchase"
      - id: "b"
        label: "To avoid credit card interest"
      - id: "c"
        label: "I don't have or don't want to use a credit card"
      - id: "d"
        label: "It was interest-free"
      - id: "e"
        label: "To buy something I couldn't otherwise afford right now"
      - id: "f"
        label: "It was quick and easy at checkout"
      - id: "g"
        label: "Not applicable"
  - id: q10
    prompt: "When you use BNPL, how do you usually make the payments?"
    type: single_choice
    construct: when_use_bnpl_usually_make
    required: true
    options:
      - id: "a"
        label: "Automatic payments from a debit card"
      - id: "b"
        label: "Automatic payments from a credit card"
      - id: "c"
        label: "Automatic payments from a bank account"
      - id: "d"
        label: "Manual payments each time"
      - id: "e"
        label: "Not applicable"
  - id: q11
    prompt: "In the past 12 months, have you missed or been late on a BNPL payment?"
    type: single_choice
    construct: past_12_months_have_missed
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "A few times"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Not applicable"
  - id: q12
    prompt: "Have you ever been charged a late fee or interest on a BNPL plan?"
    type: single_choice
    construct: have_ever_been_charged_late
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, never"
      - id: "d"
        label: "Don't know"
  - id: q13
    prompt: "How much do you agree: BNPL makes it easier for me to afford purchases."
    type: single_choice
    construct: much_agree_bnpl_makes_it
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
