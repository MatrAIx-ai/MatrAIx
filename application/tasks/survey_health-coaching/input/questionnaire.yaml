schemaVersion: "1.0"
id: health_coaching_v1
title: "Health Coaching Survey"
description: "Consumer experience with and attitudes toward health and wellness coaching services."
questions:
  - id: q0
    prompt: "Have you ever worked with a health or wellness coach?"
    type: single_choice
    construct: have_ever_worked_health_wellness
    required: true
    options:
      - id: "a"
        label: "Yes, I am working with one now"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I'm interested"
      - id: "d"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Which best describes your current status with health coaching?"
    type: single_choice
    construct: best_describes_current_status_health
    required: true
    options:
      - id: "a"
        label: "Actively working with a coach"
      - id: "b"
        label: "Between programs but plan to return"
      - id: "c"
        label: "Finished and not currently coaching"
      - id: "d"
        label: "Only exploring the idea"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "What goals did you hope a coach would help with? (Select all that apply)"
    type: multi_choice
    construct: goals_did_hope_coach_would
    required: true
    options:
      - id: "a"
        label: "Weight management"
      - id: "b"
        label: "Nutrition and eating habits"
      - id: "c"
        label: "Fitness and activity"
      - id: "d"
        label: "Sleep"
      - id: "e"
        label: "Stress and general wellbeing"
      - id: "f"
        label: "Building healthier daily routines"
      - id: "g"
        label: "Managing an ongoing condition"
      - id: "h"
        label: "Not applicable"
  - id: q3
    prompt: "How did you access your coaching? (Select all that apply)"
    type: multi_choice
    construct: did_access_coaching_select_all
    required: true
    options:
      - id: "a"
        label: "Through my employer's wellness program"
      - id: "b"
        label: "Through my health insurance"
      - id: "c"
        label: "A standalone app or online service"
      - id: "d"
        label: "In person at a gym or clinic"
      - id: "e"
        label: "An independent private coach"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "How did (or do) you meet with your coach?"
    type: single_choice
    construct: did_meet_coach
    required: true
    options:
      - id: "a"
        label: "In person"
      - id: "b"
        label: "Video calls"
      - id: "c"
        label: "Phone calls"
      - id: "d"
        label: "Messaging or chat in an app"
      - id: "e"
        label: "A mix of methods"
      - id: "f"
        label: "Not applicable"
  - id: q5
    prompt: "How often did (or do) you connect with your coach?"
    type: single_choice
    construct: often_did_connect_coach
    required: true
    options:
      - id: "a"
        label: "More than once a week"
      - id: "b"
        label: "Weekly"
      - id: "c"
        label: "Every two weeks"
      - id: "d"
        label: "Monthly or less"
      - id: "e"
        label: "Not applicable"
  - id: q6
