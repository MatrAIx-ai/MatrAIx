schemaVersion: "1.0"
id: choosing_a_doctor_v1
title: "Choosing a Doctor Survey"
description: "How people research, evaluate, and decide which doctor to see."
questions:
  - id: q0
    prompt: "When was the last time you chose a new doctor or primary care provider for yourself?"
    type: single_choice
    construct: when_was_last_time_chose
    required: true
    options:
      - id: "a"
        label: "Within the past year"
      - id: "b"
        label: "1 to 2 years ago"
      - id: "c"
        label: "3 to 5 years ago"
      - id: "d"
        label: "More than 5 years ago"
      - id: "e"
        label: "I have never chosen my own doctor"
  - id: q1
    prompt: "What most often prompts you to look for a new doctor?"
    type: single_choice
    construct: most_often_prompts_look_new
    required: true
    options:
      - id: "a"
        label: "Moving to a new area"
      - id: "b"
        label: "A change in my insurance"
      - id: "c"
        label: "Dissatisfaction with a previous doctor"
      - id: "d"
        label: "My previous doctor left or retired"
      - id: "e"
        label: "A new health concern"
      - id: "f"
        label: "I have not needed to look"
  - id: q2
    prompt: "Which sources do you use when researching or choosing a new doctor? (Select all that apply)"
    type: multi_choice
    construct: sources_use_when_researching_choosing
    required: true
    options:
      - id: "a"
        label: "Online review sites (for example Healthgrades, Zocdoc, Google)"
      - id: "b"
        label: "My insurance company's provider directory"
      - id: "c"
        label: "Recommendations from family or friends"
      - id: "d"
        label: "A referral from another doctor"
      - id: "e"
        label: "The hospital or health system website"
      - id: "f"
        label: "Social media"
      - id: "g"
        label: "Advice from a pharmacist or nurse"
  - id: q3
    prompt: "Which doctor characteristics do you actively check before your first visit? (Select all that apply)"
    type: multi_choice
    construct: doctor_characteristics_actively_check_be
    required: true
    options:
      - id: "a"
        label: "Whether they accept my insurance"
      - id: "b"
        label: "Board certification or credentials"
      - id: "c"
        label: "Years of experience"
      - id: "d"
        label: "Patient review ratings"
      - id: "e"
        label: "Office location"
      - id: "f"
        label: "Availability of appointments"
      - id: "g"
        label: "Hospital affiliation"
      - id: "h"
        label: "Languages spoken"
  - id: q4
    prompt: "How important is it that a new doctor shares your gender, background, or language?"
    type: single_choice
    construct: important_it_that_new_doctor
    required: true
    options:
      - id: "a"
        label: "Very important"
      - id: "b"
        label: "Somewhat important"
      - id: "c"
        label: "Not very important"
      - id: "d"
        label: "Not at all important"
  - id: q5
    prompt: "How much do you rely on online patient reviews when choosing a doctor?"
    type: single_choice
    construct: much_rely_online_patient_reviews
    required: true
    options:
      - id: "a"
        label: "A great deal"
      - id: "b"
        label: "Somewhat"
      - id: "c"
        label: "A little"
      - id: "d"
        label: "Not at all"
  - id: q6
    prompt: "About how many different doctors or profiles do you typically compare before choosing? Please enter a number."
    type: free_text
    construct: many_different_doctors_profiles_typicall
    required: true
  - id: q7
    prompt: "Which are the top 3 factors that matter most to you when choosing a doctor? (Select all that apply)"
    type: multi_choice
    construct: top_3_factors_that_matter
    required: true
    options:
      - id: "a"
        label: "Accepts my insurance"
      - id: "b"
        label: "Good bedside manner and communication"
      - id: "c"
        label: "Convenient location"
      - id: "d"
        label: "Short appointment wait times"
      - id: "e"
        label: "Strong credentials and experience"
      - id: "f"
        label: "Positive online reviews"
      - id: "g"
        label: "Recommended by someone I trust"
      - id: "h"
        label: "Offers telehealth"
  - id: q8
    prompt: "How important is each of the following when choosing a new doctor — That they listen and explain clearly"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q9
    prompt: "How important is each of the following when choosing a new doctor — That they are in my insurance network"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q10
    prompt: "How important is each of the following when choosing a new doctor — That the office is easy to get to"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q11
    prompt: "How important is each of the following when choosing a new doctor — That I can get appointments quickly"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "How important is each of the following when choosing a new doctor — That they have strong credentials"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "How important is each of the following when choosing a new doctor — That other patients rate them highly"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "How much do you agree: I trust online star ratings to reflect the quality of a doctor."
    type: single_choice
    construct: much_agree_i_trust_online
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: A personal recommendation matters more to me than online reviews."
    type: single_choice
    construct: much_agree_personal_recommendation_matte
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How often do you switch doctors when you are unhappy with the care you receive?"
    type: single_choice
    construct: often_switch_doctors_when_unhappy
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q17
    prompt: "How difficult was it to find a doctor who was accepting new patients the last time you looked?"
    type: single_choice
    construct: difficult_was_it_find_doctor
    required: true
    options:
      - id: "a"
        label: "Very easy"
      - id: "b"
        label: "Somewhat easy"
      - id: "c"
        label: "Somewhat difficult"
      - id: "d"
        label: "Very difficult"
      - id: "e"
        label: "I have not looked recently"
  - id: q18
    prompt: "How satisfied are you with the doctor you currently see most often?"
    type: single_choice
    construct: satisfied_doctor_currently_see_most
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q19
    prompt: "On a scale of 0 to 10, how likely are you to recommend your current doctor to others? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
