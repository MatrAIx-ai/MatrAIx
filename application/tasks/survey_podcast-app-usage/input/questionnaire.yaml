schemaVersion: "1.0"
id: podcast_app_usage_v1
title: "Podcast App Usage Survey"
description: "How people listen to podcasts and which apps they use, including listening habits, genres, discovery, and attitudes toward ads and paid content."
questions:
  - id: q0
    prompt: "Do you listen to podcasts?"
    type: single_choice
    construct: listen_podcasts
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "How long have you been listening to podcasts?"
    type: single_choice
    construct: long_have_been_listening_podcasts
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 or more years"
  - id: q2
    prompt: "Which apps do you use to listen to podcasts? (Select all that apply)"
    type: multi_choice
    construct: apps_use_listen_podcasts_select
    required: true
    options:
      - id: "a"
        label: "Spotify"
      - id: "b"
        label: "Apple Podcasts"
      - id: "c"
        label: "YouTube or YouTube Music"
      - id: "d"
        label: "Google Podcasts / Pocket Casts"
      - id: "e"
        label: "Amazon Music / Audible"
      - id: "f"
        label: "Overcast"
      - id: "g"
        label: "Castbox"
      - id: "h"
        label: "Stitcher"
      - id: "i"
        label: "iHeartRadio"
      - id: "j"
        label: "A podcast's own website or app"
      - id: "k"
        label: "Other"
  - id: q3
    prompt: "Which app do you use most often for podcasts?"
    type: single_choice
    construct: app_use_most_often_podcasts
    required: true
