schemaVersion: "1.0"
id: no_code_tool_adoption_v1
title: "No-Code & Low-Code Tool Adoption Survey"
description: "How individuals and teams adopt no-code and low-code tools to build software without traditional programming."
questions:
  - id: q0
    prompt: "Which best describes your use of no-code or low-code tools?"
    type: single_choice
    construct: best_describes_use_no_code
    required: true
    options:
      - id: "a"
        label: "I use them regularly"
      - id: "b"
        label: "I use them occasionally"
      - id: "c"
        label: "I have tried them but don't use them now"
      - id: "d"
        label: "I plan to start using them"
      - id: "e"
        label: "I don't use no-code or low-code tools"
  - id: q1
    prompt: "How long have you used no-code or low-code tools?"
    type: single_choice
    construct: long_have_used_no_code
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "Which best describes your technical background?"
    type: single_choice
    construct: best_describes_technical_background
    required: true
    options:
      - id: "a"
        label: "I am a professional software developer"
      - id: "b"
        label: "I can write some code but am not a developer"
      - id: "c"
        label: "I have little or no coding experience"
      - id: "d"
        label: "I have no coding experience at all"
  - id: q3
    prompt: "What do you build with no-code or low-code tools? (Select all that apply)"
    type: multi_choice
    construct: build_no_code_low_code
    required: true
    options:
