        label: "Websites or landing pages"
      - id: "b"
        label: "Mobile or web apps"
      - id: "c"
        label: "Automations and workflows"
      - id: "d"
        label: "Forms and surveys"
      - id: "e"
        label: "Dashboards and reports"
      - id: "f"
        label: "Chatbots"
      - id: "g"
        label: "Online stores"
      - id: "h"
        label: "Internal business tools"
      - id: "i"
