schemaVersion: "1.0"
id: vpn_usage_v1
title: "VPN Usage Survey"
description: "How people use virtual private networks (VPNs) for online privacy, security on public Wi-Fi, and access to restricted content."
questions:
  - id: q0
    prompt: "Do you currently use a VPN (virtual private network)?"
    type: single_choice
    construct: currently_use_vpn_virtual_private
    required: true
    options:
      - id: "a"
        label: "Yes, I use one regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I have used one in the past"
      - id: "d"
        label: "No, and I never have"
      - id: "e"
        label: "I'm not sure what a VPN is"
  - id: q1
    prompt: "How long have you been using a VPN?"
    type: single_choice
    construct: long_have_been_using_vpn
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't use one"
  - id: q2
    prompt: "What are the main types of VPN you use? (Select all that apply)"
    type: multi_choice
    construct: main_types_vpn_use_select
    required: true
    options:
      - id: "a"
        label: "A personal/consumer VPN service I subscribe to"
      - id: "b"
        label: "A free VPN app"
      - id: "c"
        label: "A VPN provided by my employer for work"
      - id: "d"
        label: "A VPN provided by my school"
      - id: "e"
        label: "A VPN I set up myself (self-hosted)"
      - id: "f"
        label: "A VPN built into my browser or antivirus"
      - id: "g"
        label: "I don't use any VPN"
  - id: q3
    prompt: "What first made you start using a VPN? (Select all that apply)"
    type: multi_choice
    construct: first_made_start_using_vpn
    required: true
    options:
      - id: "a"
        label: "To protect my privacy from tracking"
      - id: "b"
        label: "To stay secure on public Wi-Fi"
      - id: "c"
        label: "To access geo-restricted streaming content"
      - id: "d"
        label: "Required by my employer or school"
      - id: "e"
        label: "To hide my browsing from my internet provider"
      - id: "f"
        label: "To bypass network or content restrictions"
      - id: "g"
        label: "A recommendation or ad convinced me"
      - id: "h"
        label: "I have never used one"
  - id: q4
    prompt: "Which VPN services do you currently use? (Select all that apply)"
    type: multi_choice
    construct: vpn_services_currently_use_select
    required: true
    options:
      - id: "a"
        label: "NordVPN"
      - id: "b"
        label: "ExpressVPN"
      - id: "c"
        label: "Surfshark"
      - id: "d"
        label: "Proton VPN"
      - id: "e"
        label: "CyberGhost"
      - id: "f"
        label: "Mullvad"
      - id: "g"
        label: "Private Internet Access (PIA)"
      - id: "h"
        label: "A VPN built into my antivirus (Norton, McAfee, etc.)"
      - id: "i"
        label: "My employer's or school's VPN"
      - id: "j"
        label: "A free VPN app"
      - id: "k"
        label: "Other"
      - id: "l"
        label: "I don't use a VPN"
  - id: q5
    prompt: "Which do you consider your primary VPN?"
    type: single_choice
    construct: consider_primary_vpn
    required: true
