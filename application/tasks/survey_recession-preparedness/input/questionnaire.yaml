schemaVersion: "1.0"
id: recession_preparedness_v1
title: "Recession Preparedness Survey"
description: "How prepared households feel for an economic downturn and the steps they take to protect their finances."
questions:
  - id: q0
    prompt: "How likely do you think a recession is in the United States in the next 12 months?"
    type: single_choice
    construct: likely_think_recession_united_states
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Somewhat unlikely"
      - id: "c"
        label: "About 50/50"
      - id: "d"
        label: "Somewhat likely"
      - id: "e"
        label: "Very likely"
      - id: "f"
        label: "I'm not sure"
  - id: q1
    prompt: "Overall, how prepared do you feel your household is to weather a recession?"
    type: single_choice
    construct: overall_prepared_feel_household_weather
    required: true
    options:
      - id: "a"
        label: "Not at all prepared"
      - id: "b"
        label: "Slightly prepared"
      - id: "c"
        label: "Moderately prepared"
      - id: "d"
        label: "Well prepared"
      - id: "e"
        label: "Very well prepared"
  - id: q2
    prompt: "Have you personally lived through a recession as an adult (for example, 2008–2009 or the 2020 downturn)?"
    type: single_choice
    construct: have_personally_lived_through_recession
    required: true
    options:
      - id: "a"
        label: "Yes, and it affected me significantly"
      - id: "b"
        label: "Yes, but it had little effect on me"
      - id: "c"
        label: "No, not as an adult"
      - id: "d"
        label: "Not sure"
  - id: q3
    prompt: "If you lost your main source of income today, how long could your household cover essential expenses from savings?"
    type: single_choice
    construct: if_lost_main_source_income
    required: true
    options:
      - id: "a"
        label: "Less than 2 weeks"
      - id: "b"
        label: "About 1 month"
      - id: "c"
        label: "About 3 months"
      - id: "d"
        label: "About 6 months"
      - id: "e"
        label: "More than 6 months"
  - id: q4
    prompt: "How closely do you follow news about the economy (inflation, jobs, interest rates)?"
    type: single_choice
    construct: closely_follow_news_economy_inflation
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "Closely"
      - id: "e"
