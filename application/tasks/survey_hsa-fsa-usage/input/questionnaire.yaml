schemaVersion: "1.0"
id: hsa_fsa_usage_v1
title: "Health Savings & Flexible Spending Account Usage Survey"
description: "How consumers set up, fund, and spend tax-advantaged health accounts such as HSAs and FSAs."
questions:
  - id: q0
    prompt: "Do you currently have any tax-advantaged health spending account?"
    type: single_choice
    construct: currently_have_any_tax_advantaged
    required: true
    options:
      - id: "a"
        label: "Yes, I have one now"
      - id: "b"
        label: "I had one in the past but not now"
      - id: "c"
        label: "No, I have never had one"
      - id: "d"
        label: "I'm not sure"
  - id: q1
    prompt: "Which of these account types do you have now or have had in the past? (Select all that apply)"
    type: multi_choice
    construct: these_account_types_have_now
    required: true
    options:
      - id: "a"
        label: "Health Savings Account (HSA)"
      - id: "b"
        label: "Health Flexible Spending Account (FSA)"
      - id: "c"
        label: "Dependent Care FSA"
      - id: "d"
        label: "Limited Purpose FSA (dental and vision only)"
      - id: "e"
        label: "Health Reimbursement Arrangement (HRA)"
      - id: "f"
        label: "None of these"
  - id: q2
    prompt: "How long have you had your current (or most recent) account?"
    type: single_choice
    construct: long_have_had_current_most
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q3
    prompt: "How was your account offered or opened?"
    type: single_choice
    construct: was_account_offered_opened
    required: true
    options:
      - id: "a"
        label: "Through my own employer's benefits program"
      - id: "b"
        label: "Through my spouse's or a family member's employer"
      - id: "c"
        label: "I opened it on my own with a bank or provider"
      - id: "d"
        label: "Through a health insurance marketplace plan"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "Which company administers your account?"
    type: single_choice
    construct: company_administers_account
    required: true
    options:
      - id: "a"
        label: "Fidelity"
      - id: "b"
        label: "HealthEquity"
      - id: "c"
        label: "Optum Bank"
      - id: "d"
        label: "HSA Bank / WEX"
      - id: "e"
        label: "Bank of America"
      - id: "f"
        label: "Another provider"
      - id: "g"
        label: "I don't know"
  - id: q5
    prompt: "Is your account paired with a high-deductible health plan (HDHP)?"
    type: single_choice
    construct: account_paired_high_deductible_health
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I'm not sure"
  - id: q6
    prompt: "Roughly how much do you contribute to the account per year? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_contribute_account_per
    required: true
  - id: q7
    prompt: "How do you decide how much to contribute each year?"
    type: single_choice
    construct: decide_much_contribute_each_year
    required: true
    options:
      - id: "a"
        label: "I estimate my expected medical expenses"
      - id: "b"
        label: "I contribute the maximum allowed by the IRS"
      - id: "c"
        label: "I contribute up to my employer's match or seed amount"
      - id: "d"
        label: "I contribute a round number without much planning"
      - id: "e"
        label: "It's automatic and I haven't changed it"
      - id: "f"
        label: "Not applicable"
  - id: q8
    prompt: "Does your employer contribute money to your account?"
    type: single_choice
    construct: does_employer_contribute_money_account
    required: true
    options:
      - id: "a"
        label: "Yes, they match part of my contributions"
      - id: "b"
        label: "Yes, they seed a fixed amount regardless of my contributions"
      - id: "c"
        label: "No employer contribution"
      - id: "d"
        label: "I don't know"
  - id: q9
    prompt: "Roughly how much does your employer contribute to your account per year? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_does_employer_contribute
    required: true
  - id: q10
    prompt: "What do you typically use the funds for? (Select all that apply)"
    type: multi_choice
    construct: typically_use_funds_select_all
    required: true
    options:
      - id: "a"
        label: "Doctor visit copays and deductibles"
      - id: "b"
        label: "Prescription medications"
      - id: "c"
        label: "Dental care"
      - id: "d"
        label: "Vision care and eyeglasses or contacts"
      - id: "e"
        label: "Over-the-counter medicine and supplies"
      - id: "f"
        label: "Mental health or therapy services"
      - id: "g"
        label: "Medical devices or equipment"
      - id: "h"
        label: "Dependent or childcare costs"
      - id: "i"
        label: "I rarely use the funds"
  - id: q11
    prompt: "How do you usually pay for eligible expenses?"
    type: single_choice
    construct: usually_pay_eligible_expenses
    required: true
    options:
      - id: "a"
        label: "Linked debit card at the point of sale"
      - id: "b"
        label: "Pay out of pocket, then submit a reimbursement claim"
      - id: "c"
        label: "A mix of both"
      - id: "d"
        label: "I rarely make eligible purchases"
  - id: q12
    prompt: "How often do you submit reimbursement claims with receipts?"
    type: single_choice
    construct: often_submit_reimbursement_claims_receip
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q13
    prompt: "If you have an HSA, do you invest any of the balance?"
    type: single_choice
    construct: if_have_hsa_invest_any
    required: true
    options:
      - id: "a"
        label: "Yes, I invest a portion for long-term growth"
      - id: "b"
        label: "No, I keep it all as cash for expenses"
      - id: "c"
        label: "I didn't know I could invest it"
      - id: "d"
        label: "Not applicable, I don't have an HSA"
  - id: q14
    prompt: "Roughly what percentage of your HSA balance is invested rather than held as cash? Please enter a number from 0 to 100 (enter 0 if none or not applicable)."
    type: free_text
    construct: roughly_percentage_hsa_balance_invested
    required: true
  - id: q15
    prompt: "How do you track your account balance and receipts?"
    type: single_choice
    construct: track_account_balance_receipts
    required: true
    options:
      - id: "a"
        label: "The provider's mobile app"
      - id: "b"
        label: "The provider's website"
      - id: "c"
        label: "A spreadsheet or personal budgeting app"
      - id: "d"
        label: "Paper receipts and mailed statements"
      - id: "e"
        label: "I don't actively track it"
  - id: q16
    prompt: "How much do you agree or disagree: I clearly understand which expenses are eligible for my account."
    type: single_choice
    construct: much_agree_disagree_i_clearly
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: The account meaningfully lowers my taxes."
    type: single_choice
    construct: much_agree_disagree_account_meaningfully
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree or disagree: The provider's app or website is easy to use."
    type: single_choice
    construct: much_agree_disagree_provider_s
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree or disagree: I worry about losing money I don't spend in time."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree or disagree: I think of my HSA as a way to save for future or retirement health costs."
    type: single_choice
    construct: much_agree_disagree_i_think
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q21
    prompt: "How much do you agree or disagree: Choosing how much to contribute each year is stressful."
    type: single_choice
    construct: much_agree_disagree_choosing_much
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q22
    prompt: "How often do you check your account balance?"
    type: single_choice
    construct: often_check_account_balance
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Several times a week or more"
  - id: q23
    prompt: "How confident are you that you understand the annual contribution limits for your account?"
    type: single_choice
    construct: confident_that_understand_annual_contrib
    required: true
    options:
      - id: "a"
        label: "Very confident"
      - id: "b"
        label: "Somewhat confident"
      - id: "c"
        label: "Not very confident"
      - id: "d"
        label: "Not at all confident"
  - id: q24
    prompt: "If you have an FSA, how does your plan handle unused funds at year end?"
    type: single_choice
    construct: if_have_fsa_does_plan
    required: true
    options:
      - id: "a"
        label: "Use it or lose it, no carryover"
      - id: "b"
        label: "A limited carryover to the next year"
      - id: "c"
        label: "A grace period of a few extra months to spend"
      - id: "d"
        label: "I'm not sure"
      - id: "e"
        label: "Not applicable, I don't have an FSA"
  - id: q25
    prompt: "Have you ever forfeited FSA money because of a spending deadline?"
    type: single_choice
    construct: have_ever_forfeited_fsa_money
    required: true
