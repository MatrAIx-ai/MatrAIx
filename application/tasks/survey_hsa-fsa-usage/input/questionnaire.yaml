        label: "Yes, and I lost a meaningful amount"
      - id: "b"
        label: "Yes, but only a small amount"
      - id: "c"
        label: "No, I've always spent it in time"
      - id: "d"
        label: "Not applicable"
  - id: q26
    prompt: "In a typical year, about how much money do you leave unspent or forfeit? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: typical_year_much_money_leave
    required: true
  - id: q27
    prompt: "Have you ever done a last-minute purchase (for example, extra glasses or supplies) mainly to use up account funds before a deadline?"
    type: single_choice
    construct: have_ever_done_last_minute
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q28
    prompt: "Where do you usually turn when you have a question about your account? (Select all that apply)"
    type: multi_choice
    construct: where_usually_turn_when_have
    required: true
