    required: true
    options:
      - id: "a"
        label: "18–24"
      - id: "b"
        label: "25–34"
      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65–74"
      - id: "g"
        label: "75 or older"
  - id: q32
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
