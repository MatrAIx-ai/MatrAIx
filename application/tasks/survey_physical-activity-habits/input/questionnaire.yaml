schemaVersion: "1.0"
id: physical_activity_habits_v1
title: "Physical Activity Habits Survey"
description: "Consumer physical activity habits, including exercise types, frequency, motivations, and the barriers people face."
questions:
  - id: q0
    prompt: "How would you describe your overall level of physical activity?"
    type: single_choice
    construct: would_describe_overall_level_physical
    required: true
    options:
      - id: "a"
        label: "Very active"
      - id: "b"
        label: "Somewhat active"
      - id: "c"
        label: "Lightly active"
      - id: "d"
        label: "Mostly inactive"
  - id: q1
    prompt: "In a typical week, how many days do you do at least moderate physical activity (such as brisk walking)?"
    type: single_choice
    construct: typical_week_many_days_least
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 day"
      - id: "c"
        label: "2 days"
      - id: "d"
        label: "3 days"
      - id: "e"
        label: "4 days"
      - id: "f"
        label: "5 days"
      - id: "g"
        label: "6 or 7 days"
  - id: q2
    prompt: "On the days you exercise, about how many minutes do you spend? Please enter a number of minutes."
    type: free_text
    construct: days_exercise_many_minutes_spend
    required: true
  - id: q3
    prompt: "Which types of physical activity do you regularly do? (Select all that apply)"
    type: multi_choice
    construct: types_physical_activity_regularly_select
    required: true
    options:
      - id: "a"
        label: "Walking"
      - id: "b"
        label: "Running or jogging"
      - id: "c"
        label: "Cycling"
      - id: "d"
        label: "Strength training or weights"
      - id: "e"
        label: "Group fitness classes"
      - id: "f"
        label: "Yoga or stretching"
      - id: "g"
        label: "Swimming"
      - id: "h"
        label: "Team or recreational sports"
      - id: "i"
        label: "None of these"
  - id: q4
    prompt: "Where do you most often exercise?"
    type: single_choice
    construct: where_most_often_exercise
    required: true
    options:
      - id: "a"
        label: "At home"
      - id: "b"
        label: "At a gym or fitness center"
      - id: "c"
        label: "Outdoors (parks, trails, streets)"
      - id: "d"
        label: "At a studio (yoga, cycling, etc.)"
      - id: "e"
        label: "At work"
      - id: "f"
        label: "I do not have a usual place"
  - id: q5
    prompt: "What time of day do you usually exercise?"
    type: single_choice
    construct: time_day_usually_exercise
    required: true
    options:
      - id: "a"
        label: "Early morning"
      - id: "b"
        label: "Mid-morning"
      - id: "c"
        label: "Midday"
      - id: "d"
        label: "Afternoon"
      - id: "e"
        label: "Evening"
      - id: "f"
        label: "It varies"
  - id: q6
    prompt: "How many days per week do you do muscle-strengthening activity (such as weights)?"
    type: single_choice
    construct: many_days_per_week_muscle
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 day"
      - id: "c"
        label: "2 days"
      - id: "d"
        label: "3 days"
      - id: "e"
        label: "4 or more days"
  - id: q7
    prompt: "Which tools do you use to support your physical activity? (Select all that apply)"
    type: multi_choice
    construct: tools_use_support_physical_activity
    required: true
    options:
      - id: "a"
        label: "A fitness tracker or smartwatch"
      - id: "b"
        label: "A fitness or workout app"
      - id: "c"
        label: "Online workout videos"
      - id: "d"
        label: "A personal trainer or coach"
      - id: "e"
        label: "A workout partner or group"
      - id: "f"
        label: "I do not use any of these"
  - id: q8
    prompt: "What motivates you to be physically active? (Select all that apply)"
    type: multi_choice
    construct: motivates_be_physically_active_select
    required: true
    options:
      - id: "a"
        label: "Improving overall health"
      - id: "b"
        label: "Managing weight"
      - id: "c"
        label: "Reducing stress"
      - id: "d"
        label: "Boosting energy or mood"
      - id: "e"
        label: "Building strength or fitness"
      - id: "f"
        label: "Social connection"
      - id: "g"
        label: "Enjoyment of the activity"
      - id: "h"
        label: "A doctor's recommendation"
  - id: q9
    prompt: "How much do you agree or disagree: Regular exercise is a priority in my life."
    type: single_choice
    construct: much_agree_disagree_regular_exercise
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: I have enough time to be physically active."
    type: single_choice
    construct: much_agree_disagree_i_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I enjoy being physically active."
    type: single_choice
    construct: much_agree_disagree_i_enjoy
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I find it hard to stay motivated to exercise."
    type: single_choice
    construct: much_agree_disagree_i_find
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I am satisfied with my current fitness level."
    type: single_choice
    construct: much_agree_disagree_i_am
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: My daily routine makes it easy to stay active."
    type: single_choice
    construct: much_agree_disagree_my_daily
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much of a barrier is each of the following to being active: lack of time?"
    type: single_choice
    construct: much_barrier_each_following_being
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q16
    prompt: "How much of a barrier is each of the following to being active: lack of motivation?"
    type: single_choice
    construct: much_barrier_each_following_being
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q17
    prompt: "How much of a barrier is each of the following to being active: cost of gyms or equipment?"
    type: single_choice
    construct: much_barrier_each_following_being
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q18
    prompt: "How much of a barrier is each of the following to being active: fatigue or low energy?"
    type: single_choice
    construct: much_barrier_each_following_being
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q19
    prompt: "How much of a barrier is each of the following to being active: lack of a safe or convenient place?"
    type: single_choice
    construct: much_barrier_each_following_being
    required: true
    options:
      - id: "a"
        label: "Not a barrier at all"
      - id: "b"
        label: "A minor barrier"
      - id: "c"
        label: "A moderate barrier"
      - id: "d"
        label: "A major barrier"
      - id: "e"
        label: "A complete barrier"
  - id: q20
    prompt: "About how many hours per day do you spend sitting on a typical day? Please enter a number."
    type: free_text
    construct: many_hours_per_day_spend
    required: true
  - id: q21
    prompt: "How does your activity level now compare to a year ago?"
    type: single_choice
    construct: does_activity_level_now_compare
    required: true
    options:
      - id: "a"
        label: "Much more active"
      - id: "b"
        label: "Somewhat more active"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "Somewhat less active"
      - id: "e"
        label: "Much less active"
  - id: q22
    prompt: "Do you set specific fitness or activity goals for yourself?"
    type: single_choice
    construct: set_specific_fitness_activity_goals
    required: true
    options:
      - id: "a"
        label: "Yes, and I track them closely"
      - id: "b"
        label: "Yes, but loosely"
      - id: "c"
        label: "No, but I would like to"
      - id: "d"
        label: "No"
  - id: q23
    prompt: "How often do you meet your own activity goals?"
    type: single_choice
    construct: often_meet_own_activity_goals
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I do not set goals"
  - id: q24
    prompt: "How much does being active improve your mood or stress?"
    type: single_choice
    construct: much_does_being_active_improve
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "Somewhat"
      - id: "d"
        label: "Quite a bit"
      - id: "e"
        label: "A great deal"
  - id: q25
    prompt: "How confident are you that you can stay physically active over the long term?"
    type: single_choice
    construct: confident_that_can_stay_physically
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "A little confident"
      - id: "c"
        label: "Somewhat confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q26
    prompt: "How important is physical activity to your overall well-being?"
    type: single_choice
    construct: important_physical_activity_overall_well
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q27
    prompt: "How likely are you to increase your physical activity in the next few months?"
    type: single_choice
    construct: likely_increase_physical_activity_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q28
    prompt: "Overall, how satisfied are you with your physical activity routine?"
    type: single_choice
    construct: overall_satisfied_physical_activity_rout
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q29
    prompt: "On a scale of 0 to 10, how likely are you to recommend your favorite type of exercise to a friend? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
    construct: scale_0_10_likely_recommend
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q30
    prompt: "Which would most help you be more physically active? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: would_most_help_be_more
    required: true
    options:
      - id: "a"
        label: "More free time"
      - id: "b"
        label: "More motivation or accountability"
      - id: "c"
        label: "Lower cost options"
      - id: "d"
