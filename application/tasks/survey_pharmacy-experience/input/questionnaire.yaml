schemaVersion: "1.0"
id: pharmacy_experience_v1
title: "Pharmacy Experience Survey"
description: "Consumers' experiences with their chosen pharmacy, pharmacists, and pharmacy services."
questions:
  - id: q0
    prompt: "How often do you visit or use a pharmacy?"
    type: single_choice
    construct: often_visit_use_pharmacy
    required: true
    options:
      - id: "a"
        label: "Weekly or more"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "About once a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q1
    prompt: "Which pharmacy do you use most often?"
    type: single_choice
    construct: pharmacy_use_most_often
    required: true
    options:
      - id: "a"
        label: "CVS"
      - id: "b"
        label: "Walgreens"
      - id: "c"
        label: "Walmart"
      - id: "d"
        label: "A grocery store pharmacy (for example, Kroger or Publix)"
      - id: "e"
        label: "Costco or another warehouse club"
      - id: "f"
        label: "An independent local pharmacy"
      - id: "g"
        label: "A mail-order or online pharmacy"
  - id: q2
    prompt: "How many different pharmacies do you use regularly? Please enter a number."
    type: free_text
    construct: many_different_pharmacies_use_regularly
    required: true
  - id: q3
    prompt: "Why did you choose your main pharmacy? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_main_pharmacy
    required: true
    options:
      - id: "a"
        label: "Close to home or work"
      - id: "b"
        label: "Accepted by my insurance"
      - id: "c"
        label: "Low prices"
      - id: "d"
        label: "Good customer service"
      - id: "e"
        label: "Convenient hours"
      - id: "f"
        label: "Drive-through option"
      - id: "g"
        label: "A good app or website"
      - id: "h"
        label: "Loyalty or rewards program"
  - id: q4
    prompt: "How do you usually pick up your prescriptions?"
    type: single_choice
    construct: usually_pick_up_prescriptions
    required: true
    options:
      - id: "a"
        label: "In-store counter"
      - id: "b"
        label: "Drive-through window"
      - id: "c"
        label: "Curbside pickup"
      - id: "d"
        label: "Home delivery"
      - id: "e"
        label: "Mail order"
  - id: q5
    prompt: "How do you usually request refills? (Select all that apply)"
    type: multi_choice
    construct: usually_request_refills_select_all
    required: true
    options:
      - id: "a"
        label: "The pharmacy's app"
      - id: "b"
        label: "The pharmacy's website"
      - id: "c"
        label: "An automated phone line"
      - id: "d"
        label: "In person at the counter"
      - id: "e"
        label: "Automatic refills"
      - id: "f"
        label: "My doctor sends them in"
  - id: q6
    prompt: "Do you use your pharmacy's mobile app?"
    type: single_choice
    construct: use_pharmacy_s_mobile_app
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I know it has one"
      - id: "d"
        label: "No, and I'm not sure it has one"
  - id: q7
    prompt: "In a typical visit, about how long do you wait for a prescription to be filled or picked up? Please enter a number of minutes."
    type: free_text
    construct: typical_visit_long_wait_prescription
    required: true
  - id: q8
    prompt: "How often is your prescription ready when you are told it will be?"
    type: single_choice
    construct: often_prescription_ready_when_told
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Usually"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q9
    prompt: "Which additional services have you used at your pharmacy? (Select all that apply)"
    type: multi_choice
    construct: additional_services_have_used_pharmacy
    required: true
    options:
      - id: "a"
        label: "Flu or other vaccinations"
      - id: "b"
        label: "A consultation with the pharmacist"
      - id: "c"
        label: "Blood pressure check"
      - id: "d"
        label: "Prescription synchronization (all refills on the same day)"
      - id: "e"
        label: "Medication packaging or pill organizers"
      - id: "f"
        label: "Point-of-care testing (for example, strep or COVID)"
      - id: "g"
        label: "None of these"
  - id: q10
    prompt: "How often do you speak with the pharmacist (not just the technician)?"
    type: single_choice
    construct: often_speak_pharmacist_not_just
    required: true
    options:
      - id: "a"
        label: "Every visit"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q11
    prompt: "When you have a question about a medication, how helpful is your pharmacist?"
    type: single_choice
    construct: when_have_question_medication_helpful
    required: true
    options:
      - id: "a"
        label: "Very helpful"
      - id: "b"
        label: "Somewhat helpful"
      - id: "c"
        label: "Not very helpful"
      - id: "d"
        label: "Not at all helpful"
      - id: "e"
        label: "I don't ask the pharmacist questions"
  - id: q12
    prompt: "Have you ever experienced any of these problems at the pharmacy? (Select all that apply)"
    type: multi_choice
    construct: have_ever_experienced_any_these
    required: true
    options:
      - id: "a"
        label: "A prescription was out of stock"
      - id: "b"
        label: "A long wait or line"
      - id: "c"
        label: "An insurance or coverage issue at the counter"
      - id: "d"
        label: "A refill that wasn't ready on time"
      - id: "e"
        label: "A pricing surprise"
      - id: "f"
        label: "A staffing shortage or closed pharmacy"
      - id: "g"
        label: "I haven't had problems"
  - id: q13
    prompt: "Have you ever had a prescription delayed because the medication was out of stock?"
    type: single_choice
    construct: have_ever_had_prescription_delayed
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, never"
  - id: q14
    prompt: "How much do you agree or disagree: My pharmacy is conveniently located for me."
    type: single_choice
    construct: much_agree_disagree_my_pharmacy
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: The staff at my pharmacy are friendly and helpful."
    type: single_choice
    construct: much_agree_disagree_staff_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: My prescriptions are usually ready on time."
    type: single_choice
    construct: much_agree_disagree_my_prescriptions
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: I trust my pharmacy to fill my prescriptions accurately."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree or disagree: The pharmacy's app or website makes managing prescriptions easy."
    type: single_choice
    construct: much_agree_disagree_pharmacy_s
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree or disagree: Wait times at my pharmacy have gotten worse recently."
    type: single_choice
    construct: much_agree_disagree_wait_times
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How would you rate the accuracy of your pharmacy in filling prescriptions?"
    type: single_choice
