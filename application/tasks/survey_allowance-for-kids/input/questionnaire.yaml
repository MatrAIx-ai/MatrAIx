schemaVersion: "1.0"
id: allowance_for_kids_v1
title: "Allowance for Kids Survey"
description: "How parents use allowances and everyday practices to teach their children about money."
questions:
  - id: q0
    prompt: "Do you currently have any children between the ages of 4 and 17 living in your household?"
    type: single_choice
    construct: currently_have_any_children_between
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q1
    prompt: "Do you currently give any of your children a regular allowance?"
    type: single_choice
    construct: currently_give_any_children_regular
    required: true
    options:
      - id: "a"
        label: "Yes, a regular set amount"
      - id: "b"
        label: "Yes, but only occasionally or as needed"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, and I never have"
  - id: q2
    prompt: "How many children do you give (or plan to give) an allowance to? Please enter a number."
    type: free_text
    construct: many_children_give_plan_give
    required: true
  - id: q3
    prompt: "At what age did you (or do you plan to) start giving your child an allowance?"
    type: single_choice
    construct: age_did_plan_start_giving
    required: true
    options:
      - id: "a"
        label: "Under 5"
      - id: "b"
        label: "5 to 6"
      - id: "c"
        label: "7 to 8"
      - id: "d"
        label: "9 to 10"
      - id: "e"
        label: "11 to 12"
      - id: "f"
        label: "13 or older"
      - id: "g"
        label: "I don't plan to give an allowance"
  - id: q4
    prompt: "How often do you give your child their allowance?"
    type: single_choice
    construct: often_give_child_their_allowance
    required: true
    options:
      - id: "a"
        label: "Weekly"
      - id: "b"
        label: "Every two weeks"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Irregularly, when they ask or earn it"
      - id: "e"
        label: "Not applicable"
  - id: q5
    prompt: "About how much allowance do you give per child each week? Please enter a number of dollars (enter 0 if none)."
    type: free_text
    construct: much_allowance_give_per_child
    required: true
  - id: q6
    prompt: "How is your child's allowance mainly determined?"
    type: single_choice
    construct: child_s_allowance_mainly_determined
    required: true
    options:
      - id: "a"
        label: "A fixed amount regardless of chores"
      - id: "b"
        label: "Tied to completing household chores"
      - id: "c"
        label: "Tied to grades or school performance"
      - id: "d"
        label: "Based on their age"
      - id: "e"
        label: "Based on what they need that week"
      - id: "f"
        label: "A mix of these"
      - id: "g"
        label: "Not applicable"
  - id: q7
    prompt: "How does your child usually receive their allowance? (Select all that apply)"
    type: multi_choice
    construct: does_child_usually_receive_their
    required: true
    options:
      - id: "a"
        label: "Cash"
      - id: "b"
        label: "A kids' debit card or app (e.g., Greenlight, GoHenry, Step)"
      - id: "c"
        label: "Transfer to a bank or savings account"
      - id: "d"
        label: "Added to a digital wallet"
      - id: "e"
        label: "A physical piggy bank or jar"
      - id: "f"
        label: "Not applicable"
  - id: q8
    prompt: "Which money skills do you actively try to teach your children? (Select all that apply)"
    type: multi_choice
    construct: money_skills_actively_try_teach
    required: true
    options:
      - id: "a"
        label: "Saving for goals"
      - id: "b"
        label: "Budgeting or planning spending"
      - id: "c"
        label: "The difference between needs and wants"
      - id: "d"
        label: "Giving or donating to others"
      - id: "e"
        label: "Earning money through work"
      - id: "f"
        label: "Investing or growing money"
      - id: "g"
        label: "Avoiding debt"
      - id: "h"
        label: "Comparison shopping"
  - id: q9
    prompt: "Do you encourage your children to divide their money into categories such as save, spend, and give?"
    type: single_choice
    construct: encourage_children_divide_their_money
    required: true
    options:
      - id: "a"
        label: "Yes, we use a clear system"
      - id: "b"
        label: "Yes, informally"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No"
  - id: q10
    prompt: "How much do you agree with the following statement: Giving children an allowance teaches them responsibility with money."
    type: single_choice
    construct: much_agree_following_statement_giving
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: Allowance should be earned through chores, not given automatically."
    type: single_choice
    construct: much_agree_following_statement_allowance
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Children should be free to spend their allowance however they want."
    type: single_choice
    construct: much_agree_following_statement_children
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Talking to kids about money is uncomfortable for me."
    type: single_choice
    construct: much_agree_following_statement_talking
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Schools should do more to teach children about money."
    type: single_choice
    construct: much_agree_following_statement_schools
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How important is it to you that your child learns to save from an early age?"
    type: single_choice
    construct: important_it_that_child_learns
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is it to you that your child learns to earn money through work or chores?"
    type: single_choice
    construct: important_it_that_child_learns
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is it to you that your child learns about giving or charity?"
    type: single_choice
    construct: important_it_that_child_learns
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is it to you that your child learns to make their own spending decisions and mistakes?"
    type: single_choice
    construct: important_it_that_child_learns
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How often do you talk with your children about money?"
    type: single_choice
    construct: often_talk_children_money
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
  - id: q20
    prompt: "Do you require your children to save a portion of their allowance?"
    type: single_choice
    construct: require_children_save_portion_their
    required: true
    options:
      - id: "a"
        label: "Yes, a required amount or percentage"
      - id: "b"
        label: "Yes, but it's encouraged, not required"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q21
    prompt: "Do you match or add to money your child saves (for example, adding to their savings)?"
    type: single_choice
    construct: match_add_money_child_saves
    required: true
    options:
      - id: "a"
        label: "Yes, I match a portion"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q22
    prompt: "Which tools or accounts do you use to manage your child's money? (Select all that apply)"
    type: multi_choice
    construct: tools_accounts_use_manage_child
    required: true
    options:
      - id: "a"
        label: "A kids' banking app or debit card"
      - id: "b"
        label: "A savings account in the child's name"
      - id: "c"
        label: "A custodial or 529 account"
      - id: "d"
        label: "Cash and a piggy bank"
      - id: "e"
        label: "A spreadsheet or chore chart"
      - id: "f"
        label: "None of these"
  - id: q23
    prompt: "What do you see as the biggest challenge in teaching your kids about money?"
    type: single_choice
    construct: see_as_biggest_challenge_teaching
    required: true
    options:
      - id: "a"
        label: "Finding the time"
      - id: "b"
        label: "Making it engaging or age-appropriate"
      - id: "c"
        label: "Consistency across parents or caregivers"
      - id: "d"
        label: "Overcoming influences like advertising or peers"
      - id: "e"
        label: "My own money knowledge or habits"
      - id: "f"
        label: "I don't find it challenging"
      - id: "g"
        label: "Other"
  - id: q24
    prompt: "Select the top 3 money lessons you most want your child to learn. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_money_lessons
    required: true
    options:
      - id: "a"
        label: "Live within your means"
      - id: "b"
        label: "Save before you spend"
      - id: "c"
        label: "Money must be earned"
      - id: "d"
        label: "Give back to others"
      - id: "e"
        label: "Patience and delayed gratification"
      - id: "f"
        label: "Avoid debt"
      - id: "g"
        label: "Set and reach goals"
      - id: "h"
        label: "Understand how money grows over time"
  - id: q25
    prompt: "How confident are you in your ability to teach your children good money habits?"
    type: single_choice
    construct: confident_ability_teach_children_good
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q26
    prompt: "How satisfied are you with how you are teaching your children about money?"
    type: single_choice
    construct: satisfied_teaching_children_money
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q27
    prompt: "How likely are you to start or increase your child's allowance in the next year?"
    type: single_choice
    construct: likely_start_increase_child_s
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q28
    prompt: "Please share any thoughts about how you approach allowance and teaching your kids about money."
    type: free_text
    construct: please_share_any_thoughts_approach
    required: true
  - id: q29
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18-24"
      - id: "b"
        label: "25-34"
      - id: "c"
        label: "35-44"
      - id: "d"
        label: "45-54"
      - id: "e"
        label: "55-64"
      - id: "f"
        label: "65 or older"
  - id: q30
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: race_ethnicity_select_all_that
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "American Indian or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is your total annual household income (before taxes)?"
    type: single_choice
    construct: total_annual_household_income_before
    required: true
    options:
      - id: "a"
        label: "Under $25,000"
      - id: "b"
        label: "$25,000 to $49,999"
      - id: "c"
        label: "$50,000 to $74,999"
      - id: "d"
        label: "$75,000 to $99,999"
      - id: "e"
        label: "$100,000 to $149,999"
      - id: "f"
        label: "$150,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q33
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "High school diploma or GED"
      - id: "c"
        label: "Some college, no degree"
      - id: "d"
        label: "Associate degree"
      - id: "e"
        label: "Bachelor's degree"
      - id: "f"
        label: "Graduate or professional degree"
  - id: q34
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Unemployed and looking for work"
      - id: "e"
        label: "Homemaker or caregiver"
      - id: "f"
        label: "Student"
      - id: "g"
        label: "Retired or other"
  - id: q35
    prompt: "Including yourself, how many people live in your household? Please enter a number."
    type: free_text
    construct: including_yourself_many_people_live
    required: true
  - id: q36
    prompt: "How many children under 18 live in your household? Please enter a number."
    type: free_text
    construct: many_children_under_18_live
    required: true
  - id: q37
    prompt: "What is your marital or relationship status?"
    type: single_choice
    construct: marital_relationship_status
    required: true
    options:
      - id: "a"
        label: "Married"
      - id: "b"
        label: "Living with a partner"
      - id: "c"
        label: "Divorced"
      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Separated"
      - id: "f"
        label: "Single, never married"
  - id: q38
    prompt: "Which U.S. region do you live in?"
    type: single_choice
    construct: u_s_region_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
