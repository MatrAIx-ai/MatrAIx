        label: "West"
  - id: q39
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q40
    prompt: "What is your role in your household regarding day-to-day money decisions for the children?"
    type: single_choice
    construct: role_household_regarding_day_day
    required: true
    options:
