schemaVersion: "1.0"
id: insurance_marketplace_plans_v1
title: "Insurance Marketplace Plans Survey"
description: "How people choose, enroll in, and evaluate health plans from the government insurance marketplace."
questions:
  - id: q0
    prompt: "Have you ever bought a health plan through HealthCare.gov or a state insurance marketplace?"
    type: single_choice
    construct: have_ever_bought_health_plan
    required: true
    options:
      - id: "a"
        label: "Yes, I have one now"
      - id: "b"
        label: "Yes, in the past but not now"
      - id: "c"
        label: "No, but I have looked"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "If you have a marketplace plan now, what metal tier is it?"
    type: single_choice
    construct: if_have_marketplace_plan_now
    required: true
    options:
      - id: "a"
        label: "Bronze"
      - id: "b"
        label: "Silver"
      - id: "c"
        label: "Gold"
      - id: "d"
        label: "Platinum"
      - id: "e"
        label: "Catastrophic"
      - id: "f"
        label: "I'm not sure"
      - id: "g"
        label: "I do not have a marketplace plan"
  - id: q2
    prompt: "Did you receive a premium tax credit or subsidy to help pay for your marketplace plan?"
    type: single_choice
    construct: did_receive_premium_tax_credit
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I'm not sure"
      - id: "d"
        label: "Not applicable"
  - id: q3
    prompt: "How did you enroll in or compare marketplace plans?"
    type: single_choice
    construct: did_enroll_compare_marketplace_plans
    required: true
    options:
      - id: "a"
        label: "On the HealthCare.gov or state website myself"
      - id: "b"
        label: "With a certified navigator or assister"
      - id: "c"
        label: "With a broker or agent"
      - id: "d"
        label: "With help from family or friends"
      - id: "e"
        label: "By phone with the marketplace"
      - id: "f"
        label: "I have not enrolled"
  - id: q4
    prompt: "Which parts of the marketplace enrollment process did you find challenging? (Select all that apply)"
    type: multi_choice
    construct: parts_marketplace_enrollment_process_did
    required: true
    options:
      - id: "a"
        label: "Understanding the metal tiers"
      - id: "b"
        label: "Estimating my income for subsidies"
      - id: "c"
        label: "Checking whether my doctors were in-network"
      - id: "d"
        label: "Comparing drug coverage"
      - id: "e"
        label: "Uploading documents"
      - id: "f"
        label: "Understanding the total cost of a plan"
      - id: "g"
        label: "I did not find it challenging"
  - id: q5
    prompt: "Which features did you compare most when choosing a marketplace plan? (Select all that apply)"
    type: multi_choice
    construct: features_did_compare_most_when
    required: true
    options:
      - id: "a"
        label: "Monthly premium after subsidy"
      - id: "b"
        label: "Deductible"
      - id: "c"
        label: "Out-of-pocket maximum"
      - id: "d"
        label: "Provider network"
      - id: "e"
        label: "Prescription drug list"
      - id: "f"
        label: "Metal tier"
      - id: "g"
        label: "Insurer reputation"
  - id: q6
    prompt: "About how many marketplace plans did you compare before enrolling? Please enter a number."
    type: free_text
    construct: many_marketplace_plans_did_compare
    required: true
  - id: q7
    prompt: "How easy was it to tell whether your preferred doctors were covered by a marketplace plan?"
    type: single_choice
    construct: easy_was_it_tell_whether
    required: true
    options:
      - id: "a"
        label: "Very easy"
      - id: "b"
        label: "Somewhat easy"
      - id: "c"
        label: "Somewhat difficult"
      - id: "d"
        label: "Very difficult"
      - id: "e"
        label: "I did not check"
  - id: q8
    prompt: "Which are the top 3 things that matter most to you in a marketplace plan? (Select all that apply)"
    type: multi_choice
    construct: top_3_things_that_matter
    required: true
    options:
      - id: "a"
        label: "Lowest premium after subsidy"
      - id: "b"
        label: "Low deductible"
      - id: "c"
        label: "Keeping my doctors in-network"
      - id: "d"
        label: "Prescription coverage"
      - id: "e"
        label: "Low out-of-pocket maximum"
      - id: "f"
        label: "A trusted insurer"
      - id: "g"
        label: "Simple, easy-to-understand benefits"
      - id: "h"
        label: "Dental or vision add-ons"
  - id: q9
    prompt: "How much do you agree or disagree with the following statement about the insurance marketplace — The marketplace website was easy to use"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree with the following statement about the insurance marketplace — I understood the different metal tiers"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree with the following statement about the insurance marketplace — I could tell what a plan would really cost me"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree with the following statement about the insurance marketplace — I trusted the subsidy estimate I received"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree with the following statement about the insurance marketplace — I found a plan that fit my budget"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
