schemaVersion: "1.0"
id: home_care_services_v1
title: "Home Care Services Survey"
description: "Consumer experiences with and attitudes toward in-home care and helper services."
questions:
  - id: q0
    prompt: "Does your household currently use, or has it recently used, any in-home care or helper services?"
    type: single_choice
    construct: does_household_currently_use_has
    required: true
    options:
      - id: "a"
        label: "Yes, currently using"
      - id: "b"
        label: "Used in the past, not currently"
      - id: "c"
        label: "Looking into it now"
      - id: "d"
        label: "No, but I expect to need it"
      - id: "e"
        label: "No, and I don't expect to need it"
  - id: q1
    prompt: "Who is (or would be) the main person the home care is for?"
    type: single_choice
    construct: who_would_be_main_person
    required: true
    options:
      - id: "a"
        label: "Myself"
      - id: "b"
        label: "A parent or older relative"
      - id: "c"
        label: "A spouse or partner"
      - id: "d"
        label: "Another family member"
      - id: "e"
        label: "No one specific yet"
  - id: q2
    prompt: "Which types of in-home services have you used or considered? (Select all that apply)"
    type: multi_choice
    construct: types_home_services_have_used
    required: true
    options:
      - id: "a"
        label: "Personal care (bathing, dressing, grooming help)"
      - id: "b"
        label: "Homemaking (cleaning, laundry, cooking)"
      - id: "c"
        label: "Companion or check-in visits"
      - id: "d"
        label: "Transportation and errands"
      - id: "e"
        label: "Skilled nursing or therapy at home"
      - id: "f"
        label: "Overnight or live-in help"
      - id: "g"
        label: "None of these"
  - id: q3
    prompt: "How did you find or arrange the home care service? (Select all that apply)"
    type: multi_choice
    construct: did_find_arrange_home_care
    required: true
    options:
      - id: "a"
        label: "Home care agency"
      - id: "b"
        label: "Referral from a doctor or hospital"
      - id: "c"
        label: "Hired an independent caregiver directly"
      - id: "d"
        label: "Recommendation from family or friends"
      - id: "e"
        label: "Online directory or platform"
      - id: "f"
        label: "Through insurance or a benefit program"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "How many hours of home care are used in a typical week? Please enter a number of hours (enter 0 if none)."
    type: free_text
    construct: many_hours_home_care_used
    required: true
  - id: q5
    prompt: "How is the home care mostly paid for?"
    type: single_choice
    construct: home_care_mostly_paid
    required: true
    options:
      - id: "a"
        label: "Out of pocket"
      - id: "b"
        label: "Long-term care insurance"
      - id: "c"
        label: "Medicare or Medicaid"
      - id: "d"
        label: "Veterans benefits"
      - id: "e"
        label: "A mix of sources"
      - id: "f"
        label: "Not applicable"
  - id: q6
    prompt: "About how much does your household spend on home care in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_does_household_spend_home
    required: true
  - id: q7
    prompt: "How long have you been using home care services?"
    type: single_choice
    construct: long_have_been_using_home
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "How often do the same caregivers come, versus different people each time?"
    type: single_choice
    construct: often_same_caregivers_come_versus
    required: true
    options:
      - id: "a"
        label: "Almost always the same caregiver"
      - id: "b"
        label: "Usually the same few caregivers"
      - id: "c"
        label: "A mix of familiar and new caregivers"
      - id: "d"
        label: "Often different people"
      - id: "e"
        label: "Not applicable"
  - id: q9
    prompt: "Which tasks are most valuable in the home care received? (Select all that apply)"
    type: multi_choice
    construct: tasks_most_valuable_home_care
    required: true
    options:
      - id: "a"
        label: "Help with bathing and dressing"
      - id: "b"
        label: "Meal preparation"
      - id: "c"
        label: "Housekeeping and laundry"
      - id: "d"
        label: "Medication reminders"
      - id: "e"
        label: "Companionship and conversation"
      - id: "f"
        label: "Transportation to appointments"
      - id: "g"
        label: "Mobility and moving safely around the home"
      - id: "h"
        label: "Not applicable"
  - id: q10
    prompt: "How is the home care service usually scheduled or coordinated?"
    type: single_choice
    construct: home_care_service_usually_scheduled
    required: true
    options:
      - id: "a"
        label: "Set weekly schedule through an agency"
      - id: "b"
        label: "Arranged flexibly as needed"
      - id: "c"
        label: "Through an app or online portal"
      - id: "d"
        label: "By phone with a coordinator"
      - id: "e"
        label: "Directly with the caregiver"
      - id: "f"
        label: "Not applicable"
  - id: q11
