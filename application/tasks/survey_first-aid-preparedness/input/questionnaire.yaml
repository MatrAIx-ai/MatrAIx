schemaVersion: "1.0"
id: first_aid_preparedness_v1
title: "First-Aid Preparedness Survey"
description: "How prepared households are for everyday first-aid situations and minor emergencies."
questions:
  - id: q0
    prompt: "Do you keep a first-aid kit in your home?"
    type: single_choice
    construct: keep_first_aid_kit_home
    required: true
    options:
      - id: "a"
        label: "Yes, a fully stocked one"
      - id: "b"
        label: "Yes, but it's basic or incomplete"
      - id: "c"
        label: "No, but I have scattered supplies"
      - id: "d"
        label: "No, none at all"
  - id: q1
    prompt: "Where do you keep first-aid supplies? (Select all that apply)"
    type: multi_choice
    construct: where_keep_first_aid_supplies
    required: true
    options:
      - id: "a"
        label: "Bathroom cabinet"
      - id: "b"
        label: "Kitchen"
      - id: "c"
        label: "A dedicated first-aid kit or box"
      - id: "d"
        label: "Car or vehicle"
      - id: "e"
        label: "Garage or utility area"
      - id: "f"
        label: "Backpack or travel bag"
      - id: "g"
        label: "I don't keep dedicated supplies"
  - id: q2
    prompt: "How did you obtain your main first-aid kit?"
    type: single_choice
    construct: did_obtain_main_first_aid
    required: true
    options:
      - id: "a"
        label: "Bought a pre-assembled kit"
      - id: "b"
        label: "Assembled it myself"
      - id: "c"
        label: "Received it as a gift"
      - id: "d"
        label: "Got it from work or an organization"
      - id: "e"
        label: "I don't have a dedicated kit"
  - id: q3
    prompt: "When did you last check or restock your first-aid supplies?"
    type: single_choice
    construct: when_did_last_check_restock
    required: true
    options:
      - id: "a"
        label: "Within the past month"
      - id: "b"
        label: "1 to 6 months ago"
      - id: "c"
        label: "6 to 12 months ago"
      - id: "d"
        label: "More than a year ago"
      - id: "e"
        label: "Never"
  - id: q4
    prompt: "Which of these items do you currently have on hand? (Select all that apply)"
    type: multi_choice
    construct: these_items_currently_have_hand
    required: true
    options:
      - id: "a"
        label: "Adhesive bandages"
      - id: "b"
        label: "Antiseptic wipes or ointment"
      - id: "c"
        label: "Gauze and medical tape"
      - id: "d"
        label: "Pain relievers (acetaminophen, ibuprofen)"
      - id: "e"
        label: "A thermometer"
      - id: "f"
        label: "Tweezers and scissors"
      - id: "g"
        label: "An elastic wrap or cold pack"
      - id: "h"
        label: "Disposable gloves"
      - id: "i"
        label: "A first-aid instruction guide"
      - id: "j"
        label: "None of these"
