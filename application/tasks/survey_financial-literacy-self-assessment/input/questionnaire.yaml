schemaVersion: "1.0"
id: financial_literacy_self_assessment_v1
title: "Financial Literacy Self-Assessment Survey"
description: "How people rate their own financial knowledge, where they learned it, and how they try to improve it."
questions:
  - id: q0
    prompt: "Overall, how would you rate your knowledge of personal finance?"
    type: single_choice
    construct: overall_would_rate_knowledge_personal
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q1
    prompt: "Compared to other people your age, how would you rate your financial knowledge?"
    type: single_choice
    construct: compared_other_people_age_would
    required: true
    options:
      - id: "a"
        label: "Much more knowledgeable"
      - id: "b"
        label: "Somewhat more knowledgeable"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "Somewhat less knowledgeable"
      - id: "e"
        label: "Much less knowledgeable"
  - id: q2
    prompt: "Who mainly manages the day-to-day finances in your household?"
    type: single_choice
    construct: who_mainly_manages_day_day
    required: true
    options:
      - id: "a"
        label: "I do it all"
      - id: "b"
        label: "I share it with a partner or family member"
      - id: "c"
        label: "Someone else handles most of it"
      - id: "d"
        label: "No one manages it consistently"
  - id: q3
    prompt: "Where did you learn the most about managing money?"
    type: single_choice
    construct: where_did_learn_most_managing
    required: true
    options:
