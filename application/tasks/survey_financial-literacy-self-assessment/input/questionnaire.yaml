      - id: "e"
        label: "Books"
      - id: "f"
        label: "A financial advisor or banker"
      - id: "g"
        label: "My bank or brokerage's tools"
      - id: "h"
        label: "I don't actively seek financial information"
  - id: q5
    prompt: "Which of the following topics do you feel you understand well? (Select all that apply)"
    type: multi_choice
    construct: following_topics_feel_understand_well
