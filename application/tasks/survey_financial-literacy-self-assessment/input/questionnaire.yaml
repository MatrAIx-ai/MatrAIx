        label: "From my family growing up"
      - id: "b"
        label: "On my own through trial and error"
      - id: "c"
        label: "School or a formal class"
      - id: "d"
        label: "Online content, videos, or social media"
      - id: "e"
        label: "A financial advisor or professional"
      - id: "f"
        label: "Friends or coworkers"
  - id: q4
    prompt: "Where do you get financial information today? (Select all that apply)"
    type: multi_choice
    construct: where_get_financial_information_today
