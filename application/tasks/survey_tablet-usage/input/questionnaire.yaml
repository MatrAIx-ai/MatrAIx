schemaVersion: "1.0"
id: tablet_usage_v1
title: "Tablet Usage Survey"
description: "How consumers own, use, and evaluate tablet computers such as iPads, Galaxy Tabs, and Fire tablets."
questions:
  - id: q0
    prompt: "Do you personally own or regularly use a tablet computer (such as an iPad, Galaxy Tab, or Fire tablet)?"
    type: single_choice
    construct: personally_own_regularly_use_tablet
    required: true
    options:
      - id: "a"
        label: "Yes, I personally own one or more tablets"
      - id: "b"
        label: "I regularly use a tablet in my household but do not personally own it"
      - id: "c"
        label: "No, I do not use a tablet"
  - id: q1
    prompt: "How many tablets do you personally own or use? Please enter a whole number."
    type: free_text
    construct: many_tablets_personally_own_use
    required: true
  - id: q2
    prompt: "How long have you been using tablets?"
    type: single_choice
    construct: long_have_been_using_tablets
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q3
    prompt: "How often do you use your primary tablet?"
    type: single_choice
    construct: often_use_primary_tablet
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "About once a week"
      - id: "e"
        label: "Less than once a week"
  - id: q4
    prompt: "Which brand is your primary tablet?"
    type: single_choice
    construct: brand_primary_tablet
    required: true
    options:
      - id: "a"
        label: "Apple iPad"
      - id: "b"
        label: "Samsung Galaxy Tab"
      - id: "c"
        label: "Amazon Fire"
      - id: "d"
        label: "Microsoft Surface"
      - id: "e"
        label: "Lenovo Tab"
      - id: "f"
        label: "Google Pixel Tablet"
      - id: "g"
        label: "Huawei / Honor"
      - id: "h"
        label: "Other"
  - id: q5
    prompt: "What operating system does your primary tablet run?"
    type: single_choice
    construct: operating_system_does_primary_tablet
    required: true
    options:
      - id: "a"
        label: "iPadOS"
      - id: "b"
        label: "Android"
      - id: "c"
        label: "Fire OS"
      - id: "d"
        label: "Windows"
      - id: "e"
        label: "ChromeOS"
      - id: "f"
        label: "I'm not sure"
  - id: q6
    prompt: "What is the screen size of your primary tablet?"
    type: single_choice
    construct: screen_size_primary_tablet
    required: true
    options:
      - id: "a"
        label: "Under 8 inches (mini)"
      - id: "b"
        label: "8 to 10 inches"
      - id: "c"
        label: "10 to 11 inches"
      - id: "d"
        label: "12 inches or larger"
      - id: "e"
        label: "I'm not sure"
  - id: q7
    prompt: "Which tablet brands have you owned at any point? (Select all that apply)"
    type: multi_choice
    construct: tablet_brands_have_owned_any
    required: true
    options:
      - id: "a"
        label: "Apple iPad"
      - id: "b"
        label: "Samsung Galaxy Tab"
      - id: "c"
        label: "Amazon Fire"
      - id: "d"
        label: "Microsoft Surface"
      - id: "e"
        label: "Lenovo Tab"
      - id: "f"
        label: "Google (Pixel Tablet or Nexus)"
      - id: "g"
        label: "Huawei / Honor"
      - id: "h"
        label: "Asus"
      - id: "i"
        label: "Other"
  - id: q8
    prompt: "Where do you typically use your tablet? (Select all that apply)"
    type: multi_choice
    construct: where_typically_use_tablet_select
    required: true
    options:
      - id: "a"
        label: "On the couch / living room"
      - id: "b"
        label: "In bed"
      - id: "c"
        label: "In the kitchen"
      - id: "d"
        label: "At a desk / home office"
      - id: "e"
        label: "While commuting or traveling"
      - id: "f"
        label: "At work or school"
      - id: "g"
        label: "Outdoors"
      - id: "h"
        label: "In the bathroom"
  - id: q9
    prompt: "What do you use your tablet for? (Select all that apply)"
    type: multi_choice
    construct: use_tablet_select_all_that
    required: true
    options:
      - id: "a"
        label: "Web browsing"
      - id: "b"
        label: "Streaming video (movies, TV, YouTube)"
      - id: "c"
        label: "Reading (books, news, comics)"
      - id: "d"
        label: "Gaming"
      - id: "e"
        label: "Email"
      - id: "f"
        label: "Social media"
      - id: "g"
        label: "Productivity (documents, spreadsheets)"
      - id: "h"
        label: "Drawing or digital art"
      - id: "i"
        label: "Note-taking"
      - id: "j"
        label: "Video calls"
      - id: "k"
        label: "Online shopping"
      - id: "l"
        label: "Keeping children entertained"
  - id: q10
    prompt: "Which accessories do you use with your tablet? (Select all that apply)"
    type: multi_choice
    construct: accessories_use_tablet_select_all
    required: true
    options:
      - id: "a"
        label: "Protective case or cover"
      - id: "b"
        label: "Attachable keyboard"
      - id: "c"
        label: "Stylus / pen"
      - id: "d"
        label: "Stand or dock"
      - id: "e"
        label: "Screen protector"
      - id: "f"
        label: "External storage or adapter"
      - id: "g"
        label: "None of these"
  - id: q11
    prompt: "Do you use a stylus or pen with your tablet?"
    type: single_choice
    construct: use_stylus_pen_tablet
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but my tablet supports one"
      - id: "d"
        label: "No, my tablet does not support one"
  - id: q12
