      - id: "c"
        label: "Received as a gift"
      - id: "d"
        label: "Hand-me-down from family or friend"
      - id: "e"
        label: "Provided by employer or school"
  - id: q13
    prompt: "Approximately how much did your primary tablet cost?"
    type: single_choice
    construct: approximately_much_did_primary_tablet
    required: true
    options:
      - id: "a"
        label: "Under $150"
      - id: "b"
        label: "$150 to $349"
      - id: "c"
        label: "$350 to $599"
      - id: "d"
