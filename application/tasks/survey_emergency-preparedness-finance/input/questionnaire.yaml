        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q26
    prompt: "On a scale of 0 to 10, how prepared do you feel for a financial emergency overall? (0 = not at all prepared, 10 = fully prepared)"
