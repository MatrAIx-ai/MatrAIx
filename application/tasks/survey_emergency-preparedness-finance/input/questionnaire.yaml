      - id: "b"
        label: "Under $5,000"
      - id: "c"
        label: "$5,000 to $19,999"
      - id: "d"
        label: "$20,000 to $49,999"
      - id: "e"
        label: "$50,000 or more"
      - id: "f"
        label: "Not sure"
  - id: q24
    prompt: "How satisfied are you with your household's overall financial preparedness?"
    type: single_choice
    construct: satisfied_household_s_overall_financial
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q25
    prompt: "How likely are you to increase your emergency savings in the next 12 months?"
    type: single_choice
    construct: likely_increase_emergency_savings_next
    required: true
    options:
