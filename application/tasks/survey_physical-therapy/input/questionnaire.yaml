schemaVersion: "1.0"
id: physical_therapy_v1
title: "Physical Therapy Experience Survey"
description: "Consumer experiences with and attitudes toward physical therapy."
questions:
  - id: q0
    prompt: "Have you ever gone to physical therapy?"
    type: single_choice
    construct: have_ever_gone_physical_therapy
    required: true
    options:
      - id: "a"
        label: "Yes, I'm going now"
      - id: "b"
        label: "Yes, within the past year"
      - id: "c"
        label: "Yes, more than a year ago"
      - id: "d"
        label: "No, but a provider has recommended it"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "What was the main reason for your most recent physical therapy?"
    type: single_choice
    construct: was_main_reason_most_recent
    required: true
    options:
      - id: "a"
        label: "Recovery after surgery"
      - id: "b"
        label: "An injury (sports, fall, accident)"
      - id: "c"
        label: "Ongoing joint or muscle discomfort"
      - id: "d"
        label: "Back or neck issues"
      - id: "e"
        label: "Balance, mobility, or strength"
      - id: "f"
        label: "Other"
  - id: q2
    prompt: "Which body area was the main focus? (Select all that apply)"
    type: multi_choice
    construct: body_area_was_main_focus
    required: true
    options:
      - id: "a"
        label: "Back or spine"
      - id: "b"
        label: "Neck or shoulder"
      - id: "c"
        label: "Knee"
      - id: "d"
        label: "Hip"
      - id: "e"
        label: "Ankle or foot"
      - id: "f"
        label: "Elbow, wrist, or hand"
      - id: "g"
        label: "Balance or whole-body"
      - id: "h"
        label: "Other"
  - id: q3
    prompt: "How did you first get connected to physical therapy?"
    type: single_choice
    construct: did_first_get_connected_physical
    required: true
    options:
      - id: "a"
        label: "Referral from a primary care doctor"
      - id: "b"
        label: "Referral from a specialist or surgeon"
      - id: "c"
        label: "Went directly without a referral"
      - id: "d"
        label: "Recommendation from family or friends"
      - id: "e"
        label: "Found it through my insurance"
      - id: "f"
        label: "Other"
  - id: q4
    prompt: "Where did you receive physical therapy? (Select all that apply)"
    type: multi_choice
    construct: where_did_receive_physical_therapy
    required: true
    options:
      - id: "a"
        label: "Outpatient PT clinic"
      - id: "b"
        label: "Hospital-based facility"
      - id: "c"
        label: "At home (home health)"
      - id: "d"
        label: "Virtual or telehealth sessions"
      - id: "e"
        label: "A gym or sports facility"
      - id: "f"
        label: "Not applicable"
  - id: q5
    prompt: "About how many total sessions did (or will) your course of therapy involve? Please enter a number."
    type: free_text
    construct: many_total_sessions_did_will
    required: true
  - id: q6
    prompt: "How often did you typically have sessions?"
    type: single_choice
    construct: often_did_typically_have_sessions
    required: true
    options:
      - id: "a"
        label: "Three or more times a week"
      - id: "b"
        label: "Twice a week"
      - id: "c"
        label: "Once a week"
      - id: "d"
        label: "Every other week or less"
      - id: "e"
        label: "Not applicable"
  - id: q7
    prompt: "How was your physical therapy mostly paid for?"
    type: single_choice
    construct: was_physical_therapy_mostly_paid
    required: true
    options:
      - id: "a"
        label: "Insurance covered most of it"
      - id: "b"
        label: "Insurance plus a copay each visit"
      - id: "c"
        label: "Mostly out of pocket"
      - id: "d"
        label: "Fully out of pocket"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "About how much did you pay out of pocket per session? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_did_pay_out_pocket
    required: true
  - id: q9
    prompt: "Which types of treatment did your therapy include? (Select all that apply)"
    type: multi_choice
    construct: types_treatment_did_therapy_include
    required: true
    options:
      - id: "a"
        label: "Guided exercises and stretches"
      - id: "b"
        label: "Hands-on manual therapy"
      - id: "c"
        label: "Heat, ice, or ultrasound"
      - id: "d"
        label: "Balance or coordination training"
      - id: "e"
        label: "Strength or resistance training"
      - id: "f"
        label: "Education on posture or movement"
      - id: "g"
        label: "A home exercise program"
      - id: "h"
        label: "Not sure"
  - id: q10
