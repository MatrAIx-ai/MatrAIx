        label: "Yes, and I did them consistently"
      - id: "b"
        label: "Yes, and I did them sometimes"
      - id: "c"
        label: "Yes, but I rarely did them"
      - id: "d"
        label: "No home exercises were given"
      - id: "e"
        label: "Not applicable"
  - id: q11
