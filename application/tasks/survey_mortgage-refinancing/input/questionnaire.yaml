schemaVersion: "1.0"
id: mortgage_refinancing_v1
title: "Mortgage Refinancing Survey"
description: "People's experiences with and attitudes toward refinancing a mortgage."
questions:
  - id: q0
    prompt: "Do you currently have a mortgage on a home you own?"
    type: single_choice
    construct: currently_have_mortgage_home_own
    required: true
    options:
      - id: "a"
        label: "Yes, one mortgage"
      - id: "b"
        label: "Yes, more than one (e.g., a second property)"
      - id: "c"
        label: "No, I own my home outright"
      - id: "d"
        label: "No, I don't own a home"
  - id: q1
    prompt: "Which best describes your experience with refinancing?"
    type: single_choice
    construct: best_describes_experience_refinancing
    required: true
    options:
      - id: "a"
        label: "I've refinanced in the past 2 years"
      - id: "b"
        label: "I've refinanced, but more than 2 years ago"
      - id: "c"
        label: "I'm considering refinancing now"
      - id: "d"
        label: "I've thought about it but haven't refinanced"
      - id: "e"
        label: "I've never considered refinancing"
  - id: q2
    prompt: "How many times have you refinanced a mortgage?"
    type: single_choice
    construct: many_times_have_refinanced_mortgage
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "Twice"
      - id: "d"
        label: "Three or more times"
  - id: q3
    prompt: "What is (or was) your main reason for considering a refinance?"
    type: single_choice
    construct: was_main_reason_considering_refinance
    required: true
    options:
      - id: "a"
        label: "Lower my interest rate"
      - id: "b"
        label: "Lower my monthly payment"
      - id: "c"
        label: "Shorten my loan term"
      - id: "d"
        label: "Cash out home equity"
      - id: "e"
        label: "Switch from an adjustable to a fixed rate"
      - id: "f"
        label: "Remove private mortgage insurance (PMI)"
      - id: "g"
        label: "Consolidate debt"
  - id: q4
    prompt: "Which reasons apply to your interest in refinancing? (Select all that apply)"
    type: multi_choice
    construct: reasons_apply_interest_refinancing_selec
    required: true
    options:
      - id: "a"
        label: "Get a lower interest rate"
      - id: "b"
        label: "Reduce the monthly payment"
      - id: "c"
        label: "Pay off the loan faster"
      - id: "d"
        label: "Take cash out for renovations"
      - id: "e"
        label: "Take cash out for other expenses"
      - id: "f"
        label: "Consolidate higher-interest debt"
      - id: "g"
        label: "Remove PMI"
      - id: "h"
        label: "Change loan type or term"
      - id: "i"
        label: "Not applicable"
  - id: q5
    prompt: "What type of refinance are you considering or did you do?"
    type: single_choice
    construct: type_refinance_considering_did
    required: true
    options:
      - id: "a"
        label: "Rate-and-term refinance"
      - id: "b"
        label: "Cash-out refinance"
      - id: "c"
        label: "Streamline refinance (FHA/VA)"
      - id: "d"
        label: "I'm not sure"
  - id: q6
    prompt: "What is the interest rate on your current mortgage?"
    type: single_choice
    construct: interest_rate_current_mortgage
    required: true
    options:
      - id: "a"
        label: "Under 3%"
      - id: "b"
        label: "3% to 3.99%"
      - id: "c"
        label: "4% to 4.99%"
      - id: "d"
        label: "5% to 5.99%"
      - id: "e"
        label: "6% or higher"
      - id: "f"
        label: "I'm not sure"
  - id: q7
    prompt: "What is stopping you (or gave you pause) about refinancing? (Select all that apply)"
    type: multi_choice
    construct: stopping_gave_pause_refinancing_select
    required: true
    options:
      - id: "a"
        label: "Current rates aren't low enough"
      - id: "b"
        label: "Closing costs are too high"
      - id: "c"
        label: "I don't plan to stay in the home long enough"
      - id: "d"
        label: "My existing rate is already low"
      - id: "e"
        label: "The paperwork and hassle"
      - id: "f"
        label: "Concerns about qualifying"
      - id: "g"
        label: "Nothing — I refinanced or plan to"
      - id: "h"
        label: "I'm not sure it's worth it"
  - id: q8
    prompt: "How many lenders did you (or would you) compare for a refinance?"
    type: single_choice
    construct: many_lenders_did_would_compare
    required: true
    options:
      - id: "a"
        label: "Just 1"
      - id: "b"
        label: "2"
      - id: "c"
        label: "3 to 4"
      - id: "d"
        label: "5 or more"
      - id: "e"
        label: "I haven't compared any"
  - id: q9
    prompt: "Which types of lenders did you consider for refinancing? (Select all that apply)"
    type: multi_choice
    construct: types_lenders_did_consider_refinancing
    required: true
    options:
      - id: "a"
        label: "My current mortgage servicer"
      - id: "b"
        label: "My bank or credit union"
      - id: "c"
        label: "An online lender (Rocket Mortgage, Better.com, etc.)"
      - id: "d"
        label: "A mortgage broker"
      - id: "e"
        label: "A local or regional lender"
      - id: "f"
        label: "I haven't looked into lenders"
  - id: q10
    prompt: "Did you calculate your break-even point (how long to recoup closing costs)?"
    type: single_choice
    construct: did_calculate_break_even_point
    required: true
    options:
      - id: "a"
        label: "Yes, and it made sense to refinance"
      - id: "b"
        label: "Yes, and it didn't make sense"
      - id: "c"
        label: "No, but I know what that means"
      - id: "d"
        label: "No, I'm not familiar with it"
  - id: q11
    prompt: "How did you learn about your refinancing options? (Select all that apply)"
    type: multi_choice
    construct: did_learn_refinancing_options_select
    required: true
    options:
      - id: "a"
        label: "My current lender contacted me"
      - id: "b"
        label: "Online rate comparison sites"
      - id: "c"
        label: "A mortgage broker"
      - id: "d"
        label: "Friends or family"
      - id: "e"
        label: "Financial blogs, YouTube, or podcasts"
      - id: "f"
        label: "News about interest rates"
      - id: "g"
        label: "A financial advisor"
  - id: q12
    prompt: "How much do you agree with the following statement: Refinancing is a smart way to save money when rates drop."
    type: single_choice
    construct: much_agree_following_statement_refinanci
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: The refinancing process is complicated and time-consuming."
    type: single_choice
    construct: much_agree_following_statement_refinanci
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
