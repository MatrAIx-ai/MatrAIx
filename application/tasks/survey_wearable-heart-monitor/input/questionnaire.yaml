schemaVersion: "1.0"
id: wearable_heart_monitor_v1
title: "Wearable Heart Monitor Survey"
description: "How consumers use wearable devices to track heart rate and heart health."
questions:
  - id: q0
    prompt: "Do you use a wearable device that tracks your heart rate?"
    type: single_choice
    construct: use_wearable_device_that_tracks
    required: true
    options:
      - id: "a"
        label: "Yes, daily"
      - id: "b"
        label: "Yes, several times a week"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "I own one but rarely use it"
      - id: "e"
        label: "No, I don't use one"
  - id: q1
    prompt: "Which type of device do you primarily use?"
    type: single_choice
    construct: type_device_primarily_use
    required: true
    options:
      - id: "a"
        label: "A smartwatch"
      - id: "b"
        label: "A fitness band or tracker"
      - id: "c"
        label: "A chest-strap heart-rate monitor"
      - id: "d"
        label: "A smart ring"
      - id: "e"
        label: "More than one type"
      - id: "f"
        label: "I don't use one"
  - id: q2
    prompt: "Which brand do you use most? (Select all that apply)"
    type: multi_choice
    construct: brand_use_most_select_all
    required: true
    options:
      - id: "a"
        label: "Apple Watch"
      - id: "b"
        label: "Fitbit"
      - id: "c"
        label: "Garmin"
      - id: "d"
        label: "Samsung Galaxy Watch"
      - id: "e"
        label: "Whoop"
      - id: "f"
        label: "Oura Ring"
      - id: "g"
        label: "Polar"
      - id: "h"
        label: "Another brand"
      - id: "i"
        label: "I don't use one"
  - id: q3
    prompt: "How long have you been using a heart-rate tracking device?"
    type: single_choice
    construct: long_have_been_using_heart
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't use one"
  - id: q4
    prompt: "How often do you wear the device?"
    type: single_choice
    construct: often_wear_device
    required: true
    options:
      - id: "a"
        label: "All day and night"
      - id: "b"
        label: "All day, but not while sleeping"
      - id: "c"
        label: "Mainly during workouts"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely"
  - id: q5
    prompt: "Which heart-related metrics do you track or pay attention to? (Select all that apply)"
    type: multi_choice
    construct: heart_related_metrics_track_pay
    required: true
    options:
      - id: "a"
        label: "Resting heart rate"
      - id: "b"
        label: "Heart rate during exercise"
      - id: "c"
        label: "Heart rate variability"
      - id: "d"
        label: "Recovery or readiness scores"
      - id: "e"
        label: "Irregular rhythm notifications"
      - id: "f"
        label: "Cardio fitness or VO2 estimates"
      - id: "g"
        label: "I don't pay attention to specific metrics"
  - id: q6
    prompt: "What were your main reasons for using a heart-rate tracker? (Select all that apply)"
    type: multi_choice
    construct: were_main_reasons_using_heart
    required: true
    options:
      - id: "a"
        label: "General fitness and exercise"
      - id: "b"
        label: "Curiosity about my heart health"
      - id: "c"
        label: "Tracking recovery and stress"
      - id: "d"
        label: "Weight management goals"
      - id: "e"
        label: "On a doctor's or trainer's suggestion"
      - id: "f"
        label: "Peace of mind"
      - id: "g"
        label: "It came with a device I already wanted"
  - id: q7
    prompt: "How often do you check your heart-rate data?"
    type: single_choice
    construct: often_check_heart_rate_data
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Almost never"
  - id: q8
