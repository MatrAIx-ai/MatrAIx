schemaVersion: "1.0"
id: identity_theft_protection_v1
title: "Identity Theft Protection Survey"
description: "How people guard their personal identity, the tools and services they use, and their experiences with and responses to identity theft."
questions:
  - id: q0
    prompt: "How concerned are you about identity theft affecting you or your household?"
    type: single_choice
    construct: concerned_identity_theft_affecting_house
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q1
    prompt: "Have you ever been a victim of identity theft?"
    type: single_choice
    construct: have_ever_been_victim_identity
    required: true
    options:
      - id: "a"
        label: "Yes, in the past 12 months"
      - id: "b"
        label: "Yes, 1–3 years ago"
      - id: "c"
        label: "Yes, more than 3 years ago"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not sure"
  - id: q2
    prompt: "Which types of identity theft have you experienced? (Select all that apply)"
    type: multi_choice
    construct: types_identity_theft_have_experienced
    required: true
    options:
      - id: "a"
        label: "Unauthorized credit or debit card charges"
      - id: "b"
        label: "A new account opened in my name"
      - id: "c"
        label: "Tax refund fraud"
      - id: "d"
        label: "Medical identity theft"
      - id: "e"
        label: "Government benefits or unemployment fraud"
      - id: "f"
        label: "A loan taken out in my name"
      - id: "g"
        label: "Account takeover (email, bank, or social media)"
      - id: "h"
        label: "I have not experienced identity theft"
  - id: q3
    prompt: "Do you currently subscribe to an identity theft protection or credit monitoring service?"
    type: single_choice
    construct: currently_subscribe_identity_theft_prote
    required: true
    options:
      - id: "a"
        label: "Yes, a paid service"
      - id: "b"
        label: "Yes, a free service"
      - id: "c"
        label: "Yes, one provided by my employer"
      - id: "d"
        label: "Yes, one provided after a data breach"
      - id: "e"
        label: "No, but I am considering it"
      - id: "f"
        label: "No, and I am not considering it"
  - id: q4
    prompt: "Which identity or credit protection services do you use or have you used? (Select all that apply)"
    type: multi_choice
    construct: identity_credit_protection_services_use
    required: true
    options:
      - id: "a"
        label: "LifeLock (Norton)"
      - id: "b"
        label: "Aura"
      - id: "c"
        label: "IdentityForce"
      - id: "d"
        label: "Experian IdentityWorks"
      - id: "e"
        label: "Credit Karma"
      - id: "f"
        label: "A free bank or card issuer monitoring tool"
      - id: "g"
        label: "Free credit reports (AnnualCreditReport.com)"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "How much do you pay per month for identity theft protection? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_pay_per_month_identity
    required: true
  - id: q6
    prompt: "Which protective steps have you taken? (Select all that apply)"
    type: multi_choice
    construct: protective_steps_have_taken_select
    required: true
    options:
      - id: "a"
        label: "Placed a credit freeze"
      - id: "b"
        label: "Set up a fraud alert"
      - id: "c"
        label: "Enabled two-factor authentication on key accounts"
      - id: "d"
        label: "Use a password manager"
      - id: "e"
        label: "Shred physical documents"
      - id: "f"
        label: "Check my credit reports regularly"
      - id: "g"
        label: "Set up account transaction alerts"
      - id: "h"
        label: "Locked my SIM or added carrier PIN protection"
      - id: "i"
        label: "None of these"
  - id: q7
    prompt: "How often do you check your credit report?"
    type: single_choice
    construct: often_check_credit_report
    required: true
    options:
      - id: "a"
        label: "Monthly or more often"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Once a year"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q8
    prompt: "How many of your online accounts use two-factor authentication?"
    type: single_choice
    construct: many_online_accounts_use_two
    required: true
    options:
      - id: "a"
        label: "All or nearly all"
      - id: "b"
        label: "Most"
      - id: "c"
        label: "About half"
      - id: "d"
        label: "A few"
      - id: "e"
        label: "None"
  - id: q9
    prompt: "How do you typically manage your passwords?"
    type: single_choice
    construct: typically_manage_passwords
    required: true
    options:
      - id: "a"
        label: "A dedicated password manager (e.g., 1Password, Bitwarden)"
      - id: "b"
        label: "My browser's built-in password manager"
      - id: "c"
        label: "I reuse a few passwords across sites"
      - id: "d"
        label: "I write them down"
      - id: "e"
        label: "I memorize them"
  - id: q10
    prompt: "Have you ever received a data breach notification?"
    type: single_choice
    construct: have_ever_received_data_breach
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not sure"
  - id: q11
    prompt: "After a data breach notification, what did you typically do? (Select all that apply)"
    type: multi_choice
    construct: after_data_breach_notification_did
    required: true
    options:
      - id: "a"
        label: "Changed the affected password"
      - id: "b"
        label: "Enrolled in offered credit monitoring"
      - id: "c"
        label: "Placed or updated a credit freeze"
      - id: "d"
        label: "Monitored my accounts more closely"
      - id: "e"
        label: "Closed the affected account"
      - id: "f"
        label: "Did nothing"
      - id: "g"
        label: "Not applicable"
  - id: q12
    prompt: "How much do you agree with the following statement: I feel in control of protecting my personal information."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: Companies do enough to protect my personal data."
    type: single_choice
    construct: much_agree_following_statement_companies
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Identity theft protection services are worth the money."
    type: single_choice
    construct: much_agree_following_statement_identity
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: I would know what to do if my identity were stolen."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: It is inevitable that my personal data will be exposed at some point."
    type: single_choice
