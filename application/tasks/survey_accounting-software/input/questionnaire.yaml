schemaVersion: "1.0"
id: accounting_software_v1
title: "Accounting & Bookkeeping Software Survey"
description: "How individuals, freelancers, and small businesses choose, use, and evaluate accounting and bookkeeping software."
questions:
  - id: q0
    prompt: "In what capacity do you use accounting or bookkeeping software?"
    type: single_choice
    construct: capacity_use_accounting_bookkeeping_soft
    required: true
    options:
      - id: "a"
        label: "For my own small business or self-employment"
      - id: "b"
        label: "As an employee who does bookkeeping for an employer"
      - id: "c"
        label: "As an accountant or bookkeeper serving multiple clients"
      - id: "d"
        label: "For personal or household finances only"
      - id: "e"
        label: "For a non-profit, club, or association"
      - id: "f"
        label: "I do not use accounting software"
  - id: q1
    prompt: "How many years have you been using accounting or bookkeeping software?"
    type: free_text
    construct: many_years_have_been_using
    required: true
