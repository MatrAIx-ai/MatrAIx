schemaVersion: "1.0"
id: bond_investing_v1
title: "Bond Investing Survey"
description: "How people invest in bonds — corporate, municipal, and government — directly and through bond mutual funds and ETFs."
questions:
  - id: q0
    prompt: "How familiar are you with bonds as an investment?"
    type: single_choice
    construct: familiar_bonds_as_investment
    required: true
    options:
      - id: "a"
        label: "Not at all familiar"
      - id: "b"
        label: "Slightly familiar"
      - id: "c"
        label: "Moderately familiar"
      - id: "d"
        label: "Very familiar"
  - id: q1
    prompt: "Do you currently invest in bonds in any form?"
    type: single_choice
    construct: currently_invest_bonds_any_form
    required: true
    options:
      - id: "a"
        label: "Yes, individual bonds"
      - id: "b"
        label: "Yes, through bond mutual funds or ETFs"
      - id: "c"
        label: "Yes, both individual bonds and funds"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, and I never have"
  - id: q2
    prompt: "Which types of bonds are you aware of? (Select all that apply)"
    type: multi_choice
    construct: types_bonds_aware_select_all
    required: true
    options:
      - id: "a"
        label: "U.S. Treasury bonds"
      - id: "b"
        label: "Corporate bonds"
      - id: "c"
        label: "Municipal (tax-exempt) bonds"
      - id: "d"
        label: "High-yield (\"junk\") bonds"
      - id: "e"
        label: "Agency bonds (e.g., mortgage-backed)"
      - id: "f"
        label: "International or emerging-market bonds"
      - id: "g"
        label: "I'm not aware of any specific types"
  - id: q3
    prompt: "Which types of bonds do you currently hold? (Select all that apply)"
    type: multi_choice
    construct: types_bonds_currently_hold_select
    required: true
    options:
      - id: "a"
        label: "Treasury bonds or funds"
      - id: "b"
        label: "Corporate bonds or funds"
      - id: "c"
        label: "Municipal bonds or funds"
      - id: "d"
        label: "High-yield bond funds"
      - id: "e"
        label: "Total bond market index funds"
      - id: "f"
        label: "Target-date funds that include bonds"
      - id: "g"
        label: "I don't hold any bonds"
  - id: q4
    prompt: "How do you primarily invest in bonds?"
    type: single_choice
    construct: primarily_invest_bonds
    required: true
    options:
      - id: "a"
        label: "Individual bonds I buy and hold"
      - id: "b"
        label: "Bond mutual funds"
      - id: "c"
        label: "Bond ETFs"
      - id: "d"
        label: "Through a target-date or balanced fund"
      - id: "e"
        label: "Through my employer retirement plan"
      - id: "f"
        label: "I don't invest in bonds"
  - id: q5
    prompt: "What is the main reason you invest (or would invest) in bonds?"
    type: single_choice
    construct: main_reason_invest_would_invest
    required: true
    options:
      - id: "a"
        label: "Steady income from interest payments"
      - id: "b"
        label: "Lower risk than stocks"
      - id: "c"
        label: "Diversifying my portfolio"
      - id: "d"
        label: "Preserving capital"
      - id: "e"
        label: "Balancing risk as I near a goal or retirement"
      - id: "f"
        label: "I don't invest in bonds"
  - id: q6
    prompt: "Roughly how much do you currently have invested in bonds or bond funds? Please enter a dollar amount."
    type: free_text
    construct: roughly_much_currently_have_invested
    required: true
  - id: q7
    prompt: "Roughly what share of your total investment portfolio is in bonds? Please enter a percentage."
    type: free_text
    construct: roughly_share_total_investment_portfolio
    required: true
  - id: q8
    prompt: "Which bond investing concepts are you familiar with? (Select all that apply)"
    type: multi_choice
    construct: bond_investing_concepts_familiar_select
    required: true
    options:
      - id: "a"
        label: "The inverse relationship between rates and bond prices"
      - id: "b"
        label: "Credit ratings (e.g., AAA, BBB, junk)"
      - id: "c"
        label: "Duration and interest-rate risk"
      - id: "d"
        label: "Yield to maturity"
      - id: "e"
        label: "Default risk"
      - id: "f"
        label: "The tax advantages of municipal bonds"
      - id: "g"
        label: "Bond laddering"
      - id: "h"
        label: "I'm not familiar with any of these"
  - id: q9
    prompt: "When interest rates rise, what generally happens to existing bond prices?"
    type: single_choice
    construct: when_interest_rates_rise_generally
    required: true
    options:
      - id: "a"
        label: "They rise"
      - id: "b"
        label: "They fall"
      - id: "c"
        label: "They stay the same"
      - id: "d"
        label: "I don't know"
  - id: q10
    prompt: "How much do you agree or disagree: Bonds are an essential part of a balanced portfolio."
    type: single_choice
    construct: much_agree_disagree_bonds_essential
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I understand the risks involved in bond investing."
    type: single_choice
    construct: much_agree_disagree_i_understand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: Bonds are too boring or low-return to interest me."
    type: single_choice
    construct: much_agree_disagree_bonds_too
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I worry about losing money in bonds when interest rates rise."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: Bond funds are easier for me than buying individual bonds."
    type: single_choice
    construct: much_agree_disagree_bond_funds
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How important is each factor when investing in bonds: The yield or interest rate."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is each factor when investing in bonds: Credit quality of the issuer."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is each factor when investing in bonds: The maturity or duration."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is each factor when investing in bonds: Tax treatment of the interest."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How important is each factor when investing in bonds: Low fees on bond funds."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "Select your top 3 reasons for investing in bonds. (Select all that apply — choose up to 3)"
    type: single_choice
    construct: select_top_3_reasons_investing
    required: true
    options:
      - id: "a"
        label: "Reliable income"
      - id: "b"
        label: "Lower risk than stocks"
      - id: "c"
        label: "Diversification"
      - id: "d"
        label: "Capital preservation"
      - id: "e"
        label: "Balancing my portfolio near a goal"
      - id: "f"
        label: "Tax-advantaged income (municipal bonds)"
      - id: "g"
        label: "A hedge against a stock market downturn"
  - id: q21
    prompt: "What concerns you most about bond investing? (Select all that apply)"
    type: multi_choice
    construct: concerns_most_bond_investing_select
    required: true
    options:
      - id: "a"
        label: "Losing value when interest rates rise"
      - id: "b"
        label: "Low returns compared to stocks"
      - id: "c"
        label: "Default or credit risk"
      - id: "d"
        label: "Inflation eroding returns"
      - id: "e"
        label: "Complexity of individual bonds"
      - id: "f"
        label: "Fees on bond funds"
      - id: "g"
        label: "I have no concerns"
  - id: q22
    prompt: "How would you describe your overall risk tolerance as an investor?"
    type: single_choice
    construct: would_describe_overall_risk_tolerance
    required: true
    options:
      - id: "a"
        label: "Very conservative"
      - id: "b"
        label: "Somewhat conservative"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "Somewhat aggressive"
      - id: "e"
        label: "Very aggressive"
  - id: q23
    prompt: "How has your bond allocation changed over the past few years?"
    type: single_choice
    construct: has_bond_allocation_changed_over
    required: true
    options:
      - id: "a"
        label: "I've increased it"
      - id: "b"
        label: "I've kept it about the same"
      - id: "c"
        label: "I've decreased it"
      - id: "d"
        label: "I don't have a bond allocation"
      - id: "e"
        label: "I'm not sure"
  - id: q24
    prompt: "Do you use a \"bond ladder\" strategy (staggered maturities)?"
    type: single_choice
    construct: use_bond_ladder_strategy_staggered
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I'm interested"
      - id: "c"
        label: "No, and I'm not interested"
      - id: "d"
        label: "I'm not sure what that is"
  - id: q25
    prompt: "For municipal bonds specifically, how important is the state and federal tax exemption to you?"
    type: single_choice
    construct: municipal_bonds_specifically_important_s
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
      - id: "f"
        label: "I don't invest in municipal bonds"
  - id: q26
    prompt: "Who manages your bond investment decisions?"
    type: single_choice
    construct: who_manages_bond_investment_decisions
    required: true
    options:
      - id: "a"
        label: "I make my own decisions"
      - id: "b"
        label: "A financial advisor"
      - id: "c"
        label: "A robo-advisor"
      - id: "d"
        label: "My decisions are inside a target-date or managed fund"
      - id: "e"
        label: "Not applicable"
  - id: q27
    prompt: "Where do you learn about bonds and interest rates? (Select all that apply)"
    type: multi_choice
    construct: where_learn_bonds_interest_rates
    required: true
    options:
      - id: "a"
        label: "Brokerage research and tools"
      - id: "b"
        label: "Financial news (e.g., CNBC, Wall Street Journal)"
      - id: "c"
        label: "My financial advisor"
      - id: "d"
        label: "Books or courses"
      - id: "e"
        label: "Friends or family"
      - id: "f"
