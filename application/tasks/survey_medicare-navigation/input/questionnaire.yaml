schemaVersion: "1.0"
id: medicare_navigation_v1
title: "Medicare Navigation Survey"
description: "How people understand, compare, and make decisions about Medicare coverage."
questions:
  - id: q0
    prompt: "Which best describes your relationship to Medicare?"
    type: single_choice
    construct: best_describes_relationship_medicare
    required: true
    options:
      - id: "a"
        label: "I am enrolled in Medicare"
      - id: "b"
        label: "I will be eligible within a few years"
      - id: "c"
        label: "I help a family member with their Medicare"
      - id: "d"
        label: "I am not eligible and do not help anyone"
      - id: "e"
        label: "Prefer not to say"
  - id: q1
    prompt: "If you have Medicare, which type of coverage do you have?"
    type: single_choice
    construct: if_have_medicare_type_coverage
    required: true
    options:
      - id: "a"
        label: "Original Medicare (Parts A and B)"
      - id: "b"
        label: "Original Medicare plus a Medigap (supplement) plan"
      - id: "c"
        label: "A Medicare Advantage plan (Part C)"
      - id: "d"
        label: "I'm not sure"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "Do you have Medicare prescription drug coverage (Part D)?"
    type: single_choice
    construct: have_medicare_prescription_drug_coverage
    required: true
    options:
      - id: "a"
        label: "Yes, as part of a Medicare Advantage plan"
      - id: "b"
        label: "Yes, as a standalone Part D plan"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I'm not sure"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Which resources have you used to understand or choose Medicare coverage? (Select all that apply)"
    type: multi_choice
    construct: resources_have_used_understand_choose
    required: true
    options:
      - id: "a"
        label: "The official Medicare.gov website or Plan Finder"
      - id: "b"
        label: "The 1-800-MEDICARE phone line"
      - id: "c"
        label: "A State Health Insurance Assistance Program (SHIP) counselor"
      - id: "d"
        label: "An insurance broker or agent"
      - id: "e"
        label: "Advice from family or friends"
      - id: "f"
        label: "Printed materials like the Medicare & You handbook"
      - id: "g"
        label: "Seminars or informational meetings"
  - id: q4
    prompt: "Which parts of navigating Medicare have you found confusing? (Select all that apply)"
    type: multi_choice
    construct: parts_navigating_medicare_have_found
    required: true
    options:
      - id: "a"
        label: "The difference between Original Medicare and Medicare Advantage"
      - id: "b"
        label: "Understanding Medigap plans"
      - id: "c"
        label: "Choosing a Part D drug plan"
      - id: "d"
        label: "Knowing what is and is not covered"
      - id: "e"
        label: "Enrollment deadlines and penalties"
      - id: "f"
        label: "Comparing plan costs"
      - id: "g"
        label: "I have not found it confusing"
  - id: q5
    prompt: "About how many Medicare plan options did you compare before choosing, or would you compare? Please enter a number."
    type: free_text
    construct: many_medicare_plan_options_did
    required: true
  - id: q6
    prompt: "How easy or difficult was it to compare Medicare plan options?"
    type: single_choice
    construct: easy_difficult_was_it_compare
    required: true
    options:
      - id: "a"
        label: "Very easy"
      - id: "b"
        label: "Somewhat easy"
      - id: "c"
        label: "Somewhat difficult"
      - id: "d"
        label: "Very difficult"
      - id: "e"
        label: "I have not compared plans"
  - id: q7
    prompt: "How well do you understand the enrollment periods and deadlines for Medicare?"
    type: single_choice
    construct: well_understand_enrollment_periods_deadl
    required: true
    options:
      - id: "a"
        label: "Very well"
      - id: "b"
        label: "Somewhat well"
      - id: "c"
        label: "Not very well"
      - id: "d"
        label: "Not at all"
  - id: q8
    prompt: "Which are the top 3 factors that matter most to you (or the person you help) in choosing Medicare coverage? (Select all that apply)"
    type: multi_choice
    construct: top_3_factors_that_matter
    required: true
    options:
      - id: "a"
        label: "Low monthly premium"
      - id: "b"
        label: "Low out-of-pocket costs"
      - id: "c"
        label: "Keeping preferred doctors"
      - id: "d"
        label: "Prescription drug coverage"
      - id: "e"
        label: "Dental, vision, or hearing benefits"
      - id: "f"
        label: "Simplicity of the plan"
      - id: "g"
        label: "Freedom to see any provider"
      - id: "h"
        label: "A trusted insurer"
  - id: q9
    prompt: "How much do you agree or disagree with the following statement about navigating Medicare — I understand what my Medicare coverage includes"
