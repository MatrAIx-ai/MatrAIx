  - id: q23
    prompt: "How do you feel about websites that ask you to disable your ad blocker?"
    type: single_choice
    construct: feel_websites_that_ask_disable
    required: true
    options:
      - id: "a"
        label: "I disable it to support the site"
      - id: "b"
        label: "I disable it only for sites I really want"
      - id: "c"
        label: "I usually leave the site instead"
      - id: "d"
        label: "I find a way around the request"
      - id: "e"
        label: "I don't encounter this / not applicable"
  - id: q24
    prompt: "Have you ever stopped using an ad blocker? Why? (Select all that apply)"
    type: multi_choice
    construct: have_ever_stopped_using_ad
    required: true
    options:
      - id: "a"
        label: "Too many sites broke or blocked me"
      - id: "b"
        label: "It was hard to configure"
      - id: "c"
        label: "I wanted to support content creators"
      - id: "d"
        label: "I switched to paying for ad-free services"
      - id: "e"
        label: "It slowed my browser or device"
      - id: "f"
        label: "I have never stopped using one"
      - id: "g"
        label: "I have never used one"
  - id: q25
    prompt: "How acceptable do you find \"reasonable\" non-intrusive ads (e.g., static banners)?"
    type: single_choice
