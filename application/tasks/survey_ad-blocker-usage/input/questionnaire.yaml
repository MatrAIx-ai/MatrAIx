    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Very much"
      - id: "e"
        label: "Extremely"
  - id: q21
    prompt: "How much does this bother you: Ads in mobile apps and games"
    type: single_choice
    construct: much_does_this_bother_ads
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Very much"
      - id: "e"
        label: "Extremely"
  - id: q22
    prompt: "How much does this bother you: Sponsored or \"native\" ads disguised as content"
    type: single_choice
    construct: much_does_this_bother_sponsored
