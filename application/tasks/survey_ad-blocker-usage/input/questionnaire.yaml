schemaVersion: "1.0"
id: ad_blocker_usage_v1
title: "Ad Blocker Usage Survey"
description: "How people use ad blockers and other tools to manage online advertising across browsers, apps, and devices."
questions:
  - id: q0
    prompt: "Do you currently use an ad blocker on any of your devices?"
    type: single_choice
    construct: currently_use_ad_blocker_any
    required: true
    options:
      - id: "a"
        label: "Yes, on most or all of my devices"
      - id: "b"
        label: "Yes, on one device"
      - id: "c"
        label: "No, but I have used one before"
      - id: "d"
        label: "No, and I never have"
      - id: "e"
        label: "I'm not sure"
  - id: q1
    prompt: "How long have you been using an ad blocker?"
    type: single_choice
    construct: long_have_been_using_ad
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't use one"
  - id: q2
    prompt: "What first made you install an ad blocker? (Select all that apply)"
    type: multi_choice
    construct: first_made_install_ad_blocker
    required: true
    options:
      - id: "a"
        label: "Too many ads while browsing"
      - id: "b"
        label: "Intrusive pop-ups and auto-playing videos"
      - id: "c"
        label: "Pages loading too slowly"
      - id: "d"
        label: "Privacy and tracking concerns"
      - id: "e"
        label: "Malicious ads (malvertising) or scams"
      - id: "f"
        label: "A friend or article recommended it"
      - id: "g"
        label: "To block YouTube or video ads"
      - id: "h"
        label: "I have never installed one"
  - id: q3
    prompt: "Which ad blockers or related tools do you use? (Select all that apply)"
    type: multi_choice
    construct: ad_blockers_related_tools_use
    required: true
    options:
      - id: "a"
        label: "uBlock Origin"
      - id: "b"
        label: "AdBlock"
      - id: "c"
        label: "Adblock Plus"
      - id: "d"
        label: "AdGuard"
      - id: "e"
        label: "Ghostery"
      - id: "f"
        label: "Privacy Badger"
      - id: "g"
        label: "Brave browser's built-in blocker"
      - id: "h"
        label: "Pi-hole (network-level)"
      - id: "i"
        label: "A blocker built into my browser (e.g., Safari, Firefox)"
      - id: "j"
        label: "A mobile content blocker app"
      - id: "k"
        label: "Other"
      - id: "l"
        label: "I don't use any"
  - id: q4
    prompt: "Which do you consider your primary ad blocker?"
    type: single_choice
    construct: consider_primary_ad_blocker
    required: true
    options:
      - id: "a"
        label: "uBlock Origin"
      - id: "b"
        label: "AdBlock or Adblock Plus"
      - id: "c"
        label: "AdGuard"
      - id: "d"
        label: "Ghostery or Privacy Badger"
      - id: "e"
        label: "Brave's built-in blocker"
      - id: "f"
        label: "Pi-hole"
      - id: "g"
        label: "A browser's built-in blocker"
      - id: "h"
        label: "A mobile content blocker"
      - id: "i"
        label: "Other"
      - id: "j"
        label: "Not applicable"
  - id: q5
    prompt: "On which devices or platforms do you block ads? (Select all that apply)"
    type: multi_choice
    construct: devices_platforms_block_ads_select
    required: true
    options:
      - id: "a"
        label: "Desktop web browser"
      - id: "b"
        label: "Mobile web browser"
      - id: "c"
        label: "Mobile apps"
      - id: "d"
        label: "Smart TV or streaming device"
      - id: "e"
        label: "Whole home network (router / Pi-hole)"
      - id: "f"
        label: "I don't block ads anywhere"
      - id: "g"
        label: "Not applicable"
  - id: q6
    prompt: "Where do ads bother you the most? (Select all that apply)"
    type: multi_choice
    construct: where_ads_bother_most_select
    required: true
    options:
      - id: "a"
        label: "News and article websites"
      - id: "b"
        label: "YouTube and video sites"
      - id: "c"
        label: "Social media feeds"
      - id: "d"
        label: "Mobile games"
      - id: "e"
        label: "Streaming apps"
      - id: "f"
        label: "Search engine results"
      - id: "g"
        label: "Shopping sites"
      - id: "h"
        label: "Podcasts"
      - id: "i"
        label: "Ads don't really bother me"
  - id: q7
    prompt: "About how many hours per day do you browse the web or use apps where you'd encounter ads? Enter a whole number."
    type: free_text
    construct: many_hours_per_day_browse
    required: true
  - id: q8
    prompt: "Do you pay for any ad-free versions of services (e.g., YouTube Premium, Spotify Premium)?"
    type: single_choice
    construct: pay_any_ad_free_versions
    required: true
    options:
      - id: "a"
        label: "Yes, for several services"
      - id: "b"
        label: "Yes, for one or two"
      - id: "c"
        label: "No, but I've considered it"
      - id: "d"
        label: "No, and I wouldn't"
      - id: "e"
        label: "Not applicable"
  - id: q9
    prompt: "Approximately how much do you pay per month for ad-free versions of services, in U.S. dollars? Enter 0 if you pay nothing."
    type: free_text
    construct: approximately_much_pay_per_month
    required: true
  - id: q10
    prompt: "How often do you allow (\"whitelist\") ads on sites you want to support?"
    type: single_choice
    construct: often_allow_whitelist_ads_sites
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always for sites I like"
  - id: q11
    prompt: "Please rate your agreement: Online ads have gotten out of control."
    type: single_choice
    construct: please_rate_agreement_online_ads
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "Please rate your agreement: An ad blocker makes browsing much faster and cleaner."
    type: single_choice
    construct: please_rate_agreement_ad_blocker
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "Please rate your agreement: I feel guilty blocking ads on sites that rely on ad revenue."
    type: single_choice
    construct: please_rate_agreement_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "Please rate your agreement: Blocking ads is mainly about protecting my privacy."
    type: single_choice
    construct: please_rate_agreement_blocking_ads
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "Please rate your agreement: I would pay a small amount to use my favorite sites ad-free."
    type: single_choice
    construct: please_rate_agreement_i_would
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "Please rate your agreement: Some websites break or nag me when my ad blocker is on."
    type: single_choice
    construct: please_rate_agreement_some_websites
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much does this bother you: Pop-up ads"
    type: single_choice
    construct: much_does_this_bother_pop
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Very much"
      - id: "e"
        label: "Extremely"
  - id: q18
    prompt: "How much does this bother you: Auto-playing video ads"
