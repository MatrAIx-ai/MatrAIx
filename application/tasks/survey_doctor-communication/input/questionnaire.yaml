schemaVersion: "1.0"
id: doctor_communication_v1
title: "Doctor Communication Survey"
description: "How patients experience and evaluate communication with their doctors and health providers."
questions:
  - id: q0
    prompt: "Do you currently have a regular doctor or primary care provider you see?"
    type: single_choice
    construct: currently_have_regular_doctor_primary
    required: true
    options:
      - id: "a"
        label: "Yes, one regular provider"
      - id: "b"
        label: "Yes, but I see several different providers"
      - id: "c"
        label: "No, I see whoever is available"
      - id: "d"
        label: "No, I rarely see a doctor"
  - id: q1
    prompt: "In the past 12 months, how many times did you see or speak with a doctor or health provider?"
    type: single_choice
    construct: past_12_months_many_times
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 time"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 6 times"
      - id: "e"
        label: "7 or more times"
  - id: q2
    prompt: "How long have you been seeing your current primary care provider?"
    type: single_choice
    construct: long_have_been_seeing_current
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "More than 7 years"
      - id: "e"
        label: "I don't have a regular provider"
  - id: q3
    prompt: "How do you most often communicate with your doctor or their office?"
    type: single_choice
    construct: most_often_communicate_doctor_their
    required: true
    options:
      - id: "a"
        label: "In-person visits"
      - id: "b"
        label: "Phone calls"
      - id: "c"
        label: "Video or telehealth visits"
      - id: "d"
        label: "Patient portal messages"
      - id: "e"
        label: "Email or text"
  - id: q4
    prompt: "Which ways have you communicated with a doctor or their office in the past year? (Select all that apply)"
    type: multi_choice
    construct: ways_have_communicated_doctor_their
    required: true
    options:
      - id: "a"
        label: "In-person visit"
      - id: "b"
        label: "Phone call"
      - id: "c"
        label: "Video or telehealth visit"
      - id: "d"
        label: "Patient portal secure message"
      - id: "e"
        label: "Email"
      - id: "f"
        label: "Text message"
      - id: "g"
        label: "Through a nurse or medical assistant"
  - id: q5
    prompt: "About how long does a typical appointment with your doctor last?"
    type: single_choice
    construct: long_does_typical_appointment_doctor
    required: true
    options:
      - id: "a"
        label: "Less than 10 minutes"
      - id: "b"
        label: "10 to 15 minutes"
      - id: "c"
        label: "16 to 30 minutes"
      - id: "d"
        label: "More than 30 minutes"
  - id: q6
    prompt: "Before an appointment, how often do you prepare a list of questions or concerns?"
    type: single_choice
    construct: before_appointment_often_prepare_list
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q7
    prompt: "How often do you feel rushed during your appointments?"
