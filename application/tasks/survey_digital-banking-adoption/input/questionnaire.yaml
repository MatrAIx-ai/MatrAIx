schemaVersion: "1.0"
id: digital_banking_adoption_v1
title: "Digital Banking Adoption Survey"
description: "How consumers adopt and use online and mobile banking, the features they rely on, and their attitudes toward digital versus in-branch banking."
questions:
  - id: q0
    prompt: "Do you currently use online or mobile banking to manage your accounts?"
    type: single_choice
    construct: currently_use_online_mobile_banking
    required: true
    options:
      - id: "a"
        label: "Yes, I use both a mobile app and website"
      - id: "b"
        label: "Yes, mainly a mobile app"
      - id: "c"
        label: "Yes, mainly a website on a computer"
      - id: "d"
        label: "No, but I plan to start"
      - id: "e"
        label: "No, and I do not plan to"
  - id: q1
    prompt: "How long have you been using digital banking (online or mobile)?"
    type: single_choice
    construct: long_have_been_using_digital
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 to 15 years"
      - id: "e"
        label: "More than 15 years"
      - id: "f"
        label: "I do not use digital banking"
  - id: q2
    prompt: "Where do you do most of your primary banking?"
    type: single_choice
    construct: where_most_primary_banking
    required: true
    options:
      - id: "a"
        label: "A large national bank (e.g., Chase, Bank of America, Wells Fargo)"
      - id: "b"
        label: "A regional or community bank"
      - id: "c"
        label: "A credit union"
      - id: "d"
        label: "An online-only bank (e.g., Ally, Capital One 360)"
      - id: "e"
        label: "A neobank or fintech app (e.g., Chime, SoFi)"
      - id: "f"
        label: "A mix of several"
  - id: q3
    prompt: "How often do you access your bank through a mobile app or website?"
    type: single_choice
    construct: often_access_bank_through_mobile
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely or never"
  - id: q4
    prompt: "Which device do you use most often for banking?"
    type: single_choice
    construct: device_use_most_often_banking
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Laptop or desktop computer"
      - id: "d"
        label: "Smartwatch"
      - id: "e"
        label: "I do not bank digitally"
  - id: q5
    prompt: "Which of the following banking tasks do you do digitally? (Select all that apply)"
    type: multi_choice
    construct: following_banking_tasks_digitally_select
    required: true
    options:
      - id: "a"
        label: "Check balances and transactions"
      - id: "b"
        label: "Transfer money between accounts"
      - id: "c"
        label: "Pay bills"
      - id: "d"
        label: "Deposit checks with my phone camera"
      - id: "e"
        label: "Send money to other people"
      - id: "f"
        label: "Apply for loans or credit cards"
      - id: "g"
        label: "Set up savings goals or budgets"
      - id: "h"
        label: "Contact customer support or chat"
  - id: q6
    prompt: "About how many times per week do you log in to your bank's app or website? Please enter a whole number."
    type: free_text
    construct: many_times_per_week_log
    required: true
  - id: q7
    prompt: "Which digital banking features do you use? (Select all that apply)"
    type: multi_choice
    construct: digital_banking_features_use_select
    required: true
    options:
      - id: "a"
        label: "Mobile check deposit"
      - id: "b"
        label: "Account alerts and notifications"
      - id: "c"
        label: "Automatic bill pay"
      - id: "d"
        label: "Budgeting or spending insights"
      - id: "e"
        label: "Card lock/unlock controls"
      - id: "f"
        label: "Zelle or in-app person-to-person payments"
      - id: "g"
        label: "Digital wallet integration (Apple Pay, Google Pay)"
      - id: "h"
        label: "I don't use any of these"
  - id: q8
    prompt: "How do you typically deposit checks?"
    type: single_choice
    construct: typically_deposit_checks
    required: true
    options:
      - id: "a"
        label: "Mobile deposit with my phone"
      - id: "b"
        label: "At an ATM"
      - id: "c"
        label: "At a branch with a teller"
      - id: "d"
        label: "Direct deposit only, I don't deposit paper checks"
      - id: "e"
        label: "Not applicable"
  - id: q9
    prompt: "How often do you visit a physical bank branch?"
    type: single_choice
    construct: often_visit_physical_bank_branch
    required: true
    options:
      - id: "a"
        label: "At least once a week"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Once a year or less"
      - id: "e"
        label: "Never"
  - id: q10
    prompt: "How important is each feature when choosing where to bank? — A well-designed, easy-to-use mobile app"
    type: single_choice
    construct: important_each_feature_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q11
    prompt: "How important is each feature when choosing where to bank? — Access to physical branches"
    type: single_choice
    construct: important_each_feature_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "How important is each feature when choosing where to bank? — Low or no account fees"
    type: single_choice
    construct: important_each_feature_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "How important is each feature when choosing where to bank? — Strong security and fraud protection"
    type: single_choice
    construct: important_each_feature_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "How important is each feature when choosing where to bank? — Quality of customer support"
    type: single_choice
    construct: important_each_feature_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q15
    prompt: "How much do you agree with the following statement: Digital banking makes managing my money easier."
    type: single_choice
    construct: much_agree_following_statement_digital
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: I worry about the security of banking online."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: I still prefer to handle some banking in person."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement: I would be comfortable with a bank that has no physical branches."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement: My bank's app has all the features I need."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "Which security methods do you use to protect your digital banking? (Select all that apply)"
    type: multi_choice
    construct: security_methods_use_protect_digital
    required: true
    options:
      - id: "a"
        label: "Fingerprint or face recognition login"
      - id: "b"
        label: "Two-factor authentication (codes by text or app)"
      - id: "c"
        label: "A strong, unique password"
      - id: "d"
        label: "Account alerts for transactions"
      - id: "e"
        label: "A password manager"
      - id: "f"
        label: "None of these"
  - id: q21
    prompt: "How confident are you in your ability to spot a phishing or scam attempt targeting your bank account?"
    type: single_choice
    construct: confident_ability_spot_phishing_scam
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q22
    prompt: "Have you experienced any of the following problems with digital banking? (Select all that apply)"
    type: multi_choice
    construct: have_experienced_any_following_problems
    required: true
    options:
      - id: "a"
        label: "App crashes or technical glitches"
      - id: "b"
        label: "Trouble logging in"
      - id: "c"
        label: "Delayed transfers or deposits"
      - id: "d"
        label: "Difficulty reaching customer support"
      - id: "e"
        label: "A fraud or unauthorized transaction"
      - id: "f"
        label: "Confusing app design"
      - id: "g"
        label: "None of these"
  - id: q23
    prompt: "What are the main benefits of digital banking for you? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: main_benefits_digital_banking_select
    required: true
    options:
      - id: "a"
        label: "Convenience and 24/7 access"
      - id: "b"
        label: "Saving time"
      - id: "c"
        label: "Avoiding trips to a branch"
      - id: "d"
        label: "Easier tracking of my money"
      - id: "e"
        label: "Faster transfers and payments"
      - id: "f"
        label: "Lower fees"
      - id: "g"
        label: "Real-time alerts"
      - id: "h"
        label: "Better budgeting tools"
  - id: q24
    prompt: "What would make you hesitate to rely fully on digital banking? (Select all that apply)"
    type: multi_choice
    construct: would_make_hesitate_rely_fully
    required: true
    options:
      - id: "a"
        label: "Security or fraud concerns"
      - id: "b"
        label: "Preferring face-to-face service"
      - id: "c"
        label: "Difficulty with technology"
      - id: "d"
        label: "Unreliable internet access"
      - id: "e"
        label: "Trouble depositing cash"
      - id: "f"
        label: "Concern about losing access if the app is down"
      - id: "g"
        label: "Nothing, I am comfortable relying on it"
  - id: q25
    prompt: "How has your use of physical bank branches changed over the past few years?"
    type: single_choice
    construct: has_use_physical_bank_branches
    required: true
    options:
      - id: "a"
        label: "I go much less often"
      - id: "b"
        label: "I go somewhat less often"
      - id: "c"
        label: "No change"
      - id: "d"
        label: "I go more often"
      - id: "e"
        label: "Not applicable"
  - id: q26
    prompt: "How satisfied are you with your primary bank's digital banking experience?"
    type: single_choice
    construct: satisfied_primary_bank_s_digital
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q27
    prompt: "How satisfied are you with your bank's mobile app specifically?"
    type: single_choice
