schemaVersion: "1.0"
id: feature_priority_v1
title: "Feature Prioritization Survey — TOZO A1 Wireless Earbuds Bluetooth 5.3 Light"
description: "Which aspects of this product matter most to the persona. This edition asks about TOZO A1 Wireless Earbuds Bluetooth 5.3 Light from TOZO."
questions:
  - id: q_top_factors
    prompt: "Which of these matter most to you for the TOZO A1 Wireless Earbuds Bluetooth 5.3? (Choose all that apply.)"
    type: multi_choice
    construct: purchase_factors
    required: true
    options:
      - id: "price"
        label: "Price"
      - id: "quality"
        label: "Build quality / durability"
      - id: "brand"
        label: "Brand reputation"
      - id: "features"
        label: "Features / specs"
      - id: "reviews"
        label: "Customer reviews"
      - id: "appearance"
        label: "Appearance / design"
      - id: "convenience"
        label: "Convenience / availability"
  - id: q_single_most
    prompt: "If you had to pick just one, what matters most?"
    type: single_choice
    construct: top_factor
    required: true
    options:
      - id: "price"
        label: "Price"
      - id: "quality"
        label: "Quality"
      - id: "brand"
        label: "Brand"
      - id: "features"
        label: "Features"
      - id: "reviews"
        label: "Reviews"
      - id: "appearance"
        label: "Appearance"
  - id: q_specs_confidence
    prompt: "I feel I understand the TOZO A1 Wireless Earbuds Bluetooth 5.3's features well enough to judge it."
    type: likert
    construct: spec_confidence
    required: true
    minValue: 1
    maxValue: 5
