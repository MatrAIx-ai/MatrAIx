schemaVersion: "1.0"
id: patient_satisfaction_v1
title: "Patient Satisfaction Survey"
description: "Consumer satisfaction with the healthcare they receive, including provider, staff, access, and overall experience."
questions:
  - id: q0
    prompt: "In the past 12 months, about how many times did you visit a doctor or other health professional for your own care?"
    type: single_choice
    construct: past_12_months_many_times
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 time"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 6 times"
      - id: "e"
        label: "7 to 10 times"
      - id: "f"
        label: "More than 10 times"
  - id: q1
    prompt: "What kind of provider do you see most often for your care?"
    type: single_choice
    construct: kind_provider_see_most_often
    required: true
    options:
      - id: "a"
        label: "Primary care doctor"
      - id: "b"
        label: "A specialist"
      - id: "c"
        label: "A nurse practitioner or physician assistant"
      - id: "d"
        label: "An urgent care or walk-in clinic"
      - id: "e"
        label: "A community health center"
      - id: "f"
        label: "I do not have a regular provider"
  - id: q2
    prompt: "How long have you been seeing your current main provider?"
    type: single_choice
    construct: long_have_been_seeing_current
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I do not have a regular provider"
  - id: q3
    prompt: "Overall, how would you rate the quality of healthcare you have received in the past 12 months?"
    type: single_choice
    construct: overall_would_rate_quality_healthcare
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q4
    prompt: "How satisfied are you with your most recent healthcare visit overall?"
    type: single_choice
    construct: satisfied_most_recent_healthcare_visit
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q5
    prompt: "Thinking about your provider, how often did they: Explain things in a way you could understand."
    type: single_choice
    construct: thinking_provider_often_did_they
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Usually"
      - id: "e"
        label: "Always"
