schemaVersion: "1.0"
id: meal_planning_v1
title: "Meal Planning Survey"
description: "How people plan, shop for, and prepare their meals week to week."
questions:
  - id: q0
    prompt: "How often do you plan your meals in advance?"
    type: single_choice
    construct: often_plan_meals_advance
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Most weeks"
      - id: "e"
        label: "Every week"
  - id: q1
    prompt: "How far ahead do you usually plan your meals?"
    type: single_choice
    construct: far_ahead_usually_plan_meals
    required: true
    options:
      - id: "a"
        label: "I do not plan ahead"
      - id: "b"
        label: "A day at a time"
      - id: "c"
        label: "A few days at a time"
      - id: "d"
        label: "A full week"
      - id: "e"
        label: "Two weeks or more"
  - id: q2
    prompt: "Which planning methods do you use? (Select all that apply)"
    type: multi_choice
    construct: planning_methods_use_select_all
    required: true
    options:
      - id: "a"
        label: "A written or printed list"
      - id: "b"
        label: "A notes or reminders app"
      - id: "c"
        label: "A dedicated meal-planning app or website"
      - id: "d"
        label: "A calendar or spreadsheet"
      - id: "e"
        label: "A whiteboard or fridge planner"
      - id: "f"
        label: "I keep it in my head"
      - id: "g"
        label: "I do not plan"
  - id: q3
    prompt: "Do you use any meal-planning or recipe apps or services? (Select all that apply)"
    type: multi_choice
    construct: use_any_meal_planning_recipe
    required: true
    options:
      - id: "a"
        label: "Paprika or a recipe manager"
      - id: "b"
        label: "Mealime or PlateJoy"
      - id: "c"
        label: "A grocery store's app or website"
      - id: "d"
        label: "Pinterest or recipe blogs"
      - id: "e"
        label: "A meal-kit service (for example, HelloFresh, Blue Apron)"
      - id: "f"
        label: "A prepared-meal delivery service (for example, Factor)"
      - id: "g"
        label: "None of these"
  - id: q4
    prompt: "How often do you make a grocery list before shopping?"
    type: single_choice
    construct: often_make_grocery_list_before
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q5
    prompt: "How do you usually get your groceries? (Select all that apply)"
    type: multi_choice
    construct: usually_get_groceries_select_all
    required: true
    options:
      - id: "a"
        label: "Shopping in person at a store"
      - id: "b"
        label: "Online order for pickup"
      - id: "c"
        label: "Online order for delivery"
      - id: "d"
        label: "A meal-kit or subscription box"
      - id: "e"
        label: "Farmers markets or local sources"
      - id: "f"
        label: "Warehouse or bulk stores"
  - id: q6
    prompt: "How many days per week do you cook at home? Please enter a number."
    type: free_text
    construct: many_days_per_week_cook
    required: true
  - id: q7
    prompt: "Do you practice meal prep (cooking meals or components ahead of time)?"
    type: single_choice
    construct: practice_meal_prep_cooking_meals
    required: true
    options:
      - id: "a"
        label: "Yes, most weeks"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I would like to"
      - id: "d"
        label: "No, and I do not plan to"
  - id: q8
    prompt: "What are your main reasons for planning meals? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_planning_meals_select
    required: true
    options:
      - id: "a"
        label: "Save money"
      - id: "b"
        label: "Save time"
      - id: "c"
        label: "Eat healthier"
      - id: "d"
        label: "Reduce food waste"
      - id: "e"
        label: "Reduce daily stress or decisions"
      - id: "f"
        label: "Manage a specific diet or health need"
      - id: "g"
        label: "Feed a family or household"
      - id: "h"
        label: "I do not plan meals"
