schemaVersion: "1.0"
id: bookmark_management_v1
title: "Bookmark Management Survey"
description: "How people save, organize, and revisit bookmarks and read-later content."
questions:
  - id: q0
    prompt: "How do you primarily save web pages or content to revisit later?"
    type: single_choice
    construct: primarily_save_web_pages_content
    required: true
    options:
      - id: "a"
        label: "Browser bookmarks"
      - id: "b"
        label: "A dedicated read-later app"
      - id: "c"
        label: "A notes app"
      - id: "d"
        label: "Leaving browser tabs open"
      - id: "e"
        label: "Sending links to myself (message/email)"
      - id: "f"
        label: "I just re-search for things when I need them"
      - id: "g"
        label: "I don't save things to revisit"
  - id: q1
    prompt: "Roughly how many bookmarks or saved links do you have?"
    type: single_choice
    construct: roughly_many_bookmarks_saved_links
    required: true
    options:
      - id: "a"
        label: "Fewer than 25"
      - id: "b"
        label: "25-100"
      - id: "c"
        label: "100-500"
      - id: "d"
        label: "500-1,000"
      - id: "e"
        label: "More than 1,000"
      - id: "f"
        label: "I have no idea"
  - id: q2
    prompt: "How organized are your bookmarks or saved items?"
    type: single_choice
    construct: organized_bookmarks_saved_items
    required: true
    options:
      - id: "a"
        label: "Very organized with a clear system"
      - id: "b"
        label: "Somewhat organized"
      - id: "c"
        label: "A loose pile with little structure"
      - id: "d"
        label: "A complete mess"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "How often do you actually revisit the things you save?"
    type: single_choice
    construct: often_actually_revisit_things_save
    required: true
    options:
      - id: "a"
        label: "Regularly"
      - id: "b"
        label: "Occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "Almost never"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "How do you save links to come back to? (Select all that apply)"
    type: multi_choice
    construct: save_links_come_back_select
    required: true
    options:
      - id: "a"
        label: "Browser bookmarks / favorites"
      - id: "b"
        label: "The bookmarks bar"
      - id: "c"
        label: "Browser reading list"
      - id: "d"
        label: "A read-later app"
      - id: "e"
        label: "A notes app"
      - id: "f"
        label: "Leaving tabs open"
      - id: "g"
        label: "Saving on social media (e.g., saved posts)"
      - id: "h"
        label: "Messaging or emailing links to myself"
      - id: "i"
        label: "RSS reader"
  - id: q5
    prompt: "Which bookmarking or read-later tools do you use? (Select all that apply)"
    type: multi_choice
    construct: bookmarking_read_later_tools_use
    required: true
    options:
      - id: "a"
        label: "Chrome bookmarks"
      - id: "b"
        label: "Safari bookmarks / Reading List"
      - id: "c"
        label: "Firefox bookmarks / Pocket"
      - id: "d"
        label: "Edge Collections"
      - id: "e"
        label: "Raindrop.io"
      - id: "f"
        label: "Instapaper"
      - id: "g"
        label: "Readwise Reader / Matter"
      - id: "h"
        label: "Notion"
      - id: "i"
        label: "Obsidian"
      - id: "j"
        label: "Evernote / OneNote"
      - id: "k"
        label: "None / just the browser default"
  - id: q6
    prompt: "How do you organize your bookmarks? (Select all that apply)"
    type: multi_choice
    construct: organize_bookmarks_select_all_that
    required: true
    options:
      - id: "a"
        label: "Folders"
      - id: "b"
        label: "Tags"
      - id: "c"
        label: "Favorites / bookmarks bar for the important ones"
      - id: "d"
        label: "Collections or lists"
      - id: "e"
        label: "Rely on search"
      - id: "f"
        label: "I don't organize them"
  - id: q7
    prompt: "What kinds of things do you bookmark? (Select all that apply)"
    type: multi_choice
    construct: kinds_things_bookmark_select_all
