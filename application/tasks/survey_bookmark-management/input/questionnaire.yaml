      - id: "b"
        label: "Reference material / how-tos"
      - id: "c"
        label: "Tools and apps"
      - id: "d"
        label: "Shopping / products"
      - id: "e"
        label: "Recipes"
      - id: "f"
        label: "Videos"
      - id: "g"
        label: "Work or research resources"
      - id: "h"
        label: "Inspiration (design, travel, ideas)"
      - id: "i"
        label: "Frequently visited sites"
  - id: q8
    prompt: "Do your bookmarks sync across your devices?"
    type: single_choice
    construct: bookmarks_sync_across_devices
    required: true
    options:
