schemaVersion: "1.0"
id: clipboard_manager_usage_v1
title: "Clipboard Manager Usage Survey"
description: "How people use clipboard managers — tools that keep a searchable history of copied items."
questions:
  - id: q0
    prompt: "Do you use a clipboard manager (a tool that stores a history of copied items)?"
    type: single_choice
    construct: use_clipboard_manager_tool_that
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I tried one but stopped"
      - id: "e"
        label: "No, but I've heard of them"
      - id: "f"
        label: "No, I didn't know these existed"
  - id: q1
    prompt: "How long have you been using a clipboard manager?"
    type: single_choice
    construct: long_have_been_using_clipboard
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't use one"
  - id: q2
    prompt: "How often do you paste something from your clipboard history (rather than the most recent copy)?"
    type: single_choice
    construct: often_paste_something_from_clipboard
    required: true
    options:
