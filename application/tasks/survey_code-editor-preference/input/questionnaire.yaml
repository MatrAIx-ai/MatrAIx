        label: "Windows"
      - id: "b"
        label: "macOS"
      - id: "c"
        label: "Linux"
      - id: "d"
        label: "Windows Subsystem for Linux (WSL)"
      - id: "e"
        label: "ChromeOS"
  - id: q8
