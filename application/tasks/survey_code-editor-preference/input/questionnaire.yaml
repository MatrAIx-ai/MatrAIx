        label: "Yes, a font with ligatures"
      - id: "b"
        label: "Yes, a monospace font without ligatures"
      - id: "c"
        label: "No, I use the default font"
  - id: q13
    prompt: "How do you primarily use a terminal while coding?"
    type: single_choice
    construct: primarily_use_terminal_while_coding
    required: true
    options:
      - id: "a"
        label: "The terminal integrated into my editor"
      - id: "b"
        label: "A separate standalone terminal app"
      - id: "c"
        label: "Both about equally"
      - id: "d"
        label: "I rarely use a terminal"
  - id: q14
