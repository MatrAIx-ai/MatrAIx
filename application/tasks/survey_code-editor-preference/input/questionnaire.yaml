        label: "JavaScript / TypeScript"
      - id: "b"
        label: "Python"
      - id: "c"
        label: "Java"
      - id: "d"
        label: "C#"
      - id: "e"
        label: "C / C++"
      - id: "f"
        label: "Go"
      - id: "g"
        label: "Rust"
      - id: "h"
        label: "PHP"
      - id: "i"
        label: "Ruby"
      - id: "j"
        label: "Swift or Kotlin"
      - id: "k"
        label: "SQL"
      - id: "l"
        label: "HTML / CSS"
      - id: "m"
        label: "Other"
  - id: q9
    prompt: "Approximately how many extensions or plugins do you have installed in your primary editor?"
    type: single_choice
    construct: approximately_many_extensions_plugins_ha
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 5"
      - id: "c"
        label: "6 to 15"
      - id: "d"
        label: "16 to 30"
      - id: "e"
        label: "More than 30"
      - id: "f"
        label: "I'm not sure"
  - id: q10
    prompt: "Have you customized your editor's keyboard shortcuts?"
    type: single_choice
    construct: have_customized_editor_s_keyboard
    required: true
    options:
      - id: "a"
        label: "Yes, extensively"
      - id: "b"
        label: "Yes, a few"
      - id: "c"
        label: "No, I use the defaults"
  - id: q11
    prompt: "Which color theme do you use in your editor?"
    type: single_choice
    construct: color_theme_use_editor
    required: true
    options:
