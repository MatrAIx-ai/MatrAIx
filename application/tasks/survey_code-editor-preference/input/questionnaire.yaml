    required: true
    options:
      - id: "a"
        label: "Syntax highlighting"
      - id: "b"
        label: "Autocomplete / IntelliSense"
      - id: "c"
        label: "Integrated debugger"
      - id: "d"
        label: "Git / version control integration"
      - id: "e"
        label: "AI code completion"
      - id: "f"
