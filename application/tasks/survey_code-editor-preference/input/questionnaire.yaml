        label: "Yes, Vim is my main editor"
      - id: "b"
        label: "Yes, I use Vim keybindings inside another editor"
      - id: "c"
        label: "No, but I have tried them"
      - id: "d"
        label: "No, never"
  - id: q15
    prompt: "How often do you switch between different editors during your work?"
    type: single_choice
    construct: often_switch_between_different_editors
    required: true
    options:
