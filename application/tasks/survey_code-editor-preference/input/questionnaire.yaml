        label: "A dark theme"
      - id: "b"
        label: "A light theme"
      - id: "c"
        label: "I switch depending on time or setting"
      - id: "d"
        label: "I use the default and don't think about it"
  - id: q12
    prompt: "Do you use a dedicated programming font (with features like ligatures or fixed width)?"
    type: single_choice
    construct: use_dedicated_programming_font_features
    required: true
