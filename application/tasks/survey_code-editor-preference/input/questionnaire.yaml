        label: "Never — I use one editor for everything"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q16
    prompt: "Which editor features do you rely on most? (Select all that apply)"
    type: multi_choice
