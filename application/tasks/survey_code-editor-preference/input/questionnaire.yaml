schemaVersion: "1.0"
id: code_editor_preference_v1
title: "Code Editor & IDE Preference Survey"
description: "Which code editors and IDEs developers use, how they configure them, and how satisfied they are."
questions:
  - id: q0
    prompt: "Which best describes how you write code?"
    type: single_choice
    construct: best_describes_write_code
    required: true
    options:
      - id: "a"
        label: "I write code as a professional software developer"
      - id: "b"
        label: "I write code sometimes as part of a non-developer role"
      - id: "c"
        label: "I write code as a hobby"
      - id: "d"
        label: "I am learning to code"
      - id: "e"
        label: "I do not write code"
  - id: q1
    prompt: "Including any education, how many years have you been writing code in total? Please enter a number."
    type: free_text
    construct: including_any_education_many_years
    required: true
  - id: q2
    prompt: "On a typical working day, about how many hours do you spend in a code editor or IDE? Please enter a number."
    type: free_text
    construct: typical_working_day_many_hours
    required: true
  - id: q3
    prompt: "Which code editor or IDE do you use most often?"
    type: single_choice
    construct: code_editor_ide_use_most
    required: true
    options:
      - id: "a"
        label: "Visual Studio Code"
      - id: "b"
        label: "A JetBrains IDE (IntelliJ, PyCharm, WebStorm, etc.)"
      - id: "c"
        label: "Neovim or Vim"
      - id: "d"
        label: "Sublime Text"
      - id: "e"
        label: "Emacs"
      - id: "f"
        label: "Visual Studio"
      - id: "g"
        label: "Xcode"
      - id: "h"
        label: "Zed"
      - id: "i"
        label: "Notepad++"
      - id: "j"
        label: "Nano"
      - id: "k"
        label: "Other"
  - id: q4
    prompt: "Which code editors or IDEs have you used regularly in the past year? (Select all that apply)"
    type: multi_choice
    construct: code_editors_ides_have_used
    required: true
    options:
      - id: "a"
        label: "Visual Studio Code"
      - id: "b"
        label: "IntelliJ IDEA"
      - id: "c"
        label: "PyCharm"
      - id: "d"
        label: "WebStorm"
      - id: "e"
        label: "Neovim or Vim"
      - id: "f"
        label: "Sublime Text"
      - id: "g"
        label: "Emacs"
      - id: "h"
        label: "Visual Studio"
      - id: "i"
        label: "Xcode"
      - id: "j"
        label: "Zed"
      - id: "k"
        label: "Notepad++"
      - id: "l"
        label: "Android Studio"
      - id: "m"
        label: "Cursor"
      - id: "n"
        label: "Other"
  - id: q5
    prompt: "Which code editors or IDEs would you like to try or use more over the next year? (Select all that apply)"
    type: multi_choice
    construct: code_editors_ides_would_like
    required: true
    options:
      - id: "a"
        label: "Visual Studio Code"
      - id: "b"
        label: "A JetBrains IDE"
      - id: "c"
        label: "Neovim or Vim"
      - id: "d"
        label: "Sublime Text"
      - id: "e"
        label: "Emacs"
      - id: "f"
        label: "Zed"
      - id: "g"
        label: "Cursor"
      - id: "h"
        label: "Helix"
      - id: "i"
        label: "I'm happy with my current setup"
      - id: "j"
        label: "Other"
  - id: q6
    prompt: "Why did you choose your primary editor? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_primary_editor
    required: true
    options:
      - id: "a"
        label: "It is the team or company standard"
      - id: "b"
        label: "Speed and performance"
      - id: "c"
        label: "Extension or plugin ecosystem"
      - id: "d"
        label: "Familiarity / habit"
      - id: "e"
        label: "It is free"
      - id: "f"
        label: "Built-in AI features"
      - id: "g"
        label: "Strong language or framework support"
      - id: "h"
        label: "Debugging tools"
      - id: "i"
        label: "It was recommended to me"
  - id: q7
    prompt: "On which operating systems do you write code? (Select all that apply)"
    type: multi_choice
    construct: operating_systems_write_code_select
    required: true
    options:
