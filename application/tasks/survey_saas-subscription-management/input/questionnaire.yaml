schemaVersion: "1.0"
id: saas_subscription_management_v1
title: "SaaS & App Subscription Management Survey"
description: "How people sign up for, track, pay for, review, and cancel their software and app subscriptions."
questions:
  - id: q0
    prompt: "Do you currently pay for any software or app subscriptions?"
    type: single_choice
    construct: currently_pay_any_software_app
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, a few"
      - id: "c"
        label: "Yes, just one"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "Which categories of software or app subscriptions do you currently pay for? (Select all that apply)"
    type: multi_choice
    construct: categories_software_app_subscriptions_cu
    required: true
    options:
      - id: "a"
        label: "Video streaming (Netflix, Disney+, etc.)"
      - id: "b"
        label: "Music streaming (Spotify, Apple Music, etc.)"
      - id: "c"
        label: "Cloud storage (iCloud, Google One, Dropbox, etc.)"
      - id: "d"
        label: "Productivity / office (Microsoft 365, Google Workspace, etc.)"
      - id: "e"
        label: "Creative tools (Adobe, Canva Pro, etc.)"
      - id: "f"
        label: "Password manager (1Password, Dashlane, etc.)"
      - id: "g"
        label: "VPN or security services"
      - id: "h"
        label: "AI tools (ChatGPT Plus, etc.)"
      - id: "i"
        label: "Note-taking / knowledge (Notion, Evernote, etc.)"
      - id: "j"
        label: "Gaming subscriptions (Game Pass, PS Plus, etc.)"
      - id: "k"
        label: "News or reading apps"
      - id: "l"
        label: "Fitness or wellness apps"
      - id: "m"
        label: "None of these"
  - id: q2
    prompt: "About how many paid software/app subscriptions do you have in total right now?"
    type: single_choice
    construct: many_paid_software_app_subscriptions
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1-2"
      - id: "c"
        label: "3-5"
      - id: "d"
        label: "6-10"
      - id: "e"
        label: "11-15"
      - id: "f"
        label: "More than 15"
  - id: q3
    prompt: "Roughly how much do you spend on all software/app subscriptions combined per month?"
    type: single_choice
    construct: roughly_much_spend_all_software
    required: true
    options:
      - id: "a"
        label: "$0"
      - id: "b"
        label: "Under $10"
      - id: "c"
        label: "$10-$29"
      - id: "d"
        label: "$30-$59"
      - id: "e"
        label: "$60-$99"
      - id: "f"
        label: "$100-$199"
      - id: "g"
        label: "$200 or more"
  - id: q4
    prompt: "How do you keep track of your subscriptions? (Select all that apply)"
    type: multi_choice
    construct: keep_track_subscriptions_select_all
    required: true
    options:
      - id: "a"
        label: "I keep a mental note"
      - id: "b"
        label: "A spreadsheet or note"
      - id: "c"
        label: "A dedicated subscription-tracking app"
      - id: "d"
        label: "My bank or credit card app"
      - id: "e"
        label: "My phone's app store subscription page"
      - id: "f"
        label: "Email receipts"
      - id: "g"
        label: "I don't really track them"
  - id: q5
    prompt: "Which billing cycles do most of your subscriptions use? (Select all that apply)"
    type: multi_choice
    construct: billing_cycles_most_subscriptions_use
    required: true
    options:
      - id: "a"
        label: "Monthly"
      - id: "b"
        label: "Annual"
      - id: "c"
        label: "Quarterly"
      - id: "d"
        label: "Lifetime / one-time"
      - id: "e"
        label: "Free trial not yet converted"
      - id: "f"
        label: "I'm not sure"
  - id: q6
