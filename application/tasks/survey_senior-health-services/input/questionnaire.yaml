schemaVersion: "1.0"
id: senior_health_services_v1
title: "Senior Health Services Survey"
description: "Attitudes toward and use of health and wellness services aimed at older adults."
questions:
  - id: q0
    prompt: "Are you answering these questions mainly about yourself or about an older adult you help?"
    type: single_choice
    construct: answering_these_questions_mainly_yoursel
    required: true
    options:
      - id: "a"
        label: "About myself"
      - id: "b"
        label: "About a parent or older relative I help"
      - id: "c"
        label: "About another older adult I help"
      - id: "d"
        label: "About both myself and someone I help"
  - id: q1
    prompt: "Which age range applies to the older adult these questions are about?"
    type: single_choice
    construct: age_range_applies_older_adult
    required: true
    options:
      - id: "a"
        label: "Under 60"
      - id: "b"
        label: "60 to 69"
      - id: "c"
        label: "70 to 79"
      - id: "d"
        label: "80 to 89"
      - id: "e"
        label: "90 or older"
  - id: q2
    prompt: "What is the current living situation of that older adult?"
    type: single_choice
    construct: current_living_situation_that_older
    required: true
    options:
      - id: "a"
        label: "Lives independently at home, alone"
      - id: "b"
        label: "Lives independently at home, with family or a partner"
      - id: "c"
        label: "Lives in an independent living community"
      - id: "d"
        label: "Lives in an assisted living community"
      - id: "e"
        label: "Other arrangement"
  - id: q3
    prompt: "Which senior-focused health or wellness services have been used in the past year? (Select all that apply)"
    type: multi_choice
    construct: senior_focused_health_wellness_services
    required: true
    options:
      - id: "a"
        label: "Medicare annual wellness visit"
      - id: "b"
        label: "Senior center programs or classes"
      - id: "c"
        label: "Transportation to medical appointments"
      - id: "d"
        label: "Meal delivery (e.g., Meals on Wheels)"
      - id: "e"
        label: "In-home help with daily tasks"
      - id: "f"
        label: "Fall-prevention or balance program"
      - id: "g"
        label: "Pharmacy medication review"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "Which health care providers are seen regularly? (Select all that apply)"
    type: multi_choice
    construct: health_care_providers_seen_regularly
    required: true
    options:
      - id: "a"
        label: "Primary care doctor"
      - id: "b"
        label: "Specialist (e.g., cardiologist, ophthalmologist)"
      - id: "c"
        label: "Dentist"
      - id: "d"
        label: "Audiologist or hearing specialist"
      - id: "e"
        label: "Physical or occupational therapist"
      - id: "f"
        label: "Pharmacist for medication guidance"
      - id: "g"
        label: "None regularly"
