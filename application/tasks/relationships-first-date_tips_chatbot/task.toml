version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/relationships-first-date-tips-chatbot"

[metadata]
difficulty = "easy"
type = "chatbot"
domain = "relationships"
tags = [ "relationships", "dating", "social" ]

[verifier]
