      - id: "e"
        label: "More flexible payment plans"
      - id: "f"
        label: "A clear breakdown of what insurance covered"
      - id: "g"
        label: "Easier ways to reach a real person"
      - id: "h"
        label: "Digital bills and reminders"
  - id: q32
