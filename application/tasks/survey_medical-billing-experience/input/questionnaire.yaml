      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q26
    prompt: "When understanding a charge on your bill, how important is seeing what insurance paid versus what you owe?"
    type: single_choice
    construct: when_understanding_charge_bill_important
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q27
    prompt: "When understanding a charge on your bill, how important is knowing the price before the service?"
    type: single_choice
