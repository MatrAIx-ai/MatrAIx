schemaVersion: "1.0"
id: dental_care_access_v1
title: "Dental Care Access Survey"
description: "Consumer access to dental care, including finding a dentist, affording visits, and the barriers that lead people to delay or skip care."
questions:
  - id: q0
    prompt: "Do you currently have a regular dentist you see?"
    type: single_choice
    construct: currently_have_regular_dentist_see
    required: true
    options:
      - id: "a"
        label: "Yes, one I see regularly"
      - id: "b"
        label: "Yes, but I rarely go"
      - id: "c"
        label: "No, but I have had one in the past"
      - id: "d"
        label: "No, I have never had a regular dentist"
  - id: q1
    prompt: "When did you last visit a dentist?"
    type: single_choice
    construct: when_did_last_visit_dentist
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "Never"
  - id: q2
    prompt: "How often do you typically visit the dentist?"
    type: single_choice
    construct: often_typically_visit_dentist
    required: true
    options:
      - id: "a"
        label: "Twice a year or more"
      - id: "b"
        label: "About once a year"
      - id: "c"
        label: "Every couple of years"
      - id: "d"
        label: "Only when I have a problem"
      - id: "e"
        label: "Never"
  - id: q3
    prompt: "What type of dental practice do you usually go to?"
    type: single_choice
    construct: type_dental_practice_usually_go
    required: true
    options:
      - id: "a"
        label: "A private solo or small practice"
      - id: "b"
        label: "A large group or chain practice"
      - id: "c"
        label: "A community health center or clinic"
      - id: "d"
        label: "A dental school clinic"
      - id: "e"
        label: "I do not have a usual place"
  - id: q4
    prompt: "How did you find your current or most recent dentist?"
    type: single_choice
    construct: did_find_current_most_recent
    required: true
    options:
      - id: "a"
        label: "A referral from friends or family"
      - id: "b"
        label: "My insurance network directory"
      - id: "c"
        label: "An online search or reviews"
      - id: "d"
        label: "A referral from another provider"
      - id: "e"
        label: "Location or convenience"
      - id: "f"
        label: "I do not have one"
  - id: q5
    prompt: "Which of the following dental services have you received in the past two years? (Select all that apply)"
    type: multi_choice
    construct: following_dental_services_have_received
    required: true
    options:
      - id: "a"
        label: "Routine cleaning"
      - id: "b"
        label: "Dental exam or X-rays"
      - id: "c"
        label: "Fillings"
      - id: "d"
        label: "Deep cleaning for gum health"
      - id: "e"
        label: "Tooth extraction"
      - id: "f"
        label: "Crown, bridge, or denture"
      - id: "g"
        label: "Cosmetic treatment (for example, whitening)"
      - id: "h"
        label: "None of these"
  - id: q6
    prompt: "How do you usually pay for dental care?"
    type: single_choice
    construct: usually_pay_dental_care
    required: true
    options:
      - id: "a"
        label: "Dental insurance"
      - id: "b"
        label: "Out of pocket"
      - id: "c"
        label: "A dental savings or membership plan"
      - id: "d"
        label: "A payment plan or financing"
      - id: "e"
        label: "Medicaid or a public program"
      - id: "f"
        label: "I do not pay because I do not go"
  - id: q7
    prompt: "In the past year, about how much did you spend out of pocket on dental care? Please enter a number in dollars."
    type: free_text
    construct: past_year_much_did_spend
    required: true
  - id: q8
    prompt: "Which of the following have made it hard for you to get dental care? (Select all that apply)"
    type: multi_choice
    construct: following_have_made_it_hard
    required: true
    options:
      - id: "a"
        label: "Cost"
      - id: "b"
        label: "Lack of dental insurance"
      - id: "c"
        label: "Difficulty getting an appointment"
      - id: "d"
        label: "Distance or transportation"
      - id: "e"
        label: "Fear or anxiety about the dentist"
      - id: "f"
        label: "Not finding a dentist accepting new patients"
      - id: "g"
        label: "Nothing has made it hard"
  - id: q9
    prompt: "How much do you agree or disagree: Regular dental visits are important for my overall health."
    type: single_choice
    construct: much_agree_disagree_regular_dental
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: Dental care is too expensive for me."
    type: single_choice
    construct: much_agree_disagree_dental_care
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: It is easy for me to get a dental appointment when I need one."
    type: single_choice
    construct: much_agree_disagree_it_easy
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I feel anxious about going to the dentist."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I trust my dentist's recommendations."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I put off dental care until a problem becomes serious."
    type: single_choice
    construct: much_agree_disagree_i_put
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How important is each of the following when choosing a dentist: cost or insurance acceptance?"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is each of the following when choosing a dentist: location and convenience?"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is each of the following when choosing a dentist: gentle, comfortable care?"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is each of the following when choosing a dentist: appointment availability?"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How important is each of the following when choosing a dentist: good reviews or reputation?"
    type: single_choice
    construct: important_each_following_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "In the past two years, have you delayed or skipped dental care because of cost?"
    type: single_choice
    construct: past_two_years_have_delayed
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I do not seek dental care"
  - id: q21
    prompt: "Have you ever gone to an emergency room or urgent care for a dental problem?"
    type: single_choice
    construct: have_ever_gone_emergency_room
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q22
    prompt: "How would you rate the overall condition of your teeth and gums?"
    type: single_choice
    construct: would_rate_overall_condition_teeth
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q23
    prompt: "How far do you usually travel to reach your dentist?"
    type: single_choice
    construct: far_usually_travel_reach_dentist
    required: true
    options:
      - id: "a"
        label: "Less than 10 minutes"
      - id: "b"
        label: "10 to 20 minutes"
      - id: "c"
        label: "20 to 40 minutes"
      - id: "d"
        label: "More than 40 minutes"
      - id: "e"
        label: "I do not have a usual dentist"
  - id: q24
    prompt: "How long does it typically take you to get a routine dental appointment?"
    type: single_choice
    construct: long_does_it_typically_take
    required: true
    options:
      - id: "a"
        label: "Within a few days"
      - id: "b"
        label: "About 1 to 2 weeks"
      - id: "c"
        label: "About a month"
      - id: "d"
        label: "More than a month"
      - id: "e"
        label: "I have not tried recently"
  - id: q25
    prompt: "How confident are you that you could afford an unexpected dental bill?"
    type: single_choice
    construct: confident_that_could_afford_unexpected
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "A little confident"
      - id: "c"
        label: "Somewhat confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
  - id: q26
    prompt: "How likely are you to visit the dentist in the next 12 months?"
    type: single_choice
    construct: likely_visit_dentist_next_12
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q27
    prompt: "Overall, how satisfied are you with your access to dental care?"
    type: single_choice
    construct: overall_satisfied_access_dental_care
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q28
    prompt: "How would you rate the quality of the dental care you receive?"
    type: single_choice
