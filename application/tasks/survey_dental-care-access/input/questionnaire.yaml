  - id: q29
    prompt: "On a scale of 0 to 10, how likely are you to recommend your dentist to a friend or family member? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
    construct: scale_0_10_likely_recommend
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
