artifactName: user_feedback.json
instructions: |
  Reflect honestly after choosing your next book on Open Library.
  Base your answers on the book you selected, the alternatives you inspected,
  and how confident you feel that the choice fits you.
fields:
  - key: needConstraintSatisfaction
    prompt: How well did the selected book satisfy what you were looking for?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: personalPreferenceSatisfaction
    prompt: How well did the selected book match your interests and reading taste?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: overallExperienceRating
    prompt: Overall, how would you rate the book-selection experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
    explanation:
      key: reason
      prompt: Briefly explain the rating in your own voice.
  - key: trustLevel
    prompt: "Optional: how confident are you in the final book choice from 1 to 10?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: effortRating
    prompt: "Optional: how effortful did the comparison feel from 1 to 10, where higher means more effort?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: clarityOfNextStep
    prompt: "Optional: after choosing, do you know when and how you would actually read this book?"
    kind: boolean
    required: false
