schemaVersion: "1.0"
id: cloud_gaming_v1
title: "Cloud Gaming Survey"
description: "How people perceive and use cloud gaming services that stream games from remote servers, including adoption, performance experience, and attitudes."
questions:
  - id: q0
    prompt: "How familiar are you with cloud gaming (streaming games from remote servers instead of running them on your own device)?"
    type: single_choice
    construct: familiar_cloud_gaming_streaming_games
    required: true
    options:
      - id: "a"
        label: "I use it regularly"
      - id: "b"
        label: "I've tried it"
      - id: "c"
        label: "I know what it is but haven't tried it"
      - id: "d"
        label: "I've never heard of it before now"
  - id: q1
    prompt: "Have you ever used a cloud gaming service?"
    type: single_choice
    construct: have_ever_used_cloud_gaming
    required: true
    options:
      - id: "a"
        label: "Yes, I use one currently"
      - id: "b"
        label: "Yes, but I don't anymore"
      - id: "c"
        label: "No, but I'm interested"
      - id: "d"
        label: "No, and I'm not interested"
  - id: q2
    prompt: "Which cloud gaming services have you used or tried? (Select all that apply)"
    type: multi_choice
    construct: cloud_gaming_services_have_used
    required: true
    options:
      - id: "a"
        label: "Xbox Cloud Gaming (Game Pass Ultimate)"
      - id: "b"
        label: "NVIDIA GeForce NOW"
      - id: "c"
        label: "Amazon Luna"
      - id: "d"
        label: "PlayStation Plus cloud streaming"
      - id: "e"
        label: "Boosteroid"
      - id: "f"
        label: "Shadow"
      - id: "g"
        label: "Google Stadia (before shutdown)"
      - id: "h"
        label: "Another service"
      - id: "i"
        label: "None"
  - id: q3
    prompt: "Which cloud gaming service do you use most (or would most like to try)?"
    type: single_choice
    construct: cloud_gaming_service_use_most
    required: true
    options:
      - id: "a"
        label: "Xbox Cloud Gaming"
      - id: "b"
        label: "NVIDIA GeForce NOW"
      - id: "c"
        label: "Amazon Luna"
      - id: "d"
        label: "PlayStation Plus cloud streaming"
      - id: "e"
        label: "Boosteroid"
      - id: "f"
        label: "Shadow"
      - id: "g"
        label: "Other"
      - id: "h"
        label: "None / not sure"
  - id: q4
    prompt: "How long have you been using cloud gaming?"
    type: single_choice
    construct: long_have_been_using_cloud
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I don't currently use it"
  - id: q5
    prompt: "On which devices do you (or would you) play cloud games? (Select all that apply)"
    type: multi_choice
    construct: devices_would_play_cloud_games
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Laptop or desktop computer"
      - id: "d"
        label: "Smart TV"
      - id: "e"
        label: "Streaming device (Fire TV, Chromecast, etc.)"
      - id: "f"
        label: "Game console"
      - id: "g"
        label: "Handheld gaming device"
  - id: q6
    prompt: "On a typical week, about how many hours do you spend cloud gaming?"
    type: single_choice
    construct: typical_week_many_hours_spend
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Less than 2 hours"
      - id: "c"
        label: "2 to 5 hours"
      - id: "d"
        label: "6 to 10 hours"
      - id: "e"
        label: "More than 10 hours"
  - id: q7
    prompt: "What most attracts you to cloud gaming? (Select all that apply)"
    type: multi_choice
    construct: most_attracts_cloud_gaming_select
    required: true
    options:
      - id: "a"
        label: "Playing without buying expensive hardware"
      - id: "b"
        label: "Playing on many different devices"
      - id: "c"
        label: "Playing high-end games on a low-end device"
      - id: "d"
        label: "No large downloads or installs"
      - id: "e"
        label: "Trying games included in a subscription"
      - id: "f"
        label: "Playing away from home"
      - id: "g"
        label: "Nothing attracts me to it"
  - id: q8
    prompt: "What is your main concern about cloud gaming? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: main_concern_cloud_gaming_select
    required: true
    options:
      - id: "a"
        label: "Input lag or latency"
      - id: "b"
        label: "Needing a fast, stable internet connection"
      - id: "c"
        label: "Video quality or compression"
      - id: "d"
        label: "Not owning the games I play"
      - id: "e"
        label: "Ongoing subscription costs"
      - id: "f"
        label: "Limited game library"
      - id: "g"
        label: "Data usage or caps"
      - id: "h"
        label: "Service could shut down"
      - id: "i"
        label: "Reliability and downtime"
      - id: "j"
        label: "Account or privacy concerns"
  - id: q9
    prompt: "What type of internet connection do you mainly use at home?"
    type: single_choice
    construct: type_internet_connection_mainly_use
    required: true
    options:
      - id: "a"
        label: "Fiber"
      - id: "b"
        label: "Cable"
      - id: "c"
        label: "DSL"
      - id: "d"
        label: "Fixed wireless or satellite"
      - id: "e"
        label: "5G home internet"
      - id: "f"
        label: "Mobile data / hotspot"
      - id: "g"
        label: "Not sure"
  - id: q10
    prompt: "Roughly what is your home internet download speed?"
    type: single_choice
    construct: roughly_home_internet_download_speed
    required: true
    options:
      - id: "a"
        label: "Under 25 Mbps"
      - id: "b"
        label: "25 to 100 Mbps"
      - id: "c"
        label: "100 to 300 Mbps"
      - id: "d"
        label: "300 to 1000 Mbps"
      - id: "e"
        label: "Over 1000 Mbps (gigabit)"
      - id: "f"
        label: "Not sure"
  - id: q11
    prompt: "How would you rate the performance you experience (or expect) with cloud gaming?"
    type: single_choice
    construct: would_rate_performance_experience_expect
    required: true
    options:
      - id: "a"
        label: "Very poor"
      - id: "b"
        label: "Poor"
      - id: "c"
        label: "Acceptable"
      - id: "d"
        label: "Good"
      - id: "e"
        label: "Excellent"
  - id: q12
    prompt: "How often do you experience the following when cloud gaming — Noticeable input lag"
    type: single_choice
    construct: often_experience_following_when_cloud
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q13
    prompt: "How often do you experience the following when cloud gaming — Video quality dropping or blurring"
    type: single_choice
    construct: often_experience_following_when_cloud
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q14
    prompt: "How often do you experience the following when cloud gaming — Disconnections or session drops"
    type: single_choice
    construct: often_experience_following_when_cloud
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q15
    prompt: "How often do you experience the following when cloud gaming — Long wait times or queues to start"
    type: single_choice
    construct: often_experience_following_when_cloud
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q16
    prompt: "Please rate your agreement — Cloud gaming lets me play games I otherwise couldn't run"
    type: single_choice
    construct: please_rate_agreement_cloud_gaming
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "Please rate your agreement — The performance of cloud gaming is good enough for how I play"
