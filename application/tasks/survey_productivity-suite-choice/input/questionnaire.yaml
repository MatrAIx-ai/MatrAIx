schemaVersion: "1.0"
id: productivity_suite_choice_v1
title: "Office & Productivity Suite Choice Survey"
description: "Which office and productivity suites people use, how they use their apps, and what they value in collaboration, cost, and features."
questions:
  - id: q0
    prompt: "Which office/productivity suite do you use most often?"
    type: single_choice
    construct: office_productivity_suite_use_most
    required: true
    options:
      - id: "a"
        label: "Microsoft 365 / Office"
      - id: "b"
        label: "Google Workspace (Docs, Sheets, Slides)"
      - id: "c"
        label: "Apple iWork (Pages, Numbers, Keynote)"
      - id: "d"
        label: "LibreOffice or OpenOffice"
      - id: "e"
        label: "WPS Office"
      - id: "f"
        label: "I don't really use one"
      - id: "g"
        label: "Another suite"
  - id: q1
    prompt: "Which productivity suites have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: productivity_suites_have_used_past
    required: true
    options:
      - id: "a"
        label: "Microsoft 365 / Office"
      - id: "b"
        label: "Google Workspace"
      - id: "c"
        label: "Apple iWork"
      - id: "d"
        label: "LibreOffice / OpenOffice"
      - id: "e"
        label: "WPS Office"
      - id: "f"
        label: "Zoho Workplace"
      - id: "g"
        label: "Notion"
      - id: "h"
        label: "OnlyOffice"
      - id: "i"
        label: "None of these"
  - id: q2
    prompt: "How long have you used your main productivity suite?"
    type: single_choice
    construct: long_have_used_main_productivity
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "Which applications within your suite do you use? (Select all that apply)"
    type: multi_choice
    construct: applications_within_suite_use_select
    required: true
    options:
      - id: "a"
        label: "Word processor (documents)"
      - id: "b"
        label: "Spreadsheet"
      - id: "c"
        label: "Presentation software"
      - id: "d"
        label: "Email"
      - id: "e"
        label: "Calendar"
      - id: "f"
        label: "Cloud storage / file drive"
      - id: "g"
        label: "Note-taking (OneNote, Keep)"
      - id: "h"
        label: "Video meetings (Teams, Meet)"
      - id: "i"
        label: "Forms or surveys"
      - id: "j"
        label: "Chat / messaging"
  - id: q4
    prompt: "How many hours per week do you spend using office/productivity apps?"
    type: free_text
    construct: many_hours_per_week_spend
    required: true
  - id: q5
    prompt: "In what context do you mainly use your productivity suite?"
    type: single_choice
    construct: context_mainly_use_productivity_suite
    required: true
    options:
      - id: "a"
        label: "Work / professional"
      - id: "b"
        label: "School / education"
      - id: "c"
        label: "Personal / home use"
      - id: "d"
        label: "A mix of work and personal"
      - id: "e"
        label: "Volunteer or community organization"
  - id: q6
    prompt: "How did you come to use your main suite? (Select all that apply)"
    type: multi_choice
    construct: did_come_use_main_suite
    required: true
    options:
      - id: "a"
        label: "Required by my employer"
      - id: "b"
        label: "Required by my school"
      - id: "c"
        label: "I chose it myself"
      - id: "d"
        label: "It came with my computer or device"
      - id: "e"
        label: "Friends or family use it"
      - id: "f"
        label: "It's free"
      - id: "g"
        label: "Habit from long-term use"
  - id: q7
    prompt: "Which best describes how you access your suite most often?"
    type: single_choice
    construct: best_describes_access_suite_most
    required: true
    options:
      - id: "a"
        label: "Desktop apps installed on my computer"
      - id: "b"
        label: "In a web browser"
      - id: "c"
        label: "Mobile apps"
      - id: "d"
        label: "A mix of desktop and web"
      - id: "e"
        label: "A mix across all my devices"
  - id: q8
    prompt: "Do you pay for your productivity suite?"
    type: single_choice
    construct: pay_productivity_suite
    required: true
    options:
      - id: "a"
        label: "Yes, a personal subscription"
      - id: "b"
        label: "Yes, a one-time purchase"
      - id: "c"
        label: "My employer or school pays"
      - id: "d"
        label: "No, I use a free version"
      - id: "e"
        label: "Not sure"
  - id: q9
    prompt: "Which document format do you most often save or share files in?"
    type: single_choice
    construct: document_format_most_often_save
    required: true
    options:
      - id: "a"
        label: "Microsoft formats (.docx, .xlsx, .pptx)"
      - id: "b"
        label: "Google Docs / Sheets / Slides links"
      - id: "c"
        label: "PDF"
      - id: "d"
        label: "Open formats (.odt, .ods)"
      - id: "e"
        label: "It depends on who I'm sharing with"
  - id: q10
    prompt: "How often do you collaborate on documents with other people in real time?"
    type: single_choice
    construct: often_collaborate_documents_other_people
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q11
