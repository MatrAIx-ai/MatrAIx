    type: multi_choice
    construct: collaboration_features_use_select_all
    required: true
    options:
      - id: "a"
        label: "Real-time co-editing"
      - id: "b"
        label: "Comments and suggestions"
      - id: "c"
        label: "Version history"
      - id: "d"
        label: "Sharing links with permissions"
      - id: "e"
        label: "Track changes"
      - id: "f"
        label: "Assigning tasks or action items"
      - id: "g"
        label: "None of these"
  - id: q12
    prompt: "How often do you run into compatibility problems opening files made in a different suite?"
    type: single_choice
    construct: often_run_into_compatibility_problems
    required: true
    options:
