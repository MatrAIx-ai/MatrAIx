schemaVersion: "1.0"
id: dividend_investing_v1
title: "Dividend Investing Survey"
description: "How individuals approach investing in dividend-paying stocks and funds, and the role dividend income plays in their broader financial strategy."
questions:
  - id: q0
    prompt: "Do you currently own any investments that pay dividends (individual stocks, dividend ETFs, or dividend-focused mutual funds)?"
    type: single_choice
    construct: currently_own_any_investments_that
    required: true
    options:
      - id: "a"
        label: "Yes, I own dividend-paying individual stocks"
      - id: "b"
        label: "Yes, I own dividend-focused ETFs or mutual funds"
      - id: "c"
        label: "Yes, I own both individual stocks and funds"
      - id: "d"
        label: "No, but I plan to within the next year"
      - id: "e"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been investing in dividend-paying securities?"
    type: single_choice
    construct: long_have_been_investing_dividend
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 to 15 years"
      - id: "e"
        label: "More than 15 years"
      - id: "f"
        label: "I do not invest in dividends"
  - id: q2
    prompt: "In which types of accounts do you hold dividend-paying investments? (Select all that apply)"
    type: multi_choice
    construct: types_accounts_hold_dividend_paying
    required: true
    options:
      - id: "a"
        label: "Taxable brokerage account"
      - id: "b"
        label: "Traditional IRA"
      - id: "c"
        label: "Roth IRA"
      - id: "d"
        label: "Employer retirement plan (401(k), 403(b), etc.)"
      - id: "e"
        label: "Health Savings Account (HSA)"
      - id: "f"
        label: "I do not hold dividend investments"
  - id: q3
    prompt: "Which best describes how you handle the dividends you receive?"
    type: single_choice
    construct: best_describes_handle_dividends_receive
    required: true
    options:
      - id: "a"
        label: "I automatically reinvest all dividends (DRIP)"
      - id: "b"
        label: "I reinvest some and take some as cash"
      - id: "c"
        label: "I take all dividends as cash"
      - id: "d"
        label: "I am not sure how my dividends are handled"
