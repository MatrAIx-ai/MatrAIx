schemaVersion: "1.0"
id: notification_management_v1
title: "Notification Management Survey"
description: "How people receive, control, and feel about notifications across their phones, computers, and wearables."
questions:
  - id: q0
    prompt: "In general, how do you feel about the notifications you receive on your devices?"
    type: single_choice
    construct: general_feel_notifications_receive_devic
    required: true
    options:
      - id: "a"
        label: "I have them well under control"
      - id: "b"
        label: "They're manageable most of the time"
      - id: "c"
        label: "They're a bit overwhelming"
      - id: "d"
        label: "They're completely overwhelming"
      - id: "e"
        label: "I don't really notice them"
  - id: q1
    prompt: "About how many notifications do you estimate you receive on your phone in a typical day?"
    type: single_choice
    construct: many_notifications_estimate_receive_phon
    required: true
    options:
      - id: "a"
        label: "Fewer than 10"
      - id: "b"
        label: "10-25"
      - id: "c"
        label: "26-50"
      - id: "d"
        label: "51-100"
      - id: "e"
        label: "More than 100"
      - id: "f"
        label: "I have no idea"
  - id: q2
    prompt: "Which types of apps do you allow to send you notifications? (Select all that apply)"
    type: multi_choice
    construct: types_apps_allow_send_notifications
    required: true
    options:
      - id: "a"
        label: "Messaging / chat apps"
      - id: "b"
        label: "Email"
      - id: "c"
        label: "Social media"
      - id: "d"
        label: "News apps"
      - id: "e"
        label: "Calendar and reminders"
      - id: "f"
        label: "Banking or payment apps"
      - id: "g"
        label: "Shopping / delivery apps"
      - id: "h"
        label: "Games"
      - id: "i"
        label: "Health / fitness apps"
      - id: "j"
        label: "Work / productivity apps"
      - id: "k"
        label: "I keep notifications off for almost everything"
  - id: q3
    prompt: "How proactively do you manage which apps can send you notifications?"
    type: single_choice
    construct: proactively_manage_apps_can_send
    required: true
    options:
      - id: "a"
        label: "Very proactively — I curate them carefully"
      - id: "b"
        label: "Somewhat — I turn off the worst offenders"
      - id: "c"
        label: "Rarely — I mostly leave defaults"
      - id: "d"
        label: "Never — I accept whatever an app asks for"
  - id: q4
    prompt: "When a new app asks permission to send notifications, what do you usually do?"
    type: single_choice
    construct: when_new_app_asks_permission
    required: true
    options:
      - id: "a"
        label: "Almost always deny"
      - id: "b"
        label: "Deny unless I think I'll need them"
      - id: "c"
        label: "Allow unless I expect it to be spammy"
      - id: "d"
        label: "Almost always allow"
      - id: "e"
        label: "I don't pay attention to the prompt"
  - id: q5
    prompt: "Which notification features do you use? (Select all that apply)"
    type: multi_choice
    construct: notification_features_use_select_all
    required: true
    options:
      - id: "a"
        label: "Do Not Disturb mode"
      - id: "b"
        label: "Focus modes / profiles"
      - id: "c"
        label: "Scheduled quiet hours"
      - id: "d"
        label: "Silencing specific apps"
      - id: "e"
        label: "Grouping / summarizing notifications"
      - id: "f"
        label: "Priority or VIP contacts only"
      - id: "g"
        label: "Notification history / log"
      - id: "h"
        label: "Turning off notification badges"
      - id: "i"
        label: "None of these"
  - id: q6
    prompt: "How do you prefer notifications to appear on your phone? (Select all that apply)"
    type: multi_choice
    construct: prefer_notifications_appear_phone_select
    required: true
    options:
      - id: "a"
        label: "Banner / pop-up on screen"
      - id: "b"
        label: "Sound"
      - id: "c"
        label: "Vibration"
      - id: "d"
        label: "Badge count on the app icon"
      - id: "e"
        label: "Lock screen only"
      - id: "f"
        label: "Silent / in notification center only"
      - id: "g"
        label: "LED or ambient light"
  - id: q7
    prompt: "Do you use Do Not Disturb or a Focus mode on a regular schedule?"
    type: single_choice
    construct: use_not_disturb_focus_mode
    required: true
    options:
