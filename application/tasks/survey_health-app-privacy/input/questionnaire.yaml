schemaVersion: "1.0"
id: health_app_privacy_v1
title: "Health App Privacy Survey"
description: "Consumer attitudes and behaviors around privacy in health and wellness apps."
questions:
  - id: q0
    prompt: "Do you use any health or wellness apps on your phone or other devices?"
    type: single_choice
    construct: use_any_health_wellness_apps
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I'm considering it"
      - id: "e"
        label: "No, and I don't plan to"
  - id: q1
    prompt: "Which types of health or wellness apps do you use? (Select all that apply)"
    type: multi_choice
    construct: types_health_wellness_apps_use
    required: true
    options:
      - id: "a"
        label: "Fitness or activity tracking"
      - id: "b"
        label: "Nutrition or calorie tracking"
      - id: "c"
        label: "Sleep tracking"
      - id: "d"
        label: "Meditation or mental wellness"
      - id: "e"
        label: "Period or fertility tracking"
      - id: "f"
        label: "A patient portal from a provider"
      - id: "g"
        label: "Medication reminders"
      - id: "h"
        label: "None of these"
  - id: q2
    prompt: "About how many health or wellness apps do you currently have installed? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_health_wellness_apps_currently
    required: true
  - id: q3
    prompt: "Which types of personal information do your health apps collect from you? (Select all that apply)"
    type: multi_choice
    construct: types_personal_information_health_apps
    required: true
    options:
      - id: "a"
        label: "Name and email"
      - id: "b"
        label: "Age, height, or weight"
      - id: "c"
        label: "Activity and location data"
      - id: "d"
        label: "Heart rate or other health metrics"
      - id: "e"
        label: "Diet or eating information"
      - id: "f"
        label: "Sleep data"
      - id: "g"
        label: "I'm not sure what they collect"
  - id: q4
    prompt: "How often do you read the privacy policy before using a health app?"
    type: single_choice
    construct: often_read_privacy_policy_before
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q5
    prompt: "How closely do you review the permissions a health app requests (location, contacts, etc.)?"
    type: single_choice
    construct: closely_review_permissions_health_app
    required: true
    options:
      - id: "a"
        label: "Very closely"
      - id: "b"
        label: "Somewhat closely"
      - id: "c"
        label: "A little"
      - id: "d"
        label: "Not at all"
  - id: q6
    prompt: "Which privacy steps have you taken with health apps? (Select all that apply)"
    type: multi_choice
    construct: privacy_steps_have_taken_health
    required: true
    options:
      - id: "a"
        label: "Turned off location tracking"
      - id: "b"
        label: "Limited data-sharing settings"
      - id: "c"
        label: "Declined certain permissions"
      - id: "d"
        label: "Deleted an app over privacy concerns"
      - id: "e"
        label: "Used a fake or alternate email"
      - id: "f"
        label: "Read reviews about privacy"
      - id: "g"
        label: "None of these"
  - id: q7
    prompt: "How concerned are you about how health apps use your personal data?"
    type: single_choice
    construct: concerned_health_apps_use_personal
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q8
    prompt: "Who do you think can access the data from your health apps? (Select all that apply)"
    type: multi_choice
    construct: who_think_can_access_data
    required: true
    options:
      - id: "a"
        label: "The app company itself"
      - id: "b"
        label: "Advertisers"
      - id: "c"
        label: "Other companies the data is sold to"
      - id: "d"
        label: "My health care provider"
      - id: "e"
        label: "My insurance company"
      - id: "f"
        label: "Almost anyone"
      - id: "g"
        label: "I'm not sure"
  - id: q9
    prompt: "How much do you agree with the following statement: I understand what happens to my data in health apps."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
