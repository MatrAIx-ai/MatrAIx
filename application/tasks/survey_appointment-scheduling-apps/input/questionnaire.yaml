schemaVersion: "1.0"
id: appointment_scheduling_apps_v1
title: "Appointment Scheduling Apps Survey"
description: "Consumer use of, experience with, and attitudes toward booking healthcare appointments online through apps and websites."
questions:
  - id: q0
    prompt: "How do you usually book a healthcare appointment?"
    type: single_choice
    construct: usually_book_healthcare_appointment
    required: true
    options:
      - id: "a"
        label: "Online through an app or website"
      - id: "b"
        label: "By phone call"
      - id: "c"
        label: "In person"
      - id: "d"
        label: "A mix of methods"
      - id: "e"
        label: "Someone else books for me"
  - id: q1
    prompt: "In the past 12 months, have you booked a healthcare appointment online?"
    type: single_choice
    construct: past_12_months_have_booked
    required: true
    options:
      - id: "a"
        label: "Yes, many times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, I have never booked online"
  - id: q2
    prompt: "How long have you been booking healthcare appointments online?"
    type: single_choice
    construct: long_have_been_booking_healthcare
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I do not book online"
  - id: q3
    prompt: "Which tools have you used to book healthcare appointments online? (Select all that apply)"
    type: multi_choice
    construct: tools_have_used_book_healthcare
    required: true
    options:
      - id: "a"
        label: "My provider's patient portal (for example, MyChart)"
      - id: "b"
        label: "A hospital or health-system app"
      - id: "c"
        label: "Zocdoc"
      - id: "d"
        label: "A pharmacy app (for example, for vaccines)"
      - id: "e"
        label: "An urgent care or clinic app"
      - id: "f"
        label: "A general booking website"
      - id: "g"
        label: "I have not used any of these"
  - id: q4
    prompt: "Which types of appointments have you booked online? (Select all that apply)"
    type: multi_choice
    construct: types_appointments_have_booked_online
    required: true
    options:
      - id: "a"
        label: "Primary care visits"
      - id: "b"
        label: "Specialist visits"
      - id: "c"
        label: "Lab tests or bloodwork"
      - id: "d"
        label: "Imaging (for example, X-ray, MRI)"
      - id: "e"
        label: "Dental or vision appointments"
      - id: "f"
        label: "Vaccinations or flu shots"
      - id: "g"
        label: "Telehealth visits"
      - id: "h"
        label: "I have not booked any online"
  - id: q5
    prompt: "What device do you usually use to book appointments online?"
    type: single_choice
    construct: device_usually_use_book_appointments
    required: true
    options:
      - id: "a"
        label: "Smartphone app"
      - id: "b"
        label: "Smartphone web browser"
      - id: "c"
        label: "Laptop or desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "It varies"
  - id: q6
    prompt: "About how often do you book or manage appointments online?"
    type: single_choice
    construct: often_book_manage_appointments_online
    required: true
    options:
      - id: "a"
        label: "Weekly"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "Every few months"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Which appointment features do you use online? (Select all that apply)"
    type: multi_choice
    construct: appointment_features_use_online_select
    required: true
    options:
      - id: "a"
        label: "Booking a new appointment"
      - id: "b"
        label: "Rescheduling or canceling"
      - id: "c"
        label: "Appointment reminders"
      - id: "d"
        label: "Adding appointments to my calendar"
      - id: "e"
        label: "Filling out forms before a visit"
      - id: "f"
        label: "Joining a waitlist for earlier slots"
      - id: "g"
        label: "Booking for a family member"
      - id: "h"
        label: "I do not use these features"
  - id: q8
    prompt: "How do you prefer to receive appointment reminders?"
    type: single_choice
    construct: prefer_receive_appointment_reminders
    required: true
    options:
      - id: "a"
        label: "Text message"
      - id: "b"
        label: "Email"
      - id: "c"
        label: "App notification"
      - id: "d"
        label: "Phone call"
      - id: "e"
        label: "I do not want reminders"
  - id: q9
    prompt: "When booking online, how easy is it to find an available time that works for you?"
    type: single_choice
    construct: when_booking_online_easy_it
    required: true
    options:
      - id: "a"
        label: "Very easy"
      - id: "b"
        label: "Somewhat easy"
      - id: "c"
        label: "Neither easy nor difficult"
      - id: "d"
        label: "Somewhat difficult"
      - id: "e"
        label: "Very difficult"
  - id: q10
    prompt: "How much do you agree with the following statement: Booking appointments online saves me time."
    type: single_choice
    construct: much_agree_following_statement_booking
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: The scheduling app is easy to use."
