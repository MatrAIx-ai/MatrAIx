schemaVersion: "1.0"
id: mobile_app_subscriptions_v1
title: "Mobile App Subscriptions Survey"
description: "How people sign up for, manage, pay for, and cancel app and digital subscriptions."
questions:
  - id: q0
    prompt: "Do you currently pay for any app or digital subscriptions?"
    type: single_choice
    construct: currently_pay_any_app_digital
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, a few"
      - id: "c"
        label: "Yes, just one"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, and I never have"
  - id: q1
    prompt: "Roughly how many paid subscriptions do you have right now? Enter a whole number."
    type: free_text
    construct: roughly_many_paid_subscriptions_have
    required: true
  - id: q2
    prompt: "Which types of subscriptions do you currently pay for? (Select all that apply)"
    type: multi_choice
    construct: types_subscriptions_currently_pay_select
    required: true
    options:
      - id: "a"
        label: "Video streaming (Netflix, Disney+, etc.)"
      - id: "b"
        label: "Music streaming (Spotify, Apple Music, etc.)"
      - id: "c"
        label: "Cloud storage (iCloud, Google One, etc.)"
      - id: "d"
        label: "News or magazines"
      - id: "e"
        label: "Fitness or wellness apps"
      - id: "f"
        label: "Productivity apps"
      - id: "g"
        label: "Gaming subscriptions (Xbox Game Pass, Apple Arcade, etc.)"
      - id: "h"
        label: "Dating apps"
      - id: "i"
        label: "Language learning or education apps"
      - id: "j"
        label: "Photo or video editing apps"
      - id: "k"
        label: "AI assistant or chatbot subscriptions"
      - id: "l"
        label: "I don't have any subscriptions"
  - id: q3
    prompt: "Approximately how much do you spend per month on all app and digital subscriptions combined, in U.S. dollars? Enter a whole number."
    type: free_text
    construct: approximately_much_spend_per_month
    required: true
  - id: q4
    prompt: "How do you usually start a subscription? (Select all that apply)"
    type: multi_choice
    construct: usually_start_subscription_select_all
    required: true
    options:
      - id: "a"
        label: "Through a free trial that converted"
      - id: "b"
        label: "Directly signing up for a paid plan"
      - id: "c"
        label: "A bundle or family plan"
      - id: "d"
        label: "A discounted or promotional offer"
      - id: "e"
        label: "Through my phone's app store"
      - id: "f"
        label: "Through the company's website"
      - id: "g"
        label: "I don't subscribe to anything"
  - id: q5
    prompt: "How do you prefer to pay for subscriptions?"
    type: single_choice
    construct: prefer_pay_subscriptions
    required: true
    options:
      - id: "a"
        label: "Through the app store (Apple / Google billing)"
      - id: "b"
        label: "Directly with a credit or debit card"
      - id: "c"
        label: "Through PayPal or a digital wallet"
      - id: "d"
        label: "Bundled with my phone or internet bill"
      - id: "e"
        label: "It varies"
      - id: "f"
        label: "Not applicable"
  - id: q6
    prompt: "How often do you sign up for a free trial with the intention of canceling before it charges you?"
    type: single_choice
    construct: often_sign_up_free_trial
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q7
    prompt: "How often do you forget to cancel a free trial and get charged?"
    type: single_choice
    construct: often_forget_cancel_free_trial
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q8
    prompt: "How do you keep track of your subscriptions? (Select all that apply)"
    type: multi_choice
    construct: keep_track_subscriptions_select_all
    required: true
    options:
      - id: "a"
        label: "My phone's subscription settings"
      - id: "b"
        label: "A dedicated subscription-tracking app"
      - id: "c"
        label: "Checking my bank or card statements"
      - id: "d"
        label: "A spreadsheet or notes"
      - id: "e"
        label: "My memory"
      - id: "f"
        label: "I don't really track them"
      - id: "g"
        label: "Not applicable"
  - id: q9
    prompt: "In the past year, how often have you canceled a subscription?"
    type: single_choice
    construct: past_year_often_have_canceled
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 5 times"
      - id: "e"
        label: "More than 5 times"
  - id: q10
    prompt: "What most often makes you cancel a subscription? (Select all that apply)"
    type: multi_choice
    construct: most_often_makes_cancel_subscription
    required: true
    options:
      - id: "a"
        label: "I stopped using it enough"
      - id: "b"
        label: "It got too expensive or raised prices"
      - id: "c"
        label: "I found a cheaper alternative"
      - id: "d"
        label: "I was trying to cut spending"
      - id: "e"
        label: "Poor content or quality"
      - id: "f"
        label: "Too many ads even though I pay"
      - id: "g"
        label: "I only needed it temporarily"
      - id: "h"
        label: "I've never canceled one"
  - id: q11
    prompt: "Please rate your agreement: I have subscriptions I pay for but rarely use."
    type: single_choice
    construct: please_rate_agreement_i_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "Please rate your agreement: Subscription costs add up more than I'd like."
    type: single_choice
    construct: please_rate_agreement_subscription_costs
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "Please rate your agreement: I get good value from the subscriptions I keep."
    type: single_choice
    construct: please_rate_agreement_i_get
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "Please rate your agreement: Companies make it too hard to cancel subscriptions."
    type: single_choice
    construct: please_rate_agreement_companies_make
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "Please rate your agreement: I'd rather buy something once than pay a recurring fee."
    type: single_choice
    construct: please_rate_agreement_i_d
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "Please rate your agreement: I regularly review my subscriptions to cut unused ones."
    type: single_choice
    construct: please_rate_agreement_i_regularly
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How important is this when deciding to keep a subscription: How often I actually use it"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is this when deciding to keep a subscription: The monthly price"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "How important is this when deciding to keep a subscription: Quality of the content or features"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "How important is this when deciding to keep a subscription: Whether a free alternative exists"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q21
    prompt: "How important is this when deciding to keep a subscription: Whether I share it with family"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q22
    prompt: "How important is this when deciding to keep a subscription: Ability to pause or cancel easily"
    type: single_choice
    construct: important_this_when_deciding_keep
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q23
    prompt: "Do you share any subscriptions with family or friends to split the cost?"
    type: single_choice
    construct: share_any_subscriptions_family_friends
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
