        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I'm not sure"
  - id: q25
    prompt: "How do you feel about the number of subscriptions you have?"
    type: single_choice
    construct: feel_number_subscriptions_have
    required: true
    options:
      - id: "a"
        label: "I have too many and want to cut back"
      - id: "b"
        label: "I have a few too many"
      - id: "c"
        label: "It's about right"
      - id: "d"
        label: "I could add more"
      - id: "e"
        label: "I don't have any"
  - id: q26
    prompt: "How often do you take advantage of annual plans to save money versus paying monthly?"
    type: single_choice
    construct: often_take_advantage_annual_plans
    required: true
