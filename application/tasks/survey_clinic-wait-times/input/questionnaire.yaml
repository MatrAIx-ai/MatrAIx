schemaVersion: "1.0"
id: clinic_wait_times_v1
title: "Clinic Wait Times Survey"
description: "Consumer experience with, and attitudes toward, waiting for care at clinics and doctors' offices."
questions:
  - id: q0
    prompt: "In the past 12 months, about how many times did you visit a clinic or doctor's office?"
    type: single_choice
    construct: past_12_months_many_times
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 time"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 6 times"
      - id: "e"
        label: "7 to 10 times"
      - id: "f"
        label: "More than 10 times"
  - id: q1
    prompt: "What type of clinic do you visit most often?"
    type: single_choice
    construct: type_clinic_visit_most_often
    required: true
    options:
      - id: "a"
        label: "Primary care office"
      - id: "b"
        label: "Specialist office"
      - id: "c"
        label: "Urgent care or walk-in clinic"
      - id: "d"
        label: "Community health center"
      - id: "e"
        label: "Retail or pharmacy clinic"
      - id: "f"
        label: "I do not visit clinics regularly"
  - id: q2
    prompt: "At your most recent visit, how long did you wait past your appointment time before being seen?"
    type: single_choice
    construct: most_recent_visit_long_did
    required: true
    options:
      - id: "a"
        label: "I was seen on time or early"
      - id: "b"
        label: "Less than 15 minutes"
      - id: "c"
        label: "15 to 29 minutes"
      - id: "d"
        label: "30 to 44 minutes"
      - id: "e"
        label: "45 to 59 minutes"
      - id: "f"
        label: "An hour or more"
  - id: q3
    prompt: "How long do you typically wait in the waiting room before being called back?"
    type: single_choice
    construct: long_typically_wait_waiting_room
    required: true
    options:
      - id: "a"
        label: "Less than 5 minutes"
      - id: "b"
        label: "5 to 14 minutes"
      - id: "c"
        label: "15 to 29 minutes"
      - id: "d"
        label: "30 to 44 minutes"
      - id: "e"
        label: "45 minutes or more"
  - id: q4
    prompt: "After being called back, how long do you usually wait in the exam room before the provider comes in?"
    type: single_choice
    construct: after_being_called_back_long
    required: true
    options:
      - id: "a"
        label: "Less than 5 minutes"
      - id: "b"
        label: "5 to 14 minutes"
      - id: "c"
        label: "15 to 29 minutes"
      - id: "d"
        label: "30 minutes or more"
      - id: "e"
        label: "Not sure"
  - id: q5
    prompt: "How does the wait time at clinics usually compare with what you expect?"
    type: single_choice
    construct: does_wait_time_clinics_usually
    required: true
    options:
      - id: "a"
        label: "Much shorter than expected"
      - id: "b"
        label: "Somewhat shorter"
      - id: "c"
        label: "About what I expected"
      - id: "d"
        label: "Somewhat longer"
      - id: "e"
        label: "Much longer than expected"
  - id: q6
    prompt: "How would you rate the typical wait time at the clinic you visit most?"
    type: single_choice
    construct: would_rate_typical_wait_time
    required: true
    options:
      - id: "a"
        label: "Very short"
      - id: "b"
        label: "Short"
      - id: "c"
        label: "Average"
      - id: "d"
        label: "Long"
      - id: "e"
        label: "Very long"
  - id: q7
    prompt: "What is the longest you have waited past your appointment time at a clinic?"
    type: single_choice
    construct: longest_have_waited_past_appointment
    required: true
    options:
      - id: "a"
        label: "Less than 30 minutes"
      - id: "b"
        label: "30 to 59 minutes"
      - id: "c"
        label: "1 to 2 hours"
      - id: "d"
        label: "More than 2 hours"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "How much does wait time affect your overall satisfaction with a clinic?"
    type: single_choice
    construct: much_does_wait_time_affect
    required: true
    options:
      - id: "a"
        label: "A great deal"
      - id: "b"
        label: "A lot"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A little"
      - id: "e"
        label: "Not at all"
  - id: q9
    prompt: "What do you usually do while waiting at a clinic? (Select all that apply)"
    type: multi_choice
    construct: usually_while_waiting_clinic_select
    required: true
    options:
      - id: "a"
        label: "Use my phone"
      - id: "b"
        label: "Read a book or magazine"
      - id: "c"
        label: "Fill out paperwork"
      - id: "d"
        label: "Talk with others"
      - id: "e"
        label: "Just sit and wait"
      - id: "f"
        label: "Work or answer emails"
      - id: "g"
        label: "Watch TV in the waiting area"
  - id: q10
    prompt: "How much do you agree with the following statement: Long wait times make me less likely to return to a clinic."
    type: single_choice
    construct: much_agree_following_statement_long
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: Clinics should tell me if they are running behind."
    type: single_choice
    construct: much_agree_following_statement_clinics
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: I would choose a clinic with shorter waits even if it were less convenient."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: A comfortable waiting area makes waiting more bearable."
    type: single_choice
    construct: much_agree_following_statement_comfortab
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I expect some waiting as a normal part of a clinic visit."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How often does each of the following happen at the clinic you visit most: You wait longer than 30 minutes past your appointment time."
    type: single_choice
    construct: often_does_each_following_happen
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q16
    prompt: "How often does each of the following happen at the clinic you visit most: Staff tell you how long the wait will be."
    type: single_choice
    construct: often_does_each_following_happen
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q17
    prompt: "How often does each of the following happen at the clinic you visit most: You are updated if the provider is running late."
    type: single_choice
    construct: often_does_each_following_happen
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q18
    prompt: "How often does each of the following happen at the clinic you visit most: The wait makes you late for other things."
    type: single_choice
    construct: often_does_each_following_happen
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q19
    prompt: "Which of these would most reduce your frustration with waiting? (Select all that apply)"
