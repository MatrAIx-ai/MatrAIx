schemaVersion: "1.0"
id: e_reader_usage_v1
title: "E-Reader Usage Survey"
description: "Digital reading habits and e-reader ownership — devices and brands used, where e-books come from, features valued, and attitudes toward digital versus print reading."
questions:
  - id: q0
    prompt: "Do you read e-books (digital books)?"
    type: single_choice
    construct: read_e_books_digital_books
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, I only read print books"
      - id: "e"
        label: "No, I don't read books much"
  - id: q1
    prompt: "Do you own a dedicated e-reader device (e.g., Kindle, Kobo, Nook)?"
    type: single_choice
    construct: own_dedicated_e_reader_device
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I read e-books on other devices"
      - id: "c"
        label: "No, and I don't read e-books"
      - id: "d"
        label: "I used to own one but stopped using it"
  - id: q2
    prompt: "How long have you been reading e-books?"
    type: single_choice
    construct: long_have_been_reading_e
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't read e-books"
  - id: q3
    prompt: "Which devices do you use to read e-books? (Select all that apply)"
    type: multi_choice
    construct: devices_use_read_e_books
    required: true
    options:
      - id: "a"
        label: "Dedicated e-reader (Kindle, Kobo, etc.)"
      - id: "b"
        label: "Smartphone"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Laptop or desktop computer"
      - id: "e"
        label: "E-reader with color screen"
      - id: "f"
        label: "I don't read e-books"
  - id: q4
    prompt: "Which e-reader brand do you own or use?"
    type: single_choice
    construct: e_reader_brand_own_use
    required: true
    options:
      - id: "a"
        label: "Amazon Kindle"
      - id: "b"
        label: "Rakuten Kobo"
      - id: "c"
        label: "Barnes & Noble Nook"
      - id: "d"
        label: "Boox / Onyx"
      - id: "e"
        label: "PocketBook"
      - id: "f"
        label: "I don't own a dedicated e-reader"
      - id: "g"
        label: "Other"
  - id: q5
    prompt: "Where do you get your e-books? (Select all that apply)"
    type: multi_choice
    construct: where_get_e_books_select
    required: true
    options:
      - id: "a"
        label: "Amazon Kindle Store"
      - id: "b"
        label: "Kobo store"
      - id: "c"
        label: "Apple Books"
      - id: "d"
        label: "Google Play Books"
      - id: "e"
        label: "Public library (e.g., Libby / OverDrive)"
      - id: "f"
        label: "Subscription service (e.g., Kindle Unlimited)"
      - id: "g"
        label: "Free / public domain sources (Project Gutenberg)"
      - id: "h"
        label: "Barnes & Noble"
      - id: "i"
        label: "Other"
  - id: q6
    prompt: "What formats of books do you read? (Select all that apply)"
    type: multi_choice
    construct: formats_books_read_select_all
    required: true
    options:
      - id: "a"
        label: "E-books"
      - id: "b"
        label: "Print / physical books"
      - id: "c"
        label: "Audiobooks"
      - id: "d"
        label: "Magazines or newspapers (digital)"
      - id: "e"
        label: "Comics / graphic novels"
      - id: "f"
        label: "PDFs and documents"
  - id: q7
    prompt: "Roughly how many books do you read in a typical year? Enter a whole number."
    type: free_text
    construct: roughly_many_books_read_typical
    required: true
  - id: q8
    prompt: "What share of your reading is now digital (e-books) versus print?"
    type: single_choice
    construct: share_reading_now_digital_e
    required: true
    options:
      - id: "a"
        label: "Almost all print"
      - id: "b"
        label: "Mostly print"
      - id: "c"
        label: "About half and half"
      - id: "d"
        label: "Mostly digital"
      - id: "e"
        label: "Almost all digital"
  - id: q9
    prompt: "How often do you read on an e-reader or e-book app?"
    type: single_choice
    construct: often_read_e_reader_e
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q10
    prompt: "What genres do you mostly read? (Select all that apply)"
    type: multi_choice
    construct: genres_mostly_read_select_all
    required: true
    options:
      - id: "a"
        label: "Fiction / literary"
      - id: "b"
        label: "Mystery / thriller"
      - id: "c"
        label: "Science fiction / fantasy"
      - id: "d"
        label: "Romance"
      - id: "e"
        label: "Nonfiction / biography"
      - id: "f"
        label: "Self-help / business"
      - id: "g"
        label: "History"
      - id: "h"
        label: "Young adult"
      - id: "i"
        label: "Technical / professional"
      - id: "j"
        label: "Other"
  - id: q11
    prompt: "Do you subscribe to any e-book or audiobook services? (Select all that apply)"
    type: multi_choice
    construct: subscribe_any_e_book_audiobook
    required: true
    options:
      - id: "a"
        label: "Kindle Unlimited"
      - id: "b"
        label: "Audible"
      - id: "c"
        label: "Kobo Plus"
      - id: "d"
        label: "Scribd / Everand"
      - id: "e"
        label: "A library service (Libby, Hoopla)"
      - id: "f"
        label: "None of these"
  - id: q12
    prompt: "Roughly how much do you spend on e-books or reading subscriptions per month? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: roughly_much_spend_e_books
    required: true
  - id: q13
    prompt: "When choosing an e-reader, how important is screen quality (e-ink, glare-free)?"
    type: single_choice
    construct: when_choosing_e_reader_important
    required: true
    options:
