schemaVersion: "1.0"
id: adult_vaccination_attitudes_v1
title: "Adult Vaccination Attitudes Survey"
description: "Adults' attitudes toward and habits around routine vaccinations, including the annual flu shot and other recommended adult immunizations."
questions:
  - id: q0
    prompt: "In general, how would you describe your overall attitude toward routine adult vaccinations?"
    type: single_choice
    construct: general_would_describe_overall_attitude
    required: true
    options:
      - id: "a"
        label: "Strongly in favor"
      - id: "b"
        label: "Somewhat in favor"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat hesitant"
      - id: "e"
        label: "Strongly hesitant"
  - id: q1
    prompt: "Did you get a flu shot in the past year?"
    type: single_choice
    construct: did_get_flu_shot_past
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I'm not sure"
  - id: q2
    prompt: "How often do you get an annual flu shot?"
    type: single_choice
    construct: often_get_annual_flu_shot
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Most years"
      - id: "c"
        label: "Some years"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q3
    prompt: "Which of the following routine adult vaccinations have you received as an adult? (Select all that apply)"
    type: multi_choice
    construct: following_routine_adult_vaccinations_hav
    required: true
    options:
      - id: "a"
        label: "Seasonal flu"
      - id: "b"
        label: "Tetanus/Tdap booster"
      - id: "c"
        label: "Shingles"
      - id: "d"
        label: "Pneumococcal (pneumonia)"
      - id: "e"
        label: "Hepatitis"
      - id: "f"
        label: "Travel-related vaccines"
      - id: "g"
        label: "None of these"
  - id: q4
    prompt: "Where do you most often get vaccinated?"
    type: single_choice
    construct: where_most_often_get_vaccinated
    required: true
    options:
      - id: "a"
        label: "My doctor's office"
      - id: "b"
        label: "A pharmacy (for example, CVS or Walgreens)"
      - id: "c"
        label: "A workplace clinic or event"
      - id: "d"
        label: "A grocery store clinic"
      - id: "e"
        label: "A community or public health clinic"
      - id: "f"
        label: "I do not get vaccinated"
  - id: q5
    prompt: "How do you usually decide whether to get a recommended vaccine?"
    type: single_choice
    construct: usually_decide_whether_get_recommended
    required: true
    options:
      - id: "a"
        label: "My doctor's recommendation"
      - id: "b"
        label: "Public health guidance"
      - id: "c"
        label: "My own research"
      - id: "d"
        label: "Advice from family or friends"
      - id: "e"
        label: "My employer's policy"
      - id: "f"
        label: "I generally do not get recommended vaccines"
  - id: q6
    prompt: "Which sources do you trust for information about adult vaccines? (Select all that apply)"
    type: multi_choice
    construct: sources_trust_information_adult_vaccines
    required: true
    options:
      - id: "a"
        label: "My doctor or nurse"
      - id: "b"
        label: "Pharmacists"
      - id: "c"
        label: "Government health agencies (for example, CDC)"
      - id: "d"
        label: "Health websites like Mayo Clinic"
      - id: "e"
        label: "Family or friends"
      - id: "f"
        label: "Social media or online videos"
      - id: "g"
        label: "I do not trust any of these very much"
  - id: q7
    prompt: "In a typical year, about how many vaccinations or boosters do you get? Please enter a number."
    type: free_text
    construct: typical_year_many_vaccinations_boosters
    required: true
  - id: q8
    prompt: "How much do you agree or disagree: Routine vaccines are an important part of staying healthy."
    type: single_choice
    construct: much_agree_disagree_routine_vaccines
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree or disagree: Getting vaccinated helps protect the people around me."
    type: single_choice
    construct: much_agree_disagree_getting_vaccinated
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
