schemaVersion: "1.0"
id: interest_rate_awareness_v1
title: "Interest Rate Awareness Survey"
description: "How aware people are of interest rates on their savings and loans and how rate changes shape their financial decisions."
questions:
  - id: q0
    prompt: "How closely do you follow news about interest rates set by the Federal Reserve?"
    type: single_choice
    construct: closely_follow_news_interest_rates
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "Closely"
      - id: "e"
        label: "Very closely"
  - id: q1
    prompt: "Do you know roughly what direction the Federal Reserve has moved interest rates over the past year?"
    type: single_choice
    construct: know_roughly_direction_federal_reserve
    required: true
    options:
      - id: "a"
        label: "Yes, they raised rates"
      - id: "b"
        label: "Yes, they lowered rates"
      - id: "c"
        label: "Yes, they held rates steady"
      - id: "d"
        label: "I'm not sure"
  - id: q2
    prompt: "How would you rate your overall understanding of how interest rates work?"
    type: single_choice
    construct: would_rate_overall_understanding_interes
    required: true
    options:
      - id: "a"
        label: "Very poor"
      - id: "b"
        label: "Poor"
      - id: "c"
        label: "Fair"
      - id: "d"
        label: "Good"
      - id: "e"
        label: "Very good"
  - id: q3
    prompt: "Do you know the approximate interest rate (APY) on your main savings account?"
    type: single_choice
    construct: know_approximate_interest_rate_apy
    required: true
    options:
      - id: "a"
        label: "Yes, I know it precisely"
      - id: "b"
        label: "I know it roughly"
      - id: "c"
        label: "No, I have no idea"
      - id: "d"
        label: "I don't have a savings account"
  - id: q4
    prompt: "Do you know the approximate interest rate (APR) on your primary credit card?"
    type: single_choice
    construct: know_approximate_interest_rate_apr
    required: true
    options:
      - id: "a"
        label: "Yes, I know it precisely"
      - id: "b"
        label: "I know it roughly"
      - id: "c"
        label: "No, I have no idea"
      - id: "d"
        label: "I don't have a credit card"
  - id: q5
    prompt: "What is the approximate APY on your main savings account? Please enter a percentage (enter 0 if you don't know or don't have one)."
    type: free_text
    construct: approximate_apy_main_savings_account
    required: true
  - id: q6
    prompt: "Which of the following do you currently have that are affected by interest rates? (Select all that apply)"
    type: multi_choice
    construct: following_currently_have_that_affected
    required: true
    options:
      - id: "a"
        label: "A savings account"
      - id: "b"
        label: "A checking account that pays interest"
      - id: "c"
        label: "A certificate of deposit (CD)"
      - id: "d"
        label: "A credit card balance"
      - id: "e"
        label: "A mortgage"
      - id: "f"
        label: "An auto loan"
      - id: "g"
        label: "A student loan"
      - id: "h"
        label: "A personal loan"
      - id: "i"
        label: "A home equity loan or HELOC"
      - id: "j"
        label: "None of these"
  - id: q7
    prompt: "When you last opened a savings account, how much did the interest rate influence your choice?"
    type: single_choice
    construct: when_last_opened_savings_account
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Slightly"
      - id: "c"
        label: "Moderately"
      - id: "d"
        label: "Quite a bit"
      - id: "e"
        label: "It was the main factor"
  - id: q8
    prompt: "In the past year, have you moved money to get a better interest rate?"
    type: single_choice
    construct: past_year_have_moved_money
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I considered it"
      - id: "d"
        label: "No, and I didn't consider it"
  - id: q9
    prompt: "Where do you usually get information about interest rates? (Select all that apply)"
    type: multi_choice
    construct: where_usually_get_information_interest
    required: true
    options:
      - id: "a"
        label: "News websites or TV"
      - id: "b"
        label: "My bank's website or app"
      - id: "c"
        label: "Comparison sites (e.g., NerdWallet, Bankrate)"
      - id: "d"
        label: "Social media"
      - id: "e"
        label: "Friends or family"
      - id: "f"
        label: "A financial advisor"
      - id: "g"
        label: "I don't actively seek this information"
  - id: q10
    prompt: "How confident are you in your ability to compare interest rates across banks or lenders?"
    type: single_choice
    construct: confident_ability_compare_interest_rates
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q11
    prompt: "When rates on savings accounts rise, how quickly do you typically act to take advantage?"
    type: single_choice
    construct: when_rates_savings_accounts_rise
    required: true
    options:
      - id: "a"
        label: "Right away"
      - id: "b"
        label: "Within a few weeks"
      - id: "c"
        label: "Within a few months"
      - id: "d"
        label: "I rarely act"
      - id: "e"
        label: "I never act"
  - id: q12
    prompt: "How much do you agree or disagree: I understand the difference between APR and APY."
    type: single_choice
    construct: much_agree_disagree_i_understand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: Rising interest rates make me more likely to save money."
    type: single_choice
    construct: much_agree_disagree_rising_interest
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
