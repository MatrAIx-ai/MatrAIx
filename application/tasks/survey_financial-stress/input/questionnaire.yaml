schemaVersion: "1.0"
id: financial_stress_v1
title: "Financial Stress Survey"
description: "How money worries affect people's lives and how they cope with financial stress."
questions:
  - id: q0
    prompt: "Overall, how would you describe your current level of financial stress?"
    type: single_choice
    construct: overall_would_describe_current_level
    required: true
    options:
      - id: "a"
        label: "No stress at all"
      - id: "b"
        label: "A little stress"
      - id: "c"
        label: "A moderate amount of stress"
      - id: "d"
        label: "A lot of stress"
      - id: "e"
        label: "Overwhelming stress"
  - id: q1
    prompt: "Compared to a year ago, is your financial stress..."
    type: single_choice
    construct: compared_year_ago_financial_stress
    required: true
    options:
      - id: "a"
        label: "Much lower"
      - id: "b"
        label: "Somewhat lower"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "Somewhat higher"
      - id: "e"
        label: "Much higher"
  - id: q2
    prompt: "How often do you worry about your finances?"
    type: single_choice
    construct: often_worry_finances
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost constantly"
  - id: q3
    prompt: "If you had an unexpected $400 expense, how would you cover it?"
    type: single_choice
    construct: if_had_unexpected_400_expense
    required: true
    options:
      - id: "a"
        label: "Pay from cash or checking with no problem"
      - id: "b"
        label: "Put it on a credit card and pay it off next statement"
      - id: "c"
        label: "Put it on a credit card and pay it over time"
      - id: "d"
        label: "Borrow from family or friends"
      - id: "e"
        label: "Sell something or take out a loan"
      - id: "f"
        label: "I couldn't cover it right now"
  - id: q4
    prompt: "Which of the following are currently sources of financial stress for you? (Select all that apply)"
    type: multi_choice
    construct: following_currently_sources_financial_st
    required: true
    options:
      - id: "a"
        label: "Not enough income"
      - id: "b"
        label: "The cost of everyday expenses / inflation"
      - id: "c"
        label: "Credit card or other debt"
      - id: "d"
        label: "Housing costs (rent or mortgage)"
      - id: "e"
        label: "Medical or health-care bills"
      - id: "f"
        label: "Student loans"
      - id: "g"
        label: "Job security or loss of income"
      - id: "h"
        label: "Lack of savings"
      - id: "i"
        label: "Supporting family members"
      - id: "j"
        label: "I don't have financial stress right now"
  - id: q5
    prompt: "In the past 12 months, which of these did you experience because of money? (Select all that apply)"
    type: multi_choice
    construct: past_12_months_these_did
    required: true
    options:
      - id: "a"
        label: "Trouble paying a bill on time"
      - id: "b"
        label: "Skipped or reduced a meal to save money"
      - id: "c"
        label: "Put off a medical or dental visit"
      - id: "d"
        label: "Could not afford a needed repair"
      - id: "e"
        label: "Borrowed money to cover basics"
      - id: "f"
        label: "Fell behind on rent or mortgage"
      - id: "g"
        label: "Withdrew from retirement or savings early"
      - id: "h"
        label: "None of these"
  - id: q6
    prompt: "How much do you agree with the following statement? My finances control my life more than I would like."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q7
    prompt: "How much do you agree with the following statement? I have money left over at the end of the month."
