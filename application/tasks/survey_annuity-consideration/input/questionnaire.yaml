schemaVersion: "1.0"
id: annuity_consideration_v1
title: "Annuity Consideration Survey"
description: "Awareness of annuities and whether people would consider them as part of their retirement income."
questions:
  - id: q0
    prompt: "Before this survey, how familiar were you with annuities?"
    type: single_choice
    construct: before_this_survey_familiar_were
    required: true
    options:
      - id: "a"
        label: "Never heard of them"
      - id: "b"
        label: "Heard of them but don't know how they work"
      - id: "c"
        label: "Somewhat familiar"
      - id: "d"
        label: "Fairly familiar"
      - id: "e"
        label: "Very familiar"
  - id: q1
    prompt: "Do you currently own an annuity?"
    type: single_choice
    construct: currently_own_annuity
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, but I've seriously considered it"
      - id: "d"
        label: "No, and I haven't considered it"
      - id: "e"
        label: "Not sure"
  - id: q2
    prompt: "How would you describe your understanding of the difference between annuity types (fixed, variable, indexed)?"
    type: single_choice
    construct: would_describe_understanding_difference_
    required: true
    options:
      - id: "a"
        label: "I don't know the difference"
      - id: "b"
        label: "I've heard the terms but don't understand them"
      - id: "c"
        label: "I understand them somewhat"
      - id: "d"
        label: "I understand them well"
      - id: "e"
        label: "I understand them very well"
  - id: q3
    prompt: "What is your main goal (or would be your main goal) for an annuity?"
    type: single_choice
    construct: main_goal_would_be_main
    required: true
    options:
      - id: "a"
        label: "Guaranteed income in retirement"
      - id: "b"
        label: "Protecting my savings from market losses"
      - id: "c"
        label: "Tax-deferred growth"
      - id: "d"
        label: "Leaving money to heirs"
      - id: "e"
        label: "I don't have a goal for annuities"
      - id: "f"
        label: "Not sure"
  - id: q4
    prompt: "Which retirement income sources do you currently have or expect? (Select all that apply)"
    type: multi_choice
    construct: retirement_income_sources_currently_have
    required: true
    options:
      - id: "a"
        label: "Social Security"
      - id: "b"
        label: "A pension"
      - id: "c"
        label: "A 401(k) or 403(b)"
      - id: "d"
        label: "An IRA or Roth IRA"
      - id: "e"
        label: "Personal savings or investments"
      - id: "f"
        label: "Real estate or rental income"
      - id: "g"
        label: "An annuity"
      - id: "h"
        label: "Continued work"
      - id: "i"
        label: "None of these"
  - id: q5
    prompt: "How concerned are you about outliving your retirement savings?"
    type: single_choice
    construct: concerned_outliving_retirement_savings
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q6
    prompt: "How appealing is the idea of guaranteed income for life?"
    type: single_choice
    construct: appealing_idea_guaranteed_income_life
    required: true
    options:
      - id: "a"
        label: "Not at all appealing"
      - id: "b"
        label: "Slightly appealing"
      - id: "c"
        label: "Moderately appealing"
      - id: "d"
        label: "Very appealing"
      - id: "e"
        label: "Extremely appealing"
  - id: q7
    prompt: "How likely are you to consider buying an annuity in the next few years?"
    type: single_choice
    construct: likely_consider_buying_annuity_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Somewhat unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Somewhat likely"
      - id: "e"
        label: "Very likely"
  - id: q8
    prompt: "Where have you heard about annuities? (Select all that apply)"
    type: multi_choice
    construct: where_have_heard_annuities_select
    required: true
    options:
      - id: "a"
        label: "A financial advisor"
      - id: "b"
        label: "My employer or retirement plan"
      - id: "c"
        label: "An insurance company or agent"
      - id: "d"
        label: "News or financial media"
      - id: "e"
        label: "Friends or family"
      - id: "f"
        label: "Advertising"
      - id: "g"
        label: "Social media"
      - id: "h"
        label: "I haven't really heard about them"
  - id: q9
    prompt: "How much do you agree or disagree: Annuities are too complicated to understand."
    type: single_choice
    construct: much_agree_disagree_annuities_too
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: The guaranteed income from an annuity would give me peace of mind."
    type: single_choice
    construct: much_agree_disagree_guaranteed_income
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I worry annuities have high fees or hidden costs."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: I don't like locking up my money for a long time."
    type: single_choice
    construct: much_agree_disagree_i_don
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I'd rather manage my own investments than buy an annuity."
    type: single_choice
    construct: much_agree_disagree_i_d
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I trust insurance companies to honor annuity guarantees."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
