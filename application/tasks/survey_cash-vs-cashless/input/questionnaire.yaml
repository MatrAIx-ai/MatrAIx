    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is each factor when choosing a payment method: Privacy of my transactions."
    type: single_choice
    construct: important_each_factor_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "Select your top 3 reasons for preferring cashless payments. (Select all that apply — choose up to 3)"
    type: single_choice
    construct: select_top_3_reasons_preferring
    required: true
    options:
      - id: "a"
        label: "Faster checkout"
      - id: "b"
        label: "Don't have to carry cash"
      - id: "c"
        label: "Rewards and cash back"
      - id: "d"
        label: "Easier to track spending"
      - id: "e"
        label: "Accepted almost everywhere"
      - id: "f"
        label: "Safer than carrying cash"
      - id: "g"
        label: "Works for online shopping"
      - id: "h"
        label: "I don't prefer cashless payments"
  - id: q20
    prompt: "Select your top 3 reasons for still using cash. (Select all that apply — choose up to 3)"
