schemaVersion: "1.0"
id: cash_vs_cashless_v1
title: "Cash vs. Cashless Payments Survey"
description: "How people balance physical cash and cashless payment methods (cards, mobile wallets, and peer-to-peer apps) in everyday life."
questions:
  - id: q0
    prompt: "In a typical week, how often do you use physical cash to pay for something?"
    type: single_choice
    construct: typical_week_often_use_physical
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Every day"
  - id: q1
    prompt: "Which payment method do you use most often for everyday purchases?"
    type: single_choice
    construct: payment_method_use_most_often
    required: true
    options:
      - id: "a"
        label: "Cash"
      - id: "b"
        label: "Debit card"
      - id: "c"
        label: "Credit card"
      - id: "d"
        label: "Mobile wallet (e.g., Apple Pay, Google Pay)"
      - id: "e"
        label: "Peer-to-peer app (e.g., Venmo, Cash App)"
  - id: q2
    prompt: "Roughly what percentage of your monthly spending is done with cash? Please enter a percentage."
    type: free_text
    construct: roughly_percentage_monthly_spending_done
    required: true
  - id: q3
    prompt: "Which payment methods do you use regularly? (Select all that apply)"
    type: multi_choice
    construct: payment_methods_use_regularly_select
    required: true
    options:
      - id: "a"
        label: "Cash"
      - id: "b"
        label: "Debit card"
      - id: "c"
        label: "Credit card"
      - id: "d"
        label: "Mobile wallet (Apple Pay, Google Pay, Samsung Pay)"
      - id: "e"
        label: "Peer-to-peer apps (Venmo, Cash App, Zelle)"
      - id: "f"
        label: "Paper checks"
      - id: "g"
        label: "Prepaid or gift cards"
      - id: "h"
        label: "Contactless \"tap to pay\" cards"
  - id: q4
    prompt: "How has your use of cash changed over the past 3 years?"
    type: single_choice
    construct: has_use_cash_changed_over
    required: true
    options:
      - id: "a"
        label: "I use much less cash"
      - id: "b"
        label: "I use somewhat less cash"
      - id: "c"
        label: "About the same"
      - id: "d"
        label: "I use somewhat more cash"
      - id: "e"
        label: "I use much more cash"
  - id: q5
    prompt: "For which situations do you still prefer to use cash? (Select all that apply)"
    type: multi_choice
    construct: situations_still_prefer_use_cash
    required: true
    options:
      - id: "a"
        label: "Small purchases (coffee, snacks)"
      - id: "b"
        label: "Tipping service workers"
      - id: "c"
        label: "Farmers markets or street vendors"
      - id: "d"
        label: "Paying friends or family back"
      - id: "e"
        label: "Places that charge card fees"
      - id: "f"
        label: "Emergencies"
      - id: "g"
        label: "Budgeting / controlling spending"
      - id: "h"
        label: "I don't prefer cash for anything"
  - id: q6
    prompt: "About how much cash do you typically carry in your wallet? Please enter a dollar amount."
    type: free_text
    construct: much_cash_typically_carry_wallet
    required: true
  - id: q7
    prompt: "How often do you visit an ATM to withdraw cash?"
    type: single_choice
    construct: often_visit_atm_withdraw_cash
    required: true
    options:
      - id: "a"
        label: "Weekly or more"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "About once a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Almost never"
  - id: q8
    prompt: "How much do you agree or disagree: I could comfortably go a whole week without using any cash."
    type: single_choice
    construct: much_agree_disagree_i_could
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree or disagree: Using cash helps me control my spending."
    type: single_choice
    construct: much_agree_disagree_using_cash
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: Cashless payments are more convenient than cash."
    type: single_choice
    construct: much_agree_disagree_cashless_payments
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I worry about privacy when all my payments are tracked digitally."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: A fully cashless society would leave some people behind."
    type: single_choice
    construct: much_agree_disagree_fully_cashless
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I feel more secure carrying a card or phone than carrying cash."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How important is each factor when choosing a payment method: Convenience and speed."
    type: single_choice
    construct: important_each_factor_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q15
    prompt: "How important is each factor when choosing a payment method: Security against theft or fraud."
    type: single_choice
    construct: important_each_factor_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is each factor when choosing a payment method: Rewards or cash back."
    type: single_choice
    construct: important_each_factor_when_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is each factor when choosing a payment method: Ability to track and budget spending."
    type: single_choice
