        label: "Yes, with family members"
      - id: "b"
        label: "Yes, with coworkers or a team"
      - id: "c"
        label: "Yes, with both"
      - id: "d"
        label: "No"
      - id: "e"
        label: "Not applicable"
  - id: q33
    prompt: "Besides passwords, what else do you store in your password manager? (Select all that apply)"
    type: multi_choice
    construct: besides_passwords_else_store_password
    required: true
    options:
      - id: "a"
        label: "Payment cards"
      - id: "b"
        label: "Secure notes or documents"
      - id: "c"
        label: "Wi-Fi passwords"
      - id: "d"
        label: "Software license keys"
      - id: "e"
        label: "Identity documents (passport, ID numbers)"
      - id: "f"
        label: "Recovery codes for other accounts"
      - id: "g"
        label: "Nothing besides passwords"
      - id: "h"
        label: "Not applicable"
  - id: q34
    prompt: "Select your top 3 reasons for using (or wanting to use) a password manager. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_reasons_using
    required: true
    options:
      - id: "a"
        label: "I don't have to remember many passwords"
      - id: "b"
        label: "It generates strong unique passwords for me"
      - id: "c"
        label: "It saves me time when logging in"
      - id: "d"
        label: "It warns me about breaches and weak passwords"
      - id: "e"
        label: "It syncs across all my devices"
      - id: "f"
        label: "It keeps my accounts more secure"
      - id: "g"
        label: "It lets me share access safely"
      - id: "h"
        label: "It stores more than just passwords"
  - id: q35
