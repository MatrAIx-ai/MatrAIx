schemaVersion: "1.0"
id: password_manager_usage_v1
title: "Password Manager Usage Survey"
description: "How people store, generate, and manage their online passwords, and their attitudes toward dedicated password manager tools."
questions:
  - id: q0
    prompt: "How do you primarily keep track of the passwords for your online accounts?"
    type: single_choice
    construct: primarily_keep_track_passwords_online
    required: true
    options:
      - id: "a"
        label: "I use a dedicated password manager app"
      - id: "b"
        label: "I let my web browser save and fill them"
      - id: "c"
        label: "I rely on my phone or computer's built-in keychain"
      - id: "d"
        label: "I write them down on paper or in a notebook"
      - id: "e"
        label: "I save them in a notes app, spreadsheet, or document"
      - id: "f"
        label: "I memorize them or reuse a few passwords"
      - id: "g"
        label: "I reset them with \"forgot password\" each time"
  - id: q1
    prompt: "Do you currently use a dedicated password manager?"
    type: single_choice
    construct: currently_use_dedicated_password_manager
    required: true
    options:
      - id: "a"
        label: "Yes, I use one regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I have used one in the past"
      - id: "d"
        label: "No, and I never have"
  - id: q2
    prompt: "How long have you been using a password manager?"
    type: single_choice
    construct: long_have_been_using_password
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I do not use one"
  - id: q3
    prompt: "What first prompted you to start using a password manager? (Select all that apply)"
    type: multi_choice
    construct: first_prompted_start_using_password
    required: true
    options:
      - id: "a"
        label: "Too many accounts and passwords to remember"
      - id: "b"
        label: "A data breach or hacked account"
      - id: "c"
        label: "A recommendation from a friend or family member"
      - id: "d"
        label: "A recommendation from an article, video, or podcast"
      - id: "e"
        label: "A requirement or suggestion at work"
      - id: "f"
        label: "It came built into my browser or device"
      - id: "g"
        label: "I wanted to stop reusing the same password"
      - id: "h"
        label: "I have not started using one"
  - id: q4
    prompt: "Which password managers do you currently use? (Select all that apply)"
    type: multi_choice
    construct: password_managers_currently_use_select
    required: true
    options:
      - id: "a"
        label: "1Password"
      - id: "b"
        label: "Bitwarden"
      - id: "c"
        label: "LastPass"
      - id: "d"
        label: "Dashlane"
      - id: "e"
        label: "Keeper"
      - id: "f"
        label: "NordPass"
      - id: "g"
        label: "Proton Pass"
      - id: "h"
        label: "Google Password Manager"
      - id: "i"
        label: "Apple iCloud Keychain"
      - id: "j"
        label: "Microsoft Authenticator / Edge password manager"
      - id: "k"
        label: "Firefox or other browser built-in manager"
      - id: "l"
        label: "Other"
      - id: "m"
        label: "I do not use any password manager"
  - id: q5
    prompt: "Which password manager do you consider your primary one?"
    type: single_choice
    construct: password_manager_consider_primary_one
    required: true
    options:
      - id: "a"
        label: "1Password"
      - id: "b"
        label: "Bitwarden"
      - id: "c"
        label: "LastPass"
      - id: "d"
        label: "Dashlane"
      - id: "e"
        label: "Keeper or NordPass"
      - id: "f"
        label: "Proton Pass"
      - id: "g"
        label: "Google Password Manager"
      - id: "h"
        label: "Apple iCloud Keychain"
      - id: "i"
        label: "Microsoft / Edge password manager"
      - id: "j"
        label: "A browser built-in manager"
      - id: "k"
        label: "Other"
      - id: "l"
        label: "Not applicable"
  - id: q6
    prompt: "What kind of plan do you have for your primary password manager?"
    type: single_choice
    construct: kind_plan_have_primary_password
    required: true
    options:
      - id: "a"
        label: "Free plan"
      - id: "b"
        label: "Paid individual/premium plan"
      - id: "c"
        label: "Family plan"
      - id: "d"
        label: "Provided by my employer"
      - id: "e"
        label: "It is built into my device or browser at no charge"
      - id: "f"
        label: "I don't know"
      - id: "g"
        label: "Not applicable"
  - id: q7
    prompt: "Approximately how much do you pay per year for password management software, in U.S. dollars? Enter 0 if you pay nothing."
    type: free_text
    construct: approximately_much_pay_per_year
    required: true
  - id: q8
    prompt: "On which devices do you use your password manager? (Select all that apply)"
    type: multi_choice
    construct: devices_use_password_manager_select
    required: true
    options:
      - id: "a"
        label: "Windows PC"
      - id: "b"
        label: "Mac"
      - id: "c"
        label: "Linux computer"
      - id: "d"
        label: "iPhone"
      - id: "e"
        label: "Android phone"
      - id: "f"
        label: "iPad or Android tablet"
      - id: "g"
        label: "Web browser extension"
      - id: "h"
        label: "I do not use one on any device"
  - id: q9
    prompt: "Which password manager features do you actually use? (Select all that apply)"
    type: multi_choice
    construct: password_manager_features_actually_use
    required: true
    options:
      - id: "a"
        label: "Autofill of usernames and passwords"
      - id: "b"
        label: "Password generator"
      - id: "c"
        label: "Breach or dark-web monitoring alerts"
      - id: "d"
        label: "Secure notes storage"
      - id: "e"
        label: "Built-in two-factor / one-time code generator"
      - id: "f"
        label: "Passkey storage"
      - id: "g"
        label: "Password sharing with family or team"
      - id: "h"
        label: "Emergency access for a trusted contact"
      - id: "i"
        label: "Storing payment cards or addresses"
      - id: "j"
        label: "Password health / weak-password reports"
      - id: "k"
        label: "I don't use any of these"
  - id: q10
    prompt: "Roughly how many login credentials do you have stored in your password manager? Enter a whole number."
    type: free_text
    construct: roughly_many_login_credentials_have
    required: true
  - id: q11
    prompt: "How often do you use your password manager's autofill when logging in?"
    type: single_choice
    construct: often_use_password_manager_s
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q12
    prompt: "How do you generate passwords for new accounts?"
    type: single_choice
    construct: generate_passwords_new_accounts
    required: true
    options:
      - id: "a"
        label: "I always use the built-in password generator"
      - id: "b"
        label: "I usually use the generator but sometimes make my own"
      - id: "c"
        label: "I create my own strong passwords manually"
      - id: "d"
        label: "I reuse a variation of an existing password"
      - id: "e"
        label: "I reuse the same password across sites"
  - id: q13
    prompt: "Please rate your agreement: A password manager makes my online accounts more secure."
    type: single_choice
    construct: please_rate_agreement_password_manager
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "Please rate your agreement: I worry about what would happen if my password manager were hacked."
    type: single_choice
    construct: please_rate_agreement_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "Please rate your agreement: Setting up a password manager was easy for me."
    type: single_choice
    construct: please_rate_agreement_setting_up
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "Please rate your agreement: I trust the company behind my password manager to protect my data."
    type: single_choice
    construct: please_rate_agreement_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "Please rate your agreement: A password manager saves me time in my daily online life."
    type: single_choice
    construct: please_rate_agreement_password_manager
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "Please rate your agreement: I would feel lost if I could not access my password manager."
    type: single_choice
    construct: please_rate_agreement_i_would
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How important is this when choosing a password manager: Strong security and encryption"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "How important is this when choosing a password manager: Low or no cost"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q21
    prompt: "How important is this when choosing a password manager: Ease of use and clean interface"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q22
    prompt: "How important is this when choosing a password manager: Works across all my devices and browsers"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q23
    prompt: "How important is this when choosing a password manager: The company's reputation and track record"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q24
    prompt: "How important is this when choosing a password manager: Extra features like breach alerts and 2FA codes"
    type: single_choice
    construct: important_this_when_choosing_password
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q25
    prompt: "How often do you reuse the same or a similar password across different accounts?"
    type: single_choice
    construct: often_reuse_same_similar_password
    required: true
    options:
      - id: "a"
        label: "Never — every account has a unique password"
      - id: "b"
        label: "Rarely — only for a few unimportant accounts"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost always"
  - id: q26
    prompt: "How strong would you rate the master password that protects your password manager?"
    type: single_choice
    construct: strong_would_rate_master_password
    required: true
    options:
      - id: "a"
        label: "Very strong (long and unique)"
      - id: "b"
        label: "Fairly strong"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "Weak"
      - id: "e"
        label: "I don't use a master password / not applicable"
  - id: q27
    prompt: "How do you protect against losing access to your password manager? (Select all that apply)"
    type: multi_choice
    construct: protect_against_losing_access_password
    required: true
    options:
      - id: "a"
        label: "I saved a written recovery code in a safe place"
      - id: "b"
        label: "I set up account recovery contacts"
      - id: "c"
        label: "I exported an encrypted backup of my vault"
      - id: "d"
        label: "I rely on my email to reset access"
      - id: "e"
        label: "I memorized my master password"
      - id: "f"
        label: "I haven't set up any recovery method"
      - id: "g"
        label: "Not applicable"
  - id: q28
    prompt: "What concerns you most about using a password manager? (Select all that apply)"
    type: multi_choice
    construct: concerns_most_using_password_manager
    required: true
    options:
      - id: "a"
        label: "Putting all my passwords in one place"
      - id: "b"
        label: "Getting locked out if I forget the master password"
      - id: "c"
        label: "The service being hacked or breached"
      - id: "d"
        label: "Cost of a subscription"
      - id: "e"
        label: "It being too complicated to set up or use"
      - id: "f"
        label: "Trusting a company with my data"
      - id: "g"
        label: "Autofill entering data on the wrong site"
      - id: "h"
        label: "I have no real concerns"
  - id: q29
    prompt: "Have any of your online accounts ever been compromised or breached?"
    type: single_choice
    construct: have_any_online_accounts_ever
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, never"
      - id: "d"
        label: "I'm not sure"
  - id: q30
    prompt: "Have you started using passkeys (passwordless sign-in) for any accounts?"
    type: single_choice
    construct: have_started_using_passkeys_passwordless
    required: true
    options:
      - id: "a"
        label: "Yes, for several accounts"
      - id: "b"
        label: "Yes, for one or two accounts"
      - id: "c"
        label: "No, but I plan to"
      - id: "d"
        label: "No, and I have no plans to"
      - id: "e"
        label: "I don't know what passkeys are"
  - id: q31
    prompt: "Do you use two-factor authentication to protect the password manager itself?"
    type: single_choice
    construct: use_two_factor_authentication_protect
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I'm not sure"
      - id: "d"
        label: "Not applicable"
  - id: q32
