schemaVersion: "1.0"
id: cloud_storage_adoption_v1
title: "Cloud Storage Adoption & Usage Survey"
description: "Which cloud storage services people adopt, what they store and share, and how they weigh cost, privacy, and reliability."
questions:
  - id: q0
    prompt: "Do you use any cloud storage service to store files, photos, or backups?"
    type: single_choice
    construct: use_any_cloud_storage_service
    required: true
    options:
      - id: "a"
        label: "Yes, heavily"
      - id: "b"
        label: "Yes, regularly"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "Which cloud storage service do you use most?"
    type: single_choice
    construct: cloud_storage_service_use_most
    required: true
    options:
      - id: "a"
        label: "Google Drive"
      - id: "b"
        label: "Apple iCloud"
      - id: "c"
        label: "Microsoft OneDrive"
      - id: "d"
        label: "Dropbox"
      - id: "e"
        label: "Amazon (Photos / Drive)"
      - id: "f"
        label: "Box"
      - id: "g"
        label: "Another service"
      - id: "h"
        label: "I don't use cloud storage"
  - id: q2
    prompt: "Which cloud storage services do you currently use? (Select all that apply)"
    type: multi_choice
    construct: cloud_storage_services_currently_use
    required: true
    options:
      - id: "a"
        label: "Google Drive"
      - id: "b"
        label: "Apple iCloud"
      - id: "c"
        label: "Microsoft OneDrive"
      - id: "d"
        label: "Dropbox"
      - id: "e"
        label: "Amazon Photos / Drive"
      - id: "f"
        label: "Box"
      - id: "g"
        label: "Proton Drive"
      - id: "h"
        label: "Mega"
      - id: "i"
        label: "pCloud"
      - id: "j"
        label: "A self-hosted option (Nextcloud, etc.)"
      - id: "k"
        label: "None"
  - id: q3
    prompt: "How many years have you been using cloud storage?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q4
    prompt: "Roughly how much total data do you keep in cloud storage?"
    type: single_choice
    construct: roughly_much_total_data_keep
    required: true
    options:
      - id: "a"
        label: "Less than 5 GB"
      - id: "b"
        label: "5–50 GB"
      - id: "c"
        label: "50–200 GB"
      - id: "d"
        label: "200 GB–1 TB"
      - id: "e"
        label: "More than 1 TB"
      - id: "f"
        label: "Not sure"
  - id: q5
    prompt: "What do you store in the cloud? (Select all that apply)"
    type: multi_choice
    construct: store_cloud_select_all_that
    required: true
    options:
      - id: "a"
        label: "Photos and videos"
      - id: "b"
        label: "Documents and work files"
      - id: "c"
        label: "Music"
      - id: "d"
        label: "Device or computer backups"
      - id: "e"
        label: "Files shared with others"
      - id: "f"
        label: "School or coursework"
      - id: "g"
        label: "Financial or personal records"
      - id: "h"
        label: "App data and settings"
  - id: q6
    prompt: "Why do you use cloud storage? (Select all that apply)"
    type: multi_choice
    construct: why_use_cloud_storage_select
    required: true
    options:
      - id: "a"
        label: "Back up important files"
      - id: "b"
        label: "Access files from any device"
      - id: "c"
        label: "Free up space on my devices"
      - id: "d"
        label: "Share files with others"
      - id: "e"
        label: "Collaborate on documents"
      - id: "f"
        label: "It came with my device or account"
      - id: "g"
        label: "Sync photos automatically"
  - id: q7
    prompt: "How did you start using your main cloud service?"
    type: single_choice
    construct: did_start_using_main_cloud
    required: true
    options:
      - id: "a"
        label: "It came bundled with my phone or computer"
      - id: "b"
        label: "I signed up for it deliberately"
      - id: "c"
        label: "It came with another subscription (Microsoft 365, etc.)"
      - id: "d"
        label: "A friend, family member, or work set it up"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "On which devices do you use cloud storage? (Select all that apply)"
    type: multi_choice
    construct: devices_use_cloud_storage_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smart TV or streaming device"
      - id: "f"
        label: "Work computer"
  - id: q9
    prompt: "Do you pay for cloud storage?"
    type: single_choice
    construct: pay_cloud_storage
    required: true
    options:
      - id: "a"
        label: "Yes, a monthly subscription"
      - id: "b"
        label: "Yes, an annual subscription"
      - id: "c"
        label: "It's included in another subscription I pay for"
      - id: "d"
        label: "No, I only use free storage"
      - id: "e"
        label: "Not sure"
  - id: q10
    prompt: "Roughly how much do you pay per month for cloud storage (across all services)?"
    type: free_text
    construct: roughly_much_pay_per_month
    required: true
  - id: q11
    prompt: "How often do you access files stored in the cloud?"
    type: single_choice
    construct: often_access_files_stored_cloud
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Rarely"
  - id: q12
    prompt: "How often do you run out of, or get close to, your storage limit?"
    type: single_choice
    construct: often_run_out_get_close
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "I'm always near my limit"
  - id: q13
    prompt: "When you run low on cloud storage, what do you usually do?"
    type: single_choice
    construct: when_run_low_cloud_storage
    required: true
    options:
      - id: "a"
        label: "Upgrade to a larger plan"
      - id: "b"
        label: "Delete old files"
      - id: "c"
        label: "Move files to another service"
      - id: "d"
        label: "Move files to a local drive"
      - id: "e"
        label: "Ignore it"
      - id: "f"
        label: "This hasn't happened to me"
  - id: q14
    prompt: "Do your phone's photos back up to the cloud automatically?"
    type: single_choice
    construct: phone_s_photos_back_up
    required: true
    options:
      - id: "a"
        label: "Yes, automatically"
      - id: "b"
        label: "Yes, but only on Wi-Fi"
      - id: "c"
        label: "I back them up manually"
      - id: "d"
        label: "No, I don't back up photos to the cloud"
      - id: "e"
        label: "Not sure"
  - id: q15
    prompt: "Which sharing or collaboration features do you use? (Select all that apply)"
    type: multi_choice
    construct: sharing_collaboration_features_use_selec
    required: true
    options:
      - id: "a"
        label: "Sharing links to files or folders"
      - id: "b"
        label: "Setting permissions (view / edit)"
      - id: "c"
        label: "Real-time document collaboration"
      - id: "d"
        label: "Shared folders with family or a team"
      - id: "e"
        label: "Password-protecting shared files"
      - id: "f"
        label: "None of these"
  - id: q16
    prompt: "Do you also keep local backups in addition to the cloud?"
    type: single_choice
    construct: also_keep_local_backups_addition
    required: true
    options:
      - id: "a"
        label: "Yes, on an external drive"
      - id: "b"
        label: "Yes, on my computer's internal drive"
      - id: "c"
        label: "Yes, on a home network drive (NAS)"
      - id: "d"
        label: "No, the cloud is my only copy"
      - id: "e"
        label: "Not sure"
  - id: q17
    prompt: "How much do you agree with the following statement about cloud storage? — Cloud storage makes my files easier to access"
    type: single_choice
    construct: much_agree_following_statement_cloud
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement about cloud storage? — I trust my provider to keep my files safe and available"
    type: single_choice
    construct: much_agree_following_statement_cloud
    required: true
    options:
