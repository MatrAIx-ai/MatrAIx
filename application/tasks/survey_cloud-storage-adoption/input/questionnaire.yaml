      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement about cloud storage? — I worry about the privacy of files I store in the cloud"
