schemaVersion: "1.0"
id: emergency_savings_fund_v1
title: "Emergency Savings Fund Survey"
description: "How people build, hold, and use a dedicated emergency or rainy-day savings fund."
questions:
  - id: q0
    prompt: "Do you currently have money set aside specifically for emergencies?"
    type: single_choice
    construct: currently_have_money_set_aside
    required: true
    options:
      - id: "a"
        label: "Yes, a dedicated emergency fund"
      - id: "b"
        label: "Yes, but it's mixed in with my general savings"
      - id: "c"
        label: "No, but I'm working on starting one"
      - id: "d"
        label: "No, and I have none set aside"
  - id: q1
    prompt: "About how long could your current savings cover your essential expenses if you lost your income?"
    type: single_choice
    construct: long_could_current_savings_cover
    required: true
    options:
      - id: "a"
        label: "Less than 2 weeks"
      - id: "b"
        label: "About 2 weeks to 1 month"
      - id: "c"
        label: "1 to 3 months"
      - id: "d"
        label: "3 to 6 months"
      - id: "e"
        label: "More than 6 months"
      - id: "f"
        label: "I have no savings to fall back on"
  - id: q2
    prompt: "If you had an unexpected $400 expense, how would you most likely cover it?"
    type: single_choice
    construct: if_had_unexpected_400_expense
    required: true
    options:
      - id: "a"
        label: "From cash or my checking/savings account"
      - id: "b"
        label: "Put it on a credit card and pay it off in full"
      - id: "c"
        label: "Put it on a credit card and carry the balance"
      - id: "d"
        label: "Borrow from family or friends"
      - id: "e"
        label: "Sell something or take on extra work"
      - id: "f"
        label: "I couldn't cover it right now"
  - id: q3
    prompt: "How long have you been building your emergency fund?"
    type: single_choice
    construct: long_have_been_building_emergency
    required: true
    options:
      - id: "a"
        label: "I haven't started"
      - id: "b"
        label: "Less than 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
  - id: q4
    prompt: "Where do you primarily keep your emergency savings?"
    type: single_choice
    construct: where_primarily_keep_emergency_savings
    required: true
    options:
      - id: "a"
        label: "A high-yield online savings account (e.g., Ally, Marcus, SoFi)"
      - id: "b"
        label: "A savings account at my main bank"
      - id: "c"
        label: "My checking account"
      - id: "d"
        label: "A money market account"
      - id: "e"
        label: "Cash at home"
      - id: "f"
        label: "Invested (brokerage, stocks, crypto)"
      - id: "g"
        label: "I have no emergency savings"
  - id: q5
    prompt: "Which of the following do you keep any emergency money in? (Select all that apply)"
    type: multi_choice
    construct: following_keep_any_emergency_money
    required: true
    options:
      - id: "a"
        label: "High-yield savings account"
      - id: "b"
        label: "Traditional savings account"
      - id: "c"
        label: "Checking account"
      - id: "d"
        label: "Money market account or CD"
      - id: "e"
        label: "Cash at home"
      - id: "f"
        label: "A brokerage or investment account"
      - id: "g"
        label: "Retirement account (401k/IRA)"
      - id: "h"
        label: "None — I have no emergency money"
  - id: q6
    prompt: "What is your target size for a fully funded emergency fund?"
    type: single_choice
    construct: target_size_fully_funded_emergency
    required: true
    options:
      - id: "a"
        label: "1 month of expenses or less"
      - id: "b"
        label: "About 3 months of expenses"
      - id: "c"
        label: "About 6 months of expenses"
      - id: "d"
        label: "9 to 12 months of expenses"
      - id: "e"
        label: "More than 12 months of expenses"
      - id: "f"
        label: "I don't have a specific target"
  - id: q7
    prompt: "How do you add money to your emergency fund?"
    type: single_choice
    construct: add_money_emergency_fund
    required: true
    options:
      - id: "a"
        label: "Automatic recurring transfers"
      - id: "b"
        label: "Manual transfers when I have extra"
      - id: "c"
        label: "Rounding up purchases or a savings app"
      - id: "d"
        label: "Tax refunds or windfalls only"
      - id: "e"
        label: "I'm not currently adding to it"
  - id: q8
    prompt: "How often do you contribute to your emergency savings?"
    type: single_choice
    construct: often_contribute_emergency_savings
    required: true
    options:
      - id: "a"
        label: "Every paycheck"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Only when I have extra money"
      - id: "e"
        label: "Rarely or never"
  - id: q9
    prompt: "In the past 2 years, have you had to dip into your emergency fund?"
    type: single_choice
    construct: past_2_years_have_had
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I came close"
      - id: "d"
        label: "No"
      - id: "e"
        label: "I don't have an emergency fund"
  - id: q10
    prompt: "What did you most recently use emergency savings for? (Select all that apply)"
    type: multi_choice
    construct: did_most_recently_use_emergency
    required: true
    options:
      - id: "a"
        label: "Car repair or replacement"
      - id: "b"
        label: "Medical or dental bill"
      - id: "c"
        label: "Home or appliance repair"
      - id: "d"
        label: "Job loss or reduced income"
      - id: "e"
        label: "Unexpected travel or family emergency"
      - id: "f"
        label: "Covering regular bills during a tight month"
      - id: "g"
        label: "Pet expenses"
      - id: "h"
        label: "I have not used emergency savings"
  - id: q11
    prompt: "After using emergency savings, how quickly did you rebuild it?"
    type: single_choice
    construct: after_using_emergency_savings_quickly
    required: true
    options:
      - id: "a"
        label: "Within a month"
      - id: "b"
        label: "Within a few months"
      - id: "c"
        label: "It took more than 6 months"
      - id: "d"
        label: "I haven't fully rebuilt it"
      - id: "e"
        label: "Not applicable — I haven't used it"
  - id: q12
    prompt: "What is the biggest barrier to building your emergency fund?"
    type: single_choice
    construct: biggest_barrier_building_emergency_fund
    required: true
    options:
      - id: "a"
        label: "Income doesn't cover much beyond expenses"
      - id: "b"
        label: "Paying down debt takes priority"
      - id: "c"
        label: "Unexpected expenses keep depleting it"
      - id: "d"
        label: "I struggle with the discipline to save"
      - id: "e"
        label: "Rising cost of living"
      - id: "f"
        label: "I don't feel I need one"
      - id: "g"
        label: "No major barriers"
  - id: q13
    prompt: "Which of these have made it harder to save for emergencies in the past year? (Select all that apply)"
    type: multi_choice
    construct: these_have_made_it_harder
    required: true
    options:
      - id: "a"
        label: "Rising rent or housing costs"
      - id: "b"
        label: "Higher grocery and food prices"
      - id: "c"
        label: "Medical expenses"
      - id: "d"
        label: "Debt payments"
      - id: "e"
        label: "A drop or gap in income"
      - id: "f"
        label: "Childcare or dependent costs"
      - id: "g"
        label: "Large one-time expenses"
      - id: "h"
        label: "None of these"
  - id: q14
    prompt: "How much do you agree with the following statement: Having an emergency fund gives me peace of mind."
    type: single_choice
    construct: much_agree_following_statement_having
    required: true
    options:
