schemaVersion: "1.0"
id: diet_tracking_apps_v1
title: "Diet Tracking Apps Survey"
description: "Consumer use of smartphone apps to log food, calories, and nutrition."
questions:
  - id: q0
    prompt: "Do you currently use an app to track your food, calories, or nutrition?"
    type: single_choice
    construct: currently_use_app_track_food
    required: true
    options:
      - id: "a"
        label: "Yes, I use one regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I used one in the past"
      - id: "d"
        label: "No, I have never used one"
  - id: q1
    prompt: "How long have you been using a diet-tracking app? Please enter a number of months."
    type: free_text
    construct: long_have_been_using_diet
    required: true
  - id: q2
    prompt: "Which diet-tracking apps have you used? (Select all that apply)"
    type: multi_choice
    construct: diet_tracking_apps_have_used
    required: true
    options:
      - id: "a"
        label: "MyFitnessPal"
      - id: "b"
        label: "Lose It!"
      - id: "c"
        label: "Cronometer"
      - id: "d"
        label: "Noom"
      - id: "e"
        label: "WeightWatchers (WW) app"
      - id: "f"
        label: "MyNetDiary"
      - id: "g"
        label: "A free app that came with my phone or wearable"
      - id: "h"
        label: "Another diet-tracking app"
  - id: q3
    prompt: "Which app do you use most?"
    type: single_choice
    construct: app_use_most
    required: true
    options:
      - id: "a"
        label: "MyFitnessPal"
      - id: "b"
        label: "Lose It!"
      - id: "c"
        label: "Cronometer"
      - id: "d"
        label: "Noom"
      - id: "e"
        label: "WeightWatchers (WW) app"
      - id: "f"
        label: "Another app"
  - id: q4
    prompt: "What is your main goal for tracking your diet? (Select all that apply)"
    type: multi_choice
    construct: main_goal_tracking_diet_select
    required: true
    options:
      - id: "a"
        label: "Lose weight"
      - id: "b"
        label: "Maintain my weight"
      - id: "c"
        label: "Gain weight or build muscle"
      - id: "d"
        label: "Hit protein or macro targets"
      - id: "e"
        label: "Eat more balanced meals"
      - id: "f"
        label: "Manage a health condition"
      - id: "g"
        label: "General awareness of what I eat"
  - id: q5
    prompt: "How do you usually log your food? (Select all that apply)"
    type: multi_choice
