    required: true
    options:
      - id: "a"
        label: "Searching the food database"
      - id: "b"
        label: "Scanning a barcode"
      - id: "c"
        label: "Using saved meals or recipes"
      - id: "d"
        label: "Photographing my food"
      - id: "e"
        label: "Manually entering nutrition info"
      - id: "f"
        label: "Voice or AI assistant"
