        label: "Cloud storage (iCloud, Google Drive, OneDrive, Dropbox)"
      - id: "b"
        label: "Browser account sync"
      - id: "c"
        label: "Notes app sync (Notes, Keep, Notion, etc.)"
      - id: "d"
        label: "Password manager"
      - id: "e"
        label: "Native ecosystem sync"
      - id: "f"
        label: "Manually transferring files"
      - id: "g"
        label: "I don't really sync data"
