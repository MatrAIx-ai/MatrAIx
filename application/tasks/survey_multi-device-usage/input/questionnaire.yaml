schemaVersion: "1.0"
id: multi_device_usage_v1
title: "Multi-Device Usage Survey"
description: "How people use, sync, and coordinate multiple computing devices across daily life."
questions:
  - id: q0
    prompt: "How many personal computing devices do you actively use in a typical week?"
    type: single_choice
    construct: many_personal_computing_devices_actively
    required: true
    options:
      - id: "a"
        label: "1"
      - id: "b"
        label: "2"
      - id: "c"
        label: "3"
      - id: "d"
        label: "4"
      - id: "e"
        label: "5 or more"
  - id: q1
    prompt: "Which devices do you use regularly? (Select all that apply)"
    type: multi_choice
    construct: devices_use_regularly_select_all
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smartwatch or fitness band"
      - id: "f"
        label: "Smart TV or streaming device"
      - id: "g"
        label: "Smart speaker / display"
      - id: "h"
        label: "E-reader"
      - id: "i"
        label: "Work-issued computer or phone"
  - id: q2
    prompt: "Which device is your primary one for everyday tasks?"
    type: single_choice
    construct: device_primary_one_everyday_tasks
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "It varies day to day"
  - id: q3
    prompt: "Are most of your devices from the same brand or ecosystem?"
    type: single_choice
    construct: most_devices_from_same_brand
    required: true
    options:
      - id: "a"
        label: "Yes, almost all one ecosystem"
      - id: "b"
        label: "Mostly one, with a few exceptions"
      - id: "c"
        label: "A fairly even mix"
      - id: "d"
        label: "Deliberately mixed across brands"
      - id: "e"
        label: "Not sure"
  - id: q4
    prompt: "Which technology ecosystems do your devices belong to? (Select all that apply)"
    type: multi_choice
    construct: technology_ecosystems_devices_belong_sel
    required: true
    options:
      - id: "a"
        label: "Apple (iPhone, Mac, iPad, Watch)"
      - id: "b"
        label: "Google / Android"
      - id: "c"
        label: "Microsoft / Windows"
      - id: "d"
        label: "Samsung"
      - id: "e"
        label: "Amazon (Fire, Echo)"
      - id: "f"
        label: "Linux"
      - id: "g"
        label: "Other"
  - id: q5
    prompt: "Which cross-device / continuity features do you use? (Select all that apply)"
    type: multi_choice
    construct: cross_device_continuity_features_use
    required: true
    options:
      - id: "a"
        label: "Apple Handoff / Continuity"
      - id: "b"
        label: "Universal Clipboard (copy on one device, paste on another)"
      - id: "c"
        label: "AirDrop"
      - id: "d"
        label: "Android Nearby Share / Quick Share"
      - id: "e"
        label: "Microsoft Phone Link"
      - id: "f"
        label: "Browser sync (tabs, history, passwords)"
      - id: "g"
        label: "Messaging across devices (iMessage, WhatsApp Web, etc.)"
      - id: "h"
        label: "KDE Connect or similar"
      - id: "i"
        label: "None of these"
  - id: q6
    prompt: "Which tasks do you routinely start on one device and continue on another? (Select all that apply)"
    type: multi_choice
    construct: tasks_routinely_start_one_device
    required: true
    options:
      - id: "a"
        label: "Reading articles or web pages"
      - id: "b"
        label: "Writing documents or emails"
      - id: "c"
        label: "Watching videos"
      - id: "d"
        label: "Messaging / chat"
      - id: "e"
        label: "Browsing / shopping"
      - id: "f"
        label: "Editing photos"
      - id: "g"
        label: "Taking or reviewing notes"
      - id: "h"
        label: "Video calls"
      - id: "i"
        label: "I rarely continue tasks across devices"
  - id: q7
    prompt: "How do you keep your data in sync across devices? (Select all that apply)"
    type: multi_choice
    construct: keep_data_sync_across_devices
    required: true
    options:
