        label: "Constantly — I move between them all day"
      - id: "b"
        label: "Several times a day"
      - id: "c"
        label: "Once or twice a day"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I mostly stick to one device"
  - id: q9
    prompt: "How many separate technology ecosystems do your devices span? Enter a whole number."
