transport: sidecar_http
runtimeDefaults:
  applicationId: rasa_financial_demo
  applicationContext: retail_banking
  domain: banking
connection:
  baseUrlEnv: CHATBOT_API_URL
  baseUrl: http://banking-api:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: ""
    botTypeField: ""
    staticBody: {}
  response:
    sessionIdField: sessionId
    replyField: reply
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
