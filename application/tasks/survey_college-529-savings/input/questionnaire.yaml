schemaVersion: "1.0"
id: college_529_savings_v1
title: "College Savings (529 Plans) Survey"
description: "How families save for future education costs, their use of 529 plans and other accounts, and their attitudes toward college saving."
questions:
  - id: q0
    prompt: "Do you currently save money for a child's (or your own) future education?"
    type: single_choice
    construct: currently_save_money_child_s
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I plan to start"
      - id: "d"
        label: "No, and I have no plans to"
      - id: "e"
        label: "Not applicable — no education costs to plan for"
  - id: q1
    prompt: "Do you have a 529 college savings plan?"
    type: single_choice
    construct: have_529_college_savings_plan
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, but I am considering one"
      - id: "d"
        label: "No, and I am not considering one"
      - id: "e"
        label: "I am not familiar with 529 plans"
  - id: q2
    prompt: "For whom are you saving for education? (Select all that apply)"
    type: multi_choice
    construct: whom_saving_education_select_all
    required: true
    options:
      - id: "a"
        label: "My child or children"
      - id: "b"
        label: "My grandchild or grandchildren"
      - id: "c"
        label: "Myself"
      - id: "d"
        label: "A niece, nephew, or other relative"
      - id: "e"
        label: "Not currently saving for anyone"
      - id: "f"
        label: "Prefer not to say"
  - id: q3
    prompt: "How many children or beneficiaries are you saving for? Enter a number (enter 0 if none)."
    type: free_text
    construct: many_children_beneficiaries_saving_enter
    required: true
  - id: q4
    prompt: "Which types of education savings accounts do you use? (Select all that apply)"
    type: multi_choice
    construct: types_education_savings_accounts_use
    required: true
    options:
      - id: "a"
        label: "529 college savings plan"
      - id: "b"
        label: "529 prepaid tuition plan"
      - id: "c"
        label: "Coverdell Education Savings Account (ESA)"
      - id: "d"
        label: "Custodial account (UGMA/UTMA)"
      - id: "e"
        label: "A regular savings account"
      - id: "f"
        label: "A brokerage or investment account"
      - id: "g"
        label: "Savings bonds"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "Approximately how much have you saved so far for education? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: approximately_much_have_saved_so
    required: true
  - id: q6
    prompt: "About how much do you contribute to education savings each month? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_contribute_education_savings_each
    required: true
  - id: q7
    prompt: "How do you make contributions to your education savings? (Select all that apply)"
    type: multi_choice
    construct: make_contributions_education_savings_sel
    required: true
    options:
      - id: "a"
        label: "Automatic recurring transfers"
      - id: "b"
        label: "Manual one-time deposits"
      - id: "c"
        label: "Payroll deduction"
      - id: "d"
        label: "Gifts from family (grandparents, etc.)"
      - id: "e"
        label: "Tax refunds or windfalls"
      - id: "f"
        label: "I don't currently contribute"
  - id: q8
    prompt: "Which provider or plan do you use (or would you consider)? (Select all that apply)"
    type: multi_choice
    construct: provider_plan_use_would_consider
    required: true
    options:
      - id: "a"
        label: "My home state's 529 plan"
      - id: "b"
        label: "Another state's 529 plan"
      - id: "c"
        label: "Vanguard"
      - id: "d"
        label: "Fidelity"
      - id: "e"
        label: "A financial advisor's recommended plan"
      - id: "f"
        label: "Not sure"
      - id: "g"
        label: "Not applicable"
  - id: q9
    prompt: "What primarily motivated you to save (or consider saving) for education? (Select all that apply)"
    type: multi_choice
    construct: primarily_motivated_save_consider_saving
    required: true
    options:
      - id: "a"
        label: "Rising cost of college"
      - id: "b"
        label: "Tax advantages of 529 plans"
      - id: "c"
        label: "Wanting to avoid student loans"
      - id: "d"
        label: "A state tax deduction or match"
      - id: "e"
        label: "Employer or family encouragement"
      - id: "f"
        label: "Financial advisor recommendation"
      - id: "g"
        label: "My own experience with student debt"
      - id: "h"
        label: "Not applicable"
  - id: q10
    prompt: "How much do you agree with the following statement: Saving for college is one of my top financial priorities."
    type: single_choice
    construct: much_agree_following_statement_saving
    required: true
    options:
