schemaVersion: "1.0"
id: ira_contributions_v1
title: "IRA Contributions Survey"
description: "How individuals open, fund, and invest through individual retirement accounts (IRAs)."
questions:
  - id: q0
    prompt: "Do you have an individual retirement account (IRA)?"
    type: single_choice
    construct: have_individual_retirement_account_ira
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, but I am considering opening one"
      - id: "d"
        label: "No, and I am not considering one"
      - id: "e"
        label: "I am not sure what an IRA is"
  - id: q1
    prompt: "Which types of IRAs do you have? (Select all that apply)"
    type: multi_choice
    construct: types_iras_have_select_all
    required: true
    options:
      - id: "a"
        label: "Traditional IRA"
      - id: "b"
        label: "Roth IRA"
      - id: "c"
        label: "Rollover IRA (from a former employer plan)"
      - id: "d"
        label: "SEP IRA (self-employed)"
      - id: "e"
        label: "SIMPLE IRA"
      - id: "f"
        label: "I don't have an IRA"
      - id: "g"
        label: "Not sure of the type"
  - id: q2
    prompt: "How did you first open your IRA?"
    type: single_choice
    construct: did_first_open_ira
    required: true
    options:
      - id: "a"
        label: "I opened it myself online"
      - id: "b"
        label: "With help from a financial advisor"
      - id: "c"
        label: "By rolling over a workplace retirement plan"
      - id: "d"
        label: "At a bank or credit union branch"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Who is the provider for your primary IRA?"
    type: single_choice
    construct: who_provider_primary_ira
    required: true
    options:
      - id: "a"
        label: "Fidelity"
      - id: "b"
        label: "Vanguard"
      - id: "c"
        label: "Charles Schwab"
      - id: "d"
        label: "A robo-advisor (e.g., Betterment, Wealthfront)"
      - id: "e"
        label: "A bank or credit union"
      - id: "f"
        label: "Another brokerage or advisor"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "Did you contribute to an IRA in the past year?"
    type: single_choice
    construct: did_contribute_ira_past_year
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have contributed in prior years"
      - id: "c"
        label: "No, I have never contributed"
      - id: "d"
        label: "Not applicable"
  - id: q5
    prompt: "About how much did you contribute to your IRA(s) in the past year? Please enter a dollar amount."
    type: free_text
    construct: much_did_contribute_ira_s
    required: true
  - id: q6
    prompt: "Did you contribute the maximum allowed amount last year?"
    type: single_choice
    construct: did_contribute_maximum_allowed_amount
    required: true
    options:
      - id: "a"
        label: "Yes, the full annual limit"
      - id: "b"
        label: "Close to the limit"
      - id: "c"
        label: "Well below the limit"
      - id: "d"
        label: "I did not contribute"
      - id: "e"
        label: "Don't know"
  - id: q7
    prompt: "How do you usually make your IRA contributions?"
    type: single_choice
    construct: usually_make_ira_contributions
    required: true
    options:
      - id: "a"
        label: "Automatic recurring transfers throughout the year"
      - id: "b"
        label: "A single lump sum"
      - id: "c"
        label: "Occasional manual contributions when I can"
      - id: "d"
        label: "I have not contributed"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "About how much do you currently have in all of your IRAs combined?"
    type: single_choice
    construct: much_currently_have_all_iras
    required: true
    options:
      - id: "a"
        label: "Less than $10,000"
      - id: "b"
        label: "$10,000 to $49,999"
      - id: "c"
        label: "$50,000 to $99,999"
      - id: "d"
        label: "$100,000 to $249,999"
      - id: "e"
        label: "$250,000 to $499,999"
      - id: "f"
        label: "$500,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q9
    prompt: "How are the investments in your IRA primarily held?"
    type: single_choice
    construct: investments_ira_primarily_held
    required: true
    options:
      - id: "a"
        label: "A target-date fund"
      - id: "b"
        label: "Index funds or ETFs"
      - id: "c"
        label: "Individual stocks"
      - id: "d"
        label: "Actively managed mutual funds"
      - id: "e"
        label: "Cash or a money market fund"
      - id: "f"
        label: "A robo-advisor manages it for me"
      - id: "g"
        label: "Don't know"
  - id: q10
    prompt: "Why do you contribute to an IRA in addition to or instead of a workplace plan? (Select all that apply)"
    type: multi_choice
    construct: why_contribute_ira_addition_instead
    required: true
    options:
      - id: "a"
        label: "I don't have access to a workplace plan"
      - id: "b"
        label: "More investment choices than my workplace plan"
      - id: "c"
        label: "Lower fees"
      - id: "d"
        label: "The tax advantages"
      - id: "e"
        label: "To save beyond my workplace plan limits"
      - id: "f"
        label: "For Roth (tax-free) growth"
      - id: "g"
        label: "Not applicable"
  - id: q11
    prompt: "Have you ever converted money from a Traditional IRA to a Roth IRA?"
    type: single_choice
    construct: have_ever_converted_money_from
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have considered it"
      - id: "c"
        label: "No, and I have not considered it"
      - id: "d"
        label: "Don't know what this is"
  - id: q12
    prompt: "How often do you review your IRA investments?"
    type: single_choice
    construct: often_review_ira_investments
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "About once a year"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Monthly or more often"
  - id: q13
    prompt: "How much do you agree: I understand the difference between a Traditional and a Roth IRA."
    type: single_choice
    construct: much_agree_i_understand_difference
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: Contributing to an IRA is an important part of my retirement plan."
    type: single_choice
    construct: much_agree_contributing_ira_important
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree: I find it easy to contribute to my IRA consistently."
    type: single_choice
    construct: much_agree_i_find_it
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree: I feel confident choosing the investments in my IRA."
    type: single_choice
    construct: much_agree_i_feel_confident
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree: The annual contribution limits keep me from saving as much as I would like."
    type: single_choice
    construct: much_agree_annual_contribution_limits
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree: The tax benefits are the main reason I use an IRA."
    type: single_choice
    construct: much_agree_tax_benefits_main
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "When choosing an IRA provider, how important is each factor: low fees and expense ratios."
    type: single_choice
    construct: when_choosing_ira_provider_important
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "When choosing an IRA provider, how important is each factor: a wide range of investment options."
    type: single_choice
