schemaVersion: "1.0"
id: fitness_app_usage_v1
title: "Fitness App Usage Survey"
description: "Consumer adoption and use of smartphone fitness and workout apps."
questions:
  - id: q0
    prompt: "Do you currently use any fitness or workout app on your phone or tablet?"
    type: single_choice
    construct: currently_use_any_fitness_workout
    required: true
    options:
      - id: "a"
        label: "Yes, I use one regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I used one in the past"
      - id: "d"
        label: "No, I have never used one"
  - id: q1
    prompt: "How long have you been using fitness apps? Please enter a number of months."
    type: free_text
    construct: long_have_been_using_fitness
    required: true
  - id: q2
    prompt: "Which fitness apps do you currently use? (Select all that apply)"
    type: multi_choice
    construct: fitness_apps_currently_use_select
    required: true
    options:
      - id: "a"
        label: "Nike Training Club or Nike Run Club"
      - id: "b"
        label: "Strava"
      - id: "c"
        label: "Peloton App"
      - id: "d"
        label: "Apple Fitness+"
      - id: "e"
        label: "Adidas Running (Runtastic)"
      - id: "f"
        label: "Fitbod, StrongLifts, or another strength logger"
      - id: "g"
        label: "A yoga or mobility app (for example, Down Dog, Alo Moves)"
      - id: "h"
        label: "A free workout app that came with my phone"
      - id: "i"
        label: "Another fitness app"
  - id: q3
    prompt: "Which type of fitness app do you use most?"
    type: single_choice
    construct: type_fitness_app_use_most
    required: true
    options:
      - id: "a"
        label: "Guided workout videos or classes"
      - id: "b"
        label: "Run, walk, or cycling tracker"
      - id: "c"
        label: "Strength-training or weightlifting logger"
      - id: "d"
        label: "Yoga, stretching, or mobility"
      - id: "e"
        label: "An all-in-one fitness dashboard"
      - id: "f"
        label: "A step or activity counter"
  - id: q4
    prompt: "In a typical week, how many days do you open a fitness app?"
    type: single_choice
    construct: typical_week_many_days_open
    required: true
    options:
      - id: "a"
        label: "0 days"
      - id: "b"
        label: "1 day"
      - id: "c"
        label: "2 days"
      - id: "d"
        label: "3 to 4 days"
      - id: "e"
        label: "5 to 6 days"
      - id: "f"
        label: "Every day"
  - id: q5
    prompt: "How did you first discover the fitness app you use most? (Select all that apply)"
    type: multi_choice
    construct: did_first_discover_fitness_app
    required: true
    options:
      - id: "a"
        label: "App store search or browsing"
      - id: "b"
        label: "A friend or family member's recommendation"
      - id: "c"
        label: "Social media or an influencer"
      - id: "d"
        label: "It came pre-installed on my phone"
      - id: "e"
        label: "An ad"
      - id: "f"
        label: "My gym, trainer, or employer"
      - id: "g"
        label: "A connected wearable or device"
  - id: q6
    prompt: "On which device do you mainly use fitness apps?"
    type: single_choice
    construct: device_mainly_use_fitness_apps
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Smartwatch"
      - id: "d"
        label: "Smart TV or streaming device"
  - id: q7
    prompt: "What are your main goals for using a fitness app? (Select all that apply)"
    type: multi_choice
    construct: main_goals_using_fitness_app
    required: true
    options:
      - id: "a"
        label: "Lose weight"
      - id: "b"
        label: "Build strength or muscle"
      - id: "c"
        label: "Improve cardio or endurance"
      - id: "d"
        label: "Stay consistent or build a habit"
      - id: "e"
        label: "Improve flexibility or mobility"
      - id: "f"
        label: "Train for an event or race"
      - id: "g"
        label: "Reduce stress or improve mood"
      - id: "h"
        label: "General health maintenance"
  - id: q8
    prompt: "Do you pay for a premium or subscription version of any fitness app?"
    type: single_choice
    construct: pay_premium_subscription_version_any
    required: true
    options:
      - id: "a"
        label: "Yes, one paid subscription"
      - id: "b"
        label: "Yes, more than one paid subscription"
      - id: "c"
        label: "No, I only use free versions"
      - id: "d"
        label: "I used to pay but no longer do"
  - id: q9
    prompt: "About how much do you spend on fitness apps per month? Please enter a number in dollars."
    type: free_text
