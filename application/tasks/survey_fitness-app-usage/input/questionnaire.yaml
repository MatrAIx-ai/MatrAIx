        label: "Guided video or audio workouts"
      - id: "b"
        label: "Progress tracking and history"
      - id: "c"
        label: "Personalized or adaptive plans"
      - id: "d"
        label: "GPS route or distance tracking"
      - id: "e"
        label: "Challenges, streaks, or badges"
      - id: "f"
        label: "Social feed or friends"
      - id: "g"
        label: "Integration with my wearable"
      - id: "h"
        label: "Music or coaching cues"
  - id: q11
    prompt: "How much do you agree or disagree: My fitness app helps me stay consistent with exercise."
    type: single_choice
    construct: much_agree_disagree_my_fitness
    required: true
    options:
