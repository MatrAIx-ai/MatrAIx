schemaVersion: "1.0"
id: preventive_care_attitudes_v1
title: "Preventive Care Attitudes Survey"
description: "Consumer attitudes toward preventive health care and how those attitudes translate into routine checkups, screenings, and healthy-lifestyle habits."
questions:
  - id: q0
    prompt: "Do you have a regular doctor or clinic you go to for routine checkups and preventive care?"
    type: single_choice
    construct: have_regular_doctor_clinic_go
    required: true
    options:
      - id: "a"
        label: "Yes, a specific doctor"
      - id: "b"
        label: "Yes, a specific clinic or practice but not one specific doctor"
      - id: "c"
        label: "No regular source of care"
      - id: "d"
        label: "I use urgent care or the emergency room when needed"
  - id: q1
    prompt: "When did you last have a routine preventive or wellness visit (not a visit for a specific illness or injury)?"
    type: single_choice
    construct: when_did_last_have_routine
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "Never"
  - id: q2
    prompt: "In the past two years, which of the following preventive services have you received? (Select all that apply)"
    type: multi_choice
    construct: past_two_years_following_preventive
    required: true
    options:
      - id: "a"
        label: "General physical or wellness exam"
      - id: "b"
        label: "Blood pressure check"
      - id: "c"
        label: "Cholesterol or blood panel"
      - id: "d"
        label: "A recommended cancer screening"
      - id: "e"
        label: "A vaccination or booster"
      - id: "f"
        label: "Dental cleaning or checkup"
      - id: "g"
        label: "Vision or eye exam"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "In general, how often do you seek preventive care even when you feel completely healthy?"
    type: single_choice
    construct: general_often_seek_preventive_care
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q4
    prompt: "What most often prompts you to schedule preventive care?"
    type: single_choice
    construct: most_often_prompts_schedule_preventive
    required: true
    options:
      - id: "a"
        label: "A reminder from my doctor's office"
      - id: "b"
        label: "My own routine or calendar"
      - id: "c"
        label: "A prompt from a family member"
      - id: "d"
        label: "A requirement from work or insurance"
      - id: "e"
        label: "Noticing a symptom or concern"
      - id: "f"
        label: "I rarely schedule preventive care"
  - id: q5
    prompt: "Where do you most often receive preventive care?"
    type: single_choice
    construct: where_most_often_receive_preventive
    required: true
    options:
      - id: "a"
        label: "A primary care physician's office"
      - id: "b"
        label: "A community health center or clinic"
      - id: "c"
        label: "A retail or pharmacy clinic (for example, CVS MinuteClinic)"
      - id: "d"
        label: "An urgent care center"
      - id: "e"
        label: "A workplace or on-site clinic"
      - id: "f"
        label: "I do not have a usual place"
  - id: q6
    prompt: "How do you keep track of when preventive services are due? (Select all that apply)"
    type: multi_choice
    construct: keep_track_when_preventive_services
    required: true
    options:
      - id: "a"
        label: "Reminders from my provider's office"
      - id: "b"
        label: "My patient portal or health app"
      - id: "c"
        label: "Reminders from my insurance company"
      - id: "d"
        label: "My own notes or calendar"
      - id: "e"
        label: "Family or friends remind me"
      - id: "f"
        label: "I do not track this"
  - id: q7
    prompt: "In a typical year, how many preventive or wellness visits do you have? Please enter a number."
    type: free_text
    construct: typical_year_many_preventive_wellness
    required: true
  - id: q8
    prompt: "Which sources do you rely on for guidance about recommended preventive care? (Select all that apply)"
    type: multi_choice
    construct: sources_rely_guidance_recommended_preven
    required: true
    options:
      - id: "a"
        label: "My doctor or nurse"
      - id: "b"
        label: "Government health websites (for example, CDC)"
      - id: "c"
        label: "Health websites like WebMD or Mayo Clinic"
      - id: "d"
        label: "My health insurer"
      - id: "e"
        label: "Family or friends"
      - id: "f"
        label: "Social media or online videos"
      - id: "g"
        label: "I do not seek out this guidance"
  - id: q9
    prompt: "How much do you agree or disagree: Preventing illness is better than treating it after it happens."
    type: single_choice
    construct: much_agree_disagree_preventing_illness
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
