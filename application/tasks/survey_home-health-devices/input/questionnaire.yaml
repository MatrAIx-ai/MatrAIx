schemaVersion: "1.0"
id: home_health_devices_v1
title: "Home Health Devices Survey"
description: "Consumer ownership, usage, and attitudes toward at-home health measurement devices."
questions:
  - id: q0
    prompt: "Do you own or regularly use any home health measurement devices (for example, a blood pressure monitor, thermometer, pulse oximeter, or smart scale)?"
    type: single_choice
    construct: own_regularly_use_any_home
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "Which of the following home health devices do you currently own or use? (Select all that apply)"
    type: multi_choice
    construct: following_home_health_devices_currently
    required: true
    options:
      - id: "a"
        label: "Blood pressure monitor (arm or wrist cuff)"
      - id: "b"
        label: "Digital thermometer"
      - id: "c"
        label: "Pulse oximeter (fingertip oxygen/heart rate)"
      - id: "d"
        label: "Smart scale or body-composition scale"
      - id: "e"
        label: "Home glucose meter"
      - id: "f"
        label: "Wearable that tracks heart rate (watch or band)"
      - id: "g"
        label: "Blood pressure smartwatch"
      - id: "h"
        label: "None of these"
  - id: q2
    prompt: "How long have you been using home health devices?"
    type: single_choice
    construct: long_have_been_using_home
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "How often do you use your home health device(s) to take a measurement?"
    type: single_choice
    construct: often_use_home_health_device
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Only when I feel unwell"
  - id: q4
    prompt: "What is the main reason you use home health devices?"
    type: single_choice
    construct: main_reason_use_home_health
    required: true
    options:
      - id: "a"
        label: "Managing an ongoing condition"
      - id: "b"
        label: "General wellness and prevention"
      - id: "c"
        label: "A doctor asked me to track readings"
      - id: "d"
        label: "Curiosity about my numbers"
      - id: "e"
        label: "Peace of mind"
  - id: q5
    prompt: "Which brands of home health devices do you own? (Select all that apply)"
    type: multi_choice
    construct: brands_home_health_devices_own
    required: true
    options:
      - id: "a"
        label: "Omron"
      - id: "b"
        label: "Withings"
      - id: "c"
        label: "iHealth"
      - id: "d"
        label: "Braun"
      - id: "e"
        label: "Kinsa"
      - id: "f"
        label: "A store or generic brand"
      - id: "g"
        label: "Not sure of the brand"
  - id: q6
    prompt: "Where did you get your home health device(s)? (Select all that apply)"
    type: multi_choice
    construct: where_did_get_home_health
    required: true
    options:
      - id: "a"
        label: "Pharmacy or drugstore"
      - id: "b"
        label: "Big-box retailer (e.g., Target, Walmart)"
      - id: "c"
        label: "Online retailer (e.g., Amazon)"
      - id: "d"
        label: "Manufacturer's website"
      - id: "e"
        label: "Received from a doctor or clinic"
      - id: "f"
        label: "Gift from family or friend"
  - id: q7
    prompt: "How many home health devices do you own in total? Please enter a number."
    type: free_text
    construct: many_home_health_devices_own
    required: true
  - id: q8
    prompt: "About how much did you spend on your most recent home health device? Please enter a dollar amount (enter 0 if it was free)."
    type: free_text
    construct: much_did_spend_most_recent
    required: true
  - id: q9
    prompt: "Do your device(s) connect to a smartphone app to store readings?"
    type: single_choice
    construct: device_s_connect_smartphone_app
    required: true
    options:
      - id: "a"
        label: "Yes, all of them"
      - id: "b"
        label: "Yes, some of them"
      - id: "c"
        label: "No, none of them"
      - id: "d"
        label: "Not sure"
  - id: q10
