        label: "Apple Health"
      - id: "b"
        label: "Google Fit / Health Connect"
      - id: "c"
        label: "The device manufacturer's own app"
      - id: "d"
        label: "A separate health-tracking app"
      - id: "e"
        label: "I write readings down manually"
      - id: "f"
        label: "I do not track readings anywhere"
  - id: q11
    prompt: "How do you usually keep track of your readings over time?"
    type: single_choice
    construct: usually_keep_track_readings_over
    required: true
    options:
