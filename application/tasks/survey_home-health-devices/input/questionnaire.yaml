        label: "Automatically in an app"
      - id: "b"
        label: "In a written log or notebook"
      - id: "c"
        label: "In a spreadsheet or notes app"
      - id: "d"
        label: "I remember them but don't record them"
      - id: "e"
        label: "I don't keep track over time"
