schemaVersion: "1.0"
id: family_caregiving_v1
title: "Family Caregiving Survey"
description: "The everyday experiences and attitudes of people who help care for a family member."
questions:
  - id: q0
    prompt: "Do you currently provide unpaid help or care to a family member or friend because of their health, age, or a condition?"
    type: single_choice
    construct: currently_provide_unpaid_help_care
    required: true
    options:
      - id: "a"
        label: "Yes, right now"
      - id: "b"
        label: "I did within the past year"
      - id: "c"
        label: "I did more than a year ago"
      - id: "d"
        label: "No, but I expect to"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "Who is the main person you help or have helped?"
    type: single_choice
    construct: who_main_person_help_have
    required: true
    options:
      - id: "a"
        label: "A parent or parent-in-law"
      - id: "b"
        label: "A spouse or partner"
      - id: "c"
        label: "A grandparent"
      - id: "d"
        label: "A child or grandchild"
      - id: "e"
        label: "Another relative"
      - id: "f"
        label: "A friend or neighbor"
  - id: q2
    prompt: "How long have you been providing this care?"
    type: single_choice
    construct: long_have_been_providing_this
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "About how many hours per week do you spend on caregiving? Please enter a number of hours."
    type: free_text
    construct: many_hours_per_week_spend
    required: true
  - id: q4
    prompt: "Do you live with the person you care for?"
    type: single_choice
    construct: live_person_care
    required: true
    options:
      - id: "a"
        label: "Yes, in the same home"
      - id: "b"
        label: "No, but nearby (within 20 minutes)"
      - id: "c"
        label: "No, 20 minutes to an hour away"
      - id: "d"
        label: "No, more than an hour away"
      - id: "e"
        label: "Not applicable"
  - id: q5
    prompt: "Which caregiving tasks do you regularly help with? (Select all that apply)"
    type: multi_choice
    construct: caregiving_tasks_regularly_help_select
    required: true
    options:
      - id: "a"
        label: "Grocery shopping and errands"
      - id: "b"
        label: "Preparing meals"
      - id: "c"
        label: "Housekeeping and laundry"
      - id: "d"
        label: "Transportation to appointments"
      - id: "e"
        label: "Managing medications and reminders"
      - id: "f"
        label: "Personal care (bathing, dressing)"
      - id: "g"
        label: "Managing money or paperwork"
      - id: "h"
        label: "Companionship and emotional support"
  - id: q6
    prompt: "Which health or coordination tasks do you handle? (Select all that apply)"
    type: multi_choice
    construct: health_coordination_tasks_handle_select
    required: true
    options:
      - id: "a"
        label: "Scheduling medical appointments"
      - id: "b"
        label: "Communicating with doctors or nurses"
      - id: "c"
        label: "Managing insurance or benefits"
      - id: "d"
        label: "Coordinating other helpers or services"
      - id: "e"
        label: "Tracking symptoms or health changes"
      - id: "f"
        label: "Accessing an online patient portal"
      - id: "g"
        label: "None of these"
  - id: q7
    prompt: "Do you share caregiving responsibilities with others?"
    type: single_choice
    construct: share_caregiving_responsibilities_others
    required: true
    options:
      - id: "a"
        label: "No, I do it all myself"
      - id: "b"
        label: "Yes, with other family members"
      - id: "c"
        label: "Yes, with paid helpers"
      - id: "d"
        label: "Yes, with both family and paid help"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "About how much do you personally spend out of pocket on caregiving in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_personally_spend_out_pocket
    required: true
  - id: q9
    prompt: "How has caregiving affected your paid work? (Select all that apply)"
    type: multi_choice
    construct: has_caregiving_affected_paid_work
    required: true
    options:
      - id: "a"
        label: "Reduced my hours"
      - id: "b"
        label: "Taken time off or used leave"
      - id: "c"
        label: "Passed up promotions or opportunities"
      - id: "d"
        label: "Switched to a more flexible job"
      - id: "e"
        label: "Stopped working"
      - id: "f"
        label: "No effect on my work"
      - id: "g"
        label: "Not applicable"
  - id: q10
    prompt: "Which resources or supports have you used as a caregiver? (Select all that apply)"
    type: multi_choice
    construct: resources_supports_have_used_as
    required: true
    options:
      - id: "a"
        label: "Online information or forums"
      - id: "b"
        label: "A caregiver support group"
      - id: "c"
        label: "Respite care or a break service"
      - id: "d"
        label: "Help from a social worker or care manager"
      - id: "e"
        label: "Employer benefits (leave, EAP)"
      - id: "f"
        label: "Apps or tools for organizing care"
      - id: "g"
        label: "None of these"
  - id: q11
    prompt: "How prepared did you feel when you first started caregiving?"
    type: single_choice
    construct: prepared_did_feel_when_first
    required: true
    options:
      - id: "a"
        label: "Not at all prepared"
      - id: "b"
        label: "Slightly prepared"
      - id: "c"
        label: "Moderately prepared"
      - id: "d"
        label: "Very prepared"
      - id: "e"
        label: "Completely prepared"
  - id: q12
