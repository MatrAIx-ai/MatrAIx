version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/music-music-technology-chatbot"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "music"
tags = [ "music", "technology", "studio" ]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/shared-chat-sim"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
