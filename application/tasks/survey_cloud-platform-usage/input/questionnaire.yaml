schemaVersion: "1.0"
id: cloud_platform_usage_v1
title: "Cloud Platform Usage Survey"
description: "How developers and teams adopt and use public cloud platforms such as AWS, Azure, and Google Cloud."
questions:
  - id: q0
    prompt: "Do you use public cloud platforms (such as AWS, Azure, or Google Cloud)?"
    type: single_choice
    construct: use_public_cloud_platforms_such
    required: true
    options:
      - id: "a"
        label: "Yes, for work"
      - id: "b"
        label: "Yes, for personal projects"
      - id: "c"
        label: "Yes, for both work and personal projects"
      - id: "d"
        label: "I am just learning cloud platforms"
      - id: "e"
        label: "No, I don't use cloud platforms"
  - id: q1
    prompt: "How long have you worked with cloud platforms?"
    type: single_choice
    construct: long_have_worked_cloud_platforms
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
