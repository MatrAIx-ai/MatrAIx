schemaVersion: "1.0"
id: joint_household_finances_v1
title: "Joint Household Finances Survey"
description: "How households organize and manage their shared finances — accounts, bills, budgeting, and division of financial responsibilities."
questions:
  - id: q0
    prompt: "Do you currently share financial responsibilities with another adult in your household?"
    type: single_choice
    construct: currently_share_financial_responsibiliti
    required: true
    options:
      - id: "a"
        label: "Yes, with a spouse or partner"
      - id: "b"
        label: "Yes, with a family member (parent, sibling, adult child)"
      - id: "c"
        label: "Yes, with a roommate"
      - id: "d"
        label: "No, I manage my finances alone"
      - id: "e"
        label: "No, someone else manages the finances for me"
  - id: q1
    prompt: "How many adults contribute income to your household? Please enter a number."
    type: free_text
    construct: many_adults_contribute_income_household
    required: true
  - id: q2
    prompt: "How do you and the other adult(s) structure your money?"
    type: single_choice
    construct: other_adult_s_structure_money
    required: true
    options:
      - id: "a"
        label: "Everything fully combined"
      - id: "b"
        label: "Mostly combined with some individual accounts"
      - id: "c"
        label: "A shared account for joint expenses, rest separate"
      - id: "d"
        label: "Mostly separate, split bills as they come"
      - id: "e"
        label: "Completely separate finances"
  - id: q3
    prompt: "Which shared financial accounts or tools does your household use? (Select all that apply)"
    type: multi_choice
    construct: shared_financial_accounts_tools_does
    required: true
    options:
      - id: "a"
        label: "Joint checking account"
      - id: "b"
        label: "Joint savings account"
      - id: "c"
        label: "Joint credit card"
      - id: "d"
        label: "Shared bill-splitting app (e.g., Splitwise, Venmo)"
      - id: "e"
        label: "Shared budgeting app or spreadsheet"
      - id: "f"
        label: "Joint investment or retirement accounts"
      - id: "g"
        label: "A shared mortgage or lease"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "How do you divide shared household expenses?"
    type: single_choice
    construct: divide_shared_household_expenses
    required: true
    options:
      - id: "a"
        label: "Split 50/50"
      - id: "b"
        label: "Split proportional to income"
      - id: "c"
        label: "One person pays most or all"
      - id: "d"
        label: "We each cover specific bills"
      - id: "e"
        label: "It varies month to month"
  - id: q5
    prompt: "Who is mainly responsible for paying the bills on time in your household?"
    type: single_choice
    construct: who_mainly_responsible_paying_bills
    required: true
    options:
      - id: "a"
        label: "Me"
      - id: "b"
        label: "My partner or the other adult"
      - id: "c"
        label: "We split bill responsibilities"
      - id: "d"
        label: "We handle it jointly each time"
      - id: "e"
        label: "Someone else"
  - id: q6
    prompt: "Who mostly makes decisions about big purchases in your household?"
    type: single_choice
    construct: who_mostly_makes_decisions_big
    required: true
    options:
      - id: "a"
        label: "Me"
      - id: "b"
        label: "The other adult"
      - id: "c"
        label: "We decide together"
      - id: "d"
        label: "Whoever is paying decides"
      - id: "e"
        label: "It depends on the purchase"
  - id: q7
    prompt: "Does your household follow a budget?"
    type: single_choice
    construct: does_household_follow_budget
    required: true
    options:
      - id: "a"
        label: "Yes, a detailed written budget"
      - id: "b"
        label: "Yes, a rough budget we keep in mind"
      - id: "c"
        label: "No, but we track spending"
      - id: "d"
        label: "No budget or tracking"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "How often do the adults in your household discuss the household budget or finances?"
    type: single_choice
    construct: often_adults_household_discuss_household
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Almost daily"
  - id: q9
    prompt: "Do you hold regular money check-ins or meetings with the other adult(s)?"
    type: single_choice
    construct: hold_regular_money_check_ins
    required: true
    options:
      - id: "a"
        label: "Yes, on a set schedule"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, only when a problem arises"
      - id: "d"
        label: "No, we don't discuss it much"
  - id: q10
    prompt: "How much do you agree or disagree: Financial responsibilities are shared fairly in my household."
    type: single_choice
    construct: much_agree_disagree_financial_responsibi
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I have a clear picture of my household's overall finances."
    type: single_choice
    construct: much_agree_disagree_i_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
