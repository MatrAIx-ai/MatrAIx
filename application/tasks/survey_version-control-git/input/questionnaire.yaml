schemaVersion: "1.0"
id: version_control_git_v1
title: "Version Control & Git Usage Survey"
description: "How developers use version control systems — especially Git — including tools, workflows, and attitudes."
questions:
  - id: q0
    prompt: "How often do you use a version control system (such as Git) in your work?"
    type: single_choice
    construct: often_use_version_control_system
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning to use version control"
      - id: "e"
        label: "I don't use version control"
  - id: q1
    prompt: "Including any education, how many years have you used version control? Please enter a number."
    type: free_text
    construct: including_any_education_many_years
    required: true
  - id: q2
    prompt: "Which version control system do you primarily use?"
    type: single_choice
    construct: version_control_system_primarily_use
    required: true
    options:
      - id: "a"
        label: "Git"
      - id: "b"
        label: "Subversion (SVN)"
      - id: "c"
        label: "Mercurial"
      - id: "d"
        label: "Perforce"
      - id: "e"
        label: "Team Foundation Version Control (TFVC)"
      - id: "f"
        label: "Other"
  - id: q3
    prompt: "Which code hosting platform do you use most often?"
    type: single_choice
    construct: code_hosting_platform_use_most
    required: true
    options:
      - id: "a"
        label: "GitHub"
      - id: "b"
        label: "GitLab"
      - id: "c"
        label: "Bitbucket"
      - id: "d"
        label: "Azure Repos / Azure DevOps"
      - id: "e"
        label: "A self-hosted server (self-managed GitLab, Gitea, etc.)"
      - id: "f"
        label: "Other"
  - id: q4
    prompt: "Which code hosting platforms have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: code_hosting_platforms_have_used
    required: true
    options:
      - id: "a"
        label: "GitHub"
      - id: "b"
        label: "GitLab"
      - id: "c"
        label: "Bitbucket"
      - id: "d"
        label: "Azure Repos"
      - id: "e"
        label: "Gitea or Forgejo"
      - id: "f"
        label: "SourceForge"
      - id: "g"
        label: "A self-hosted internal server"
      - id: "h"
        label: "Other"
  - id: q5
    prompt: "How do you usually interact with Git? (Select all that apply)"
    type: multi_choice
    construct: usually_interact_git_select_all
    required: true
    options:
      - id: "a"
        label: "The command line"
      - id: "b"
        label: "My editor or IDE's built-in Git tools"
      - id: "c"
        label: "A standalone Git GUI client"
      - id: "d"
        label: "The hosting platform's web interface"
      - id: "e"
        label: "Git hooks or scripts"
  - id: q6
    prompt: "Which Git GUI clients do you use, if any? (Select all that apply)"
    type: multi_choice
    construct: git_gui_clients_use_if
    required: true
    options:
      - id: "a"
        label: "GitHub Desktop"
      - id: "b"
        label: "GitKraken"
      - id: "c"
        label: "Sourcetree"
      - id: "d"
        label: "Tower"
      - id: "e"
        label: "Fork"
      - id: "f"
        label: "Lazygit"
      - id: "g"
        label: "I don't use a GUI client"
  - id: q7
    prompt: "How often do you commit changes?"
    type: single_choice
    construct: often_commit_changes
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly or less"
  - id: q8
    prompt: "How often do you push to a remote repository?"
    type: single_choice
    construct: often_push_remote_repository
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly or less"
  - id: q9
    prompt: "Which branching strategy does your team primarily use?"
    type: single_choice
    construct: branching_strategy_does_team_primarily
    required: true
    options:
      - id: "a"
        label: "Trunk-based development"
      - id: "b"
        label: "GitHub Flow (short-lived feature branches)"
      - id: "c"
        label: "Git Flow (develop/release/hotfix branches)"
      - id: "d"
        label: "Feature branches without a formal model"
      - id: "e"
        label: "We commit directly to the main branch"
      - id: "f"
        label: "I'm not sure"
  - id: q10
    prompt: "Which best describes your commit message habits?"
    type: single_choice
    construct: best_describes_commit_message_habits
    required: true
    options:
      - id: "a"
        label: "I follow a strict convention (e.g., Conventional Commits)"
      - id: "b"
        label: "I write clear descriptive messages without a formal convention"
      - id: "c"
        label: "I write short informal messages"
      - id: "d"
        label: "My messages are often minimal (e.g., \"fix\", \"wip\")"
  - id: q11
    prompt: "When integrating changes, do you prefer merge or rebase?"
    type: single_choice
    construct: when_integrating_changes_prefer_merge
    required: true
    options:
