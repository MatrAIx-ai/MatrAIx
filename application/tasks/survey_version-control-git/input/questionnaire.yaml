        label: "On the command line"
      - id: "b"
        label: "In my editor or IDE"
      - id: "c"
        label: "In a dedicated GUI tool"
      - id: "d"
        label: "I try to avoid situations that cause them"
      - id: "e"
        label: "I ask a teammate for help"
