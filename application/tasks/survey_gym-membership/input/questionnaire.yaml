schemaVersion: "1.0"
id: gym_membership_v1
title: "Gym Membership Survey"
description: "How consumers choose, use, and feel about gym and fitness-facility memberships."
questions:
  - id: q0
    prompt: "Do you currently have a gym or fitness-facility membership?"
    type: single_choice
    construct: currently_have_gym_fitness_facility
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I had one in the past"
      - id: "c"
        label: "No, I have never had one"
  - id: q1
    prompt: "What type of facility is your membership (or most recent one) with?"
    type: single_choice
    construct: type_facility_membership_most_recent
    required: true
    options:
      - id: "a"
        label: "A budget chain (for example, Planet Fitness)"
      - id: "b"
        label: "A full-service or premium gym (for example, LA Fitness, Equinox)"
      - id: "c"
        label: "A boutique studio (for example, cycling, yoga, or CrossFit)"
      - id: "d"
        label: "A community or nonprofit facility (for example, the YMCA)"
      - id: "e"
        label: "A hotel, apartment, or workplace gym"
      - id: "f"
        label: "I have never had a membership"
  - id: q2
    prompt: "How long have you had your current membership? Please enter a number of months."
    type: free_text
    construct: long_have_had_current_membership
    required: true
  - id: q3
    prompt: "About how much do you pay per month for your membership? Please enter a number in dollars."
    type: free_text
    construct: much_pay_per_month_membership
    required: true
  - id: q4
    prompt: "In a typical week, how many times do you visit the gym?"
    type: single_choice
    construct: typical_week_many_times_visit
    required: true
    options:
      - id: "a"
        label: "0 times"
      - id: "b"
        label: "1 time"
      - id: "c"
        label: "2 times"
      - id: "d"
        label: "3 times"
      - id: "e"
        label: "4 times"
      - id: "f"
        label: "5 or more times"
  - id: q5
    prompt: "Which facilities or services do you use at your gym? (Select all that apply)"
    type: multi_choice
    construct: facilities_services_use_gym_select
    required: true
    options:
      - id: "a"
        label: "Cardio machines"
      - id: "b"
        label: "Free weights"
      - id: "c"
        label: "Weight machines"
      - id: "d"
        label: "Group fitness classes"
      - id: "e"
        label: "Pool"
      - id: "f"
        label: "Sauna or spa"
      - id: "g"
        label: "Personal training"
      - id: "h"
        label: "Basketball or courts"
  - id: q6
    prompt: "What time of day do you usually go to the gym?"
    type: single_choice
    construct: time_day_usually_go_gym
    required: true
    options:
      - id: "a"
        label: "Early morning"
      - id: "b"
        label: "Mid-morning"
      - id: "c"
        label: "Midday"
      - id: "d"
        label: "Afternoon"
      - id: "e"
        label: "Evening"
      - id: "f"
        label: "It varies"
  - id: q7
    prompt: "What most influenced your choice of gym? (Select all that apply)"
    type: multi_choice
    construct: most_influenced_choice_gym_select
    required: true
    options:
      - id: "a"
        label: "Location or convenience"
      - id: "b"
        label: "Price"
      - id: "c"
        label: "Available equipment"
      - id: "d"
        label: "Classes offered"
      - id: "e"
        label: "Cleanliness"
      - id: "f"
        label: "Hours of operation"
      - id: "g"
        label: "Recommendations from others"
      - id: "h"
        label: "Amenities (pool, sauna, etc.)"
  - id: q8
    prompt: "How did you sign up for your membership?"
    type: single_choice
    construct: did_sign_up_membership
    required: true
    options:
      - id: "a"
        label: "In person at the facility"
      - id: "b"
        label: "On the gym's website"
      - id: "c"
        label: "Through a mobile app"
      - id: "d"
        label: "Through an employer or insurance program"
      - id: "e"
        label: "I do not have a membership"
  - id: q9
    prompt: "How much do you agree or disagree: My gym membership is worth what I pay for it."
    type: single_choice
    construct: much_agree_disagree_my_gym
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: I use my membership as often as I intended."
    type: single_choice
    construct: much_agree_disagree_i_use
    required: true
    options:
