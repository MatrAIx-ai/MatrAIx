schemaVersion: "1.0"
id: crypto_trading_behavior_v1
title: "Cryptocurrency Trading Behavior Survey"
description: "How active cryptocurrency traders behave — their trading frequency, styles, tools, risk management, and the psychological patterns that shape their decisions."
questions:
  - id: q0
    prompt: "Do you actively trade cryptocurrency (buying and selling, beyond simple buy-and-hold)?"
    type: single_choice
    construct: actively_trade_cryptocurrency_buying_sel
    required: true
    options:
      - id: "a"
        label: "Yes, I trade regularly"
      - id: "b"
        label: "Yes, I trade occasionally"
      - id: "c"
        label: "I used to trade but stopped"
      - id: "d"
        label: "No, I only buy and hold"
      - id: "e"
        label: "No, I do not own cryptocurrency at all"
  - id: q1
    prompt: "How long have you been trading cryptocurrency?"
    type: single_choice
    construct: long_have_been_trading_cryptocurrency
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 6 years"
      - id: "e"
        label: "More than 6 years"
      - id: "f"
        label: "I do not trade cryptocurrency"
  - id: q2
    prompt: "About how often do you place cryptocurrency trades?"
    type: single_choice
    construct: often_place_cryptocurrency_trades
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "About once a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Less than once a month"
  - id: q3
    prompt: "Which platforms do you use for crypto trading? (Select all that apply)"
    type: multi_choice
    construct: platforms_use_crypto_trading_select
    required: true
    options:
      - id: "a"
        label: "Coinbase / Coinbase Advanced"
      - id: "b"
        label: "Binance / Binance.US"
      - id: "c"
        label: "Kraken"
      - id: "d"
        label: "Robinhood"
      - id: "e"
        label: "Crypto.com"
      - id: "f"
        label: "A decentralized exchange (e.g., Uniswap)"
      - id: "g"
        label: "Cash App"
      - id: "h"
        label: "Another platform"
  - id: q4
    prompt: "Which types of crypto trades or products do you use? (Select all that apply)"
    type: multi_choice
    construct: types_crypto_trades_products_use
    required: true
    options:
      - id: "a"
        label: "Spot buying and selling"
      - id: "b"
        label: "Margin trading"
      - id: "c"
        label: "Futures or perpetual contracts"
      - id: "d"
        label: "Options"
      - id: "e"
        label: "Leveraged tokens"
      - id: "f"
        label: "Automated bots or copy trading"
      - id: "g"
        label: "I only do simple spot trades"
  - id: q5
    prompt: "Which best describes your primary trading style?"
    type: single_choice
    construct: best_describes_primary_trading_style
    required: true
    options:
      - id: "a"
        label: "Day trading (positions closed within a day)"
      - id: "b"
        label: "Swing trading (days to weeks)"
      - id: "c"
        label: "Position trading (weeks to months)"
      - id: "d"
        label: "Scalping (very short-term, many small trades)"
      - id: "e"
        label: "Opportunistic, no fixed style"
  - id: q6
    prompt: "Roughly what is the total value of cryptocurrency you actively trade with, in U.S. dollars? Please enter a whole number."
    type: free_text
    construct: roughly_total_value_cryptocurrency_activ
    required: true
  - id: q7
    prompt: "About how many separate trades do you make in a typical month? Please enter a whole number."
    type: free_text
    construct: many_separate_trades_make_typical
    required: true
  - id: q8
    prompt: "Do you use leverage (borrowed funds) when trading crypto?"
    type: single_choice
    construct: use_leverage_borrowed_funds_when
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "Never"
      - id: "e"
        label: "Not sure what that means"
  - id: q9
    prompt: "What is the highest amount of leverage you have used on a single crypto trade?"
    type: single_choice
    construct: highest_amount_leverage_have_used
    required: true
    options:
      - id: "a"
        label: "No leverage"
      - id: "b"
        label: "Up to 2x"
      - id: "c"
        label: "3x to 5x"
      - id: "d"
        label: "6x to 20x"
      - id: "e"
        label: "More than 20x"
  - id: q10
    prompt: "What do you rely on most when deciding to enter or exit a trade? (Select all that apply)"
    type: multi_choice
    construct: rely_most_when_deciding_enter
    required: true
    options:
      - id: "a"
        label: "Technical analysis / charts"
      - id: "b"
        label: "Project fundamentals"
      - id: "c"
        label: "Social media sentiment"
      - id: "d"
        label: "News and events"
      - id: "e"
        label: "Tips from influencers or friends"
      - id: "f"
        label: "Automated signals or bots"
      - id: "g"
        label: "Gut feeling"
  - id: q11
    prompt: "Do you use stop-loss orders to manage risk?"
    type: single_choice
    construct: use_stop_loss_orders_manage
    required: true
    options:
      - id: "a"
        label: "Yes, on almost every trade"
      - id: "b"
        label: "Yes, on some trades"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "Never"
      - id: "e"
        label: "I don't know what a stop-loss is"
  - id: q12
    prompt: "What are your main reasons for trading crypto rather than just holding? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: main_reasons_trading_crypto_rather
    required: true
    options:
      - id: "a"
        label: "To earn short-term profits"
      - id: "b"
        label: "I enjoy the excitement"
      - id: "c"
        label: "To take advantage of volatility"
      - id: "d"
        label: "To grow a small account quickly"
      - id: "e"
        label: "To generate income"
      - id: "f"
        label: "I don't trust holding long term"
      - id: "g"
        label: "Curiosity and learning"
      - id: "h"
        label: "Social or community involvement"
  - id: q13
    prompt: "How much do you agree with the following statement: I have a clear trading strategy that I follow consistently."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
