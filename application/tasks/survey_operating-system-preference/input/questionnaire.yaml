schemaVersion: "1.0"
id: operating_system_preference_v1
title: "Operating System Preferences & Usage Survey"
description: "How people choose, use, and feel about the desktop and laptop operating systems on their computers."
questions:
  - id: q0
    prompt: "Do you personally use a desktop or laptop computer (not counting phones or tablets)?"
    type: single_choice
    construct: personally_use_desktop_laptop_computer
    required: true
    options:
      - id: "a"
        label: "Yes, daily"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, I rarely or never use one"
  - id: q1
    prompt: "Which operating system do you use most often on your primary personal computer?"
    type: single_choice
    construct: operating_system_use_most_often
    required: true
    options:
      - id: "a"
        label: "Windows 11"
      - id: "b"
        label: "Windows 10 or earlier"
      - id: "c"
        label: "macOS"
      - id: "d"
        label: "A desktop Linux distribution"
      - id: "e"
        label: "ChromeOS"
      - id: "f"
        label: "Other"
  - id: q2
    prompt: "How many years have you been using your current primary operating system?"
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q3
    prompt: "How many desktop or laptop computers do you personally use on a regular basis?"
    type: free_text
    construct: many_desktop_laptop_computers_personally
    required: true
  - id: q4
    prompt: "Which operating systems have you personally used on a laptop or desktop in the past year? (Select all that apply)"
    type: multi_choice
    construct: operating_systems_have_personally_used
    required: true
    options:
      - id: "a"
        label: "Windows 11"
      - id: "b"
        label: "Windows 10 or earlier"
      - id: "c"
        label: "macOS"
      - id: "d"
        label: "Ubuntu"
      - id: "e"
        label: "Fedora"
      - id: "f"
        label: "Debian"
      - id: "g"
        label: "Arch Linux"
      - id: "h"
        label: "Linux Mint"
      - id: "i"
        label: "Another Linux distribution"
      - id: "j"
        label: "ChromeOS"
      - id: "k"
        label: "Windows Subsystem for Linux (WSL)"
      - id: "l"
        label: "A BSD variant (FreeBSD, OpenBSD, etc.)"
  - id: q5
    prompt: "How did you end up with the operating system on your main computer?"
    type: single_choice
    construct: did_end_up_operating_system
    required: true
    options:
      - id: "a"
        label: "It came pre-installed and I kept it"
      - id: "b"
        label: "I deliberately chose and installed it myself"
      - id: "c"
        label: "It was chosen for me by my employer or school"
      - id: "d"
        label: "A friend or family member set it up"
      - id: "e"
        label: "Not sure"
  - id: q6
    prompt: "Which operating system do you use most at work or school (if different from personal)?"
    type: single_choice
    construct: operating_system_use_most_work
    required: true
    options:
      - id: "a"
        label: "Windows"
      - id: "b"
        label: "macOS"
      - id: "c"
        label: "Linux"
      - id: "d"
        label: "ChromeOS"
      - id: "e"
        label: "Same as my personal computer"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "Roughly how many hours per day do you spend actively using a desktop or laptop computer?"
    type: free_text
    construct: roughly_many_hours_per_day
    required: true
  - id: q8
    prompt: "What do you primarily use your main computer for? (Select all that apply)"
    type: multi_choice
    construct: primarily_use_main_computer_select
    required: true
    options:
      - id: "a"
        label: "General web browsing and email"
      - id: "b"
        label: "Office and productivity work"
      - id: "c"
        label: "Software development or programming"
      - id: "d"
        label: "Gaming"
      - id: "e"
        label: "Creative work (photo, video, music, design)"
      - id: "f"
        label: "Media consumption (streaming, reading)"
      - id: "g"
        label: "School or academic work"
      - id: "h"
        label: "Managing finances or personal admin"
      - id: "i"
        label: "Running a home business"
  - id: q9
    prompt: "Which factors matter most when you choose an operating system? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: factors_matter_most_when_choose
    required: true
    options:
      - id: "a"
        label: "Familiarity / what I already know"
      - id: "b"
        label: "Software and app compatibility"
      - id: "c"
        label: "Gaming support"
      - id: "d"
        label: "Price / cost of hardware"
      - id: "e"
        label: "Security and privacy"
      - id: "f"
        label: "Customization and control"
      - id: "g"
        label: "Ecosystem integration with my phone/other devices"
      - id: "h"
        label: "Stability and reliability"
      - id: "i"
        label: "Battery life and performance"
      - id: "j"
        label: "Required for work or school"
  - id: q10
    prompt: "How did you first learn to use your current operating system? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_use_current
    required: true
    options:
      - id: "a"
        label: "Trial and error on my own"
      - id: "b"
        label: "Formal schooling or courses"
      - id: "c"
        label: "Help from friends or family"
      - id: "d"
        label: "Online tutorials and videos"
      - id: "e"
        label: "At a workplace"
      - id: "f"
        label: "Official documentation or help pages"
      - id: "g"
        label: "I have used it so long I don't remember"
  - id: q11
    prompt: "Which of the following do you do on your computer? (Select all that apply)"
    type: multi_choice
    construct: following_computer_select_all_that
    required: true
    options:
      - id: "a"
        label: "Change themes or wallpapers"
      - id: "b"
        label: "Reinstall or wipe the OS from scratch"
      - id: "c"
        label: "Adjust privacy or telemetry settings"
      - id: "d"
        label: "Install third-party or non-store apps"
      - id: "e"
        label: "Use a package manager or app store"
      - id: "f"
        label: "Partition drives or manage storage"
      - id: "g"
        label: "Edit system files or the registry"
      - id: "h"
        label: "None of these"
  - id: q12
    prompt: "How comfortable are you using a command line / terminal?"
    type: single_choice
    construct: comfortable_using_command_line_terminal
    required: true
    options:
      - id: "a"
        label: "Never use it"
      - id: "b"
        label: "Rarely, only when instructions tell me to"
      - id: "c"
        label: "Occasionally for basic tasks"
      - id: "d"
        label: "Regularly and comfortably"
      - id: "e"
        label: "It is my main way of getting things done"
  - id: q13
    prompt: "When a major OS update becomes available, how do you usually handle it?"
    type: single_choice
    construct: when_major_os_update_becomes
    required: true
    options:
      - id: "a"
        label: "Install it as soon as it is offered"
      - id: "b"
        label: "Wait a few weeks and then install"
      - id: "c"
        label: "Install only after I hear it is stable"
      - id: "d"
        label: "Delay or avoid updates as long as possible"
      - id: "e"
        label: "Updates install automatically without my input"
  - id: q14
    prompt: "How often do you run into software you want to use but that is not available on your operating system?"
    type: single_choice
    construct: often_run_into_software_want
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Frequently"
  - id: q15
    prompt: "How do you feel about running more than one operating system (dual-boot or virtual machines)?"
    type: single_choice
    construct: feel_running_more_than_one
    required: true
    options:
      - id: "a"
        label: "I actively run multiple OSes"
      - id: "b"
        label: "I have done it in the past"
      - id: "c"
        label: "I am interested but have not tried"
      - id: "d"
        label: "No interest"
  - id: q16
    prompt: "Have you ever switched from one operating system family to another (e.g. Windows to macOS, or to Linux)?"
    type: single_choice
    construct: have_ever_switched_from_one
    required: true
    options:
      - id: "a"
        label: "Yes, and I am glad I did"
      - id: "b"
        label: "Yes, but I later switched back"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, I have never considered switching"
  - id: q17
    prompt: "Which desktop features do you customize on your main computer? (Select all that apply)"
    type: multi_choice
    construct: desktop_features_customize_main_computer
    required: true
    options:
      - id: "a"
        label: "Wallpaper and themes"
      - id: "b"
        label: "Dark mode / light mode"
      - id: "c"
        label: "Taskbar / dock layout"
      - id: "d"
        label: "Keyboard shortcuts"
      - id: "e"
        label: "Default apps"
      - id: "f"
        label: "Startup programs"
      - id: "g"
        label: "Multiple desktops / workspaces"
      - id: "h"
        label: "I leave settings mostly at defaults"
  - id: q18
    prompt: "How often do you experience each of the following on your primary computer? — The system slows down or becomes unresponsive"
    type: single_choice
