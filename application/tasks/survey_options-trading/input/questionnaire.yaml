schemaVersion: "1.0"
id: options_trading_v1
title: "Options Trading Survey"
description: "How individuals engage with stock and ETF options trading — their strategies, platforms, risk discipline, and outcomes."
questions:
  - id: q0
    prompt: "Have you ever traded options contracts (calls or puts)?"
    type: single_choice
    construct: have_ever_traded_options_contracts
    required: true
    options:
      - id: "a"
        label: "Yes, I trade options regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Yes, but I have stopped"
      - id: "d"
        label: "No, but I am interested in starting"
      - id: "e"
        label: "No, and I am not interested"
      - id: "f"
        label: "I am not familiar with options"
  - id: q1
    prompt: "How long have you been trading options?"
    type: single_choice
    construct: long_have_been_trading_options
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1–3 years"
      - id: "d"
        label: "3–5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "How often do you trade options?"
    type: single_choice
    construct: often_trade_options
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "Several times a week"
      - id: "c"
        label: "About weekly"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "A few times a year"
      - id: "f"
        label: "Rarely or not applicable"
  - id: q3
    prompt: "What options trading approval level does your brokerage account have?"
    type: single_choice
    construct: options_trading_approval_level_does
    required: true
    options:
      - id: "a"
        label: "Level 1 (covered calls, cash-secured puts)"
      - id: "b"
        label: "Level 2 (buying calls and puts)"
      - id: "c"
        label: "Level 3 (spreads)"
      - id: "d"
        label: "Level 4 (naked / uncovered options)"
      - id: "e"
        label: "Not sure"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "Approximately what percentage of your total investment portfolio is allocated to options?"
    type: single_choice
    construct: approximately_percentage_total_investmen
