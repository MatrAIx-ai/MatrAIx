schemaVersion: "1.0"
id: choosing_a_hospital_v1
title: "Choosing a Hospital Survey"
description: "How consumers research, weigh factors, and decide when choosing a hospital for planned care."
questions:
  - id: q0
    prompt: "In the past 3 years, have you needed to choose a hospital for planned care (not an emergency)?"
    type: single_choice
    construct: past_3_years_have_needed
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I have chosen one before"
      - id: "d"
        label: "No, I have never chosen a hospital"
  - id: q1
    prompt: "The most recent time you needed hospital care, how was the hospital chosen?"
    type: single_choice
    construct: most_recent_time_needed_hospital
    required: true
    options:
      - id: "a"
        label: "I chose it myself"
      - id: "b"
        label: "My doctor referred or chose it"
      - id: "c"
        label: "My insurance network decided it"
      - id: "d"
        label: "A family member helped decide"
      - id: "e"
        label: "It was the closest option"
      - id: "f"
        label: "I have not needed hospital care"
  - id: q2
    prompt: "For what type of care did you most recently choose or use a hospital?"
    type: single_choice
    construct: type_care_did_most_recently
    required: true
    options:
      - id: "a"
        label: "A planned surgery or procedure"
      - id: "b"
        label: "Childbirth or maternity care"
      - id: "c"
        label: "A diagnostic test or imaging"
      - id: "d"
        label: "Specialist or outpatient care"
      - id: "e"
        label: "An overnight stay for an illness"
      - id: "f"
        label: "I have not used a hospital recently"
  - id: q3
    prompt: "How far did you travel, or would you travel, for a hospital with better quality?"
    type: single_choice
    construct: far_did_travel_would_travel
    required: true
    options:
      - id: "a"
        label: "I would stay within a few miles"
      - id: "b"
        label: "Up to 30 minutes away"
      - id: "c"
        label: "Up to an hour away"
      - id: "d"
        label: "More than an hour if needed"
      - id: "e"
        label: "I would travel to another city or state"
  - id: q4
    prompt: "Which sources did you use to research hospitals? (Select all that apply)"
    type: multi_choice
    construct: sources_did_use_research_hospitals
    required: true
    options:
      - id: "a"
        label: "My doctor's recommendation"
      - id: "b"
        label: "Friends or family"
      - id: "c"
        label: "Online reviews or ratings"
      - id: "d"
        label: "Hospital quality rating sites (for example, Medicare Care Compare, Leapfrog)"
      - id: "e"
        label: "The hospital's own website"
      - id: "f"
        label: "My insurance company's directory"
      - id: "g"
        label: "News or magazine hospital rankings"
      - id: "h"
        label: "I did not research hospitals"
  - id: q5
    prompt: "How much research did you do before choosing a hospital?"
    type: single_choice
    construct: much_research_did_before_choosing
    required: true
    options:
      - id: "a"
        label: "A great deal"
      - id: "b"
        label: "A fair amount"
      - id: "c"
        label: "A little"
      - id: "d"
        label: "None at all"
  - id: q6
    prompt: "Did you check whether the hospital was in your insurance network?"
    type: single_choice
    construct: did_check_whether_hospital_was
    required: true
    options:
      - id: "a"
        label: "Yes, before deciding"
      - id: "b"
        label: "Yes, but after choosing"
      - id: "c"
        label: "No, I did not check"
      - id: "d"
        label: "I do not have insurance"
  - id: q7
    prompt: "Did you compare more than one hospital before deciding?"
    type: single_choice
    construct: did_compare_more_than_one
    required: true
    options:
      - id: "a"
        label: "Yes, three or more"
      - id: "b"
        label: "Yes, two"
      - id: "c"
        label: "No, I considered only one"
      - id: "d"
        label: "I did not get to choose"
  - id: q8
    prompt: "How important was each factor in choosing a hospital: Quality and safety ratings."
    type: single_choice
    construct: important_was_each_factor_choosing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q9
    prompt: "How important was each factor in choosing a hospital: Distance and convenience."
    type: single_choice
