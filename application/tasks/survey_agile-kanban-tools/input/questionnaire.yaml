schemaVersion: "1.0"
id: agile_kanban_tools_v1
title: "Agile & Kanban Tools Survey"
description: "How software and product teams practice Agile and Kanban and the tools they use to run sprints, boards, and ceremonies."
questions:
  - id: q0
    prompt: "Does your team use an Agile or Kanban approach to manage work?"
    type: single_choice
    construct: does_team_use_agile_kanban
    required: true
    options:
      - id: "a"
        label: "Yes, we follow it closely"
      - id: "b"
        label: "Yes, but loosely"
      - id: "c"
        label: "No, but we're moving toward it"
      - id: "d"
        label: "No, we use a different approach"
  - id: q1
    prompt: "How long have you personally worked with Agile or Kanban methods?"
    type: single_choice
    construct: long_have_personally_worked_agile
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "More than 7 years"
      - id: "e"
        label: "I don't use these methods"
  - id: q2
    prompt: "Which framework best describes how your team works?"
    type: single_choice
    construct: framework_best_describes_team_works
    required: true
    options:
      - id: "a"
        label: "Scrum"
      - id: "b"
        label: "Kanban"
      - id: "c"
        label: "Scrumban (a mix)"
      - id: "d"
        label: "SAFe or another scaled framework"
      - id: "e"
        label: "Custom / homegrown process"
      - id: "f"
        label: "No formal framework"
  - id: q3
    prompt: "How long is a typical sprint or iteration on your team?"
    type: single_choice
    construct: long_typical_sprint_iteration_team
    required: true
    options:
      - id: "a"
        label: "One week"
      - id: "b"
        label: "Two weeks"
      - id: "c"
        label: "Three weeks"
      - id: "d"
        label: "Four weeks or longer"
      - id: "e"
        label: "We use continuous flow (no sprints)"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "Which Agile/Kanban tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: agile_kanban_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Jira"
      - id: "b"
        label: "Azure DevOps (Boards)"
      - id: "c"
        label: "Linear"
      - id: "d"
        label: "GitHub Projects"
      - id: "e"
        label: "Trello"
      - id: "f"
        label: "ClickUp"
      - id: "g"
        label: "Shortcut"
      - id: "h"
        label: "YouTrack"
      - id: "i"
        label: "Monday.com"
      - id: "j"
        label: "Asana"
      - id: "k"
        label: "A physical board or whiteboard"
      - id: "l"
        label: "Other (please specify)"
  - id: q5
    prompt: "Which tool does your team use most often for Agile/Kanban work?"
    type: single_choice
    construct: tool_does_team_use_most
    required: true
    options:
      - id: "a"
        label: "Jira"
      - id: "b"
        label: "Azure DevOps"
      - id: "c"
        label: "Linear"
      - id: "d"
        label: "GitHub Projects"
      - id: "e"
        label: "Trello"
      - id: "f"
        label: "ClickUp"
      - id: "g"
