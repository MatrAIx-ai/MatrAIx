schemaVersion: "1.0"
id: mobile_gaming_v1
title: "Mobile Gaming Survey"
description: "How people play games on smartphones and tablets, including their genres, spending, monetization attitudes, and playing habits."
questions:
  - id: q0
    prompt: "Do you play games on your smartphone or tablet?"
    type: single_choice
    construct: play_games_smartphone_tablet
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, a few times a week"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, I don't play mobile games"
  - id: q1
    prompt: "How long have you been playing mobile games?"
    type: single_choice
    construct: long_have_been_playing_mobile
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 7 years"
      - id: "d"
        label: "8 or more years"
  - id: q2
    prompt: "Which device do you mainly play mobile games on?"
    type: single_choice
    construct: device_mainly_play_mobile_games
    required: true
    options:
      - id: "a"
        label: "Android phone"
      - id: "b"
        label: "iPhone"
      - id: "c"
        label: "Android tablet"
      - id: "d"
        label: "iPad"
      - id: "e"
        label: "A mix of phone and tablet"
  - id: q3
    prompt: "On a typical day, about how much total time do you spend playing mobile games?"
    type: single_choice
    construct: typical_day_much_total_time
    required: true
    options:
      - id: "a"
        label: "Less than 15 minutes"
      - id: "b"
        label: "15 to 30 minutes"
      - id: "c"
        label: "31 to 60 minutes"
      - id: "d"
        label: "1 to 2 hours"
      - id: "e"
        label: "More than 2 hours"
  - id: q4
    prompt: "Roughly how many games do you currently have installed on your device?"
    type: free_text
    construct: roughly_many_games_currently_have
    required: true
  - id: q5
    prompt: "Which genres of mobile games do you play most? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: genres_mobile_games_play_most
    required: true
    options:
      - id: "a"
        label: "Puzzle (e.g., match-3, word games)"
      - id: "b"
        label: "Casual and hyper-casual"
      - id: "c"
        label: "Strategy"
      - id: "d"
        label: "Role-playing games (RPGs)"
      - id: "e"
        label: "Action and shooters"
      - id: "f"
        label: "Battle royale"
      - id: "g"
        label: "Simulation and management"
      - id: "h"
        label: "Card and board games"
      - id: "i"
        label: "Sports and racing"
      - id: "j"
        label: "Idle and clicker games"
      - id: "k"
        label: "Trivia and quiz"
      - id: "l"
        label: "Casino-style (slots, poker)"
  - id: q6
    prompt: "When do you usually play mobile games? (Select all that apply)"
    type: multi_choice
    construct: when_usually_play_mobile_games
    required: true
    options:
      - id: "a"
        label: "Commuting or traveling"
      - id: "b"
        label: "Waiting (lines, appointments)"
      - id: "c"
        label: "On breaks at work or school"
      - id: "d"
        label: "Relaxing at home"
      - id: "e"
        label: "In bed before sleep"
      - id: "f"
        label: "While watching TV"
      - id: "g"
        label: "During downtime throughout the day"
  - id: q7
    prompt: "How do you usually find new mobile games? (Select all that apply)"
    type: multi_choice
    construct: usually_find_new_mobile_games
    required: true
    options:
      - id: "a"
        label: "Browsing the app store"
      - id: "b"
        label: "App store charts or featured lists"
      - id: "c"
        label: "Ads in other games or apps"
      - id: "d"
        label: "Recommendations from friends or family"
      - id: "e"
        label: "Social media"
      - id: "f"
        label: "YouTube or streaming videos"
      - id: "g"
        label: "Reviews or gaming sites"
  - id: q8
    prompt: "Which best describes how you pay for mobile games?"
    type: single_choice
    construct: best_describes_pay_mobile_games
    required: true
    options:
      - id: "a"
        label: "I only play free games and never pay"
      - id: "b"
        label: "I play free games but make in-app purchases"
      - id: "c"
        label: "I pay upfront for some games"
      - id: "d"
        label: "I use a subscription (e.g., Apple Arcade, Google Play Pass)"
      - id: "e"
        label: "A mix of these"
  - id: q9
    prompt: "About how much did you spend on mobile games and in-app purchases in the past year?"
    type: free_text
    construct: much_did_spend_mobile_games
    required: true
  - id: q10
    prompt: "How often do you make in-app purchases in mobile games?"
    type: single_choice
    construct: often_make_app_purchases_mobile
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
  - id: q11
    prompt: "What do you spend money on in mobile games? (Select all that apply)"
    type: multi_choice
    construct: spend_money_mobile_games_select
    required: true
    options:
      - id: "a"
        label: "Removing ads"
      - id: "b"
        label: "In-game currency"
      - id: "c"
        label: "Cosmetic items (skins, outfits)"
      - id: "d"
        label: "Extra lives or continues"
      - id: "e"
        label: "Loot boxes or gacha pulls"
      - id: "f"
        label: "Battle passes or season passes"
      - id: "g"
        label: "Unlocking full versions"
      - id: "h"
        label: "I don't spend money on mobile games"
  - id: q12
    prompt: "How often do you do the following — Play games that require an internet connection"
    type: single_choice
    construct: often_following_play_games_that
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q13
