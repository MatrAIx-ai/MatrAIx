      - id: "b"
        label: "Bug fixes / stability"
      - id: "c"
        label: "New features"
      - id: "d"
        label: "Performance impact"
      - id: "e"
        label: "Risk of breaking something"
      - id: "f"
        label: "How disruptive the install is"
