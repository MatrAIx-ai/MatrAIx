        label: "Back up my data"
      - id: "b"
        label: "Read reviews or wait for others to report issues"
      - id: "c"
        label: "Make sure my device is charged or plugged in"
      - id: "d"
        label: "Free up storage space"
      - id: "e"
        label: "Schedule it for a convenient time"
      - id: "f"
        label: "Nothing in particular"
      - id: "g"
        label: "I don't install major updates"
  - id: q34
