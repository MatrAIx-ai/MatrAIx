        label: "Excited to try the new design"
      - id: "b"
        label: "Neutral — I adapt quickly"
      - id: "c"
        label: "Mildly annoyed but I get used to it"
      - id: "d"
        label: "Frustrated; I prefer things stay the same"
      - id: "e"
