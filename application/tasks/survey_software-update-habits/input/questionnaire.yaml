  - id: q28
    prompt: "When a security-critical patch is released, how quickly do you install it?"
    type: single_choice
    construct: when_security_critical_patch_released
    required: true
    options:
      - id: "a"
        label: "Immediately"
      - id: "b"
        label: "Within a day"
      - id: "c"
        label: "Within a week"
      - id: "d"
        label: "Whenever I get around to it"
      - id: "e"
        label: "I don't distinguish security patches from other updates"
  - id: q29
    prompt: "Do you allow updates to download over cellular / mobile data?"
    type: single_choice
    construct: allow_updates_download_over_cellular
    required: true
    options:
      - id: "a"
        label: "Yes, always"
      - id: "b"
        label: "Only for small or important updates"
      - id: "c"
        label: "No, Wi-Fi only"
      - id: "d"
        label: "I don't know / not applicable"
  - id: q30
    prompt: "Do you keep older devices you no longer actively use updated?"
    type: single_choice
    construct: keep_older_devices_no_longer
    required: true
    options:
      - id: "a"
        label: "Yes, I keep everything updated"
      - id: "b"
        label: "Only the ones still connected to the internet"
      - id: "c"
        label: "No, I stop updating devices I rarely use"
      - id: "d"
