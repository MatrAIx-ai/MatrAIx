schemaVersion: "1.0"
id: software_update_habits_v1
title: "Software Update Habits Survey"
description: "How people approach installing operating system, app, firmware, and security updates across their devices."
questions:
  - id: q0
    prompt: "In general, how do you feel about installing software updates?"
    type: single_choice
    construct: general_feel_installing_software_updates
    required: true
    options:
      - id: "a"
        label: "I install them as soon as they are available"
      - id: "b"
        label: "I install them fairly promptly, but not immediately"
      - id: "c"
        label: "I install them eventually, when I get around to it"
      - id: "d"
        label: "I avoid or delay them as long as I can"
      - id: "e"
        label: "I never think about updates at all"
  - id: q1
    prompt: "How often do you install updates for the operating system on your main computer?"
    type: single_choice
    construct: often_install_updates_operating_system
    required: true
    options:
      - id: "a"
        label: "Automatically, without me doing anything"
      - id: "b"
        label: "As soon as I am notified"
      - id: "c"
        label: "Within a few days of being notified"
      - id: "d"
        label: "Only every few weeks or months"
      - id: "e"
        label: "Only when something stops working"
      - id: "f"
        label: "Rarely or never"
  - id: q2
    prompt: "For which of the following devices do you personally manage or install updates? (Select all that apply)"
    type: multi_choice
    construct: following_devices_personally_manage_inst
    required: true
    options:
      - id: "a"
        label: "Windows PC or laptop"
      - id: "b"
        label: "Mac (macOS)"
      - id: "c"
        label: "Linux computer"
      - id: "d"
        label: "iPhone or iPad"
      - id: "e"
        label: "Android phone or tablet"
      - id: "f"
        label: "Smart TV or streaming device"
      - id: "g"
        label: "Wi-Fi router or mesh system"
      - id: "h"
        label: "Smart home devices (thermostat, doorbell, speakers, etc.)"
      - id: "i"
        label: "Gaming console"
      - id: "j"
        label: "Wearable (smartwatch, fitness band)"
      - id: "k"
        label: "None of these"
  - id: q3
    prompt: "On your main computer, how are operating system updates configured?"
    type: single_choice
    construct: main_computer_operating_system_updates
    required: true
    options:
      - id: "a"
        label: "Fully automatic (download and install on their own)"
      - id: "b"
        label: "Automatic download, but I choose when to install"
      - id: "c"
        label: "Notify me only; I download and install manually"
      - id: "d"
        label: "Updates are disabled or deferred"
      - id: "e"
        label: "I don't know how they are configured"
  - id: q4
    prompt: "How are app updates configured on your primary phone?"
    type: single_choice
    construct: app_updates_configured_primary_phone
    required: true
    options:
      - id: "a"
        label: "Apps update automatically over any connection"
      - id: "b"
        label: "Apps update automatically only on Wi-Fi"
      - id: "c"
        label: "I update apps manually"
      - id: "d"
        label: "I rarely or never update apps"
      - id: "e"
        label: "I don't have a smartphone"
  - id: q5
    prompt: "After you become aware that an operating system update is available, how long do you typically wait before installing it?"
    type: single_choice
    construct: after_become_aware_that_operating
    required: true
    options:
      - id: "a"
        label: "I install it immediately"
      - id: "b"
        label: "Within a day"
      - id: "c"
        label: "Within a week"
      - id: "d"
        label: "Within a month"
      - id: "e"
        label: "Longer than a month"
      - id: "f"
        label: "I wait until I am forced to"
  - id: q6
    prompt: "Which types of updates do you tend to install promptly? (Select all that apply)"
    type: multi_choice
    construct: types_updates_tend_install_promptly
    required: true
    options:
      - id: "a"
        label: "Operating system security patches"
      - id: "b"
        label: "Operating system feature updates"
      - id: "c"
        label: "Web browser updates"
      - id: "d"
        label: "Antivirus / security software updates"
      - id: "e"
        label: "Everyday apps (email, messaging, social)"
      - id: "f"
        label: "Productivity software (office suite, editors)"
      - id: "g"
        label: "Games"
      - id: "h"
        label: "Router or firmware updates"
      - id: "i"
        label: "Driver updates (graphics, printer, etc.)"
      - id: "j"
        label: "None — I delay all of them"
  - id: q7
    prompt: "What are the main reasons you sometimes delay or postpone updates? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_sometimes_delay_postpone
    required: true
    options:
      - id: "a"
        label: "I don't want to interrupt what I'm doing"
      - id: "b"
        label: "I'm worried the update will break something"
      - id: "c"
        label: "Updates take too long to install"
      - id: "d"
        label: "I've had bad experiences with past updates"
      - id: "e"
        label: "I don't want the interface or features to change"
      - id: "f"
        label: "My device slows down after updates"
      - id: "g"
        label: "Limited storage space"
      - id: "h"
        label: "Limited or metered internet connection"
      - id: "i"
        label: "I simply forget"
      - id: "j"
        label: "I don't delay updates"
  - id: q8
    prompt: "What motivates you to install updates when you do? (Select all that apply)"
    type: multi_choice
    construct: motivates_install_updates_when_select
    required: true
    options:
      - id: "a"
        label: "Security and protection from threats"
      - id: "b"
        label: "Bug fixes and stability"
      - id: "c"
        label: "New features"
      - id: "d"
        label: "Performance improvements"
      - id: "e"
        label: "A persistent notification or reminder"
      - id: "f"
        label: "An app stops working until I update"
      - id: "g"
        label: "Recommendation from a friend, article, or IT department"
      - id: "h"
        label: "I just like being on the latest version"
  - id: q9
    prompt: "How do you usually find out that an update is available? (Select all that apply)"
    type: multi_choice
    construct: usually_find_out_that_update
    required: true
    options:
      - id: "a"
        label: "Automatic pop-up or system notification"
      - id: "b"
        label: "A badge or banner inside an app or store"
      - id: "c"
        label: "I check for updates manually"
      - id: "d"
        label: "News articles or tech websites"
      - id: "e"
        label: "Social media or online communities"
      - id: "f"
        label: "Friends, family, or coworkers"
      - id: "g"
        label: "My workplace IT department"
      - id: "h"
        label: "I usually don't find out until something breaks"
  - id: q10
    prompt: "How often do you read the release notes or changelog before installing an update?"
    type: single_choice
    construct: often_read_release_notes_changelog
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q11
    prompt: "Have you ever had a software update cause a problem on one of your devices?"
    type: single_choice
    construct: have_ever_had_software_update
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, never"
      - id: "d"
        label: "I'm not sure"
  - id: q12
    prompt: "Which problems have you experienced after installing an update? (Select all that apply)"
    type: multi_choice
    construct: problems_have_experienced_after_installi
    required: true
    options:
      - id: "a"
        label: "Device or app became slower"
      - id: "b"
        label: "An app or feature stopped working"
      - id: "c"
        label: "Lost or changed settings"
      - id: "d"
        label: "Battery drained faster"
      - id: "e"
        label: "Interface changed in a way I disliked"
      - id: "f"
        label: "Device would not restart properly"
      - id: "g"
        label: "Lost compatibility with other hardware or software"
      - id: "h"
        label: "Data loss"
      - id: "i"
        label: "I have never had a problem"
  - id: q13
    prompt: "How do you typically respond when an update requires a device restart?"
    type: single_choice
    construct: typically_respond_when_update_requires
    required: true
    options:
      - id: "a"
        label: "I restart right away"
      - id: "b"
        label: "I restart at the next natural break"
      - id: "c"
        label: "I schedule it for later (overnight, end of day)"
      - id: "d"
        label: "I postpone it repeatedly for as long as possible"
      - id: "e"
        label: "I ignore it until forced"
  - id: q14
    prompt: "Approximately how many devices do you personally keep updated?"
    type: free_text
    construct: approximately_many_devices_personally_ke
    required: true
  - id: q15
    prompt: "In a typical month, about how many times do you skip, postpone, or dismiss an update notification?"
    type: free_text
    construct: typical_month_many_times_skip
    required: true
  - id: q16
    prompt: "How much do you agree with the following statement: Keeping my software up to date is essential for security."
    type: single_choice
    construct: much_agree_following_statement_keeping
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: I generally trust that updates will not break my devices."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement: Update notifications are an annoying interruption."
    type: single_choice
    construct: much_agree_following_statement_update
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement: I tend to put off updates longer than I probably should."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree with the following statement: Automatic updates are the best approach for most people."
    type: single_choice
    construct: much_agree_following_statement_automatic
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q21
    prompt: "How much do you agree with the following statement: I worry that updates make my older devices run more slowly."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q22
    prompt: "How often do you update the following: the operating system on your main computer?"
    type: single_choice
    construct: often_update_following_operating_system
    required: true
    options:
      - id: "a"
        label: "Automatically / continuously"
      - id: "b"
        label: "Within days of release"
      - id: "c"
        label: "Every few weeks"
      - id: "d"
        label: "Every few months"
      - id: "e"
        label: "Rarely or never"
  - id: q23
    prompt: "How often do you update the following: the operating system on your phone?"
    type: single_choice
    construct: often_update_following_operating_system
    required: true
    options:
      - id: "a"
        label: "Automatically / continuously"
      - id: "b"
        label: "Within days of release"
      - id: "c"
        label: "Every few weeks"
      - id: "d"
        label: "Every few months"
      - id: "e"
        label: "Rarely or never"
  - id: q24
    prompt: "How often do you update the following: the apps on your phone?"
    type: single_choice
    construct: often_update_following_apps_phone
    required: true
    options:
      - id: "a"
        label: "Automatically / continuously"
      - id: "b"
        label: "Within days of release"
      - id: "c"
        label: "Every few weeks"
      - id: "d"
        label: "Every few months"
      - id: "e"
        label: "Rarely or never"
  - id: q25
    prompt: "How often do you update the following: your web browser?"
    type: single_choice
    construct: often_update_following_web_browser
    required: true
    options:
      - id: "a"
        label: "Automatically / continuously"
      - id: "b"
        label: "Within days of release"
      - id: "c"
        label: "Every few weeks"
      - id: "d"
        label: "Every few months"
      - id: "e"
