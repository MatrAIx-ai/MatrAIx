schemaVersion: "1.0"
id: urgent_care_usage_v1
title: "Urgent Care Usage Survey"
description: "When and how people use urgent care and walk-in clinics for non-emergency needs."
questions:
  - id: q0
    prompt: "Have you visited an urgent care or walk-in clinic in the past 12 months?"
    type: single_choice
    construct: have_visited_urgent_care_walk
    required: true
    options:
      - id: "a"
        label: "Yes, once"
      - id: "b"
        label: "Yes, 2 to 3 times"
      - id: "c"
        label: "Yes, 4 or more times"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "About how many times have you visited urgent care in the past 24 months? Please enter a number."
    type: free_text
    construct: many_times_have_visited_urgent
    required: true
  - id: q2
    prompt: "What type of urgent care do you most often use?"
    type: single_choice
    construct: type_urgent_care_most_often
    required: true
    options:
      - id: "a"
        label: "A standalone urgent care center"
      - id: "b"
        label: "A retail clinic in a pharmacy or store (for example CVS MinuteClinic)"
      - id: "c"
        label: "A hospital-affiliated urgent care"
      - id: "d"
        label: "A virtual or online urgent care service"
      - id: "e"
        label: "I have not used urgent care"
  - id: q3
    prompt: "For which of the following reasons have you used urgent care? (Select all that apply)"
    type: multi_choice
    construct: following_reasons_have_used_urgent
    required: true
    options:
      - id: "a"
        label: "A minor injury such as a sprain or small cut"
      - id: "b"
        label: "A cold, flu, or sore throat"
      - id: "c"
        label: "An ear or sinus infection"
      - id: "d"
        label: "A rash or minor skin issue"
      - id: "e"
        label: "A prescription refill"
      - id: "f"
        label: "A vaccine or test"
      - id: "g"
        label: "A minor issue when my regular doctor was unavailable"
  - id: q4
    prompt: "What are the main reasons you choose urgent care instead of your primary care doctor? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_choose_urgent_care
    required: true
    options:
      - id: "a"
        label: "My doctor had no available appointments"
      - id: "b"
        label: "It was after hours or a weekend"
      - id: "c"
        label: "It was more convenient"
      - id: "d"
        label: "Shorter wait to be seen"
      - id: "e"
        label: "Lower cost than the emergency room"
      - id: "f"
        label: "No appointment needed"
      - id: "g"
        label: "I do not have a regular doctor"
  - id: q5
    prompt: "How do you usually decide between urgent care and the emergency room?"
    type: single_choice
    construct: usually_decide_between_urgent_care
    required: true
    options:
      - id: "a"
        label: "Based on how severe the problem feels"
      - id: "b"
        label: "Based on cost"
      - id: "c"
        label: "Based on wait time"
      - id: "d"
        label: "Based on what is open"
      - id: "e"
        label: "I check online or call a nurse line"
      - id: "f"
        label: "I am often unsure"
  - id: q6
    prompt: "How did you get to your most recent urgent care visit?"
    type: single_choice
    construct: did_get_most_recent_urgent
    required: true
    options:
      - id: "a"
        label: "Personal vehicle"
      - id: "b"
        label: "Someone drove me"
      - id: "c"
        label: "Public transit"
      - id: "d"
        label: "Ride share or taxi"
      - id: "e"
        label: "Walking"
  - id: q7
    prompt: "At your most recent urgent care visit, about how many minutes did you wait before being seen? Please enter a number."
    type: free_text
    construct: most_recent_urgent_care_visit
    required: true
  - id: q8
    prompt: "How did you pay for your most recent urgent care visit?"
    type: single_choice
    construct: did_pay_most_recent_urgent
    required: true
    options:
      - id: "a"
        label: "Insurance with a copay"
      - id: "b"
        label: "Insurance, still waiting for the bill"
      - id: "c"
        label: "Paid fully out of pocket"
      - id: "d"
        label: "It was fully covered"
      - id: "e"
        label: "I don't remember"
  - id: q9
    prompt: "Which are the top 3 things that matter most to you when choosing an urgent care location? (Select all that apply)"
    type: multi_choice
    construct: top_3_things_that_matter
    required: true
    options:
      - id: "a"
        label: "Short wait time"
      - id: "b"
        label: "Close location"
      - id: "c"
        label: "Accepts my insurance"
      - id: "d"
        label: "Low cost"
      - id: "e"
        label: "Open evenings or weekends"
      - id: "f"
        label: "Good reviews"
      - id: "g"
        label: "Able to book online ahead"
      - id: "h"
        label: "Range of services offered"
  - id: q10
    prompt: "How satisfied were you with each of the following at your most recent urgent care visit — The wait time"
    type: single_choice
    construct: satisfied_were_each_following_most
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q11
    prompt: "How satisfied were you with each of the following at your most recent urgent care visit — The cleanliness of the facility"
    type: single_choice
    construct: satisfied_were_each_following_most
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q12
    prompt: "How satisfied were you with each of the following at your most recent urgent care visit — The friendliness of the staff"
    type: single_choice
    construct: satisfied_were_each_following_most
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q13
    prompt: "How satisfied were you with each of the following at your most recent urgent care visit — The quality of care you received"
    type: single_choice
    construct: satisfied_were_each_following_most
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q14
    prompt: "How satisfied were you with each of the following at your most recent urgent care visit — The clarity of the cost or bill"
    type: single_choice
    construct: satisfied_were_each_following_most
    required: true
    options:
      - id: "a"
