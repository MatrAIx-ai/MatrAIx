transport: external_http
runtimeDefaults:
  applicationId: clinic_booking_bot
  applicationContext: clinic_booking
  domain: clinic_booking
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_CLINIC
  legacyBaseUrlEnv: CLINIC_CHATBOT_URL
  baseUrl: http://clinic-booking-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: clinic_booking_bot
      applicationContext: clinic_booking
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested appointment slots
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
