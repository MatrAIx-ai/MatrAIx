schemaVersion: "1.0"
id: tax_filing_behavior_v1
title: "Tax Filing Behavior Survey"
description: "How individuals prepare and file their income taxes, and their attitudes toward the process."
questions:
  - id: q0
    prompt: "Did you file a federal income tax return for the most recent tax year?"
    type: single_choice
    construct: did_file_federal_income_tax
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, I was not required to"
      - id: "c"
        label: "No, but I should have"
      - id: "d"
        label: "I'm not sure"
  - id: q1
    prompt: "How did you file (or plan to file) your most recent federal tax return?"
    type: single_choice
    construct: did_file_plan_file_most
    required: true
    options:
      - id: "a"
        label: "Tax software I used myself (e.g., TurboTax, H&R Block, FreeTaxUSA)"
      - id: "b"
        label: "A paid tax professional or accountant"
      - id: "c"
        label: "IRS Free File or a free service (e.g., VITA)"
      - id: "d"
        label: "Paper forms by mail"
      - id: "e"
        label: "Someone else (family or friend) filed it for me"
  - id: q2
    prompt: "How many years have you been filing your own taxes?"
    type: single_choice
    construct: many_years_have_been_filing
    required: true
    options:
      - id: "a"
        label: "This is my first year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 9 years"
      - id: "d"
        label: "10 to 20 years"
      - id: "e"
        label: "More than 20 years"
  - id: q3
    prompt: "How complex are your taxes?"
    type: single_choice
    construct: complex_taxes
    required: true
    options:
      - id: "a"
        label: "Very simple (single W-2, standard deduction)"
      - id: "b"
        label: "Somewhat simple"
      - id: "c"
        label: "Moderately complex"
      - id: "d"
        label: "Very complex (business, rentals, investments, multiple states)"
  - id: q4
    prompt: "Which of the following applied to your most recent tax return? (Select all that apply)"
    type: multi_choice
    construct: following_applied_most_recent_tax
    required: true
    options:
      - id: "a"
        label: "W-2 wage income"
      - id: "b"
        label: "Self-employment or gig income"
      - id: "c"
        label: "Investment or capital-gains income"
      - id: "d"
        label: "Rental property income"
      - id: "e"
        label: "Itemized deductions"
      - id: "f"
        label: "Child tax credit or dependents"
      - id: "g"
        label: "Student loan interest deduction"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "Did you take the standard deduction or itemize?"
    type: single_choice
    construct: did_take_standard_deduction_itemize
    required: true
    options:
      - id: "a"
        label: "Took the standard deduction"
      - id: "b"
        label: "Itemized deductions"
      - id: "c"
        label: "I don't know"
  - id: q6
    prompt: "What was the result of your most recent federal return?"
    type: single_choice
    construct: was_result_most_recent_federal
    required: true
    options:
      - id: "a"
        label: "I got a refund"
      - id: "b"
        label: "I owed money"
      - id: "c"
        label: "It came out about even"
      - id: "d"
        label: "I don't remember"
  - id: q7
    prompt: "Approximately how large was your most recent federal refund or amount owed? Enter a dollar amount (enter 0 if even)."
    type: free_text
    construct: approximately_large_was_most_recent
    required: true
  - id: q8
    prompt: "How do you typically use your tax refund?"
    type: single_choice
    construct: typically_use_tax_refund
    required: true
    options:
      - id: "a"
        label: "Pay down debt"
      - id: "b"
        label: "Add to savings or emergency fund"
      - id: "c"
        label: "Cover everyday bills and expenses"
      - id: "d"
        label: "Make a large purchase"
      - id: "e"
        label: "Invest it"
      - id: "f"
        label: "I don't usually get a refund"
  - id: q9
    prompt: "When do you usually file your taxes?"
    type: single_choice
    construct: when_usually_file_taxes
    required: true
    options:
      - id: "a"
        label: "As soon as I have my documents (January–February)"
      - id: "b"
        label: "In March"
      - id: "c"
        label: "In early-to-mid April"
      - id: "d"
        label: "Right at the deadline"
      - id: "e"
        label: "I file for an extension"
  - id: q10
    prompt: "How much do you agree with the following statement: Filing my taxes is stressful."
    type: single_choice
    construct: much_agree_following_statement_filing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: I understand how my taxes are calculated."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: The tax filing process is too complicated."
    type: single_choice
    construct: much_agree_following_statement_tax
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I am confident my return was accurate."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I worry about being audited by the IRS."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How confident are you that you claimed all the deductions and credits you were entitled to?"
    type: single_choice
    construct: confident_that_claimed_all_deductions
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q16
    prompt: "Which are the top 3 things you care about most when filing taxes? (Select all that apply)"
    type: multi_choice
    construct: top_3_things_care_most
    required: true
    options:
      - id: "a"
        label: "Maximizing my refund"
      - id: "b"
        label: "Accuracy and avoiding mistakes"
      - id: "c"
        label: "Low cost to file"
      - id: "d"
        label: "Speed and convenience"
      - id: "e"
        label: "Avoiding an audit"
      - id: "f"
        label: "Getting expert help when needed"
      - id: "g"
        label: "Filing electronically"
      - id: "h"
        label: "Understanding my return"
      - id: "i"
        label: "Data security and privacy"
  - id: q17
    prompt: "How much did you pay to file your most recent tax return (software, preparer, or fees)? Enter a dollar amount (enter 0 if free)."
    type: free_text
    construct: much_did_pay_file_most
    required: true
  - id: q18
    prompt: "Did you do anything during the year specifically to lower your tax bill (e.g., retirement contributions, charitable giving, tax-loss harvesting)?"
    type: single_choice
    construct: did_anything_during_year_specifically
    required: true
    options:
      - id: "a"
        label: "Yes, actively planned around taxes"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I'm not sure"
  - id: q19
    prompt: "How often do you receive a notice or letter from the IRS?"
    type: single_choice
    construct: often_receive_notice_letter_from
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Frequently"
  - id: q20
    prompt: "Have you ever been audited by the IRS?"
    type: single_choice
    construct: have_ever_been_audited_by
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I'm not sure"
  - id: q21
    prompt: "Do you file state income taxes in addition to federal?"
    type: single_choice
    construct: file_state_income_taxes_addition
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, my state has no income tax"
      - id: "c"
        label: "No, I wasn't required to"
      - id: "d"
        label: "I'm not sure"
  - id: q22
    prompt: "Where do you turn first when you have a tax question?"
    type: single_choice
    construct: where_turn_first_when_have
    required: true
    options:
      - id: "a"
        label: "Tax software help or FAQs"
      - id: "b"
        label: "The IRS website"
      - id: "c"
        label: "A tax professional"
      - id: "d"
        label: "Family or friends"
      - id: "e"
        label: "Online search or forums"
      - id: "f"
        label: "Social media or influencers"
  - id: q23
    prompt: "How much do you agree: I would pay more for help if it meant a larger refund or fewer mistakes."
    type: single_choice
    construct: much_agree_i_would_pay
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q24
    prompt: "How satisfied were you with your overall tax-filing experience this year?"
    type: single_choice
    construct: satisfied_were_overall_tax_filing
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q25
    prompt: "How likely are you to file the same way next year?"
    type: single_choice
    construct: likely_file_same_way_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q26
    prompt: "How likely are you to switch to a different filing method next year (software, preparer, or free service)?"
    type: single_choice
    construct: likely_switch_different_filing_method
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q27
    prompt: "If you have any final thoughts about filing your taxes, please share them here (optional)."
    type: free_text
    construct: if_have_any_final_thoughts
    required: false
  - id: q28
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18–24"
      - id: "b"
        label: "25–34"
      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65 or older"
  - id: q29
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Man"
      - id: "b"
        label: "Woman"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q30
    prompt: "Which of the following best describes your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: following_best_describes_race_ethnicity
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "American Indian or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or other Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your total annual household income before taxes?"
    type: single_choice
    construct: total_annual_household_income_before
    required: true
    options:
      - id: "a"
        label: "Under $25,000"
      - id: "b"
        label: "$25,000–$49,999"
      - id: "c"
        label: "$50,000–$74,999"
      - id: "d"
        label: "$75,000–$99,999"
      - id: "e"
        label: "$100,000–$149,999"
      - id: "f"
        label: "$150,000–$199,999"
      - id: "g"
        label: "$200,000 or more"
      - id: "h"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "High school diploma or GED"
      - id: "c"
        label: "Some college, no degree"
      - id: "d"
        label: "Associate degree"
      - id: "e"
        label: "Bachelor's degree"
      - id: "f"
        label: "Graduate or professional degree"
  - id: q33
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Unemployed and looking for work"
      - id: "e"
        label: "Not in the labor force (student, homemaker)"
      - id: "f"
        label: "Retired"
      - id: "g"
        label: "Unable to work"
  - id: q34
    prompt: "Including yourself, how many people live in your household? Enter a number."
    type: free_text
    construct: including_yourself_many_people_live
    required: true
  - id: q35
    prompt: "How many children under 18 live in your household? Enter a number."
    type: free_text
    construct: many_children_under_18_live
    required: true
  - id: q36
    prompt: "What is your marital status?"
    type: single_choice
    construct: marital_status
    required: true
    options:
      - id: "a"
        label: "Married"
      - id: "b"
        label: "Living with a partner"
      - id: "c"
        label: "Divorced"
      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Separated"
      - id: "f"
        label: "Single, never married"
  - id: q37
    prompt: "Which region of the United States do you live in?"
    type: single_choice
    construct: region_united_states_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
      - id: "d"
        label: "West"
  - id: q38
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q39
    prompt: "Do you own or rent your home?"
    type: single_choice
    construct: own_rent_home
    required: true
    options:
      - id: "a"
        label: "Own"
      - id: "b"
        label: "Rent"
      - id: "c"
        label: "Other arrangement"
  - id: q40
    prompt: "Which best describes your main source of income last year?"
    type: single_choice
    construct: best_describes_main_source_income
    required: true
    options:
      - id: "a"
        label: "W-2 wages from an employer"
      - id: "b"
        label: "Self-employment or 1099 income"
      - id: "c"
        label: "A mix of W-2 and self-employment"
      - id: "d"
        label: "Retirement or Social Security income"
      - id: "e"
        label: "Investment income"
      - id: "f"
        label: "No income"
