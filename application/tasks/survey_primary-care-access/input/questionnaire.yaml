      - id: "c"
        label: "Neither satisfied nor dissatisfied"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q22
    prompt: "On a scale of 0 to 10, how likely are you to recommend your primary care provider to a friend or family member? (0 = not at all likely, 10 = extremely likely)"
