schemaVersion: "1.0"
id: primary_care_access_v1
title: "Primary Care Access Survey"
description: "How easily a person can reach, schedule, and use a regular primary care provider."
questions:
  - id: q0
    prompt: "Do you currently have a personal doctor or primary care provider (PCP) you usually go to?"
    type: single_choice
    construct: currently_have_personal_doctor_primary
    required: true
    options:
      - id: "a"
        label: "Yes, one specific person"
      - id: "b"
        label: "Yes, a clinic or practice but not one specific person"
      - id: "c"
        label: "No, I do not have a usual provider"
      - id: "d"
        label: "Not sure"
  - id: q1
    prompt: "How long have you been with your current primary care provider or practice?"
    type: single_choice
    construct: long_have_been_current_primary
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
      - id: "e"
        label: "I do not have a current provider"
  - id: q2
    prompt: "What type of place do you usually go to for primary care?"
    type: single_choice
    construct: type_place_usually_go_primary
    required: true
    options:
      - id: "a"
        label: "Private doctor's office"
      - id: "b"
        label: "Community health center or clinic"
      - id: "c"
        label: "Hospital-affiliated clinic"
      - id: "d"
        label: "Retail or pharmacy clinic (for example CVS MinuteClinic)"
      - id: "e"
        label: "Urgent care center"
      - id: "f"
        label: "VA or military facility"
      - id: "g"
        label: "I do not have a usual place"
  - id: q3
    prompt: "Which of the following do you use to book a primary care appointment? (Select all that apply)"
    type: multi_choice
    construct: following_use_book_primary_care
    required: true
    options:
      - id: "a"
        label: "Calling the office by phone"
      - id: "b"
        label: "An online patient portal (for example MyChart)"
      - id: "c"
        label: "A mobile app"
      - id: "d"
        label: "Website scheduling form"
      - id: "e"
        label: "Walking in without an appointment"
      - id: "f"
        label: "Asking a family member to schedule for me"
  - id: q4
    prompt: "About how many miles do you usually travel to reach your primary care provider? Please enter a number."
    type: free_text
    construct: many_miles_usually_travel_reach
    required: true
  - id: q5
    prompt: "How do you usually travel to your primary care appointments?"
    type: single_choice
    construct: usually_travel_primary_care_appointments
    required: true
    options:
      - id: "a"
        label: "Personal vehicle"
      - id: "b"
        label: "Public transit"
      - id: "c"
        label: "Ride share or taxi"
      - id: "d"
        label: "Walking or cycling"
      - id: "e"
        label: "Someone drives me"
  - id: q6
    prompt: "When you need a routine (non-urgent) appointment, how long does it usually take to get one?"
    type: single_choice
    construct: when_need_routine_non_urgent
    required: true
    options:
      - id: "a"
        label: "Same day or next day"
      - id: "b"
        label: "Within a week"
      - id: "c"
        label: "1 to 2 weeks"
      - id: "d"
        label: "3 to 4 weeks"
      - id: "e"
        label: "More than a month"
  - id: q7
    prompt: "When you are sick and need to be seen soon, how easily can you get a same-week appointment with your primary care provider?"
    type: single_choice
    construct: when_sick_need_be_seen
    required: true
    options:
      - id: "a"
        label: "Very easily"
      - id: "b"
        label: "Somewhat easily"
      - id: "c"
        label: "Somewhat difficult"
      - id: "d"
        label: "Very difficult"
      - id: "e"
        label: "I would not try my PCP for this"
  - id: q8
    prompt: "About how many times did you visit a primary care provider in the past 12 months? Please enter a number."
    type: free_text
    construct: many_times_did_visit_primary
    required: true
  - id: q9
    prompt: "How do you usually reach care when your primary care office is closed?"
    type: single_choice
    construct: usually_reach_care_when_primary
    required: true
    options:
      - id: "a"
        label: "Wait until the office reopens"
      - id: "b"
        label: "Call a nurse or after-hours line"
      - id: "c"
        label: "Use telehealth or a virtual visit"
      - id: "d"
        label: "Go to urgent care"
      - id: "e"
        label: "Go to the emergency room"
      - id: "f"
        label: "I am not sure what to do"
  - id: q10
    prompt: "Which of these have been barriers to getting primary care when you needed it? (Select all that apply)"
    type: multi_choice
    construct: these_have_been_barriers_getting
    required: true
    options:
      - id: "a"
        label: "The cost or my copay"
      - id: "b"
        label: "No appointments available soon enough"
      - id: "c"
        label: "Office hours do not fit my schedule"
      - id: "d"
        label: "Difficulty getting time off work"
      - id: "e"
        label: "Transportation problems"
      - id: "f"
        label: "Long wait once I arrive"
      - id: "g"
        label: "Trouble finding a provider taking new patients"
      - id: "h"
        label: "I have not had barriers"
  - id: q11
    prompt: "In the past 12 months, did you delay or skip primary care you felt you needed?"
    type: single_choice
    construct: past_12_months_did_delay
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
  - id: q12
    prompt: "Which are the top 3 things you care about most when choosing where to get primary care? (Select all that apply)"
    type: multi_choice
    construct: top_3_things_care_most
    required: true
    options:
      - id: "a"
        label: "Short wait for an appointment"
      - id: "b"
        label: "Location close to home or work"
      - id: "c"
        label: "Accepts my insurance"
      - id: "d"
        label: "Low out-of-pocket cost"
      - id: "e"
        label: "Seeing the same provider each time"
      - id: "f"
        label: "Evening or weekend hours"
      - id: "g"
        label: "Offers telehealth"
      - id: "h"
        label: "Good online reviews"
  - id: q13
    prompt: "How much do you agree or disagree with the following statement about your primary care — I can get an appointment when I need one"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree with the following statement about your primary care — The office hours fit my schedule"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree with the following statement about your primary care — It is easy to reach the office by phone"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree with the following statement about your primary care — I can afford the cost of my visits"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree with the following statement about your primary care — I usually see the same provider each time"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree or disagree with the following statement about your primary care — My provider's office is easy to get to"
    type: single_choice
    construct: much_agree_disagree_following_statement
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How often do you put off calling your primary care office because it feels like too much hassle?"
