      - id: "b"
        label: "External webcam"
      - id: "c"
        label: "Headset or earbuds"
      - id: "d"
        label: "External microphone"
      - id: "e"
        label: "External speakers"
      - id: "f"
        label: "Ring light or dedicated lighting"
      - id: "g"
        label: "Second monitor"
  - id: q11
