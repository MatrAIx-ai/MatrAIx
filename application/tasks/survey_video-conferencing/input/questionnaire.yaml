schemaVersion: "1.0"
id: video_conferencing_v1
title: "Video Conferencing Survey"
description: "How people use video conferencing tools for meetings and calls — which tools they choose, how they run meetings, and how video calls affect their workday."
questions:
  - id: q0
    prompt: "Do you use video conferencing tools?"
    type: single_choice
    construct: use_video_conferencing_tools
    required: true
    options:
      - id: "a"
        label: "Yes, for work and personal use"
      - id: "b"
        label: "Yes, mostly for work"
      - id: "c"
        label: "Yes, mostly for personal use"
      - id: "d"
        label: "No, I rarely or never use them"
  - id: q1
    prompt: "How long have you regularly used video conferencing tools?"
    type: single_choice
    construct: long_have_regularly_used_video
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 6 years"
      - id: "d"
        label: "More than 6 years"
      - id: "e"
        label: "I don't use them"
  - id: q2
    prompt: "On a typical workday, about how many video meetings do you attend? Enter a whole number."
    type: free_text
    construct: typical_workday_many_video_meetings
    required: true
  - id: q3
    prompt: "Which video conferencing tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: video_conferencing_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Zoom"
      - id: "b"
        label: "Microsoft Teams"
      - id: "c"
        label: "Google Meet"
      - id: "d"
        label: "Cisco Webex"
      - id: "e"
        label: "GoTo Meeting"
      - id: "f"
        label: "Whereby"
      - id: "g"
        label: "Discord"
      - id: "h"
        label: "FaceTime"
      - id: "i"
        label: "Slack huddles / calls"
      - id: "j"
        label: "Other (please specify)"
  - id: q4
    prompt: "Which video conferencing tool do you use most often?"
    type: single_choice
    construct: video_conferencing_tool_use_most
    required: true
    options:
      - id: "a"
        label: "Zoom"
      - id: "b"
        label: "Microsoft Teams"
      - id: "c"
        label: "Google Meet"
      - id: "d"
        label: "Cisco Webex"
      - id: "e"
        label: "FaceTime"
      - id: "f"
        label: "Another tool"
  - id: q5
    prompt: "For what do you use video conferencing? (Select all that apply)"
    type: multi_choice
    construct: use_video_conferencing_select_all
    required: true
    options:
      - id: "a"
        label: "Internal team meetings"
      - id: "b"
        label: "One-on-one meetings"
      - id: "c"
        label: "Client or customer calls"
      - id: "d"
        label: "Webinars or large presentations"
      - id: "e"
        label: "Interviews"
      - id: "f"
        label: "Training or education"
      - id: "g"
        label: "Personal / social calls"
      - id: "h"
        label: "Telehealth or appointments"
      - id: "i"
        label: "Other (please specify)"
  - id: q6
    prompt: "How do you usually join video meetings?"
    type: single_choice
    construct: usually_join_video_meetings
    required: true
    options:
      - id: "a"
        label: "Desktop app"
      - id: "b"
        label: "Web browser"
      - id: "c"
        label: "Mobile app"
      - id: "d"
        label: "Dedicated conference room system"
      - id: "e"
        label: "Phone dial-in (audio only)"
  - id: q7
    prompt: "Which features do you regularly use? (Select all that apply)"
    type: multi_choice
    construct: features_regularly_use_select_all
    required: true
    options:
