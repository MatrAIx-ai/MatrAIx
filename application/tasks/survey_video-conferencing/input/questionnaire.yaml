        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I'm interested"
      - id: "d"
        label: "No, and I'm not interested"
  - id: q10
    prompt: "What equipment do you typically use for video calls? (Select all that apply)"
    type: multi_choice
