        label: "Screen sharing"
      - id: "b"
        label: "Chat during meetings"
      - id: "c"
        label: "Virtual backgrounds or blur"
      - id: "d"
        label: "Recording"
      - id: "e"
        label: "Breakout rooms"
      - id: "f"
        label: "Reactions or hand-raise"
      - id: "g"
        label: "Live captions or transcription"
      - id: "h"
        label: "Whiteboard"
      - id: "i"
        label: "Polls or Q&A"
      - id: "j"
        label: "AI meeting summaries or notes"
  - id: q8
    prompt: "How often do you turn your camera on during work meetings?"
    type: single_choice
    construct: often_turn_camera_during_work
    required: true
    options:
