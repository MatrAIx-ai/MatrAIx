schemaVersion: "1.0"
id: treasury_bond_investing_v1
title: "Treasury Bond Investing Survey"
description: "How people invest in U.S. Treasury securities — bills, notes, bonds, TIPS, and savings bonds — for safety, income, and diversification."
questions:
  - id: q0
    prompt: "How familiar are you with U.S. Treasury securities as an investment?"
    type: single_choice
    construct: familiar_u_s_treasury_securities
    required: true
    options:
      - id: "a"
        label: "Not at all familiar"
      - id: "b"
        label: "Slightly familiar"
      - id: "c"
        label: "Moderately familiar"
      - id: "d"
        label: "Very familiar"
  - id: q1
    prompt: "Do you currently own any U.S. Treasury securities?"
    type: single_choice
    construct: currently_own_any_u_s
    required: true
    options:
      - id: "a"
        label: "Yes, directly"
      - id: "b"
        label: "Yes, through a bond fund or ETF"
      - id: "c"
        label: "Yes, both directly and through funds"
      - id: "d"
        label: "No, but I've owned them before"
      - id: "e"
        label: "No, and I never have"
  - id: q2
    prompt: "Which types of Treasury securities are you aware of? (Select all that apply)"
    type: multi_choice
    construct: types_treasury_securities_aware_select
    required: true
    options:
      - id: "a"
        label: "Treasury bills (T-bills)"
      - id: "b"
        label: "Treasury notes (T-notes)"
      - id: "c"
        label: "Treasury bonds (T-bonds)"
      - id: "d"
        label: "Treasury Inflation-Protected Securities (TIPS)"
      - id: "e"
        label: "Series I savings bonds (I bonds)"
      - id: "f"
        label: "Series EE savings bonds"
      - id: "g"
        label: "I'm not aware of any specific types"
  - id: q3
    prompt: "Which types of Treasury securities do you currently own? (Select all that apply)"
    type: multi_choice
    construct: types_treasury_securities_currently_own
    required: true
    options:
      - id: "a"
        label: "Treasury bills (T-bills)"
      - id: "b"
        label: "Treasury notes (T-notes)"
      - id: "c"
        label: "Treasury bonds (T-bonds)"
      - id: "d"
        label: "TIPS"
      - id: "e"
        label: "I bonds"
      - id: "f"
        label: "EE bonds"
      - id: "g"
        label: "Treasury bond funds or ETFs"
      - id: "h"
        label: "I don't own any"
  - id: q4
    prompt: "How do you (or would you) buy Treasury securities? (Select all that apply)"
    type: multi_choice
    construct: would_buy_treasury_securities_select
    required: true
    options:
      - id: "a"
        label: "Directly through TreasuryDirect.gov"
      - id: "b"
        label: "Through a brokerage (e.g., Fidelity, Vanguard, Schwab)"
      - id: "c"
        label: "Through a bond mutual fund or ETF"
      - id: "d"
        label: "Through a financial advisor"
      - id: "e"
        label: "I don't buy them"
  - id: q5
    prompt: "What is the main reason you invest (or would invest) in Treasuries?"
    type: single_choice
    construct: main_reason_invest_would_invest
    required: true
    options:
      - id: "a"
        label: "Safety of principal"
      - id: "b"
        label: "Steady, predictable interest income"
      - id: "c"
        label: "Diversifying away from stocks"
      - id: "d"
        label: "Protection against inflation (e.g., TIPS or I bonds)"
      - id: "e"
        label: "Higher yields than a savings account"
      - id: "f"
        label: "I don't invest in Treasuries"
  - id: q6
    prompt: "Roughly how much do you currently have invested in Treasury securities? Please enter a dollar amount."
    type: free_text
    construct: roughly_much_currently_have_invested
    required: true
  - id: q7
    prompt: "What yield do you consider attractive enough to buy a Treasury today? Please enter a percentage."
    type: free_text
    construct: yield_consider_attractive_enough_buy
    required: true
  - id: q8
    prompt: "Have you used TreasuryDirect.gov to buy securities?"
    type: single_choice
    construct: have_used_treasurydirect_gov_buy
    required: true
    options:
      - id: "a"
        label: "Yes, and I found it easy"
      - id: "b"
        label: "Yes, but I found it difficult"
      - id: "c"
        label: "No, but I know about it"
      - id: "d"
        label: "No, I've never heard of it"
  - id: q9
    prompt: "What maturity length do you most prefer for Treasuries?"
    type: single_choice
    construct: maturity_length_most_prefer_treasuries
    required: true
    options:
      - id: "a"
        label: "Short-term (1 year or less)"
      - id: "b"
        label: "Intermediate (2 to 10 years)"
      - id: "c"
        label: "Long-term (more than 10 years)"
      - id: "d"
        label: "A mix of maturities"
      - id: "e"
        label: "I have no preference"
  - id: q10
    prompt: "How much do you agree or disagree: Treasury securities are one of the safest investments available."
    type: single_choice
    construct: much_agree_disagree_treasury_securities
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I understand how Treasury yields and prices move when interest rates change."
    type: single_choice
    construct: much_agree_disagree_i_understand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: Treasuries are an important part of a diversified portfolio."
    type: single_choice
    construct: much_agree_disagree_treasuries_important
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I worry that Treasury returns won't keep up with inflation."
    type: single_choice
    construct: much_agree_disagree_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: Buying Treasuries feels too complicated for me."
    type: single_choice
    construct: much_agree_disagree_buying_treasuries
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How important is each factor when investing in Treasuries: Safety of principal."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is each factor when investing in Treasuries: The yield or interest rate."
    type: single_choice
    construct: important_each_factor_when_investing
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is each factor when investing in Treasuries: Protection against inflation."
