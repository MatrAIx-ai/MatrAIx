schemaVersion: "1.0"
id: note_taking_app_usage_v1
title: "Note-Taking App Usage Survey"
description: "Which note-taking apps people use, how they capture and organize notes across devices, and what they value in a note system."
questions:
  - id: q0
    prompt: "Do you use a digital note-taking app?"
    type: single_choice
    construct: use_digital_note_taking_app
    required: true
    options:
      - id: "a"
        label: "Yes, it's central to how I work"
      - id: "b"
        label: "Yes, regularly"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I use paper notes"
      - id: "e"
        label: "No, I don't take notes"
  - id: q1
    prompt: "Which note-taking app do you use most often?"
    type: single_choice
    construct: note_taking_app_use_most
    required: true
    options:
      - id: "a"
        label: "Apple Notes"
      - id: "b"
        label: "Google Keep"
      - id: "c"
        label: "Microsoft OneNote"
      - id: "d"
        label: "Notion"
      - id: "e"
        label: "Evernote"
      - id: "f"
        label: "Obsidian"
      - id: "g"
        label: "A plain text or Markdown file"
      - id: "h"
        label: "Another app"
  - id: q2
    prompt: "Which note-taking apps have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: note_taking_apps_have_used
    required: true
    options:
      - id: "a"
        label: "Apple Notes"
      - id: "b"
        label: "Google Keep"
      - id: "c"
        label: "Microsoft OneNote"
      - id: "d"
        label: "Notion"
      - id: "e"
        label: "Evernote"
      - id: "f"
        label: "Obsidian"
      - id: "g"
        label: "Logseq"
      - id: "h"
        label: "Bear"
      - id: "i"
        label: "Roam Research"
      - id: "j"
        label: "Standard Notes"
      - id: "k"
        label: "Plain text / Markdown files"
      - id: "l"
        label: "Paper notebook"
  - id: q3
    prompt: "How many years have you used your main note-taking app?"
    type: free_text
    construct: many_years_have_used_main
    required: true
  - id: q4
    prompt: "About how many notes do you currently have stored in your main app?"
    type: free_text
    construct: many_notes_currently_have_stored
    required: true
  - id: q5
    prompt: "What do you use notes for? (Select all that apply)"
    type: multi_choice
    construct: use_notes_select_all_that
    required: true
    options:
      - id: "a"
        label: "To-do lists and reminders"
      - id: "b"
        label: "Meeting or lecture notes"
      - id: "c"
        label: "Ideas and brainstorming"
      - id: "d"
        label: "Personal journaling"
      - id: "e"
        label: "Reference information and how-tos"
      - id: "f"
        label: "Project planning"
      - id: "g"
        label: "Saving links and web clippings"
      - id: "h"
        label: "Shopping or errand lists"
      - id: "i"
        label: "Recipes"
      - id: "j"
        label: "Writing drafts"
  - id: q6
    prompt: "In what context do you take notes most?"
    type: single_choice
    construct: context_take_notes_most
    required: true
    options:
      - id: "a"
        label: "Work / professional"
      - id: "b"
        label: "School / study"
      - id: "c"
        label: "Personal life"
      - id: "d"
        label: "A mix of these"
  - id: q7
    prompt: "On which devices do you take or read notes? (Select all that apply)"
    type: multi_choice
    construct: devices_take_read_notes_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smartwatch"
      - id: "f"
        label: "Voice assistant / smart speaker"
  - id: q8
    prompt: "How do you most often capture a new note?"
    type: single_choice
    construct: most_often_capture_new_note
    required: true
    options:
      - id: "a"
        label: "Typing on a computer"
      - id: "b"
        label: "Typing on a phone"
      - id: "c"
        label: "Handwriting with a stylus"
      - id: "d"
        label: "Voice / dictation"
      - id: "e"
        label: "Clipping from the web"
      - id: "f"
        label: "Photos or scans"
  - id: q9
    prompt: "How do you organize your notes? (Select all that apply)"
    type: multi_choice
    construct: organize_notes_select_all_that
    required: true
    options:
      - id: "a"
        label: "Folders or notebooks"
      - id: "b"
        label: "Tags or labels"
      - id: "c"
        label: "Links between notes"
      - id: "d"
        label: "Search instead of organizing"
      - id: "e"
        label: "Pinning or favorites"
      - id: "f"
        label: "Dates or a daily-notes system"
      - id: "g"
        label: "I don't really organize them"
  - id: q10
    prompt: "How often do you go back and read or reuse notes you've taken?"
    type: single_choice
    construct: often_go_back_read_reuse
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q11
    prompt: "How often do you take notes?"
    type: single_choice
    construct: often_take_notes
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Rarely"
  - id: q12
    prompt: "Do you sync your notes across multiple devices?"
    type: single_choice
    construct: sync_notes_across_multiple_devices
    required: true
    options:
      - id: "a"
        label: "Yes, across all my devices"
      - id: "b"
        label: "Yes, across some devices"
      - id: "c"
        label: "No, they stay on one device"
      - id: "d"
        label: "Not sure"
  - id: q13
    prompt: "Which advanced features do you use in your note app? (Select all that apply)"
    type: multi_choice
