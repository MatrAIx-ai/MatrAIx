schemaVersion: "1.0"
id: weight_management_attitudes_v1
title: "Weight Management Attitudes Survey"
description: "Consumer attitudes and everyday approaches toward managing weight."
questions:
  - id: q0
    prompt: "Which best describes your current goal around weight?"
    type: single_choice
    construct: best_describes_current_goal_around
    required: true
    options:
      - id: "a"
        label: "Trying to lose weight"
      - id: "b"
        label: "Trying to maintain my current weight"
      - id: "c"
        label: "Trying to gain weight"
      - id: "d"
        label: "Not focused on my weight right now"
      - id: "e"
        label: "Prefer not to say"
  - id: q1
    prompt: "How satisfied are you with your current weight?"
    type: single_choice
    construct: satisfied_current_weight
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q2
    prompt: "How often do you think about your weight?"
    type: single_choice
    construct: often_think_weight
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q3
    prompt: "Do you currently weigh yourself or track your weight?"
    type: single_choice
    construct: currently_weigh_yourself_track_weight
    required: true
    options:
      - id: "a"
        label: "Yes, daily"
      - id: "b"
        label: "Yes, weekly"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q4
    prompt: "Which approaches have you used to manage your weight? (Select all that apply)"
    type: multi_choice
    construct: approaches_have_used_manage_weight
    required: true
    options:
      - id: "a"
        label: "Changing what I eat"
      - id: "b"
        label: "Eating smaller portions"
      - id: "c"
        label: "Exercising more"
      - id: "d"
        label: "Following a specific diet plan"
      - id: "e"
        label: "Using an app to track food or activity"
      - id: "f"
        label: "Joining a program (for example, WeightWatchers)"
      - id: "g"
        label: "Working with a coach, trainer, or dietitian"
      - id: "h"
        label: "I have not used any approaches"
  - id: q5
    prompt: "How would you describe your history with managing your weight?"
    type: single_choice
    construct: would_describe_history_managing_weight
    required: true
    options:
      - id: "a"
        label: "Fairly stable over the years"
      - id: "b"
        label: "I have gone up and down repeatedly"
      - id: "c"
        label: "Mostly one direction over time"
      - id: "d"
        label: "I have not paid much attention to it"
  - id: q6
    prompt: "How much do you agree or disagree: Managing my weight is important to my overall health."
    type: single_choice
    construct: much_agree_disagree_managing_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q7
    prompt: "How much do you agree or disagree: I feel confident I can reach or maintain a healthy weight."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q8
    prompt: "How much do you agree or disagree: There is a lot of confusing or conflicting advice about weight."
    type: single_choice
    construct: much_agree_disagree_there_lot
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree or disagree: My weight affects how I feel about myself."
    type: single_choice
    construct: much_agree_disagree_my_weight
    required: true
