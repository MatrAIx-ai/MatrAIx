schemaVersion: "1.0"
id: travel_health_preparation_v1
title: "Travel Health Preparation Survey"
description: "How travelers prepare for and manage their health before and during trips."
questions:
  - id: q0
    prompt: "How often do you travel away from home for leisure or business?"
    type: single_choice
    construct: often_travel_away_from_home
    required: true
    options:
      - id: "a"
        label: "Very frequently (monthly or more)"
      - id: "b"
        label: "Frequently (several times a year)"
      - id: "c"
        label: "Occasionally (once or twice a year)"
      - id: "d"
        label: "Rarely (less than once a year)"
      - id: "e"
        label: "Almost never"
  - id: q1
    prompt: "What type of travel do you do most often? (Select all that apply)"
    type: multi_choice
    construct: type_travel_most_often_select
    required: true
    options:
      - id: "a"
        label: "Domestic leisure trips"
      - id: "b"
        label: "International leisure trips"
      - id: "c"
        label: "Business travel"
      - id: "d"
        label: "Visiting family or friends"
      - id: "e"
        label: "Outdoor or adventure travel"
      - id: "f"
        label: "Cruises"
      - id: "g"
        label: "Road trips"
  - id: q2
    prompt: "In the past two years, have you traveled internationally?"
    type: single_choice
    construct: past_two_years_have_traveled
    required: true
    options:
      - id: "a"
        label: "Yes, multiple times"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I plan to"
      - id: "d"
        label: "No"
  - id: q3
    prompt: "Before a trip, how much do you prepare for health-related needs?"
    type: single_choice
    construct: before_trip_much_prepare_health
    required: true
    options:
      - id: "a"
        label: "A great deal"
      - id: "b"
        label: "Quite a bit"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A little"
      - id: "e"
        label: "Not at all"
  - id: q4
    prompt: "Which health-related preparations do you typically make before traveling? (Select all that apply)"
    type: multi_choice
    construct: health_related_preparations_typically_ma
    required: true
    options:
      - id: "a"
        label: "Pack a personal medicine kit"
      - id: "b"
        label: "Bring enough prescription medications"
      - id: "c"
        label: "Research health risks at the destination"
      - id: "d"
        label: "Check that vaccinations are up to date"
      - id: "e"
        label: "Buy travel or medical insurance"
      - id: "f"
        label: "Locate clinics or hospitals at the destination"
      - id: "g"
        label: "Pack motion sickness or stomach remedies"
      - id: "h"
        label: "Bring sunscreen and insect repellent"
      - id: "i"
        label: "I don't usually make health preparations"
