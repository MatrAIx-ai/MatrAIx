      - id: "a"
        label: "Pain relievers"
      - id: "b"
        label: "Bandages and antiseptic"
      - id: "c"
        label: "Stomach or anti-diarrheal remedies"
      - id: "d"
        label: "Allergy medication"
      - id: "e"
        label: "Prescription medications"
      - id: "f"
        label: "Motion sickness remedies"
      - id: "g"
        label: "Hand sanitizer"
      - id: "h"
        label: "Sunscreen"
      - id: "i"
        label: "Insect repellent"
      - id: "j"
        label: "None of these"
