  - id: q42
    prompt: "How would you describe yourself when it comes to display technology?"
    type: single_choice
    construct: would_describe_yourself_when_it
    required: true
    options:
      - id: "a"
        label: "Enthusiast — I follow displays closely"
      - id: "b"
        label: "Interested — I appreciate a good screen"
      - id: "c"
        label: "Practical — I just want it to work well"
      - id: "d"
        label: "Indifferent — I use whatever I have"
