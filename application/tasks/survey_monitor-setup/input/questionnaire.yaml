schemaVersion: "1.0"
id: monitor_setup_v1
title: "Monitor Setup Survey"
description: "Computer monitor and display setups — number and specs of screens, brands, mounting, purchase criteria, eye-strain habits, and satisfaction."
questions:
  - id: q0
    prompt: "How many external monitors do you use in your primary computer setup?"
    type: single_choice
    construct: many_external_monitors_use_primary
    required: true
    options:
      - id: "a"
        label: "None — I only use a laptop screen"
      - id: "b"
        label: "One"
      - id: "c"
        label: "Two"
      - id: "d"
        label: "Three"
      - id: "e"
        label: "Four or more"
  - id: q1
    prompt: "How many total displays (including laptop screens) do you use across all your setups? Enter a whole number."
    type: free_text
    construct: many_total_displays_including_laptop
    required: true
  - id: q2
    prompt: "What do you primarily use your monitor setup for? (Select all that apply)"
    type: multi_choice
    construct: primarily_use_monitor_setup_select
    required: true
    options:
      - id: "a"
        label: "Office work / productivity"
      - id: "b"
        label: "Programming / coding"
      - id: "c"
        label: "Gaming"
      - id: "d"
        label: "Video or photo editing"
      - id: "e"
        label: "Graphic design / creative work"
      - id: "f"
        label: "Web browsing and media"
      - id: "g"
        label: "Trading / finance / data monitoring"
      - id: "h"
        label: "Video editing"
      - id: "i"
        label: "Streaming / content creation"
  - id: q3
    prompt: "What size is your primary monitor?"
    type: single_choice
    construct: size_primary_monitor
    required: true
    options:
      - id: "a"
        label: "21 inches or smaller"
      - id: "b"
        label: "22-24 inches"
      - id: "c"
        label: "25-27 inches"
      - id: "d"
        label: "28-32 inches"
      - id: "e"
        label: "33-38 inches (ultrawide)"
      - id: "f"
        label: "39 inches or larger"
  - id: q4
    prompt: "What resolution is your primary monitor?"
    type: single_choice
    construct: resolution_primary_monitor
    required: true
    options:
      - id: "a"
        label: "1080p (Full HD)"
      - id: "b"
        label: "1440p (QHD)"
      - id: "c"
        label: "4K (UHD)"
      - id: "d"
        label: "Ultrawide (e.g., 3440x1440)"
      - id: "e"
        label: "5K or higher"
      - id: "f"
        label: "Not sure"
  - id: q5
    prompt: "What is the refresh rate of your primary monitor?"
    type: single_choice
    construct: refresh_rate_primary_monitor
    required: true
    options:
      - id: "a"
        label: "60Hz"
      - id: "b"
        label: "75Hz"
      - id: "c"
        label: "120-144Hz"
      - id: "d"
        label: "165-240Hz"
      - id: "e"
        label: "Higher than 240Hz"
      - id: "f"
        label: "Not sure"
  - id: q6
    prompt: "What panel type is your primary monitor?"
    type: single_choice
    construct: panel_type_primary_monitor
    required: true
    options:
      - id: "a"
        label: "IPS"
      - id: "b"
        label: "VA"
      - id: "c"
        label: "TN"
      - id: "d"
        label: "OLED"
      - id: "e"
        label: "Not sure"
  - id: q7
    prompt: "Which monitor brands do you own? (Select all that apply)"
    type: multi_choice
    construct: monitor_brands_own_select_all
    required: true
    options:
      - id: "a"
        label: "Dell"
      - id: "b"
        label: "LG"
      - id: "c"
        label: "Samsung"
      - id: "d"
        label: "ASUS"
      - id: "e"
        label: "Acer"
      - id: "f"
        label: "BenQ"
      - id: "g"
        label: "HP"
      - id: "h"
        label: "Apple"
      - id: "i"
        label: "Gigabyte / AOC / MSI"
      - id: "j"
        label: "Other"
  - id: q8
    prompt: "What type of monitor do you primarily use?"
    type: single_choice
    construct: type_monitor_primarily_use
    required: true
    options:
      - id: "a"
        label: "Standard flat monitor"
      - id: "b"
        label: "Curved monitor"
      - id: "c"
        label: "Ultrawide monitor"
      - id: "d"
        label: "Gaming monitor (high refresh)"
      - id: "e"
        label: "Professional / color-accurate monitor"
      - id: "f"
        label: "A TV used as a monitor"
  - id: q9
    prompt: "How is your monitor positioned or mounted?"
    type: single_choice
    construct: monitor_positioned_mounted
    required: true
    options:
      - id: "a"
        label: "On its included stand"
      - id: "b"
        label: "On a single monitor arm"
      - id: "c"
        label: "On a dual/multi monitor arm"
      - id: "d"
        label: "On a wall mount"
      - id: "e"
        label: "On a riser or shelf"
  - id: q10
    prompt: "How do you connect your monitor(s)? (Select all that apply)"
    type: multi_choice
    construct: connect_monitor_s_select_all
    required: true
    options:
      - id: "a"
        label: "HDMI"
      - id: "b"
        label: "DisplayPort"
      - id: "c"
        label: "USB-C / Thunderbolt"
      - id: "d"
        label: "DVI or VGA"
      - id: "e"
        label: "Through a docking station"
      - id: "f"
        label: "Not sure"
  - id: q11
    prompt: "Roughly how much did you spend on your primary monitor? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: roughly_much_did_spend_primary
    required: true
  - id: q12
    prompt: "When buying a monitor, how important is resolution / sharpness?"
    type: single_choice
    construct: when_buying_monitor_important_resolution
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "When buying a monitor, how important is refresh rate?"
    type: single_choice
    construct: when_buying_monitor_important_refresh
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "When buying a monitor, how important is color accuracy?"
    type: single_choice
    construct: when_buying_monitor_important_color
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q15
    prompt: "When buying a monitor, how important is screen size?"
    type: single_choice
    construct: when_buying_monitor_important_screen
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "When buying a monitor, how important is price?"
    type: single_choice
    construct: when_buying_monitor_important_price
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "When buying a monitor, how important is adjustability (height, tilt, pivot)?"
    type: single_choice
    construct: when_buying_monitor_important_adjustabil
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "Which THREE monitor qualities matter most to you? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: three_monitor_qualities_matter_most
    required: true
    options:
      - id: "a"
        label: "Resolution"
      - id: "b"
        label: "Refresh rate"
      - id: "c"
        label: "Color accuracy"
      - id: "d"
        label: "Screen size"
      - id: "e"
        label: "Panel type / contrast"
      - id: "f"
        label: "Price"
      - id: "g"
        label: "Adjustability / ergonomics"
      - id: "h"
        label: "Connectivity / ports"
      - id: "i"
        label: "Curved / ultrawide form"
      - id: "j"
        label: "Brand and reliability"
  - id: q19
    prompt: "How much do you agree: A multi-monitor setup significantly improves my productivity."
    type: single_choice
    construct: much_agree_multi_monitor_setup
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree: A higher refresh rate makes a noticeable difference to me."
    type: single_choice
    construct: much_agree_higher_refresh_rate
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q21
    prompt: "How much do you agree: I experience eye strain or discomfort from screen time."
    type: single_choice
    construct: much_agree_i_experience_eye
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q22
    prompt: "How much do you agree: I am willing to pay more for a high-quality display."
    type: single_choice
    construct: much_agree_i_am_willing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q23
    prompt: "How much do you agree: My current monitor setup meets all my needs."
    type: single_choice
    construct: much_agree_my_current_monitor
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q24
    prompt: "Do you use any of the following to reduce eye strain? (Select all that apply)"
    type: multi_choice
    construct: use_any_following_reduce_eye
    required: true
    options:
      - id: "a"
        label: "Blue light filter / night mode"
      - id: "b"
        label: "Reduced brightness"
      - id: "c"
        label: "Following the 20-20-20 rule (breaks)"
      - id: "d"
        label: "Anti-glare screen or coating"
      - id: "e"
        label: "Proper monitor distance and height"
      - id: "f"
        label: "Bias lighting behind the monitor"
      - id: "g"
        label: "None of these"
  - id: q25
    prompt: "Do you use a monitor for both work and personal use, or separate setups?"
    type: single_choice
    construct: use_monitor_both_work_personal
    required: true
    options:
      - id: "a"
        label: "Same setup for everything"
      - id: "b"
        label: "Separate work and personal setups"
      - id: "c"
        label: "I mainly use it for work"
      - id: "d"
        label: "I mainly use it for personal use"
  - id: q26
    prompt: "How often do you use dark mode or reduced brightness on your displays?"
    type: single_choice
    construct: often_use_dark_mode_reduced
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q27
    prompt: "Have you calibrated your monitor's color (with software or a colorimeter)?"
    type: single_choice
    construct: have_calibrated_monitor_s_color
    required: true
    options:
      - id: "a"
        label: "Yes, with a hardware colorimeter"
      - id: "b"
        label: "Yes, with software or built-in tools"
      - id: "c"
        label: "No, but I've adjusted settings manually"
      - id: "d"
        label: "No, I use default settings"
      - id: "e"
        label: "Not sure what that means"
  - id: q28
    prompt: "What frustrates you most about your current monitor setup? (Select all that apply)"
    type: multi_choice
    construct: frustrates_most_current_monitor_setup
    required: true
    options:
      - id: "a"
        label: "Not enough screen space"
      - id: "b"
        label: "Poor image quality"
      - id: "c"
        label: "Eye strain"
      - id: "d"
        label: "Cable clutter"
      - id: "e"
        label: "Desk space limitations"
      - id: "f"
        label: "Connectivity / compatibility issues"
      - id: "g"
        label: "Color inaccuracy"
      - id: "h"
        label: "Nothing frustrates me"
  - id: q29
    prompt: "How satisfied are you with your current monitor setup?"
    type: single_choice
    construct: satisfied_current_monitor_setup
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q30
    prompt: "How likely are you to upgrade or add a monitor in the next 12 months?"
    type: single_choice
    construct: likely_upgrade_add_monitor_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q31
    prompt: "How likely are you to recommend your current monitor to others? (0 = Not at all likely, 10 = Extremely likely)"
    type: single_choice
    construct: likely_recommend_current_monitor_others
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q32
    prompt: "What is your ideal monitor setup, if different from what you have now?"
    type: free_text
    construct: ideal_monitor_setup_if_different
    required: true
  - id: q33
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18-24"
      - id: "b"
        label: "25-34"
      - id: "c"
        label: "35-44"
      - id: "d"
        label: "45-54"
      - id: "e"
        label: "55-64"
      - id: "f"
        label: "65 or older"
      - id: "g"
        label: "Prefer not to say"
  - id: q34
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q35
    prompt: "Which best describes your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: best_describes_race_ethnicity_select
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "Native American or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Other"
      - id: "i"
        label: "Prefer not to say"
  - id: q36
    prompt: "What is your annual household income?"
    type: single_choice
    construct: annual_household_income
    required: true
    options:
      - id: "a"
        label: "Under $25,000"
      - id: "b"
        label: "$25,000-$49,999"
      - id: "c"
        label: "$50,000-$74,999"
      - id: "d"
        label: "$75,000-$99,999"
      - id: "e"
        label: "$100,000-$149,999"
      - id: "f"
        label: "$150,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q37
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "High school or less"
      - id: "b"
        label: "Some college, no degree"
      - id: "c"
        label: "Associate degree"
      - id: "d"
        label: "Bachelor's degree"
      - id: "e"
        label: "Graduate or professional degree"
      - id: "f"
        label: "Prefer not to say"
  - id: q38
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
