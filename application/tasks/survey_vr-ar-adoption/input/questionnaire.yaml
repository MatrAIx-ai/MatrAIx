schemaVersion: "1.0"
id: vr_ar_adoption_v1
title: "VR and AR Adoption Survey"
description: "How people adopt and use virtual reality (VR) and augmented reality (AR) technology, including headset ownership, use cases, comfort, and attitudes toward the technology."
questions:
  - id: q0
    prompt: "Have you ever used a virtual reality (VR) or augmented reality (AR) headset?"
    type: single_choice
    construct: have_ever_used_virtual_reality
    required: true
    options:
      - id: "a"
        label: "Yes, I own one"
      - id: "b"
        label: "Yes, I've used someone else's"
      - id: "c"
        label: "Yes, I've tried one at a store or event"
      - id: "d"
        label: "No, but I'm interested"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Do you currently own a VR or AR headset?"
    type: single_choice
    construct: currently_own_vr_ar_headset
    required: true
    options:
      - id: "a"
        label: "Yes, one"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, but I've owned one before"
      - id: "d"
        label: "No, never"
  - id: q2
    prompt: "Which VR or AR headsets have you used? (Select all that apply)"
    type: multi_choice
    construct: vr_ar_headsets_have_used
    required: true
    options:
      - id: "a"
        label: "Meta Quest 3 or Quest 3S"
      - id: "b"
        label: "Meta Quest 2"
      - id: "c"
        label: "Apple Vision Pro"
      - id: "d"
        label: "PlayStation VR2"
      - id: "e"
        label: "Valve Index"
      - id: "f"
        label: "HTC Vive"
      - id: "g"
        label: "Meta (Ray-Ban) smart glasses"
      - id: "h"
        label: "A phone-based VR viewer (e.g., cardboard)"
      - id: "i"
        label: "Another headset"
      - id: "j"
        label: "None"
  - id: q3
    prompt: "Which headset do you use most (or would most like to own)?"
    type: single_choice
    construct: headset_use_most_would_most
    required: true
    options:
      - id: "a"
        label: "Meta Quest 3 / 3S"
      - id: "b"
        label: "Meta Quest 2"
      - id: "c"
        label: "Apple Vision Pro"
      - id: "d"
        label: "PlayStation VR2"
      - id: "e"
        label: "Valve Index"
      - id: "f"
        label: "HTC Vive"
      - id: "g"
        label: "Smart glasses"
      - id: "h"
        label: "Other"
      - id: "i"
        label: "None / not sure"
  - id: q4
    prompt: "How long have you been using VR or AR?"
    type: single_choice
    construct: long_have_been_using_vr
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I don't currently use it"
  - id: q5
    prompt: "On a typical week, about how many hours do you spend using VR or AR?"
    type: single_choice
    construct: typical_week_many_hours_spend
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Less than 1 hour"
      - id: "c"
        label: "1 to 3 hours"
      - id: "d"
        label: "4 to 7 hours"
      - id: "e"
        label: "More than 7 hours"
  - id: q6
    prompt: "What do you (or would you) use VR or AR for? (Select all that apply)"
    type: multi_choice
    construct: would_use_vr_ar_select
    required: true
    options:
      - id: "a"
        label: "Gaming"
      - id: "b"
        label: "Watching movies or videos"
      - id: "c"
        label: "Fitness and exercise"
      - id: "d"
        label: "Social or virtual hangouts"
      - id: "e"
        label: "Creative work (3D design, art)"
      - id: "f"
        label: "Productivity (virtual monitors, meetings)"
      - id: "g"
        label: "Education and training"
      - id: "h"
        label: "Travel and virtual tours"
      - id: "i"
        label: "Meditation and relaxation"
      - id: "j"
        label: "Just to experience the technology"
  - id: q7
    prompt: "What do you use VR or AR for most often?"
    type: single_choice
    construct: use_vr_ar_most_often
    required: true
    options:
      - id: "a"
        label: "Gaming"
      - id: "b"
        label: "Watching media"
      - id: "c"
        label: "Fitness"
      - id: "d"
        label: "Social experiences"
      - id: "e"
        label: "Productivity or work"
      - id: "f"
        label: "Creative or educational uses"
      - id: "g"
        label: "I don't use it regularly"
  - id: q8
    prompt: "Roughly how much did you spend on VR/AR hardware and content in the past year?"
    type: free_text
    construct: roughly_much_did_spend_vr
    required: true
  - id: q9
    prompt: "Where did you (or would you) mainly use VR or AR?"
    type: single_choice
    construct: where_did_would_mainly_use
    required: true
    options:
      - id: "a"
        label: "At home"
      - id: "b"
        label: "At work or school"
      - id: "c"
        label: "At friends' or family's homes"
      - id: "d"
        label: "At an arcade, store, or event"
      - id: "e"
        label: "I don't use it"
  - id: q10
    prompt: "How often do you use VR or AR now?"
    type: single_choice
    construct: often_use_vr_ar_now
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never / no longer"
  - id: q11
    prompt: "How often do you experience the following with VR or AR — Motion sickness or nausea"
    type: single_choice
    construct: often_experience_following_vr_ar
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q12
    prompt: "How often do you experience the following with VR or AR — Discomfort from the headset's weight or fit"
