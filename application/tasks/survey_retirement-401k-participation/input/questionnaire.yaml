schemaVersion: "1.0"
id: retirement_401k_participation_v1
title: "Retirement 401(k) Participation Survey"
description: "How workers participate in, invest through, and feel about employer-sponsored retirement plans."
questions:
  - id: q0
    prompt: "Does your current employer offer a workplace retirement plan (such as a 401(k), 403(b), or 457)?"
    type: single_choice
    construct: does_current_employer_offer_workplace
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I am not sure"
      - id: "d"
        label: "I am not currently employed"
  - id: q1
    prompt: "Are you currently contributing to an employer-sponsored retirement plan?"
    type: single_choice
    construct: currently_contributing_employer_sponsore
    required: true
    options:
      - id: "a"
        label: "Yes, at my current employer"
      - id: "b"
        label: "No, but I have a balance from a current or past employer"
      - id: "c"
        label: "No, I have never participated"
      - id: "d"
        label: "Not applicable"
  - id: q2
    prompt: "What type of workplace retirement plan do you have? (Select all that apply)"
    type: multi_choice
    construct: type_workplace_retirement_plan_have
    required: true
    options:
      - id: "a"
        label: "Traditional (pre-tax) 401(k)"
      - id: "b"
        label: "Roth (after-tax) 401(k)"
      - id: "c"
        label: "403(b) plan"
      - id: "d"
        label: "457 plan"
      - id: "e"
        label: "SIMPLE or SEP plan"
      - id: "f"
        label: "I don't have a workplace plan"
      - id: "g"
        label: "Not sure"
  - id: q3
    prompt: "How were you enrolled in your workplace retirement plan?"
    type: single_choice
    construct: were_enrolled_workplace_retirement_plan
    required: true
    options:
      - id: "a"
        label: "I was automatically enrolled"
      - id: "b"
        label: "I signed up on my own"
      - id: "c"
        label: "I am not enrolled"
      - id: "d"
        label: "Don't remember"
  - id: q4
    prompt: "What percentage of your salary do you currently contribute to your plan?"
    type: single_choice
    construct: percentage_salary_currently_contribute_p
    required: true
    options:
      - id: "a"
        label: "I do not contribute"
      - id: "b"
        label: "1% to 3%"
      - id: "c"
        label: "4% to 6%"
      - id: "d"
        label: "7% to 10%"
      - id: "e"
        label: "11% to 15%"
      - id: "f"
        label: "More than 15%"
      - id: "g"
        label: "Don't know"
  - id: q5
    prompt: "About how much do you personally contribute to your retirement plan per year? Please enter a dollar amount."
    type: free_text
    construct: much_personally_contribute_retirement_pl
    required: true
  - id: q6
    prompt: "Does your employer offer a matching contribution?"
    type: single_choice
    construct: does_employer_offer_matching_contributio
    required: true
    options:
      - id: "a"
        label: "Yes, and I contribute enough to get the full match"
      - id: "b"
        label: "Yes, but I do not contribute enough to get the full match"
      - id: "c"
        label: "No match is offered"
      - id: "d"
        label: "Don't know"
  - id: q7
    prompt: "About how much do you currently have saved in all of your retirement accounts combined?"
    type: single_choice
    construct: much_currently_have_saved_all
    required: true
    options:
      - id: "a"
        label: "Less than $10,000"
      - id: "b"
        label: "$10,000 to $49,999"
      - id: "c"
        label: "$50,000 to $99,999"
      - id: "d"
        label: "$100,000 to $249,999"
      - id: "e"
        label: "$250,000 to $499,999"
      - id: "f"
        label: "$500,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q8
    prompt: "Who is the provider or recordkeeper for your workplace plan?"
    type: single_choice
    construct: who_provider_recordkeeper_workplace_plan
    required: true
    options:
      - id: "a"
        label: "Fidelity"
      - id: "b"
        label: "Vanguard"
      - id: "c"
        label: "Empower"
      - id: "d"
        label: "Charles Schwab"
      - id: "e"
        label: "Principal or another provider"
      - id: "f"
        label: "Don't know"
      - id: "g"
        label: "Not applicable"
  - id: q9
    prompt: "How are your retirement contributions primarily invested?"
    type: single_choice
    construct: retirement_contributions_primarily_inves
    required: true
    options:
      - id: "a"
        label: "A target-date fund"
      - id: "b"
        label: "A mix of index funds I chose"
      - id: "c"
        label: "A mix of actively managed funds I chose"
      - id: "d"
        label: "A managed account or advice service in the plan"
      - id: "e"
        label: "Company stock"
      - id: "f"
        label: "Don't know"
  - id: q10
    prompt: "How often do you review or adjust your retirement plan investments?"
    type: single_choice
    construct: often_review_adjust_retirement_plan
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "About once a year"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Monthly or more often"
  - id: q11
    prompt: "In the past 3 years, have you increased your contribution rate?"
    type: single_choice
    construct: past_3_years_have_increased
    required: true
    options:
      - id: "a"
        label: "Yes, on my own"
      - id: "b"
        label: "Yes, through automatic annual increases"
      - id: "c"
        label: "No, it stayed the same"
      - id: "d"
        label: "No, I decreased it"
      - id: "e"
        label: "Not applicable"
  - id: q12
    prompt: "Have you ever taken a loan or early withdrawal from your retirement plan?"
    type: single_choice
    construct: have_ever_taken_loan_early
    required: true
    options:
      - id: "a"
        label: "Yes, a loan"
      - id: "b"
        label: "Yes, a hardship or early withdrawal"
      - id: "c"
        label: "Yes, both at different times"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not applicable"
  - id: q13
    prompt: "When leaving a past job, what did you do with your retirement savings? (Select all that apply)"
    type: multi_choice
    construct: when_leaving_past_job_did
    required: true
    options:
      - id: "a"
        label: "Left it in the former employer's plan"
      - id: "b"
        label: "Rolled it into a new employer's plan"
      - id: "c"
        label: "Rolled it into an IRA"
      - id: "d"
        label: "Cashed it out"
      - id: "e"
        label: "I have not changed jobs with a plan balance"
  - id: q14
    prompt: "Which retirement planning resources do you use? (Select all that apply)"
    type: multi_choice
    construct: retirement_planning_resources_use_select
    required: true
    options:
      - id: "a"
        label: "My plan provider's website or app"
      - id: "b"
        label: "A retirement calculator or online tool"
      - id: "c"
        label: "A financial advisor"
      - id: "d"
        label: "Employer financial wellness programs or seminars"
      - id: "e"
        label: "Friends, family, or coworkers"
      - id: "f"
        label: "Financial media, books, or social media"
      - id: "g"
        label: "I don't use any resources"
  - id: q15
    prompt: "How much do you agree: I am saving enough for a comfortable retirement."
    type: single_choice
    construct: much_agree_i_am_saving
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree: I understand how my retirement plan works and how it is invested."
    type: single_choice
    construct: much_agree_i_understand_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree: I feel confident making investment choices in my plan."
    type: single_choice
    construct: much_agree_i_feel_confident
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree: Contributing to my plan requires me to cut back on other things."
    type: single_choice
    construct: much_agree_contributing_my_plan
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree: I worry that I will run out of money in retirement."
    type: single_choice
    construct: much_agree_i_worry_that
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How much do you agree: The employer match is a major reason I contribute."
    type: single_choice
    construct: much_agree_employer_match_major
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
