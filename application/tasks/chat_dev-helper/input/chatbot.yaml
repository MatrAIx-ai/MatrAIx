transport: external_http
runtimeDefaults:
  applicationId: dev_helper_bot
  applicationContext: dev_help
  domain: dev_help
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_DEV
  legacyBaseUrlEnv: DEV_CHATBOT_URL
  baseUrl: http://dev-help-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: dev_helper_bot
      applicationContext: dev_help
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested fixes or references
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
