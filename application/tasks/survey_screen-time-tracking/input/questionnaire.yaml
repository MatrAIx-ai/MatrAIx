schemaVersion: "1.0"
id: screen_time_tracking_v1
title: "Screen Time Tracking Survey"
description: "How people track, monitor, and manage their screen time and digital habits."
questions:
  - id: q0
    prompt: "Do you track or monitor your screen time?"
    type: single_choice
    construct: track_monitor_screen_time
    required: true
    options:
      - id: "a"
        label: "Yes, I track it actively"
      - id: "b"
        label: "Yes, I check the stats occasionally"
      - id: "c"
        label: "I'm aware of the feature but don't really use it"
      - id: "d"
        label: "No, but I'd like to"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Which tools do you use to track screen time? (Select all that apply)"
    type: multi_choice
    construct: tools_use_track_screen_time
    required: true
    options:
      - id: "a"
        label: "Apple Screen Time (iOS/Mac)"
      - id: "b"
        label: "Android Digital Wellbeing"
      - id: "c"
        label: "Samsung Digital Wellbeing"
      - id: "d"
        label: "A third-party app (e.g., RescueTime, Opal, one sec, Jomo)"
      - id: "e"
        label: "Router or network-level controls"
      - id: "f"
        label: "Browser extensions"
      - id: "g"
        label: "Manual tracking / journaling"
      - id: "h"
        label: "I don't track screen time"
  - id: q2
    prompt: "How often do you check your screen time statistics?"
    type: single_choice
    construct: often_check_screen_time_statistics
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Weekly (e.g., the weekly report)"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely or never"
  - id: q3
    prompt: "Do you set screen time limits or goals for yourself?"
    type: single_choice
    construct: set_screen_time_limits_goals
    required: true
    options:
      - id: "a"
        label: "Yes, and I generally stick to them"
      - id: "b"
        label: "Yes, but I often ignore them"
      - id: "c"
        label: "I've tried but gave up"
      - id: "d"
        label: "No, but I'm considering it"
      - id: "e"
        label: "No"
  - id: q4
    prompt: "Which screen-time management features do you use? (Select all that apply)"
    type: multi_choice
    construct: screen_time_management_features_use
    required: true
    options:
      - id: "a"
        label: "App time limits / timers"
      - id: "b"
        label: "Downtime / bedtime schedules"
      - id: "c"
        label: "Focus or Do Not Disturb modes"
      - id: "d"
        label: "Grayscale / dimming the screen"
      - id: "e"
        label: "App blockers"
      - id: "f"
        label: "Notification limits or summaries"
      - id: "g"
        label: "Content / website filters"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "On which devices do you monitor screen time? (Select all that apply)"
    type: multi_choice
    construct: devices_monitor_screen_time_select
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Laptop"
      - id: "d"
        label: "Desktop computer"
      - id: "e"
        label: "Smart TV"
      - id: "f"
        label: "I don't monitor any device"
  - id: q6
    prompt: "What motivates you to track or manage screen time? (Select all that apply)"
    type: multi_choice
    construct: motivates_track_manage_screen_time
    required: true
    options:
      - id: "a"
        label: "Reduce overall usage"
      - id: "b"
        label: "Improve productivity / focus"
      - id: "c"
        label: "Sleep better"
      - id: "d"
        label: "Reduce social media use"
      - id: "e"
        label: "Spend more time with family or friends"
      - id: "f"
        label: "Mental health and wellbeing"
      - id: "g"
        label: "Reduce eye strain or headaches"
      - id: "h"
        label: "Simple curiosity"
      - id: "i"
        label: "Managing my children's usage"
      - id: "j"
        label: "I'm not particularly motivated to"
  - id: q7
    prompt: "On average, how many hours per day do you spend on screens for personal (non-work) use? Enter a whole number."
    type: free_text
    construct: average_many_hours_per_day
    required: true
  - id: q8
    prompt: "Which category of app or activity uses the most of your screen time?"
    type: single_choice
    construct: category_app_activity_uses_most
    required: true
    options:
      - id: "a"
        label: "Social media"
      - id: "b"
        label: "Video streaming"
      - id: "c"
        label: "Games"
      - id: "d"
        label: "Messaging"
      - id: "e"
        label: "Web browsing"
      - id: "f"
        label: "Productivity / work"
      - id: "g"
        label: "News"
      - id: "h"
        label: "Other"
  - id: q9
    prompt: "How accurate do you think your own guess of your screen time is compared with the actual number?"
    type: single_choice
    construct: accurate_think_own_guess_screen
    required: true
    options:
      - id: "a"
        label: "Very accurate"
      - id: "b"
        label: "Somewhat accurate"
      - id: "c"
        label: "I usually underestimate it"
      - id: "d"
        label: "I usually overestimate it"
      - id: "e"
        label: "I have no idea"
  - id: q10
    prompt: "On how many days in a typical week do you meet your screen-time goal or limit? Enter a whole number from 0 to 7."
    type: free_text
    construct: many_days_typical_week_meet
    required: true
  - id: q11
    prompt: "Roughly how many times per day do you pick up or unlock your phone? Enter a whole number."
    type: free_text
    construct: roughly_many_times_per_day
    required: true
  - id: q12
