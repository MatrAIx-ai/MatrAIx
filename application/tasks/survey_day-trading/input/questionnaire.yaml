schemaVersion: "1.0"
id: day_trading_v1
title: "Day Trading Survey"
description: "How people engage in active and day trading of stocks and other assets, and how it affects them."
questions:
  - id: q0
    prompt: "Which best describes your trading activity?"
    type: single_choice
    construct: best_describes_trading_activity
    required: true
    options:
      - id: "a"
        label: "I day trade (open and close positions within the same day) regularly"
      - id: "b"
        label: "I actively trade but usually hold for more than a day"
      - id: "c"
        label: "I trade occasionally"
      - id: "d"
        label: "I only invest for the long term"
      - id: "e"
        label: "I don't trade or invest"
  - id: q1
    prompt: "How long have you been day trading or actively trading?"
    type: single_choice
    construct: long_have_been_day_trading
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1–3 years"
      - id: "d"
        label: "4–10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't actively trade"
  - id: q2
    prompt: "On a typical trading week, how many days do you actively trade?"
    type: single_choice
    construct: typical_trading_week_many_days
    required: true
    options:
      - id: "a"
        label: "5 or more days"
      - id: "b"
        label: "3–4 days"
      - id: "c"
        label: "1–2 days"
      - id: "d"
        label: "Less than once a week"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "About how many trades do you place in a typical week? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_trades_place_typical_week
    required: true
  - id: q4
    prompt: "About how many hours per week do you spend trading and researching trades? Please enter a number."
    type: free_text
    construct: many_hours_per_week_spend
    required: true
  - id: q5
    prompt: "Which assets do you actively trade? (Select all that apply)"
    type: multi_choice
    construct: assets_actively_trade_select_all
    required: true
    options:
      - id: "a"
        label: "Individual stocks"
      - id: "b"
        label: "Options"
      - id: "c"
        label: "ETFs"
      - id: "d"
        label: "Cryptocurrency"
      - id: "e"
        label: "Futures"
      - id: "f"
        label: "Forex (currencies)"
      - id: "g"
        label: "Penny stocks"
      - id: "h"
        label: "None of these"
  - id: q6
    prompt: "Which platforms or brokers do you use for trading? (Select all that apply)"
    type: multi_choice
    construct: platforms_brokers_use_trading_select
    required: true
    options:
      - id: "a"
        label: "Robinhood"
      - id: "b"
        label: "Webull"
      - id: "c"
        label: "Fidelity"
      - id: "d"
        label: "Charles Schwab / thinkorswim"
      - id: "e"
        label: "E*TRADE"
      - id: "f"
        label: "Interactive Brokers"
      - id: "g"
        label: "A crypto exchange (e.g., Coinbase)"
      - id: "h"
        label: "Another platform"
  - id: q7
    prompt: "About how much money do you currently use for active trading? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_money_currently_use_active
    required: true
  - id: q8
    prompt: "What is your main goal with active or day trading?"
    type: single_choice
    construct: main_goal_active_day_trading
    required: true
    options:
      - id: "a"
        label: "A primary source of income"
      - id: "b"
        label: "Extra income on the side"
      - id: "c"
        label: "Growing my long-term wealth faster"
      - id: "d"
        label: "Learning and building skill"
      - id: "e"
        label: "Entertainment or excitement"
      - id: "f"
        label: "Not applicable"
  - id: q9
    prompt: "Which trading approaches do you use? (Select all that apply)"
    type: multi_choice
    construct: trading_approaches_use_select_all
    required: true
    options:
      - id: "a"
        label: "Technical analysis (charts, patterns)"
      - id: "b"
        label: "Momentum or news-based trading"
      - id: "c"
        label: "Scalping (very short-term trades)"
      - id: "d"
        label: "Swing trading"
      - id: "e"
        label: "Options strategies"
      - id: "f"
        label: "Following alerts or signals from others"
      - id: "g"
        label: "Gut feeling"
      - id: "h"
        label: "Not applicable"
  - id: q10
    prompt: "Do you use margin or leverage in your trading?"
    type: single_choice
    construct: use_margin_leverage_trading
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, cash only"
      - id: "d"
        label: "Not applicable"
  - id: q11
    prompt: "How would you describe your trading results over the past year?"
    type: single_choice
    construct: would_describe_trading_results_over
    required: true
    options:
      - id: "a"
        label: "Significantly profitable"
      - id: "b"
        label: "Slightly profitable"
      - id: "c"
        label: "About break-even"
      - id: "d"
        label: "Slightly at a loss"
      - id: "e"
        label: "Significantly at a loss"
      - id: "f"
        label: "Not applicable"
  - id: q12
    prompt: "About what percentage return (or loss) did your trading account have over the past year? Please enter a percentage (use a negative number for a loss; enter 0 if not applicable)."
    type: free_text
    construct: percentage_return_loss_did_trading
    required: true
  - id: q13
    prompt: "Do you use a written trading plan or rules?"
    type: single_choice
