      - id: "b"
        label: "Recommendations from friends or colleagues"
      - id: "c"
        label: "Social media"
      - id: "d"
        label: "Mentioned on another podcast"
      - id: "e"
        label: "Search within a podcast app"
      - id: "f"
        label: "Newsletters or blogs"
      - id: "g"
        label: "Guest appearances I follow"
