schemaVersion: "1.0"
id: tech_podcast_usage_v1
title: "Tech Podcast Usage Survey"
description: "How people listen to technology, software, and developer podcasts — the apps, genres, habits, and attitudes behind their listening."
questions:
  - id: q0
    prompt: "Do you listen to technology, software, or developer podcasts?"
    type: single_choice
    construct: listen_technology_software_developer_pod
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I used to but no longer do"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "How often do you listen to tech podcasts?"
    type: single_choice
    construct: often_listen_tech_podcasts
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Less than once a month"
  - id: q2
    prompt: "Which apps do you use to listen to podcasts? (Select all that apply)"
    type: multi_choice
    construct: apps_use_listen_podcasts_select
    required: true
    options:
      - id: "a"
        label: "Spotify"
      - id: "b"
        label: "Apple Podcasts"
      - id: "c"
        label: "YouTube / YouTube Music"
      - id: "d"
        label: "Pocket Casts"
      - id: "e"
        label: "Overcast"
      - id: "f"
        label: "Google Podcasts / Podcast Addict"
      - id: "g"
        label: "Amazon Music / Audible"
      - id: "h"
        label: "Castro or another indie app"
      - id: "i"
        label: "Directly from a website / RSS"
  - id: q3
    prompt: "Which app do you use most for podcasts?"
    type: single_choice
    construct: app_use_most_podcasts
    required: true
    options:
      - id: "a"
        label: "Spotify"
      - id: "b"
        label: "Apple Podcasts"
      - id: "c"
        label: "YouTube"
      - id: "d"
        label: "Pocket Casts"
      - id: "e"
        label: "Overcast"
      - id: "f"
        label: "Another dedicated podcast app"
      - id: "g"
        label: "Whatever is convenient"
  - id: q4
    prompt: "Which types of tech podcasts do you listen to? (Select all that apply)"
    type: multi_choice
    construct: types_tech_podcasts_listen_select
    required: true
    options:
      - id: "a"
        label: "Software development / programming"
      - id: "b"
        label: "Tech news and industry"
      - id: "c"
        label: "Gadgets and consumer hardware"
      - id: "d"
        label: "Startups and business"
      - id: "e"
        label: "AI and machine learning"
      - id: "f"
        label: "Cybersecurity and privacy"
      - id: "g"
        label: "Interview / founder shows"
      - id: "h"
        label: "Career and personal development for tech"
      - id: "i"
        label: "Gaming"
      - id: "j"
        label: "Science and futurism"
  - id: q5
    prompt: "Select your top 3 tech podcast genres. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_tech_podcast
    required: true
    options:
      - id: "a"
        label: "Software development"
      - id: "b"
        label: "Tech news and industry"
      - id: "c"
        label: "Gadgets and hardware"
      - id: "d"
        label: "Startups and business"
      - id: "e"
        label: "AI and machine learning"
      - id: "f"
        label: "Cybersecurity and privacy"
      - id: "g"
        label: "Interview / founder shows"
      - id: "h"
        label: "Career development"
