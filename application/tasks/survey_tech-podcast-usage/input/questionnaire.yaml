      - id: "b"
        label: "Exercising or at the gym"
      - id: "c"
        label: "Doing chores or errands"
      - id: "d"
        label: "Walking"
      - id: "e"
        label: "While working or coding"
      - id: "f"
        label: "Relaxing at home"
      - id: "g"
