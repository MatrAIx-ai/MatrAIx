      - id: "b"
        label: "Multi-symptom cold and flu medicine (e.g., DayQuil/NyQuil)"
      - id: "c"
        label: "Decongestant (e.g., Sudafed)"
      - id: "d"
        label: "Cough drops or lozenges"
      - id: "e"
        label: "Cough syrup or suppressant"
      - id: "f"
        label: "Nasal spray or saline rinse"
      - id: "g"
        label: "Throat spray or gargle"
      - id: "h"
