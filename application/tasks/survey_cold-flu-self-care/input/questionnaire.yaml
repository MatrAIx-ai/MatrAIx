schemaVersion: "1.0"
id: cold_flu_self_care_v1
title: "Cold and Flu Self-Care Survey"
description: "How consumers manage everyday colds, flu, and seasonal respiratory bugs at home."
questions:
  - id: q0
    prompt: "In a typical year, about how many colds or flu-like illnesses do you come down with?"
    type: single_choice
    construct: typical_year_many_colds_flu
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 5"
      - id: "e"
        label: "6 or more"
  - id: q1
    prompt: "When was the last time you had a cold or flu-like illness?"
    type: single_choice
    construct: when_was_last_time_had
    required: true
    options:
      - id: "a"
        label: "In the past month"
      - id: "b"
        label: "1 to 3 months ago"
      - id: "c"
        label: "4 to 12 months ago"
      - id: "d"
        label: "More than a year ago"
      - id: "e"
        label: "I can't remember"
  - id: q2
    prompt: "When you catch a cold or the flu, how do you usually handle it?"
    type: single_choice
    construct: when_catch_cold_flu_usually
    required: true
    options:
      - id: "a"
        label: "Treat it entirely on my own at home"
      - id: "b"
        label: "Mostly at home, but I ask a pharmacist for advice"
      - id: "c"
        label: "I usually contact a doctor or clinic"
      - id: "d"
        label: "It depends on how bad it feels"
      - id: "e"
        label: "I usually just wait it out with no treatment"
  - id: q3
    prompt: "Which symptoms do you most often get with a cold or the flu? (Select all that apply)"
    type: multi_choice
    construct: symptoms_most_often_get_cold
    required: true
    options:
      - id: "a"
        label: "Runny or stuffy nose"
      - id: "b"
        label: "Sore throat"
      - id: "c"
        label: "Cough"
      - id: "d"
        label: "Sneezing"
      - id: "e"
        label: "Body aches"
      - id: "f"
        label: "Fever or chills"
      - id: "g"
        label: "Fatigue or low energy"
      - id: "h"
        label: "Headache"
      - id: "i"
        label: "Congestion or sinus pressure"
  - id: q4
    prompt: "Which over-the-counter products do you typically reach for? (Select all that apply)"
