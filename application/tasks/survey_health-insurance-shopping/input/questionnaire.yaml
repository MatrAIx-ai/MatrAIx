      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q31
    prompt: "What makes shopping for health insurance most difficult for you? Please answer briefly."
    type: free_text
    construct: makes_shopping_health_insurance_most
    required: true
  - id: q32
    prompt: "What is your age?"
    type: single_choice
