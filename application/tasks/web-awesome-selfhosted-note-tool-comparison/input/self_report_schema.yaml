artifactName: user_feedback.json
instructions: |
  Reflect honestly after comparing and selecting a self-hosted note-taking tool.
  Base your answers on the project you selected, the alternatives you compared,
  and how confident you feel that the choice fits your realistic context.
fields:
  - key: needConstraintSatisfaction
    prompt: How well did the selected project satisfy your practical needs or constraints?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: personalPreferenceSatisfaction
    prompt: How well did the selected project match your own priorities and tolerance for technical complexity?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: overallExperienceRating
    prompt: Overall, how would you rate the comparison experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
    explanation:
      key: reason
      prompt: Briefly explain the rating in your own voice.
  - key: trustLevel
    prompt: "Optional: how confident are you in the final project choice from 1 to 10?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: effortRating
    prompt: "Optional: how effortful did the comparison feel from 1 to 10, where higher means more effort?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: clarityOfNextStep
    prompt: "Optional: after comparing the projects, did your choice feel clear?"
    kind: boolean
    required: false
