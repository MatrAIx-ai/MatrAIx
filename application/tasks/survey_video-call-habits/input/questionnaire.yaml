    prompt: "Do you make or join video calls (calls where you can see the other person on a screen)?"
    type: single_choice
    construct: make_join_video_calls_calls
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "About how long have you been using video calling apps?"
    type: single_choice
    construct: long_have_been_using_video
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "More than 5 years"
  - id: q2
