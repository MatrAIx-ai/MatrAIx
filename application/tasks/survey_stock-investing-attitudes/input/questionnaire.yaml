    required: true
    options:
      - id: "a"
        label: "Buy more while prices are low"
      - id: "b"
        label: "Do nothing and wait it out"
      - id: "c"
        label: "Feel worried but hold on"
      - id: "d"
        label: "Sell some investments to reduce risk"
      - id: "e"
        label: "Sell most or all to avoid further losses"
  - id: q21
