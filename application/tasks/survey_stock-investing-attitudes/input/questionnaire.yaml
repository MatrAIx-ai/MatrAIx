      - id: "c"
        label: "Generating income (dividends)"
      - id: "d"
        label: "Saving for a specific goal (home, education, etc.)"
      - id: "e"
        label: "Beating inflation"
      - id: "f"
        label: "Making short-term profits"
      - id: "g"
        label: "Learning and enjoying investing"
  - id: q24
