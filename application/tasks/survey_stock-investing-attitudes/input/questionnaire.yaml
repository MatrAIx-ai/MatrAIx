schemaVersion: "1.0"
id: stock_investing_attitudes_v1
title: "Stock Investing Attitudes Survey"
description: "People's beliefs, emotions, and behaviors around investing in the stock market."
questions:
  - id: q0
    prompt: "Do you currently own any stocks or stock-based investments (directly or through funds)?"
    type: single_choice
    construct: currently_own_any_stocks_stock
    required: true
    options:
      - id: "a"
        label: "Yes, individual stocks"
      - id: "b"
        label: "Yes, only through funds (mutual funds, ETFs, or a retirement plan)"
      - id: "c"
        label: "Yes, both individual stocks and funds"
      - id: "d"
        label: "No, but I have invested in the past"
      - id: "e"
        label: "No, I have never invested in stocks"
  - id: q1
    prompt: "How long have you been investing in the stock market?"
    type: single_choice
    construct: long_have_been_investing_stock
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "I have never invested"
  - id: q2
    prompt: "About how much do you currently have invested in stocks and stock funds (excluding your home)?"
    type: single_choice
    construct: much_currently_have_invested_stocks
    required: true
    options:
      - id: "a"
        label: "Nothing"
      - id: "b"
        label: "Less than $5,000"
      - id: "c"
        label: "$5,000 to $24,999"
      - id: "d"
        label: "$25,000 to $99,999"
      - id: "e"
        label: "$100,000 to $499,999"
      - id: "f"
        label: "$500,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q3
    prompt: "Roughly what share of your total savings is invested in stocks or stock funds?"
    type: single_choice
    construct: roughly_share_total_savings_invested
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Less than 25%"
      - id: "c"
        label: "25% to 49%"
      - id: "d"
        label: "50% to 74%"
      - id: "e"
        label: "75% or more"
      - id: "f"
        label: "Don't know"
  - id: q4
    prompt: "Which sources do you use to make stock investing decisions? (Select all that apply)"
    type: multi_choice
    construct: sources_use_make_stock_investing
    required: true
    options:
      - id: "a"
        label: "Financial news sites or TV (e.g., CNBC, Bloomberg, WSJ)"
      - id: "b"
        label: "A financial advisor or professional"
      - id: "c"
        label: "Friends, family, or coworkers"
      - id: "d"
        label: "Social media or online forums (e.g., Reddit, YouTube, TikTok)"
      - id: "e"
        label: "Company research and financial reports"
      - id: "f"
        label: "Brokerage tools and analyst ratings"
      - id: "g"
        label: "I don't actively research; I invest passively"
      - id: "h"
        label: "Not applicable"
  - id: q5
    prompt: "How would you describe your overall risk tolerance as an investor?"
    type: single_choice
    construct: would_describe_overall_risk_tolerance
    required: true
    options:
      - id: "a"
        label: "Very conservative — I avoid risk"
      - id: "b"
        label: "Somewhat conservative"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "Somewhat aggressive"
      - id: "e"
        label: "Very aggressive — I seek high returns and accept big swings"
  - id: q6
    prompt: "How often do you buy or sell individual stocks?"
    type: single_choice
    construct: often_buy_sell_individual_stocks
    required: true
    options:
      - id: "a"
        label: "Never — I only hold funds"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Weekly"
      - id: "e"
        label: "Daily"
  - id: q7
    prompt: "How much do you agree: Investing in the stock market is a smart way to build wealth over time."
    type: single_choice
    construct: much_agree_investing_stock_market
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q8
    prompt: "How much do you agree: Investing in individual stocks is basically a form of gambling."
    type: single_choice
    construct: much_agree_investing_individual_stocks
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree: The stock market is rigged in favor of insiders and the wealthy."
    type: single_choice
    construct: much_agree_stock_market_rigged
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree: I have the knowledge I need to invest in stocks successfully."
    type: single_choice
    construct: much_agree_i_have_knowledge
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree: I get anxious when the value of my investments drops."
    type: single_choice
    construct: much_agree_i_get_anxious
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree: It is possible to reliably time the market to buy low and sell high."
    type: single_choice
    construct: much_agree_it_possible_reliably
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: Long-term investing is better than trying to trade frequently."
    type: single_choice
    construct: much_agree_long_term_investing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: I fear losing money more than I hope to gain from investing."
    type: single_choice
    construct: much_agree_i_fear_losing
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "When evaluating whether to invest in a stock, how important is each factor: the company's growth potential."
    type: single_choice
    construct: when_evaluating_whether_invest_stock
    required: true
    options:
