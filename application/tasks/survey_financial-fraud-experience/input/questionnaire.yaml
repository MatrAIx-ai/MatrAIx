schemaVersion: "1.0"
id: financial_fraud_experience_v1
title: "Financial Fraud Experience Survey"
description: "People's real-world experiences with financial scams and fraud, the losses and responses involved, and how they protect themselves."
questions:
  - id: q0
    prompt: "In the past 3 years, have you personally been targeted by a financial scam or fraud attempt (whether or not you lost money)?"
    type: single_choice
    construct: past_3_years_have_personally
    required: true
    options:
      - id: "a"
        label: "Yes, many times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not sure"
  - id: q1
    prompt: "In the past 3 years, did you actually lose money to a financial scam or fraud?"
    type: single_choice
    construct: past_3_years_did_actually
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, I was targeted but did not lose money"
      - id: "d"
        label: "No, I was never targeted"
      - id: "e"
        label: "Prefer not to say"
  - id: q2
    prompt: "Which types of scams or fraud have you encountered? (Select all that apply)"
    type: multi_choice
    construct: types_scams_fraud_have_encountered
    required: true
    options:
      - id: "a"
        label: "Phishing emails or texts"
      - id: "b"
        label: "Fake bank or credit card fraud alerts"
      - id: "c"
        label: "Imposter scams (IRS, Social Security, government)"
      - id: "d"
        label: "Tech support scams"
      - id: "e"
        label: "Romance or relationship scams"
      - id: "f"
        label: "Investment or crypto scams"
      - id: "g"
        label: "Online shopping or marketplace fraud"
      - id: "h"
        label: "Unauthorized charges on a card or account"
      - id: "i"
        label: "Check or wire fraud"
      - id: "j"
        label: "Job or employment scams"
      - id: "k"
        label: "None of these"
  - id: q3
    prompt: "Through which channels have scammers contacted you? (Select all that apply)"
    type: multi_choice
    construct: through_channels_have_scammers_contacted
    required: true
    options:
      - id: "a"
        label: "Email"
      - id: "b"
        label: "Text message (SMS)"
      - id: "c"
        label: "Phone call"
      - id: "d"
        label: "Social media"
      - id: "e"
        label: "Dating or messaging apps"
      - id: "f"
        label: "Mail"
      - id: "g"
        label: "In person"
      - id: "h"
        label: "Pop-up or website"
      - id: "i"
        label: "None of these"
  - id: q4
    prompt: "Thinking of the most significant fraud incident that affected you, roughly how much money did you lose? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: thinking_most_significant_fraud_incident
    required: true
  - id: q5
    prompt: "In that most significant incident, what payment method did the scammer have you use?"
    type: single_choice
    construct: that_most_significant_incident_payment
    required: true
    options:
      - id: "a"
        label: "Credit card"
      - id: "b"
        label: "Debit card or bank transfer"
      - id: "c"
        label: "Wire transfer"
      - id: "d"
        label: "Peer-to-peer app (Zelle, Venmo, Cash App)"
      - id: "e"
        label: "Gift cards"
      - id: "f"
        label: "Cryptocurrency"
      - id: "g"
        label: "Cash"
      - id: "h"
        label: "No money was sent"
      - id: "i"
        label: "Not applicable"
  - id: q6
    prompt: "How did that most significant incident ultimately resolve?"
    type: single_choice
    construct: did_that_most_significant_incident
    required: true
    options:
      - id: "a"
        label: "I recovered all of the money"
      - id: "b"
        label: "I recovered some of the money"
      - id: "c"
        label: "I recovered none of the money"
      - id: "d"
        label: "No money was lost"
      - id: "e"
        label: "Still unresolved"
      - id: "f"
        label: "Not applicable"
  - id: q7
    prompt: "After a fraud incident or attempt, which of the following did you do? (Select all that apply)"
    type: multi_choice
    construct: after_fraud_incident_attempt_following
    required: true
    options:
      - id: "a"
        label: "Contacted my bank or card issuer"
      - id: "b"
        label: "Disputed the charge"
      - id: "c"
        label: "Changed passwords or security settings"
      - id: "d"
        label: "Placed a fraud alert or credit freeze"
      - id: "e"
        label: "Reported it to the FTC or a government agency"
      - id: "f"
        label: "Filed a police report"
      - id: "g"
        label: "Told family or friends"
      - id: "h"
        label: "Did nothing"
      - id: "i"
        label: "Not applicable"
  - id: q8
    prompt: "How confident are you that you can recognize a scam before falling for it?"
    type: single_choice
    construct: confident_that_can_recognize_scam
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q9
    prompt: "Which protective measures do you currently use? (Select all that apply)"
    type: multi_choice
    construct: protective_measures_currently_use_select
    required: true
    options:
      - id: "a"
        label: "Transaction alerts on my accounts"
      - id: "b"
        label: "Two-factor authentication"
      - id: "c"
        label: "A password manager"
      - id: "d"
        label: "Credit monitoring service"
      - id: "e"
        label: "Credit freeze on my reports"
      - id: "f"
        label: "Identity theft protection service"
      - id: "g"
        label: "Spam-call blocking app"
      - id: "h"
        label: "None of these"
  - id: q10
    prompt: "How often do you check your bank and card statements for suspicious activity?"
    type: single_choice
