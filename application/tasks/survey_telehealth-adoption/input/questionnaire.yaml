      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q30
    prompt: "What would make you more likely to use telehealth in the future? Please answer briefly."
    type: free_text
    construct: would_make_more_likely_use
    required: true
  - id: q31
    prompt: "What is your age?"
