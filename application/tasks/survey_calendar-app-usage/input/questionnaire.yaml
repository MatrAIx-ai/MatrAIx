        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q30
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "Under 18"
      - id: "b"
        label: "18–24"
      - id: "c"
        label: "25–34"
      - id: "d"
        label: "35–44"
      - id: "e"
        label: "45–54"
      - id: "f"
        label: "55–64"
      - id: "g"
        label: "65 or older"
      - id: "h"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
