      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident"
  - id: q25
    prompt: "How knowledgeable do you feel about personal finance overall?"
    type: single_choice
