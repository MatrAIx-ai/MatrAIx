schemaVersion: "1.0"
id: net_worth_tracking_v1
title: "Net Worth Tracking Survey"
description: "How people track their net worth and monitor their overall financial picture."
questions:
  - id: q0
    prompt: "Do you actively track your net worth (your total assets minus your total debts)?"
    type: single_choice
    construct: actively_track_net_worth_total
    required: true
    options:
      - id: "a"
        label: "Yes, on a regular schedule"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I have a rough idea"
      - id: "d"
        label: "No, and I have never calculated it"
  - id: q1
    prompt: "How long have you been tracking your net worth?"
    type: single_choice
    construct: long_have_been_tracking_net
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I do not track it"
  - id: q2
    prompt: "How often do you update or review your net worth?"
    type: single_choice
    construct: often_update_review_net_worth
    required: true
    options:
      - id: "a"
        label: "Weekly or more often"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "Every few months"
      - id: "d"
        label: "Once or twice a year"
      - id: "e"
        label: "Rarely or never"
  - id: q3
    prompt: "What tools do you use to track your net worth? (Select all that apply)"
    type: multi_choice
    construct: tools_use_track_net_worth
    required: true
    options:
      - id: "a"
        label: "A spreadsheet I built myself (for example, Excel or Google Sheets)"
      - id: "b"
        label: "Empower (formerly Personal Capital)"
      - id: "c"
        label: "Monarch Money"
      - id: "d"
        label: "Mint or a successor app"
      - id: "e"
        label: "YNAB (You Need A Budget)"
      - id: "f"
        label: "My bank or brokerage dashboard"
      - id: "g"
        label: "A pen-and-paper method"
      - id: "h"
        label: "I keep it in my head"
      - id: "i"
        label: "I do not track it"
  - id: q4
    prompt: "Which single method do you rely on most for tracking net worth?"
    type: single_choice
    construct: single_method_rely_most_tracking
    required: true
    options:
      - id: "a"
        label: "A personal spreadsheet"
      - id: "b"
        label: "A dedicated app or service"
      - id: "c"
        label: "My bank or brokerage dashboard"
      - id: "d"
        label: "Pen and paper"
      - id: "e"
        label: "Mental estimate"
      - id: "f"
        label: "I do not track it"
  - id: q5
    prompt: "Do you link your financial accounts to an app to update balances automatically?"
    type: single_choice
    construct: link_financial_accounts_app_update
    required: true
    options:
      - id: "a"
        label: "Yes, all or most of them"
      - id: "b"
        label: "Yes, some of them"
      - id: "c"
        label: "No, I update everything manually"
      - id: "d"
        label: "I do not track my net worth"
  - id: q6
    prompt: "Which assets do you include when calculating your net worth? (Select all that apply)"
    type: multi_choice
    construct: assets_include_when_calculating_net
    required: true
    options:
      - id: "a"
        label: "Checking and savings accounts"
      - id: "b"
        label: "Retirement accounts (401(k), IRA)"
      - id: "c"
        label: "Brokerage or investment accounts"
      - id: "d"
        label: "Home or real estate value"
      - id: "e"
        label: "Vehicle value"
      - id: "f"
        label: "Cryptocurrency"
      - id: "g"
        label: "Cash value of life insurance"
      - id: "h"
        label: "Business ownership"
      - id: "i"
        label: "Valuable personal property"
      - id: "j"
        label: "I do not track my net worth"
  - id: q7
    prompt: "Which debts do you subtract when calculating your net worth? (Select all that apply)"
    type: multi_choice
    construct: debts_subtract_when_calculating_net
    required: true
    options:
      - id: "a"
        label: "Mortgage"
      - id: "b"
        label: "Auto loans"
      - id: "c"
        label: "Student loans"
      - id: "d"
        label: "Credit card balances"
      - id: "e"
        label: "Personal loans"
      - id: "f"
        label: "Medical debt"
      - id: "g"
        label: "I have no debts"
      - id: "h"
        label: "I do not track my net worth"
  - id: q8
    prompt: "Which range best describes your current total net worth?"
    type: single_choice
    construct: range_best_describes_current_total
    required: true
    options:
      - id: "a"
        label: "Negative (I owe more than I own)"
      - id: "b"
        label: "$0 to $9,999"
      - id: "c"
        label: "$10,000 to $49,999"
      - id: "d"
        label: "$50,000 to $99,999"
      - id: "e"
        label: "$100,000 to $249,999"
      - id: "f"
        label: "$250,000 to $499,999"
      - id: "g"
        label: "$500,000 to $999,999"
      - id: "h"
        label: "$1 million or more"
      - id: "i"
        label: "Prefer not to say"
  - id: q9
    prompt: "About how many separate financial accounts do you track in total? Please enter a number."
    type: free_text
    construct: many_separate_financial_accounts_track
    required: true
  - id: q10
    prompt: "Compared with a year ago, how has your net worth changed?"
    type: single_choice
    construct: compared_year_ago_has_net
    required: true
    options:
      - id: "a"
        label: "Increased a lot"
      - id: "b"
        label: "Increased a little"
      - id: "c"
        label: "Stayed about the same"
      - id: "d"
        label: "Decreased a little"
      - id: "e"
        label: "Decreased a lot"
      - id: "f"
        label: "Not sure"
  - id: q11
    prompt: "Do you have a specific net worth target or milestone you are working toward?"
    type: single_choice
    construct: have_specific_net_worth_target
    required: true
    options:
      - id: "a"
        label: "Yes, a specific number"
      - id: "b"
        label: "Yes, a rough goal"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not sure"
  - id: q12
    prompt: "How much do you agree or disagree: Tracking my net worth helps me make better financial decisions."
    type: single_choice
    construct: much_agree_disagree_tracking_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: Seeing my net worth motivates me to save and invest more."
    type: single_choice
    construct: much_agree_disagree_seeing_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: Checking my net worth sometimes makes me anxious."
    type: single_choice
    construct: much_agree_disagree_checking_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: I trust financial apps to keep my linked account data secure."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: I have a clear picture of my overall financial situation."
    type: single_choice
    construct: much_agree_disagree_i_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How useful is net worth tracking for each goal — Paying down debt?"
    type: single_choice
    construct: useful_net_worth_tracking_each
    required: true
    options:
      - id: "a"
        label: "Not at all useful"
      - id: "b"
        label: "Slightly useful"
      - id: "c"
        label: "Moderately useful"
      - id: "d"
        label: "Very useful"
      - id: "e"
        label: "Extremely useful"
  - id: q18
    prompt: "How useful is net worth tracking for each goal — Growing investments?"
    type: single_choice
    construct: useful_net_worth_tracking_each
    required: true
    options:
      - id: "a"
        label: "Not at all useful"
      - id: "b"
        label: "Slightly useful"
      - id: "c"
        label: "Moderately useful"
      - id: "d"
        label: "Very useful"
      - id: "e"
        label: "Extremely useful"
  - id: q19
    prompt: "How useful is net worth tracking for each goal — Planning for retirement?"
    type: single_choice
