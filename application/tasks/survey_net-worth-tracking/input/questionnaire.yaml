      - id: "a"
        label: "Not at all useful"
      - id: "b"
        label: "Slightly useful"
      - id: "c"
        label: "Moderately useful"
      - id: "d"
        label: "Very useful"
      - id: "e"
        label: "Extremely useful"
  - id: q21
    prompt: "How useful is net worth tracking for each goal — Feeling in control of my money?"
    type: single_choice
    construct: useful_net_worth_tracking_each
    required: true
    options:
      - id: "a"
        label: "Not at all useful"
      - id: "b"
        label: "Slightly useful"
      - id: "c"
        label: "Moderately useful"
      - id: "d"
        label: "Very useful"
      - id: "e"
        label: "Extremely useful"
  - id: q22
    prompt: "Please select your top 3 reasons for tracking (or wanting to track) your net worth. (Select all that apply)"
    type: multi_choice
    construct: please_select_top_3_reasons
    required: true
    options:
      - id: "a"
        label: "See progress over time"
      - id: "b"
        label: "Stay motivated to save"
      - id: "c"
        label: "Monitor debt payoff"
      - id: "d"
        label: "Plan for retirement"
      - id: "e"
        label: "Prepare for a big purchase"
      - id: "f"
        label: "Feel more in control"
      - id: "g"
        label: "Compare against goals or benchmarks"
      - id: "h"
        label: "Catch problems early"
  - id: q23
    prompt: "How often do you compare your net worth to past periods or to a goal?"
    type: single_choice
    construct: often_compare_net_worth_past
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
