        label: "Interest rate / APR"
      - id: "b"
        label: "Origination fees"
      - id: "c"
        label: "Discount points"
      - id: "d"
        label: "Appraisal and inspection fees"
      - id: "e"
        label: "Closing costs overall"
      - id: "f"
        label: "Private mortgage insurance (PMI)"
      - id: "g"
        label: "I didn't compare fees in detail"
  - id: q10
