schemaVersion: "1.0"
id: mortgage_shopping_v1
title: "Mortgage Shopping Survey"
description: "How people compare lenders and shop for a mortgage."
questions:
  - id: q0
    prompt: "Which best describes your experience with mortgage shopping?"
    type: single_choice
    construct: best_describes_experience_mortgage_shopp
    required: true
    options:
      - id: "a"
        label: "I'm shopping for a mortgage right now"
      - id: "b"
        label: "I got a mortgage in the past 2 years"
      - id: "c"
        label: "I got a mortgage more than 2 years ago"
      - id: "d"
        label: "I plan to shop for one soon"
      - id: "e"
        label: "I've never shopped for a mortgage"
  - id: q1
    prompt: "What type of mortgage are you shopping for (or did you get)?"
    type: single_choice
    construct: type_mortgage_shopping_did_get
    required: true
    options:
      - id: "a"
        label: "Purchase loan for a primary home"
      - id: "b"
        label: "Purchase loan for a second home or investment property"
      - id: "c"
        label: "Refinance of an existing mortgage"
      - id: "d"
        label: "Not sure yet"
  - id: q2
    prompt: "Which loan type are you considering or did you choose?"
    type: single_choice
    construct: loan_type_considering_did_choose
    required: true
    options:
      - id: "a"
        label: "Conventional loan"
      - id: "b"
        label: "FHA loan"
      - id: "c"
        label: "VA loan"
      - id: "d"
        label: "USDA loan"
      - id: "e"
        label: "Jumbo loan"
      - id: "f"
        label: "I'm not sure"
  - id: q3
    prompt: "Which loan term are you considering or did you choose?"
    type: single_choice
    construct: loan_term_considering_did_choose
    required: true
    options:
      - id: "a"
        label: "30-year fixed"
      - id: "b"
        label: "15-year fixed"
      - id: "c"
        label: "20-year fixed"
      - id: "d"
        label: "Adjustable-rate (ARM)"
      - id: "e"
        label: "I'm not sure"
  - id: q4
    prompt: "How many lenders did you (or do you plan to) get quotes from?"
    type: single_choice
    construct: many_lenders_did_plan_get
    required: true
    options:
      - id: "a"
        label: "Just 1"
      - id: "b"
        label: "2"
      - id: "c"
        label: "3 to 4"
      - id: "d"
        label: "5 or more"
      - id: "e"
        label: "I'm not sure yet"
  - id: q5
    prompt: "Which types of lenders did you get quotes from? (Select all that apply)"
    type: multi_choice
    construct: types_lenders_did_get_quotes
    required: true
    options:
      - id: "a"
        label: "My existing bank or credit union"
      - id: "b"
        label: "A large national bank (Chase, Wells Fargo, etc.)"
      - id: "c"
        label: "An online lender (Rocket Mortgage, Better.com, etc.)"
      - id: "d"
        label: "A mortgage broker"
      - id: "e"
        label: "A local or regional lender"
      - id: "f"
        label: "A builder's preferred lender"
      - id: "g"
        label: "I only used one lender"
  - id: q6
    prompt: "Which tools or resources did you use to shop for a mortgage? (Select all that apply)"
    type: multi_choice
    construct: tools_resources_did_use_shop
    required: true
    options:
      - id: "a"
        label: "Online rate comparison sites (Bankrate, NerdWallet)"
      - id: "b"
        label: "Lender websites directly"
      - id: "c"
        label: "A mortgage broker"
      - id: "d"
        label: "A real estate agent's referral"
      - id: "e"
        label: "Friends or family recommendations"
      - id: "f"
        label: "Financial blogs, YouTube, or podcasts"
      - id: "g"
        label: "Loan Estimate documents to compare offers"
  - id: q7
    prompt: "Did you get pre-approved before shopping for rates?"
    type: single_choice
    construct: did_get_pre_approved_before
    required: true
    options:
      - id: "a"
        label: "Yes, before comparing lenders"
      - id: "b"
        label: "Yes, but only with one lender"
      - id: "c"
        label: "No, I got quotes first"
      - id: "d"
        label: "No"
  - id: q8
    prompt: "What was the most important factor in choosing your lender?"
    type: single_choice
    construct: was_most_important_factor_choosing
    required: true
    options:
      - id: "a"
        label: "The lowest interest rate"
      - id: "b"
        label: "The lowest closing costs / fees"
      - id: "c"
        label: "Reputation and reviews"
      - id: "d"
        label: "Speed and ease of the process"
      - id: "e"
        label: "A recommendation I trusted"
      - id: "f"
        label: "Customer service and communication"
