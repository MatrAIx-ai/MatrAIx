schemaVersion: "1.0"
id: vitamin_supplement_usage_v1
title: "Vitamin & Supplement Usage Survey"
description: "How consumers choose, buy, and use vitamins and dietary supplements as part of their wellness routines."
questions:
  - id: q0
    prompt: "Do you currently take any vitamins or dietary supplements?"
    type: single_choice
    construct: currently_take_any_vitamins_dietary
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, most days"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "How long have you been taking vitamins or supplements regularly?"
    type: single_choice
    construct: long_have_been_taking_vitamins
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "Which vitamins or supplements do you take? (Select all that apply)"
    type: multi_choice
    construct: vitamins_supplements_take_select_all
    required: true
    options:
      - id: "a"
        label: "Multivitamin"
      - id: "b"
        label: "Vitamin D"
      - id: "c"
        label: "Vitamin C"
      - id: "d"
        label: "Vitamin B or B-complex"
      - id: "e"
        label: "Calcium or magnesium"
      - id: "f"
        label: "Fish oil or omega-3"
      - id: "g"
        label: "Probiotics"
      - id: "h"
        label: "Protein powder or shakes"
      - id: "i"
        label: "Herbal supplements (for example, turmeric, echinacea)"
      - id: "j"
        label: "None of these"
  - id: q3
    prompt: "How many different supplements do you take on a typical day? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_different_supplements_take_typical
    required: true
  - id: q4
    prompt: "Roughly how much do you spend on vitamins and supplements in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_spend_vitamins_supplements
    required: true
  - id: q5
    prompt: "What are your main reasons for taking supplements? (Select all that apply)"
    type: multi_choice
    construct: main_reasons_taking_supplements_select
    required: true
    options:
      - id: "a"
        label: "General health and wellness"
      - id: "b"
        label: "Fill gaps in my diet"
      - id: "c"
        label: "Boost energy"
      - id: "d"
        label: "Support immune health"
      - id: "e"
        label: "Support bone or joint health"
      - id: "f"
        label: "Improve sleep"
      - id: "g"
        label: "Support fitness or muscle recovery"
      - id: "h"
        label: "A doctor recommended it"
      - id: "i"
        label: "Heart or brain health"
  - id: q6
    prompt: "What prompted you to start taking supplements? (Select all that apply)"
    type: multi_choice
    construct: prompted_start_taking_supplements_select
    required: true
    options:
      - id: "a"
        label: "A doctor's recommendation"
      - id: "b"
        label: "Blood test results"
      - id: "c"
        label: "My own research"
      - id: "d"
        label: "Friends or family"
      - id: "e"
        label: "Social media or influencers"
      - id: "f"
        label: "Advertising"
      - id: "g"
        label: "A specific health goal"
      - id: "h"
        label: "Not applicable"
  - id: q7
    prompt: "Where do you usually buy your vitamins and supplements? (Select all that apply)"
    type: multi_choice
    construct: where_usually_buy_vitamins_supplements
    required: true
    options:
      - id: "a"
        label: "Pharmacy or drugstore"
      - id: "b"
        label: "Grocery store"
      - id: "c"
        label: "Big-box store (for example, Walmart or Target)"
      - id: "d"
        label: "Warehouse club (for example, Costco)"
      - id: "e"
        label: "Online (for example, Amazon)"
      - id: "f"
        label: "A vitamin or health store (for example, GNC)"
      - id: "g"
        label: "Direct from a brand or subscription service"
  - id: q8
    prompt: "When choosing a supplement, which do you usually pick?"
    type: single_choice
    construct: when_choosing_supplement_usually_pick
    required: true
    options:
      - id: "a"
        label: "A well-known name brand"
      - id: "b"
        label: "A store or generic brand"
      - id: "c"
        label: "Whichever is cheapest"
      - id: "d"
        label: "Whichever is recommended to me"
      - id: "e"
        label: "It depends on the product"
  - id: q9
    prompt: "What form do you prefer for your supplements?"
    type: single_choice
    construct: form_prefer_supplements
    required: true
    options:
      - id: "a"
        label: "Tablets or capsules"
      - id: "b"
        label: "Gummies"
      - id: "c"
        label: "Powders"
      - id: "d"
        label: "Liquids"
      - id: "e"
        label: "No preference"
  - id: q10
    prompt: "How did you decide which supplements to take? (Select all that apply)"
    type: multi_choice
    construct: did_decide_supplements_take_select
    required: true
    options:
      - id: "a"
        label: "A doctor or pharmacist recommended them"
      - id: "b"
        label: "Online research"
      - id: "c"
        label: "Product labels and claims"
      - id: "d"
        label: "Reviews and ratings"
      - id: "e"
        label: "Friends or family"
      - id: "f"
        label: "Social media"
      - id: "g"
        label: "Trial and error"
  - id: q11
    prompt: "How often do you take your supplements as directed on the label?"
    type: single_choice
    construct: often_take_supplements_as_directed
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q12
    prompt: "Have you told your doctor which supplements you take?"
    type: single_choice
