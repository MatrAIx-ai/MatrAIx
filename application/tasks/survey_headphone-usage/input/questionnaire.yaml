schemaVersion: "1.0"
id: headphone_usage_v1
title: "Headphone Usage Survey"
description: "Everyday use of headphones and earbuds — device types and brands, listening habits, features valued, and attitudes toward sound quality and hearing safety."
questions:
  - id: q0
    prompt: "How often do you use headphones or earbuds?"
    type: single_choice
    construct: often_use_headphones_earbuds
    required: true
    options:
      - id: "a"
        label: "Many hours every day"
      - id: "b"
        label: "Daily, but not for long"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely"
  - id: q1
    prompt: "Which types of headphones or earbuds do you own? (Select all that apply)"
    type: multi_choice
    construct: types_headphones_earbuds_own_select
    required: true
    options:
      - id: "a"
        label: "True wireless earbuds (e.g., AirPods)"
      - id: "b"
        label: "Wireless over-ear headphones"
      - id: "c"
        label: "Wireless on-ear headphones"
      - id: "d"
        label: "Wired earbuds"
      - id: "e"
        label: "Wired over-ear or on-ear headphones"
      - id: "f"
        label: "Neckband / wireless in-ear"
      - id: "g"
        label: "Bone conduction headphones"
      - id: "h"
        label: "Gaming headset"
      - id: "i"
        label: "None of these"
  - id: q2
    prompt: "Which type do you use MOST often?"
    type: single_choice
    construct: type_use_most_often
    required: true
    options:
      - id: "a"
        label: "True wireless earbuds"
      - id: "b"
        label: "Wireless over-ear headphones"
      - id: "c"
        label: "Wired earbuds"
      - id: "d"
        label: "Wired over-ear headphones"
      - id: "e"
        label: "Gaming headset"
      - id: "f"
        label: "Bone conduction / other"
  - id: q3
    prompt: "How many pairs of headphones or earbuds do you currently own? Enter a whole number."
    type: free_text
    construct: many_pairs_headphones_earbuds_currently
    required: true
  - id: q4
    prompt: "Which headphone/earbud brands do you own? (Select all that apply)"
    type: multi_choice
    construct: headphone_earbud_brands_own_select
    required: true
    options:
      - id: "a"
        label: "Apple (AirPods, Beats)"
      - id: "b"
        label: "Sony"
      - id: "c"
        label: "Bose"
      - id: "d"
        label: "Samsung (Galaxy Buds)"
      - id: "e"
        label: "Sennheiser"
      - id: "f"
        label: "JBL"
      - id: "g"
        label: "Anker / Soundcore"
      - id: "h"
        label: "Jabra"
      - id: "i"
        label: "Audio-Technica"
      - id: "j"
        label: "Skullcandy"
      - id: "k"
        label: "Other"
  - id: q5
    prompt: "What do you use headphones for? (Select all that apply)"
    type: multi_choice
    construct: use_headphones_select_all_that
    required: true
    options:
      - id: "a"
        label: "Music"
      - id: "b"
        label: "Podcasts and audiobooks"
      - id: "c"
        label: "Phone and video calls"
      - id: "d"
        label: "Gaming"
      - id: "e"
        label: "Watching videos / streaming"
      - id: "f"
        label: "Working out / exercise"
      - id: "g"
        label: "Focus / blocking out noise at work"
      - id: "h"
        label: "Commuting / travel"
      - id: "i"
        label: "Sleeping or relaxation"
  - id: q6
    prompt: "Roughly how many hours per day do you wear headphones? Enter a whole number."
    type: free_text
    construct: roughly_many_hours_per_day
    required: true
  - id: q7
    prompt: "Where do you use headphones most? (Select all that apply)"
    type: multi_choice
    construct: where_use_headphones_most_select
    required: true
    options:
      - id: "a"
        label: "At home"
      - id: "b"
        label: "At work or school"
      - id: "c"
        label: "Commuting / on public transit"
      - id: "d"
        label: "At the gym / exercising"
      - id: "e"
        label: "Walking or running outdoors"
      - id: "f"
        label: "Traveling (flights, trips)"
  - id: q8
    prompt: "How do your primary headphones connect?"
    type: single_choice
    construct: primary_headphones_connect
    required: true
    options:
      - id: "a"
        label: "Bluetooth wireless"
      - id: "b"
        label: "Wired (3.5mm jack)"
      - id: "c"
        label: "Wired (USB-C or Lightning)"
      - id: "d"
        label: "Wireless with a USB dongle"
      - id: "e"
        label: "Not sure"
  - id: q9
    prompt: "Do your primary headphones have active noise cancellation (ANC)?"
    type: single_choice
    construct: primary_headphones_have_active_noise
    required: true
    options:
      - id: "a"
        label: "Yes, and I use it often"
      - id: "b"
        label: "Yes, but I rarely use it"
      - id: "c"
        label: "No, but I'd like it"
      - id: "d"
        label: "No, and I don't need it"
      - id: "e"
        label: "Not sure"
  - id: q10
    prompt: "Roughly how much did you spend on your primary headphones? Enter a whole-dollar amount (US$)."
    type: free_text
    construct: roughly_much_did_spend_primary
    required: true
  - id: q11
    prompt: "When buying headphones, how important is sound quality?"
    type: single_choice
    construct: when_buying_headphones_important_sound
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q12
    prompt: "When buying headphones, how important is comfort and fit?"
    type: single_choice
    construct: when_buying_headphones_important_comfort
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q13
    prompt: "When buying headphones, how important is noise cancellation?"
    type: single_choice
