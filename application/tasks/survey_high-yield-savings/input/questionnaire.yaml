schemaVersion: "1.0"
id: high_yield_savings_v1
title: "High-Yield Savings Accounts Survey"
description: "How people use high-yield savings accounts to earn interest on their cash."
questions:
  - id: q0
    prompt: "Do you currently have a high-yield savings account (HYSA)?"
    type: single_choice
    construct: currently_have_high_yield_savings
    required: true
    options:
      - id: "a"
        label: "Yes, one high-yield savings account"
      - id: "b"
        label: "Yes, more than one"
      - id: "c"
        label: "No, but I'm considering opening one"
      - id: "d"
        label: "No, and I'm not considering one"
      - id: "e"
        label: "I'm not familiar with high-yield savings accounts"
  - id: q1
    prompt: "How long have you had a high-yield savings account?"
    type: single_choice
    construct: long_have_had_high_yield
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I don't have one"
  - id: q2
    prompt: "Which provider holds your primary high-yield savings account?"
    type: single_choice
    construct: provider_holds_primary_high_yield
    required: true
    options:
      - id: "a"
        label: "Ally Bank"
      - id: "b"
        label: "Marcus by Goldman Sachs"
      - id: "c"
        label: "SoFi"
      - id: "d"
        label: "American Express"
      - id: "e"
        label: "Capital One (360 Performance Savings)"
      - id: "f"
        label: "Discover"
      - id: "g"
        label: "A credit union or local bank"
      - id: "h"
        label: "Another online bank"
      - id: "i"
        label: "I don't have one"
  - id: q3
    prompt: "Roughly what annual percentage yield (APY) does your account currently earn?"
    type: single_choice
    construct: roughly_annual_percentage_yield_apy
    required: true
    options:
      - id: "a"
        label: "Less than 2%"
      - id: "b"
        label: "2% to 3.49%"
      - id: "c"
        label: "3.5% to 4.49%"
      - id: "d"
        label: "4.5% or more"
      - id: "e"
        label: "I'm not sure"
      - id: "f"
        label: "I don't have a high-yield account"
  - id: q4
    prompt: "What do you primarily use your high-yield savings account for?"
    type: single_choice
    construct: primarily_use_high_yield_savings
    required: true
    options:
      - id: "a"
        label: "Emergency fund"
      - id: "b"
        label: "Saving for a specific goal (home, car, trip)"
      - id: "c"
        label: "Parking cash I don't need right away"
      - id: "d"
        label: "General savings with no specific purpose"
      - id: "e"
        label: "Business or tax reserves"
  - id: q5
    prompt: "What goals are you saving toward in high-yield accounts? (Select all that apply)"
    type: multi_choice
    construct: goals_saving_toward_high_yield
    required: true
    options:
      - id: "a"
        label: "Emergency fund"
      - id: "b"
        label: "Home down payment"
      - id: "c"
        label: "A car"
      - id: "d"
        label: "Vacation or travel"
      - id: "e"
        label: "Wedding or major event"
      - id: "f"
        label: "Taxes or business reserves"
      - id: "g"
        label: "General wealth building"
      - id: "h"
        label: "No specific goal"
  - id: q6
    prompt: "How did you first learn about high-yield savings accounts? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_high_yield
    required: true
    options:
      - id: "a"
        label: "Friends or family"
      - id: "b"
        label: "Financial blogs or websites"
      - id: "c"
        label: "Social media (Reddit, TikTok, YouTube)"
      - id: "d"
        label: "News coverage of interest rates"
      - id: "e"
        label: "A bank or advisor"
      - id: "f"
        label: "Comparison sites (NerdWallet, Bankrate)"
      - id: "g"
        label: "I don't remember"
  - id: q7
    prompt: "How did you choose your current high-yield savings provider? (Select all that apply)"
    type: multi_choice
    construct: did_choose_current_high_yield
    required: true
    options:
