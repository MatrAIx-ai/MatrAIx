        label: "Highest APY available"
      - id: "b"
        label: "No fees or minimums"
      - id: "c"
        label: "Trusted brand name"
      - id: "d"
        label: "Easy online sign-up"
      - id: "e"
        label: "Good mobile app"
      - id: "f"
        label: "Sign-up bonus"
      - id: "g"
        label: "Already banked there"
      - id: "h"
