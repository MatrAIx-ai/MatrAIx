      - id: "a"
        label: "Included in a gym membership"
      - id: "b"
        label: "Studio membership or package"
      - id: "c"
        label: "Pay per class (drop-in)"
      - id: "d"
        label: "A multi-studio app (e.g., ClassPass)"
      - id: "e"
        label: "Free through work or community"
      - id: "f"
        label: "Not applicable"
