schemaVersion: "1.0"
id: fitness_class_attendance_v1
title: "Fitness Class Attendance Survey"
description: "How consumers take part in group fitness classes."
questions:
  - id: q0
    prompt: "Do you currently take part in any group fitness classes?"
    type: single_choice
    construct: currently_take_part_any_group
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I'm interested"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "In a typical week, how many fitness classes do you attend?"
    type: single_choice
    construct: typical_week_many_fitness_classes
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 5"
      - id: "e"
        label: "6 or more"
  - id: q2
    prompt: "Which types of fitness classes do you attend or have attended? (Select all that apply)"
    type: multi_choice
    construct: types_fitness_classes_attend_have
    required: true
    options:
      - id: "a"
        label: "Yoga"
      - id: "b"
        label: "Pilates"
      - id: "c"
        label: "Indoor cycling or spin"
      - id: "d"
        label: "HIIT or bootcamp"
      - id: "e"
        label: "Strength or weight training"
      - id: "f"
        label: "Dance-based (Zumba, barre)"
      - id: "g"
        label: "Water aerobics or swim"
      - id: "h"
        label: "Martial arts or kickboxing"
      - id: "i"
        label: "None of these"
  - id: q3
    prompt: "Where do you usually take fitness classes? (Select all that apply)"
    type: multi_choice
    construct: where_usually_take_fitness_classes
    required: true
    options:
      - id: "a"
        label: "A gym or health club"
      - id: "b"
        label: "A boutique fitness studio"
      - id: "c"
        label: "Community or recreation center"
      - id: "d"
        label: "At home via streaming or an app"
      - id: "e"
        label: "Outdoors or a park"
      - id: "f"
        label: "Workplace wellness program"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "How long have you been attending fitness classes?"
