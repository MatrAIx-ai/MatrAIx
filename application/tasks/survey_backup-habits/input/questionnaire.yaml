schemaVersion: "1.0"
id: backup_habits_v1
title: "Data Backup Habits Survey"
description: "How people back up, protect, and recover their personal and work data."
questions:
  - id: q0
    prompt: "Do you currently back up your important files and data?"
    type: single_choice
    construct: currently_back_up_important_files
    required: true
    options:
      - id: "a"
        label: "Yes, with automatic backups"
      - id: "b"
        label: "Yes, but I back up manually"
      - id: "c"
        label: "Sometimes / occasionally"
      - id: "d"
        label: "No, but I plan to start"
      - id: "e"
        label: "No, and I have no plans to"
      - id: "f"
        label: "I'm not sure"
  - id: q1
    prompt: "How often do your backups happen?"
    type: single_choice
    construct: often_backups_happen
    required: true
    options:
      - id: "a"
        label: "Continuously / in real time"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "Weekly"
      - id: "d"
        label: "Monthly"
      - id: "e"
        label: "Only occasionally when I remember"
      - id: "f"
        label: "Never / not applicable"
  - id: q2
    prompt: "Have you ever permanently lost important data (photos, documents, etc.)?"
    type: single_choice
    construct: have_ever_permanently_lost_important
    required: true
    options:
      - id: "a"
        label: "Yes, and it was significant"
      - id: "b"
        label: "Yes, but it was minor"
      - id: "c"
        label: "I had a scare but recovered it"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not sure"
  - id: q3
    prompt: "When did you last confirm that a backup actually worked (test a restore)?"
    type: single_choice
    construct: when_did_last_confirm_that
    required: true
    options:
      - id: "a"
        label: "Within the last month"
      - id: "b"
        label: "Within the last 6 months"
      - id: "c"
        label: "Within the last year"
      - id: "d"
        label: "More than a year ago"
      - id: "e"
        label: "Never"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "Which backup methods do you currently use? (Select all that apply)"
    type: multi_choice
    construct: backup_methods_currently_use_select
    required: true
    options:
      - id: "a"
        label: "External hard drive or SSD"
      - id: "b"
        label: "Cloud backup service"
      - id: "c"
        label: "Network-attached storage (NAS)"
      - id: "d"
        label: "USB flash drive"
      - id: "e"
        label: "A second computer or spare drive"
      - id: "f"
        label: "Optical discs (CD/DVD/Blu-ray)"
      - id: "g"
        label: "Automatic phone backup"
      - id: "h"
        label: "I don't back up"
  - id: q5
    prompt: "Which cloud storage or backup services do you use? (Select all that apply)"
    type: multi_choice
    construct: cloud_storage_backup_services_use
    required: true
    options:
      - id: "a"
        label: "iCloud"
      - id: "b"
        label: "Google Drive / Google One"
      - id: "c"
        label: "Microsoft OneDrive"
      - id: "d"
        label: "Dropbox"
      - id: "e"
        label: "Backblaze"
      - id: "f"
        label: "Carbonite"
      - id: "g"
        label: "IDrive"
      - id: "h"
        label: "Amazon Photos / AWS"
      - id: "i"
        label: "Synology / self-hosted cloud"
      - id: "j"
        label: "None"
  - id: q6
    prompt: "Which local backup software or tools do you use? (Select all that apply)"
    type: multi_choice
    construct: local_backup_software_tools_use
    required: true
    options:
      - id: "a"
        label: "Apple Time Machine"
      - id: "b"
        label: "Windows File History"
      - id: "c"
        label: "Windows Backup / system image"
      - id: "d"
        label: "Acronis True Image / Cyber Protect"
      - id: "e"
        label: "Macrium Reflect"
      - id: "f"
        label: "rsync / command-line scripts"
      - id: "g"
        label: "Duplicati / restic / Duplicacy"
      - id: "h"
        label: "Manufacturer software (e.g., Seagate, WD)"
      - id: "i"
        label: "None / I just copy files manually"
  - id: q7
    prompt: "What types of data do you back up? (Select all that apply)"
    type: multi_choice
    construct: types_data_back_up_select
    required: true
    options:
      - id: "a"
        label: "Photos"
      - id: "b"
        label: "Videos"
      - id: "c"
        label: "Documents and spreadsheets"
      - id: "d"
        label: "Music"
      - id: "e"
        label: "Email"
      - id: "f"
        label: "Passwords / password vault"
      - id: "g"
        label: "Application data or game saves"
      - id: "h"
        label: "A full system / disk image"
      - id: "i"
        label: "Work or business files"
      - id: "j"
        label: "I don't back anything up"
  - id: q8
    prompt: "Which devices do you back up? (Select all that apply)"
    type: multi_choice
    construct: devices_back_up_select_all
    required: true
    options:
      - id: "a"
        label: "Laptop"
      - id: "b"
        label: "Desktop computer"
      - id: "c"
        label: "Smartphone"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "NAS or home server"
      - id: "f"
        label: "External drives"
      - id: "g"
        label: "None"
  - id: q9
    prompt: "Are you familiar with, and do you follow, the \"3-2-1\" backup rule (3 copies, 2 media types, 1 off-site)?"
    type: single_choice
    construct: familiar_follow_3_2_1
    required: true
    options:
      - id: "a"
        label: "Yes, I follow it fully"
      - id: "b"
        label: "I follow it partially"
      - id: "c"
        label: "I know it but don't follow it"
      - id: "d"
        label: "I've never heard of it"
      - id: "e"
        label: "Not sure"
  - id: q10
    prompt: "Do you keep at least one backup copy off-site or disconnected from your network?"
    type: single_choice
    construct: keep_least_one_backup_copy
    required: true
    options:
      - id: "a"
        label: "Yes, an off-site copy (cloud or another location)"
      - id: "b"
        label: "Yes, an offline / air-gapped drive"
      - id: "c"
        label: "No, all copies are on-site and connected"
      - id: "d"
        label: "I only have one copy"
      - id: "e"
        label: "Not sure"
  - id: q11
    prompt: "Approximately how much total data do you back up, in gigabytes (GB)? Enter a whole number."
    type: free_text
    construct: approximately_much_total_data_back
