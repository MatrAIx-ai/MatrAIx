schemaVersion: "1.0"
id: pharmacy_loyalty_programs_v1
title: "Pharmacy Loyalty Programs Survey"
description: "How consumers enroll in, use, and value retail pharmacy loyalty and rewards programs."
questions:
  - id: q0
    prompt: "Do you currently fill prescriptions or buy health and personal-care products at a retail pharmacy?"
    type: single_choice
    construct: currently_fill_prescriptions_buy_health
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, I do not use a retail pharmacy"
  - id: q1
    prompt: "Which pharmacy do you use most often?"
    type: single_choice
    construct: pharmacy_use_most_often
    required: true
    options:
      - id: "a"
        label: "CVS Pharmacy"
      - id: "b"
        label: "Walgreens"
      - id: "c"
        label: "Rite Aid"
      - id: "d"
        label: "Walmart Pharmacy"
      - id: "e"
        label: "A grocery-store pharmacy (Kroger, Publix, Safeway, etc.)"
      - id: "f"
        label: "Costco or Sam's Club pharmacy"
      - id: "g"
        label: "An independent or local pharmacy"
      - id: "h"
        label: "A mail-order or online pharmacy (Amazon Pharmacy, etc.)"
  - id: q2
    prompt: "Do you take one or more prescription medications on a regular basis?"
    type: single_choice
    construct: take_one_more_prescription_medications
    required: true
    options:
      - id: "a"
        label: "Yes, one medication"
      - id: "b"
        label: "Yes, two or more medications"
      - id: "c"
        label: "No, only occasionally"
      - id: "d"
        label: "No, none at all"
  - id: q3
    prompt: "Are you enrolled in any pharmacy loyalty or rewards program?"
    type: single_choice
    construct: enrolled_any_pharmacy_loyalty_rewards
    required: true
    options:
      - id: "a"
        label: "Yes, in one program"
      - id: "b"
        label: "Yes, in more than one program"
      - id: "c"
        label: "No, but I am aware they exist"
      - id: "d"
        label: "No, I have never heard of them"
  - id: q4
    prompt: "About how long have you been a member of your main pharmacy loyalty program?"
    type: single_choice
    construct: long_have_been_member_main
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I am not a member of any program"
  - id: q5
    prompt: "How often do you shop at or fill prescriptions with your main pharmacy?"
    type: single_choice
    construct: often_shop_fill_prescriptions_main
    required: true
    options:
      - id: "a"
        label: "Multiple times a week"
      - id: "b"
        label: "About once a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "About once a month"
      - id: "e"
        label: "A few times a year"
  - id: q6
    prompt: "Which pharmacy loyalty or rewards programs are you a member of? (Select all that apply)"
    type: multi_choice
    construct: pharmacy_loyalty_rewards_programs_member
    required: true
    options:
      - id: "a"
        label: "CVS ExtraCare"
      - id: "b"
        label: "myWalgreens"
      - id: "c"
        label: "Rite Aid Rewards"
      - id: "d"
        label: "Walmart Rewards or Walmart+"
      - id: "e"
        label: "Kroger Plus or another grocery pharmacy program"
      - id: "f"
        label: "Costco or Sam's Club membership benefits"
      - id: "g"
        label: "Amazon Pharmacy or Prime prescription savings"
      - id: "h"
        label: "GoodRx Gold or SingleCare"
      - id: "i"
        label: "An independent pharmacy's rewards program"
      - id: "j"
        label: "None of these"
  - id: q7
    prompt: "How do you typically access or use your loyalty rewards? (Select all that apply)"
    type: multi_choice
    construct: typically_access_use_loyalty_rewards
    required: true
    options:
      - id: "a"
        label: "The pharmacy's mobile app"
      - id: "b"
        label: "A physical loyalty card or key tag"
      - id: "c"
        label: "A phone number linked to my account"
      - id: "d"
        label: "The pharmacy's website"
      - id: "e"
        label: "Emailed or texted digital coupons"
      - id: "f"
        label: "Coupons printed at the register"
      - id: "g"
        label: "I don't actively use my rewards"
  - id: q8
    prompt: "What do you typically redeem your rewards or points on? (Select all that apply)"
    type: multi_choice
    construct: typically_redeem_rewards_points_select
    required: true
    options:
      - id: "a"
        label: "Prescription co-pays"
      - id: "b"
        label: "Over-the-counter medicines"
      - id: "c"
        label: "Vitamins and supplements"
      - id: "d"
        label: "Personal care and beauty products"
      - id: "e"
        label: "Household goods or groceries"
      - id: "f"
        label: "Photo prints or gifts"
      - id: "g"
        label: "Seasonal or general merchandise"
      - id: "h"
        label: "I rarely redeem rewards"
  - id: q9
    prompt: "Do you use your main pharmacy's mobile app?"
    type: single_choice
    construct: use_main_pharmacy_s_mobile
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I have it installed but rarely use it"
      - id: "d"
        label: "No, I do not use the app"
  - id: q10
    prompt: "Which app or online features do you use? (Select all that apply)"
    type: multi_choice
    construct: app_online_features_use_select
    required: true
    options:
      - id: "a"
        label: "Refilling prescriptions"
      - id: "b"
        label: "Tracking points or rewards"
      - id: "c"
        label: "Loading digital coupons"
      - id: "d"
        label: "Viewing the weekly ad or deals"
      - id: "e"
        label: "Medication or pill reminders"
      - id: "f"
        label: "Checking prescription status or pickup"
      - id: "g"
        label: "Ordering photos or other products"
      - id: "h"
        label: "I do not use any online features"
  - id: q11
    prompt: "Roughly how much do you spend at your main pharmacy in a typical month, in U.S. dollars? Please enter a number."
    type: free_text
    construct: roughly_much_spend_main_pharmacy
    required: true
  - id: q12
    prompt: "In a typical month, about how many dollars' worth of rewards or points do you earn? Please enter a number."
