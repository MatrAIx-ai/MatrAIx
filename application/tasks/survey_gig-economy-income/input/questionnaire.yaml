schemaVersion: "1.0"
id: gig_economy_income_v1
title: "Gig Economy Income Survey"
description: "How people earn, manage, and feel about income from gig-economy platforms."
questions:
  - id: q0
    prompt: "Do you currently earn income through gig-economy or app-based platforms?"
    type: single_choice
    construct: currently_earn_income_through_gig
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I did in the past but not now"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "Which gig platforms do you earn income from? (Select all that apply)"
    type: multi_choice
    construct: gig_platforms_earn_income_from
    required: true
    options:
      - id: "a"
        label: "Rideshare (Uber, Lyft)"
      - id: "b"
        label: "Food delivery (DoorDash, Uber Eats, Grubhub)"
      - id: "c"
        label: "Grocery or package delivery (Instacart, Amazon Flex)"
      - id: "d"
        label: "Task or handyman work (TaskRabbit, Handy)"
      - id: "e"
        label: "Freelance or creative work (Upwork, Fiverr)"
      - id: "f"
        label: "Short-term rental hosting (Airbnb, Vrbo)"
      - id: "g"
        label: "Selling goods online (Etsy, eBay, Poshmark)"
      - id: "h"
        label: "None of these"
  - id: q2
    prompt: "How long have you been doing gig work?"
    type: single_choice
    construct: long_have_been_doing_gig
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q3
    prompt: "In a typical week, how many hours do you spend on gig work? Enter a number of hours."
    type: free_text
    construct: typical_week_many_hours_spend
    required: true
  - id: q4
    prompt: "Approximately how much do you earn from gig work in a typical month? Enter a dollar amount."
    type: free_text
    construct: approximately_much_earn_from_gig
    required: true
  - id: q5
    prompt: "What share of your total income comes from gig work?"
    type: single_choice
    construct: share_total_income_comes_from
    required: true
    options:
      - id: "a"
        label: "Less than 10%"
      - id: "b"
        label: "10% to 25%"
      - id: "c"
        label: "26% to 50%"
      - id: "d"
        label: "51% to 75%"
      - id: "e"
        label: "More than 75%"
  - id: q6
    prompt: "Why do you do gig work? (Select all that apply)"
    type: multi_choice
    construct: why_gig_work_select_all
    required: true
    options:
      - id: "a"
        label: "Need the money to cover essentials"
      - id: "b"
        label: "Extra spending money"
      - id: "c"
        label: "Flexible schedule"
      - id: "d"
        label: "Can't find traditional employment"
      - id: "e"
        label: "Enjoy the work"
      - id: "f"
        label: "Between jobs"
      - id: "g"
        label: "Paying off debt or a specific goal"
  - id: q7
    prompt: "How predictable is your gig income week to week?"
    type: single_choice
    construct: predictable_gig_income_week_week
    required: true
    options:
      - id: "a"
        label: "Very predictable"
      - id: "b"
        label: "Somewhat predictable"
      - id: "c"
        label: "Somewhat unpredictable"
      - id: "d"
        label: "Very unpredictable"
  - id: q8
    prompt: "How do you set aside money for taxes on your gig income?"
    type: single_choice
    construct: set_aside_money_taxes_gig
    required: true
    options:
      - id: "a"
        label: "I make quarterly estimated tax payments"
      - id: "b"
        label: "I set aside a portion myself"
      - id: "c"
        label: "I handle it all at tax time"
      - id: "d"
        label: "I don't set anything aside"
      - id: "e"
        label: "I'm not sure I owe taxes on it"
  - id: q9
    prompt: "Do you track your gig-related expenses (mileage, supplies, fees) for tax deductions?"
    type: single_choice
    construct: track_gig_related_expenses_mileage
    required: true
    options:
      - id: "a"
        label: "Yes, carefully"
      - id: "b"
        label: "Yes, roughly"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I didn't know I could"
  - id: q10
    prompt: "How much do you agree with the following statement: My gig income is essential to making ends meet."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: The flexibility of gig work is worth the trade-offs."
    type: single_choice
    construct: much_agree_following_statement_flexibili
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: I worry about the lack of benefits (health insurance, retirement) in gig work."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: My gig platform pays me fairly for my work."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Unpredictable income makes it hard for me to budget."
    type: single_choice
    construct: much_agree_following_statement_unpredict
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How financially secure do you feel relying on gig income?"
    type: single_choice
    construct: financially_secure_feel_relying_gig
    required: true
    options:
      - id: "a"
        label: "Not at all secure"
      - id: "b"
        label: "Slightly secure"
      - id: "c"
        label: "Moderately secure"
      - id: "d"
        label: "Very secure"
      - id: "e"
        label: "Extremely secure"
  - id: q16
    prompt: "Which are the top 3 things you value most about gig work? (Select all that apply)"
    type: multi_choice
    construct: top_3_things_value_most
    required: true
    options:
      - id: "a"
        label: "Flexible hours"
      - id: "b"
        label: "Being my own boss"
      - id: "c"
        label: "Quick access to earnings"
      - id: "d"
        label: "Extra income"
      - id: "e"
        label: "No fixed commute"
      - id: "f"
        label: "Choosing my own tasks"
      - id: "g"
        label: "Meeting people"
      - id: "h"
        label: "Building a side business"
      - id: "i"
        label: "Trying something new"
  - id: q17
    prompt: "Do you have access to any benefits through your gig work or elsewhere? (Select all that apply)"
    type: multi_choice
    construct: have_access_any_benefits_through
    required: true
    options:
      - id: "a"
        label: "Health insurance"
      - id: "b"
        label: "Retirement savings account"
      - id: "c"
        label: "Paid time off"
      - id: "d"
        label: "Disability or injury coverage"
      - id: "e"
        label: "None of these"
  - id: q18
    prompt: "How do you manage the ups and downs of irregular gig income?"
    type: single_choice
    construct: manage_ups_downs_irregular_gig
    required: true
    options:
      - id: "a"
        label: "Keep a cash buffer or emergency fund"
      - id: "b"
        label: "Rely on a partner's or other income"
      - id: "c"
        label: "Adjust spending week to week"
      - id: "d"
        label: "Use credit when income is low"
      - id: "e"
        label: "I struggle to manage it"
  - id: q19
    prompt: "Have you saved for retirement using any of your gig income?"
    type: single_choice
    construct: have_saved_retirement_using_any
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I plan to"
      - id: "d"
        label: "No"
  - id: q20
    prompt: "How often does your gig income fall short of what you need in a given month?"
    type: single_choice
    construct: often_does_gig_income_fall
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q21
    prompt: "Where do you keep or deposit your gig earnings?"
    type: single_choice
    construct: where_keep_deposit_gig_earnings
    required: true
    options:
      - id: "a"
        label: "A regular bank checking account"
      - id: "b"
        label: "A separate account just for gig income"
      - id: "c"
        label: "A payment app (PayPal, Venmo, Cash App)"
      - id: "d"
        label: "The platform's own debit card or wallet"
      - id: "e"
        label: "Mostly cash"
  - id: q22
    prompt: "How much do you agree: Gig workers should receive benefits like traditional employees."
    type: single_choice
    construct: much_agree_gig_workers_should
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q23
    prompt: "How satisfied are you overall with gig work as a source of income?"
    type: single_choice
    construct: satisfied_overall_gig_work_as
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q24
    prompt: "How likely are you to continue doing gig work over the next 12 months?"
    type: single_choice
    construct: likely_continue_doing_gig_work
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q25
    prompt: "How likely are you to increase the hours you spend on gig work in the next year?"
    type: single_choice
    construct: likely_increase_hours_spend_gig
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q26
    prompt: "If you have any final thoughts about earning income through gig work, please share them here (optional)."
    type: free_text
    construct: if_have_any_final_thoughts
    required: false
  - id: q27
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18–24"
      - id: "b"
        label: "25–34"
      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65 or older"
  - id: q28
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Man"
      - id: "b"
        label: "Woman"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q29
    prompt: "Which of the following best describes your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: following_best_describes_race_ethnicity
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "American Indian or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or other Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Prefer not to say"
  - id: q30
    prompt: "What is your total annual household income before taxes?"
    type: single_choice
    construct: total_annual_household_income_before
    required: true
    options:
      - id: "a"
        label: "Under $25,000"
      - id: "b"
        label: "$25,000–$49,999"
      - id: "c"
        label: "$50,000–$74,999"
      - id: "d"
        label: "$75,000–$99,999"
      - id: "e"
        label: "$100,000–$149,999"
      - id: "f"
        label: "$150,000–$199,999"
      - id: "g"
        label: "$200,000 or more"
      - id: "h"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "High school diploma or GED"
      - id: "c"
        label: "Some college, no degree"
      - id: "d"
        label: "Associate degree"
      - id: "e"
        label: "Bachelor's degree"
      - id: "f"
        label: "Graduate or professional degree"
  - id: q32
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Unemployed and looking for work"
      - id: "e"
        label: "Not in the labor force (student, homemaker)"
      - id: "f"
        label: "Retired"
      - id: "g"
        label: "Unable to work"
  - id: q33
    prompt: "Including yourself, how many people live in your household? Enter a number."
    type: free_text
    construct: including_yourself_many_people_live
    required: true
  - id: q34
    prompt: "How many children under 18 live in your household? Enter a number."
    type: free_text
    construct: many_children_under_18_live
    required: true
  - id: q35
    prompt: "What is your marital status?"
    type: single_choice
    construct: marital_status
    required: true
    options:
      - id: "a"
        label: "Married"
      - id: "b"
        label: "Living with a partner"
      - id: "c"
        label: "Divorced"
      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Separated"
      - id: "f"
        label: "Single, never married"
  - id: q36
    prompt: "Which region of the United States do you live in?"
    type: single_choice
    construct: region_united_states_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
      - id: "d"
        label: "West"
  - id: q37
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q38
    prompt: "Do you own or rent your home?"
    type: single_choice
    construct: own_rent_home
    required: true
    options:
      - id: "a"
        label: "Own"
      - id: "b"
        label: "Rent"
      - id: "c"
        label: "Other arrangement"
  - id: q39
    prompt: "Is gig work your main job or a supplement to other income?"
    type: single_choice
    construct: gig_work_main_job_supplement
    required: true
    options:
      - id: "a"
        label: "It's my main or only source of income"
      - id: "b"
        label: "It supplements a full-time job"
      - id: "c"
        label: "It supplements a part-time job"
      - id: "d"
        label: "It supplements retirement or other income"
      - id: "e"
        label: "I no longer do gig work"
