      - id: "e"
        label: "Clearer guidance on what readings mean"
      - id: "f"
        label: "Reminders to check"
      - id: "g"
        label: "A more comfortable cuff"
      - id: "h"
        label: "A lower-cost device"
      - id: "i"
        label: "A smaller or more portable device"
      - id: "j"
        label: "Integration with other health apps"
  - id: q29
    prompt: "Overall, how satisfied are you with your home blood pressure monitoring experience?"
    type: single_choice
    construct: overall_satisfied_home_blood_pressure
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
