schemaVersion: "1.0"
id: web_development_practices_v1
title: "Web Development Practices Survey"
description: "How people build for the web: the frameworks, languages, tooling, and engineering practices they use and their satisfaction with them."
questions:
  - id: q0
    prompt: "Which best describes your involvement in web development?"
    type: single_choice
    construct: best_describes_involvement_web_developme
    required: true
    options:
      - id: "a"
        label: "Professional web developer (main job)"
      - id: "b"
        label: "Developer whose work includes some web"
      - id: "c"
        label: "Freelancer / agency building sites for clients"
      - id: "d"
        label: "Student learning web development"
      - id: "e"
        label: "Hobbyist building sites for fun or side projects"
      - id: "f"
        label: "I don't build for the web"
  - id: q1
    prompt: "How many years have you been building for the web?"
