        label: "Yes, set by an app"
      - id: "b"
        label: "Yes, set by a doctor or dietitian"
      - id: "c"
        label: "Yes, set by myself"
      - id: "d"
        label: "No, I do not use a specific target"
  - id: q8
    prompt: "Besides calories, which nutrients or metrics do you track? (Select all that apply)"
