schemaVersion: "1.0"
id: calorie_tracking_v1
title: "Calorie Tracking Survey"
description: "Consumer habits, tools, motivations, and satisfaction around tracking calories and food intake."
questions:
  - id: q0
    prompt: "Do you currently track the calories or food you eat?"
    type: single_choice
    construct: currently_track_calories_food_eat
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, most days"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, I have never tracked calories"
  - id: q1
    prompt: "How long have you been tracking your calories or food intake?"
    type: single_choice
    construct: long_have_been_tracking_calories
    required: true
    options:
      - id: "a"
        label: "Less than 1 month"
      - id: "b"
        label: "1 to 3 months"
      - id: "c"
        label: "3 to 12 months"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
      - id: "f"
        label: "I do not currently track"
  - id: q2
    prompt: "What is the main method you use to track calories?"
    type: single_choice
    construct: main_method_use_track_calories
    required: true
    options:
      - id: "a"
        label: "A dedicated calorie-tracking app"
      - id: "b"
        label: "A notebook or paper journal"
      - id: "c"
        label: "A spreadsheet"
      - id: "d"
        label: "I estimate in my head"
      - id: "e"
        label: "I do not currently track"
  - id: q3
    prompt: "Which calorie-tracking apps do you use or have you used? (Select all that apply)"
    type: multi_choice
    construct: calorie_tracking_apps_use_have
    required: true
    options:
      - id: "a"
        label: "MyFitnessPal"
      - id: "b"
        label: "Lose It!"
      - id: "c"
        label: "Cronometer"
      - id: "d"
        label: "Noom"
      - id: "e"
        label: "Apple Health or Fitness"
      - id: "f"
        label: "Samsung Health or Google Fit"
      - id: "g"
        label: "A different app"
      - id: "h"
        label: "I do not use an app"
  - id: q4
    prompt: "How do you usually log the foods you eat?"
    type: single_choice
    construct: usually_log_foods_eat
    required: true
    options:
      - id: "a"
        label: "Scanning barcodes"
      - id: "b"
        label: "Searching a food database"
      - id: "c"
        label: "Taking a photo of my meal"
      - id: "d"
        label: "Entering foods manually"
      - id: "e"
        label: "Using saved meals or recipes"
      - id: "f"
        label: "I do not log foods"
  - id: q5
    prompt: "On a typical day, how many of your meals and snacks do you log?"
    type: single_choice
    construct: typical_day_many_meals_snacks
    required: true
    options:
      - id: "a"
        label: "All of them"
      - id: "b"
        label: "Most of them"
      - id: "c"
        label: "About half"
      - id: "d"
        label: "Only some"
      - id: "e"
        label: "None"
  - id: q6
    prompt: "What is your main goal for tracking calories?"
    type: single_choice
    construct: main_goal_tracking_calories
    required: true
    options:
      - id: "a"
        label: "Lose weight"
      - id: "b"
        label: "Maintain my current weight"
      - id: "c"
        label: "Gain weight or build muscle"
      - id: "d"
        label: "Eat more healthily overall"
      - id: "e"
        label: "Manage a health condition"
      - id: "f"
        label: "Curiosity about my diet"
  - id: q7
    prompt: "Do you have a daily calorie target?"
    type: single_choice
    construct: have_daily_calorie_target
    required: true
    options:
