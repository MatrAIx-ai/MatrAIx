schemaVersion: "1.0"
id: photo_management_v1
title: "Photo Management Survey"
description: "How people store, organize, edit, back up, and share their personal photo collections."
questions:
  - id: q0
    prompt: "How would you describe the size of your personal photo collection?"
    type: single_choice
    construct: would_describe_size_personal_photo
    required: true
    options:
      - id: "a"
        label: "Small (under 1,000 photos)"
      - id: "b"
        label: "Moderate (1,000-5,000)"
      - id: "c"
        label: "Large (5,000-20,000)"
      - id: "d"
        label: "Very large (20,000-50,000)"
      - id: "e"
        label: "Huge (50,000 or more)"
      - id: "f"
        label: "I have no idea"
  - id: q1
    prompt: "What do you mostly use to take photos?"
    type: single_choice
    construct: mostly_use_take_photos
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Dedicated digital camera (point-and-shoot)"
      - id: "c"
        label: "DSLR or mirrorless camera"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "A mix of devices"
      - id: "f"
        label: "I rarely take photos"
  - id: q2
    prompt: "How often do you take photos?"
    type: single_choice
    construct: often_take_photos
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "How actively do you organize your photo collection?"
    type: single_choice
    construct: actively_organize_photo_collection
    required: true
    options:
      - id: "a"
        label: "Very actively — I keep it well curated"
      - id: "b"
        label: "Somewhat — I organize occasionally"
      - id: "c"
        label: "Rarely — photos just pile up"
      - id: "d"
        label: "Never — it's a big unsorted mess"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "Where do you store your photos? (Select all that apply)"
    type: multi_choice
    construct: where_store_photos_select_all
    required: true
    options:
      - id: "a"
        label: "On my phone"
      - id: "b"
        label: "In a cloud photo service"
      - id: "c"
        label: "On my computer's hard drive"
      - id: "d"
        label: "On an external drive"
      - id: "e"
        label: "On a NAS or home server"
      - id: "f"
        label: "Printed / physical albums"
      - id: "g"
        label: "On social media only"
      - id: "h"
        label: "On memory cards I keep"
  - id: q5
    prompt: "Which photo apps or services do you use? (Select all that apply)"
    type: multi_choice
    construct: photo_apps_services_use_select
    required: true
    options:
      - id: "a"
        label: "Apple Photos / iCloud Photos"
      - id: "b"
        label: "Google Photos"
      - id: "c"
        label: "Amazon Photos"
      - id: "d"
        label: "Microsoft OneDrive"
      - id: "e"
        label: "Dropbox"
      - id: "f"
        label: "Adobe Lightroom"
      - id: "g"
        label: "Flickr"
      - id: "h"
        label: "SmugMug"
      - id: "i"
        label: "A NAS app (e.g., Synology Photos, Immich)"
      - id: "j"
        label: "None / just the built-in gallery"
  - id: q6
    prompt: "Which service is your primary photo library?"
    type: single_choice
    construct: service_primary_photo_library
    required: true
    options:
      - id: "a"
        label: "Apple Photos / iCloud"
      - id: "b"
        label: "Google Photos"
      - id: "c"
        label: "Amazon Photos"
      - id: "d"
        label: "OneDrive / Dropbox"
      - id: "e"
        label: "Adobe Lightroom"
      - id: "f"
        label: "A local folder on my computer"
      - id: "g"
        label: "A NAS / self-hosted library"
      - id: "h"
        label: "My phone's default gallery"
      - id: "i"
        label: "Other"
  - id: q7
    prompt: "How do you organize your photos? (Select all that apply)"
    type: multi_choice
