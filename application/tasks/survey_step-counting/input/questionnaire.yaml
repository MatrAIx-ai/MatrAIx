      - id: "b"
        label: "Parking farther away"
      - id: "c"
        label: "Taking walking breaks at work"
      - id: "d"
        label: "Walking or pacing while on the phone"
      - id: "e"
        label: "Taking an evening or after-dinner walk"
      - id: "f"
        label: "Getting off transit a stop early"
      - id: "g"
        label: "I have not changed any behaviors"
  - id: q21
