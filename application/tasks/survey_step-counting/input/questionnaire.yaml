schemaVersion: "1.0"
id: step_counting_v1
title: "Step Counting Survey"
description: "Consumer use of daily step counting, including devices, goals, motivation, and satisfaction."
questions:
  - id: q0
    prompt: "Do you currently track your daily step count?"
    type: single_choice
    construct: currently_track_daily_step_count
    required: true
    options:
      - id: "a"
        label: "Yes, every day"
      - id: "b"
        label: "Yes, most days"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, I have never tracked my steps"
  - id: q1
    prompt: "How long have you been counting your daily steps?"
    type: single_choice
    construct: long_have_been_counting_daily
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I do not currently count my steps"
  - id: q2
    prompt: "What do you mainly use to count your steps?"
    type: single_choice
    construct: mainly_use_count_steps
    required: true
    options:
      - id: "a"
        label: "Smartwatch (for example, Apple Watch, Samsung Galaxy Watch)"
      - id: "b"
        label: "Fitness band (for example, Fitbit, Garmin, Xiaomi)"
      - id: "c"
        label: "Smartphone app using the phone's sensors"
      - id: "d"
        label: "A separate clip-on pedometer"
      - id: "e"
        label: "I do not currently count my steps"
  - id: q3
    prompt: "Which apps or platforms do you use to view your step data? (Select all that apply)"
    type: multi_choice
    construct: apps_platforms_use_view_step
    required: true
    options:
      - id: "a"
        label: "Apple Health or Apple Fitness"
      - id: "b"
        label: "Fitbit app"
      - id: "c"
        label: "Google Fit"
      - id: "d"
        label: "Samsung Health"
      - id: "e"
        label: "Garmin Connect"
      - id: "f"
        label: "A phone's built-in health widget"
      - id: "g"
        label: "I do not use any app"
  - id: q4
    prompt: "On a typical day, do you carry or wear your step-tracking device...?"
    type: single_choice
    construct: typical_day_carry_wear_step
    required: true
    options:
      - id: "a"
        label: "All day, including sleep"
      - id: "b"
        label: "All waking hours"
      - id: "c"
        label: "Only during exercise or walks"
      - id: "d"
        label: "Only sometimes"
      - id: "e"
        label: "I do not use a device"
  - id: q5
    prompt: "Do you have a daily step goal?"
    type: single_choice
    construct: have_daily_step_goal
    required: true
    options:
      - id: "a"
        label: "Yes, 10,000 steps"
      - id: "b"
        label: "Yes, more than 10,000 steps"
      - id: "c"
        label: "Yes, fewer than 10,000 steps"
      - id: "d"
        label: "Yes, but the number varies"
      - id: "e"
        label: "No, I do not set a step goal"
  - id: q6
    prompt: "On a typical day, about how many steps do you take?"
    type: single_choice
    construct: typical_day_many_steps_take
    required: true
    options:
      - id: "a"
        label: "Fewer than 3,000"
      - id: "b"
        label: "3,000 to 4,999"
      - id: "c"
        label: "5,000 to 7,499"
      - id: "d"
        label: "7,500 to 9,999"
      - id: "e"
        label: "10,000 to 12,499"
      - id: "f"
        label: "12,500 or more"
  - id: q7
    prompt: "How often do you check your step count during the day?"
    type: single_choice
    construct: often_check_step_count_during
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "Once a day"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Rarely"
  - id: q8
    prompt: "How did you decide on your step goal?"
    type: single_choice
    construct: did_decide_step_goal
    required: true
    options:
      - id: "a"
        label: "I use the common 10,000-step target"
      - id: "b"
        label: "My device or app suggested it"
      - id: "c"
        label: "A doctor or health professional advised me"
      - id: "d"
        label: "I set it based on my own fitness level"
      - id: "e"
        label: "I have not set a specific goal"
  - id: q9
    prompt: "Which of these features do you use in your step-tracking app? (Select all that apply)"
    type: multi_choice
    construct: these_features_use_step_tracking
    required: true
    options:
      - id: "a"
        label: "Daily goal progress"
      - id: "b"
        label: "Reminders to move"
      - id: "c"
        label: "Streaks or badges"
      - id: "d"
        label: "Challenges with friends"
      - id: "e"
        label: "Weekly or monthly reports"
      - id: "f"
        label: "Distance or calorie estimates"
      - id: "g"
        label: "I do not use any of these features"
  - id: q10
    prompt: "Do you take part in step challenges or competitions with others?"
    type: single_choice
    construct: take_part_step_challenges_competitions
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I would like to"
      - id: "d"
        label: "No, and I am not interested"
  - id: q11
    prompt: "What most motivates you to reach your step goal? (Select all that apply)"
    type: multi_choice
    construct: most_motivates_reach_step_goal
    required: true
    options:
      - id: "a"
        label: "Improving my overall health"
      - id: "b"
        label: "Losing or managing weight"
      - id: "c"
        label: "Reaching a daily streak or badge"
      - id: "d"
        label: "Competing with friends or family"
      - id: "e"
        label: "Reducing stress or clearing my mind"
      - id: "f"
        label: "A doctor's recommendation"
      - id: "g"
        label: "Just seeing the number go up"
  - id: q12
    prompt: "When you fall short of your step goal, what do you usually do?"
    type: single_choice
    construct: when_fall_short_step_goal
    required: true
    options:
      - id: "a"
        label: "Take a walk later to catch up"
      - id: "b"
        label: "Feel disappointed but move on"
      - id: "c"
        label: "Not think much about it"
      - id: "d"
        label: "Adjust my goal down"
      - id: "e"
        label: "This does not apply to me"
  - id: q13
    prompt: "How much do you agree with the following statement: Counting my steps motivates me to move more."
    type: single_choice
    construct: much_agree_following_statement_counting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Reaching my daily step goal gives me a sense of accomplishment."
    type: single_choice
    construct: much_agree_following_statement_reaching
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: I trust my device's step count to be accurate."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: I sometimes feel pressured or stressed by my step goal."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement: Step counting has become a regular habit for me."
    type: single_choice
    construct: much_agree_following_statement_step
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement: Counting steps has improved my overall activity level."
    type: single_choice
    construct: much_agree_following_statement_counting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "Since you started counting steps, how has your daily walking changed?"
    type: single_choice
