schemaVersion: "1.0"
id: sleep_tracking_v1
title: "Sleep Tracking Survey"
description: "Consumer use of devices and apps to track and measure sleep."
questions:
  - id: q0
    prompt: "Do you track your sleep with any device or app?"
    type: single_choice
    construct: track_sleep_any_device_app
    required: true
    options:
      - id: "a"
        label: "Yes, most nights"
      - id: "b"
        label: "Yes, some nights"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, I have never tracked my sleep"
  - id: q1
    prompt: "How long have you been tracking your sleep? Please enter a number of months."
    type: free_text
    construct: long_have_been_tracking_sleep
    required: true
  - id: q2
    prompt: "What do you use to track your sleep? (Select all that apply)"
    type: multi_choice
    construct: use_track_sleep_select_all
    required: true
    options:
      - id: "a"
        label: "A smartwatch (for example, Apple Watch, Samsung Galaxy Watch)"
      - id: "b"
        label: "A fitness band (for example, Fitbit)"
      - id: "c"
        label: "A smart ring (for example, Oura)"
      - id: "d"
        label: "A recovery wearable (for example, Whoop)"
      - id: "e"
        label: "A phone app that uses the microphone or motion (for example, Sleep Cycle)"
      - id: "f"
        label: "A bedside or under-mattress sensor"
      - id: "g"
        label: "Another device or app"
  - id: q3
    prompt: "Which one do you rely on most for sleep data?"
    type: single_choice
    construct: one_rely_most_sleep_data
    required: true
    options:
      - id: "a"
        label: "A smartwatch"
      - id: "b"
        label: "A fitness band"
      - id: "c"
        label: "A smart ring"
      - id: "d"
        label: "A recovery wearable"
      - id: "e"
        label: "A phone app"
      - id: "f"
        label: "A bedside or under-mattress sensor"
  - id: q4
    prompt: "What first led you to start tracking your sleep? (Select all that apply)"
    type: multi_choice
    construct: first_led_start_tracking_sleep
    required: true
    options:
      - id: "a"
        label: "Curiosity about my sleep"
      - id: "b"
        label: "Trouble sleeping or feeling tired"
      - id: "c"
        label: "I already had a device that offered it"
      - id: "d"
        label: "Wanting to improve my health"
      - id: "e"
        label: "Training or athletic recovery"
      - id: "f"
        label: "A friend or family member's recommendation"
      - id: "g"
        label: "A doctor's or coach's suggestion"
  - id: q5
    prompt: "How often do you check your sleep data?"
    type: single_choice
    construct: often_check_sleep_data
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Every morning"
      - id: "e"
        label: "Several times a day"
  - id: q6
    prompt: "Which sleep metrics do you pay attention to? (Select all that apply)"
    type: multi_choice
    construct: sleep_metrics_pay_attention_select
    required: true
    options:
      - id: "a"
        label: "Total sleep time"
      - id: "b"
        label: "Sleep stages (light, deep, REM)"
      - id: "c"
        label: "A sleep score"
      - id: "d"
        label: "Time to fall asleep"
      - id: "e"
        label: "Night wakings or restlessness"
      - id: "f"
        label: "Heart rate or heart-rate variability"
      - id: "g"
        label: "Blood oxygen"
      - id: "h"
        label: "Breathing or snoring"
  - id: q7
    prompt: "Does your device or app give you a single nightly sleep score?"
    type: single_choice
    construct: does_device_app_give_single
    required: true
    options:
      - id: "a"
        label: "Yes, and I look at it every day"
      - id: "b"
        label: "Yes, but I rarely look at it"
      - id: "c"
        label: "No, it does not"
      - id: "d"
        label: "I'm not sure"
  - id: q8
    prompt: "Do you pay for a subscription for sleep insights (for example, Oura membership, Fitbit Premium)?"
    type: single_choice
    construct: pay_subscription_sleep_insights_example
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but the device offers one"
      - id: "c"
        label: "No subscription is offered"
      - id: "d"
        label: "I'm not sure"
  - id: q9
    prompt: "How much do you agree or disagree: Tracking my sleep has helped me sleep better."
    type: single_choice
    construct: much_agree_disagree_tracking_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: I trust the sleep data my device reports."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree or disagree: I have changed a habit based on my sleep data."
    type: single_choice
    construct: much_agree_disagree_i_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree or disagree: Checking my sleep score sometimes makes me anxious."
    type: single_choice
    construct: much_agree_disagree_checking_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I am concerned about the privacy of my sleep data."
    type: single_choice
