      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q31
    prompt: "What is your ideal keyboard or mouse setup, if different from what you have now?"
    type: free_text
    construct: ideal_keyboard_mouse_setup_if
    required: true
  - id: q32
    prompt: "What is your age?"
