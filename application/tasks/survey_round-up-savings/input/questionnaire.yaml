        label: "The fees weren't worth it"
      - id: "b"
        label: "It caused overdrafts or low balances"
      - id: "c"
        label: "I wasn't saving enough to matter"
      - id: "d"
        label: "I switched to a different way of saving"
      - id: "e"
        label: "I needed the money for spending"
      - id: "f"
        label: "Not applicable — I haven't stopped"
  - id: q26
    prompt: "Roughly what is the current balance you've accumulated through round-ups? Please enter a dollar amount."
