schemaVersion: "1.0"
id: ai_image_generation_v1
title: "AI Image Generation Survey"
description: "How people use AI text-to-image and image-editing tools — which tools they choose, what they create, and how they feel about quality, cost, and ethics."
questions:
  - id: q0
    prompt: "Have you ever used an AI tool to generate or edit images from a text prompt?"
    type: single_choice
    construct: have_ever_used_ai_tool
    required: true
    options:
      - id: "a"
        label: "Yes, I use them regularly"
      - id: "b"
        label: "Yes, I have tried them a few times"
      - id: "c"
        label: "No, but I plan to try them soon"
      - id: "d"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been using AI image-generation tools?"
    type: single_choice
    construct: long_have_been_using_ai
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I have never used them"
  - id: q2
    prompt: "How often do you use AI image-generation tools?"
    type: single_choice
    construct: often_use_ai_image_generation
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Less than once a month"
      - id: "f"
        label: "Never"
  - id: q3
    prompt: "In a typical month, approximately how many images do you generate with AI tools? Enter a whole number."
    type: free_text
    construct: typical_month_approximately_many_images
    required: true
  - id: q4
    prompt: "Which AI image-generation tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: ai_image_generation_tools_have
    required: true
    options:
      - id: "a"
        label: "Midjourney"
      - id: "b"
        label: "DALL·E / ChatGPT image generation"
      - id: "c"
        label: "Stable Diffusion (any distribution)"
      - id: "d"
        label: "Adobe Firefly"
      - id: "e"
        label: "Canva AI (Magic Media)"
      - id: "f"
        label: "Leonardo.ai"
      - id: "g"
        label: "Google Gemini / Imagen"
      - id: "h"
        label: "Grok (xAI)"
      - id: "i"
        label: "Microsoft Bing Image Creator / Copilot"
      - id: "j"
        label: "Ideogram"
      - id: "k"
        label: "Flux (Black Forest Labs)"
      - id: "l"
        label: "Other (please specify)"
  - id: q5
    prompt: "Which AI image tool do you use most often?"
    type: single_choice
    construct: ai_image_tool_use_most
    required: true
    options:
      - id: "a"
        label: "Midjourney"
      - id: "b"
        label: "DALL·E / ChatGPT"
      - id: "c"
        label: "Stable Diffusion"
      - id: "d"
        label: "Adobe Firefly"
      - id: "e"
        label: "Canva AI"
      - id: "f"
        label: "Leonardo.ai"
      - id: "g"
        label: "Google Gemini / Imagen"
      - id: "h"
        label: "Another tool"
      - id: "i"
        label: "I do not have a regular tool"
  - id: q6
    prompt: "How do you primarily access AI image tools?"
    type: single_choice
    construct: primarily_access_ai_image_tools
    required: true
    options:
      - id: "a"
        label: "Web app in a browser"
      - id: "b"
        label: "Mobile app"
      - id: "c"
        label: "Discord bot"
      - id: "d"
        label: "Locally installed software on my own computer"
      - id: "e"
        label: "API / code"
      - id: "f"
        label: "Plugin or integration inside another app (e.g., Photoshop, Canva)"
  - id: q7
    prompt: "For what purposes do you generate AI images? (Select all that apply)"
    type: multi_choice
    construct: purposes_generate_ai_images_select
    required: true
    options:
      - id: "a"
        label: "Personal fun or experimentation"
      - id: "b"
        label: "Social media posts"
      - id: "c"
        label: "Marketing or advertising material"
      - id: "d"
        label: "Concept art or ideation"
      - id: "e"
        label: "Product or website mockups"
      - id: "f"
        label: "Presentations or documents"
      - id: "g"
        label: "Blog or article illustrations"
      - id: "h"
        label: "Game or app assets"
      - id: "i"
        label: "Profile pictures or avatars"
      - id: "j"
        label: "Memes"
      - id: "k"
        label: "Educational or instructional content"
      - id: "l"
        label: "Other (please specify)"
  - id: q8
    prompt: "Which visual styles do you most often generate? (Select all that apply)"
    type: multi_choice
    construct: visual_styles_most_often_generate
    required: true
    options:
      - id: "a"
        label: "Photorealistic images"
      - id: "b"
        label: "Anime or illustration"
      - id: "c"
        label: "3D renders"
      - id: "d"
        label: "Logos or graphic design"
      - id: "e"
        label: "Painting or fine-art styles"
      - id: "f"
        label: "Pixel art or retro"
      - id: "g"
        label: "Product photography"
      - id: "h"
        label: "Abstract or experimental"
      - id: "i"
        label: "Other (please specify)"
  - id: q9
    prompt: "Do you run image models locally on your own hardware (e.g., a Stable Diffusion install)?"
    type: single_choice
    construct: run_image_models_locally_own
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Sometimes"
      - id: "c"
        label: "No, I use cloud services only"
      - id: "d"
        label: "I don't know what that means"
  - id: q10
    prompt: "Which capabilities do you use in AI image tools? (Select all that apply)"
    type: multi_choice
    construct: capabilities_use_ai_image_tools
    required: true
    options:
      - id: "a"
        label: "Text-to-image generation"
      - id: "b"
        label: "Image-to-image / variations"
      - id: "c"
        label: "Inpainting (editing part of an image)"
      - id: "d"
        label: "Outpainting (extending an image)"
      - id: "e"
        label: "Upscaling / enhancing resolution"
      - id: "f"
        label: "Background removal or replacement"
      - id: "g"
        label: "Style transfer"
      - id: "h"
        label: "Character or face consistency"
      - id: "i"
        label: "Pose or composition control (e.g., ControlNet)"
      - id: "j"
        label: "I only use basic text-to-image"
  - id: q11
    prompt: "Do you pay for any AI image-generation tools?"
    type: single_choice
    construct: pay_any_ai_image_generation
    required: true
    options:
      - id: "a"
        label: "Yes, one paid tool"
      - id: "b"
        label: "Yes, more than one paid tool"
      - id: "c"
        label: "No, I only use free tiers"
      - id: "d"
        label: "No, I don't use these tools"
  - id: q12
    prompt: "Approximately how much do you spend per month on AI image tools, in US dollars? Enter a whole number (enter 0 if none)."
    type: free_text
    construct: approximately_much_spend_per_month
    required: true
  - id: q13
    prompt: "Which payment model do you most prefer for AI image tools?"
    type: single_choice
    construct: payment_model_most_prefer_ai
    required: true
    options:
      - id: "a"
        label: "Free tier only"
      - id: "b"
        label: "Monthly subscription"
      - id: "c"
        label: "Pay-per-credit / usage-based"
      - id: "d"
        label: "One-time purchase"
      - id: "e"
        label: "No preference"
  - id: q14
    prompt: "How would you describe your prompt-writing skill?"
    type: single_choice
    construct: would_describe_prompt_writing_skill
    required: true
    options:
      - id: "a"
        label: "Beginner"
      - id: "b"
        label: "Intermediate"
      - id: "c"
        label: "Advanced"
      - id: "d"
        label: "Expert"
  - id: q15
    prompt: "On average, how many attempts does it take you to get a usable image? Enter a whole number."
    type: free_text
    construct: average_many_attempts_does_it
    required: true
  - id: q16
    prompt: "Which prompting techniques do you use? (Select all that apply)"
    type: multi_choice
    construct: prompting_techniques_use_select_all
    required: true
    options:
      - id: "a"
        label: "Negative prompts"
      - id: "b"
        label: "Reference or source images"
      - id: "c"
        label: "Seed control for reproducibility"
      - id: "d"
        label: "Aspect ratio or resolution settings"
      - id: "e"
        label: "Style presets or style codes"
      - id: "f"
        label: "Saved prompt libraries or templates"
      - id: "g"
        label: "Custom models, LoRAs, or fine-tunes"
      - id: "h"
        label: "Prompt help from an AI chatbot"
      - id: "i"
        label: "I just type a simple description"
  - id: q17
    prompt: "How much do you agree with the following statement about AI image tools? — They save me significant time."
    type: single_choice
