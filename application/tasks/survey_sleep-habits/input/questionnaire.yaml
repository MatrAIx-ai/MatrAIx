schemaVersion: "1.0"
id: sleep_habits_v1
title: "Sleep Habits Survey"
description: "Everyday sleep habits, routines, and attitudes among adults."
questions:
  - id: q0
    prompt: "On a typical weeknight, about how many hours of sleep do you get? Please enter a number of hours."
    type: free_text
    construct: typical_weeknight_many_hours_sleep
    required: true
  - id: q1
    prompt: "On a typical weekend night, about how many hours of sleep do you get? Please enter a number of hours."
    type: free_text
    construct: typical_weekend_night_many_hours
    required: true
  - id: q2
    prompt: "What time do you usually go to bed on a weeknight?"
    type: single_choice
    construct: time_usually_go_bed_weeknight
    required: true
    options:
      - id: "a"
        label: "Before 9 pm"
      - id: "b"
        label: "9 pm to 10 pm"
      - id: "c"
        label: "10 pm to 11 pm"
      - id: "d"
        label: "11 pm to midnight"
      - id: "e"
        label: "Midnight to 1 am"
      - id: "f"
        label: "After 1 am"
  - id: q3
    prompt: "What time do you usually wake up on a weekday?"
    type: single_choice
    construct: time_usually_wake_up_weekday
    required: true
    options:
      - id: "a"
        label: "Before 5 am"
      - id: "b"
        label: "5 am to 6 am"
      - id: "c"
        label: "6 am to 7 am"
      - id: "d"
        label: "7 am to 8 am"
      - id: "e"
        label: "8 am to 9 am"
      - id: "f"
        label: "After 9 am"
  - id: q4
    prompt: "How would you rate the quality of your sleep most nights?"
    type: single_choice
    construct: would_rate_quality_sleep_most
    required: true
    options:
      - id: "a"
        label: "Very poor"
      - id: "b"
        label: "Poor"
      - id: "c"
        label: "Fair"
      - id: "d"
        label: "Good"
      - id: "e"
        label: "Very good"
  - id: q5
    prompt: "How long does it usually take you to fall asleep?"
    type: single_choice
    construct: long_does_it_usually_take
    required: true
    options:
      - id: "a"
        label: "Less than 10 minutes"
      - id: "b"
        label: "10 to 20 minutes"
      - id: "c"
        label: "20 to 40 minutes"
      - id: "d"
        label: "40 minutes to an hour"
      - id: "e"
        label: "More than an hour"
  - id: q6
    prompt: "How often do you wake up during the night?"
    type: single_choice
    construct: often_wake_up_during_night
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost every night"
  - id: q7
    prompt: "How often do you feel rested when you wake up?"
    type: single_choice
    construct: often_feel_rested_when_wake
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q8
    prompt: "Do you keep a consistent sleep schedule?"
    type: single_choice
    construct: keep_consistent_sleep_schedule
    required: true
    options:
      - id: "a"
        label: "Yes, very consistent every day"
      - id: "b"
        label: "Consistent on weekdays but different on weekends"
      - id: "c"
        label: "Somewhat irregular"
      - id: "d"
        label: "Very irregular"
  - id: q9
    prompt: "Which of the following are part of your wind-down routine before bed? (Select all that apply)"
    type: multi_choice
    construct: following_part_wind_down_routine
    required: true
    options:
      - id: "a"
        label: "Reading"
      - id: "b"
        label: "Watching TV or streaming"
      - id: "c"
        label: "Using my phone or scrolling"
      - id: "d"
        label: "A warm shower or bath"
      - id: "e"
        label: "Stretching or light yoga"
      - id: "f"
        label: "Meditation or breathing exercises"
      - id: "g"
        label: "Listening to music or a podcast"
      - id: "h"
        label: "I do not have a routine"
  - id: q10
    prompt: "Which factors most often disrupt your sleep? (Select all that apply)"
    type: multi_choice
    construct: factors_most_often_disrupt_sleep
    required: true
    options:
      - id: "a"
        label: "Stress or a busy mind"
      - id: "b"
        label: "Noise"
      - id: "c"
        label: "Light in the room"
      - id: "d"
        label: "Temperature"
      - id: "e"
        label: "Screens or devices"
      - id: "f"
        label: "Caffeine"
      - id: "g"
        label: "A partner, child, or pet"
      - id: "h"
        label: "An uncomfortable mattress or pillow"
  - id: q11
