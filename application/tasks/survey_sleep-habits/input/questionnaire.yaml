        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Every night"
  - id: q12
    prompt: "How many caffeinated drinks do you typically have after noon? Please enter a number."
    type: free_text
    construct: many_caffeinated_drinks_typically_have
    required: true
  - id: q13
    prompt: "How often do you take a daytime nap?"
    type: single_choice
