schemaVersion: "1.0"
id: otc_medicine_usage_v1
title: "Over-the-Counter Medicine Usage Survey"
description: "How consumers buy, choose, and use over-the-counter (non-prescription) medicines for everyday needs."
questions:
  - id: q0
    prompt: "How often do you use over-the-counter (OTC) medicines?"
    type: single_choice
    construct: often_use_over_counter_otc
    required: true
    options:
      - id: "a"
        label: "Several times a week"
      - id: "b"
        label: "About once a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q1
    prompt: "Which types of OTC products do you keep at home? (Select all that apply)"
    type: multi_choice
    construct: types_otc_products_keep_home
    required: true
    options:
      - id: "a"
        label: "Pain relievers (for example, Tylenol, Advil, Aleve)"
      - id: "b"
        label: "Cold and flu remedies"
      - id: "c"
        label: "Allergy medicines (for example, Claritin, Zyrtec, Allegra)"
      - id: "d"
        label: "Antacids or heartburn relief"
      - id: "e"
        label: "Cough drops or throat lozenges"
      - id: "f"
        label: "Sleep aids"
      - id: "g"
        label: "Anti-diarrheal or digestive aids"
      - id: "h"
        label: "First-aid items (antibiotic ointment, bandages)"
      - id: "i"
        label: "Eye drops"
      - id: "j"
        label: "None of these"
  - id: q2
    prompt: "About how many different OTC products do you currently have at home? Please enter a number."
    type: free_text
    construct: many_different_otc_products_currently
    required: true
  - id: q3
    prompt: "Roughly how much do you spend on OTC medicines in a typical month? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_spend_otc_medicines
    required: true
  - id: q4
    prompt: "Where do you usually buy OTC medicines? (Select all that apply)"
    type: multi_choice
    construct: where_usually_buy_otc_medicines
    required: true
    options:
      - id: "a"
        label: "Pharmacy or drugstore"
      - id: "b"
        label: "Grocery store"
      - id: "c"
        label: "Big-box store (for example, Walmart or Target)"
      - id: "d"
        label: "Warehouse club (for example, Costco)"
      - id: "e"
        label: "Online (for example, Amazon)"
      - id: "f"
        label: "Convenience store or dollar store"
  - id: q5
    prompt: "When buying OTC medicine, which do you usually choose?"
    type: single_choice
    construct: when_buying_otc_medicine_usually
    required: true
    options:
      - id: "a"
        label: "The name brand"
      - id: "b"
        label: "The store or generic brand"
      - id: "c"
        label: "Whichever is cheaper"
      - id: "d"
        label: "It depends on the product"
      - id: "e"
        label: "Whatever is in stock"
  - id: q6
    prompt: "What do you rely on when choosing an OTC product? (Select all that apply)"
    type: multi_choice
    construct: rely_when_choosing_otc_product
    required: true
    options:
      - id: "a"
        label: "Reading the label and active ingredients"
      - id: "b"
        label: "A pharmacist's recommendation"
      - id: "c"
        label: "A doctor's advice"
      - id: "d"
        label: "Past experience with the product"
      - id: "e"
        label: "Brand familiarity"
      - id: "f"
        label: "Price"
      - id: "g"
        label: "Online reviews or searches"
      - id: "h"
        label: "Friends or family recommendations"
  - id: q7
    prompt: "How often do you read the label before taking an OTC medicine?"
    type: single_choice
    construct: often_read_label_before_taking
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q8
    prompt: "How often do you check the active ingredients to avoid taking the same one twice?"
    type: single_choice
    construct: often_check_active_ingredients_avoid
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q9
    prompt: "Have you ever asked a pharmacist which OTC product to choose?"
    type: single_choice
    construct: have_ever_asked_pharmacist_otc
    required: true
    options:
      - id: "a"
        label: "Yes, often"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I would"
      - id: "d"
        label: "No, I prefer to decide myself"
  - id: q10
    prompt: "For which reasons have you used OTC medicines in the past year? (Select all that apply)"
    type: multi_choice
    construct: reasons_have_used_otc_medicines
    required: true
    options:
      - id: "a"
        label: "Headaches or minor pain"
      - id: "b"
        label: "Colds or congestion"
      - id: "c"
        label: "Seasonal allergies"
      - id: "d"
        label: "Heartburn or upset stomach"
      - id: "e"
        label: "Trouble sleeping"
      - id: "f"
        label: "Minor cuts or skin issues"
      - id: "g"
        label: "Muscle or joint soreness"
      - id: "h"
        label: "None of these"
  - id: q11
    prompt: "How often do you use an OTC medicine before deciding whether to see a doctor?"
    type: single_choice
    construct: often_use_otc_medicine_before
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q12
    prompt: "How much do you agree or disagree: OTC medicines are a convenient first step for minor issues."
    type: single_choice
    construct: much_agree_disagree_otc_medicines
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: Store-brand OTC products work just as well as name brands."
    type: single_choice
    construct: much_agree_disagree_store_brand
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I feel confident choosing the right OTC product for a symptom."
    type: single_choice
    construct: much_agree_disagree_i_feel
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: OTC medicine labels are easy to understand."
    type: single_choice
    construct: much_agree_disagree_otc_medicine
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: I am careful about following the recommended dose."
    type: single_choice
    construct: much_agree_disagree_i_am
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: Using OTC medicines saves me trips to the doctor."
    type: single_choice
    construct: much_agree_disagree_using_otc
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How confident are you that you can choose the right OTC medicine without help?"
    type: single_choice
    construct: confident_that_can_choose_right
    required: true
    options:
      - id: "a"
        label: "Very confident"
      - id: "b"
        label: "Somewhat confident"
      - id: "c"
        label: "Not very confident"
      - id: "d"
        label: "Not at all confident"
  - id: q19
    prompt: "How often do you check the expiration date on OTC medicines you have at home?"
    type: single_choice
