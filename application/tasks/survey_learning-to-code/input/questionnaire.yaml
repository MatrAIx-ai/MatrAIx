schemaVersion: "1.0"
id: learning_to_code_v1
title: "Learning to Code Survey"
description: "People's experiences, methods, motivations, and challenges in learning to program and develop software."
questions:
  - id: q0
    prompt: "Which best describes your relationship with coding?"
    type: single_choice
    construct: best_describes_relationship_coding
    required: true
    options:
      - id: "a"
        label: "I'm currently learning to code"
      - id: "b"
        label: "I code professionally"
      - id: "c"
        label: "I code as a hobby"
      - id: "d"
        label: "I've learned some coding in the past"
      - id: "e"
        label: "I'm interested but haven't started"
      - id: "f"
        label: "I have no interest in coding"
  - id: q1
    prompt: "How long have you been learning or working with code?"
    type: single_choice
    construct: long_have_been_learning_working
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1-2 years"
      - id: "d"
        label: "3-5 years"
      - id: "e"
        label: "6-10 years"
      - id: "f"
        label: "More than 10 years"
      - id: "g"
        label: "I haven't started"
  - id: q2
    prompt: "What is your main motivation for learning to code? (Select all that apply)"
