        label: "Career change into tech"
      - id: "b"
        label: "Advancing in my current career"
      - id: "c"
        label: "Building my own projects or startup"
      - id: "d"
        label: "Personal interest / curiosity"
      - id: "e"
        label: "School or degree requirement"
      - id: "f"
        label: "Automating tasks or hobbies"
      - id: "g"
        label: "Job security or higher pay"
      - id: "h"
        label: "I'm not learning to code"
  - id: q3
    prompt: "Which methods have you used to learn to code? (Select all that apply)"
