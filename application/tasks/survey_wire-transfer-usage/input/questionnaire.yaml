      - id: "b"
        label: "Same day"
      - id: "c"
        label: "1–2 business days"
      - id: "d"
        label: "3 or more business days"
      - id: "e"
        label: "Not applicable"
  - id: q26
    prompt: "Did your most recent transfer go through without any problems?"
    type: single_choice
    construct: did_most_recent_transfer_go
    required: true
    options:
      - id: "a"
        label: "Yes, no problems"
      - id: "b"
        label: "There was a minor delay"
      - id: "c"
        label: "There was a significant problem"
      - id: "d"
        label: "Not applicable"
  - id: q27
    prompt: "How likely are you to send another wire or large transfer in the next 12 months?"
    type: single_choice
    construct: likely_send_another_wire_large
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
