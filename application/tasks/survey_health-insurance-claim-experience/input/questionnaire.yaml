schemaVersion: "1.0"
id: health_insurance_claim_experience_v1
title: "Health Insurance Claim Experience Survey"
description: "Consumer experience filing, tracking, and resolving health insurance claims."
questions:
  - id: q0
    prompt: "Do you currently have health insurance?"
    type: single_choice
    construct: currently_have_health_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, through an employer"
      - id: "b"
        label: "Yes, purchased on my own or a marketplace"
      - id: "c"
        label: "Yes, through a government program"
      - id: "d"
        label: "No coverage"
      - id: "e"
        label: "Not sure"
  - id: q1
    prompt: "What type of plan best describes your main coverage?"
    type: single_choice
    construct: type_plan_best_describes_main
    required: true
    options:
      - id: "a"
        label: "HMO"
      - id: "b"
        label: "PPO"
      - id: "c"
        label: "High-deductible health plan (HDHP)"
      - id: "d"
        label: "Medicare or Medicare Advantage"
      - id: "e"
        label: "Medicaid"
      - id: "f"
        label: "Not sure"
  - id: q2
    prompt: "In the past year, about how many health insurance claims were filed for you or your household? Please enter a number (enter 0 if none)."
    type: free_text
    construct: past_year_many_health_insurance
    required: true
  - id: q3
    prompt: "Who usually files your health insurance claims?"
    type: single_choice
    construct: who_usually_files_health_insurance
    required: true
    options:
      - id: "a"
        label: "The provider's office files them for me"
      - id: "b"
        label: "I file them myself"
      - id: "c"
        label: "A mix of both"
      - id: "d"
        label: "Not sure"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "How do you most often submit or track a claim? (Select all that apply)"
    type: multi_choice
    construct: most_often_submit_track_claim
    required: true
    options:
      - id: "a"
        label: "Insurer's website"
      - id: "b"
        label: "Insurer's mobile app"
      - id: "c"
        label: "Phone call to the insurer"
      - id: "d"
        label: "Paper forms by mail"
      - id: "e"
        label: "Through my provider's office"
      - id: "f"
        label: "I do not track claims"
  - id: q5
    prompt: "For what kinds of care were your most recent claims filed? (Select all that apply)"
    type: multi_choice
    construct: kinds_care_were_most_recent
    required: true
    options:
      - id: "a"
        label: "Routine or preventive visits"
      - id: "b"
        label: "Specialist visits"
      - id: "c"
        label: "Lab tests or imaging"
      - id: "d"
        label: "Prescription medications"
      - id: "e"
        label: "Emergency or urgent care"
      - id: "f"
        label: "A procedure or surgery"
      - id: "g"
        label: "Dental or vision (if covered)"
  - id: q6
    prompt: "How easy is it to understand what your plan covers before care?"
    type: single_choice
    construct: easy_it_understand_plan_covers
    required: true
    options:
      - id: "a"
        label: "Very difficult"
      - id: "b"
        label: "Somewhat difficult"
      - id: "c"
        label: "Somewhat easy"
      - id: "d"
        label: "Very easy"
  - id: q7
    prompt: "How easy was your most recent claim to file or track?"
    type: single_choice
    construct: easy_was_most_recent_claim
    required: true
    options:
      - id: "a"
        label: "Very difficult"
      - id: "b"
        label: "Somewhat difficult"
      - id: "c"
        label: "Somewhat easy"
      - id: "d"
        label: "Very easy"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "About how long did it take for your most recent claim to be processed?"
    type: single_choice
    construct: long_did_it_take_most
    required: true
    options:
      - id: "a"
        label: "Less than a week"
      - id: "b"
        label: "1 to 2 weeks"
      - id: "c"
        label: "3 to 4 weeks"
      - id: "d"
        label: "More than a month"
      - id: "e"
        label: "Not sure or not applicable"
  - id: q9
    prompt: "Have you ever had a claim denied or only partly paid?"
    type: single_choice
    construct: have_ever_had_claim_denied
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not sure"
  - id: q10
    prompt: "If a claim was denied or reduced, what did you do? (Select all that apply)"
    type: multi_choice
    construct: if_claim_was_denied_reduced
    required: true
    options:
      - id: "a"
        label: "Called the insurer to ask why"
      - id: "b"
        label: "Filed an appeal"
      - id: "c"
        label: "Asked my provider for help"
      - id: "d"
        label: "Paid the balance myself"
      - id: "e"
        label: "Negotiated the bill"
      - id: "f"
        label: "Did nothing"
      - id: "g"
        label: "Not applicable"
  - id: q11
    prompt: "How clear was the explanation of benefits (EOB) or statement you received?"
    type: single_choice
    construct: clear_was_explanation_benefits_eob
    required: true
    options:
      - id: "a"
        label: "Very unclear"
      - id: "b"
        label: "Somewhat unclear"
      - id: "c"
        label: "Somewhat clear"
      - id: "d"
        label: "Very clear"
      - id: "e"
        label: "I did not receive or read one"
  - id: q12
    prompt: "How would you rate the customer service when you contacted your insurer about a claim?"
    type: single_choice
    construct: would_rate_customer_service_when
    required: true
    options:
      - id: "a"
        label: "Very poor"
      - id: "b"
        label: "Poor"
      - id: "c"
        label: "Fair"
      - id: "d"
        label: "Good"
      - id: "e"
        label: "Excellent"
      - id: "f"
        label: "Have not contacted them"
  - id: q13
    prompt: "About how many times in the past year did you contact your insurer about a claim? Please enter a number (enter 0 if none)."
    type: free_text
    construct: many_times_past_year_did
    required: true
  - id: q14
    prompt: "Which issues have you experienced with claims? (Select all that apply)"
    type: multi_choice
    construct: issues_have_experienced_claims_select
    required: true
    options:
      - id: "a"
        label: "Unexpected out-of-pocket costs"
      - id: "b"
        label: "Slow processing"
      - id: "c"
        label: "Confusing paperwork"
      - id: "d"
        label: "Claim denied for coverage reasons"
      - id: "e"
        label: "Billing or coding errors"
      - id: "f"
        label: "Difficulty reaching someone"
      - id: "g"
        label: "Out-of-network surprises"
      - id: "h"
        label: "No problems"
  - id: q15
    prompt: "How much do you agree with the following statement about your insurer's claims process: Dealing with claims is stressful."
    type: single_choice
    construct: much_agree_following_statement_insurer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement about your insurer's claims process: The information I receive is clear and easy to understand."
    type: single_choice
    construct: much_agree_following_statement_insurer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree with the following statement about your insurer's claims process: Claims are handled quickly."
    type: single_choice
    construct: much_agree_following_statement_insurer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How much do you agree with the following statement about your insurer's claims process: It is easy to reach a helpful person when I have questions."
    type: single_choice
    construct: much_agree_following_statement_insurer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q19
    prompt: "How much do you agree with the following statement about your insurer's claims process: I trust that my claims are handled fairly."
    type: single_choice
    construct: much_agree_following_statement_insurer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q20
    prompt: "How confident are you that your claims are processed correctly?"
    type: single_choice
    construct: confident_that_claims_processed_correctl
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
  - id: q21
    prompt: "How confident are you that you understand your out-of-pocket responsibility after a claim?"
    type: single_choice
    construct: confident_that_understand_out_pocket
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
  - id: q22
    prompt: "Select your top 3 improvements you would most want in the claims process. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_improvements_would
    required: true
    options:
      - id: "a"
        label: "Faster processing"
      - id: "b"
        label: "Clearer statements"
      - id: "c"
        label: "Easier ways to reach customer service"
      - id: "d"
        label: "Fewer surprise or denied claims"
      - id: "e"
        label: "Better online or app tools"
      - id: "f"
        label: "More upfront cost estimates"
      - id: "g"
        label: "Simpler appeals"
  - id: q23
    prompt: "How important is a good claims experience when you think about your insurer overall?"
    type: single_choice
    construct: important_good_claims_experience_when
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q24
    prompt: "Overall, how satisfied are you with your insurer's claims process?"
    type: single_choice
    construct: overall_satisfied_insurer_s_claims
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q25
    prompt: "How likely are you to recommend your insurer to others based on the claims experience, on a scale of 0 (not at all likely) to 10 (extremely likely)?"
    type: single_choice
    construct: likely_recommend_insurer_others_based
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q26
    prompt: "How likely are you to switch insurers when you next have the chance, based on your claims experience?"
    type: single_choice
    construct: likely_switch_insurers_when_next
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Somewhat unlikely"
      - id: "c"
        label: "Somewhat likely"
      - id: "d"
        label: "Very likely"
  - id: q27
    prompt: "In your own words, what would most improve your health insurance claims experience?"
    type: free_text
    construct: own_words_would_most_improve
    required: true
  - id: q28
    prompt: "What is your age band?"
    type: single_choice
    construct: age_band
    required: true
    options:
      - id: "a"
        label: "18–24"
      - id: "b"
        label: "25–34"
      - id: "c"
        label: "35–44"
      - id: "d"
        label: "45–54"
      - id: "e"
        label: "55–64"
      - id: "f"
        label: "65 or older"
  - id: q29
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe or not to say"
  - id: q30
    prompt: "Are you of Hispanic, Latino, or Spanish origin?"
    type: single_choice
    construct: hispanic_latino_spanish_origin
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your race? (Select all that apply)"
    type: multi_choice
    construct: race_select_all_that_apply
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Asian"
      - id: "d"
        label: "American Indian or Alaska Native"
      - id: "e"
        label: "Native Hawaiian or other Pacific Islander"
      - id: "f"
        label: "Some other race"
      - id: "g"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "High school or less"
      - id: "b"
        label: "Some college, no degree"
      - id: "c"
        label: "Associate degree"
      - id: "d"
        label: "Bachelor's degree"
      - id: "e"
        label: "Graduate or professional degree"
  - id: q33
    prompt: "What is your current employment status?"
    type: single_choice
    construct: current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Not currently employed"
      - id: "e"
        label: "Student"
      - id: "f"
        label: "Retired"
  - id: q34
    prompt: "What is your marital or relationship status?"
    type: single_choice
    construct: marital_relationship_status
    required: true
    options:
      - id: "a"
        label: "Single, never married"
      - id: "b"
        label: "Married or living with a partner"
      - id: "c"
        label: "Divorced or separated"
      - id: "d"
        label: "Widowed"
      - id: "e"
        label: "Prefer not to say"
  - id: q35
    prompt: "Including yourself, how many people are covered on your health plan? Please enter a number."
    type: free_text
    construct: including_yourself_many_people_covered
    required: true
  - id: q36
    prompt: "What is your approximate annual household income?"
    type: single_choice
    construct: approximate_annual_household_income
    required: true
    options:
      - id: "a"
        label: "Less than $25,000"
      - id: "b"
        label: "$25,000–$49,999"
      - id: "c"
        label: "$50,000–$74,999"
      - id: "d"
        label: "$75,000–$99,999"
      - id: "e"
        label: "$100,000–$149,999"
      - id: "f"
        label: "$150,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q37
    prompt: "Which region of the United States do you live in?"
    type: single_choice
    construct: region_united_states_live
    required: true
    options:
      - id: "a"
        label: "Northeast"
      - id: "b"
        label: "Midwest"
      - id: "c"
        label: "South"
      - id: "d"
        label: "West"
      - id: "e"
        label: "Outside the United States"
  - id: q38
    prompt: "How would you describe the area where you live?"
    type: single_choice
    construct: would_describe_area_where_live
    required: true
    options:
      - id: "a"
        label: "Urban"
      - id: "b"
        label: "Suburban"
      - id: "c"
        label: "Rural"
  - id: q39
    prompt: "How confident do you feel navigating health insurance in general?"
    type: single_choice
    construct: confident_feel_navigating_health_insuran
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
