      - id: "g"
        label: "Comparing multiple vendor quotes"
      - id: "h"
        label: "None of these"
  - id: q21
    prompt: "Which resources are you using (or did you use) to plan? (Select all that apply)"
    type: multi_choice
    construct: resources_using_did_use_plan
    required: true
    options:
      - id: "a"
        label: "Wedding websites (The Knot, Zola, WeddingWire)"
      - id: "b"
        label: "A wedding planner or coordinator"
      - id: "c"
        label: "Social media (Pinterest, Instagram, TikTok)"
      - id: "d"
        label: "Friends and family"
      - id: "e"
        label: "Budgeting apps or spreadsheets"
      - id: "f"
        label: "Bridal shows or expos"
      - id: "g"
        label: "None of these"
  - id: q22
    prompt: "Do you expect to (or did you) go over budget?"
    type: single_choice
    construct: expect_did_go_over_budget
    required: true
    options:
      - id: "a"
        label: "Yes, significantly over"
      - id: "b"
