    construct: much_wedding_related_debt_expect
    required: true
  - id: q24
    prompt: "How stressful is (or was) managing the wedding budget?"
    type: single_choice
    construct: stressful_was_managing_wedding_budget
    required: true
    options:
      - id: "a"
        label: "Not at all stressful"
      - id: "b"
        label: "Slightly stressful"
      - id: "c"
        label: "Moderately stressful"
      - id: "d"
        label: "Very stressful"
      - id: "e"
        label: "Extremely stressful"
  - id: q25
    prompt: "Has wedding spending caused any tension between you and your partner or families?"
    type: single_choice
