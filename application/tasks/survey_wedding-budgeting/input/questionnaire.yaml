schemaVersion: "1.0"
id: wedding_budgeting_v1
title: "Wedding Budgeting Survey"
description: "How couples plan, budget for, and pay for a wedding, and their attitudes toward wedding spending."
questions:
  - id: q0
    prompt: "What is your relationship to wedding planning?"
    type: single_choice
    construct: relationship_wedding_planning
    required: true
    options:
      - id: "a"
        label: "I am currently planning my own wedding"
      - id: "b"
        label: "I got married in the past 3 years"
      - id: "c"
        label: "I am engaged but haven't started planning"
      - id: "d"
        label: "I expect to plan a wedding in the future"
      - id: "e"
        label: "I am helping plan someone else's wedding"
      - id: "f"
        label: "None of these"
  - id: q1
    prompt: "What is (or was) your total wedding budget? Enter a dollar amount."
    type: free_text
    construct: was_total_wedding_budget_enter
    required: true
  - id: q2
    prompt: "About how many guests are (or were) invited to the wedding? Enter a number."
    type: free_text
    construct: many_guests_were_invited_wedding
    required: true
  - id: q3
    prompt: "Who is (or was) primarily paying for the wedding? (Select all that apply)"
    type: multi_choice
    construct: who_was_primarily_paying_wedding
    required: true
    options:
      - id: "a"
        label: "The couple themselves"
      - id: "b"
        label: "The bride's parents"
      - id: "c"
        label: "The groom's parents"
      - id: "d"
        label: "Both sets of parents"
      - id: "e"
        label: "Other family members"
      - id: "f"
        label: "A combination of sources"
      - id: "g"
        label: "Prefer not to say"
  - id: q4
    prompt: "Which of the following are (or were) the biggest expenses? (Select all that apply)"
    type: multi_choice
    construct: following_were_biggest_expenses_select
    required: true
    options:
      - id: "a"
        label: "Venue"
      - id: "b"
        label: "Catering and drinks"
      - id: "c"
        label: "Photography and videography"
      - id: "d"
        label: "Attire (dress, suit, etc.)"
      - id: "e"
        label: "Flowers and décor"
      - id: "f"
        label: "Music or entertainment (DJ, band)"
      - id: "g"
        label: "The engagement ring"
      - id: "h"
        label: "Honeymoon"
      - id: "i"
        label: "Invitations and stationery"
      - id: "j"
        label: "Hair and makeup"
  - id: q5
    prompt: "How are (or did) you fund the wedding? (Select all that apply)"
    type: multi_choice
    construct: did_fund_wedding_select_all
    required: true
    options:
      - id: "a"
        label: "Personal savings"
      - id: "b"
        label: "Contributions from family"
      - id: "c"
        label: "Credit cards"
      - id: "d"
        label: "A personal loan"
      - id: "e"
        label: "Buy now, pay later services"
      - id: "f"
        label: "Selling items or side income"
      - id: "g"
        label: "Cash gifts from guests"
      - id: "h"
        label: "None of these"
  - id: q6
    prompt: "Do you have (or did you set) a formal wedding budget?"
    type: single_choice
    construct: have_did_set_formal_wedding
    required: true
    options:
      - id: "a"
        label: "Yes, a detailed budget I track closely"
      - id: "b"
        label: "Yes, a rough budget"
      - id: "c"
        label: "No formal budget"
      - id: "d"
        label: "Not sure"
  - id: q7
    prompt: "How much do you agree with the following statement: Weddings have become too expensive."
    type: single_choice
    construct: much_agree_following_statement_weddings
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q8
    prompt: "How much do you agree with the following statement: I feel pressure to have a certain kind of wedding."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q9
    prompt: "How much do you agree with the following statement: It is worth going into debt for a memorable wedding."
    type: single_choice
    construct: much_agree_following_statement_it
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree with the following statement: I would rather spend less on the wedding and more on our future together."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree with the following statement: Social media influences how much people spend on weddings."
    type: single_choice
    construct: much_agree_following_statement_social
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Wedding vendors charge more just because it's a wedding."
    type: single_choice
    construct: much_agree_following_statement_wedding
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How important is each element to you: The venue?"
    type: single_choice
    construct: important_each_element_venue
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q14
    prompt: "How important is each element to you: The food and drinks?"
    type: single_choice
    construct: important_each_element_food_drinks
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q15
    prompt: "How important is each element to you: Photography and capturing memories?"
    type: single_choice
    construct: important_each_element_photography_captu
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q16
    prompt: "How important is each element to you: The guest experience?"
    type: single_choice
    construct: important_each_element_guest_experience
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q17
    prompt: "How important is each element to you: Staying within budget?"
    type: single_choice
    construct: important_each_element_staying_within
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q18
    prompt: "How important is each element to you: The honeymoon?"
    type: single_choice
    construct: important_each_element_honeymoon
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q19
    prompt: "Select the top 3 things you are (or were) most willing to splurge on. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_things_were
    required: true
    options:
      - id: "a"
        label: "Venue"
      - id: "b"
        label: "Catering and drinks"
      - id: "c"
        label: "Photography or videography"
      - id: "d"
        label: "Attire"
      - id: "e"
        label: "Flowers and décor"
      - id: "f"
        label: "Music or entertainment"
      - id: "g"
        label: "Honeymoon"
      - id: "h"
        label: "The ring"
  - id: q20
    prompt: "Which strategies are you using (or did you use) to save money? (Select all that apply)"
    type: multi_choice
    construct: strategies_using_did_use_save
    required: true
    options:
      - id: "a"
        label: "Choosing an off-peak date or day"
      - id: "b"
