schemaVersion: "1.0"
id: standing_desk_usage_v1
title: "Standing Desk Usage Survey"
description: "How people use standing desks and manage sitting time during their workday."
questions:
  - id: q0
    prompt: "Do you use a standing desk or sit-stand desk?"
    type: single_choice
    construct: use_standing_desk_sit_stand
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I have one but rarely use the standing feature"
      - id: "d"
        label: "No, but I'm interested"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Where do you primarily use or would use a standing desk?"
    type: single_choice
    construct: where_primarily_use_would_use
    required: true
    options:
      - id: "a"
        label: "At a workplace or office"
      - id: "b"
        label: "At a home office"
      - id: "c"
        label: "Both work and home"
      - id: "d"
        label: "Somewhere else"
      - id: "e"
        label: "I don't use one anywhere"
  - id: q2
    prompt: "How long have you been using a standing desk?"
    type: single_choice
    construct: long_have_been_using_standing
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I don't use one"
  - id: q3
    prompt: "What type of standing desk setup do you have?"
    type: single_choice
    construct: type_standing_desk_setup_have
    required: true
    options:
      - id: "a"
        label: "Electric height-adjustable desk"
      - id: "b"
        label: "Manual crank or lever desk"
      - id: "c"
        label: "A desktop riser or converter"
      - id: "d"
        label: "A fixed-height standing desk"
      - id: "e"
        label: "An improvised setup"
      - id: "f"
        label: "I don't have one"
  - id: q4
    prompt: "Which brand or type best describes your desk? (Select all that apply)"
    type: multi_choice
    construct: brand_type_best_describes_desk
    required: true
    options:
      - id: "a"
        label: "Uplift"
      - id: "b"
        label: "Fully or Jarvis"
      - id: "c"
        label: "Vari"
      - id: "d"
        label: "FlexiSpot"
      - id: "e"
        label: "IKEA"
      - id: "f"
        label: "A desktop converter (Varidesk, etc.)"
      - id: "g"
        label: "Another brand"
      - id: "h"
        label: "I don't have a standing desk"
  - id: q5
    prompt: "About how many hours per day do you spend at your desk (sitting and standing combined)? Please enter a number."
    type: free_text
    construct: many_hours_per_day_spend
    required: true
  - id: q6
    prompt: "About how many of those hours do you spend standing? Please enter a number."
