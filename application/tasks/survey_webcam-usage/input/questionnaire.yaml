        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q30
    prompt: "What one thing would most improve your video-call experience?"
    type: free_text
    construct: one_thing_would_most_improve
    required: true
  - id: q31
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "18-24"
      - id: "b"
        label: "25-34"
      - id: "c"
        label: "35-44"
      - id: "d"
        label: "45-54"
      - id: "e"
        label: "55-64"
      - id: "f"
        label: "65 or older"
      - id: "g"
        label: "Prefer not to say"
  - id: q32
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q33
    prompt: "Which best describes your race or ethnicity? (Select all that apply)"
