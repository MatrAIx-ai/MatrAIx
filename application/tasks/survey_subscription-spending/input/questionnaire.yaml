schemaVersion: "1.0"
id: subscription_spending_v1
title: "Subscription Spending Survey"
description: "How consumers use, track, and manage recurring subscription services and the money they spend on them."
questions:
  - id: q0
    prompt: "About how many paid subscription services do you currently have?"
    type: single_choice
    construct: many_paid_subscription_services_currentl
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1–2"
      - id: "c"
        label: "3–5"
      - id: "d"
        label: "6–9"
      - id: "e"
        label: "10–14"
      - id: "f"
        label: "15 or more"
  - id: q1
    prompt: "Roughly how much do you spend on all subscriptions per month? Enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: roughly_much_spend_all_subscriptions
    required: true
  - id: q2
    prompt: "Which categories of subscriptions do you currently pay for? (Select all that apply)"
    type: multi_choice
    construct: categories_subscriptions_currently_pay_s
    required: true
    options:
      - id: "a"
        label: "Video streaming (Netflix, Disney+, Max, etc.)"
      - id: "b"
        label: "Music streaming (Spotify, Apple Music, etc.)"
      - id: "c"
        label: "News or magazines"
      - id: "d"
        label: "Cloud storage or software (iCloud, Adobe, Microsoft 365)"
      - id: "e"
        label: "Gaming (Xbox Game Pass, PlayStation Plus)"
      - id: "f"
        label: "Meal kits or food delivery memberships"
      - id: "g"
        label: "Fitness or wellness apps or gyms"
      - id: "h"
        label: "Shopping memberships (Amazon Prime, Costco, Walmart+)"
      - id: "i"
        label: "Subscription boxes (beauty, snacks, etc.)"
      - id: "j"
        label: "Audiobooks or podcasts (Audible, etc.)"
      - id: "k"
        label: "None of these"
  - id: q3
    prompt: "Which video streaming services do you currently subscribe to? (Select all that apply)"
    type: multi_choice
    construct: video_streaming_services_currently_subsc
    required: true
    options:
      - id: "a"
        label: "Netflix"
      - id: "b"
        label: "Disney+"
      - id: "c"
        label: "Max (HBO)"
      - id: "d"
        label: "Amazon Prime Video"
      - id: "e"
        label: "Hulu"
      - id: "f"
        label: "Apple TV+"
      - id: "g"
        label: "Peacock"
      - id: "h"
        label: "Paramount+"
      - id: "i"
        label: "YouTube Premium"
      - id: "j"
        label: "None of these"
  - id: q4
    prompt: "How do you most often pay for your subscriptions?"
    type: single_choice
    construct: most_often_pay_subscriptions
    required: true
    options:
      - id: "a"
        label: "Credit card"
      - id: "b"
        label: "Debit card"
      - id: "c"
        label: "PayPal or a digital wallet"
      - id: "d"
        label: "App store billing (Apple, Google)"
      - id: "e"
        label: "Directly from my bank account"
      - id: "f"
        label: "A mix of methods"
  - id: q5
    prompt: "How closely do you track your total subscription spending?"
    type: single_choice
    construct: closely_track_total_subscription_spendin
    required: true
    options:
      - id: "a"
        label: "Very closely — I know the exact total"
      - id: "b"
        label: "Somewhat — I have a rough idea"
      - id: "c"
        label: "Not very closely"
      - id: "d"
        label: "I don't track it at all"
  - id: q6
    prompt: "In the past 12 months, have you discovered a subscription you forgot you were paying for?"
    type: single_choice
    construct: past_12_months_have_discovered
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not sure"
  - id: q7
    prompt: "In the past 12 months, how many subscriptions have you canceled? Enter a number (enter 0 if none)."
    type: free_text
    construct: past_12_months_many_subscriptions
    required: true
  - id: q8
    prompt: "What are the most common reasons you cancel a subscription? (Select all that apply)"
    type: multi_choice
    construct: most_common_reasons_cancel_subscription
    required: true
    options:
      - id: "a"
        label: "Too expensive"
      - id: "b"
        label: "I wasn't using it enough"
      - id: "c"
        label: "A price increase"
      - id: "d"
        label: "Found a better or cheaper alternative"
      - id: "e"
        label: "Finished the content I wanted"
      - id: "f"
        label: "Poor quality or service"
      - id: "g"
        label: "Too many subscriptions overall"
      - id: "h"
        label: "Not applicable"
  - id: q9
    prompt: "How much do you agree with the following statement: I get good value for what I spend on subscriptions."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
