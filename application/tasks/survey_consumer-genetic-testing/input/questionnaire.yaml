schemaVersion: "1.0"
id: consumer_genetic_testing_v1
title: "Consumer Genetic Testing Survey"
description: "Consumer use of and attitudes toward at-home DNA and genetic testing kits."
questions:
  - id: q0
    prompt: "Have you ever taken an at-home consumer DNA or genetic test?"
    type: single_choice
    construct: have_ever_taken_home_consumer
    required: true
    options:
      - id: "a"
        label: "Yes, more than one"
      - id: "b"
        label: "Yes, one"
      - id: "c"
        label: "No, but I'm interested"
      - id: "d"
        label: "No, and I'm undecided"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "Which companies' tests have you used or considered? (Select all that apply)"
    type: multi_choice
    construct: companies_tests_have_used_considered
    required: true
    options:
      - id: "a"
        label: "AncestryDNA"
      - id: "b"
        label: "23andMe"
      - id: "c"
        label: "MyHeritage DNA"
      - id: "d"
        label: "A test ordered through a doctor"
      - id: "e"
        label: "Another consumer brand"
      - id: "f"
        label: "None"
  - id: q2
    prompt: "What did you mainly want to learn from the test? (Select all that apply)"
    type: multi_choice
    construct: did_mainly_want_learn_from
    required: true
    options:
      - id: "a"
        label: "My ancestry or ethnicity"
      - id: "b"
        label: "Finding or connecting with relatives"
      - id: "c"
        label: "Health or disease risk information"
      - id: "d"
        label: "Traits (like taste or sleep tendencies)"
      - id: "e"
        label: "Guidance on diet or fitness"
      - id: "f"
        label: "Just curiosity"
      - id: "g"
        label: "Not applicable"
  - id: q3
    prompt: "What first prompted you to take (or consider) a test?"
    type: single_choice
    construct: first_prompted_take_consider_test
    required: true
    options:
      - id: "a"
        label: "Personal curiosity"
      - id: "b"
        label: "A gift"
      - id: "c"
        label: "Family history questions"
      - id: "d"
        label: "Advertising or a promotion"
      - id: "e"
        label: "A friend or relative took one"
      - id: "f"
        label: "A doctor suggested it"
      - id: "g"
        label: "Other"
  - id: q4
    prompt: "About how much did you pay for your most recent test? Please enter a dollar amount (enter 0 if not applicable)."
    type: free_text
    construct: much_did_pay_most_recent
    required: true
  - id: q5
    prompt: "How long ago did you take your most recent test?"
    type: single_choice
    construct: long_ago_did_take_most
    required: true
    options:
      - id: "a"
        label: "Within the past year"
      - id: "b"
        label: "1 to 3 years ago"
      - id: "c"
        label: "3 to 5 years ago"
      - id: "d"
        label: "More than 5 years ago"
      - id: "e"
        label: "Not applicable"
  - id: q6
    prompt: "Which results or features did you receive or use? (Select all that apply)"
