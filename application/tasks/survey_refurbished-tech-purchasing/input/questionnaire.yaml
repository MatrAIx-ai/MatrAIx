schemaVersion: "1.0"
id: refurbished_tech_purchasing_v1
title: "Refurbished & Used Tech Purchasing Survey"
description: "How consumers approach buying refurbished, certified pre-owned, and used technology — the categories, marketplaces, trust, and trade-offs involved."
questions:
  - id: q0
    prompt: "Have you ever bought refurbished or used tech (phones, laptops, tablets, etc.)?"
    type: single_choice
    construct: have_ever_bought_refurbished_used
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I would consider it"
      - id: "d"
        label: "No, and I would not consider it"
  - id: q1
    prompt: "How often do you buy refurbished or used rather than brand-new tech?"
    type: single_choice
    construct: often_buy_refurbished_used_rather
    required: true
    options:
      - id: "a"
        label: "Almost always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q2
    prompt: "Which categories have you bought refurbished or used? (Select all that apply)"
    type: multi_choice
    construct: categories_have_bought_refurbished_used
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop"
      - id: "c"
        label: "Desktop computer"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Headphones or earbuds"
      - id: "f"
        label: "Smartwatch or wearable"
      - id: "g"
        label: "Gaming console"
      - id: "h"
        label: "Monitor"
      - id: "i"
        label: "Camera"
      - id: "j"
        label: "Networking gear (router, etc.)"
      - id: "k"
        label: "None yet"
  - id: q3
    prompt: "Where do you buy refurbished or used tech? (Select all that apply)"
    type: multi_choice
    construct: where_buy_refurbished_used_tech
    required: true
    options:
      - id: "a"
        label: "Manufacturer certified refurbished store (Apple, Samsung, etc.)"
      - id: "b"
        label: "Amazon Renewed"
      - id: "c"
        label: "Back Market"
      - id: "d"
        label: "eBay"
      - id: "e"
        label: "Swappa"
      - id: "f"
        label: "Gazelle / Decluttr"
      - id: "g"
        label: "Best Buy or another retailer's open-box section"
      - id: "h"
        label: "Facebook Marketplace / Craigslist / local"
      - id: "i"
        label: "A carrier's certified pre-owned program"
      - id: "j"
        label: "Friends or family"
  - id: q4
    prompt: "Which source do you trust most for refurbished tech?"
    type: single_choice
    construct: source_trust_most_refurbished_tech
    required: true
    options:
      - id: "a"
        label: "Manufacturer certified refurbished"
      - id: "b"
        label: "A major retailer's refurbished program"
      - id: "c"
        label: "A dedicated marketplace (Back Market, Swappa, etc.)"
      - id: "d"
        label: "eBay with buyer protection"
      - id: "e"
        label: "Local / person-to-person sale"
      - id: "f"
        label: "I do not really trust any of them"
