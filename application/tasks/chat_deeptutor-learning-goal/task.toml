version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/chat-deeptutor-learning-goal"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "education"
tags = [
  "tutoring",
  "personalized learning",
  "explanation adaptation",
  "multi turn chat",
  "real open-source product",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-api-sidecar_deeptutor"
build_timeout_sec = 1800.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
