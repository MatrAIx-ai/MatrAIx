schemaVersion: "1.0"
id: accessibility_feature_usage_v1
title: "Accessibility Feature Usage Survey"
description: "How people use built-in accessibility features across their devices and apps, and how well those features meet their needs and preferences."
questions:
  - id: q0
    prompt: "Do you use any built-in accessibility features on your devices?"
    type: single_choice
    construct: use_any_built_accessibility_features
    required: true
    options:
      - id: "a"
        label: "Yes, several of them"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "No, but I know they exist"
      - id: "d"
        label: "No, and I am not familiar with them"
  - id: q1
    prompt: "Which accessibility features do you use? (Select all that apply)"
    type: multi_choice
    construct: accessibility_features_use_select_all
    required: true
    options:
      - id: "a"
        label: "Larger text or display size"
      - id: "b"
        label: "Bold or high-contrast text"
      - id: "c"
        label: "Dark mode"
      - id: "d"
        label: "Screen reader (VoiceOver, TalkBack, Narrator)"
      - id: "e"
        label: "Screen magnifier or zoom"
      - id: "f"
        label: "Captions or subtitles"
      - id: "g"
        label: "Live captions / real-time transcription"
      - id: "h"
        label: "Voice control or dictation"
      - id: "i"
        label: "Color filters or color correction"
      - id: "j"
        label: "Reduce motion / reduce animations"
      - id: "k"
        label: "One-handed or reachability mode"
      - id: "l"
        label: "Haptic or vibration cues"
  - id: q2
    prompt: "On which devices do you use accessibility features? (Select all that apply)"
    type: multi_choice
    construct: devices_use_accessibility_features_selec
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Tablet"
      - id: "c"
        label: "Laptop or desktop"
      - id: "d"
        label: "Smart TV or streaming device"
      - id: "e"
        label: "Smartwatch or wearable"
      - id: "f"
        label: "Smart speaker / voice assistant"
      - id: "g"
        label: "E-reader"
  - id: q3
    prompt: "Which accessibility feature do you rely on most?"
    type: single_choice
    construct: accessibility_feature_rely_most
    required: true
    options:
      - id: "a"
        label: "Larger text / display size"
      - id: "b"
        label: "Dark mode"
      - id: "c"
        label: "Captions or subtitles"
      - id: "d"
        label: "Screen reader"
      - id: "e"
        label: "Voice control or dictation"
      - id: "f"
        label: "Zoom or magnifier"
      - id: "g"
        label: "Color adjustments"
      - id: "h"
        label: "Reduce motion"
      - id: "i"
        label: "I do not rely on any one in particular"
  - id: q4
    prompt: "Why do you use accessibility features? (Select all that apply)"
    type: multi_choice
    construct: why_use_accessibility_features_select
    required: true
    options:
      - id: "a"
        label: "Vision-related needs"
      - id: "b"
        label: "Hearing-related needs"
      - id: "c"
        label: "Motor or dexterity needs"
      - id: "d"
        label: "Attention or reading preferences"
      - id: "e"
        label: "Situational reasons (bright sun, noisy room, driving)"
      - id: "f"
        label: "Comfort and eye strain"
      - id: "g"
        label: "Personal preference, not a specific need"
  - id: q5
    prompt: "Select your top 3 most valuable accessibility features to you. (Select all that apply)"
    type: multi_choice
    construct: select_top_3_most_valuable
    required: true
    options:
      - id: "a"
        label: "Larger text"
      - id: "b"
        label: "Dark mode"
      - id: "c"
        label: "Captions / subtitles"
      - id: "d"
        label: "Screen reader"
      - id: "e"
        label: "Voice control / dictation"
      - id: "f"
        label: "Zoom / magnifier"
      - id: "g"
        label: "Color adjustments"
      - id: "h"
        label: "Reduce motion"
  - id: q6
    prompt: "How did you first discover the accessibility features you use? (Select all that apply)"
    type: multi_choice
    construct: did_first_discover_accessibility_feature
    required: true
    options:
      - id: "a"
        label: "Explored device settings myself"
      - id: "b"
        label: "A friend or family member showed me"
      - id: "c"
        label: "Online tutorial or video"
      - id: "d"
        label: "Device setup prompted me"
      - id: "e"
        label: "A support article or help center"
      - id: "f"
        label: "Recommended by a professional"
      - id: "g"
        label: "I do not remember"
  - id: q7
    prompt: "How often do you use captions or subtitles when watching video?"
    type: single_choice
    construct: often_use_captions_subtitles_when
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q8
    prompt: "How often do you use voice control or dictation?"
    type: single_choice
    construct: often_use_voice_control_dictation
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q9
    prompt: "Which platform do you find has the best accessibility features?"
    type: single_choice
    construct: platform_find_has_best_accessibility
    required: true
    options:
      - id: "a"
        label: "Apple (iOS / macOS)"
      - id: "b"
        label: "Android"
      - id: "c"
        label: "Windows"
      - id: "d"
        label: "Other"
      - id: "e"
        label: "I have no clear preference"
  - id: q10
    prompt: "How much do you agree: Accessibility features make my devices easier to use."
    type: single_choice
    construct: much_agree_accessibility_features_make
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "How much do you agree: Accessibility settings are easy to find on my devices."
    type: single_choice
    construct: much_agree_accessibility_settings_easy
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree: I wish more apps supported accessibility features well."
    type: single_choice
    construct: much_agree_i_wish_more
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree: Accessibility features have become useful to everyone, not only people with disabilities."
    type: single_choice
    construct: much_agree_accessibility_features_have
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree: I would like devices to suggest helpful accessibility settings to me."
    type: single_choice
    construct: much_agree_i_would_like
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How satisfied are you with accessibility on: Your smartphone."
    type: single_choice
    construct: satisfied_accessibility_smartphone
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "Not applicable"
  - id: q16
    prompt: "How satisfied are you with accessibility on: Your computer."
    type: single_choice
    construct: satisfied_accessibility_computer
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "Not applicable"
  - id: q17
    prompt: "How satisfied are you with accessibility on: Websites and web apps."
    type: single_choice
    construct: satisfied_accessibility_websites_web_app
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "Not applicable"
  - id: q18
    prompt: "How satisfied are you with accessibility on: Streaming and video services."
    type: single_choice
    construct: satisfied_accessibility_streaming_video_
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "Not applicable"
  - id: q19
    prompt: "How important is it to you that a new app or device is accessible before you adopt it?"
    type: single_choice
    construct: important_it_that_new_app
    required: true
    options:
      - id: "a"
        label: "Not at all important"
      - id: "b"
        label: "Slightly important"
      - id: "c"
        label: "Moderately important"
      - id: "d"
        label: "Very important"
      - id: "e"
        label: "Extremely important"
  - id: q20
    prompt: "How often do you run into apps or websites that work poorly with the accessibility features you use?"
    type: single_choice
    construct: often_run_into_apps_websites
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Very often"
  - id: q21
    prompt: "Have you ever stopped using an app or service because of poor accessibility?"
    type: single_choice
    construct: have_ever_stopped_using_app
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q22
    prompt: "Do you customize accessibility settings beyond the defaults (shortcuts, gestures, profiles)?"
    type: single_choice
    construct: customize_accessibility_settings_beyond_
    required: true
    options:
      - id: "a"
        label: "Yes, extensively"
      - id: "b"
        label: "Yes, a little"
      - id: "c"
        label: "No, I use defaults"
      - id: "d"
        label: "I did not know I could"
  - id: q23
    prompt: "How has your use of accessibility features changed over the past two years?"
    type: single_choice
    construct: has_use_accessibility_features_changed
    required: true
    options:
      - id: "a"
        label: "Increased a lot"
      - id: "b"
        label: "Increased somewhat"
      - id: "c"
        label: "Stayed about the same"
      - id: "d"
        label: "Decreased somewhat"
      - id: "e"
        label: "Decreased a lot"
  - id: q24
    prompt: "Roughly how many distinct accessibility features do you use across your devices? Enter a number."
    type: free_text
    construct: roughly_many_distinct_accessibility_feat
    required: true
  - id: q25
    prompt: "About how many years have you been using accessibility features? Enter a number."
    type: free_text
    construct: many_years_have_been_using
    required: true
  - id: q26
    prompt: "Overall, how satisfied are you with the accessibility features available to you?"
    type: single_choice
    construct: overall_satisfied_accessibility_features
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
  - id: q27
    prompt: "How likely are you to recommend a device or app partly because of its accessibility? (0 = not at all likely, 10 = extremely likely)"
    type: single_choice
    construct: likely_recommend_device_app_partly
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4"
      - id: "f"
        label: "5"
      - id: "g"
        label: "6"
      - id: "h"
        label: "7"
      - id: "i"
        label: "8"
      - id: "j"
        label: "9"
      - id: "k"
        label: "10"
  - id: q28
    prompt: "Over the next year, how do you expect your use of accessibility features to change?"
    type: single_choice
    construct: over_next_year_expect_use
    required: true
    options:
      - id: "a"
        label: "Decrease a lot"
      - id: "b"
        label: "Decrease somewhat"
      - id: "c"
        label: "Stay about the same"
      - id: "d"
        label: "Increase somewhat"
      - id: "e"
        label: "Increase a lot"
  - id: q29
    prompt: "What accessibility improvement would help you the most? Please describe."
    type: free_text
    construct: accessibility_improvement_would_help_mos
    required: true
  - id: q30
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "Under 18"
      - id: "b"
        label: "18–24"
      - id: "c"
        label: "25–34"
      - id: "d"
        label: "35–44"
      - id: "e"
        label: "45–54"
      - id: "f"
        label: "55–64"
      - id: "g"
        label: "65 or older"
      - id: "h"
        label: "Prefer not to say"
  - id: q31
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
      - id: "a"
        label: "Woman"
      - id: "b"
        label: "Man"
      - id: "c"
        label: "Non-binary"
      - id: "d"
        label: "Prefer to self-describe"
      - id: "e"
        label: "Prefer not to say"
  - id: q32
    prompt: "Which best describes your race or ethnicity? (Select all that apply)"
    type: multi_choice
    construct: best_describes_race_ethnicity_select
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "Hispanic or Latino"
      - id: "d"
        label: "Asian"
      - id: "e"
        label: "Native American or Alaska Native"
      - id: "f"
        label: "Native Hawaiian or Pacific Islander"
      - id: "g"
        label: "Middle Eastern or North African"
      - id: "h"
        label: "Prefer not to say"
  - id: q33
    prompt: "What is the highest level of education you have completed?"
    type: single_choice
    construct: highest_level_education_have_completed
    required: true
    options:
      - id: "a"
        label: "High school or less"
      - id: "b"
        label: "Some college, no degree"
      - id: "c"
        label: "Associate degree"
      - id: "d"
        label: "Bachelor's degree"
      - id: "e"
        label: "Master's degree"
      - id: "f"
        label: "Doctoral or professional degree"
      - id: "g"
        label: "Prefer not to say"
  - id: q34
    prompt: "Which best describes your current employment status?"
    type: single_choice
    construct: best_describes_current_employment_status
    required: true
    options:
      - id: "a"
        label: "Employed full-time"
      - id: "b"
        label: "Employed part-time"
      - id: "c"
        label: "Self-employed or freelancer"
      - id: "d"
        label: "Student"
      - id: "e"
        label: "Not currently employed"
      - id: "f"
        label: "Retired"
      - id: "g"
        label: "Prefer not to say"
  - id: q35
    prompt: "Do you consider yourself a person with a disability or long-term condition?"
    type: single_choice
    construct: consider_yourself_person_disability_long
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Prefer not to say"
  - id: q36
    prompt: "What is your approximate annual household income (USD)?"
    type: single_choice
