schemaVersion: "1.0"
id: health_literacy_v1
title: "Health Literacy Survey"
description: "How confident and comfortable people are finding, understanding, and using health information."
questions:
  - id: q0
    prompt: "In general, how would you rate your ability to understand health information?"
    type: single_choice
    construct: general_would_rate_ability_understand
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q1
    prompt: "When you have a health question, where do you usually look first?"
    type: single_choice
    construct: when_have_health_question_where
    required: true
    options:
      - id: "a"
        label: "A doctor or health professional"
      - id: "b"
        label: "A general web search"
      - id: "c"
        label: "A trusted health website (Mayo Clinic, WebMD, MedlinePlus)"
      - id: "d"
        label: "Family or friends"
      - id: "e"
        label: "Social media or online videos"
      - id: "f"
        label: "A pharmacist"
      - id: "g"
        label: "Health apps or chatbots"
  - id: q2
    prompt: "How often do you look for health or medical information for yourself or others?"
    type: single_choice
    construct: often_look_health_medical_information
    required: true
    options:
