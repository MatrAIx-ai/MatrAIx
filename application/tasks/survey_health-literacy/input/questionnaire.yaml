      - id: "d"
        label: "General search engines"
      - id: "e"
        label: "Social media"
      - id: "f"
        label: "Online videos (YouTube, etc.)"
      - id: "g"
        label: "Friends and family"
      - id: "h"
        label: "Printed materials or brochures"
      - id: "i"
        label: "Health apps or AI assistants"
