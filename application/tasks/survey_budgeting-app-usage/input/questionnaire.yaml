schemaVersion: "1.0"
id: budgeting_app_usage_v1
title: "Budgeting App Usage Survey"
description: "How people use budgeting apps and digital tools to manage their spending."
questions:
  - id: q0
    prompt: "Do you currently use any app or digital tool to manage your budget or spending?"
    type: single_choice
    construct: currently_use_any_app_digital
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, I have never used one"
  - id: q1
    prompt: "How long have you used a budgeting app or tool?"
    type: single_choice
    construct: long_have_used_budgeting_app
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I do not use one"
  - id: q2
    prompt: "Which budgeting apps or tools do you currently use? (Select all that apply)"
    type: multi_choice
    construct: budgeting_apps_tools_currently_use
    required: true
    options:
      - id: "a"
        label: "YNAB (You Need A Budget)"
      - id: "b"
        label: "Monarch Money"
      - id: "c"
        label: "Rocket Money (formerly Truebill)"
      - id: "d"
        label: "EveryDollar"
      - id: "e"
        label: "Copilot"
      - id: "f"
        label: "PocketGuard"
      - id: "g"
        label: "Goodbudget"
      - id: "h"
        label: "A spreadsheet (Excel or Google Sheets)"
      - id: "i"
        label: "My bank's built-in budgeting feature"
      - id: "j"
        label: "I do not use a budgeting app"
  - id: q3
    prompt: "Which single tool do you rely on most for budgeting?"
    type: single_choice
    construct: single_tool_rely_most_budgeting
    required: true
    options:
      - id: "a"
        label: "A dedicated budgeting app"
      - id: "b"
        label: "My bank's built-in tool"
      - id: "c"
        label: "A spreadsheet"
      - id: "d"
        label: "Pen and paper"
      - id: "e"
        label: "I do not budget with a tool"
  - id: q4
    prompt: "Do you pay for a premium or subscription budgeting app?"
    type: single_choice
    construct: pay_premium_subscription_budgeting_app
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, I use only free tools"
      - id: "c"
        label: "I used to pay but stopped"
      - id: "d"
        label: "Not applicable"
  - id: q5
    prompt: "About how much do you pay per year for budgeting apps or tools? Please enter a dollar amount (enter 0 if free)."
    type: free_text
    construct: much_pay_per_year_budgeting
    required: true
  - id: q6
    prompt: "How often do you open or check your budgeting app?"
    type: single_choice
    construct: often_open_check_budgeting_app
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Do you link your bank and card accounts to your budgeting app?"
    type: single_choice
    construct: link_bank_card_accounts_budgeting
    required: true
    options:
      - id: "a"
        label: "Yes, all or most of them"
      - id: "b"
        label: "Yes, some of them"
      - id: "c"
        label: "No, I enter transactions manually"
      - id: "d"
        label: "I do not use a budgeting app"
  - id: q8
    prompt: "Which features of your budgeting app do you use? (Select all that apply)"
    type: multi_choice
    construct: features_budgeting_app_use_select
    required: true
    options:
      - id: "a"
        label: "Setting monthly spending categories"
      - id: "b"
        label: "Tracking transactions automatically"
      - id: "c"
        label: "Bill reminders or due-date alerts"
      - id: "d"
        label: "Savings goals"
      - id: "e"
        label: "Subscription tracking or cancellation"
      - id: "f"
        label: "Debt payoff tracking"
      - id: "g"
        label: "Credit score monitoring"
      - id: "h"
        label: "Spending reports and charts"
      - id: "i"
        label: "I do not use a budgeting app"
  - id: q9
    prompt: "What budgeting method do you follow?"
    type: single_choice
    construct: budgeting_method_follow
    required: true
    options:
      - id: "a"
        label: "Zero-based budget (every dollar assigned)"
      - id: "b"
        label: "50/30/20 rule"
      - id: "c"
        label: "Envelope or category limits"
      - id: "d"
        label: "Just tracking spending without strict limits"
      - id: "e"
        label: "No particular method"
      - id: "f"
        label: "I do not budget"
  - id: q10
    prompt: "Which types of spending do you track most closely? (Select all that apply)"
    type: multi_choice
    construct: types_spending_track_most_closely
    required: true
    options:
      - id: "a"
        label: "Groceries and food"
      - id: "b"
        label: "Dining out and takeout"
      - id: "c"
        label: "Subscriptions and memberships"
      - id: "d"
        label: "Shopping and discretionary purchases"
      - id: "e"
        label: "Bills and utilities"
      - id: "f"
        label: "Transportation and gas"
      - id: "g"
        label: "Entertainment"
      - id: "h"
        label: "I do not track spending categories"
  - id: q11
    prompt: "How did you first find your budgeting app? (Select all that apply)"
    type: multi_choice
    construct: did_first_find_budgeting_app
    required: true
    options:
      - id: "a"
        label: "App store search"
      - id: "b"
        label: "Recommendation from friends or family"
      - id: "c"
        label: "Social media or an online creator"
      - id: "d"
        label: "News article or review"
      - id: "e"
        label: "My bank suggested it"
      - id: "f"
        label: "An ad"
      - id: "g"
        label: "Not applicable"
  - id: q12
    prompt: "How much do you agree or disagree: Using a budgeting app has improved my spending habits."
    type: single_choice
    construct: much_agree_disagree_using_budgeting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: My budgeting app is easy to use."
    type: single_choice
    construct: much_agree_disagree_my_budgeting
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I trust my budgeting app to keep my financial data secure."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: I often forget to check or update my budget."
