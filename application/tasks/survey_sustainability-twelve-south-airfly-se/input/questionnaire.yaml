schemaVersion: "1.0"
id: sustainability_v1
title: "Sustainability Concern Survey — Twelve South AirFly SE"
description: "How much environmental and ethical factors shape the persona's view of this product. This edition asks about Twelve South AirFly SE from Twelve South."
questions:
  - id: q_eco_matters
    prompt: "A product's environmental impact affects whether I buy it."
    type: likert
    construct: eco_importance
    required: true
    minValue: 1
    maxValue: 5
  - id: q_pay_green
    prompt: "I would pay more for a more sustainable version of the Twelve South AirFly SE."
    type: likert
    construct: green_premium
    required: true
    minValue: 1
    maxValue: 5
  - id: q_eco_factor
    prompt: "Which sustainability factor matters most to you here?"
    type: single_choice
    construct: eco_factor
    required: true
    options:
      - id: "materials"
        label: "Materials used."
      - id: "packaging"
        label: "Packaging waste."
      - id: "longevity"
        label: "How long it lasts."
      - id: "ethics"
        label: "Ethical manufacturing."
      - id: "none"
        label: "None of these matter to me."
  - id: q_eco_note
    prompt: "What, if anything, would make you feel better about the Twelve South AirFly SE's impact?"
    type: free_text
    construct: eco_reassurance
    required: true
