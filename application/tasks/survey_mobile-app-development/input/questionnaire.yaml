schemaVersion: "1.0"
id: mobile_app_development_v1
title: "Mobile App Development Survey"
description: "How people build mobile apps: the platforms, frameworks, tooling, distribution, and practices they use and their satisfaction with them."
questions:
  - id: q0
    prompt: "Which best describes your involvement in mobile app development?"
    type: single_choice
    construct: best_describes_involvement_mobile_app
    required: true
    options:
      - id: "a"
        label: "Professional mobile developer (main job)"
      - id: "b"
        label: "Developer who sometimes builds mobile apps"
      - id: "c"
        label: "Freelancer / agency building apps for clients"
      - id: "d"
        label: "Indie developer publishing my own apps"
      - id: "e"
        label: "Student learning mobile development"
      - id: "f"
        label: "Hobbyist"
      - id: "g"
        label: "I don't build mobile apps"
  - id: q1
    prompt: "How many years have you been building mobile apps?"
    type: free_text
    construct: many_years_have_been_building
    required: true
  - id: q2
    prompt: "Which platforms do you build for? (Select all that apply)"
    type: multi_choice
    construct: platforms_build_select_all_that
    required: true
    options:
      - id: "a"
        label: "iOS / iPadOS"
      - id: "b"
        label: "Android"
      - id: "c"
        label: "Cross-platform (both from one codebase)"
      - id: "d"
        label: "Wear OS / watchOS"
      - id: "e"
        label: "Mobile web / PWA"
      - id: "f"
        label: "Other (TV, foldables, etc.)"
  - id: q3
    prompt: "What is your main development approach?"
    type: single_choice
    construct: main_development_approach
    required: true
    options:
      - id: "a"
        label: "Native (separate iOS and Android codebases)"
      - id: "b"
        label: "Cross-platform framework (one codebase)"
      - id: "c"
        label: "Progressive web app / hybrid web"
      - id: "d"
        label: "Low-code / no-code app builder"
      - id: "e"
        label: "Mix of approaches"
  - id: q4
    prompt: "Which frameworks or languages do you use for mobile development? (Select all that apply)"
    type: multi_choice
    construct: frameworks_languages_use_mobile_developm
    required: true
    options:
      - id: "a"
        label: "Swift / SwiftUI (iOS)"
      - id: "b"
        label: "UIKit / Objective-C (iOS)"
      - id: "c"
        label: "Kotlin (Android)"
      - id: "d"
        label: "Jetpack Compose (Android)"
      - id: "e"
        label: "Java (Android)"
      - id: "f"
        label: "Flutter (Dart)"
      - id: "g"
        label: "React Native"
      - id: "h"
        label: ".NET MAUI / Xamarin"
      - id: "i"
        label: "Ionic / Capacitor"
      - id: "j"
        label: "Unity (games)"
      - id: "k"
        label: "Kotlin Multiplatform"
      - id: "l"
        label: "Other"
