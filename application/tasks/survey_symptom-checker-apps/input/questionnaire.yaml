schemaVersion: "1.0"
id: symptom_checker_apps_v1
title: "Symptom Checker Apps Survey"
description: "How consumers use, trust, and evaluate online symptom checkers and health self-assessment tools."
questions:
  - id: q0
    prompt: "Have you ever used an online symptom checker or health self-assessment tool?"
    type: single_choice
    construct: have_ever_used_online_symptom
    required: true
    options:
      - id: "a"
        label: "Yes, many times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I've heard of them"
      - id: "e"
        label: "No, and I haven't heard of them"
  - id: q1
    prompt: "How did you first learn about symptom checkers?"
    type: single_choice
    construct: did_first_learn_symptom_checkers
    required: true
    options:
      - id: "a"
        label: "A web search"
      - id: "b"
        label: "An app store"
      - id: "c"
        label: "Social media or ads"
      - id: "d"
        label: "Friends or family"
      - id: "e"
        label: "A doctor or health provider"
      - id: "f"
        label: "A news article"
      - id: "g"
        label: "I don't remember"
  - id: q2
    prompt: "In the past 12 months, about how often have you used a symptom checker?"
    type: single_choice
    construct: past_12_months_often_have
    required: true
    options:
      - id: "a"
        label: "Weekly or more"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "A few times"
      - id: "d"
        label: "Once"
      - id: "e"
        label: "Not at all"
  - id: q3
    prompt: "Which symptom checkers or tools have you used? (Select all that apply)"
    type: multi_choice
    construct: symptom_checkers_tools_have_used
    required: true
    options:
      - id: "a"
        label: "WebMD Symptom Checker"
      - id: "b"
        label: "Mayo Clinic app or website"
      - id: "c"
        label: "Ada"
      - id: "d"
        label: "Buoy Health"
      - id: "e"
        label: "K Health"
      - id: "f"
        label: "A general web search (Google, etc.)"
      - id: "g"
        label: "An AI chatbot (ChatGPT, etc.)"
      - id: "h"
        label: "My health plan or provider's tool"
      - id: "i"
        label: "None of these"
  - id: q4
    prompt: "What device do you most often use for symptom checkers?"
    type: single_choice
    construct: device_most_often_use_symptom
    required: true
    options:
      - id: "a"
        label: "Smartphone app"
      - id: "b"
        label: "Smartphone web browser"
      - id: "c"
        label: "Computer or laptop"
      - id: "d"
        label: "Tablet"
      - id: "e"
        label: "Smart speaker or voice assistant"
  - id: q5
    prompt: "For whom do you usually use a symptom checker? (Select all that apply)"
    type: multi_choice
    construct: whom_usually_use_symptom_checker
    required: true
    options:
      - id: "a"
        label: "Myself"
      - id: "b"
        label: "My spouse or partner"
      - id: "c"
        label: "My child or dependent"
      - id: "d"
        label: "A parent or older relative"
      - id: "e"
        label: "A friend"
      - id: "f"
        label: "General curiosity, not a specific person"
  - id: q6
    prompt: "What usually prompts you to use a symptom checker? (Select all that apply)"
    type: multi_choice
    construct: usually_prompts_use_symptom_checker
    required: true
    options:
      - id: "a"
        label: "A new or unfamiliar symptom"
      - id: "b"
        label: "Deciding whether to see a doctor"
      - id: "c"
        label: "Wanting reassurance"
      - id: "d"
        label: "A minor illness like a cold"
      - id: "e"
        label: "Before or after a doctor's appointment"
      - id: "f"
        label: "Curiosity about a health topic"
      - id: "g"
        label: "Deciding on an over-the-counter remedy"
  - id: q7
    prompt: "After using a symptom checker, what do you usually do next? (Select all that apply)"
    type: multi_choice
    construct: after_using_symptom_checker_usually
    required: true
    options:
      - id: "a"
        label: "Wait and monitor how I feel"
      - id: "b"
        label: "Try a home or over-the-counter remedy"
      - id: "c"
        label: "Schedule a doctor's appointment"
      - id: "d"
        label: "Use telehealth"
      - id: "e"
        label: "Call a nurse line"
      - id: "f"
        label: "Search for more information"
      - id: "g"
        label: "Nothing in particular"
