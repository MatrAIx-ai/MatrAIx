schemaVersion: "1.0"
id: credit_card_debt_v1
title: "Credit Card Debt Survey"
description: "How people carry, manage, and pay down revolving credit card debt."
questions:
  - id: q0
    prompt: "Do you currently carry a balance on any credit card from month to month?"
    type: single_choice
    construct: currently_carry_balance_any_credit
    required: true
    options:
      - id: "a"
        label: "Yes, on one card"
      - id: "b"
        label: "Yes, on multiple cards"
      - id: "c"
        label: "No, I pay my balance in full each month"
      - id: "d"
        label: "I don't have a credit card"
  - id: q1
    prompt: "About how long have you been carrying credit card debt?"
    type: single_choice
    construct: long_have_been_carrying_credit
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't carry credit card debt"
  - id: q2
    prompt: "On how many credit cards do you currently carry a balance?"
    type: single_choice
    construct: many_credit_cards_currently_carry
    required: true
    options:
      - id: "a"
        label: "0"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3 to 4"
      - id: "e"
        label: "5 or more"
  - id: q3
    prompt: "What primarily caused your current credit card debt? (Select all that apply)"
    type: multi_choice
    construct: primarily_caused_current_credit_card
    required: true
    options:
      - id: "a"
        label: "Everyday living expenses"
      - id: "b"
        label: "A medical bill or emergency"
      - id: "c"
        label: "Car or home repairs"
      - id: "d"
        label: "A job loss or income drop"
      - id: "e"
        label: "Large one-time purchases"
      - id: "f"
        label: "Travel or vacation"
      - id: "g"
        label: "Helping family members"
      - id: "h"
        label: "Overspending / lifestyle"
      - id: "i"
        label: "Not applicable — I have no credit card debt"
  - id: q4
    prompt: "How do you usually pay your credit card bill?"
    type: single_choice
    construct: usually_pay_credit_card_bill
    required: true
    options:
      - id: "a"
        label: "I pay the full statement balance"
      - id: "b"
        label: "I pay more than the minimum but not in full"
      - id: "c"
        label: "I pay only the minimum"
      - id: "d"
        label: "I sometimes miss or make partial payments"
  - id: q5
    prompt: "Roughly what interest rate (APR) are you paying on your credit card debt?"
    type: single_choice
    construct: roughly_interest_rate_apr_paying
    required: true
    options:
      - id: "a"
        label: "Under 15%"
      - id: "b"
        label: "15% to 19.9%"
      - id: "c"
        label: "20% to 24.9%"
      - id: "d"
        label: "25% or higher"
      - id: "e"
        label: "0% promotional rate"
      - id: "f"
        label: "I'm not sure"
  - id: q6
    prompt: "How well do you know your total credit card balance at any given time?"
    type: single_choice
    construct: well_know_total_credit_card
    required: true
    options:
      - id: "a"
        label: "I know it exactly"
      - id: "b"
        label: "I know it approximately"
      - id: "c"
        label: "I have a rough idea"
      - id: "d"
        label: "I try not to think about it"
  - id: q7
    prompt: "Which strategies are you using to pay down your credit card debt? (Select all that apply)"
    type: multi_choice
    construct: strategies_using_pay_down_credit
    required: true
    options:
      - id: "a"
        label: "Debt avalanche (highest interest first)"
      - id: "b"
        label: "Debt snowball (smallest balance first)"
      - id: "c"
        label: "Balance transfer to a 0% APR card"
      - id: "d"
        label: "A personal / debt consolidation loan"
      - id: "e"
        label: "Paying more than the minimum when I can"
      - id: "f"
        label: "Working with a credit counseling agency"
      - id: "g"
        label: "Cutting expenses to free up money"
      - id: "h"
        label: "Taking on extra income / side work"
      - id: "i"
        label: "I'm not actively paying it down"
  - id: q8
    prompt: "Have you used a balance transfer to move debt to a lower-rate card?"
    type: single_choice
    construct: have_used_balance_transfer_move
    required: true
    options:
      - id: "a"
        label: "Yes, currently have one active"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I've considered it"
      - id: "d"
        label: "No"
  - id: q9
    prompt: "How confident are you in your plan to pay off your credit card debt?"
    type: single_choice
    construct: confident_plan_pay_off_credit
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Extremely confident — or I have no debt"
  - id: q10
    prompt: "How long do you expect it to take to pay off your current credit card debt?"
    type: single_choice
    construct: long_expect_it_take_pay
    required: true
    options:
      - id: "a"
        label: "Within 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I don't have a timeline"
      - id: "f"
        label: "Not applicable — no debt"
  - id: q11
    prompt: "In the past 12 months, have you missed or been late on a credit card payment?"
    type: single_choice
    construct: past_12_months_have_missed
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not applicable"
  - id: q12
    prompt: "How much do you agree with the following statement: My credit card debt causes me significant stress."
    type: single_choice
    construct: much_agree_following_statement_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I have a clear plan to pay off my credit card debt."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Credit card interest makes it hard to get ahead."
    type: single_choice
    construct: much_agree_following_statement_credit
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: I feel comfortable talking to others about my debt."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree with the following statement: I sometimes use credit cards to cover essentials I couldn't otherwise afford."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How often do you worry about your credit card debt?"
    type: single_choice
    construct: often_worry_credit_card_debt
    required: true
    options:
      - id: "a"
