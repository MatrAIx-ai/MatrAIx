      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q18
    prompt: "How often do you make more than the minimum payment?"
    type: single_choice
