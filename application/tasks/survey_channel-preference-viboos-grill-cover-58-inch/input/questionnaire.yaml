schemaVersion: "1.0"
id: channel_preference_v1
title: "Purchase Channel Preference Survey — Grill Cover"
description: "Where and how the persona would prefer to buy this product. This edition asks about Grill Cover from VIBOOS."
questions:
  - id: q_channel
    prompt: "Where would you prefer to buy the Grill Cover?"
    type: single_choice
    construct: channel
    required: true
    options:
      - id: "online_marketplace"
        label: "An online marketplace like Amazon."
      - id: "brand_site"
        label: "The brand's own website."
      - id: "physical_store"
        label: "A physical store in person."
      - id: "no_preference"
        label: "No preference."
  - id: q_online_reason
    prompt: "What matters most about where you buy it?"
    type: single_choice
    construct: channel_driver
    required: true
    askRationale: true
    options:
      - id: "price"
        label: "Best price."
      - id: "speed"
        label: "Fast delivery."
      - id: "trust"
        label: "A trusted seller."
      - id: "touch"
        label: "Being able to see it in person."
  - id: q_in_person_value
    prompt: "For the Grill Cover, seeing it in person before buying would matter to me."
    type: likert
    construct: in_person_value
    required: true
    minValue: 1
    maxValue: 5
