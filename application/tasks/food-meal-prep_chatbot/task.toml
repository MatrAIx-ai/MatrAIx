version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/food-meal-prep-chatbot"

[metadata]
difficulty = "easy"
type = "chatbot"
domain = "food"
tags = [ "food", "meal-prep", "cooking" ]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/shared-chat-sim"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
