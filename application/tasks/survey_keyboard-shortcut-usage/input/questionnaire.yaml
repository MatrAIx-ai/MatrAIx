schemaVersion: "1.0"
id: keyboard_shortcut_usage_v1
title: "Keyboard Shortcut Usage Survey"
description: "How people use keyboard shortcuts, hotkeys, macros, and related efficiency features across their software."
questions:
  - id: q0
    prompt: "How would you describe your use of keyboard shortcuts?"
    type: single_choice
    construct: would_describe_use_keyboard_shortcuts
    required: true
    options:
      - id: "a"
        label: "Power user — I use them constantly"
      - id: "b"
        label: "Frequent — I use many common ones"
      - id: "c"
        label: "Occasional — I know a handful"
      - id: "d"
        label: "Rare — I mostly use the mouse or touch"
      - id: "e"
        label: "I don't really use keyboard shortcuts"
  - id: q1
    prompt: "Which basic shortcuts do you use regularly? (Select all that apply)"
    type: multi_choice
    construct: basic_shortcuts_use_regularly_select
    required: true
    options:
      - id: "a"
        label: "Copy (Ctrl/Cmd+C)"
      - id: "b"
        label: "Paste (Ctrl/Cmd+V)"
      - id: "c"
        label: "Cut (Ctrl/Cmd+X)"
      - id: "d"
        label: "Undo (Ctrl/Cmd+Z)"
      - id: "e"
        label: "Save (Ctrl/Cmd+S)"
      - id: "f"
        label: "Find (Ctrl/Cmd+F)"
      - id: "g"
        label: "Select all (Ctrl/Cmd+A)"
      - id: "h"
        label: "Switch apps (Alt+Tab / Cmd+Tab)"
      - id: "i"
        label: "Close window/tab (Ctrl/Cmd+W)"
      - id: "j"
        label: "I don't use any of these"
  - id: q2
    prompt: "Which more advanced shortcuts or techniques do you use? (Select all that apply)"
    type: multi_choice
    construct: more_advanced_shortcuts_techniques_use
    required: true
    options:
      - id: "a"
        label: "Reopen closed browser tab"
      - id: "b"
        label: "Multiple desktops / virtual workspaces"
      - id: "c"
        label: "Screenshot shortcuts"
      - id: "d"
        label: "Window snapping / tiling"
      - id: "e"
        label: "Text navigation (word/line jumps)"
      - id: "f"
        label: "Spotlight / Start / launcher search"
      - id: "g"
        label: "Custom or remapped keys"
      - id: "h"
        label: "Command palette (e.g., in editors)"
      - id: "i"
        label: "Macros or text expansion"
      - id: "j"
        label: "None of these"
  - id: q3
    prompt: "In which types of applications do you rely most on keyboard shortcuts? (Select all that apply)"
    type: multi_choice
    construct: types_applications_rely_most_keyboard
    required: true
    options:
      - id: "a"
        label: "Web browser"
      - id: "b"
        label: "Office / documents"
      - id: "c"
        label: "Spreadsheets"
      - id: "d"
        label: "Email"
      - id: "e"
        label: "Code editor / IDE"
      - id: "f"
        label: "Design or creative software"
      - id: "g"
        label: "Operating system / window management"
      - id: "h"
        label: "Chat / messaging"
      - id: "i"
        label: "I don't rely on shortcuts in any app"
  - id: q4
    prompt: "About how many keyboard shortcuts would you estimate you know and use regularly?"
    type: single_choice
    construct: many_keyboard_shortcuts_would_estimate
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1-5"
      - id: "c"
        label: "6-15"
      - id: "d"
        label: "16-30"
      - id: "e"
        label: "31-50"
      - id: "f"
        label: "More than 50"
  - id: q5
    prompt: "How do you usually learn new keyboard shortcuts? (Select all that apply)"
    type: multi_choice
    construct: usually_learn_new_keyboard_shortcuts
    required: true
    options:
      - id: "a"
        label: "Menu hints next to commands"
      - id: "b"
        label: "Trial and error"
      - id: "c"
        label: "Online searches or cheat sheets"
      - id: "d"
        label: "Watching others / colleagues"
      - id: "e"
        label: "Tutorials or videos"
      - id: "f"
        label: "Tooltips or in-app tips"
      - id: "g"
        label: "I rarely learn new ones"
  - id: q6
    prompt: "Do you ever customize or remap keyboard shortcuts?"
    type: single_choice
    construct: ever_customize_remap_keyboard_shortcuts
    required: true
    options:
      - id: "a"
        label: "Yes, extensively"
      - id: "b"
        label: "Yes, a few"
      - id: "c"
        label: "No, but I'd like to"
      - id: "d"
        label: "No, I use defaults"
      - id: "e"
        label: "I didn't know you could"
  - id: q7
    prompt: "Do you use any text-expansion or macro tools (e.g., autocorrect snippets, AutoHotkey, TextExpander)?"
    type: single_choice
    construct: use_any_text_expansion_macro
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I've tried them"
      - id: "d"
        label: "No, but I'm interested"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q8
    prompt: "Which type of pointing vs. keyboard balance best describes you?"
    type: single_choice
    construct: type_pointing_vs_keyboard_balance
    required: true
    options:
      - id: "a"
        label: "Keyboard-first — I avoid the mouse when I can"
      - id: "b"
        label: "Mostly keyboard, mouse for some things"
      - id: "c"
        label: "A roughly even mix"
      - id: "d"
        label: "Mostly mouse/touch, keyboard for typing"
      - id: "e"
        label: "Almost entirely mouse or touch"
  - id: q9
    prompt: "How often do you look up a shortcut you don't remember?"
    type: single_choice
    construct: often_look_up_shortcut_don
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "Weekly"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q10
    prompt: "Approximately how many keyboard shortcuts do you use in a typical day?"
    type: free_text
    construct: approximately_many_keyboard_shortcuts_us
    required: true
  - id: q11
    prompt: "How much do you agree with the following statement: Keyboard shortcuts make me noticeably more productive."
    type: single_choice
    construct: much_agree_following_statement_keyboard
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: Learning new shortcuts is worth the effort."
    type: single_choice
    construct: much_agree_following_statement_learning
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I get frustrated when shortcuts differ between apps or platforms."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: I feel slowed down when I have to use only a mouse or touchscreen."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree with the following statement: Remembering lots of shortcuts is more trouble than it's worth."
    type: single_choice
    construct: much_agree_following_statement_rememberi
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How proficient are you with shortcuts in the following: your web browser?"
    type: single_choice
