schemaVersion: "1.0"
id: credit_card_rewards_v1
title: "Credit Card Rewards Survey"
description: "How people earn, choose, and redeem credit card rewards."
questions:
  - id: q0
    prompt: "Do you currently have at least one rewards credit card?"
    type: single_choice
    construct: currently_have_least_one_rewards
    required: true
    options:
      - id: "a"
        label: "Yes, one rewards card"
      - id: "b"
        label: "Yes, multiple rewards cards"
      - id: "c"
        label: "No, only a card with no rewards"
      - id: "d"
        label: "No, I don't have a credit card"
  - id: q1
    prompt: "How many credit cards do you have in total?"
    type: single_choice
    construct: many_credit_cards_have_total
    required: true
    options:
      - id: "a"
        label: "1"
      - id: "b"
        label: "2"
      - id: "c"
        label: "3 to 4"
      - id: "d"
        label: "5 to 7"
      - id: "e"
        label: "8 or more"
      - id: "f"
        label: "None"
  - id: q2
    prompt: "What type of rewards does your primary card earn?"
    type: single_choice
    construct: type_rewards_does_primary_card
    required: true
    options:
      - id: "a"
        label: "Cash back"
      - id: "b"
        label: "Travel points or miles"
      - id: "c"
        label: "Store or brand-specific rewards"
      - id: "d"
        label: "A general points program (e.g., Chase Ultimate Rewards, Amex Membership Rewards)"
      - id: "e"
        label: "My main card doesn't earn rewards"
  - id: q3
    prompt: "Which rewards cards or issuers do you currently use? (Select all that apply)"
    type: multi_choice
    construct: rewards_cards_issuers_currently_use
    required: true
    options:
      - id: "a"
        label: "Chase (Sapphire, Freedom, etc.)"
      - id: "b"
        label: "American Express"
      - id: "c"
        label: "Capital One (Venture, Savor, etc.)"
      - id: "d"
        label: "Citi (Double Cash, Custom Cash, etc.)"
      - id: "e"
        label: "Discover"
      - id: "f"
        label: "A store or co-branded card (Amazon, Target, airline, hotel)"
      - id: "g"
        label: "Bank of America or Wells Fargo"
      - id: "h"
        label: "A credit union card"
      - id: "i"
        label: "None"
  - id: q4
    prompt: "How did you choose your primary rewards card? (Select all that apply)"
    type: multi_choice
    construct: did_choose_primary_rewards_card
    required: true
    options:
      - id: "a"
        label: "Sign-up / welcome bonus"
      - id: "b"
        label: "High rewards rate in categories I spend on"
      - id: "c"
        label: "No annual fee"
      - id: "d"
        label: "Travel perks (lounge access, credits, status)"
      - id: "e"
        label: "Recommendation from friends or family"
      - id: "f"
        label: "Points transfer partners"
      - id: "g"
        label: "A points/miles blog or YouTube channel"
      - id: "h"
        label: "It matched a brand I use often"
  - id: q5
    prompt: "Does your primary rewards card charge an annual fee?"
    type: single_choice
    construct: does_primary_rewards_card_charge
    required: true
    options:
      - id: "a"
        label: "No annual fee"
      - id: "b"
        label: "Yes, under $100"
      - id: "c"
        label: "Yes, $100 to $250"
      - id: "d"
        label: "Yes, $251 to $550"
      - id: "e"
        label: "Yes, more than $550"
  - id: q6
    prompt: "In a typical month, how much of your spending goes on rewards credit cards?"
    type: single_choice
    construct: typical_month_much_spending_goes
    required: true
    options:
      - id: "a"
        label: "Almost none"
      - id: "b"
        label: "Less than a quarter"
      - id: "c"
        label: "About half"
      - id: "d"
        label: "Most of it"
      - id: "e"
        label: "Nearly all of it"
  - id: q7
    prompt: "How do you pay your credit card balance each month?"
    type: single_choice
    construct: pay_credit_card_balance_each
    required: true
    options:
      - id: "a"
        label: "I pay the full balance every month"
      - id: "b"
        label: "I usually pay in full but occasionally carry a balance"
      - id: "c"
        label: "I carry a balance most months"
      - id: "d"
        label: "I pay only the minimum"
  - id: q8
    prompt: "Which spending categories do you specifically use rewards cards to maximize? (Select all that apply)"
    type: multi_choice
    construct: spending_categories_specifically_use_rew
    required: true
    options:
      - id: "a"
        label: "Groceries"
      - id: "b"
        label: "Dining and restaurants"
      - id: "c"
        label: "Gas and transportation"
      - id: "d"
        label: "Travel (flights, hotels)"
      - id: "e"
        label: "Online shopping"
      - id: "f"
        label: "Streaming and subscriptions"
      - id: "g"
        label: "Everyday / everything else"
      - id: "h"
        label: "I don't optimize by category"
  - id: q9
    prompt: "How do you typically redeem your rewards?"
    type: single_choice
    construct: typically_redeem_rewards
    required: true
    options:
      - id: "a"
        label: "Statement credit or cash back"
      - id: "b"
        label: "Travel through the card's portal"
      - id: "c"
        label: "Transfer points to airline/hotel partners"
      - id: "d"
        label: "Gift cards"
      - id: "e"
        label: "Merchandise or shopping"
      - id: "f"
        label: "I let them accumulate and rarely redeem"
  - id: q10
    prompt: "In the past 12 months, have you opened a new card mainly for its sign-up bonus?"
    type: single_choice
    construct: past_12_months_have_opened
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I've considered it"
      - id: "d"
        label: "No"
  - id: q11
    prompt: "How often do you actively track or optimize your rewards earning?"
    type: single_choice
    construct: often_actively_track_optimize_rewards
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Constantly"
  - id: q12
    prompt: "How much do you agree with the following statement: Maximizing credit card rewards is worth the effort."
    type: single_choice
