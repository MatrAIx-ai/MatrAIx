schemaVersion: "1.0"
id: two_factor_authentication_v1
title: "Two-Factor Authentication Survey"
description: "How people adopt and use two-factor and multi-factor authentication to protect their online accounts."
questions:
  - id: q0
    prompt: "Do you use two-factor authentication (2FA), also called two-step verification, on any of your online accounts?"
    type: single_choice
    construct: use_two_factor_authentication_2fa
    required: true
    options:
      - id: "a"
        label: "Yes, on most or all of my important accounts"
      - id: "b"
        label: "Yes, on a few accounts"
      - id: "c"
        label: "No, but I know what it is"
      - id: "d"
        label: "No, and I'm not sure what it is"
  - id: q1
    prompt: "How long ago did you first start using two-factor authentication?"
    type: single_choice
    construct: long_ago_did_first_start
    required: true
    options:
      - id: "a"
        label: "Within the last 6 months"
      - id: "b"
        label: "6 months to 1 year ago"
      - id: "c"
        label: "1 to 3 years ago"
      - id: "d"
        label: "More than 3 years ago"
      - id: "e"
        label: "I don't use it"
  - id: q2
    prompt: "What first made you turn on two-factor authentication? (Select all that apply)"
    type: multi_choice
    construct: first_made_turn_two_factor
    required: true
    options:
      - id: "a"
        label: "An account of mine was hacked or breached"
      - id: "b"
        label: "A service required or strongly prompted me to"
      - id: "c"
        label: "My employer or school required it"
      - id: "d"
        label: "A friend or family member recommended it"
      - id: "e"
        label: "I read or watched something about security"
      - id: "f"
        label: "I wanted extra peace of mind"
      - id: "g"
        label: "I have never turned it on"
  - id: q3
    prompt: "Which two-factor authentication methods do you currently use? (Select all that apply)"
    type: multi_choice
    construct: two_factor_authentication_methods_curren
    required: true
    options:
      - id: "a"
        label: "Text message (SMS) codes"
      - id: "b"
        label: "Authenticator app codes (e.g., Google Authenticator, Authy, Microsoft Authenticator)"
      - id: "c"
        label: "Push approval prompts (e.g., \"Approve sign-in?\")"
      - id: "d"
        label: "Hardware security key (e.g., YubiKey)"
      - id: "e"
        label: "Biometrics (fingerprint or face)"
      - id: "f"
        label: "Email codes"
      - id: "g"
        label: "Backup codes"
      - id: "h"
        label: "Passkeys"
      - id: "i"
        label: "Phone-call codes"
      - id: "j"
        label: "I don't use two-factor authentication"
  - id: q4
    prompt: "Which authenticator app do you primarily use, if any?"
    type: single_choice
    construct: authenticator_app_primarily_use_if
    required: true
    options:
      - id: "a"
        label: "Google Authenticator"
      - id: "b"
        label: "Microsoft Authenticator"
      - id: "c"
        label: "Authy"
      - id: "d"
        label: "Duo Mobile"
      - id: "e"
        label: "Apple Passwords / iCloud built-in codes"
      - id: "f"
        label: "A password manager's built-in code generator"
      - id: "g"
        label: "Another authenticator app"
      - id: "h"
        label: "I don't use an authenticator app"
  - id: q5
    prompt: "On which types of accounts do you use two-factor authentication? (Select all that apply)"
    type: multi_choice
    construct: types_accounts_use_two_factor
    required: true
    options:
      - id: "a"
        label: "Email"
      - id: "b"
        label: "Banking or financial apps"
      - id: "c"
        label: "Social media"
      - id: "d"
        label: "Shopping or retail accounts"
      - id: "e"
        label: "Work or school accounts"
      - id: "f"
        label: "Cloud storage"
      - id: "g"
        label: "Gaming accounts"
      - id: "h"
        label: "Cryptocurrency or investing"
      - id: "i"
        label: "Password manager"
      - id: "j"
        label: "I don't use it anywhere"
  - id: q6
    prompt: "Roughly how many of your online accounts have two-factor authentication turned on? Enter a whole number."
    type: free_text
    construct: roughly_many_online_accounts_have
    required: true
  - id: q7
    prompt: "How often does entering a second verification code or approval feel like a hassle?"
    type: single_choice
    construct: often_does_entering_second_verification
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q8
    prompt: "Have you set up and saved backup or recovery codes for your important accounts?"
    type: single_choice
    construct: have_set_up_saved_backup
    required: true
    options:
      - id: "a"
        label: "Yes, for most of them"
      - id: "b"
        label: "Yes, for a few"
      - id: "c"
        label: "No, but I know I should"
      - id: "d"
        label: "No, and I hadn't thought about it"
      - id: "e"
        label: "I'm not sure"
  - id: q9
    prompt: "Where do you store your two-factor backup codes? (Select all that apply)"
    type: multi_choice
    construct: where_store_two_factor_backup
    required: true
    options:
      - id: "a"
        label: "In my password manager"
      - id: "b"
        label: "Written on paper in a safe place"
      - id: "c"
        label: "In a notes app or document"
      - id: "d"
        label: "Printed and stored with important papers"
      - id: "e"
        label: "I take a screenshot and keep it"
      - id: "f"
        label: "I don't store them anywhere"
      - id: "g"
        label: "Not applicable"
  - id: q10
    prompt: "Please rate your agreement: Two-factor authentication makes my accounts significantly more secure."
    type: single_choice
    construct: please_rate_agreement_two_factor
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q11
    prompt: "Please rate your agreement: The extra step of two-factor authentication is worth the added protection."
    type: single_choice
    construct: please_rate_agreement_extra_step
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "Please rate your agreement: I worry about getting locked out of an account if I lose my phone."
    type: single_choice
    construct: please_rate_agreement_i_worry
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "Please rate your agreement: Setting up two-factor authentication is confusing."
    type: single_choice
    construct: please_rate_agreement_setting_up
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "Please rate your agreement: I wish more of the services I use offered two-factor authentication."
    type: single_choice
    construct: please_rate_agreement_i_wish
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "Please rate your agreement: Text-message (SMS) codes are secure enough for my needs."
    type: single_choice
