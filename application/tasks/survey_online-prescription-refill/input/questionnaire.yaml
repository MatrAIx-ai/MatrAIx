schemaVersion: "1.0"
id: online_prescription_refill_v1
title: "Online Prescription Refill Survey"
description: "Consumer use of, experience with, and attitudes toward refilling prescriptions online or through apps."
questions:
  - id: q0
    prompt: "Do you currently take any prescription medications regularly?"
    type: single_choice
    construct: currently_take_any_prescription_medicati
    required: true
    options:
      - id: "a"
        label: "Yes, one medication"
      - id: "b"
        label: "Yes, two or three medications"
      - id: "c"
        label: "Yes, four or more medications"
      - id: "d"
        label: "No, only occasionally"
      - id: "e"
        label: "No, none at all"
  - id: q1
    prompt: "In the past 12 months, have you refilled a prescription online or through an app?"
    type: single_choice
    construct: past_12_months_have_refilled
    required: true
    options:
      - id: "a"
        label: "Yes, many times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, I have never refilled online"
  - id: q2
    prompt: "How long have you been refilling prescriptions online?"
    type: single_choice
    construct: long_have_been_refilling_prescriptions
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "More than 3 years"
      - id: "e"
        label: "I do not refill online"
  - id: q3
    prompt: "How do you usually request an online refill?"
    type: single_choice
    construct: usually_request_online_refill
    required: true
    options:
      - id: "a"
        label: "Pharmacy mobile app"
      - id: "b"
        label: "Pharmacy website"
      - id: "c"
        label: "My health system's patient portal"
      - id: "d"
        label: "Automatic refill or auto-fill program"
      - id: "e"
        label: "A text-message or reminder link"
      - id: "f"
        label: "I do not refill online"
  - id: q4
    prompt: "Which pharmacies or services do you use for online refills? (Select all that apply)"
    type: multi_choice
    construct: pharmacies_services_use_online_refills
    required: true
    options:
      - id: "a"
        label: "CVS"
      - id: "b"
        label: "Walgreens"
      - id: "c"
        label: "Walmart"
      - id: "d"
        label: "A grocery-store pharmacy (for example, Kroger, Publix)"
      - id: "e"
        label: "Amazon Pharmacy"
      - id: "f"
        label: "A mail-order or insurance pharmacy"
      - id: "g"
        label: "A local independent pharmacy"
      - id: "h"
        label: "I do not refill online"
  - id: q5
    prompt: "How do you usually receive prescriptions you refill online?"
    type: single_choice
    construct: usually_receive_prescriptions_refill_onl
    required: true
    options:
      - id: "a"
        label: "Pick up in store"
      - id: "b"
        label: "Drive-through pickup"
      - id: "c"
        label: "Home delivery by mail"
      - id: "d"
        label: "Same-day local delivery"
      - id: "e"
        label: "It varies"
  - id: q6
    prompt: "About how often do you refill a prescription online?"
    type: single_choice
    construct: often_refill_prescription_online
    required: true
    options:
      - id: "a"
        label: "Weekly"
      - id: "b"
        label: "Monthly"
      - id: "c"
        label: "Every few months"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely"
  - id: q7
    prompt: "Do you use automatic refills for any of your medications?"
    type: single_choice
    construct: use_automatic_refills_any_medications
    required: true
    options:
      - id: "a"
        label: "Yes, for all of them"
      - id: "b"
        label: "Yes, for some of them"
      - id: "c"
        label: "No, but I would consider it"
      - id: "d"
        label: "No, I prefer to request each refill"
  - id: q8
    prompt: "Which features of online refills do you use? (Select all that apply)"
    type: multi_choice
    construct: features_online_refills_use_select
    required: true
    options:
      - id: "a"
        label: "Refill reminders or notifications"
      - id: "b"
        label: "Auto-refill enrollment"
      - id: "c"
        label: "Order status tracking"
      - id: "d"
        label: "Refilling for family members"
      - id: "e"
        label: "Scanning a prescription barcode"
      - id: "f"
        label: "Chatting with a pharmacist online"
      - id: "g"
        label: "Managing insurance or payment"
      - id: "h"
        label: "I do not use these features"
  - id: q9
    prompt: "How do you usually pay for prescriptions refilled online?"
    type: single_choice
    construct: usually_pay_prescriptions_refilled_onlin
    required: true
    options:
      - id: "a"
        label: "Insurance copay saved in the app"
      - id: "b"
        label: "Enter payment each time"
      - id: "c"
        label: "Discount card or coupon (for example, GoodRx)"
      - id: "d"
        label: "Pay in person at pickup"
      - id: "e"
        label: "It varies"
  - id: q10
    prompt: "How often do you get a refill reminder before you run out?"
    type: single_choice
    construct: often_get_refill_reminder_before
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q11
    prompt: "How much do you agree with the following statement: Refilling prescriptions online saves me time."
    type: single_choice
    construct: much_agree_following_statement_refilling
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q12
    prompt: "How much do you agree with the following statement: The online refill process is easy to use."
    type: single_choice
    construct: much_agree_following_statement_online
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement: I trust that my refills will be filled correctly."
    type: single_choice
    construct: much_agree_following_statement_i
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree with the following statement: Online refills help me stay on schedule with my medications."
    type: single_choice
    construct: much_agree_following_statement_online
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
