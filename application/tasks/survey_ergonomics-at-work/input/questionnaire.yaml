schemaVersion: "1.0"
id: ergonomics_at_work_v1
title: "Ergonomics at Work Survey"
description: "Workplace ergonomics: workspace setup, comfort, and employer support."
questions:
  - id: q0
    prompt: "Where do you primarily do your work?"
    type: single_choice
    construct: where_primarily_work
    required: true
    options:
      - id: "a"
        label: "An office"
      - id: "b"
        label: "Home"
      - id: "c"
        label: "A mix of office and home"
      - id: "d"
        label: "On the move or in the field"
      - id: "e"
        label: "Not currently working"
  - id: q1
    prompt: "About how many hours a day do you spend seated at a desk or workstation? Please enter a number."
    type: free_text
    construct: many_hours_day_spend_seated
    required: true
  - id: q2
    prompt: "Which best describes your typical work?"
    type: single_choice
    construct: best_describes_typical_work
    required: true
    options:
      - id: "a"
        label: "Mostly at a computer or desk"
      - id: "b"
        label: "A mix of desk and physical tasks"
      - id: "c"
        label: "Mostly physical or hands-on"
      - id: "d"
        label: "Mostly driving or on the move"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Which ergonomic equipment do you use in your workspace? (Select all that apply)"
    type: multi_choice
    construct: ergonomic_equipment_use_workspace_select
    required: true
    options:
      - id: "a"
        label: "Adjustable office chair"
      - id: "b"
        label: "Standing or sit-stand desk"
      - id: "c"
        label: "External keyboard and mouse"
      - id: "d"
        label: "Monitor stand or riser"
      - id: "e"
        label: "Laptop stand"
      - id: "f"
        label: "Footrest"
      - id: "g"
        label: "Wrist or lumbar support"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "How would you rate the comfort of your current workspace setup?"
    type: single_choice
    construct: would_rate_comfort_current_workspace
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q5
    prompt: "Which types of discomfort do you experience during or after work? (Select all that apply)"
    type: multi_choice
    construct: types_discomfort_experience_during_after
    required: true
    options:
      - id: "a"
        label: "Neck or shoulder tension"
      - id: "b"
        label: "Lower-back discomfort"
      - id: "c"
        label: "Wrist or hand strain"
      - id: "d"
        label: "Eye strain"
      - id: "e"
        label: "General fatigue"
      - id: "f"
        label: "Leg or hip stiffness"
      - id: "g"
        label: "No discomfort"
  - id: q6
    prompt: "Has your employer provided any ergonomic support? (Select all that apply)"
    type: multi_choice
    construct: has_employer_provided_any_ergonomic
    required: true
    options:
      - id: "a"
        label: "An ergonomic assessment of my workspace"
      - id: "b"
        label: "A stipend or budget for equipment"
      - id: "c"
        label: "Equipment provided directly"
      - id: "d"
        label: "Training or guidance"
      - id: "e"
        label: "Nothing provided"
      - id: "f"
        label: "Not applicable"
