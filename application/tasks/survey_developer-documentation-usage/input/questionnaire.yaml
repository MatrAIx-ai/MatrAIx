schemaVersion: "1.0"
id: developer_documentation_usage_v1
title: "Developer Documentation Usage Survey"
description: "How developers and technical learners find, read, trust, contribute to, and evaluate technical documentation."
questions:
  - id: q0
    prompt: "Do you read or reference technical documentation as part of your work, studies, or hobby projects?"
    type: single_choice
    construct: read_reference_technical_documentation_a
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, almost never"
  - id: q1
    prompt: "How many years have you been writing code, including any time spent learning?"
    type: single_choice
    construct: many_years_have_been_writing
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1–2 years"
      - id: "c"
        label: "3–5 years"
      - id: "d"
        label: "6–10 years"
      - id: "e"
        label: "11–20 years"
      - id: "f"
        label: "More than 20 years"
  - id: q2
    prompt: "In a typical work or study week, how often do you consult technical documentation?"
    type: single_choice
    construct: typical_work_study_week_often
    required: true
    options:
      - id: "a"
        label: "Rarely or never"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Most days"
      - id: "d"
        label: "Several times every day"
      - id: "e"
        label: "Almost constantly while I work"
  - id: q3
    prompt: "Which types of documentation do you rely on most? (Select all that apply)"
    type: multi_choice
    construct: types_documentation_rely_most_select
    required: true
    options:
      - id: "a"
        label: "API / reference documentation"
      - id: "b"
        label: "Getting-started guides and tutorials"
      - id: "c"
        label: "README files in the source repository"
      - id: "d"
        label: "Code samples and example projects"
      - id: "e"
        label: "SDK / library documentation"
      - id: "f"
        label: "Architecture or design documents"
      - id: "g"
        label: "Changelogs and release notes"
      - id: "h"
        label: "Migration / upgrade guides"
      - id: "i"
        label: "Community wikis or Q&A threads"
      - id: "j"
        label: "Video walkthroughs"
      - id: "k"
        label: "Cheat sheets or quick-reference tables"
  - id: q4
    prompt: "Where do you usually go first to find documentation? (Select all that apply)"
    type: multi_choice
    construct: where_usually_go_first_find
    required: true
    options:
      - id: "a"
        label: "Official documentation website"
      - id: "b"
        label: "GitHub repository (README / wiki)"
      - id: "c"
        label: "A general search engine (Google, Bing, etc.)"
      - id: "d"
        label: "Stack Overflow"
      - id: "e"
        label: "An AI chatbot or AI-powered dev tool"
      - id: "f"
        label: "MDN, DevDocs, or a similar aggregator"
      - id: "g"
        label: "Internal company wiki (Confluence, Notion, etc.)"
      - id: "h"
        label: "Blog posts or written tutorials"
      - id: "i"
        label: "YouTube or other video platforms"
      - id: "j"
        label: "Reddit, Discord, or other community channels"
  - id: q5
    prompt: "Which documentation sites or tools do you use regularly? (Select all that apply)"
    type: multi_choice
    construct: documentation_sites_tools_use_regularly
    required: true
    options:
      - id: "a"
        label: "MDN Web Docs"
      - id: "b"
        label: "DevDocs.io"
      - id: "c"
        label: "Dash or Zeal (offline docs)"
      - id: "d"
        label: "Read the Docs"
      - id: "e"
        label: "Official language docs (Python docs, cppreference, etc.)"
      - id: "f"
        label: "GitHub / GitLab wikis"
      - id: "g"
        label: "Confluence"
      - id: "h"
        label: "Notion"
      - id: "i"
        label: "Stack Overflow"
      - id: "j"
        label: "An AI assistant (ChatGPT, Claude, Copilot Chat, etc.)"
      - id: "k"
        label: "None of these"
  - id: q6
    prompt: "When learning a brand-new library or framework, what is your very first move?"
    type: single_choice
    construct: when_learning_brand_new_library
    required: true
    options:
      - id: "a"
        label: "Read the official \"getting started\" guide end to end"
      - id: "b"
        label: "Jump straight to a code example and adapt it"
      - id: "c"
        label: "Ask an AI assistant to explain it"
      - id: "d"
        label: "Search for a tutorial or video"
      - id: "e"
        label: "Skim the API reference for the pieces I need"
  - id: q7
    prompt: "How do you most often read documentation while coding?"
    type: single_choice
    construct: most_often_read_documentation_while
    required: true
    options:
      - id: "a"
        label: "Browser tab side-by-side with my editor"
      - id: "b"
        label: "Inside my IDE (hover, inline hints, integrated docs)"
      - id: "c"
        label: "Through an AI assistant in my editor"
      - id: "d"
        label: "On a second monitor"
      - id: "e"
        label: "Printed notes or offline copies"
  - id: q8
    prompt: "Which documentation format do you prefer most?"
    type: single_choice
    construct: documentation_format_prefer_most
    required: true
    options:
      - id: "a"
        label: "Searchable web pages"
      - id: "b"
        label: "In-IDE / inline documentation"
      - id: "c"
        label: "Interactive notebooks or runnable docs"
      - id: "d"
        label: "PDF or downloadable manuals"
      - id: "e"
        label: "Man pages / command-line help"
  - id: q9
    prompt: "How often do you use an AI assistant (ChatGPT, Copilot, Claude, etc.) to explain or summarize documentation?"
    type: single_choice
    construct: often_use_ai_assistant_chatgpt
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "It is now my main way to read docs"
  - id: q10
    prompt: "Do you download or keep offline copies of documentation (e.g. Dash, Zeal, DevDocs offline)?"
    type: single_choice
    construct: download_keep_offline_copies_documentati
    required: true
    options:
      - id: "a"
        label: "Yes, I use an offline docs app regularly"
      - id: "b"
        label: "Occasionally, for travel or unreliable internet"
      - id: "c"
        label: "No, I always read online"
  - id: q11
    prompt: "When you land on a documentation page, what do you typically do first?"
    type: single_choice
    construct: when_land_documentation_page_typically
    required: true
    options:
      - id: "a"
        label: "Use the site's search box"
      - id: "b"
        label: "Scan the table of contents / sidebar"
      - id: "c"
        label: "Jump to a code example"
      - id: "d"
        label: "Ctrl+F for a specific keyword"
      - id: "e"
        label: "Read from the top"
  - id: q12
    prompt: "How much do you agree with the following statement about the documentation you use most: It is kept up to date with the current version of the software."
    type: single_choice
    construct: much_agree_following_statement_documenta
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree with the following statement about the documentation you use most: It includes enough runnable code examples."
    type: single_choice
