schemaVersion: "1.0"
id: hearing_health_v1
title: "Hearing Health Survey"
description: "Consumer hearing health habits and attitudes, including hearing checks, noise exposure, and views on hearing care and devices."
questions:
  - id: q0
    prompt: "How would you rate your hearing overall?"
    type: single_choice
    construct: would_rate_hearing_overall
    required: true
    options:
      - id: "a"
        label: "Excellent"
      - id: "b"
        label: "Very good"
      - id: "c"
        label: "Good"
      - id: "d"
        label: "Fair"
      - id: "e"
        label: "Poor"
  - id: q1
    prompt: "Have you ever had a formal hearing test?"
    type: single_choice
    construct: have_ever_had_formal_hearing
    required: true
    options:
      - id: "a"
        label: "Yes, within the past year"
      - id: "b"
        label: "Yes, 1 to 5 years ago"
      - id: "c"
        label: "Yes, more than 5 years ago"
      - id: "d"
        label: "No, never"
  - id: q2
    prompt: "Where did you have your most recent hearing check?"
    type: single_choice
    construct: where_did_have_most_recent
    required: true
    options:
      - id: "a"
        label: "An audiologist's office"
      - id: "b"
        label: "An ear, nose, and throat (ENT) doctor"
      - id: "c"
        label: "A hearing aid retailer or clinic"
      - id: "d"
        label: "A primary care visit"
      - id: "e"
        label: "A free or community screening"
      - id: "f"
        label: "I have never had one"
  - id: q3
    prompt: "How often do you have trouble hearing in each situation: conversations in a quiet room?"
    type: single_choice
    construct: often_have_trouble_hearing_each
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q4
    prompt: "How often do you have trouble hearing in each situation: conversations in a noisy place?"
    type: single_choice
    construct: often_have_trouble_hearing_each
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q5
    prompt: "How often do you have trouble hearing in each situation: on the phone?"
    type: single_choice
    construct: often_have_trouble_hearing_each
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q6
    prompt: "How often do you have trouble hearing in each situation: the television at a normal volume?"
    type: single_choice
    construct: often_have_trouble_hearing_each
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q7
    prompt: "How often do you have trouble hearing in each situation: group conversations?"
    type: single_choice
    construct: often_have_trouble_hearing_each
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q8
    prompt: "Do you currently use any hearing devices? (Select all that apply)"
    type: multi_choice
    construct: currently_use_any_hearing_devices
    required: true
    options:
      - id: "a"
        label: "Prescription hearing aids"
      - id: "b"
        label: "Over-the-counter hearing aids"
      - id: "c"
        label: "Personal sound amplifiers"
      - id: "d"
        label: "Hearing features on earbuds or headphones"
      - id: "e"
        label: "Captioned phone or TV captions"
      - id: "f"
        label: "I do not use any hearing devices"
  - id: q9
    prompt: "Which situations regularly expose you to loud noise? (Select all that apply)"
    type: multi_choice
    construct: situations_regularly_expose_loud_noise
    required: true
    options:
      - id: "a"
        label: "Concerts or live events"
      - id: "b"
        label: "Using headphones or earbuds at high volume"
      - id: "c"
        label: "Power tools or yard equipment"
      - id: "d"
        label: "A noisy workplace"
      - id: "e"
        label: "Sporting events"
      - id: "f"
        label: "None of these"
  - id: q10
    prompt: "Do you use hearing protection (such as earplugs) in loud settings?"
    type: single_choice
    construct: use_hearing_protection_such_as
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q11
    prompt: "About how many hours per day do you listen with headphones or earbuds? Please enter a number."
    type: free_text
    construct: many_hours_per_day_listen
    required: true
  - id: q12
    prompt: "How much do you agree or disagree: Protecting my hearing is important to me."
    type: single_choice
    construct: much_agree_disagree_protecting_my
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: I would get a hearing test if I noticed a change in my hearing."
    type: single_choice
    construct: much_agree_disagree_i_would
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: There is a stigma around wearing hearing aids."
    type: single_choice
    construct: much_agree_disagree_there_stigma
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: Hearing devices are too expensive."
    type: single_choice
    construct: much_agree_disagree_hearing_devices
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: I am comfortable talking about hearing difficulties."
    type: single_choice
    construct: much_agree_disagree_i_am
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How much do you agree or disagree: Over-the-counter hearing aids are a good option for people with mild hearing loss."
    type: single_choice
    construct: much_agree_disagree_over_counter
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q18
    prompt: "How important is each factor if you were choosing a hearing device: cost?"
    type: single_choice
