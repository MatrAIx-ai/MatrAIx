schemaVersion: "1.0"
id: pension_attitudes_v1
title: "Pension Attitudes Survey"
description: "Attitudes toward traditional defined-benefit pensions and how people weigh them against modern 401(k)-style retirement plans."
questions:
  - id: q0
    prompt: "Do you currently have, or expect to receive, a traditional pension (a defined-benefit plan that pays a set monthly amount in retirement)?"
    type: single_choice
    construct: currently_have_expect_receive_traditiona
    required: true
    options:
      - id: "a"
        label: "Yes, I currently receive pension payments"
      - id: "b"
        label: "Yes, I am earning or vested in a pension but not yet collecting"
      - id: "c"
        label: "No, but I expect to have one in the future"
      - id: "d"
        label: "No, and I do not expect to have one"
      - id: "e"
        label: "Not sure"
  - id: q1
    prompt: "Which best describes the sector where you currently work (or most recently worked)?"
    type: single_choice
    construct: best_describes_sector_where_currently
    required: true
    options:
      - id: "a"
        label: "Private company"
      - id: "b"
        label: "Federal government"
      - id: "c"
        label: "State or local government"
      - id: "d"
        label: "Public education (teacher, professor, school staff)"
      - id: "e"
        label: "Military"
      - id: "f"
        label: "Nonprofit organization"
      - id: "g"
        label: "Self-employed"
      - id: "h"
        label: "Not currently employed"
  - id: q2
    prompt: "How many total years have you worked for an employer that offered a defined-benefit pension? Please enter a number of years."
    type: free_text
    construct: many_total_years_have_worked
    required: true
  - id: q3
    prompt: "Which of the following retirement plans have you ever participated in? (Select all that apply)"
    type: multi_choice
    construct: following_retirement_plans_have_ever
    required: true
    options:
      - id: "a"
        label: "Traditional defined-benefit pension"
      - id: "b"
        label: "401(k) plan"
      - id: "c"
        label: "403(b) or 457 plan"
      - id: "d"
        label: "Traditional or Roth IRA"
      - id: "e"
        label: "Federal Thrift Savings Plan (TSP)"
      - id: "f"
        label: "Cash-balance plan"
      - id: "g"
        label: "Union or multi-employer pension"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "How did you first learn the details of your pension benefit?"
    type: single_choice
    construct: did_first_learn_details_pension
    required: true
    options:
      - id: "a"
        label: "Employer HR or benefits department"
      - id: "b"
        label: "Union representative"
      - id: "c"
        label: "Plan documents or benefits website"
      - id: "d"
        label: "Coworkers, friends, or family"
      - id: "e"
        label: "A financial advisor"
      - id: "f"
        label: "I have not learned the details"
      - id: "g"
        label: "Not applicable — I do not have a pension"
  - id: q5
    prompt: "At what age do you expect to begin (or did you begin) collecting pension benefits?"
    type: single_choice
    construct: age_expect_begin_did_begin
    required: true
    options:
      - id: "a"
        label: "Before 55"
      - id: "b"
        label: "55 to 59"
      - id: "c"
        label: "60 to 62"
      - id: "d"
        label: "63 to 65"
      - id: "e"
        label: "66 to 69"
      - id: "f"
        label: "70 or older"
      - id: "g"
        label: "Not applicable"
  - id: q6
    prompt: "If given the choice, how would you prefer to receive your pension?"
    type: single_choice
    construct: if_given_choice_would_prefer
    required: true
    options:
      - id: "a"
        label: "A guaranteed monthly payment for life"
      - id: "b"
        label: "A one-time lump sum I invest and manage myself"
      - id: "c"
        label: "A mix of a partial lump sum and monthly payments"
      - id: "d"
        label: "Not sure"
  - id: q7
    prompt: "How would you rate your understanding of the difference between a defined-benefit pension and a 401(k)-style account?"
    type: single_choice
    construct: would_rate_understanding_difference_betw
    required: true
    options:
      - id: "a"
        label: "I don't understand the difference at all"
      - id: "b"
        label: "Slight understanding"
      - id: "c"
        label: "Moderate understanding"
      - id: "d"
        label: "Good understanding"
      - id: "e"
        label: "I understand it very well and could explain it to others"
  - id: q8
    prompt: "How confident are you that the pension benefits you have been promised will actually be paid in full?"
    type: single_choice
    construct: confident_that_pension_benefits_have
    required: true
    options:
      - id: "a"
        label: "Not at all confident"
      - id: "b"
        label: "Slightly confident"
      - id: "c"
        label: "Moderately confident"
      - id: "d"
        label: "Very confident"
      - id: "e"
        label: "Completely confident"
      - id: "f"
        label: "Not applicable — I have no pension"
  - id: q9
