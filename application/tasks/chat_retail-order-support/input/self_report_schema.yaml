artifactName: user_feedback.json
instructions: |
  Reflect honestly as the persona after the conversation. Judge only by what the
  assistant actually said and did during the chat.
fields:
  - key: needConstraintSatisfaction
    prompt: How well did the assistant satisfy your core need or goal?
    kind: enum
    choices: [yes, partially, no]
  - key: personalPreferenceSatisfaction
    prompt: How well did the assistant fit your personal situation and preferences?
    kind: enum
    choices: [yes, partially, no]
  - key: overallExperienceRating
    prompt: Overall, how would you rate the experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
  - key: reason
    prompt: Briefly explain the rating in your own voice.
  - key: askedUsefulClarificationQuestions
    prompt: Did the assistant ask useful clarification questions?
    kind: boolean
  - key: clarifyingNotes
    prompt: Which questions helped, or why they did not.
