transport: external_http
runtimeDefaults:
  applicationId: retail_support_bot
  applicationContext: retail_support
  domain: retail_support
connection:
  baseUrlEnv: CHATBOT_UPSTREAM_RETAIL
  legacyBaseUrlEnv: RETAIL_CHATBOT_URL
  baseUrl: http://retail-support-chatbot:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    engineField: engine
    staticBody:
      applicationId: retail_support_bot
      applicationContext: retail_support
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Suggested resolutions or order actions
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
