schemaVersion: "1.0"
id: workplace_wellness_programs_v1
title: "Workplace Wellness Programs Survey"
description: "Employee experience with, participation in, and attitudes toward employer-sponsored wellness programs."
questions:
  - id: q0
    prompt: "Are you currently employed by an organization (not self-employed)?"
    type: single_choice
    construct: currently_employed_by_organization_not
    required: true
    options:
      - id: "a"
        label: "Yes, full-time"
      - id: "b"
        label: "Yes, part-time"
      - id: "c"
        label: "No, self-employed"
      - id: "d"
        label: "No, not currently employed"
  - id: q1
    prompt: "About how many people work at your employer overall?"
    type: single_choice
    construct: many_people_work_employer_overall
    required: true
    options:
      - id: "a"
        label: "Fewer than 50"
      - id: "b"
        label: "50 to 199"
      - id: "c"
        label: "200 to 999"
      - id: "d"
        label: "1,000 to 4,999"
      - id: "e"
        label: "5,000 or more"
      - id: "f"
        label: "Not sure"
  - id: q2
    prompt: "Does your employer offer any kind of wellness program or well-being benefits?"
    type: single_choice
    construct: does_employer_offer_any_kind
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Not sure"
  - id: q3
    prompt: "Which of the following wellness offerings does your employer provide? (Select all that apply)"
    type: multi_choice
    construct: following_wellness_offerings_does_employ
    required: true
    options:
      - id: "a"
        label: "Biometric screenings or health risk assessments"
      - id: "b"
        label: "Gym membership subsidy or on-site fitness"
      - id: "c"
        label: "Fitness or step challenges"
      - id: "d"
        label: "Mental health resources or an employee assistance program (EAP)"
      - id: "e"
        label: "Smoking cessation or tobacco programs"
      - id: "f"
        label: "Weight management or nutrition programs"
      - id: "g"
        label: "Financial wellness or planning resources"
      - id: "h"
        label: "Meditation or mindfulness app subscription"
      - id: "i"
        label: "Health coaching"
      - id: "j"
        label: "On-site flu shots or vaccinations"
      - id: "k"
        label: "None of these"
  - id: q4
    prompt: "In the past 12 months, how often did you participate in any workplace wellness activities?"
    type: single_choice
    construct: past_12_months_often_did
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once or twice"
      - id: "c"
        label: "A few times"
      - id: "d"
        label: "Monthly"
      - id: "e"
        label: "Weekly or more"
  - id: q5
    prompt: "Which wellness offerings have you personally used in the past 12 months? (Select all that apply)"
    type: multi_choice
    construct: wellness_offerings_have_personally_used
    required: true
    options:
      - id: "a"
        label: "Biometric screening or health assessment"
      - id: "b"
        label: "Gym or fitness benefit"
      - id: "c"
        label: "Fitness or step challenge"
      - id: "d"
        label: "Mental health resource or EAP"
      - id: "e"
        label: "Health coaching"
      - id: "f"
        label: "Nutrition or weight program"
      - id: "g"
        label: "Financial wellness resource"
      - id: "h"
        label: "Meditation or mindfulness app"
      - id: "i"
        label: "On-site flu shot or vaccination"
      - id: "j"
        label: "None of these"
  - id: q6
    prompt: "How did you first learn about your employer's wellness program?"
    type: single_choice
    construct: did_first_learn_employer_s
    required: true
    options:
      - id: "a"
        label: "New-hire orientation or onboarding"
      - id: "b"
        label: "Company email or newsletter"
      - id: "c"
        label: "Intranet or benefits portal"
      - id: "d"
        label: "Manager or HR mentioned it"
      - id: "e"
        label: "A coworker"
      - id: "f"
        label: "Open enrollment materials"
      - id: "g"
        label: "I have not really learned about it"
  - id: q7
    prompt: "Does your employer offer a financial incentive for participating (such as a premium discount, gift card, or cash)?"
    type: single_choice
    construct: does_employer_offer_financial_incentive
    required: true
    options:
      - id: "a"
        label: "Yes, a significant incentive"
      - id: "b"
        label: "Yes, a small incentive"
      - id: "c"
        label: "No incentive"
      - id: "d"
        label: "Not sure"
  - id: q8
    prompt: "About how much financial incentive, if any, did you earn from wellness activities in the past 12 months? Please enter a dollar amount (enter 0 if none)."
    type: free_text
    construct: much_financial_incentive_if_any
    required: true
  - id: q9
    prompt: "What most motivates you to participate in workplace wellness programs? (Select all that apply)"
    type: multi_choice
    construct: most_motivates_participate_workplace_wel
    required: true
    options:
      - id: "a"
        label: "Financial incentives or discounts"
      - id: "b"
        label: "Improving my physical health"
      - id: "c"
        label: "Reducing stress or improving mental health"
      - id: "d"
        label: "Social connection with coworkers"
      - id: "e"
        label: "Friendly competition"
      - id: "f"
        label: "Convenience of on-site or free access"
      - id: "g"
        label: "Encouragement from my manager"
      - id: "h"
        label: "Nothing motivates me to participate"
  - id: q10
    prompt: "What most keeps you from participating? (Select all that apply)"
    type: multi_choice
    construct: most_keeps_from_participating_select
    required: true
    options:
      - id: "a"
        label: "Too busy or no time during the workday"
      - id: "b"
        label: "Not interested in the offerings"
      - id: "c"
        label: "Privacy concerns about sharing health data"
      - id: "d"
        label: "Offerings are not relevant to me"
      - id: "e"
        label: "Feels like an obligation, not a benefit"
      - id: "f"
        label: "I did not know what was available"
      - id: "g"
        label: "Rewards are not worth the effort"
      - id: "h"
        label: "Nothing keeps me from participating"
  - id: q11
    prompt: "How comfortable are you sharing personal health information with an employer wellness program?"
    type: single_choice
    construct: comfortable_sharing_personal_health_info
    required: true
    options:
      - id: "a"
        label: "Very uncomfortable"
      - id: "b"
        label: "Somewhat uncomfortable"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Somewhat comfortable"
      - id: "e"
        label: "Very comfortable"
  - id: q12
    prompt: "How much do you agree or disagree: My employer's wellness program is genuinely designed to help employees."
    type: single_choice
    construct: much_agree_disagree_my_employer
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q13
    prompt: "How much do you agree or disagree: The wellness program fits easily into my workday."
    type: single_choice
    construct: much_agree_disagree_wellness_program
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
    prompt: "How much do you agree or disagree: I trust that my health data stays private in the program."
    type: single_choice
    construct: much_agree_disagree_i_trust
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q15
    prompt: "How much do you agree or disagree: The program has had a positive effect on my health."
    type: single_choice
    construct: much_agree_disagree_program_has
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q16
    prompt: "How much do you agree or disagree: My managers actively encourage participation."
    type: single_choice
    construct: much_agree_disagree_my_managers
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q17
    prompt: "How valuable do you find each type of offering — Physical fitness benefits (gym, challenges)"
    type: single_choice
    construct: valuable_find_each_type_offering
    required: true
    options:
      - id: "a"
        label: "Not at all valuable"
      - id: "b"
        label: "Slightly valuable"
      - id: "c"
        label: "Moderately valuable"
      - id: "d"
        label: "Very valuable"
      - id: "e"
        label: "Extremely valuable"
  - id: q18
    prompt: "How valuable do you find each type of offering — Mental health and stress resources"
    type: single_choice
    construct: valuable_find_each_type_offering
    required: true
    options:
      - id: "a"
        label: "Not at all valuable"
      - id: "b"
        label: "Slightly valuable"
      - id: "c"
        label: "Moderately valuable"
      - id: "d"
        label: "Very valuable"
      - id: "e"
        label: "Extremely valuable"
  - id: q19
    prompt: "How valuable do you find each type of offering — Health screenings and assessments"
    type: single_choice
    construct: valuable_find_each_type_offering
    required: true
    options:
      - id: "a"
        label: "Not at all valuable"
      - id: "b"
        label: "Slightly valuable"
      - id: "c"
        label: "Moderately valuable"
      - id: "d"
        label: "Very valuable"
      - id: "e"
        label: "Extremely valuable"
  - id: q20
    prompt: "How valuable do you find each type of offering — Financial wellness resources"
    type: single_choice
    construct: valuable_find_each_type_offering
    required: true
    options:
      - id: "a"
        label: "Not at all valuable"
      - id: "b"
        label: "Slightly valuable"
      - id: "c"
        label: "Moderately valuable"
      - id: "d"
        label: "Very valuable"
      - id: "e"
        label: "Extremely valuable"
  - id: q21
    prompt: "How valuable do you find each type of offering — Nutrition and weight-management support"
    type: single_choice
    construct: valuable_find_each_type_offering
    required: true
    options:
      - id: "a"
        label: "Not at all valuable"
      - id: "b"
        label: "Slightly valuable"
      - id: "c"
        label: "Moderately valuable"
      - id: "d"
        label: "Very valuable"
      - id: "e"
        label: "Extremely valuable"
  - id: q22
    prompt: "Which additional wellness offerings would you most like your employer to add? Select your top 3. (Select all that apply)"
    type: multi_choice
    construct: additional_wellness_offerings_would_most
    required: true
    options:
      - id: "a"
        label: "More mental health support"
      - id: "b"
        label: "Better fitness or gym benefits"
      - id: "c"
        label: "Flexible time to use wellness benefits"
      - id: "d"
        label: "Financial or retirement planning help"
      - id: "e"
        label: "On-site health clinic or nurse"
      - id: "f"
        label: "Sleep improvement resources"
      - id: "g"
        label: "Nutrition or healthy meal options"
      - id: "h"
        label: "Meditation or mindfulness tools"
      - id: "i"
        label: "Ergonomic support for workspaces"
      - id: "j"
        label: "Larger financial incentives"
  - id: q23
    prompt: "In a typical month, about how many wellness activities do you take part in? Please enter a number (enter 0 if none)."
    type: free_text
    construct: typical_month_many_wellness_activities
    required: true
  - id: q24
    prompt: "Has participating in a wellness program ever led you to make a lasting healthy change?"
    type: single_choice
    construct: has_participating_wellness_program_ever
    required: true
    options:
      - id: "a"
        label: "No, not at all"
      - id: "b"
        label: "A small, temporary change"
      - id: "c"
        label: "A moderate change"
      - id: "d"
        label: "Yes, a significant lasting change"
      - id: "e"
        label: "I have not participated"
  - id: q25
    prompt: "How satisfied are you overall with your employer's wellness program?"
    type: single_choice
    construct: satisfied_overall_employer_s_wellness
    required: true
    options:
      - id: "a"
        label: "Very dissatisfied"
      - id: "b"
        label: "Dissatisfied"
      - id: "c"
        label: "Neutral"
      - id: "d"
        label: "Satisfied"
      - id: "e"
        label: "Very satisfied"
      - id: "f"
        label: "My employer does not offer one"
  - id: q26
    prompt: "How much does the availability of wellness benefits influence your decision to stay with an employer?"
    type: single_choice
    construct: much_does_availability_wellness_benefits
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "A little"
      - id: "c"
        label: "A moderate amount"
      - id: "d"
        label: "A lot"
      - id: "e"
        label: "It is a major factor"
  - id: q27
    prompt: "How likely are you to participate in your employer's wellness program in the next 12 months?"
    type: single_choice
    construct: likely_participate_employer_s_wellness
    required: true
    options:
      - id: "a"
        label: "Very unlikely"
      - id: "b"
        label: "Unlikely"
      - id: "c"
        label: "Neither likely nor unlikely"
      - id: "d"
        label: "Likely"
      - id: "e"
        label: "Very likely"
  - id: q28
    prompt: "Overall, how likely are you to recommend your employer's wellness program to a coworker? Please use a 0 to 10 scale, where 0 is not at all likely and 10 is extremely likely. Please enter a number."
    type: free_text
    construct: overall_likely_recommend_employer_s
    required: true
  - id: q29
    prompt: "What is your age? Please enter a number (years old)."
    type: free_text
    construct: age_please_enter_number_years
    required: true
  - id: q30
    prompt: "What is your gender?"
    type: single_choice
    construct: gender
    required: true
    options:
