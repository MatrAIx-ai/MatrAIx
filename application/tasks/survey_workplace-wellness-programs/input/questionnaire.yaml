    type: single_choice
    construct: industry_best_describes_where_work
    required: true
    options:
      - id: "a"
        label: "Healthcare"
      - id: "b"
        label: "Education"
      - id: "c"
        label: "Technology"
      - id: "d"
        label: "Finance or insurance"
      - id: "e"
