schemaVersion: "1.0"
id: auto_loan_financing_v1
title: "Auto Loan & Vehicle Financing Survey"
description: "How consumers shop for, take on, and manage auto loans and vehicle leases."
questions:
  - id: q0
    prompt: "Do you currently have an auto loan or vehicle lease?"
    type: single_choice
    construct: currently_have_auto_loan_vehicle
    required: true
    options:
      - id: "a"
        label: "Yes, an auto loan I am paying off"
      - id: "b"
        label: "Yes, a vehicle lease"
      - id: "c"
        label: "Yes, both a loan and a lease (different vehicles)"
      - id: "d"
        label: "No, I own my vehicle(s) outright"
      - id: "e"
        label: "No, I do not own or lease any vehicle"
  - id: q1
    prompt: "In the past 5 years, how have you acquired vehicles? (Select all that apply)"
    type: multi_choice
    construct: past_5_years_have_acquired
    required: true
    options:
      - id: "a"
        label: "Bought new with a loan"
      - id: "b"
        label: "Bought used with a loan"
      - id: "c"
        label: "Paid cash (new or used)"
      - id: "d"
        label: "Leased"
      - id: "e"
        label: "Received a vehicle as a gift or hand-me-down"
      - id: "f"
        label: "Have not acquired a vehicle in the past 5 years"
  - id: q2
    prompt: "For your most recent financed vehicle, was it new or used?"
    type: single_choice
    construct: most_recent_financed_vehicle_was
    required: true
    options:
      - id: "a"
        label: "New"
      - id: "b"
        label: "Used, certified pre-owned"
      - id: "c"
        label: "Used, private party or non-certified"
      - id: "d"
        label: "Not applicable"
  - id: q3
    prompt: "What type of vehicle did you most recently finance?"
    type: single_choice
    construct: type_vehicle_did_most_recently
    required: true
    options:
      - id: "a"
        label: "Sedan or hatchback"
      - id: "b"
        label: "SUV or crossover"
      - id: "c"
        label: "Pickup truck"
      - id: "d"
        label: "Minivan"
      - id: "e"
        label: "Electric or plug-in hybrid vehicle"
      - id: "f"
        label: "Motorcycle or other"
      - id: "g"
        label: "Not applicable"
  - id: q4
    prompt: "When did you take out your most recent auto loan?"
    type: single_choice
    construct: when_did_take_out_most
    required: true
    options:
      - id: "a"
        label: "Within the past 12 months"
      - id: "b"
        label: "1 to 2 years ago"
      - id: "c"
        label: "3 to 5 years ago"
      - id: "d"
        label: "More than 5 years ago"
      - id: "e"
        label: "I have never taken out an auto loan"
  - id: q5
    prompt: "How many vehicles does your household currently own or lease?"
    type: single_choice
    construct: many_vehicles_does_household_currently
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2"
      - id: "d"
        label: "3"
      - id: "e"
        label: "4 or more"
  - id: q6
    prompt: "For your most recent auto loan, about how much did you finance (the amount borrowed)? Please enter a dollar amount."
    type: free_text
    construct: most_recent_auto_loan_much
    required: true
  - id: q7
    prompt: "What was the term (length) of your most recent auto loan?"
    type: single_choice
    construct: was_term_length_most_recent
    required: true
    options:
      - id: "a"
        label: "36 months or less"
      - id: "b"
        label: "37 to 48 months"
      - id: "c"
        label: "49 to 60 months"
      - id: "d"
        label: "61 to 72 months"
      - id: "e"
        label: "73 to 84 months"
      - id: "f"
        label: "More than 84 months"
      - id: "g"
        label: "Don't know / not applicable"
  - id: q8
    prompt: "What was the approximate annual percentage rate (APR) on your most recent auto loan?"
    type: single_choice
    construct: was_approximate_annual_percentage_rate
    required: true
    options:
      - id: "a"
        label: "0% to 2.9%"
      - id: "b"
        label: "3% to 4.9%"
      - id: "c"
        label: "5% to 6.9%"
      - id: "d"
        label: "7% to 9.9%"
      - id: "e"
        label: "10% to 14.9%"
      - id: "f"
        label: "15% or higher"
      - id: "g"
        label: "Don't know"
  - id: q9
    prompt: "About how much is your current monthly auto loan or lease payment? Please enter a dollar amount."
    type: free_text
    construct: much_current_monthly_auto_loan
    required: true
  - id: q10
    prompt: "About how much did you put down (down payment plus trade-in value) on your most recent financed vehicle? Please enter a dollar amount."
    type: free_text
    construct: much_did_put_down_down
    required: true
  - id: q11
    prompt: "Where did you get the financing for your most recent auto loan?"
    type: single_choice
    construct: where_did_get_financing_most
    required: true
    options:
      - id: "a"
        label: "Bank"
      - id: "b"
        label: "Credit union"
      - id: "c"
        label: "The dealership's own financing (captive lender, e.g., Ford Credit, Toyota Financial)"
      - id: "d"
        label: "Online lender or fintech (e.g., Carvana, LightStream)"
      - id: "e"
        label: "Family or personal loan"
      - id: "f"
        label: "Don't know / not applicable"
  - id: q12
    prompt: "Did you get pre-approved for financing before you went shopping for the vehicle?"
    type: single_choice
    construct: did_get_pre_approved_financing
    required: true
    options:
      - id: "a"
        label: "Yes, I had a pre-approval in hand"
      - id: "b"
        label: "No, I arranged financing at the dealership"
      - id: "c"
        label: "No, I paid cash or did not need financing"
      - id: "d"
        label: "Don't remember"
  - id: q13
    prompt: "How many lenders or financing offers did you compare before choosing?"
    type: single_choice
    construct: many_lenders_financing_offers_did
    required: true
    options:
      - id: "a"
        label: "Only one (took the first offer)"
      - id: "b"
        label: "2 offers"
      - id: "c"
        label: "3 to 4 offers"
      - id: "d"
        label: "5 or more offers"
      - id: "e"
        label: "Don't remember"
  - id: q14
    prompt: "Which add-on products, if any, did you purchase with your most recent vehicle financing? (Select all that apply)"
    type: multi_choice
    construct: add_products_if_any_did
    required: true
    options:
      - id: "a"
        label: "Extended warranty or service contract"
      - id: "b"
        label: "GAP insurance"
      - id: "c"
        label: "Tire and wheel protection"
      - id: "d"
        label: "Paint or fabric protection"
      - id: "e"
        label: "Credit life or disability insurance"
      - id: "f"
